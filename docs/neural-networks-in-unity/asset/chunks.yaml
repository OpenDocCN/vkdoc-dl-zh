    /// 变异神经网络权重\n/// </summary>\npublic void Mutate()\n{\n    for (int i = 0; i <\
    \ weights.Length; i++)\n    {\n        for (int j = 0; j < weights[i].Length;\
    \ j++)\n        {\n            for (int k = 0; k < weights[i][j].Length; k++)\n\
    \            {\n                float weight = weights[i][j][k];\n           \
    \     //变异权重值\n                float randomNumber = UnityEngine.Random.Range(0f,100f);\n\
    \                if (randomNumber <= 2f)\n                { //情况 1\n         \
    \           //翻转权重符号\n                    weight *= -1f;\n                }\n\
    \                else if (randomNumber <= 4f)\n                { //情况 2\n    \
    \                //在-1 到 1 之间随机选取权重\n                    weight = UnityEngine.Random.Range(-0.5f,\
    \ 0.5f);\n                }\n                else if (randomNumber <= 6f)\n  \
    \              { //情况 3\n                    //随机增加 0%到 100%\n               \
    \     float factor = UnityEngine.Random.Range(0f, 1f) + 1f;\n                \
    \    weight *= factor;\n                }\n                else if (randomNumber\
    \ <= 8f)\n                { //情况 4\n                    //随机减少 0%到 100%\n    \
    \                float factor = UnityEngine.Random.Range(0f, 1f);\n          \
    \          weight *= factor;\n                }\n                weights[i][j][k]\
    \ = weight;\n            }\n        }\n    }\n}\n\npublic void AddFitness(float\
    \ fit)\n{\n    fitness += fit;\n}\n\npublic void SetFitness(float fit)\n{\n  \
    \  fitness = fit;\n}\n\npublic float GetFitness()\n{\n    return fitness;\n}\n\
    \n/// <summary>\n/// 比较两个神经网络，并根据适应度排序\n/// </summary>\n/// <param name=\"other\"\
    >要与之比较的网络</param>\n/// <returns></returns>\npublic int CompareTo(NeuralNetwork\
    \ other)\n{\n    if (other == null) return 1;\n    if (fitness > other.fitness)\n\
    \        return 1;\n    else if (fitness < other.fitness)\n        return -1;\n\
    \    else\n        return 0;\n}\n```\n\n让我们运行应用程序（图 3-19）。\n\n**图 3-19.** 应用程序运行中\n\
    \n**使用蜘蛛资源进行实验**\n\n让我们尝试使用不同的资源进行实验；我们将使用蜘蛛资源。\n\n1. 在资源商店中，我们将找到蜘蛛动画资源（图 3-20）。\n\
    \n**图 3-20.** 添加蜘蛛资源\n\n2. 我们需要导入该资源（图 3-21）。\n\n**图 3-21.** 导入蜘蛛资源\n\n3. 我们将蜘蛛资源拖放到场景中（图\
    \ 3-22）。\n\n**图 3-22.** 添加蜘蛛预制体\n\n4. 我们使用旋转工具旋转蜘蛛（图 3-23）。\n\n**图 3-23.** 旋转蜘蛛资源以匹配\n\
    \n5. 在检查器窗口的管理器中，我们将六边形预制体添加为`spider_myOldOne`。\n6. 将`hexagonAnimator`脚本添加到`spider_myOldOne`上，然后点击播放。\n\
    7. 我们为蜘蛛添加一个网格渲染器（图 3-24）。\n\n**图 3-24.** 输出结果\n\n**总结**\n"
- fmt: "# Extending ML-Agents and Backpropagation in Unity C#\n\nIn this chapter,\
    \ we have gone through the details of extending `ML-Agents` in different environments\
    \ using an example.\n\nThen we moved along creating a neural network in Unity.\
    \ Using that, we did one neural network simulation followed by a change in behavior\
    \ with a different game object.\n\n## Chapter 4: Backpropagation in Unity C#\n\
    \nIn this chapter we will discuss backpropagation with Unity C# and implement\
    \ accordingly.\n\nAs we have already given a brief introduction to backpropagation\
    \ in the first chapter, in this chapter we will take it further.\n\nWe will use\
    \ an empty Unity project and then start writing a script for backpropagation.\n\
    \n### Going Further into Backpropagation\n\nBackpropagation is used to optimize\
    \ the weights so that the neural network can learn how to correctly map arbitrary\
    \ inputs to outputs.\n\nIn this section we will demonstrate backpropagation with\
    \ an example (Figure [4-1).](#index_split_000.html#p122)\n\n© Abhishek Nandy,\
    \ Manisha Biswas 2018  \nA. Nandy and M. Biswas, *Neural Networks in Unity*, \
    \ \n<https://doi.org/10.1007/978-1-4842-3673-4_4>\n\n![](index-122_1.jpg)\n\n\
    **Figure 4-1.** The Neural network that will have backpropagation\n\nThe input\
    \ from the input layer goes to the hidden layer and then to the output layer,\
    \ and from the output layer we get the actual output.\n\nNow we will backpropagate\
    \ the error from the output to the input layer so that we will be updating the\
    \ weights accordingly.\n\nLet’s work on the equation formed by getting the hidden\
    \ layer.\n\n`H1 = X1W1 + X2W2 + b`\n\nWe will apply a sigmoid activation function\
    \ to get the output from the hidden layer and also from the output layer.\n\n\
    `Sigmoid σ(x) = 1/1+ e-x`\n\n`Output H1 = 1/ 1 + e-x`\n\nLet us assign some values.\n\
    \n`X1 = 0.05` `b1 = 0.35`  \n`X2 = 0.1` `b2 = 0.60`\n\nInitial weights:\n\n`W1\
    \ = 0.15` `W5 = 0.40`  \n`W2 = 0.20` `W6 = 0.45`  \n`W3 = 0.25` `W7 = 0.50`  \n\
    `W4 = 0.30` `W8 = 0.35`\n\nTarget Values (Output):\n\n`T1` `T2`  \n`0.99`\n\n\
    Now we will calculate the forward pass.\n\n`H1 = X1W1 + X2W2 + b1`  \n`= 0.05*0.15\
    \ + 0.10*0.20 + 0.35`  \n`= 0.3775`\n\n`Out H1 = 1/1+ e-H1 = 1/ 1+e-0.3775 = 0.593269992`\n\
    \nIn the same way, we derive `Out H2 = 0.596884378`.\n\nNow we will calculate\
    \ `Y1`.\n\n`Y1 = outH1 * W5 + outH2 * W6 + b2`  \n`= 0.4*0.593269992 + 0.596884378*0.45\
    \ + 0.6`  \n`= 1.105905967`\n\n`outY1 = 1/1+e-y1 = 1/1+e-1.105905967`  \n`= 0.75136507`\n\
    \nIn the same way, we find `Y2`.\n\n`OutY2 = 0.772928465`\n\nThe formula for finding\
    \ the error follows.\n\n`Etotal = ∑ ½ (target – output)2`  \n`= 1/2(T1 – OutY1)2\
    \ + ½(T2 – outY2)2`  \n`= ½(0.01 – 0.75136507)2 + ½(0.99 – 0.772)2`  \n`= 0.274811083\
    \ + 0.023560026`  \n`= 0.298371109`\n\n`E1 = ½(T1 – outY1)2`  \n`E2 = 1/2(T2 –\
    \ outY2)2`\n\nFor calculating error we do a backward pass, which is a chained\
    \ derivative or is a partial differentiation. This is required to update the weights\
    \ accordingly.\n\nConsider updating the weight `W5`.\n\n`Error at W5 = ∂Etotal/∂W5`\n\
    \nThis is partial differentiation. In the error there is no value for `W5`. We\
    \ will use the chain rule for further splitting and getting the desired value.\n\
    \n`∂Etotal/∂W5 = ∂outY1/∂outY1 * ∂outY1/∂Y1 * ∂Y1/∂W5`\n\n`Etotal = ½(T1 – outY1)2\
    \ + ½(T2 – OutY2)2`\n\n`∂Etotal/∂OUTY1 = 2*1/2(T1 – OutY1)2-1 * -1`  \n`= -(T1\
    \ – OutY1)`  \n`= -(0.01 – 0.75136507)`  \n`∂Etotal/∂OUTY1 = 0.74136507`\n\n`OutY1\
    \ = 1/1+ e-Y1`\n\n`∂outY1/∂Y1 = outy1(1 – OutY1)`  \n`= 0.186815602`\n\n`∂Y1/∂W1\
    \ = 1* OUTH1 * W5(1-1)`  \n`= OutH1`  \n`= 0.08216704` → Change in `W5`\n\nNow\
    \ we will be updating `W5`. We will be using something called learning rate, which\
    \ is how a neural network leaves the old values and adapts to the change, so we\
    \ get the updated values for the weights we are looking for at each weight level.\n\
    \nThe learning rate always stays between 0 and 1.\n\nLearning rate assigned `η`\
    \ is `0.5` in this example.\n\n`W5 = W5 – η * ∂Etotal/∂W5`  \n`= 0.4 – 0.5 * 0.082167041`\
    \  \n`W5 = 0.35891648`\n\nIn the same way, we calculate `W6`, `W7`, and `W8`.\n\
    \nNow at the hidden layer we will update values for `W1`, `W2`, `W3`, and `W4`.\n\
    \n![](index-125_1.jpg)\n\n`∂Etotal/∂W1 = ∂Etotal/∂OutH1 * ∂outH1/∂H1 * ∂H1/∂W1`\n\
    \nIn the same way, we will calculate the total and get the weighted."
