  \n为了测试反向传播神经网络，我们需要创建一个测试器，它将是一个经过 5000 次训练的 XOR 门（图 4-7）。\n\n**图 4-7.** 创建测试器脚本\n\
  \n我们将其命名为 `tester`。XOR 将有三个值。我们有输入层、隐藏层和输出层。它将迭代超过 5000 次。\n\n```csharp\nusing System.Collections;\n\
