  ### 反向传播


  反向传播是一种系统性的方法，在深度学习中尤为著名，我们通过它计算梯度以发现误差，并匹配神经网络中的权重。


  反向传播会导致微分反向传播回网络的起点。它利用微分的链式法则进行反向传播。


