  ```


  #### 设定随机数种子，使计算结果具有确定性（这是一个良好的实践）


  ```

  np.random.seed(1)

  ```


  #### 以均值为 0 随机初始化权重


  ```

  syn0 = 2*np.random.random((3,4)) - 1

  syn1 = 2*np.random.random((4,1)) - 1

