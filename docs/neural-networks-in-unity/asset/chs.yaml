  #### 近端策略优化\n\n接下来，我们将使用 Jupyter Notebook 来实现近端策略优化。**PPO** 是一种专门用于应用强化学习方法的近端技术。我们将执行相同的操作。\n\
  \n首先，我们导入重要文件。这里我们需要 TensorFlow 来训练智能体。\n\n```\nimport numpy as np\nimport os\n\
  import tensorflow as tf\nfrom ppo.history import *\nfrom ppo.models import *\nfrom\
  \ ppo.trainer import Trainer\nfrom unityagents import *\n```\n\n然后，我们声明超参数。\n\n\
  ##### 通用参数\n\n```\nmax_steps = 50000          # 设置环境运行的最大步数。\nrun_path = \"ppo\"\
  \           # 模型和摘要统计信息的子目录名称\nload_model = False         # 是否加载已保存的模型。\ntrain_model\
  \ = True         # 是否训练模型。\nsummary_freq = 10000       # 保存训练统计信息的频率。\nsave_freq\
  \ = 50000          # 保存模型的频率。\nenv_name = \"abhi4\"         # 训练环境文件的名称。\n```\n\n\
  ##### 用于调优的算法特定参数\n\n```\ngamma = 0.99               # 奖励折扣率。\nlambd = 0.95    \
  \           # GAE 的 Lambda 参数。\ntime_horizon = 2048        # 在添加到缓冲区之前，每个智能体收集的步数。\n\
  beta = 1e-3                # 熵正则化的强度\nnum_epoch = 5              # 每批经验执行的梯度下降步数。\n\
  epsilon = 0.2              # 新旧策略概率比率的可接受阈值。\nbuffer_size = 5000         # 梯度下降前经验缓冲区的大小。\n\
  learning_rate = 3e-4       # 模型学习率。\nhidden_units = 64          # 隐藏层单元数。\nbatch_size\
  \ = 512           # 每次梯度下降更新步使用的经验数量。\n```\n\n之后，我们加载环境。\n\n```\nenv = UnityEnvironment(file_name=env_name)\n\
  print(str(env))\nbrain_name = env.brain_names[0]\n```\n\n然后，我们使用 TensorFlow 框架训练环境并创建模型图。\n\
  \n```\ntf.reset_default_graph()\n\n#### 创建 Tensorflow 模型图\nppo_model = create_agent_model(env,\
  \ lr=learning_rate, h_size=hidden_units, epsilon=epsilon, beta=beta, max_step=max_steps)\n\
  \nis_continuous = (env.brains[brain_name].action_space_type == \"continuous\")\n\
  use_observations = (env.brains[brain_name].number_observations > 0)\nuse_states\
  \ = (env.brains[brain_name].state_space_size > 0)\n\nmodel_path = './models/{}'.format(run_path)\n\
  summary_path = './summaries/{}'.format(run_path)\n\nif not os.path.exists(model_path):\n\
  \    os.makedirs(model_path)\nif not os.path.exists(summary_path):\n    os.makedirs(summary_path)\n\
  \ninit = tf.global_variables_initializer()\nsaver = tf.train.Saver()\n\nwith tf.Session()\
  \ as sess:\n    # 实例化模型参数\n    if load_model:\n        print('Loading Model...')\n\
  \        ckpt = tf.train.get_checkpoint_state(model_path)\n        saver.restore(sess,\
  \ ckpt.model_checkpoint_path)\n    else:\n        sess.run(init)\n\n    steps =\
  \ sess.run(ppo_model.global_step)\n    summary_writer = tf.summary.FileWriter(summary_path)\n\
  \    info = env.reset(train_mode=train_model)[brain_name]\n    trainer = Trainer(ppo_model,\
  \ sess, info, is_continuous, use_observations, use_states)\n\n    while steps <=\
  \ max_steps:\n        if env.global_done:\n            info = env.reset(train_mode=train_model)[brain_name]\n\
  \n        # 决定并执行一个动作\n        new_info = trainer.take_action(info, env, brain_name)\n\
  \        info = new_info\n        trainer.process_experiences(info, time_horizon,\
  \ gamma, lambd)\n\n        if len(trainer.training_buffer['actions']) > buffer_size\
  \ and train_model:\n            # 使用经验缓冲区执行梯度下降\n            trainer.update_model(batch_size,\
  \ num_epoch)\n\n        if steps % summary_freq == 0 and steps != 0 and train_model:\n\
  \            # 将训练统计信息写入 TensorBoard。\n            trainer.write_summary(summary_writer,\
  \ steps)\n\n        if steps % save_freq == 0 and steps != 0 and train_model:\n\
  \            # 保存 Tensorflow 模型\n            save_model(sess, model_path=model_path,\
  \ steps=steps, saver=saver)\n\n        steps += 1\n        sess.run(ppo_model.increment_step)\n\
  ```\n\n\n\n#### 最终保存 TensorFlow 模型\n\n`if steps != 0 and train_model:`  \n`save_model(sess,\
  \ model_path=model_path, steps=steps, saver=saver)`  \n`env.close()`  \n`export_graph(model_path,\
  \ env_name)`\n\n现在我们将导出 TensorFlow 计算图，生成的字节文件将被放入 Unity 中，以便我们观察 ML-Agents 的运行效果。\n\
  \n`export_graph(model_path, env_name)`\n\n![](img/index-71_1.jpg)\n\n![](img/index-71_2.jpg)\n\
