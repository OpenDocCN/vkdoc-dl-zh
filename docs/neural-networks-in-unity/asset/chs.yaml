  value\">一个已计算出的 TanH 值</param>\n/// <returns></returns>\npublic float TanHDer(float\
  \ value)\n{\n    return 1 - (value * value);\n}\n```\n\n```csharp\n/// <summary>\n\
  /// 输出层的反向传播\n/// </summary>\n/// <param name=\"expected\">期望的输出</param>\npublic\
  \ void BackPropOutput(float[] expected)\n{\n    // 成本函数的误差导数\n    for (int i = 0;\
