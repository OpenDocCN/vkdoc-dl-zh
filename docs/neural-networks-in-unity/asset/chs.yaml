  \ = @\"\\r\\n|\\n\\r|\\n|\\r\"; // 定义行分隔符，正则表达式的疯狂用法\n    static char[] TRIM_CHARS\
  \ = { '\\\"' };\n\n    public static List<Dictionary<string, object>> Read(string\
  \ file) // 声明方法\n    {\n```\n\n\n\n```csharp\n//Debug.Log(\"CSVReader is reading\
  \ \" + file);\n// 打印文件名，确保解析正确\n\nvar list = new List<Dictionary<string, object>>();\n\
  //声明字典列表\n\nTextAsset data = Resources.Load(file) as TextAsset;\n//加载函数参数 file 所指定的文本资源\n\
  // Debug.Log(\"Data loaded:\" + data);\n// 打印原始数据，确保解析正确\n\nvar lines = Regex.Split(data.text,\
  \ LINE_SPLIT_RE);\n//使用 LINE_SPLIT_RE 字符将 data.text 分割成多行\n\nif (lines.Length <=\
