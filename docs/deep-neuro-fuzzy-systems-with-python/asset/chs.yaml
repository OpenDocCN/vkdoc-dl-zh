  ### Π 形


  Π 形曲线有四个参数。参数 `a` 和 `d` 表示曲线的底部，而 `b` 和 `c` 表示肩部。该曲线可以定义为 Z 形和 S 形隶属函数的乘积。它在两端具有零值，中间部分上升。图
  2-15 展示了一个 Π 形隶属函数，其后是其方程。


  ![../images/479940_1_En_2_Chapter/479940_1_En_2_Fig15_HTML.jpg](img/479940_1_En_2_Fig15_HTML.jpg)


  图 2-15


  Π 形隶属函数


  ![$$ \pi \left(x;a,b,c,d\right)=\left\{\begin{array}{cc}0,&amp; x\le a\\ {}2{\left(\frac{x-a}{b-a}\right)}²,&amp;
  a\le x\le \frac{a+b}{2}\\ {}1-2{\left(\frac{x-b}{b-a}\right)}²,&amp; \frac{a+b}{2}\le
  x\le b\\ {}1&amp; b\le x\le c\\ {}1-2{\left(\frac{x-c}{d-c}\right)}²,&amp; c\le
  x\le \frac{c+d}{2}\\ {}2{\left(\frac{x-d}{d-c}\right)}²,&amp; \frac{c+d}{2}\le x\le
