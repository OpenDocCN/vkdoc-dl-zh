  trainPredict = model.predict(trainX)

  testPredict= model.predict(testX)

  predicted=np.concatenate((trainPredict,testPredict),axis=0)

  ```


  至此，基本深度学习架构的讨论结束。在进入下一章之前，先看一个 LSTM 和 GRU 的实际应用案例。该示例使用它们来预测股票（Carriage Services
  Inc.）的收盘价。代码应用于 Carriage Services Inc.股票价格数据集，你可以从 [`https://finance.yahoo.com/quote/CSV/history?p=CSV`](https://finance.yahoo.com/quote/CSV/history%253Fp%253DCSV)
  链接下载。


  ```python

  import numpy

  import pandas as pd

  from keras.models import Sequential

  from keras.layers import Dense, LSTM, GRU

  from sklearn.preprocessing import StandardScaler

  from sklearn.metrics import mean_squared_error

  import math

  ### convert an array of values into a dataset matrix

  def create_dataset(dataset, step=1):

  dataX, dataY = [], []

  for i in range(len(dataset)-step-1):

  a = dataset[i:(i+step), 0]

  dataX.append(a)

  dataY.append(dataset[i + step, 0])

  return numpy.array(dataX), numpy.array(dataY)

  ### load the dataset

  dataframe = pd.read_csv(''carriage.csv'', usecols=[1])

  dataset = dataframe.values

  dataset = dataset.astype(''float32'')

  ### standardize the dataset

  scaler = StandardScaler()

  dataset = scaler.fit_transform(dataset)

  ### split into train and test sets

  train_size = int(len(dataset) ∗ 0.90)

  test_size = len(dataset) - train_size

  train, test = dataset[0:train_size,:], dataset[train_size:len(dataset),:]

  ### Reshaping Data for the model

  step = 1

  train_X, train_Y = create_dataset(train, step)

  test_X, test_Y = create_dataset(test, step)

  train_X = numpy.reshape(train_X, (train_X.shape[0], 1, train_X.shape[1]))

  test_X = numpy.reshape(test_X, (test_X.shape[0], 1, test_X.shape[1]))

  ### create and fit the LSTM network

  model = Sequential()

  model.add(LSTM(10, input_shape=(1, step)))

  model.add(Dense(1))

  model.compile(loss=''mean_squared_error'', optimizer="adam")

  model.summary()

  model.fit(train_X, train_Y, epochs=10, batch_size=50, verbose=1)

  ### create and fit the GRU network

  model1 = Sequential()

  model1.add(GRU(10, input_shape=(1, step)))

  model1.add(Dense(1))

  model1.compile(loss=''mean_squared_error'', optimizer="adam")

  model1.summary()

  model1.fit(train_X, train_Y, epochs=10, batch_size=50, verbose=1)

  ### make predictions from LSTM

  trainPredict = model.predict(train_X)

  testPredict = model.predict(test_X)

  ### make predictions from GRU

  trainPredict1 = model1.predict(train_X)

  testPredict1 = model1.predict(test_X)

  ### invert predictions from LSTM

  trainPredict = scaler.inverse_transform(trainPredict)

  train_Y = scaler.inverse_transform([train_Y])

  testPredict = scaler.inverse_transform(testPredict)

  test_Y = scaler.inverse_transform([test_Y])

  ### invert predictions from GRU

  trainPredict1 = scaler.inverse_transform(trainPredict1)

  testPredict1 = scaler.inverse_transform(testPredict1)

  ### calculate root mean squared error for LSTM

  print("∗∗∗∗∗Results for LSTMs∗∗∗∗∗")

  trainScore = math.sqrt(mean_squared_error(train_Y[0], trainPredict[:,0]))

  print(''Error in Training data is: %.2f RMSE'' % (trainScore))

  testScore = math.sqrt(mean_squared_error(test_Y[0], testPredict[:,0]))

  print(''Error in Testing data is: %.2f RMSE'' % (testScore))

  ### calculate root mean squared error for GRU

  print("∗∗∗∗∗Results for GRUs∗∗∗∗∗")

  trainScore1 = math.sqrt(mean_squared_error(train_Y[0], trainPredict1[:,0]))

  print(''Error in Training data is: %.2f RMSE'' % (trainScore1))

  testScore1 = math.sqrt(mean_squared_error(test_Y[0], testPredict1[:,0]))

  print(''Error in Testing data is: %.2f RMSE'' % (testScore1))

  ```


  ## 总结


  本章讨论了人工神经网络。要理解模糊神经网络的概念，神经网络的基础知识是必要的。本章奠定了这个基础。你学习了典型的 ANN 如何运作，以及反向传播和前向传播在学习模式中的作用。然后，你通过卷积神经网络了解了神经网络在计算机视觉中的具体应用，并通过循环神经网络了解了其在自然语言处理中的应用。最后，你了解了
  RNN 遇到的一些缺点，以及 LSTM 和 GRU 如何尝试解决这些问题。你通过 Python 实践了所有这些架构。


  下一章将详细介绍其中一些模糊神经网络及相关算法。




  '
- "# 6. 模糊神经网络\n\n在前几章中，你看到了基于清晰输入、权重、参数等的神经网络。但在实际应用中，你并不总能获得相同类型的输入。神经网络中的*模糊性*会导致网络出现模糊信号、模糊权重等情况，此时你处理的就是*模糊神经网络*。本章将探讨模糊神经网络的不同架构及其组成要素。之后你将学习自适应神经模糊架构及其不同版本。\n\
  \n模糊神经网络用于通过神经网络从给定数据中学习，从而找到与模糊系统相关的参数。这些参数可以是模糊集、模糊规则、模糊隶属函数等。简单的模糊神经网络具有以下特性：\n\
  \n- 模糊神经网络基于数据驱动的方法，采用神经网络的技术路线。\n- 模糊神经网络可以在事先了解或不了解模糊规则的情况下构建，因为这些规则可以通过神经网络并行地从数据中学习。\n\
  - 即使参数在过程中被学习，底层模糊系统的属性始终保持不变。\n- 一个模糊系统可以表示为具有多个节点，如图 6-1 所示。\n\n![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig1_HTML.jpg](img/479940_1_En_6_Fig1_HTML.jpg)\n\
  \n图 6-1\n\n模糊神经系统\n\n1. 第一层是输入层\n2. 第二层表示模糊规则\n3. 第三层包含输出节点\n\n如果你有普通的神经网络，并对它们应用一些模糊集算子（如最大值和最小值，即\
  \ T-范数和 S-范数），它们就是一种扩展，被称为*混合神经网络*。你将在下一节学习混合神经网络。\n\n既然模糊系统能够完成任务，为什么还要使用模糊神经网络呢？模糊系统用于寻找输入域和输出域之间的关系。这由一组规则（模糊规则）来定义。但如果你无法捕捉系统中可能存在的所有规则，该怎么办？为了解决这个问题，你可以采用基于神经网络的系统，在其中根据隶属函数学习不同的规则，然后构建整个架构。\n\
  \n简而言之，可以说如果你有数据，就可以利用模糊神经网络从中找出神经模糊系统。此外，如果你已经有一个模糊系统，也可以用同样的方法对其进行增强和优化。让我们从介绍模糊神经元及其架构开始本章的内容。\n\
  \n## 模糊神经元\n\n前一章讨论了普通的神经网络。神经元是人工神经网络的核心组件，用于执行某些运算。它们将一些值作为输入，然后对这些值执行某种运算，以给出处理后的输出。\n\
  \n图 6-2 展示了一个执行基本运算的简单神经元。在图中，你可以看到有两个输入，基于这两个输入，我们定义了一个输出，称为 `y`。`w1` 和 `w2` 是我们学习的权重，基于这些权重，我们取加权和作为输出。\n\
  \n![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig2_HTML.jpg](img/479940_1_En_6_Fig2_HTML.jpg)\n\
  \n图 6-2\n\n模糊神经元\n\n这个图没有神经网络架构的任何核心组件，如隐藏层或激活函数，但它仍然可以被视为一个简单的神经网络。因此，输出可以表示为：\n\
  \n```\ny = f(w1 * x1 + w2 * x2)\n```\n\n函数 `f` 可以是任何类型。它可以为空，或者你可以添加一个激活函数，如 Sigmoid\
  \ 或 Relu。注意，我们使用的是普通的数学运算，如加法。如果你使用加法、减法等运算符，或 Sigmoid、Relu 等激活函数，这个神经网络被称为*常规神经网络*。但相反，如果你应用模糊算子，如\
  \ T-范数或 S-范数，它就被称为*混合神经网络*。它是一种模糊架构，并以经典集合的形式拥有不同的信号、权重和函数。之后你可以对输入和权重应用 T-范数和 T-余范数的不同运算。混合神经网络的一个处理单元被称为*模糊神经元*。\n\
  \n让我们看看混合神经网络架构中不同类型的模糊神经元。图 6-3 和 6-4 展示了这些专门针对 T-范数和 T-余范数运算的神经元。\n\n![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig4_HTML.jpg](img/479940_1_En_6_Fig4_HTML.jpg)\n\
  \n图 6-4\n\nT-余范数运算\n\n![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig3_HTML.jpg](img/479940_1_En_6_Fig3_HTML.jpg)\n\
  \n图 6-3\n\nT-范数运算\n\n在图 6-3 中，你可以看到它先执行 T-余范数运算，然后执行 T-范数运算。图 6-4 则正好相反。这种将一个连续函数的输出应用于另一个连续函数的特定运算属于*模糊神经元*的范畴。因此，第一个图（图\
  \ 6-3）表示一个*与-模糊神经元*，第二个图（图 6-4）是一个*或-模糊神经元*，其中：\n\n```\nY_AND = T(S(w1, x1), S(w2,\
  \ x2), ..., S(wn, xn))\n```\n\n```\nY_OR = S(T(w1, x1), T(w2, x2), ..., T(wn, xn))\n\
  ```\n\n你在前几章已经看到，模糊系统由隶属函数组成。与-或或-模糊神经元基本上是对从隶属函数获得的隶属度值进行运算。由于你必须学习图中 `w1` 和 `w2`\
  \ 的值，它们将直接与系统的输出相关。这意味着，如果权重非常高，那么在或神经元的情况下，输入将强烈影响输出。在与神经元的情况下，输入将微弱影响输出。以下是模糊神经网络中使用的其他一些神经元：\n\
  \n- 蕴含-或神经元\n- 关和蔡的神经元\n  - 关蔡的最大神经元\n  - 关蔡的最小神经元\n\n\n\n让我们回顾一下这些神经元是如何运作的。图 6-5\
  \ 展示了一个蕴含-或神经元。该神经元在输入 `x` 和权重 `w` 之间应用了蕴含算子。之后，它在输出上应用了三角余模算子。\n\n在图 6-5 所示的神经元中，你得到了一个蕴含运算。\n\
  \n![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig5_HTML.jpg](img/479940_1_En_6_Fig5_HTML.jpg)\n\
  \n图 6-5\n\n蕴含-或神经元\n\n接下来是一系列 K&C 神经元（见图 6-6）。\n\n![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig6_HTML.jpg](img/479940_1_En_6_Fig6_HTML.jpg)\n\
  \n图 6-6\n\nK&C 神经元\n\n关和蔡的模糊神经元结构有些复杂。首先，对于每个输入 `x`，我们将其乘以学习到的权重 `w`。对所有输入节点执行此操作后，将它们聚合起来并转换为单个输入。接下来，找到该输入的状态，可以用以下公式表示：\n\
  \n![$$ s=f\\left(z-\\theta \\right) $$](img/479940_1_En_6_Chapter_TeX_Equd.png)\n\
  \n在这个公式中，你使用 `f` 作为选定的激活函数，而 `θ` 代表激活阈值。最后，通过对状态应用一个函数来得到输出。让我们将这个概念应用于两种类型的 K&C\
  \ 模糊神经元：K&C 最大神经元（见图 6-7）和最小神经元（见图 6-8）。\n\n![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig8_HTML.jpg](img/479940_1_En_6_Fig8_HTML.jpg)\n\
  \n图 6-8\n\nK&C 最小神经元\n\n![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig7_HTML.jpg](img/479940_1_En_6_Fig7_HTML.jpg)\n\
  \n图 6-7\n\nK&C 最大神经元\n\nK&C 最大神经元使用 T-余模运算，而 K&C 最小神经元使用 T-模运算。\n\n你将在本章中继续学习关于模糊神经元的知识。\n\
  \n## 模糊推理神经网络\n\n仅从名称上，你就可以说，如果将模糊推理系统和神经网络的概念结合起来，就诞生了 FINN（模糊推理神经网络）。在详细分析 FINN\
  \ 之前，你需要先了解它们的类型。基本上，FINN 可以分为以下几类：\n\n*   协作式 FINN\n*   并发式 FINN\n*   集成/融合式 FINN\n\
  \n当你拥有训练数据，并使用神经网络来寻找隶属函数和模糊规则时，这属于协作式 FINN 的范畴（见图 6-9）。\n\n![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig9_HTML.jpg](img/479940_1_En_6_Fig9_HTML.jpg)\n\
  \n图 6-9\n\n协作式 FINN\n\n当你无法直接测量输入变量时，则使用并发式 FINN 而非协作式 FINN。在这个过程中，神经网络持续帮助 FIS，以使最终系统始终处于最佳状态。图\
  \ 6-10 展示了一个并发式 FINN，其中输入数据被馈送到神经网络，该网络有助于确定最佳的隶属函数，以便后续由模糊系统处理。将神经网络与模糊系统结合并不会优化模糊系统，但会提高系统的整体性能。\n\
  \n![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig10_HTML.jpg](img/479940_1_En_6_Fig10_HTML.jpg)\n\
  \n图 6-10\n\n并发式 FINN\n\n集成式 FINN 用于寻找 FIS 的参数。假设你有一个共享的公共数据库，用于存储知识表示和数据结构。这个数据库在神经网络和模糊推理系统之间共享。神经网络和模糊推理系统各自都有一些缺点。但是，当你将这两个概念结合起来时，就得到了集成式\
  \ FINN，从而产生效率更高的架构。\n\n现在你已经了解了模糊推理神经网络的类别，是时候看看该领域中使用的一些最流行的 FINN 了。我们将讨论以下架构：\n\
  \n*   模糊联想记忆\n*   曼达尼集成式 FINN\n*   高木-菅野集成式 FINN\n\n## 模糊联想记忆\n\n在学习模糊联想记忆之前，你必须先了解*联想记忆*这个名称的含义。任何联想记忆的主要任务是存储输入和输出模式，以及它们之间的关系和映射。其主要任务是在提供不完整或有噪声的输入模式时，找到输出模式。\n\
  \n联想记忆可以用以下公式表示：\n\n![$$ a=\\left\\{\\left({x}_i,{y}_i\\right)\\ |\\ i=1,2,3\\dots\
  \ n\\right\\} $$](img/479940_1_En_6_Chapter_TeX_Eque.png)\n\n![$$ G\\left({x}_i\\\
  right)={y}_i $$](img/479940_1_En_6_Chapter_TeX_Equf.png)\n\n在前面的公式中，`a` 表示一个有限的关联集合，其中\
  \ `x` 是输入模式，`y` 是输出模式。`G(x)` 是一个定义 `x` 和 `y` 之间映射的函数。与联想记忆相关的一些术语如下：\n\n*   基本记忆集\n\
  *   基本记忆\n*   自联想记忆\n*   异联想记忆\n*   记录阶段\n*   联想映射\n*   神经联想记忆\n*   模糊联想记忆\n\n所有存在的关联，即\
  \ `a = {(x[i], y[i]) | i = 1,2,3…n}`，被称为*基本记忆集*，而每个关联 `(x[i] 和 y[i])` 被称为*基本记忆*。当关联与自身相关时，称为*自联想记忆*，但如果不同，则称为*异联想记忆*。因此，`a\
  \ = {(x[i], x[i]) | i = 1,2,3…n}` 是自联想记忆，而 `a = {(x[i], y[i]) | i = 1,2,3…n}` 是异联想记忆。\n\
  \n寻找函数 `G(x)` 的过程称为*记录阶段*，而 `G` 称为*联想映射*。当联想映射是一个神经网络时，称为*神经联想记忆*；当它是一个模糊神经网络时，称为*模糊联想记忆*。在模糊联想记忆中，输入和输出模式是模糊集。\n\
  \n通常，模糊联想记忆（FAM）是一种在系统中存储规则的模糊推理神经网络。这条规则是一个具有以下格式的模糊规则：\n\n*   “如果 x 是 `x[k]`，那么\
  \ y 是 `y[k]`”\n\n模糊联想记忆可以分为两种类型：\n\n*   最大-最小模糊联想记忆\n*   最大-乘积模糊联想记忆\n\n由于模糊联想记忆是一种模糊神经网络，其主要组成部分是模糊神经元。这两种\
  \ FAM 的区别在于神经元的类型。如果一个 FAM 包含一个 Max-C[M] 神经元，则称为最大-最小 FAM；但如果它包含一个 Max-C[P] 神经元，则称为最大-乘积\
  \ FAM。一个 Max-C 模糊神经元可以用以下公式表示：\n\n![$$ y=\\left[{\\bigvee}_{j=1}^nC\\left({w}_j,{x}_j\\\
  right)\\right]\\vee \\theta $$](images/479940_1_En_6_Chapter/479940_1_En_6_Chapter_TeX_Equg.png)\n\
  \n在前面的公式中，`C` 代表模糊合取运算，而 `θ` 表示偏置。如果该神经元应用了最大值运算，则称为 Max-C[M] 神经元；而如果应用了乘积运算，则称为\
  \ Max-C[P] 神经元。\n\n\n\n## Mamdani 集成 FINN\n\nMamdani 集成 FINN（也称为 Mamdani 集成神经模糊系统）使用反向传播方法来学习隶属函数的参数。在这种方法中，你通过最小化成本函数来寻找参数的最佳值。回顾一下，第\
  \ 5 章讨论了反向传播方法。由于该方法利用了反向传播的概念，因此它属于监督学习方法的范畴。\n\n图 6-11 展示了 Mamdani 集成 FINN 的结构。\n\
  \n![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig11_HTML.jpg](img/479940_1_En_6_Fig11_HTML.jpg)\n\
  \n图 6-11\n\nMamdani 集成 FINN\n\nMamdani 集成 FINN 的架构由五层组成：\n\n-   **第 1 层：** 该层由直接输入组成，因此被称为*输入层*。该层中的每个节点都包含直接传递到下一层节点的各个输入。\n\
  -   **第 2 层：** 这也被称为*模糊化层*。在这里，你将来自输入层的清晰输入转换为模糊集。它试图找到每个输入值在模糊集中的隶属度。使用模糊聚类方法来定义每个输入变量的隶属函数的数量和类型。在整个反向传播过程中，隶属函数的数量和类型将不断变化，以微调整个系统。\n\
  -   **第 3 层：** 该层用于定义规则库的前件。因此，该层被称为*规则前件层*。该层中的每个节点都使用 T-范数运算。该层的输出是相应模糊规则的触发强度。\n\
  -   **第 4 层：** 该层被称为*规则后件层*。顾名思义，它用于确定每个规则前件的后件。它有助于定义每个前件对输出值的隶属度。该层中的节点数量等于前一层中的规则数量。\n\
  -   **第 5 层：** 这是最终的*去模糊化层*。在这一层中，所有规则后件使用 T-协范数运算进行组合，然后使用去模糊化方法将其转换为清晰输出。\n\n\
  ## Takagi Sugeno 集成 FINN\n\n在这种方法中，传播分两步进行。这两个步骤需要结合反向传播和最小均方估计。第一种方法用于微调隶属函数，而第二种方法用于寻找参数。图\
  \ 6-12 展示了 Takagi Sugeno FINN 的示意图。\n\n![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig12_HTML.jpg](img/479940_1_En_6_Fig12_HTML.jpg)\n\
  \n图 6-12\n\nTakagi Sugeno 集成 FINN\n\n第 1 层是输入层。它将清晰输入直接传递到第二层。第 2 层将接收到的清晰输入转换为模糊集。第\
  \ 3 层寻找模糊规则的前件。这三层的工作方式与 Mamdani FINN 完全相同。\n\n第 4 层用于确定每条规则的触发强度，然后对其进行归一化。这是通过找到每条规则的触发强度，然后将其除以所有规则触发强度之和来完成的。这可以用以下公式表示：\n\
  \n![$$ \\underset{\\_}{w_i}=\\frac{w_i}{\\sum_{i=1}^n{w}_i} $$](img/479940_1_En_6_Chapter_TeX_Equh.png)\n\
  \n第 5 层用于使用最小二乘法确定规则的后件。这是通过以下公式完成的：\n\n![$$ {\\underset{\\_}{w}}_i{f}_i={\\underset{\\\
  _}{w}}_i\\left({p}_i{x}_1+{q}_i{x}_2+{r}_i\\right) $$](img/479940_1_En_6_Chapter_TeX_Equi.png)\n\
  \n在这个方程中，`p`、`q`、`i` 代表参数集。\n\n第 6 层用于聚合来自前一层的所有输出。这可以表示为：\n\n![$$ Output=\\frac{\\\
  sum_{i=1}^n{w}_i{f}_i}{\\sum_i^n{w}_i} $$](img/479940_1_En_6_Chapter_TeX_Equj.png)\n\
  \n## 自适应神经模糊推理系统\n\n第 4 章讨论了 Sugeno 和 Tsukamoto 模糊推理系统。使用自适应神经模糊推理系统（ANFIS），你可以表示\
  \ Sugeno 和 Tsukamoto 两种系统。这就是为什么它被称为*自适应网络*，因为通过一个网络，你可以通过微小的更改来表示多个网络。\n\n你也可以使用\
  \ ANFIS 表示 Mamdani FIS，但这需要复杂的数学方法，超出了本书的范围。本章讨论使用 ANFIS 的 Sugeno 和 Tsukamoto 方法。为了便于理解，示例将使用一个具有两个输入和一个输出的系统。\n\
  \n\n\n### 表示 Sugeno FIS 的 ANFIS\n\n如先前章节所述，Sugeno 模糊推理系统（FIS）的规则采用以下格式：\n\n- 如果\
  \ `x` 是 `A1` 且 `y` 是 `B1`，则 `f1 = p1x+q1y+r1`\n- 如果 `x` 是 `A2` 且 `y` 是 `B2`，则 `f2\
  \ = p2x+q2y+r2`\n\n图 6-13 是使用 Sugeno 方法对这两条规则进行图形化表示的结果。第 3 章详细讨论了这一概念。\n\n![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig13_HTML.jpg](img/479940_1_En_6_Fig13_HTML.jpg)\n\
  \n图 6-13：Sugeno 解模糊化\n\n图 6-14 展示了表示相同 Sugeno 架构的 ANFIS 结构。\n\n![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig14_HTML.jpg](img/479940_1_En_6_Fig14_HTML.jpg)\n\
  \n图 6-14：基于 Sugeno 的 ANFIS\n\n我们将在以下各节中逐层介绍此架构。\n\n#### 第 1 层：隶属函数层\n\n该层是每个输入的隶属函数的组合。查看规则可知，输入\
  \ `x` 和 `y` 由隶属函数 `A1`、`A2`、`B1` 和 `B2` 定义。这些函数可以表示为：\n\n- `A1 = μA1`\n- `A2 = μA2`\n\
  - `B1 = μB1`\n- `B2 = μB2`\n\n#### 第 2 层：前件层\n\n在该层中，您需要定义规则的前件。所有到达该层的信号通过求其乘积来生成输出。这可以表示为：\n\
  \n- `w[1] = μA1 * μB1`\n- `w[2] = μA2 * μB2`\n\n在该层中，您需要使用 T-Norm 算子。\n\n#### 第\
  \ 3 层：归一化层\n\n在此处，您需要对前件层的输出进行归一化，这也可以称为*归一化触发强度*。为了归一化上一层的输出，您需要将其除以总触发强度。这可以表示如下：\n\
  \n![$$ {\\underset{\\_}{w}}_1={w}_1/\\left({w}_1+{w}_2\\right) $$](img/479940_1_En_6_Chapter_TeX_Equk.png)\n\
  \n![$$ {\\underset{\\_}{w}}_2={w}_2/\\left({w}_1+{w}_2\\right) $$](img/479940_1_En_6_Chapter_TeX_Equl.png)\n\
  \n#### 第 4 层：后件层\n\n在该层中，您需要处理规则的后件。在 Sugeno 中，您已经看到了规则的后件。在该层中，您必须生成类似的输出。\n\n\
  ![$$ {\\underset{\\_}{w}}_1{f}_1={\\underset{\\_}{w}}_1\\left({p}_1x+{q}_1x+{r}_1\\\
  right) $$](img/479940_1_En_6_Chapter_TeX_Equm.png)\n\n![$$ {\\underset{\\_}{w}}_2{f}_2={\\\
  underset{\\_}{w}}_2\\left({p}_2x+{q}_2x+{r}_2\\right) $$](img/479940_1_En_6_Chapter_TeX_Equn.png)\n\
  \n在前面的等式中，`p`、`q`、`r` 表示参数集。\n\n#### 第 5 层：聚合层\n\n一旦您获得了包含不同参数集的后件层输出，在该层中，您需要找到上一层所有输出的聚合。此操作可以用以下等式表示：\n\
  \n![$$ {\\sum}_i^n{\\underset{\\_}{w}}_i{f}_i=\\frac{\\sum_i^n{\\underset{\\_}{w}}_i{f}_i}{\\\
  sum_i^n{\\underset{\\_}{w}}_i} $$](img/479940_1_En_6_Chapter_TeX_Equo.png)\n\n###\
  \ 表示 Tsukamoto FIS 的 ANFIS\n\n在 Tsukamoto FIS 中，您得到如下后件：\n\n![$$ f=\\frac{w_1{f}_1+{w}_2{f}_2}{w_1+{w}_2}\
  \ $$](img/479940_1_En_6_Chapter_TeX_Equp.png)\n\n图 6-15 和 6-16 展示了表示 Tsukamoto FIS\
  \ 及其对应 ANFIS 解模糊化过程的示意图。\n\n![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig16_HTML.jpg](img/479940_1_En_6_Fig16_HTML.jpg)\n\
  \n图 6-16：基于 Tsukamoto 的 ANFIS\n\n![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig15_HTML.jpg](img/479940_1_En_6_Fig15_HTML.jpg)\n\
  \n图 6-15：Tsukamoto 解模糊化\n\n如图 6-16 所示，该系统与基于 Sugeno 的 ANFIS 类似，区别仅在于它使用加权隶属函数而非线性隶属函数。因此，所有层与基于\
  \ Sugeno 的示例完全相同，但在最后一层，解模糊化方程发生了变化。\n\n让我们看看如何使用 Python 应用 ANFIS。在 Python 中，有一个名为\
  \ `anfis` 的包，您可以用它来应用 ANFIS 的概念。数据集包含三列。前两列定义了清晰输入，最后一列定义了它们的模糊化值。此示例使用 ANFIS 来预测这些模糊化值，并检查模型的误差。您可以通过编写以下命令来安装\
  \ `anfis` 包：\n\n```\npip install anfis\n```\n\n以下是应用于虚拟数据集的代码：\n\n```\n#### 导入必要的库\n\
  import anfis\nfrom anfis.membership import membershipfunction, mfDerivs\nimport\
  \ numpy\ntraining_data = numpy.loadtxt(\"training.txt\", usecols=[1,2,3])\nX = training_data\
  \ [:,0:2]\nY = training_data [:,2]\n#### 定义隶属函数\nmf = [[['gaussmf',{'mean':0.,'sigma':1.}],['gaussmf',{'mean':-1.,'sigma':2.}],['gaussmf',{'mean':-4.,'sigma':10.}],['gaussmf',{'mean':-7.,'sigma':7.}]],\
  \ [['gaussmf',{'mean':1.,'sigma':2.}],['gaussmf',{'mean':2.,'sigma':3.}],['gaussmf',{'mean':-2.,'sigma':10.}],['gaussmf',{'mean':-10.5,'sigma':5.}]]]\n\
  #### 使用隶属函数更新模型\nmfc = membershipfunction.MemFuncs(mf)\n#### 创建 ANFIS 模型对象\nanf\
  \ = anfis.ANFIS(X, Y, mfc)\n#### 拟合 ANFIS 模型\nanf.trainHybridJangOffLine(epochs=20)\n\
  #### 打印输出\nprint(round(anf.consequents[-1][0],6))\nprint(round(anf.consequents[-2][0],6))\n\
  print(round(anf.fittedValues[9][0],6))\n#### 绘制模型性能图\nanf.plotErrors()\nanf.plotResults()\n\
  ```\n\n图 6-17 展示了在每次迭代中如何定义更好的隶属函数，这意味着每次迭代的误差都在减小。\n\n![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig17_HTML.jpg](img/479940_1_En_6_Fig17_HTML.jpg)\n\
  \n图 6-17：每个 epoch 的误差减少\n\n图 6-18 展示了预测值与实际数据的对比情况。\n\n![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig18_HTML.jpg](img/479940_1_En_6_Fig18_HTML.jpg)\n\
  \n图 6-18：拟合线\n\n## 总结\n\n本章探讨了模糊神经网络的一些架构。您了解了简单的 FINN 如何由模糊神经元组成，然后探索了各种类型的神经元。接着，您探索了各种\
  \ FINN 架构，从模糊联想记忆到 Sugeno 集成 FINN。最后，您了解了自适应神经模糊推理系统（ANFIS）的工作原理，并查看了其使用 Python\
  \ 的应用。\n\n下一章将探讨与模糊神经网络相关的一些高级概念。\n\n"
- "# 7. 高级模糊网络\n\n本章将探讨一些高级模糊网络。图 7-1 展示了一个经典的神经模糊系统。但在深入之前，了解构建这些系统所用的一些核心组件非常重要。本章首先讨论模糊聚类方法。然后转向遗传算法，最后回顾属于高级模糊网络领域的最常用架构。\n\
  \n![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig1_HTML.jpg](img/479940_1_En_7_Fig1_HTML.jpg)\n\
  \n图 7-1：神经模糊推理系统\n\n本章首先讨论模糊聚类——其需求及其应用。\n\n\n\n## 模糊聚类\n\n聚类是一种根据数据中存在的相似性，将数据分组到几个类别中的方法。这些类别被称为*簇*（见图\
  \ 7-2）。\n\n![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig2_HTML.jpg](img/479940_1_En_7_Fig2_HTML.jpg)\n\
  \n图 7-2 聚类\n\n机器学习使用不同的聚类方法，例如 K-Means 聚类、层次聚类、DBScan 等。类似地，当我们谈论模糊网络时，也有诸如模糊 C-Means\
  \ 聚类、高斯应用寻找聚类等方法。本章将详细讨论模糊 C-Means 聚类。\n\n### 模糊 C-Means 聚类\n\n假设我有一组数据点 `X`，我想根据某些相似性度量将它们放入\
  \ `k` 个簇中。以集合的形式，假设数据如下所示：\n\n![$$ X=\\left\\{{x}_1,{x}_2,{x}_3,\\dots {x}_m\\right\\\
  } $$](img/479940_1_En_7_Chapter_TeX_Equa.png)\n\n要使用 C-Means 聚类方法将它们分成 `k` 个簇，首先要做的是从数据中随机选取\
  \ `k` 个点。假设这 `k` 个点是质心（见图 7-3）。\n\n![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig3_HTML.jpg](img/479940_1_En_7_Fig3_HTML.jpg)\n\
  \n图 7-3 C-Means 聚类\n\n然后，使用曼哈顿距离或欧几里得距离，你会发现所有剩余的点都更接近某个簇的质心点。这样你就得到了第一组分配给 `k`\
  \ 个簇的数据。但你是通过随机选择 `k` 个点并称它们为*质心*开始的。实际上，它们并非真正的质心。因此，你需要继续这个过程来纠正这个假设。\n\n####\
  \ 欧几里得距离\n\n任意两点之间的标准直线距离称为*欧几里得距离*。要计算这个距离，可以使用以下公式：\n\n![$$ d=\\sqrt{{\\left({q}_1-{p}_1\\\
  right)}²+{\\left({q}_2-{p}_2\\right)}²} $$](img/479940_1_En_7_Chapter_TeX_Equb.png)\n\
  \n下一步，你需要找到你所定义簇的实际质心。一旦找到，一些点可能会失去其原始簇的归属。与它们最初所属的簇相比，它们现在可能更接近另一个簇。因此，你需要根据新的质心重新分配这些点。这将帮助你获得一个包含新成员点的修订后的\
  \ `k` 个簇。然后，再次找到新的质心并重复这个过程。你不断重复这个过程，直到新的簇不再导致点从一个簇移动到另一个簇。\n\n让我们从数学角度审视整个算法：\n\
  \n1.  定义需要聚类的 `N` 个数据点：\n\n    ![$$ {x}_i, where\\ i=1,2,3\\dots N $$](img/479940_1_En_7_Chapter_TeX_Equc.png)\n\
  \n2.  假设要创建的簇的数量由 `C` 表示，其中 2 ≤ `C` ≤ `N`\n\n3.  定义由 `f` 表示的簇模糊度，其中 `f` > 1\n\n\
  4.  定义一个维度为 `N` × `C` × `M` 的隶属度矩阵 `U`。该矩阵应按照以下条件随机定义：\n    1.  `U`[`ijm`] ∈ [0,1]，并且\n\
  \    2.  ![$$ \\sum \\limits_{i=1}^n{U}_{ijm}=0 $$](img/479940_1_En_7_Chapter_TeX_IEq1.png)\
  \ 对于每个 `i` 和固定的 `m` 值。\n\n5.  确定簇中心。这可以通过使用以下公式完成：\n\n    ![$$ {CC}_{jm}=\\frac{\\\
  sum_{i=1}^N{U^f}_{ijm}{x}_{im}}{\\sum \\limits_{i=1}^N{U^f}_{ijm}} $$](img/479940_1_En_7_Chapter_TeX_Equd.png)\n\
  \n    其中 `j` 代表簇，`m` 代表维度。\n\n6.  计算欧几里得距离。你可以通过以下公式找到这个距离：\n\n    ![$$ {D}_{ijm}=\\\
  left\\Vert \\left({x}_{im}-{C}_{jm}\\right)\\right\\Vert $$](img/479940_1_En_7_Chapter_TeX_Eque.png)\n\
  \n    ![$$ where\\ i\\ represents\\ data\\ point,j\\ represents\\ cluster, and\\\
  \ m\\ represents\\ dimension $$](img/479940_1_En_7_Chapter_TeX_Equf.png)\n\n7. \
  \ 找到欧几里得距离后，你需要用新值更新步骤 4 中定义的隶属度矩阵。这可以通过使用以下公式完成：\n\n    ![$$ {U}_{ijm}=\\frac{1}{\\\
  sum \\limits_{c=1}^D{\\left(\\frac{D_{ijm}}{D_{icm}}\\right)}^{\\frac{2}{f-1}}}\
  \ $$](img/479940_1_En_7_Chapter_TeX_Equg.png)\n\n    ![$$ We\\ apply\\ the\\ above\\\
  \ equation\\ only\\ for\\ the\\ data\\ points\\ where\\ {D}_{ijm}&gt;0\\. If\\ {D}_{ijm}=0\\\
  \ then\\ we\\ have\\ full\\ membership\\ and\\ the\\ value\\ initialized\\ is\\\
  \ 1.0 $$](img/479940_1_En_7_Chapter_TeX_Equh.png)\n\n8.  重复步骤 1 到 5，直到 `U` 的值 <\
  \ ∈，其中 ∈ 是终止标准。\n\n#### 模糊 C-Means 聚类的应用\n\n你可以将模糊 C-Means 聚类用于以下用例和领域：\n\n*   图像处理时，特别是对图像内部的对象进行聚类。也用于基于图像的分割。\n\
  *   与群体智能结合使用。\n*   与遥感结合使用。\n\n#### 模糊 C-Means 的 Python 实现\n\n以下代码包含两组数据——训练数据和测试数据。借助训练数据，你可以找到簇的最终质心，之后应使用测试数据来检查新数据点被分配到哪个簇。此示例使用名为\
  \ `fuzzycmeans` 的 Python 包。你可以使用以下命令安装它：\n\n```\npip install fuzzycmeans\n```\n\n\
  如果该包在执行时出现问题，你可以克隆 GitHub 仓库，然后将两个 Python 文件——`fuzzy_clustering.py` 和 `visualization.py`——复制到你的主目录，然后运行代码。在运行代码之前，请确保安装了\
  \ `bokeh` 包，因为它是此模糊 C-Means 包的依赖项。你可以通过编写以下命令来安装它：\n\n```\npip install bokeh\n```\n\
  \n此包是对 James C. Bezdek、Robert Ehrlich 和 William Full 的论文“FCM: The Fuzzy C-Means\
  \ Clustering Algorithm”的实现。你也可以通过访问 GitHub 仓库 [`https://github.com/oeg-upm/fuzzy-c-means.git`](https://github.com/oeg-upm/fuzzy-c-means.git)\
  \ 来查看和克隆源代码。\n\n此示例使用 `AirlinesCluster` 数据集。你可以在本书的 GitHub 仓库中找到此数据集。或者，你也可以从 Kaggle\
  \ 网站下载它。该示例仅使用两列——`Balance` 和 `BonusMiles`——来开始聚类。如果你愿意，可以使用所有列并可视化输出。\n\n```\n\
  import pandas as pd\nimport numpy as np\nimport numpy as np\nimport logging\nfrom\
  \ fuzzy_clustering import FCM\nfrom visualization import draw_model_2d\nfrom sklearn\
  \ import preprocessing\ndataset = pd.read_csv(\"AirlinesCluster.csv\") #Importing\
  \ the airlines data\ndataset1 = dataset.copy() #Making a copy so that original data\
  \ remains unaffected\ndataset1 = dataset1[[\"Balance\", \"BonusMiles\"]][:500] #Selecting\
  \ only first 500 rows for faster computation\ndataset1_standardized = preprocessing.scale(dataset1)\
  \ #Standardizing the data to scale it between the upper and lower limit of 1 and\
  \ 0\ndataset1_standardized = pd.DataFrame(dataset1_standardized)\nfcm.set_logger(tostdout=False)\
  \ #Telling the package class to stop the unnecessary output\nfcm = FCM(n_clusters=5)\
  \ #Defining k=5\nfcm.fit(dataset1_standardized) #Training on data\npredicted_membership\
  \ = fcm.predict(np.array(dataset1_standardized)) #Testing on same data\ndraw_model_2d(fcm,\
  \ data=np.array(dataset1_standardized), membership=predicted_membership) #Visualizing\
  \ the data\n```\n\n\n\n## 模糊自适应共振理论\n\n在模糊 C 均值聚类（Fuzzy C-Means Clustering）中，你看到基于点之间的距离可以将它们分组到簇中。但如果你能控制一个簇中点之间的相似度呢？模糊自适应共振理论（Fuzzy\
  \ Adaptive Resonance Theory，`Fuzzy ART`）提供了控制簇内数据点之间相似度的能力。因此，`Fuzzy ART`是通过控制簇之间的相似度来寻找最佳簇的另一种方法。\n\
  \n大量数据被输入到`Fuzzy ART`模型中。这些数据包含许多模式，`Fuzzy ART`试图从中提取相似性。它基于训练模型的数据，从新数据中找到最佳的自适应簇。在这个模型中需要注意的一点是，尽管你在输入数据上训练它，但它不像其他模糊架构那样包含任何隐藏层。\n\
  \n一个`Fuzzy ART`架构主要包含两个组件：\n\n*   注意力（Attention）\n*   定向（Orientation）\n\n*注意力*帮助`Fuzzy\
  \ ART`根据数据定义它认为最佳的簇或类别。*定向*帮助它确定所有找到的簇是否有效。这意味着它帮助`Fuzzy ART`接受或拒绝由注意力定义的类别。这就是为什么它被称为*自适应架构*。自适应这个名称的另一个原因是它适应新数据的能力。无论从训练数据中学到了什么模式，新数据都可以被分配到任何一个簇中。但如果新数据与任何现有簇都不相似，`Fuzzy\
  \ ART`有能力创建一个与现有簇完全不同的新簇。\n\n`Fuzzy ART`用于聚类和分类问题，它接受的输入数据可以是离散的或连续的。与`Fuzzy ART`架构相关的一些特性是：\n\
  \n*   整个架构只有一个权重。因此，它更易于管理和更新。\n*   它可以处理二进制和非二进制数据。\n*   它包含以下重要的超参数：\n    *  \
  \ *警戒阈值（Vigilance threshold）*：\n        这个阈值通常决定`Fuzzy ART`的记忆。它有助于确定最终的簇数量。它用于执行注意力操作。\n\
  \    *   *选择参数（Choice parameter）*：\n        用于确定保留哪个簇以及不应验证哪个簇。如果超过阈值，则选择该簇；否则，它被拒绝。它用于执行定向操作。\n\
  \    *   *学习率（Learning rate）*：\n        用于确定输入数据中的模式。\n\n图 7-4 展示了基本的`Fuzzy ART`架构。\n\
  \n![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig4_HTML.jpg](img/479940_1_En_7_Fig4_HTML.jpg)\n\
  \n**图 7-4**  \n`Fuzzy ART`\n\n如你所见，`Fuzzy ART`中有三个层。最后一层被称为*输出层*，它与第二层全连接。正如你可能从早期关于神经网络的章节中回忆的那样，全连接层是指每个节点都与前一层或后一层中的所有节点相连的层。因此，在`Fuzzy\
  \ ART`中，`F2`层和`F1`层是全连接的。在第一层中，你接收`m`维输入，并在将其传递到下一层之前，将其与其补码相乘。这使得`F1`层中的节点数量变为`2m`维。最后，输出层持续与第二层通信，以决定形成的簇是否有效。如果有效，结果为`1`；否则，结果为`0`。\n\
  \n![$$ {y}_j=\\left\\{\\begin{array}{c}1,\\kern0.5em When\\ node\\ is\\ active\\\
  \ in\\ Output\\ layer\\\\ {}0,\\kern0.5em Otherwise\\end{array}\\right. $$](img/479940_1_En_7_Chapter_TeX_Equi.png)\n\
  \n接下来的部分将更详细地介绍每一层的操作。\n\n### 第 1 层：`F[0]`（定向层）\n\n这一层接收输入的模糊模式，找到其补码，然后将原始输入和补码输入都传递到下一层。此操作可以用以下方程概括：\n\
  \n![$$ I=\\left(a,{a}_c\\right)=\\left({a}_1,{a}_2,\\dots, {a}_n,1-{a}_1,1-{a}_2,\\\
  dots, 1-{a}_n\\right) $$](img/479940_1_En_7_Chapter_TeX_Equj.png)\n\n这一层中还存在一个重置节点（Reset\
  \ node），它接收来自所有层的输入，并帮助转换接收到的输入模式。\n\n### 第 2 层：`F[1]`和`F[2]`（注意力层）\n\n由于补码输入也被传递到`F[1]`层，因此存在的节点数量是输入层的两倍，由`2n`个节点表示。`F[2]`层包含`m`个节点。这两层通过连接权重连接，由`W[i]`和`w[j]`表示。`W[i]`表示从`F[1]`到`F[2]`的连接，而`w[j]`表示从`F[2]`到`F[1]`的连接。这些权重可以用以下数学方程表示：\n\
  \n![$$ {W}_i={W}_1,{W}_2,\\dots, {W}_{2n} $$](img/479940_1_En_7_Chapter_TeX_Equk.png)\n\
  \n![$$ {w}_j={w}_1,{w}_2,\\dots, {w}_{2n} $$](img/479940_1_En_7_Chapter_TeX_Equl.png)\n\
  \n在`F[2]`层中有两种节点：已提交节点（committed）和未提交节点（uncommitted）。*已提交节点*是指权重矩阵的值应为`1`的节点；否则，它被称为未提交节点。这可以用以下方程表示：\n\
  \n![$$ node=\\left\\{\\ \\begin{array}{c} committed,\\kern0.5em if\\ {w}_j={w}_j(0)=\\\
  left(1,1,\\dots, 1\\right)\\\\ {} uncommitted,\\kern8.75em otherwise\\end{array}\\\
  \ \\right\\} $$](img/479940_1_En_7_Chapter_TeX_Equm.png)\n\n`F[2]`层的输入可以定义为：\n\n\
  ![$$ t(i)=\\left\\{\\begin{array}{c}\\raisebox{1ex}{$\\left|I\\right|$}\\!\\left/\
  \ \\!\\raisebox{-1ex}{${a}_x+{M}_x$}\\right.,\\kern5.5em for\\ an\\ uncommted\\\
  \ node\\\\ {}\\raisebox{1ex}{$\\left|I\\wedge {w}_j\\right|$}\\!\\left/ \\!\\raisebox{-1ex}{${a}_x+\\\
  left|{w}_j\\right|$}\\right.,\\kern3.25em for\\ a\\ committed\\ node\\end{array}\\\
  right\\} $$](img/479940_1_En_7_Chapter_TeX_Equn.png)\n\n`Fuzzy ARTMAP`（见图 7-5）是`Fuzzy\
  \ ART`的高级应用。它是一种监督学习方法，可用于不同的应用。它包含两个`Fuzzy ART`组件，称为`Fuzzy ART[x]`和`Fuzzy ART[y]`，而第三个组件包含`ART`间关系。介绍`Fuzzy\
  \ ARTMAP`超出了本书的范围，图 7-5 展示了`Fuzzy ARTMAP`的架构供你参考。\n\n![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig5_HTML.jpg](img/479940_1_En_7_Fig5_HTML.jpg)\n\
  \n**图 7-5**  \n`Fuzzy ARTMAP`\n\n### `Fuzzy ART`的应用\n\n*   用于寻找模式识别\n*   用于处理时间序列数据\n\
  *   用于监控产品质量\n\n### `Fuzzy ART`的 Python 实现\n\n`IRIS`是由 Edgar Anderson 收集的数据集。它量化了鸢尾花的形态变异。根据它们的变异，这些花被分为三类。本示例使用`Fuzzy\
  \ ART`来查看形态数据，并根据相似性对鸢尾花进行聚类。\n\n该算法相当复杂，因此在代码仓库中，你可以找到`FuzzyART.py`文件。只需将其上传到你的`home`文件夹中，然后运行以下代码。\n\
  \n```python\nfrom functools import partial\nimport numpy as np\nimport FuzzyART\
  \ as f\nimport sklearn.datasets as ds\nl1_norm = partial(np.linalg.norm, ord=1,\
  \ axis=-1)#Used for regularization so that we can penalize the parameters that are\
  \ not important\nif __name__ == '__main__':\niris = ds.load_iris()#load the dataset\
  \ in the python environment\ndata = iris['data'] / np.max(iris['data'], axis=0)#standardize\
  \ the dataset\nnet = f.FuzzyART(alpha=0.5, rho=0.5) #Initialize the FuzzyART Hyperparameters\n\
  net.train(data, epochs=100) #Train on the data\nprint(net.test(data).astype(int))\
  \ #Print the Cluster Results\nprint(iris['target']) #Match the cluster results\n\
  ```\n\n\n\n## 遗传算法\n\n*遗传算法*是一类遵循生物自然选择及其遗传学过程的搜索算法。自然选择的一般原理指出，最适应的个体（通过生存）被选中以产生下一代的子代。\n\
  \n当你定义一个搜索问题时，首先要确定几个用于做出搜索决策的变量。这些变量被称为*决策变量*。第一步涉及找到这些变量，然后将它们编码为有限长度的字母字符串。\n\
  \n一旦你将这些变量表示为编码字符串的格式，它们就被称为*染色体*。字符串中的单个字母被称为*基因*，而它们存储的值被称为*等位基因*。例如，假设一个人想从一个地方去另一个地方。他可以走的不同路线就是决策变量。他可以用字符串对它们进行编码，然后这些路线可能被称为*染色体*。沿途的各个城市可能被称为*基因*。\n\
  \n一旦你需要找出不同类型的解，你可以将它们表示为一个集合。这个集合被称为*候选解*集。它是不同染色体的集合。当你拥有所有这些解后，下一步是决定哪些是最好的，哪些应该避免。遗传算法使用不同的数学模型和计算机模拟来区分好的和坏的染色体。\n\
  \n在一个候选解集中存在一个理想的染色体数量。如果数量太少，你会得到一个不合格的解。但如果数量太多，可能会导致不必要的计算。图 7-6 展示了基于遗传算法的搜索过程的流程图。\n\
  \n![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig6_HTML.jpg](img/479940_1_En_7_Fig6_HTML.jpg)\n\
  \n图 7-6\n\n遗传算法步骤\n\n*初始化*步骤涉及随机生成一个候选解集。在第二步，*评估*中，你尝试为每个染色体找到一个适应度值，然后将其分配给确定的值。接下来的四个步骤用于使用不同方法在候选解集中生成更多染色体。当你选择具有高适应度值的染色体并复制它们时，这就是*选择*步骤。当你组合多个染色体以获得更好的染色体时，这个步骤被称为*重组*。当你尝试修改当前候选解的属性时，这被称为*变异*。最后，当新解替换旧解时，这被称为*替换*。你将重复这个过程，直到达到特定的阈值。\n\
  \n### 选择\n\n选择中最著名的方法之一是*锦标赛方法*。一旦你有了一个候选解集，你从中选择`k`个成员，并在它们之间进行一场锦标赛。锦标赛后最适应的成员被认为是被选中的。这个过程会重复多次以获得最佳成员。个体参与锦标赛的机会被称为*选择压力*。锦标赛方法的完整算法如图\
  \ 7-7 所示，并可通过以下几点总结：\n\n![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig7_HTML.jpg](img/479940_1_En_7_Fig7_HTML.jpg)\n\
  \n图 7-7\n\n锦标赛选择\n\n1. 从种群中选择`k`个个体，并在它们之间进行一场锦标赛。\n2. 从这`k`个个体中选择最佳个体。\n3. 重复步骤\
  \ 1 和 2，直到获得所需的种群规模。\n\n### 重组\n\n在重组中，你使用*交叉方法*来找到最适应的成员。使用*单点交叉*方法（见图 7-8），你首先选择两个染色体。你随机选择两个染色体中的任意一点，然后交换该点之后的基因。*两点交叉*（见图\
  \ 7-9）涉及随机选择两个染色体中的两个点。随后交换这两个点之间的部分。\n\n![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig9_HTML.jpg](img/479940_1_En_7_Fig9_HTML.jpg)\n\
  \n图 7-9\n\n两点交叉\n\n![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig8_HTML.jpg](img/479940_1_En_7_Fig8_HTML.jpg)\n\
  \n图 7-8\n\n单点交叉\n\n除了这两种方法，还有均匀交叉和算术交叉。在均匀交叉中，两个父代之间的组合是随机的。这意味着任何特征都可以随机地从任一父代中选择。在算术交叉中，可以对两个父代应用任何数学运算来产生子代。图\
  \ 7-10 和 7-11 展示了具有二元运算的均匀交叉和算术交叉。\n\n![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig11_HTML.jpg](img/479940_1_En_7_Fig11_HTML.jpg)\n\
  \n图 7-11\n\n算术交叉\n\n![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig10_HTML.jpg](img/479940_1_En_7_Fig10_HTML.jpg)\n\
  \n图 7-10\n\n均匀交叉\n\n### 变异\n\n如前所述，在变异中，你尝试改变染色体的属性以检查它们是否变得更适应。在*翻转*（*位翻转变异*）方法中，基因被改变为其相反值。如果一个染色体包含\
  \ 0 和 1，那么 0 被翻转为 1，反之亦然。第二种方法是*互换*（*交换变异*），你在一个染色体中选择任意两个点，然后交换这些位置上的基因。在*反转*（*倒位变异*）中，你选择一个随机点，该点之后的基因被反转，就像翻转方法一样。如果从整个染色体中，选择一个基因子集然后随机打乱，这被称为*混洗变异*。图\
  \ 7-12 到 7-15 说明了这些变异的概念。\n\n![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig15_HTML.jpg](img/479940_1_En_7_Fig15_HTML.jpg)\n\
  \n图 7-15\n\n混洗变异\n\n![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig14_HTML.jpg](img/479940_1_En_7_Fig14_HTML.jpg)\n\
  \n图 7-14\n\n倒位变异\n\n![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig13_HTML.jpg](img/479940_1_En_7_Fig13_HTML.jpg)\n\
  \n图 7-13\n\n交换变异\n\n![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig12_HTML.jpg](img/479940_1_En_7_Fig12_HTML.jpg)\n\
  \n图 7-12\n\n位翻转变异\n\n### 替换\n\n如果子代更适应，你随机选择种群中两个较不适应的父代，并用子代替换它们。这被称为*随机替换*。这可以细分为*弱父代替换*和*双亲替换*。在弱父代替换中，只替换较弱的父代，而在后一种方法中，两个父代都被替换。\n\
  \n### 停止\n\n最后，当涉及到停止遗传算法时，你可以使用几种方法。当生成的子代数量超过阈值时，你可以停止该过程。你也可以基于经过的时间阈值来停止。最退化的过程是基于适应度值停止。这意味着只有当子代的适应度没有发生任何重大变化时，算法才会停止。\n\
  \n现在你已经学习了讨论高级模糊架构所需的基础知识，让我们继续本章，讨论第一个架构——模糊自适应学习控制网络（FALCON）。\n\n\n\n## 模糊自适应学习控制网络（FALCON）\n\
  \n你在前一章学习了自适应神经模糊推理系统。它利用神经网络的优势，基于模糊输入来预测模糊输出。`FALCON` 则利用遗传算法和模糊聚类的强大能力，从输入中学习模式，然后预测输出。\n\
  \n为了自动构建一个 `FALCON` 网络，你需要使用一种混合算法，它被称为 `FALCON-GA`（FALCON 遗传算法）。要构建该网络，`FALCON-GA`\
  \ 需要以下步骤：\n\n- 模糊聚类\n- 遗传算法\n- 反向传播\n\n本节使用模糊聚类方法，通过训练数据在输入和输出空间中寻找聚类。然后，它使用遗传算法，通过分析第一步中找到的输入和输出聚类之间的关联，来寻找模糊规则。最后，反向传播方法将对输入和输出变量的隶属函数进行微调。图\
  \ 7-16 展示了一个使用 `FALCON-GA` 生成的 `FALCON` 网络。\n\n图 7-16 展示了林正坚和林清灯（1997）论文中提出的一个 `FALCON`\
  \ 架构。该架构由五层组成。第一层是输入层。第二层定义了来自前一层的输入节点的隶属函数。第三层包含一个基于前两层推导出的模糊规则库。第四层有助于推导模糊规则的后件。\n\
  \n![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig16_HTML.jpg](img/479940_1_En_7_Fig16_HTML.jpg)\n\
  \n图 7-16\n\n提出的 `FALCON`（林正坚 & 林清灯. (1997)，一种基于 ART 的模糊自适应学习控制网络。IEEE 模糊系统汇刊，5(4)，477–496.\
  \ doi:10.1109/91.649900）\n\n最后，在第五层，你得到输出，然后将其与期望输出进行比较，并反馈回去。\n\n## 用于数据分类的神经模糊系统（NEFCLASS）\n\
  \n`NEFCLASS` 是模糊感知器的一个特殊类别。它总共有三层。层与层之间是权重传递发生的地方。这些权重是模糊集，而在隐藏层中，每个节点代表一个模糊规则。输出层解释类别的模式。\n\
  \n模型在输入数据上进行训练，以找到将相似模式分离到多个类别中的规则。因此，`NEFCLASS` 是一种监督学习方法，通过反向传播来最小化误差。\n\n`NEFCLASS`\
  \ 规则库遵循以下结构：\n\n![$$ 如果\\ {x}_1\\ 是\\ {\\mu}_1\\ 且\\ {x}_2\\ 是\\ {\\mu}_2\\dots\
  \ 且\\ {x}_n\\ 是\\ {\\mu}_n $$](img/479940_1_En_7_Chapter_TeX_Equo.png)\n\n![$$ 那么\\\
  \ \\left({x}_1,{x}_2,\\dots {x}_n\\right)\\ 属于\\ 类别\\ i $$](img/479940_1_En_7_Chapter_TeX_Equp.png)\n\
  \n`NEFCLASS` 可用于从训练数据中学习这些规则的结构，然后学习其隶属函数的形状。对于每个输入 `x[i]`，可以有 `q[i]` 个模糊集和 `k`\
  \ 条规则。`NEFCLASS` 的输出可以表示为：\n\n![$$ \\varphi (x)=\\left\\{{c}_1,{c}_2,\\dots, {c}_n\\\
  right\\} $$](img/479940_1_En_7_Chapter_TeX_Equq.png)\n\n图 7-17 提供了一个 `NEFCLASS`\
  \ 结构的示例。它借助五条模糊规则将两个输入划分为两个输出类别。\n\n![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig17_HTML.jpg](img/479940_1_En_7_Fig17_HTML.jpg)\n\
  \n图 7-17\n\n一个 `NEFCLASS` 结构示例\n\n## 模糊推理软件（FINEST）\n\n`FINEST` 工具用于构建基于模糊知识的系统，由国际模糊工程实验室（LIFE）开发。`FINEST`\
  \ 包含一个称为 `单元` 的小型处理组件（见图 7-18）。单元用于表示知识。它们的主要任务是接收输入，以特定方式处理输入，并产生一些输出。以下是 `FINEST`\
  \ 中基于用途的单元列表：\n\n![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig18_HTML.jpg](img/479940_1_En_7_Fig18_HTML.jpg)\n\
  \n图 7-18\n\n一个 `单元` 的视图\n\n- 规则单元\n- 函数单元\n- 外部单元\n- 内存单元\n- 复合单元\n\n### 规则单元\n\n\
  规则单元包含一条或多条模糊规则。它们用于对输入数据进行推理。结果通过规则单元的输出推理进行输出。\n\n### 函数单元\n\n该单元使用 `LISP` 进行处理。它接收输入数据，对其进行评估，然后输出评估值。它有一些可配置的参数用于微调任务。函数单元的主要用途是用于去模糊化过程。\n\
  \n### 外部单元\n\n该单元是一个可执行的 `UNIX` 文件。它是一个不可配置的组件。所执行的计算以 `UNIX` 进程的形式进行。\n\n### 内存单元\n\
  \n该单元用于存储系统的状态。它也用于存储中间结果。不同的单元与该单元通信并提取数值。\n\n### 复合单元\n\n当多个单元组合在一起时，它们被称为 `复合单元`（见图\
  \ 7-19）。它们用于构建一个完整的层次化系统。\n\n![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig19_HTML.jpg](img/479940_1_En_7_Fig19_HTML.jpg)\n\
  \n图 7-19\n\n一个 `复合单元` 的结构（Tano, S., Miyoshi, T., Kato, Y., Oyama, T., Arnould, T.,\
  \ Bastian, A., & Umano, M. (n.d.). 模糊推理软件-FINEST：概述与应用示例，doi:10.1109/fuzzy.1995.409810）\n\
  \n`FINEST` 可以解决的一些问题如下：\n\n- 有时规则可能表达模糊的含义。\n- 找到最佳且合适的蕴涵算子很困难。\n- 组合不同过程的推理结果很困难。\n\
  - 自动进行调优很困难。\n\n`FINEST` 可用于开发模糊系统，或用于量化句子的模糊含义。\n\n## 总结\n\n本章探讨了模糊神经网络的一些高级应用。讨论了一些当前研究领域正在进行的工作。还研究了遗传算法，它与模糊神经网络相结合，构建出了一些非常优秀的模型。本章还介绍了这些算法在\
  \ Python 中的一些应用。\n\n## 索引\n\n### A\n\n自适应神经模糊推理系统（ANFIS） Sugeno FIS 聚合 前件 架构 后件\
