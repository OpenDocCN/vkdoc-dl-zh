    # 激活函数


    隐藏层或输出层中的每个神经元都有其自身的激活函数。这有助于判断特定神经元的输出是否重要。系统已学习到的权重会与输入神经元的值相乘。然后，会加上一个偏置值。输出值基于激活函数，该函数决定了重要性。当输出层中有一个激活函数时，它会接收所有先前应用了激活函数的神经元的输出，并通过执行加权求和来给出最终答案。激活函数有多种类型，其中一些包括：


    *   Sigmoid

    *   Tanh

    *   Softmax

    *   ReLU

    *   Leaky ReLU


    ## Sigmoid 激活函数


    Sigmoid 激活函数具有 S 形曲线。其取值范围在 0 到 1 之间。由于其上下限分别为 0 和 1，它最广泛地用于二分类问题。以下是 Sigmoid
    激活函数的公式和曲线（见图 5-4），以及 Python 实现。


    ![$$ Sigmoid(x)=\frac{1}{1+{e}^{-x}} $$](img/479940_1_En_5_Chapter_TeX_Equd.png)


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig4_HTML.jpg](img/479940_1_En_5_Fig4_HTML.jpg)


    图 5-4 Sigmoid 激活函数


    ```

    import numpy as np

    def sigmoid(x):

    return 1 / (1 + np.exp(-x))

    ```


    ## Tanh 激活函数


    `Tanh` 也被称为双曲正切函数。该函数的形状也像字母 S，但其取值范围是从 -1 到 +1。当您需要考虑负输出时，会使用此函数。通常，建议在隐藏层中使用
    `Tanh`，因为它允许不同层的输出也能给出负值。输出层的输出可以传递给 Sigmoid 函数以获得正值，但在中间层，应该从数据中捕获更多信息，而 `Tanh`
    为您提供了一种实现方式。以下是 `Tanh` 激活函数的公式和曲线（见图 5-5），以及 Python 实现。


    ![$$ \mathit{\tanh}(x)=\frac{2}{1+{e}^{-2x}} $$](img/479940_1_En_5_Chapter_TeX_Eque.png)


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig5_HTML.jpg](img/479940_1_En_5_Fig5_HTML.jpg)


    图 5-5 Tanh 激活函数


    ```

    import numpy as np

    def tanh(x):

    return np.tanh(x)

    ```


    ## Softmax 激活函数


    当处理二分类问题时，您会使用 Sigmoid 函数。但如果您有多个类别，则应改用 Softmax 激活函数。Softmax 函数的输出是每个类别相对于所有类别的概率。具有最大概率的类别被认为是预测类别。以下是
    Softmax 函数的公式和曲线（见图 5-6），以及 Python 实现。


    ![$$ softmax(x)=\frac{e^i}{\varSigma\ {e}^i} $$](img/479940_1_En_5_Chapter_TeX_Equf.png)


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig6_HTML.jpg](img/479940_1_En_5_Fig6_HTML.jpg)


    图 5-6 Softmax 激活函数


    ```

    import numpy as np

    def softmax(x):

    exps = np.exp(x)

    return exps / np.sum(exps, axis=1).reshape(-1,1)

    ```


    ## 修正线性单元 (ReLU) 激活函数


    `ReLU` 激活函数的下限为 0，但没有上限。这意味着如果加权和是整数或自然数，则输出将返回确切的值。但如果输出小于 0，则输出将被转换为 0。它可以用以下公式和图
    5-7 中的曲线表示。


    ![$$ ReLU(x)=\mathit{\max}\ \left(0,x\right) $$](img/479940_1_En_5_Chapter_TeX_Equg.png)


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig7_HTML.jpg](img/479940_1_En_5_Fig7_HTML.jpg)


    图 5-7 ReLU 激活函数


    以下是 Python 实现。


    ```

    import numpy as np

    def relu(x):

    return 1.0*(x>0)

    ```


    ## Leaky ReLU 激活函数


    这与 `ReLU` 完全相同，但它的下限并非严格为 0，值可以小于 0，以便解决“神经元坏死问题”（接下来讨论）。您取一个值 *α* 并将其乘以原始值，这样新值就可以小于
    0。以下是 Leaky `ReLU` 的公式和曲线（见图 5-8），以及 Python 实现。


    ![$$ LeakyReLU(x)=\left\{x, if\ x&gt;0\ \right\} $$](img/479940_1_En_5_Chapter_TeX_Equh.png)


    ![$$ \left\{\alpha x, otherwise\right\} $$](img/479940_1_En_5_Chapter_TeX_Equi.png)


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig8_HTML.jpg](img/479940_1_En_5_Fig8_HTML.jpg)


    图 5-8 Leaky ReLU 激活函数


    ```

    import numpy as np

    def leaky_relu(x, leaky_slope):

    d=np.zeros_like(x)

    d[X0]=1

    return d

    ```


    以下是这些 Python 方法的应用：


    ```

    import numpy as np

    #定义 x 的虚拟值

    x = np.linspace(-np.pi, np.pi, 12)

    #计算激活函数输出

    sigmoid_output = sigmoid(x)

    tanh_output = tanh(x)

    softmax_output = softmax(x)

    relu_output = relu(x)

    leaky_relu_output = leaky_relu(x)

    #打印输出

    print(sigmoid_output)

    print(tanh_output)

    print(softmax_output)

    print(relu_output)

    print(leaky_relu_output)

    ```


    ### 什么是神经元坏死问题？


    一旦系统学习了每个神经元的权重和偏置，并且您将 `ReLU` 作为激活函数，它通常会输出与输入相同的值。但由于任何小于 0 的值都会被转换为 0，神经元可能无法区分不同的输入。这个问题被称为神经元坏死问题。


    这会使神经元实际上处于死亡状态。即使是负值的斜率也为零。如果您继续前进而不注意这个问题，最终神经网络的大部分将变得毫无作用。这个问题通常发生在学习率过高时。通过降低学习率或更改激活函数（例如改为
    Leaky-`ReLU`），您可以解决这个问题。


    # 多层人工神经网络


    有多种不同类型的多层人工神经网络。本章讨论最相关的几种。多层人工神经网络的通用架构如图 5-9 所示。


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig9_HTML.jpg](img/479940_1_En_5_Fig9_HTML.jpg)


    图 5-9 典型的多层人工神经网络架构


    以下各节将回顾这些人工神经网络：


    *   卷积神经网络

    *   循环神经网络

    *   长短期记忆网络

    *   门控循环单元

