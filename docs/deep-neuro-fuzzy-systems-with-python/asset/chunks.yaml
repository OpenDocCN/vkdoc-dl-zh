    e^(-(3-1))![$$ {\displaystyle \begin{array}{c}1/1+\\ {}\left(3,1\right),\end{array}}
    $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_IEq6.png)e^(-(3-2))(3,
    2)}


