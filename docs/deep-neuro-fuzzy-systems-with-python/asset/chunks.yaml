- fmt: '### Support


    The support of a membership function for a Fuzzy Set is defined as that region
    of the universe that is characterized by nonzero membership in Set A. It is a
    set of all the points whose membership value is greater than 0, as represented
    in Figure [2-2](#479940_1_En_2_Chapter.xhtml#Fig2). Mathematically, it can be
    represented as follows:


    ![$$ Support(A)=\left\{\left(x,\mu A(x)\right)\vee \mu A(x)&gt;0\right\} $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equd.png)


    ![../images/479940_1_En_2_Chapter/479940_1_En_2_Fig2_HTML.jpg](images/479940_1_En_2_Chapter/479940_1_En_2_Fig2_HTML.jpg)


    Figure 2-2


    Support, core, and boundary


    ### Core


    The core of a membership function for a Fuzzy Set is defined as that region of
    the universe that is characterized by complete and full membership in Set A. It
    is a set of all the points whose membership value is equal to 1, as represented
    in Figure [2-2](#479940_1_En_2_Chapter.xhtml#Fig2). Mathematically, it can be
    represented as:


    ![$$ Core(A)=\left\{\left(x,\mu A(x)\right)\vee \mu A(x)=1\right\} $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Eque.png)


    ### Boundary


    The boundaries of a membership function for a Fuzzy Set are defined as that region
    of the universe containing elements that have a nonzero membership but not complete
    membership. It is a set of all the points whose membership value is greater than
    0, but less than 1, as represented in Figure [2-2](#479940_1_En_2_Chapter.xhtml#Fig2).
    Mathematically, it can be represented as follows:


    ![$$ 0&lt;\mu (x)&lt;1 $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equf.png)


    ### Crossover


    The crossover points of a membership function are defined as the elements in the
    universe for which a Fuzzy Set has values equal to 0.5. A set of all the points
    whose membership value is equal to 0.5 is called the crossover of Fuzzy Set A:


    ![$$ Crossover(A)=\left\{\left(x,\mu A(x)\right)\vee \mu A(x)=0.5\right\} $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equg.png)


    ### Normality


    A normal Fuzzy Set is one whose membership function has at least one element `x`
    in the universe whose membership value is unity (see Figure [2-3](#479940_1_En_2_Chapter.xhtml#Fig3)).
    In other words, if you find the core of a set and it’s not an empty set, you say
    that the Fuzzy Set A is normal:


    ![$$ Core(A)\ne \varnothing \to AisNormal $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equ1.png)


    ![../images/479940_1_En_2_Chapter/479940_1_En_2_Fig3_HTML.jpg](images/479940_1_En_2_Chapter/479940_1_En_2_Fig3_HTML.jpg)


    Figure 2-3


    Normality of a Fuzzy Set


    ### Fuzzy Singleton


    If a Fuzzy Set has only one single point, having a membership value of 1, it is
    called a Fuzzy Singleton:


    ![$$ \left|A\right|=\left|\left\{\left(x,\mu A(x)\right)\vee \mu A(x)=1\right\}\right|
    $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equh.png)


    ### *α*– Cut


    An alpha cut of Fuzzy Set A is a set containing all the values with membership
    values greater than or equal to alpha:


    ![$$ A\alpha =\left\{x\in X\vee \mu A(x)\ge \alpha \right\} $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equi.png)


    ### Strong *α*– Cut


    A string alpha cut of Fuzzy Set A is a set containing all the values having membership
    values greater than alpha:


    ![$$ A\alpha =\left\{x\in X\vee \mu A(x)&gt;\alpha \right\} $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equj.png)


    ### Convexity


    A convex Fuzzy Set is described by a membership function whose membership values
    are strictly monotonically increasing, or whose membership values are strictly
    monotonically decreasing, or whose membership values are strictly monotonically
    increasing and then strictly monotonically decreasing, with increasing values
    for elements in the universe. In simpler terms, a Fuzzy Set is called convex if
    and only if it follows this rule:


    ![$$ {\mu}_A\left(\lambda x+\left(1-\lambda \right)y\right)\ge \min \left\{{\mu}_A(x),{\mu}_A(y)\right\}
    $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equk.png)


    ### Bandwidth


    If you have a set A, which is normal and convex, and if you find its crossover
    set and select two unique points, the distance between the two is called the bandwidth
    set. Simply speaking, for a normal and convex Fuzzy Set, the bandwidth is defined
    as the distance between the two unique crossover points:


    ![$$ Bandwidth(A)=\left|x2\hbox{--} x1\right|\to {\mu}_A(x1)={\mu}_A(x2)=0.5 $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equl.png)


    ### Symmetry


    If the membership function of a Fuzzy Set A satisfies the following criteria,
    at a point c, it is called a symmetric set (see Figure [2-4](#479940_1_En_2_Chapter.xhtml#Fig4)).


    ![$$ {\mu}_A\left(x+c\right)={\mu}_A\left(c\hbox{--} x\right)\forall x\in X $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equm.png)


    ![../images/479940_1_En_2_Chapter/479940_1_En_2_Fig4_HTML.jpg](images/479940_1_En_2_Chapter/479940_1_En_2_Fig4_HTML.jpg)


    Figure 2-4


    Symmetry of Fuzzy Set


    ### Open Left


    A Fuzzy Set is open left if (see Figure [2-5](#479940_1_En_2_Chapter.xhtml#Fig5)):


    ![$$ A\iff {\mu}_A(x)=1\wedge {\mu}_A(x)=0 $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equn.png)


    ### Open Right


    A Fuzzy Set is open right if (see Figure [2-5](#479940_1_En_2_Chapter.xhtml#Fig5)):


    ![$$ A\iff {\mu}_A(x)=0\wedge {\mu}_A(x)=1 $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equo.png)


    ### Closed


    A Fuzzy Set is closed if (see Figure [2-5](#479940_1_En_2_Chapter.xhtml#Fig5)):


    ![$$ A\iff {\mu}_A(x)={\mu}_A(x)=0 $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equp.png)


    ![../images/479940_1_En_2_Chapter/479940_1_En_2_Fig5_HTML.jpg](images/479940_1_En_2_Chapter/479940_1_En_2_Fig5_HTML.jpg)


    Figure 2-5


    Open Left, closed, and open right sets


    ## Types of Membership Functions


    The first chapter covered the different types of membership functions in brief.
    This section discusses them in detail. A membership function is used to define
    Fuzziness present in a problem statement. This means that you don’t have to represent
    all the values in a sample space using discrete numbers. Sometimes a member can
    be a decimal representing its degree of membership.


    For example, consider the penalty kick concept in soccer. In discrete terms, the
    kick can be either 1 (a full kick) or 0 (no kick). In real life, that is not the
    case. The kick speed depends not only on the mindset of the shooter, but also
    on the anticipation of where the goalkeeper will move.


    In this situation, the shooter decides the speed of the kick as well as the direction
    in which he aims. Speed also cannot be defined just by two discrete values, 0
    and 1. The speed will range from 0 to 1; 0 being no speed and 1 being full speed.
    Suppose the shooter wants to aim for the top-right corner of the goal post. In
    this situation, the major decision is finding the most accurate speed that can
    give the ball a perfect swing. Too fast and the ball will leave the post, while
    too slow might help the goalkeeper anticipate the direction or prevent the ball
    from swinging properly. Hence, instead of going for 1, the shooter may go for
    0.7 from a Fuzzy Set, which according to him is the ideal speed to kick the ball.
    This concept in a Fuzzy Set is represented by the membership functions.


    The next section discusses the different types of membership functions that are
    used.'
  raw: '#### Support


    The support of a membership function for a Fuzzy Set is defined as that region
    of the universe that is characterized by nonzero membership in Set A. It is a
    set of all the points whose membership value is greater than 0, as represented
    in Figure [2-2](#479940_1_En_2_Chapter.xhtml#Fig2). Mathematically, it can be
    represented as follows:


    ![$$ Support(A)=\left\{\left(x,\mu A(x)\right)\vee \mu A(x)&gt;0\right\} $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equd.png)


    ![../images/479940_1_En_2_Chapter/479940_1_En_2_Fig2_HTML.jpg](images/479940_1_En_2_Chapter/479940_1_En_2_Fig2_HTML.jpg)


    Figure 2-2


    Support, core, and boundary


    #### Core


    The core of a membership function for a Fuzzy Set is defined as that region of
    the universe that is characterized by complete and full membership in Set A. It
    is a set of all the points whose membership value is equal to 1, as represented
    in Figure [2-2](#479940_1_En_2_Chapter.xhtml#Fig2). Mathematically, it can be
    represented as:


    ![$$ Core(A)=\left\{\left(x,\mu A(x)\right)\vee \mu A(x)=1\right\} $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Eque.png)


    #### Boundary


    The boundaries of a membership function for a Fuzzy Set are defined as that region
    of the universe containing elements that have a nonzero membership but not complete
    membership. It is a set of all the points whose membership value is greater than
    0, but less than 1, as represented in Figure [2-2](#479940_1_En_2_Chapter.xhtml#Fig2).
    Mathematically, it can be represented as follows:


    ![$$ 0&lt;\mu (x)&lt;1 $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equf.png)


    #### Crossover


    The crossover points of a membership function are defined as the elements in the
    universe for which a Fuzzy Set has values equal to 0.5\. A set of all the points
    whose membership value is equal to 0.5 is called the crossover of Fuzzy Set A:


    ![$$ Crossover(A)=\left\{\left(x,\mu A(x)\right)\vee \mu A(x)=0.5\right\} $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equg.png)


    #### Normality


    A normal Fuzzy Set is one whose membership function has at least one element *x*
    in the universe whose membership value is unity (see Figure [2-3](#479940_1_En_2_Chapter.xhtml#Fig3)).
    In other words, if you find the core of a set and it’s not an empty set, you say
    that the Fuzzy Set A is normal:


    ![$$ Core(A)\ne \varnothing \to AisNormal $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equ1.png)


    ![../images/479940_1_En_2_Chapter/479940_1_En_2_Fig3_HTML.jpg](images/479940_1_En_2_Chapter/479940_1_En_2_Fig3_HTML.jpg)


    Figure 2-3


    Normality of a Fuzzy Set


    #### Fuzzy Singleton


    If a Fuzzy Set has only one single point, having a membership value of 1, it is
    called a Fuzzy Singleton:


    ![$$ \left|A\right|=\left|\left\{\left(x,\mu A(x)\right)\vee \mu A(x)=1\right\}\right|
    $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equh.png)


    #### *α*– Cut


    An alpha cut of Fuzzy Set A is a set containing all the values with membership
    values greater than or equal to alpha:


    ![$$ A\alpha =\left\{x\in X\vee \mu A(x)\ge \alpha \right\} $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equi.png)


    #### Strong *α*– Cut


    A string alpha cut of Fuzzy Set A is a set containing all the values having membership
    values greater than alpha:


    ![$$ A\alpha =\left\{x\in X\vee \mu A(x)&gt;\alpha \right\} $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equj.png)


    #### Convexity


    A convex Fuzzy Set is described by a membership function whose membership values
    are strictly monotonically increasing, or whose membership values are strictly
    monotonically decreasing, or whose membership values are strictly monotonically
    increasing and then strictly monotonically decreasing, with increasing values
    for elements in the universe. In simpler terms, a Fuzzy Set is called convex if
    and only if it follows this rule:


    ![$$ {\mu}_A\left(\lambda x+\left(1-\lambda \right)y\right)\ge \min \left\{{\mu}_A(x),{\mu}_A(y)\right\}
    $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equk.png)


    #### Bandwidth


    If you have a set A, which is normal and convex, and if you find its crossover
    set and select two unique points, the distance between the two is called the bandwidth
    set. Simply speaking, for a normal and convex Fuzzy Set, the bandwidth is defined
    as the distance between the two unique crossover points:


    ![$$ Bandwidth(A)=\left|x2\hbox{--} x1\right|\to {\mu}_A(x1)={\mu}_A(x2)=0.5 $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equl.png)


    #### Symmetry


    If the membership function of a Fuzzy Set A satisfies the following criteria,
    at a point c, it is called a symmetric set (see Figure [2-4](#479940_1_En_2_Chapter.xhtml#Fig4)).


    ![$$ {\mu}_A\left(x+c\right)={\mu}_A\left(c\hbox{--} x\right)\forall x\in X $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equm.png)


    ![../images/479940_1_En_2_Chapter/479940_1_En_2_Fig4_HTML.jpg](images/479940_1_En_2_Chapter/479940_1_En_2_Fig4_HTML.jpg)


    Figure 2-4


    Symmetry of Fuzzy Set


    #### Open Left


    A Fuzzy Set is open left if (see Figure [2-5](#479940_1_En_2_Chapter.xhtml#Fig5)):


    ![$$ A\iff {\mu}_A(x)=1\wedge {\mu}_A(x)=0 $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equn.png)


    #### Open Right


    A Fuzzy Set is open right if (see Figure [2-5](#479940_1_En_2_Chapter.xhtml#Fig5)):


    ![$$ A\iff {\mu}_A(x)=0\wedge {\mu}_A(x)=1 $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equo.png)


    #### Closed


    A Fuzzy Set is closed if (see Figure [2-5](#479940_1_En_2_Chapter.xhtml#Fig5)):


    ![$$ A\iff {\mu}_A(x)={\mu}_A(x)=0 $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equp.png)


    ![../images/479940_1_En_2_Chapter/479940_1_En_2_Fig5_HTML.jpg](images/479940_1_En_2_Chapter/479940_1_En_2_Fig5_HTML.jpg)


    Figure 2-5


    Open Left, closed, and open right sets


    ### Types of Membership Functions


    The first chapter covered the different types of membership functions in brief.
    This section discusses them in detail. A membership function is used to define
    Fuzziness present in a problem statement. This means that you don’t have to represent
    all the values in a sample space using discrete numbers. Sometimes a member can
    be a decimal representing its degree of membership.


    For example, consider the penalty kick concept in soccer. In discrete terms, the
    kick can be either 1 (a full kick) or 0 (no kick). In real life, that is not the
    case. The kick speed depends not only on the mindset of the shooter, but also
    on the anticipation of where the goalkeeper will move.


    In this situation, the shooter decides the speed of the kick as well as the direction
    in which he aims. Speed also cannot be defined just by two discrete values, 0
    and 1\. The speed will range from 0 to 1; 0 being no speed and 1 being full speed.
    Suppose the shooter wants to aim for the top-right corner of the goal post. In
    this situation, the major decision is finding the most accurate speed that can
    give the ball a perfect swing. Too fast and the ball will leave the post, while
    too slow might help the goalkeeper anticipate the direction or prevent the ball
    from swinging properly. Hence, instead of going for 1, the shooter may go for
    0.7 from a Fuzzy Set, which according to him is the ideal speed to kick the ball.
    This concept in a Fuzzy Set is represented by the membership functions.


    The next section discusses the different types of membership functions that are
    used.'
  trans: '

    ### 支撑集


    模糊集隶属函数的支撑集定义为论域中属于集合 A 且隶属度非零的区域。它是所有隶属度值大于 0 的点的集合，如图 2-2 所示。数学上可表示为：


    ![$$ Support(A)=\left\{\left(x,\mu A(x)\right)\vee \mu A(x)&gt;0\right\} $$](img/479940_1_En_2_Chapter_TeX_Equd.png)


    ![../images/479940_1_En_2_Chapter/479940_1_En_2_Fig2_HTML.jpg](img/479940_1_En_2_Fig2_HTML.jpg)


    图 2-2


    支撑集、核与边界


    ### 核


    模糊集隶属函数的核定义为论域中完全且彻底属于集合 A 的区域。它是所有隶属度值等于 1 的点的集合，如图 2-2 所示。数学上可表示为：


    ![$$ Core(A)=\left\{\left(x,\mu A(x)\right)\vee \mu A(x)=1\right\} $$](img/479940_1_En_2_Chapter_TeX_Eque.png)


    ### 边界


    模糊集隶属函数的边界定义为论域中元素隶属度非零但不完全属于集合 A 的区域。它是所有隶属度值大于 0 但小于 1 的点的集合，如图 2-2 所示。数学上可表示为：


    ![$$ 0&lt;\mu (x)&lt;1 $$](img/479940_1_En_2_Chapter_TeX_Equf.png)


    ### 交叉点


    隶属函数的交叉点定义为论域中模糊集隶属度值等于 0.5 的元素。所有隶属度值等于 0.5 的点的集合称为模糊集 A 的交叉点：


    ![$$ Crossover(A)=\left\{\left(x,\mu A(x)\right)\vee \mu A(x)=0.5\right\} $$](img/479940_1_En_2_Chapter_TeX_Equg.png)


    ### 正态性


    一个正态模糊集是指其隶属函数在论域中至少存在一个元素`x`，其隶属度值为 1（见图 2-3）。换句话说，如果找到某个集合的核且该核非空，则称该模糊集 A 是正态的：


    ![$$ Core(A)\ne \varnothing \to AisNormal $$](img/479940_1_En_2_Chapter_TeX_Equ1.png)


    ![../images/479940_1_En_2_Chapter/479940_1_En_2_Fig3_HTML.jpg](img/479940_1_En_2_Fig3_HTML.jpg)


    图 2-3


    模糊集的正态性


    ### 模糊单点集


    如果一个模糊集仅有一个点，且其隶属度值为 1，则称之为模糊单点集：


    ![$$ \left|A\right|=\left|\left\{\left(x,\mu A(x)\right)\vee \mu A(x)=1\right\}\right|
    $$](img/479940_1_En_2_Chapter_TeX_Equh.png)


    ### *α*– 截集


    模糊集 A 的 alpha 截集是包含所有隶属度值大于或等于 alpha 的值的集合：


    ![$$ A\alpha =\left\{x\in X\vee \mu A(x)\ge \alpha \right\} $$](img/479940_1_En_2_Chapter_TeX_Equi.png)


    ### 强 *α*– 截集


    模糊集 A 的强 alpha 截集是包含所有隶属度值大于 alpha 的值的集合：


    ![$$ A\alpha =\left\{x\in X\vee \mu A(x)&gt;\alpha \right\} $$](img/479940_1_En_2_Chapter_TeX_Equj.png)


    ### 凸性


    一个凸模糊集由其隶属函数描述，该隶属函数的值要么严格单调递增，要么严格单调递减，要么先严格单调递增后严格单调递减，且随着论域中元素值的增加而变化。简而言之，当且仅当一个模糊集满足以下规则时，它被称为凸集：


    ![$$ {\mu}_A\left(\lambda x+\left(1-\lambda \right)y\right)\ge \min \left\{{\mu}_A(x),{\mu}_A(y)\right\}
    $$](img/479940_1_En_2_Chapter_TeX_Equk.png)


    ### 带宽


    如果有一个集合 A 是正态且凸的，并且找到其交叉点集并选取两个不同的点，则这两点之间的距离称为带宽集。简单来说，对于一个正态且凸的模糊集，带宽定义为两个不同交叉点之间的距离：


    ![$$ Bandwidth(A)=\left|x2\hbox{--} x1\right|\to {\mu}_A(x1)={\mu}_A(x2)=0.5 $$](img/479940_1_En_2_Chapter_TeX_Equl.png)


    ### 对称性


    如果模糊集 A 的隶属函数在点 c 处满足以下条件，则称其为对称集（见图 2-4）。


    ![$$ {\mu}_A\left(x+c\right)={\mu}_A\left(c\hbox{--} x\right)\forall x\in X $$](img/479940_1_En_2_Chapter_TeX_Equm.png)


    ![../images/479940_1_En_2_Chapter/479940_1_En_2_Fig4_HTML.jpg](img/479940_1_En_2_Fig4_HTML.jpg)


    图 2-4


    模糊集的对称性


    ### 左开


    如果一个模糊集满足以下条件，则它是左开的（见图 2-5）：


    ![$$ A\iff {\mu}_A(x)=1\wedge {\mu}_A(x)=0 $$](img/479940_1_En_2_Chapter_TeX_Equn.png)


    ### 右开


    如果一个模糊集满足以下条件，则它是右开的（见图 2-5）：


    ![$$ A\iff {\mu}_A(x)=0\wedge {\mu}_A(x)=1 $$](img/479940_1_En_2_Chapter_TeX_Equo.png)


    ### 闭集


    如果一个模糊集满足以下条件，则它是闭集（见图 2-5）：


    ![$$ A\iff {\mu}_A(x)={\mu}_A(x)=0 $$](img/479940_1_En_2_Chapter_TeX_Equp.png)


    ![../images/479940_1_En_2_Chapter/479940_1_En_2_Fig5_HTML.jpg](img/479940_1_En_2_Fig5_HTML.jpg)


    图 2-5


    左开集、闭集与右开集


    ## 隶属函数的类型


    第一章简要介绍了不同类型的隶属函数。本节将详细讨论它们。隶属函数用于定义问题陈述中存在的模糊性。这意味着不必用离散数字来表示样本空间中的所有值。有时一个成员可以是一个小数，代表其隶属程度。


    例如，考虑足球中的点球概念。用离散术语来说，踢球可以是 1（全力踢）或 0（不踢）。在现实生活中，情况并非如此。踢球的速度不仅取决于射门者的心态，还取决于对守门员移动方向的预判。


    在这种情况下，射门者决定踢球的速度以及瞄准的方向。速度也不能仅由 0 和 1 这两个离散值来定义。速度范围从 0 到 1；0 表示无速度，1 表示全速。假设射门者想要瞄准球门柱的右上角。在这种情况下，主要的决策是找到最准确的速度，使球能够完美地旋转。太快球会飞出球门柱，而太慢则可能帮助守门员预判方向或阻止球正常旋转。因此，射门者可能不会选择
    1，而是从模糊集中选择 0.7，他认为这是踢球的最佳速度。模糊集中的这个概念由隶属函数来表示。


    下一节将讨论所使用的不同类型的隶属函数。

    '
- fmt: '### Triangular Membership Function


    Just as a triangle has three coordinates, a triangular membership function has
    three parameters: `a`, `b`, and `c`.


    - `a` is the lower boundary

    - `b` is the center

    - `c` is the upper boundary


    The following equation depicts the triangular membership function:


    ![$$ f\left(x;a,b,c\right)=\left\{\begin{array}{ll}0,&amp; x\le a\\ {}\frac{x-a}{b-a},&amp;
    a\le x\le b\\ {}\frac{c-x}{c-b},&amp; b\le x\le c\\ {}0,&amp; c\le x\end{array}\right\}
    $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equq.png)


    Alternatively, this can also be represented as follows:


    ![$$ f\left(x;a,b,c\right)=\max \left(\min \left(\frac{x-a}{b-a},\frac{c-x}{c-b}\right),
    0\right) $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equr.png)


    You can understand the triangular membership functions with the help of an example.
    This example uses the triangular membership function with a soccer example. Suppose
    the shooter can take four kinds of penalty shots:


    - Full speed straight shot

    - Medium powered curvy shot

    - Slow straight shot

    - Medium fast left shot


    On average, the top speed at which a shooter takes a penalty kick is 80 mph. Therefore,
    there is no way you can say that this speed is slow. Hence you assign a 0% membership
    to 80mph. Similarly, a speed of 60 mph can be considered 70% fast and 30% medium.
    Likewise, you can assign different memberships to different speeds.


    If you use a triangular membership function, it contains three limits: lower,
    full, and upper. The lower and upper bounds have a membership of 0% while the
    full value is 100%. The remaining values tread linearly. You can assign the following
    triangular membership functions to these categories:


    - Full speed as `[60, 80, 80]`

    - Medium powered as `[40, 50, 70]`

    - Slow as `[20, 20, 45]`

    - Medium fast as `[50, 60, 80]`


    For example, if you defined the triangular membership function for "medium powered"
    as `[40, 50, 70]`, the membership would be 0% at 40 mph, which linearly increases
    to 100% at 50 mph, and linearly decreases to 0% at 70 mph. The following Python
    code shows the execution of these triangular membership functions. Figure [2-6](#479940_1_En_2_Chapter.xhtml#Fig6)
    shows the result.


    ![../images/479940_1_En_2_Chapter/479940_1_En_2_Fig6_HTML.jpg](images/479940_1_En_2_Chapter/479940_1_En_2_Fig6_HTML.jpg)


    **Figure 2-6** Triangular membership of the soccer example


    ```

    #Importing Necessary Packages

    import numpy as np

    import skfuzzy as fuzz

    import matplotlib.pyplot as plt

    %matplotlib inline

    #Defining the Fuzzy Range from a speed of 30 to 90

    x = np.arange(30, 80, 0.1)

    #Defining the triangular membership functions

    slow = fuzz.trimf(x, [30, 30, 50])

    medium = fuzz.trimf(x, [30, 50, 70])

    medium_fast = fuzz.trimf(x, [50, 60, 80])

    full_speed = fuzz.trimf(x, [60, 80, 80])

    #Plotting the Membership Functions Defined

    plt.figure()

    plt.plot(x, full_speed, ''b'', linewidth=1.5, label=''Full Speed'')

    plt.plot(x, medium_fast, ''k'', linewidth=1.5, label=''Medium Fast'')

    plt.plot(x, medium, ''m'', linewidth=1.5, label=''Medium Powered'')

    plt.plot(x, slow, ''r'', linewidth=1.5, label="Slow")

    plt.title(''Penalty Kick Fuzzy'')

    plt.ylabel(''Membership'')

    plt.xlabel("Speed (Miles Per Hour)")

    plt.legend(loc=''center right'', bbox_to_anchor=(1.25, 0.5), ncol=1, fancybox=True,
    shadow=True)

    ```


    ### Trapezoidal Membership Function


    A trapezoid has four coordinates, so the membership function also has four coordinates
    values: `a`, `b`, `c`, and `d`, for a crisp value `x`. However, keep in mind this
    rule:


    ![$$ b&lt;c&lt;d $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equs.png)


    You can describe the function using this equation:


    ![$$ f\left(x;a,b,c,d\right)=\max \left(\min \left(\frac{x-a}{b-a},1,\frac{d-x}{d-c}\right),
    0\right) $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equt.png)


    This equation can be expanded with multiple cut-points:


    ![$$ f\left(x;a,b,c,d\right)=\left\{\begin{array}{ll}0,&amp; x\le a\\ {}\frac{x-a}{b-a},&amp;
    a\le x\le b\\ {}1,&amp; b\le x\le c\\ {}\frac{d-x}{d-c},&amp; c\le x\le d\\ {}0,&amp;
    d\le x\end{array}\right\} $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equu.png)


