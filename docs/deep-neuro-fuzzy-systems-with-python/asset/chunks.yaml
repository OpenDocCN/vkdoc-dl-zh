  trans: '

    # 复合与非复合隶属函数


    模糊集的投影与柱状扩展是当你想要将一维隶属函数扩展为二维隶属函数时所使用的概念。这些概念将在下一节关于模糊关系的部分中讨论。应用这些概念之一后，你会得到一个二维隶属函数。该隶属函数可分为两种类型：


    - 复合隶属函数

    - 非复合隶属函数


    一个二维隶属函数，如果能够分解为两个单一隶属函数，则称为复合隶属函数。否则，称为非复合隶属函数。


    例如，假设你有一个如下定义的隶属函数：


    ![$$ {\mu}_A\left(x,y\right)={e}^{-\left(\frac{x-5}{4}\right)-{\left(y-9\right)}²}
    $$](img/479940_1_En_2_Chapter_TeX_Equab.png)


    这个方程可以分解为两部分：


    ![$$ {e}^{-\left(\frac{x-5}{4}\right)}\ast {e}^{{\left(y-9\right)}²} $$](img/479940_1_En_2_Chapter_TeX_Equac.png)


    仔细观察，它们不过是两个高斯隶属函数。因此，你可以将它们重写如下：


    ![$$ gaussian\left(x,5,4\right)\ast gaussian\left(y,9,1\right) $$](img/479940_1_En_2_Chapter_TeX_Equad.png)


    由于你已成功将二维隶属函数分解为一维隶属函数，因此这是一个复合隶属函数。


    但考虑以下方程：


    ![$$ {\mu}_A\left(x,y\right)=\frac{1}{1+\left|x-3\right|{\left|y-4\right|}⁷} $$](img/479940_1_En_2_Chapter_TeX_Equae.png)


    在这种情况下，你将无法分解它。因此，它是一个非复合隶属函数。


    ## 模糊关系


    正如你在上一章所学，存在不同类型的集合——清晰集和模糊集。当你试图确定两个或多个集合之间的关系时，所使用的术语是*关系*，具体到模糊集，这被称为*模糊关系*。


    假设有两个模糊集 *X*、*Y*，它们都属于实数域，并且是论域的一部分。


    模糊关系 *X* × *Y* 将具有由该集合定义的关系：


    R = {(*x*, *y*), *μ*[*R*] ∨ (*x*, *y*) ∈ *X* × *Y*}


    为了以矩阵格式表示这种关系，请考虑以下示例。


    假设：


    ![$$ X=\left\{x1,x2,\dots xn\right\}Y=\left\{y1,y2,\dots yn\right\} $$](img/479940_1_En_2_Chapter_TeX_Equaf.png)


    模糊关系 R 将由以下矩阵表示：


    ![$$ y1y2\dots ynx1{\mu}_R\left(x1,y1\right){\mu}_R\left(x1,y2\right)\dots {\mu}_R\left(x1,
    yn\right)x2{\mu}_R\left(x2,y1\right){\mu}_R\left(x2,y2\right)\dots {\mu}_R\left(x2,
    yn\right)\dots \dots \dots \dots \dots xn{\mu}_R\left( xn,y1\right){\mu}_R\left(
    xn,y2\right)\dots {\mu}_R\left( xn, yn\right) $$](img/479940_1_En_2_Chapter_TeX_Equag.png)


    让我们通过一个例子来理解这个概念。


    假设：


    *X* = {1, 2, 3} 且 *Y* = {1, 2}


    如果两者之间的隶属函数由下式给出：


    *μR*(*x*, *y*) = 1/1+ e^(-(x-y))


    使用这两个公式，你可以将关系 R 定义为：


    ![$$ {\displaystyle \begin{array}{c}1/1+\\ {}R=\Big\{\end{array}} $$](img/479940_1_En_2_Chapter_TeX_IEq1.png)e^(-(1-1))![$$
    {\displaystyle \begin{array}{c}1/1+\\ {}\left(1,1\right),\end{array}} $$](img/479940_1_En_2_Chapter_TeX_IEq2.png)e^(-(1-2))![$$
    {\displaystyle \begin{array}{c}1/1+\\ {}\left(1,2\right),\end{array}} $$](img/479940_1_En_2_Chapter_TeX_IEq3.png)e^(-(2-1))![$$
    {\displaystyle \begin{array}{c}1/1+\\ {}\left(2,1\right),\end{array}} $$](img/479940_1_En_2_Chapter_TeX_IEq4.png)e^(-(2-2))![$$
    {\displaystyle \begin{array}{c}1/1+\\ {}\left(2,2\right),\end{array}} $$](img/479940_1_En_2_Chapter_TeX_IEq5.png)
    e^(-(3-1))![$$ {\displaystyle \begin{array}{c}1/1+\\ {}\left(3,1\right),\end{array}}
    $$](img/479940_1_En_2_Chapter_TeX_IEq6.png)e^(-(3-2))(3, 2)}


    ![$$ R=\left\{\left(0.5\vee \left(1,1\right)\right),\left(0.27\vee \left(1,2\right)\right),\left(0.73\vee
    \left(2,1\right)\right),\left(0.5\vee \left(2,2\right)\right),\left(0.88\vee \left(3,1\right)\right),\left(0.5\vee
    \left(3,2\right)\right)\right\} $$](img/479940_1_En_2_Chapter_TeX_Equah.png)


    如果你想用矩阵格式表示这个关系，你会得到以下矩阵：


    ![$$ \left[\mathrm{0.500.270.730.500.880.50}\right] $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equai.png)


    现在你知道了什么是模糊关系。下一节将探讨它的一些性质。


    ### 模糊关系的性质


    本节讨论模糊关系的以下性质：


    - 投影

    - 柱状扩展

    - 自反关系

    - 反自反关系

    - 对称关系

    - 反对称关系

    - 传递关系

    - 相似关系

    - 反相似关系

    - 弱相似关系

    - 序关系

    - 预序关系

    - 半序关系


    #### 模糊关系的投影


    由于清晰关系定义在两个或多个集合的乘积空间中，因此提出了*投影*的概念。假设你有一个由以下矩阵表示的模糊关系：


    R = [0.10.20.40.20.40.80.40.81]


    这与你在上一节中得到的矩阵相同，其中列代表 X 集合的元素，行代表 Y 集合的元素。单个值是隶属函数的值。现在，如果你想将这个关系投影到 X 或 Y 上，可以定义如下：


    ![$$ {\displaystyle \begin{array}{l}{\mathrm{R}}_1\left(\Pr \mathrm{ojection}\
    \mathrm{onto}\ \mathrm{X}\right)=\left\{\left(x,\underset{y}{\underbrace{\max}}{\mu}_R\Big(x,y\right)|\left(x,y\right)\in
    X\times Y\right\}\\ {}{\mathrm{R}}_2\left(\Pr \mathrm{ojection}\ \mathrm{onto}\
    \mathrm{Y}\right)=\left\{\left(y,\underset{x}{\underbrace{\max}}{\mu}_R\Big(x,y\right)|\left(x,y\right)\in
    X\times Y\right\}\end{array}} $$](img/479940_1_En_2_Chapter_TeX_Equaj.png)


    当你将两个投影应用于此矩阵时，会得到以下结果：


    ![$$ {\mu}_{R1}(x1)=\left(0.1,0.2,0.4\right)=0.4 $$](img/479940_1_En_2_Chapter_TeX_Equak.png)


    ![$$ {\mu}_{R1}(x2)=\left(0.2,0.4,0.8\right)=0.8 $$](img/479940_1_En_2_Chapter_TeX_Equal.png)


    ![$$ {\mu}_{R1}(x3)=\left(0.4,0.8,1\right)=1 $$](img/479940_1_En_2_Chapter_TeX_Equam.png)


    因此，R[1] 变为：


    ![$$ {\displaystyle \begin{array}{c}{x}_2,0.8\Big\},\left({x}_3,1\right)\\ {}\left({x}_1,0.4\right),\\
    {}{R}_1=\end{array}} $$](img/479940_1_En_2_Chapter_TeX_Equan.png)


    类似地，你可以得到 R2 的值如下：


    ![$$ {\mu}_{R1}(y1)=\left(0.1,0.2,0.4\right)=0.4 $$](img/479940_1_En_2_Chapter_TeX_Equao.png)


    ![$$ {\mu}_{R1}(y2)=\left(0.2,0.4,0.8\right)=0.8 $$](img/479940_1_En_2_Chapter_TeX_Equap.png)


    ![$$ {\mu}_{R1}(y3)=\left(0.4,0.8,1\right)=1 $$](img/479940_1_En_2_Chapter_TeX_Equaq.png)


    ![$$ {\displaystyle \begin{array}{c}y,0.8\Big\},\left({y}_3,1\right)\\ {}\left({y}_1,0.4\right),\\
    {}{R}_2=\end{array}} $$](img/479940_1_En_2_Chapter_TeX_Equar.png)


    请记住，对于投影到 X 上，你进行逐行比较。但对于投影到 Y 上，你进行逐列比较。

    '
- fmt: '### Cylindrical Extension of Fuzzy Relations


    Once you have the projection of relation on two sets, you directly refill the
    values of the original matrix with the membership values. That is called a cylindrical
    extension of a Fuzzy Relation. It is represented by:


    ![$$ cylA\left(x,y\right)=A(x) $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equas.png)


    ![$$ \forall x\in X $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equat.png)


    ![$$ \forall y\in Y $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equau.png)


    You can understand this better by extending the previous example.


    You got the `R[1]` and `R[2]` values. Now you just redefine the matrix with the
    combined values:


    `R[1]` = ![$$ \left[\begin{array}{c}\mathrm{0.40.4}\\ {}\mathrm{0.80.8}\\ {}11\end{array}\right]
    $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_IEq7.png)


    `R[2]` = ![$$ \left[\begin{array}{c}\mathrm{0.40.4}\\ {}\mathrm{0.80.8}\\ {}11\end{array}\right]
    $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_IEq8.png)


    ### Reflexive Relation


    If the Fuzzy Relation between two same sets is `R`, such that for each same value
    combination, you have a membership function value of 1, then you call the relation
    *reflexive*. Therefore, if `R` is a Fuzzy Relation, it will be reflexive if:


    ![$$ {\mu}_R\left(x,x\right)=1\forall x\in X $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equav.png)


    For example, if `X = {1,2,3,4}`, the Relation `R` will be equal to:


    `R` = ![$$ \left[\begin{array}{c}\mathrm{10.90.60.2}\\ {}\mathrm{0.910.70.3}\\
    {}\mathrm{0.60.710.9}\\ {}\mathrm{0.20.30.91}\end{array}\right] $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_IEq9.png)


    As you can see, the diagonals of this matrix are 1, proving it to be a reflexive
    relation.


    ### Anti-Reflexive Relation


    If the Fuzzy Relation between two same sets is `R`, such that for each same value
    combination, you have a membership function value of 0, then you call the relation
    *anti-reflexive*. It is represented by:


    ![$$ {\mu}_R\left(x,x\right)=0\forall x\in X $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equaw.png)


    For example, if `X = {1,2,3}`, then the Relation `R` will be equal to:


    `R` = ![$$ \left[\begin{array}{c}000.6\\ {}0.300\\ {}00.30\end{array}\right] $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_IEq10.png)


    As you can see, the diagonals of this matrix are 0, proving it to be an anti-reflexive
    relation.


    ### Symmetric Relation


    If you have two or more members of a Fuzzy Set, `x`, `y`, belonging to same set
    `X`, and if the membership function value of relation between `x` and `y` is the
    same as the membership function value of relation between `y` and `x`, you call
    the relation a symmetric relation.


    ![$$ {\mu}_R\left(x,y\right)={\mu}_R\left(y,x\right)\forall x,y\in X $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equax.png)


    For example, if `X = {1,2,3}`, then:


    If, `R` = ![$$ \left[\begin{array}{c}\mathrm{0.80.10.7}\\ {}\mathrm{0.110.6}\\
    {}\mathrm{0.70.60.5}\end{array}\right] $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_IEq11.png)


    This is a symmetric relation because `μR(x, y)` and `μR(y, x)` have the same values.


    ### Anti-Symmetric Relation


    If you have two or more members of a Fuzzy Set, `x`, `y`, belonging to the same
    set `X`, and if the membership function value of relation between `x` and `y`
    is greater than 0, and the membership function value of relation between `y` and
    `x` is 0, you call this an anti-symmetric relation.


    If `μR(x, y) > 0`, then `μR(y, x) = 0`, `∀x, y ∈ X`, and `x ≠ y`.


    For example:


    If `R` = ![$$ \left[\begin{array}{c}000.7\\ {}0.100\\ {}00.60\end{array}\right]
    $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_IEq12.png)


    This is an anti-symmetric relation, because when `μR(x, y) > 0`, then `μR(y, x)
    = 0`.


    ### Transitive Relation


    A Fuzzy Relation is transitive if:


    ![$$ {\mu}_R\left(x,z\right)\ge \mathit{\max}\left(\mathit{\min}\left({\mu}_R\left(x,y\right),{\mu}_R\left(y,z\right)\right)\right)x,z\in
    X $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equay.png)


    This means that you first need to find the `R²` value using the max-min approach,
    and then check whether it is not always less than or equal to the original membership
    matrix of `R`. If it doesn’t follow, the equation is transitive.


    Suppose you have a relation matrix as follows:


    `R` = ![$$ \left[\begin{array}{c}\mathrm{0.70.90.4}\\ {}\mathrm{0.10.30.5}\\ {}\mathrm{0.20.10}\end{array}\right]
    $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_IEq13.png)


    The first step is to find `R²` value. For this, you use the following steps:


    `R.R` = ![$$ \left[\begin{array}{c}\mathrm{0.70.90.4}\\ {}\mathrm{0.10.30.5}\\
    {}\mathrm{0.20.10}\end{array}\right]\bullet \left[\begin{array}{c}\mathrm{0.70.90.4}\\
    {}\mathrm{0.10.30.5}\\ {}\mathrm{0.20.10}\end{array}\right] $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_IEq14.png)


    = ![$$ \left[\begin{array}{c}\mathit{\max}\left\{\mathit{\min}\left(0.7,0.7\right)\mathit{\min}\left(0.9,0.1\right)\mathit{\min}\left(0.4,0.2\right)\right\}\mathit{\max}\left\{\mathit{\min}\left(0.7,0.9\right)\mathit{\min}\left(0.9,0.3\right)\mathit{\min}\left(0.4,0.1\right)\right\}\mathit{\max}\left\{\mathit{\min}\left(0.7,0.4\right)\mathit{\min}\left(0.9,0.5\right)\mathit{\min}\left(0.4,0\right)\right\}\\
    {}\mathit{\max}\left\{\mathit{\min}\left(0.1,0.7\right)\mathit{\min}\left(0.3,0.1\right)\mathit{\min}\left(0.5,0.2\right)\right\}\mathit{\max}\left\{\mathit{\min}\left(0.1,0.9\right)\mathit{\min}\left(0.3,0.3\right)\mathit{\min}\left(0.5,0.1\right)\right\}\mathit{\max}\left\{\mathit{\min}\left(0.1,0.4\right)\mathit{\min}\left(0.3,0.5\right)\mathit{\min}\left(0.5,0\right)\right\}\\
    {}\mathit{\max}\left\{\mathit{\min}\left(0.2,0.7\right)\mathit{\min}\left(0.1,0.1\right)\mathit{\min}\left(0,0.2\right)\right\}\mathit{\max}\left\{\mathit{\min}\left(0.2,0.9\right)\mathit{\min}\left(0.1,0.3\right)\mathit{\min}\left(0,0.1\right)\right\}\mathit{\max}\left\{\mathit{\min}\left(0.2,0.4\right)\mathit{\min}\left(0.1,0.5\right)\mathit{\min}\left(0,0\right)\right\}\end{array}\right]
    $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_IEq15.png)


    Applying the max-min composition, you get the following matrix:


    `R²` = ![$$ \left[\begin{array}{c}\mathrm{0.70.70.5}\\ {}\mathrm{0.10.30.5}\\
    {}\mathrm{0.20.10}\end{array}\right] $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_IEq16.png)


    You can see that the values are sometimes greater than the original matrix. Therefore,
    the matrix is not transitive.


    ### Similarity Relation


    If there are two Fuzzy Sets, which are reflexive, symmetric, and transitive, the
    relation is a *similarity relation*.


    `R` = ![$$ \left[\begin{array}{c}\mathrm{10.210.60.20.6}\\ {}\mathrm{0.210.20.20.80.2}\\
    {}\mathrm{10.210.60.20.6}\\ {}\mathrm{0.60.20.610.20.8}\\ {}\mathrm{0.20.80.20.210.2}\\
    {}\mathrm{0.60.20.60.80.21}\end{array}\right] $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_IEq17.png)


    This relation is a similarity relation because:


    - `μR(x, x) = 1`


    Which proves that the relation is reflexive.


    - `μR(x, y) = μR(y, x)`


    Which proves that the relation is symmetric.


    - `μR(x, z) ≥ ((μR(x, y), μR(y, z)))`, `x, y, z ∈ X`


    Which proves that the relation is transitive.


    Since it follows all these principles, it is a similarity relation.'
