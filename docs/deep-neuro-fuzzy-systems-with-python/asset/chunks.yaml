    #### Sigmoidal Membership Function


    This is one of the most widely used membership functions, especially in the field
    of neural networks. The formula is given here:


    ![$$ Sigmoid\left(x;a,c\right)=\frac{1}{1+{e}^{-a\left(x-c\right)}} $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equx.png)


    where a represents the slope and c represents the crossover point.


    When you come to a specific instance wherein you must take care of very high values
    or very low values, you use the sigmoidal membership function as the target.


    You must provide two points, and the most important point is the c point (crossover
    point), which represents the center. Therefore, for the soccer example, the classes
    will be redefined using the sigmoidal membership function as follows:


    *   Full speed has a crossover at 80 mph and a slope of 2


    *   Medium powered has a crossover at 50 mph and a slope of 2


    *   Slow has a crossover at 30 mph and a slope of 2


    *   Medium fast has a crossover at 60 mph and a slope of 2


