    is an auto-associative memory, but *a* = {(*x*[*i*], *y*[*i*]) | *i* = 1,2,3…*n*}
    is a hetero-associative memory.


    The process of finding the function G(x) is called the *recording phase,* whereas
    G is called *associative mapping.* When the associative mapping is a neural network,
    it is called ***neural associative memory*** and when it is a Fuzzy Neural Network,
    it’s called *Fuzzy Associative Memory*. In a Fuzzy Associative Memory, the input
    and output patterns are Fuzzy Sets.


