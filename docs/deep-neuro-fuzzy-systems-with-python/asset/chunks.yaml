    # 2. Fuzzy Rules and Reasoning


    The previous chapter discussed different kinds of sets as well as their properties
    and operations that can be performed on them. You also looked at some of the operations
    and their applications in Python. That chapter concluded with a small introduction
    to the different types of membership functions and their Python applications.


    This chapter discusses the membership functions and their applications in detail.
