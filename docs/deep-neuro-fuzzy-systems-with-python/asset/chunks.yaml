    Once you have decided what kind of problem your Machine Learning model needs to
    solve and select one of the algorithms from these lists, you come to the next
    phase, which is finding the performance of the model.


    ## The Measure of Performance


    Once your model is ready, it’s time to ensure that you get accurate results. For
    that, you measure the performance of the model, based on the problem that it is
    trying to solve—classification or regression.


    For Classification problems, the following are some of the measures you use:


    *   Accuracy


    *   Precision


    *   Recall or sensitivity


    *   F1-score


    *   Confusion matrix


    For regression problems, here are some of the metrics:


    *   Root mean squared error


    *   AIC


    *   R2-score


    The next sections discuss these measurements and metrics using the Titanic and
