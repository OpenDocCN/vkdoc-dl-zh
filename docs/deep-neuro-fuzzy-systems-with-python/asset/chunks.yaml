- fmt: '### Anti-Similarity Relation


    The complement of a similarity relation is an anti-similarity relation. Therefore,
    you can write it as follows:


    ![$$ {\mu}_{R^{\prime }}=1-{\mu}_R\left(x,y\right) $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equaz.png)


    Suppose:


    If `R` = ![$$ \left[\begin{array}{c}\mathrm{10.10.7}\\ {}\mathrm{0.110.7}\\ {}\mathrm{0.70.71}\end{array}\right]
    $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_IEq18.png)


    ![$$ {\mu}_{R^{\prime }}\left(x,y\right)=1-\left[\begin{array}{c}\mathrm{10.10.7}\\
    {}\mathrm{0.110.7}\\ {}\mathrm{0.70.71}\end{array}\right] $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equ2.png)


    This is equal to this matrix:


    ![$$ \left[\begin{array}{c}\mathrm{00.90.3}\\ {}\mathrm{0.900.3}\\ {}\mathrm{0.30.30}\end{array}\right]
    $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equba.png)


    You can say that this is anti-reflexive, symmetric, and transitive. Therefore,
    `R` is an anti-similarity relation.


    ### Weak Similarity Relation


    If a relation is reflexive and symmetric, but not transitive, the relation is
    called a weak similarity relation.


    If `R` = ![$$ \left[\begin{array}{c}\mathrm{10.10.80.20.30.1}\\ {}\mathrm{100.310.80}\\
    {}\mathrm{10.700.20.30.7}\\ {}\mathrm{10.60.3100.61}\end{array}\right] $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_IEq19.png)


    When you apply the rules of reflexive, symmetric, and transitive relations, you
    can see that it is following the first two, but not following the transitive relation
    property. Therefore, you can say that it is a weak similarity relation.


    ### Half Order Relation


    Before talking about a half order relation, you must know what a weak anti-symmetric
    relation means. This Fuzzy Relation follows these rules:


    If


    ![$$ {\mu}_R\left(x,y\right)&gt;0 $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equbb.png)


    ![$$ {\mu}_R\left(y,x\right)&gt;0 $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equbc.png)


    Then


    ![$$ x=y $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equbd.png)


    Now that you know about it, a half order relation is reflexive as well as weakly
    symmetric. For example, if


    `R` = ![$$ \left[\begin{array}{c}\mathrm{10.80.20.60.60.4}\\ {}01000.60\\ {}00100.50\\
    {}\mathrm{00010.60.4}\\ {}000010\\ {}000001\end{array}\right] $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_IEq20.png)


    Then this relation follows the property of half order relation.


    ## Fuzzy Rules


    In Fuzzy Logic, if you want to incorporate conditional statements, you use Fuzzy
    Rules (see Figure [2-17](#479940_1_En_2_Chapter.xhtml#Fig17)). The most important
    thing to understand is the Fuzzy If-Then Rules. A single sample Fuzzy Rule looks
    like this:


    ![$$ x\ \mathbf{is}\ A\ \mathbf{then}\ y\ \mathbf{is}\ B $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equ3.png)


    In this statement, `A` and `B` are called linguistic values. These are the values
    that assume that it has been derived from statistical research, a mathematical
    model, etc. For example, it can take categorical values (good, average, or best),
    probabilistic values (0.1, 0.3, or 0.9), or any other part of an experiment. These
    values can be part of a Fuzzy Set, which can be a member of the Universe of Discourse
    `X` and `Y`.


    If you break the previous statement into two halves:


    - `x` is `A`

    - `y` is `B`


    The first part is called an *antecedent* or *premise*, while the second part is
    called the *consequent* or *conclusion* (see Figure [2-2](#479940_1_En_2_Chapter.xhtml#Fig2)).


    For example, consider the following rules:


    - If road is good then condition of car is good

    - If company is good then employees are satisfied

    - If service is good then tip is average


    As stated, `A` and `B` are Fuzzy Sets, so they have a value between 0 and 1. That
    means you provide a value between 0 and 1 as the antecedent, and you get a value
    from 0 to 1 as the consequent. So, in the previous example, good can be assigned
    a number between 0 and 1, and you’ll get a response between 0 and 1, which will
    represent good, average, or satisfied, based on the problem statement.


    When you apply If-Then Rules, then input is set as a value between 0 and 1, but
    the output is an entire Fuzzy Set. After this, you need to apply one of the Fuzzy
    Operations, called Defuzzification, which then gives you a crisp output value
    between 0 and 1.


    The process of the If-Then Rule involves:


    1. Reading the antecedent

    2. Converting the input to a Fuzzy Set

    3. Applying the necessary Fuzzy Operators

    4. Applying the result to a consequent

    5. Getting a Fuzzy Set as output

    6. Defuzzifying to get a crisp answer


    These examples are binary. Antecedents and consequents can both have multiple
    parts. For example:


    ![../images/479940_1_En_2_Chapter/479940_1_En_2_Fig17_HTML.jpg](images/479940_1_En_2_Chapter/479940_1_En_2_Fig17_HTML.jpg)


    Figure 2-17


    Fuzzy Rules in a service example


    - **If** sky is gray **and** wind is strong **and** barometer is falling, **then**
    ...

    - If temperature is cold then hot water valve is open and cold water valve is
    shut


    With this logic, the rules can be divided into two parts:


    - *Fuzzy Mapping Rule.* This rule first Fuzzified the antecedent inputs, in this
    case, service and food, and then applied the max operator. This gives the final
    crisp value that needs to be sent to the consequent.

    - *Fuzzy Implication Rule.* In this rule, the consequent receives the crisp input
    from the antecedent, and then it decides what the Fuzzy Set will look like. You
    get a Fuzzy Set as output after this step.


    Once you learn about Fuzzy Inference Systems, you will understand the process
    of Defuzzifying the output Fuzzy Set into a crisp set.


    ## Fuzzy Reasoning: The Theory of Approximate Reasoning


    Say you know some Fuzzy Rules related to an Antecedent Fuzzy Set, called `A`,
    and a Consequent Fuzzy Set, called `C`. Suppose you also know a fact, which is
    nothing but a member of Fuzzy Set `A`. Using these rules, you can get a consequence
    from Fuzzy Set `C`, using approximate reasoning. Consider the following example.


    Suppose you have three Fuzzy If-Then Rules:


    - If service is good then tip is average

    - If service is worst then tip is poor

    - If service is best then tip is good


    If you know that the service is good, through approximate reasoning, you can say
    that the tip is average. Here’s a formal notation of this idea.


    ![$$ R1: ifxisA1 thenyisC1, $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Eqube.png)


    ![$$ R2: ifxisA2 thenyisC2, $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equbf.png)


    ![$$ \cdots \cdots \cdots \cdots $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equbg.png)


    ![$$ Rn: ifxisAnthenyisCn $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equbh.png)


    ![$$ :! xisA $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equbi.png)


    ![$$ so, consequence: yisC $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equbj.png)


    Now that you know the basics, let’s look at some formal definitions related to
    Fuzzy Reasoning:


    - Entailment rule

    - Conjunction rule

    - Disjunction rule

    - Projection rule

    - Negation rule

    - Generalized modus ponens

    - Generalized modus tollens


    ### Entailment Rule


    If you know that service is poor, and poor is a subset of bad, you can say that
    the service is bad. This is called an entailment rule, represented by:


    ![$$ xisA $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equbk.png)


    ![$$ A\subset B $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equbl.png)


    ![$$ xisB $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equbm.png)'
