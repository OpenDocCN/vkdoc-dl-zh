- fmt: '### Conjunction Rule


    This can also be called the AND rule. If service is not very good and service
    is not very bad, you can say that service is not very good and not very bad. This
    is called a conjunction rule, and it’s represented by:


    ![$$ \frac{\begin{array}{l}x\kern0.5em is\kern0.5em A\\ {}x\kern0.5em is\kern0.5em
    B\end{array}}{x\kern0.5em is\kern0.5em A\cap B} $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equbn.png)


    ### Disjunction Rule


    This can also be called the OR rule. If service is not very good or service is
    not very bad, you can say that service is not very good or not very bad. This
    is called a conjunction rule, and it’s represented by:


    ![$$ \frac{\begin{array}{l}x\kern0.5em is\kern0.5em A\\ {}x\kern0.5em is\kern0.5em
    B\end{array}}{x\kern0.5em is\kern0.5em A\cup B} $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equbo.png)


    ### Projection Rule


    If you have two members of Fuzzy Set *X* ∧ *Y*: *x*, *y* respectively, and you
    have a relation *R* between them, then you can define a projection rule on them.


    If you say that (*x*, *y*) is close to (4, 5), then you can conclude that *x*
    is close to 4 and *y* is close to 5.


    ### Negation Rule


    If you say that *x* is *high*, but a fact disproves it by saying, *not*(*x is
    high*), then you can conclude using the negation rule that *x* is *not high*.
    This can be represented by:


    ![$$ \frac{not(xisA)}{xis\neg A} $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equbp.png)


    ### Generalized Modus Ponens


    You know that if the service is poor, the tip is bad. You also know as a fact
    that the service is good. Keeping those two situations in mind, you can say that
    the tip is nice, considering nice is a complement of bad, and good is a complement
    of poor. This is what the generalized modus ponens (GMP) says. Here it is in representation
    format:


    ![$$ ifxisAthenyisB\to Premise $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equbq.png)


    ![$$ xis{A}^{\prime}\to ! $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equbr.png)


    ![$$ yis{B}^{\prime}\to Consequence $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equbs.png)


    There are some properties that GMP needs to follow.


    Basic property:


    ![$$ xisAthenyisB\to Premise $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equbt.png)


    ![$$ xisA\to ! $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equbu.png)


    ![$$ yisB\to Consequence $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equbv.png)


    Total Indeterminacy property:


    ![$$ xisAthenyisB\to Premise $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equbw.png)


    ![$$ xis\neg A\to ! $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equbx.png)


    ![$$ yisUnknown\to Consequence $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equby.png)


    Subset property:


    ![$$ xisAthenyisB\to Premise $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equbz.png)


    ![$$ xis{A}^{\prime}\subset A\to ! $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equca.png)


    ![$$ yisB\to Consequence $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equcb.png)


    Superset property:


    ![$$ xisAthenyisB\to Premise $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equcc.png)


    ![$$ xis{A}^{\prime}\to ! $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equcd.png)


    ![$$ yis{B}^{\prime}\supset B\to Consequence $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equce.png)


    ### Generalized Modus Tollens


    Again, if you know that the service is good, that means the tip is nice. You also
    know as a fact that the tip is bad. Keeping these two situations in mind, you
    can say that the service is poor, considering bad is a complement of nice, and
    poor is a complement of good. This is what the generalized modus tollens says:


    ![$$ ifxisAthenyisB\to Premise $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equcf.png)


    ![$$ yis{B}^{\prime}\to ! $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equcg.png)


    ![$$ xis{A}^{\prime}\to Consequence $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equch.png)


    ### Aggregation in Fuzzy System Modeling


    Before look at aggregation, you must know the steps required for any Fuzzy Inference
    Process:


    1. Whatever the input is, you must match every rule with it.

    2. Determine the output of every rule as a Fuzzy Set.

    3. Aggregate all the rule outputs to get the overall Fuzzy System output Fuzzy
    Set.

    4. Perform an action based on the output Fuzzy Set.


    The consideration in this section is the third point: aggregation of the output
    rules. You can represent this operation as follows:


    ![$$ F(y)= Agg\left({R}_1(y),{R}_2(y),\dots {R}_n(y)\right) $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equci.png)


    In the previous equation, `Agg` represented the aggregation operator. All the
    parameters present inside the operator are the membership grades of the output
    rules for every value of `y` present in Fuzzy Set `Y`.


    For aggregation operations, the following three conditions need to be satisfied:


    - Commutativity

    - Monotonicity

    - Fixed identity


    #### Commutativity


    All the elements on which the aggregation operation is going to be performed can
    be unordered and can contain duplicate values. This means that indexing doesn’t
    play a role here. So `R1` can come after `R45`, which can come after `R2`.


    #### Monotonicity


    Suppose there are two elements, `y1` and `y2`. You know that `R(y1)` and `R(y2)`
    represent the degree of membership. This tells you the probability of `y1` being
    the correct solution versus `y2` being correct. If all the rules applied on `y1`
    and `y2` state that `R(y1) ≥ R(y2)`, the overall system will prefer `y1` over
    `y2`. This can be represented by the monotonicity condition:


    ![$$ {R}_j(y1)\ge {R}_j(y2) $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equcj.png)


    This means that, for all the values of `j`, the membership of `y1` will be greater
    than or equal to the membership of `y2`.


    #### Fixed Identity


    Suppose there are few rules that don’t ensure an output. In that scenario, these
    rules will not affect the output of all the other rules, which do determine potential
    outputs. This is the property of fixed identity.


    When you combine all three conditions, the aggregation is called Monotonic Identity
    Commutative Aggregation (MICA). The following is a list of the MICA operators:


    - Triangular norms

    - Triangular Co-Norms

    - Averaging and Compensatory operators'
