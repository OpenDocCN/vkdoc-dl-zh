- fmt: '### The Output Layer


    After the processes of pooling and convolution are finished, the last layer operation
    starts, and the layer is called the output layer. The output layer is a network
    of fully connected layers, which means all the neurons in the previous layer are
    connected to all the neurons in the output layer. In the output layer, the normal
    operation of a neural network begins.


    This means that once all the features are learned and extracted from multiple
    images, using the convolution and pooling operations, these learned features are
    passed to a regular neural network, which finally classifies the images using
    that information.


    Figure [5-13](#479940_1_En_5_Chapter.xhtml#Fig13) shows the entire operation of
    convolutional neural networks.


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig13_HTML.jpg](images/479940_1_En_5_Chapter/479940_1_En_5_Fig13_HTML.jpg)


    Figure 5-13


    Typical architecture of a CNN


    The following is the implementation of CNN on digits recognition applied to a
    MNIST dataset. You can find the segregated version of this code in the GitHub
    repository.


    ```python

    from keras.datasets import mnist

    import matplotlib.pyplot as plt

    from keras.models import Sequential

    from keras.layers import Dense, Conv2D, Flatten

    from keras.utils import to_categorical

    #download mnist data and split into train and test sets

    (X_train, y_train), (X_test, y_test) = mnist.load_data()

    f1 = plt.figure(1)

    plt.imshow(X_train[0])

    f2 = plt.figure(2)

    plt.imshow(X_train[1])

    plt.show()

    #check image shape and data count

    print(X_train[0].shape, len(X_train))

    print(X_train[0].shape, len(X_test))

    #reshape data to fit model

    X_train = X_train.reshape(len(X_train),28,28,1)

    X_test = X_test.reshape(len(X_test),28,28,1)

    #One-hot encode target column

    y_train = to_categorical(y_train)

    y_test = to_categorical(y_test)

    y_train[0]

    #Create model

    model = Sequential()

    #Add Input CNN Layer

    model.add(Conv2D(64, kernel_size=3, activation="relu", input_shape=(28,28,1)))

    #Add second CNN Layer

    model.add(Conv2D(32, kernel_size=3, activation="relu"))

    #Add the fully connected layer

    model.add(Flatten())

    model.add(Dense(10, activation="softmax"))

    #Compile model using accuracy to measure model performance

    model.compile(optimizer=''adam'', loss="categorical_crossentropy", metrics=[''accuracy''])

    #Train the model

    model.fit(X_train, y_train, validation_data=(X_test, y_test), epochs=3)

    #predict first 6 images in the test set

    model.predict(X_test[:6])

    #actual results for first 6 images in the test set

    y_test[:6]

    ```


    ### Recurrent Neural Networks


    Recurrent neural networks are used for sequential data analysis and prediction,
    especially in the finance, video analysis, and audio analysis domains. They can
    understand the context of the data and retain the information. Most traditional
    Machine Learning problems assume that the past values of the inputs are not related
    and are independent. But if you look at the aforementioned fields, you can see
    that the variables have relationships with their past values. The current stock
    price is related to the previous day’s or month’s stock price. The current word
    in a sentence depends on the word that came before.


    This kind of data is called *time series data*. RNNs provide a way to effectively
    come up with computations that can predict the next sequence based on the sequence
    currently provided.


    A simple RNN structure is provided in Figures [5-14](#479940_1_En_5_Chapter.xhtml#Fig14)
    and [5-15](#479940_1_En_5_Chapter.xhtml#Fig15).


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig15_HTML.jpg](images/479940_1_En_5_Chapter/479940_1_En_5_Fig15_HTML.jpg)


    Figure 5-15


    Single RNN cell (arXiv:1808.03314v4 [cs.LG] 4 Nov 2018)


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig14_HTML.jpg](images/479940_1_En_5_Chapter/479940_1_En_5_Fig14_HTML.jpg)


    Figure 5-14


    Sequence of RNN cells (arXiv:1808.03314v4 [cs.LG] 4 Nov 2018)


    Here is an explanation of the RNN notations used in the previous diagrams:


    *   `S` is the hidden state

    *   `x` is the input vector

    *   `W` is the weights

    *   `r` is the activated output


    Let’s now look at the entire process of an RNN cell. At timestep `t`, the RNN
    cell takes an input `x`. It also takes the value of the hidden state from the
    previous RNN cell. This helps RNN take into consideration the previous context
    and understand the new input. The new state (hidden) is calculated in this RNN
    by applying the `Tanh` activation function to the previous state and the input.
    In all the combined RNN cells, the weight matrix `W` is shared throughout the
    process.


    ```python

    import pandas as pd

    import numpy as np

    import matplotlib.pyplot as plt

    from keras.models import Sequential

    from keras.layers import Dense, SimpleRNN

    #Generating Random Data

    t=np.arange(0,1000)

    x=np.sin(0.02∗t)+2∗np.random.rand(1000)

    df = pd.DataFrame(x)

    df.head()

    #Splitting into Train and Test set

    values=df.values

    train, test = values[0:800,:], values[800:1000,:]

    # convert dataset into matrix

    def convertToMatrix(data, step=4):

    X, Y =[], []

    for i in range(len(data)-step):

    d=i+step

    X.append(data[i:d,])

    Y.append(data[d,])

    return np.array(X), np.array(Y)

    trainX,trainY =convertToMatrix(train,6)

    testX,testY =convertToMatrix(test,6)

    trainX = np.reshape(trainX, (trainX.shape[0], 1, trainX.shape[1]))

    testX = np.reshape(testX, (testX.shape[0], 1, testX.shape[1]))

    #Making the RNN Structure

    model = Sequential()

    model.add(SimpleRNN(units=32, input_shape=(1,6), activation="relu"))

    model.add(Dense(8, activation="relu"))

    model.add(Dense(1))

    #Compiling the Code

    model.compile(loss=''mean_squared_error'', optimizer="rmsprop")

    model.summary()

    #Training the Model

    model.fit(trainX,trainY, epochs=1, batch_size=500, verbose=2)

    #Predicting with the Model

    trainPredict = model.predict(trainX)

    testPredict= model.predict(testX)

    predicted=np.concatenate((trainPredict,testPredict),axis=0)

    ```


    The problem with RNNs is that they suffer from the problems of vanishing and exploding
    gradients. You already know that RNNs are best suited for time series data. But
    imagine a body of text consisting of multiple paragraphs. In the first paragraph,
    the author tells the readers that she is talking about England. In all the subsequent
    paragraphs, she is talking about the same country, but doesn’t reference the name
    of the country. As human readers, we understand that the country of interest is
    England, but for RNNs, this ambiguity may cause problems.


    Neural networks learn from the concept of backpropagation. The process starts
    from the last layer of the neural network and can move up to the first layer.
    To move from one layer to another, backwards, you use the concept of matrix multiplication
    and linear algebra. This causes problems if the current value is too large or
    too small. If the values are <1, you keep on moving backward and the values keep
    shrinking until they vanish. This makes it impossible to learn from the data and
    the problem is called the *vanishing gradient problem*. Similarly, if the values
    are too large, they keep on getting larger and larger until they crash the model.
    This problem is called the *exploding gradient problem*.


    To overcome these problems, you can use LSTM (long short-term memory) and GRUs
    (gated recurrent units). The following sections look at LSTM followed by GRUs.'
