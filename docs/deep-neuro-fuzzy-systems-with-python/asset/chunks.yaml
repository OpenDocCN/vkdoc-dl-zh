- fmt: '# Tsukamoto Fuzzy Inference System


    In Tsukamoto FIS, instead of having constant or linear output Fuzzy Membership,
    you have a monotonic membership function, which you Defuzzify using the weighted
    average approach. Figure [3-25](#479940_1_En_3_Chapter.xhtml#Fig25) shows the
    Tsukamoto FIS process.


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig25_HTML.jpg](images/479940_1_En_3_Chapter/479940_1_En_3_Fig25_HTML.jpg)


    Figure 3-25


    The Tsukamoto method


    As you can see, the process remains the same, but the Defuzzification process
    changes. Therefore, the final result of this output will be given by the following
    formula:


    ![$$ Z=\frac{W_1{Z}_1+{W}_2{Z}_2}{W_1+{W}_2} $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equaf.png)


    Since it is a weighted average approach, the process becomes very fast and hence
    time is not wasted during the detailed process of Defuzzification. The output
    of the Tsukamoto FIS is always crisp, no matter what the input types are.


    The following sample code shows the application on Tsukamoto FIS in Python, using
    the `FuzzyLite` package:


    ```

