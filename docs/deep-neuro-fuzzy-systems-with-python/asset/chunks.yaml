    ### 过拟合与欠拟合


    下一章将介绍其中一些机器学习方法，但在此之前，你必须能够判断模型性能不佳的原因。这可能是由于数据的*过拟合*或*欠拟合*导致的。


    你用来构建模型的数据只是宇宙中所有数据的一个样本。可以说，这些数据是不完整且有噪声的。因此，当训练模型时，它会尝试学习如何很好地泛化到新数据。换句话说，模型所学到的内容能否成功应用于新数据，这被称为*泛化*。


    如果模型对数据拟合得过于完美，则称为*过拟合问题*。有时数据中包含过多的细节以及大量不必要的信息。如果模型从这些高度具体的数据（尤其是细节和额外噪声）中学习，就可能导致过拟合。这会对性能产生负面影响。在欠拟合中，模型无法从数据中学习，因此无法在未见过的数据上表现良好。


    当数据集不平衡时，就会发生欠拟合和过拟合。假设对于一个二分类问题，90% 的数据来自一个类别，其余来自另一个类别。在这种情况下，模型将学习到大部分与第一类相关的内容，而与第二类相关的内容则很少。如果你训练模型过于激烈或向模型添加参数，也可能发生这种情况。


    当训练模型的时间过长时，会发生过拟合；而当模型训练时间不足时，会发生欠拟合。换句话说，如果你将模型训练到误差开始增加的程度，就可能发生过拟合。但是，如果在误差仍然很高且可以进一步降低时就停止训练模型，则可能发生欠拟合。


    解决这个问题的最佳方法是在过拟合和欠拟合之间找到完美的平衡点。图 4-12 展示了这种最佳方法。这个概念被称为*偏差-方差权衡*，将在下一节中解释。


    ![../images/479940_1_En_4_Chapter/479940_1_En_4_Fig12_HTML.jpg](img/479940_1_En_4_Fig12_HTML.jpg)


    图 4-12


    过拟合与欠拟合


    ### 偏差与方差


    当模型在训练时对训练数据关注甚少，那么它就会成为一个有偏差的模型。在这种情况下，预测值与原始值之间的差异会变得相当大。换句话说，误差很大。


    当模型发生过拟合时，即对数据（包括噪声和细节）给予了过多关注，模型的方差会变得很高。因此，在这种情况下，模型在训练数据上表现非常好，但在未见过的数据上表现不佳。


    为了解决这些问题，我们使用*偏差-方差权衡*的概念。在这种情况下，我们试图找到一种折中方法，使得偏差和方差都不高。换句话说，我们试图避免数据出现过拟合和欠拟合。图
    4-13 展示了偏差和方差如何与过拟合和欠拟合的概念相关联。


    ![../images/479940_1_En_4_Chapter/479940_1_En_4_Fig13_HTML.jpg](img/479940_1_En_4_Fig13_HTML.jpg)


    图 4-13


    偏差与方差


    以下是一些可用于解决过拟合问题的方法。


    *   添加交叉验证

    *   使用更多数据进行训练

    *   移除特征

    *   提前停止训练

    *   添加正则化

    *   使用集成学习的概念


    你可以通过以下方法解决欠拟合问题：


    *   添加特征

    *   使用更多数据进行训练

    *   增加训练时间

    *   移除正则化


    ## 总结


    本章介绍了理解机器学习以及模糊神经网络架构所需的基础知识。我们讨论了监督学习和无监督学习方法，以及机器学习在分类和回归问题中的应用。本章还讨论了针对这两种问题的不同准确性度量指标，以及如何在
    Python 中应用它们。


    下一章将详细讨论其中一些机器学习算法。你将学习如何应用本章讨论的大部分概念。'
- fmt: '# 5. Artificial Neural Networks


    The previous chapter discussed various terminology related to Machine Learning
    and some of the metrics used to check the accuracy of the model. This chapter
    discusses the concepts of neural networks.


    This chapter begins by explaining artificial neural networks and their components.
    It covers some of these components in detail, like activation functions, layers,
    etc. It then covers some of the advanced architectures of neural networks, like
    convolutional neural networks, recurrent neural networks, long short-term memory,
    and gated recurrent units. It also shows some applications of these concepts in
    Python.


    ## Artificial Neural Networks Primer


    Artificial neural networks (ANNs) are inspired by the functioning of biological
    neurons. Core Machine Learning algorithms use statistical concepts to learn different
    patterns present in the data. ANNs try to mimic human brain and neurons as much
    as possible to learn patterns. By using the mathematical techniques of linear
    algebra and calculus, ANNs learn from the data and try to find patterns.


    An ANN consists of the following layers:


    - Input layer

    - Hidden layer

    - Output layer


    The input layer contains the examples with which you want to train the network.
    All the data you have, with which you want to make the system learn, is provided
    to the input layer. Training the network means that the machine tries to find
    all the possible patterns present in the data and then learn it. The benefit of
    training is that when you give a new set of data, the machine tries to apply the
    learned patterns to the new set. If the patterns match, a decision is made based
    on what was done to the training data following this pattern.


    Hidden layers try to look at different combinations of the input layer and decide
    which of them is important, and how much importance should be given to them. They
    do this with the help of weights. Therefore, you can say that the hidden layers
    take weighted input.


    Once all the processing is done, the output layer computes all the outputs of
    the program and provides the results. Figure [5-1](#479940_1_En_5_Chapter.xhtml#Fig1)
    shows the basic representation of all three layers.


    Neural networks operate by applying the concepts of forward and backpropagation.
    Therefore, it is imperative that you understand these concepts before moving on
    to ANN architectures in detail.


    The graph in Figure [5-1](#479940_1_En_5_Chapter.xhtml#Fig1) is also called a
    computational graph. Each node in the graph is represented by a circle and represents
    a variable. This variable can be a scalar, vector, or tensor. Sometimes it can
    also be another variable. Each node is computed by applying some operation on
    the previous node. Therefore, in Figure [5-1](#479940_1_En_5_Chapter.xhtml#Fig1),
    the hidden nodes are computed from input nodes and the output nodes are computed
    from the hidden nodes. This process where the output node is computed by the operations
    of previous nodes and the information provided from the input nodes are passed
    right to the output node is called *forward propagation*.


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig1_HTML.jpg](images/479940_1_En_5_Chapter/479940_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Computational graph of ANNs


    Once the output nodes are created and their values are computed using the forward
    propagation approach, there is a need to compute the gradient, which requires
    the information to flow backward from the output node to input node. This concept
    is called *backpropagation*. In neural networks, it becomes very important to
    calculate gradients using the backpropagation approach because it helps minimize
    the cost function, which leads to much better and more accurate predictions.


    Mathematically, the process of backpropagation can be represented by:


    ![$$ {\varDelta}_xf\left(x,y\right) $$](images/479940_1_En_5_Chapter/479940_1_En_5_Chapter_TeX_Equa.png)


    You can calculate the gradient of a function `f()`, where `x` is the set of variables
    whose derivatives are required and `y` are the variables whose derivatives are
    not required (for example, input nodes). In learning algorithms like neural networks,
    this output function is called a *cost function*, and it’s represented by:


    ![$$ J\left(\theta \right) $$](images/479940_1_En_5_Chapter/479940_1_En_5_Chapter_TeX_Equb.png)


    For a binary classification problem, the loss function `J(θ)` can be defined as
    follows:


    ![$$ J\left(\theta \right)=-\frac{1}{N}{\sum}_{i=1}^Ny\ast \mathit{\log}\left(p(y)\right)+\left(1-y\right)\ast
    \mathit{\log}\left(p\left(1-y\right)\right) $$](images/479940_1_En_5_Chapter/479940_1_En_5_Chapter_TeX_Equc.png)


    So this equation is differentiated with respect to the input nodes, until the
    time when the loss value is minimum. This minimum value is known by reaching a
    minimum point, called the global minima, in the gradient descent process. Figure
    [5-2](#479940_1_En_5_Chapter.xhtml#Fig2) shows the gradient descent process.


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig2_HTML.jpg](images/479940_1_En_5_Chapter/479940_1_En_5_Fig2_HTML.jpg)


    Figure 5-2


    Gradient descent


    Every time you differentiate the cost function to find the gradients, you move
    down the parabolic curve shown in Figure [5-2](#479940_1_En_5_Chapter.xhtml#Fig2).
    The aim of backpropagation is to reach a point at the bottom of the curve where
    the value of the loss function is at a minimum. As the value becomes minimum,
    you find the values of variables that gave that value. In the case of neural networks,
    these variables are called *weights* and *bias*. You use these variables to predict
    the next set of values in the test set.


    Keeping these concepts in mind, it''s time to dive deeper into ANNs. ANNs can
    be classified into two types:


    - Perceptrons

    - Multi-layer ANNs


    The next sections explain these two ANNs and then the chapter moves forward to
    explain some of the complex neural network architectures used in the domain of
    computer vision and natural language processing.


    ## Perceptrons


    A *perceptron* is a single-layered neural network, which means it only has the
    input layer. Using different parameters, you can get the output. Its architecture
    may look like Figure [5-3](#479940_1_En_5_Chapter.xhtml#Fig3).


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig3_HTML.jpg](images/479940_1_En_5_Chapter/479940_1_En_5_Fig3_HTML.jpg)


    Figure 5-3


    Typical perceptron architecture


    Perceptron is mainly used as a linear (binary) classifier. A binary classifier
    classifies the input into only two categories. A perceptron consists of the following
    parts, as depicted in Figure [5-3](#479940_1_En_5_Chapter.xhtml#Fig3):


    - Input layer

    - Weights and bias parameters

    - Summation of weighted inputs

    - Applying activation/step function on the weighted sum to get the output


    So, in a perceptron, all the inputs are multiplied with the learned weights (`w`).
    These weights are learned through the process of backpropagation. The summation
    of the weighted input takes place and the output is passed to the activation function,
    which provides the final output. There are different types of activation functions,
    which give different outputs based on the formula. To get a binary classification,
    you use the sigmoid or ReLU activation functions. Before you move further to multi-layered
    perceptrons, take a look at activation functions.'
  raw: '# 5. Artificial Neural Networks


    The previous chapter discussed various terminology related to Machine Learning
    and some of the metrics used to check the accuracy of the model. This chapter
    discusses the concepts of neural networks.


    This chapter begins by explaining artificial neural networks and their components.
    It covers some of these components in detail, like activation functions, layers,
    etc. It then covers some of the advanced architectures of neural networks, like
    convolutional neural networks, recurrent neural networks, long short-term memory,
    and gated recurrent units. It also shows some applications of these concepts in
    Python.


    ## Artificial Neural Networks Primer


    Artificial neural networks (ANNs) are inspired by the functioning of biological
    neurons. Core Machine Learning algorithms use statistical concepts to learn different
    patterns present in the data. ANNs try to mimic human brain and neurons as much
    as possible to learn patterns. By using the mathematical techniques of linear
    algebra and calculus, ANNs learn from the data and try to find patterns.


    An ANN consists of the following layers:


    *   Input layer


    *   Hidden layer


    *   Output layer


    The input layer contains the examples with which you want to train the network.
    All the data you have, with which you want to make the system learn, is provided
    to the input layer. Training the network means that the machine tries to find
    all the possible patterns present in the data and then learn it. The benefit of
    training is that when you give a new set of data, the machine tries to apply the
    learned patterns to the new set. If the patterns match, a decision is made based
    on what was done to the training data following this pattern.


    Hidden layers try to look at different combinations of the input layer and decide
    which of them is important, and how much importance should be given to them. They
    do this with the help of weights. Therefore, you can say that the hidden layers
    take weighted input.


    Once all the processing is done, the output layer computes all the outputs of
    the program and provides the results. Figure [5-1](#479940_1_En_5_Chapter.xhtml#Fig1)
    shows the basic representation of all three layers.


    Neural networks operate by applying the concepts of forward and backpropagation.
    Therefore, it is imperative that you understand these concepts before moving on
    to ANN architectures in detail.


    The graph in Figure [5-1](#479940_1_En_5_Chapter.xhtml#Fig1) is also called a
    computational graph. Each node in the graph is represented by a circle and represents
    a variable. This variable can be a scalar, vector, or tensor. Sometimes it can
    also be another variable. Each node is computed by applying some operation on
    the previous node. Therefore, in Figure [5-1](#479940_1_En_5_Chapter.xhtml#Fig1),
    the hidden nodes are computed from input nodes and the output nodes are computed
    from the hidden nodes. This process where the output node is computed by the operations
    of previous nodes and the information provided from the input nodes are passed
    right to the output node is called *forward propagation* .


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig1_HTML.jpg](images/479940_1_En_5_Chapter/479940_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Computational graph of ANNs


    Once the output nodes are created and their values are computed using the forward
    propagation approach, there is a need to compute the gradient, which requires
    the information to flow backward from the output node to input node. This concept
    is called *backpropagation* . In neural networks, it becomes very important to
    calculate gradients using the backpropagation approach because it helps minimize
    the cost function, which leads to much better and more accurate predictions.


    Mathematically, the process of backpropagation can be represented by:


    ![$$ {\varDelta}_xf\left(x,y\right) $$](images/479940_1_En_5_Chapter/479940_1_En_5_Chapter_TeX_Equa.png)


    You can calculate the gradient of a function f(), where x is the set of variables
    whose derivatives are required and y are the variables whose derivatives are not
    required (for example, input nodes). In learning algorithms like neural networks,
    this output function is called a *cost function* , and it’s represented by:


    ![$$ J\left(\theta \right) $$](images/479940_1_En_5_Chapter/479940_1_En_5_Chapter_TeX_Equb.png)


    For a binary classification problem, the loss function *J*(*θ*) can be defined
    as follows:


    ![$$ J\left(\theta \right)=-\frac{1}{N}{\sum}_{i=1}^Ny\ast \mathit{\log}\left(p(y)\right)+\left(1-y\right)\ast
    \mathit{\log}\left(p\left(1-y\right)\right) $$](images/479940_1_En_5_Chapter/479940_1_En_5_Chapter_TeX_Equc.png)


    So this equation is differentiated with respect to the input nodes, until the
    time when the loss value is minimum. This minimum value is known by reaching a
    minimum point, called the global minima, in the gradient descent process. Figure
    [5-2](#479940_1_En_5_Chapter.xhtml#Fig2) shows the gradient descent process.


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig2_HTML.jpg](images/479940_1_En_5_Chapter/479940_1_En_5_Fig2_HTML.jpg)


    Figure 5-2


    Gradient descent


    Every time you differentiate the cost function to find the gradients, you move
    down the parabolic curve shown in Figure [5-2](#479940_1_En_5_Chapter.xhtml#Fig2).
    The aim of backpropagation is to reach a point at the bottom of the curve where
    the value of the loss function is at a minimum. As the value becomes minimum,
    you find the values of variables that gave that value. In the case of neural networks,
    these variables are called *weights* and *bias* . You use these variables to predict
    the next set of values in the test set.


    Keeping these concepts in mind, it''s time to dive deeper into ANNs. ANNs can
    be classified into two types:


    *   Perceptrons


    *   Multi-layer ANNs


    The next sections explain these two ANNs and then the chapter moves forward to
    explain some of the complex neural network architectures used in the domain of
    computer vision and natural language processing.


    ## Perceptrons


    A *perceptron* is a single-layered neural network, which means it only has the
    input layer. Using different parameters, you can get the output. Its architecture
