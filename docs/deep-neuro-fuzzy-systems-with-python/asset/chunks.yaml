- fmt: '### Center of Gravity Method or Centroid Method


    This method considers the entire Fuzzy Output and finds the centroid of it to
    give you the Defuzzified output. This can be represented by the following formula:


    ![$$ {z}^{\ast }=\frac{\int {\mu}_A(z).z. dz}{\int {\mu}_A(z). dz} $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equr.png)


    For a discrete set of values, the formula is revised as follows:


    ![$$ {z}^{\ast }=\frac{\sum_{i=1}^n{A}_i\ast {x}_i}{\sum_{i=1}^n{A}_i} $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equs.png)


    where `A` represents the sub-areas and `x` represents the centroid.


    You can better understand this concept with the help of Figure [3-14](#479940_1_En_3_Chapter.xhtml#Fig14).


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig14_HTML.jpg](images/479940_1_En_3_Chapter/479940_1_En_3_Fig14_HTML.jpg)


    **Figure 3-14** COG method


    You can see in the diagram in Figure [3-14](#479940_1_En_3_Chapter.xhtml#Fig14)
    that the membership functions can be divided into six separate areas. When you’re
    using the Center of Gravity method, you need to determine the centroid and the
    areas of each specific sub-area. Start by determining the areas:


    *   The total area of sub-area 6 is `½ ∗ 2 ∗ 0.5 = 0.5`

    *   The total area of sub-area 5 is `(7-3) ∗ 0.5 = 4 ∗ 0.5 = 2`

    *   The total area of the sub-area 4 is `½ ∗ (7.5-7) ∗ 0.2 = 0.5 ∗ 0.5 ∗ 0.2 =
    .05`

    *   The total area of sub-area 3 is `0.5 ∗ 0.3 = .15`

    *   The total area of sub-area 2 is `0.5 ∗ 0.3 = .15`

    *   The total area of sub-area 1 is `½ ∗ 1 ∗ 0.3 = .15`


    The second step is to determine the centroid:


    *   The centroid of sub-area 6 is `(1+3+3)/3 = 7/3 = 2.333`

    *   The centroid of sub-area 5 is `(7+3)/2 = 10/2 = 5`

    *   The centroid of sub-area 4 is `(7+7+7.5)/3 = 21.5/3 = 7.166`

    *   The centroid of sub-area 3 is `(7+7.5)/2 = 14.5/2 = 7.25`

    *   The centroid of sub-are 2 is `(7.5+8)/2 = 15.5/2 = 7.75`

    *   The centroid of sub-area 1 is `(8+8+9)/3 = 25/3 = 8.333`


    Now, using the formula that you already learned about, you can get the Defuzzified
    value as follows:


    ![$$ \frac{1.665+10+0.3583+1.0875+1.1625+1.2499}{0.5+2+0.05+0.15+0.15+0.15}=5.008
    $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equt.png)


    Therefore, `z`^*`=5.008`.


    ### Weighted Average Method


    This method is considered faster in computation and is mainly used in the Sugeno
    and Tsukamoto Fuzzy Inference Systems. It is represented by the following formula:


    ![$$ {Z}^{\ast }=\frac{\sum {\mu}_A\left(\underset{\_}{Z}\right).\underset{\_}{Z}}{\sum
    {\mu}_A\left(\underset{\_}{Z}\right)} $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equu.png)


    Figure [3-15](#479940_1_En_3_Chapter.xhtml#Fig15) shows this Defuzzification method.


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig15_HTML.jpg](images/479940_1_En_3_Chapter/479940_1_En_3_Fig15_HTML.jpg)


    **Figure 3-15** Weighted average method


    The diagram in Figure [3-15](#479940_1_En_3_Chapter.xhtml#Fig15) shows four triangular
    Fuzzy Sets with different membership values. You need to Defuzzify them to a crisp
    value using the weighted average method. For this, you use the discrete weighted
    average Defuzzification formula:


    ![$$ {z}^{\ast }=\frac{\sum_{i=1}^n\mu (x)\ast {x}_i}{\sum_{i=1}^n\mu (x)} $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equv.png)


    where `x` represents the element having the maximum membership function. You will
    get the following results when you apply the formula:


    ![$$ \frac{60\ast 0.6+70\ast 0.4+80\ast 0.2+90\ast 0.2}{0.6+0.4+0.2+0.2}=70 $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equw.png)


    ### Center of Sum Method


    The Center of Sum Method has the following properties:


    *   It is one of the fastest Defuzzification approaches.

    *   It is not limited to symmetric membership functions, unlike other methods.
    It can be applied to non-symmetric membership functions as well.


    This method can be represented by the following formula:


    ![$$ {z}^{\ast }=\frac{\int \underset{\_}{z}{\sum}_{k=1}^n{\mu}_A(Z) dz}{\int
    {\sum}_{k=1}^n{\mu}_A(Z) dz} $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equx.png)


    `Z` is the distance of the centroid from each membership function.


    The Defuzzified value, when you take discrete elements into consideration, is
    given by this formula:


    ![$$ {z}^{\ast }=\frac{\sum_{i=1}^n{\mathrm{x}}_i{\sum}_{k=1}^n{\mu}_{A_k}\left({x}_i\right)}{\sum_{i=1}^n{\sum}_{k=1}^n{\mu}_{A_k}\left({x}_i\right)}
    $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equy.png)


    For example, you can use the same example used for the Center of Gravity approach
    (see Figure [3-16](#479940_1_En_3_Chapter.xhtml#Fig16)).


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig16_HTML.jpg](images/479940_1_En_3_Chapter/479940_1_En_3_Fig16_HTML.jpg)


    **Figure 3-16** Center of Sum method


    You have two Fuzzy membership functions, therefore you have to consider two areas.


    ![$$ {A}_1=\frac{1}{2}\ast \left[\left(9-3\right)+\left(8-4\right)\right]\ast
    0.3=\frac{3}{2}=1.5 $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equz.png)


    ![$$ {A}_2=\frac{1}{2}\ast \left[\left(8-1\right)+\left(7-3\right)\right]\ast
    0.5=\frac{55}{20}=2.75 $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equaa.png)


    Therefore, the Defuzzified value will be:


    ![$$ \frac{2.75\ast 5+1.5\ast 6}{2.75+1.5}=5.35 $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equab.png)


    This section doesn’t cover all the available Defuzzifiers. The next section starts
    with the Fuzzy Inference Systems. You will see the Python applications of different
    Fuzzifiers in that section.


    ## Fuzzy Inference Systems


    When you have to design a system that is quite uncertain, one of the best approaches
    is using Fuzzy Inference Systems. Fuzzy Logic is used when you have a fixed set
    of rules and need to create systems based on that. But, when you add uncertainties
    inside the process, it requires some kind of inference of the process from the
    existing data. Using a Fuzzy Inference System is the way to infer those processes.


    A Fuzzy Inference System (FIS) provides a way of mapping an input space to an
    output space with Fuzzy Logic. FIS tries to mimic the process with which humans
    solve any problem statement using reasoning. FIS does that by using Fuzzy Logic,
    especially Fuzzy If-Then rules. Figure [3-17](#479940_1_En_3_Chapter.xhtml#Fig17)
    represents the Fuzzy Inference System structure.


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig17_HTML.jpg](images/479940_1_En_3_Chapter/479940_1_En_3_Fig17_HTML.jpg)


    **Figure 3-17** Fuzzy Inference System process


    All the blocks in the diagram in Figure [3-17](#479940_1_En_3_Chapter.xhtml#Fig17)
    are explained here:


    *   A database of all the Fuzzy If-Then Rules describing a system

    *   Database of membership functions

    *   Inference operations on Fuzzy Rules

    *   Defuzzification of Fuzzy Results into crisp outputs


    When you combine all the rules and the membership functions database, it is called
    a *knowledge base*.


    Now that you know the basic structure of the Fuzzy Inference System, you can look
    at some of its types. Fuzzy Inference Systems can be divided into three types:


    *   Mamdani model

    *   Takagi-Sugeno model

    *   Tsukamoto model'
  raw: '### Center of Gravity Method or Centroid Method


    This method considers the entire Fuzzy Output and finds the centroid of it to
    give you the Defuzzified output. This can be represented by the following formula:


    ![$$ {z}^{\ast }=\frac{\int {\mu}_A(z).z. dz}{\int {\mu}_A(z). dz} $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equr.png)


    For a discrete set of values, the formula is revised as follows:


    ![$$ {z}^{\ast }=\frac{\sum_{i=1}^n{A}_i\ast {x}_i}{\sum_{i=1}^n{A}_i} $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equs.png)


    where A represents the sub-areas and x represents the centroid.


    You can better understand this concept with the help of Figure [3-14](#479940_1_En_3_Chapter.xhtml#Fig14).


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig14_HTML.jpg](images/479940_1_En_3_Chapter/479940_1_En_3_Fig14_HTML.jpg)


    Figure 3-14


    COG method


    You can see in the diagram in Figure [3-14](#479940_1_En_3_Chapter.xhtml#Fig14)
    that the membership functions can be divided into six separate areas. When you’re
    using the Center of Gravity method, you need to determine the centroid and the
    areas of each specific sub-area. Start by determining the areas:


    *   The total area of sub-area 6 is ½ ∗ 2 ∗ 0.5 = 0.5


    *   The total area of sub-area 5 is (7-3) ∗ 0.5 = 4 ∗ 0.5 = 2


    *   The total area of the sub-area 4 is ½ ∗ (7.5-7) ∗ 0.2 = 0.5 ∗ 0.5 ∗ 0.2 =.05


    *   The total area of sub-area 3 is 0.5 ∗ 0.3 = .15


    *   The total area of sub-area 2 is 0.5 ∗ 0.3 = .15


    *   The total area of sub-area 1 is ½ ∗ 1 ∗ 0.3 = .15


    The second step is to determine the centroid:


    *   The centroid of sub-area 6 is (1+3+3)/3 = 7/3 = 2.333


    *   The centroid of sub-area 5 is (7+3)/2 = 10/2 = 5


    *   The centroid of sub-area 4 is (7+7+7.5)/3 = 21.5/3 = 7.166


    *   The centroid of sub-area 3 is (7+7.5)/2 = 14.5/2 = 7.25


    *   The centroid of sub-are 2 is (7.5+8)/2 = 15.5/2 = 7.75


    *   The centroid of sub-area 1 is (8+8+9)/3 = 25/3 = 8.333


    Now, using the formula that you already learned about, you can get the Defuzzified
    value as follows:


    ![$$ \frac{1.665+10+0.3583+1.0875+1.1625+1.2499}{0.5+2+0.05+0.15+0.15+0.15}=5.008
    $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equt.png)


    Therefore, *z*^∗=5.008.


    ### Weighted Average Method


    This method is considered faster in computation and is mainly used in the Sugeno
    and Tsukamoto Fuzzy Inference Systems. It is represented by the following formula:


    ![$$ {Z}^{\ast }=\frac{\sum {\mu}_A\left(\underset{\_}{Z}\right).\underset{\_}{Z}}{\sum
    {\mu}_A\left(\underset{\_}{Z}\right)} $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equu.png)


    Figure [3-15](#479940_1_En_3_Chapter.xhtml#Fig15) shows this Defuzzification method.


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig15_HTML.jpg](images/479940_1_En_3_Chapter/479940_1_En_3_Fig15_HTML.jpg)


    Figure 3-15


    Weighted average method


    The diagram in Figure [3-15](#479940_1_En_3_Chapter.xhtml#Fig15) shows four triangular
    Fuzzy Sets with different membership values. You need to Defuzzify them to a crisp
    value using the weighted average method. For this, you use the discrete weighted
    average Defuzzification formula:


    ![$$ {z}^{\ast }=\frac{\sum_{i=1}^n\mu (x)\ast {x}_i}{\sum_{i=1}^n\mu (x)} $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equv.png)


    where x represents the element having the maximum membership function. You will
    get the following results when you apply the formula,


    ![$$ \frac{60\ast 0.6+70\ast 0.4+80\ast 0.2+90\ast 0.2}{0.6+0.4+0.2+0.2}=70 $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equw.png)


    ### Center of Sum Method


    The Center of Sum Method has the following properties:


    *   It is one of the fastest Defuzzification approaches.


    *   It is not limited to symmetric membership functions, unlike other methods.
    It can be applied to non-symmetric membership functions as well.


    This method can be represented by the following formula:


    ![$$ {z}^{\ast }=\frac{\int \underset{\_}{z}{\sum}_{k=1}^n{\mu}_A(Z) dz}{\int
    {\sum}_{k=1}^n{\mu}_A(Z) dz} $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equx.png)


    ![$$ \underset{\_}{Z} $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_IEq4.png)
    is the distance of the centroid from each membership function.


    The Defuzzified value, when you take discrete elements into consideration, is
    given by this formula:


    ![$$ {z}^{\ast }=\frac{\sum_{i=1}^n{\mathrm{x}}_i{\sum}_{k=1}^n{\mu}_{A_k}\left({x}_i\right)}{\sum_{i=1}^n{\sum}_{k=1}^n{\mu}_{A_k}\left({x}_i\right)}
    $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equy.png)


    For example, you can use the same example used for the Center of Gravity approach
    (see Figure [3-16](#479940_1_En_3_Chapter.xhtml#Fig16)).


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig16_HTML.jpg](images/479940_1_En_3_Chapter/479940_1_En_3_Fig16_HTML.jpg)


    Figure 3-16


    Center of Sum method


    You have two Fuzzy membership functions, therefore you have to consider two areas.


    ![$$ {A}_1=\frac{1}{2}\ast \left[\left(9-3\right)+\left(8-4\right)\right]\ast
    0.3=\frac{3}{2}=1.5 $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equz.png)


    ![$$ {A}_2=\frac{1}{2}\ast \left[\left(8-1\right)+\left(7-3\right)\right]\ast
    0.5=\frac{55}{20}=2.75 $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equaa.png)


    Therefore, the Defuzzified value will be:


    ![$$ \frac{2.75\ast 5+1.5\ast 6}{2.75+1.5}=5.35 $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equab.png)


    This section doesn’t cover all the available Defuzzifiers. The next section starts
    with the Fuzzy Inference Systems. You will see the Python applications of different
    Fuzzifiers in that section.


    ## Fuzzy Inference Systems


    When you have to design a system that is quite uncertain, one of the best approaches
    is using Fuzzy Inference Systems. Fuzzy Logic is used when you have a fixed set
    of rules and need to create systems based on that. But, when you add uncertainties
    inside the process, it requires some kind of inference of the process from the
    existing data. Using a Fuzzy Inference System is the way to infer those processes.


    A Fuzzy Inference System (FIS) provides a way of mapping an input space to an
    output space with Fuzzy Logic. FIS tries to mimic the process with which humans
    solve any problem statement using reasoning. FIS does that by using Fuzzy Logic,
    especially Fuzzy If-Then rules. Figure [3-17](#479940_1_En_3_Chapter.xhtml#Fig17)
    represents the Fuzzy Inference System structure.


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig17_HTML.jpg](images/479940_1_En_3_Chapter/479940_1_En_3_Fig17_HTML.jpg)


    Figure 3-17


    Fuzzy Inference System process


    All the blocks in the diagram in Figure [3-17](#479940_1_En_3_Chapter.xhtml#Fig17)
    are explained here:


    *   A database of all the Fuzzy If-Then Rules describing a system


    *   Database of membership functions


    *   Inference operations on Fuzzy Rules


    *   Defuzzification of Fuzzy Results into crisp outputs


    When you combine all the rules and the membership functions database, it is called
    a *knowledge base.*


    Now that you know the basic structure of the Fuzzy Inference System, you can look
    at some of its types. Fuzzy Inference Systems can be divided into three types:


    *   Mamdani model


    *   Takagi-Sugeno model


    *   Tsukamoto model'
  trans: '

    ### 重心法（质心法）


    该方法考虑整个模糊输出，并找到其质心，从而得到解模糊化输出。这可以用以下公式表示：


    ![$$ {z}^{\ast }=\frac{\int {\mu}_A(z).z. dz}{\int {\mu}_A(z). dz} $$](img/479940_1_En_3_Chapter_TeX_Equr.png)


    对于一组离散值，公式修订如下：


    ![$$ {z}^{\ast }=\frac{\sum_{i=1}^n{A}_i\ast {x}_i}{\sum_{i=1}^n{A}_i} $$](img/479940_1_En_3_Chapter_TeX_Equs.png)


    其中 `A` 代表子区域，`x` 代表质心。


    你可以借助图 3-14 更好地理解这个概念。


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig14_HTML.jpg](img/479940_1_En_3_Fig14_HTML.jpg)


    **图 3-14** 重心法


    你可以在图 3-14 的图表中看到，隶属函数可以被划分为六个独立的区域。当使用重心法时，你需要确定每个特定子区域的质心和面积。首先确定面积：


    *   子区域 6 的总面积为 `½ ∗ 2 ∗ 0.5 = 0.5`

    *   子区域 5 的总面积为 `(7-3) ∗ 0.5 = 4 ∗ 0.5 = 2`

    *   子区域 4 的总面积为 `½ ∗ (7.5-7) ∗ 0.2 = 0.5 ∗ 0.5 ∗ 0.2 = .05`

    *   子区域 3 的总面积为 `0.5 ∗ 0.3 = .15`

    *   子区域 2 的总面积为 `0.5 ∗ 0.3 = .15`

    *   子区域 1 的总面积为 `½ ∗ 1 ∗ 0.3 = .15`


    第二步是确定质心：


    *   子区域 6 的质心为 `(1+3+3)/3 = 7/3 = 2.333`

    *   子区域 5 的质心为 `(7+3)/2 = 10/2 = 5`

    *   子区域 4 的质心为 `(7+7+7.5)/3 = 21.5/3 = 7.166`

    *   子区域 3 的质心为 `(7+7.5)/2 = 14.5/2 = 7.25`

    *   子区域 2 的质心为 `(7.5+8)/2 = 15.5/2 = 7.75`

    *   子区域 1 的质心为 `(8+8+9)/3 = 25/3 = 8.333`


    现在，使用你已经学过的公式，可以得到解模糊化值如下：


    ![$$ \frac{1.665+10+0.3583+1.0875+1.1625+1.2499}{0.5+2+0.05+0.15+0.15+0.15}=5.008
    $$](img/479940_1_En_3_Chapter_TeX_Equt.png)


    因此，`z`^*`=5.008`。


    ### 加权平均法


    该方法计算速度更快，主要用于 Sugeno 和 Tsukamoto 模糊推理系统。它由以下公式表示：


    ![$$ {Z}^{\ast }=\frac{\sum {\mu}_A\left(\underset{\_}{Z}\right).\underset{\_}{Z}}{\sum
    {\mu}_A\left(\underset{\_}{Z}\right)} $$](img/479940_1_En_3_Chapter_TeX_Equu.png)


    图 3-15 展示了这种解模糊化方法。


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig15_HTML.jpg](img/479940_1_En_3_Fig15_HTML.jpg)


    **图 3-15** 加权平均法


    图 3-15 中的图表展示了四个具有不同隶属度值的三角形模糊集。你需要使用加权平均法将它们解模糊化为一个清晰值。为此，你使用离散加权平均解模糊化公式：


    ![$$ {z}^{\ast }=\frac{\sum_{i=1}^n\mu (x)\ast {x}_i}{\sum_{i=1}^n\mu (x)} $$](img/479940_1_En_3_Chapter_TeX_Equv.png)


    其中 `x` 代表具有最大隶属函数的元素。应用该公式将得到以下结果：


    ![$$ \frac{60\ast 0.6+70\ast 0.4+80\ast 0.2+90\ast 0.2}{0.6+0.4+0.2+0.2}=70 $$](img/479940_1_En_3_Chapter_TeX_Equw.png)


    ### 求和中心法


    求和中心法具有以下特性：


    *   它是最快的解模糊化方法之一。

    *   与其他方法不同，它不限于对称隶属函数。它同样可以应用于非对称隶属函数。


    该方法可以用以下公式表示：


    ![$$ {z}^{\ast }=\frac{\int \underset{\_}{z}{\sum}_{k=1}^n{\mu}_A(Z) dz}{\int
    {\sum}_{k=1}^n{\mu}_A(Z) dz} $$](img/479940_1_En_3_Chapter_TeX_Equx.png)


    `Z` 是每个隶属函数质心的距离。


    当考虑离散元素时，解模糊化值由以下公式给出：


    ![$$ {z}^{\ast }=\frac{\sum_{i=1}^n{\mathrm{x}}_i{\sum}_{k=1}^n{\mu}_{A_k}\left({x}_i\right)}{\sum_{i=1}^n{\sum}_{k=1}^n{\mu}_{A_k}\left({x}_i\right)}
    $$](img/479940_1_En_3_Chapter_TeX_Equy.png)


    例如，你可以使用与重心法相同的例子（见图 3-16）。


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig16_HTML.jpg](img/479940_1_En_3_Fig16_HTML.jpg)


    **图 3-16** 求和中心法


    你有两个模糊隶属函数，因此需要考虑两个区域。


    ![$$ {A}_1=\frac{1}{2}\ast \left[\left(9-3\right)+\left(8-4\right)\right]\ast
    0.3=\frac{3}{2}=1.5 $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equz.png)


    ![$$ {A}_2=\frac{1}{2}\ast \left[\left(8-1\right)+\left(7-3\right)\right]\ast
    0.5=\frac{55}{20}=2.75 $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equaa.png)


    因此，解模糊化值将为：


    ![$$ \frac{2.75\ast 5+1.5\ast 6}{2.75+1.5}=5.35 $$](img/479940_1_En_3_Chapter_TeX_Equab.png)


    本节并未涵盖所有可用的解模糊器。下一节将从模糊推理系统开始。你将在该节中看到不同模糊器的 Python 应用。


    ## 模糊推理系统


    当你需要设计一个不确定性很高的系统时，最佳方法之一是使用模糊推理系统。当你有一套固定的规则并需要基于此创建系统时，会使用模糊逻辑。但是，当你在过程中加入不确定性时，就需要从现有数据中对过程进行某种推理。使用模糊推理系统就是推断这些过程的方法。


    模糊推理系统（FIS）提供了一种使用模糊逻辑将输入空间映射到输出空间的方法。FIS 试图模仿人类使用推理来解决任何问题陈述的过程。FIS 通过使用模糊逻辑，特别是模糊
    If-Then 规则来实现这一点。图 3-17 展示了模糊推理系统的结构。


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig17_HTML.jpg](img/479940_1_En_3_Fig17_HTML.jpg)


    **图 3-17** 模糊推理系统过程


    图 3-17 图表中的所有模块解释如下：


    *   描述系统的所有模糊 If-Then 规则的数据库

    *   隶属函数数据库

    *   对模糊规则进行推理操作

    *   将模糊结果解模糊化为清晰输出


    当你将所有规则和隶属函数数据库结合起来时，它被称为*知识库*。


    现在你已经了解了模糊推理系统的基本结构，可以看看它的一些类型。模糊推理系统可以分为三种类型：


    *   Mamdani 模型

    *   Takagi-Sugeno 模型

    *   Tsukamoto 模型

