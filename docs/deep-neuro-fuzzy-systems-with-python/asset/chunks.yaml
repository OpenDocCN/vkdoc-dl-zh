- fmt: '### Triangular Norms


    The intersection of two Fuzzy Sets can be represented by triangular norms (aka
    T-Norms, shown in Figure [2-18](#479940_1_En_2_Chapter.xhtml#Fig18)). If you have
    two Fuzzy Sets `A` and `B`, their intersection can be defined by:


    ![$$ {\mu}_{A\cap B}(x)=T\left({\mu}_A(x),{\mu}_B(x)\right) $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equck.png)


    This intersection operator has the following characteristics:


    - Boundary

    - Monotonicity

    - Commutativity

    - Associativity


    Boundary:


    ![$$ T\left(0,0\right)=0 $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equcl.png)


    ![$$ T\left(a,1\right)=T\left(1,a\right)=a $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equcm.png)


    Monotonicity:


    ![$$ T\left(a,b\right)\le T\left(c,d\right) ifa\le c\wedge b\le d $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equcn.png)


    Commutativity:


    ![$$ T\left(a,b\right)=T\left(b,a\right) $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equco.png)


    Associativity:


    ![$$ {\displaystyle \begin{array}{c}x,T\left(y,z\right)=T\left(T\left(x,y\right),z\right)\\
    {}T\end{array}} $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equcp.png)


    ![../images/479940_1_En_2_Chapter/479940_1_En_2_Fig18_HTML.jpg](images/479940_1_En_2_Chapter/479940_1_En_2_Fig18_HTML.jpg)


    **Figure 2-18** Minimum, Product, Lukasiewicz, and Drastic Product T-Norms


    There are different types of triangular norms used in various applications. Some
    of them are:


    Minimum T-Norm:


    ![$$ {T}_M\left(x,y\right)=\mathit{\min}\left(x,y\right) $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equcq.png)


    Product T-Norm:


    ![$$ {T}_P\left(x,y\right)=x.y $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equcr.png)


    Lukasiewicz T-Norm:


    ![$$ {T}_L\left(x,y\right)=\mathit{\max}\left(x+y-1,0\right) $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equcs.png)


    Drastic Product T-Norm (the weakest t-norm):


    ![$$ {T}_D\left(x,y\right)=\Big\{ if\left(x,y\right)\in {\left(0,1\right)}^2 otherwise
    $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equct.png)


    Out of all these triangular norms, the Drastic Product T-Norm is considered the
    smallest one, while the Minimum T-Norm is considered the largest one. The Minimum
    T-Norm treats each member as an idempotent element. The Product T-Norm is considered
    a strict T-Norm, while the Lukasiewicz is considered a nilpotent t-norm. The following
    code shows the Python implementation of these triangular norms. It finds the triangular
    norm of the two Fuzzy Sets defined earlier—full speed and slow.


    ```python

    import numpy as np

    #Defining the T-Norm Function

    def t_norm(mfx,mfy):

    tnorm = np.fmin(mfx, mfy)

    return tnorm

    #Defining sigmoidal membership function

    full_speed = fuzz.sigmf(x, 80,2)

    slow = fuzz.sigmf(x, 30,2)

    #Finding the Intersection

    t_norm(full_speed,slow)

    ```


    You have looked at the different properties of T-Norms, as well as their types.
    Later chapters include their applications. For now, one thing should be clear
    that T-Norms are used when you find the intersection between two Fuzzy Sets.


    ### Triangular Co-Norms


    The union of two Fuzzy Sets can be represented by triangular Co-Norms (aka T-Co-Norm,
    shown in Figure [2-19](#479940_1_En_2_Chapter.xhtml#Fig19)). If you have two Fuzzy
    Sets `A` and `B`, their intersection can be defined by:


    ![$$ {\mu}_{A\cup B}(x)=S\left({\mu}_A(x),{\mu}_B(x)\right) $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equcu.png)


    This intersection operator has the following characteristics:


    - Boundary

    - Monotonicity

    - Commutativity

    - Associativity


    Boundary:


    ![$$ S\left(0,0\right)=0 $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equcv.png)


    ![$$ S\left(a,0\right)=S\left(0,a\right)=a $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equcw.png)


    Monotonicity:


    ![$$ S\left(a,b\right)\le S\left(c,d\right) ifa\le c\wedge b\le d $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equcx.png)


    Commutativity:


    ![$$ S\left(a,b\right)=S\left(b,a\right) $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equcy.png)


    Associativity:


    ![$$ {\displaystyle \begin{array}{c}x,S\left(y,z\right)=S\left(S\left(x,y\right),z\right)\\
    {}S\end{array}} $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equcz.png)


    ![../images/479940_1_En_2_Chapter/479940_1_En_2_Fig19_HTML.jpg](images/479940_1_En_2_Chapter/479940_1_En_2_Fig19_HTML.jpg)


    **Figure 2-19** Maximum, Probabilistic Sum, Lukasiewicz, and Drastic Sum Bounded
    T-Co-Norms


    There are different types of triangular co-norms used in various applications.
    Some of them are:


    Maximum T-Co-Norm:


    ![$$ {S}_M\left(x,y\right)=\mathit{\max}\left(x,y\right) $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equda.png)


    Probabilistic Sum T-Co-Norm:


    ![$$ {S}_P\left(x,y\right)=x+y-x.y $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equdb.png)


    Lukasiewicz T-Co-Norm:


    ![$$ {S}_L\left(x,y\right)=\mathit{\min}\left(x+y,1\right) $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equdc.png)


    Drastic Sum Bounded Sum T-Co-Norm (Strongest T-Co-Norm):


    ![$$ {S}_D\left(x,y\right)=\Big\{ if\left(x,y\right)\in {\left(0,1\right)}^2 $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equdd.png)


    ![$$ \mathit{\max}\left(x,y\right) otherwise $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equde.png)


    The following code shows the Python implementation of these Triangular Co-Norms.
    It finds the triangular Co-Norm of the two Fuzzy Sets defined before—full speed
    and slow.


    ```python

    import numpy as np

    #Defining the T-Conorm Function

    def t_conorm(mfx,mfy):

    tnorm = np.fmax(mfx, mfy)

    return tnorm

    #Defining sigmoidal membership function

    full_speed = fuzz.sigmf(x, 80,2)

    slow = fuzz.sigmf(x, 30,2)

    #Finding the Intersection

    t_conorm(full_speed,slow)

    ```


    ## Summary


    This chapter explained membership functions in detail. It covered the different
    types of membership functions and explained how they are used. Because it’s sometimes
    tricky to determine which membership function to use, this chapter discussed a
    few approaches. The chapter also applied every membership function in Python.
    It then moved on to Fuzzy Rules and explained how they are applied. The chapter
    concluded by explaining the Fuzzy T-Norm and T-Co-Norm operators.


    The next chapter discusses the Fuzzy Inference System in detail. The chapter discusses
    how all these processes are used and how they form a complete structure.


    # 3. Fuzzy Inference Systems


    The previous two chapters explained the core concepts related to Fuzzy Logic.
    They discussed Fuzzy Sets and how they are different from the classical/crisp
    sets. You also learned about various operations that can be done on them and their
    properties. Then you learned about membership functions, which define the membership
    values of each element present in a Fuzzy Set. You learned about the different
    types of membership functions. Later, you learned about the Fuzzy Rules and reasoning
    approaches that utilize the concepts of membership functions to give various Fuzzy
    Solutions.


    This chapter looks at real applications of all the concepts that you have learned
    so far. The chapter covers different types of Fuzzy Inference Systems, through
    which various real-life problems are solved in the industry. To understand these
    systems, you first need to understand the processes of Fuzzification and Defuzzification.
    You have already seen the Fuzzification process in the previous chapter, when
    you found the membership function values of each element of a set to make it a
    member of a Fuzzy Set. This chapter starts with the concept of Defuzzification
    and then moves on to different Fuzzy Inference Systems.'
