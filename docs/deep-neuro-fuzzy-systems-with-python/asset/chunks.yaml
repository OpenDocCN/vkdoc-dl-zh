  trans: '

    # 回归机器学习问题


    试图根据数据预测实际数值的机器学习模型属于回归机器学习问题的范畴（见图 4-3）。以下是一些回归问题的示例：


    ![../images/479940_1_En_4_Chapter/479940_1_En_4_Fig3_HTML.jpg](img/479940_1_En_4_Fig3_HTML.jpg)


    图 4-3


    回归


    * 预测股票市场价格

    * 预测公司下一季度的收入

    * 寻找自动驾驶汽车的最佳速度


    无论是分类问题还是回归问题，机器学习模型总是从经验中学习。下一节将解释*经验*的确切含义。


    ## 经验


    对于机器学习模型而言，经验就是你提供给它的数据，模型从中学习隐藏的模式，然后解决问题。提供给模型的数据与你期望模型解决的问题类型相关。当谈到从数据中学习与分类和回归问题相关的内容时，数据中除了你想要预测或分类的特征外，还包含不同的特征。例如，如果你想预测股票价格或对股票价格走势进行分类，你可能会拥有包含不同特征的数据，例如某只特定股票的最高价、最低价、开盘价和收盘价信息。还会提供该股票过去的价格走势或历史价格信息。因此，模型会查看整个数据集，然后查看该特定时间点的实际值。基于此，它学习所有变量之间的关系。一旦学习过程完成，并且你提供了新数据，模型就会查看所有新特征，理解它们之间的关系，然后尝试预测或分类新数据。


    你正在预测或分类的这个值被称为*目标变量*或*因变量*（例如，`Y`）。所有其他变量被称为*自变量*（例如，`x`）。可以说，目标变量是所有自变量的函数，如下所示。该函数可以是线性的或非线性的。图
    4-4 展示了梯度下降图，这是一种学习算法。


    `Y = f(X)`


    ![../images/479940_1_En_4_Chapter/479940_1_En_4_Fig4_HTML.jpg](img/479940_1_En_4_Fig4_HTML.jpg)


    图 4-4


    学习图（梯度下降）


    在分类和回归问题中，数据总是包含一个因变量，即你想要预测或分类的变量。机器学习中有一个领域不提供因变量。这些问题属于聚类或关联类型。因此，根据可用的数据，机器学习方法分为两个领域：


    * 监督学习

    * 无监督学习


    ### 监督学习与无监督学习


    如果你在别人的搀扶下过马路，这可以称为监督方法。但是，如果你开始在没有他人帮助的情况下过马路，这就是无监督方法。从这个例子中可以得到启示，可以说监督学习方法包含含有因变量的数据。这时模型会查看输入和输出变量，并尝试学习它们之间的关系。


    在无监督学习中，数据不包含目标变量（`Y`，如监督学习中所述）。它必须查看数据集，然后找出它们之间的相似性/差异性/模式。基于此，你可以采用不同的无监督学习方法。你已经了解了监督学习方法，即分类和回归。无监督学习方法包括聚类、分解和关联。图
    4-5 直观地展示了这两种问题陈述。


    ![../images/479940_1_En_4_Chapter/479940_1_En_4_Fig5_HTML.jpg](img/479940_1_En_4_Fig5_HTML.jpg)


    图 4-5


    监督学习与无监督学习


    以下算法使用监督学习方法：


    * 线性/逻辑回归

    * K-近邻

    * 朴素贝叶斯定理

    * 决策树

    * 集成树

    * 支持向量机

    * 神经网络


    以下算法使用无监督学习方法：


    * 层次聚类

    * K-均值聚类

    * Apriori 规则

    * 神经网络


    一旦你决定了机器学习模型需要解决哪种问题，并从这些列表中选择了一个算法，就进入了下一个阶段，即评估模型的性能。


    ## 性能度量


    模型准备好后，就需要确保能得到准确的结果。为此，你需要根据模型试图解决的问题（分类或回归）来衡量模型的性能。


    对于分类问题，以下是常用的一些度量指标：


    * 准确率

    * 精确率

    * 召回率或灵敏度

    * F1 分数

    * 混淆矩阵


    对于回归问题，以下是常用的一些指标：


    * 均方根误差

    * AIC

    * R2 分数


    接下来的章节将使用泰坦尼克号和房价数据集来讨论这些度量和指标。

    '
- fmt: '# Understanding Titanic and House Price Datasets


    This section explains the accuracy measures using the two datasets available in
    the public domain—the Titanic and House Price datasets. You will use the Titanic
    dataset to learn about the classification measures and the House Price dataset
    for regression measures. You can download both datasets from Kaggle. Here are
    the links that you can follow for the downloads:


    [`https://www.kaggle.com/c/titanic/data`](https://www.kaggle.com/c/titanic/data)


    [`https://www.kaggle.com/alphaepsilon/housing-prices-dataset`](https://www.kaggle.com/alphaepsilon/housing-prices-dataset)


    Remember, you’ll need to register at `kaggle.com` to use these datasets.


    Assuming that the datasets have been downloaded, you’ll start by understanding
    and exploring the Titanic dataset in Python. The Titanic dataset contains information
    about the people who survived the sinking of the Titanic, as well as the people
    who died. The main aim of this dataset is to help determine the likelihood of
    survival based on the information you report about a person (such as age, gender,
    class of ticket purchased, etc.). Let’s look at the features in this dataset by
    loading it in Python.


    ```

    #Reading data

    import pandas as pd

    data = pd.read_csv("train.csv")

    data.head()

    ```


    Once you execute this code, you’ll get top five rows of the entire dataset, as
    shown in Figure [4-6](#479940_1_En_4_Chapter.xhtml#Fig6).


    ![../images/479940_1_En_4_Chapter/479940_1_En_4_Fig6_HTML.jpg](images/479940_1_En_4_Chapter/479940_1_En_4_Fig6_HTML.jpg)


    Figure 4-6


    Titanic dataset


    In total, there are 11 columns in this dataset. (A subset of an entire database
    is called a *dataset*.) Here’s an explanation of the columns:


    *   `Survived`: 1 means the person survived, 0 means the person did not survive

    *   `Pclass`: Passenger’s class

    *   `Name`: Passenger’s name

    *   `Sex`: Passenger’s sex

    *   `Age`: Passenger’s age

    *   `SibSp`: Number of siblings/spouses aboard

    *   `Parch`: Number of parents/children aboard

    *   `Ticket`: Ticket number

    *   `Fare`: Amount paid for the tickets

    *   `Cabin`: Cabin

    *   `Embarked`: Port of embarkation


    Since the dataset classifies whether a person survived the incident or not, `Survived`
    is the dependent variable. The others are independent variables. You will use
    this dataset for all the classification measures in the next section. Let’s move
    on to the Housing Price dataset.


    Using the House Price dataset (see Figure [4-7](#479940_1_En_4_Chapter.xhtml#Fig7)),
    you can predict the price of house based on different features. This dataset contains
    81 columns, with `SalePrice` as the dependent variable. You can explore the dataset
    using the following Python statements:


    ![../images/479940_1_En_4_Chapter/479940_1_En_4_Fig7_HTML.jpg](images/479940_1_En_4_Chapter/479940_1_En_4_Fig7_HTML.jpg)


    Figure 4-7


    House Price dataset


    ```

    #Reading data

    import pandas as pd

    data = pd.read_csv("train_hp.csv")

    data.head()

    ```


    This example uses the 80 columns to predict the target variable, `SalePrice`.
    Before moving to the measures, you must also understand the different types of
    splits in data.


    ## Different Types of Data (Datasets)


    Machine Learning generally has three types of datasets (see Figure [4-8](#479940_1_En_4_Chapter.xhtml#Fig8)):


    ![../images/479940_1_En_4_Chapter/479940_1_En_4_Fig8_HTML.jpg](images/479940_1_En_4_Chapter/479940_1_En_4_Fig8_HTML.jpg)


    Figure 4-8


    Dataset partition


    *   Training set

    *   Validation set

    *   Test set


    You’ll get the entire database as one single file. It can be in any format, including
    CSV, XLSX, SQL, etc. This example divides this data into three parts. The training
    set consists of the data with which the model learns. The validation set is where
    you test the performance of the model. The main data is also split into two parts.
    The first part contains most of the data and is called the training set and the
    remaining data is the validation set. The test set is totally unseen data. This
    is where you accept or reject the model. This is similar to the validation set,
    but the data is not a part of the training set. It’s a totally new set of data
    that you get from the new source.


    The next section discusses different types of performance measures. Later sections
    will discuss these sets more as well.


    ## Classification Problems: Measures


    ### Confusion Matrix


    Once you apply the model to the test data, you get the confusion matrix, by which
    you can determine the performance of the model. In the Titanic dataset, you have
    a binary classification problem, whereby you want to classify whether a person
    survived or not. The confusion matrix in that case will look like Figure [4-9](#479940_1_En_4_Chapter.xhtml#Fig9).


    ![../images/479940_1_En_4_Chapter/479940_1_En_4_Fig9_HTML.jpg](images/479940_1_En_4_Chapter/479940_1_En_4_Fig9_HTML.jpg)


    Figure 4-9


    Confusion matrix


    In a binary confusion matrix, you have two rows and two columns. Rows contain
    the actual values present in the test data, while columns contain the predicted
    value of the model. You can then determine how many times the model predicted
    the right results and how many times the wrong results were predicted.


    There are 50 instances where NO was predicted and the actual value was also NO.
    There are 100 instances where YES was predicted and the actual data was YES. But
    there are also 10 instances where the predicted was YES and the actual data was
    NO, as well as 5 instances where the predicted data was NO and the actual data
    was YES. Therefore, you can say that most of the time, the model gives accurate
    results, but there are chances of errors. If you quantify the table, you come
    to different accuracy measures. But, before moving to those metrics, you first
    need to understand the different terminologies related to the confusion matrix.


    *   True Positives: If it’s actually YES, how often the model predicts YES.

    *   True Negatives: If it’s actually NO, how often the model predicts YES.

    *   False Positives (Type I Error): If it’s actually NO, how often the model predicts
    NO.

    *   False Negatives (Type II Error): If it’s actually YES, how often the model
    predicts NO.


    ### Accuracy


    This is the overall accuracy of the model. It’s determined using this formula:


    ![$$ accuracy=\frac{True\ Positive+ True\ Negative}{True\ Positive+ False\ Positive+
    True\ Negative+ False\ Negative} $$](images/479940_1_En_4_Chapter/479940_1_En_4_Chapter_TeX_Equa.png)


    #### True Negative Rate


    TNR represents the negatives that are correctly classified. It is also called
    the specificity of the model. You can get the True Negative Rate of a model by
    using this formula:


    ![$$ specificity=\frac{True\ Negative}{False\ Positive+ True\ Negative\ } $$](images/479940_1_En_4_Chapter/479940_1_En_4_Chapter_TeX_Equb.png)


    #### Recall or True Positive Rate


    If you want to know how many instances have been misclassified as false negatives,
    then you are looking for recall. It is also called the true positive rate or sensitivity.
    You can get the recall of a model by using the formula:


    ![$$ \boldsymbol{recall}=\frac{\boldsymbol{True}\ \boldsymbol{Positive}}{\boldsymbol{True}\
    \boldsymbol{Positive}+\boldsymbol{False}\ \boldsymbol{Negative}} $$](images/479940_1_En_4_Chapter/479940_1_En_4_Chapter_TeX_Equc.png)


    #### Precision


    If you want to know how many instances have been misclassified as false positives,
    you are looking for precision. You can get the precision of a model by using the
    formula:


    ![$$ \boldsymbol{precision}=\frac{\boldsymbol{True}\ \boldsymbol{Positive}}{\boldsymbol{True}\
    \boldsymbol{Positive}+\boldsymbol{False}\ \boldsymbol{Positive}} $$](images/479940_1_En_4_Chapter/479940_1_En_4_Chapter_TeX_Equd.png)'
