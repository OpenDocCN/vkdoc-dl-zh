    engine.input_variables = [

    fl.InputVariable(

    name="Ambient",

    description="",

    enabled=True,

    minimum=0.000,

    maximum=1.000,

    lock_range=False,

    terms=[

    fl.Triangle("DARK", 0.000, 0.250, 0.500), #Triangular Membership Function defining
    "Dark"

    fl.Triangle("MEDIUM", 0.250, 0.500, 0.750), #Triangular Membership Function defining
    "Medium"

    fl.Triangle("BRIGHT", 0.500, 0.750, 1.000) #Triangular Membership Function defining
    "Bright"

    ]

    )

    ]

    #Defining the Output Variables (Defuzzification)

    engine.output_variables = [

    fl.OutputVariable(

    name="Power",

    description="",

    enabled=True,

    minimum=0.000,

    maximum=1.000,

    lock_range=False,

    aggregation=None,

    defuzzifier=fl.WeightedAverage("TakagiSugeno"),

    lock_previous=False,

    terms=[

    fl.Constant("LOW", 0.250), #Constant Membership Function defining "LOW"

    fl.Constant("MEDIUM", 0.500), #Constant Membership Function defining "MEDIUM"

    fl.Constant("HIGH", 0.750) #Constant Membership Function defining "HIGH"

    ]

    )

    ]

    #Creation of Fuzzy Rule Base

    engine.rule_blocks = [

    fl.RuleBlock(

    name="",

    description="",

    enabled=True,

    conjunction=None,

    disjunction=None,

    implication=None,

    activation=fl.General(),

    rules=[

