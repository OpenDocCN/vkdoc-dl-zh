- fmt: '# Long Short-Term Memory


    As mentioned, RNNs often fail to recall what was said long before. Consider this
    text:


    *“Since childhood, Shreya was crazy about dance. She knows many different styles
    of dance. Mostly she does break dancing, but now she works in corporate. She works
    on Deep Learning.”*


    Shreya can dance which dance style?


    This is where a recurrent neural network may not work! The reason behind this
    is the vanishing gradient problem. Once many words are fed in, this information
    gets lost somewhere. This problem can be solved by using a slightly modified version
    of RNN, which is known as LSTM (long short-term memory).


    LSTM consists of the following components:


    - Cell

    - Cell state

    - Hidden state

    - Gates


    A *cell* is a memory unit that stores the information. A cell also has the power
    to decide what to store and when to allow the reads. Hence, it gives LSTMs the
    power to selectively remember or forget things.


    To make cells apply this decisive power, they are fed by two states: the cell
    state and the hidden state. The entire forgetting and remembering mechanism is
    done in LSTMs using something called *gates*. Gates are similar to the neural
    network nodes, wherein they either block the information or pass it. They do this
    by learning the weight and bias parameter from the information given as input.
    The weights are learned using the backpropagation approach. Figure [5-16](#479940_1_En_5_Chapter.xhtml#Fig16)
    shows the architecture of LSTMs. Let’s look at the components of LSTMs in a little
    more detail.


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig16_HTML.jpg](images/479940_1_En_5_Chapter/479940_1_En_5_Fig16_HTML.jpg)


    Figure 5-16 Simple LSTM cell (arXiv:1808.03314v4 [cs.LG] 4 Nov 2018)


    The horizontal line running through the center of Figure [5-16](#479940_1_En_5_Chapter.xhtml#Fig16),
    *s*, is considered the cell state. Values of the cell state can be changed using
    the following gates:


    - Forget gate

    - Input gate

    - Output gate


    ## Forget Gate


    As the name suggests, if you want to remove some of the unnecessary information
    from a cell state, you use this gate. This decision is made by passing the past
    cell state and current input to a sigmoid function. The output is either a 0 or
    a 1. A value of 0 means forget the output and 1 means keep it. Hence, wherever
    the value is 0, that number is removed from the cell state matrix. Mathematical
    operations in this cell can be represented by:


    ![$$ {f}_t=\sigma \left({W}_f.\left[{h}_{t-1},{x}_t\right]+{b}_f\right) $$](images/479940_1_En_5_Chapter/479940_1_En_5_Chapter_TeX_Equj.png)


    Figure [5-17](#479940_1_En_5_Chapter.xhtml#Fig17) shows these operations.


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig17_HTML.jpg](images/479940_1_En_5_Chapter/479940_1_En_5_Fig17_HTML.jpg)


    Figure 5-17 Forget gate


    The next step is to decide what new information you’re going to store in the cell
    state. This has two parts. First, a sigmoid layer called the input gate layer
    decides which values you’ll update. Next, a Tanh layer creates a vector of new
    candidate values, `Ct`, that could be added to the state. In the next step, you
    combine these two to create an update to the state.


    ## Input Gate


    Once you have removed the trivial information, the next step adds the new information.
    First, a sigmoid function is used where you transfer the past cell state and the
    current input. This gives an output of 0 or 1. Wherever you get 1, that information
    is going to be passed to the new cell state. Next, you pass the same two inputs
    to a Tanh function. This helps you get all the possible information that can be
    added to a cell state. Finally, the Tanh and sigmoid outputs will be multiplied
    (using Hadamard multiplication) and the final output will be added to the cell
    state. This process is represented by following mathematical operations:


    ![$$ {i}_t=\sigma \left({W}_i.\left[{h}_{t-1},{x}_t\right]+{b}_i\right) $$](images/479940_1_En_5_Chapter/479940_1_En_5_Chapter_TeX_Equk.png)


    ![$$ {\underset{\_}{C}}_t=\tanh \left({W}_c.\left[{h}_{t-1},{x}_t\right]+{b}_c\right)
    $$](images/479940_1_En_5_Chapter/479940_1_En_5_Chapter_TeX_Equl.png)


    ![$$ {C}_t={f}_t\ast {C}_{t-1}+{i}_t{\underset{\_}{C}}_t $$](images/479940_1_En_5_Chapter/479940_1_En_5_Chapter_TeX_Equm.png)


    Figure [5-18](#479940_1_En_5_Chapter.xhtml#Fig18) shows all the operations.


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig18_HTML.jpg](images/479940_1_En_5_Chapter/479940_1_En_5_Fig18_HTML.jpg)


    Figure 5-18 Input gate


    ## Output Gate


    In this gate, you first scale the values of the cell state to -1 and +1. This
    is done by passing the current state to a Tanh function. Next, you use the same
    sigmoid filter of the forget gate and apply it here. This helps to determine which
    values need to be outputted. A combination will give you the final output as well
    as the cell state input for the next LSTM cell. Mathematically, it’s as follows:


    ![$$ {o}_t=\sigma \left({W}_o.\left[{h}_{t-1},{x}_t\right]+{b}_0\right) $$](images/479940_1_En_5_Chapter/479940_1_En_5_Chapter_TeX_Equn.png)


    ![$$ {h}_t={o}_t\ast \mathit{\tanh}\left({C}_t\right) $$](images/479940_1_En_5_Chapter/479940_1_En_5_Chapter_TeX_Equo.png)


    Figure [5-19](#479940_1_En_5_Chapter.xhtml#Fig19) shows the operations of the
    output gate.


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig19_HTML.jpg](images/479940_1_En_5_Chapter/479940_1_En_5_Fig19_HTML.jpg)


    Figure 5-19 Output gate


    The following is an example implementation of the same example used in RNN, but
    this time using LSTMs.


    ```

    import pandas as pd

    import numpy as np

    import matplotlib.pyplot as plt

    from keras.models import Sequential

    from keras.layers import Dense, LSTM

    #Generating Random Data

    t=np.arange(0,1000)

    x=np.sin(0.02∗t)+2∗np.random.rand(1000)

    df = pd.DataFrame(x)

    df.head()

    #Splitting into Train and Test set

    values=df.values

    train, test = values[0:800,:], values[800:1000,:]

    # convert dataset into matrix

    def convertToMatrix(data, step=4):

    X, Y =[], []

    for i in range(len(data)-step):

    d=i+step

    X.append(data[i:d,])

    Y.append(data[d,])

    return np.array(X), np.array(Y)

    trainX,trainY =convertToMatrix(train,6)

    testX,testY =convertToMatrix(test,6)

    trainX = np.reshape(trainX, (trainX.shape[0], 1, trainX.shape[1]))

    testX = np.reshape(testX, (testX.shape[0], 1, testX.shape[1]))

    #Making the LSTM Structure

    model = Sequential()

    model.add(LSTM(units=4, input_shape=(1,6), activation="relu"))

    model.add(Dense(8, activation="relu"))

    model.add(Dense(1))

    #Compiling the Code

    model.compile(loss=''mean_squared_error'', optimizer="rmsprop")

    model.summary()

    #Training the Model

    model.fit(trainX,trainY, epochs=1, batch_size=500, verbose=2)

    #Predicting with the Model

    trainPredict = model.predict(trainX)

    testPredict= model.predict(testX)

    predicted=np.concatenate((trainPredict,testPredict),axis=0)

    ```


    Another version of RNN that solves the vanishing and exploding gradient problem
    is called gated recurrent units (GRU). The next section discusses this architecture
    in detail.


    ## Gated Recurrent Units


    Similar to LSTMs, gated recurrent units also operate through gates, which help
    them overcome the problems that RNNs face. Figure [5-20](#479940_1_En_5_Chapter.xhtml#Fig20)
    shows a simple structure of a GRU cell.


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig20_HTML.jpg](images/479940_1_En_5_Chapter/479940_1_En_5_Fig20_HTML.jpg)


    Figure 5-20 Single GRU cell (LSTM Gating. Chung, Junyoung, et al. “Empirical evaluation
    of gated recurrent neural networks on sequence modeling.” (2014))


    GRUs have only two gates as compared to LSTMs. These gates are:


    - Reset gate

    - Update gate


    As with LSTMs, these gates also decide what information needs to be passed to
    the output. The next sections look at each gate’s operation in a GRU cell.'
