- fmt: "# 6. Fuzzy Neural Networks\n\nIn the previous chapters, you saw neural networks\
    \ based on crisp inputs, weights, parameters, etc. But in real-life applications,\
    \ it’s not necessary that you always get the same kind of inputs. *Fuzziness*\
    \ in neural networks results in networks having Fuzzy Signals, Fuzzy Weights,\
    \ etc., in which case you are dealing with *Fuzzy Neural Networks.* This chapter\
    \ looks at the different architectures of Fuzzy Neural Networks and the components\
    \ that define them. You will later learn about the Adaptive Neuro Fuzzy Architecture\
    \ and its different versions.\n\nFuzzy Neural Networks are used to find the parameters\
    \ related to a Fuzzy System by learning them through the given data, with the\
    \ help of neural networks. These parameters can be Fuzzy Sets, Fuzzy Rules, Fuzzy\
    \ Membership Functions, etc. Simple Fuzzy Neural Networks have the following properties:\n\
    \n- A Fuzzy Neural Network is based on a data-driven approach using the methodology\
    \ of neural networks.\n- Fuzzy Neural Networks can be made with or without the\
    \ prior knowledge of the Fuzzy Rules, as they can be learned from the data parallel\
    \ using neural networks.\n- The properties of the underlying Fuzzy System are\
    \ maintained throughout, even though the parameters are learned along the way.\n\
    - A Fuzzy System can be represented as having multiple nodes, as shown in Figure\
    \ [6-1](#479940_1_En_6_Chapter.xhtml#Fig1).\n\n![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig1_HTML.jpg](images/479940_1_En_6_Chapter/479940_1_En_6_Fig1_HTML.jpg)\n\
    \nFigure 6-1\n\nFuzzy Neural System\n\n1. The first layer is the input layer\n\
    2. The second layer represents the Fuzzy Rules\n3. The third layer contains the\
    \ output nodes\n\nIf you have normal Neural Networks and apply some Fuzzy Set\
    \ Operators like Max and Min (T-Norm and S-Norm) to them, they are an extension\
    \ and are called *Hybrid Neural Networks.* You will learn about the Hybrid Neural\
    \ Networks in the next section.\n\nWhy would you use Fuzzy Neural Networks when\
    \ Fuzzy Systems are capable of doing the task? Fuzzy Systems are used to find\
    \ the relationship between the input and output domain. This is defined by a set\
    \ of rules (Fuzzy Rules). But what if you cannot capture all the rules that may\
    \ be present in the system? To solve this issue, you can have a neural network-based\
    \ system where you learn different rules based on the membership functions and\
    \ then make the entire architecture.\n\nIn a nutshell, you can say that if you\
    \ have data, you can find Neuro Fuzzy Systems out of it using Fuzzy Neural Networks.\
    \ Also, if you already have a Fuzzy System, you can enhance and optimize it using\
    \ the same approach. Let’s start the chapter by first covering Fuzzy Neurons and\
    \ their architecture.\n\n## Fuzzy Neurons\n\nThe previous chapter talked about\
    \ normal neural networks. Neurons are the core component of artificial neural\
    \ networks and they are used to compute some operations. They take some values\
    \ as inputs and then perform some kind of operations over them to give a processed\
    \ output.\n\nFigure [6-2](#479940_1_En_6_Chapter.xhtml#Fig2) represents one of\
    \ the simple neurons showing a basic operation. In the diagram, you can see that\
    \ there are two inputs and based on that, we are defining an output, called `y`.\
    \ `w1` and `w2` are the weights that we learn and, based on that, we take a weighted\
    \ sum as an output.\n\n![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig2_HTML.jpg](images/479940_1_En_6_Chapter/479940_1_En_6_Fig2_HTML.jpg)\n\
    \nFigure 6-2\n\nFuzzy Neuron\n\nThis diagram doesn’t have any of the core components\
    \ of a neural network architecture, like hidden layers or activation functions,\
    \ but it can still be considered a simple neural network. Therefore, the output\
    \ can be expressed as follows:\n\n```\ny = f(w1 * x1 + w2 * x2)\n```\n\nThe function\
    \ `f` can be of any type. It can be nothing, or you can add an activation function\
    \ like Sigmoid or Relu. Note that we are using a normal mathematical operation\
    \ like addition. If you use operators like addition, subtraction, or activation\
    \ functions like Sigmoid or Relu, this neural network is called a *regular neural\
    \ net*. But instead, if you apply Fuzzy Operators like T-Norm or S-Norm, it is\
    \ called a *hybrid neural net*. It is a Fuzzy Architecture and has different signals,\
    \ weights, and functions in a classical set format. You can apply different operations\
    \ of T-Norm and T-Co-Norm to the inputs and weights later. One processing unit\
    \ of a Hybrid Neural Net is called a *Fuzzy Neuron*.\n\nLet’s look at the different\
    \ types of Fuzzy Neurons in a Hybrid Neural Net architecture. Figures [6-3](#479940_1_En_6_Chapter.xhtml#Fig3)\
    \ and [6-4](#479940_1_En_6_Chapter.xhtml#Fig4) show these neurons specific to\
    \ T-Norm and T-Co-Norm operations.\n\n![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig4_HTML.jpg](images/479940_1_En_6_Chapter/479940_1_En_6_Fig4_HTML.jpg)\n\
    \nFigure 6-4\n\nT-Co-Norm operation\n\n![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig3_HTML.jpg](images/479940_1_En_6_Chapter/479940_1_En_6_Fig3_HTML.jpg)\n\
    \nFigure 6-3\n\nT-Norm operation\n\nIn Figure [6-3](#479940_1_En_6_Chapter.xhtml#Fig3),\
    \ you can see that it’s doing a T-Co-Norm operation followed by T-Norm. Figure\
    \ [6-4](#479940_1_En_6_Chapter.xhtml#Fig4) shows the exact opposite. This specific\
    \ operation of applying one continuous function to the output of another continuous\
    \ function comes under the domain of a *Fuzzy Neuron*. So the first diagram (Figure\
    \ [6-3](#479940_1_En_6_Chapter.xhtml#Fig3)) represents an *AND-Fuzzy Neuron* and\
    \ the second one (Figure [6-4](#479940_1_En_6_Chapter.xhtml#Fig4)) is an *OR-Fuzzy\
    \ Neuron*, where:\n\n```\nY_AND = T(S(w1, x1), S(w2, x2), ..., S(wn, xn))\n```\n\
    \n```\nY_OR = S(T(w1, x1), T(w2, x2), ..., T(wn, xn))\n```\n\nYou have already\
    \ seen in previous chapters that the Fuzzy Systems consist of membership functions.\
    \ The AND or OR Fuzzy Neuron basically operates on the membership values obtained\
    \ from the MFs. Since you have to learn the values of `w1` and `w2` in the diagram,\
    \ they will directly relate to the output of the system. This means that if the\
    \ weights are very high, then in the case of OR neurons, the input will strongly\
    \ affect the output. In the case of AND neurons, the input will weakly affect\
    \ the output. Here are some other neurons used in Fuzzy Neural Networks:\n\n-\
    \ Implication-OR Neuron\n- Kwan and Cai’s Neuron\n  - K&C’s Max Neuron\n  - K&C’s\
    \ Min Neuron"
