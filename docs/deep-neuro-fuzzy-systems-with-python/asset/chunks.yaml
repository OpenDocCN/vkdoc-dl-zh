    If you define *λ*-cut sets using Fuzzy Set notation, you’ll get something like
    this:


    ![$$ {A}_{0.9}=\left\{\frac{1}{a},\frac{1}{b},\frac{0}{c},\frac{0}{d},\frac{0}{e},\frac{0}{f},\right\}
    $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equh.png)


    Consider the properties of *λ*-cuts:


    *   4.*A*[*α*] ⊆ *A*[*λ*] where, *λ* ≤ *α* ∣ 0 ≤ *α* ≤ 1 ∣ *A*[0] = *X*


    *   3.![$$ {\left(\underset{\_}{A}\right)}_{\lambda}\ne {\underset{\_}{A}}_{\lambda
    } $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_IEq3.png)except for
    the *λ* value of 0.5


