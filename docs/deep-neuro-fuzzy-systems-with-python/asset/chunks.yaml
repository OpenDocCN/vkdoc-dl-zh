- fmt: '### Gaussian Membership Function


    When you know the mean and standard deviation of the crisp values and want to
    take into consideration the customizable Fuzzification Factor as well, you use
    Gaussian membership functions. They can be represented using the equation:


    ![$$ {\mu}_A\left(x,c,s,m\right)={e}^{\frac{-1}{2}{\left|\frac{x-c}{s}\right|}^m}
    $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equv.png)


    where `c` and `s` are the mean and standard deviation, respectively, and `m` is
    the Fuzzification Factor.


    When you apply the Gaussian membership function to the soccer example, you can
    see that the values are represented much better and the interpolation is smooth.
    You define the Gaussian membership of the classes as follows:


    - Full speed has a mean of 80 mph and a standard deviation of 4

    - Medium powered has a mean of 50 mph and a standard deviation of 4

    - Slow has a mean of 30 mph and a standard deviation of 4

    - Medium fast has a mean of 60 mph and a standard deviation of 4


    You can always play with the standard deviation. Here is the Python implementation
    of the soccer example using the Gaussian membership function. Figure [2-8](#479940_1_En_2_Chapter.xhtml#Fig8)
