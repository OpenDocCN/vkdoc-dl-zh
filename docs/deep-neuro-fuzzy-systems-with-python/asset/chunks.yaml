- fmt: '# Soft Computing and Fuzzy Systems


    When you have crisply defined data that is precise and easy to understand, applying
    hard computing to it is perfect. Hard computing is based on binary logic, classical
    sets, crisp (precise) systems and software, basic numerical analysis, etc. But
    when you try to apply this same approach to real-world problems that include imprecise
    data—maybe the dataset is partially true, it has a lot of approximations, and
    so on—hard computing fails. The best way to tackle this situation is to use the
    soft computing approach.


    A very basic example is `2+2`. In this scenario, you can use hard computing to
    arrive at `4`. But when you change the equation to `2+x`, where `x` ranges from
    `0` to `5`, soft computing always gives better results. Before you move on to
    understanding exactly what soft computing is, study the flowchart in Figure [1-1](#479940_1_En_1_Chapter.xhtml#Fig1).
    It depicts the difference between hard and soft computing when it comes to problem
    solving.


    ![../images/479940_1_En_1_Chapter/479940_1_En_1_Fig1_HTML.jpg](images/479940_1_En_1_Chapter/479940_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    Hard computing versus soft computing


    Soft computing tries to imitate the human mind in order to make decisions. These
    models have cognitive abilities, which include:


    * Ability to think

    * Ability to reason

    * Ability to organize

    * Ability to memorize

    * Ability to recognize

    * Ability to process


    When your data is *imprecise* (it has partial truths and is full of approximations),
    soft computing is the best approach. The following are features of soft computing-based
    problem-solving approaches:


    * Biologically inspired

    * Fault tolerant

    * Full of optimizations

    * Helps make wiser and more intelligent machines

    * Helps in achieving robustness, tractability, and lower costs

    * Heavy computation

    * Goal driven


    Table [1-1](#479940_1_En_1_Chapter.xhtml#Tab1) lists the basic constituents of
    the soft computing approach.


    Table 1-1


    Basic Constituents of Soft Computing


    | Constituent | Benefits |

    | --- | --- |

    | Neural Networks | To learn and adapt based on uncertainty in data |

    | Fuzzy Set Theory | Knowledge representation |

    | Genetic Algorithms | For efficient searching |

    | Traditional AI | Using mathematical approaches |


    Now that you have read about the basics of soft computing, turn your attention
    to understanding Fuzzy Systems. Fuzzy Systems are one of the core parts of soft
    computing, so you need to understand them. Fuzzy Systems, along with soft computing,
    make a very strong foundation for an inference system, also called an *Adaptive
    Neuro-Fuzzy Inference System*, which is discussed later in this book.


    Fuzzy Systems are comprised of Fuzzy Sets and not the normal, classical sets.
    In these systems, you try to follow Fuzzy Logic, because traditional logic cannot
    be applied to real-world applications. Let’s look at Fuzzy Systems with the help
    of an example.


    When you drive a car, it’s a combination of pressing the accelerator and the brake.
    Whenever you speed up, you press the accelerator, and whenever you want to slow
    down, you press the brakes. Suppose you are talking about self-driving cars. In
    this scenario, both systems should be managed simultaneously, without any manual
    intervention.


    If you consider traditional logic, it follows classical sets (called *crisp sets*).
    In these sets, the value is equal to `0` or `1`. Suppose the functioning is defined
    as shown Table [1-2](#479940_1_En_1_Chapter.xhtml#Tab2).


    Table 1-2


    Applying Brakes Represented Using Crisp Sets


    | Function | Set Code |

    | --- | --- |

    | Press the accelerator | 1 |

    | Release the accelerator | 0 |

    | Press the brakes | 1 |

    | Release the brakes | 0 |


    The problem with this encoding is that `1` represents a full pressing and `0`
    represents a full release. There is no intermediate response. Suppose a car turns
    in front of your car. In this scenario, the `1` code will get activated and full
    brakes will be applied. If that car accelerates and is farther away from you,
    full brakes will be released and the full accelerator will be pressed (codes `0`
    and `1` will get activated).


    ## Classical Sets


    Classical sets, also called *crisp sets*, are a collection of objects. Objects
    can be anything belonging in the real world, and sometimes outside the domain
    as well. For example:


    ```

    Cars = {Audi, BMW, Mercedes, Porsche}

    ```


    This set shows a list of premium cars. You denote a set by using the curly braces,
    `{}`.


    Once you have effectively defined different sets, you can visualize them as well.
    A *Venn diagram* is a visual way to represent sets and their relationships with
    each other. Figure [1-2](#479940_1_En_1_Chapter.xhtml#Fig2) shows a normal Venn
    diagram.


    ![../images/479940_1_En_1_Chapter/479940_1_En_1_Fig2_HTML.jpg](images/479940_1_En_1_Chapter/479940_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    Simple Venn diagram


    The circles in Figure [1-2](#479940_1_En_1_Chapter.xhtml#Fig2) represent two sets,
    A and B. All the elements that are part of Set A will be present in Circle A,
    while all the elements that are part of Set B will be present in Circle B. The
    circles are called Venn diagrams of Set A and Set B.


    ### Universe of Discourse


    All the possible elements that can share a domain, or have similar characteristics,
    are contained in a set. The set of those elements is called the *Universe of Discourse*.
    Once you have this set, you can form various subsets as well. Formally speaking,
    the Universe of Discourse can be defined as follows:


    *“In every discourse, whether of the mind conversing with its own thoughts, or
    of the individual in his intercourse with others, there is an assumed or expressed
    limit within which the subjects of its operation are confined. … Now, whatever
    may be the extent of the field within which all the objects of our discourse are
    found, that field may properly be termed the Universe of Discourse. (Boole 1854/1958,
    p. 42)”*


    Look at the Universe of Discourse with the following example:


    ![$$ E=\left\{ Domain\ of\ Machine\ Learning\right\} $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equa.png)


    Let Set E be the Universe of Discourse. It has the complete domain of Machine
    Learning. Then the possible sets that can be part of E are:


    * Set of Machine Learning algorithms

    * Set of basic statistical methods

    * Set of neural networks, etc.


    ## Properties of Classical Sets


    This section explains the various properties of classical sets. These are:


    * Membership of elements

    * Cardinality of sets

    * Family of sets

    * Null set

    * Singleton set

    * Subset

    * Superset

    * Powerset

    * Countable set

    * Uncountable set


    ### Membership of Elements


    If an element is a part of a set, it is called a *member* of the set. It is denoted
    by `X ε A`, which means that Element X is a member of Set A.


    ![$$ A=\left\{1,2,3,4,5\right\} $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equb.png)


    In the set of integers from 1 to 5, each number is called a member of Set A.


    ### Cardinality of Sets


    In a set, if you count the total number of elements present, that number is called
    the *cardinality* of the set. It can be denoted by `n(A)` or `|A|` or `#A`.


    ![$$ A=\left\{1,2,3,4,5\right\} $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equc.png)


    This set has a cardinality of 5.'
