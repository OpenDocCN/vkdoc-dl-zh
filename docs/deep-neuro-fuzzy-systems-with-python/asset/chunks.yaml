    import fuzzylite as fl

    #Declaring and Initializing the Fuzzy Engine

    engine = fl.Engine(

    name="SimpleDimmer",

    description="Simple Dimmer Fuzzy System which dims light based upon Light Conditions"

    )

    #Defining the Input Variables (Fuzzification)

    engine.input_variables = [

    fl.InputVariable(

    name="Ambient",

    description="",

    enabled=True,

    minimum=0.000,

    maximum=1.000,

    lock_range=False,

    terms=[

    fl.Triangle("DARK", 0.000, 0.250, 0.500), #Triangular Membership Function defining
    "Dark"

    fl.Triangle("MEDIUM", 0.250, 0.500, 0.750), #Triangular Membership Function defining
    "Medium"

    fl.Triangle("BRIGHT", 0.500, 0.750, 1.000) #Triangular Membership Function defining
    "Bright"

    ]

    )

    ]

    #Defining the Output Variables (Defuzzification)

    engine.output_variables = [

    fl.OutputVariable(

    name="Power",

    description="",

    enabled=True,

    minimum=0.000,

    maximum=1.000,

    lock_range=False,

    aggregation=fl.Maximum(),

    defuzzifier=fl.Centroid(200),

    lock_previous=False,

    terms=[

    fl.Triangle("LOW", 0.000, 0.250, 0.500), #Triangular Membership Function defining
    "LOW Light"

    fl.Triangle("MEDIUM", 0.250, 0.500, 0.750), #Triangular Membership Function defining
    "MEDIUM light"

    fl.Triangle("HIGH", 0.500, 0.750, 1.000) #Triangular Membership Function defining
    "HIGH Light"

    ]

    )

    ]

    #Creation of Fuzzy Rule Base

    engine.rule_blocks = [

    fl.RuleBlock(

    name="",

    description="",

    enabled=True,

    conjunction=None,

    disjunction=None,

    implication=fl.Minimum(),

    activation=fl.General(),

    rules=[

    fl.Rule.create("if Ambient is DARK then Power is HIGH", engine),

    fl.Rule.create("if Ambient is MEDIUM then Power is MEDIUM", engine),

    fl.Rule.create("if Ambient is BRIGHT then Power is LOW", engine)

    ]

    )

    ]

    ```


    You can see in this code that the Defuzzifier is called `Centroid`. `FuzzyLite`
    provides different kinds of Fuzzifiers, as listed here. All you need to do is
    replace them in the previous code:


    *   `fl.Centroid()`

    *   `fl.LargestOfMaximum()`

    *   `fl.MeanOfMaximum()`

    *   `fl.SmallestOfMaximum()`

    *   `fl.WeightedAverage()`

    *   `fl.Weighted Sum()`


    ## Takagi-Sugeno-Kang Fuzzy Inference System


    Takagi-Sugeno-Kang Fuzzy Inference Systems are used to model complex non-linear
    systems. The entire process of applying a Fuzzy Operator and then Fuzzifying the
    inputs is the same as with the Mamdani approach. The only change comes in the
    output membership function, which is either linear or constant. This section looks
    at the TSK approach.


    Whatever output membership function you get, you apply a weighted average method
    of Defuzzification and get the final crisp output. As you have seen, there are
    different implication operators—the Mamdani or Sugeno approach. Here’s what the
    different operators are composed of:


    *   For AND operations in rulebase, you use T-Norm

    *   For OR operations in rulebase, you use T-Co-Norm

    *   For implication operations, you use T-Norm

    *   For aggregation operations, you use T-Co-Norm


    Using the same example you saw in Mamdani FIS, you can see how the TSK method
    works (see Figure [3-24](#479940_1_En_3_Chapter.xhtml#Fig24)).


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig24_HTML.jpg](images/479940_1_En_3_Chapter/479940_1_En_3_Fig24_HTML.jpg)


    Figure 3-24


    The TSK method


    The diagram in Figure [3-24](#479940_1_En_3_Chapter.xhtml#Fig24) represents the
    same Fuzzy If-Then rules you saw in Mamdani:


    *   If the product reviews are excellent or the product is beautiful, the product
    is recommended.

    *   If the product reviews are good or the product is nice, the product is somewhat
    recommended.

    *   If the product reviews are poor or the product is bad looking, the product
    is not recommended.


    As mentioned, the TSK method uses the weighted average approach to find the Defuzzified
    crisp output. Therefore, using the following formula:


    ![$$ {z}^{\ast }=\frac{\sum_{i=1}^n\mu (x)\ast {x}_i}{\sum_{i=1}^n\mu (x)} $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equae.png)


    you get the final result as 13.3%.


    You can use the `FuzzyLite` package to see the TSK application:


