- fmt: '# Mamdani Fuzzy Inference System


    The Mamdani method is the most widely used Fuzzy Inference System. Because of
    its simple structure, it is used to solve all general decision-making problems.
    Mamdani FIS follows these general steps:


    1. Step 1: Fuzzify the input.

    2. Step 2: Find and evaluate the antecedent of each rule.

    3. Step 3: Find the consequent of each rule.

    4. Step 4: Aggregate the consequents.

    5. Step 5: Defuzzify the results.


    First, you convert the crisp inputs to Fuzzy Sets (aka, *Fuzzification*). For
    each input, you try to find the membership value. Suppose the antecedent has multiple
    parts. In that case, you use an aggregation operation like T-Norm or T-Co-Norm
    to get a single membership value.


    You can better understand this with the help of an example. Suppose the rulebase
    says the following:


    * “If the product reviews are excellent or the product is beautiful.”


    You can divide the product reviews and the product aesthetics in a rating between
    1 and 5. A review of 1 means poor and a review of 5 means excellent. For the product,
    1 means a bad design and 5 means an awesome design. Now that you have defined
    the preliminaries, you can look at the first part: Fuzzification.


    If you use sigmoid membership function, the graph will look like Figure [3-18](#479940_1_En_3_Chapter.xhtml#Fig18).


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig18_HTML.jpg](images/479940_1_En_3_Chapter/479940_1_En_3_Fig18_HTML.jpg)


    Figure 3-18 Sigmoid representation


    Suppose you got input about the review as 1, and input about the design as 4.
    If you apply membership functions over the items, you may get 0.0 in the sigmoid
    curve for reviews and 0.7 in the sigmoid curve for the product, as shown in Figure
    [3-19](#479940_1_En_3_Chapter.xhtml#Fig19).


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig19_HTML.jpg](images/479940_1_En_3_Chapter/479940_1_En_3_Fig19_HTML.jpg)


    Figure 3-19 Fuzzification


    Since there is an OR condition in between, that means you must apply the T-co-Norm
    operator here, which also means you apply the `MAX` operator.


    ![$$ \mathit{\operatorname{Max}}\left(0.0,0.7\right)=0.7 $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equac.png)


    This is the final membership value for the input part. Suppose the consequents
    membership function is again sigmoid, and the rule says that:


    * “If the antecedent is true, the product is recommended.”


    Figure [3-20](#479940_1_En_3_Chapter.xhtml#Fig20) shows the curve.


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig20_HTML.jpg](images/479940_1_En_3_Chapter/479940_1_En_3_Fig20_HTML.jpg)


    Figure 3-20 Output membership function


    You can apply one of the implication operators to truncate the consequent membership
    function. This example uses the `MIN` operator. Once you get the output, the next
    step is to aggregate it into a single Fuzzy Set. This can be done using Fuzzy
    Aggregation Operators (see Figure [3-21](#479940_1_En_3_Chapter.xhtml#Fig21)).


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig21_HTML.jpg](images/479940_1_En_3_Chapter/479940_1_En_3_Fig21_HTML.jpg)


    Figure 3-21 Aggregation


    You might better understand this with the help of some examples, only this time
    you will take the triangular membership functions as output. Suppose, in the rulebase,
    you have three Fuzzy If-Then rules:


    * If product reviews are excellent or the product is beautiful, the product is
    recommended.

    * If product reviews are good or the product is nice, the product is somewhat
    recommended.

    * If the product reviews are poor or the product is bad looking, the product is
    not recommended.


    Suppose you get the same input as in the previous example: Review = 1 and Design
    = 4.


    Figure [3-22](#479940_1_En_3_Chapter.xhtml#Fig22) illustrates the entire process.


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig22_HTML.jpg](images/479940_1_En_3_Chapter/479940_1_En_3_Fig22_HTML.jpg)


    Figure 3-22 Rulebase


    Now that you have an aggregated Fuzzy Set, the next thing you want is crisp output
    (see Figure [3-23](#479940_1_En_3_Chapter.xhtml#Fig23)). This can be done using
    the Defuzzification approach. There are a lot of Defuzzification approaches, as
    you have already seen, but the one used here is the `Centroid` method. So, you
    need to find the centroid of the aggregation, which is the Center of Area. Using
    this approach, you find the region with the highest area and then return the Center
    of Gravity of that area.


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig23_HTML.jpg](images/479940_1_En_3_Chapter/479940_1_En_3_Fig23_HTML.jpg)


    Figure 3-23 Output aggregated fuzzy


    You can see that `c[1]` has the largest area. Hence, you will find `x''` (the
    center of gravity) fit.


    ![$$ {x}^{\ast }=\frac{\int {\mu}_{c_m}(x).{x}^{\prime } dx}{\int {\mu}_{c_m}(x)
    dx} $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equad.png)


    With this formula, you get the answer as 13.7%.


    The main advantages of using the Mamdani method are as follows:


    * It’s intuitive

    * It enjoys widespread acceptance

    * It’s well suited for human input


    Apart from the advantages, Mamdani methods come with their own set of problems.
    Some of the disadvantages of the Mamdani methods are as follows:


    * If the number of variables in the antecedent increases, the number of rules
    increases exponentially.

    * The more rules you construct, the harder it is to know if they are suitable
    to your problem.

    * It may become difficult to find a relationship between antecedents and consequents
    if the number of variables in the antecedent is too large.


    To overcome these disadvantages, you can use another method, called the Takagi-Sugeno-Kang
    (TSK) method.


    To make a Fuzzy Inference System in Python, you have a library named `FuzzyLite`.
    To install this package on your system, execute the following command:


    ```

    pip install pyfuzzylite

    ```


    `Fuzzylite` is a free and open source Fuzzy Logic control library programmed in
    C++ for multiple platforms (e.g., Windows, Linux, Mac, and iOS). The goal of the
    `FuzzyLite` libraries is to easily design and efficiently operate Fuzzy Logic
    controllers following an object-oriented programming model, without relying on
    external libraries. For detailed exploration of this library, clone the GitHub
    page:


    [`https://github.com/fuzzylite/pyfuzzylite.git`](https://github.com/fuzzylite/pyfuzzylite.git)


    You can see the application of the Mamdani FIS in Python using this package.'
  raw: '## Mamdani Fuzzy Inference System


    The Mamdani method is the most widely used Fuzzy Inference System. Because of
    its simple structure, it is used to solve all general decision-making problems.
    Mamdani FIS follows these general steps:


    1.  Step 1: Fuzzify the input.


    2.  Step 2: Find and evaluate the antecedent of each rule.


    3.  Step 3: Find the consequent of each rule.


    4.  Step 4: Aggregate the consequents.


    5.  Step 5: Defuzzify the results.


    First, you convert the crisp inputs to Fuzzy Sets (aka, *Fuzzification*). For
    each input, you try to find the membership value. Suppose the antecedent has multiple
    parts. In that case, you use an aggregation operation like T-Norm or T-Co-Norm
    to get a single membership value.


    You can better understand this with the help of an example. Suppose the rulebase
    says the following:


    *   “If the product reviews are excellent or the product is beautiful.**”**


    You can divide the product reviews and the product aesthetics in a rating between
    1 and 5\. A review of 1 means poor and a review of 5 means excellent. For the
    product, 1 means a bad design and 5 means an awesome design. Now that you have
    defined the preliminaries, you can look at the first part: Fuzzification.


    If you use sigmoid membership function, the graph will look like Figure [3-18](#479940_1_En_3_Chapter.xhtml#Fig18).


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig18_HTML.jpg](images/479940_1_En_3_Chapter/479940_1_En_3_Fig18_HTML.jpg)


    Figure 3-18


    Sigmoid representation


    Suppose you got input about the review as 1, and input about the design as 4\.
    If you apply membership functions over the items, you may get 0.0 in the sigmoid
    curve for reviews and 0.7 in the sigmoid curve for the product, as shown in Figure
    [3-19](#479940_1_En_3_Chapter.xhtml#Fig19).


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig19_HTML.jpg](images/479940_1_En_3_Chapter/479940_1_En_3_Fig19_HTML.jpg)


    Figure 3-19


    Fuzzification


    Since there is an OR condition in between, that means you must apply the T-co-Norm
    operator here, which also means you apply the `MAX` operator.


    ![$$ \mathit{\operatorname{Max}}\left(0.0,0.7\right)=0.7 $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equac.png)


    This is the final membership value for the input part. Suppose the consequents
    membership function is again sigmoid, and the rule says that:


    *   “If the antecedent is true, the product is recommended.”


    Figure [3-20](#479940_1_En_3_Chapter.xhtml#Fig20) shows the curve.


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig20_HTML.jpg](images/479940_1_En_3_Chapter/479940_1_En_3_Fig20_HTML.jpg)


    Figure 3-20


    Output membership function


    You can apply one of the implication operators to truncate the consequent membership
    function. This example uses the `MIN` operator. Once you get the output, the next
    step is to aggregate it into a single Fuzzy Set. This can be done using Fuzzy
    Aggregation Operators (see Figure [3-21](#479940_1_En_3_Chapter.xhtml#Fig21)).


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig21_HTML.jpg](images/479940_1_En_3_Chapter/479940_1_En_3_Fig21_HTML.jpg)


    Figure 3-21


    Aggregation


    You might better understand this with the help of some examples, only this time
    you will take the triangular membership functions as output. Suppose, in the rulebase,
    you have three Fuzzy If-Then rules:


    *   If product reviews are excellent or the product is beautiful, the product
    is recommended.


    *   If product reviews are good or the product is nice, the product is somewhat
    recommended.


    *   If the product reviews are poor or the product is bad looking, the product
    is not recommended.


    Suppose you get the same input as in the previous example: Review = 1 and Design
    = 4.


    Figure [3-22](#479940_1_En_3_Chapter.xhtml#Fig22) illustrates the entire process.


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig22_HTML.jpg](images/479940_1_En_3_Chapter/479940_1_En_3_Fig22_HTML.jpg)


    Figure 3-22


    Rulebase


    Now that you have an aggregated Fuzzy Set, the next thing you want is crisp output
    (see Figure [3-23](#479940_1_En_3_Chapter.xhtml#Fig23)). This can be done using
    the Defuzzification approach. There are a lot of Defuzzification approaches, as
    you have already seen, but the one used here is the `Centroid` method. So, you
    need to find the centroid of the aggregation, which is the Center of Area. Using
    this approach, you find the region with the highest area and then return the Center
    of Gravity of that area.


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig23_HTML.jpg](images/479940_1_En_3_Chapter/479940_1_En_3_Fig23_HTML.jpg)


    Figure 3-23


    Output aggregated fuzzy


    You can see that *c*[1] has the largest area. Hence, you will find x’ (the center
    of gravity) fit.


    ![$$ {x}^{\ast }=\frac{\int {\mu}_{c_m}(x).{x}^{\prime } dx}{\int {\mu}_{c_m}(x)
    dx} $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equad.png)


    With this formula, you get the answer as 13.7%.


    The main advantages of using the Mamdani method are as follows:


    *   It’s intuitive


    *   It enjoys widespread acceptance


    *   It’s well suited for human input


    Apart from the advantages, Mamdani methods come with their own set of problems.
    Some of the disadvantages of the Mamdani methods are as follows:


    *   If the number of variables in the antecedent increases, the number of rules
    increases exponentially.


    *   The more rules you construct, the harder it is to know if they are suitable
    to your problem.


    *   It may become difficult to find a relationship between antecedents and consequents
    if the number of variables in the antecedent is too large.


    To overcome these disadvantages, you can use another method, called the Takagi-Sugeno-Kang
    (TSK) method .


    To make a Fuzzy Inference System in Python, you have a library named `FuzzyLite`.
    To install this package on your system, execute the following command:


    ```

    pip install pyfuzzylite

    ```


    `Fuzzylite` is a free and open source Fuzzy Logic control library programmed in
    C++ for multiple platforms (e.g., Windows, Linux, Mac, and iOS). The goal of the
    `FuzzyLite` libraries is to easily design and efficiently operate Fuzzy Logic
    controllers following an object-oriented programming model, without relying on
    external libraries. For detailed exploration of this library, clone the GitHub
    page:


    [`https://github.com/fuzzylite/pyfuzzylite.git`](https://github.com/fuzzylite/pyfuzzylite.git)


    You can see the application of the Mamdani FIS in Python using this package:'
