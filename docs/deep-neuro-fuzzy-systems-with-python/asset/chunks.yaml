    membership function.


    ## Fuzzy Relations


    As you learned in the last chapter, there are different kinds of sets—crisp sets
    and Fuzzy Sets. Whenever you try to determine the relationship between two or
    more sets, the terminology used is *relation*, and specifically with Fuzzy Sets,
    this is called *Fuzzy Relation*.


    Suppose there are two Fuzzy Sets, *X*, *Y*, both belonging to the domain of real
    numbers and part of a Universe of Discourse.


    The Fuzzy Relation, *X* × *Y*, will have a relationship defined by this set:


    R = {[(*x*, *y*), *μ*[*R*](*x*, *y*)] ∨ (*x*, *y*) ∈ *X* × *Y*}


    To represent this relationship in matrix format, consider the following example.


    Suppose:


    ![$$ X=\left\{x1,x2,\dots xn\right\}Y=\left\{y1,y2,\dots yn\right\} $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equaf.png)


    The Fuzzy Relation R will be represented by the following matrix:


    ![$$ y1y2\dots ynx1{\mu}_R\left(x1,y1\right){\mu}_R\left(x1,y2\right)\dots {\mu}_R\left(x1,
    yn\right)x2{\mu}_R\left(x2,y1\right){\mu}_R\left(x2,y2\right)\dots {\mu}_R\left(x2,
    yn\right)\dots \dots \dots \dots \dots xn{\mu}_R\left( xn,y1\right){\mu}_R\left(
    xn,y2\right)\dots {\mu}_R\left( xn, yn\right) $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equag.png)


