  raw: '## Introduction to Membership Functions


    In the previous section, you learned that instead of having crisp values of 0
    and 1, each element can be mapped to a value between 0 and 1\. Each value is called
    the *degree* of membership and is represented by a curve, which depicts a function
    called a *membership function.* The value is called the *membership value.* In
    Figure [1-9](#479940_1_En_1_Chapter.xhtml#Fig9), you can see the difference between
    crisp and Fuzzy Sets.


    ![../images/479940_1_En_1_Chapter/479940_1_En_1_Fig9_HTML.jpg](images/479940_1_En_1_Chapter/479940_1_En_1_Fig9_HTML.jpg)


    Figure 1-9


    Difference between Fuzzy and crisp set representations


    In a crisp set, you only have two values, represented by 0 and 1, but in a Fuzzy
    Set, there is a range of values, based on the pressure at which the breaks are
    applied. The curve representing the range is the membership function curve. With
    a different pressure, a different membership value will be present, and that can
    be represented in the membership function curve.


    Let’s look at the membership function and its related concepts in a little more
    depth.


    A Fuzzy Set is an extension and gross oversimplification of a classical set. If
    X is the Universe of Discourse and its elements are denoted by x, then a Fuzzy
    Set A in X is defined as a set of ordered pairs.


    ![$$ A=\left\{x,\upmu A(x)\;\left|x\;\varepsilon\;X\right.\right\} $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equao.png)


    μ[A](x) is called the membership function of x in A. The membership function maps
    each element of X to a membership value between 0 and 1\. There are different
    types of membership functions, which are covered in detail in the next chapter.
    For now, let’s list some of them and look at the curves that they represent. This
    example uses the Scikit Fuzzy package, which has multiple methods and classes,
    so that you can apply the basic Fuzzy Operations effectively. You can use the
    following line to install the Scikit Fuzzy package in the Python environment:


    ![$$ \boldsymbol{pip}\ \boldsymbol{install}\ \boldsymbol{scikit}-\boldsymbol{fuzzy}
    $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equap.png)


    Figures [1-10](#479940_1_En_1_Chapter.xhtml#Fig10) through [1-14](#479940_1_En_1_Chapter.xhtml#Fig14)
    show the different types of membership functions and the curves that they represent.


    ![../images/479940_1_En_1_Chapter/479940_1_En_1_Fig10_HTML.jpg](images/479940_1_En_1_Chapter/479940_1_En_1_Fig10_HTML.jpg)


    Figure 1-10


    Triangular membership function


    The graph in Figure [1-10](#479940_1_En_1_Chapter.xhtml#Fig10) represents a triangular
    membership function, and you can use the `trimf` method from the `skfuzzy` package
    to find and plot the points.


    Here is the sample code. The next chapter discusses this function in detail.


    The following code takes an example where a person goes into a restaurant and
    tips a waiter. For tipping purposes, the quality of service is rated from 0 to
    10\. This example looks only at the service quality for now, but later it will
    discuss the actual tipping problem.


    ```

    import numpy as np

    import skfuzzy as sk

    #Defining the Numpy array for Tip Quality

    x_qual = np.arange(0, 11, 1)

    #Defining the Numpy array for Triangular membership functions

    qual_lo = sk.trimf(x_qual, [0, 0, 5])

