- fmt: '# Composite and Non-Composite Membership Functions


    Projection and cylindrical extension of Fuzzy Sets are the concepts you use when
    you want to extend a one-dimensional membership function to two-dimensional membership
    function. These concepts are discussed in the next section on Fuzzy Relations.
    After applying one of these concepts, you get a 2D membership function. This membership
    function can be of two types:


    - Composite membership function

    - Non-composite membership function


    A 2D membership function, if it can be broken into two single membership functions,
    is called a composite membership function. Otherwise, it’s called a non-composite
    membership function.


    For example, suppose you have a membership function defined as follows:


    ![$$ {\mu}_A\left(x,y\right)={e}^{-\left(\frac{x-5}{4}\right)-{\left(y-9\right)}^2}
    $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equab.png)


    This equation can be broken into two parts:


    ![$$ {e}^{-\left(\frac{x-5}{4}\right)}\ast {e}^{{\left(y-9\right)}^2} $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equac.png)


    If you look at this carefully, they are nothing but two Gaussian membership functions.
