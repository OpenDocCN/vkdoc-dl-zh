    Consider another example:


    ![$$ A=\left\{\frac{0.9}{x_1},\frac{0.5}{x_2},\frac{0.2}{x_3},\frac{0.3}{x_4}\right\}
    $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equk.png)


    Based on the previous computation, you would get *A*[0.6] as:


