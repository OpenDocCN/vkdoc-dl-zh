    如图所示，流程保持不变，但去模糊化过程发生了变化。因此，该输出的最终结果由以下公式给出：


    ![$$ Z=\frac{W_1{Z}_1+{W}_2{Z}_2}{W_1+{W}_2} $$](img/479940_1_En_3_Chapter_TeX_Equaf.png)


    由于采用加权平均法，该过程非常快速，因此不会在详细的去模糊化过程中浪费时间。无论输入类型如何，塚本模糊推理系统的输出始终是清晰的。


    以下示例代码展示了如何在 Python 中使用 `FuzzyLite` 包实现塚本模糊推理系统：


    ```

    import fuzzylite as fl

    #声明并初始化模糊引擎

    engine = fl.Engine(

    name="SimpleDimmer",

    description="基于光照条件调节灯光亮度的简单调光模糊系统"

    )

    #定义输入变量（模糊化）

    engine.input_variables = [

    fl.InputVariable(

    name="Ambient",

    description="",

    enabled=True,

    minimum=0.000,

    maximum=1.000,

    lock_range=False,

    terms=[

    fl.Bell("Dark", -10.000, 5.000, 3.000), #定义“暗”的广义钟形隶属函数

    fl.Bell("medium", 0.000, 5.000, 3.000), #定义“中”的广义钟形隶属函数

    fl.Bell("Bright", 10.000, 5.000, 3.000) #定义“亮”的广义钟形隶属函数

    ]

    )

    ]

    #定义输出变量（去模糊化）

    engine.output_variables = [

    fl.OutputVariable(

    name="Power",

    description="",

    enabled=True,

    minimum=0.000,

    maximum=1.000,

    lock_range=False,

    aggregation=fl.Maximum(),

    defuzzifier=fl.Centroid(200),

    lock_previous=False,

    terms=[

    fl.Sigmoid("LOW", 0.500, -30.000), #定义“低光”的 S 形隶属函数

    fl.Sigmoid("MEDIUM", 0.130, 30.000), #定义“中光”的 S 形隶属函数

    fl.Sigmoid("HIGH", 0.830, 30.000) #定义“高光”的 S 形隶属函数

    fl.Triangle("HIGH", 0.500, 0.750, 1.000)

    ]

    )

    ]

    #创建模糊规则库

    engine.rule_blocks = [

    fl.RuleBlock(

    name="",

    description="",

    enabled=True,

    conjunction=None,

    disjunction=None,

    implication=None,

    activation=fl.General(),

    rules=[

    fl.Rule.create("if Ambient is DARK then Power is HIGH", engine),

    fl.Rule.create("if Ambient is MEDIUM then Power is MEDIUM", engine),

    fl.Rule.create("if Ambient is BRIGHT then Power is LOW", engine)

    ]

    )

    ]

    ```


    # Mamdani 与 TSK 模糊推理系统的对比分析


    以下列表对两种系统进行了比较：


    - Mamdani 系统无法适应其他算法，而 TSK 系统具有适应性。

    - Mamdani 系统使用去模糊化方法评估输出，而 TSK 系统使用加权平均法。

    - 在完美控制系统方面，Mamdani 系统比 TSK 系统表现更好。

    - 与 TSK 系统相比，Mamdani 系统参数过多。


    # 总结


    本章详细讨论了模糊推理系统。首先通过示例回顾了不同类型的去模糊化器。随后，本章介绍了三种模糊推理系统：Mamdani、TSK 和塚本模糊推理系统。您学习了如何使用
    `Fuzzylite` 包在 Python 中应用所有这些推理系统。


    下一章将奠定机器学习的基础，这将作为理解后续章节中模糊神经网络概念的基础。


    # 机器学习简介


    前一章讨论了用于构建各种实际控制系统的不同模糊推理系统。但这些系统是静态的，这意味着模糊化过程、去模糊化过程、定义隶属函数等都需要手动完成。对于智能系统而言，最好能从数据中学习大部分内容，而不是直接进行硬编码。在模糊推理系统中，大部分参数都是通过学习获得的。这种结合神经网络的方法被称为模糊神经网络。


    本章将奠定机器学习的基础。您将学习机器学习的不同概念，这些概念将帮助您理解本书后续章节中模糊神经网络的核心概念。


    本章首先介绍机器学习。您将了解机器学习可以解决的不同类型问题，以及如何衡量各种模型的有效性。本章还涵盖了数据在机器学习中的表示和划分方式，以及进行这些划分的优势。


    机器学习是人工智能的一个分支，它涉及从数据中学习、从经验中持续学习的能力，而无需显式地编程参数。机器学习通过应用不同的统计和数学方法，从提供给它的数据中学习。机器学习试图发现数据中隐藏的模式。基于这些模式，当提供新数据时，模型会尝试预测某些结果。


    ## 机器学习


    图 4-1 展示了机器学习的分类。当输出是分类变量时，分类机器学习模型可以帮助您解决问题。分类输出包括名义变量或有序变量。例如，根据某些特定特征，您让模型判断某家公司的股价在未来几个月是上涨还是下跌。这是一个分类问题。


    ![../images/479940_1_En_4_Chapter/479940_1_En_4_Fig1_HTML.jpg](img/479940_1_En_4_Fig1_HTML.jpg)


    图 4-1


    机器学习算法


    类似地，如果您提供一张图片，并希望机器学习模型将其分类为人或动物，这同样是一个分类问题。相反，如果您不要求机器学习模型对数据进行分类，而是直接预测数值形式的输出，这被称为回归问题。例如，预测股票下个月的价格，或根据提供的图片预测一个人的年龄。这是一个回归问题。


    如前所述，当机器学习模型尝试根据数据预测类别时，这就是分类问题。机器学习模型可以将数据分为两类或多类。当数据被分为两类时，该机器学习问题被称为二分类问题（见图
    4-2）。如果类别超过两类，则称为多分类问题。


    ![../images/479940_1_En_4_Chapter/479940_1_En_4_Fig2_HTML.jpg](img/479940_1_En_4_Fig2_HTML.jpg)


    图 4-2


    二分类


    ## 分类机器学习问题


    以下是二分类和多分类问题的一些示例：


    - 给定一张图片，判断它是猫还是狗——二分类

    - 判断一个人是否有能力偿还贷款——二分类

    - 将心电图信号分类为 13 种健康问题之一——多分类

    - 聊天机器人根据提出的问题将问题发送到不同部门——多分类

    - 对不同类型的驾驶员分心行为进行分类——多分类

    '
- fmt: '# Regression Machine Learning Problems


    An ML model that tries to predict an actual numerical value based on the data
    is within the domain of a regression ML problem (see Figure [4-3](#479940_1_En_4_Chapter.xhtml#Fig3)).
    Here are some examples of regression problems:


    ![../images/479940_1_En_4_Chapter/479940_1_En_4_Fig3_HTML.jpg](images/479940_1_En_4_Chapter/479940_1_En_4_Fig3_HTML.jpg)


    Figure 4-3


    Regression


    * Predicting a stock market price

    * Predicting a company’s revenue in the next quarter

    * Finding the optimal speed of a self-driving car


    Whether they are classification or regression problems, an ML model always learns
    from experience. The next section explains what exactly is meant by *experience*.


    ## The Experience


    Experience for an ML model is simply the data that you give to it, from which
    it learns the hidden patterns and then solves a problem. Data given to the model
    is specific to the type of problem that you expect the model to solve. When you
    talk about learning from the data in relation to classification and regression
    problems, different features are present in it along with the feature that you
    want to predict or classify. For example, if you want to predict the stock price
    or classify the stock price movement, you may have data containing different features,
    such as information about high, low, open, and close to a specific stock. Past
    movement of the stock or past stock price information is also provided. So, the
    model looks at the entire dataset and then the actual value for that specific
    time. Based on that, it learns the relationship between all the variables. Once
    the learning process is done and you provide new data, the model looks at all
    the new features, understands the relationship, and then tries to predict or classify
    the new data.


    This value that you are predicting or classifying is called the *target variable*
    or *dependent variable* (say, `Y`). All the other variables are called *independent
    variables* (say, `x`). You can say that the target variable is a function of all
    the independent variables, as given here. The function can be linear or nonlinear.
    Figure [4-4](#479940_1_En_4_Chapter.xhtml#Fig4) shows gradient descent graph,
    which is one of the learning algorithms.


    `Y = f(X)`


    ![../images/479940_1_En_4_Chapter/479940_1_En_4_Fig4_HTML.jpg](images/479940_1_En_4_Chapter/479940_1_En_4_Fig4_HTML.jpg)


    Figure 4-4


    Learning graph (gradient descent)


    In classification and regression problems, the data always contains a dependent
    variable, which is the variable that you want to predict or classify. There is
    one field of ML where the dependent variable is not given. These problems are
    the clustering or association types. Therefore, based on the data available, Machine
    Learning approaches fall into two areas:


    * Supervised learning

    * Unsupervised learning


    ### Supervised and Unsupervised Learning


    If you are crossing a road with the support of someone, this can be called a supervised
    approach. But, if you start crossing the road without anyone’s help, it''s an
    unsupervised approach. Taking a hint from this example, you can say that a supervised
    learning approach includes data that contains dependent variables. That’s when
    the model looks at the input and output variables and tries to learn the relationship
    between them.


    With unsupervised learning, the data doesn’t contain the target variable (`Y`,
    as specified in supervised learning). It must look at the dataset and then find
    the similarities/differences/patterns between them. Based on that, you can have
    different unsupervised learning approaches. You have already seen the supervised
    learning approaches, which are classification and regression. Unsupervised learning
    approaches include clustering, decomposition, and association. Figure [4-5](#479940_1_En_4_Chapter.xhtml#Fig5)
    represents both problem statements visually.


    ![../images/479940_1_En_4_Chapter/479940_1_En_4_Fig5_HTML.jpg](images/479940_1_En_4_Chapter/479940_1_En_4_Fig5_HTML.jpg)


    Figure 4-5


    Supervised versus unsupervised learning


    The following algorithms use supervised learning approaches:


    * Linear/logistic regression

    * K-nearest neighbor

    * Naive Bayes theorem

    * Decision trees

    * Ensemble trees

    * Support vector machines

    * Neural networks


    The following algorithms use unsupervised learning approaches:


    * Hierarchical clustering

    * K-means clustering

    * Apriori rule

    * Neural networks


    Once you have decided what kind of problem your Machine Learning model needs to
    solve and select one of the algorithms from these lists, you come to the next
    phase, which is finding the performance of the model.


    ## The Measure of Performance


    Once your model is ready, it’s time to ensure that you get accurate results. For
    that, you measure the performance of the model, based on the problem that it is
    trying to solve—classification or regression.


    For Classification problems, the following are some of the measures you use:


    * Accuracy

    * Precision

    * Recall or sensitivity

    * F1-score

    * Confusion matrix


    For regression problems, here are some of the metrics:


    * Root mean squared error

    * AIC

    * R2-score


    The next sections discuss these measurements and metrics using the Titanic and
    House Price datasets.'
