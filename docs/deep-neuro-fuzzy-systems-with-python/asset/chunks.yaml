    ### 梯形隶属函数


    梯形有四个顶点，因此隶属函数也有四个坐标值：`a`、`b`、`c` 和 `d`，对应一个清晰值 `x`。但是，请记住这条规则：


    ![$$ b&lt;c&lt;d $$](img/479940_1_En_2_Chapter_TeX_Equs.png)


    你可以用以下公式描述该函数：


    ![$$ f\left(x;a,b,c,d\right)=\max \left(\min \left(\frac{x-a}{b-a},1,\frac{d-x}{d-c}\right),
    0\right) $$](img/479940_1_En_2_Chapter_TeX_Equt.png)


    这个公式可以用多个分界点展开：


    ![$$ f\left(x;a,b,c,d\right)=\left\{\begin{array}{ll}0,&amp; x\le a\\ {}\frac{x-a}{b-a},&amp;
    a\le x\le b\\ {}1,&amp; b\le x\le c\\ {}\frac{d-x}{d-c},&amp; c\le x\le d\\ {}0,&amp;
    d\le x\end{array}\right\} $$](img/479940_1_En_2_Chapter_TeX_Equu.png)


    在梯形隶属函数中，你需要提供四个点。以足球示例来说，你需要根据特定类别提供一个范围。在这个隶属函数中，隶属度从 0% 在中心区域达到 100%，然后再次下降到
    0%。与三角形隶属函数的三个点不同，这里有四个点。这将对足球示例应用梯形隶属函数，其类别定义如下：


    - 全速为 `[60, 80, 80, 90]`

    - 中速为 `[30, 50, 50, 70]`

    - 慢速为 `[20, 30, 30, 50]`

    - 中速左侧为 `[50, 60, 60, 80]`


