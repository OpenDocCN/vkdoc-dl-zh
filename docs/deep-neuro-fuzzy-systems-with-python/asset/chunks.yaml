    a Max-C[P] neuron, it’s called a Max-Product FAM. A Max-C Fuzzy Neuron can be
    represented by the following equation:


    ![$$ y=\left[{\bigvee}_{j=1}^nC\left({w}_j,{x}_j\right)\right]\vee \theta $$](images/479940_1_En_6_Chapter/479940_1_En_6_Chapter_TeX_Equg.png)


    In the previous equation, C represents the Fuzzy Conjunction Operation, while
    *θ* denotes the bias. If this neuron has the maximum operation applied, it is
    called a Max-C[M] neuron, whereas if a product operation is applied, it’s called
    a Max-C[P] neuron.'
  trans: '

    让我们回顾一下这些神经元是如何运作的。图 6-5 展示了一个蕴含-或神经元。该神经元在输入 `x` 和权重 `w` 之间应用了蕴含算子。之后，它在输出上应用了三角余模算子。


    在图 6-5 所示的神经元中，你得到了一个蕴含运算。


    ![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig5_HTML.jpg](img/479940_1_En_6_Fig5_HTML.jpg)


    图 6-5


    蕴含-或神经元


    接下来是一系列 K&C 神经元（见图 6-6）。


    ![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig6_HTML.jpg](img/479940_1_En_6_Fig6_HTML.jpg)


    图 6-6


    K&C 神经元


    关和蔡的模糊神经元结构有些复杂。首先，对于每个输入 `x`，我们将其乘以学习到的权重 `w`。对所有输入节点执行此操作后，将它们聚合起来并转换为单个输入。接下来，找到该输入的状态，可以用以下公式表示：


    ![$$ s=f\left(z-\theta \right) $$](img/479940_1_En_6_Chapter_TeX_Equd.png)


    在这个公式中，你使用 `f` 作为选定的激活函数，而 `θ` 代表激活阈值。最后，通过对状态应用一个函数来得到输出。让我们将这个概念应用于两种类型的 K&C
    模糊神经元：K&C 最大神经元（见图 6-7）和最小神经元（见图 6-8）。


    ![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig8_HTML.jpg](img/479940_1_En_6_Fig8_HTML.jpg)


    图 6-8


    K&C 最小神经元


    ![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig7_HTML.jpg](img/479940_1_En_6_Fig7_HTML.jpg)


    图 6-7


    K&C 最大神经元


    K&C 最大神经元使用 T-余模运算，而 K&C 最小神经元使用 T-模运算。


    你将在本章中继续学习关于模糊神经元的知识。


    ## 模糊推理神经网络


    仅从名称上，你就可以说，如果将模糊推理系统和神经网络的概念结合起来，就诞生了 FINN（模糊推理神经网络）。在详细分析 FINN 之前，你需要先了解它们的类型。基本上，FINN
    可以分为以下几类：


    *   协作式 FINN

    *   并发式 FINN

    *   集成/融合式 FINN


    当你拥有训练数据，并使用神经网络来寻找隶属函数和模糊规则时，这属于协作式 FINN 的范畴（见图 6-9）。


    ![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig9_HTML.jpg](img/479940_1_En_6_Fig9_HTML.jpg)


    图 6-9


    协作式 FINN


    当你无法直接测量输入变量时，则使用并发式 FINN 而非协作式 FINN。在这个过程中，神经网络持续帮助 FIS，以使最终系统始终处于最佳状态。图 6-10
    展示了一个并发式 FINN，其中输入数据被馈送到神经网络，该网络有助于确定最佳的隶属函数，以便后续由模糊系统处理。将神经网络与模糊系统结合并不会优化模糊系统，但会提高系统的整体性能。


    ![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig10_HTML.jpg](img/479940_1_En_6_Fig10_HTML.jpg)


    图 6-10


    并发式 FINN


    集成式 FINN 用于寻找 FIS 的参数。假设你有一个共享的公共数据库，用于存储知识表示和数据结构。这个数据库在神经网络和模糊推理系统之间共享。神经网络和模糊推理系统各自都有一些缺点。但是，当你将这两个概念结合起来时，就得到了集成式
    FINN，从而产生效率更高的架构。


    现在你已经了解了模糊推理神经网络的类别，是时候看看该领域中使用的一些最流行的 FINN 了。我们将讨论以下架构：


    *   模糊联想记忆

    *   曼达尼集成式 FINN

    *   高木-菅野集成式 FINN


    ## 模糊联想记忆


    在学习模糊联想记忆之前，你必须先了解*联想记忆*这个名称的含义。任何联想记忆的主要任务是存储输入和输出模式，以及它们之间的关系和映射。其主要任务是在提供不完整或有噪声的输入模式时，找到输出模式。


    联想记忆可以用以下公式表示：


    ![$$ a=\left\{\left({x}_i,{y}_i\right)\ |\ i=1,2,3\dots n\right\} $$](img/479940_1_En_6_Chapter_TeX_Eque.png)


    ![$$ G\left({x}_i\right)={y}_i $$](img/479940_1_En_6_Chapter_TeX_Equf.png)


    在前面的公式中，`a` 表示一个有限的关联集合，其中 `x` 是输入模式，`y` 是输出模式。`G(x)` 是一个定义 `x` 和 `y` 之间映射的函数。与联想记忆相关的一些术语如下：


    *   基本记忆集

    *   基本记忆

    *   自联想记忆

    *   异联想记忆

    *   记录阶段

    *   联想映射

    *   神经联想记忆

    *   模糊联想记忆


    所有存在的关联，即 `a = {(x[i], y[i]) | i = 1,2,3…n}`，被称为*基本记忆集*，而每个关联 `(x[i] 和 y[i])`
    被称为*基本记忆*。当关联与自身相关时，称为*自联想记忆*，但如果不同，则称为*异联想记忆*。因此，`a = {(x[i], x[i]) | i = 1,2,3…n}`
    是自联想记忆，而 `a = {(x[i], y[i]) | i = 1,2,3…n}` 是异联想记忆。


    寻找函数 `G(x)` 的过程称为*记录阶段*，而 `G` 称为*联想映射*。当联想映射是一个神经网络时，称为*神经联想记忆*；当它是一个模糊神经网络时，称为*模糊联想记忆*。在模糊联想记忆中，输入和输出模式是模糊集。


    通常，模糊联想记忆（FAM）是一种在系统中存储规则的模糊推理神经网络。这条规则是一个具有以下格式的模糊规则：


    *   “如果 x 是 `x[k]`，那么 y 是 `y[k]`”


    模糊联想记忆可以分为两种类型：


    *   最大-最小模糊联想记忆

    *   最大-乘积模糊联想记忆


    由于模糊联想记忆是一种模糊神经网络，其主要组成部分是模糊神经元。这两种 FAM 的区别在于神经元的类型。如果一个 FAM 包含一个 Max-C[M] 神经元，则称为最大-最小
    FAM；但如果它包含一个 Max-C[P] 神经元，则称为最大-乘积 FAM。一个 Max-C 模糊神经元可以用以下公式表示：


    ![$$ y=\left[{\bigvee}_{j=1}^nC\left({w}_j,{x}_j\right)\right]\vee \theta $$](images/479940_1_En_6_Chapter/479940_1_En_6_Chapter_TeX_Equg.png)


    在前面的公式中，`C` 代表模糊合取运算，而 `θ` 表示偏置。如果该神经元应用了最大值运算，则称为 Max-C[M] 神经元；而如果应用了乘积运算，则称为
    Max-C[P] 神经元。

    '
- fmt: '# Mamdani Integrated FINNs


    Mamdani Integrated FINNs (also known as Mamdani Integrated Neuro Fuzzy Systems)
    use the method of backpropagation to learn the parameters of a membership function.
    In this method, you try to find the best values of a parameter by minimizing a
    cost function. Recall that Chapter [5](#479940_1_En_5_Chapter.xhtml) discussed
    the backpropagation method. Because this method utilizes the concept of backpropagation,
    it comes under the domain of supervised learning methods.


    Figure [6-11](#479940_1_En_6_Chapter.xhtml#Fig11) shows how a Mamdani Integrated
    FINN looks.


    ![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig11_HTML.jpg](images/479940_1_En_6_Chapter/479940_1_En_6_Fig11_HTML.jpg)


    Figure 6-11


    Mamdani Integrated FINNs


    The architecture of Mamdani Integrated FINNs consists of five layers:


    - **Layer 1:** This layer consists of the direct inputs, hence it’s called the
    *input layer*. Each node in this layer consists of individual inputs that are
    passed directly to the next layer’s nodes.

    - **Layer 2:** This is also called the *fuzzification layer*. Here you convert
    the crisp inputs passed from the input layer into Fuzzy Sets. It tries to find
    the degree of membership of each individual input value in the Fuzzy Set. Fuzzy
    Clustering approaches are used to define the number and type of membership functions
    for each input variable. Throughout the process of backpropagation, the membership
    function’s numbers and types will keep on changing to fine-tune the entire system.

    - **Layer 3:** This layer is used to define the antecedents of the rule base.
    Therefore, this layer is called the *rule antecedent layer*. Each node in this
    layer uses the T-Norm operation. The output of this layer is the firing strength
    of the corresponding Fuzzy Rule.

    - **Layer 4:** This layer is called the *rule consequent layer*. As the name suggests,
    it is used to determine the consequents for each rule antecedent. It helps to
    define the membership of each antecedent to the output value. The number of nodes
    in this layer are equal to the number of rules in the previous layer.

    - **Layer 5:** This is the final *defuzzification layer*. In this layer, all the
    rule consequents are combined using the T-Co-Norm operation and then they are
    converted into crisp outputs using the defuzzification approaches.


    ## Takagi Sugeno Integrated FINNs


    In this method, the propagation happens in two steps. These two steps require
    a combination of backpropagation and mean least squares estimation. The first
    method is used to fine-tune the membership functions, whereas the second method
    is used to find the parameters. Figure [6-12](#479940_1_En_6_Chapter.xhtml#Fig12)
    shows the diagram that represents a Takagi Sugeno FINN.


    ![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig12_HTML.jpg](images/479940_1_En_6_Chapter/479940_1_En_6_Fig12_HTML.jpg)


    Figure 6-12


    Takagi Sugeno integrated FINNs


    Layer 1 is the input layer. It passes the crisp inputs directly to the second
    layer. Layer 2 converts the crisp inputs received into Fuzzy Sets. Layer 3 finds
    the antecedents of the Fuzzy Rules. These three layers work exactly similar to
    the Mamdani FINNs.


    Layer 4 is used to determine each rule’s firing strength and then normalize it.
    This is done by finding each rule’s firing strength and then dividing it by the
    sum of all the rules’ firing strengths. This can be represented by this formula:


    ![$$ \underset{\_}{w_i}=\frac{w_i}{\sum_{i=1}^n{w}_i} $$](images/479940_1_En_6_Chapter/479940_1_En_6_Chapter_TeX_Equh.png)


    Layer 5 is used to determine the consequents of the rule using the least squares
    method. This is done using this formula:


    ![$$ {\underset{\_}{w}}_i{f}_i={\underset{\_}{w}}_i\left({p}_i{x}_1+{q}_i{x}_2+{r}_i\right)
    $$](images/479940_1_En_6_Chapter/479940_1_En_6_Chapter_TeX_Equi.png)


    In this equation, `p`, `q`, `i` represent the parameter sets.


    Layer 6 is used to aggregate all the outputs coming from the previous layer. This
    can be represented by:


    ![$$ Output=\frac{\sum_{i=1}^n{w}_i{f}_i}{\sum_i^n{w}_i} $$](images/479940_1_En_6_Chapter/479940_1_En_6_Chapter_TeX_Equj.png)


    ## Adaptive Neuro Fuzzy Inference Systems


    Chapter [4](#479940_1_En_4_Chapter.xhtml) discussed Sugeno and Tsukamoto Fuzzy
    Inference Systems. Using Adaptive Neuro-Fuzzy Inference System (ANFIS), you can
    represent both the Sugeno and Tsukamoto systems. That’s why it is named an *adaptive
    network,* as with one network, you can represent multiple networks with minor
    changes.


    You can also represent Mamdani FIS using ANFIS, but that requires a complex mathematical
    approach and is out of the scope of this book. This chapter discusses the Sugeno
    and Tsukamoto approaches using ANFIS. The example will use a system with two inputs
    and one output, for the sake of the understanding.'
