    其中，`a` 代表宽度，`b` 代表斜率，`c` 代表中心。


    如果用广义钟形函数解决足球示例，你将得到以下隶属函数：


    -   全速的中心为 80 英里/小时，宽度和斜率分别为 8 和 4

    -   中速的中心为 50 英里/小时，宽度和斜率分别为 8 和 4

