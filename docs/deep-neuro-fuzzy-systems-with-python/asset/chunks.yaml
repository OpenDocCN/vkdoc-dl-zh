  trans: '

    # Mamdani 集成 FINN


    Mamdani 集成 FINN（也称为 Mamdani 集成神经模糊系统）使用反向传播方法来学习隶属函数的参数。在这种方法中，你通过最小化成本函数来寻找参数的最佳值。回顾一下，第
    5 章讨论了反向传播方法。由于该方法利用了反向传播的概念，因此它属于监督学习方法的范畴。


    图 6-11 展示了 Mamdani 集成 FINN 的结构。


    ![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig11_HTML.jpg](img/479940_1_En_6_Fig11_HTML.jpg)


    图 6-11


    Mamdani 集成 FINN


    Mamdani 集成 FINN 的架构由五层组成：


    -   **第 1 层：** 该层由直接输入组成，因此被称为*输入层*。该层中的每个节点都包含直接传递到下一层节点的各个输入。

    -   **第 2 层：** 这也被称为*模糊化层*。在这里，你将来自输入层的清晰输入转换为模糊集。它试图找到每个输入值在模糊集中的隶属度。使用模糊聚类方法来定义每个输入变量的隶属函数的数量和类型。在整个反向传播过程中，隶属函数的数量和类型将不断变化，以微调整个系统。

    -   **第 3 层：** 该层用于定义规则库的前件。因此，该层被称为*规则前件层*。该层中的每个节点都使用 T-范数运算。该层的输出是相应模糊规则的触发强度。

    -   **第 4 层：** 该层被称为*规则后件层*。顾名思义，它用于确定每个规则前件的后件。它有助于定义每个前件对输出值的隶属度。该层中的节点数量等于前一层中的规则数量。

    -   **第 5 层：** 这是最终的*去模糊化层*。在这一层中，所有规则后件使用 T-协范数运算进行组合，然后使用去模糊化方法将其转换为清晰输出。


    ## Takagi Sugeno 集成 FINN


    在这种方法中，传播分两步进行。这两个步骤需要结合反向传播和最小均方估计。第一种方法用于微调隶属函数，而第二种方法用于寻找参数。图 6-12 展示了 Takagi
    Sugeno FINN 的示意图。


    ![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig12_HTML.jpg](img/479940_1_En_6_Fig12_HTML.jpg)


    图 6-12


    Takagi Sugeno 集成 FINN


    第 1 层是输入层。它将清晰输入直接传递到第二层。第 2 层将接收到的清晰输入转换为模糊集。第 3 层寻找模糊规则的前件。这三层的工作方式与 Mamdani
    FINN 完全相同。


    第 4 层用于确定每条规则的触发强度，然后对其进行归一化。这是通过找到每条规则的触发强度，然后将其除以所有规则触发强度之和来完成的。这可以用以下公式表示：


    ![$$ \underset{\_}{w_i}=\frac{w_i}{\sum_{i=1}^n{w}_i} $$](img/479940_1_En_6_Chapter_TeX_Equh.png)


    第 5 层用于使用最小二乘法确定规则的后件。这是通过以下公式完成的：


    ![$$ {\underset{\_}{w}}_i{f}_i={\underset{\_}{w}}_i\left({p}_i{x}_1+{q}_i{x}_2+{r}_i\right)
    $$](img/479940_1_En_6_Chapter_TeX_Equi.png)


    在这个方程中，`p`、`q`、`i` 代表参数集。


    第 6 层用于聚合来自前一层的所有输出。这可以表示为：


    ![$$ Output=\frac{\sum_{i=1}^n{w}_i{f}_i}{\sum_i^n{w}_i} $$](img/479940_1_En_6_Chapter_TeX_Equj.png)


    ## 自适应神经模糊推理系统


    第 4 章讨论了 Sugeno 和 Tsukamoto 模糊推理系统。使用自适应神经模糊推理系统（ANFIS），你可以表示 Sugeno 和 Tsukamoto
    两种系统。这就是为什么它被称为*自适应网络*，因为通过一个网络，你可以通过微小的更改来表示多个网络。


    你也可以使用 ANFIS 表示 Mamdani FIS，但这需要复杂的数学方法，超出了本书的范围。本章讨论使用 ANFIS 的 Sugeno 和 Tsukamoto
    方法。为了便于理解，示例将使用一个具有两个输入和一个输出的系统。

    '
- fmt: '### ANFIS Representing Sugeno FIS


    The Sugeno Fuzzy Inference System (FIS) rules take the following format, as discussed
    in previous chapters:


    - If `x` is `A1` and `y` is `B1` then `f1 = p1x+q1y+r1`

    - If `x` is `A2` and `y` is `B2` then `f2 = p2x+q2y+r2`


    Figure [6-13](#479940_1_En_6_Chapter.xhtml#Fig13) is the result of representing
    these two rules graphically using the Sugeno approach. Chapter [3](#479940_1_En_6_Chapter.xhtml)
    discussed this concept in detail.


    ![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig13_HTML.jpg](images/479940_1_En_6_Chapter/479940_1_En_6_Fig13_HTML.jpg)


    Figure 6-13: Sugeno defuzzification


    Figure [6-14](#479940_1_En_6_Chapter.xhtml#Fig14) shows the structure of ANFIS
    representing the same architecture of Sugeno.


    ![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig14_HTML.jpg](images/479940_1_En_6_Chapter/479940_1_En_6_Fig14_HTML.jpg)


    Figure 6-14: ANFIS based on Sugeno


    We cover this architecture layer-wise in the following sections.


    #### Layer 1: Membership Function Layer


    This layer is a combination of membership functions for each input. If you look
    at the rules, you know that the inputs `x` and `y` are defined by the membership
    functions `A1`, `A2`, `B1`, and `B2`. These functions can be represented by:


    - `A1 = μ[A1](x)`

    - `A2 = μ[A2](x)`

    - `B1 = μ[B1](y)`

    - `B2 = μ[B2](y)`


    #### Layer 2: Antecedent Layer


    In this layer, you define the antecedent for the rules. All the signals that are
    coming to this layer generate the output for them by finding the product of them.
    This can be represented by:


    - `w[1] = μ[A1](x) * μ[B1](y)`

    - `w[2] = μ[A2](x) * μ[B2](y)`


    In this layer, you use the T-Norm operator.


    #### Layer 3: Normalization Layer


    Here you normalize the antecedent layer output, which can also be referred to
    as *Normalized Firing Strength*. To normalize the past layer output, you divide
    it by the overall firing strength. This can be represented as follows:


    ![$$ {\underset{\_}{w}}_1={w}_1/\left({w}_1+{w}_2\right) $$](images/479940_1_En_6_Chapter/479940_1_En_6_Chapter_TeX_Equk.png)


    ![$$ {\underset{\_}{w}}_2={w}_2/\left({w}_1+{w}_2\right) $$](images/479940_1_En_6_Chapter/479940_1_En_6_Chapter_TeX_Equl.png)


    #### Layer 4: Consequent Layer


    In this layer, you deal with the consequent of the rule. In Sugeno, you saw the
    consequent of the rules. In this layer, you must generate similar output.


    ![$$ {\underset{\_}{w}}_1{f}_1={\underset{\_}{w}}_1\left({p}_1x+{q}_1x+{r}_1\right)
    $$](images/479940_1_En_6_Chapter/479940_1_En_6_Chapter_TeX_Equm.png)


    ![$$ {\underset{\_}{w}}_2{f}_2={\underset{\_}{w}}_2\left({p}_2x+{q}_2x+{r}_2\right)
    $$](images/479940_1_En_6_Chapter/479940_1_En_6_Chapter_TeX_Equn.png)


    In the previous equations, `p`, `q`, `r` represent the parameter set.


    #### Layer 5: Aggregation Layer


    Once you get the consequent layer outputs where you included different parameter
    sets, in this layer you find the aggregate of all the outputs of the previous
    layer. This operation can be represented by this equation:


    ![$$ {\sum}_i^n{\underset{\_}{w}}_i{f}_i=\frac{\sum_i^n{\underset{\_}{w}}_i{f}_i}{\sum_i^n{\underset{\_}{w}}_i}
    $$](images/479940_1_En_6_Chapter/479940_1_En_6_Chapter_TeX_Equo.png)


    ### ANFIS Representing Tsukamoto FIS


    In the Tsukamoto FIS, you get the consequent as follows:


    ![$$ f=\frac{w_1{f}_1+{w}_2{f}_2}{w_1+{w}_2} $$](images/479940_1_En_6_Chapter/479940_1_En_6_Chapter_TeX_Equp.png)


    Figures [6-15](#479940_1_En_6_Chapter.xhtml#Fig15) and [6-16](#479940_1_En_6_Chapter.xhtml#Fig16)
    show diagrams representing the defuzzification process for the Tsukamoto FIS and
    its ANFIS counterpart.


    ![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig16_HTML.jpg](images/479940_1_En_6_Chapter/479940_1_En_6_Fig16_HTML.jpg)


    Figure 6-16: ANFIS based on Tsukamoto


    ![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig15_HTML.jpg](images/479940_1_En_6_Chapter/479940_1_En_6_Fig15_HTML.jpg)


    Figure 6-15: Tsukamoto defuzzification


    As you can see in Figure [6-16](#479940_1_En_6_Chapter.xhtml#Fig16), the system
    is similar to that of a Sugeno-based ANFIS, only instead of using a linear membership
    function, a weighted membership function is used. Therefore, all the layers remain
    exactly the same as with the Sugeno-based example, but in the last layer the defuzzification
    equation changes.


    Let’s look at the application of ANFIS using Python. In Python, there is a package
    named `anfis` that you can use to apply the concept of ANFIS. The dataset contains
    three columns. The first two columns define the crisp inputs, while the last column
    defines their fuzzified values. This example uses the ANFIS to predict these fuzzified
    values and checks the error of the model. You can install the `anfis` package
    by writing the following command:


    ```

    pip install anfis

    ```


    Here is the code applied to a dummy dataset:


    ```

    # Importing necessary libraries

    import anfis

    from anfis.membership import membershipfunction, mfDerivs

    import numpy

    training_data = numpy.loadtxt("training.txt", usecols=[1,2,3])

    X = training_data [:,0:2]

    Y = training_data [:,2]

    # Defining the Membership Functions

    mf = [[[''gaussmf'',{''mean'':0.,''sigma'':1.}],[''gaussmf'',{''mean'':-1.,''sigma'':2.}],[''gaussmf'',{''mean'':-4.,''sigma'':10.}],[''gaussmf'',{''mean'':-7.,''sigma'':7.}]],
    [[''gaussmf'',{''mean'':1.,''sigma'':2.}],[''gaussmf'',{''mean'':2.,''sigma'':3.}],[''gaussmf'',{''mean'':-2.,''sigma'':10.}],[''gaussmf'',{''mean'':-10.5,''sigma'':5.}]]]

    # Updating the model with Membership Functions

    mfc = membershipfunction.MemFuncs(mf)

    # Creating the ANFIS Model Object

    anf = anfis.ANFIS(X, Y, mfc)

    # Fitting the ANFIS Model

    anf.trainHybridJangOffLine(epochs=20)

    # Printing Output

    print(round(anf.consequents[-1][0],6))

    print(round(anf.consequents[-2][0],6))

    print(round(anf.fittedValues[9][0],6))

    # Plotting Model Performance

    anf.plotErrors()

    anf.plotResults()

    ```


    Figure [6-17](#479940_1_En_6_Chapter.xhtml#Fig17) shows how, in each iteration,
    better membership functions are defined, which means that the error is reduced
    at each iteration.


    ![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig17_HTML.jpg](images/479940_1_En_6_Chapter/479940_1_En_6_Fig17_HTML.jpg)


    Figure 6-17: Reduction of error in each epoch


    Figure [6-18](#479940_1_En_6_Chapter.xhtml#Fig18) shows how the predictions fall
    in comparison to the actual data.


    ![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig18_HTML.jpg](images/479940_1_En_6_Chapter/479940_1_En_6_Fig18_HTML.jpg)


    Figure 6-18: Fitted line


    ## Summary


    This chapter looked at some of the architectures of Fuzzy Neural Networks. You
    saw how a simple FINN is composed of a Fuzzy Neuron and then explored various
    kinds of neurons. Then you explored various FINN architectures, starting with
    Fuzzy Associative Memories to the Sugeno Integrated FINN. Finally, you saw how
    an Adaptive Neuro Fuzzy Inference System (ANFIS) works and looked at its application
    using Python.


    The next chapter looks at some of the advanced concepts related to Fuzzy Neural
    Networks.


