    \ function comes under the domain of a *Fuzzy Neuron*. So the first diagram (Figure\
    \ [6-3](#479940_1_En_6_Chapter.xhtml#Fig3)) represents **an** *AND-Fuzzy Neuron*\
    \ and the second one (Figure [6-4](#479940_1_En_6_Chapter.xhtml#Fig4)) is an *OR-Fuzzy\
    \ Neuron,* where:\n\n![$$ {Y}_{AND}=T\\left(S\\left({w}_1,{x}_1\\right),S\\left({w}_2,{x}_2\\\
    right),\\dots, S\\left({w}_n,{x}_n\\right)\\right) $$](images/479940_1_En_6_Chapter/479940_1_En_6_Chapter_TeX_Equb.png)\n\
    \n![$$ {Y}_{OR}=S\\left(T\\left({w}_1,{x}_1\\right),T\\left({w}_2,{x}_2\\right),\\\
    dots, T\\left({w}_n,{x}_n\\right)\\right) $$](images/479940_1_En_6_Chapter/479940_1_En_6_Chapter_TeX_Equc.png)\n\
    \nYou have already seen in previous chapters that the Fuzzy Systems consist of\
    \ membership functions. The AND or OR Fuzzy Neuron basically operates on the membership\
    \ values obtained from the MFs. Since you have to learn the values of w1 and w2\
    \ in the diagram, they will directly relate to the output of the system. This\
    \ means that if the weights are very high, then in the case of OR neurons, the\
    \ input will strongly affect the output. In the case of AND neurons, the input\
    \ will weakly affect the output. Here are some other neurons used in Fuzzy Neural\
    \ Networks:\n\n*   Implication-OR Neuron\n\n*   Kwan and Cai’s Neuron\n    * \
    \  K&C’s Max Neuron\n\n*   K&C’s Min Neuron"
  trans: "\n# 6. 模糊神经网络\n\n在前几章中，你看到了基于清晰输入、权重、参数等的神经网络。但在实际应用中，你并不总能获得相同类型的输入。神经网络中的*模糊性*会导致网络出现模糊信号、模糊权重等情况，此时你处理的就是*模糊神经网络*。本章将探讨模糊神经网络的不同架构及其组成要素。之后你将学习自适应神经模糊架构及其不同版本。\n\
    \n模糊神经网络用于通过神经网络从给定数据中学习，从而找到与模糊系统相关的参数。这些参数可以是模糊集、模糊规则、模糊隶属函数等。简单的模糊神经网络具有以下特性：\n\
    \n- 模糊神经网络基于数据驱动的方法，采用神经网络的技术路线。\n- 模糊神经网络可以在事先了解或不了解模糊规则的情况下构建，因为这些规则可以通过神经网络并行地从数据中学习。\n\
    - 即使参数在过程中被学习，底层模糊系统的属性始终保持不变。\n- 一个模糊系统可以表示为具有多个节点，如图 6-1 所示。\n\n![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig1_HTML.jpg](img/479940_1_En_6_Fig1_HTML.jpg)\n\
    \n图 6-1\n\n模糊神经系统\n\n1. 第一层是输入层\n2. 第二层表示模糊规则\n3. 第三层包含输出节点\n\n如果你有普通的神经网络，并对它们应用一些模糊集算子（如最大值和最小值，即\
    \ T-范数和 S-范数），它们就是一种扩展，被称为*混合神经网络*。你将在下一节学习混合神经网络。\n\n既然模糊系统能够完成任务，为什么还要使用模糊神经网络呢？模糊系统用于寻找输入域和输出域之间的关系。这由一组规则（模糊规则）来定义。但如果你无法捕捉系统中可能存在的所有规则，该怎么办？为了解决这个问题，你可以采用基于神经网络的系统，在其中根据隶属函数学习不同的规则，然后构建整个架构。\n\
    \n简而言之，可以说如果你有数据，就可以利用模糊神经网络从中找出神经模糊系统。此外，如果你已经有一个模糊系统，也可以用同样的方法对其进行增强和优化。让我们从介绍模糊神经元及其架构开始本章的内容。\n\
    \n## 模糊神经元\n\n前一章讨论了普通的神经网络。神经元是人工神经网络的核心组件，用于执行某些运算。它们将一些值作为输入，然后对这些值执行某种运算，以给出处理后的输出。\n\
    \n图 6-2 展示了一个执行基本运算的简单神经元。在图中，你可以看到有两个输入，基于这两个输入，我们定义了一个输出，称为 `y`。`w1` 和 `w2`\
    \ 是我们学习的权重，基于这些权重，我们取加权和作为输出。\n\n![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig2_HTML.jpg](img/479940_1_En_6_Fig2_HTML.jpg)\n\
    \n图 6-2\n\n模糊神经元\n\n这个图没有神经网络架构的任何核心组件，如隐藏层或激活函数，但它仍然可以被视为一个简单的神经网络。因此，输出可以表示为：\n\
    \n```\ny = f(w1 * x1 + w2 * x2)\n```\n\n函数 `f` 可以是任何类型。它可以为空，或者你可以添加一个激活函数，如 Sigmoid\
    \ 或 Relu。注意，我们使用的是普通的数学运算，如加法。如果你使用加法、减法等运算符，或 Sigmoid、Relu 等激活函数，这个神经网络被称为*常规神经网络*。但相反，如果你应用模糊算子，如\
    \ T-范数或 S-范数，它就被称为*混合神经网络*。它是一种模糊架构，并以经典集合的形式拥有不同的信号、权重和函数。之后你可以对输入和权重应用 T-范数和\
    \ T-余范数的不同运算。混合神经网络的一个处理单元被称为*模糊神经元*。\n\n让我们看看混合神经网络架构中不同类型的模糊神经元。图 6-3 和 6-4\
    \ 展示了这些专门针对 T-范数和 T-余范数运算的神经元。\n\n![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig4_HTML.jpg](img/479940_1_En_6_Fig4_HTML.jpg)\n\
    \n图 6-4\n\nT-余范数运算\n\n![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig3_HTML.jpg](img/479940_1_En_6_Fig3_HTML.jpg)\n\
    \n图 6-3\n\nT-范数运算\n\n在图 6-3 中，你可以看到它先执行 T-余范数运算，然后执行 T-范数运算。图 6-4 则正好相反。这种将一个连续函数的输出应用于另一个连续函数的特定运算属于*模糊神经元*的范畴。因此，第一个图（图\
    \ 6-3）表示一个*与-模糊神经元*，第二个图（图 6-4）是一个*或-模糊神经元*，其中：\n\n```\nY_AND = T(S(w1, x1), S(w2,\
    \ x2), ..., S(wn, xn))\n```\n\n```\nY_OR = S(T(w1, x1), T(w2, x2), ..., T(wn,\
    \ xn))\n```\n\n你在前几章已经看到，模糊系统由隶属函数组成。与-或或-模糊神经元基本上是对从隶属函数获得的隶属度值进行运算。由于你必须学习图中\
    \ `w1` 和 `w2` 的值，它们将直接与系统的输出相关。这意味着，如果权重非常高，那么在或神经元的情况下，输入将强烈影响输出。在与神经元的情况下，输入将微弱影响输出。以下是模糊神经网络中使用的其他一些神经元：\n\
    \n- 蕴含-或神经元\n- 关和蔡的神经元\n  - 关蔡的最大神经元\n  - 关蔡的最小神经元\n"
- fmt: 'Let’s review how these neurons operate. Figure [6-5](#479940_1_En_6_Chapter.xhtml#Fig5)
    shows the Implication-OR Neuron. This neuron has an implication operator applied
    between the input `x` and the weight `w`. After that, it applies the Triangular
    Co-norm operator on the output.


    In the neuron shown in Figure [6-5](#479940_1_En_6_Chapter.xhtml#Fig5), you have
    an implication.


    ![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig5_HTML.jpg](images/479940_1_En_6_Chapter/479940_1_En_6_Fig5_HTML.jpg)


    Figure 6-5


    Implication-OR neuron


    Next is a series of K&C neurons (see Figure [6-6](#479940_1_En_6_Chapter.xhtml#Fig6)).


    ![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig6_HTML.jpg](images/479940_1_En_6_Chapter/479940_1_En_6_Fig6_HTML.jpg)


    Figure 6-6


    K&C neuron


    Kwan and Cai’s Fuzzy Neurons have a somewhat complex structure. First, for each
    input `x`, we multiply it by its learned weight, `w`. Once you do this for all
    the input nodes, you aggregate them and convert them into one single input. Next,
    you find the state of this input, which can be represented by:


    ![$$ s=f\left(z-\theta \right) $$](images/479940_1_En_6_Chapter/479940_1_En_6_Chapter_TeX_Equd.png)


    In this equation, you use `f` as the selected activation function, while `θ` represents
    the activation threshold. Finally, you get the output by applying a function to
    the state. Let’s apply the concept to two types of K&C Fuzzy Neurons: K&C Max
    neurons (see Figure [6-7](#479940_1_En_6_Chapter.xhtml#Fig7)) and Min neurons
    (see Figure [6-8](#479940_1_En_6_Chapter.xhtml#Fig8)).


    ![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig8_HTML.jpg](images/479940_1_En_6_Chapter/479940_1_En_6_Fig8_HTML.jpg)


    Figure 6-8


    K&C min neuron


    ![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig7_HTML.jpg](images/479940_1_En_6_Chapter/479940_1_En_6_Fig7_HTML.jpg)


    Figure 6-7


    K&C Max neuron


    The K&C Max neuron uses the T-Co-Norm operation, while the K&C Min neuron uses
    the T-Norm operation.


    You’ll keep on learning about Fuzzy Neurons throughout the chapter.


    ## Fuzzy Inference Neural Networks


    Just by the name, you can say that if you combine the concept of Fuzzy Inference
    Systems and Neural Networks, FINN (Fuzzy Inference Neural Networks) is born. Before
    going through a detailed analysis of FINNs, you need to first understand their
    types. Basically, FINNs can be placed into the following categories:


    *   Cooperative FINNs

    *   Concurrent FINNs

    *   Integrated/Fused FINNs


    When you have training data and use the neural networks to find the membership
    functions and Fuzzy Rules, this comes under the domain of Cooperative FINNs (see
    Figure [6-9](#479940_1_En_6_Chapter.xhtml#Fig9)).


    ![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig9_HTML.jpg](images/479940_1_En_6_Chapter/479940_1_En_6_Fig9_HTML.jpg)


    Figure 6-9


    Cooperative FINNs


    When you are not able to measure the input variables directly, then instead of
    using Cooperative FINNs, you use Concurrent FINNs. In this process, neural networks
    continuously help the FIS so that the final system is always the best. Figure
    [6-10](#479940_1_En_6_Chapter.xhtml#Fig10) shows a concurrent FINN where the input
    data is fed to a neural network, which helps determine the best membership functions
    to be processed by the Fuzzy Systems later. Combining neural networks with Fuzzy
    does not optimize the Fuzzy Systems, but improves the overall performance of the
    system.


    ![../images/479940_1_En_6_Chapter/479940_1_En_6_Fig10_HTML.jpg](images/479940_1_En_6_Chapter/479940_1_En_6_Fig10_HTML.jpg)


    Figure 6-10


    Concurrent FINNs


    Integrated FINNs are used to find the parameters of FIS. Say you have a common
    shared database that stores knowledge representations and data structures. This
    database is shared between the neural network and the Fuzzy Inference System.
    Neural networks and Fuzzy Inference Systems have some disadvantages of their own.
    But when you combine both concepts, you get integrated FINNs, which result in
    much more efficient architectures.


    Now that you know the categories of Fuzzy Inference Neural Networks, it’s time
    to look at some of the most popular FINNs used in the domain. We’ll discuss the
    following architectures:


    *   Fuzzy Associative Memories

    *   Mamdani Integrated FINNs

    *   Takagi-Sugeno Integrated FINNs


    ## Fuzzy Associative Memories


    Before learning about Fuzzy Associative Memories, you must first know what the
    name *associative memory* means. Any associative memory has a primary task of
    storing the input and output patterns and also the relationship and mapping between
    them. The major task is to find an output pattern when an incomplete or noisy
    input pattern is provided.


    An associative memory can be represented by the following equations:


    ![$$ a=\left\{\left({x}_i,{y}_i\right)\ |\ i=1,2,3\dots n\right\} $$](images/479940_1_En_6_Chapter/479940_1_En_6_Chapter_TeX_Eque.png)


    ![$$ G\left({x}_i\right)={y}_i $$](images/479940_1_En_6_Chapter/479940_1_En_6_Chapter_TeX_Equf.png)


    In the previous equations, `a` represents the finite set of associations where
    `x` is the input pattern and `y` is the output pattern. `G(x)` is a function that
    defines the mapping between `x` and `y`. Some of the terminology related to associative
    memories is as follows:


    *   Fundamental memory set

    *   Fundamental memory

    *   Auto-associative memory

    *   Hetero-associative memory

    *   Recording phase

    *   Associative mapping

    *   Neural associative memory

    *   Fuzzy associative memory


    All the associations present, which is `a = {(x[i], y[i]) | i = 1,2,3…n}`, are
    called the *fundamental memory set*, while each association, `(x[i] and y[i])`,
    is called a *fundamental memory*. When the association is related to itself, it
    is called *auto-associative memory*, but if it is different, then it’s called
    *hetero-associative memory*. Therefore, `a = {(x[i], x[i]) | i = 1,2,3…n}` is
    an auto-associative memory, but `a = {(x[i], y[i]) | i = 1,2,3…n}` is a hetero-associative
    memory.


    The process of finding the function `G(x)` is called the *recording phase*, whereas
    `G` is called *associative mapping*. When the associative mapping is a neural
    network, it is called *neural associative memory* and when it is a Fuzzy Neural
    Network, it’s called *Fuzzy Associative Memory*. In a Fuzzy Associative Memory,
    the input and output patterns are Fuzzy Sets.


    Generally, a Fuzzy Associative Memory (FAM) is a Fuzzy Inference Neural Network
    that stores a rule in the system. This rule is a Fuzzy Rule with the following
    format:


    *   “If x is `x[k]` then y is `y[k]`”


    Fuzzy Associative Memories can be of two types:


    *   Max-Min Fuzzy Associative Memory

    *   Max-Product Fuzzy Associative Memory


    Since a Fuzzy Associative Memory is a Fuzzy Neural Network, their main component
    is Fuzzy Neurons. The two FAMs differ in terms of the types of neurons. If a FAM
    contains a Max-C[M] neuron, then it is called a Max-Min FAM, but if it contains
    a Max-C[P] neuron, it’s called a Max-Product FAM. A Max-C Fuzzy Neuron can be
    represented by the following equation:


    ![$$ y=\left[{\bigvee}_{j=1}^nC\left({w}_j,{x}_j\right)\right]\vee \theta $$](images/479940_1_En_6_Chapter/479940_1_En_6_Chapter_TeX_Equg.png)


    In the previous equation, `C` represents the Fuzzy Conjunction Operation, while
    `θ` denotes the bias. If this neuron has the maximum operation applied, it is
    called a Max-C[M] neuron, whereas if a product operation is applied, it’s called
    a Max-C[P] neuron.'
