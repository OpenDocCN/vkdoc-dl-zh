    ### 三角形隶属函数


    正如三角形有三个顶点，三角形隶属函数也有三个参数：`a`、`b` 和 `c`。


    - `a` 是下边界

    - `b` 是中心点

    - `c` 是上边界


    以下公式描述了三角形隶属函数：


    ![$$ f\left(x;a,b,c\right)=\left\{\begin{array}{ll}0,&amp; x\le a\\ {}\frac{x-a}{b-a},&amp;
    a\le x\le b\\ {}\frac{c-x}{c-b},&amp; b\le x\le c\\ {}0,&amp; c\le x\end{array}\right\}
    $$](img/479940_1_En_2_Chapter_TeX_Equq.png)


    或者，也可以表示为：


    ![$$ f\left(x;a,b,c\right)=\max \left(\min \left(\frac{x-a}{b-a},\frac{c-x}{c-b}\right),
    0\right) $$](img/479940_1_En_2_Chapter_TeX_Equr.png)


    你可以通过一个例子来理解三角形隶属函数。这个例子将三角形隶属函数应用于足球场景。假设射手可以踢四种点球：


    - 全速直线球

    - 中速弧线球

    - 慢速直线球

    - 中速左侧球


    平均而言，射手踢点球的最高速度为 80 英里/小时。因此，你无法说这个速度是慢的。所以，你给 80 英里/小时分配 0% 的隶属度。类似地，60 英里/小时的速度可以被认为是
    70% 的快和 30% 的中等。同样，你可以为不同的速度分配不同的隶属度。


    如果你使用三角形隶属函数，它包含三个界限：下界、全隶属界和上界。下界和上界的隶属度为 0%，而全隶属界的值为 100%。其余的值呈线性变化。你可以为这些类别分配以下三角形隶属函数：


    - 全速为 `[60, 80, 80]`

    - 中速为 `[40, 50, 70]`

    - 慢速为 `[20, 20, 45]`

    - 中速左侧为 `[50, 60, 80]`


    例如，如果你将“中速”的三角形隶属函数定义为 `[40, 50, 70]`，那么在 40 英里/小时时隶属度为 0%，在 50 英里/小时时线性增加到 100%，然后在
    70 英里/小时时线性下降到 0%。以下 Python 代码展示了这些三角形隶属函数的执行过程。图 2-6 显示了结果。


    ![../images/479940_1_En_2_Chapter/479940_1_En_2_Fig6_HTML.jpg](img/479940_1_En_2_Fig6_HTML.jpg)


    **图 2-6** 足球示例的三角形隶属度


