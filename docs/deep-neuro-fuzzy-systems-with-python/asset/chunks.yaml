    Classical sets, also called *crisp sets*, are a collection of objects. Objects
    can be anything belonging in the real world, and sometimes outside the domain
    as well. For example:


    ```

    Cars = {Audi, BMW, Mercedes, Porsche}

    ```


    This set shows a list of premium cars. You denote a set by using the curly braces,
    `{}`.


    Once you have effectively defined different sets, you can visualize them as well.
    A *Venn diagram* is a visual way to represent sets and their relationships with
    each other. Figure [1-2](#479940_1_En_1_Chapter.xhtml#Fig2) shows a normal Venn
    diagram.


    ![../images/479940_1_En_1_Chapter/479940_1_En_1_Fig2_HTML.jpg](images/479940_1_En_1_Chapter/479940_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    Simple Venn diagram


    The circles in Figure [1-2](#479940_1_En_1_Chapter.xhtml#Fig2) represent two sets,
    A and B. All the elements that are part of Set A will be present in Circle A,
    while all the elements that are part of Set B will be present in Circle B. The
    circles are called Venn diagrams of Set A and Set B.


    ### Universe of Discourse


    All the possible elements that can share a domain, or have similar characteristics,
    are contained in a set. The set of those elements is called the *Universe of Discourse*.
    Once you have this set, you can form various subsets as well. Formally speaking,
    the Universe of Discourse can be defined as follows:


    *“In every discourse, whether of the mind conversing with its own thoughts, or
    of the individual in his intercourse with others, there is an assumed or expressed
    limit within which the subjects of its operation are confined. … Now, whatever
    may be the extent of the field within which all the objects of our discourse are
    found, that field may properly be termed the Universe of Discourse. (Boole 1854/1958,
    p. 42)”*


    Look at the Universe of Discourse with the following example:


    ![$$ E=\left\{ Domain\ of\ Machine\ Learning\right\} $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equa.png)


    Let Set E be the Universe of Discourse. It has the complete domain of Machine
    Learning. Then the possible sets that can be part of E are:


    *   Set of Machine Learning algorithms


    *   Set of basic statistical methods


    *   Set of neural networks, etc.


    ## Properties of Classical Sets


    This section explains the various properties of classical sets. These are:


    *   Membership of elements


    *   Cardinality of sets


    *   Family of sets


    *   Null set


    *   Singleton set


    *   Subset


    *   Superset


    *   Powerset


    *   Countable set


    *   Uncountable set


    ### Membership of Elements


    If an element is a part of a set, it is called a *member* of the set. It is denoted
    by X ε A, which means that Element X is a member of Set A.


    ![$$ A=\left\{1,2,3,4,5\right\} $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equb.png)


    In the set of integers from 1 to 5, each number is called a member of Set A.


    ### Cardinality of Sets


    In a set, if you count the total number of elements present, that number is called
    the *cardinality* of the set. It can be denoted by n(A) or |A| or #A.


    ![$$ A=\left\{1,2,3,4,5\right\} $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equc.png)


    This set has a cardinality of 5.'
