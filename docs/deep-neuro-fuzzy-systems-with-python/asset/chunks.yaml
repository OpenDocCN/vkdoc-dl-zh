    ## Fuzzy Set Operations


    Now that you have learned about the concept of membership functions, it’s time
    to look at some of the operations that can be done with Fuzzy Sets. This section
    discusses the following operations:


    *   Union


    *   Intersection


    *   Complement


    *   Product


    *   Equality


    *   Power


    *   Difference


    *   Disjunctive sum


    Suppose there are two Fuzzy Sets, A and B, having a membership value as *μ*[*A*](*x*)
    and *μ*[*B*](*x*), where X is the Universe of Discourse. Based on this information,
    the following sections consider each operation in detail.


    ### Union


    The union of two Fuzzy Sets A and B is a new Fuzzy Set, A ∪ B, also on X with
    a membership function defined as follows:


    ![$$ {\mu}_{\left(A\cup B\right)}=\mathit{\max}\left({\mu}_A(x),{\mu}_B(x)\right)={\mu}_A(x)\wedge
    {\mu}_B(x) $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equaq.png)


    ∧ is called the *maximum operator*.


    Here is the Python implementation:


    ```

    import skfuzzy as sk

    import numpy as np

    #Defining the Numpy array for Tip Quality

    x_qual = np.arange(0, 11, 1)

    #Defining the Numpy array for two membership functions (Triangular)

    qual_lo = sk.trimf(x_qual, [0, 0, 5])

    qual_md = sk.trimf(x_qual, [0, 5, 10])

    #Finding the Maximum (Fuzzy Or)

    sk.fuzzy_or(x_qual,qual_lo,x_qual,qual_hi)

    ```


    ### Intersection


    An intersection of Fuzzy Sets A and B is a new Fuzzy Set, A ∩ B, also on X whose
    membership function is defined by:


    ![$$ {\mu}_{\left(A\cap B\right)}=\mathit{\min}\left({\mu}_A(x),{\mu}_B(x)\right)={\mu}_A(x)\vee
    {\mu}_B(x) $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equar.png)


    is called the minimum operator.


    Here is the Python implementation:


    ```

    import skfuzzy as sk

    import numpy as np

    #Defining the Numpy array for Tip Quality

    x_qual = np.arange(0, 11, 1)

    #Defining the Numpy array for two membership functions (Triangular)

    qual_lo = sk.trimf(x_qual, [0, 0, 5])

    qual_md = sk.trimf(x_qual, [0, 5, 10])

    #Finding the Minimum (Fuzzy AND)

    sk.fuzzy_and(x_qual,qual_lo,x_qual,qual_hi)

    ```'
