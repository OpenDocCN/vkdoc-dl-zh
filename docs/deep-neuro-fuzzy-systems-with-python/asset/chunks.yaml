  trans: '

    # 5. 人工神经网络


    前一章讨论了与机器学习相关的各种术语，以及用于检验模型准确性的一些指标。本章将讨论神经网络的概念。


    本章首先解释人工神经网络及其组成部分。它会详细讲解其中一些组件，比如激活函数、层等。接着，本章将介绍一些高级的神经网络架构，例如卷积神经网络、循环神经网络、长短期记忆网络和门控循环单元。同时，也会展示这些概念在
    Python 中的一些应用。


    ## 人工神经网络入门


    人工神经网络（ANNs）的灵感来源于生物神经元的功能。核心机器学习算法使用统计概念来学习数据中存在的不同模式。ANNs 则试图尽可能地模仿人脑和神经元来学习模式。通过使用线性代数和微积分的数学技术，ANNs
    从数据中学习并试图发现模式。


    一个 ANN 由以下几层组成：


    - 输入层

    - 隐藏层

    - 输出层


    输入层包含你想要用来训练网络的样本。你拥有的所有用于让系统学习的数据，都提供给输入层。训练网络意味着机器试图找出数据中存在的所有可能模式，然后学习它们。训练的好处在于，当你提供一组新数据时，机器会尝试将学到的模式应用于这组新数据。如果模式匹配，就会根据训练数据中遵循此模式的处理方式做出决策。


    隐藏层试图查看输入层的不同组合，并决定哪些组合是重要的，以及应该给予它们多大的重要性。它们借助权重来完成这项工作。因此，可以说隐藏层接收的是加权输入。


    一旦所有处理完成，输出层就会计算程序的所有输出并提供结果。图 5-1 展示了所有这三层的基本表示。


    神经网络通过应用前向传播和反向传播的概念来运作。因此，在详细讨论 ANN 架构之前，理解这些概念是至关重要的。


    图 5-1 中的图形也称为计算图。图中的每个节点用一个圆圈表示，代表一个变量。这个变量可以是标量、向量或张量。有时它也可以是另一个变量。每个节点都是通过对前一个节点应用某种操作计算得出的。因此，在图
    5-1 中，隐藏节点由输入节点计算得出，输出节点由隐藏节点计算得出。这种通过前一个节点的操作来计算输出节点，并且信息从输入节点传递到输出节点的过程，称为*前向传播*。


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig1_HTML.jpg](img/479940_1_En_5_Fig1_HTML.jpg)


    图 5-1


    ANNs 的计算图


    一旦创建了输出节点并使用前向传播方法计算了它们的值，就需要计算梯度，这要求信息从输出节点反向流向输入节点。这个概念称为*反向传播*。在神经网络中，使用反向传播方法计算梯度变得非常重要，因为它有助于最小化代价函数，从而得到更好、更准确的预测。


    从数学上讲，反向传播过程可以表示为：


    ![$$ {\varDelta}_xf\left(x,y\right) $$](img/479940_1_En_5_Chapter_TeX_Equa.png)


    你可以计算函数 `f()` 的梯度，其中 `x` 是需要求导的变量集合，`y` 是不需要求导的变量（例如，输入节点）。在像神经网络这样的学习算法中，这个输出函数被称为*代价函数*，表示为：


    ![$$ J\left(\theta \right) $$](img/479940_1_En_5_Chapter_TeX_Equb.png)


    对于二分类问题，损失函数 `J(θ)` 可以定义如下：


    ![$$ J\left(\theta \right)=-\frac{1}{N}{\sum}_{i=1}^Ny\ast \mathit{\log}\left(p(y)\right)+\left(1-y\right)\ast
    \mathit{\log}\left(p\left(1-y\right)\right) $$](img/479940_1_En_5_Chapter_TeX_Equc.png)


    因此，这个方程对输入节点进行微分，直到损失值达到最小。这个最小值是通过在梯度下降过程中达到一个称为全局最小值的点来确定的。图 5-2 展示了梯度下降过程。


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig2_HTML.jpg](img/479940_1_En_5_Fig2_HTML.jpg)


    图 5-2


    梯度下降


    每次你对代价函数求导以找到梯度时，你都会沿着图 5-2 所示的抛物线曲线向下移动。反向传播的目标是到达曲线底部的一个点，在该点损失函数的值最小。当值达到最小时，你就找到了产生该值的变量值。在神经网络的情况下，这些变量被称为*权重*和*偏置*。你使用这些变量来预测测试集中的下一组值。


    牢记这些概念，现在是时候更深入地研究 ANNs 了。ANNs 可以分为两种类型：


    - 感知机

    - 多层 ANNs


    接下来的部分将解释这两种 ANNs，然后本章将继续介绍一些用于计算机视觉和自然语言处理领域的复杂神经网络架构。


    ## 感知机


    *感知机*是一种单层神经网络，这意味着它只有输入层。通过使用不同的参数，你可以得到输出。其架构可能如图 5-3 所示。


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig3_HTML.jpg](img/479940_1_En_5_Fig3_HTML.jpg)


    图 5-3


    典型的感知机架构


    感知机主要用作线性（二分类）分类器。二分类器将输入仅分为两个类别。如图 5-3 所示，感知机由以下部分组成：


    - 输入层

    - 权重和偏置参数

    - 加权输入求和

    - 对加权和施加激活/阶跃函数以得到输出


    因此，在感知机中，所有输入都与学习到的权重（`w`）相乘。这些权重是通过反向传播过程学习到的。对加权输入进行求和，然后将输出传递给激活函数，激活函数提供最终输出。激活函数有多种类型，它们根据公式给出不同的输出。为了进行二分类，你可以使用
    sigmoid 或 ReLU 激活函数。在进一步讨论多层感知机之前，先来看一下激活函数。

    '
- fmt: '# Activation Functions


    Each neuron in the hidden layer or output layer has its own activation function.
    This helps to decide whether the output from a particular neuron is important
    or not. The weights that the system has learned are multiplied with the input
    neuron value. Then, a bias value is added. The output value is based on the activation
    function, which determines the importance. When you have an activation function
    in the output neuron, it takes the output of all the previous neurons, where activation
    function is applied, and gives a final answer by performing the weighted sum.
    There are different types of activation functions, some of which are:


    *   Sigmoid

    *   Tanh

    *   Softmax

    *   ReLU

    *   Leaky ReLU


    ## Sigmoid Activation Function


    A sigmoid activation function has an s-shaped curve. Its range lies from 0 to
    1. Since its upper and lower limit is 0 and 1, it is most widely used with binary
    classification problems. Here is the formula and the curve of the sigmoid activation
    function (see Figure [5-4](#479940_1_En_5_Chapter.xhtml#Fig4)), followed by the
    Python implementation.


    ![$$ Sigmoid(x)=\frac{1}{1+{e}^{-x}} $$](images/479940_1_En_5_Chapter/479940_1_En_5_Chapter_TeX_Equd.png)


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig4_HTML.jpg](images/479940_1_En_5_Chapter/479940_1_En_5_Fig4_HTML.jpg)


    Figure 5-4 Sigmoid activation function


    ```

    import numpy as np

    def sigmoid(x):

    return 1 / (1 + np.exp(-x))

    ```


    ## Tanh Activation Function


    `Tanh` is also referred to as the hyperbolic tangent function. The shape of this
    function is also like an s, but its limit is from -1 to +1. This function is used
    when you want to consider negative outputs. Generally, in the hidden layers using
    `Tanh` is recommended because it allows the output of different layers to give
    negative values as well. Outputs of the output layer can be given to the sigmoid
    function to get positive values, but in the middle layers, more information should
    be captured from the data and `Tanh` provides you with a way to do that. Here
    is the formula and curve of the `Tanh` activation function (see Figure [5-5](#479940_1_En_5_Chapter.xhtml#Fig5)),
    followed by the Python implementation.


    ![$$ \mathit{\tanh}(x)=\frac{2}{1+{e}^{-2x}} $$](images/479940_1_En_5_Chapter/479940_1_En_5_Chapter_TeX_Eque.png)


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig5_HTML.jpg](images/479940_1_En_5_Chapter/479940_1_En_5_Fig5_HTML.jpg)


    Figure 5-5 Tanh activation function


    ```

    import numpy as np

    def tanh(x):

    return np.tanh(x)

    ```


    ## Softmax Activation Function


    When you have binary classification problems, you use sigmoid functions. But if
    you have multiple classes, you should use softmax activation functions instead.
    The output of a softmax function is the probability of each class, concerning
    all the classes. The class with the maximum probability is considered the predicted
    class. Here is the formula and curve of a softmax function (see Figure [5-6](#479940_1_En_5_Chapter.xhtml#Fig6)),
    followed by the Python implementation.


    ![$$ softmax(x)=\frac{e^i}{\varSigma\ {e}^i} $$](images/479940_1_En_5_Chapter/479940_1_En_5_Chapter_TeX_Equf.png)


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig6_HTML.jpg](images/479940_1_En_5_Chapter/479940_1_En_5_Fig6_HTML.jpg)


    Figure 5-6 Softmax activation function


    ```

    import numpy as np

    def softmax(x):

    exps = np.exp(x)

    return exps / np.sum(exps, axis=1).reshape(-1,1)

    ```


    ## Rectified Linear Unit (ReLU) Activation Function


    `ReLU` activation functions have a lower limit of 0, but no upper limit. This
    means that if the weighted sum is an integer or whole number, the exact value
    will be returned as output. But if the output is less than 0, the output will
    be converted into 0. It can be represented by the following formula and curve
    in Figure [5-7](#479940_1_En_5_Chapter.xhtml#Fig7).


    ![$$ ReLU(x)=\mathit{\max}\ \left(0,x\right) $$](images/479940_1_En_5_Chapter/479940_1_En_5_Chapter_TeX_Equg.png)


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig7_HTML.jpg](images/479940_1_En_5_Chapter/479940_1_En_5_Fig7_HTML.jpg)


    Figure 5-7 ReLU activation function


    The following is the Python implementation.


    ```

    import numpy as np

    def relu(x):

    return 1.0*(x>0)

    ```


    ## Leaky ReLU Activation Functions


    This is exactly same as `ReLU`, but instead of having a lower limit as exactly
    0, the values can be less than 0 so that the “dying ReLU problem” (discussed next)
    can be solved. You take a value *α* and multiply it by the original value so that
    the new value can be less than 0. Here is the formula and curve of leaky `ReLU`
    (see Figure [5-8](#479940_1_En_5_Chapter.xhtml#Fig8)), followed by the Python
    implementation.


    ![$$ LeakyReLU(x)=\left\{x, if\ x&gt;0\ \right\} $$](images/479940_1_En_5_Chapter/479940_1_En_5_Chapter_TeX_Equh.png)


    ![$$ \left\{\alpha x, otherwise\right\} $$](images/479940_1_En_5_Chapter/479940_1_En_5_Chapter_TeX_Equi.png)


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig8_HTML.jpg](images/479940_1_En_5_Chapter/479940_1_En_5_Fig8_HTML.jpg)


    Figure 5-8 Leaky ReLU activation function


    ```

    import numpy as np

    def leaky_relu(x, leaky_slope):

    d=np.zeros_like(x)

    d[X0]=1

    return d

    ```


    Here’s the application of these Python methods:


    ```

    import numpy as np

    #Defining dummy values of x

    x = np.linspace(-np.pi, np.pi, 12)

    #Finding the Activation Function Outputs

    sigmoid_output = sigmoid(x)

    tanh_output = tanh(x)

    softmax_output = softmax(x)

    relu_output = relu(x)

    leaky_relu_output = leaky_relu(x)

    #Printing the Outputs

    print(sigmoid_output)

    print(tanh_output)

    print(softmax_output)

    print(relu_output)

    print(leaky_relu_output)

    ```


    ### What Is the Dying ReLU Problem?


    Once the system has learned the weights and the bias of each neuron, and you give
    `ReLU` as an activation function, it usually gives the same output as it received
    as the input. But since any values that are less than 0 are converted to 0, the
    neurons may not be able to differentiate between the inputs. This problem is called
    the dying `ReLU` problem.


    This makes a neuron practically dead. Even the slope of negative values is zero.
    If you keep moving forward and don’t heed this problem, eventually a large part
    of the neural network will end up doing nothing. This problem generally happens
    when the learning rate is too high. By making the learning rate smaller or changing
    the activation function, for example to leaky-`ReLU`, you can solve the problem.


    # Multi-Layer ANNs


    There are different types of multi-layer artificial neural networks. This chapter
    discusses the most relevant ones. The general architecture of a multi-layer ANN
    is shown in Figure [5-9](#479940_1_En_5_Chapter.xhtml#Fig9).


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig9_HTML.jpg](images/479940_1_En_5_Chapter/479940_1_En_5_Fig9_HTML.jpg)


    Figure 5-9 Typical multi-layered ANN architecture


    The following sections review these ANNs:


    *   Convolutional neural networks

    *   Recurrent neural networks

    *   Long short-term memory

    *   Gated recurrent units'
  raw: '### Activation Functions


    Each neuron in the hidden layer or output layer has its own activation function.
    This helps to decide whether the output from a particular neuron is important
    or not. The weights that the system has learned are multiplied with the input
    neuron value. Then, a bias value is added. The output value is based on the activation
    function, which determines the importance. When you have an activation function
    in the output neuron, it takes the output of all the previous neurons, where activation
    function is applied, and gives a final answer by performing the weighted sum.
    There are different types of activation functions, some of which are:


    *   Sigmoid


    *   Tanh


    *   Softmax


    *   ReLU


    *   Leaky ReLU


    #### Sigmoid Activation Function


    A sigmoid activation function has an s-shaped curve. Its range lies from 0 to
    1. Since its upper and lower limit is 0 and 1, it is most widely used with binary
    classification problems. Here is the formula and the curve of the sigmoid activation
    function (see Figure [5-4](#479940_1_En_5_Chapter.xhtml#Fig4)), followed by the
    Python implementation.


    ![$$ Sigmoid(x)=\frac{1}{1+{e}^{-x}} $$](images/479940_1_En_5_Chapter/479940_1_En_5_Chapter_TeX_Equd.png)


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig4_HTML.jpg](images/479940_1_En_5_Chapter/479940_1_En_5_Fig4_HTML.jpg)


    Figure 5-4


    Sigmoid activation function


    ```

    import numpy as np

    def sigmoid(x):

    return 1 / (1 + np.exp(-x))

    ```


    #### Tanh Activation Function


    Tanh is also referred to as the hyperbolic tangent function. The shape of this
    function is also like an s, but its limit is from -1 to +1\. This function is
    used when you want to consider negative outputs. Generally, in the hidden layers
    using Tanh is recommended because it allows the output of different layers to
    give negative values as well. Outputs of the output layer can be given to the
    sigmoid function to get positive values, but in the middle layers, more information
    should be captured from the data and Tanh provides you with a way to do that.
    Here is the formula and curve of the Tanh activation function (see Figure [5-5](#479940_1_En_5_Chapter.xhtml#Fig5)),
    followed by the Python implementation.


    ![$$ \mathit{\tanh}(x)=\frac{2}{1+{e}^{-2x}} $$](images/479940_1_En_5_Chapter/479940_1_En_5_Chapter_TeX_Eque.png)


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig5_HTML.jpg](images/479940_1_En_5_Chapter/479940_1_En_5_Fig5_HTML.jpg)


    Figure 5-5


    Tanh activation function


    ```

    import numpy as np

    def tanh(x):

    return np.tanh(x)

    ```


    #### Softmax Activation Function


    When you have binary classification problems, you use sigmoid functions. But if
    you have multiple classes, you should use softmax activation functions instead.
    The output of a softmax function is the probability of each class, concerning
    all the classes. The class with the maximum probability is considered the predicted
    class. Here is the formula and curve of a softmax function (see Figure [5-6](#479940_1_En_5_Chapter.xhtml#Fig6)),
    followed by the Python implementation.


    ![$$ softmax(x)=\frac{e^i}{\varSigma\ {e}^i} $$](images/479940_1_En_5_Chapter/479940_1_En_5_Chapter_TeX_Equf.png)


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig6_HTML.jpg](images/479940_1_En_5_Chapter/479940_1_En_5_Fig6_HTML.jpg)


    Figure 5-6


    Softmax activation function


    ```

    import numpy as np

    def softmax(x):

    exps = np.exp(x)

    return exps / np.sum(exps, axis=1).reshape(-1,1)

    ```


    #### Rectified Linear Unit (ReLU) Activation Function


    ReLU activation functions have a lower limit of 0, but no upper limit. This means
    that if the weighted sum is an integer or whole number, the exact value will be
    returned as output. But if the output is less than 0, the output will be converted
    into 0\. It can be represented by the following formula and curve in Figure [5-7](#479940_1_En_5_Chapter.xhtml#Fig7).


    ![$$ ReLU(x)=\mathit{\max}\ \left(0,x\right) $$](images/479940_1_En_5_Chapter/479940_1_En_5_Chapter_TeX_Equg.png)


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig7_HTML.jpg](images/479940_1_En_5_Chapter/479940_1_En_5_Fig7_HTML.jpg)


    Figure 5-7


    ReLU activation function


    The following is the Python implementation.


    ```

    import numpy as np

    def relu(x):

    return 1.0*(x>0)

    ```


    #### Leaky ReLU Activation Functions


    This is exactly same as ReLU, but instead of having a lower limit as exactly 0,
    the values can be less than 0 so that the “dying ReLU problem” (discussed next)
    can be solved. You take a value *α* and multiply it by the original value so that
    the new value can be less than 0\. Here is the formula and curve of leaky ReLU
    (see Figure [5-8](#479940_1_En_5_Chapter.xhtml#Fig8)), followed by the Python
    implementation.


    ![$$ LeakyReLU(x)=\left\{x, if\ x&gt;0\ \right\} $$](images/479940_1_En_5_Chapter/479940_1_En_5_Chapter_TeX_Equh.png)


    ![$$ \left\{\alpha x, otherwise\right\} $$](images/479940_1_En_5_Chapter/479940_1_En_5_Chapter_TeX_Equi.png)


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig8_HTML.jpg](images/479940_1_En_5_Chapter/479940_1_En_5_Fig8_HTML.jpg)


    Figure 5-8


    Leaky ReLU activation function


    ```

    import numpy as np

    def leaky_relu(x, leaky_slope):

    d=np.zeros_like(x)

    d[X0]=1

    return d

    ```


    Here’s the application of these Python methods:


    ```

    import numpy as np

    #Defining dummy values of x

    x = np.linspace(-np.pi, np.pi, 12)

    #Finding the Activation Function Outputs

    sigmoid_output = sigmoid(x)

    tanh_output = tanh(x)

    softmax_output = softmax(x)

    relu_output = relu(x)

    leaky_relu_output = leaky_relu(x)

    #Printing the Outputs

    print(sigmoid_output)

    print(tanh_output)

    print(softmax_output)

    print(relu_output)

    print(leaky_relu_output)

    ```


    ##### What Is the Dying ReLU Problem?


    Once the system has learned the weights and the bias of each neuron, and you give
    ReLU as an activation function, it usually gives the same output as it received
    as the input. But since any values that are less than 0 are converted to 0, the
    neurons may not be able to differentiate between the inputs. This problem is called
    the dying ReLU problem.


    This makes a neuron practically dead. Even the slope of negative values is zero.
    If you keep moving forward and don’t heed this problem, eventually a large part
    of the neural network will end up doing nothing. This problem generally happens
    when the learning rate is too high. By making the learning rate smaller or changing
    the activation function, for example to leaky- ReLU, you can solve the problem.


    ## Multi-Layer ANNs


    There are different types of multi-layer artificial neural networks. This chapter
    discusses the most relevant ones. The general architecture of a multi-layer ANN
    is shown in Figure [5-9](#479940_1_En_5_Chapter.xhtml#Fig9).


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig9_HTML.jpg](images/479940_1_En_5_Chapter/479940_1_En_5_Fig9_HTML.jpg)


    Figure 5-9


    Typical multi-layered ANN architecture


    The following sections review these ANNs:


    *   Convolutional neural networks


    *   Recurrent neural networks


    *   Long short-term memory


    *   Gated recurrent units'
