    *   Fundamental memory set


    *   Fundamental memory


    *   Auto-associative memory


    *   Hetero-associative memory


    *   Recording phase


    *   Associative mapping


    *   Neural associative memory


    *   Fuzzy associative memory


    All the associations present, which is *a* = {(*x*[*i*], *y*[*i*]) | *i* = 1,2,3…*n*},
    are called the *fundamental memory set* , while each association, (*x*[*i*] *and y*[*i*]),
