    ## 模糊集合运算


    现在你已经了解了隶属函数的概念，是时候看看可以对模糊集合进行的一些运算了。本节将讨论以下运算：


    *   并集

    *   交集

    *   补集

    *   乘积

    *   相等

    *   幂

    *   差集

    *   析取和


    假设有两个模糊集合 `A` 和 `B`，其隶属度值分别为 `μA` 和 `μB`，其中 `X` 是论域。基于此信息，以下各节将详细讨论每个运算。


    ### 并集


    两个模糊集合 `A` 和 `B` 的并集是一个新的模糊集合 `A ∪ B`，同样在 `X` 上，其隶属函数定义如下：


    ![$$ {\mu}_{\left(A\cup B\right)}=\mathit{\max}\left({\mu}_A(x),{\mu}_B(x)\right)={\mu}_A(x)\wedge
    {\mu}_B(x) $$](img/479940_1_En_1_Chapter_TeX_Equaq.png)


    `∧` 被称为*最大值算子*。


    以下是 Python 实现：


    ```

    import skfuzzy as sk

    import numpy as np

    #定义小费质量的 Numpy 数组

    x_qual = np.arange(0, 11, 1)

    #定义两个隶属函数（三角形）的 Numpy 数组

    qual_lo = sk.trimf(x_qual, [0, 0, 5])

    qual_md = sk.trimf(x_qual, [0, 5, 10])

    #求最大值（模糊或）

    sk.fuzzy_or(x_qual,qual_lo,x_qual,qual_hi)

    ```


    ### 交集


    模糊集合 `A` 和 `B` 的交集是一个新的模糊集合 `A ∩ B`，同样在 `X` 上，其隶属函数定义如下：


    ![$$ {\mu}_{\left(A\cap B\right)}=\mathit{\min}\left({\mu}_A(x),{\mu}_B(x)\right)={\mu}_A(x)\vee
    {\mu}_B(x) $$](img/479940_1_En_1_Chapter_TeX_Equar.png)


    `∨` 被称为最小值算子。


    以下是 Python 实现：


    ```

    import skfuzzy as sk

    import numpy as np

    #定义小费质量的 Numpy 数组

    x_qual = np.arange(0, 11, 1)

    #定义两个隶属函数（三角形）的 Numpy 数组

    qual_lo = sk.trimf(x_qual, [0, 0, 5])

    qual_md = sk.trimf(x_qual, [0, 5, 10])

    #求最小值（模糊与）

    sk.fuzzy_and(x_qual,qual_lo,x_qual,qual_hi)

    ```

