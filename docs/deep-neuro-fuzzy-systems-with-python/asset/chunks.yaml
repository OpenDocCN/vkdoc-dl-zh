    ### Pi-Shaped


    Pi-shaped curves have four parameters. Parameters `a` and `d` indicate the feet
    of the curve, while `b` and `c` represent the shoulders. This curve can be defined
    as a product of the z-shaped and s-shaped membership functions. It has zero values
    on both extremes, with a rise in the middle. Figure [2-15](#479940_1_En_2_Chapter.xhtml#Fig15)
    represents a pi-shaped membership function, followed by its equations.


    ![../images/479940_1_En_2_Chapter/479940_1_En_2_Fig15_HTML.jpg](images/479940_1_En_2_Chapter/479940_1_En_2_Fig15_HTML.jpg)


    Figure 2-15


    Pi-shaped membership function


    ![$$ \pi \left(x;a,b,c,d\right)=\left\{\begin{array}{cc}0,&amp; x\le a\\ {}2{\left(\frac{x-a}{b-a}\right)}^2,&amp;
    a\le x\le \frac{a+b}{2}\\ {}1-2{\left(\frac{x-b}{b-a}\right)}^2,&amp; \frac{a+b}{2}\le
    x\le b\\ {}1&amp; b\le x\le c\\ {}1-2{\left(\frac{x-c}{d-c}\right)}^2,&amp; c\le
    x\le \frac{c+d}{2}\\ {}2{\left(\frac{x-d}{d-c}\right)}^2,&amp; \frac{c+d}{2}\le
    x\le d\\ {}0,&amp; x\ge d\end{array}\right\} $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equaa.png)


    The following categories will be defined for the z-shaped membership functions
    (see Figure [2-16](#479940_1_En_2_Chapter.xhtml#Fig16)):


    - Full speed has the feet points defined as [60mph, 100mph] while the shoulder
    points are defined as [70mph, 80mph]

    - Medium fast has the feet points defined as [50mph, 80mph] while shoulder points
    are defined as [55mph, 60mph]

    - Medium has the feet points defined as [30mph, 60mph] while shoulder points are
    defined as [45mph, 50mph]

