    Relation is and the properties that influence it.


    After you have all the basic understanding required, you will finally move on
    to Fuzzy Rules and Reasoning, the core of Fuzzy Logic. You will learn about the
    different kinds of rules and how they are applicable. You will learn how to combine
    different kinds of rules, which will constitute Fuzzy Reasoning. You will see
    applications of these concepts in Python as well.


    ## Membership Functions


    Membership functions represent the degree of truth of a member in a defined Fuzzy
    Set. They are curves that define how each point in the input space is mapped to
    a degree of membership lying between 0 and 1. You may understand this better with
    the help of an example.


    Suppose you want to rate the service of a particular restaurant. You might rate
    the service in the following ways:


    *   Awesome

    *   Average

    *   Worst


    In classical sets, this can be represented as follows:


    ![$$ X=\left\{{}^{`} Awesome,{}^{`}{Average}^{''},{}^{`} Worst\right\} $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equa.png)


    This can be coded and represented as `X = {}`, where `2` represents *Awesome*,
    `1` represents *Average*, and `0` represents *Worst*.


    But you might not want to rate the restaurant in only these three ways. You need
    different ways for customers to express their sentiments. Therefore, you could
    add these ratings as well:


    *   Awesome

    *   Nice

    *   Good

    *   Average

    *   OK

    *   Poor

    *   Worst


    If you again use a classical set, it will contain a lot of code. Instead, you
    can define a function wherein each rating has a specific value. This function
    will allow you to go beyond the ratings. This function has an upper limit and
    a lower limit. Consider, for example, the sigmoid function (You learn about all
    the membership functions in detail, later in this chapter.) The sigmoid function
    has an upper limit of 1 and a lower limit of 0. That means that all the rating
    categories will have a value that will fall at a point on that curve (see Figure
    [2-1](#479940_1_En_2_Chapter.xhtml#Fig1)).


    ![../images/479940_1_En_2_Chapter/479940_1_En_2_Fig1_HTML.jpg](images/479940_1_En_2_Chapter/479940_1_En_2_Fig1_HTML.jpg)


    Figure 2-1


    Curve showing all the rating points as specific values


    Looking at this curve, you can redefine the crisp set as a Fuzzy Set having values
    between 0 and 1. Now, if a person gives a rating, the value (membership value)
    of that rating can be retrieved from the curve. This is what is meant when we
    say that membership functions represent the degree of truth of a member. You can
    see in this example that every rating has a value that tells about its degree
    of truth.


    ### Formal Definition of a Membership Function


    You can write a formal definition of all the rating examples using Fuzzy Notations.


    Suppose you have Fuzzy Set `A` with three members:


    ![$$ A=\left\{x1,x2,x3\right\} $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equb.png)


    All three members will have a membership function value associated with them,
    which will define their degree of truth. It can be represented as shown here:


    ![$$ A=\left\{\left(x1,\mu A(x1)\right),\left(x2,\mu A(x2)\right),\left(x3,\mu
    A(x3)\right)\vee x1,x2,x3\in X\right\} $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equc.png)


    The higher the membership value, the higher the degree of belonging or truth inside
    the set. This process where every member of the Fuzzy Set gets a membership value
    associated with it is called *Fuzzification*. You can now extend the formal notation
    of the membership function value.


    If `μ[A](x)` is the membership value of elements and if `μ[A](x)` is equal to
    `1`, you say that `x` is totally present in the Fuzzy Set `A`, or it has a full
    membership. If `μ[A](x)` is equal to `0`, it is not part of `A` or it has no membership.
    Any value between `0` and `1` defines its membership, which can be termed part
    of the membership.


    ### Terminology Related to Fuzzy Membership Functions


    To understand Fuzzy Membership Functions in more detail, you must first understand
    some terminology related to them. This list of terminology will help you understand
    applications of membership functions better.


    *   Support

    *   Core

    *   Boundary

    *   Crossover

    *   Normality

    *   Fuzzy Singleton

    *   `α`– cut

    *   Strong `α`– cut

    *   Convexity

    *   Bandwidth

    *   Symmetry

    *   Open Left

    *   Open Right

    *   Closed'
