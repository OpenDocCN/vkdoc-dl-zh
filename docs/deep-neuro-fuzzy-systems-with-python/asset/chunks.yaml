- fmt: '### Family of Sets


    A set can contain anything. But if a set contains a collection of different sets,
    then that set is referred to as a *family* of sets. For example:


    ![$$ A=\left\{\left(1,3,5\right),\left(2,4,6\right),\left(5,10,15\right)\right\}
    $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equd.png)


    Here, `(1, 3, 5)`, `(2, 4, 6)`, and `(5, 10, 15)` are individual sets contained
    in Set `A`. Therefore, Set `A` is the family of sets, as shown in Figure [1-3](#479940_1_En_1_Chapter.xhtml#Fig3).


    ![../images/479940_1_En_1_Chapter/479940_1_En_1_Fig3_HTML.jpg](images/479940_1_En_1_Chapter/479940_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    The Family Set `A` contains different sets


    ### Null Set


    If a set has a cardinality of 0, it’s called a *null set* or *empty set*. That
    means that there are no elements inside it.


    `A = {}` is a null set.


    ### Singleton Set


    If a set has a cardinality of 1, it is called a *singleton set*. That means that
    there is only one element inside it.


    `A = {1}` is a singleton set.


    ### Subset


    Say you have two sets, `A` and `X`. If all the elements of `X` are part of `A`,
    then `X` is called a *subset* of `A`. It is represented by `X⊂A`. Figure [1-4](#479940_1_En_1_Chapter.xhtml#Fig4)
    shows a Venn diagram representing Superset `A` containing Subset `X`.


    ![../images/479940_1_En_1_Chapter/479940_1_En_1_Fig4_HTML.jpg](images/479940_1_En_1_Chapter/479940_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    Venn diagram representing Superset `A` and Subset `X`


    ### Superset


    Say you have two sets, `A` and `X`. If all the elements of `X` are part of `A`,
    then `A` is called the *superset* of `X`. It is represented by `A⊃X`. In the Figure
    [1-4](#479940_1_En_1_Chapter.xhtml#Fig4), `A` is the superset of `X`.


    ### Powerset


    Say you have a set `A`. A set containing all the possible subsets from `A`, including
    the null set, is called the *powerset*. It is represented by `P(A)`. The cardinality
    of the powerset of `A` is `2|A|`.


    For example:


    ![$$ If\ A=\left\{2010,2011\right\} $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Eque.png)


    ![$$ P(A)=\left\{(2010),(2011),\left(2010,2011\right),\left(\right)\right\} $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equf.png)


    As you can see, `|A| = 2`, while `|P(A)| = 4`.


    ### Countable Set


    A *countable set* is where for every element can be labeled a unique natural number.
    Also, by the time you finish labeling the elements, more labels are left in the
    form of natural numbers, or otherwise you have exhausted all the natural numbers.
    Therefore, infinite sets can also be countable, but not every time.


    ### Uncountable Set


    An *uncountable set* is where, for every element present, you cannot label a unique
    natural number. That means, by the time you finish assigning labels, the natural
    numbers list is exhausted. For example, when you take real numbers, the list of
    natural numbers will be exhausted much before the labeling of a set of real numbers
    is finished.


    ## Classical Set Operations


    This section looks at some of the operations that can be applied to classical
    sets:


    *   Union

    *   Intersection

    *   Complement

    *   Difference


    ### Union


    A *union* of two sets merges the values in both sets into one single set.


    ![$$ A=\left\{1,3,5\right\} $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equg.png)


    ![$$ B=\left\{2,4\right\} $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equh.png)


    ![$$ A\cup B=\left\{1,2,3,4,5\right\} $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equi.png)


    Figure [1-5](#479940_1_En_1_Chapter.xhtml#Fig5) represents a union between two
    sets, `A` and `B`. The shaded region represents the union part.


    ![../images/479940_1_En_1_Chapter/479940_1_En_1_Fig5_HTML.jpg](images/479940_1_En_1_Chapter/479940_1_En_1_Fig5_HTML.jpg)


    Figure 1-5


    Union of Sets `A` and `B`


    ### Intersection


    An *intersection* of two sets finds the common values present in both sets and
    makes them one single set.


    ![$$ A=\left\{1,3,5\right\} $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equj.png)


    ![$$ B=\left\{3\right\} $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equk.png)


    ![$$ A\cap B=\left\{3\right\} $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equl.png)


    Figure [1-6](#479940_1_En_1_Chapter.xhtml#Fig6) represents an intersection between
    two Sets `A` and `B`. The shaded region represents the intersection part.


    ![../images/479940_1_En_1_Chapter/479940_1_En_1_Fig6_HTML.jpg](images/479940_1_En_1_Chapter/479940_1_En_1_Fig6_HTML.jpg)


    Figure 1-6


    Intersection of Sets `A` and `B`


    ### Complement


    A *complement* of a set is all the values present in the Universe of Discourse,
    except the ones present in the set.


    ![$$ A=\left\{1,3,5\right\} $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equm.png)


    ![$$ B=\left\{3\right\} $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equn.png)


    If `A` is the Universe of Discourse for `B`, then `A^c` will be all the values
    except the existing one. That is:


    ![$$ B=\left\{3\right\} $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equo.png)


    Figure [1-7](#479940_1_En_1_Chapter.xhtml#Fig7) represents the complement of Set
    `A`. If `U` is the Universe of Discourse, then the shaded region represents the
    complement of `A`.


    ![../images/479940_1_En_1_Chapter/479940_1_En_1_Fig7_HTML.jpg](images/479940_1_En_1_Chapter/479940_1_En_1_Fig7_HTML.jpg)


    Figure 1-7


    Complement of Set `A`


    ### Difference


    Say you have two sets, `A` and `B`, and you need to find the difference between
    them. All those values that are not common to both sets become a set. That means
    that the difference between Sets `A` and `B` becomes the set of elements. That
    set contains elements only in `A` but not in `B`.


    ![$$ A=\left\{1,3,5\right\} $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equp.png)


    ![$$ B=\left\{3\right\} $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equq.png)


    ![$$ A-B=\left\{1,5\right\} $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equr.png)


    ![$$ B-A=\left\{\right\} $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equs.png)


    Figure [1-8](#479940_1_En_1_Chapter.xhtml#Fig8) shows a Venn diagram representing
    the difference between Sets `A` and `B`.


    ![../images/479940_1_En_1_Chapter/479940_1_En_1_Fig8_HTML.jpg](images/479940_1_En_1_Chapter/479940_1_En_1_Fig8_HTML.jpg)


    Figure 1-8


    Difference between Sets `A` and `B`


    Here’s the Python implementation:


    ```

    # Example Sets

    A = {0, 2, 4, 6, 8}

    B = {1, 2, 3, 4, 5}

    # union of above sets

    print("Union :", A | B)

    # intersection of above sets

    print("Intersection :", A & B)

    # difference between above sets

    print("Difference :", A - B)

    ```


    ## Crisp Set Properties


    This section discusses the following properties of classical/crisp sets:


    *   Law of Commutativity

    *   Law of Associativity

    *   Law of Distributivity

    *   Idempotent Law

    *   Identity Law

    *   Law of Absorption

    *   Involution Law

    *   Law of Transitivity

    *   Law of Excluded Middle

    *   Law of Contradiction

    *   De Morgan laws


    ### Law of Commutativity


    The union or intersection of two sets will produce the same the result, regardless
    of which set you list first. That means you can take `A` first or `B` first, but
    the results will always be the same.


    ![$$ \left(A\cup B\right)=\left(B\cup A\right) $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equt.png)


    ![$$ \left(A\cap B\right)=\left(B\cap A\right) $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equu.png)


    ### Law of Associativity


    If you have three sets, the Law of Associativity says that a union or intersection
    of the first two sets with the third one is equal to a union or intersection of
    the last two sets with the first one.


    ![$$ \left(A\cup B\right)\cup C=A\cup \left(B\cup C\right) $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equv.png)


    ![$$ \left(A\cap B\right)\cap C=A\cap \left(B\cap C\right) $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equw.png)'
