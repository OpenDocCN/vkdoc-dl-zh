    soccer example, you have to provide a range based on a specific class. In this
    membership function, the membership reaches 100% from 0% in the center, and then
    again drops to 0%. Instead of three points, as with the triangular membership
    function, you have four points. This applies the soccer example to the trapezoidal
    membership function, whose classes are defined as follows:


    - Full speed as `[60, 80, 80, 90]`

    - Medium powered as `[30, 50, 50, 70]`

    - Slow as `[20, 30, 30, 50]`

    - Medium fast as `[50, 60, 60, 80]`


