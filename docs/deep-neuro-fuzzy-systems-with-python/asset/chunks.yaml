    # Comparative Analysis of the Mamdani and TSK Fuzzy Inference System


    The following list compares the two systems:


    - Mamdani is not adaptable to any other algorithms, while TSK is adaptable.

    - Mamdani uses the Defuzzification method for the evaluation of output, but TSK
    uses a weighted average method.

    - When it comes to controlling the system with perfection, Mamdani does a good
    job in comparison to TSK.

    - Mamdani has too many parameters as compared to TSK.


    # Summary


    This chapter discussed the Fuzzy Inference Systems in detail. It first reviewed
    the different types of Defuzzifiers, with examples. Later, the chapter moved on
    to three Fuzzy Inference Systems: Mamdani, TSK, and Tsukamoto Fuzzy Inference
    Systems. You learned about the application of all the inference systems in Python
    using the `Fuzzylite` package.


    The next chapter sets the foundation of Machine Learning, which will act as a
    base to understanding the concept of Fuzzy Neural Networks in the upcoming chapters.


    # Introduction to Machine Learning


    The previous chapter discussed different Fuzzy Inference Systems, which are used
    to make various practical control systems. But these systems are static, which
    means the fuzzification process, defuzzification process, defining memberships,
    etc. is all done manually. With intelligent systems, it is always better to learn
    most of the things from the data, rather than hard-coding it directly. This area
    of Fuzzy Inference Systems is where most of the parameters are learned. The neural
    networks approach is called Fuzzy Neural Networks.


    This chapter sets the foundation of Machine Learning. You will learn about different
    concepts of Machine Learning that’ll help you understand the core concepts of
    Fuzzy Neural Networks later in this book.


    This chapter starts by giving an introduction to Machine Learning. You will learn
    about different types of problems that Machine Learning can solve and how to measure
    the effectiveness of various models. It covers how the data is represented and
    partitioned in Machine Learning and what the advantages of having these partitions
    are.


    Machine Learning is a branch of Artificial Intelligence that involves the ability
    to learn from the data, continuously from experience, without having to explicitly
    program the parameters. Machine Learning learns from the data provided to it by
    applying different statistical and mathematical approaches. Machine Learning tries
    to determine the hidden patterns present inside the data. Based on these patterns,
    the model tries to predict something when new data is provided.


    ## Machine Learning


    Figure [4-1](#479940_1_En_4_Chapter.xhtml#Fig1) illustrates the categories of
    Machine Learning. Classification Machine Learning (ML) models help you solve the
    problems when the output is categorical. A categorical output includes the variables
    that can be nominal or ordinal. For example, based on some specific traits, you
    ask your model to determine whether the stock price of a particular company is
    going to move up or down in the coming months. This is a classification problem.


    ![../images/479940_1_En_4_Chapter/479940_1_En_4_Fig1_HTML.jpg](images/479940_1_En_4_Chapter/479940_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Machine Learning algorithms


    Similarly, if you provide an image and want the ML model to classify whether the
    image is a person or an animal, this is again a classification problem. Conversely,
    instead of asking the ML model to classify the data, if you ask it to directly
    predict the output in the form of a numerical value, that’s called a regression
    problem. For example, say you try to predict the price of a stock next month or
    the age of a person based on an image provided. This is a regression problem.


    As discussed in the previous section, when an ML model tries to predict the category
    based on the data, that’s a classification problem. An ML model can classify data
    into two classes or multiple classes. When you classify data into two classes,
    the ML problem is called a binary classification problem (see Figure [4-2](#479940_1_En_4_Chapter.xhtml#Fig2)).
    If there are more than two classes, it’s called a multiclass classification problem.


    ![../images/479940_1_En_4_Chapter/479940_1_En_4_Fig2_HTML.jpg](images/479940_1_En_4_Chapter/479940_1_En_4_Fig2_HTML.jpg)


    Figure 4-2


    Binary classification


    ## Classification Machine Learning Problems


    The following are a few examples of binary and multiclass classification problems:


    - Given an image, is it a cat or a dog—binary classification

    - Whether a person will be able to pay their loan or not—binary classification

    - Classifying an ECG signal to one of 13 health issues—multiclass classification

    - A chatbot sending issues to different departments based on the question asked—multiclass
    classification

    - Classifying different types of driver distractions—multiclass classification'
