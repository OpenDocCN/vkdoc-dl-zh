    Figure 4-11


    Numerical measures


    ### Overfitting versus Underfitting


    The next chapter looks at some of these Machine Learning approaches, but before
    that, you must be able to determine if your model is giving you poor performance.
    This can either be due to *overfitting* or *underfitting* of the data.


    The data that you get to make the model is only a sample of all the data present
    in the universe. You can say that the data is incomplete and noisy. That’s why,
    when you train the model, it tries to learn how well it is generalizing to new
    data. In other words, you can say that whatever the model has learned, whether
    it is able to apply these concepts to new data successfully is referred to as
    *generalization*.


    If the model is applied to the data a little too well, it is called an *overfitting
    problem*. Sometimes there are too many details present in the data and a lot of
    unnecessary information is also present. If the model learns from this highly
    specific data, especially the details and the extra noise, it could lead to overfitting.
    This negatively impacts the performance. In underfitting, the model is not able
    to learn from the data, so it can’t perform well on the new unseen data.


    Underfitting and overfitting happen when you have imbalanced datasets. Suppose
    for a binary classification problem, you have 90% of the data from one category
    and the remaining from the other. In this case, the model will learn most of the
    things related to the first category and very little related to the second category.
    This can also happen if you train the model a little too vigorously or add parameters
    to the model.


    Overfitting happens when you train the model a little too long, while underfitting
    happens when the model is not trained long enough. In other words, you can say
    that if you train the model to such an extent where error starts to increase,
    overfitting may happen. But, if you stop training the model when the error is
    high and can still be reduced, underfitting may happen.


    The best approach to solve this issue is to find the perfect spot between overfitting
    and underfitting. Figure [4-12](#479940_1_En_4_Chapter.xhtml#Fig12) shows this
    best method. This concept is called a *bias-variance tradeoff,* and it’s explained
    in the next section.


    ![../images/479940_1_En_4_Chapter/479940_1_En_4_Fig12_HTML.jpg](images/479940_1_En_4_Chapter/479940_1_En_4_Fig12_HTML.jpg)


    Figure 4-12


    Overfitting vs. underfitting


    ### Bias and Variance


    When a model is trained by giving very little attention to the training data,
    then it becomes a biased model. In this scenario, the difference between the prediction
    and the original value becomes quite high. In other words, the error is large.


    When overfitting happens in the model, that is when a lot of attention is given
    to the data, including the noise and the details. The variance of the model becomes
    high. Therefore, in this scenario, the model performs really well in the training
    data but not on the unseen data.


    To solve these problems, you use the concept of a *Bias-Variance Tradeoff*. In
    this scenario, you try to find a middle approach where neither the bias nor the
    variance is high. In other words, you try to avoid both overfitting and underfitting
    in the data. Figure [4-13](#479940_1_En_4_Chapter.xhtml#Fig13) shows how bias
    and variance are related to the concepts of overfitting and underfitting.


    ![../images/479940_1_En_4_Chapter/479940_1_En_4_Fig13_HTML.jpg](images/479940_1_En_4_Chapter/479940_1_En_4_Fig13_HTML.jpg)


    Figure 4-13


    Bias and variance


    Here are some approaches that can be used to solve the problem of overfitting.


    *   Adding cross-validations

    *   Training with more data

    *   Removing features

    *   Early stopping of training

    *   Adding regularizations

    *   Using the concept of ensembling


    You can solve the problem of underfitting by:


    *   Adding features

    *   Training with more data

    *   Increasing the training time

    *   Removing regularizations


    ## Summary


    This chapter looked at the basic knowledge required to understand Machine Learning,
    as well as Fuzzy Neural Network architectures. It discussed supervised and unsupervised
    learning methods, and Machine Learning applications in classification and regression
    problems. The chapter also discussed different accuracy measures for both problems
    and how they are applied in Python.


    The next chapter discusses some of these Machine Learning algorithms in detail.
    You will learn how to apply most of the concepts discussed in this chapter there.'
