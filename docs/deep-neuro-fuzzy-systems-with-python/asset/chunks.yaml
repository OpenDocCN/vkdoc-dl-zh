    of the first set with the third, and then an intersection of both outputs. This
    same rule applies when you interchange the union and intersection operations.


    ![$$ A\cup \left(B\cap C\right)=\left(A\cup B\right)\cap \left(A\cup C\right)
    $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equx.png)


    ![$$ A\cap \left(B\cup C\right)=\left(A\cap B\right)\cup \left(A\cap C\right)
    $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equy.png)


    ### Idempotent Law


    The Idempotent Law states that an intersection or union of a set with the same
    set is the same set itself.


    ![$$ A\cup A=A $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equz.png)


    ![$$ A\cap A=A $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equaa.png)


    ### Identity Law


    If Φ is an empty set and E is a Universe of Discourse, then the Identity Law states
    that:


    ![$$ A\cup \Phi =A $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equab.png)


    ![$$ A\cup E=E $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equac.png)


    ![$$ A\cap \Phi =\Phi $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equad.png)


    ![$$ A\cap E=A $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equae.png)


    In other words:


    *   A union of a set with an empty set leads to the same set


    *   An intersection of a set with an empty set leads to an empty set


    *   A union of a set with a Universe of Discourse leads to the Union of Discourse


    *   An intersection of a set with a Universe of Discourse leads to the same set


    ### Law of Absorption


    If A is a subset of B, then:


    ![$$ A\cup \left(A\cap B\right)=A $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equaf.png)


    ![$$ A\cap \left(A\cup B\right)=A $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equag.png)


    This means that the union of a set with its intersection with another set is the
    same set, and vice versa.


    ### Involution Law


    The Involution Law states that the double complement of a set is the same set:


    (A^c)^c = A


    ### Law of Transitivity


    The Law of Transitivity states that if A is a subset of B and B is a subset of
    C, then A will be a subset of C.


    ![$$ If\;A\subseteq B,B\subseteq C, then\;A\subseteq C $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equah.png)


    ### Law of Excluded Middle


    The Law of Excluded Middle states that a union of a set with its complement is
    its Universe of Discourse.


    ![$$ \left(A\cup {A}^c\right)=E $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equai.png)


    ### Law of Contradiction


    The Law of Contradiction states that an intersection of a set with its complement
    is an empty set.


    ![$$ \left(A\cap {A}^c\right)=\Phi $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equaj.png)


    ### De Morgan Laws


    If there are two sets and you find the complement of the union between them, then
    it is equal to the intersection of the complements of the individual sets. Similarly,
    if you find the complement of the intersection between the two sets, it is equal
    to the union of the complements of the individual sets. This rule is called the
    De Morgan Laws.


    ![$$ {\left(A\cup B\right)}^c={A}^c\cap {B}^c $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equak.png)


    ![$$ {\left(A\cap B\right)}^c={A}^c\cup {B}^c $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equal.png)


    ## Fuzzy Sets


    Classical sets involve exactly defined values. This means that the Universe of
    Discourse is split into two groups—members and non-members. Therefore, you cannot
    say that any member has a partial membership. For example, if you are pressing
    brakes or releasing them, these processes can be represented by 1 or 0.


    With Fuzzy Sets, on the other hand, you can have values in between as well. Therefore,
    you can say that the Fuzzy Sets have a degree of membership between 0 and 1\.
    For example, you can have values like {0, 0.3, 0.5, 0.7, 1}. The 1 means a full
    brake, 0.7 means a little less brake, 0.5 means half the pressure, 0.3 means very
    little pressure, and 0 means no pressure. In the real world, you rarely see classical
    sets in action. You deal with the values represented by Fuzzy Sets.


    There are several properties associated with Fuzzy Sets. The next sections explain
    them:


    *   Law of Commutativity


    *   Law of Associativity


    *   Law of Distributivity


    *   Idempotent Law


    *   Identity Law


    *   Involution Law


    *   Law of Transitivity


    *   De Morgan laws


    ### Law of Commutativity


    The union or intersection of two sets produces the same the result, regardless
    of which set you list first. That means you can take A first or B first, but the
    results will always be the same.


    (*A* ∪ *B*) = (*B* ∪ *A*)


    (*A* ∩ *B*) = (*B* ∩ *A*)


    ### Law of Associativity


    Say you have three sets. The Law of Associativity says that a union or intersection
    of the first two sets with the third one is equal to a union or intersection of
    the last two sets with the first one.


    (*A* ∪ *B*) ∪ *C* = *A* ∪ (*B* ∪ *C*)


    (*A* ∩ *B*) ∩ *C* = *A* ∩ (*B* ∩ *C*)


    ### Law of Distributivity


    The Law of Distributivity says that a union of the first set with an intersection
    of the last two sets is equal to a union of the first set with the second, a union
    of the first set with the third, and then an intersection of both outputs. This
    same rule applies when you interchange the union and intersection operations.


    *A* ∪ (*B* ∩ *C*) = (*A* ∪ *B*) ∩ (*A* ∪ *C*)


    *A* ∩ (*B* ∪ *C*) = (*A* ∩ *B*) ∪ (*A* ∩ *C*)


    ### Idempotent Law


    The Idempotent Law states that an intersection or union of a set with the same
    set is the same set itself.


    *A* ∪ *A* = *A*


    *A* ∩ *A* = *A*


    ### Identity Law


    If Φ is an empty set and E is a universe of discourse, the Identity Law states
    that:


    *A* ∪ 𝛷 = *A*


    *A* ∪ *E* = *E*


    *A* ∩ 𝛷 = 𝛷


    *A* ∩ *E* = *A*


    In other words:


    *   A union of a set with an empty set leads to the same set


    *   An intersection of a set with an empty set leads to an empty set


    *   A union of a set with a Universe of Discourse leads to a Union of Discourse


    *   An intersection of a set with a Universe of Discourse leads to the same set


    ### Involution Law


    The Involution Law states that a double complement of a set leads to the same
    set:


    (*A*^(*c*))^(*c*) = *A*


    ### Law of Transitivity


    The Law of Transitivity states that if A is a subset of B and B is a subset of
    C, A will be a subset of C.


    *If A* ⊆ *B*, *B* ⊆ *C*, *then* *A* ⊆ *C*


    ### De Morgan Laws


    If there are two sets and you find the complement of the union between them, it
    is equal to the intersection of the complements of the individual sets. Similarly,
    if you find the complement of an intersection between the two sets, it is equal
    to the union of the complements of the individual sets. This rule is called De
    Morgan Laws.


    ![$$ {\left(A\cup B\right)}^c={A}^c\cap {B}^c $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equam.png)


    ![$$ {\left(A\cap B\right)}^c={A}^c\cup {B}^c $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equan.png)


    Now, before you learn about the operations that can be applied to Fuzzy Sets,
    you need to understand the concept of membership functions.'
  trans: '

    ### 分配律


    分配律指出，第一个集合与后两个集合交集的并集，等于第一个集合与第二个集合的并集、第一个集合与第三个集合的并集，然后再取这两个结果的交集。当交换并集和交集运算时，此规则同样适用。


    ![$$ A\cup \left(B\cap C\right)=\left(A\cup B\right)\cap \left(A\cup C\right)
    $$](img/479940_1_En_1_Chapter_TeX_Equx.png)


    ![$$ A\cap \left(B\cup C\right)=\left(A\cap B\right)\cup \left(A\cap C\right)
    $$](img/479940_1_En_1_Chapter_TeX_Equy.png)


    ### 幂等律


    幂等律指出，一个集合与自身进行交集或并集运算，结果仍是该集合本身。


    ![$$ A\cup A=A $$](img/479940_1_En_1_Chapter_TeX_Equz.png)


    ![$$ A\cap A=A $$](img/479940_1_En_1_Chapter_TeX_Equaa.png)


    ### 同一律


    如果 `Φ` 是空集，`E` 是论域，那么同一律指出：


    ![$$ A\cup \Phi =A $$](img/479940_1_En_1_Chapter_TeX_Equab.png)


    ![$$ A\cup E=E $$](img/479940_1_En_1_Chapter_TeX_Equac.png)


    ![$$ A\cap \Phi =\Phi $$](img/479940_1_En_1_Chapter_TeX_Equad.png)


    ![$$ A\cap E=A $$](img/479940_1_En_1_Chapter_TeX_Equae.png)


    换句话说：


    - 一个集合与空集的并集得到该集合本身

    - 一个集合与空集的交集得到空集

    - 一个集合与论域的并集得到论域

    - 一个集合与论域的交集得到该集合本身


    ### 吸收律


    如果 `A` 是 `B` 的子集，那么：


    ![$$ A\cup \left(A\cap B\right)=A $$](img/479940_1_En_1_Chapter_TeX_Equaf.png)


    ![$$ A\cap \left(A\cup B\right)=A $$](img/479940_1_En_1_Chapter_TeX_Equag.png)


    这意味着一个集合与其和另一个集合的交集进行并集运算，结果仍是该集合本身，反之亦然。


    ### 对合律


    对合律指出，一个集合的双重补集等于该集合本身：


    `(A^c)^c = A`


    ### 传递律


    传递律指出，如果 `A` 是 `B` 的子集，且 `B` 是 `C` 的子集，那么 `A` 将是 `C` 的子集。


    ![$$ If\;A\subseteq B,B\subseteq C, then\;A\subseteq C $$](img/479940_1_En_1_Chapter_TeX_Equah.png)


    ### 排中律


    排中律指出，一个集合与其补集的并集等于其论域。


    ![$$ \left(A\cup {A}^c\right)=E $$](img/479940_1_En_1_Chapter_TeX_Equai.png)


    ### 矛盾律


    矛盾律指出，一个集合与其补集的交集是空集。


    ![$$ \left(A\cap {A}^c\right)=\Phi $$](img/479940_1_En_1_Chapter_TeX_Equaj.png)


    ### 德摩根定律


    如果有两个集合，求它们并集的补集，则等于这两个集合各自补集的交集。类似地，如果求这两个集合交集的补集，则等于这两个集合各自补集的并集。此规则称为德摩根定律。


    ![$$ {\left(A\cup B\right)}^c={A}^c\cap {B}^c $$](img/479940_1_En_1_Chapter_TeX_Equak.png)


    ![$$ {\left(A\cap B\right)}^c={A}^c\cup {B}^c $$](img/479940_1_En_1_Chapter_TeX_Equal.png)


    ## 模糊集合


    经典集合涉及精确定义的值。这意味着论域被分为两组——成员和非成员。因此，你不能说任何成员具有部分隶属度。例如，当你踩刹车或松开刹车时，这些过程可以用 `1`
    或 `0` 表示。


    另一方面，对于模糊集合，你也可以有介于两者之间的值。因此，可以说模糊集合的隶属度介于 `0` 和 `1` 之间。例如，你可以有像 `{0, 0.3, 0.5,
    0.7, 1}` 这样的值。`1` 表示完全刹车，`0.7` 表示稍微轻一点的刹车，`0.5` 表示一半压力，`0.3` 表示非常小的压力，`0` 表示没有压力。在现实世界中，你很少看到经典集合在起作用。你处理的是由模糊集合表示的值。


    模糊集合有几个相关性质。接下来的章节将解释它们：


    - 交换律

    - 结合律

    - 分配律

    - 幂等律

    - 同一律

    - 对合律

    - 传递律

    - 德摩根定律


    ### 交换律


    两个集合的并集或交集产生相同的结果，无论你先列出哪个集合。这意味着你可以先取 `A` 或先取 `B`，但结果总是相同的。


    `(A ∪ B) = (B ∪ A)`


    `(A ∩ B) = (B ∩ A)`


    ### 结合律


    假设你有三个集合。结合律指出，前两个集合与第三个集合的并集或交集，等于后两个集合与第一个集合的并集或交集。


    `(A ∪ B) ∪ C = A ∪ (B ∪ C)`


    `(A ∩ B) ∩ C = A ∩ (B ∩ C)`


    ### 分配律


    分配律指出，第一个集合与后两个集合交集的并集，等于第一个集合与第二个集合的并集、第一个集合与第三个集合的并集，然后再取这两个结果的交集。当交换并集和交集运算时，此规则同样适用。


    `A ∪ (B ∩ C) = (A ∪ B) ∩ (A ∪ C)`


    `A ∩ (B ∪ C) = (A ∩ B) ∪ (A ∩ C)`


    ### 幂等律


    幂等律指出，一个集合与自身进行交集或并集运算，结果仍是该集合本身。


    `A ∪ A = A`


    `A ∩ A = A`


    ### 同一律


    如果 `Φ` 是空集，`E` 是论域，那么同一律指出：


    `A ∪ Φ = A`


    `A ∪ E = E`


    `A ∩ Φ = Φ`


    `A ∩ E = A`


    换句话说：


    - 一个集合与空集的并集得到该集合本身

    - 一个集合与空集的交集得到空集

    - 一个集合与论域的并集得到论域

    - 一个集合与论域的交集得到该集合本身


    ### 对合律


    对合律指出，一个集合的双重补集得到该集合本身：


    `(A^c)^c = A`


    ### 传递律


    传递律指出，如果 `A` 是 `B` 的子集，且 `B` 是 `C` 的子集，那么 `A` 将是 `C` 的子集。


    `If A ⊆ B, B ⊆ C, then A ⊆ C`


    ### 德摩根定律


    如果有两个集合，求它们并集的补集，则等于这两个集合各自补集的交集。类似地，如果求这两个集合交集的补集，则等于这两个集合各自补集的并集。此规则称为德摩根定律。


    ![$$ {\left(A\cup B\right)}^c={A}^c\cap {B}^c $$](img/479940_1_En_1_Chapter_TeX_Equam.png)


    ![$$ {\left(A\cap B\right)}^c={A}^c\cup {B}^c $$](img/479940_1_En_1_Chapter_TeX_Equan.png)


    现在，在学习可以应用于模糊集合的运算之前，你需要理解隶属函数的概念。

