    ### Regression Problems


    Now that you understand the metrics for classification models, it’s time to look
    at the regression model performance metrics.


    #### Root Mean Squared Error


    Root Mean Squared (RMS) Error is given by this formula:


    ![$$ error=\sqrt{\frac{\sum_{i=1}^n{\left(\hat{y}-y\right)}^2}{n}} $$](images/479940_1_En_4_Chapter/479940_1_En_4_Chapter_TeX_Equf.png)


    Using this formula, you get the error of the model. The smaller the error, the
    better the model. `ŷ` is the predicted value while `y` is the original value.
    `n` is the total number of observations.


    #### R-Squared Summary


    This measure indicates how close the data is to the predicted regression line.
    This model explains the variation in the dependent variable. This information
    is given by R Squared Summary. It can be stated using the following formula:


    ![$$ {R}^2=\frac{Explained\ variation}{Total\ variation} $$](images/479940_1_En_4_Chapter/479940_1_En_4_Chapter_TeX_Equg.png)


    Mathematically, `R²` can be represented as follows:


    ![$$ {R}^2=1-\frac{SS_{residual}}{SS_{total}} $$](images/479940_1_En_4_Chapter/479940_1_En_4_Chapter_TeX_Equh.png)


    where:


    `SS_residual = Σᵢ eᵢ²` and `SS_total = Σᵢ (yᵢ - ȳ)²`


    The value of R-squared is always between 0 and 100%:


    *   0% means that the model is not able to explain any variance present in the
    data.

    *   100% means that the model is able to explain all the variance present in the
    data.


    #### Adjusted R-Squared Summary


    The `R²` score has a fault in that it assumes every independent variable affects
    the dependent variable. In real life, this may not be the case. Therefore, adjusted
    `R²` takes only those variables into consideration that actually have some effect
    on the dependent variable. It is represented by the following formula:


    ![$$ adj{R}^2=1-\frac{\left(1-{R}^2\right)\left(n-1\right)}{n-k-1} $$](images/479940_1_En_4_Chapter/479940_1_En_4_Chapter_TeX_Equi.png)


    #### Akaike Information Criteria


    If you know the Root Mean Squared Error of the model, the square of it will give
    you the Mean Squared Error. Using it, you can find the AIC of the model, as given
    here:


    ![$$ AIC= nlog(MSE)+2k $$](images/479940_1_En_4_Chapter/479940_1_En_4_Chapter_TeX_Equj.png)


    Where `MSE` is the Mean Squared Error, `n` is the total number of observations,
    and `k` is the number of regression coefficients, which can be called independent
    variables.


    People use the AIC score because sometimes when you try to add new parameters
    inside the model, the chances of overfitting increases. AIC tries to solve this
    problem by introducing a penalty for the number of parameters inside the model.'
