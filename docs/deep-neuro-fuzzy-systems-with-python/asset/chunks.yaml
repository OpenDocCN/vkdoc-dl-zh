- fmt: '# Defuzzification


    `Defuzzification` is the process of converting a Fuzzy Set into a crisp set. You
    know that in most applications you have to use Fuzzy Sets, as people’s opinions
    are never crisp. But when you incorporate these Fuzzy values and have to make
    a decision, you must convert the Fuzzy output into crisp values. Therefore, `Defuzzification`
    helps convert output given in a Fuzzy Set to crisp values. If control system functioning
    depends on input, the process of `Defuzzification` determines what exactly needs
    to be done once that input is provided. The general process of a Fuzzy System,
    of which `Defuzzification` is a part, is illustrated in Figure [3-1](#479940_1_En_3_Chapter.xhtml#Fig1).


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig1_HTML.jpg](images/479940_1_En_3_Chapter/479940_1_En_3_Fig1_HTML.jpg)


    Figure 3-1


    The process of a Fuzzy Inference System


    Formally, you can define the `Defuzzification` process as follows:


    > *“A Defuzzification method on a certain referential set V as a mapping from
    the class of fuzzy Subsets of V into V. A nonrestrictive coherence condition is
    that the associated point must belong to the support of the original fuzzy subset.”*


    There are different types of `Defuzzification` approaches. The most common ones
    are shown in Figure [3-2](#479940_1_En_3_Chapter.xhtml#Fig2).


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig2_HTML.jpg](images/479940_1_En_3_Chapter/479940_1_En_3_Fig2_HTML.jpg)


    Figure 3-2


    Types of Defuzzifiers


    The following sections discuss the different types of `Defuzzification` methods.


    ## λ CUT METHOD


    Suppose you have a Fuzzy Set given by:


    ![$$ A=\left\{\frac{1}{a},\frac{0.9}{b},\frac{0.6}{c},\frac{0.3}{d},\frac{0.01}{e},\frac{0}{f},\right\}
    $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equa.png)


    It can be represented as a discrete graph, as shown in Figures [3-3](#479940_1_En_3_Chapter.xhtml#Fig3)
    through [3-9](#479940_1_En_3_Chapter.xhtml#Fig9).


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig9_HTML.jpg](images/479940_1_En_3_Chapter/479940_1_En_3_Fig9_HTML.jpg)


    Figure 3-9


    Discrete representation of Fuzzy Set `A[0]`


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig8_HTML.jpg](images/479940_1_En_3_Chapter/479940_1_En_3_Fig8_HTML.jpg)


    Figure 3-8


    Discrete representation of Fuzzy Set `A[0+]`


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig7_HTML.jpg](images/479940_1_En_3_Chapter/479940_1_En_3_Fig7_HTML.jpg)


    Figure 3-7


    Discrete representation of Fuzzy Set `A[0.3]`


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig6_HTML.jpg](images/479940_1_En_3_Chapter/479940_1_En_3_Fig6_HTML.jpg)


    Figure 3-6


    Discrete representation of Fuzzy Set `A[0.6]`


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig5_HTML.jpg](images/479940_1_En_3_Chapter/479940_1_En_3_Fig5_HTML.jpg)


    Figure 3-5


    Discrete representation of Fuzzy Set `A[0.9]`


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig4_HTML.jpg](images/479940_1_En_3_Chapter/479940_1_En_3_Fig4_HTML.jpg)


    Figure 3-4


    Discrete representation of Fuzzy Set `A[1]`


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig3_HTML.jpg](images/479940_1_En_3_Chapter/479940_1_En_3_Fig3_HTML.jpg)


    Figure 3-3


    Discrete representation of Fuzzy Set `A`


    You can produce different crisp sets derived from different values of lambda (`1`,
    `0.9`, `0.6`, `0.3`, `0^+`, `0`):


    ![$$ {A}_1=\left\{a\right\} $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equb.png)


    ![$$ {A}_{0.9}=\kern0.5em \left\{a,b\right\} $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equc.png)


    ![$$ {A}_{0.6}=\left\{a,b,c\right\} $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equd.png)


    ![$$ {A}_{0.3}=\left\{a,b,c,d\right\} $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Eque.png)


    ![$$ {A}_{0^{+}}=\left\{a,b,c,d,e\right\} $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equf.png)


    ![$$ {A}_0=\left\{A\right\} $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equg.png)


    If you define `λ`-cut sets using Fuzzy Set notation, you’ll get something like
    this:


    ![$$ {A}_{0.9}=\left\{\frac{1}{a},\frac{1}{b},\frac{0}{c},\frac{0}{d},\frac{0}{e},\frac{0}{f},\right\}
    $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equh.png)


    Consider the properties of `λ`-cuts:


    *   4. `A[α] ⊆ A[λ]` where, `λ ≤ α ∣ 0 ≤ α ≤ 1 ∣ A[0] = X`

    *   3. `(A_)_λ ≠ A_λ` except for the `λ` value of `0.5`

    *   2. `(A ∩ B)_λ = A_λ ∩ B_λ`

    *   1. `(A ∪ B)_λ = A_λ ∪ B_λ`


    If you visualize this using a Sigmoid membership function, you get the diagrams
    in Figures [3-10](#479940_1_En_3_Chapter.xhtml#Fig10) and [3-11](#479940_1_En_3_Chapter.xhtml#Fig11).


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig11_HTML.jpg](images/479940_1_En_3_Chapter/479940_1_En_3_Fig11_HTML.jpg)


    Figure 3-11


    Gaussian membership function


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig10_HTML.jpg](images/479940_1_En_3_Chapter/479940_1_En_3_Fig10_HTML.jpg)


    Figure 3-10


    Sigmoid membership function


    Consider another example:


    ![$$ A=\left\{\frac{0.9}{x_1},\frac{0.5}{x_2},\frac{0.2}{x_3},\frac{0.3}{x_4}\right\}
    $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equk.png)


    Based on the previous computation, you would get `A[0.6]` as:


    ![$$ \therefore {A}_{0.6}=\left\{\frac{1}{x_1},\frac{0}{x_2},\frac{0}{x_3},\frac{0}{x_4}\right\}={x}_1
    $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equl.png)


    ## Max Membership Principle/Height Method


    This method is used only when the output membership function has peaks (for example,
    the triangular membership functions).


    ![$$ {\mu}_A\left({Z}^{\ast}\right)\ge {\mu}_A(Z)\ for\ all\ z\in Z $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equm.png)


    Formally, it obtains `Z[0]` as a weighted average of all the representative points
    `z[i]` of `C[i]` by the heights `h[i]` of `C′[i]`. This can be represented mathematically
    as:


    ![$$ {Z}^{\ast }=\frac{h_1\ {z}_1+{h}_2\ {z}_2+\dots +{h}_i\ {z}_i}{h_1+{h}_2+\dots
    +{h}_i} $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equn.png)


    `Z^∗` is the Defuzzified value, also known as the output of Fuzzy Set `A`. One
    important point is that height should be considered unique in this method (see
    Figure [3-12](#479940_1_En_3_Chapter.xhtml#Fig12)).


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig12_HTML.jpg](images/479940_1_En_3_Chapter/479940_1_En_3_Fig12_HTML.jpg)


    Figure 3-12


    Height method


    ## First/Last/Mean of Maximum Method


    This method takes the union of all the possible Fuzzy Outputs and finds the smallest
    value with the maximum membership degree.


    ![$$ First\ of\ Maximum={z}^{\ast }=z\in Zinf\left\{z\in Z\ |\ {\mu}_c(z)= hgt(c)\right\}
    $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equo.png)


    ![$$ Last\ of\ Maximum={z}^{\ast }=z\in Zsup\left\{z\in Z\ |\ {\mu}_c(z)= hgt(c)\right\}
    $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equp.png)


    ![$$ hgt(c)=z\in Zsup\left\{{\mu}_c(z)\right\} $$](images/479940_1_En_3_Chapter/479940_1_En_3_Chapter_TeX_Equq.png)


    In the previous equation, `hgt(c)` represents the highest height present in the
    diagram of the union. You can better understand this with an example. Suppose
    the output membership function looks like the graph in Figure [3-13](#479940_1_En_3_Chapter.xhtml#Fig13).


    ![../images/479940_1_En_3_Chapter/479940_1_En_3_Fig13_HTML.jpg](images/479940_1_En_3_Chapter/479940_1_En_3_Fig13_HTML.jpg)


    Figure 3-13


    Last of maximum method


    Now, based on these equations, you can see that the highest peak comes at `8`.
    Either it is the first of the maximum method or the last of the maximum method.'
