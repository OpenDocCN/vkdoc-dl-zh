- fmt: '# Convolutional Neural Networks


    Convolutional neural networks are used in areas like image recognition, image
    classification, object detection, face recognition, etc. Before looking at the
    architecture and the process involved in a CNN, you should first understand how
    a computer looks and understands an image.


    Computers break an image into a matrix of pixels and store the color code for
    each pixel, as you can see in Figure [5-10](#479940_1_En_5_Chapter.xhtml#Fig10).


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig10_HTML.jpg](images/479940_1_En_5_Chapter/479940_1_En_5_Fig10_HTML.jpg)


    Figure 5-10


    Pixel matrix


    In the image in Figure [5-10](#479940_1_En_5_Chapter.xhtml#Fig10), 1 represents
    white and 256 represents the darkest shade. It is not recommended to use normal
    neural networks when it comes to image processing. The more pixels there are,
    the more weights there are. This means if you have an RGB image that’s 64x64,
    the number of pixels will be 12,288, and hence the number of weights will also
    be 12,288. There are images above 1000x800. Hence, even after a lot of computations,
    you will not get good accuracy. The solution for this is CNN. Instead of analyzing
    the entire input, CNN looks at a small part of it.


    CNN image classifications take an input image (animal images, in this case), process
    it, and classify it under certain categories (e.g., dog, cat, or tiger). There
    are four basic components that define a basic convolutional network.


    * The convolutional layer

    * The activation function layer

    * The pooling layer

    * The output layer


    Let’s look at each of these in a little more detail.


    ## The Convolutional Layer


    The convolution layer is the main building block of a convolutional neural network.
    The convolution layer is used to understand the patterns present in the image
    and extract the interesting features from them. The total number of convolutional
    layers defines the total number of features that you want to extract from the
    image. For example, five convolutional layers means that five features are learned
    from an image. These features can be decipherable, like finding the edges or the
    threshold image, etc. or it they may be too complex for a human to understand.
    Hence, this is the main layer responsible for learning features, such as what
    unique features an image containing a human has and how they are different from
    the features present in an image of an animal. The values of all the filters are
    learnable, which means you must provide the matrix dimensions to a CNN, and it
    will automatically learn the best values for the convolution. This matrix of convolution
    is also called a kernel or filter.


    Mathematically, each kernel operation happens in a way represented in Figure [5-11](#479940_1_En_5_Chapter.xhtml#Fig11).


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig11_HTML.jpg](images/479940_1_En_5_Chapter/479940_1_En_5_Fig11_HTML.jpg)


    Figure 5-11


    Process of convolving through filters


    Based on the size of the kernel matrix, a matrix dot product happens at a specific
    portion of the image. This operation is continued until the kernel covers the
    entire image. This results in a new image with a smaller number of dimensions,
    as compared to the original image, but the depth of image is higher. The output
    is called an activation map and the process is called strides.


    ## Padding


    The filter might fit inside the image perfectly. But if it does not, you use the
    concept of padding. In this process, you add a few extra values in the input image
    so that the filter fits in well. The most commonly used value is 0 (called zero-padding).
    Alternatively, you can drop the part of the image where the filter doesn’t fit.


    ### Activation Function


    The actual decision of classification is taken in this layer. The most used activation
    function in CNN is ReLU, the rectified linear unit. This helps the neurons give
    exact pixel values as output for all the positive values, but for all the negative
    values the output is always zero. This results in sparse matrix generation and
    hence means lesser computation time with better learning. Generally, pixel values
    are positive, so the problem of dying ReLU doesn’t apply.


    ### Pooling Layer


    If an image is taken from a DSLR camera, the resolution will be very high. Since
    the resolution is high, the number of pixels will be high. Even though you use
    filters with a smaller dimension than the input image, the computational time
    will still be long. Therefore, to overcome this issue, you can use pooling. It
    is used to reduce the size of the input image, as well as the outcomes of convolutions.
    Because of this, the number of parameters that need to be analyzed is smaller.
    Hence, the computational time decreases. This layer operates on each feature map
    (the outcome of individual convolutions) independently.


    Pooling, also called subsampling or downsampling, can be of different types:


    * Max pooling

    * Average pooling

    * Sum pooling


    The most common pooling approach is *max pooling.* Max pooling takes the largest
    element from the convolved matrix. Instead of the maximum, if you find the average
    number, it’s called average pooling. Summing all elements in the convolved matrix
    is called sum pooling.


    An example of the max pooling operation is shown in Figure [5-12](#479940_1_En_5_Chapter.xhtml#Fig12).


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig12_HTML.jpg](images/479940_1_En_5_Chapter/479940_1_En_5_Fig12_HTML.jpg)


    Figure 5-12


    Max pooling operation'
