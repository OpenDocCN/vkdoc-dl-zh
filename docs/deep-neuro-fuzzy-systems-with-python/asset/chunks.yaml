- fmt: "# Fuzzy Clustering\n\nClustering is a method you use to group data into a\
    \ few categories, based on the similarities present. These categories are termed\
    \ *clusters* (see Figure [7-2](#479940_1_En_7_Chapter.xhtml#Fig2)).\n\n![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig2_HTML.jpg](images/479940_1_En_7_Chapter/479940_1_En_7_Fig2_HTML.jpg)\n\
    \nFigure 7-2 Clustering\n\nMachine Learning uses different methods for clustering,\
    \ such as K-Means Clustering, Hierarchical Clustering, DBScan, and so on. Similarly,\
    \ when we talk about Fuzzy Networks, there are methods like Fuzzy C-Means Clustering,\
    \ Gaussian Application to find clusters, and so on. This chapter discusses Fuzzy\
    \ C-Means Clustering in detail.\n\n## Fuzzy C-Means Clustering\n\nSuppose I have\
    \ a set of data points, `X`, which I want to put into a `k` number of clusters\
    \ based on some similarity metrics. In the form of a set, suppose the data looks\
    \ like the following:\n\n![$$ X=\\left\\{{x}_1,{x}_2,{x}_3,\\dots {x}_m\\right\\\
    } $$](images/479940_1_En_7_Chapter/479940_1_En_7_Chapter_TeX_Equa.png)\n\nTo divide\
    \ them into `k` number of clusters using the C-Means Clustering approach, the\
    \ first thing that you do is randomly take `k` number of points from the data.\
    \ Assume that these `k` points are the centroids (see Figure [7-3](#479940_1_En_7_Chapter.xhtml#Fig3)).\n\
    \n![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig3_HTML.jpg](images/479940_1_En_7_Chapter/479940_1_En_7_Fig3_HTML.jpg)\n\
    \nFigure 7-3 C-Means Clustering\n\nUsing the Manhattan or Euclidean distance,\
    \ you then find out that all the remaining points are closer to the cluster centroid\
    \ point. This is how you get the first set of data assigned to `k` number of clusters.\
    \ But you started by randomly selecting `k` points and calling them *centroids*.\
    \ In reality, they are not. Therefore, you need to continue the process to rectify\
    \ this assumption.\n\n### Euclidean Distance\n\nA normal straight-line distance\
    \ between any two points is called a *Euclidean Distance*. To get this distance,\
    \ you use the following formula:\n\n![$$ d=\\sqrt{{\\left({q}_1-{p}_1\\right)}^2+{\\\
    left({q}_2-{p}_2\\right)}^2} $$](images/479940_1_En_7_Chapter/479940_1_En_7_Chapter_TeX_Equb.png)\n\
    \nIn the next step, you find the actual centroids of the clusters that you defined.\
    \ Once you find that, some of the points may lose the original membership of that\
    \ cluster. They may now be much closer to another cluster, as compared to the\
    \ cluster that they were originally part of. Hence, you start reassigning these\
    \ points based on the new centroids. This will help you get a revised `k` number\
    \ of clusters with new member points. Again, you find the new centroid and repeat\
    \ the process. You keep on repeating the process until the new clusters don’t\
    \ make the points move from one cluster to another.\n\nLet’s look at the entire\
    \ algorithm mathematically:\n\n1. Define `N` data points that need to be clustered:\n\
    \n   ![$$ {x}_i, where\\ i=1,2,3\\dots N $$](images/479940_1_En_7_Chapter/479940_1_En_7_Chapter_TeX_Equc.png)\n\
    \n2. Assume the number of cluster to be made is represented by `C`, where 2 ≤\
    \ `C` ≤ `N`\n\n3. Define the cluster fuzziness represented by `f`, where `f` >\
    \ 1\n\n4. Define a membership matrix `U` having dimension of `N` × `C` × `M`.\
    \ This matrix should be defined randomly following these conditions:\n   1. `U`[`ijm`]\
    \ ∈ [0,1], and\n   2. ![$$ \\sum \\limits_{i=1}^n{U}_{ijm}=0 $$](images/479940_1_En_7_Chapter/479940_1_En_7_Chapter_TeX_IEq1.png)\
    \ for each `i` and fixed value of `m`.\n\n5. Determine the cluster centers. This\
    \ can be done by using the following equation:\n\n   ![$$ {CC}_{jm}=\\frac{\\\
    sum_{i=1}^N{U^f}_{ijm}{x}_{im}}{\\sum \\limits_{i=1}^N{U^f}_{ijm}} $$](images/479940_1_En_7_Chapter/479940_1_En_7_Chapter_TeX_Equd.png)\n\
    \n   where `j` represents the cluster and `m` represents the dimension.\n\n6.\
    \ Calculate the Euclidean Distance. You can find this equation by using the following\
    \ equation:\n\n   ![$$ {D}_{ijm}=\\left\\Vert \\left({x}_{im}-{C}_{jm}\\right)\\\
    right\\Vert $$](images/479940_1_En_7_Chapter/479940_1_En_7_Chapter_TeX_Eque.png)\n\
    \n   ![$$ where\\ i\\ represents\\ data\\ point,j\\ represents\\ cluster, and\\\
    \ m\\ represents\\ dimension $$](images/479940_1_En_7_Chapter/479940_1_En_7_Chapter_TeX_Equf.png)\n\
    \n7. After finding the Euclidean Distance, you have to update the membership matrix\
    \ defined in Step 4 with the new value. This can be done by using the following\
    \ equation:\n\n   ![$$ {U}_{ijm}=\\frac{1}{\\sum \\limits_{c=1}^D{\\left(\\frac{D_{ijm}}{D_{icm}}\\\
    right)}^{\\frac{2}{f-1}}} $$](images/479940_1_En_7_Chapter/479940_1_En_7_Chapter_TeX_Equg.png)\n\
    \n   ![$$ We\\ apply\\ the\\ above\\ equation\\ only\\ for\\ the\\ data\\ points\\\
    \ where\\ {D}_{ijm}&gt;0\\. If\\ {D}_{ijm}=0\\ then\\ we\\ have\\ full\\ membership\\\
    \ and\\ the\\ value\\ initialized\\ is\\ 1.0 $$](images/479940_1_En_7_Chapter/479940_1_En_7_Chapter_TeX_Equh.png)\n\
    \n8. Repeat the Steps 1 to 5 until the value of `U` < ∈, where ∈ is the termination\
    \ criteria.\n\n### Applications of Fuzzy C-Means Clustering\n\nYou can use Fuzzy\
    \ C-Means Clustering for the following use cases and domains:\n\n* When image\
    \ processing, especially when clustering objects present inside the image. Used\
    \ with image-based segmentation as well.\n* Used with swarm intelligence.\n* Used\
    \ with remote sensing.\n\n### Python Implementation of Fuzzy C-Means\n\nThe following\
    \ code contains two sets of data—train and test data. With the help of train data,\
    \ you can find the final centroid of the clusters, while after that you should\
    \ use the test data to check in which cluster the new data points are allocated.\
    \ This example uses the Python Package called `fuzzycmeans`. You can install it\
    \ using this command:\n\n```\npip install fuzzycmeans\n```\n\nIf the package shows\
    \ a problem in execution, you can clone the GitHub repository, then copy the two\
    \ Python files—`fuzzy_clustering.py` and `visualization.py`—to your home directory\
    \ and then run the code. Make sure to install the `bokeh` package before running\
    \ the code, as it is a dependency for this Fuzzy C-Means package. You can install\
    \ it by writing the following:\n\n```\npip install bokeh\n```\n\nThis package\
    \ is an implementation of the paper “FCM: The Fuzzy C-Means Clustering Algorithm”\
    \ by James C. Bezdek, Robert Ehrlich, and William Full. You can view and clone\
    \ the source code as well, by going to the GitHub repository at [`https://github.com/oeg-upm/fuzzy-c-means.git`](https://github.com/oeg-upm/fuzzy-c-means.git).\n\
    \nThis example uses the `AirlinesCluster` dataset. You can find this dataset in\
    \ the GitHub repository of this book. Alternatively, you can download it from\
    \ the Kaggle website. The example uses only two columns—`Balance` and `BonusMiles`—to\
    \ start clustering. You can use all the columns and visualize the output if you\
    \ want.\n\n```\nimport pandas as pd\nimport numpy as np\nimport numpy as np\n\
    import logging\nfrom fuzzy_clustering import FCM\nfrom visualization import draw_model_2d\n\
    from sklearn import preprocessing\ndataset = pd.read_csv(\"AirlinesCluster.csv\"\
    ) #Importing the airlines data\ndataset1 = dataset.copy() #Making a copy so that\
    \ original data remains unaffected\ndataset1 = dataset1[[\"Balance\", \"BonusMiles\"\
    ]][:500] #Selecting only first 500 rows for faster computation\ndataset1_standardized\
    \ = preprocessing.scale(dataset1) #Standardizing the data to scale it between\
    \ the upper and lower limit of 1 and 0\ndataset1_standardized = pd.DataFrame(dataset1_standardized)\n\
    fcm.set_logger(tostdout=False) #Telling the package class to stop the unnecessary\
    \ output\nfcm = FCM(n_clusters=5) #Defining k=5\nfcm.fit(dataset1_standardized)\
    \ #Training on data\npredicted_membership = fcm.predict(np.array(dataset1_standardized))\
    \ #Testing on same data\ndraw_model_2d(fcm, data=np.array(dataset1_standardized),\
    \ membership=predicted_membership) #Visualizing the data\n```"
