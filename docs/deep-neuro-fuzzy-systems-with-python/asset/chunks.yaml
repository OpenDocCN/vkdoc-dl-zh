    $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equav.png)


    ### Power


    The alpha power of a Fuzzy Set `A` is a new Fuzzy Set `Aα`, whose membership function
    is as follows:


    ![$$ {\mu_A}^{\alpha }(x)={\left[{\mu}_A(x)\right]}^{\alpha } $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equaw.png)


