  raw: '#### Triangular Membership Function


    Just as a triangle has three coordinates, a triangular membership function has
    three parameters: a, b, and c.


    *   a is the lower boundary


    *   b is the center


    *   c is the upper boundary


    The following equation depicts the triangular membership function:


    ![$$ f\left(x;a,b,c\right)=\left\{\begin{array}{ll}0,&amp; x\le a\\ {}\frac{x-a}{b-a},&amp;
    a\le x\le b\\ {}\frac{c-x}{c-b},&amp; b\le x\le c\\ {}0,&amp; c\le x\end{array}\right\}
    $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equq.png)


    Alternatively, this can also be represented as follows:


    ![$$ f\left(x;a,b,c\right)=\max \left(\min \left(\frac{x-a}{b-a},\frac{c-x}{c-b}\right),
    0\right) $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equr.png)


    You can understand the triangular membership functions with the help of an example.
    This example uses the triangular membership function with a soccer example. Suppose
    the shooter can take four kinds of penalty shots:


    *   Full speed straight shot


    *   Medium powered curvy shot


    *   Slow straight shot


    *   Medium fast left shot


    On average, the top speed at which a shooter takes a penalty kick is 80 mph. Therefore,
    there is no way you can say that this speed is slow. Hence you assign a 0% membership
    to 80mph. Similarly, a speed of 60 mph can be considered 70% fast and 30% medium.
    Likewise, you can assign different memberships to different speeds.


    If you use a triangular membership function, it contains three limits: lower,
    full, and upper. The lower and upper bounds have a membership of 0% while the
    full value is 100%. The remaining values tread linearly. You can assign the following
    triangular membership functions to these categories:


    *   Full speed as [60, 80, 80]


    *   Medium powered as [40, 50, 70]


    *   Slow as [20, 20, 45]


    *   Medium fast as [50, 60, 80]


    For example, if you defined the triangular membership function for “medium powered”
    as [40, 50, 70], the membership would be 0% at 40 mph, which linearly increases
    to 100% at 50 mph, and linearly decreases to 0% at 70 mph. The following Python
    code shows the execution of these triangular membership functions. Figure [2-6](#479940_1_En_2_Chapter.xhtml#Fig6)
    shows the result.


    ![../images/479940_1_En_2_Chapter/479940_1_En_2_Fig6_HTML.jpg](images/479940_1_En_2_Chapter/479940_1_En_2_Fig6_HTML.jpg)


