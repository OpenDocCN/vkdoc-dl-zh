    It is always a question of debate about which membership function to use. There
    is no single best answer, but you can use one of the following approaches:


    - Look at the distribution of the data, for example, with the help of a histogram.
    If you cannot deduce patterns from the visualization, it is best to use the triangular
    or trapezoidal membership functions. Otherwise, use others based on the distribution
    shape.

    - Start the problem with the simple membership functions like triangular or trapezoidal.
    If they provide good results, all is well and good. Otherwise, move to others,
    especially Gaussian. Most of the time, the Gaussian membership function will give
    you the best results.

    - Train the model on the membership functions that you want to compare. Later,
    compare the results using metrics like MAPE (mean average percentage error). Whichever
    method gives you the lowest error is the best model.


    ### Polynomial Membership Function


    The polynomial membership function is basically made up of three types:


    - z-shaped

    - s-shaped

    - pi-shaped


    These functions are named based on how each curve looks. They are also called
    spline-based membership functions. The equations for all three membership functions
    are explained in the following sections.'
