    portion of the image. This operation is continued until the kernel covers the
    entire image. This results in a new image with a smaller number of dimensions,
    as compared to the original image, but the depth of image is higher. The output
    is called an activation map and the process is called strides.


    #### Padding


    The filter might fit inside the image perfectly. But if it does not, you use the
    concept of padding. In this process, you add a few extra values in the input image
    so that the filter fits in well. The most commonly used value is 0 (called zero-padding).
    Alternatively, you can drop the part of the image where the filter doesn’t fit.


    ##### Activation Function


    The actual decision of classification is taken in this layer. The most used activation
    function in CNN is ReLU, the rectified linear unit. This helps the neurons give
    exact pixel values as output for all the positive values, but for all the negative
    values the output is always zero. This results in sparse matrix generation and
    hence means lesser computation time with better learning. Generally, pixel values
    are positive, so the problem of dying ReLU doesn’t apply.


    ##### Pooling Layer


    If an image is taken from a DSLR camera, the resolution will be very high. Since
    the resolution is high, the number of pixels will be high. Even though you use
    filters with a smaller dimension than the input image, the computational time
    will still be long. Therefore, to overcome this issue, you can use pooling. It
    is used to reduce the size of the input image, as well as the outcomes of convolutions.
    Because of this, the number of parameters that need to be analyzed is smaller.
    Hence, the computational time decreases. This layer operates on each feature map
    (the outcome of individual convolutions) independently.


    Pooling, also called subsampling or downsampling, can be of different types:


    *   Max pooling


    *   Average pooling


    *   Sum pooling


    The most common pooling approach is *max pooling.* Max pooling takes the largest
    element from the convolved matrix. Instead of the maximum, if you find the average
    number, it’s called average pooling. Summing all elements in the convolved matrix
    is called sum pooling.


    An example of the max pooling operation is shown in Figure [5-12](#479940_1_En_5_Chapter.xhtml#Fig12).


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig12_HTML.jpg](images/479940_1_En_5_Chapter/479940_1_En_5_Fig12_HTML.jpg)


    Figure 5-12


    Max pooling operation'
