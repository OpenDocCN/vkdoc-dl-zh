    ### 反相似关系


    相似关系的补集即为反相似关系。因此，可以将其表示为：


    ![$$ {\mu}_{R^{\prime }}=1-{\mu}_R\left(x,y\right) $$](img/479940_1_En_2_Chapter_TeX_Equaz.png)


    假设：


    如果 `R` = ![$$ \left[\begin{array}{c}\mathrm{10.10.7}\\ {}\mathrm{0.110.7}\\ {}\mathrm{0.70.71}\end{array}\right]
    $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_IEq18.png)


    ![$$ {\mu}_{R^{\prime }}\left(x,y\right)=1-\left[\begin{array}{c}\mathrm{10.10.7}\\
    {}\mathrm{0.110.7}\\ {}\mathrm{0.70.71}\end{array}\right] $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equ2.png)


    这等于以下矩阵：


    ![$$ \left[\begin{array}{c}\mathrm{00.90.3}\\ {}\mathrm{0.900.3}\\ {}\mathrm{0.30.30}\end{array}\right]
    $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_Equba.png)


    可以说该关系是反自反、对称且传递的。因此，`R` 是一个反相似关系。


    ### 弱相似关系


    如果一个关系是自反且对称的，但不具有传递性，则该关系称为弱相似关系。


    如果 `R` = ![$$ \left[\begin{array}{c}\mathrm{10.10.80.20.30.1}\\ {}\mathrm{100.310.80}\\
    {}\mathrm{10.700.20.30.7}\\ {}\mathrm{10.60.3100.61}\end{array}\right] $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_IEq19.png)


    当你应用自反、对称和传递关系的规则时，可以发现它满足前两条，但不满足传递关系性质。因此，可以说它是一个弱相似关系。


    ### 半序关系


    在讨论半序关系之前，必须先了解弱反对称关系的含义。这种模糊关系遵循以下规则：


    如果


    ![$$ {\mu}_R\left(x,y\right)&gt;0 $$](img/479940_1_En_2_Chapter_TeX_Equbb.png)


    ![$$ {\mu}_R\left(y,x\right)&gt;0 $$](img/479940_1_En_2_Chapter_TeX_Equbc.png)


    那么


    ![$$ x=y $$](img/479940_1_En_2_Chapter_TeX_Equbd.png)


    现在你了解了这一点，半序关系既是自反的，也是弱对称的。例如，如果


    `R` = ![$$ \left[\begin{array}{c}\mathrm{10.80.20.60.60.4}\\ {}01000.60\\ {}00100.50\\
    {}\mathrm{00010.60.4}\\ {}000010\\ {}000001\end{array}\right] $$](images/479940_1_En_2_Chapter/479940_1_En_2_Chapter_TeX_IEq20.png)


    那么该关系遵循半序关系的性质。


    ## 模糊规则


    在模糊逻辑中，如果要引入条件语句，就需要使用模糊规则（见图 2-17）。最重要的是理解模糊 If-Then 规则。一个简单的模糊规则示例如下：


    ![$$ x\ \mathbf{is}\ A\ \mathbf{then}\ y\ \mathbf{is}\ B $$](img/479940_1_En_2_Chapter_TeX_Equ3.png)


    在这个语句中，`A` 和 `B` 被称为语言值。这些值假定来源于统计研究、数学模型等。例如，它们可以是分类值（好、一般或最好）、概率值（0.1、0.3 或
    0.9），或实验中的任何其他部分。这些值可以是模糊集合的一部分，而模糊集合又可以是论域 `X` 和 `Y` 中的成员。


    如果将上述语句分成两部分：


    - `x` 是 `A`

    - `y` 是 `B`


    第一部分称为*前件*或*前提*，第二部分称为*后件*或*结论*（见图 2-2）。


    例如，考虑以下规则：


    - 如果路况好，那么车况好

    - 如果公司好，那么员工满意

    - 如果服务好，那么小费一般


    如前所述，`A` 和 `B` 是模糊集合，因此它们的值在 0 到 1 之间。这意味着你提供一个介于 0 和 1 之间的值作为前件，并得到一个介于 0 和 1
    之间的值作为后件。因此，在上例中，“好”可以被赋予一个介于 0 和 1 之间的数字，你将得到一个介于 0 和 1 之间的响应，该响应将根据问题陈述代表“好”、“一般”或“满意”。


    当你应用 If-Then 规则时，输入被设置为介于 0 和 1 之间的值，但输出是一个完整的模糊集合。之后，你需要应用一种称为解模糊化的模糊运算，它会给你一个介于
    0 和 1 之间的清晰输出值。


    If-Then 规则的处理过程包括：


    1.  读取前件

    2.  将输入转换为模糊集合

    3.  应用必要的模糊算子

    4.  将结果应用于后件

    5.  得到一个模糊集合作为输出

    6.  解模糊化以获得清晰答案


    这些示例是二元的。前件和后件都可以有多个部分。例如：


    ![../images/479940_1_En_2_Chapter/479940_1_En_2_Fig17_HTML.jpg](img/479940_1_En_2_Fig17_HTML.jpg)


    图 2-17


    服务示例中的模糊规则


    - **如果**天空是灰色的**并且**风很大**并且**气压计在下降，**那么** ...

    - 如果温度低，那么热水阀打开且冷水阀关闭


    根据这种逻辑，规则可以分为两部分：


    - *模糊映射规则。* 该规则首先对前件输入（本例中为服务和食物）进行模糊化，然后应用最大值算子。这给出了需要发送到后件的最终清晰值。

    - *模糊蕴含规则。* 在该规则中，后件接收来自前件的清晰输入，然后决定模糊集合的外观。此步骤之后，你将得到一个模糊集合作为输出。


    一旦你了解了模糊推理系统，你就会理解将输出模糊集合解模糊化为清晰集合的过程。


    ## 模糊推理：近似推理理论


    假设你知道一些与一个称为 `A` 的前件模糊集合和一个称为 `C` 的后件模糊集合相关的模糊规则。再假设你知道一个事实，该事实不过是模糊集合 `A` 中的一个成员。利用这些规则，你可以通过近似推理从模糊集合
    `C` 中得到一个结论。考虑以下示例。


    假设你有三条模糊 If-Then 规则：


    - 如果服务好，那么小费一般

    - 如果服务最差，那么小费很少

    - 如果服务最好，那么小费很多


    如果你知道服务好，通过近似推理，你可以说小费是一般水平。以下是这个想法的正式表示。


    ![$$ R1: ifxisA1 thenyisC1, $$](img/479940_1_En_2_Chapter_TeX_Eqube.png)


    ![$$ R2: ifxisA2 thenyisC2, $$](img/479940_1_En_2_Chapter_TeX_Equbf.png)


    ![$$ \cdots \cdots \cdots \cdots $$](img/479940_1_En_2_Chapter_TeX_Equbg.png)


    ![$$ Rn: ifxisAnthenyisCn $$](img/479940_1_En_2_Chapter_TeX_Equbh.png)


    ![$$ :! xisA $$](img/479940_1_En_2_Chapter_TeX_Equbi.png)


    ![$$ so, consequence: yisC $$](img/479940_1_En_2_Chapter_TeX_Equbj.png)


    现在你已经了解了基础知识，让我们看看一些与模糊推理相关的正式定义：


    - 蕴含规则

    - 合取规则

    - 析取规则

    - 投影规则

    - 否定规则

    - 广义假言推理

    - 广义拒取式推理


    ### 蕴含规则


    如果你知道服务很差，而“很差”是“糟糕”的子集，那么你可以说服务是糟糕的。这被称为蕴含规则，表示为：


    ![$$ xisA $$](img/479940_1_En_2_Chapter_TeX_Equbk.png)


    ![$$ A\subset B $$](img/479940_1_En_2_Chapter_TeX_Equbl.png)


    ![$$ xisB $$](img/479940_1_En_2_Chapter_TeX_Equbm.png)

