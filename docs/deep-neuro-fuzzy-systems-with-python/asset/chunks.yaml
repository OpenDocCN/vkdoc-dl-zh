  trans: "\n# 模糊聚类\n\n聚类是一种根据数据中存在的相似性，将数据分组到几个类别中的方法。这些类别被称为*簇*（见图 7-2）。\n\n![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig2_HTML.jpg](img/479940_1_En_7_Fig2_HTML.jpg)\n\
    \n图 7-2 聚类\n\n机器学习使用不同的聚类方法，例如 K-Means 聚类、层次聚类、DBScan 等。类似地，当我们谈论模糊网络时，也有诸如模糊\
    \ C-Means 聚类、高斯应用寻找聚类等方法。本章将详细讨论模糊 C-Means 聚类。\n\n## 模糊 C-Means 聚类\n\n假设我有一组数据点\
    \ `X`，我想根据某些相似性度量将它们放入 `k` 个簇中。以集合的形式，假设数据如下所示：\n\n![$$ X=\\left\\{{x}_1,{x}_2,{x}_3,\\\
    dots {x}_m\\right\\} $$](img/479940_1_En_7_Chapter_TeX_Equa.png)\n\n要使用 C-Means\
    \ 聚类方法将它们分成 `k` 个簇，首先要做的是从数据中随机选取 `k` 个点。假设这 `k` 个点是质心（见图 7-3）。\n\n![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig3_HTML.jpg](img/479940_1_En_7_Fig3_HTML.jpg)\n\
    \n图 7-3 C-Means 聚类\n\n然后，使用曼哈顿距离或欧几里得距离，你会发现所有剩余的点都更接近某个簇的质心点。这样你就得到了第一组分配给 `k`\
    \ 个簇的数据。但你是通过随机选择 `k` 个点并称它们为*质心*开始的。实际上，它们并非真正的质心。因此，你需要继续这个过程来纠正这个假设。\n\n###\
    \ 欧几里得距离\n\n任意两点之间的标准直线距离称为*欧几里得距离*。要计算这个距离，可以使用以下公式：\n\n![$$ d=\\sqrt{{\\left({q}_1-{p}_1\\\
    right)}²+{\\left({q}_2-{p}_2\\right)}²} $$](img/479940_1_En_7_Chapter_TeX_Equb.png)\n\
    \n下一步，你需要找到你所定义簇的实际质心。一旦找到，一些点可能会失去其原始簇的归属。与它们最初所属的簇相比，它们现在可能更接近另一个簇。因此，你需要根据新的质心重新分配这些点。这将帮助你获得一个包含新成员点的修订后的\
    \ `k` 个簇。然后，再次找到新的质心并重复这个过程。你不断重复这个过程，直到新的簇不再导致点从一个簇移动到另一个簇。\n\n让我们从数学角度审视整个算法：\n\
    \n1.  定义需要聚类的 `N` 个数据点：\n\n    ![$$ {x}_i, where\\ i=1,2,3\\dots N $$](img/479940_1_En_7_Chapter_TeX_Equc.png)\n\
    \n2.  假设要创建的簇的数量由 `C` 表示，其中 2 ≤ `C` ≤ `N`\n\n3.  定义由 `f` 表示的簇模糊度，其中 `f` > 1\n\n\
    4.  定义一个维度为 `N` × `C` × `M` 的隶属度矩阵 `U`。该矩阵应按照以下条件随机定义：\n    1.  `U`[`ijm`] ∈ [0,1]，并且\n\
    \    2.  ![$$ \\sum \\limits_{i=1}^n{U}_{ijm}=0 $$](img/479940_1_En_7_Chapter_TeX_IEq1.png)\
    \ 对于每个 `i` 和固定的 `m` 值。\n\n5.  确定簇中心。这可以通过使用以下公式完成：\n\n    ![$$ {CC}_{jm}=\\frac{\\\
    sum_{i=1}^N{U^f}_{ijm}{x}_{im}}{\\sum \\limits_{i=1}^N{U^f}_{ijm}} $$](img/479940_1_En_7_Chapter_TeX_Equd.png)\n\
    \n    其中 `j` 代表簇，`m` 代表维度。\n\n6.  计算欧几里得距离。你可以通过以下公式找到这个距离：\n\n    ![$$ {D}_{ijm}=\\\
    left\\Vert \\left({x}_{im}-{C}_{jm}\\right)\\right\\Vert $$](img/479940_1_En_7_Chapter_TeX_Eque.png)\n\
    \n    ![$$ where\\ i\\ represents\\ data\\ point,j\\ represents\\ cluster, and\\\
    \ m\\ represents\\ dimension $$](img/479940_1_En_7_Chapter_TeX_Equf.png)\n\n7.\
    \  找到欧几里得距离后，你需要用新值更新步骤 4 中定义的隶属度矩阵。这可以通过使用以下公式完成：\n\n    ![$$ {U}_{ijm}=\\frac{1}{\\\
    sum \\limits_{c=1}^D{\\left(\\frac{D_{ijm}}{D_{icm}}\\right)}^{\\frac{2}{f-1}}}\
    \ $$](img/479940_1_En_7_Chapter_TeX_Equg.png)\n\n    ![$$ We\\ apply\\ the\\ above\\\
    \ equation\\ only\\ for\\ the\\ data\\ points\\ where\\ {D}_{ijm}&gt;0\\. If\\\
    \ {D}_{ijm}=0\\ then\\ we\\ have\\ full\\ membership\\ and\\ the\\ value\\ initialized\\\
    \ is\\ 1.0 $$](img/479940_1_En_7_Chapter_TeX_Equh.png)\n\n8.  重复步骤 1 到 5，直到 `U`\
    \ 的值 < ∈，其中 ∈ 是终止标准。\n\n### 模糊 C-Means 聚类的应用\n\n你可以将模糊 C-Means 聚类用于以下用例和领域：\n\n\
    *   图像处理时，特别是对图像内部的对象进行聚类。也用于基于图像的分割。\n*   与群体智能结合使用。\n*   与遥感结合使用。\n\n### 模糊\
    \ C-Means 的 Python 实现\n\n以下代码包含两组数据——训练数据和测试数据。借助训练数据，你可以找到簇的最终质心，之后应使用测试数据来检查新数据点被分配到哪个簇。此示例使用名为\
    \ `fuzzycmeans` 的 Python 包。你可以使用以下命令安装它：\n\n```\npip install fuzzycmeans\n```\n\
    \n如果该包在执行时出现问题，你可以克隆 GitHub 仓库，然后将两个 Python 文件——`fuzzy_clustering.py` 和 `visualization.py`——复制到你的主目录，然后运行代码。在运行代码之前，请确保安装了\
    \ `bokeh` 包，因为它是此模糊 C-Means 包的依赖项。你可以通过编写以下命令来安装它：\n\n```\npip install bokeh\n\
    ```\n\n此包是对 James C. Bezdek、Robert Ehrlich 和 William Full 的论文“FCM: The Fuzzy C-Means\
    \ Clustering Algorithm”的实现。你也可以通过访问 GitHub 仓库 [`https://github.com/oeg-upm/fuzzy-c-means.git`](https://github.com/oeg-upm/fuzzy-c-means.git)\
    \ 来查看和克隆源代码。\n\n此示例使用 `AirlinesCluster` 数据集。你可以在本书的 GitHub 仓库中找到此数据集。或者，你也可以从\
    \ Kaggle 网站下载它。该示例仅使用两列——`Balance` 和 `BonusMiles`——来开始聚类。如果你愿意，可以使用所有列并可视化输出。\n\
    \n```\nimport pandas as pd\nimport numpy as np\nimport numpy as np\nimport logging\n\
    from fuzzy_clustering import FCM\nfrom visualization import draw_model_2d\nfrom\
    \ sklearn import preprocessing\ndataset = pd.read_csv(\"AirlinesCluster.csv\"\
    ) #Importing the airlines data\ndataset1 = dataset.copy() #Making a copy so that\
    \ original data remains unaffected\ndataset1 = dataset1[[\"Balance\", \"BonusMiles\"\
    ]][:500] #Selecting only first 500 rows for faster computation\ndataset1_standardized\
    \ = preprocessing.scale(dataset1) #Standardizing the data to scale it between\
    \ the upper and lower limit of 1 and 0\ndataset1_standardized = pd.DataFrame(dataset1_standardized)\n\
    fcm.set_logger(tostdout=False) #Telling the package class to stop the unnecessary\
    \ output\nfcm = FCM(n_clusters=5) #Defining k=5\nfcm.fit(dataset1_standardized)\
    \ #Training on data\npredicted_membership = fcm.predict(np.array(dataset1_standardized))\
    \ #Testing on same data\ndraw_model_2d(fcm, data=np.array(dataset1_standardized),\
    \ membership=predicted_membership) #Visualizing the data\n```\n"
- fmt: "# Fuzzy Adaptive Resonance Theory\n\n在模糊C均值聚类（Fuzzy C-Means Clustering）中，你看到基于点之间的距离可以将它们分组到簇中。但如果你能控制一个簇中点之间的相似度呢？模糊自适应共振理论（Fuzzy\
    \ Adaptive Resonance Theory，`Fuzzy ART`）提供了控制簇内数据点之间相似度的能力。因此，`Fuzzy ART`是通过控制簇之间的相似度来寻找最佳簇的另一种方法。\n\
    \n大量数据被输入到`Fuzzy ART`模型中。这些数据包含许多模式，`Fuzzy ART`试图从中提取相似性。它基于训练模型的数据，从新数据中找到最佳的自适应簇。在这个模型中需要注意的一点是，尽管你在输入数据上训练它，但它不像其他模糊架构那样包含任何隐藏层。\n\
    \n一个`Fuzzy ART`架构主要包含两个组件：\n\n*   注意力（Attention）\n*   定向（Orientation）\n\n*注意力*帮助`Fuzzy\
    \ ART`根据数据定义它认为最佳的簇或类别。*定向*帮助它确定所有找到的簇是否有效。这意味着它帮助`Fuzzy ART`接受或拒绝由注意力定义的类别。这就是为什么它被称为*自适应架构*。自适应这个名称的另一个原因是它适应新数据的能力。无论从训练数据中学到了什么模式，新数据都可以被分配到任何一个簇中。但如果新数据与任何现有簇都不相似，`Fuzzy\
    \ ART`有能力创建一个与现有簇完全不同的新簇。\n\n`Fuzzy ART`用于聚类和分类问题，它接受的输入数据可以是离散的或连续的。与`Fuzzy ART`架构相关的一些特性是：\n\
    \n*   整个架构只有一个权重。因此，它更易于管理和更新。\n*   它可以处理二进制和非二进制数据。\n*   它包含以下重要的超参数：\n    *\
    \   *警戒阈值（Vigilance threshold）*：\n        这个阈值通常决定`Fuzzy ART`的记忆。它有助于确定最终的簇数量。它用于执行注意力操作。\n\
    \    *   *选择参数（Choice parameter）*：\n        用于确定保留哪个簇以及不应验证哪个簇。如果超过阈值，则选择该簇；否则，它被拒绝。它用于执行定向操作。\n\
    \    *   *学习率（Learning rate）*：\n        用于确定输入数据中的模式。\n\n图[7-4](#479940_1_En_7_Chapter.xhtml#Fig4)展示了基本的`Fuzzy\
    \ ART`架构。\n\n![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig4_HTML.jpg](images/479940_1_En_7_Chapter/479940_1_En_7_Fig4_HTML.jpg)\n\
    \n**图 7-4**  \n`Fuzzy ART`\n\n如你所见，`Fuzzy ART`中有三个层。最后一层被称为*输出层*，它与第二层全连接。正如你可能从早期关于神经网络的章节中回忆的那样，全连接层是指每个节点都与前一层或后一层中的所有节点相连的层。因此，在`Fuzzy\
    \ ART`中，`F2`层和`F1`层是全连接的。在第一层中，你接收`m`维输入，并在将其传递到下一层之前，将其与其补码相乘。这使得`F1`层中的节点数量变为`2m`维。最后，输出层持续与第二层通信，以决定形成的簇是否有效。如果有效，结果为`1`；否则，结果为`0`。\n\
    \n![$$ {y}_j=\\left\\{\\begin{array}{c}1,\\kern0.5em When\\ node\\ is\\ active\\\
    \ in\\ Output\\ layer\\\\ {}0,\\kern0.5em Otherwise\\end{array}\\right. $$](images/479940_1_En_7_Chapter/479940_1_En_7_Chapter_TeX_Equi.png)\n\
    \n接下来的部分将更详细地介绍每一层的操作。\n\n### 第1层：`F[0]`（定向层）\n\n这一层接收输入的模糊模式，找到其补码，然后将原始输入和补码输入都传递到下一层。此操作可以用以下方程概括：\n\
    \n![$$ I=\\left(a,{a}_c\\right)=\\left({a}_1,{a}_2,\\dots, {a}_n,1-{a}_1,1-{a}_2,\\\
    dots, 1-{a}_n\\right) $$](images/479940_1_En_7_Chapter/479940_1_En_7_Chapter_TeX_Equj.png)\n\
    \n这一层中还存在一个重置节点（Reset node），它接收来自所有层的输入，并帮助转换接收到的输入模式。\n\n### 第2层：`F[1]`和`F[2]`（注意力层）\n\
    \n由于补码输入也被传递到`F[1]`层，因此存在的节点数量是输入层的两倍，由`2n`个节点表示。`F[2]`层包含`m`个节点。这两层通过连接权重连接，由`W[i]`和`w[j]`表示。`W[i]`表示从`F[1]`到`F[2]`的连接，而`w[j]`表示从`F[2]`到`F[1]`的连接。这些权重可以用以下数学方程表示：\n\
    \n![$$ {W}_i={W}_1,{W}_2,\\dots, {W}_{2n} $$](images/479940_1_En_7_Chapter/479940_1_En_7_Chapter_TeX_Equk.png)\n\
    \n![$$ {w}_j={w}_1,{w}_2,\\dots, {w}_{2n} $$](images/479940_1_En_7_Chapter/479940_1_En_7_Chapter_TeX_Equl.png)\n\
    \n在`F[2]`层中有两种节点：已提交节点（committed）和未提交节点（uncommitted）。*已提交节点*是指权重矩阵的值应为`1`的节点；否则，它被称为未提交节点。这可以用以下方程表示：\n\
    \n![$$ node=\\left\\{\\ \\begin{array}{c} committed,\\kern0.5em if\\ {w}_j={w}_j(0)=\\\
    left(1,1,\\dots, 1\\right)\\\\ {} uncommitted,\\kern8.75em otherwise\\end{array}\\\
    \ \\right\\} $$](images/479940_1_En_7_Chapter/479940_1_En_7_Chapter_TeX_Equm.png)\n\
    \n`F[2]`层的输入可以定义为：\n\n![$$ t(i)=\\left\\{\\begin{array}{c}\\raisebox{1ex}{$\\\
    left|I\\right|$}\\!\\left/ \\!\\raisebox{-1ex}{${a}_x+{M}_x$}\\right.,\\kern5.5em\
    \ for\\ an\\ uncommted\\ node\\\\ {}\\raisebox{1ex}{$\\left|I\\wedge {w}_j\\right|$}\\\
    !\\left/ \\!\\raisebox{-1ex}{${a}_x+\\left|{w}_j\\right|$}\\right.,\\kern3.25em\
    \ for\\ a\\ committed\\ node\\end{array}\\right\\} $$](images/479940_1_En_7_Chapter/479940_1_En_7_Chapter_TeX_Equn.png)\n\
    \n`Fuzzy ARTMAP`（见图[7-5](#479940_1_En_7_Chapter.xhtml#Fig5)）是`Fuzzy ART`的高级应用。它是一种监督学习方法，可用于不同的应用。它包含两个`Fuzzy\
    \ ART`组件，称为`Fuzzy ART[x]`和`Fuzzy ART[y]`，而第三个组件包含`ART`间关系。介绍`Fuzzy ARTMAP`超出了本书的范围，图[7-5](#479940_1_En_7_Chapter.xhtml#Fig5)展示了`Fuzzy\
    \ ARTMAP`的架构供你参考。\n\n![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig5_HTML.jpg](images/479940_1_En_7_Chapter/479940_1_En_7_Fig5_HTML.jpg)\n\
    \n**图 7-5**  \n`Fuzzy ARTMAP`\n\n### `Fuzzy ART`的应用\n\n*   用于寻找模式识别\n*   用于处理时间序列数据\n\
    *   用于监控产品质量\n\n### `Fuzzy ART`的Python实现\n\n`IRIS`是由Edgar Anderson收集的数据集。它量化了鸢尾花的形态变异。根据它们的变异，这些花被分为三类。本示例使用`Fuzzy\
    \ ART`来查看形态数据，并根据相似性对鸢尾花进行聚类。\n\n该算法相当复杂，因此在代码仓库中，你可以找到`FuzzyART.py`文件。只需将其上传到你的`home`文件夹中，然后运行以下代码。\n\
    \n```python\nfrom functools import partial\nimport numpy as np\nimport FuzzyART\
    \ as f\nimport sklearn.datasets as ds\nl1_norm = partial(np.linalg.norm, ord=1,\
    \ axis=-1)#Used for regularization so that we can penalize the parameters that\
    \ are not important\nif __name__ == '__main__':\niris = ds.load_iris()#load the\
    \ dataset in the python environment\ndata = iris['data'] / np.max(iris['data'],\
    \ axis=0)#standardize the dataset\nnet = f.FuzzyART(alpha=0.5, rho=0.5) #Initialize\
    \ the FuzzyART Hyperparameters\nnet.train(data, epochs=100) #Train on the data\n\
    print(net.test(data).astype(int)) #Print the Cluster Results\nprint(iris['target'])\
    \ #Match the cluster results\n```"
  raw: "## Fuzzy Adaptive Resonance Theory\n\nIn Fuzzy C-Means Clustering, you saw\
    \ that based on the distance between the points, you can group them into clusters.\
    \ But what if you can control this similarity between the points in one cluster?\
    \ Fuzzy Adaptive Resonance Theory (Fuzzy ART) provides the power to control the\
    \ similarity between the data points inside a cluster. Therefore, Fuzzy ART is\
    \ another approach to find the best clusters by controlling the similarity between\
    \ them.\n\nA lot of data is given to a Fuzzy ART model. This data contains a lot\
    \ of patterns from which Fuzzy ART tries to extract the similarities. It finds\
    \ the best adaptive clusters from the new data, based on the data that trained\
    \ the model. One thing to notice in this model is that even though you train it\
    \ on the input data, it doesn’t contain any hidden layers like other Fuzzy Architectures.\n\
    \nA Fuzzy ART Architecture mainly contains two components:\n\n*   Attention\n\n\
    *   Orientation\n\n*Attention* helps Fuzzy ART define the clusters or categories\
    \ that it finds are the best, based on the data. *Orientation* helps it determine\
    \ whether all the clusters that are found are valid. This means it helps Fuzzy\
    \ ART accept or reject a category defined by attention. That’s why this is called\
    \ an *adaptive architecture.* One more reason for the name adaptive is its ability\
    \ to adapt to new data. Whatever patterns are learned from the training data,\
    \ new data can be allocated to any one of the clusters. But if the new data does\
    \ not resemble any existing clusters, Fuzzy ART has the power to create a new\
    \ cluster that’s totally different from an existing cluster.\n\nFuzzy ART is used\
    \ for clustering and classification problems, and the input data that it takes\
    \ can be discrete or continuous. Some of the features related to the Fuzzy ART\
    \ Architecture are:\n\n*   The entire architecture has only one weight. Hence,\
    \ it is easier to manage and update.\n\n*   It can process both binary and non-binary\
    \ data.\n\n*   It contains the following important hyperparameters:\n    *   *Vigilance\
    \ threshold* :\n\n        This threshold generally decides the memory of a Fuzzy\
    \ ART. It helps determine the final number of clusters. It is used to perform\
    \ the attention operation.\n\n    *   *Choice parameter*:\n\n        This is used\
    \ to determine which cluster to keep and which should not be validated. If the\
    \ threshold is surpassed, the cluster is selected; otherwise, it’s rejected. It’s\
    \ used to perform the orientation operation.\n\n    *   *Learning rate:*\n\n \
    \       Used to determine patterns in the input data.\n\nFigure [7-4](#479940_1_En_7_Chapter.xhtml#Fig4)\
    \ shows the basic Fuzzy ART Architecture.\n\n![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig4_HTML.jpg](images/479940_1_En_7_Chapter/479940_1_En_7_Fig4_HTML.jpg)\n\
    \nFigure 7-4\n\nFuzzy ART\n\nAs you can see, there are three layers in Fuzzy ART.\
    \ The last layer is called the *output layer* and it is fully connected to the\
    \ second layer. As you may recall from an earlier chapter on neural networks,\
    \ a fully connected layer is a layer where each node is connected to all the nodes\
    \ present in the previous or next layer. Therefore, in Fuzzy ART, the F2 and F1\
    \ layers are fully connected. In the first layer, you take m-dimensional input\
    \ and, before passing it to the next layer, you multiply it by its complement.\
    \ This makes the number of nodes present in the F1 layer 2m-dimensional. Finally,\
    \ the output layer talks to the second layer continuously to decide whether the\
    \ cluster formed is valid. If it’s valid, the outcome is 1; otherwise, it’s 0.\n\
    \n![$$ {y}_j=\\left\\{\\begin{array}{c}1,\\kern0.5em When\\ node\\ is\\ active\\\
    \ in\\ Output\\ layer\\\\ {}0,\\kern0.5em Otherwise\\end{array}\\right. $$](images/479940_1_En_7_Chapter/479940_1_En_7_Chapter_TeX_Equi.png)\n\
    \nThe next sections look at the operations of each layer in a little detail.\n\
    \n### Layer 1: *F*[0] (Orienting Layer)\n\nThis layer takes the input fuzzy pattern,\
    \ finds the complement of it, and then passes both the original and complemented\
    \ input to the next layer. This operation can be summarized by this equation:\n\
    \n![$$ I=\\left(a,{a}_c\\right)=\\left({a}_1,{a}_2,\\dots, {a}_n,1-{a}_1,1-{a}_2,\\\
    dots, 1-{a}_n\\right) $$](images/479940_1_En_7_Chapter/479940_1_En_7_Chapter_TeX_Equj.png)\n\
    \nThere is a Reset node that’s also present in this layer and it takes input from\
    \ all the layers and helps transform the input patterns received.\n\n### Layer\
    \ 2: *F*[1] and *F*[2] (Attentional Layer)\n\nSince the complemented input is\
    \ also passed to the *F*[1] layer, the number of nodes present is the double of\
    \ the input layer, represented by 2*n* nodes. The *F*[2] layer contains *m* nodes.\
    \ Both layers are connected by connection weights, represented by *W*[*i*] and\
    \ *w*[*j*]. *W*[*i*] represents the connection from *F*[1] to *F*[2], while *w*[*j*]\
    \ represents the connection from *F*[2] to *F*[1]. These weights can be represented\
    \ by the following mathematical equations:\n\n![$$ {W}_i={W}_1,{W}_2,\\dots, {W}_{2n}\
    \ $$](images/479940_1_En_7_Chapter/479940_1_En_7_Chapter_TeX_Equk.png)\n\n![$$\
    \ {w}_j={w}_1,{w}_2,\\dots, {w}_{2n} $$](images/479940_1_En_7_Chapter/479940_1_En_7_Chapter_TeX_Equl.png)\n\
    \nIn the *F*[2] layer there are two kinds of nodes: committed and uncommitted.\
    \ A *committed node* is a node where the value of the weight matrix should be\
    \ 1; otherwise, it is called an uncommitted node. This can be represented by the\
    \ following equation:\n\n![$$ node=\\left\\{\\ \\begin{array}{c} committed,\\\
    kern0.5em if\\ {w}_j={w}_j(0)=\\left(1,1,\\dots, 1\\right)\\\\ {} uncommitted,\\\
    kern8.75em otherwise\\end{array}\\ \\right\\} $$](images/479940_1_En_7_Chapter/479940_1_En_7_Chapter_TeX_Equm.png)\n\
    \nInput of *F*[2] layer can be defined as,\n\n![$$ t(i)=\\left\\{\\begin{array}{c}\\\
    raisebox{1ex}{$\\left|I\\right|$}\\!\\left/ \\!\\raisebox{-1ex}{${a}_x+{M}_x$}\\\
    right.,\\kern5.5em for\\ an\\ uncommted\\ node\\\\ {}\\raisebox{1ex}{$\\left|I\\\
    wedge {w}_j\\right|$}\\!\\left/ \\!\\raisebox{-1ex}{${a}_x+\\left|{w}_j\\right|$}\\\
    right.,\\kern3.25em for\\ a\\ committed\\ node\\end{array}\\right\\} $$](images/479940_1_En_7_Chapter/479940_1_En_7_Chapter_TeX_Equn.png)\n\
    \nFuzzy ARTMAP (see Figure [7-5](#479940_1_En_7_Chapter.xhtml#Fig5)) is an advanced\
    \ application of Fuzzy ARTs. It is a supervised learning approach that can be\
    \ used in different applications. It contains two Fuzzy ART components, called\
    \ Fuzzy ART[x] and Fuzzy ART[y], whereas the third component contains the inter-ART\
    \ relationship. Covering Fuzzy ARTMAPs is outside the scope of this book, Figure\
    \ [7-5](#479940_1_En_7_Chapter.xhtml#Fig5) shows the architecture of a Fuzzy ARTMAP\
    \ for your reference.\n\n![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig5_HTML.jpg](images/479940_1_En_7_Chapter/479940_1_En_7_Fig5_HTML.jpg)\n\
    \nFigure 7-5\n\nFuzzy ARTMAP\n\n### Applications of Fuzzy ART\n\n*   Used in finding\
    \ pattern recognition\n\n*   Used to handle time series data\n\n*   Used to monitor\
    \ the quality of products\n\n### Python Implementation of Fuzzy ART\n\nIRIS is\
    \ a dataset collected by Edgar Anderson. It quantifies the morphological variations\
    \ in Iris flowers. Based on their variations, the flowers are divided into three\
    \ categories. This example uses Fuzzy ART to look at the morphological data and\
    \ cluster the Irises based on their similarity.\n\nThe algorithm is quite complex,\
    \ so in the code repository, you can find `FuzzyART.py` file. Just upload it in\
    \ your `home` folder and run the following code.\n\n```\nfrom functools import\
    \ partial\nimport numpy as np\nimport FuzzyART as f\nimport sklearn.datasets as\
    \ ds\nl1_norm = partial(np.linalg.norm, ord=1, axis=-1)#Used for regularization\
    \ so that we can penalize the parameters that are not important\nif __name__ ==\
    \ '__main__':\niris = ds.load_iris()#load the dataset in the python environment\n\
    data = iris['data'] / np.max(iris['data'], axis=0)#standardize the dataset\nnet\
    \ = f.FuzzyART(alpha=0.5, rho=0.5) #Initialize the FuzzyART Hyperparameters\n\
    net.train(data, epochs=100) #Train on the data\nprint(net.test(data).astype(int))\
    \ #Print the Cluster Results\nprint(iris['target']) #Match the cluster results\n\
    ```"
  trans: "\n# 模糊自适应共振理论\n\n在模糊 C 均值聚类（Fuzzy C-Means Clustering）中，你看到基于点之间的距离可以将它们分组到簇中。但如果你能控制一个簇中点之间的相似度呢？模糊自适应共振理论（Fuzzy\
    \ Adaptive Resonance Theory，`Fuzzy ART`）提供了控制簇内数据点之间相似度的能力。因此，`Fuzzy ART`是通过控制簇之间的相似度来寻找最佳簇的另一种方法。\n\
    \n大量数据被输入到`Fuzzy ART`模型中。这些数据包含许多模式，`Fuzzy ART`试图从中提取相似性。它基于训练模型的数据，从新数据中找到最佳的自适应簇。在这个模型中需要注意的一点是，尽管你在输入数据上训练它，但它不像其他模糊架构那样包含任何隐藏层。\n\
    \n一个`Fuzzy ART`架构主要包含两个组件：\n\n*   注意力（Attention）\n*   定向（Orientation）\n\n*注意力*帮助`Fuzzy\
    \ ART`根据数据定义它认为最佳的簇或类别。*定向*帮助它确定所有找到的簇是否有效。这意味着它帮助`Fuzzy ART`接受或拒绝由注意力定义的类别。这就是为什么它被称为*自适应架构*。自适应这个名称的另一个原因是它适应新数据的能力。无论从训练数据中学到了什么模式，新数据都可以被分配到任何一个簇中。但如果新数据与任何现有簇都不相似，`Fuzzy\
    \ ART`有能力创建一个与现有簇完全不同的新簇。\n\n`Fuzzy ART`用于聚类和分类问题，它接受的输入数据可以是离散的或连续的。与`Fuzzy ART`架构相关的一些特性是：\n\
    \n*   整个架构只有一个权重。因此，它更易于管理和更新。\n*   它可以处理二进制和非二进制数据。\n*   它包含以下重要的超参数：\n    *\
    \   *警戒阈值（Vigilance threshold）*：\n        这个阈值通常决定`Fuzzy ART`的记忆。它有助于确定最终的簇数量。它用于执行注意力操作。\n\
    \    *   *选择参数（Choice parameter）*：\n        用于确定保留哪个簇以及不应验证哪个簇。如果超过阈值，则选择该簇；否则，它被拒绝。它用于执行定向操作。\n\
    \    *   *学习率（Learning rate）*：\n        用于确定输入数据中的模式。\n\n图 7-4 展示了基本的`Fuzzy ART`架构。\n\
    \n![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig4_HTML.jpg](img/479940_1_En_7_Fig4_HTML.jpg)\n\
    \n**图 7-4**  \n`Fuzzy ART`\n\n如你所见，`Fuzzy ART`中有三个层。最后一层被称为*输出层*，它与第二层全连接。正如你可能从早期关于神经网络的章节中回忆的那样，全连接层是指每个节点都与前一层或后一层中的所有节点相连的层。因此，在`Fuzzy\
    \ ART`中，`F2`层和`F1`层是全连接的。在第一层中，你接收`m`维输入，并在将其传递到下一层之前，将其与其补码相乘。这使得`F1`层中的节点数量变为`2m`维。最后，输出层持续与第二层通信，以决定形成的簇是否有效。如果有效，结果为`1`；否则，结果为`0`。\n\
    \n![$$ {y}_j=\\left\\{\\begin{array}{c}1,\\kern0.5em When\\ node\\ is\\ active\\\
    \ in\\ Output\\ layer\\\\ {}0,\\kern0.5em Otherwise\\end{array}\\right. $$](img/479940_1_En_7_Chapter_TeX_Equi.png)\n\
    \n接下来的部分将更详细地介绍每一层的操作。\n\n### 第 1 层：`F[0]`（定向层）\n\n这一层接收输入的模糊模式，找到其补码，然后将原始输入和补码输入都传递到下一层。此操作可以用以下方程概括：\n\
    \n![$$ I=\\left(a,{a}_c\\right)=\\left({a}_1,{a}_2,\\dots, {a}_n,1-{a}_1,1-{a}_2,\\\
    dots, 1-{a}_n\\right) $$](img/479940_1_En_7_Chapter_TeX_Equj.png)\n\n这一层中还存在一个重置节点（Reset\
    \ node），它接收来自所有层的输入，并帮助转换接收到的输入模式。\n\n### 第 2 层：`F[1]`和`F[2]`（注意力层）\n\n由于补码输入也被传递到`F[1]`层，因此存在的节点数量是输入层的两倍，由`2n`个节点表示。`F[2]`层包含`m`个节点。这两层通过连接权重连接，由`W[i]`和`w[j]`表示。`W[i]`表示从`F[1]`到`F[2]`的连接，而`w[j]`表示从`F[2]`到`F[1]`的连接。这些权重可以用以下数学方程表示：\n\
    \n![$$ {W}_i={W}_1,{W}_2,\\dots, {W}_{2n} $$](img/479940_1_En_7_Chapter_TeX_Equk.png)\n\
    \n![$$ {w}_j={w}_1,{w}_2,\\dots, {w}_{2n} $$](img/479940_1_En_7_Chapter_TeX_Equl.png)\n\
    \n在`F[2]`层中有两种节点：已提交节点（committed）和未提交节点（uncommitted）。*已提交节点*是指权重矩阵的值应为`1`的节点；否则，它被称为未提交节点。这可以用以下方程表示：\n\
    \n![$$ node=\\left\\{\\ \\begin{array}{c} committed,\\kern0.5em if\\ {w}_j={w}_j(0)=\\\
    left(1,1,\\dots, 1\\right)\\\\ {} uncommitted,\\kern8.75em otherwise\\end{array}\\\
    \ \\right\\} $$](img/479940_1_En_7_Chapter_TeX_Equm.png)\n\n`F[2]`层的输入可以定义为：\n\
    \n![$$ t(i)=\\left\\{\\begin{array}{c}\\raisebox{1ex}{$\\left|I\\right|$}\\!\\\
    left/ \\!\\raisebox{-1ex}{${a}_x+{M}_x$}\\right.,\\kern5.5em for\\ an\\ uncommted\\\
    \ node\\\\ {}\\raisebox{1ex}{$\\left|I\\wedge {w}_j\\right|$}\\!\\left/ \\!\\\
    raisebox{-1ex}{${a}_x+\\left|{w}_j\\right|$}\\right.,\\kern3.25em for\\ a\\ committed\\\
    \ node\\end{array}\\right\\} $$](img/479940_1_En_7_Chapter_TeX_Equn.png)\n\n`Fuzzy\
    \ ARTMAP`（见图 7-5）是`Fuzzy ART`的高级应用。它是一种监督学习方法，可用于不同的应用。它包含两个`Fuzzy ART`组件，称为`Fuzzy\
    \ ART[x]`和`Fuzzy ART[y]`，而第三个组件包含`ART`间关系。介绍`Fuzzy ARTMAP`超出了本书的范围，图 7-5 展示了`Fuzzy\
    \ ARTMAP`的架构供你参考。\n\n![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig5_HTML.jpg](img/479940_1_En_7_Fig5_HTML.jpg)\n\
    \n**图 7-5**  \n`Fuzzy ARTMAP`\n\n### `Fuzzy ART`的应用\n\n*   用于寻找模式识别\n*   用于处理时间序列数据\n\
    *   用于监控产品质量\n\n### `Fuzzy ART`的 Python 实现\n\n`IRIS`是由 Edgar Anderson 收集的数据集。它量化了鸢尾花的形态变异。根据它们的变异，这些花被分为三类。本示例使用`Fuzzy\
    \ ART`来查看形态数据，并根据相似性对鸢尾花进行聚类。\n\n该算法相当复杂，因此在代码仓库中，你可以找到`FuzzyART.py`文件。只需将其上传到你的`home`文件夹中，然后运行以下代码。\n\
    \n```python\nfrom functools import partial\nimport numpy as np\nimport FuzzyART\
    \ as f\nimport sklearn.datasets as ds\nl1_norm = partial(np.linalg.norm, ord=1,\
    \ axis=-1)#Used for regularization so that we can penalize the parameters that\
    \ are not important\nif __name__ == '__main__':\niris = ds.load_iris()#load the\
    \ dataset in the python environment\ndata = iris['data'] / np.max(iris['data'],\
    \ axis=0)#standardize the dataset\nnet = f.FuzzyART(alpha=0.5, rho=0.5) #Initialize\
    \ the FuzzyART Hyperparameters\nnet.train(data, epochs=100) #Train on the data\n\
    print(net.test(data).astype(int)) #Print the Cluster Results\nprint(iris['target'])\
    \ #Match the cluster results\n```\n"
- fmt: '# Genetic Algorithms


    *Genetic algorithms* are groups of search algorithms that follow the biological
    process of natural selection and its genetics. The general principle of natural
    selection says that the fittest individuals are selected (by surviving) to produce
    the offspring of the next generation.


    When you define a search problem, you first determine a few variables to use to
    make search decisions. These variables are called *decision variables*. The first
    step involves finding these variables and then encoding them to finite-length
    strings of alphabets.


    Once you represent these variables in an encoded strings format, they are called
    *chromosomes*. Individual alphabets inside the string are called *genes*, while
    the value that they are storing is called an *allele*. For example, suppose a
    person wants to go from one place to another. The different routes that he can
    take are the decision variables. He can encode them using strings and then these
    routes may be called *chromosomes*. The individual cities along the route may
    be called *genes*.


    Once you have to find out different types of solutions, you can represent them
    as a set. This set is called a *candidate solution* set. It is a collection of
    different chromosomes. Once you have all these solutions, the next step is to
    decide which ones are the best and which ones to avoid. Genetic algorithms use
    different mathematical models and computer simulations to differentiate between
    the good and bad chromosomes.


    There is an ideal number of chromosomes present inside a candidate solution. If
    you have too few, you’ll get a substandard solution. But if you have too many,
    it may lead to unnecessary computations. Figure [7-6](#479940_1_En_7_Chapter.xhtml#Fig6)
    shows the flowchart representing the process of genetic algorithm-based searching.


    ![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig6_HTML.jpg](images/479940_1_En_7_Chapter/479940_1_En_7_Fig6_HTML.jpg)


    Figure 7-6


    Genetic algorithm steps


    The *Initialization* step involves a random generation of a candidate solutions
    set. In the second step, *Evaluation*, you try to find a fitness value for each
    chromosome and then assign it to the determined value. The next four steps are
    used to generate more chromosomes in the candidate solution set using different
    methods. When you select the chromosomes with high fitness values and make copies
    of them, that is the *Selection* step. When you combine multiple chromosomes to
    get a better chromosome, this step is called *recombination*. When you try to
    modify the current candidate solution’s property, it’s called *mutation*. Lastly,
    when the new solutions replace the older ones, it is called *replacement*. You
    will repeat this process until a specific threshold is reached.


    ## Selection


    One of the most famous methods in selection is *tournament method*. Once you have
    a candidate solution set, you select `k` members from it and run a tournament
    among them. The fittest member after the tournament is considered to be selected.
    This process continues several times to get the best members. An individual’s
    chance to participate in a tournament is called *selection pressure*. An entire
    algorithm of the tournament method is illustrated in Figure [7-7](#479940_1_En_7_Chapter.xhtml#Fig7)
    and can be summed up by these points:


    ![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig7_HTML.jpg](images/479940_1_En_7_Chapter/479940_1_En_7_Fig7_HTML.jpg)


    Figure 7-7


    Tournament selection


    1. Select `k` individuals from the population and perform a tournament amongst
    them.

    2. Select the best individual from the `k` individuals.

    3. Repeat Steps 1 and 2 until you have a desired population size.


    ## Recombination


    In recombination, you use *crossover methods* to find the fittest members. Using
    the *one-point crossover* method (see Figure [7-8](#479940_1_En_7_Chapter.xhtml#Fig8)),
    you first select two chromosomes. You randomly select any one point in the two
    chromosomes and then exchange the genes present after that point. *Two-point crossover*
    (see Figure [7-9](#479940_1_En_7_Chapter.xhtml#Fig9)) involves randomly selecting
    two points in the two chromosomes. The section between the two points is later
    exchanged.


    ![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig9_HTML.jpg](images/479940_1_En_7_Chapter/479940_1_En_7_Fig9_HTML.jpg)


    Figure 7-9


    Two-point crossover


    ![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig8_HTML.jpg](images/479940_1_En_7_Chapter/479940_1_En_7_Fig8_HTML.jpg)


    Figure 7-8


    One-point crossover


    Apart from these two methods, you also have uniform crossovers and arithmetic
    crossover. In uniform crossover, the combination is random between the two parents.
    This means any feature can randomly be selected from either parent. In arithmetic
    crossover, any mathematical operation can be applied to the two parents to give
    you the resulting offspring. Figures [7-10](#479940_1_En_7_Chapter.xhtml#Fig10)
    and [7-11](#479940_1_En_7_Chapter.xhtml#Fig11) show uniform crossover and arithmetic
    crossover having binary operations.


    ![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig11_HTML.jpg](images/479940_1_En_7_Chapter/479940_1_En_7_Fig11_HTML.jpg)


    Figure 7-11


    Arithmetic crossover


    ![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig10_HTML.jpg](images/479940_1_En_7_Chapter/479940_1_En_7_Fig10_HTML.jpg)


    Figure 7-10


    Uniform crossover


    ## Mutation


    As discussed, in mutation you try to change the property of chromosomes to check
    whether they become fit. In the *Flipping* (*Bit Flip Mutation*) method, genes
    are changed to their opposites. If a chromosome contains 0 and 1, then the 0s
    are flipped to 1 and vice versa. The second method is *Interchanging* (*Swap Mutation*),
    where you select any two points in a chromosome and then the genes at those positions
    are interchanged. In *Reversing* (*Inversion Mutation*), you select a random point
    and the genes after that point are reversed, just like the flipping method. If,
    from the entire chromosome, a subset of genes is selected and then shuffled randomly,
    this is called a *scramble mutation*. Figures [7-12](#479940_1_En_7_Chapter.xhtml#Fig12)
    through [7-15](#479940_1_En_7_Chapter.xhtml#Fig15) illustrate these concepts of
    mutation.


    ![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig15_HTML.jpg](images/479940_1_En_7_Chapter/479940_1_En_7_Fig15_HTML.jpg)


    Figure 7-15


    Scramble mutation


    ![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig14_HTML.jpg](images/479940_1_En_7_Chapter/479940_1_En_7_Fig14_HTML.jpg)


    Figure 7-14


    Inversion mutation


    ![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig13_HTML.jpg](images/479940_1_En_7_Chapter/479940_1_En_7_Fig13_HTML.jpg)


    Figure 7-13


    Swap mutation


    ![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig12_HTML.jpg](images/479940_1_En_7_Chapter/479940_1_En_7_Fig12_HTML.jpg)


    Figure 7-12


    Bit flip mutation


    ## Replacement


    If a child is fitter, you randomly select two less fit parents in the population
    and replace them with the children. This is called *random replacement*. This
    can be subdivided into *weak parent replacement* and *both parents replacement*.
    In weak parent replacement, only the weaker parent is replaced, while in the latter
    method, both parents are replaced.


    ## Stopping


    Finally, when it comes to stopping the genetic algorithm, you can use several
    methods. You can stop the process when the number of children generated crosses
    a threshold. You can also stop based on the threshold of the time elapsed. The
    most regressive process is when you stop based on the fitness value. This means
    the algorithm will stop only if you are not getting any major change in the fitness
    of the offspring.


    Now that you have learned about the basics required for discussing the advanced
    Fuzzy Architecture, let’s continue this chapter by discussing the first architecture—Fuzzy
    Adaptive Learning Control Network (FALCON).'
