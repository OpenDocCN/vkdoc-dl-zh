    Now you know what a Fuzzy Relation is. The next section looks at some of its properties.


    ### Properties of Fuzzy Relations


    This section discusses the following properties of Fuzzy Relations:


    - Projection

    - Cylindrical extension

    - Reflexive relation

    - Anti-reflexive relation

    - Symmetric relation

    - Anti-symmetric relation

    - Transitive relation

    - Similarity relation

    - Anti-similarity relation

    - Weak similarity relation

    - Order relation

    - Pre-order relation

    - Half order relation


    #### Projection of Fuzzy Relation


    Because a crisp relation is defined in the product space of two or more sets,
    the concept of *projection* was proposed. Suppose you have a Fuzzy Relation represented
    by the following matrix:


    R = [0.10.20.40.20.40.80.40.81]


    This is the same matrix you got in the previous section, with columns representing
    members of the X set, and rows representing members of the Y set. Individual values
