    # 长短期记忆网络


    如前所述，RNN 常常难以回忆起很久之前的信息。考虑以下文本：


    *“Shreya 从小就对舞蹈着迷。她懂得许多不同的舞蹈风格。她主要跳霹雳舞，但现在她在企业工作。她从事深度学习方面的工作。”*


    Shreya 会跳哪种舞蹈风格？


    这就是循环神经网络可能失效的地方！其背后的原因是梯度消失问题。一旦输入大量词语，这些信息就会在某处丢失。这个问题可以通过使用 RNN 的一个略微修改的版本来解决，即
    LSTM（长短期记忆网络）。


    LSTM 由以下组件组成：


    - 细胞

    - 细胞状态

    - 隐藏状态

    - 门


    一个*细胞*是一个存储信息的记忆单元。细胞也有能力决定存储什么以及何时允许读取。因此，这赋予了 LSTM 选择性记忆或遗忘的能力。


    为了使细胞运用这种决策能力，它们接收两种状态：细胞状态和隐藏状态。整个遗忘和记忆机制在 LSTM 中是通过称为*门*的东西来完成的。门类似于神经网络节点，它们要么阻止信息，要么让信息通过。它们通过从作为输入给出的信息中学习权重和偏置参数来实现这一点。权重使用反向传播方法学习。图
    5-16 展示了 LSTM 的架构。让我们更详细地看看 LSTM 的组件。


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig16_HTML.jpg](img/479940_1_En_5_Fig16_HTML.jpg)


    图 5-16 简单的 LSTM 细胞（arXiv:1808.03314v4 [cs.LG] 2018 年 11 月 4 日）


    图 5-16 中穿过中心的水平线 *s* 被认为是细胞状态。细胞状态的值可以使用以下门来改变：


    - 遗忘门

    - 输入门

    - 输出门


    ## 遗忘门


    顾名思义，如果你想从细胞状态中移除一些不必要的信息，你就使用这个门。这个决定是通过将过去的细胞状态和当前输入传递给一个 sigmoid 函数来做出的。输出要么是
    0，要么是 1。值为 0 意味着遗忘该输出，值为 1 意味着保留它。因此，无论哪里值为 0，该数字都会从细胞状态矩阵中被移除。这个细胞中的数学运算可以表示为：


    ![$$ {f}_t=\sigma \left({W}_f.\left[{h}_{t-1},{x}_t\right]+{b}_f\right) $$](images/479940_1_En_5_Chapter/479940_1_En_5_Chapter_TeX_Equj.png)


    图 5-17 展示了这些运算。


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig17_HTML.jpg](img/479940_1_En_5_Fig17_HTML.jpg)


    图 5-17 遗忘门


    下一步是决定你将要在细胞状态中存储什么新信息。这有两个部分。首先，一个称为输入门层的 sigmoid 层决定你将更新哪些值。接着，一个 Tanh 层创建一个新的候选值向量
    `Ct`，这些值可以被添加到状态中。在下一步中，你将这两者结合起来，以创建对状态的更新。


    ## 输入门


    一旦你移除了琐碎的信息，下一步就是添加新信息。首先，使用一个 sigmoid 函数，你将过去的细胞状态和当前输入传递给它。这会给出一个 0 或 1 的输出。无论哪里得到
    1，该信息都将被传递到新的细胞状态。接着，你将相同的两个输入传递给一个 Tanh 函数。这有助于你获取所有可能被添加到细胞状态的信息。最后，Tanh 和 sigmoid
    的输出将被相乘（使用 Hadamard 乘积），最终输出将被添加到细胞状态。这个过程由以下数学运算表示：


    ![$$ {i}_t=\sigma \left({W}_i.\left[{h}_{t-1},{x}_t\right]+{b}_i\right) $$](images/479940_1_En_5_Chapter/479940_1_En_5_Chapter_TeX_Equk.png)


    ![$$ {\underset{\_}{C}}_t=\tanh \left({W}_c.\left[{h}_{t-1},{x}_t\right]+{b}_c\right)
    $$](images/479940_1_En_5_Chapter/479940_1_En_5_Chapter_TeX_Equl.png)


    ![$$ {C}_t={f}_t\ast {C}_{t-1}+{i}_t{\underset{\_}{C}}_t $$](img/479940_1_En_5_Chapter_TeX_Equm.png)


    图 5-18 展示了所有运算。


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig18_HTML.jpg](img/479940_1_En_5_Fig18_HTML.jpg)


    图 5-18 输入门


    ## 输出门


    在这个门中，你首先将细胞状态的值缩放到 -1 和 +1 之间。这是通过将当前状态传递给一个 Tanh 函数来完成的。接着，你使用与遗忘门相同的 sigmoid
    过滤器，并将其应用到这里。这有助于确定哪些值需要被输出。两者的结合将给出最终输出以及下一个 LSTM 细胞的细胞状态输入。数学上如下所示：


    ![$$ {o}_t=\sigma \left({W}_o.\left[{h}_{t-1},{x}_t\right]+{b}_0\right) $$](images/479940_1_En_5_Chapter/479940_1_En_5_Chapter_TeX_Equn.png)


    ![$$ {h}_t={o}_t\ast \mathit{\tanh}\left({C}_t\right) $$](img/479940_1_En_5_Chapter_TeX_Equo.png)


    图 5-19 展示了输出门的运算。


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig19_HTML.jpg](img/479940_1_En_5_Fig19_HTML.jpg)


    图 5-19 输出门


    以下是 RNN 中相同示例的实现，但这次使用的是 LSTM。


    ```

    import pandas as pd

    import numpy as np

    import matplotlib.pyplot as plt

    from keras.models import Sequential

    from keras.layers import Dense, LSTM

    #Generating Random Data

    t=np.arange(0,1000)

    x=np.sin(0.02∗t)+2∗np.random.rand(1000)

    df = pd.DataFrame(x)

    df.head()

    #Splitting into Train and Test set

    values=df.values

    train, test = values[0:800,:], values[800:1000,:]

    # convert dataset into matrix

    def convertToMatrix(data, step=4):

    X, Y =[], []

    for i in range(len(data)-step):

    d=i+step

    X.append(data[i:d,])

    Y.append(data[d,])

    return np.array(X), np.array(Y)

    trainX,trainY =convertToMatrix(train,6)

    testX,testY =convertToMatrix(test,6)

    trainX = np.reshape(trainX, (trainX.shape[0], 1, trainX.shape[1]))

    testX = np.reshape(testX, (testX.shape[0], 1, testX.shape[1]))

    #Making the LSTM Structure

    model = Sequential()

    model.add(LSTM(units=4, input_shape=(1,6), activation="relu"))

    model.add(Dense(8, activation="relu"))

    model.add(Dense(1))

    #Compiling the Code

    model.compile(loss=''mean_squared_error'', optimizer="rmsprop")

    model.summary()

    #Training the Model

    model.fit(trainX,trainY, epochs=1, batch_size=500, verbose=2)

    #Predicting with the Model

    trainPredict = model.predict(trainX)

    testPredict= model.predict(testX)

    predicted=np.concatenate((trainPredict,testPredict),axis=0)

    ```


    另一种解决梯度消失和梯度爆炸问题的 RNN 变体称为门控循环单元（GRU）。下一节将详细讨论这种架构。


    ## 门控循环单元


    与 LSTM 类似，门控循环单元也通过门来运作，这有助于它们克服 RNN 面临的问题。图 5-20 展示了一个 GRU 细胞的简单结构。


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig20_HTML.jpg](img/479940_1_En_5_Fig20_HTML.jpg)


    图 5-20 单个 GRU 细胞（LSTM 门控。Chung, Junyoung 等人。“基于门控的循环神经网络在序列建模上的实证评估。”(2014)）


    与 LSTM 相比，GRU 只有两个门。这些门是：


    - 重置门

    - 更新门


    与 LSTM 一样，这些门也决定哪些信息需要被传递到输出。接下来的几节将介绍 GRU 细胞中每个门的操作。

    '
- fmt: '### Update Gate


    This gate gives an output range of 0 to 1. This gate helps the model decide how
    much of the past information to pass to the future. If the model wants to, it
    can decide to copy all the information present in the previous time steps and
    hence eliminate the risk of a vanishing gradient descent. Here are the mathematical
    operations that are performed at this gate:


    ![$$ {z}_t=\sigma \left({W}^{(z)}{x}_t+{U}^{(z)}{h}_{t-1}\right) $$](images/479940_1_En_5_Chapter/479940_1_En_5_Chapter_TeX_Equp.png)


    Figure [5-21](#479940_1_En_5_Chapter.xhtml#Fig21) shows the operations of the
    update gate.


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig21_HTML.jpg](images/479940_1_En_5_Chapter/479940_1_En_5_Fig21_HTML.jpg)


    Figure 5-21


    Update gate


    ### Reset Gate


    The reset gate has exactly the same structure as the update gate, which is shown
    in Figure [5-21](#479940_1_En_5_Chapter.xhtml#Fig21). This gate tells the model
    about the information that needs to be forgotten from the past. This operation
    is performed by the following mathematical equation:


    ![$$ {r}_t=\sigma \left({W}^{(r)}{x}_t+{U}^{(r)}{h}_{t-1}\right) $$](images/479940_1_En_5_Chapter/479940_1_En_5_Chapter_TeX_Equq.png)


    Figure [5-22](#479940_1_En_5_Chapter.xhtml#Fig22) shows the operations of the
    reset gate.


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig22_HTML.jpg](images/479940_1_En_5_Chapter/479940_1_En_5_Fig22_HTML.jpg)


    Figure 5-22


    Reset gate


    In a GRU cell, the reset gate is used to forget the past information. All the
    relevant information is stored in memory using the following equation (see Figure
    [5-23](#479940_1_En_5_Chapter.xhtml#Fig23)).


    ![$$ {h}_t^{\prime }=\mathit{\tanh}\left(W{x}_t+{r}_t\odot U{h}_{t-1}\right) $$](images/479940_1_En_5_Chapter/479940_1_En_5_Chapter_TeX_Equr.png)


    ![../images/479940_1_En_5_Chapter/479940_1_En_5_Fig23_HTML.jpg](images/479940_1_En_5_Chapter/479940_1_En_5_Fig23_HTML.jpg)


    Figure 5-23


    Forgetting the information


    The update gate is applied to the output to determine the information that needs
    to be collected from the current memory. This can be achieved using the following
    mathematical equation:


    ![$$ {h}_t={z}_t\odot {h}_{t-1}+\left(1-{z}_t\right)\odot {h}_t^{\prime } $$](images/479940_1_En_5_Chapter/479940_1_En_5_Chapter_TeX_Equs.png)


    This is the final output that is passed to the next GRU cell. Here’s the application
    of GRU in Python.


    ```python

    import pandas as pd

    import numpy as np

    import matplotlib.pyplot as plt

    from keras.models import Sequential

    from keras.layers import Dense, GRU

    #Generating Random Data

    t=np.arange(0,1000)

    x=np.sin(0.02∗t)+2∗np.random.rand(1000)

    df = pd.DataFrame(x)

    df.head()

    #Splitting into Train and Test set

    values=df.values

    train, test = values[0:800,:], values[800:1000,:]

    # convert dataset into matrix

    def convertToMatrix(data, step=4):

    X, Y =[], []

    for i in range(len(data)-step):

    d=i+step

    X.append(data[i:d,])

    Y.append(data[d,])

    return np.array(X), np.array(Y)

    trainX,trainY =convertToMatrix(train,6)

    testX,testY =convertToMatrix(test,6)

    trainX = np.reshape(trainX, (trainX.shape[0], 1, trainX.shape[1]))

    testX = np.reshape(testX, (testX.shape[0], 1, testX.shape[1]))

    #Making the GRU Structure

    model = Sequential()

    model.add(GRU(units=4, input_shape=(1,6), activation="relu"))

    model.add(Dense(8, activation="relu"))

    model.add(Dense(1))

    #Compiling the Code

    model.compile(loss=''mean_squared_error'', optimizer="rmsprop")

    model.summary()

    #Training the Model

    model.fit(trainX,trainY, epochs=10, batch_size=500, verbose=1)

    #Predicting with the Model

    trainPredict = model.predict(trainX)

    testPredict= model.predict(testX)

    predicted=np.concatenate((trainPredict,testPredict),axis=0)

