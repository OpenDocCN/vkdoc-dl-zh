- fmt: '# Introduction to Membership Functions


    In the previous section, you learned that instead of having crisp values of 0
    and 1, each element can be mapped to a value between 0 and 1. Each value is called
    the *degree* of membership and is represented by a curve, which depicts a function
    called a *membership function.* The value is called the *membership value.* In
    Figure [1-9](#479940_1_En_1_Chapter.xhtml#Fig9), you can see the difference between
    crisp and Fuzzy Sets.


    ![../images/479940_1_En_1_Chapter/479940_1_En_1_Fig9_HTML.jpg](images/479940_1_En_1_Chapter/479940_1_En_1_Fig9_HTML.jpg)


    Figure 1-9


    Difference between Fuzzy and crisp set representations


    In a crisp set, you only have two values, represented by 0 and 1, but in a Fuzzy
    Set, there is a range of values, based on the pressure at which the breaks are
    applied. The curve representing the range is the membership function curve. With
    a different pressure, a different membership value will be present, and that can
    be represented in the membership function curve.


    Let’s look at the membership function and its related concepts in a little more
    depth.


    A Fuzzy Set is an extension and gross oversimplification of a classical set. If
    `X` is the Universe of Discourse and its elements are denoted by `x`, then a Fuzzy
    Set `A` in `X` is defined as a set of ordered pairs.


    ![$$ A=\left\{x,\upmu A(x)\;\left|x\;\varepsilon\;X\right.\right\} $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equao.png)


    `μ[A](x)` is called the membership function of `x` in `A`. The membership function
    maps each element of `X` to a membership value between 0 and 1. There are different
    types of membership functions, which are covered in detail in the next chapter.
    For now, let’s list some of them and look at the curves that they represent. This
    example uses the Scikit Fuzzy package, which has multiple methods and classes,
    so that you can apply the basic Fuzzy Operations effectively. You can use the
    following line to install the Scikit Fuzzy package in the Python environment:


    ![$$ \boldsymbol{pip}\ \boldsymbol{install}\ \boldsymbol{scikit}-\boldsymbol{fuzzy}
    $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equap.png)


    Figures [1-10](#479940_1_En_1_Chapter.xhtml#Fig10) through [1-14](#479940_1_En_1_Chapter.xhtml#Fig14)
    show the different types of membership functions and the curves that they represent.


    ![../images/479940_1_En_1_Chapter/479940_1_En_1_Fig10_HTML.jpg](images/479940_1_En_1_Chapter/479940_1_En_1_Fig10_HTML.jpg)


    Figure 1-10


    Triangular membership function


    The graph in Figure [1-10](#479940_1_En_1_Chapter.xhtml#Fig10) represents a triangular
    membership function, and you can use the `trimf` method from the `skfuzzy` package
    to find and plot the points.


    Here is the sample code. The next chapter discusses this function in detail.


    The following code takes an example where a person goes into a restaurant and
    tips a waiter. For tipping purposes, the quality of service is rated from 0 to
    10. This example looks only at the service quality for now, but later it will
    discuss the actual tipping problem.


    ```

    import numpy as np

    import skfuzzy as sk

    #Defining the Numpy array for Tip Quality

    x_qual = np.arange(0, 11, 1)

    #Defining the Numpy array for Triangular membership functions

    qual_lo = sk.trimf(x_qual, [0, 0, 5])

    ```


    The graph in Figure [1-11](#479940_1_En_1_Chapter.xhtml#Fig11) represents a trapezoidal
    membership function, and you can use the `trapmf` method from the `skfuzzy` package
    to find and plot the points.


    ![../images/479940_1_En_1_Chapter/479940_1_En_1_Fig11_HTML.jpg](images/479940_1_En_1_Chapter/479940_1_En_1_Fig11_HTML.jpg)


    Figure 1-11


    Trapezoidal membership function


    Here is the sample code.


    ```

    import numpy as np

    import skfuzzy as sk

    #Defining the Numpy array for Tip Quality

    x_qual = np.arange(0, 11, 1)

    #Defining the Numpy array for Trapezoidal membership functions

    qual_lo = sk.trapmf(x_qual, [0, 0, 5,5])

    ```


    The graph in Figure [1-12](#479940_1_En_1_Chapter.xhtml#Fig12) represents a Gaussian
    membership function, and you can use the `gaussmf` method from the `skfuzzy` package
    to find and plot the points.


    ![../images/479940_1_En_1_Chapter/479940_1_En_1_Fig12_HTML.jpg](images/479940_1_En_1_Chapter/479940_1_En_1_Fig12_HTML.jpg)


    Figure 1-12


    Gaussian membership function


    Here is the sample code.


    ```

    import numpy as np

    import skfuzzy as sk

    #Defining the Numpy array for Tip Quality

    x_qual = np.arange(0, 11, 1)

    #Defining the Numpy array for Gaussian membership functions

    qual_lo = sk.gaussmf(x_qual, np.mean(x_qual), np.std(x_qual))

    ```


    The graph in Figure [1-13](#479940_1_En_1_Chapter.xhtml#Fig13) represents a generalized
    bell membership function, and you can use the `gbellmf` method from the `skfuzzy`
    package to find and plot the points.


    ![../images/479940_1_En_1_Chapter/479940_1_En_1_Fig13_HTML.jpg](images/479940_1_En_1_Chapter/479940_1_En_1_Fig13_HTML.jpg)


    Figure 1-13


    Generalized bell membership function


    Here is the sample code.


    ```

    import numpy as np

    import skfuzzy as sk

    #Defining the Numpy array for Tip Quality

    x_qual = np.arange(0, 11, 1)

    #Defining the Numpy array for Generalized Bell membership functions

    qual_lo = sk.gbellmf(x_qual, 0.5, 0.5, 0.5)

    ```


    The graph in Figure [1-14](#479940_1_En_1_Chapter.xhtml#Fig14) represents a sigmoidal
    membership function, and you can use the `sigmf` method from the `skfuzzy` package
    to find and plot the points.


    ![../images/479940_1_En_1_Chapter/479940_1_En_1_Fig14_HTML.jpg](images/479940_1_En_1_Chapter/479940_1_En_1_Fig14_HTML.jpg)


    Figure 1-14


    Sigmoidal membership function


    Here is the sample code.


    ```

    import numpy as np

    import skfuzzy as sk

    #Defining the Numpy array for Tip Quality

    x_qual = np.arange(0, 11, 1)

    #Defining the Numpy array for Sigmoid membership functions

    qual_lo = sk.sigmf(x_qual, 0.5,0.5)

    ```


    Later chapters cover all these functions in greater detail.


    ## Fuzzy Set Operations


    Now that you have learned about the concept of membership functions, it’s time
    to look at some of the operations that can be done with Fuzzy Sets. This section
    discusses the following operations:


    *   Union

    *   Intersection

    *   Complement

    *   Product

    *   Equality

    *   Power

    *   Difference

    *   Disjunctive sum


    Suppose there are two Fuzzy Sets, `A` and `B`, having a membership value as `μ[A](x)`
    and `μ[B](x)`, where `X` is the Universe of Discourse. Based on this information,
    the following sections consider each operation in detail.


    ### Union


    The union of two Fuzzy Sets `A` and `B` is a new Fuzzy Set, `A ∪ B`, also on `X`
    with a membership function defined as follows:


    ![$$ {\mu}_{\left(A\cup B\right)}=\mathit{\max}\left({\mu}_A(x),{\mu}_B(x)\right)={\mu}_A(x)\wedge
    {\mu}_B(x) $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equaq.png)


    `∧` is called the *maximum operator*.


    Here is the Python implementation:


    ```

    import skfuzzy as sk

    import numpy as np

    #Defining the Numpy array for Tip Quality

    x_qual = np.arange(0, 11, 1)

    #Defining the Numpy array for two membership functions (Triangular)

    qual_lo = sk.trimf(x_qual, [0, 0, 5])

    qual_md = sk.trimf(x_qual, [0, 5, 10])

    #Finding the Maximum (Fuzzy Or)

    sk.fuzzy_or(x_qual,qual_lo,x_qual,qual_hi)

    ```


    ### Intersection


    An intersection of Fuzzy Sets `A` and `B` is a new Fuzzy Set, `A ∩ B`, also on
    `X` whose membership function is defined by:


    ![$$ {\mu}_{\left(A\cap B\right)}=\mathit{\min}\left({\mu}_A(x),{\mu}_B(x)\right)={\mu}_A(x)\vee
    {\mu}_B(x) $$](images/479940_1_En_1_Chapter/479940_1_En_1_Chapter_TeX_Equar.png)


    `∨` is called the minimum operator.


    Here is the Python implementation:


    ```

    import skfuzzy as sk

    import numpy as np

    #Defining the Numpy array for Tip Quality

    x_qual = np.arange(0, 11, 1)

    #Defining the Numpy array for two membership functions (Triangular)

    qual_lo = sk.trimf(x_qual, [0, 0, 5])

    qual_md = sk.trimf(x_qual, [0, 5, 10])

    #Finding the Minimum (Fuzzy AND)

    sk.fuzzy_and(x_qual,qual_lo,x_qual,qual_hi)

