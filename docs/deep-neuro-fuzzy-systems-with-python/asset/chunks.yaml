    # 遗传算法


    *遗传算法*是一类遵循生物自然选择及其遗传学过程的搜索算法。自然选择的一般原理指出，最适应的个体（通过生存）被选中以产生下一代的子代。


    当你定义一个搜索问题时，首先要确定几个用于做出搜索决策的变量。这些变量被称为*决策变量*。第一步涉及找到这些变量，然后将它们编码为有限长度的字母字符串。


    一旦你将这些变量表示为编码字符串的格式，它们就被称为*染色体*。字符串中的单个字母被称为*基因*，而它们存储的值被称为*等位基因*。例如，假设一个人想从一个地方去另一个地方。他可以走的不同路线就是决策变量。他可以用字符串对它们进行编码，然后这些路线可能被称为*染色体*。沿途的各个城市可能被称为*基因*。


    一旦你需要找出不同类型的解，你可以将它们表示为一个集合。这个集合被称为*候选解*集。它是不同染色体的集合。当你拥有所有这些解后，下一步是决定哪些是最好的，哪些应该避免。遗传算法使用不同的数学模型和计算机模拟来区分好的和坏的染色体。


    在一个候选解集中存在一个理想的染色体数量。如果数量太少，你会得到一个不合格的解。但如果数量太多，可能会导致不必要的计算。图 7-6 展示了基于遗传算法的搜索过程的流程图。


    ![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig6_HTML.jpg](img/479940_1_En_7_Fig6_HTML.jpg)


    图 7-6


    遗传算法步骤


    *初始化*步骤涉及随机生成一个候选解集。在第二步，*评估*中，你尝试为每个染色体找到一个适应度值，然后将其分配给确定的值。接下来的四个步骤用于使用不同方法在候选解集中生成更多染色体。当你选择具有高适应度值的染色体并复制它们时，这就是*选择*步骤。当你组合多个染色体以获得更好的染色体时，这个步骤被称为*重组*。当你尝试修改当前候选解的属性时，这被称为*变异*。最后，当新解替换旧解时，这被称为*替换*。你将重复这个过程，直到达到特定的阈值。


    ## 选择


    选择中最著名的方法之一是*锦标赛方法*。一旦你有了一个候选解集，你从中选择`k`个成员，并在它们之间进行一场锦标赛。锦标赛后最适应的成员被认为是被选中的。这个过程会重复多次以获得最佳成员。个体参与锦标赛的机会被称为*选择压力*。锦标赛方法的完整算法如图
    7-7 所示，并可通过以下几点总结：


    ![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig7_HTML.jpg](img/479940_1_En_7_Fig7_HTML.jpg)


    图 7-7


    锦标赛选择


    1. 从种群中选择`k`个个体，并在它们之间进行一场锦标赛。

    2. 从这`k`个个体中选择最佳个体。

    3. 重复步骤 1 和 2，直到获得所需的种群规模。


    ## 重组


    在重组中，你使用*交叉方法*来找到最适应的成员。使用*单点交叉*方法（见图 7-8），你首先选择两个染色体。你随机选择两个染色体中的任意一点，然后交换该点之后的基因。*两点交叉*（见图
    7-9）涉及随机选择两个染色体中的两个点。随后交换这两个点之间的部分。


    ![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig9_HTML.jpg](img/479940_1_En_7_Fig9_HTML.jpg)


    图 7-9


    两点交叉


    ![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig8_HTML.jpg](img/479940_1_En_7_Fig8_HTML.jpg)


    图 7-8


    单点交叉


    除了这两种方法，还有均匀交叉和算术交叉。在均匀交叉中，两个父代之间的组合是随机的。这意味着任何特征都可以随机地从任一父代中选择。在算术交叉中，可以对两个父代应用任何数学运算来产生子代。图
    7-10 和 7-11 展示了具有二元运算的均匀交叉和算术交叉。


    ![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig11_HTML.jpg](img/479940_1_En_7_Fig11_HTML.jpg)


    图 7-11


    算术交叉


    ![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig10_HTML.jpg](img/479940_1_En_7_Fig10_HTML.jpg)


    图 7-10


    均匀交叉


    ## 变异


    如前所述，在变异中，你尝试改变染色体的属性以检查它们是否变得更适应。在*翻转*（*位翻转变异*）方法中，基因被改变为其相反值。如果一个染色体包含 0 和 1，那么
    0 被翻转为 1，反之亦然。第二种方法是*互换*（*交换变异*），你在一个染色体中选择任意两个点，然后交换这些位置上的基因。在*反转*（*倒位变异*）中，你选择一个随机点，该点之后的基因被反转，就像翻转方法一样。如果从整个染色体中，选择一个基因子集然后随机打乱，这被称为*混洗变异*。图
    7-12 到 7-15 说明了这些变异的概念。


    ![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig15_HTML.jpg](img/479940_1_En_7_Fig15_HTML.jpg)


    图 7-15


    混洗变异


    ![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig14_HTML.jpg](img/479940_1_En_7_Fig14_HTML.jpg)


    图 7-14


    倒位变异


    ![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig13_HTML.jpg](img/479940_1_En_7_Fig13_HTML.jpg)


    图 7-13


    交换变异


    ![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig12_HTML.jpg](img/479940_1_En_7_Fig12_HTML.jpg)


    图 7-12


    位翻转变异


    ## 替换


    如果子代更适应，你随机选择种群中两个较不适应的父代，并用子代替换它们。这被称为*随机替换*。这可以细分为*弱父代替换*和*双亲替换*。在弱父代替换中，只替换较弱的父代，而在后一种方法中，两个父代都被替换。


    ## 停止


    最后，当涉及到停止遗传算法时，你可以使用几种方法。当生成的子代数量超过阈值时，你可以停止该过程。你也可以基于经过的时间阈值来停止。最退化的过程是基于适应度值停止。这意味着只有当子代的适应度没有发生任何重大变化时，算法才会停止。


    现在你已经学习了讨论高级模糊架构所需的基础知识，让我们继续本章，讨论第一个架构——模糊自适应学习控制网络（FALCON）。

    '
- fmt: '# Fuzzy Adaptive Learning Control Network (FALCON)


    You learned about Adaptive Neuro-Fuzzy Inference Systems in the previous chapter.
    It takes advantage of neural networks to predict the Fuzzy Output based on the
    Fuzzy Inputs. `FALCON` uses the power of genetic algorithms and Fuzzy Clustering
    to learn the patterns from the input and then predict the output.


    To construct a `FALCON` network automatically, you use a hybrid algorithm, and
    it’s called `FALCON-GA` (FALCON Genetic Algorithm). To construct the network,
    `FALCON-GA` requires the following steps:


    - Fuzzy Clustering

    - Genetic algorithm

    - Backpropagation


    This section uses the Fuzzy Clustering approach to find the clusters in the input
    and output spaces using the training data. Then it uses genetic algorithms to
    find the Fuzzy Rules by looking at the association between the input and the output
    clusters found in the first step. Finally, the backpropagation method will fine-tune
    the membership functions of the input and output variables. Figure [7-16](#479940_1_En_7_Chapter.xhtml#Fig16)
    shows a `FALCON` network generated using `FALCON-GA`.


    Figure [7-16](#479940_1_En_7_Chapter.xhtml#Fig16) shows a proposed `FALCON` in
    the paper by Cheng-Jian Lin and Chin-Teng Lin (1997). This architecture consists
    of five layers. Layer 1 is the input layer. Layer 2 defines the membership functions
    of the input nodes from the previous layer. Layer 3 consists of a Fuzzy Rulebase
    derived from the first two layers. Layer 4 helps in deriving the consequents of
    the Fuzzy Rules.


    ![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig16_HTML.jpg](images/479940_1_En_7_Chapter/479940_1_En_7_Fig16_HTML.jpg)


    Figure 7-16


    Proposed `FALCON` (Cheng-Jian Lin, & Chin-Teng Lin. (1997), an ART-based fuzzy
    adaptive learning control network. IEEE Transactions on Fuzzy Systems, 5(4), 477–496.
    doi:10.1109/91.649900)


    Finally, in Layer 5, you get the output, which is then compared to the desired
    output, and fed back in.


    # Neuro-Fuzzy Systems for Classification of Data (NEFCLASS)


    `NEFCLASS` is a special class of Fuzzy Perceptron. It has a total of three layers.
    In between each layer is where weight transfer happens. These weights are Fuzzy
    Sets, while in the hidden layers, each node represents a Fuzzy Rule. The output
    layer explains the patterns of classes.


    The model is trained on the input data to find a rule that segregates similar
    patterns into several classes. Hence, `NEFCLASS` is a supervised learning approach,
    where the error is minimized using backpropagation.


    The `NEFCLASS` rulebase follows this structure:


    ![$$ If\ {x}_1\ is\ {\mu}_1\ and\ {x}_2\ is\ {\mu}_2\dots and\ {x}_n\ is\ {\mu}_n
    $$](images/479940_1_En_7_Chapter/479940_1_En_7_Chapter_TeX_Equo.png)


    ![$$ then\ \left({x}_1,{x}_2,\dots {x}_n\right)\ belongs\ to\ Class\ i $$](images/479940_1_En_7_Chapter/479940_1_En_7_Chapter_TeX_Equp.png)


    `NEFCLASS` can be used to learn the structure of these rules from the training
    data and then learn the shape of their membership functions. For each input `x[i]`,
    there can be `q[i]` Fuzzy Sets and `k` rules. The output of the `NEFCLASS` can
    be represented by:


    ![$$ \varphi (x)=\left\{{c}_1,{c}_2,\dots, {c}_n\right\} $$](images/479940_1_En_7_Chapter/479940_1_En_7_Chapter_TeX_Equq.png)


    Figure [7-17](#479940_1_En_7_Chapter.xhtml#Fig17) provides an example `NEFCLASS`
    structure. It divides two inputs into two output classes with the help of five
    Fuzzy Rules.


    ![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig17_HTML.jpg](images/479940_1_En_7_Chapter/479940_1_En_7_Fig17_HTML.jpg)


    Figure 7-17


    An example `NEFCLASS` structure


    # Fuzzy Inference Software (FINEST)


    The `FINEST` tool is used to build a Fuzzy Knowledge-based system, developed by
    the Laboratory of International Fuzzy Engineering (LIFE). `FINEST` consists of
    a small processing component called a `unit` (see Figure [7-18](#479940_1_En_7_Chapter.xhtml#Fig18)).
    Units are used to represent knowledge. Their main task is to take the input, process
    it in a specific way, and produce some output. The following is a list of units
    in `FINEST`, based on usage:


    ![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig18_HTML.jpg](images/479940_1_En_7_Chapter/479940_1_En_7_Fig18_HTML.jpg)


    Figure 7-18


    View of a `unit`


    - Rule units

    - Function units

    - External units

    - Memory units

    - Composite units


    ## Rule Unit


    Rule units contain one or more Fuzzy Rules. They are used for the inference of
    the input data. The result is output through the rule unit’s output inference.


    ## Function Unit


    This unit uses `LISP` for processing. It takes input data, evaluates it, and then
    outputs the evaluated value. It has some configurable parameters for the task
    of fine-tuning. The major use of a functional unit is for the defuzzification
    process.


    ## External Unit


    This unit is an executable `UNIX` file. It is an inconfigurable component. The
    computations that are done are in the form of a `UNIX` process.


    ## Memory Unit


    This unit is used to store the status of a system. It is used to store the intermediate
    results as well. Different units talk with this unit and extract the values.


    ## Composite Unit


    When multiple units are combined, they are called a `composite unit` (see Figure
    [7-19](#479940_1_En_7_Chapter.xhtml#Fig19)). They are used to build a complete
    hierarchical system.


    ![../images/479940_1_En_7_Chapter/479940_1_En_7_Fig19_HTML.jpg](images/479940_1_En_7_Chapter/479940_1_En_7_Fig19_HTML.jpg)


    Figure 7-19


    Structure of a `composite unit` (Tano, S., Miyoshi, T., Kato, Y., Oyama, T., Arnould,
    T., Bastian, A., & Umano, M. (n.d.). Fuzzy inference software-FINEST: overview
    and application examples, doi:10.1109/fuzzy.1995.409810)


    Some of the problems that `FINEST` can solve are these:


    - Sometimes rules may represent vague meanings.

    - Finding the best and suitable implication operator is difficult.

    - It is difficult to combine the inference results of different processes.

    - It’s difficult to do tuning automatically.


    `FINEST` can be used to develop Fuzzy Systems or it can be used to quantify the
    fuzzy meaning of sentences.


    # Summary


    This chapter looked at some of the advanced applications of Fuzzy Neural Networks.
    It discussed some of the current work happening in the research domain. It also
    looked at genetic algorithms, which are combined with Fuzzy Neural Networks to
    make some very good models. The chapter also looked at some of the applications
    of the algorithms in Python.


    ## Index


    ### A


    Adaptive Neuro-Fuzzy Inference System (ANFIS) Sugeno FIS aggregation antecedent
    architecture of consequent defuzzification membership functions normalization
    rules Tsukamoto FIS Adaptive Resonance Theory (ART) applications of architecture
    attention classification problems F [1] and F [2] (attentional layer) orientation
    output layer Python implementation vigilance threshold Akaike information criteria
    (AIC) Approximate reasoning SeeReasoning Artificial neural networks (ANNs) activation
    functions leaky ReLU ReLU functions sigmoid softmax function Tanh backpropagation
    computational graph of concepts of cost function forward propagation gradient
    descent process hidden layers input layer layers LSTM multi-layer architecture
    convolutional neural networks recurrent neural networks output layer perceptron
    weights and bias Auto-associative memory


    ### B


    Bayesian information criteria (BIC)'
