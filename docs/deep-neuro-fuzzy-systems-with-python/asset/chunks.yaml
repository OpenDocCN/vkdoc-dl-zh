    parts, as depicted in Figure [5-3](#479940_1_En_5_Chapter.xhtml#Fig3):


    *   Input layer


    *   Weights and bias parameters


    *   Summation of weighted inputs


    *   Applying activation/step function on the weighted sum to get the output


    So, in a perceptron, all the inputs are multiplied with the learned weights (*w)*.
