  trans: '

    ### 通道


    计算机视觉中最基本且最核心的概念之一就是`通道`。想象一下用多种乐器演奏音乐的场景：我们听到的是所有乐器合奏的声音，这本质上构成了立体声（见图 1-7）。如果我们将音乐分解成单个组成部分，就可以将声波拆解为来自电吉他、原声吉他、钢琴和人声的独立声音。将音乐分解后，我们可以调节每个组成部分以获得理想的音乐效果。如果我们掌握了所有的音乐调制方法，就可以创造出无数种组合。


    ![](img/520381_1_En_1_Fig12_HTML.jpg)


    一张计算机视觉通道的示例素描照片。它就像一幅抽象壁画。可以观察到这幅素描由铅笔线条和阴影构成。


    **图 1-8d** 单通道表示的示例素描


    ![](img/520381_1_En_1_Fig11_HTML.png)


    一个 4 列 4 行的表格。从第 1 行从左到右，数值分别为 2、36、40 和 200。第 2 行为 195、190、20 和 180。第 3 行为 40、54、200
    和 200。第 4 行为 30、40、200 和 180。该表格展示了与素描对应的代表性像素值。


    **图 1-8c** 与素描对应的代表性像素值


    ![](img/520381_1_En_1_Fig10_HTML.png)


    一张没有任何内容的空白方块图像。这张图片展示了一个示例白页。


    **图 1-8b** 示例白页


    ![](img/520381_1_En_1_Fig9_HTML.png)


    一个 4 列 4 行的表格。所有列和行都由尺寸相同的方形单元格组成。每个单元格内都写有数字 255。该表格表示与白色图片对应的像素值。


    **图 1-8a** 与白色图片对应的像素值


    ![](img/520381_1_En_1_Fig8_HTML.jpg)


    一张 3 个人坐着的照片。两侧的两个人各拿着一把吉他，中间的人正在弹奏键盘。这张图片描绘了演奏中的音乐家。


    **图 1-7** 演奏中的音乐家


    计算机视觉中最基本且最核心的概念之一就是`通道`。


    我们可以将这些概念推广到图像上，图像可以被分解为颜色的组成部分。像素是颜色的最小容器。如果我们放大任何数字图像，就会看到构成图像的小方块（像素）。任何像素在通道强度方面的一般范围是
    0-255，这也是由八位定义的范围。以图 1-8b 为例。我们有一张白页。如果将该页面转换为数组，就会得到一个全部为 255 像素的矩阵，如图 1-8a 所示。另一方面，图
    1-8d 在转换为矩阵时，也只有一个通道，其强度由 0-255 范围内的数字定义，如图 1-8c 所示。数值越接近 0 表示黑色，越接近 255 表示白色。


    让我们考虑一张彩色图像。我们可以将任何全彩图像分解为三种主要成分（通道）的组合——红色、绿色和蓝色。我们可以将任何彩色图像分解为红色、绿色和蓝色的某种确定组合。因此，RGB（红、绿、蓝）就成为了彩色图像的通道。


    ![](img/520381_1_En_1_Fig13_HTML.png)


    一张模糊的冒烟饮料和咖啡机的拼图图像，从图中伸出一个水平箭头，指向三个垂直排列的矩形，分别位于左侧、中间和右侧，每个矩形具有不同的色调。


    **图 1-9** 示例图像对应蓝色（左）=0、绿色（中）=1、红色（右）=2


    图 1-9 中的图像可以拆分为 RGB，第一个通道是蓝色，然后是绿色，最后是红色。图像中的每个像素都可以是 RGB 的某种组合。


    我们并不局限于使用 RGB 作为颜色通道。还有 HSV（色调、饱和度、明度）、LAB 格式和 CMYK（青色、品红、黄色、黑色），这些都是图像通道的几种表示形式。颜色是一种特征，其容器就是通道，因此每幅图像都由边缘和渐变构成。仅凭边缘和渐变，我们就可以创造出世界上任何图像。如果你放大一个小圆圈，它看起来应该像是多个边缘和直线的组合。


    总而言之，通道可以被视为特征的容器。特征可以是图像中最小的个体特性。颜色通道是通道的一个具体例子。由于边缘可以是特征，那么仅处理边缘的通道也可以是一个通道。值得思考的是——如果你要创建一个识别猫或狗的模型，动物的颜色对模型行为的影响是否与边缘和渐变一样大？

    '
- fmt: '### Convolutional Neural Networks


    You now know that images have features, and those features need to be extracted
    for a better understanding of the data. If we consider a matrix of pixels, the
    pixels are related in all four directions. How do you do the extraction efficiently?
    Will the traditional methods of machine learning or deep learning help? Let’s
    go through some problems:


    1.  Images can have huge dimensions. For example, a 2MP image, if it is allowed
    to capture a 1600x1200 image, will have 1.9 million pixels per image.

    2.  If we are capturing the data via the images, the data is not always centrally
    aligned. For example, a cat can be in one corner of one image, and on the next
    image, it can be in the center. The model should be able to capture the spatial
    changes in the information.

    3.  A cat in an image can be rotated along the vertical dimension or the horizontal
    dimension and still it remains a cat. Thus, we need a robust solution to capture
    such differences.


    We need major upgrades from our regular tabular data approach. If we can break
    down a problem into smaller manageable pieces, anything can be solved. Herein,
    we use *convolutional neural networks.* We try to break the image into several
    feature maps via kernels and use those in sequence to build a model that can then
    be used for any downstream or pretext task.


    Kernels are feature extractors. Features can be edges, gradients, patterns, or
    any of the small features discussed earlier in this chapter. A square matrix is
    generally used to operate a convolution task in the image on the first step and
    on feature maps from the second step. The convolution tasks performed by the kernels
    can be thought of as the simplest tasks in a dot product. See Figures [1-10a](#520381_1_En_1_Chapter.xhtml#Fig14)
    and [1-10b](#520381_1_En_1_Chapter.xhtml#Fig15).


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig15_HTML.png)


    A table that has 3 columns and 3 rows. Row 1 has 0, 1, 0\. Row 2 has 0, 1, 0\.
    Row 3 has 0, 1, 0\. The numbers are present in the bottom right corner of each
    cell. It depicts the 3 by 3 kernel in a convolutional neural network.


    **Figure 1-10b** 3x3 kernel


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig14_HTML.png)


    A table that has 3 columns and 3 rows. Row 1 has 2, 3, and 4\. Row 2 has 2, 3,
    and 2\. Row 3 has 3, 4, and 1\. The numbers are present in the bottom right corner
    of each cell. It depicts the 3 by 3 matrix of feature maps.


    **Figure 1-10a** 3x3 matrix of feature maps


    Figure [1-10a](#520381_1_En_1_Chapter.xhtml#Fig14) is the image or feature map
    and Figure [1-10b](#520381_1_En_1_Chapter.xhtml#Fig15) is the kernel. The kernel
    is the feature extractor, so it will do a dot product on the feature map, resulting
    in the value 10. This is the first step of our convolution. The images or feature
    maps are going to be large and so the kernel might not operate on just a 3x3 matrix,
    but it will take a stride forward to calculate the next convolution operation.
    Let’s look at an extrapolated example of this idea.


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig16_HTML.jpg)


    Table 1 has 5 columns and 5 rows. Row 1 has values 2, 3, 4, 2, and 3. Row 2 has
    2, 3, 2, 4, and 1\. Row 3 has 2, 2, 3, 3, and 3\. Row 4 has 7, 2, 1, 8, and 9\.
    Row 5 has 8, 8, 9, 6, and 5\. Table 2 has 2 columns and 2 rows. Row 1, 2, and
    3 are all 0, 1, 0\. Table 3 has 3 columns and 3 rows. Row 1 has values 8, 9, and
    9\. Row 2 has 7, 6, and 15\. Row 3 has 12, 13, and 17.


    **Figure 1-11** Feature map, kernel, and resulting output


    As shown in Figure [1-11](#520381_1_En_1_Chapter.xhtml#Fig16), a 5x5 feature map
    was convolved by a 3x3 kernel and that resulted in a 3x3 feature map. That map
    will again be convolved or converted to some features for a downstream task.


    The convolution process also contains a concept of *stride*, which is a hyperparameter
    telling the kernel how to move around on the feature maps. Given our convolutional
    neural network, we have a stride of 1. A stride greater than 1 can cause a checkerboard
    issue in the feature map, with a few pixels getting more attention than the others.
    We might want or not want this effect, based on our business requirements. A higher
    stride value can also be used to lower the feature map dimensions.


    There is an inherent problem with this convolution. The dimension keeps on shrinking
    when the convolutions happen. This can be desirable in some sense or some particular
    use cases but in a few use cases, we might want to retain the original dimensions.
    We can use the concept of padding on the image or the subsequent feature maps
    to avoid the issue of dimensionality reduction. Padding is another hyperparameter.
    We add layers around the images or feature maps.


    Figure [1-12b](#520381_1_En_1_Chapter.xhtml#Fig18) shows how the padding essentially
    increases the space as well as allows the edge pixel values to be better noticed
    by the kernels. The convolution process will go through the edge values more than
    once, thus the information is being carried forward to the next feature maps with
    more effect. In the case of edges having pixel values, the convolution from kernels
    will take that value only once, whatever the stride values are on that occasion.


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig18_HTML.png)


    A table that has 5 columns and 5 rows. Row 1 has values of 6 zeroes. Row 2 has
    0, 4, 1, 4, 0\. Row 3 has 0, 5, 1, 2, 0\. Row 4 has 0, 5, 1, 1, 0\. Row 6 has
    all zeroes. The numerical values are placed in the bottom right corner of each
    cell. This depicts a 0 padded feature map.


    **Figure 1-12b** A zero-padded feature map


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig17_HTML.png)


    A table that has 3 columns and 3 rows. Row 1 has 0, 3, and 1\. Row 2 has 0, 3,
    0\. Row 3 has 0, 4, 0\. The numbers are present in the bottom right corner of
    each cell. It depicts an edge detector.


    **Figure 1-12a** An edge detector


    It is quite interesting how simple padding can change the identification of edges
    by a kernel. If we assume there is an important edge near the corner of the feature
    map and don’t pad it, the edges won’t be detected. This is because, to detect
    a line or an edge, the kernel or the feature extractor needs to have a similar
    pattern. In the case of the kernel in Figure [1-12a](#520381_1_En_1_Chapter.xhtml#Fig17),
    which is an edge detector, it needs to find a proper gradient to detect an actual
    edge. It is because of the gradient from 0 to 4, 0 to 5, and 0 to 5, now it detects
    the edge. If the padding wasn’t there, this gradient wouldn’t be there and the
    kernel would have missed out on an important part.'
