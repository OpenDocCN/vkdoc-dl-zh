- fmt: '### Calculating Similarity and Ranking


    Now that we have vectors for each image, we can find the similarity scores between
    them and then rank them to get recommendations.


    Cosine similarity between two vectors is calculated as shown in Figure [5-12](#520381_1_En_5_Chapter.xhtml#Fig12).


    ![](images/520381_1_En_5_Chapter/520381_1_En_5_Fig12_HTML.jpg)


    `Cosine similarity = (A · B) / (||A|| * ||B||) = (Σ(A_i * B_i)) / (√(Σ(A_i^2))
    * √(Σ(B_i^2)))`


    **Figure 5-12** Formula to calculate cosine similarity


    ```

    # Calculating similarity between images ( using embedding values )

    cosine_sim = cosine_similarity(df_embs)

    # Previewing first 4 rows and 4 columns similarity just to check the structure
    of cosine_sim

    cosine_sim[:4, :4]

    #output

    array([[1.0000007 , 0.76683545, 0.5455518 , 0.779508  ],

    [0.76683545, 1.0000002 , 0.49617064, 0.88492715],

    [0.5455518 , 0.49617064, 0.9999991 , 0.52310663],

    [0.779508  , 0.88492715, 0.52310663, 1.000001  ]], dtype=float32)

    ```


    Now that we have the similarity matrix, let’s define a function that gives recommendations
    based on the cosine similarity score. We need to keep the following three things
    as inputs to the function to get the desired recommendations:


    *   Image ID

    *   Metadata dataset name

    *   Number of recommendations required


    ```

    # Storing the index values in a series index_vales for recommending

    index_vales = pd.Series(range(len(df)), index=df.index)

    index_vales

    # Defining a function that gives recommendations based on the cosine similarity
    score

    def recommend_images(ImId, df, top_n = 6):

    # Assigning index of reference into sim_ImId

    sim_ImId    = index_vales[ImId]

    # Storing cosine similarity of all other items with item requested by user in
    sml_scr as a list

    sml_scr = list(enumerate(cosine_sim[sim_ImId]))

    # Sorting the list of sml_scr

    sml_scr = sorted(sml_scr, key=lambda x: x[1], reverse=True)

    # Extracting the top n values from sml_scr

    sml_scr = sml_scr[1:top_n+1]

    # ImId_rec will return the index of similar items

    ImId_rec    = [i[0] for i in sml_scr]

    # ImId_sim will return the value of similarity score

    ImId_sim    = [i[1] for i in sml_scr]

    return index_vales.iloc[ImId_rec].index, ImId_sim

    ```


    We have created a function that takes the index of the image for which we want
    similar images, the dataframe, and an integer that determines the number of images
    to be recommended as the parameters.


    When we pass these three parameters into this function, it returns the index of
    the top *n* similar images and their similarity scores.


    ```

    # Sample given below

    recommend_images(3810, df, top_n = 5)

    #output

    (Int64Index([2400, 3899, 3678, 4818, 2354], dtype=''int64''),

    [0.9632292, 0.9571406, 0.95574236, 0.9539639, 0.95376974])

    ```


    Returning only the index value and similarity scores is not enough; therefore,
    we need to visualize the recommendations as well, by plotting the images in recommended
    indices.


    ### Visualizing the Recommendations


    We have arrived at the most interesting part of the whole chapter, the results.
    Let’s create a function to visualize these recommendations and then evaluate them.


    ```

    def Rec_viz_image(input_imageid):

    # Getting recommendations

    idx_rec, idx_sim = recommend_images(input_imageid, df, top_n = 6)

    # Printing the similarity score

    print (idx_sim)

    # Plotting the image of item requested by user

    plt.imshow(cv2.cvtColor(import_img(df.iloc[input_imageid].image), cv2.COLOR_BGR2RGB))

    # Generating a dictionary of { index, image }

    figures = {''im''+str(i): import_img(row.image) for i, row in df.loc[idx_rec].iterrows()}

    # Plotting the similar images in a figure, with 2 rows and 3 columns

    show_images(figures, 2, 3)

    ```


    The visualize function will call the `recommend_images` function and store the
    returned indices and scores. With the indices, stored images will be plotted using
    the `plot_figures` function.


    Let’s look at some examples. The first image is the image at index 3810, and what
    follows are the top six similar items.


    ```

    Rec_viz_image(3810)

    [0.9632292, 0.9571406, 0.95574236, 0.9539639, 0.95376974, 0.9536929]

    ```


    Figure [5-13](#520381_1_En_5_Chapter.xhtml#Fig13) shows the input image.


    ![](images/520381_1_En_5_Chapter/520381_1_En_5_Fig13_HTML.jpg)


    A numbered grid for vector extraction over a photograph of a man wearing a plaid
    shirt.


    **Figure 5-13** Input image


    Figure [5-14](#520381_1_En_5_Chapter.xhtml#Fig14) shows the recommendations for
    the input image. As we can see, the input image is a shirt and the recommendations
    we received are also shirts. They all have the same pattern but are different
    colors. These results are exceptional and realistic.


    ![](images/520381_1_En_5_Chapter/520381_1_En_5_Fig14_HTML.jpg)


    A set of images of men wearing different plaid shirts from search results. The
    exhibited labels are `im2400`, `im3899`, `im3678`, `im4818`, `im2354`, and `im1247`.


    **Figure 5-14** Output images


    For the next sample, we chose a tie. Figure [5-15](#520381_1_En_5_Chapter.xhtml#Fig15)
    shows the output of our function, which shows six images of the tie with similarity
    scores over 90%.


    ![](images/520381_1_En_5_Chapter/520381_1_En_5_Fig15_HTML.jpg)


    A set of photographs for an image search test using neckties. An image of a necktie
    on which a numbered grid is exhibited above six variations of neckties with the
    labels `im4817`, `im4195`, `im858`, `im4789`, `im4668`, and `im826`.


    **Figure 5-15** Sample output images


    ```

    Rec_viz_image(2518)

    [0.9506557, 0.931319, 0.928721, 0.9247011, 0.9215533, 0.917436]

    ```


    So far, we have tested on images that are already present in the dataset. Now
    we will take input images from the user and try to find items similar to their
    image.'
