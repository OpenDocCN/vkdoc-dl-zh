  raw: '#### ResNet18


    ResNet18 is a convolutional neural network (CNN). As the number suggests, it has
    18 layers. It’s being trained on millions of images that are extracted from the
    ImageNet dataset. It has the capacity to classify more than 1000 object types.
    Figure [5-6](#520381_1_En_5_Chapter.xhtml#Fig6) shows the original architecture
    from ResNet18 paper.


    ![](images/520381_1_En_5_Chapter/520381_1_En_5_Fig6_HTML.png)


    A diagram of the original architecture of Res Net 18\. An input reaches 3 by 3
    c o n v 64 which can proceed to another 3 by 3 c o n v 64 or jump farther. The
    process repeats until it reaches 3 by 3 c o n v 512, where the average pool awaits.
    The data then goes to F C and, finally, to the Softmax.


    Figure 5-6


    Original architecture of ResNet18


    Let’s start with an implementation.


    ![](images/520381_1_En_5_Chapter/520381_1_En_5_Fig7_HTML.jpg)


    An image of lines of code representing a convolution block for the model architecture.
    The code starts at Res Net and then goes to c o n v1, b n 1, r e l u, maxpool,
    Sequential layer 1 and its subdivisions 0 and 1 Basic Blocks, and Sequential layer
    2 and its subdivision 0 Basic Block.


    Figure 5-7


    Convolution block


    ```

    # Defining the input shape

    width= 224

    height= 224

    # Loading the pretrained model

    resnetmodel = models.resnet18(pretrained=True)

    # selecting the layer

    layer = resnetmodel._modules.get(''avgpool'')

    #evaluation

    resnetmodel.eval()

    ```


    Figure [5-7](#520381_1_En_5_Chapter.xhtml#Fig7) shows the architecture of the
    model. Now let’s extract the embedded vectors for the images and save them in
    an object.


    ```

    # scaling the data

    s_data = transforms.Scale((224, 224))

    # normalizing

    standardize = transforms.standardize(mean=[0.7, 0.6, 0.3],

    std=[0.2, 0.3, 0.1])

    # converting to tensor

    convert_tensor = transforms.ToTensor()

    # creating the missing image object

    missing_img = []

    #function to get embeddings

    def vector_extraction(resnetmodel, image_id):

    # exception handling to ignore missing images

    try:

    img = Image.open(image_location(image_id)).convert(''RGB'')

    t_img = Variable(standardize(convert_tensor(s_data(img))).unsqueeze(0))

    embeddings = torch.zeros(512)

    def select_d(m, i, o):

    embeddings.copy_(o.data.reshape(o.data.size(1)))

    hlayer = layer.register_forward_hlayer(select_d)

    resnetmodel(t_img)

    hlayer.remove()

    emb = embeddings

    return embeddings

    # If file not found

    except FileNotFoundError:

    # Store the index of such entries in missing_img list and drop them later

    missed_img = df[df[''image'']==image_id].index

    print(missed_img)

    missing_img.append(missed_img)

    ```


    This function will load the image, reshape it into 224*224, and convert it to
    an array, which will later go through the ResNet model. This will return an array
    of 512 values, which are the 512 feature vectors for that particular image.


    Let’s apply this function to a sample image and see the output.


    ```

    # Testing if our vector_extraction function works well on sample image

    sample_embedding_0 = vector_extraction(resnetmodel, df.iloc[0].image)

    # Plotting the sample image and its embeddings

    img_array = import_img(df.iloc[0].image)

    plt.imshow(cv2.cvtColor(img_array, cv2.COLOR_BGR2RGB))

    print(img_array.shape)

    print(sample_embedding_0)

    ```


    Figures [5-8](#520381_1_En_5_Chapter.xhtml#Fig8) and [5-9](#520381_1_En_5_Chapter.xhtml#Fig9)
    show the sample image and its vector for a random sample from the dataset.


    ![](images/520381_1_En_5_Chapter/520381_1_En_5_Fig9_HTML.jpg)


    A numbered grid for vector extraction over a photograph of a man wearing a plaid
    shirt.


