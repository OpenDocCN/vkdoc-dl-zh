    \n## Summary\n\nThe chapter discussed how image segmentation works and its variations\
    \ in the market. This is one important aspect of solving the problem that involves\
    \ image segmentation. This also established the concept of fine-tuning through\
    \ an example. Moving forward, the concepts learned here are going to be useful\
    \ in understanding the concepts of computer vision.\n\nThe next chapter looks\
    \ at how we can build pipelines to help with business problems involving image\
    \ similarity.\n\n# 5. Image-Based Search and Recommendation System\n\nIn order\
    \ to retain and acquire new customers, especially in the e-commerce arena, customer\
    \ service needs to be top-notch. There are already thousands of e-commerce platforms\
    \ and the number will only increase in the future. Platforms with excellent customer\
    \ experience will survive in long term.\n\nThe question is how do we provide great\
    \ customer service? There are many ways we can enhance the customer experience.\
    \ Making search engines state-of-the-art will not only make customers happy but\
    \ will also increase sales via cross-selling.\n\nThere are many ways to use search\
    \ engines and recommendation engines with natural language processing, deep learning,\
    \ etc. The newest edition is image processing. We can use the power of image processing,\
    \ deep learning, and pretrained models to create image-based search and recommendation\
    \ systems that produce great results.\n\n## Problem Statement\n\nWhen users are\
    \ searching e-commerce platforms, they typically search for product names and\
    \ descriptions. Suppose you are looking for a blue t-shirt. You can use a basic\
    \ search phrase to get relevant results. However, say you like a t-shirt that\
    \ you saw someone wearing at a party and it is blue with white stripes and has\
    \ a black floral print with a red collar. That’s a difficult phrase to search\
    \ for, and the results will be uninspired. This is where image-based search and\
    \ recommendation systems come in.\n\nInstead of providing instant recommendations\
    \ using the user’s product descriptions, we can give recommendations based on\
    \ an image. This will capture more details of the product than a text description,\
    \ especially in the fashion category.\n\n## Approach and Methodology\n\nTo search\
    \ images, we first need to understand how machines analyze these images. We need\
    \ to convert these images into numbers/vectors. Once we do that, it’s a matter\
    \ of time to solve this problem.\n\nImages can be represented in the form of vectors\
    \ or embedded data using pretrained models. We can the ResNet18 model from PyTorch,\
    \ which will convert images into embedded information or vectors for this project.\n\
    \n![](images/520381_1_En_5_Chapter/520381_1_En_5_Fig1_HTML.png)\n\nA diagram of\
    \ the image search process. A user inputs an image in which the system will get\
    \ the embeddings while existing images in the database have their embeddings extracted.\
    \ An algorithm looks for the similarity between the two and gives a ranking, output,\
    \ or recommendation.\n\nFigure 5-1\n\nImage similarity pipeline flowchart\n\n\
    Our aim here is to find similar images based on the input. To achieve this, we\
    \ need to do the following things, as shown in Figure [5-1](#520381_1_En_5_Chapter.xhtml#Fig1):\n\
    \n1.  **Import existing images and search image.**\n\n    The first step is to\
    \ load the images into the working environment. We will use the OpenCV functionalities\
    \ to do so.\n\n2.  **Vectorize the images.**\n\n    Once we load the images, they\
    \ are in JPG format, which Python cannot read. No tasks can be performed based\
    \ on JPG images. So, to make the images understandable and suitable for our algorithm,\
    \ we need to convert them into vectors or embeddings. To convert the images into\
    \ embeddings, we use ResNet from PyTorch.\n\n3.  **Calculate similarity scores.**\n\
    \n    With the embedding format of images, we can apply cosine similarity to the\
    \ dataset. This will return a score between 0 and 1, which determines how similar\
    \ two images are. Values closer to 1 denote the images are very similar while\
    \ values closer to 0 denote the images are not similar.\n\n4.  **Recommend.**\n\
    \n    Based on the cosine similarity matrix, we sort the similarity scores for\
    \ the index or image provided as input by the user and return the top six or top\
    \ ten similar items.\n\n## Implementation\n\nNow that we understand what the problem\
    \ is and how we can solve it, let’s jump into the implementation.\n\n### The Dataset\n\
    \nWe will be using a famous Kaggle dataset for this use case. Here’s the link\
    \ to download the dataset: [`https://www.kaggle.com/paramaggarwal/fashion-product-images-small`](https://www.kaggle.com/paramaggarwal/fashion-product-images-small)\n\
    \nThe structure of the dataset is as follows:\n\n*   A folder named `images`,\
    \ which contains all the images of items available in the dataset. The image names\
    \ are in the format `[id].jpg` where `[id]` is the item ID provided in CSV.\n\n\
    *   A CSV file called `styles.csv` has ten columns.\n\nThe ten columns from `styles.csv`\
    \ are defined as follows:\n\n*   `id`: A unique number provided to that particular\
    \ item\n\n*   `gender`: Gender (unnecessary bias, should avoid it)\n\n*   `masterCategory`:\
    \ Main category under which the item falls\n\n*   `subCategory`: Sub-category\
    \ under which the item falls\n\n*   `articleType`: Type of product\n\n*   `baseColor`:\
    \ Base color of the product\n\n*   `season`: Season it’s suitable for\n\n*   `year`:\
    \ The year that the item was uploaded\n\n*   `usage`: When can the item be used\n\
    \n*   `productDisplayName`: Display name on the web page"
