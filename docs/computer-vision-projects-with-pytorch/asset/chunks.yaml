    \n# 7. 图像异常检测\n\n机器学习的研究使我们走上了研究各种模式和行为的道路。它使我们能够构建可以研究封闭环境的模型。预测能力通常伴随着模型训练过程而来。这是我们在训练模型时需要经常思考的一个重要问题。还有另一个问题需要解答——需要多少数据才能帮助模型理解数据分布，从而获得良好的表示？本章将通过一个示例和相关概念来探讨这些重要问题。我们讨论的是计算机视觉中的异常检测。\n\
    \n我们有一个机器学习模型，它学习数据分布，并最终可用于对未知数据集进行预测。学习过程受限于我们用于训练的数据所代表的分布。训练过程结束后，少数样本可能会与大多数行为相矛盾。我们必须注意，检测异常取决于视角，例如分布需要有多宽松。例如，一块抛光钢板可能带有机器留下的成排直线。可能会有轻微的划痕，但这些可能仍不被视为缺陷（异常）。在其他场景中，这些划痕或突兀之处可能被视为异常。因此，对于所有场景，异常都需要一个阈值。\n\
    \n异常检测在图像中有很多应用，例如，在建筑工地检测金属板中的异常。异常检测可用于发现传送带上的异常情况。\n"
- fmt: "# Anomaly Detection\n\nAnomaly detection in visual analytics, like in all\
    \ other domains, can be divided into two major types:\n\n- **Novelty detection:**\
    \ During the training process, the models are subjected to data that has resulted\
    \ from a standard event distribution. When we are testing or predicting for unknown\
    \ samples, the algorithm is supposed to find anomalous data. In this process,\
    \ it is assumed the data does not have any non-standard data. This is an example\
    \ of a semi-supervised learning method.\n- **Outlier detection:** The algorithm,\
    \ in this case, is subjected to both standard and non-standard data. Since by\
    \ principle the standard data will be concentrated, the algorithm learns it and\
    \ disregards the outliers. We can take an example of a decision tree, wherein\
    \ the branch will always try to separate outliers earlier in the split process.\
    \ The data in this approach is polluted with standard and non-standard data. The\
    \ algorithm figures out which data points are inliers and which are outliers.\
    \ This is an unsupervised way of training.\n\nWe have multiple ways to detect\
    \ outliers or novelty. We can use statistical methods such as population mean\
    \ and standard deviation to find outliers. However, in those scenarios, the knowledge\
    \ of distribution is a must. In machine learning methods, we have a few algorithms\
    \ that can help us with anomaly detection.\n\n- **Local outlier factor:** The\
    \ algorithm calculates a value that quantifies the local density deviation. It\
    \ tries to locate samples that have lower density when compared to its neighbors.\n\
    - **Isolation forest:** There are ways to use iterative splitting based on decisions,\
    \ which can be used to determine outliers in samples. If we can leverage the algorithm\
    \ based on the ensemble of decision trees or random forest, we can easily conclude\
    \ that the samples that fall on shorter paths of the random forest are the anomalies.\n\
    - **One class SVM:** It can be thought to be an extension of the SVM class, wherein\
    \ upon deciding on a threshold, the support of a probability distribution can\
    \ be checked, thus separating the outliers in the process.\n\nLet's look at some\
    \ of the applications in the field of computer vision.\n\n- **Unsupervised density\
    \ estimation:** The algorithm tries to estimate the probability distribution of\
    \ the features or of the training images. Once the distribution is known by the\
    \ model, for all unknown samples it tries to determine the difference of the sample\
    \ from the distribution.\n- **Unsupervised image reconstruction:** A general process\
    \ of training an encoder-decoder architecture. It gets the network to learn the\
    \ vectorized latent features and reconstruct the original image, with some loss.\
    \ The reconstruction loss for normal images will be smaller compared to the anomalies.\n\
    - **One class anomaly detection:** This approach is similar to the one-class SVM\
    \ discussed earlier. The algorithm tries to estimate a decision boundary to separate\
    \ the normal class from the anomalies.\n\nGenerative classes of algorithms can\
    \ be used to detect anomalies and have been established by multiple researchers.\
    \ Now that we have worked out some of the basic concepts, let's look at an example\
    \ of anomaly detection.\n\nSome of the approaches include the following:\n\n-\
    \ Use a pretrained model with training on the last few layers for anomaly classification\n\
    - The encoding and decoding approach\n- Anomaly image classification and locating\
    \ the anomaly in an image using feature maps\n\n## Approach 1: Using a Pretrained\
    \ Classification Model\n\nFinding an anomaly image from a given image dataset\
    \ can be considered as a binary image classification task, i.e., whether the image\
    \ is an anomaly or not based on the training dataset. One of the proven architectures\
    \ called VGG-16 is used here to train the last few layers.\n\nThe VGG-16 architecture\
    \ contains 16 layers, 13 of which are convolution layers and the last three are\
    \ fully connected layers. This network is trained to predict the class of the\
    \ input out of a total of 1,000 classes.\n\nIn the present approach, pretrained\
    \ weights are used for the first ten convolutional layers. The last layers are\
    \ used to model-train the custom dataset. The output is classified into one of\
    \ two classes. The highlighted box in Figure [7-1](#520381_1_En_7_Chapter.xhtml#Fig1)\
    \ is used to train a custom dataset.\n\n![](images/520381_1_En_7_Chapter/520381_1_En_7_Fig1_HTML.png)\n\
    \nA diagram of the VGG-16 architecture image anomaly detection pertained classification\
    \ model VGG-16 architecture. The horizontal diagram from left to right starts\
    \ with input to convolutional layers namely: Convi 1-1, Convi 1-2, Pooling then\
    \ Convi 2-1, Convi 2-2 in a sequential order pattern. Fully-connected layers are\
    \ identified as dense.\n\n**Figure 7-1** The VGG-16 architecture\n\n### Step 1:\
    \ Import the Required Libraries\n\n```\n#import torch\nimport torch\nimport torchvision\n\
    import matplotlib.pyplot as plt\n#import time,os etc\nimport time\nimport os\n\
    import numpy as np\nimport random\nfrom distutils.version import LooseVersion\
    \ as Version\nfrom itertools import product\n```\n\n### Step 2: Create the Seed\
    \ and Deterministic Functions\n\nThese functions help generate the same random\
    \ number for all iterations.\n\n```\ndef seed_setting(sd):\n    os.environ[\"\
    PL_GLOBAL_SEED\"] = str(sd)\n    random.seed(sd)\n    np.random.seed(sd)\n   \
    \ torch.manual_seed(sd)\n    torch.cuda.manual_seed_all(sd)\n\ndef fn_det_setting():\n\
    \    #check if cuda is available\n    if torch.cuda.is_available():\n        torch.backends.cudnn.benchmark\
    \ = False\n        torch.backends.cudnn.deterministic = True\n    #check torch\
    \ version\n    if torch.__version__ <= Version(\"1.7\"):\n        torch.fn_det_setting(True)\n\
    \    else:\n        torch.use_deterministic_algorithms(True)\n```\n\n### Step\
    \ 3: Set the Hyperparameter\n\n```\n#set seed, batch size\nRNDM_SEED = 245\nbtch_input_sz\
    \ = 128\nepch_nmbr = 25\nDEVICE = torch.device('cuda:1' if torch.cuda.is_available()\
    \ else 'cpu')\nseed_setting(RNDM_SEED)\n#fn_det_setting() This may not work on\
    \ Gpu because some algorithms are not deterministic on Gpu.\n```\n\n### Step 4:\
    \ Import the Dataset\n\nHere is the training data:\n\n```\ntr_ds_path = \"/content/drive/MyDrive/car_img/tr\"\
    \ #Training Images\n```\n\nHere is the validation data:\n\n```\nvd_ds_path = \"\
    /content/drive/MyDrive/car_img/vds\" #Validation Images\n```\n\nHere is the test\
    \ data:\n\n```\nts_ds_path = \"/content/drive/MyDrive/car_img/ts\" #Test Images\n\
    ```"
  raw: '## Anomaly Detection


    Anomaly detection in visual analytics, like in all other domains, can be divided
    into two major types:


    *   **Novelty detection:** During the training process, the models are subjected
    to data that has resulted from a standard event distribution. When we are testing
    or predicting for unknown samples, the algorithm is supposed to find anomalous
    data. In this process, it is assumed the data does not have any non-standard data.
    This is an example of a semi-supervised learning method.


    *   **Outlier detection:** The algorithm, in this case, is subjected to both standard
    and non-standard data. Since by principle the standard data will be concentrated,
    the algorithm learns it and disregards the outliers. We can take an example of
    a decision tree, wherein the branch will always try to separate outliers earlier
    in the split process. The data in this approach is polluted with standard and
    non-standard data. The algorithm figures out which data points are inliers and
    which are outliers. This is an unsupervised way of training.


    We have multiple ways to detect outliers or novelty. We can use statistical methods
    such as population mean and standard deviation to find outliers. However, in those
    scenarios, the knowledge of distribution is a must. In machine learning methods,
    we have a few algorithms that can help us with anomaly detection.


    *   **Local outlier factor:** The algorithm calculates a value that quantifies
    the local density deviation. It tries to locate samples that have lower density
    when compared to its neighbors.


    *   **Isolation forest:** There are ways to use iterative splitting based on decisions,
    which can be used to determine outliers in samples. If we can leverage the algorithm
    based on the ensemble of decision trees or random forest, we can easily conclude
    that the samples that fall on shorter paths of the random forest are the anomalies.


    *   **One class SVM:** It can be thought to be an extension of the SVM class,
    wherein upon deciding on a threshold, the support of a probability distribution
    can be checked, thus separating the outliers in the process.


    Let''s look at some of the applications in the field of computer vision.


    *   **Unsupervised density estimation:** The algorithm tries to estimate the probability
    distribution of the features or of the training images. Once the distribution
    is known by the model, for all unknown samples it tries to determine the difference
    of the sample from the distribution.


    *   **Unsupervised image reconstruction:** A general process of training an encoder-decoder
    architecture. It gets the network to learn the vectorized latent features and
    reconstruct the original image, with some loss. The reconstruction loss for normal
    images will be smaller compared to the anomalies.


    *   **One class anomaly detection:** This approach is similar to the one-class
    SVM discussed earlier. The algorithm tries to estimate a decision boundary to
    separate the normal class from the anomalies.


    Generative classes of algorithms can be used to detect anomalies and have been
    established by multiple researchers. Now that we have worked out some of the basic
    concepts, let''s look at an example of anomaly detection.


    Some of the approaches include the following:


    *   Use a pretrained model with training on the last few layers for anomaly classification


    *   The encoding and decoding approach


    *   Anomaly image classification and locating the anomaly in an image using feature
    maps


    ## Approach 1: Using a Pretrained Classification Model


    Finding an anomaly image from a given image dataset can be considered as a binary
    image classification task, i.e., whether the image is an anomaly or not based
    on the training dataset. One of the proven architectures called VGG-16 is used
    here to train the last few layers.


    The VGG-16 architecture contains 16 layers, 13 of which are convolution layers
    and the last three are fully connected layers. This network is trained to predict
    the class of the input out of a total of 1,000 classes.


    In the present approach, pretrained weights are used for the first ten convolutional
    layers. The last layers are used to model-train the custom dataset. The output
    is classified into one of two classes. The highlighted box in Figure [7-1](#520381_1_En_7_Chapter.xhtml#Fig1)
    is used to train a custom dataset.


    ![](images/520381_1_En_7_Chapter/520381_1_En_7_Fig1_HTML.png)


    A diagram of the V G G -16 architecture image anomaly detection pertained classification
    model V G G -16 architecture. The horizontal diagram from left to right starts
    with input to convolutional layers namely: Convi 1-1, Convi 1-2, Pooling then
    Convi 2-1, Convi 2-2 in a sequential order pattern. Fully-connected layers are
    identified as dense.


    Figure 7-1


    The VGG-16 architecture


