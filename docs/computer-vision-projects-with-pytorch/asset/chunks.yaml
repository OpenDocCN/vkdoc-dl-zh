    \n从所用示例图像中提取的输出张量图像。图像上显示了 108 个可观察到的特征向量，上方括号内标有数字 80、60 和 3。\n\n**图 5-8**  \n\
    从图像中提取的输出张量\n\n```\n# Testing if our vector_extraction function works well on\
