    ## Summary


    We used a VGG architecture to determine anomalies in sample image datasets. We
    went through the code and developed an end-to-end pipeline. This model can be
    used on industry-grade problems with very few changes.


    Now that we understand anomaly detections, the next chapter discusses the state-of-the-art
    use case, which is "image super-resolution." We have seen many apps that improve
    image quality and resolution. Can you do that yourself by building a model in
    `PyTorch`? Let''s figure it out in the next chapter.


    # 8. Image Super-Resolution


    With the advent of high-resolution image capturing agents, the information captured
    in images is huge. Technology has moved from ultra HD to 4K and 8K resolutions.
    Movies are using high-resolution frames these days; however, there are also situations
    when they need to enhance a low-resolution image to a high-resolution one. Imagine
    a scene where the protagonist of a movie is trying to determine the license plate
    captured from a picture of a speeding car. Super-resolution can now help us zoom
    into an image to a high degree without distorting it. A few interesting advancements
    have happened in the industry and we are going to discuss those with some examples.


    The existing information in an image cannot be increased from whatever is there
    initially. In computer science, we have "garbage-in, garbage-out," and this is
    a similar concept. We cannot expect to find something that''s not already there
    in the image. So, in a way, super-resolution seems far-fetched and quite constrained
    by information theory. Even so, active research has shown that this problem can
    be solved.


    Let''s dive into the problem at hand. We have so far dealt with a supervised form
    of learning, wherein there is always a loss function associated with the ground
    truth. The model learns from defined input (`X`) and expected output (`Y`). The
    whole essence of training a model is to help map the inputs to output. But this
    doesn''t happen in unsupervised learning. The unsupervised way helps the model
    learn the pattern in the input data without mapped output. The model learns the
    patterns in the data and structures its weights around it and then identifies
    similarities and differences in the data. Unlike with supervised learning methodologies,
    there is no corrective measure for unsupervised learning. The aspect of ground
    truth is missing, but the concept of optimization still exists.


    Let''s dive into the concepts of discriminative and generative models. In a generative
    model, the joint probability of inputs and output is learned. The distribution
    of the data is learned and is often the more generalized way of training a model.
    The models are capable of generating synthetic data points in the input space.
    On the other hand, discriminative models specialize in creating a mapping function
    from the input space to the output. Examples of generative models are Linear Discriminative
    Analysis, Naïve-Bayes, and Gaussian models.


    Why are we introducing the generative models and discussing the ideologies of
    learning data distribution? Let''s look back at the logic, which can help us with
    the super-resolution.


    - Up-scaling images using the concept of nearest neighbors

    - Bilinear interpolation/bicubic interpolation

    - Fourier transforms

    - Neural networks


    We explore all these probable approaches in detail. But before this, let''s explore
    the basic techniques used to up-scale a low-res image, starting with nearest-neighbor
    scaling. Figure [8-1a](#520381_1_En_8_Chapter.xhtml#Fig1) shows a basic image
    that can be resized to a bigger image (see Figure [8-1b](#520381_1_En_8_Chapter.xhtml#Fig2)),
    but keep in mind that the information in the image remains the same. It is just
    the representation that changes.


    ![](images/520381_1_En_8_Chapter/520381_1_En_8_Fig2_HTML.png)


    An illustration of a 6 by 6 box of squares.


    **Figure 8-1b** A 3x3 image extended to 6x6


    ![](images/520381_1_En_8_Chapter/520381_1_En_8_Fig1_HTML.png)


    An illustration of a 3 by 3 box of squares.


    **Figure 8-1a** A 3x3 image


    ## Up-Scaling Using the Nearest Neighbor Concept


    Problems that demand faster resolution changes will require faster operations
    as well. We know that working with convolutional neural networks or anything close
    to neural networks is going to take a lot of computation, so it is time for some
    simple techniques. Up-scaling an image using the nearest neighbor concept is among
    the top contenders if we require a faster technique.


    Figure [8-2a](#520381_1_En_8_Chapter.xhtml#Fig3) shows a 4x4 image that needs
    to be up-scaled to an 8x8 image, shown in Figure [8-2b](#520381_1_En_8_Chapter.xhtml#Fig4).
    We initially had 16 pixels across the image and then, when it was stretched to
    64 pixels, we were left with 48 vacancies that needed to be filled in. The concept
    of nearest neighbor can be understood from a straight line unit. Consider a straight
    number line, starting at 0 and ending at 4. If we divide it into four equal parts
    or in this case pixels, each part gets 25% of the information. Now, if the same
    line is stretched to have a length of 8, the units remain the same length, but
    the weight for each unit becomes 12.5%. However, the information carried in the
    image is the same.


    ![](images/520381_1_En_8_Chapter/520381_1_En_8_Fig4_HTML.png)


    An illustration of a box with a 4 by 4 box of squares inside separated by a distance.
    The uppermost right and lowermost left regions have three squares each with two
    different shades.


    **Figure 8-2b** Sample Image getting up-scaled


    ![](images/520381_1_En_8_Chapter/520381_1_En_8_Fig3_HTML.png)


    An illustration of a 4 by 4 box of squares where each square has assigned diagonal
    shades. The uppermost right and lowermost left regions occupy three squares each
    with their respective shades.


    **Figure 8-2a** Sample image


    The same concept can be used in nearest neighbor fulfillment of the vacancies
    using the following formula:


    ![$$ {Source}_X={Target}_X\frac{Target_{width}}{Source_{width}} $$](images/520381_1_En_8_Chapter/520381_1_En_8_Chapter_TeX_Equa.png)


    ![$$ {Source}_Y={Target}_Y\frac{Target_{height}}{Source_{height}} $$](images/520381_1_En_8_Chapter/520381_1_En_8_Chapter_TeX_Equb.png)


    The formula provides us with the coordinate values for the enlarged image''s pixels.'
