    # 4. Building an Image Segmentation Model


    Images around us come in different textures, patterns, shapes, and sizes. They
    carry an enormous amount of information which can easily be understood by the
    human eye and brain, but which are less easily understood by computers. Image
    segmentation is a problem set wherein we try to train computers to understand
    images so that they can separate dissimilar objects and group similar objects.
    This can be in the form of similar pixel intensities or similar textures and shapes.


    There are a lot of algorithms that have been developed and have been used to segment
    images. Just like object detection separates objects, image segmentation identifies
    more similar objects from less similar objects. If we consider the concepts used
    in basic clustering methods such as k-means, we know how data points align themselves
    near similar data.


    For example, let’s assume there are two kinds of apples and two kinds of oranges
    placed in a bowl. If we look at the features, we can start by sorting the edible
    data points. We can separate the data points into two groups when we think about
    textures or color. When we add cost as another feature, we can separate the data
    points into four clusters. Likewise, this sequence can help us locate dissimilarities
    or similarities in data points and group by clusters. This is immensely helpful
    in the biomedical field and for self-driving cars. This is still an area of active
    research and is mostly coupled with object detection frameworks. We will go through
    the basics and then consider some examples. Let’s get started.'
