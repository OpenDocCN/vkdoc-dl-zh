    a few green apples. The images are grouped as original, E to the C grad-cam, and
    E to the C grad-cam plus plus. In grad-cam a few parts of an image is visible.
    In grad-cam plus plus most parts of an image are visible.


    Figure 10-3


    Outcome from Grad-CAM and Grad-CAM++'
