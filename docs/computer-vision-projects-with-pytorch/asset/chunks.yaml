    # 7. Image Anomaly Detection


    The study of machine learning has put us in the course of studying various patterns
    and behavior. It has allowed us to build models that can study closed environments.
    Predictive power often follows the model training process. It is an important
    question that we need to ask often when we are training a model. There is another
    question that needs an answer—how much data is sufficient to help the model understand
    the distribution such that we can have a good representation? This chapter will
    work out an example and the concepts regarding these important questions. We are
    discussing anomaly detection in computer vision.


