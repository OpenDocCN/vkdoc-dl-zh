- fmt: '### Data Exploration


    We will now explore and check the sanity of the data. We have to assign `train`
    and `test` folders that can be used in the model. In image classification, there
    is no specific image-wise annotation. We can use the folder name as the class
    name if the images are segregated by folders. There can be another variation where
    we can see all images in one folder and then specify which image path belongs
    to which class.


    ```

    class_name = [''NORMAL'',''PNEUMONIA'']

    def get_list_files(dirName):

    ''''''

    input - directory location

    output - list the files in the directory

    ''''''

    files_list = os.listdir(dirName)

    return files_list

    files_list_normal_train = get_list_files(data_path+''/train/''+class_name[0])

    files_list_pneu_train = get_list_files(data_path+''/train/''+class_name[1])

    files_list_normal_test = get_list_files(data_path+''/test/''+class_name[0])

    files_list_pneu_test = get_list_files(data_path+''/test/''+class_name[1])

    ```


    We are hard-coding the class names to be `NORMAL` and `PNEUMONIA` since the folders
    are arranged in that fashion.


    ```

    print("Number of train samples in Normal category {}".format(len(files_list_normal_train)))

    print("Number of train samples in Pneumonia category {}".format(len(files_list_pneu_train)))

    print("Number of test samples in Normal category {}".format(len(files_list_normal_test)))

    print("Number of test samples in Pneumonia category {}".format(len(files_list_pneu_test)))

    Output:

    Number of train samples in Normal category 1349

    Number of train samples in Pneumonia category 3883

    Number of test samples in Normal category 234

    Number of test samples in Pneumonia category 390

    ```


    Now that we have extracted the images and located the path, let’s see how to view
    the sample images from `NORMAL` and `PNEUMONIA` folders.


    ```

    rand_img_no = np.random.randint(0,len(files_list_normal_train))

    img = data_path + ''/train/NORMAL/''+ files_list_normal_train[rand_img_no]

    print(plt.imread(img).shape)

    #display(Image.open(img,''r''),)

    img = mpimg.imread(img)

    imgplot = plt.imshow(img)

    plt.show()

    ```


    The output here is the image shown in Figure [2-2](#520381_1_En_2_Chapter.xhtml#Fig2).


    ```

    img = data_path + ''/train/PNEUMONIA/''+ files_list_pneu_train[np.random.randint(0,len(files_list_pneu_train))]

    print(plt.imread(img).shape)

    img = mpimg.imread(img)

    imgplot = plt.imshow(img)

    plt.show()

    ```


    The output in this case is the image is shown in Figure [2-3](#520381_1_En_2_Chapter.xhtml#Fig3).


    ### Data Loader


    Since we have explored the data, now let’s set up the data loaders for training
    purposes. In this variation, we will not be using augmentation to help with training
    regularization. We will just resize and crop the images to a uniform size of 224x224.
    This starting point for the images is not set in stone; you can use a different
    size if you want.


    Apart from the size and cropping of the image, we will also look at converting
    the images to tensors for the PyTorch framework. We will try to normalize the
    images with mean and standard deviation values. If we are considering three channels
    per image, then we need to provide three values for one channel. We need one combination
    of mean and standard deviation.


    Here’s the code:


    ```

    train_transform = transforms.Compose([

    transforms.Resize(224),

    transforms.CenterCrop(224),

