    *   **Mask R-CNN.** This process extends Faster R-CNN and employs object detection
    and generating masking on the image.


    *   **RetinaNet.** This paper did some amazing improvements to the two-stage detectors
    in terms of accuracy and speed. It takes care of all these using the new concept
    of *focal loss*.


    *   **Single Shot Detector.** The paper explains that a objectness score is generated
    for the default bounding box and is refined based on the object.


    These models are mainly trained on COCO datasets and are capable of handling predictions.


    For faster R-CNN:


