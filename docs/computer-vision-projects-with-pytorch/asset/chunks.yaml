- fmt: '# Higher HRNet


    This is a bottom-up approach, unlike the original HRNet model. The major issue
    with previous bottom-up approaches is dealing with scale variations (such as children
    or people far way). This issue is solved in the Higher HRNet model by using HR
    feature maps (from HRNet) and HR heat maps (using a deconvolution step).


    This network is built using the HRNet architecture as the backbone. The input
    image is passed to a stem (containing two convolution blocks, which reduces the
    resolution to ¼). Later the image is passed through the HRNet architecture to
    produce the HR feature maps. The HR feature maps are fed to the deconvolution
    blocks. These deconvolution blocks (feature maps and predicted heat maps from
    HRNet) take as input and will produce two HR heat maps, followed by four residual
    blocks (batch norm + ReLU) to up-sample the feature maps. This model uses a high-resolution
    supervision technique to train the model. The ground truth keypoints are transformed
    to all resolution heat maps to generate the ground truth heat maps. The predicted
    heat maps are validated against the ground truth heat maps, to calculate the loss
    (mean squared error). Figure [6-8](#520381_1_En_6_Chapter.xhtml#Fig8) shows the
    architecture diagram.


    ![](images/520381_1_En_6_Chapter/520381_1_En_6_Fig8_HTML.png)


    A flowchart from left to right has on the first row; a vertical bar labeled image,
    a right arrow, a trapezoid labeled stem, 9 blocks connected by arrows, and second
    and third blocks with arrows. On the right panel from the top are 2 blocks connected
    to C, an orange trapezoid, and 4 vertical bars. The orange trapezoid is the deconvolution
    module.


    **Figure 6-8** Higher HRNet architecture


    From theoretical studies, Higher HRNet shows promising results in addressing computational
    time (using the bottom-up approach) and the scale variation problem (using multi-resolution).


    # PoseNet


    PoseNet is a pose estimator built on `tensorflow.js` that runs on mobile devices.
    It estimates the pose of the human body by detecting human body points such as
    eyes, nose, mouth, wrists, elbows, hips, knees, etc. It forms a skeleton-like
    structure of the pose by joining these keypoints.


    It works for both single and multiple human pose detection.


    ## How Does PoseNet Work?


    PoseNet was trained with ResNet and MobileNet models. The ResNet model has higher
    accuracy. But it is large and has many layers, which makes it slower. Thus, it
    is good to go with the MobileNet model, as it is designed to run on mobile devices.
    Pose estimation happens in two phases:


    - An input RGB image is fed into a convolutional neural network.

    - A single-pose or multi-pose algorithm is used to obtain keypoints (coordinates)
    and their confidence scores from the model outputs.


    The output of PoseNet model is a pose object that contains a list of keypoints
    and confidence scores for each detected person. Figure [6-9](#520381_1_En_6_Chapter.xhtml#Fig9)
    shows pose vs keypoint confidence.


    ![](images/520381_1_En_6_Chapter/520381_1_En_6_Fig9_HTML.jpg)


    A photograph of players on a soccer field, in the foreground, player 1, with his
    upper body twisted to the side is in the act of kicking a ball, and behind him
    is player 2, in the act of running. In photo 1, player 1 has a confidence of 0.8,
    and 2 has 0.7. In photo 2, player 1''s left elbow is at confidence 0.9, and his
    right shoulder is at 0.6.


    **Figure 6-9** Illustration of pose vs keypoint confidence


    ### Single Person Pose Estimation


    This is the case when only one person is centered in an input image or video.
    Inputs for the single pose estimation algorithm are as follows:


    - **Input image element:** An input image element that the program will predict
    the pose for.

    - **Image scale factor:** A number between 0.2 and 1. By default, it is set to
    0.5.

    - **Flip horizontal:** By default, this is set to false. If the poses have to
    be flipped horizontally/vertically, then this has to be set to true. When a video
    is by default flipped horizontally, the poses are returned to the proper orientation.

    - **Output stride:** This should be 32, 16, or 8. By default, it is set to 16.
    This variable influences the height and width layers of the neural network. The
    lower the value of the output stride, the higher the accuracy but the slower the
    speed and vice versa.


    Outputs of a single pose estimation is a pose, containing both the pose confidence
    score and an array of 17 keypoints. A keypoint consists of a keypoint position
    (x and y coordinates) and a keypoint confidence score.


    Figures [6-10](#520381_1_En_6_Chapter.xhtml#Fig10), [6-11](#520381_1_En_6_Chapter.xhtml#Fig11),
    and [6-12](#520381_1_En_6_Chapter.xhtml#Fig12) show the flow diagram of PoseNet.


    ![](images/520381_1_En_6_Chapter/520381_1_En_6_Fig12_HTML.png)


    A diagram divided into 3 parts, from left to right: part 1 is a photo of a man
    with his arms extended to his sides labeled input image; part 2, is a column of
    3 grids labeled, 32, 16, and 8, and a column of 3 photographs, the same image
    as the first, superimposed with dots; part 3 two vertical two-headed arrows named,
    slower, and higher accuracy.


    **Figure 6-12** The flow diagram of PoseNet, part 3


    ![](images/520381_1_En_6_Chapter/520381_1_En_6_Fig11_HTML.png)


    A flowchart of PoseNet estimation algorithm. An image of man, on the left, is
    labeled keypoints heat map. Images highlighting his elbow and nose are labeled
    left elbow heat map and nose heat map, respectively. Magnified images of his elbow
    and nose are labeled offset vector for left elbow keypoint and offset vector for
    nose keypoint, respectively.


    **Figure 6-11** The flow diagram of PoseNet, part 2


    ![](images/520381_1_En_6_Chapter/520381_1_En_6_Fig10_HTML.png)


    A flowchart of the single-pose detection algorithm. It starts with an image of
    man standing on a terrace marked image, which points to mobile net, which points
    to keypoint heatmap and offset vectors, which together point to computer-generated
    stick figure labeled pose estimation.


    **Figure 6-10** The flow diagram of PoseNet


    ### Multi-Person Pose Estimation


    This algorithm can estimate many poses/people in an image. It is a little complex
    and slightly slower than the single-pose algorithm. But its main advantage is
    that if there are multiple people in a picture, their keypoints are less likely
    to be associated. Hence, even if the requirement is to detect a single person’s
    pose, this algorithm may be preferable. Inputs for these algorithms are as follows:


    - Input image element

    - Image scale factor

    - Flip horizontal

    - Output stride

    - Maximum pose detections: Can detect up to five poses

    - Pose confidence threshold

    - Non-maximum suppression (NMS) radius: This controls the minimum distance between
    poses that are returned. Its default value is 20.


    The output of this algorithm is an array of poses. Each pose contains 17 keypoints
    along with each keypoint''s score.


    ### Pros and Cons of PoseNet


    Consider these pros and cons of PoseNet:


    - As it is a lightweight model, it can be used for mobile/edge devices.

    - The single pose estimation algorithm associates the keypoints with the wrong
    person if there is more than one human in the picture.


    ### Applications of Pose Estimation


    The following are common applications of pose estimation:


    - Human activity recognition

    - Human fall detection

    - Motion tracking for consoles

    - Training robots


    ### Test Cases Performed Retail Store Videos


    **Case 1:** Tested PoseNet model with 1080p resolution video of one hour with
    an fps of 2. Outcome:


    - CPU Utilization: 80-90%

    - Memory: 1.2 to 1.5GB

    - FPS: 15

    - Processing time and DB insertion for a one-hour video: 20 to 25 minutes


    **Case 2:** Tested PoseNet model with 720p and 480p resolution videos of one hour
    with an fps of 2. Outcome:


    - For 720p, processing time and DB insertion for one-hour video: 8 to 10 minutes
    with 16 fps

    - For 480p, processing time and DB insertion for one-hour video: 4 to 5 minutes
    with 25 fps'
