    truth. So, essentially we can train a network only when it is deterministic. Variational
    autoencoders are shown in Figure [8-4](#520381_1_En_8_Chapter.xhtml#Fig6).'
  trans: '

    # 理解双线性上采样


    要理解双线性图像上采样的概念，我们首先需要了解线性插值。插值可以看作是上采样在一维空间中的延伸。设想一个场景：一条直线由两个端点处的值——`x[1]` 和
    `x[2]`——标记，并且这两个值已知。如果我们需要在这两个端点之间插值出第三个值，该如何操作？


    该算法表明，我们可以利用加权平均的概念来插值出未知值。权重可以通过点 `x[1]` 和 `x[2]` 之间的比例距离来确定。当我们在二维空间中对图像进行缩放时，也可以运用这一逻辑。


    为了在（`宽度`，`高度`）维度上获取某个坐标的值，我们可以在每个维度上分别进行线性插值。这本质上将有助于在二维空间中进行图像缩放。


    接下来，我们进入图像上采样领域最受期待的概念——神经网络。上采样的方法可能看起来非常粗糙和生硬，毫无精细可言。使用一些经过反复验证的公式来生成值的逻辑早已存在，并且被反复使用。这种重复在某些情况下可以产生奇效，但在此过程中并没有发生任何变化或学习。因此，我们步入了神经网络的学习部分。在编写代码和使用模型架构之前，我们需要讨论其基础模块——VAE
    和 GAN。


    ## 变分自编码器


    深度学习领域最具革命性的进步之一就是编码器-解码器架构。神经网络能够提取图像中存在的信息，并根据其理解重新创建图像。自编码器架构是一种神经网络架构，它可以学习数据中的模式，并将其降维到更小的维度。这些维度又可以再次用于将图像重建回原始图像。需要注意的是，理论上我们可以创建一种无损架构，实现图像的绝对重建。但在现实中，这种情况非常罕见。


    神经网络的代表性架构如图 8-3 所示，它展示了一种情况：图像由相互连接的层理解，并转换为嵌入。这个嵌入是根据已建立的模型架构，从图像中提取的信息表示。


    ![](img/520381_1_En_8_Fig5_HTML.jpg)


    变分自编码器神经网络代表性架构示意图。两个标有“图像”的方框位于两端，而两侧各有两个尺寸递减的细长垂直矩形，分别标有“层”和“嵌入”，位于中间空白区域。


    **图 8-3** — 编码器-解码器架构


    网络的初始部分，通常被称为*编码器*，学习输入图像中的数据分布或模式。它不仅需要自我理解，配对的解码器架构也需要能够解码嵌入。因此，特征提取和理解必须使得解码器能够以极小的损失从嵌入中解读出原始图像。


    另一方面，解码器部分从嵌入层之后开始，试图以最小的信息损失将嵌入层转换回原始图像。这种由神经网络进行的信息压缩和图像再生成，就是自编码器网络的概念。


    当信息传输时，传输的带宽会影响图像的分辨率。压缩有助于将低分辨率图像传递到目的地。一旦图像到达目的地，解码器层就会启动，进行上采样，并恢复出原始图像。


    压缩和解压缩的概念可以进一步应用于图像上采样。现在我们已经探讨了编码器-解码器架构的基础知识，接下来将进入一个有趣的概念，称为*变分编码器*。


    正如我们目前所见，传统的自编码器架构会利用输入的表示信息创建一个潜在空间，以便解码器网络能够生成输出。但想象一下，如果单个属性贡献了一个离散值，那么在重建时它将被限制为仅这一个值。这种限制将无法帮助模型从分布中生成新的内容，而只会重复。如果我们希望潜在空间中的表示是一个分布，而不是一个离散值，该怎么办？我们可以做到这一点，但会出现两个不同的特性：


    - 随机过程

    - 确定性过程


    通过多个深度学习概念已经确定，每当网络进行训练时，它需要拥有一组能够学习和适应损失的过程。在给定模型参数的情况下，会有前向传播来计算损失（实际值与输出值之间的差异）。同时也会有反向传播，它会根据预期输出与真实值之间的差异所产生的损失来调整权重。因此，本质上，我们只能在网络是确定性的情况下对其进行训练。变分自编码器如图
    8-4 所示。

    '
- fmt: '# VAE Representation


    ![VAE diagram](images/520381_1_En_8_Chapter/520381_1_En_8_Fig6_HTML.jpg)


    A diagram of a VAE representation. Prior `P(Z)` and Training Data on the top and
    bottom release data to Z-Space and X-Space respectively which then circulate in
    Encoder `Q(Z|X)` and Decoder `P(X|Z)`.


    **Figure 8-4** VAE representation


    From the representational image shown in Figure [8-4](#520381_1_En_8_Chapter.xhtml#Fig6),
    we can see how the variational autoencoder tries to map the data distribution
    to the latent space. The training data is used by the encoder network parameterized
    by `φ` to learn the stochastic mapping from the training data or X-space to the
    latent or Z-space.


    The encoder or the inference model learns the pattern in the data. It can be proved
    that the empirical distribution of the X-space is complicated but the latent space
    is simple. The generative network parameterized by `θ` learns the distribution
    given by `P(X|Z)`. The decoder part is learning from a prior distribution, which
    is usually a normal Gaussian distribution, and the deterministic process. To put
    forth the differences with an autoencoder, there is an additional stochastic process
    that is added. Figure [8-5](#520381_1_En_8_Chapter.xhtml#Fig7) shows the representation
    of the variational autoencoder network. It shows the stochastic nature being added
    to the existing autoencoder architecture.


    ![VAE network diagram](images/520381_1_En_8_Chapter/520381_1_En_8_Fig7_HTML.jpg)


    A diagram of a representation of VAE network. Two boxes labeled as image are placed
    on the left and right. Two thin vertical rectangles of decreasing sizes on each
    side labeled Layer occupy the space along with embedding in the middle, wherein
    two horizontal rectangles labeled mean and std sit nearby.


    **Figure 8-5** VAE network representation


    So while earlier we were more focused on finding the vector of the latent space
    or the embedding of discrete values, now we will be finding a vector space of
    the mean and standard deviation.


    The latent distribution is giving us the stochastic nature of the process. Eventually,
    we are going to have to backpropagate to train the model. To overcome this problem
    of training, we consider the mean to be a fixed vector. To keep the randomness
    as well as maintain the prior distribution infused in the model, we consider standard
    deviation to be a fixed vector affected by the random constants from the Gaussian
    prior distribution. This sampling process is not as simple as it looks, given
    our loss function will be reconstruction loss and another regularization loss.
    We use a reparameterization trick, in which `€` is sampled from the prior Normal
    Gaussian distribution, and shifted by the mean of the latent distribution, then
    scaled by the standard deviation. The formula will be:


    `Z = mean + std * €` ----- (i)


    From the standard stochastic node, we get this equation:


    `Z = Q(Z|X)` parameterized by `φ` ---------- (ii)


    We can graphically visualize this trick as well, in order to clear the concepts
    of reparameterizing and convert the stochastic process in the learning pathway
    to the deterministic node.


    Figure [8-6a](#520381_1_En_8_Chapter.xhtml#Fig8) shows the problem arising from
    the backpropagation or essentially the model learning the latent space. Figure
    [8-6b](#520381_1_En_8_Chapter.xhtml#Fig9) shows the process of reparameterization,
    wherein the backpropagation can happen through the channels of solid arrow lines.
    The dotted arrow line shown is the stochastic process, which doesn’t hinder the
    training process and does not take part in the backpropagation directly. It is
    not learning anything and no weights are getting adjusted per the loss function.
    It is interesting to note how the process type changes in the Z-space by the shift
    of the stochastic process away from the backpropagation path.


    ![Reparameterization trick diagram](images/520381_1_En_8_Chapter/520381_1_En_8_Fig9_HTML.jpg)


    A diagram of the reparameterization process in VAE. The Encoder reaches Deterministic
    Nodes, mean and std, which passes through another Deterministic Node, Z, to Decoder.
    The trick is that a Stochastic Node, euro sign, also passes through the Deterministic
    Node.


    **Figure 8-6b** Reparameterization trick


    ![VAE problem diagram](images/520381_1_En_8_Chapter/520381_1_En_8_Fig8_HTML.jpg)


    A diagram of the presence of a problem in a VAE. The Encoder reaches Deterministic
    Nodes, mean and std, which then passes through the Stochastic Node, Z, to reach
    the Decoder.


    **Figure 8-6a** VAE problem


    Equation (i) can be considered a rough estimation of Figure [8-6b](#520381_1_En_8_Chapter.xhtml#Fig9)
    and equation (ii) is an estimation of Figure [8-6a](#520381_1_En_8_Chapter.xhtml#Fig8).


    Thus we have established the concepts of variational autoencoders, which can have
    various uses. This small stochastic process can help generate similar images,
    drawn from the same probability distribution. It is helpful in image *regeneration*
    or image *generation*, and there will always be a need for both types. The sampling
    process enables the generator model or the decoder model to re-create images from
    the same distribution with subtle changes. In some cases, it helps in interpolating
    signals or images. This interpolation concept can be used to resize the images.
    Now that we covered variational autoencoders in brief, let’s look at another generative
    form of algorithms, known as *generative adversarial networks*, before diving
    into the image resizing code.


    ## Generative Adversarial Networks


    Generative adversarial networks were introduced to deep learning by Ian Goodfellow
    in 2014. The network is capable of creating newer samples that are quite close
    to the original ones. They are also used extensively for style transfers in images.


    This network is a combination of two models—the generator and the discriminator
    models. In combination, these models form a supervised form of learning.


    - **Generator:** The model tries to generate samples based on a domain or a problem
    set. These are preferably samples out of a fixed distribution. The generator takes
    in random input (in most scenarios, a Gaussian distribution is used to help it
    with the input). During the training process, these random or meaningless points
    will be deemed to be coming out from the domain distribution. The generator should
    be able to generate the representation from the input data distribution. As we
    have seen earlier, the data distribution is complex and the encoder tries to map
    to a much simpler yet highly compressed information block. This space is often
    termed *latent space*, from which the generator block of the autoencoder generates
    the output. The models can understand the intricacies of the data distribution
    and create a representation, from which a sample is taken. This can and should
    be able to fool the discriminator or the classifier.


    - **Discriminator:** Once the generator model creates fake samples that it thinks
    are very similar to the original data distribution, they are passed to the discriminator
    model to validate and classify. It is essentially a classification model. It has
    the job of classifying the images generated by the generator, fake or real. The
    classifier discriminates between real and fake images.


    We have established that generators and discriminators have to be trained simultaneously.
    This is called a generative adversarial network since generative models and discriminative
    models are adversarial to each other. They are trying to better each other at
    a zero-sum game. One does not theoretically defeat the other. We have the generator
    network trying to create a fake image as realistically as possible such that the
    discriminator cannot identify it as fake. On the other hand, discriminator models
    are trying to train so that anything amiss in the image will be captured by it.
    In a perfect world, the generator eventually generates images that the discriminator
    can’t identify as fake or real (50% fake/real). Eventually, the generator is removed
    from the network and used for other purposes.'
