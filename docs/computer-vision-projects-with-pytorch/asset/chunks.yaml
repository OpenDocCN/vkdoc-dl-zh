    We went through the basics of convolutional neural networks and how they help
    in understanding images.


    With this, we conclude our discussion of the computer vision concepts. We start
    with the applications and projects in the next chapter.


    # 2. Image Classification


    The last chapter discussed several important concepts in computer vision. A few
    of the best practices in the field of computer vision were discussed as well,
    so it is time to put them into action. This chapter sets the tone for multiple
    applications in the field of computer vision. We start with a basic explanation
    of how to start using the Torch components to build a model, define a loss function,
    and train.


    An object that needs to be identified by its name involves the process of classification.
    We have encountered problems in all facets of data science that involve a classification
    requirement. It can be as simple as classifying an image on your phone as to whether
    it is a picture of mountains or sea, or whether it’s a bird or a dog. Classification
    is one of the most basic yet most powerful concepts. Let’s look at how classification
    is set up by a computer vision model:


    1. Detecting edges

    2. Detecting gradients

    3. Identifying textures

    4. Identifying patterns

    5. Forming parts of objects


    A model needs to associate a name with a particular object in an image. It does
    this by following a structured knowledge extraction mechanism and then by regenerating
    its input for the decision-making process.


    ## Topics to Cover


    1. Data preparation methods

    2. Data augmentation techniques

    3. Using batch normalization and dropouts

    4. Comparing activation functions

    5. Setting up models and their variations

    6. Training process

    7. Running inference and comparing model results


    ### Defining the Problem


    We will be checking x-ray images of lungs and classifying them, with the help
    of computer vision modeling techniques, as either having pneumonia or being normal.
    Since this is a healthcare problem it is always best to let the model overpredict.
    We need to predict with the highest form of accuracy and should have nearly 100%
    recall if possible, with a high precision score as well. We need to be sure to
    diagnose any possible case of infection and not misclassify an infected lung as
    healthy because of small margins. Softmax logits can often be used to determine
    the prediction rather than a softmax function deciding the class. This is a critical
    decision based on experience with the data as well as the behavior of the model.


    A major problem that clouds these kinds of image classification problems is the
    availability of properly annotated data. Image classification by convolutional
    neural networks helps with multiple downstream tasks. A model trained on some
    data can be used to fine-tune other similar data and be used for prediction purposes.
    There are multiple open-source image repositories, but for the most industrial
    purpose they give us a starting point. We have to use our task-specific images
    as well.'
