  trans: '

    # Mask R-CNN


    在 Faster R-CNN 已有成果的基础上，Mask R-CNN 进一步扩展，能够预测检测对象上的掩码。在 ROI 池化层之后，又增加了两个卷积神经网络来生成掩码。该方法还确立了
    `ROI Align`，有助于更好地将提取的特征与输入对齐，并避免 Faster R-CNN 中曾出现的变形问题。它使用双线性插值来获取输入区域的精确或近乎完美的值。


    所有这些目标检测方法中产生的一个重要步骤是锚点框的使用。`YOLO` 在此基础上进行了一些额外的改进，我们将在下文探讨。


    ## 前提条件


    ![](img/520381_1_En_3_Fig9_HTML.jpg)


    一张两只鸟在飞行的照片。两只鸟都被一个框标记出来。


    图 3-8：带有标注的鸟类图像


    - **标注。** 在分类问题中，图像需要按照其所属类别进行排序或整理。类似地，在目标检测问题中，图像需要用适当的边界框（通常称为真实标注）进行标记。边界框的作用是提供对象坐标以及所包含类别的信息。图
    3-8 展示了一个已标注图像的实例，用于训练一个定位鸟类的分类器。通常，标注是手动完成的，有时会进行多次，以获得无偏的真实标注。然而，如果像现在这样只是为了练习，我们可以使用任何开源数据进行实验。


    - **首选 GPU。** 在执行需要训练和运行推理的计算机视觉任务时，建议使用支持 CUDA 的 GPU 核心以加快处理速度。


    - **安装支持 CUDA 的 Torch 框架。** 我们还需要在系统上安装 `PyTorch`，如前一章所述。


    ## YOLO


    对于能够帮助实现实时推理的目标检测算法，一直存在巨大的需求。Faster R-CNN 已经非常接近这一目标，它处理了 2000 个边界框预测并超越了传统的计算机视觉方法。与之前的算法相比，它有了显著的改进，但仍有提升空间。


    随后出现了革命性的算法 `YOLO`，它能够以每秒 45 帧的速度（在 TITAN X 上）检测对象。早期的模型在训练和预测的不同阶段（如锚点生成层、区域提议层、分类和边界框修正）花费了太多时间。而
    `YOLO` 则试图通过一个卷积神经网络块来同时预测边界框和类别，从而减少计算时间。它采用了一种更通用的训练方式，并从整个图像中考虑信息，而不是将信息拼凑起来。最终，它超越了其他试图实现相同目标的前代算法。


    图 3-9 展示了 `YOLO` 的架构，该架构受用于图像分类的 `GoogleNet` 架构启发。输入层的维度为 448x448x3。该网络包含 24 个卷积层和批量最大池化层，以及两个全连接层。


    ![](img/520381_1_En_3_Fig10_HTML.jpg)


    一张示意图，从左到右依次为：一个内部有 7x7 立方体的层，一系列尺寸分别为 112x112、56x56、28x28、14x14、7x7 和 7x7 的 6
    个层，2 个箭头，竖线，箭头，以及一个尺寸为 7x7 的立方体。方框下方是对应的卷积层维度。只有前 4 个层有最大池化层。


    图 3-9：YOLO 架构


    训练过程相当昂贵，因此从头开始训练一个目标检测模型需要良好的管理。该给定架构的训练通过两种方式进行。首先，模型在 `ImageNet` 数据上进行训练，使用前
    20 个卷积层，并通过平均池化来匹配全连接网络的维度。这个模块训练了一周，达到了 88% 的准确率。


    在这个预训练网络的基础上，添加了四个卷积层和两个全连接层，以得到最终的检测对象。输入维度也从 224x224 增加到 448x448，这有助于提升检测能力。最后一层预测分类分数和边界框坐标。边界框的宽度和高度被归一化。


    图 3-10 展示了用于优化分类和回归的损失函数。对于五个锚点框中的每一个，都有一个目标性分数、四个对应于归一化边界框的坐标，以及最高的类别概率或分数。这些改进效果不错，但还需要进一步优化。让我们看看第二个版本的更新以及版本
    3，它曾是最流行的模型之一。


    ![](img/520381_1_En_3_Fig11_HTML.jpg)


    一个方程图示：lambda 下标坐标，S 上标 2 求和，B 求和，i 等于 0，j 等于 0，1 对象上标 i j，括号，x 下标 i 减去 x 下标 i，上标
    2，加 y 下标 i，减去 y 下标 2，上标 2，括号，以及后续方程。


    图 3-10：YOLO 损失函数

    '
- fmt: '## YOLO V2/V3


    The changes in YOLO were remarkable and the second version fine-tunes the approach
    to a more efficient level. Here are a few key pointers that were addressed in
    the second version:


    - The convolutional layers ran deep, so there was always a chance of a vanishing
    gradient or exploding gradient. Batch normalization was added to help with the
    internal covariate shift in the learning.

    - It predicts class and objectness for every anchor box.

    - The network also predicts five bounding boxes and five coordinates for each
    bounding box.

    - A major architectural change happened when it removed the fully connected layers
    and replace them with anchor boxes to predict bounding boxes.

    - These anchor boxes are determined with the help of clustering on the bounding
    boxes of ground truth.


    Even after multiple changes, the researchers found that a few more changes could
    improve the accuracies. They made the required changes and named this version
    YOLO V3. It was arguably one of the most sought-after object detection architectures.
    Whereas YOLO was using the `softmax` layer to get the final classification scores,
    YOLO V3 resorted to using individual logistic regression or multi-label classification
    on the inputs. Interestingly, it also removes the pooling layer and instead uses
    `3x3` with a stride of `2` to reduce dimensionality.


    The architecture also made changes to the loss function, with three major predictions
    coming out—coordinates of the bounding boxes, the objectness value, and the class
    scores. The most popular backbone in the YOLO V3 architecture is `Darnet-53`,
    which is a 53-layered architecture of convolutional blocks, as shown in Figure
    [3-11](#520381_1_En_3_Chapter.xhtml#Fig12). It uses the residual implementation
    with `3x3` and `1x1` convolutional layers to get the features for detection and
    classification. Overall, the changes made a huge impact on the accuracy and optimization
    of the architecture.


    ![](images/520381_1_En_3_Chapter/520381_1_En_3_Fig12_HTML.jpg)


    A table has 4 headers, Type, Filters, Size, and Output. The rows contain entries
    boxed in and labeled, 1 X, 2 X, 8 X, 8 X, and 4 X. The boxed-in areas include
    entries for 2 convolutional types of filters and sizes and a residual out pot
    size. The last 3 entries under Type are Average pool, Connected, and Soft Max.


    **Figure 3-11** Darknet 53 architecture


    Let’s look at some code that uses a saved model and tunes it for a custom dataset.
    Why are we not training it from scratch? These are all heavyweight models, and
    we don’t always have enough GPU capacity to train from scratch. Secondly, using
    the trained weights and modifying them accordingly is a learning experience. A
    term we will keep repeating is *transfer learning*.


    ## Project Code Snippets


    The code snippet is adapted from the original creators of YOLO, and all source
    code credits go to Joseph Redmon and Ali Farhadi. Even though training from scratch
    is fairly complex, we can try to use existing open source models to do a transfer
    learning on this data. We can also use the existing models to run inference on
    our data if the classes on which the original model were trained closely resemble
    the ones we are using.


    The folder setup needs to follow the original creators’ since we will be using
    the saved models to custom train our data. As shown in Figure [3-12](#520381_1_En_3_Chapter.xhtml#Fig13),
    for any variations, the path should be corrected according to the configuration
    files—under `data`.


    ![](images/520381_1_En_3_Chapter/520381_1_En_3_Fig13_HTML.jpg)


    A code read as, inverted v, Yolo V r, less than underscore p y cache underscore,
    less than annotation underscore tool, inverted v, c f g, settings icon, Yolo v3,
    custom dot c f g, settings icon, Yolo v3, s p p dot c f g, settings icon, Yolo
    v3, s p p tiny dot c f g, inverted v, data, less than images. Below, less than
    utils is boxed in.


    **Figure 3-12** Folder structure for YOLO


    ### Step 1: Getting Annotated Data


    Image annotations are one of the most vital prerequisites of an object detection
    algorithm when we want to train custom data. They help the model with the classification
    and regression loss functions. They have the ground truth, which is manually resolved.
    There are multiple open-sourced locations from where we can annotate images. The
    tool will generally have a marker that will help draw a bounding box of some shape
    on top of the image. The program will allow the annotations to be downloaded in
    JSON, CSV, or VOC/COCO format, depending on the model being used. The training
    and custom data should align.


    It’s immensely important that annotation is correct and true to the person annotating.
    Since it is a manual and repetitive task it needs to be as good as it can be.
    Eventually, the generated file should be downloaded and placed in the `data` folder.
    For instance, each image might look like this:


    - `0 0.41833333333333333 0.2112676056338028 0.2011111111111111 0.2007042253521127`

    - `2 0.43777777777777777 0.3970070422535211 0.11555555555555555 0.15669014084507044`

    - `1 0.38722222222222225 0.6813380281690141 0.47 0.4119718309859155`


    Once we have aggregated the new files, we can see how to change the data files.
    In Figure [3-12](#520381_1_En_3_Chapter.xhtml#Fig13), the folders under the `data`
    are primarily `labels` and `images`. The `images` have the original images with
    the same name as the one annotated. The text files need to have the annotation
    information and be placed in the `labels`. This will either be a text file or
    JSON.


    Once this is done, we will check the file’s custom data file, which needs to be
    updated with information such as where the train and test file information is
    stored. We need to project two kinds of information here—the path to the labels
    and images and the actual images. The custom data file will look something like
    this:


    - `classes=4`

    - `train=data/train.txt`

    - `valid=data/test.txt`

    - `names=data/custom.names`


    This gives relative information about the data and its whereabouts. Once this
    is done, we need to provide the class names in the `custom.names` file. It will
    look something like this:


    - `hardhat`

    - `vest`

    - `mask`

    - `boots`


    This file lists the class names to the number linked earlier. As mentioned earlier,
    we need `train.txt` and `test.txt` files with the path to the images. The files
    should have a relative path to run the training function.


    There are other files such as train and test shapes (`train.shapes` and `test.shapes`)
    that have the shapes for all the files, which we can change according to the input
    data.


    Once all these are done, we have to download the saved weights from the source
    and the original researchers at [`https://pjreddie.com/darknet/yolo/`](https://pjreddie.com/darknet/yolo/).
    There are various options according to the GPU strength of the person working
    on the project. The weights and the configuration files are tied to each other.
    So be careful to download the corresponding config file for the weights. With
    these primary steps, the initial setup is done. Now we move to the next process.'
