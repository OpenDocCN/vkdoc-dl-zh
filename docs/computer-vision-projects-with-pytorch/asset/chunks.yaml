    ### 分支-2


    该分支生成部位亲和场（PAFs）。PAFs 能够识别关键点之间的连接关系。


    来自两个分支的输出通过线积分进行映射，以识别正确的连接。在预测结果（热力图、PAF）与真实值（热力图、PAF）之间计算 `L2` 损失。使用了两个 `L2`
    损失函数——每个分支的末端各有一个。在训练过程中，总损失计算为这两个损失函数之和。


    阶段 1 的输出被传递到阶段 2，以改进结果。通过增加阶段数量，模型的深度也随之增加。由于图像中可能存在多个人，因此使用加权二分图来连接同一个人的各个部位。连接后的配对会被合并，形成人体骨架。该模型可以在单张图像上检测多达
