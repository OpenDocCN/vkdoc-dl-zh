- fmt: '### VGG


    图 [1-18](#520381_1_En_1_Chapter.xhtml#Fig25) 展示了`conv 1`、`conv 2`、`conv 3`、`conv
    4`和`conv 5`——一个带有`ReLU`激活函数的卷积块。每个块之后是一个最大池化层，然后是`FC 6`、`FC 7`和`FC 8`——一个全连接网络。


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig26_HTML.png)


    表 A 是卷积网络配置，有 6 列和 1 行。列标题为 A、A L R N、B、C、D 和 E。表 B 是输入，224×224 的 RGB 图像，包含 5
    个卷积，共 6 列和 1 行。最后一个表是参数数量，有 5 列和 1 行，列标题为 A A L R N、B、C、D 和 E。


    **图 1-19** VGG 堆叠的逐层描述


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig25_HTML.jpg)


    VGG 架构示意图。从左到右依次是：由一个斜矩形表示的图像，然后是`Conv 1`、`Conv 2`、`Conv 3`、`Conv 4`、`Conv 5`、`FC
    6`、`FC 7`，最后是`FC 8`。`conv 1`到`conv 5`块的高度逐渐减小，`FC 6`和`FC 7`是水平对齐的矩形，`FC 8`由一个正方形表示。


    **图 1-18** VGG 架构


    该架构开启了一种以基本开发风格进行深度应用的长期实践。在该架构提出时，尚未使用批归一化，因此网络存在内部协变量偏移和梯度中途消失的问题。该架构结合使用了 3×3
    和 1×1 卷积。堆叠三个 3×3 卷积优于一个 7×7 卷积的原因在于参数数量：如果有 C 个通道，则 3×3 卷积有 27C² 个参数，而 7×7 卷积则有
    49C² 个参数。然而，三个 3×3 堆叠的感受野等于一个 7×7 卷积，并且具有更多自适应函数在特征图上进行卷积。参见图 [1-19](#520381_1_En_1_Chapter.xhtml#Fig26)。


    该模型架构遵循卷积块式架构，使用了现代架构中定义良好的优先级。我们有五个卷积块，当特征图尺寸减小时，这能最小化信息损失。每个块的通道数都会增加。每个卷积块之后是最大池化，用于降低特征图的维度。此外，还增加了
    1×1 卷积，它充当了来自前一层特征图所有特征的混合器。这种卷积起到 z 轴降维技术的作用。虽然连续使用 3×3 或 5×5 卷积会增加特征图的通道数，但在某个时刻，需要使用适当的技术来减少通道数，同时保持信息损失最小。出于所有目的，1×1
    卷积被用作跨通道池化。它也可以用来增加通道数，但在实践中并不这样做。由于它在特征图上进行逐元素乘法，因此可以轻松地汇总内容。


    VGG 是对传统 CNN 架构的重大改进，并且是 2015 年发布的最先进的算法。


    ### ResNet


    `ResNet`是一种用于图像下游任务的高级架构，它通过在 2015 年赢得 ILSVRC 竞赛而隆重进入计算机视觉领域。它也是像`YOLO`和`Faster
    RCNN`等一些最先进目标检测算法的骨干网络。该论文由微软的一个团队提出。他们借助残差学习框架成功训练了更深的网络。


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig27_HTML.jpg)


    一个 2 层残差结构的示意图，两者都封装在`f`、`x`和恒等映射中，结果为`f(x) + x`。顶层接收输入`x`，并通过`ReLU`指向底层，底层指向一个被分成
    4 段的圆，该圆产生结果`f(x) + x`。从`x`出发的恒等映射被传递到该圆。


    **图 1-20** 残差结构


    图 [1-20](#520381_1_En_1_Chapter.xhtml#Fig27) 展示了残差框架的基本结构。前一层的输出可以视为`X`；它被传递给残差函数以及一个恒等函数。因此，如果残差函数由`f(x)`给出，我们可以调用`f(x)
    + x`的结果。


    该结构试图解决的问题是准确率的退化。实验表明，更深的网络在增加层数后准确率会饱和，并最终下降。这些下降并非来自过拟合，而是由于问题本身难以优化。在深度神经网络中，一个常见的线性问题可能难以训练。例如，如果我们想构建一个仅对两个数字进行线性相加的模型，并希望结果是它们的和，那么非线性对应部分通常更容易优化，比如给数字加上指数函数再得到结果。


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig29_HTML.png)


    一个包含 7 列和 5 行的表格。第三到第七列的列标题有一个共同的标签，即 7×7、64、步长 2 和 3×3 最大池化、步长 2。最后一行是 FLOPs。该表描述了
    ResNet 的逐层卷积信息。


    **图 1-22** ResNet 逐层卷积信息


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig28_HTML.jpg)


    一个由 32 个相互连接的输入组成的示意图。从左到右，从图像开始，经过 7×7 卷积、64 个输出、步长 2，最后以`FC 1000`结束，描绘了 ResNet
    的基本架构。每个组件由一个水平对齐的矩形表示。


    **图 1-21** ResNet 基本架构


    跳过残差网络产生的恒等层，除了从残差网络获得的局部感受野之外，还提供了第二组可用的局部感受野。这些通常被称为跳跃连接或高速公路网络，它们为深层网络提供图像的副本。跳跃连接和残差网络的输出需要具有相同的维度。因此，在输出上会进行投影以匹配维度，然后再将其添加到残差函数中。图
    [1-21](#520381_1_En_1_Chapter.xhtml#Fig28) 描绘了`ResNet-34`架构，可以参考图 [1-22](#520381_1_En_1_Chapter.xhtml#Fig29)
    中的表格。该架构使用了 3、4、6、3 的堆叠，以及 64、128、256 和 512 的网络块堆叠。有两种类型的跳跃连接——一种用实线表示，另一种用虚线表示。在大多数情况下，如果输入维度与残差输出的维度匹配，则直接添加输入。这由实线表示。在虚线的情况下，如果维度不匹配，则通过填充以及步长为
    2 的 1×1 卷积来控制。无论哪种方式，都没有为模型学习添加额外的参数。


    另一个需要注意的重要点是，该模型使用带动量的随机梯度下降作为优化器。带动量的`SGD`是许多其他最先进模型中使用的另一种经过验证的方法。'
  raw: '##### VGG


    Figure [1-18](#520381_1_En_1_Chapter.xhtml#Fig25) shows conv 1, conv 2, conv 3,
    conv 4, and conv 5—a convolution block with ReLU activation. Each block is followed
    by a max pooling followed by FC 6, FC 7, and FC 8—a fully connected network.


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig26_HTML.png)


    able A is Conv Net Configuration that has 6 columns and 1 row. The column headers
    are A, A L R N, B, C, D, and E. Table B is input, 224 by 224 R G B image, with
    5 convs of 6 columns and 1 row. The last table is the number of parameters. It
    has 5 columns and 1 row. The column headers are A A L R N, B, C, D, and E.


    Figure 1-19


    Layer-wise depiction of a VGG stack


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig25_HTML.jpg)


    A diagram of V G G architecture. From left to right, is the image represented
    by an oblique recatangle, followed by Conv 1, Conv 2, Conv 3, Conv 4, Conv 5,
    F C 6, F C 7, to F C 8\. The heights of blocks conv 1 to conv 5 progressively
    decrease, F C 6 and F C 7 are horizontally aligned rectangles, and F C 8 is represented
    by a square.


    Figure 1-18


    VGG architecture


    Figure


    The architecture started a long-drawn application of going deep with a basic development
    style. At the time this architecture was proposed, batch normalization was not
    used so the network suffered from internal covariate shift and gradient lost midway.
    The architecture uses a combination of 3x3 and followed by 1x1\. The reason that
    stacking three 3x3 is better than one 7x7 is in terms of parameters; if we have
    C channels, then 3x3 has 27C², but in the case of 7x7 we will end up having 49C².
    However, the receptive field ends up with three stacks of 3x3, which is equal
    to one 7x7, all with more adaptive functions convolving over the feature maps.
    See Figure [1-19](#520381_1_En_1_Chapter.xhtml#Fig26).


    The model architecture follows a convolution block-wise architecture that uses
    a well-defined precedence, used in modern architectures. We have five convolution
    blocks, and when the feature maps have reduced size, this keeps the information
    loss minimal. The number of channels increases at each block. Each convolution
    block is followed by max pooling to reduce the feature maps’ dimensions. There
    is also an addition of 1x1 convolution, which acts as a mixer of all the features
    of the feature map from the preceding level. This convolution acts as a z-axis
    dimensionality reduction technique. While continuous usage of 3x3 or 5x5 will
    increase the number of channels for a feature map, at some point, it needs to
    get reduced, with proper technique keeping the information loss minimal. For all
    purposes, 1x1 is used as a cross-channel pooling. It can also be used to increase
    the number of channels but it is not done in practice. Since it is element-wise
    multiplication on the feature maps it can easily summarize the content.


    VGG was a big improvement over the conventional CNN architecture and was the state-of-the-art
    algorithm published in 2015.


    ##### ResNet


    ResNet is an advanced architecture for image downstream tasks and made its a grand
    entry into the world of CV by winning the ILSVRC competition in 2015\. It is also
    the backbone for a few of the state-of-the-art object detection algorithms like
    YOLO and faster RCNNs. The paper was put forward by a team from Microsoft*.* They
    were able to train deeper with the help of the residual learning framework.


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig27_HTML.jpg)


    A diagram of residual structures of 2 layers, both encapsulated by f, x, and Identity,
    that results to f, x, plus x. The top layer receives input x and is pointed to
    the bottom layer by Relu, which points to a circle divided into 4 segments that
    produce the result f of x plus x. From x identity is passed to the circle,


    Figure 1-20


    Residual structures


    Figure [1-20](#520381_1_En_1_Chapter.xhtml#Fig27) shows the basic structure of
    the residual framework. The output from the previous layer can be considered as
    X; it is being passed to the residual function along with an identity function.
    So, if the residual function is given by the function f(x), we can call the result
    from both f(x) + x.


    The issue that the structure was trying to solve was a degradation of accuracies.
    The experiments revealed the deeper networks were having their accuracies saturated
    after the addition of layers and finally falling off. These drops were not from
    overfitting but due to the problem itself being hard to optimize. In deep neural
    networks, a common linear problem can be hard to train. For example, if want to
    build a model with just a linear addition of two numbers and we want the resultant
    to be the sum, a non-linear counterpart is often easy to optimize, like just adding
    exponentials to the numbers and the resultants.


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig29_HTML.png)


    A table that has 7 columns and 5 rows. The third to seventh column headers have
    a label in common, which is 7 by 7, 64, stride 2 and 3 by 3 max pool, stride 2\.
    The final row consists of FLOPs. The table depicts the Res Net layer wise convolution
    information.


    Figure 1-22


    ResNet layer-wise convolution information


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig28_HTML.jpg)


    A diagram consists of 32 interconnected inputs. From left to right, it starts
    with an image, 7 by 7 conv, 64 over 2, then ends with f c 1000 depicting the Res
    net basic architecture. Each component is represented by a horizontally aligned
    rectangle.


    Figure 1-21


    ResNet basic architecture


    The identity layers that result from skipping the residual networks provide a
    second set of available local receptive fields in addition to what we are getting
    from the residual network. Often termed as the skip connections or the highway
    networks, they provide a copy of the image to the deep nets. The output from the
    skip connection and the residual need to have the same dimensions. Thus there
    is a projection that happens on the output to match the dimensions before being
    added to the residual functions. Figure [1-21](#520381_1_En_1_Chapter.xhtml#Fig28)
    depicts a ResNet-34 architecture, which can be referred from the table shown in
    Figure [1-22](#520381_1_En_1_Chapter.xhtml#Fig29). The architecture uses a stack
    of 3,4,6,3, a stack of 64,128,256, and 512 network blocks. There are two types
    of skip connections—one with solid lines and the other with dotted lines. In most
    cases if the input dimensions match the output of the residuals, the input is
    added. This is shown by the solid lines. In the case of dotted lines, the dimensions,
    if not matched, are controlled by padding in addition to the 1x1 with stride 2\.
    Either way, no parameters are being added for the model to learn.


    Another important point to note is that this model uses a stochastic gradient
    descent with momentum as an optimizer. SGD with momentum is another proven method
    used in a lot of other state-of-the-art models.'
  trans: '

    ### VGG


    图 1-18 展示了`conv 1`、`conv 2`、`conv 3`、`conv 4`和`conv 5`——一个带有`ReLU`激活函数的卷积块。每个块之后是一个最大池化层，然后是`FC
    6`、`FC 7`和`FC 8`——一个全连接网络。


    ![](img/520381_1_En_1_Fig26_HTML.png)


    表 A 是卷积网络配置，有 6 列和 1 行。列标题为 A、A L R N、B、C、D 和 E。表 B 是输入，224×224 的 RGB 图像，包含 5
    个卷积，共 6 列和 1 行。最后一个表是参数数量，有 5 列和 1 行，列标题为 A A L R N、B、C、D 和 E。


    **图 1-19** VGG 堆叠的逐层描述


    ![](img/520381_1_En_1_Fig25_HTML.jpg)


    VGG 架构示意图。从左到右依次是：由一个斜矩形表示的图像，然后是`Conv 1`、`Conv 2`、`Conv 3`、`Conv 4`、`Conv 5`、`FC
    6`、`FC 7`，最后是`FC 8`。`conv 1`到`conv 5`块的高度逐渐减小，`FC 6`和`FC 7`是水平对齐的矩形，`FC 8`由一个正方形表示。


    **图 1-18** VGG 架构


    该架构开启了一种以基本开发风格进行深度应用的长期实践。在该架构提出时，尚未使用批归一化，因此网络存在内部协变量偏移和梯度中途消失的问题。该架构结合使用了 3×3
    和 1×1 卷积。堆叠三个 3×3 卷积优于一个 7×7 卷积的原因在于参数数量：如果有 C 个通道，则 3×3 卷积有 27C² 个参数，而 7×7 卷积则有
    49C² 个参数。然而，三个 3×3 堆叠的感受野等于一个 7×7 卷积，并且具有更多自适应函数在特征图上进行卷积。参见图 1-19。


    该模型架构遵循卷积块式架构，使用了现代架构中定义良好的优先级。我们有五个卷积块，当特征图尺寸减小时，这能最小化信息损失。每个块的通道数都会增加。每个卷积块之后是最大池化，用于降低特征图的维度。此外，还增加了
    1×1 卷积，它充当了来自前一层特征图所有特征的混合器。这种卷积起到 z 轴降维技术的作用。虽然连续使用 3×3 或 5×5 卷积会增加特征图的通道数，但在某个时刻，需要使用适当的技术来减少通道数，同时保持信息损失最小。出于所有目的，1×1
    卷积被用作跨通道池化。它也可以用来增加通道数，但在实践中并不这样做。由于它在特征图上进行逐元素乘法，因此可以轻松地汇总内容。


    VGG 是对传统 CNN 架构的重大改进，并且是 2015 年发布的最先进的算法。


    ### ResNet


    `ResNet`是一种用于图像下游任务的高级架构，它通过在 2015 年赢得 ILSVRC 竞赛而隆重进入计算机视觉领域。它也是像`YOLO`和`Faster
    RCNN`等一些最先进目标检测算法的骨干网络。该论文由微软的一个团队提出。他们借助残差学习框架成功训练了更深的网络。


    ![](img/520381_1_En_1_Fig27_HTML.jpg)


    一个 2 层残差结构的示意图，两者都封装在`f`、`x`和恒等映射中，结果为`f(x) + x`。顶层接收输入`x`，并通过`ReLU`指向底层，底层指向一个被分成
    4 段的圆，该圆产生结果`f(x) + x`。从`x`出发的恒等映射被传递到该圆。


    **图 1-20** 残差结构


    图 1-20 展示了残差框架的基本结构。前一层的输出可以视为`X`；它被传递给残差函数以及一个恒等函数。因此，如果残差函数由`f(x)`给出，我们可以调用`f(x)
    + x`的结果。


    该结构试图解决的问题是准确率的退化。实验表明，更深的网络在增加层数后准确率会饱和，并最终下降。这些下降并非来自过拟合，而是由于问题本身难以优化。在深度神经网络中，一个常见的线性问题可能难以训练。例如，如果我们想构建一个仅对两个数字进行线性相加的模型，并希望结果是它们的和，那么非线性对应部分通常更容易优化，比如给数字加上指数函数再得到结果。


    ![](img/520381_1_En_1_Fig29_HTML.png)


    一个包含 7 列和 5 行的表格。第三到第七列的列标题有一个共同的标签，即 7×7、64、步长 2 和 3×3 最大池化、步长 2。最后一行是 FLOPs。该表描述了
    ResNet 的逐层卷积信息。


    **图 1-22** ResNet 逐层卷积信息


    ![](img/520381_1_En_1_Fig28_HTML.jpg)


    一个由 32 个相互连接的输入组成的示意图。从左到右，从图像开始，经过 7×7 卷积、64 个输出、步长 2，最后以`FC 1000`结束，描绘了 ResNet
    的基本架构。每个组件由一个水平对齐的矩形表示。


    **图 1-21** ResNet 基本架构


    跳过残差网络产生的恒等层，除了从残差网络获得的局部感受野之外，还提供了第二组可用的局部感受野。这些通常被称为跳跃连接或高速公路网络，它们为深层网络提供图像的副本。跳跃连接和残差网络的输出需要具有相同的维度。因此，在输出上会进行投影以匹配维度，然后再将其添加到残差函数中。图
    1-21 描绘了`ResNet-34`架构，可以参考图 1-22 中的表格。该架构使用了 3、4、6、3 的堆叠，以及 64、128、256 和 512 的网络块堆叠。有两种类型的跳跃连接——一种用实线表示，另一种用虚线表示。在大多数情况下，如果输入维度与残差输出的维度匹配，则直接添加输入。这由实线表示。在虚线的情况下，如果维度不匹配，则通过填充以及步长为
    2 的 1×1 卷积来控制。无论哪种方式，都没有为模型学习添加额外的参数。


    另一个需要注意的重要点是，该模型使用带动量的随机梯度下降作为优化器。带动量的`SGD`是许多其他最先进模型中使用的另一种经过验证的方法。

    '
- fmt: '# Inception Architectures


    Inception has a few versions delivered since 2014. `GoogLeNet` (often linked with
    `InceptionV1`) was the winner of `ILSVRC`. There are multiple iterations; let’s
    look at inception architecture.


    To increase effective local representation in the convolution block, this solution
    proposed to factorize convolutions. Effectively it suggested using `3x3` after
    `1x1`, reducing the intensity of the activations and reducing correlations. They
    used a way of factorizing heavier convolution kernels to smaller counterparts
    trying to achieve the same result. For example, a `5x5` requires `25C²` parameters
    but it can be broken into two sets of `3x3` and still require `18C²` parameters.
    See Figure [1-23](#520381_1_En_1_Chapter.xhtml#Fig30). According to the research,
    `5x5` might have better expressiveness in terms of getting hold of more pixel
    points in one convolution. Thus, it has a better bird’s eye view compared to `3x3`.
    However, the architecture claims that while building a computer vision model,
    we need to care for translational invariance and a smaller kernel size will help
    us with that.


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig30_HTML.jpg)


    An illustration of a bird''s eye view of convolution. The corners of a square
    cell are connected to the 4 corners of a 3 by 3 grid, which is in turn connected
    to the 3 by 3 grid which a part of a 5 by 5 grid.


    **Figure 1-23** Bird''s eye view of convolution


    The factorization is further broken into asymmetric convolutions. The `3x3` can
    still be broken into `3x1` and then `1x3` convolutions, resulting in at least
    `9/6` savings. This can be used in a higher set of convolutions as well and is
    shown generically in Figure [1-24](#520381_1_En_1_Chapter.xhtml#Fig31).


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig31_HTML.jpg)


    A diagram of asymmetric convolutions of `Filter Concat`. The inputs are 2 `n x
    1`, and 2 `1 by 1` that lead to the base. The first column, `n x 1`, consists
    of, from top to bottom, `1 x n`, `n x 1`, `1 x n`, and `1 by 1`. The second column,
    `n x 1`, from top to bottom, consists of `1 x n` and `1 by 1`.


    **Figure 1-24** Asymmetric convolutions


    Another important addition to the model architecture were the auxiliary classifiers.
    They were designed to work on the vanishing gradient issue for deep neural networks.
    This portion of the network acts as a regularizer to the model, in addition to
    the batch normalization and dropouts used. The auxiliary classifier helps the
    model enhance accuracy toward the end of the training compared to the ones that
    didn’t have such branch outs. Figure [1-25](#520381_1_En_1_Chapter.xhtml#Fig32)
    shows an auxiliary network branching out.


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig32_HTML.jpg)


    A diagram of an auxiliary network. `17 by 17 by 768` forms `8 by 8 by 1280` through
    inception which in turn forms an output consisting of 3 dots, and `5 by 5 by 768`
    through `5 by 5` average pooling with stride 3. `5 by 5 by 768` forms `5 by 5
    by 128` through `1 by 1` convolution, which in turn forms `1 by 1 by 1024` through
    fully connected.


    **Figure 1-25** An auxiliary network


    When pooling is applied to an information grid with channels, it is suggested
    that we increase the number of feature maps according to the reduction we are
    looking for. Since the information is spatially distributed, we might want to
    fix the volume of information rather than cutting it off. Imagining a semi-solid
    cuboid will help here. If we have to reduce the face, we have to elongate in one
    direction. In our case, it will be the depth. Figure [1-26](#520381_1_En_1_Chapter.xhtml#Fig33)
    shows the grid-reduction technique used in inception architecture. The parallel
    architecture envisions using pooling and convolutions in parallel and concatenating
    them.


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig33_HTML.jpg)


    The first diagram consists of a base branching to 2 `1 by 1` grid, and pool stride
    2. `1 by 1` grid forms `3 by 3` stride 1 and stride 2, which finally forms an
    output if filter concat. The second diagram consists of `35 by 35 by 320`, converging
    and pooling to form `17 by 17 by 320`, which converges by concat to form `17 by
    17 by 640`.


    **Figure 1-26** Inception architecture snapshot


    Inception architecture first used stochastic gradient decent with momentum but
    later used `RMSProp` to train the model, which achieved better accuracies.


    ## Working with Deep Learning Model Techniques


    So far, we have covered the widely used CNN-based models. There are various ways
    to model architectures for all-purpose computer vision tasks. Let’s now discuss
    a few important concepts that will be useful in the next chapters when we explore
    multiple problems hands-on.


    ### Batch Normalization


    There is an inherent problem that pops up when training a deep neural network.
    During the training process, the input distribution of the layers is affected
    to an extent of adopting a different distribution because of the layers from which
    the inputs are flowing. The gradients affect the weights and those, in turn, have
    cascading effects on the distributions. This phenomenon is called an *internal
    covariate shift.* For training deep neural networks using `SGD`, mini-batch gradient
    descent is often used. This process reduces the computational requirements at
    one level and given the mini-batch a representation from the original input, the
    level of training is good.


    Batch normalization is used generally after convolution operations. It can be
    used after or before a `ReLU` activation layer, but it is never used after the
    last layer of the architecture. It enhances the features extracted after each
    layer. Let’s look at an example. Consider an arbitrary layer that has 64 channels
    and 16 images in one batch. In this scenario, we will be using 16 images to normalize
    each channel in 64 to get our output.


    In the first step of batch normalization, we are trying to shift the data by the
    mean of the batch and then scale it by the standard deviation of the batch, which
    corresponds to the channels in the batch. In the second step, we are multiplying
    the resultant by `γ` and another parameter `β` is added to it. These parameters
    help the neural network determine whether the batch normalization is required
    and to what extent such features are significant in the next layers. This helps
    with the flow of gradients and eventually with training.


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Figa_HTML.png)


    Two mathematical equations. The first: `x_caret = (x - mu) / sigma`. The second:
    `Output_BN = x_caret * gamma + beta`.


    - `x` – Original input

    - `μ` - Mean of mini-batch – non-trainable parameters

    - `σ` – Standard deviation from mini-batch – non-trainable parameters

    - `γ`, `β` – Parameters normalizing the effects – trainable parameters


    Thus, batch normalization incorporates additional trainable parameters into the
    model architecture.


    Ghost batch normalization is a recent development related to batch normalization.
    This concept is legitimate when we are training in a single GPU and the single
    GPU has one batch filled in. There can be an issue with the training if someone
    is using multiple GPUs. Ghost batch normalization helps in the scenario. It will
    use the GPU as a pivot and will calculate a sample mean and standard deviation
    to calculate the normalization. This regularizes the data as well, given the fact
    it is working on a smaller sample size. The randomness in the distribution of
    images due to the use of multiple GPUs will change the loss function to an extent.
    Batch normalization has proven to be a great mechanism for models to go deeper;
    it provides manifold benefits to modern-day architectures.'
