    - **Mask R-CNN。** 该过程扩展了 Faster R-CNN，并在图像上执行物体检测和生成掩码。

    - **RetinaNet。** 这篇论文在准确性和速度方面对两阶段检测器进行了一些惊人的改进。它利用*焦点损失*这一新概念来处理所有这些问题。

    - **单次检测器（SSD）。** 该论文解释了如何为默认边界框生成物体性分数，并根据物体对其进行优化。


