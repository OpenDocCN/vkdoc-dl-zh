    We can analyze if there is any movement in a restricted or sensitive area by detecting
    a person moving using video processing. This way, a live person doesn''t have
    to keep looking at security footage 24*7\. If there is any movement at all, the
    system can alert responsible security.


    Models can be trained to predict an adverse event. Continuously monitoring for
    events using such software will save many personnel hours as well as decrease
    security risks.


    Let''s look at the second video we uploaded and detect movement in it.


    ```

