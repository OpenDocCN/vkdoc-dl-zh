  trans: '

    ### 模型的第三种变体


    在本节中，我们将审视已建立的工作流程并对其进行改进。该模型架构运行着 11 个卷积块和 3 个最大池化层。各层之间可能存在分布变化，即所谓的内部协变量偏移。现在，我们可以尝试在网络架构中应用批归一化。


    如前文所述，批归一化可调节层内传递输入的分布。这种分布变化会对所有后续层产生级联效应。


    我们将在每个层定义之后，以及来自该块的所有通道上尝试使用批归一化。如果一个卷积块有 16 个输出通道，那就意味着我们需要对所有 16 个通道进行批归一化。到目前为止，我们已在计算机视觉分类器模型中实现了所有功能，如图
    2-8 所示。我们将在此工作流程的顶部添加批归一化，并保留上一次迭代中的所有内容。图中的绿色块已经完成；我们将整合蓝色块（批归一化）的更改。


    ![](img/520381_1_En_2_Fig8_HTML.png)


    流程图展示了图像分类的机制：数据摄取、数据检查、创建数据加载器、考虑数据增强、定义模型、验证模型架构、定义训练和测试函数、定义训练过程、运行训练迭代以及检查验证结果。批归一化发生在定义模型阶段。


    **图 2-8** 带有批归一化的图像分类流水线


    让我们来看看该模型的代码块：


    ```python

    class Net(nn.Module):

    def __init__(self):

    super(Net, self).__init__()

    # 输入块

    self.convblock1 = nn.Sequential(

    nn.Conv2d(in_channels=3, out_channels=8, kernel_size=(3, 3),

    padding=0, bias=False),

    nn.ReLU(),

    nn.BatchNorm2d(8)

    )

    self.pool11 = nn.MaxPool2d(2, 2)

    # 卷积块 1

    self.convblock2 = nn.Sequential(

    nn.Conv2d(in_channels=8, out_channels=16, kernel_size=(3, 3),

    padding=0, bias=False),

    nn.ReLU(),

    nn.BatchNorm2d(16)

    )

    self.pool22 = nn.MaxPool2d(2, 2)

    self.convblock3 = nn.Sequential(

    nn.Conv2d(in_channels=16, out_channels=10, kernel_size=(1, 1), padding=0, bias=False),

    nn.ReLU(),

    nn.BatchNorm2d(10),

    )

    self.pool33 = nn.MaxPool2d(2, 2)

    # 卷积块 2

    self.convblock4 = nn.Sequential(

    nn.Conv2d(in_channels=10, out_channels=10, kernel_size=(3, 3), padding=0, bias=False),

    nn.ReLU(),

    nn.BatchNorm2d(10)

    )

    self.convblock5 = nn.Sequential(

    nn.Conv2d(in_channels=10, out_channels=32, kernel_size=(1, 1), padding=0, bias=False),

    nn.ReLU(),

    nn.BatchNorm2d(32),

    )

    self.convblock6 = nn.Sequential(

    nn.Conv2d(in_channels=32, out_channels=10, kernel_size=(1, 1), padding=0, bias=False),

    nn.ReLU(),

    nn.BatchNorm2d(10),

    )

    self.convblock7 = nn.Sequential(

    nn.Conv2d(in_channels=10, out_channels=10, kernel_size=(3, 3), padding=0, bias=False),

    nn.ReLU(),

    nn.BatchNorm2d(10)

    )

    self.convblock8 = nn.Sequential(

    nn.Conv2d(in_channels=10, out_channels=32, kernel_size=(1, 1), padding=0, bias=False),

    nn.ReLU(),

    nn.BatchNorm2d(32)

    )

    self.convblock9 = nn.Sequential(

    nn.Conv2d(in_channels=32, out_channels=10, kernel_size=(1, 1), padding=0, bias=False),

    nn.ReLU(),

    nn.BatchNorm2d(10)

    )

    self.convblock10 = nn.Sequential(

    nn.Conv2d(in_channels=10, out_channels=14, kernel_size=(3, 3), padding=0, bias=False),

    nn.ReLU(),

    nn.BatchNorm2d(14)

    )

    self.convblock11 = nn.Sequential(

    nn.Conv2d(in_channels=14, out_channels=16, kernel_size=(3, 3), padding=0, bias=False),

    nn.ReLU(),

    nn.BatchNorm2d(16)

    )

    # 输出块

    self.gap = nn.Sequential(

    nn.AvgPool2d(kernel_size=4)

    )

    self.convblockout = nn.Sequential(

    nn.Conv2d(in_channels=16, out_channels=2, kernel_size=(4, 4), padding=0, bias=False),

    )

    def forward(self, x):

    x = self.convblock1(x)

    x = self.pool11(x)

    x = self.convblock2(x)

    x = self.pool22(x)

    x = self.convblock3(x)

    x = self.pool33(x)

    x = self.convblock4(x)

    x = self.convblock5(x)

    x = self.convblock6(x)

    x = self.convblock7(x)

    x = self.convblock8(x)

    x = self.convblock9(x)

    x = self.convblock10(x)

    x = self.convblock11(x)

    x = self.gap(x)

    x = self.convblockout(x)

    x = x.view(-1, 2)

    return F.log_softmax(x, dim=-1)

    ```


    一旦我们将批归一化添加到模型块中，准确率便随之提升。测试准确率在第十个 epoch 达到峰值，接近 90%。此后，准确率一直保持在 85%左右，直到第十五个
    epoch。这对于理解不同类别之间的差异来说，是一个巨大的进步。


    还有一点需要检查。对于相同的处理器，我们预计每个 epoch 的时间消耗会更高，但考虑到它所带来的准确率提升幅度，这种增加不应显著到足以造成麻烦。让我们来看看由`torch`的
    summary 函数描述的模型定义。

    '
