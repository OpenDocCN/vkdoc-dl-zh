    \ 轮的损失值、批次标识号、准确率、当前学习率、测试集、平均损失和准确率。\n\n**图 2-4**  \n输出结果的快照\n\n代码块的输出将生成训练信息，例如训练和测试损失，并显示准确率。我们记录下最高的准确率，并最终希望仅在该点保存模型权重。\n\
    \n这种方法可能没有给我们带来最佳结果，但它建立了一个工作流程，我们将利用这个流程逐步获得更好的准确率。在这个模型中，我们在测试数据集上获得了非常低的准确率，仅为\
    \ 38%。让我们分析测试和训练数据的损失模式，以找出问题所在。\n\n用于生成损失可视化的代码片段如下：\n\n```\ntrain_losses1 =\
    \ [float(i.cpu().detach().numpy()) for i in train_losses]\ntrain_acc1 = [i for\
    \ i in train_accuracies]\ntest_losses1 = [i for i in test_losses]\ntest_acc1 =\
    \ [i for i in test_accuracies]\nfig, axs = plt.subplots(2,2,figsize=(16,10))\n\
    axs[0, 0].plot(train_losses1,color='green')\naxs[0, 0].set_title(\"Training Loss\"\
    )\naxs[1, 0].plot(train_acc1,color='green')\naxs[1, 0].set_title(\"Training Accuracy\"\
    )\naxs[0, 1].plot(test_losses1)\naxs[0, 1].set_title(\"Test Loss\")\naxs[1, 1].plot(test_acc1)\n\
    axs[1, 1].set_title(\"Test Accuracy\")\n```\n\n输出结果如图 2-5 所示。\n\n![](img/520381_1_En_2_Fig5_HTML.png)\n\
    \n四个趋势图显示了训练损失、训练准确率、测试损失和测试准确率。代表训练损失和训练准确率的线条在波动。测试损失用一条下降的线表示，测试准确率用一条上升的线表示。\n\
    \n**图 2-5**  \n训练后的预期输出\n\n从图 2-5 中，我们可以看到，尽管测试准确率随着迭代次数的增加而提高，损失也在持续下降，但尚未达到理想状态。训练损失表明模型在实时运行中非常不稳定。是时候重新思考这种方法，并在此工作流程的基础上进行改进了。\n\
    \n## 模型的第二种变体\n\n让我们从数据增强开始，看看准确率是否有变化。有多种增强过程；我们应该选择最符合我们业务需求的那一种。我们需要小心，因为过多的增强可能会对优化产生影响。\n\
    \n让我们尝试一些基本的增强方法，例如：\n\n*   使用颜色抖动来增强训练数据。\n*   随机翻转训练数据。\n*   随机旋转训练样本。\n\n我们不会遍历整个代码示例，因为我们保持工作流程的主体部分不变，只更改选定的部分。\n\
    \n![](img/520381_1_En_2_Fig6_HTML.png)\n\n一个流程图展示了图像分类的机制。数据流程如下：数据摄取、数据检查、创建数据加载器、考虑增强、定义模型、验证模型架构、定义训练和测试函数、定义训练过程、运行训练迭代、检查验证。其中“考虑增强”被高亮显示。\n\
    \n**图 2-6**  \n更新了增强功能的图像分类流程\n\n到目前为止，我们已经实现了图 2-6 中绿色的模块。在这个变体中，我们重点关注以蓝色高亮显示的模块（考虑增强），这是我们特意保留的。这将有助于我们衡量增强技术的影响。\n\
    \n让我们看一下增强代码块：\n\n```\ntrain_transform = transforms.Compose([\ntransforms.Resize(224),\n\
    transforms.CenterCrop(224),\ntransforms.ColorJitter(brightness=0.10, contrast=0.1,\
    \ saturation=0.10, hue=0.1),\ntransforms.RandomHorizontalFlip(),\ntransforms.RandomRotation(10),\n\
    transforms.ToTensor(),\ntransforms.Normalize([0.485, 0.456, 0.406],\n[0.229, 0.224,\
    \ 0.225])\n])\ntest_transform = transforms.Compose([\ntransforms.Resize(224),\n\
    transforms.CenterCrop(224),\ntransforms.ToTensor(),\ntransforms.Normalize([0.485,\
    \ 0.456, 0.406],\n[0.229, 0.224, 0.225])\n])\n```\n\n增强过程被整合在`Compose`函数本身中，因此我们不需要更改代码的数据加载器部分。我们将重用`Compose`函数中的确切代码过程，并在迭代中运行它。\n\
    \n通过数据增强，我们在第五轮达到了 80% 的准确率，但随后在训练过程中准确率下降了。这表明了训练过程的不稳定性。损失出现了一个峰值。训练准确率的图也显示了这些波动。这是由于数据中的增强以及模型无法有效识别这些变化所致。\n\
    \n![](img/520381_1_En_2_Fig7_HTML.png)\n\n四个趋势图显示了训练损失、训练准确率、测试损失和测试准确率。训练损失除了在\
    \ 2700 处外均为零，训练准确率持续波动。测试损失在 4 处下降后恢复正常，测试准确率持续上升至 4 后下降。\n\n**图 2-7**  \n增强训练流程的输出\n\
    \n图 2-7 显示了这些高准确率下降到大约 42%。当我们将此工作流程的准确率与早期版本的结果进行比较时，我们发现该工作流程在数据增强下表现更好。\n\n\
    准确率在饱和时仍然很低，并且考虑到波动性，模型行为不能被认为是稳定的。我们需要进行进一步的更改，寻找一个更好、更稳定的模型。\n"
- fmt: '### The Third Variation of the Model


    In this section, we consider the established workflow and make amends to it. The
    model architecture is running with 11 convolution blocks and three max pooling
    layers. There can be variations in the distributional changes in the layers, also
    known as internal covariate shifts. We can now try to apply batch normalization
    in the network architecture.


    Batch normalization, as discussed in the earlier chapter, modulates the distributions
    of the passing input within the layers. The change in distributions has a cascading
    effect on all the layers preceding it.


    We will try to use batch normalization after every layer definition and across
    all the channels from the block. If we have a convolution block with 16 output
    channels, that means we need batch normalization on all 16 channels. So far we
    have accomplished all the functionalities in the computer vision classifier model,
    as shown in Figure [2-8](#520381_1_En_2_Chapter.xhtml#Fig8). We will add batch
    normalization to the top of this workflow and keep everything carried forward
    from the last iteration. The green blocks in the figure are already done; we will
    incorporate the blue block changes (Batch Normalization).


    ![](images/520381_1_En_2_Chapter/520381_1_En_2_Fig8_HTML.png)


    A flowchart displays the mechanism for image categorization as data ingestion,
    data check, create data loader, think augmentation, define model, validate model
    architecture, define training and test functions, define training process, run
    training iterations, and check for validation. Batch normalization occurs at define
    model.


    **Figure 2-8** Image classification pipeline with batch normalization


    Let’s look at the code block for this model:


    ```python

    class Net(nn.Module):

    def __init__(self):

    super(Net, self).__init__()

    # Input Block

    self.convblock1 = nn.Sequential(

    nn.Conv2d(in_channels=3, out_channels=8, kernel_size=(3, 3),

    padding=0, bias=False),

    nn.ReLU(),

    nn.BatchNorm2d(8)

    )

    self.pool11 = nn.MaxPool2d(2, 2)

    # CONVOLUTION BLOCK 1

    self.convblock2 = nn.Sequential(

    nn.Conv2d(in_channels=8, out_channels=16, kernel_size=(3, 3),

    padding=0, bias=False),

    nn.ReLU(),

    nn.BatchNorm2d(16)

    )

    self.pool22 = nn.MaxPool2d(2, 2)

    self.convblock3 = nn.Sequential(

    nn.Conv2d(in_channels=16, out_channels=10, kernel_size=(1, 1), padding=0, bias=False),

    nn.ReLU(),

    nn.BatchNorm2d(10),

    )

    self.pool33 = nn.MaxPool2d(2, 2)

    # CONVOLUTION BLOCK 2

    self.convblock4 = nn.Sequential(

    nn.Conv2d(in_channels=10, out_channels=10, kernel_size=(3, 3), padding=0, bias=False),

    nn.ReLU(),

    nn.BatchNorm2d(10)

    )

    self.convblock5 = nn.Sequential(

    nn.Conv2d(in_channels=10, out_channels=32, kernel_size=(1, 1), padding=0, bias=False),

    nn.ReLU(),

    nn.BatchNorm2d(32),

    )

    self.convblock6 = nn.Sequential(

    nn.Conv2d(in_channels=32, out_channels=10, kernel_size=(1, 1), padding=0, bias=False),

    nn.ReLU(),

    nn.BatchNorm2d(10),

    )

    self.convblock7 = nn.Sequential(

    nn.Conv2d(in_channels=10, out_channels=10, kernel_size=(3, 3), padding=0, bias=False),

    nn.ReLU(),

    nn.BatchNorm2d(10)

    )

    self.convblock8 = nn.Sequential(

    nn.Conv2d(in_channels=10, out_channels=32, kernel_size=(1, 1), padding=0, bias=False),

    nn.ReLU(),

    nn.BatchNorm2d(32)

    )

    self.convblock9 = nn.Sequential(

    nn.Conv2d(in_channels=32, out_channels=10, kernel_size=(1, 1), padding=0, bias=False),

    nn.ReLU(),

    nn.BatchNorm2d(10)

    )

    self.convblock10 = nn.Sequential(

    nn.Conv2d(in_channels=10, out_channels=14, kernel_size=(3, 3), padding=0, bias=False),

    nn.ReLU(),

    nn.BatchNorm2d(14)

    )

    self.convblock11 = nn.Sequential(

    nn.Conv2d(in_channels=14, out_channels=16, kernel_size=(3, 3), padding=0, bias=False),

    nn.ReLU(),

    nn.BatchNorm2d(16)

    )

    # OUTPUT BLOCK

    self.gap = nn.Sequential(

    nn.AvgPool2d(kernel_size=4)

    )

    self.convblockout = nn.Sequential(

    nn.Conv2d(in_channels=16, out_channels=2, kernel_size=(4, 4), padding=0, bias=False),

    )

    def forward(self, x):

    x = self.convblock1(x)

    x = self.pool11(x)

    x = self.convblock2(x)

    x = self.pool22(x)

    x = self.convblock3(x)

    x = self.pool33(x)

    x = self.convblock4(x)

    x = self.convblock5(x)

    x = self.convblock6(x)

    x = self.convblock7(x)

    x = self.convblock8(x)

    x = self.convblock9(x)

    x = self.convblock10(x)

    x = self.convblock11(x)

    x = self.gap(x)

    x = self.convblockout(x)

    x = x.view(-1, 2)

    return F.log_softmax(x, dim=-1)

    ```


    Once we add batch normalization to the model block, the accuracies move up the
    ladder. The test accuracy reached its max in the tenth epoch, where it was almost
    90%. Following that, the accuracies stayed around 85% until the fifteenth epoch.
    This is a huge improvement in being able to understand the difference between
    the classes.


    There is one more thing to check. For the same processor, we expect the time consumption
    per epoch to be higher, but it should not be significant enough to cause trouble,
    given the amount of increase in accuracy it is handing over. Let’s look at the
    model definition as described by the summary function from `torch`.'
