    # 10. Explainable AI for Computer Vision


    Most machine learning and deep learning models lack a way of explaining and interpreting
    results. Due to the dynamic nature of deep learning models and increasing state-of-the-art
    models, the current model evaluation is based on accuracy scores. This makes machine
    learning and deep learning black-box models. This leads to lack of confidence
    in applying the model and lack of trust of the generated results. There are multiple
    libraries that help us explain models of structured data like `SHAP` and `LIME`.
    This chapter explains computer vision model outputs.


    Here are some of the white-box algorithms proposed in the recent years for computer
    vision:


    - `CAM`

    - `Grad-CAM`

    - `Grad-CAM++`

    - Layer-wise relevance propagation (`LRP`)

    - `SmoothGRAD`

    - `RISE`

    - Neural based decision trees (`NBDT`)


    This chapter focuses on `Grad-CAM`, `Grad-CAM++`, and `NBDT`. Before we proceed
    with the implementation, we take a deep dive into the following concepts.


    ## Grad-CAM


    Class activation maps (`CAM`) is a technique that extracts the heat maps that
    highlight the spatial information affecting the results. The `CAM` architecture
    is shown in Figures [10-1a](#520381_1_En_10_Chapter.xhtml#Fig1) and [10-1b](#520381_1_En_10_Chapter.xhtml#Fig2).


    ![](images/520381_1_En_10_Chapter/520381_1_En_10_Fig1_HTML.png)


    A flowchart of a `CAM` architecture. The steps are as follows. Input image, convolution,
    feature maps, global average pooling with weights, fully connected layer, and
    prediction. Weights and feature maps are highlighted.


    Figure 10-1a


    The `CAM` architecture


    The generated feature maps are passed through global average pooling to extract
    the weights. The weights are passed through a fully connected layer to output
    classification results.


    The highlighted sections in the architecture, i.e. the feature maps and weights,
    are used to generate the heat maps for the predicted class.


    Weighted sum of feature maps = ∑k (wk *Ak^(class))


    Where `k` represents the feature maps from the last convolution layer.


    `Grad-CAM` is similar to `CAM` until the feature maps generation step. After this
    step, any neural network can be added (such as `VGG`, `ResNet`, etc.), which can
    be differentiable to get back the gradients. Based on the prediction result, the
    gradients with respect to each feature map are calculated. Neuron importance (alpha
    values/ weights) are calculated for each feature map using “global average pooling”
    of gradients over the width and depth of feature map dimension (`i`,`j`). `Grad-CAM`
    architecture is shown in Figure [10-1b](#520381_1_En_10_Chapter.xhtml#Fig2). The
    highlighted components are multiplied to generate heat maps.


    ![](images/520381_1_En_10_Chapter/520381_1_En_10_Fig2_HTML.png)


    A flowchart of the `CAM` architecture. The steps are as follows. Input image,
    convolution feature maps, any neural network, prediction to gradients w.r.t each
    feature maps, weights of each feature map based on gradients.


    Figure 10-1b


    The `CAM` architecture


    ## Grad-CAM++


    This is similar to the `Grad-CAM` algorithm but differs in the back-propagation
    step. In simple terms, `Grad-CAM` uses first order gradients during back-propagation.
    In `Grad-CAM++`, second order gradients are used, thus making the process more
    sophisticated.


    In `Grad-CAM`, the feature maps with less spatial information are not given importance
    compared to the feature maps with high spatial information in the final heat maps.
    Images containing multiple objects or single objects can''t be detected in heat
    maps, leading to low accuracy and explainability.


    In `Grad-CAM++`, this issue is resolved by giving importance to all feature maps
    in the final heat maps. Figure [10-2](#520381_1_En_10_Chapter.xhtml#Fig3) shows
    the overall architecture.


    ![](images/520381_1_En_10_Chapter/520381_1_En_10_Fig3_HTML.png)


    A flowchart of the `Grad-CAM++` architecture. The steps are as follows. Input
    image with dark regions indicate presence of object; stacks of conv; feature maps
    `A` to the 1st, `A` squared and `A` cubed with dark regions indicate detection
    of abstract visual features; 2 sets of saliency map `L` to the `C` subscript `grad-cam`.


    Figure 10-2


    The `Grad-CAM++` architecture


    Figure [10-3](#520381_1_En_10_Chapter.xhtml#Fig4) shows the difference in the
    outcomes from `Grad-CAM` and `Grad-CAM++`.


    ![](images/520381_1_En_10_Chapter/520381_1_En_10_Fig4_HTML.jpg)


    A collage of nine images that represent three images each of a bird, dog, and
    a few green apples. The images are grouped as original, `E` to the `C` `grad-cam`,
    and `E` to the `C` `grad-cam++`. In `grad-cam` a few parts of an image is visible.
    In `grad-cam++` most parts of an image are visible.


    Figure 10-3


    Outcome from `Grad-CAM` and `Grad-CAM++`'
