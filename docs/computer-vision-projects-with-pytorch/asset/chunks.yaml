- fmt: '## NBDT


    This stands for neural based decision trees. Many algorithms are proposed for
    explainability of models, but the concept of results interpretability is missed.


    - **Explainability:** Understanding the internal mechanics of a model, i.e., how
    it works internally.

    - **Interpretability:** Understanding the cause and effect on the results, i.e.,
    on what basis particular results are generated.


    Decision trees are white-box models since they make it easy to understand how
    the nodes are split. This makes DT explainable. It is also easy to know the predicted
    output with respect to changes in inputs. This makes DT interpretable.


    The lagging point in DT is model accuracy when compared to deep learning models.
    NBDT has a built-in combination of decision trees (for explainability and interpretability)
    and neural networks (for accuracy). Figure [10-4](#520381_1_En_10_Chapter.xhtml#Fig5)
    shows the NBDT flow.


    ![](images/520381_1_En_10_Chapter/520381_1_En_10_Fig5_HTML.png)


    A flowchart of N B D T. The steps are as follows. Step 1 induced hierarchy. Step
    2. tree Sup. loss. Step 3 featuring using backbone. Step 4. embedded decision
    rules. Steps 1 and 2 are grouped as training. Steps 3 and 4 are grouped as inference.


    Figure 10-4: NBDT Flow


    ### Step 1


    This step trains a CNN model for image classification. Extract the weights for
    each class prediction (`w1`, `w2`,....), where `w1` represents the hidden weights
    vector for predicting class 1.


    The nearest vectors (also called leafs) are clustered to form the intermediate
    nodes. These intermediate nodes are clustered until the root node is reached.
    This hierarchy is called *induced hierarchy*. Following this, we converted NN
    to a DT.


    The names for the intermediate nodes are extracted based on the `WordNet` module.
    (For example, dog and cat are leaf nodes. An intermediate node could be “animal,”
    which is extracted from `WordNet`.)


    ### Step 2


    This step calculates the classification loss and fine tunes the model. Classification
    loss can be calculated using two modes.


    - Hard mode

    - Soft mode


    The difference between these two modes is shown in Figure [10-5](#520381_1_En_10_Chapter.xhtml#Fig6).


    ![](images/520381_1_En_10_Chapter/520381_1_En_10_Fig6_HTML.png)


    Three hierarchy charts labeled a to c. A is titled hard, and has 7 nodes with
    x as the top node and w 1 and 2 as level 2 nodes. 2. B s titled naive and has
    three nodes with x as top node, w 1 and 2 as level 2 nodes, and 4 question marks
    as nodes in bottom level. C is titled soft and has 7 nodes with x as top node
    and w 1 and 2 as level 2 nodes.


    Figure 10-5: Difference between hard mode and soft mode


    `Loss (Total) = Loss (original) + Loss (hard or soft)`


    The hard or soft loss is added to the original loss (from CNN) to get the final
    loss.


    ### Steps 3 and 4


    Based on the final loss calculated, the model is fine-tuned and the decision tree
    (hierarchy) is updated.


    ## Grad-CAM and Grad-CAM++ Implementation


    First we discuss Grad-CAM and Grad-CAM++ implementation on a single image, then
    we cover NBDT implementation on a single image.


    ### Grad-CAM and Grad-CAM++ Implementation on a Single Image


    Step 1: Perform an image transformation on the input image (see Figure [10-6](#520381_1_En_10_Chapter.xhtml#Fig7)).


    ![](images/520381_1_En_10_Chapter/520381_1_En_10_Fig7_HTML.jpg)


    A photograph of two brown cats on the grass with yellow eyes and yellow fur.


