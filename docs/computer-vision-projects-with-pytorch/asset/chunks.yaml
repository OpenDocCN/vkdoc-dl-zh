    ## HRNet（高分辨率网络）


    这是一种自顶向下的方法。它首先使用 Faster-RCNN 识别图像中的人体，并在其周围设置边界框。然后利用 HRNet 架构生成高质量的特征图。最后在每个边界框内识别关键点。


    **动机：**


    1.  以往所有模型（AlexNet、GoogleNet、ResNet 和 DenseNet）都是基于图像分类卷积架构开发的，导致输出分辨率低且对位置不敏感。在这些架构中，可以通过使用空洞卷积来提高低分辨率，但这会增加计算时间。


    2.  上采样是解决此问题的另一种方法。U-Net、SegNet、DeConvNet 和 Hourglass 模型都使用了上采样技术。在该技术中，阶段 1
    的输入图像被转换为低分辨率以进行分类。在阶段 2，通过顺序连接的卷积从低分辨率恢复高分辨率图像。但是，从低分辨率完全恢复高分辨率是不可能的，并且表示的位置敏感性较弱。


    HRNet 是一种用于视觉识别的通用架构。其架构不基于任何使用串联卷积的分类网络。在 HRNet 架构中，多个分辨率的卷积通过使用上采样和下采样技术进行重复融合，以并行方式连接。该网络从头到尾都保持高分辨率表示。各分辨率之间的重复融合增强了高分辨率和低分辨率表示。高分辨率卷积通过一种称为“步长卷积”的下采样技术转换为低分辨率卷积。低分辨率卷积通过“双线性上采样”技术转换为高分辨率卷积。高分辨率分支保留空间信息，低分辨率分支保留上下文信息。图
    6-5、6-6 和 6-7 展示了 HRNet 的详细架构。


    ![](img/520381_1_En_6_Fig5_HTML.png)


    一个包含三行的示意图。从上到下，从左到右：第一行有一个标记为 `1x` 的箭头，旁边是由右箭头连接的 11 个直立块。第二行以 `2x` 开始，其后是由箭头连接的
    9 个直立块。第三行以 `4x` 开始，其后是由右箭头连接的 5 个直立块。


    **图 6-5** HRNet 架构，第一部分


    **主要观察：**


    *   在分类中，卷积是串联放置的。但在 HRNet 中，卷积是并行放置的。

    *   对于上采样，使用双线性函数而不是卷积（由于时间复杂性）。

    *   使用步长卷积对高分辨率图像进行下采样（以避免信息丢失）。


    阶段 2、3 和 4 中的块数分别为 1、4 和 3。这些数字（根据作者的说法）并未得到充分优化。由于 HRNet 中通道数减少，其参数和计算复杂度并不高于
    ResNet。由于该架构是一个多分辨率网络，输出在所有分辨率（高、中、低）下都会产生。对于人体姿态估计（HPE），仅使用高分辨率通道的输出。对于语义分割和人脸对齐，则使用所有分辨率的输出。


    ![](img/520381_1_En_6_Fig7_HTML.jpg)


    两个并排的示意图，分别标记为常规卷积和多分辨率卷积。从左到右：图 1 有 2 组由右箭头连接的 4 个连接块，一个三杠等号，以及一个由箭头互连的两列四行块系列；图
    2 有一个带箭头的两列四行块系列。


    **图 6-7** HRNet 架构，第三部分


    ![](img/520381_1_En_6_Fig6_HTML.png)


    一个分为 4 段的示意图，从左到右依次为：段 1，一行 5 个块；段 2，两行，每行 5 个块；段 3，三行，每行 5 个块，以及第四行 1 个块；段 4，四行，每行
    5 个块。块之间由箭头连接。这些块代表通道图，箭头代表残差单元。


    **图 6-6** HRNet 架构，第二部分

