- fmt: '# Fine-Tuning the Model


    Using a pretrained model can get predictions if we are working in a domain that
    has classes that have been labeled and trained by the researchers. If it’s closely
    related but we don’t have the exact classes, we can expect variations. This is
    one of the most important reasons to train and classify for our project.


    In this section, we explore the code and explain in detail the necessary steps
    for fine-tuning an existing model to enhance the predictive power of the model
    to suit our purposes. As we have established, segmentation includes additional
    capabilities to the ones that can identify classes in an image.


    The problem set that we will be using is an open source dataset found at [`https://www.cis.upenn.edu/~jshi/ped_html/PennFudanPed.zip`](https://www.cis.upenn.edu/%257Ejshi/ped_html/PennFudanPed.zip).


    This dataset contains pedestrian data, which we will be fine-tuning. Various use
    cases use segmentation as an output to determine the decision steps. Identifying
    pedestrians is an important use case for self-driving cars when making the decision
    as to which direction they need to move in a split second. For these reasons,
    accuracies also need to be high enough for these models.


    Let’s look through the basic imports for the process flow.


    The project setup stands to be one of the most decisive parts of any project.
    In this project, we can use a Jupyter notebook instance or a Colab notebook for
    training purposes.


    First, we download the dataset from the source using the `wget` command.


    ```

    ## extracting traffic data

    !wget https://www.cis.upenn.edu/~jshi/ped_html/PennFudanPed.zip .

    !unzip PennFudanPed.zip

    ```


    The exclamation point (`!`) helps the Colab cells identify those as shell scripts.
    Once downloaded, the `unzip` command unzips the package. One thing to notice is
    that the commands are Linux based and the backend OS is also assumed to be Linux.


    Once we have the dataset in our system, we can run the basic `import`s that are
    required for the project.


    ```

    ## basic imports

    import os

    import numpy as np

    ## torch imports

    import torch

    import torch.utils.data

    from torch.utils.data import Dataset

    ## torchvision imports

    import torchvision

    import torchvision.transforms as T

    from torchvision.models.detection.faster_rcnn import FastRCNNPredictor

    from torchvision.models.detection.mask_rcnn import MaskRCNNPredictor

    ## image utilities

    from PIL import Image

    import matplotlib.pyplot as plt

    ## code utilities

    import random

    import cv2

    ```


    Note that we are importing Torch and Torchvision-related packages. We are also
    getting MaskRCNN and FasterRCNN pretrained models. Let’s now import the PyTorch
    basic training framework. This will help us extend the functions and avoid rewriting
    complex code.


    ```

    ## clone the PyTorch repository to setup exact directory structures as the original
    trained

    !git clone https://github.com/pytorch/vision.git

    %cd vision

    !git checkout v0.3.0

    !cp references/detection/engine.py ../

    !cp references/detection/transforms.py ../

    !cp references/detection/utils.py ../

    !cp references/detection/coco_utils.py ../

    !cp references/detection/coco_eval.py ../

    ```


    Once we have the basic framework ready, we will be copying the important Python
    scripts that we will be using, such as the `engine`, `transforms`, `utils`, `coco_utils`,
    and `coco_eval`.


    Once these imports are done and we have verified that the files are on the same
    infrastructure where we are running the code, we can run a few more `import`s.


    ```

    ## imports from the PyTorch repo

    import utils

    import transforms as T

    from engine import train_one_epoch, evaluate

    ```


    These imports are based on the code in the PyTorch training framework and scripts.
    Once this is done, let’s look at the creation of the custom dataset class required
    to fine-tune the models.


    ```

    class CustomDataset(Dataset):

    def __init__(self, dir_path, transforms=None):

    ## initializing object attributes

    self.transforms = transforms

    self.dir_path = dir_path

    ## from dir_path

    ## added list of masks from the PedMasks directory

    self.mask_list = list(sorted(os.listdir(os.path.join(dir_path, "PedMasks"))))

    ## added list of actual images from directory lists

    self.image_list = list(sorted(os.listdir(os.path.join(dir_path, "PNGImages"))))

    def __getitem__(self, idx):

    # get images and mask

    img_path = os.path.join(self.dir_path, "PNGImages", self.image_list[idx])

    mask_path = os.path.join(self.dir_path, "PedMasks", self.mask_list[idx])

    image_obj = Image.open(img_path).convert("RGB")

    mask_obj = Image.open(mask_path)

    mask_obj = np.array(mask_obj)

    obj_ids = np.unique(mask_obj)

    # background has the first id so excluding that

    obj_ids = obj_ids[1:]

    # splitting mask into binaries

    masks_obj = mask_obj == obj_ids[:, None, None]

    # bounding box

    num_objs = len(obj_ids)

    bboxes = []

    for i in range(num_objs):

    pos = np.where(masks_obj[i])

    xmax = np.max(pos[1])

    xmin = np.min(pos[1])

    ymax = np.max(pos[0])

    ymin = np.min(pos[0])

    bboxes.append([xmin, ymin, xmax, ymax])

    image_id = torch.tensor([idx])

    masks_obj = torch.as_tensor(masks_obj, dtype=torch.uint8)

    bboxes = torch.as_tensor(bboxes, dtype=torch.float32)

    labels = torch.ones((num_objs,), dtype=torch.int64)

    area = (bboxes[:, 3] - bboxes[:, 1]) * (bboxes[:, 2] - bboxes[:, 0])

    iscrowd = torch.zeros((num_objs,), dtype=torch.int64)

    target = {}

    target["image_id"] = image_id

    target["masks"] = masks_obj

    target["boxes"] = bboxes

    target["labels"] = labels

    target["area"] = area

    target["iscrowd"] = iscrowd

    if self.transforms is not None:

    image_obj, target = self.transforms(image_obj, target)

    return image_obj, target

    def __len__(self):

    return len(self.image_list)

    ```


    Custom dataset creation is one standard technique to incorporate the newer dataset
    into the training pipeline. The important points to look for in the code are as
    follows:


    - We are extending the `Dataset` class from PyTorch.

    - We are defining three important functions to the class—`initialization`, `get_item`,
    and `len`.

    - We are initializing transforms, which can be different for testing, validation,
    and training.

    - We are defining the bounding boxes.

    - We are defining the target.


    Once we are done with the dataset creation, we have to modify the model according
    to the new data. Let’s look at the code for that.


    ```

    def modify_model(classes_num):

    # model already trained on COCO loaded from PyTorch repository

    maskrcnn_model = torchvision.models.detection.maskrcnn_resnet50_fpn(pretrained=True)

    # number of input features identification

    in_features = maskrcnn_model.roi_heads.box_predictor.cls_score.in_features

    # head is changed

    maskrcnn_model.roi_heads.box_predictor = FastRCNNPredictor(in_features, classes_num)

    in_features_mask = maskrcnn_model.roi_heads.mask_predictor.conv5_mask.in_channels

    hidden_layer = 256

    maskrcnn_model.roi_heads.mask_predictor = MaskRCNNPredictor(in_features_mask,

    hidden_layer,

    num_classes)

    return maskrcnn_model

    ```


    These steps change the head configuration of the model. After this, we will try
    to get transformations on the data. This will prepare the data for training.'
