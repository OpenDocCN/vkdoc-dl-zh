    ## 引言


    本书探讨了计算机视觉领域的多种流行方法，旨在揭开其神秘面纱。我们使用`PyTorch`框架，因为它被研究人员、开发者和初学者广泛用于利用深度学习的力量。本书探讨了多个计算机视觉问题，并向您展示如何解决它们。您将了解到一些最关键的挑战，并附有适合初级和中级
    Python 用户的`PyTorch`实践代码，以及用于解决这些业务问题的各种方法。


    与我们在本书中介绍的重要概念相关的生产级代码将帮助您快速上手。这些代码片段可以在本地系统上运行，无论是否配备 GPU（图形处理器），也可以在云平台上运行。


    我们将分阶段向您介绍图像处理的概念，从第一章的计算机视觉基础概念开始。我们还将深入深度学习领域，并解释如何为视觉相关任务开发模型。您将快速了解`PyTorch`，为本书后续章节中介绍的示例业务挑战做好准备。我们探讨了革命性的卷积神经网络的概念，以及诸如`VGG`、`ResNet`、`YOLO`、`Inception`、`R-CNN`等架构。


    本书深入探讨了与图像分类、目标检测和分割相关的业务问题。我们探索了超分辨率和 GAN 架构的概念，这些概念在许多行业中得到应用。您将学习图像相似度和姿态估计，这有助于处理无监督问题集。还有与视频分析相关的主题，这将帮助您培养利用基于图像和时间的帧概念进行思考的思维方式。此外，本书最后讨论了如何向业务合作伙伴解释这些深度学习模型。本书旨在成为那些致力于解决计算机视觉业务问题的人士的完整指南。


    ## 关于作者 关于技术审校


    # 1. 计算机视觉的构建模块


    几个世纪以来，人类一直处于自然进化模式之中。根据弗林效应，现代出生的普通人的智商高于上世纪出生的普通人。人类智能使我们能够学习、决策，并根据所学做出新的决定。我们使用智商分数来量化人类智能，但机器呢？机器也是这场进化旅程的一部分。我们是如何将焦点转向机器，并使其变得像今天这样智能的呢？让我们快速回顾一下这段历史。


    20 世纪 40 年代，可编程数字计算机的出现带来了突破，随后出现了*图灵测试*的概念，它可以衡量机器的智能。*感知机*的概念可以追溯到 1958 年，当时它被引入作为一种强大的逻辑单元，能够学习和预测。感知机相当于帮助人类运作的生物神经元。20
    世纪 70 年代，人工智能领域迅速发展，此后呈指数级增长。


    人工智能是机器展现出的智能，更多时候是在它根据历史事件进行训练之后。人类一生都在接受训练和条件反射。例如，我们知道离火太近会被烧伤，这很痛苦且对皮肤有害。同样，系统可以根据特征或历史证据进行训练，以区分火和水。人类智能正在被机器复制，这催生了我们所知的人工智能。


    人工智能包含机器学习和深度学习。机器学习可以被视为帮助算法从数据/历史事件中学习并制定决策过程的数学模型。机器学习数据的模式，使算法能够创建一个自我维持的系统。其性能可能存在局限性，例如在处理海量复杂数据时，这时深度学习就应运而生了。深度学习是人工智能的另一个子集。它利用感知机的概念，将其扩展到神经网络，并帮助算法从各种复杂数据中学习。尽管我们有许多建模技术可供使用，但正如*奥卡姆剃刀*（最简单的答案往往是最好的）所述，最好从最简单的技术中找到良好且可解释的结果。


    现在我们已经探索了一些历史，让我们浏览一下应用领域。有两个领域——自然语言处理（NLP）和计算机视觉（CV）——大量使用深度学习技术来帮助解决问题。NLP
    处理由我们的语言定义的问题集，语言本质上是最重要的交流方式之一。另一方面，CV 处理与视觉相关的问题。世界充满了人类可以通过感官解读的数据。这包括来自眼睛的视觉、来自鼻子的嗅觉、来自耳朵的声波、来自舌头的味觉以及来自皮肤的触觉。利用这些感官输入，我们大脑中连接的神经元解析和处理信息，以决定如何反应。计算机视觉是解决机器学习问题中视觉方面的一个领域。


    本书将带您了解基础知识，并为您提供计算机视觉的实用知识。


    ## 什么是计算机视觉


    计算机视觉处理依赖于图像和视频的特定问题集。它试图解读图像/视频中的信息，以便做出有意义的决策。就像人类解析图像或一系列顺序排列的图像并做出决策一样，CV
    帮助机器解释和理解视觉数据。这包括目标检测、图像分类、图像恢复、场景到文本生成、超分辨率、视频分析和图像跟踪。每个问题都有其自身的重要性。在并行计算能力出现之后，研究视觉相关问题获得了极大的关注。


    ### 应用


    计算机视觉的应用因所讨论的行业而异。以下各节将介绍其中的一些任务。

    '
- fmt: "### Classification\n\nThe simplest form of an image-related problem involving\
    \ a decision-making process is a supervised technique, called *classification*.\
    \ Classification simply involves assigning classes to different images. The process\
    \ can be as simple as an image having one class or it can more complex, when there\
    \ are multiple classes within the same image. See Figures [1-1](#520381_1_En_1_Chapter.xhtml#Fig1)\
    \ and [1-2](#520381_1_En_1_Chapter.xhtml#Fig2).\n\n![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig2_HTML.jpg)\n\
    \nA photograph of a furry dog resting on its belly on grass, with its mouth open,\
    \ and tongue outside. The photo depicts the class in this case, which is a dog.\n\
    \n**Figure 1-2**  \nThe class in this case is a dog\n\n![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig1_HTML.jpg)\n\
    \nA photograph of a cat in mid-air after having jumped. It has its paws outstretched.\n\
    \n**Figure 1-1**  \nThe class in this case is a cat\n\nWe can separate the content\
    \ of such images based on whether they have an image of a cat or a dog. This is\
    \ an example of how our eyes perceive differences. The background of the object\
    \ we are trying to classify does not matter, so we need to make sure that it doesn’t\
    \ matter in the algorithms as well. For example, if we included a logo of some\
    \ car company in front of all the dog images, the image classifier network might\
    \ learn to classify dogs based on that logo and use it as a shortcut. We later\
    \ describe in detail how to incorporate this information into the model. Classification\
    \ can be used to identify objects in a production line of a manufacturing unit.\n\
    \n### Object Detection and Localization\n\nAn interesting problem that is often\
    \ encountered is the need to locate a particular image inside another image and\
    \ even detect what that might be. Let’s say there is a crowd of people and some\
    \ are wearing masks and some are not. We can use a vision algorithm to learn the\
    \ features of masks, then use that information to locate a mask relative to the\
    \ image and detect the masks. See Figures [1-3](#520381_1_En_1_Chapter.xhtml#Fig3)\
    \ and [1-4](#520381_1_En_1_Chapter.xhtml#Fig4).\n\n![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig4_HTML.png)\n\
    \nA photograph of people in a park. A person leads two dogs with leashes in the\
    \ foreground, and another sits on a park bench in the background. Other people\
    \ are present in the background, obscured by the first person. The person in the\
    \ foreground wears a mask and a rectangle highlights their face.\n\n**Figure 1-4**\
    \  \nClass: A mask is detected in the image\n\n![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig3_HTML.jpg)\n\
    \nA photo of a man kneeling on the ground covered with grass. The person is holding\
    \ the collar around a dog's neck. The dog is sitting in front of the man. The\
    \ man is pointing his fingers in one direction, and the dog is also staring in\
    \ the same direction.\n\n**Figure 1-3**  \nClass: No mask detected\n\nThis analysis\
    \ can be helpful in detecting license plates of moving vehicles from traffic cameras.\
    \ Sometimes, due to the resolution of the cameras and the moving traffic, the\
    \ picture quality is not that great. Super-resolution is one technique that is\
    \ sometimes used to enhance an image’s quality and help identify the numbers on\
    \ the plate.\n\n#### Image Segmentation\n\nThis process is used to determine edges,\
    \ curves, and gradients of similar objects placed together in order to separate\
    \ different objects in an image. A classic unsupervised technique can be used\
    \ here without the worry of finding good-quality, labeled data. The processed\
    \ data can further be used as an input to an object detector. See Figure [1-5](#520381_1_En_1_Chapter.xhtml#Fig5).\n\
    \n![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig5_HTML.jpg)\n\nAn aerial photograph\
    \ of a topological map with different terrains and other landforms, with the design\
    \ of their separation and placement. The land areas are more abundant than the\
    \ water bodies. Narrow water bodies can be observed passing in between the land\
    \ forms.\n\n**Figure 1-5**  \nSeparating terrains in topological maps\n\n####\
    \ Anomaly Detection\n\nAnother classic, unsupervised way of determining changes\
    \ is to compare an image to the usual, expected patterns from some training data.\
    \ Anomaly detection can be used, for example, to determine imperfections in steel\
    \ pipes when compared to training data. If the machine finds something odd, it\
    \ will detect an anomaly and inform the line engineers to take care of it. See\
    \ Figures [1-6a](#520381_1_En_1_Chapter.xhtml#Fig6) and [1-6b](#520381_1_En_1_Chapter.xhtml#Fig7).\n\
    \n![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig7_HTML.jpg)\n\nA photograph,\
    \ of the zoomed-in view of steel pipes. The pipes are lying horizontally and aligned\
    \ one on top of the other. Anomalies on the surface of the pipes can be observed.\
    \ Vertical ridges are present on one end of the pipe.\n\n**Figure 1-6b**  \nAnomalies\
    \ showing up in the pipes\n\n![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig6_HTML.jpg)\n\
    \nA photograph of several steel pipes lying horizontally aligned one on top of\
    \ the other. One end of each pipe has ridges projecting outwards.\n\n**Figure\
    \ 1-6a**  \nPerfect examples of steel pipes\n\n#### Video Analysis\n\nThere are\
    \ a lot of use cases for video or sequences of images. The task of object detection\
    \ on running images can help with CCTV footage. It can also be used to detect\
    \ abnormalities within the frames per video section.\n\nWe will be going through\
    \ all of these applications in detail in the upcoming chapters. Before that, let’s\
    \ go through a few of the intrinsic concepts that lay the foundation for further\
    \ understanding computer vision."
  raw: '#### Classification


    The simplest form of an image-related problem involving a decision-making process
    is a supervised technique, called *classification*. Classification simply involves
    assigning classes to different images. The process can be as simple as an image
    having one class or it can more complex, when there are multiple classes within
    the same image. See Figures [1-1](#520381_1_En_1_Chapter.xhtml#Fig1) and [1-2](#520381_1_En_1_Chapter.xhtml#Fig2).


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig2_HTML.jpg)


    A photograph of a furry dog resting on its belly on grass, with its mouth open,
    and tongue outside. The photo depicts the class in this case, which is a dog.


    Figure 1-2


    The class in this case is a dog


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig1_HTML.jpg)


    A photograph of a cat in mid-air after having jumped. It has its paws outstretched.


    Figure 1-1


    The class in this case is a cat


    We can separate the content of such images based on whether they have an image
    of a cat or a dog. This is an example of how our eyes perceive differences. The
    background of the object we are trying to classify does not matter, so we need
    to make sure that it doesn’t matter in the algorithms as well. For example, if
    we included a logo of some car company in front of all the dog images, the image
    classifier network might learn to classify dogs based on that logo and use it
    as a shortcut. We later describe in detail how to incorporate this information
    into the model. Classification can be used to identify objects in a production
    line of a manufacturing unit.


    #### Object Detection and Localization


    An interesting problem that is often encountered is the need to locate a particular
    image inside another image and even detect what that might be. Let’s say there
    is a crowd of people and some are wearing masks and some are not. We can use a
    vision algorithm to learn the features of masks, then use that information to
    locate a mask relative to the image and detect the masks. See Figures [1-3](#520381_1_En_1_Chapter.xhtml#Fig3)
    and [1-4](#520381_1_En_1_Chapter.xhtml#Fig4).


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig4_HTML.png)


    A photograph of people in a park. A person leads two dogs with leashes in the
    foreground, and another sits on a park bench in the background. Other people are
    present in the background, obscured by the first person. The person in the foreground
    wears a mask and a rectangle highlights their face.


    Figure 1-4


    Class: A mask is detected in the image


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig3_HTML.jpg)


    A photo of a man kneeling on the ground covered with grass. The person is holding
    the collar around a dog''s neck. The dog is sitting in front of the man. The man
    is pointing his fingers in one direction, and the dog is also staring in the same
    direction.


    Figure 1-3


    Class: No mask detected


    This analysis can be helpful in detecting license plates of moving vehicles from
    traffic cameras. Sometimes, due to the resolution of the cameras and the moving
    traffic, the picture quality is not that great. Super-resolution is one technique
    that is sometimes used to enhance an image’s quality and help identify the numbers
    on the plate.


    ##### Image Segmentation


    This process is used to determine edges, curves, and gradients of similar objects
    placed together in order to separate different objects in an image. A classic
    unsupervised technique can be used here without the worry of finding good-quality,
    labeled data. The processed data can further be used as an input to an object
    detector. See Figure [1-5](#520381_1_En_1_Chapter.xhtml#Fig5).


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig5_HTML.jpg)


    An aerial photograph of a topological map with different terrains and other landforms,
    with the design of their separation and placement. The land areas are more abundant
    than the water bodies. Narrow water bodies can be observed passing in between
    the land forms.


    Figure 1-5


    Separating terrains in topological maps


    ##### Anomaly Detection


    Another classic, unsupervised way of determining changes is to compare an image
    to the usual, expected patterns from some training data. Anomaly detection can
    be used, for example, to determine imperfections in steel pipes when compared
    to training data. If the machine finds something odd, it will detect an anomaly
    and inform the line engineers to take care of it. See Figures [1-6a](#520381_1_En_1_Chapter.xhtml#Fig6)
    and [1-6b](#520381_1_En_1_Chapter.xhtml#Fig7).


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig7_HTML.jpg)


    A photograph, of the zoomed-in view of steel pipes. The pipes are lying horizontally
    and aligned one on top of the other. Anomalies on the surface of the pipes can
    be observed. Vertical ridges are present on one end of the pipe.


    Figure 1-6b


    Anomalies showing up in the pipes


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig6_HTML.jpg)


    A photograph of several steel pipes lying horizontally aligned one on top of the
    other. One end of each pipe has ridges projecting outwards.


    Figure 1-6a


    Perfect examples of steel pipes


    ##### Video Analysis


    There are a lot of use cases for video or sequences of images. The task of object
    detection on running images can help with CCTV footage. It can also be used to
    detect abnormalities within the frames per video section.


    We will be going through all of these applications in detail in the upcoming chapters.
    Before that, let’s go through a few of the intrinsic concepts that lay the foundation
    for further understanding computer vision.'
  trans: "\n### 分类\n\n涉及决策过程的图像相关问题的最简单形式是一种称为*分类*的监督技术。分类简单来说就是将类别分配给不同的图像。这个过程可以简单到一张图像只有一个类别，也可以更复杂，例如同一张图像中存在多个类别。见图\
    \ 1-1 和 1-2。\n\n![](img/520381_1_En_1_Fig2_HTML.jpg)\n\n一张毛茸茸的狗趴在草地上，张着嘴，舌头伸在外面的照片。这张照片展示了本例中的类别，即狗。\n\
    \n**图 1-2**  \n本例中的类别是狗\n\n![](img/520381_1_En_1_Fig1_HTML.jpg)\n\n一张猫跳跃后悬在空中的照片。它的爪子向外伸展。\n\
    \n**图 1-1**  \n本例中的类别是猫\n\n我们可以根据这些图像中是否包含猫或狗的图像来区分它们的内容。这是我们眼睛感知差异的一个例子。我们试图分类的对象的背景并不重要，因此我们需要确保在算法中背景也同样不重要。例如，如果我们在所有狗的图像前都加上某个汽车公司的标志，图像分类器网络可能会学习根据该标志来对狗进行分类，并将其用作捷径。我们稍后将详细描述如何将这些信息纳入模型。分类可用于识别制造单元生产线中的物体。\n\
    \n### 目标检测与定位\n\n一个经常遇到的有趣问题是需要在一张图像中定位另一张特定图像，甚至检测它可能是什么。假设有一群人，有些人戴着口罩，有些人没戴。我们可以使用视觉算法来学习口罩的特征，然后利用这些信息在图像中定位口罩并检测出口罩。见图\
    \ 1-3 和 1-4。\n\n![](img/520381_1_En_1_Fig4_HTML.png)\n\n一张公园里人们的照片。前景中一个人用牵引绳牵着两只狗，背景中另一个人坐在公园长椅上。背景中还有其他人在，但被第一个人遮挡了。前景中的人戴着口罩，一个矩形框高亮显示了他们的脸部。\n\
    \n**图 1-4**  \n类别：图像中检测到口罩\n\n![](img/520381_1_En_1_Fig3_HTML.jpg)\n\n一张男人跪在草地上，手握着狗脖子上的项圈的照片。狗坐在男人面前。男人手指指向一个方向，狗也盯着同一个方向。\n\
    \n**图 1-3**  \n类别：未检测到口罩\n\n这种分析有助于从交通摄像头中检测行驶车辆的牌照。有时，由于摄像头分辨率和车辆移动，图像质量并不理想。超分辨率是一种有时用于增强图像质量并帮助识别牌照号码的技术。\n\
    \n#### 图像分割\n\n此过程用于确定放置在一起的相似物体的边缘、曲线和梯度，以便分离图像中的不同物体。这里可以使用经典的无监督技术，无需担心寻找高质量、带标签的数据。处理后的数据可以进一步用作目标检测器的输入。见图\
    \ 1-5。\n\n![](img/520381_1_En_1_Fig5_HTML.jpg)\n\n一张地形图的航拍照片，显示了不同的地形和其他地貌，以及它们的分隔和布局设计。陆地面积比水体面积更丰富。可以看到狭窄的水体在陆地形态之间穿过。\n\
    \n**图 1-5**  \n在地形图中分离地形\n\n#### 异常检测\n\n另一种经典的无监督变化检测方法是将图像与某些训练数据中的常规、预期模式进行比较。例如，异常检测可用于确定钢管与训练数据相比是否存在瑕疵。如果机器发现异常，它将检测到异常并通知生产线工程师进行处理。见图\
    \ 1-6a 和 1-6b。\n\n![](img/520381_1_En_1_Fig7_HTML.jpg)\n\n一张钢管放大视图的照片。钢管水平放置，一根叠在另一根之上。可以观察到钢管表面的异常。钢管的一端存在垂直的棱纹。\n\
    \n**图 1-6b**  \n钢管上出现的异常\n\n![](img/520381_1_En_1_Fig6_HTML.jpg)\n\n一张几根钢管水平放置、一根叠在另一根之上的照片。每根钢管的一端都有向外突出的棱纹。\n\
    \n**图 1-6a**  \n钢管的完美示例\n\n#### 视频分析\n\n视频或图像序列有很多应用场景。对连续图像进行目标检测的任务可以帮助分析闭路电视监控录像。它也可以用于检测视频每帧画面中的异常情况。\n\
    \n我们将在接下来的章节中详细介绍所有这些应用。在此之前，让我们先了解一些为深入理解计算机视觉奠定基础的内在概念。\n"
- fmt: '### Channels


    One of the most basic and quintessential ideas around computer vision is the `channel`.
    Think of music being played with multiple instruments; we hear a combination of
    all the instruments playing together, which essentially constitutes the music
    in stereo (see Figure [1-7](#520381_1_En_1_Chapter.xhtml#Fig8)). If we break the
    music into single components, we can break the sound wave into individual sounds
    coming from the electric guitar, the acoustic guitar, the piano, and the vocals.
    After breaking the music into its components, we can modulate each component to
    get the desired music. There can be an infinite number of combinations if we learn
    all the musical modulations.


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig12_HTML.jpg)


    A photograph of a sample sketch from a computer vision channel. It is like an
    abstract mural. It can be observed that the sketch is made up of pencil streaks,
    and shadings.


    **Figure 1-8d** Sample sketch represented in one channel


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig11_HTML.png)


    A table has 4 columns and 4 rows. From row 1, left to right, are values 2, 36,
    40, and 200. Row 2 has 195, 190, 20, and 180. Row 3 has 40, 54, 200, and 200.
    Row 4 has 30, 40, 200, and 180. The table depicts the representational pixel values
    corresponding to a sketch.


    **Figure 1-8c** Representational pixel values corresponding to a sketch


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig10_HTML.png)


    An image of a blank square without any contents within. This image depicts a sample
    white page.


    **Figure 1-8b** Sample white page


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig9_HTML.png)


    A table has 4 columns and 4 rows. All columns and rows consist of square-shaped
    cells, with the same dimensions. Each of the cells has the number 255 inscribed
    within. The table represents pixel values corresponding to a white picture.


    **Figure 1-8a** Pixel values corresponding to a white picture


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig8_HTML.jpg)


    A photograph of 3 individuals sitting. 2 people on either side are holding guitars,
    and the individual in the middle is playing a keyboard. The image depicts the
    photo of playing musicians.


    **Figure 1-7** Playing musicians


    One of the most basic and quintessential ideas around computer vision is the `channel`.


    We can extrapolate these concepts to images, which we can break into components
    of colors. Pixels are the smallest containers of colors. If we zoom in on any
    digital image, we see small boxes (pixels), which make up the image. The general
    range of any pixel in terms of the intensity of a channel is 0-255, which is also
    the range defined by eight bits. Consider Figure [1-8b](#520381_1_En_1_Chapter.xhtml#Fig10).
    We have a white page. If we convert that page to an array, it will give us a matrix
    of all 255 pixels, as shown in Figure [1-8a](#520381_1_En_1_Chapter.xhtml#Fig9).
    On the other hand, Figure [1-8d](#520381_1_En_1_Chapter.xhtml#Fig12), when converted
    to a matrix, will also have only one channel, and the intensity will be defined
    by the numbers in the range of 0-255, as depicted in Figure [1-8c](#520381_1_En_1_Chapter.xhtml#Fig11).
    Closer to 0 gives us black and closer to 255 gives us white.


    Let’s consider a color image. We can break any full-color image into a combination
    of three primary components (channels)—red, green, and blue. We can break down
    any color image into some definite combination of red, green, and blue. Thus,
    RGB (red, green, and blue) becomes the channels of the colored image.


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig13_HTML.png)


    A puzzle image of a blurred smoking drink and a coffee maker, from which a horizontal
    arrow points to three vertically aligned rectangles, placed one behind the other,
    on the left, middle, and right, each having a different shade.


    **Figure 1-9** Sample image to blue (left)=0, green (middle)=1, and red (right)=2


    The image in Figure [1-9](#520381_1_En_1_Chapter.xhtml#Fig13) can be split into
    RGB, with the first channel being blue, then green, followed by red. Each pixel
    in the image can be a certain combination of RGB.


    We are not restricted to using RGB as the color channels. We also have HSV (Hue,
    Saturation, and Value), LAB format, and CMYK (Cyan, Magenta, Yellow, and Black),
    which are a few representations of channels of an image. Color is a feature and
    its container is a channel, so every image is made of edges and gradients. We
    can create any image in the world with just edges and gradients. If you zoom in
    on a small circle, it should look like a combination of multiple edges and straight
    lines.


    To summarize, channels can be called in as the container for a feature. The features
    can be the smallest individual characteristics of the image. Color channels are
    a specific example of channels. Since edges can be features, a channel that only
    caters to edges can be a channel too. Food for thought—if you were to create a
    model that would identify a cat or a dog, does the color of the animal affect
    the model behavior as much as edges and gradients can?'
