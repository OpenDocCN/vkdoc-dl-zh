- fmt: '# The Model Code


    We have discussed the basic concepts behind a generative adversarial network.
    This led to one of its many usages, super-resolution. It has various applications,
    among which style transfers, image generations, and super resolutions are few.
    The model that deals with super-resolution is `SRGAN`. One of its predecessors,
    called `SRResNet`, came up with good results in terms of `SSIM` and `PSNR`.


    Let’s look at the metrics that are usually determined in super-resolution problems:


    * **Structural similarity index (SSIM):** The metric tries to put a value to the
    amount of degradation that happened due to changes from the source image to the
    target image. It checks the perceived similarity between sections of the image.
    It is based on the average and standard deviation of the chosen window.

    * **Peak signal to noise ratio:** This is another important metric used to measure
    the reconstruction loss of an image or a changed image with the original image.
    It at best can be defined by the mean squared error computation. It can be formed
    by taking the logarithmic scale with a base of 10.

    * **Mean opinion score (MOS):** This is defined by a single number on an ordinal
    scale, with a range of 1 to 5. 1 is the lowest perceived quality and 5 is the
    highest perceived quality.


    Now that we have looked at the metric to define and measure the differences, let’s
    look at the data on which we are going to develop our code.


    We will be using the `DIV2K` dataset, which has 1000 high-definition images, with
    an 800-100-100 split in terms of train, validation, and test data. This data can
    be downloaded from the source paper introduced in CVPR 2017, at [`https://data.vision.ee.ethz.ch/cvl/DIV2K/`](https://data.vision.ee.ethz.ch/cvl/DIV2K/).


    The setup for the code needs to follow the application’s standard build. Normally
    this means that there needs to be a model file, a few utility scripts, a training
    file, and a validation file. In a few scenarios, this model needs to be an application
    hosted in a server, and there needs to be a setup file as well. Taking this one
    step at a time, we can start with the model files.


    ## Model Development


    The codebase has a generative model block, the discriminative model block, a residual
    block, and a content loss calculation block.


    ### Imports


    We will be using the `Torch` framework for the entire code block. If the development
    is done in a local environment, then we must make sure the `Torch` and its dependencies
    are installed in the environment and are working. `Torch` and `TorchVision` are
    the two important packages that need to be set up. If there is a provision for
    a GPU with CUDA cores, we should install the latest CUDA packages to help `PyTorch`
    utilize parallel GPU cores for computation. For the model script, we import the
    `Torch`- and `TorchVision`-related functions.


    ```python

    import torch

    import torch.nn as nn

    import torch.nn.functional as F

    import torchvision.models as models

    from torch import Tensor

    ```


    Next, we define the generator class to help regenerate the images.


    ```python

    class Generator(nn.Module):

    ## defining the generator model

    ## extending the class

    ## initializing sequential - network expecting 64x3

    def __init__(self) -> None:

    super(Generator, self).__init__()

    self.convolutional_block1 = nn.Sequential(

    nn.Conv2d(3, 64, (9, 9), (1, 1), (4, 4)),

    nn.PReLU()

    )

    ## adding resnet conv block of 16

    res_trunk = []

    for _ in range(16):

    res_trunk.append(ResidualConvBlock(64))

    self.res_trunk = nn.Sequential(*res_trunk)

    self.convolutional_block2 = nn.Sequential(

    nn.Conv2d(64, 64, (3, 3), (1, 1), (1, 1), bias=False),

    nn.BatchNorm2d(64)

    )

    self.upsampling = nn.Sequential(

    nn.Conv2d(64, 256, (3, 3), (1, 1), (1, 1)),

    nn.PixelShuffle(2),

    nn.PReLU(),

    nn.Conv2d(64, 256, (3, 3), (1, 1), (1, 1)),

    nn.PixelShuffle(2),

    nn.PReLU()

    )

    self.convolutional_block3 = nn.Conv2d(64, 3, (9, 9), (1, 1), (4, 4))

    self._initialize_weights()

    def forward(self, x: Tensor) -> Tensor:

    return self._forward_impl(x)

    def _forward_impl(self, x: Tensor) -> Tensor:

    ## defining forward pass -> 3 convolutional blocks

    out1 = self.convolutional_block1(x)

    out = self.res_trunk(out1)

    out2 = self.convolutional_block2(out)

    output = out1 + out2

    output = self.upsampling(output)

    output = self.convolutional_block3(output)

    return output

    def _initialize_weights(self) -> None:

    ## initialize the weights

    ## adding provision for batch normalization

    for m in self.modules():

    if isinstance(m, nn.Conv2d):

    nn.init.kaiming_normal_(m.weight)

    if m.bias is not None:

    nn.init.constant_(m.bias, 0)

    m.weight.data *= 0.1

    elif isinstance(m, nn.BatchNorm2d):

    nn.init.constant_(m.weight, 1)

    m.weight.data *= 0.1

    ```


    This code snippet defines the class of the convolutional block that’s capable
    of regenerating images. Importantly, this code block consists of three convolutional
    blocks and one up-sampling block. The first convolutional block is followed by
    a residual block, which serves as the trunk of the entire generator network. This
    is followed by a second convolutional block. The up-scaling block consists of
    a pair of convolutional layers followed by pixel shuffling. Eventually, the final
    convolutional block is added to generate the output. The block is provided with
    batch normalization layers and a combination of 3x3 convolution layers.


    The forward pass helps build the sequential model in the function `forward` implementation.
    There is also another function to initialize the weights. Having covered the basic
    generator class, we will move to the next class of the discriminator.


    The discriminator module extends the standard `nn.module` following eight layers
    of convolutions. They are using batch normalization after each layer to run deep.
    The model structure uses leaky ReLU for activation functions. The model ends with
    a `torch.flatten` layer, which helps it classify things.'
