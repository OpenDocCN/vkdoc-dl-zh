    with. There are two types of segmentation—semantic and instance. When we are working
    with semantic segmentation, the pixels from similar objects are considered to
    be one class, but there is no separation within the objects. If we imagine the
    scenario in real-time, when there is an image of multiple cars on a highway, the
    segmentation will group all the cars and separate those groups from the roadside
    or the scenery.


    Let’s consider an example. Figure [4-1a](#520381_1_En_4_Chapter.xhtml#Fig1) shows
    a highway with cars. Alongside multiple cars, there is grass and some trees on
    the side of the highway.


    ![](images/520381_1_En_4_Chapter/520381_1_En_4_Fig1_HTML.jpg)


    A photograph of a long stretch of road, with a pick-up truck near the front, and
    3 other cars further back. The road is lined with grasses and trees.


    Figure 4-1a


    Raw input image


    Now consider a patch of pixels taken from the raw input and passed from a convolutional
    neural network that is capable of classifying the objects in the input (see Figure
    [4-1b](#520381_1_En_4_Chapter.xhtml#Fig2)). This will give us the output like
    the patch in the figure that belongs to a car. Next, we try to map the central
    pixel to the car and iterate through the entire image like this. This will give
    us the segmentation separation (semantic) in the image. It will separate the cars
    from the trees and from the road. An important thing to note here is that all
    the cars will belong to the same class.


    ![](images/520381_1_En_4_Chapter/520381_1_En_4_Fig2_HTML.jpg)


    A photograph of a long stretch of road, with a pick-up truck near the front, and
    3 other cars further back. The road is lined with grasses and trees. At the rear
    end of the pick-up truck is a black square outlined in blue, with a right arrow
    that says, Patch.


    Figure 4-1b


    Taking a patch from input


    Another workaround for this type of problem is to run through a convolutional
    neural network classifier, which doesn’t have any downsampling, and use that to
    classify each pixel and thus cluster similar objects together.


    These all prove great until we want to distinguish between the classes. For example,
    say there are multiple cars and we want to classify each car separately. In this
    scenario, instance segmentation comes in, wherein every pixel is mapped to the
    specific class and objects are separated by labeling the pixels with the appropriate
    class. The idea of semantic segmentation goes back to non-learnable techniques
    used in image processing, whereas instance segmentation is a fairly new concept.


    One of the basic approaches that came out when we started with instance segmentation
    was a near replica of the R-CNN approach. But we are predicting segments instead
    of regions.


    Look at the process diagram in Figure [4-2](#520381_1_En_4_Chapter.xhtml#Fig3).
    The image is passed onto a segment proposal network, which gives segments of the
    images. On the one hand, the segments can form a bounding box and be passed onto
    the box convolutional neural network to generate features. On the other hand,
    the segments are taken in and a background masking transformation is applied.
    It just takes in the mean values of the image and converts the background of the
    object to black. Once the segment is masked, it is passed to the region convolutional
    neural network for a different set of features.


    ![](images/520381_1_En_4_Chapter/520381_1_En_4_Fig4_HTML.jpg)


    A photograph of a man and a woman on the sidewalk with buildings in the background.
    Both the man and woman have their figures covered in violet and yellow silhouettes,
    respectively. Both figures are boxed in green. The word pedestrian is on top of
    the boxes.


    Figure 4-3


    Output on the custom data


    ![](images/520381_1_En_4_Chapter/520381_1_En_4_Fig3_HTML.png)


    A flow chart depicts the following from left to right: a photo, a right arrow,
    and a box labeled proposal generation connected by arrows to the Feature extraction
    which has a photo and a box labeled C N N BOX, and the Mask out background that
    has a photo and a box labeled C N N Region. At right are Region classification,
    and Region refinement.


    Figure 4-2


    Instance segmentation process flow


    What we have here is a combination of the box image and the region pulled by the
    network. These will be combined and then further classified based on the object
    instance they contain. A secondary step is also added beyond this when it refines
    the segmentation region.


    These are simply experimental segmentation technique setups. Other methodical
    improvements have been made, including cascading networks, which are similar to
    Faster R-CNN, hypercolumns, etc.


    These are multiple differences between semantic segmentation and instance segmentation.


    With semantic segmentation:


    *   All the pixels are classified.


    *   Fully convolutional models are used.


    *   Downsampling is used in various approaches followed by learnable upsampling
    techniques to re-create the image.


    *   In case ResNet-like architectures are used, skip connections are used.


    With instance segmentation:


    *   Not only every pixel is classified, but the instance is also detected.


    *   The process nearly follows the object detection architecture.


    ## Pretrained Support from PyTorch


    PyTorch has been growing at a much faster pace than any other framework. It has
    a plethora of modules and classes. Since it is close to Python, it is easier to
    adapt to the framework. There is a push toward selecting the PyTorch framework
    in deep learning in general and utilizing the vast resources to make impactful
    changes.


    Like object detection, segmentation is also on the heavier side of architecture.
    It is not always easy or ideal to train these models from scratch. The training
    time is quite high in CPU, and even though GPU helps in this scenario, it’s not
    by a lot. Due to all the training process constraints, we might opt for a transfer
    learning technique. This helps us leverage the rich information already extracted
    onto the work. The models are trained in diversified datasets and are generalized
    to handle variations in most of the problems we will encounter. Let’s dive into
    some of the amazing models in the `torch` repository.'
