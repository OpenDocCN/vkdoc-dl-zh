    图 10-7: 变换前


    -   根据步骤 2 中的架构调整图像大小。

    -   将调整大小后的图像转换为张量，以便使用 PyTorch 进行更快的计算。

    -   对图像进行归一化，以在训练过程中加快收敛速度。见图 10-7 和 10-8。


    ```

