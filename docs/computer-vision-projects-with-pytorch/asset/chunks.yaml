    fix the volume of information rather than cutting it off. Imagining a semi-solid
    cuboid will help here. If we have to reduce the face, we have to elongate in one
    direction. In our case, it will be the depth. Figure [1-26](#520381_1_En_1_Chapter.xhtml#Fig33)
    shows the grid-reduction technique used in inception architecture. The parallel
    architecture envisions using pooling and convolutions in parallel and concatenating
    them.


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig33_HTML.jpg)


    The first diagram consists of a base branching to 2 1 by 1 grid, and pool stride
    2\. 1 by 1 grid forms 3 by 3 stride 1 and stride 2, which finally forms an output
    if filter concat. The second diagram consists of 35 b 35 by 320, converging and
    pooling to form 17 by 17 by 320, which converges by concat to form 17 by 17 by
    640.


    Figure 1-26


    Inception architecture snapshot


    Inception architecture first used stochastic gradient decent with momentum but
    later used RMSProp to train the model, which achieved better accuracies.


    ### Working with Deep Learning Model Techniques


    So far, we have covered the widely used CNN-based models. There are various ways
    to model architectures for all-purpose computer vision tasks. Let’s now discuss
    a few important concepts that will be useful in the next chapters when we explore
    multiple problems hands-on.


    #### Batch Normalization


    There is an inherent problem that pops up when training a deep neural network.
    During the training process, the input distribution of the layers is affected
    to an extent of adopting a different distribution because of the layers from which
    the inputs are flowing. The gradients affect the weights and those, in turn, have
    cascading effects on the distributions. This phenomenon is called an *internal
    covariate shift.* For training deep neural networks using SGD, mini-batch gradient
    descent is often used. This process reduces the computational requirements at
    one level and given the mini-batch a representation from the original input, the
    level of training is good.


    Batch normalization is used generally after convolution operations. It can be
    used after or before a ReLU activation layer, but it is never used after the last
    layer of the architecture. It enhances the features extracted after each layer.
    Let’s look at an example. Consider an arbitrary layer that has 64 channels and
    16 images in one batch. In this scenario, we will be using 16 images to normalize
    each channel in 64 to get our output.


    In the first step of batch normalization, we are trying to shift the data by the
    mean of the batch and then scale it by the standard deviation of the batch, which
    corresponds to the channels in the batch. In the second step, we are multiplying
    the resultant by γ and another parameter β is added to it. These parameters help
    the neural network determine whether the batch normalization is required and to
    what extent such features are significant in the next layers. This helps with
    the flow of gradients and eventually with training.


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Figa_HTML.png)


    Two mathematical equations. The first: x caret equals x minus mu totally over
    sigma. The second: Output subscript B N equals x caret asterisk gamma plus beta.


    x – Original input


    μ - Mean of mini-batch – non-trainable parameters


    σ – Standard deviation from mini-batch – non-trainable parameters


    γ, β – Parameters normalizing the effects – trainable parameters


    Thus, batch normalization incorporates additional trainable parameters into the
    model architecture.


    Ghost batch normalization is a recent development related to batch normalization.
    This concept is legitimate when we are training in a single GPU and the single
    GPU has one batch filled in. There can be an issue with the training if someone
    is using multiple GPUs. Ghost batch normalization helps in the scenario. It will
    use the GPU as a pivot and will calculate a sample mean and standard deviation
    to calculate the normalization. This regularizes the data as well, given the fact
    it is working on a smaller sample size. The randomness in the distribution of
    images due to the use of multiple GPUs will change the loss function to an extent.
    Batch normalization has proven to be a great mechanism for models to go deeper;
    it provides manifold benefits to modern-day architectures.'
