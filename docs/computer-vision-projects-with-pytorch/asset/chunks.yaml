    ## Introduction


    This book explores various popular methodologies in the field of computer vision
    in order to unravel its mysteries. We use the `PyTorch` framework, because it''s
    used by researchers, developers, and beginners to leverage the power of deep learning.
    This book explores multiple computer vision problems and shows you how to solve
    them. You can expect an introduction to some of the most critical challenges with
    hands-on code in `PyTorch`, which is suitable for beginner and intermediate Python
    users, along with various methodologies used to solve those business problems.


    Production-grade code related to important concepts we present over the course
    of the book will help you get started quickly. These code snippets can be run
    on local systems, with or without GPUs (Graphics Processing Units) or on a cloud
    platform.


    We’ll introduce you to the concepts of image processing in stages, starting with
    the basic concepts of computer vision in the first chapter. We’ll also delve into
    the field of deep learning and explain how models are developed for vision-related
    tasks. You’ll get a quick introduction to `PyTorch` to prepare you for the example
    business challenges we’ll be presenting later in the book. We explore concepts
    of the revolutionary convolutional neural networks, as well as architectures such
    as `VGG`, `ResNet`, `YOLO`, `Inception`, `R-CNN`, and many others.


    The book dives deep into business problems related to image classification, object
    detection, and segmentation. We explore the concepts of super-resolution and GAN
    architectures, which are used in many industries. You learn about image similarity
    and pose estimation, which help with unsupervised problem sets. There are topics
    related to video analytics, which will help you develop the mindset of using the
    image and time-based concepts of frames. Adding to the list, the book ends by
    discussing how these deep learning models can be explained to your business partners.
    This book aims to be a complete suite for those pursuing computer vision business
    problems.


    ## About the Authors About the Technical Reviewer


    # 1. The Building Blocks of Computer Vision


    Humans have been part of a natural evolutionary pattern for centuries. According
    to the Flynn Effect, an average person born in recent times has a higher IQ than
    the average person born in the previous century. Human intelligence allows us
    to learn, decide, and make new decisions based on our learnings. We use IQ scores
    to quantify human intelligence, but what about machines? Machines are also part
    of this evolutionary journey. How have we moved our focus to machines and made
    them intelligent, as we know them today? Let’s take a quick look at this history.


    A breakthrough came in the 1940s when programmable digital computers became available,
    followed by the concept of the *Turing test**,* which could measure the intelligence
    of machines. The concept of the *perceptron* goes back to 1958, when it was introduced
    as a powerful logical unit that could learn and predict. The perceptron is equivalent
    to a biological neuron that helps humans function. The 1970s saw fast growth in
    the field of artificial intelligence, and it has increased exponentially since
    that time.


    Artificial intelligence is the intelligence showcased by a machine, more often
    when it is trained on historical events. Humans have been trained and conditioned
    their whole lives. We know, for example, that going too near a fire will cause
    us to be burned, which is painful and bad for our skin. Similarly, a system can
    be trained to make distinctions between fire and water, based on the features
    or on historical evidence. Human intelligence is being replicated by machines,
    which gives rise to what we know as artificial intelligence.


    Artificial intelligence encompasses machine learning and deep learning. Machine
    learning can be thought of as mathematical models that help algorithms learn from
    data/historical events and formulate decision-making processes. The machine learns
    the pattern of the data and enables the algorithms to create a self-sustaining
    system. Its performance can be limiting, such as in the case of huge complex data,
    which is where deep learning comes into the picture. Deep learning is another
    subset of artificial intelligence. It uses the concept of the perception, expands
    it to neural networks, and helps the algorithms learn from various complex data.
    Even though we have many modeling techniques at our disposal, it’s best to find
    good and explainable results from the simplest of techniques, as stated by *Occam’s
    razor* (the simplest answer is often the best).


    Now that we have explored a bit of the history, let’s browse through the applicable
    fields. There are two fields—Natural Language Processing (NLP) and Computer Vision
    (CV)—that use an immense amount of deep learning techniques to help solve problems.
    NLP caters to the problem sets defined by our language, essentially one of the
    most important modes of communication. CV, on the other hand, addresses vision-related
    problems. The world is full of data that humans can decipher with their senses.
    This includes vision from the eyes, smell from the nose, audio waves from the
    ear, taste from the tongue, and sensations from the skin. Using this sensory input,
    the connected neurons in our brains parse and process the information to make
    decisions on how to react. Computer vision is one field that addresses the visual
    side of the machine-learning problem.


    This book takes you through the fundamentals and gives you a working knowledge
    of computer vision.


    ## What Is Computer Vision


    Computer vision deals with specific problem sets that rely on images and videos.
    It tries to decipher the information in the images/videos in order to make meaningful
    decisions. Just like humans parse an image or a series of images placed sequentially
    and make decisions about them, CV helps machines interpret and understand visual
    data. This includes object detection, image classification, image restoration,
    scene-to-text generation, super-resolution, video analysis, and image tracking.
    Each of these problems is important in its own way. Studying vision-related problems
    has gained a lot of attraction after the power of parallel computing came into
    play.


    ### Applications


    The applications of computer vision vary with respect to the industry being discussed.
    The following sections look at a few of these tasks.'
