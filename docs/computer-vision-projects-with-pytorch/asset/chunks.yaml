    # Inception 架构


    自 2014 年以来，Inception 已发布了多个版本。`GoogLeNet`（通常与 `InceptionV1` 相关联）是 `ILSVRC` 的获胜者。它经历了多次迭代；让我们来看看
    Inception 架构。


    为了增强卷积块内的局部表示能力，该方案提出了分解卷积。实际上，它建议在 `1x1` 卷积之后使用 `3x3` 卷积，以降低激活强度并减少相关性。他们采用了一种方法，将较大的卷积核分解为较小的卷积核，以期达到相同的效果。例如，一个
    `5x5` 卷积需要 `25C²` 个参数，但可以将其分解为两组 `3x3` 卷积，仍然只需要 `18C²` 个参数。参见图 1-23。根据研究，`5x5`
    卷积在单次卷积中能够获取更多像素点，因此可能具有更好的表达能力。因此，与 `3x3` 卷积相比，它具有更好的全局视野。然而，该架构声称，在构建计算机视觉模型时，我们需要关注平移不变性，而较小的卷积核将有助于实现这一点。


    ![](img/520381_1_En_1_Fig30_HTML.jpg)


    卷积全局视野示意图。一个方形单元的四个角连接到 3x3 网格的四个角，而该 3x3 网格又连接到作为 5x5 网格一部分的 3x3 网格。


    **图 1-23** 卷积的全局视野


    这种分解进一步发展为非对称卷积。`3x3` 卷积仍然可以分解为 `3x1` 卷积，然后是 `1x3` 卷积，从而至少节省 `9/6` 的计算量。这种方法也可以用于更高层的卷积，并在图
    1-24 中进行了通用展示。


    ![](img/520381_1_En_1_Fig31_HTML.jpg)


    `Filter Concat` 的非对称卷积示意图。输入是 2 个 `n x 1` 和 2 个 `1 by 1`，它们通向基础层。第一列 `n x 1` 从上到下依次由
    `1 x n`、`n x 1`、`1 x n` 和 `1 by 1` 组成。第二列 `n x 1` 从上到下依次由 `1 x n` 和 `1 by 1` 组成。


    **图 1-24** 非对称卷积


    模型架构的另一个重要补充是辅助分类器。它们旨在解决深度神经网络的梯度消失问题。除了使用的批量归一化和 Dropout 之外，网络的这一部分还充当了模型的正则化器。与没有此类分支的网络相比，辅助分类器有助于模型在训练后期提高准确性。图
    1-25 展示了一个分支出去的辅助网络。


    ![](img/520381_1_En_1_Fig32_HTML.jpg)


    辅助网络示意图。`17 by 17 by 768` 通过 Inception 模块形成 `8 by 8 by 1280`，后者进而形成一个由 3 个点组成的输出；同时，`17
    by 17 by 768` 通过步长为 3 的 `5 by 5` 平均池化形成 `5 by 5 by 768`。`5 by 5 by 768` 通过 `1
    by 1` 卷积形成 `5 by 5 by 128`，后者再通过全连接层形成 `1 by 1 by 1024`。


    **图 1-25** 辅助网络


    当对带有通道的信息网格应用池化时，建议根据我们期望的缩减比例来增加特征图的数量。由于信息在空间上是分布的，我们可能希望固定信息的体积，而不是将其截断。想象一个半固态的长方体会有所帮助。如果我们要减小其面，就必须在一个方向上拉长。在我们的例子中，这个方向就是深度。图
    1-26 展示了 Inception 架构中使用的网格缩减技术。这种并行架构设想将池化和卷积并行使用，然后将它们拼接起来。


    ![](img/520381_1_En_1_Fig33_HTML.jpg)


    第一个示意图由一个基础层分支到 2 个 `1 by 1` 网格和步长为 2 的池化组成。`1 by 1` 网格形成步长为 1 和步长为 2 的 `3 by
    3` 卷积，最终通过滤波器拼接形成输出。第二个示意图由 `35 by 35 by 320` 经过汇聚和池化形成 `17 by 17 by 320`，再通过拼接汇聚形成
    `17 by 17 by 640`。


    **图 1-26** Inception 架构快照


    Inception 架构最初使用带动量的随机梯度下降法进行训练，但后来改用 `RMSProp` 来训练模型，从而获得了更好的准确率。


    ## 深度学习模型技术实践


    到目前为止，我们已经介绍了广泛使用的基于 CNN 的模型。对于通用计算机视觉任务，有多种建模架构的方法。现在，让我们讨论几个重要的概念，这些概念在后续章节中我们将动手探索多个问题时将会很有用。


    ### 批量归一化


    训练深度神经网络时会出现一个固有问题。在训练过程中，由于输入流经各层，这些层的输入分布会受到一定程度的影响，从而呈现出不同的分布。梯度会影响权重，而这些权重又会级联地影响分布。这种现象被称为*内部协变量偏移*。为了使用
    `SGD` 训练深度神经网络，通常使用小批量梯度下降法。这个过程在某一层面降低了计算需求，并且由于小批量代表了原始输入，训练水平是良好的。


    批量归一化通常在卷积操作之后使用。它可以在 `ReLU` 激活层之后或之前使用，但绝不能用在架构的最后一层之后。它增强了每一层之后提取的特征。让我们看一个例子。考虑一个任意层，该层有
    64 个通道，一个批次中有 16 张图像。在这种情况下，我们将使用这 16 张图像来归一化 64 个通道中的每一个，从而得到我们的输出。


    在批量归一化的第一步，我们尝试用批次的均值来平移数据，然后用批次的标准差来缩放数据，这里的均值和标准差对应于批次中的通道。在第二步，我们将结果乘以 `γ`，并加上另一个参数
    `β`。这些参数帮助神经网络确定是否需要批量归一化，以及这些特征在后续层中的重要程度。这有助于梯度的流动，并最终有助于训练。


    ![](img/520381_1_En_1_Figa_HTML.png)


    两个数学公式。第一个：`x_caret = (x - mu) / sigma`。第二个：`Output_BN = x_caret * gamma + beta`。


    - `x` – 原始输入

    - `μ` - 小批量的均值 – 不可训练参数

    - `σ` – 小批量的标准差 – 不可训练参数

    - `γ`, `β` – 归一化效果的参数 – 可训练参数


    因此，批量归一化将额外的可训练参数纳入了模型架构。


    幽灵批量归一化是与批量归一化相关的最新发展。当我们使用单个 GPU 进行训练，并且该单个 GPU 恰好填满一个批次时，这个概念是合理的。如果使用多个 GPU，训练可能会出现问题。幽灵批量归一化在这种情况下会有所帮助。它将
    GPU 作为枢轴，并计算样本均值和标准差来进行归一化。鉴于它是在较小的样本量上工作，这也能对数据进行正则化。由于使用多个 GPU 导致的图像分布随机性，会在一定程度上改变损失函数。批量归一化已被证明是使模型能够更深层次发展的绝佳机制；它为现代架构带来了多方面的好处。

