- fmt: '# Mask R-CNN


    On top of what Faster R-CNN has already achieved, this is an extension in terms
    of predicting masks on the detected objects. There are two more convolutional
    neural networks after the ROI pooling layer to add masks. This also establishes
    `ROI Align`, which helps better align the extracted features with the inputs and
    avoid the warping that used to happen in Faster R-CNN. It uses bilinear interpolation
    to get the exact or near-perfect values of the input regions.


    An important step that came out of all these object detection methods was the
    use of anchor boxes. `YOLO` extends this idea with some additional changes, which
    we will be looking into.


    ## Prerequisites


    ![](images/520381_1_En_3_Chapter/520381_1_En_3_Fig9_HTML.jpg)


    A photograph of two birds in flight. Both birds are marked with a box.


    Figure 3-8: Birds with annotations


    - **Annotation.** In a classification problem, images need to sorted or arranged
    following the classes they belong to. Similarly, in an object detection problem,
    the images need to be marked with appropriate bounding boxes, often called the
    ground truth. The bounding box will serve the purpose of suggesting the coordinates
    of the object and the classes being enclosed. Figure [3-8](#520381_1_En_3_Chapter.xhtml#Fig9)
    shows one instance of images that have been annotated to train a classifier where
    the birds are located. Generally, annotations are done manually, sometimes multiple
    times, to get the ground truth unbiased. However, if we are doing it for practice
    like now, we can use any open source data for experimentation purposes.


    - **GPU preferred.** When working in computer vision tasks, which requires training
    and running inferences, it is advised to get CUDA-enabled GPU cores for faster
    processing.


    - **Torch framework installed with CUDA capabilities.** We also need `PyTorch`
    installed on the system, as discussed in the previous chapter.


    ## YOLO


    There were huge requirements for object detection algorithms that will help inferences
    in real-time. Faster R-CNN came very close to that, coping with the 2000 bounding
    box predictions and the traditional computer vision method. It had significant
    improvements over its predecessors but still had scope for improvement.


    In came the revolutionary algorithm `YOLO`, which made the detection of objects
    in 45 frames per second (TITAN X). The earlier models spent too much time training
    and predicting at different levels, such as the anchor generation layer, the region
    proposal layer, classification, and bounding box correction. `YOLO`, on the other
    hand, tries to get one convolutional neural network block to predict bounding
    boxes and classes, thus reducing computation time. It has a more generalized way
    of training and considering information from the entire image rather than piecing
    it together. Finally, it supersedes other predecessors that are trying to do the
    same thing.


    Figure [3-9](#520381_1_En_3_Chapter.xhtml#Fig10) shows the architecture in `YOLO`,
    which is inspired by the `GoogleNet` architecture for image classification. The
    input layer shows a dimension of 448x448x3. The network has 24 convolutional layers
    and max pooling layers in batches with two fully connected layers.


    ![](images/520381_1_En_3_Chapter/520381_1_En_3_Fig10_HTML.jpg)


    A diagram depicts from left to right, a layer with a 7 by 7 cuboid inside, a series
    of 6 layers in sizes, 112 by 112, 56 by 56, 28 by 28, 14 by 14, 7 by 7, and 7
    by 7, 2 arrows, vertical bar, arrows, and a cuboid sized 7 by 7. Below the boxes
    are their corresponding convolutional layer dimension. Only the first 4 have Max
    pool layers.


    Figure 3-9: YOLO architecture


    The training process is fairly expensive, so training an object detection model
    from scratch needs to be under good governance. The training for this given architecture
    is done in two ways. First, the model is trained on `ImageNet` data, with the
    first 20 convolutional layers, an average pooling to match the dimensions with
    a fully connected network. This block is trained for a week to get an 88% accuracy.


    This pretrained network is added with four convolutional layers and two fully
    connected layers to get the final detected object. The input dimensions are also
    increased from 224x224 to 448x448, which helps in the detection abilities. The
    final layer predicts the classification scores and the bounding box coordinates.
    The width and height of the bounding boxes are normalized.


    Figure [3-10](#520381_1_En_3_Chapter.xhtml#Fig11) shows the loss function used
    to optimize the classification and regression. For each of the five anchor boxes,
    there is an objectness score, four coordinates corresponding to the normalized
    bounding box, and the top class probabilities or scores. These changes have worked
    quite well but needed further refinement. Let’s look at the second version update
    and version 3, which was one of the most popular models.


    ![](images/520381_1_En_3_Chapter/520381_1_En_3_Fig11_HTML.jpg)


    An equation illustrates, lambda subscript coordinate, S superscript 2 over Sigma,
    B over Sigma, i equals 0, j equals 0, 1 object over i j, bracket, x subscript
    i minus x subscript i, superscript 2, plus y subscript i, minus y subscript 2,
    superscript 2, bracket, and subsequent equations follow.


    Figure 3-10: YOLO loss function'
