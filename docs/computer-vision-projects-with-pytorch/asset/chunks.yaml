    # 6. Pose Estimation


    Human pose estimation (HPE) is a computer vision task that detects human poses
    by estimating major keypoints, such as eyes, ears, hands, and legs, in a given
    frame/video. Figure [6-1](#520381_1_En_6_Chapter.xhtml#Fig1) shows an example
    of human pose estimation in action.


    ![](images/520381_1_En_6_Chapter/520381_1_En_6_Fig1_HTML.png)


    An African-American girl stands with a hairbrush in her left hand. A computer-generated
    outline captures her hands, legs, torso, eyes, nose, and mouth.


    Figure 6-1


    HPE example


    Human body pose detection helps track human body parts and joints. Some of the
    keypoints to identify in a human body are the arms, legs, eyes, ears, nose, etc.,
    which can help us track movements.


    HPE is mostly widely used in robotics, understanding human activity and behavior,
    sports analytics, and so on.


    Deep learning concepts, especially the CNN architecture, is tailored and designed
    particularly for HPE.


    There are two approaches to this problem:


    *   Top-down approach

    *   Bottom-up approach


    ## Top-Down Approach


    Using this approach, humans are first identified by drawing an estimated boundary
    box around each person. In the second step, human keypoints are identified inside
    each bounding box for that particular person. Disadvantages of this approach are
    that we need to have a separate model for human identification and then have to
    identify the keypoints inside all bounding boxes. This increases the computational
    time and complexity. The advantage of this model is that the network will identify
    all the humans in the frame.


    ## Bottom-Up Approach


    Using this approach, all the human keypoints are identified first in a given frame.
    In the second stage, the keypoints are connected to form a human-like skeleton.
    The disadvantage of this approach is it may fail to recognize smaller scale humans
    due to scale variations in the image. The advantage of this approach is the reduced
    computational time compared to the top-down approach.


    Here are the more common HPE models used today:


    *   `OpenPose`: 2019

    *   `HRNet`: 2019

    *   `Higher HRNet`: 2020

    *   `AlphaPose`: 2018

    *   `Mask R-CNN`: 2018

    *   `Dense pose`: 2018

    *   `DeepCut`: 2016

    *   `DeepPose`: 2014

    *   `Pose Net`: 2015


    ## OpenPose


    `OpenPose` is a real-time, multi-person, multi-stage pose estimation algorithm
    built on `VGG19` as its backbone. This algorithm follows a bottom-up approach.
    The input image is sent to the `VGG-19` network for extracting the feature maps.
    The extracted features maps are passed to multistage CNN. Each stage contains
    two branches that run parallelly.


    ### Branch-1


    This branch creates heat maps/confidence maps for the keypoints to detect. A separate
    heat map is generated for all the keypoints.'
