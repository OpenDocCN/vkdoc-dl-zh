    ## 总结


    我们使用了 VGG 架构来确定样本图像数据集中的异常。我们逐步讲解了代码，并开发了一个端到端的流程。该模型只需极少的改动即可应用于工业级问题。


    现在我们已经了解了异常检测，下一章将讨论最前沿的用例，即“图像超分辨率”。我们见过许多提升图像质量和分辨率的应用。你能通过在`PyTorch`中构建模型来自行实现吗？让我们在下一章中一探究竟。


    # 8. 图像超分辨率


    随着高分辨率图像采集设备的出现，图像中捕获的信息量变得巨大。技术已从超高清发展到 4K 和 8K 分辨率。如今电影都在使用高分辨率帧；然而，也存在需要将低分辨率图像增强为高分辨率图像的情况。想象一个场景，电影主角正试图从一张超速汽车的照片中确定车牌号码。超分辨率技术现在可以帮助我们在不扭曲图像的情况下，将图像放大到很高的程度。业界已经取得了一些有趣的进展，我们将通过一些示例来讨论这些进展。


    图像中已有的信息无法从初始状态增加。在计算机科学中，有“垃圾进，垃圾出”的说法，这是一个类似的概念。我们不能期望找到图像中原本不存在的东西。因此，从某种意义上说，超分辨率似乎有些牵强，并且受到信息论的严格限制。即便如此，活跃的研究表明这个问题是可以解决的。


    让我们深入探讨手头的问题。到目前为止，我们处理的是监督学习形式，其中总是存在一个与真实值相关的损失函数。模型从定义的输入（`X`）和期望输出（`Y`）中学习。训练模型的全部意义在于帮助将输入映射到输出。但这在无监督学习中不会发生。无监督方式帮助模型学习输入数据中的模式，而无需映射输出。模型学习数据中的模式，并围绕其调整权重，然后识别数据中的相似性和差异性。与监督学习方法不同，无监督学习没有纠正措施。缺少真实值这一方面，但优化的概念仍然存在。


    让我们深入探讨判别模型和生成模型的概念。在生成模型中，学习的是输入和输出的联合概率。学习数据的分布，这通常是训练模型的一种更通用的方式。这些模型能够在输入空间中生成合成数据点。另一方面，判别模型专门用于创建从输入空间到输出的映射函数。生成模型的例子包括线性判别分析、朴素贝叶斯和高斯模型。


    我们为什么要介绍生成模型并讨论学习数据分布的思想？让我们回顾一下逻辑，这可以帮助我们理解超分辨率。


    -   使用最近邻概念放大图像

    -   双线性插值/双三次插值

    -   傅里叶变换

    -   神经网络


    我们将详细探讨所有这些可能的方法。但在此之前，让我们先探索用于放大低分辨率图像的基本技术，从最近邻缩放开始。图 8-1a 显示了一个可以调整为更大图像的基本图像（见图
    8-1b），但请记住，图像中的信息保持不变。改变的只是表示形式。


    ![](img/520381_1_En_8_Fig2_HTML.png)


    一个 6x6 方格块的示意图。


    **图 8-1b** 一个 3x3 图像扩展为 6x6


    ![](img/520381_1_En_8_Fig1_HTML.png)


    一个 3x3 方格块的示意图。


    **图 8-1a** 一个 3x3 图像


    ## 使用最近邻概念进行放大


    需要更快分辨率变化的问题也需要更快的操作。我们知道，使用卷积神经网络或任何接近神经网络的方法都需要大量的计算，所以现在是时候采用一些简单的技术了。如果我们需要更快的技术，使用最近邻概念放大图像是首选方法之一。


    图 8-2a 显示了一个需要放大到 8x8 图像的 4x4 图像，如图 8-2b 所示。我们最初在整个图像中有 16 个像素，然后当它被拉伸到 64 个像素时，我们留下了
    48 个需要填充的空缺。最近邻的概念可以通过一个直线单位来理解。考虑一条从 0 开始到 4 结束的直线数轴。如果我们把它分成四个相等的部分，或者在这种情况下是像素，每个部分获得
    25%的信息。现在，如果同一条线被拉伸到长度为 8，单位长度保持不变，但每个单位的权重变为 12.5%。然而，图像中携带的信息是相同的。


    ![](img/520381_1_En_8_Fig4_HTML.png)


    一个方框的示意图，内部有一个 4x4 的方格块，方格之间有一定距离。最右上角和最左下角的区域各有三个方格，分别带有两种不同的阴影。


    **图 8-2b** 正在被放大的示例图像


    ![](img/520381_1_En_8_Fig3_HTML.png)


    一个 4x4 方格块的示意图，每个方格都有指定的对角线阴影。最右上角和最左下角的区域各占据三个方格，并带有各自的阴影。


    **图 8-2a** 示例图像


    同样的概念可以用于使用以下公式通过最近邻填充空缺：


    ![$$ {Source}_X={Target}_X\frac{Target_{width}}{Source_{width}} $$](img/520381_1_En_8_Chapter_TeX_Equa.png)


    ![$$ {Source}_Y={Target}_Y\frac{Target_{height}}{Source_{height}} $$](img/520381_1_En_8_Chapter_TeX_Equb.png)


    该公式为我们提供了放大后图像像素的坐标值。

    '
- fmt: '# Understanding Bilinear Up-Scaling


    To get to the concept of bilinear image up-scaling, we still have to cover linear
    interpolation. Interpolation suggests a one-dimensional extension of up-scaling.
    Consider a scenario where a straight line is marked by two values—`x[1]` and `x[2]`—at
    two ends and is provided with the same values. If we have to interpolate a third
    value that lies between the ends, how do we proceed?


    The algorithm suggests that we can use the concept of weighted averages to interpolate
    the unknown value. The weight can be found from the proportionate distance between
    the points `x[1]` and `x[2]`. This logic can be used when we are resizing the
    image in two dimensions.


    To get values for one coordinate in the (`width`, `height`) dimensions, we can
    work out the linear interpolation in each of the dimensions. That will essentially
    help with image resizing in two dimensions.


    Moving on to the most awaited concepts in image up-scaling, which is neural networks.
    The methods of up-scaling may seem very rugged and cutthroat, with no finesse
    whatsoever. The logic to produce values using some tried-and-tested formulas was
    already there and was being used over and over again. The repetition can work
    wonders in some cases, but there are no changes or learning that is happening
    in the interim. Thus, we step into the learning section of neural networks. Before
    we write code and use the model architecture, we need to discuss the foundation
    blocks—VAE and GANs.


    ## Variational Autoencoders


    One of the most revolutionary improvements in the field of deep learning is the
    encoder-decoder architecture. Neural networks can retrieve the information present
    in an image and re-create the image from their understanding. Autoencoder architecture
    is a neural network architecture that can learn the patterns in the data and reduce
    it to smaller dimensions. These dimensions again can be used to re-create the
    images back to the original image. It’s important to note that, theoretically,
    we can create a lossless architecture, with absolute re-creation of the image.
    In reality, such instances are rare.


    The neural network representational architecture is shown in Figure [8-3](#520381_1_En_8_Chapter.xhtml#Fig5),
    and it demonstrates a situation where images are understood by the interconnected
    layers and converted to embedding. This embedding is the representation of the
    information from the images as per the established model architecture.


    ![](images/520381_1_En_8_Chapter/520381_1_En_8_Fig5_HTML.jpg)


    A diagram of a representational architecture of the variational autoencoder neural
    networks. Two boxes labeled Image sit on opposite ends while two thin vertical
    rectangles of decreasing sizes on each side labeled Layer and embedding in the
    middle occupy the free space.


    **Figure 8-3** — Encoder-decoder architecture


    The initial part of the network, popularly called an *encoder*, learns the data
    distribution or the pattern in the input images. It not only has to understand
    itself, but the paired decoder architecture also needs to decode the embedding.
    Thus, the feature extraction and the understanding need to be such that the decoder
    can decipher the original image in question from the embedding with very minimal
    loss.


    The decoder side, on the other hand, starts right after the embedding layer and
    tries to transform the embedding layer into the original image with minimum loss
    of information. This compression of information and then regeneration of the image
    by neural networks is the concept of an auto-encoder network.


    When information is transmitted, the bandwidth of the transmission can impact
    the resolution of the images. Compression can help in passing the low-resolution
    images to the destination. Once the image reaches the destination, the decoder
    layers spring into action, up-scale, and resume the original image.


    The concept of compression and decompressing can be further realized into up-scaling
    images. Now that we have explored the basics of the encoder-decoder architecture,
    will move on to an interesting concept, called *variational encoder*.


    As we have seen so far, the traditional autoencoder architecture creates a latent
    space with the representational information from the input so that the output
    can be generated by the decoder network. But imagine that a single attribute is
    contributing to a discrete value, and it will be restricted to only one value
    when it is getting re-created. This restriction will not help the model generate
    something new from the distribution, but will just repeat. What if we want to
    get the representation in the latent space as a distribution instead of as a discrete
    value? We can do that, but there will be two different characteristics that come
    up now:


    - Stochastic process

    - Deterministic process


    It is already established via multiple deep learning concepts, that whenever a
    network is getting trained, it needs to have a set of processes that can learn
    and adapt to losses. There will be a forward propagation to compute the loss (the
    difference between the actual and the output) given the parameters of the model.
    There will also be backward propagation, which will change the weights according
    to the loss incurred due to the differences in the expected output and the ground
    truth. So, essentially we can train a network only when it is deterministic. Variational
    autoencoders are shown in Figure [8-4](#520381_1_En_8_Chapter.xhtml#Fig6).'
