    \ 0。\n\n**图 7-4** 混淆矩阵\n\n## 方法 2：使用自编码器\n\n构建一个自编码器训练网络，该网络包含以下部分：\n\n*   **编码器**：对原始图像进行编码（基于像素值）。\n\
    *   **解码器**：根据编码器的输出重建图像。\n\n评估原始图像与重建图像之间的模型。基于误差度量分数，检测出最异常的图像。\n\n以下是五个实现步骤：\n\
    \n1.  步骤 1：准备数据集对象。\n2.  步骤 2：构建自编码器网络。\n3.  步骤 3：训练自编码器网络。\n4.  步骤 4：基于原始数据计算重建损失。\n\
    5.  步骤 5：基于误差度量分数选择最异常的图像。\n\n### 步骤 1：准备数据集对象\n\n加载 `input.csv` 文件。`input.csv`\
    \ 文件中的每条记录包含 65 个值。前 64 个值表示手写数字的灰度像素值。最后一个值表示数字的原始类别，其范围在 0 到 9 之间。\n\n将 CSV\
    \ 数据记录转换为张量。之后，对像素值和原始类别数据进行归一化。\n\n```\n# 步骤 1\n# 准备数据集对象\nprint(\"\\n 加载 CSV\
    \ 数据，转换为归一化张量数据 \")\n# 加载包含 65 个值的 .csv 数据集\n# 前 64 个值表示 64 个灰度格式的像素值\n# 最后 1\
    \ 个值表示实际数字（范围在 0 到 9 之间）\ncsv_data = \"hand_written_digits.txt\"\n# 使用辅助函数 \"\
    tensor_converter\" 将 CSV 格式转换为归一化张量\ntensor_data = tensor_converter(csv_data)\n\
    ```\n\n### 步骤 2：构建自编码器网络\n\n这里我们构建自编码器网络，该网络包含编码器和解码器架构。\n\n*   编码器将原始数字像素值转换为更低维度的空间。（例如，它将\
    \ 64 个灰度像素值转换为 8 个值。）\n*   解码器从低维度重建原始数字。（例如，它使用 8 个值重建 64 像素的灰度图像。）\n\n在此问题陈述中，编码和解码过程均使用全连接层。编码网络使用三个全连接（FC）层构建，其中第一个\
    \ FC 层将 65 个值（64+1）转换为 48 个，第二个层将 48 个值转换为 32 个。最后一层将 32 个值转换为 8 个。编码过程 ——> 65–48-32-8。\n\
    \n解码网络使用三个全连接层构建，其中第一个层将 8 个值转换为 32 个，第二个 FC 层将 32 个值转换为 48 个。最后一层将 48 个值转换为 65\
    \ 个。解码过程 ——> 8-32-48-65。\n\n```\ndef __init__(self):\n    super(Autoencoder, self).__init__()\n\
    \    self.fc1 = T.nn.Linear(65, 48)\n    self.fc2 = T.nn.Linear(48, 32)\n    self.fc3\
    \ = T.nn.Linear(32, 8)\n    self.fc4 = T.nn.Linear(8, 32)\n    self.fc5 = T.nn.Linear(32,\
    \ 48)\n    self.fc6 = T.nn.Linear(48, 65)\n\ndef encode(self, x):\n    # 65-48-32-8\n\
    \    z = T.tanh(self.fc1(x))\n    z = T.tanh(self.fc2(z))\n    z = T.tanh(self.fc3(z))\n\
    \    return z\n\ndef decode(self, x):\n    # 8-32-48-65\n    z = T.tanh(self.fc4(x))\n\
    \    z = T.tanh(self.fc5(z))\n    z = T.sigmoid(self.fc6(z))\n    return z\n```\n\
    \n### 步骤 3：训练自编码器网络\n\n使用超参数（如学习率、周期数、批次大小、损失度量和损失优化器）训练自编码器网络。训练时，一个辅助函数会接收自编码器网络、张量数据以及之前指定的所有其他超参数。\n\
    \n```\n# 步骤 3. 训练自编码器模型\nbatch_size = 10\nmax_epochs = 200\nlog_interval = 8\n\
