    ### 数据加载器


    既然我们已经探索了数据，现在让我们为训练目的设置数据加载器。在此变体中，我们将不使用数据增强来帮助训练正则化。我们只会将图像调整大小并裁剪为统一的 224x224
    尺寸。这个图像的起始尺寸并非固定不变；如果需要，你可以使用不同的尺寸。


    除了图像的尺寸和裁剪之外，我们还将考虑将图像转换为 PyTorch 框架所需的张量。我们将尝试使用均值和标准差对图像进行归一化。如果我们考虑每个图像有三个通道，那么我们需要为一个通道提供三个值。我们需要一组均值和标准差的组合。


    代码如下：


    ```

    train_transform = transforms.Compose([

    transforms.Resize(224),

    transforms.CenterCrop(224),

    transforms.ToTensor(),

    transforms.Normalize([0.485, 0.456, 0.406],

    [0.229, 0.224, 0.225])

    test_transform = transforms.Compose([

    transforms.Resize(224),

    transforms.CenterCrop(224),

    transforms.ToTensor(),

    transforms.Normalize([0.485, 0.456, 0.406],

    [0.229, 0.224, 0.225])])

    train_data = datasets.ImageFolder(os.path.join(data_path, ''train''), transform=
    train_transform)

    test_data = datasets.ImageFolder(os.path.join(data_path, ''test''), transform=
    test_transform)

    train_loader = DataLoader(train_data,

    batch_size= 16, shuffle= True, pin_memory= True)

    test_loader = DataLoader(test_data,

    batch_size= 1, shuffle= False, pin_memory= True)

