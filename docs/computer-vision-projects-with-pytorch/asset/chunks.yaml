- fmt: '# R-CNN


    For a long time, objects were separated by image segmentation. Eventually, the
    hierarchical nature of images posed a bottleneck for developers. Consider if we
    were trying to locate a person in a car in traffic. An exhaustive search mechanism
    could be used to scan through each car to find exactly where the person was, but
    the computation requirement would too high to be useful.


    Amid all these problems, the paper entitled “Selective Search for Object Recognition”
    tried to solve the problem of generating object locations. It uses the best of
    both worlds—segmentation and exhaustive searching. The following steps show how
    the selective search mechanism works.


    Here’s how the algorithm works:


    1. The algorithm uses efficient graph-based segmentation to generate the initial
    regions.

    2. The second stage tries to group similar regions to generate segments in the
    input images. For all the regions created, similarity scores are calculated across
    all the neighboring elements. The two most similar regions are grouped together
    and scores are recalculated. This process is repeated until the entire image is
    covered by the operations.

    3. The selection process is convoluted. It uses multiple strategies to get similar
    regions together. If two regions are being combined, the features of the regions
    can be propagated through the hierarchy.

    4. The selection criteria depends on complementary color spaces, where it indulges
    in a hierarchical grouping algorithm in a variety of spaces, including finding
    complementary color spaces. Overall, four fast and efficient strategies help the
    algorithm.


    The main goal of this algorithm is to find diverse yet complementary features
    to group regions under their strategies.


    Precursors in the field of object detection are `HOG` (Histogram of Oriented Gradients)
    and `SIFT`. When the complexity of the visual tasks was acknowledged, a different
    approach was developed.


    ## The Region Proposal Network


    Figure [3-3](#520381_1_En_3_Chapter.xhtml#Fig3) describes the various steps for
    object detection in region proposal networks. Let’s go through the important steps:


    1. Generating segmentation and multiple candidate regions.

    2. Using a greedy learning algorithm to combine similar regions into larger ones
    recursively.

    3. Sending the images with the proposals to the convolutional neural network architecture
    set out for classifying objects.

    4. In the case of `AlexNET`, which is used in standard R-CNN, `227 x 227` is used
    as the shape of the image.

    5. Around 2000 regions are sent to the `AlexNET` and 4096 vectors are passed on.

    6. The extracted features are evaluated against an `SVM` trained in specific classes.

    7. After all the regions are scored, non-max suppression runs on the classified
    regions. It eliminates regions with `IOU` to pave the way for regions with greater
    than the threshold value and a higher region cover.


    ![](images/520381_1_En_3_Chapter/520381_1_En_3_Fig3_HTML.jpg)


    A diagram of a box labeled Input image at left, and at right from top to bottom,
    a rectangle with 2 boxes Object 1, Object 2, and an unmarked box, below it, Region
    proposals, a box labeled Input image, a rectangle with connected boxes inside,
    C N N features, and connected to it by arrows are two boxes Object 1, and Object
    2.


    Figure 3-3


    Object detection via region proposal


    Figure


    Interestingly, as the algorithm locates 2000 regions of interest, it generates
    warped image content from the proposed regions. Since the convolutional blocks
    need fixed dimensions, the information is warped in space and passed on.


    Each of these regions is then classified by support vector machines. Additionally,
    the algorithm will perform a regression which will rectify or predict any offset
    to the bounding box predicted in the first place. Before going to the next step,
    let’s review two important concepts that are used multiple times here onward.


    - **Non-maximum suppression.** In object detection algorithms, a scenario often
    arises wherein there are multiple bounding boxes overlapped around one single
    object. A classifier is often asked to generate probability scores around the
    regions of interest that are different sizes. To counter the problem of selecting
    one best bounding box, the algorithm uses classification information and the percentage
    of coverage on the object.

    - **Intersection over Union (IoU).** Used to select the bounding box that has
    the most similarity with the ground truth. When we are dealing with image classification,
    we try to map images to their respective classes. Likewise, for object detection,
    there needs to be a manual intervention of drawing bounding boxes to locate separate
    objects and classes. The equation gives the ratio of intersection to the union.


    The formula for `IoU` is given by:


    ```

    IoU = (Bounding Box 1 ∩ Bounding Box 2) / (Bounding Box 1 ∪ Bounding Box 2)

    ```


    Figure [3-4a](#520381_1_En_3_Chapter.xhtml#Fig4) shows an image with two overlapping
    bounding boxes, one being the ground truth and the other the predicted truth.
    Figure [3-4b](#520381_1_En_3_Chapter.xhtml#Fig5) shows the area aggregated by
    both of them. These two aspects balance each other out to get the maximum coverage
    of the ground truth.


    ![](images/520381_1_En_3_Chapter/520381_1_En_3_Fig5_HTML.jpg)


    An illustration of a horizontal box. Inside are two horizontal rectangles of different
    colors. Both are shaded in and their two corners are linked together to form a
    square. The square formed is shaded, as well.


    Figure 3-4b


    Bounding box union


    ![](images/520381_1_En_3_Chapter/520381_1_En_3_Fig4_HTML.jpg)


    An illustration of a horizontal box. Inside are two horizontal rectangles of different
    colors. Their two corners are linked together to form a square. The square formed
    is shaded.


    Figure 3-4a


    Bounding box interaction


    Overall, this algorithm can handle a lot of issues related to object detection
    and was one of the most revolutionary algorithms when it was published. But it
    is not without its flaws. Let’s dive into some of its glaring flaws now:


    - With the help of complex image processing techniques, the model will generate
    2000 regions of interest. All of these need to be run by a support vector machine
    for classification. There is a huge amount of computation involved in this process.

    - Most of the algorithms take a lot of time to classify and process images when
    they are predicting. If we deal with real-time solutions, it is close to impossible
    to use this model as an algorithm.

    - The training is happening in the convolutional section; the classifier and the
    regression are correcting the bounding box parameters.

    - In the initial section of the algorithm, a selective search mechanism is used
    to segment similar regions and collectively generate regions of interest. The
    entire process is based on the collocation of complex image processing techniques.
    There is no learning involved in the process, thus the scope for improvement is
    minimal.


    Amid all the problems R-CNN solved in object detection, it left behind a series
    of issues that needed to be addressed. An advancement to region-based object detection
    network came along, named fast region-based convolutional network.'
  raw: '## R-CNN


    For a long time, objects were separated by image segmentation. Eventually, the
    hierarchical nature of images posed a bottleneck for developers. Consider if we
    were trying to locate a person in a car in traffic. An exhaustive search mechanism
    could be used to scan through each car to find exactly where the person was, but
    the computation requirement would too high to be useful.


    Amid all these problems, the paper entitled “Selective Search for Object Recognition”
    tried to solve the problem of generating object locations. It uses the best of
    both worlds—segmentation and exhaustive searching. The following steps show how
    the selective search mechanism works.


    Here’s how the algorithm works:


    1.  The algorithm uses efficient graph-based segmentation to generate the initial
    regions.


    2.  The second stage tries to group similar regions to generate segments in the
    input images. For all the regions created, similarity scores are calculated across
    all the neighboring elements. The two most similar regions are grouped together
    and scores are recalculated. This process is repeated until the entire image is
    covered by the operations.


    3.  The selection process is convoluted. It uses multiple strategies to get similar
    regions together. If two regions are being combined, the features of the regions
    can be propagated through the hierarchy.


    4.  The selection criteria depends on complementary color spaces, where it indulges
    in a hierarchical grouping algorithm in a variety of spaces, including finding
    complementary color spaces. Overall, four fast and efficient strategies help the
    algorithm.


    The main goal of this algorithm is to find diverse yet complementary features
    to group regions under their strategies.


    Precursors in the field of object detection are HOG (Histogram of Oriented Gradients)
    and SIFT. When the complexity of the visual tasks was acknowledged, a different
    approach was developed.


    ### The Region Proposal Network


    Figure [3-3](#520381_1_En_3_Chapter.xhtml#Fig3) describes the various steps for
    object detection in region proposal networks. Let’s go through the important steps:


    1.  Generating segmentation and multiple candidate regions.


    2.  Using a greedy learning algorithm to combine similar regions into larger ones
    recursively.


    3.  Sending the images with the proposals to the convolutional neural network
    architecture set out for classifying objects.


    4.  In the case of AlexNET, which is used in standard R-CNN, 227 x 227 is used
    as the shape of the image.


    5.  Around 2000 regions are sent to the AlexNET and 4096 vectors are passed on.


    6.  The extracted features are evaluated against an SVM trained in specific classes.


    7.  After all the regions are scored, non-max suppression runs on the classified
    regions. It eliminates regions with IOU to pave the way for regions with greater
    than the threshold value and a higher region cover.


    ![](images/520381_1_En_3_Chapter/520381_1_En_3_Fig3_HTML.jpg)


    A diagram of a box labeled Input image at left, and at right from top to bottom,
    a rectangle with 2 boxes Object 1, Object 2, and an unmarked box, below it, Region
    proposals, a box labeled Input image, a rectangle with connected boxes inside,
    C N N features, and connected to it by arrows are two boxes Object 1, and Object
    2.


    Figure 3-3


    Object detection via region proposal


    Figure


    Interestingly, as the algorithm locates 2000 regions of interest, it generates
    warped image content from the proposed regions. Since the convolutional blocks
    need fixed dimensions, the information is warped in space and passed on.


    Each of these regions is then classified by support vector machines. Additionally,
    the algorithm will perform a regression which will rectify or predict any offset
    to the bounding box predicted in the first place. Before going to the next step,
    let’s review two important concepts that are used multiple times here onward.


    *   **Non-maximum suppression.** In object detection algorithms, a scenario often
    arises wherein there are multiple bounding boxes overlapped around one single
    object. A classifier is often asked to generate probability scores around the
    regions of interest that are different sizes. To counter the problem of selecting
    one best bounding box, the algorithm uses classification information and the percentage
    of coverage on the object.


    *   **Intersection over Union (IoU).** Used to select the bounding box that has
    the most similarity with the ground truth. When we are dealing with image classification,
    we try to map images to their respective classes. Likewise, for object detection,
    there needs to be a manual intervention of drawing bounding boxes to locate separate
    objects and classes. The equation gives the ratio of intersection to the union.


    The formula for IoU is given by:


    ![$$ IoU=\frac{\left( Bounding\ Box\ 1\right)\cap \left( Bounding\ Box\ 2\right)}{\left(
    Bounding\ Box\ 1\right)\cup \left( Bounding\ Box\ 2\right)} $$](images/520381_1_En_3_Chapter/520381_1_En_3_Chapter_TeX_Equa.png)


    Figure [3-4a](#520381_1_En_3_Chapter.xhtml#Fig4) shows an image with two overlapping
    bounding boxes, one being the ground truth and the other the predicted truth.
    Figure [3-4b](#520381_1_En_3_Chapter.xhtml#Fig5) shows the area aggregated by
    both of them. These two aspects balance each other out to get the maximum coverage
    of the ground truth.


    ![](images/520381_1_En_3_Chapter/520381_1_En_3_Fig5_HTML.jpg)


    An illustration of a horizontal box. Inside are two horizontal rectangles of different
    colors. Both are shaded in and their two corners are linked together to form a
    square. The square formed is shaded, as well.


    Figure 3-4b


    Bounding box union


    ![](images/520381_1_En_3_Chapter/520381_1_En_3_Fig4_HTML.jpg)


    An illustration of a horizontal box. Inside are two horizontal rectangles of different
    colors. Their two corners are linked together to form a square. The square formed
    is shaded.


    Figure 3-4a


    Bounding box interaction


    Overall, this algorithm can handle a lot of issues related to object detection
    and was one of the most revolutionary algorithms when it was published. But it
    is not without its flaws. Let’s dive into some of its glaring flaws now:


    *   With the help of complex image processing techniques, the model will generate
    2000 regions of interest. All of these need to be run by a support vector machine
    for classification. There is a huge amount of computation involved in this process.


    *   Most of the algorithms take a lot of time to classify and process images when
    they are predicting. If we deal with real-time solutions, it is close to impossible
    to use this model as an algorithm.


    *   The training is happening in the convolutional section; the classifier and
    the regression are correcting the bounding box parameters.


    *   In the initial section of the algorithm, a selective search mechanism is used
    to segment similar regions and collectively generate regions of interest. The
    entire process is based on the collocation of complex image processing techniques.
    There is no learning involved in the process, thus the scope for improvement is
    minimal.


    Amid all the problems R-CNN solved in object detection, it left behind a series
    of issues that needed to be addressed. An advancement to region-based object detection
    network came along, named fast region-based convolutional network.'
  trans: '

    # R-CNN


    长期以来，物体都是通过图像分割来分离的。最终，图像的层次性给开发者带来了瓶颈。试想一下，如果我们试图在车流中定位一辆汽车里的人。可以使用穷举搜索机制来扫描每辆车，以精确找到人的位置，但所需的计算量过高，难以实用。


    面对这些问题，一篇题为《用于目标识别的选择性搜索》的论文试图解决生成目标位置的问题。它结合了分割和穷举搜索这两者的优点。以下步骤展示了选择性搜索机制的工作原理。


    该算法的工作原理如下：


    1.  该算法使用高效的基于图的分割来生成初始区域。

    2.  第二阶段尝试对相似区域进行分组，以在输入图像中生成片段。对于所有已创建的区域，会计算所有相邻元素之间的相似度得分。两个最相似的区域被合并在一起，并重新计算得分。此过程重复进行，直到整个图像都被这些操作覆盖。

    3.  选择过程是复杂的。它使用多种策略将相似区域聚合在一起。如果两个区域被合并，这些区域的特征可以通过层级结构进行传播。

    4.  选择标准依赖于互补的颜色空间，它在多种空间中采用层次分组算法，包括寻找互补的颜色空间。总体而言，四种快速高效的策略为该算法提供了支持。


    该算法的主要目标是在其策略下，找到多样且互补的特征来对区域进行分组。


    目标检测领域的先驱是`HOG`（方向梯度直方图）和`SIFT`。当视觉任务的复杂性被认识到后，一种不同的方法被开发出来。


    ## 区域提议网络


    图 3-3 描述了区域提议网络中目标检测的各个步骤。让我们来看一下重要的步骤：


    1.  生成分割和多个候选区域。

    2.  使用贪婪学习算法递归地将相似区域合并成更大的区域。

    3.  将带有提议的图像发送到用于分类目标的卷积神经网络架构中。

    4.  在标准 R-CNN 中使用的`AlexNET`的情况下，使用`227 x 227`作为图像的形状。

    5.  大约 2000 个区域被发送到`AlexNET`，并传递 4096 个向量。

    6.  提取的特征会与针对特定类别训练的`SVM`进行评估。

    7.  在所有区域被评分后，对分类后的区域执行非极大值抑制。它会消除`IOU`低于阈值的区域，为覆盖范围更大且高于阈值的区域铺平道路。


    ![](img/520381_1_En_3_Fig3_HTML.jpg)


    左侧是一个标记为“输入图像”的方框示意图，右侧从上到下依次是：一个包含两个方框（对象 1、对象 2）和一个未标记方框的矩形，其下方是“区域提议”，一个标记为“输入图像”的方框，一个内部包含连接方框的矩形（CNN
    特征），并通过箭头连接到两个方框（对象 1 和对象 2）。


    图 3-3


    通过区域提议进行目标检测


    图


    有趣的是，当算法定位到 2000 个感兴趣区域时，它会从提议的区域生成扭曲的图像内容。由于卷积块需要固定的尺寸，信息会在空间上被扭曲并传递。


    然后，这些区域中的每一个都由支持向量机进行分类。此外，该算法将执行回归，以修正或预测最初预测的边界框的任何偏移。在进入下一步之前，让我们回顾两个重要的概念，它们将在后续内容中多次使用。


    -   **非极大值抑制。** 在目标检测算法中，经常会出现多个边界框重叠在单个对象周围的情况。分类器通常需要为不同大小的感兴趣区域生成概率分数。为了解决选择一个最佳边界框的问题，该算法使用分类信息和对象上的覆盖百分比。

    -   **交并比（IoU）。** 用于选择与真实值最相似的边界框。在处理图像分类时，我们试图将图像映射到它们各自的类别。同样，对于目标检测，需要手动绘制边界框来定位不同的对象和类别。该公式给出了交集与并集的比率。


    `IoU`的公式如下：


    ```

    IoU = (边界框 1 ∩ 边界框 2) / (边界框 1 ∪ 边界框 2)

    ```


    图 3-4a 显示了一个包含两个重叠边界框的图像，一个是真实框，另一个是预测框。图 3-4b 显示了由两者聚合的区域。这两个方面相互平衡，以获得真实值的最大覆盖范围。


    ![](img/520381_1_En_3_Fig5_HTML.jpg)


    一个水平方框的示意图。内部有两个不同颜色的水平矩形。两者都被着色，并且它们的两个角连接在一起形成一个正方形。形成的正方形也被着色。


    图 3-4b


    边界框并集


    ![](img/520381_1_En_3_Fig4_HTML.jpg)


    一个水平方框的示意图。内部有两个不同颜色的水平矩形。它们的两个角连接在一起形成一个正方形。形成的正方形被着色。


    图 3-4a


    边界框交集


    总的来说，该算法能够处理许多与目标检测相关的问题，并且在发布时是最具革命性的算法之一。但它并非没有缺陷。现在让我们深入探讨它的一些明显缺陷：


    -   借助复杂的图像处理技术，模型将生成 2000 个感兴趣区域。所有这些区域都需要由支持向量机进行分类。这个过程涉及巨大的计算量。

    -   大多数算法在预测时，分类和处理图像需要花费大量时间。如果我们要处理实时解决方案，几乎不可能将此模型用作算法。

    -   训练发生在卷积部分；分类器和回归正在修正边界框参数。

    -   在算法的初始部分，使用选择性搜索机制来分割相似区域并共同生成感兴趣区域。整个过程基于复杂图像处理技术的搭配。该过程中不涉及学习，因此改进的空间很小。


    尽管 R-CNN 解决了目标检测中的诸多问题，但它也留下了一系列需要解决的问题。随后出现了一种基于区域的目标检测网络的改进版本，称为快速区域卷积网络。

    '
- fmt: '### Fast Region-Based Convolutional Neural Network


    To set the context, if there is an image on which object detection should work,
    as per the simple region-based convolutional neural network, it will generate
    the regions of interest on top of simple images. The combinations will be huge.
    But if we can reduce the image to a smaller size in terms of (`x`, `y`), we can
    still get the portion of the image with the correct object information. Eventually,
    this boils down to how we are conveying the information to the subsequent layers
    and the cost function. Fast R-CNN leads to faster operations.


    Figure [3-5](#520381_1_En_3_Chapter.xhtml#Fig6) depicts the workflow based on
    one region of interest. The architecture suggests that a convolution operation
    is performed on the input data, thus reducing the computations.


    ![](images/520381_1_En_3_Chapter/520381_1_En_3_Fig6_HTML.jpg)


    A diagram depicts from left to right, a box named Input image, 2 right arrows
    named C N N and R O I, below them is Projection, to their right, an upright cuboid
    named Convolutional feature map, a down arrow, an upright cuboid named R O I pooling
    layer, a series of bars named Fully connected layers, 2 bars named SoftMax and
    B BOX regressor.


    Figure 3-5


    Fast R-CNN architecture


    The processes involved in the fast region-based object detection are as follows:


    1.  A feature map is created from multiple convolutions and pooling operations.

    2.  Since the fully connected network will want a vector of fixed dimensions,
    the region of interest’s pooling layer extracts a fixed-length vector.

    3.  Each of these feature vectors is input into the fully connected network, which
    is again connected to the output layers.

    4.  The first connected layer includes a softmax probability estimates calculation,
    with over *n* object classes and an additional one for a background or unknown
    class.

    5.  The second layer of output predicts four real numbers for each object class.
    Each set defines the corrected bounding box values for the class in question.


    Each of these architectures we covered uses a selective search algorithm to find
    the regions of interest. There are two problems with this. First, the complex
    computer vision process was not learning any changes in the data, as it has a
    fixed set of instructions related to how the regions need to be identified. Second,
    selective search is a slow and time-consuming process. These problems are handled
    in an upgraded version of the algorithm, called a faster R-CNN.


    ### How the Region Proposal Network Works


    An extended idea came along, which was suggested and implemented as well, which
    used a neural network to predict the region proposals without a selective search
    mechanism. The region proposal network came along to help identify the bounding
    boxes in the images and then the same block is sent out to the convolutional neural
    network for feature maps.


    Eventually, the loss functions are trained on the feature maps and the network
    weights are adjusted to accommodate the training. Let’s go through this process
    step by step:


    1.  In the first step, the input image is passed onto a convolutional block to
    generate the convolutional feature maps.

    2.  A sliding window is used on the feature map for each location, by the region
    proposal network.

    3.  For each location, nine anchor boxes are used with three different scales
    and three aspect ratios (1:1, 1:2, 2:1), which helps generate the region proposals.

    4.  The classification layer tells the output whether there is an object present
    in the anchor boxes.

    5.  The regression layer indicates the coordinates for the anchor boxes.

    6.  The anchor boxes are passed to the region of interest’s pooling layer of the
    Fast R-CNN architecture.


    We have used a neural network to learn where the region proposals are and how
    they can be tuned based on the data. This also makes the process much faster than
    the one we learned about earlier. Figure [3-6](#520381_1_En_3_Chapter.xhtml#Fig7)
    shows the architecture from the primary research paper of Faster R-CNN.


    ![](images/520381_1_En_3_Chapter/520381_1_En_3_Fig7_HTML.jpg)


    A diagram depicts from the bottom to top, a partially covered photo named, image,
    on top of it, a cuboid named convolutional layers, an up arrow, a parallelogram
    named features maps, the regional proposal network, an up arrow, a parallelogram
    named proposals, up arrow, R o I pooling, a parallelogram named classifiers, an
    up arrow.


    Figure 3-6


    Faster R-CNN summary


    The network has a novel idea of a region proposal network that learns the bounding
    boxes and can generalize them. It has three main types of networks:


    *   **Head:** Can be a ResNet architecture, which serves the purpose of generating
    feature maps.

    *   **Region Proposal Network:** Generates the region of interest for the classifier
    and the regressor.

    *   **Classification Network/ Regression Network:** Handles the classification
    of objects and objectness or the correctness of the bounding box coordinates.


    Figure [3-7](#520381_1_En_3_Chapter.xhtml#Fig8) depicts the basic layers of Faster
    R-CNN. Let’s go into the details, which will enhance the development of the layers.


    ![](images/520381_1_En_3_Chapter/520381_1_En_3_Fig8_HTML.jpg)


    A flowchart. The flow is as follows, anchor generation layers to region proposal
    layers to R O I pooling layers, a down arrow, and classification layers.


    Figure 3-7


    Faster R-CNN flowchart


    ### The Anchor Generation Layer


    This layer produces a series of bounding boxes with different sizes and aspect
    ratios to cover most of the image regions. The bounding boxes or the anchor boxes
    will encompass images and their objects. These boxes, however, will be content-agnostic
    and the same throughout, and eventually the region proposal network will work
    on them and identify which of them is a better bounding box. Little tweaks will
    lead to a better bounding box.


    Since predicting these coordinates has its problems, another approach is to take
    a reference box as a standard for the bounding box. Take a reference box as (`X[center]`,
    `Y[center]`, width, and height) and then try to predict and correct the offset
    values to make it fit better. The offset values are for all four parameters.


    ### The Region Proposal Layer


    The region proposal network works on changing the position, width, and height
    of the anchor boxes to fit the object better. This layer can be considered a combination
    of the region proposal network, the proposal layer, the anchor target layer, and
    the proposal target layer.


    *   **Region proposal network:** The layer uses the feature maps and feeds them
    to a convolutional neural network. The output is then passed to two 1x1 convolutional
    layers to produce the regression coefficients the correspond to the bounding box,
    class scores, and probabilities.

    *   **Proposal layer:** This layer takes the numerous anchor boxes and reduces
    them to an appropriate number by taking help from non-max suppression based on
    the foreground scores. It also changes the coordinates of the bounding boxes using
    the coefficients generated by the region proposal network.

    *   **Anchor target layer:** This helps in the selection of the anchor boxes that
    help the RPN differentiate between the foreground and the background.


    The loss function for RPN is a combination of classification and regression loss.


    ![$$ loss= Regression\ {Loss}_{Bounding\ Box}+ Classification\ Loss $$](images/520381_1_En_3_Chapter/520381_1_En_3_Chapter_TeX_Equb.png)


    Overall, Faster R-CNN has a convolutional neural network-based image feature extractor
    and region proposal network to generate the regions of interest. We have ROI pooling
    to get the images to fixed dimensions for the next layers and finally to the classification
    and regression layers. This helps the anchor boxes be a better fit and be good
    enough to differentiate between the foreground and background.'
