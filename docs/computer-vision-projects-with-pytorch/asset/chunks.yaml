    ## 总结


    本章从图像放大的相关问题入手，讨论了如何进行放大。我们探讨了各种方法的优势以及当前可用的建模技术。讨论并实现了诸如 SRGAN 等最先进的算法。我们还经历了训练过程并搭建了项目。本章讨论了如何结合生成模型，使用卷积模型将图像放大一定倍数。超分辨率是一个不断发展的领域，应用广泛，例如从交通摄像头中检测车牌或增强老照片。这是计算机视觉中一个非常重要的领域，并且拥有多年的研究价值。


    在下一章中，我们将从静态图像的概念转向动态图像，也就是视频。


    # 9. 视频分析


    机器学习之旅始于很久以前的结构化数据，并发展到提取有意义的预测的过程。随着数据的增长，机器学习也开始探索其他数据类型。如今，可以处理的数据类型已没有限制。


    从结构化数据开始，我们开始分析文本数据。我们开始理解文本，并利用文本中的特征进行预测。然后我们也转向了图像。尽管这个过程有时充满挑战，但得益于 GPU 和
    TPU 处理能力的进步，一切开始步入正轨。


    接下来是音频处理。这包括使用频率处理音频，或者将音频转换为文本，然后进行预测。


    所有这些概念的结合被称为*视频分析*。


    现有的视频数据量是巨大的。世界每时每刻都在创造视频内容。娱乐和体育产业依赖视频运行，安全摄像头也在捕捉每一个动作。如图 9-1 所示，仅 YouTube 就有超过
    20 亿用户。想想从视频中产生的数据量。随着我们看到更多的数据，更多的问题将会浮现，人工智能将被用来解决这些问题。


    ![](img/520381_1_En_9_Fig1_HTML.jpg)


    一个条形图显示了 2006 年至 2020 年每月的 YouTube 使用量。随着时间的推移，YouTube 的使用量在增加。2020 年的月活跃用户数最高，达到
    20 亿。2006 年的用户数最低，甚至不到 10 亿。


    图 9-1


    YouTube


    视频内容分析，也称为视频分析，是自动分析视频以检测和确定时空事件的能力。

