  trans: '

    ### 卷积神经网络


    你现在已经知道图像具有特征，并且需要提取这些特征以更好地理解数据。如果我们考虑一个像素矩阵，像素在四个方向上都是相互关联的。如何高效地进行提取？传统的机器学习或深度学习方法会有帮助吗？让我们来看几个问题：


    1.  图像的尺寸可能非常巨大。例如，一张 200 万像素的图像，如果允许拍摄 1600x1200 的图像，那么每张图像将包含 190 万个像素。

    2.  如果我们通过图像捕获数据，数据并不总是居中对齐的。例如，一只猫可能在一张图像的角落里，而在下一张图像中，它可能位于中心。模型应该能够捕捉到信息中的空间变化。

    3.  图像中的猫可以沿垂直方向或水平方向旋转，但它仍然是一只猫。因此，我们需要一个稳健的解决方案来捕捉这些差异。


    我们需要对我们常规的表格数据处理方法进行重大升级。如果我们能把一个问题分解成更小、更易于管理的部分，那么任何问题都可以解决。在此，我们使用*卷积神经网络*。我们尝试通过卷积核将图像分解成多个特征图，并依次使用它们来构建一个模型，该模型随后可用于任何下游或前置任务。


    卷积核是特征提取器。特征可以是边缘、梯度、模式，或本章前面讨论过的任何微小特征。通常使用一个方阵来对第一步的图像和第二步的特征图执行卷积操作。由卷积核执行的卷积任务可以被视为点积中最简单的任务。见图
    1-10a 和 1-10b。


    ![](img/520381_1_En_1_Fig15_HTML.png)


    一个 3 列 3 行的表格。第 1 行有 0, 1, 0。第 2 行有 0, 1, 0。第 3 行有 0, 1, 0。数字位于每个单元格的右下角。它描绘了卷积神经网络中的一个
    3x3 卷积核。


    **图 1-10b** 3x3 卷积核


    ![](img/520381_1_En_1_Fig14_HTML.png)


    一个 3 列 3 行的表格。第 1 行有 2, 3, 4。第 2 行有 2, 3, 2。第 3 行有 3, 4, 1。数字位于每个单元格的右下角。它描绘了特征图的
    3x3 矩阵。


    **图 1-10a** 特征图的 3x3 矩阵


    图 1-10a 是图像或特征图，图 1-10b 是卷积核。卷积核是特征提取器，因此它将对特征图进行点积运算，得到值 10。这是我们卷积的第一步。图像或特征图会很大，因此卷积核可能不仅仅在一个
    3x3 矩阵上操作，它会向前移动一个步长来计算下一个卷积操作。让我们来看一个关于这个想法的外推示例。


    ![](img/520381_1_En_1_Fig16_HTML.jpg)


    表 1 有 5 列 5 行。第 1 行的值为 2, 3, 4, 2, 3。第 2 行为 2, 3, 2, 4, 1。第 3 行为 2, 2, 3, 3, 3。第
    4 行为 7, 2, 1, 8, 9。第 5 行为 8, 8, 9, 6, 5。表 2 有 2 列 2 行。第 1、2、3 行均为 0, 1, 0。表 3
    有 3 列 3 行。第 1 行的值为 8, 9, 9。第 2 行为 7, 6, 15。第 3 行为 12, 13, 17。


    **图 1-11** 特征图、卷积核及输出结果


    如图 1-11 所示，一个 5x5 的特征图被一个 3x3 的卷积核卷积，结果得到一个 3x3 的特征图。该特征图将再次被卷积或转换为某些特征，用于下游任务。


    卷积过程还包含一个*步长*的概念，这是一个超参数，告诉卷积核如何在特征图上移动。在我们的卷积神经网络中，步长为 1。步长大于 1 可能会导致特征图中出现棋盘格问题，即某些像素比其他像素获得更多关注。根据我们的业务需求，我们可能希望或不希望这种效果。较高的步长值也可用于降低特征图的维度。


    这种卷积存在一个固有问题。当进行卷积操作时，维度会不断缩小。这在某些意义上或特定用例中可能是可取的，但在某些用例中，我们可能希望保留原始维度。我们可以使用填充的概念来处理图像或后续的特征图，以避免维度缩减的问题。填充是另一个超参数。我们在图像或特征图周围添加层。


    图 1-12b 展示了填充如何有效地增加空间，并允许卷积核更好地注意到边缘像素值。卷积过程将不止一次地处理边缘值，因此信息会以更大的影响力被传递到下一个特征图。在边缘具有像素值的情况下，无论当时的步长值是多少，卷积核的卷积操作只会取该值一次。


    ![](img/520381_1_En_1_Fig18_HTML.png)


    一个 5 列 5 行的表格。第 1 行有 6 个 0。第 2 行有 0, 4, 1, 4, 0。第 3 行有 0, 5, 1, 2, 0。第 4 行有 0,
    5, 1, 1, 0。第 6 行全是 0。数值位于每个单元格的右下角。这描绘了一个零填充的特征图。


    **图 1-12b** 一个零填充的特征图


    ![](img/520381_1_En_1_Fig17_HTML.png)


    一个 3 列 3 行的表格。第 1 行有 0, 3, 1。第 2 行有 0, 3, 0。第 3 行有 0, 4, 0。数字位于每个单元格的右下角。它描绘了一个边缘检测器。


    **图 1-12a** 一个边缘检测器


    简单的填充就能改变卷积核对边缘的识别，这非常有趣。如果我们假设特征图角落附近有一个重要的边缘，并且没有对其进行填充，那么这些边缘将无法被检测到。这是因为，要检测一条线或一个边缘，卷积核或特征提取器需要有一个相似的模式。以图
    1-12a 中的卷积核为例，它是一个边缘检测器，它需要找到一个合适的梯度来检测实际的边缘。正是由于从 0 到 4、0 到 5 和 0 到 5 的梯度，它现在才能检测到边缘。如果没有填充，这个梯度就不存在，卷积核就会错过一个重要的部分。

    '
- fmt: '### Receptive Field


    When we were working on the concepts of convolutions, there was a feature map
    and kernel stride. The kernel was extracting features in the space such that the
    model could interpret the information to its ease. Now we’ll consider with an
    example a `56x56` image with one channel. (This is also written as `56x56x1`.)
    If we try to convert the entire image to features, the entire span of pixels needs
    to be read. Let’s look at a graphic example to sort out this concept.


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig19_HTML.png)


    A diagram showcases convolution. A table or map featuring five rows and columns
    has the cells in the first three rows and columns highlighted. Two arrows lead
    from this section to another map with three rows and columns. The first cell is
    highlighted. Two arrows lead from this map to a third map that only has one cell
    that is not highlighted.


    **Figure 1-13** Diagram showing convolution operation


    Figure [1-13](#520381_1_En_1_Chapter.xhtml#Fig19) shows a normal `5x5` feature
    map being convolved by another `3x3` kernel, resulting in a `3x3` kernel, assuming
    no padding and the stride to be equal to `1`. The information carried forward
    in the step is being carried from the first block of the feature map to the next
    block of the feature map. That means only the left-most highlighted corner pixel
    information in Figure [1-13](#520381_1_En_1_Chapter.xhtml#Fig19) is contained
    in the left-most pixel value shown in the `3x3` feature map. This poses a problem
    because, if we have only one layer and we have a `3x3` kernel, essentially one
    pixel will have a receptive field of `3x3` in that layer. Interestingly, in the
    layer after that, if we are using a `3x3` kernel again with stride `1` and zero
    paddings, the receptive layer is again `3x3` for Figure [1-13](#520381_1_En_1_Chapter.xhtml#Fig19),
    but the `3x3` has already seen the whole image. Thus, it carries all the information
    from the original image. This concept is called the local and global receptive
    field.


    ### Local Receptive Field


    It is the layer-wise information strength that has been carried forward by the
    convolutions by the kernel for that step. In the example shown in Figure [1-13](#520381_1_En_1_Chapter.xhtml#Fig19),
    we have a `3x3` kernel, or nine pixels. It will depend on the immediate step and
    not the entirety.


    ### Global Receptive Field


    This is the cumulative information being carried to the last layer of the model.
    Generally, we want to average out the information from the image to just one value
    at the end for the sake of simplicity. If we have to predict cats or dogs, it
    will be easy if we just get one value for the same, rather than a matrix at the
    end. The last value (`1x1xn`) or pixel should essentially see all the pixels of
    the image at the start to be able to perfectly decipher the information.


    The example in Figure [1-13](#520381_1_En_1_Chapter.xhtml#Fig19) is being convolved
    by `3x3` and again by `3x3` to reach the final `1x1`. Now the `1x1` would have
    seen the `3x3` figure and that in turn would have seen the `5x5` figure. It’s
    passing the baton and the kernel is helping. The global receptive field here is
    `5x5`.


    ### Pooling


    An initial advantage of the convolutional neural network is that it works with
    parallelism. A fully connected layer would have to worry about an input vector
    of `25` dimensions even if the image size would be as small as (`5x5x1`). Even
    though CNN solves this issue by working on spatial fields, the high dimensionality
    still can cause the CNN architecture to have a huge number of parameters. Pooling
    tries to solve this issue by helping with a dimensionality reduction technique
    and filtering information.


    There is an inherent problem with just applying convolution layers in the CNN.
    The spatial features are captured by the kernel, but a small change in the input
    feature map will have a large impact on the output feature map. To avoid this
    challenge, we can use pooling. Depending on the downstream tasks we are doing,
    we can use max pooling, average pooling, or global average pooling.


    Pooling can be thought of as something similar to how the convolution layer applies
    to the feature map. However, instead of convolution, pooling will work on calculating
    an average or max of all the values in the region. It can be thought of as a function.
    There are no parameters that are learned in the pooling section. It is just plain
    and simple dimensionality reduction in space. It is advisable to use a `2x2` pooling
    on a higher dimensional feature map, which needs to be greater than `10x10` at
    least. The reason being the information concentration at this level of a CNN will
    be too high and a rapid reduction of it by pooling can result in a huge loss.


    #### Max Pooling


    Feature maps will contain the information from the image distributed spatially.
    If we consider a downstream task that needs only the edges, we can try to maximize
    the edges such that the subsequent feature maps will have a piece of filtered
    information to focus on. When max pooling has been selected, the prominent features
    are filtered and passed on to the next layer. When the stride is looking into
    the stretch of pixels, it selects the one with the highest value, thus the word
    max.


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig20_HTML.jpg)


    Table 1, on the left side, has 4 columns and 4 rows. Row 1 has values 12, 2, 4,
    and 3. Row 2 has 3, 2, 4, and 5. Row 3 has 5, 3, 2, and 3. Row 4 has 9, 1, 2,
    and 3. Table 2, on the right side, has 2 columns and 2 rows. Row 1 has values
    12 and 5. Row 2 has values 9 and 9. These tables are depicted as an example of
    max pooling.


    **Figure 1-14** Example of max pooling


    Figure [1-14](#520381_1_En_1_Chapter.xhtml#Fig20) shows a feature map on the left;
    we are trying to get a max pool with a stride of `2`. The resultant feature map
    is reduced from `4x4` to `2x2`, with just having the prominent feature passing
    over. In a way, if there are some edges or gradients in an image or feature map,
    that will take precedence over anything else.


    In the case of tasks like classification, we generally follow the process of max
    pooling, because we need the important edges and gradients to follow and no other
    irrelevant features messing up the architecture. It is interesting to ponder the
    fact that color doesn’t play a role in most of the classification tasks. For example,
    a cat can be any color and the model has to understand it is a cat without considering
    the color.


    #### Average Pooling


    We have already established the basic concept of pooling. It gives us a filtration
    process without increasing any number of learnable parameters. For an average
    pooling of `2x2` and a stride of `2x2`, the strides taking care of a `2x2` block
    at a time will average the entire section and calculate a mean on top of it. The
    mean is passed onto the next section of the feature map.


    For classification tasks, average pooling is generally not suggested. It can however
    be used when the images are darker and you want to extract black-to-white transitions.


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig21_HTML.jpg)


    Table 1, on the left side, has 4 columns and 4 rows. Row 1 has values 12, 2, 4,
    and 3. Row 2 has 3, 3, 4, and 5. Row 3 has 5, 3, 2, and 5. Row 4 has 9, 3, 2,
    and 3. Table 2, on the right side, has 2 columns and 2 rows. Row 1 has values
    5 and 4. Row 2 has values 5 and 3.


    **Figure 1-15** Example of average pooling


    Figure [1-15](#520381_1_En_1_Chapter.xhtml#Fig21) shows a feature map being pooled
    by a `2x2` block with a stride of `2`. The average of the pooled area is reflected
    with each `2x2` block from the feature map shown on the left, mapped to one pixel
    on the right side.'
