  raw: '##### Global Average Pooling


    Global average pooling is sometimes used toward the end of the CNN architecture
    to summarize the feature map to one value. Assume, if you were left with a 5x5
    feature map with some depth (channels in the z-direction, assuming x and y are
    height and width of the feature maps), you could flatten those values out and
    use a fully connected network to map those like features to get a model. This
    is a viable option, but taking 5x5, we are forwarding 25 features to a fully connected
    network and this will take up huge parameters. Instead, you can try to use a global
    average pooling layer after this step and make it to 1x1, essentially managing
    all the important features and having a combination. The model parameters we saved
    by not using a fully connected network can be used to add convolutional layers.
    This can result in better accuracies.


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig23_HTML.png)


    A photo of a PLAIN rectangle, with the number 5 inscribed within it at the center.
    This is a result obtained after GAP.


    Figure 1-16b


    Result after GAP


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig22_HTML.png)


    Table 1, on the left side, has 4 columns and 4 rows. Row 1 has values 12, 2, 4,
    and 3\. Row 2 has 3, 3, 4, and 5\. Row 3 has 5, 3, 2, and 5\. Row 4 has 9, 3,
    2, and 3\. The table depicts a sample feature map.


    Figure 1-16a


    Sample feature map


    Figure [1-16a](#520381_1_En_1_Chapter.xhtml#Fig22) shows a feature map with 4x4
    dimensions. After pooling, we are left with one single value, as shown in Figure
    [1-16b](#520381_1_En_1_Chapter.xhtml#Fig23). In all cases, we will have a depth,
    which will have values based on corresponding pooling and feature maps.


    #### Calculation: Feature Map and Receptive Fields


    The calculation serves as an important aspect of this coursework. We will be using
    it to formulate our models and various experimentations. The dimensions of the
    output feature maps depend on multiple factors, such as stride, kernel size, pooling,
    padding, input, and output. Let’s dive into the details.


    ##### Kernel


    The kernel is the feature extractor from the feature map or the image. It is initialized
    in the first forward propagation but the weights are expected to learn and change
    from the backpropagation to enable it to be a better feature extractor. Once the
    training sets in, the weights move toward the higher end. This can mean the features
    it’s extracting are important to the cost function and thus the weights. Let’s
    denote the dimension of the kernel with *K*.


    ##### Stride


    The step by which the kernel moves around the feature map can be called a stride.
    Let’s denote its value by *S*.


    ##### Pooling


    The block in a conventional convolutional neural network architecture tries not
    to convolve, but aims to capture some kind of information from the spatial feature
    maps and rapidly reduce the dimension of the feature map for the next step. Let’s
    denote that by *mp*.


    ##### Padding


    Padding allows us to keep the dimensions constant after the convolution process
    has taken place. Let’s denote that with *P*.


    ##### Input and Output


    Let’s denote the input and output as is, where input refers to the feature map
    at the first step and output refers to the feature map generated.


    The first step of getting an architecture started for an image will be to access
    the size of the image and determine how deep we want to build the network such
    that the receptive field of the last layer or the output will be equal to the
    size of the image. In other words, it should have seen what is there in the image
    to answer anything about the image. If we have an image of size 56x56x3 the kernel
    to be used can be 3x3x**3**x16\. This means the 3x3 kernel has three different
    sets of initializations and matches up with the channels in the input or preceding
    layer. This is because it has to know the possible way to mix the features that
    need to be extracted and used in the network. The formula becomes:


    HxWxC > KxKxCxC[next]


    Here H, W, C are the height, width, and channel of the input image/feature map.


    K is the kernel size and C[next] is the number of channels in the next step or
    the batch size. When using CUDA scores to train the CNN, we need to push for the
    kernel size to be equal to some number defined by 2^n. For example, if we are
    using 17 as the number of kernels, it will still end up using 32 instead of the
    closest 2^n number, i.e., 16.


    Given all the values and concepts, let’s calculate the feature map outputs:


    ![$$ Output=\frac{\left[ Input+2P-K\right]}{S}+1 $$](images/520381_1_En_1_Chapter/520381_1_En_1_Chapter_TeX_Equa.png)


    *Given, Input = 12x12,*


    *P = 0, K = 3x3, S = 1*


    ![$$ Output=\frac{\left[12+2\ast 0-3\right]}{1}+1 $$](images/520381_1_En_1_Chapter/520381_1_En_1_Chapter_TeX_Equb.png)


    *Output = 10 or 10x10*


    ##### Calculation of Receptive Field


    The receptive calculation at the n^(th) layer will be given by a consolidated
    formula, as follows


    ![$$ Receptive\ Field={\sum}_{i=1}^n\left({K}_i-1\right){\prod}_{j=0}^{i-1}{S}_j
    $$](images/520381_1_En_1_Chapter/520381_1_En_1_Chapter_TeX_Equc.png)


    Let’s say we are calculating the receptive field at the second layer So K[1],
    K[2] = 3.


    The stride of the kernel is 1 for both occasions and the receptive field comes
    to 5.


    ### Understanding the CNN Architecture Type


    #### Understanding Types of Architecture


    #### AlexNet


    ILSVRC is a competition that was dedicated to computer vision research with its
    famous ImageNet dataset being used to evaluate models and research in the field.
    One of the first winners was AlexNet, which had great accuracies in 2010 and 2012\.
    The paper released corresponding to this network revealed usage of the convolutional
    network, with basic building blocks.


    ![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig24_HTML.png)


    A scheme of the alex net architecture. It consists of 9 vertical rectangular trips
    labeled input, layers 1 to 7, and softmax. Layers 1 and 2 include convolution,
    max pooling, and L R N Relu, layers 3, 4, and 5 include convolution, relu, layers
    6, and 7 include a fully connected network, and the final layer includes softmax.


    Figure 1-17


    AlexNet architecture


    Figure [1-17](#520381_1_En_1_Chapter.xhtml#Fig24). depicts the overview architecture
    used in AlexNet. The image size taken was 224x224x3 and brought down by a 11x11x3x96
    convolution with a stride of 4 to 55x55x96\. The max pooling with 3x3 filters
    and a stride of 2 was used. The first two convolutional layers used LRN and pooling.
    Following that, the next three layers only used the convolutional and activation
    layer, followed by two blocks of the fully connected network. The scores were
    then passed onto the softmax to classify the 1,000 classes.


    The most interesting invention in the model architecture is LRN (Local Response
    Normalization). At the time, sigmoid and tanh were generally used as activation
    functions, but AlexNet used ReLU. Sigmoid and tanh suffer from saturation at extreme
    values and the data always has to be centered and normalized to get any gradient
    pass on during backpropagation. The local response normalization can be thought
    of as a brightness normalizer and is followed by the ReLU activation.


    AlexNet tries to use multiple GPUs to parallelize the training process with increased
    accuracy. There are two parts to the network that are parallel to each other crossing
    over at certain sections.'
  trans: '

    ### 全局平均池化


    全局平均池化有时用于 CNN 架构的末端，将特征图汇总为一个值。假设你有一个 5x5 的特征图，并带有一定深度（z 方向上的通道数，假设 x 和 y 是特征图的高度和宽度），你可以将这些值展平，并使用全连接网络将这些类似的特征映射起来，从而得到一个模型。这是一个可行的方案，但处理
    5x5 的尺寸时，我们需要将 25 个特征输入全连接网络，这会占用大量参数。相反，你可以在此步骤之后尝试使用全局平均池化层，将其变为 1x1，从而有效管理所有重要特征并进行组合。通过不使用全连接网络节省下来的模型参数，可以用于添加卷积层。这可能会带来更高的准确率。


    ![](img/520381_1_En_1_Fig23_HTML.png)


    一张纯色矩形的照片，中心刻有数字 5。这是经过 GAP 后得到的结果。


    **图 1-16b** GAP 后的结果


    ![](img/520381_1_En_1_Fig22_HTML.png)


    左侧的表格 1 有 4 列 4 行。第 1 行的值为 12、2、4 和 3。第 2 行的值为 3、3、4 和 5。第 3 行的值为 5、3、2 和 5。第
    4 行的值为 9、3、2 和 3。该表格展示了一个示例特征图。


    **图 1-16a** 示例特征图


    图 1-16a 展示了一个 4x4 维度的特征图。经过池化后，我们得到一个单一值，如图 1-16b 所示。在所有情况下，我们都会有一个深度，其值将基于相应的池化和特征图来确定。


    ### 计算：特征图与感受野


    计算是本课程的一个重要方面。我们将用它来构建我们的模型并进行各种实验。输出特征图的维度取决于多个因素，例如步长、卷积核大小、池化、填充、输入和输出。让我们深入了解细节。


    #### 卷积核


    卷积核是从特征图或图像中提取特征的提取器。它在第一次前向传播时被初始化，但其权重会通过反向传播进行学习和调整，以使其成为更好的特征提取器。一旦训练开始，权重会向更高值方向移动。这可能意味着它提取的特征对代价函数以及权重本身很重要。我们用`K`表示卷积核的维度。


    #### 步长


    卷积核在特征图上移动的步长称为步长。我们用`S`表示其值。


    #### 池化


    传统卷积神经网络架构中的池化块并不进行卷积操作，而是旨在从空间特征图中捕获某种信息，并快速降低特征图的维度以供下一步使用。我们用`mp`表示它。


    #### 填充


    填充允许我们在卷积过程完成后保持维度不变。我们用`P`表示它。


    #### 输入与输出


    我们按原样表示输入和输出，其中输入指的是第一步的特征图，输出指的是生成的特征图。


    为图像构建架构的第一步是获取图像的大小，并确定我们希望网络构建的深度，使得最后一层或输出的感受野等于图像的大小。换句话说，它应该已经看到了图像中的内容，以便回答关于图像的任何问题。如果我们有一个大小为
    56x56x3 的图像，那么使用的卷积核可以是 3x3x**3**x16。这意味着 3x3 的卷积核有三组不同的初始化，并与输入或前一层的通道数相匹配。这是因为它必须知道如何混合需要提取并在网络中使用的特征。公式变为：


    `HxWxC > KxKxCxC[next]`


    这里`H`、`W`、`C`分别是输入图像/特征图的高度、宽度和通道数。


    `K`是卷积核大小，`C[next]`是下一步的通道数或批次大小。当使用 CUDA 分数来训练 CNN 时，我们需要推动卷积核大小等于由`2^n`定义的某个数字。例如，如果我们使用
    17 作为卷积核数量，它最终仍会使用 32，而不是最接近的`2^n`数，即 16。


    给定所有值和概念，让我们计算特征图输出：


    ```

    输出 = [输入 + 2P - K] / S + 1

    ```


    给定，`输入 = 12x12`，`P = 0`，`K = 3x3`，`S = 1`


    ```

    输出 = [12 + 2*0 - 3] / 1 + 1

    ```


    `输出 = 10` 或 `10x10`


    #### 感受野的计算


    第`n`层的感受野计算将由一个综合公式给出，如下所示：


    ```

    感受野 = sum_{i=1}^{n} (K_i - 1) * prod_{j=0}^{i-1} S_j

    ```


    假设我们正在计算第二层的感受野。那么`K[1]`、`K[2] = 3`。两次的卷积核步长均为 1，感受野结果为 5。


    ### 理解 CNN 架构类型


    #### 理解架构类型


    #### AlexNet


    ILSVRC 是一个致力于计算机视觉研究的竞赛，其著名的 ImageNet 数据集被用于评估该领域的模型和研究。最早的获胜者之一是 AlexNet，它在 2010
    年和 2012 年取得了很高的准确率。与该网络相关的论文揭示了卷积网络的使用，并采用了基本的构建模块。


    ![](img/520381_1_En_1_Fig24_HTML.png)


    AlexNet 架构示意图。它由 9 个垂直矩形条组成，分别标记为输入、第 1 层到第 7 层以及 softmax。第 1 层和第 2 层包括卷积、最大池化和
    LRN ReLU，第 3、4、5 层包括卷积、ReLU，第 6 层和第 7 层包括全连接网络，最后一层包括 softmax。


    **图 1-17** AlexNet 架构


    图 1-17 展示了 AlexNet 中使用的总体架构。采用的图像大小为 224x224x3，通过一个 11x11x3x96 的卷积（步长为 4）将其降为
    55x55x96。使用了 3x3 滤波器且步长为 2 的最大池化。前两个卷积层使用了 LRN 和池化。接下来的三层仅使用了卷积层和激活层，随后是两个全连接网络块。然后将分数传递给
    softmax 以对 1000 个类别进行分类。


    该模型架构中最有趣的发明是 LRN（局部响应归一化）。当时，sigmoid 和 tanh 通常被用作激活函数，但 AlexNet 使用了 ReLU。Sigmoid
    和 tanh 在极端值处会出现饱和问题，并且数据必须始终居中并归一化，才能在反向传播过程中传递梯度。局部响应归一化可以看作是一种亮度归一化器，并且它位于 ReLU
    激活函数之后。


    AlexNet 尝试使用多个 GPU 来并行化训练过程，从而提高准确率。该网络有两个部分相互并行，并在某些部分交叉连接。

