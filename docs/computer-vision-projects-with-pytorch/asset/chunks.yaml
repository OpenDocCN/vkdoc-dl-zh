- fmt: '# Overview of the Approach


    We will use convolutional neural networks to solve the classification problem.
    We will try to fit in variations of the processes and check for higher accuracy
    and stable results. The concepts learned in Chapter [1](#520381_1_En_1_Chapter.xhtml)
    will be used extensively in this process. This is strictly an experiment and we
    will only set the baseline standards for the approach that needs to be iterated.


    This approach involves the following steps:


    1. Downloading data from the source and placing it in the root directory.

    2. Checking for data sanity, configurable information such as shape, size, and
    distribution of the images.

    3. Initializing data loader functionalities for training and testing.

    4. Defining the model architecture and validating it.

    5. Defining the functions for training and testing.

    6. Defining the optimizer for training and other training information such as
    regularizers, epochs, batches, etc.

    7. Training and checking for loss and accuracy patterns to understand the stability
    of the architecture and model training process.

    8. Deciding over multiple stages of improvements or changes, which one to select
    for further tuning or production.


    A graphical overview of this approach is shown in Figure [2-1](#520381_1_En_2_Chapter.xhtml#Fig1),
    which can be taken for the solution.


    ![](images/520381_1_En_2_Chapter/520381_1_En_2_Fig1_HTML.png)


    A flowchart displays the mechanism for image categorization. The data flow is
    as follows, data ingestion, data check, create data loader, think augmentation,
    define model, validate model architecture, define training and test functions,
    define training process, run training iterations, and check for validation.


    **Figure 2-1** Image classification pipeline


    # Creating an Image Classification Pipeline


    There can be multiple ways to proceed with a simple classification problem. Since
    we are working with deep learning models that can work out features from spatial
    patterns, going deep into the network can help. We also need to look at other
    strategies like learning rate modulations and regularizing techniques to help
    the model. Let’s look at the strategies that we can apply while considering the
    complexities of the problem:


    1. We can check on the data availability, based on how much data is available
    and the complexity of the problem. We can then decide if we have to oversample.

    2. The validation data and the type of image data we get helps with the data augmentation
    strategies.

    3. We need to check for image sizes and the object within the image size so that
    we can understand the model architecture better.

    4. We need to formulate our strategies around the production infrastructure, on
    which the model needs to run, as well as the kind of latency we need.

    5. The model strategy will also require us to figure out the accuracy, whether
    a higher recall is required or we need higher precision.

    6. The training time and cost in infrastructure also need to be taken into consideration
    while building the model.


    We will try four progressive approaches to deal with the image classification
    problem at hand. We will increase the complexity of our solution in a step-like
    manner to see the impact of the individual process. Let’s look at the first strategy.


    ## First Basic Model


    ### Data


    This use case creates an image classifier over a dataset of x-ray images of lungs
    with pneumonia and normal lungs. We will be downloading the dataset and placing
    it in our local directory, which is accessible by the Python compiler. If you
    are using Google Colab, you can use Google Drive as storage, which can be mounted
    on Colab.


    In this problem set, we use open source data, which can be found at [`https://www.kaggle.com/tolgadincer/labeled-chest-xray-images`](https://www.kaggle.com/tolgadincer/labeled-chest-xray-images).


    The dataset is divided into test and train folders, with each further divided
    into `NORMAL` and `PNEUMONIA` categories.


    - The number of train samples in the `NORMAL` category is 1349.

    - The number of train samples in the `PNEUMONIA` category is 3883.

    - The number of test samples in the `NORMAL` category is 234.

    - The number of test samples in the `PNEUMONIA` category is 390.


    Let’s look at a sample image from the `NORMAL` folder to check on the quality
    and positioning of the image. Figure [2-2](#520381_1_En_2_Chapter.xhtml#Fig2)
    shows a random 2283x2120 image from the `NORMAL` train folder. Since this is generated
    from `mpimg`, the color when displayed in Jupyter notebook is different. You can
    also use another command to display the image, `cv2.imshow()`, in its place.


    ![](images/520381_1_En_2_Chapter/520381_1_En_2_Fig2_HTML.jpg)


    A Computed Tomography Scan, X-ray image of the low radiation for the normal chest
    with dimensions of 776 by 1224.


    **Figure 2-2** Sample image from the train data of normal lungs


    Let’s now look at an example image from the `PNEUMONIA` train folder. Figure [2-3](#520381_1_En_2_Chapter.xhtml#Fig3)
    shows a 776x1224 image from this class.


    ![](images/520381_1_En_2_Chapter/520381_1_En_2_Fig3_HTML.jpg)


    A Computed Tomography Scan, X-ray image of the low radiation for the normal chest
    with dimensions of 2283 by 2120.


    **Figure 2-3** Sample image of infected lungs


    Let’s start coding with basic `import`s. These are required for the entire flow
    to work. GPU is better for a faster training process but CPU should also work.


    We need to install PyTorch, with CUDA support in case we are using local CUDA
    cores for our training process. We need to be careful about all the objects placed
    in CUDA for processing and all the objects placed in the CPU for processing. The
    intermingling of data across different processor types is not supported unless
    they are specifically cast.


    We need to import a few custom libraries for these classification problems. Let’s
    enlist them in order.


    ```python

    import os

    import numpy as np

    import cv2

    import matplotlib.pyplot as plt

    import matplotlib.image as mpimg

    %matplotlib inline

    from PIL import Image

    from IPython.display import display

    import torch

    import torch.nn as nn

    from torch.utils.data import DataLoader

    import torch.nn.functional as F

    from torchvision import datasets, transforms, models

    from torch.optim.lr_scheduler import StepLR

    from torchsummary import summary

    from tqdm import tqdm

    ```


    After we have imported all the required libraries, we can start linking the data
    from the directory. We start by unzipping the files to the folders. If we are
    using Google Colab for this process, we can use the following commands to mount
    the Google Drive to Colab and use the data stored there.


    ```python

    from google.colab import drive

    drive.mount(''/content/gdrive'')

    !unzip

    ```


    This will bring the data to the Colab location, so the model can easily use it.
    After this, we set the data path for the data directory irrespective of the system
    we will be using.


    ```python

    data_path = ''/content/chest_xray''

    ```'
