    ## Approach 2: Using Autoencoder


    Build an autoencoder training network, which contains the following:


    *   **Encoder**: To encode the original image (based on pixel values).


    *   **Decoder**: Reconstruct the image based on the output from the encoder.


    Evaluate the model between the original and reconstructed image. Based on the
    error metric score, the most anomalous digit is detected.


    Here is the five-step implementation:


    Step 1: Prepare the dataset object.


    Step 2: Build the autoencoder network.


    Step 3: Train the autoencoder network.


    Step 4: Calculate the reconstruction loss based on the original data.


    Step 5: Select the most anomalous digit based on the error metric score.


    ### Step 1: Prepare the Dataset Object


    Load the `input.csv` file. The `input.csv` file contains 65 values for each record.
    The first 64 values represent grayscale pixel values for the handwritten digits.
    The last value represents the original class of the digit, which will be between
    0 to 9.


    Convert the CSV data records to tensors. After that, normalize the pixel values
    and the original class data.


    ```

    # Step 1

    # Preparing Dataset object

    print("\nLoad csv data, convert to  data as normalized tensors ")

    #Load .csv dataset containing 65 values

    #first 64 represents 64 pixels values in grayscale format

    #last 1 value represent actual digit (in between 0 to 9)

    csv_data = "hand_written_digits.txt"

    #Convert the csv format to a normalized tensors using helper function "tensor_converter"

    tensor_data = tensor_converter(csv_data)

    ```


    ### Step 2: Build the Autoencoder Network


    Here we build the autoencoder network, which contains the encoder and decoder
    architecture.


    *   The encoder converts the original digit pixel values to a lower dimension
    space. (For example, it converts the 64-pixel grayscale values to 8 values.)


    *   The decoder reconstructs the original digit from the lower dimension. (For
    example, it reconstructs the 64-pixel grayscale image using 8 values.)


    Fully connected layers are used during encoding and decoding in this problem statement.
    An encoding network is built using three fully connected (FC) layers, where the
    first FC layer converts 65 values (64+1) to 48 and the second layer converts 48
    values to 32\. The last layer converts 32 values to 8\. Encoding —> 65–48-32-8.


    The decoding network is built using three fully connected layers, where the first
    layer converts 8 values to 32 and the second FC layer converts 32 values to 48
    values. The last layer converts 48 values to 65. Decoding —> 8-32-48-65.


    ```

    def __init__(self):

    super(Autoencoder, self).__init__()

    self.fc1 = T.nn.Linear(65, 48)

    self.fc2 = T.nn.Linear(48, 32)

    self.fc3 = T.nn.Linear(32, 8)

    self.fc4 = T.nn.Linear(8, 32)

    self.fc5 = T.nn.Linear(32, 48)

    self.fc6 = T.nn.Linear(48, 65)

    def encode(self, x):

    # 65-48-32-8

    z = T.tanh(self.fc1(x))

    z = T.tanh(self.fc2(z))

    z = T.tanh(self.fc3(z))

    return z

    def decode(self, x):

    # 8-32-48-65

    z = T.tanh(self.fc4(x))

    z = T.tanh(self.fc5(z))

    z = T.sigmoid(self.fc6(z))

    return z

    ```


    ### Step 3: Train the Autoencoder Network


    Train the autoencoder network with hyperparameters such as learning rate, epochs,
    batch size, loss metrics, and loss optimizer. For training, a helper function
    takes the autoencoder network, tensor data, and all other hyperparameters, as
    specified previously.


    ```

    # Step 3\. train autoencoder model

    batch_size = 10

    max_epochs = 200

    log_interval = 8

    learning_rate = 0.002

    train(autoenc,tensor_data, batch_size, max_epochs,log_interval, learning_rate)

    ```'
