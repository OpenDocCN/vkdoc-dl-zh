    Torch 进行建模。


    我们学习了卷积神经网络的基础知识以及它们如何帮助理解图像。


    至此，我们结束了对计算机视觉概念的讨论。下一章我们将开始介绍应用和项目。


    # 2. 图像分类


    上一章讨论了计算机视觉中的几个重要概念。还讨论了一些计算机视觉领域的最佳实践，现在是时候将它们付诸实践了。本章为计算机视觉领域的多个应用奠定了基础。我们首先从基本解释开始，说明如何开始使用
    Torch 组件来构建模型、定义损失函数并进行训练。


    需要通过名称识别的对象涉及分类过程。我们在数据科学的所有方面都遇到过涉及分类需求的问题。它可以简单到对手机上的图像进行分类，判断它是山还是海的图片，或者是鸟还是狗。分类是最基本但也是最强大的概念之一。让我们看看计算机视觉模型是如何设置分类的：


    1. 检测边缘

    2. 检测梯度

    3. 识别纹理

    4. 识别模式

    5. 形成对象的部件


    模型需要将名称与图像中的特定对象关联起来。它通过遵循结构化的知识提取机制，然后为其决策过程重新生成输入来实现这一点。


    ## 涵盖主题


    1. 数据准备方法

    2. 数据增强技术

    3. 使用批量归一化和丢弃法

    4. 比较激活函数

    5. 设置模型及其变体

    6. 训练过程

    7. 运行推理并比较模型结果


    ### 定义问题


    我们将借助计算机视觉建模技术检查肺部 X 光图像，并将其分类为患有肺炎或正常。由于这是一个医疗保健问题，最好让模型过度预测。我们需要以最高的准确率进行预测，并且如果可能的话，应达到接近
    100% 的召回率，同时也要有高精确率。我们需要确保诊断出任何可能的感染病例，并且不要因为微小的误差而将受感染的肺部错误分类为健康肺部。通常可以使用 Softmax
    对数几率来确定预测，而不是由 Softmax 函数来决定类别。这是一个基于对数据的经验以及模型行为的关键决策。


    困扰这类图像分类问题的一个主要问题是正确标注数据的可用性。通过卷积神经网络进行图像分类有助于处理多个下游任务。在某个数据上训练的模型可以用于微调其他类似数据，并用于预测目的。有多个开源图像存储库，但对于大多数工业用途而言，它们为我们提供了一个起点。我们还需要使用我们特定任务的图像。

