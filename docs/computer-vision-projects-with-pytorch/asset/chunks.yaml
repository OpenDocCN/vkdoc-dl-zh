- fmt: '### Semantic Segmentation


    - **Fully convolutional neural network.** As proposed by the paper, a fully convolutional
    network is trained end-to-end on a semantic segmentation task. It’s a convolutional
    neural network block followed by a pixel-wise prediction.

    - **Use of atrous convolutions to semantic segmentation (DeepLavV3).** In the
    architecture, parallel stacks of atrous convolutions are used to capture the multi-scale
    context by altering receptive fields.

    - **Lite Reduced Atrous Spatial Pyramid Pooling (LR-ASPP).** An advanced version
    of `MobileNetV3`, which is created with the help of NAS (Neural Architecture Search).


    We will use one pretrained model to evaluate the model on our image. The model
    has a lot of parameters, so running inference will be slower on a CPU or low configuration
    infrastructure. If we are using Colab, we can switch on the GPU as infra support
    and run the code.


    Let’s start with the basic `import`s required for the configuration. The model
    is pretrained and placed in Torchvision. We will be importing the model as well.


    ```python

    import numpy as np

    import torch

    import matplotlib.pyplot as plt

    ## torchvision related imports

    import torchvision.transforms.functional as F

    from torchvision.io import read_image

    from torchvision.utils import draw_bounding_boxes

    from torchvision.utils import make_grid

    ## models and transforms

    from torchvision.transforms.functional import convert_image_dtype

    from torchvision.models.segmentation import fcn_resnet50

    ```


    So far we imported the Torch and Torchvision-related functions. We need to build
    all the utility functions that can be reused throughout the code. This is an effective
    way to refactor the code and remove unnecessary repetition. In this case, we need
    to display the images so we can use an image visualizer.


    ```python

    ## utilities for multiple images

    def img_show(images):

    if not isinstance(images, list):

    ## generalise cast images to list

    images = [images]

    fig, axis = plt.subplots(ncols=len(images), squeeze=False)

    for i, image in enumerate(images):

    image = image.detach() # detached from current DAG, no gradient

    image = F.to_pil_image(image)

    axis[0, i].imshow(np.asarray(image))

    axis[0, i].set(xticklabels=[], yticklabels=[], xticks=[], yticks=[])

    ```


    This code accepts multiple images or a single image. It checks for the object
    to be a list, and if it is not, it converts that to a list. The axes are assigned
    according to an iterable of images. The images are detached from the DAG and the
    gradient is not calculated for these variables.


    Following the utility function, let’s get a sample image and configure it to work
    on the segmentation process.


    ```python

    ## get an image on which segmentation needs to be done

    img1 = read_image("/content/semantic_example_highway.jpg")

    box_car = torch.tensor([ [170, 70, 220, 120]], dtype=torch.float) ## (xmin,ymin,xmax,ymax)

    colors = ["blue"]

    check_box = draw_bounding_boxes(img1, box_car, colors=colors, width=2)

    img_show(check_box)

    ## batch for images

    batch_imgs = torch.stack([img1])

    batch_torch = convert_image_dtype(batch_imgs, dtype=torch.float)

    ```


    The image needs to be uploaded and placed in an accessible location. The image
    includes multiple cars, as of now, we are putting one box on top of it with (`X[min]`,
    `Y[min]`, `X[max]`, and `Y[max]`). These values need to be adjusted for the fully
    convolutional network to understand the presence of the object. Eventually, the
    batches of images are converted to tensors before being stacked for the model.


    Now, let’s load the model and get it ready for evaluation.


    ```python

    model = fcn_resnet50(pretrained=True, progress=False)

    ## switching on eval mode

    model = model.eval()

    # standard normalizing based on train config

    normalized_batch_torch = F.normalize(batch_torch, mean=(0.485, 0.456, 0.406),
    std=(0.229, 0.224, 0.225))

    result = model(normalized_batch_torch)[''out'']

    ```


    As discussed earlier, `fcn_resnet50` is downloaded from the repository, which
    is already trained. The model is set to the eval step. The batch, which was created
    in the earlier step, is now normalized based on the trained model configuration.


    It’s now time to pass our image through the model.


    ```python

    classes = [

    ''__background__'', ''aeroplane'', ''bicycle'', ''bird'', ''boat'', ''bottle'',
    ''bus'',

    ''car'', ''cat'', ''chair'', ''cow'', ''diningtable'', ''dog'', ''horse'', ''motorbike'',

    ''person'', ''pottedplant'', ''sheep'', ''sofa'', ''train'', ’tvmonitor’

    ]

    class_to_idx = {cls: idx for (idx, cls) in enumerate(classes)}

    normalized_out_masks = torch.nn.functional.softmax(result, dim=1)

    car_mask = [

    normalized_out_masks[img_idx, class_to_idx[cls]]

    for img_idx in range(batch_torch.shape[0])

    for cls in (''car'', ''pottedplant'',''bus'')

    ]

    img_show(car_mask)

    ```


    We are defining the list with all the probable classes and getting the batch image
    results to pass through the softmax layer. The masks are then plotted. This example
    gives us the process flow for the semantic segmentation we discussed earlier.
    It shows how we can get any data and prepare it according to the model. We load
    a model and run inference on the model to get the masks.


    ### Instance Segmentation


    We were working on semantic segmentation to generate masks of objects and then
    superimpose them on the original images. But, what about instance segmentation?
    We will now look at some of the pretrained models that we can leverage for generating
    masks.


    Models for detection and masking:


    - **Faster R-CNN.** This research introduced a region proposal network that simultaneously
    predicts the object bounding box and the objectness core corresponding to the
    bounding box. It solves the bottleneck related to the earlier papers.

    - **Mask R-CNN.** This process extends Faster R-CNN and employs object detection
    and generating masking on the image.

    - **RetinaNet.** This paper did some amazing improvements to the two-stage detectors
    in terms of accuracy and speed. It takes care of all these using the new concept
    of *focal loss*.

    - **Single Shot Detector.** The paper explains that a objectness score is generated
    for the default bounding box and is refined based on the object.


    These models are mainly trained on COCO datasets and are capable of handling predictions.


    For faster R-CNN:


    ```python

    x = [torch.rand(3, 300, 400), torch.rand(3, 500, 400)]

    faster_rcnn_model = torchvision.models.detection.fasterrcnn_resnet50_fpn(pretrained=True)

    faster_rcnn_model.eval()

    result = faster_rcnn_model (x)

    ```


    For MobileNet:


    ```python

    x = [torch.rand(3, 300, 400), torch.rand(3, 500, 400)]

    mobilenet_model = torchvision.models.detection.fasterrcnn_mobilenet_v3_large_fpn(pretrained=True)

    mobilenet_model.eval()

    result = mobilenet_model(x)

    ```


    For RetinaNet:


    ```python

    x = [torch.rand(3, 300, 400), torch.rand(3, 500, 400)]

    retinanet_model = torchvision.models.detection.retinanet_resnet50_fpn(pretrained=True)

    retinanet_model.eval()

    result = retinanet_model(x)

    ```


    For Single Shot Detection:


    ```python

    x = [torch.rand(3, 300, 400), torch.rand(3, 500, 400)]

    ssd_model = torchvision.models.detection.ssd300_vgg16(pretrained=True)

    ssd_model.eval()

    result = ssd_model(x)

    ```


    For all these instances, we are extracting the model from the PyTorch repository
    and using it to run inference.'
