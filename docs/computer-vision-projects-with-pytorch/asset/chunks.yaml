    Now, let''s run some quick data-preparation steps. As compared to structured data,
    preparing and cleaning data is easier when doing image processing. The key step
    here is to resize the images. The original images can be any size or pixels. But
    the models are always trained on a certain size. So we need to resize the input
    images to match the model.


    Here is the function that resizes the images.


    ```

    # Resizing the image

    def img_re_sizing(dnst_mp, image):

    #Normalizing

    dnst_mp = 255*dnst_mp/np.max(dnst_mp)

    dnst_mp= dnst_mp[0][0]

    image= image[0]

    #empty image

    result_img = np.zeros((dnst_mp.shape[0]*2, dnst_mp.shape[1]*2))

    #iterate for each image

    for i in range(result_img.shape[0]):

    for j in range(result_img.shape[1]):

    result_img[i][j] = dnst_mp[int(i / 2)][int(j / 2)] / 4

    result_img  = result_img.astype(np.uint8, copy=False)

    #output

    return result_img

    ```


    Now that we have completed video ingestion, image extraction, and resizing, let''s
    solve the use cases.


    Let''s start by counting the customers and generating heat maps. We need to count
    the number of customers at this retail outlet (see Figure [9-5](#520381_1_En_9_Chapter.xhtml#Fig5)).


    ![](images/520381_1_En_9_Chapter/520381_1_En_9_Fig5_HTML.jpg)


    A top view of a retail store caught from the security cam. There are isles of
    products. A female staffs is standing behind the cashier. A lady is about to leave
    the door. An old man and woman discuss something near the cashier. A woman has
    her hands on a basket with products near the door.


    Figure 9-5


    Retail store


    The revenue of a store depends on how many people visit it. As evident, the bigger
    the crowd, the greater the probability of purchases. That’s why the store wants
    to understand how many people visit, so it can forecast sales. Many decisions
    are made from this information, like the size of the store, how to plan inventory,
    etc.


    ### Identify the Hotspots in a Retail Store


    It''s very important to place inventory in a store so that it maximizes purchases.
    We can leverage hotspots within stores to make that decision. We can also identify
    trending products using this information. We can get this kind of information
    using the heat map concept. It generates spots where customers spend most of their
    time, which helps determine the demand for the product in that spot. Figure [9-6](#520381_1_En_9_Chapter.xhtml#Fig6)
    shows a sample heat map.


    ![](images/520381_1_En_9_Chapter/520381_1_En_9_Fig6_HTML.jpg)


    A screenshot of a heat map of a retail shop. There are isles of clothes on the
    left and right and two in the middle. The clothes are in different shades, scattered
    around the shop. Some shades are shaped like a human. There is a small red mass
    mixed among the green ones.


    Figure 9-6


    Heat map


    Let''s write a few functions to generate a heat map and count the people. The
    following function will take images and generate the heat map.


    ```

    # function to get a heatmap

    def generate_dstys_map(o, dsty, cc, image_location):

    #define the fgr_imure

    fgr_im=plt.fgr_imure()

    #define size

    col = 2

    rws = 1

    X = o

    #sum

    add = int(np.sum(dsty))

    dsty = image_re_sizing(dsty, o)

    # Adding original image and new generated heatmap image

    for i in range(1, col*rws +1):

    # generate original image

    if i == 1:

    image = X

    fgr_im.add_subplot(rws, col, i)

    #setting axis

    plt.gca().set_axis_off()

    plt.margins(0,0)

    #locator

    plt.gca().xaxis.set_major_locator(plt.NullLocator())

    plt.gca().yaxis.set_major_locator(plt.NullLocator())

    #adjusting subplots

    plt.subplots_adjust(top = 1, bottom = 0, right = 1, left = 0, hspace = 0, wspace
    = 0)

    #show image

    plt.imshow(image)

    # generate dstys image

    if i == 2:

    image = dsty

    fgr_im.add_subplot(rws, col, i)

    #setting axis

    plt.gca().set_axis_off()

    plt.margins(0,0)

    #locator

    plt.gca().xaxis.set_major_locator(plt.NullLocator())

    plt.gca().yaxis.set_major_locator(plt.NullLocator())

    #adjusting subplots

    plt.subplots_adjust(top = 1, bottom = 0, right = 1, left = 0, hspace = 0, wspace
    = 0)

    #adding count

    plt.text(1, 80, ''M-SegNet* Est: ''+str(add)+'', Gt:''+str(cc), fontsize=7, weight="bold",
    color = ''w'')

    #show image

    plt.imshow(image)#, cmap=CM.jet)

    #image_nm with location

    image_nm = image_location.split(''/'')[-1]

    image_nm = image_nm.replace(''.jpg'', ''_heatpmap.png'')

    #saving the image

    plt.savefgr_im(image_location.split(image_nm)[0]+''seg_''+image_nm, transparent=True,
    bbox_inches=''tight'', pad_inches=0.0, dpi=200)

    ```


    The following function will take images as input and count the people. It also
    triggers the heat map function that we created just now. Finally, it outputs the
    count of people, the image density, and a density map.


    ```

    # Getting count of peoples

    def get_count_people(image):

    # Simple preprocessing.

    trans = transforms.Compose([transforms.ToTensor(),

    transforms.Normalize([0.485, 0.456, 0.406], [0.229, 0.224, 0.225])

    ])

    # sample image with height and width

    img = Image.open(image).convert(''RGB'')

    height, width = img.size[1], img.size[0]

    height = round(height / 16) * 16

    width = round(width / 16) * 16

    # re size the image

    img_den = cv2.resize(np.array(img), (width,height), cv2.INTER_CUBIC)

    #transform

    img = trans(Image.fromarray(img_den))[None, :]

    #lets define the model

    model = M_SFANet_UCF_QNRF.Model()

    #load the model

    model.load_state_dict(torch.load(''/content/best_M-SFANet__UCF_QNRF.pth'',

    map_location = torch.device(''cpu'')))

    # Evaluating the model

    model.eval()

    dnst_mp = model(img)

    # final count

    count = torch.sum(dnst_mp).item()

    #retun count, density and map

    return count,img_den,dnst_mp

    ```


