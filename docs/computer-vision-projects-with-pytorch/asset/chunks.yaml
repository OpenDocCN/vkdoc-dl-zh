    ## HRNet (High-Resolution Net)


    This is a top-down approach. It first identifies humans in the image using Faster-RCNN
    and sets bounding boxes around them. High-quality feature maps are generated using
    the HRNet architecture. The keypoints are then identified in each bounding box.


    **Motivation:**


    1.  All previous models (AlexNet, GoogleNet, ResNet, and DenseNet) were developed
    on image classification convolutional architectures, making the output low resolution
    and position-insensitive. The low resolution can be increased in these architectures
    using dilated convolutions, but computational time increases.


    2.  Up-sampling is an alternative to this problem. The U-net, SegNet, DeConvnet,
    and Hourglass models use the up-sampling technique. In this technique, Stage 1
    input images are converted to low resolution for classification. In Stage 2, the
    high-resolution images will be recovered from low-resolution by sequentially connected
    convolutions. But the complete recovery of HR from LR is not possible and position
    sensitivity of representation is weak.


    HRNet is a universal architecture for visual recognition. Its architecture is
    not based on any classification networks, which use convolutions in series. In
    the HRNet architecture, multiple resolution convolutions are connected in parallel
    with repeated fusions using up-sampling and down-sampling techniques. This network
    maintains HR representations from start to end. Repeated fusions among the resolutions
    strengthen the high- and low-resolution representations. HR convolutions are converted
    to LR convolutions using a down-sampling technique called “stride convolution.”
    LR convolutions are converted to HR convolutions using the “bilinear up-sampling”
    technique. The HR branch preserves spatial information and the LR branch preserves
    contextual information. Figures [6-5](#520381_1_En_6_Chapter.xhtml#Fig5), [6-6](#520381_1_En_6_Chapter.xhtml#Fig6),
    and [6-7](#520381_1_En_6_Chapter.xhtml#Fig7) show HRNet''s detailed architecture.


    ![](images/520381_1_En_6_Chapter/520381_1_En_6_Fig5_HTML.png)


    A schematic with three rows. From top to bottom, left to right: the first row
    has an arrow labeled `1x`, and beside it are 11 upright blocks all connected by
    right arrows. Row 2 begins as `2x`, with 9 upright blocks after it connected by
    arrows. Row 3 begins as `4x`, with 5 upright blocks after it that are connected
    by right arrows.


    **Figure 6-5** HRNet architecture, part 1


    **Major observations:**


    *   In classification, the convolutions are placed in series. But in HRNet, convolutions
    are placed parallel.

    *   For up-sampling, a bilinear function is used instead of convolution (due to
    time complexity).

    *   Strided convolution is used to down-sample the HR images (to avoid information
    loss).


    The number of blocks in stages 2, 3, and 4 are 1, 4, and 3. These numbers are
    not well optimized (as per the author). Parameter and computational complexity
    are not higher than ResNet due to the reduced number of channels in HRNet. Since
    the architecture is a multi-resolution network, the output is delivered in all
    resolutions (high, medium, and low). For HPE, only the HR channel output is used.
    For semantic segmentation and face alignment, all resolution outputs are used.


    ![](images/520381_1_En_6_Chapter/520381_1_En_6_Fig7_HTML.jpg)


    2 side-by-side schematics labeled regular convolution and multi-resolution convolution.
    From left to right: diagram 1 has 2 sets of 4 joined blocks connected by a right
    arrow, a triple bar equal sign, and a two-columned four-rowed series of blocks
    interconnected by arrows; diagram 2 has a two-columned four-rowed series of blocks
    with arrows.


    **Figure 6-7** HRNet architecture, part 3


    ![](images/520381_1_En_6_Chapter/520381_1_En_6_Fig6_HTML.png)


    A schematic divided into 4 segments, from left to right they are: segment 1, a
    row with 5 blocks; segment 2 has 2 rows of 5 blocks each; segment 3 has 3 rows
    of 5 blocks each, and the 4th row with 1 block; segment 4 has 4 rows of 5 blocks
    each. Blocks are connected by arrows. The blocks are representations of channel
    maps and the arrows of residual unit.


    **Figure 6-6** HRNet architecture, part 2'
