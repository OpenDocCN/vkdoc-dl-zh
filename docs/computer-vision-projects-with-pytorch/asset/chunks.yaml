  trans: '

    ### 感受野


    在探讨卷积概念时，我们涉及了特征图和卷积核步长。卷积核在空间中提取特征，以便模型能够轻松解读信息。现在，我们以一个单通道的 `56x56` 图像为例（也可写作
    `56x56x1`）。如果试图将整张图像转换为特征，就需要读取所有像素点。让我们通过一个图形示例来理清这个概念。


    ![](img/520381_1_En_1_Fig19_HTML.png)


    一张示意图展示了卷积操作。一个包含五行五列的表格中，前三行前三列的单元格被高亮显示。两个箭头从该区域指向另一个三行三列的表格，其第一个单元格被高亮。两个箭头又从该表格指向第三个仅有一个单元格且未被高亮的表格。


    **图 1-13** 卷积操作示意图


    图 1-13 展示了一个普通的 `5x5` 特征图与另一个 `3x3` 卷积核进行卷积，假设无填充且步长为 `1`，结果得到一个 `3x3` 特征图。此步骤中向前传递的信息，是从特征图的第一个区块传递到下一个区块。这意味着，图
    1-13 中 `3x3` 特征图最左侧的像素值，仅包含了原始特征图最左侧高亮角落的像素信息。这引发了一个问题：如果我们只有一层网络且使用 `3x3` 卷积核，那么在该层中，一个像素的感受野本质上就是
    `3x3`。有趣的是，在下一层中，如果我们再次使用步长为 `1`、零填充的 `3x3` 卷积核，对于图 1-13 而言，该层的感受野仍然是 `3x3`，但这个
    `3x3` 区域已经“看”过了整张原始图像。因此，它承载了原始图像的全部信息。这个概念被称为局部感受野和全局感受野。


    ### 局部感受野


    它是指在该步骤中，卷积核通过卷积操作向前传递的逐层信息强度。在图 1-13 所示的例子中，我们有一个 `3x3` 的卷积核，即九个像素。它仅取决于当前步骤，而非整个过程。


    ### 全局感受野


    这是累积传递到模型最后一层的信息。通常，为了简化，我们希望将图像信息平均化，最终只得到一个值。如果我们要预测猫或狗，最终只得到一个值会比得到一个矩阵更容易。最后一个值（`1x1xn`）或像素，本质上应该“看”到图像起始的所有像素，才能完美地解读信息。


    在图 1-13 的例子中，特征图先被 `3x3` 卷积核卷积，再被另一个 `3x3` 卷积核卷积，最终得到 `1x1` 的结果。此时，这个 `1x1` 像素已经“看”过了
    `3x3` 的特征图，而那个 `3x3` 特征图又“看”过了 `5x5` 的原始特征图。这是一个传递接力棒的过程，而卷积核在其中起到了帮助作用。这里的全局感受野是
    `5x5`。


    ### 池化


    卷积神经网络的一个初始优势在于其并行处理能力。一个全连接层即使对于像（`5x5x1`）这样小的图像，也需要处理一个 `25` 维的输入向量。尽管 CNN 通过在空间域上工作解决了这个问题，但高维度仍然可能导致
    CNN 架构拥有大量的参数。池化试图通过提供一种降维技术和信息过滤方法来解决这个问题。


    在 CNN 中仅应用卷积层存在一个固有问题。空间特征由卷积核捕获，但输入特征图的微小变化会对输出特征图产生巨大影响。为了避免这个挑战，我们可以使用池化。根据我们执行的下游任务，我们可以使用最大池化、平均池化或全局平均池化。


    池化可以被认为与卷积层应用于特征图的方式类似。然而，池化不是进行卷积运算，而是计算区域内所有值的平均值或最大值。它可以被视为一个函数。池化部分没有需要学习的参数。它只是纯粹而简单的空间降维。建议在维度较高的特征图（至少需要大于
    `10x10`）上使用 `2x2` 的池化。原因是，在 CNN 的这个层级，信息集中度已经很高，通过池化快速降维可能会导致巨大的信息损失。


    #### 最大池化


    特征图包含从图像中空间分布的信息。如果我们考虑一个只需要边缘信息的下游任务，我们可以尝试最大化边缘，使得后续的特征图能够聚焦于经过过滤的信息。当选择最大池化时，显著的特征被过滤并传递到下一层。当步长在像素区域中移动时，它会选择值最大的那个，因此得名“最大”。


    ![](img/520381_1_En_1_Fig20_HTML.jpg)


    左侧的表格 1 有 4 列 4 行。第 1 行的值为 12、2、4 和 3。第 2 行的值为 3、2、4 和 5。第 3 行的值为 5、3、2 和 3。第
    4 行的值为 9、1、2 和 3。右侧的表格 2 有 2 列 2 行。第 1 行的值为 12 和 5。第 2 行的值为 9 和 9。这些表格被用作最大池化的示例。


    **图 1-14** 最大池化示例


    图 1-14 左侧显示了一个特征图；我们尝试使用步长为 `2` 进行最大池化。结果特征图从 `4x4` 缩小为 `2x2`，仅传递了显著特征。从某种程度上说，如果图像或特征图中存在某些边缘或梯度，它们将优先于其他任何信息被保留。


    在分类等任务中，我们通常遵循最大池化的流程，因为我们需要重要的边缘和梯度信息得以保留，而不希望其他无关特征干扰架构。有趣的是，颜色在大多数分类任务中并不起作用。例如，猫可以是任何颜色，模型必须在不考虑颜色的情况下理解它是一只猫。


    #### 平均池化


    我们已经确立了池化的基本概念。它提供了一种过滤过程，而无需增加任何可学习参数的数量。对于 `2x2` 且步长为 `2x2` 的平均池化，步长每次处理一个 `2x2`
    的区块，计算整个区块的平均值，并在此基础上求出均值。这个均值被传递到特征图的下一个部分。


    对于分类任务，通常不建议使用平均池化。然而，当图像较暗并且您想提取从黑到白的过渡时，可以使用它。


    ![](img/520381_1_En_1_Fig21_HTML.jpg)


    左侧的表格 1 有 4 列 4 行。第 1 行的值为 12、2、4 和 3。第 2 行的值为 3、3、4 和 5。第 3 行的值为 5、3、2 和 5。第
    4 行的值为 9、3、2 和 3。右侧的表格 2 有 2 列 2 行。第 1 行的值为 5 和 4。第 2 行的值为 5 和 3。


    **图 1-15** 平均池化示例


    图 1-15 显示了一个特征图被 `2x2` 区块、步长为 `2` 进行池化。池化区域的平均值反映在左侧特征图中每个 `2x2` 区块映射到右侧的一个像素点上。

