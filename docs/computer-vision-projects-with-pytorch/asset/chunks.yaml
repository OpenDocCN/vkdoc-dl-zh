    ![](img/520381_1_En_7_Fig5_HTML.jpg)


    一张带有数值块的图表。Y 轴表示从 0 到 7 的数字，而 X 轴表示数值 0、2、4 和 6。数值为近似值。该数据集呈现上升趋势。


