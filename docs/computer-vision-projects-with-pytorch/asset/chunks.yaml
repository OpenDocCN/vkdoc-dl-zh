  trans: '

    ## YOLO V2/V3


    YOLO 的改进非常显著，第二个版本将方法微调到了更高效的层面。以下是第二版中解决的一些关键点：


    -   卷积层深度较大，因此始终存在梯度消失或梯度爆炸的风险。添加了批归一化以帮助解决学习过程中的内部协变量偏移。

    -   它为每个锚框预测类别和物体置信度。

    -   网络还预测五个边界框以及每个边界框的五个坐标。

    -   一个重大的架构变化是移除了全连接层，并用锚框来预测边界框。

    -   这些锚框是通过对真实边界框进行聚类来确定的。


    即使在多次修改之后，研究人员发现还可以进行一些更改来提高准确率。他们进行了必要的修改，并将此版本命名为 YOLO V3。它可以说是最受欢迎的目标检测架构之一。YOLO
    使用 `softmax` 层来获取最终的分类分数，而 YOLO V3 则采用对输入进行独立的逻辑回归或多标签分类。有趣的是，它还移除了池化层，转而使用步长为
    `2` 的 `3x3` 卷积来降低维度。


    该架构还对损失函数进行了修改，产生了三个主要的预测输出——边界框的坐标、物体置信度值和类别分数。YOLO V3 架构中最流行的骨干网络是 `Darnet-53`，这是一个由卷积块组成的
    53 层架构，如图 3-11 所示。它使用带有 `3x3` 和 `1x1` 卷积层的残差实现来获取用于检测和分类的特征。总体而言，这些更改对架构的准确率和优化产生了巨大影响。


    ![](img/520381_1_En_3_Fig12_HTML.jpg)


    一个表格有 4 个表头：类型、过滤器、尺寸和输出。行包含框起来的条目，并标记为 1 X、2 X、8 X、8 X 和 4 X。框起来的区域包括 2 种卷积类型的过滤器和尺寸的条目，以及一个残差输出尺寸。类型下的最后
    3 个条目是平均池化、全连接和 Soft Max。


    **图 3-11** Darknet 53 架构


    让我们看一些使用已保存模型并针对自定义数据集进行微调的代码。为什么我们不从头开始训练呢？这些都是重量级模型，我们并不总是有足够的 GPU 能力从头开始训练。其次，使用预训练权重并相应地修改它们是一种学习体验。我们将反复提到的一个术语是*迁移学习*。


    ## 项目代码片段


    该代码片段改编自 YOLO 的原始创建者，所有源代码归功于 Joseph Redmon 和 Ali Farhadi。尽管从头开始训练相当复杂，但我们可以尝试使用现有的开源模型对这些数据进行迁移学习。如果原始模型训练的类别与我们使用的类别非常相似，我们也可以使用现有模型对我们的数据进行推理。


    文件夹设置需要遵循原始创建者的方式，因为我们将使用保存的模型来自定义训练我们的数据。如图 3-12 所示，对于任何变化，路径应根据配置文件在 `data`
    目录下进行修正。


    ![](img/520381_1_En_3_Fig13_HTML.jpg)


    代码显示为：倒 V，Yolo V r，小于 下划线 p y 缓存 下划线，小于 注释 工具，倒 V，c f g，设置图标，Yolo v3，自定义 点 c f
    g，设置图标，Yolo v3，s p p 点 c f g，设置图标，Yolo v3，s p p tiny 点 c f g，倒 V，data，小于 images。下方，小于
    utils 被框起来。


    **图 3-12** YOLO 的文件夹结构


    ### 步骤 1：获取标注数据


    当我们想要训练自定义数据时，图像标注是目标检测算法最重要的先决条件之一。它们帮助模型处理分类和回归损失函数。它们包含了手动解析的真实值。有多个开源位置可以让我们标注图像。该工具通常有一个标记器，可以帮助在图像上绘制某种形状的边界框。该程序允许以
    JSON、CSV 或 VOC/COCO 格式下载标注，具体取决于所使用的模型。训练数据和自定义数据应该保持一致。


    标注正确且对标注者真实至关重要。由于这是一项手动且重复的任务，因此需要尽可能做到最好。最终，生成的文件应被下载并放置在 `data` 文件夹中。例如，每张图像可能看起来像这样：


    - `0 0.41833333333333333 0.2112676056338028 0.2011111111111111 0.2007042253521127`

    - `2 0.43777777777777777 0.3970070422535211 0.11555555555555555 0.15669014084507044`

    - `1 0.38722222222222225 0.6813380281690141 0.47 0.4119718309859155`


    一旦我们汇总了新文件，我们就可以看到如何更改数据文件。在图 3-12 中，`data` 下的文件夹主要是 `labels` 和 `images`。`images`
    包含与标注图像同名的原始图像。文本文件需要包含标注信息并放置在 `labels` 中。这可以是文本文件或 JSON。


    完成后，我们将检查文件的自定义数据文件，该文件需要更新信息，例如训练和测试文件信息的存储位置。我们需要在此处提供两种信息——标签和图像的路径以及实际图像。自定义数据文件将如下所示：


    - `classes=4`

    - `train=data/train.txt`

    - `valid=data/test.txt`

    - `names=data/custom.names`


    这提供了关于数据及其位置的相关信息。完成后，我们需要在 `custom.names` 文件中提供类别名称。它将如下所示：


    - `hardhat`

    - `vest`

    - `mask`

    - `boots`


    此文件将类别名称与前面链接的数字对应起来。如前所述，我们需要包含图像路径的 `train.txt` 和 `test.txt` 文件。这些文件应包含运行训练函数的相对路径。


    还有其他文件，例如训练和测试形状（`train.shapes` 和 `test.shapes`），它们包含所有文件的形状，我们可以根据输入数据进行更改。


    完成所有这些后，我们必须从来源和原始研究人员处下载保存的权重，网址为 [`https://pjreddie.com/darknet/yolo/`](https://pjreddie.com/darknet/yolo/)。根据项目工作者的
    GPU 性能，有多种选项可供选择。权重和配置文件是相互关联的。因此，请务必下载与权重对应的配置文件。通过这些主要步骤，初始设置就完成了。现在我们进入下一个流程。

    '
- fmt: '### Step 2: Fixing the Configuration File and Training


    Another important task is changing the config files as per the requirements and
    resources. Figure [3-13](#520381_1_En_3_Chapter.xhtml#Fig14) shows the first changes
    in the training and testing configuration. It has provisions for altering the
    `batch` size, `width`, `height`, `channels`, `momentum`, and `decay` parameters.


    ![](images/520381_1_En_3_Chapter/520381_1_En_3_Fig14_HTML.jpg)


    A table has 2 headers: Updated configuration and Original configuration. In the
    first column, the hash keys before `batch` and `subdivisions` are highlighted,
    and the number `08` as well after `width` and `height`. In the next column, the
    numbers `3`, `4`, `6`, `7`, `8`, `9`, `19`, `20`, and `22` on the left panel are
    colored in to indicate highlighted figures on the right.


    **Figure 3-13** – Changes in the config file for training/testing


    Important parameters such as `learning rates` and `burn-in` are also provided.
    Apart from these changes, there are changes concerning the `classes` and the final
    layer. Since we will be doing a custom train against the original training method,
    which included 80 classes, this situation can vary. Figure [3-14](#520381_1_En_3_Chapter.xhtml#Fig15)
    shows a few required changes. If the training can happen in the default `coco`
    dataset, the original config files can be used.


    ![](images/520381_1_En_3_Chapter/520381_1_En_3_Fig15_HTML.jpg)


    The updated and original configuration for training pipeline is displayed.


    **Figure 3-14** – Changes required in the config for the training/inference pipeline


    All the instances of `classes` and `filters` need to be changed in the configuration
    file. We need to change `[filters=255]` to `filters=(number of classes + 5)x3`
    in the instances that come before the YOLO layer, as shown in line 640.


    After we make these changes, we can move to the training section. Only one job
    needs to be run.


    ```

    !python train.py --data $PATH/custom.data --batch $num_batches --cache --epochs
    $num_epochs –nosave

    $num_batches = Number of batches

    $num_epochs = Number of epochs of training (Remember this is transfer learning
    and we are already using the saved weights)

    $path = path to custom data.

    ```


    If we are running out of memory, we either try reducing the model parameters by
    taking smaller saved models and using them for training, or we reduce the batch
    size or image resolutions. Whichever method seems easy and appropriate is fine.


    The project has too many dependencies and it is advised to take a direct reference
    and use it to save time and use an optimized version of the code. The training
    code, model code, and configuration code are inter-connected. The configuration
    file has a direct impact on the training process and the model setup. Let’s look
    at the Python code for the model definition from the source code used by the researchers.


    ### The Model File


    There are standard imports with `torchvision` and `torch` functions, which are
    used multiple times in the code. The `parse` package is used to get the command-line
    arguments. The first function that is present in the model file is the `create_modules`
    function. Let’s go through some important steps, just in case a “train from the
    scratch” scenario is created.


    ```

