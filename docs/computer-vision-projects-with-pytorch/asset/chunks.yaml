    ## 总结


    我们探索了视频分析的多种用例，并挑选了四个用例进行实现。文中讨论了解决方案，以及用于实现该方案的库。


    一个关键方面是将视频转换为图像，然后对这些信息执行传统的图像处理。主要挑战在于视频会生成海量图像，处理这些图像需要时间和资源。在许多情况下，为了充分利用预测结果，所有处理都需要实时完成。


    我们讨论了一些基本用例，但还有海量的用例有待探索、学习和实现。同时，也存在许多处于研究阶段的技术挑战有待解决。既然我们已经为不同的应用学习并构建了一些计算机视觉模型，下一章将深入探讨计算机视觉模型的输出，并讨论计算机视觉的可解释人工智能。


    # 10. 计算机视觉的可解释人工智能


    大多数机器学习和深度学习模型缺乏解释和解读结果的方法。由于深度学习模型的动态特性以及不断涌现的最先进模型，当前的模型评估主要基于准确率分数。这使得机器学习和深度学习成为黑盒模型。这导致在应用模型时缺乏信心，并且对生成的结果缺乏信任。有多个库可以帮助我们解释结构化数据的模型，例如
    `SHAP` 和 `LIME`。本章将解释计算机视觉模型的输出。


    以下是近年来为计算机视觉提出的一些白盒算法：


    - `CAM`

    - `Grad-CAM`

    - `Grad-CAM++`

    - 逐层相关性传播（`LRP`）

    - `SmoothGRAD`

    - `RISE`

    - 基于神经网络的决策树（`NBDT`）


    本章重点介绍 `Grad-CAM`、`Grad-CAM++` 和 `NBDT`。在继续实现之前，我们先深入探讨以下概念。


    ## Grad-CAM


    类别激活映射（`CAM`）是一种提取热力图的技术，该热力图突出显示影响结果的空间信息。`CAM` 架构如图 10-1a 和 10-1b 所示。


    ![](img/520381_1_En_10_Fig1_HTML.png)


    `CAM` 架构的流程图。步骤如下：输入图像，卷积，特征图，带权重的全局平均池化，全连接层，预测。权重和特征图被突出显示。


    图 10-1a


    `CAM` 架构


    生成的特征图通过全局平均池化来提取权重。权重再通过全连接层输出分类结果。


    架构中突出显示的部分，即特征图和权重，用于生成预测类别的热力图。


    特征图的加权和 = ∑k (wk *Ak^(class))


    其中 `k` 代表最后一个卷积层的特征图。


    `Grad-CAM` 在特征图生成步骤之前与 `CAM` 类似。在此步骤之后，可以添加任何神经网络（例如 `VGG`、`ResNet` 等），这些网络必须是可微分的，以便获取梯度。根据预测结果，计算每个特征图对应的梯度。使用梯度在特征图维度（`i`，`j`）的宽度和深度上的“全局平均池化”，计算每个特征图的神经元重要性（alpha
    值/权重）。`Grad-CAM` 架构如图 10-1b 所示。突出显示的组件相乘以生成热力图。


    ![](img/520381_1_En_10_Fig2_HTML.png)


    `CAM` 架构的流程图。步骤如下：输入图像，卷积特征图，任意神经网络，预测到每个特征图的梯度，基于梯度的每个特征图的权重。


    图 10-1b


    `CAM` 架构


    ## Grad-CAM++


    这与 `Grad-CAM` 算法类似，但在反向传播步骤上有所不同。简单来说，`Grad-CAM` 在反向传播过程中使用一阶梯度。而在 `Grad-CAM++`
    中，使用二阶梯度，因此过程更加复杂。


    在 `Grad-CAM` 中，与具有高空间信息的特征图相比，空间信息较少的特征图在最终热力图中不被重视。包含多个对象或单个对象的图像无法在热力图中被检测到，导致准确率和可解释性降低。


    在 `Grad-CAM++` 中，通过在最终热力图中赋予所有特征图重要性来解决此问题。图 10-2 展示了整体架构。


    ![](img/520381_1_En_10_Fig3_HTML.png)


    `Grad-CAM++` 架构的流程图。步骤如下：输入图像（深色区域表示对象存在）；卷积层堆叠；特征图 `A` 到第一次方，`A` 的平方和 `A` 的立方（深色区域表示检测到抽象视觉特征）；两组显著性图
    `L` 到下标为 `C` 的 `grad-cam`。


    图 10-2


    `Grad-CAM++` 架构


    图 10-3 展示了 `Grad-CAM` 和 `Grad-CAM++` 输出结果的差异。


    ![](img/520381_1_En_10_Fig4_HTML.jpg)


    一张由九张图像组成的拼贴图，分别代表一只鸟、一只狗和几个青苹果各三张图像。这些图像按原始图像、`E` 到 `C` `grad-cam` 和 `E` 到 `C`
    `grad-cam++` 分组。在 `grad-cam` 中，图像的部分区域可见。在 `grad-cam++` 中，图像的大部分区域可见。


    图 10-3


    `Grad-CAM` 和 `Grad-CAM++` 的输出结果

