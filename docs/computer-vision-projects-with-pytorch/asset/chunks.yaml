    ## 总结


    在本章中，我们从定义基础模型并对数据进行迭代开始。我们介绍了一些基本的数据增强技术，这些技术有助于创建与未来测试数据可能呈现的分布相似的分布。这有助于构建和训练鲁棒的模型。我们探索了归一化和正则化，以提高模型的准确率和稳定性。


    在下一章中，我们将研究基于本章所学概念的目标检测框架。图像分类网络构成了各种目标检测网络的基础。'
- fmt: '# 3. Building an Object Detection Model


    Object detection is one of the most sought-after skills these days. An image can
    have multiple classes. In addition, classifying an object solves just part of
    the problem. The other part lies in the localization of the object. Object detection
    helps identify the class location of an image with a bounding box. The bounding
    box can be further processed for various sub-tasks. As an example, think about
    what a traffic cam needs to detect and identify cars.


    The traffic cam needs to detect the car and the license plate and then read the
    number from the plate to identify the owner. This is not a simple problem to solve.
    We need annotated registration data. A simple classification convolutional neural
    network model won’t work. We need to get the bounding box of the plate and search
    for alphanumeric characters, using a series of data cleaning, denoising, and super-resolution
    steps.


    There has been great advancement in the field of object detection lately. Of the
    numerous object detection approaches, we can break the journey into the pre-2012
    era or pre AlexNet era and the post-2012 era. The pre-2012 era includes multiple
    object detection algorithms such as HOG, Haar cascades, some variations of SIFT,
    SURF, etc. The post-2012 era includes RCNN, Fast RCNN, Faster RCNN, YOLO, Single
    Shot Detector, etc.


    We will briefly go through Haar Cascades from the pre-2012 era to establish the
    context of machine learning-based object detection techniques. To start with Haar
    Cascades, we need to use features from images rather than the more granular pixels.
    Haar Cascades was introduced in 2001, and even though it has aged, it is still
    one of the fastest around.


    ## Object Detection Using Boosted Cascade


    Boosted Cascade was primarily built for detecting faces, but it can be used for
    other object detection tasks. It has three parts to it—the integral images, a
    boosting algorithm to select the features, and a cascade classifier.


    To start, the input images need to be converted to what we call integral images.
    Integral images can be calculated using simple calculations.


    ![](images/520381_1_En_3_Chapter/520381_1_En_3_Fig2_HTML.jpg)


    An illustration of a horizontal rectangle. Inside, on the upper left-hand side
    is a rectangle divided into 4 parts labeled clockwise, A, B, C, and D. The points
    where the line divisions intersect are labeled, 1, 2, 3, and 4.


    Figure 3-2 Intermediate step


    ![](images/520381_1_En_3_Chapter/520381_1_En_3_Fig1_HTML.jpg)


    Illustrations of four-sided shapes grouped into labeled edge features, labeled
    line features, and labeled four-rectangle features. In a, 2 rectangles, one is
    split equally into 2 horizontal parts, the other vertical, in b, one is split
    equally into 3 horizontal parts, the other, vertical, and in c, a square is divided
    into 4 equal parts.


    Figure 3-1 Examples of feature extractors


    The images in Figure [3-1](#520381_1_En_3_Chapter.xhtml#Fig1) show three major
    types of feature extractors. The first one is the edge extractor followed by line
    and rectangular feature extractors. Using these extractors, the features need
    to be selected and the boosting algorithm helps in selecting the necessary ones.
    The adaptive boosting algorithm presents a set of important features, which aids
    in faster facial recognition.


    Integral image is an intermediate step to get to the feature extraction; it is
    done by taking the sum of pixels above and to the left of the point at which pixel
    values are computed, as given in Figure [3-2](#520381_1_En_3_Chapter.xhtml#Fig2).


    The calculation of the integral images goes like this:


    * Position 1 = Pixel sum in A rectangle (consider left and above)

    * Position 2 = Pixel sum A + B

    * Position 3 = Pixel sum A (above) + C (left)

    * Position 4 = Pixel sum (4 +1) – sum (2+3)


    The extracted features are plotted against the positive samples and negative samples
    and eventually the best features are chosen. The trained classifier for the positive
    and negative set of images is formed from the weaker classifiers. For face detection,
    from a whopping 0.16 million features, the boosting algorithms of a series of
    weak classifiers help in identifying 6,000 useful features. Eventually, a Cascade
    classifier helps to detect the class.


    The *attentional cascade*, which is what they call them, helps reduce the computational
    time and increase the efficiency of the detector. The image is segregated into
    multiple sub-windows, and the sequential weak classifier acts on them. Each classifier,
    using selected features, tries to check for the presence of the object. If at
    any point a classifier fails, all subsequent classifiers stop and the sequence
    moves to the next sub-window, and so on. The detection succeeds if all the classifiers
    can vote on the presence of the required object and get the bounding box.


    Let’s go through a sequence of Python code to use the existing model to detect
    face and eyes.


    Import the packages as follows:


    ```

    import cv2

    import gc

    ```


    The following function will get the input frame from the camera and scale it for
    the model. Since color images would not make any difference, a grayscale image
    is considered. First, the faces are detected, and then for each face, the eyes
    are located with the help of the other eye detector.


    Here’s the function to process the cascades of the face and eyes:


    ```

    def detect_face_eye(frame):

    ## normalization and convert color to gray scale

    frame_to_gray = cv2.equalizeHist(cv2.cvtColor(frame, cv2.COLOR_BGR2GRAY))

    ## application should be able to different scales of image

    detected_faces = face_cascade.detectMultiScale(frame_to_gray)

    for (x,y,w,h) in detected_faces:

    center_face = (x + w//2, y + h//2)

    ## draw an ellipse

    frame = cv2.ellipse(frame, center_face, (w//2, h//2), 0, 0, 360, (125, 125, 125),
    6)

    face_regionofinterest = frame_to_gray[y:y+h,x:x+w]

    #detect eyes - for each detected face

    ## similar multiscale operations

    detected_eyes = eyes_cascade.detectMultiScale(face_regionofinterest)

    for (x2,y2,w2,h2) in detected_eyes:

    center_eye = (x + x2 + w2//2, y + y2 + h2//2)

    radius = int(round((w2 + h2)*0.25))

    ## draw a circle

    frame = cv2.circle(frame, center_eye, radius, (255, 255, 255 ), 4)

    cv2.imshow(''--Face Detection--'', frame)

    ```


    The models can be found in the GitHub repository provided by the `open-cv` moderators
    at [`https://github.com/opencv/opencv/tree/master/data/haarcascades`](https://github.com/opencv/opencv/tree/master/data/haarcascades).
    This code uses two models, one for detecting faces and the other for eyes. However,
    there are other models present in the repository that you can experiment with.
    The function will also access the camera peripherals attached to the system and
    use them to scan for faces.


    Run the function to enable the face and eye sensing processes:


    ```

    ## saved xml paths

    face_cascade_name = r'' ..\chapter 3\frontal_face_alt.xml''

    eyes_cascade_name = r'' ..\chapter 3\eye_cascade_model.xml''

    ## initialize the cascade for detection

    face_cascade = cv2.CascadeClassifier()

    eyes_cascade = cv2.CascadeClassifier()

    ## load the cascades face followed by eyes

    face_cascade.load(cv2.samples.findFile(face_cascade_name))

    eyes_cascade.load(cv2.samples.findFile(eyes_cascade_name))

    camera_device = 0

    ## enable video processing

    capture_cam_img = cv2.VideoCapture(camera_device)

    ## enable classifier to operate on the face

    if capture_cam_img.isOpened :

    while True:

    ret, frame = capture_cam_img.read()

    detect_face_eye(frame)

    ## shut down cv video sensing when ESC is pressed

    if cv2.waitKey(10) == 27:

    cv2.destroyAllWindows()

    gc.collect()

    break

    ```


    Now that we have some idea about structured object detection, we can move to another
    advanced object detection technique, called R-CNN.'
  raw: '# 3. Building an Object Detection Model


    Object detection is one of the most sought-after skills these days. An image can
    have multiple classes. In addition, classifying an object solves just part of
    the problem. The other part lies in the localization of the object. Object detection
    helps identify the class location of an image with a bounding box. The bounding
    box can be further processed for various sub-tasks. As an example, think about
    what a traffic cam needs to detect and identify cars.


    The traffic cam needs to detect the car and the license plate and then read the
    number from the plate to identify the owner. This is not a simple problem to solve.
    We need annotated registration data. A simple classification convolutional neural
    network model won’t work. We need to get the bounding box of the plate and search
    for alphanumeric characters, using a series of data cleaning, denoising, and super-resolution
    steps.


    There has been great advancement in the field of object detection lately. Of the
    numerous object detection approaches, we can break the journey into the pre-2012
    era or pre AlexNet era and the post-2012 era. The pre-2012 era includes multiple
    object detection algorithms such as HOG, Haar cascades, some variations of SIFT,
    SURF, etc. The post-2012 era includes RCNN, Fast RCNN, Faster RCNN, YOLO, Single
    Shot Detector, etc.


    We will briefly go through Haar Cascades from the pre-2012 era to establish the
    context of machine learning-based object detection techniques. To start with Haar
    Cascades, we need to use features from images rather than the more granular pixels.
    Haar Cascades was introduced in 2001, and even though it has aged, it is still
    one of the fastest around.


    ## Object Detection Using Boosted Cascade


    Boosted Cascade was primarily built for detecting faces, but it can be used for
    other object detection tasks. It has three parts to it—the integral images, a
    boosting algorithm to select the features, and a cascade classifier.


    To start, the input images need to be converted to what we call integral images.
    Integral images can be calculated using simple calculations.


    ![](images/520381_1_En_3_Chapter/520381_1_En_3_Fig2_HTML.jpg)


    An illustration of a horizontal rectangle. Inside, on the upper left-hand side
    is a rectangle divided into 4 parts labeled clockwise, A, B, C, and D. The points
    where the line divisions intersect are labeled, 1, 2, 3, and 4.


    Figure 3-2


    Intermediate step


    ![](images/520381_1_En_3_Chapter/520381_1_En_3_Fig1_HTML.jpg)


    Illustrations of four-sided shapes grouped into labeled edge features, labeled
    line features, and labeled four-rectangle features. In a, 2 rectangles, one is
    split equally into 2 horizontal parts, the other vertical, in b, one is split
    equally into 3 horizontal parts, the other, vertical, and in c, a square is divided
    into 4 equal parts.


    Figure 3-1


    Examples of feature extractors


    The images in Figure [3-1](#520381_1_En_3_Chapter.xhtml#Fig1) show three major
    types of feature extractors. The first one is the edge extractor followed by line
    and rectangular feature extractors. Using these extractors, the features need
    to be selected and the boosting algorithm helps in selecting the necessary ones.
    The adaptive boosting algorithm presents a set of important features, which aids
    in faster facial recognition.


    Integral image is an intermediate step to get to the feature extraction; it is
    done by taking the sum of pixels above and to the left of the point at which pixel
    values are computed, as given in Figure [3-2](#520381_1_En_3_Chapter.xhtml#Fig2).


    The calculation of the integral images goes like this:


    *   Position 1 = Pixel sum in A rectangle (consider left and above)


    *   Position 2 = Pixel sum A + B


    *   Position 3 = Pixel sum A (above) + C (left)


    *   Position 4 = Pixel sum (4 +1) – sum (2+3)


    The extracted features are plotted against the positive samples and negative samples
    and eventually the best features are chosen. The trained classifier for the positive
    and negative set of images is formed from the weaker classifiers. For face detection,
    from a whopping 0.16 million features, the boosting algorithms of a series of
    weak classifiers help in identifying 6,000 useful features. Eventually, a Cascade
    classifier helps to detect the class.


    The *attentional cascade*, which is what they call them, helps reduce the computational
    time and increase the efficiency of the detector. The image is segregated into
    multiple sub-windows, and the sequential weak classifier acts on them. Each classifier,
    using selected features, tries to check for the presence of the object. If at
    any point a classifier fails, all subsequent classifiers stop and the sequence
    moves to the next sub-window, and so on. The detection succeeds if all the classifiers
    can vote on the presence of the required object and get the bounding box.


    Let’s go through a sequence of Python code to use the existing model to detect
    face and eyes.


    Import the packages as follows:


    ```

    import cv2

    import gc

    ```


    The following function will get the input frame from the camera and scale it for
    the model. Since color images would not make any difference, a grayscale image
    is considered. First, the faces are detected, and then for each face, the eyes
    are located with the help of the other eye detector.


    Here’s the function to process the cascades of the face and eyes:


    ```

    def detect_face_eye(frame):

    ## normalization and convert color to gray scale

    frame_to_gray = cv2.equalizeHist(cv2.cvtColor(frame, cv2.COLOR_BGR2GRAY))

    ## application should be able to different scales of image

    detected_faces = face_cascade.detectMultiScale(frame_to_gray)

    for (x,y,w,h) in detected_faces:

    center_face = (x + w//2, y + h//2)

    ## draw an ellipse

    frame = cv2.ellipse(frame, center_face, (w//2, h//2), 0, 0, 360, (125, 125, 125),
    6)

    face_regionofinterest = frame_to_gray[y:y+h,x:x+w]

    #detect eyes - for each detected face

    ## similar multiscale operations

    detected_eyes = eyes_cascade.detectMultiScale(face_regionofinterest)

    for (x2,y2,w2,h2) in detected_eyes:

    center_eye = (x + x2 + w2//2, y + y2 + h2//2)

    radius = int(round((w2 + h2)*0.25))

    ## draw a circle

    frame = cv2.circle(frame, center_eye, radius, (255, 255, 255 ), 4)

    cv2.imshow(''--Face Detection--'', frame)

    ```


    The models can be found in the GitHub repository provided by the `open-cv` moderators
    at [`https://github.com/opencv/opencv/tree/master/data/haarcascades`](https://github.com/opencv/opencv/tree/master/data/haarcascades).
    This code uses two models, one for detecting faces and the other for eyes. However,
    there are other models present in the repository that you can experiment with.
    The function will also access the camera peripherals attached to the system and
    use them to scan for faces.


    Run the function to enable the face and eye sensing processes:


    ```

    ## saved xml paths

    face_cascade_name = r'' ..\chapter 3\frontal_face_alt.xml''

    eyes_cascade_name = r'' ..\chapter 3\eye_cascade_model.xml''

    ## initialize the cascade for detection

    face_cascade = cv2.CascadeClassifier()

    eyes_cascade = cv2.CascadeClassifier()

    ## load the cascades face followed by eyes

    face_cascade.load(cv2.samples.findFile(face_cascade_name))

    eyes_cascade.load(cv2.samples.findFile(eyes_cascade_name))

    camera_device = 0

    ## enable video processing

    capture_cam_img = cv2.VideoCapture(camera_device)

    ## enable classifier to operate on the face

    if capture_cam_img.isOpened :

    while True:

    ret, frame = capture_cam_img.read()

    detect_face_eye(frame)

    ## shut down cv video sensing when ESC is pressed

    if cv2.waitKey(10) == 27:

    cv2.destroyAllWindows()

    gc.collect()

    break

    ```


    Now that we have some idea about structured object detection, we can move to another
    advanced object detection technique, called R-CNN.'
