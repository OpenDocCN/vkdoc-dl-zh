- fmt: "#### Dropouts\n\nDropouts are generally used for one-dimensional networks.\
    \ In the case of convolutional neural networks, a few models do have dropouts\
    \ and they can be used after every convolutional layer except the last few layers.\
    \ The last few layers have smaller dimensions and the image will have been represented.\
    \ It can act as a regularizer.\n\n![](images/520381_1_En_1_Chapter/520381_1_En_1_Fig34_HTML.png)\n\
    \nThe illustrations of dropout examples in a fully connected network. In architecture\
    \ without dropouts, layers of circles, are arranged with the bottom layers, connected\
    \ to the top layers, and finally converging into a single circle at the topmost\
    \ layer. In dropouts, there are circles which has no connections.\n\n**Figure\
    \ 1-27** Dropout examples in a fully connected network\n\nFigure [1-27](#520381_1_En_1_Chapter.xhtml#Fig34)\
    \ shows the dropout application. On the left side of the image is a general neural\
    \ network. The right side shows dropouts with all the layers except the last one.\n\
    \n#### Data Augmentation Techniques\n\nDeep learning architectures are best with\
    \ volumes of data in order to generalize on the cost function. In real-world scenarios,\
    \ sufficient data is often not available. Data augmentation is used to generate\
    \ data points without affecting the actual labels or basic distinguishable features\
    \ of the image. For example, if we want to augment a picture of a cat, we must\
    \ provide the classifier with not just the image of a tail. The tail can be a\
    \ distinguishable feature within the same species, but it can belong to other\
    \ objects as well.\n\nThe training data needs to be representative of the population.\
    \ Images can have a lot of variations, translations, and changes in brightness.\
    \ A few of the augmentation techniques are listed here:\n\n*   **Translation:**\
    \ The images can be shifted in the horizontal or vertical axis.\n*   **Whitening:**\
    \ Used to enhance the features which are already distinguishable. CNN tries to\
    \ capture the edges and gradients, so these can help.\n*   **Scaling:** The process\
    \ of scaling the image pixel values.\n*   **Random Crop:** Getting a section of\
    \ images cropped randomly can act as an alternative to dropout, because no particular\
    \ section of images gets priority.\n*   **Shifting Colors:** We can use the hue\
    \ and saturation values to shifts as well the RGB shifting.\n*   **Elastic distortions:**\
    \ We can try to compute displacement interpolations, shifting a few points in\
    \ the vertical and horizontal axes.\n*   **Mixup:** In some model scenarios of\
    \ classification, we can use this technique to create a blend of two classes so\
    \ that the CNN can come up with a linear differentiating ability.\n*   **Patch\
    \ Gaussian:** This technique adds random noise to selected patches in an image.\
    \ This enhances the robustness of the model.\n*   **Reinforcement Based Augmentation:**\
    \ We can create the model and decide on policies for augmentations. This is an\
    \ expensive process and should be used with caution.\n\nThere are multiple data\
    \ augmentation techniques, and most of them are modulated by the kind of robustness\
    \ we want and that the test data is expecting. It is an important aspect of any\
    \ deep learning-based modeling.\n\n### Introduction to PyTorch\n\nDeep learning\
    \ modeling needs high computations and properly defined frameworks for optimization.\
    \ There are a few existing frameworks that are quite popular with the research\
    \ and the developer community. In all the frameworks, they have made sure the\
    \ useful and recurring functions are readily available. A framework essentially\
    \ sets up the packages and functions that will help developers create end-to-end\
    \ deep learning models with ease.\n\nPyTorch is a framework developed in C++ and\
    \ Python, so it is optimized and faster. It uses tensors for most of its development.\
    \ It also aids in manipulating tensors in different processor architectures. It\
    \ supports parallel processing and processing in CUDA cores, which speeds up the\
    \ training of computer vision models.\n\nThe following sections discuss how to\
    \ use PyTorch.\n\n#### Installation\n\nVisit `pytorch.org` and select the system\
    \ for which you want to install PyTorch. For example, if you want to install the\
    \ package via `conda` or `pip`, it’s best to have CUDA installed and to leverage\
    \ that.\n\n```\n/  install pytorch/torch \n```"
