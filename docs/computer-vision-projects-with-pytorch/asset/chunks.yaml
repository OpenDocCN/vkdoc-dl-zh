    \ 层，可以继续进入另一个 `3x3 conv 64` 层，或者跳跃到更远的层。此过程重复进行，直到到达 `3x3 conv 512` 层，之后是平均池化层。数据随后进入\
    \ `FC` 层，最后到达 `Softmax` 层。\n\n**图 5-6**  \n`ResNet18` 的原始架构\n\n让我们从实现开始。\n\n![](img/520381_1_En_5_Fig7_HTML.jpg)\n\
    \n一张表示模型架构中卷积块的代码行图像。代码从 `ResNet` 开始，然后是 `conv1`、`bn1`、`relu`、`maxpool`、`Sequential\
    \ layer 1` 及其子层 `0` 和 `1 Basic Blocks`，以及 `Sequential layer 2` 及其子层 `0 Basic Block`。\n\
    \n**图 5-7**  \n卷积块\n\n```\n# Defining the input shape\nwidth = 224\nheight = 224\n\
    # Loading the pretrained model\nresnetmodel = models.resnet18(pretrained=True)\n\
    # selecting the layer\nlayer = resnetmodel._modules.get('avgpool')\n# evaluation\n\
    resnetmodel.eval()\n```\n\n图 5-7 展示了模型的架构。现在，让我们提取图像的嵌入向量并将其保存到一个对象中。\n\n```\n\
    # scaling the data\ns_data = transforms.Scale((224, 224))\n# normalizing\nstandardize\
    \ = transforms.standardize(mean=[0.7, 0.6, 0.3],\n                           \
    \          std=[0.2, 0.3, 0.1])\n# converting to tensor\nconvert_tensor = transforms.ToTensor()\n\
    # creating the missing image object\nmissing_img = []\n# function to get embeddings\n\
    def vector_extraction(resnetmodel, image_id):\n    # exception handling to ignore\
    \ missing images\n    try:\n        img = Image.open(image_location(image_id)).convert('RGB')\n\
    \        t_img = Variable(standardize(convert_tensor(s_data(img))).unsqueeze(0))\n\
    \        embeddings = torch.zeros(512)\n        def select_d(m, i, o):\n     \
    \       embeddings.copy_(o.data.reshape(o.data.size(1)))\n        hlayer = layer.register_forward_hlayer(select_d)\n\
    \        resnetmodel(t_img)\n        hlayer.remove()\n        emb = embeddings\n\
    \        return embeddings\n    # If file not found\n    except FileNotFoundError:\n\
    \        # Store the index of such entries in missing_img list and drop them later\n\
    \        missed_img = df[df['image'] == image_id].index\n        print(missed_img)\n\
    \        missing_img.append(missed_img)\n```\n\n此函数将加载图像，将其重塑为 `224*224`，并转换为数组，随后该数组将经过\
    \ `ResNet` 模型。这将返回一个包含 512 个值的数组，即该特定图像的 512 个特征向量。\n\n让我们将此函数应用于一个示例图像并查看输出。\n\
