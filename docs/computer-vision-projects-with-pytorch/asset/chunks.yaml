- fmt: '### Define the Model


    我们将使用卷积块定义模型架构，并采用`ReLU`作为激活层。基线模型包含12个卷积块，其中包括一个用于设置输入的卷积块和一个用于输出的卷积块。前三个卷积块各有一个最大池化函数，通过过滤信息将图像从高维度降至低维度。


    模型定义如下：


    ```python

    class Net(nn.Module):

    def __init__(self):

    super(Net, self).__init__()

    # Input Block

    self.convblock1 = nn.Sequential(

    nn.Conv2d(in_channels=3, out_channels=8, kernel_size=(3, 3),

    padding=0, bias=False),

    nn.ReLU(),

    #nn.BatchNorm2d(4)

    )

    self.pool11 = nn.MaxPool2d(2, 2)

    # CONVOLUTION BLOCK

    self.convblock2 = nn.Sequential(

    nn.Conv2d(in_channels=8, out_channels=16, kernel_size=(3, 3),

    padding=0, bias=False),

    nn.ReLU(),

    #nn.BatchNorm2d(16)

    )

    # TRANSITION BLOCK

    self.pool22 = nn.MaxPool2d(2, 2)

    self.convblock3 = nn.Sequential(

    nn.Conv2d(in_channels=16, out_channels=10, kernel_size=(1, 1), padding=0, bias=False),

    #nn.BatchNorm2d(10),

    nn.ReLU()

    )

    self.pool33 = nn.MaxPool2d(2, 2)

    # CONVOLUTION BLOCK

    self.convblock4 = nn.Sequential(

    nn.Conv2d(in_channels=10, out_channels=10, kernel_size=(3, 3), padding=0, bias=False),

    nn.ReLU(),

    #nn.BatchNorm2d(10)

    )

    self.convblock5 = nn.Sequential(

    nn.Conv2d(in_channels=10, out_channels=32, kernel_size=(1, 1), padding=0, bias=False),

    #nn.BatchNorm2d(32),

    nn.ReLU(),

    )

    self.convblock6 = nn.Sequential(

    nn.Conv2d(in_channels=32, out_channels=10, kernel_size=(1, 1), padding=0, bias=False),

    nn.ReLU(),

    #nn.BatchNorm2d(10),

    )

    self.convblock7 = nn.Sequential(

    nn.Conv2d(in_channels=10, out_channels=10, kernel_size=(3, 3), padding=0, bias=False),

    nn.ReLU(),

    #nn.BatchNorm2d(10)

    )

    self.convblock8 = nn.Sequential(

    nn.Conv2d(in_channels=10, out_channels=32, kernel_size=(1, 1), padding=0, bias=False),

    #nn.BatchNorm2d(32),

    nn.ReLU()

    )

    self.convblock9 = nn.Sequential(

    nn.Conv2d(in_channels=32, out_channels=10, kernel_size=(1, 1), padding=0, bias=False),

    nn.ReLU(),

    #nn.BatchNorm2d(10),

    )

    self.convblock10 = nn.Sequential(

    nn.Conv2d(in_channels=10, out_channels=14, kernel_size=(3, 3), padding=0, bias=False),

    nn.ReLU(),

    #nn.BatchNorm2d(14),

    )

    self.convblock11 = nn.Sequential(

    nn.Conv2d(in_channels=14, out_channels=16, kernel_size=(3, 3), padding=0, bias=False),

    nn.ReLU(),

    #nn.BatchNorm2d(16),

    )

    # OUTPUT BLOCK

    self.gap = nn.Sequential(

    nn.AvgPool2d(kernel_size=4)

    )

    self.convblockout = nn.Sequential(

    nn.Conv2d(in_channels=16, out_channels=2, kernel_size=(4, 4), padding=0, bias=False),

    )

    def forward(self, x):

    x = self.convblock1(x)

    x = self.pool11(x)

    x = self.convblock2(x)

    x = self.pool22(x)

    x = self.convblock3(x)

    x = self.pool33(x)

    x = self.convblock4(x)

    x = self.convblock5(x)

    x = self.convblock6(x)

    x = self.convblock7(x)

    x = self.convblock8(x)

    x = self.convblock9(x)

    x = self.convblock10(x)

    x = self.convblock11(x)

    x = self.gap(x)

    x = self.convblockout(x)

    x = x.view(-1, 2)

    return F.log_softmax(x, dim=-1)

    ```


    在这种方法中，我们创建了一个`Net`类，它利用Python的`super`功能支持多重继承。我们从输入卷积块开始；输入通道数设为3，输出通道数设为8。这些参数可以调整，但应与架构和核心可用性保持一致。我们使用3x3卷积核，因为如前所述，这是最高效的卷积方式之一。在少数几个块中，我们还可以看到1x1卷积，它通过组合所有特征图来帮助减少z方向上的特征图数量。


    以下是模型的详细解释：


    1.  模型的输入块接收一个三通道的224x224输入，并使用3x3卷积生成222x222和八个通道。随后是`ReLU`激活层。此模型架构未使用填充。

    2.  输入之后，我们调用最大池化函数将特征图尺寸减小到111x111。

    3.  池化函数处理特征图后，我们使用3x3卷积将特征图从8个通道卷积生成16个通道，并将特征图尺寸减小到109x109。

    4.  使用卷积块获得16个通道后，我们再次使用最大池化函数将特征图尺寸降至54x54。

    5.  然后，我们使用一个过渡块（网络中首次使用）将通道数从16减少到10，随后再进行一次最大池化。

    6.  完成最大池化且特征图尺寸变为27x27后，我们使用3x3卷积核进行卷积，并生成相同数量的特征图。

    7.  第五和第六个卷积块是过渡层，我们将层数从10增加到32，再回到10。和往常一样，这里没有使用填充。

    8.  第七个卷积块用于3x3卷积操作，但通道数保持不变。

    9.  第八和第九个卷积块执行类似操作。通过过渡卷积操作，我们将通道数从10移动到32，再回到10。

    10. 我们添加了一个3x3卷积块，这是第十个。我们将特征图数量从10增加到14。

    11. 架构的倒数第二个构建块使用3x3卷积核将通道数从14移动到16。

    12. 在输出块中，我们使用平均池化将19x19的特征图缩减为2x2。这可用于二分类。在平均池化之后，我们使用一个与特征图尺寸相同卷积核的卷积块，将其缩减为单个单元用于输出。

    13. 最后，我们使用对数`softmax`函数生成输出。这是一个缩放后的输出，我们使用`argmax`函数来确定每个批次元素的类别。


    出于此架构设计的目的，我们将偏置的添加设置为`false`。这意味着网络中所有神经组件的计算都不会添加偏置。不过，我们可以尝试使用偏置。在大多数情况下，只要数据经过中心化和归一化，偏置对网络的影响不大。


    让我们查看模型摘要功能输出的模型签名。如果GPU可用，我们也可以将模型放入GPU进行处理。


    ```python

    use_cuda = torch.cuda.is_available()

    device = torch.device("cuda" if use_cuda else "cpu")

    print("Available processor {}".format(device))

    model = Net().to(device)

    summary(model, input_size=(3, 224, 224))

    Available processor cuda

    ```'
  raw: '### Define the Model


    We will define our model architecture with convolution blocks and use ReLU as
    an activation layer. The baseline model will have 12 convolution blocks, including
    one convolution block to set up the input and one for the output. The first three
    convolution blocks have one max pooling function to drop down from the high dimensions
    of the image to lower dimensions by filtering information.


    The model definition follows:


    ```

    class Net(nn.Module):

    def __init__(self):

    super(Net, self).__init__()

    # Input Block

    self.convblock1 = nn.Sequential(

    nn.Conv2d(in_channels=3, out_channels=8, kernel_size=(3, 3),

    padding=0, bias=False),

    nn.ReLU(),

    #nn.BatchNorm2d(4)

    )

    self.pool11 = nn.MaxPool2d(2, 2)

    # CONVOLUTION BLOCK

    self.convblock2 = nn.Sequential(

    nn.Conv2d(in_channels=8, out_channels=16, kernel_size=(3, 3),

    padding=0, bias=False),

    nn.ReLU(),

    #nn.BatchNorm2d(16)

    )

    # TRANSITION BLOCK

    self.pool22 = nn.MaxPool2d(2, 2)

    self.convblock3 = nn.Sequential(

    nn.Conv2d(in_channels=16, out_channels=10, kernel_size=(1, 1), padding=0, bias=False),

    #nn.BatchNorm2d(10),

    nn.ReLU()

    )

    self.pool33 = nn.MaxPool2d(2, 2)

    # CONVOLUTION BLOCK

    self.convblock4 = nn.Sequential(

    nn.Conv2d(in_channels=10, out_channels=10, kernel_size=(3, 3), padding=0, bias=False),

    nn.ReLU(),

    #nn.BatchNorm2d(10)

    )

    self.convblock5 = nn.Sequential(

    nn.Conv2d(in_channels=10, out_channels=32, kernel_size=(1, 1), padding=0, bias=False),

    #nn.BatchNorm2d(32),

    nn.ReLU(),

    )

    self.convblock6 = nn.Sequential(

    nn.Conv2d(in_channels=32, out_channels=10, kernel_size=(1, 1), padding=0, bias=False),

    nn.ReLU(),

    #nn.BatchNorm2d(10),

    )

    self.convblock7 = nn.Sequential(

    nn.Conv2d(in_channels=10, out_channels=10, kernel_size=(3, 3), padding=0, bias=False),

    nn.ReLU(),

    #nn.BatchNorm2d(10)

    )

    self.convblock8 = nn.Sequential(

    nn.Conv2d(in_channels=10, out_channels=32, kernel_size=(1, 1), padding=0, bias=False),

    #nn.BatchNorm2d(32),

    nn.ReLU()

    )

    self.convblock9 = nn.Sequential(

    nn.Conv2d(in_channels=32, out_channels=10, kernel_size=(1, 1), padding=0, bias=False),

    nn.ReLU(),

    #nn.BatchNorm2d(10),

    )

    self.convblock10 = nn.Sequential(

    nn.Conv2d(in_channels=10, out_channels=14, kernel_size=(3, 3), padding=0, bias=False),

    nn.ReLU(),

    #nn.BatchNorm2d(14),

    )

    self.convblock11 = nn.Sequential(

    nn.Conv2d(in_channels=14, out_channels=16, kernel_size=(3, 3), padding=0, bias=False),

    nn.ReLU(),

    #nn.BatchNorm2d(16),

    )

    # OUTPUT BLOCK

    self.gap = nn.Sequential(

    nn.AvgPool2d(kernel_size=4)

    )

    self.convblockout = nn.Sequential(

    nn.Conv2d(in_channels=16, out_channels=2, kernel_size=(4, 4), padding=0, bias=False),

    )

    def forward(self, x):

    x = self.convblock1(x)

    x = self.pool11(x)

    x = self.convblock2(x)

    x = self.pool22(x)

    x = self.convblock3(x)

    x = self.pool33(x)

    x = self.convblock4(x)

    x = self.convblock5(x)

    x = self.convblock6(x)

    x = self.convblock7(x)

    x = self.convblock8(x)

    x = self.convblock9(x)

    x = self.convblock10(x)

    x = self.convblock11(x)

    x = self.gap(x)

    x = self.convblockout(x)

    x = x.view(-1, 2)

    return F.log_softmax(x, dim=-1)

    ```


    In this approach, we are creating a `Net` class that enables options for multiple
    inheritances using the Python `super` functionality. We start with the input convolutional
    block; the number of input channels is set to 3 and the output channels are set
    to 8\. These arguments can be tweaked, but should be in line with the architecture
    and core availabilities. We use the kernel with 3x3 convolutions since, as discussed
    earlier, it is one of the most efficient ways of convolving. In a few blocks,
    we can also see a 1x1, which helps reduce the feature maps in the z-direction
    by proposing a combination of all the feature maps.


    Here’s the model explanation in detail:


    1.  The input block for the model receives a three-channel 224x224 input and uses
    a convolution by 3x3 to generate 222x222 and eight channels. This is followed
    by the ReLU activation layer. We are not using padding for this model architecture.


    2.  After the input, we call on the max pooling function to reduce the feature
    map size to 111x111.


    3.  After the pooling function works on the feature maps, we are convolving the
    feature maps by 3x3 to generate 16 channels from 8 and reducing the feature map
    dimension to 109x109.


    4.  Once we have used a convolution block to get 16 channels, we use the max pooling
    function again to bring the feature map dimension to 54x54.


    5.  We then use a transition block (for the first time in the network) to reduce
    the number of channels from 16 to 10, followed by another max pooling function.


    6.  Once we have finished using max pooling and the feature map dimension is now
    27x27, we use a 3x3 kernel to convolve and create an equal number of feature maps.


    7.  The fifth and sixth convolution blocks are transition layers, wherein we increase
    the number of layers from 10 to 32 and back to 10\. There is no padding as usual
    for this.


    8.  The seventh convolution block is used for 3x3 convolution operations, but
    the channel size remains the same again.


    9.  We have similar operations in the eighth and ninth convolution blocks. Using
    the transition convolutional operations, we are moving the channels from 10 to
    32 and back to 10 again.


    10.  We have added a 3x3 convolution block, which is tenth in line. We increase
    the number of feature maps from 10 to 14.


    11.  The penultimate building block of the architecture is using a 3x3 kernel
    to move the number of channels from 14 to 16.


    12.  In the output block, we use average pooling to bring in two-four units from
    19x19\. That can be used for the binary classification. Following our average
    pooling, we use a convolution block of the same kernel size as of the feature
    map dimension to bring that into a single unit for the output.


    13.  Finally, we use the logarithmic `softmax` function to produce the output.
    It is a scaled output and we use the `argmax` function to determine the class
    per batch element.


    For the purposes of this architectural design, we have kept the addition of bias
    set to false. This means no bias is added to the calculation for all the neural
    components formed in the network. We can, however, experiment with bias. In most
    places, it shouldn’t affect the network much, as long as the data is centered
    and normalized.


