    ## Summary


    This chapter started with the problems related to up-scaling images and discussed
    how to proceed with up-scaling. We discussed the advantages of the various methods
    and the modeling techniques currently available. State-of-the-art algorithms like
    SRGAN were discussed and implemented. We also went through the training process
    set up the project. This chapter discussed how we can use convolutional models
    to up-scale images by some factor in combination with generative models. Super-resolution
    is a growing field and is widely used, such as to detect license plates from a
    traffic camera or to enhance old photographs. This is a very important field in
    computer vision and holds years of research.


    In the upcoming chapter, we move on from the concepts of still images to moving
    images, also known as video.


    # 9. Video Analytics


    The machine learning journey started from structured data long ago to the process
    of extracting meaningful predictions. As data grew, machine learning started exploring
    other data types as well. Today, there is no limit to the types of data that can
    be processed.


    From structured data, we started analyzing text data. We started understanding
    text and making predictions using features in the text. Then we jumped to images
    as well. Even though this process was challenging at times, thanks to the advancement
    in processing power of GPUs and TPUs, things started to fall in place.


    Then comes audio processing. This involves processing the audio using frequency
    or converting the audio into text and then making predictions.


    The combination of all these concepts is called *video analytics.*


    The amount of video data available out there is enormous. The world is creating
    video content every second. The entertainment and sports industries run on videos,
    and security cameras are capturing every movement. As shown in Figure [9-1](#520381_1_En_9_Chapter.xhtml#Fig1),
    YouTube alone has more than two billion users. Think about the amount of data
    being generated from videos. As we see more data, more problems will surface and
    AI will be leveraged to solve these problems.


    ![](images/520381_1_En_9_Chapter/520381_1_En_9_Fig1_HTML.jpg)


    A bar graph depicts the YouTube usage per month from year 2006-2020. There is
    an increase in YouTube usage as the years go by. Year 2020 has the highest monthly
    user at 2 billion. Year 2006 has the lowest which barely even make a billion.


    Figure 9-1


    YouTube


    Video content analysis or video content analytics, also known as video analysis
    or video analytics, is the capability of automatically analyzing video to detect
    and determine temporal and spatial events.'
