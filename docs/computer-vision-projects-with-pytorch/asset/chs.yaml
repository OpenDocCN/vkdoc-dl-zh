  \ stride=(2, 2), padding=(1, 1), bias=False)\n(bn2): FrozenBatchNorm2d(128, eps=0.0)\n\
  (conv3): Conv2d(128, 512, kernel_size=(1, 1), stride=(1, 1), bias=False)\n(bn3):\
  \ FrozenBatchNorm2d(512, eps=0.0)\n(relu): ReLU(inplace=True)\n(downsample): Sequential(\n\
