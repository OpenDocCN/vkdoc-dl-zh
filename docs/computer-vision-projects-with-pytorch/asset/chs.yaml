- '# 6. 姿态估计


  人体姿态估计（HPE）是一项计算机视觉任务，通过估计给定帧/视频中的主要关键点（如眼睛、耳朵、手和腿）来检测人体姿态。图 6-1 展示了一个实际的人体姿态估计示例。


  ![](img/520381_1_En_6_Fig1_HTML.png)


  一位非裔美国女孩左手拿着一把发刷站立。一个计算机生成的轮廓勾勒出她的手、腿、躯干、眼睛、鼻子和嘴巴。


  图 6-1


  HPE 示例


  人体姿态检测有助于追踪人体部位和关节。人体中需要识别的一些关键点包括手臂、腿、眼睛、耳朵、鼻子等，这可以帮助我们追踪运动。


  HPE 广泛应用于机器人技术、理解人类活动和行为、体育分析等领域。


  深度学习概念，特别是 CNN 架构，是为 HPE 量身定制和设计的。


  解决此问题有两种方法：


  *   自上而下方法

  *   自下而上方法


  ## 自上而下方法


  使用此方法，首先通过为每个人绘制一个估计的边界框来识别人类。第二步，在每个边界框内为该特定人物识别人体关键点。此方法的缺点是我们需要一个单独的模型来进行人体识别，然后必须在所有边界框内识别关键点。这增加了计算时间和复杂度。此模型的优点是网络将识别帧中的所有人类。


  ## 自下而上方法


  使用此方法，首先在给定帧中识别所有人体关键点。在第二阶段，将这些关键点连接起来形成类似人体的骨架。此方法的缺点是，由于图像中的尺度变化，它可能无法识别较小尺度的人类。此方法的优点是相比自上而下方法，计算时间减少。


  以下是目前更常用的 HPE 模型：


  *   `OpenPose`：2019 年

  *   `HRNet`：2019 年

  *   `Higher HRNet`：2020 年

  *   `AlphaPose`：2018 年

  *   `Mask R-CNN`：2018 年

  *   `Dense pose`：2018 年

  *   `DeepCut`：2016 年

  *   `DeepPose`：2014 年

  *   `Pose Net`：2015 年


  ## OpenPose


  `OpenPose`是一种实时的、多人、多阶段的姿态估计算法，以`VGG19`作为其骨干网络。该算法遵循自下而上的方法。输入图像被送入`VGG-19`网络以提取特征图。提取的特征图被传递到多阶段
  CNN。每个阶段包含两个并行运行的分支。


  ### 分支-1


  该分支为要检测的关键点创建热图/置信图。为所有关键点生成单独的热图。




  ### 分支-2


  该分支生成部位亲和场（PAFs）。PAFs 能够识别关键点之间的连接关系。


  来自两个分支的输出通过线积分进行映射，以识别正确的连接。在预测结果（热力图、PAF）与真实值（热力图、PAF）之间计算 `L2` 损失。使用了两个 `L2` 损失函数——每个分支的末端各有一个。在训练过程中，总损失计算为这两个损失函数之和。


  阶段 1 的输出被传递到阶段 2，以改进结果。通过增加阶段数量，模型的深度也随之增加。由于图像中可能存在多个人，因此使用加权二分图来连接同一个人的各个部位。连接后的配对会被合并，形成人体骨架。该模型可以在单张图像上检测多达
  135 个关键点。图 6-2 和图 6-3 展示了 OpenPose 的架构和流程图。


  ![](img/520381_1_En_6_Fig3_HTML.jpg)


  OpenPose 的两个流程图。步骤如下：图像、网络、热力图和 PAFs。热力图的步骤如下：非极大值抑制（NMS）、部位候选、二分图、线积分、加权二分图、分配算法、连接、合并以及人体。PAFs
  指向线积分。图表 2 用图像替换了图表 1 中的部分步骤。


  **图 6-3** OpenPose 流程图


  ![](img/520381_1_En_6_Fig2_HTML.jpg)


  池化和卷积阶段的示意图。从左到右：一个输入图像框，VGG-19（由 13 个框组成的系列）；顶部的阶段 1 是一个名为分支 1 的框，它有 5 个小框连接到一个标记为
  `h` 乘以 `w` 的框，其下方是一个名为分支 2 的框，它有 5 个小框连接到一个标记为 `h` 乘以 `w` 的框。


  **图 6-2** OpenPose 架构


  图 6-4 展示了 OpenPose 与其他模型运行时的对比。默认 OpenPose 和最大精度 OpenPose 承诺提供更好的性能。


  ![](img/520381_1_En_6_Fig4_HTML.jpg)


  一张图表描绘了：默认 OpenPose 的运行时（秒）在 0 处，OpenPose 线从 0.25 到 0.24，AlphaPose 线从 0 到 0.5，Mask
  RCNN 线从 0.25 到 2.5。AlphaPose 的点位于 Mask RCNN 线 0.25 到 1.5 的运行时区域内，Mask RCNN 的点位于
  AlphaPose 线 0 到 0.25 的区域内。数值为近似值。


  **图 6-4** OpenPose 流程及与其他模型的运行时对比


  ## HRNet（高分辨率网络）


  这是一种自顶向下的方法。它首先使用 Faster-RCNN 识别图像中的人体，并在其周围设置边界框。然后利用 HRNet 架构生成高质量的特征图。最后在每个边界框内识别关键点。


  **动机：**


  1.  以往所有模型（AlexNet、GoogleNet、ResNet 和 DenseNet）都是基于图像分类卷积架构开发的，导致输出分辨率低且对位置不敏感。在这些架构中，可以通过使用空洞卷积来提高低分辨率，但这会增加计算时间。


  2.  上采样是解决此问题的另一种方法。U-Net、SegNet、DeConvNet 和 Hourglass 模型都使用了上采样技术。在该技术中，阶段 1 的输入图像被转换为低分辨率以进行分类。在阶段
  2，通过顺序连接的卷积从低分辨率恢复高分辨率图像。但是，从低分辨率完全恢复高分辨率是不可能的，并且表示的位置敏感性较弱。


  HRNet 是一种用于视觉识别的通用架构。其架构不基于任何使用串联卷积的分类网络。在 HRNet 架构中，多个分辨率的卷积通过使用上采样和下采样技术进行重复融合，以并行方式连接。该网络从头到尾都保持高分辨率表示。各分辨率之间的重复融合增强了高分辨率和低分辨率表示。高分辨率卷积通过一种称为“步长卷积”的下采样技术转换为低分辨率卷积。低分辨率卷积通过“双线性上采样”技术转换为高分辨率卷积。高分辨率分支保留空间信息，低分辨率分支保留上下文信息。图
  6-5、6-6 和 6-7 展示了 HRNet 的详细架构。


  ![](img/520381_1_En_6_Fig5_HTML.png)


  一个包含三行的示意图。从上到下，从左到右：第一行有一个标记为 `1x` 的箭头，旁边是由右箭头连接的 11 个直立块。第二行以 `2x` 开始，其后是由箭头连接的
  9 个直立块。第三行以 `4x` 开始，其后是由右箭头连接的 5 个直立块。


  **图 6-5** HRNet 架构，第一部分


  **主要观察：**


  *   在分类中，卷积是串联放置的。但在 HRNet 中，卷积是并行放置的。

  *   对于上采样，使用双线性函数而不是卷积（由于时间复杂性）。

  *   使用步长卷积对高分辨率图像进行下采样（以避免信息丢失）。


  阶段 2、3 和 4 中的块数分别为 1、4 和 3。这些数字（根据作者的说法）并未得到充分优化。由于 HRNet 中通道数减少，其参数和计算复杂度并不高于 ResNet。由于该架构是一个多分辨率网络，输出在所有分辨率（高、中、低）下都会产生。对于人体姿态估计（HPE），仅使用高分辨率通道的输出。对于语义分割和人脸对齐，则使用所有分辨率的输出。


  ![](img/520381_1_En_6_Fig7_HTML.jpg)


  两个并排的示意图，分别标记为常规卷积和多分辨率卷积。从左到右：图 1 有 2 组由右箭头连接的 4 个连接块，一个三杠等号，以及一个由箭头互连的两列四行块系列；图
  2 有一个带箭头的两列四行块系列。


  **图 6-7** HRNet 架构，第三部分


  ![](img/520381_1_En_6_Fig6_HTML.png)


  一个分为 4 段的示意图，从左到右依次为：段 1，一行 5 个块；段 2，两行，每行 5 个块；段 3，三行，每行 5 个块，以及第四行 1 个块；段 4，四行，每行
  5 个块。块之间由箭头连接。这些块代表通道图，箭头代表残差单元。


  **图 6-6** HRNet 架构，第二部分




