  \ 1 X、2 X、8 X、8 X 和 4 X。框起来的区域包括 2 种卷积类型的过滤器和尺寸的条目，以及一个残差输出尺寸。类型下的最后 3 个条目是平均池化、全连接和\
  \ Soft Max。\n\n**图 3-11** Darknet 53 架构\n\n让我们看一些使用已保存模型并针对自定义数据集进行微调的代码。为什么我们不从头开始训练呢？这些都是重量级模型，我们并不总是有足够的\
