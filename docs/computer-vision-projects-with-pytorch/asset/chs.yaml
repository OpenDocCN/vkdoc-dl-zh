  \n```\ndef get_mask_color(mask_conf):\n## helper function to generate mask\ncolour_option\
  \ = [[0, 250, 0],[0, 0, 250],[250, 0, 0],[0, 250, 250],[250, 250, 0],[250, 0, 250],[75,\
  \ 65, 170],[230, 75, 180],[235, 130, 40],[60, 140, 240],[40, 180, 180]]\nblue =\
