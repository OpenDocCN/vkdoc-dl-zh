  \    pred_data = pred_data\n    pred_data = np.array(pred_data)\n    trgt_data =\
  \ np.array(trgt_data)\n    lable_values = np.unique(np.concatenate((trgt_data, pred_data)))\n\
  \    if lable_values.shape[0] == 1:\n        if lable_values[0] != 0:\n        \
  \    lable_values = np.array([0, lable_values[0]])\n        else:\n            lable_values\
  \ = np.array([lable_values[0], 1])\n    n_labels = lable_values.shape[0]\n    lst\
  \ = []\n    z = list(zip(trgt_data, pred_data))\n    for combi in product(lable_values,\
  \ repeat=2):\n        lst.append(z.count(combi))\n    mat = np.asarray(lst)[:, None].reshape(n_labels,\
  \ n_labels)\n    return mat\n\ndef plot_confusion_matrix(conf_mat,\n           \
  \               hide_spines=False,\n                          hide_ticks=False,\n\
