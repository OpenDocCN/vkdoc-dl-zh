  img = mpimg.imread(img)\nimgplot = plt.imshow(img)\nplt.show()\n```\n\n这种情况下的输出是图\
  \ 2-3 中显示的图像。\n\n### 数据加载器\n\n既然我们已经探索了数据，现在让我们为训练目的设置数据加载器。在此变体中，我们将不使用数据增强来帮助训练正则化。我们只会将图像调整大小并裁剪为统一的\
  \ 224x224 尺寸。这个图像的起始尺寸并非固定不变；如果需要，你可以使用不同的尺寸。\n\n除了图像的尺寸和裁剪之外，我们还将考虑将图像转换为 PyTorch\
  \ 框架所需的张量。我们将尝试使用均值和标准差对图像进行归一化。如果我们考虑每个图像有三个通道，那么我们需要为一个通道提供三个值。我们需要一组均值和标准差的组合。\n\
  \n代码如下：\n\n```\ntrain_transform = transforms.Compose([\ntransforms.Resize(224),\n\
  transforms.CenterCrop(224),\ntransforms.ToTensor(),\ntransforms.Normalize([0.485,\
  \ 0.456, 0.406],\n[0.229, 0.224, 0.225])\ntest_transform = transforms.Compose([\n\
  transforms.Resize(224),\ntransforms.CenterCrop(224),\ntransforms.ToTensor(),\ntransforms.Normalize([0.485,\
  \ 0.456, 0.406],\n[0.229, 0.224, 0.225])])\ntrain_data = datasets.ImageFolder(os.path.join(data_path,\
  \ 'train'), transform= train_transform)\ntest_data = datasets.ImageFolder(os.path.join(data_path,\
  \ 'test'), transform= test_transform)\ntrain_loader = DataLoader(train_data,\nbatch_size=\
  \ 16, shuffle= True, pin_memory= True)\ntest_loader = DataLoader(test_data,\nbatch_size=\
  \ 1, shuffle= False, pin_memory= True)\nclass_names = train_data.classes\nprint(class_names)\n\
  print(f'Number of train images: {len(train_data)}')\nprint(f'Number of test images:\
  \ {len(test_data)}')\n输出:\n['NORMAL', 'PNEUMONIA']\nTraining images available: 5232\n\
  Testing  images available: 624\n```\n\n我们使用的是 PyTorch 的默认数据加载器。我们将创建两组数据加载器，一组用于训练数据集，另一组用于测试集。批量大小在每种情况下都是可变的，具体取决于系统的\
  \ GPU 和 RAM。我们可以打乱训练数据，因为不需要特定的顺序。对于测试数据，需要关闭打乱功能。\n\n`pin_memory` 参数有助于将先前加载到 CPU\
  \ 的数据集传输到 GPU。启用固定内存时，该过程会更快。\n\n我们使用数据加载器来转换数据中的功能，并在后续的训练函数中使用它们。当图像根据文件夹中的类别名称排列时，通常使用\
  \ `ImageFolder`。\n\n\n\n### 定义模型\n\n我们将使用卷积块定义模型架构，并采用`ReLU`作为激活层。基线模型包含 12 个卷积块，其中包括一个用于设置输入的卷积块和一个用于输出的卷积块。前三个卷积块各有一个最大池化函数，通过过滤信息将图像从高维度降至低维度。\n\
  \n模型定义如下：\n\n```python\nclass Net(nn.Module):\ndef __init__(self):\nsuper(Net, self).__init__()\n\
  # Input Block\nself.convblock1 = nn.Sequential(\nnn.Conv2d(in_channels=3, out_channels=8,\
  \ kernel_size=(3, 3),\npadding=0, bias=False),\nnn.ReLU(),\n#nn.BatchNorm2d(4)\n\
  )\nself.pool11 = nn.MaxPool2d(2, 2)\n# CONVOLUTION BLOCK\nself.convblock2 = nn.Sequential(\n\
  nn.Conv2d(in_channels=8, out_channels=16, kernel_size=(3, 3),\npadding=0, bias=False),\n\
  nn.ReLU(),\n#nn.BatchNorm2d(16)\n)\n# TRANSITION BLOCK\nself.pool22 = nn.MaxPool2d(2,\
  \ 2)\nself.convblock3 = nn.Sequential(\nnn.Conv2d(in_channels=16, out_channels=10,\
  \ kernel_size=(1, 1), padding=0, bias=False),\n#nn.BatchNorm2d(10),\nnn.ReLU()\n\
  )\nself.pool33 = nn.MaxPool2d(2, 2)\n# CONVOLUTION BLOCK\nself.convblock4 = nn.Sequential(\n\
  nn.Conv2d(in_channels=10, out_channels=10, kernel_size=(3, 3), padding=0, bias=False),\n\
  nn.ReLU(),\n#nn.BatchNorm2d(10)\n)\nself.convblock5 = nn.Sequential(\nnn.Conv2d(in_channels=10,\
  \ out_channels=32, kernel_size=(1, 1), padding=0, bias=False),\n#nn.BatchNorm2d(32),\n\
  nn.ReLU(),\n)\nself.convblock6 = nn.Sequential(\nnn.Conv2d(in_channels=32, out_channels=10,\
  \ kernel_size=(1, 1), padding=0, bias=False),\nnn.ReLU(),\n#nn.BatchNorm2d(10),\n\
  )\nself.convblock7 = nn.Sequential(\nnn.Conv2d(in_channels=10, out_channels=10,\
  \ kernel_size=(3, 3), padding=0, bias=False),\nnn.ReLU(),\n#nn.BatchNorm2d(10)\n\
  )\nself.convblock8 = nn.Sequential(\nnn.Conv2d(in_channels=10, out_channels=32,\
  \ kernel_size=(1, 1), padding=0, bias=False),\n#nn.BatchNorm2d(32),\nnn.ReLU()\n\
  )\nself.convblock9 = nn.Sequential(\nnn.Conv2d(in_channels=32, out_channels=10,\
  \ kernel_size=(1, 1), padding=0, bias=False),\nnn.ReLU(),\n#nn.BatchNorm2d(10),\n\
  )\nself.convblock10 = nn.Sequential(\nnn.Conv2d(in_channels=10, out_channels=14,\
  \ kernel_size=(3, 3), padding=0, bias=False),\nnn.ReLU(),\n#nn.BatchNorm2d(14),\n\
  )\nself.convblock11 = nn.Sequential(\nnn.Conv2d(in_channels=14, out_channels=16,\
  \ kernel_size=(3, 3), padding=0, bias=False),\nnn.ReLU(),\n#nn.BatchNorm2d(16),\n\
  )\n# OUTPUT BLOCK\nself.gap = nn.Sequential(\nnn.AvgPool2d(kernel_size=4)\n)\nself.convblockout\
  \ = nn.Sequential(\nnn.Conv2d(in_channels=16, out_channels=2, kernel_size=(4, 4),\
  \ padding=0, bias=False),\n)\ndef forward(self, x):\nx = self.convblock1(x)\nx =\
  \ self.pool11(x)\nx = self.convblock2(x)\nx = self.pool22(x)\nx = self.convblock3(x)\n\
  x = self.pool33(x)\nx = self.convblock4(x)\nx = self.convblock5(x)\nx = self.convblock6(x)\n\
  x = self.convblock7(x)\nx = self.convblock8(x)\nx = self.convblock9(x)\nx = self.convblock10(x)\n\
  x = self.convblock11(x)\nx = self.gap(x)\nx = self.convblockout(x)\nx = x.view(-1,\
  \ 2)\nreturn F.log_softmax(x, dim=-1)\n```\n\n在这种方法中，我们创建了一个`Net`类，它利用 Python 的`super`功能支持多重继承。我们从输入卷积块开始；输入通道数设为\
  \ 3，输出通道数设为 8。这些参数可以调整，但应与架构和核心可用性保持一致。我们使用 3x3 卷积核，因为如前所述，这是最高效的卷积方式之一。在少数几个块中，我们还可以看到\
  \ 1x1 卷积，它通过组合所有特征图来帮助减少 z 方向上的特征图数量。\n\n以下是模型的详细解释：\n\n1.  模型的输入块接收一个三通道的 224x224\
  \ 输入，并使用 3x3 卷积生成 222x222 和八个通道。随后是`ReLU`激活层。此模型架构未使用填充。\n2.  输入之后，我们调用最大池化函数将特征图尺寸减小到\
  \ 111x111。\n3.  池化函数处理特征图后，我们使用 3x3 卷积将特征图从 8 个通道卷积生成 16 个通道，并将特征图尺寸减小到 109x109。\n\
  4.  使用卷积块获得 16 个通道后，我们再次使用最大池化函数将特征图尺寸降至 54x54。\n5.  然后，我们使用一个过渡块（网络中首次使用）将通道数从\
  \ 16 减少到 10，随后再进行一次最大池化。\n6.  完成最大池化且特征图尺寸变为 27x27 后，我们使用 3x3 卷积核进行卷积，并生成相同数量的特征图。\n\
  7.  第五和第六个卷积块是过渡层，我们将层数从 10 增加到 32，再回到 10。和往常一样，这里没有使用填充。\n8.  第七个卷积块用于 3x3 卷积操作，但通道数保持不变。\n\
  9.  第八和第九个卷积块执行类似操作。通过过渡卷积操作，我们将通道数从 10 移动到 32，再回到 10。\n10. 我们添加了一个 3x3 卷积块，这是第十个。我们将特征图数量从\
  \ 10 增加到 14。\n11. 架构的倒数第二个构建块使用 3x3 卷积核将通道数从 14 移动到 16。\n12. 在输出块中，我们使用平均池化将 19x19\
  \ 的特征图缩减为 2x2。这可用于二分类。在平均池化之后，我们使用一个与特征图尺寸相同卷积核的卷积块，将其缩减为单个单元用于输出。\n13. 最后，我们使用对数`softmax`函数生成输出。这是一个缩放后的输出，我们使用`argmax`函数来确定每个批次元素的类别。\n\
  \n出于此架构设计的目的，我们将偏置的添加设置为`false`。这意味着网络中所有神经组件的计算都不会添加偏置。不过，我们可以尝试使用偏置。在大多数情况下，只要数据经过中心化和归一化，偏置对网络的影响不大。\n\
  \n让我们查看模型摘要功能输出的模型签名。如果 GPU 可用，我们也可以将模型放入 GPU 进行处理。\n\n```python\nuse_cuda = torch.cuda.is_available()\n\
  device = torch.device(\"cuda\" if use_cuda else \"cpu\")\nprint(\"Available processor\
  \ {}\".format(device))\nmodel = Net().to(device)\nsummary(model, input_size=(3,\
  \ 224, 224))\nAvailable processor cuda\n```\n\n\n\n```text\nLayer (type)       \
