  ### 定义问题


  我们将借助计算机视觉建模技术检查肺部 X 光图像，并将其分类为患有肺炎或正常。由于这是一个医疗保健问题，最好让模型过度预测。我们需要以最高的准确率进行预测，并且如果可能的话，应达到接近
  100% 的召回率，同时也要有高精确率。我们需要确保诊断出任何可能的感染病例，并且不要因为微小的误差而将受感染的肺部错误分类为健康肺部。通常可以使用 Softmax
  对数几率来确定预测，而不是由 Softmax 函数来决定类别。这是一个基于对数据的经验以及模型行为的关键决策。


  困扰这类图像分类问题的一个主要问题是正确标注数据的可用性。通过卷积神经网络进行图像分类有助于处理多个下游任务。在某个数据上训练的模型可以用于微调其他类似数据，并用于预测目的。有多个开源图像存储库，但对于大多数工业用途而言，它们为我们提供了一个起点。我们还需要使用我们特定任务的图像。




