  ```\n\n这是根据模型设计创建的模型摘要。我们通过输入模型期望的输入维度来计算工作流程，并在此过程中对其进行验证。\n\n我们需要关注模型的可训练参数和不可训练参数，这将是影响我们训练以及投入生产环境的权重量的一个因素。模型大小显示为\
  \ 11.63MB。\n\n### 训练过程\n\n在定义模型和数据加载器之后，我们进入了训练环节。训练过程将包括以下重要步骤：\n\n1.  为模型工作流程初始化梯度。\n\
  \n2.  根据模型当前的权重，从当前模型获取预测结果，即执行前向传播。初始时，权重会使用 Xavier 或 He 初始化方法从一个分布中随机分配。（对于使用\
  \ ReLU 激活函数的网络，使用 He 初始化；而对于使用 sigmoid 的网络，则使用 Xavier 初始化。）\n\n3.  前向传播完成后，计算损失，以衡量预测值与实际值之间的差距。\n\
  \n4.  然后，根据累积的损失计算反向传播。\n\n5.  反向传播损失计算完成后，我们进入优化器步骤，该步骤将使用学习率和其他参数来刷新和更新模型的权重。\n\
  \n以下是准备训练和测试数据的代码：\n\n```python\ntrain_losses = []\ntest_losses = []\ntrain_acc\
  \ = []\ntest_acc = []\ndef train(model, device, train_loader, optimizer, epoch):\n\
  \    model.train()\n    pbar = tqdm(train_loader)\n    correct = 0\n    processed\
  \ = 0\n    for batch_idx, (data, target) in enumerate(pbar):\n        # 获取数据\n \
  \       data, target = data.to(device), target.to(device)\n        # 初始化梯度\n   \
  \     optimizer.zero_grad()\n        # 在 PyTorch 中，梯度会在反向传播过程中累积，尽管这在 RNN 中常用，但通常不用于\
  \ CNN\n        # 或特定需求\n        ## 对数据进行预测\n        y_pred = model(data)\n     \
  \   # 根据预测结果计算损失\n        loss = F.nll_loss(y_pred, target)\n        train_losses.append(loss)\n\
  \        # 反向传播\n        loss.backward()\n        optimizer.step()\n        # 获取对应最大值的对数概率的索引\n\
  \        pred = y_pred.argmax(dim=1, keepdim=True)\n        correct += pred.eq(target.view_as(pred)).sum().item()\n\
  \        processed += len(data)\n        pbar.set_description(desc= f'Loss={loss.item()}\
  \ Batch_id={batch_idx} Accuracy={100*correct/processed:0.2f}')\n        train_acc.append(100*correct/processed)\n\
  \ndef test(model, device, test_loader):\n    model.eval()\n    test_loss = 0\n \
  \   correct = 0\n    with torch.no_grad():\n        for data, target in test_loader:\n\
  \            data, target = data.to(device), target.to(device)\n            output\
  \ = model(data)\n            test_loss += F.nll_loss(output, target, reduction='sum').item()\n\
  \            pred = output.argmax(dim=1, keepdim=True)\n            correct += pred.eq(target.view_as(pred)).sum().item()\n\
  \    test_loss /= len(test_loader.dataset)\n    test_losses.append(test_loss)\n\
  \    print('\\nTest set: Average loss: {:.4f}, Accuracy: {}/{} ({:.2f}%)\\n'.format(\n\
  \        test_loss, correct, len(test_loader.dataset),\n        100. * correct /\
  \ len(test_loader.dataset)))\n    test_acc.append(100. * correct / len(test_loader.dataset))\n\
  ```\n\n这段代码本质上创建了两个函数，可用于训练目的，并根据模型在测试数据上的运行效率对其进行评估。在训练过程中，该代码块还从训练和测试数据中创建了两组准确率和两组损失值。这有助于判断模型的表现如何，并衡量其鲁棒性。\n\
  \n让我们逐行解读这段代码并解析各个步骤：\n\n1.  `train` 函数将模型设置为训练模式。\n\n2.  如果模型在 GPU 上，我们将数据放到 GPU\
  \ 上；如果模型在 CPU 上，则将数据放到 CPU 上。初始化设备可确保训练期间数据和模型位于同一设备上。\n\n3.  每当新批次数据到来时，我们将梯度设置为\
  \ 0，因为 PyTorch 默认会尝试累积梯度，而这对于卷积神经网络来说并不好。梯度累积过程可用于基于时间序列的模型和架构。\n\n4.  我们使用数据加载器生成批量的图像，并将其传递给模型进行训练。\n\
  \n5.  我们从前向传播中计算出预测结果，并将其放入一个变量中。完成后，我们根据模型的预测结果计算损失。\n\n\n\n6.  计算出的损失有助于反向传播，并帮助优化器根据最陡上升/下降的方向更新模型的权重。\n\
  \n7.  预测类别是通过对数`softmax`函数计算得出的，即取索引的最大值并据此计算相应的值。\n\n8.  为了计算测试准确率和损失，我们执行相同的过程，但将模型置于评估模式下。\n\
  \n9.  在根据测试样本计算损失时，我们不会更新权重。\n\n现在我们已经为损失计算、反向传播和权重计算了函数，可以初始化优化器和调度器来开始训练。以下是训练过程的代码：\n\
  \n```\nmodel =  Net().to(device)\noptimizer = torch.optim.SGD(model.parameters(),\
  \ lr=0.01, momentum=0.9)\nscheduler = StepLR(optimizer, step_size=6, gamma=0.5)\n\
  EPOCHS = 15\nfor epoch in range(EPOCHS):\nprint(\"EPOCH:\", epoch)\ntrain(model,\
  \ device, train_loader, optimizer, epoch)\nscheduler.step()\nprint('current Learning\
  \ Rate: ', optimizer.state_dict()[\"param_groups\"][0][\"lr\"])\ntest(model, device,\
  \ test_loader)\n```\n\n我们使用带动量的随机梯度优化器来拟合模型。我们还使用调度器定期更改优化器的学习率。这可以间接帮助更快地收敛。迭代次数也取决于我们想要如何训练模型，以及计算时间是否符合我们的需求。在停止训练过程之前，我们会观察损失函数的饱和情况。\n\
