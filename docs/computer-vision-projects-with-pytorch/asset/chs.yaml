  \ 390。\n\n让我们查看一张来自`NORMAL`文件夹的示例图像，以检查图像的质量和定位。图 2-2 显示了一张来自`NORMAL`训练文件夹的随机 2283x2120\
  \ 图像。由于这是通过`mpimg`生成的，因此在 Jupyter notebook 中显示的颜色会有所不同。您也可以使用另一个命令`cv2.imshow()`来显示图像。\n\
  \n![](img/520381_1_En_2_Fig2_HTML.jpg)\n\n一张正常胸部的低辐射计算机断层扫描 X 光图像，尺寸为 776x1224。\n\
  \n**图 2-2** 来自正常肺部训练数据的示例图像\n\n现在，让我们看一张来自`PNEUMONIA`训练文件夹的示例图像。图 2-3 显示了来自该类别的\
