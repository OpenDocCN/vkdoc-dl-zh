- '# 9. 视频分析


  机器学习之旅始于很久以前的结构化数据，并发展到提取有意义的预测的过程。随着数据的增长，机器学习也开始探索其他数据类型。如今，可以处理的数据类型已没有限制。


  从结构化数据开始，我们开始分析文本数据。我们开始理解文本，并利用文本中的特征进行预测。然后我们也转向了图像。尽管这个过程有时充满挑战，但得益于 GPU 和 TPU
  处理能力的进步，一切开始步入正轨。


  接下来是音频处理。这包括使用频率处理音频，或者将音频转换为文本，然后进行预测。


  所有这些概念的结合被称为*视频分析*。


  现有的视频数据量是巨大的。世界每时每刻都在创造视频内容。娱乐和体育产业依赖视频运行，安全摄像头也在捕捉每一个动作。如图 9-1 所示，仅 YouTube 就有超过
  20 亿用户。想想从视频中产生的数据量。随着我们看到更多的数据，更多的问题将会浮现，人工智能将被用来解决这些问题。


  ![](img/520381_1_En_9_Fig1_HTML.jpg)


  一个条形图显示了 2006 年至 2020 年每月的 YouTube 使用量。随着时间的推移，YouTube 的使用量在增加。2020 年的月活跃用户数最高，达到
  20 亿。2006 年的用户数最低，甚至不到 10 亿。


  图 9-1


  YouTube


  视频内容分析，也称为视频分析，是自动分析视频以检测和确定时空事件的能力。




  '
- "# 问题陈述\n\n在讨论问题陈述之前，我们先列举一些视频分析可能的数据来源。\n\n- YouTube\n- 社交媒体\n- 体育赛事\n- 娱乐行业\n\
  - 安防摄像头\n- 教学平台\n- 手机录像\n\n在当前阶段，视频处理的需求至关重要。面对如此庞大的数据量，人工审核来自监控摄像头等各种来源的视频片段是不可能的。\n\
  \n每个行业都有可以通过视频解决的问题。下面我们来讨论其中的一些用途。\n\n![](img/520381_1_En_9_Fig2_HTML.jpg)\n\n\
  一张桌面和一台平板电脑的照片，正在播放一场足球比赛。视频中有一个足球场、一个球网和球员。在桌面上，足球视频位于软件中央。在平板电脑上，体育视频旁边是软件中的另一组任务。\n\
  \n**图 9-2** 体育视频分析\n\n- 统计商场、零售店等场所的人数\n- 识别视频中个人的年龄和性别等人口统计特征\n- 库存规划，用于货架补货提醒\n\
  - 利用运动检测进行商店安保和监控\n- 停车场用例\n- 人脸识别\n- 行为检测\n- 人员追踪\n- 人群检测\n- 人数统计/人员存在检测\n- 时间管理\n\
  - 区域管理与分析/边界检测\n- 交通控制系统\n- 安保/监控\n- 运动检测\n- 排队管理\n- 居家监控\n- [自动车牌识别](https://viso.ai/deep-learning/automatic-number-plate-recognition-anpr/)\n\
  - 交通监控\n- 车辆计数\n- 体育分析，如图 9-2 所示\n\n我们从列表中挑选了几个用例并加以实现。我们将使用 `PyTorch` 实现以下用例。\n\
  \n- 统计零售店的顾客数量\n- 识别零售店的热点区域\n- 利用运动检测管理安保和监控\n- 识别人口统计特征（年龄和性别）\n\n## 方法\n\n我们将视频作为算法的输入。视频基本上包含两个组成部分：\n\
  \n- 视觉内容或一系列图像\n- 音频\n\n我们需要从视频中提取这些子组件，以便进行处理并解决用例。本项目我们只关注第一个组成部分。一旦根据用例提取出一系列图像，我们就可以使用算法或预训练模型。图\
  \ 9-3 展示了视频分析的解决方案方法。\n\n![](img/520381_1_En_9_Fig3_HTML.jpg)\n\n一个包含两个主要步骤的视频分析解决方案方法示意图：将视频转换为一系列图像和提取音频。另一方面，在视频转换为一系列图像之后，还有一个额外的步骤，即图像处理。\n\
  \n**图 9-3** 解决方案方法\n\n最后一个部分，即图像处理，可以包含与视频分析相关的各种任务。\n\n- **图像分类：** 对从视频中提取的图像进行分类。例如，识别视频中人物的性别。\n\
  - **目标检测：** 检测图像中的目标。例如，检测停车场中的汽车。\n- **目标跟踪：** 检测到目标后，识别目标的运动轨迹。\n- **分割：** 生成边界框以识别图像中的各种目标。\n\
  \n## 实现\n\n让我们看看如何实现这些用例。首先需要安装克隆库。我们使用一个基于 `SFNet` 架构的预训练模型。它包含一个基于编码器-解码器的卷积神经网络和带有注意力机制的双路径多尺度融合网络。图\
  \ 9-4 展示了人群样本和热力图。\n\n![](img/520381_1_En_9_Fig4_HTML.jpg)\n\n一张人群照片及其热力图。第一张图片中，人群分散在一个高台上。他们面前是各种非洲半身像。高台后面是一排屏幕栏杆和一盏巨大的灯。第二张图片中，有一个巨大的不规则形状。该形状内部有不同色调的小块区域。\n\
  \n**图 9-4** 人群与热力图\n\n我们还使用 `FaceLib` 库进行人脸检测，这样我们就可以尝试预测年龄和性别。对于图像处理和其他任何操作，我们使用\
  \ `OpenCV`。\n\n```\n# 安装所需包\n!pip install git+https://github.com/sajjjadayobi/FaceLib.git\n\
  !git clone https://github.com/Pongpisit-Thanasutives/Variations-of-SFANet-for-Crowd-Counting\
  \ #仅模型\n# 导入包\nimport cv2\nfrom PIL import Image\nimport pandas as pd\nimport numpy\
  \ as np\n%pylab inline\nimport matplotlib.pyplot as plt\nimport matplotlib.image\
  \ as mpimg\nimport glob\n#import torch\nimport torch\nfrom torchvision import transforms\n\
  #import model\nimport os\nos.chdir('/content/Variations-of-SFANet-for-Crowd-Counting')\n\
  from models import M_SFANet_UCF_QNRF\n#import facelib\nfrom facelib import FaceDetector,\
  \ AgeGenderEstimator\n```\n\n### 数据\n\n我们使用来自 YouTube 的几个视频。下载这些视频并保存在本地。\n\n1.\
  \  这是一个零售店的视频链接。\n    [`https://www.youtube.com/watch?v=KMJS66jBtVQ`](https://www.youtube.com/watch%253Fv%253DKMJS66jBtVQ)\n\
  \n2.  这是一个停车场的视频链接。\n    [`https://www.youtube.com/watch?v=eE2ME4BtXrk`](https://www.youtube.com/watch%253Fv%253DeE2ME4BtXrk)\n\
  \n下载这些视频，然后我们将它们上传到 Google Colab 以进行进一步分析。\n\n### 将所需视频上传到 Google Colab\n\n下一步，我们需要将视频上传到\
  \ Google Colab。\n\n```\n# 上传视频\nfrom google.colab import files\n#上传\nfiles.upload()\n\
  files.upload()\n```\n\n我们还需要上传一个模型权重文件，稍后将用到它。从以下链接下载：[`https://drive.google.com/file/d/1oaXIBVg-dgyqRvEXsYDiJh5GNzP35vO-/view`](https://drive.google.com/file/d/1oaXIBVg-dgyqRvEXsYDiJh5GNzP35vO-/view)\n\
  \n将此模型的权重文件上传到 Colab：\n\n```\nprint('Upload model weights')\nfiles.upload()\n```\n\
  \n### 将视频转换为一系列图像\n\n如前所述，视频分析的核心就是从视频生成帧。其余步骤与图像处理相同。\n\n让我们构建一个函数，输入视频后生成图像。\n\
  \n```\n#生成图像的函数\ndef video_to_image(path, folder):\nglobal exp_fld\n# 导入视频\nvidcap=cv2.VideoCapture(path)\n\
  exp_fld=folder\n# 错误处理\ntry:\nif not os.path.exists(exp_fld):\nos.makedirs(exp_fld)\n\
  except OSError:\nprint ('Error: Creating directory of data')\nCount = 0\nsec = 0\n\
  frameRate = 1 # 视频的秒数\nwhile(True):\nvidcap.set(cv2.CAP_PROP_POS_MSEC,sec*1000)\n\
  hasFrames,image = vidcap.read()\nsec = sec + frameRate\nsec = round(sec, 2)\n# 导出图像\n\
  if hasFrames:\nname='./' + exp_fld +'/frame'+str(Count) + '.jpg'\ncv2.imwrite(name,\
  \ image)     # 将帧保存为 JPG 文件\nCount +=1\nelse:\nbreak\nreturn print(\"Image Exported\"\
  )\n```\n\n### 图像提取\n\n现在，使用我们之前创建的函数为视频生成帧。我们对两个视频都执行此操作。\n\n```\n#设置路径\nos.chdir('/content')\n\
  # 为第一个视频提取并存储图像\nvideo_to_image('HD CCTV Camera video 3MP 4MP iProx CCTV HDCCTVCameras.net\
  \ retail store.mp4', 'crowd')\n# 为停车场视频提取图像\nvideo_to_image('AI Security Camera\
  \ with IR Night Vision (Bullet IP Camera).mp4', 'movement')\nImage Exported\nImage\
  \ Exported\n```\n\n\n\n### 数据准备\n\n现在，让我们执行一些快速的数据准备步骤。与结构化数据相比，在进行图像处理时，准备和清理数据更为简单。这里的关键步骤是调整图像大小。原始图像可以是任意尺寸或像素，但模型总是在特定尺寸上进行训练。因此，我们需要调整输入图像的大小以匹配模型。\n\
  \n以下是调整图像大小的函数。\n\n```\n# 调整图像大小\ndef img_re_sizing(dnst_mp, image):\n# 归一化\ndnst_mp\
  \ = 255*dnst_mp/np.max(dnst_mp)\ndnst_mp= dnst_mp[0][0]\nimage= image[0]\n# 创建空图像\n\
  result_img = np.zeros((dnst_mp.shape[0]*2, dnst_mp.shape[1]*2))\n# 遍历每张图像\nfor i\
  \ in range(result_img.shape[0]):\nfor j in range(result_img.shape[1]):\nresult_img[i][j]\
  \ = dnst_mp[int(i / 2)][int(j / 2)] / 4\nresult_img  = result_img.astype(np.uint8,\
  \ copy=False)\n# 输出\nreturn result_img\n```\n\n现在我们已经完成了视频采集、图像提取和尺寸调整，接下来让我们解决实际用例。\n\
  \n首先，我们来统计顾客数量并生成热力图。我们需要统计这家零售店的顾客数量（见图 9-5）。\n\n![](img/520381_1_En_9_Fig5_HTML.jpg)\n\
  \n一张从安防摄像头拍摄的零售店俯视图。店内设有产品货架。一名女性员工站在收银台后面。一位女士正要离开门口。一位老先生和老太太在收银台附近讨论着什么。一位女士双手扶着门边装有商品的购物篮。\n\
  \n图 9-5\n\n零售店\n\n店铺的收入取决于有多少人光顾。显而易见，人流量越大，购买的可能性就越高。这就是为什么店铺想要了解访客数量，以便预测销售额。许多决策都基于这一信息，例如店铺规模、库存规划等。\n\
  \n### 识别零售店的热点区域\n\n合理摆放库存以最大化购买量至关重要。我们可以利用店内的热点区域来做出这一决策。我们还可以利用这些信息识别热门商品。通过热力图概念，我们可以获取这类信息。热力图会生成顾客停留时间最长的区域，这有助于判断该区域商品的需求量。图\
  \ 9-6 展示了一个热力图示例。\n\n![](img/520381_1_En_9_Fig6_HTML.jpg)\n\n一张零售店热力图的截图。左右两侧各有一排服装货架，中间有两排。服装以不同色块散布在店内。部分色块呈人形。在绿色色块中混杂着一小片红色区域。\n\
  \n图 9-6\n\n热力图\n\n让我们编写几个函数来生成热力图并统计人数。以下函数将接收图像并生成热力图。\n\n```\n# 生成热力图的函数\ndef\
  \ generate_dstys_map(o, dsty, cc, image_location):\n# 定义图形\nfgr_im=plt.fgr_imure()\n\
  # 定义尺寸\ncol = 2\nrws = 1\nX = o\n# 求和\nadd = int(np.sum(dsty))\ndsty = image_re_sizing(dsty,\
  \ o)\n# 添加原始图像和新生成的热力图图像\nfor i in range(1, col*rws +1):\n# 生成原始图像\nif i == 1:\n\
  image = X\nfgr_im.add_subplot(rws, col, i)\n# 设置坐标轴\nplt.gca().set_axis_off()\n\
  plt.margins(0,0)\n# 定位器\nplt.gca().xaxis.set_major_locator(plt.NullLocator())\n\
  plt.gca().yaxis.set_major_locator(plt.NullLocator())\n# 调整子图\nplt.subplots_adjust(top\
  \ = 1, bottom = 0, right = 1, left = 0, hspace = 0, wspace = 0)\n# 显示图像\nplt.imshow(image)\n\
  # 生成密度图像\nif i == 2:\nimage = dsty\nfgr_im.add_subplot(rws, col, i)\n# 设置坐标轴\nplt.gca().set_axis_off()\n\
  plt.margins(0,0)\n# 定位器\nplt.gca().xaxis.set_major_locator(plt.NullLocator())\n\
  plt.gca().yaxis.set_major_locator(plt.NullLocator())\n# 调整子图\nplt.subplots_adjust(top\
  \ = 1, bottom = 0, right = 1, left = 0, hspace = 0, wspace = 0)\n# 添加计数\nplt.text(1,\
  \ 80, 'M-SegNet* 估计值: '+str(add)+', 真实值:'+str(cc), fontsize=7, weight=\"bold\",\
  \ color = 'w')\n# 显示图像\nplt.imshow(image)#, cmap=CM.jet)\n# 带位置信息的图像名称\nimage_nm\
  \ = image_location.split('/')[-1]\nimage_nm = image_nm.replace('.jpg', '_heatpmap.png')\n\
  # 保存图像\nplt.savefgr_im(image_location.split(image_nm)[0]+'seg_'+image_nm, transparent=True,\
  \ bbox_inches='tight', pad_inches=0.0, dpi=200)\n```\n\n以下函数将接收图像作为输入并统计人数。它还会触发我们刚刚创建的热力图函数。最后，它会输出人数、图像密度以及密度图。\n\
  \n```\n# 统计人数\ndef get_count_people(image):\n# 简单预处理。\ntrans = transforms.Compose([transforms.ToTensor(),\n\
  transforms.Normalize([0.485, 0.456, 0.406], [0.229, 0.224, 0.225])\n])\n# 获取图像的高度和宽度\n\
  img = Image.open(image).convert('RGB')\nheight, width = img.size[1], img.size[0]\n\
  height = round(height / 16) * 16\nwidth = round(width / 16) * 16\n# 调整图像大小\nimg_den\
  \ = cv2.resize(np.array(img), (width,height), cv2.INTER_CUBIC)\n# 变换\nimg = trans(Image.fromarray(img_den))[None,\
  \ :]\n# 定义模型\nmodel = M_SFANet_UCF_QNRF.Model()\n# 加载模型\nmodel.load_state_dict(torch.load('/content/best_M-SFANet__UCF_QNRF.pth',\n\
  map_location = torch.device('cpu')))\n# 评估模型\nmodel.eval()\ndnst_mp = model(img)\n\
  # 最终计数\ncount = torch.sum(dnst_mp).item()\n# 返回计数、密度和密度图\nreturn count,img_den,dnst_mp\n\
  ```\n\n至此，我们已经创建了用于统计人数和生成热力图的函数。接下来，让我们将这些函数应用于从视频中提取的图像上。\n\n在此之前，我们先导入图像。\n\n\
