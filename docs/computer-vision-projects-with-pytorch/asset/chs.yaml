  \n原始图像在输入模型前需要进行归一化处理。归一化使用 `TorchVision` 的 `transforms` 模块中的 `transforms.Compose()`\
  \ 和 `transforms.ToTensor()` 类完成。将输入图像放入当前工作目录的 `images` 文件夹中。\n\n```\n# 导入 transforms\
  \ 模块\nfrom torchvision import transforms as T\n# 使用 opencv 读取图像\nimg_path = \"images/image1.JPG\"\
  \nimg = cv2.imread(img_path)\n# 预处理输入图像\ntransform = T.Compose([T.ToTensor()])\n\
  img_tensor = transform(img)\n# 前向传播模型\noutput = pretrained_model([img_tensor])[0]\n\
  print(output.keys())\n#输出\ndict_keys(['boxes', 'labels', 'scores', 'keypoints',\
  \ 'keypoints_scores'])\n```\n\n图 6-14 是我们用作输入的图像。\n\n![](img/520381_1_En_6_Fig14_HTML.jpg)\n\
  \n一张男子在田径椭圆形跑道上呈跑步姿态的照片。他的右臂弯曲肘部向后伸展，左臂弯曲肘部向前伸展，右腿弯曲膝盖向前伸展，左腿向后伸展。\n\n**图 6-14**\
  \ – 输入图像\n\n\n\n### 第 5 步：构建自定义函数以绘制输出\n\n构建自定义函数，用于绘制预测的关键点以及身体骨架（通过连接关键点实现）。\n\
  \n```python\n#Functions to plot keypoints and skeleton of input image\ndef plot_keypoints(img,\
  \ all_keypoints, all_scores, confs, keypoint_threshold=2, conf_threshold=0.9):\n\
  \    # initialize a set of colors from the rainbow spectrum\n    cmap = plt.get_cmap('rainbow')\n\
  \    # create a copy of the image\n    img_copy = img.copy()\n    # pick a set of\
  \ N color-ids from the spectrum\n    color_id = np.arange(1,255, 255//len(all_keypoints)).tolist()[::-1]\n\
  \    # iterate for every person detected\n    for person_id in range(len(all_keypoints)):\n\
  \        # check the confidence score of the detected person\n        if confs[person_id]>conf_threshold:\n\
  \            # grab the keypoint-locations for the detected person\n           \
  \ keypoints = all_keypoints[person_id, ...]\n            # grab the keypoint-scores\
  \ for the keypoints\n            scores = all_scores[person_id, ...]\n         \
  \   # iterate for every keypoint-score\n            for kp in range(len(scores)):\n\
  \                # check the confidence score of detected keypoint\n           \
  \     if scores[kp]>keypoint_threshold:\n                    # convert the keypoint\
  \ float-array to a python-list of intergers\n                    keypoint = tuple(map(int,\
  \ keypoints[kp, :2].detach().numpy().tolist()))\n                    # pick the\
  \ color at the specific color-id\n                    color = tuple(np.asarray(cmap(color_id[person_id])[:-1])*255)\n\
  \                    # draw a cirle over the keypoint location\n               \
  \     cv2.circle(img_copy, keypoint, 30, color, -1)\n    return img_copy\n\ndef\
  \ plot_skeleton(img, all_keypoints, all_scores, confs, keypoint_threshold=2, conf_threshold=0.9):\n\
  \    # initialize a set of colors from the rainbow spectrum\n    cmap = plt.get_cmap('rainbow')\n\
  \    # create a copy of the image\n    img_copy = img.copy()\n    # check if the\
  \ keypoints are detected\n    if len(output[\"keypoints\"])>0:\n        # pick a\
  \ set of N color-ids from the spectrum\n        colors = np.arange(1,255, 255//len(all_keypoints)).tolist()[::-1]\n\
  \        # iterate for every person detected\n        for person_id in range(len(all_keypoints)):\n\
  \            # check the confidence score of the detected person\n            if\
  \ confs[person_id]>conf_threshold:\n                # grab the keypoint-locations\
  \ for the detected person\n                keypoints = all_keypoints[person_id,\
  \ ...]\n                # iterate for every limb\n                for conn_id in\
  \ range(len(connections)):\n                    # pick the start-point of the limb\n\
  \                    limb_loc1 = keypoints[connections[conn_id][0], :2].detach().numpy().astype(np.int32)\n\
  \                    # pick the start-point of the limb\n                    limb_loc2\
  \ = keypoints[connections[conn_id][1], :2].detach().numpy().astype(np.int32)\n \
  \                   # consider limb-confidence score as the minimum keypoint score\
  \ among the two keypoint scores\n                    limb_score = min(all_scores[person_id,\
  \ connections[conn_id][0]], all_scores[person_id, connections[conn_id][1]])\n  \
  \                  # check if limb-score is greater than threshold\n           \
  \         if limb_score> keypoint_threshold:\n                        # pick the\
  \ color at a specific color-id\n                        color = tuple(np.asarray(cmap(colors[person_id])[:-1])*255)\n\
  \                        # draw the line for the limb\n                        cv2.line(img_copy,\
  \ tuple(limb_loc1), tuple(limb_loc2), color, 25)\n    return img_copy\n```\n\n###\
  \ 第 6 步：在输入图像上绘制输出\n\n使用第 5 步中的自定义函数，将预测的关键点和骨架绘制到原始图像上。\n\n```python\n#Key points\n\
  keypoints_img = plot_keypoints(img, output[\"keypoints\"], output[\"keypoints_scores\"\
  ], output[\"scores\"],keypoint_threshold=2)\ncv2.imwrite(\"output/keypoints-img.jpg\"\
  , keypoints_img)\nplt.figure(figsize=(8, 8))\nplt.imshow(keypoints_img[:, :, ::-1])\n\
  plt.show()\n#Output\n```\n\n图 6-15 展示了带有关键点的图像。\n\n![](img/520381_1_En_6_Fig15_HTML.jpg)\n\
  \n一张照片，拍摄了一名男子在田径椭圆形跑道上摆出跑步姿势。在以下身体部位上绘制了圆点：头部、面部、颈部、左肩、左肘、左腕、右肩、右肘、右腕、下躯干、右大腿、右膝、右踝、左膝和左踝。\n\
  \n**图 6-15** 带有关键点的图像\n\n```python\n#Skeleton\nskeleton_img = plot_skeleton(img,\
  \ output[\"keypoints\"], output[\"keypoints_scores\"], output[\"scores\"],keypoint_threshold=2)\n\
  cv2.imwrite(\"output/skeleton-img.jpg\", skeleton_img)\nplt.figure(figsize=(8, 8))\n\
  plt.imshow(skeleton_img[:, :, ::-1])\nplt.show()\n#plot\n```\n\n图 6-16 展示了以骨架形式呈现的图像。\n\
  \n![](img/520381_1_En_6_Fig16_HTML.jpg)\n\n一张照片，拍摄了一名男子在田径椭圆形跑道上摆出跑步姿势。在以下身体部位上绘制了线条：头部、面部、颈部、左肩、左肘、左腕、右肩、右肘、右腕、下躯干、右大腿、右膝、右踝、左膝和左踝。\n\
  \n**图 6-16** 以骨架形式呈现的图像\n\n以下是我们尝试的其他包含多人的图像结果。您也可以在本书的 Git 链接中找到这些结果。\n\n![](img/520381_1_En_6_Fig18_HTML.png)\n\
  \n一名男子和一名女子在健身房做俯卧撑和旋转动作。他们身体的主要关键点被着色。\n\n**图 6-18** 以骨架形式呈现的图像\n\n![](img/520381_1_En_6_Fig17_HTML.png)\n\
  \n一名男子和一名女子在健身房做俯卧撑和旋转动作。他们身体的主要关键点用圆点突出显示。\n\n**图 6-17** 带有关键点的图像\n\n## 总结\n\n\
  本章探讨了开发姿态估计模型所需的架构和代码详解。该模型在工业界应用广泛。\n\n现在，您是否有信心构建一个充当“虚拟健身教练”的应用程序？鉴于许多人希望拥有家庭健身房，这值得一试。在下一章中，我们将探讨如何对图像进行异常检测。\n\
