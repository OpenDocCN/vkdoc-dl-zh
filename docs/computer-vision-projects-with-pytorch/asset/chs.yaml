- "# Mask R-CNN\n\n在 Faster R-CNN 已有成果的基础上，Mask R-CNN 进一步扩展，能够预测检测对象上的掩码。在 ROI 池化层之后，又增加了两个卷积神经网络来生成掩码。该方法还确立了\
  \ `ROI Align`，有助于更好地将提取的特征与输入对齐，并避免 Faster R-CNN 中曾出现的变形问题。它使用双线性插值来获取输入区域的精确或近乎完美的值。\n\
  \n所有这些目标检测方法中产生的一个重要步骤是锚点框的使用。`YOLO` 在此基础上进行了一些额外的改进，我们将在下文探讨。\n\n## 前提条件\n\n![](img/520381_1_En_3_Fig9_HTML.jpg)\n\
  \n一张两只鸟在飞行的照片。两只鸟都被一个框标记出来。\n\n图 3-8：带有标注的鸟类图像\n\n- **标注。** 在分类问题中，图像需要按照其所属类别进行排序或整理。类似地，在目标检测问题中，图像需要用适当的边界框（通常称为真实标注）进行标记。边界框的作用是提供对象坐标以及所包含类别的信息。图\
  \ 3-8 展示了一个已标注图像的实例，用于训练一个定位鸟类的分类器。通常，标注是手动完成的，有时会进行多次，以获得无偏的真实标注。然而，如果像现在这样只是为了练习，我们可以使用任何开源数据进行实验。\n\
  \n- **首选 GPU。** 在执行需要训练和运行推理的计算机视觉任务时，建议使用支持 CUDA 的 GPU 核心以加快处理速度。\n\n- **安装支持 CUDA\
  \ 的 Torch 框架。** 我们还需要在系统上安装 `PyTorch`，如前一章所述。\n\n## YOLO\n\n对于能够帮助实现实时推理的目标检测算法，一直存在巨大的需求。Faster\
  \ R-CNN 已经非常接近这一目标，它处理了 2000 个边界框预测并超越了传统的计算机视觉方法。与之前的算法相比，它有了显著的改进，但仍有提升空间。\n\n\
  随后出现了革命性的算法 `YOLO`，它能够以每秒 45 帧的速度（在 TITAN X 上）检测对象。早期的模型在训练和预测的不同阶段（如锚点生成层、区域提议层、分类和边界框修正）花费了太多时间。而\
  \ `YOLO` 则试图通过一个卷积神经网络块来同时预测边界框和类别，从而减少计算时间。它采用了一种更通用的训练方式，并从整个图像中考虑信息，而不是将信息拼凑起来。最终，它超越了其他试图实现相同目标的前代算法。\n\
  \n图 3-9 展示了 `YOLO` 的架构，该架构受用于图像分类的 `GoogleNet` 架构启发。输入层的维度为 448x448x3。该网络包含 24 个卷积层和批量最大池化层，以及两个全连接层。\n\
  \n![](img/520381_1_En_3_Fig10_HTML.jpg)\n\n一张示意图，从左到右依次为：一个内部有 7x7 立方体的层，一系列尺寸分别为\
  \ 112x112、56x56、28x28、14x14、7x7 和 7x7 的 6 个层，2 个箭头，竖线，箭头，以及一个尺寸为 7x7 的立方体。方框下方是对应的卷积层维度。只有前\
  \ 4 个层有最大池化层。\n\n图 3-9：YOLO 架构\n\n训练过程相当昂贵，因此从头开始训练一个目标检测模型需要良好的管理。该给定架构的训练通过两种方式进行。首先，模型在\
  \ `ImageNet` 数据上进行训练，使用前 20 个卷积层，并通过平均池化来匹配全连接网络的维度。这个模块训练了一周，达到了 88% 的准确率。\n\n\
  在这个预训练网络的基础上，添加了四个卷积层和两个全连接层，以得到最终的检测对象。输入维度也从 224x224 增加到 448x448，这有助于提升检测能力。最后一层预测分类分数和边界框坐标。边界框的宽度和高度被归一化。\n\
  \n图 3-10 展示了用于优化分类和回归的损失函数。对于五个锚点框中的每一个，都有一个目标性分数、四个对应于归一化边界框的坐标，以及最高的类别概率或分数。这些改进效果不错，但还需要进一步优化。让我们看看第二个版本的更新以及版本\
  \ 3，它曾是最流行的模型之一。\n\n![](img/520381_1_En_3_Fig11_HTML.jpg)\n\n一个方程图示：lambda 下标坐标，S\
  \ 上标 2 求和，B 求和，i 等于 0，j 等于 0，1 对象上标 i j，括号，x 下标 i 减去 x 下标 i，上标 2，加 y 下标 i，减去 y 下标\
  \ 2，上标 2，括号，以及后续方程。\n\n图 3-10：YOLO 损失函数\n\n\n\n## YOLO V2/V3\n\nYOLO 的改进非常显著，第二个版本将方法微调到了更高效的层面。以下是第二版中解决的一些关键点：\n\
  \n-   卷积层深度较大，因此始终存在梯度消失或梯度爆炸的风险。添加了批归一化以帮助解决学习过程中的内部协变量偏移。\n-   它为每个锚框预测类别和物体置信度。\n\
  -   网络还预测五个边界框以及每个边界框的五个坐标。\n-   一个重大的架构变化是移除了全连接层，并用锚框来预测边界框。\n-   这些锚框是通过对真实边界框进行聚类来确定的。\n\
  \n即使在多次修改之后，研究人员发现还可以进行一些更改来提高准确率。他们进行了必要的修改，并将此版本命名为 YOLO V3。它可以说是最受欢迎的目标检测架构之一。YOLO\
  \ 使用 `softmax` 层来获取最终的分类分数，而 YOLO V3 则采用对输入进行独立的逻辑回归或多标签分类。有趣的是，它还移除了池化层，转而使用步长为\
  \ `2` 的 `3x3` 卷积来降低维度。\n\n该架构还对损失函数进行了修改，产生了三个主要的预测输出——边界框的坐标、物体置信度值和类别分数。YOLO V3\
  \ 架构中最流行的骨干网络是 `Darnet-53`，这是一个由卷积块组成的 53 层架构，如图 3-11 所示。它使用带有 `3x3` 和 `1x1` 卷积层的残差实现来获取用于检测和分类的特征。总体而言，这些更改对架构的准确率和优化产生了巨大影响。\n\
