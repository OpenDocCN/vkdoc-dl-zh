  \      writer.add_scalar(\"Train_Adversarial/D_SR2\", dis_sr2, iteration)\n```\n\
  \n最终，我们将处理一个验证模块，将生成器和对抗网络整合在一起。\n\n以下代码将所有内容整合到主函数中，并运行整个训练序列：\n\n```python\ndef\
  \ main() -> None:\n    ## 创建目录\n    ## 构建训练和验证数据集路径\n    ## 检查训练条件\n    ## 检查是否可恢复训练\n\
  \    if not os.path.exists(exp_dir1):\n        os.makedirs(exp_dir1)\n    if not\
  \ os.path.exists(exp_dir2):\n        os.makedirs(exp_dir2)\n    train_dataset =\
  \ BaseDataset(train_dir, image_size, upscale_factor, \"train\")\n    train_dataloader\
  \ = DataLoader(train_dataset, batch_size, True, pin_memory=True)\n    valid_dataset\
  \ = BaseDataset(valid_dir, image_size, upscale_factor, \"valid\")\n    valid_dataloader\
  \ = DataLoader(valid_dataset, batch_size, False, pin_memory=True)\n    if resume:\n\
  \        ## 用于恢复训练\n        if resume_p_weight != \"\":\n            generator.load_state_dict(torch.load(resume_p_weight))\n\
  \        else:\n            discriminator.load_state_dict(torch.load(resume_d_weight))\n\
  \            generator.load_state_dict(torch.load(resume_g_weight))\n    best_psnr_val\
  \ = 0.0\n    for epoch in range(start_p_epoch, p_epochs):\n        train_generator(train_dataloader,\
  \ epoch)\n        psnr_val = validate(valid_dataloader, epoch, \"generator\")\n\
  \        best_condition = psnr_val > best_psnr_val\n        best_psnr_val = max(psnr_val,\
  \ best_psnr_val)\n        torch.save(generator.state_dict(), os.path.join(exp_dir1,\
  \ f\"p_epoch{epoch + 1}.pth\"))\n        if best_condition:\n            torch.save(generator.state_dict(),\
  \ os.path.join(exp_dir2, \"p-best.pth\"))\n        ## 保存最佳模型\n        torch.save(generator.state_dict(),\
  \ os.path.join(exp_dir2, \"p-last.pth\"))\n    best_psnr_val = 0.0\n    generator.load_state_dict(torch.load(os.path.join(exp_dir2,\
  \ \"p-best.pth\")))\n    for epoch in range(start_epoch, epochs):\n        train_adversarial(train_dataloader,\
  \ epoch)\n        psnr_val = validate(valid_dataloader, epoch, \"adversarial\")\n\
  \        best_condition = psnr_val > best_psnr_val\n        best_psnr_val = max(psnr_val,\
  \ best_psnr_val)\n        torch.save(discriminator.state_dict(), os.path.join(exp_dir1,\
  \ f\"d_epoch{epoch + 1}.pth\"))\n        torch.save(generator.state_dict(), os.path.join(exp_dir1,\
  \ f\"g_epoch{epoch + 1}.pth\"))\n        if best_condition:\n            torch.save(discriminator.state_dict(),\
  \ os.path.join(exp_dir2, \"d-best.pth\"))\n            torch.save(generator.state_dict(),\
  \ os.path.join(exp_dir2, \"g-best.pth\"))\n        d_scheduler.step()\n        g_scheduler.step()\n\
  \    torch.save(discriminator.state_dict(), os.path.join(exp_dir2, \"d-last.pth\"\
  ))\n    torch.save(generator.state_dict(), os.path.join(exp_dir2, \"g-last.pth\"\
  ))\n```\n\n至此，我们完成了代码部分，接下来可以了解如何运行它。代码块应如图 8-7 所示。完成后，我们将进入下一节，介绍如何运行应用程序。\n\n\
