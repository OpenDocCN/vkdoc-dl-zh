  \ 1), (1, 1), bias=False),\n            nn.BatchNorm2d(channels)\n        )\n  \
  \  def forward(self, x: Tensor) -> Tensor:\n        identity = x\n        output\
  \ = self.rc_block(x)\n        output = output + identity\n        return output\n\
