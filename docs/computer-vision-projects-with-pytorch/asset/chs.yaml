  \    ax.grid(False)\n    if cmap is None:\n        cmap = plt.cm.Blues\n    if figsize\
  \ is None:\n        figsize = (len(conf_mat)*1.25, len(conf_mat)*1.25)\n    if show_normed:\n\
  \        matshow = ax.matshow(normed_conf_mat, cmap=cmap)\n    else:\n        matshow\
  \ = ax.matshow(conf_mat, cmap=cmap)\n    if colorbar:\n        fig.colorbar(matshow)\n\
  \    for i in range(conf_mat.shape[0]):\n        for j in range(conf_mat.shape[1]):\n\
