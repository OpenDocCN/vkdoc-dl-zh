  \ eps=0.0)\n(relu): ReLU(inplace=True)\n)\n)\n(layer2): Sequential(\n(0): Bottleneck(\n\
  (conv1): Conv2d(256, 128, kernel_size=(1, 1), stride=(1, 1), bias=False)\n(bn1):\
