  \n假设我们要微调（训练）最后三层：\n\n```python\nfor param in model.parameters():\n    param.requires_grad\
  \ = False\n```\n\n现在，我们仍然可以运行模型的前向和反向传播，但不会更新参数。在接下来的步骤中，我们将微调最后三层。\n\n```python\n\
  model.classifier[1].requires_grad = True\nmodel.classifier[3].requires_grad = True\n\
  ```\n\n对于最后一层，由于类别标签数量与 ImageNet 不同，我们将输出层替换为自定义的输出层：\n\n```python\nmodel.classifier[6]\
  \ = torch.nn.Linear(4096, 2)\n```\n\n\n\n### 第 8 步：训练模型\n\n以下是训练过程：\n\n```\ndef\
  \ find_acc_metric(input_model, input_data_ldr, dvc):\n    with torch.no_grad():\n\
  \        correct_pred, num_examples = 0, 0\n        for i, (features, targets) in\
  \ enumerate(input_data_ldr):\n            features = features.to(dvc)\n        \
  \    targets = targets.float().to(dvc)\n            preds = input_model(features)\n\
  \            _, predicted_labels = torch.max(preds, 1)\n            num_examples\
  \ += targets.size(0)\n            correct_pred += (predicted_labels == targets).sum()\n\
  \        return correct_pred.float()/num_examples * 100\n\ndef mdl_training(model,\
  \ epch_nmbr, train_loader,\n                 valid_loader, test_loader, optimizer,\n\
  \                 device, logging_interval=50,\n                 scheduler=None,\n\
  \                 scheduler_on='valid_acc'):\n    tme_strt = time.time()\n    list_from_loss,\
  \ accuracy_train, accuracy_validation = [], [], []\n    for epoch in range(epch_nmbr):\n\
  \        model.train()\n        for batch_idx, (features, targets) in enumerate(train_loader):\n\
  \            features = features.to(device)\n            targets = targets.to(device)\n\
  \            preds = model(features)\n            loss = torch.nn.functional.cross_entropy(preds,\
  \ targets)\n            optimizer.zero_grad()\n            loss.backward()\n   \
  \         optimizer.step()\n            list_from_loss.append(loss.item())\n   \
  \         if not batch_idx % logging_interval:\n                print(f'Epoch: {epoch+1:03d}/{epch_nmbr:03d}\
  \ '\n                      f'| Batch {batch_idx:04d}/{len(train_loader):04d} '\n\
  \                      f'| Loss: {loss:.4f}')\n        model.eval()\n        with\
  \ torch.no_grad():\n            train_acc = find_acc_metric(model, train_loader,\
  \ device=device)\n            valid_acc = find_acc_metric(model, valid_loader, device=device)\n\
  \            print(f'Epoch: {epoch+1:03d}/{epch_nmbr:03d} '\n                  f'|\
  \ Train: {train_acc :.2f}% '\n                  f'| Validation: {valid_acc :.2f}%')\n\
  \            accuracy_train.append(train_acc.item())\n            accuracy_validation.append(valid_acc.item())\n\
  \        tr_time = (time.time() - tme_strt)/60\n        print(f'Time tr_time: {tr_time:.2f}\
  \ min')\n        if scheduler is not None:\n            if scheduler_on == 'valid_acc':\n\
  \                scheduler.step(accuracy_validation[-1])\n            elif scheduler_on\
  \ == 'minibatch_loss':\n                scheduler.step(list_from_loss[-1])\n   \
  \         else:\n                raise ValueError(f'Invalid `scheduler_on` choice.')\n\
  \    tr_time = (time.time() - tme_strt)/60\n    print(f'Final Training Time: {tr_time:.2f}\
  \ min')\n    test_acc = find_acc_metric(model, test_loader, device=device)\n   \
  \ print(f'Test accuracy {test_acc :.2f}%')\n    return list_from_loss, accuracy_train,\
  \ accuracy_validation\n```\n\n### 第 9 步：评估模型\n\n```\ndef Viz_acc(acc_training, val_acc,\
