  class ContentLoss(nn.Module):\n    ## 定义内容损失类\n    ## 特征提取器 - 至第 36 层\n    def __init__(self)\
  \ -> None:\n        super(ContentLoss, self).__init__()\n        ## 使用预训练的 VGG 模型提取特征\n\
