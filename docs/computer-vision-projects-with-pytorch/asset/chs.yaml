  \        ax.axes.get_xaxis().set_ticks([])\n    plt.xlabel('predicted label')\n\
  \    plt.ylabel('true label')\n    return fig, ax\n\nmat = conf_matrix(model=model,\
  \ data_loader=test_loader_cln, device=torch.device('cpu'))\nplot_confusion_matrix(mat,\
  \ class_names=class_dict.values())\nplt.show()\n```\n\n输出结果如图 7-4 所示。\n\n![](img/520381_1_En_7_Fig4_HTML.jpg)\n\
  \n该图展示了混淆矩阵。x 轴标记为“预测标签”，y 轴标记为“真实标签”。两个轴上的值分别为“异常”和“干净”。按顺时针方向的值依次为：15、0、48 和 0。\n\
  \n**图 7-4** 混淆矩阵\n\n## 方法 2：使用自编码器\n\n构建一个自编码器训练网络，该网络包含以下部分：\n\n*   **编码器**：对原始图像进行编码（基于像素值）。\n\
  *   **解码器**：根据编码器的输出重建图像。\n\n评估原始图像与重建图像之间的模型。基于误差度量分数，检测出最异常的图像。\n\n以下是五个实现步骤：\n\
  \n1.  步骤 1：准备数据集对象。\n2.  步骤 2：构建自编码器网络。\n3.  步骤 3：训练自编码器网络。\n4.  步骤 4：基于原始数据计算重建损失。\n\
  5.  步骤 5：基于误差度量分数选择最异常的图像。\n\n### 步骤 1：准备数据集对象\n\n加载 `input.csv` 文件。`input.csv`\
  \ 文件中的每条记录包含 65 个值。前 64 个值表示手写数字的灰度像素值。最后一个值表示数字的原始类别，其范围在 0 到 9 之间。\n\n将 CSV 数据记录转换为张量。之后，对像素值和原始类别数据进行归一化。\n\
  \n```\n# 步骤 1\n# 准备数据集对象\nprint(\"\\n 加载 CSV 数据，转换为归一化张量数据 \")\n# 加载包含 65 个值的 .csv\
  \ 数据集\n# 前 64 个值表示 64 个灰度格式的像素值\n# 最后 1 个值表示实际数字（范围在 0 到 9 之间）\ncsv_data = \"hand_written_digits.txt\"\
  \n# 使用辅助函数 \"tensor_converter\" 将 CSV 格式转换为归一化张量\ntensor_data = tensor_converter(csv_data)\n\
  ```\n\n### 步骤 2：构建自编码器网络\n\n这里我们构建自编码器网络，该网络包含编码器和解码器架构。\n\n*   编码器将原始数字像素值转换为更低维度的空间。（例如，它将\
  \ 64 个灰度像素值转换为 8 个值。）\n*   解码器从低维度重建原始数字。（例如，它使用 8 个值重建 64 像素的灰度图像。）\n\n在此问题陈述中，编码和解码过程均使用全连接层。编码网络使用三个全连接（FC）层构建，其中第一个\
  \ FC 层将 65 个值（64+1）转换为 48 个，第二个层将 48 个值转换为 32 个。最后一层将 32 个值转换为 8 个。编码过程 ——> 65–48-32-8。\n\
  \n解码网络使用三个全连接层构建，其中第一个层将 8 个值转换为 32 个，第二个 FC 层将 32 个值转换为 48 个。最后一层将 48 个值转换为 65\
  \ 个。解码过程 ——> 8-32-48-65。\n\n```\ndef __init__(self):\n    super(Autoencoder, self).__init__()\n\
  \    self.fc1 = T.nn.Linear(65, 48)\n    self.fc2 = T.nn.Linear(48, 32)\n    self.fc3\
  \ = T.nn.Linear(32, 8)\n    self.fc4 = T.nn.Linear(8, 32)\n    self.fc5 = T.nn.Linear(32,\
  \ 48)\n    self.fc6 = T.nn.Linear(48, 65)\n\ndef encode(self, x):\n    # 65-48-32-8\n\
  \    z = T.tanh(self.fc1(x))\n    z = T.tanh(self.fc2(z))\n    z = T.tanh(self.fc3(z))\n\
  \    return z\n\ndef decode(self, x):\n    # 8-32-48-65\n    z = T.tanh(self.fc4(x))\n\
  \    z = T.tanh(self.fc5(z))\n    z = T.sigmoid(self.fc6(z))\n    return z\n```\n\
  \n### 步骤 3：训练自编码器网络\n\n使用超参数（如学习率、周期数、批次大小、损失度量和损失优化器）训练自编码器网络。训练时，一个辅助函数会接收自编码器网络、张量数据以及之前指定的所有其他超参数。\n\
  \n```\n# 步骤 3. 训练自编码器模型\nbatch_size = 10\nmax_epochs = 200\nlog_interval = 8\nlearning_rate\
  \ = 0.002\ntrain(autoenc, tensor_data, batch_size, max_epochs, log_interval, learning_rate)\n\
  ```\n\n\n\n### 第 4 步：基于原始数据计算重建损失\n\n通过比较原始手写数字与重建数字来评估训练好的模型。计算并存储图像重建损失：\n\n```\n\
  # 设置自编码器为评估模式\nautoenc.eval()\n# 存储重建的 MSE 损失\nMSE_list = make_err_list(autoenc,\
  \ tensor_data)\n# 根据 MSE 损失从高到低对列表进行排序\nMSE_list.sort(key=lambda x: x[1], reverse=True)\n\
  ```\n\n### 第 5 步：基于误差度量分数选择最异常的数字\n\n基于最高的 MSE 损失，我们需要找出数据集中属于异常的数字。\n\n```\n# 第\
  \ 5 步：显示数据集中最异常的手写数字\nprint(\"数据集中基于最高 MSE 给出的异常数字：\")\n(idx, MSE) = MSE_list[0]\n\
  print(\" 索引 : %4d , MSE : %0.4f\" % (idx, MSE))\ndisplay_digit(tensor_data, idx)\n\
  ```\n\n### 输出\n\n```\n数据集中基于最高 MSE 给出的异常数字：\n索引 :  486 , MSE : 0.1360\n```\n\n输出结果如图\
  \ 7-5 所示。\n\n![](img/520381_1_En_7_Fig5_HTML.jpg)\n\n一张带有数值块的图表。Y 轴表示从 0 到 7 的数字，而\
  \ X 轴表示数值 0、2、4 和 6。数值为近似值。该数据集呈现上升趋势。\n\n**图 7-5** 异常输出\n\n```\ndigit =  7\n```\n\
  \n## 总结\n\n我们使用了 VGG 架构来确定样本图像数据集中的异常。我们逐步讲解了代码，并开发了一个端到端的流程。该模型只需极少的改动即可应用于工业级问题。\n\
