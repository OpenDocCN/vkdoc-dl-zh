  \ 和 `validate.py`。其中 `train.py` 被高亮显示。\n\n**图 8-7** 代码开发模板\n\n## 运行应用程序\n\n要运行应用程序，我们首先需要将数据集下载到相应目录，或通过配置脚本将数据目录映射到训练函数。配置脚本非常重要，因为它将所有脚本和路径绑定在一起，帮助应用程序理解所需内容。\n\
