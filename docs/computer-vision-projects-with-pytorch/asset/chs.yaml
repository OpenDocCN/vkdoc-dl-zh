  red = np.zeros_like(mask_conf).astype(np.uint8)\nred[mask_conf == 1], green[mask_conf\
  \ == 1], blue[mask_conf == 1] = colour_option[random.randrange(0,10)]\nmask_color\
  \ = np.stack([red, green, blue], axis=2)\nreturn mask_color\ndef generate_prediction(image_path,\
  \ conf):\n## helper function to generate predictions\nimage = Image.open(image_path)\n\
  transform = T.Compose([T.ToTensor()])\nimage = transform(image)\nimage = image.to(device)\n\
  predicted = final_model([image])\npredicted_score = list(predicted[0][’scores’].detach().cpu().numpy())\n\
  predicted_temp = [predicted_score.index(x) for x in predicted_score if x>conf][-1]\n\
  masks = (predicted[0][’masks’]>0.5).squeeze().detach().cpu().numpy()\n# print(pred[0][’labels’].numpy().max())\n\
  predicted_class_val = [CLASSES[i] for i in list(predicted[0]['labels'].cpu().numpy())]\n\
  predicted_box_val = [[(i[0], i[1]), (i[2], i[3])] for i in list(predicted[0]['boxes'].detach().cpu().numpy())]\n\
  masks = masks[:predicted_temp+1]\npredicted_class_name = predicted_class_val[:predicted_temp+1]\n\
  predicted_box_score = predicted_box_val[:predicted_temp+1]\nreturn masks, predicted_box_score,\
  \ predicted_class_name\ndef segment_image(image_path, confidence=0.5, rect_thickness=2,\
  \ text_size=2, text_thickness=2):\nmasks_conf, box_conf, predicted_class = generate_prediction(image_path,\
  \ confidence)\nimage = cv2.imread(image_path)\nimage = cv2.cvtColor(image, cv2.COLOR_BGR2RGB)\n\
  for i in range(len(masks_conf)):\nrgb_mask = get_mask_color(masks_conf[i])\nimage\
  \ = cv2.addWeighted(image, 1, rgb_mask, 0.5, 0)\ncv2.rectangle(image, box_conf[i][0],\
  \ box_conf[i][1],color=(0, 255, 0), thickness=rect_thickness)\ncv2.putText(image,predicted_class[i],\
  \ box_conf[i][0], cv2.FONT_HERSHEY_SIMPLEX, text_size, (0,255,0),thickness=text_thickness)\n\
  plt.figure(figsize=(20,30))\nplt.imshow(image)\nplt.xticks([])\nplt.yticks([])\n\
  plt.show()\nsegment_image('/content/pedestrian_img.jpg', confidence=0.7)\n```\n\n\
  ## 总结\n\n本章讨论了图像分割的工作原理及其在市场上的不同变体。这是解决涉及图像分割问题的一个重要方面。同时，本章还通过一个示例建立了微调的概念。接下来，这里学到的概念将有助于理解计算机视觉的相关概念。\n\
  \n下一章将探讨如何构建管道，以解决涉及图像相似性的业务问题。\n\n"
- "# 5. 基于图像的搜索与推荐系统\n\n为了留住和获取新客户，尤其是在电子商务领域，客户服务必须做到一流。目前已有数千个电商平台，未来数量只会更多。拥有卓越客户体验的平台才能长期生存。\n\
  \n问题在于，我们如何提供优质的客户服务？提升客户体验的方法有很多。让搜索引擎达到最先进水平，不仅能令客户满意，还能通过交叉销售增加销售额。\n\n利用自然语言处理、深度学习等方法构建搜索引擎和推荐引擎的方式有很多。最新的方向是图像处理。我们可以利用图像处理、深度学习以及预训练模型的力量，创建能够产生出色结果的基于图像的搜索和推荐系统。\n\
  \n## 问题陈述\n\n用户在电商平台搜索时，通常会搜索产品名称和描述。假设你正在寻找一件蓝色 T 恤。你可以使用基本的搜索短语来获取相关结果。但是，假设你喜欢一件在派对上看到某人穿的\
  \ T 恤，它是蓝色的，带有白色条纹，黑色花卉图案和红色领口。这是一个很难搜索的短语，结果也会不尽人意。这正是基于图像的搜索和推荐系统发挥作用的地方。\n\n\
  我们可以不依赖用户的产品描述来提供即时推荐，而是基于图像给出推荐。与文本描述相比，这将捕捉到产品更多的细节，尤其是在时尚品类中。\n\n## 方法与途径\n\n\
  要搜索图像，我们首先需要了解机器如何分析这些图像。我们需要将这些图像转换为数字/向量。一旦完成这一步，解决这个问题就只是时间问题了。\n\n图像可以使用预训练模型以向量或嵌入数据的形式表示。我们可以使用来自\
  \ `PyTorch` 的 `ResNet18` 模型，它将图像转换为嵌入信息或向量，用于本项目。\n\n![](img/520381_1_En_5_Fig1_HTML.png)\n\
  \n图像搜索过程示意图。用户输入一张图像，系统将获取其嵌入向量，同时数据库中已有的图像也会提取其嵌入向量。算法寻找两者之间的相似性，并给出排名、输出或推荐。\n\
  \n**图 5-1** 图像相似性管道流程图\n\n我们的目标是基于输入找到相似的图像。为此，我们需要执行以下步骤，如图 5-1 所示：\n\n1.  **导入现有图像和搜索图像。**\n\
  \n    第一步是将图像加载到工作环境中。我们将使用 `OpenCV` 的功能来实现。\n\n2.  **将图像向量化。**\n\n    加载图像后，它们处于\
  \ `JPG` 格式，Python 无法直接读取。无法基于 `JPG` 图像执行任何任务。因此，为了使图像可理解并适用于我们的算法，我们需要将它们转换为向量或嵌入。为了将图像转换为嵌入，我们使用来自\
  \ `PyTorch` 的 `ResNet`。\n\n3.  **计算相似度分数。**\n\n    有了图像的嵌入格式，我们可以对数据集应用余弦相似度。这将返回一个介于\
  \ 0 和 1 之间的分数，用于确定两张图像的相似程度。接近 1 的值表示图像非常相似，而接近 0 的值表示图像不相似。\n\n4.  **推荐。**\n\n\
  \    基于余弦相似度矩阵，我们对用户提供的索引或输入图像的相似度分数进行排序，并返回前六个或前十个相似项目。\n\n## 实现\n\n现在我们了解了问题是什么以及如何解决它，让我们进入实现环节。\n\
  \n### 数据集\n\n我们将为此用例使用一个著名的 Kaggle 数据集。以下是下载数据集的链接：[`https://www.kaggle.com/paramaggarwal/fashion-product-images-small`](https://www.kaggle.com/paramaggarwal/fashion-product-images-small)\n\
  \n数据集的结构如下：\n\n*   一个名为 `images` 的文件夹，其中包含数据集中所有可用物品的图像。图像名称的格式为 `[id].jpg`，其中 `[id]`\
  \ 是 CSV 文件中提供的物品 ID。\n\n*   一个名为 `styles.csv` 的 CSV 文件，包含十列。\n\n`styles.csv` 中的十列定义如下：\n\
  \n*   `id`：分配给该特定物品的唯一编号\n\n*   `gender`：性别（不必要的偏见，应避免）\n\n*   `masterCategory`：物品所属的主要类别\n\
  \n*   `subCategory`：物品所属的子类别\n\n*   `articleType`：产品类型\n\n*   `baseColor`：产品的基础颜色\n\
  \n*   `season`：适合的季节\n\n*   `year`：物品上传的年份\n\n*   `usage`：物品的使用场景\n\n*   `productDisplayName`：网页上的显示名称\n\
