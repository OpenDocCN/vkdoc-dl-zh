  \ p y 缓存 下划线，小于 注释 工具，倒 V，c f g，设置图标，Yolo v3，自定义 点 c f g，设置图标，Yolo v3，s p p 点 c\
  \ f g，设置图标，Yolo v3，s p p tiny 点 c f g，倒 V，data，小于 images。下方，小于 utils 被框起来。\n\n**图\
  \ 3-12** YOLO 的文件夹结构\n\n### 步骤 1：获取标注数据\n\n当我们想要训练自定义数据时，图像标注是目标检测算法最重要的先决条件之一。它们帮助模型处理分类和回归损失函数。它们包含了手动解析的真实值。有多个开源位置可以让我们标注图像。该工具通常有一个标记器，可以帮助在图像上绘制某种形状的边界框。该程序允许以\
  \ JSON、CSV 或 VOC/COCO 格式下载标注，具体取决于所使用的模型。训练数据和自定义数据应该保持一致。\n\n标注正确且对标注者真实至关重要。由于这是一项手动且重复的任务，因此需要尽可能做到最好。最终，生成的文件应被下载并放置在\
  \ `data` 文件夹中。例如，每张图像可能看起来像这样：\n\n- `0 0.41833333333333333 0.2112676056338028 0.2011111111111111\
  \ 0.2007042253521127`\n- `2 0.43777777777777777 0.3970070422535211 0.11555555555555555\
  \ 0.15669014084507044`\n- `1 0.38722222222222225 0.6813380281690141 0.47 0.4119718309859155`\n\
  \n一旦我们汇总了新文件，我们就可以看到如何更改数据文件。在图 3-12 中，`data` 下的文件夹主要是 `labels` 和 `images`。`images`\
  \ 包含与标注图像同名的原始图像。文本文件需要包含标注信息并放置在 `labels` 中。这可以是文本文件或 JSON。\n\n完成后，我们将检查文件的自定义数据文件，该文件需要更新信息，例如训练和测试文件信息的存储位置。我们需要在此处提供两种信息——标签和图像的路径以及实际图像。自定义数据文件将如下所示：\n\
  \n- `classes=4`\n- `train=data/train.txt`\n- `valid=data/test.txt`\n- `names=data/custom.names`\n\
  \n这提供了关于数据及其位置的相关信息。完成后，我们需要在 `custom.names` 文件中提供类别名称。它将如下所示：\n\n- `hardhat`\n\
  - `vest`\n- `mask`\n- `boots`\n\n此文件将类别名称与前面链接的数字对应起来。如前所述，我们需要包含图像路径的 `train.txt`\
  \ 和 `test.txt` 文件。这些文件应包含运行训练函数的相对路径。\n\n还有其他文件，例如训练和测试形状（`train.shapes` 和 `test.shapes`），它们包含所有文件的形状，我们可以根据输入数据进行更改。\n\
  \n完成所有这些后，我们必须从来源和原始研究人员处下载保存的权重，网址为 [`https://pjreddie.com/darknet/yolo/`](https://pjreddie.com/darknet/yolo/)。根据项目工作者的\
  \ GPU 性能，有多种选项可供选择。权重和配置文件是相互关联的。因此，请务必下载与权重对应的配置文件。通过这些主要步骤，初始设置就完成了。现在我们进入下一个流程。\n\
  \n\n\n### 步骤 2：修复配置文件与训练\n\n另一项重要任务是根据需求和资源修改配置文件。图 3-13 展示了训练和测试配置中的首批改动。其中提供了修改\
  \ `batch`（批次大小）、`width`（宽度）、`height`（高度）、`channels`（通道数）、`momentum`（动量）和 `decay`（衰减）等参数的设置项。\n\
  \n![](img/520381_1_En_3_Fig14_HTML.jpg)\n\n表格包含两个表头：更新后的配置和原始配置。在第一列中，`batch` 和\
  \ `subdivisions` 之前的哈希键被高亮显示，`width` 和 `height` 之后的数字 `08` 也同样被高亮。在下一列中，左侧面板上的数字\
  \ `3`、`4`、`6`、`7`、`8`、`9`、`19`、`20` 和 `22` 被着色，以指示右侧的高亮数字。\n\n**图 3-13** – 训练/测试配置文件的改动\n\
  \n诸如 `learning rates`（学习率）和 `burn-in`（预热）等重要参数也已提供。除了这些改动之外，还有关于 `classes`（类别数）和最终层的修改。由于我们将针对包含\
  \ 80 个类别的原始训练方法进行自定义训练，因此具体情况可能会有所不同。图 3-14 展示了一些必要的改动。如果训练可以在默认的 `coco` 数据集上进行，则可以使用原始的配置文件。\n\
  \n![](img/520381_1_En_3_Fig15_HTML.jpg)\n\n展示了训练流程的更新后配置和原始配置。\n\n**图 3-14** – 训练/推理流程配置所需的改动\n\
  \n配置文件中所有 `classes` 和 `filters` 的实例都需要更改。我们需要将 YOLO 层之前的实例中的 `[filters=255]` 更改为\
  \ `filters=(类别数 + 5)x3`，如第 640 行所示。\n\n完成这些更改后，我们就可以进入训练部分了。只需要运行一个任务。\n\n```\n\
  !python train.py --data $PATH/custom.data --batch $num_batches --cache --epochs\
  \ $num_epochs –nosave\n$num_batches = 批次数量\n$num_epochs = 训练的轮数（请记住这是迁移学习，并且我们已经在使用保存的权重）\n\
  $path = 自定义数据的路径。\n```\n\n如果内存不足，我们可以尝试通过使用更小的已保存模型进行训练来减少模型参数，或者减小批次大小或图像分辨率。选择哪种方法，只要觉得简单且合适即可。\n\
  \n该项目依赖项过多，建议直接参考并使用优化后的代码版本，以节省时间。训练代码、模型代码和配置代码是相互关联的。配置文件直接影响训练过程和模型设置。让我们看看研究人员使用的源代码中用于模型定义的\
  \ Python 代码。\n\n### 模型文件\n\n代码中多次使用了 `torchvision` 和 `torch` 函数的标准导入。`parse` 包用于获取命令行参数。模型文件中出现的第一个函数是\
  \ `create_modules` 函数。让我们了解一些重要步骤，以防出现“从头开始训练”的情况。\n\n```\ndef create_modules(module_defs,\
  \ img_size):\n# 根据 module_defs 中的模块配置构建层块的模块列表\nimg_size = [img_size] * 2 if isinstance(img_size,\
  \ int) else img_size  # 如有必要则展开\n_ = module_defs.pop(0)  # 配置训练超参数（未使用）\noutput_filters\
  \ = [3]  # 输入通道数\nmodule_list = nn.ModuleList()\nrouts = []  # 路由到更深层的层列表\nyolo_index\
  \ = -1\nfor i, mdef in enumerate(module_defs):\nmodules = nn.Sequential()\nif mdef['type']\
  \ == 'convolutional':\nbn = mdef['batch_normalize']\nfilters = mdef['filters']\n\
  k = mdef['size']  # 卷积核大小\nstride = mdef['stride'] if 'stride' in mdef else (mdef['stride_y'],\
  \ mdef['stride_x'])\nif isinstance(k, int):  # 单尺寸卷积\nmodules.add_module('Conv2d',\
  \ nn.Conv2d(in_channels=output_filters[-1],\nout_channels=filters,\nkernel_size=k,\n\
  stride=stride,\npadding=k // 2 if mdef['pad'] else 0,\ngroups=mdef['groups'] if\
  \ 'groups' in mdef else 1,\nbias=not bn))\nelse:  # 多尺寸卷积\nmodules.add_module('MixConv2d',\
  \ MixConv2d(in_ch=output_filters[-1],\nout_ch=filters,\nk=k,\nstride=stride,\nbias=not\
  \ bn))\nif bn:\nmodules.add_module('BatchNorm2d', nn.BatchNorm2d(filters, momentum=0.03,\
  \ eps=1E-4))\nelse:\nrouts.append(i)  # 检测输出（进入 YOLO 层）\nif mdef['activation'] ==\
  \ 'leaky':  # 激活函数研究 https://github.com/ultralytics/yolov3/issues/441\nmodules.add_module('activation',\
  \ nn.LeakyReLU(0.1, inplace=True))\n# modules.add_module('activation', nn.PReLU(num_parameters=1,\
  \ init=0.10))\nelif mdef['activation'] == 'swish':\nmodules.add_module('activation',\
  \ Swish())\nelif mdef['type'] == 'BatchNorm2d':\nfilters = output_filters[-1]\n\
  modules = nn.BatchNorm2d(filters, momentum=0.03, eps=1E-4)\nif i == 0 and filters\
  \ == 3:  # 标准化 RGB 图像\n# imagenet 均值和方差 https://pytorch.org/docs/stable/torchvision/models.html#classification\n\
  modules.running_mean = torch.tensor([0.485, 0.456, 0.406])\nmodules.running_var\
  \ = torch.tensor([0.0524, 0.0502, 0.0506])\nelif mdef['type'] == 'maxpool':\nk =\
  \ mdef['size']  # 卷积核大小\nstride = mdef['stride']\nmaxpool = nn.MaxPool2d(kernel_size=k,\
  \ stride=stride, padding=(k - 1) // 2)\nif k == 2 and stride == 1:  # yolov3-tiny\n\
  modules.add_module('ZeroPad2d', nn.ZeroPad2d((0, 1, 0, 1)))\nmodules.add_module('MaxPool2d',\
  \ maxpool)\nelse:\nmodules = maxpool\nelif mdef['type'] == 'upsample':\nif ONNX_EXPORT:\
  \  # 明确指定大小，避免使用 scale_factor\ng = (yolo_index + 1) * 2 / 32  # 增益\nmodules = nn.Upsample(size=tuple(int(x\
  \ * g) for x in img_size))  # img_size = (320, 192)\nelse:\nmodules = nn.Upsample(scale_factor=mdef['stride'])\n\
  elif mdef['type'] == 'route':  # 'route' 层的 nn.Sequential() 占位符\nlayers = mdef['layers']\n\
  filters = sum([output_filters[l + 1 if l > 0 else l] for l in layers])\nrouts.extend([i\
  \ + l if l < 0 else l for l in layers])\nmodules = FeatureConcat(layers=layers)\n\
  elif mdef['type'] == 'shortcut':  # 'shortcut' 层的 nn.Sequential() 占位符\nlayers =\
  \ mdef['from']\nfilters = output_filters[-1]\nrouts.extend([i + l if l < 0 else\
  \ l for l in layers])\nmodules = WeightedFeatureFusion(layers=layers, weight='weights_type'\
  \ in mdef)\nelif mdef['type'] == 'reorg3d':  # yolov3-spp-pan-scale\npass\nelif\
  \ mdef['type'] == 'yolo':\nyolo_index += 1\nstride = [32, 16, 8, 4, 2][yolo_index]\
  \  # P3-P7 步长\nlayers = mdef['from'] if 'from' in mdef else []\nmodules = YOLOLayer(anchors=mdef['anchors'][mdef['mask']],\
  \  # 锚点列表\nnc=mdef['classes'],  # 类别数\nimg_size=img_size,  # (416, 416)\nyolo_index=yolo_index,\
  \  # 0, 1, 2...\nlayers=layers,  # 输出层\nstride=stride)\n# 初始化前面的 Conv2d() 偏置 (https://arxiv.org/pdf/1708.02002.pdf\
  \ 第 3.3 节)\ntry:\nj = layers[yolo_index] if 'from' in mdef else -1\nbias_ = module_list[j][0].bias\
  \  # shape(255,)\nbias = bias_[:modules.no * modules.na].view(modules.na, -1)  #\
  \ shape(3,85)\nbias[:, 4] += -4.5  # 目标\nbias[:, 5:] += math.log(0.6 / (modules.nc\
  \ - 0.99))  # 类别 (sigmoid(p) = 1/nc)\nmodule_list[j][0].bias = torch.nn.Parameter(bias_,\
  \ requires_grad=bias_.requires_grad)\nexcept:\nprint('警告：智能偏置初始化失败。')\nelse:\nprint('警告：无法识别的层类型：'\
  \ + mdef['type'])\n# 注册模块列表和输出过滤器数量\nmodule_list.append(modules)\noutput_filters.append(filters)\n\
  routs_binary = [False] * (i + 1)\nfor i in routs:\nrouts_binary[i] = True\nreturn\
  \ module_list, routs_binary\n```\n\n\n\n该代码中的关键步骤如下：\n\n1.  初始化一个顺序模型，该模型设置了模型块的上下文。\n\
  2.  模型从命令行接收参数，并获取与批归一化、滤波器、激活函数和卷积相关的变量。\n3.  可以选择将模型保存为 ONNX 版本。\n\n在初始模型定义之后，我们有了\
  \ `YOLOLayer` 类，它使用函数根据接收到的配置来定义模型。让我们看看源研究提供的代码。\n\n```python\nclass YOLOLayer(nn.Module):\n\
  \    def __init__(self, anchors, nc, img_size, yolo_index, layers, stride):\n  \
  \      super(YOLOLayer, self).__init__()\n        self.anchors = torch.Tensor(anchors)\n\
  \        self.index = yolo_index  # 该层在 layers 中的索引\n        self.layers = layers\
  \  # 模型输出层索引\n        self.stride = stride  # 层步长\n        self.nl = len(layers)\
  \  # 输出层数量 (3)\n        self.na = len(anchors)  # 锚框数量 (3)\n        self.nc = nc\
  \  # 类别数量 (80)\n        self.no = nc + 5  # 输出数量 (85)\n        self.nx, self.ny,\
  \ self.ng = 0, 0, 0  # 初始化 x, y 网格点数\n        self.anchor_vec = self.anchors / self.stride\n\
  \        self.anchor_wh = self.anchor_vec.view(1, self.na, 1, 1, 2)\n        if\
  \ ONNX_EXPORT:\n            self.training = False\n            self.create_grids((img_size[1]\
  \ // stride, img_size[0] // stride))  # x, y 网格点数\n\n    def create_grids(self,\
  \ ng=(13, 13), device='cpu'):\n        self.nx, self.ny = ng  # x 和 y 网格大小\n   \
  \     self.ng = torch.tensor(ng)\n        # 构建 xy 偏移量\n        if not self.training:\n\
  \            yv, xv = torch.meshgrid([torch.arange(self.ny, device=device), torch.arange(self.nx,\
  \ device=device)])\n            self.grid = torch.stack((xv, yv), 2).view((1, 1,\
  \ self.ny, self.nx, 2)).float()\n        if self.anchor_vec.device != device:\n\
  \            self.anchor_vec = self.anchor_vec.to(device)\n            self.anchor_wh\
  \ = self.anchor_wh.to(device)\n\n    def forward(self, p, out):\n        ASFF =\
  \ False  # https://arxiv.org/abs/1911.09516\n        if ASFF:\n            i, n\
  \ = self.index, self.nl  # layers 中的索引，层数\n            p = out[self.layers[i]]\n\
  \            bs, _, ny, nx = p.shape  # bs, 255, 13, 13\n            if (self.nx,\
  \ self.ny) != (nx, ny):\n                self.create_grids((nx, ny), p.device)\n\
  \            # 输出和权重\n            # w = F.softmax(p[:, -n:], 1)  # 归一化权重\n     \
  \       w = torch.sigmoid(p[:, -n:]) * (2 / n)  # sigmoid 权重 (更快)\n            #\
  \ w = w / w.sum(1).unsqueeze(1)  # 沿层维度归一化\n            # 加权 ASFF 求和\n         \
  \   p = out[self.layers[i]][:, :-n] * w[:, i:i + 1]\n            for j in range(n):\n\
  \                if j != i:\n                    p += w[:, j:j + 1] * \\\n     \
  \                    F.interpolate(out[self.layers[j]][:, :-n], size=[ny, nx], mode='bilinear',\
  \ align_corners=False)\n        elif ONNX_EXPORT:\n            bs = 1  # 批次大小\n\
  \        else:\n            bs, _, ny, nx = p.shape  # bs, 255, 13, 13\n       \
  \     if (self.nx, self.ny) != (nx, ny):\n                self.create_grids((nx,\
  \ ny), p.device)\n        # p.view(bs, 255, 13, 13) --> (bs, 3, 13, 13, 85)  # (bs,\
  \ anchors, grid, grid, classes + xywh)\n        p = p.view(bs, self.na, self.no,\
  \ self.ny, self.nx).permute(0, 1, 3, 4, 2).contiguous()  # 预测\n        if self.training:\n\
  \            return p\n        elif ONNX_EXPORT:\n            # 避免 ANE 操作的广播\n \
  \           m = self.na * self.nx * self.ny\n            ng = 1 / self.ng.repeat((m,\
  \ 1))\n            grid = self.grid.repeat((1, self.na, 1, 1, 1)).view(m, 2)\n \
  \           anchor_wh = self.anchor_wh.repeat((1, 1, self.nx, self.ny, 1)).view(m,\
  \ 2) * ng\n            p = p.view(m, self.no)\n            xy = torch.sigmoid(p[:,\
  \ 0:2]) + grid  # x, y\n            wh = torch.exp(p[:, 2:4]) * anchor_wh  # 宽度,\
  \ 高度\n            p_cls = torch.sigmoid(p[:, 4:5]) if self.nc == 1 else \\\n   \
  \             torch.sigmoid(p[:, 5:self.no]) * torch.sigmoid(p[:, 4:5])  # 置信度\n\
  \            return p_cls, xy * ng, wh\n        else:  # 推理\n            io = p.clone()\
  \  # 推理输出\n            io[..., :2] = torch.sigmoid(io[..., :2]) + self.grid  # xy\n\
  \            io[..., 2:4] = torch.exp(io[..., 2:4]) * self.anchor_wh  # wh yolo\
  \ 方法\n            io[..., :4] *= self.stride\n            torch.sigmoid_(io[...,\
  \ 4:])\n            return io.view(bs, -1, self.no), p  # 将 [1, 3, 13, 13, 85] 视为\
  \ [1, 507, 85]\n```\n\n这段代码定义了 YOLO 层，使用了初始化，并完美地为训练做好了所有设置。代码的重要部分如下：\n\n1.  `YOLOLayer`\
  \ 使用有用信息进行配置，例如锚框数量、类别数量、输出数量和类别数量。\n2.  代码还在图像上设置了网格，这是锚框所必需的。它还设置了前向传播的参数。\n3.\
  \  它还提供了一个设置 ONNX 模型的条款。\n\n最后，放置了检测模型代码，它使用 `Darknet` 框架为对象检测创建了一个高度优化的工作流程。\n\n\
  \n\n```python\nclass Darknet(nn.Module):\n    # YOLOv3 目标检测模型\n    def __init__(self,\
  \ cfg, img_size=(416, 416), verbose=False):\n        super(Darknet, self).__init__()\n\
  \        self.module_defs = parse_model_cfg(cfg)\n        self.module_list, self.routs\
  \ = create_modules(self.module_defs, img_size)\n        self.yolo_layers = get_yolo_layers(self)\n\
  \        # torch_utils.initialize_weights(self)\n        # Darknet 头部信息 https://github.com/AlexeyAB/darknet/issues/2914#issuecomment-496675346\n\
  \        self.version = np.array([0, 2, 5], dtype=np.int32)  # (int32) 版本信息：主版本号、次版本号、修订号\n\
  \        self.seen = np.array([0], dtype=np.int64)  # (int64) 训练期间已处理的图像数量\n   \
  \     self.info(verbose) if not ONNX_EXPORT else None  # 打印模型描述\n\n    def forward(self,\
  \ x, augment=False, verbose=False):\n        if not augment:\n            return\
  \ self.forward_once(x)\n        else:  # 图像增强（仅用于推理和测试）https://github.com/ultralytics/yolov3/issues/931\n\
  \            img_size = x.shape[-2:]  # 高度，宽度\n            s = [0.83, 0.67]  # 缩放比例\n\
  \            y = []\n            for i, xi in enumerate((x,\n                  \
  \                  torch_utils.scale_img(x.flip(3), s[0], same_shape=False),  #\
  \ 水平翻转并缩放\n                                    torch_utils.scale_img(x, s[1], same_shape=False),\
  \  # 缩放\n                                    )):\n                # cv2.imwrite('img%g.jpg'\
  \ % i, 255 * xi[0].numpy().transpose((1, 2, 0))[:, :, ::-1])\n                y.append(self.forward_once(xi)[0])\n\
  \n            y[1][..., :4] /= s[0]  # 缩放\n            y[1][..., 0] = img_size[1]\
  \ - y[1][..., 0]  # 水平翻转\n            y[2][..., :4] /= s[1]  # 缩放\n            #\
  \ for i, yi in enumerate(y):  # coco small, medium, large =  32\\. ** 2).float()\n\
  \            #     y[i] = yi\n            y = torch.cat(y, 1)\n            return\
  \ y, None\n\n    def forward_once(self, x, augment=False, verbose=False):\n    \
  \    img_size = x.shape[-2:]  # 高度，宽度\n        yolo_out, out = [], []\n        if\
  \ verbose:\n            print('0', x.shape)\n        str = ''\n        # 图像增强（仅用于推理和测试）\n\
  \        if augment:  # https://github.com/ultralytics/yolov3/issues/931\n     \
  \       nb = x.shape[0]  # 批次大小\n            s = [0.83, 0.67]  # 缩放比例\n        \
  \    x = torch.cat((x,\n                           torch_utils.scale_img(x.flip(3),\
  \ s[0]),  # 水平翻转并缩放\n                           torch_utils.scale_img(x, s[1]),\
  \  # 缩放\n                           ), 0)\n\n        for i, module in enumerate(self.module_list):\n\
  \            name = module.__class__.__name__\n            if name in ['WeightedFeatureFusion',\
  \ 'FeatureConcat']:  # 求和，拼接\n                if verbose:\n                    l\
  \ = [i - 1] + module.layers  # 层\n                    sh = [list(x.shape)] + [list(out[i].shape)\
  \ for i in module.layers]  # 形状\n                    str = ' >> ' + ' + '.join(['layer\
  \ %g %s' % x for x in zip(l, sh)])\n                x = module(x, out)  # WeightedFeatureFusion(),\
  \ FeatureConcat()\n            elif name == 'YOLOLayer':\n                yolo_out.append(module(x,\
  \ out))\n            else:  # 直接运行模块，例如 mtype = 'convolutional', 'upsample', 'maxpool',\
  \ 'batchnorm2d' 等\n                x = module(x)\n                out.append(x if\
  \ self.routs[i] else [])\n            if verbose:\n                print('%g/%g\
  \ %s -' % (i, len(self.module_list), name), list(x.shape), str)\n              \
  \  str = ''\n\n        if self.training:  # 训练\n            return yolo_out\n  \
  \      elif ONNX_EXPORT:  # 导出\n            x = [torch.cat(x, 0) for x in zip(*yolo_out)]\n\
  \            return x[0], torch.cat(x[1:3], 1)  # 分数，边界框：3780x80, 3780x4\n     \
  \   else:  # 推理或测试\n            x, p = zip(*yolo_out)  # 推理输出，训练输出\n           \
  \ x = torch.cat(x, 1)  # 拼接 yolo 输出\n            if augment:  # 反增强结果\n        \
  \        x = torch.split(x, nb, dim=0)\n                x[1][..., :4] /= s[0]  #\
  \ 缩放\n                x[1][..., 0] = img_size[1] - x[1][..., 0]  # 水平翻转\n      \
  \          x[2][..., :4] /= s[1]  # 缩放\n                x = torch.cat(x, 1)\n  \
  \          return x, p\n\n    def fuse(self):\n        # 融合整个模型中的 Conv2d + BatchNorm2d\
  \ 层\n        print('正在融合层...')\n        fused_list = nn.ModuleList()\n        for\
  \ a in list(self.children())[0]:\n            if isinstance(a, nn.Sequential):\n\
  \                for i, b in enumerate(a):\n                    if isinstance(b,\
  \ nn.modules.batchnorm.BatchNorm2d):\n                        # 将此 bn 层与之前的 conv2d\
  \ 层融合\n                        conv = a[i - 1]\n                        fused =\
  \ torch_utils.fuse_conv_and_bn(conv, b)\n                        a = nn.Sequential(fused,\
  \ *list(a.children())[i + 1:])\n                        break\n            fused_list.append(a)\n\
  \        self.module_list = fused_list\n        self.info() if not ONNX_EXPORT else\
  \ None  # yolov3-spp 从 225 层减少到 152 层\n\n    def info(self, verbose=False):\n  \
  \      torch_utils.model_info(self, verbose)\n```\n\n这些步骤使用了 `Darknet` 框架，该框架可在\
  \ [`https://pjreddie.com/darknet/`](https://pjreddie.com/darknet/) 获取。它速度快，并且针对计算机视觉问题进行了高度优化。除此之外，模型文件包含配置细节，用于寻找现有权重及其他信息。训练文件包含大部分可配置的细节，包括处理数据路径、配置文件路径以及其他架构细节的设置。它还设置并冻结了已经完成训练的权重，并且只训练那些需要训练和更新的层。至此，我们完成了\
  \ YOLO 的训练过程。\n\n## 总结\n\n目标检测是一个困难的过程，需要同时解决多个任务。它需要针对实时使用进行优化。在本章中，我们探讨了允许模型学习目标分类和定位的机制。\n\
  \n这一切都归结为一个事实：如果允许，机器可以发挥强大的能力来学习约束条件。目标检测算法可以用于日常工作中，包括自动驾驶汽车、交通摄像头、安全无人机以及更多应用场景。\n\
  \n在下一章中，我们将探讨图像分割，这与我们之前讨论的过程类似。图像分割和目标检测经常在相似的场景中使用。\n\n"
- '# 4. 构建图像分割模型


  我们周围的图像具有不同的纹理、图案、形状和大小。它们携带了海量信息，人眼和大脑可以轻松理解这些信息，但计算机却较难理解。图像分割是一类问题，我们试图训练计算机理解图像，以便它们能够分离不同的物体并对相似的物体进行分组。这可以表现为相似的像素强度，或相似的纹理和形状。


  目前已经开发出许多算法并用于图像分割。就像目标检测分离物体一样，图像分割从不太相似的物体中识别出更相似的物体。如果我们考虑诸如 `k-means` 等基本聚类方法中使用的概念，我们就知道数据点是如何在相似数据附近对齐的。


  例如，假设一个碗里放着两种苹果和两种橙子。如果我们观察特征，可以从对可食用数据点进行分类开始。当我们考虑纹理或颜色时，可以将数据点分成两组。当我们把成本作为另一个特征加入时，可以将数据点分成四个簇。同样，这个序列可以帮助我们找出数据点中的不同点或相似点，并按簇进行分组。这在生物医学领域和自动驾驶汽车中非常有用。这仍然是一个活跃的研究领域，并且大多与目标检测框架结合使用。我们将介绍基础知识，然后考虑一些示例。让我们开始吧。




  '
- '# 图像分割


  分割的主观性取决于我们所处理的领域类型。分割主要分为两种：语义分割和实例分割。在进行语义分割时，来自相似物体的像素被视为同一类别，但物体内部没有区分。想象一个实时场景：当高速公路的图像中有多辆汽车时，分割会将所有汽车归为一组，并将这些组与路边或风景区分开来。


  让我们看一个例子。图 4-1a 展示了一条有汽车的高速公路。除了多辆汽车，高速公路旁还有草地和一些树木。


  ![](img/520381_1_En_4_Fig1_HTML.jpg)


  一张长路段的照片，前景有一辆皮卡，后方还有另外三辆汽车。道路两旁长满了草地和树木。


  图 4-1a


  原始输入图像


  现在，考虑从原始输入中提取一个像素块，并将其传递给一个能够对输入中的物体进行分类的卷积神经网络（见图 4-1b）。这将给我们一个输出，比如图中属于汽车的像素块。接下来，我们尝试将中心像素映射到汽车，并像这样遍历整个图像。这将为我们提供图像中的语义分割分离。它将把汽车与树木和道路分开。这里需要注意的重要一点是，所有汽车都属于同一类别。


  ![](img/520381_1_En_4_Fig2_HTML.jpg)


  一张长路段的照片，前景有一辆皮卡，后方还有另外三辆汽车。道路两旁长满了草地和树木。在皮卡的后端有一个蓝色轮廓的黑色方块，旁边有一个指向右侧的箭头，上面写着“像素块”。


  图 4-1b


  从输入中提取像素块


  解决这类问题的另一种方法是运行一个没有下采样的卷积神经网络分类器，并用它来对每个像素进行分类，从而将相似的物体聚类在一起。


  这些方法在需要区分不同类别时效果很好。例如，假设有多辆汽车，我们想对每辆汽车单独分类。在这种情况下，就需要用到实例分割，其中每个像素都被映射到特定的类别，并通过用适当的类别标记像素来分离物体。语义分割的概念可以追溯到图像处理中使用的非学习技术，而实例分割则是一个相对较新的概念。


  当我们开始研究实例分割时，出现的基本方法之一几乎就是 R-CNN 方法的翻版。但我们预测的是分割区域，而不是区域。


  请看图 4-2 中的流程图。图像被传递到一个分割提议网络，该网络生成图像的分割区域。一方面，这些分割区域可以形成一个边界框，并传递给边界框卷积神经网络以生成特征。另一方面，分割区域被接收并应用背景掩码变换。它只取图像的均值，并将物体的背景转换为黑色。一旦分割区域被掩码，它就会被传递给区域卷积神经网络以获取另一组特征。


  ![](img/520381_1_En_4_Fig4_HTML.jpg)


  一张照片，显示一位男士和一位女士在人行道上，背景是建筑物。男士和女士的身体分别被紫色和黄色的轮廓覆盖。两个人物都被绿色框框住。框的上方写着“行人”字样。


  图 4-3


  自定义数据上的输出


  ![](img/520381_1_En_4_Fig3_HTML.png)


  一个流程图从左到右描述如下：一张照片，一个右箭头，一个标有“提议生成”的框，通过箭头连接到“特征提取”（其中包含一张照片和一个标有“CNN 边界框”的框）以及“背景掩码”（其中包含一张照片和一个标有“CNN
  区域”的框）。右侧是“区域分类”和“区域细化”。


  图 4-2


  实例分割流程


  这里我们得到的是边界框图像和网络提取的区域特征的组合。这些特征将被合并，然后根据它们包含的物体实例进行进一步分类。在此之后，还有一个额外的步骤，即细化分割区域。


  这些仅仅是实验性的分割技术设置。其他方法上的改进也已经实现，包括级联网络（类似于 Faster R-CNN）、超列等。


  语义分割和实例分割之间存在多个差异。


  语义分割：


  *   对所有像素进行分类。

  *   使用全卷积模型。

  *   在各种方法中使用下采样，然后使用可学习的上采样技术来重建图像。

  *   如果使用类似 ResNet 的架构，则会使用跳跃连接。


  实例分割：


  *   不仅对每个像素进行分类，还检测实例。

  *   其过程几乎遵循目标检测架构。


  ## PyTorch 的预训练支持


  PyTorch 的发展速度远超其他任何框架。它拥有大量的模块和类。由于它接近 Python，因此更容易适应这个框架。在深度学习领域，普遍倾向于选择 PyTorch
  框架，并利用其丰富的资源来产生有影响力的变革。


  与目标检测一样，分割也属于架构中计算量较大的部分。从头开始训练这些模型并不总是容易或理想的。在 CPU 上训练时间相当长，即使 GPU 能有所帮助，提升也有限。由于所有这些训练过程的限制，我们可能会选择迁移学习技术。这有助于我们利用已经提取到的丰富信息来开展工作。这些模型在多样化的数据集上训练，并且已经泛化，能够处理我们遇到的大多数问题中的变化。让我们深入了解
  `torch` 库中一些出色的模型。




  ### 语义分割


  - **全卷积神经网络。** 如论文所述，全卷积网络在语义分割任务上进行端到端训练。它是一个卷积神经网络模块，后接逐像素预测。

  - **使用空洞卷积进行语义分割（DeepLabV3）。** 在该架构中，通过改变感受野，使用并行的空洞卷积堆叠来捕获多尺度上下文信息。

  - **轻量级缩减版空洞空间金字塔池化（LR-ASPP）。** 这是 `MobileNetV3` 的进阶版本，借助 NAS（神经架构搜索）技术创建而成。


  我们将使用一个预训练模型来评估我们的图像。该模型参数众多，因此在 CPU 或低配置基础设施上运行推理会较慢。如果使用 Colab，我们可以切换到 GPU 作为基础设施支持来运行代码。


  让我们从配置所需的基本 `import` 开始。该模型是预训练的，并放置在 Torchvision 中。我们也将导入该模型。


  ```python

  import numpy as np

  import torch

  import matplotlib.pyplot as plt

  ## torchvision related imports

  import torchvision.transforms.functional as F

  from torchvision.io import read_image

  from torchvision.utils import draw_bounding_boxes

  from torchvision.utils import make_grid

  ## models and transforms

  from torchvision.transforms.functional import convert_image_dtype

  from torchvision.models.segmentation import fcn_resnet50

  ```


  到目前为止，我们导入了 Torch 和 Torchvision 相关的函数。我们需要构建所有可在整个代码中重复使用的工具函数。这是重构代码并消除不必要重复的有效方法。在本例中，我们需要显示图像，因此可以使用一个图像可视化工具。


  ```python

  ## utilities for multiple images

  def img_show(images):

  if not isinstance(images, list):

  ## generalise cast images to list

  images = [images]

  fig, axis = plt.subplots(ncols=len(images), squeeze=False)

  for i, image in enumerate(images):

  image = image.detach() # detached from current DAG, no gradient

  image = F.to_pil_image(image)

  axis[0, i].imshow(np.asarray(image))

  axis[0, i].set(xticklabels=[], yticklabels=[], xticks=[], yticks=[])

  ```


  这段代码接受多张图像或单张图像。它会检查对象是否为列表，如果不是，则将其转换为列表。根据图像的可迭代对象分配坐标轴。图像会从计算图中分离，并且不会为这些变量计算梯度。


  在工具函数之后，让我们获取一张示例图像，并将其配置为用于分割过程。


  ```python

  ## get an image on which segmentation needs to be done

  img1 = read_image("/content/semantic_example_highway.jpg")

  box_car = torch.tensor([ [170, 70, 220, 120]], dtype=torch.float) ## (xmin,ymin,xmax,ymax)

  colors = ["blue"]

  check_box = draw_bounding_boxes(img1, box_car, colors=colors, width=2)

  img_show(check_box)

  ## batch for images

  batch_imgs = torch.stack([img1])

  batch_torch = convert_image_dtype(batch_imgs, dtype=torch.float)

  ```


  需要上传图像并将其放置在可访问的位置。图像中包含多辆汽车，目前我们用一个边界框（`X[min]`、`Y[min]`、`X[max]` 和 `Y[max]`）标记其中一辆。这些值需要调整，以便全卷积网络能够理解物体的存在。最终，图像批次在堆叠输入模型之前会被转换为张量。


  现在，让我们加载模型并准备进行评估。


  ```python

  model = fcn_resnet50(pretrained=True, progress=False)

  ## switching on eval mode

  model = model.eval()

  # standard normalizing based on train config

  normalized_batch_torch = F.normalize(batch_torch, mean=(0.485, 0.456, 0.406), std=(0.229,
  0.224, 0.225))

  result = model(normalized_batch_torch)[''out'']

  ```


  如前所述，`fcn_resnet50` 从仓库中下载，并且已经过训练。模型被设置为评估模式。之前步骤中创建的批次，现在根据训练好的模型配置进行归一化。


  现在是时候将我们的图像输入模型了。


  ```python

  classes = [

  ''__background__'', ''aeroplane'', ''bicycle'', ''bird'', ''boat'', ''bottle'',
  ''bus'',

  ''car'', ''cat'', ''chair'', ''cow'', ''diningtable'', ''dog'', ''horse'', ''motorbike'',

  ''person'', ''pottedplant'', ''sheep'', ''sofa'', ''train'', ’tvmonitor’

  ]

  class_to_idx = {cls: idx for (idx, cls) in enumerate(classes)}

  normalized_out_masks = torch.nn.functional.softmax(result, dim=1)

  car_mask = [

  normalized_out_masks[img_idx, class_to_idx[cls]]

  for img_idx in range(batch_torch.shape[0])

  for cls in (''car'', ''pottedplant'',''bus'')

  ]

  img_show(car_mask)

  ```


  我们定义了包含所有可能类别的列表，并将批次图像结果通过 softmax 层。然后绘制掩码。这个示例展示了我们之前讨论的语义分割的处理流程。它说明了如何获取任意数据并根据模型进行准备。我们加载一个模型，在其上运行推理以获取掩码。


  ### 实例分割


  我们之前处理语义分割是为了生成物体的掩码，然后将它们叠加到原始图像上。但是，实例分割呢？现在我们将了解一些可用于生成掩码的预训练模型。


  用于检测和掩码的模型：


  - **Faster R-CNN。** 这项研究引入了一个区域提议网络，该网络能同时预测物体边界框和与边界框对应的物体性核心分数。它解决了早期论文中存在的瓶颈问题。

  - **Mask R-CNN。** 该过程扩展了 Faster R-CNN，并在图像上执行物体检测和生成掩码。

  - **RetinaNet。** 这篇论文在准确性和速度方面对两阶段检测器进行了一些惊人的改进。它利用*焦点损失*这一新概念来处理所有这些问题。

  - **单次检测器（SSD）。** 该论文解释了如何为默认边界框生成物体性分数，并根据物体对其进行优化。


  这些模型主要基于 COCO 数据集进行训练，能够处理预测任务。


  对于 Faster R-CNN：


  ```python

  x = [torch.rand(3, 300, 400), torch.rand(3, 500, 400)]

  faster_rcnn_model = torchvision.models.detection.fasterrcnn_resnet50_fpn(pretrained=True)

  faster_rcnn_model.eval()

  result = faster_rcnn_model (x)

  ```


  对于 MobileNet：


  ```python

  x = [torch.rand(3, 300, 400), torch.rand(3, 500, 400)]

  mobilenet_model = torchvision.models.detection.fasterrcnn_mobilenet_v3_large_fpn(pretrained=True)

  mobilenet_model.eval()

  result = mobilenet_model(x)

  ```


  对于 RetinaNet：


  ```python

  x = [torch.rand(3, 300, 400), torch.rand(3, 500, 400)]

  retinanet_model = torchvision.models.detection.retinanet_resnet50_fpn(pretrained=True)

  retinanet_model.eval()

  result = retinanet_model(x)

  ```


  对于单次检测器（SSD）：


  ```python

  x = [torch.rand(3, 300, 400), torch.rand(3, 500, 400)]

  ssd_model = torchvision.models.detection.ssd300_vgg16(pretrained=True)

  ssd_model.eval()

  result = ssd_model(x)

  ```


  对于所有这些实例，我们都是从 PyTorch 仓库中提取模型，并使用它来运行推理。




  '
- "# 微调模型\n\n如果我们处理的领域包含研究人员已标注并训练好的类别，使用预训练模型即可获得预测结果。若领域高度相关但缺少精确类别，则可能出现预测偏差。这正是我们为项目进行训练和分类的最重要原因之一。\n\
  \n在本节中，我们将深入解析代码，详细说明微调现有模型以增强其预测能力、适配我们目标所需的步骤。如前所述，图像分割具备超越单纯类别识别的额外能力。\n\n我们将使用的数据集是开源数据集，位于\
  \ [`https://www.cis.upenn.edu/~jshi/ped_html/PennFudanPed.zip`](https://www.cis.upenn.edu/%257Ejshi/ped_html/PennFudanPed.zip)。\n\
  \n该数据集包含行人数据，我们将对其进行微调。多种应用场景将分割结果作为决策依据。在自动驾驶汽车需要瞬间决定行驶方向时，识别行人是一个重要的应用场景。因此，这些模型也需要具备足够高的准确率。\n\
  \n让我们先了解流程所需的基本导入。\n\n项目配置是任何项目中最具决定性的环节之一。在本项目中，我们可以使用 Jupyter notebook 或 Colab\
  \ notebook 进行训练。\n\n首先，我们使用 `wget` 命令从源地址下载数据集。\n\n```\n## 提取交通数据\n!wget https://www.cis.upenn.edu/~jshi/ped_html/PennFudanPed.zip\
  \ .\n!unzip PennFudanPed.zip\n```\n\n感叹号（`!`）帮助 Colab 单元格识别这些命令为 shell 脚本。下载完成后，`unzip`\
  \ 命令解压压缩包。需要注意的是，这些命令基于 Linux，且假设后端操作系统也是 Linux。\n\n将数据集下载到系统后，我们可以运行项目所需的基本 `import`\
  \ 语句。\n\n```\n## 基本导入\nimport os\nimport numpy as np\n## torch 导入\nimport torch\n\
  import torch.utils.data\nfrom torch.utils.data import Dataset\n## torchvision 导入\n\
  import torchvision\nimport torchvision.transforms as T\nfrom torchvision.models.detection.faster_rcnn\
  \ import FastRCNNPredictor\nfrom torchvision.models.detection.mask_rcnn import MaskRCNNPredictor\n\
  ## 图像工具\nfrom PIL import Image\nimport matplotlib.pyplot as plt\n## 代码工具\nimport\
  \ random\nimport cv2\n```\n\n请注意，我们正在导入 Torch 和 Torchvision 相关的包。同时，我们也在获取 MaskRCNN\
  \ 和 FasterRCNN 的预训练模型。现在，让我们导入 PyTorch 的基本训练框架。这将帮助我们扩展函数，避免重写复杂的代码。\n\n```\n##\
  \ 克隆 PyTorch 仓库以建立与原始训练完全相同的目录结构\n!git clone https://github.com/pytorch/vision.git\n\
  %cd vision\n!git checkout v0.3.0\n!cp references/detection/engine.py ../\n!cp references/detection/transforms.py\
  \ ../\n!cp references/detection/utils.py ../\n!cp references/detection/coco_utils.py\
  \ ../\n!cp references/detection/coco_eval.py ../\n```\n\n一旦基本框架准备就绪，我们将复制将要使用的重要\
  \ Python 脚本，例如 `engine`、`transforms`、`utils`、`coco_utils` 和 `coco_eval`。\n\n完成这些导入并确认文件位于我们运行代码的同一基础设施上后，我们可以再运行一些\
  \ `import` 语句。\n\n```\n## 从 PyTorch 仓库导入\nimport utils\nimport transforms as T\n\
  from engine import train_one_epoch, evaluate\n```\n\n这些导入基于 PyTorch 训练框架和脚本中的代码。完成此步骤后，让我们看看创建微调模型所需的自定义数据集类。\n\
  \n```\nclass CustomDataset(Dataset):\ndef __init__(self, dir_path, transforms=None):\n\
  ## 初始化对象属性\nself.transforms = transforms\nself.dir_path = dir_path\n## 从 dir_path\n\
  ## 添加来自 PedMasks 目录的掩码列表\nself.mask_list = list(sorted(os.listdir(os.path.join(dir_path,\
  \ \"PedMasks\"))))\n## 添加来自目录列表的实际图像列表\nself.image_list = list(sorted(os.listdir(os.path.join(dir_path,\
  \ \"PNGImages\"))))\ndef __getitem__(self, idx):\n# 获取图像和掩码\nimg_path = os.path.join(self.dir_path,\
  \ \"PNGImages\", self.image_list[idx])\nmask_path = os.path.join(self.dir_path,\
  \ \"PedMasks\", self.mask_list[idx])\nimage_obj = Image.open(img_path).convert(\"\
  RGB\")\nmask_obj = Image.open(mask_path)\nmask_obj = np.array(mask_obj)\nobj_ids\
  \ = np.unique(mask_obj)\n# 背景具有第一个 ID，因此排除它\nobj_ids = obj_ids[1:]\n# 将掩码分割为二进制\n\
  masks_obj = mask_obj == obj_ids[:, None, None]\n# 边界框\nnum_objs = len(obj_ids)\n\
  bboxes = []\nfor i in range(num_objs):\npos = np.where(masks_obj[i])\nxmax = np.max(pos[1])\n\
  xmin = np.min(pos[1])\nymax = np.max(pos[0])\nymin = np.min(pos[0])\nbboxes.append([xmin,\
  \ ymin, xmax, ymax])\nimage_id = torch.tensor([idx])\nmasks_obj = torch.as_tensor(masks_obj,\
  \ dtype=torch.uint8)\nbboxes = torch.as_tensor(bboxes, dtype=torch.float32)\nlabels\
  \ = torch.ones((num_objs,), dtype=torch.int64)\narea = (bboxes[:, 3] - bboxes[:,\
  \ 1]) * (bboxes[:, 2] - bboxes[:, 0])\niscrowd = torch.zeros((num_objs,), dtype=torch.int64)\n\
  target = {}\ntarget[\"image_id\"] = image_id\ntarget[\"masks\"] = masks_obj\ntarget[\"\
  boxes\"] = bboxes\ntarget[\"labels\"] = labels\ntarget[\"area\"] = area\ntarget[\"\
  iscrowd\"] = iscrowd\nif self.transforms is not None:\nimage_obj, target = self.transforms(image_obj,\
  \ target)\nreturn image_obj, target\ndef __len__(self):\nreturn len(self.image_list)\n\
  ```\n\n创建自定义数据集是将新数据集整合到训练流程中的标准技术。代码中需要关注的重点如下：\n\n- 我们正在扩展 PyTorch 的 `Dataset`\
  \ 类。\n- 我们为类定义了三个重要函数——`initialization`、`get_item` 和 `len`。\n- 我们初始化了变换，这些变换在测试、验证和训练阶段可以不同。\n\
  - 我们定义了边界框。\n- 我们定义了目标。\n\n完成数据集创建后，我们必须根据新数据修改模型。让我们看看相应的代码。\n\n```\ndef modify_model(classes_num):\n\
  # 从 PyTorch 仓库加载已在 COCO 上训练好的模型\nmaskrcnn_model = torchvision.models.detection.maskrcnn_resnet50_fpn(pretrained=True)\n\
  # 识别输入特征数量\nin_features = maskrcnn_model.roi_heads.box_predictor.cls_score.in_features\n\
  # 修改头部\nmaskrcnn_model.roi_heads.box_predictor = FastRCNNPredictor(in_features,\
  \ classes_num)\nin_features_mask = maskrcnn_model.roi_heads.mask_predictor.conv5_mask.in_channels\n\
  hidden_layer = 256\nmaskrcnn_model.roi_heads.mask_predictor = MaskRCNNPredictor(in_features_mask,\n\
  hidden_layer,\nnum_classes)\nreturn maskrcnn_model\n```\n\n这些步骤改变了模型的头部配置。之后，我们将尝试对数据进行变换。这将为训练准备好数据。\n\
  \n\n\n```python\ndef get_transform_data(train):\n    transforms = []\n    # 将 PIL\
  \ 图像转换为 PyTorch 模型所需的张量\n    transforms.append(T.ToTensor())\n    if train:\n  \
  \      # 基础图像增强技术\n        ## 可根据实验需要添加更多方法\n        transforms.append(T.RandomHorizontalFlip(0.5))\n\
  \    return T.Compose(transforms)\n\n# 获取交通数据进行转换\ntrain_dataset = CustomDataset('/content/PennFudanPed',\
  \ get_transform_data(train=True))\ntest_dataset = CustomDataset('/content/PennFudanPed',\
  \ get_transform_data(train=False))\n\n# 训练集与测试集划分\ntorch.manual_seed(1)\nindices\
  \ = torch.randperm(len(train_dataset)).tolist()\ntrain_dataset = torch.utils.data.Subset(train_dataset,\
  \ indices[:-50])\ntest_dataset = torch.utils.data.Subset(test_dataset, indices[-50:])\n\
  \n# 定义训练和验证数据加载器\ntrain_data_loader = torch.utils.data.DataLoader(\n    train_dataset,\
  \ batch_size=2, shuffle=True, num_workers=4,\n    collate_fn=utils.collate_fn)\n\
  test_data_loader = torch.utils.data.DataLoader(\n    test_dataset, batch_size=1,\
  \ shuffle=False, num_workers=4,\n    collate_fn=utils.collate_fn)\n```\n\n在转换数据中需要关注的重点包括：\n\
  \n- 将数据转换为张量，以便在 PyTorch 的有向无环图（DAG）中使用。\n- 对于训练阶段，我们使用转换或增强技术。而对于测试和验证等其他阶段，则不使用任何增强技术。\n\
  - 我们通过之前阶段构建的自定义数据集类来创建训练集和测试集。\n- 定义好自定义数据后，我们将利用它创建可迭代对象，这能直接辅助我们进行训练。\n- 该可迭代对象也被称为*数据加载器*。\n\
  \n创建数据加载器后，即可进入训练环节。我们需要定义训练所需的设备，并设置优化器和学习率调度器。\n\n```python\ndevice = torch.device('cuda')\
  \ if torch.cuda.is_available() else torch.device('cpu')\n# 由于处理的是行人和背景，类别数量为 2\n\
  num_classes = 2\nfinal_model = modify_model(num_classes)\n# 将模型移至 GPU（若可用）或 CPU\n\
  final_model.to(device)\n## 获取 SGD 优化器\nparams = [p for p in final_model.parameters()\
  \ if p.requires_grad]\noptimizer = torch.optim.SGD(params,\n                   \
  \         lr=0.005,\n                            momentum=0.9,\n               \
  \             weight_decay=0.0005)\n# 设置步进学习率\nlr_scheduler = torch.optim.lr_scheduler.StepLR(optimizer,\n\
  \                                               step_size=2,\n                 \
  \                              gamma=0.1)\n```\n\n代码中需要关注的关键点如下：\n\n- 模型所在的设备必须与训练数据所在的设备保持一致。模型与数据之间不应存在跨基础设施的迁移。如果数据量过大无法放入单个\
  \ GPU，则数据批次应与模型位于同一系统中。\n- 设置优化器和学习率调度器。\n- 需要注意的是，在训练复杂网络时，固定学习率无法帮助我们更快或更高效地训练。学习率本身是训练过程中最重要的超参数之一，我们需要谨慎处理。\n\
  \n现在我们已经设置了模型参数，接下来运行几个周期来检查训练过程。\n\n```python\n# 设置训练周期数\nnum_epochs = 5\nfor epoch\
  \ in range(num_epochs):\n    ## 直接使用 PyTorch 辅助函数中的 train_one_epoch\n    # 熟悉微调框架\n\
  \    train_one_epoch(final_model, optimizer, train_data_loader, device, epoch, print_freq=10)\n\
  \    # 更新权重和学习率\n    lr_scheduler.step()\n    # 通过权重变化获取评估结果\n    evaluate(final_model,\
  \ test_data_loader, device=device)\n```\n\n为简单起见，我们仅运行了五个周期，但为了获得更好的结果，建议延长训练时间。训练过程中最重要的环节之一是检查生成的日志。日志应能让我们清晰了解数据如何通过模型运行，以及训练过程如何建立。让我们快速浏览一下各周期生成的日志。\n\
