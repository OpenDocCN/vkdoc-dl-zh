- '# 2. 图像分类


  上一章讨论了计算机视觉中的几个重要概念。还讨论了一些计算机视觉领域的最佳实践，现在是时候将它们付诸实践了。本章为计算机视觉领域的多个应用奠定了基础。我们首先从基本解释开始，说明如何开始使用
  Torch 组件来构建模型、定义损失函数并进行训练。


  需要通过名称识别的对象涉及分类过程。我们在数据科学的所有方面都遇到过涉及分类需求的问题。它可以简单到对手机上的图像进行分类，判断它是山还是海的图片，或者是鸟还是狗。分类是最基本但也是最强大的概念之一。让我们看看计算机视觉模型是如何设置分类的：


  1. 检测边缘

  2. 检测梯度

  3. 识别纹理

  4. 识别模式

  5. 形成对象的部件


