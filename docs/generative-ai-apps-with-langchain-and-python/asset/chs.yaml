- '# 第 5 章 掌握创意内容的提示词


  ## 提示词的组成部分


  提示词模块由三个主要组件组成：


  - 提示模板

  - 示例选择器

  - 输出解析器


  让我们仔细看看这些组件，以及它们如何帮助你创建出色的提示词。


