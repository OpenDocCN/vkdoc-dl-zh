  \ 索引与检索和生成\n3. B. 将转换后的数据转换为称为嵌入的数值表示\n4. B. 文本分割器\n5. B. 缓存嵌入以避免重新计算它们\n6. C. Qdrant\n\
  7. D. 语言模型\n8. B. 文本的数值表示\n9. D. 部分\n10. B. 它们捕获文本的语义含义，以便进行比较和检索。\n\n## 术语表\n\n\
  本术语表提供了本章讨论的与检索增强生成（RAG）和信息检索系统相关的关键技术术语的定义。\n\n**`CacheBackedEmbeddings`**：一个嵌入器的包装器，它将嵌入缓存到键值存储中，使用哈希后的文本作为键来高效地存储和检索嵌入\n\
  \n**`CharacterTextSplitter`**：一个用于根据指定字符或字符集将文本拆分成更小块的类，有助于维护上下文并确保块大小可控\n\n**文档加载器**：一种用于从各种来源（如\
  \ HTML、PDF 或代码文件）加载文档，并将其转换为应用程序可处理格式的工具\n\n**文档**：一个包含一段文本及其关联元数据的容器，用于信息检索系统中的处理和分析\n\
  \n**嵌入**：文本的一种数值表示，捕获其语义含义，允许基于相似性进行比较和检索\n\n**FAISS（Facebook AI 相似性搜索）**：一个用于高效相似性搜索和稠密向量聚类的开源库，常用于实现向量存储\n\
  \n**索引**：组织数据以提高信息检索速度和效率的过程，通常通过创建允许快速搜索和更新的结构来实现\n\n**`JSONLoader`**：一种用于加载 JSON\
  \ 数据并根据 `jq` 模式提取特定信息的工具，适用于处理和分析 JSON 文件\n\n**多向量检索器**：一种为每个文档创建多个向量的检索器，捕获内容的不同方面以提高检索准确性\n\
  \n**父文档检索器**：一种为每个文档索引多个块，并根据其嵌入找到最相似块，然后返回整个父文档以获得全面结果的检索器\n\n**Qdrant**：一个支持异步操作的向量存储，用于信息检索系统中的高效相似性搜索和检索\n\
  \n**RAG（检索增强生成）**：一种将基于检索的方法与大型语言模型相结合的技术，通过检索引入额外上下文来提高生成响应的准确性和相关性\n\n**`RecursiveCharacterTextSplitter`**：一种文本分割器，使用递归方法根据指定的分隔符将文本分成更小的块，确保均匀分布并保持逻辑结构\n\
  \n**检索器**：一种用于根据非结构化查询获取相关文档的工具，有助于在信息检索系统中快速访问信息\n\n**自查询检索器**：一种使用语言模型将用户输入转换为查询字符串和元数据过滤器的检索器，适用于基于元数据而非文本相似性检索文档\n\
  \n**文本嵌入**：文本的向量形式数值表示，用于捕获语义含义并促进信息检索系统中的比较和检索\n\n**文本分割器**：一种用于将文本分成更小块的工具，确保每个块大小可控并保持语义连贯性\n\
  \n**分词**：将文本分解为更小单元（如单词或短语）以供机器学习模型处理的过程\n\n**向量存储**：一种以向量格式存储数据的数据库，允许基于向量比较进行高效的相似性搜索和检索\n\
  \n**向量存储检索器**：一种使用向量存储根据嵌入查找相似文档的检索器，适用于快速简便的检索任务\n\n## 参考文献\n\n这些参考文献为在 LangChain、Pinecone\
  \ 和 OpenAI 技术背景下实现检索增强生成（RAG）系统提供了基础知识。\n\n1. Lewis, P., 等人 (2020). \"Retrieval-Augmented\
  \ Generation for Knowledge-Intensive NLP Tasks.\" arXiv:2005.11401. 这篇研究论文介绍了 RAG\
  \ 模型，并解释了其在知识密集型任务中的架构和性能。\n2. LangChain 文档. \"Question Answering Use Cases.\" [`python.langchain.com/v0.1/docs/use_cases/question_answering/`](https://python.langchain.com/v0.1/docs/use_cases/question_answering/)\
  \ 这份官方文档是关于使用 LangChain 构建问答系统的详细指南。\n3. Pinecone 文档. \"Retrieval-Augmented Generation\
  \ with Pinecone.\" [`www.pinecone.io/learn/retrieval-augmented-generation/`](https://www.pinecone.io/learn/retrieval-augmented-generation/)\
  \ 这是 Pinecone 的文档，讨论了如何使用 Pinecone 的向量数据库进行 RAG。\n4. Kumar, A. (2023). \"Retrieval-Augmented\
  \ Generation (RAG): From Theory to LangChain Implementation.\" [`towardsdatascience.com/retrieval-augmented-generation-rag-from-theory-to-langchain-implementation-4e9bd5f6a4f2`](https://towardsdatascience.com/retrieval-augmented-generation-rag-from-theory-to-langchain-implementation-4e9bd5f6a4f2)\
  \ 这篇文章提供了使用 LangChain 实现 RAG 的实践概述和指南。\n5. OpenAI 帮助中心. \"Retrieval-Augmented Generation\
  \ (RAG) and Semantic Search for GPTs.\" [`help.openai.com/en/articles/8868588-retrieval-augmented-generation-rag-and-semantic-search-for-gpts`](https://help.openai.com/en/articles/8868588-retrieval-augmented-generation-rag-and-semantic-search-for-gpts)\
  \ 这是 OpenAI 关于将 RAG 应用于 OpenAI 模型的资源。\n\n"
- '# 第 8 章：你的第一个智能体应用


  在本章中，我们将探索智能自主智能体，并学习如何使用 LangChain 框架创建它们。我们将从理解智能体的基本概念、关键特征及其思考过程开始。然后，我们将构建一个端到端的智能体应用程序，涵盖从环境设置到实现记忆功能的全部内容。


  在本章中，你将获得使用 LangChain Agent 的实践经验，并学习如何使用其强大的工具和库来创建能够自主感知、推理和采取行动的智能体。


  我将提供逐步指导、代码片段和实际示例，以确保你扎实掌握这些概念，并能在实际场景中应用它们。


  ## 引言


  让我们了解什么是智能体及其思考过程。


  ### 什么是智能体？


  当你手头有任务，并且正在寻找一个智能、自主的应用或工具来为你处理它时，LangChain Agents 将为你解忧！你可以使用智能体来感知其环境、做出决策并采取行动以实现特定目标。在我看来，这是软件开发领域的一次飞跃，潜力巨大。


  ### LangChain 智能体的类型及其能力


  LangChain 提供了多种类型的智能体，专为特定的用例和环境而设计。以下是主要类型：


  1. **通用智能体**：这些是多功能智能体，可以使用不同的工具处理广泛的任务。

  2. **领域特定智能体**：这些智能体专精于特定领域或行业，例如金融、医疗或法律领域。它们拥有针对其特定专业领域量身定制的深入知识和能力。

  3. **模拟智能体**：这些智能体设计用于在模拟环境中运行，通常用于训练、测试或场景规划。它们可以与虚拟世界交互并响应模拟刺激。

  4. **任务特定智能体**：专为特定任务（如文本摘要、问答或代码生成）而设计，表现出色。

  5. **多智能体系统**：这些涉及多个智能体协同工作，通常用于模拟复杂系统或处理错综复杂的多步骤流程。


  智能体的一些关键特性包括：


  1. **自主性**：你可以使用智能体基于 AI 驱动的逻辑和处理的数据，在没有直接人工干预的情况下做出决策并采取行动。

  2. **动态工具选择**：智能体可以通过理解查询需求，动态选择适当的工具，并选择最佳工具来生成全面的响应。

  3. **反应性**：智能体对其环境的变化（例如用户输入或新数据）做出响应。

  4. **目标导向**：智能体可以帮助你实现特定目标或完成任务。

  5. **上下文感知**：LangChain Agents 可以理解问题背后的意图，识别相关信息，并提供针对用户特定需求量身定制的响应。

  6. **集成**：智能体可以与用户、其他智能体、外部系统、工具、API 和数据源进行交互，以提供非常丰富的功能。

  7. **记忆**：LangChain Agents 可以在对话或一系列交互过程中维护上下文并保留信息，以提供连贯且上下文相关的答案。

  8. **自定义和可扩展性**：你可以定义自己的工具、创建自定义智能体类，并扩展现有功能以满足你的特定需求。


  智能体通常通过以下方式工作：


  - **感知**：它们通过传感器、API 或其他数据源收集有关环境的信息。

  - **创建概况**：基于感知到的信息，智能体构建其环境和手头任务的概况或模型。

  - **构建记忆**：智能体积累并组织来自过去行动和交互的信息，创建一个知识库，为未来的决策提供信息。

  - **规划**：利用其概况和记忆，智能体制定实现目标的策略或计划。

  - **推理**：它们分析可用信息、计划和潜在结果，以做出明智的决策。

  - **行动**：基于其推理，智能体执行任务、与用户交互或操纵其环境。

  - **学习**：行动后，智能体根据其行动的结果更新其记忆并完善其决策过程。


  ### 智能体工作流程示例


  考虑一个旨在处理咨询的客户支持智能体。


  **感知**：智能体通过 API 接收一个新的支持工单。它从工单中提取相关详细信息，例如客户姓名、问题描述和之前的交互历史。


  **推理**：智能体用新的工单信息更新其概况。它查看客户过去的交互以了解上下文和之前的问题。智能体通过考虑潜在的解决方案和解决客户问题的最有效方式来规划响应。它根据问题的复杂性决定提供故障排除步骤或将工单升级。


  **行动**：智能体向客户发送包含计划好的故障排除步骤的响应。它记录交互并用新详细信息更新客户概况。如果问题得到解决，智能体关闭工单。如果没有，它提供进一步的帮助或将问题升级给人工客服。


  不过，智能体并不仅限于聊天机器人。它们还可以用于其他场景，例如：


  - **任务自动化**：你可以使用智能体处理重复性任务，如数据输入或文件整理，从而节省时间和精力。

  - **推荐系统**：智能体可以分析用户偏好并提供个性化推荐，改善用户体验。

  - **智能搜索**：你可以使用智能体利用其理解自然语言查询的能力，从庞大的知识库中检索最相关的信息。


  ### 智能体的思考过程


  智能体的一些关键组成部分包括：


  - **工具**：这些赋予智能体与世界交互的能力，无论是搜索网络、执行 Python 代码，还是发送电子邮件。

  - **语言模型（LLM）**：这是智能体的大脑，提供做出决策、理解语言和生成文本所需的推理能力。

  - **提示**：这些是你给智能体的指令。精心设计的提示可以指导智能体的行为，并帮助其专注于正确的工具和行动。


  智能体的优势在于它们抽象了自然语言理解、决策和行动执行的复杂性，使你能够专注于应用程序的更高层次目标。


  它们不仅仅是遵循指令；它们会自己做决定。当你给它们一个任务时，它们会利用可用的工具和资源找出完成该任务的最佳方式。


  让我们用一个例子来说明这一点。假设你给智能体的任务是查找纽约市的当前天气，并以短信形式发送给你的朋友。


  以下是它完成任务的过程。


  **任务**：获取纽约市的天气并以短信形式发送给我的朋友。


  **智能体的思考过程**：智能体开始思考解决问题的过程。


  1. **工具选择**：智能体开始思考可以使用什么工具。然后它发现 `SerpAPI` 工具可以帮助搜索纽约市的天气。

  2. **行动**：智能体使用 `SerpAPI` 工具搜索纽约市的天气。

  3. **结果**：智能体获得结果。

  4. **反思**：智能体评估结果，确定目标是否已达成或是否需要进一步行动。如果需要，它会重复步骤 1-3，直到目标实现。

  5. **更多思考**：智能体开始思考如何将消息发送给朋友。

  6. **智能体**：智能体发现需要一个消息传递工具，然后继续以文本形式发送消息。


  ### 为什么智能体很重要


  智能体为构建应用程序开辟了一个全新的可能性世界。


  使用智能体，你可以创建：


  - **研究助手**：它们超越简单的网络搜索，综合信息并生成有洞察力的报告。

  - **自主编码器**：它们可以根据你的自然语言指令编写、重构或调试代码。

  - **创意协作者**：它们可以帮助你集思广益、撰写故事，甚至创作音乐。


  想象一下，你负责创建一个内容生成系统，该系统可以撰写关于各种主题的引人入胜的文章。与其手动编码流程的每一步，你可以利用智能体来处理繁重的工作。


  以下是智能体如何彻底改变你的生成式 AI 应用程序：


  1. **内容理解**：你可以使用智能体分析输入数据（例如用户提示或现有文章），并提取关键信息来指导内容生成过程。它们可以识别相关主题、情感和风格，以确保生成的内容与期望的输出一致。

  2. **上下文决策**：智能体可以根据输入数据的上下文和应用程序的目标做出智能决策。它们可以根据目标受众和生成内容的目的，确定最合适的内容结构、语气和长度。

  3. **动态内容生成**：借助智能体，你可以创建动态和自适应的内容生成系统。智能体可以与多个组件（如语言模型、知识库和外部 API）交互，以生成符合指定要求的连贯且信息丰富的内容。

  4. **迭代优化**：智能体可以根据预定义标准或用户反馈持续评估和优化生成的内容。它们可以识别需要改进的领域，进行必要的调整，并重新生成内容，直到达到所需的质量水平。


