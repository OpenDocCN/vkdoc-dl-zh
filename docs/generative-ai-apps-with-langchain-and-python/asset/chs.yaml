  4. 执行器在所有级别提供全面的日志记录和可观测性，例如智能体决策和工具调用。它可以将此信息输出到 `stdout` 和/或发送到 LangSmith 以进行进一步分析和可视化。\n\
  \n### 工具与工具包\n\n让我们快速了解一下工具和工具包。\n\n#### 工具\n\n工具是智能体、链或 LLM（大型语言模型）可以用来与世界交互的接口。它们结合了几个基本要素：\n\
  \n1. **工具名称**：一个简洁、描述性的标签，告诉你该工具的功能。\n2. **描述**：对工具用途和功能的简要说明。\n3. **JSON 模式**：工具所需输入的结构化定义。可以将其视为如何正确使用工具的蓝图。\n\
  4. **要调用的函数**：执行工具操作的实际代码。\n5. **标志**：一个标志，用于确定工具的输出是立即可见还是需要进一步处理。\n\n名称、描述和 JSON\
  \ 模式帮助 LLM 理解如何指定所需的操作，而要调用的函数则相当于实际执行该操作。\n\nLangChain 中的工具抽象由两个关键组件组成：\n\n1. **工具的输入模式**：这就像一个蓝图，告诉语言模型（LLM）调用该工具需要哪些参数。提供命名合理且描述清晰的参数至关重要，这样\
  \ LLM 在调用工具时就能确切知道要提供哪些输入。\n2. **要运行的函数**：这是工具被调用时实际执行的 Python 函数。它是根据提供的输入执行所需操作的代码。\n\
  \n你需要记住的一个重要点是，工具的输入越简单，LLM 就越容易使用它。我建议你使用具有单个字符串输入的工具，因为智能体与它们配合得很好。\n\nLangChain\
  \ 有文档说明哪些智能体类型可以处理更复杂的输入。请参阅“延伸阅读”部分以获取文档链接。\n\n现在，让我们使用 `WikipediaQueryRun` 工具，它是维基百科的一个便捷包装器：\n\
  \n```\n!pip install langchain==0.2.5 langchain_openai==0.2.5 wikipedia\n```\n\n\
  ```\nfrom langchain_community.tools import WikipediaQueryRun\nfrom langchain_community.utilities\
  \ import WikipediaAPIWrapper\n\n# 使用自定义配置初始化工具\napi_wrapper = WikipediaAPIWrapper(top_k_results=1,\
  \ doc_content_chars_max=100)\ntool = WikipediaQueryRun(api_wrapper=api_wrapper)\n\
  ```\n\n现在，让我们探索该工具的一些属性：\n\n```\n# 检查默认名称\nprint(tool.name)  # 输出：'Wikipedia'\n\n\
  # 检查默认描述\nprint(tool.description)  # 输出：'A wrapper around Wikipedia. Useful for\
  \ when you need to answer general questions about people, places, companies, facts,\
  \ historical events, or other subjects. Input should be a search query.'\n\n# 检查输入的默认\
  \ JSON 模式\nprint(tool.args)  # 输出：{'query': {'title': 'Query', 'type': 'string'}}\n\
  \n# 检查工具是否应直接返回给用户\nprint(tool.return_direct)  # 输出：False\n```\n\n让我们尝试搜索关于 LangChain\
  \ 本身的信息：\n\n```\n# 使用字典输入调用工具\nprint(tool.run({\"query\": \"langchain\"}))\n# 输出：'Page:\
  \ LangChain\\nSummary: LangChain is a framework designed to simplify the creation\
  \ of applications '\n\n# 使用单个字符串输入调用工具（因为它只期望一个输入）\nprint(tool.run(\"langchain\"\
  ))\n# 输出：'Page: LangChain\\nSummary: LangChain is a framework designed to simplify\
  \ the creation of applications '\n```\n\n但是，如果我们想要自定义工具的名称、描述或 JSON 模式呢？让我们为维基百科工具创建一个自定义模式：\n\
  \n```\nfrom langchain_core.pydantic_v1 import BaseModel, Field\n\nclass WikiInputs(BaseModel):\n\
  \    \"\"\"维基百科工具的输入。\"\"\"\n    query: str = Field(description=\"要在维基百科中查询的查询词，应为\
  \ 3 个或更少的词\")\n\n# 现在，让我们使用自定义设置创建工具的新实例\ntool = WikipediaQueryRun(\n    name=\"\
  wiki-tool\",\n    description=\"在维基百科中查找内容\",\n    args_schema=WikiInputs,\n   \
  \ api_wrapper=api_wrapper,\n    return_direct=True,\n)\n\n# 检查更新后的属性\nprint(tool.name)\
  \  # 输出：'wiki-tool'\nprint(tool.description)  # 输出：'在维基百科中查找内容'\nprint(tool.args)\
  \  # 输出：{'query': {'title': 'Query', 'description': '要在维基百科中查询的查询词，应为 3 个或更少的词',\
  \ 'type': 'string'}}\nprint(tool.return_direct)  # 输出：True\n\n# 使用更新后的设置使用工具\nprint(tool.run(\"\
  langchain\"))\n```\n\n\n\n"
