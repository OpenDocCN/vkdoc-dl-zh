  \n## 自己试试吧！\n\n请记住，缓存嵌入向量是一种强大的技术，可以节省你的时间和计算资源。所以，请大胆尝试不同的嵌入器、存储机制和命名空间。\n\n尽情探索缓存嵌入向量的世界，看看它们如何简化你的开发流程。\n\
  \n### 异步调用向量存储\n\n让我们讨论一下为什么异步调用向量存储是有帮助的。你看，向量存储通常作为需要一些输入/输出（IO）操作的独立服务运行。如果你同步调用这些操作，就会浪费宝贵的时间等待外部服务的响应。\n\
  \n这就是异步操作可以提供帮助的地方，因为你可以让代码在等待向量存储响应时继续执行其他任务。好消息是，你只需在方法名前加上 `a` 前缀，就可以异步调用所有方法。\n\
  \n首先，你需要安装 Qdrant，这是一个完全支持异步操作的向量存储。你需要安装 `qdrant-client` 包。可以通过运行以下命令来安装：\n\n```bash\n\
  !pip install qdrant-client\n```\n\n安装好包之后，你可以从 `langchain_community.vectorstores`\
  \ 中导入 `Qdrant` 类：\n\n```python\nfrom langchain_community.vectorstores import Qdrant\n\
  ```\n\n然后，你必须通过调用 `afrom_documents` 方法异步创建一个向量存储：\n\n```python\ndb = await Qdrant.afrom_documents(documents,\
  \ embeddings, \"http://localhost:6333\")\n```\n\n在这里，`documents` 是你的文档集合，`embeddings`\
  \ 是你正在使用的嵌入模型，`\"http://localhost:6333\"` 是你的 Qdrant 服务器的 URL。请注意，你可以使用以下 docker\
  \ 语句在你的本地机器上安装 Qdrant 服务器：\n\n```bash\ndocker run -p 6333:6333 qdrant/qdrant\n```\n\
  \n你需要安装 docker 才能运行此命令。此命令将拉取 Qdrant Docker 镜像，并在你的本地机器上启动一个 Qdrant 服务器，将其暴露在 6333\
  \ 端口。你也可以使用由 Qdrant 云或其他云提供商提供的托管 Qdrant 服务器。\n\n创建好向量存储后，你可以异步执行相似性搜索。假设你有一个查询，并希望找到最相似的文档。你可以这样做：\n\
  \n```python\nquery = \"What advice did the author give about money\"\ndocs = await\
  \ db.asimilarity_search(query)\nprint(docs[0].page_content)\n```\n\n`asimilarity_search`\
  \ 方法接收你的查询，并返回一个最相似文档的列表。你可以使用 `docs[0].page_content` 访问第一个文档的内容。\n\n你也可以直接使用向量嵌入来执行相似性搜索。看看这个：\n\
  \n```python\nembedding_vector = embeddings.embed_query(query)\ndocs = await db.asimilarity_search_by_vector(embedding_vector)\n\
  ```\n\n在这种情况下，你首先使用嵌入模型的 `embed_query` 方法嵌入你的查询。然后，将生成的 `embedding_vector` 传递给 `asimilarity_search_by_vector`\
  \ 方法，以找到最相似的文档。\n\n## 检索器\n\n我们已经讨论了如何从向量存储中检索查询的答案。让我们更详细地讨论一下检索器。\n\n你可以使用检索器传入一个非结构化查询，并返回一个相关文档列表作为输出。它可以帮助你根据问题或查询快速获取所需的信息。\n\
  \n\n\n"
- '# 第 7 章 使用检索增强生成（RAG）构建高级问答与搜索应用


  你可以根据 LangChain 中多种检索器的独特特性和用例来使用它们，因此理解这些检索器将有助于你为特定需求选择最佳方案：


  1. **向量存储检索器**：如果你刚开始接触并希望寻找快速简便的方法，`向量存储检索器` 是你的首选。这是最简单的方法，你可以为每段文本创建嵌入向量，从而轻松找到相似内容。


  2. **父文档检索器**：当你的文档包含大量独立索引但可一起检索的细小信息片段时，可以使用 `父文档检索器`。它会为每个文档索引多个数据块，并根据嵌入向量找到最相似的数据块。真正有用的是，它不会返回单个数据块，而是检索整个父文档以提供更全面的结果。


  3. **多向量检索器**：有时，你可能希望从文档中提取你认为比文本本身更相关的额外信息进行索引。`多向量检索器` 允许你为每个文档创建多个向量，从而灵活捕捉内容的不同方面。例如，你可以仅基于文档摘要或假设性问题创建向量。


  4. **自查询检索器**：你是否遇到过用户提出的问题更适合通过元数据而非文本相似度来检索文档的情况？`自查询检索器` 使用语言模型（LLM）将用户输入转化为两部分：用于语义查找的字符串和用于应用的元数据过滤器。当问题更关注文档的元数据而非内容时，这一功能极为有用。


  5. **上下文压缩检索器**：有时，检索到的文档可能包含大量干扰语言模型的无关信息。`上下文压缩检索器` 通过添加后处理步骤，仅从检索到的文档中提取最相关的信息，从而为你排忧解难。这可以通过嵌入向量或语言模型实现，确保你的语言模型始终聚焦于关键内容。


  LangChain 还提供了其他高级检索类型，例如 `时间加权向量存储检索器`、`多查询检索器`、`集成检索器` 和 `长上下文重排序检索器`。每种检索器都有其独特的优势和用例，使你能够根据具体需求定制检索流程。


  ### 信息检索代码实战


  为了给你一个具体示例，假设你想使用 `向量存储检索器`。以下是一个简单的代码片段：


  ```

  from langchain.retrievers import VectorstoreRetriever

  ```




