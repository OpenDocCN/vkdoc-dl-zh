  import ChatCompletion\n\n# 使用环境变量设置 OpenAI API 密钥\nos.environ[\"OPENAI_API_KEY\"\
  ] = \"sk-T\"\n\n# 确认 API 密钥设置正确\nopenai.api_key = os.getenv(\"OPENAI_API_KEY\")\n\
  \n# 定义一个函数来获取聊天补全\ndef get_chat_completion(user_prompt):\n    # 使用 Chat Completion\
  \ API 生成响应\n    response = ChatCompletion.create(\n        # 指定要使用的聊天模型引擎\n    \
  \    model=\"gpt-3.5-turbo\",\n        # 将用户提示作为消息提供\n        messages=[{\"role\"\
  : \"user\", \"content\": user_prompt}]\n    )\n    # 提取并返回生成的响应\n    return response.choices[0].message.content.strip()\n\
  \n# 提示用户输入故事提示\nuser_prompt = input(\"输入一个故事提示：\")\n\n# 根据用户提示生成聊天补全\nresult = get_chat_completion(user_prompt)\n\
  \n# 打印生成的结果\nprint(result)\n```\n\n**注意**：请记住导入正确版本的 OpenAI 库，否则将无法工作。\n\n让我们分解一下代码中发生的事情：\n\
  \n- 我们安装版本为 0.28 的 OpenAI 包。\n- 我们导入必要的模块：`os` 和 `openai`。\n- 我们从 OpenAI 模块导入新的\
  \ Chat Completion API。\n- 我们使用环境变量设置 OpenAI API 密钥。\n- 我们确认 API 密钥设置正确。\n- 我们定义\
  \ `get_chat_completion` 函数，使用 Chat Completion API 生成聊天补全。它接受一个 `user_prompt` 作为输入，并将其作为消息发送给\
  \ API。`model` 参数指定要使用的聊天模型引擎（例如 `\"gpt-3.5-turbo\"`）。\n- 从 API 响应中提取生成的响应并返回。\n\n\
  代码会提示用户输入一个故事提示，如图 2-1 所示。\n\n***图 2-1.** 输入故事提示*\n\n输入你的内容，在本例中，我输入了“讲述地球的故事”，然后按回车。`get_chat_completion`\
  \ 函数被调用，使用用户提示生成聊天补全。\n\n生成的结果会被打印出来，如图 2-2 所示。\n\n***图 2-2.** LLM 对提示的响应*\n\n**成果**\n\
  \n完成此练习后，你将获得以下实践经验：\n\n- 获取并使用 API 密钥向 LLM API 进行身份验证\n- 安装并使用 Python SDK 简化 API\
  \ 交互\n- 向 LLM（GPT-4）发出请求并处理其响应\n\n## 练习 2：使用 LangChain 增强灵活性\n\n现在你已经了解了如何直接调用 LLM\
  \ API，让我们探索 LangChain 如何通过使代码更灵活来简化事情。\n\n**步骤 1：在开发环境中设置 LangChain**\n\n要开始使用 LangChain，你需要通过\
  \ `pip` 安装它。打开你的终端或命令提示符或任何其他开发工具，例如 Google Colab，并执行以下命令：\n\n```bash\npip install\
  \ langchain\n```\n\n此命令安装 LangChain 及其依赖项，为你的开发做好准备。\n\n**步骤 2：修改脚本以使用 LangChain**\n\
  \n打开你在练习 1 中创建的 Python 脚本。你将修改此脚本以使用 LangChain，而不是直接与 OpenAI API 交互。\n\n在脚本开头导入\
  \ LangChain，并将其配置为使用 LLM（例如 OpenAI 的 GPT-4）。以下是修改脚本的示例：\n\n```python\n# 导入必要的模块\n\
  from langchain_openai import OpenAI\nfrom langchain.prompts import PromptTemplate\n\
  from langchain.chains import LLMChain\n\n# 你的 OpenAI API 密钥\napi_key = \"your_api_key_here\"\
  \n\n# 确认 API 密钥设置正确\nopenai.api_key = os.getenv(\"OPENAI_API_KEY\")\n\n# 使用 OpenAI\
  \ 的 GPT 初始化 LangChain\nllm = OpenAI(api_key=api_key)\n\n# 使用 LLMChain 进行简单交互\nchain\
  \ = LLMChain(llm=llm)\n\n# 定义用于生成响应的提示模板。\nprompt_template = PromptTemplate(input_variables=[\"\
  user_input\"], template=\"你是一个有用的聊天机器人。用户：{user_input} 响应：\")\n\n# 创建 OpenAI 类的实例并赋值给变量\
  \ llm\nllm = OpenAI()\n\n# 创建 LLMChain 类的实例\nchain = LLMChain(llm=llm, prompt=prompt_template)\n\
  \n# 提示用户输入故事开头\nuser_prompt = input(\"输入一个故事提示：\")\n\n# 调用 LLMChain 实例的 run 方法\n\
  response = chain.run(user_prompt)\n\n# 打印生成的响应\nprint(response)\n```\n\n**注意**：LangChain\
  \ 正在积极开发中，其结构可能会发生变化。请始终参考官方 LangChain 文档以获取最新的导入语句和使用模式。\n\n从上面的例子中需要注意几点。首先，这种方法的优势在于它使用\
  \ LangChain 来抽象 API 交互，使得在不大量修改代码的情况下，更容易在 LLM 之间切换或调整提示工程方法。\n\n接下来，让我们讨论我们导入的三个模块：\n\
  \n- **`langchain.llms` 中的 `OpenAI`**：这是用于与 OpenAI 语言模型交互的类。\n- **`langchain.prompts`\
  \ 中的 `PromptTemplate`**：此类用于定义用于生成响应的提示模板。\n- **`langchain.chains` 中的 `LLMChain`**：此类表示一个链，它将语言模型（LLM）与提示模板结合起来以生成响应。\n\
  \n以下是代码中发生的事情：\n\n- 我们使用 `os.environ[\"OPENAI_API_KEY\"]` 将 **OpenAI API 密钥** 设置为环境变量。API\
  \ 密钥的值被赋值给该变量。\n- 通过使用 `os.getenv(\"OPENAI_API_KEY\")` 将其赋值给 `openai.api_key`，确认\
  \ **API 密钥** 设置正确。\n- 我们创建一个 **`PromptTemplate`** 对象，参数如下：\n  - `input_variables=[\"\
  user_input\"]`：这指定模板期望一个名为 `\"user_input\"` 的变量。\n  - `template=\"你是一个有用的聊天机器人。用户：{user_input}\
  \ 响应：\"`：这定义了提示的模板字符串。它包含花括号 `{}` 内的 `\"user_input\"` 变量，以指示用户输入将被插入的位置。\n- 我们创建一个\
  \ **`OpenAI` 类的实例** 并将其赋值给变量 `llm`。这表示将用于生成响应的 OpenAI 语言模型。\n- 我们创建一个 **`LLMChain`\
  \ 类的实例**，参数如下：\n  - `llm=llm`：这指定要在链中使用的语言模型，即上一步中创建的 OpenAI 实例。\n  - `prompt=prompt_template`：这指定要在链中使用的提示模板，即之前创建的\
  \ `PromptTemplate` 对象。\n- 使用 **`user_prompt`** 提示用户输入他们的请求；在我的例子中，我询问了“讲述地球的故事”。\n\
  - 调用 `LLMChain` 实例的 **`run` 方法**，参数为变量 `user_input`。这将根据提供的提示和用户输入从语言模型生成响应。\n-\
  \ 使用 `print(response)` 打印生成的响应。\n\n总之，你刚刚学习了如何使用 LangChain 调用 OpenAI 语言模型、创建提示模板，并根据用户输入生成响应。然后将响应打印到控制台。\n\
  \n该代码演示了如何使用 LangChain 与 OpenAI API 交互、定义提示模板，并以结构化和模块化的方式使用语言模型生成响应。\n\n**步骤 3：在\
  \ LangChain 中尝试提示工程**\n\nLangChain 促进了高级提示工程技术。你可以尝试不同的提示格式和参数，看看它们如何影响故事的创造力、连贯性和相关性。\n\
  \n例如，你可以调整 `temperature` 参数以使响应更可预测或更不可预测，或使用停止序列来控制生成内容的长度和结构。以下是实现该结果的示例：\n\n\
  ```python\nchain = LLMChain(\n    llm=llm, prompt=prompt_template,\n    llm_kwargs={\n\
  \        \"temperature\": 0.7,\n        \"max_tokens\": 100,\n        \"stop\":\
  \ [\"\\n\"]\n    }\n)\n```\n\n通过尝试不同的提示格式和参数，你可以看到提示或参数的变化如何影响输出。这将帮助你理解如何从 LLM\
  \ 获得最佳响应。\n\n**成果**\n\n你可以观察到，LangChain 不仅简化了在不同 LLM 之间切换的过程，而且还为优化提示以获得更高质量的 AI\
  \ 生成内容开辟了可能性。\n\nLangChain 代码也更简洁、更简单，并且允许插入多个 LLM。此外，它与 LLM 的 API 没有紧密耦合。随着我们转向更复杂的用例，例如使用提示工程定制响应、集成外部数据源等，这些好处将变得更加明显。\n\
  \n## 关键要点\n\n让我们讨论一下我们目前学到的内容：\n\n- **简化开发**：你了解到 LangChain 通过抽象直接 LLM API 调用的复杂性，简化了生成式\
  \ AI 应用程序的开发。你可以更多地关注应用程序逻辑，而不是 LLM API 的细微差别。\n- **增强的灵活性和可扩展性**：你可以轻松集成和切换不同的\
  \ LLM，而无需进行大量的代码重构。这确保了应用程序能够以最小的技术债务与新兴的 AI 技术一起发展。\n- **优化的提示工程**：你可以使用 LangChain\
  \ 工具和模板进行提示工程，这可以减少实验所需的时间以及从 LLM 引出所需响应所需的技能。\n- **成本与效率**：通过利用 LangChain 的模块化开发和智能\
  \ API 请求管理方法，你可以优化成本并提高应用程序性能，特别是对于复杂和高容量的 AI 任务。\n- **全球可访问性**：通过利用基于云的 LLM API，你可以构建和部署具有全球覆盖范围和一致性能的\
  \ AI 驱动应用程序。\n- **安全性与数据处理**：你可以维护强大的安全标准，并简化复杂数据集的处理，同时遵守行业标准的安全要求。\n- **向创新过渡**：从直接使用\
  \ LLM API 转向 LangChain，为生成式 AI 应用程序开发中的创新开辟了新的可能性。\n\n总之，你可以使用 LangChain 来简化开发过程，增强应用程序的灵活性和可扩展性，并在解决\
  \ LLM API 固有挑战的同时开辟创新可能性。\n\n## 开始使用 LangChain 进行创作\n\n恭喜！你已经了解了 LLM API 的强大功能，并发现了\
  \ LangChain 的变革潜力。现在，是时候将你的技能付诸实践，将你的想法变为现实了。\n\n在下一章中，我们将更深入地探讨如何构建 LLM 应用程序。同时，如果你还没有开始，我建议你开始你的第一个\
  \ LangChain 项目。现在，你可以从一个简单的内容生成器开始，然后构建一个聊天机器人或数据驱动的应用程序。\n\n通过探索 LangChain 的文档、尝试不同的\
  \ LLM 以及发现新的用例，继续你的学习之旅。\n\n## 技术术语表\n\n以下是本章中使用的技术术语的定义列表：\n\n- **API（应用程序编程接口）**：一组规则和定义，允许软件程序相互通信，以集成外部服务或数据。\n\
  - **LLM（大型语言模型）**：基于大量训练数据集，用于理解和生成类似人类文本的高级 LLM 模型。\n- **SDK（软件开发工具包）**：用于为特定平台或技术开发应用程序的软件工具、库和文档的集合。\n\
  - **分词**：将文本分解为更小的单元（标记），例如单词或短语，以供机器学习模型处理的过程。\n- **规范化**：将文本转换为一致格式（例如，小写、去除标点符号）以提高机器学习模型性能的过程。\n\
  - **困惑度**：衡量语言模型预测文本样本好坏程度的指标。较低的困惑度表示更好的预测准确性。\n\n## 延伸阅读\n\n以下是帮助你巩固本章所涵盖主题的理解，并进一步探索\
  \ LLM API 世界的资源列表：\n\n- **OpenAI API 指南**：OpenAI 提供了关于如何使用其 API 的广泛文档，包括提示工程和模型选择的最佳实践。[`platform.openai.com/docs/introduction`](https://platform.openai.com/docs/introduction)\n\
  - **Google Cloud AI 服务**：Google Cloud 提供了广泛的 AI 服务。他们的文档对于希望利用 Google AI 能力的开发者来说是一个信息宝库。[`cloud.google.com/ai-platform/docs`](https://cloud.google.com/ai-platform/docs)\n\
  - **AWS AI 服务**：AWS 提供了其 AI 服务的全面指南，非常适合希望将 AWS 机器学习工具集成到其应用程序中的开发者。[`docs.aws.amazon.com/machine-learning/`](https://docs.aws.amazon.com/machine-learning/)\n\
  - **《大型语言模型的设计模式》**：本文探讨了在应用程序开发中有效利用 LLM 的各种策略和设计模式。[`arxiv.org/abs/2004.13214`](https://arxiv.org/abs/2004.13214)\n\
  \n"
- "# 第 3 章：构建问答和聊天机器人应用\n\n在本章中，你将学习如何使用 LangChain 和 OpenAI 构建基于大型语言模型（LLM）的强大应用程序。我们将专注于培养你的实践技能，并采用直接了当的策略来提高你的应用程序开发技能。我将引导你完成\
  \ LLM 驱动应用程序（例如问答和聊天机器人）的设置、实现和部署。\n\n我设计本章是为了帮助你掌握端到端开发、部署和增强 LLM 应用程序的技能，以便你能够继续开发更具影响力和更强大的应用程序。\n\
  \n## LangChain 框架组件\n\n到现在，你一定已经清楚 LangChain 是一个可以帮助你开发 LLM 应用程序的强大框架。你已经看到了不少关于如何使用\
  \ LangChain 库调用 LLM 的例子。你还在第 1 章中简要了解了一些组件。让我们进一步探索 LangChain 框架。我们有专门的章节来介绍这些组件，所以现在我们只进行高层次的讨论。\n\
  \n### 开发\n\n我们在第 1 章已经了解到 LangChain 提供了以下组件：\n\n- **模型 I/O**：模型输入/输出（I/O）是关于如何格式化和管理进出语言模型的数据。\n\
  - **提示**：提示是你可以用来将数据输入语言模型以指导其如何生成响应的特定格式。你可以将它们视为帮助你创建问题以将对话引导到所需方向的工具。这种方法让你可以控制流程，并确保响应与你的特定需求相关。\n\
  - **聊天模型**：聊天模型是处理类似聊天交互的专用接口。你可以使用这些模型将聊天消息作为输入，并以对话格式获取响应。你可以使用它们来构建聊天机器人和类似的交互式应用程序。\n\
  - **LLM（大型语言模型）**：LLM 是复杂的 AI 模型，主要用于理解和生成类似人类的文本。它们擅长文本生成、问答和信息提取等任务。虽然它们的核心功能围绕文本，但\
  \ LLM 可用于广泛的应用程序，从创意写作到数据分析和问题解决。\n\n**注意**：最近的进展已将 LLM 的能力扩展到文本处理之外。通过各种扩展，LLM\
  \ 现在可以：\n- 生成和操作图像\n- 处理和创建音频内容\n- 协助代码生成和分析\n- 执行基本推理任务\n- 这些扩展使 LLM 成为跨行业多样化多模态应用程序的强大工具。\n\
  \n- **检索**：检索组件是一项非常重要的进步，它允许你将应用程序特定的数据与语言模型连接起来，这对于检索增强生成（RAG）等应用程序非常理想。你可以使模型能够从庞大的数据集中提取相关信息，以开发相关且有意义的响应。\n\
  - **文档加载器**：文档加载器是从各种来源导入数据并将其格式化为“文档”以供应用程序稍后处理的工具。你可以使用此功能加载文本文件、从数据库提取数据或从 Web\
  \ 拉取内容。我将在第 7 章中讨论这一点。\n- **文本分割器**：你可以使用文本分割器将大块文本分割成更小、更易于管理的部分。这不仅使处理更容易，而且通过专注于最相关的文本部分来提高模型的性能。\n\
  - **嵌入模型**：嵌入模型是一个迷人的概念，它允许你将文本块转换为向量表示。这些向量以数字格式捕获文本的本质，你可以使用它们通过大型数据集执行自然语言搜索。\n\
  - **数据存储与检索**：LangChain 支持多种高效存储和检索数据的选项：\n  1. **向量存储**：这些是专门的数据库，管理向量表示，用于对非结构化数据进行自然语言搜索。你可以特别使用它们来构建复杂的搜索引擎和推荐系统，以快速提供相关结果。\n\
  \  2. **图数据库**：对于高级用户，图数据库提供了一种替代方案，在某些场景下可能更合适，例如处理高度连接的数据时。LangChain 支持与图数据库的集成，允许进行复杂的关系查询。\n\
  \  3. **传统数据库**：对于结构化的数据和精确的查询，传统的 SQL 数据库仍然是一个强大的选择。\n\n这些选择取决于你的具体用例、数据结构和查询需求。LangChain\
  \ 的灵活性允许你为项目集成最合适的存储解决方案。\n\n**超越向量存储**：虽然向量存储擅长在大型非结构化数据集中进行快速、相关的搜索，但你也应该考虑将图数据库用于高度连接的数据场景。LangChain\
  \ 两者都支持，因此你必须根据项目需求选择最合适的。在此处了解有关 LangChain 中图数据库集成的更多信息：[`python.langchain.com/docs/use_cases/graph/`](https://python.langchain.com/docs/use_cases/graph/)。\n\
  \n- **检索器**：检索器比向量存储更通用一些。它们是你可以用来基于非结构化查询获取文档的接口。你可以将它们视为你的个人数据检索器，根据你当前的需求去获取信息。\n\
  - **组合**：组合组件就像是 LangChain 的架构师。你可以使用它们组合各种系统和 LangChain 原语来构建复杂的功能。例如，你可能正在将文本分割器与嵌入模型链接起来，或者创建一个成熟的\
  \ AI 助手。使用这个组合模块，你可以精确地根据你的需求定制应用程序，并优化其效率和效果。\n- **工具**：你可以使用工具提供的接口来允许语言模型与外部系统交互。使用工具，你可以扩展应用程序的能力，例如连接到数据库或第三方\
  \ API。\n- **代理**：代理是 LangChain 中的决策者。你可以使用它们分析高级指令，并决定使用哪些工具以自动化的方式实现期望的结果。它们确保你的应用程序在正确的时间自动使用正确的资源。有关\
  \ LangChain 代理的详细处理，请参阅第 8-10 章。\n- **链**：链是 LangChain 模块化设计的基础。它们是各种组件的组合，这些组件作为构建块协同工作。你可以混合搭配这些组件来定制应用程序的行为。下面是一个示例，只是为了让你了解如何使用链：\n\
  \n```python\n!pip install langchain==0.2.7 langchain_openai==0.1.16\n\nimport os\n\
  from langchain_openai import ChatOpenAI\nfrom langchain_core.prompts import ChatPromptTemplate\n\
  from langchain.chains import LLMChain\n```\n\n\n\n"
