- "# 第 11 章 使用 Streamlit 构建和部署类 ChatGPT 应用\n\n### 3. 使用`.env`文件\n\na. 在项目目录中创建一个名为`.env`的文件。\n\
  \nb. 在文件中添加以下内容：\n\n```\nOPENAI_API_KEY=your_api_key_here\n```\n\nc. 安装`python-dotenv`包：`pip\
  \ install python-dotenv`\n\nd. 在 Python 代码中加载环境变量：\n\n```python\nfrom dotenv import\
  \ load_dotenv\nimport os\n\nload_dotenv()\nopenai_api_key = os.getenv(\"OPENAI_API_KEY\"\
  )\n```\n\n### 4. 在代码中访问环境变量\n\n设置好环境变量后，你可以像这样在 Python 代码中访问它：\n\n```python\nimport\
  \ os\nopenai_api_key = os.getenv(\"OPENAI_API_KEY\")\n```\n\n### 5. 使用环境变量的好处\n\n\
  - **安全性**：你的 API 密钥不会硬编码在源代码中。\n- **灵活性**：无需修改代码即可轻松更改。\n- **可移植性**：适用于不同环境（开发、预发布、生产）。\n\
  \n### 6. 最佳实践\n\n- 切勿将`.env`文件提交到版本控制。\n- 将`.env`添加到你的`.gitignore`文件中。\n- 为其他开发者提供一个包含占位值的`.env.example`文件。\n\
  \n通过将 API 密钥设置为环境变量，你可以在本地开发时避免敏感信息泄露的风险。\n\n请注意，在部署应用程序时，你将使用部署平台的密钥管理系统（如 Streamlit\
  \ Cloud 的密钥管理功能）来安全地存储和访问生产环境中的 API 密钥。\n\n### 解决仓库中的敏感信息问题\n\n如果你发现仓库中仍存在敏感信息问题，可以按照以下步骤操作：\n\
  \n1. `.env`文件\n   - 创建一个名为`.env.txt`的文件，但实际应为`.env`（不带`.txt`扩展名）。\n\n2. 从 Git 跟踪中移除`.env`文件：\n\
  \   ```\n   git rm --cached .env.txt\n   git rm --cached .env\n   ```\n\n3. 如有需要，将`.env.txt`重命名为`.env`：\n\
  \   ```\n   ren .env.txt .env\n   ```\n\n4. 更新`.gitignore`。确保你的`.gitignore`文件包含：\n\
  \   ```\n   .env\n   *.pyc\n   __pycache__/\n   ```\n\n5. 从其他文件中移除 API 密钥：\n   -\
  \ 打开`LangChainUI.py`，将硬编码的 API 密钥替换为：\n     ```python\n     import os\n     from\
  \ dotenv import load_dotenv\n     load_dotenv()\n     openai_api_key = os.getenv(\"\
  OPENAI_API_KEY\")\n     ```\n\n6. 提交这些更改：\n   ```\n   git add .gitignore\n   git\
  \ add LangChainUI.py \"LangChainUI - Copy.py\"\n   git commit -m \"移除 API 密钥并更新.gitignore\"\
  \n   ```\n\n7. 强制推送更改：\n   ```\n   git push -u origin main --force\n   ```\n\n8.\
  \ 清理 Git 历史。如果 API 密钥仍存在于 Git 历史中，你可能需要清理它：\n   ```\n   git filter-branch --force\
  \ --index-filter \"git rm --cached --ignore-unmatch .env.txt .env LangChainUI.py\
  \ 'LangChainUI - Copy.py'\" --prune-empty --tag-name-filter cat -- --all\n   ```\n\
  \n然后再次强制推送：\n```\ngit push origin --force --all\n```\n\n请记住，清理 Git 历史后，任何克隆过你仓库的人都需要重新克隆或执行强制拉取。\n\
  \n这些步骤应该能从你的仓库中移除 API 密钥，并防止其被推送到 GitHub。你应始终谨慎处理敏感信息，并在推送前仔细检查你的提交。\n\n### 防止电子邮件隐私相关问题\n\
  \n有时，你可能会收到与隐私相关的错误消息，提示 GitHub 因电子邮件隐私限制而阻止推送。\n\nGitHub 可能正在通过不允许将包含私人电子邮件地址的提交推送到公共仓库来保护你的隐私。以下是解决此问题的方法：\n\
  \n1. 配置 Git 使用 GitHub 提供的无回复电子邮件地址：\n   a. 登录你的 GitHub 账户。\n   b. 进入设置 ➤ 电子邮件。\n\
  \   c. 查找类似“保持我的电子邮件地址私密。在执行基于 Web 的 Git 操作以及代表你发送电子邮件时，我们将使用`yourusername@users.noreply.github.com`”的段落。\n\
  \   d. 复制此电子邮件地址（它应该类似于`yourusername@users.noreply.github.com`）。\n\n![](img/index-493_1.jpg)\n\
  \n\n\n"
- "# 第 11 章 使用 Streamlit 构建和部署类 ChatGPT 应用\n\n2. 在 Git 配置中设置此邮箱。打开命令提示符并运行：\n\n`git\
  \ config --global user.email yourusername@users.noreply.github.com`\n\n将 `yourusername@users.noreply.github.com`\
  \ 替换为你在 GitHub 设置中找到的实际无回复邮箱地址。\n\n3. 修改上一次提交以使用新邮箱：\n\n`git commit --amend --reset-author`\n\
  \n这将打开你的默认文本编辑器。直接保存并关闭编辑器，无需做任何更改。\n\n4. 再次强制推送：\n\n`git push origin --force --all`\n\
  \n或者，如果你不介意公开提交邮箱：\n\n1. 前往 GitHub 设置 ➤ 邮箱。\n2. 取消勾选“保持我的邮箱地址私密”复选框，如下所示。\n3. 确保你的公开提交邮箱设置为你愿意公开的邮箱。\n\
  \n完成上述任一更改后，再次尝试推送你的更改。这应该能解决邮箱隐私限制问题。\n\n请记住，如果你选择使用无回复邮箱，则需要在所有 Git 提交中使用此邮箱，以避免将来出现此问题。如果你在共享机器或多个项目上工作，你可能希望按仓库级别而非全局级别进行设置。\n\
  \n`git config user.email yourusername@users.noreply.github.com`\n\n在每个希望使用无回复邮箱的仓库中运行此命令。\n\
  \n## 在 GitHub 中部署应用\n\n以下是在 GitHub 中部署应用的步骤：\n\n1. 首先，如果尚未创建，请在 GitHub 上创建一个新仓库。假设你将其命名为\
  \ `streamlit-qa-app`。\n2. 现在，根据你的信息修改以下命令：\n\n```\ngit remote add origin https://github.com/你的实际用户名/streamlit-qa-app.git\n\
  git branch -M main\ngit push -u origin main\n```\n\n以下是每条命令的作用：\n\n- 第一条命令添加一个名为\
  \ `origin` 的远程仓库，指向你的 GitHub 仓库。\n- 第二条命令将当前分支重命名为 `main`（如果尚未命名为此）。\n- 第三条命令将你的本地\
  \ `main` 分支推送到 `origin` 远程仓库，并设置跟踪该远程分支。\n\n![](img/index-495_1.jpg)\n\n运行这些命令后，你的本地仓库将连接到你的\
  \ GitHub 仓库，并且你的代码将被推送到 GitHub，如下所示。\n\n请记住，每个仓库只需运行一次 `git remote add` 命令。对于后续推送，你可以直接使用：\n\
  \n```\ngit remote add origin https://github.com/<你的用户名>/streamlit-qa-app.git\ngit\
  \ branch -M main\ngit push -u origin main\n```\n\n### 授予 GitHub 访问权限\n\n请记住，作为将应用部署到\
  \ GitHub 的一部分，你可能需要向 GitHub 授予适当的权限。\n\n![](img/index-496_1.jpg)\n\n![](img/index-496_2.jpg)\n\
  \n在你看不到仓库或无法访问仓库的情况下，应按照以下步骤解决问题：\n\n1. 验证仓库是否存在：\n   - 前往 [`github.com/<你的用户名>/streamlit-qa-app`](https://github.com/rabijay1/streamlit-qa-app)。\n\
  \   - 如果看到 404 错误，说明仓库不存在。\n\n2. 如果仓库不存在：\n   - 前往 GitHub 并创建一个名为 `streamlit-qa-app`\
  \ 的新仓库。\n   - 确保它位于你的账户下（你的用户名）。\n   - 如果你要推送现有仓库，请不要使用 README、`.gitignore` 或许可证初始化仓库。\n\
  \n3. 检查你的远程 URL。运行此命令以验证远程 URL：\n\n`git remote -v`\n\n它应显示：\n\n```\norigin https://github.com/你的用户名/streamlit-qa-app.git\
  \ (fetch)\norigin https://github.com/你的用户名/streamlit-qa-app.git (push)\n```\n\n\
  4. 如果 URL 不正确，请使用以下命令更新：\n\n`git remote set-url origin https://github.com/你的用户名/streamlit-qa-app.git`\n\
  \n5. 如果看到此错误，请确保你已登录。\n\n\n\n`message`: “请在浏览器中完成身份验证。”\n\n"
- "# 第 11 章 使用 Streamlit 构建和部署类 ChatGPT 应用\n\n6.  检查你的 GitHub 账户：\n    - 确保你使用的是正确的\
  \ GitHub 账户（`your_user_name`）。\n    - 确认你拥有推送到此仓库的必要权限。\n7.  再次尝试推送：\n    ```\n\
  \    git push -u origin main\n    ```\n8.  创建新的个人访问令牌：\n    - 前往 GitHub 设置 ➤ 开发者设置\
  \ ➤ 个人访问令牌。\n    - 生成一个具有`repo`权限的新令牌。\n    - 推送时使用此令牌作为密码。\n9.  使用 HTTPS 替代 SSH。如果你正在使用\
  \ SSH URL，请尝试改用 HTTPS URL：\n    ```\n    git remote set-url origin https://github.com/your_user_name/streamlit-qa-app.git\n\
  \    ```\n10. 检查你的网络连接和防火墙设置。\n\n## 在 Streamlit Cloud 中部署\n\n我们来讨论使用 Streamlit Cloud\
  \ 进行部署的步骤：\n\n![](img/index-499_1.jpg)\n\n![](img/index-499_2.jpg)\n\n1.  前往[`streamlit.io/cloud`](https://streamlit.io/cloud)并使用你的\
  \ GitHub 账户登录，如下所示。\n2.  点击“New app”。\n3.  选择你的 GitHub 仓库、分支（通常为“main”）以及主 Python\
  \ 文件（例如`LangChainUI.py`）。\n4.  点击“Deploy”。\n\n恭喜你，如果一切顺利，你应该已经成功将应用部署到 Streamlit\
  \ Cloud，供他人访问。\n\n## 其他云部署选项\n\n我们来谈谈将应用部署到云端的其他方式：\n\n1.  **LangServe**：这是一个专为部署\
  \ LangChain 应用设计的工具。它能为你的链和代理提供便捷的 API 创建功能，以及用于测试端点的用户界面。\n\n    使用 LangServe 时，通常需要：\n\
  \    - 通过`pip install langserve`安装它\n    - 在 Python 文件中定义你的链或代理\n    - 创建一个 FastAPI\
  \ 应用，并将你的链添加为路由\n    - 使用`uvicorn your_app:app --reload`运行你的服务器\n\n    如果你正在围绕 LangChain\
  \ 组件构建 API，LangServe 尤其有用。它能让你轻松地将链和代理暴露为 API 端点，这在将 LangChain 应用集成到更大系统或应用中时非常方便。\n\
  \n2.  **Heroku**：这通常是我快速部署的首选。它用户友好，且与 Python 应用配合良好。以下是简要步骤：\n    - 首先，注册一个 Heroku\
  \ 账户。\n    - 安装 Heroku CLI。\n    - 在项目目录中创建一个`Procfile`，内容为：`web: streamlit run\
  \ your_app.py`。\n    - 运行`heroku create your-app-name`。\n    - 使用`git push heroku\
  \ main`推送代码。\n\n3.  **AWS Elastic Beanstalk**：如果你在寻找更强大的方案，这是一个可靠的选择。它稍微复杂一些，但扩展性很好。你需要：\n\
  \    - 设置一个 AWS 账户\n    - 安装 AWS CLI 和 EB CLI\n    - 使用`eb init`初始化你的 EB 环境\n  \
  \  - 使用`eb create`创建一个环境\n    - 使用`eb deploy`进行部署\n\n4.  **Google Cloud Run**：如果你熟悉容器，这是个不错的选择。要点如下：\n\
  \    - 为你的应用创建一个`Dockerfile`。\n    - 构建你的容器镜像。\n    - 将其推送到 Google Container Registry。\n\
  \    - 使用 Google Cloud Console 或`gcloud` CLI 部署到 Cloud Run。\n\n5.  **DigitalOcean\
  \ App Platform**：我喜欢它的简洁性。在复杂度上，它介于 Heroku 和 AWS 之间：\n    - 将你的 GitHub 仓库连接到 DigitalOcean。\n\
  \    - 选择你的项目和分支。\n    - 选择你的资源计划。\n    - 点击部署！\n\n6.  **Streamlit Cloud**：你刚刚已经使用\
  \ Streamlit Cloud 完成了部署。\n\n## 请记住\n\n每个选项都有其优缺点。Heroku 和 Streamlit Cloud 非常适合快速上手。AWS\
  \ 和 Google Cloud 提供更多控制和可扩展性，但学习曲线更陡峭。DigitalOcean 则介于两者之间。\n\n我的建议是？从 Heroku 或\
  \ Streamlit 这类简单的方案开始。\n\n\n\n"
- "# 云服务\n\n随着你越来越熟练，需求不断增长，你可以探索更高级的选项。\n\n如果第一次没有完美运行，也不必焦虑。部署过程可能很棘手，即使是经验丰富的开发者有时也需要多次尝试才能成功。不知不觉中，你就能像专家一样部署应用了！\n\
