  \n你可以根据具体需求从多种文本分割器中进行选择。每个分割器都以自己的方式分割文本，有些甚至会添加元数据来提供关于这些块的额外信息。以下是一些流行的选项：\n\n\
  1.  **RecursiveCharacterTextSplitter**：你可以使用这个分割器，根据你定义的一系列字符递归地切分文本。它有助于将相关的文本片段保持在一起。\n\
  2.  **HtmlTextSplitter**：当你处理 HTML 文档时，这个分割器将是你的首选。它根据 HTML 特定的字符分割文本，并添加关于每个块来源的元数据。\n\
  3.  **MarkdownTextSplitter**：这与 HTML 分割器类似，但专为 Markdown 文档设计。它根据 Markdown 特定的字符分割文本，并包含关于块来源的元数据。\n\
  4.  **TokenTextSplitter**：当你需要根据 token 数量分割文本时，你会用到这个。你可以通过使用不同的 token 度量方式来决定如何对文本进行分块。\n\
  \n### 文本分割的完整工作代码示例\n\n首先，你需要安装 `langchain-text-splitters` 包：\n\n```\npip install\
  \ langchain-text-splitters\n```\n\n\n\n安装好包之后，你可以轻松创建一个文本分割器实例，并开始对文本进行分块。以下是使用\
  \ `CharacterTextSplitter` 的示例：\n\n```python\n# 这是一份可以分割的长文档。\nwith open(\"./sample_data/The\
  \ Art of Money Getting.txt\") as f:\n    art_of_money_getting = f.read()\n```\n\n\
  在上述代码中，你打开了一个名为“The Art of Money Getting.txt”的文本文件，该文件位于 `./sample_data` 目录下。你使用\
  \ `with` 语句来确保在读取完文件后，文件能被正确关闭。\n\n你使用 `read()` 方法读取文件的全部内容，并将其存储在 `art_of_money_getting`\
  \ 变量中。该变量现在保存了文档的完整文本。\n\n```python\nfrom langchain_text_splitters import CharacterTextSplitter\n\
  ```\n\n在这里，你将从 `langchain_text_splitters` 包中导入 `CharacterTextSplitter` 类。你使用这个类来根据指定的一个或多个字符将文本分割成更小的块。\n\
  \n```python\ntext_splitter = CharacterTextSplitter(\n    separator=\"\\n\\n\",\n\
  \    chunk_size=1000,\n    chunk_overlap=200,\n    length_function=len,\n    is_separator_regex=False,\n\
  )\n```\n\n在这段代码中，你创建了一个 `CharacterTextSplitter` 类的实例，并使用以下参数对其进行配置：\n\n- `separator=\"\
  \\n\\n\"`：你将分隔符指定为两个换行符（`\\n\\n`）。这意味着每当遇到两个连续的换行符时，文本就会被分割。\n- `chunk_size=1000`：你将每个块的最大大小设置为\
  \ 1000 个字符。如果一个块超过此大小，它将被进一步分割。\n- `chunk_overlap=200`：你指定了连续块之间 200 个字符的重叠。这种重叠有助于保持块之间的上下文连贯。\n\
  - `length_function=len`：你使用内置的 `len` 函数来计算每个块的字符长度。\n- `is_separator_regex=False`：你指明分隔符不是正则表达式，而是一个简单的字符串。\n\
  \n```python\ndocuments = text_splitter.create_documents([art_of_money_getting])\n\
  ```\n\n在这里，你使用 `text_splitter` 实例的 `create_documents` 方法将 `art_of_money_getting`\
  \ 文本分割成更小的块。该方法接受一个文本列表作为输入（在此例中，你提供了一个文本），并返回一个 `Document` 对象列表。每个 `Document` 对象代表一个文本块。\n\
  \n```python\nprint(documents[4])\n```\n\n最后，你打印 `documents` 列表中的第五个 `Document` 对象（索引为\
  \ 4）。这将显示第五个文本块的内容和元数据。\n\n输出结果大致如下：\n\n```\npage_content='...' metadata={}\n```\n\
  \n`page_content` 属性包含该块的实际文本内容，而 `metadata` 属性是一个空字典，因为在此示例中我们没有提供任何元数据。\n\n总的来说，这段代码演示了如何使用\
  \ `langchain_text_splitters` 包中的 `CharacterTextSplitter`，根据指定的分隔符（本例中为两个换行符）将长文档分割成更小的块。生成的结果块作为\
  \ `Document` 对象存储在 `documents` 列表中，你可以根据需要访问和操作这些对象。\n\n为了测试你的文本分割器的工作效果，你可以使用 Greg\
  \ Kamradt 创建的 `Chunkviz` 工具，该工具可以让你直观地看到文本是如何被分割的。通过使用它，你可以微调你的分割参数。\n\n请注意，文本分割只是你在将文本输入给大语言模型（LLM）之前，可以对文档进行的转换操作之一。你可以随意从\
  \ LangChain 提供的与第三方工具集成的各种文档转换器中进行选择。\n\n## 自己动手试试\n\n要实现成功的文本分割，你必须在块大小和语义连贯性之间找到恰当的平衡。我鼓励你尝试不同的分割器和参数，以找到最适合你特定用例的方案。\n\
  \n### 递归分割\n\n接下来是递归分割。`RecursiveCharacterTextSplitter` 同样根据指定的一个或多个分隔符字符来分割文本。\n\
  \n然而，它采用递归方法将文本分割成块。首先，它根据分隔符对整个文本进行分割，并创建初始块。如果任何生成的块超过了指定的 `chunk_size`，分割器会递归地对这些块应用分割过程。这种递归分割会一直持续，直到所有块都在所需的\
  \ `chunk_size` 限制之内。`chunk_overlap` 参数用于保持递归分割的块之间的上下文连贯。\n\n这种递归方法确保了块的分割更加均匀，尤其是在处理超过\
  \ `chunk_size` 的长段落或章节时。\n\n`CharacterTextSplitter` 和 `RecursiveCharacterTextSplitter`\
  \ 之间的区别很微妙，当你希望将文本分割成更小、更易于管理的块，同时保留内容的逻辑结构时，你会发现后者特别有用。\n\n以下是一个示例，用于说明两者的区别：\n\
  \n```python\nfrom langchain_text_splitters import CharacterTextSplitter, RecursiveCharacterTextSplitter\n\
  \ntext = \"This is a sample text. It consists of multiple sentences. Some sentences\
  \ are longer than others. We will split this text into chunks.\"\n\n# CharacterTextSplitter\n\
  text_splitter = CharacterTextSplitter(separator=\". \", chunk_size=30, chunk_overlap=5)\n\
  documents = text_splitter.create_documents([text])\nprint(\"CharacterTextSplitter:\"\
  )\nfor doc in documents:\n    print(doc.page_content)\n    print(\"---\")\n```\n\
  \n\n\n"
