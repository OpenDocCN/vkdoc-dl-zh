  ### 情感分析


  情感分析：`0.800000011920929`，`0.800000011920929`


  这一行展示了情感分析结果，包含两个值：情感得分和情感强度。


  #### 情感得分


  第一个值 `0.800000011920929` 代表情感得分。


  情感得分的范围从 –1.0（非常负面）到 1.0（非常正面）。


  得分为 `0.800000011920929` 表明文本具有强烈的正面情感。


  #### 情感强度


  第二个值 `0.800000011920929` 代表情感强度。


  情感强度表示文本中表达的情感（正面或负面）的整体强度。


  它是一个非负数，随着情感内容的增加而增加。在本例中，`0.800000011920929` 表示中等程度的正面情感。


