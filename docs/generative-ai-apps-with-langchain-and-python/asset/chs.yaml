  )\n```\n\n在此示例中，你初始化了检索器和 LLM，创建了 `ConversationalRetrievalChain`，然后启动了一个对话循环。该链负责利用聊天历史来优化查询并提供上下文相关的响应。\n\
  \n"
- "# 第 6 章：使用链构建智能聊天机器人和自动化分析系统\n\n##### 使用 `LLMChain` 构建文本生成应用\n\n你可以使用 `LLMChain`\
  \ 将语言模型（LLM）与提示模板结合起来生成文本。以下是一个快速示例：\n\n```python\nfrom langchain.chains import\
  \ LLMChain\nfrom langchain.llms import OpenAI\nfrom langchain.prompts import PromptTemplate\n\
  \ntemplate = \"What is a good name for a company that makes {product}?\"\nprompt\
  \ = PromptTemplate(template=template, input_variables=[\"product\"])\nllm = OpenAI(temperature=0.9)\n\
  chain = LLMChain(llm=llm, prompt=prompt)\ncompany_name = chain.run(\"colorful socks\"\
  )\nprint(company_name)\n```\n\n在此示例中，你首先定义了一个提示模板和一个 OpenAI 语言模型。然后，通过组合 `llm` 和\
  \ `prompt` 创建了一个 `LLMChain`，并使用产品输入运行该链，最后打印生成的公司名称。\n\n##### 使用 `ConversationChain`\
  \ 构建对话应用\n\n当你需要与语言模型进行对话并跟踪对话历史时，你将使用此链。以下是一个示例：\n\n```python\nfrom langchain.chains\
  \ import ConversationChain\nfrom langchain.llms import OpenAI\n\nllm = OpenAI(temperature=0.9)\n\
  conversation = ConversationChain(llm=llm)\noutput = conversation.predict(input=\"\
  Hi, how are you?\")\nprint(output)\noutput = conversation.predict(input=\"What's\
  \ the weather like today?\")\nprint(output)\n```\n\n在此示例中，你使用一个 OpenAI 语言模型创建了一个\
  \ `ConversationChain`，然后使用 `predict` 方法与 AI 助手进行对话。该链会跟踪对话历史，并维持更自然、更具上下文关联的交互。\n\
  \n##### 使用 `RetrievalQA` 构建问答应用\n\n你将使用 `RetrievalQA` 链对文档集合执行问答。以下是一个示例：\n\n```python\n\
  from langchain.chains import RetrievalQA\nfrom langchain.llms import OpenAI\nfrom\
  \ langchain.document_loaders import TextLoader\nfrom langchain.indexes import VectorstoreIndexCreator\n\
  from langchain_openai.embeddings import OpenAIEmbeddings\n\nloader = TextLoader(\"\
  path/to/documents.txt\")\nindex = VectorstoreIndexCreator().from_loaders([loader])\n\
  embedding = OpenAIEmbeddings(openai_api_key=MY_OPENAI_API_KEY)\nllm = OpenAI(temperature=0.9)\n\
  chain = RetrievalQA.from_chain_type(llm=llm, chain_type=\"stuff\", retriever=index.vectorstore.as_retriever())\n\
  query = \"What is the capital of France?\"\nresult = chain.run(query)\nprint(result)\n\
  ```\n\n在此示例中，你使用 `TextLoader` 加载了一个文档集合，然后使用 `VectorstoreIndexCreator` 创建了一个索引。接下来，你使用一个\
  \ OpenAI 语言模型实例化了一个 `RetrievalQA` 链，并将检索策略指定为 \"stuff\"。最后，你使用一个查询运行该链并打印结果。\n\n\
  ## 使用 `MapReduceChain` 的文档处理应用\n\n`MapReduceChain` 通过将文档分割成块、对每个块应用映射函数，然后归约结果，帮助你并行处理文档。以下是一个示例：\n\
  \n```python\nfrom langchain.chains import MapReduceChain\nfrom langchain.chains.mapreduce\
  \ import combine_results\nfrom langchain.prompts import PromptTemplate\nfrom langchain.llms\
  \ import OpenAI\nfrom langchain.document_loaders import TextLoader\n\nloader = TextLoader(\"\
  path/to/documents.txt\")\ndocuments = loader.load()\nllm = OpenAI(temperature=0.9)\n\
  prompt = PromptTemplate(template=\"Summarize this text: {text}\", input_variables=[\"\
  text\"])\nchain = MapReduceChain.from_params(\n    map_prompt=prompt,\n    combine_prompt=prompt,\n\
  \    llm=llm,\n    chunk_size=1000,\n    reduce_chunk_overlap=0,\n)\nresult = chain.run(documents)\n\
  print(result)\n```\n\n在此示例中，你使用 `TextLoader` 加载了一个文档集合，然后通过指定映射和合并提示、语言模型以及块大小创建了一个\
  \ `MapReduceChain`。最后，你在文档上运行该链并打印汇总结果。\n\n### 教育案例研究：使用 MapReduce 链分析教育数据\n\n某教育研究机构使用\
  \ MapReduce 链处理大量学术数据，用于分析和报告。\n\n**实施**：MapReduce 链将数据集分割成可管理的块，对每个块应用分析模型，然后汇总结果，生成关于学生表现和学习趋势的综合报告。\n\
  \n**成果**：高效的处理流程缩短了研究论文的周转时间，并提供了对教育效果的更深入洞察，支持对教学策略进行有针对性的改进。\n\n##### 使用链组合策略构建更复杂的工作流应用\n\
  \n我们已经了解了不同类型的链以及如何单独使用它们。在本节中，我们将探讨如何组合链以应对最复杂的工作流。\n\n链组合的核心是通过连接多个链来创建工作流。你需要先将复杂任务分解为更小、更易管理的步骤，并将每个步骤分配给特定的链。\n\
  \n让我们探索一些可用于组合链的策略，以构建复杂的真实世界生成式 AI 应用。\n\n### 使用顺序链的数据汇总应用\n\n当一个链的输出成为下一个链的输入，以创建具有线性数据处理流程的应用时，你将使用顺序链。\n\
  \n以下是一个顺序链工作流的示例：\n\n```python\nfrom langchain.chains import LLMChain, SequentialChain\n\
  from langchain.llms import OpenAI\nfrom langchain.prompts import PromptTemplate\n\
  \n# 链 1：根据主题生成关键词\ntopic_prompt_template = \"Generate relevant keywords for the\
  \ topic: {topic}\"\ntopic_prompt = PromptTemplate(template=topic_prompt_template,\
  \ input_variables=[\"topic\"])\ntopic_chain = LLMChain(llm=OpenAI(), prompt=topic_prompt)\n\
  \n# 链 2：根据关键词获取相关数据\ndata_prompt_template = \"Fetch data related to the following\
  \ keywords: {keywords}\"\ndata_prompt = PromptTemplate(template=data_prompt_template,\
  \ input_variables=[\"keywords\"])\ndata_chain = LLMChain(llm=OpenAI(), prompt=data_prompt)\n\
  \n# 链 3：汇总获取的数据\nsummary_prompt_template = \"Summarize the following data: {data}\"\
  \nsummary_prompt = PromptTemplate(template=summary_prompt_template, input_variables=[\"\
  data\"])\nsummary_chain = LLMChain(llm=OpenAI(), prompt=summary_prompt)\n\n# 按顺序组合链\n\
  sequential_chain = SequentialChain(chains=[topic_chain, data_chain, summary_chain],\
  \ input_variables=[\"topic\"], output_variables=[\"summary\"])\n```\n\n\n\n"
- "# 运行顺序链\n\n`topic = \"Artificial Intelligence\"`\n\n`result = sequential_chain({\"\
  topic\": topic})`\n\n`print(result[\"summary\"])`\n\n在此示例中，您有三个链：`topic_chain`、`data_chain`\
  \ 和 `summary_chain`。我们使用 `SequentialChain` 类按顺序组合它们，并指定它们的执行顺序。`topic_chain` 的输出成为\
  \ `data_chain` 的输入，而 `data_chain` 的输出成为 `summary_chain` 的输入。\n\n最后，您使用一个主题运行顺序链，并打印汇总结果。就是这么简单！\n\
  \n## SequentialChain 用例示例 1：客户支持聊天机器人应用\n\n设想构建一个能够处理各种查询的客户支持聊天机器人。您可以组合链来创建一个强大且高效的聊天机器人工作流。\n\
  \n您可以使用 `RouterChain` 根据意图（例如，销售查询、技术支持、一般咨询）将用户查询路由到相应的链。\n\n在每个特定意图的链中，使用 `SequentialChain`\
  \ 将查询分解为更小的步骤，例如理解问题、检索相关信息以及生成响应。\n\n如果需要，您可以在每个特定意图的链中使用 `ConditionalChain` 来处理特定情况或异常。\n\
  \n## SequentialChain 用例示例 2：内容生成管道应用\n\n考虑一个内容生成管道，它接收一个主题并生成一篇结构良好的文章。您可以组合链来简化流程。\n\
  \n使用 `SequentialChain` 定义整体管道流程：\n\n- 链 1：首先，根据主题生成文章大纲。\n- 链 2：针对每个大纲要点，生成详细的段落。\n\
  - 链 3：然后，将生成的段落组合成一篇连贯的文章。\n- 链 4：最后，校对并润色文章。\n\n在顺序链的每个步骤中，您可以使用额外的链或工具来增强生成过程，例如从知识库中检索相关信息或应用语言模型进行文本润色。\n\
  \n## SequentialChain 用例示例 3：金融领域的自动欺诈检测\n\n一家金融机构集成了 `SequentialChain` 来增强其欺诈检测系统，自动化分析交易模式以发现欺诈活动迹象。\n\
  \n**实施**：`SequentialChain` 分阶段处理交易，首先标记异常模式，然后与历史数据进行交叉引用，最后应用预测模型来评估欺诈概率。\n\n**成果**：这种方法将欺诈交易的检测率提高了\
  \ 25%，显著减少了损失并提高了客户账户的安全性。\n\n这些只是几个示例，旨在让您了解链组合如何在现实场景中应用。\n\n## 使用路由链的任务分配应用\n\
  \n当您希望根据预定义的规则或标准将输入路由到不同的链时，您将使用路由链。\n\n以下是一个路由链工作流的示例：\n\n```python\nfrom langchain.chains\
  \ import LLMChain, RouterChain\nfrom langchain.llms import OpenAI\nfrom langchain.prompts\
  \ import PromptTemplate\n\n# 链 1：处理销售查询\nsales_prompt_template = \"Respond to the\
  \ following sales query: {query}\"\nsales_prompt = PromptTemplate(template=sales_prompt_template,\
  \ input_variables=[\"query\"])\nsales_chain = LLMChain(llm=OpenAI(), prompt=sales_prompt)\n\
  \n# 链 2：处理支持查询\nsupport_prompt_template = \"Respond to the following support query:\
  \ {query}\"\nsupport_prompt = PromptTemplate(template=support_prompt_template, input_variables=[\"\
  query\"])\nsupport_chain = LLMChain(llm=OpenAI(), prompt=support_prompt)\n\n# 根据主题将查询路由到相应链的路由链\n\
  router_chain = RouterChain.from_routes(\n    routes=[\n        (\"sales\", sales_chain),\n\
  \        (\"support\", support_chain),\n    ],\n    default_chain=sales_chain,\n\
  \    input_key=\"query\",\n    output_key=\"response\",\n)\n\n# 运行路由链\nquery = \"\
  I have a question about my order\"\nresult = router_chain.run(query)\nprint(result)\n\
  ```\n\n在此示例中，您有两个链，即 `sales_chain` 和 `support_chain`。您创建了一个 `RouterChain`，它根据主题将输入查询路由到相应的链。如果查询包含单词\
  \ \"sales\"，则将其定向到 `sales_chain`。如果包含单词 \"support\"，则将其定向到 `support_chain`。如果没有匹配的条件，则回退到默认的\
  \ `sales_chain`。最后，您使用一个查询运行路由链并打印响应。\n\n## 案例研究：使用 LangChain 路由链增强客户服务\n\n一家大型零售公司实施了\
  \ LangChain 路由链来自动化客户咨询路由，旨在提高响应速度和解决客户问题的准确性。\n\n**实施与挑战**：路由链根据 \"return\"、\"\
  warranty\" 和 \"payment\" 等关键词对咨询进行分类，并将其引导至相应的部门。挑战包括初始路由错误以及员工对自动化系统的抵触。解决方案包括根据服务代表的反馈优化路由逻辑，并提供员工培训以提高采用率。\n\
  \n**成果**：实施后，该公司每次咨询的处理时间减少了 30%，并且由于响应更快、更准确，客户满意度得到了提高。路由链的适应性通过一种学习机制得到增强，该机制随着时间的推移提高了其准确性。\n\
  \n**结论**：本案例研究展示了路由链在简化客户服务运营方面的有效性，证明了其在零售环境中显著提高运营效率和客户满意度的潜力。\n\n## 使用条件链的情感分析应用\n\
  \n您将使用条件链根据特定条件执行不同的链。\n\n以下是一个条件链工作流的示例：\n\n```python\nfrom langchain.chains import\
  \ LLMChain, ConditionalChain\nfrom langchain.llms import OpenAI\nfrom langchain.prompts\
  \ import PromptTemplate\n\n# 链 1：积极情感\npositive_prompt_template = \"Respond positively\
  \ to the following query: {query}\"\npositive_prompt = PromptTemplate(template=positive_prompt_template,\
  \ input_variables=[\"query\"])\npositive_chain = LLMChain(llm=OpenAI(), prompt=positive_prompt)\n\
  \n# 链 2：消极情感\nnegative_prompt_template = \"Respond cautiously to the following query:\
  \ {query}\"\nnegative_prompt = PromptTemplate(template=negative_prompt_template,\
  \ input_variables=[\"query\"])\nnegative_chain = LLMChain(llm=OpenAI(), prompt=negative_prompt)\n\
  \n# 基于情感分析的条件链\nsentiment_conditions = [\n    (\"positive\", positive_chain),\n\
  \    (\"negative\", negative_chain),\n]\n\nconditional_chain = ConditionalChain.from_conditions(\n\
  \    conditions=sentiment_conditions,\n    default_chain=positive_chain,\n    input_key=\"\
  query\",\n    output_key=\"response\",\n)\n```\n\n\n\n"
