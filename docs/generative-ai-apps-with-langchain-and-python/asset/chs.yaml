- "# 第 11 章 使用 Streamlit 构建和部署类 ChatGPT 应用\n\n## 延伸阅读\n\n通过探索这些资源，你可以加深理解，并提升使用`Streamlit`和`LangChain`构建、部署及管理\
  \ AI 驱动应用的能力。\n\n## 搭建开发环境\n\n- **Streamlit 文档：入门指南**：提供安装和设置`Streamlit`的全面指导，包括基本概念和教程。\
  \  \n  [`docs.streamlit.io/`](https://docs.streamlit.io/)\n- **Python 虚拟环境**：了解如何创建和管理虚拟环境，以保持依赖项的隔离。\
  \  \n  [`docs.streamlit.io/`](https://docs.streamlit.io/)\n\n## 在桌面端运行 Streamlit\n\
  \n- **Streamlit 命令**：探索用于运行和部署`Streamlit`应用的各种命令和选项。  \n  [`docs.streamlit.io/develop/api-reference/cli`](https://docs.streamlit.io/develop/api-reference/cli)\n\
  \n### 安装 Streamlit 库\n\n- **Streamlit 安装指南**：使用不同包管理器安装`Streamlit`的分步说明。  \n  [`docs.streamlit.io/get-started/installation`](https://docs.streamlit.io/get-started/installation)\n\
  \n## 创建和使用语言模型\n\n- **OpenAI GPT-3 文档**：关于使用 OpenAI GPT-3 的详细文档，包括 API 参考和使用示例。\
  \  \n  [`platform.openai.com/docs/introduction`](https://platform.openai.com/docs/introduction)\n\
  - **LangChain 文档**：使用`LangChain`构建和管理语言模型应用的深入指南。  \n  [`langchain.readthedocs.io/en/latest/`](https://langchain.readthedocs.io/en/latest/)\n\
  \n## 处理用户输入\n\n- **Streamlit 小部件**：`Streamlit`提供的用于处理用户输入和交互的小部件完整列表。  \n  [`docs.streamlit.io/develop/api-reference/widgets`](https://docs.streamlit.io/develop/api-reference/widgets)\n\
  \n## 聊天历史初始化\n\n- **在 Streamlit 中管理状态**：了解如何在`Streamlit`应用中管理状态，以在用户交互过程中维护信息。 \
  \ \n  [`docs.streamlit.io/develop/api-reference/caching-and-state/st.session_state`](https://docs.streamlit.io/develop/api-reference/caching-and-state/st.session_state)\n\
  \n## 部署应用\n\n- **部署 Streamlit 应用**：将`Streamlit`应用部署到云或其他托管服务的指南。  \n  [`docs.streamlit.io/deploy/streamlit-community-cloud/deploy-your-app`](https://docs.streamlit.io/deploy/streamlit-community-cloud/deploy-your-app)\n\
  \n## GitHub 集成\n\n- **GitHub 入门**：学习如何使用 GitHub 进行版本控制和协作。  \n  [`docs.github.com/en/get-started/start-your-journey/hello-world`](https://docs.github.com/en/get-started/start-your-journey/hello-world)\n\
  - **使用环境变量**：使用环境变量管理 API 密钥和其他敏感信息的最佳实践。  \n  [`12factor.net/config`](https://12factor.net/config)\n\
