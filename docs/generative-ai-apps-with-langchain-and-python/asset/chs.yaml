  \n### 动手尝试\n\n请记住，选择正确的检索器取决于你的具体用例和数据性质。请大胆尝试并探索不同的选项，以找到最适合你的方案。\n\n"
- "# 索引\n\n在本节中，让我们讨论索引在管理文档方面的强大功能。LangChain 索引 API 允许你加载文档并使其与向量存储保持同步，同时避免重复内容、重写未更改的文档以及不必要地重新计算嵌入。这一切都是为了节省你的时间和金钱，同时改进你的向量搜索结果。\n\
  \n在底层，索引 API 使用一个 `RecordManager`，它通过计算每个文档的哈希值并存储一些关键信息（如下所示）来跟踪对向量存储的文档写入操作：\n\
  \n- 文档哈希（页面内容和元数据的唯一指纹）\n- 写入时间（文档添加或更新的时间）\n- 源 ID（一种标识文档原始来源的方式）\n\n你还可以使用索引 API\
  \ 提供的删除模式来控制索引新文档时如何处理现有文档。\n\n你可以从以下模式中选择：\n\n1. **无**：此模式让你可以自由地手动管理内容，因为 API\
  \ 不会执行任何自动清理。\n2. **增量**：如果源文档或派生文档发生更改，此模式会持续清理内容的先前版本。\n3. **完整**：此模式在索引过程结束时执行彻底清理，删除当前索引批次中不再存在的任何文档。\n\
  \n这些删除模式有助于确保你的向量存储保持精简。\n\n## 关键要点\n\n在本章中，你探索了检索增强生成（RAG），这是一种通过检索引入额外上下文来增强大型语言模型（LLM）的强大技术。\n\
  \n以下是我们的学习内容。\n\n**理解 RAG**：我们定义了 RAG，并理解了它在增强 LLM 方面的重要性，尤其是在需要最新或特定领域知识的情况下。我们看到了\
  \ RAG 如何减少幻觉、进行事实核查、提供特定领域知识以及增强 LLM 的响应。\n\n**RAG 架构**：我们研究了 RAG 的两个主要组成部分——索引与检索和生成。索引组件涉及加载、拆分和存储数据，而检索和生成组件则涉及检索相关数据并生成答案。\n\
  \n**实现 RAG**：我们探索了使用 LangChain、Pinecone 和 OpenAI 实现 RAG 的实践方法。我们学习了如何设置知识库、实现检索以及使用\
  \ RAG 开发问答应用程序。\n\n## 复习题\n\n1. 检索增强生成（RAG）的主要目的是什么？\n   - A. 提高 LLM 响应的速度\n   -\
  \ B. 将基于检索的方法与大型语言模型相结合，以提高生成响应的准确性和相关性\n   - C. 减小 LLM 模型的规模\n   - D. 增加 LLM 模型的训练时间\n\
  \n2. 以下哪些组件是 RAG 架构的一部分？\n   - A. 索引与检索和生成\n   - B. 分词与归一化\n   - C. 加密与解密\n   -\
  \ D. 缓存与日志记录\n\n3. RAG 过程中的嵌入阶段涉及什么？\n   - A. 清理文本并删除无关信息\n   - B. 将转换后的数据转换为称为嵌入的数值表示\n\
  \   - C. 从源获取数据并将其格式化为可处理的形式\n   - D. 将嵌入存储在数据库中\n\n4. 哪个 LangChain 组件负责将文本拆分成更小的块？\n\
  \   - A. 文档加载器\n   - B. 文本分割器\n   - C. 向量存储\n   - D. 检索器\n\n5. 使用 `CacheBackedEmbeddings`\
  \ 类的目的是什么？\n   - A. 将嵌入存储在远程服务器上\n   - B. 缓存嵌入以避免重新计算它们\n   - C. 将文本转换为嵌入\n   -\
  \ D. 存储文档元数据\n\n6. 哪个向量存储被提及支持异步操作？\n   - A. Chroma\n   - B. Milvus\n   - C. Qdrant\n\
