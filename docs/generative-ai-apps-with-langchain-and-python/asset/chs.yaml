  \ **终点**：然后你通过将最终响应发送回用户来完成对话流程。\n\n### 步骤中的内部组件\n\n在此示例中，内部组件（`LLM`、提示、工具）在每个步骤中协同工作，而高级组件（触发器、步骤、决策点、终点）定义了链的整体结构和流程。\n\
