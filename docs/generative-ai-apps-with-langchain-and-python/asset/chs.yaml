- "# 运行链以获取响应\n\n`response = chain.run(algorithm=\"machine learning\", language=\"\
  french\")`\n`print(response)`\n\n你将收到一段关于机器学习的简短法语回复。\n\n看到使用提示模板有多简单了吗？它们让你能够轻松创建动态提示，使代码更具可读性和可维护性。\n\
  \n### 使用提示模板的优势\n\n在进入下一节关于示例选择器的内容之前，让我们回顾一下上一个示例中使用提示模板的一些优势：\n\n- **一致性**：确保输入到语言模型的内容遵循一致的结构和格式。这也使语言模型能够以更可预测、更有条理的方式理解和处理输入。\n\
  - **可复用性**：提示模板是可复用的，因为它与调用模型的代码相分离。因此，同一个模板可以跨多个模型以及代码中的其他位置使用。\n- **可定制性**：你可以通过在提示模板中使用占位符或变量来定制输入到语言模型的内容。在运行时，你可以动态填充相关信息。\n\
  - **改进的微调**：你可以引导语言模型生成符合你期望的格式、风格或内容的响应。实际上，提示模板充当了一种微调形式，让你能够根据模板的结构和内容来控制语言模型的输出。\n\
  - **可维护性**：将提示模板与代码分离，可以提高代码库的可读性和可维护性。\n\n## 示例选择器\n\n有时，你需要给大语言模型一点指导，才能获得你想要的特定输出。这时就需要用到示例选择器了！\n\
  \n你可以使用示例选择器向大语言模型提供示例，帮助它理解期望的输出格式和模式。通过向模型展示相关示例，你可以引导它生成更准确、更恰当的响应。这种技术被称为**少样本学习**。示例选择器能帮助你挑选出最适合当前任务、能最好地指导语言模型的示例。\n\
  \n### 为提示选择正确的示例\n\n示例选择器接收输入变量，并选出一组最适合给定输入的示例。\n\n想象一下，你正在构建一个根据用户偏好生成个性化锻炼计划的系统。假设你有一个针对不同用户偏好（如健身水平和目标）的示例锻炼计划数据集。当用户提供他们的偏好时，你希望选择最相关的示例包含在提示中。\n\
  \n以下是示例选择器的一个简化实现。\n\n### 定义 `BaseExampleSelector` 类\n\n首先，你必须定义示例选择器的接口：\n\n```python\n\
  class BaseExampleSelector(ABC):\n    \"\"\"用于选择要包含在提示中的示例的接口。\"\"\"\n\n    @abstractmethod\n\
  \    def select_examples(self, input_variables: Dict[str, str]) -> List[dict]:\n\
  \        \"\"\"根据输入选择要使用的示例。\"\"\"\n\n    @abstractmethod\n    def add_example(self,\
  \ example: Dict[str, str]) -> Any:\n        \"\"\"向存储中添加新示例。\"\"\"\n```\n\n这是一个抽象基类，为我们的示例选择器定义了接口。\n\
  \n你需要在继承自 `BaseExampleSelector` 的类中实现抽象方法 `select_examples`。它接收一个输入变量字典，并返回一个所选示例的列表。\n\
  \n你可以通过实现 `add_example` 方法向示例选择器的存储中添加新示例。\n\n请注意，你需要从 `abc` 模块导入 `ABC` 和 `abstractmethod`。你还应该从\
  \ `typing` 模块导入必要的类型以进行类型提示。\n\n### 创建示例列表\n\n以下是将英语单词翻译成意大利语的示例输入和输出列表。每个示例都表示为一个包含\
  \ `\"input\"` 和 `\"output\"` 键的字典：\n\n\n\n"
- "# 第 5 章 掌握创意内容的提示词技巧\n\n## 示例\n\n```python\nexamples = [\n    {\"input\": \"hi\"\
  , \"output\": \"ciao\"},\n    {\"input\": \"bye\", \"output\": \"arrivaderci\"},\n\
  \    {\"input\": \"soccer\", \"output\": \"calcio\"},\n]\n```\n\n### 实现自定义示例选择器\n\
  \n接下来，你将开发一个`BaseExampleSelector`类的自定义实现。\n\n使用`__init__`方法，用示例列表初始化示例选择器。\n\n通过`add_example`方法，你可以向示例选择器的示例列表中添加新示例。\n\
  \n`select_examples`方法会选择与输入单词长度最接近的示例。它会遍历每个示例，计算输入单词与示例输入之间的长度差，并记录长度差最小的示例。\n\n\
  ```python\nclass CustomExampleSelector(BaseExampleSelector):\n    def __init__(self,\
  \ examples):\n        self.examples = examples\n\n    def add_example(self, example):\n\
  \        self.examples.append(example)\n\n    def select_examples(self, input_variables):\n\
  \        new_word = input_variables[\"input\"]\n        new_word_length = len(new_word)\n\
  \        best_match = None\n        smallest_diff = float(\"inf\")\n        for\
  \ example in self.examples:\n            current_diff = abs(len(example[\"input\"\
  ]) - new_word_length)\n            if current_diff < smallest_diff:\n          \
  \      smallest_diff = current_diff\n                best_match = example\n    \
  \    return [best_match]\n```\n\n### 使用自定义示例选择器\n\n这里，你将使用示例列表创建一个`CustomExampleSelector`实例：\n\
  \n```python\nexample_selector = CustomExampleSelector(examples)\n```\n\n然后，你调用`select_examples`方法，传入输入单词`\"\
  okay\"`，以获取最匹配的示例：\n\n```python\nexample_selector.select_examples({\"input\": \"\
  okay\"})\n```\n\n输出结果为`[{'input': 'bye', 'output': 'arrivaderci'}]`。\n\n接着，你使用`add_example`方法添加一个新示例：\n\
  \n```python\nexample_selector.add_example({\"input\": \"hand\", \"output\": \"mano\"\
  })\n```\n\n你再次用相同的输入单词调用`select_examples`，查看更新后的结果：\n\n```python\nexample_selector.select_examples({\"\
  input\": \"okay\"})\n```\n\n现在，修改后的输出为`[{'input': 'hand', 'output': 'mano'}]`。\n\
  \n### 在提示词中使用示例选择器\n\n以下是在提示词中使用示例选择器的代码。这里，你从 LangChain 导入必要的类来创建提示词模板：\n\n```python\n\
  from langchain_core.prompts.few_shot import FewShotPromptTemplate\nfrom langchain_core.prompts.prompt\
  \ import PromptTemplate\n```\n\n你使用`PromptTemplate.from_template`方法定义一个`example_prompt`，它指定了提示词中每个示例的格式：\n\
  \n```python\nexample_prompt = PromptTemplate.from_template(\"Input: {input} -> Output:\
  \ {output}\")\n```\n\n你使用自定义示例选择器、示例提示词、后缀、前缀和输入变量创建一个`FewShotPromptTemplate`：\n\
  \n```python\nprompt = FewShotPromptTemplate(\n    example_selector=example_selector,\n\
  \    example_prompt=example_prompt,\n    suffix=\"Input: {input} -> Output:\",\n\
  \    prefix=\"Translate the following words from English to Italian:\",\n    input_variables=[\"\
  input\"],\n)\n```\n\n最后，你使用提示词模板的`format`方法，生成一个包含输入单词`\"word\"`的提示词：\n\n```python\n\
  print(prompt.format(input=\"word\"))\n```\n\n现在，你已经了解了如何创建一个自定义示例选择器，该选择器根据示例与输入单词在长度上的相似性进行选择。然后，该示例选择器被用于提示词模板中，以生成用于将英语单词翻译成意大利语的提示词。你应该能够使用相同的方法，为类似的用例创建自定义示例选择器。\n\
  \n### 选择合适的示例选择器\n\n你可以选择不同类型的示例选择器：\n\n#### 1. 相似度示例选择器\n\n相似度示例选择器利用输入与可用示例之间的语义相似性，在提示词中选择相似度得分最高的示例。当你希望向语言模型提供与输入语义相近的示例，以生成更相关的输出时，这非常有用。\n\
  \n#### 2. MMR（最大边际相关性）示例选择器\n\n\n\n## 示例选择器\n\n## MMR 示例选择器\n\n`MMR` 示例选择器旨在平衡所选示例的相关性和多样性。它使用了最大边际相关性的概念，同时考虑了输入与示例之间的相似性以及所选示例之间的差异性。这种方法确保所选示例不仅与输入相关，而且具有多样性，从而减少冗余并增加对输入相关不同方面的覆盖。\n\
  \n## 长度示例选择器\n\n`Length` 示例选择器专注于根据指定长度约束内能容纳的示例数量来选择示例。当您的上下文窗口有限或想要控制提示的大小时，此示例选择器非常有用。这有助于在遵守长度约束的同时，为语言模型提供多样化的示例集。\n\
  \n## Ngram 示例选择器\n\n`Ngram` 示例选择器利用输入与示例之间的 ngram 重叠来决定选择哪些示例。ngram 是来自给定文本的 n 个连续项（单词或字符）的序列。通过考虑\
  \ ngram 重叠，该选择器倾向于选择与输入共享常见短语或单词序列的示例，从而可能提高模型生成相关输出的能力。\n\n### 选择示例选择器时的考量因素\n\n\
  在选择示例选择器时，请考虑以下因素：\n\n- **相关性**：如果生成高度相关的输出至关重要，则`Similarity`或`MMR`示例选择器可能是合适的选择。\n\
  - **多样性**：如果您希望覆盖与输入相关的不同方面，`MMR`示例选择器可以帮助平衡相关性和多样性。\n- **长度约束**：如果您的提示有严格的长度限制，`Length`示例选择器可以帮助选择符合这些约束的示例。\n\
  - **短语匹配**：如果您希望强调与输入共享常见短语或单词序列的示例，`Ngram`示例选择器会很有效。\n\n## 少样本提示模板\n\n少样本提示模板是一种技术，模型通过极有限的训练数据来学习执行任务。它涉及提供少量示例（样本）来帮助模型理解任务上下文和期望的输出格式。图\
  \ 5-1 展示了少样本学习的工作原理。\n\n***图 5-1.** 少样本学习的工作原理*\n\n`LangChain` 提供了一个方便的 `FewShotPromptTemplate`\
  \ 类，使得处理示例更加容易。\n\n### 为问答任务构建少样本提示模板\n\n在本节中，您将学习如何创建一个少样本提示模板，该模板教导语言模型根据一组示例生成自问问题并搜索答案。\n\
  \n#### 第 1 步：准备示例集\n\n首先，创建一个少样本示例列表。每个示例应是一个包含问题及其对应答案的字典：\n\n```python\nexamples\
  \ = [\n    {\n        \"question\": \"What is the largest planet in our solar system?\"\
  ,\n        \"answer\": \"Jupiter is the largest planet in our solar system.\"\n\
  \    },\n    {\n        \"question\": \"Who painted the Mona Lisa?\",\n        \"\
  answer\": \"The Mona Lisa was painted by Leonardo da Vinci.\"\n    },\n    {\n \
  \       \"question\": \"What is the currency of Japan?\",\n        \"answer\": \"\
  The currency of Japan is the Japanese yen.\"\n    }\n]\n```\n\n#### 第 2 步：格式化少样本示例\n\
  \n接下来，使用 `PromptTemplate` 将示例格式化为将呈现给语言模型的字符串。它将问题和答案作为输入变量，并将其格式化为字符串：\n\n```python\n\
  from langchain.prompts import PromptTemplate\n\nexample_prompt = PromptTemplate(\n\
  \    input_variables=[\"question\", \"answer\"],\n    template=\"Question: {question}\\\
  nAnswer: {answer}\"\n)\n\n# Test the formatting by printing the first example\n\
  print(example_prompt.format(**examples[0]))\n```\n\n**输出：**\n\n```\nQuestion: What\
  \ is the largest planet in our solar system?\nAnswer: Jupiter is the largest planet\
  \ in our solar system.\n```\n\n#### 第 3 步：创建少样本提示模板\n\n现在，您将创建一个 `FewShotPromptTemplate`，它将作为语言模型从提供的示例中学习的框架。\n\
  \n此代码使用示例和格式化后的示例提示创建了一个 `FewShotPromptTemplate`。它还指定了一个将附加到示例和输入变量之后的后缀：\n\n```python\n\
  from langchain.prompts import FewShotPromptTemplate\n\nprompt = FewShotPromptTemplate(\n\
  \    examples=examples,\n    example_prompt=example_prompt,\n    suffix=\"Question:\
  \ {input}\",\n    input_variables=[\"input\"]\n)\n\n# Preview the formatted template\n\
  print(prompt.format(input=\"What is the capital of Australia?\"))\n```\n\n**输出：**\n\
  \n```\nQuestion: What is the largest planet in our solar system?\nAnswer: Jupiter\
  \ is the largest planet in our solar system.\n\nQuestion: Who painted the Mona Lisa?\n\
  Answer: The Mona Lisa was painted by Leonardo da Vinci.\n\nQuestion: What is the\
  \ currency of Japan?\nAnswer: The currency of Japan is the Japanese yen.\n\nQuestion:\
  \ What is the capital of Australia?\n```\n\n#### 第 4 步（可选）：使用示例选择器选择示例\n\n如果您有大量示例，可以使用示例选择器。此代码初始化了一个\
  \ `LengthBasedExampleSelector`，它根据示例的长度进行选择。它接受示例、示例提示和最大长度作为参数。您可以选择自己偏好的选择器。\n\
  \n```python\n# Initialize the selector with your examples\nexample_selector = LengthBasedExampleSelector(\n\
  \    examples=examples,\n    example_prompt=example_prompt,\n    max_length=50\n\
  )\n\n# Find the most relevant example for a new question\nselected_examples = example_selector.select_examples(\n\
  \    {\"question\": \"Who sculpted the Statue of David?\"}\n)\n```\n\n请记得导入以下内容：\n\
  \n```python\nfrom langchain.prompts import FewShotPromptTemplate, PromptTemplate\n\
  from langchain.prompts.example_selector import LengthBasedExampleSelector\n```\n\
  \n上面这行代码使用 `LengthBasedExampleSelector`，根据问题“Who sculpted the Statue of David?”选择了最相关的示例。然后，所选示例被用于创建一个新的\
  \ `FewShotPromptTemplate`，该模板整合了下面的示例选择器。\n\n**让我们讨论一下 `LengthBasedExampleSelector`\
  \ 的工作原理。**\n\n在初始化 `LengthBasedExampleSelector` 时，您需要提供示例列表（`examples`）、示例提示模板（`example_prompt`）以及所选示例的最大长度（`max_length`）。\n\
  \n调用 `select_examples` 方法时，会传入一个包含问题“Who sculpted the Statue of David?”的输入字典。然而，对于\
  \ `LengthBasedExampleSelector` 来说，输入问题并不用于基于相关性选择示例。\n\n`LengthBasedExampleSelector`\
  \ 会遍历示例列表，并根据示例的长度进行选择。它尝试包含尽可能多的示例，同时确保所选示例的总长度不超过指定的 `max_length`。其目标是在指定的长度限制内最大化包含的示例数量。\n\
  \n#### 第 5 步（可选）：将示例选择器集成到提示模板中\n\n通过将示例选择器集成到提示模板中，所选示例会根据与输入问题的相关性动态地包含在提示中。这种方法允许更有针对性和更高效地使用示例，从而提高生成回复的质量和相关性。\n\
