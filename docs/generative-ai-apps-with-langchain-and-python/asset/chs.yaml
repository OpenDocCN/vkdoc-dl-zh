  \n## 链的类型\n\n现在你已经了解了基本组件，让我们探索在`LangChain`中你将看到的两种主要链类型：`LCEL`（`LangChain`执行语言）链和传统链。将`LCEL`链视为更现代、更灵活的链，而传统链则更直接，适用于较简单的任务。\n\
