  \ import PromptTemplate\nfrom langchain.chains import load_chain\n\ntemplate = \"\
  What is the capital of {country}?\"\nprompt = PromptTemplate(template=template,\
  \ input_variables=[\"country\"])\nchain = load_chain(\"llm_chain\", llm=OpenAI(),\
  \ prompt=prompt)\nresult = chain.run(\"France\")\n```\n\n#### 传统链示例\n\n以下是一个传统链的简单示例：\n\
  \n\n\n#### 传统链\n\n`from langchain.chains import LLMChain`\n\n`from langchain.prompts\
  \ import PromptTemplate`\n\n## 第 6 章 使用链构建智能聊天机器人与自动化分析系统\n\n`template = \"What\
  \ is the capital of {country}?\"`\n\n`prompt = PromptTemplate(template=template,\
  \ input_variables=[\"country\"])`\n\n`chain = LLMChain(llm=llm, prompt=prompt)`\n\
  \n`result = chain.run(\"France\")`\n\n如果你的代码因版本问题无法运行，也可以尝试 `chain = prompt | llm`。使用\
  \ `chain.invoke(\"France\")` 即可生效。\n\n如你所见，传统链是通过 `LLMChain` 类构建的，而 LCEL 链则使用 `load_chain`\
  \ 函数加载。LCEL 链提供了更简洁、更灵活的方式。该链由一个 OpenAI 大语言模型和一个提示模板组成。LCEL 链支持流式传输、异步执行和自动可观测性等高级功能，使其成为大多数现代应用的首选。\n\
  \n那么，你应该选择哪一种呢？接下来我们讨论一下。\n\n### 何时使用不同类型的链\n\n我们来讨论每种链适用的常见场景。\n\n#### LCEL 链\n\
  \n以下是 LCEL 更适用的几种情况：\n\n1. 当你需要定义复杂逻辑，并对步骤间的数据流有更高控制要求时，请使用 LCEL。\n2. 如果你处理的是大型数据集，或需要实时处理数据，请使用\
  \ LCEL，因为它支持流式传输、异步执行和并行化。\n3. 当你需要集成外部 API、数据库或服务时，请使用 LCEL 链来包含自定义工具和插件。\n\n####\
  \ 传统链\n\n在以下情况下使用传统链：\n\n- 当你的用例简单直接，不需要复杂逻辑或自定义集成时，请使用传统链。它们非常适合快速原型设计和实验。\n- 如果你处理的是定义明确且稳定的数据集。\n\
  - 当你刚开始接触 LangChain，想初步了解链的工作原理时，传统链是一个很好的起点。\n\n## 使用 LCEL 链进行构建\n\n既然我们已经讨论了何时使用\
  \ LCEL 链，接下来就讨论如何创建它们。在构建 LCEL 链时，主要需要考虑两个方面，即构建链本身，然后根据需求对其进行定制。\n\n![](img/index-240_1.jpg)\n\
  \n### 构建 LCEL 链\n\n要构建一个 LCEL 链，你通常会使用 `load_chain` 函数，该函数负责用必要的组件（如语言模型、提示和工具）来初始化链。以下是一个简单示例：示例中提供的\
  \ `\"llm_chain\"` 模板可能会引起混淆，因为它可能并不直接存在于用户安装的 LangChain 中。这可能会让人误以为该模板是预定义的，但实际上，`load_chain`\
  \ 函数可能需要自定义的链定义，而不是像 `\"llm_chain\"` 这样的预构建链。让我们调整一下解释，使其更清晰并回应这一评论。\n\n**更新后的解释：**\n\
  \n要在 LangChain 中构建一个链，你通常会使用 `load_chain` 函数，该函数通过连接语言模型、提示和工具等必要组件来初始化链。然而，具体的链模板（例如本例中的\
  \ `\"llm_chain\"`）需要事先创建，或者从你在项目中定义的自定义设置中加载。LangChain 本身并不提供像 `\"llm_chain\"` 这样的预定义链。\n\
  \n以下是如何在不依赖 `load_chain` 的情况下手动创建一个简单的自定义链：\n\n```\nfrom langchain.llms import OpenAI\n\
  from langchain.prompts import PromptTemplate\nfrom langchain.chains import LLMChain\n\
  \n# 步骤 1：初始化你的语言模型\nllm = OpenAI(temperature=0.9)\n\n# 步骤 2：定义一个提示模板\nprompt = PromptTemplate(\n\
  \    input_variables=[\"product\"],\n    template=\"What is a good name for a company\
  \ that makes {product}?\",\n)\n```\n\n\n\n"
- "# 步骤 3：使用 `LLMChain` 类手动构建链\n\n`chain = LLMChain(llm=llm, prompt=prompt)`\n\n在此示例中，您正在使用\
  \ `llm_chain` 模板构建一个 LCEL 链。您提供了一个 OpenAI 语言模型（`llm`）和一个提示模板（`prompt`）作为参数，以自定义链的行为。\n\
  \n### 自定义 LCEL 链\n\n构建好 LCEL 链后，下一步就是对其进行自定义。LCEL 链易于自定义是其最大的优势之一。您可以定制链的每个方面，以满足您的特定需求。\n\
  \n让我们探索几种自定义 LCEL 链的方法：\n\n- **添加自定义逻辑**：您可以通过定义自己的函数或类，并将其包含在链的工作流程中，在 LCEL 链的步骤之间添加自定义逻辑。这允许您执行特定的数据转换或应用业务规则。\n\
  - **集成外部服务**：您可以使用工具与 API、数据库或第三方库进行交互。您只需定义必要的参数和身份验证详细信息，LangChain 将处理其余部分。\n\
  - **修改提示模板**：LCEL 链允许您使用变量、条件逻辑轻松定义和修改提示模板，甚至可以根据输入数据生成动态提示。\n\n以下是自定义 LCEL 链的示例：\n\
  \n```python\nfrom langchain.llms import OpenAI\nfrom langchain.prompts import PromptTemplate\n\
  from langchain.chains import load_chain\nfrom langchain.tools import APITool\n\n\
  llm = OpenAI(temperature=0.9)\nprompt = PromptTemplate(\n    input_variables=[\"\
  product\"],\n    template=\"What is a good name for a company that makes {product}?\"\
  ,\n)\napi_tool = APITool(api_url=\"https://example.com/api\")\nchain = load_chain(\"\
  llm_chain\", llm=llm, prompt=prompt, tools=[api_tool])\n```\n\n在此示例中，我们通过添加一个 `APITool`\
  \ 来与外部 API 交互，从而自定义 LCEL 链。我们定义了 `api_url` 参数来指定 API 端点，并在构建链时将工具包含在 `tools` 列表中。\n\
  \n### 执行 LCEL 链\n\n构建并自定义好 LCEL 链后，就该让它运行起来了。您可以使用各种执行模式来适应不同的场景并优化性能。下面让我们探讨三种主要的执行模式。\n\
  \n### 流式执行\n\n处理大型数据集时，您无需等待整个数据集加载到内存中，而是可以在数据到达时进行处理。您可以处理实时数据流，也可以分块处理数据。\n\n\
  要启用流式执行，您可以在调用链时使用 `streaming=True` 参数。操作如下：\n\n`chain.run({\"product\": \"smartphone\"\
  }, streaming=True)`\n\n### 异步执行\n\n借助异步执行，您可以同时运行多个任务，充分利用系统资源。这样，您可以并行执行多个独立的任务。\n\
  \n要使用异步执行，您可以利用 LCEL 链提供的 `arun` 方法。示例如下：\n\n```python\nimport asyncio\n\nasync\
  \ def generate_names(product):\n    return await chain.arun({\"product\": product})\n\
  \nproduct_names = asyncio.run(generate_names(\"smartphone\"))\n```\n\n### 批量执行\n\
  \n您可以使用批量执行在单次调用链时处理多个输入。这可以通过减少多次单独调用的开销来显著提高性能。\n\n要执行批量执行，您需要向链的 `apply` 方法传递一个输入列表。示例如下：\n\
  \n```python\nproducts = [\"smartphone\", \"laptop\", \"smartwatch\"]\nproduct_names\
  \ = chain.apply([{\"product\": product} for product in products])\n```\n\n## LCEL\
  \ 链的可观测性\n\n在构建和调试 LCEL 链时，可观测性至关重要。您可以深入了解链的内部工作原理，跟踪数据流，并识别潜在的瓶颈或问题。\n\nLCEL 链提供了内置的可观测性功能，例如日志记录和追踪。您可以访问链中每个步骤的详细日志和追踪信息，例如输入和输出数据、执行时间以及可能发生的任何错误或异常。\n\
  \n要在 LCEL 链中启用可观测性，您可以在构建链时使用 `verbose=True` 参数。示例如下：\n\n`chain = load_chain(\"\
  llm_chain\", llm=llm, prompt=prompt, verbose=True)`\n\n使用 `RunnableSequence` 时，您的代码可能如下所示：\n\
  \n```python\nfrom langchain.globals import set_debug\nset_debug(True)\n```\n\n一旦启用了可观测性，您就可以轻松监控链的执行情况，并获得有价值的见解，用于调试和优化。\n\
  \n### LCEL 链的类型\n\n让我们讨论一下 LangChain 文档中提到的几种 LCEL 链类型，我已将其整理成表格。\n\n| 链 | 使用时机\
  \ | 构造函数 |\n|-------|-------------|-------------|\n| `create_stuff_documents_chain`\
  \ | 当您想将文档列表格式化为提示并传递给 LLM 时，此链是您的首选。只需确保文档适合您所使用的 LLM 的上下文窗口即可。 | `create_stuff_documents_chain`\
  \ |\n| `create_openai_fn_runnable` | 如果您想使用 OpenAI 函数调用来可选地结构化输出响应，这是您的首选链。您可以传入多个函数，但不要求全部调用。\
  \ | `create_openai_fn_runnable` |\n| `create_structured_output_runnable` | 当您想使用\
  \ OpenAI 函数调用来强制 LLM 使用特定函数进行响应时，这是您的首选链。您只能传入一个函数，并且该链将始终返回此响应。当您每次都需要结构化输出时，这非常有用。\
  \ | `create_structured_output_runnable` |\n| `load_query_constructor_runnable` |\
  \ 此链用于生成查询。您指定一个允许的操作列表，它会返回一个可运行对象，该对象将自然语言查询转换为这些操作。 | `load_query_constructor_runnable`\
  \ |\n| `create_sql_query_chain` | 当您想根据自然语言为 SQL 数据库构建查询时，可以使用此链。无需再与复杂的 SQL 语法作斗争！\
  \ | `create_sql_query_chain` |\n| `create_history_aware_retriever` | 此链接收对话历史记录，并使用它来生成搜索查询，然后将该查询传递给底层的检索器。\
  \ | `create_history_aware_retriever` |\n| `create_retrieval_chain` | 当您想根据用户查询检索相关文档时，此链是您的首选。它接收用户的输入，将其传递给检索器以获取相关文档，然后将这些文档与原始输入结合起来，使用\
  \ LLM 生成响应。 | `create_retrieval_chain` |\n\n## 使用查询构造函数链生成命令\n\n现在，让我们看一个如何在代码中使用\
  \ `load_query_constructor_runnable` 链的示例：\n\n```python\nfrom langchain.chains import\
  \ load_query_constructor_runnable\n\n# 定义允许的操作\nallowed_operations = [\"search\"\
  , \"filter\", \"sort\"]\n\n# 加载查询构造函数链\nquery_constructor = load_query_constructor_runnable(allowed_operations)\n\
  ```\n\n\n\n"
- "# 使用查询构造器将自然语言转换为允许的操作\n\n`natural_language_query = \"查找所有价格低于 100 美元的产品并按价格排序\"\
  `  \n`structured_query = query_constructor(natural_language_query)`  \n`print(structured_query)`\n\
  \n在此示例中，我们定义了一个允许的操作列表：\"搜索\"、\"筛选\"和\"排序\"。然后加载`query_constructor_runnable`链，并传入允许的操作。该链接收自然语言查询，并将其转换为指定的允许操作。\n\
  \n您提供自然语言查询：\"查找所有价格低于 100 美元的产品并按价格排序\"。`query_constructor`链处理此查询，并基于允许的操作返回结构化查询。\n\
  \n以下是您将获得的输出：\n\n```\n{\n  \"operations\": [\n    {\n      \"operation\": \"search\"\
  ,\n      \"query\": \"products\"\n    },\n    {\n      \"operation\": \"filter\"\
  ,\n      \"condition\": \"price < 100\"\n    },\n    {\n      \"operation\": \"\
  sort\",\n      \"key\": \"price\"\n    }\n  ]\n}\n```\n\n在上述示例中，自然语言查询被转换为包含特定操作（如\"\
  搜索\"、\"筛选\"和\"排序\"）的结构化查询。这种结构化格式更易于您的应用程序处理和执行。\n\n## 使用传统链进行构建\n\n构建传统链是一个直接的过程。您只需创建所需链类的实例，并提供必要的参数。您需要查阅所用特定链的文档，因为每个链都有自己的一套必需参数和可选参数。\n\
  \n### 构建传统链\n\n以下是构建传统链的示例：\n\n```python\nfrom langchain.chains import LLMChain\n\
  from langchain.llms import OpenAI\n\nllm = OpenAI(temperature=0.9)\nchain = LLMChain(llm=llm,\
  \ param1=value1, param2=value2)\n```\n\n在此示例中，您导入所需的链类（`MyCustomChain`）并创建其实例。然后提供必要的参数，例如语言模型（`llm`）以及任何自定义参数（`param1`和`param2`）。\n\
  \n### 执行传统链\n\n执行传统链与构建它们一样简单。大多数传统链都提供一个`run`方法，该方法接收输入数据并返回结果。以下是一个示例：\n\n```python\n\
  result = chain.run(input_data)\nprint(result)\n```\n\n在此示例中，您只需在链实例上调用`run`方法，并传入`input_data`。链处理输入并返回结果，然后您打印该结果。\n\
  \n### 传统链的类型\n\n现在您对传统链有了基本了解，让我们探索一些最常用的链。\n\n| 链 | 使用场景 |\n|-------|-------------|\n\
  | `APIChain` | 当您想将查询转换为 API 请求、执行该请求，然后使用 LLM 解释响应时。 |\n| `OpenAPIEndpointChain`\
  \ | 类似于`APIChain`，但针对 OpenAPI 端点进行了优化。 |\n| `ConversationalRetrievalChain` | 用于与文档进行对话，利用之前的对话历史来优化查询。\
  \ |\n| `StuffDocumentsChain` | 当您有一份文档列表，且这些文档能放入 LLM 的上下文窗口时。 |\n| `ReduceDocumentsChain`\
  \ | 用于通过迭代缩减的方式并行处理大量文档。 |\n| `MapReduceDocumentsChain` | 类似于`ReduceDocumentsChain`，但在缩减文档之前会先进行一次\
  \ LLM 调用。 |\n| `RefineDocumentsChain` | 用于基于多个文档顺序优化答案。 |\n| `MapRerankDocumentsChain`\
  \ | 当您想基于置信度最高的单个文档来回答问题时。 |\n| `ConstitutionalChain` | 用于在链的答案中强制执行宪法原则。 |\n| `LLMChain`\
  \ | 用于与 LLM 交互的基本链。 |\n| `ElasticsearchDatabaseChain` | 用于对 Elasticsearch 数据库提出自然语言问题。\
  \ |\n| `FlareChain` | 一种用于探索性目的的高级检索技术。 |\n| `GraphCypherQAChain` | 用于从自然语言构建 Cypher\
  \ 查询并针对图数据库执行。 |\n| `LLMMath` | 用于将用户问题转换为数学问题并执行。 |\n| `LLMCheckerChain` | 使用第二次\
  \ LLM 调用来验证初始答案。 |\n| `LLMSummarizationChecker` | 通过多次 LLM 调用创建摘要以提高准确性。 |\n\n这些只是可用传统链中的几个示例。每个链都有其独特的优势和用例，使您能够处理广泛的任务。\n\
  \n## 使用传统链构建实际应用\n\n您可以使用传统链构建非常有效的实际生成式 AI 应用。以下是一些流行的示例。\n\n### 使用`ConversationalRetrievalChain`的文档聊天机器人应用\n\
  \n假设您想使用`ConversationalRetrievalChain`与文档进行对话。以下是一个简化示例：\n\n```python\nfrom langchain.chains\
  \ import ConversationalRetrievalChain\nfrom langchain.chat_models import ChatOpenAI\n\
  from langchain.retrievers import ContextualCompressionRetriever\n\n# 初始化检索器和 LLM\n\
  retriever = ContextualCompressionRetriever(...)\nllm = ChatOpenAI(temperature=0)\n\
  \n# 创建 ConversationalRetrievalChain\nqa = ConversationalRetrievalChain.from_llm(llm,\
  \ retriever=retriever)\n```\n\n\n\n"
