  from langchain.tools.retriever import create_retriever_tool\n\nretriever_tool =\
  \ create_retriever_tool(\n    retriever,\n    \"langsmith_search\",\n    \"搜索关于\
  \ LangSmith 的信息。对于任何关于 LangSmith 的问题，你必须使用此工具！\",\n)\n```\n\n这将创建一个具有特定名称和描述的检索器工具，使你的代理更容易理解何时以及如何使用它。\n\
  \n### 整合所有内容\n\n现在你已经准备好了工具，创建一个包含 Tavily 搜索工具和检索器工具的列表：\n\n```python\ntools = [search,\
  \ retriever_tool]\n```\n\n这允许你的代理执行在线搜索并从本地索引中查找信息。\n\n### 选择大语言模型\n\n下一步是选择将作为代理大脑的语言模型。在这个例子中，你将使用\
  \ OpenAI Functions 代理，这是一个强大且多功能的选项。\n\n首先，从 `langchain_openai` 模块导入 `ChatOpenAI`\
  \ 类并创建大语言模型实例：\n\n```python\nfrom langchain_openai import ChatOpenAI\n\nllm = ChatOpenAI(model=\"\
  gpt-3.5-turbo-0125\", temperature=0)\n```\n\n这里，你使用的是 `gpt-3.5-turbo-0125` 模型，温度为\
  \ 0。你可以根据具体需求调整这些参数。\n\n### 选择提示词\n\n接下来，你需要选择将指导代理行为的提示词。提示词在塑造代理如何与工具交互以及处理输入方面起着至关重要的作用。\n\
  \n如果你可以访问 LangSmith，可以通过访问 [`smith.langchain.com/hub/hwchase17/openai-functions-agent`](https://smith.langchain.com/hub/hwchase17/openai-functions-agent)\
  \ 来探索预定义提示词的内容。\n\n或者，你可以使用 LangChain 的 `hub` 模块来拉取提示词：\n\n```python\nfrom langchain\
  \ import hub\n\nprompt = hub.pull(\"hwchase17/openai-functions-agent\")\nprompt.messages\n\
  ```\n\n这将检索提示词模板并显示其消息，包括系统消息、聊天历史和代理草稿板的占位符以及用户输入。\n\n### 初始化代理\n\n现在，是时候通过结合我们之前定义的大语言模型、提示词和工具来初始化你的代理了。代理负责接收输入并根据该输入决定采取什么行动。需要注意的是，代理本身不执行行动——这是\
  \ `AgentExecutor` 的工作，我们将在下一步讨论。\n\n要创建代理，你将使用 `langchain.agents` 模块中的 `create_tool_calling_agent`\
  \ 函数：\n\n```python\nfrom langchain.agents import create_tool_calling_agent\n\nagent\
  \ = create_tool_calling_agent(llm, tools, prompt)\n```\n\n此函数接收大语言模型、工具列表和提示词，并返回一个已初始化的代理，随时可以处理我们的任务。\n\
  \n### 创建 AgentExecutor\n\n最后一块拼图是 `AgentExecutor`，它将代理（大脑）和工具（能力）结合在一起。`AgentExecutor`\
  \ 重复调用代理以确定下一步行动，然后执行相应的工具。\n\n要创建 `AgentExecutor`，你将使用以下代码：\n\n```python\nfrom\
  \ langchain.agents import AgentExecutor\n\nagent_executor = AgentExecutor(agent=agent,\
  \ tools=tools, verbose=True)\n```\n\n我们传入初始化的代理、工具列表，并设置 `verbose=True` 以在执行期间启用详细输出。\n\
  \n让我们测试一下代理，看看它能做什么！你将运行几个查询，并观察代理如何处理它们。请记住，目前这些查询是无状态的，意味着代理不会记住之前的交互。\n\n首先，从一个简单的问候开始：\n\
  \n```python\nagent_executor.invoke({\"input\": \"你好！\"})\n```\n\n当你运行这段代码时，代理将处理输入并生成响应。以下是我得到的结果：\n\
