  在本章中，我们将快速回顾来自主要提供商（如 OpenAI、Google、Anthropic 的 Claude、Cohere 和 Meta）的多个大型语言模型 (LLM)。为了增加趣味性，我采用了一个假设的案例研究：你的公司要求你创建一个智能、高响应性的客户服务聊天机器人，它不仅能回答简单查询，还能通过预测客户未满足的需求并做出相应回应来让客户感到惊喜。我将带你了解如何探索各种大型语言模型
  (LLM) 的过程，例如来自 OpenAI、Google、Anthropic、Cohere 和 Meta 等领先提供商的 GPT-4、Codex、DALL-E
  2 等。


  本章应能为你提供实用的技能和知识，以便在你的生成式 AI 应用程序中理解、集成和应用这些模型。


  © Rabi Jay 2024

  R. Jay, *使用 LangChain 和 Python 构建生成式 AI 应用程序*,

  [`doi.org/10.1007/979-8-8688-0882-1_4`](https://doi.org/10.1007/979-8-8688-0882-1_4)


  ## OpenAI 的模型


  让我们首先讨论 OpenAI 模型。


  ### GPT：下一代语言模型


  首先，你决定从 OpenAI 开始你的模型探索工作，因为它提供了广泛的模型，每个模型都有其独特的能力和优势。你对 GPT-4 和 GPT-4o 印象尤其深刻，它们是
  OpenAI 内外最受欢迎的大型语言模型。你的研究表明，你可以构建令人难以置信的应用程序，如聊天机器人、内容创作工具和 AI 写作助手。它们能够以惊人的准确性理解和生成类似人类的文本，这也给你留下了深刻印象，因为它们是在海量数据上训练的。


  现在你想通过调用一个 GPT 模型来进行更多研究。


  #### GPT 入门（代码片段）


  要开始使用 GPT，你需要安装 OpenAI Python 包。然后，你向 GPT-4 模型提供一个提示，并指定你希望它生成的最大令牌数（单词或子词）。你还使用温度参数来控制生成文本的创造性。温度越高，输出就越有创造性和不可预测性。


  以下是可用于调用 GPT 模型的示例代码：


