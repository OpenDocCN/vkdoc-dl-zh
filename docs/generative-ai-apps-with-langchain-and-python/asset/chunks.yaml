    \ `llm` 和 `prompt` 创建了一个 `LLMChain`，并使用产品输入运行该链，最后打印生成的公司名称。\n\n## 使用 `ConversationChain`\
    \ 构建对话应用\n\n当你需要与语言模型进行对话并跟踪对话历史时，你将使用此链。以下是一个示例：\n\n```python\nfrom langchain.chains\
    \ import ConversationChain\nfrom langchain.llms import OpenAI\n\nllm = OpenAI(temperature=0.9)\n\
    conversation = ConversationChain(llm=llm)\noutput = conversation.predict(input=\"\
    Hi, how are you?\")\nprint(output)\noutput = conversation.predict(input=\"What's\
    \ the weather like today?\")\nprint(output)\n```\n\n在此示例中，你使用一个 OpenAI 语言模型创建了一个\
    \ `ConversationChain`，然后使用 `predict` 方法与 AI 助手进行对话。该链会跟踪对话历史，并维持更自然、更具上下文关联的交互。\n\
    \n## 使用 `RetrievalQA` 构建问答应用\n\n你将使用 `RetrievalQA` 链对文档集合执行问答。以下是一个示例：\n\n```python\n\
    from langchain.chains import RetrievalQA\nfrom langchain.llms import OpenAI\n\
    from langchain.document_loaders import TextLoader\nfrom langchain.indexes import\
    \ VectorstoreIndexCreator\nfrom langchain_openai.embeddings import OpenAIEmbeddings\n\
    \nloader = TextLoader(\"path/to/documents.txt\")\nindex = VectorstoreIndexCreator().from_loaders([loader])\n\
    embedding = OpenAIEmbeddings(openai_api_key=MY_OPENAI_API_KEY)\nllm = OpenAI(temperature=0.9)\n\
    chain = RetrievalQA.from_chain_type(llm=llm, chain_type=\"stuff\", retriever=index.vectorstore.as_retriever())\n\
    query = \"What is the capital of France?\"\nresult = chain.run(query)\nprint(result)\n\
    ```\n\n在此示例中，你使用 `TextLoader` 加载了一个文档集合，然后使用 `VectorstoreIndexCreator` 创建了一个索引。接下来，你使用一个\
    \ OpenAI 语言模型实例化了一个 `RetrievalQA` 链，并将检索策略指定为 \"stuff\"。最后，你使用一个查询运行该链并打印结果。\n\
    \n## 使用 `MapReduceChain` 的文档处理应用\n\n`MapReduceChain` 通过将文档分割成块、对每个块应用映射函数，然后归约结果，帮助你并行处理文档。以下是一个示例：\n\
    \n```python\nfrom langchain.chains import MapReduceChain\nfrom langchain.chains.mapreduce\
    \ import combine_results\nfrom langchain.prompts import PromptTemplate\nfrom langchain.llms\
    \ import OpenAI\nfrom langchain.document_loaders import TextLoader\n\nloader =\
    \ TextLoader(\"path/to/documents.txt\")\ndocuments = loader.load()\nllm = OpenAI(temperature=0.9)\n\
    prompt = PromptTemplate(template=\"Summarize this text: {text}\", input_variables=[\"\
    text\"])\nchain = MapReduceChain.from_params(\n    map_prompt=prompt,\n    combine_prompt=prompt,\n\
    \    llm=llm,\n    chunk_size=1000,\n    reduce_chunk_overlap=0,\n)\nresult =\
    \ chain.run(documents)\nprint(result)\n```\n\n在此示例中，你使用 `TextLoader` 加载了一个文档集合，然后通过指定映射和合并提示、语言模型以及块大小创建了一个\
    \ `MapReduceChain`。最后，你在文档上运行该链并打印汇总结果。\n\n### 教育案例研究：使用 MapReduce 链分析教育数据\n\n\
    某教育研究机构使用 MapReduce 链处理大量学术数据，用于分析和报告。\n\n**实施**：MapReduce 链将数据集分割成可管理的块，对每个块应用分析模型，然后汇总结果，生成关于学生表现和学习趋势的综合报告。\n\
    \n**成果**：高效的处理流程缩短了研究论文的周转时间，并提供了对教育效果的更深入洞察，支持对教学策略进行有针对性的改进。\n\n## 使用链组合策略构建更复杂的工作流应用\n\
    \n我们已经了解了不同类型的链以及如何单独使用它们。在本节中，我们将探讨如何组合链以应对最复杂的工作流。\n\n链组合的核心是通过连接多个链来创建工作流。你需要先将复杂任务分解为更小、更易管理的步骤，并将每个步骤分配给特定的链。\n\
    \n让我们探索一些可用于组合链的策略，以构建复杂的真实世界生成式 AI 应用。\n\n### 使用顺序链的数据汇总应用\n\n当一个链的输出成为下一个链的输入，以创建具有线性数据处理流程的应用时，你将使用顺序链。\n\
    \n以下是一个顺序链工作流的示例：\n\n```python\nfrom langchain.chains import LLMChain, SequentialChain\n\
    from langchain.llms import OpenAI\nfrom langchain.prompts import PromptTemplate\n\
    \n# 链 1：根据主题生成关键词\ntopic_prompt_template = \"Generate relevant keywords for the\
    \ topic: {topic}\"\ntopic_prompt = PromptTemplate(template=topic_prompt_template,\
    \ input_variables=[\"topic\"])\ntopic_chain = LLMChain(llm=OpenAI(), prompt=topic_prompt)\n\
    \n# 链 2：根据关键词获取相关数据\ndata_prompt_template = \"Fetch data related to the following\
    \ keywords: {keywords}\"\ndata_prompt = PromptTemplate(template=data_prompt_template,\
    \ input_variables=[\"keywords\"])\ndata_chain = LLMChain(llm=OpenAI(), prompt=data_prompt)\n\
    \n# 链 3：汇总获取的数据\nsummary_prompt_template = \"Summarize the following data: {data}\"\
    \nsummary_prompt = PromptTemplate(template=summary_prompt_template, input_variables=[\"\
    data\"])\nsummary_chain = LLMChain(llm=OpenAI(), prompt=summary_prompt)\n\n# 按顺序组合链\n\
    sequential_chain = SequentialChain(chains=[topic_chain, data_chain, summary_chain],\
    \ input_variables=[\"topic\"], output_variables=[\"summary\"])\n```\n"
- fmt: "# Run the sequential chain\n\n`topic = \"Artificial Intelligence\"`\n\n`result\
    \ = sequential_chain({\"topic\": topic})`\n\n`print(result[\"summary\"])`\n\n\
    In this example, you have three chains: `topic_chain`, `data_chain`, and `summary_chain`.\
    \ We compose them sequentially using the `SequentialChain` class, specifying the\
    \ order in which they should be executed. The output of `topic_chain` becomes\
    \ the input for `data_chain`, and the output of `data_chain` becomes the input\
    \ for `summary_chain`.\n\nFinally, you run the sequential chain with a topic and\
    \ print the summarized result. It is as simple as that!\n\n## SequentialChain\
    \ Use Case Example 1: Customer Support Chatbot App\n\nImagine building a customer\
    \ support chatbot that can handle various types of queries. You can compose chains\
    \ to create a powerful and efficient chatbot workflow.\n\nYou can use a `RouterChain`\
    \ to route the user's query to the appropriate chain based on the intent (e.g.,\
    \ sales query, technical support, general inquiry).\n\nWithin each intent-specific\
    \ chain, use a `SequentialChain` to break down the query into smaller steps, such\
    \ as understanding the problem, retrieving relevant information, and generating\
    \ a response.\n\nIf needed, you can use a `ConditionalChain` to handle specific\
    \ cases or exceptions within each intent-specific chain.\n\n## SequentialChain\
    \ Use Case Example 2: Content Generation Pipeline App\n\nConsider a content generation\
    \ pipeline that takes a topic and generates a well-structured article. You can\
    \ compose chains to streamline the process.\n\nUse a `SequentialChain` to define\
    \ the overall pipeline flow:\n\n- Chain 1: First, generate an outline for the\
    \ article based on the topic.\n- Chain 2: For each outline point, generate a detailed\
    \ paragraph.\n- Chain 3: Then, combine the generated paragraphs into a coherent\
    \ article.\n- Chain 4: Finally, proofread and refine the article.\n\nWithin each\
    \ step of the sequential chain, you can use additional chains or tools to enhance\
    \ the generation process, such as retrieving relevant information from a knowledge\
    \ base or applying language models for text refinement.\n\n## SequentialChain\
    \ Use Case Example 3: Automated Fraud Detection in Finance\n\nA financial institution\
    \ integrated `SequentialChain`s to enhance its fraud detection systems, automating\
    \ the analysis of transaction patterns for signs of fraudulent activity.\n\n**Implementation**:\
    \ The `SequentialChain`s processed transactions in stages, initially flagging\
    \ unusual patterns, then cross-referencing with historical data, and finally applying\
    \ predictive models to assess fraud probability.\n\n**Outcome**: This approach\
    \ increased the detection rate of fraudulent transactions by 25%, significantly\
    \ reducing losses and improving the security of customer accounts.\n\nThese are\
    \ just a few examples to give you an idea of how chain composition can be applied\
    \ in real-world scenarios.\n\n## Task Allocation App Using Router Chains\n\nYou\
    \ will use the router chains when you want to route the input to different chains\
    \ based on predefined rules or criteria.\n\nHere is an example of a router chain\
    \ workflow:\n\n```python\nfrom langchain.chains import LLMChain, RouterChain\n\
    from langchain.llms import OpenAI\nfrom langchain.prompts import PromptTemplate\n\
    \n# Chain 1: Handle sales queries\nsales_prompt_template = \"Respond to the following\
    \ sales query: {query}\"\nsales_prompt = PromptTemplate(template=sales_prompt_template,\
    \ input_variables=[\"query\"])\nsales_chain = LLMChain(llm=OpenAI(), prompt=sales_prompt)\n\
    \n# Chain 2: Handle support queries\nsupport_prompt_template = \"Respond to the\
    \ following support query: {query}\"\nsupport_prompt = PromptTemplate(template=support_prompt_template,\
    \ input_variables=[\"query\"])\nsupport_chain = LLMChain(llm=OpenAI(), prompt=support_prompt)\n\
    \n# Router chain to direct queries based on the topic\nrouter_chain = RouterChain.from_routes(\n\
    \    routes=[\n        (\"sales\", sales_chain),\n        (\"support\", support_chain),\n\
    \    ],\n    default_chain=sales_chain,\n    input_key=\"query\",\n    output_key=\"\
    response\",\n)\n\n# Run the router chain\nquery = \"I have a question about my\
    \ order\"\nresult = router_chain.run(query)\nprint(result)\n```\n\nIn this example,\
    \ you have two chains, namely, `sales_chain` and `support_chain`. You created\
    \ a `RouterChain` that routes the input query to the appropriate chain based on\
    \ the topic. If the query contains the word \"sales,\" it is directed to the `sales_chain`.\
    \ If it contains the word \"support,\" it is directed to the `support_chain`.\
    \ If none of the conditions match, it falls back to the default `sales_chain`.\
    \ Finally, you run the router chain with a query and print the response.\n\n##\
    \ Case Study: Enhancing Customer Service with LangChain Router Chains\n\nA major\
    \ retail company implemented LangChain Router Chains to automate customer inquiry\
    \ routing, aiming to improve response times and accuracy in addressing customer\
    \ concerns.\n\n**Implementation and Challenges**: The Router Chain categorized\
    \ inquiries based on keywords like \"return,\" \"warranty,\" and \"payment,\"\
    \ directing them to the appropriate departments. Challenges included initial misrouting\
    \ and staff resistance to automated systems. Solutions involved refining the routing\
    \ logic with feedback from service representatives and providing staff training\
    \ to increase adoption.\n\n**Outcomes**: Post implementation, the company saw\
    \ a 30% reduction in handling time per inquiry and improved customer satisfaction\
    \ due to quicker, more accurate responses. The Router Chain's adaptability was\
    \ enhanced by a learning mechanism that improved its accuracy over time.\n\n**Conclusion**:\
    \ This case study showcases the Router Chain's effectiveness in streamlining customer\
    \ service operations, demonstrating its potential to significantly enhance operational\
    \ efficiency and customer satisfaction in retail settings.\n\n## Sentiment Analysis\
    \ App Using Conditional Chains\n\nYou will use a conditional chain to execute\
    \ different chains based on certain conditions.\n\nHere is an example of a conditional\
    \ chain workflow:\n\n```python\nfrom langchain.chains import LLMChain, ConditionalChain\n\
    from langchain.llms import OpenAI\nfrom langchain.prompts import PromptTemplate\n\
    \n# Chain 1: Positive sentiment\npositive_prompt_template = \"Respond positively\
    \ to the following query: {query}\"\npositive_prompt = PromptTemplate(template=positive_prompt_template,\
    \ input_variables=[\"query\"])\npositive_chain = LLMChain(llm=OpenAI(), prompt=positive_prompt)\n\
    \n# Chain 2: Negative sentiment\nnegative_prompt_template = \"Respond cautiously\
    \ to the following query: {query}\"\nnegative_prompt = PromptTemplate(template=negative_prompt_template,\
    \ input_variables=[\"query\"])\nnegative_chain = LLMChain(llm=OpenAI(), prompt=negative_prompt)\n\
    \n# Conditional chain based on sentiment analysis\nsentiment_conditions = [\n\
    \    (\"positive\", positive_chain),\n    (\"negative\", negative_chain),\n]\n\
    \nconditional_chain = ConditionalChain.from_conditions(\n    conditions=sentiment_conditions,\n\
    \    default_chain=positive_chain,\n    input_key=\"query\",\n    output_key=\"\
    response\",\n)\n```"
