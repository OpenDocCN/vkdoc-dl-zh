- fmt: '# About the Author


    **Rabi Jay** has over 15 years of experience driving digital transformation with
    a unique ‘acumen. His background as a Java and SAP ABAP developer provides insights
    into the enterprise systems LLMs often needed to integrate with. As a leader in
    Deloitte’s Digital/Cloud Native practice, he has gained cross-industry experience
    applying AI solutions, positioning him to identify where LLMs offer the greatest
    potential for business impact.


    He is passionate about making complex technology accessible, leading him to authoring
    the books *SAP NetWeaver Portal Technology* and *Enterprise AI in the Cloud* along
    with regular contributions to industry publications. His role as a technical reviewer
    for *Large Language Model–Based Solutions* and as Vice President at HCL America,
    focused on digital transformation, demonstrates his active engagement in the LLM
    field. Additionally, he runs a LinkedIn newsletter ("Enterprise AI Transformation")
    and free LinkedIn course (“Generative AI for Business Innovation”).


    # About the Technical Reviewers


    **Murali Krishnan** is a hands-on software leader and startup founder with a passion
    for building efficient and revenue-generating businesses. He has 20+ years of
    experience at Microsoft (B2B, B2C) followed by an executive stint at Starbucks
    (B2C). As a cofounder, Murali led fundraising, product, customer success, marketing,
    and sales effort at RapL, a mobile-first and AI-driven adaptive microlearning
    platform. With 30+ US patents, he has a proven ability to innovate in cutting-edge
    tech (cloud, AI/ML, mobile, big data). Murali also mentors, assists, and advises
    startup founders. He lives in Seattle with his family. He enjoys running, biking,
    reading, and cooking.


    **Shivakumar Gopalakrishnan** has over 25 years of experience in software development,
    DevOps, SRE, and platform engineering. He has worked in various industries, from
    healthcare enterprises to consumer-facing web-scale companies. He founded a startup,
    was a key architect within a Fortune 1000 company, and is currently a Principal
    Architect at BD. He is a coauthor of *Hands-on Kubernetes on Azure* and the author
    of *Kubernetes for Job Seekers and Modern Python Programming using ChatGPT*.


    **Keerthi Bharath** is an accomplished thought leader in the AI industry. He has
    experience running numerous startups and leading AI projects in MNCs. He is also
    an investor and mentor to companies. He is an alumnus of Syracuse University,
    New York, and College of Engineering, Guindy, Chennai.


    # Chapter 1: Introduction to LangChain and LLMs


    Welcome to the world of LangChain and LLMs, where you will learn how to build
    generative AI applications using one of the most popular generative AI application
    development frameworks, namely, LangChain.'
