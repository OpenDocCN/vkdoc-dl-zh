    - **产品问题**：“我的 `{product_name}` 遇到了问题，您能帮我排查一下吗？”\n- **退货**：“我想退回购买的商品。退货流程是怎样的？”\n\
    \n## 测试\n\n您在受控环境中测试了这些提示词，根据大语言模型的响应来监控并优化其表现。\n\n# 第五章：掌握创意内容的提示词——高级工程\n\n\
    以下是一些您可以使用的进阶技巧：\n\n## 情感分析\n\n您可以集成工具来评估咨询中的情绪基调，并调整大语言模型做出相应回应，例如，检测延迟订单消息中的沮丧情绪。\n\
    \n## 意图识别\n\n您可以使用自然语言处理技术来区分相似问题背后的客户意图，使回应更具上下文相关性。\n\n## 示例驱动的定制化\n\n使用如下示例来训练您的大语言模型，以生成个性化回应。\n\
    \n- **沮丧的客户**：“我已经等了一个多星期了，我的订单在哪里？”\n- **焦虑的客户**：“我很担心我的订单状态。能尽快给我更新吗？”\n\n#\
