    \n### `LCEL`与传统链的区别\n\n最好看几个创建`LCEL`和传统链的示例，以理解它们之间的区别。\n\n#### `LCEL`链示例\n\n\
    以下是一个`LCEL`链的简单示例：\n\n```python\n# LCEL Chain\nfrom langchain.llms import OpenAI\n\
