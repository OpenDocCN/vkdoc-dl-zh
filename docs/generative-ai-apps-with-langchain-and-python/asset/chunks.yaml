    \ as e:\n    print(\"超出速率限制。请稍后重试。\")\nexcept APIError as e:\n    print(f\"API\
    \ 错误：{e}\")\nexcept Exception as e:\n    print(f\"发生意外错误：{e}\")\nfinally:\n```\n"
