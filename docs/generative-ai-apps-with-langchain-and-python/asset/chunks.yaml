- fmt: "# Step 3: Construct the chain manually using the `LLMChain` class\n\n`chain\
    \ = LLMChain(llm=llm, prompt=prompt)`\n\nIn this example, you are constructing\
    \ an LCEL chain using the `llm_chain` template. You provide an OpenAI language\
    \ model (`llm`) and a prompt template (`prompt`) as parameters to customize the\
    \ behavior of the chain.\n\n## Customizing LCEL Chains\n\nOnce you have constructed\
    \ the LCEL chain, the next step is to customize it. The ease with which you can\
    \ customize a LCEL chain is one of its greatest strengths. You can tailor every\
    \ aspect of the chain to fit your specific needs.\n\nLet us explore a few ways\
    \ to customize your LCEL chains:\n\n- **Adding Custom Logic**: You can add custom\
    \ logic between steps in the LCEL chain by defining your own functions or classes\
    \ and including them in the chain’s workflow. This allows you to perform specific\
    \ data transformations or apply business rules.\n- **Integrating External Services**:\
    \ You can use tools to interact with APIs, databases, or third-party libraries.\
    \ You will simply define the necessary parameters and authentication details,\
    \ and LangChain will do the rest.\n- **Modifying Prompt Templates**: LCEL chains\
    \ allow you to define and modify prompt templates easily using variables, conditional\
    \ logic, and even generate dynamic prompts based on the input data.\n\nHere is\
    \ an example of customizing an LCEL chain:\n\n```python\nfrom langchain.llms import\
    \ OpenAI\nfrom langchain.prompts import PromptTemplate\nfrom langchain.chains\
    \ import load_chain\nfrom langchain.tools import APITool\n\nllm = OpenAI(temperature=0.9)\n\
    prompt = PromptTemplate(\n    input_variables=[\"product\"],\n    template=\"\
    What is a good name for a company that makes {product}?\",\n)\napi_tool = APITool(api_url=\"\
    https://example.com/api\")\nchain = load_chain(\"llm_chain\", llm=llm, prompt=prompt,\
    \ tools=[api_tool])\n```\n\nIn this example, we are customizing the LCEL chain\
    \ by adding an `APITool` to interact with an external API. We define the `api_url`\
    \ parameter to specify the API endpoint and include the tool in the `tools` list\
    \ when constructing the chain.\n\n## Executing LCEL Chains\n\nOnce you have constructed\
    \ and customized the LCEL chain, it is time to put it into action. You can use\
    \ various execution modes to cater to different scenarios and optimize performance.\
    \ Let us explore the three main execution modes below.\n\n### Streaming Execution\n\
    \nWhen working with large datasets, instead of waiting for the entire dataset\
    \ to be loaded into memory, you can process data as it arrives. You can handle\
    \ live data streams as well as process data in chunks.\n\nTo enable streaming\
    \ execution, you can use the `streaming=True` parameter when calling the chain.\
    \ Here is how you do it:\n\n`chain.run({\"product\": \"smartphone\"}, streaming=True)`\n\
    \n### Async Execution\n\nWith the help of asynchronous execution, you can run\
    \ multiple tasks concurrently and make the most of your system’s resources. This\
    \ way, you can execute multiple independent tasks in parallel.\n\nTo use async\
    \ execution, you can leverage the `arun` method provided by LCEL chains. Here\
    \ is an example:\n\n```python\nimport asyncio\n\nasync def generate_names(product):\n\
    \    return await chain.arun({\"product\": product})\n\nproduct_names = asyncio.run(generate_names(\"\
    smartphone\"))\n```\n\n### Batch Execution\n\nYou can use batch execution to process\
    \ multiple inputs in a single call to the chain. This can significantly improve\
    \ performance by reducing the overhead of multiple individual calls.\n\nTo perform\
    \ batch execution, you will have to pass a list of inputs to the chain’s `apply`\
    \ method. Here is an example:\n\n```python\nproducts = [\"smartphone\", \"laptop\"\
    , \"smartwatch\"]\nproduct_names = chain.apply([{\"product\": product} for product\
    \ in products])\n```\n\n## Observability in LCEL Chains\n\nObservability is crucial\
    \ when building and debugging LCEL chains. You can gain insights into the inner\
    \ workings of your chain, track data flow, and identify potential bottlenecks\
    \ or issues.\n\nLCEL chains provide built-in observability features, such as logging\
    \ and tracing. You can access detailed logs and traces for each step of the chain,\
    \ such as input and output data, execution time, and any errors or exceptions\
    \ that may occur.\n\nTo enable observability in your LCEL chains, you can use\
    \ the `verbose=True` parameter when constructing the chain. Here is an example:\n\
    \n`chain = load_chain(\"llm_chain\", llm=llm, prompt=prompt, verbose=True)`\n\n\
    With the `RunnableSequence`, your code may look like this:\n\n```python\nfrom\
    \ langchain.globals import set_debug\nset_debug(True)\n```\n\nOnce you have observability\
    \ enabled, you can easily monitor the execution of your chain and gain valuable\
    \ insights for debugging and optimization.\n\n## Types of LCEL Chains\n\nLet us\
    \ discuss some of the types of LCEL chains mentioned in LangChain documentation,\
    \ which I have shown as a table.\n\n| Chain | When to Use | Constructor |\n|-------|-------------|-------------|\n\
    | `create_stuff_documents_chain` | This chain is your go-to when you want to format\
