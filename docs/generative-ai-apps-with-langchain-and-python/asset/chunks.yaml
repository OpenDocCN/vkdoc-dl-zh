  trans: "\n# 创建 AgentAction\n\n`action = AgentAction(tool=\"search\", tool_input=\"\
    What is the annual revenue of Amazon in 2023?\")`\n\n# 执行动作并获取输出\n\n`output =\
    \ perform_action(action)`\n\n# 存储中间步骤\n\n`intermediate_steps = [(action, output)]`\n\
    \n## 第 9 章 构建不同类型的智能体\n\n# 使用最终输出创建 AgentFinish\n\n`final_output = AgentFinish(return_values={\"\
    output\": \"The annual revenue of Amazon is 574.8 billion.\"})`\n\n在此示例中，你创建了一个\
    \ `AgentAction`，指定了要使用的工具（例如 \"search\"）以及提供给该工具的输入。然后执行该动作并存储输出。由该动作及其输出组成的中间步骤被添加到\
    \ `intermediate_steps` 列表中。最后，你使用最终输出创建了一个 `AgentFinish`，在本例中，该输出是一个声明亚马逊年收入的字符串。\n\
    \n你可以看到，智能体能够利用这些大语言模型和工具的强大功能，动态地进行推理，并确定解决给定问题的最佳行动方案。它们能够根据可用的工具、提供的输入以及在此过程中获得的中间结果进行调整和决策。\n\
    \n## 智能体\n\n好了，让我们来谈谈智能体的核心，即负责决定下一步行动的链。它通常由语言模型、提示词和输出解析器驱动。\n\n你应该记住，不同的智能体在推理、编码输入和解析输出方面都有自己独特的风格。\n\
    \nLangChain 提供了多种内置智能体供你选择。每个智能体都有自己的优势和特点。你可以在本章“延伸阅读”部分包含的智能体类型文档中找到这些智能体的完整列表。\n\
    \n如果你需要更多控制权或有特定要求，你可以轻松构建自己的自定义智能体。构建自定义智能体允许你定义自己的提示风格、输入编码和输出解析逻辑。我们将在本章后面讨论这一点。\n\
    \n让我们深入了解智能体的输入和输出。\n\n## 第 9 章 构建不同类型的智能体\n\n### 智能体输入\n\n谈到智能体的输入，关键就在于键值对。唯一必需的键是\
    \ `intermediate_steps`，它对应于我们之前讨论过的中间步骤。这些步骤至关重要，因为它们为智能体提供了到目前为止已完成操作的上下文。\n\n\
    但这里就是 `PromptTemplate` 发挥作用的地方。它负责将这些键值对转换为语言模型易于理解的格式。\n\n### 智能体输出\n\n接下来是智能体输出。智能体的输出可以是下一步要执行的动作，也可以是返回给用户的最终响应。用技术术语来说，这些输出由\
    \ `AgentAction` 或 `AgentFinish` 表示。你可以将它们视为智能体的决策或最终裁决。\n\n输出可以是以下三种类型之一：\n\n\
    - `AgentAction`：智能体下一步想要执行的单个动作\n- `List[AgentAction]`：智能体下一步想要执行的一系列动作\n- `AgentFinish`：智能体想要返回给用户的最终响应\n\
    \n这就像智能体在说明下一步或答案是什么。输出解析器负责接收来自语言模型的原始输出，并将其转换为这三种类型之一。换句话说，它解释智能体的想法，并将其转化为具体的动作或响应。\n\
    \n## 第 9 章 构建不同类型的智能体\n\n以下是一个代码片段，用于说明智能体输入和输出的用法：\n\n```python\nfrom langchain_core.agents\
    \ import AgentAction, AgentFinish\n\n# 使用新方法创建智能体\nagent = create_react_agent(llm=llm,\
    \ tools=tools, prompt=prompt)\n\n# 定义智能体的输入\nagent_input = {\n    \"intermediate_steps\"\
    : [\n        (AgentAction(tool=\"Search\", tool_input=\"What is the capital of\
    \ France?\", log=\"Searching for the capital of France\"), \"Paris is the capital\
    \ of France.\")\n    ]\n}\n\n# 创建一个 AgentExecutor\nagent_executor = AgentExecutor(agent=agent,\
    \ tools=tools, verbose=True)\n\n# 使用输入调用智能体\nagent_output = agent.run(agent_input)\n\
    ```\n"
- fmt: "# Check the type of the agent's output\n\n```\nif isinstance(agent_output,\
    \ AgentAction):\n    print(\"Agent wants to take the following action:\", agent_output)\n\
    elif isinstance(agent_output, list):\n    print(\"Agent wants to take the following\
    \ actions:\", agent_output)\nelif isinstance(agent_output, AgentFinish):\n   \
    \ print(\"Agent has finished with the following response:\", agent_output)\n```\n\
    \n## Chapter 9 Building different types of agents\n\nIn this example, you define\
    \ the agent's input by providing the `intermediate_steps`, which is a list of\
    \ tuples containing previous actions and their outputs. You then call the agent\
    \ with this input and store the output in `agent_output`.\n\nFinally, you check\
    \ the type of the agent's output using `isinstance()` to determine whether it\
    \ is an `AgentAction`, a list of `AgentAction`s, or an `AgentFinish`. Based on\
    \ the type, you can take the appropriate action or send the final response back\
    \ to the user.\n\nYou now have a solid understanding of how agents make decisions,\
    \ take actions, and provide responses.\n\n### `AgentExecutor`\n\n`AgentExecutor`\
    \ is the core engine behind the scenes which provides the runtime for the agent\
    \ to run smoothly and efficiently. It is responsible for calling the agent, executing\
    \ the actions it chooses, passing the action outputs back to the agent, and repeating\
    \ this process until the agent reaches a conclusion. It is like a loop of communication\
    \ between the agent and the executor, with the executor facilitating the flow\
    \ of information and actions.\n\nHere is a simplified pseudocode representation\
    \ of how the `AgentExecutor` works, again for illustrative purposes only:\n\n\
    ```\nnext_action = agent.get_action(...)\nwhile next_action != AgentFinish:\n\
    \    observation = run(next_action)\n    next_action = agent.get_action(..., next_action,\
    \ observation)\nreturn next_action\n```\n\nIt may seem straightforward, but the\
    \ `AgentExecutor` handles several complexities behind the scenes to make your\
    \ life easier. Let us review some of the scenarios:\n\n1. When the agent selects\
    \ a nonexistent tool, the executor gracefully handles the situation and keeps\
    \ the agent on track.\n2. If a tool encounters an error during execution, the\
    \ executor catches the exception and manages it appropriately to ensure the agent\
    \ can continue its work.\n3. In cases where the agent produces output that cannot\
    \ be parsed into a valid tool invocation, the executor handles the situation and\
    \ guides the agent back to a valid path.\n4. The executor provides comprehensive\
    \ logging and observability at all levels, such as agent decisions and tool calls.\
    \ It can output this information to `stdout` and/or send it to LangSmith for further\
    \ analysis and visualization.\n\n### Tools and Toolkits\n\nLet us take a quick\
    \ look at the tools and toolkits.\n\n#### Tools\n\nTools are interfaces that an\
    \ agent, chain, or LLM (large language model) can use to interact with the world.\
    \ They combine a few essential elements:\n\n1. **Name of the Tool**: A concise,\
    \ descriptive label that tells you what the tool does.\n2. **A Description**:\
    \ A brief explanation of the tool's purpose and functionality.\n3. **JSON Schema**:\
    \ A structured definition of the inputs required by the tool. Think of it as a\
    \ blueprint for how to use the tool correctly.\n4. **The Function to Call**: The\
    \ actual code that executes the tool's action.\n5. **Flag**: A flag that determines\
    \ if the tool's output should be immediately visible or processed further.\n\n\
    The name, description, and JSON schema help the LLM understand how to specify\
    \ the desired action, while the function to call is the equivalent of actually\
    \ taking that action.\n\nA Tool abstraction in LangChain consists of two key components:\n\
    \n1. **The Input Schema for the Tool**: This is like a blueprint that tells the\
    \ language model (LLM) what parameters are needed to call the tool. It is crucial\
    \ to provide sensibly named and well-described parameters, so the LLM knows exactly\
    \ what inputs to provide when invoking the tool.\n2. **The Function to Run**:\
    \ This is the actual Python function that gets executed when the tool is invoked.\
    \ It is the code that performs the desired action based on the provided inputs.\n\
    \nOne important thing you should keep in mind is that the simpler the input to\
    \ a tool, the easier it is for an LLM to use it. I recommend you to use tools\
    \ that have a single string input because agents work well with them.\n\nLangChain\
    \ has documentation on which agent types can handle more complex inputs. Please\
    \ see the \"Further Reading\" section for the link to the documentation.\n\nNow,\
    \ let us use the `WikipediaQueryRun` tool, which is a handy wrapper around Wikipedia:\n\
    \n```\n!pip install langchain==0.2.5 langchain_openai==0.2.5 wikipedia\n```\n\n\
    ```\nfrom langchain_community.tools import WikipediaQueryRun\nfrom langchain_community.utilities\
    \ import WikipediaAPIWrapper\n\n# Initialize the tool with custom configurations\n\
    api_wrapper = WikipediaAPIWrapper(top_k_results=1, doc_content_chars_max=100)\n\
    tool = WikipediaQueryRun(api_wrapper=api_wrapper)\n```\n\nNow, let us explore\
    \ some of the tool's properties:\n\n```\n# Check the default name\nprint(tool.name)\
    \  # Output: 'Wikipedia'\n\n# Check the default description\nprint(tool.description)\
    \  # Output: 'A wrapper around Wikipedia. Useful for when you need to answer general\
    \ questions about people, places, companies, facts, historical events, or other\
    \ subjects. Input should be a search query.'\n\n# Check the default JSON schema\
    \ of the inputs\nprint(tool.args)  # Output: {'query': {'title': 'Query', 'type':\
    \ 'string'}}\n\n# Check if the tool should return directly to the user\nprint(tool.return_direct)\
    \  # Output: False\n```\n\nLet us try searching for information about LangChain\
    \ itself:\n\n```\n# Call the tool with a dictionary input\nprint(tool.run({\"\
    query\": \"langchain\"}))\n# Output: 'Page: LangChain\\nSummary: LangChain is\
    \ a framework designed to simplify the creation of applications '\n\n# Call the\
    \ tool with a single string input (since it expects only one input)\nprint(tool.run(\"\
    langchain\"))\n# Output: 'Page: LangChain\\nSummary: LangChain is a framework\
    \ designed to simplify the creation of applications '\n```\n\nBut what if we want\
    \ to customize the tool's name, description, or JSON schema? Let us create a custom\
    \ schema for the Wikipedia tool:\n\n```\nfrom langchain_core.pydantic_v1 import\
    \ BaseModel, Field\n\nclass WikiInputs(BaseModel):\n    \"\"\"Inputs to the wikipedia\
    \ tool.\"\"\"\n    query: str = Field(description=\"query to look up in Wikipedia,\
    \ should be 3 or less words\")\n\n# Now, let's create a new instance of the tool\
    \ with our custom settings\ntool = WikipediaQueryRun(\n    name=\"wiki-tool\"\
    ,\n    description=\"look up things in wikipedia\",\n    args_schema=WikiInputs,\n\
    \    api_wrapper=api_wrapper,\n    return_direct=True,\n)\n\n# Check the updated\
    \ properties\nprint(tool.name)  # Output: 'wiki-tool'\nprint(tool.description)\
    \  # Output: 'look up things in wikipedia'\nprint(tool.args)  # Output: {'query':\
    \ {'title': 'Query', 'description': 'query to look up in Wikipedia, should be\
    \ 3 or less words', 'type': 'string'}}\nprint(tool.return_direct)  # Output: True\n\
    \n# Use the tool with the updated settings\nprint(tool.run(\"langchain\"))\n```"
