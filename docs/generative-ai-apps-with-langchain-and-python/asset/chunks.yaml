    \n# CHAPTER 10: Projects: Building Agent Apps for Common Use Cases\n\nIn this\
    \ chapter, we will explore how to create custom agents using LangChain. By the\
    \ end of this chapter, you will have a solid understanding of how to load language\
    \ models, define tools, create prompts, and bind everything together to build\
    \ a functional agent. We will also cover practical use cases like customer support\
    \ automation, personalized recommendations, and real-time data analysis and decision-making.\n\
    \n## Creating a Custom Agent\n\nNow, let us work on creating a custom agent.\n\
    \n© Rabi Jay 2024\nR. Jay, *Generative AI Apps with LangChain and Python*,\n[https://doi.org/10.1007/979-8-8688-0882-1_10](https://doi.org/10.1007/979-8-8688-0882-1_10)\n\
    \n### Loading the Language Model\n\nThe first step is to load the language model.\
    \ In this case, you will be using OpenAI's `ChatOpenAI` model, but feel free to\
    \ experiment with other models as you progress:\n\n```python\nfrom langchain_openai\
    \ import ChatOpenAI\n\nllm = ChatOpenAI(model=\"gpt-3.5-turbo\", temperature=0)\n\
    ```\n\n### Defining Tools\n\nNext up, you need to equip your agent with tools.\
    \ Let us start with a simple Python function that calculates the length of a given\
    \ word:\n\n```python\nfrom langchain.agents import tool\n\n@tool\ndef get_word_length(word:\
    \ str) -> int:\n    \"\"\"Returns the length of a word.\"\"\"\n    return len(word)\n\
    \nget_word_length.invoke(\"abc\")  # Output: 3\n```\n\nPay close attention to\
    \ the docstring here. It serves as a crucial guide for your agent to understand\
    \ how to use the tool effectively.\n\nNow, create a list to hold all the tools\
    \ your agent will have at its disposal:\n\n```python\ntools = [get_word_length]\n\
    ```\n\n### Creating the Prompt\n\nWith the language model and tools in place,\
    \ it is time to craft the prompt that will guide your agent's behavior. Thanks\
    \ to OpenAI function calling, you can keep things simple and focus on the essential\
    \ information your agent needs:\n\n```python\nfrom langchain_core.prompts import\
    \ ChatPromptTemplate, MessagesPlaceholder\n\nprompt = ChatPromptTemplate.from_messages(\n\
    \    [\n        (\n            \"system\",\n            \"You are a very powerful\
    \ assistant, but don't know current events\",\n        ),\n        (\"user\",\
    \ \"{input}\"),\n        MessagesPlaceholder(variable_name=\"agent_scratchpad\"\
    ),\n    ]\n)\n```\n\nYou have provided your agent with a brief system message,\
    \ a placeholder for the user's input, and a placeholder for the agent's scratchpad\
    \ (a space to store intermediate steps and tool outputs).\n\n### Binding Tools\
    \ to the Language Model\n\nThen you must bind your tools to the language model\
    \ which helps your agent know what capabilities it has at its disposal:\n\n```python\n\
    llm_with_tools = llm.bind_tools(tools)\n```\n\n### Creating the Agent\n\nImport\
    \ a couple of utility functions to help format your agent's intermediate steps\
    \ and parse its output:\n\n```python\nfrom langchain.agents.format_scratchpad.openai_tools\
    \ import format_to_openai_tool_messages\nfrom langchain.agents.output_parsers.openai_tools\
    \ import OpenAIToolsAgentOutputParser\n\nagent = (\n    {\n        \"input\":\
    \ lambda x: x[\"input\"],\n        \"agent_scratchpad\": lambda x: format_to_openai_tool_messages(\n\
    \            x[\"intermediate_steps\"]\n        ),\n    }\n    | prompt\n    |\
    \ llm_with_tools\n    | OpenAIToolsAgentOutputParser()\n)\n```\n\nAnd just like\
    \ that, your agent is ready!\n\n```python\nfrom langchain.agents import AgentExecutor\n\
    \nagent_executor = AgentExecutor(agent=agent, tools=tools, verbose=True)\n```\n\
    \nYou have created an `AgentExecutor` to interact with your agent and see its\
    \ thought process in action.\n\n### Testing Your Agent\n\nNow, let us put your\
    \ agent to the test! You will ask it a simple question and observe how it performs:\n\
    \n```python\nlist(agent_executor.stream({\"input\": \"How many letters in the\
    \ word first\"}))\n```\n\nYou should see output similar to this:\n\n```\n> Entering\
    \ new AgentExecutor chain...\nInvoking: `get_word_length` with `{'word': 'eudca'}`\n\
    There are 5 letters in the word \"first\".\n> Finished chain.\n```\n\nAwesome!\
    \ Your agent successfully used the `get_word_length` tool to answer your question.\n\
    \n### Adding Memory\n\nBut what if you want your agent to remember previous interactions\
    \ and engage in a more natural conversation?\n\nFirst, you need to add a placeholder\
    \ for chat history in your prompt:\n\n```python\nMEMORY_KEY = \"chat_history\"\
    \n\nprompt = ChatPromptTemplate.from_messages(\n    [\n        (\n           \
    \ \"system\",\n            \"You are a very powerful assistant, but bad at calculating\
    \ lengths of words.\",\n        ),\n        MessagesPlaceholder(variable_name=MEMORY_KEY),\n\
    \        (\"user\", \"{input}\"),\n        MessagesPlaceholder(variable_name=\"\
    agent_scratchpad\"),\n    ]\n)\n```\n\nNext, set up a list to track the chat history:\n\
    \n```python\nfrom langchain_core.messages import AIMessage, HumanMessage\n\nchat_history\
    \ = []\n```\n\nFinally, update your agent and `AgentExecutor` to include the chat\
    \ history:\n\n```python\nagent = (\n    {\n        \"input\": lambda x: x[\"input\"\
    ],\n        \"agent_scratchpad\": lambda x: format_to_openai_tool_messages(\n\
    \            x[\"intermediate_steps\"]\n        ),\n        \"chat_history\":\
    \ lambda x: x[\"chat_history\"],\n    }\n    | prompt\n    | llm_with_tools\n\
    \    | OpenAIToolsAgentOutputParser()\n)\n\nagent_executor = AgentExecutor(agent=agent,\
    \ tools=tools, verbose=True)\n```\n\nNow, when interacting with your agent, track\
    \ the inputs and outputs as chat history:\n\n```python\ninput1 = \"how many letters\
    \ in the word first?\"\nresult = agent_executor.invoke({\"input\": input1, \"\
    chat_history\": chat_history})\nchat_history.extend(\n    [\n        HumanMessage(content=input1),\n\
    \        AIMessage(content=result[\"output\"]),\n    ]\n)\nagent_executor.invoke({\"\
    input\": \"is that a real word?\", \"chat_history\": chat_history})\n```\n\nYour\
    \ agent can now engage in a back-and-forth conversation, remembering previous\
    \ interactions and providing contextual responses.\n\nYou have just created your\
    \ very own custom agent using LangChain.\n\n## Practical Use Cases for Agents\n\
    \nLet us review some of the practical use cases of agents.\n\n### Customer Support\
    \ Automation\n\nIn this section, let us explore how you can use agents to automate\
