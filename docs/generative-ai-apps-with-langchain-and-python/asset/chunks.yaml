  trans: "\n# “谁雕刻了大卫雕像？”问题的模型\n\n“谁雕刻了大卫雕像？”这个问题的模型基于带有示例选择器的提示模板。该模型利用选定的示例及其已有知识来生成正确答案。\n\
    \n这两个提示模板的主要区别在于，不带示例选择器的模板包含所有示例，而带示例选择器（`LengthBasedExampleSelector`）的模板则根据示例长度进行筛选。\n\
    \n在这两种情况下，语言模型都会使用提供的示例及其已有知识，为输入的问题生成合适的答案。因此，示例充当了模型的指南或上下文，帮助其理解所问信息的类型以及预期的答案格式。\n\
    \n## 结论\n\n现在，你已经创建了一个少样本提示模板，该模板能够选择相关示例，并以结构化格式呈现给语言模型。你已使模型能够从示例中学习，并为新问题生成合适的答案。\n\
    \n# 第 5 章：掌握创意内容的提示词\n\n## 输出解析器\n\n最后，我们来谈谈输出解析器。有时，你可能希望 LLM 以特定格式生成输出，例如 JSON\
    \ 或问答模式。你可以使用输出解析器从模型的响应中提取相关信息，并根据你的需求进行结构化处理。\n\n在构建需要从 LLM 输出中提取特定数据类型的应用程序时，输出解析器非常有用。也许你需要一个\
    \ Python 的`datetime`对象，或者一个格式良好的 JSON 对象。你可以使用输出解析器，轻松地将 LLM 输出的字符串转换为你所需的确切数据类型，甚至通过`pydantic`转换为自定义的类实例。\n\
    \n输出解析器通常执行两个主要功能：\n\n1.  **获取格式指令**：此方法为 LLM 提供关于信息应如何结构和呈现的指南。\n2.  **解析**：一旦\
    \ LLM 生成响应，此方法会获取该文本，并根据提供的指令对其进行结构化处理。\n\n当 LLM 的响应与所需格式不完全匹配时，输出解析器提供了一个额外的方法：\n\
    \n1.  **带提示解析**：此方法作为第二次尝试来正确结构化数据。它会考虑 LLM 的响应和原始提示，提供更多上下文来优化输出。\n\n## 输出解析器的类型\n\
    \nLangChain 拥有多样化的输出解析器。无论你需要 JSON 对象，还是处理 CSV 文件，LangChain 很可能都有适合你的解析器。一个很大的优点是，许多解析器支持流式处理，这意味着它们可以处理连续的数据流：\n\
    \n-   **OpenAITools 解析器**：在处理最新的 OpenAI 函数时非常方便。它根据给定的参数、工具和工具选择来结构化输出。\n-   **OpenAIFunctions\
    \ 解析器**：在使用旧的 OpenAI 函数调用参数（如`functions`和`function_call`）时很有用。它很可靠，并以 JSON 对象的形式流式输出。\n\
    -   **JSON 解析器**：这是目前最可靠的解析器之一，它返回一个 JSON 对象，如果你希望数据遵循特定模式，可以通过`Pydantic`模型来定义。\n\
    -   **XML 解析器**：当你的输出需要是 XML 格式时，使用此解析器。\n-   **CSV 解析器**：此解析器将输出转换为整洁的列表，非常适合电子表格。\n\
    -   **OutputFixing 解析器**：有时，初稿并不完美。此解析器会包装另一个解析器，并在出现错误时介入，要求 LLM 修复输出。\n-   **RetryWithError\
    \ 解析器**：这与`OutputFixing`类似，但更全面，因为它还会考虑原始输入和指令，并在出现错误时要求 LLM 重做。\n-   **Pydantic\
    \ 解析器**：`Pydantic`帮助你定义模型输出结构，并确保输出完全符合你期望的结构。\n-   **YAML 解析器**：用于需要 YAML 格式的输出，当你的数据模式是用\
    \ YAML 定义时特别有用。\n\n而这只是冰山一角！还有用于 DataFrame、枚举、日期时间，甚至用于简单任务的基本结构化字典的解析器。关键在于，LangChain\
    \ 的输出解析器让你能够完全控制如何接收和使用 LLM 生成的数据。\n\n### 示例用例\n\n假设你正在构建一个用于确定科学发现日期的应用程序，并且你希望这些日期是\
    \ Python 中的`datetime`对象。你可能会面临两个主要挑战：\n\n1.  LLM 的输出始终是字符串，无论你如何与之交互或提供什么指令。\n\
    2.  日期格式可能不同。LLM 可能会回复“January 1st, 2020”、“Jan 1st, 2020”或“2020-01-01”。\n\n这就是解析器可以提供帮助的地方。它们使用格式指令来确保输出格式正确（例如，`datetime`的格式为“2020-01-01”），并提供解析方法将字符串转换为所需的\
    \ Python 对象类型。\n\n## 实践示例：使用`PydanticOutputParser`处理电影数据\n\n在此示例中，你将创建一个系统来存储和组织电影信息。\n\
    \n### 导入所需库\n\n你需要导入以下库：\n\n-   `pydantic`：提供`BaseModel`、`Field`、`ValidationError`和`field_validator`类，用于定义数据模型和验证\n\
    -   `langchain.output_parsers`：提供`PydanticOutputParser`类，用于解析语言模型的输出\n-   `langchain.prompts`：提供`PromptTemplate`类，用于创建提示模板\n\
    -   `langchain.chat_models`：提供`ChatOpenAI`类，用于与 OpenAI 聊天模型交互\n-   `langchain.schema`：提供`HumanMessage`类，用于表示对话中的人类消息\n\
    \n```python\nfrom pydantic import BaseModel, Field, ValidationError, field_validator\n\
    from langchain.output_parsers import PydanticOutputParser\nfrom langchain.prompts\
    \ import PromptTemplate\nfrom langchain.chat_models import ChatOpenAI\nfrom langchain.schema\
    \ import HumanMessage\n```\n\n### 定义电影数据模型\n\n在这里，你定义了电影数据模型：\n\n-   你定义了一个继承自`BaseModel`的`Movie`类，用于表示电影的结构。\n\
    -   该类有三个字段：`title`、`director`和`year`，每个字段都有描述。\n-   你使用`@field_validator`装饰器来确保电影标题是首字母大写的。如果标题不是标题大小写格式，则会引发`ValidationError`。\n\
    \n```python\nclass Movie(BaseModel):\n    title: str = Field(description=\"电影标题\"\
    )\n    director: str = Field(description=\"电影导演\")\n    year: int = Field(description=\"\
    电影发行年份\")\n\n    # 质量控制：确保电影标题首字母大写\n    @field_validator('title')\n    def title_must_be_capitalized(cls,\
    \ value):\n        if not value.istitle():\n            raise ValueError(\"电影标题必须首字母大写。\"\
    )\n        return value\n```\n\n### 初始化输出解析器\n\n你创建一个名为`parser`的`PydanticOutputParser`实例，并将`Movie`类作为`pydantic_object`参数传递，以指定所需的输出结构：\n\
    \n```python\n# 使用我们的数据结构初始化解析器\nparser = PydanticOutputParser(pydantic_object=Movie)\n\
    ```\n\n### 创建提示模板\n\n你定义一个名为`prompt`的`PromptTemplate`，它向语言模型提供关于如何格式化电影信息的指令：\n\
    \n-   模板包含格式指令（`{format_instructions}`）和查询（`{query}`）的占位符。\n-   你指定输入变量`query`，并提供从解析器通过`parser.get_format_instructions()`获取的格式指令。\n"
- fmt: "# Create a prompt template with instructions for the LLM\n\n`prompt = PromptTemplate(\n\
    \    template=\"Please provide information about a movie in the following format:\\\
    n{format_instructions}\\nQuestion: {query}\",\n    input_variables=[\"query\"\
    ],\n    partial_variables={\"format_instructions\": parser.get_format_instructions()},\n\
    )`\n\n## Setting Up the OpenAI API Key\n\nYou retrieve the OpenAI API key from\
    \ the environment variable using `os.environ.get()`. If the environment variable\
    \ is not set, you use a default value (replace `\"your_api_key_here\"` with your\
    \ actual API key):\n\n```\n# Set up the OpenAI API key\nopenai_api_key = os.environ.get(\"\
    OPENAI_API_KEY\")\nif openai_api_key is None:\n    openai_api_key = \"your_api_key_here\"\
    \  # Replace with your actual API key\n```\n\n## Choosing the Language Model and\
    \ Its Settings\n\nYou create an instance of `ChatOpenAI` called `llm` and specify\
    \ the model name (`\"gpt-3.5-turbo\"`), temperature (`0`), and the OpenAI API\
    \ key:\n\n```\n# Choose the LLM and its settings\nllm = ChatOpenAI(model_name=\"\
    gpt-3.5-turbo\", temperature=0, openai_api_key=openai_api_key)\n```\n\n# Chapter\
    \ 5 Mastering Prompts for Creative Content\n\n## Generating Movie Information\n\
    \n- You define a `query` variable with the movie title you want to get information\
    \ about (`\"Inception\"`).\n- You create a `HumanMessage` instance called `human_message`\
    \ with the content of the formatted prompt using `prompt.format(query=query)`.\n\
    - You pass a list containing `human_message` to the `llm` instance to generate\
    \ a response.\n\n```\n# Generate movie information using the prompt\nquery = \"\
    Tell me about the movie 'Inception'.\"\nhuman_message = HumanMessage(content=prompt.format(query=query))\n\
    response = llm([human_message])\n```\n\n## Parsing the Language Model's Response\n\
    \nYou use a `try-except` block to handle any validation errors that may occur\
    \ during parsing.\n\n- You call `parser.parse(response.content)` to parse the\
    \ content of the language model's response using the initialized `PydanticOutputParser`.\n\
    - If the parsing is successful, you print the structured movie data stored in\
    \ `parsed_movie`.\n- If a `ValidationError` occurs during parsing, you print the\
    \ error message.\n\n```\n# Parse the LLM's response\ntry:\n    parsed_movie =\
    \ parser.parse(response.content)\n    # Print the structured movie data\n    print(parsed_movie)\n\
    except ValidationError as e:\n    print(f\"Validation Error: {e}\")\n```\n\nBy\
    \ using the `PydanticOutputParser`, you have effectively transformed the LLM's\
    \ text response into a well-structured movie object.\n\nThis example demonstrates\
    \ how output parsers can be applied to various domains, such as organizing information\
    \ about movies, books, products, or any other structured data you need to extract\
    \ from LLM responses.\n\n## OutputFixingParser\n\nLangChain has a handy tool called\
    \ the `OutputFixingParser`. This parser takes the original output, sends it back\
    \ to the model, and asks it to fix any formatting issues. It is like having a\
    \ helpful tool that double-checks the model's work and makes sure it is just right.\n\
    \nI want to point out that as models continue to improve, they are getting better\
    \ at following instructions. Plus, there is a bit of randomness involved in working\
    \ with LLMs. So, if you are coding along with this, you might find that the model\
    \ generates the correct output right off the bat, and everything works smoothly.\
    \ That is great news! But don't worry if you can't reproduce the error – you can\
    \ still learn from this.\n\nIn the next section, you'll explore the other type\
    \ of prompt called \"chat prompt template,\" which is perfect for building chatbots\
    \ and conversational agents.\n\n# Chapter 5 Mastering Prompts for Creative Content\n\
    \n## ChatPrompt Templates\n\nChat prompt templates are a useful variant of the\
    \ prompt templates that can make your life easy when working with conversational\
    \ tasks using large language models (LLMs).\n\nAs you learned before, the Chat\
    \ Completions API uses a list of messages, including system messages, human messages\
    \ (prompts), and AI messages. LangChain provides some useful classes that make\
    \ working with these messages easy.\n\n### Building the Chat Prompt Template\n\
    \nLet us see how to create such a template using the `ChatPromptTemplate` class.\n\
    \n#### Importing Required Libraries\n\nFirst, take care of the basics such as\
    \ importing the libraries shown below:\n\n- `langchain.prompts`: Provides the\
    \ `ChatPromptTemplate`, `SystemMessagePromptTemplate`, and `HumanMessagePromptTemplate`\
    \ classes for creating chat prompts\n- `langchain.chat_models`: Provides the `ChatOpenAI`\
    \ class for interacting with the OpenAI chat model\n\n```\nfrom langchain.prompts\
    \ import ChatPromptTemplate,\n    SystemMessagePromptTemplate, HumanMessagePromptTemplate\n\
