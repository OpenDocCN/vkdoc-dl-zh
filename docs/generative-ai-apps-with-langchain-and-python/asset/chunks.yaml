    ```\n\n你需要安装 docker 才能运行此命令。此命令将拉取 Qdrant Docker 镜像，并在你的本地机器上启动一个 Qdrant 服务器，将其暴露在\
    \ 6333 端口。你也可以使用由 Qdrant 云或其他云提供商提供的托管 Qdrant 服务器。\n\n创建好向量存储后，你可以异步执行相似性搜索。假设你有一个查询，并希望找到最相似的文档。你可以这样做：\n\
    \n```python\nquery = \"What advice did the author give about money\"\ndocs = await\
    \ db.asimilarity_search(query)\nprint(docs[0].page_content)\n```\n\n`asimilarity_search`\
    \ 方法接收你的查询，并返回一个最相似文档的列表。你可以使用 `docs[0].page_content` 访问第一个文档的内容。\n\n你也可以直接使用向量嵌入来执行相似性搜索。看看这个：\n\
    \n```python\nembedding_vector = embeddings.embed_query(query)\ndocs = await db.asimilarity_search_by_vector(embedding_vector)\n\
    ```\n\n在这种情况下，你首先使用嵌入模型的 `embed_query` 方法嵌入你的查询。然后，将生成的 `embedding_vector` 传递给\
    \ `asimilarity_search_by_vector` 方法，以找到最相似的文档。\n\n## 检索器\n\n我们已经讨论了如何从向量存储中检索查询的答案。让我们更详细地讨论一下检索器。\n\
    \n你可以使用检索器传入一个非结构化查询，并返回一个相关文档列表作为输出。它可以帮助你根据问题或查询快速获取所需的信息。\n"
- fmt: '# CHAPTER 7 BUILDING ADVANCED Q&A AND SEARCH APPLICATIONS USING RETRIEVAL-AUGMENTED
    GENERATION (RAG)


    You can use a number of retrievers from LangChain based on their unique characteristics
    and use cases, so understanding them will help you choose the best one for your
    specific needs:


    1. **Vectorstore Retriever**: If you are just getting started and looking for
    something quick and easy, the `Vectorstore Retriever` is your go-to choice. It
    is the simplest method using which you will create embeddings for each piece of
    text, which makes it easy to find similar ones.


    2. **ParentDocument Retriever**: You can use `ParentDocument Retriever` when you
    have documents with lots of smaller, distinct pieces of information that are indexed
    separately but can be retrieved together. It indexes multiple chunks for each
    document and finds the most similar chunks based on their embeddings. What is
    really helpful is that instead of returning individual chunks, it retrieves the
    entire parent document for a more comprehensive result.


    3. **Multi-vector Retriever**: Sometimes, you might want to extract additional
    information from documents that you think is more relevant to index than the text
    itself. The `Multi-vector Retriever` allows you to create multiple vectors for
    each document, giving you the flexibility to capture different aspects of the
    content. For example, you could create vectors just based on summaries or hypothetical
    questions related to the document.


    4. **Self-Query Retriever**: Have you ever encountered situations where users
    ask questions that are better answered by fetching documents based on metadata
    rather than text similarity? The `Self-Query Retriever` uses an LLM (language
    model) to transform user input into two things: a string to look up semantically
    and a metadata filter to apply. This is incredibly useful when questions are more
    about the metadata of documents rather than their content.


    5. **Contextual Compression Retriever**: Sometimes, retrieved documents can contain
    a lot of irrelevant information that distracts the LLM. The `Contextual Compression
    Retriever` comes to your rescue by adding a post-processing step to extract only
    the most relevant information from the retrieved documents. It can be done using
    embeddings or an LLM to ensure that your LLM stays focused on what matters most.


    LangChain offers several other advanced retrieval types, such as `Time-Weighted
    Vectorstore Retriever`, `Multi-query Retriever`, `Ensemble Retriever`, and `Long-Context
    Reorder Retriever`. Each of these has its own unique strengths and use cases,
    allowing you to tailor your retrieval process to your specific needs.


    ## Code Walk-Through for Information Retrieval


    To give you a concrete example, let us say you want to use the `Vectorstore Retriever`.
    Here is a simple code snippet:


    ```

    from langchain.retrievers import VectorstoreRetriever

    ```'
