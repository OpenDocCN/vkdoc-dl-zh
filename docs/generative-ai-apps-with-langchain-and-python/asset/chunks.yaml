    \ is raised.\n\n```python\nclass Movie(BaseModel):\n    title: str = Field(description=\"\
    The title of the movie\")\n    director: str = Field(description=\"The director\
    \ of the movie\")\n    year: int = Field(description=\"The release year of the\
    \ movie\")\n\n    # Quality control: Ensure the movie title is capitalized\n \
    \   @field_validator('title')\n    def title_must_be_capitalized(cls, value):\n\
    \        if not value.istitle():\n            raise ValueError(\"Movie title must\
    \ be capitalized.\")\n        return value\n```\n\n### Initializing the Output\
    \ Parser\n\nYou create an instance of `PydanticOutputParser` called `parser` and\
    \ pass the `Movie` class as the `pydantic_object` argument to specify the desired\
    \ output structure:\n\n```python\n# Initialize the parser with our data structure\n\
    parser = PydanticOutputParser(pydantic_object=Movie)\n```\n\n### Creating a Prompt\
    \ Template\n\nYou define a `PromptTemplate` called `prompt` that provides instructions\
    \ to the language model on how to format the movie information:\n\n- The template\
