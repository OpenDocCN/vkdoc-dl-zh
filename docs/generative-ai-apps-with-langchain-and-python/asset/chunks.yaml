    **Agent**


    Alright, let us talk about the heart of the agent, namely, the chain responsible
    for deciding the next step to take. It is usually powered by a language model,
    a prompt, and an output parser.


    You should remember that different agents have their own unique


    styles when it comes to reasoning, encoding inputs, and parsing outputs.


    LangChain provides a variety of built-in agents that you can choose from.


    Each has their own strengths and characteristics. You can find a full list of
