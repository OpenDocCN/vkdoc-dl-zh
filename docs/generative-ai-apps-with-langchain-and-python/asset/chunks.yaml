    \n---\n\n# 第 9 章：构建不同类型的代理\n\n在本章中，我们将使用 LangChain 设计和实现代理。我们将探讨如何定义代理的目标、管理其输入和输出，以及使用各种工具和工具包来增强其能力。\n\
    \n我们将首先讨论如何定义代理的目标。这至关重要，因为它为后续所有内容奠定了基础。我将引导您完成阐述代理要解决的问题，并概述其为实现目标需要执行的具体任务的过程。我们还将确定代理完成工作所需的工具和资源。\n\
    \n接下来，我们将探讨一些核心代理概念，如 `AgentAction`、`AgentFinish` 和中间步骤。这些组件是允许代理动态推理和行动的构建块。\n\
    \n使用 LangChain 的一个激动人心的方面是可用的代理类型多种多样。我们将探索 Zero-Shot-React 代理、结构化聊天代理、ReAct 代理等。每种代理类型都有其独特的特性和用例，我将提供实用的、可运行的代码示例来说明它们的工作原理。\n\
    \n随着本章的深入，您将获得实现基本和高级代理的实践经验。我们将从简单的示例开始，逐步构建到更复杂的场景。\n\n© Rabi Jay 2024\nR. Jay,\
    \ *Generative AI Apps with LangChain and Python*,\n[`doi.org/10.1007/979-8-8688-0882-1_9`](https://doi.org/10.1007/979-8-8688-0882-1_9)\n\
    \n我们还将探讨如何集成内置工具并创建自定义工具以扩展其能力。您将了解如何使用工具包将相关工具分组以用于特定任务。这将帮助您组织代理的功能并使其更高效。\n\
    \n最后，我们将讨论为代理添加内存，这使您的代理能够记住先前的交互并在多次对话中保持上下文。我将向您展示如何实现内存功能并使用聊天历史来增强代理的上下文感知和连贯性。\n\
    \n### 学习目标\n\n在本章结束时，您将能够：\n\n1. 清晰地定义代理的目标。\n2. 理解核心代理概念，如 `AgentAction`、`AgentFinish`\
    \ 和中间步骤。\n3. 区分各种代理类型及其用例。\n4. 使用 LangChain 实现基本和高级代理。\n5. 使用内置工具并创建自定义工具以扩展代理的能力。\n\
    6. 为代理添加内存以实现上下文感知的对话。\n\n### 设计和实现代理\n\n在本节中，让我们回顾一下代理设计和实现的各个方面，包括定义目标、理解核心概念、管理输入和输出、执行任务以及使用工具和工具包。了解这些将帮助您创建高效且有效的代理。\n\
    \n#### 定义代理的目标\n\n让我们花点时间讨论构建代理最关键的一个方面：定义其目标。\n\n要定义代理的目标，请问自己以下问题：\n\n1. **我希望我的代理解决什么问题？**\n\
    \   - 您是否在构建一个聊天机器人来协助客户处理咨询？\n   - 您是否需要代理来分析数据并提供见解？\n   - 您的代理是否负责根据特定提示生成内容？\n\
    \n2. **我的代理是否需要与其他代理协作？**\n   - 任务是否需要多个专门的代理协同工作？\n   - 不同的代理是否会处理复杂问题的不同方面？\n\
    \   - 协作能否带来更全面或更高效的解决方案？\n\n3. **我的代理应该执行哪些任务来实现其目标？**\n   - 您应该首先将问题分解为更小、可管理的任务。\n\
    \   - 确定代理需要采取的具体行动来解决问题。\n   - 您应该仔细考虑每个任务的输入和输出要求。\n\n4. **我的代理需要哪些工具和资源？**\n\
    \   - 您必须确定代理将与之交互的库、API 和外部服务。\n   - 评估是否需要集成任何特定领域的知识或数据库。\n   - 确定与代理目标一致的语言模型或预训练模型。\n\
    \n假设您想创建一个代理业务应用，帮助用户找到给定城市中最好的餐厅。您的代理目标可以定义如下：\n\n**目标**：餐厅推荐代理将帮助用户根据他们的美食偏好和预算限制，在指定城市发现评价最高的餐厅。该代理将通过对话界面与用户交互，了解他们的需求，并提供个性化的餐厅推荐以及相关信息，如评分、评论和联系方式。\n\
    \n有了这个目标，您现在可以概述代理需要执行的任务：\n\n1. 理解用户输入并提取相关信息（城市、美食、预算）。\n2. 与餐厅数据库或 API 交互以获取餐厅数据。\n\
    3. 应用过滤和排名算法，根据用户偏好选择最佳餐厅。\n4. 生成自然语言响应，呈现推荐的餐厅及其详细信息。\n5. 处理后续问题，并根据用户要求提供额外信息。\n\
    \n现在您有了明确的目标和一组任务，可以开始收集必要的工具和资源。在这种情况下，您可能需要以下内容：\n\n- 用于自然语言理解和生成的语言模型或对话式 AI\
    \ 框架\n- 用于访问餐厅信息的餐厅数据库或 API\n- 用于数据操作、过滤和排名的库\n- 与外部服务集成以获取评论、评分和联系方式\n\n####\
    \ 概念\n\n好的，让我们讨论一下代理背后的核心概念，并探索使代理运转的关键组件：\n\n1. **`AgentAction`**\n   - `AgentAction`\
    \ 是一个数据类，表示代理应采取的行动。它就像是代理下一步行动的蓝图。\n   - 它有两个重要属性：\n     - `tool`：这是代理应调用的工具的名称。可以将其视为代理将使用的特定技能或能力。\n\
    \     - `tool_input`：这是应提供给工具的输入。就像为代理提供有效执行行动所需的信息。\n\n2. **`AgentFinish`**\n\
    \   - `AgentFinish` 表示代理完成任务并准备将输出返回给用户时的最终结果。\n   - 它包含一个 `return_values` 键值映射，其中保存了最终的代理输出。这是代理的响应或解决方案存储的地方。\n\
    \   - 通常，`return_values` 映射包含一个 `output` 键，其中包含一个表示代理最终响应的字符串。\n\n3. **中间步骤**\n\
    \   - 中间步骤就像是代理在当前代理运行中对先前操作及其相应输出的记忆。\n   - 它们对于将信息传递给未来的迭代至关重要，允许代理知道它已经完成了哪些工作并在此基础上继续。\n\
    \   - 中间步骤表示为一个元组列表，其中每个元组包含一个 `AgentAction` 及其对应的输出。\n   - 中间步骤的类型是 `List[Tuple[AgentAction,\
    \ Any]]`。使用 `Any` 类型作为输出以提供最大的灵活性，因为输出可能因使用的工具而异。在大多数情况下，输出是一个字符串，但也可能是其他类型。\n\
    \n以下是一个代码片段，用于说明这些组件的用法。请注意，这仅用于说明目的。\n\n```python\nfrom langchain_core.agents\
    \ import AgentAction, AgentFinish\n```\n"
- fmt: "# Create an AgentAction\n\n`action = AgentAction(tool=\"search\", tool_input=\"\
    What is the annual revenue of Amazon in 2023?\")`\n\n# Perform the action and\
    \ get the output\n\n`output = perform_action(action)`\n\n# Store the intermediate\
    \ step\n\n`intermediate_steps = [(action, output)]`\n\n## Chapter 9 Building different\
    \ types of agents\n\n# Create an AgentFinish with the final output\n\n`final_output\
    \ = AgentFinish(return_values={\"output\": \"The annual revenue of Amazon is 574.8\
    \ billion.\"})`\n\nIn this example, you create an `AgentAction` specifying the\
    \ tool to use (e.g., \"search\") and the input to provide to the tool. You then\
    \ perform the action and store the output. The intermediate step, consisting of\
    \ the action and its output, is added to the `intermediate_steps` list. Finally,\
    \ you create an `AgentFinish` with the final output, which in this case is a string\
    \ stating the annual revenue of Amazon.\n\nYou can see that agents can leverage\
    \ the power of these LLMs and tools to dynamically reason and determine the best\
    \ course of action to solve a given problem. They can adapt and make decisions\
    \ based on the available tools, the input provided, and the intermediate results\
    \ obtained along the way.\n\n## Agent\n\nAlright, let us talk about the heart\
    \ of the agent, namely, the chain responsible for deciding the next step to take.\
    \ It is usually powered by a language model, a prompt, and an output parser.\n\
    \nYou should remember that different agents have their own unique styles when\
    \ it comes to reasoning, encoding inputs, and parsing outputs.\n\nLangChain provides\
    \ a variety of built-in agents that you can choose from. Each has their own strengths\
    \ and characteristics. You can find a full list of these agents in the agent types\
    \ documentation that I have included in the \"Further Reading\" section of this\
    \ chapter.\n\nIf you need more control or have specific requirements, you can\
    \ easily build your own custom agents. Building custom agents allows you to define\
    \ your own prompting style, input encoding, and output parsing logic. We will\
    \ discuss this as well later in this chapter.\n\nLet us dive into the inputs and\
    \ outputs of an agent.\n\n## Chapter 9 Building different types of agents\n\n\
    ### Agent Inputs\n\nWhen it comes to the inputs of an agent, it is all about key-value\
    \ pairs. The only required key is `intermediate_steps`, which corresponds to the\
    \ Intermediate Steps we discussed earlier. These steps are crucial because they\
    \ provide the agent with the context of what has been done so far.\n\nBut here\
    \ is where the `PromptTemplate` comes in. It takes care of transforming these\
    \ key-value pairs into a format that can be easily understood by the language\
    \ model.\n\n### Agent Outputs\n\nNext is Agent output. The output of an agent\
    \ can be either the next action(s) to take or the final response to send back\
    \ to the user. In technical terms, these outputs are represented by `AgentAction`\
    \ or `AgentFinish`. You can think of them as the agent's decisions or the final\
    \ verdict.\n\nThe output can be one of three types:\n\n- `AgentAction`: A single\
    \ action the agent wants to take next\n- `List[AgentAction]`: A list of actions\
    \ the agent wants to take next\n- `AgentFinish`: The final response the agent\
    \ wants to send back to the user\n\nIt is like the agent is saying what the next\
    \ step or answer is. The output parser is responsible for taking the raw output\
    \ from the language model and transforming it into one of those three types. In\
    \ other words, it interprets the agent's thoughts and turns them into concrete\
    \ actions or responses.\n\n## Chapter 9 Building different types of agents\n\n\
    Here is a code snippet to illustrate the usage of agent inputs and outputs:\n\n\
    ```python\nfrom langchain_core.agents import AgentAction, AgentFinish\n\n# Create\
    \ the agent using the new method\nagent = create_react_agent(llm=llm, tools=tools,\
    \ prompt=prompt)\n\n# Define the agent's input\nagent_input = {\n    \"intermediate_steps\"\
    : [\n        (AgentAction(tool=\"Search\", tool_input=\"What is the capital of\
    \ France?\", log=\"Searching for the capital of France\"), \"Paris is the capital\
    \ of France.\")\n    ]\n}\n\n# Create an AgentExecutor\nagent_executor = AgentExecutor(agent=agent,\
    \ tools=tools, verbose=True)\n\n# Call the agent with the input\nagent_output\
    \ = agent.run(agent_input)\n```"
