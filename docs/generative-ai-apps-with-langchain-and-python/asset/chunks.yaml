    \n## 术语表\n\n本术语表提供了本章讨论的与检索增强生成（RAG）和信息检索系统相关的关键技术术语的定义。\n\n**`CacheBackedEmbeddings`**：一个嵌入器的包装器，它将嵌入缓存到键值存储中，使用哈希后的文本作为键来高效地存储和检索嵌入\n\
