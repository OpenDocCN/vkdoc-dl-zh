    \n### 为提示选择正确的示例\n\n示例选择器接收输入变量，并选出一组最适合给定输入的示例。\n\n想象一下，你正在构建一个根据用户偏好生成个性化锻炼计划的系统。假设你有一个针对不同用户偏好（如健身水平和目标）的示例锻炼计划数据集。当用户提供他们的偏好时，你希望选择最相关的示例包含在提示中。\n\
