    2.  你通过传递文件路径（`"/media/file1.txt"`）作为参数，创建了一个 `TextLoader` 实例。这告诉加载器去哪里寻找你的宝贵数据。

    3.  最后，你在加载器实例上调用了 `load()` 方法，该方法会读取文件并返回一个 `Document` 对象列表。每个 `Document` 都包含文本内容及与之关联的元数据。


    ## 亲自尝试


    不要犹豫，大胆尝试不同的加载器。每个加载器都有其独特的功能和特性，找到最适合你需求的即可。


    ## 第 7 章 使用检索增强生成（RAG）构建高级问答与搜索应用


    ### 处理 PDF 文件


    现在，让我们来看看最常见的数据格式之一：PDF 文件。


    我们的大部分数据都以各种格式存储，如 PDF、CSV 文件、JSON、HTML，甚至是办公文档。如果你能基于这些文档的内容提问并获得答案，那该多好啊？这正是你将要实现的目标！


    首先，确保你已经安装了必要的库。在本例中，你将使用 `pypdf` 库来处理 PDF 文件。你可以通过运行下面的代码轻松安装它。`pypdf` 库是一个纯
    Python 库，用于解析 PDF 文档，LangChain 的 `PyPDFLoader` 使用它来读取和提取 PDF 文件中的文本：


    ```

    !pip install pypdf langchain langchain_community

    ```


    接下来，导入必要的模块，例如从 `langchain_community.document_loaders` 模块中导入 `PyPDFLoader` 类。`langchain_community`
    包是主 `langchain` 库的社区驱动扩展，提供了额外的功能和工具：


    ```

    from langchain_community.document_loaders import PyPDFLoader

    ```


    然后，创建一个 `PyPDFLoader` 类的实例，并将 PDF 文件的路径作为参数传入。在此示例中，PDF 文件位于 `"/media/2022 Annual
    Report ACME.pdf"`。请确保你提供了正确的 PDF 文件路径：


    `loader = PyPDFLoader("/media/2022 Annual Report ACME.pdf")`


    接下来，你应该调用 `PyPDFLoader` 实例的 `load_and_split()` 方法来加载 PDF 文档，并自动将其拆分为单独的页面或章节。生成的页面或章节将作为
    `Document` 对象列表存储在 `pages` 变量中：


    `pages = loader.load_and_split()`


    ## 第 7 章 使用检索增强生成（RAG）构建高级问答与搜索应用


    `pages` 变量现在包含一个 `Document` 对象列表，每个对象代表 PDF 文档的一个页面或章节。你可以使用 `Document` 对象的属性（如
    `page_content` 和 `metadata`）来访问每个页面的文本内容和元数据：


    `print(pages[0].page_content)`


    这将显示 PDF 文档第一页或第一节的文本内容。


    你可以遍历 `pages` 列表，根据需要访问和处理 PDF 文档的每个页面或章节。


    但是，如果你想访问某个 `Document` 的元数据呢？没问题！每个 `Document` 对象都有一个 `metadata` 属性，它存储了一个包含元数据信息的字典。例如，要查看第
    11 页的元数据：


    `print(data[10].metadata)`


    如果你想知道加载的 PDF 文件有多少页，可以使用 `len()` 函数轻松获知：


    `print(f"{len(pages)} pages in your data")`


