    Chapter 9 Building different types of agents


    **Agent Inputs**


    When it comes to the inputs of an agent, it is all about key-value pairs.


    The only required key is intermediate_steps, which corresponds to the Intermediate
    Steps we discussed earlier. These steps are crucial because they provide the agent
    with the context of what has been done so far.


    But here is where the PromptTemplate comes in. It takes care of


    transforming these key-value pairs into a format that can be easily understood
    by the language model.


    **Agent Outputs**


    Next is Agent output. The output of an agent can be either the next action(s)
    to take or the final response to send back to the user. In technical terms, these
    outputs are represented by AgentActions or AgentFinish. You can think of them
    as the agent’s decisions or the final verdict.


    The output can be one of three types:


    • AgentAction: A single action the agent wants to


    take next


    • List[AgentAction]: A list of actions the agent wants to


    take next


    • AgentFinish: The final response the agent wants to


    send back to the user


    It is like the agent is saying what the next step or answer is. The output parser
    is responsible for taking the raw output from the language model and transforming
    it into one of those three types. In other words, it interprets the agent’s thoughts
    and turns them into concrete actions or responses.


