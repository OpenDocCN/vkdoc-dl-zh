- fmt: "# Initialize the Fireworks LLM\n\n```python\nllm = Fireworks(\n    model=\"\
    accounts/fireworks/models/llama-v2-13b-chat\",  # Choose an appropriate model\n\
    \    max_tokens=1024,\n    temperature=0.7\n)\n```\n\nFinally, construct the self-ask\
    \ with search agent by calling the `create_self_ask_with_search_agent` function,\
    \ passing in the LLM, tools, and prompt:\n\n```python\nagent = create_self_ask_with_search_agent(llm,\
    \ tools, prompt)\n```\n\n## Running the Agent\n\nWith your self-ask agent assembled,\
    \ create an executor and bring it to life by passing in the agent, tools, and\
    \ set `verbose=True` to see the agent's thought process:\n\n```python\nagent_executor\
    \ = AgentExecutor(agent=agent, tools=tools, verbose=True)\n```\n\nNow, ask your\
    \ agent a question and watch it work its magic:\n\n```python\nagent_executor.invoke(\n\
    \    {\"input\": \"What is the headquarters location of the company with the largest\
    \ market capitalization in the tech industry?\"}\n)\n```\n\nThe agent will start\
    \ by asking itself a follow-up question to gather more information:\n\nYes.\n\n\
    Follow up: Which company has the largest market capitalization in the tech industry?\n\
    \nUsing the Tavily Answer tool, the agent will find the answer to its own question:\n\
    \nAs of June 18, 2024, the company with the largest market capitalization is NVIDIA.\n\
    \nArmed with this information, the agent will then provide the final answer:\n\
    \nSo the final answer is: Santa Clara, California.\n\nThe self-ask with search\
    \ agent has successfully found the answer to your question by breaking it down\
    \ into smaller steps and using the available tools.\n\n## Autonomous Decision-Making\
    \ Capability\n\nLet us take up a more advanced example that showcases the autonomous\
    \ decision-making capabilities of an agent. In this example, you will create a\
    \ \"Task Manager\" agent that can understand user requests, break them down into\
    \ subtasks, and autonomously decide which tools to use to complete each subtask.\n\
    \nHere is the step-by-step code breakdown:\n\n1. Install the necessary libraries:\n\
    \n```bash\npip install langchain==0.2.5 openai==1.35.13 google-search-results\
    \ serpapi\n```\n\n2. Import the required modules:\n\n```python\nfrom langchain.agents\
    \ import initialize_agent, Tool\nfrom langchain.llms import OpenAI\nfrom langchain.utilities\
    \ import GoogleSearchAPIWrapper\n```\n\n3. Set up the language model and search\
    \ tool:\n\n```python\nllm = OpenAI(temperature=0)\nsearch = GoogleSearchAPIWrapper()\n\
    ```\n\nYou are using the OpenAI language model and the Google Search API to enable\
    \ the agent to search for information online.\n\n4. Define the tools available\
    \ to the agent:\n\n```python\ntools = [\n    Tool(\n        name=\"Search\",\n\
    \        func=search.run,\n        description=\"Useful for searching the internet\
    \ for information.\"\n    )\n]\n```\n\nIn this example, you define a single tool\
    \ called \"Search\" that allows the agent to perform Internet searches using the\
    \ Google Search API.\n\n5. Initialize the agent:\n\n```python\nagent = initialize_agent(\n\
    \    tools,\n    llm,\n    agent=\"zero-shot-react-description\",\n    verbose=True\n\
    )\n```\n\nYou initialize the agent with the defined tools, language model, and\
    \ the \"zero-shot-react-description\" agent type, which enables the agent to autonomously\
    \ decide which tools to use based on the user's request.\n\n6. Provide a task\
    \ to the agent:\n\n```python\ntask = \"I need to plan a trip to Paris. What are\
    \ the top tourist attractions I should visit, and what is the best time of year\
    \ to go?\"\nresult = agent.run(task)\nprint(result)\n```\n\nYou give the agent\
    \ a task related to planning a trip to Paris. The agent will autonomously break\
    \ down the task, search for relevant information, and provide a comprehensive\
    \ response.\n\nWhen you run this code, the agent will autonomously process the\
    \ task and provide a response similar to the following:\n\nTo plan your trip to\
    \ Paris, here are the top tourist attractions you should visit and the best time\
    \ of year to go:\n\nTop tourist attractions in Paris:\n\n1. Eiffel Tower - Iconic\
    \ landmark with stunning city views\n2. Louvre Museum - World-renowned art museum\
    \ housing the Mona Lisa and other masterpieces\n3. Notre-Dame Cathedral - Historic\
    \ cathedral known for its Gothic architecture (currently under renovation due\
    \ to a fire in 2019)\n4. Arc de Triomphe - Famous monument honoring those who\
    \ fought and died for France\n5. Palace of Versailles - Opulent former royal residence\
    \ with stunning gardens\n6. Montmartre - Charming hilltop neighborhood known for\
    \ its artistic history and Sacré-Cœur Basilica\n7. Seine River Cruise - Scenic\
    \ boat ride along the Seine River, offering views of the city's landmarks\n\n\
    Best time to visit Paris:\n\nThe best time to visit Paris depends on your preferences\
    \ and priorities. Here's a breakdown by season:\n\n- Spring (March to May): Mild\
    \ weather, beautiful blooms, and fewer crowds compared to summer. Ideal for outdoor\
    \ activities and sightseeing.\n- Summer (June to August): Warm to hot weather,\
    \ long days, and peak tourist season. Perfect for outdoor events and festivals,\
    \ but expect larger crowds and higher prices.\n- Fall (September to November):\
    \ Pleasant weather, fewer tourists, and beautiful autumn foliage. Great for sightseeing,\
    \ cultural events, and food festivals.\n- Winter (December to February): Cold\
    \ weather, shorter days, and festive holiday decorations. Suitable for indoor\
    \ activities, museums, and Christmas markets. Expect lower prices and fewer crowds.\n\
    \nUltimately, the shoulder seasons of spring and fall offer a good balance of\
    \ pleasant weather, manageable crowds, and reasonable prices. However, Paris is\
    \ a year-round destination with unique charms in every season.\n\n## Intelligent\
    \ Agent Performing Tasks with Multiple Tools\n\nIn this section, we are going\
    \ to create an intelligent agent that can perform tasks using multiple tools.\
    \ This agent will search for information online and look up specific data from\
    \ a preloaded index.\n\n### Setup: Introducing LangSmith\n\nBuilding agents can\
    \ be tricky, especially when it comes to debugging and observability. That is\
    \ where LangSmith comes in to make the process of building and debugging agents\
    \ easy by tracing all the steps in your agent's workflow. To set up LangSmith,\
    \ you just need to set a couple of environment variables:\n\n```bash\nexport LANGCHAIN_TRACING_V2=\"\
    true\"\nexport LANGCHAIN_API_KEY=\"<your-api-key>\"\n```\n\nMake sure to replace\
    \ `<your-api-key>` with your actual LangSmith API key.\n\n### Defining Tools\n\
    \nWe will equip your agent with two powerful tools – Tavily for online search\
    \ and a retriever for querying a local index.\n\n#### Tool 1: Tavily\n\nTavily\
    \ is a built-in tool in LangChain that allows your agent to search the Web effortlessly\
    \ and gives access to a vast knowledge base. To use Tavily, you will need an API\
    \ key. They offer a free tier, but if you don't have one or don't want to create\
    \ one, feel free to skip this step.\n\nOnce you have your Tavily API key, export\
    \ it as an environment variable:\n\n```bash\nexport TAVILY_API_KEY=\"...\"\n```\n\
    \nNow, let us create an instance of the `TavilySearchResults` tool:\n\n```python\n\
    from langchain_community.tools.tavily_search import TavilySearchResults\n\nsearch\
    \ = TavilySearchResults()\n```\n\nYou can easily invoke the search tool with a\
    \ query:\n\n```python\nsearch.invoke(\"what is the weather in San Francisco\"\
    )\n```\n\nThis will return a list of search results related to the weather in\
    \ San Francisco.\n\n#### Tool 2: Retriever\n\nIn addition to online search, create\
    \ a retriever that allows your agent to look up information from a local index.\
    \ This is particularly useful when you have specific data that you want your agent\
    \ to access quickly.\n\nTo create the retriever, follow these steps:\n\n1. Load\
    \ the data using `WebBaseLoader`:\n\n```python\nfrom langchain_community.document_loaders\
    \ import WebBaseLoader\n\nloader = WebBaseLoader(\"https://docs.smith.langchain.com/overview\"\
    )\ndocs = loader.load()\n```\n\n2. Split the loaded documents into chunks using\
    \ `RecursiveCharacterTextSplitter`:\n\n```python\nfrom langchain_text_splitters\
    \ import RecursiveCharacterTextSplitter\n\ndocuments = RecursiveCharacterTextSplitter(\n\
    \    chunk_size=1000, chunk_overlap=200\n).split_documents(docs)\n```\n\n3. Create\
    \ a vector store using FAISS and `OpenAIEmbeddings`:\n\n```python\nfrom langchain_community.vectorstores\
    \ import FAISS\nfrom langchain_openai import OpenAIEmbeddings\n\nvector = FAISS.from_documents(documents,\
    \ OpenAIEmbeddings())\nretriever = vector.as_retriever()\n```\n\nNow you have\
    \ a retriever that can search for information within the indexed documents. You\
    \ can invoke the retriever with a query:\n\n```python\nretriever.invoke(\"how\
    \ to upload a dataset\")[0]\n```\n\nThis will return the most relevant document\
    \ chunk based on the query.\n\n#### Creating a Retriever Tool\n\nTo make it easier\
    \ for your agent to use the retriever, we can convert it into a tool using the\
    \ `create_retriever_tool` function from LangChain:\n\n```python\nfrom langchain.tools.retriever\
    \ import create_retriever_tool\n\nretriever_tool = create_retriever_tool(\n  \
    \  retriever,\n    \"langsmith_search\",\n    \"Search for information about LangSmith.\
    \ For any questions about LangSmith, you must use this tool!\",\n)\n```\n\nThis\
    \ creates a retriever tool with a specific name and description, making it more\
    \ intuitive for your agent to understand when and how to use it.\n\n### Putting\
    \ It All Together\n\nNow that you have your tools ready, create a list that includes\
    \ both the Tavily search tool and the retriever tool:\n\n```python\ntools = [search,\
    \ retriever_tool]\n```\n\nThis allows your agent to perform online searches and\
    \ look up information from a local index.\n\n### Choosing the LLM\n\nThe next\
    \ step is to choose the language model (LLM) that will serve as the brain of your\
    \ agent. In this example, you will be using an OpenAI Functions agent, which is\
    \ a powerful and versatile option.\n\nTo get started, import the `ChatOpenAI`\
    \ class from the `langchain_openai` module and create an instance of the LLM:\n\
    \n```python\nfrom langchain_openai import ChatOpenAI\n\nllm = ChatOpenAI(model=\"\
    gpt-3.5-turbo-0125\", temperature=0)\n```\n\nHere, you are using the `gpt-3.5-turbo-0125`\
    \ model with a temperature of 0. Feel free to adjust these parameters based on\
    \ your specific requirements.\n\n### Selecting the Prompt\n\nNext, you need to\
    \ choose the prompt that will guide your agent's behavior. The prompt plays a\
    \ crucial role in shaping how the agent interacts with the tools and processes\
    \ input.\n\nIf you have access to LangSmith, you can explore the contents of a\
    \ predefined prompt by visiting [https://smith.langchain.com/hub/hwchase17/openai-functions-agent](https://smith.langchain.com/hub/hwchase17/openai-functions-agent).\n\
    \nAlternatively, you can use the `hub` module from LangChain to pull the prompt:\n\
    \n```python\nfrom langchain import hub\n\nprompt = hub.pull(\"hwchase17/openai-functions-agent\"\
    )\nprompt.messages\n```\n\nThis will retrieve the prompt template and display\
    \ its messages, which include system messages, placeholders for chat history and\
    \ agent scratchpad, and human input.\n\n### Initializing the Agent\n\nNow, it\
    \ is time to initialize your agent by combining the LLM, the prompt, and the tools\
    \ we defined earlier. The agent is responsible for taking input and deciding what\
    \ actions to take based on that input. It is important to note that the agent\
    \ itself does not execute the actions – that is the job of the `AgentExecutor`,\
    \ which we will discuss in the next step.\n\nTo create the agent, you will use\
    \ the `create_tool_calling_agent` function from the `langchain.agents` module:\n\
    \n```python\nfrom langchain.agents import create_tool_calling_agent\n\nagent =\
    \ create_tool_calling_agent(llm, tools, prompt)\n```\n\nThis function takes in\
    \ the LLM, the list of tools, and the prompt and returns an initialized agent\
    \ ready to tackle our tasks.\n\n### Creating the AgentExecutor\n\nThe final piece\
    \ of the puzzle is the `AgentExecutor`, which brings together the agent (the brains)\
    \ and the tools (the abilities). The `AgentExecutor` repeatedly calls the agent\
    \ to determine the next action and then executes the corresponding tool.\n\nTo\
    \ create an `AgentExecutor`, you will use the following code:\n\n```python\nfrom\
    \ langchain.agents import AgentExecutor\n\nagent_executor = AgentExecutor(agent=agent,\
    \ tools=tools, verbose=True)\n```\n\nWe pass in the initialized agent, the list\
    \ of tools, and set `verbose=True` to enable detailed output during execution.\n\
    \nLet us put the agent to the test and see what it can do! You will run a few\
    \ queries and observe how the agent handles them. Keep in mind that for now, these\
    \ queries are stateless, meaning the agent won't remember previous interactions.\n\
    \nFirst, start with a simple greeting:\n\n```python\nagent_executor.invoke({\"\
    input\": \"hi!\"})\n```\n\nWhen you run this code, the agent will process the\
