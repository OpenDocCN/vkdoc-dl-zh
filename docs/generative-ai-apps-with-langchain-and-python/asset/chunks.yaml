    3.  你学会了部署应用，使其准备好供全世界使用。\n\n## 第 11 章 使用 Streamlit 构建和部署类 ChatGPT 应用\n\n但真正的美妙之处在于，你不仅学会了使用\
    \ `LangChain` 和 `Streamlit` 等工具，还获得了直接适用于现实世界 AI 开发的技能。下次当有人说“我们需要一个 AI 驱动的 Web\
    \ 应用”时，你可以自信地说：“我能行！”\n\n那么，你的 AI 开发之旅下一步是什么？无论是什么，我知道你已经准备好了。继续编码、学习，最重要的是，不断突破生成式\
    \ AI 的可能性边界。\n\n## 复习题\n\n测试你对本章的理解。\n\n1.  `Streamlit` 主要用于什么？\n    -   A. 数据存储\n\
    \    -   B. 构建交互式 Web 应用\n    -   C. 机器学习模型训练\n    -   D. 网络安全\n\n2.  在本章中，哪个\
    \ Python 库对于连接到 OpenAI 的 `GPT-3.5-turbo` 模型至关重要？\n    -   A. Pandas\n    -   B.\
    \ NumPy\n    -   C. LangChain\n    -   D. Matplotlib\n\n3.  在本章的上下文中，`Streamlit`\
    \ 的 `st.text_input` 函数的主要目的是什么？\n    -   A. 显示图像\n    -   B. 为用户查询创建文本输入字段\n \
    \   -   C. 管理文件上传\n    -   D. 生成图表\n\n4.  在 `Streamlit` 应用中，实现了哪个功能来跟踪对话历史？\n\
    \    -   A. 会话状态\n    -   B. 全局变量\n    -   C. 数据库连接\n    -   D. 文件日志\n\n5.  部署\
    \ `Streamlit` 应用的第一步是什么？\n    -   A. 设置 SQL 数据库\n    -   B. 编写单元测试\n    -   C.\
    \ 在 Web 服务器或云服务上设置部署环境\n    -   D. 创建 Docker 容器\n\n6.  `LangChain` 如何增强应用中 AI\
    \ 模型的集成？\n    -   A. 通过提供预训练的机器学习模型\n    -   B. 通过提供简化提示工程和模型管理的工具\n    -   C.\
    \ 通过取代对其他 Python 库的需求\n    -   D. 通过改进数据可视化\n\n7.  哪个 `Streamlit` 命令用于在本地运行应用？\n\
    \    -   A. `streamlit deploy`\n    -   B. `streamlit serve`\n    -   C. `streamlit\
    \ start`\n    -   D. `streamlit run`\n\n8.  使用 `Streamlit` 开发 AI 应用有什么优势？\n  \
    \  -   A. 它为计算任务提供高性能。\n    -   B. 它简化了交互式 Web 界面的创建。\n    -   C. 它提供内置的自然语言处理工具。\n\
    \    -   D. 它默认确保数据安全和加密。\n\n9.  如果你需要在 `Streamlit` 中跨不同用户会话维护聊天历史，应该怎么做？\n  \
    \  -   A. 使用会话 Cookie\n    -   B. 实现一个数据库后端\n    -   C. 将数据存储在全局变量中\n    -   D.\
    \ 使用本地文本文件\n\n10. 以下哪一项是使用 `LangChain` 集成 OpenAI 的 `GPT-3.5-turbo` 模型的关键步骤？\n\
    \    -   A. 从头开始训练模型\n    -   B. 设置模型温度参数\n    -   C. 向模型上传数据\n    -   D. 可视化模型架构\n\
    \n## 答案\n"
