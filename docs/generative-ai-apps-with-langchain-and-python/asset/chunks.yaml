    a memory component to retain context across multiple interactions.


    **Types of Chains**


    Now that you know the basic components, let us explore the two main types of chains
    you will see in LangChain: LCEL (LangChain Execution Language) chains and legacy
    chains. Think of LCEL chains as more modern and flexible, while legacy chains
