    \ Provides the `ChatOpenAI` class for interacting with the OpenAI chat model\n\
    - `langchain.schema`: Provides the `HumanMessage` class for representing human\
    \ messages in conversation\n\n```python\nfrom pydantic import BaseModel, Field,\
    \ ValidationError, field_validator\nfrom langchain.output_parsers import PydanticOutputParser\n\
