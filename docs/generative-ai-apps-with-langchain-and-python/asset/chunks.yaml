- fmt: "However, it is not without trade-offs. Let us look at some of them:\n\n- You\
    \ will face challenges when integrating multiple LLM providers.\n- Maintaining\
    \ your code for LLM API changes or deprecations can be very maintenance heavy.\n\
    - You will miss out on the benefits of using boilerplate templates for common\
    \ tasks like prompt engineering or response parsing available with `LangChain`.\n\
    \n## Using LangChain\n\nLet us discuss when to prefer `LangChain`:\n\n- **Rapid\
    \ Development and Prototyping**: If you want to quickly prototype applications\
    \ without dealing with the intricacies of each LLM API, `LangChain` provides a\
    \ set of high-level tools and templates that speed up development.\n- **Flexibility\
    \ and Scalability**: If your project is expected to scale or evolve over time\
    \ and you will need to switch between LLM providers or experiment with different\
    \ models, then `LangChain`’s abstraction layer offers significant benefits. It\
    \ will be easier to manage modifications and updates to your LLM without needing\
    \ major code overhauls to integrate with the LLM.\n- **Complex Applications Requiring\
    \ Advanced Features**: You can use `LangChain`’s advanced functionalities like\
    \ prompt chaining, memory concepts, and data connections that can be very critical\
    \ when developing sophisticated, enterprise-grade generative AI applications.\
    \ These features are not available when making direct API calls.\n- **Multi-LLM\
    \ Integration**: `LangChain` is particularly useful when integrating with multiple\
    \ LLM providers. You do not have to deal with the complexities involved when interacting\
    \ with different LLM APIs because you will be working with `LangChain`’s interface\
    \ directly.\n- **Cost Optimization**: For projects that do require multiple LLMs,\
    \ `LangChain` allows easy switching between providers. This can be particularly\
    \ useful for cost management because you could use low-cost or open source LLMs\
    \ for development and testing and commercial providers for production.\n- **Active\
    \ Community and Ecosystem**: `LangChain` has a vibrant community and extensive\
    \ ecosystem of tools, plug-ins, and resources. You can use this support network\
    \ to significantly accelerate development and problem-solving.\n\n## Trade-offs\n\
    \nLet us explore some of the trade-offs when using `LangChain`:\n\n- You may face\
    \ potential limitations when trying to access all the features offered by specific\
    \ LLM APIs.\n- Debugging can be difficult due to the additional layers of abstraction\
    \ introduced by `LangChain` which adds to the overhead or complexity.\n- You will\
    \ have to depend on `LangChain` updating their code to support new LLM features\
    \ or models.\n\nUltimately, you will have to factor in your project’s scale, complexity,\
    \ and specific requirements to choose between making direct LLM API calls and\
    \ `LangChain`.\n\n## Preparing Your Dev Environment\n\nAlright, I think now is\
    \ a good time to get our hands dirty. Like any other development project, it starts\
    \ with you first setting up your development environment.\n\n### Step 1: Obtaining\
    \ OpenAI API Keys\n\nTo start developing applications using OpenAI’s LLMs, you\
    \ first need to acquire an API key from OpenAI. Here’s how to do it.\n\n#### Create/Open\
    \ an Account\n\nFirst, you will need to create an account with OpenAI’s API. This\
    \ will give you access to their powerful language models, which we will be using\
    \ throughout this book. To get started, head over to `openai.com/api` and click\
    \ the “Sign Up” button. If you already have an account, you can simply log in.\n\
    \nNow, the sign-up process might require you to verify your account with a mobile\
    \ phone number, depending on your location. Just follow the on-screen instructions,\
    \ and you will be good to go.\n\n#### Billing Information\n\nOnce you have signed\
    \ up or logged in, you will need to set up your billing information. As of this\
    \ writing, OpenAI offers free credit for the first few months, so you can get\
    \ some hands-on practice without spending a dime.\n\n#### API Key\n\n**Note**:\
    \ after you reach the free credit limit, you’ll need to provide a credit card\
    \ for any additional charges.\n\n![](index-75_1.jpg)\n\n![](index-75_2.jpg)\n\n\
    To get your API key, navigate to the “View API Keys” section under your account\
    \ settings.\n\nClick “Create New Secret Key,” copy the key that’s generated, and\
    \ store it somewhere safe.\n\n**Note**: treat this key like a precious item because\
    \ if you lose it, you will have to create a new one, and you won’t be able to\
    \ access the old one ever again.\n\n![](index-76_1.png)\n\n### Step 2: Setting\
    \ Up the Python Development Environment\n\nNow, let’s move over to our Python\
    \ development environment. I will assume you are using a Jupyter Notebook, but\
    \ feel free to use your preferred setup, like Visual Studio Code or PyCharm.\n\
    \n#### Google Colaboratory\n\nI will be using the Google Colaboratory here at\
    \ `https://colab.research.google.com/`.\n\nCreate a new notebook by selecting\
    \ File ➤ New Notebook and give a suitable name to the file.\n\n#### Install OpenAI\
    \ Library\n\nFirst, we need to install the OpenAI Python library. You can do this\
    \ by entering the command below and running it in your notebook by clicking the\
    \ arrow icon:\n\n```\n!pip install openai\n```\n\n**Note**: You can also use `poetry`\
    \ for managing dependencies. `poetry` provides better dependency management, project\
    \ isolation, and reproducibility compared to using `pip` directly.\n\nOnce successfully\
    \ installed, you will see a success message as shown below:\n\n#### Configure\
    \ API Key\n\nOnce the installation is complete, you can import the library and\
    \ set up your API key as an environment variable. This is a best practice to keep\
    \ your sensitive credentials safe and secure:\n\n```\nimport os\nimport openai\n\
    \n# Set the API key as an environment variable\nos.environ[\"OPENAI_API_KEY\"\
    ] = \"your_api_key_here\"\n\n# Confirm that the API key is set correctly\nopenai.api_key\
    \ = os.getenv(\"OPENAI_API_KEY\")\n```\n\nReplace `\"your_api_key_here\"` with\
    \ the actual API key you copied earlier. Don’t worry; we will keep this key safe\
    \ and sound in our environment variable later.\n\n#### Test the Setup\n\nNow,\
    \ test your setup by sending a simple request to the OpenAI API:\n\n```\nclient\
    \ = openai.Client()  # Create a client\nresponse = client.completions.create(\n\
    \    model=\"davinci-002\",  # Or any currently available text-davinci model\n\
    \    prompt=\"What is machine learning model?.\",\n    max_tokens=300\n)\nprint(response.choices[0].text)\n\
    ```\n\nThis code will send a request to the OpenAI API, asking to explain what\
    \ a machine learning model is. The `model` parameter specifies which language\
    \ model we want to use (in this case, `davinci-002`), and the `max_tokens` parameter\
    \ limits the length of the response.\n\n**Note**: Visit the OpenAI’s model overview\
    \ page to ensure that the model you are choosing is current and is not deprecated.\
    \ Secondly, you may also run into issues due to not using the latest version of\
    \ OpenAI.\n\nIf everything is set up correctly, you should see a response printed\
    \ in your notebook, providing the definition for machine learning model.\n\n####\
    \ Securing the API Key Using Environment Variables\n\nYou must always keep your\
    \ API key confidential and follow security best practices to protect it. Below\
    \ are some recommendations:\n\na) Setting up the environment variables\n\nYou\
    \ can store your OpenAI API key as an environment variable on your development\
    \ machine or server.\n\nOn macOS/Linux:\n\n```\nexport OPENAI_API_KEY=your_api_key_here\n\
