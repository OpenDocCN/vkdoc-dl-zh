  trans: "\n# 第 11 章 使用 Streamlit 构建和部署类 ChatGPT 应用\n\n## 3. 使用`.env`文件\n\na. 在项目目录中创建一个名为`.env`的文件。\n\
    \nb. 在文件中添加以下内容：\n\n```\nOPENAI_API_KEY=your_api_key_here\n```\n\nc. 安装`python-dotenv`包：`pip\
    \ install python-dotenv`\n\nd. 在 Python 代码中加载环境变量：\n\n```python\nfrom dotenv import\
    \ load_dotenv\nimport os\n\nload_dotenv()\nopenai_api_key = os.getenv(\"OPENAI_API_KEY\"\
    )\n```\n\n## 4. 在代码中访问环境变量\n\n设置好环境变量后，你可以像这样在 Python 代码中访问它：\n\n```python\nimport\
    \ os\nopenai_api_key = os.getenv(\"OPENAI_API_KEY\")\n```\n\n## 5. 使用环境变量的好处\n\
    \n- **安全性**：你的 API 密钥不会硬编码在源代码中。\n- **灵活性**：无需修改代码即可轻松更改。\n- **可移植性**：适用于不同环境（开发、预发布、生产）。\n\
    \n## 6. 最佳实践\n\n- 切勿将`.env`文件提交到版本控制。\n- 将`.env`添加到你的`.gitignore`文件中。\n- 为其他开发者提供一个包含占位值的`.env.example`文件。\n\
    \n通过将 API 密钥设置为环境变量，你可以在本地开发时避免敏感信息泄露的风险。\n\n请注意，在部署应用程序时，你将使用部署平台的密钥管理系统（如 Streamlit\
    \ Cloud 的密钥管理功能）来安全地存储和访问生产环境中的 API 密钥。\n\n## 解决仓库中的敏感信息问题\n\n如果你发现仓库中仍存在敏感信息问题，可以按照以下步骤操作：\n\
    \n1. `.env`文件\n   - 创建一个名为`.env.txt`的文件，但实际应为`.env`（不带`.txt`扩展名）。\n\n2. 从 Git\
    \ 跟踪中移除`.env`文件：\n   ```\n   git rm --cached .env.txt\n   git rm --cached .env\n\
    \   ```\n\n3. 如有需要，将`.env.txt`重命名为`.env`：\n   ```\n   ren .env.txt .env\n   ```\n\
    \n4. 更新`.gitignore`。确保你的`.gitignore`文件包含：\n   ```\n   .env\n   *.pyc\n   __pycache__/\n\
    \   ```\n\n5. 从其他文件中移除 API 密钥：\n   - 打开`LangChainUI.py`，将硬编码的 API 密钥替换为：\n   \
    \  ```python\n     import os\n     from dotenv import load_dotenv\n     load_dotenv()\n\
    \     openai_api_key = os.getenv(\"OPENAI_API_KEY\")\n     ```\n\n6. 提交这些更改：\n\
    \   ```\n   git add .gitignore\n   git add LangChainUI.py \"LangChainUI - Copy.py\"\
    \n   git commit -m \"移除 API 密钥并更新.gitignore\"\n   ```\n\n7. 强制推送更改：\n   ```\n\
    \   git push -u origin main --force\n   ```\n\n8. 清理 Git 历史。如果 API 密钥仍存在于 Git\
    \ 历史中，你可能需要清理它：\n   ```\n   git filter-branch --force --index-filter \"git rm\
    \ --cached --ignore-unmatch .env.txt .env LangChainUI.py 'LangChainUI - Copy.py'\"\
    \ --prune-empty --tag-name-filter cat -- --all\n   ```\n\n然后再次强制推送：\n```\ngit\
    \ push origin --force --all\n```\n\n请记住，清理 Git 历史后，任何克隆过你仓库的人都需要重新克隆或执行强制拉取。\n\
    \n这些步骤应该能从你的仓库中移除 API 密钥，并防止其被推送到 GitHub。你应始终谨慎处理敏感信息，并在推送前仔细检查你的提交。\n\n## 防止电子邮件隐私相关问题\n\
    \n有时，你可能会收到与隐私相关的错误消息，提示 GitHub 因电子邮件隐私限制而阻止推送。\n\nGitHub 可能正在通过不允许将包含私人电子邮件地址的提交推送到公共仓库来保护你的隐私。以下是解决此问题的方法：\n\
    \n1. 配置 Git 使用 GitHub 提供的无回复电子邮件地址：\n   a. 登录你的 GitHub 账户。\n   b. 进入设置 ➤ 电子邮件。\n\
    \   c. 查找类似“保持我的电子邮件地址私密。在执行基于 Web 的 Git 操作以及代表你发送电子邮件时，我们将使用`yourusername@users.noreply.github.com`”的段落。\n\
    \   d. 复制此电子邮件地址（它应该类似于`yourusername@users.noreply.github.com`）。\n\n![](img/index-493_1.jpg)\n"
- fmt: "# Chapter 11 Building and deploying a Chatgpt-like app using streamlit\n\n\
    2. Set this email in your Git configuration. Open your command prompt and run:\n\
    \n`git config --global user.email yourusername@users.noreply.github.com`\n\nReplace\
    \ `yourusername@users.noreply.github.com` with the actual no-reply email address\
    \ you found in your GitHub settings.\n\n3. Amend the last commit to use the new\
    \ email:\n\n`git commit --amend --reset-author`\n\nThis will open your default\
    \ text editor. Just save and close the editor without making any changes.\n\n\
    4. Force push again:\n\n`git push origin --force --all`\n\nAlternatively, if you\
    \ are comfortable making your commit email public:\n\n1. Go to GitHub Settings\
    \ ➤ Emails.\n2. Uncheck the box that says “Keep my email address private” as shown\
    \ below.\n3. Make sure your public commit email is set to an email you are comfortable\
    \ being public.\n\nAfter making either of these changes, try pushing your changes\
    \ again. This should resolve the email privacy restriction issue.\n\nRemember,\
    \ if you choose to use the no-reply email, you will need to use this email for\
    \ all your Git commits to avoid this issue in the future. If you are working on\
    \ a shared machine or multiple projects, you might want to set this on a per-repository\
    \ basis instead of globally.\n\n`git config user.email yourusername@users.noreply.github.com`\n\
    \nRun this command in each repository where you want to use the no-reply email.\n\
    \n## Deploying the App in GitHub\n\nBelow are the steps to deploy your app in\
    \ GitHub:\n\n1. First, create a new repository on GitHub if you haven’t already.\
    \ Let us say you named it `streamlit-qa-app`.\n2. Now, modify the commands with\
    \ your information:\n\n```\ngit remote add origin https://github.com/your-actual-username/streamlit-qa-app.git\n\
    git branch -M main\ngit push -u origin main\n```\n\nHere is what each command\
    \ does:\n\n- The first command adds a remote named `origin` pointing to your GitHub\
    \ repository.\n- The second command renames your current branch to `main` (if\
    \ it is not already named that).\n- The third command pushes your local `main`\
    \ branch to the `origin` remote and sets it up to track the remote branch.\n\n\
    ![](index-495_1.jpg)\n\nAfter running these commands, your local repository will\
    \ be connected to your GitHub repository, and your code will be pushed to GitHub\
    \ as shown below.\n\nRemember, you only need to run the `git remote add` command\
    \ once for each repository. For subsequent pushes, you can simply use:\n\n```\n\
    git remote add origin https://github.com/<your_user_name>/streamlit-qa-app.git\n\
    git branch -M main\ngit push -u origin main\n```\n\n## Providing Access to GitHub\n\
    \nRemember that as part of deploying the app to GitHub, you may need to give the\
    \ appropriate permissions to GitHub.\n\n![](index-496_1.jpg)\n\n![](index-496_2.jpg)\n\
    \nIn situations where you don’t see the repository or you don’t have access to\
    \ it, you should follow the steps below to resolve the issue:\n\n1. Verify the\
    \ repository exists:\n   - Go to [https://github.com/<your_user_name>/streamlit-qa-app](https://github.com/rabijay1/streamlit-qa-app).\n\
    \   - If you see a 404 error, the repository doesn’t exist.\n\n2. If the repository\
    \ doesn’t exist:\n   - Go to GitHub and create a new repository named `streamlit-qa-app`.\n\
    \   - Make sure it is under your account (your username).\n   - Do not initialize\
    \ the repository with a README, `.gitignore`, or license if you are pushing an\
    \ existing repository.\n\n3. Check your remote URL. Run this command to verify\
    \ the remote URL:\n\n`git remote -v`\n\nIt should show:\n\n```\norigin https://github.com/your_user_name/streamlit-qa-app.git\
    \ (fetch)\norigin https://github.com/your_user_name/streamlit-qa-app.git (push)\n\
    ```\n\n4. If the URL is incorrect, update it with:\n\n`git remote set-url origin\
    \ https://github.com/your_user_name/streamlit-qa-app.git`\n\n5. Ensure you are\
    \ logged in if you see this error."
