    \n## 部署应用\n\n- **部署 Streamlit 应用**：将`Streamlit`应用部署到云或其他托管服务的指南。  \n  [`docs.streamlit.io/deploy/streamlit-community-cloud/deploy-your-app`](https://docs.streamlit.io/deploy/streamlit-community-cloud/deploy-your-app)\n\
    \n## GitHub 集成\n\n- **GitHub 入门**：学习如何使用 GitHub 进行版本控制和协作。  \n  [`docs.github.com/en/get-started/start-your-journey/hello-world`](https://docs.github.com/en/get-started/start-your-journey/hello-world)\n\
    - **使用环境变量**：使用环境变量管理 API 密钥和其他敏感信息的最佳实践。  \n  [`12factor.net/config`](https://12factor.net/config)\n\
