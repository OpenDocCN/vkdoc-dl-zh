  trans: "\n# 使用 LangChain 进行检索任务的示例\n\n```python\nfrom langchain_community.vectorstores\
    \ import FAISS\nfrom langchain_openai import OpenAIEmbeddings, ChatOpenAI\nfrom\
    \ langchain.chains import RetrievalQA\nfrom langchain.document_loaders import\
    \ TextLoader\n\n# 加载并准备数据\nloader = TextLoader('your_data.txt')\ndocuments = loader.load()\n\
    \n# 创建向量存储\nembeddings = OpenAIEmbeddings()\nvectorstore = FAISS.from_documents(documents,\
    \ embeddings)\n\n# 初始化语言模型\nllm = ChatOpenAI(model_name=\"gpt-3.5-turbo\")\n\n\
    # 创建检索链\nqa_chain = RetrievalQA.from_chain_type(\n    llm=llm,\n    chain_type=\"\
    stuff\",\n    retriever=vectorstore.as_retriever()\n)\n\n# 使用链\nquery = \"你的问题\"\
    \nresult = qa_chain.invoke({\"query\": query})\nprint(result['result'])\n```\n\
    \n## 第 3 章 构建问答与聊天机器人应用\n\n这个简化示例展示了如何使用 LangChain 创建一个基于检索的基本问答系统。\n\n1. 首先，从文本文件中加载文档。\n\
    2. 然后创建一个向量存储（`FAISS`），用于高效存储和检索文档嵌入。\n3. 初始化一个语言模型（`ChatOpenAI`）。\n4. 创建一个 `RetrievalQA`\
    \ 链，将检索器与语言模型结合起来。\n5. 最后，使用该链基于加载的文档回答问题。\n\n通过这种设置，你可以询问关于文档内容的问题，系统将检索相关信息并生成答案。\n\
    \n请记得将 `your_data.txt` 替换为实际数据文件的路径，并确保已为 OpenAI 设置好必要的 API 密钥。\n\n## 生态系统与集成\n\
    \n你应该意识到，LangChain 生态系统不仅仅包含这些软件包。它还为你提供了多种工具和集成，可用于部署、监控和管理你的应用程序：\n\n### 第 3\
    \ 章 构建问答与聊天机器人应用\n\n**LangTemplates**：这些是即用型模板，可帮助你快速上手常见用例。`LangTemplates` 为诸如回复邮件、分析文本等用例提供了坚实的起点。\n\
    \n**LangServe**：你将使用 `LangServe` 将 LangChain 应用程序部署为 REST API。你可以轻松地将链转换为广泛可访问的\
    \ Web 服务。\n\n**LangSmith**：`LangSmith` 提供与 LangChain 无缝集成的调试和监控工具。你可以利用它们获取分析洞察，并用于进一步优化你的生成式\
    \ AI 应用。\n\n通过将软件包拆分为核心组件和社区组件，LangChain 保持了轻量级和灵活的结构，使你能够为各种用例构建应用程序。\n\n## 使用\
    \ LangChain 模型与 LLM\n\n在本节中，我们将探讨 LangChain 中的模型、其输入和输出。\n\n### 模型 IO：LangChain\
    \ 的核心功能\n\n任何语言模型应用的核心都是模型本身。模型 IO 是一种机制，通过它你可以无缝地与大型语言模型（LLM）进行通信。你将使用它来连接这些卓越\
    \ LLM 模型的庞大知识和能力。\n\n### 第 3 章 构建问答与聊天机器人应用\n\nLangChain 模型 IO 的优势之一在于，它允许你轻松地在不同提供商之间切换。这是一个巨大的优势，因为即使你最初使用\
    \ OpenAI 启动项目，也可以选择探索来自 Google Cloud 或 Anthropic 的其他模型的能力。你可以毫不费力地进行切换，而无需重写整个代码库。\n\
    \n### 使用 LangChain 的大型语言模型（LLM）\n\n在本节中，我们将讨论不同类型的语言模型，并探讨 LangChain 如何简化与它们的交互。\n\
    \n#### LangChain 模型的类型\n\n你可以在 LangChain 中使用两种类型的模型，即通用 LLM 和聊天模型：\n\n**LLM 模型**：通用\
    \ LLM 模型也称为文本补全模型，它就像一个文字魔法师，能够预测输入文本最可能的后续内容。你可以发送一个字符串提示作为输入，并生成一个字符串补全作为输出。这是一种直接的方法，就像拥有一个智能文本生成器。想象一下，你以“一石二”开头，模型会将其补全为“鸟”。\n\
    \n**聊天模型**：聊天模型建立在 LLM 之上，但专门针对使用消息进行来回对话进行了调优。你发送一条人类消息，AI 用自己的消息回复，对话就这样不断来回进行。这就像有一个随时准备聊天的人！\n\
    \n### 第 3 章 构建问答与聊天机器人应用\n"
- fmt: "You can also use the system-level prompt in chat models to give a personality\
    \ to the AI model. These system-level prompts help you to set a specific tone\
    \ or role for the AI, such as a friendly and patient tutor, and it will engage\
    \ in the conversation accordingly.\n\nOne thing you should keep in mind when selecting\
    \ the models is that different models have their own characteristics and preferences,\
    \ and you should choose the one that suits your application. We will discuss LLM\
    \ models in greater detail in the upcoming chapter.\n\n**Note** For the full list\
    \ of LLMs supported by `LangChain`, check the `LangChain` documentation: [https://python.langchain.com/](https://python.langchain.com/v0.2/docs/integrations/llms/)\n\
    \n[https://python.langchain.com/v0.2/docs/integrations/llms/](https://python.langchain.com/v0.2/docs/integrations/llms/)\n\
    \n## Building a Simple Q&A Application\n\nAlright, let us get our hands dirty\
    \ with some code to understand this better.\n\n### Step 1: Import the Libraries\n\
    \n```\nfrom langchain_openai import OpenAI\nfrom langchain_core.prompts import\
    \ ChatPromptTemplate\nfrom langchain_core.output_parsers import StrOutputParser\n\
    ```\n\nFirst, you must import necessary classes from `LangChain` libraries. `OpenAI`\
    \ is the LLM, `ChatPromptTemplate` is for structuring prompts, and `StrOutputParser`\
    \ is for parsing the output.\n\n### Step 2: Output Parser\n\nThen you must create\
    \ an instance of `StrOutputParser`, which will convert the LLM’s output into a\
    \ string:\n\n```\noutput_parser = StrOutputParser()\n```\n\n### Step 3: Create\
    \ a Prompt Template\n\nYou must then create a chat prompt template with two messages:\n\
    \n- A system message that sets the context for the AI (acting as a wellness expert)\n\
    - A user message with a placeholder `{input}` for the actual query\n\n```\nprompt\
    \ = ChatPromptTemplate.from_messages([\n    (\"system\", \"You are a world recognized\
    \ wellness expert especially in cardio activities.\"),\n    (\"user\", \"{input}\"\
    )\n])\n```\n\n### Step 4: Initialize the LLM\n\nYou then initialize the OpenAI\
    \ language model. Remember to replace `\"openai_api_key\"` with your actual OpenAI\
    \ API key:\n\n```\nllm = OpenAI(api_key=\"openai_api_key\")\n```\n\n### Step 5:\
    \ Create the Chain\n\nHere, you create a processing chain using the `|` operator.\
    \ It connects the prompt, the LLM, and the output parser in sequence. We will\
    \ discuss chains in greater detail in the chapter on chains.\n\n```\nchain = prompt\
    \ | llm | output_parser\n```\n\n### Step 6: Invoke the Chain\n\nFinally, you invoke\
    \ the chain with a specific input. The chain will:\n\n1. Format the prompt with\
    \ the given input.\n2. Send the formatted prompt to the OpenAI LLM.\n3. Parse\
    \ the LLM’s response using the `StrOutputParser`.\n\n### Step 7: Output\n\nThe\
    \ final output will be a string containing the LLM’s response about the benefits\
    \ of walking a mile a day, framed as if it is coming from a wellness expert specializing\
    \ in cardio activities.\n\n```\noutput = chain.invoke({\"input\": \"What are the\
    \ benefits of walking a mile a day?\"})\n```\n\nCongratulations, you just adopted\
    \ a simple yet powerful way to interact with an LLM using `LangChain` and used\
    \ structured inputs and outputs in a chain-like processing flow.\n\n### Full End-to-End\
    \ Working Code\n\nBelow is the full end-to-end working code:\n\n```\n!pip install\
    \ langchain_core==0.2.17 langchain_openai==0.1.16\n\nfrom langchain_openai import\
    \ OpenAI\nfrom langchain_core.prompts import ChatPromptTemplate\nfrom langchain_core.output_parsers\
    \ import StrOutputParser\n\noutput_parser = StrOutputParser()\n\nprompt = ChatPromptTemplate.from_messages([\n\
    \    (\"system\", \"You are a world recognized wellness expert especially in cardio\
    \ activities.\"),\n    (\"user\", \"{input}\")\n])\n\nllm = OpenAI(api_key=\"\
    your open AI key\")\n\n# Create a chain that defines how your application interacts\
    \ with the LLM\nchain = prompt | llm | output_parser\n\noutput = chain.invoke({\"\
    input\": \"What are the benefits of walking a mile a day?\"})\nprint(output)\n\
    ```\n\n**Note** When running this code, if you happen to run into error, check\
    \ with `Gemini` or `ChatGPT` by pasting the error you are facing, and they should\
    \ point you to the correct syntax based on the different versions of `openai`\
    \ and `LangChain` you may be using.\n\n## Building a Conversational App\n\nChatting\
    \ with chat models is quite straightforward once you get the hang of it. First\
    \ off, you will need to import the `ChatOpenAI` class from `langchain_openai`.\
    \ This will let you interface with OpenAI’s chat models like GPT-3.5 Turbo and\
    \ GPT-4.\n\nHere is how you do it.\n\n### Step 1: Importing Necessary Modules\n\
    \nFirst, you must import the required modules for interacting with OpenAI’s chat\
    \ models, formatting messages, and handling environment variables:\n\n```\n# Import\
    \ the necessary modules\nfrom langchain_openai import ChatOpenAI\nfrom langchain_core.messages\
    \ import HumanMessage\nimport os\n```\n\n### Step 2: Setting the API Key\n\nYou\
    \ must set the OpenAI API key as an environment variable. This is a more secure\
    \ practice than hardcoding the key in your script. You must remember to replace\
    \ `\"Your OpenAI Key\"` with your actual API key:\n\n```\n# Set the API key as\
    \ an environment variable (more secure)\nos.environ[\"OPENAI_API_KEY\"] = \"Your\
    \ OpenAI Key\"\n```\n\n### Step 3: Creating a ChatOpenAI Object\n\nYou must create\
    \ an instance of the `ChatOpenAI` class, which represents the chat-based model.\
    \ The `model` parameter specifies the specific model to use, in this case, `\"\
    gpt-3.5-turbo-0125\"`. The `openai_api_key` parameter is set to your OpenAI API\
    \ key, which is required to authenticate and access the OpenAI API. The `temperature`\
    \ parameter is set to zero, which means the model will generate deterministic\
    \ responses:\n\n```\n# Create a ChatOpenAI object\nchat_model = ChatOpenAI(model=\"\
    gpt-3.5-turbo-0125\", openai_api_key=\"Your OpenAI Key\", temperature=0)\n```\n\
    \n### Step 4: Defining a Function to Generate Responses\n\nYou must define a function\
    \ called `generate_response` that takes a single parameter `text` to generate\
    \ a response from the chat model based on the input text:\n\n```\n# Create a function\
    \ to generate responses\ndef generate_response(text):\n    messages = [HumanMessage(content=text)]\n\
    \    response = chat_model.invoke(messages)\n    return response.content\n```\n\
    \nLet us discuss the above code further:\n\n- **`messages = [HumanMessage(content=text)]`**:\
    \ Inside the `generate_response` function, you create a list called `messages`\
    \ that contains a single `HumanMessage` object. The `HumanMessage` class represents\
    \ a message sent by a human user, and it takes the input text as its content.\n\
    - **`response = chat_model.invoke(messages)`**: You invoke the chat model using\
    \ the `invoke` method of the `ChatOpenAI` object. You pass the `messages` list\
    \ as an argument, which contains the human message. The chat model processes the\
    \ message and generates a response.\n- **`return response.content`**: You return\
    \ the content of the generated response. The response object returned by the chat\
    \ model has a `content` attribute that contains the actual text of the response.\n\
    \n### Step 5: Creating the Main Interaction Loop\n\nBelow, you start an infinite\
    \ loop that allows the user to interact with the chatbot repeatedly:\n\n```\n\
    # Create a loop to interact with the chatbot\nwhile True:\n    # Get user input\n\
    \    user_input = input(\"Enter a message: \")\n    # Generate a response\n  \
    \  response = generate_response(user_input)\n```"
