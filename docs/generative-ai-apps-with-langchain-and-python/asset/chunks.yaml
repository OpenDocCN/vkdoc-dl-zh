    # Chapter 11 Building and deploying a Chatgpt-like app using streamlit


    ## 2. Add Git to PATH


    After installation, Git should automatically be added to your system’s PATH. However,
    if it is not, you can add it manually.


    a. Right-click “This PC” or “My Computer” and select “Properties.”

    b. Click “Advanced system settings.”

    c. Click “Environment Variables.”

    d. Under “System variables,” find and select the “Path” variable, then click “Edit.”


    ![](index-485_1.jpg)


    e. Click “New” and add the path to your Git installation. It is typically `C:\Program
    Files\Git\cmd`.

    f. Click “OK” to close all dialog boxes.


    ## 3. Restart Command Prompt


    After installing Git or modifying the `PATH`, you need to close and reopen your
    Command Prompt for the changes to take effect.


    ## 4. Verify Installation


    Open a new Command Prompt and type `git –version`.


    ![](index-486_1.png)

    ![](index-486_2.png)


    This should display the installed version of Git as shown in the figure below
    if everything is set up correctly.


    ## 5. Try Git Init


    Now you should be able to run `git init` in your project directory without any
    errors.


    ## Setting Up Your Identity


    Git uses your identity information to associate commits with an author. You need
    to set up your Git configuration with your name and email address. Here is how
    to do it:


    ### 1. Set Your Email Address


    Run the following command, replacing `your.email@example.com` with your actual
    email address.


    ```

    git config --global user.email your.email@example.com

    ```


    ### 2. Set Your Name


    Run this command, replacing “Your Name” with your actual name.


    ```

    git config --global user.name "Your Name"

    ```


    ### 3. Verify Your Settings


    You can check your settings by running `git config –list`.


    This will display all your Git configurations, including the email and name you
    just set.


    ### 4. Try Committing Again


    After setting your email and name, try your commit command again.


    ```

    git commit -m "Initial commit for Streamlit Q&A app"

    ```


    ## Important Notes


    - The `--global` flag sets this configuration for all Git repositories on your
    computer. If you want to use different settings for different projects, you can
    omit `--global` and run these commands from within a specific repository.

    - Make sure to use an email address that is associated with your GitHub account
    if you plan to push your commits to GitHub.

    - If you are concerned about privacy, GitHub provides options for keeping your
    email address private. You can use the GitHub-provided no-reply email address
    in your Git configuration.


    After completing these steps, you should be able to commit your changes without
    any identity-related errors. Remember, this is a one-time setup unless you want
    to change your Git identity later.


    ## Set Up the OpenAI Key As an Environmental Variable


    You should also set up an environment variable for local development for keeping
    sensitive information like API keys secure. Here is a more detailed explanation
    of how to do this:


    ### 1. For Windows


    #### a. Temporary (for current session only)


    - Open Command Prompt.

    - Type: `set OPENAI_API_KEY=your_api_key_here`


    #### b. Permanent


    - Search for “Environment Variables” in the Start menu.

    - Click “Edit the system environment variables.”

    - Click “Environment Variables.”

    - Under “User variables,” click “New.”

    - Variable name: `OPENAI_API_KEY`

    - Variable value: `your_api_key_here`

    - Click “OK” to save.


    ### 2. For macOS/Linux


    #### a. Temporary (for current session only)


    - Open Terminal.

    - Type: `export OPENAI_API_KEY=your_api_key_here`


    #### b. Permanent


    - Open your shell configuration file (e.g., `~/.bash_profile`, `~/.zshrc`).

    - Add the line: `export OPENAI_API_KEY=your_api_key_here`

    - Save the file and restart your terminal or run `source ~/.bash_profile` (or
    relevant file).'
