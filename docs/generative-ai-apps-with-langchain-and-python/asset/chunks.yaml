    **Intelligent Agent Performing Tasks**


    **with Multiple Tools**


    In this section, we are going to create an intelligent agent that can perform
    tasks using multiple tools. This agent will search for information online and
    look up specific data from a preloaded index.


    **Setup: Introducing LangSmith**


    Building agents can be tricky, especially when it comes to debugging and observability.
    That is where LangSmith comes in to make the process of building and debugging
    agents easy by tracing all the steps in your agent’s workflow. To set up LangSmith,
    you just need to set a couple of environment variables:


    export LANGCHAIN_TRACING_V2="true"


    export LANGCHAIN_API_KEY="<your-api-key>"


    Make sure to replace <your-api-key> with your actual LangSmith API key.


    **Defining Tools**


    We will equip your agent with two powerful tools – Tavily for online search and
    a retriever for querying a local index.


    Chapter 9 Building different types of agents


    **Tool 1: Tavily**


    Tavily is a built-in tool in LangChain that allows your agent to search the Web
    effortlessly and gives access to a vast knowledge base. To use Tavily, you will
    need an API key. They offer a free tier, but if you don’t have one or don’t want
    to create one, feel free to skip this step.


    Once you have your Tavily API key, export it as an environment


    variable:


    export TAVILY_API_KEY="..."


    Now, let us create an instance of the TavilySearchResults tool:


    from langchain_community.tools.tavily_search import


    TavilySearchResults


    search = TavilySearchResults()


    You can easily invoke the search tool with a query:


    search.invoke("what is the weather in San Francisco")


    This will return a list of search results related to the weather in San Francisco.


    **Tool 2: Retriever**


    In addition to online search, create a retriever that allows your agent to look
    up information from a local index. This is particularly useful when you have specific
    data that you want your agent to access quickly.


    To create the retriever, follow these steps:


    1\. Load the data using WebBaseLoader:


    from langchain_community.document_loaders import


    WebBaseLoader


    loader = WebBaseLoader("https://docs.smith.


    langchain.com/overview")


    docs = loader.load()


    Chapter 9 Building different types of agents


    2\. Split the loaded documents into chunks using


    RecursiveCharacterTextSplitter:


    from langchain_text_splitters import


    RecursiveCharacterTextSplitter


    documents = RecursiveCharacterTextSplitter(


    chunk_size=1000, chunk_overlap=200


    ).split_documents(docs)


    3\. Create a vector store using FAISS and


    OpenAIEmbeddings:


    from langchain_community.vectorstores


    import FAISS


    from langchain_openai import OpenAIEmbeddings


    vector = FAISS.from_documents(documents,


    OpenAIEmbeddings())


    retriever = vector.as_retriever()


    Now you have a retriever that can search for information within the indexed documents.
    You can invoke the retriever with a query:


    retriever.invoke("how to upload a dataset")[0]


    This will return the most relevant document chunk based on the query.


    **Creating a Retriever Tool**


    To make it easier for your agent to use the retriever, we can convert it into
    a tool using the create_retriever_tool function from LangChain:


    from langchain.tools.retriever import create_retriever_tool


    retriever_tool = create_retriever_tool(


    Chapter 9 Building different types of agents


    retriever,


    "langsmith_search",


    "Search for information about LangSmith. For any questions


    about LangSmith, you must use this tool!",


    )


    This creates a retriever tool with a specific name and description, making it
    more intuitive for your agent to understand when and how to use it.


    **Putting It All Together**


    Now that you have your tools ready, create a list that includes both the Tavily
    search tool and the retriever tool:


    tools = [search, retriever_tool]


    This allows your agent to perform online searches and look up


    information from a local index.


