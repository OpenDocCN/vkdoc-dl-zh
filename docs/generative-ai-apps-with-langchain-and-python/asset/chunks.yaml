    **Indexing**


    In this section, let us discuss the power of indexing to manage our documents.
    The LangChain indexing API allows you to load and keep your documents in sync
    with a vector store and avoids duplicating content, rewriting unchanged documents,
    and recomputing embeddings unnecessarily. It is all about saving you time and
    money while improving your vector search results.


    CHAPTER 7 BUILDING ADVANCED Q&A AND SEARCH APPLICATIONS USING RETRIEVAL-AUGMENTED
    GENERATION (RAG)


    Under the hood, the indexing API uses a RecordManager, which keeps track of document
    writes into the vector store by computing hashes for each document and storing
    some key information such as the following:


    • The document hash (a unique fingerprint of the page


    content and metadata)


    • The write time (when the document was added or


    updated)


    • The source ID (a way to identify the original source of


    the document)


    You can also use the deletion modes offered by the indexing API to control how
    existing documents are handled when new ones are indexed.


    You can choose from


    1\. **None**: This mode gives you the freedom to manually


    manage your content as the API doesn’t do any


    automatic cleanup.


    2\. **Incremental**: This mode continuously cleans up


    previous versions of content if the source document


    or derived documents have changed.


    3\. **Full**: This mode does a thorough cleanup at the


    end of the indexing process by removing any


    documents that are no longer present in the current


    indexing batch.


    These deletion modes help you to ensure your vector store stays lean.


