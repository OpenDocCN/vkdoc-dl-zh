  trans: "\n# 案例研究\n假设你正在为金融分析领域构建一个虚拟助手。该助手需要理解用户查询、访问实时市场数据并提供见解。\n\n# 传统方法的弊端\n\
    想象一下，当你使用直接 API 与 LLM 集成时，需要处理多少自定义开发工作。你必须在助手的工作流程中手动实现数据获取、处理和集成逻辑，这是一个既耗时又容易出错的过程。\n\
    \n# LangChain 的优势\n你可以使用 LangChain 框架的数据连接组件来无缝集成外部数据源。它负责处理获取外部数据并将其纳入 LLM 上下文的复杂性，从而提供更准确、更及时的金融见解。\n\
    \n# 备注\nLangChain 的数据连接组件不仅减少了开发时间，还能确保你的应用程序能够以最小的调整适应新的数据源或数据结构的变化。\n\n## 第\
    \ 1 章 LangChain 与 LLM 简介\n\n### 构建上下文感知型应用\n上下文感知型应用是指那些能够解读其运行环境中的上下文，并据此做出响应的应用。LangChain\
    \ 通过利用其运行环境中的数据或用户交互来实现这一目标，从而提供个性化的用户体验。\n\n### 为何这很重要？\n这很重要，因为它能让你的应用程序适应不断变化的环境条件或用户偏好，从而提供高度个性化、更具相关性和有效性的响应。\n\
    \n### 示例案例研究：AI 辅导系统\n开发一个辅导系统，通过根据学生的交互历史和其他上下文因素调整数学题的难度来帮助学生。\n\n首先，你需要构建上下文感知能力。当学生与系统交互时，应用程序必须捕捉学生感到困难的主题，将学生归入特定的难度类别，然后调整未来向学生呈现问题的难度级别。它还可能利用一天中的时间、学生回答的准确率或回答速度来调整其教学风格。\n\
    \n接着，LangChain 通过使用提示模板，将难度级别和一天中的时间作为变量传递给 LLM，从而轻松地为学生提供个性化问题。当你学习第 5 章的提示模板后，你将能更好地理解这一点。\n\
    \n## 第 1 章 LangChain 与 LLM 简介\n\n以下是一个示例代码来说明这一点。别担心，我们将在第 5 章中进一步讨论，但这只是为了让你提前感受一下。\n\
    \n```\n# 获取学生的交互历史\ndifficulty_level = get_student_difficulty_level(student_id)\n\
    time_of_day = get_current_time_of_day()\naccuracy = get_student_accuracy(student_id)\n\
    \n# 根据上下文生成个性化问题\nprompt_template = PromptTemplate(\n    input_variables=[\"difficulty_level\"\
    , \"time_of_day\",\n                     \"accuracy\"],\n    template=\"生成一个{难度级别}的数学问题，适合在{一天中的时间}学习，并考虑学生{准确率}的准确率。\"\
    \n)\npersonalized_question = chain.run(prompt_template,\n                    \
    \              difficulty_level=difficulty_level, time_of_day=time_of_day,\n \
    \                                 accuracy=accuracy)\n```\n\n### 开发基于 RAG 的应用\n\
    借助 LangChain，你可以通过一项称为检索增强生成（RAG）的功能来开发高级应用。这一创新功能允许你将新的、相关的信息引入 LLM 的响应过程。\n\n\
    ## 第 1 章 LangChain 与 LLM 简介\n\n### RAG 的工作原理\n使用 RAG 就像让 LLM 查阅一个庞大的图书馆来提供最准确的答案。这一功能对于减少错误（通常称为“幻觉”）并提高应用程序所提供数据的准确性至关重要。\n"
- fmt: '# LLM Applications


    ## Examples of RAG in Action


    **Research Assistant**: A research assistant tool can dig through extensive scientific
    literature to retrieve relevant information, which it then incorporates into the
    LLM’s responses. This capability can transform the way research is conducted by
    streamlining how knowledge is acquired during research.


    **Legal Analysis Tool**: A legal analysis tool can consult case law and legal
    precedents to provide well-informed legal opinions and recommendations. Such a
    tool could revolutionize the legal research process by making it more efficient
    and comprehensive.


    **Market Analysis Tool for Investment Firms**: Another example is a market analysis
    tool that can dynamically aggregate the latest market data and news articles to
    provide investors with summaries that reflect current market trends and actionable
    insights.


    # Chapter 1: Introduction to LangChain and LLMs


    ## Building Agentic Apps


    LangChain introduces the powerful concept of “Agentic” applications, which are
    applications that pretty much mimic human behavior. They can autonomously perform
    tasks and make decisions on their own to achieve specific goals. This capability
    allows applications to not only process information but also act independently
    based on AI-driven logic.


    By combining LangChain Agents with the Chains component, you can build complex
    applications with multistep operations that are not only robust but also flexible.
    This capability allows your application to evolve based on user feedback and changing
    requirements without extensive redevelopment. This is a very exciting feature
    of LangChain and holds a lot of promise. We will be discussing this in greater
    detail in Chapters [8](#index_split_004.html#p333)[–10.](#index_split_005.html#p433)


    Let us review some interesting use cases.


    ### Example: Transforming Customer Support Systems


    A prime example of this innovation is how customer support systems have transformed.
    Traditionally, to create an AI-driven support system, you will have to build complex
    workflows and integrate multiple steps that involve handling inquiries, searching
    databases, and generating personalized responses. This is all made significantly
    easier with plug and play components from LangChain.


    ### Example: Automated Content Scheduler


    Let us take another example of a digital marketing company that wants to build
    a tool that aims to autonomously schedule and post marketing content across various
    platforms. It involves analyzing engagement data to determine the optimal posting
    times. And you want to achieve a significant boost in audience reach and interaction
    with minimal manual effort.


    This is where the agent comes in. As you can see, a number of steps need to be
    taken to achieve these goals. The agent will not only streamline content management
    but also ensure content is delivered when it is most likely to make an impact.


    ## Increased Development Productivity


    As a developer, you can streamline your coding process and save precious time
    by avoiding repetitive tasks, including generating code snippets, or creating
    documentation.


    ### Example: Generating Code for a Website App


    Let us say you are building a web application, and you need to code for a bunch
    of API endpoints for CRUD operations. Normally, you would have to manually write
    the code for each endpoint, which can be time-consuming and repetitive.


    Here is how LangChain can come to your aid:


    - You can first start by creating a blueprint, which contains all your API endpoints
    and their corresponding HTTP methods in a YAML or JSON file. This would act as
    a road map for LangChain to follow.

    - Then you can develop a prompt that guides LangChain with specific instructions
    on how to generate the code for each endpoint. You can generate functions or even
    entire modules based on high-level descriptions.

    - You can create documentation, comments, and annotations automatically.

    - You can automate code refactoring, optimization.'
