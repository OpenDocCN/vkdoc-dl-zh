    \n---\n\n# CHAPTER 11\n\n# Building and Deploying a ChatGPT-like App Using Streamlit\n\
    \nIn this chapter, we are going to use two powerful tools, namely, LangChain and\
    \ Streamlit to develop a ChatGPT-like LangChain-based UI application.\n\nIn particular,\
    \ we will be transitioning from Jupyter Notebooks to a web application to create\
    \ something that is not just functional but also user-friendly with sleek web\
    \ interfaces and production-ready. Here is a sneak peek of what you will be doing:\n\
    \n1. Setting up our development environment\n2. Building the core Q&A functionality\
    \ with LangChain\n3. Creating a web interface using Streamlit\n4. Testing and\
    \ refining your application\n\n© Rabi Jay 2024  \nR. Jay, *Generative AI Apps\
    \ with LangChain and Python*,  \n[https://doi.org/10.1007/979-8-8688-0882-1_11](https://doi.org/10.1007/979-8-8688-0882-1_11#DOI)\n\
    \n![](index-470_1.png)  \n![](index-470_2.png)\n\n## Setting Up Your Development\
    \ Environment\n\nLet us set up the development environment to run Streamlit in\
    \ your desktop environment.\n\n### Installing Streamlit Library\n\nMake sure that\
    \ you have Streamlit installed in your Python environment. You can do so by running\
    \ the following command in your terminal or command prompt:\n\n```\npip install\
    \ streamlit\n```\n\nIf you haven't installed `pip`, you may see an error message\
    \ similar to this:\n\nIf you already have Streamlit installed, you can skip this\
    \ step.\n\n### Installing Python\n\nIf you haven't installed Python in your desktop\
    \ environment, you may get an error as shown below:\n\nThe error message suggests\
    \ that the `python` command is not recognized in your Command Prompt. This usually\
    \ means that either Python is not installed or the Python installation directory\
    \ is not added to the system's `PATH` environment variable.\n\n![](index-471_1.jpg)\n\
    \nTo resolve this issue, you can try the following steps:\n\n1. **Check if Python\
    \ is installed.**  \n   - Open a new Command Prompt window.  \n   - Type `python\
    \ --version` and press Enter.  \n   - If Python is installed correctly, it will\
    \ display the version number. If not, you need to install Python first.  \n  \
    \ - Install Python from the Microsoft Store as shown below:\n\n2. **Install pip.**\
    \  \n   - If you have Python installed but `pip` is missing, you can download\
    \ the `get-pip.py` script from the official pip website: [https://bootstrap.pypa.io/get-pip.py](https://bootstrap.pypa.io/get-pip.py).\
    \  \n   - Save the `get-pip.py` file to a location on your computer, such as `C:\\\
    Users\\abc\\get-pip.py`.\n\n   ![](index-472_1.png)\n\n   - Open a Command Prompt\
    \ window and navigate to the directory where you saved the `get-pip.py` file using\
    \ the `cd` command.  \n   - Run the following command to install `pip`:\n\n  \
    \ ```\n   python get-pip.py\n   ```\n\n3. **Add Python and pip to the system's\
    \ PATH** as shown in the figure below.  \n   - Open the Start menu and search\
    \ for \"Environment Variables.\"  \n   - Click \"Edit the system environment variables.\"\
    \  \n   - In the System Properties window, click the \"Environment Variables\"\
    \ button.  \n   - Under \"System variables,\" scroll down and find the \"Path\"\
    \ variable, then click \"Edit.\"  \n   - Click \"New\" and add the path to your\
    \ Python installation directory, typically `C:\\Python39` or similar.\n\n   ![](index-473_1.jpg)\n\
    \n   - Click \"New\" again and add the path to the Scripts directory within your\
    \ Python installation, typically `C:\\Python39\\Scripts`.  \n   - Click \"OK\"\
    \ to save the changes.\n\n   ![](index-474_1.jpg)\n\n4. **Verify the installation.**\
    \  \n   - Open a new Command Prompt window.  \n   - Type `pip --version` and press\
    \ Enter.  \n   - If `pip` is installed and accessible, it will display the version\
    \ number.\n\nAfter completing these steps, you should be able to run the `pip\
    \ install streamlit` command successfully in your Command Prompt.\n\nIf you still\
    \ encounter issues, make sure you have the necessary permissions to install packages\
    \ and that your Internet connection is stable. Additionally, you can try running\
    \ the Command Prompt as an administrator by right-clicking the Command Prompt\
    \ icon and selecting \"Run as administrator.\"\n\n### Installing Required Dependencies\n\
    \nNext, you must make sure you have the required dependencies installed (`streamlit`,\
    \ `openai`, `langchain`, `pinecone`) before running the code. You can install\
    \ them using `pip`:\n\n```\npip install streamlit openai langchain pinecone-client\
    \ langchain_community\n```\n\nAfter making these changes and ensuring the dependencies\
    \ are installed, you should be able to run the code on your desktop.\n\nIf you\
    \ still encounter issues, make sure you have the latest versions of the required\
    \ dependencies installed. You can update them using the following commands:\n\n\
    ```\npip install --upgrade langchain langchain_openai langchain_community openai\
    \ streamlit pinecone-client\n```\n\nAdditionally, ensure that you have a compatible\
    \ version of Python installed (Python 3.7 or above).\n\n## Building the Streamlit\
    \ LangChain UI App\n\nNow that you have set up the development environment in\
    \ your desktop, it is time for the real work to begin, which is building the actual\
    \ Streamlit LangChain UI app.\n\n### Components of the Streamlit App\n\nA typical\
    \ Streamlit app consists of the `app.py` file which is a Python script that contains\
    \ the code for building a Streamlit application. It defines the structure, layout,\
    \ and functionality of your Streamlit app. In our case, the `app.py` file is named\
    \ as `LangChainUI.py` file. The `LangChainUI.py` file is the main entry point\
    \ where you import the necessary libraries, define the user interface components,\
    \ and specify the logic and interactions of your application.\n\nTo run this Streamlit\
    \ application, use the `streamlit run LangChainUI.py` command in your terminal\
    \ or command prompt.\n\nStreamlit provides a wide range of components and features\
    \ that you can use to build interactive web applications, including widgets, charts,\
    \ tables, maps, and more. The `LangChainUI.py` file serves as the central place\
    \ where you define and organize these components to create your desired application.\n\
    \n### Steps Involved in Building the App\n\nBelow are some of the steps involved\
    \ when building the app:\n\n1. **First, import the necessary libraries:**\n\n\
    \   ```python\n   import os\n   import streamlit as st\n   from langchain.chains\
    \ import LLMChain\n   from langchain.prompts import ChatPromptTemplate, HumanMessagePromptTemplate\n\
    \   from langchain.chat_models import ChatOpenAI\n   ```\n\n   These lines import\
    \ the necessary libraries: `os` for environment variables, `streamlit` for the\
    \ web interface, and various components from `langchain` for interacting with\
    \ the language model.\n\n2. **Next, you must set the API key:**\n\n   ```python\n\
    \   os.environ[\"OPENAI_API_KEY\"] = \"your_openai_api_key_here\"\n   ```\n\n\
    \   This sets the OpenAI API key as an environment variable, which will be used\
    \ by the `ChatOpenAI` model.\n\n3. **Streamlit UI setup:**\n\n   ```python\n \
    \  st.title(\"ChatGPT-like Q&A App\")\n   user_query = st.text_input(\"Enter your\
    \ question:\")\n   ```\n\n   Here, you are creating the title of the app and an\
    \ input box for the user's question.\n\n4. **Chat history initialization:**\n\n\
    \   ```python\n   if 'chat_history' not in st.session_state:\n       st.session_state['chat_history']\
    \ = []\n   ```\n\n   You then initialize an empty chat history if it doesn't exist\
    \ in the session state.\n\n5. **Displaying chat history:**\n\n   ```python\n \
    \  for chat in st.session_state['chat_history']:\n       st.write(f\"Q: {chat['question']}\"\
    )\n       st.write(f\"A: {chat['answer']}\")\n       st.write(\"---\")\n   ```\n\
    \n   You then loop display all previous questions and answers stored in the chat\
    \ history.\n\n6. **Handling user input:**\n\n   ```python\n   if user_query and\
    \ st.button(\"Submit\"):\n   ```\n\n   You check if there is a user query, and\
    \ the submit button is clicked.\n\n7. **Creating and using the language model:**\n\
    \n   ```python\n   llm = ChatOpenAI(temperature=0.7, model_name='gpt-3.5-turbo')\n\
    \   prompt = ChatPromptTemplate.from_messages([\n       HumanMessagePromptTemplate.from_template(\"\
    {query}\")\n   ])\n   chain = LLMChain(llm=llm, prompt=prompt)\n   response =\
    \ chain.run(query=user_query)\n   ```\n\n   Next, you create an instance of the\
    \ `ChatOpenAI` model, set up a prompt template, create an `LLMChain`, and generate\
    \ a response to the user's query.\n\n8. **Updating and displaying the response:**\n\
    \n   ```python\n   st.session_state['chat_history'].append({\"question\": user_query,\
    \ \"answer\": response})\n   st.write(\"Answer:\")\n   st.write(response)\n  \
    \ ```\n\n   You add the new Q&A pair to the chat history and display the response.\n\
    \n9. **Fallback message:**\n\n   ```python\n   else:\n       st.write(\"Please\
    \ enter a question and click Submit.\")\n   ```\n\n   Following this, you display\
    \ a message if no question is entered or the submit button isn't clicked.\n\n\
    Finally, you create a simple web-based chat interface that uses the OpenAI GPT\
    \ model to generate responses to user queries, maintains a chat history, and displays\
    \ all interactions.\n\n### Indentation Error in the Code\n\nSometimes, you may\
    \ get an error because the code is not indented properly. To resolve this issue,\
    \ make sure that the indentation of the code block is consistent throughout the\
    \ code. In Python, indentation is used to define code blocks, and each level of\
    \ indentation should be consistent (usually 4 spaces per level).\n\nHere is an\
    \ example of how the code should be indented correctly:"
