    ### Working with PDFs


    Let us now look at one of the most common data formats out there, namely, PDFs.


    Most of our data is stored in various formats like PDFs, CSV files, JSON, HTML,
    or even office documents. Wouldn’t it be nice if you could ask questions and get
    answers based on the content of those documents? That is exactly what you are
    going to achieve!


    First, make sure you have the necessary libraries installed. In this case, you
    will be using the `pypdf` library to handle PDFs. You can easily install it by
    running the code below. The `pypdf` library is a pure-Python library for parsing
    PDF documents and is used by LangChain’s `PyPDFLoader` to read and extract text
    from PDF files:


    ```

    !pip install pypdf langchain langchain_community

    ```


    Next, import the necessary modules such as the `PyPDFLoader` class from the `langchain_community.document_loaders`
    module. The `langchain_community` package is a community-driven extension of the
    main `langchain` library and provides additional functionality and utilities:


    ```

    from langchain_community.document_loaders import PyPDFLoader

    ```


    Then create an instance of the `PyPDFLoader` class and pass the path to the PDF
    file as an argument. In this example, the PDF file is located at `"/media/2022
    Annual Report ACME.pdf"`. Make sure you provide the correct path to your PDF file:


    `loader = PyPDFLoader("/media/2022 Annual Report ACME.pdf")`


    Next, you should call the `load_and_split()` method of the `PyPDFLoader` instance
    to load the PDF document and automatically split it into individual pages or sections.
    The resulting pages or sections are stored in the `pages` variable as a list of
    `Document` objects:


    `pages = loader.load_and_split()`


