    # 评估与优化提示词


    ## 评估响应质量


    不仅要评估 LLM 响应的准确性，还要评估其整体质量。考虑公平性、连贯性以及与所提供示例的一致性等因素。问问自己：“我会为展示这些结果感到自豪吗？它们是否与我提供的示例相似？”这种评估将帮助你识别需要改进的领域。


    ## 微调提示词


    基于评估中获得的见解，你需要微调提示词。如果 LLM 的输出缺乏所需的语气或清晰度，请相应调整。也许你需要提供更具体的指令，或调整示例以更好地符合你的目标。


    # 第 5 章 掌握创意内容的提示词


    ## 优化方法：提示工程与模型微调


    区分提示词微调（即提示工程）和模型微调非常重要。你应该首先从优化提示词开始，这包括完善指令、调整示例以及尝试不同的措辞。推荐这种方法，因为它是一种快速的方法，不需要更改模型。例如，不要使用这样的提示词——“总结这篇文章”——你可以使用更精细的提示词，例如“提供这篇文章关键点的
    3 个要点总结，适合高中生阅读。”


    ### 少样本学习


    如果简单的提示词不够，你可以尝试少样本学习，在提示词中包含两到三个示例。这更有帮助，因为它更明确地指导模型。


    ### 模型微调


    然而，如果提示工程和少样本学习都没有帮助，你应该考虑模型微调。这涉及在特定数据集上重新训练模型，以使其能力适应你的任务。当你拥有大型高质量数据集时，这非常有用。如果你希望在提示工程无法帮助的特定类型任务上获得一致性能，那么模型微调可以是你的解决方案。


    # 第 5 章 掌握创意内容的提示词


    ## 拥抱迭代


    不要期望第一次尝试就完美。相反，要做好准备，多次迭代、测试和完善你的提示词。


    ## 部署提示词


    一旦你对 LLM 的响应感到满意，并对提示词的质量有信心，就应该将它们部署到实际环境中。


    ## 监控与维护


    密切关注它们随时间的表现至关重要。如果发现任何漂移或不一致，请主动更新和完善你的提示词。


    # 第 5 章 掌握创意内容的提示词


    ## 提示词的组成部分


    提示词模块由三个主要组件组成：


    - 提示模板

    - 示例选择器

    - 输出解析器


    让我们仔细看看这些组件，以及它们如何帮助你创建出色的提示词。


    # 第 5 章 掌握创意内容的提示词


    ## 提示模板


    在使用语言模型时，你可以利用两种类型的提示模板：


    1. **常规提示模板**：用于直接的文本生成用例，例如回答问题、完成句子或任何其他文本生成任务。

    2. **聊天提示模板**：专门为更具交互性和对话性的体验而设计，包含系统消息和用户消息等组件来指导交互。


    你应该注意，大多数最新模型（包括默认启用聊天补全的模型）都支持这两种模板类型。这意味着你可以使用同一个模型来完成一般任务（如回答问题）以及创建对话交互。因此，你可以根据具体需求选择合适的模板，而无需切换模型。


    让我们讨论一下提示模板中包含的内容：


    1. **指令**：你将使用指令向 LLM 提供清晰的指示，并向 LLM 传达你的期望。

    2. **少样本示例**：包含几个期望输出的示例，为 LLM 提供具体的参考点。通过这些示例，你可以传达你期望的风格、语气和格式，使模型能够掌握你需求的细微差别。


    # 第 5 章 掌握创意内容的提示词


    3. **上下文和问题**：通过提供相关的上下文和具体问题，你可以帮助 LLM 理解对话的背景和焦点。这有助于 LLM 模型提供非常针对你任务的响应。


    ## 创建多字符串提示模板


    让我们看看如何创建和使用适用于任何类型 LLM 的提示模板。首先，你需要从`langchain.prompts`库中导入`PromptTemplate`类。希望你已经导入了
    LangChain 库：


    ```python

    from langchain.prompts import PromptTemplate

    from langchain.chat_models import ChatOpenAI

    ```


    创建一个名为`template`的多行字符串。它类似于 f-string，但使用`{variable}`而不是`{variable}`（开头没有“f”）。


    ```python

    template = """

    You are a seasoned software engineer.

    Explain the following algorithm: {algorithm} in {language}.

    Describe its purpose, time complexity, and a common use case.

    """

    ```


    在这个例子中，你将`{algorithm}`替换为“machine learning”，将`{language}`替换为“French”。生成的提示词将如下所示：你是一位经验丰富的软件工程师。用法语解释以下算法：机器学习。描述其目的、时间复杂度和常见用例。


    # 第 5 章 掌握创意内容的提示词


    ## 使用提示模板调用 LLM


    是时候创建 LLM 对象了。以下是使用 LangChain 与 OpenAI 时的示例。你应该注意，初始化和调用 LLM 的过程可能因特定模型、API 或框架而异：


    ```python

    llm = OpenAI(openai_api_key="Your OpenAI key", temperature=0.7)

    ```


    最后，你使用提示字符串作为参数调用 LLM，并打印响应：


    ```python

    # 创建一个非常简单的 LLM 链（注意：会丢失一些输出控制）

    chain = LLMChain(llm=llm, prompt=prompt_template)

    ```


    在上述代码中，你创建了`LLMChain`类的一个实例，它代表了语言模型中的一个简单链。`LLMChain`构造函数接受两个参数，即`llm`和`prompt`，你已将之前创建的提示模板赋值给`prompt`。


    **注意**：请记住导入必要的库才能使其工作。例如，你需要导入以下内容：


    ```python

    from langchain.llms import OpenAI

    from langchain.prompts import PromptTemplate

    from langchain.chains import LLMChain

    ```


    然后，你通过调用`chain`的`run`方法生成响应，该方法接受两个关键字参数，通过这两个参数传入你之前用于构建提示模板的两个关键字，即算法类型和语言：


    # 第 5 章 掌握创意内容的提示词

