    \n让我向你介绍一个名为工具调用的强大概念，它能帮助你的代理检测何时应调用一个或多个工具，并返回这些工具所需的适当输入。\n\n借助工具调用，代理可以智能地选择正确的工具，并确切知道每个工具需要哪些参数。在\
    \ API 世界中，你可以向代理描述这些工具，它会输出一个包含调用工具所需参数的结构化对象（如 JSON）。\n\n工具调用的目标是确保你的代理可靠地返回有效且有用的工具调用，超越通用文本补全或聊天\
    \ API 的能力。通过利用这种结构化输出并允许代理从多个工具中选择，你可以创建一个反复调用工具并接收结果，直到解决查询的代理。\n\n## 设置\n\n\
    要开始使用工具调用，你需要一个支持该功能的模型。\n\n`LangChain` 提供了广泛的选择，包括 `Anthropic`、`Google Gemini`、`Mistral`\
    \ 和 `OpenAI`。你可以在 `LangChain` 文档中查看支持的模型。\n\n在本演示中，你将使用 `Tavily`，但也可以随意替换为任何其他内置工具，甚至添加你自己的自定义工具。要使用\
    \ `Tavily`，你需要注册一个 API 密钥，并将其设置为 `process.env.TAVILY_API_KEY`。\n\n首先，让我们安装必要的依赖项：\n\
    \n```bash\npip install -qU langchain-openai langchain tavily-python\n```\n\n接下来，将你的\
    \ OpenAI API 密钥设置为环境变量：\n\n```python\nimport getpass\nimport os\n\nos.environ[\"\
    OPENAI_API_KEY\"] = getpass.getpass()\nos.environ[\"TAVILY_API_KEY\"] = getpass.getpass(\"\
    Enter your Tavily API key: \")\n```\n\n现在，你将导入 `langchain_openai` 中的 `ChatOpenAI`\
    \ 类，并创建一个语言模型实例：\n\n```python\nfrom langchain_openai import ChatOpenAI\n\nllm\
    \ = ChatOpenAI(model=\"gpt-4\")\n```\n\n## 初始化工具\n\n让我们创建一个可以使用 `Tavily` 搜索网络的工具：\n\
    \n```python\nfrom langchain.agents import AgentExecutor, create_tool_calling_agent\n\
    from langchain_community.tools.tavily_search import TavilySearchResults\nfrom\
    \ langchain_core.prompts import ChatPromptTemplate\n\ntools = [TavilySearchResults(max_results=1)]\n\
    ```\n\n## 创建代理\n\n现在，你需要通过定义提示并创建代理来初始化你的工具调用代理：\n\n```python\nprompt = ChatPromptTemplate.from_messages(\n\
    \    [\n        (\n            \"system\",\n            \"You are a helpful assistant.\
    \ Make sure to use the tavily_search_results_json tool for information.\",\n \
    \       ),\n        (\"placeholder\", \"{chat_history}\"),\n        (\"human\"\
    , \"{input}\"),\n        (\"placeholder\", \"{agent_scratchpad}\"),\n    ]\n)\n\
    \nagent = create_tool_calling_agent(llm, tools, prompt)\n```\n\n## 运行代理\n\n代理初始化后，你将创建一个执行器来运行它，并使用查询调用它：\n\
    \n```python\n# 通过传入代理和工具创建代理执行器\nagent_executor = AgentExecutor(agent=agent, tools=tools,\
    \ verbose=True, handle_parsing_errors=True)\n\n# 使用与业务相关的问题调用代理执行器\nresponse =\
    \ agent_executor.invoke({\"input\": \"How can our company reduce operational costs\
    \ by leveraging AI technologies?\"})\n\n# 打印响应\nprint(response)\n```\n\n观察你的代理如何立即行动，使用\
    \ `Tavily` 搜索工具查找与问题相关的信息，并提供简洁的摘要：\n\n```\n> Entering new AgentExecutor chain...\n\
    ***Could not parse LLM output: {***\n***\"response\": \"Reducing operational costs\
    \ by leveraging AI technologies can be achieved through various strategies:\"\
    ,***\n***\"strategies\": [***\n***{***\n***\"title\": \"Automating Routine Tasks\"\
    ,***\n***\"description\": \"Implement AI-powered automation to handle repetitive\
    \ and time-consuming tasks such as data entry, customer support inquiries, and\
    \ inventory management. This can reduce the need for manual labor and free up\
    \ employees to focus on higher-value activities.\"***\n***},***\n***{***\n***\"\
    title\": \"Predictive Maintenance\",***\n***\"description\": \"Utilize AI for\
    \ predictive maintenance of equipment and machinery. By analyzing data from sensors\
    \ and historical maintenance records, AI can predict potential failures, allowing\
    \ for proactive maintenance and minimizing downtime.\"***\n***},***\n***{***\n\
    ***\"title\": \"Optimizing Supply Chain Management\",***\n***\"description\":\
    \ \"AI can optimize supply chain operations by analyzing demand patterns, predicting\
    \ inventory needs, and identifying the most cost-effective shipping routes. This\
    \ can lead to reduced inventory holding costs and improved efficiency.\"***\n\
    ***},***\n***{***\n***\"title\": \"Enhancing Energy Efficiency\",***\n***\"description\"\
    : \"Implement AI-powered systems to optimize energy usage within facilities. AI\
    \ can analyze patterns of energy consumption and automatically adjust settings\
    \ for lighting, heating, and cooling, leading to cost savings.\"***\n***},***\n\
    ***{***\n***\"title\": \"Improving Decision Making\",***\n***\"description\":\
    \ \"AI can provide valuable insights by analyzing large datasets and identifying\
    \ cost-saving opportunities. By leveraging AI for data-driven decision making,\
    \ companies can optimize processes and resource allocation.\"***\n***}***\n***]***\n\
    ***}***\n```\n\n## 使用聊天历史\n\n工具调用代理最酷的功能之一是能够利用聊天历史实现更对话式的体验。通过传入之前的对话轮次，你的代理可以以更具上下文和更自然的方式做出响应。\n\
    \n以下是如何将聊天历史与代理结合使用的示例：\n\n```python\nfrom langchain_core.messages import AIMessage,\
    \ HumanMessage\n\nagent_executor.invoke(\n    {\n        \"input\": \"what's my\
    \ name? Don't use tools to look this up unless you NEED to\",\n        \"chat_history\"\
    : [\n            HumanMessage(content=\"hi! my name is Rabi Jay\"),\n        \
    \    AIMessage(content=\"Hello Rabi Jay! How can I assist you today?\"),\n   \
    \     ],\n    }\n)\n```\n\n在这种情况下，代理会记住之前的对话并相应做出响应：\n\n```\nBased on what you\
    \ told me, your name is Rabi Jay. I don't need to use any tools to look that up\
    \ since you directly provided your name.\n```\n\n你刚刚见证了工具调用代理的强大功能。它们可以智能地选择和使用工具，提供结构化输出，甚至利用聊天历史进行对话式交互。\n\
    \n## OpenAI 工具\n\n让我们来谈谈 OpenAI 的一项激动人心的功能，称为\"工具\"，它帮助你的代理检测何时应调用一个或多个函数，并返回适当的输入。较新的\
    \ OpenAI 模型已针对此能力进行了微调，使你的代理更智能、更高效。\n\n在 API 调用中，你可以向代理描述函数，它会智能地选择输出一个包含调用这些函数所需参数的\
    \ JSON 对象。\n\nOpenAI 工具的目标是确保你的代理可靠地返回有效且有用的函数调用，超越通用文本补全或聊天 API 的能力。它使你的代理更加精确和高效。\n"
- fmt: "# OpenAI Tools Agent\n\nOpenAI has two related concepts: \"functions\" and\
    \ \"tools.\" `functions` allow your agent to invoke a single function, while `tools`\
    \ enable it to invoke one or more functions when appropriate. In the OpenAI Chat\
    \ API, `functions` are now considered a legacy option and are deprecated in favor\
    \ of `tools`.\n\nSo, if you are creating agents using OpenAI models, you should\
    \ be using the OpenAI Tools agent instead of the OpenAI Functions agent.\n\nUsing\
    \ `tools` has a significant advantage because it allows the model to request that\
    \ more than one function be called when appropriate. This can help reduce the\
    \ time it takes for your agent to achieve its goal, making it more efficient and\
    \ effective.\n\nNow, let us look into the code and see how you can create an OpenAI\
    \ Tools agent in action.\n\nFirst, make sure you have the necessary libraries\
    \ installed:\n\n```\n%pip install --upgrade --quiet langchain-openai tavily-python\n\
    ```\n\nNext, you must import the required modules:\n\n```python\nfrom langchain\
    \ import hub\nfrom langchain.agents import AgentExecutor, create_openai_tools_agent\n\
    from langchain_community.tools.tavily_search import TavilySearchResults\nfrom\
    \ langchain_openai import ChatOpenAI\n```\n\n## Initializing Tools\n\nFor this\
    \ example, you will give our agent the ability to search the Web using Tavily:\n\
    \n```python\ntools = [TavilySearchResults(max_results=1)]\n```\n\n## Creating\
    \ the Agent\n\nNow, you will create your OpenAI Tools agent by pulling the prompt\
    \ from the LangChain hub and choosing the LLM that will drive the agent:\n\n```python\n\
    prompt = hub.pull(\"hwchase17/openai-tools-agent\")\nllm = ChatOpenAI(model=\"\
    gpt-3.5-turbo-1106\", temperature=0)\nagent = create_openai_tools_agent(llm, tools,\
    \ prompt)\n```\n\n## Running the Agent\n\nWith your agent ready, create an executor\
    \ to run it and invoke it with a query:\n\n```python\nagent_executor = AgentExecutor(agent=agent,\
    \ tools=tools, verbose=True)\nagent_executor.invoke({\"input\": \"what is LangChain?\"\
    })\n```\n\nWatch as your agent springs into action, using the Tavily search tool\
    \ to find information about LangChain and provide a concise summary:\n\n> LangChain\
    \ is an open source orchestration framework for the development of applications\
    \ using large language models. It is essentially a library of abstractions for\
    \ Python and Javascript, representing common steps and concepts. LangChain simplifies\
    \ the process of programming and integration with external data sources and software\
    \ workflows. It supports various large language model providers, including OpenAI,\
    \ Google, and IBM. You can find more information about LangChain on the IBM website:\
    \ [LangChain - IBM](https://www.ibm.com/topics/langchain)\n\n## Using Chat History\n\
    \nOne of the coolest features of OpenAI Tools agents is their ability to use chat\
    \ history for a more conversational experience. By passing in previous conversation\
    \ turns, your agent can respond in a more contextual and natural way.\n\nHere\
    \ is an example of how to use chat history with your agent:\n\n```python\nfrom\
    \ langchain_core.messages import AIMessage, HumanMessage\n\nagent_executor.invoke(\n\
    \    {\n        \"input\": \"what's my name? Don't use tools to look this up unless\
    \ you NEED to\",\n        \"chat_history\": [\n            HumanMessage(content=\"\
    hi! my name is Rabi Jay\"),\n            AIMessage(content=\"Hello Rabi Jay! How\
    \ can I assist you today?\"),\n        ],\n    }\n)\n```\n\nIn this case, the\
    \ agent remembers the previous conversation and responds accordingly:\n\n> Your\
    \ name is Rabi Jay.\n\nYou have just witnessed the power of OpenAI Tools agents\
    \ in action. They can intelligently choose and use functions, provide structured\
    \ outputs, and even engage in conversational interactions using chat history.\n\
    \n# Structured Chat Agent\n\nLet me introduce you to the structured chat agent,\
    \ a powerful tool to use multi-input tools. To get started, make sure you have\
    \ the necessary libraries installed. In this case, you will be using LangChain,\
    \ Tavily Search, and OpenAI's ChatGPT. Here is how you can import them from the\
    \ LangChain library and the LangChain community tools:\n\n```python\nfrom langchain\
    \ import hub\nfrom langchain.agents import AgentExecutor, create_structured_chat_agent\n\
    from langchain_community.tools.tavily_search import TavilySearchResults\nfrom\
    \ langchain_openai import ChatOpenAI\n```\n\n## Initializing Tools\n\nFor this\
    \ example, you will be testing the agent using the Tavily Search tool to search\
    \ for information online. This line creates a list of tools that the agent will\
    \ have access to. You set the `max_results` parameter to `1` to indicate that\
    \ the tool will return a maximum of one search result:\n\n```python\ntools = [TavilySearchResults(max_results=1)]\n\
    ```\n\n## Creating the Agent\n\nNow, create your structured chat agent by pulling\
    \ the prompt from the LangChain hub using `hub.pull()` as shown below in the first\
    \ line. You then customize this prompt to suit your needs by providing specific\
    \ instructions and examples for the business analyst assistant:\n\n```python\n\
    prompt = hub.pull(\"hwchase17/structured-chat-agent\")\nprompt.messages[0].prompt.template\
    \ = \"\"\"\nYou are a business analyst assistant tasked with helping entrepreneurs\
    \ and business owners make informed decisions.\nUse the provided search tool to\
    \ find relevant information and answer the user's questions as best as you can.\n\
    If the question cannot be answered using the search results, provide guidance\
    \ on where the user can find more information.\nPlease provide your response in\
    \ a clear, concise, and well-structured format.\n\nHere are some examples of the\
    \ types of business-related questions you may be asked:\n- What are some effective\
    \ marketing strategies for a small business?\n- How can I improve my company's\
    \ cash flow?\n- What are the key steps in creating a business plan?\n- How do\
    \ I conduct market research for a new product idea?\n- What are some common challenges\
    \ faced by startups, and how can they be overcome?\n\nRemember to provide actionable\
    \ advice tailored to the user's specific needs and situation.\nLet's work together\
    \ to help businesses thrive!\n\"\"\"\n```\n\nNext, you will choose the language\
    \ model (LLM) that will drive our agent. In this case, you will use OpenAI's ChatGPT\
    \ with a temperature of `0` and the `gpt-3.5-turbo-1106` model:\n\n```python\n\
    llm = ChatOpenAI(temperature=0, model=\"gpt-3.5-turbo-1106\")\n```\n\nFinally,\
    \ you will construct the agent by calling the `create_structured_chat_agent` function,\
    \ passing in the LLM, tools, and prompt:\n\n```python\nagent = create_structured_chat_agent(llm,\
    \ tools, prompt)\n```\n\n## Defining a Helper Function\n\nYou then create a helper\
    \ function that processes the output generated by the language model. It checks\
    \ if the output contains the string `\"Invalid or incomplete response\"` and raises\
    \ a `ValueError` exception if it does. Otherwise, it returns the output as is:\n\
    \n```python\ndef process_llm_output(output):\n    if \"Invalid or incomplete response\"\
    \ in output:\n        raise ValueError(\"The language model generated an invalid\
    \ or incomplete response.\")\n    return output\n```\n\n## Running the Agent\n\
    \nWith your agent ready to go, create an instance of the `AgentExecutor` class\
    \ to run it. You provide the agent, tools, and various configuration options such\
    \ as `verbose` (for detailed output), `handle_parsing_errors` (to handle parsing\
    \ errors gracefully), `max_iterations` (to limit the maximum number of iterations),\
    \ and `early_stopping_method` (to specify the method for early stopping):\n\n\
    ```python\nagent_executor = AgentExecutor(\n    agent=agent,\n    tools=tools,\n\
    \    verbose=True,\n    handle_parsing_errors=True,\n    max_iterations=3,\n \
    \   early_stopping_method=\"force\",\n)\n```\n\nNow, ask your agent a question\
    \ and see it in action:\n\n```python\nquestion = \"What are some effective ways\
    \ to reduce operational costs in a manufacturing business?\"\n```\n\nFinally,\
    \ you use a try-except block to execute the agent and handle any potential errors.\
    \ You invoke the agent using `agent_executor`."
