    # Chapter 9 Building different types of agents


    ## Agent Types


    LangChain offers a variety of agent types, each with its own unique characteristics
    and capabilities that you can choose from, depending on your specific needs and
    the models you are working with.


    ## Criteria for Choosing Agent Types


    First, let us talk about the intended model type. Some agents are designed specifically
    for chat models, which take in messages and output messages.


    Others are tailored for language models (LLMs), which take in strings and output
    strings. The main difference lies in the prompting strategy used.


    While you can mix and match agent types with different model types, sticking to
    the intended model type will likely yield the best results:


    **Chat History Support**: Some agent types are built to handle chat history, making
    them ideal for chatbot applications. These agents can maintain context and provide
    a seamless conversational experience. On the other hand, agent types that don''t
    support chat history are better suited for single tasks or one-off interactions.


    **Multi-input Tools**: Some agent types are equipped to handle tools that require
    multiple inputs, while others are designed for simpler tools with a single input.
    If you''re working with complex tools that need multiple parameters, make sure
    to choose an agent type that supports multi-input tools.


    **Parallel Function Calling**: Parallel function calling is a powerful feature
    that allows agents to call multiple tools simultaneously to significantly speed
    up the execution of certain tasks. However, this capability is more challenging
    for LLMs to handle, so not all agent types support it. Consider your specific
    requirements and the complexity of your tasks when deciding whether parallel function
    calling is essential.


    **Model Parameters**: Some agent types also have specific requirements for model
    parameters. For example, certain agents take advantage of OpenAI''s function calling
    capabilities, which require additional model parameters. If an agent type doesn''t
    have any required model parameters, it means that everything is handled through
    prompting.


    ## Types of LangChain Agents


    Now that you have a solid understanding of what Agents are and how they differ
    from Chains, let us take a closer look at the wonderful world of LangChain Agents
    as of this writing.


    ### 1. API Tool Calling


    - Intended Model Type: Chat

    - Supports Chat History: ✅

    - Supports Multi-input Tools: ✅

    - Supports Parallel Function Calling: ✅

    - Required Model Params: `tools`

    - When to Use: If you are using a tool-calling model


    ### 2. OpenAI Tools


    - Intended Model Type: Chat

    - Supports Chat History: ✅

    - Supports Multi-input Tools: ✅

    - Supports Parallel Function Calling: ✅

    - Required Model Params: `tools`

    - When to Use: [Legacy] If you are using a recent OpenAI model (1106 onward).
    Generic Tool Calling agent recommended instead


    ### 3. OpenAI Functions


    - Intended Model Type: Chat

    - Supports Chat History: ✅

    - Supports Multi-input Tools: ✅

    - Supports Parallel Function Calling: ✅

    - Required Model Params: `functions`

    - When to Use: [Legacy] If you are using an OpenAI model or an open source model
    that has been fine-tuned for function calling and exposes the same `functions`
    parameters as OpenAI. Generic Tool Calling agent recommended instead


    ### 4. XML


    - Intended Model Type: LLM

    - Supports Chat History: ✅

    - Supports Multi-input Tools: ✅

    - Supports Parallel Function Calling: ✅

    - Required Model Params: None

    - When to Use: If you are using Anthropic models, or other models good at XML


    ### 5. Structured Chat


    - Intended Model Type: Chat

    - Supports Chat History: ✅

    - Supports Multi-input Tools: ✅

    - Supports Parallel Function Calling: ❌

    - Required Model Params: None

    - When to Use: If you need to support tools with multiple inputs


    ### 6. JSON Chat


    - Intended Model Type: Chat

    - Supports Chat History: ✅

    - Supports Multi-input Tools: ❌

    - Supports Parallel Function Calling: ❌

    - Required Model Params: None

    - When to Use: If you are using a model good at JSON


    ### 7. ReAct


    - Intended Model Type: LLM

    - Supports Chat History: ❌

    - Supports Multi-input Tools: ❌

    - Supports Parallel Function Calling: ❌

    - Required Model Params: None

    - When to Use: If you are using a simple model


    ### 8. Self-Ask with Search


    - Intended Model Type: LLM

    - Supports Chat History: ❌

    - Supports Multi-input Tools: ❌

    - Supports Parallel Function Calling: ❌

    - Required Model Params: None

    - When to Use: If you are using a simple model and only have one search tool


    Here is a quick overview of the different types of Agents available in LangChain:


    1. **Zero-Shot-React Agent**: You will use this Agent if you want to handle a
    wide range of tasks without any prior training or fine-tuning. You simply provide
    it with a set of tools and a language model, and it dynamically generates a response
    based on the given query. It is capable of adapting to any situation.


    2. **Conversation Agent**: As the name suggests, you will use this Agent for conversational
    AI applications such as a chatbot or a virtual assistant. It can engage in back-and-forth
    dialogue, maintain context, and provide relevant responses based on the conversation
    history.


    3. **Structured Tool Agent**: Sometimes, you have a specific set of tools or actions
    that you want your Agent to use in a structured manner. In such situations, you
    can employ the Structured Tool Agent to define a predetermined sequence of actions
    and tools which will guide the Agent''s behavior.


    4. **MRKL Agent**: The MRKL (Mean Reciprocal Rank with Logistic Regression) Agent
    is a powerful addition to the LangChain family. It uses a combination of search
    algorithms and logistic regression to rank and select the most relevant tools
    for a given query. You can use it to prioritize and choose the best course of
    action.


    ## Zero-Shot-React Agent Example


    The Zero-Shot-React Agent is a flexible and adaptable agent that uses a large
    language model (LLM) to determine which tool to use from a set of available tools,
    based solely on the tool''s description and the user''s input:


    - **Zero-Shot**: The agent has no prior training on how to specifically use each
    tool. It figures out how to use them in the moment.

    - **ReAct**: This is the underlying framework that guides the agent''s decision-making.
    It is a loop of reasoning and action, allowing the agent to dynamically choose
    the best tool for the task.


    The advantage when using this agent is that you don''t need to create complex
    rules or chains for each tool, and it doesn''t need prior training.


    However, its performance depends heavily on the description of the tool and the
    LLM''s ability to understand the description. It implies therefore that you use
    a good reasoning LLM, such as `gpt-4` or `gpt-3.5-turbo`.


    The second disadvantage is that it does not have a memory. You can address this
    limitation by passing the `ConversationBufferMemory` object when initializing
    the agent. There is also a `conversational-react-description` agent type which
    uses memory.


    Here is a code snippet that demonstrates how to initialize and use a Zero-Shot-React
    Agent:


    ```python

    from langchain.agents import load_tools

    from langchain.agents import initialize_agent

    from langchain.llms import OpenAI

    ```'
