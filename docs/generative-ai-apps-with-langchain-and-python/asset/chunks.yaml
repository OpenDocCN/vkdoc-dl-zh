- fmt: "# Assuming you have a vectorstore called `documents_vectorstore`\n\n```\n\
    retriever = VectorstoreRetriever(documents_vectorstore)\n\nquery = \"What are\
    \ the main benefits of using a RAG?\"\n\nrelevant_docs = retriever.get_relevant_documents(query)\n\
    \nfor doc in relevant_docs:\n    print(doc.page_content)\n```\n\nIn this example,\
    \ you create an instance of the `VectorstoreRetriever` by passing in your vectorstore.\
    \ Then, you define a query and use the `get_relevant_documents` method to retrieve\
    \ the most relevant documents based on your query. Finally, you iterate over the\
    \ retrieved documents and print their content.\n\n## Try It Yourself\n\nRemember,\
    \ choosing the right retriever depends on your specific use case and the nature\
    \ of your data. Go ahead and experiment and explore different options to find\
    \ the one that works best for you.\n\n## Indexing\n\nIn this section, let us discuss\
    \ the power of indexing to manage our documents. The LangChain indexing API allows\
    \ you to load and keep your documents in sync with a vector store and avoids duplicating\
    \ content, rewriting unchanged documents, and recomputing embeddings unnecessarily.\
    \ It is all about saving you time and money while improving your vector search\
    \ results.\n\nUnder the hood, the indexing API uses a `RecordManager`, which keeps\
    \ track of document writes into the vector store by computing hashes for each\
    \ document and storing some key information such as the following:\n\n- The document\
    \ hash (a unique fingerprint of the page content and metadata)\n- The write time\
    \ (when the document was added or updated)\n- The source ID (a way to identify\
    \ the original source of the document)\n\nYou can also use the deletion modes\
    \ offered by the indexing API to control how existing documents are handled when\
    \ new ones are indexed.\n\nYou can choose from:\n\n1. **None**: This mode gives\
    \ you the freedom to manually manage your content as the API doesn't do any automatic\
    \ cleanup.\n2. **Incremental**: This mode continuously cleans up previous versions\
    \ of content if the source document or derived documents have changed.\n3. **Full**:\
    \ This mode does a thorough cleanup at the end of the indexing process by removing\
    \ any documents that are no longer present in the current indexing batch.\n\n\
    These deletion modes help you to ensure your vector store stays lean.\n\n## Key\
    \ Takeaways\n\nIn this chapter, you explored Retrieval-Augmented Generation (RAG),\
    \ a powerful technique for enhancing large language models (LLMs) by incorporating\
    \ additional context through retrieval.\n\nHere is what we learned.\n\n**Understanding\
    \ RAG**: We defined RAG and understood its importance for enhancing LLMs, especially\
    \ in cases where up-to-date or domain-specific knowledge is crucial. We saw how\
    \ RAG can reduce hallucinations, fact-check, provide domain-specific knowledge,\
    \ and enhance LLM responses.\n\n**RAG Architecture**: We examined the two main\
    \ components of RAG – indexing and retrieval and generation. The indexing component\
    \ involves loading, splitting, and storing data, while the retrieval and generation\
    \ component involves retrieving relevant data and generating an answer.\n\n**Implementing\
    \ RAG**: We explored practical implementations of RAG using LangChain, Pinecone,\
    \ and OpenAI. We learned how to set up a knowledge base, implement retrieval,\
    \ and develop a question-answering application using RAG.\n\n## Review Questions\n\
    \n1. What is the primary purpose of Retrieval-Augmented Generation (RAG)?\n  \
    \ - A. To improve the speed of LLM responses\n   - B. To combine retrieval-based\
    \ methods with large language models to enhance the accuracy and relevance of\
    \ generated responses\n   - C. To reduce the size of LLM models\n   - D. To increase\
    \ the training time of LLM models\n\n2. Which of the following components are\
    \ part of the RAG architecture?\n   - A. Indexing and retrieval and generation\n\
    \   - B. Tokenization and normalization\n   - C. Encryption and decryption\n \
    \  - D. Caching and logging\n\n3. What does the Embed phase in the RAG process\
    \ involve?\n   - A. Cleaning the text and removing irrelevant information\n  \
    \ - B. Converting transformed data into a numerical representation called embeddings\n\
    \   - C. Fetching data from the source and formatting it for processing\n   -\
    \ D. Storing embeddings in a database\n\n4. Which LangChain component is responsible\
    \ for splitting text into smaller chunks?\n   - A. Document loader\n   - B. Text\
    \ splitter\n   - C. Vector store\n   - D. Retriever\n\n5. What is the purpose\
    \ of using a `CacheBackedEmbeddings` class?\n   - A. To store embeddings on a\
    \ remote server\n   - B. To cache embeddings and avoid recalculating them\n  \
    \ - C. To convert text into embeddings\n   - D. To store document metadata\n\n\
    6. Which vector store is mentioned as supporting asynchronous operations?\n  \
    \ - A. Chroma\n   - B. Milvus\n   - C. Qdrant\n   - D. Pinecone\n\n7. What does\
    \ the `Self-Query Retriever` use to transform user input?\n   - A. A regular expression\n\
    \   - B. A machine learning model\n   - C. A predefined set of keywords\n   -\
    \ D. A language model\n\n8. In the context of LangChain, what is an embedding?\n\
    \   - A. A piece of text data\n   - B. A numerical representation of text\n  \
    \ - C. A storage format for documents\n   - D. A method for splitting text\n\n\
    9. Which of the following is NOT a deletion mode in the LangChain indexing API?\n\
    \   - A. None\n   - B. Incremental\n   - C. Full\n   - D. Partial\n\n10. What\
    \ is the benefit of using text embeddings in an information retrieval system?\n\
    \    - A. They increase the storage capacity of databases.\n    - B. They capture\
    \ the semantic meaning of text for comparison and retrieval.\n    - C. They reduce\
    \ the complexity of text processing.\n    - D. They simplify the tokenization\
    \ process.\n\n## Answers\n\n1. B. To combine retrieval-based methods with large\
    \ language models to enhance the accuracy and relevance of generated responses.\n\
    2. A. Indexing and retrieval and generation\n3. B. Converting transformed data\
    \ into a numerical representation called embeddings\n4. B. Text splitter\n5. B.\
    \ To cache embeddings and avoid recalculating them\n6. C. Qdrant\n7. D. A language\
    \ model\n8. B. A numerical representation of text\n9. D. Partial\n10. B. They\
    \ capture the semantic meaning of text for comparison and retrieval.\n\n## Glossary\n\
    \nThis glossary provides definitions for key technical terms related to Retrieval-Augmented\
    \ Generation (RAG) and information retrieval systems as discussed in this chapter.\n\
    \n**`CacheBackedEmbeddings`**: A wrapper around an embedder that caches the embeddings\
    \ in a key-value store, using the hashed text as the key to store and retrieve\
    \ embeddings efficiently\n\n**`CharacterTextSplitter`**: A class used to split\
    \ text into smaller chunks based on a specified character or set of characters,\
    \ useful for maintaining context and ensuring manageable chunk sizes\n\n**Document\
    \ Loader**: A tool used to load documents from various sources, such as HTML,\
    \ PDF, or code files, into a format that can be processed by an application\n\n\
    **Document**: A container that holds a piece of text along with its associated\
    \ metadata, used for processing and analysis in information retrieval systems\n\
    \n**Embedding**: A numerical representation of text that captures its semantic\
    \ meaning, allowing for comparison and retrieval based on similarity\n\n**FAISS\
    \ (Facebook AI Similarity Search)**: An open source library for efficient similarity\
    \ search and clustering of dense vectors, often used for implementing vector stores\n\
    \n**Indexing**: The process of organizing data to improve the speed and efficiency\
    \ of information retrieval, typically by creating a structure that allows for\
    \ quick searches and updates\n\n**`JSONLoader`**: A tool used to load JSON data\
    \ and extract specific information based on a `jq` schema, useful for processing\
    \ and analyzing JSON files\n\n**Multi-vector Retriever**: A retriever that creates\
    \ multiple vectors for each document, capturing different aspects of the content\
    \ to improve the accuracy of retrieval\n\n**ParentDocument Retriever**: A retriever\
    \ that indexes multiple chunks for each document and finds the most similar chunks\
    \ based on their embeddings, returning the entire parent document for comprehensive\
    \ results\n\n**Qdrant**: A vector store that supports async operations, used for\
    \ efficient similarity search and retrieval in information retrieval systems\n\
    \n**RAG (Retrieval-Augmented Generation)**: A technique that integrates retrieval-based\
    \ methods with large language models to improve the accuracy and relevance of\
    \ generated responses by incorporating additional context through retrieval\n\n\
    **`RecursiveCharacterTextSplitter`**: A text splitter that uses a recursive approach\
    \ to divide text into smaller chunks based on specified separators, ensuring even\
    \ distribution and maintaining logical structure\n\n**Retriever**: A tool used\
    \ to fetch relevant documents based on an unstructured query, facilitating quick\
    \ access to information in an information retrieval system\n\n**Self-Query Retriever**:\
    \ A retriever that uses a language model to transform user input into a query\
    \ string and a metadata filter, useful for retrieving documents based on metadata\
    \ rather than text similarity\n\n**Text Embedding**: A numerical representation\
    \ of text in vector form, used to capture semantic meaning and facilitate comparison\
    \ and retrieval in information retrieval systems\n\n**Text Splitter**: A tool\
    \ used to divide text into smaller chunks, ensuring that each chunk is within\
    \ a manageable size and maintaining semantic coherence\n\n**Tokenization**: The\
    \ process of breaking down text into smaller units (tokens) such as words or phrases\
    \ for processing by machine learning models\n\n**Vector Store**: A database that\
    \ stores data in vector format, allowing for efficient similarity search and retrieval\
    \ based on vector comparisons\n\n**Vectorstore Retriever**: A retriever that uses\
    \ a vector store to find similar documents based on their embeddings, suitable\
    \ for quick and easy retrieval tasks\n\n## References\n\nThese references provide\
    \ foundational knowledge for implementing Retrieval-Augmented Generation (RAG)\
    \ systems within the context of LangChain, Pinecone, and OpenAI technologies.\n\
    \n1. Lewis, P., et al. (2020). \"Retrieval-Augmented Generation for Knowledge-Intensive\
    \ NLP Tasks.\" arXiv:2005.11401. This research paper introduces the RAG model\
    \ and explains its architecture and performance in knowledge-intensive tasks.\n\
    2. LangChain Documentation. \"Question Answering Use Cases.\" [https://python.langchain.com/v0.1/docs/use_cases/question_answering/](https://python.langchain.com/v0.1/docs/use_cases/question_answering/)\
    \ This official documentation is a detailed guide on using LangChain for question-answering\
    \ systems.\n3. Pinecone Documentation. \"Retrieval-Augmented Generation with Pinecone.\"\
    \ [https://www.pinecone.io/learn/retrieval-augmented-generation/](https://www.pinecone.io/learn/retrieval-augmented-generation/)\
    \ This is a documentation from Pinecone that discussed how to use Pinecone's vector\
    \ database for RAG.\n4. Kumar, A. (2023). \"Retrieval-Augmented Generation (RAG):\
    \ From Theory to LangChain Implementation.\" [https://towardsdatascience.com/retrieval-augmented-generation-rag-from-theory-to-langchain-implementation-4e9bd5f6a4f2](https://towardsdatascience.com/retrieval-augmented-generation-rag-from-theory-to-langchain-implementation-4e9bd5f6a4f2)\
    \ This article provides a practical overview and implementation guide for RAG\
    \ using LangChain.\n5. OpenAI Help Center. \"Retrieval-Augmented Generation (RAG)\
    \ and Semantic Search for GPTs.\" [https://help.openai.com/en/articles/8868588-retrieval-augmented-generation-rag-and-semantic-search-for-gpts](https://help.openai.com/en/articles/8868588-retrieval-augmented-generation-rag-and-semantic-search-for-gpts)\
    \ This is an OpenAI resource on applying RAG with OpenAI models.\n\n# Chapter\
    \ 8: Your First Agent App\n\nIn this chapter, we will explore intelligent autonomous\
    \ agents and learn how to create them using the LangChain framework. We will start\
    \ by understanding the fundamental concepts of agents, their key features, and\
    \ their thought processes. Then, we will build an end-to-end agent application\
    \ and cover everything from setting up the environment to implementing memory\
    \ capabilities.\n\nThroughout the chapter, you will gain hands-on experience working\
    \ with LangChain Agent and learn how to use its powerful tools and libraries to\
    \ create agents that can perceive, reason, and take actions autonomously.\n\n\
    I will provide step-by-step guidance, code snippets, and practical examples to\
    \ ensure you have a solid grasp of the concepts and can apply them in real-world\
    \ scenarios.\n\n## Introduction\n\nLet us understand what agents are and their\
    \ thought process.\n\n### What Are Agents?\n\nWhen you have a task at hand, and\
    \ you are looking for an intelligent, autonomous app or tool to handle it for\
    \ you, LangChain Agents will come to your rescue! You can employ an Agent to perceive\
    \ its environment, make decisions, and take actions to achieve a specific goal.\
    \ In my opinion, it is a leap in the world of software development, with a lot\
    \ of potential.\n\n### Types of LangChain Agents and Their Capabilities\n\nLangChain\
    \ offers various types of agents that are designed for specific use cases and\
    \ environments. Here are the main types:\n\n1. **General-Purpose Agents**: These\
    \ are versatile agents that can handle a wide range of tasks using different tools.\n\
    2. **Domain-Specific Agents**: These agents are specialized for particular fields\
    \ or industries, such as finance, healthcare, or legal domains. They have in-depth\
    \ knowledge and capabilities tailored to their specific area of expertise.\n3.\
    \ **Simulation Agents**: These agents are designed to operate in simulated environments,\
    \ often used for training, testing, or scenario planning. They can interact with\
    \ virtual worlds and respond to simulated stimuli.\n4. **Task-Specific Agents**:\
    \ Designed to excel at particular tasks like text summarization, question answering,\
    \ or code generation.\n5. **Multi-agent Systems**: These involve multiple agents\
    \ that are working together and often simulating complex systems or handle intricate,\
    \ multistep processes.\n\nSome of the key features of agents are:\n\n1. **Autonomy**:\
    \ You can use Agents to make decisions and take actions without direct human intervention\
    \ based on AI-driven logic and the data they process.\n2. **Dynamic Tool Selection**:\
    \ Agents can dynamically select the appropriate tools based on the given query\
    \ by understanding its requirements and choose the best tools to generate a comprehensive\
    \ response.\n3. **Reactivity**: Agents respond to changes in their environment,\
    \ such as user input or new data.\n4. **Goal-Oriented**: Agents can help you to\
    \ achieve specific goals or tasks.\n5. **Context Awareness**: LangChain Agents\
    \ can grasp the intent behind the question, identify relevant information, and\
    \ provide responses that are tailored to the specific needs of the user.\n6. **Integration**:\
    \ Agents can interact with users, other agents, external systems, tools, APIs,\
    \ and data sources to provide very rich functionality.\n7. **Memory**: LangChain\
    \ Agents can maintain context and retain information throughout a conversation\
    \ or a series of interactions to provide coherent and contextually relevant answers.\n\
    8. **Customization and Extensibility**: You can define your own tools, create\
    \ custom Agent classes, and extend the existing functionality to suit your specific\
    \ requirements.\n\nAgents typically work by:\n\n- **Perceiving**: They gather\
    \ information about their environment through sensors, APIs, or other data sources.\n\
    - **Creating a Profile**: Based on the perceived information, agents build a profile\
    \ or model of their environment and the task at hand.\n- **Building Memory**:\
    \ Agents accumulate and organize information from past actions and interactions,\
    \ creating a knowledge base to inform future decisions.\n- **Planning**: Using\
    \ their profile and memory, agents formulate strategies or plans to achieve their\
    \ goals.\n- **Reasoning**: They analyze the available information, their plans,\
    \ and potential outcomes to make informed decisions.\n- **Acting**: Based on their\
    \ reasoning, agents perform tasks, interact with users, or manipulate their environment.\n\
    - **Learning**: After acting, agents update their memory and refine their decision-making\
    \ processes based on the outcomes of their actions.\n\n### Example of an Agent's\
    \ Workflow\n\nConsider a customer support agent designed to handle inquiries.\n\
    \n**Perceiving**: The agent receives a new support ticket via an API. It extracts\
    \ relevant details from the ticket, such as the customer's name, issue description,\
    \ and previous interaction history.\n\n**Reasoning**: The agent updates its profile\
