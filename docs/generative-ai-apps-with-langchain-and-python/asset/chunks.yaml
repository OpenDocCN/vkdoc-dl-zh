  trans: "\n# 第 11 章 使用 Streamlit 构建和部署类 ChatGPT 应用\n\n2. 在 Git 配置中设置此邮箱。打开命令提示符并运行：\n\
    \n`git config --global user.email yourusername@users.noreply.github.com`\n\n将\
    \ `yourusername@users.noreply.github.com` 替换为你在 GitHub 设置中找到的实际无回复邮箱地址。\n\n3.\
    \ 修改上一次提交以使用新邮箱：\n\n`git commit --amend --reset-author`\n\n这将打开你的默认文本编辑器。直接保存并关闭编辑器，无需做任何更改。\n\
    \n4. 再次强制推送：\n\n`git push origin --force --all`\n\n或者，如果你不介意公开提交邮箱：\n\n1. 前往 GitHub\
    \ 设置 ➤ 邮箱。\n2. 取消勾选“保持我的邮箱地址私密”复选框，如下所示。\n3. 确保你的公开提交邮箱设置为你愿意公开的邮箱。\n\n完成上述任一更改后，再次尝试推送你的更改。这应该能解决邮箱隐私限制问题。\n\
    \n请记住，如果你选择使用无回复邮箱，则需要在所有 Git 提交中使用此邮箱，以避免将来出现此问题。如果你在共享机器或多个项目上工作，你可能希望按仓库级别而非全局级别进行设置。\n\
    \n`git config user.email yourusername@users.noreply.github.com`\n\n在每个希望使用无回复邮箱的仓库中运行此命令。\n\
    \n## 在 GitHub 中部署应用\n\n以下是在 GitHub 中部署应用的步骤：\n\n1. 首先，如果尚未创建，请在 GitHub 上创建一个新仓库。假设你将其命名为\
    \ `streamlit-qa-app`。\n2. 现在，根据你的信息修改以下命令：\n\n```\ngit remote add origin https://github.com/你的实际用户名/streamlit-qa-app.git\n\
    git branch -M main\ngit push -u origin main\n```\n\n以下是每条命令的作用：\n\n- 第一条命令添加一个名为\
    \ `origin` 的远程仓库，指向你的 GitHub 仓库。\n- 第二条命令将当前分支重命名为 `main`（如果尚未命名为此）。\n- 第三条命令将你的本地\
    \ `main` 分支推送到 `origin` 远程仓库，并设置跟踪该远程分支。\n\n![](img/index-495_1.jpg)\n\n运行这些命令后，你的本地仓库将连接到你的\
    \ GitHub 仓库，并且你的代码将被推送到 GitHub，如下所示。\n\n请记住，每个仓库只需运行一次 `git remote add` 命令。对于后续推送，你可以直接使用：\n\
    \n```\ngit remote add origin https://github.com/<你的用户名>/streamlit-qa-app.git\n\
    git branch -M main\ngit push -u origin main\n```\n\n## 授予 GitHub 访问权限\n\n请记住，作为将应用部署到\
    \ GitHub 的一部分，你可能需要向 GitHub 授予适当的权限。\n\n![](img/index-496_1.jpg)\n\n![](img/index-496_2.jpg)\n\
    \n在你看不到仓库或无法访问仓库的情况下，应按照以下步骤解决问题：\n\n1. 验证仓库是否存在：\n   - 前往 [`github.com/<你的用户名>/streamlit-qa-app`](https://github.com/rabijay1/streamlit-qa-app)。\n\
    \   - 如果看到 404 错误，说明仓库不存在。\n\n2. 如果仓库不存在：\n   - 前往 GitHub 并创建一个名为 `streamlit-qa-app`\
    \ 的新仓库。\n   - 确保它位于你的账户下（你的用户名）。\n   - 如果你要推送现有仓库，请不要使用 README、`.gitignore` 或许可证初始化仓库。\n\
    \n3. 检查你的远程 URL。运行此命令以验证远程 URL：\n\n`git remote -v`\n\n它应显示：\n\n```\norigin https://github.com/你的用户名/streamlit-qa-app.git\
    \ (fetch)\norigin https://github.com/你的用户名/streamlit-qa-app.git (push)\n```\n\n\
    4. 如果 URL 不正确，请使用以下命令更新：\n\n`git remote set-url origin https://github.com/你的用户名/streamlit-qa-app.git`\n\
    \n5. 如果看到此错误，请确保你已登录。\n"
- fmt: "`message`: “please complete authentication in your browser.”\n\n# Chapter\
    \ 11 Building and deploying a Chatgpt-like app using streamlit\n\n6.  Check your\
    \ GitHub account:\n    - Ensure you are using the correct GitHub account (`your_user_name`).\n\
    \    - Verify that you have the necessary permissions to push to this repository.\n\
    7.  Try pushing again:\n    ```\n    git push -u origin main\n    ```\n8.  Create\
    \ a new personal access token:\n    - Go to GitHub Settings ➤ Developer settings\
    \ ➤ Personal access tokens.\n    - Generate a new token with `repo` permissions.\n\
    \    - Use this token as your password when pushing.\n9.  Use HTTPS instead of\
    \ SSH. If you are using an SSH URL, try the HTTPS URL instead:\n    ```\n    git\
    \ remote set-url origin https://github.com/your_user_name/streamlit-qa-app.git\n\
    \    ```\n10. Check your Internet connection and firewall settings.\n\n## Deploying\
    \ in the Streamlit Cloud\n\nLet us discuss the steps to deploy using Streamlit\
    \ Cloud:\n\n![](index-499_1.jpg)\n\n![](index-499_2.jpg)\n\n1.  Go to [https://streamlit.io/cloud](https://streamlit.io/cloud)\
    \ and sign in with your GitHub account as shown below.\n2.  Click “New app.”\n\
    3.  Select your GitHub repository, branch (usually “main”), and the main Python\
    \ file (e.g., `LangChainUI.py`).\n4.  Click “Deploy.”\n\nCongratulations, if everything\
    \ goes well, you must have successfully deployed the app to Streamlit Cloud for\
    \ others to access.\n\n## Other Cloud Deployment Options\n\nLet us talk about\
    \ other ways to deploy your app to the cloud:\n\n1.  **LangServe**: This is a\
    \ tool specifically designed for deploying LangChain applications. It offers easy\
    \ API creation for your chains and agents and a user interface for testing your\
    \ endpoints.\n\n    To use LangServe, you will typically:\n    - Install it with\
    \ `pip install langserve`\n    - Define your chain or agent in a Python file\n\
    \    - Create a FastAPI app and add your chain as a route\n    - Run your server\
    \ with `uvicorn your_app:app --reload`\n\n    LangServe is particularly useful\
    \ if you are building an API around your LangChain components. It makes it easy\
    \ to expose your chains and agents as API endpoints, which can be incredibly handy\
    \ when integrating your LangChain apps as part of larger systems or applications.\n\
    \n2.  **Heroku**: This is often my go-to for quick deployments. It is user-friendly\
    \ and works well with Python apps. Here is a quick rundown:\n    - First, sign\
    \ up for a Heroku account.\n    - Install the Heroku CLI.\n    - Create a `Procfile`\
    \ in your project directory with this line: `web: streamlit run your_app.py`.\n\
    \    - Run `heroku create your-app-name`.\n    - Push your code with `git push\
    \ heroku main`.\n\n3.  **AWS Elastic Beanstalk**: If you are looking for something\
    \ more robust, this is a solid choice. It is a bit more complex, but it scales\
    \ well. You will need to:\n    - Set up an AWS account\n    - Install the AWS\
    \ CLI and EB CLI\n    - Initialize your EB environment with `eb init`\n    - Create\
    \ an environment with `eb create`\n    - Deploy with `eb deploy`\n\n4.  **Google\
    \ Cloud Run**: This is great if you are comfortable with containers. Here is the\
    \ gist:\n    - Create a `Dockerfile` for your app.\n    - Build your container\
    \ image.\n    - Push it to Google Container Registry.\n    - Deploy to Cloud Run\
    \ using the Google Cloud Console or `gcloud` CLI.\n\n5.  **DigitalOcean App Platform**:\
    \ I like this for its simplicity. It is somewhere between Heroku and AWS in terms\
    \ of complexity:\n    - Connect your GitHub repo to DigitalOcean.\n    - Choose\
    \ your project and branch.\n    - Select your resource plan.\n    - Click deploy!\n\
    \n6.  **Streamlit Cloud**: You have just now deployed using Streamlit Cloud.\n\
    \n## Remember\n\nEach of these options has its pros and cons. Heroku and Streamlit\
    \ Cloud are great for getting started quickly. AWS and Google Cloud offer more\
    \ control and scalability but have a steeper learning curve. DigitalOcean sits\
    \ somewhere in the middle.\n\nMy advice? Start with something simple like Heroku\
    \ or Streamlit."
