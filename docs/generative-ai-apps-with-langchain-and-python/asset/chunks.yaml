    students with math by adjusting the difficulty level based on the student’s interaction
    history and other contextual factors.


    First, you will need to build contextual awareness. as the student interacts with
    the system, the application must capture the topics that were difficult for the
    student, bucket the student into a particular difficulty category, and then adjust
    the difficulty level of problems presented to the student in the future. It might
    also use the time of day, the accuracy of their responses, or the speed at which
    the student answers to adapt its teaching style.


