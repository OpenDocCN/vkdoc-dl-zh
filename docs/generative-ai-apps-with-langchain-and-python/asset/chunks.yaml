- fmt: "# Dealing with CSV Files\n\nLet us look at how to load CSV files using the\
    \ `CSVLoader` class from the `langchain_community.document_loaders` module.\n\n\
    In a CSV file, each line represents a record, and the values within each record\
    \ are separated by commas. It is a simple way to organize and share data.\n\n\
    You will use `CSVLoader` to load CSV files and convert each row into a `Document`\
    \ object.\n\nTo get started, make sure you have the `langchain_community` package\
    \ installed. You can install it using `pip`:\n\n```\n! pip install langchain_community\n\
    ```\n\nOnce you have the package installed, you can import the `CSVLoader` class\
    \ and start loading your CSV files. Here is an example:\n\n```\nfrom langchain_community.document_loaders.csv_loader\
    \ import CSVLoader\nloader = CSVLoader(file_path='./sample_data/california_housing_test.csv')\n\
    data = loader.load()\nprint(data)\n```\n\nHere, you create an instance of the\
    \ `CSVLoader` class and pass the file path of our CSV file to the `file_path`\
    \ parameter. Then, you call the `load()` method to load the CSV data. The loaded\
    \ data is stored in the `data` variable, which contains a list of `Document` objects,\
    \ where each object represents a row from the CSV file.\n\nWhen you print the\
    \ `data` variable, you will see the loaded documents, including their content\
    \ and metadata. The metadata includes information like the source file path and\
    \ the row number.\n\nThe `CSVLoader` allows you to customize how the CSV file\
    \ is parsed. You can pass additional arguments to the `csv_args` parameter to\
    \ control the delimiter, quote character, and field names. For example:\n\n```\n\
    loader = CSVLoader(\n    file_path='./example_data/mlb_teams_2012.csv',\n    csv_args={\n\
    \        'delimiter': ',',\n        'quotechar': '\"',\n        'fieldnames':\
    \ ['MLB Team', 'Payroll in millions', 'Wins']\n    }\n)\ndata = loader.load()\n\
    print(data)\n```\n\nIn this case, we specify the delimiter as a comma, the quote\
    \ character as a double quote, and provide custom field names for the columns.\
    \ This way, you can ensure that the CSV file is parsed correctly and the data\
    \ is loaded as expected.\n\nBelow is the results you will get:\n\n```\n[Document(page_content='MLB\
    \ Team: Team\\nPayroll in millions: \"Payroll (millions)\"\\nWins: \"Wins\"',\
    \ metadata={'source': './sample_data/mlb_teams_2012.csv', 'row': 0}),\nDocument(page_content='MLB\
    \ Team: Nationals\\nPayroll in millions: 81.34\\nWins: 98', metadata={'source':\
    \ './sample_data/mlb_teams_2012.csv', 'row': 1}),\n.....\n```\n\nAnother cool\
    \ feature of the `CSVLoader` is the ability to specify a source column. By default,\
    \ the file path is used as the source for all documents. However, if you want\
    \ to use a specific column from the CSV file as the source, you can use the `source_column`\
    \ parameter:\n\n```\nloader = CSVLoader(\n    file_path='./example_data/mlb_teams_2012.csv',\n\
    \    source_column=\"Team\"\n)\ndata = loader.load()\nprint(data)\n```\n\nIn this\
    \ example, you set the `source_column` to \"Team,\" which means that the value\
    \ from the \"Team\" column will be used as the source for each document. This\
    \ can be particularly useful when working with chains that answer questions using\
    \ sources.\n\n```\n[Document(page_content='Team: Nationals\\n\"Payroll (millions)\"\
    : 81.34\\n\"Wins\": 98', metadata={'source': 'Nationals', 'row': 0}),\nDocument(page_content='Team:\
    \ Reds\\n\"Payroll (millions)\": 82.20\\n\"Wins\": 97', metadata={'source': 'Reds',\
    \ 'row': 1}),\n.....\n```\n\n# Working with JSON Files\n\nNow, let us look at\
    \ how to do this. To handle JSON files effectively, you can use Python's built-in\
    \ `json` module along with `pathlib` to manage file paths.\n\nFirst, make sure\
    \ you have the necessary dependencies installed. Then, you must load the JSON\
    \ data from a file using the import statement below.\n\nIn this code snippet,\
    \ you use `pathlib` to handle the file path and read the contents of the JSON\
    \ file as a string. Then, you use `json.loads()` to parse the string into a Python\
    \ dictionary:\n\n```\nimport json\nfrom pathlib import Path\n\nfile_path = './sample_data/products.json'\n\
    data = json.loads(Path(file_path).read_text())\n```\n\nCheck the resources section\
    \ in the downloads section for the `products.json` file.\n\nHere, you are using\
    \ the `json` module to load the JSON data from a file. You do that by specifying\
    \ the file path and use `Path(file_path).read_text()` to read the contents of\
    \ the file as a string. Then, you pass that string to `json.loads()` to parse\
    \ it into a Python dictionary.\n\n## Using the JSONLoader to extract specific\
    \ data\n\n```\nfrom langchain_community.document_loaders import JSONLoader\n\n\
    loader = JSONLoader(\n    file_path='./sample_data/products.json',\n    jq_schema='.messages[].content',\n\
    \    text_content=False\n)\ndata = loader.load()\n```\n\nYou will notice that\
    \ `JSONLoader` is a handy tool that allows you to extract specific data from a\
    \ JSON file using a `jq` schema. In this example, you specify the file path and\
    \ provide a `jq` schema (`.messages[].content`) to extract the values under the\
    \ `content` field within the `messages` key of the JSON data. The `text_content=False`\
    \ parameter indicates that you don't want to load the entire JSON file as text\
    \ content.\n\nHere is the output:\n\nLet us review the code to handle JSON Lines\
    \ files below:\n\n```\nloader = JSONLoader(\n    file_path='./sample_data/products.jsonl',\n\
    \    jq_schema='.content',\n    text_content=False,\n    json_lines=True\n)\n\
    ```\n\nIf you are working with a JSON Lines file, where each line represents a\
    \ valid JSON object, you can set `json_lines=True` in the `JSONLoader` constructor.\
    \ This tells the loader to treat each line as a separate JSON object. You can\
    \ then specify the `jq_schema` to extract the desired data from each JSON object.\n\
    \nHere is the output:\n\n# Text Splitters\n\nWe already discussed that when dealing\
    \ with large documents, we may need to transform the documents to better suit\
    \ the application. For example, when you have a lengthy document that exceeds\
    \ your model's context window, you will need to split it into smaller and semantically\
    \ meaningful chunks. That is where text splitters come in by keeping related pieces\
    \ of text together, which ensures that the model can understand the context and\
    \ provide accurate results.\n\nYou can choose from a variety of text splitters\
    \ based on your specific needs. Each splitter divides text in its own way and\
    \ some will even add metadata to provide extra information about the chunks. Below\
    \ are some of the popular options:\n\n1. **RecursiveCharacterTextSplitter**: You\
    \ can use this splitter to recursively chop up your text based on a list of characters\
    \ you define. It will help to keep related bits of text close to each other.\n\
    2. **HtmlTextSplitter**: This splitter will be your go-to when you are working\
    \ with HTML documents. It splits text based on HTML-specific characters and also\
    \ adds metadata about the origin of each chunk.\n3. **MarkdownTextSplitter**:\
    \ This is similar to the HTML splitter but is designed for Markdown documents.\
    \ It splits text based on Markdown-specific characters and includes metadata about\
    \ the source of the chunk.\n4. **TokenTextSplitter**: You will use this when splitting\
    \ text based on the number of tokens. You can decide how you want to chunk your\
    \ text by using the different ways available to measure tokens.\n\n## Fully Working\
    \ Code Example for Text Splitting\n\nTo get started, you will need to install\
    \ the `langchain-text-splitters` package:\n\n```\npip install langchain-text-splitters\n\
    ```"
