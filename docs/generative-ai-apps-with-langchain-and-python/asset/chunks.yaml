    \n现在，让我们看看代码，了解如何实际操作创建一个 OpenAI 工具代理。\n\n首先，确保你已经安装了必要的库：\n\n```\n%pip install\
    \ --upgrade --quiet langchain-openai tavily-python\n```\n\n接下来，你必须导入所需的模块：\n\n\
    ```python\nfrom langchain import hub\nfrom langchain.agents import AgentExecutor,\
    \ create_openai_tools_agent\nfrom langchain_community.tools.tavily_search import\
    \ TavilySearchResults\nfrom langchain_openai import ChatOpenAI\n```\n\n## 初始化工具\n\
    \n在这个例子中，你将赋予我们的代理使用 Tavily 搜索网络的能力：\n\n```python\ntools = [TavilySearchResults(max_results=1)]\n\
    ```\n\n## 创建代理\n\n现在，你将通过从 LangChain 中心拉取提示词并选择驱动代理的 LLM 来创建你的 OpenAI 工具代理：\n\n\
    ```python\nprompt = hub.pull(\"hwchase17/openai-tools-agent\")\nllm = ChatOpenAI(model=\"\
    gpt-3.5-turbo-1106\", temperature=0)\nagent = create_openai_tools_agent(llm, tools,\
    \ prompt)\n```\n\n## 运行代理\n\n代理准备就绪后，创建一个执行器来运行它，并用一个查询来调用它：\n\n```python\nagent_executor\
    \ = AgentExecutor(agent=agent, tools=tools, verbose=True)\nagent_executor.invoke({\"\
    input\": \"what is LangChain?\"})\n```\n\n观察你的代理如何开始行动，使用 Tavily 搜索工具查找关于 LangChain\
    \ 的信息并提供简洁的摘要：\n\n> LangChain 是一个开源编排框架，用于开发使用大型语言模型的应用程序。它本质上是一个为 Python 和 Javascript\
    \ 提供的抽象库，代表了常见的步骤和概念。LangChain 简化了编程以及与外部数据源和软件工作流集成的过程。它支持各种大型语言模型提供商，包括 OpenAI、Google\
    \ 和 IBM。你可以在 IBM 网站上找到关于 LangChain 的更多信息：[LangChain - IBM](https://www.ibm.com/topics/langchain)\n\
    \n## 使用聊天历史\n\nOpenAI 工具代理最酷的功能之一是它们能够利用聊天历史来实现更具对话性的体验。通过传入之前的对话轮次，你的代理可以以更具上下文和更自然的方式做出响应。\n\
    \n以下是如何在你的代理中使用聊天历史的示例：\n\n```python\nfrom langchain_core.messages import AIMessage,\
    \ HumanMessage\n\nagent_executor.invoke(\n    {\n        \"input\": \"what's my\
    \ name? Don't use tools to look this up unless you NEED to\",\n        \"chat_history\"\
    : [\n            HumanMessage(content=\"hi! my name is Rabi Jay\"),\n        \
    \    AIMessage(content=\"Hello Rabi Jay! How can I assist you today?\"),\n   \
    \     ],\n    }\n)\n```\n\n在这种情况下，代理会记住之前的对话并做出相应回应：\n\n> Your name is Rabi Jay.\n\
    \n你刚刚见证了 OpenAI 工具代理的强大功能。它们可以智能地选择和使用函数，提供结构化输出，甚至可以使用聊天历史进行对话式交互。\n\n# 结构化聊天代理\n\
    \n让我向你介绍结构化聊天代理，这是一个使用多输入工具的强大工具。首先，确保你已经安装了必要的库。在这个例子中，你将使用 LangChain、Tavily\
    \ Search 和 OpenAI 的 ChatGPT。以下是如何从 LangChain 库和 LangChain 社区工具中导入它们：\n\n```python\n\
    from langchain import hub\nfrom langchain.agents import AgentExecutor, create_structured_chat_agent\n\
    from langchain_community.tools.tavily_search import TavilySearchResults\nfrom\
    \ langchain_openai import ChatOpenAI\n```\n\n## 初始化工具\n\n在这个例子中，你将使用 Tavily Search\
    \ 工具来测试代理，以便在线搜索信息。这行代码创建了一个代理可以访问的工具列表。你将 `max_results` 参数设置为 `1`，表示该工具最多返回一个搜索结果：\n\
    \n```python\ntools = [TavilySearchResults(max_results=1)]\n```\n\n## 创建代理\n\n\
    现在，通过使用 `hub.pull()` 从 LangChain 中心拉取提示词来创建你的结构化聊天代理，如下面第一行所示。然后，你通过为业务分析师助手提供具体的指令和示例来自定义这个提示词，以满足你的需求：\n\
    \n```python\nprompt = hub.pull(\"hwchase17/structured-chat-agent\")\nprompt.messages[0].prompt.template\
    \ = \"\"\"\n你是一名业务分析师助手，任务是为企业家和企业主提供明智的决策支持。\n使用提供的搜索工具查找相关信息，并尽最大努力回答用户的问题。\n\
    如果问题无法通过搜索结果回答，请指导用户在哪里可以找到更多信息。\n请以清晰、简洁且结构良好的格式提供你的回复。\n\n以下是你可能会被问到的一些业务相关问题的示例：\n\
    - 小企业有哪些有效的营销策略？\n- 我如何改善公司的现金流？\n- 制定商业计划的关键步骤是什么？\n- 如何为新产品创意进行市场调研？\n- 初创企业面临哪些常见挑战，以及如何克服它们？\n\
    \n请记住提供针对用户特定需求和情况的可操作建议。\n让我们一起努力帮助企业蓬勃发展！\n\"\"\"\n```\n\n接下来，你将选择驱动我们代理的语言模型（LLM）。在这个例子中，你将使用\
    \ OpenAI 的 ChatGPT，温度设置为 `0`，模型为 `gpt-3.5-turbo-1106`：\n\n```python\nllm = ChatOpenAI(temperature=0,\
    \ model=\"gpt-3.5-turbo-1106\")\n```\n\n最后，你将通过调用 `create_structured_chat_agent`\
    \ 函数来构建代理，传入 LLM、工具和提示词：\n\n```python\nagent = create_structured_chat_agent(llm,\
    \ tools, prompt)\n```\n\n## 定义辅助函数\n\n然后，你创建一个辅助函数来处理语言模型生成的输出。它检查输出是否包含字符串 `\"\
    Invalid or incomplete response\"`，如果包含则引发 `ValueError` 异常。否则，它按原样返回输出：\n\n```python\n\
    def process_llm_output(output):\n    if \"Invalid or incomplete response\" in\
    \ output:\n        raise ValueError(\"The language model generated an invalid\
    \ or incomplete response.\")\n    return output\n```\n\n## 运行代理\n\n代理准备就绪后，创建一个\
    \ `AgentExecutor` 类的实例来运行它。你提供代理、工具以及各种配置选项，例如 `verbose`（用于详细输出）、`handle_parsing_errors`（用于优雅地处理解析错误）、`max_iterations`（用于限制最大迭代次数）和\
    \ `early_stopping_method`（用于指定提前停止的方法）：\n\n```python\nagent_executor = AgentExecutor(\n\
    \    agent=agent,\n    tools=tools,\n    verbose=True,\n    handle_parsing_errors=True,\n\
    \    max_iterations=3,\n    early_stopping_method=\"force\",\n)\n```\n\n现在，向你的代理提问，看看它的表现：\n\
    \n```python\nquestion = \"What are some effective ways to reduce operational costs\
    \ in a manufacturing business?\"\n```\n\n最后，你使用 try-except 块来执行代理并处理任何潜在错误。你使用\
    \ `agent_executor` 来调用代理。\n"
