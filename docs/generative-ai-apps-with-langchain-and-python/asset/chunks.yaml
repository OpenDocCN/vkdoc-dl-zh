    接着，你可以使用 `split_text()` 方法，该方法会根据指定的参数将 `returns_policy` 文章分割成多个文本块。它能确保每个文本块都在词元限制范围内，并递归地分割任何过大的文本块，直至其符合要求。


    分割完成后，你可以打印生成的文本块数量，并展示第一个文本块，以便初步了解输出结果。


    通过这种方法，你可以高效地处理公司的知识库文章，并为训练客户支持聊天机器人做好准备。`RecursiveCharacterTextSplitter` 负责处理繁重的工作，确保每个文本块都与语言模型的词元限制兼容。


    ## 动手尝试


    语言模型的选择以及 `chunk_size` 和 `chunk_overlap` 参数均可根据你的具体需求进行调整。你可以尝试不同的数值，以找到文本块大小与上下文保留之间的最佳平衡点。


    ## 向量存储


    在本节中，我们将更详细地讨论向量存储，包括它们是什么以及为何如此重要。


    ![](img/index-305_1.jpg)


    # 第 7 章 使用检索增强生成（RAG）构建高级问答与搜索应用


    当你拥有一批需要快速高效搜索的数据时，向量存储便派上了用场。它们以称为向量的特殊格式存储数据，这使得查找相似项变得轻而易举。


    现在，让我们分解使用向量存储的过程，并通过一个示例使其变得具体：


    1. **加载源数据**：第一步是收集所有数据并将其加载到向量存储中，以便后续进行搜索。你可以从各种来源加载数据，例如文本文件、数据库，甚至网页。


    2. **查询向量存储**：数据加载完成后，你可以使用查询来让向量存储查找与查询最相似的项。例如，你可以让向量存储找出与你的查询（如搜索词或问题）最相似的项。随后，向量存储会在后台将你的查询转换为向量表示。接着，它会将此查询向量与存储中的所有向量进行比较，并检索出最相似的向量。


    # 第 7 章 使用检索增强生成（RAG）构建高级问答与搜索应用


    3. **检索“最相似”项**：向量存储会返回与你的查询最相似的项。这就像获得一份最佳匹配的列表。你可以指定要检索的项数，向量存储会给出排名靠前的结果。这些检索到的项是与你的查询向量具有最接近向量表示的项。仔细想想，这几乎就像大海捞针，但向量存储使其变得毫不费力。


    ## 文本嵌入模型


    继续我们关于向量的讨论，让我们更深入地探讨一下文本嵌入。使用向量存储的一个关键部分是借助嵌入来创建向量，以便后续进行搜索。无论你是在构建语义搜索引擎、推荐系统，还是任何需要理解词语背后含义的应用，文本嵌入都是你的答案。文本嵌入将帮助你从大量文档中找出与特定查询最相似的文档。你可以尝试直接比较词语，但这就像大海捞针。相反，文本嵌入可以拯救你！


    ### 关键词搜索 vs. 文本嵌入


    值得注意的是，有时对于简单的查询，纯关键词搜索可能更有效。近期的建议是将关键词搜索与嵌入相结合，以发挥两种方法的优势。这种混合方法可以提供关键词搜索的精确性，以及嵌入带来的语义理解深度。


    # 第 7 章 使用检索增强生成（RAG）构建高级问答与搜索应用


    以下是实现这种组合方法的方式。


    #### 关键词搜索


    首先，使用关键词搜索来筛选包含相关术语的文档。这一步在处理大型数据集和快速识别潜在匹配项时非常有用。


    #### 文本嵌入


    对筛选后的文档应用文本嵌入，以捕获其语义含义。使用这些嵌入根据与查询的相关性对筛选结果进行排序。


    这种组合确保你能受益于关键词搜索的速度和精确性，同时也能利用嵌入提供的语义深度。


    你可以将文本嵌入视为文本的向量形式的魔法表示。它们捕获了词语和句子的语义含义，帮助你以有意义的方式进行比较。这就像为高维空间中的每一段文本分配坐标，相似的文本彼此更接近。


    在使用文本嵌入模型时，你将使用 LangChain 中的 `Embeddings` 类。它提供了一个标准接口，用于与各种嵌入模型提供商（如 OpenAI、Cohere
    和 Hugging Face）进行交互。你可以从超过 25 种不同的嵌入提供商和方法中进行选择，范围从开源到专有 API。无论你选择哪个提供商，`Embeddings`
    类都能为你提供帮助。最棒的是，你可以使用此接口轻松地在模型之间切换，从而轻松找到适合你需求的模型。


