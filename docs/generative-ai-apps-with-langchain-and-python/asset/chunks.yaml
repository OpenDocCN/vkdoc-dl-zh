    \n```\n# 解析 LLM 的响应\ntry:\n    parsed_movie = parser.parse(response.content)\n\
    \    # 打印结构化电影数据\n    print(parsed_movie)\nexcept ValidationError as e:\n    print(f\"\
    验证错误：{e}\")\n```\n\n通过使用`PydanticOutputParser`，你已成功将 LLM 的文本响应转换为结构清晰的电影对象。\n\n\
    此示例展示了输出解析器如何应用于不同领域，例如整理电影、书籍、产品信息，或任何需要从 LLM 响应中提取的结构化数据。\n\n## OutputFixingParser\n\
    \nLangChain 提供了一个便捷工具，名为`OutputFixingParser`。该解析器会获取原始输出，将其重新发送给模型，并要求其修复任何格式问题。这就像拥有一个得力助手，能双重检查模型的工作成果，确保一切准确无误。\n\
    \n我想指出的是，随着模型不断改进，它们遵循指令的能力也越来越强。此外，与 LLM 交互时也存在一定的随机性。因此，如果你在跟随本教程编写代码，可能会发现模型直接生成了正确的输出，一切运行顺畅。这当然是好消息！但即使你无法复现错误也不必担心——你仍然可以从中学习。\n\
    \n在下一节中，你将探索另一种类型的提示词，称为\"聊天提示模板\"，它非常适合构建聊天机器人和对话代理。\n\n# 第 5 章 掌握创意内容的提示词\n\n\
    ## 聊天提示模板\n\n聊天提示模板是提示模板的一种实用变体，在使用大型语言模型处理对话任务时，能让你的工作更加轻松。\n\n正如你之前所学，聊天补全 API\
    \ 使用消息列表，包括系统消息、人类消息（提示词）和 AI 消息。LangChain 提供了一些有用的类，使处理这些消息变得简单。\n\n### 构建聊天提示模板\n\
    \n让我们看看如何使用`ChatPromptTemplate`类创建这样的模板。\n\n#### 导入所需库\n\n首先，处理基础工作，例如导入如下所示的库：\n\
    \n- `langchain.prompts`：提供`ChatPromptTemplate`、`SystemMessagePromptTemplate`和`HumanMessagePromptTemplate`类，用于创建聊天提示词\n\
    - `langchain.chat_models`：提供`ChatOpenAI`类，用于与 OpenAI 聊天模型交互\n\n```\nfrom langchain.prompts\
