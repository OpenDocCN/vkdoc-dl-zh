- fmt: "# Example Selectors\n\n## MMR Example Selector\n\nThe `MMR` example selector\
    \ aims to balance the relevance and diversity of the selected examples. It uses\
    \ the concept of Maximal Marginal Relevance, which considers both the similarity\
    \ between the input and the examples and the dissimilarity among the selected\
    \ examples. This approach ensures that the selected examples are not only relevant\
    \ to the input but also diverse, reducing redundancy and increasing the coverage\
    \ of different aspects related to the input.\n\n## Length Example Selector\n\n\
    The `Length` example selector focuses on selecting examples based on how many\
    \ can fit within a specified length constraint. This example selector is handy\
    \ when you have a limited context window or want to control the size of the prompt.\
    \ This helps in providing the language model with a diverse set of examples while\
    \ staying within the length constraints.\n\n## Ngram Example Selector\n\nThe `Ngram`\
    \ example selector uses ngram overlap between the input and the examples to determine\
    \ which examples to choose. An ngram is a contiguous sequence of n items (words\
    \ or characters) from a given text. By considering ngram overlap, this selector\
    \ favors examples that share common phrases or word sequences with the input,\
    \ potentially improving the model’s ability to generate relevant outputs.\n\n\
    ## Factors to Choose When Selecting an Example Selector\n\nConsider the following\
    \ factors when selecting an example selector:\n\n- **Relevance**: If generating\
    \ highly relevant outputs is crucial, the `Similarity` or `MMR` example selectors\
    \ might be suitable choices.\n- **Diversity**: If you want to cover diverse aspects\
    \ related to the input, the `MMR` example selector can help balance relevance\
    \ and diversity.\n- **Length Constraints**: If you have strict length limitations\
    \ for your prompts, the `Length` example selector can assist in selecting examples\
    \ that fit within those constraints.\n- **Phrase Matching**: If you want to emphasize\
    \ examples that share common phrases or word sequences with the input, the `Ngram`\
    \ example selector can be effective.\n\n## Few-Shot Prompt Template\n\nThe few-shot\
    \ prompt template is a technique where a model learns to perform a task from a\
    \ very limited amount of training data. It involves providing a few examples (shots)\
    \ to help the model understand the task context and desired output format. Figure\
    \ 5-1 shows how few-shot learning works.\n\n***Figure 5-1.** How Few-Shot Learning\
    \ Works*\n\n`LangChain` provides a handy `FewShotPromptTemplate` class that makes\
    \ working with examples even easier.\n\n### Crafting a Few-Shot Prompt Template\
    \ for Question Answering\n\nIn this section, you will learn how to create a few-shot\
    \ prompt template that teaches a language model to generate self-asking questions\
    \ and search for answers based on a set of examples.\n\n#### Step 1: Prepare Example\
    \ Set\n\nTo begin, create a list of few-shot examples. Each example should be\
    \ a dictionary containing a question and its corresponding answer:\n\n```python\n\
    examples = [\n    {\n        \"question\": \"What is the largest planet in our\
    \ solar system?\",\n        \"answer\": \"Jupiter is the largest planet in our\
    \ solar system.\"\n    },\n    {\n        \"question\": \"Who painted the Mona\
    \ Lisa?\",\n        \"answer\": \"The Mona Lisa was painted by Leonardo da Vinci.\"\
    \n    },\n    {\n        \"question\": \"What is the currency of Japan?\",\n \
    \       \"answer\": \"The currency of Japan is the Japanese yen.\"\n    }\n]\n\
    ```\n\n#### Step 2: Format Few-Shot Examples\n\nNext, use a `PromptTemplate` to\
    \ format the examples into a string that will be presented to the language model.\
    \ It takes the question and answer as input variables and formats them into a\
    \ string:\n\n```python\nfrom langchain.prompts import PromptTemplate\n\nexample_prompt\
    \ = PromptTemplate(\n    input_variables=[\"question\", \"answer\"],\n    template=\"\
    Question: {question}\\nAnswer: {answer}\"\n)\n\n# Test the formatting by printing\
    \ the first example\nprint(example_prompt.format(**examples[0]))\n```\n\n**Output:**\n\
    \n```\nQuestion: What is the largest planet in our solar system?\nAnswer: Jupiter\
    \ is the largest planet in our solar system.\n```\n\n#### Step 3: Create Few-Shot\
    \ Prompt Template\n\nNow, you will create a `FewShotPromptTemplate` that will\
    \ serve as the framework for the language model to learn from the provided examples.\n\
    \nThis code creates a `FewShotPromptTemplate` using the examples and the formatted\
    \ example prompt. It also specifies a suffix that will be appended to the examples\
    \ and the input variables:\n\n```python\nfrom langchain.prompts import FewShotPromptTemplate\n\
    \nprompt = FewShotPromptTemplate(\n    examples=examples,\n    example_prompt=example_prompt,\n\
    \    suffix=\"Question: {input}\",\n    input_variables=[\"input\"]\n)\n\n# Preview\
    \ the formatted template\nprint(prompt.format(input=\"What is the capital of Australia?\"\
    ))\n```\n\n**Output:**\n\n```\nQuestion: What is the largest planet in our solar\
    \ system?\nAnswer: Jupiter is the largest planet in our solar system.\n\nQuestion:\
    \ Who painted the Mona Lisa?\nAnswer: The Mona Lisa was painted by Leonardo da\
    \ Vinci.\n\nQuestion: What is the currency of Japan?\nAnswer: The currency of\
    \ Japan is the Japanese yen.\n\nQuestion: What is the capital of Australia?\n\
    ```\n\n#### Step 4 (Optional): Select Examples with Example Selector\n\nIf you\
    \ have a large set of examples, you can use an example selector. This code initializes\
    \ a `LengthBasedExampleSelector` that selects examples based on their length.\
    \ It takes the examples, the example prompt, and the maximum length as parameters.\
    \ You can choose a selector of your choice.\n\n```python\n# Initialize the selector\
    \ with your examples\nexample_selector = LengthBasedExampleSelector(\n    examples=examples,\n\
    \    example_prompt=example_prompt,\n    max_length=50\n)\n\n# Find the most relevant\
    \ example for a new question\nselected_examples = example_selector.select_examples(\n\
    \    {\"question\": \"Who sculpted the Statue of David?\"}\n)\n```\n\nRemember\
    \ to import the following:\n\n```python\nfrom langchain.prompts import FewShotPromptTemplate,\
    \ PromptTemplate\nfrom langchain.prompts.example_selector import LengthBasedExampleSelector\n\
    ```\n\nThe above line selects the most relevant examples based on the question\
    \ “Who sculpted the Statue of David?” using the `LengthBasedExampleSelector`.\
    \ The selected examples are then used to create a new `FewShotPromptTemplate`\
    \ that incorporates the example selector below.\n\n**Let us discuss how the `LengthBasedExampleSelector`\
    \ works.**\n\nWhen initializing the `LengthBasedExampleSelector`, you provide\
    \ the list of examples (`examples`), the example prompt template (`example_prompt`),\
    \ and the maximum length (`max_length`) for the selected examples.\n\nThe `select_examples`\
    \ method is called with an input dictionary containing the question “Who sculpted\
    \ the Statue of David?” However, in the case of the `LengthBasedExampleSelector`,\
    \ the input question is not used for selecting examples based on relevance.\n\n\
    The `LengthBasedExampleSelector` iterates through the list of examples and selects\
    \ examples based on their length. It tries to include as many examples as possible\
    \ while ensuring that the total length of the selected examples does not exceed\
    \ the specified `max_length`. Its goal is to maximize the number of examples to\
    \ include within the specified length limit.\n\n#### Step 5 (Optional): Integrate\
    \ Example Selector into Prompt Template\n\nBy integrating the example selector\
    \ into the prompt template, the selected examples are dynamically included in\
    \ the prompt based on the relevance to the input question. This approach allows\
    \ for a more targeted and efficient use of examples, improving the quality and\
    \ relevance of the generated responses.\n\n```python\nprompt = FewShotPromptTemplate(\n\
    \    example_selector=example_selector,\n    example_prompt=example_prompt,\n\
    \    suffix=\"Question: {input}\",\n    input_variables=[\"input\"]\n)\n```"
