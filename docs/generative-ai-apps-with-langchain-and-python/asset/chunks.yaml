- fmt: "# Model for the Question “Who Sculpted the Statue of David?”\n\nThe model\
    \ for the question “Who sculpted the Statue of David?” is based on the prompt\
    \ template with the example selector. The model uses the selected examples and\
    \ its preexisting knowledge to generate the correct answer.\n\nThe main difference\
    \ between the two prompt templates is that the one without the example selector\
    \ includes all the examples, while the one with the example selector (`LengthBasedExampleSelector`)\
    \ selects examples based on their length.\n\nIn both cases, the language model\
    \ uses the provided examples and its preexisting knowledge to generate appropriate\
    \ answers to the input questions. Thus, the examples serve as a guide or context\
    \ for the model to understand the type of information being asked and the expected\
    \ format of the answer.\n\n## Conclusion\n\nYou have now created a few-shot prompt\
    \ template that selects relevant examples and presents them in a structured format\
    \ to the language model. You have enabled the model to learn from the examples\
    \ and generate appropriate answers to new questions.\n\n# Chapter 5: Mastering\
    \ Prompts for Creative Content\n\n## Output Parsers\n\nFinally, we have output\
    \ parsers. Sometimes, you want your LLM to generate output in a specific format,\
    \ like JSON or a question-answer pattern. You can use output parsers to extract\
    \ the relevant information from the model’s response and structure it according\
    \ to your needs.\n\nOutput parsers are helpful when building an application that\
    \ needs to extract specific data types from the output of an LLM. Maybe you want\
    \ a Python `datetime` object or a nicely formatted JSON object. You can use the\
    \ output parsers to effortlessly convert the string outputs from LLMs into the\
    \ exact data types you need or even your own custom class instances using `pydantic`.\n\
    \nOutput parsers typically perform two primary functions:\n\n1. **Get Format Instructions**:\
    \ This method provides guidelines to the LLM on how the information should be\
    \ structured and presented.\n2. **Parse**: Once the LLM generates a response,\
    \ this method takes that text and structures it according to the provided instructions.\n\
    \nIn cases where the LLM’s response doesn’t perfectly match the desired format,\
    \ output parsers offer an additional method:\n\n1. **Parse with Prompt**: This\
    \ method serves as a second attempt to structure the data correctly. It takes\
    \ into account the LLM’s response and the original prompt and provides more context\
    \ to refine the output.\n\n## Types of Output Parsers\n\nLangChain has a diverse\
    \ range of output parsers. Whether you need JSON objects or you are working with\
    \ CSV files, LangChain likely has a parser for you. And a big plus is that many\
    \ of these parsers support streaming, meaning they can handle continuous data\
    \ feeds:\n\n- **OpenAITools Parser**: This is handy when dealing with the latest\
    \ OpenAI functions. It structures the output based on the given arguments, tools,\
    \ and tool choice.\n- **OpenAIFunctions Parser**: This one is useful when using\
    \ legacy OpenAI function calling arguments like `functions` and `function_call`.\
    \ It is reliable and streams the output as JSON objects.\n- **JSON Parser**: It\
    \ is one of the most reliable parsers out there, and it returns a JSON object,\
    \ which can be defined by a `Pydantic` model if you like your data dressed in\
    \ a particular schema.\n- **XML Parser**: Use this parser when your output needs\
    \ to be in XML format.\n- **CSV Parser**: This parser turns outputs into a neat\
    \ list, perfect for spreadsheets.\n- **OutputFixing Parser**: Sometimes, the first\
    \ draft isn’t perfect. This parser wraps another parser and steps in if there\
    \ is an error, asking an LLM to fix the output.\n- **RetryWithError Parser**:\
    \ This is similar to `OutputFixing` but more comprehensive, as it also considers\
