  trans: '

    # 关于作者


    **拉比·杰伊**拥有超过 15 年推动数字化转型的经验，并具备独特的“敏锐洞察力”。他作为 Java 和 SAP ABAP 开发人员的背景，使其对大型语言模型通常需要集成的企业系统有着深刻见解。作为德勤数字/云原生业务的领导者，他积累了跨行业应用人工智能解决方案的经验，这使他能够准确识别大型语言模型在哪些领域最具商业影响力。


    他热衷于让复杂技术变得易于理解，这促使他撰写了《SAP NetWeaver Portal 技术》和《企业级云人工智能》两本书，并定期为行业出版物撰稿。他曾担任《基于大型语言模型的解决方案》一书的**技术审校**，并在
    HCL America 担任负责数字化转型的副总裁，这充分体现了他在大型语言模型领域的积极参与。此外，他还运营着一份领英新闻通讯（“企业人工智能转型”）和一门免费的领英课程（“面向商业创新的人工智能”）。


    # 关于技术审校


    **穆拉利·克里希南**是一位亲力亲为的软件领导者和初创公司创始人，热衷于构建高效且能创造营收的业务。他在微软（B2B、B2C 领域）拥有超过 20 年的经验，随后在星巴克（B2C
    领域）担任过高管。作为联合创始人，穆拉利在 RapL（一个移动优先、人工智能驱动的自适应微学习平台）领导了融资、产品、客户成功、市场营销和销售工作。他拥有
    30 多项美国专利，在尖端技术（云、人工智能/机器学习、移动、大数据）方面具有经过验证的创新能力。穆拉利还指导、协助初创公司创始人并提供建议。他与家人住在西雅图，喜欢跑步、骑行、阅读和烹饪。


    **希瓦库马尔·戈帕拉克里希南**在软件开发、DevOps、SRE 和平台工程领域拥有超过 25 年的经验。他曾在多个行业工作，从医疗保健企业到面向消费者的网络规模公司。他创立过一家初创公司，曾是一家财富
    1000 强公司的关键架构师，目前是 BD 公司的首席架构师。他是《基于 Azure 的 Kubernetes 实战》的合著者，以及《求职者 Kubernetes
    指南》和《使用 ChatGPT 的现代 Python 编程》的作者。


    **基尔蒂·巴拉特**是人工智能领域一位成就卓著的思想领袖。他拥有运营多家初创公司以及在跨国公司领导人工智能项目的经验。他还是一位投资者和公司导师。他毕业于纽约雪城大学和金奈金迪工程学院。


    # 第 1 章：LangChain 与大型语言模型入门


    欢迎来到 LangChain 和大型语言模型的世界，在这里，你将学习如何使用最流行的生成式人工智能应用开发框架之一——LangChain——来构建生成式人工智能应用。

    '
- fmt: "# Introduction to LangChain and LLMs\n\nYou will learn how to tap into the\
    \ vast knowledge of these highly capable large language models, or `LLMs`, as\
    \ we often call them. Together, we are going to explore how powerful `LLMs` like\
    \ `GPT-4`, `PaLM`, and `Gemini` can be accessed with `LangChain` to develop some\
    \ amazing, intelligent, and real-world applications that feel almost human-like.\n\
    \nThe power of `LangChain` lies in its ability to make the power of large language\
    \ models (`LLMs`) easily accessible to us to build real-world applications. Whether\
    \ you are a veteran coder or just starting out, you are going to find `LangChain`\
    \ refreshingly easy to use. It is that ease of coding that got me hooked onto\
    \ `LangChain`. I hope you will be attracted to it as well once you start discovering\
    \ how easy it is, as you start learning from practical examples throughout the\
    \ book. The beauty of it is that you don’t even need to be a machine learning\
    \ guru or data science expert to leverage its capabilities.\n\n© Rabi Jay 2024\n\
    \nR. Jay, *Generative AI Apps with LangChain and Python*,\n\n[https://doi.org/10.1007/979-8-8688-0882-1_1](https://doi.org/10.1007/979-8-8688-0882-1_1#DOI)\n\
    \n## Chapter 1: Introduction to LangChain and LLMs\n\nBy the end of this chapter,\
    \ I am confident you will master the essentials of `LangChain` and start developing\
    \ your own `LLM`-driven generative AI applications.\n\nI hope you find this text\
    \ to be both comprehensive and hands-on. My goal is for you to not only understand\
    \ `LangChain` and `LLM` theory but also to apply this knowledge practically to\
    \ bring your generative AI projects to life.\n\n### Understanding LangChain\n\n\
    `LangChain` is a powerful framework that will help you develop artificial intelligence\
    \ applications based on `LLMs` easily. Let us take a closer look.\n\nThe official\
    \ definition of `LangChain` on the `LangChain.com` website is like this:\n\n>\
    \ **LangChain** is a **framework** for developing **applications powered by language\
    \ models**. It enables applications that:\n> \n> - **Are context-aware**: connect\
    \ a language model to sources of context (prompt instructions, few shot examples,\
    \ content to ground its response in, etc.)\n> - **Reason**: rely on a language\
    \ model to reason (about how to answer based on provided context, what actions\
    \ to take, etc.)\n\n`LangChain` is essentially a digital toolbox that you can\
    \ use to build amazing, intelligent applications that can talk, understand, and\
    \ even think like a human to some extent.\n\nHere are some benefits:\n\n- You\
    \ can tap into the vast knowledge of advanced language models like `GPT-4`, `PaLM`,\
    \ `Gemini`, or even open source models such as `LLaMA`. This opens up a world\
    \ of possibilities for the types of applications you can develop.\n- You can integrate\
    \ these `LLMs` with your own specific, private data. This means you can tailor\
    \ the `LLM`’s output more closely to the unique needs and contexts of your business\
    \ or project.\n- And here is the good news. You are not limited to any specific\
    \ `LLM`, and you can mix and match different models as needed. This allows for\
    \ a level of customization in generative AI application development that can truly\
    \ drive innovation.\n\n`LangChain` provides the tools you need irrespective of\
    \ whether you are looking to develop chatbots that enhance customer service, systems\
    \ that generate creative content, or solutions that automate repetitive tasks.\
    \ It is very inspiring to see the many ways we can apply this technology to solve\
    \ real-world problems and drive innovation across various industries.\n\n### A\
    \ Simple Generative App Using LangChain\n\nHere is a simple, illustrative example\
    \ of a basic application that uses `GPT-4` to generate creative content based\
    \ on user input. It may seem like a trivial example, but I am sharing this just\
    \ to illustrate how easy it is to call an `LLM`. We will go deeper into these\
    \ topics in future chapters. For now, just skim through this to get a rough idea\
    \ of what is in store for us ahead.\n\n```\n# Install the LangChain and OpenAI\
    \ modules\n!pip install openai==0.28.0\n!pip install LangChain==0.1.20\n```"
  raw: 'You will learn how to tap into the vast knowledge of these highly capable
    large language models, or LLMs, as we often call them. Together, we are going
    to explore how powerful LLMs like GPT-4, PaLM, and Gemini can be accessed with
    LangChain to develop some amazing, intelligent, and real-world applications that
    feel almost human-like.


    The power of LangChain lies in its ability to make the power of large language
    models (LLMs) easily accessible to us to build real-world applications. Whether
    you are a veteran coder or just starting out, you are going to find LangChain
    refreshingly easy to use. It is that ease of coding that got me hooked onto LangChain.
    I hope you will be attracted to it as well once you start discovering how easy
    it is, as you start learning from practical examples throughout the book. The
    beauty of it is that you don’t even need to be a machine learning guru or data
    science expert to leverage its capabilities.


    © Rabi Jay 2024


    R. Jay, *Generative AI Apps with LangChain and Python*,


    [https://doi.org/10.1007/979-8-8688-0882-1_1](https://doi.org/10.1007/979-8-8688-0882-1_1#DOI)


    Chapter 1 IntroduCtIon to LangChaIn and LLMs


    By the end of this chapter, I am confident you will master the essentials of LangChain
    and start developing your own LLM-driven generative AI applications.


    I hope you find this text to be both comprehensive and hands-on. My goal is for
    you to not only understand LangChain and LLM theory but also to apply this knowledge
    practically to bring your generative AI projects to life.


    **Understanding LangChain**


    LangChain is a powerful framework that will help you develop artificial intelligence
    applications based on LLMs easily. Let us take a closer look.


    The official definition of LangChain on the LangChain.com website is like this:


    ***LangChain*** *is a* *framework* *for developing* *applications powered by language
    models. It enables*


    *applications that:*


    ***Are context-aware**: connect a language model to*


    *sources of context (prompt instructions, few shot*


    *examples, content to ground its response in, etc.)*


    ***Reason**: rely on a language model to reason (about*


    *how to answer based on provided context, what*


    *actions to take, etc.)*


    LangChain is essentially a digital toolbox that you can use to build amazing,
    intelligent applications that can talk, understand, and even think like a human
    to some extent.


    Chapter 1 IntroduCtIon to LangChaIn and LLMs


    Here are some benefits:


    • You can tap into the vast knowledge of advanced


    language models like GPT-4, PaLM, Gemini, or even


    open source models such as LLaMA. This opens up a


    world of possibilities for the types of applications you


    can develop.


    • You can integrate these LLMs with your own specific,


    private data. This means you can tailor the LLM’s


    output more closely to the unique needs and contexts


    of your business or project.


    • And here is the good news. You are not limited


    to any specific LLM, and you can mix and match


    different models as needed. This allows for a level


    of customization in generative AI application


    development that can truly drive innovation.


    LangChain provides the tools you need irrespective of whether you are looking
    to develop chatbots that enhance customer service, systems that generate creative
    content, or solutions that automate repetitive tasks. It is very inspiring to
    see the many ways we can apply this technology to solve real-world problems and
    drive innovation across various industries.


    **A Simple Generative App Using LangChain**


    Here is a simple, illustrative example of a basic application that uses GPT-4


    to generate creative content based on user input. It may seem like a trivial example,
    but I am sharing this just to illustrate how easy it is to call an LLM. We will
    go deeper into these topics in future chapters. For now, just skim through this
    to get a rough idea of what is in store for us ahead.


    Chapter 1 IntroduCtIon to LangChaIn and LLMs


    **# Install the LangChain and OpenAI modules**


    !pip install openai==0.28.0


    !pip install LangChain==0.1.20'
  trans: "\n# LangChain 与 LLM 简介\n\n你将学习如何利用这些能力超强的大型语言模型（我们常称之为 `LLM`）所蕴含的广博知识。我们将一同探索如何通过\
    \ `LangChain` 调用像 `GPT-4`、`PaLM` 和 `Gemini` 这样强大的 `LLM`，来开发一些令人惊叹、智能且贴近真实世界的应用，这些应用甚至能展现出类人的交互感。\n\
    \n`LangChain` 的强大之处在于，它让我们能够轻松利用大型语言模型（`LLM`）的能力来构建实际应用。无论你是经验丰富的程序员，还是刚刚入门的新手，你都会发现\
    \ `LangChain` 出奇地易用。正是这种编码的便捷性让我对 `LangChain` 着迷。我希望，当你开始通过本书中的实践示例学习，并发现它有多么简单时，你也会被它吸引。它的美妙之处在于，你甚至不需要成为机器学习大师或数据科学专家，就能利用它的强大功能。\n\
    \n© Rabi Jay 2024\n\nR. Jay, *Generative AI Apps with LangChain and Python*,\n\
    \n[`doi.org/10.1007/979-8-8688-0882-1_1`](https://doi.org/10.1007/979-8-8688-0882-1_1#DOI)\n\
    \n## 第 1 章：LangChain 与 LLM 简介\n\n在本章结束时，我相信你将掌握 `LangChain` 的精髓，并开始开发你自己的、由 `LLM`\
    \ 驱动的生成式 AI 应用。\n\n我希望你觉得这本书既全面又注重实践。我的目标是让你不仅理解 `LangChain` 和 `LLM` 的理论，还能将所学知识付诸实践，让你的生成式\
    \ AI 项目真正落地。\n\n### 理解 LangChain\n\n`LangChain` 是一个强大的框架，它能帮助你轻松开发基于 `LLM` 的人工智能应用。让我们来仔细看看。\n\
    \n`LangChain.com` 网站上对 `LangChain` 的官方定义如下：\n\n> **LangChain** 是一个用于开发**由语言模型驱动的应用**的**框架**。它支持的应用能够：\n\
    > \n> - **感知上下文**：将语言模型连接到上下文来源（如提示指令、少量示例、用于支撑其回答的内容等）\n> - **进行推理**：依赖语言模型进行推理（例如，如何根据提供的上下文进行回答、应采取哪些行动等）\n\
    \n`LangChain` 本质上是一个数字工具箱，你可以用它来构建令人惊叹的智能应用，这些应用能够在一定程度上像人类一样交谈、理解甚至思考。\n\n以下是一些优势：\n\
    \n- 你可以利用像 `GPT-4`、`PaLM`、`Gemini` 这样的高级语言模型，甚至是 `LLaMA` 这样的开源模型所蕴含的广博知识。这为你所能开发的应用类型打开了无限可能。\n\
    - 你可以将这些 `LLM` 与你自己的特定私有数据集成。这意味着你可以根据你业务或项目的独特需求和背景，更精确地定制 `LLM` 的输出。\n- 好消息是，你不受限于任何特定的\
    \ `LLM`，可以根据需要混合搭配不同的模型。这为生成式 AI 应用开发提供了高度的定制化能力，能够真正推动创新。\n\n无论你是想开发提升客户服务的聊天机器人、生成创意内容的系统，还是自动化重复任务的解决方案，`LangChain`\
    \ 都能提供你所需的工具。看到我们能够以多种方式应用这项技术来解决现实世界的问题并推动各行各业的创新，这非常鼓舞人心。\n\n### 使用 LangChain\
    \ 构建一个简单的生成式应用\n\n下面是一个简单的示例，演示了一个使用 `GPT-4` 根据用户输入生成创意内容的基础应用。这看起来可能是一个微不足道的例子，但我分享它只是为了说明调用\
    \ `LLM` 是多么简单。我们将在后续章节中深入探讨这些主题。现在，只需快速浏览一下，以便对我们即将学习的内容有一个大致的了解。\n\n```\n# 安装\
    \ LangChain 和 OpenAI 模块\n!pip install openai==0.28.0\n!pip install LangChain==0.1.20\n\
    ```\n"
- fmt: "# Import LangChain and OpenAI libraries\n\n```python\nfrom langchain.llms\
    \ import OpenAI\nfrom langchain.chains import LLMChain\nfrom langchain.prompts\
    \ import PromptTemplate\n```\n\n# Initialize the OpenAI model with LangChain\n\
    \n```python\nLLM_OPENAI_API_KEY = \"your_openai_api_key\"\nllm = OpenAI(api_key=LLM_OPENAI_API_KEY)\n\
    ```\n\n# Define a prompt template for generating story ideas\n\n```python\nprompt_template\
    \ = PromptTemplate(\n    input_variables=[\"user_input\"],\n    template=\"Generate\
    \ a creative product idea based on the following industry input: {user_input}\"\
    ,\n)\n```\n\n# User input for the theme\n\n```python\nuser_input = \"eco-friendly\
    \ home appliances\"\n```\n\n# Now, initialize the LLMChain with the prompt\n\n\
    ```python\nchain = LLMChain(llm=llm, prompt=prompt_template)\n```\n\n# Generate\
    \ the creative content\n\n```python\nresponse = chain.run(user_input)\n```\n\n\
    # Print the response\n\n```python\nprint(\"Creative Story Idea:\", response)\n\
    ```\n\n[Figure 1-1](#index_split_000.html#p24) shows the output I got after running\
    \ this code when using the Google Colab. You can use the code attached to this\
    \ chapter on GitHub to test this yourself.\n\n![](index-24_1.jpg)\n\n## Chapter\
    \ 1 Introduction to LangChain and LLMs\n\n***Figure 1-1.** Output After Running\
    \ the Code*\n\n### Explanation\n\nBelow is an explanation for the code:\n\n- First,\
    \ we install the required modules: `OpenAI` and `LangChain`. Please ensure that\
    \ you download the exact versions used in this code; otherwise, it is quite likely\
    \ that the code may not work.\n\n**Note**: To check what versions have been downloaded,\
    \ use the commands below for checking versions of `openai` and `langchain` libraries,\
    \ respectively.\n\n```bash\n!pip show openai\n!pip show langchain\n```\n\n- Then,\
    \ we import necessary classes from `LangChain`: `OpenAI`, `LLMChain`, and `PromptTemplate`.\n\
    - Initialize the `OpenAI` model with the API key. Please refer to the “Step 1:\
    \ Obtaining OpenAI API Keys” section in [Chapter 2](#index_split_000.html#p58)\
    \ to obtain the OpenAI key.\n- Define a prompt template for generating story ideas,\
    \ using `user_input` as the input variable.\n- Set the value of `user_input` to\
    \ `\"eco-friendly home appliances\"`.\n- Create an instance of `LLMChain` with\
    \ the initialized `OpenAI` model and the prompt template.\n- Generate the creative\
    \ story idea by calling the `run` method of `LLMChain` with `user_input`.\n- Print\
    \ the generated story idea with the label `\"Creative Product Idea:\"`.\n\nThis\
    \ example demonstrates how easy it is to integrate LLMs into applications using\
    \ LangChain and hopefully gives you a glimpse into the framework’s ability to\
    \ abstract and streamline the process.\n\nNow that we have briefly looked at LangChain,\
    \ let us explore what LLMs are and why they are important.\n\n## What Are LLMs,\
    \ and Why Are They Important?\n\nAs mentioned in our learning objectives, you\
    \ need to understand the capabilities of LLMs, like GPT-4, PaLM, and Gemini, well\
    \ to develop powerful generative AI applications.\n\nLLMs are like a robot that\
    \ has read almost everything available on the Internet, such as books, articles,\
    \ and websites. At the same time, they can write or chat about any topic under\
    \ the sun. These “super-reading robots” allow computers to comprehend and generate\
    \ text that is remarkably human-like.\n\nThe power of LLMs, though, extends far\
    \ beyond simple conversations. They are transforming various fields by:\n\n- **Translating\
    \ languages** seamlessly, breaking down communication barriers\n- **Writing stories**\
    \ and creative content and tapping into a well of artificial creativity\n- **Summarizing\
    \ large texts** and condensing information quickly and efficiently\n- **Generating\
    \ code** to help developers automate routine coding tasks\n\nLLMs have become\
    \ so powerful now that you can easily develop highly intelligent generative AI\
    \ applications across multiple domains, starting from enhancing customer service\
    \ automation to supporting creative endeavors like writing and design.\n\n## Examples\
    \ of LLMs\n\nHere are a few standout examples of LLMs that we will explore more\
    \ deeply in [Chapter 4](#index_split_001.html#p132).\n\n- **GPT-4**: GPT-4 is\
    \ developed by OpenAI, and you can generate essays, create poems, and even produce"
