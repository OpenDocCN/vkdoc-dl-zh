    **Internal Components in a Step**


    In this example, the internal components (LLM, prompts, tools) work together within
    each step, while the high-level components (trigger, steps, decision points, end
    point) define the overall structure and flow of the chain.


    The language model (LLM) is at the heart of every chain and is


