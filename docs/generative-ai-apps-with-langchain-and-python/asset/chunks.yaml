- fmt: "# Use the Query Constructor to Convert Natural Language to Allowed Operations\n\
    \n`natural_language_query = \"Find all products priced below $100 and sort them\
    \ by price\"`  \n`structured_query = query_constructor(natural_language_query)`\
    \  \n`print(structured_query)`\n\nIn this example, we define a list of allowed\
    \ operations: \"search,\" \"filter,\" and \"sort.\" We then load the `query_constructor_runnable`\
    \ chain, passing in the allowed operations. This chain takes a natural language\
    \ query and converts it into the specified allowed operations.\n\nYou provide\
    \ a natural language query: \"Find all products priced below $100 and sort them\
    \ by price.\" The `query_constructor` chain processes this query and returns a\
    \ structured query based on the allowed operations.\n\nAnd here is the output\
    \ you will get:\n\n```\n{\n  \"operations\": [\n    {\n      \"operation\": \"\
    search\",\n      \"query\": \"products\"\n    },\n    {\n      \"operation\":\
    \ \"filter\",\n      \"condition\": \"price < 100\"\n    },\n    {\n      \"operation\"\
    : \"sort\",\n      \"key\": \"price\"\n    }\n  ]\n}\n```\n\nIn the example above,\
    \ the natural language query is transformed into a structured query with specific\
    \ operations like \"search,\" \"filter,\" and \"sort.\" This structured format\
    \ is easier for your application to process and execute.\n\n## Building with Legacy\
    \ Chains\n\nConstructing legacy chains is a straightforward process. You simply\
    \ create an instance of the desired chain class and provide the necessary parameters.\
    \ You will have to refer to the documentation for the specific chain you are using\
    \ because each chain has its own set of required and optional parameters.\n\n\
    ### Constructing Legacy Chains\n\nHere is an example of constructing a legacy\
    \ chain:\n\n```python\nfrom langchain.chains import LLMChain\nfrom langchain.llms\
    \ import OpenAI\n\nllm = OpenAI(temperature=0.9)\nchain = LLMChain(llm=llm, param1=value1,\
    \ param2=value2)\n```\n\nIn this example, you import the desired chain class (`MyCustomChain`)\
    \ and create an instance of it. You then provide the necessary parameters, such\
    \ as the language model (`llm`) and any custom parameters (`param1` and `param2`).\n\
    \n### Executing Legacy Chains\n\nExecuting legacy chains is just as simple as\
    \ constructing them. Most legacy chains provide a `run` method that takes the\
    \ input data and returns the result. Here is an example:\n\n```python\nresult\
    \ = chain.run(input_data)\nprint(result)\n```\n\nIn this example, you simply call\
    \ the `run` method on the chain instance, passing in the `input_data`. The chain\
    \ processes the input and returns the result, which you then print.\n\n### Types\
    \ of Legacy Chains\n\nNow that you have a general understanding of legacy chains,\
    \ let us explore some of the most commonly used ones.\n\n| Chain | When to Use\
    \ |\n|-------|-------------|\n| `APIChain` | When you want to convert a query\
    \ into an API request, execute it, and then use an LLM to interpret the response.\
    \ |\n| `OpenAPIEndpointChain` | Similar to `APIChain` but optimized for OpenAPI\
    \ endpoints. |\n| `ConversationalRetrievalChain` | For having conversations with\
    \ a document, using previous conversation history to refine queries. |\n| `StuffDocumentsChain`\
    \ | When you have a list of documents that fit within the context window of your\
    \ LLM. |\n| `ReduceDocumentsChain` | For processing a large number of documents\
    \ in parallel by iteratively reducing them. |\n| `MapReduceDocumentsChain` | Similar\
    \ to `ReduceDocumentsChain`, but with an initial LLM call before reducing the\
    \ documents. |\n| `RefineDocumentsChain` | For sequentially refining an answer\
    \ based on multiple documents. |\n| `MapRerankDocumentsChain` | When you want\
    \ to answer based on a single document with the highest confidence score. |\n\
    | `ConstitutionalChain` | For enforcing constitutional principles in a chain's\
    \ answer. |\n| `LLMChain` | A basic chain for interacting with an LLM. |\n| `ElasticsearchDatabaseChain`\
    \ | For asking natural language questions against an Elasticsearch database. |\n\
    | `FlareChain` | An advanced retrieval technique for exploratory purposes. |\n\
    | `GraphCypherQAChain` | For constructing Cypher queries from natural language\
    \ and executing them against a graph. |\n| `LLMMath` | For converting user questions\
    \ to math problems and executing them. |\n| `LLMCheckerChain` | Uses a second\
    \ LLM call to verify the initial answer. |\n| `LLMSummarizationChecker` | Creates\
    \ a summary using multiple LLM calls for increased accuracy. |\n\nThese are just\
    \ a few examples from the extensive list of legacy chains available. Each chain\
    \ has its unique strengths and use cases, allowing you to tackle a wide range\
    \ of tasks.\n\n## Building Real-World Apps with Legacy Chains\n\nYou can build\
    \ very effective real-world generative AI apps using legacy chains. Below are\
    \ some popular examples.\n\n### Document Chatbot App Using `ConversationalRetrievalChain`\n\
    \nLet us say you want to have a conversation with a document using the `ConversationalRetrievalChain`.\
    \ Here is a simplified example:\n\n```python\nfrom langchain.chains import ConversationalRetrievalChain\n\
    from langchain.chat_models import ChatOpenAI\nfrom langchain.retrievers import\
    \ ContextualCompressionRetriever\n\n# Initialize the retriever and the LLM\nretriever\
    \ = ContextualCompressionRetriever(...)\nllm = ChatOpenAI(temperature=0)\n\n#\
    \ Create the ConversationalRetrievalChain\nqa = ConversationalRetrievalChain.from_llm(llm,\
    \ retriever=retriever)\n```"
