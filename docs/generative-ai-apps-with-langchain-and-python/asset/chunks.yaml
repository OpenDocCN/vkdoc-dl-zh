    {text}\"),\n])\n```\n\n#### 获取用户输入\n"
- fmt: '# Chapter 5: Mastering Prompts for Creative Content


    You prompt the user to enter some text using `input()` and store it in the `user_input`
    variable:


    ```

    user_input = input("Enter some text: ")

    ```


    ## Formatting the Prompt with User Input


    You use the `format_prompt()` method of the `prompt` instance to format the prompt
    with the user’s input.


    - The `text` parameter is passed as a keyword argument to replace the `{text}`
    placeholder in the prompt template.

    - The formatted prompt is stored in the `formatted_prompt` variable.


    ```

    formatted_prompt = prompt.format_prompt(text=user_input)

    ```


    ## Printing the Formatted Prompt


    You print a separator line and the heading “Formatted Prompt:”. You convert the
    formatted prompt to a list of messages using the `to_messages()` method and print
    it:


    ```

    print("\nFormatted Prompt:")

    print(formatted_prompt.to_messages())

    ```


    ## Generating the Chat Completion


    You pass the formatted prompt messages to the `chat` instance to generate the
    chat completion. The generated response is stored in the `response` variable:


    ```

    response = chat(formatted_prompt.to_messages())

    ```


    ## Printing the Assistant’s Response


    You print a separator line and the heading “Assistant’s Response” and access the
    generated response content using `response.content` and print it:


    ```

    print("\nAssistant''s Response:")

    print(response.content)

    ```


    Congratulations! You just learned how to use the LangChain library to create a
    chat prompt template, format it with user input, and generate a chat completion
    using the OpenAI chat model. The chat prompt template includes a system message
    that defines the assistant’s role and behavior and a human message that represents
    the user’s input.


    The code creates a chat model instance, prompts the user for input, formats the
    prompt with the user’s input, and generates a chat completion based on the formatted
    prompt. Finally, it prints the assistant’s response.


    ## Case Study: Streamlining Customer Service


    ### Background and Context


    Your company is a prominent online retailer specializing in consumer electronics
    and is having challenges with high customer inquiry volumes leading to prolonged
    wait times and decreased customer satisfaction. Your company wants to enhance
    response accuracy and speed by using large language models (LLMs) in their customer
    service operations.


    ### Implementation Details


    Here is how you would go about implementing it:


    **Prompt Design**: You would create initial prompts based on frequent customer
    inquiries, including order tracking and product issues. You would further design
    them to recognize various customer emotions and intents for personalization.


    **Integration with LLMs**: You would choose any of the GPT models and integrate
    it into the existing CRM system to handle queries effectively.


    **Feedback and Iteration**: During the pilot phase, track the automated responses
    and use customer and agent feedback, refine prompts, and adjust strategies continually.


    ### Outcomes and Benefits


    Here are the benefits one can expect:


    **Quantitative Results**: Reduced average response times from 15 to 2 minutes.
    First contact resolution rates increased by 40%.


    **Qualitative Feedback**: Customer satisfaction surveys showed a 30% improvement
    in interaction quality. Agents reported less workload and higher job satisfaction
    due to decreased manual query handling.


    ### Lessons Learned and Best Practices


    Here are the lessons learned:


    **Prompt Flexibility**: You found out that the ability to modify prompts dynamically
    based on real-time data was crucial for addressing customer needs.


    **Scalability**: The system was designed to easily handle increased loads during
    peak periods.


    **Continuous Improvement**: Regular prompt reviews and ongoing training sessions
    were implemented to keep the system and team performance at peak levels.


    Now let us dig a little deeper into the design process itself.


