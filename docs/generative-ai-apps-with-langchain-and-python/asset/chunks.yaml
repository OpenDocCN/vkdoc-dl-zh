  trans: "\n# 示例选择器\n\n## MMR 示例选择器\n\n`MMR` 示例选择器旨在平衡所选示例的相关性和多样性。它使用了最大边际相关性的概念，同时考虑了输入与示例之间的相似性以及所选示例之间的差异性。这种方法确保所选示例不仅与输入相关，而且具有多样性，从而减少冗余并增加对输入相关不同方面的覆盖。\n\
    \n## 长度示例选择器\n\n`Length` 示例选择器专注于根据指定长度约束内能容纳的示例数量来选择示例。当您的上下文窗口有限或想要控制提示的大小时，此示例选择器非常有用。这有助于在遵守长度约束的同时，为语言模型提供多样化的示例集。\n\
    \n## Ngram 示例选择器\n\n`Ngram` 示例选择器利用输入与示例之间的 ngram 重叠来决定选择哪些示例。ngram 是来自给定文本的 n\
    \ 个连续项（单词或字符）的序列。通过考虑 ngram 重叠，该选择器倾向于选择与输入共享常见短语或单词序列的示例，从而可能提高模型生成相关输出的能力。\n\
    \n## 选择示例选择器时的考量因素\n\n在选择示例选择器时，请考虑以下因素：\n\n- **相关性**：如果生成高度相关的输出至关重要，则`Similarity`或`MMR`示例选择器可能是合适的选择。\n\
    - **多样性**：如果您希望覆盖与输入相关的不同方面，`MMR`示例选择器可以帮助平衡相关性和多样性。\n- **长度约束**：如果您的提示有严格的长度限制，`Length`示例选择器可以帮助选择符合这些约束的示例。\n\
    - **短语匹配**：如果您希望强调与输入共享常见短语或单词序列的示例，`Ngram`示例选择器会很有效。\n\n## 少样本提示模板\n\n少样本提示模板是一种技术，模型通过极有限的训练数据来学习执行任务。它涉及提供少量示例（样本）来帮助模型理解任务上下文和期望的输出格式。图\
    \ 5-1 展示了少样本学习的工作原理。\n\n***图 5-1.** 少样本学习的工作原理*\n\n`LangChain` 提供了一个方便的 `FewShotPromptTemplate`\
    \ 类，使得处理示例更加容易。\n\n### 为问答任务构建少样本提示模板\n\n在本节中，您将学习如何创建一个少样本提示模板，该模板教导语言模型根据一组示例生成自问问题并搜索答案。\n\
    \n#### 第 1 步：准备示例集\n\n首先，创建一个少样本示例列表。每个示例应是一个包含问题及其对应答案的字典：\n\n```python\nexamples\
    \ = [\n    {\n        \"question\": \"What is the largest planet in our solar\
    \ system?\",\n        \"answer\": \"Jupiter is the largest planet in our solar\
    \ system.\"\n    },\n    {\n        \"question\": \"Who painted the Mona Lisa?\"\
    ,\n        \"answer\": \"The Mona Lisa was painted by Leonardo da Vinci.\"\n \
    \   },\n    {\n        \"question\": \"What is the currency of Japan?\",\n   \
    \     \"answer\": \"The currency of Japan is the Japanese yen.\"\n    }\n]\n```\n\
    \n#### 第 2 步：格式化少样本示例\n\n接下来，使用 `PromptTemplate` 将示例格式化为将呈现给语言模型的字符串。它将问题和答案作为输入变量，并将其格式化为字符串：\n\
    \n```python\nfrom langchain.prompts import PromptTemplate\n\nexample_prompt =\
    \ PromptTemplate(\n    input_variables=[\"question\", \"answer\"],\n    template=\"\
    Question: {question}\\nAnswer: {answer}\"\n)\n\n# Test the formatting by printing\
    \ the first example\nprint(example_prompt.format(**examples[0]))\n```\n\n**输出：**\n\
    \n```\nQuestion: What is the largest planet in our solar system?\nAnswer: Jupiter\
    \ is the largest planet in our solar system.\n```\n\n#### 第 3 步：创建少样本提示模板\n\n\
    现在，您将创建一个 `FewShotPromptTemplate`，它将作为语言模型从提供的示例中学习的框架。\n\n此代码使用示例和格式化后的示例提示创建了一个\
    \ `FewShotPromptTemplate`。它还指定了一个将附加到示例和输入变量之后的后缀：\n\n```python\nfrom langchain.prompts\
    \ import FewShotPromptTemplate\n\nprompt = FewShotPromptTemplate(\n    examples=examples,\n\
    \    example_prompt=example_prompt,\n    suffix=\"Question: {input}\",\n    input_variables=[\"\
    input\"]\n)\n\n# Preview the formatted template\nprint(prompt.format(input=\"\
    What is the capital of Australia?\"))\n```\n\n**输出：**\n\n```\nQuestion: What is\
    \ the largest planet in our solar system?\nAnswer: Jupiter is the largest planet\
    \ in our solar system.\n\nQuestion: Who painted the Mona Lisa?\nAnswer: The Mona\
    \ Lisa was painted by Leonardo da Vinci.\n\nQuestion: What is the currency of\
    \ Japan?\nAnswer: The currency of Japan is the Japanese yen.\n\nQuestion: What\
    \ is the capital of Australia?\n```\n\n#### 第 4 步（可选）：使用示例选择器选择示例\n\n如果您有大量示例，可以使用示例选择器。此代码初始化了一个\
    \ `LengthBasedExampleSelector`，它根据示例的长度进行选择。它接受示例、示例提示和最大长度作为参数。您可以选择自己偏好的选择器。\n\
    \n```python\n# Initialize the selector with your examples\nexample_selector =\
    \ LengthBasedExampleSelector(\n    examples=examples,\n    example_prompt=example_prompt,\n\
    \    max_length=50\n)\n\n# Find the most relevant example for a new question\n\
    selected_examples = example_selector.select_examples(\n    {\"question\": \"Who\
    \ sculpted the Statue of David?\"}\n)\n```\n\n请记得导入以下内容：\n\n```python\nfrom langchain.prompts\
    \ import FewShotPromptTemplate, PromptTemplate\nfrom langchain.prompts.example_selector\
    \ import LengthBasedExampleSelector\n```\n\n上面这行代码使用 `LengthBasedExampleSelector`，根据问题“Who\
    \ sculpted the Statue of David?”选择了最相关的示例。然后，所选示例被用于创建一个新的 `FewShotPromptTemplate`，该模板整合了下面的示例选择器。\n\
    \n**让我们讨论一下 `LengthBasedExampleSelector` 的工作原理。**\n\n在初始化 `LengthBasedExampleSelector`\
    \ 时，您需要提供示例列表（`examples`）、示例提示模板（`example_prompt`）以及所选示例的最大长度（`max_length`）。\n\
    \n调用 `select_examples` 方法时，会传入一个包含问题“Who sculpted the Statue of David?”的输入字典。然而，对于\
    \ `LengthBasedExampleSelector` 来说，输入问题并不用于基于相关性选择示例。\n\n`LengthBasedExampleSelector`\
    \ 会遍历示例列表，并根据示例的长度进行选择。它尝试包含尽可能多的示例，同时确保所选示例的总长度不超过指定的 `max_length`。其目标是在指定的长度限制内最大化包含的示例数量。\n\
    \n#### 第 5 步（可选）：将示例选择器集成到提示模板中\n\n通过将示例选择器集成到提示模板中，所选示例会根据与输入问题的相关性动态地包含在提示中。这种方法允许更有针对性和更高效地使用示例，从而提高生成回复的质量和相关性。\n\
    \n```python\nprompt = FewShotPromptTemplate(\n    example_selector=example_selector,\n\
    \    example_prompt=example_prompt,\n    suffix=\"Question: {input}\",\n    input_variables=[\"\
    input\"]\n)\n```\n"
