- fmt: "# LangChain 简介与 LLMs\n\n`LangChain`是一个强大的框架，它使得与大型语言模型（如`GPT-4`、`PaLM`和`Gemini`）的工作变得更加容易。其模块化、标准化的设计在整个开发过程中促进了可扩展性和适应性。\n\
    \n**LLMs 的力量**：你还了解到，大型语言模型是复杂的 AI 系统，能够理解和生成类似人类的文本。它们带来了前所未有的复杂性和上下文感知能力，并彻底改变了我们与技术交互的方式。`LLMs`可以创建内容、总结信息，甚至协助编码。\n\
    \n## 第 1 章 LangChain 与 LLMs 简介\n\n**LangChain 的构建模块**：你还学习了`LangChain`的核心组件，例如模型、提示模板、数据连接、内存概念、链和代理。这些元素协同工作，构建智能的`LLM`应用程序，这实际上是本书的范围。\n\
    \n本章为我们更深入地探索`LangChain`和`LLMs`奠定了基础，在下一章中，我们将探讨使用`LangChain`框架与传统`LLM API`开发方法的优势。\n\
    \n## 复习题\n\n这些问题旨在帮助你评估和巩固对关键概念的理解。\n\n1.  `LangChain`的主要目的是什么？\n    A. 用更先进的模型替换现有的`LLMs`\n\
    \    B. 促进使用`LLMs`的应用程序的开发\n    C. 降低`LLM`应用程序的准确性\n    D. 作为一个独立的 AI，无需`LLM`集成\n\
    \n2.  `LangChain`的哪个组件允许它集成和使用外部数据源？\n    A. 提示模板\n    B. 链\n    C. 数据连接\n   \
    \ D. 内存概念\n\n3.  在管理多个`LLMs`时，`LangChain`提供了什么优势？\n    A. 增加了管理集成的复杂性\n    B.\
    \ 限制了`API`集成的灵活性\n    C. 简化了不同`LLMs`之间的切换和集成\n    D. 降低了自定义`LLM`交互的能力\n\n4.  在`LangChain`的上下文中，以下哪项最能描述“提示工程”？\n\
    \    A. 断开提示与`LLMs`的连接以增强安全性\n    B. 创建无效提示以测试`LLM`鲁棒性的过程\n    C. 精心设计输入以引导`LLMs`生成特定或期望的输出\n\
    \    D. 忽略提示中的上下文以简化开发过程\n\n5.  `LangChain`如何增强上下文感知的应用程序？\n    A. 通过完全自动化编码过程\n\
    \    B. 通过忽略用户输入来简化交互\n    C. 通过将语言模型连接到上下文来源\n    D. 通过降低语言模型响应的准确性\n\n6.  `LangChain`的哪个特性有助于管理复杂的工作流程和决策过程？\n\
    \    A. 数据连接\n    B. 代理\n    C. 内存概念\n    D. 链\n\n7.  使用`LangChain`进行 AI 应用程序开发的一个显著好处是什么？\n\
    \    A. 增加开发时间和成本\n    B. 降低使用`LLMs`的灵活性\n    C. 简化集成并增强可扩展性\n    D. 需要广泛的`LLMs`技术知识\n\
    \n## 答案\n\n1.  B. `LangChain`的主要目的是促进使用`LLMs`的应用程序的开发。\n2.  C. 数据连接允许`LangChain`集成和使用外部数据源。\n\
    3.  C. `LangChain`提供了简化不同`LLMs`之间切换和集成的优势。\n4.  C. 在`LangChain`中，“提示工程”涉及精心设计输入以引导`LLMs`生成特定或期望的输出。\n\
    5.  C. `LangChain`通过将语言模型连接到上下文来源来增强上下文感知的应用程序。\n6.  D. 链有助于管理`LangChain`内的复杂工作流程和决策过程。\n\
    7.  C. 使用`LangChain`进行 AI 应用程序开发的一个显著好处是简化集成并增强可扩展性。\n\n## 展望未来\n\n在下一章中，你将了解直接调用`LLM\
    \ API`时面临的挑战，以及`LangChain`如何应对这些挑战，以提升你的生成式 AI 开发体验和生产力。\n\n我们将会..."
