    ```\n\n### 创建代理\n\n现在，通过从 LangChain Hub 拉取提示来创建你的 ReAct 代理。你可以根据需要自定义此提示，但这里我们将使用默认提示：\n\
    \n```python\nprompt = hub.pull(\"hwchase17/react\")\n```\n\n接下来，你将选择要使用的语言模型 (LLM)。在本例中，我们使用\
    \ OpenAI：\n\n```python\nllm = OpenAI()\n```\n\n最后，通过调用 `create_react_agent` 函数，传入\
    \ LLM、工具和提示来构建 ReAct 代理：\n\n```python\nagent = create_react_agent(llm, tools,\
    \ prompt)\n```\n\n### 运行代理\n\n准备好你的 ReAct 代理后，创建一个执行器并通过传入代理、工具并设置 `verbose=True`\
    \ 来运行它，以便查看代理的思考过程：\n\n```python\nagent_executor = AgentExecutor(agent=agent,\
    \ tools=tools, verbose=True)\n```\n\n现在，向你的代理提问并观察它的运行：\n\n```python\nagent_executor.invoke({\"\
    input\": \"what is LangChain?\"})\n```\n\n观察代理如何经历一系列思考和行动来收集关于 LangChain 的信息：\n\
    \n```\n我应该研究 LangChain 以了解更多信息。\nAction: tavily_search_results_json\nAction Input:\
    \ \"LangChain\"\n\n我应该阅读摘要并查看 LangChain 的不同功能和集成。\nAction: tavily_search_results_json\n\
    Action Input: \"LangChain features and integrations\"\n\n我应该记下 LangChain 的发布日期和受欢迎程度。\n\
    Action: tavily_search_results_json\nAction Input: \"LangChain launch date and\
    \ popularity\"\n\n我现在知道最终答案了。\nFinal Answer: LangChain 是一个开源编排框架，用于构建使用大型语言模型\
