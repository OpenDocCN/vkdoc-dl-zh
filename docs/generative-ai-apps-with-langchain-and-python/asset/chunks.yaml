    Chapter 9 Building different types of agents


    **Tool Calling Agent**


    Let me introduce you to a powerful concept called tool calling, which helps your
    agent to detect when it should call one or more tools and respond with the appropriate
    inputs for those tools.


    With tool calling, it can intelligently choose the right tools and know exactly
    what ingredients to use with each tool. In the API world, you can describe these
    tools to your agent, and it will output a structured object (like JSON) containing
    the arguments needed to call the tools.


    The goal of tool calling is to ensure that your agent reliably returns valid and
    useful tool calls, going beyond what a generic text completion or chat API can
    do. By leveraging this structured output and allowing your agent to choose from
    multiple tools, you can create an agent that repeatedly calls tools and receives
    results until it resolves a query.


