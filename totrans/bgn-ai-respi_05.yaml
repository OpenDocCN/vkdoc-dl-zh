- en: A command value of approximately 82 to 83 means that heating is required
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A command value of approximately 56 to 65 means that cooling is required
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The “no change” range was approximately ±4 around the target temperature. This
    is actually not too bad of a finding since it prevents the system from unnecessary
    operation while still achieving the majority “opinion” for the desired room temperature.
