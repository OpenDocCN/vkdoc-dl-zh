- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter focused on fuzzy logic, which is a very clever approach to handling
    non-precise values that are present in almost every human situation. My approach
    was to use several practical projects to bring fuzzy logic into an understandable
    framework from where you could develop your own FL projects.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter had very detailed demonstrations, including a seven-step algorithm
    for developing a fuzzy logic system (FLS).
  prefs: []
  type: TYPE_NORMAL
- en: The first demonstration showed how to compute a tip based on food quality and
    service quality. The seven-step algorithm resulted in a program that quickly computed
    a tip percentage based on user ratings. I even suggested a way to make the project
    completely portable.
  prefs: []
  type: TYPE_NORMAL
- en: The second demonstration was somewhat more technical than the first. It involved
    creating a heating and cooling FL control system. This system type is commercially
    available in HVAC products. In fact, one manufacturer advertises that its system
    incorporates fuzzy logic. Admittedly, this chapter’s project is a scaled-down
    version of a commercial HVAC system, but it nonetheless incorporates all the important
    parts of an FLS.
  prefs: []
  type: TYPE_NORMAL
