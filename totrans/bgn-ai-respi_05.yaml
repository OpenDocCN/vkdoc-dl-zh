- en: 5. Fuzzy Logic System
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'This chapter is an extension of the fuzzy logic (FL) concepts first introduced
    in Chapter [2](A436848_1_En_2_Chapter.html). I demonstrate two fuzzy logic projects.
    The first one deals with a common situation that we all occasionally encounter:
    how to compute a tip for a meal at a restaurant. The second demonstration is more
    complex and involves implementing a control system that uses FL as part of its
    control technology. Both demonstrations use Python with the pyFuzzy add-in library,
    which incorporates FL into the Python language. There are also a number of new
    FL topics that I need to discuss. I incorporate these new topics with the FL tipping
    demonstration to provide a better framework for the new concepts.'
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
- en: Before I begin the basic fuzzy logic system (FLS) section, it is important that
    you set up the Raspberry Pi so that you can load and run the FL demonstration
    programs.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: Parts List
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For the last demonstration, you need the parts listed in Table [5-1](#Tab1).
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: Table 5-1.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: Parts List
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: '| Description | Quantity | Remarks |'
  id: totrans-7
  prefs: []
