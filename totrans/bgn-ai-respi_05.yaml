- en: 'I carefully studied the results and derived these conclusions from the test
    data:'
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
- en: A command value of approximately 65 to 75 means no change
  id: totrans-318
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A command value of approximately 82 to 83 means that heating is required
  id: totrans-319
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A command value of approximately 56 to 65 means that cooling is required
  id: totrans-320
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The “no change” range was approximately ±4 around the target temperature. This
    is actually not too bad of a finding since it prevents the system from unnecessary
    operation while still achieving the majority “opinion” for the desired room temperature.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
- en: 'Demo 5-4: Modifications to the HVAC Program'
  id: totrans-322
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'For this demo, I made a simple modification to the control program: one of
    three LEDs lights up, based on whether heating, cooling, or no change is determined
    from user input. The following code is appended to the prior listing, except the
    additional import and configuration statements should be placed at the start of
    the program, just as I did with previous programs that used LEDs. I provide comments
    that indicate the GPIO pins used in this modification. They are the same ones
    that were used in the prs.py game, so use the LED interconnection diagram shown
    in that project.'
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  id: totrans-324
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: hvac_led.py—the complete program with the LED modifications—is available on
    this book’s website. Figure [5-19](#Fig19) shows the Raspberry Pi physical setup
    with the three control LEDs connected to a solderless breadboard.
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_5_Fig19_HTML.jpg](A436848_1_En_5_Fig19_HTML.jpg)'
