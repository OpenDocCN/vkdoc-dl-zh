- en: Software Installation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: First, you need Python 2.7, which should already be installed as part of the
    Jessie Linux distribution. You also need the numpy, scipy, matplotlib, and skfuzzy
    packages, which implement FL with Python and the plotting functions that create
    the visualizations.
  prefs: []
  type: TYPE_NORMAL
- en: 'Enter the following commands at the command line to install the numpy, scipy,
    and matplotlib software:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: numpy may already be installed, so all that you see when this command is run
    is that the latest version is installed.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'The skfuzzy software is somewhat more complex to install. You need to clone
    the software from the GitHub website; however, you need the Git application to
    do this. So install Git by entering this command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'Once Git is installed, you then need to clone the software by using this command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'The cloning operation automatically unzips all the skfuzzy software into a
    new subdirectory named scikit-fuzzy, located in the home directory. Enter the
    following commands to set up skfuzzy:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: You will see a lot of dialog scroll by as the skfuzzy installation is in progress.
    After this installation, you should be all set to execute fuzzy Python scripts.
  prefs: []
  type: TYPE_NORMAL
- en: Basic FLS
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Figure [5-1](#Fig1) shows all four of the principal components that make up
    a basic FLS.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_5_Fig1_HTML.jpg](A436848_1_En_5_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-1.
  prefs: []
  type: TYPE_NORMAL
- en: Block diagram for a basic FLS
  prefs: []
  type: TYPE_NORMAL
- en: 'These are the principal FLS components :'
  prefs: []
  type: TYPE_NORMAL
- en: 'Fuzzifier: The process in which a crisp set of input data is collected and
    converted to a fuzzy set using fuzzy linguistic variables, fuzzy linguistic terms,
    and membership functions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Rules: The expert knowledge collected and codified into the inference engine.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Inference engine: Inferences are generated based upon a set of rules applied
    to the input fuzzy set.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Defuzzifier: Crisp outputs are created based on the fuzzy set output from the
    inference engine.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Figure [5-1](#Fig1) may also be expressed as a series of steps or a logical
    algorithm that implements the FL process. I use this generic algorithm, shown
    in Table [5-2](#Tab2), to implement all of the chapter’s FLS demonstration projects.
  prefs: []
  type: TYPE_NORMAL
- en: Table 5-2.
  prefs: []
  type: TYPE_NORMAL
- en: FL Algorithm
  prefs: []
  type: TYPE_NORMAL
- en: '| Step # | Name | Description |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| 1 | Initialization | Define linguistic variables and terms |'
  prefs: []
  type: TYPE_TB
- en: '| 2 | Initialization | Construct membership functions |'
  prefs: []
  type: TYPE_TB
- en: '| 3 | Initialization | Build rule set |'
  prefs: []
  type: TYPE_TB
- en: '| 4 | Fuzzification | Convert crisp input data into fuzzy set using membership
    functions |'
  prefs: []
  type: TYPE_TB
- en: '| 5 | Inference | Evaluate fuzzy set according to rule set |'
  prefs: []
  type: TYPE_TB
- en: '| 6 | Aggregation | Combine results from each rule evaluation |'
  prefs: []
  type: TYPE_TB
- en: '| 7 | Defuzzification | Convert fuzzy set to crisp output values |'
  prefs: []
  type: TYPE_TB
- en: 'Initialization: Define Linguistic Variables and Terms'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The linguistic variables that I just introduced are values that represent the
    inputs and outputs of the system. They are not typically numerical values but
    instead are usually words, or even sentences, from a natural language, such as
    English. Linguistic variables are also decomposed into a set of linguistic terms.
  prefs: []
  type: TYPE_NORMAL
- en: 'Demo 5-1: Using FL to Calculate a Tip'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In a tipping scenario , there are a number of input variables that go into
    the decision about how much to tip the server after completing a restaurant meal.
    Let us consider two primary inputs: food quality and service quality.'
  prefs: []
  type: TYPE_NORMAL
- en: I do realize that many people, when determining a tip, differentiate the quality
    of the food from the quality of the service because the server has no control
    over food quality or preparation other than ensuring that the meal is still hot
    when served at the table. For this demonstration, however, I consider food quality
    as a valid input.
  prefs: []
  type: TYPE_NORMAL
- en: The only output variable is the tip amount, which is a percentage of the total
    bill.
  prefs: []
  type: TYPE_NORMAL
- en: Now, it is important to develop some linguistic terms that are appropriate to
    this situation.
  prefs: []
  type: TYPE_NORMAL
- en: 'Perhaps the easiest and most obvious way to classify food quality is to use
    the following terms:'
  prefs: []
  type: TYPE_NORMAL
- en: great
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: decent
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: bad
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Likewise, classifying service quality uses these terms:'
  prefs: []
  type: TYPE_NORMAL
- en: amazing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: acceptable
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: poor
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The tip amount is also subject to fuzzy linguistic terms. These are the terms
    used for the tip amount:'
  prefs: []
  type: TYPE_NORMAL
- en: low
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: medium
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: high
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: From now on, I italicize linguistic variables to help differentiate them from
    ordinary words or terms.
  prefs: []
  type: TYPE_NORMAL
- en: There must be a numerical scale for users to rate both the service quality and
    the food quality. A scale of 0 to 10 is fine for most people, where 0 is the worst
    and 10 is the best. The tip output must also have a numerical scale. This is set
    at 0 to 26 to represent a suitable scale for normal tipping percentages. All of
    these numerical scales represent the crisp or non-fuzzy inputs or outputs to the
    membership functions, which are discussed in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: 'Initialization: Construct Membership Functions'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Membership functions are used in both FL fuzzification and defuzzification steps.
    These functions map non-fuzzy input values to fuzzy linguistic variables for fuzzification,
    and map fuzzy variables to non-fuzzy output values for defuzzification. Essentially,
    a membership function quantifies linguistic terms. Figure [5-2](#Fig2) shows the
    food quality membership function.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_5_Fig2_HTML.jpg](A436848_1_En_5_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-2.
  prefs: []
  type: TYPE_NORMAL
- en: Food quality membership function
  prefs: []
  type: TYPE_NORMAL
- en: Figure [5-3](#Fig3) shows the service quality membership function.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_5_Fig3_HTML.jpg](A436848_1_En_5_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-3.
  prefs: []
  type: TYPE_NORMAL
- en: Service quality membership function
  prefs: []
  type: TYPE_NORMAL
- en: Finally, Figure [5-4](#Fig4) shows the tip amount membership function.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_5_Fig4_HTML.jpg](A436848_1_En_5_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-4.
  prefs: []
  type: TYPE_NORMAL
- en: Tip amount membership function
  prefs: []
  type: TYPE_NORMAL
- en: I chose to use triangular shapes for the decent, acceptable, and medium linguistic
    terms. I use open-ended trapezoid shapes for the extremis bad, great, poor, amazing,
    low, and high terms. There are shapes other than triangular that are commonly
    used for membership functions, including
  prefs: []
  type: TYPE_NORMAL
- en: Gaussian
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: trapezoidal
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: singleton
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: piecewise linear
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: sinusoidal
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: exponential
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The selection of an appropriate membership function shape is often based on
    the user’s experience. I sometimes use the following analogy to help people understand
    membership functions. Suppose that you interviewed a large group of people on
    their preferences in determining an appropriate amount to tip, given the quality
    of the food and the service. As most of my readers understand, the resulting distribution
    of tip values is Gaussian, or normal in shape, which is the likely outcome of
    randomly interviewing large numbers of people. Any point on a Gaussian curve is
    the group probability for the corresponding measure of food and service quality.
    It is perfectly possible to use a Gaussian distribution shape as the membership
    function, as shown in Figure [5-5](#Fig5).
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_5_Fig5_HTML.jpg](A436848_1_En_5_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-5.
  prefs: []
  type: TYPE_NORMAL
- en: Gaussian membership function
  prefs: []
  type: TYPE_NORMAL
- en: 'The only problem with using this shape is that you are now dealing with the
    underlying mathematics behind the Gaussian curve, which rapidly becomes messy
    and cumbersome when trying to use it in an FL application. A normalized Gaussian
    equation is of the following form:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ f(x)= a{e}^{-{\left( x- b\right)}^2/2{c}^2} $$](A436848_1_En_5_Chapter_IEq1.gif)
    where a, b, and c are generalized parameters'
  prefs: []
  type: TYPE_NORMAL
- en: The Gaussian curve is mostly likely a better model of human behavior and choice
    for this example, but using it is not worth the effort, as the AI concepts can
    be well understood using the much simpler triangular shape for the membership
    curves.
  prefs: []
  type: TYPE_NORMAL
- en: Membership Function Visualization
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The main Python program also contains the code shown in Figures [5-2](#Fig2),
    [5-3](#Fig3), and [5-4](#Fig4), which should help greatly in understanding the
    membership functions. The following code segment generates these figures when
    the overall program is executed:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: This code segment listing needs additional initialization before it can be run.
    That additional code is shown in the next code segment listing.
  prefs: []
  type: TYPE_NORMAL
- en: 'Initialization: Build Rule Set'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'An FLS also requires an expert system to generate the appropriate control actions
    based upon the fuzzified input variables. This expert system is of the form if
    <condition> then <conclusion>, which was discussed in Chapter [2](A436848_1_En_2_Chapter.html).
    The following are the rules implemented for this FLS demonstration:'
  prefs: []
  type: TYPE_NORMAL
- en: if the food is bad or the service is poor, then the tip will be low
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: if the service is acceptable, then the tip will be medium
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: if the food is great or the service is amazing, then the tip will be high
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These three rules apply to both the input variables and the output variable.
    I discuss how the rules are applied after the fuzzification section discussion,
    which is next. Fuzzification is step 4 in the FLS algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: 'Fuzzification : Convert crisp input data a into fuzzy set using membership
    functions.'
  prefs: []
  type: TYPE_NORMAL
- en: The membership function shapes and the rules for generating an appropriate tip
    percentage are set. The next thing is to show you how to fuzzify the crisp food
    and service ratings. The procedure is exactly the same for each of these crisp
    variables, because I chose the same membership function shapes for each one. That
    choice can vary and it is often common to have distinct and separate member functions
    in an FLS for different crisp variables.
  prefs: []
  type: TYPE_NORMAL
- en: 'The word fuzzification refers to the action of converting a crisp set of input
    data to a fuzzy set using fuzzy linguistic variables and terms along with membership
    functions. The actual fuzzification takes place in a set of functions that depend
    upon the following code segment, which creates the input and output variable ranges
    and the membership functions:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: 'To test the algorithm, let’s assume that the food quality was valued at 6.5
    and the service at 9.8\. The following code segment calculates the six degrees
    of membership for each input variable and membership function:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: The `fuzz.interp_membership(a, b, c)` function is part of the skfuzzy library
    that you installed earlier. This is an interpolation function that uses the membership
    function range (`a`) and linear shape (`b`) along with the crisp input value (`c`)
    to calculate the degree of membership for that particular group.
  prefs: []
  type: TYPE_NORMAL
- en: It is time to apply the rules once the degree of membership values has been
    determined. This is step 5 of the algorithm or inference.
  prefs: []
  type: TYPE_NORMAL
- en: 'Inference: Evaluate Fuzzy Set According to Rule Set'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Applying the if … then inferential rules is rather easy because all you must
    do is focus on how the linguistic terms are related. For instance, this is rule
    1:'
  prefs: []
  type: TYPE_NORMAL
- en: if the food is bad or the service is poor, then the tip will be low
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The conjunction between the bad and poor linguistic terms is the `or` operator.
    In fuzzy logic, using an `or` operator is equivalent to selecting the maximum
    of the two membership values representing the respective linguistic terms. If
    you refer back to Figures [5-2](#Fig2) and [5-3](#Fig3), you quickly see that
    there are no intersections with either the bad and poor membership functions for
    the assumed crisp input variable values, so the result of applying this rule must
    be 0\. Connecting the combined bad and poor linguistic terms to the low tip membership
    function is trivial because the value is still 0 more than the universe of applicable
    values.
  prefs: []
  type: TYPE_NORMAL
- en: 'Applying rule 2 is a bit different. This is rule 2:'
  prefs: []
  type: TYPE_NORMAL
- en: If the service is acceptable, then the tip will be medium.
  prefs: []
  type: TYPE_NORMAL
- en: In this case, only the service membership function is considered for input.
    Referring back to Figure [5-3](#Fig3), you see that applying a crisp input variable
    value of 9.8 to the acceptable membership group results in a degree of membership
    of approximately 0.02\. The `and` operator is then applied to the acceptable service
    and medium tip membership functions, which results in the minimum operation being
    applied to both membership functions. This minimum operation effectively “flattops”
    the membership functions, resulting in a new shape, as shown in Figure [5-6](#Fig6).
    Note also that the input range has been expanded to accommodate the tip value
    range, which is 2.5 times the input service range. Notice also that the slopes
    of the lines at the ends of the membership function are lessened due to the expanded
    x-axis scale.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_5_Fig6_HTML.jpg](A436848_1_En_5_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-6.
  prefs: []
  type: TYPE_NORMAL
- en: Service and tip membership functions after rule 2 is applied
  prefs: []
  type: TYPE_NORMAL
- en: 'Rule 3 is the last to be applied:'
  prefs: []
  type: TYPE_NORMAL
- en: If the food is great or the service is amazing, then the tip will be high.
  prefs: []
  type: TYPE_NORMAL
- en: The `or` operation is applied for rule 3, just as it was for rule 1\. But in
    this case, there are definite intersections with the great and amazing membership
    functions. Figure [5-7](#Fig7) shows both the food and the service membership
    functions after being flattop but before being combined.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_5_Fig7_HTML.jpg](A436848_1_En_5_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-7.
  prefs: []
  type: TYPE_NORMAL
- en: Flattop food and service membership functions
  prefs: []
  type: TYPE_NORMAL
- en: Figure [5-8](#Fig8) shows the great, amazing, and high membership functions
    combined. It should not be a big surprise that the shape is roughly the same as
    the unmodified membership functions because the `or` operation commands the maximum
    value and the two unmodified membership shapes are exactly the same. The shape
    also remains unchanged after the combined membership function is “`and`ed” with
    the high tip membership function, although the range of x-axis values changes
    to 0 to 25 to accommodate the tip range, as done with the previous rule, and the
    flattop region expands a bit due to the x-axis expansion.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_5_Fig8_HTML.jpg](A436848_1_En_5_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-8.
  prefs: []
  type: TYPE_NORMAL
- en: Combined great, amazing, and high membership functions
  prefs: []
  type: TYPE_NORMAL
- en: 'The following code segment applies the rules and combines the membership functions:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: At this point, all the rules have been applied to the output membership functions.
    It now remains to combine them all. In FL terminology, this is known as aggregation,
    which is step 6 in the FLS algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: 'Aggregation: Combine Results from Each Rule Evaluation'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Aggregation is normally done using the maximum operator. The following statement
    does the aggregation:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Figure [5-9](#Fig9) shows the final combined membership functions after the
    aggregation is complete.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_5_Fig9_HTML.jpg](A436848_1_En_5_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-9.
  prefs: []
  type: TYPE_NORMAL
- en: Membership functions after aggregation
  prefs: []
  type: TYPE_NORMAL
- en: 'There is only one more step in the FLS algorithm: defuzzification.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Defuzzification: Convert Fuzzy Set to Crisp Output Values'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Defuzzification is the process where we return from the fuzzy world to the real
    world and create an output that can be acted upon, which in this case is a tip
    percentage. There are a variety of mathematical techniques available for defuzzification,
    including
  prefs: []
  type: TYPE_NORMAL
- en: centroid
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: bisector
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: mean
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: smallest of maximum
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: largest of maximum
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: weighted average
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Figure [5-10](#Fig10) demonstrates how values for each method are chosen using
    an arbitrary aggregation membership function.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_5_Fig10_HTML.jpg](A436848_1_En_5_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-10.
  prefs: []
  type: TYPE_NORMAL
- en: Various defuzzification methods
  prefs: []
  type: TYPE_NORMAL
- en: Centroid defuzzification is the most commonly used method because it is very
    accurate. It calculates the center of the area under the curve of membership function.
    This can require significant computational processing for complex membership functions.
    The centroid equation is
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {z}_0={\displaystyle \int {\mu}_i(x) xdx/}{\displaystyle \int {\mu}_i(x)
    dx} $$](A436848_1_En_5_Chapter_Equa.gif)'
  prefs: []
  type: TYPE_IMG
- en: where z [0] is the defuzzified output, μ [i] represents a membership function,
    and x is the output variable.
  prefs: []
  type: TYPE_NORMAL
- en: 'Bisector defuzzification uses vertical lines that divide the area under the
    membership curve into two equal areas:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\displaystyle \underset{a}{\overset{z}{\int }}{\mu}_A(x) dx}={\displaystyle
    \underset{z}{\overset{\beta}{\int }}{\mu}_A(x) dx} $$](A436848_1_En_5_Chapter_Equb.gif)'
  prefs: []
  type: TYPE_IMG
- en: The mean of maximum (MOM) defuzzification method uses the average value of the
    aggregated membership function outputs.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {z}_0={\displaystyle \sum_{i=1}^n\frac{\omega_i}{n}} $$](A436848_1_En_5_Chapter_Equc.gif)'
  prefs: []
  type: TYPE_IMG
- en: The smallest of maximum defuzzification method uses the minimum value of the
    aggregated membership function outputs.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {z}_0\kern0.5em member\kern0.5em of\kern0.5em \left\{ x\Big|\mu (x)= min\kern0.5em
    \mu \left(\omega \right)\right\} $$](A436848_1_En_5_Chapter_Equd.gif)'
  prefs: []
  type: TYPE_IMG
- en: The largest of maximum defuzzification method uses the maximum value of the
    aggregated membership function outputs.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {z}_0\kern0.5em member\kern0.5em of\kern0.5em \left\{ x\Big|\mu (x)= max\kern0.5em
    \mu \left(\omega \right)\right\} $$](A436848_1_En_5_Chapter_Eque.gif)'
  prefs: []
  type: TYPE_IMG
- en: 'The weighted average defuzzification method calculates the weighted sum of
    each fuzzy set. The crisp value is set according to the weighted values and the
    degree of membership for fuzzy output, as determined by the following formula:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {z}_0=\frac{\varSigma \mu {(x)}_i{W}_i}{\varSigma \mu {(x)}_i} $$](A436848_1_En_5_Chapter_Equf.gif)'
  prefs: []
  type: TYPE_IMG
- en: μ [i] is the degree of membership in output singleton i and W [i] is the fuzzy
    output weight value for the output singleton i.
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, I discuss how the centroid method is implemented for this project. The
