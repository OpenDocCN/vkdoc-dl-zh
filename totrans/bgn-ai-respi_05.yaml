- en: Software Installation
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: First, you need Python 2.7, which should already be installed as part of the
    Jessie Linux distribution. You also need the numpy, scipy, matplotlib, and skfuzzy
    packages, which implement FL with Python and the plotting functions that create
    the visualizations.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: 'Enter the following commands at the command line to install the numpy, scipy,
    and matplotlib software:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-17
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Note
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: numpy may already be installed, so all that you see when this command is run
    is that the latest version is installed.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'The skfuzzy software is somewhat more complex to install. You need to clone
    the software from the GitHub website; however, you need the Git application to
    do this. So install Git by entering this command:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Once Git is installed, you then need to clone the software by using this command:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'The cloning operation automatically unzips all the skfuzzy software into a
    new subdirectory named scikit-fuzzy, located in the home directory. Enter the
    following commands to set up skfuzzy:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: You will see a lot of dialog scroll by as the skfuzzy installation is in progress.
    After this installation, you should be all set to execute fuzzy Python scripts.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: Basic FLS
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Figure [5-1](#Fig1) shows all four of the principal components that make up
    a basic FLS.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_5_Fig1_HTML.jpg](A436848_1_En_5_Fig1_HTML.jpg)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
- en: Figure 5-1.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: Block diagram for a basic FLS
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: 'These are the principal FLS components :'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: 'Fuzzifier: The process in which a crisp set of input data is collected and
    converted to a fuzzy set using fuzzy linguistic variables, fuzzy linguistic terms,
    and membership functions.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Rules: The expert knowledge collected and codified into the inference engine.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 规则：收集并编码到推理引擎中的专家知识。
- en: 'Inference engine: Inferences are generated based upon a set of rules applied
    to the input fuzzy set.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 推理引擎：根据应用于输入模糊集的一组规则生成推理。
- en: 'Defuzzifier: Crisp outputs are created based on the fuzzy set output from the
    inference engine.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 反模糊化器：基于推理引擎的模糊集输出创建清晰输出。
- en: Figure [5-1](#Fig1) may also be expressed as a series of steps or a logical
    algorithm that implements the FL process. I use this generic algorithm, shown
    in Table [5-2](#Tab2), to implement all of the chapter’s FLS demonstration projects.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 图[5-1](#Fig1)也可以表示为一系列步骤或实现FL过程的逻辑算法。我使用这个通用算法，如表[5-2](#Tab2)所示，来实现本章所有FLS演示项目。
- en: Table 5-2.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 表5-2。
- en: FL Algorithm
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: FL算法
- en: '| Step # | Name | Description |'
  id: totrans-41
  prefs: []
  type: TYPE_TB
  zh: '| 步骤编号 | 名称 | 描述 |'
- en: '| --- | --- | --- |'
  id: totrans-42
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| 1 | Initialization | Define linguistic variables and terms |'
  id: totrans-43
  prefs: []
  type: TYPE_TB
  zh: '| 1 | 初始化 | 定义语言变量和术语 |'
- en: '| 2 | Initialization | Construct membership functions |'
  id: totrans-44
  prefs: []
  type: TYPE_TB
  zh: '| 2 | 初始化 | 构建隶属函数 |'
- en: '| 3 | Initialization | Build rule set |'
  id: totrans-45
  prefs: []
  type: TYPE_TB
  zh: '| 3 | 初始化 | 构建规则集 |'
- en: '| 4 | Fuzzification | Convert crisp input data into fuzzy set using membership
    functions |'
  id: totrans-46
  prefs: []
  type: TYPE_TB
  zh: '| 4 | 模糊化 | 使用隶属函数将清晰输入数据转换为模糊集 |'
- en: '| 5 | Inference | Evaluate fuzzy set according to rule set |'
  id: totrans-47
  prefs: []
  type: TYPE_TB
  zh: '| 5 | 推理 | 根据规则集评估模糊集 |'
- en: '| 6 | Aggregation | Combine results from each rule evaluation |'
  id: totrans-48
  prefs: []
  type: TYPE_TB
  zh: '| 6 | 聚合 | 结合每个规则评估的结果 |'
- en: '| 7 | Defuzzification | Convert fuzzy set to crisp output values |'
  id: totrans-49
  prefs: []
  type: TYPE_TB
  zh: '| 7 | 反模糊化 | 将模糊集转换为清晰输出值 |'
- en: 'Initialization: Define Linguistic Variables and Terms'
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 初始化：定义语言变量和术语
- en: The linguistic variables that I just introduced are values that represent the
    inputs and outputs of the system. They are not typically numerical values but
    instead are usually words, or even sentences, from a natural language, such as
    English. Linguistic variables are also decomposed into a set of linguistic terms.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 我刚才介绍的语言变量是代表系统输入和输出的值。它们通常不是数值，而是通常是来自自然语言（如英语）的单词，甚至是句子。语言变量也被分解成一组语言术语。
- en: 'Demo 5-1: Using FL to Calculate a Tip'
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 演示5-1：使用FL计算小费
- en: 'In a tipping scenario , there are a number of input variables that go into
    the decision about how much to tip the server after completing a restaurant meal.
    Let us consider two primary inputs: food quality and service quality.'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 在小费场景中，有多个输入变量会影响决定在完成餐厅餐后给服务员多少小费。让我们考虑两个主要输入：食品质量和服务质量。
- en: I do realize that many people, when determining a tip, differentiate the quality
    of the food from the quality of the service because the server has no control
    over food quality or preparation other than ensuring that the meal is still hot
    when served at the table. For this demonstration, however, I consider food quality
    as a valid input.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 我确实意识到，当确定小费时，许多人会将食品质量与服务质量区分开来，因为服务员除了确保餐点在桌上上桌时仍然热之外，对食品质量或准备没有控制权。然而，在这个演示中，我考虑食品质量是一个有效的输入。
- en: The only output variable is the tip amount, which is a percentage of the total
    bill.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 唯一的输出变量是小费金额，它是总账单的百分比。
- en: Now, it is important to develop some linguistic terms that are appropriate to
    this situation.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，重要的是要开发一些适合这种情况的语言术语。
- en: 'Perhaps the easiest and most obvious way to classify food quality is to use
    the following terms:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 可能最容易且最明显的方法来分类食品质量是使用以下术语：
- en: great
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 极好
- en: decent
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 还可以
- en: bad
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 差
- en: 'Likewise, classifying service quality uses these terms:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，使用这些术语对服务质量进行分类：
- en: amazing
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 惊人
- en: acceptable
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可接受
- en: poor
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 糟糕
- en: 'The tip amount is also subject to fuzzy linguistic terms. These are the terms
    used for the tip amount:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 小费金额也受模糊语言术语的影响。这些是小费金额使用的术语：
- en: low
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 低
- en: medium
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 中等
- en: high
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 高
- en: Note
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 备注
- en: From now on, I italicize linguistic variables to help differentiate them from
    ordinary words or terms.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 从现在开始，我将使用斜体来表示语言变量，以帮助区分它们与普通单词或术语。
- en: There must be a numerical scale for users to rate both the service quality and
    the food quality. A scale of 0 to 10 is fine for most people, where 0 is the worst
    and 10 is the best. The tip output must also have a numerical scale. This is set
    at 0 to 26 to represent a suitable scale for normal tipping percentages. All of
    these numerical scales represent the crisp or non-fuzzy inputs or outputs to the
    membership functions, which are discussed in the next section.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: 'Initialization: Construct Membership Functions'
  id: totrans-72
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Membership functions are used in both FL fuzzification and defuzzification steps.
    These functions map non-fuzzy input values to fuzzy linguistic variables for fuzzification,
    and map fuzzy variables to non-fuzzy output values for defuzzification. Essentially,
    a membership function quantifies linguistic terms. Figure [5-2](#Fig2) shows the
    food quality membership function.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_5_Fig2_HTML.jpg](A436848_1_En_5_Fig2_HTML.jpg)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
- en: Figure 5-2.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: Food quality membership function
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: Figure [5-3](#Fig3) shows the service quality membership function.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_5_Fig3_HTML.jpg](A436848_1_En_5_Fig3_HTML.jpg)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
- en: Figure 5-3.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: Service quality membership function
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: Finally, Figure [5-4](#Fig4) shows the tip amount membership function.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_5_Fig4_HTML.jpg](A436848_1_En_5_Fig4_HTML.jpg)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
- en: Figure 5-4.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: Tip amount membership function
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: I chose to use triangular shapes for the decent, acceptable, and medium linguistic
    terms. I use open-ended trapezoid shapes for the extremis bad, great, poor, amazing,
    low, and high terms. There are shapes other than triangular that are commonly
    used for membership functions, including
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
- en: Gaussian
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: trapezoidal
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: singleton
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: piecewise linear
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: sinusoidal
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: exponential
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The selection of an appropriate membership function shape is often based on
    the user’s experience. I sometimes use the following analogy to help people understand
    membership functions. Suppose that you interviewed a large group of people on
    their preferences in determining an appropriate amount to tip, given the quality
    of the food and the service. As most of my readers understand, the resulting distribution
    of tip values is Gaussian, or normal in shape, which is the likely outcome of
    randomly interviewing large numbers of people. Any point on a Gaussian curve is
    the group probability for the corresponding measure of food and service quality.
    It is perfectly possible to use a Gaussian distribution shape as the membership
    function, as shown in Figure [5-5](#Fig5).
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_5_Fig5_HTML.jpg](A436848_1_En_5_Fig5_HTML.jpg)'
  id: totrans-93
  prefs: []
  type: TYPE_IMG
- en: Figure 5-5.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: Gaussian membership function
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: 'The only problem with using this shape is that you are now dealing with the
    underlying mathematics behind the Gaussian curve, which rapidly becomes messy
    and cumbersome when trying to use it in an FL application. A normalized Gaussian
    equation is of the following form:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ f(x)= a{e}^{-{\left( x- b\right)}^2/2{c}^2} $$](A436848_1_En_5_Chapter_IEq1.gif)
    where a, b, and c are generalized parameters'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: The Gaussian curve is mostly likely a better model of human behavior and choice
    for this example, but using it is not worth the effort, as the AI concepts can
    be well understood using the much simpler triangular shape for the membership
    curves.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 高斯曲线可能是这个例子中人类行为和选择的更好模型，但使用它并不值得付出努力，因为可以使用远为简单的三角形形状来很好地理解隶属度曲线。
- en: Membership Function Visualization
  id: totrans-99
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 隶属函数可视化
- en: 'The main Python program also contains the code shown in Figures [5-2](#Fig2),
    [5-3](#Fig3), and [5-4](#Fig4), which should help greatly in understanding the
    membership functions. The following code segment generates these figures when
    the overall program is executed:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 主要的Python程序还包含了图[5-2](#Fig2)、[5-3](#Fig3)和[5-4](#Fig4)中显示的代码，这应该会极大地帮助理解隶属函数。以下代码段在整体程序执行时生成这些图形：
- en: '[PRE5]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Note
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: This code segment listing needs additional initialization before it can be run.
    That additional code is shown in the next code segment listing.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 在此代码段运行之前需要额外的初始化。下一代码段中显示了这些额外的代码。
- en: 'Initialization: Build Rule Set'
  id: totrans-104
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 初始化：构建规则集
- en: 'An FLS also requires an expert system to generate the appropriate control actions
    based upon the fuzzified input variables. This expert system is of the form if
    <condition> then <conclusion>, which was discussed in Chapter [2](A436848_1_En_2_Chapter.html).
    The following are the rules implemented for this FLS demonstration:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: FLS还需要一个专家系统来根据模糊化的输入变量生成适当的控制动作。这个专家系统是“如果<条件>那么<结论>”的形式，这在第[2](A436848_1_En_2_Chapter.html)章中讨论过。以下是为这个FLS演示实现的规则：
- en: if the food is bad or the service is poor, then the tip will be low
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果食物很差或服务很差，那么小费将是低的
- en: if the service is acceptable, then the tip will be medium
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果服务可以接受，那么小费将是适中的
- en: if the food is great or the service is amazing, then the tip will be high
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果食物很棒或服务惊人，那么小费将是高的
- en: These three rules apply to both the input variables and the output variable.
    I discuss how the rules are applied after the fuzzification section discussion,
    which is next. Fuzzification is step 4 in the FLS algorithm.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 这三条规则适用于输入变量和输出变量。我将在模糊化部分讨论之后讨论如何应用这些规则，这部分内容将在下一部分介绍。模糊化是FLS算法的第4步。
- en: 'Fuzzification : Convert crisp input data a into fuzzy set using membership
    functions.'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 模糊化：使用隶属函数将清晰输入数据a转换为模糊集。
- en: The membership function shapes and the rules for generating an appropriate tip
    percentage are set. The next thing is to show you how to fuzzify the crisp food
    and service ratings. The procedure is exactly the same for each of these crisp
    variables, because I chose the same membership function shapes for each one. That
    choice can vary and it is often common to have distinct and separate member functions
    in an FLS for different crisp variables.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 隶属函数形状和生成适当小费百分比的规则已经设置。接下来要展示的是如何对清晰的食物和服务评分进行模糊化。这个程序对每个这些清晰变量都是相同的，因为我为每个选择了相同的隶属函数形状。这个选择可以变化，在FLS中对于不同的清晰变量通常会有不同的、独立的隶属函数。
- en: 'The word fuzzification refers to the action of converting a crisp set of input
    data to a fuzzy set using fuzzy linguistic variables and terms along with membership
    functions. The actual fuzzification takes place in a set of functions that depend
    upon the following code segment, which creates the input and output variable ranges
    and the membership functions:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: “模糊化”一词指的是使用模糊语言变量和术语以及隶属函数将一组清晰输入数据转换为模糊集的行为。实际的模糊化发生在依赖于以下代码段的函数集中，该代码段创建输入和输出变量范围以及隶属函数：
- en: '[PRE6]'
  id: totrans-113
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'To test the algorithm, let’s assume that the food quality was valued at 6.5
    and the service at 9.8\. The following code segment calculates the six degrees
    of membership for each input variable and membership function:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 为了测试算法，让我们假设食物质量被评为6.5，服务被评为9.8。以下代码段计算每个输入变量和隶属函数的六个隶属度。
- en: '[PRE7]'
  id: totrans-115
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The `fuzz.interp_membership(a, b, c)` function is part of the skfuzzy library
    that you installed earlier. This is an interpolation function that uses the membership
    function range (`a`) and linear shape (`b`) along with the crisp input value (`c`)
    to calculate the degree of membership for that particular group.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: '`fuzz.interp_membership(a, b, c)`函数是您之前安装的skfuzzy库的一部分。这是一个插值函数，它使用隶属函数范围（`a`）、线性形状（`b`）以及清晰输入值（`c`）来计算该特定组的隶属度。'
- en: It is time to apply the rules once the degree of membership values has been
    determined. This is step 5 of the algorithm or inference.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
- en: 'Inference: Evaluate Fuzzy Set According to Rule Set'
  id: totrans-118
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Applying the if … then inferential rules is rather easy because all you must
    do is focus on how the linguistic terms are related. For instance, this is rule
    1:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
- en: if the food is bad or the service is poor, then the tip will be low
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The conjunction between the bad and poor linguistic terms is the `or` operator.
    In fuzzy logic, using an `or` operator is equivalent to selecting the maximum
    of the two membership values representing the respective linguistic terms. If
    you refer back to Figures [5-2](#Fig2) and [5-3](#Fig3), you quickly see that
    there are no intersections with either the bad and poor membership functions for
    the assumed crisp input variable values, so the result of applying this rule must
    be 0\. Connecting the combined bad and poor linguistic terms to the low tip membership
    function is trivial because the value is still 0 more than the universe of applicable
    values.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
- en: 'Applying rule 2 is a bit different. This is rule 2:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
- en: If the service is acceptable, then the tip will be medium.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
- en: In this case, only the service membership function is considered for input.
    Referring back to Figure [5-3](#Fig3), you see that applying a crisp input variable
    value of 9.8 to the acceptable membership group results in a degree of membership
    of approximately 0.02\. The `and` operator is then applied to the acceptable service
    and medium tip membership functions, which results in the minimum operation being
    applied to both membership functions. This minimum operation effectively “flattops”
    the membership functions, resulting in a new shape, as shown in Figure [5-6](#Fig6).
    Note also that the input range has been expanded to accommodate the tip value
    range, which is 2.5 times the input service range. Notice also that the slopes
    of the lines at the ends of the membership function are lessened due to the expanded
    x-axis scale.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_5_Fig6_HTML.jpg](A436848_1_En_5_Fig6_HTML.jpg)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
- en: Figure 5-6.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
- en: Service and tip membership functions after rule 2 is applied
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
- en: 'Rule 3 is the last to be applied:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
- en: If the food is great or the service is amazing, then the tip will be high.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
- en: The `or` operation is applied for rule 3, just as it was for rule 1\. But in
    this case, there are definite intersections with the great and amazing membership
    functions. Figure [5-7](#Fig7) shows both the food and the service membership
    functions after being flattop but before being combined.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_5_Fig7_HTML.jpg](A436848_1_En_5_Fig7_HTML.jpg)'
  id: totrans-131
  prefs: []
  type: TYPE_IMG
- en: Figure 5-7.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
- en: Flattop food and service membership functions
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
- en: Figure [5-8](#Fig8) shows the great, amazing, and high membership functions
    combined. It should not be a big surprise that the shape is roughly the same as
    the unmodified membership functions because the `or` operation commands the maximum
    value and the two unmodified membership shapes are exactly the same. The shape
    also remains unchanged after the combined membership function is “`and`ed” with
    the high tip membership function, although the range of x-axis values changes
    to 0 to 25 to accommodate the tip range, as done with the previous rule, and the
    flattop region expands a bit due to the x-axis expansion.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_5_Fig8_HTML.jpg](A436848_1_En_5_Fig8_HTML.jpg)'
  id: totrans-135
  prefs: []
  type: TYPE_IMG
- en: Figure 5-8.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
- en: Combined great, amazing, and high membership functions
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
- en: 'The following code segment applies the rules and combines the membership functions:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  id: totrans-139
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: At this point, all the rules have been applied to the output membership functions.
    It now remains to combine them all. In FL terminology, this is known as aggregation,
    which is step 6 in the FLS algorithm.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
- en: 'Aggregation: Combine Results from Each Rule Evaluation'
  id: totrans-141
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Aggregation is normally done using the maximum operator. The following statement
    does the aggregation:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  id: totrans-143
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Figure [5-9](#Fig9) shows the final combined membership functions after the
    aggregation is complete.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_5_Fig9_HTML.jpg](A436848_1_En_5_Fig9_HTML.jpg)'
  id: totrans-145
  prefs: []
  type: TYPE_IMG
- en: Figure 5-9.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
- en: Membership functions after aggregation
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
- en: 'There is only one more step in the FLS algorithm: defuzzification.'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
- en: 'Defuzzification: Convert Fuzzy Set to Crisp Output Values'
  id: totrans-149
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Defuzzification is the process where we return from the fuzzy world to the real
    world and create an output that can be acted upon, which in this case is a tip
    percentage. There are a variety of mathematical techniques available for defuzzification,
    including
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
- en: centroid
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: bisector
  id: totrans-152
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: mean
  id: totrans-153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: smallest of maximum
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: largest of maximum
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: weighted average
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Figure [5-10](#Fig10) demonstrates how values for each method are chosen using
    an arbitrary aggregation membership function.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_5_Fig10_HTML.jpg](A436848_1_En_5_Fig10_HTML.jpg)'
  id: totrans-158
  prefs: []
  type: TYPE_IMG
- en: Figure 5-10.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
- en: Various defuzzification methods
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
- en: Centroid defuzzification is the most commonly used method because it is very
    accurate. It calculates the center of the area under the curve of membership function.
    This can require significant computational processing for complex membership functions.
    The centroid equation is
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {z}_0={\displaystyle \int {\mu}_i(x) xdx/}{\displaystyle \int {\mu}_i(x)
    dx} $$](A436848_1_En_5_Chapter_Equa.gif)'
  id: totrans-162
  prefs: []
  type: TYPE_IMG
- en: where z [0] is the defuzzified output, μ [i] represents a membership function,
    and x is the output variable.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
- en: 'Bisector defuzzification uses vertical lines that divide the area under the
    membership curve into two equal areas:'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\displaystyle \underset{a}{\overset{z}{\int }}{\mu}_A(x) dx}={\displaystyle
    \underset{z}{\overset{\beta}{\int }}{\mu}_A(x) dx} $$](A436848_1_En_5_Chapter_Equb.gif)'
  id: totrans-165
  prefs: []
  type: TYPE_IMG
- en: The mean of maximum (MOM) defuzzification method uses the average value of the
    aggregated membership function outputs.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {z}_0={\displaystyle \sum_{i=1}^n\frac{\omega_i}{n}} $$](A436848_1_En_5_Chapter_Equc.gif)'
  id: totrans-167
  prefs: []
  type: TYPE_IMG
- en: The smallest of maximum defuzzification method uses the minimum value of the
    aggregated membership function outputs.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {z}_0\kern0.5em member\kern0.5em of\kern0.5em \left\{ x\Big|\mu (x)= min\kern0.5em
    \mu \left(\omega \right)\right\} $$](A436848_1_En_5_Chapter_Equd.gif)'
  id: totrans-169
  prefs: []
  type: TYPE_IMG
- en: The largest of maximum defuzzification method uses the maximum value of the
    aggregated membership function outputs.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {z}_0\kern0.5em member\kern0.5em of\kern0.5em \left\{ x\Big|\mu (x)= max\kern0.5em
    \mu \left(\omega \right)\right\} $$](A436848_1_En_5_Chapter_Eque.gif)'
  id: totrans-171
  prefs: []
  type: TYPE_IMG
- en: 'The weighted average defuzzification method calculates the weighted sum of
    each fuzzy set. The crisp value is set according to the weighted values and the
    degree of membership for fuzzy output, as determined by the following formula:'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {z}_0=\frac{\varSigma \mu {(x)}_i{W}_i}{\varSigma \mu {(x)}_i} $$](A436848_1_En_5_Chapter_Equf.gif)'
  id: totrans-173
  prefs: []
  type: TYPE_IMG
- en: μ [i] is the degree of membership in output singleton i and W [i] is the fuzzy
    output weight value for the output singleton i.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, I discuss how the centroid method is implemented for this project. The
    following code snippet calculates the centroid defuzzification value:'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  id: totrans-176
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'This section completes the tipping fuzzy logic project. All that’s left to
    do is load and run the following code, which is named tipping.py . Enter the following
    to run the program:'
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  id: totrans-178
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: You need to close each plot after it appears to go on to the next plot.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
- en: tipping.py listing
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  id: totrans-181
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'Figure [5-11](#Fig11) is the first display shown on the monitor. It shows all
    three membership functions : food quality, service quality, and tip amount.'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_5_Fig11_HTML.jpg](A436848_1_En_5_Fig11_HTML.jpg)'
  id: totrans-183
  prefs: []
  type: TYPE_IMG
- en: Figure 5-11.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
- en: Three membership functions
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
- en: 'Figure [5-12](#Fig12) shows the next display: the combined membership functions
    after all the rules are applied, and all the input and output membership are functions
    connected.'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_5_Fig12_HTML.jpg](A436848_1_En_5_Fig12_HTML.jpg)'
  id: totrans-187
  prefs: []
  type: TYPE_IMG
- en: Figure 5-12.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
- en: Membership functions after rules application
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
- en: 'Figure [5-13](#Fig13) shows the next display: the post aggregation results
    for all the processed membership functions. In addition, there is a line indicating
    the crisp output for the tip percentage resulting from the defuzzification process.'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_5_Fig13_HTML.jpg](A436848_1_En_5_Fig13_HTML.jpg)'
  id: totrans-191
  prefs: []
  type: TYPE_IMG
- en: Figure 5-13.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
- en: Post aggregation and defuzzification results
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
- en: Finally, Figure [5-14](#Fig14) shows the text display for the tip percentage,
    which comes from a print statement within the program.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_5_Fig14_HTML.jpg](A436848_1_En_5_Fig14_HTML.jpg)'
  id: totrans-195
  prefs: []
  type: TYPE_IMG
- en: Figure 5-14.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
- en: Print statement for tip percentage
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
- en: 'Demo 5-2: Modifications to the tipping.py Program'
  id: totrans-198
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In this section, I discuss modifications to the Python program to make it easier
    to use and significantly more portable. The main modification is to query the
    user about the food and service quality, rather than have static values, which
    was the case for the initial project. This modification is fairly easy and consists
    of creating two variables to hold the food and service quality levels, and two
    input statements to get the data into the program. The additional or modified
    code is as follows:'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我讨论了对Python程序的修改，使其更容易使用并且更加便携。主要的修改是询问用户关于食物和服务质量，而不是像初始项目那样使用静态值。这个修改相当简单，包括创建两个变量来存储食物和服务质量等级，以及两个输入语句将数据输入到程序中。附加或修改的代码如下：
- en: '[PRE13]'
  id: totrans-200
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: This modified code takes care of prompting the user to enter food and service
    quality ratings.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 这段修改后的代码负责提示用户输入食物和服务质量评分。
- en: The second modification is to make the whole system completely portable, somewhat
    akin to the Nim game configuration discussed in the previous chapter. I would
    use an LCD display to show the user prompts to enter the food and the service
    quality ratings, and then show the resulting tip percentage. How cool would it
    be to have a portable fuzzy logic system that computes tip percentages to show
    off to your relatives and friends? The LCD display interface and software was
    discussed in the previous chapter. The only new required technology is a USB numeric
    key pad for the user to enter the quality ratings. Figure [5-15](#Fig15) shows
    a very inexpensive USB keypad that I experimented with for this modification.
    I am not going into all the details on how to complete this portable system, since
    I am reasonably confident that most of you can adapt the previous LCD discussions
    to this new application. Just remember, there is no longer a need for all the
    visualization code, which considerably reduces the size of the main program.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 第二次修改是将整个系统完全做成便携式，某种程度上类似于前一章中讨论的 Nim 游戏配置。我会使用一个液晶显示屏来显示用户提示输入食物和服务质量评分，然后显示结果的小费百分比。拥有一套便携式模糊逻辑系统来计算小费百分比并向你的亲戚和朋友炫耀，那会多么酷啊？液晶显示屏界面和软件在前一章中已有讨论。唯一需要的新技术是用户输入质量评分的USB数字键盘。图[5-15](#Fig15)展示了我在这次修改中试验的一个非常便宜的USB键盘。我不会详细介绍如何完成这个便携式系统，因为我相当自信你们大多数人可以适应前一章中关于LCD的讨论来应用于这个新应用。只需记住，不再需要所有的可视化代码，这大大减少了主程序的大小。
- en: '![A436848_1_En_5_Fig15_HTML.jpg](A436848_1_En_5_Fig15_HTML.jpg)'
  id: totrans-203
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_5_Fig15_HTML.jpg](A436848_1_En_5_Fig15_HTML.jpg)'
- en: Figure 5-15.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-15。
- en: Inexpensive USB numeric keypad
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 便宜的USB数字键盘
- en: This section completes the first project. It is now time to consider a more
    complex fuzzy logic controller project.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 本节完成了第一个项目。现在是时候考虑一个更复杂的模糊逻辑控制器项目了。
- en: 'Demo 5-3: FLS Heating and Cooling System'
  id: totrans-207
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 演示5-3：FLS供暖和冷却系统
- en: I start this project assuming that you have read and understood the first project
    in the chapter. There should be no need to go into any detailed discussion regarding
    FL concepts. I simply follow the FLS algorithm in developing this project. In
    addition, I do not use any of the visualization code in this project because it
    already served its purpose in the previous project. Interested readers can easily
    reintroduce the code to obtain the plots to see how this system functions.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 我开始这个项目假设你已经阅读并理解了本章的第一个项目。关于FL概念不应该需要任何详细的讨论。我只是在开发这个项目时遵循FLS算法。此外，在这个项目中我没有使用任何可视化代码，因为它们在前一个项目中已经完成了其任务。感兴趣的读者可以很容易地重新引入代码以获得图表，以了解这个系统的功能。
- en: Consider a heating, ventilation, and cooling system (HVAC) that, practically
    speaking, is a heat pump that acts as either an air conditioner or a heater. Figure
    [5-16](#Fig16) shows a block diagram of such a system. This configuration is also
    known in control terminology as a closed-loop system.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑一个供暖、通风和空调系统（HVAC），从实际的角度来看，它是一个既可以作为空调也可以作为加热器的热泵。图[5-16](#Fig16)展示了这样一个系统的框图。这种配置在控制术语中也被称为闭路系统。
- en: '![A436848_1_En_5_Fig16_HTML.jpg](A436848_1_En_5_Fig16_HTML.jpg)'
  id: totrans-210
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_5_Fig16_HTML.jpg](A436848_1_En_5_Fig16_HTML.jpg)'
- en: Figure 5-16.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-16。
- en: HVAC closed-loop system
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: HVAC闭路系统
- en: Let’s define temperature (t) as a crisp input variable to represent the room
    temperature that is being heated or cooled. Generally, people use the terms hot
    and cold as room temperature qualifiers. These terms, as well as related ones,
    can be developed into a set of linguistic terms, such that
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们定义温度（t）为一个清晰输入变量，以表示正在加热或冷却的室温。通常，人们使用热和冷作为室温的限定词。这些术语以及相关的术语可以发展成一套语言术语，使得
- en: '[PRE14]'
  id: totrans-214
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: This expression for T(t) represents a decomposition function for the input variable
    t. Each member of this linguistic decomposition set represents or is associated
    with a numerical temperature range. For instance, cold could be a range of 40°F
    to 60°F, while hot might be a range of 70°F to 90°F. Other linguistic terms could
    easily fill in the intervening ranges if it was decided that 20°F was an appropriate
    interval value.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 这个 T(t) 的表达式代表输入变量 t 的分解函数。这个语言分解集的每个成员代表或与一个数值温度范围相关联。例如，冷可能是一个 40°F 到 60°F
    的范围，而热可能是一个 70°F 到 90°F 的范围。如果决定 20°F 是一个合适的间隔值，其他语言术语可以轻松填补中间的范围。
- en: In addition, there is another input named target temperature , which is set
    by the people who occupy the room. This is analogous to setting a room thermostat.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，还有一个名为目标温度的输入，由占用房间的人设置。这类似于设置房间恒温器。
- en: Figure [5-17](#Fig17) shows the membership functions that were created to map
    the crisp, non-fuzzy, room and target temperature values to the corresponding
    fuzzy linguistic terms. Only one set of membership functions is shown because
    they are common to both the room and target temperature input variables.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [5-17](#Fig17) 显示了创建的隶属函数，用于将清晰的非模糊房间和目标温度值映射到相应的模糊语言术语。只显示了一组隶属函数，因为它们对房间和目标温度输入变量都是通用的。
- en: '![A436848_1_En_5_Fig17_HTML.jpg](A436848_1_En_5_Fig17_HTML.jpg)'
  id: totrans-218
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_5_Fig17_HTML.jpg](A436848_1_En_5_Fig17_HTML.jpg)'
- en: Figure 5-17.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-17。
- en: Room and target temperature membership functions
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 室温和目标温度隶属函数
- en: In this case, any given room temperature can belong to one or two groups, depending
    upon its values. Figure [5-18](#Fig18) shows that a room temperature of 65°F has
    a membership value of 0.5 in the comfortable membership function, as well as 0.5
    in the cold membership function. A room temperature of exactly 70°F has a membership
    value of 1.0 and is only in the comfortable membership function.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，任何给定的室温可以属于一个或两个组，这取决于其值。图 [5-18](#Fig18) 显示，65°F 的室温在舒适隶属函数中具有隶属度值为
    0.5，同时在寒冷隶属函数中也具有隶属度值为 0.5。精确到 70°F 的室温具有隶属度值为 1.0，并且仅属于舒适隶属函数。
- en: '![A436848_1_En_5_Fig18_HTML.jpg](A436848_1_En_5_Fig18_HTML.jpg)'
  id: totrans-222
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_5_Fig18_HTML.jpg](A436848_1_En_5_Fig18_HTML.jpg)'
- en: Figure 5-18.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-18。
- en: HVAC control membership functions
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: HVAC 控制隶属函数
- en: The HVAC controller also needs a set of membership functions to take based on
    command results. Figure [5-18](#Fig18) shows the set of membership functions for
    HVAC control. Note that it has the same shapes and output variable range as the
    input variables.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: HVAC 控制器还需要根据命令结果采取一套隶属函数。图 [5-18](#Fig18) 显示了 HVAC 控制的隶属函数集。请注意，它具有与输入变量相同的形状和输出变量范围。
- en: 'The following are some example rules to determine the control commands based
    on room and target temperatures:'
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些基于房间和目标温度确定控制命令的示例规则：
- en: if (room temperature is cold ) and (target temperature is comfortable), then
    the command is heat
  id: totrans-227
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果（室温是冷的）并且（目标温度是舒适的），则命令是加热
- en: if (room temperature is hot) and (target temperature is comfortable), then the
    command is cool
  id: totrans-228
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果（室温是热的）并且（目标温度是舒适的），则命令是冷却
- en: if (room temperature is comfortable) and (target temperature is comfortable),
    then the command is no change
  id: totrans-229
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果（室温是舒适的）并且（目标温度是舒适的），则命令是不变
- en: The precise command actions to be taken using a preset target temperature and
    measured room temperature have to be determined by a human expert and codified
    in the rules database. Table [5-3](#Tab3) is a matrix detailing the precise control
    commands for all combinations of linguistic variables for both room and target
    temperatures.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 使用预设的目标温度和测量的室温所采取的精确命令动作必须由人类专家确定并在规则数据库中编码。表 [5-3](#Tab3) 是一个矩阵，详细说明了房间和目标温度所有语言变量组合的精确控制命令。
- en: Table 5-3.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 表 5-3。
- en: Matrix of Command Actions for Room and Target Temperature Linguistic Variables
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 房间和目标温度语言变量的命令动作矩阵
- en: '| Room Temperature | Target Temperature |'
  id: totrans-233
  prefs: []
  type: TYPE_TB
  zh: '| 室温 | 目标温度 |'
- en: '| --- | --- |'
  id: totrans-234
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '|   | cold | comfortable | hot |'
  id: totrans-235
  prefs: []
  type: TYPE_TB
  zh: '|   | 冷 | 舒适 | 热 |'
- en: '| cold | no change | heat | heat |'
  id: totrans-236
  prefs: []
  type: TYPE_TB
- en: '| comfortable | cool | no change | heat |'
  id: totrans-237
  prefs: []
  type: TYPE_TB
- en: '| hot | cool | cool | no change |'
  id: totrans-238
  prefs: []
  type: TYPE_TB
- en: 'There are six rules required to accommodate all the combinations of the intersecting
    room temperature and target temperature linguistic terms that require action.
    The rules for no change are ignored. These are the rules :'
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
- en: if room temp is cold and target temp is comfortable, then the command is heat
  id: totrans-240
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: if room temp is cold and target temp is hot, then the command is heat
  id: totrans-241
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: if room temp is comfortable and target temp is cold, then the command is cool
  id: totrans-242
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: if room temp is comfortable and target temp is heat, then the command is heat
  id: totrans-243
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: if room temp is hot and target temp is cold, then the command is cool
  id: totrans-244
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: if room temp is hot and target temp is comfortable, then the command is cool
  id: totrans-245
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now that the set of rules have been created, it is time to discuss fuzzification.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
- en: Fuzzification
  id: totrans-247
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The following code segment sets up the input variable ranges and the membership
    functions:'
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  id: totrans-249
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 'The next step in the algorithm is to determine the fuzzified values based on
    values for room and target temperatures. In this project, the user is asked to
    input both values. In a real-word FL control system, the target temperature is
    manually set, while the room temperature is determined with a sensor. However,
    to simplify things, both inputs are manually set. The following code accepts user
    input and fuzzifies those inputs:'
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  id: totrans-251
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Now on to the inference step where all the rules are applied and membership
    functions combined.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
- en: Inference
  id: totrans-253
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The following code segment applies the six rules and combines all the membership
    functions:'
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  id: totrans-255
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: This section covered applying rules and combining sets. The next step is aggregation.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
- en: Aggregation
  id: totrans-257
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The aggregation statement is long because of the six control activation values.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  id: totrans-259
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: It is time for the defuzzification once the aggregation is completed.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
- en: Defuzzification
  id: totrans-261
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The centroid method will be applied for this project as it was done for the
    previous project.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  id: totrans-263
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Now, simply display the crisp output value.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  id: totrans-265
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: The following is the complete listing for the hvac.py program.
