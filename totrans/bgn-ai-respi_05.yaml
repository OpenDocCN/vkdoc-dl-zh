- en: 'Demo 5-4: Modifications to the HVAC Program'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'For this demo, I made a simple modification to the control program: one of
    three LEDs lights up, based on whether heating, cooling, or no change is determined
    from user input. The following code is appended to the prior listing, except the
    additional import and configuration statements should be placed at the start of
    the program, just as I did with previous programs that used LEDs. I provide comments
    that indicate the GPIO pins used in this modification. They are the same ones
    that were used in the prs.py game, so use the LED interconnection diagram shown
    in that project.'
  prefs: []
  type: TYPE_NORMAL
