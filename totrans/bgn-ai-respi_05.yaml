  prefs: []
  type: TYPE_PRE
- en: hvac_led.py—the complete program with the LED modifications—is available on
    this book’s website. Figure [5-19](#Fig19) shows the Raspberry Pi physical setup
    with the three control LEDs connected to a solderless breadboard.
