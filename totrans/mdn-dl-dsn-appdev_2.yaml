- en: 2. Pretraining Strategies and Transfer Learning
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '*Steal from anywhere that resonates with inspiration or fuels your imagination…
    And don’t bother concealing your thievery – celebrate if you feel like it. In
    any case, remember what* Jean-Luc Godard *said: “It’s not where you take things
    from – it’s where you take them to.”*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: —Jim Jarmusch, American film director^([1](#Fn1))
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Obtaining a good deep neural network for most modern datasets is a difficult
    task. Optimizers need to traverse extraordinarily high-dimensional, jagged loss
    landscapes and differentiate between good and mediocre solutions using a limited
    set of tools. Hence, you will seldom see modern deep learning designs solving
    relatively well-studied problem types directly training the neural network on
    the data right after initialization – it’s simply too difficult to get good results
    feasibly by training directly from scratch.
  prefs: []
  type: TYPE_NORMAL
- en: Part of the analytical creativity embedded within deep learning design, then,
    is a need to turn this difficult task – modeling a complex phenomenon with a deep
    neural network – into a more approachable and efficient process.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we’ll discuss pretraining strategies and transfer learning:
    in essence, creatively stealing from knowledge contained in the dataset and in
    the weights of other models for to solve problems.'
  prefs: []
  type: TYPE_NORMAL
- en: Developing Creative Training Structures
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A model’s *training structure* consists of the general “flow” with which it
    is trained – the dataset(s) it is trained on, the order of the entities it is
    trained on, how those datasets are derived, etc. Here, we are assuming the standard
    supervised mode of learning, in which the model is presented with a dataset consisting
    of input data (the *x* – what the model takes in) and the labels (the *y* – corresponding
    to what the model should output) (Figure [2-1](#Fig1)). The model’s *ultimate
    task* is to take in input data and to output the correct label; this dataset is
    the *task dataset* . Although we may train the model on other datasets and to
    perform other tasks, those auxiliary tasks are performed with the intent of helping
    the model succeed at the ultimate task. This distinction in terminology will prove
    to be helpful later.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_2_Chapter/516104_1_En_2_Fig1_HTML.jpg](../images/516104_1_En_2_Chapter/516104_1_En_2_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-1
  prefs: []
  type: TYPE_NORMAL
- en: Task dataset structure
  prefs: []
  type: TYPE_NORMAL
- en: The simplest training structure is the initialize-train-complete flow that was
    discussed in Chapter [1](516104_1_En_1_Chapter.xhtml) (Figure [2-2](#Fig2)). The
    model begins training right after initialization, being fed the input data and
    predicting the labels. After training, we select a final model, which can just
    be the model after it has completed training or something like restoring the weights
    of the best performing model (something like Keras’ `ModelCheckpoint` callback).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_2_Chapter/516104_1_En_2_Fig2_HTML.jpg](../images/516104_1_En_2_Chapter/516104_1_En_2_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-2
  prefs: []
  type: TYPE_NORMAL
- en: Simple training structure of initialization and training
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see how we can alter this simple training structure to improve training
    performance more easily.
  prefs: []
  type: TYPE_NORMAL
- en: The Power of Pretraining
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The “pre” in “pretraining” indicates that it refers to a process that occurs
    *before* the formal training of the model on the dataset (Figure [2-3](#Fig3)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_2_Chapter/516104_1_En_2_Fig3_HTML.jpg](../images/516104_1_En_2_Chapter/516104_1_En_2_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-3
  prefs: []
  type: TYPE_NORMAL
- en: Training structure representation of pretraining
  prefs: []
  type: TYPE_NORMAL
- en: Given that we want pretraining to benefit training, pretraining should orient
    the model in a way that makes training “easier.” With the pretraining step, the
    model’s performance should be better than without pretraining. If pretraining
    makes model performance worse, you should reevaluate your methods of pretraining.
  prefs: []
  type: TYPE_NORMAL
- en: In pretraining, a model must be trained to perform a task different from its
    ultimate task of predicting the label based on the input data. This pretraining
    task ideally presents important “context” and skills for the ultimate task such
    that the model can attain better performance on that ultimate task.
  prefs: []
  type: TYPE_NORMAL
- en: 'Before we discuss the specific pretraining methods, we need to gain an intuitive
    understanding of what the vague terms “easier” and “better performance” mean;
    this will allow us to better understand how to use and design pretraining strategies.
    Pretraining is often discussed in relation to two of its primary advantages:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Time*: Pretraining can decrease the time needed for the neural network to
    converge to some solution.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Better metric score*: The model attains a metric score higher/lower (depending
    on the metric) than it would have without pretraining. For instance, it attains
    a lower cross-entropy score or a higher accuracy.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'While these are two dominant attributes of pretraining, they are the result
    of an underlying phenomenon: conceptually, the process of pretraining brings the
    optimizer “closer” to the true solution in the loss landscape.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Consider the following loss landscape: it is the objective of the neural network
    optimizer to find the set of parameters such that the corresponding loss is minimized.
    This landscape has several features common in most modern loss landscapes: it
    has several local minima but only one global minimum and sloping, jagged fluctuations
    (Figure [2-4](#Fig4)).'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_2_Chapter/516104_1_En_2_Fig4_HTML.jpg](../images/516104_1_En_2_Chapter/516104_1_En_2_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-4
  prefs: []
  type: TYPE_NORMAL
- en: Sample loss landscape with global minima marked
  prefs: []
  type: TYPE_NORMAL
- en: A model without pretraining may initialize and follow the following path. Since
    the first minima it encounters is more or less shallow, say the optimization algorithm
    overcomes it and discovers the next minima. Since this minima resides in a deeper
    pit and the optimizer has travelled a long distance, it will likely judge this
    to be the global optimum and converge at that location (Figure [2-5](#Fig5)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_2_Chapter/516104_1_En_2_Fig5_HTML.jpg](../images/516104_1_En_2_Chapter/516104_1_En_2_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-5
  prefs: []
  type: TYPE_NORMAL
- en: Example optimizer movement without pretraining
  prefs: []
  type: TYPE_NORMAL
- en: With pretraining, however, we’re able to get the model “closer” to the true
    global minimum of the loss landscape such that it converges to a more optimal
    solution faster, because it already begins from a place “close” to the global
    optimum. Correspondingly, we can use a less risky or erratically behaving optimizer
    because it begins from a convenient position (Figure [2-6](#Fig6)).
  prefs: []
  type: TYPE_NORMAL
- en: Keep in mind that pretraining does not necessarily bring the model “closer”
    to the optimum in the literal sense of distance but rather that it becomes more
    convenient or “easier” for the model to find the optimum than if it hadn’t undergone
    pretraining. An optimizer very close to the global optimum but with several very
    deep local minima and very high local maxima would find it more difficult to arrive
    at the global optimum than an optimizer that was farther but whose path was smoother
    and easier to descend. What “closer” exactly means is dependent on the shape of
    the loss landscape, the optimizer’s behavior, and a host of other factors. For
    simplicity, though, thinking of “closer” in terms of “how easy it would be to
    navigate to the global optimum” suffices.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_2_Chapter/516104_1_En_2_Fig6_HTML.jpg](../images/516104_1_En_2_Chapter/516104_1_En_2_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-6
  prefs: []
  type: TYPE_NORMAL
- en: Example optimizer movement with pretraining
  prefs: []
  type: TYPE_NORMAL
- en: Note that the actual loss landscape for the pretraining task is different from
    that of the loss landscape of the ultimate task (as is displayed in Figure [2-6](#Fig6)).
    It is not that pretraining operates within the loss landscape of the ultimate
    task and moves the model to a convenient position – that is just training on the
    task dataset, not pretraining.
  prefs: []
  type: TYPE_NORMAL
- en: Rather, in pretraining, we rely upon a similarity between the loss landscapes
    of the pretraining task and the ultimate task the model aims to perform. Therefore,
    a model that succeeds at the pretraining task should be at a generally successful
    location in the loss landscape for the ultimate task, from which it can further
    improve. This also means that pretraining may not be helpful if you believe the
    loss landscapes of the pretraining dataset and the task dataset are very “different.”
    Because the two often cannot be compared quantitatively for technical reasons,
    it is up to you to decide the necessity and performance boost of pretraining in
    a particular context.
  prefs: []
  type: TYPE_NORMAL
- en: This visual depiction is intended to be more a conceptual method of understanding
    what pretraining intends to do to aid your designing and usage of pretraining
    strategies. It is, of course, not entirely representative of the high-dimensional
    spaces that modern neural network optimizers operate in or the technicalities
    of transfer learning loss landscape shapes and manipulations. For instance, it’s
    unlikely that pretraining will get the model to a point where the optimizer encounters
    no local minima, as presented in Figure [2-6](#Fig6). Nevertheless, we can use
    this conceptual framework to justify and explicate the two key observed benefits
    of pretraining – speed and better metric scores.
  prefs: []
  type: TYPE_NORMAL
- en: '*Speed*: Pretraining brings the model “closer” to a solution that the optimizer
    would be “satisfied with” (could converge to), because it’s already done much
    of the work. Moreover, most modern optimization strategies involve a decreasing
    learning rate. A neural network that has not had the benefit of pretraining needs
    to travel more (perhaps in distance, perhaps in overcoming obstacles like local
    minima or maxima) to near the true solution. By then, its learning rate can be
    expected to have decayed significantly, and it may not be able to get out of local
    minima. On the other hand, if a pretrained model begins already near the true
    solution, its learning rate begins “fresh” and undecayed; it can quickly overcome
    local minima that lie between it and the true solution.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Better metric scores*: Pretraining reduces the quantity of obstacles between
    a model and the true solution. Thus, the model is more likely to converge to the
    true solution. Moreover, as discussed prior, the optimizer’s learning rate is
    more “fresh” near the true solution than an optimizer without pretraining and
    thus is less susceptible to being vulnerable to minor obstacles that may have
    tricked the optimizer without pretraining.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Next, we’ll build upon this conceptual model to discuss the intuition behind
    two pretraining methods: transfer learning and self-supervised learning.'
  prefs: []
  type: TYPE_NORMAL
- en: Transfer Learning Intuition
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Transfer learning is premised upon the idea that knowledge gained from solving
    one problem can be used, or transferred, in solving another problem. Usually,
    the knowledge derived from a more general problem is used to aid a model’s ability
    to address a more specific problem.
  prefs: []
  type: TYPE_NORMAL
- en: 'Consider two datasets: a general dataset and a task dataset. The general dataset
    is designated for pretraining, whereas it is the model’s ultimate purpose to perform
    well on the task dataset (Figure [2-7](#Fig7)).'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_2_Chapter/516104_1_En_2_Fig7_HTML.jpg](../images/516104_1_En_2_Chapter/516104_1_En_2_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-7
  prefs: []
  type: TYPE_NORMAL
- en: General dataset and task dataset visual representations. GD = general dataset,
    TD = task dataset
  prefs: []
  type: TYPE_NORMAL
- en: In transfer learning, an initialized model is first trained on the general dataset
    to provide context and skills required to succeed on the task dataset. After the
    model is pretrained on the general dataset, it is then trained on the task dataset.
    This training structure is visualized in Figure [2-8](#Fig8). Because the weights
    are retained from the end of pretraining to the beginning of pretraining, the
    model has already acquired important skills and representations for pretraining
    that it can use when training on the general dataset.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_2_Chapter/516104_1_En_2_Fig8_HTML.jpg](../images/516104_1_En_2_Chapter/516104_1_En_2_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-8
  prefs: []
  type: TYPE_NORMAL
- en: Training structure visual representation of transfer learning
  prefs: []
  type: TYPE_NORMAL
- en: Usually, the pretraining component of transfer learning is not done in house
    (by yourself). Selecting an appropriate general dataset and conceptualizing, implementing,
    and training a model to perform well on that general dataset is a significant
    amount of work, and it’s not necessary. There is a repository of pretrained models
    available in most deep learning frameworks (Figure [2-9](#Fig9)), like Keras/TensorFlow
    and PyTorch and other sources, like pypi libraries, online code forums, and hosting
    sites. Each of these pretrained models is trained on some general dataset and
    is available for you to use.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_2_Chapter/516104_1_En_2_Fig9_HTML.jpg](../images/516104_1_En_2_Chapter/516104_1_En_2_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-9
  prefs: []
  type: TYPE_NORMAL
- en: Pretrained models in a model repository. GD = general dataset. GD1, GD2, …,
    GDX indicate several different general datasets upon which several pretrained
    models are correspondingly trained. Note that in practice the relationship between
    general datasets and pretrained models is one to many (many pretrained models
    with different architectures are trained on the same general dataset)
  prefs: []
  type: TYPE_NORMAL
- en: You can then choose one of the already pretrained models and begin training
    them on your specific task dataset (Figure [2-10](#Fig10)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_2_Chapter/516104_1_En_2_Fig10_HTML.jpg](../images/516104_1_En_2_Chapter/516104_1_En_2_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-10
  prefs: []
  type: TYPE_NORMAL
- en: Using models from a pretrained model repository to directly begin training on
    the task dataset
  prefs: []
  type: TYPE_NORMAL
- en: The number of problems with which this set of pretrained models could be used
    vastly outnumbers the number of pretrained models in the repository. This is fine,
    though, because we can expect each pretrained model to be capable of being applied
    to a wide array of problem types, since each model is expected to possess a form
    of “general knowledge.”
  prefs: []
  type: TYPE_NORMAL
- en: For instance, let’s say that we want to train a model to classify images of
    dogs and cats (Figure [2-11](#Fig11)). We decide we want to use transfer learning
    and choose a general dataset of all sorts of real-life items and objects, like
    a parrot, an airplane, a car, a tomato, a fish, etc. For the purposes of this
    example, let’s say that images of dogs and cats are not present in the general
    dataset.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_2_Chapter/516104_1_En_2_Fig11_HTML.jpg](../images/516104_1_En_2_Chapter/516104_1_En_2_Fig11_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-11
  prefs: []
  type: TYPE_NORMAL
- en: Example task dataset and general dataset
  prefs: []
  type: TYPE_NORMAL
- en: There may seem to be little connection between the general dataset and the task
    dataset. However, if we distance ourselves from instinctive human topic-based
    thinking – “this is a car, that is a dog; they belong to different categories
    (i.e., transportation and animals)” – we can see many similarities.
  prefs: []
  type: TYPE_NORMAL
- en: '*There are many edges*: Edges define the shapes of the airplane, car, and fish;
    likewise, they are important in defining the shape of a dog or cat’s head.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Light is important*: Since both datasets are two-dimensional representations
    of three-dimensional objects, light is important because it helps determine the
    shape and contour of the object.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Texture matters*: Real-life objects often have similar shapes but are differentiated
    by the texture of their surface. Likewise, this seems to be important toward differentiating
    between images of dogs and cats.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A model that succeeds on the general dataset must have already adapted to and
    accounted for these features of the general dataset. In a sense, it “understands”
    how to “interpret” edges, the dynamics of light, texture, and other important
    qualities. All that is necessary afterward is to adapt those learned skills and
    representations toward a similar but more specific task.
  prefs: []
  type: TYPE_NORMAL
- en: You may ask, “why not approach task dataset directly? Why develop these auxiliary
    skills when the model could have developed those skills more specifically and
    directly for the task dataset?” Indeed, in some cases transfer learning is not
    a suitable choice. However, in most sufficiently difficult tasks, pretraining
    via transfer learning helps to set up the foundation for learning that would be
    difficult for the model to build by itself.
  prefs: []
  type: TYPE_NORMAL
- en: 'Imagine you are teaching a young child how to add two-digit numbers only through
    repeated examples. You have two general possible teaching strategies:'
  prefs: []
  type: TYPE_NORMAL
- en: Teach the child directly to add two-digit numbers by repeatedly showing them
    examples (e.g., 23+49=72).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: First, teach the child how to add one-digit numbers by repeatedly showing them
    examples (e.g., 3+9=12, 2+6=8). Then, teach the child to add two-digit numbers
    by repeatedly showing them examples (e.g., 23+49=72).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The latter is more likely to be a successful strategy, because the average length
    of the jump from knowing nothing about addition to adding one-digit numbers to
    adding two-digit numbers is much smaller than the average length of the jump from
    knowing nothing about addition to adding two-digit numbers. Transfer learning
    should operate by this same intuition of teaching the model a general task such
    that a more specific, ultimate task becomes easier to approach.
  prefs: []
  type: TYPE_NORMAL
- en: Self-Supervised Learning Intuition
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Self-supervised learning follows the logic of pretraining – some sort of pretraining
    task is performed before training the model on the task dataset to orient it toward
    better attaining representations and skills needed to perform well on the ultimate
    task.
  prefs: []
  type: TYPE_NORMAL
- en: The difference between self-supervised learning and transfer learning is that
    in transfer learning, the pretraining dataset is different from the task dataset,
    whereas in self-supervised learning, the pretraining dataset is constructed from
    the input data of the task dataset. Thus, while you would need two datasets to
    build the complete transfer learning training structure, only one is technically
    needed to build the complete self-supervised learning training structure (Figure
    [2-12](#Fig12)).
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: Here, we are using a unique definition of what a “different” dataset constitutes.
    If dataset A can be derived completely from dataset B (for instance, by flipping
    the images or changing image color), for the purposes of this concept, the two
    datasets are not different, even though on a technical level there are training
    instances in one dataset that cannot be found in the other. On the other hand,
    if dataset A cannot be derived completely from dataset B (for instance, deriving
    ImageNet from CelebA), the two datasets are different. The main focus of what
    constitutes “difference” here is the informational content of the dataset, not
    the individual specific training instances. This allows us to distinguish transfer
    learning and self-supervised learning.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_2_Chapter/516104_1_En_2_Fig12_HTML.jpg](../images/516104_1_En_2_Chapter/516104_1_En_2_Fig12_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-12
  prefs: []
  type: TYPE_NORMAL
- en: Self-supervised learning datasets. ATD = altered task dataset
  prefs: []
  type: TYPE_NORMAL
- en: It’s important to note that the altered task dataset is generally derived only
    from the input data of the task dataset. For instance, if a model’s task is to
    identify whether an image is of a dog or a cat, the altered task dataset could
    only be built upon the images (the input data of the task dataset), not the labels
    (the labels of the task dataset).
  prefs: []
  type: TYPE_NORMAL
- en: 'Designing altered task datasets is a fascinating demonstration of the creativity
    embedded within successful deep learning solutions. There are many examples of
    ways you can construct labels from the task dataset to form an altered task dataset:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Add noise to some of your data and none to others. Train the model to classify
    to which data instances noise was added (this is a binary classification problem:
    noise/no noise). This can help the model better separate noise and data, allowing
    it to develop an underlying representation of what key features of the data should
    look like.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Add varying degrees of noise to all instances in the dataset. Train the model
    classify the degree of noise (this is a regression problem). For instance, if
    you varied the standard deviation of Gaussian noise, the model would predict the
    standard deviation. This not only helps the model detect if there is noise, but
    to what extent it exists. While this is a more difficult pretraining task, the
    model would be encouraged to develop sophisticated representations of key features
    and structures of the data.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Assume there is a dataset of colored images and color is important to the model’s
    ultimate task. Convert the images to grayscale and train the model to construct
    a colorized image from the corresponding grayscale one (this is an image-to-image
    task). In this case, the altered task dataset input data is the grayscale image
    and the labels are the colorized images. With this self-supervised pretraining
    exercise, the model gains an understanding of what color certain objects should
    be.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Assume there is a model that needs to perform the NLP (Natural Language Processing)
    task of text classification. Take the text samples (input data for the task dataset)
    and randomly hide one of the words. Train the model to predict what the hidden
    word is. For instance, the model would predict “cats” when given “it’s raining
    ____ and dogs.” This allows the model to gain an understanding of how words function
    in relation to each other bidirectionally – it needs to take advantage of information
    both before and after the hidden word. This method of self-supervised learning
    is commonly used in modern NLP architectures.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In each of these examples, none of the task dataset’s labels are needed – only
    the input data, or the *x*, of the task dataset is used in constructing these
    supervised datasets. You, as the deep learning engineer, can make some change
    to the task dataset input data and construct labels from that change.
  prefs: []
  type: TYPE_NORMAL
- en: Once the altered task dataset has been derived from the input data of the task
    dataset, it can be used in the pretraining training structure (Figure [2-13](#Fig13)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_2_Chapter/516104_1_En_2_Fig13_HTML.jpg](../images/516104_1_En_2_Chapter/516104_1_En_2_Fig13_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-13
  prefs: []
  type: TYPE_NORMAL
- en: Self-supervised learning training structure
  prefs: []
  type: TYPE_NORMAL
- en: Note that in self-supervised learning (and pretraining in general), attaining
    a high performance metric is not the ultimate goal. In fact, if a model performs
    too well on the pretraining task, it may be that the pretraining task was too
    easy and hence did not support the growth of valuable skills and representations
    of data for formal training. On the other hand, if the model performs very poorly,
    the pretraining task may be too difficult.
  prefs: []
  type: TYPE_NORMAL
- en: 'It should be noted that self-supervised learning is technically unsupervised
    learning because we are extracting insights from the input data without any knowledge
    of the labels. However, self-supervised learning is a more commonly used and appropriate
    term: there is undoubtedly a supervised character to this sort of operation that
    distinguishes it from traditional unsupervised machine learning algorithms like
    K-means in that while the data generation (constructing altered task dataset)
    is technically unsupervised, the learning procedure (gradient updates, etc.) is
    supervised.'
  prefs: []
  type: TYPE_NORMAL
- en: Self-supervised learning is also valuable because it allows us to capture valuable
    information without needing labels. Datamation estimates that the amount of unstructured
    data is increasing by 55% to 65% every year,^([2](#Fn2)) and the International
    Data Corporation projects that 80% of data will be unstructured by 2025.^([3](#Fn3))
    Unstructured data is defined as data that cannot be easily fit into a standard
    database model. An auxiliary characteristic of unstructured data, thus, is that
    there are seldom corresponding labels to train massive deep learning models with.
    However, the logic of self-supervised learning allows us to find hidden structures
    in unstructured data without labels and to exploit that knowledge to solve supervised
    problems.
  prefs: []
  type: TYPE_NORMAL
- en: For this reason, self-supervised learning is especially valuable for training
    on small datasets, in which there are few labels. Pretraining via self-supervised
    learning can allow the model to derive important insights it may not have obtained
    with only the traditional training structure.
  prefs: []
  type: TYPE_NORMAL
- en: Unlike transfer learning, there is no repository of self-supervised pretrained
    models, because in self-supervised learning, the pretraining task must be designed
    based on the task dataset. However, altering task datasets for self-supervised
    learning is generally not difficult if you have a good grasp of programming and
    data flows (see Chapter [1](516104_1_En_1_Chapter.xhtml)).
  prefs: []
  type: TYPE_NORMAL
- en: 'Yann LeCun provided an analog for self-supervised learning in how humans and
    animals learn at a 2020 AAAI (Association for the Advancement of Artificial Intelligence)
    conference:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Self-supervised learning … is basically learning to fill in the blanks. Basically,
    it’s the idea of learning to represent the world before learning a task. This
    is what babies and animals do. We run about the world, we learn how it works before
    we learn any task. Once we have good representations of the world, learning a
    task requires few trials and few samples.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: —Yann LeCun, Chief AI Scientist at Facebook, speaking at AAAI 20^([4](#Fn4))
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Transfer learning and self-supervised learning both fall under the general strategy
    of pretraining and are similar in that the model engages in some supervised task
    before it is trained on the task dataset. However, the two pretraining methods
    are different not only in terms of technicalities (i.e., “different” datasets
    vs. “same” datasets) as discussed prior but also as a matter of outcome and what
    knowledge is developed.
  prefs: []
  type: TYPE_NORMAL
- en: Transfer learning tends to develop “prediction *skills*.” That is, the weights
    from transfer learning are derived from the general dataset, which usually comes
    from a significantly different context than the task dataset (topic/content-wise).
    Much of the value of transfer learning is in the predictive skills it develops
    – learning how to recognize edges, to look for texture, to process color, etc.
    rather than actual knowledge of the content or topic of the dataset.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Self-supervised learning tends to develop “world-representing knowledge.” It
    builds the fundamental representations of the “world,” or context, that the model
    will need to understand to perform well on the task dataset. The actual skill
    of predicting whether – for instance – noise was or was not added to a training
    instance may not be of much use, but the process of deriving that skill requires
    gaining an understanding of the data “world.” Self-supervised learning allows
    for the model to get a glimpse into building fundamental representations and “feeling
    around” for the dataset’s content and topics.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Of course, this is not to suggest that transfer learning does not develop world-representing
    knowledge or that self-supervised learning does not develop important skills.
    Rather, these are the root-level “spirits” or “characters” of transfer learning
    and self-supervised learning that can be used to guide intuition and what to expect
    from either method.
  prefs: []
  type: TYPE_NORMAL
- en: You may notice that we have been exploring these concepts through relatively
    fluid and artistic descriptors and ideas – “extracting insights,” “developing
    representations,” “world-representing.” While a textbook may attempt to formulate
    these ideas in equations and mathematical relationships, the truth is that even
    the most modern deep learning knowledge cannot fully explain and understand the
    depth of neural network behavior. Having an intuitive grasp of how neural networks
    function and “learn” – even if it is not mathematically rigorous – is valuable
    toward successful and efficient design.
  prefs: []
  type: TYPE_NORMAL
- en: Next, we will explore practical concepts in pretraining to understand how to
    manipulate neural network architectures for the implementation of transfer learning
    and self-supervised learning.
  prefs: []
  type: TYPE_NORMAL
- en: Transfer Learning Practical Theory
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Previously, we discussed conceptual frameworks to gain an intuitive understanding
    for what transfer learning is, what it does, and how it operates. However, because
    there are many “hidden” considerations when implementing transfer learning, in
    this section we will explore the more practical aspect of theory – concepts and
    ideas to aid your implementation of transfer learning.
  prefs: []
  type: TYPE_NORMAL
- en: The purpose of this section is not to provide specific code or discuss examples
    (that will be left to the next section), but instead to provide an introduction
    to important concepts for implementing pretraining, like the structure of pretrained
    models and how pretrained models are organized in Keras.
  prefs: []
  type: TYPE_NORMAL
- en: Transfer Learning Models and Model Structure
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'There are several important pretrained models and datasets to know. In this
    section, we will primarily be exploring image-based models, although you can apply
    much of the logic to other contexts. Image-based pretrained models generally follow
    a standard structure, consisting of two key steps: feature extraction and feature
    interpretation (Figure [2-14](#Fig14)).'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_2_Chapter/516104_1_En_2_Fig14_HTML.jpg](../images/516104_1_En_2_Chapter/516104_1_En_2_Fig14_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-14
  prefs: []
  type: TYPE_NORMAL
- en: Conceptual components of an image-based pretrained model
  prefs: []
  type: TYPE_NORMAL
- en: Feature extraction serves the purpose of assembling information into meaningful
    observations, like identifying and amplifying (or reducing) the presence of certain
    edges, shapes, or color patterns. A well-tuned feature extraction component is
    able to identify and amplify characteristics that are relevant to the problem.
    For instance, if the problem is to classify various grayscale images of shapes,
    the feature extraction component must be highly capable at detecting and amplifying
    the shape of edges.
  prefs: []
  type: TYPE_NORMAL
- en: Feature interpretation interprets the compiled extracted features to make a
    final judgment about the image. It takes in extracted information regarding the
    features of the image and can perform comparisons and other complex analyses across
    various regions of the image. A well-tuned feature interpretation component is
    able to effectively aggregate and make sense of extracted features in relation
    to the target output.
  prefs: []
  type: TYPE_NORMAL
- en: In practice, the roles of “feature extraction” and “feature interpretation”
    are played by convolutional and fully connected components (Figure [2-15](#Fig15)).
    The convolutional component generally consists of layers like convolutions, pooling,
    and other image-based feature extraction layers. The fully connected component
    generally consists of fully connected or dense (in Keras terminology) layers.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_2_Chapter/516104_1_En_2_Fig15_HTML.jpg](../images/516104_1_En_2_Chapter/516104_1_En_2_Fig15_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-15
  prefs: []
  type: TYPE_NORMAL
- en: The practical components of an image-based pretrained model
  prefs: []
  type: TYPE_NORMAL
- en: The raw input is passed into the convolutional component for feature extraction.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The convolutional component of the pretrained model takes in the raw input and
    performs convolutions, pooling, and other image-processing layers to extract features
    from the image. It then passes the extracted features into the flattening component.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The flattening component takes in the two-dimensional (spatially, not counting
    color depth), since the convolutional component performs operations that take
    in and output data of image form. Flattening converts the two-dimensional extracted
    features into one-dimensional data so that the fully connected layer can operate
    upon the features.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The fully connected component, also known as the “top” or the “head” of the
    neural network, takes in the one-dimensional flattened data containing the information
    from the extracted features. After interpreting the extracted features through
    a series of fully connected layers (and other corresponding layers, like activations,
    dropout, etc.), the fully connected layer outputs the output of the neural network.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We’ll talk more about certain architectures in depth in later chapters, but
    here we’ll do a very quick overview of important models.
  prefs: []
  type: TYPE_NORMAL
- en: In Keras, pretrained models are arranged into modules from which that model
    and related functions can be found within `keras.applications.module_name`. For
    instance, if you wanted to find the pretrained model and processing functions
    relating to the InceptionV3 model, you would find it in `keras.applications.inception_v3`.
    In addition to the pretrained model object, these modules often contain processing
    functions to apply to your data or the model output. We will see how these processing
    functions work in relation to the model soon.
  prefs: []
  type: TYPE_NORMAL
- en: The ImageNet Dataset
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: ImageNet is one of the most important datasets in image recognition. Professor
    Fei-Fei Li began working on ImageNet at Princeton in early 2007\. Throughout the
    development of neural network applications in the image domain, ImageNet has been
    a core dataset upon which new methods and designs were conceived, tested, and
    reinvented.
  prefs: []
  type: TYPE_NORMAL
- en: The ImageNet dataset is structurally organized according to the WordNet hierarchy,
    in which objects are arranged in hierarchical relation to each other (Figure [2-16](#Fig16)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_2_Chapter/516104_1_En_2_Fig16_HTML.jpg](../images/516104_1_En_2_Chapter/516104_1_En_2_Fig16_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-16
  prefs: []
  type: TYPE_NORMAL
- en: Hypothetical example branch of WordNet hierarchy organization
  prefs: []
  type: TYPE_NORMAL
- en: Each “meaningful concept” in ImageNet is referred to as a “synonym set” or a
    “synset.” Each “synset” can be described by multiple words or series of words.
    ImageNet contains over 100,000 synsets; each synset contains an average of 1000
    images. Across 22,000 objects, ImageNet contains over 14 million images.
  prefs: []
  type: TYPE_NORMAL
- en: '*The ImageNet project was inspired by two important needs in computer vision
    research. The first was the need to establish a clear North Star problem in computer
    vision… Second, there was a critical need for more data to enable more generalizable
    machine learning methods. Ever since the birth of the digital era and the availability
    of web-scale data exchanges, researchers in these fields have been working hard
    to design more and more sophisticated algorithms to index, retrieve, organize
    and annotate multimedia data. But good research requires good resources…The convergence
    of these two intellectual reasons motivated us to build ImageNet.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: —ImageNet Research Team^([5](#Fn5))
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The ImageNet Large Scale Visual Recognition Challenge ran from 2010 to 2017
    and was instrumental to the development of image-processing deep learning work.
    Hence, many of the pretrained models available in Keras/TensorFlow and other deep
    learning frameworks are pretrained on the ImageNet dataset. Models pretrained
    on the ImageNet dataset have developed skills to recognize edges, textures, and
    other attributes of images of three-dimensional spaces and objects .
  prefs: []
  type: TYPE_NORMAL
- en: ResNet
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The ResNet architectures , or residual neural networks, were introduced in 2015\.
    ResNet won first place in the 2015 ImageNet challenge, obtaining a 3.57% error
    on the test dataset. The ResNet uses residual connections, or skip connections,
    which are connections between layers that skip over at least one intermediate
    layer. We’ll explore these sorts of designs and strategies in neural network architectures
    in later chapters.
  prefs: []
  type: TYPE_NORMAL
- en: 'Keras/TensorFlow offers several different versions of the ResNet architecture:
    ResNet50, ResNet101, ResNet152, ResNet50V2, ResNet101V2, and ResNet152V2\. The
    number after the “ResNet” (e.g., the “50” in “ResNet50”) indicates the number
    of layers in it. Thus, ResNet152V2 has more layers than ResNet101V2.'
  prefs: []
  type: TYPE_NORMAL
- en: 'ResNet also comes in two versions, with two (very general) key differences:'
  prefs: []
  type: TYPE_NORMAL
- en: ResNetV1 adds more nonlinearities than ResNetV2\. The V2 architecture thus allows
    for a more direct and clear path for data flow throughout the network.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: ResNetV1 passes the data through a convolutional layer before batch normalization
    and an activation layer, whereas ResNetV2 passes data through the batch normalization
    and activation layers before the convolutional layer (reversed).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'You can find Keras ResNet model architectures in corresponding modules within
    `keras.applications`:'
  prefs: []
  type: TYPE_NORMAL
- en: 'ResNet50: `keras.applications.resnet50.ResNet50()`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'ResNet101: `keras.applications.resnet.ResNet101()`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'ResNet152: `keras.applications.resnet50.ResNet152()`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'ResNet50V2: `keras.applications.resnet_v2.ResNet50V2()`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'ResNet101V2: `keras.applications.resnet_v2.ResNet101V2()`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'ResNet152V2: `keras.applications.resnet_v2.ResNet152V2()`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We will explore how to use the architecture given the model object later .
  prefs: []
  type: TYPE_NORMAL
- en: InceptionV3
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The 2015 InceptionV3 model is a popular model from the Inception family of models,
    using a module/cell-based structure in which certain sets of layers are repeated.
    Inception networks are more computationally efficient by reducing the number of
    parameters necessary and limiting the memory and resources needed to be consumed.
    InceptionV3 was designed primarily with a focus on minimizing computational cost,
    whereas ResNet focuses on maximizing accuracy.
  prefs: []
  type: TYPE_NORMAL
- en: You can find the InceptionV3 model architecture at `keras.applications.inception_v3.InceptionV3()`.
  prefs: []
  type: TYPE_NORMAL
- en: Inspired by the high performance of ResNet, the Inception-ResNet architecture
    uses a hybrid module by incorporating residuals. Correspondingly, Inception-ResNet
    generally has a low computational cost with high performance.
  prefs: []
  type: TYPE_NORMAL
- en: You can find the Inception-ResNetV2 architecture at `keras.applications.inception_resnet_v2.InceptionVResNet2()`.
  prefs: []
  type: TYPE_NORMAL
- en: For more specific and technical discussion on residual connections, cell-based
    structures, and the InceptionV3 architecture, see Chapter [6](516104_1_En_6_Chapter.xhtml).
  prefs: []
  type: TYPE_NORMAL
- en: MobileNet
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The 2017 MobileNet models are designed to perform well on mobile phone deep
    learning applications. MobileNets use depth-wise separable convolutions, which
    are convolutions that apply not only spatially but also depth-wise. MobileNet
    has more parameters than Inception but less than ResNet; correspondingly, MobileNet
    has been generally observed to perform worse than ResNet but better than Inception.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: When we compare models (e.g., “MobileNet vs. ResNet”), keep in mind that we
    are referring to the complete family of architectures. Most models have architectures
    of different versions and depths. When comparing model families, we are referring
    to architectures of comparable versions and layers.
  prefs: []
  type: TYPE_NORMAL
- en: Keras/TensorFlow offers four versions of MobileNet, MobileNetV1, MobileNetV2,
    MobileNetV3Small, and MobileNetV3Large. MobileNetV2, like MobileNetV1, uses depth-wise
    separable convolutions but also introduces linear bottlenecks and shortcut connections
    between bottlenecks. MobileNetV2 can effectively extract features for object detection
    and segmentation and generally performs faster at achieving the same performance
    as MobileNetV1\. MobileNetV3Small and MobileNetV3Large are MobileNet architectures
    designated for low-resource and high-resource consumption scenarios, derived from
    Neural Architecture Search algorithms (we will discuss Neural Architecture Search
    and other methods in later chapters).
  prefs: []
  type: TYPE_NORMAL
- en: 'You can find Keras ResNet model architectures in corresponding modules within
    `keras.applications`:'
  prefs: []
  type: TYPE_NORMAL
- en: 'MobileNetV1: `keras.applications.mobilenet.MobileNet()`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'MobileNetV2: `keras.applications.mobilenet_v2.MobileNetV2()`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'MobileNetV3Small: `keras.applications.MobileNetV3Small()`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'MobileNetV3Large: `keras.applications.MobileNetV3Large()`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: EfficientNet
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Deep convolutional neural networks have continually been growing larger in an
    attempt to be more powerful. Exactly how this enlargement is performed, however,
    has varied. Some approaches increase the resolution of the image by increasing
    the number of pixels in the image handled by the network. Others increase the
    depth of the network by adding more layers or the width by increasing the number
    of nodes in each layer.
  prefs: []
  type: TYPE_NORMAL
- en: The 2019 EfficientNet family of models is a new approach for neural network
    enlargement via compound scaling, in which the resolution, depth, and width of
    the network are equally scaled. By using this scaling method upon a small, base
    model named EfficientNetB0, seven compound-scaled architectures were generated,
    named EfficientNetB1, EfficientNetB2, …, EfficientNetB7 as the magnitude of scaling
    increases. The EfficientNet family of models is both powerful and efficient, both
    computationally and time-wise. Compound scaling allows EfficientNet to improve
    upon the performance of models like MobileNet and ResNet on the ImageNet dataset.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can find the Keras implementation of EfficientNet model architectures in
    the corresponding module within `keras.applications`:'
  prefs: []
  type: TYPE_NORMAL
- en: 'EfficientNetB0: `keras.applications.efficientnet.EfficientNetB0()`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'EfficientNetB1: `keras.applications.efficientnet.EfficientNetB1()`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'EfficientNetB2: `keras.applications.efficientnet.EfficientNetB2()`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: …
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'EfficientNetB6: `keras.applications.efficientnet.EfficientNetB6()`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'EfficientNetB7: `keras.applications.efficientnet.EfficientNetB7()`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Find a more specific and technical discussion of EfficientNet in a Chapter [6](516104_1_En_6_Chapter.xhtml)
    case study .
  prefs: []
  type: TYPE_NORMAL
- en: Other Models
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Keras/TensorFlow offers a host of other pretrained models in `keras.applications`.
    To view them, refer to the TensorFlow documentation, which not only provides information
    on usage, parameters, and methods but also includes the links to each pretrained
    model’s corresponding paper: [`www.tensorflow.org/api_docs/python/tf/keras/applications`](http://www.tensorflow.org/api_docs/python/tf/keras/applications).
    Later in this chapter, we will also cover how to convert PyTorch models into Keras/TensorFlow
    models to take advantage of PyTorch’s library of pretrained models.'
  prefs: []
  type: TYPE_NORMAL
- en: Changing Pretrained Model Architectures
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To change pretrained model architectures , usually only the pretrained model’s
    convolutional component is transferred. Recall that transfer learning is primarily
    concerned with transferring the skills learned from one general dataset for application
    in a specific task dataset. Because the task dataset is different from the general
    dataset, while a model operating on the task dataset would still benefit from
    the feature-extracting skills transferred via transfer learning, it would need
    to develop its own interpretations.
  prefs: []
  type: TYPE_NORMAL
- en: As a conceptual analogy, imagine you are an art student trained in the analysis
    of Impressionist-era works – the art of Monet, Renoir, Matisse, and so on. If
    now you were to approach a contemporary work by the likes of Picasso and Pollock,
    you would want to
  prefs: []
  type: TYPE_NORMAL
- en: '*…retain the feature-extracting skills*: The fundamental feature extraction
    capabilities that you learned as an art student are important to developing and
    organizing meaningful and astute observations that can be used for interpretation.
    Without understanding how to look at and take away observations of art (without
    actually interpreting them), there are no observations to serve as the basis of
    interpretation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*…but develop a fresh set of interpretations*: Now that you have kept your
    feature extraction skills and have developed a set of observations (the extracted
    features), it wouldn’t in most contexts make sense to analyze the contemporary
    work through Impressionist interpretations. Rather, this new data calls for a
    fresh set of interpretations suited toward the context of contemporary art.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Thus, while the skills for extracting features are valuable and can be transferred
    almost universally across most generally similar problems, often the interpretations
    of said features vary widely enough that the most successful strategy is to build
    a custom fully connected component, instead of transferring it (Figure [2-17](#Fig17)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_2_Chapter/516104_1_En_2_Fig17_HTML.jpg](../images/516104_1_En_2_Chapter/516104_1_En_2_Fig17_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-17
  prefs: []
  type: TYPE_NORMAL
- en: The process of transferring weights from a pretrained model to a custom model.
    PM = pretrained model, CM = custom model. “Updated” indicates that the corresponding
    component is being trained/updated in retraining
  prefs: []
  type: TYPE_NORMAL
- en: However, in some occasions the problem set may be similar enough that the fully
    connected layer weights may also be transferred (Figure [2-18](#Fig18)). This
    method requires no architecture manipulation of the pretrained model, since all
    the weights from the pretrained model are being transferred. To use this method,
    simply instantiate the pretrained model and train it on the task dataset without
    any architecture manipulation.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_2_Chapter/516104_1_En_2_Fig18_HTML.jpg](../images/516104_1_En_2_Chapter/516104_1_En_2_Fig18_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-18
  prefs: []
  type: TYPE_NORMAL
- en: An alternative process of transferring weights from a pretrained model to a
    custom model in which both the pretrained model’s convolutional and FC components
    are transferred
  prefs: []
  type: TYPE_NORMAL
- en: 'Another alternative is to keep the pretrained model’s fully connected component
    and to add more custom layers afterward (Figure [2-19](#Fig19)). Think back to
    the art student analogy: you’re starting from the interpretative perspective of
    the Impressionist style that you were trained in, but additionally developing
    new interpretations *of* your interpretations to account for the new problem type.
    However, this method is generally less often used than only transferring weights
    in the convolutional component, since to be effective the neural network must
    be significantly deepened (more layers added), which can pose problems for updating
    weights, time, and model performance. Under certain conditions, though, it can
    be the optimal strategy.'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_2_Chapter/516104_1_En_2_Fig19_HTML.jpg](../images/516104_1_En_2_Chapter/516104_1_En_2_Fig19_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-19
  prefs: []
  type: TYPE_NORMAL
- en: An alternative process of transferring weights from a pretrained model to a
    custom model in which both the pretrained model’s convolutional and FC components
    are transferred, and new fully connected layers are added to the custom model
  prefs: []
  type: TYPE_NORMAL
- en: Although we will only explore the first method through examples, all can be
    implemented through tools covered in Chapter [1](516104_1_En_1_Chapter.xhtml),
    like the Functional API. Models can be treated like functional layers, expressed
    as functions of an input. See Chapter [3](516104_1_En_3_Chapter.xhtml) for more
    complex exploration into neural network architecture manipulation.
  prefs: []
  type: TYPE_NORMAL
- en: Neural Network “Top” Inclusivity
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: All Keras/TensorFlow pretrained models have an important parameter, named `include_top`,
    which allows us to easily implement the first method of changing pretrained model
    architectures for training.
  prefs: []
  type: TYPE_NORMAL
- en: Recall that the fully connected component of an image-based neural network architecture
    is often referred to as its “top.” Thus, if the `include_top` parameter is set
    to `True`, the fully connected component will be retained in the instantiated
    pretrained model object. On the other hand, if the `include_top` parameter is
    set to `False`, the fully connected component will not be retained and the instantiated
    pretrained model object will contain only the input and convolutional components.
  prefs: []
  type: TYPE_NORMAL
- en: It’s important to realize that when there is no top, the input image shape is
    more or less arbitrary (see Note) because convolutional layers do not rely upon
    an absolute shape. A convolutional layer can act on an image of almost any shape
    (see Note for the qualifier “almost”), since it simply “slides” filters over an
    image. On the other hand, a dense layer in the fully connected component can only
    act upon inputs of a certain shape. Thus, if the `include_top` parameter is set
    to `True`, you are also limited in the shape of your input data to whatever the
    shape of the data the model was pretrained on.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: The input image shape is not completely arbitrary. If the image shape is too
    small, the image may not be large enough for the whole depth of the network to
    be able to be valid, since filters rely on a minimum image size. One cannot perform
    ten convolutions with kernel size (3,3) on a 16x16 pixel image because in the
    middle of the sequence the feature map will have been reduced so much that it
    is too small to perform convolutions on. This is likely the culprit if you are
    using a model architecture with a small input size that throws an error when defining
    the architecture.
  prefs: []
  type: TYPE_NORMAL
- en: It should also be noted that the fact that the absence of a top means the input
    size is somewhat arbitrary does not mean that you should be too extreme with how
    much you change the input shape of your image. Say, a model was trained on 512x512
    pixel images and you used transfer learning by extracting the convolutional component
    of that model (along with its weights). If you were to train the model on 32x32
    pixel images (likely with image resizing), even though the operation is technically
    valid, the transferred weights are rendered more or less useless because the skills
    in the original model were developed on more high-resolution pixel images. In
    short, make use of the relatively arbitrariness of image sizes with no top, but
    also take your freedom in image size with a grain of salt.
  prefs: []
  type: TYPE_NORMAL
- en: Layer Freezing
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Layer freezing is a useful tool for the implementation of transfer learning.
    When a layer is “frozen,” its weights are fixed and it cannot be trained. The
    purpose of transfer learning is to utilize important skills the pretrained model
    has developed. Thus, it is common to freeze the convolutional component of the
    pretrained model and to train only the custom fully connected component (Figure
    [2-20](#Fig20)). This way, the feature-extracting skills learned and stored in
    the weights of the convolutional component are kept as is, but the interpretative
    fully connected component is trained to best interpret the extracted features.
    After this, sometimes the entire network is trained for fine-tuning. This allows
    the convolutional component to be updated in accordance with the developed interpretations
    in the fully connected component. Be aware that too much fine-tuning can lead
    to overfitting.
  prefs: []
  type: TYPE_NORMAL
- en: Think of layer freezing in relation to the art student analogy. Initially, you
    want to utilize the feature-extracting skills you developed in your art training
    and to construct new interpretations of contemporary art corresponding to the
    extracted features. However, after you have constructed new interpretations for
    the particular problem, you may find it helpful to go back and slightly update
    your feature-extracting skills to better service your new interpretative capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_2_Chapter/516104_1_En_2_Fig20_HTML.jpg](../images/516104_1_En_2_Chapter/516104_1_En_2_Fig20_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-20
  prefs: []
  type: TYPE_NORMAL
- en: A multistep layer freezing process
  prefs: []
  type: TYPE_NORMAL
- en: On a practical level, layer freezing is immensely helpful for practical success.
    Although it can be easy to build massive neural networks and call `.fit()` with
    increasing computational power, it remains true that it is not easy to optimize
    hundreds of millions (or even billions) of parameters by brute-force and achieve
    good performance. Layer freezing allows the neural network to focus on optimizing
    one segment of its architectures at a time and allows you to better use the weights
    gained from pretraining by restricting how much the neural network can deviate
    from the learned pretrained weights .
  prefs: []
  type: TYPE_NORMAL
- en: Implementing Transfer Learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In this section, we will discuss three examples of implementing transfer learning
    with Keras/TensorFlow:'
  prefs: []
  type: TYPE_NORMAL
- en: '*No architecture or weight changes*: An exercise in using (ImageNet) pretrained
    models for their original purpose – to predict what object is in an image. Also
    helpful for dealing with reshaping inputs and using encoding and decoding functions
    associated with the pretrained model module'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '*Transfer learning without layer freezing*: Using the standard procedure of
    transferring the weights from the convolutional component and building a custom
    fully connected component, without layer freezing. Helpful for manipulating model
    architectures both using the Functional API and using the `include_top` parameter'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '*Transfer learning with layer freezing*: Using the standard procedure of transferring
    the weights from the convolutional component and building a custom fully connected
    component, with layer freezing'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We’ll also discuss how to take advantage of PyTorch’s pretrained model library
    by converting them into Keras/TensorFlow models.
  prefs: []
  type: TYPE_NORMAL
- en: 'General Implementation Structure: A Template'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Before we build a transfer learning model, let’s first compile the topics and
    methods discussed before to lay out a template for the general implementation
    structure of transfer learning:'
  prefs: []
  type: TYPE_NORMAL
- en: Choose an appropriate model from the Keras/TensorFlow repository of pretrained
    models or from another source, like a pypi library offering an implementation
    of a pretrained model or PyTorch.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Instantiate the model with the desired architectural settings (include or do
    not include top).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Set up the model’s input and output flows such that it matches with the data.
    This may require using a reshaping layer, using an input layer, adding a fully
    connected component such that the extracted features are interpreted and outputted,
    some other mechanism, or some combination.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Freeze layers, as necessary.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Compile and fit.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Change which layers are frozen if necessary, and compile and fit again.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: It should be also noted that although in this context we are discussing image-based
    pretrained models, as transfer learning began its extensive development in the
    domain of images, the logic of a feature-extracting segment and an interpretative
    segment can be applied to other problem domains as well.
  prefs: []
  type: TYPE_NORMAL
- en: No Architecture or Weight Changes
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If we make no changes to the architecture, we cannot adjust the input or the
    output of the pretrained model. Therefore, if we want to make no changes to the
    architecture, we must use the pretrained model for its original purpose.
  prefs: []
  type: TYPE_NORMAL
- en: The InceptionV3 model was trained on the ImageNet dataset. Thus, it takes an
    image of size `(299,299,3)` and returns an output vector with the probability
    the image belongs to one of 1000 classes.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s begin by loading an example image to demonstrate how InceptionV3 would
    function (Listing [2-1](#PC1)). We will use `requests` to read a URL, `PIL` to
    read the corresponding image (Figure [2-21](#Fig21)), and `numpy` to convert the
    image into an array.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_2_Chapter/516104_1_En_2_Fig21_HTML.jpg](../images/516104_1_En_2_Chapter/516104_1_En_2_Fig21_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-21
  prefs: []
  type: TYPE_NORMAL
- en: Sample image to be classified by a model architecture trained on the ImageNet
    dataset
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Let’s begin by importing necessary layers, applications, and functions (Listing
    [2-2](#PC2)):'
  prefs: []
  type: TYPE_NORMAL
- en: The `keras.layers.Input` layer defines the input size and is required for constructing
    a neural network (or in some other form, like the `input_shape` parameter).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The `keras.layers.experimental.preprocessing.Resizing` layer resizes an image
    to a new shape. We can use this to reshape an image of any size to the shape `(299,299,3)`
    such that it is in the proper input shape for InceptionV3.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The `keras.applications.inception_v3.InceptionV3` model is the core InceptionV3
    model that can be used and manipulated in relation to the other layers.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The `keras.applications.inception_v3.preprocess_input` preprocesses data to
    be in the same format InceptionV3 was trained on. If the inputs are not preprocessed,
    the pretrained weights may not be suited toward the unprocessed inputs and yield
    inaccurate results.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: We can use these layers to set up a series of data input and preprocessing (Listing
    [2-3](#PC3)). First, the `Input` layer takes in data with a shape of `(None, None,
    3)`; `None` indicates that the exact value for that dimension is not exactly specified.
    This allows us to pass images of any size into the neural network input. The `Resizing`
    layer reshapes the input image to the proper shape for InceptionV3\. The third
    layer preprocesses the resized data into InceptionV3 format.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'The output of `preprocess_layer` (the result of the resized, preprocessed input
    data) is passed as the input to the `InceptionV3` model. Note that we are making
    no changes to the model architecture or weights, so we set `inlucde_top=True`
    and `weights=''imagenet''`. We can treat the model as a layer that takes in the
    output of a previous layer and can be passed as an input to the following layer:
    Inceptionv3 = InceptionV3(include_top=True, weights="imagenet")(preprocess_layer).'
  prefs: []
  type: TYPE_NORMAL
- en: Note that you can set weights to `None` to just use the model architectures,
    without the pretrained weights. Although this doesn’t quite count as transfer
    learning, you may want to use this when the task dataset is so different from
    the pretraining dataset that any pretrained weights wouldn’t be of much benefit,
    but want to take advantage of some architecture’s characteristics, like efficiency
    or power.
  prefs: []
  type: TYPE_NORMAL
- en: 'We can create a model out of this set of layers using `keras.models.Model`
    (note that the pretrained model is treated like a layer and thus is considered
    an `outputs` layer): model = keras.models.Model(inputs=input_layer, outputs=Inceptionv3).'
  prefs: []
  type: TYPE_NORMAL
- en: Now that the model has been created, we can use it to make predictions (Listing
    [2-4](#PC4)). We will use the `decode_predictions` function to help us parse the
    outputs of the InceptionV3 model, which in its raw form is a list of numbers.
    The model predictions for the image (stored in the variable `im`) can be passed
    into `decode_predictions` to obtain interpretable results.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Note that the model expects four-dimensional data – for example, data with shape
    `(100,299,299,3)`, indicating that it consists of 100 299x299 pixel RGB colored
    images. Even though we are submitting an individual image for prediction, it still
    needs to be four-dimensional. An easy way to accomplish this is to wrap it as
    an element in another array with `np.array([im])`.
  prefs: []
  type: TYPE_NORMAL
- en: Each element of the results of decoded predictions is in the format `(class
    name, class description, probability)`. The results of the decoded predictions
    show that InceptionV3 has correctly identified the object of the image – a lion,
    with 91% confidence (Listing [2-5](#PC5)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: A similar process can be applied to other pretrained models available via Keras.
    Most Keras pretrained models have associated `preprocess_input` and `decode_predictions`
    functions.
  prefs: []
  type: TYPE_NORMAL
- en: Transfer Learning Without Layer Freezing
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If we want to adapt the pretrained model for our own task dataset, we need to
    make some minimal architecture changes such that the input and the output can
    accommodate our dataset. This follows a very similar structure to the previous
    application of no architecture or weight changes.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s begin by importing necessary layers and models (Listing [2-6](#PC6)):'
  prefs: []
  type: TYPE_NORMAL
- en: The `keras.layers.Input` layer defines the input shape.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The `keras.layers.Dense` layer provides the neural network’s “interpretative”
    or “predictive” power.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The `keras.layers.GlobalAveragePooling2D` layer “collapses” image data into
    the average of its elements. For instance, image data with shape `(a, b, c, d)`
    will have shape `(a, d)` afterward, where `(b, c, d)` is the shape of each image
    element and there are `a` training instances. An alternative to Global Average
    Pooling is the raw Flatten layer. The Flatten layer (`keras.layers.Flatten()`),
    unlike the Global Average Pooling layer, retains all the elements of multidimensional
    data and converts them into one-dimensional data by stacking them end to end.
    Thus, image data with shape `(a, b, c, d)` will have shape `(a, b*c*d)`.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The `keras.applications.inception_v3.InceptionV3` model provides the architecture
    and pretrained weights for the InceptionV3 model.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Let’s begin by defining the input layer and the InceptionV3 model it feeds into
    (Listing [2-7](#PC7)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Note that we are keeping the ImageNet weights, but we do not include the top.
    While we want to keep the feature extraction skills in the convolutional layers,
    because we are appropriating the pretrained model for our own purposes, we don’t
    need the weights for the interpretative fully connected component.
  prefs: []
  type: TYPE_NORMAL
- en: Because we are not keeping the top of the neural network, the output of the
    truncated InceptionV3 model is an image. The Global Average Pooling model allows
    us to compress the data out of image form (this is the flattening component).
    Afterward, we can place two more dense layers to “interpret” the extracted features
    and one more to form the output layer (Listing [2-8](#PC8)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: We can form a model as such (Listing [2-9](#PC9)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: Visualizing the model shows the shape of the data over time (Figure [2-22](#Fig22))
    with keras.utils.plot_model(model, show_shapes=True). The visualization also demonstrates
    that the InceptionV3 model is treated very much like a standard layer.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_2_Chapter/516104_1_En_2_Fig22_HTML.jpg](../images/516104_1_En_2_Chapter/516104_1_En_2_Fig22_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-22
  prefs: []
  type: TYPE_NORMAL
- en: Diagram of an example model architecture using transfer learning
  prefs: []
  type: TYPE_NORMAL
- en: The model can be correspondingly compiled and trained. It should be noted that
    usually the fully connected component is much longer and complex to account for
    the complex nature of modern deep learning datasets.
  prefs: []
  type: TYPE_NORMAL
- en: Transfer Learning with Layer Freezing
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In order to freeze a layer, set `layer_obj.trainable=False`.
  prefs: []
  type: TYPE_NORMAL
- en: We need to first instantiate the layer to set the `trainable` attribute to `False`
    (Listing [2-10](#PC10)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: We can then use this pretrained model object as a standard layer in conjunction
    with other layers using the syntax of the Functional API (Listing [2-11](#PC11)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: After building the remainder of the model and aggregating the layers into a
    model with `keras.models.Model`, you can call `model.summary()` to get a rundown
    of the model’s parameters (Listing [2-12](#PC12)). Note that most of the parameters
    are trainable. A small quantity of non-trainable parameters are built into the
    model’s architecture.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: You can now call `inception_model.trainable = False` to freeze the layer. By
    re-aggregating the layers into a new model and calling `model.summary()`, you
    can see the results of layer freezing (Listing [2-13](#PC13)). Because most of
    the parameters in the complete model were transferred weights from the pretrained
    model, after layer freezing, most of the parameters are non-trainable.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: Calling `model.summary()` is a good way to double-check if layer freezing worked
    or not. When several forms and series of neural network manipulations are being
    performed, it can be difficult to keep track and separate different forms of functions
    and instantiated objects.
  prefs: []
  type: TYPE_NORMAL
- en: You can unfreeze with `inception_model.trainable = True` and continue fitting
    again for fine-tuning.
  prefs: []
  type: TYPE_NORMAL
- en: You can also freeze individual layers with a similar method or by aggregating
    layers together into models and unfreezing groups of layers.
  prefs: []
  type: TYPE_NORMAL
- en: Accessing PyTorch Models
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Keras/TensorFlow offers a large selection of pretrained models, and platforms
    like the model zoo ([`https://modelzoo.co/`](https://modelzoo.co/)) or pypi libraries
    offer a wide range of pretrained models and/or architectures in Keras/TensorFlow.
  prefs: []
  type: TYPE_NORMAL
- en: PyTorch , a major alternative framework to Keras/TensorFlow, offers a larger
    selection of pretrained models. If a PyTorch pretrained model is not already implemented
    in Keras/TensorFlow, there’s a simple method to convert PyTorch models into Keras
    model objects so you can work with the model using familiar methods and steps.
  prefs: []
  type: TYPE_NORMAL
- en: PyTorch and Keras/TensorFlow, as well as most other frameworks, are built upon
    the Open Neural Network Exchange (ONNX), an AI ecosystem that establishes standards
    for representing various AI algorithms. ONNX was formulated with the purpose of
    encouraging innovation via conversion of algorithm representations across frameworks.
    Correspondingly, to convert a model from PyTorch to Keras/TensorFlow, the PyTorch
    model is first converted into ONNX format and then from ONNX format to the Keras/TensorFlow
    framework (Figure [2-23](#Fig23)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_2_Chapter/516104_1_En_2_Fig23_HTML.jpg](../images/516104_1_En_2_Chapter/516104_1_En_2_Fig23_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-23
  prefs: []
  type: TYPE_NORMAL
- en: Diagram converting a PyTorch model to a Keras/TensorFlow model
  prefs: []
  type: TYPE_NORMAL
- en: Let’s start by installing PyTorch with `pip install torch`. It can be imported
    as `import torch`.
  prefs: []
  type: TYPE_NORMAL
- en: You can find a list of PyTorch image-based pretrained models at [`https://pytorch.org/vision/stable/models.html`](https://pytorch.org/vision/stable/models.html)
    (note that you can access other non-image-based pretrained models as well). These
    image-based pretrained models can be accessed at `torchvision.models.model_name`.
    You can install TorchVision via pip with `pip install torchvision`.
  prefs: []
  type: TYPE_NORMAL
- en: For the purposes of this example, we will convert the PyTorch implementation
    of the SqueezeNet model into Keras. The 2016 SqueezeNet model focuses on retaining
    model performance while decreasing computational cost, notably by using 1x1 convolutions
    to reduce the number of parameters. The first step is to instantiate the PyTorch
    model (Listing [2-14](#PC14)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: Now that we have instantiated the PyTorch model, we can convert it into a Keras
    model using the `pytorch2keras` model, which can be installed via pip with `pip
    install pytorch2keras`.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s begin by importing the `pytorch_to_keras` function (Listing [2-15](#PC15)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: 'The `pytorch_to_keras` function takes in three arguments: the PyTorch model,
    the input tensor, and the shape of the input tensor (Listing [2-16](#PC16)).'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: The `input_np` variable defines the shape of the input in channels-first format,
    where the “depth” of the image is listed as the first element of the shape. The
    `torch.FloatTensor` and `torch.autograd.Variable` functions convert the shape
    of the numpy array into valid tensor format.
  prefs: []
  type: TYPE_NORMAL
- en: The resulting Keras model can be visualized to double-check that the architecture
    has been transferred correctly and then compiled and fitted.
  prefs: []
  type: TYPE_NORMAL
- en: 'Note that not all PyTorch architectures can be converted into Keras/TensorFlow
    if some layer or operation is not supported for export by ONNX. See a list of
    transferable layers on the `pytorch2keras` GitHub: [`https://github.com/gmalivenko/pytorch2keras`](https://github.com/gmalivenko/pytorch2keras)
    .'
  prefs: []
  type: TYPE_NORMAL
- en: Implementing Simple Self-Supervised Learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this section, we will discuss the implementation of rudimentary level of
    self-supervised learning. You will find that many deep learning concepts are intertwined,
    and thus we need to wait until Chapter [3](516104_1_En_3_Chapter.xhtml) because
    we first need to have a strong grasp of what autoencoders are before we understand
    their effective use in pretraining.
  prefs: []
  type: TYPE_NORMAL
- en: In more complex forms of self-supervised learning, modifications to the architecture
    are performed after the pretraining task often by adding more layers, usually
    to get the output into the desired shape to train on the task dataset or to add
    more processing power. In a simpler application of self-supervised learning, we
    will design our self-supervised pretraining strategy such that no architectural
    changes need to be made after pretraining and before formal training on the task
    dataset.
  prefs: []
  type: TYPE_NORMAL
- en: In order to design a self-supervised pretraining strategy that does not require
    any architecture changes, we need to focus primarily on the input and the output.
    If the shapes of the pretraining task’s *x* and *y* match that of the ultimate
    task’s, then there is no need to alter the architecture to accommodate it.
  prefs: []
  type: TYPE_NORMAL
- en: 'Consider the task of classifying the gender of a person in an image. Here,
    we have *x* = image and *y* = 1-dimensional vector (one value: 0 or 1, indicating
    gender). Thus, our self-supervised pretraining task should similarly require the
    model to take in an image and output one value.'
  prefs: []
  type: TYPE_NORMAL
- en: For this example, the self-supervised pretraining task will be to identify the
    degree of noise. For each training example, we will add Gaussian noise with a
    certain standard deviation, σ. The objective of the model for pretraining is to
    predict the degree of noise, σ, given the noisy image. In order to perform such
    a task, the model would need to identify which features in the model count as
    noise and which ones do not, and thus it works toward discovering and representing
    fundamental structures and patterns in faces. Adding Gaussian noise changes the
    color of the images, not the “location” of certain features; since color determines
    the presence of shadows, edges, and other characteristics that define what a female
    and male face would generally look like, though, a good understanding of common
    relationships between the color of pixels between images would be valuable. Moreover,
    it moves the model closer toward being able to be robust to small perturbations
    and noise.
  prefs: []
  type: TYPE_NORMAL
- en: Fundamentally, at a rudimentary level without architecture changes, building
    self-supervised learning pretraining strategies is concerned primarily with data.
    We can build two datasets – augmented task dataset used for pretraining and a
    task dataset used for formal training – and fit the model on those two datasets,
    in that order. After being trained on the augmented task dataset, ideally the
    model will have developed representations of the “world” it is about to enter
    and can approach the ultimate task more aware and with more complex understandings
    than if it had not undergone pretraining.
  prefs: []
  type: TYPE_NORMAL
- en: To construct the augmented task dataset, we will use the `.map` method of loading
    images from directories into the efficient TensorFlow dataset format (see Chapter
    [1](516104_1_En_1_Chapter.xhtml)). For brevity, here we will provide only the
    function to be mapped in constructing the altered dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Let us first define a function, `parse_file`, which takes in the path of a file
    and uses TensorFlow input/output and image operations to read the image and convert
    it into proper format (Listing [2-17](#PC17)). The function returns a tensor containing
    the information from the image, upon which we can perform operations.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: The `alter_data` function will be the “ultimate function” used in `.map()` (Listing
    [2-18](#PC18)). First, we use the `parse_file` function to collect information
    from the image. Next, we will use TensorFlow’s `tf.random.uniform()` function
    to randomly choose a number from a uniform distribution ranging from 0 to 0.5;
    this will be the standard deviation of the Gaussian noise applied. Using the standard
    deviation and mean 0.0, we will produce a Gaussian noise tensor with the same
    shape as the image. The noise can be applied to the image by adding the image
    tensor and the noise tensor together. Lastly, we return the altered image (which
    now has noise applied to it) and the standard deviation (the label). The task
    dataset has been altered such that the pretrained task is to predict the degree
    of noise applied to the image.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: If you had a multidimensional output, you could also have the model predict
    changes to brightness, hue, etc. – features that are important to this task. TensorFlow
    offers a host of image processing and mathematical operations that you can use
    to alter data. It is best to stick to TensorFlow functions and objects when constructing
    functions to map to avoid errors or computational inefficiency.
  prefs: []
  type: TYPE_NORMAL
- en: We can see the visual results of our alteration (Figure [2-24](#Fig24)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_2_Chapter/516104_1_En_2_Fig24_HTML.jpg](../images/516104_1_En_2_Chapter/516104_1_En_2_Fig24_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-24
  prefs: []
  type: TYPE_NORMAL
- en: Example images from the altered task dataset. The standard deviations of noise
    (labels) for images from left to right are 0.003, 0.186, and 0.304
  prefs: []
  type: TYPE_NORMAL
- en: You can then fit the model (after compiling and performing other necessary steps)
    on the two datasets (Listing [2-19](#PC19)). Note that the number of epochs the
    model uses fitting on the altered task dataset compared to the number of epochs
    used fitting on the task dataset varies significantly by the complexity of the
    task and the design of the altered task dataset, as well as other factors like
    computational resources available and the size of the datasets. If the task is
    immensely complex and the altered task dataset offers difficult to obtain but
    meaningful and deep representations of the task dataset (for instance, modern
    NLP problems), it may be fruitful to train the model on the altered task dataset
    for a significant period of time. On the other hand, in simpler tasks, like in
    this example of classifying the gender of a person in an image, and with altered
    task datasets that offer meaningful representations but are not integral toward
    representing the world of the task dataset, pretraining probably does not need
    to last as long. Getting a feel for the relationship between pretraining and formal
    training takes experience and time, but it’s good to experiment with your unique
    conditions and environment.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: It should also be noted that the altered task dataset and the task dataset in
    this case are different types of problems – the former is a regression problem
    (predicting a continuous value), whereas the latter is a classification problem
    (categorizing an image). In this case, this difference is not a problem because
    all labels in both datasets reside between 0 and 1, meaning that a standard model
    with a sigmoid activation function output can operate on both. Binary cross-entropy
    is also a valid loss function for regression problems bounded between 0 and 1,
    although if you would like you can compile the model with a formally regression-based
    loss function (e.g., MSE, Huber) before training on the altered task dataset and
    recompile the model with binary cross-entropy (or some other loss function for
    classification) before training on the task dataset. In more advanced cases, adjusting
    from the altered task dataset to the task dataset requires making architectural
    modifications. You’ll find examples of this in the second case study of this chapter,
    as well as in Chapter [3](516104_1_En_3_Chapter.xhtml) on autoencoders. With the
    tools of autoencoders, we can perform more complex pretraining strategies, like
    using image-to-image pretraining tasks (e.g., colorization, denoising, resolution
    recovery) to pretrain a model to perform an image-to-vector or image-to-image
    task.
  prefs: []
  type: TYPE_NORMAL
- en: Case Studies
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: These three case studies allow us to explore new ideas and recent research in
    transfer learning and self-supervised learning. Some ideas may be out of the scope
    of this book in terms of implementation but offer fresh perspectives and things
    to think about when designing your deep learning approaches.
  prefs: []
  type: TYPE_NORMAL
- en: 'Transfer Learning Case Study: Adversarial Exploitation of Transfer Learning'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As deep learning models are increasingly deployed in common production, it is
    becoming more important to incorporate the findings from the rising field of adversarial
    learning into deep learning designs. Adversarial learning is concerned with how
    to exploit weaknesses in deep learning models, often by making small changes that
    are imperceptible to the human eye but that completely change the model’s output.
    Vulnerabilities in deep learning can lead to dangerous outcomes – imagine, for
    instance, if malicious or accidental alterations to a traffic sign cause a self-driving
    car to suddenly accelerate or brake.
  prefs: []
  type: TYPE_NORMAL
- en: 'In a 2020 paper entitled “A Target-Agnostic Attack on Deep Models: Exploiting
    Security Vulnerabilities of Transfer Learning,” Shahbaz Rezaei and Xin Liu^([6](#Fn6))
    explore how adversarial learning can be applied to transfer learning. Because
    many modern applications of deep learning use transfer learning, a malicious hacker
    could analyze the architecture and weights of the pretrained model to exploit
    weaknesses in the deployed model.'
  prefs: []
  type: TYPE_NORMAL
- en: Rezaei and Liu show that a hacker, with knowledge only of the pretrained model
    used in the application model, can develop adversarial inputs leading to any desired
    outcome. Because the hacker does not need to know the weights or architecture
    of the application model or the data it was retrained on, the method of attack
    is *target agonistic*, which allows it to exploit wide swaths of deployed deep
    learning models that utilize publicly available pretrained models.
  prefs: []
  type: TYPE_NORMAL
- en: Consider the following model structure, which uses a simple form of transfer
    learning (Figure [2-25](#Fig25)). The input to the model is passed through the
    pretrained model (both convolutional and FC components). The outputs of the pretrained
    model (a three-dimensional vector) are passed through a custom (newly added) FC
    layer, which yields the output (a two-dimensional vector). The weights of the
    FC layer are labeled – for instance, the connection between the top node of the
    pretrained model’s output and the bottom node of the custom FC layer is 4\. For
    the purposes of simplicity, ignore the bias term in each node.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_2_Chapter/516104_1_En_2_Fig25_HTML.jpg](../images/516104_1_En_2_Chapter/516104_1_En_2_Fig25_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-25
  prefs: []
  type: TYPE_NORMAL
- en: Example transfer learning model architecture with hacker visibility marked
  prefs: []
  type: TYPE_NORMAL
- en: The hacker has access only to the pretrained model, not the custom FC layer
    and any operations that process the output of the pretrained model.
  prefs: []
  type: TYPE_NORMAL
- en: Say that the hacker wanted to construct an input that would trigger a certain
    output neuron, like the bottom neuron in the custom FC layer. The hacker can construct
    an input such that the top neuron output of the pretrained model is some very
    large number and all the other output neurons are 0\. When multiplied by the corresponding
    weights, the outputs of the complete model yield 10 and 40; passing through the
    softmax activation function magnifies this difference, and the bottom output neuron
    of the complete model is the final decision of the model, as desired, as it has
    the largest associated value/probability (Figure [2-26](#Fig26)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_2_Chapter/516104_1_En_2_Fig26_HTML.jpg](../images/516104_1_En_2_Chapter/516104_1_En_2_Fig26_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-26
  prefs: []
  type: TYPE_NORMAL
- en: Example transfer learning model architecture with a pretrained model output
    neuron activated to trigger a specific output from the model
  prefs: []
  type: TYPE_NORMAL
- en: Alternatively, if the hacker wanted to activate the top output neuron of the
    complete model, it could design an input such that the output neurons of the pretrained
    model were all zero except for the bottom one, which would be an arbitrarily large
    number (Figure [2-27](#Fig27)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_2_Chapter/516104_1_En_2_Fig27_HTML.jpg](../images/516104_1_En_2_Chapter/516104_1_En_2_Fig27_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-27
  prefs: []
  type: TYPE_NORMAL
- en: Example transfer learning model architecture with a pretrained model output
    neuron activated to trigger a specific output from the model
  prefs: []
  type: TYPE_NORMAL
- en: However, because the hacker does not know the weights outside of the pretrained
    model in the custom FC layer, they can perform a brute-force search to attempt
    to force the model to output a certain result. In this search, the hacker aims
    to construct an input such that the output of the pretrained model is [*a*, 0,
    …, 0, 0] the first time, [0, *a*, …, 0, 0] the second time, and so on until the
    last time, [0, 0, …, 0, *a*], where *a* is some arbitrarily large number. For
    each desired output, some node in the complete network’s output will be activated.
    The hacker simply records which one of the complete network’s output nodes is
    activated for each designed output of the pretrained model.
  prefs: []
  type: TYPE_NORMAL
- en: It should be noted that for this strategy to be capable of activating every
    output node of the complete model, for each output node of the complete model,
    there must exist a connection from an output node of the pretrained model whose
    weight is larger than the connection from the output node of that pretrained model
    to any other output node in the complete model. This may not be true in more complex
    datasets, especially heavy multiclass problems, but in most networks, this strategy
    works to “force” the network to predict almost any desired result.
  prefs: []
  type: TYPE_NORMAL
- en: 'Because the problem has now been boiled down to finding the input to the model
    that will lead to a certain output of the pretrained component, the hacker can
    use methods like gradient descent to solve the following optimization problem:
    *adjust the values of the input image such that the output of the pretrained model
    can as closely match the desired output (minimize error between the output of
    the pretrained model and the desired output)*. In this case, the desired output
    is some case where all the output nodes except for one are zero, and the one nonzero
    node is some very large number. The optimization algorithm begins with a standard
    input image and makes small changes to the image such that the output of the pretrained
    model is the desired output, constructing an adversarial image. Passing this adversarial
    image through a model that uses that pretrained model via transfer learning fools
    it, even though to the human eye no significant changes were made (Figure [2-28](#Fig28)).'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_2_Chapter/516104_1_En_2_Fig28_HTML.jpg](../images/516104_1_En_2_Chapter/516104_1_En_2_Fig28_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-28
  prefs: []
  type: TYPE_NORMAL
- en: 'Left: example input image to the optimization algorithm. Right: example adversarial
    image generated to produce a certain network output. (By Shahbaz Rezaei and Xin
    Liu.)'
  prefs: []
  type: TYPE_NORMAL
- en: Making small, specialized distortions to the original input image results in
    the model making different classifications between the first and second images.
    Moreover, this could be done without any knowledge of the complete networks’ weights
    or architectures – an impressive feat.
  prefs: []
  type: TYPE_NORMAL
- en: As the number of target classes (of the complete neural network) increases,
    the performance of the attack method decreases – but it is still alarmingly high.
    Consider the attack’s performance on a neural network using the VGG face pretrained
    model on the University of Massachusetts Labeled Faces in the Wild (LFW) dataset
    (Table [2-1](#Tab1)).
  prefs: []
  type: TYPE_NORMAL
- en: Table 2-1
  prefs: []
  type: TYPE_NORMAL
- en: 'Metrics of attack performance for different numbers of target classes. Target
    classes: number of target classes/output nodes in the complete neural network.
    NABAC: number of attempts to break all classes, referring to the number of queries
    the attack needs to make to “break” a class (force the model to misclassify an
    item from that class as another class). Effectiveness (x%): the ratio of adversarial
    inputs that trigger a target class with x% confidence to the total number of adversarial
    inputs. (By Shahbaz Rezaei and Xin Liu.)'
  prefs: []
  type: TYPE_NORMAL
- en: '| Target Classes | NABAC | Effectiveness (95%) | Effectiveness (99%) |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| 5 | 48.25 ± 42.5 | 91.68% ± 5.69 | 87.82% ± 6.98 |'
  prefs: []
  type: TYPE_TB
- en: '| 10 | 149.97 ± 132.15 | 88.87% ± 2.46 | 83.07% ± 3.31 |'
  prefs: []
  type: TYPE_TB
- en: '| 15 | 323.36 ± 253.56 | 87.79%± 2.42 | 82.08% ± 2.74 |'
  prefs: []
  type: TYPE_TB
- en: '| 20 | 413 | 87.17% | 79.16% |'
  prefs: []
  type: TYPE_TB
- en: As the number of target classes increases, the attack needs to make more queries
    to break all classes, and its effectiveness decreases.
  prefs: []
  type: TYPE_NORMAL
- en: In the simplified example, only one fully connected layer was added after the
    pretrained model. While this is one method of integrating the pretrained model
    into the model structure, often many more layers are added. As the number of layers
    added afterward increases, performance also decreases (Table [2-2](#Tab2)).
  prefs: []
  type: TYPE_NORMAL
- en: Table 2-2
  prefs: []
  type: TYPE_NORMAL
- en: Metrics of attack performance for different numbers of layers. (By Shahbaz Rezaei
    and Xin Liu.)
  prefs: []
  type: TYPE_NORMAL
- en: '| **# New Layers** | **NABAC** | **Effectiveness (95%)** | **Effectiveness
    (99%)** |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| 1 | 48.25 ± 42.5 | 91.68% ± 5.69 | 87.82% ± 6.98 |'
  prefs: []
  type: TYPE_TB
- en: '| 2 | 51.87 ± 39.94 | 91.57% ± 4.87 | 86.45% ± 5.35 |'
  prefs: []
  type: TYPE_TB
- en: '| 3 | 257.26 ± 387.16 | 89% ± 8.20 | 85.67% ± 8.88 |'
  prefs: []
  type: TYPE_TB
- en: Nevertheless, the effectiveness is high, even as the number of target classes
    and new layers increases. This study is an interesting investigation into the
    implications of transfer learning for the deployment of models in real-world applications.
    It’s important to keep an eye toward deployment and the model’s role in the real
    world rather than in an airtight experimentation laboratory environment when designing
    deep learning approaches.
  prefs: []
  type: TYPE_NORMAL
- en: This overview was a simplification of the study; to read more, you can find
    the paper at [`https://openreview.net/pdf?id=BylVcTNtDS`](https://openreview.net/pdf%253Fid%253DBylVcTNtDS).
  prefs: []
  type: TYPE_NORMAL
- en: 'Self-Supervised Learning Case Study: Predicting Rotations'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In “Unsupervised Representation Learning by Predicting Image Rotations,” Spyros
    Gidaris, Praveer Singh, and Nikos Komodakis^([7](#Fn7)) propose a simple self-supervised
    learning method that develops strong representations of the data and yields effective
    results.
  prefs: []
  type: TYPE_NORMAL
- en: Gidaris et al. propose a pretraining strategy in which images are randomly rotated
    by 0, 90, 180, or 270 degrees and the model predicts the angle by which the image
    was rotated. The core intuition behind the design of the rotation-based self-supervised
    learning pretraining strategy is that the model must first understand the concept
    of the model depicted in the images in order to identify the rotation that was
    applied to the image. A successful model, moreover, has a sense of the “natural
    orientation” of an object, and thus have gravity and other forces should act on
    objects in an image.
  prefs: []
  type: TYPE_NORMAL
- en: '*…it is essentially impossible for a ConvNet model to effectively perform the
    above rotation recognition task unless it has first learnt to recognize and detect
    classes of objects as well as their semantic parts in images. More specifically,
    to successfully predict the rotation of an image the ConvNet model must necessarily
    learn to localize salient objects in the image, recognize their orientation and
    object type, and then relate the object orientation with the dominant orientation
    that each type of object tends to be depicted within the available images.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: —Gidaris et al., “Unsupervised Representation Learning by Predicting Image Rotations”
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: With no access to the original, unrotated image, given an image rotated θ degrees
    (chosen from θ = 0°, 90°, 180°, 270°), the network must maximize the probability
    that the image is rotated θ degrees (Figure [2-29](#Fig29)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_2_Chapter/516104_1_En_2_Fig29_HTML.jpg](../images/516104_1_En_2_Chapter/516104_1_En_2_Fig29_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-29
  prefs: []
  type: TYPE_NORMAL
- en: The convolutional neural network’s prediction objectives under self-supervised
    learning by predicting rotations. (By Gidaris et al.)
  prefs: []
  type: TYPE_NORMAL
- en: To visually see the difference in the learned representations for self-supervised
    learning as opposed to standard supervised learning (only training the model on
    the task dataset without constructing a pretraining task), Gidaris et al. visualize
    the attention maps from a model trained with a standard supervised procedure and
    another trained with a self-supervised procedure (Figure [2-30](#Fig30)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_2_Chapter/516104_1_En_2_Fig30_HTML.jpg](../images/516104_1_En_2_Chapter/516104_1_En_2_Fig30_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-30
  prefs: []
  type: TYPE_NORMAL
- en: Attention maps from various layers from a supervised model and a self-supervised
    model given three example input images. (By Gidaris et al.)
  prefs: []
  type: TYPE_NORMAL
- en: The attention map of a convolutional layer can be found by computing the feature
    maps for that layer and aggregating them. You can visually see that the attention
    maps from the self-supervised model focus more on the high-level objects, like
    the eyes, nose, tails, and heads – in accordance with important features required
    to perform object recognition.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: You can perform something similar by extracting features from a layer in the
    middle of a neural network in Keras by referring to individual layers (assuming
    each layer is associated with a variable you defined using the Functional API).
    Visualizing layer weights and features can be helpful to understanding the improvement
    in representation capabilities that self-supervised learning provides.
  prefs: []
  type: TYPE_NORMAL
- en: Interestingly, Gidaris et al. find that classifying 0°-90°-180°-270° rotations
    performs better than other rotations, like 0°-180° rotations, 90°-270° rotations,
    and 0°-45°-90°-135°-180°-225°-270°-315° (Table [2-3](#Tab3)). This result highlights
    the importance of experimenting with variations of self-supervised strategies
    to explore which ones perform the best for your particular problem and approach.
  prefs: []
  type: TYPE_NORMAL
- en: Table 2-3
  prefs: []
  type: TYPE_NORMAL
- en: Performance on CIFAR-10 classification for different rotations needed for prediction.
    (By Gidaris et al.)
  prefs: []
  type: TYPE_NORMAL
- en: '| # Rotations | Rotations | CIFAR-10 Classification Accuracy |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| 8 | 0°-45°-90°-135°-180°-225°-270°-315° | 88.51 |'
  prefs: []
  type: TYPE_TB
- en: '| 4 | 0°-90°-180°-270° | **89.06** |'
  prefs: []
  type: TYPE_TB
- en: '| 2 | 0°-180° | 87.46 |'
  prefs: []
  type: TYPE_TB
- en: '| 2 | 90°-270° | 85.52 |'
  prefs: []
  type: TYPE_TB
- en: We can implement self-supervised learning via predicting rotations relatively
    easily. We will use the CIFAR-10 dataset, which can be loaded directly from Keras
    datasets with (x_train, y_train), (x_test, y_test) = keras.datasets.cifar10.load_data().
    The first step after loading data is to generate self-supervised altered task
    data, in this case predicting which degree the image has been rotated (Listing
    [2-20](#PC20)). Although there are more efficient methods, we will simply loop
    through every data instance in x_train, randomly rotate it by 0, 90, 180, or 270
    degrees, and save the rotated image and corresponding label into a new list. The
    scipy library’s scipy.ndimage.rotate(img, deg) allows us to easily perform rotations.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: We’ll use the EfficientNetB4 architecture (not using its weights) to predict
    which one of four rotations was applied (Listing [2-21](#PC21)). Note that the
    output of the EfficientNetB4 architecture is 100-dimensional, which is projected
    via the final layer out into the four desired outputs. A more efficient approach,
    at first glance, may seem to simply define the number of output classes in the
    base EfficientNetB4 model to be 4\. We will see soon why this design instead is
    required for this sort of self-supervised learning operation.
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, we use input_tensor=inp rather than the input_shape=(a,b,c) and
    base_model(params)(inp) syntax discussed prior. If we were to use the latter method,
    the variable base would store a tensor (i.e., the output of the model) rather
    than the model itself. We need to be able to access the EfficientNet base model
    to transfer it into a new architecture after the self-supervised process has been
    completed.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: The model can be compiled and fitted on the altered task dataset (Listing [2-22](#PC22)).
    In this case, because the dataset is so small (largely because of the small image
    resolution rather than the number of items in the dataset), passing numpy arrays
    suffices and no TensorFlow dataset conversions are needed.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: 'After fitting on the altered task dataset, though, we run into a problem: the
    current model outputs only four values, since the altered task dataset had four
    unique labels, but the task dataset (i.e., the formal CIFAR-10) dataset has ten
    classes. This requires an architectural modification.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Herein lies the reason behind defining a specialized output layer for the altered
    task dataset and not specifying `classes=4` in the base EfficientNetB4 model when
    training on the altered task dataset: we can extract the base model and attach
    it to a new output layer with ten classes, as follows (Listing 23). Moreover,
    because we defined `base` to be a model rather than an output tensor, we can connect
    it via the input easily via `base(inp)`.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: If we instead had trained a base model with output four classes and attached
    another output layer with ten classes afterward, which is another technically
    available option (in that the code runs), performance would likely be poor due
    to the bottleneck imposed by the four-class output. In this case, think of the
    EfficientNet model not as outputting 100 classes but as outputting 100 features
    that are compiled and used to make decisions in the output layer. The base model
    still contains all the weights learned from self-supervised learning. The new
    model can then be compiled and trained on the task dataset.
  prefs: []
  type: TYPE_NORMAL
- en: This self-supervised learning approach drastically improves the state-of-the-art
    results on unsupervised feature learning for a variety of object detection tasks,
    including ImageNet, PASCAL, and CIFAR-10.
  prefs: []
  type: TYPE_NORMAL
- en: The work of Gidaris et al. points to the existence of simple yet effective approaches
    to apply self-supervised learning to boost deep learning model performance.
  prefs: []
  type: TYPE_NORMAL
- en: 'Self-Supervised Learning Case Study: Learning Image Context and Designing Nontrivial
    Pretraining Tasks'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Earlier , we discussed relatively simpler self-supervised learning examples,
    like adding noise to the task dataset and pretraining the model to predict the
    degree of noise. Other examples were simple conceptually (although perhaps difficult
    to implement or accomplish), like pretraining the model to colorize grayscale
    images. While sometimes simpler self-supervised strategies like predicting the
    degree of rotation are effective, in other occasions for a bigger performance
    boost, a more complex pretraining task needs to be used.
  prefs: []
  type: TYPE_NORMAL
- en: Carl Doersch, Abhinav Gupta, and Alexei A. Efros propose a complex, creative,
    and effective self-supervised learning pretraining task in their 2016 paper, “Unsupervised
    Visual Representation Learning by Context Prediction.”^([8](#Fn8)) Their design
    is a great case study of the implications and possibilities that need to be considered
    to design a successful self-supervised pretraining strategy.
  prefs: []
  type: TYPE_NORMAL
- en: In the context prediction pretraining task, the model must predict the relative
    location, or the context, of one patch to another (Figure [2-31](#Fig31)). Patches
    are small, square-shaped regions of the image. The model is fed a base patch (outlined
    in blue) and a neighboring patch selected from the eight regions around the base
    patch (outlined in dotted red) and trained to predict the location of the neighboring
    patch in relation to the base patch. In the example, the label would be “top left.”
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_2_Chapter/516104_1_En_2_Fig31_HTML.jpg](../images/516104_1_En_2_Chapter/516104_1_En_2_Fig31_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-31
  prefs: []
  type: TYPE_NORMAL
- en: Example context and patch relationships
  prefs: []
  type: TYPE_NORMAL
- en: Each general direction that could describe the location of a neighboring patch
    relative to the base patch is associated with a number. Thus, the model takes
    in two images (the base patch and the neighboring patch) and outputs a vector
    indicating which region relative to the base patch the neighboring patch is most
    likely to be located (Figure [2-32](#Fig32)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_2_Chapter/516104_1_En_2_Fig32_HTML.jpg](../images/516104_1_En_2_Chapter/516104_1_En_2_Fig32_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-32
  prefs: []
  type: TYPE_NORMAL
- en: Assigning numbers to neighbor patch directions
  prefs: []
  type: TYPE_NORMAL
- en: To perform this pretraining task, Doersch et al. constructed a multi-input network
    that takes in two inputs, processes the images through a series of image-based
    layers in separate “branches,” merges the two branches, processes the merged results,
    and outputs the location of one input relative to the other (Figure [2-33](#Fig33)).
    Dotted lines in Figure [2-33](#Fig33) indicate shared weights, which means that
    the weights for the two layers are the same. We’ll discuss multi-input networks,
    branching, and weight sharing in later chapters.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_2_Chapter/516104_1_En_2_Fig33_HTML.jpg](../images/516104_1_En_2_Chapter/516104_1_En_2_Fig33_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-33
  prefs: []
  type: TYPE_NORMAL
- en: Two-input architecture used to perform the pretraining task
  prefs: []
  type: TYPE_NORMAL
- en: This pretraining task, at least in theory, requires a deep understanding of
    the core features of certain items and the high-level relationships between attributes
    of objects. This makes it difficult, even for humans. Try answering these two
    visual questions (Figure [2-34](#Fig34)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_2_Chapter/516104_1_En_2_Fig34_HTML.jpg](../images/516104_1_En_2_Chapter/516104_1_En_2_Fig34_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-34
  prefs: []
  type: TYPE_NORMAL
- en: Example “questions” with two patch pairs of inputs
  prefs: []
  type: TYPE_NORMAL
- en: However, Doersch et al. found that the neural network was learning “trivial
    solutions” – that is, it was finding shortcuts and easy approaches to the pretraining
    task that were not related to the concepts Doersch et al. had hoped it would learn.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, low-level cues like boundary patterns or the continuation of textures
    across patches serve as trivial shortcuts that the neural network can exploit
    without learning the high-level relationships it would ideally learn. To address
    this, Doersch et al. added both a gap between patches about half the length of
    the patch width and a random “jitter” for each patch location by up to 7 pixels.
    (These are shown visually in Figure [2-32](#Fig32).) With these modifications,
    the network could not reliably exploit trivial shortcuts like the continuation
    of textures and lines.
  prefs: []
  type: TYPE_NORMAL
- en: 'However, another unexpected problem arose: a phenomenon called chromatic aberration,
    in which light rays pass through a lens focus at different points depending on
    their wavelength. Thus, in camera lenses that are affected by chromatic aberration,
    one color – usually green – is “shrunk” toward the center of the image relative
    to other color channels (red and blue). The network can thus parse the absolute
    location of patches by detecting the shape and position of the separation between
    green and magenta (the color comprising the non-green color channels, red and
    blue). Finding the relative position given knowledge about the absolute location
    of two patches thus becomes a trivial task.'
  prefs: []
  type: TYPE_NORMAL
- en: To address this, Doersch et al. randomly dropped two of three color channels
    from each patch and replaced the dropped channels with Gaussian noise. This method
    prevents the neural network from exploiting information in the color channels
    and instead to focus on the general shapes and edges – the higher-level features
    – in its pretraining task.
  prefs: []
  type: TYPE_NORMAL
- en: By making modifications to the architecture, like only using one “branch” and
    adding more convolutional layers, Doersch et al. converted the two-image-to-vector
    architecture into an image-to-vector architecture. The authors tested this pretrained
    architecture on the PASCAL Visual Object Classes (VOC) Challenge and found that
    this self-supervised learning strategy was the best result without using labels
    not included in the dataset (to their knowledge, and at the time of paper release).
    The authors found in other datasets that this context prediction task yielded
    a significant boost to model performance.
  prefs: []
  type: TYPE_NORMAL
- en: This paper is both an example of a well-thought-out self-supervised learning
    pretraining task and of the process of modifying the pretraining task to accomplish
    the ultimate objective by discouraging trivial solutions. Self-supervised learning
    offers us a clever way to find, extract, and utilize rich insights and information
    without needing to search for costly labels and wandering outside of the dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Key Points
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In this chapter, we discussed the intuition and implementation behind pretraining,
    transfer learning, and self-supervised learning:'
  prefs: []
  type: TYPE_NORMAL
- en: Pretraining is a task that is performed before the formal training of a model
    and can orient the model toward better performing on its ultimate task.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Because pretraining moves the model into a more convenient location in the
    loss landscape, it can arrive at a better solution more quickly than a model without
    pretraining. Thus, pretraining generally has two key advantages that boost model
    performance: decreased time and better metric scores.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Transfer learning uses two separate datasets – a general dataset and a task
    dataset. The model is first trained on the general dataset, and then the learned
    weights and “skills” from the task are transferred to another model that is trained
    on the task dataset. Pretrained models are often kept in publicly available repositories
    and can be accessed and used in your own model.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Image-based pretrained models generally consist of two components: a feature
    extraction component and a fully connected component (the “top”). You can (a)
    keep only the feature extraction component and build a custom FC component, (b)
    keep both the feature extraction component and the fully connected component only,
    or (c) keep both the feature extraction component and the FC component, but add
    more layers afterward.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Layer freezing allows you to selectively train certain parts of a model using
    transfer learning to better take advantage of pretrained weights. Usually, weights
    from the pretrained model are frozen and the custom added layers are trained.
    After this step, sometimes the pretrained model is unfrozen and the entire network
    is trained to fine-tune on the data.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Keras/TensorFlow has built in a repository of pretrained models organized into
    modules, in which each module contains the pretrained model(s) and associated
    functions (usually for encoding and decoding). Important pretrained models include
    the ResNet family, the InceptionV3 model, the MobileNet family, and the EfficientNet
    family. Keras/TensorFlow models are pretrained on the ImageNet dataset. You can
    also convert PyTorch models into Keras/TensorFlow models to take advantage of
    PyTorch’s large repository of pretrained models.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Self-supervised learning uses pretrains on an altered task dataset derived from
    input data of the task dataset. The *x* and *y* of the altered task dataset come
    completely from only the *x* of the task dataset, often by performing distortions
    or actions to generate labels. Self-supervised learning helps orient the model
    to representing and understanding the “world” of the dataset so it is prepared
    to understand the dynamics and core features of the task dataset.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Self-supervised learning is especially valuable for training on small datasets
    with few labels, or when there is an abundance of unlabeled data that otherwise
    would not have been used.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: There are two key differences between transfer learning and self-supervised
    learning. Firstly, the pretraining dataset and the task dataset generally come
    from completely different sources in transfer learning, whereas in self-supervised
    learning, the pretraining dataset is derived from the input data of the task dataset.
    Secondly, transfer learning aims to develop “skills,” while self-supervised learning
    encourages “representations of the world.”
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Although we implemented relatively simple models and methods in this chapter,
    with these conceptual tools and the design intuition of what transfer learning
    and self-supervised learning are, you will be able to build many more complex
    training structures, like stacking pretrained models (“double transfer learning”)
    or designing innovative self-supervised pretraining methods.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we’ll expand upon our study of advanced neural network
    structures and manipulations with autoencoders, a versatile tool often used in
    developing successful training structures.
  prefs: []
  type: TYPE_NORMAL
