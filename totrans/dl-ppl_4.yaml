- en: The head() of the data after some preprocessing
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE37]'
  prefs: []
  type: TYPE_PRE
- en: Now let’s transform the person, alone, and embarked to one-hot encoded columns.
    If you do not know what one-hot encoded means, you can search for it. It’s a type
    of transformation that basically transforms any column to a binary format.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE38]'
  prefs: []
  type: TYPE_PRE
- en: Also, we will transform the `Pclass` to on-hot-encoding form and rename its
    columns `class_1`, `class_2`, and `class_3`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE39]'
  prefs: []
  type: TYPE_PRE
- en: The processing step that we will apply to Age is very simple; we will remove
    the percent of it, as there’s is no age 20.2\. We can achieve this by calling
    `ceil()` and applying it to the age.
  prefs: []
  type: TYPE_NORMAL
- en: And we will do the same processing step to the Fare column too.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE40]'
  prefs: []
  type: TYPE_PRE
- en: Now, we will add all the new columns to our dataset. Using the `concat()` function
    , we can add columns to DataFrame with an `axis=1` parameter, and rows with `axis=0`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE41]'
  prefs: []
  type: TYPE_PRE
- en: Now, let us drop all the useless columns from the DataFrame, and all the repeated/correlated
    (e.g., the `Pclass` and its classes) columns too.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE42]'
  prefs: []
  type: TYPE_PRE
- en: At last, after finishing cleaning and extracting knowledge from this dataset,
