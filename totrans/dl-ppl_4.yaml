  type: TYPE_PRE
- en: Now we need to test if the model that we loaded is working correctly, so we
    will load a test image and feed it to the model and see the output.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig18_HTML.jpg](Images/484548_1_En_15_Fig18_HTML.jpg)'
