  type: TYPE_PRE
- en: As you see in Figure [15-19](#Fig19), the network output extracted the pedestrians
    exactly. It even extracted the person who is inside the car on the right. Isn’t
    that awesome work? But it’s not only pedestrians/persons that the network extracts;
