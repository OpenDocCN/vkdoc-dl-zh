- en: Case Study—Image Segmentation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You might wonder what image segmentation is. In computer vision, image segmentation
    is the process of partitioning a digital image into multiple segments. The goal
    of segmentation is to simplify and/or change the representation of an image into
    something that is more meaningful and easier to analyze. Let’s understand image
    segmentation using a simple example. Consider Figure [15-15](#Fig15).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig15_HTML.jpg](Images/484548_1_En_15_Fig15_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 15-15
  prefs: []
  type: TYPE_NORMAL
- en: An example image that we are going to segment
  prefs: []
  type: TYPE_NORMAL
- en: We can divide or partition the image into various parts called segments. It’s
    not a great idea to process the entire image at the same time, as there will be
    regions in the image that do not contain any information. By dividing the image
    into segments, we can make use of the important segments for processing the image.
    That, in a nutshell, is how image segmentation works.
  prefs: []
  type: TYPE_NORMAL
- en: 'An image is a collection or set of different pixels. We group together the
    pixels that have similar attributes, using image segmentation. Take a moment to
    look at Figure [12-16](#Fig16) (it’ll give you a practical idea of image segmentation):'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig16_HTML.jpg](Images/484548_1_En_15_Fig16_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 15-16
  prefs: []
  type: TYPE_NORMAL
- en: The difference between object detection and instance segmentation
  prefs: []
  type: TYPE_NORMAL
- en: So, let’s now build an application that is able to segment any image and extract
    instances from it. To start doing this, we need to import all the packages we
    are going to use. It seems that there’s a new package, `skimage` ; this package
    contains a lot of operations that help you to deal with images data.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE68]'
  prefs: []
  type: TYPE_PRE
- en: Now we need to illustrate a new architecture model called Mask R-CNN. Data scientists
    and researchers at Facebook AI Research (FAIR) pioneered a deep learning architecture,
    called Mask R-CNN, which can create a pixel-wise mask for each object in an image.
    This is a really cool concept, so follow along closely!
  prefs: []
  type: TYPE_NORMAL
- en: 'Mask R-CNN is an extension of the popular Faster R-CNN object detection architecture.
    Mask R-CNN adds a branch to the already existing Faster R-CNN outputs. The Faster
    R-CNN method generates two things for each object in the image:'
  prefs: []
  type: TYPE_NORMAL
- en: Its class
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The bounding box coordinates
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Mask R-CNN adds a third branch to this that outputs the object mask as well.
    Take a look at Figure [15-17](#Fig17) to get an inside look at how Mask R-CNN
    works.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_15_Chapter/484548_1_En_15_Fig17_HTML.jpg](Images/484548_1_En_15_Fig17_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 15-17
  prefs: []
  type: TYPE_NORMAL
- en: How Mask R-CNN works
  prefs: []
  type: TYPE_NORMAL
- en: We take an image as input and pass it to the ConvNet, which returns the feature
    map for that image
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The region proposal network (RPN) is applied on these feature maps. This returns
    the object proposals along with their object score.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: An RoI pooling layer is applied on these proposals to bring down all the proposals
    to the same size.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Finally, the proposals are passed to a fully connected layer to classify and
    output the bounding boxes for objects. It also returns the mask for each proposal.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'First, we will download the model that we are going to use from GitHub by using
    the command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE69]'
  prefs: []
  type: TYPE_PRE
- en: Then we should set the path of the model, to make sure our code sees the model
    downloaded.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE70]'
  prefs: []
  type: TYPE_PRE
- en: Then we will import the model and its visualization and utilities.
  prefs: []
  type: TYPE_NORMAL
