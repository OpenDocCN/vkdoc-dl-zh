- en: The image contains some pedestrians that the network should extract
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE75]'
  prefs: []
  type: TYPE_PRE
- en: 'As you can see in Figure [15-18](#Fig18), the image contains many objects,
    and the network should extract the objects and classify their labels. When Mask
    R-CNN extracts each object, it generates the bond box of the object to tell where
    the object is, and its label too. There’s another output that we consider amazing:
    it creates a mask-like boundary over the object. To do that, the network classifies
    each pixel as to whether it belongs to the given object or not.'
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s see the Mask R-CNN output; to do that, we write a simple line of code
    that makes the network prediction work.
