- en: Introduction
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 引言
- en: We apply the TensorFlow end-to-end open source platform within the Google Colaboratory
    (Colab) ecosystem to demonstrate state-of-the-art deep neural network models with
    hands-on Python code exercises for intermediate to advanced Python users. The
    Colab ecosystem is a product from Google Research that allows anybody to write
    and execute arbitrary Python code through a browser. The ecosystem is especially
    suited to deep learning, data analytics, research, and machine learning education
    applications. The Colab ecosystem is a hosted Jupyter notebook service that requires
    no setup to use while providing free access to powerful computing resources such
    as Graphics Processing Units (GPUs) and Tensor Processing Units (TPUs).
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在Google Colaboratory（Colab）生态系统中应用TensorFlow端到端开源平台，通过实际操作的Python代码练习，为中级到高级Python用户展示最新的深度神经网络模型。Colab生态系统是谷歌研究的产品，它允许任何人通过浏览器编写和执行任意Python代码。该生态系统特别适合深度学习、数据分析、研究和机器学习教育应用。Colab生态系统是一个托管Jupyter笔记本服务，无需设置即可使用，同时提供免费访问强大的计算资源，如图形处理单元（GPU）和张量处理单元（TPU）。
- en: The book is organized into 14 chapters. Chapter [1](512350_1_En_1_Chapter.xhtml)
    introduces you to TensorFlow input pipelines with the tf.data application programming
    interface (API), which enables you to build complex input pipelines from simple,
    reusable pieces. Input pipelines are the lifeblood of any deep learning experiment
    because learning models expect data in a TensorFlow consumable form. Chapter [2](512350_1_En_2_Chapter.xhtml)
    leverages input pipelines to create augmented data experiments that increase the
    diversity of a training set by applying random (but realistic) transformations.
    Chapter [3](512350_1_En_3_Chapter.xhtml) introduces TensorFlow Datasets to you.
    TensorFlow offers over 255 practice datasets that are preprocessed for consumption
    by deep learning models. These datasets are created by the Google Brain TensorFlow
    team to provide a diverse set of data for practicing machine and deep learning
    experiments. Chapter [4](512350_1_En_4_Chapter.xhtml) demonstrates two end-to-end
    deep learning experiments with large and complex TensorFlow dataset (TFDS) objects.
    Chapter [5](512350_1_En_5_Chapter.xhtml) introduces TPUs with code examples. A
    Tensor Processing Unit is an application-specific integrated circuit (ASIC) designed
    to accelerate machine learning workloads. Chapter [6](512350_1_En_6_Chapter.xhtml)
    introduces transfer learning. Transfer learning is the process of creating new
    learning models by fine-tuning previously trained neural networks. Chapter [7](512350_1_En_7_Chapter.xhtml)
    leverages the transfer learning knowledge from Chapter [6](512350_1_En_6_Chapter.xhtml)
    to work on advanced transfer learning experiments. Chapter [8](512350_1_En_8_Chapter.xhtml)
    shifts focus from supervised learning to unsupervised learning algorithms beginning
    with simple stacked autoencoders. Chapter [9](512350_1_En_9_Chapter.xhtml) introduces
    advanced autoencoders including convolutional neural network autoencoders and
    variational autoencoders. Chapter [10](512350_1_En_10_Chapter.xhtml) introduces
    basic generative modeling with a generative adversarial network (GAN) experiment.
    Chapter [11](512350_1_En_11_Chapter.xhtml) dives into more advanced generative
    modeling with a Progressive Growing GAN experiment. Chapter [12](512350_1_En_12_Chapter.xhtml)
    shifts to computer visioning with a neural style transfer experiment. Chapter
    [13](512350_1_En_13_Chapter.xhtml) delves into more advanced computer visioning
    with an object detection experiment. Chapter [14](512350_1_En_14_Chapter.xhtml)
    ends the book with a very simple reinforcement learning experiment.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 本书分为14章。第[1](512350_1_En_1_Chapter.xhtml)章向您介绍了使用tf.data应用程序编程接口（API）的TensorFlow输入管道，该接口使您能够从简单的、可重用的组件构建复杂的输入管道。输入管道是任何深度学习实验的生命线，因为学习模型期望以TensorFlow可消费的形式接收数据。第[2](512350_1_En_2_Chapter.xhtml)章利用输入管道创建增强数据实验，通过应用随机（但真实）的变换来增加训练集的多样性。第[3](512350_1_En_3_Chapter.xhtml)章向您介绍了TensorFlow
    Datasets。TensorFlow提供了超过255个预处理的实践数据集，这些数据集是为深度学习模型消费而准备的。这些数据集由Google Brain TensorFlow团队创建，以提供多样化的数据集，用于练习机器和深度学习实验。第[4](512350_1_En_4_Chapter.xhtml)章展示了使用大型和复杂的TensorFlow数据集（TFDS）对象进行的两个端到端深度学习实验。第[5](512350_1_En_5_Chapter.xhtml)章通过代码示例介绍了TPUs。Tensor
    Processing Unit是一种专为加速机器学习工作负载而设计的专用集成电路（ASIC）。第[6](512350_1_En_6_Chapter.xhtml)章介绍了迁移学习。迁移学习是通过微调先前训练的神经网络来创建新的学习模型的过程。第[7](512350_1_En_7_Chapter.xhtml)章利用第[6](512350_1_En_6_Chapter.xhtml)章中迁移学习的知识来开展高级迁移学习实验。第[8](512350_1_En_8_Chapter.xhtml)章将重点从监督学习转移到无监督学习算法，从简单的堆叠自编码器开始。第[9](512350_1_En_9_Chapter.xhtml)章介绍了包括卷积神经网络自编码器和变分自编码器在内的高级自编码器。第[10](512350_1_En_10_Chapter.xhtml)章通过生成对抗网络（GAN）实验介绍了基本的生成建模。第[11](512350_1_En_11_Chapter.xhtml)章通过渐进式增长GAN实验深入探讨了更高级的生成建模。第[12](512350_1_En_12_Chapter.xhtml)章转向计算机视觉，通过神经风格迁移实验进行。第[13](512350_1_En_13_Chapter.xhtml)章通过目标检测实验深入探讨了更高级的计算机视觉。第[14](512350_1_En_14_Chapter.xhtml)章以一个非常简单的强化学习实验结束本书。
