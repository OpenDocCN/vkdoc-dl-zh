- en: Let’s build an autoencoder to denoise this data (Listing [8-28](#PC29)). There
    is no difference between the architecture of the autoencoder used here and in
    previous applications; the difference rather is in the data that we pass in (namely,
    that the input should have artificial noise applied). In this implementation,
    we compute new noise in each epoch. This is desired because it provides “fresh”
    noise that the denoising autoencoder must learn to denoise rather than to “accept”/”memorize.”
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE28]'
  prefs: []
  type: TYPE_PRE
