- en: t-SNE projection of a latent space for an autoencoder with a bottleneck size
    of two nodes trained on MNIST. Note that in this case, we are projecting into
    a number of dimensions (2) equal to the dimensionality of the original dataset
    (2), hence the pretty snake-like arrangements
  prefs: []
