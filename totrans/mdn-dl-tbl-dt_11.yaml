    pertaining to the given dataset.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig63b_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8-63
  prefs: []
  type: TYPE_NORMAL
- en: Sampled original inputs (left), latent space (middle), and reconstruction (right)
    for a sparse autoencoder trained on the Mice Protein Expression dataset. The latent
    space is 256 neurons reshaped into a 16-by-16 grid for viewing; the input and
    reconstruction are 80 dimensions arranged into 8-by-10 grids
  prefs: []
  type: TYPE_NORMAL
- en: Why would you want to use sparse autoencoders? The primary reason is to take
    advantage of sparse encoders’ robustness properties. Adversarial examples are
    instances generated to deliberately fool a neural network into some image originally
    correctly classified as class *A* into class *B* with high confidence simply by
    making miniscule, barely visible changes to the input. The canonical example in
    the field is a diagram created by Ian Goodfellow et al. in the paper “Explaining
    and Harnessing Adversarial Examples.” The Fast Signed Gradient Method (FSGM) generates
    a permutation matrix that adjusts every pixel in the input in a way that significantly
    changes the network’s final prediction (Figure [8-64](#Fig64)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig64_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A mathematical expression. The first input is the photograph of a panda, the
    second one is a nematode and the output is a gibbon which is depicted by a panda.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-64
  prefs: []
  type: TYPE_NORMAL
- en: Demonstration of the FSGM method. From “Explaining and Harnessing Adversarial
    Examples,” Goodfellow et al.
  prefs: []
  type: TYPE_NORMAL
- en: Adversarial example finders profit from continuity and gradients. Because neural
    networks operate in very large continuous spaces, adversarial examples can be
    found by “sneaking” through smooth channels and ridges in the surface of the landscape.
    Adversarial examples can be security threats (some instances of naturally occurring
    adversarial examples, like tape placed onto a traffic sign in a particular orientation
    causing egregious misidentification), as well as potential symptoms of poor generalization.^([1](#Fn1))
    However, sparse encoders impose a discreteness upon the encoded space. It becomes
    significantly more difficult to generate successful adversarial examples when
    a frozen encoder is used as the feature extractor for a network.
  prefs: []
  type: TYPE_NORMAL
- en: Sparse autoencoders can also be useful for the purposes of interpretability.
    We’ll talk more about specialized interpretability techniques later in this chapter,
    but sparse autoencoders can be easily interpreted without additional complex theoretical
    tools. Because only a few neurons are active at any one time, understanding which
    neurons are activated for any one input is relatively simple, especially compared
    with the latent vectors generated by standard autoencoders.
  prefs: []
  type: TYPE_NORMAL
- en: Denoising and Reparative Autoencoders
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'So far, we’ve only considered applications of autoencoder training in which
    the desired output is identical to the input. However, autoencoders can perform
    another function: to repair or restore a damaged or noisy input.'
  prefs: []
  type: TYPE_NORMAL
- en: Here’s the clever way we go about it – we artificially add realistic noise or
    corruption to a “pure”/”clean” dataset and then train the model to recover the
    cleaned image from its artificially corrupted version (Figure [8-65](#Fig65)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig65_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flow diagram represents the training dataset to recover a clean image from
    the artificially corrupted image.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-65
  prefs: []
  type: TYPE_NORMAL
- en: Deriving a noisy image as input and the original clean image as the desired
    output of a denoising autoencoder
  prefs: []
  type: TYPE_NORMAL
- en: There are many applications for such a model. We can use it, most obviously,
    to denoise a noisy input; the “cleaned” input can then be used for other purposes.
    Alternatively, if we are developing a model that we know will operate in a domain
    with lots of noisy data, we can use the encoder of a denoising autoencoder as
    a robust or resilient feature extractor (similarly to in autoencoder pretraining),
    exploiting the encoder’s “denoised” latent representations (Figure [8-66](#Fig66)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig66_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flow diagram depicts the functioning of the denoising autoencoder. It has
    the labels input data, denoising autoencoder, model and task output.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-66
  prefs: []
  type: TYPE_NORMAL
- en: A potential application of denoising autoencoders as a structure that learns
    to clean up the input before it is actually used in a model for a task
  prefs: []
  type: TYPE_NORMAL
- en: These reparative models have particularly exciting applications for intelligent
    or deep graphics processing. Many graphics operations are not *trivially two-way
    invertible* in that it is trivial to go from one state to another but not in the
    inverse direction. For instance, if I convert a color image or movie into grayscale
    (for instance, using the pixel-wise methods covered in the image case study in
    Chapter [2](525591_1_En_2_Chapter.xhtml)), there is no simple way to invert it
    back to color. Alternatively, if you spill coffee on an old family photo, there
    is no trivial process to “erase” the stain.
  prefs: []
  type: TYPE_NORMAL
- en: Autoencoders, however, exploit the triviality of going from the “pure” to the
    “corrupted” state by artificially imposing corruption upon pure data and forcing
    powerful autoencoder architectures to learn the “undoing.” Researchers have used
    denoising autoencoder architectures to generate color versions of historical black-and-white
    film and to repair photos that have been ripped, stained, or streaked. Another
    application is in biological/medical imaging, where an imaging operation can be
    disrupted by environmental conditions; replicating this noise/image damage artificially
    and training an autoencoder to become robust to it can make the model more resilient
    to noise.
  prefs: []
  type: TYPE_NORMAL
- en: We will begin with demonstrating the application of a denoising autoencoder
    to the MNIST dataset by successively increasing the amount of noise in the image
    and observing how well the denoising autoencoder performs (similarly to exercises
    in Chapter [4](525591_1_En_4_Chapter.xhtml)).
  prefs: []
  type: TYPE_NORMAL
- en: 'We can use a simple but effective technique to introduce noise into an image:
    adding random noise sampled from a normal distribution with mean 0 and a specified
    standard deviation. The result is clipped to ensure that the resulting value is
    still between 0 and 1, the feasible domain of pixel values. Listing [8-27](#PC28)
    implements and visualizes artificial noise for a given standard deviation `std`.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE27]'
  prefs: []
  type: TYPE_PRE
- en: Figure [8-67](#Fig67) demonstrates a grid of sample images with no artificial
    noise added as reference for comparison.
