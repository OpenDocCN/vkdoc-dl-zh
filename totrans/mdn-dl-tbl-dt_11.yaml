  type: TYPE_IMG
  zh: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig53_HTML.png)'
- en: Four images. 3 grid image visualizes various output state progression values
    of the set of 80 features and one graph plots the Absolute error, truth and predicted
    values.
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 四幅图像。3个网格图像可视化80个特征集的各种输出状态进展值，一个图表绘制绝对误差、真实值和预测值。
- en: Figure 8-53
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-53
- en: 'The state of the multitask autoencoder after zero epochs (i.e., upon initialization).
    Top: displays the original set of 80 features in the Mice Protein Expression dataset
    (arranged in a grid for more convenient visual viewing), the output of the decoder
    (of which the goal is to reconstruct the input), and the absolute error of the
    reconstruction. Bottom: the predicted and true classes (eight in total) and the
    absolute probability error'
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 多任务自动编码器在零个epoch（即初始化后）的状态。顶部：显示 Mice Protein Expression 数据集中的原始80个特征集（以网格形式排列，以便更方便地视觉查看），解码器的输出（其目标是重建输入），以及重建的绝对误差。底部：预测和真实类别（总共八个）和绝对概率误差
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig52_HTML.png)'
  id: totrans-346
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig52_HTML.png)'
- en: A line graph exhibits autoencoding from the training history of the approach
    on the Mice protection expression dataset.
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 一条线图展示了在 Mice 保护表达数据集上的方法训练历史中的自动编码过程。
- en: Figure 8-52
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-52
- en: Different dimensions of performance on the Mice Protein Expression dataset
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: Mice Protein Expression 数据集上性能的不同维度
- en: Figures [8-53](#Fig53) through [8-56](#Fig56) demonstrate the performance of
    the reconstruction task alongside the classification task at various stages in
    training. Notice that the reconstruction error converges near zero quickly and
    helps “pull”/”guide” the task error to zero over time.
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [8-53](#Fig53) 至 [8-56](#Fig56) 展示了在训练的各个阶段，重建任务与分类任务的性能。请注意，重建误差迅速收敛到接近零，并有助于“拉动”/“引导”任务误差随时间趋于零。
- en: In many cases, simultaneous execution of the autoencoder task and the original
    desired task can help provide stimulus to “push” progress on the desired task.
    However, you may make the valid objection that once the desired task reaches sufficiently
    good performance, it becomes limited by the autoencoding task.
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 在许多情况下，同时执行自动编码器任务和原始期望任务可以帮助为“推动”期望任务的进展提供刺激。然而，你可能会提出一个合理的反对意见，即一旦期望任务达到足够好的性能，它就会受到自动编码器任务的限制。
- en: One method to reconcile with this is simply to detach the autoencoder output
    from the model by creating a new model connecting the input to the task output
    and fine-tuning on the dataset.
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 一种解决这个问题的方法就是通过创建一个新的模型，将输入连接到任务输出，并在数据集上进行微调，从而将自动编码器的输出从模型中分离出来。
- en: Another more sophisticated technique is to change the loss weights between the
    original desired task and the autoencoding task. While Keras weighs multiple losses
    equally by default, we can provide different weights to reflect different levels
    of priority or importance delegated to each of the tasks. At the beginning of
    training, we can give a high weight to the autoencoding task, since we want the
    model to develop useful representations through a (ideally somewhat easier) task
    of autoencoding. Throughout the training duration, the weight on the original
    task model loss can be successively increased and the weight on the autoencoder
    model loss decreased. To formalize this, let *α* be the weight on the task output
    loss, and let 1 − *α* be the weight on the decoder output loss (with 0 < *α* < 1).
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种更复杂的技术是改变原始期望任务和自动编码任务之间的损失权重。虽然Keras默认将多个损失权重均等，但我们可以提供不同的权重来反映分配给每个任务的优先级或重要性的不同水平。在训练开始时，我们可以给自动编码任务一个高权重，因为我们希望模型通过一个（理想情况下稍微容易一些的）自动编码任务来发展有用的表示。在整个训练过程中，原始任务模型损失的权重可以逐步增加，自动编码器模型损失的权重可以逐步减少。为了正式化这一点，让α代表任务输出损失的权重，让1-α代表解码器输出损失的权重（其中0<α<1）。
- en: 'The sigmoid equation ![$$ \sigma (x)=\frac{1}{1+{e}^{-x}} $$](../images/525591_1_En_8_Chapter/525591_1_En_8_Chapter_TeX_IEq3.png)
    is a pretty good way to get from a value very close to some minimum bound to another
    value very close to an upper bound. Over the span of 100 epochs, we can employ
    a simple (arbitrarily set but functional) transformation on the sigmoid function
    to obtain a smooth transition from a slow to high value of *α* (visualized by
    Listing [8-24](#PC25) in Figure [8-57](#Fig57)), where *t* represents the epoch
    number:'
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: sigmoid方程 ![σ(x) = 1/(1+e^(-x))] 是从接近某个最小界限的值到另一个接近上限的值的一个很好的方法。在100个epoch的范围内，我们可以对sigmoid函数进行简单的（任意设置但有效的）变换，以获得α从低值到高值的平滑过渡（如图[8-57](#Fig57)中的列表[8-24](#PC25)所示），其中t代表epoch编号：
- en: '![$$ \alpha =\sigma \left(\frac{t-50}{10}\right)=\frac{1}{1+{e}^{-\left(\frac{t-50}{10}\right)}}
    $$](../images/525591_1_En_8_Chapter/525591_1_En_8_Chapter_TeX_Equc.png)'
  id: totrans-355
  prefs: []
  type: TYPE_IMG
  zh: '![α = σ((t-50)/10) = 1/(1+e^(-(t-50)/10))] (../images/525591_1_En_8_Chapter/525591_1_En_8_Chapter_TeX_Equc.png)'
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig57_HTML.png)'
  id: totrans-356
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig57_HTML.png)'
- en: A line graph represents a smooth transition from a slow to a high value of the
    sigmoid function. It plots the output weight and the decoder output weight.
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 一条线图表示sigmoid函数从低值到高值的平滑过渡。它绘制了输出权重和解码器输出权重。
- en: Figure 8-57
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-57
- en: Plot of the task output loss weight and the decoder weight across each epoch
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 每个epoch中任务输出损失权重和解码器权重的图示
- en: '[PRE24]'
  id: totrans-360
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: 'A generalized equation to scale *α* through *t*[max] using a transformation
    of the sigmoid function is as follows:'
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 一个通用的方程，通过sigmoid函数的变换来缩放α通过t[max]如下：
- en: '![$$ \alpha =\sigma \left(\frac{t-\frac{t_{\textrm{max}}}{2}}{\frac{t_{\textrm{max}}}{10}}\right)=\frac{1}{1+{e}^{-\left(\frac{t-\frac{t_{\textrm{max}}}{2}}{\frac{t_{\textrm{max}}}{10}}\right)}}
    $$](../images/525591_1_En_8_Chapter/525591_1_En_8_Chapter_TeX_Equd.png)'
  id: totrans-362
  prefs: []
  type: TYPE_IMG
  zh: '![α = σ((t-t_max/2)/(t_max/10)) = 1/(1+e^(-(t-t_max/2)/(t_max/10)))] (../images/525591_1_En_8_Chapter/525591_1_En_8_Chapter_TeX_Equd.png)'
- en: At initial conditions, we have *α* at a very small value. (For the purposes
    of this calculation, we use *t* = 1 for simplification of calculation.)
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 在初始条件下，α的值非常小。（为了计算简便，我们在此计算中使用t=1。）
- en: '![$$ \alpha @\left\{t\approx 0\right\}\to \frac{1}{1+{e}^{-\left(\frac{-\frac{t_{\textrm{max}}}{2}}{\frac{t_{\textrm{max}}}{10}}\right)}}=\frac{1}{1+{e}^5}\approx
    0.006692 $$](../images/525591_1_En_8_Chapter/525591_1_En_8_Chapter_TeX_Eque.png)'
  id: totrans-364
  prefs: []
  type: TYPE_IMG
  zh: '![α @{t≈0}→ 1/(1+e^(-(-t_max/2)/(t_max/10))) = 1/(1+e^5) ≈ 0.006692](../images/525591_1_En_8_Chapter/525591_1_En_8_Chapter_TeX_Eque.png)'
- en: 'The training regime completes at *t* = *t*[max], at which *α* is very close
    to 1:'
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 训练过程在t=t[max]时完成，此时α非常接近1：
- en: '![$$ \alpha @\left\{t={t}_{\textrm{max}}\right\}\to \frac{1}{1+{e}^{-\left(\frac{t_{\textrm{max}}-\frac{t_{\textrm{max}}}{2}}{\frac{t_{\textrm{max}}}{10}}\right)}}=\frac{e^5}{1+{e}^5}\approx
    0.993307 $$](../images/525591_1_En_8_Chapter/525591_1_En_8_Chapter_TeX_Equf.png)'
  id: totrans-366
  prefs: []
  type: TYPE_IMG
  zh: '![α @{t=t_max}→ e^5/(1+e^5) ≈ 0.993307](../images/525591_1_En_8_Chapter/525591_1_En_8_Chapter_TeX_Equf.png)'
- en: Moreover, we observe by taking the derivative and solving for the maximum that
    the largest change for some *t*[max] is ![$$ \frac{5}{2\cdotp {t}_{\textrm{max}}}
    $$](../images/525591_1_En_8_Chapter/525591_1_En_8_Chapter_TeX_IEq4.png). As *t*[max]
    increases, analysis of the derivative reveals that the overall change becomes
    more uniformly spread out. For large values of *t*[max], this functionally becomes
    a horizontal line (i.e., the derivative becomes near 0). A simple linear transformation
    of *α* also suffices in most cases in which *t*[max] is reasonably large.
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，通过求导并求解最大值，我们发现某些 *t*[max] 的最大变化为 ![$$ \frac{5}{2\cdotp {t}_{\textrm{max}}}
    $$](../images/525591_1_En_8_Chapter/525591_1_En_8_Chapter_TeX_IEq4.png)。随着 *t*[max]
    的增加，对导数的分析显示整体变化变得更加均匀分布。对于较大的 *t*[max] 值，这个函数实际上变成了一条水平线（即导数接近 0）。在大多数情况下，如果
    *t*[max] 比较大，对 *α* 进行简单的线性变换也足够了。
- en: Loss weighting is conveyed in the compiling stage. This means that we’ll have
    to recompile and fit every epoch. This is not difficult to do; we can write a
    for loop that loops through every epoch, calculates the *α* value for that epoch,
    compiles the model with that loss weighting, and fits for one epoch. Collecting
    the training history is slightly more manual; we need to collect the metrics for
    the single epoch and append them to user-created lists (Listing [8-25](#PC26)).
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: 损失加权是在编译阶段传达的。这意味着我们不得不重新编译和调整每个时代。这并不困难；我们可以编写一个循环，遍历每个时代，计算那个时代的 *α* 值，用那个损失加权编译模型，并调整一个时代。收集训练历史稍微有些手动；我们需要收集单个时代的指标，并将它们附加到用户创建的列表（列表
    [8-25](#PC26)）中。
- en: '[PRE25]'
  id: totrans-369
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: 'For another higher-code but perhaps smoother approach to dynamically adjusting
    the loss calculation weights of multi-output models, which does not require repeated
    refitting, see Anuj Arora’s well-written post on adaptive loss weighting in Keras
    using callbacks: [https://​medium.​com/​dive-into-ml-ai/​adaptive-weighing-of-loss-functions-for-multiple-output-keras-models-71a1b0aca66e](https://medium.com/dive-into-ml-ai/adaptive-weighing-of-loss-functions-for-multiple-output-keras-models-71a1b0aca66e).'
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 对于另一种更高代码但可能更平滑的动态调整多输出模型损失计算权重的方案，该方案不需要重复调整，请参阅 Anuj Arora 在 Keras 中使用回调进行自适应损失加权的出色文章：[https://medium.com/dive-into-ml-ai/adaptive-weighing-of-loss-functions-for-multiple-output-keras-models-71a1b0aca66e](https://medium.com/dive-into-ml-ai/adaptive-weighing-of-loss-functions-for-multiple-output-keras-models-71a1b0aca66e)。
- en: Figure [8-58](#Fig58) demonstrates the history of the reconstruction, task,
    and overall losses throughout training of the multitask autoencoder, with the
    background shaded by the value of *α* used at that epoch. Note that the reconstruction
    task is more trivial than the original intended task (hence the faster decline
    in loss) and the logistically shaped overall loss function that makes major changes
    in *α* in epochs 40–60 and “switches” bounds from the reconstruction to the original
    task loss.
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [8-58](#Fig58) 展示了多任务自动编码器训练过程中重建、任务和整体损失的历史，背景以该时代使用的 *α* 值着色。请注意，重建任务比原始任务更简单（因此损失下降更快），以及在
    40-60 个时代中 *α* 发生重大变化，从重建任务“切换”到原始任务损失的整体损失函数的物流形状。
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig58_HTML.png)'
  id: totrans-372
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig58_HTML.png)'
- en: A diagram interprets the reconstruction task and the total losses incurred through
    the entire training of the multitask autoencoder.
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 一张图解释了重建任务以及在整个多任务自动编码器训练过程中产生的总损失。
- en: Figure 8-58
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-58
- en: Diagram of reconstruction loss, task loss, and overall loss (now a dynamically
    weighted sum) with the weighting gradient shaded in the background
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 重建损失、任务损失和整体损失（现在是一个动态加权的总和）的图，背景中着色了加权梯度。
- en: Multitask autoencoders perform best in difficult supervised classification tasks
    that benefit from rich latent features, which can be learned well by autoencoders.
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 多任务自动编码器在困难的监督分类任务中表现最佳，这些任务可以从自动编码器很好地学习的丰富潜在特征中受益。
- en: Sparse Autoencoders
  id: totrans-377
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 稀疏自动编码器
- en: Standard autoencoders are given the limitation of size representation – autoencoder
    architectures are built with a “physical” bottleneck through which information
    must be compressed. The autoencoder attempts to maximize the amount of information
    it can squeeze through a significantly compressed latent space such that the information
    can reliably be decoded into the original output (Figure [8-59](#Fig59)).
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: 标准自编码器受到大小表示的限制——自编码器架构通过一个“物理”瓶颈构建，信息必须通过该瓶颈进行压缩。自编码器试图通过显著压缩的潜在空间来最大化可以压缩的信息量，以便信息可以可靠地解码成原始输出（图[8-59](#Fig59)）。
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig59_HTML.png)'
  id: totrans-379
  prefs: []
  type: TYPE_IMG
  zh: '![图8-59](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig59_HTML.png)'
- en: A network architecture exhibits compressed latent space. It indicates data is
    decoded reliably into the original output.
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 网络架构表现出压缩的潜在空间。这表明数据可以可靠地解码成原始输出。
- en: Figure 8-59
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-59
- en: A standard autoencoder, which encodes information into a densely packed and
    quasi-continuous latent space
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 标准自编码器，将信息编码到密集且准连续的潜在空间中
- en: However, this is not the only limit we can impose. Another information bottleneck
    tool is *sparsity*. We can make the bottleneck layer very large, but force only
    a few nodes to be active at any one pass. While this still forces a limitation
    on the amount of *information* that can pass through the bottleneck layer, the
    network is given more freedom and control to “choose” *which* nodes information
    passes through, which itself is an additional medium of information expression
    (Figure [8-60](#Fig60)).
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这并非我们能够施加的唯一限制。另一个信息瓶颈工具是*稀疏性*。我们可以使瓶颈层非常大，但在任何一次传递中只强制激活少数节点。虽然这仍然限制了可以通过瓶颈层的信息量，但网络获得了更多的自由和控制来“选择”哪些节点信息通过，这本身是信息表达的一种额外媒介（图[8-60](#Fig60)）。
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig60_HTML.jpg)'
  id: totrans-384
  prefs: []
  type: TYPE_IMG
  zh: '![图8-60](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig60_HTML.jpg)'
- en: A network diagram exhibits a free pattern that enables the selection of the
    data of nodes.
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 网络图表现出一种自由模式，能够选择节点的数据。
- en: Figure 8-60
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-60
- en: A sparse autoencoder, in which a much larger latent size is accessible but only
    a few nodes can be used at any one time
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 稀疏自编码器，其中可以访问更大的潜在大小，但任何时刻只能使用少数节点
- en: 'To maintain sparsity, we generally impose L1 regularization on the layer’s
    activity. (Recall the discussion of regularization in Chapter [3](525591_1_En_3_Chapter.xhtml),
    “Regularization Learning Networks.”) L1 regularization penalizes the output activity
    of the bottleneck layer by being too large. Assuming a network uses binary cross-entropy
    loss to minimize task output and *λ* represents the overall activity/output of
    the bottleneck layer, the joint loss of an L1-regularized network is as follows:'
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 为了保持稀疏性，我们通常对层的活动施加L1正则化。（回想一下第[3](525591_1_En_3_Chapter.xhtml)章“正则化学习网络”中关于正则化的讨论。）L1正则化通过使瓶颈层的输出活动过大来惩罚。假设网络使用二元交叉熵损失来最小化任务输出，而*λ*代表瓶颈层的整体活动/输出，L1正则化网络的联合损失如下：
- en: '![$$ \textrm{loss}= BCE\left({y}_{\textrm{pred}},{\textrm{y}}_{\textrm{true}}\right)+\alpha
    \cdotp \mid \lambda \mid $$](../images/525591_1_En_8_Chapter/525591_1_En_8_Chapter_TeX_Equg.png)'
  id: totrans-389
  prefs: []
  type: TYPE_IMG
  zh: '![损失函数](../images/525591_1_En_8_Chapter/525591_1_En_8_Chapter_TeX_Equg.png)'
- en: The parameter *α* is user-defined and controls the “importance” of the L1 regularization
    term relative to the task loss. Setting the correct value of *α* is important
    for correct behavior. If *α* is too small, the network ignores the sparsity restriction
    in favor of completing the task, which is now made quasi-trivial by the overcomplete
    bottleneck layer. If *α* is too large, the network ignores the task by learning
    the “ultimate sparsity” – predicting all zeros in the bottleneck layer, which
    entirely minimizes *λ* but performs poorly on the actual task we want it to learn.
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 参数*α*由用户定义，并控制L1正则化项相对于任务损失的“重要性”。设置正确的*α*值对于正确的行为很重要。如果*α*太小，网络会忽略稀疏性限制，优先完成任务，现在由于过完备的瓶颈层而变得近乎平凡。如果*α*太大，网络会忽略任务，通过学习“终极稀疏性”——在瓶颈层预测所有零，这完全最小化了*λ*，但在我们想要它学习的实际任务上表现不佳。
- en: 'An alternative commonly used penalty is L2 regularization, in which the square
    rather than the absolute value is penalized:'
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 常用的另一种惩罚方法是L2正则化，其中惩罚的是平方而不是绝对值：
- en: '![$$ \textrm{loss}= BCE\left({y}_{\textrm{pred}},{\textrm{y}}_{\textrm{true}}\right)+\alpha
    \cdotp {\lambda}^2 $$](../images/525591_1_En_8_Chapter/525591_1_En_8_Chapter_TeX_Equh.png)'
  id: totrans-392
  prefs: []
  type: TYPE_IMG
  zh: '![损失函数公式](../images/525591_1_En_8_Chapter/525591_1_En_8_Chapter_TeX_Equh.png)'
- en: This is a common machine learning paradigm. L2 regularization tends to produce
    sets of values generally near zero but not at zero, whereas L1 regularization
    tends to produce values solidly at zero. An intuitive explanation is that L2 regularization
    significantly discounts the need to decrease values that are already somewhat
    near zero. The decrease from 3 to 2, for instance, is rewarded with a penalty
    decrease of 3² − 2² = 5\. The decrease from 1 to 0, on the other hand, is rewarded
    with a measly penalty decrease of 1² − 0² = 1\. On the other hand, L1 regularization
    rewards the decrease from 3 to 2 identically as the decrease from 1 to 0\. We
    generally use L1 regularization to impose sparsity constraints because of this
    property.
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个常见的机器学习范式。L2 正则化倾向于产生一组接近零但不在零处的值，而 L1 正则化倾向于产生值完全为零。一个直观的解释是，L2 正则化显著降低了减少已经接近零的值的必要性。例如，从
    3 减少到 2 的减少会得到 3² − 2² = 5 的惩罚减少。另一方面，从 1 减少到 0 的减少只会得到微不足道的惩罚减少 1² − 0² = 1。另一方面，L1
    正则化对从 3 减少到 2 和从 1 减少到 0 的减少给予相同的奖励。我们通常使用 L1 正则化来施加稀疏约束，因为这个特性。
- en: To implement this, we need to make a slight modification to our original `buildAutoencoder`
    function. We can build the autoencoder as if we were leading up to and from a
    certain *implicit* latent size, but replace the *implicit* latent size with the
    *real* (expanded) latent size. For instance, consider an autoencoder build with
    an input of 64 dimensions and an implicit latent space of 8 dimensions. The node
    count progression in each layer of a standard autoencoder using our prebuilt autoencoder
    logic would be 64 → 32 → 16 → 8 → 16 → 32 → 64\. However, because we are planning
    to impose a sparsity constraint on the bottleneck layer, we need to provide an
    expanded set of nodes to pass information through. Say the real bottleneck size
    is 128 nodes. The node count progression in each layer of this sparse autoencoder
    would be 64 → 32 → 16 → 128 → 16 → 32 → 64.
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 要实现这一点，我们需要对我们的原始 `buildAutoencoder` 函数进行轻微的修改。我们可以构建自动编码器，就像我们正在引导到一个特定的*隐式*潜在大小并从中返回一样，但将*隐式*潜在大小替换为*实际*（扩展的）潜在大小。例如，考虑一个输入维度为64，隐式潜在空间为8维度的自动编码器。使用我们预构建的自动编码器逻辑的标准自动编码器每层的节点数量递增将是64 → 32 → 16 → 8 → 16 → 32 → 64。然而，因为我们计划在瓶颈层施加稀疏约束，我们需要提供一个扩展的节点集来传递信息。假设实际的瓶颈大小是128个节点。这个稀疏自动编码器每层的节点数量递增将是64 → 32 → 16 → 128 → 16 → 32 → 64。
- en: To actually implement the sparsity constraint, note that almost all layers in
    Keras have an `activity_regularizer` parameter, set upon initialization. This
    parameter penalizes the *activity*, or the output, of the layer (Listing [8-26](#PC27)).
    Note that you can also set the `weight_regularizer` or `bias_regularizer` parameter
    if you desire to penalize the learned weights or biases. In this case, we don’t
    care about how the encoder *arrives* at a sparse encoding, only that the encoder
    *creates* a sparse encoding. Hence, we perform regularization on the layer activity.
    The arguments accept a `keras.regularizers` object. We will use the L1 regularization
    object, which accepts the specific weighting of the penalty as a parameter. Setting
    the weight is important and should be given thought and experimentation, considering
    the model power, difficulty of autoencoding, and latent space size. As discussed
    previously, setting an improper weight in either direction (too large or too small)
    yields adverse outcomes.
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 要实际实现稀疏约束，请注意，Keras 中几乎所有的层都有一个在初始化时设置的 `activity_regularizer` 参数。该参数惩罚层的*活动*或输出（见列表
    [8-26](#PC27)）。请注意，如果您想惩罚学习到的权重或偏差，也可以设置 `weight_regularizer` 或 `bias_regularizer`
    参数。在这种情况下，我们并不关心编码器*如何*到达稀疏编码，而只是编码器*创建*稀疏编码。因此，我们在层活动上执行正则化。这些参数接受一个 `keras.regularizers`
    对象。我们将使用接受特定惩罚权重的 L1 正则化对象。设置权重很重要，应该经过深思熟虑和实验，考虑到模型能力、自动编码的难度和潜在空间的大小。如前所述，在任一方向上设置不适当的权重（过大或过小）都会产生不良后果。
- en: '[PRE26]'
  id: totrans-396
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: Figure [8-61](#Fig61) demonstrates performance of the sparse autoencoder on
    the MNIST dataset, in which a 64-dimensional latent space vector is reshaped into
    an 8-by-8 grid for convenient viewing. The reconstruction is not visibly worse
    than a standard autoencoder without a sparsity constraint. Notice that only two
    to five of the 64 nodes are active at any one pass (and that which node(s) are
    active vary for each image). A standard autoencoder trained even with five nodes
    in the bottleneck layer (no sparsity requirement) would obtain poor performance
    on reconstruction, demonstrating the informational richness of “choosing” which
    nodes are active.
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 图[8-61](#Fig61)展示了稀疏自动编码器在MNIST数据集上的性能，其中64维潜在空间向量被重新排列成一个8x8的网格以方便查看。重建在可见性上并不比没有稀疏度约束的标准自动编码器差。注意，在任何一次传递中只有两个到五个的64个节点是活跃的（并且活跃的节点对于每张图像都是不同的）。即使瓶颈层有五个节点（没有稀疏度要求）的标准自动编码器在重建上也会获得较差的性能，这证明了“选择”哪些节点活跃的信息丰富性。
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig61a_HTML.jpg)'
  id: totrans-398
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig61a_HTML.jpg)'
- en: An interpreter image represents sparse encoder performance on the M N I S T
    dataset.
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: 解释器图像表示稀疏编码器在MNIST数据集上的性能。
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig61b_HTML.jpg)![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig61c_HTML.jpg)'
  id: totrans-400
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig61b_HTML.jpg)![图片](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig61c_HTML.jpg)'
- en: Figure 8-61
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-61
- en: Sampled original inputs (left), latent space (middle), and reconstruction (right)
    for a sparse autoencoder trained on MNIST. The latent space is 256 neurons reshaped
    into a 16-by-16 grid for viewing. The actual latent space is not arranged in two
    spatial directions
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: 在MNIST数据集上训练的稀疏自动编码器的采样原始输入（左侧）、潜在空间（中间）和重建（右侧）。潜在空间由256个神经元重新排列成一个16x16的网格以供查看。实际的潜在空间并不是按两个空间方向排列的
- en: If we decreased the regularization alpha value (i.e., the L1 penalty would be
    weighted less relative to the loss), the network would obtain better overall loss
    at the cost of decreased sparsity (i.e., more nodes would be active at any one
    pass). If we increased the regularization alpha, the network would obtain worse
    overall loss at the benefit of increased sparsity (i.e., even fewer nodes would
    be active at any one pass).
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们降低正则化alpha值（即相对于损失的L1惩罚权重会降低），网络将获得更好的整体损失，但代价是稀疏度（即在任何一次传递中会有更多节点活跃）。如果我们增加正则化alpha，网络将获得更差的总体损失，但有利于增加稀疏度（即在任何一次传递中会有更少的节点活跃）。
- en: We can apply the same sparse autoencoding scheme to the Higgs Boson dataset,
    encoding a 28-dimensional input vector into a 64-dimensional latent space. At
    each pass, about one-fourth to one-third of the latent space is active, although
    many bottleneck nodes are “quasi-active” – they are not zero, but very close.
    Figure [8-62](#Fig62) demonstrates the internal state and reconstruction of the
    sparse autoencoder on different inputs, with 28-dimensional input vectors reshaped
    into 7-by-4 grids for more convenient viewing.
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将相同的稀疏自动编码方案应用于Higgs玻色子数据集，将28维输入向量编码成64维潜在空间。在每次传递中，大约有四分之一到三分之一潜在空间是活跃的，尽管许多瓶颈节点是“准活跃”的——它们不是零，但非常接近。图[8-62](#Fig62)展示了稀疏自动编码器在不同输入上的内部状态和重建，28维输入向量重新排列成7x4的网格以方便查看。
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig62a_HTML.png)'
  id: totrans-405
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig62a_HTML.png)'
- en: 12 Images depict the reshaping of a sparse autoencoder with a latent space of
    a 16 by 16 grid.
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: 12幅图像描绘了具有16x16网格潜在空间的稀疏自动编码器的重塑。
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig62b_HTML.png)'
  id: totrans-407
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig62b_HTML.png)'
- en: Figure 8-62
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-62
- en: Sampled original inputs (left), latent space (middle), and reconstruction (right)
    for a sparse autoencoder trained on the Higgs Boson dataset. The latent space
    is 256 neurons reshaped into a 16-by-16 grid for viewing; the input and reconstruction
    are 28 dimensions arranged into 7-by-4 grids
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: 在Higgs玻色子数据集上训练的稀疏自动编码器的采样原始输入（左侧）、潜在空间（中间）和重建（右侧）；潜在空间由256个神经元重新排列成一个16x16的网格以供查看；输入和重建是28维度的，排列成7x4的网格
- en: Similarly, Figure [8-63](#Fig63) shows the application of a trained sparse autoencoder
    to various elements of the Mice Protein Expression dataset.
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 类似地，图[8-63](#Fig63)展示了训练好的稀疏自动编码器在Mice蛋白质表达数据集的各种元素中的应用。
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig63a_HTML.png)'
  id: totrans-411
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig63a_HTML.png)'
- en: 12 images represent the utilization of sparse autoencoder to different elements
    pertaining to the given dataset.
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 12幅图像代表了稀疏自编码器在给定数据集的不同元素中的应用。
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig63b_HTML.png)'
  id: totrans-413
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig63b_HTML.png)'
- en: Figure 8-63
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-63
- en: Sampled original inputs (left), latent space (middle), and reconstruction (right)
    for a sparse autoencoder trained on the Mice Protein Expression dataset. The latent
    space is 256 neurons reshaped into a 16-by-16 grid for viewing; the input and
    reconstruction are 80 dimensions arranged into 8-by-10 grids
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 在Mice Protein Expression数据集上训练的稀疏自编码器的原始输入（左）、潜在空间（中）和重建（右）示例。潜在空间由256个神经元重新排列成一个16x16的网格以供查看；输入和重建是80维，排列成8x10的网格
- en: Why would you want to use sparse autoencoders? The primary reason is to take
    advantage of sparse encoders’ robustness properties. Adversarial examples are
    instances generated to deliberately fool a neural network into some image originally
    correctly classified as class *A* into class *B* with high confidence simply by
    making miniscule, barely visible changes to the input. The canonical example in
    the field is a diagram created by Ian Goodfellow et al. in the paper “Explaining
    and Harnessing Adversarial Examples.” The Fast Signed Gradient Method (FSGM) generates
    a permutation matrix that adjusts every pixel in the input in a way that significantly
    changes the network’s final prediction (Figure [8-64](#Fig64)).
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么你想使用稀疏自编码器？主要原因是利用稀疏编码器的鲁棒性特性。对抗样本是故意生成以欺骗神经网络将原本正确分类为类别*A*的图像以高置信度错误地分类为类别*B*的实例，只需对输入进行微小的、几乎看不见的改变。该领域的经典例子是Ian
    Goodfellow等人在其论文“解释和利用对抗样本”中创建的图表。快速符号梯度法（FSGM）生成一个排列矩阵，以调整输入中的每个像素，从而显著改变网络的最终预测（图[8-64](#Fig64)）。
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig64_HTML.png)'
  id: totrans-417
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig64_HTML.png)'
- en: A mathematical expression. The first input is the photograph of a panda, the
    second one is a nematode and the output is a gibbon which is depicted by a panda.
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 一个数学表达式。第一个输入是熊猫的照片，第二个是线虫，输出是长臂猿，由熊猫描绘。
- en: Figure 8-64
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-64
- en: Demonstration of the FSGM method. From “Explaining and Harnessing Adversarial
    Examples,” Goodfellow et al.
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: FSGM方法的演示。来自“解释和利用对抗样本”，Goodfellow等人。
- en: Adversarial example finders profit from continuity and gradients. Because neural
    networks operate in very large continuous spaces, adversarial examples can be
    found by “sneaking” through smooth channels and ridges in the surface of the landscape.
    Adversarial examples can be security threats (some instances of naturally occurring
    adversarial examples, like tape placed onto a traffic sign in a particular orientation
    causing egregious misidentification), as well as potential symptoms of poor generalization.^([1](#Fn1))
    However, sparse encoders impose a discreteness upon the encoded space. It becomes
    significantly more difficult to generate successful adversarial examples when
    a frozen encoder is used as the feature extractor for a network.
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: 对抗样本查找器受益于连续性和梯度。由于神经网络在非常大的连续空间中运行，可以通过“偷偷”穿过景观表面的平滑通道和脊来找到对抗样本。对抗样本可以是安全威胁（例如，某些自然发生的对抗样本实例，如将胶带以特定方向贴在交通标志上，导致严重的误识别），以及泛化不良的潜在症状。[1](#Fn1)
    然而，稀疏编码器在编码空间上施加了离散性。当使用冻结的编码器作为网络的特征提取器时，生成成功的对抗样本变得显著困难。
- en: Sparse autoencoders can also be useful for the purposes of interpretability.
    We’ll talk more about specialized interpretability techniques later in this chapter,
    but sparse autoencoders can be easily interpreted without additional complex theoretical
    tools. Because only a few neurons are active at any one time, understanding which
    neurons are activated for any one input is relatively simple, especially compared
    with the latent vectors generated by standard autoencoders.
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: 稀疏自编码器在可解释性方面也可能很有用。我们将在本章后面更详细地讨论专门的解释性技术，但稀疏自编码器可以很容易地被解释，而无需额外的复杂理论工具。因为任何时刻只有少数神经元是活跃的，理解哪个神经元对任何输入被激活相对简单，尤其是与标准自编码器生成的潜在向量相比。
- en: Denoising and Reparative Autoencoders
  id: totrans-423
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 去噪和修复自编码器
- en: 'So far, we’ve only considered applications of autoencoder training in which
    the desired output is identical to the input. However, autoencoders can perform
    another function: to repair or restore a damaged or noisy input.'
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们只考虑了自动编码器训练的应用，其中期望输出与输入相同。然而，自动编码器可以执行另一个功能：修复或恢复损坏或噪声输入。
- en: Here’s the clever way we go about it – we artificially add realistic noise or
    corruption to a “pure”/”clean” dataset and then train the model to recover the
    cleaned image from its artificially corrupted version (Figure [8-65](#Fig65)).
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是我们巧妙处理的方法——我们人为地向“纯净”/“干净”的数据集中添加真实的噪声或损坏，然后训练模型从其人为损坏的版本中恢复清洗后的图像（见图[8-65](#Fig65)）。
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig65_HTML.png)'
  id: totrans-426
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig65_HTML.png)'
- en: A flow diagram represents the training dataset to recover a clean image from
    the artificially corrupted image.
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 流程图表示从人为损坏的图像中恢复干净图像的训练数据集。
- en: Figure 8-65
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-65
- en: Deriving a noisy image as input and the original clean image as the desired
    output of a denoising autoencoder
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: 从噪声图像作为输入和原始干净图像作为去噪自动编码器的期望输出
- en: There are many applications for such a model. We can use it, most obviously,
    to denoise a noisy input; the “cleaned” input can then be used for other purposes.
    Alternatively, if we are developing a model that we know will operate in a domain
    with lots of noisy data, we can use the encoder of a denoising autoencoder as
    a robust or resilient feature extractor (similarly to in autoencoder pretraining),
    exploiting the encoder’s “denoised” latent representations (Figure [8-66](#Fig66)).
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: 这种模型有许多应用。最明显的是，我们可以用它来去噪噪声输入；清洗后的输入可以用于其他目的。或者，如果我们正在开发一个我们知道将在具有大量噪声数据的领域中运行的模型，我们可以使用去噪自动编码器的编码器作为鲁棒或弹性的特征提取器（类似于自动编码器预训练），利用编码器的“去噪”潜在表示（见图[8-66](#Fig66)）。
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig66_HTML.png)'
  id: totrans-431
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig66_HTML.png)'
- en: A flow diagram depicts the functioning of the denoising autoencoder. It has
    the labels input data, denoising autoencoder, model and task output.
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: 流程图描述了去噪自动编码器的功能。它有输入数据、去噪自动编码器、模型和任务输出的标签。
- en: Figure 8-66
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-66
- en: A potential application of denoising autoencoders as a structure that learns
    to clean up the input before it is actually used in a model for a task
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: 去噪自动编码器作为学习在模型用于任务之前清理输入的结构的一种潜在应用
- en: These reparative models have particularly exciting applications for intelligent
    or deep graphics processing. Many graphics operations are not *trivially two-way
    invertible* in that it is trivial to go from one state to another but not in the
    inverse direction. For instance, if I convert a color image or movie into grayscale
    (for instance, using the pixel-wise methods covered in the image case study in
    Chapter [2](525591_1_En_2_Chapter.xhtml)), there is no simple way to invert it
    back to color. Alternatively, if you spill coffee on an old family photo, there
    is no trivial process to “erase” the stain.
  id: totrans-435
  prefs: []
  type: TYPE_NORMAL
  zh: 这些修复模型在智能或深度图形处理方面有特别令人兴奋的应用。许多图形操作并不是**双向可逆的**，即从一个状态到另一个状态是简单的，但在相反方向上则不是。例如，如果我将彩色图像或电影转换为灰度（例如，使用第[2](525591_1_En_2_Chapter.xhtml)章中图像案例研究涵盖的像素级方法），就没有简单的方法将其反转回彩色。或者，如果你在一张旧的家庭照片上洒了咖啡，就没有简单的过程来“擦除”污渍。
- en: Autoencoders, however, exploit the triviality of going from the “pure” to the
    “corrupted” state by artificially imposing corruption upon pure data and forcing
    powerful autoencoder architectures to learn the “undoing.” Researchers have used
    denoising autoencoder architectures to generate color versions of historical black-and-white
    film and to repair photos that have been ripped, stained, or streaked. Another
    application is in biological/medical imaging, where an imaging operation can be
    disrupted by environmental conditions; replicating this noise/image damage artificially
    and training an autoencoder to become robust to it can make the model more resilient
    to noise.
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，自动编码器通过在纯数据上人为地施加损坏并迫使强大的自动编码器架构学习“撤销”来利用从“纯净”到“损坏”状态的简单性。研究人员已经使用去噪自动编码器架构来生成历史黑白电影的彩色版本，以及修复被撕裂、染色或划痕的照片。另一个应用是在生物/医学成像中，成像操作可能会受到环境条件的影响；通过人工复制这种噪声/图像损坏并训练自动编码器使其对它具有鲁棒性，可以使模型对噪声更具弹性。
- en: We will begin with demonstrating the application of a denoising autoencoder
    to the MNIST dataset by successively increasing the amount of noise in the image
    and observing how well the denoising autoencoder performs (similarly to exercises
    in Chapter [4](525591_1_En_4_Chapter.xhtml)).
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将首先通过逐步增加图像中的噪声量，并观察去噪自编码器的表现来演示去噪自编码器在MNIST数据集上的应用（类似于第 [4](525591_1_En_4_Chapter.xhtml)
    章的练习）。
- en: 'We can use a simple but effective technique to introduce noise into an image:
    adding random noise sampled from a normal distribution with mean 0 and a specified
    standard deviation. The result is clipped to ensure that the resulting value is
    still between 0 and 1, the feasible domain of pixel values. Listing [8-27](#PC28)
    implements and visualizes artificial noise for a given standard deviation `std`.'
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用一种简单但有效的方法向图像中引入噪声：添加从均值为0和指定标准差的正态分布中采样的随机噪声。结果被截断以确保结果值仍然在0和1之间，这是像素值的可行域。代码清单
    [8-27](#PC28) 实现并可视化了一个给定标准差 `std` 的人工噪声。
- en: '[PRE27]'
  id: totrans-439
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: Figure [8-67](#Fig67) demonstrates a grid of sample images with no artificial
    noise added as reference for comparison.
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [8-67](#Fig67) 展示了一个没有添加人工噪声的样本图像网格，作为比较的参考。
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig67_HTML.png)'
  id: totrans-441
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig67_HTML.png)'
- en: A numerical grid represents various sample images that have no artificial noise
    added as a comparison reference.
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 一个数值网格表示没有添加人工噪声的各种样本图像，作为比较参考。
- en: Figure 8-67
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-67
- en: A grid of untampered clean images from MNIST for reference
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: MNIST的未修改的干净图像网格作为参考。
- en: Figure [8-68](#Fig68) demonstrates the same set of images with random noise
    sampled from a normal distribution with standard deviation of 0.1\. We can observe
    marginal noise, especially in affecting the consistency of the digit outlines.
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [8-68](#Fig68) 展示了从标准差为0.1的正态分布中采样的随机噪声的相同图像集。我们可以观察到边缘噪声，尤其是在影响数字轮廓的一致性方面。
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig68_HTML.png)'
  id: totrans-446
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig68_HTML.png)'
- en: A 6 by 6 numerical grid illustrates the images acquired as a result of random
    noise sampled from a normal distribution with standard deviation.
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: 一个6x6的数值网格显示了从具有标准差的正态分布中采样的随机噪声获得的图像。
- en: Figure 8-68
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-68
- en: A sample of MNIST images with added normally distributed random noise using
    standard deviation 0.1
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: 使用标准差0.1添加的正态分布随机噪声的MNIST图像样本。
- en: Let’s build an autoencoder to denoise this data (Listing [8-28](#PC29)). There
    is no difference between the architecture of the autoencoder used here and in
    previous applications; the difference rather is in the data that we pass in (namely,
    that the input should have artificial noise applied). In this implementation,
    we compute new noise in each epoch. This is desired because it provides “fresh”
    noise that the denoising autoencoder must learn to denoise rather than to “accept”/”memorize.”
  id: totrans-450
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们构建一个自编码器来去噪这些数据（代码清单 [8-28](#PC29)）。这里使用的自编码器架构与之前的应用没有区别；区别在于我们传递的数据（即，输入应该应用人工噪声）。在这个实现中，我们在每个epoch计算新的噪声。这是所希望的，因为它提供了“新鲜”的噪声，去噪自编码器必须学习去噪，而不是“接受”/“记忆”。
- en: '[PRE28]'
  id: totrans-451
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: After training, we can evaluate the Mean Absolute Error on a fresh validation
    set of noisy images (Listing [8-29](#PC30)).
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
  zh: 训练后，我们可以对一组新的噪声图像验证集上的平均绝对误差进行评估（代码清单 [8-29](#PC30)）。
- en: '[PRE29]'
  id: totrans-453
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: Listing [8-30](#PC31) and Figure [8-69](#Fig69), respectively, implement and
    demonstrate a sampling of images with normally distributed random noise, using
    a standard deviation of 0.1\. A denoising autoencoder trained to recover the original
    version given a noisy image generated using this procedure obtains a validation
    Mean Squared Error of 0.0266.
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: 代码清单 [8-30](#PC31) 和图 [8-69](#Fig69) 分别实现并演示了使用标准差为0.1的正态分布随机噪声的图像采样。使用此过程生成的噪声图像训练的去噪自编码器恢复原始版本，获得验证均方误差为0.0266。
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig69_HTML.png)'
  id: totrans-455
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig69_HTML.png)'
- en: A 3 by 3 grid represents the corrupted images with reference to random noise
    distributed using a standard deviation.
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: 一个3x3的网格表示使用标准差分布的随机噪声的损坏图像。
- en: Figure 8-69
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-69
- en: The noisy/perturbed input (left), the unperturbed desired output (middle), and
    the predicted output (right) for a denoising autoencoder trained on MNIST with
    a noisy normal distribution of standard deviation 0.1
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: 对于在MNIST上训练的去噪自编码器，其输入为具有标准差为0.1的噪声正态分布，其噪声/扰动输入（左侧），未扰动的期望输出（中间）和预测输出（右侧）。
- en: '[PRE30]'
  id: totrans-459
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: Let’s increase the standard deviation to 0.2\. Figure [8-70](#Fig70) demonstrates
    the noise effect on the images, and Figure [8-71](#Fig71) demonstrates the reconstruction
    performance on a set of images. The denoising autoencoder obtains a validation
    Mean Absolute Error of 0.0289, slightly more than that of the denoising autoencoder
    trained on noise drawn from a normal distribution with standard deviation 0.1.
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们增加标准差到 0.2。图 [8-70](#Fig70) 展示了噪声对图像的影响，而图 [8-71](#Fig71) 展示了在图像上重建性能。去噪自动编码器获得了
    0.0289 的验证平均绝对误差，略高于在标准差为 0.1 的正态分布噪声上训练的去噪自动编码器。
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig71_HTML.png)'
  id: totrans-461
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig71_HTML.png)'
- en: A 3 by 3 grid represents a set of images displaying reconstruction performance.
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: 一个 3x3 网格表示一组显示重建性能的图像。
- en: Figure 8-71
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-71
- en: The noisy/perturbed input (left), the unperturbed desired output (middle), and
    the predicted output (right) for a denoising autoencoder trained on MNIST with
    a noisy normal distribution of standard deviation 0.2
  id: totrans-464
  prefs: []
  type: TYPE_NORMAL
  zh: 在 MNIST 上使用标准差为 0.2 的噪声正态分布训练的去噪自动编码器的噪声/扰动输入（左），未扰动的期望输出（中），和预测输出（右）
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig70_HTML.png)'
  id: totrans-465
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig70_HTML.png)'
- en: A 6 by 6 grid highlights the noise impact on the images with the increase of
    standard deviation of zero point two.
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: 一个 6x6 网格突出了随着标准差增加到零点二，噪声对图像的影响。
- en: Figure 8-70
  id: totrans-467
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-70
- en: A sample of MNIST images with added normally distributed random noise using
    standard deviation 0.2
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: 使用标准差为 0.2 添加正态分布随机噪声的 MNIST 图像样本
- en: Figures [8-72](#Fig72) and [8-73](#Fig73) demonstrate a sample of images and
    the denoising autoencoder performance on images corrupted using noise drawn from
    a normal distribution with standard deviation 0.3\. The denoising autoencoder
    obtains a validation Mean Absolute Error of about 0.0343.
  id: totrans-469
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [8-72](#Fig72) 和 [8-73](#Fig73) 展示了使用标准差为 0.3 的正态分布噪声损坏的图像样本和去噪自动编码器在图像上的性能。去噪自动编码器获得了大约
    0.0343 的验证平均绝对误差。
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig73_HTML.png)'
  id: totrans-470
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig73_HTML.png)'
- en: A 3 by 3 numerical grid interprets images achieved through the performance of
    a denoising autoencoder that obtains a validation mean absolute error.
  id: totrans-471
  prefs: []
  type: TYPE_NORMAL
  zh: 一个 3x3 数字网格解释了通过去噪自动编码器性能获得的图像，该自动编码器获得了验证平均绝对误差。
- en: Figure 8-73
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-73
- en: The noisy/perturbed input (left), the unperturbed desired output (middle), and
    the predicted output (right) for a denoising autoencoder trained on MNIST with
    a noisy normal distribution of standard deviation 0.3
  id: totrans-473
