- en: From these visualizations and the training history, we see that the multitask
    autoencoder obtains better performance on the task than the autoencoding task
    that is intended to assist task performance! In this case, the MNIST dataset’s
    task output is more straightforward than the autoencoding task, which makes sense.
    In this case, using a multitask autoencoder is not beneficial. It probably is
    more beneficial to directly train or use an autoencoder for pretraining when multitask
    autoencoders perform poorly.
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 从这些可视化和训练历史中，我们看到多任务自动编码器在任务上的性能优于旨在辅助任务性能的自动编码任务！在这种情况下，MNIST 数据集的任务输出比自动编码任务更直接，这是有道理的。在这种情况下，使用多任务自动编码器并不有利。当多任务自动编码器表现不佳时，可能直接训练或使用自动编码器进行预训练更有利。
- en: We can use an adapted approach on the Mice Protein Expression dataset, in which
    we see that autoencoding is a more approachable problem than the task of classification
    itself, both from the training history (Figures [8-52](#Fig52)) and output state
    progression visualizations (Figures [8-53](#Fig53) through [8-56](#Fig56)).
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以在小鼠蛋白质表达数据集上使用一种改进的方法，其中我们看到自动编码比分类任务本身更容易接近，这从训练历史（图 [8-52](#Fig52)）和输出状态进展可视化（图
    [8-53](#Fig53) 至 [8-56](#Fig56)）中都可以看出。
