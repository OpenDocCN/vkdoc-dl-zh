- en: A sample of MNIST images with added normally distributed random noise using
    standard deviation 0.5
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: 使用标准差为0.5的正态分布随机噪声添加到MNIST图像中的样本。
- en: Figures [8-76](#Fig76) and [8-77](#Fig77) demonstrate a sample of images and
    the denoising autoencoder performance on images corrupted using noise drawn from
    a normal distribution with standard deviation 0.9\. The denoising autoencoder
    obtains a validation Mean Absolute Error of about 0.0683\. Note that this is an
    exceedingly nontrivial task – even humans would have some difficulty denoising
    many of the shown samples! The autoencoder reconstructions are more abstracted
    – there is no physical way to exactly reconstruct all the details due to the significant
    amount of information corruption, so the autoencoder instead performs implicit
    digit recognition and reconstructs the image as a “generalized” digit with specific
    positional and orientational characteristics.
  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
  zh: 图[8-76](#Fig76)和[8-77](#Fig77)展示了使用从标准差为0.9的正态分布中抽取的噪声损坏的图像的样本，以及去噪自编码器在图像上的性能。去噪自编码器获得了大约0.0683的验证平均绝对误差。请注意，这是一个极其复杂的任务——即使是人类在去噪许多显示的样本时也会遇到一些困难！自编码器的重建更加抽象——由于信息损坏量很大，没有物理方法可以精确地重建所有细节，因此自编码器执行隐式数字识别，并以具有特定位置和方向特性的“泛化”数字重建图像。
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig77_HTML.png)'
  id: totrans-488
  prefs: []
  type: TYPE_IMG
  zh: '![图8-77](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig77_HTML.png)'
- en: A grid of images represents noisy input, true and predicted denoised output.
    It depicts the performance of the denoising autoencoder with a standard deviation
    of 0.9.
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: 一个表示噪声输入、真实和预测去噪输出的图像网格。它描绘了标准差为0.9的去噪自编码器的性能。
- en: Figure 8-77
  id: totrans-490
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-77
- en: The noisy/perturbed input (left), the unperturbed desired output (middle), and
    the predicted output (right) for a denoising autoencoder trained on MNIST with
    a noisy normal distribution of standard deviation 0.9
  id: totrans-491
  prefs: []
  type: TYPE_NORMAL
  zh: 对于在MNIST上使用标准差为0.9的噪声正态分布训练的去噪自编码器，其噪声/扰动输入（左），未扰动的期望输出（中），以及预测输出（右）。
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig76_HTML.png)'
  id: totrans-492
  prefs: []
  type: TYPE_IMG
  zh: '![图8-76](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig76_HTML.png)'
- en: A 6 by 6 number grid of various image patterns acquired as a result of the performance
    of autoencoder having the denoising feature.
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
  zh: 通过具有去噪功能的自编码器性能获得的6x6数字网格的各种图像模式。
- en: Figure 8-76
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-76
- en: A sample of MNIST images with added normally distributed random noise using
    standard deviation 0.9
  id: totrans-495
  prefs: []
  type: TYPE_NORMAL
  zh: 使用标准差为0.9的正态分布随机噪声添加到MNIST图像中的样本。
- en: We can see that denoising autoencoders can perform reconstruction to a pretty
    impressive degree. In practice, however, we want to keep our noise level somewhat
    low; increasing the noise level can destroy information and cause the network
    to develop incorrect and/or overly simplified representations of decisions.
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到，去噪自编码器可以以相当令人印象深刻的程度进行重建。然而，在实践中，我们希望保持噪声水平相对较低；提高噪声水平可能会破坏信息，并导致网络发展出错误和/或过度简化的决策表示。
- en: A similar logic can be applied to tabular data. There are many situations in
    which you find that a tabular dataset is particularly noisy. This is especially
    common in scientific datasets recording variable physical activity, like low-level
    physics dynamics or biological system data.
  id: totrans-497
  prefs: []
  type: TYPE_NORMAL
  zh: 类似的逻辑可以应用于表格数据。有许多情况下，你会发现表格数据集特别嘈杂。这在记录变量物理活动的科学数据集中尤为常见，如低级物理动力学或生物系统数据。
- en: Let’s build a denoising autoencoder for the Mice Protein Expression dataset.
    Listing [8-31](#PC32) loads the dataset and splits it into a training and a validation
    set.
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们为Mice Protein Expression数据集构建一个去噪自编码器。列表[8-31](#PC32)加载数据集并将其分为训练集和验证集。
- en: '[PRE31]'
  id: totrans-499
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: Listing [8-32](#PC33) builds a standard autoencoder architecture.
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: 列表[8-32](#PC33)构建了一个标准的自编码器架构。
- en: '[PRE32]'
  id: totrans-501
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: To train, we generate noise to the input and train the model to reconstruct
    the original input from the noisy input. In tabular datasets, we generally cannot
    add randomly distributed noise to the entire set of data in blanket fashion, because
    different features operate on different scales. Instead, the noise should be dependent
    on the standard deviation of each feature itself. In this implementation, we add
    noise randomly sampled from a normal distribution with a standard deviation equal
    to one-fifth of the actual feature’s standard deviation (Listing [8-33](#PC34)).
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: 为了训练，我们向输入生成噪声，并训练模型从噪声输入中重建原始输入。在表格数据集中，我们通常不能以统一的方式向整个数据集添加随机分布的噪声，因为不同的特征在不同的尺度上操作。相反，噪声应该依赖于每个特征本身的标准差。在本实现中，我们添加了从标准差等于实际特征标准差五分之一的正态分布中随机采样的噪声（列表[8-33](#PC34)）。
- en: '[PRE33]'
  id: totrans-503
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: Listing [8-34](#PC35) demonstrates the evaluation of such a model on novel validation
    noisy data.
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: 列表[8-34](#PC35)展示了在新的验证噪声数据上对该模型进行评估。
- en: '[PRE34]'
  id: totrans-505
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: After training, the encoder of the denoising autoencoder can be used for pretraining
    or other previously described applications.
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: 训练完成后，去噪自动编码器的编码器可用于预训练或其他之前描述的应用。
- en: Key Points
  id: totrans-507
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键点
- en: In this chapter, we discussed the autoencoder architecture and how it can be
    used in four different contexts – pretraining, multitask training, sparse autoencoders,
    and denoising autoencoders.
  id: totrans-508
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们讨论了自动编码器架构及其在四个不同场景中的应用——预训练、多任务训练、稀疏自动编码器和去噪自动编码器。
- en: Autoencoders are neural network architectures trained to encode an input into
    a latent space with a representation size smaller than the original input and
    then to reconstruct the input from the latent space. Autoencoders are forced to
    learn meaningful latent representations of the data because of this imposed information
    bottleneck.
  id: totrans-509
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自动编码器是经过训练的神经网络架构，用于将输入编码到比原始输入小的潜在空间中，然后从潜在空间中重建输入。由于这种强加的信息瓶颈，自动编码器被迫学习数据的具有意义的潜在表示。
- en: The encoder of a trained autoencoder can be detached and built as the feature
    extractor of a supervised network; that is, the autoencoder serves the purpose
    of pretraining.
  id: totrans-510
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 训练好的自动编码器的编码器可以分离出来，并作为监督网络的特征提取器构建；也就是说，自动编码器起到了预训练的作用。
- en: In cases where supervised learning is difficult to get started with, creating
    a multitask autoencoder that can optimize its loss by performing both the supervised
    task and an auxiliary autoencoding task can help overcome initial learning hurdles.
  id: totrans-511
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在监督学习难以开始的情况下，创建一个能够通过执行监督任务和辅助自动编码任务来优化其损失的多任务自动编码器可以帮助克服初始学习障碍。
- en: Sparse autoencoders use a significantly expanded latent space size, but are
    trained with restrictions on latent space activity, such that only a few nodes/neurons
    can be active at any one pass. Sparse autoencoders are thought to be more robust.
  id: totrans-512
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 稀疏自动编码器使用显著扩大的潜在空间大小，但在训练时对潜在空间活动施加限制，使得在任何一次传递中只有少数节点/神经元可以活跃。人们认为稀疏自动编码器更稳健。
- en: Denoising autoencoders are trained to reconstruct clean data from an artificially
    corrupted, noisy data. In the process, the encoder learns to look for key patterns
    and “denoises” data, which can be a useful component for supervised models.
  id: totrans-513
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 去噪自动编码器被训练从人工损坏、噪声数据中重建干净数据。在这个过程中，编码器学会寻找关键模式并对数据进行“去噪”，这可以是有用的监督模型组件。
- en: In the next chapter, we will look into deep generative models – including a
    particular type of autoencoder, the Variational Autoencoder (VAE) – which can
    notably be used to reconcile unbalanced datasets, improve model robustness, and
    train models on sensitive/private data, in addition to other applications.
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将探讨深度生成模型——包括一种特殊的自动编码器，即变分自动编码器（VAE）——它可以显著用于解决不平衡数据集、提高模型鲁棒性，以及在敏感/私人数据上训练模型，以及其他应用。
