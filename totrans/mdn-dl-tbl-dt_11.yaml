- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: If we had loaded the model as `model = buildAutoencoder(784, 32)[‘model’]` and
    the encoder as `encoder = buildAutoencoder(784, 32)[‘encoder’]`, we indeed would
    obtain a model architecture and an encoder architecture – but they wouldn’t be
    “linked.” The stored model would be associated with an encoder that we haven’t
    captured, and the stored encoder would be part of an overarching model that we
    haven’t captured. Thus, we make sure to store the entire set of model components
    into `modelSet` first.
  prefs: []
  type: TYPE_NORMAL
- en: Each individual point is colored by the target label (i.e., the digit associated
    with the data point) for the purpose of exploring the autoencoder’s ability to
    implicitly “cluster” points of the same digit together or separate them, even
    though the autoencoder was never exposed to the labels. Observe that as the dimensionality
    of the latent space increases, the overlap between data samples of different digits
    decreases until there is functionally complete separation between digits of different
    classes.
  prefs: []
  type: TYPE_NORMAL
- en: If we build an architecture in which the input is expanded rather than compressed
    and visualize a dimensionality reduction of the latent space (Listing [8-8](#PC8)),
    we find that the learned representations are significantly less meaningful (Figure
    [8-31](#Fig31)) – despite this architecture obtaining very high performance (i.e.,
    low training error).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig31_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An image visualises compressed latent space reduction. It indicates high performance
    with low training errors.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-31
  prefs: []
  type: TYPE_NORMAL
- en: t-SNE projection of a latent space for an overcomplete autoencoder with a bottleneck
    size of 2048 trained on MNIST
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'Let’s revisit the example given at the beginning of this subsection: reconstruction
    of an image of a line. Listing [8-9](#PC9) generates a dataset of 50-by-50 images
    with randomly placed line segments using the image processing library `cv2` (Listing
    [8-9](#PC9)).'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: Since theoretically we can intuitively represent each line segment with four
    values, we’ll build and train an autoencoder with four neurons in the latent space
    on the dataset (Listing [8-10](#PC10)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: The model reaches near 0.03 binary cross-entropy, which is quite good. Its reconstructions
    are very accurate (Figure [8-32](#Fig32)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig32_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An image represents binary cross-entropy that results in accurate reconstructions.
    It depicts a line in different dimensions.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-32
  prefs: []
  type: TYPE_NORMAL
- en: 'Left column: original input images of lines. Right column: reconstructions
    via an autoencoder with a latent space dimensionality of 4'
  prefs: []
  type: TYPE_NORMAL
- en: In fact, an autoencoder trained with only two neurons does a decent job at identifying
    the general shape of the line marked in the input (Figure [8-33](#Fig33)). If
    you look closely, you will identify the silhouette of other lines. There are many
    hypotheses to explain their presence. One possibility is that the autoencoder
    has “memorized”/”internalized” a set of generally useful “landmark” samples that
    are then mapped to during prediction and that with a larger latent space increased
    information for precise placement could be passed through.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig33_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An image represents input received as a straight line from an autoencoder trained
    set with two neurons.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-33
  prefs: []
  type: TYPE_NORMAL
- en: 'Left column: original input images of lines. Right column: reconstructions
    via an autoencoder with a latent space dimensionality of 2'
  prefs: []
  type: TYPE_NORMAL
- en: Finally, let’s explore how we can apply autoencoders to a strictly tabular dataset
    – the Mice Protein Expression dataset, used in previous chapters (Listing [8-11](#PC11)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: Recall that we need to look at the input data in order to gauge how to deal
    with the model output in autoencoders. If we call `mpe_x_train.min()`, Pandas
    returns a series with the minimum value per column.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: Calling `.``min()` again takes the minimum of the minimums across columns. We
    find that the smallest value across the entire dataset is –0.062007874, whereas
    the maximum is 8.482553422\. Since values can theoretically be negative, we’ll
    use a linear output activation instead of a ReLU and optimize using the standard
    Mean Squared Error loss for regression problems (Listing [8-12](#PC13)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: After 150 epochs of training, which progresses very quickly (this is a comparatively
    small dataset), the autoencoder obtains good training and validation performance
    (Table [8-1](#Tab1), Figure [8-34](#Fig34)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig34_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A graph represents validation and training performance received after 150 epochs
    of training sets. It exhibits an L shaped curve.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-34
  prefs: []
  type: TYPE_NORMAL
- en: Training history of an autoencoder trained on the Mice Protein Expression dataset
  prefs: []
  type: TYPE_NORMAL
- en: Table 8-1
  prefs: []
  type: TYPE_NORMAL
- en: Performance of the autoencoder trained on the Mice Protein Expression dataset
  prefs: []
  type: TYPE_NORMAL
- en: '|   | Train | Validation |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Mean Squared Error | 0.0117 | 0.0118 |'
  prefs: []
  type: TYPE_TB
- en: '| Mean Absolute Error | 0.0626 | 0.0625 |'
  prefs: []
  type: TYPE_TB
- en: Figures [8-35](#Fig35) demonstrates some sample latent vectors and reconstructions
    made by our autoencoder, with the input and reconstructed vectors reshaped into
    8-by-10 grids for more convenient viewing.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig35_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An image pattern highlights the latent vectors samples and reconstruction created
    by the autoencoder. It exhibits the vectors into 8 by 10 grids.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-35
  prefs: []
  type: TYPE_NORMAL
- en: Samples and the associated latent vector and reconstruction by an autoencoder
    trained on the Mice Protein Expression dataset. Samples and reconstructions are
    represented in two spatial dimensions for convenience of viewing
  prefs: []
  type: TYPE_NORMAL
- en: We can employ a similar technique as previously employed on the MNIST dataset
    – visualizing the latent space of an autoencoder using t-SNE. Each data point
    in Figure [8-36](#Fig36) is colored by one of the eight classes each row in the
    Mice Protein Expression dataset falls into. This tabular autoencoder obtains pretty
    good separation between classes without any exposure to the labels.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig36_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A scatter diagram visualises data points obtained as a result of tabular autoencoder.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-36
  prefs: []
  type: TYPE_NORMAL
- en: t-SNE projection of a latent space for an autoencoder trained on the Mice Protein
    Expression dataset
  prefs: []
  type: TYPE_NORMAL
- en: Note that a more formal/rigorous tabular autoencoder design would require us
    to standardize or normalize all columns to within the same domain. Tabular datasets
    often contain features that operate on different scales; for instance, say feature
    A represents a proportion (i.e., between 0 and 1, inclusive), whereas feature
    B measures years (i.e., likely larger than 1000). Regression losses simply take
    the mean error across all columns, which means that the reward for correctly reconstructing
    A is negligible compared to reconstructing feature B. In this case, however, all
    columns are in roughly the same range, so skipping this step is tolerable.
  prefs: []
  type: TYPE_NORMAL
- en: In the next subsection, we will explore a direct application of autoencoders
    to concretely improve the performance of supervised models.
  prefs: []
  type: TYPE_NORMAL
- en: Autoencoders for Pretraining
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Vanilla autoencoders, as we have already seen, can do some pretty cool things.
    We see that a vanilla autoencoder trained on various datasets can perform implicit
    clustering and classification of digits, without being exposed to the labels themselves
    as well. Rather, natural differences in the input resulting from differences in
    labels are independently observed and implicitly recognized by the autoencoder.
  prefs: []
  type: TYPE_NORMAL
- en: This sort of impressive feature extraction capability is valuable in the context
    of training neural networks to perform supervised tasks. Say we want a neural
    network to classify digits from the MNIST dataset. If we start from scratch, we
    are asking the neural network to learn both how to extract the optimal set of
    features and how to interpret them – all at once, with no prior information. However,
    we see that the encoder of an autoencoder trained on the MNIST dataset has developed
    an impressive feature extraction and class separation scheme. We can use the encoder
    of the autoencoder as a *pretraining* instrument; rather than building and training
    a new network that learns both extraction and interpretation from scratch, we
    can simply append a model component to the output of the encoder to interpret
    the already-learned feature extractor (i.e., the encoder) (Figure [8-37](#Fig37)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig37_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An infographic image illustrates autoencoder and task training sets. It describes
    the features of the extractor.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-37
  prefs: []
  type: TYPE_NORMAL
- en: Schematic of multistage pretraining
  prefs: []
  type: TYPE_NORMAL
- en: In the first stage of training, we train the autoencoder on the standard input
    reconstruction task. After sufficient training, we can extract the encoder and
    append an “interpretation”-focused model component that assembles and arranges
    the features extracted by the encoder into the desired output.
  prefs: []
  type: TYPE_NORMAL
- en: During stage 2, we impose *layer freezing* upon the encoder, meaning that we
    prevent its weights from being trained. This is to retain the learned structures
    of the encoder. We spent a significant amount of effort obtaining a good feature
    extractor; if we do not impose layer freezing, we will find that optimizing a
    good feature extractor connected to a very poor (randomly initialized) feature
    interpreter degrades the feature extractor.
  prefs: []
  type: TYPE_NORMAL
- en: However, once good performance is obtained on training with a frozen feature
    extractor and a trainable feature interpreter, the entire model can be trained
    for a few epochs for the purposes of fine-tuning (Figure [8-38](#Fig38)). The
    idea here is that the feature interpreter has developed a good relationship with
    the static feature extractor, but now both can be jointly optimized to improve
    the relationship. (Just like couples in relationships, it’s not healthy if one
    partner is always static!)
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig38_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flow diagram depicts the performance achieved as a result of the feature interpreter.
    It has labels namely primary training and fine-tuning.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-38
  prefs: []
  type: TYPE_NORMAL
- en: Freezing followed by fine-tuning can be an effective way to perform autoencoder
    pretraining.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s begin by demonstrating autoencoder pretraining on MNIST. We’ll use the
    `buildAutoencoder` function defined previously to fit an autoencoder, making sure
    to retain references to both the original model and the encoder (Listing [8-13](#PC14)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: After the model has been sufficiently trained, we can extract the encoder and
    stack it as the feature extraction unit/component of our task model (Listing [8-14](#PC15)).
    The outputs of the encoder (named encoded in the following script) are further
    interpreted via several fully connected layers. The encoder is set not to be trainable
    (i.e., layer freezing). The task model is trained on the original supervised task.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: After sufficient training, it is common practice to make the encoder trainable
    again and fine-tune the entire architecture in an end-to-end fashion (Listing
    [8-15](#PC16)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: We often reduce the learning rate on fine-tuning tasks to prevent destruction/”overwriting”
    of information learned during the pretraining process. This can be accomplished
    by recompiling the model after pretraining with an optimizer configured with a
    different initial learning rate.
  prefs: []
  type: TYPE_NORMAL
- en: We can compare the performance of this model to one with no pretraining (i.e.,
    begins learning in a supervised fashion from scratch) (Listing [8-16](#PC17),
    Figure [8-39](#Fig39)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig39_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph represents the comparison of the given model during the pretraining
    stage.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-39
  prefs: []
  type: TYPE_NORMAL
- en: Comparing the training curves for a classifier trained on the MNIST dataset
    with and without autoencoder pretraining
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: The MNIST dataset is relatively simple, so both models converge relatively quickly
    to good weights. However, the model with pretraining is noticeably “ahead” of
    the other. By taking the difference between the epoch at which a model with and
    without pretraining obtains some performance value, we can estimate how “far ahead”
    a model with autoencoder pretraining is. For any loss *p* (at least one epoch
    in training), the model with pretraining reaches *p* two to four epochs before
    the model without pretraining.
  prefs: []
  type: TYPE_NORMAL
- en: This process seems and is superfluous on the MNIST dataset, which has a comparatively
    simple set of rules in a comparatively small number of dimensions. However, this
    advantage manifests more significantly for more complex datasets, as has been
    shown with more advanced computer vision and natural language processing tasks.
    Neural networks trained to perform large-scale image classification (e.g., ImageNet),
    for instance, benefit significantly from performing an autoencoder pretraining
    task that learns useful latent features that are later interpreted and fine-tuned.
    Similarly, it has been shown that language models learn important fundamental
    structures of language by performing reconstruction tasks, which can be later
    used as the basis for a supervised task like text classification or generation
    (Figure [8-40](#Fig40)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig40_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A model diagram represents reconstruction tasks that can be used as a basis
    for generation and text classification.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-40
  prefs: []
  type: TYPE_NORMAL
- en: General transfer learning/pretraining design used dominantly in computer vision
  prefs: []
  type: TYPE_NORMAL
- en: Recall, for instance, the Inception and EfficientNet models discussed in Chapter
    [4](525591_1_En_4_Chapter.xhtml). Keras allows users to load weights from a model
    trained on ImageNet because the feature extraction “skills” required to perform
    well on a wide-ranging task like ImageNet are valuable or can be adapted to become
    valuable in most computer vision tasks.
  prefs: []
  type: TYPE_NORMAL
- en: However, as we have previously seen in Chapters [4](525591_1_En_4_Chapter.xhtml)
    and [5](525591_1_En_5_Chapter.xhtml), the success of a deep learning method on
    complex image and natural language data does not necessarily bar it from being
    useful to tabular data applications too.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s consider the Mice Protein Expression dataset. We can begin by instantiating
    and training a sample autoencoder (Listing [8-17](#PC18)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: We can now create and fit a task model using the trained encoder in two phases,
    the first in which the encoder is frozen and the second in which the encoder is
    trainable (Listing [8-18](#PC19), Figure [8-41](#Fig41)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig41_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph represents a task model utilising the trained encoder in the frozen
    and training phases.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-41
  prefs: []
  type: TYPE_NORMAL
- en: Validation and training curves for stages 1 and 2
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: Alternatively, consider the Higgs Boson dataset. This dataset only has 28 features.
    If we use our standard autoencoder logic, which halves the number of nodes in
    each encoder layer and doubles the number of nodes in each decoder layer, we will
    either need to have a very smaller number of layers to use a reasonable latent
    space size or a very small latent space to use a reasonable number of layers.
    For instance, if our latent space has only eight features, the autoencoder logic
    would build only two layers (28 → 16 → 8). On the other hand, if we want a larger
    number of layers (e.g., five), we would need a very small latent space (e.g.,
    an autoencoder with 28 → 16 → 8 → 4 → 2 → 1). In this case, it’s most beneficial
    to design a custom autoencoder with a sufficiently large latent space and a sufficient
    number of layers. We could design an autoencoder, for instance, with six layers
    in the encoder and decoder each and a latent space of 16 dimensions (Listing [8-19](#PC20)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: We can treat a static encoder as a feature extractor for our task model (Listing
    [8-20](#PC21), Figures [8-42](#Fig42) and Figure [8-43](#Fig43)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig43_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph represents a rising and erratic curve which makes the static encoder
    a feature extractor.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-43
  prefs: []
  type: TYPE_NORMAL
- en: Validation and training accuracy curves for stages 1 and 2
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig42_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph represents downward-sloping and erratic curves. It exhibits pre-trained
    encoder functioning as a feature extractor.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-42
  prefs: []
  type: TYPE_NORMAL
- en: Validation and training loss curves for stages 1 and 2
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: We can observe a significant amount of overfitting in this particular case.
    We can attempt to improve generalization by employing best practices such as adding
    dropout or batch normalization.
  prefs: []
  type: TYPE_NORMAL
- en: 'Lastly, it should be noted that using autoencoders for pretraining is a great
    *semi-supervised* method. Semi-supervised methods make use of data with and without
    labels (and are used most often in cases where labeled data is scarce and unlabeled
    data is abundant). Say you possess three sets of data: *X*[unlabeled], *X*[labeled],
    and *y* (which corresponds to *X*[labeled]). You can train an autoencoder to reconstruct
    *X*[unlabeled] and then use the frozen encoder as the feature extractor in a task
    model to predict *y* from *X*[labeled]. This technique generally works well even
    when the size of *X*[unlabeled] is significantly larger than the size of *X*[labeled];
    the autoencoding task learns meaningful representations that should be significantly
    easier to associate with a supervised target than beginning from initialization.'
  prefs: []
  type: TYPE_NORMAL
- en: Multitask Autoencoders
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Pretraining with autoencoders is often an effective strategy to take advantage
    of quality learned latent features. However, one criticism of the system is that
    it proceeds *sequentially* – autoencoder training takes place at a separate stage
    than the task training. Multitask autoencoders train the network on the autoencoder
    task and the intended task *simultaneously* (hence the name multitask). These
    autoencoders accept one input that is encoded by the encoder into a latent space.
    This one set of latent features is decoded separately by two “decoders” into two
    outputs; one output is dedicated to the autoencoder task, while the other is dedicated
    to the intended task. The network learns both of these tasks at the same time
    during training (Figures [8-44](#Fig44) and [8-45](#Fig45)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig45_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flow diagram depicts the latent features dedicated to the intended task. It
    has labels namely the input data, encoding layers, and latent space.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-45
  prefs: []
  type: TYPE_NORMAL
- en: Multitask learning
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig44_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A model represents output dedicated to the task of the autoencoder. It has labels
    namely the input data, model and task output.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-44
  prefs: []
  type: TYPE_NORMAL
- en: Original task model
  prefs: []
  type: TYPE_NORMAL
- en: By training the autoencoder simultaneously along the task network, we can theoretically
    experience the benefits of the autoencoder in a dynamic fashion. Say the encoder
    has “difficulty” encoding features in a way relevant to the task output, which
    can be difficult. However, the encoder component of the model can still decrease
    the overall loss by learning features relevant to the autoencoder reconstruction
    task. These features may provide continuous support for the task output by providing
    the optimizer a viable path to loss minimization – it is “another way out,” so
    to speak. Using multitask autoencoders is often an effective technique to avoid
    or minimize difficult local minimum problems, in which the model makes mediocre
    to negligible progress in the first few moments of training and then plateaus
    (i.e., is stuck in a poor local minimum).
  prefs: []
  type: TYPE_NORMAL
- en: In order to construct a multitask autoencoder, we begin by initializing an autoencoder
    and extracting the encoder and decoder components. We create a “tasker” model
    that accepts latent features (i.e., data of the shape of the encoder output) and
    processes them into the task output (i.e., one of ten digits, in the case of MNIST).
    Each of these components can be linked using functional API syntax to form a complete
    multitask autoencoder architecture (Listing [8-21](#PC22), Figure [8-46](#Fig46)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig46_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A network architecture depicts the interlinking of functional A P I syntax to
    create a complete multitask autoencoder.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-46
  prefs: []
  type: TYPE_NORMAL
- en: Visualization of a multitask autoencoder architecture
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: Because the multitask autoencoder has multiple outputs, we need to specify losses
    and labels for each of the outputs by referencing a particular output’s name.
    In this case, the two outputs have been named “decoder” and “taskOut.” The decoder
    output will be given the original input (i.e., `x_train`) and optimized with binary
    cross-entropy, since its objective is to perform pixel-wise reconstruction. The
    task output will be given the image labels (i.e., `y_train`) and optimized with
    categorical cross-entropy, since its objective is to perform multiclass classification
    (Listing [8-22](#PC23)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: We can observe from the training history that the model is able to reach both
    a fairly good task loss and a reconstruction loss within just a few dozen epochs
    (Listing [8-23](#PC24), Figure [8-47](#Fig47)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig47_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph depicts three different curves. It exhibits a similar pattern.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-47
  prefs: []
  type: TYPE_NORMAL
- en: Different dimensions of performance (reconstruction loss, task loss, overall
    loss)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: Figures [8-48](#Fig48) to [8-51](#Fig51) visualize how the state of the multitask
    autoencoder progresses throughout each epoch.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig51_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An output image represents the progression of multitask encoder at several more
    epochs.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-51
  prefs: []
  type: TYPE_NORMAL
- en: Several more epochs
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig50_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An image in the shape of the number seven at two epochs.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-50
  prefs: []
  type: TYPE_NORMAL
- en: Multitask autoencoder at two epochs
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig49_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An image in a square represents an autoencoder at one epoch.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-49
  prefs: []
  type: TYPE_NORMAL
- en: Multitask autoencoder at one epoch
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig48_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An image interprets the performance of the encoder at every epoch.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-48
  prefs: []
  type: TYPE_NORMAL
- en: Multitask autoencoder at zero epochs
  prefs: []
  type: TYPE_NORMAL
- en: From these visualizations and the training history, we see that the multitask
    autoencoder obtains better performance on the task than the autoencoding task
    that is intended to assist task performance! In this case, the MNIST dataset’s
    task output is more straightforward than the autoencoding task, which makes sense.
    In this case, using a multitask autoencoder is not beneficial. It probably is
    more beneficial to directly train or use an autoencoder for pretraining when multitask
    autoencoders perform poorly.
  prefs: []
  type: TYPE_NORMAL
- en: We can use an adapted approach on the Mice Protein Expression dataset, in which
    we see that autoencoding is a more approachable problem than the task of classification
    itself, both from the training history (Figures [8-52](#Fig52)) and output state
    progression visualizations (Figures [8-53](#Fig53) through [8-56](#Fig56)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig56_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Four images. 3 grid images display various encoding features at the original
    input, decoder output, and other stages and one graph plots the Absolute error,
    truth, and predicted values.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-56
  prefs: []
  type: TYPE_NORMAL
- en: The state of the multitask autoencoder after 50 epochs
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig55_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Four images. 3 grid images illustrate the variation in output in a multitask
    encoder and one graph plots the Absolute error, truth, and predicted values.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-55
  prefs: []
  type: TYPE_NORMAL
- en: The state of the multitask autoencoder after five epochs
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig54_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Four images. 3 grid images visualize the various outputs obtained after one
    epoch and one graph plots the Absolute error, truth, and predicted values.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-54
  prefs: []
  type: TYPE_NORMAL
- en: The state of the multitask autoencoder after one epoch
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig53_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Four images. 3 grid image visualizes various output state progression values
    of the set of 80 features and one graph plots the Absolute error, truth and predicted
    values.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-53
  prefs: []
  type: TYPE_NORMAL
- en: 'The state of the multitask autoencoder after zero epochs (i.e., upon initialization).
    Top: displays the original set of 80 features in the Mice Protein Expression dataset
    (arranged in a grid for more convenient visual viewing), the output of the decoder
    (of which the goal is to reconstruct the input), and the absolute error of the
    reconstruction. Bottom: the predicted and true classes (eight in total) and the
    absolute probability error'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig52_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph exhibits autoencoding from the training history of the approach
    on the Mice protection expression dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-52
  prefs: []
  type: TYPE_NORMAL
- en: Different dimensions of performance on the Mice Protein Expression dataset
  prefs: []
  type: TYPE_NORMAL
- en: Figures [8-53](#Fig53) through [8-56](#Fig56) demonstrate the performance of
    the reconstruction task alongside the classification task at various stages in
    training. Notice that the reconstruction error converges near zero quickly and
    helps “pull”/”guide” the task error to zero over time.
  prefs: []
  type: TYPE_NORMAL
- en: In many cases, simultaneous execution of the autoencoder task and the original
    desired task can help provide stimulus to “push” progress on the desired task.
    However, you may make the valid objection that once the desired task reaches sufficiently
    good performance, it becomes limited by the autoencoding task.
  prefs: []
  type: TYPE_NORMAL
- en: One method to reconcile with this is simply to detach the autoencoder output
    from the model by creating a new model connecting the input to the task output
    and fine-tuning on the dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Another more sophisticated technique is to change the loss weights between the
    original desired task and the autoencoding task. While Keras weighs multiple losses
    equally by default, we can provide different weights to reflect different levels
    of priority or importance delegated to each of the tasks. At the beginning of
    training, we can give a high weight to the autoencoding task, since we want the
    model to develop useful representations through a (ideally somewhat easier) task
    of autoencoding. Throughout the training duration, the weight on the original
    task model loss can be successively increased and the weight on the autoencoder
    model loss decreased. To formalize this, let *α* be the weight on the task output
    loss, and let 1 − *α* be the weight on the decoder output loss (with 0 < *α* < 1).
  prefs: []
  type: TYPE_NORMAL
- en: 'The sigmoid equation ![$$ \sigma (x)=\frac{1}{1+{e}^{-x}} $$](../images/525591_1_En_8_Chapter/525591_1_En_8_Chapter_TeX_IEq3.png)
    is a pretty good way to get from a value very close to some minimum bound to another
    value very close to an upper bound. Over the span of 100 epochs, we can employ
    a simple (arbitrarily set but functional) transformation on the sigmoid function
    to obtain a smooth transition from a slow to high value of *α* (visualized by
    Listing [8-24](#PC25) in Figure [8-57](#Fig57)), where *t* represents the epoch
    number:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \alpha =\sigma \left(\frac{t-50}{10}\right)=\frac{1}{1+{e}^{-\left(\frac{t-50}{10}\right)}}
    $$](../images/525591_1_En_8_Chapter/525591_1_En_8_Chapter_TeX_Equc.png)'
  prefs: []
  type: TYPE_IMG
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig57_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph represents a smooth transition from a slow to a high value of the
    sigmoid function. It plots the output weight and the decoder output weight.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-57
  prefs: []
  type: TYPE_NORMAL
- en: Plot of the task output loss weight and the decoder weight across each epoch
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
- en: 'A generalized equation to scale *α* through *t*[max] using a transformation
    of the sigmoid function is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \alpha =\sigma \left(\frac{t-\frac{t_{\textrm{max}}}{2}}{\frac{t_{\textrm{max}}}{10}}\right)=\frac{1}{1+{e}^{-\left(\frac{t-\frac{t_{\textrm{max}}}{2}}{\frac{t_{\textrm{max}}}{10}}\right)}}
    $$](../images/525591_1_En_8_Chapter/525591_1_En_8_Chapter_TeX_Equd.png)'
  prefs: []
  type: TYPE_IMG
- en: At initial conditions, we have *α* at a very small value. (For the purposes
    of this calculation, we use *t* = 1 for simplification of calculation.)
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \alpha @\left\{t\approx 0\right\}\to \frac{1}{1+{e}^{-\left(\frac{-\frac{t_{\textrm{max}}}{2}}{\frac{t_{\textrm{max}}}{10}}\right)}}=\frac{1}{1+{e}^5}\approx
    0.006692 $$](../images/525591_1_En_8_Chapter/525591_1_En_8_Chapter_TeX_Eque.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The training regime completes at *t* = *t*[max], at which *α* is very close
    to 1:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \alpha @\left\{t={t}_{\textrm{max}}\right\}\to \frac{1}{1+{e}^{-\left(\frac{t_{\textrm{max}}-\frac{t_{\textrm{max}}}{2}}{\frac{t_{\textrm{max}}}{10}}\right)}}=\frac{e^5}{1+{e}^5}\approx
    0.993307 $$](../images/525591_1_En_8_Chapter/525591_1_En_8_Chapter_TeX_Equf.png)'
  prefs: []
  type: TYPE_IMG
- en: Moreover, we observe by taking the derivative and solving for the maximum that
    the largest change for some *t*[max] is ![$$ \frac{5}{2\cdotp {t}_{\textrm{max}}}
    $$](../images/525591_1_En_8_Chapter/525591_1_En_8_Chapter_TeX_IEq4.png). As *t*[max]
    increases, analysis of the derivative reveals that the overall change becomes
    more uniformly spread out. For large values of *t*[max], this functionally becomes
    a horizontal line (i.e., the derivative becomes near 0). A simple linear transformation
    of *α* also suffices in most cases in which *t*[max] is reasonably large.
  prefs: []
  type: TYPE_NORMAL
- en: Loss weighting is conveyed in the compiling stage. This means that we’ll have
    to recompile and fit every epoch. This is not difficult to do; we can write a
    for loop that loops through every epoch, calculates the *α* value for that epoch,
    compiles the model with that loss weighting, and fits for one epoch. Collecting
    the training history is slightly more manual; we need to collect the metrics for
    the single epoch and append them to user-created lists (Listing [8-25](#PC26)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE25]'
  prefs: []
  type: TYPE_PRE
- en: 'For another higher-code but perhaps smoother approach to dynamically adjusting
    the loss calculation weights of multi-output models, which does not require repeated
    refitting, see Anuj Arora’s well-written post on adaptive loss weighting in Keras
    using callbacks: [https://​medium.​com/​dive-into-ml-ai/​adaptive-weighing-of-loss-functions-for-multiple-output-keras-models-71a1b0aca66e](https://medium.com/dive-into-ml-ai/adaptive-weighing-of-loss-functions-for-multiple-output-keras-models-71a1b0aca66e).'
  prefs: []
  type: TYPE_NORMAL
- en: Figure [8-58](#Fig58) demonstrates the history of the reconstruction, task,
    and overall losses throughout training of the multitask autoencoder, with the
    background shaded by the value of *α* used at that epoch. Note that the reconstruction
    task is more trivial than the original intended task (hence the faster decline
    in loss) and the logistically shaped overall loss function that makes major changes
    in *α* in epochs 40–60 and “switches” bounds from the reconstruction to the original
    task loss.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig58_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A diagram interprets the reconstruction task and the total losses incurred through
    the entire training of the multitask autoencoder.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-58
  prefs: []
  type: TYPE_NORMAL
- en: Diagram of reconstruction loss, task loss, and overall loss (now a dynamically
    weighted sum) with the weighting gradient shaded in the background
  prefs: []
  type: TYPE_NORMAL
- en: Multitask autoencoders perform best in difficult supervised classification tasks
    that benefit from rich latent features, which can be learned well by autoencoders.
  prefs: []
  type: TYPE_NORMAL
- en: Sparse Autoencoders
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Standard autoencoders are given the limitation of size representation – autoencoder
    architectures are built with a “physical” bottleneck through which information
    must be compressed. The autoencoder attempts to maximize the amount of information
    it can squeeze through a significantly compressed latent space such that the information
    can reliably be decoded into the original output (Figure [8-59](#Fig59)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig59_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A network architecture exhibits compressed latent space. It indicates data is
    decoded reliably into the original output.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-59
  prefs: []
  type: TYPE_NORMAL
- en: A standard autoencoder, which encodes information into a densely packed and
    quasi-continuous latent space
  prefs: []
  type: TYPE_NORMAL
- en: However, this is not the only limit we can impose. Another information bottleneck
    tool is *sparsity*. We can make the bottleneck layer very large, but force only
    a few nodes to be active at any one pass. While this still forces a limitation
    on the amount of *information* that can pass through the bottleneck layer, the
    network is given more freedom and control to “choose” *which* nodes information
    passes through, which itself is an additional medium of information expression
    (Figure [8-60](#Fig60)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig60_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A network diagram exhibits a free pattern that enables the selection of the
    data of nodes.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-60
  prefs: []
  type: TYPE_NORMAL
- en: A sparse autoencoder, in which a much larger latent size is accessible but only
    a few nodes can be used at any one time
  prefs: []
  type: TYPE_NORMAL
- en: 'To maintain sparsity, we generally impose L1 regularization on the layer’s
    activity. (Recall the discussion of regularization in Chapter [3](525591_1_En_3_Chapter.xhtml),
    “Regularization Learning Networks.”) L1 regularization penalizes the output activity
    of the bottleneck layer by being too large. Assuming a network uses binary cross-entropy
    loss to minimize task output and *λ* represents the overall activity/output of
    the bottleneck layer, the joint loss of an L1-regularized network is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \textrm{loss}= BCE\left({y}_{\textrm{pred}},{\textrm{y}}_{\textrm{true}}\right)+\alpha
    \cdotp \mid \lambda \mid $$](../images/525591_1_En_8_Chapter/525591_1_En_8_Chapter_TeX_Equg.png)'
  prefs: []
  type: TYPE_IMG
- en: The parameter *α* is user-defined and controls the “importance” of the L1 regularization
    term relative to the task loss. Setting the correct value of *α* is important
    for correct behavior. If *α* is too small, the network ignores the sparsity restriction
    in favor of completing the task, which is now made quasi-trivial by the overcomplete
    bottleneck layer. If *α* is too large, the network ignores the task by learning
    the “ultimate sparsity” – predicting all zeros in the bottleneck layer, which
    entirely minimizes *λ* but performs poorly on the actual task we want it to learn.
  prefs: []
  type: TYPE_NORMAL
- en: 'An alternative commonly used penalty is L2 regularization, in which the square
    rather than the absolute value is penalized:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \textrm{loss}= BCE\left({y}_{\textrm{pred}},{\textrm{y}}_{\textrm{true}}\right)+\alpha
    \cdotp {\lambda}^2 $$](../images/525591_1_En_8_Chapter/525591_1_En_8_Chapter_TeX_Equh.png)'
  prefs: []
  type: TYPE_IMG
- en: This is a common machine learning paradigm. L2 regularization tends to produce
    sets of values generally near zero but not at zero, whereas L1 regularization
    tends to produce values solidly at zero. An intuitive explanation is that L2 regularization
    significantly discounts the need to decrease values that are already somewhat
    near zero. The decrease from 3 to 2, for instance, is rewarded with a penalty
    decrease of 3² − 2² = 5\. The decrease from 1 to 0, on the other hand, is rewarded
    with a measly penalty decrease of 1² − 0² = 1\. On the other hand, L1 regularization
    rewards the decrease from 3 to 2 identically as the decrease from 1 to 0\. We
    generally use L1 regularization to impose sparsity constraints because of this
    property.
  prefs: []
  type: TYPE_NORMAL
- en: To implement this, we need to make a slight modification to our original `buildAutoencoder`
    function. We can build the autoencoder as if we were leading up to and from a
    certain *implicit* latent size, but replace the *implicit* latent size with the
    *real* (expanded) latent size. For instance, consider an autoencoder build with
    an input of 64 dimensions and an implicit latent space of 8 dimensions. The node
    count progression in each layer of a standard autoencoder using our prebuilt autoencoder
    logic would be 64 → 32 → 16 → 8 → 16 → 32 → 64\. However, because we are planning
    to impose a sparsity constraint on the bottleneck layer, we need to provide an
    expanded set of nodes to pass information through. Say the real bottleneck size
    is 128 nodes. The node count progression in each layer of this sparse autoencoder
    would be 64 → 32 → 16 → 128 → 16 → 32 → 64.
  prefs: []
  type: TYPE_NORMAL
- en: To actually implement the sparsity constraint, note that almost all layers in
    Keras have an `activity_regularizer` parameter, set upon initialization. This
    parameter penalizes the *activity*, or the output, of the layer (Listing [8-26](#PC27)).
    Note that you can also set the `weight_regularizer` or `bias_regularizer` parameter
    if you desire to penalize the learned weights or biases. In this case, we don’t
    care about how the encoder *arrives* at a sparse encoding, only that the encoder
    *creates* a sparse encoding. Hence, we perform regularization on the layer activity.
    The arguments accept a `keras.regularizers` object. We will use the L1 regularization
    object, which accepts the specific weighting of the penalty as a parameter. Setting
    the weight is important and should be given thought and experimentation, considering
    the model power, difficulty of autoencoding, and latent space size. As discussed
    previously, setting an improper weight in either direction (too large or too small)
    yields adverse outcomes.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE26]'
  prefs: []
  type: TYPE_PRE
- en: Figure [8-61](#Fig61) demonstrates performance of the sparse autoencoder on
    the MNIST dataset, in which a 64-dimensional latent space vector is reshaped into
    an 8-by-8 grid for convenient viewing. The reconstruction is not visibly worse
    than a standard autoencoder without a sparsity constraint. Notice that only two
    to five of the 64 nodes are active at any one pass (and that which node(s) are
    active vary for each image). A standard autoencoder trained even with five nodes
    in the bottleneck layer (no sparsity requirement) would obtain poor performance
    on reconstruction, demonstrating the informational richness of “choosing” which
    nodes are active.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig61a_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: An interpreter image represents sparse encoder performance on the M N I S T
    dataset.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig61b_HTML.jpg)![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig61c_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8-61
  prefs: []
  type: TYPE_NORMAL
- en: Sampled original inputs (left), latent space (middle), and reconstruction (right)
    for a sparse autoencoder trained on MNIST. The latent space is 256 neurons reshaped
    into a 16-by-16 grid for viewing. The actual latent space is not arranged in two
    spatial directions
  prefs: []
  type: TYPE_NORMAL
- en: If we decreased the regularization alpha value (i.e., the L1 penalty would be
    weighted less relative to the loss), the network would obtain better overall loss
    at the cost of decreased sparsity (i.e., more nodes would be active at any one
    pass). If we increased the regularization alpha, the network would obtain worse
    overall loss at the benefit of increased sparsity (i.e., even fewer nodes would
    be active at any one pass).
  prefs: []
  type: TYPE_NORMAL
- en: We can apply the same sparse autoencoding scheme to the Higgs Boson dataset,
    encoding a 28-dimensional input vector into a 64-dimensional latent space. At
    each pass, about one-fourth to one-third of the latent space is active, although
    many bottleneck nodes are “quasi-active” – they are not zero, but very close.
    Figure [8-62](#Fig62) demonstrates the internal state and reconstruction of the
    sparse autoencoder on different inputs, with 28-dimensional input vectors reshaped
    into 7-by-4 grids for more convenient viewing.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig62a_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 12 Images depict the reshaping of a sparse autoencoder with a latent space of
    a 16 by 16 grid.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig62b_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8-62
  prefs: []
  type: TYPE_NORMAL
- en: Sampled original inputs (left), latent space (middle), and reconstruction (right)
    for a sparse autoencoder trained on the Higgs Boson dataset. The latent space
