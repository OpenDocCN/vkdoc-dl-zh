    are 28 dimensions arranged into 7-by-4 grids
  prefs: []
  type: TYPE_NORMAL
- en: Similarly, Figure [8-63](#Fig63) shows the application of a trained sparse autoencoder
    to various elements of the Mice Protein Expression dataset.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig63a_HTML.png)'
  prefs: []
  type: TYPE_IMG
