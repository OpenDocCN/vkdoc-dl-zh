    a number of dimensions (2) equal to the dimensionality of the original dataset
    (2), hence the pretty snake-like arrangements
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 在 MNIST 上训练的瓶颈大小为两个节点的自动编码器的潜在空间 t-SNE 投影。注意，在这种情况下，我们投影到与原始数据集维度（2）相等的维度数（2），因此形成了漂亮的蛇形排列
- en: '[PRE6]'
  id: totrans-176
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Note
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: If we had loaded the model as `model = buildAutoencoder(784, 32)[‘model’]` and
    the encoder as `encoder = buildAutoencoder(784, 32)[‘encoder’]`, we indeed would
    obtain a model architecture and an encoder architecture – but they wouldn’t be
    “linked.” The stored model would be associated with an encoder that we haven’t
    captured, and the stored encoder would be part of an overarching model that we
    haven’t captured. Thus, we make sure to store the entire set of model components
    into `modelSet` first.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们以 `model = buildAutoencoder(784, 32)['model']` 和 `encoder = buildAutoencoder(784,
    32)['encoder']` 的方式加载模型，我们确实会获得一个模型架构和一个编码器架构——但它们不会“链接”。存储的模型将与一个我们没有捕获的编码器相关联，存储的编码器将是我们没有捕获的总体模型的一部分。因此，我们确保首先将整个模型组件集存储到
    `modelSet` 中。
- en: Each individual point is colored by the target label (i.e., the digit associated
    with the data point) for the purpose of exploring the autoencoder’s ability to
    implicitly “cluster” points of the same digit together or separate them, even
    though the autoencoder was never exposed to the labels. Observe that as the dimensionality
    of the latent space increases, the overlap between data samples of different digits
    decreases until there is functionally complete separation between digits of different
    classes.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 每个单独的点都根据目标标签（即与数据点相关的数字）着色，目的是为了探索自动编码器隐式地将相同数字的点“聚类”在一起或将它们分开的能力，尽管自动编码器从未接触过标签。观察随着潜在空间维度的增加，不同数字的数据样本之间的重叠减少，直到不同类别的数字之间有功能上的完全分离。
- en: If we build an architecture in which the input is expanded rather than compressed
    and visualize a dimensionality reduction of the latent space (Listing [8-8](#PC8)),
    we find that the learned representations are significantly less meaningful (Figure
    [8-31](#Fig31)) – despite this architecture obtaining very high performance (i.e.,
    low training error).
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们构建一个架构，其中输入是扩展而不是压缩的，并可视化潜在空间的降维（见[8-8](#PC8)），我们会发现学习到的表示意义显著降低（见图[8-31](#Fig31)）——尽管这个架构获得了非常高的性能（即低训练误差）。
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig31_HTML.png)'
  id: totrans-181
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig31_HTML.png)'
- en: An image visualises compressed latent space reduction. It indicates high performance
    with low training errors.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 一张图像展示了压缩的潜在空间降维。它表明了高性能和低训练误差。
- en: Figure 8-31
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-31
- en: t-SNE projection of a latent space for an overcomplete autoencoder with a bottleneck
    size of 2048 trained on MNIST
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: t-SNE投影显示了一个在MNIST上训练的、瓶颈大小为2048的过完备自动编码器的潜在空间
- en: '[PRE7]'
  id: totrans-185
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'Let’s revisit the example given at the beginning of this subsection: reconstruction
    of an image of a line. Listing [8-9](#PC9) generates a dataset of 50-by-50 images
    with randomly placed line segments using the image processing library `cv2` (Listing
    [8-9](#PC9)).'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回顾一下本小节开头给出的例子：线条图像的重建。列表[8-9](#PC9)使用图像处理库`cv2`生成一个包含随机放置线段的50x50图像数据集（见[8-9](#PC9)）。
- en: '[PRE8]'
  id: totrans-187
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Since theoretically we can intuitively represent each line segment with four
    values, we’ll build and train an autoencoder with four neurons in the latent space
    on the dataset (Listing [8-10](#PC10)).
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 由于理论上我们可以直观地用四个值来表示每个线段，因此我们将在潜在空间中有四个神经元的自动编码器上构建和训练数据集（见[8-10](#PC10)）。
- en: '[PRE9]'
  id: totrans-189
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: The model reaches near 0.03 binary cross-entropy, which is quite good. Its reconstructions
    are very accurate (Figure [8-32](#Fig32)).
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 模型达到近0.03的二进制交叉熵，这相当不错。它的重建非常准确（见图[8-32](#Fig32)）。
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig32_HTML.png)'
  id: totrans-191
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig32_HTML.png)'
- en: An image represents binary cross-entropy that results in accurate reconstructions.
    It depicts a line in different dimensions.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 一张图像展示了导致准确重建的二进制交叉熵。它描绘了不同维度中的一条线。
- en: Figure 8-32
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-32
- en: 'Left column: original input images of lines. Right column: reconstructions
    via an autoencoder with a latent space dimensionality of 4'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 左列：原始输入图像的线条。右列：通过具有4维潜在空间的自动编码器重建的图像
- en: In fact, an autoencoder trained with only two neurons does a decent job at identifying
    the general shape of the line marked in the input (Figure [8-33](#Fig33)). If
    you look closely, you will identify the silhouette of other lines. There are many
    hypotheses to explain their presence. One possibility is that the autoencoder
    has “memorized”/”internalized” a set of generally useful “landmark” samples that
    are then mapped to during prediction and that with a larger latent space increased
    information for precise placement could be passed through.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，仅用两个神经元训练的自动编码器在识别输入中标记的线条的一般形状方面做得相当不错（见图[8-33](#Fig33)）。如果你仔细观察，你会识别出其他线条的轮廓。有许多假设可以解释它们的存在。一种可能性是自动编码器“记忆”/“内化”了一组通常有用的“地标”样本，然后在预测期间映射到这些样本上，并且随着潜在空间变大，可以传递更多精确放置的信息。
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig33_HTML.png)'
  id: totrans-196
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig33_HTML.png)'
- en: An image represents input received as a straight line from an autoencoder trained
    set with two neurons.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 一张图像展示了从训练集自动编码器接收到的作为直线输入的图像。
- en: Figure 8-33
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-33
- en: 'Left column: original input images of lines. Right column: reconstructions
    via an autoencoder with a latent space dimensionality of 2'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 左列：原始输入图像的线条。右列：通过具有2维潜在空间的自动编码器重建的图像
- en: Finally, let’s explore how we can apply autoencoders to a strictly tabular dataset
    – the Mice Protein Expression dataset, used in previous chapters (Listing [8-11](#PC11)).
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，让我们探讨如何将自动编码器应用于一个严格表格数据集——小鼠蛋白质表达数据集，该数据集在之前的章节中使用过（列表 [8-11](#PC11)）。
- en: '[PRE10]'
  id: totrans-201
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Recall that we need to look at the input data in order to gauge how to deal
    with the model output in autoencoders. If we call `mpe_x_train.min()`, Pandas
    returns a series with the minimum value per column.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 回想一下，我们需要查看输入数据，以便评估如何处理自动编码器的模型输出。如果我们调用 `mpe_x_train.min()`，Pandas 返回每列的最小值序列。
- en: '[PRE11]'
  id: totrans-203
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Calling `.``min()` again takes the minimum of the minimums across columns. We
    find that the smallest value across the entire dataset is –0.062007874, whereas
    the maximum is 8.482553422\. Since values can theoretically be negative, we’ll
    use a linear output activation instead of a ReLU and optimize using the standard
    Mean Squared Error loss for regression problems (Listing [8-12](#PC13)).
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 再次调用 `.min()` 会取跨列的最小值的最小值。我们发现整个数据集中最小的值是 -0.062007874，而最大值是 8.482553422。由于理论上值可以是负数，我们将使用线性输出激活而不是
    ReLU，并使用标准的均方误差损失函数进行回归问题的优化（列表 [8-12](#PC13)）。
- en: '[PRE12]'
  id: totrans-205
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: After 150 epochs of training, which progresses very quickly (this is a comparatively
    small dataset), the autoencoder obtains good training and validation performance
    (Table [8-1](#Tab1), Figure [8-34](#Fig34)).
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 经过 150 个周期的训练后，进展非常快（这是一个相对较小的数据集），自动编码器获得了良好的训练和验证性能（表 [8-1](#Tab1)，图 [8-34](#Fig34)）。
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig34_HTML.png)'
  id: totrans-207
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig34_HTML.png)'
- en: A graph represents validation and training performance received after 150 epochs
    of training sets. It exhibits an L shaped curve.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 一张图表示了在 150 个周期的训练集之后获得的验证和训练性能。它展示了一个 L 形曲线。
- en: Figure 8-34
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-34
- en: Training history of an autoencoder trained on the Mice Protein Expression dataset
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 在小鼠蛋白质表达数据集上训练的自动编码器的训练历史
- en: Table 8-1
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 表 8-1
- en: Performance of the autoencoder trained on the Mice Protein Expression dataset
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 在小鼠蛋白质表达数据集上训练的自动编码器的性能
- en: '|   | Train | Validation |'
  id: totrans-213
  prefs: []
  type: TYPE_TB
  zh: '|   | 训练 | 验证 |'
- en: '| --- | --- | --- |'
  id: totrans-214
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| Mean Squared Error | 0.0117 | 0.0118 |'
  id: totrans-215
  prefs: []
  type: TYPE_TB
  zh: '| 均方误差 | 0.0117 | 0.0118 |'
- en: '| Mean Absolute Error | 0.0626 | 0.0625 |'
  id: totrans-216
  prefs: []
  type: TYPE_TB
  zh: '| 均方误差 | 0.0626 | 0.0625 |'
- en: Figures [8-35](#Fig35) demonstrates some sample latent vectors and reconstructions
    made by our autoencoder, with the input and reconstructed vectors reshaped into
    8-by-10 grids for more convenient viewing.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [8-35](#Fig35) 展示了我们自动编码器创建的一些样本潜在向量和重建，输入和重建向量被重塑成 8x10 的网格，以便更方便地查看。
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig35_HTML.png)'
  id: totrans-218
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig35_HTML.png)'
- en: An image pattern highlights the latent vectors samples and reconstruction created
    by the autoencoder. It exhibits the vectors into 8 by 10 grids.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 一幅图像模式突出了自动编码器创建的潜在向量样本和重建。它将向量展示在 8x10 的网格中。
- en: Figure 8-35
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-35
- en: Samples and the associated latent vector and reconstruction by an autoencoder
    trained on the Mice Protein Expression dataset. Samples and reconstructions are
    represented in two spatial dimensions for convenience of viewing
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 由在小鼠蛋白质表达数据集上训练的自动编码器生成的样本及其相关的潜在向量和重建。为了便于查看，样本和重建以两个空间维度表示
- en: We can employ a similar technique as previously employed on the MNIST dataset
    – visualizing the latent space of an autoencoder using t-SNE. Each data point
    in Figure [8-36](#Fig36) is colored by one of the eight classes each row in the
    Mice Protein Expression dataset falls into. This tabular autoencoder obtains pretty
    good separation between classes without any exposure to the labels.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以采用与之前在 MNIST 数据集上使用过的类似技术——使用 t-SNE 可视化自动编码器的潜在空间。图 [8-36](#Fig36) 中的每个数据点都根据小鼠蛋白质表达数据集中每一行所属的八个类别之一进行着色。这个表格自动编码器在没有任何标签暴露的情况下，在类别之间获得了相当好的分离。
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig36_HTML.png)'
  id: totrans-223
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig36_HTML.png)'
- en: A scatter diagram visualises data points obtained as a result of tabular autoencoder.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 散点图可视化表格自动编码器获得的数据点
- en: Figure 8-36
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-36
- en: t-SNE projection of a latent space for an autoencoder trained on the Mice Protein
    Expression dataset
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 在小鼠蛋白质表达数据集上训练的自动编码器的潜在空间的 t-SNE 投影
- en: Note that a more formal/rigorous tabular autoencoder design would require us
    to standardize or normalize all columns to within the same domain. Tabular datasets
    often contain features that operate on different scales; for instance, say feature
    A represents a proportion (i.e., between 0 and 1, inclusive), whereas feature
    B measures years (i.e., likely larger than 1000). Regression losses simply take
    the mean error across all columns, which means that the reward for correctly reconstructing
    A is negligible compared to reconstructing feature B. In this case, however, all
    columns are in roughly the same range, so skipping this step is tolerable.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，一个更正式/严格的表格自动编码器设计将需要我们将所有列标准化或归一化到相同的域内。表格数据集通常包含在不同尺度上操作的特性；例如，假设特性 A 代表一个比例（即介于
    0 和 1 之间，包括 1），而特性 B 测量年份（即可能大于 1000）。回归损失只是简单地取所有列的平均误差，这意味着正确重建 A 的奖励与重建特性 B
    相比可以忽略不计。然而，在这种情况下，所有列都在大致相同的范围内，因此跳过这一步是可以容忍的。
- en: In the next subsection, we will explore a direct application of autoencoders
    to concretely improve the performance of supervised models.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一小节中，我们将探讨自动编码器直接应用于具体提高监督模型性能的直接应用。
- en: Autoencoders for Pretraining
  id: totrans-229
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 预训练自动编码器
- en: Vanilla autoencoders, as we have already seen, can do some pretty cool things.
    We see that a vanilla autoencoder trained on various datasets can perform implicit
    clustering and classification of digits, without being exposed to the labels themselves
    as well. Rather, natural differences in the input resulting from differences in
    labels are independently observed and implicitly recognized by the autoencoder.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所见，普通的自动编码器可以做些相当酷的事情。我们看到，在各个数据集上训练的普通自动编码器可以执行隐式聚类和数字分类，而无需接触到标签本身。相反，由于标签差异导致的输入的自然差异被自动编码器独立观察到并隐式识别。
- en: This sort of impressive feature extraction capability is valuable in the context
    of training neural networks to perform supervised tasks. Say we want a neural
    network to classify digits from the MNIST dataset. If we start from scratch, we
    are asking the neural network to learn both how to extract the optimal set of
    features and how to interpret them – all at once, with no prior information. However,
    we see that the encoder of an autoencoder trained on the MNIST dataset has developed
    an impressive feature extraction and class separation scheme. We can use the encoder
    of the autoencoder as a *pretraining* instrument; rather than building and training
    a new network that learns both extraction and interpretation from scratch, we
    can simply append a model component to the output of the encoder to interpret
    the already-learned feature extractor (i.e., the encoder) (Figure [8-37](#Fig37)).
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 这种令人印象深刻的特征提取能力在训练神经网络执行监督任务时非常有价值。比如说，我们希望一个神经网络能够从 MNIST 数据集中对数字进行分类。如果我们从头开始，我们就是在要求神经网络一次性学习如何提取最优特征集以及如何解释这些特征——没有任何先验信息。然而，我们发现，在
    MNIST 数据集上训练的自动编码器的编码器已经开发出一种令人印象深刻的特征提取和分类方案。我们可以将自动编码器的编码器用作 *预训练* 工具；而不是从头开始构建和训练一个新网络，该网络学习从零开始提取和解释，我们只需将一个模型组件附加到编码器的输出，以解释已经学习到的特征提取器（即编码器）（图
    [8-37](#Fig37)）。
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig37_HTML.png)'
  id: totrans-232
  prefs: []
  type: TYPE_IMG
  zh: '![图 8-37](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig37_HTML.png)'
- en: An infographic image illustrates autoencoder and task training sets. It describes
    the features of the extractor.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 一张信息图表展示了自动编码器和任务训练集。它描述了提取器的特征。
- en: Figure 8-37
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-37
- en: Schematic of multistage pretraining
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 多阶段预训练示意图
- en: In the first stage of training, we train the autoencoder on the standard input
    reconstruction task. After sufficient training, we can extract the encoder and
    append an “interpretation”-focused model component that assembles and arranges
    the features extracted by the encoder into the desired output.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 在训练的第一阶段，我们在标准输入重建任务上训练自动编码器。经过足够的训练后，我们可以提取编码器并附加一个“解释”为重点的模型组件，将编码器提取的特征组装并排列成所需的输出。
- en: During stage 2, we impose *layer freezing* upon the encoder, meaning that we
    prevent its weights from being trained. This is to retain the learned structures
    of the encoder. We spent a significant amount of effort obtaining a good feature
    extractor; if we do not impose layer freezing, we will find that optimizing a
    good feature extractor connected to a very poor (randomly initialized) feature
    interpreter degrades the feature extractor.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 在第2阶段，我们对编码器实施*层冻结*，这意味着我们阻止其权重被训练。这是为了保留编码器学习到的结构。我们投入了大量努力来获得一个好的特征提取器；如果我们不实施层冻结，我们会发现将一个好的特征提取器连接到一个非常差的（随机初始化的）特征解释器会降低特征提取器的性能。
- en: However, once good performance is obtained on training with a frozen feature
    extractor and a trainable feature interpreter, the entire model can be trained
    for a few epochs for the purposes of fine-tuning (Figure [8-38](#Fig38)). The
    idea here is that the feature interpreter has developed a good relationship with
    the static feature extractor, but now both can be jointly optimized to improve
    the relationship. (Just like couples in relationships, it’s not healthy if one
    partner is always static!)
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，一旦在冻结特征提取器和可训练特征解释器上进行训练后获得良好的性能，整个模型可以训练几个周期，用于微调（见图[8-38](#Fig38)）。这里的想法是特征解释器已经与静态特征提取器建立了良好的关系，但现在两者可以共同优化以改善关系。（就像处于关系中的伴侣一样，如果一方总是静态的，这对健康是不利的！）
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig38_HTML.png)'
  id: totrans-239
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig38_HTML.png)'
- en: A flow diagram depicts the performance achieved as a result of the feature interpreter.
    It has labels namely primary training and fine-tuning.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 流程图描述了由于特征解释器而达到的性能。它有标签，即主要训练和微调。
- en: Figure 8-38
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-38
- en: Freezing followed by fine-tuning can be an effective way to perform autoencoder
    pretraining.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 冻结后微调可以是一种有效的自动编码器预训练方法。
- en: Let’s begin by demonstrating autoencoder pretraining on MNIST. We’ll use the
    `buildAutoencoder` function defined previously to fit an autoencoder, making sure
    to retain references to both the original model and the encoder (Listing [8-13](#PC14)).
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从在MNIST上展示自动编码器预训练开始。我们将使用之前定义的`buildAutoencoder`函数来拟合一个自动编码器，确保保留对原始模型和编码器的引用（见列表[8-13](#PC14)）。
- en: '[PRE13]'
  id: totrans-244
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: After the model has been sufficiently trained, we can extract the encoder and
    stack it as the feature extraction unit/component of our task model (Listing [8-14](#PC15)).
    The outputs of the encoder (named encoded in the following script) are further
    interpreted via several fully connected layers. The encoder is set not to be trainable
    (i.e., layer freezing). The task model is trained on the original supervised task.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 在模型经过足够的训练后，我们可以提取编码器并将其堆叠为我们的任务模型的特征提取单元/组件（见列表[8-14](#PC15)）。编码器的输出（在以下脚本中命名为encoded）通过几个全连接层进一步解释。编码器被设置为不可训练（即，层冻结）。任务模型在原始监督任务上进行训练。
- en: '[PRE14]'
  id: totrans-246
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: After sufficient training, it is common practice to make the encoder trainable
    again and fine-tune the entire architecture in an end-to-end fashion (Listing
    [8-15](#PC16)).
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 在经过足够的训练后，通常的做法是将编码器再次设置为可训练，并以端到端的方式微调整个架构（见列表[8-15](#PC16)）。
- en: '[PRE15]'
  id: totrans-248
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: We often reduce the learning rate on fine-tuning tasks to prevent destruction/”overwriting”
    of information learned during the pretraining process. This can be accomplished
    by recompiling the model after pretraining with an optimizer configured with a
    different initial learning rate.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 在微调任务中，我们通常降低学习率，以防止在预训练过程中学习到的信息被破坏/“覆盖”。这可以通过在预训练后使用配置了不同初始学习率的优化器重新编译模型来实现。
- en: We can compare the performance of this model to one with no pretraining (i.e.,
    begins learning in a supervised fashion from scratch) (Listing [8-16](#PC17),
    Figure [8-39](#Fig39)).
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将这个模型的性能与没有预训练的模型进行比较（即，从头开始以监督方式学习）（见列表[8-16](#PC17)，图[8-39](#Fig39)）。
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig39_HTML.png)'
  id: totrans-251
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig39_HTML.png)'
- en: A line graph represents the comparison of the given model during the pretraining
    stage.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 线形图表示了在预训练阶段给定模型的比较。
- en: Figure 8-39
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-39
- en: Comparing the training curves for a classifier trained on the MNIST dataset
    with and without autoencoder pretraining
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 比较在MNIST数据集上训练的具有和没有自动编码器预训练的分类器的训练曲线
- en: '[PRE16]'
  id: totrans-255
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: The MNIST dataset is relatively simple, so both models converge relatively quickly
    to good weights. However, the model with pretraining is noticeably “ahead” of
    the other. By taking the difference between the epoch at which a model with and
    without pretraining obtains some performance value, we can estimate how “far ahead”
    a model with autoencoder pretraining is. For any loss *p* (at least one epoch
    in training), the model with pretraining reaches *p* two to four epochs before
    the model without pretraining.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: MNIST 数据集相对简单，因此两个模型都相对快速地收敛到良好的权重。然而，具有预训练的模型在性能上明显“领先”于其他模型。通过计算具有和没有预训练的模型在获得某些性能值时的epoch差异，我们可以估计具有自动编码器预训练的模型“领先”了多少。对于任何损失
    *p*（至少一个epoch的训练），具有预训练的模型在无预训练的模型之前两到四个epoch达到 *p*。
- en: This process seems and is superfluous on the MNIST dataset, which has a comparatively
    simple set of rules in a comparatively small number of dimensions. However, this
    advantage manifests more significantly for more complex datasets, as has been
    shown with more advanced computer vision and natural language processing tasks.
    Neural networks trained to perform large-scale image classification (e.g., ImageNet),
    for instance, benefit significantly from performing an autoencoder pretraining
    task that learns useful latent features that are later interpreted and fine-tuned.
    Similarly, it has been shown that language models learn important fundamental
    structures of language by performing reconstruction tasks, which can be later
    used as the basis for a supervised task like text classification or generation
    (Figure [8-40](#Fig40)).
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 在 MNIST 数据集上，这个过程似乎和实际上是多余的，因为该数据集在相对较小的维度上具有相对简单的规则集。然而，对于更复杂的数据集，这种优势更为显著，正如更先进的计算机视觉和自然语言处理任务所展示的那样。例如，训练用于执行大规模图像分类（如
    ImageNet）的神经网络，可以从执行自动编码器预训练任务中受益，该任务学习有用的潜在特征，这些特征随后被解释和微调。同样，已经证明，语言模型通过执行重构任务学习语言的重要基本结构，这些任务可以后来用作文本分类或生成等监督任务的基础（图
    [8-40](#Fig40)）。
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig40_HTML.png)'
  id: totrans-258
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig40_HTML.png)'
- en: A model diagram represents reconstruction tasks that can be used as a basis
    for generation and text classification.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 模型图表示可以用于生成和文本分类的基础的重构任务。
- en: Figure 8-40
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-40
- en: General transfer learning/pretraining design used dominantly in computer vision
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 在计算机视觉中，普遍使用通用迁移学习/预训练设计
- en: Recall, for instance, the Inception and EfficientNet models discussed in Chapter
    [4](525591_1_En_4_Chapter.xhtml). Keras allows users to load weights from a model
    trained on ImageNet because the feature extraction “skills” required to perform
    well on a wide-ranging task like ImageNet are valuable or can be adapted to become
    valuable in most computer vision tasks.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，回想一下在第 [4](525591_1_En_4_Chapter.xhtml) 章节中讨论的 Inception 和 EfficientNet 模型。Keras
    允许用户从在 ImageNet 上训练的模型中加载权重，因为执行像 ImageNet 这样广泛任务所需的特征提取“技能”是有价值的或可以适应成为大多数计算机视觉任务中的有价值技能。
- en: However, as we have previously seen in Chapters [4](525591_1_En_4_Chapter.xhtml)
    and [5](525591_1_En_5_Chapter.xhtml), the success of a deep learning method on
    complex image and natural language data does not necessarily bar it from being
    useful to tabular data applications too.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，正如我们在第 [4](525591_1_En_4_Chapter.xhtml) 章节和第 [5](525591_1_En_5_Chapter.xhtml)
    章节中之前看到的，深度学习方法在复杂图像和自然语言数据上的成功并不一定阻止它在表格数据应用中也变得有用。
- en: Let’s consider the Mice Protein Expression dataset. We can begin by instantiating
    and training a sample autoencoder (Listing [8-17](#PC18)).
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑小鼠蛋白质表达数据集。我们可以从实例化和训练一个示例自动编码器（列表 [8-17](#PC18)）开始。
- en: '[PRE17]'
  id: totrans-265
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: We can now create and fit a task model using the trained encoder in two phases,
    the first in which the encoder is frozen and the second in which the encoder is
    trainable (Listing [8-18](#PC19), Figure [8-41](#Fig41)).
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以使用训练编码器在两个阶段创建和拟合任务模型，第一个阶段中编码器被冻结，第二个阶段中编码器是可训练的（列表 [8-18](#PC19)，图
    [8-41](#Fig41)）。
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig41_HTML.png)'
  id: totrans-267
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig41_HTML.png)'
- en: A line graph represents a task model utilising the trained encoder in the frozen
    and training phases.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 线图表示在冻结和训练阶段利用训练编码器的任务模型。
- en: Figure 8-41
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-41
- en: Validation and training curves for stages 1 and 2
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 阶段 1 和 2 的验证和训练曲线
- en: '[PRE18]'
  id: totrans-271
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Alternatively, consider the Higgs Boson dataset. This dataset only has 28 features.
    If we use our standard autoencoder logic, which halves the number of nodes in
    each encoder layer and doubles the number of nodes in each decoder layer, we will
    either need to have a very smaller number of layers to use a reasonable latent
    space size or a very small latent space to use a reasonable number of layers.
    For instance, if our latent space has only eight features, the autoencoder logic
    would build only two layers (28 → 16 → 8). On the other hand, if we want a larger
    number of layers (e.g., five), we would need a very small latent space (e.g.,
    an autoencoder with 28 → 16 → 8 → 4 → 2 → 1). In this case, it’s most beneficial
    to design a custom autoencoder with a sufficiently large latent space and a sufficient
    number of layers. We could design an autoencoder, for instance, with six layers
    in the encoder and decoder each and a latent space of 16 dimensions (Listing [8-19](#PC20)).
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，考虑希格斯玻色子数据集。这个数据集只有28个特征。如果我们使用我们的标准自动编码器逻辑，即每个编码器层节点数减半，每个解码器层节点数加倍，我们可能需要非常少的层来使用合理的潜在空间大小，或者使用非常小的潜在空间来使用合理的层数。例如，如果我们的潜在空间只有八个特征，自动编码器逻辑将只构建两层（28
    → 16 → 8）。另一方面，如果我们想要更多的层（例如，五层），我们需要一个非常小的潜在空间（例如，一个28 → 16 → 8 → 4 → 2 → 1的自动编码器）。在这种情况下，设计一个具有足够大的潜在空间和足够层数的定制自动编码器最有益。例如，我们可以设计一个编码器和解码器各有六层，潜在空间为16维度的自动编码器（见列表[8-19](#PC20)）。
- en: '[PRE19]'
  id: totrans-273
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: We can treat a static encoder as a feature extractor for our task model (Listing
    [8-20](#PC21), Figures [8-42](#Fig42) and Figure [8-43](#Fig43)).
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将静态编码器视为我们的任务模型的特征提取器（见列表[8-20](#PC21)、图[8-42](#Fig42)和图[8-43](#Fig43)）。
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig43_HTML.png)'
  id: totrans-275
  prefs: []
  type: TYPE_IMG
  zh: '![图8-43](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig43_HTML.png)'
- en: A line graph represents a rising and erratic curve which makes the static encoder
    a feature extractor.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 线形图表示上升且不规则的曲线，这使得静态编码器成为特征提取器。
- en: Figure 8-43
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-43
- en: Validation and training accuracy curves for stages 1 and 2
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 阶段1和2的验证和训练准确率曲线
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig42_HTML.png)'
  id: totrans-279
  prefs: []
  type: TYPE_IMG
  zh: '![图8-42](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig42_HTML.png)'
- en: A line graph represents downward-sloping and erratic curves. It exhibits pre-trained
    encoder functioning as a feature extractor.
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 线形图表示向下倾斜且不规则的曲线。它展示了作为特征提取器的预训练编码器。
- en: Figure 8-42
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-42
- en: Validation and training loss curves for stages 1 and 2
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 阶段1和2的验证和训练损失曲线
- en: '[PRE20]'
  id: totrans-283
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: We can observe a significant amount of overfitting in this particular case.
    We can attempt to improve generalization by employing best practices such as adding
    dropout or batch normalization.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以观察到在这个特定情况下有大量的过拟合。我们可以尝试通过采用最佳实践，如添加dropout或批量归一化，来提高泛化能力。
- en: 'Lastly, it should be noted that using autoencoders for pretraining is a great
    *semi-supervised* method. Semi-supervised methods make use of data with and without
    labels (and are used most often in cases where labeled data is scarce and unlabeled
    data is abundant). Say you possess three sets of data: *X*[unlabeled], *X*[labeled],
    and *y* (which corresponds to *X*[labeled]). You can train an autoencoder to reconstruct
    *X*[unlabeled] and then use the frozen encoder as the feature extractor in a task
    model to predict *y* from *X*[labeled]. This technique generally works well even
    when the size of *X*[unlabeled] is significantly larger than the size of *X*[labeled];
    the autoencoding task learns meaningful representations that should be significantly
    easier to associate with a supervised target than beginning from initialization.'
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，需要注意的是，使用自动编码器进行预训练是一种很好的**半监督**方法。半监督方法利用带标签和无标签的数据（最常用于带标签数据稀缺而未标记数据丰富的情况）。比如说，你拥有三组数据：*X*[未标记]，*X*[标记]和*y*（对应于*X*[标记]）。你可以训练一个自动编码器来重建*X*[未标记]，然后使用冻结的编码器作为任务模型中的特征提取器来预测*y*从*X*[标记]。这种技术在*X*[未标记]的大小显著大于*X*[标记]的大小时仍然有效；自动编码任务学习到有意义的表示，这些表示应该比从初始化开始与监督目标关联得更容易。
- en: Multitask Autoencoders
  id: totrans-286
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 多任务自动编码器
- en: Pretraining with autoencoders is often an effective strategy to take advantage
    of quality learned latent features. However, one criticism of the system is that
    it proceeds *sequentially* – autoencoder training takes place at a separate stage
    than the task training. Multitask autoencoders train the network on the autoencoder
    task and the intended task *simultaneously* (hence the name multitask). These
    autoencoders accept one input that is encoded by the encoder into a latent space.
    This one set of latent features is decoded separately by two “decoders” into two
    outputs; one output is dedicated to the autoencoder task, while the other is dedicated
    to the intended task. The network learns both of these tasks at the same time
    during training (Figures [8-44](#Fig44) and [8-45](#Fig45)).
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 使用自动编码器进行预训练通常是一种有效的策略，可以充分利用学习到的质量良好的潜在特征。然而，对系统的批评之一是它按**顺序**进行——自动编码器训练与任务训练在不同的阶段进行。多任务自动编码器在自动编码器任务和预期任务**同时**训练网络（因此得名多任务）。这些自动编码器接受一个输入，该输入由编码器编码到潜在空间中。这一组潜在特征由两个“解码器”分别解码成两个输出；一个输出专门用于自动编码器任务，而另一个输出则专门用于预期任务。网络在训练期间同时学习这两个任务（图[8-44](#Fig44)和[8-45](#Fig45)）。
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig45_HTML.png)'
  id: totrans-288
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig45_HTML.png)'
- en: A flow diagram depicts the latent features dedicated to the intended task. It
    has labels namely the input data, encoding layers, and latent space.
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 一个流程图描述了专门用于预期任务的潜在特征。它有标签，即输入数据、编码层和潜在空间。
- en: Figure 8-45
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-45
- en: Multitask learning
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 多任务学习
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig44_HTML.png)'
  id: totrans-292
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig44_HTML.png)'
- en: A model represents output dedicated to the task of the autoencoder. It has labels
    namely the input data, model and task output.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 一个模型表示专门用于自动编码器任务的输出。它有标签，即输入数据、模型和任务输出。
- en: Figure 8-44
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-44
- en: Original task model
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 原始任务模型
- en: By training the autoencoder simultaneously along the task network, we can theoretically
    experience the benefits of the autoencoder in a dynamic fashion. Say the encoder
    has “difficulty” encoding features in a way relevant to the task output, which
    can be difficult. However, the encoder component of the model can still decrease
    the overall loss by learning features relevant to the autoencoder reconstruction
    task. These features may provide continuous support for the task output by providing
    the optimizer a viable path to loss minimization – it is “another way out,” so
    to speak. Using multitask autoencoders is often an effective technique to avoid
    or minimize difficult local minimum problems, in which the model makes mediocre
    to negligible progress in the first few moments of training and then plateaus
    (i.e., is stuck in a poor local minimum).
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 通过在任务网络中同时训练自动编码器，我们可以从理论上以动态的方式体验到自动编码器的益处。假设编码器在以与任务输出相关的特征进行编码时遇到“困难”，这可能很难。然而，模型中的编码器组件仍然可以通过学习与自动编码器重建任务相关的特征来降低整体损失。这些特征可能通过为优化器提供一条可行的损失最小化路径，为任务输出提供持续的支持——可以说是“另一条出路”。使用多任务自动编码器通常是一种有效的技术，可以避免或最小化困难的地方最小值问题，在这种问题中，模型在训练的前几分钟内进展平庸到微不足道，然后停滞不前（即，陷入一个较差的地方最小值）。
- en: In order to construct a multitask autoencoder, we begin by initializing an autoencoder
    and extracting the encoder and decoder components. We create a “tasker” model
    that accepts latent features (i.e., data of the shape of the encoder output) and
    processes them into the task output (i.e., one of ten digits, in the case of MNIST).
    Each of these components can be linked using functional API syntax to form a complete
    multitask autoencoder architecture (Listing [8-21](#PC22), Figure [8-46](#Fig46)).
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 为了构建一个多任务自动编码器，我们首先初始化一个自动编码器并提取编码器和解码器组件。我们创建了一个“任务器”模型，该模型接受潜在特征（即编码器输出的形状的数据）并将它们处理成任务输出（例如，在MNIST的情况下，是十个数字之一）。这些组件中的每一个都可以使用功能API语法链接起来，形成一个完整的多任务自动编码器架构（清单[8-21](#PC22)，图[8-46](#Fig46)）。
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig46_HTML.jpg)'
  id: totrans-298
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig46_HTML.jpg)'
- en: A network architecture depicts the interlinking of functional A P I syntax to
    create a complete multitask autoencoder.
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 一个网络架构描述了使用功能API语法相互连接以创建完整的多任务自动编码器。
- en: Figure 8-46
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-46
- en: Visualization of a multitask autoencoder architecture
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 多任务自动编码器架构的可视化
- en: '[PRE21]'
  id: totrans-302
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: Because the multitask autoencoder has multiple outputs, we need to specify losses
    and labels for each of the outputs by referencing a particular output’s name.
    In this case, the two outputs have been named “decoder” and “taskOut.” The decoder
    output will be given the original input (i.e., `x_train`) and optimized with binary
    cross-entropy, since its objective is to perform pixel-wise reconstruction. The
    task output will be given the image labels (i.e., `y_train`) and optimized with
    categorical cross-entropy, since its objective is to perform multiclass classification
    (Listing [8-22](#PC23)).
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 由于多任务自动编码器有多个输出，我们需要通过引用特定输出的名称来为每个输出指定损失和标签。在这种情况下，两个输出已被命名为“decoder”和“taskOut”。解码器输出将给出原始输入（即
    `x_train`）并使用二元交叉熵进行优化，因为其目标是进行像素级重建。任务输出将给出图像标签（即 `y_train`）并使用分类交叉熵进行优化，因为其目标是进行多类分类（列表
    [8-22](#PC23)）。
- en: '[PRE22]'
  id: totrans-304
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: We can observe from the training history that the model is able to reach both
    a fairly good task loss and a reconstruction loss within just a few dozen epochs
    (Listing [8-23](#PC24), Figure [8-47](#Fig47)).
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以从训练历史中观察到，模型只需几十个时期就能达到相当好的任务损失和重建损失（列表 [8-23](#PC24)，图 [8-47](#Fig47)）。
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig47_HTML.png)'
  id: totrans-306
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig47_HTML.png)'
- en: A line graph depicts three different curves. It exhibits a similar pattern.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 一条线图描绘了三条不同的曲线。它显示出相似的图案。
- en: Figure 8-47
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-47
- en: Different dimensions of performance (reconstruction loss, task loss, overall
    loss)
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 不同的性能维度（重建损失、任务损失、总体损失）
