- en: We can see that denoising autoencoders can perform reconstruction to a pretty
    impressive degree. In practice, however, we want to keep our noise level somewhat
    low; increasing the noise level can destroy information and cause the network
    to develop incorrect and/or overly simplified representations of decisions.
  prefs: []
  type: TYPE_NORMAL
- en: A similar logic can be applied to tabular data. There are many situations in
    which you find that a tabular dataset is particularly noisy. This is especially
    common in scientific datasets recording variable physical activity, like low-level
    physics dynamics or biological system data.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s build a denoising autoencoder for the Mice Protein Expression dataset.
    Listing [8-31](#PC32) loads the dataset and splits it into a training and a validation
    set.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE31]'
  prefs: []
  type: TYPE_PRE
- en: Listing [8-32](#PC33) builds a standard autoencoder architecture.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE32]'
  prefs: []
  type: TYPE_PRE
- en: To train, we generate noise to the input and train the model to reconstruct
    the original input from the noisy input. In tabular datasets, we generally cannot
    add randomly distributed noise to the entire set of data in blanket fashion, because
    different features operate on different scales. Instead, the noise should be dependent
    on the standard deviation of each feature itself. In this implementation, we add
    noise randomly sampled from a normal distribution with a standard deviation equal
    to one-fifth of the actual feature’s standard deviation (Listing [8-33](#PC34)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE33]'
  prefs: []
  type: TYPE_PRE
- en: Listing [8-34](#PC35) demonstrates the evaluation of such a model on novel validation
    noisy data.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE34]'
  prefs: []
  type: TYPE_PRE
- en: After training, the encoder of the denoising autoencoder can be used for pretraining
    or other previously described applications.
  prefs: []
  type: TYPE_NORMAL
- en: Key Points
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this chapter, we discussed the autoencoder architecture and how it can be
    used in four different contexts – pretraining, multitask training, sparse autoencoders,
    and denoising autoencoders.
  prefs: []
  type: TYPE_NORMAL
- en: Autoencoders are neural network architectures trained to encode an input into
    a latent space with a representation size smaller than the original input and
    then to reconstruct the input from the latent space. Autoencoders are forced to
    learn meaningful latent representations of the data because of this imposed information
    bottleneck.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The encoder of a trained autoencoder can be detached and built as the feature
    extractor of a supervised network; that is, the autoencoder serves the purpose
    of pretraining.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In cases where supervised learning is difficult to get started with, creating
    a multitask autoencoder that can optimize its loss by performing both the supervised
    task and an auxiliary autoencoding task can help overcome initial learning hurdles.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sparse autoencoders use a significantly expanded latent space size, but are
    trained with restrictions on latent space activity, such that only a few nodes/neurons
    can be active at any one pass. Sparse autoencoders are thought to be more robust.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Denoising autoencoders are trained to reconstruct clean data from an artificially
    corrupted, noisy data. In the process, the encoder learns to look for key patterns
    and “denoises” data, which can be a useful component for supervised models.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the next chapter, we will look into deep generative models – including a
    particular type of autoencoder, the Variational Autoencoder (VAE) – which can
    notably be used to reconcile unbalanced datasets, improve model robustness, and
    train models on sensitive/private data, in addition to other applications.
  prefs: []
  type: TYPE_NORMAL
