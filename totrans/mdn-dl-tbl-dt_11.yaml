- en: 8. Autoencoders
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '*Weak encoding means mistakes and weak decoding means illiteracy.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: —Rajesh Walecha, Author
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'An autoencoder is a very simple model: a model that predicts its own input.
    In fact, it may seem deceivingly simple to the point of being worthless. (After
    all, what use is a model that predicts what we already know?) Autoencoders are
    extraordinarily valuable and versatile architectures not because of their functionality
    to reproduce the input, but because of the internal capabilities developed in
    order to obtain said functionality. Autoencoders can be chopped up into desirable
    parts and stuck onto other neural networks, like playing with Legos or performing
    surgery (take your pick of analogy), with incredible success, or can be used to
    perform other useful tasks, such as denoising.'
  prefs: []
  type: TYPE_NORMAL
- en: This chapter begins by explaining the intuition of the autoencoder concept,
    followed by a demonstration of how one would implement a simple “vanilla” autoencoder.
    Afterward, four applications of autoencoders – pretraining, denoising, sparse
    learning for robust representations, and denoising – are discussed and implemented.
  prefs: []
  type: TYPE_NORMAL
- en: The Concept of the Autoencoder
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The operations of encoding and decoding are fundamental to information. Some
    hypothesize that all transformation and evolution of information results from
    these two abstracted actions of encoding and decoding (Figures [8-1](#Fig1) and
    [8-2](#Fig2)). Say Alice sees Humpty Dumpty hit his head on the ground after some
    precarious wall-sitting and tells Bob, “Humpty Dumpty hit his head badly on the
    ground!” Upon hearing this information, Bob *encodes* the information from a language
    representation into thoughts and opinions – what we might call *latent* representations.
  prefs: []
  type: TYPE_NORMAL
- en: Say Bob is a chef, and so his encoding “specializes” in features relating to
    food. Bob then *decodes* the latent representations back into a language representation
    when he tells Carol, “Humpty Dumpty cracked his shell! We can use the innards
    to make an omelet.” Carol, in turn, encodes the information.
  prefs: []
  type: TYPE_NORMAL
- en: Say Carol is an egg activist and cares deeply about the well-being of Humpty
    Dumpty. Her latent representations will encode the information in a way that reflects
    her priorities and interests as a thinker. When she decodes her latent representations
    into language, she tells Drew that “People are trying to eat Humpty Dumpty after
    he has suffered a serious injury! It is horrible.”
  prefs: []
  type: TYPE_NORMAL
- en: So on and so forth. The conversation continues and evolves, information passed
    and transformed from thinker to thinker. Because each thinker *encodes* the information
    represented in language in a semantic system relevant to their experiences, priorities,
    and interests, they correspondingly *decode* information in a fashion colored
    through these lens.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig2_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flow diagram highlights the encoding and decoding transformation results.
    It exhibits evolution of information from the abstracted actions.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-2
  prefs: []
  type: TYPE_NORMAL
- en: Transformation of information as a series of encoding and decoding operations
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig1_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flow diagram depicts the abstract actions of encoding and decoding. The labels
    are input, encoder, latent space, decoder and output.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-1
  prefs: []
  type: TYPE_NORMAL
- en: A high-level autoencoder architecture
  prefs: []
  type: TYPE_NORMAL
- en: Of course, this interpretation of encoding and decoding is very broad and more
    psychological than anything else. In the strict context of computer science, encoding
    is an operation to represent some information in another form, usually with smaller
    information content (there are few applications for encoding techniques that make
    the storage size larger). Decoding, in turn, “undoes” the encoding operation to
    recover the original information. Encoding and decoding are commonly used terms
    in the context of compression (Figure [8-3](#Fig3)). Various computer scientists
    throughout the decades have proposed very clever algorithms to map information
    to smaller storage sizes with lossless and lossy reconstruction of the original
    information, making the transmission of large data like long text, images, and
    videos across limited information transfer connections feasible.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig3_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flow diagram depicts the sender and receiver. The sender labels are data,
    encoding scheme and encrypted while that of receiver are encrypted, decoding scheme
    and reconstructed data.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-3
  prefs: []
  type: TYPE_NORMAL
- en: Interpretation of autoencoders as sending and receiving encrypted data
  prefs: []
  type: TYPE_NORMAL
- en: Encoding and decoding in deep learning are a bit of a fusion of these two understandings.
    *Autoencoders* are versatile neural network structures consisting of an encoder
    and a decoder component. The encoder maps the input into a smaller latent/encoded
    space, and the decoder maps the encoded representation back to the original input.
    The goal of the autoencoder is to reconstruct the original input as faithfully
    as possible, that is, to minimize the *reconstruction loss*. In order to do so,
    the encoder and decoder need to “work together” to develop an encoding and decoding
    scheme.
  prefs: []
  type: TYPE_NORMAL
- en: Autoencoders reduce the representation size of the original input information,
    which can be thought of as a form of lossy compression. However, numerous studies
    have demonstrated that autoencoders are generally quite bad at compression when
    put into contrast with human-designed compression schemes. Rather, when we build
    autoencoders, it is almost always to *extract meaningful features at the “core”
    of the data*. The smaller representation size of the latent space compared with
    the original input emerges only because we need to impose an information bottleneck
    to force the network to learn meaningful latent features. The architectures in
    Figures [8-4](#Fig4) and [8-5](#Fig5) demonstrate constant and expanded information
    representations compared with the input; the autoencoder can trivially learn weights
    that simply pass/carry the input from the input to the output. On the other hand,
    the architecture in Figure [8-6](#Fig6) must learn nontrivial patterns to compress
    and reconstruct the original input. The information bottleneck and information
    compression, therefore, is the means, not the end, of the autoencoder.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig6_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A network diagram depicts the compression and reconstruction of the original
    input.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-6
  prefs: []
  type: TYPE_NORMAL
- en: A good autoencoder architecture (latent space representation size is smaller
    than input representation size)
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig5_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A network architecture represents expanded data in comparison with the input.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-5
  prefs: []
  type: TYPE_NORMAL
- en: An even worse autoencoder architecture (latent space representation size is
    larger than input representation size)
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig4_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A network architecture highlights constant data representation related with
    the input.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-4
  prefs: []
  type: TYPE_NORMAL
- en: A bad autoencoder architecture (latent space representation size is equal to
    input representation size)
  prefs: []
  type: TYPE_NORMAL
- en: Autoencoders are very good at finding higher-level abstractions and features.
    In order to reliably reconstruct the original input from a much smaller latent
    space representation, the encoder and decoder must develop a system of mapping
    that most meaningfully characterizes and distinguishes each input or set of inputs
    from others. This is no trivial task!
  prefs: []
  type: TYPE_NORMAL
- en: 'Consider the following autoencoder design scheme adapted for humans (Figure
    [8-7](#Fig7)): person A is the encoder and attempts to “encode” a high-resolution
    image of a sketch as a natural language description, restricted to *N* words or
    less; person B is the decoder and attempts to “decode” the original image person
    A was looking at by drawing a reconstructed image based on person A’s natural
    language description. Person A and person B must work together to develop a system
    to reliably reconstruct the original image.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig7_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flow diagram depicts two images, a photograph of a cat on the left and a diagram
    on the right.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-7
  prefs: []
  type: TYPE_NORMAL
- en: Image-to-text encoding guessing game
  prefs: []
  type: TYPE_NORMAL
- en: 'Say that you are person B and you are given the following natural language
    description by person A: “a black pug dressed in a black and white scarf looks
    at the upper-left region of the camera among an orange background.” For the sake
    of intuition, it is a worthwhile exercise to try actually playing the role of
    person B in this game by sketching out/”decoding” the original input.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Figure [8-8](#Fig8) shows the (hypothetical) image that person A encoded into
    the given natural language description. Chances are that your sketch is very different
    from the actual image. By performing this exercise, you will have experienced
    first-hand two key low-level challenges in autoencoding: reconstructing a complex
    output from a comparatively simpler encoding requires a lot of thinking and conceptual
    reasoning about the encoding, and the encoding scheme itself needs to effectively
    communicate both key concepts and precision/positioning information.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig8_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A photograph of a dog.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-8
  prefs: []
  type: TYPE_NORMAL
- en: What person A was hypothetically looking at when they provided you the natural
    language encoding. Taken by Charles Deluvio
  prefs: []
  type: TYPE_NORMAL
- en: 'In this example, the latent space is in the form of language – which is discrete,
    sequential, and variable-length. Most autoencoders for tabular data use latent
    spaces that satisfy none of these attributes: they are (quasi-) continuous, read
    and generated all at once rather than sequentially, and fixed-length. These general
    autoencoders can reliably find effective encoding and decoding schemes with lifted
    restrictions, but the two-player game is still good intuition for thinking through
    challenges associated with autoencoder training.'
  prefs: []
  type: TYPE_NORMAL
- en: Although autoencoders are relatively simple neural network architectures, they
    are incredibly versatile. In this section, we will begin with the plain “vanilla”
    autoencoder and move to more complex forms and applications of autoencoders.
  prefs: []
  type: TYPE_NORMAL
- en: Vanilla Autoencoders
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s begin with the traditional understanding of an autoencoder, which merely
    consists of an encoder and a decoder component working together to translate the
    input into a latent representation and then back into original form. The value
    of autoencoders will become clearer in following sections, in which we will use
    autoencoders to substantively improve model training.
  prefs: []
  type: TYPE_NORMAL
- en: The goal of this subsection is not only to demonstrate and implement autoencoder
    architectures but also to understand implementation best practices and to perform
    technical investigations and explorations into how and why autoencoders work.
  prefs: []
  type: TYPE_NORMAL
- en: Autoencoders are traditionally applied to image and text-based datasets, because
    this sort of data often features semantic concepts that should take a smaller
    amount of space to represent than is used in raw form. For instance, consider
    the following approximately 3000-by-3000 pixel image of a line (Figure [8-9](#Fig9)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig9_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An image of a line embedded in a square.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-9
  prefs: []
  type: TYPE_NORMAL
- en: An image of a line
  prefs: []
  type: TYPE_NORMAL
- en: 'This image contains nine million pixels, meaning we are representing the concept
    of this line with nine million data values. However, in actuality we can express
    any line with just four numbers: a slope, a *y*-intercept, a lower *x* bound,
    and a higher *x* bound (or a starting *x* point, a starting *y* point, an ending
    *x* point, and an ending *y* point). If we were to design an encoding and decoding
    scheme set, the encoder would identify these four parameters – yielding a very
    compact four-dimensional latent space – and the decoder would redraw the line
    given those four parameters. By collecting higher-level abstract *latent* features
    from the semantics represented in the images, we are able to represent the dataset
    more compactly. We’ll revisit this example later in the subsection.'
  prefs: []
  type: TYPE_NORMAL
- en: Notice, however, that the autoencoder’s reconstruction capability is conditional
    on the existence of structural similarities (and differences) within the dataset.
    An autoencoder cannot reliably reconstruct an image of random noise, for instance.
  prefs: []
  type: TYPE_NORMAL
- en: The MNIST dataset is a particularly useful demonstration of autoencoders. It
    is technically visual/image-based, which is useful for understanding various autoencoder
    forms and applications (given that autoencoders are most well developed for images).
    However, it spans a small enough number of features and is structurally simple
    enough such that we can model it without any convolutional layers. Thus, the MNIST
    dataset serves as a nice link between the image and tabular data worlds. Throughout
    this section, we’ll use the MNIST dataset as an introduction to autoencoder techniques
    before demonstrating applications to “real” tabular/structured datasets.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s begin by loading the MNIST dataset from Keras datasets (Listing [8-1](#PC1)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Recall that the key feature of an autoencoder is an information bottleneck.
    We want to begin from the original representation size, progressively force the
    information flow into smaller vector sizes, and then progressively force the information
    back into the original size. Such a design is simple to quickly implement in Keras,
    where we can successively decrease and increase the number of nodes in a sequence
    of fully connected layers (Listing [8-2](#PC2)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: The architecture is visualized in Figure [8-10](#Fig10).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig10_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A framework architecture visualises features and layers of an autoencoder.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-10
  prefs: []
  type: TYPE_NORMAL
- en: A sequential autoencoder architecture
  prefs: []
  type: TYPE_NORMAL
- en: There are a few features of this autoencoder architecture to note. Firstly,
    the output activation of the autoencoder is a sigmoid function, but this is only
    because the input vector has values ranging from 0 to 1 (recall that we scaled
    the dataset upon loading in Listing [8-1](#PC1)). If we had not scaled the dataset
    as such, we would need to change the activation function such that the network
    could feasibly predict in the entire domain of possible values. If the input values
    consist of values larger than 0, ReLU may be a good activation output choice.
    If the inputs contain both positive and negative values, using a plain linear
    activation may be the easiest possible option. Moreover, the loss function chosen
    must be reflective of the output activation. Since our particular example contains
    outputs between 0 and 1 and the distribution of values is more or less binary
    (i.e., most values are very close to 0 or 1, as shown in Figure [8-11](#Fig11)),
    binary cross-entropy is a suitable loss to apply. We can treat reconstruction
    as a series of binary classification problems for each pixel in the original input.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig11_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A bar graph represents the construction of the binary classification of the
    pixel in its original input. It depicts that maximum values are near 0 or 1.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-11
  prefs: []
  type: TYPE_NORMAL
- en: Distribution of pixel values (scaled between 0 and 1) in the MNIST dataset
  prefs: []
  type: TYPE_NORMAL
- en: However, in other cases, reconstruction is more of a regression problem in which
    the distribution of possible values is not binarized toward the ends of the domains
    but rather more spread out. This is common in more complex image datasets (Figure
    [8-12](#Fig12)) and in many tabular datasets (Figure [8-13](#Fig13)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig13_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A bar graph represents the distribution of values in tabular datasets.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-13
  prefs: []
  type: TYPE_NORMAL
- en: Distribution of values for a feature in the Higgs Boson dataset (we will work
    with this dataset later in the chapter)
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig12_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A frequency distribution represents the possible values that are not binarised
    in a complex image datasets.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-12
  prefs: []
  type: TYPE_NORMAL
- en: Distribution of pixel values (scaled between 0 and 1) from a set of images in
    CIFAR-10
  prefs: []
  type: TYPE_NORMAL
- en: In these cases, it is more suitable to use a regression loss, like the generic
    Mean Squared Error or a more specialized alternative (e.g., Huber). Refer to Chapter
    [1](525591_1_En_1_Chapter.xhtml) for a review of regression losses.
  prefs: []
  type: TYPE_NORMAL
- en: Autoencoders are generally easier to work with when implemented in *compartmentalized
    form*. Rather than simply constructing the autoencoder as a continuous stack of
    layers with a bottleneck, we can build encoder and decoder models/components and
    chain them together to form a complete autoencoder (Listing [8-3](#PC3)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: This method of construction is philosophically more desirable because it reflects
    our understanding of the autoencoder structure as meaningfully composed of a separate
    encoding and decoding component. When we visualize our architecture, we obtain
    a much cleaner high-level breakdown of the autoencoder model (Figure [8-14](#Fig14)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig14_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A visualised architecture model diagram represents the advanced level breakdown
    of the autoencoder model. It has labels namely the input, encoder sequential and
    decoder sequential layers.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-14
  prefs: []
  type: TYPE_NORMAL
- en: Visualization of the compartmentalized model
  prefs: []
  type: TYPE_NORMAL
- en: However, using compartmentalized design is incredibly helpful because we can
    reference the encoder and decoder components separately from the autoencoder.
    For instance, if we desire to obtain the encoded representation for an input,
    we can simply call `encoder.predict(…)` on our input. The encoder and decoder
    are used to build the autoencoder; after the autoencoder is trained, the encoder
    and decoder still exist as references to components of that (now trained) autoencoder.
    The alternative would be to go searching for the latent space layer of the model
    and create a temporary model to run predictions, in a similar approach to the
    demonstration in Chapter [4](525591_1_En_4_Chapter.xhtml) used to visualize learned
    convolutional transformations in CNNs. Similarly, if we desire to decode a latent
    space vector, we can simply call `decoder.predict(…)` on our sample latent vector.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, Listing [8-4](#PC4) demonstrates visualization (Figures [8-15](#Fig15)
    through [8-18](#Fig18)) of the internal state and reconstruction of the autoencoder
    created in Listing [8-3](#PC3) after training.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig18_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An image depicts the reconstruction of the encoder formed after training according
    to the listing. It exhibits the results from original input, latent space and
    reconstructed.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-18
  prefs: []
  type: TYPE_NORMAL
- en: Sample latent shape and reconstruction for the digit “5”
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig17_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An image represents the decoding of sample shapes in the latent space and reconstruction
    stage of the number two. It exhibits the results from original input, latent space,
    and reconstructed.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-17
  prefs: []
  type: TYPE_NORMAL
- en: Sample latent shape and reconstruction for the digit “2”
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig16_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A visual representation of reconstruction for the digit 1 created after the
    training stage.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-16
  prefs: []
  type: TYPE_NORMAL
- en: Sample latent shape and reconstruction for the digit “1”
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig15_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A visualisation of images represents the shape of the internal state of encoder.
    It exhibits the results from original input, latent space and reconstructed.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-15
  prefs: []
  type: TYPE_NORMAL
- en: Sample latent shape and reconstruction for the digit “7”
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: When we build standard neural networks that we may want multiple models of with
    small differences, it is often useful to create a “builder” or “constructor.”
    The two key parameters of a neural network are the input size and the latent space
    size. Given these two key “determining’ parameters,” we can infer how we generally
    want information to flow. For instance, halving the information space in each
    subsequent layer in the encoder (and doubling in the decoder) is a good generic
    update rule.
  prefs: []
  type: TYPE_NORMAL
- en: Let the input size be *I*, and let the latent space size be *L*. In order to
    maintain this rule, we want all intermediate layers to use nodes as multiples
    of *L*. Consider the case in which *I* = 4*L*, for instance (Figure [8-19](#Fig19)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig19_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An infographic image represents the intermediate layers that is used to denote
    nodes as multiples of L.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-19
  prefs: []
  type: TYPE_NORMAL
- en: Visualization of a “halving” autoencoder architecture logic
  prefs: []
  type: TYPE_NORMAL
- en: We see that the number of layers needed to either reduce the input to the latent
    space or to expand the latent space to the output is
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\log}_2\frac{I}{L} $$](../images/525591_1_En_8_Chapter/525591_1_En_8_Chapter_TeX_Equa.png)'
  prefs: []
  type: TYPE_IMG
- en: This simple expression measures how many times we need to multiply *L* by 2
    in order to reach *I*.
  prefs: []
  type: TYPE_NORMAL
- en: 'However, it will often be the case that ![$$ \raisebox{1ex}{$I$}\!\left/ \!\raisebox{-1ex}{$L$}\right.\notin
    \mathbb{Z} $$](../images/525591_1_En_8_Chapter/525591_1_En_8_Chapter_TeX_IEq1.png)
    (i.e., *I* does not divide cleanly into *L*), in which case our earlier logarithmic
    expression will not be integer. In these cases, we have a simple fix: we can cast
    the input to a layer with *N* nodes, where *N* = 2^(*k*) · *L* for the largest
    integer *k* such that *N* < *I*. For instance, if *I* = 4*L* + 8, we first “cast”
    down to 4*L* and execute our standard halving policy from that point (Figure [8-20](#Fig20)).'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig20_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flow diagram depicts execution of halving policy from the point 4 L.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-20
  prefs: []
  type: TYPE_NORMAL
- en: Adapting the halving autoencoder logic to inputs that are not powers of 2
  prefs: []
  type: TYPE_NORMAL
- en: 'To accommodate for cases in which ![$$ {\log}_2\raisebox{1ex}{$I$}\!\left/
    \!\raisebox{-1ex}{$L$}\right.\notin \mathbb{Z} $$](../images/525591_1_En_8_Chapter/525591_1_En_8_Chapter_TeX_IEq2.png)
    (i.e., we cannot express the input size in relationship to the layer size as an
    exponent of 2), we can modify our expression for the number of layers required
    by wrapping with the floor function:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \left\lfloor {\log}_2\frac{I}{L}\right\rfloor $$](../images/525591_1_En_8_Chapter/525591_1_En_8_Chapter_TeX_Equb.png)'
  prefs: []
  type: TYPE_IMG
- en: Using this halving/doubling information flow logic, we can create a generalized
    `buildAutoencoder` function that constructs a feed-forward autoencoder given an
    input size and a latent size (Listing [8-5](#PC5)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Rather than just returning the model, we also return the encoder and decoder.
    Recall from earlier discussion of compartmentalized design that retaining a reference
    to the encoder and decoder components of the autoencoder can be helpful. If not
    returned, these references – created internally inside the function – will be
    lost and irretrievable.
  prefs: []
  type: TYPE_NORMAL
- en: Having a generalized autoencoder creation function allows us to perform larger-scale
    autoencoder experiments. One particularly important phenomenon to understand is
    the trade-off between model performance and the latent size. As previously mentioned,
    the latent size must be configured properly such that the task is challenging
    enough to force the autoencoder to develop meaningful and nontrivial representations,
    but also feasible enough such that the autoencoder can gain traction at solving
    the problem (rather than stagnating and not learning anything at all due to the
    difficulty of the reconstruction problem). Let’s train several autoencoders on
    the MNIST dataset with bottleneck sizes 2^(*n*) where *n* ∈ [1, 2, …, ⌊log[2]*I*⌋]
    (the last value of *n* being the largest power of 2 less than the original input
    size) and obtain each one’s validation performance (Listing [8-6](#PC6), Figure
    [8-21](#Fig21)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig21_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph of validation performance against Latent size represents a sloping
    curve.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-21
  prefs: []
  type: TYPE_NORMAL
- en: Relationship between the latent size of a tabular autoencoder (2^(*x*) neurons)
    and the validation performance. Note the diminishing returns
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: The diminishing returns for larger latent sizes are very apparently clear. As
    the latent size increases, the benefit we can reap from it decreases. This phenomenon
    is true generally in deep learning models (recall “Deep Double Descent” from Chapter
    [1](525591_1_En_1_Chapter.xhtml), which similarly compared model size vs. performance
    in a supervised domain with CNNs).
  prefs: []
  type: TYPE_NORMAL
- en: We can do one better and visualize the differences in the learned latent representations
    for different bottleneck sizes. The latent representations for the training set
    after the autoencoder has been trained can be obtained via `encoder.predict(x_train)`.
    Of course, the latent representations will be in different dimensions for each
    autoencoder. We can use the t-SNE method (introduced in Chapter [2](525591_1_En_2_Chapter.xhtml))
    to visualize these latent spaces (Listing [8-7](#PC7), Figures [8-22](#Fig22)
    through [8-30](#Fig30)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_8_Chapter/525591_1_En_8_Fig30_HTML.png)'
