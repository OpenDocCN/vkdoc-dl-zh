  prefs: []
  type: TYPE_NORMAL
- en: Figure [8-68](#Fig68) demonstrates the same set of images with random noise
    sampled from a normal distribution with standard deviation of 0.1\. We can observe
    marginal noise, especially in affecting the consistency of the digit outlines.
  prefs: []
  type: TYPE_NORMAL
