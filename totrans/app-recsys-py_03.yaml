- en: 3. Content-Based Recommender Systems
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 3. 基于内容的推荐系统
- en: Content-based filtering is used to recommend products or items very similar
    to those being clicked or liked. User recommendations are based on the description
    of an item and a profile of the user’s interests. Content-based recommender systems
    are widely used in e-commerce platforms. It is one of the basic algorithms in
    a recommendation engine. Content-based filtering can be triggered for any event;
    for example, on click, on purchase, or add to cart.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 基于内容的过滤用于推荐与被点击或喜欢的产品或项目非常相似的产品。用户推荐基于物品的描述和用户兴趣的概要。基于内容的推荐系统在电子商务平台上得到广泛应用。它是推荐引擎中的基本算法之一。基于内容的过滤可以针对任何事件触发；例如，在点击、购买或添加到购物车时。
- en: If you use any e-commerce platform, for example, Amazon.com, a product’s page
    shows recommendations in the “related products” section. How to generate these
    recommendations is discussed in this chapter.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您使用任何电子商务平台，例如Amazon.com，产品页面在“相关产品”部分显示推荐。本章讨论了如何生成这些推荐。
- en: Approach
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 方法
- en: The following steps build a content-based recommender engine.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 以下步骤构建一个基于内容的推荐引擎。
- en: Do the data collection (should have complete item description).
  id: totrans-5
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 进行数据收集（应包含完整的物品描述）。
- en: Do the data preprocessing.
  id: totrans-6
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 进行数据预处理。
- en: Convert text to features.
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将文本转换为特征。
- en: Perform similarity measures.
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 执行相似度度量。
- en: Recommend products.
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 推荐产品。
- en: Figure [3-1](#Fig1) illustrates these steps.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 图[3-1](#Fig1)说明了这些步骤。
