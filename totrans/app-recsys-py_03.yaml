- en: As discussed, the Product Name and Description columns of text data are used
    to build a content-based recommendation engine. Text preprocessing is mandatory.
    It is followed by text-to-feature conversion.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 正如讨论的那样，文本数据的“产品名称”和“描述”列用于构建基于内容的推荐引擎。文本预处理是强制性的。之后是文本到特征的转换。
- en: The following describes the preprocessing steps.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 以下描述了预处理步骤。
- en: Remove duplicates.
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 删除重复项。
- en: Convert the string to lowercase.
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将字符串转换为小写。
- en: Remove special characters.
  id: totrans-52
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 删除特殊字符。
- en: '[PRE9]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Text to Features
  id: totrans-54
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 文本到特征
- en: Once the text preprocessing is done, let’s focus on converting the preprocessed
    text into features.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 文本预处理完成后，让我们专注于将预处理后的文本转换为特征。
- en: There are several methods to convert text to features.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 将文本转换为特征的方法有很多。
- en: One-hot encoding (OHE)
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: One-hot encoding (OHE)
- en: CountVectorizer
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CountVectorizer
- en: TF-IDF
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: TF-IDF
- en: The following are word embedding tools.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些词嵌入工具。
- en: Word2vec
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Word2vec
- en: fastText
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: fastText
- en: GloVe
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GloVe
- en: Since machines or algorithms cannot understand the text, a key task in natural
    language processing (NLP) is converting text data into numerical data called *features*.
    There are different techniques to do this. Let’s discuss them briefly.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 由于机器或算法无法理解文本，自然语言处理 (NLP) 中的一个关键任务是将文本数据转换为称为 *特征* 的数值数据。有几种不同的技术来完成这项任务。让我们简要地讨论一下。
- en: One-Hot Encoding (OHE)
  id: totrans-65
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: One-Hot Encoding (OHE)
- en: OHE is the basic and simple way of converting text to numbers or features. It
    converts all the tokens in the corpus into columns, as shown in Table [3-1](#Tab1).
    After that, against every observation, it tags as 1 if the word is present; otherwise,
    0.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: One-Hot Encoding (OHE) 是将文本转换为数字或特征的基本且简单的方法。它将语料库中的所有标记转换为列，如表 [3-1](#Tab1)
    所示。之后，对于每个观察结果，如果单词存在，则标记为 1；否则，为 0。
- en: Table 3-1
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 表 3-1
- en: OHE
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: OHE
- en: '|   | One | Hot | Encoding |'
  id: totrans-69
  prefs: []
  type: TYPE_TB
  zh: '|   | 单一 | 热编码 | 编码 |'
- en: '| --- | --- | --- | --- |'
  id: totrans-70
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- |'
- en: '| One Hot | 1 | 1 | 0 |'
  id: totrans-71
  prefs: []
  type: TYPE_TB
  zh: '| 单一热编码 | 1 | 1 | 0 |'
- en: '| Hot | 0 | 1 | 0 |'
  id: totrans-72
  prefs: []
  type: TYPE_TB
  zh: '| 热门 | 0 | 1 | 0 |'
- en: '| Encoding | 0 | 0 | 1 |'
  id: totrans-73
  prefs: []
  type: TYPE_TB
  zh: '| 编码 | 0 | 0 | 1 |'
- en: CountVectorizer
  id: totrans-74
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: CountVectorizer
- en: The drawback to the OHE approach is if a word appears multiple times in a sentence,
    it gets the same importance as any other word that appears only once. CountVectorizer
    helps overcome this because it counts the tokens present in an observation instead
    of tagging everything as 1 or 0.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: OHE 方法的缺点是如果一个词在句子中多次出现，它的重要性与只出现一次的其他任何词相同。`CountVectorizer` 有助于克服这一点，因为它计算观察结果中存在的标记数量，而不是将所有内容标记为
    1 或 0。
- en: Table [3-2](#Tab2) demonstrates CountVectorizer.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 表 [3-2](#Tab2) 展示了 `CountVectorizer`。
- en: Table 3-2
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 表 3-2
- en: CountVectorizer
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: CountVectorizer
- en: '|   | AI | new | Learn | ……. |'
  id: totrans-79
  prefs: []
  type: TYPE_TB
  zh: '|   | AI | new | Learn | ……. |'
- en: '| --- | --- | --- | --- | --- |'
  id: totrans-80
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- |'
- en: '| AI is new. AI is everywhere. | 2 | 1 | 0 | ………. |'
  id: totrans-81
  prefs: []
  type: TYPE_TB
  zh: '| AI 是新的。AI 到处都是。 | 2 | 1 | 0 | ………. |'
- en: '| Learn AI. Learn NLP. | 1 | 1 | 2 | ……… |'
  id: totrans-82
  prefs: []
  type: TYPE_TB
  zh: '| 学习 AI。学习 NLP。 | 1 | 1 | 2 | ……… |'
- en: '| NLP is cool. | 0 | 0 | 0 | ………. |'
  id: totrans-83
  prefs: []
  type: TYPE_TB
  zh: '| NLP 很酷。 | 0 | 0 | 0 | ………. |'
- en: Term Frequency–Inverse Document Frequency (TF-IDF)
  id: totrans-84
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 术语频率-逆文档频率 (TF-IDF)
- en: CountVectorizer won’t answer all questions. If the length of the sentences is
    inconsistent or a word is repeated in all the sentences, it becomes tricky. TF-IDF
    addresses these problems.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: '`CountVectorizer` 无法回答所有问题。如果句子的长度不一致或一个词在所有句子中都重复出现，就会变得棘手。TF-IDF 解决了这些问题。'
- en: The *term frequency* (TF) is the “number of times the token appeared in a corpus
    doc divided by the total number of tokens.”
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: '*词频* (TF) 是“标记在语料库文档中出现的次数除以总标记数。”'
- en: The *inverse document frequency* (IDF) is a log of the total number of such
    corpus docs in overall docs we have divided by the number of overall docs with
    the selected word. It helps provide more weight to rare words in the corpus.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: '*逆文档频率* (IDF) 是我们对整体文档中具有此类语料库文档的总数的对数，除以具有所选单词的整体文档数。它有助于为语料库中的罕见单词提供更多权重。'
- en: Multiplying them gives the TF-IDF vector for a word in the corpus.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 将它们相乘得到语料库中单词的 TF-IDF 向量。
- en: '![](../images/537881_1_En_3_Chapter/537881_1_En_3_Figa_HTML.jpg)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/537881_1_En_3_Chapter/537881_1_En_3_Figa_HTML.jpg)'
- en: A formula for term frequency-inverse document frequency states t f i d f subscript
    i, j equals t f subscript i, j dot i d f subscript i. The number of times i appear
    in document j is divided by the total number of terms in document j. The log of
    the total number of documents is divided by the number of documents with the term
    i in it.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 术语频率-逆文档频率 (TF-IDF) 的公式为 t f i d f 下标 i, j 等于 t f 下标 i, j 点 i d f 下标 i。i 在文档
    j 中出现的次数除以文档 j 中的总术语数。总文档数的对数除以包含术语 i 的文档数。
- en: Word Embeddings
  id: totrans-91
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 词嵌入
- en: Even though TF-IDF is widely used, it doesn’t capture the context of a word
    or sentence. Word embeddings solve this problem. Word embeddings help capture
    context and the semantic and syntactic similarity between the words. They generate
    a vector that captures the context and semantics using shallow neural networks.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管TF-IDF被广泛使用，但它无法捕捉到单词或句子的上下文。词嵌入解决了这个问题。词嵌入有助于捕捉上下文以及词语之间的语义和句法相似性。它们使用浅层神经网络生成一个向量，该向量捕捉上下文和语义。
- en: In recent years, there have been many advancements in this field, including
    the following tools.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 近年来，该领域取得了许多进展，包括以下工具。
- en: Word2vec
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Word2vec
- en: GloVe
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GloVe
- en: fastText
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: fastText
- en: Elmo
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Elmo
- en: SentenceBERT
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: SentenceBERT
- en: GPT
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GPT
- en: 'For more information about these concepts, please refer to our second edition
    book on NLP, *Natural Language Processing Recipes: Unlocking Text Data with Machine
    Learning and Deep Learning Using Python* (Apress, 2021).'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 关于这些概念的更多信息，请参阅我们关于自然语言处理的第二版书籍《自然语言处理食谱：使用Python的机器学习和深度学习解锁文本数据》（Apress，2021年）。
- en: The pre-trained models (word embeddings)—GloVe, Word2vec, and fastText—have
    been imported/loaded. Now let’s import the CountVectorizer and TF-IDF.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 预训练模型（词嵌入）——GloVe、Word2vec和fastText——已被导入/加载。现在让我们导入CountVectorizer和TF-IDF。
- en: '[PRE10]'
  id: totrans-102
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Similarity Measures
  id: totrans-103
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 相似度度量
- en: Once text is converted to features, the next step is to build a content-based
    model. The similarity measures must get similar vectors.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦文本被转换为特征，下一步就是构建基于内容的模型。相似度度量必须获取相似向量。
- en: There are three types of similarity measures.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 有三种相似度度量。
- en: Euclidean distance
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 欧几里得距离
- en: Cosine similarity
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 余弦相似度
- en: Manhattan distance
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 曼哈顿距离
- en: Note
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: We have not yet converted text to features; we only loaded all the methods.
    They are used later.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还没有将文本转换为特征；我们只加载了所有方法。它们将在以后使用。
- en: Euclidean Distance
  id: totrans-111
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 欧几里得距离
- en: Euclidean distance is calculated by taking the sum of the squared differences
    between two vectors and then applying the square root.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 欧几里得距离是通过计算两个向量之间平方差的和，然后应用平方根来计算的。
- en: Figure [3-3](#Fig3) explains the Euclidean distance.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 图[3-3](#Fig3)解释了欧几里得距离。
- en: '![](../images/537881_1_En_3_Chapter/537881_1_En_3_Fig3_HTML.jpg)'
  id: totrans-114
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/537881_1_En_3_Chapter/537881_1_En_3_Fig3_HTML.jpg)'
- en: Graphical analysis on Euclidean distances with a right-angle triangle. Sides
    are A (x subscript 1, y subscript 1) and B (x subscript 2, y subscript 2), the
    distance between these two are considered Euclidean distance.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 在直角三角形上的欧几里得距离图形分析。边A（x下标1，y下标1）和B（x下标2，y下标2），这两点之间的距离被认为是欧几里得距离。
- en: Figure 3-3
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-3
- en: Euclidean distance
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 欧几里得距离
- en: Cosine Similarity
  id: totrans-118
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 余弦相似度
- en: Cosine similarity is the cosine of the angle between two n-dimensional vectors
    in an N-dimensional space. It is the dot product of the two vectors divided by
    the product of the two vectors’ lengths (or magnitudes).
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 余弦相似度是N维空间中两个n维向量之间角度的余弦值。它是两个向量的点积除以两个向量长度的乘积（或大小）。
- en: Figure [3-4](#Fig4) explains cosine similarity.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 图[3-4](#Fig4)解释了余弦相似度。
- en: '![](../images/537881_1_En_3_Chapter/537881_1_En_3_Fig4_HTML.jpg)'
  id: totrans-121
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/537881_1_En_3_Chapter/537881_1_En_3_Fig4_HTML.jpg)'
- en: Graphical analysis on cosine similarity. The panda and tiger cartoon image are
    used to represent the cosine. It reveals the dot product of two vectors divided
    by the product of the two vector's lengths (angle between two-dimensional vectors).
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 余弦相似度的图形分析。熊猫和老虎卡通图像用于表示余弦。它揭示了两个向量的点积除以两个向量长度的乘积（二维向量之间的角度）。
- en: Figure 3-4
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-4
- en: Cosine similarity
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 余弦相似度
- en: Manhattan Distance
  id: totrans-125
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 曼哈顿距离
- en: The Manhattan distance is the sum of the absolute differences between two vectors.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 曼哈顿距离是两个向量之间绝对差分的和。
- en: Figure [3-5](#Fig5) explains the Manhattan distance.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 图[3-5](#Fig5)解释了曼哈顿距离。
- en: '![](../images/537881_1_En_3_Chapter/537881_1_En_3_Fig5_HTML.png)'
  id: totrans-128
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/537881_1_En_3_Chapter/537881_1_En_3_Fig5_HTML.png)'
- en: A set of two graphical analyses depict the comparison between the Manhattan
    distance and Euclidean distance. Also, it includes the formula for Manhattan distance
    and for two-dimensional space.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 一组两个图形分析展示了曼哈顿距离和欧几里得距离的比较。此外，还包括了曼哈顿距离和二维空间的公式。
- en: Figure 3-5
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-5
- en: Manhattan distance
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 曼哈顿距离
- en: Let’s write functions for all three types of similarity measures.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们为三种类型的相似度度量编写函数。
