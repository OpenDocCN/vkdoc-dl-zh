- en: Summary
  id: totrans-248
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, you learned how to build a content-based model using text data
    from the data preparation to the recommendations to the users. You saw models
    built using several NLP techniques. Using word embeddings is a much better option,
    given they have the power to capture context and semantics.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你学习了如何使用文本数据构建基于内容的模型，从数据准备到向用户推荐。你看到了使用多种自然语言处理技术构建的模型。考虑到它们能够捕捉上下文和语义，使用词嵌入是一个更好的选择。
