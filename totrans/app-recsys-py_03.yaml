- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Text to Features
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Once the text preprocessing is done, let’s focus on converting the preprocessed
    text into features.
  prefs: []
  type: TYPE_NORMAL
- en: There are several methods to convert text to features.
  prefs: []
  type: TYPE_NORMAL
- en: One-hot encoding (OHE)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: CountVectorizer
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: TF-IDF
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The following are word embedding tools.
  prefs: []
  type: TYPE_NORMAL
- en: Word2vec
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: fastText
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: GloVe
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Since machines or algorithms cannot understand the text, a key task in natural
    language processing (NLP) is converting text data into numerical data called *features*.
    There are different techniques to do this. Let’s discuss them briefly.
  prefs: []
  type: TYPE_NORMAL
- en: One-Hot Encoding (OHE)
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: OHE is the basic and simple way of converting text to numbers or features. It
    converts all the tokens in the corpus into columns, as shown in Table [3-1](#Tab1).
    After that, against every observation, it tags as 1 if the word is present; otherwise,
    0.
  prefs: []
  type: TYPE_NORMAL
- en: Table 3-1
  prefs: []
  type: TYPE_NORMAL
- en: OHE
  prefs: []
  type: TYPE_NORMAL
- en: '|   | One | Hot | Encoding |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| One Hot | 1 | 1 | 0 |'
  prefs: []
  type: TYPE_TB
- en: '| Hot | 0 | 1 | 0 |'
  prefs: []
  type: TYPE_TB
- en: '| Encoding | 0 | 0 | 1 |'
  prefs: []
  type: TYPE_TB
- en: CountVectorizer
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: The drawback to the OHE approach is if a word appears multiple times in a sentence,
    it gets the same importance as any other word that appears only once. CountVectorizer
    helps overcome this because it counts the tokens present in an observation instead
    of tagging everything as 1 or 0.
  prefs: []
  type: TYPE_NORMAL
- en: Table [3-2](#Tab2) demonstrates CountVectorizer.
  prefs: []
  type: TYPE_NORMAL
- en: Table 3-2
  prefs: []
  type: TYPE_NORMAL
- en: CountVectorizer
  prefs: []
  type: TYPE_NORMAL
- en: '|   | AI | new | Learn | ……. |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| AI is new. AI is everywhere. | 2 | 1 | 0 | ………. |'
  prefs: []
  type: TYPE_TB
- en: '| Learn AI. Learn NLP. | 1 | 1 | 2 | ……… |'
  prefs: []
  type: TYPE_TB
- en: '| NLP is cool. | 0 | 0 | 0 | ………. |'
  prefs: []
  type: TYPE_TB
- en: Term Frequency–Inverse Document Frequency (TF-IDF)
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: CountVectorizer won’t answer all questions. If the length of the sentences is
    inconsistent or a word is repeated in all the sentences, it becomes tricky. TF-IDF
    addresses these problems.
  prefs: []
  type: TYPE_NORMAL
- en: The *term frequency* (TF) is the “number of times the token appeared in a corpus
    doc divided by the total number of tokens.”
  prefs: []
  type: TYPE_NORMAL
- en: The *inverse document frequency* (IDF) is a log of the total number of such
    corpus docs in overall docs we have divided by the number of overall docs with
    the selected word. It helps provide more weight to rare words in the corpus.
  prefs: []
  type: TYPE_NORMAL
- en: Multiplying them gives the TF-IDF vector for a word in the corpus.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537881_1_En_3_Chapter/537881_1_En_3_Figa_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A formula for term frequency-inverse document frequency states t f i d f subscript
    i, j equals t f subscript i, j dot i d f subscript i. The number of times i appear
    in document j is divided by the total number of terms in document j. The log of
    the total number of documents is divided by the number of documents with the term
    i in it.
  prefs: []
  type: TYPE_NORMAL
- en: Word Embeddings
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Even though TF-IDF is widely used, it doesn’t capture the context of a word
    or sentence. Word embeddings solve this problem. Word embeddings help capture
    context and the semantic and syntactic similarity between the words. They generate
    a vector that captures the context and semantics using shallow neural networks.
  prefs: []
  type: TYPE_NORMAL
- en: In recent years, there have been many advancements in this field, including
    the following tools.
  prefs: []
  type: TYPE_NORMAL
- en: Word2vec
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: GloVe
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: fastText
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Elmo
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: SentenceBERT
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: GPT
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'For more information about these concepts, please refer to our second edition
    book on NLP, *Natural Language Processing Recipes: Unlocking Text Data with Machine
    Learning and Deep Learning Using Python* (Apress, 2021).'
  prefs: []
  type: TYPE_NORMAL
- en: The pre-trained models (word embeddings)—GloVe, Word2vec, and fastText—have
    been imported/loaded. Now let’s import the CountVectorizer and TF-IDF.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: Similarity Measures
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Once text is converted to features, the next step is to build a content-based
    model. The similarity measures must get similar vectors.
  prefs: []
  type: TYPE_NORMAL
- en: There are three types of similarity measures.
  prefs: []
  type: TYPE_NORMAL
- en: Euclidean distance
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Cosine similarity
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Manhattan distance
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: We have not yet converted text to features; we only loaded all the methods.
    They are used later.
  prefs: []
  type: TYPE_NORMAL
- en: Euclidean Distance
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Euclidean distance is calculated by taking the sum of the squared differences
    between two vectors and then applying the square root.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [3-3](#Fig3) explains the Euclidean distance.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537881_1_En_3_Chapter/537881_1_En_3_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Graphical analysis on Euclidean distances with a right-angle triangle. Sides
    are A (x subscript 1, y subscript 1) and B (x subscript 2, y subscript 2), the
    distance between these two are considered Euclidean distance.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-3
  prefs: []
  type: TYPE_NORMAL
- en: Euclidean distance
  prefs: []
  type: TYPE_NORMAL
- en: Cosine Similarity
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Cosine similarity is the cosine of the angle between two n-dimensional vectors
    in an N-dimensional space. It is the dot product of the two vectors divided by
    the product of the two vectors’ lengths (or magnitudes).
  prefs: []
  type: TYPE_NORMAL
- en: Figure [3-4](#Fig4) explains cosine similarity.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537881_1_En_3_Chapter/537881_1_En_3_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Graphical analysis on cosine similarity. The panda and tiger cartoon image are
    used to represent the cosine. It reveals the dot product of two vectors divided
    by the product of the two vector's lengths (angle between two-dimensional vectors).
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-4
  prefs: []
  type: TYPE_NORMAL
- en: Cosine similarity
  prefs: []
  type: TYPE_NORMAL
- en: Manhattan Distance
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The Manhattan distance is the sum of the absolute differences between two vectors.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [3-5](#Fig5) explains the Manhattan distance.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537881_1_En_3_Chapter/537881_1_En_3_Fig5_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A set of two graphical analyses depict the comparison between the Manhattan
    distance and Euclidean distance. Also, it includes the formula for Manhattan distance
    and for two-dimensional space.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-5
  prefs: []
  type: TYPE_NORMAL
- en: Manhattan distance
  prefs: []
  type: TYPE_NORMAL
- en: Let’s write functions for all three types of similarity measures.
  prefs: []
  type: TYPE_NORMAL
