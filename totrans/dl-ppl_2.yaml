- en: Dealing with Big Datasets
  id: totrans-395
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 处理大型数据集
- en: If the dataset you want to load is too big to fit in the memory, then you have
    to divide it into pieces (or named `chunks`). This approach is sometimes called
    sampling, and we will see in future chapters something about that. After that,
    you make a batch deep learning algorithm, which works with only a part/piece of
    the data at once. Using a batch approach also makes sense if you just need a sample
    of the data. Thanks to Python, you actually can load the data in chunks. This
    operation is also called data streaming, since the dataset flows into a `DataFrame`
    or some other data structure as a continuous flow. As opposed to all the previous
    cases, the dataset has been fully loaded into the memory in a standalone step.
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要加载的数据集太大而无法放入内存，那么你必须将其分成几块（或称为`chunks`）。这种方法有时被称为抽样，我们将在未来的章节中看到一些关于它的内容。之后，你将创建一个批处理深度学习算法，该算法一次只处理数据的一部分/块。使用批处理方法也很有意义，如果你只需要数据的一个样本。多亏了Python，你实际上可以分块加载数据。这种操作也称为数据流，因为数据集作为一个连续的流动进入`DataFrame`或其他数据结构。与所有之前的案例相反，数据集在独立步骤中已经完全加载到内存中。
- en: 'With pandas, there are two ways to chunk and load a file:'
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 使用pandas，有两种方式来分块和加载文件：
- en: The first way is by loading the dataset in chunks of the same size; each chunk
    is a piece of the dataset that contains all the columns and a limited number of
    lines, not more than as set in the function call (the `chunksize` parameter).
  id: totrans-398
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第一种方法是通过加载相同大小的数据块；每个块是数据集的一部分，包含所有列和有限的行数，不超过在函数调用中设置的（即`chunksize`参数）。
- en: 'You can also use the CSV package, which offers two functions to iterate small
    chunks of data from files: the `reader` and the `DictReader` functions .'
  id: totrans-399
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你还可以使用CSV包，它提供了两个函数来迭代文件中的小数据块：`reader`和`DictReader`函数。
- en: Note
  id: totrans-400
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: 'The output of the `read_csv` function in this case is not a pandas DataFrame
    but an iterator-like object. In fact, to get the results in memory, you need to
    iterate that object:'
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，`read_csv`函数的输出不是一个pandas DataFrame，而是一个类似迭代器的对象。实际上，要获取内存中的结果，你需要迭代该对象：
- en: '[PRE13]'
  id: totrans-402
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'There will be `14` other pieces like these, each of them of `shape (10, 5)`.
    The other method to load a big dataset is by specifically asking for an iterator
    of it. In this case, you can dynamically decide the length (that is, how many
    lines to get) you want for each piece of the pandas `DataFrame`:'
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 将会有`14`个这样的其他部分，每个部分的形状都是`（10，5）`。加载大型数据集的另一种方法是请求其迭代器。在这种情况下，你可以动态地决定每个`pandas
    DataFrame`部分的长度（即要获取的行数）：
- en: '[PRE14]'
  id: totrans-404
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Accessing Other Data Formats
  id: totrans-405
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 访问其他数据格式
- en: So far, we have worked on CSV files only. The pandas package offers similar
    functionality (and functions) in order to load MS Excel, HDFS, SQL, JSON, HTML,
    and Stata datasets. Since they’re not used in all data science projects, the understanding
    of how one can load and handle each of them is left to you, and you can refer
    to the documentation available on the website. A basic example of how to load
    an SQL table is available in the code that accompanies the book.
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们只处理了CSV文件。pandas包提供了类似的功能（和函数）来加载MS Excel、HDFS、SQL、JSON、HTML和Stata数据集。由于它们不是所有数据科学项目都使用，如何加载和处理每个数据集的理解留给你，你可以参考网站上的文档。代码中提供了一个如何加载SQL表的简单示例。
- en: Note
  id: totrans-407
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: '`CSV` (comma-separated) and `TSV` (tab-separated) are similar, as they both
    are considered flat files.'
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: '`CSV`（逗号分隔）和`TSV`（制表符分隔）相似，因为它们都被认为是平面文件。'
- en: '[PRE15]'
  id: totrans-409
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig9_HTML.jpg](Images/484548_1_En_6_Fig9_HTML.jpg)'
  id: totrans-410
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig9_HTML.jpg](Images/484548_1_En_6_Fig9_HTML.jpg)'
- en: Figure 6-9
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-9
- en: The output of the Excel file
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: Excel 文件的输出
- en: Data Preprocessing
  id: totrans-413
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据预处理
- en: We are now able to import the dataset, even a big, problematic one. Now, we
    need to learn the basic preprocessing routines in order to make it feasible for
    the next data science step.
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们能够导入数据集，即使是大型且存在问题的数据集。现在，我们需要学习基本的数据预处理流程，以便使其适用于下一个数据科学步骤。
- en: First, if you need to apply a function to a limited section of rows, you can
    create a mask (Figure [6-10](#Fig10)). A mask is a series of Boolean values (that
    is, True or False) that tells whether the line is selected or not.
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，如果你需要将一个函数应用于行的一小部分，你可以创建一个掩码（图 [6-10](#Fig10)）。掩码是一系列布尔值（即，True 或 False），它告诉是否选择了该行。
- en: 'For example, let’s say we want to select all the lines of the iris dataset
    that have a sepal length greater than 6\. We can simply do the following:'
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假设我们想要选择所有花瓣长度大于 6 的鸢尾花数据集的行。我们可以简单地执行以下操作：
- en: '[PRE16]'
  id: totrans-417
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig10_HTML.jpg](Images/484548_1_En_6_Fig10_HTML.jpg)'
  id: totrans-418
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig10_HTML.jpg](Images/484548_1_En_6_Fig10_HTML.jpg)'
- en: Figure 6-10
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-10
- en: The output of masking data
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 掩码数据的输出
- en: In the preceding simple example, we can immediately see which observations are
    True and which are not (`False`), and which ones fit the selection query.
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的简单示例中，我们可以立即看到哪些观测值是 True，哪些不是（`False`），以及哪些符合选择查询。
- en: 'Now, let’s check how you can use a selection mask on another example. We want
    to substitute the `Iris-virginica` target label with the `Virginica` label. We
    can do this by using the following two lines of code:'
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们看看如何在一个示例中使用选择掩码。我们想要将 `Iris-virginica` 目标标签替换为 `Virginica` 标签。我们可以通过以下两行代码来完成：
- en: '[PRE17]'
  id: totrans-423
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig11_HTML.jpg](Images/484548_1_En_6_Fig11_HTML.jpg)'
  id: totrans-424
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig11_HTML.jpg](Images/484548_1_En_6_Fig11_HTML.jpg)'
- en: Figure 6-11
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-11
- en: The renamed data
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 重命名后的数据
- en: You’ll see that all occurrences of `Iris-virginica` are now replaced by `Virginica`
    (Figure [6-11](#Fig11)). The `loc()` method is a way to access the data of the
    matrix with the help of row-column indexes.
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 你会看到现在所有的 `Iris-virginica` 发生都已被替换为 `Virginica`（图 [6-11](#Fig11)）。`loc()` 方法是使用行-列索引访问矩阵数据的一种方式。
- en: 'To see the new list of the labels in the target column, we can use the `unique()`
    method . This method is very handy if initially you want to evaluate the dataset:'
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: 要查看目标列中新的标签列表，我们可以使用 `unique()` 方法。如果你最初想评估数据集，这个方法非常方便：
- en: '[PRE18]'
  id: totrans-429
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: This method allows us to see the unique values inside either pandas DataFrame
    or Series, and the method is very helpful in the analysis process. Another way
    is to count the number of unique values, and that could happen by using `nunique()`
    , which will return the number of unique values in the input DataFrame/Series.
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: 此方法允许我们查看 pandas DataFrame 或 Series 中的唯一值，并且在分析过程中非常有帮助。另一种方法是计算唯一值的数量，这可以通过使用
    `nunique()` 来实现，它将返回输入 DataFrame/Series 中的唯一值数量。
- en: 'If you want to see some statistics (mean, median, and so on) about each feature
    (statistics about data give you some intuition about what happens in it), you
    can do the following steps:'
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想查看每个特征（关于数据的统计信息，如均值、中位数等）的统计数据（统计数据可以让你对数据中发生的事情有一些直观的了解），你可以执行以下步骤：
- en: You can group each column accordingly.
  id: totrans-432
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以相应地分组每一列。
- en: You can also apply a mask.
  id: totrans-433
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你也可以应用一个掩码。
- en: The pandas method groupby will produce a similar result to the GROUP BY clause
    in ab SQL statement. The next method to apply should be an aggregate method on
    one or multiple columns.
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: pandas 的 `groupby` 方法会产生与 SQL 语句中的 GROUP BY 子句类似的结果。接下来应该应用的方法是对一个或多个列的聚合方法。
- en: For example, the `mean()` pandas aggregate method is the counterpart of the
    `AVG()` SQL function to compute the mean of the values in the group. The pandas
    aggregate method `var()` calculates the variance; `sum()`, the summation; `count()`,
    the number of rows in the group; and so on.
  id: totrans-435
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，`mean()` pandas 聚合方法是对应于 SQL 函数 `AVG()` 的计算组中值平均值的函数。pandas 聚合方法 `var()`
    计算方差；`sum()` 是总和；`count()` 是组中的行数；等等。
- en: Note
  id: totrans-436
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: The result is still a pandas DataFrame; therefore, multiple operations can be
    chained together.
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: 结果仍然是一个 pandas DataFrame；因此，可以链式执行多个操作。
- en: As a next step, we can try a couple of examples of `groupby()` in action. Grouping
    observations by target (that is, label), we can check the difference between the
    average value and the variance of the features for each group (Figures [6-12](#Fig12)
    and [6-13](#Fig13)).
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: 作为下一步，我们可以尝试几个 `groupby()` 的实际例子。通过按目标（即标签）对观测值进行分组，我们可以检查每个组中特征的平均值和方差之间的差异（图
    6-12 和图 6-13）。
- en: '[PRE19]'
  id: totrans-439
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig12_HTML.jpg](Images/484548_1_En_6_Fig12_HTML.jpg)'
  id: totrans-440
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig12_HTML.jpg](Images/484548_1_En_6_Fig12_HTML.jpg)'
- en: Figure 6-12
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-12
- en: The iris groupby mean output
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 番茄花按组平均输出
- en: '[PRE20]'
  id: totrans-443
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig13_HTML.jpg](Images/484548_1_En_6_Fig13_HTML.jpg)'
  id: totrans-444
