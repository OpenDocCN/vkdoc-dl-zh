  type: TYPE_NORMAL
  zh: 平移
- en: We would like our model to recognize the object present in any part of the image.
    Also, the object can be present partially in the corner or edges of the image.
    For this reason, we shift the object to various parts of the image (Figure [6-23](#Fig23)).
  id: totrans-531
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望我们的模型能够识别图像中任何部分存在的物体。此外，物体可以部分存在于图像的角落或边缘。因此，我们将物体移到图像的各个部分（图[6-23](#Fig23)）。
- en: The parameter `translation` is a vector representing `[dx, dy]` or (if image
    has rank 4) a matrix of length `num_images`, with a `[dx, dy]` vector for each
    image in the batch.
  id: totrans-532
  prefs: []
  type: TYPE_NORMAL
  zh: 参数`translation`是一个表示`[dx, dy]`的向量，或者（如果图像的秩为4）一个长度为`num_images`的矩阵，其中每个图像都有一个`[dx,
