- en: Part IIData
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第二部分 数据
- en: 5. Defining Data
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 5. 定义数据
- en: Now that you have a basic introduction to the world of `artificial intelligence,
    machine learning` in general, and the world of `deep learning` in particular,
    you should understand how this field is very important.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经对人工智能、机器学习的一般世界以及深度学习特别的世界有了基本的介绍，你应该明白这个领域非常重要。
- en: After the `Introduction Part`, we must define some concepts that are necessary
    to understand to be a data scientist—or, to be specific, a `deep learning engineer`.
    In `Part II` we take you from data novice to a data analyst or data engineer.
    All the chapters in this part will be about data. For instance, `this chapter`
    defines the data and its basic concepts; `it` will teach you what real data looks
    like and the data shapes and forms it takes, with real-life examples, and so on.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在“引言部分”之后，我们必须定义一些成为数据科学家——或者更具体地说，成为深度学习工程师——所必需的概念。在第二部分，我们将带你从数据新手成长为数据分析师或数据工程师。本部分的所有章节都将关于数据。例如，`本章`定义了数据和它的基本概念；`它`将教你真实数据的样子以及它所采取的数据形状和形式，通过现实生活中的例子，等等。
- en: In this chapter we `define data,` and that is equivalent to answering *what
    is the data?* After that, we make a small comparison among the forms of data such
    as *structured, semistructured*, and *unstructured*, defining them and using small
    examples for elaboration. After that, we talk about the ideal form of the data
    and why you should make your data *tidy data*.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们`定义数据`，这相当于回答*数据是什么？*之后，我们将在数据的形式之间进行小比较，如*结构化、半结构化和非结构化*，定义它们并使用小例子进行阐述。然后，我们讨论数据的理想形式以及为什么你应该使你的数据成为*整洁数据*。
- en: Also, we talk about all types of data that you might face in any real-life project
    such as **tabular data** and its subtypes, which are *qualitative* and *quantitative*,
    and the *levels* of tabular data like *nominal, ordinal, interval,* and *ratio*.
    After that, we look at both **text** and **images** data, using examples to ensure
    that you understand this very well. Now, let’s go to the core of the chapter.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们讨论了你在任何实际项目中可能遇到的所有类型的数据，例如**表格数据**及其子类型，它们是*定性*和*定量*的，以及表格数据的*水平*，如*名义、有序、区间*和*比率*。然后，我们查看**文本**和**图像**数据，使用例子确保你非常理解这一点。现在，让我们进入本章的核心。
- en: Defining Data
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 定义数据
- en: '**Data** is unorganized and unprocessed facts: it might be a raw number, figures,
    images, words, or sounds, derived from observations or measurements. Usually,
    data is static in nature, a set of discrete, objective facts about events, and
    there is no inherent meaning in it.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '**数据**是未组织和未处理的事实：它可能是一个原始数字、图表、图像、文字或声音，来源于观察或测量。通常，数据在本质上来说是静态的，是一组关于事件的事实集合，其中没有固有的意义。'
- en: In the field of `data science` in general, it is important to understand the
    different types of data for several reasons. Not only because the type of data
    will help to dictate the method of cleaning and processing—although choosing the
    best method is important—but also because knowing whether the data is unstructured
    or perhaps quantitative can tell you a lot about the real-world phenomenon being
    measured.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据科学的一般领域，理解不同类型的数据有几个原因很重要。不仅因为数据类型将有助于决定清洗和处理的办法——尽管选择最佳方法很重要——而且知道数据是否是非结构化的或可能是定量的，可以让你对所测量的现实世界现象有更多的了解。
- en: So, what we talk about in this chapter is called the *characteristic* of the
    dataset and not the *entire dataset*. And we will be very clear about which one
    we refer to at any given time.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们在本章中讨论的是数据集的*特征*，而不是*整个数据集*。我们将在任何给定时间非常清楚地说明我们指的是哪一个。
- en: Why Should You Read This Chapter?
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么你应该阅读本章？
- en: It might seem worthless to stop and think about what type of data we have before
    getting into the fun stuff, like model building and maintenance in deep learning,
    but this is arguably one of the most important steps you need to take to perform
    data science.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在深入到有趣的材料，如深度学习中的模型构建和维护之前，停下来思考我们有什么类型的数据可能看似毫无价值，但这是你进行数据科学所需采取的最重要步骤之一。
- en: Consider an example where we are looking at a certain dataset of people with
    a type of disease. In a dataset of people, if we considered the age of every patient
    on the dataset, we can’t say that there’s a patient who is zero years old; the
    age cannot be zero or even a negative number. Another example is a **gender**
    column that is denoted via an identifying number to save space. For example, perhaps
    *male* is denoted by 1, while *female* is 2\. Without understanding that these
    numbers are not actually ordered numbers as we normally think about them (where
    2 is greater than 1 and therefore female is greater than male), we will make terrible
    mistakes in our analysis.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑一个例子，我们正在查看一组患有某种疾病的人的数据集。在人的数据集中，如果我们考虑数据集中每位患者的年龄，我们不能说有一位年龄为零岁的患者；年龄不能为零或负数。另一个例子是表示性别的**性别**列，它通过一个识别号来表示以节省空间。例如，也许*男性*用1表示，而*女性*用2表示。如果我们不理解这些数字实际上并不是我们通常所认为的有序数字（其中2大于1，因此女性大于男性），我们将在分析中犯下可怕的错误。
- en: You should apply the same principles when you use any data field pipelines.
    When given a dataset, it is tempting to jump right into exploring, applying statistical
    models, and researching the applications of deep learning in order to get results
    faster. However, if you don’t understand the type of data that you are working
    with, then you might waste your time applying models that will be ineffective
    with that dataset.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 当你使用任何数据字段管道时，你应该应用相同的原理。当给定一个数据集时，直接跳入探索、应用统计模型和研究深度学习在应用中的研究以快速获得结果是很诱人的。然而，如果你不了解你正在处理的数据类型，那么你可能会浪费时间应用对那个数据集无效的模型。
- en: When given a new dataset, it is always recommended to take about an hour (it
    `might be less`) to make the distinctions mentioned in the following sections.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 当给定一个新的数据集时，始终建议花大约一个小时（可能更少）来区分以下章节中提到的区分。
- en: Structured, Semistructured, and Unstructured Data
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结构化、半结构化和非结构化数据
- en: The first question you might ask about the upcoming dataset is if the data is
    structured or not. Let’s show you the difference between structured, semistructured,
    and unstructured data.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能对即将到来的数据集的第一个问题就是数据是否结构化。让我们向你展示结构化、半结构化和非结构化数据之间的区别。
- en: '*Structured* *data*: is easily organized and generally stored in databases
    or flat files like `CSV` and `EXCEL`. Structured data generally consists of numerical
    information and is objective.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*结构化* *数据*：易于组织，通常存储在数据库或类似`CSV`和`EXCEL`的平面文件中。结构化数据通常由数值信息组成，是客观的。'
- en: 'Some types of structured data can be machine generated, such as data that comes
    from medical devices (heart rate, blood pressure), manufacturing sensors (rotation
    per minute, temperature), or web server logs (number of times a page is visited).
    Structured data can also be human-generated: data such as age, zip code, and gender.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 一些结构化数据可以是机器生成的，例如来自医疗设备（心率、血压）、制造传感器（每分钟的旋转次数、温度）或网络服务器日志（页面访问次数）的数据。结构化数据也可以是人类生成的：如年龄、邮编和性别等数据。
- en: '*Unstructured* *data*: continues to grow in influence in the enterprise as
    organizations try to leverage new and emerging data sources. These new data sources
    are largely made up of streaming data coming from social media platforms, mobile
    applications, location services, and Internet of Things technologies.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*非结构化* *数据*：随着组织试图利用新的和新兴的数据源，在企业中继续增长其影响力。这些新的数据源主要是由来自社交媒体平台、移动应用程序、位置服务和物联网技术的流数据组成。'
- en: Most data that exists in text form, including server logs and Facebook posts
    and its comments, is *unstructured*. Also, a genetic sequence of chemical nucleotides
    (for example, ACGTATTGCA) is *unstructured* even if the order of the nucleotides
    matters, as we cannot form descriptors of the sequence using a row/column format.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数以文本形式存在的数据，包括服务器日志、Facebook帖子及其评论，都是*非结构化*的。此外，即使核苷酸的顺序很重要（例如，ACGTATTGCA），化学核苷酸的序列（例如，ACGTATTGCA）也是*非结构化*的，因为我们无法使用行/列格式来形成序列的描述符。
- en: '*Semistructured* *data*: is a form of structured data that does not conform
    with the formal structure of data models associated with relational databases
    or other forms of data tables, but nonetheless contains tags or other markers
    to separate semantic elements and enforce hierarchies of records and fields within
    the data. Therefore, it is also known as self-describing structure.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*半结构化* 数据：是一种结构化数据，它不符合与关系数据库或其他数据表形式相关的数据模型的形式结构，但仍然包含标签或其他标记来分离语义元素，并在数据内部强制执行记录和字段的层次结构。因此，它也被称为自描述结构。'
- en: Semistructured data might be found in file types of JSON and XML formats.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 半结构化数据可能存在于JSON和XML格式的文件类型中。
- en: As a data engineer or deep learning engineer, you will always prefer to work
    with structured data, although `sometimes semistructured too`. Most of us, as
    data scientist/machine learning engineers, build statistical and machine learning
    models on structured datasets that consist of columns and rows that make the model
    easy to follow its pattern, but they cannot work on unstructured data because
    unstructured data has no specific pattern or interpretation. Hence, we cannot
    expect our model to work with these types of data without a proper cleaning.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 作为数据工程师或深度学习工程师，你将始终倾向于与结构化数据一起工作，尽管`有时也会是半结构化数据`。我们大多数人，作为数据科学家/机器学习工程师，在由列和行组成的数据集上构建统计和机器学习模型，这些列和行使得模型容易跟随其模式，但它们不能处理非结构化数据，因为非结构化数据没有特定的模式或解释。因此，我们无法期望我们的模型在没有适当清理的情况下与这些类型的数据一起工作。
- en: But what makes `unstructured data` so important is that it is so common on the
    Internet; almost 80%-90% of the world’s data is unstructured data, suggesting
    that 80%-90% of the world’s knowledge is hidden in it. This data exists in many
    forms like `tweets`, `e-mails, literature`, and `server logs.` These are generally
    unstructured forms of data.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 但使`非结构化数据`如此重要的原因是它在互联网上非常普遍；几乎80%-90%的世界数据是非结构化数据，这表明80%-90%的世界知识隐藏在其中。这些数据存在于许多形式中，如`推文`、`电子邮件`、`文献`和`服务器日志`。这些通常是未结构化的数据形式。
- en: We will see later how to extract knowledge from unstructured free-form datasets,
    and how to use preanalysis techniques , called *preprocessing,* that turn unstructured
    data into a clean and organized table—in other words, turn it into structured
    data.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在后面看到如何从非结构化的自由形式数据集中提取知识，以及如何使用称为*预处理*的预分析技术，这些技术将非结构化数据转换为干净、有序的表格——换句话说，将其转换为结构化数据。
- en: Tidy Data
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 整洁数据
- en: 'Tidy data is a standard way of mapping the meaning of a dataset to its structure.
    A dataset is messy or tidy, depending on how rows, columns, and tables are matched
    up with observations, variables, and types. In **tidy data**:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 整洁数据是将数据集的意义映射到其结构的标准方式。数据集是混乱的还是整洁的，取决于行、列和表如何与观察、变量和类型匹配。在**整洁数据**中：
- en: Each variable forms a column.
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 每个变量形成一列。
- en: Each observation forms a row.
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 每个观察值形成一行。
- en: Each type of observational unit forms a table.
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 每种观察单位类型形成一张表。
- en: This is Codd’s 3rd normal form, but with the constraints framed in statistical
    language, and the focus put on a single dataset rather than the many connected
    datasets common in relational databases. **Messy data** is any other arrangement
    of the data.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这是Codd的第三范式，但以统计语言的形式提出约束，并将重点放在单一数据集上，而不是关系数据库中常见的许多相关数据集。**混乱数据**是任何其他的数据排列。
- en: 'Tidy data makes it easy for an analyst or a computer to extract needed variables,
    because it provides a standard way of structuring a dataset. Compare, for example,
    the different versions of pregnancy data: in the messy version you need to use
    different strategies to extract different variables. This slows analysis and invites
    errors. If you consider how many data analysis operations involve all of the values
    in a variable (every aggregation function), you can see how important it is to
    extract these values in a simple, standard way. Tidy data is particularly well
    suited for vectorized programming languages like Python, because the layout ensures
    that values of different variables from the same observation are always paired.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 整洁数据使得分析师或计算机能够轻松提取所需变量，因为它提供了一种标准的方式来结构化数据集。例如，比较不同版本的怀孕数据：在混乱版本中，你需要使用不同的策略来提取不同的变量。这会减慢分析速度并引起错误。如果你考虑有多少数据分析操作涉及到变量的所有值（每个聚合函数），你就会看到以简单、标准的方式提取这些值是多么重要。整洁数据特别适合像Python这样的矢量化编程语言，因为布局确保了来自同一观察的不同变量的值始终成对出现。
- en: 'While the order of variables and observations does not affect the analysis,
    a good ordering makes it easier to scan the raw values. One way of organizing
    variables is by their role in the analysis: are values fixed by the design of
    the data collection, or are they measured during the course of the experiment?
    Fixed variables describe the experimental design and are known in advance. Computer
    scientists often call fixed variables *dimensions*, and statisticians usually
    denote them with subscripts on random variables. Measured variables are what we
    actually measure in a study. Fixed variables should come first, followed by measured
    variables, each ordered so that related variables are contiguous. Rows can then
    be ordered by the first variable, breaking ties with the second and subsequent
    (fixed) variables. This is the convention adopted by all tabular displays in this
    book.'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然变量和观察值的顺序不会影响分析，但良好的排序可以使扫描原始值更容易。一种组织变量的方式是按照它们在分析中的作用：值是由数据收集的设计确定的，还是它们在实验过程中测量的？固定变量描述了实验设计，并且事先已知。计算机科学家通常将固定变量称为*维度*，而统计学家通常用随机变量的下标来表示它们。测量变量是我们实际上在研究中测量的变量。固定变量应该排在前面，然后是测量变量，每个变量都按相关变量连续排列。然后可以根据第一个变量对行进行排序，用第二个和随后的（固定）变量来解决冲突。这是本书中所有表格显示采用的惯例。
- en: Divide and Conquer
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 分而治之
- en: 'As we go further in this chapter, we can divide data into three pieces , as
    follows:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们进入本章的深入，我们可以将数据分为三个部分，如下所示：
- en: Tabular data
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 表格数据
- en: Text data
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文本数据
- en: Image data
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 图像数据
- en: You can face each type in a real-problem, so you have to be ready to understand
    and prepare such data types.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会在现实问题中遇到每种类型，所以你必须准备好理解和准备这些数据类型。
- en: Tabular Data
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 表格数据
- en: Quantitative​ vs. ​Qualitative​ Data
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 定量数据与定性数据
- en: We talked earlier about a dataset’s ​specific characteristics​ and defined it,
    and we know that structured data comes in the form of tables or matrices, each
    consisting of rows and columns. Rows represent a real-world observation or case
    study, for example, certain patient biometrics. Columns represent data fields,
    for example, the patient gender field.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 我们之前讨论了数据集的特定特征并对其进行了定义，我们知道结构化数据以表格或矩阵的形式出现，每个都由行和列组成。行代表现实世界的观察或案例研究，例如，某些患者的生物统计学特征。列代表数据字段，例如，患者的性别字段。
- en: Each data column has its own characteristics that define the column, for example,
    patient gender might be either male or female ​if *not missing* values​. So, these
    values of patient gender follow some representation that needs to be defined.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 每个数据列都有其定义列的特性，例如，如果*没有缺失值*，患者性别可能是男性或女性。因此，这些患者性别的值遵循一些需要定义的表示。
- en: Note
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: Columns can be named *features*, *columns*, *characteristics*, or even *variables*.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 列可以命名为*特征*、*列*、*特性*，甚至*变量*。
- en: 'All fields follow one of two data types, which are defined as follows:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 所有字段遵循两种数据类型之一，定义如下：
- en: '*Quantitative data*: This data can be described using numbers, and basic mathematical
    procedures, including addition, are possible on the set.'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*定量数据*：这些数据可以使用数字描述，并且可以在集合上进行基本数学运算，包括加法。'
- en: '*Qualitative data*: This data cannot be described using numbers and basic mathematics
    . This data is generally thought of as being described using “`natural`” categories
    and language.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*定性数据*：这些数据不能使用数字和基本数学来描述。这些数据通常被认为是使用“`自然`”类别和语言来描述的。'
- en: Example—the Titanic
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例——泰坦尼克号
- en: 'The sinking of the RMS Titanic is one of the most infamous shipwrecks in history.
    Let’s say that we are processing observations of what sorts of people were likely
    to survive, using the following descriptors (characteristics). And each of these
    characteristics can be classified as either quantitative or qualitative ; that
    simple distinction can change everything. Let’s take a look at each one:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: RMS泰坦尼克号的沉没是历史上最臭名昭著的船难之一。假设我们正在处理关于哪些人可能幸存的观察，使用以下描述符（特征）。并且每个特征都可以被分类为定量或定性；这种简单的区别可以改变一切。让我们看看每一个：
- en: '**PassengerId** - *quantitative*: Observation ID; usually takes numerical values'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**乘客ID** - *定量*：观察ID；通常取数值'
- en: '**Survived** - *qualitative*: Survival (0 = No; 1 = Yes)'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**是否幸存** - *定性*：生存（0 = 否；1 = 是）'
- en: '**Pclass** - *qualitative*: Passenger class (1 = 1st; 2 = 2nd; 3 = 3rd)'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**舱位等级** - *定性*：乘客舱位等级（1 = 一等；2 = 二等；3 = 三等）'
- en: '**Name** - *qualitative*: Passenger name'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**姓名** - *定性*：乘客姓名'
- en: '**Sex** - *qualitative*: Passenger gender'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**性别** - *定性*：乘客性别'
- en: '**Age** - *quantitative*: Passenger age'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**年龄** - *定量*: 乘客年龄'
- en: '**SibSp** - *quantitative*: Number of siblings/spouses aboard'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**SibSp** - *定量*: 船上兄弟姐妹/配偶的数量'
- en: '**Parch** - *quantitative*: Number of parents/children aboard'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Parch** - *定量*: 船上父母/孩子的数量'
- en: '**Ticket** - *qualitative*: Ticket number'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**票号** - *定性*: 票号'
- en: '**Fare** - *quantitative*: Passenger fare'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**票价** - *定量*: 乘客票价'
- en: '**Cabin** - *qualitative*: Cabin ID'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**船舱** - *定性*: 船舱编号'
- en: '**Embarked** - *qualitative*: Port of embarkation (C = Cherbourg; Q = Queenstown;
    S = Southampton)'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**登船港口** - *定性*: 登船港口（C = Cherbourg; Q = Queenstown; S = Southampton）'
- en: So, after we categorize each column to be either q*uantitative* or *qualitative*,
    you might wonder why these columns are under this category. Let me give another
    quick example for more elaboration.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在我们将每一列分类为定量或定性之后，你可能会想知道为什么这些列属于这个类别。让我再举一个快速例子来进一步说明。
- en: Let us consider the column Name, which represents the passenger name . This
    column is not expressed as a number and we cannot perform math on the name of
    the passenger, so it is *qualitative*. Now consider Age, which represents passenger
    age in numbers. We can do basic operations such as adding up the ages for all
    passengers and dividing it by the total number of passengers to get the passengers’
    **average** age, thus putting the Age column under the *Quantitative* umbrella.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑“Name”这一列，它代表乘客姓名。这一列不是以数字的形式表达的，我们无法对乘客的姓名进行数学运算，因此它是*定性*的。现在考虑“Age”这一列，它以数字形式表示乘客年龄。我们可以进行基本的运算，例如将所有乘客的年龄加起来，然后除以乘客总数，以得到乘客的**平均**年龄，因此将“Age”列归入*定量*类别。
- en: Note
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: Even though a ticket number is being described using numbers, it is not quantitative.
    This is because you can’t talk about the *sum* of all ticket numbers or an average
    ticket number. These are nonsensical descriptions.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管票号是用数字描述的，但它不是定量的。这是因为你不能谈论所有票号的*总和*或平均票号。这些描述是没有意义的。
- en: Pretty much whenever a word is used to describe a characteristic, it is a *qualitative*
    factor.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 几乎每当一个词被用来描述一个特征时，它都是一个*定性*因素。
- en: Divide and Conquer
  id: totrans-68
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 分而治之
- en: 'Quantitative data can be broken down one step further, into *discrete* and
    *continuous* quantities, that can be defined as follows:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 定量数据可以进一步分解为*离散*和*连续*量，定义如下：
- en: '*Discrete variable*: is a variable whose value is obtained by counting—for
    example, the number of students present, because you can count the students in
    a certain class.'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*离散变量*: 是一个通过计数获得值的变量——例如，出勤的学生人数，因为你可以数出某个班级的学生人数。'
- en: '*Continuous variable*: is a variable whose value is obtained by measuring.
    One example is the height of students in a class, because a student’s height might
    be 150 cm or 150.5 cm or even 150.09 cm. The height of a person or building is
    a continuous number because an infinite scale of decimals is possible. Other examples
    of continuous data would be time and temperature.'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*连续变量*: 是一个通过测量获得值的变量。一个例子是班级中学生的身高，因为一个学生的身高可能是150厘米或150.5厘米，甚至是150.09厘米。一个人的身高或建筑的身高是连续的数字，因为可能存在无限的小数位数。其他连续数据的例子包括时间和温度。'
- en: Making a Checkpoint
  id: totrans-72
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 设置检查点
- en: So far, we have looked at the differences between structured, semistructured,
    and unstructured data, as well as between qualitative and quantitative characteristics.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经探讨了结构化、半结构化和非结构化数据之间的差异，以及定性和定量特征之间的差异。
- en: These are simple concepts in the data science field, but these distinctions
    may cause a huge effect on the data scientist’s analysis of a given dataset.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是数据科学领域中的简单概念，但这些区别可能会对数据科学家对给定数据集的分析产生巨大影响。
- en: A small summarization
  id: totrans-75
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 简要总结
- en: To make it simple, data as a whole can either be *structured* or *unstructured*,
    meaning that the data can either take on an organized row/column—*table like view*—
    structure with distinct features that describe each row of the dataset, or exist
    in a free-form state that usually must be preprocessed into a form that is easily
    digestible.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 为了简单起见，数据整体上可以是*结构化*的或*非结构化*的，这意味着数据可以采取有组织的行/列——类似表格的视图——结构，具有描述数据集中每一行的独特特征，或者存在于自由形式的状态，通常必须预处理成易于消化的形式。
- en: If data takes a *structured* format or we can say that the data is *tabled*,
    we can look at each column (*feature*) of the dataset as being either *quantitative*
    or *qualitative*. Basically, can the column be described using mathematics and
    numbers or not? The next part of this chapter breaks down data into four very
    specific and detailed levels. At each order, we will apply more complicated rules
    of mathematics, and in turn, we can gain a more intuitive and quantifiable understanding
    of the data.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 如果数据采用*结构化*格式，或者说数据是*表格化*的，我们可以将数据集的每一列（*特征*）视为是*定量*或*定性*的。基本上，这一列可以用数学和数字来描述吗？本章的下一部分将数据分解为四个非常具体和详细级别。在每个级别上，我们将应用更复杂的数学规则，从而我们可以获得更直观和可量化的数据理解。
- en: The Four Levels of Data
  id: totrans-78
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据的四个级别
- en: 'Looking at structured data , we understand that each column (*feature*) can
    be one of the following four levels:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 观察结构化数据，我们理解每一列（*特征*）可以是以下四个级别之一：
- en: Nominal
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 名称
- en: Ordinal
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 序数
- en: Interval
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 间隔
- en: Ratio
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 比率
- en: 'As we explain each element of this list, you will see the structure of data
    and the variation of columns; each element of this list comes with a practice
    guide of its processing and techniques used for it. But before we start explaining
    these techniques, we shall introduce a small statistical definition: the *measure
    of center*.'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们解释这个列表的每个元素，你会看到数据的结构和列的变化；这个列表的每个元素都附带其处理和使用的技术的实践指南。但在我们开始解释这些技术之前，我们将介绍一个小型的统计定义：*中心度量*。
- en: Measure of Center
  id: totrans-85
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 中心度量
- en: A measure of central tendency (*measure of center*) is a value that attempts
    to describe a set of data by identifying the central position of the data set
    (as representative of a “typical” value in the set). This *one value number* describes
    what the data *tends to*, and for each data level the measure of center technique
    changes. So, let us start explaining these levels.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 中心趋势度量（*中心度量*）是一个值，它试图通过确定数据集的中心位置（作为集合中“典型”值的代表）来描述一组数据。这个*单一数值*描述了数据*倾向于*什么，并且对于每个数据级别，中心度量技术都会变化。因此，让我们开始解释这些级别。
- en: Note
  id: totrans-87
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 备注
- en: Sometimes the *measure of center* of a feature is referred to as the *balance
    point* of this feature.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 有时一个特征的*中心度量*被称为该特征的*平衡点*。
- en: The Nominal Level
  id: totrans-89
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 名称级别
- en: 'Let’s start with the easiest one to understand, the nominal level, which consists
    of data that is described purely by **name** or **category**, **Nominal** scales
    could simply be called “*labels.*” Basic examples include *gender*, *nationality*,
    or *species*. They are not described by numbers and are therefore **qualitative**.
    The following are some examples:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从最容易理解的一个开始，即名称级别，它由纯粹由**名称**或**类别**描述的数据组成。名称尺度可以简单地称为“*标签*”。基本例子包括*性别*、*国籍*或*物种*。它们不是用数字描述的，因此是**定性**的。以下是一些例子：
- en: Your gender is at the nominal level of data. You are either a *male* or a *female*.
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的性别处于数据的名称级别。你是*男性*或*女性*。
- en: The answer to “*What is your hair color?*” is also nominal, where the answer
    might be “*brown, black, blond, gray*, or *other.”*
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “*你的头发颜色是什么？*”的答案也是名称类别，可能的答案包括“*棕色、黑色、金色、灰色*或*其他。”*
- en: Mathematical Operations Allowed for Nominal
  id: totrans-93
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 允许的名称数学运算
- en: 'We cannot perform mathematics at the nominal level of data except the basic
    *equality* and *set membership* functions, as shown in the following two examples:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不能在数据的名称级别执行数学运算，除了以下两个例子所示的基本*等式*和*集合成员*函数：
- en: Being a *data scientist* is the same as being in the *tech industry*, but not
    vice versa.
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 成为*数据科学家*等同于身处*科技行业*，但反之则不然。
- en: A figure described as a *square* falls under the description of being a *rectangle*,
    but not vice versa.
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 被描述为*正方形*的图形属于*矩形*的描述，但反之则不然。
- en: Note
  id: totrans-97
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 备注
- en: A subtype of nominal scale with only two categories (e.g., male/female) is called
    *dichotomous.*
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 只有两种类别（例如，男/女）的名称尺度子类型被称为*二分法*。
- en: Measures of Center for Nominal
  id: totrans-99
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 名称的中心度量
- en: In order to find the *balance point* of nominal data, we generally turn to the
    *mode*.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 为了找到名称数据的*平衡点*，我们通常转向*众数*。
- en: The **mode** is defined as the most frequently occurring number in a data set.
    The mode is most useful in situations that involve categorical (qualitative) data
    that are measured at the nominal level.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: '**众数**定义为数据集中出现频率最高的数字。众数在涉及按名称级别测量的分类（定性）数据的情况下最有用。'
- en: 'As an example of this, consider that we collected all students in a certain
    school and listed their gender whether *male* or *female* as follows:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 作为这个例子，考虑我们收集了某所学校所有学生的信息，并列出了他们的性别，是**男**还是**女**，如下所示：
- en: Male, female, male, male, female, male, female, female, male, female, male
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 男，女，男，男，女，男，女，女，男，女，男
- en: The *mode* here is male, where if you count the values you will find that there
    are six males and five females.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的**众数**是男，如果你数一下值，你会发现有六个男性和五个女性。
- en: Note
  id: totrans-105
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: Measures of center such as the *mean* and *median* do not make sense at this
    level, as we cannot order the observations or even add them together.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 如**均值**和**中位数**这样的中心度量在这个水平上没有意义，因为我们无法对观察值进行排序或甚至将它们相加。
- en: What Does It Mean to be a Nominal Level Type?
  id: totrans-107
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 什么是名义水平类型？
- en: Data at the nominal level is mostly categorical in nature, like we saw in the
    last example male/female, because we generally can only use words to describe
    the data.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 名义水平的数据大多是分类性质的，就像我们在上一个例子中看到的男/女一样，因为我们通常只能用文字来描述数据。
- en: While data at the **nominal** level can certainly be useful, we must be careful
    about what insights we may draw from them. With only the **mode** as a basic *measure
    of center*, we are unable to draw conclusions about an average observation. This
    concept does not exist at this level. It is only at the next level that we may
    begin to perform true mathematics on our observations.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然名义水平的数据确实可能很有用，但我们必须小心我们可能从中得出的见解。由于只有**众数**作为基本**中心**度量，我们无法得出关于平均观察值的结论。这个概念在这个水平上不存在。只有在下一个水平上，我们才可能开始对我们的观察进行真正的数学运算。
- en: The Ordinal Level
  id: totrans-110
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 有序水平
- en: The nominal level is not that flexible—we cannot use most mathematical operations
    on its observations—due to the fact that we cannot order its observations in any
    natural way.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 名义水平并不那么灵活——由于我们无法以任何自然方式对其观察值进行排序，因此我们无法在其观察值上使用大多数数学运算。
- en: So, we can say that the data that can be ordered or have a rank are in the **ordinal
    level** category; however, although the ordinal level provides us with a rank
    order, or the ability to place one observation before the other, it does not provide
    us with relative differences between observations. This means that while we can
    order the observations from first to last, we cannot execute a mathematical operation
    such as adding or subtracting the observations to get any real meaning.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们可以说，可以排序或具有等级的数据属于**有序水平**类别；然而，尽管有序水平为我们提供了等级顺序，或放置一个观察值在另一个观察值之前的能力，但它并不提供观察值之间的相对差异。这意味着虽然我们可以按顺序从第一到最后排列观察值，但我们无法执行如加法或减法等数学运算来获得任何实际意义。
- en: Examples of Being Ordinal
  id: totrans-113
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 有序水平的例子
- en: Each scale is an incremental level of measurement, meaning each scale fulfills
    the function of the previous scale and all survey question scales such as **Likert,
    semantic differential, dichotomous**, etc.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 每个量表都是测量级别的增量，这意味着每个量表都履行了前一个量表的功能，以及所有调查问题量表，如**李克特量表、语义差异量表、二分量表**等。
- en: 'For example, a semantic differential scale question might be “How satisfied
    are you with our services?” and the answer is one of the following:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，一个语义差异量表问题可能是“你对我们的服务满意吗？”答案可能是以下之一：
- en: Very unsatisfied – 1
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 非常不满意 – 1
- en: Unsatisfied – 2
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不满意 – 2
- en: Neutral – 3
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 中立 – 3
- en: Satisfied – 4
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 满意 – 4
- en: Very satisfied – 5
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 非常满意 – 5
- en: As you can see, the order of variables is important and so is the labeling.
    Very unsatisfied will always be worse than unsatisfied, and satisfied will be
    worse than very satisfied.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，变量的顺序很重要，标签也很重要。非常不满意总是比不满意更差，满意总是比非常满意更差。
- en: Note
  id: totrans-122
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: At the ordinal level, the distance between variables can’t be calculated. Description
    qualities indicate tagging properties similar to the nominal scale, in addition
    to which, the ordinal scale also has a relative position of variables. Origin
    of this scale is absent; therefore, there is no fixed start or “true zero.”
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 在有序水平上，变量之间的距离无法计算。描述质量表明与名义量表类似的标记属性，此外，有序量表还具有变量的相对位置。这个量表的起源不存在；因此，没有固定的起点或“真实零点”。
- en: What Data Is Like at the Ordinal Level
  id: totrans-124
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 有序水平上的数据是什么样的
- en: As we said about nominal level data, we can see the same here. The ordinal level
    is mostly categorical in nature, like we saw in the last example *satisfied*/*natural*/*unsatisfied*,
    because we generally can use words to describe the data order in the process.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们关于名义级别数据的讨论，这里也是一样。序数级别主要是分类性质的，就像我们在上一个例子中看到的 *满意*/*自然*/*不满意*，因为我们通常可以用文字来描述数据在过程中的顺序。
- en: While data at the `ordinal` level can certainly be useful, we must be careful
    about what insights we may draw from them, as you know now that the order matters.
    So, selecting the wrong measure of center technique may influence your results
    and make things go wrong. This concept does not exist at this level. It is only
    at the next level that we may begin to perform true mathematics on our observations.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然序数级别的数据当然可能很有用，但我们必须小心从它们中得出的见解，正如你所知，顺序很重要。因此，选择错误的中心度量技术可能会影响你的结果，导致事情出错。这个概念在这个级别上不存在。只有在下一个级别，我们才可能开始对我们的观察进行真正的数学运算。
- en: Mathematical Operations Allowed for Ordinal
  id: totrans-127
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 序数允许的数学运算
- en: 'At the ordinal level, we can do more mathematical operations on data that we
    could not do at the nominal level data. We inherit all mathematics from the nominal
    level (equality and set membership) and we can also add the following to the list
    of operations that are allowed at the ordinal level:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 在序数级别，我们可以对数据执行更多的数学运算，这些运算在名义级别数据中是无法执行的。我们从名义级别继承了所有数学（相等性和集合成员），我们还可以将以下内容添加到允许在序数级别执行的运算列表中：
- en: Ordering
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 排序
- en: Comparison
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 比较
- en: '*Ordering* refers to the natural order provided to us by the data; however,
    this can be tricky to figure out sometimes. For example, if you are building a
    recommendation engine, you can consider ordering items using each item rank to
    make a higher rank come first to the user, or you might think to sort these items
    per cost or materials and so on. This could change the order of the data, but
    as long as we are consistent in what defines the order, it does not matter what
    defines it.'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: '*排序* 指的是数据为我们提供的天生顺序；然而，有时这可能很难确定。例如，如果你正在构建一个推荐引擎，你可以考虑使用每个项目的排名来排序项目，让排名更高的项目首先出现在用户面前，或者你可能认为按成本或材料等对这些项目进行排序。这可能会改变数据的顺序，但只要我们在定义顺序方面保持一致，那么它是什么并不重要。'
- en: '*Comparisons* are another new operation allowed at the ordinal level. At the
    ordinal level, it would not make sense to say that *male* is better than *female*
    or vice versa. But at the ordinal level, we can make certain comparisons. For
    example, going back to the earlier example of a semantic differential scale, we
    can say that putting an “unsatisfied” on a survey is worse than putting a “neutral.”'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: '*比较* 是在序数级别允许的另一种新操作。在序数级别，说 *男性* 比女性好或反之亦然是没有意义的。但在序数级别，我们可以进行某些比较。例如，回到之前提到的语义差异量表示例，我们可以说在调查中放置“不满意”比放置“中立”更糟糕。'
- en: Measures of Center for Ordinal
  id: totrans-133
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 序数数据的中心度量
- en: At this level, the **median** is an appropriate way of defining the center of
    the data. The **mean**, however, would be impossible because division and addition
    are not allowed at this level. But we can use the **mode** like we did at the
    nominal level.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个级别上，**中位数**是定义数据中心的一种适当方式。然而，**平均数**在这个级别上是不可能的，因为在这个级别上不允许除法和加法。但我们可以使用**众数**，就像在名义级别上做的那样。
- en: 'Here’s a small example to elaborate the use of median. Imagine that we have
    conducted a survey using the satisfaction question in the earlier example; you
    will see results as follows:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个小例子来阐述中位数的使用。想象一下，我们使用之前示例中的满意度问题进行了一次调查；你将看到以下结果：
- en: '[PRE0]'
  id: totrans-136
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Most people may argue that the mean of these scores would work just fine. But
    the mean would not be as mathematically viable, because if we added two scores,
    say a score of four plus a score of one, the sum of two does not really mean anything,
    and if you divided by their count, say two, the result will be out of these scale
    representations. If addition/subtraction among the scores doesn’t make sense,
    the mean won’t make sense either.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人可能会争论说这些分数的平均数会很好。但平均数在数学上并不可行，因为如果我们把两个分数相加，比如说四分加一分，两个分数的总和实际上并没有什么意义，如果你把它们除以它们的数量，比如说两个，结果将超出这些量表表示的范围。如果分数之间的加法/减法没有意义，平均数也没有意义。
- en: So, let us use *Python* to calculate both mean and median to see the effect
    of the observation on both of these functions (Figure [5-1](#Fig1)). We also recommend
    using the **NumPy** package.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，让我们使用*Python*来计算平均值和中位数，以查看观察对这两个函数的影响（图[5-1](#Fig1)）。我们还建议使用**NumPy**包。
- en: '![../images/484548_1_En_5_Chapter/484548_1_En_5_Fig1_HTML.jpg](Images/484548_1_En_5_Fig1_HTML.jpg)'
  id: totrans-139
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_5_Chapter/484548_1_En_5_Fig1_HTML.jpg](Images/484548_1_En_5_Fig1_HTML.jpg)'
- en: Figure 5-1
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-1
- en: A code example of how to calculate mean and median
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 计算平均值和中位数的代码示例
- en: As you can see in the example in figure, using median will produces the output
    of 4 and this exists in the observation, so we can use it as a center of these
    observations. However, the mean outputs 3.33 and that’s out of the data observation
    scale—it does not exist in the observations—and that’s why we cannot use mean
    on ordinal level data.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 如您在图例中看到的示例，使用中位数会产生4这个输出，这在观察中是存在的，因此我们可以将其作为这些观察的中心。然而，平均值输出为3.33，这超出了数据观察范围——它不存在于观察中——这就是为什么我们不能在有序数据上使用平均值。
- en: Quick Recap and Check
  id: totrans-143
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 快速回顾和检查
- en: 'So far, we have introduced to you two levels of data out of four:'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经向您介绍了四个水平中的两个：
- en: The nominal level
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 名义水平
- en: The ordinal level
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有序水平
- en: At the nominal level, we deal with data usually described using vocabulary,
    or you can say it’s just named (although sometimes with numbers), with no order,
    and little use of mathematics (equality and set membership). At the ordinal level,
    we have data that can be described with numbers and also have a “`natural`” order,
    allowing us to put one in front of the other, and you can use comparisons and
    sorting on them.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 在名义水平上，我们处理的数据通常使用词汇描述，或者可以说它只是命名（尽管有时带有数字），没有顺序，并且很少使用数学（相等性和集合成员）。在有序水平上，我们有可以用数字描述的数据，并且具有“`自然`”的顺序，允许我们将一个放在另一个前面，并且可以对它们进行比较和排序。
- en: The Interval Level
  id: totrans-148
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 间隔水平
- en: '`The` **interval Level** is defined as a numerical scale where the order of
    the variables is known, as well as the difference between these variables. Variables
    that have familiar, constant, and computable differences are classified using
    the interval scale. It is easy to remember the primary role of this scale too.
    “*Interval”* indicates distance between two entities, which is what the interval
    scale helps in achieving.'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: '**间隔水平**被定义为一种数值尺度，其中变量的顺序是已知的，以及这些变量之间的差异。具有熟悉、恒定和可计算差异的变量使用间隔尺度进行分类。也容易记住这个尺度的基本作用。“*间隔*”表示两个实体之间的距离，这正是间隔尺度帮助实现的。'
- en: The interval scale contains all the properties of the ordinal scale, in addition
    to which, it offers a calculation of the difference between variables. The main
    characteristic of this scale is the equidistant difference between objects.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 间隔尺度包含有序尺度的所有属性，除此之外，它还提供了变量之间差异的计算。这个尺度的主要特征是对象之间的等距差异。
- en: Examples of Interval Level Data
  id: totrans-151
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 间隔水平数据的例子
- en: Temperature is a great example of data at the interval level. If it is 100 degrees
    Fahrenheit in one country and 80 degrees Fahrenheit in another one, then the first
    country is 20 degrees warmer than the second . This simple example allows for
    so much more manipulation at this level than previous examples.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 温度是间隔水平数据的绝佳例子。如果一个国家的温度是华氏100度，另一个国家的温度是华氏80度，那么第一个国家比第二个国家高出20度。这个简单的例子在这个水平上比之前的例子提供了更多的操作空间。
- en: 80 degrees is always higher than 50 degrees, and the difference between these
    two temperatures is the same as the difference between 70 degrees and 40 degrees.
  id: totrans-153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 80度总是高于50度，这两个温度之间的差值与70度和40度之间的差值相同。
- en: Also, the value of 0 is arbitrary, because negative values of temperature do
    exist, which makes the Celsius/Fahrenheit temperature scale a classic example
    of interval scale.
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 此外，0的值是任意的，因为温度的负值确实存在，这使得摄氏度/华氏度温度尺度成为间隔尺度的经典例子。
- en: What Data Is Like at the Interval Level
  id: totrans-155
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 间隔水平数据的特征
- en: As you can see, this data level is represented by numbers, and that seems a
    bit easier for the sake of analysis, but in fact you have to pay some attention
    to your variables. That is because in selecting the measure of center technique
    such as **mean,** you have a lot of outliers that may influence the conclusions
    you get from it.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，这个数据水平由数字表示，这看起来分析起来容易一些，但实际上您必须注意您的变量。这是因为在选择中心趋势测量技术，如**平均值**时，您有很多异常值可能会影响您从其中得出的结论。
- en: Mathematical Operations Allowed for Interval
  id: totrans-157
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 区间允许的数学运算
- en: 'We can use all the operations allowed at the lower levels (equality, ordering,
    comparisons, and so on), along with two other notable operations:'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用在较低级别允许的所有运算（相等性、排序、比较等），以及另外两个显著的运算：
- en: Addition
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 加法
- en: Subtraction
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 减法
- en: These two new operations allow us to express the observation in a useful way.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个新运算允许我们以有用的方式表达观察结果。
- en: Measures of Center for Interval
  id: totrans-162
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 区间中心的度量
- en: At this level, we can use the *median* and *mode* to describe this data; however,
    usually the most accurate description of the center of data would be the **arithmetic
    mean**, more commonly referred to as, simply, “the mean.” Recall that the definition
    of the mean requires us to add together all the measurements. At the previous
    levels, addition was meaningless; therefore, the mean would have lost useful value.
    It is only at the interval level and above that the arithmetic mean makes sense.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个级别，我们可以使用**中位数**和**众数**来描述这些数据；然而，通常对数据中心的准确描述会是**算术均值**，更常见地被称为，“均值”。回想一下，均值的定义要求我们将所有测量值相加。在前一个级别，加法是没有意义的；因此，均值会失去其有用的价值。只有在区间级别及以上，算术均值才有意义。
- en: Suppose we look at the temperature of a fridge containing a pharmaceutical company’s
    new vaccine. We measure the temperature every hour with the following data points
    (in Fahrenheit; Figure [5-2](#Fig2)).
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们观察一家制药公司新疫苗的冰箱温度。我们每小时测量一次温度，以下数据点（华氏度；图 [5-2](#Fig2)）：
- en: '![../images/484548_1_En_5_Chapter/484548_1_En_5_Fig2_HTML.jpg](Images/484548_1_En_5_Fig2_HTML.jpg)'
  id: totrans-165
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_5_Chapter/484548_1_En_5_Fig2_HTML.jpg](Images/484548_1_En_5_Fig2_HTML.jpg)'
- en: Figure 5-2
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-2
- en: A comparison of mean and median on other data
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 在其他数据上的均值和中位数比较
- en: Note how the *mean* and *median* are quite close to each other and both are
    around 31 degrees. The question is, *on average, how cold is the fridge?* It’s
    about 31; however, the temperature dropped below 29 degrees but you ended up assuming
    that it isn’t enough for it to be detrimental. This is where the measure of variation
    can help us understand how bad the fridge situation can be, also how it is good
    to choose mean or median as a representation of the center of our data.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 注意看**均值**和**中位数**非常接近，两者都大约在 31 度。问题是，**平均来说，冰箱有多冷？**大约是 31 度；然而，温度下降到了 29 度以下，但你最终认为这不足以造成损害。这就是变异度量可以帮助我们理解冰箱状况可能有多糟糕的地方，也是选择均值或中位数作为我们数据中心的表示方式的好处。
- en: Measures of Variation for Interval
  id: totrans-169
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 区间变化的度量
- en: This is a new measurement that we have not yet discussed. In data science in
    general, you should take into consideration not only the center of your data,
    but also it’s variation; it is very important to mention how “spread out’ the
    data is. The measures that describe this phenomenon are called measures of variation,
    or the variance.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个我们尚未讨论的新度量。在数据科学中，你应该不仅考虑你数据的中心，还要考虑它的变异；提到数据的“分散程度”非常重要。描述这种现象的度量被称为变异度量，或方差。
- en: You have likely heard of **standard deviation** before. This idea is extremely
    important and we should address it briefly. A measure of variation—like the standard
    deviation—is a number that attempts to describe how spread out the data is. Along
    with a measure of center, a measure of variation can almost entirely describe
    a dataset with only two numbers.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能之前听说过**标准差**。这个概念非常重要，我们应该简要地讨论一下。变异度量——就像标准差——是一个试图描述数据分布程度的数字。与中心度量一起，变异度量几乎可以用两个数字完全描述一个数据集。
- en: Standard Deviation
  id: totrans-172
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 标准差
- en: 'Standard deviation is the most common measure of variation of data at the interval
    level and beyond. The standard deviation can be thought of as the *average distance
    a data point is at from the mean*. While this description is technically and mathematically
    incorrect, it is a good way to think about it. The formula for standard deviation
    can be broken down into the following steps:'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 标准差是区间级别及以上的数据最常用的变异度量。可以将标准差视为**数据点到均值的平均距离**。虽然这个描述在技术和数学上是错误的，但它是一个很好的思考方式。标准差的公式可以分解为以下步骤：
- en: Find the mean of the data.
  id: totrans-174
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 计算数据的均值。
- en: For each number in the dataset, subtract it from the mean and then square it.
  id: totrans-175
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于数据集中的每个数字，从均值中减去它，然后平方它。
- en: Find the average of each square difference (variance).
  id: totrans-176
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 计算每个平方差的平均值（方差）。
- en: Take the square root of the number obtained in step three. This is the standard
    deviation.
  id: totrans-177
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 取第三步得到数值的平方根。这就是标准差。
- en: Note
  id: totrans-178
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: The reason we want the “square difference” between each point and the mean and
    not the “actual difference” is because squaring the value actually puts emphasis
    on outliers—data points that are abnormally far away.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 我们想要每个点与平均值之间的“平方差”而不是“实际差”，是因为平方值实际上强调了异常值——那些异常远离的数据点。
- en: For example, look back at the temperature dataset. Let’s find the standard deviation
    of the dataset (Figure [5-3](#Fig3)).
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，回顾一下温度数据集。让我们找到数据集的标准差（图 [5-3](#Fig3)）。
- en: '![../images/484548_1_En_5_Chapter/484548_1_En_5_Fig3_HTML.jpg](Images/484548_1_En_5_Fig3_HTML.jpg)'
  id: totrans-181
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_5_Chapter/484548_1_En_5_Fig3_HTML.jpg](Images/484548_1_En_5_Fig3_HTML.jpg)'
- en: Figure 5-3
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-3
- en: Calculating standard deviation
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 计算标准差
- en: All of this code led to us finding out that the standard deviation of the dataset
    is closer to 2.6, meaning that, on average, a data point is 2.5 degrees off from
    the average temperature of around 31 degrees. So, the temperature could likely
    dip below 29 degrees again in the near future.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些代码都导致我们发现数据集的标准差接近 2.6，这意味着平均而言，一个数据点与大约 31 度的平均温度相差 2.5 度。因此，温度可能很快会再次降至
    29 度以下。
- en: Measures of variation give us a very clear picture of how spread out or dispersed
    our data is. This is especially important when we are concerned with ranges of
    data and how data can fluctuate (think of percent return on stocks). The big difference
    between data at this level and at the next level lies in something that is not
    obvious. Data at the interval level does not have a natural starting point or
    a natural zero. However, being at zero degrees Celsius does not mean that you
    have no temperature.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 变化度量给我们提供了一个非常清晰的关于我们的数据如何分散或分散的图景。当我们关注数据的范围以及数据如何波动时（想想股票的百分比回报），这一点尤为重要。这个水平的数据与下一个水平的数据之间的主要区别在于一个不明显的东西。区间水平的数据没有自然起点或自然零点。然而，在零摄氏度并不意味着你没有温度。
- en: The Ratio Level
  id: totrans-186
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 比率水平
- en: Finally, we will take a look at the ratio level. After moving through three
    different levels with differing levels of allowed mathematical operations, the
    ratio level proves to be the strongest of the four.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们将探讨比率水平。在经历了三个不同水平、允许的数学运算级别不同的过程之后，比率水平证明是四个水平中最强的。
- en: Not only can we define order and difference, the ratio level allows us to multiply
    and divide as well. This might not seem like much to make a fuss over but it changes
    almost everything about the way we view data at this level.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不仅能够定义顺序和差异，比率水平还允许我们进行乘法和除法。这看起来可能并不值得大惊小怪，但它几乎改变了我们在这个水平上看待数据的方式。
- en: Examples
  id: totrans-189
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 例子
- en: While Fahrenheit and Celsius are stuck in the interval level, the Kelvin scale
    of temperature boasts a natural zero. A measurement of zero Kelvin literally means
    the absence of heat. It is a nonarbitrary starting zero. We can actually scientifically
    say that 200 Kelvin is twice as much heat as 100 Kelvin. Money in the bank is
    at the ratio level. You can have “no money in the bank”; and it makes sense that
    $200,000 is twice as much as $100,000.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然华氏度和摄氏度都停留在区间水平，但温度的绝对温标（开尔文）有一个自然的零点。零开尔文的测量实际上意味着没有热量。这是一个非任意的起始零点。我们实际上可以科学地说，200
    开尔文的热量是 100 开尔文的两倍。银行里的钱处于比率水平。你可以有“银行里没有钱”；并且 $200,000 是 $100,000 的两倍是有意义的。
- en: Measures of Center for Ratio
  id: totrans-191
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 比率水平的中心度量
- en: The arithmetic mean still holds meaning at this level, as does a new type of
    mean called the geometric mean. This measure is generally not used as much, even
    at the ratio level, but it’s worth mentioning. It is the square root of the product
    of all the values.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个水平上，算术平均数仍然有意义，还有一种新的平均数类型，称为几何平均数。这种度量在比率水平上通常使用得不多，但值得一提。它是所有值的乘积的平方根。
- en: For example, in our fridge temperature data, we can calculate the geometric
    mean as shown in Figure [5-4](#Fig4).
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在我们的冰箱温度数据中，我们可以像图 [5-4](#Fig4) 所示那样计算几何平均数。
- en: '![../images/484548_1_En_5_Chapter/484548_1_En_5_Fig4_HTML.jpg](Images/484548_1_En_5_Fig4_HTML.jpg)'
  id: totrans-194
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_5_Chapter/484548_1_En_5_Fig4_HTML.jpg](Images/484548_1_En_5_Fig4_HTML.jpg)'
- en: Figure 5-4
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-4
- en: The geometric mean
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 几何平均数
- en: Note again how it is close to the arithmetic mean and median as calculated before.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 再次注意它如何接近之前计算出的算术平均数和中位数。
- en: Problems with the Ratio Level
  id: totrans-198
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 比率水平的局限性
- en: Even with all of this added functionality at this level, we must also generally
    make a very large assumption that actually makes the ratio level a bit restrictive.
    Data at the ratio level is usually nonnegative. For this reason alone, many data
    scientists prefer the interval level to the ratio level. The reason for this restrictive
    property is because if we allowed negative values, the ratio might not always
    make sense.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 即使在这个级别添加了所有这些功能，我们仍然必须做出一个非常大的假设，这实际上使得比率级别有些限制。比率级别的数据通常是非负的。仅就这一点而言，许多数据科学家更喜欢间隔级别而不是比率级别。这种限制性属性的原因是，如果我们允许负值，比率可能并不总是有意义的。
- en: Summarizing All Levels Table [5-1](#Tab1)
  id: totrans-200
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 总结所有级别表格 [5-1](#Tab1)
- en: Table 5-1
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 表 5-1
- en: Summarizing All the Tabular Data Levels
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 总结所有表格数据级别
- en: '| Support: | Nominal | Ordinal | Interval | Ratio |'
  id: totrans-203
  prefs: []
  type: TYPE_TB
  zh: '| 支持度： | 名义 | 序数 | 间隔 | 比率 |'
- en: '| --- | --- | --- | --- | --- |'
  id: totrans-204
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- | --- |'
- en: '| The sequence of variables is established | - | Yes | Yes | Yes |'
  id: totrans-205
  prefs: []
  type: TYPE_TB
  zh: '| 变量的序列被建立 | - | 是 | 是 | 是 |'
- en: '| Mode | Yes | Yes | Yes | Yes |'
  id: totrans-206
  prefs: []
  type: TYPE_TB
  zh: '| 众数 | 是 | 是 | 是 | 是 |'
- en: '| Median | - | Yes | Yes | Yes |'
  id: totrans-207
  prefs: []
  type: TYPE_TB
  zh: '| 中位数 | - | 是 | 是 | 是 |'
- en: '| Mean | - | - | Yes | Yes |'
  id: totrans-208
  prefs: []
  type: TYPE_TB
  zh: '| 平均值 | - | - | 是 | 是 |'
- en: '| Difference between variables can be evaluated | - | - | Yes | Yes |'
  id: totrans-209
  prefs: []
  type: TYPE_TB
  zh: '| 变量之间的差异可以评估 | - | - | 是 | 是 |'
- en: '| Addition and subtraction of variables | - | - | Yes | Yes |'
  id: totrans-210
  prefs: []
  type: TYPE_TB
  zh: '| 变量的加法和减法 | - | - | 是 | 是 |'
- en: '| Multiplication and division of variables | - | - | - | Yes |'
  id: totrans-211
  prefs: []
  type: TYPE_TB
  zh: '| 变量的乘法和除法 | - | - | - | 是 |'
- en: '| Absolute zero | - | - | - | Yes |'
  id: totrans-212
  prefs: []
  type: TYPE_TB
  zh: '| 绝对零度 | - | - | - | 是 |'
- en: The diagram in Figure [5-5](#Fig5) may make it easy for you to understand each
    level’s properties and how each level inherits properties from the level under
    it.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [5-5](#Fig5) 中的图表可能有助于您理解每个级别的属性以及每个级别如何从其下级别继承属性。
- en: '![../images/484548_1_En_5_Chapter/484548_1_En_5_Fig5_HTML.jpg](Images/484548_1_En_5_Fig5_HTML.jpg)'
  id: totrans-214
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_5_Chapter/484548_1_En_5_Fig5_HTML.jpg](Images/484548_1_En_5_Fig5_HTML.jpg)'
- en: Figure 5-5
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-5
- en: Summary of all data levels
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 所有数据级别的总结
- en: Text Data
  id: totrans-217
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 文本数据
- en: Text is a form of data that has existed for millenniums throughout human history.
    Including all the sacred texts influencing all the religions, all the compositions
    of poets and authors, all the scientific explanations by the brightest minds of
    their times, all the political documents that define our history and our future,
    and all kinds of explicit human communication, these “all” define the importance
    of data available in the form of what we call text.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 文本是人类历史上存在了数千年的数据形式。包括影响所有宗教的所有神圣文本，诗人和作家的所有作品，他们时代最聪明的人的科学解释，定义我们历史和未来的所有政治文件，以及所有各种明确的人类交流，这些“所有”定义了我们称为文本形式的数据的重要性。
- en: What Is Text Processing and What Is the Level of Importance of Text Processing?
  id: totrans-219
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 文本处理是什么？文本处理的重要性级别如何？
- en: 'Text processing is one of the most common tasks in many ML applications. As
    proof, we will see some examples of text processing tasks:'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 文本处理是许多机器学习应用中最常见的任务之一。为了证明这一点，我们将看到一些文本处理任务的例子：
- en: '*Language translation*: Translation of a sentence from one language to another'
  id: totrans-221
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*语言翻译*：将一句话从一种语言翻译成另一种语言'
- en: '*Sentiment* *analysis*: To determine, from a text corpus, whether the sentiment
    toward any topic or product, etc. is positive, negative, or neutral'
  id: totrans-222
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*情感分析*：从文本语料库中确定对任何主题或产品等的情感是积极、消极还是中性'
- en: '*Spam filtering*: Detects unsolicited and unwanted email/messages'
  id: totrans-223
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*垃圾邮件过滤*：检测未请求和不受欢迎的电子邮件/消息'
- en: 'As we see, text has many tasks that are very important to ML applications besides
    speech recognition and generation. For now, we can say that we answered this question,
    but we should say something about text data: it has a name in machine learning,
    called NLP (natural language processing). But we are here to talk about text,
    so let’s complete our scope about text types. We’ll discuss structured and unstructured
    data, how to use this data in example by processing it and cleaning it, and see
    the most common techniques that used to process data. So let’s continue our journey
    into data.'
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所见，除了语音识别和生成之外，文本还有许多对机器学习应用非常重要的任务。到目前为止，我们可以说我们已经回答了这个问题，但我们应该对文本数据说些什么：它在机器学习中有一个名字，称为
    NLP（自然语言处理）。但我们是来讨论文本的，所以让我们完成我们对文本类型的范围。我们将讨论结构化和非结构化数据，如何通过处理和清理这些数据来使用这些数据，并查看用于处理数据的最常见技术。所以让我们继续我们的数据之旅。
- en: First, to simplify text data, we can modify it. Text data is basically just
    words. A lot of the time the first thing that you do with text is to turn it into
    numbers using some interesting functions like the bag-of-words formulation.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，为了简化文本数据，我们可以对其进行修改。文本数据基本上只是单词。很多时候，你对文本做的第一件事就是使用一些有趣的函数，如词袋模型，将其转换为数字。
- en: Second, *what are the tools used in text processing*? NLP is the main tool that
    machine learning engineers use to handle text data. So let’s provide a good definition
    of NLP .
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 第二，*文本处理中使用的工具有哪些*？自然语言处理（NLP）是机器学习工程师处理文本数据的主要工具。因此，让我们给出一个关于NLP的良好定义。
- en: '`Natural language processing` is a field in machine learning concerning the
    ability of a computer to understand, analyze, manipulate, and potentially generate
    human language.'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: '`自然语言处理`是机器学习中的一个领域，涉及计算机理解、分析、操纵和可能生成人类语言的能力。'
- en: We have many tools that are used in NLP, like NLTK (Natural Language Toolkit),
    which we talked about in Part I. We will get into more detail about text data
    in Part III when we talk about the recurrent neural network (RNN), but let’s take
    a simple overview about text.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有许多在NLP中使用的工具，如NLTK（自然语言工具包），我们在第一部分中讨论过。当我们在第三部分讨论循环神经网络（RNN）时，我们将更详细地讨论文本数据，但让我们先对文本进行简单的概述。
- en: IMDB—Example
  id: totrans-229
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: IMDB—示例
- en: In this example, we work with the most common dataset in text, which is benchmarked
    in many kinds of research. It is The Large Movie Review Dataset (often referred
    to as the IMDB dataset) containing 25,000 highly polar movie reviews (good or
    bad), used for training and again for testing. The problem is to determine whether
    a given movie review has a positive or negative sentiment (Figure [5-6](#Fig6)).
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们处理文本中最常见的数据集，它在许多研究中被基准测试。它是大型电影评论数据集（通常称为IMDB数据集），包含25,000个高度两极化的电影评论（好或坏），用于训练和测试。问题是确定给定的电影评论是正面还是负面情感（图[5-6](#Fig6)）。
- en: '![../images/484548_1_En_5_Chapter/484548_1_En_5_Fig6_HTML.jpg](Images/484548_1_En_5_Fig6_HTML.jpg)'
  id: totrans-231
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_5_Chapter/484548_1_En_5_Fig6_HTML.jpg](Images/484548_1_En_5_Fig6_HTML.jpg)'
- en: Figure 5-6
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-6
- en: The movie data
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 电影数据
- en: As we see in Figure [5-6](#Fig6), this data of the IMDB is just a data feature
    of the reviews by users about the film, with a sentiment feature or labeled feature
    that allow us to know if the review is a positive or negative one. That allows
    the model to train the combination of words that indicate a negative review or
    positive review.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们在图[5-6](#Fig6)中看到的那样，这个IMDB数据只是用户关于电影的评论数据特征，具有情感特征或标记特征，使我们能够知道评论是正面还是负面。这允许模型训练表示负面评论或正面评论的单词组合。
- en: It’s an easy example that gives us a look at text data. We will talk more in
    the next chapters about text and how to process text data, and train it with many
    algorithms and use the architecture that fits the data well. For now we learned
    a little bit in this portion about what text data is.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个简单的例子，让我们了解了文本数据。我们将在下一章中更多地讨论文本以及如何处理文本数据，以及使用许多算法对其进行训练，并使用适合数据架构。现在，我们在这个部分学到了一些关于文本数据是什么的知识。
- en: Images Data
  id: totrans-236
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 图像数据
- en: Computer vision is one of the hottest topics in artificial intelligence. It
    is making tremendous advances in many fields such as self-driving cars, robotics,
    and even various photo correction apps. Steady progress in object detection is
    being made every day. Vision is showing us the future of technology in general
    and deep learning in particular, so we can’t even imagine all of its possibilities.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 计算机视觉是人工智能中最热门的话题之一。它在自动驾驶汽车、机器人技术以及各种照片校正应用等多个领域取得了巨大的进步。物体检测的稳步进展每天都在进行。视觉正在向我们展示一般技术和特别是深度学习的未来，因此我们甚至无法想象其所有可能性。
- en: Computer vision basically is the science of manipulating and processing images
    to extract certain knowledge from it. So, this approach deals with all types of
    images from grayscale to multicolor scale, and from 2-dimensional to 4-dimensional
    scales.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 计算机视觉基本上是操纵和处理图像以从中提取特定知识的科学。因此，这种方法处理从灰度到彩色，从二维到四维的各种类型的图像。
- en: Image processing performs some operations on images to get an intended manipulation.
    Think about what we do when we start a new data analysis. We do some data preprocessing
    and feature engineering. It’s the same with image processing. We do image processing
    to manipulate the pictures for extracting some useful information from them. We
    can reduce noises, and control the brightness and color contrast.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 图像处理对图像执行一些操作以获得预期的操作。想想当我们开始新的数据分析时我们做了什么。我们进行一些数据预处理和特征工程。图像处理也是如此。我们进行图像处理以操纵图片，从中提取一些有用的信息。我们可以减少噪声，并控制亮度和颜色对比度。
- en: Type of Images (2-D, 3-D, 4-D)
  id: totrans-240
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 图像类型（2-D，3-D，4-D）
- en: The pipeline of images may still the same for 2-D, 3-D, and 4-D data, but you
    have to know the different types of data you may deal with. Also you should know
    and understand each step you may have to deal with for any image data you might
    face in the future.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 对于 2-D、3-D 和 4-D 数据，图像的流程可能仍然相同，但你必须知道你可能处理的不同类型的数据。你还应该了解并理解你可能必须处理的每个步骤，以应对未来可能遇到的任何图像数据。
- en: 2-D Data
  id: totrans-242
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 2-D 数据
- en: We say that images are in 2-dimensional space when each observation is composed
    of a 2-D matrix, and what makes the whole data is in 3-D space. Images that are
    2-D most likely are gray images; that is intuitive because each pixel in 2-dimensional
    space is represented by only one value, and this value can be between 0 and 255\.
    Now let us upgrade and increase the dimensional space by one, and see what happens.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 当每个观测值由一个 2-D 矩阵组成时，我们说图像位于二维空间中，而构成整个数据的是三维空间。二维图像很可能是灰度图像；这是直观的，因为在二维空间中的每个像素只表示一个值，这个值可以在
    0 到 255 之间。现在让我们将维度空间提升并增加一个维度，看看会发生什么。
- en: 3-D Data
  id: totrans-244
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 3-D 数据
- en: If you increase the dimensional space by one, then the images are in 3-dimensional
    space, and that makes each image observation composed of a 3-D tensor, while the
    whole data is in 4-dimensional space and is composed of a 4-D tensor. Images that
    are composed of 3-D, are composed of three channels, most likely the red, green,
    and blue channels, making each image in this data colored. Each pixel in the image
    is composed of three values, one value between 0 and 225 per each channel, and
    we will see how to deal with this type of data in a later Chapter [11](484548_1_En_11_Chapter.xhtml).
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你增加维度空间一个维度，那么图像就在三维空间中，这使得每个图像观测值由一个 3-D 张量组成，而整个数据在四维空间中，由一个 4-D 张量组成。由
    3-D 组成的图像由三个通道组成，很可能是红、绿、蓝通道，使得这个数据集中的每个图像都是彩色的。图像中的每个像素由三个值组成，每个通道一个值，介于 0 到
    225 之间，我们将在后面的第 [11](484548_1_En_11_Chapter.xhtml) 章节中看到如何处理这类数据。
- en: 4-D Data
  id: totrans-246
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 4-D 数据
- en: Again, if you increase the dimensional space by one, then the images are in
    4-dimensional space, and that makes each image observation composed of a 4-D tensor,
    while the whole data is in 5-dimensional space and is composed of a 4-D tensor.
    Images that are composed of 4-D, are composed of three channels, most likely the
    red, green, and blue channels, making each image in this data colored, and taking
    the time variation of the image as another dimension.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，如果你增加维度空间一个维度，那么图像就在四维空间中，这使得每个图像观测值由一个 4-D 张量组成，而整个数据在五维空间中，由一个 4-D 张量组成。由
    4-D 组成的图像由三个通道组成，很可能是红、绿、蓝通道，使得这个数据集中的每个图像都是彩色的，并将图像的时间变化作为另一个维度。
- en: For instance, biomedical images are typically volumetric images (3-D) and sometimes
    have an additional time dimension (4-D) and/or multiple channels (4-D–5-D) (e.g.,
    multisequence MR images). The variation in biomedical images (Figure [5-7](#Fig7))
    is quite different from that of a natural image (e.g., a photograph), as clinical
    protocols aim to stratify how an image is acquired (e.g., a patient is lying on
    his/her back, the head is not tilted, etc.). In their analysis, we aim to detect
    subtle differences (i.e., some small region indicating an abnormal finding).
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，生物医学图像通常是体积图像（3-D），有时还包含额外的时维（4-D）和/或多个通道（4-D–5-D）（例如，多序列磁共振图像）。生物医学图像（图
    [5-7](#Fig7)）的变化与自然图像（例如，照片）的变化相当不同，因为临床方案旨在分层图像的获取方式（例如，患者躺在背部，头部不倾斜等）。在我们的分析中，我们旨在检测细微的差异（即，一些小区域表明异常发现）。
- en: '![../images/484548_1_En_5_Chapter/484548_1_En_5_Fig7_HTML.jpg](Images/484548_1_En_5_Fig7_HTML.jpg)'
  id: totrans-249
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_5_Chapter/484548_1_En_5_Fig7_HTML.jpg](Images/484548_1_En_5_Fig7_HTML.jpg)'
- en: Figure 5-7
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-7
- en: Examples of what 4-D images look like
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 4-D 图像的示例
- en: Example—MNIST
  id: totrans-252
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 示例——MNIST
- en: The MNIST database (Modified National Institute of Standards and Technology
    database) is a large database of handwritten digits that is commonly used for
    training various image processing systems. The database is also widely used for
    training and testing in the field of machine and deep learning.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: MNIST数据库（修改后的国家标准与技术研究院数据库）是一个包含手写数字的大型数据库，通常用于训练各种图像处理系统。该数据库在机器学习和深度学习领域的训练和测试中也得到了广泛的应用。
- en: The MNIST database contains 60,000 training images and 10,000 testing images.
    Half of the training set and half of the test set were taken from NIST’s training
    dataset, while the other half of the training set and the other half of the test
    set were taken from NIST’s testing dataset.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: MNIST数据库包含60,000个训练图像和10,000个测试图像。训练集和测试集的一半来自NIST的训练数据集，另一半来自NIST的测试数据集。
- en: The MNIST dataset (Figure [5-8](#Fig8)) was created by “re-mixing” the samples
    from NIST’s original datasets. The creators felt that since NIST’s training dataset
    was taken from American Census Bureau employees, while the testing dataset was
    taken from American high school students, it was not well suited for statistical
    learning experiments.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: MNIST数据集（图[5-8](#Fig8)）是通过“重新混合”NIST原始数据集的样本创建的。创建者认为，由于NIST的训练数据集是从美国人口普查局员工那里获得的，而测试数据集是从美国高中生那里获得的，因此它不适合进行统计学习实验。
- en: '![../images/484548_1_En_5_Chapter/484548_1_En_5_Fig8_HTML.jpg](Images/484548_1_En_5_Fig8_HTML.jpg)'
  id: totrans-256
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_5_Chapter/484548_1_En_5_Fig8_HTML.jpg](Images/484548_1_En_5_Fig8_HTML.jpg)'
- en: Figure 5-8
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-8
- en: Sample of the MNIST dataset
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: MNIST数据集的样本
- en: Example—CIFAR-10
  id: totrans-259
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 示例——CIFAR-10
- en: In this example, we will be working on one of the most extensively used datasets
    in image comprehension, one that is used as a simple but general benchmark. In
    this example, we will build a simple CNN model to have an idea of the general
    structure of computations needed to tackle this type of classification problem.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们将处理在图像理解中广泛使用的其中一个数据集，它被用作一个简单但通用的基准。在这个例子中，我们将构建一个简单的卷积神经网络（CNN）模型，以了解解决这类分类问题所需的一般计算结构。
- en: 'This dataset consists of 40,000 images of 32×32 pixels, representing the following
    categories: *airplane*, *automobile*, *bird*, *cat*, *deer*, *dog*, *frog*, *horse*,
    *ship*, and *truck*. In this example, we will just take the first of the 10,000
    image bundles to work on (Figure [5-9](#Fig9)).'
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 该数据集包含40,000张32×32像素的图像，代表以下类别：*飞机*、*汽车*、*鸟*、*猫*、*鹿*、*狗*、*青蛙*、*马*、*船*和*卡车*。在这个例子中，我们将只处理10,000个图像包中的第一个（图[5-9](#Fig9)）。
- en: '![../images/484548_1_En_5_Chapter/484548_1_En_5_Fig9_HTML.jpg](Images/484548_1_En_5_Fig9_HTML.jpg)'
  id: totrans-262
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_5_Chapter/484548_1_En_5_Fig9_HTML.jpg](Images/484548_1_En_5_Fig9_HTML.jpg)'
- en: Figure 5-9
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-9
- en: Sample of the CIFAR-10 dataset
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: CIFAR-10数据集的样本
- en: Summary
  id: totrans-265
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: 'The type of data that you are working with is a very large piece of data science
    and machine learning. It must precede most of your analysis, because the type
    of data you have impacts the type of analysis that is even possible! Whenever
    you are faced with a new dataset, the first questions you should ask about it
    are the following:'
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 你正在处理的数据类型是数据科学和机器学习的一个非常大的领域。它必须在你的大多数分析之前，因为你所拥有的数据类型会影响甚至可能进行的分析类型！每当面对一个新的数据集时，你应该首先问以下问题：
- en: Is the data organized or unorganized?
  id: totrans-267
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据是有组织的还是无组织的？
- en: For example, does our data exist in a nice, clean row/column structure?
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我们的数据是否存在于整洁的行/列结构中？
- en: Is each column quantitative or qualitative?
  id: totrans-269
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每一列是定量还是定性的？
- en: For example, are the values numbers, strings, or do they represent quantities?
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，值是数字、字符串，还是代表数量？
- en: At what level of data is each column?
  id: totrans-271
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每一列的数据处于什么数据级别？
- en: For example, are the values at the nominal, ordinal, interval, or ratio level?
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，值处于名义、有序、区间还是比率级别？
- en: If it is image data, what is the data augmentation method we need to use?
  id: totrans-273
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果是图像数据，我们需要使用什么数据增强方法？
- en: If it is text data, what is the method we will use to transform text to numbers?
  id: totrans-274
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果是文本数据，我们将使用什么方法将文本转换为数字？
- en: The answers to these questions will not only impact your knowledge of the data,
    but will also dictate the next steps of your analysis. They will dictate the types
    of charts you are able to use and how you interpret them in your upcoming data
    models. Sometimes we will have to convert from one level to another in order to
    gain more perspective.
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 这些问题的答案不仅会影响您对数据的了解，还会决定您分析的下一步。它们将决定您能够使用的图表类型以及您如何在即将到来的数据模型中解释它们。有时我们不得不从一级转换到另一级，以获得更多的视角。
- en: In the coming chapters, we will take a much deeper look at how to deal with
    and explore data at different levels. By the end of this book, we will be able
    to not only recognize data at different levels, but we’ll also know how to deal
    with it at these levels.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的章节中，我们将更深入地探讨如何处理和探索不同层次的数据。到本书结束时，我们不仅能够识别不同层次的数据，而且还将知道如何在这些层次上处理它们。
- en: 6. Data Wrangling and Preprocessing
  id: totrans-277
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 6. 数据整理和预处理
- en: In the previous chapter, we defined what data means; we also discussed types
    and levels of data. So, we are now just getting into action with data! In this
    chapter, you’ll learn how to understand and clean your dataset.
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一章中，我们定义了数据意味着什么；我们还讨论了数据的类型和层次。因此，我们现在正在开始实际操作数据！在本章中，您将学习如何理解和清洗您的数据集。
- en: In some books or references you will find the topic of this chapter has a different
    name; they might call it data munging.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 在某些书籍或参考资料中，您会发现本章的主题有不同的名称；他们可能会将其称为数据整理。
- en: 'Munging means to manipulate or change, in a series of well-specified and reversible
    steps, a piece of original data to a completely different—and hopefully more useful—one.
    You might see some data scientist or deep learning engineers use another term
    to describe this process in the pipeline. These terms are almost synonymous: terms
    such as data wrangling or data preparation. By any name, munging is a very important
    part of any data engineering pipeline.'
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 整理意味着通过一系列明确且可逆的步骤，将原始数据转换为完全不同——并且希望更有用——的数据。您可能会看到一些数据科学家或深度学习工程师使用其他术语来描述这个管道中的过程。这些术语几乎是同义的：如数据整理或数据准备。无论叫什么名字，整理都是任何数据工程管道的重要组成部分。
- en: 'While reading this book, you will find us mentioning more jargon and technicalities
    taken from the fields of probability and statistics (such as probability distributions,
    descriptive statistics, and hypothesis testing). We will try to add a dictionary-like
    appendix for these terms to make sure that we are on the same page; however, our
    main purpose is to provide you with the essential concepts for handling deep learning
    projects, and it is nice if you already are familiar with some of them. But we
    will put an appendix in case you may need a refresh or even a straightforward
    introduction to any of the concepts dealt with in this or another chapter. Given
    such premises, in this chapter the following topics will be covered:'
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 在阅读这本书的过程中，你会发现我们提到了更多来自概率和统计学领域（如概率分布、描述性统计和假设检验）的术语和技术。我们将尝试为这些术语添加一个类似词典的附录，以确保我们处于同一页面上；然而，我们的主要目的是为您提供处理深度学习项目的基本概念，如果您已经熟悉其中的一些，那就更好了。但我们会添加一个附录，以防您可能需要刷新或对任何在本章或其他章节中处理的概念进行直接介绍。在这样的前提下，本章将涵盖以下主题：
- en: The data fields pipelines (so that you’ll know what is going on and what’s next)
  id: totrans-282
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据字段管道（以便您了解正在发生什么以及接下来会发生什么）
- en: Loading data from a file
  id: totrans-283
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从文件中加载数据
- en: Selecting data you need
  id: totrans-284
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择您需要的数据
- en: Handling any missing or wrong data
  id: totrans-285
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 处理任何缺失或错误的数据
- en: Augmenting and deleting data
  id: totrans-286
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 增加和删除数据
- en: Grouping and transforming data to obtain new and meaningful information
  id: totrans-287
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将数据分组和转换以获取新的和有意义的信息
- en: The Data Fields Pipelines Revisited
  id: totrans-288
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 重新审视数据字段管道
- en: Giving You a Reason
  id: totrans-289
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 给您一个理由
- en: We recently read that The New York Times called data cleaning “janitor work”
    and said that `80 percent` of a data scientist’s time will be spent doing this
    kind of cleaning. As we can see in Figure [6-1](#Fig1), despite its importance,
    data cleaning has not really captured the public imagination in the same way as
    big data, data mining, or machine learning.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 我们最近读到，《纽约时报》将数据清洗称为“清洁工工作”，并表示数据科学家80%的时间将花费在这种清理工作上。如图[6-1](#Fig1)所示，尽管数据清洗很重要，但它并没有像大数据、数据挖掘或机器学习那样真正激发公众的想象力。
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig1_HTML.jpg](Images/484548_1_En_6_Fig1_HTML.jpg)'
  id: totrans-291
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig1_HTML.jpg](Images/484548_1_En_6_Fig1_HTML.jpg)'
- en: Figure 6-1
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-1
- en: The current trend of machine learning
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习的当前趋势
- en: Well, unfortunately we would all be a lot better off if we just got the job
    done rather than ignoring it, complaining about it, and giving it various demeaning
    names.
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 嗯，不幸的是，如果我们只是完成工作而不是忽视它、抱怨它、给它各种贬低的名字，我们都会好很多。
- en: Where Is Data Cleaning in the Process?
  id: totrans-295
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据清洗在过程中的位置在哪里？
- en: The data science process is described in six steps, as shown in the following
    list. Data cleaning is right in the middle, at the third step; but rather than
    thinking of these steps as a linear (like a waterfall), start-to-finish framework,
    we will revisit the steps as needed several times over in the course of a project
    in more of an iterative manner. It is also worth pointing out that not every project
    will have all the steps; for example, sometimes, we do not have a collection step
    or a visualization step. It really depends on the particular needs of the project.
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学过程被描述为六个步骤，如下所示列表所示。数据清洗位于中间，即第三步；但与其将这些步骤视为线性（如瀑布）的从开始到结束的框架，不如在项目过程中根据需要多次回顾这些步骤，以更迭式的方式进行。也值得指出的是，并非每个项目都需要所有步骤；例如，有时我们可能没有收集步骤或可视化步骤。这完全取决于项目的特定需求。
- en: The first step is to come up with the problem statement. Identify the problem
    you are trying to solve.
  id: totrans-297
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第一步是提出问题陈述。确定你试图解决的问题是什么。
- en: The next step is data collection and storage. Where did the data come from that
    is helping you answer this question? Where did you store it and in what format?
  id: totrans-298
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 下一步是数据收集和存储。帮助你回答这个问题的数据是从哪里来的？你将它存储在哪里，以什么格式？
- en: Then comes data cleaning. Did you change the data at all? Did you delete anything?
    How did you prepare it for the analysis and mining step next?
  id: totrans-299
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然后是数据清洗。你是否改变了数据？你是否删除了什么？你是如何为分析和挖掘步骤准备数据的？
- en: The next step is data analysis and machine learning. What kind of processing
    did you do to the data? What transformations? What algorithms did you use? What
    formulas did you apply? What deep learning algorithms did you use? In what order?
  id: totrans-300
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 下一步是数据分析与机器学习。你对数据做了哪些处理？哪些转换？你使用了哪些算法？你应用了哪些公式？你使用了哪些深度学习算法？顺序是什么？
- en: Representation and visualization is the fifth step. How do you show the results
    of your work? This can be one or more tables, drawings, graphs, charts, network
    diagrams, word clouds, maps, and so on. Is this the best visualization to represent
    the data? What alternatives did you consider?
  id: totrans-301
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 表示和可视化是第五步。你如何展示你工作的结果？这可能是一个或多个表格、绘图、图表、网络图、词云、地图等等。这是否是表示数据的最佳可视化方式？你考虑了哪些替代方案？
- en: The last step is problem resolution. What is the answer to the question or problem
    you posed in step 1? What limitations do you have on your results? Were there
    parts of the question that you could not answer with this method? What could you
    have done differently? What are the next steps?
  id: totrans-302
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后一步是问题解决。对于你在第一步中提出的问题或问题，答案是什么？你的结果有什么限制？是否有问题的某些部分你无法用这种方法回答？你本可以如何不同？下一步是什么？
- en: Data Loading and Preprocessing
  id: totrans-303
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据加载和预处理
- en: After you find the dataset you want for your project, you also know how to import
    the needed Python packages for the pipeline. In this section, having kept your
    toolbox ready, you are about to learn how to structurally load, manipulate, and
    process datasets using pandas and NumPy; and as you have seen in previous chapters,
    how to set up these packages. You are now ready to proceed to the next section.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 在你找到你项目所需的数据集后，你也知道如何导入所需的Python包以进行管道操作。在本节中，在准备好你的工具箱后，你将学习如何使用pandas和NumPy结构性地加载数据集、操作和处理数据；正如你在前面的章节中看到的，如何设置这些包。你现在可以继续到下一节了。
- en: Fast and Easy Data Loading
  id: totrans-305
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 快速且简单数据加载
- en: Let’s start with pandas. The pandas library offers the most accessible and complete
    function to load tabular data from a file (*CSV*, comma-separated values; *TSV*,
    tab-separated values; *JSON*) or a *URL*.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从pandas库开始。pandas库提供了最易于访问和最完整的函数，可以从文件（*CSV*，逗号分隔值；*TSV*，制表符分隔值；*JSON*）或*URL*中加载数据表。
- en: By default, it will store data in a specialized pandas data structure, index
    each row, separate variables by custom delimiters, infer the right data type for
    each column, convert data (if necessary), as well as parse dates, missing values,
    and erroneous values, and do a lot of processing. The amazing part is that you
    can do all that with just one line of Python code; that’s why it’s fast and easy.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 默认情况下，它将数据存储在专门的 pandas 数据结构中，为每一行建立索引，通过自定义分隔符区分变量，为每一列推断正确的数据类型，必要时转换数据，以及解析日期、缺失值和错误值，并进行大量处理。令人惊叹的是，你只需一行
    Python 代码就能完成所有这些操作；这就是为什么它既快又简单。
- en: '[PRE1]'
  id: totrans-308
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '[PRE2]'
  id: totrans-309
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig3_HTML.jpg](Images/484548_1_En_6_Fig3_HTML.jpg)'
  id: totrans-310
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig3_HTML.jpg](Images/484548_1_En_6_Fig3_HTML.jpg)'
- en: Figure 6-3
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-3
- en: The table output of the online DataFrame
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 在线 DataFrame 的表格输出
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig2_HTML.jpg](Images/484548_1_En_6_Fig2_HTML.jpg)'
  id: totrans-313
