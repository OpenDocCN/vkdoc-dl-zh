  type: TYPE_NORMAL
- en: Categorical and Text data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'As we discussed in a previous chapter; typically, you’ll find yourself dealing
    with two main kinds of data:'
  prefs: []
  type: TYPE_NORMAL
- en: Numerical
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Categorical
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Numerical data, such as temperature, amount of money, days of usage, or house
    number, can be composed of either floating-point numbers (such as 1.0, -2.3, 99.99,
    and so on) or integers (such as -3, 9, 0, 1, and so on). Each value that the data
    can assume has a direct relation with others, since they’re comparable. In other
    words, you can say that a feature with a value of 2.0 is greater (actually, it
    is double) than a feature that assumes a value of 1.0\. This type of data is very
    well defined and comprehensible, with binary operators such as equal to, greater
    than, and less than.
  prefs: []
  type: TYPE_NORMAL
- en: Categorical data is also known as nominal and ordinal data. Categorical data
    expresses an attribute that cannot be measured and assumes values in a finite
    or infinite set of values, often named levels.
  prefs: []
  type: TYPE_NORMAL
- en: For example, the weather is a categorical feature, since it takes values in
    a discrete set (sunny, cloudy, snowy, rainy, and foggy). Other examples are features
    that contain URLs, IPs, items you put in your e-commerce cart, device IDs, and
    so on. On this data, you cannot define the equal to, greater than, and less than
    binary operators and therefore, you can’t rank them.
  prefs: []
  type: TYPE_NORMAL
- en: A plus point for both categorical and numerical values is Booleans. In fact,
    they can be seen as categorical (presence/absence of a feature) or, on the other
    hand, as the probability of a feature having an exhibit (has displayed, has not
    displayed). Since many deep learning algorithms do not allow the input to be categorical,
    Boolean features are often used to encode categorical features as numerical values.
  prefs: []
  type: TYPE_NORMAL
- en: Hint
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You can review Chapter [5](484548_1_En_5_Chapter.xhtml), which defines data
    types.
  prefs: []
  type: TYPE_NORMAL
- en: Data Encoding
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Many deep learning libraries require that categorical features/columns are encoded
    as integer values. Although most estimators for classification/regression in Scikit-learn
    convert columns to integers internally, it is considered good practice to provide
    all data features/columns as integer arrays to avoid technical glitches.
  prefs: []
  type: TYPE_NORMAL
- en: 'To encode the categorical variables, we can use an approach similar to the
    mapping of ordinal features discussed previously. We need to remember that columns
    are not ordinal, and it doesn’t matter which integer number we assign to a particular
    string-label. Thus, we can simply enumerate the class labels starting at `0`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE43]'
  prefs: []
  type: TYPE_PRE
- en: 'Next, we can use the mapping dictionary to transform the categorical feature
    or column (Figure [6-31](#Fig31)) into integers:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE44]'
  prefs: []
  type: TYPE_PRE
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig31_HTML.jpg](Images/484548_1_En_6_Fig31_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6-31
  prefs: []
  type: TYPE_NORMAL
- en: The result of categorical transformation
  prefs: []
  type: TYPE_NORMAL
- en: 'We can reverse the key-value pairs in the mapping dictionary as follows, to
    map the converted class labels back to the original string representation (Figure
    [6-32](#Fig32)):'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE45]'
  prefs: []
  type: TYPE_PRE
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig32_HTML.jpg](Images/484548_1_En_6_Fig32_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6-32
  prefs: []
  type: TYPE_NORMAL
- en: The result of categorical inverse transformation
  prefs: []
  type: TYPE_NORMAL
- en: 'Alternatively, there is a convenient `LabelEncoder` class directly implemented
    in Scikit-learn to achieve the same:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE46]'
  prefs: []
  type: TYPE_PRE
- en: Note
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The `fit_transform` method is just a shortcut for calling fit and transform
    separately.
  prefs: []
  type: TYPE_NORMAL
- en: 'And the `classes_` attribute shows you the class that the real categorical
    column was before encoding:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE47]'
  prefs: []
  type: TYPE_PRE
- en: Performing One-Hot Encoding on Nominal Features
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In the previous section, we used a simple dictionary-mapping approach to convert
    the ordinal size feature into integers. Since Scikit-learn estimators treat class
    labels without any order, we used the convenient `LabelEncoder` class to encode
    the string labels into integers. It may appear that we could use a similar approach
    to transform the nominal gender column of our dataset, as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE48]'
  prefs: []
  type: TYPE_PRE
- en: After executing the preceding code, the first column of the NumPy array *X*
    now holds the new gender values, which are encoded as shown in code cell output.
  prefs: []
  type: TYPE_NORMAL
- en: If we stop at this point and feed the array to our model, we will make one of
    the most common mistakes in dealing with categorical data.
  prefs: []
  type: TYPE_NORMAL
- en: Can You Spot the Problem?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Although the gender values don’t come in any particular order, a learning algorithm
    will now assume that male is larger than female. Although this assumption is incorrect,
    the algorithm could still produce useful results. However, those results would
    not be optimal.
  prefs: []
  type: TYPE_NORMAL
- en: 'A common workaround for this problem is to use a technique called one-hot encoding
    (Figure [6-33](#Fig33)). The idea behind this approach is to create a new dummy
    feature for each unique value in the nominal feature column. Here, we would convert
    the gender feature into two new features: male and female. Binary values can then
    be used to indicate the particular gender of a sample; for example, a male sample
    can be encoded as `male=1, female=0`. To perform this transformation, we can use
    the `OneHotEncoder` that is implemented in the `sklearn.preprocessing` module:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE49]'
  prefs: []
  type: TYPE_PRE
- en: When we initialized the `OneHotEncoder`, we defined the column position of the
    variable that we want to transform via the `categorical_features` parameter .
    By default, the `OneHotEncoder` returns a sparse matrix when we use the transform
    method, and we converted the sparse matrix representation into a regular (*dense*)
    NumPy array for the purposes of visualization via the `toarray` method.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Color is the first column in the feature matrix X Sparse matrices are simply
    a more efficient way of storing large datasets, and one that is supported by many
    Scikit-learn functions, which is especially useful if it contains a lot of zeros.
    To omit the `toarray` step, we could initialize the encoder as `OneHotEncoder(...,sparse=False)`
    to return a dense NumPy array.
  prefs: []
  type: TYPE_NORMAL
- en: 'An even more convenient way to create those **dummy** features via one-hot
    encoding is to use the `get_dummies` method implemented in pandas. Applied on
    a `DataFrame`, the `get_dummies` method will only convert string columns and leave
    all other columns unchanged:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE50]'
  prefs: []
  type: TYPE_PRE
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig33_HTML.jpg](Images/484548_1_En_6_Fig33_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6-33
  prefs: []
  type: TYPE_NORMAL
- en: The result of one-hot encoding transformation
  prefs: []
  type: TYPE_NORMAL
- en: 'A Special Type of Data: Text'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s introduce another type of data. Text is frequently used on the Web; you
    can see almost every website has forms, and social media is filled with text data
    like *posts* and *comments*. Text is also used as input for deep learning algorithms,
    since it contains a natural representation of data in our language. It’s so rich,
    that it also contains the answer to what we’re looking for.
  prefs: []
  type: TYPE_NORMAL
- en: The most common algorithm used when dealing with text is to use a bag of words.
    According to this algorithm, every word becomes a feature and the text becomes
    a vector that contains nonzero elements for all the features (that is, the words)
    in its body. Given a text dataset, *what’s the number of features?* It is simple.
    Just extract all the unique words in it and enumerate them. For a very rich text
    that uses all the English words, that number is around 600,000\. If you’re not
    going to further process it (removal of *third person*, *abbreviations*, *contractions*,
    and *acronyms*), you might find yourself dealing with more than that, but that’s
    a very rare case. In a plain and simple approach, which is the target of this
    book, we just let Python do its best.
  prefs: []
  type: TYPE_NORMAL
- en: 'The dataset used in this section is textual; it’s the famous 20newsgroup (for
    more information about this, visit 20Newsgroups ([`http://qwone.com/~jason/20Newsgroups/`](http://qwone.com/~jason/20Newsgroups/)).
    It is a collection of about *20,000* documents that belong to 20 topics of newsgroups.
    It’s one of the most frequently used (if not the top most used) datasets presented
    while dealing with text classification and clustering. To import it (Figure [6-34](#Fig34)),
    we’re going to use only its restricted subset, which contains all the science
    topics (medicine and space):'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE51]'
  prefs: []
  type: TYPE_PRE
- en: Note
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The first time you run this command, it automatically downloads the dataset
    and places it in the `$HOME/scikit_learn_data/20news_home/` default directory.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE52]'
  prefs: []
  type: TYPE_PRE
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig34_HTML.jpg](Images/484548_1_En_6_Fig34_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6-34
  prefs: []
  type: TYPE_NORMAL
- en: The result of loading the 20newsgroups dataset
  prefs: []
  type: TYPE_NORMAL
- en: The easiest way to deal with the text is by transforming the body of the dataset
    into a series of words. This means that for each document, the number of times
    a specific word appears in the body will be counted.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, let’s make a small, easy-to-process dataset:'
  prefs: []
  type: TYPE_NORMAL
- en: '`doc_1`: We love machine learning.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`doc_2`: Machine learning is great.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'In the entire dataset, which contains `doc_1` and `doc_2`, there are only six
    different words: we, love, machine, learning, is, and great. Given this array,
    we can associate each document with a feature vector:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE53]'
  prefs: []
  type: TYPE_PRE
- en: Note that we’re discarding the positions of the words and retaining only the
    number of times the word appears in the document. That’s all.
  prefs: []
  type: TYPE_NORMAL
- en: 'In the `20newsletter` dataset, with Python, this can be done in a simple way:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE54]'
  prefs: []
  type: TYPE_PRE
- en: First, we instantiate a `CountVectorizer` object. Then, we call the method to
    count the terms in each document and produce a feature vector for each of them,
    which is `fit_transform`. Then we can query the matrix size.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The output matrix is sparse, because it’s very common to have only a limited
    selection of words for each document (since the number of *nonzero* elements in
    each line is very low and it makes no sense to store all the redundant zeros).
  prefs: []
  type: TYPE_NORMAL
- en: Anyway, the output shape is `(1187, 25638)`. The first value is the number of
    observations in the dataset (the number of documents), while the latter is the
    number of features (the number of unique words in the dataset). After the `CountVectorizer`
    transforms, each document is associated with its feature vector (Figure [6-35](#Fig35)).
    Let’s take a look at the first document.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE55]'
  prefs: []
  type: TYPE_PRE
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig35_HTML.jpg](Images/484548_1_En_6_Fig35_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6-35
  prefs: []
  type: TYPE_NORMAL
- en: The result of count vectorizing the dataset
  prefs: []
  type: TYPE_NORMAL
- en: 'You may notice that the output is a sparse vector where only nonzero elements
    are stored. To check the direct correspondence to words (Figure [6-36](#Fig36)),
    just try the following code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE56]'
  prefs: []
  type: TYPE_PRE
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig36_HTML.jpg](Images/484548_1_En_6_Fig36_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6-36
  prefs: []
  type: TYPE_NORMAL
- en: The data transformed using count vectorizer
  prefs: []
  type: TYPE_NORMAL
- en: So Far, Everything Has Been Pretty Good, Hasn’t It?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Let’s move forward to another task of increasing complexity and effectiveness.
    Counting words is good, but we can get more info from the data with more complexity.
    Let’s compute their frequency. It’s a measure that you can compare across differently
    sized datasets. It gives an idea whether a word is a stop word (that is, a very
    common word such as a, an, the, or is) or a rare, unique one. Typically, these
    words are the most important because they’re able to characterize an instance
    and the features based on these words, which are very discriminative in the learning
    process. To retrieve the frequency of each word in each document, we use `TfidfVectorizer`
    to compute the frequency matrix (Figure [6-37](#Fig37)); try the following code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE57]'
  prefs: []
  type: TYPE_PRE
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig37_HTML.jpg](Images/484548_1_En_6_Fig37_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6-37
  prefs: []
  type: TYPE_NORMAL
- en: The data transformed using Tfidf Vectorizer
  prefs: []
  type: TYPE_NORMAL
- en: The sum of the frequencies is 1 (or close to 1 due to the approximation). This
    happens because we chose the L1 norm. In this specific case, the word frequency
    is a probability distribution function. Sometimes, it’s nice to increase the difference
    between rare and common words. In such cases, you can use the L2 norm to normalize
    the feature vector.
  prefs: []
  type: TYPE_NORMAL
- en: An even more effective way to vectorize text data is by using `Tfidf`. In brief,
    you can multiply the term frequency of the words that compose a document by the
    inverse document frequency of the word itself (that is, in the number of documents
    it appears, or in its logarithmically scaled transformation). This is very handy
    to highlight words that effectively describe each document and which are a powerful
    discriminative element among the dataset.
  prefs: []
  type: TYPE_NORMAL
- en: '`Tfidf` gained a lot of popularity since computers have started to process
    and mine text data. The majority of search engines and information retrieval software
    have used it mainly for its effective way to measure sentence similarity and distance,
    making it an optimal solution to retrieve documents from a user-inserted text
    search query.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE58]'
  prefs: []
  type: TYPE_PRE
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig38_HTML.jpg](Images/484548_1_En_6_Fig38_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6-38
  prefs: []
  type: TYPE_NORMAL
- en: The data after tfidf transformation
  prefs: []
  type: TYPE_NORMAL
- en: In this example, the four most information-rich words of the first documents
    are `caste, baube, flb`, and `tm` (they have the highest tf-idf score). This means
    that their term frequency within the document is high, whereas they’re pretty
    rare in the remaining documents. In terms of information theory, their entropy
    is high within the document, while it’s lower considering all the documents.
  prefs: []
  type: TYPE_NORMAL
- en: So far, for each word, we have generated a feature. **What about taking a couple
    of words together?**
  prefs: []
  type: TYPE_NORMAL
- en: 'That’s exactly what happens when you consider bigrams instead of unigrams.
    With bigrams (or generically, n-grams), the presence or absence of a word—as well
    as its neighbors—matters (that is, the words near it and their disposition). Of
    course, you can mix unigrams and n-grams and create a rich feature vector for
    each document. In a simple example, let’s test how n-grams work:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE59]'
  prefs: []
  type: TYPE_PRE
- en: The preceding example is very intuitive and combines the first and second algorithms
    we previously discussed. In this code cell, we used a `CountVectorizer`, but this
    algorithm is very common with a `TfidfVectorizer`.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The number of features explodes exponentially when you use n-grams.
  prefs: []
  type: TYPE_NORMAL
- en: If you have too many features (rich text data) in your dataset (the dictionary
    may be too rich, there may be too many ngrams, or the computer may just be limited),
    you can use a trick that lowers the complexity of the problem (but you should
    first evaluate the trade-off performance/trade-off complexity).
  prefs: []
  type: TYPE_NORMAL
- en: 'It’s common to use the hashing trick, where many words (or n-grams) are hashed
    and their hashes collide (which makes a bucket of words). Buckets are sets of
    semantically unrelated words but with colliding hashes. With `HashingVectorizer()`,
    as shown in the following example, you can decide the number of buckets of words
    you want. The resulting matrix, of course, reflects your setting:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE60]'
  prefs: []
  type: TYPE_PRE
- en: Note
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You can’t invert the hashing process (since it’s an irreversible summarization
    process).
  prefs: []
  type: TYPE_NORMAL
- en: 'After this transformation, you will have to work on the hashed features as
    they are. Hashing presents quite a few advantages:'
  prefs: []
  type: TYPE_NORMAL
- en: Allowing quick transformation of a bag of words into vectors of features
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Hash buckets are our features in this case.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Easily accommodating never previously seen words among the features
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Avoiding overfitting by having unrelated words collide together in the same
    feature
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Tokenization, Stemming, and Stop Words
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: What Are Tokenizing and Tokenization?
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '**Tokenizing** means splitting your text into minimal meaningful units. It
    is a mandatory step before any kind of processing. It is the act of breaking up
    a sequence of strings into pieces such as words, keywords, phrases, symbols and
    other elements called *tokens*.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Tokens** can be individual words, phrases, or even whole sentences. That’s
    all about tokenization, actually,'
  prefs: []
  type: TYPE_NORMAL
- en: We need to talk about it, but we should zoom out to see what happens from a
    flying camera. This camera will allow us to see what is *lexical analysis, lexing,*
    or *tokenization*; which is the process of converting a sequence of characters
    (such as in a computer program or web page) into a sequence of tokens.
  prefs: []
  type: TYPE_NORMAL
- en: A program that performs lexical analysis may be termed a lexer, tokenizer, or
    scanner, though the scanner is also a term for the first stage of a lexer.
  prefs: []
  type: TYPE_NORMAL
- en: 'We said the word *lexer* many times. So, the question is, what is a lexer?
    or to be rigorous, what is a *lexeme*? A lexeme is a sequence of characters in
    the source program that matches the pattern for a token and is identified by the
    lexical analyzer as an instance of that token. But we didn’t really answer the
    question “*what is a token?*” in rigorous form. A token is a string with an assigned
    and thus identified meaning; it is structured as a pair consisting of a token
    name and an optional token value. The token name is a category of lexical unit,
    and common token names are:'
  prefs: []
  type: TYPE_NORMAL
- en: '*identifier*: names the programmer chooses'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*keyword*: names already in the programming language'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*separator* (also known as punctuators): punctuation characters and paired-delimiters.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*operator*: symbols that operate on arguments and produce results'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*literal*: numeric, logical, textual, reference literals'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*comment*: line, block'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These names are not important in the scope of this book, but we tried to give
    you some information about the basics of tokenization. However, we do not do all
    of this manually; we will see some packages in Python that help us to make **tokenization**
    and **stemming** very easy. For now, let us see an example to get a better idea
    about it.
  prefs: []
  type: TYPE_NORMAL
- en: '*Input*: Friends, Romans, Countrymen, lend me your ears.'
  prefs: []
  type: TYPE_NORMAL
- en: '*Output*: (Friends), (Romans), (Countrymen), (lend), (me), (your), (ears).'
  prefs: []
  type: TYPE_NORMAL
- en: '**XML-Output:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE61]'
  prefs: []
  type: TYPE_PRE
- en: After we’ve seen this example, I think we have a good understanding about Tokenization.
    But before we get into examples, we’ll see a new term called *stemming*. So, the
    question rings, what is stemming?
  prefs: []
  type: TYPE_NORMAL
- en: '**Stemming** refers to reducing a word to its root form. While performing natural
    language processing tasks, you will encounter various scenarios where you find
    different words with the same root.'
  prefs: []
  type: TYPE_NORMAL
- en: For example, “*compute, computer, computing, computed.*” You may want to reduce
    the words to their root form for the sake of uniformity. This is where stemming
    comes into play. Now we can see what stemming is, but what is the difference between
    stemming and lemmatization (Table [6-1](#Tab1))?
  prefs: []
  type: TYPE_NORMAL
- en: Table 6-1
  prefs: []
  type: TYPE_NORMAL
- en: The Difference Between Stemming and Lemmatization
  prefs: []
  type: TYPE_NORMAL
- en: '| Stemming | Lemmatization |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Stemming is the process of reducing inflexion in words to their root forms,
    such as mapping a group of words to the same stem, even if the stem itself is
    not a valid word in the language. | Lemmatization, unlike stemming, reduces the
    inflected words properly, ensuring that the root word belongs to the language.
    In lemmatization, the root word is lemma. A lemma (plural lemmas or lemmata) is
    the canonical form, dictionary form, or citation form of a set of words. |'
  prefs: []
  type: TYPE_TB
- en: '| **Example**`Word`               `Porter Stemmer``friend             friend``friendship         friendship``friends            friend``friendships        friendship`
    | **Example**`Word`                `Lemma``He                  He``was                 wa``running             running``and                 and``eating              eating``at                  at`
    |'
  prefs: []
  type: TYPE_TB
- en: Examples of stemmers in the NLTK are *Porter stemmer* and *Snowball stemmer*.
    Both of them have been implemented using different algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s take a quick and easy look at these two stemmers.
  prefs: []
  type: TYPE_NORMAL
- en: The Porter stemming algorithm is a process of removing the suffix form words
    in English; for example, we will take a word and try to get its stemmer values,
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE62]'
  prefs: []
  type: TYPE_PRE
- en: 'The rules for making a Porter stemmer:'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Figa_HTML.jpg](Images/484548_1_En_6_Figa_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: This is the basis of the NLTK, which you can see more about at [`www.nltk.org/`](http://www.nltk.org/).
    Now we get the basic word in the phrase (token) and we get its root. Let’s talk
    a moment about stop words. Stop Words are words that do not contain important
    significance to be used in search queries. Usually, these words are filtered out
    from search queries because they return a vast amount of unnecessary information.
    Each programming language will give its own list of stop words to use. Mostly
    they are words that are commonly used in the English language such as “as, the,
    be, are,” etc.
  prefs: []
  type: TYPE_NORMAL
- en: We will start in the next stage on the bag-of- words algorithm and IR algorithms
    that help in natural language processing, like tf-idf.
  prefs: []
  type: TYPE_NORMAL
- en: The Bag-of-Words (BoW) Model
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: What is the BoW?
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: We may want to perform classification of documents, so each document is an “input”
    and a class label is the “output” for our predictive algorithm. Algorithms take
    vectors of numbers as input; therefore, we need to convert documents to fixed-length
    vectors of numbers. So how we can make this in machine learning algorithm isn’t
    possible so we need a model which think about text documents in machine learning,
    throws away all of the order information in the words and focuses on the occurrence
    of words in a document. This BoW is what we need to perform this task very efficiently.
    We know the definition of BoW and how we can use it. Let’s see how it works in
    a technical way.
  prefs: []
  type: TYPE_NORMAL
- en: The BoW model can be implemented by assigning each word a unique number. Then
    any document we see can be encoded as a fixed-length vector with the length of
    the vocabulary of known words. The value in each position in the vector could
    be filled with a count or frequency of each word in the encoded document. We are
    only concerned with encoding schemes that represent which words are present or
    the degree to which they are present in encoded documents, without any information
    about the order.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s take an example to get a better understanding about the bag of words:'
  prefs: []
  type: TYPE_NORMAL
- en: John likes to watch movies. Mary likes movies too.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: John also likes to watch football games.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Based on these two text documents, a list is constructed as follows for each
    document:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE63]'
  prefs: []
  type: TYPE_PRE
- en: 'Representing each bag-of-words as a JSON object:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE64]'
  prefs: []
  type: TYPE_PRE
- en: 'Now see what happens when we have a new document like this:'
  prefs: []
  type: TYPE_NORMAL
- en: John likes to watch movies. Mary likes movies too. John also likes to watch
    football games.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'So now we should take the union of BoW3=BoW1 BoW2 so we will see the output:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE65]'
  prefs: []
  type: TYPE_PRE
- en: After we finish this section we will try to prepare you for the next Chapter
    [8](484548_1_En_8_Chapter.xhtml), which features extraction. There you will learn
    how to prepare your data and get information about what data you have. This will
    become more obvious in the next chapters.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We started this chapter by defining what is the data pipeline and elaborated
    where is data cleaning in the pipeline’ after that we gave you a good reason why
    you need to clean your dataset.
  prefs: []
  type: TYPE_NORMAL
- en: After that we looked at useful techniques to make sure that we handle missing
    data correctly. Before we feed data to a deep learning algorithm, we also have
    to make sure that we encode categorical variables correctly, and we have seen
    how we can map ordinal and nominal features values to integer representations.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, we made a case study and discussed how to use what we learned from
    this chapter on the Titanic dataset to prepare, clear it, and make it ready for
    the next step of the pipeline.
  prefs: []
  type: TYPE_NORMAL
- en: 7. Data Resampling
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In statistics, resampling is the method that consists of drawing repeated samples
    from the original data. So, we can say that *resampling methods* are a tool taken
    from modern statistics. These methods involve repeatedly taking a sample from
    the training set and training the model on each sample in order to get additional
    information about the model.
  prefs: []
  type: TYPE_NORMAL
- en: For example, we can estimate variability of the learning of the model of interest.
    We can draw different samples from the training data, then each time we train
    the model on a given sample, we examine the difference in results. An approach
    like that may allow us to obtain information that would not be available to us
    if we trained our model only one time using all of the training dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Using resampling methods might be costly and expensive by way of computational
    power, especially if you think about these approaches training the same model
    many times using a different subset of the training dataset. But nowadays computer
    power has grown, and the requirements of these methods are not impossible.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter we will introduce two of the most commonly used methods in
    data resampling: *cross-validation* and *bootstrap*. Both of these methods are
    very important and used a lot in many practical applications, and are an essential
    part of any machine learning pipeline. For example, *cross-validation* can be
    used to estimate the error coming from a trained model to check and evaluate its
    performance, or to select something called the level of flexibility. *Bootstrap*
    is commonly used to give us the accuracy of model parameter used in training'
  prefs: []
  type: TYPE_NORMAL
- en: '**Note:** The process of evaluating the model’s performance is known as *model
    assessment* .'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Note:** The process of selecting the best level of flexibility is known as
    *model selection* .'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating Training and Test Sets
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When a dataset is large enough, it’s a good practice to split it into training
    and test sets; the former to be used for training the model and the latter to
    test its performances.
  prefs: []
  type: TYPE_NORMAL
- en: You might wonder why you should do that from the beginning. Separating data
    into *training* and *testing* sets is an important part of evaluating data mining
    models. Typically, when you separate a data set into a training set and a testing
    set, most of the data is used for training and a smaller portion of the data is
    used for testing.
  prefs: []
  type: TYPE_NORMAL
- en: The methods that we will discuss in this chapter have a main responsibility,
    which is to randomly sample the data to help ensure that the testing and training
    sets are similar. By using similar data for training and testing, you can minimize
    the effects of data discrepancies and better understand the characteristics of
    the model.
  prefs: []
  type: TYPE_NORMAL
- en: After a model has been processed by using the training set, you test the model
    by making predictions against the test set. Because the data in the testing set
    already contains known values for the attribute that you want to predict, it is
    easy to determine whether the model’s guesses are correct.
  prefs: []
  type: TYPE_NORMAL
- en: 'To summarize, there are two main rules in performing such an operation:'
  prefs: []
  type: TYPE_NORMAL
- en: Both datasets must reflect the original distribution.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The original dataset must be randomly shuffled before the split phase in order
    to avoid a correlation between consequent elements.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Cross-Validation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In a previous chapter we illustrated the difference between the *testing error
    rate* and the *training error rate*. The error that comes as a result of using
    a certain model to predict the output of a new observation is called the *testing
    error rate* .
  prefs: []
  type: TYPE_NORMAL
- en: 'You can see that:'
  prefs: []
  type: TYPE_NORMAL
- en: The **lower** the testing error rate, the good the model is.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The **higher** the rate is, the worse the model is.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Note
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Do not forget that the testing set was **not** used to train the model.
  prefs: []
  type: TYPE_NORMAL
- en: The training error rate can be easily calculated by applying the model to the
    dataset used in its training. But, you will notice that this error rate is often
    different from the test error rate and lower too, and it’s not a good measure
    for the model because it can underestimate the true accuracy.
  prefs: []
  type: TYPE_NORMAL
- en: As we want a good estimation of the testing error rate, we need a large testing
    set. But what if you cannot get a large dataset for testing? Here come some methods
    to estimate the testing error rate using the training dataset. In the next section
    we will consider a type of method that estimates the testing error rate by holding
    out a small subset of the training data, and not to train the model on this subset;
    it then uses the model to predict these subset outputs.
  prefs: []
  type: TYPE_NORMAL
- en: Validation Set Technique
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The validation set technique is a very simple technique for estimating testing
    error rate associated with training a model on a dataset. It involves randomly
    dividing the available training set into two pieces: a *training set* and a *validation
    set* (sometimes called *hold-out set*). The model trains on a *training data piece*;
    after training finishes, the model is used to predict the responses/outputs for
    the observations in the validation set and as a result, it provides an estimate
    of the testing error rate (Figure [7-1](#Fig1)).'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_7_Chapter/484548_1_En_7_Fig1_HTML.jpg](Images/484548_1_En_7_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-1
  prefs: []
  type: TYPE_NORMAL
- en: A strategic view of how a validation set works
  prefs: []
  type: TYPE_NORMAL
- en: 'The first thing we can start with is to load the dataset that we will work
    with in this chapter, the Iris dataset, which we introduced in a previous chapter.
    Then we create two variables: one for input features and another one for the target/output
    feature.'
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The Iris dataset comes as preloaded dataset in a datasets module at sklearn
    package.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE66]'
  prefs: []
  type: TYPE_PRE
- en: After loading the dataset into `X` and `y` variables, we also print the shape
    of both variables. It’s now time for sampling the data to choose points that will
    be in the training set and ones that will be in the validation and testing sets.
  prefs: []
  type: TYPE_NORMAL
- en: So, we import from the `sklearn.model_selection` module the `train_test_split`
    function that will divide the data into train and test portions.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE67]'
  prefs: []
  type: TYPE_PRE
- en: Then, we use it to divide both `X` and `y` into training `X, y` (to be called
    `X_train, y_train`) and testing `X, y` sets (to be called `X_test, y_test`).
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The training set will be equal to 60% of the whole dataset, and the testing
    set will be equal to 40% of the whole dataset.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE68]'
  prefs: []
  type: TYPE_PRE
- en: After the divide operation is done, and all sets are created from the sampling
    operation, let us print the shape of all sets to see the percentage of the divide
    operation. As we configured it, the training data has 90 observations of 150 total
    observations, and this means 60% of the data; and the testing set has 60 observations,
    which means that it is equal to 40% of the whole dataset.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE69]'
  prefs: []
  type: TYPE_PRE
- en: Now, we need to create the validation set, as we don’t have any function that
    can create all of the training, validating, and testing sets in one step. We need
    to do the same step of dividing the data on the test set, but this time we want
    the divide the 40% into 20% for testing and 20% for validating, so we will divide
    the testing set in half. In the following code, we divided the testing set into
    50% testing set and 50% validation set.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE70]'
  prefs: []
  type: TYPE_PRE
- en: After we divide, again, we print all sets to make sure that we are in the right
    place. As you can see, we did not touch the training set at all, the 90 observations
    in the training set remain untouched, while the testing set now is 30 observations
    instead of 60, and there’s a validation set that has 30 observations too.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE71]'
  prefs: []
  type: TYPE_PRE
- en: 'The model should train on the training set, and after the learning process
    (training) is finished the model is used to predict the outcome (responses) for
    the observations (input row) in the validation set. The resulting validation set
    error rate should be an estimate of the test error rate. The validation set approach
    is conceptually simple and easy to implement, but it has two potential drawbacks
    :'
  prefs: []
  type: TYPE_NORMAL
- en: The estimate of the test error rate that the validation set provides can be
    **highly variable**, depending on the process that selected which observation
    will be on the training set and which observation will be on the testing set.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The estimate of the test error rate that the validation set provide might overestimate
    the test error rate. That’s because we take a subset of the training and/or testing
    set as a validation set, and that makes the sets smaller in size, which means
    the model may perform worse due to fewer training observations.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: So, in the next approach, we will introduce an upgrade of the validation set
    called *cross-validation*; this approach is especially to address the two issues
    just mentioned.
  prefs: []
  type: TYPE_NORMAL
- en: Leave-One-Out Cross-Validation (LOOCV)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: LOOCV is very similar to a validation set and does the same job, but it was
    created to solve the drawbacks of a validation set.
  prefs: []
  type: TYPE_NORMAL
- en: Similar to a validation set, LOOCV splits the set of data into two parts. However,
    the validation set contains only a single observation (just one point of the dataset).
    Let us consider that this one point/observation is (*x*[1], *y*[1]) and this point
    is used for the validation set, and all other observations {(*x*[2], *y*[2]),
    …, (*x*[*n*], *y*[*n*])} are used for training the model (as training set). The
    model now learns from n-1 observations in the training set, and validates its
    learning process on only one observation. We are predicting y1 for the x1, since
    (*x*[1], *y*[1]) is not used on the learning process (training model), and the
    metric used contains errors for the first point (*x*[1], *y*[1]) that we describe
    as ![$$ {E}_1={\left({y}_1-\hat{y_1}\right)}^2 $$](Images/484548_1_En_7_Chapter_TeX_IEq1.png)
    for regression and ![$$ {E}_1={\left({y}_1\ne \hat{y_1}\right)}^2 $$](Images/484548_1_En_7_Chapter_TeX_IEq2.png)
    for classification.
  prefs: []
  type: TYPE_NORMAL
- en: Now we provide almost an unbiased estimate for the test error. But even though
    this error term is unbiased, it is still a poor estimate because it is highly
    variable; and you can sense it because we are using only one observation (*x*[1],
    *y*[1]) for validating our model knowledge.
  prefs: []
  type: TYPE_NORMAL
- en: If we want to fix this problem, we can simply repeat the same process by selecting
    (*x*[2], *y*[2]) as the validation set and all other observation as the training
    set. We train our model on *n* − 1 other observations and compute *E*[2] for the
    validation point *x*[2]. We repeat again for (*x*[3], *y*[3]), train the model,
    validate, and produce *E*[3]. We do it again for (*x*[4], *y*[4]) and produce
    *E*[4] and do it for all data points/observations for N times to produces *N*
    errors, *E*[1], …, *E*[*n*]. The LOOCV estimate for the test error now is the
    average of these *N* validation set error rates.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {CV}_{(N)}=\frac{1}{n}\sum \limits_i^N{E}_i $$](Images/484548_1_En_7_Chapter_TeX_Equa.png)'
  prefs: []
  type: TYPE_IMG
- en: 'As we can see, LOOCV has a couple of advantages that could not exist in the
    validation set approach:'
  prefs: []
  type: TYPE_NORMAL
- en: LOOCV has less bias than a validation set, because we repeatedly train the model
    on *n* − 1 data observations (and that’s almost the entire dataset). That doesn’t
    happen in the validation set approach; in the validation set approach, we take
    a subset of the whole dataset as the validation set and train the model on the
    other data subsets. So the LOOCV approach tends not to overestimate the test error
    rate as much as the validation set approach does.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: LOOCV produces the same results each time you run it; unlike the validation
    set approach, there is no randomness in the train-test splits. LOOCV repeatedly
    takes each data point as validation set one time and at the end calculates the
    mean error rate. There’s no randomness generated, because you do not select the
    validation set observations; you simply take each observation as validation for
    one time and iterate.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE72]'
  prefs: []
  type: TYPE_PRE
- en: We know that sklearn contains almost any function we need as we perform our
    machine learning pipeline, and it works for most of the dataset we will deal with.
    As a first step, we need to load the `LeaveOneOut` method from the `model_selection`
    module in Scikit-learn.
  prefs: []
  type: TYPE_NORMAL
- en: After loading the method, we need to load our data; for simplicity, we will
    use the iris preloaded dataset in the sklearn `datasets` module.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE73]'
  prefs: []
  type: TYPE_PRE
- en: Until now, we have loaded the method and data. Now we will start the work, and
    we’ll do that by initiating the `LeaveOneOut` class and getting the number of
    possible splits. As you see, there are 150 possible splits.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE74]'
  prefs: []
  type: TYPE_PRE
- en: Now we can use the loo instance for us, and we can do that by getting the starting
    and ending indices for both train and testing sets.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE75]'
  prefs: []
  type: TYPE_PRE
- en: For each iteration, the class instance will give the test one data point, and
    the rest will be in the training.
  prefs: []
  type: TYPE_NORMAL
- en: LOOCV may have a drawback, which concerns computational power. LOOCV can be
    expensive to implement, since the model has to train N times. So, if the dataset
    is large, this can be very time consuming, and you should consider the time the
    model takes to learn.
  prefs: []
  type: TYPE_NORMAL
- en: K-Fold Cross-Validation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'You might think that this new approach is an upgrade to LOOCV. K-Fold CV involves
    randomly dividing the dataset into k equal subsets/groups and they’re called *folds*.
    Then we take the first subset (fold) as a validation set and train the mode on
    the other *k* − 1 fold as a training-set. The validation error produced (let’s
    call it *E*[1]) is calculated from the validation set (hold-out fold). We repeat
    the process k times; each time, we take one different fold as the validation set
    and all other *k* − 1 as the training set. This process results in *k* estimate
    of the test error rate, which is *E*[1], …, *E*[*k*], and then we take the average:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {CV}_{(N)}=\frac{1}{N}{\sum}_{i=1}^N{E}_i $$](Images/484548_1_En_7_Chapter_TeX_Equb.png)'
  prefs: []
  type: TYPE_IMG
- en: You can see that LOOCV is a special case of K-Fold CV in which k is equal to
    N. In practice, the developer performs K-Fold CV using k=5 or k=10, but most developers
    do not use k=N due to computational power as we mentioned earlier.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE76]'
  prefs: []
  type: TYPE_PRE
- en: Bootstrap
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Bootstrap is a statistical technique used for sampling data with replacement.
  prefs: []
  type: TYPE_NORMAL
- en: For now, we have a little introduction for the bootstrap technique. We will
    use a real example that allows you to get a better idea about data resampling
    with bootstrap. There are other resampling techniques like Monte Carlo, and randomization
    techniques, but here we will talk only about the bootstrap technique.
  prefs: []
  type: TYPE_NORMAL
- en: The bootstrap method can be used to estimate the quantity of a population. This
    is done by repeatedly taking small samples, calculating the statistic, and taking
    the average of the calculated statistics.
  prefs: []
  type: TYPE_NORMAL
- en: Bootstrap in Statistics
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Bootstrap is denoted by *x*^∗. Let’s start to generate a bootstrap sample. We
    have N observations and need to sample them; we can get these samples from the
    distribution of population.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_7_Chapter/484548_1_En_7_Figa_HTML.jpg](Images/484548_1_En_7_Figa_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: So, N observations are *x*[1] = 2, *x*[2] = 1, *x*[3] = 7, …, *x*[*N*] = 5 for
    instance.
  prefs: []
  type: TYPE_NORMAL
- en: The sample we get from N observations we can denote as vector ![$$ x\left(\underset{\_}{x}\right)
    $$](Images/484548_1_En_7_Chapter_TeX_IEq3.png) and we can make any operation in
    this sample, like mean ![$$ S=\theta \left(\underset{\_}{x}\right) $$](Images/484548_1_En_7_Chapter_TeX_IEq4.png).
    This action can be done without replacement, or we can do the same but with replacement.
    What’s the difference between replacement and without replacement? With replacement
    means that we can repeat the same value more than one in the same observation,
    but without replacement we can’t repeat the value in an observation more than
    once. Note the observation should be *IID* (independent identical distribution).
    Identically distributed means that there are no overall trends—the distribution
    doesn’t fluctuate, and all items in the sample are taken from the same probability
    distribution. Independent means that the sample items are all independent events.
    So let’s complete the bootstrap.
  prefs: []
  type: TYPE_NORMAL
- en: So *N* observations are *x*[1] = 2, *x*[2] = 1, *x*[3] = 7, …, *x*[*N*] = 5\.
    The sample we get from N-observation can be denoted as Bootstrap *x* (*x*^∗)
  prefs: []
  type: TYPE_NORMAL
- en: And we can make any operation in this sample like mean S = (*x*^∗) but here
    with replacement. Let’s see a figure that may make things easier.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_7_Chapter/484548_1_En_7_Figb_HTML.jpg](Images/484548_1_En_7_Figb_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Basically, the bootstrap method is a statistical technique for estimating quantities
    about a population by averaging estimates from multiple small data samples.
  prefs: []
  type: TYPE_NORMAL
- en: You can see the difference between these two examples in the following image.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_7_Chapter/484548_1_En_7_Fig2_HTML.jpg](Images/484548_1_En_7_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-2
  prefs: []
  type: TYPE_NORMAL
- en: Sample distribution
  prefs: []
  type: TYPE_NORMAL
- en: Tips to Use Bootstrap (Resampling with Replacement)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To give you the best experience using the bootstrap technique, we summarized
    it into steps, and you can use these steps to create your data selection pipeline.
  prefs: []
  type: TYPE_NORMAL
- en: Maintains data structure but reshuffles values, extrapolating to the population
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The procedure can sample each value multiple times, or not at all.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Useful for estimating statistic parameters where data are nonnormal
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Has unknown statistical properties (e.g., PCA—we will discuss it in a later
    chapter).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'So, let us give some thought to how this method works, get into more details
    about it, and see how we can make these samples. The process for building one
    sample can be summarized as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: Choose the size of the sample.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'If the size of the sample is less than the chosen size:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Randomly select an observation from the dataset.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Add it to the sample.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The bootstrap method can calculate the quantity of population in the following
    steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Choose a number of bootstrap samples to perform.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Choose a sample size.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'For each bootstrap sample:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Draw a sample with replacement with the chosen size.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Calculate the statistic on the sample.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Calculate the mean of the calculated sample statistics.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: After setting up the theoretical toolbox, let’s take an example to demonstrate
    how these statistical methods work.
  prefs: []
  type: TYPE_NORMAL
- en: 'Imagine we have a dataset with 6 observations:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE77]'
  prefs: []
  type: TYPE_PRE
- en: The first step is to choose the size of the sample. Here, we will use `4`. Next,
    we must randomly choose the first observation from the dataset. Let’s choose `0.2`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE78]'
  prefs: []
  type: TYPE_PRE
- en: This observation is returned to the dataset, and we repeat this step three more
    times.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE79]'
  prefs: []
  type: TYPE_PRE
- en: We now have our data sample. The example purposefully demonstrates that the
    same value can appear zero, or one or more times in the sample. Here the observation
    0.2 appears twice. An estimate can then be calculated on the drawn sample.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE80]'
  prefs: []
  type: TYPE_PRE
- en: Those observations not chosen for the sample may be used as out-of-bag observations.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE81]'
  prefs: []
  type: TYPE_PRE
- en: In the case of evaluating a machine learning model, the model is fit on the
    drawn sample and evaluated on the out-of-bag sample.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE82]'
  prefs: []
  type: TYPE_PRE
- en: That concludes one repeat of the procedure. It can be repeated 30 or more times
    to give a sample of calculated statistics.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE83]'
  prefs: []
  type: TYPE_PRE
- en: This sample of statistics can then be summarized by calculating a mean, standard
    deviation, or other summary value to give a final usable estimate of the statistic.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE84]'
  prefs: []
  type: TYPE_PRE
- en: At the end of this section, we should know what sampling is, how we use it with
    replacement and without replacement, and the difference between them when we use
    it with statistical functions.
  prefs: []
  type: TYPE_NORMAL
- en: Generators
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When you are working on developing a machine/deep learning model, you might
    experience lack of memory while feeding datasets into the model. The moment you
    run into memory errors when trying to take the training data into memory, you
    know that you have to switch your data feeding strategy.
  prefs: []
  type: TYPE_NORMAL
- en: Even state-of-the-art configurations might go out of memory sometimes to process
    the whole data. That is the reason why we need to find other ways to do that task
    efficiently. The only way to do it is by loading the data in real time; hence,
    we are going to show you how to generate your dataset on multiple cores in real
    time and feed it right away to your deep learning models.
  prefs: []
  type: TYPE_NORMAL
- en: What Are Keras Generators?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A generator is just a module in Keras, which is used to get batches of input
    and corresponding output on the fly during the training process.
  prefs: []
  type: TYPE_NORMAL
- en: An example is reading in a set that contains an input of 100 images, getting
    a corresponding 100 label vector, and then feeding this set to the GPU for the
    training step. We have to keep in mind that, in some cases, even the most state-of-the-art
    configuration won’t have enough memory space to process the data the way we used
    to do it. That is the reason why we need to find other ways to do that task efficiently.
    We are going to show you how to generate your dataset on multiple cores in real
    time and feed it right away to your deep learning models.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see an example, to get a better idea about *data_generator*, and we will
    talk about **train-on-the-fly** module too. Let’s start with the Keras package;
    we need it to use generators, and now you can import it from TensorFlow too as
    a module.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE85]'
  prefs: []
  type: TYPE_PRE
- en: The example we go through is a teaching example to learn how to use this package
    to enhance feeding your data into your model.
  prefs: []
  type: TYPE_NORMAL
- en: 'Before getting started, let’s go through a few organizational tips that are
    particularly useful when dealing with large datasets. Let **ID** be the string
    that identifies a given sample of the dataset. A good way to keep track of samples
    and their labels is to adopt the following framework:'
  prefs: []
  type: TYPE_NORMAL
- en: Create a dictionary called `partition` where you gather
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: in `partition['train']` a list of training IDs
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: in `partition['validation']` a list of validation IDs
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Create a dictionary called `labels` where for each **ID** of the dataset, the
    associated label is given by `labels[ID]`.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, let’s say that our training set contains `id-1`, `id-2`, and `id-3`
    with respective labels 0, 1, and 2, with a validation set containing `id-4` with
    label 1\. In that case, the Python variables partition and labels look like:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE86]'
  prefs: []
  type: TYPE_PRE
- en: Now we get a basic idea about how data is partitioned and labeled, and what
    the folder looks like to separate data, `classes`, and labeled data. A `data/`
    folder is used to save your dataset in it.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE87]'
  prefs: []
  type: TYPE_PRE
- en: Data Generator
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now, let’s go through the details of how to set up the Python class `DataGenerator`,
    which will be used for real-time data feeding to your Keras model.
  prefs: []
  type: TYPE_NORMAL
- en: 'So, let’s now write the initialization function of the class as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE88]'
  prefs: []
  type: TYPE_PRE
- en: Now we initialize the variables we need. But let’s consider every variable,
    dimension sizes (e.g., a volume of length 32 will have `dim=(32,32,32)`), number
    of channels, number of classes, and batch size or decide whether we want to shuffle
    our data at generation. And we store important information such as labels and
    the list of IDs that we wish to generate at each pass.
  prefs: []
  type: TYPE_NORMAL
- en: Now I need to talk about callback functions, and `on_epoch_end` is one of them.
  prefs: []
  type: TYPE_NORMAL
- en: But before talking about the functions we use, as we are accustomed in this
    book, we’ll try to cover the basics about what is a callback.
  prefs: []
  type: TYPE_NORMAL
- en: A callback is a set of functions to be applied at given stages of the training
    procedure. You can use callbacks to get a view on internal states and statistics
    of the model during training. You can pass a list of callbacks (as the keyword
    argument callbacks) to the `fit()` method of the Sequential or Model classes.
    The relevant methods of the callbacks will then be called at each stage of the
    training.
  prefs: []
  type: TYPE_NORMAL
- en: Callback
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: One of the important modules we can use a lot is the `keras.callbacks.Callback()`
    module . This API allows you to specify which metric to monitor, such as loss
    or accuracy on the training or validation dataset. You can specify whether to
    look for an improvement in maximizing or minimizing the score. Finally, the filename
    that you use to store the weights can include variables like the epoch number
    or metric. The Keras documentation defines.
  prefs: []
  type: TYPE_NORMAL
- en: '*params* : Dictionary. Training parameters (e.g., verbosity, batch size, number
    of epochs...)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*model*: an instance of keras.models.Model . Reference of the model being trained'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The logs dictionary that callback methods take as an argument will contain keys
    for quantities relevant to the current batch or epoch.
  prefs: []
  type: TYPE_NORMAL
- en: 'Currently, the `fit(...)` method of the Sequential model class will include
    the following quantities in the logs that it passes to its callbacks:'
  prefs: []
  type: TYPE_NORMAL
- en: '`on_epoch_end`: Logs include acc and loss, and optionally include val_loss
    (if validation is enabled in fit), and val_acc (if validation and accuracy monitoring
    are enabled).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`on_batch_begin`: Logs include size, the number of samples in the current batch.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`on_batch_end`: Logs include loss, and optionally acc (if accuracy monitoring
    is enabled).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For more about callbacks, you can see the documentation at [`http://faroit.com/keras-docs/1.1.0/callbacks/`](http://faroit.com/keras-docs/1.1.0/callbacks/).
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s talk about the function `on_epoch_end()` ; as we see, you can use
    it by using its parameters. Let’s see an example. This function is very important
    in training and not just in the generator example; for example, if we train a
    model and this model gets an accuracy that satisfies us and it still has many
    epochs that will waste our time, we use `on_epoch_end()`. Let’s get the definition
    of `on_epoch_end()` .
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE89]'
  prefs: []
  type: TYPE_PRE
- en: In this example, the model will stop training after we get an accuracy of 60%,
    which we are satisfied with at this time so we don’t need to initialize the number
    of epochs.
  prefs: []
  type: TYPE_NORMAL
- en: Since we are talking about generators, after we finish the initialization process
    it’s time to continue this process into a new task. Shuffling the order in which
    examples are fed to the classifier is helpful, so that batches between epochs
    do not look alike. Doing so will eventually make our model more robust.
  prefs: []
  type: TYPE_NORMAL
- en: 'Another method that is core to the generation process is one that achieves
    the most crucial job: producing batches of data. The private method in charge
    of this task is called `__data_generation` and takes as argument the list of IDs
    of the target batch.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE90]'
  prefs: []
  type: TYPE_PRE
- en: During data generation, this code reads the NumPy array of each example from
    its corresponding file `ID.npy`. Since our code is multicore friendly, note that
    you can do more complex operations instead (e.g., computations from source files)
    without worrying that data generation becomes a bottleneck in the training process.
  prefs: []
  type: TYPE_NORMAL
- en: Also, please note that we used the `keras.utils.to_categorical` method to convert
    our numerical labels stored in `y` to a binary form—to be specific, one-hot vector
    form—(e.g., in a 6-class problem, the third label corresponds to `[0 0 1 0 0 0]`)
    suited for classification.
  prefs: []
  type: TYPE_NORMAL
- en: Now comes the part where we build up all these components together. Each call
    requests a batch index between 0 and the total number of batches, where the latter
    is specified in the `__len__` method .
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE91]'
  prefs: []
  type: TYPE_PRE
- en: 'A common practice is to set this value to ![$$ \frac{\# Samples}{Batch\ Size}
    $$](Images/484548_1_En_7_Chapter_TeX_IEq5.png) so that the model sees the training
    samples at most once per epoch. Now that we have a basic understanding about data
    generators, we will see an example about it with a real dataset. Let’s choose
    a simple dataset: the cats and dogs dataset, [`www.kaggle.com/c/dogs-vs-cats`](http://www.kaggle.com/c/dogs-vs-cats).
    Then the data should be in this structure:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE92]'
  prefs: []
  type: TYPE_PRE
- en: Let’s see a code for this data set. You don’t need to understand it in detail—it
    will be explained in in detail Part III—but we want you to see the data generator
    used in a real problem.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE93]'
  prefs: []
  type: TYPE_PRE
- en: Now that we’ve finished this, you can have fun with generators and callbacks.
    Now you can either evaluate or deploy your model; it’s up to you.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this chapter we have introduced sampling techniques. Sampling is a very important
    step before building a model, and it ensures that the model learns the most from
    the selected data, not to get biased using the training data. You learned how
    to create a good training and testing set. We discussed several techniques, one
    of them being the bootstrap, which is a very strong statistical method for sampling
    the data. And finally, we gave a technical example of how the data generator method
    in Keras works on getting data and feeding it to the model.
  prefs: []
  type: TYPE_NORMAL
- en: 8. Feature Selection and Feature Engineering
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Feature selection and engineering are important steps in a *machine learning
    pipeline* and involves all the techniques adopted to reduce their dimensionality.
    Most of the time, these steps come after cleaning the dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Most algorithms have strong assumptions about the input data, and their performance
    can be negatively affected when raw datasets are used. Moreover, the data is seldom
    isotropic; there are often features that determine the general behavior of a sample,
    while others that are correlated don’t provide any additional pieces of information.
    So, it’s important to have a clear view of a dataset and know the most common
    algorithms used to reduce the number of features or select only the best ones.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, you will learn about three fundamental techniques that will
    help to summarize and compress the information content of a dataset by transforming
    it onto a new feature subspace of lower dimensionality than the original one.
    Data compression is an important topic in machine learning, and it helps us to
    compress, store, and analyze a huge amount of data. So, we will cover the following
    topics:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Principal component analysis (PCA)** for unsupervised data compression'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Linear discriminant analysis (LDA)** is a supervised dimensionality reduction
    technique for maximizing class separability'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Nonlinear dimensionality reduction via **kernel principal component analysis**
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Dataset Used in This Chapter
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Scikit-learn provides some built-in datasets that can be used for testing purposes.
    They’re all available in the module `sklearn.datasets` and have a common structure:'
  prefs: []
  type: TYPE_NORMAL
- en: The `desc` instance variable contains a description about the data set you are
    using.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The `data` instance variable contains the whole input set X.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: While `target` contains the labels for *classification* or response values for
    *regression*.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'For example, considering the Boston house pricing dataset (used for regression),
    we have:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE94]'
  prefs: []
  type: TYPE_PRE
- en: In the Boston dataset, we have
  prefs: []
  type: TYPE_NORMAL
- en: 506 samples or observations
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 13 features or predictors
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: single target or response value
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In this chapter, we’re going to use both the *Boston House Prices* dataset for
    *regression examples* and the *MNIST handwritten digit* dataset for *classification
    tasks*. For each concept we will describe in this chapter we will go through an
    example using these datasets to show you how to deal with the large number of
    variables and the hidden knowledge in your data.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE95]'
  prefs: []
  type: TYPE_PRE
- en: Similarly, you can import the *MNIST handwritten digit* dataset from the `sklearn.datasets`
    module; it’s very simple and saves time for learning and experimentation.
  prefs: []
  type: TYPE_NORMAL
- en: The MNIST dataset provided by Scikit-learn is limited for many reasons; the
    first reason is to make it easier for educational purposes. If you want to experiment
    with the original dataset, refer to the web site [`http://yann.lecun.com/exdb/mnist/`](http://yann.lecun.com/exdb/mnist/).
    Here you can download a full version that contains up to 70,000 handwritten digits
    already, split into training and test sets.
  prefs: []
  type: TYPE_NORMAL
- en: 'Scikit-learn also provides functions for creating dummy datasets from scratch:'
  prefs: []
  type: TYPE_NORMAL
- en: make_classification()
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: make_regression()
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: make_blobs() (*particularly useful for testing cluster algorithms*)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: They’re very easy to use, and in many cases it’s the best choice to test a model
    if you do not have a dataset and without loading more complex datasets, or for
    educational purposes.
  prefs: []
  type: TYPE_NORMAL
- en: You can visit the sklearn datasets web site [`https://scikit-learn.org/stable/da`](https://scikit-learn.org/stable/da)
    for further information about all datasets provided by Scikit-learn.
  prefs: []
  type: TYPE_NORMAL
- en: Dimensionality Reduction—Questions to Answer
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'If you are working in a new project, and you have been provided with a dataset
    that contains dozens of variables, would you ever wonder what to do with all those
    variables? So, the real question is the following: *what happens when your dataset
    has too many* *variables* *?*'
  prefs: []
  type: TYPE_NORMAL
- en: 'You may have faced some of these situations, or at least you might have thought
    of them:'
  prefs: []
  type: TYPE_NORMAL
- en: You find that most of the variables are **correlated**.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You lose patience and decide to run a model on whole data. This returns **poor
    accuracy** and you feel terrible.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You become indecisive about what to do.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You start thinking of some strategic method to **find** a few *important variables*.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: So, we need an approach that can choose important variables, or in other words,
    select the important variables that can affect the model and produce a good estimation
    for the output.
  prefs: []
  type: TYPE_NORMAL
- en: Another reason is that the feature selection and extraction topic is important
    to understand in the fields of statistics and data science. But when putting a
    lesson together for students or anyone wants to learn it, we found that the resources
    online were too technical, didn’t fully address our needs, and/or provided conflicting
    information.
  prefs: []
  type: TYPE_NORMAL
- en: As a result, we wanted to put together the “*What*”, “*When*,” “*How*,” and
    “*Why*” of this topic and answer them in specific detail. Specifically, we wanted
    to present the rationale for this topic, the math under the hood, some best practices,
    and potential drawbacks to each method under this topic.
  prefs: []
  type: TYPE_NORMAL
- en: What Is Dimensionality Reduction?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'If you’ve worked with a lot of variables before, you know this can cause some
    problems to you and the model you are building. So you may decide to select some
    variables that are important to help you to get the most of your dataset and will
    make the model reach the highest accuracy. On the other hand, you’ll want to remove
    all the variables those will not do those things for you. To do all that—the selecting/removing
    process—you need to answer the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Do you understand the relationships between each variable?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Do you have so many variables that you are in danger of overfitting your model
    to your data, or you might be violating assumptions of whichever modeling tactics
    you’re using?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You might ask the question *How do I take all of the variables I’ve collected
    and focus on only a few of them?* In technical terms, you want to “reduce the
    dimension of your feature space” by reducing the dimension of your feature space.
    You’ll have fewer relationships between variables to consider and you are less
    likely to overfit your model.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This doesn’t immediately mean that overfitting, etc. are no longer concerns — but
    we’re moving in the right direction!
  prefs: []
  type: TYPE_NORMAL
- en: 'Somewhat unsurprisingly, reducing the dimensions of the feature space is called
    *dimensionality reduction*. There are many ways to achieve dimensionality reduction,
    but most of these techniques fall into one of two classes:'
  prefs: []
  type: TYPE_NORMAL
- en: Feature elimination
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Feature extraction
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Feature elimination** is what it sounds like: we reduce the feature space
    by eliminating features. Instead of considering every single variable, we might
    drop all variables except the three we think will best predict what the United
    States’ gross domestic product will look like. Advantages of feature elimination
    methods include simplicity and maintaining interpretability of your variables.'
  prefs: []
  type: TYPE_NORMAL
- en: As a disadvantage, though, you gain no information from those variables you’ve
    dropped. If we only use last year’s GDP, the proportion of the population in manufacturing
    jobs per the most recent American Community Survey numbers, and the unemployment
    rate to predict this year’s GDP, we’re missing out on whatever the dropped variables
    could contribute to our model. By eliminating features, we’ve also entirely eliminated
    any benefits those dropped variables would bring.
  prefs: []
  type: TYPE_NORMAL
- en: '**Feature extraction**, however, doesn’t run into this problem. Say we have
    ten independent variables. In feature extraction, we create ten “new” independent
    variables, where each new independent variable is a combination of each of the
    ten “old” independent variables. However, we create these new independent variables
    in a specific way and order these new variables by how well they predict our dependent
    variable.'
  prefs: []
  type: TYPE_NORMAL
- en: You might ask *where does the dimensionality reduction come into play?* Well,
    we keep as many of the new independent variables as we want, but we drop the least
    important ones. Because we ordered the new variables by how well they predict
    our dependent variable, we know which variable is the most important and least
    important. But — and here’s the kicker — because these new independent variables
    are combinations of our old ones, we’re still keeping the most valuable parts
    of our old variables, even when we drop one or more of these “new” variables!
  prefs: []
  type: TYPE_NORMAL
- en: When Should I Use Dimensionality Reduction?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Do you want to **reduce** the number of variables, but aren’t able to identify
    what are the important variables and what are the variables you consider to remove?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Do you want to ensure your variables are **independent** of one another, or
    there’s no **correlation** between any of the *predictor/input* variables?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Do you care about the **interpretability** of the dataset variables?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If you answered “yes” to all three questions, then dimensionality reduction
    is a good approach to use. If you answered “no” to question 3, you **should not**
    use dimensionality reduction.
  prefs: []
  type: TYPE_NORMAL
- en: Finally , **how** and **why** are subject to the properties of each method,
    so they will be answered while describing and illustrating each method in the
    approach of dimensionality reduction.
  prefs: []
  type: TYPE_NORMAL
- en: Unsupervised Dimensionality Reduction via Principal Component Analysis (PCA)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As we explained, we can use feature extraction to reduce the number of features
    in a dataset. We can do that by using a feature extraction algorithm to transform
    or project the data onto a new feature space.
  prefs: []
  type: TYPE_NORMAL
- en: In the context of dimensionality reduction, feature extraction can be understood
    as an approach to data compression with the goal of maintaining most of the relevant
    information. Feature extraction is typically used to improve computational efficiency
    but can also help to reduce the curse of dimensionality.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Using dimensionality reduction is very good if we are working with nonregularized
    models, and that’s because it reduces the data complexity; hence, they are two
    different problems that work on similar areas.
  prefs: []
  type: TYPE_NORMAL
- en: The curse of dimensionality refers to phenomena that arise when analyzing and
    organizing data in high-dimensional spaces. The common theme of these problems
    is that when the dimensionality increases, the volume of the space increases so
    fast that the available data becomes sparse.
  prefs: []
  type: TYPE_NORMAL
- en: '**PCA** is an *unsupervised linear transformation* technique that is widely
    used across different fields, most prominently for dimensionality reduction. Other
    popular applications of PCA include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Exploratory data analyses and denoising of signals in stock market trading
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The analysis of genome data and gene expression levels in the field of bioinformatics
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: PCA helps us to identify patterns in data based on the correlation between features.
    In a nutshell, PCA aims to find the direction of maximum variance in high-dimensional
    data and projects it onto a new subspace with equal or fewer dimensions than the
    original one. The orthogonal axes (principal components) of the new subspace can
    be interpreted as the direction of maximum variance given the constraint that
    the new feature axes are orthogonal to each other, as illustrated in Figure [8-1](#Fig1).
    Here, x1 and x2 are the original feature axes, and PC1 and PC2 are the principal
    components.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_8_Chapter/484548_1_En_8_Fig1_HTML.jpg](Images/484548_1_En_8_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8-1
  prefs: []
  type: TYPE_NORMAL
- en: The two-principle dimensions of the dataset
  prefs: []
  type: TYPE_NORMAL
- en: 'If we use PCA for dimensionality reduction, we construct a dk-dimensional transformation
    matrix W. That allows us to map a sample vector x onto a new k-dimensional feature
    subspace that has fewer dimensions than the original d-dimensional feature space:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ x=\left[{x}_1,{x}_2,\dots, {x}_{d-1},{x}_d\right],x\in {R}^d $$](Images/484548_1_En_8_Chapter_TeX_Equa.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ \downarrow xW,W\in {R}^{d\times k} $$](Images/484548_1_En_8_Chapter_TeX_Equb.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ z=\left[{z}_1,{z}_2,\dots, {z}_{k-1},{z}_k\right] $$](Images/484548_1_En_8_Chapter_TeX_Equc.png)'
  prefs: []
  type: TYPE_IMG
- en: As a result of transforming the original *d*-dimensional data onto this new
    *d*-dimensional subspace (typically *k* ≪ *d*), the first principal component
    has the largest possible variance, and all subsequent principal components will
    have the largest possible variance given that they are uncorrelated (orthogonal)
    to the other principal components. Note that the *PCA* directions are highly sensitive
    to data scaling, and we need to standardize the features *prior* to PCA if the
    features were measured on different scales and we want to assign equal importance
    to all features.
  prefs: []
  type: TYPE_NORMAL
- en: 'Before looking at the PCA algorithm for dimensionality reduction in more detail,
    let’s summarize the approach in a few simple steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Standardize the *d*-dimensional dataset.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Construct the covariance matrix.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Decompose the covariance matrix into its eigenvectors and eigenvalues.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select *k* eigenvectors that correspond to the *k* largest eigenvalues, where
    *k* is the dimensionality of the new feature subspace (*k* ≤ *d*).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Construct a projection matrix W from the “top” *k* eigenvectors.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Transform the *d*-dimensional input dataset *X* using the projection matrix
    *W* to obtain the new *k*-dimensional feature subspace.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Total and Explained Variance
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In this subsection, we will tackle the first four steps of a PCA:'
  prefs: []
  type: TYPE_NORMAL
- en: Standardizing the data
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Constructing the covariance matrix
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Obtaining the eigenvalues and eigenvectors of the covariance matrix
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sorting the eigenvalues by decreasing order to rank the eigenvectors
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Feature Selection and Filtering
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As we explained earlier, the unnormalized dataset with many features contains
    information proportional to the independence of all features and their variance.
    Let’s consider a small dataset with three features, generated randomly from many
    Gaussian distributions (Figure [8-2](#Fig2)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_8_Chapter/484548_1_En_8_Fig2_HTML.jpg](Images/484548_1_En_8_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8-2
  prefs: []
  type: TYPE_NORMAL
- en: The standard deviation of different datasets
  prefs: []
  type: TYPE_NORMAL
- en: Even without further analysis, it’s obvious that the central line (*with the
    lowest variance* `std=0.5`) is almost constant and doesn’t provide any useful
    information. On the other hand, the other two variables carry more information,
    as they have a higher variance than the central line and their `std=5.0`.
  prefs: []
  type: TYPE_NORMAL
- en: 'A variance threshold is therefore a useful approach to remove all those elements
    whose contribution is under a predefined level. Scikit-learn provides the class
    `VarianceThreshold` that can easily solve this problem. By applying it on the
    previous dataset, we get the following result:'
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The variance threshold removes the elements based on their variability and so,
    information.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE96]'
  prefs: []
  type: TYPE_PRE
- en: 'The third feature has been completely removed because its variance is under
    the selected `threshold=1.5`. There are also many univariate methods that can
    be used in order to select the best features according to specific criteria based
    on *F-tests and p-values*, such as **chi-square** or **ANOVA** . However, their
    discussion is beyond the scope of this book, and the reader can find further information
    in *Statistics* by David Freedman, Robert Pisani, and Roger Purves *(*Norton &
    Company, 2011). Two examples of feature selection that use the classes `SelectKBest`
    (which selects the *best* K-score features) and `SelectPercentile` (which selects
    only a subset of features belonging to a certain percentile) are shown next. It’s
    possible to apply them both to regression and classification datasets, being careful
    to select appropriate score functions:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE97]'
  prefs: []
  type: TYPE_PRE
- en: For further details about all Scikit-learn score functions and their usage,
    visit the Scikit-learn feature selection ([`https://scikit-learn.org/stable/modules/feature_selection.html#univariate-feature-selection`](https://scikit-learn.org/stable/modules/feature_selection.html#univariate-feature-selection)).
  prefs: []
  type: TYPE_NORMAL
- en: Principal Component Analysis
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In many cases, the dimensionality of the input dataset *X* is high and so is
    the complexity of every related machine learning algorithm. Moreover, the information
    is spread uniformly across all the features. In general, if we consider a Euclidean
    space, we have
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ X=\left\{x{\acute{\mkern6mu}}_1,x{\acute{\mkern6mu}}_2,\dots, x{\acute{\mkern6mu}}_{n-1},x{\acute{\mkern6mu}}_n\right\}
    wherex{\acute{\mkern6mu}}_i\in {R}^m\wedge x{\acute{\mkern6mu}}_i=x{\acute{\mkern6mu}}_{i1}{e}_1+\dots
    +x{\acute{\mkern6mu}}_{im}{e}_m $$](Images/484548_1_En_8_Chapter_TeX_Equd.png)'
  prefs: []
  type: TYPE_IMG
- en: 'So, each point is expressed using an orthonormal basis made of m linearly independent
    vectors. Now, considering a dataset *X*, a natural question arises: *is it possible
    to reduce m without a drastic loss of information?* Let’s consider Figure [8-3](#Fig3)
    (without any particular interpretation).'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_8_Chapter/484548_1_En_8_Fig3_HTML.jpg](Images/484548_1_En_8_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8-3
  prefs: []
  type: TYPE_NORMAL
- en: Revisiting principle component image
  prefs: []
  type: TYPE_NORMAL
- en: It doesn’t matter which distributions generated *X* = (*x*, *y*); however, the
    variance of the horizontal component is clearly higher than the vertical one.
    As discussed, it means that the amount of information provided by the first component
    is higher and, for example, if the x-axis is stretched horizontally keeping the
    vertical one fixed, the distribution becomes similar to a segment where the depth
    has lower and lower importance.
  prefs: []
  type: TYPE_NORMAL
- en: In order to assess how much information is brought by each component, and the
    correlation among them, a useful tool is the covariance matrix (Figure [8-4](#Fig4);
    if the dataset has zero mean, we can use the correlation matrix).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_8_Chapter/484548_1_En_8_Fig4_HTML.jpg](Images/484548_1_En_8_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8-4
  prefs: []
  type: TYPE_NORMAL
- en: The covariance equation
  prefs: []
  type: TYPE_NORMAL
- en: '*C* is symmetric and positive semidefinite, so all the eigenvalues are nonnegative,
    but *what''s the meaning of each value?* The covariance matrix *C* for the previous
    example is symmetric; As expected, the horizontal variance is quite a bit higher
    than the vertical one. Moreover, the other values are close to zero. If you remember
    the definition and, for simplicity, remove the mean term, they represent the cross-correlation
    between couples of components. It’s obvious that in our example, *X* and *Y* are
    uncorrelated (they’re orthogonal), but in real-life examples, there could be features
    that present a residual cross-correlation. In terms of information theory, it
    means that knowing *Y* gives us some information about *X* (which we already know),
    so they share information that is indeed doubled. So, our goal is also to decorrelate
    *X* while trying to reduce its dimensionality. This can be achieved by considering
    the sorted eigenvalues of *C* and selecting the best principle component values:'
  prefs: []
  type: TYPE_NORMAL
- en: 'So, it’s possible to project the original feature vectors into this new (sub-)space,
    where each component carries a portion of total variance and where the new covariance
    matrix is decorrelated to reduce useless information sharing (in terms of correlation)
    among different features. In Scikit-learn, there’s the PCA class, which can do
    all this in a very smooth way:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE98]'
  prefs: []
  type: TYPE_PRE
- en: A figure with a few random MNIST handwritten digits is shown in Figure [8-5](#Fig5).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_8_Chapter/484548_1_En_8_Fig5_HTML.jpg](Images/484548_1_En_8_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8-5
  prefs: []
  type: TYPE_NORMAL
- en: The MNIST dataset
  prefs: []
  type: TYPE_NORMAL
- en: 'Each image is a vector of 64 *unsigned int* (8 bit) numbers (0, 255), so the
    initial number of components is indeed 64\. However, the total amount of black
    pixels is often predominant and the basic signs needed to write 10 digits are
    similar, so it’s reasonable to assume both high cross-correlation and a low variance
    on several components. Trying with 36 principal components, we get:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE99]'
  prefs: []
  type: TYPE_PRE
- en: '![../images/484548_1_En_8_Chapter/484548_1_En_8_Fig6_HTML.jpg](Images/484548_1_En_8_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8-6
  prefs: []
  type: TYPE_NORMAL
- en: The scatter plot of PCA output
  prefs: []
  type: TYPE_NORMAL
- en: 'In order to improve performance, all integer values are normalized into the
    range `[0, 1]` and, through the parameter `whiten=True`, the variance of each
    component is scaled to one. As also the official Scikit-learn documentation says,
    this process is particularly useful when an isotropic distribution (any distribution
    has a simple shape to your eye but very complex shape to the algorithm) is needed
    for many algorithms to perform efficiently. It’s possible to access the explained
    variance ratio through the instance variable `explained_variance_ratio_`, which
    shows which part of the total variance is carried by each single component:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE100]'
  prefs: []
  type: TYPE_PRE
- en: A plot for the example of MNIST digits is shown next (Figure [8-7](#Fig7)).
    The bottom graph represents the variance ratio, while the top one is the cumulative
    variance. It can be immediately seen how the first components are normally the
    most important ones in terms of information, while the following ones provide
    details that a classifier could also discard.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_8_Chapter/484548_1_En_8_Fig7_HTML.jpg](Images/484548_1_En_8_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8-7
  prefs: []
  type: TYPE_NORMAL
- en: The histogram and CDF plot of the variance per each component
  prefs: []
  type: TYPE_NORMAL
- en: 'As expected, the contribution to the total variance decreases dramatically
    starting from the fifth component, so it’s possible to reduce the original dimensionality
    without an unacceptable loss of information, which could drive an algorithm to
    learn wrong classes. In the preceding graph, there are the same handwritten digits
    rebuilt using the first *36 components* with whitening and normalization between
    *0* and *1*. To obtain the original images, we need to inverse-transform all new
    vectors and project them into the original space:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE101]'
  prefs: []
  type: TYPE_PRE
- en: The result is shown in Figures [8-8](#Fig8) and [8-9](#Fig9).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_8_Chapter/484548_1_En_8_Fig9_HTML.jpg](Images/484548_1_En_8_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8-9
  prefs: []
  type: TYPE_NORMAL
- en: The output of PCA inversion vs. the real image
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_8_Chapter/484548_1_En_8_Fig8_HTML.jpg](Images/484548_1_En_8_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8-8
  prefs: []
  type: TYPE_NORMAL
- en: The output of PCA inversion
  prefs: []
  type: TYPE_NORMAL
- en: This process can also partially denoise the original images by removing residual
    variance, which is often associated with noise or unwanted contributions (almost
    every calligraphy distorts some of the structural elements that are used for recognition).
  prefs: []
  type: TYPE_NORMAL
- en: 'I suggest the reader try different numbers of components (using the explained
    variance data) and also `n_components=''mle''`, which implements an automatic
    selection of the best dimensionality (“Automatic Choice of Dimensionality for
    PCA” by Thomas P. Minka (NIPS, 2000: 598-604)). Scikit-learn solves the **PCA**
    problem with **SVD** (singular value decomposition), which can be studied in detail
    in *Linear Algebra* by David Poole (Brooks Cole, 2015). It’s possible to control
    the algorithm through the parameter `svd_solver`, whose values are `''auto''`,
    `''full''`, `''arpack''`, and `''randomized''`.'
  prefs: []
  type: TYPE_NORMAL
- en: Nonnegative Matrix Factorization
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'When the dataset is made up of nonnegative numbers, it’s possible to use a
    good algorithm called *nonnegative matrix factorization* (NNMF) instead of using
    standard PCA. The algorithm optimizes a loss function (alternatively on *W* and
    *H*) based on the Frobenius norm:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ L=\frac{1}{2}{\left\Vert X- WH\right\Vert}_{Frob}^2, where{\left\Vert
    A\right\Vert}_{Frob}^2=\sqrt{\sum_i{\sum}_j{\left|{a}_{ij}\right|}^2} $$](Images/484548_1_En_8_Chapter_TeX_Eque.png)'
  prefs: []
  type: TYPE_IMG
- en: If *dim*(*X*) = *n* × *m*, then *dim*(*W*) = *n* × *p* and *dim*(*H*) = *p* × *m*
    with *p* equal to the number of requested components (the `n_components` parameter),
    which is normally *smaller than* the original dimensions *n* and *m*.
  prefs: []
  type: TYPE_NORMAL
- en: 'The final reconstruction is purely additive, and it has been shown that it’s
    particularly efficient for images or text where there are normally no nonnegative
    elements. In the following snippet, there’s an example using the Iris dataset
    (which is nonnegative). The `init` parameter can assume different values (see
    the documentation), which determine how the data matrix is initially processed.
    A random choice is for nonnegative matrices, which are only scaled (no SVD is
    performed) :'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE102]'
  prefs: []
  type: TYPE_PRE
- en: 'NNMF, together with other factorization methods, will be very useful for more
    advanced techniques, such as recommendation systems and topic modeling. NNMF is
    very sensitive to its parameters (in particular, initialization and regularization),
    so I suggest reading the original documentation for further information: [`http://scikit-learn.org/stable/modules/generated/sklearn.decomposition.NMF.html`](http://scikit-learn.org/stable/modules/generated/sklearn.decomposition.NMF.html).'
  prefs: []
  type: TYPE_NORMAL
- en: Sparse PCA
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Scikit-learn provides different PCA variants that can solve particular problems.
    I do suggest reading the original documentation. However, I’d like to mention
    `SparsePCA`, which allows exploiting the natural sparsity of data while extracting
    principal components. If you think about the handwritten digits or other images
    that must be classified, their initial dimensionality can be quite high (a 10x10
    image has 100 features). However, applying a standard PCA selects only the average
    most important features, assuming that every sample can be rebuilt using the same
    components. Simplifying, this is equivalent to:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {y}_R={c}_1{y}_{R1}+{c}_2{y}_{R2}+\dots +{c}_{\left(g-1\right)}{y}_{R\left(g-1\right)}+{c}_g{y}_{Rg}
    $$](Images/484548_1_En_8_Chapter_TeX_Equf.png)'
  prefs: []
  type: TYPE_IMG
- en: 'On the other hand, we can always use a limited number of components, but without
    the limitation given by a dense projection matrix. This can be achieved by using
    sparse matrices (or vectors), where the number of nonzero elements is quite low.
    In this way, each element can be rebuilt using its specific components (in most
    cases, they will always be the most important), which can include elements normally
    discarded by a dense PCA. The previous expression now becomes:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {y}_R=\left[{c}_1{y}_{R1}+{c}_2{y}_{R2}+\dots +{c}_{\left(g-1\right)}{y}_{R\left(g-1\right)}+{c}_g{y}_{Rg}\right]+
    ZEROTERM $$](Images/484548_1_En_8_Chapter_TeX_Equg.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ ZEROTERM=\left(0\bullet {y}_{R\left(g+1\right)}+0\bullet {y}_{R\left(g+2\right)}+\dots
    +0\bullet {y}_{R\left(g+n-1\right)}+0\bullet {y}_{R(gn)}\right) $$](Images/484548_1_En_8_Chapter_TeX_Equh.png)'
  prefs: []
  type: TYPE_IMG
- en: Here the non-null components have been put into the first block (they don’t
    have the same order as the previous expression), while all the other zero terms
    have been separated. In terms of linear algebra, the vectorial space now has the
    original dimensions. However, using the power of sparse matrices (provided by
    `scipy.sparse`), Scikit-learn can solve this problem much more efficiently than
    a classical PCA.
  prefs: []
  type: TYPE_NORMAL
- en: 'The following snippet shows a sparse PCA with 60 components. In this context,
    they’re usually called atoms and the amount of sparsity can be controlled via
    *L1-norm* regularization (higher alpha parameter values lead to more sparse results).
    This approach is very common in classification algorithms and will be discussed
    in the next chapters:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE103]'
  prefs: []
  type: TYPE_PRE
- en: For further information about SciPy sparse matrices, visit [`https://docs.scipy.org/doc/scipy-0.18.1/reference/sparse.html`](https://docs.scipy.org/doc/scipy-0.18.1/reference/sparse.html).
  prefs: []
  type: TYPE_NORMAL
- en: Kernel PCA
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'It’s useful to mention the class `KernelPCA`, which performs a PCA with non-linearly
    separable data sets. Just to understand the logic of this approach (the mathematical
    formulation isn’t very simple), it’s useful to consider a projection of each sample
    into a particular space where the dataset becomes linearly separable. The components
    of this space correspond to the first, second, ... principal components, and a
    kernel PCA algorithm therefore computes the projection of our samples onto each
    of them. Let’s consider a dataset made up of a circle with a blob inside:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE104]'
  prefs: []
  type: TYPE_PRE
- en: The graphical representation is shown in Figure [8-10](#Fig10). In this case,
    a classic PCA approach isn’t able to capture the nonlinear dependency of existing
    components (the reader can verify that the projection is equivalent to the original
    dataset). However, looking at the samples and using polar coordinates (therefore,
    a space where it’s possible to project all the points), it’s easy to separate
    the two sets, only considering the radius.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_8_Chapter/484548_1_En_8_Fig10_HTML.jpg](Images/484548_1_En_8_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8-10
  prefs: []
  type: TYPE_NORMAL
- en: The circular dataset we are using
  prefs: []
  type: TYPE_NORMAL
- en: 'Considering the structure of the dataset, it’s possible to investigate the
    behavior of a PCA with a radial basis function kernel. As the default value for
    gamma is *1.0/number of features* (for now, consider this parameter as inversely
    proportional to the variance of a Gaussian), we need to increase it to capture
    the external circle. A value of 1.0 is enough:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE105]'
  prefs: []
  type: TYPE_PRE
- en: The instance variable `X_transformed_fit` will contain the projection of our
    dataset into the new space. Plotting it, we get Figure [8-11](#Fig11).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_8_Chapter/484548_1_En_8_Fig11_HTML.jpg](Images/484548_1_En_8_Fig11_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8-11
  prefs: []
  type: TYPE_NORMAL
- en: The output transformation of the kernel PCA
  prefs: []
  type: TYPE_NORMAL
- en: The plot shows a separation just like expected, and it’s also possible to see
    that the points belonging to the central blob have a curve distribution because
    they are more sensitive to the distance from the center.
  prefs: []
  type: TYPE_NORMAL
- en: Kernel PCA is a powerful instrument when we think of our dataset as made up
    of elements that can be a function of components (in particular, radial-basis
    or polynomials) but we aren’t able to determine a linear relationship among them.
  prefs: []
  type: TYPE_NORMAL
- en: For more information about the different kernels supported by Scikit-learn,
    visit [`http://scikit-learn.org/stable/modules/metrics.html#linear-kernel`](http://scikit-learn.org/stable/modules/metrics.html#linear-kernel).
  prefs: []
  type: TYPE_NORMAL
- en: Atom Extraction and Dictionary Learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Dictionary learning is a technique that allows rebuilding a sample starting
    from a sparse dictionary of atoms (similar to principal components). In *“*Online
    Dictionary Learning for Sparse Coding” by Julien Mairal, Francis Bach, Jean Ponce,
    and Guillermo Sapiro in *Proceedings of the 29th International Conference on Machine
    Learning (2009)* there’s a description of the same online strategy adopted by
    Scikit-learn, which can be summarized as a double optimization problem, where:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ X=\left\{x{\acute{\mkern6mu}}_1,x{\acute{\mkern6mu}}_2,\dots, x{\acute{\mkern6mu}}_{n-1},x{\acute{\mkern6mu}}_n\right\},
    wherex{\acute{\mkern6mu}}_i\in {R}^m $$](Images/484548_1_En_8_Chapter_TeX_Equi.png)'
  prefs: []
  type: TYPE_IMG
- en: is an input dataset and the target being to find both a dictionary *D* and a
    set of weights for each sample.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ D\in {R}^{m\times k}\wedge A=\left\{\alpha {\acute{\mkern6mu}}_1,\alpha
    {\acute{\mkern6mu}}_2,\dots, \alpha {\acute{\mkern6mu}}_{j-1},{\alpha}_j\right\},
    where{\alpha}_j\in {R}^k $$](Images/484548_1_En_8_Chapter_TeX_Equj.png)'
  prefs: []
  type: TYPE_IMG
- en: 'After the training process, an input vector can be computed as:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ x{\acute{\mkern6mu}}_i= D\alpha {\acute{\mkern6mu}}_i $$](Images/484548_1_En_8_Chapter_TeX_Equk.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The optimization problem (which involves both D and alpha vectors) can be expressed
    as the minimization of the following loss function:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ L\left(D,A\right)=\frac{1}{2}{\sum}_i{\left\Vert {x}_i- D\alpha {\acute{\mkern6mu}}_i\right\Vert}_2^2+c{\left\Vert
    \alpha {\acute{\mkern6mu}}_i\right\Vert}_1 $$](Images/484548_1_En_8_Chapter_TeX_Equl.png)'
  prefs: []
  type: TYPE_IMG
- en: Here the parameter c controls the level of sparsity (which is proportional to
    the strength of *L1* normalization). This problem can be solved by alternating
    the least square variable until a stable point is reached.
  prefs: []
  type: TYPE_NORMAL
- en: 'In Scikit-learn, we can implement such an algorithm with the class `DictionaryLearning`
    (using the usual digits datasets), where `n_components`, as usual, determines
    the number of atoms:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE106]'
  prefs: []
  type: TYPE_PRE
- en: This piece of code might take a few minutes to run, longer than any code we
    have written in this chapter. But don’t panic; this is just one type of many other
    types of feature selection techniques. So if it does not work in your local machine,
    try Colaboratory ([`https://colab.research.google.com/notebooks/welcome.ipynb#recent=true`](https://colab.research.google.com/notebooks/welcome.ipynb#recent=true)).
    This will do the job for you, or you can limit the number of samples to 20 to
    50; it’s up to you.
  prefs: []
  type: TYPE_NORMAL
- en: Latent Dirichlet Allocation (LDA)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'LDA is a shortcut of two descriptions: the first description is related to
    NLP, and the second one is related to data analysis. So, LDA with NLP is called
    **latent Dirichlet allocation** , and for data analysis it is called **linear
    discriminate analysis** . But this may seem a little weird. Are we talking about
    LDA with NLP or about LDA with data analysis? As we will see, we need to talk
    about LDA with NLP. But why not talk about a hot topic like linear discriminate
    analysis and the difference between it and PCA? PCA is a shortcut for **principle
    component analysis** . In this section, let’s start with latent Dirichlet allocation.'
  prefs: []
  type: TYPE_NORMAL
- en: Latent Dirichlet Allocation (LDA in NLP)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Before we go into the definition of LDA, we first need to know the root of this
    technique—topic modeling. The aim is to identify topics that best describe a set
    of documents. These topics will only appear during the topic modeling process,
    which is called a latent or unsupervised learning technique. Since LDA is the
    popular technique for topic modeling, let’s make a definition for it. LDA imagines
    a fixed set of topics. Each topic represents a set of words. The goal of LDA is
    to map all the documents to the topics in such a way that the words in each document
    are mostly captured by those imaginary topics.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s take this definition and try to reexplain it more for simplicity. You
    have a set of topics; these topics have a set of words that distribute the topic;
    and every document has a set of topics. LDA needs to map these topics in the set
    X to documents in the set Y by using words. The main idea behind LDA is that each
    document can be described by a distribution of topics and each topic can be described
    by a distribution of words. So let’s take an example or create an image to help
    with the definition of LDA.
  prefs: []
  type: TYPE_NORMAL
- en: 'As we said, latent Dirichlet allocation is a technique that automatically discovers
    topics that these documents contain. Suppose you have the following set of sentences:'
  prefs: []
  type: TYPE_NORMAL
- en: I eat fish and vegetables.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Fish are pets.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: My kitten eats fish.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Given the preceding sentences, LDA might classify the red words under topic
    *F*, which we might label as “food.” Similarly, blue words might be classified
    under a separate topic *P*, which we might label as “pets.” LDA defines each topic
    as a bag of words, and you have to label the topics as you deem fit.
  prefs: []
  type: TYPE_NORMAL
- en: 'As we see, LDA has two benefits when classifying the data at the word level:'
  prefs: []
  type: TYPE_NORMAL
- en: We can infer the content spread of each sentence by a word count, like if we
    see the only F in a sentence it will be 100% topic F. Let’s see the statistics
    of our example.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '*Sentence 1*: 100% topic F'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Sentence 2*: 100% topic P'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Sentence 3*: 33% topic P and 67% topic F'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'We can derive the proportions that each word constitutes in a given topic.
    For example, topic F might comprise words in the following proportions:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 40% eat, 40% fish, 20% vegetables, …
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Now that we’ve gained some understanding, let’s get our hands dirty with some
    steps about how LDA works; it works in three steps.
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: To illustrate these steps, imagine that you are now discovering topics in documents
    instead of sentences. Imagine you have two documents with the following words
    (Figure [8-12](#Fig12)).
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_8_Chapter/484548_1_En_8_Fig12_HTML.jpg](Images/484548_1_En_8_Fig12_HTML.jpg)'
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_IMG
- en: Figure 8-12
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: 'A table of two documents: X and Y'
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Step 1: You tell the algorithm how many topics you think there are. You can
    either use an informed estimate (e.g., results from a previous analysis) or simply
    trial-and-error. In trying different estimates, you may pick the one that generates
    topics to your desired level of interpretability, or the one yielding the highest
    statistical certainty (i.e., log likelihood). In our previous example, the number
    of topics might be inferred just by eyeballing the documents.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Step 2: The algorithm will assign every word to a temporary topic. Topic assignments
    are temporary, as they will be updated in Step 3\. Temporary topics are assigned
    to each word in a semirandom manner (according to a Dirichlet distribution, to
    be exact). This also means that if a word appears twice, each word may be assigned
    to different topics. Note that in analyzing actual documents, function words (e.g.,
    “the,” “and,” “my”) are removed and not assigned to any topics.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Step 3: The algorithm will check and update topic assignments, looping through
    each word in every document. For each word, its topic assignment is updated based
    on two criteria:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: How prevalent is that word across topics?
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: How prevalent are topics in the document?
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: So, how do these two criteria in step three work?
  prefs: []
  type: TYPE_NORMAL
- en: First, how prevalent is that word across topics? Since the word “fish” across
    both documents comprises nearly half of the remaining topic F words but 0% of
    remaining topic P words, “fish” picked at random would more likely be about topic
    F (Figure [8-13](#Fig13)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_8_Chapter/484548_1_En_8_Fig13_HTML.jpg](Images/484548_1_En_8_Fig13_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8-13
  prefs: []
  type: TYPE_NORMAL
- en: Prevalent words in both X and Y documents
  prefs: []
  type: TYPE_NORMAL
- en: Second, how prevalent is that word across topics? Since the words in Document
    Y are assigned to topic F and topic P in a 50–50 ratio, the remaining “fish” word
    seems equally likely to be about either topic.
  prefs: []
  type: TYPE_NORMAL
- en: After this example we now know how it works. To adapt with this algorithm we
    will still need some mathematical information for LDA, but our aim for this book
    is only to gain a good understanding about an algorithm. If we need to provide
    some mathematics, it will be in the last part. So, we have a code example for
    LDA and we will continue with PCA vs. LDA.
  prefs: []
  type: TYPE_NORMAL
- en: Last, you should see that LDA is just a feature extraction technique used in
    NLP; it is just an automated algorithm that can read through the text documents
    and automatically output the topics discussed.
  prefs: []
  type: TYPE_NORMAL
- en: Code Example Using gensim
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We will take a real example of the **20 Newsgroups’** dataset and use LDA to
    extract the naturally discussed topics.
  prefs: []
  type: TYPE_NORMAL
- en: 'First things first: we need to import gensim. Note that if you did not download
    it, please revisit Chapter [2](484548_1_En_2_Chapter.xhtml).'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE107]'
  prefs: []
  type: TYPE_PRE
- en: For reading the data and training the LDA model, we will use a dataset that
    consists of product reviews. We first create a `TextCorpus` , which is the component
    that reads documents from the file.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE108]'
  prefs: []
  type: TYPE_PRE
- en: Now we can train the LDA model. For details, see [gensim’s documentation](https://radimrehurek.com/gensim/models/ldamodel.html)
    of the class `LdaModel (`[`https://radimrehurek.com/gensim/models/ldamodel.html`](https://radimrehurek.com/gensim/models/ldamodel.html)).
  prefs: []
  type: TYPE_NORMAL
- en: This training step will take a few minutes, depending on the efficiency of your
    machine and the value you set for passes.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE109]'
  prefs: []
  type: TYPE_PRE
- en: 'Let’s discuss the parameters of this `LdaModel` :'
  prefs: []
  type: TYPE_NORMAL
- en: '`num_topics`: The number of topics we’d like to use. We set this to 10 here,
    but if you want, you can experiment with a larger number of topics.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`passes`: The number of iterations to use in the training algorithm. Using
    a higher number will lead to a longer training time, but sometimes higher quality
    topics.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`alpha`: A parameter that controls the behavior of the Dirichlet prior used
    in the model. If set to a value close to zero, the model will tend to use a fewer
    number of topics per document; conversely, if it’s a higher value, there will
    be more topics per document. If set to auto, this parameter will be tuned automatically.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Inspecting topics**: The function `show_topic(t, n)` will display the word
    distribution in topic *t*, sorted by the word probabilities. Then the most probable
    words will be shown.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE110]'
  prefs: []
  type: TYPE_PRE
- en: '**Predicting the topics for a document**: If you have a new document, you can
    use the trained model to estimate the topic proportions for it. This is done in
    two steps:'
  prefs: []
  type: TYPE_NORMAL
- en: The first step is to convert the document into a matrix, and the second step
    is to inference.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE111]'
  prefs: []
  type: TYPE_PRE
- en: The result shows a predicted topic distribution. In most cases, there will be
    one or more dominant topics and small probabilities for the rest of the topics.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, for the document this book describes, **Windows software,** we
    will typically get a result that this document is a mix of *book-related topics
    and software-related topics*. (Compare to the topic list you got above.) Again,
    the exact result here will vary between executions because of issues related to
    random number generation.
  prefs: []
  type: TYPE_NORMAL
- en: LDA vs. PCA
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As we talked in the previous section about LDA (**latent Dirichlet allocation**)
    in NLP, now it’s time to talk about LDA (**linear discriminant analysis**) but
    with PCA (**principal component analysis**). This comparison pf LDA vs. PCA is
    one of the most common ones in machine learning. We will define it as we discuss
    it in a simple way for anyone who doesn’t have a strong mathematical background.
    We just need you to know the basic ideas behind this.
  prefs: []
  type: TYPE_NORMAL
- en: Again, what is principal component analysis or PCA? PCA is a dimensionality
    reduction method that is often used to reduce the dimensionality of large data
    sets, by transforming a large set of variables into a smaller one that still contains
    most of the information in the large set.
  prefs: []
  type: TYPE_NORMAL
- en: And what is linear discriminant analysis? LDA is a dimensionality reduction
    technique used as a preprocessing step in machine learning and pattern classification
    applications.
  prefs: []
  type: TYPE_NORMAL
- en: Now we need to know the meaning of dimensionality reduction techniques. The
    main goal of dimensionality reduction techniques is to reduce the dimensions by
    removing the redundant and dependent features by transforming the features from
    higher dimensional space to a space with lower dimensions.
  prefs: []
  type: TYPE_NORMAL
- en: 'The key to this comparison is the supervision feature: PCA uses correlation,
    which is aimed at unsupervised learning; LDA uses classification.'
  prefs: []
  type: TYPE_NORMAL
- en: '*What does PCA do?*'
  prefs: []
  type: TYPE_NORMAL
- en: It aims to find components that account for maximum variance in the data (including
    error and within-variable variance). Unlike LDA, it does not take into account
    class membership (i.e., unsupervised), and is used when such information is not
    available. Importantly, both LDA and PCA do not require any prior notion of how
    the variables are related among themselves, and the resulting components cannot
    be interpreted in terms of an underlying construct.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*What does LDA do?*'
  prefs: []
  type: TYPE_NORMAL
- en: This method identifies components (i.e., a linear combination of the observed
    variables) that maximize class separation (i.e., between-class variance) when
    such prior information is available (i.e., supervised). For example, you have
    a training set containing a variable specifying the class of each observation.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: But as we compare PCA with LDA, we need to see them in figures—how they act
    in data. With data visualization, we can see the data, how our models react with
    it or our tools change in our data, and how we should tune our model parameter
    to get the best for our model with this data. We’ll discuss data visualization
    in another chapter. Let’s visualize the data to get more intuitions about PCA
    and LDA (Figures [8-14](#Fig14) and [8-15](#Fig15)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_8_Chapter/484548_1_En_8_Fig15_HTML.jpg](Images/484548_1_En_8_Fig15_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8-15
  prefs: []
  type: TYPE_NORMAL
- en: The LDA algorithm on a dataset
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_8_Chapter/484548_1_En_8_Fig14_HTML.jpg](Images/484548_1_En_8_Fig14_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8-14
  prefs: []
  type: TYPE_NORMAL
- en: The PCA algorithm on a dataset
  prefs: []
  type: TYPE_NORMAL
- en: Both LDA and PCA are linear transformation techniques. As we see in the figures,
    LDA is just a classification, but PCA tries to get the most correlated points
    together. Notice that LDA is supervised, whereas PCA is unsupervised
  prefs: []
  type: TYPE_NORMAL
- en: ZCA Whitening
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: ZCA whitening is part of PCA. ZCA stands for **zero-phase component analysis**
    , which is a whitening transformation used to decorrelate (whiten) the data (image).
  prefs: []
  type: TYPE_NORMAL
- en: So, *what is whitening transformation?*
  prefs: []
  type: TYPE_NORMAL
- en: A **whitening transformation** or **sphering transformation** is a linear transformation
    that transforms a vector of random variables with a known covariance matrix into
    a set of new variables whose covariance is the identity matrix, meaning that they
    are uncorrelated and each have variance. The transformation is called “whitening”
    because it changes the input vector into a white noise vector.
  prefs: []
  type: TYPE_NORMAL
- en: It is used for data augmentation, so let’s see how we can use it. As we know
    that ZCA is an image augmentation technique, let’s talk about data augmentation
    first. What is data augmentation?
  prefs: []
  type: TYPE_NORMAL
- en: It is the performance of deep learning neural networks that often improves with
    the amount of data available.
  prefs: []
  type: TYPE_NORMAL
- en: Data augmentation is a technique to artificially create new training data from
    existing training data. This is done by applying domain-specific techniques to
    examples from the training data that create new and different training examples.
    Image data augmentation is perhaps the most well-known type of data augmentation
    and involves creating transformed versions of images in the training dataset that
    belong to the same class as the original image. Transforms include a range of
    operations from the field of image manipulation, such as shifts, flips, zooms,
    and much more. The intent is to expand the training dataset with new, plausible
    examples. This means variations of the training set images that are likely to
    be seen by the model.
  prefs: []
  type: TYPE_NORMAL
- en: For example, a horizontal flip of a picture of a cat may make sense, because
    the photo could have been taken from the left or right. A vertical flip of the
    photo of a cat does not make sense, and would probably not be appropriate given
    that the model is very unlikely to see a photo of an upside-down cat.
  prefs: []
  type: TYPE_NORMAL
- en: As such, it is clear that the choice of the specific data augmentation techniques
    used for a training dataset must be chosen carefully and within the context of
    the training dataset and knowledge of the problem domain. In addition, it can
    be useful to experiment with data augmentation methods in isolation and in concert
    to see if they result in a measurable improvement to model performance, perhaps
    with a small prototype dataset, model, and training run. Modern deep learning
    algorithms, such as the convolutional neural network, or CNN, can learn features
    that are invariant to their location in the image. Nevertheless, augmentation
    can further aid in this transform invariant approach to learning and can aid the
    model in learning features that are also invariant to transforms, such as left-to-right
    to top-to-bottom ordering, light levels in photographs, and more.
  prefs: []
  type: TYPE_NORMAL
- en: But understand that image data augmentation is typically only applied to **the
    training dataset**, and not to the validation or test dataset. This is different
    from data preparation such as image resizing and pixel scaling; they must be performed
    consistently across all datasets that interact with the model. Some of the data
    augmentation techniques are
  prefs: []
  type: TYPE_NORMAL
- en: Horizontal and vertical shift augmentation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Horizontal and vertical flip augmentation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Random rotation augmentation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Random brightness augmentation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Random zoom augmentation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: ZCA whitening
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Most of these algorithms are considered and discussed in the “Data Augmentation”
    section of Chapter [6](484548_1_En_6_Chapter.xhtml).
  prefs: []
  type: TYPE_NORMAL
- en: So, we see various techniques for data augmentation but we will concentrate
    on ZCA whitening. A **whitening transform of** an image is a linear algebra operation
    that reduces the redundancy in the matrix of pixel images. Less redundancy in
    the image is intended to better highlight the structures and features in the image
    to the learning algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: Typically, image whitening is performed using the PCA technique. More recently,
    an alternative called ZCA shows better results, leading to transformed images
    that keeps all of the original dimensions and, unlike PCA, result in transformed
    images that still look like their originals.
  prefs: []
  type: TYPE_NORMAL
- en: You can perform a ZCA whitening transform by setting the `zca_whitening` argument
    to True.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE112]'
  prefs: []
  type: TYPE_PRE
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In this chapter, you learned about three different, fundamental dimensionality
    reduction techniques for feature extraction: standard PCA, LDA, and kernel PCA.
    Using PCA, we projected data onto a lower dimensional subspace to maximize the
    variance along the orthogonal feature axes while ignoring the class labels. LDA,
    in contrast to PCA, is a technique for supervised dimensionality reduction, which
    means that it considers class information in the training dataset to attempt to
    maximize the class separability in a linear feature space. Last, you learned about
    a kernelized version of PCA, which allows you to map nonlinear datasets onto a
    lower dimensional feature space, where the classes become linearly separable.'
  prefs: []
  type: TYPE_NORMAL
- en: Equipped with these essential preprocessing techniques, you are now well prepared
    to learn about the best practices for building and maintaining different deep
    learning techniques, algorithms, and approaches each of which differs in the type
    of data it deals with and how it handles it. You will evaluate the performance
    of different models in the next chapters.
  prefs: []
  type: TYPE_NORMAL
