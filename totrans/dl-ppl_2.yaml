  type: TYPE_IMG
  zh: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig2_HTML.jpg](Images/484548_1_En_6_Fig2_HTML.jpg)'
- en: Figure 6-2
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-2
- en: The table output of the DataFrame
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: DataFrame 的表格输出
- en: As you see in the two preceding code cells (Figures [6-2](#Fig2) and [6-3](#Fig3)),
    both of them do the same job, which is loading the data, either from a file (*CSV*,
    sometimes called a flat file), or from a *URL* (e.g., the cloud).
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你在前两个代码单元格（图 [6-2](#Fig2) 和 [6-3](#Fig3)）中看到的那样，它们都执行相同的任务，即从文件（*CSV*，有时称为平面文件）或从
    *URL*（例如，云端）加载数据。
- en: 'In the case of a file, you can specify: the name of the file; the character
    used as a separator (`sep`), which might be comma, tab, hash, etc…; the character
    used for the decimal placeholder (`decimal`), which might look like 10.01 in the
    dataset or like 10,01; whether there is a header (`header`) or not; and the variable
    names (using names and a list). pandas has some default settings of some of its
    parameters like the `sep='',''` for example, and also `decimal=''.''`.'
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 在文件的情况下，你可以指定：文件的名称；用作分隔符的字符（`sep`），可能是逗号、制表符、井号等…；用作小数占位符的字符（`decimal`），在数据集中可能看起来像
    10.01，也可能像 10,01；是否有标题（`header`）或没有；以及变量名称（使用名称和列表）。pandas 对一些参数有一些默认设置，例如 `sep=','`，还有
    `decimal='.'`。
- en: Note
  id: totrans-318
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: Be careful that you do not set the sep (separator) and the decimal point for
    numbers with the same values, to prevent loading errors and for data-loading safety.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，不要为具有相同值的数字设置相同的 sep（分隔符）和小数点，以防止加载错误并确保数据加载安全。
- en: 'The resulting object, named `iris`, is a pandas `DataFrame`. It’s more than
    a simple Python list or dictionary, and in the sections that follow, we will explore
    some of its features and functionalities. To get an idea of its content (to view
    the inner data values), you can print the first (or the last) row(s), using the
    following commands (Figures [6-4](#Fig4) and [6-5](#Fig5)):'
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 生成的对象，命名为 `iris`，是一个 pandas `DataFrame`。它不仅仅是简单的 Python 列表或字典，在接下来的章节中，我们将探讨其一些特性和功能。要了解其内容（查看内部数据值），你可以使用以下命令打印第一行（或最后一行），如图
    [6-4](#Fig4) 和 [6-5](#Fig5) 所示：
- en: '[PRE3]'
  id: totrans-321
  prefs: []
  type: TYPE_PRE
