- en: Figure 6-9
  prefs: []
  type: TYPE_NORMAL
- en: The output of the Excel file
  prefs: []
  type: TYPE_NORMAL
- en: Data Preprocessing
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We are now able to import the dataset, even a big, problematic one. Now, we
    need to learn the basic preprocessing routines in order to make it feasible for
    the next data science step.
  prefs: []
  type: TYPE_NORMAL
- en: First, if you need to apply a function to a limited section of rows, you can
    create a mask (Figure [6-10](#Fig10)). A mask is a series of Boolean values (that
    is, True or False) that tells whether the line is selected or not.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, let’s say we want to select all the lines of the iris dataset
    that have a sepal length greater than 6\. We can simply do the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig10_HTML.jpg](Images/484548_1_En_6_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6-10
  prefs: []
  type: TYPE_NORMAL
- en: The output of masking data
  prefs: []
  type: TYPE_NORMAL
- en: In the preceding simple example, we can immediately see which observations are
    True and which are not (`False`), and which ones fit the selection query.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, let’s check how you can use a selection mask on another example. We want
    to substitute the `Iris-virginica` target label with the `Virginica` label. We
    can do this by using the following two lines of code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig11_HTML.jpg](Images/484548_1_En_6_Fig11_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6-11
  prefs: []
  type: TYPE_NORMAL
- en: The renamed data
  prefs: []
  type: TYPE_NORMAL
- en: You’ll see that all occurrences of `Iris-virginica` are now replaced by `Virginica`
    (Figure [6-11](#Fig11)). The `loc()` method is a way to access the data of the
    matrix with the help of row-column indexes.
  prefs: []
  type: TYPE_NORMAL
- en: 'To see the new list of the labels in the target column, we can use the `unique()`
    method . This method is very handy if initially you want to evaluate the dataset:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: This method allows us to see the unique values inside either pandas DataFrame
    or Series, and the method is very helpful in the analysis process. Another way
    is to count the number of unique values, and that could happen by using `nunique()`
    , which will return the number of unique values in the input DataFrame/Series.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you want to see some statistics (mean, median, and so on) about each feature
    (statistics about data give you some intuition about what happens in it), you
    can do the following steps:'
  prefs: []
  type: TYPE_NORMAL
- en: You can group each column accordingly.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can also apply a mask.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The pandas method groupby will produce a similar result to the GROUP BY clause
    in ab SQL statement. The next method to apply should be an aggregate method on
    one or multiple columns.
  prefs: []
  type: TYPE_NORMAL
- en: For example, the `mean()` pandas aggregate method is the counterpart of the
    `AVG()` SQL function to compute the mean of the values in the group. The pandas
    aggregate method `var()` calculates the variance; `sum()`, the summation; `count()`,
    the number of rows in the group; and so on.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The result is still a pandas DataFrame; therefore, multiple operations can be
    chained together.
  prefs: []
  type: TYPE_NORMAL
- en: As a next step, we can try a couple of examples of `groupby()` in action. Grouping
    observations by target (that is, label), we can check the difference between the
    average value and the variance of the features for each group (Figures [6-12](#Fig12)
    and [6-13](#Fig13)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig12_HTML.jpg](Images/484548_1_En_6_Fig12_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6-12
  prefs: []
  type: TYPE_NORMAL
- en: The iris groupby mean output
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig13_HTML.jpg](Images/484548_1_En_6_Fig13_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6-13
  prefs: []
  type: TYPE_NORMAL
- en: The iris groupby variance output
  prefs: []
  type: TYPE_NORMAL
- en: 'Finally, if your dataset contains a time series (for example, in the case of
    a numerical target) and you need to apply a `rolling` operation to it (in the
    case of noisy data points), you can simply do the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: 'This can be performed for a rolling average of the values. Alternatively, you
    can use the following line of code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: Instead, this can be performed in order to obtain a rolling median of the values.
    In both of these cases, the window had a sample size of 5.
  prefs: []
  type: TYPE_NORMAL
- en: More generically, the `apply()` pandas method is able to perform any row-wise
    or column-wise operation programmatically. `apply()` should be called directly
    on the *DataFrame*.
  prefs: []
  type: TYPE_NORMAL
- en: The first argument is the function to be applied row-wise or column-wise.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The second is the axis to apply it on.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Note
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The function can be a built-in, library-provided, lambda, or any other user-defined
    function.
  prefs: []
  type: TYPE_NORMAL
- en: 'As an example of this powerful method, let’s now try to count how many nonzero
    elements there are in each line (Figure [6-14](#Fig14)). With the apply method,
    this is simple:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig14_HTML.jpg](Images/484548_1_En_6_Fig14_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6-14
  prefs: []
  type: TYPE_NORMAL
- en: The iris nonzero values count output
  prefs: []
  type: TYPE_NORMAL
- en: 'Similarly, to compute the nonzero elements feature-wise (that is, per column;
    Figure [6-15](#Fig15)), you just need to change the second argument and set it
    to `axis=0`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig15_HTML.jpg](Images/484548_1_En_6_Fig15_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6-15
  prefs: []
  type: TYPE_NORMAL
- en: The iris nonzero values count(per column) output
  prefs: []
  type: TYPE_NORMAL
- en: 'Finally, to operate element-wise, the `applymap()` method should be used on
    the *DataFrame*. In this case, just one argument should be provided: the function
    to apply.'
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, let’s assume you’re interested in the length of the string representation
    of each cell. To obtain that value, you should first cast each cell to a string
    value, and then compute the length. With `applymap`, this operation is very easy
    (Figure [6-16](#Fig16)):'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE25]'
  prefs: []
  type: TYPE_PRE
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig16_HTML.jpg](Images/484548_1_En_6_Fig16_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6-16
  prefs: []
  type: TYPE_NORMAL
- en: The iris nonzero values count output
  prefs: []
  type: TYPE_NORMAL
- en: Data Augmentation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As we all know, the performance of any deep learning algorithm or any neural
    networks often improves with the amount of data available. So, the larger your
    dataset, the more accurate results you can find—of course with respect to other
    factors such as selecting the right algorithm for your problem.
  prefs: []
  type: TYPE_NORMAL
- en: '**Data augmentation** is a technique to artificially create new training data
    from existing training data. This is done by applying domain-specific techniques
    to examples from the training data that create new and different training examples.'
  prefs: []
  type: TYPE_NORMAL
- en: Image data augmentation is perhaps the most well-known type of data augmentation
    and involves creating transformed versions of images in the training dataset that
    belong to the same class as the original image.
  prefs: []
  type: TYPE_NORMAL
- en: Transforms include a range of operations from the field of image manipulation,
    such as shifts, flips, zooms, and much more.
  prefs: []
  type: TYPE_NORMAL
- en: The intent is to expand the training dataset with new, plausible examples. This
    means, variations of the training set images that are likely to be seen by the
    model. For example, a horizontal flip of a picture of a cat may make sense, because
    the photo could have been taken from the left or right. A vertical flip of the
    photo of a cat does not make sense and would probably not be appropriate given
    that the model is very unlikely to see a photo of an upside-down cat.
  prefs: []
  type: TYPE_NORMAL
- en: As such, it is clear that the choice of the specific data augmentation techniques
    used for a training dataset must be chosen carefully, and within the context of
    the training dataset and knowledge of the problem domain. In addition, it can
    be useful to experiment with data augmentation methods in isolation and in concert,
    to see if they result in a measurable improvement to model performance, perhaps
    with a small prototype dataset, model, and training run.
  prefs: []
  type: TYPE_NORMAL
- en: Modern deep learning algorithms, such as the convolutional neural network ,
    or CNN, can learn features that are invariant to their location in the image.
    Nevertheless, augmentation can further aid in this transform invariant approach
    to learning and can aid the model in learning features that are also invariant
    to transforms, such as left-to-right to top-to-bottom ordering, light levels in
    photographs, and more.
  prefs: []
  type: TYPE_NORMAL
- en: Image data augmentation is typically only applied to the *training dataset*,
    and **not** to the *validation* or *test dataset* . This is different from data
    preparation such as image resizing and pixel scaling; they must be performed consistently
    across all datasets that interact with the model.
  prefs: []
  type: TYPE_NORMAL
- en: 'So, let us get started and see what we can do to get more images from the existing
    one. First, we need to import our packages as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE26]'
  prefs: []
  type: TYPE_PRE
- en: Then, we need to load the image that we will do the experimentation on, so we
    can change its properties and make it seem like a new image for our model. The
    `tf.image` provides image augmentation functions so that all the computation is
    done on the GPU. In this tutorial, we use TensorFlow `eager_execution` so that
    we can see the augmented image directly.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE27]'
  prefs: []
  type: TYPE_PRE
- en: Also, we need to implement the function that shows the result of all our experimentation,
    such that we do not have to write the same code again and again.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE28]'
  prefs: []
  type: TYPE_PRE
- en: Now we can start our image augmentation, as our environment is ready for the
    process; so let us get started.
  prefs: []
  type: TYPE_NORMAL
- en: Image Crop
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '`tf.image` provides various functions for image cropping. `tf.image.central_crop`
    removes the outer parts of an image but retains the central region of the image
    along each dimension (Figure [6-17](#Fig17)). If we specify `central_fraction
    = 0.5`, this function returns the central 50% of the image. Also, this function
    works on either a single image (image is a 3-D Tensor), or a batch of images (image
    is a 4-D Tensor).'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE29]'
  prefs: []
  type: TYPE_PRE
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig17_HTML.jpg](Images/484548_1_En_6_Fig17_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6-17
  prefs: []
  type: TYPE_NORMAL
- en: The result of central image crop transformation
  prefs: []
  type: TYPE_NORMAL
- en: Crop and Resize
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This function extracts crops from the input image at positions defined at the
    bounding box locations in boxes and resizes to a common output size specified
    by `crop_and_size`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE30]'
  prefs: []
  type: TYPE_PRE
- en: The `crop_and_resize` operation extracts crops from the input image tensor and
    resizes them using either *bilinear sampling* or *nearest neighbor sampling* (possibly
    with aspect ratio change) to a common output size specified by `crop_size`. This
    is more general than the `crop_to_bounding_box` operation, which extracts a fixed
    size slice from the input image and does not allow resizing or aspect ratio change.
    Another parameter is `box_ind`, which is the index of each box; it is needed to
    specify or to be used as a pointer to each output crop image, hence the output
    is multiple images if there are multiple boxes.
  prefs: []
  type: TYPE_NORMAL
- en: It returns a tensor with crops from the input image at positions defined at
    the bounding box locations in boxes. The cropped boxes are all resized (with bilinear
    or nearest neighbor interpolation) to a fixed size `= [crop_height, crop_width]`.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, we need to do tf.squeeze, because the result that comes from `crop_and_resize`
    is a 4-D tensor `[num_boxes, crop_height, crop_width, depth]`. So, we need to
    transform it to a 3-D tensor.
  prefs: []
  type: TYPE_NORMAL
- en: You can find more answers about `crop_and_resize` (Figure [6-18](#Fig18)) by
    visiting [`https://stackoverflow.com/questions/51843509/about-use-tf-image-crop-and-resize`](https://stackoverflow.com/questions/51843509/about-use-tf-image-crop-and-resize).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig18_HTML.jpg](Images/484548_1_En_6_Fig18_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6-18
  prefs: []
  type: TYPE_NORMAL
- en: The result of crop and resize image transformation
  prefs: []
  type: TYPE_NORMAL
- en: Crop to Bounding Box
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This is a basic edition of the `crop_and_resize` operation , which extracts
    a fixed size slice from the input image given the boundaries and does not allow
    resizing or aspect ratio change (Figure [6-19](#Fig19)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE31]'
  prefs: []
  type: TYPE_PRE
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig19_HTML.jpg](Images/484548_1_En_6_Fig19_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6-19
  prefs: []
  type: TYPE_NORMAL
- en: The result of selected box crop image transformation
  prefs: []
  type: TYPE_NORMAL
- en: Flipping
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Flipping , which is important for CNN to remove certain features of the object,
    is available in only a particular side. For example, you don’t want a CNN model
    to learn that an apple leaf happens only on the right side as observed in the
    base image. Flipping produces a different set of images from the rotation at multiples
    of 90 degrees (Figures [6-20](#Fig20) and [6-21](#Fig21)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE32]'
  prefs: []
  type: TYPE_PRE
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig20_HTML.jpg](Images/484548_1_En_6_Fig20_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6-20
  prefs: []
  type: TYPE_NORMAL
- en: The result of vertical flip image transformation
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE33]'
  prefs: []
  type: TYPE_PRE
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig21_HTML.jpg](Images/484548_1_En_6_Fig21_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6-21
  prefs: []
  type: TYPE_NORMAL
- en: The result of horizontal flip image transformation
  prefs: []
  type: TYPE_NORMAL
- en: '`random_flip_left_right()` to randomly flip an image horizontally (left to
    right)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`random_flip_up_down()` to randomly flip an image vertically (upside down)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`flip_up_down()` to flip an image vertically (upside down)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Rotate Image
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Simply, this operation rotates an image counterclockwise by the passed angle
    in radians (Figure [6-22](#Fig22)). And we can pass the radians by `math.radians`,
    which will calculate the radians based on the angle parameter.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE34]'
  prefs: []
  type: TYPE_PRE
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig22_HTML.jpg](Images/484548_1_En_6_Fig22_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6-22
  prefs: []
  type: TYPE_NORMAL
- en: The result of rotation image transformation
  prefs: []
  type: TYPE_NORMAL
- en: Translation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We would like our model to recognize the object present in any part of the image.
    Also, the object can be present partially in the corner or edges of the image.
    For this reason, we shift the object to various parts of the image (Figure [6-23](#Fig23)).
  prefs: []
  type: TYPE_NORMAL
- en: The parameter `translation` is a vector representing `[dx, dy]` or (if image
    has rank 4) a matrix of length `num_images`, with a `[dx, dy]` vector for each
    image in the batch.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE35]'
  prefs: []
  type: TYPE_PRE
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig23_HTML.jpg](Images/484548_1_En_6_Fig23_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6-23
  prefs: []
  type: TYPE_NORMAL
- en: The result of image translation
  prefs: []
  type: TYPE_NORMAL
- en: Transform
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This operation can apply the given transform matrix to the image. The transform
    matrix is given as a vector of length 8 that represent the wanted transformation
    (Figure [6-24](#Fig24)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE36]'
  prefs: []
  type: TYPE_PRE
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig24_HTML.jpg](Images/484548_1_En_6_Fig24_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6-24
  prefs: []
  type: TYPE_NORMAL
- en: The result of image transformation
  prefs: []
  type: TYPE_NORMAL
- en: Adding Salt and Pepper Noise
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Overfitting happens when your neural network tries to learn high-frequency features
    that may not be useful. Gaussian noise effectively distorts the high-frequency
    features (Figure [6-25](#Fig25)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE37]'
  prefs: []
  type: TYPE_PRE
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig25_HTML.jpg](Images/484548_1_En_6_Fig25_HTML.jpg)'
