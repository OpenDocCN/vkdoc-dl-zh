    which will calculate the radians based on the angle parameter.
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
  zh: 简单来说，这个操作通过逆时针旋转图像，旋转角度由传入的弧度数决定（图[6-22](#Fig22)）。我们可以通过`math.radians`传入弧度，它将根据角度参数计算弧度。
