- en: A table that outputs from the head() function
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: head() 函数输出的表格
- en: '[PRE4]'
  id: totrans-328
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Note
  id: totrans-329
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: The head/tail functions, if called without arguments, will print only five rows.
    If you want to get back a different number of rows, just call the function using
    the number of rows you want to see as an argument, as in the second of the preceding
    two code cells.
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: head/tail 函数，如果没有提供参数，将只打印五行。如果你想获取不同数量的行，只需使用你想要看到的行数作为参数调用该函数，就像在前两个代码单元格中的第二个一样。
- en: 'Next, you might want to see just the names of columns (**hint:** you can see
    them when you use `iris.head()`); to get the names of the columns, you can simply
    use the following method:'
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，你可能只想看到列名（**提示**：当你使用 `iris.head()` 时可以看到它们）；要获取列名，你可以简单地使用以下方法：
- en: '[PRE5]'
  id: totrans-332
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: The resulting object in code cell one is a very interesting one. It looks like
    a *Python list* , but it actually is a *pandas index*. As suggested by the object’s
    name, it indexes the columns’ names. And in code cell two you see that you can
    change the column names as you want, but be careful and choose the names wisely
    that you are using to represent the columns.
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 代码单元格一中的结果对象非常有趣。它看起来像 *Python 列表*，但实际上是一个 *pandas 索引*。正如对象名称所暗示的，它索引列的名称。在代码单元格二中，你可以看到你可以随意更改列名，但请注意并明智地选择你用来表示列的名称。
- en: 'To extract the `target` column (Figure [6-6](#Fig6)), for example, you can
    simply do the following:'
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，要提取 `target` 列（图 [6-6](#Fig6)），你可以简单地做以下操作：
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig6_HTML.jpg](Images/484548_1_En_6_Fig6_HTML.jpg)'
  id: totrans-335
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig6_HTML.jpg](Images/484548_1_En_6_Fig6_HTML.jpg)'
- en: Figure 6-6
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-6
- en: The output series that represents the target variable
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 表示目标变量的输出序列
- en: '[PRE6]'
  id: totrans-338
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: The type of the object y is a pandas Series. Right now, think of it as a one-dimensional
    array or vector as mathematically represented with axis labels, as we will investigate
    in depth later on.
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 对象 y 的类型是 pandas Series。现在，将其视为一个一维数组或向量，就像我们将在后面深入探讨的那样，用轴标签在数学上表示。
- en: Note
  id: totrans-340
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: For convention we use small letters for vector/array, and capital letters for
    matrices.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 为了规范，我们使用小写字母表示向量/数组，大写字母表示矩阵。
- en: '[PRE7]'
  id: totrans-342
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Note
  id: totrans-343
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: As you can see, we can get the column as a pandas DataFrame(matrix), but it
    is not preferred.
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所见，我们可以获取作为 pandas DataFrame（矩阵）的列，但这不是首选。
- en: Now, we just understood that a pandas index class acts like a dictionary index
    of the table’s columns.
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们刚刚了解到一个 pandas 索引类就像表格列的字典索引。
- en: 'Note that you can also get a list of columns referring to them by their indexes,
    as follows (Figure [6-7](#Fig7)):'
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，你也可以通过它们的索引来获取列的列表，如下所示（图 [6-7](#Fig7)）：
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig7_HTML.jpg](Images/484548_1_En_6_Fig7_HTML.jpg)'
  id: totrans-347
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig7_HTML.jpg](Images/484548_1_En_6_Fig7_HTML.jpg)'
- en: Figure 6-7
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-7
- en: Just the selected variables output
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 只输出选定的变量
- en: '[PRE8]'
  id: totrans-350
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: As you can see here the pandas `DataFrame` present its flexibility by letting
    you select the columns the way you prefer. And as you can see, the result is a
    pandas `DataFrame`.
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所见，pandas `DataFrame` 通过允许你以你喜欢的任何方式选择列来展示其灵活性。并且正如你所见，结果是 pandas `DataFrame`。
- en: Why such a difference in results when using the same function?
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么使用相同的函数时结果会有如此大的差异？
- en: In the first case, we asked for a column. Therefore, the output was a 1-D vector
    (that is, a pandas Series).
  id: totrans-353
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在第一种情况下，我们请求了一列。因此，输出是一个一维向量（即 pandas Series）。
- en: In the second case, we asked for multiple columns and we obtained a matrix-like
    result (and we know that matrices are mapped as pandas DataFrames).
  id: totrans-354
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在第二种情况下，我们请求了多个列，并得到了一个类似矩阵的结果（我们知道矩阵被映射为 pandas DataFrame）。
- en: Note
  id: totrans-355
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: You can simply spot the difference by looking at the heading of the output;
    if the columns are labeled, then you are dealing with a pandas `DataFrame`. On
    the other hand, if the result is a vector and it presents no heading, then that
    is a pandas `Series`.
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过查看输出标题简单地发现差异；如果列有标签，那么你正在处理一个 pandas `DataFrame`。另一方面，如果结果是向量且没有标题，那么它就是一个
    pandas `Series`。
- en: So far, we have learned some common steps from the data loading process; after
    you load the dataset, you usually separate the *features* (predictors) and *target*
    (which is response) labels.
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经从数据加载过程中学习了一些常见步骤；在你加载数据集后，你通常将 *特征*（预测器）和 *目标*（响应）标签分开。
- en: 'And, as you know:'
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 而且，正如你所知：
- en: In a classification problem, target labels are the discrete/nominal numbers
    or textual strings that indicate the class associated with every set of features.
  id: totrans-359
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在分类问题中，目标标签是与每个特征集相关的离散/名义数字或文本字符串，表示该类。
- en: In a regression problem, target labels are continuous/interval (or ratio) numbers
    that indicate the value associated with every set of features.
  id: totrans-360
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在回归问题中，目标标签是连续/区间（或比率）数字，表示与每个特征集相关的值。
- en: 'Then, the following steps require you to get an idea of how large the problem
    is, and therefore you need to know the size of the dataset. Typically, for each
    observation, we count a line, and for each feature, a column. To obtain the dimensions
    of the dataset, just use the attribute shape on a pandas `DataFrame` or `Series`,
    as shown in the following example:'
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，以下步骤需要你了解问题的规模，因此你需要知道数据集的大小。通常，对于每个观测值，我们计算一行，对于每个特征，一个列。要获得数据集的维度，只需使用pandas
    `DataFrame`或`Series`上的`shape`属性，如下例所示：
- en: '[PRE9]'
  id: totrans-362
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: The resulting object is a tuple that contains the size of the matrix/array in
    each dimension.
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 结果对象是一个包含每个维度矩阵/数组大小的元组。
- en: Note
  id: totrans-364
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: pandas Series follow the same format (that is, a tuple with only one element)—for
    example, data_series.shape will output `(10, 1)`.
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: pandas Series遵循相同的格式（即只有一个元素的元组）——例如，data_series.shape将输出`(10, 1)`。
- en: However, if you want to ignore the data loading process, you can always use
    the preloaded datasets in the `sklearn.datasets` module. This module contains
    all types of dataset (*classification* and *regression*) you can use—for practicing
    and experimentation purposes only. Also, you can use some functionalities in this
    module to generate you own dataset too, and that will help you enhance your pipeline
    operation selection and experimentation process too.
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如果你想忽略数据加载过程，你始终可以使用`sklearn.datasets`模块中的预加载数据集。此模块包含所有类型的可以用于实践和实验的数据集（*分类*和*回归*）。此外，你还可以使用此模块中的某些功能来生成你自己的数据集，这也有助于你增强管道操作选择和实验过程。
- en: '[PRE10]'
  id: totrans-367
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Missing Data
  id: totrans-368
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 缺失数据
- en: As we all know, when someone transforms a dataset from one source to another,
    somehow data loss happens. We cannot avoid that loss or prevent it from happening,
    but we can fix it or make our model learn that loss or ignore it, as we will see
    in the coming chapters. So now we will talk about the mysterious combination of
    zeros, empties, and nulls.
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们所知，当有人将数据集从一个来源转换到另一个来源时，数据丢失是不可避免的。我们无法避免这种损失或阻止其发生，但我们可以修复它或让我们的模型学习这种损失或忽略它，正如我们将在接下来的章节中看到的。因此，现在我们将讨论零、空和空值的神秘组合。
- en: You probably want to know the difference between each of those. We will show
    you the difference using three simple scenarios to illustrate and define the meaning
    of zeros, empties, and nulls.
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能想知道这些之间的区别。我们将通过三个简单的场景来展示这些区别，并定义零、空和空值的含义。
- en: '**Scenario one:** Imagine that you have a purse that is filled with coins,
    and as I ask you some questions about it, you should answer them.'
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: '**场景一**：想象一下，你有一个装满硬币的钱包，当我问你一些关于它的问题时，你应该回答它们。'
- en: If I ask you how many coins are in the purse, you observe that there are no
    coins in the purse. The question *how many coins are in the purse?* is unanswerable.
    There is no purse! The answer is not a positive value, it is not a zero value,
    and it is not even empty. The value is null.
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我问你钱包里有多少枚硬币，你观察到钱包里没有硬币。问题“钱包里有多少枚硬币？”是无法回答的。没有钱包！答案既不是正值，也不是零值，甚至不是空的。这个值是空值。
- en: '**Scenario two:** A few hours later, you looked in the purse again and saw
    ten coins are in it. Wonderful; you now have an answer to the question. In this
    case, you can answer the question with this piece of data, and its value is `10`.'
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: '**场景二**：几个小时后，你再次查看钱包，发现里面有十枚硬币。太棒了；你现在有了对这个问题的答案。在这种情况下，你可以用这块数据回答这个问题，其值是`10`。'
- en: After a while, you look in the purse again and discover that there are no more
    coins. Every single coin is gone. You look, you search, and you find the answer
    to *how many coins are in the purse?* is a zero value. So, you still have a piece
    of data and its value is now `0`.
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 过了一段时间，你再次查看钱包，发现里面已经没有硬币了。每一枚硬币都不见了。你查看、搜索，并发现“钱包里有多少枚硬币？”的答案是零值。所以，你仍然有一份数据，其值现在是`0`。
- en: '**Scenario three:** Just before the evening, you grab your purse from your
    pocket. As you walk across the street, you find your friend and he asks, “What’s
    in the purse?” Currently, the purse is empty. There is nothing in the purse—*no
    coins and nothing else*. Note that the answer is not zero, because the question
    he asked was not a numeric one. The answer is also not **null,** because we do
    have a purse and we did look inside it, but there was just no answer.'
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: '**场景三**：就在傍晚时分，你从口袋里掏出钱包。当你穿过街道时，你发现你的朋友并问他，“钱包里有什么？”目前，钱包是空的。钱包里什么都没有—*没有硬币，也没有其他东西*。请注意，答案不是零，因为他问的问题不是一个数字问题。答案也不是**空值**，因为我们确实有一个钱包，我们也确实查看了它，但就是没有答案。'
- en: Empties
  id: totrans-376
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 空值
- en: Empties are a bit trickier to work with than zero, but they make a lot of sense
    in some cases, for instance, when working with strings. For example, suppose we
    have an attribute called middle name. Well, I have no middle name so I would always
    leave this field empty. Filling in a space or a hyphen (or making up something)
    for a value that is truly empty does not make a lot of sense. Space is not the
    same thing as empty. The correct value in the case of an empty string may, in
    fact, be “`empty`.”
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: 空值比零更难处理，但在某些情况下很有意义，例如，当处理字符串时。例如，假设我们有一个名为中间名的属性。嗯，我没有中间名，所以我总是留这个字段为空。对于一个真正为空的值填写一个空格或破折号（或编造一些东西）并没有太多意义。空格并不等同于空。在空字符串的情况下，正确的值实际上可能是“`empty`”。
- en: Is It Ever Useful to Fill Missing Data Using a Zero Instead of an Empty or Null?
  id: totrans-378
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用零而不是空或空值填充缺失数据是否有时有用？
- en: 'Let’s state the fact that it is always better to fill the missing value than
    to leave it empty or null. You can know the missing value in a tricky way: if
    this variable has a uniform distribution between 0 and 1 and it has a small peak
    at -1, then -1 is actually a missing value.'
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们陈述一个事实：总是填充缺失值比留下空或空值要好。你可以以一种巧妙的方式知道缺失值：如果这个变量在0和1之间有一个均匀分布，并且它在-1处有一个小峰值，那么-1实际上是一个缺失值。
- en: Depending on data sources, missing data is identified differently. pandas always
    identifies missing values as *NaN*. However, unless the data has been preprocessed
    to a degree that an analyst will encounter missing values as *NaN*, missing values
    can appear as a question mark (?) or a zero (0) or minus one (-1) or a blank.
    As a result, it is important that a data scientist always performs exploratory
    data analysis (EDA) first before writing any machine learning algorithm. EDA is
    simply a litmus test for understanding and knowing the behavior of our data.
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 根据数据来源，缺失数据的识别方式不同。pandas总是将缺失值识别为*NaN*。然而，除非数据已经预处理到分析师会遇到缺失值作为*NaN*的程度，否则缺失值可能以问号（?）或零（0）或负一（-1）或空白的形式出现。因此，数据科学家在编写任何机器学习算法之前始终先进行探索性数据分析（EDA）是很重要的。EDA只是理解并了解我们数据行为的试金石。
- en: Managing Missing Features
  id: totrans-381
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 管理缺失特征
- en: 'Sometimes a dataset can contain missing features, so there are a few options
    that can be taken into account:'
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 有时数据集可能包含缺失特征，因此可以考虑以下几种选项：
- en: Removing the whole row
  id: totrans-383
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 删除整个行
- en: Creating a submodel to predict those features
  id: totrans-384
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建一个子模型来预测这些特征
- en: Using an automatic strategy to input them according to the other known values
  id: totrans-385
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用自动策略根据其他已知值输入它们
- en: The first option is the most drastic one and should be considered only when
    the dataset is quite large, the number of missing features is high, and any prediction
    could be risky.
  id: totrans-386
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第一个选项是最极端的，只有在数据集相当大、缺失特征数量高且任何预测都可能有风险时才应考虑。
- en: The second option is much more difficult, because it’s necessary to determine
    a supervised strategy to train a model for each feature and, finally, to predict
    their value.
  id: totrans-387
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第二个选项要困难得多，因为它需要确定一个监督策略来训练每个特征的模型，最后预测它们的值。
- en: Considering all the pros and cons, the third option is likely to be the best
    choice.
  id: totrans-388
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 考虑所有利弊，第三个选项可能是最佳选择。
- en: 'Scikit-learn offers the class `Imputer`, which is responsible for filling the
    holes using a strategy based on the `mean` (default choice), `median`, or *frequency*-`mode`—(the
    most frequent entry will be used for all the missing ones). The following snippet
    shows an example using the three approaches (the default value for a missing feature
    entry is *NaN*. However, it’s possible to use a different placeholder through
    the parameter `missing_values`):'
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: Scikit-learn提供了`Imputer`类，该类负责使用基于`mean`（默认选择）、`median`或*frequency*-`mode`（最频繁的条目将被用于所有缺失项）的策略来填充空缺。以下代码片段展示了使用三种方法（缺失特征的默认值是*NaN*。然而，你可以通过`missing_values`参数使用不同的占位符）的示例：
- en: '[PRE11]'
  id: totrans-390
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: '[PRE12]'
  id: totrans-391
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig8_HTML.jpg](Images/484548_1_En_6_Fig8_HTML.jpg)'
  id: totrans-392
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_6_Chapter/484548_1_En_6_Fig8_HTML.jpg](Images/484548_1_En_6_Fig8_HTML.jpg)'
