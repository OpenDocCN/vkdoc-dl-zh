  prefs: []
  type: TYPE_NORMAL
- en: What is a generative adversarial network?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Anomaly detection with generative adversarial networks
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
