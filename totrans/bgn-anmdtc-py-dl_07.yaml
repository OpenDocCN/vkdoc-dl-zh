- en: What Is a Generative Adversarial Network?
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是生成对抗网络？
- en: A generative adversarial network (GAN) is a class of neural network in which
    two models, a **generator** and a **discriminator**, are trained in tandem. In
    a typical GAN setup, the role of the **generator** is to produce data points that
    resemble some real dataset. It then passes these generated data points to the
    **discriminator**, whose job is to classify these generated points as either real
    or fake.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 生成对抗网络（GAN）是一类神经网络，其中两个模型，一个**生成器**和一个**判别器**，是协同训练的。在典型的GAN设置中，**生成器**的作用是生成与某些真实数据集相似的数据点。然后，它将这些生成数据点传递给**判别器**，其任务是将这些生成点分类为真实或虚假。
- en: The ideal for the generator is to generate data that the discriminator predicts
    as all real. The ideal for the discriminator, then, is to predict the generated
    data as all fake. To teach the discriminator what real data looks like, the discriminator
    is also shown real data throughout the training process. And so, the generator
    and discriminator are locked in an adversarial cat-and-mouse game where both models
    are continuously trying to improve and beat the other.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 对于生成器来说，理想的目标是生成数据，使得判别器预测这些数据都是真实的。那么，对于判别器来说，理想的目标就是预测生成数据都是虚假的。为了教会判别器什么是真实数据，判别器在整个训练过程中也会展示真实数据。因此，生成器和判别器陷入了一场对抗性的猫捉老鼠游戏，两个模型都在不断地尝试改进并击败对方。
- en: It’s a simple concept, yet incredibly powerful. GANs are able to create realistic
    examples of images, speech, and art, among other things. They have gotten so good
    at these tasks, in fact, that GANs have been the subject of controversy recently
    because they have been able to create images, videos, and voices that convincingly
    portray a real person. You can imagine the sheer danger of this technology through
    the potential for misuse by malicious entities.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个简单的概念，却非常强大。GAN能够创建图像、语音和艺术等领域的逼真示例。实际上，它们在这些任务上已经非常出色，以至于GAN最近成为了争议的焦点，因为它们能够创建出令人信服地描绘真实人物的图像、视频和声音。你可以想象，如果恶意实体滥用这项技术，其潜在的危险性是何等之大。
- en: 'That being said, there are plenty of good uses for GANs:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，GANs有很多好的用途：
- en: '**AI-generated art**: Users can bring any type of concept to life by typing
    in a prompt. The result is high-quality artwork that takes mere seconds to create.
    However, some of these models have recently become the subject of controversy
    because of how their training data was sourced. For example, some versions of
    these models use scraped data that was uploaded by their artists online but taken
    without permission for training. In some cases, models are trained specifically
    to replicate a specific artist’s style without the knowledge or permission of
    the original artist.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AI生成的艺术**：用户可以通过输入提示将任何类型的概念变为现实。结果是高质量的艺术作品，只需几秒钟就能创建。然而，一些模型最近因训练数据来源的问题而成为争议的焦点。例如，一些版本的这些模型使用了艺术家在线上上传但未经许可用于训练的数据。在某些情况下，模型被专门训练来复制特定艺术家的风格，而没有原始艺术家的知情或许可。'
- en: Is the art that is generated by the GAN its own creation, or is it plagiarism?
    These are tough questions that policies do not yet address. In cases in which
    a model is trained to replicate a particular artist’s style, labeling it as plagiarism
    is much easier. But if the model was trained across many styles, and outputs something
    that resembles bits and pieces of multiple people’s art styles together, is that
    directly plagiarism? Is the art generated by the GAN its own, novel creation?
    Neural networks are trained to generalize their training data, not to copy and
    paste it, and they learn much like a human does to create art of a specific style.
    So, in this case, is it plagiarism of the work of human artists?
  id: totrans-17
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 由GAN生成的艺术是它自己的创作，还是抄袭？这些问题很棘手，政策尚未解决。在模型被训练来复制特定艺术家的风格的情况下，将其标记为抄袭很容易。但如果模型是在多种风格下训练的，并且输出了一些类似于多人艺术风格组合的东西，那这是直接抄袭吗？由GAN生成的艺术是它自己的、新颖的创作吗？神经网络被训练来泛化其训练数据，而不是复制粘贴，它们的学习方式与人类创作特定风格的艺术相似。因此，在这种情况下，这是对人类艺术家作品的抄袭吗？
- en: '**Photo modification**: In a similar vein to AI-generated art, GANs can be
    used to remove objects from photos, restore damaged photos, fill in an area with
    something else, and so on.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**照片修改**：与AI生成的艺术类似，GANs可以用来从照片中移除物体、修复损坏的照片、用其他东西填充区域等等。'
- en: '**Dubbing**: In movies, actors can be dubbed in the native language in their
    own voice and look as if they’re actually saying the words with their lips, enhancing
    the immersion tremendously for audiences. Different GAN models can be used to
    regenerate the parts of the frames containing the actor’s mouths as well as generate
    the voices in the native languages.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**配音**：在电影中，演员可以用自己的母语配音，看起来就像他们实际上在用嘴唇说出这些话，极大地增强了观众的沉浸感。不同的GAN模型可以用来再生包含演员嘴巴部分的帧以及生成母语中的声音。'
- en: '**Super resolution**: It’s as if the old “enhance” trope from spy movies has
    come to life. AI can now upscale images and fill in the detail in a realistic
    manner. This is useful for medical imagery, surveillance, or satellites, but also
    to upscale old media into 4K quality.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**超分辨率**：这就像间谍电影中古老的“增强”情节复活了。现在AI可以以逼真的方式提升图像并填充细节。这对于医学影像、监控或卫星来说很有用，也可以将旧媒体提升到4K质量。'
- en: '**Drug discovery**: GANs can generate new molecular structures to discover
    new drugs.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**药物发现**：GANs可以生成新的分子结构以发现新药。'
- en: This list is not comprehensive; GANs can do much more. Nearly any generative
    task that a human can do can be done by a GAN. Songwriting, poetry, art, and other
    creative endeavors have long been thought to be an exclusively human domain computers
    were incapable of entering. However, we were able to automate this with AI before
    we could properly automate a chorebot.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 这个列表并不全面；GANs可以做更多的事情。几乎任何人类可以做的生成任务都可以由GAN完成。歌曲创作、诗歌、艺术和其他创造性活动长期以来一直被认为是人类独有的领域，计算机无法进入。然而，我们在能够正确自动化家务机器人之前，就已经能够通过AI自动化这些任务。
- en: It turns out that GANs are also good at anomaly detection. The process of training
    GANs teaches the generator and discriminator what the distribution of normal data
    looks like. Anomalies fall outside of this distribution, allowing us to pinpoint
    anomalous data from normal data in a straightforward manner.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 结果表明，生成对抗网络（GANs）在异常检测方面也很擅长。训练生成对抗网络的过程教会了生成器和判别器正常数据的分布是什么样的。异常数据位于这个分布之外，这使得我们可以直接从正常数据中定位到异常数据。
- en: More specifically, we can use the GAN setup to have a generator create realistic
    samples that belong to the normal data distribution. The job of the discriminator,
    then, is to identify whether these points are real or fake. Once the generator
    and discriminator have been properly trained, the discriminator can be used to
    identify anomalies since it will classify them as “fake.”
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 更具体地说，我们可以使用 GAN 设置让生成器创建属于正常数据分布的逼真样本。那么，判别器的任务就是识别这些点是否真实。一旦生成器和判别器都得到了适当的训练，判别器就可以用来识别异常，因为它会将它们分类为“假”。
- en: 'The use of GANs for anomaly detection has the following advantages:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 GAN 进行异常检测有以下优点：
- en: '**Flexibility**: The exact architecture of the generator and the discriminator
    is totally abstract. You could have an LSTM, autoencoder, transformer, convolutional
    neural network, or any other type of model as the generator and as the discriminator.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**灵活性**：生成器和判别器的确切架构是完全抽象的。你可以有一个 LSTM、自动编码器、转换器、卷积神经网络，或者任何其他类型的模型作为生成器，也可以作为判别器。'
- en: Furthermore, GANs can be applied to any data types, including time-series data,
    geospatial data, image data, text data, etc.
  id: totrans-27
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 此外，GANs 可以应用于任何数据类型，包括时间序列数据、地理空间数据、图像数据、文本数据等等。
- en: '**Generative modeling**: The generator creates new data points that fit within
    the normal data distribution. This can be useful when you want to synthesize additional
    data samples to be used in another training task, for example, or to better understand
    the underlying distribution of the original data.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**生成建模**：生成器创建符合正常数据分布的新数据点。当你想要合成额外的数据样本用于其他训练任务，或者更好地理解原始数据的潜在分布时，这可能很有用。'
- en: This also means that with the proper setup, you can control what kind of samples
    you want to generate. In the image-generation domain, an example would be controlling
    the hair color, complexion, hair style, etc. of a generated person.
  id: totrans-29
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这也意味着，通过适当的设置，你可以控制你想要生成的样本类型。在图像生成领域，一个例子就是控制生成人物的颜色、肤色、发型等。
- en: In the task of anomaly detection, you can train the GAN to generate specific
    types of anomalies that a preexisting anomaly detector is bad at detecting. Then,
    you can use this newly synthesized dataset of anomalies to supplement your training
    set and boost your anomaly detector’s performance against a specific type of anomaly.
  id: totrans-30
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在异常检测的任务中，你可以训练 GAN 生成特定类型的异常，这些异常是现有的异常检测器难以检测的。然后，你可以使用这个新合成的异常数据集来补充你的训练集，并提高你的异常检测器对特定类型异常的性能。
- en: '**Unsupervised learning**: Generators can train in a totally unsupervised fashion
    without the use of any labels. The discriminator only needs to see the data itself
    and be told that it’s real—there is no actual labeling going on.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**无监督学习**：生成器可以在完全无监督的方式下进行训练，无需使用任何标签。判别器只需要看到数据本身，并被告知它是真实的——实际上并没有进行任何标签化操作。'
- en: 'On the flip side, GANs do have some serious disadvantages:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，GANs 也有一些严重的缺点：
- en: '**Training sensitivity**: GANs are notoriously difficult to train because the
    training is all a balancing act. You do not want a discriminator that constantly
    overpowers the generator, nor a generator that overpowers the discriminator and
    starts to produce garbage. It’s an adversarial competition, not a one-sided stomp,
    but this can be tricky to achieve.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**训练敏感性**：GANs 以其难以训练而闻名，因为训练完全是平衡行为。你不想让判别器不断压倒生成器，也不想让生成器压倒判别器并开始产生垃圾。这是一个对抗性竞争，而不是一边倒的打击，但这可能很难实现。'
- en: Balancing the GAN can involve tuning a number of hyperparameters, redefining
    the architectures of the generator and the discriminator as well as the number
    of parameters, and so on.
  id: totrans-34
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 平衡 GAN 可能需要调整多个超参数，重新定义生成器和判别器的架构以及参数数量等等。
- en: '**Mode collapse**: This is when the generator produces only limited outputs
    that still fool the discriminator but fail to properly represent the original
    data distribution.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模式坍塌**：这是指生成器只产生有限的输出，这些输出仍然能欺骗判别器，但无法正确地表示原始数据分布。'
- en: '**Computational power**: When you’re training a GAN, you’re training two or
    more models at once. This can require more memory and processing power than a
    typical training setup involving one model.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**计算能力**：当你训练一个 GAN 时，你实际上是在同时训练两个或更多模型。这可能比涉及一个模型的典型训练设置需要更多的内存和处理能力。'
- en: '**Data hungry**: Properly and accurately modeling the data distribution requires
    providing the GAN with plenty of real data samples.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据饥渴**：正确且精确地建模数据分布需要向GAN提供大量的真实数据样本。'
- en: '**Long training**: Because GANs are so sensitive, they’re usually trained with
    lower training rates than usual. This means that convergence can take many iterations.
    Rushing this process with higher learning rates can lead to instability, oscillation,
    and collapse of the training setup.'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**长训练**：由于GAN非常敏感，它们通常使用比通常更低的训练速率进行训练。这意味着收敛可能需要许多迭代。使用更高的学习率加快这个过程可能导致不稳定、振荡和训练设置的崩溃。'
- en: Despite the possible disadvantages to using GANs, they are still a worthwhile
    class of model to explore anomaly detection with. But before we get started, we
    need to check out what the architecture of a GAN looks like.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管使用GAN可能存在一些缺点，但它们仍然是一类值得探索的模型，用于异常检测。但在我们开始之前，我们需要查看GAN的架构是什么样的。
- en: Generative Adversarial Network Architecture
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 生成对抗网络架构
- en: Figure [7-1](#Fig1) depicts the architecture of a GAN.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 图[7-1](#Fig1)展示了GAN的架构。
- en: '![](../images/483137_2_En_7_Chapter/483137_2_En_7_Fig1_HTML.jpg)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图7-1](../images/483137_2_En_7_Chapter/483137_2_En_7_Fig1_HTML.jpg)'
- en: A flow chart of the generative adversarial network defines how the random sample
    undergoes a generator. The generated sample and the real data sample are fed to
    the discriminator, which gives the generator and the discriminator losses.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 生成对抗网络的流程图定义了随机样本如何经过生成器。生成的样本和真实数据样本被输入到判别器中，判别器给出生成器和判别器的损失。
- en: Figure 7-1
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 图7-1
- en: The high-level architecture of a generative adversarial network
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 生成对抗网络的高级架构
- en: The generator takes a random sample from a space called the *latent space*.
    This could be a random set of numbers from a normal or uniform distribution, depending
    on its setup. Using this sample, the generator produces output that, ideally,
    should look like our real data. This output is then evaluated by the discriminator
    to determine if it’s genuine or synthesized.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 生成器从一个称为**潜在空间**的空间中抽取一个随机样本。这可能是一组来自正态分布或均匀分布的随机数字，具体取决于其设置。使用这个样本，生成器产生输出，理想情况下应该看起来像我们的真实数据。然后，这个输出由判别器评估，以确定它是真实的还是合成的。
- en: The discriminator is also shown a sample of real data, which it must predict
    as 1 (real) or fake (0). Using these labels, we can compute a loss for the discriminator
    predictions on the synthesized outputs, and a loss for the predictions on the
    real outputs.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 判别器也会看到一个真实数据的样本，它必须将其预测为1（真实）或0（伪造）。使用这些标签，我们可以计算判别器对合成输出的预测损失，以及对其真实输出的预测损失。
- en: The generator, on the other hand, wants the discriminator to predict 1 for all
    the synthesized samples. So, in the loss function, we take the discriminator predictions
    on the synthesized data and use 1 as the true label.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，生成器希望判别器对所有合成样本预测1。因此，在损失函数中，我们取判别器对合成数据的预测，并使用1作为真实标签。
- en: 'Recall that the optimizer is trying to minimize the loss, but in this case,
    we have two competing loss functions: one loss for the generator, and one loss
    for the discriminator, both at odds with each other in terms of what the true
    label ought to be for the synthesized outputs.'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，优化器试图最小化损失，但在这个情况下，我们有两个相互竞争的损失函数：一个用于生成器的损失，一个用于判别器的损失，两者在合成输出的真实标签应该是什么方面存在分歧。
- en: A simple loss function we can use is binary cross-entropy, and we can assume
    that the last layer of the discriminator uses sigmoid as the activation function.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用的一个简单损失函数是二元交叉熵，我们可以假设判别器的最后一层使用sigmoid作为激活函数。
- en: However, there are the aforementioned issues with GAN setups, like **mode collapse**,
    and **training instability/divergence**. To address these issues and stabilize
    the GAN training further, we will incorporate what is called the **Wasserstein
    loss** to transform our GAN setup into a WGAN.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，存在上述GAN设置的问题，如**模式坍塌**和**训练不稳定/发散**。为了解决这些问题并进一步稳定GAN的训练，我们将引入所谓的**Wasserstein损失**，将我们的GAN设置转换为WGAN。
- en: Wasserstein GAN
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 水平生成对抗网络
- en: Wasserstein GAN (WGAN) is a type of GAN that uses Wasserstein loss as the loss
    function, along with a couple other modifications to the training loop. In essence,
    a WGAN seeks to
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 水平生成对抗网络（WGAN）是一种使用Wasserstein损失作为损失函数的GAN，同时对训练循环进行了一些其他修改。本质上，WGAN试图
- en: '**Stabilize gradients**: The Wasserstein loss function allows for the calculation
    of more meaningful and stable gradients. In traditional GAN setups, gradients
    can vanish or explode if the training process becomes imbalanced.'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**稳定梯度**：Wasserstein损失函数允许计算更有意义且更稳定的梯度。在传统的GAN设置中，如果训练过程不平衡，梯度可能会消失或爆炸。'
- en: '**Mitigate mode collapse****:** Because of the increased stability in gradients,
    generators can get more consistent feedback from the discriminators, leading to
    reduced chances of mode collapse where one or two consistent outputs keep getting
    generated.'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缓解模式崩溃**：由于梯度稳定性的提高，生成器可以从判别器那里获得更一致的反馈，从而减少了模式崩溃的可能性，在这种崩溃中，一个或两个一致的输出会持续生成。'
- en: '**Enforce** **Lipschitz constraint****:** The Wasserstein loss is structured
    in a way such that the discriminator is Lipschitz continuous, usually enforced
    by weight clipping or adding a gradient penalty to ensure that the discriminator
    after one gradient update does not adjust its weights too much and thus change
    its behavior too drastically. These changes are to keep the discriminator modifying
    its behavior at a stable rate and not potentially overpower the generator.'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**强制** **Lipschitz约束**：Wasserstein损失函数的结构是这样的，使得判别器是Lipschitz连续的，通常通过权重裁剪或添加梯度惩罚来强制执行，以确保在梯度更新后判别器不会过多地调整其权重，从而剧烈改变其行为。这些变化是为了保持判别器以稳定的速率修改其行为，而不是可能压倒生成器。'
- en: The **Lipschitz constraint** is that the critic (WGAN term for discriminator)
    must be a 1-Lipschitz function, which effectively imposes a bound on the gradient
    of the critic and thus avoids rapid rate of change of the critic and stabilizes
    training.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '**Lipschitz约束**是指批评者（判别器的WGAN术语）必须是一个1-Lipschitz函数，这实际上对批评者的梯度施加了限制，从而避免了批评者快速变化率，并稳定了训练。'
- en: The discriminator in WGAN setups is referred to as the **critic** because instead
    of discriminating and assigning a label of real or fake, it gives a score of the
    realness or fakeness of a sample. Whereas a discriminator has sigmoid as the activation
    function, a critic has no activiation function applied (linear activation). This
    is because, instead of a probability, we want the discriminator to output a score
    whose sign determines the prediction of real or fake and whose magnitude determines
    the confidence.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 在WGAN设置中，判别器被称为**批评者**，因为它不是通过判别和分配真实或假的标签，而是给出样本的真实性或虚假性的分数。而判别器有sigmoid作为激活函数，而批评者没有应用激活函数（线性激活）。这是因为，我们想要的不是概率，而是判别器输出一个分数，其符号决定了真实或假的预测，其幅度决定了置信度。
- en: With that background in place, let’s get into what this loss function looks
    like.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个背景设定好之后，让我们来看看这个损失函数是什么样的。
- en: 'The loss for the critic is computed as follows:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 批评者损失的计算如下：
- en: Critic loss = Average score for real samples – Average score for generated samples
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 批评损失 = 真实样本的平均分数 - 生成样本的平均分数
- en: 'The generator loss is as follows:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 生成器损失如下：
- en: Generator loss = -1 * Average Score for Generated Samples
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 生成器损失 = -1 * 生成样本的平均分数
- en: The true label here is 1 and the fake label is –1\. As far as the intuition
    behind these loss function definitions, the optimizer’s job is once again to minimize
    the loss. For the generator, the optimizer wants to make that value as negative
    as possible, so the scores for the generated samples must be large, positive outputs
    because the negative sign will make them large-magnitude negative outputs.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的真实标签是1，而假标签是-1。就这些损失函数定义背后的直觉而言，优化器的任务是再次最小化损失。对于生成器来说，优化器希望使该值尽可能负，因此生成样本的分数必须是大的、正的输出，因为负号会使它们成为大振幅的负输出。
- en: The optimizer also wants to minimize the critic loss. Here, the generated sample
    scores are also incentivized to be large-magnitude positive outputs since that
    subtraction will turn it into a negative, much like in the generator loss. The
    only way for the discriminator to improve and further minimize this loss is to
    produce scores for real samples that are negative, effectively producing two negative
    terms for the critic loss, minimizing it.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 优化器还希望最小化批评者损失。在这里，生成样本的分数也被激励产生大振幅的正输出，因为减法会使其变为负，就像在生成器损失中一样。判别器唯一能改进并进一步最小化这个损失的方法是产生真实样本的负分数，从而为批评者损失产生两个负项，最小化它。
- en: And so, by incentivizing the score for generated samples to be negative and
    large in magnitude, the generator loss definition works in unison with the critic
    loss to guide the discriminator into optimally learning how to distinguish between
    real and fake outputs. If the score is negative, the model is predicting that
    the data is real. If the score is positive, the model is predicting the data is
    fake.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，通过激励生成样本的分数为负且幅度大，生成器损失定义与评论家损失协同工作，引导判别器最优地学习如何区分真实和假输出。如果分数为负，模型预测数据是真实的。如果分数为正，模型预测数据是假的。
- en: The WGAN paper^([1](#Fn1)) also suggests to train the critic more frequently
    than the generator, but in our setup, which is a more straightforward extension
    of a base GAN with Wasserstein loss and gradient penalty principles applied, we
    don’t incorporate this.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: WGAN 论文^([1](#Fn1)) 还建议比生成器更频繁地训练评论家，但在我们的设置中，这是一个更直接的基于 Wasserstein 损失和梯度惩罚原则的基
    GAN 的扩展，我们没有包含这一点。
- en: Another step to perform with a WGAN is weight clipping. The weight of the discriminator
    can be clipped between some +– range of a parameter **clip_value**. However, we
    implement the **gradient penalty (GP)** method instead, making our implementation
    an example of **WGAN-GP**.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在 WGAN 中执行另一个步骤是权重裁剪。判别器的权重可以在参数 **clip_value** 的某个 +– 范围内裁剪。然而，我们实现了 **梯度惩罚
    (GP)** 方法，使我们的实现成为 **WGAN-GP** 的一个例子。
- en: WGAN-GP
  id: totrans-69
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: WGAN-GP
- en: 'The gradient penalty method is one way to enforce the Lipschitz constraint
    and stabilize training. Here’s how it works:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度惩罚方法是强制执行 Lipschitz 约束并稳定训练的一种方式。以下是它是如何工作的：
- en: 'Compute a random interpolation between a pair of random real (x[real]) and
    fake (x[fake]) data:'
  id: totrans-71
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 计算一对随机真实 (x[real]) 和假 (x[fake]) 数据之间的随机插值：
- en: '![$$ {\mathrm{x}}^{\hbox{''}}=\mathrm{a}\ast {\mathrm{x}}_{\mathrm{real}}+\left(1\hbox{-}
    \mathrm{a}\right)\ast {\mathrm{x}}_{\mathrm{fake}} $$](../images/483137_2_En_7_Chapter/483137_2_En_7_Chapter_TeX_Equa.png)'
  id: totrans-72
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![插值公式](../images/483137_2_En_7_Chapter/483137_2_En_7_Chapter_TeX_Equa.png)'
- en: where a is some uniformly sampled value in the range [0, 1].
  id: totrans-73
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 其中，a 是在范围 [0, 1] 内均匀采样的某个值。
- en: Compute the gradient of the critic score using the interpolated sample as input.
  id: totrans-74
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用插值样本作为输入，计算评论家分数的梯度。
- en: 'Compute the 2 norm of the gradient, subtract 1, and square the difference:'
  id: totrans-75
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 计算梯度的 2 范数，减去 1，然后平方差：
- en: '![$$ GP={\left(\left\Vert {\nabla}_{x^{\prime }}D\left({x}^{\prime}\right)\right\Vert
    -1\right)}^2 $$](../images/483137_2_En_7_Chapter/483137_2_En_7_Chapter_TeX_Equb.png)'
  id: totrans-76
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![梯度惩罚公式](../images/483137_2_En_7_Chapter/483137_2_En_7_Chapter_TeX_Equb.png)'
- en: Here, x’ is the interpolation between real and fake data, and D is the discriminator/critic.
    D(x’), then, is the output of the discriminator using x’ as the input data.
  id: totrans-77
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在这里，x’ 是真实和假数据之间的插值，D 是判别器/评论家。因此，D(x’), 是判别器使用 x’ 作为输入数据时的输出。
- en: 'Apply the penalty to the critic loss like so:'
  id: totrans-78
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将惩罚应用于评论家损失，如下所示：
- en: '![$$ \mathrm{Critic}\ \mathrm{loss}=\mathrm{mean}\left(\mathrm{D}\left({\mathrm{x}}_{\mathrm{real}}\right)\right)\hbox{--}
    \mathrm{mean}\left(\mathrm{D}\left({\mathrm{x}}_{\mathrm{fake}}\right)\right)+{\uplambda}^{\ast
    }\  GP $$](../images/483137_2_En_7_Chapter/483137_2_En_7_Chapter_TeX_Equc.png)'
  id: totrans-79
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![评论家损失公式](../images/483137_2_En_7_Chapter/483137_2_En_7_Chapter_TeX_Equc.png)'
- en: where GP is as defined above, and λ is a hyperparameter (commonly set to 10).
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 GP 如上定义，λ 是一个超参数（通常设置为 10）。
- en: With this, we can stabilize the learning and enforce the 1-Lipschitz constraint.
    Now that we have the definition and some theory out of the way, let’s get started
    with implementing a WGAN-GP to perform anomaly detection.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这种方式，我们可以稳定学习并强制执行 1-Lipschitz 约束。现在我们已经定义了一些理论和概念，让我们开始实现 WGAN-GP 以执行异常检测。
- en: Anomaly Detection with a GAN
  id: totrans-82
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用 GAN 进行异常检测
- en: We will be applying a GAN to the KDDCUP 1999 dataset to perform **semi-supervised
    anomaly detection**. Although GANs can be completely unsupervised, ours will be
    semi-supervised because we want to teach the generator to generate strictly normal
    data and have the discriminator/critic predict real or fake data. The idea is
    that the discriminator will be able to pick out the anomalies as fake and classify
    the real normal points as real. Since we are basing our implementation off of
    WGAN-GP, we will designate a critic score above 0 as an anomaly and a critic score
    below 0 as a real data point.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将应用GAN到KDDCUP 1999数据集以执行**半监督异常检测**。尽管GAN可以是完全无监督的，但我们的将是半监督的，因为我们想教会生成器生成严格正常的数据，并让判别器/评论家预测真实或伪造的数据。想法是判别器能够将异常识别为伪造的，并将真实正常点分类为真实。由于我们的实现基于WGAN-GP，我们将指定一个评分为正数的异常，评分为负数的数据点为真实数据点。
- en: This task is semi-supervised because we still need the anomaly labels to perform
    the final evaluation while training on data that we know for sure is labeled normal.
    This task can be modified to be supervised or unsupervised by having the discriminator
    receive label feedback in the former case. In the latter case, we’d pass all of
    the data in with the assumption that anomalies look different from normal data
    and that they’re rare. If this is the case, the generator may likely learn to
    model just the normal data, because the discriminator would more easily be able
    to identify the anomaly as fake since it stands apart from the normal data, regardless
    of our assigning this anomaly to be real.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 这个任务属于半监督学习，因为在训练已知为正常标签的数据时，我们仍然需要异常标签来执行最终的评估。通过让判别器在前一种情况下接收标签反馈，可以将此任务修改为监督学习或无监督学习。在后一种情况下，我们将所有数据一起传递，假设异常数据与正常数据看起来不同，并且它们很少见。如果是这种情况，生成器可能会学会仅对正常数据进行建模，因为判别器更容易将异常识别为伪造的，因为它与正常数据明显不同，无论我们是否将此异常标记为真实。
- en: The path of least resistance for the generator that lets it minimize loss is
    to just produce normal data. However, since there are no guarantees, it’s still
    possible that the generator will learn to produce authentic-looking anomalies
    and the discriminator will learn that these are typical of the real data distribution
    even though they are anomalies.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 生成器让最小化损失的最简单路径就是只产生正常数据。然而，由于没有保证，生成器仍然可能学会产生看起来真实的异常数据，而判别器可能会学会这些数据是真实数据分布的典型，尽管它们是异常的。
- en: This is why the semi-supervised approach might be more preferable—at the very
    least, we know that the GAN is being trained on normal data only and that the
    generator and discriminator will understand what normal data looks like.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么半监督方法可能更受欢迎——至少我们知道GAN只训练正常数据，并且生成器和判别器将了解正常数据的样子。
- en: Let’s get into the code. The notebook is provided at [`https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%207%20Generative%20Adversarial%20Networks/chapter7_gan.ipynb`](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%207%20Generative%20Adversarial%20Networks/chapter7_gan.ipynb).
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看代码。笔记本提供在[`https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%207%20Generative%20Adversarial%20Networks/chapter7_gan.ipynb`](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%207%20Generative%20Adversarial%20Networks/chapter7_gan.ipynb)。
- en: The data is provided on GitHub as well at [`https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/data/kddcup.data.gz`](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/data/kddcup.data.gz).
    Simply download the file and extract it to see kddcup.data.corrected, which is
    the file we will be loading.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 数据也提供在GitHub上，链接为[`https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/data/kddcup.data.gz`](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/data/kddcup.data.gz)。只需下载文件并解压，即可看到kddcup.data.corrected文件，这是我们将要加载的文件。
- en: 'Because of the complicated nature of the loss functions necessitating a custom
    training loop, training a GAN is not as simple as calling `model.fit()`. TensorFlow
    offers a guide for a convolutional GAN that shows how to train a GAN and is a
    good resource if you are curious about GANs in general: [`https://www.tensorflow.org/tutorials/generative/dcgan`](https://www.tensorflow.org/tutorials/generative/dcgan).'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 由于损失函数的复杂性质需要自定义训练循环，训练一个生成对抗网络（GAN）并不像调用`model.fit()`那样简单。TensorFlow提供了一个卷积GAN的指南，展示了如何训练GAN，如果你对GAN有一般的好奇心，这是一个很好的资源：[`https://www.tensorflow.org/tutorials/generative/dcgan`](https://www.tensorflow.org/tutorials/generative/dcgan)。
- en: We have adapted minor portions of the code to create the training loop, though
    we have modified it to use Wasserstein loss and gradient penalty.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 我们对代码进行了少量修改以创建训练循环，尽管我们修改了它以使用Wasserstein损失和梯度惩罚。
- en: First, we must import all of the necessary packages, as shown in Figure [7-2](#Fig2).
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们必须导入所有必要的包，如图[7-2](#Fig2)所示。
- en: '![](../images/483137_2_En_7_Chapter/483137_2_En_7_Fig2_HTML.png)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_7_Chapter/483137_2_En_7_Fig2_HTML.png)'
- en: A screenshot of a set of program codes. It imports all of the necessary packages,
    such as n p, p l t, train test split, Label Encoder, Min Max Scaler, precision
    score, recall score, f 1 score, and t f, and prints the tensor flow.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 一组程序代码的截图。它导入所有必要的包，例如n p, p l t, train test split, Label Encoder, Min Max Scaler,
    precision score, recall score, f 1 score, 和 t f，并打印出tensor flow。
- en: Figure 7-2
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 图7-2
- en: Importing some of the necessary packages to start off our code
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 导入一些必要的包以开始我们的代码
- en: 'You should see outputs like the following:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该看到以下输出：
- en: '[PRE0]'
  id: totrans-97
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Now, let’s define all of the columns of the KDDCUP dataset and import it (Figure
    [7-3](#Fig3)).
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们定义KDDCUP数据集的所有列并导入它（图[7-3](#Fig3)）。
