    with the highest correlation with the label and filters out anything that has
    a null entry or is not weakly correlated.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 一组程序代码的截图。它选择与标签具有最高相关性的变量所在的列，并过滤掉任何有缺失值或不是弱相关的项。
- en: Figure 7-7
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 图7-7
