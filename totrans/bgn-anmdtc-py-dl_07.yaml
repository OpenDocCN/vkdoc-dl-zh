- en: 'You should see output like so:'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该看到如下输出：
- en: '[PRE2]'
  id: totrans-126
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: However, to make the training slightly easier, we will remove both ‘hot’ and
    ‘num_compromised’ because they’re highly correlated with ‘src_bytes.’ We want
    to make the generation task easier for the generator, so removing any unnecessary
    columns will help. Refer to Figure [7-8](#Fig8).
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，为了使训练稍微容易一些，我们将移除“hot”和“num_compromised”，因为它们与“src_bytes”高度相关。我们希望使生成任务对生成器来说更容易，因此移除任何不必要的列将有所帮助。参见图
    [7-8](#Fig8)。
- en: '![](../images/483137_2_En_7_Chapter/483137_2_En_7_Fig8_HTML.png)'
  id: totrans-128
  prefs: []
  type: TYPE_IMG
  zh: '![截图](../images/483137_2_En_7_Chapter/483137_2_En_7_Fig8_HTML.png)'
- en: A screenshot of a set of program codes. It removes the columns that have source
    bytes whose correlation is high.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 一组程序代码的截图。它移除了具有高相关性的源字节的列。
- en: Figure 7-8
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7-8
- en: Removing the unnecessary columns
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 移除不必要的列
- en: We will now rescale the numerical columns to be in the range [0, 1], as shown
    in Figure [7-9](#Fig9). This is once again to improve the data quality to help
    the generator’s learning task.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在将数值列缩放到范围 [0, 1]，如图 [7-9](#Fig9) 所示。这又是为了提高数据质量，以帮助生成器的学习任务。
- en: '![](../images/483137_2_En_7_Chapter/483137_2_En_7_Fig9_HTML.png)'
  id: totrans-133
  prefs: []
  type: TYPE_IMG
  zh: '![截图](../images/483137_2_En_7_Chapter/483137_2_En_7_Fig9_HTML.png)'
- en: A screenshot of a set of program codes. It rescales the numerical columns to
    be in a particular range.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 一组程序代码的截图。它将数值列缩放到特定的范围内。
- en: Figure 7-9
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7-9
- en: Code to min-max scale the numerical columns and save them to a dictionary
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 将数值列进行 min-max 缩放并将其保存到字典中的代码
- en: Let’s now define the training, validation, and testing splits, as shown in Figure
    [7-10](#Fig10). We want to differentiate the normal data and the including anomaly
    data in the validation and testing splits will both contain some anomaly data.
    The reason for including anomaly data in the validation and testing splits is
    that we can use the validation data for seed searching or other hyperparameter
    tuning, because at the end of each epoch, we can evaluate the discriminator/critic’s
    performance. If needed, we can also perform early stopping to maximize the validation
    performance.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 现在定义训练、验证和测试分割，如图 [7-10](#Fig10) 所示。我们希望区分正常数据和包含异常数据的验证和测试分割，它们都将包含一些异常数据。在验证和测试分割中包含异常数据的原因是，我们可以使用验证数据来进行种子搜索或其他超参数调整，因为在每个epoch结束时，我们可以评估判别器/批评家的性能。如果需要，我们还可以执行早期停止以最大化验证性能。
- en: '![](../images/483137_2_En_7_Chapter/483137_2_En_7_Fig10_HTML.png)'
  id: totrans-138
  prefs: []
  type: TYPE_IMG
  zh: '![截图](../images/483137_2_En_7_Chapter/483137_2_En_7_Fig10_HTML.png)'
- en: A screenshot of a set of program codes. It calls the normal and anomaly labels
    and additional splits of the training datasets to create validation splits.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 一组程序代码的截图。它调用正常和异常标签以及训练数据集的额外分割来创建验证分割。
- en: Figure 7-10
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7-10
- en: Defining the training, testing, and validation data splits
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 定义训练、测试和验证数据分割
- en: Let’s now create the final test and validation sets by concatenating the corresponding
    splits for the normal and anomaly data. Refer to Figure [7-11](#Fig11).
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 现在通过连接正常和异常数据的相应分割来创建最终的测试和验证集。参见图 [7-11](#Fig11)。
- en: '![](../images/483137_2_En_7_Chapter/483137_2_En_7_Fig11_HTML.png)'
  id: totrans-143
  prefs: []
  type: TYPE_IMG
  zh: '![截图](../images/483137_2_En_7_Chapter/483137_2_En_7_Fig11_HTML.png)'
- en: A screenshot of a set of program codes. It creates the final test and validation
    sets by concatenating the corresponding splits for the normal and anomaly data
    and printing the shapes.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 一组程序代码的截图。它通过连接正常和异常数据的相应分割来创建最终的测试和验证集，并打印形状。
- en: Figure 7-11
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7-11
- en: Creating the final test and validation splits containing both normal and anomaly
    data
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 创建包含正常和异常数据的最终测试和验证分割
- en: 'You should see output like this:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该看到如下输出：
- en: '[PRE3]'
  id: totrans-148
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: With our data preparation out of the way, let’s start defining the model architecture.
    We are setting a random seed, meaning we want the output of the model training
    to be deterministic across architectures as well as initialize the weights in
    a specific way. Different seeds can lead to different performances in some cases.
    In the case of GANs, seed search can be a viable method of finding the best weight
    initialization setting to lead to optimal performance. Changing this can lead
    to no convergence and poor performance or perhaps an even better convergence.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 在完成数据准备后，让我们开始定义模型架构。我们正在设置一个随机种子，这意味着我们希望模型训练的输出在架构之间是确定的，并且以特定方式初始化权重。在某些情况下，不同的种子可能导致不同的性能。在
    GAN 的情况下，种子搜索可以是一种找到最佳权重初始化设置以实现最佳性能的有效方法。改变这一点可能导致无法收敛和性能不佳，或者甚至可能是一个更好的收敛。
- en: The seed was found through a seed searching algorithm, the code for which you
    can access in the notebook referenced earlier in this section. Over 100 different
    seeds, seed=10, as shown in Figure [7-12](#Fig12), was found to be the best.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 通过种子搜索算法找到了种子，该算法的代码可以在本节前面提到的笔记本中访问。如图 [7-12](#Fig12) 所示，找到了超过100个不同的种子，其中seed=10被认为是最好的。
- en: Let’s first set the imports and the seed = 10, as shown in Figure [7-12](#Fig12).
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先设置导入和 seed = 10，如图 [7-12](#Fig12) 所示。
- en: '![](../images/483137_2_En_7_Chapter/483137_2_En_7_Fig12_HTML.png)'
  id: totrans-152
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_7_Chapter/483137_2_En_7_Fig12_HTML.png)'
- en: A screenshot of a set of program codes. It imports the model, Input, Dense,
    Leaky R e L U, Batch Normalization, L 2, Early Stopping, Binary Cross entropy,
    Adam, R M S prop, and sets the seed.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 一组程序代码的截图。它导入模型、输入、密集层、Leaky ReLU、批量归一化、L2、早停、二元交叉熵、Adam、RMS prop，并设置种子。
- en: Figure 7-12
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7-12
- en: Defining model-specific imports and setting the random seed for consistency
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 定义模型特定的导入和设置随机种子以保持一致性
- en: Now, we can define the generator, as shown in Figure [7-13](#Fig13).
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以定义生成器，如图 [7-13](#Fig13) 所示。
- en: '![](../images/483137_2_En_7_Chapter/483137_2_En_7_Fig13_HTML.png)'
  id: totrans-157
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_7_Chapter/483137_2_En_7_Fig13_HTML.png)'
- en: A screenshot of a set of program codes. It calls the input layer, specifies
    the dimensionality of the x-features, and creates a model by specifying the input
    layer and output layer generator.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 一组程序代码的截图。它调用输入层，指定 x-特征的空间维度，并通过指定输入层和输出层生成器创建了一个模型。
- en: Figure 7-13
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7-13
- en: Defining the architecture of the generator
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 定义生成器的架构
- en: For the generator, we are sampling a 50-dimensional noise vector. It then passes
    through several linear layers with incorporated `BatchNormalization` layers (to
    normalize the outputs of the layer and further stabilize the network training).
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 对于生成器，我们采样一个 50 维的噪声向量。然后它通过几个线性层，其中包含 `BatchNormalization` 层（以归一化层的输出并进一步稳定网络训练）。
- en: Next, let’s define the discriminator, as shown in Figure [7-14](#Fig14).
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们定义判别器，如图 [7-14](#Fig14) 所示。
- en: '![](../images/483137_2_En_7_Chapter/483137_2_En_7_Fig14_HTML.png)'
  id: totrans-163
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_7_Chapter/483137_2_En_7_Fig14_HTML.png)'
- en: A screenshot of a set of program codes. It defines the discriminator and creates
    a model by specifying the input layer and output layer discriminators.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 一组程序代码的截图。它定义了判别器，并通过指定输入层和输出层判别器创建了一个模型。
- en: Figure 7-14
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7-14
- en: Defining the discriminator. The output layer has the linear activation function
    because this discriminator is actually the critic in the WGAN setup and will be
    outputting unbounded score predictions
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 定义判别器。输出层使用线性激活函数，因为实际上这个判别器是 WGAN 设置中的评论家，并将输出无界分数预测。
- en: We must now define the optimizers for the generator and the discriminator. We
    use RMSProp with a generator learning rate of 5e-5 and a discriminator learning
    rate of 1e-5\. We also define the batch size to be 4096 (to speed up training).
    Changing this might also change the performance of the model. Refer to Figure
    [7-15](#Fig15).
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在必须定义生成器和判别器的优化器。我们使用 RMSProp，生成器学习率为 5e-5，判别器学习率为 1e-5。我们还定义批大小为 4096（以加快训练速度）。改变这一点也可能改变模型的性能。参见图
    [7-15](#Fig15)。
- en: '![](../images/483137_2_En_7_Chapter/483137_2_En_7_Fig15_HTML.png)'
  id: totrans-168
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_7_Chapter/483137_2_En_7_Fig15_HTML.png)'
- en: A screenshot of a set of program codes. It defines the optimizers for the generator
    and the discriminator by using R M S Prop with a generator learning rate of 5
    e minus 5 and a discriminator learning rate of 1 e minus 5, and sets the batch
    size to 4096.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 一组程序代码的截图。它使用 R M S Prop 并将生成器学习率设为 5 e-5，将评论家学习率设为 1 e-5，并将批大小设为 4096 来定义生成器和评论家的优化器。
- en: Figure 7-15
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7-15
- en: Defining the optimizers as well as the batched training dataset
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 定义优化器以及批处理训练数据集
- en: Following this, we will define the gradient penalty function. Refer to Figure
    [7-16](#Fig16).
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 在此之后，我们将定义梯度惩罚函数。请参考图 [7-16](#Fig16)。
- en: '![](../images/483137_2_En_7_Chapter/483137_2_En_7_Fig16_HTML.png)'
  id: totrans-173
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_7_Chapter/483137_2_En_7_Fig16_HTML.png)'
- en: A screenshot of a set of program codes. It defines the gradient penalty functions
    for the critic, real data, and generated data.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 一组程序代码的截图。它定义了评论家、真实数据和生成数据的梯度惩罚函数。
- en: Figure 7-16
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7-16
- en: Defining the gradient penalty function
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 定义梯度惩罚函数
- en: Finally, we have the training loop, where it all comes together. Refer to Figure
    [7-17](#Fig17) for some hyperparameter settings.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们有训练循环，所有内容都在这里汇聚。请参考图 [7-17](#Fig17) 了解一些超参数设置。
- en: '![](../images/483137_2_En_7_Chapter/483137_2_En_7_Fig17_HTML.png)'
  id: totrans-178
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_7_Chapter/483137_2_En_7_Fig17_HTML.png)'
- en: A screenshot of a set of program codes. It sets the hyperparameter values such
    as epochs as 10, lambda as 10, g loss as 0, d loss as 0, d loss real as 0, and
    d loss fake as 0.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 一组程序代码的截图。它设置了超参数值，例如将周期数设为 10，lambda 设为 10，g 损失设为 0，d 损失设为 0，d 损失真实设为 0，d 损失伪造设为
    0。
- en: Figure 7-17
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7-17
- en: Setting some training hyperparameters
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 设置一些训练超参数
- en: Figure [7-18](#Fig18) shows the code to define the training loop.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [7-18](#Fig18) 展示了定义训练循环的代码。
- en: '![](../images/483137_2_En_7_Chapter/483137_2_En_7_Fig18_HTML.png)'
  id: totrans-183
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_7_Chapter/483137_2_En_7_Fig18_HTML.png)'
- en: A screenshot of a set of program codes. It defines the training loop, calculates
    g loss, d loss, d loss real, and d loss fake, combines losses, and prints the
    precision score.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 一组程序代码的截图。它定义了训练循环，计算 g 损失、d 损失、d 损失真实和 d 损失伪造，合并损失并打印精确度分数。
- en: Figure 7-18
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7-18
- en: Defining the training loop for the GAN. At the end of each epoch, we predict
    on the validation data and print the precision, recall, and F1-scores
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 定义 GAN 的训练循环。在每个训练周期结束时，我们在验证数据上预测并打印精确度、召回率和 F1 分数
- en: Your training outputs should look something like Figure [7-19](#Fig19).
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 你的训练输出应该类似于图 [7-19](#Fig19)。
- en: '![](../images/483137_2_En_7_Chapter/483137_2_En_7_Fig19_HTML.png)'
  id: totrans-188
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_7_Chapter/483137_2_En_7_Fig19_HTML.png)'
- en: A screenshot of a set of program codes. It defines the training outputs as Epoch
    0 to Epoch 9.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 一组程序代码的截图。它定义了从第 0 个训练周期到第 9 个训练周期的训练输出。
- en: Figure 7-19
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7-19
- en: The training outputs. The three outputs at the end of each epoch are, in order,
    the precision, recall, and F1-measure. Over the course of training, the F1-score
    tends to improve
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 训练输出。在每个训练周期末尾的三个输出依次是精确度、召回率和 F1 测度。在整个训练过程中，F1 分数往往会提高
- en: Once the training finishes, let’s make the predictions on the test data. Refer
    to Figure [7-20](#Fig20).
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦训练完成，让我们在测试数据上进行预测。请参考图 [7-20](#Fig20)。
- en: '![](../images/483137_2_En_7_Chapter/483137_2_En_7_Fig20_HTML.png)'
  id: totrans-193
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_7_Chapter/483137_2_En_7_Fig20_HTML.png)'
- en: A screenshot of a set of program codes. It predicts the test data and prints
    the precision score, recall, and F 1 measure.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 一组程序代码的截图。它预测测试数据并打印精确度分数、召回率和 F1 测度。
- en: Figure 7-20
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7-20
- en: Using the discriminator to predict on the test set and print out the computed
    precision, recall, and F1-scores
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 使用评论家在测试集上进行预测并打印计算出的精确度、召回率和 F1 分数
- en: 'If all goes well during training, you should see some outputs like this:'
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 如果训练过程中一切顺利，你应该看到一些类似这样的输出：
- en: '[PRE4]'
  id: totrans-198
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Finally, let’s plot the confusion matrix, as shown in Figure [7-21](#Fig21).
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，让我们绘制混淆矩阵，如图 [7-21](#Fig21) 所示。
- en: '![](../images/483137_2_En_7_Chapter/483137_2_En_7_Fig21_HTML.png)'
  id: totrans-200
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_7_Chapter/483137_2_En_7_Fig21_HTML.png)'
- en: A screenshot of a set of program codes. It plots the confusion matrix by labeling
    the x-axis as the predicted label and the y-axis as the true label.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 一组程序代码的截图。它通过将 x 轴标记为预测标签，y 轴标记为真实标签来绘制混淆矩阵。
- en: Figure 7-21
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7-21
- en: The code to plot the confusion matrix
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 绘制混淆矩阵的代码
- en: You should see something like Figure [7-22](#Fig22).
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该看到类似图 [7-22](#Fig22) 的内容。
- en: '![](../images/483137_2_En_7_Chapter/483137_2_En_7_Fig22_HTML.jpg)'
  id: totrans-205
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_7_Chapter/483137_2_En_7_Fig22_HTML.jpg)'
- en: A 2 by 2 confusion matrix with the y-axis as the true label and the x-axis as
    the predicted label. A scale of color gradients ranges from 0 to 80000\. It reads
    the following elements. Row 1\. 3167, 69\. Row 2\. 14, 92843\. 92843 is lightly
    shaded, and the others are dark.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 一个2x2的混淆矩阵，y轴为真实标签，x轴为预测标签。颜色渐变从0到80000。它读取以下元素。第1行。3167，69。第2行。14，92843。92843被轻微着色，其余的则是深色。
- en: Figure 7-22
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 图7-22
- en: The confusion matrix. There are few misclassifications—the discriminator/critic
    misclassified 69 anomalies as being normal, while it predicted 14 normal points
    as being anomalies
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 混淆矩阵。误分类很少——判别器/评论员将69个异常误分类为正常，同时将14个正常点预测为异常。
- en: As we can see in Figure [7-22](#Fig22), the GAN did a great job at predicting
    anomalies despite only being trained on normal data. The precision is 0.9955,
    meaning that it is very accurate at specifically predicting anomalies. Its recall
    is 0.9786, which is still a strong number, and indicates that it may capture the
    vast majority of true anomalies if more new data were predicted on.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们在图[7-22](#Fig22)中可以看到的，尽管GAN只在对正常数据进行训练的情况下，仍然在预测异常方面做得很好。其精确度为0.9955，这意味着它在具体预测异常方面非常准确。其召回率为0.9786，这仍然是一个强劲的数字，表明如果预测更多新数据，它可能捕捉到绝大多数的真实异常。
- en: There are plenty of experiments you can conduct with different hyperparameter
    settings, different loss functions, neural network architectures, data splits,
    and so on.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以进行大量实验，包括不同的超参数设置、不同的损失函数、神经网络架构、数据分割等等。
- en: Overall, this was an example of semi-supervised anomaly detection, since we
    trained the model only on normal data and used them to successfully predict anomalies
    at a high rate.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 总体来说，这是一个半监督异常检测的例子，因为我们只在对正常数据进行训练的情况下训练模型，并成功地以高比率预测了异常。
- en: Summary
  id: totrans-212
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we discussed how generative adversarial networks can be applied
    to the task of anomaly detection. In Chapter [8](483137_2_En_8_Chapter.xhtml),
    we will look at anomaly detection in time-series settings.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们讨论了生成对抗网络如何应用于异常检测任务。在第[8](483137_2_En_8_Chapter.xhtml)章中，我们将探讨时间序列设置中的异常检测。
