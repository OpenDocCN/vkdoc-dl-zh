  id: totrans-398
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建模型
- en: 'Clear session and generate a seed:'
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: 清除会话并生成一个种子：
- en: '[PRE103]'
  id: totrans-400
  prefs: []
  type: TYPE_PRE
  zh: '[PRE103]'
- en: 'Create the model:'
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 创建模型：
- en: '[PRE104]'
  id: totrans-402
  prefs: []
  type: TYPE_PRE
  zh: '[PRE104]'
- en: Notice that the first layer is *feature_layer*, which informs the model about
    one-hot encoded features.
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，第一层是*feature_layer*，它向模型提供了关于独热编码特征的信息。
- en: Compile the Model
  id: totrans-404
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编译模型
- en: 'Compile:'
