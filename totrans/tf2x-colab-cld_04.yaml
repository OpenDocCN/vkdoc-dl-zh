  id: totrans-376
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建输入管道
- en: 'Prepare train and test data for TensorFlow consumption:'
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: 准备训练和测试数据以供 TensorFlow 使用：
- en: '[PRE99]'
  id: totrans-378
  prefs: []
  type: TYPE_PRE
  zh: '[PRE99]'
- en: Notice that we convert train and test feature data to Python dictionaries. We
    do this to enable construction of categorical feature columns.
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，我们将训练和测试特征数据转换为 Python 字典。我们这样做是为了能够构建分类特征列。
- en: 'Shuffle train data, batch, and prefetch train and test data:'
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 打乱训练数据，分批，并预取训练和测试数据：
- en: '[PRE100]'
  id: totrans-381
  prefs: []
  type: TYPE_PRE
  zh: '[PRE100]'
- en: Notice that the shapes include each feature column name.
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，形状包括每个特征列名。
- en: Explore a Batch
  id: totrans-383
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 探索一个批次
- en: Since we converted feature data to dictionaries, we can display interesting
    information about the data as shown in Listing [4-11](#PC102).
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们将特征数据转换为字典，我们可以显示有关数据的有趣信息，如列表 [4-11](#PC102) 所示。
- en: '[PRE101]'
  id: totrans-385
  prefs: []
  type: TYPE_PRE
  zh: '[PRE101]'
- en: Categorical Columns
  id: totrans-386
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 分类列
- en: TensorFlow consumption is *limited to numeric data*. So we must convert any
    categorical data. The only culprit in this scenario is the ‘Sex’ feature because
    it is represented by string values of either ‘M’, ‘F’, or ‘I’. So sex for the
    abalone shell is either male, female, or infant.
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow 的使用仅限于**数值数据**。因此，我们必须转换任何分类数据。在这种情况下，唯一的罪魁祸首是“性别”特征，因为它由“M”、“F”或“I”的字符串值表示。因此，鲍鱼壳的性别要么是男性、女性或婴儿。
- en: Since we cannot feed strings directly to a model, we must first map them to
    numeric values. The categorical vocabulary columns feature provides a way to represent
    strings as a *one-hot vector*. This process is called **one-hot encoding** , which
    is a technique that converts categorical variables to numerical in an interpretable
    format.
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们不能直接将字符串输入到模型中，我们必须首先将它们映射到数值。分类词汇列特征提供了一种将字符串表示为*一维向量*的方法。这个过程称为**一维编码**，它是一种将分类变量转换为可解释格式的技术。
- en: 'The strings are converted in the following manner:'
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 字符串按以下方式转换：
- en: ‘M’ => 1 0 0
  id: totrans-390
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: ‘M’ => 1 0 0
- en: ‘F’ => 0 1 0
  id: totrans-391
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: ‘F’ => 0 1 0
- en: ‘I’ => 0 0 1
  id: totrans-392
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: ‘I’ => 0 0 1
- en: Listing [4-12](#PC103) one-hot encodes the sex feature.
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 [4-12](#PC103) 将性别特征进行了一维编码。
- en: '[PRE102]'
  id: totrans-394
  prefs: []
  type: TYPE_PRE
  zh: '[PRE102]'
- en: Import the *feature_column* module. One-hot encode ‘Sex’. Create the feature_columns
    list. We create a list so we can have multiple categorical features in a training
    dataset. Finally, create the *feature_layer* for the model.
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 导入 *feature_column* 模块。对“性别”进行一维编码。创建特征列列表。我们创建一个列表，这样我们就可以在训练数据集中有多个分类特征。最后，为模型创建
    *feature_layer*。
- en: 'For a comprehensive example, peruse the following URL:'
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一个全面的示例，请参阅以下 URL：
- en: '[`www.tensorflow.org/tutorials/structured_data/feature_columns`](http://www.tensorflow.org/tutorials/structured_data/feature_columns)'
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: '[`www.tensorflow.org/tutorials/structured_data/feature_columns`](http://www.tensorflow.org/tutorials/structured_data/feature_columns)'
