  type: TYPE_NORMAL
- en: '*P. Cortez, A. Cerdeira, F. Almeida, T. Matos, and J. Reis. Modeling wine preferences
    by data mining from physicochemical properties. In Decision Support Systems, Elsevier,
    2009, 47(4):547–553\. ISSN: 0167-9236.*'
