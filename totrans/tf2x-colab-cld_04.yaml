- en: Performance is not good because feedforward nets don’t work well with image
    data. However, we create this simple model to show you how to train the dataset.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 性能不佳，因为前馈网络与图像数据配合不佳。然而，我们创建这个简单的模型来向您展示如何训练数据集。
