  type: TYPE_NORMAL
  zh: 将特征数据转换为 Numpy：
- en: '[PRE90]'
  id: totrans-350
  prefs: []
  type: TYPE_PRE
  zh: '[PRE90]'
- en: Scale Features
  id: totrans-351
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 缩放特征
- en: We can only scale continuous values. Since the sex feature is not continuous,
    it cannot be scaled. So we slice off the continuous values to scale. We then recreate
    train and test sets with the sex feature and scaled continuous values.
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 我们只能缩放连续值。由于性别特征不是连续的，因此不能缩放。所以我们将连续值切掉以进行缩放。然后我们重新创建包含性别特征和缩放连续值的训练和测试集。
