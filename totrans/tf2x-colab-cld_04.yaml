- en: Categorical Columns
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: TensorFlow consumption is *limited to numeric data*. So we must convert any
    categorical data. The only culprit in this scenario is the ‘Sex’ feature because
    it is represented by string values of either ‘M’, ‘F’, or ‘I’. So sex for the
    abalone shell is either male, female, or infant.
  prefs: []
  type: TYPE_NORMAL
- en: Since we cannot feed strings directly to a model, we must first map them to
    numeric values. The categorical vocabulary columns feature provides a way to represent
    strings as a *one-hot vector*. This process is called **one-hot encoding** , which
    is a technique that converts categorical variables to numerical in an interpretable
    format.
  prefs: []
  type: TYPE_NORMAL
- en: 'The strings are converted in the following manner:'
  prefs: []
  type: TYPE_NORMAL
- en: ‘M’ => 1 0 0
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: ‘F’ => 0 1 0
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: ‘I’ => 0 0 1
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Listing [4-12](#PC103) one-hot encodes the sex feature.
  prefs: []
  type: TYPE_NORMAL
