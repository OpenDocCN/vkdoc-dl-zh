- en: Classes range from 1 to 27, and 29\. Each class represents the age of an abalone
    shell in years. The distribution is very uneven. For example, we have 689 instances
    of shells that are nine years old, but only 1 instance of a shell that is a one-year-old.
    Typically, machine learning algorithms don’t work well with imbalanced data because
    prediction is biased toward the classes with the most instances. **Imbalanced
    data** is the problem of classification when there is an unequal distribution
    of classes in the training set. However, problems like fraud detection are routinely
    handled by machine learning where classes are expected to be imbalanced.
  prefs: []
  type: TYPE_NORMAL
