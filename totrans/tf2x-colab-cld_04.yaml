  type: TYPE_PRE
  zh: '[PRE20]'
- en: Train the Model
  id: totrans-89
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 训练模型
- en: 'Train:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 训练：
- en: '[PRE21]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: Since epochs is set at 10, our model processes the dataset *ten times*. Since
    train and test accuracy are closely aligned, we don’t have much overfitting.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 由于将周期数设置为 10，我们的模型对数据集进行了 *十次* 处理。由于训练和测试准确率紧密一致，我们没有太多过拟合。
- en: Scikit-Learn Data
  id: totrans-93
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Scikit-Learn 数据
- en: We can also read data from the scikit-learn library. *Scikit-learn* is a free
    software machine learning library for the Python programming language.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以从 scikit-learn 库中读取数据。*Scikit-learn* 是一个用于 Python 编程语言的免费软件机器学习库。
- en: 'Grab a dataset from this library:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 从这个库中获取数据集：
- en: '[PRE22]'
  id: totrans-96
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: 'The *fetch_lfw_people* dataset is a collection of JPEG pictures of famous people
    collected over the Internet. All details are available on the official website:
    [`http://vis-www.cs.umass.edu/lfw/`](http://vis-www.cs.umass.edu/lfw/). Each picture
    is centered on a single face. The typical machine learning task is face verification.
    So, given a pair of pictures, we predict whether the two images are of the same
    person.'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: '*fetch_lfw_people*数据集是收集自互联网的著名人物JPEG图片的集合。所有详细信息都可以在官方网站上找到：[`http://vis-www.cs.umass.edu/lfw/`](http://vis-www.cs.umass.edu/lfw/)。每张图片都集中在单个面部上。典型的机器学习任务是面部验证。因此，给定一对图片，我们预测这两张图像是否为同一个人。'
- en: An alternative machine learning task is face recognition (or face identification).
    So, given the picture of the face of an unknown person, we identify the name of
    the person by referring to a gallery of previously seen pictures of identified
    persons.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种机器学习任务是面部识别（或面部识别）。因此，给定一个未知人的面部图片，我们通过参考已识别人员的先前看到的图片库来识别该人的姓名。
- en: Explore the Data
  id: totrans-99
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 探索数据
- en: 'Display the keys:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 显示键：
- en: '[PRE23]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: The dataset contains feature images (in the images container) and targets (in
    the target container). It also contains target names and a description of the
    dataset. The data container consists of flattened vectors of each image.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集包含特征图像（在图像容器中）和目标（在目标容器中）。它还包含目标名称和数据集的描述。数据容器由每个图像的展平向量组成。
- en: Listing [4-4](#PC25) displays shapes, target names, and class labels.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 列表[4-4](#PC25)显示了形状、目标名称和类别标签。
- en: '[PRE24]'
  id: totrans-104
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: The feature image tensor consists of 1,288 50 `×` 37 face images. The target
    tensor consists of 1,288 targets. The data shape consists of 1,288 flattened vectors
    each with 1,850 elements. We get 1,850 by multiplying 50 by 37.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 特征图像张量由1,288个50×37面部图像组成。目标张量由1,288个目标组成。数据形状由1,288个展平向量组成，每个向量有1,850个元素。我们通过将50乘以37得到1,850。
- en: Listing [4-5](#PC26) explores the first example.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 列表[4-5](#PC26)探讨了第一个示例。
- en: '[PRE25]'
  id: totrans-107
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: Each image is represented by a 2D matrix. The target value for the first image
    is 5, which just happens to be an image of Hugo Chavez.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 每个图像都由一个二维矩阵表示。第一个图像的目标值是5，恰好是胡戈·查韦斯的图像。
- en: Build the Input Pipeline
  id: totrans-109
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建输入管道
- en: Create train and test sets. Scale feature images as shown in Listing [4-6](#PC27).
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 创建训练集和测试集。按列表[4-6](#PC27)所示缩放特征图像。
- en: '[PRE26]'
  id: totrans-111
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: The *train_test_split* module provides an easy way to split a dataset into train
    and test sets. We also have the flexibility to set the train and test size to
    our needs. The *random_state* parameter provides a way to reproduce our results.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: '*train_test_split*模块提供了一个简单的方法将数据集分为训练集和测试集。我们还可以根据需要设置训练和测试的大小。*random_state*参数提供了一种重现我们结果的方法。'
- en: Our train set contains 67% of the data. The remaining 33% is placed in the test
    set. The training feature data shape is (862, 50, 37), and the test feature data
    shape is (426, 50, 37). So training feature data consists of 862 50 `×` 37-pixel
    images, and test feature data consists of 426 50 `×` 37-pixel images.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的训练集包含67%的数据。剩余的33%放在测试集中。训练特征数据形状为(862, 50, 37)，测试特征数据形状为(426, 50, 37)。因此，训练特征数据由862个50×37像素的图像组成，测试特征数据由426个50×37像素的图像组成。
- en: Divide images by 255 to scale them. Scaling makes vector operations simpler.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 将图像除以255以缩放它们。缩放使向量运算更简单。
- en: Display the first pixel image from the train set. Display the first pixel from
    the first pixel image and display its scaled value.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 显示训练集中的第一像素图像。显示第一像素图像的第一像素并显示其缩放值。
- en: 'Continue by slicing data into TensorFlow consumable pieces:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 继续通过将数据切割成TensorFlow可消费的部分：
- en: '[PRE27]'
  id: totrans-117
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
