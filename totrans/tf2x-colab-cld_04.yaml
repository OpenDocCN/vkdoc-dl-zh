  type: TYPE_NORMAL
  zh: 我们有 3,132 个训练示例和 1,045 个测试示例。如果没有指定，默认测试大小为 25%。
- en: Create Feature and Target Sets
  id: totrans-340
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建特征和目标集
- en: It’s a good idea to create copies of train and test sets to preserve original
    data. Otherwise, the pop method can wreak havoc as it removes data permanently.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 创建训练集和测试集副本以保留原始数据是个好主意。否则，pop 方法可能会造成永久性破坏。
