- en: Viscera
  id: totrans-294
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 内脏
- en: Shell
  id: totrans-295
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 壳
- en: The target variable is
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 目标变量是
- en: Rings
  id: totrans-297
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 环数
- en: The target variable rings can take on a score between 1 and 29\. Such scores
    represent the number of rings for an abalone shell. So the *number of rings* is
    the value to predict. An interesting notion about this dataset is that we can
    use it either as a continuous value experiment or as a classification problem.
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 目标变量环数可以取 1 到 29 之间的分数。这样的分数代表鲍鱼壳的环数。因此，*环数*是预测的值。关于这个数据集的一个有趣的观点是，我们可以将其用作连续值实验，也可以将其用作分类问题。
