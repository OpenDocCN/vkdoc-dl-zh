  prefs: []
  type: TYPE_NORMAL
  zh: 显示一个样本以验证切片：
- en: '[PRE91]'
  id: totrans-354
  prefs: []
  type: TYPE_PRE
  zh: '[PRE91]'
- en: Slicing is complex. So it is a good idea to display a sample to ensure that
    slicing worked as expected.
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: 切片很复杂。因此，显示一个样本以确保切片按预期工作是个好主意。
- en: 'Create two train sets (one with sex and the other with continuous values):'
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 创建两个训练集（一个包含性别，另一个包含连续值）：
- en: '[PRE92]'
  id: totrans-357
  prefs: []
  type: TYPE_PRE
  zh: '[PRE92]'
- en: So far, so good!
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，一切顺利！
- en: 'Create two test sets (one with sex and the other with continuous values):'
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 创建两个测试集（一个包含性别，另一个包含连续值）：
- en: '[PRE93]'
  id: totrans-360
  prefs: []
  type: TYPE_PRE
  zh: '[PRE93]'
- en: Again, our slices match the original data.
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的切片与原始数据匹配。
- en: 'Scale continuous values:'
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 缩放连续值：
- en: '[PRE94]'
  id: totrans-363
  prefs: []
  type: TYPE_PRE
  zh: '[PRE94]'
- en: Create Train and Test Sets with Sex and Scaled Values
  id: totrans-364
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建包含性别和缩放值的训练和测试集
- en: Now that we’ve scaled continuous values, we need to recombine them with the
    sex feature as shown in Listing [4-10](#PC96).
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经缩放了连续值，我们需要将它们与性别特征重新组合，如列表 [4-10](#PC96) 所示。
- en: '[PRE95]'
  id: totrans-366
  prefs: []
  type: TYPE_PRE
  zh: '[PRE95]'
- en: Recombine train and test features and display. Notice that the continuous features
    are scaled.
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 重新组合训练和测试特征并显示。注意连续特征已缩放。
- en: Convert Numpy Feature Sets into Pandas DataFrames
  id: totrans-368
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 将 Numpy 特征集转换为 Pandas 数据框
- en: 'To properly build a TensorFlow consumable dataset with noncontinuous data,
    we need the feature data in pandas dataframe form:'
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 为了正确构建一个 TensorFlow 可消费的非连续数据集，我们需要以 pandas 数据框形式提供特征数据：
- en: '[PRE96]'
  id: totrans-370
  prefs: []
  type: TYPE_PRE
  zh: '[PRE96]'
- en: We need the original column names to add to the dataframe.
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要原始列名以添加到数据框中。
- en: 'Verify train features:'
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 再次验证训练特征：
- en: '[PRE97]'
  id: totrans-373
  prefs: []
  type: TYPE_PRE
  zh: '[PRE97]'
