- en: 4. Working with Other Data
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 4. 与其他数据一起工作
- en: In the previous chapter, we showed you how to work with a TFDS. But what if
    we want to work with another type of dataset? In this chapter, we show you how
    to work with other types of data with TensorFlow.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一章中，我们向您展示了如何使用 TFDS。但如果我们想使用其他类型的数据集呢？在本章中，我们将向您展示如何使用 TensorFlow 处理其他类型的数据。
- en: 'Notebooks for chapters are located at the following URL: [`https://github.com/paperd/tensorflow`](https://github.com/paperd/tensorflow).'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 各章节的笔记本位于以下 URL：[`https://github.com/paperd/tensorflow`](https://github.com/paperd/tensorflow)。
- en: 'Enable the GPU (if not already enabled):'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 启用 GPU（如果尚未启用）：
- en: Click *Runtime* in the top-left menu.
  id: totrans-4
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在右上角菜单中点击 *运行时*。
- en: Click *Change runtime type* from the drop-down menu.
  id: totrans-5
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从下拉菜单中选择 *更改运行时类型*。
- en: Choose *GPU* from the *Hardware accelerator* drop-down menu.
  id: totrans-6
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从 *硬件加速器* 下拉菜单中选择 *GPU*。
- en: Click *SAVE*.
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 *保存*。
- en: 'Test if GPU is active:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 测试 GPU 是否激活：
- en: '[PRE0]'
  id: totrans-9
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Import the *tensorflow* library. If ‘/device:GPU:0’ is displayed, the GPU is
    active. If ‘..’ is displayed, the regular CPU is active.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 导入 *tensorflow* 库。如果显示 ‘/device:GPU:0’，则 GPU 已激活。如果显示 ‘..’，则常规 CPU 已激活。
- en: Basic Mechanics
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基本机制
- en: To create an input pipeline, we start with a data source. To construct a dataset
    from data in memory that TensorFlow can work with, we can use either tf.data.Dataset.from_tensor_slices()
    or tf.data.Dataset.from_tensors(). The *from_tensor_slices* method creates a dataset
    with a separate element for each piece of the input tensor. The *from_tensors*
    method combines the input and returns a dataset with a single element. We work
    *exclusively* with the from_tensor_slices method because it enables us to work
    with each data element.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建一个输入管道，我们从一个数据源开始。为了从 TensorFlow 可以处理内存中的数据构建数据集，我们可以使用 tf.data.Dataset.from_tensor_slices()
    或 tf.data.Dataset.from_tensors()。*from_tensor_slices* 方法为输入张量的每一部分创建一个单独的元素。*from_tensors*
    方法将输入合并并返回一个包含单个元素的数据集。我们**仅**使用 *from_tensor_slices* 方法，因为它使我们能够处理每个数据元素。
- en: 'Create a simple 1D tensor and make it consumable for TensorFlow:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个简单的 1D 张量并使其对 TensorFlow 可消费：
- en: '[PRE1]'
  id: totrans-14
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: We create a TensorSpec from the six-element list and make it TensorFlow consumable
    with the from_tensor_slices method. The shape is () because the from_tensor_slices
    creates an object from the slices of an array.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从六个元素的列表创建一个 TensorSpec，并使用 from_tensor_slices 方法使其对 TensorFlow 可消费。形状是 ()，因为
    from_tensor_slices 从数组的切片创建对象。
- en: Listing [4-1](#PC3) demonstrates how to iterate the dataset.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 [4-1](#PC3) 展示了如何迭代数据集。
- en: '[PRE2]'
  id: totrans-17
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: The dataset has six tensors. The first loop displays each element in the tensor
    as numpy values. The second loop displays the raw tensors.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 该数据集包含六个张量。第一个循环显示张量中的每个元素作为 numpy 值。第二个循环显示原始张量。
- en: 'We can also create a Python iterator using *iter* and consume its elements
    with the *next* method:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我们也可以使用 *iter* 创建一个 Python 迭代器，并通过 *next* 方法消费其元素：
- en: '[PRE3]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: We see the first element from the tensor displayed.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我们看到张量中的第一个元素被显示出来。
- en: 'To view the remaining elements, just keep running the following:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 要查看剩余的元素，只需继续运行以下代码：
- en: '[PRE4]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'Now, create a tensor with tf.data.Dataset_from_tensors():'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，使用 tf.data.Dataset_from_tensors() 创建一个张量：
- en: '[PRE5]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Notice that the shape is (6,), which means that the single tensor is composed
    of six elements.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 注意形状是 (6,)，这意味着单个张量由六个元素组成。
- en: Let’s iterate the single tensor as shown in Listing [4-2](#PC7).
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们迭代如列表 [4-2](#PC7) 所示的单个张量。
- en: '[PRE6]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: We have a dataset with a *single* tensor that contains six elements.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有一个包含六个元素的 *单个* 张量的数据集。
- en: TensorFlow Dataset Structure
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: TensorFlow 数据集结构
- en: A dataset contains elements that each have the same nested structure, and the
    individual components of the structure can have any type representable by tf.TypeSpec,
    including tf.Tensor, tf.sparse.SparseTensor, tf.RaggedTensor, tf.TensorArray,
    or tf.data.Dataset. The *Dataset.element_spec* property allows us to inspect the
    type of each element component. The property returns a nested structure of *tf.TypeSpec*
    objects that match the structure of the element. The element may be a single component,
    a tuple of components, or a nested tuple of components.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 一个数据集包含具有相同嵌套结构的元素，结构的各个组成部分可以是 tf.TypeSpec 可以表示的任何类型，包括 tf.Tensor、tf.sparse.SparseTensor、tf.RaggedTensor、tf.TensorArray
    或 tf.data.Dataset。*Dataset.element_spec* 属性允许我们检查每个元素组件的类型。该属性返回一个与元素结构匹配的 *tf.TypeSpec*
    对象的嵌套结构。元素可能是一个单独的组件，一个组件的元组，或者一个嵌套的组件元组。
- en: We can better understand the structure with an example as shown in Listing [4-3](#PC8).
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过以下示例更好地理解结构，如列表 [4-3](#PC8) 所示。
- en: '[PRE7]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The shape of *scope* is (4, 10), which means that we have a tensor with four
    elements, each of which contains ten randomly generated uniformly distributed
    numbers between 0 and 1\. We generate a TensorFlow consumable dataset from scope
    with the from_tensor_slices method and display the TensorSpec with the element_spec
    method. We continue by displaying each element from the TensorSpec.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '*scope*的形状是(4, 10)，这意味着我们有一个包含四个元素的张量，每个元素包含0到1之间随机生成的十个均匀分布的数。我们使用from_tensor_slices方法从scope生成一个TensorFlow可消费的数据集，并使用element_spec方法显示TensorSpec，然后显示TensorSpec中的每个元素。'
- en: Note
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Along with example and sample, the term *element* is also used to describe a
    tensor in a dataset.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 除了示例和样本之外，术语*element*也用来描述数据集中的张量。
- en: Simply, we create a dataset containing four elements. Each element contains
    ten random uniform numbers between 0 and 1\. We convert the dataset to one that
    TensorFlow can consume (or work with). We display each element by iterating the
    TensorFlow dataset.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 简单来说，我们创建一个包含四个元素的数据集。每个元素包含0到1之间的十个随机均匀数。我们将数据集转换为TensorFlow可以消费（或处理）的数据集。我们通过迭代TensorFlow数据集来显示每个元素。
- en: Reading Input Data
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 读取输入数据
- en: If all of your input data fits in memory, the simplest way to create a dataset
    for TensorFlow consumption is to convert it to a tf.Tensor object with Dataset.from_tensor_slices().
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的所有输入数据都适合内存，创建一个用于TensorFlow消费的数据集的最简单方法是将它转换为tf.Tensor对象，使用Dataset.from_tensor_slices()。
- en: Colab Abends
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Colab崩溃
- en: 'As previously noted, when running Google Colab for a long time (e.g., several
    hours) without pause or loading large datasets into memory and processing said
    data, it may crash (or abend). When this happens, you have two choices that we
    know of:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，当长时间（例如，几个小时）运行Google Colab而没有暂停或加载大量数据集到内存中并处理这些数据时，它可能会崩溃（或崩溃）。当这种情况发生时，我们知道你有两种选择：
- en: Restart all runtimes.
  id: totrans-42
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重新启动所有运行时。
- en: Close the program and restart it from scratch.
  id: totrans-43
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 关闭程序并从头开始重新启动。
- en: To restart all runtimes, click *Runtime* in the top menu, click *Restart runtime*
    from the drop-down menu, and click *YES* when prompted. Google Colab recommends
    this option. If you restart from scratch, clear browser history first and then
    start Google Colab from scratch.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 要重新启动所有运行时，请点击顶部菜单中的*运行时*，从下拉菜单中选择*重启运行时*，并在提示时点击*YES*。Google Colab推荐此选项。如果你从头开始重新启动，请先清除浏览器历史记录，然后从头开始启动Google
    Colab。
- en: Batch Size
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 批次大小
- en: '**Batch size** is the number of training examples processed by the neural network
    model in one pass. Don’t get batch size confused with epochs! An **epoch** is
    a complete pass through the training dataset. So the number of epochs is the number
    of complete passes through the training dataset. Epochs have nothing to do with
    the processing of training examples! They just represent the number of passes
    through the network. Simply, during each pass (or epoch) through the network,
    batches of the training dataset are processed.'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '**批次大小**是神经网络模型在一次传递中处理的训练示例数量。不要将批次大小与epoch混淆！一个**epoch**是完整遍历训练数据集。因此，epoch的数量是完整遍历训练数据集的次数。Epochs与训练示例的处理无关！它们只是表示网络遍历的次数。简单来说，在每次通过（或epoch）网络时，会处理训练数据集的批次。'
- en: The size of a batch must be more than or equal to one and less than or equal
    to the number of samples in the training dataset. This makes sense because you
    can’t have a batch that is bigger than the total number of training examples.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 批次的大小必须大于或等于一个，并且小于或等于训练数据集中的样本数。这很有意义，因为你不能有一个比总训练示例数更大的批次。
- en: TensorFlow is *optimized* to run batches of training data much greater than
    one. So a batch size of one is very inefficient! Since a batch size of one represents
    the entire training dataset, we are not really batching data. So unless you don’t
    want to batch data, don’t use a batch size of one!
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow已**优化**以运行大于一个的训练数据批次。因此，批次大小为一个是效率非常低的！因为批次大小为一是代表整个训练数据集，我们实际上并没有分批处理数据。所以除非你不想分批处理数据，否则不要使用批次大小为一个！
- en: Keras Data
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Keras数据
- en: 'The *tf.keras.datasets* module provides seven preprocessed datasets for practicing
    TensorFlow. Peruse the following URL to get more information about the datasets:
    [`https://keras.io/api/datasets/`](https://keras.io/api/datasets/).'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '*tf.keras.datasets*模块提供了七个预处理好的数据集用于练习TensorFlow。查看以下URL以获取有关数据集的更多信息：[`https://keras.io/api/datasets/`](https://keras.io/api/datasets/)。'
- en: 'Let’s grab the Keras MNIST dataset:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们获取Keras MNIST数据集：
- en: '[PRE8]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'Both train and test data contain MNIST images and labels in a tuple:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 训练数据和测试数据都包含MNIST图像和标签的元组：
- en: '[PRE9]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'Explore the shape of train data:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 探索训练数据的形状：
- en: '[PRE10]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'Explore the shape of test data:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 探索测试数据的形状：
- en: '[PRE11]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Train data consists of 60,000 28 `×` 28 feature images and 60,000 labels. Test
    data consists of 10,000 28 `×` 28 feature images and 10,000 labels.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 训练数据包括 60,000 个 28 `×` 28 的特征图像和 60,000 个标签。测试数据包括 10,000 个 28 `×` 28 的特征图像和
    10,000 个标签。
- en: Build the Input Pipeline
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建输入管道
- en: Split train and test data into their respective images and labels. Scale image
    data. Create TensorFlow consumable data with the from_tensor_slices method.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 将训练数据和测试数据分别分割成对应的图像和标签。对图像数据进行缩放。使用 `from_tensor_slices` 方法创建TensorFlow可消费的数据。
- en: 'Begin with train data:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 从训练数据开始：
- en: '[PRE12]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'Continue with test data:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 继续使用测试数据：
- en: '[PRE13]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'Shuffle train data, batch, and prefetch train and test data:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 打乱训练数据，批量处理，并预取训练和测试数据：
- en: '[PRE14]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'Inspect tensors:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 检查张量：
- en: '[PRE15]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: Create the Model
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建模型
- en: 'Import libraries:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 导入库：
- en: '[PRE16]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: 'Clear previous models from memory:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 从内存中清除之前的模型：
- en: '[PRE17]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: 'Build the model:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 构建模型：
- en: '[PRE18]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: The model is a feedforward neural network with densely connected layers. That
    is, all neurons see the data. The first layer accepts 28 `×` 28 images and flattens
    each image into a 1D array consisting of 784 pixels. The second layer accepts
    data into 512 neurons and uses *relu* activation to minimize loss. The third layer
    uses dropout to mitigate overfitting. The fourth layer is the output layer. It
    accepts data into ten neurons because our data has ten class labels. It uses *softmax*
    activation to reduce loss.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 该模型是一个具有密集连接层的前馈神经网络。也就是说，所有神经元都能看到数据。第一层接受 28 `×` 28 图像，并将每个图像展平成一个包含 784 个像素的
    1D 数组。第二层接受数据到 512 个神经元，并使用 *relu* 激活来最小化损失。第三层使用dropout来减轻过拟合。第四层是输出层。它接受数据到十个神经元，因为我们的数据有十个类别标签。它使用
    *softmax* 激活来减少损失。
- en: '**Dropout** is a regularization technique (patented by Google) for reducing
    overfitting in neural networks. The technique works by dropping out units in a
    neural network.'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '**Dropout** 是一种用于减少神经网络过拟合的正则化技术（由谷歌专利）。该技术通过在神经网络中丢弃单元来实现。'
- en: Model Summary
  id: totrans-79
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型摘要
- en: 'Display a summary of the model:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 显示模型的摘要：
- en: '[PRE19]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Output shape of the first layer is (None, 784). *None* is the first parameter
    because TensorFlow models accept any batch size. We get the second parameter of
    784 by multiplying 28 by 28 image pixels because we want flattened images. We
    have 0 parameters because this layer accepts input shape but doesn’t act on the
    data.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 第一层的输出形状是 (None, 784)。*None* 是第一个参数，因为TensorFlow模型接受任何批量大小。我们通过将 28 乘以 28 图像像素得到第二个参数
    784，因为我们想要展平的图像。我们此层没有参数，因为它接受输入形状但不处理数据。
- en: Output shape of the second layer is (None, 512). The second parameter is 512
    because this is the number of neurons set for this layer. The number of parameters
    is 401,920 derived by multiplying 512 (neurons at this layer) by 784 (neurons
    in the previous layer) and adding 512 to account for neurons at this layer.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 第二层的输出形状是 (None, 512)。第二个参数是 512，因为这是为此层设置的神经元数量。参数数量为 401,920，通过将 512（此层的神经元）乘以
    784（前层的神经元）并加上 512 来计算，以考虑此层的神经元。
- en: Output shape of the third layer is (None, 512). Using dropout doesn’t impact
    the neuron count. So this layer inherits (None, 512) from the previous layer and
    has no parameters.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 第三层的输出形状是 (None, 512)。使用dropout不会影响神经元数量。因此，此层从上一层继承 (None, 512) 并没有参数。
- en: Output shape of the fourth layer is (None, 10). The second parameter is 10 to
    reflect the number of classes. The number of parameters is 5,130 derived by multiplying
    10 (neurons at this layer) by 512 (neurons in the previous layer) and adding 10
    to account for neurons at this layer.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 第四层的输出形状是 (None, 10)。第二个参数是 10，以反映类别的数量。参数数量为 5,130，通过将 10（此层的神经元）乘以 512（前层的神经元）并加上
    10 来计算，以考虑此层的神经元。
- en: Compile the Model
  id: totrans-86
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编译模型
