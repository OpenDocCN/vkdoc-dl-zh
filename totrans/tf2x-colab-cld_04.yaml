  prefs: []
  type: TYPE_NORMAL
  zh: 确认数据读取正确：
- en: '[PRE46]'
  id: totrans-182
  prefs: []
  type: TYPE_PRE
  zh: '[PRE46]'
- en: CSV Data
  id: totrans-183
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: CSV 数据
- en: A *CSV* dataset is a comma-separated values file that allows data to be saved
    in a tabular format. When opened in a program like Microsoft Excel, it looks like
    a conventional spreadsheet but with a *.csv* extension. CSV files can be used
    with any spreadsheet program that we know of including Microsoft Excel or Google
    Sheets.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: '*CSV* 数据集是一个逗号分隔的值文件，允许数据以表格格式保存。在像 Microsoft Excel 这样的程序中打开时，它看起来像传统的电子表格，但带有
    *.csv* 扩展名。CSV 文件可以与任何我们知道的电子表格程序一起使用，包括 Microsoft Excel 或 Google Sheets。'
- en: 'A great place to get CSV datasets for machine learning is the UCI Machine Learning
    Repository. The main site for the repository is located at the following URL:
    [`https://archive.ics.uci.edu/ml/datasets.php`](https://archive.ics.uci.edu/ml/datasets.php).'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 获取机器学习 CSV 数据集的好地方是 UCI 机器学习仓库。仓库的主站点位于以下 URL：[`https://archive.ics.uci.edu/ml/datasets.php`](https://archive.ics.uci.edu/ml/datasets.php)。
- en: 'A CSV dataset commonly cited in machine learning literature is *winequality-red.csv*.
    This dataset contains red variants of the Portuguese *Vinho Verde* wine. For detailed
    information, peruse the following article:'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 在机器学习文献中经常引用的 CSV 数据集是 *winequality-red.csv*。这个数据集包含葡萄牙 *Vinho Verde* 葡萄酒的红色变体。有关详细信息，请参阅以下文章：
- en: '*P. Cortez, A. Cerdeira, F. Almeida, T. Matos, and J. Reis. Modeling wine preferences
    by data mining from physicochemical properties. In Decision Support Systems, Elsevier,
    2009, 47(4):547–553\. ISSN: 0167-9236.*'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: '*P. Cortez, A. Cerdeira, F. Almeida, T. Matos, and J. Reis. 通过数据挖掘物理化学特性建模葡萄酒偏好。在决策支持系统，Elsevier，2009，47(4):547–553。ISSN:
    0167-9236。*'
- en: 'For general information about the dataset, peruse the following URL:'
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 有关数据集的一般信息，请参阅以下 URL：
- en: '[`https://archive.ics.uci.edu/ml/datasets/wine+quality`](https://archive.ics.uci.edu/ml/datasets/wine+quality)'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: '[`https://archive.ics.uci.edu/ml/datasets/wine+quality`](https://archive.ics.uci.edu/ml/datasets/wine+quality)'
- en: Dataset Characteristics
  id: totrans-190
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据集特征
- en: The dataset consists of eleven independent feature variables and one target
    variable. Feature variables include
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集由十一个独立特征变量和一个目标变量组成。特征变量包括
- en: Fixed acidity
  id: totrans-192
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 固定酸度
- en: Volatile acidity
  id: totrans-193
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 易挥发酸度
- en: Citric acid
  id: totrans-194
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 柠檬酸
- en: Residual sugar
  id: totrans-195
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 残糖
- en: Chlorides
  id: totrans-196
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 氯化物
- en: Free sulfur dioxide
  id: totrans-197
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自由硫磺二氧化物
- en: Total sulfur dioxide
  id: totrans-198
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 总硫磺二氧化物
- en: Density
  id: totrans-199
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 密度
- en: pH
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: pH 值
- en: Sulfates
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 硫酸盐
- en: Alcohol
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 酒精
- en: The target variable is
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 目标变量是
- en: Quality
  id: totrans-204
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 质量
- en: The target variable (quality) can take on a score between 0 and 10\. A score
    of 0 means that the quality is very low. A score of 10 means that the quality
    is very high. The dataset contains 1,599 examples.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 目标变量（质量）可以取 0 到 10 之间的分数。0 分表示质量非常低。10 分表示质量非常高。数据集包含 1,599 个示例。
- en: Get Data
  id: totrans-206
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 获取数据
- en: It is a good idea to know how to extract a dataset directly from the UCI Machine
    Learning Repository. Let’s do this now.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 知道如何直接从 UCI 机器学习仓库提取数据集是个好主意。我们现在就来做这件事。
- en: 'Identify the dataset URL:'
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 识别数据集 URL：
- en: '[PRE47]'
  id: totrans-209
  prefs: []
  type: TYPE_PRE
  zh: '[PRE47]'
- en: 'Establish the path to the dataset:'
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 建立数据集的路径：
- en: '[PRE48]'
  id: totrans-211
  prefs: []
  type: TYPE_PRE
  zh: '[PRE48]'
- en: 'Create a pandas dataframe from the CSV file and place it into a Python variable:'
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 从 CSV 文件创建 pandas 数据框并将其放入 Python 变量中：
- en: '[PRE49]'
  id: totrans-213
  prefs: []
  type: TYPE_PRE
  zh: '[PRE49]'
- en: 'View records from the beginning of the dataframe:'
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 查看数据框开头的记录：
- en: '[PRE50]'
  id: totrans-215
  prefs: []
  type: TYPE_PRE
  zh: '[PRE50]'
- en: 'View records from the end of the dataframe:'
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 查看数据框末尾的记录：
- en: '[PRE51]'
  id: totrans-217
  prefs: []
  type: TYPE_PRE
  zh: '[PRE51]'
- en: 'Identify class labels that appear in the dataset:'
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 识别数据集中出现的类标签：
- en: '[PRE52]'
  id: totrans-219
  prefs: []
  type: TYPE_PRE
  zh: '[PRE52]'
- en: Since quality is the target, we use the *unique()* function to pull distinct
    labels from the dataset. The dataset contains scores 3, 4, 5, 6, 7, and 8\. However,
    quality can take on scores between 0 and 10, so there are *eleven* possible class
    labels.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 由于质量是目标，我们使用 *unique()* 函数从数据集中提取不同的标签。数据集包含分数 3、4、5、6、7 和 8。然而，质量可以取 0 到 10
    之间的分数，因此有 *十一个* 可能的类标签。
- en: 'Display datatypes:'
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 显示数据类型：
- en: '[PRE53]'
  id: totrans-222
  prefs: []
  type: TYPE_PRE
  zh: '[PRE53]'
- en: Features are datatype float64, and the target is datatype int64.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 特征数据类型为 float64，目标数据类型为 int64。
- en: 'Display the number of examples in the dataset:'
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 显示数据集中示例的数量：
- en: '[PRE54]'
  id: totrans-225
  prefs: []
  type: TYPE_PRE
  zh: '[PRE54]'
- en: We have 1,599 examples.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有 1,599 个示例。
- en: Split Data into Train and Test Sets
  id: totrans-227
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 将数据分为训练集和测试集
- en: 'Create the target set:'
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 创建目标集：
- en: '[PRE55]'
  id: totrans-229
  prefs: []
  type: TYPE_PRE
  zh: '[PRE55]'
- en: Create a copy of the dataframe to preserve the original data. Pop the target
    column into a variable to create the target dataset. The *pop* method permanently
    removes the column from the copy.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 创建数据框的副本以保留原始数据。将目标列弹出到一个变量中，以创建目标数据集。*pop* 方法永久地从副本中删除该列。
- en: 'Show what happened to the dataframe copy:'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 显示数据框副本发生了什么：
- en: '[PRE56]'
  id: totrans-232
  prefs: []
  type: TYPE_PRE
  zh: '[PRE56]'
- en: Notice that the quality column is no longer in the dataframe.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，质量列不再在数据框中。
- en: 'Convert the dataframe to numpy values:'
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 将数据框转换为 numpy 值：
- en: '[PRE57]'
  id: totrans-235
  prefs: []
  type: TYPE_PRE
  zh: '[PRE57]'
- en: Split into train and test sets, and scale feature data as shown in Listing [4-9](#PC59).
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 将数据集分为训练集和测试集，并按列表[4-9](#PC59)所示缩放特征数据：
- en: '[PRE58]'
  id: totrans-237
  prefs: []
  type: TYPE_PRE
  zh: '[PRE58]'
- en: Feature data are not images. They are scalar values. So we use the *StandardScaler*
    module to transform continuous feature data to *mean of 0* and *standard deviation
    of 1* before applying machine learning techniques.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 特征数据不是图像。它们是标量值。因此，我们在应用机器学习技术之前，使用*StandardScaler*模块将连续特征数据转换为*均值为0*和*标准差为1*。
- en: Prepare Data for TensorFlow Consumption
  id: totrans-239
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 准备数据以供TensorFlow使用
- en: 'Slice train and test sets into tf.Data.Dataset data:'
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 将训练集和测试集切片成tf.Data.Dataset数据：
- en: '[PRE59]'
  id: totrans-241
  prefs: []
  type: TYPE_PRE
  zh: '[PRE59]'
- en: 'Define the variable to hold line break:'
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 定义用于保存换行符的变量：
- en: '[PRE60]'
  id: totrans-243
  prefs: []
  type: TYPE_PRE
  zh: '[PRE60]'
- en: 'Create a function to view tensors:'
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数来查看张量：
- en: '[PRE61]'
  id: totrans-245
  prefs: []
  type: TYPE_PRE
  zh: '[PRE61]'
- en: 'View the first three tensors:'
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 查看前三个张量：
- en: '[PRE62]'
  id: totrans-247
  prefs: []
  type: TYPE_PRE
  zh: '[PRE62]'
- en: 'Define batch and buffer sizes:'
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 定义批量大小和缓冲区大小：
- en: '[PRE63]'
  id: totrans-249
  prefs: []
  type: TYPE_PRE
  zh: '[PRE63]'
- en: 'Shuffle train data, batch, and prefetch train and test data:'
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 打乱训练数据，批量处理，并预取训练和测试数据：
- en: '[PRE64]'
  id: totrans-251
  prefs: []
  type: TYPE_PRE
  zh: '[PRE64]'
- en: 'Inspect tensors:'
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 检查张量：
- en: '[PRE65]'
  id: totrans-253
  prefs: []
  type: TYPE_PRE
  zh: '[PRE65]'
- en: Build the Model
  id: totrans-254
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建模型
- en: 'Clear sessions and generate seeds:'
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 清除会话并生成种子：
- en: '[PRE66]'
  id: totrans-256
  prefs: []
  type: TYPE_PRE
  zh: '[PRE66]'
- en: 'Create the model:'
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 创建模型：
- en: '[PRE67]'
  id: totrans-258
  prefs: []
  type: TYPE_PRE
  zh: '[PRE67]'
- en: The input shape is [11,] because the dataset has eleven features. The output
    shape is eleven because the dataset has eleven class labels.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 输入形状是[11,]，因为数据集有十一个特征。输出形状是十一个，因为数据集有十一个类别标签。
- en: Model Summary
  id: totrans-260
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型摘要
- en: 'Inspect the model:'
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 检查模型：
- en: '[PRE68]'
  id: totrans-262
  prefs: []
  type: TYPE_PRE
  zh: '[PRE68]'
- en: Output shape of the first layer is (None, 30) because we have 30 neurons at
    this layer. The number of parameters is 360\. We get 330 by multiplying 30 neurons
    by 11 features. We get 360 by adding 30 neurons at this layer to 330\. Output
    shape of the second layer is (None, 11) because we have 11 neurons at this layer
    to account for the number of possible labels. The number of parameters is 341\.
    We get 330 by multiplying 30 neurons from the previous layer by 11 neurons at
    this layer. We get 341 by adding 11 neurons at this layer to 330.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 第一层的输出形状是(None, 30)，因为我们在这层有30个神经元。参数数量是360。我们通过将30个神经元乘以11个特征得到330。通过将这层的30个神经元加到330上得到360。第二层的输出形状是(None,
    11)，因为我们在这层有11个神经元来计算可能的标签数量。参数数量是341。通过将前一层的30个神经元乘以这层的11个神经元得到330，再将这层的11个神经元加到330上得到341。
- en: Compile the Model
  id: totrans-264
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编译模型
- en: 'Compile:'
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 编译：
- en: '[PRE69]'
  id: totrans-266
  prefs: []
  type: TYPE_PRE
  zh: '[PRE69]'
- en: Train the Model
  id: totrans-267
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 训练模型
- en: '[PRE70]'
  id: totrans-268
  prefs: []
  type: TYPE_PRE
  zh: '[PRE70]'
- en: We don’t get very good performance, but we just wanted to show you how to train
    a CSV dataset.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 我们没有获得很好的性能，但我们只是想展示如何训练一个CSV数据集。
- en: Get Abalone Data from GitHub
  id: totrans-270
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从GitHub获取鲍鱼数据
- en: In the next section, we work with the abalone dataset . We show you how to load
    it from GitHub as an alternative.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将处理鲍鱼数据集。我们将向您展示如何将其从GitHub作为替代方案加载。
- en: 'We’ve already located the appropriate URL and assigned it to a variable:'
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经找到了合适的URL并将其分配给一个变量：
- en: '[PRE71]'
  id: totrans-273
  prefs: []
  type: TYPE_PRE
  zh: '[PRE71]'
- en: 'Read the dataset into a pandas dataframe:'
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 将数据集读入pandas数据框：
- en: '[PRE72]'
  id: totrans-275
  prefs: []
  type: TYPE_PRE
  zh: '[PRE72]'
- en: 'Verify data:'
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 验证数据：
- en: '[PRE73]'
  id: totrans-277
  prefs: []
  type: TYPE_PRE
  zh: '[PRE73]'
- en: Data Datasets
  id: totrans-278
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据数据集
- en: The only difference between data with the *.data* extension and CSV data is
    the file extension. But we can work with it in the same manner. Instead of loading
    it from GitHub, we can download the dataset from the UCI repository, copy it to
    Google Drive, and access it from Colab.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 与*.data*扩展名的数据相比，与CSV数据之间的唯一区别是文件扩展名。但我们可以以相同的方式处理它。我们不是从GitHub加载它，而是可以从UCI存储库下载数据集，将其复制到Google
    Drive，并从Colab中访问它。
- en: Abalone Dataset
  id: totrans-280
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 鲍鱼数据集
- en: The abalone dataset is type DATA. The general site for the data is
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 鲍鱼数据集是类型DATA。数据的一般网站是
- en: '[`https://archive.ics.uci.edu/ml/datasets/Abalone`](https://archive.ics.uci.edu/ml/datasets/Abalone)'
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://archive.ics.uci.edu/ml/datasets/Abalone](https://archive.ics.uci.edu/ml/datasets/Abalone)'
- en: To download abalone data, go to the URL, click *Data Folder*, and click *abalone.data*.
    The dataset is automatically downloaded to your *Downloads* directory. Since we
    are working with the Colab cloud service, copy the file to the *Colab Notebooks*
    directory on your *Google Drive*. The easiest way to copy is to drag and drop
    the file from your Downloads directory into Google Drive.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 要下载鲍鱼数据，请访问URL，点击*数据文件夹*，然后点击*abalone.data*。数据集将自动下载到您的*下载*目录。由于我们使用的是Colab云服务，请将文件复制到您的*Google
    Drive*上的*Colab笔记本*目录。最简单的方法是将文件从下载目录拖放到Google Drive。
- en: The other file of interest is abalone.names, which provides an in-depth description
    of the dataset. Like the data file, it can be accessed from the Data Folder by
    clicking *abalone.names*.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个有趣的文件是abalone.names，它提供了数据集的详细描述。像数据文件一样，可以通过点击*abalone.names*从数据文件夹中访问。
- en: Dataset Characteristics
  id: totrans-285
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据集特征
- en: The dataset is used for predicting age of abalone shells from physical measurements.
    The age of an abalone shell is partially determined by cutting through the cone,
    staining it, and counting the number of rings through a microscope. Other measurements
    supplement age prediction.
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 该数据集用于根据物理测量预测鲍鱼壳的年龄。鲍鱼壳的年龄部分由切割圆锥体、染色并通过显微镜计数环数来确定。其他测量值补充了年龄预测。
- en: Feature variables include
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 特征变量包括
- en: Sex
  id: totrans-288
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 性别
- en: Length
  id: totrans-289
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 长度
- en: Diameter
  id: totrans-290
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 直径
- en: Height
  id: totrans-291
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 高度
- en: Whole
  id: totrans-292
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 完整
- en: Shucked
  id: totrans-293
  prefs:
