  zh: 对于我们的目的，一个 *独立数据集* 是指不存储在软件环境（如 TFDS）中的数据集。让我们从 GitHub 读取一个数据集。
- en: In our case, visit the book URL, click *chapter4*, click *data*, click *winequality-red.csv*,
