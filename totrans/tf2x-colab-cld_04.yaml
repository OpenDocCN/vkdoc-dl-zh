  id: totrans-124
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建模型
- en: Build a simple model and train the data as shown in Listing [4-7](#PC32).
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 按照列表[4-7](#PC32)所示构建一个简单的模型并训练数据。
- en: '[PRE31]'
  id: totrans-126
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: Import the numpy library so we can generate a random seed. A **random seed**
    specifies the *starting point* when a computer generates a random number sequence.
    We set a random seed to ensure the same starting point so we can obtain reproducible
    results. That is, each time we train the model, we get the same results. We set
    the seed to 0\. Of course, you can set the seed to any number, but be sure to
    use the same number each time.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 导入numpy库，以便我们可以生成一个随机种子。**随机种子**指定了计算机生成随机数序列时的**起始点**。我们设置随机种子以确保相同的起始点，以便我们可以获得可重现的结果。也就是说，每次我们训练模型时，我们都得到相同的结果。我们将种子设置为0。当然，你可以将种子设置为任何数字，但请确保每次都使用相同的数字。
- en: The input shape reflects the image size of feature data. That is, each image
    is represented by 50 `×` 37 pixels.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 输入形状反映了特征数据的图像大小。也就是说，每张图像由 50 `×` 37 像素表示。
- en: Model Summary
  id: totrans-129
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型摘要
- en: 'Run a model summary:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 运行模型摘要：
- en: '[PRE32]'
  id: totrans-131
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: Output shape of the first layer is (None, 1850). We get 1,850 by multiplying
    50 by 37\. The number of parameters is 0 because this is the first layer.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 第一层的输出形状是 (None, 1850)。我们通过将 50 乘以 37 得到 1,850。这一层的参数数量是 0，因为这是第一层。
- en: Output shape of the second layer is (None, 16). We have 16 neurons acting on
    the data at this layer. The number of parameters is 29,616\. We get 29,600 by
    multiplying 16 by 1,850\. We get 29,616 by adding 16 to 29,600 to account for
    the number of neurons at this layer.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 第二层的输出形状是 (None, 16)。在这一层我们有 16 个神经元作用于数据。参数数量是 29,616。我们通过将 16 乘以 1,850 得到
    29,600，通过将 16 加到 29,600 上得到 29,616，以考虑到这一层的神经元数量。
- en: Output shape of the third layer is (None, 7). We have seven neurons at this
    layer to account for the seven class labels. The number of parameters is 119\.
    We get 112 by multiplying 16 by 7\. We get 119 by adding 7 to 112 to account for
    the number of neurons at this layer. The None parameter is present because TensorFlow
    accepts any batch size.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 第三层的输出形状是 (None, 7)。在这一层我们有 7 个神经元来对应 7 个类别标签。参数数量是 119。我们通过将 16 乘以 7 得到 112，通过将
    7 加到 112 上得到 119，以考虑到这一层的神经元数量。None 参数存在是因为 TensorFlow 接受任何批大小。
