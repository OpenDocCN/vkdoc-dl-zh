  type: TYPE_PRE
- en: We only trained for one epoch because we knew that performance would be horrible.
    How did we know this? Check out the next section to find out.
  prefs: []
  type: TYPE_NORMAL
- en: Imbalanced and Irregular Data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The abalone dataset is *not* a good dataset to make predictions for two reasons:'
  prefs: []
  type: TYPE_NORMAL
- en: The dataset is imbalanced.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The dataset is irregular.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: An **imbalanced dataset** is one where the classes are not represented equally.
    That is, classes don’t have the same number of examples. This dataset is especially
    imbalanced because some classes have one example while others have hundreds of
    examples. Training with an imbalanced dataset won’t produce good results. So we
    won’t learn much. The reason is that predictions are biased toward classes with
    more instances!
  prefs: []
  type: TYPE_NORMAL
- en: An **irregular dataset** is one with too many target (or label) classes, but
    not enough data. We should always check the number of samples (or examples) per
    label in our dataset. A class label with not enough samples is harder to learn
    from.
  prefs: []
  type: TYPE_NORMAL
- en: Dealing with Imbalanced Data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We can deal with imbalanced data in a variety of ways. We can change the algorithm.
    Some algorithms may work better than others. So try a variety of them. Oversample
    by adding more instances to the minority class or classes. We can also under-sample
    by removing observations from the majority class or classes. Finally, we can augment
    the data.
  prefs: []
  type: TYPE_NORMAL
- en: 'For a more detailed explanation, consult the following URL:'
  prefs: []
  type: TYPE_NORMAL
- en: '[`https://towardsdatascience.com/methods-for-dealing-with-imbalanced-data-5b761be45a18`](https://towardsdatascience.com/methods-for-dealing-with-imbalanced-data-5b761be45a18)'
  prefs: []
  type: TYPE_NORMAL
