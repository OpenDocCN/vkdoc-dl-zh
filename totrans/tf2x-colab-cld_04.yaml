- en: Identify a URL path to a numpy file. Use tf.keras.utils.get_file to access the
    path. Load numpy data with the *np.load* function. Split data into train and test
    sets. Scale feature image data.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 识别一个指向 numpy 文件的 URL 路径。使用 tf.keras.utils.get_file 访问路径。使用 *np.load* 函数加载 numpy
    数据。将数据分为训练集和测试集。缩放特征图像数据。
