- en: 1. Optimization and Neural Networks
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This chapter contains a basic introduction to the most important concepts of
    optimization and explains how they are related to neural networks. This chapter
    doesn’t go into detail, leaving longer discussions to the following chapters.
    But at the end of this chapter, you should have a basic understanding of the most
    important concepts and challenges related to neural networks. This chapter covers
    the problem of learning, constrained and unconstrained optimization problems,
    what optimization algorithms are, and the gradient descent algorithm and its variations
    (mini-batch and stochastic gradient descent).
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
- en: A Basic Understanding of Neural Networks
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: It is very useful to have a basic understanding of what is a neural network
    (NN) and how it learns. For this introductory section, we consider only what is
    called supervised learning.^([1](#Fn1)) Suppose you have a dataset of *M* tuples
    (*x*[*i*], *y*[*i*]) with *i* = 1, …, *M*. The *x*[*i*], called input observations
    or simply inputs, can be anything from images to multidimensional arrays, one-dimensional
    arrays or even simple numbers. The *y*[*i*] are outputs (also called target variables
    or sometimes labels) and can be multidimensional arrays, numbers (for example,
    the probability of the input observation *x*[*i*] being of a specific class),
    or even images. In the most basic formulation, an NN is a mathematical function
    (sometimes called a *network function* ) that takes some kind of input (typically
    multi-dimensional) called *x*[*i*] and generate some output. The subscript *i*
    indicates one of the inputs from a dataset of observations that is at your disposal.
    The output generated by the network function is called ![$$ {\hat{y}}_i $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq1.png).
    The network function normally depends on a certain number *N* of parameters, which
    we will indicate with *θ*[*i*]. We can write this mathematically as
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\hat{y}}_i\equiv f\left(\boldsymbol{\theta}, {x}_i\right) $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_Equa.png)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
- en: 'Where we have indicated the parameters in vector form: ***θ*** = (*θ*[1], …,
    *θ*[*N*]) ∈ *ℝ*^(*N*). Figure [1-1](#Fig1) shows a diagram of this idea. The blob
    in the middle represents the network function *f* that maps the input *x*[*i*]
    to the output. Naturally, the output will depend on the parameters. The idea behind
    learning is to change the parameters until ![$$ {\hat{y}}_i $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq2.png)
    is as close to *y*[*i*] as possible. There are two very important undefined concepts
    in the last sentence: first, what “close” means, and second, how you update the
    parameters in an intelligent way to make ![$$ {\hat{y}}_i $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq3.png)
    and *y*[*i*] “close.” We answer those exact two questions in depth in this book.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/463356_2_En_1_Chapter/463356_2_En_1_Fig1_HTML.jpg)'
  id: totrans-6
  prefs: []
  type: TYPE_IMG
- en: Figure 1-1
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: A intuitive diagram of a neural network. *x*[*i*] are the inputs (for *i* = 1,
    …, *M*), *θ*[*i*] are the parameters (for *i* = 1, …, *N*), and ![$$ \hat{y} $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq4.png)
    is the output of the network. The network function is depicted by the irregular
    shape in the middle
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: To summarize, a neural network is nothing more than a mathematical function
    that depends on a set of parameters that are tuned, hopefully in some smart way,
    to make the network output as close as possible to some expected output. The concept
    of “close” is not defined here, but for the purposes of this section, a basic
    understanding is good enough. By the end of this book, you will have a more complete
    understanding of its meaning.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: Note
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: A neural network is nothing more than a mathematical function that depends on
    a set of parameters that are tuned, hopefully in some smart way, to make the network
    output as close as possible to some expected output.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: The Problem of Learning
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A First Definition of Learning
  id: totrans-13
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Let’s now look at a more mathematical formulation of “learning” in the context
    of neural networks. For notation’s simplicity, let’s assume that each input is
    a mono-dimensional array, *x*[*i*] ∈ *ℝ*^(*n*) with *i* = 1, …, *M*. By the same
    token, we will assume that the output is a mono-dimensional array, ![$$ {\hat{y}}_i\in
    {\mathbb{R}}^k, $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq5.png)
    with *k* being some integer. We will assume we have a set of *M* input observations
    with the expected target variables *y*[*i*] ∈ *ℝ*^(*k*). We also assume that we
    have a mathematical function ![$$ L\left(\hat{y},y\right)=L\left(f\left(\theta,
    \hat{y}\right),y\right) $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq6.png),
    called a *loss function* *,* where we have used the vector notation *y* ***=*** (*y*[1],
    …, *y*[*M*]), ![$$ \hat{y}=\left({\hat{y}}_1,\dots, {\hat{y}}_M\right) $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq7.png)
    and *θ* = (*θ*[1], …, *θ*[*N*]). This function measures how “close” the expected
    (*y*) and predicted (![$$ \hat{y} $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq8.png))
    values are, given specific values of the parameters *θ*[*i*]. We will not yet
    define how this function looks, as this is not relevant for this discussion. Let’s
    summarize the notation we have defined so far:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: '*x*[*i*] ∈ *ℝ*^(*n*): Input observations (for this discussion, we assume that
    they are a mono-dimensional array of dimension *n* ∈ *ℕ*). Examples could be age,
    weight, and height of a person, gray level values of pixels in an image, and so
    on.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*y*[*i*] ∈ *ℝ*^(*k*): Target variables (what we want the neural network to
    predict). Examples could be the class of an image, what movie to suggest to a
    specific viewer, the translated version of a sentence in a different language,
    and so on.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*f*(*θ*, *x*[*i*]): Network function. This function is built with neural networks
    and depends on the specific architecture used (feed-forward, convolutional, recurrent,
    etc.).'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*θ* = (*θ*[1], …, *θ*[*N*]): A set of real numbers, also called parameters
    or weights.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![$$ L\left(\hat{y},y\right)=L\left(f\left(\theta, \hat{y}\right),y\right)
    $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq9.png): The loss
    or cost function. This function is a measure of how “close” *y* and ![$$ \hat{y}
    $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq10.png) are.
    Or, in other words, how good the neural network’s predictions are.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Those are the fundamentals elements that we need in order to understand neural
    networks.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: '[Advanced Section] Assumption in the Formulation'
  id: totrans-21
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: If you already have some experience with neural networks, it is important to
    discuss one important assumption that we have silently made. Note that skipping
    this short section in a first reading of this book will not impact the understanding
    of the rest. If you don’t understand the points discussed here, feel free to skip
    this part and come back to it later.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: The most important assumption here can be found in how the loss function ![$$
    L\left(\hat{y},y\right) $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq11.png)
    is written. In fact, as written, it is a function of all the *M* components of
    the two vectors ![$$ \hat{y} $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq12.png)
    and *y* and this translates in *not* using a mini-batch during the training. The
    assumption here is that we will measure how good the network’s predictions are
    by considering *all* the inputs and outputs simultaneously. This assumption will
    be lifted in the following sections and chapters and discussed at length. The
    experienced reader may notice that this will lead to advanced optimization techniques—stochastic
    gradient descent and the concept of mini-batch. Using all the *M* components of
    the two vectors ![$$ \hat{y} $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq13.png)
    and *y* makes the learning process generally slower, although in some situations
    it’s more stable.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: A Definition of Learning for Neural Networks
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: With the notation defined previously , we can now formally define learning in
    the context of neural networks.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: '**Definition** Given a set of tuples (*x*[*i*], *y*[*i*]) with *i* = 1, …*M*,
    a mathematical function ![$$ f\left(\theta, \hat{y}\right) $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq14.png)
    (the network function), and a function (the loss function) ![$$ L\left(\hat{y},y\right)=L\left(f\left(\theta,
    \hat{y}\right),y\right), $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq15.png)
    the process of *learning* is equivalent to minimizing the loss function with respect
    to the parameters ***θ***. Or in mathematical notation'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \underset{\boldsymbol{\theta} \in {\mathbb{R}}^N}{\min }L\left(f\left(\theta,
    \hat{y}\right),y\right) $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_Equb.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![最小化函数的数学表达式](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_Equb.png)'
- en: Note
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 备注
- en: '*Learning* is equivalent to minimizing the loss function with respect to the
    parameters *θ*, given a set of tuples (*x*[*i*], *y*[*i*]) with *i* = 1, …*M*.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '**学习**等同于在给定一系列元组 (*x*[*i*], *y*[*i*])（*i* = 1, …*M*）的情况下，相对于参数 *θ* 最小化损失函数。'
- en: The typical term for learning is *training* and that is the one we will use
    in this book. Basically, training a neural network is nothing more than minimizing
    a very complicated function that depends on a very large number of parameters
    (sometimes billions). This presents very difficult technical and mathematical
    challenges that we discuss at length in this book. But for now, this understanding
    is sufficient to start understanding how to tackle this problem.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 学习的典型术语是**训练**，这也是本书中我们将使用的术语。基本上，训练神经网络不过是最小化一个依赖于大量参数（有时是数十亿）的非常复杂的函数。这提出了非常困难的技术和数学挑战，我们将在本书中详细讨论。但就目前而言，这种理解足以开始了解如何解决这个问题。
- en: The following sections discuss how to solve the problem of minimizing a function
    in general and explain the fundamentals theoretical concepts that are necessary
    to understand more advanced topics. Note that the problem of minimizing a function
    is called an *optimization problem* *.*
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 以下章节将讨论如何解决最小化函数的问题，并解释理解更高级主题所必需的基本理论概念。请注意，最小化函数的问题被称为**优化问题****。
- en: Constrained vs. Unconstrained Optimization
  id: totrans-32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**约束优化**与**无约束优化**'
- en: The problem of minimizing a function as described in the previous section is
    called an *unconstrained optimization problem* .
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，最小化一个函数的问题被称为**无约束优化问题**。
- en: 'The problem of minimizing a function can be generalized by adding constraints
    to the problem. This can be formulated in the following way: we want to minimize
    a generic function *g*(*x*) subject to a set of constraints'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 通过向问题添加约束，可以泛化最小化函数的问题。这可以表述如下：我们希望最小化一个通用的函数 *g*(*x*)，同时满足一系列约束
- en: '![$$ \left\{\begin{array}{c}{c}_i(x)=0,\kern0.75em i=1,\dots, {C}_1\kern0.5em
    \mathrm{with}\ {C}_1\in \mathbb{N}\\ {}{q}_i(x)\ge 0\kern0.75em i=1,\dots, {C}_2\kern0.5em
    \mathrm{with}\ {C}_2\in \mathbb{N}\end{array}\right. $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_Equc.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![约束条件的数学表达式](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_Equc.png)'
- en: Where *c*[*i*](*x*) and *q*[*i*](*x*) are constraint functions that define some
    equations and inequalities that need to be satisfied. In the context of neural
    networks, you may have the constraint that the output (suppose for a moment that
    ![$$ {\hat{y}}_i $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq16.png)
    is simply a number) must lie in the interval [0, 1]. Or maybe that it must be
    always greater than zero or smaller than a certain value. Or another typical constraint
    that you will encounter is when you want the network to output only a finite number
    of outputs, for example, in a classification problem.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 其中，*c*[*i*](*x*) 和 *q*[*i*](*x*) 是约束函数，它们定义了一些需要满足的方程和不等式。在神经网络的情况下，你可能会有这样的约束，即输出（假设一下，![$$
    {\hat{y}}_i $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq16.png)
    只是一个数字）必须位于区间 [0, 1] 内。或者它必须始终大于零或小于某个特定值。或者你可能会遇到的另一个典型约束是，当你想让网络只输出有限数量的输出时，例如，在分类问题中。
- en: Let’s consider an example. Suppose that we want our network output to be ![$$
    {\hat{y}}_i\in \left[0,1\right] $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq17.png).
    Our learning problem could be formulated as follows
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑一个例子。假设我们希望我们的网络输出 ![$$ {\hat{y}}_i\in \left[0,1\right] $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq17.png)。我们的学习问题可以表述如下
- en: '![$$ \underset{\boldsymbol{\theta} \in {\mathbb{R}}^N}{\min }L\left(f\left(\theta,
    x\right),y\right)\ \mathrm{subject}\ \mathrm{to}\ f\left(\theta, {x}_i\right)\in
    \left[0,1\right]\kern0.5em i=1,\dots, M $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_Equd.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![最小化函数的数学表达式](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_Equd.png)'
- en: Or even more generally
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 或者甚至更一般地
- en: '![$$ \underset{\boldsymbol{\theta} \in {\mathbb{R}}^N}{\min }L\left(f\left(\theta,
    x\right),y\right)\ \mathrm{subject}\ \mathrm{to}\ f\left(\theta, x\right)\in \left[0,1\right]\kern0.5em
    \forall \theta, x $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_Eque.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
- en: This is clearly a *constrained optimization* problem. When dealing with neural
    networks, this problem is typically reformulated by designing the neural network
    in such a way that the constraint is automatically satisfied, and learning is
    brought back to an unconstrained optimization problem.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: '[Advanced Section] Reducing a Constrained Problem to an Unconstrained Optimization
    Problem'
  id: totrans-42
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: You may be confused by the previous section and wonder how constraints can be
    integrated into the network architecture design. This happens typically in the
    output layer of the network. For example, in the examples discussed in the previous
    section, to ensure that ![$$ f\left(\theta, {\hat{y}}_{\boldsymbol{i}}\right)\in
    \left[0,1\right]\kern0.5em i=1,\dots, M $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq18.png),
    it is enough to use the sigmoid function *σ*(*s*) as an activation function for
    the output neuron. This will guarantee that the network output will always be
    between 0 and 1 since the sigmoid function maps any real number to the open interval
    (0, 1). If the output of the neural network should always be 0 or greater, you
    could use the ReLU activation function for the output neuron.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: Note
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: When dealing with neural networks, constraints are typically built into the
    network architecture, thus reframing the original constrained optimization problem
    into an unconstrained one.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: Building constraints into the network architecture is extremely useful and it
    typically makes the learning process much more efficient. Constraints often come
    from a deep knowledge of the data and the problem you are trying to solve. It
    pays off to find as many constraints as possible and to build them into the network
    architecture.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: Another example of a constrained optimization problem is when you have a classification
    problem with *k* classes. Typically, you want your network to output *k* real
    numbers *p*[*i*] with *i* = 1, …, *k*, where each *p*[*i*] could be interpreted
    as the probability of the input observation being in a specific class. If we want
    to interpret *p*[*i*] as the probability, the following equation must be satisfied
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \sum \limits_{i=1}^k{p}_i=1 $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_Equf.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
- en: This is realized by having *k* neurons in the output layer and using for them
    the *softmax* activation function. This step reframes the problem into an unconstrained
    optimization problem, since the previous equation will be satisfied by the network
    architecture. If you don’t know what the softmax activation function is, don’t
    fret. We discuss it in the following chapters. Keep this example in mind, as it
    is the key to any classification problem with neural networks.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: Absolute and Local Minima of a Function
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Many algorithms that minimize a function are, by design, only able to find what
    is called a “local” minimum, or in other words, a point *x*[0] at which the function
    to minimize is smaller than at all other points in any *close* vicinity of *x*[0].
    Mathematically speaking *x*[0] is a local minimum of *f* if the following is satisfied
    (in a one-dimensional case)
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \exists \eta \in \mathbb{R}\ \mathrm{such}\ \mathrm{that}\ f(x)\le f\left({x}_0\right)\kern0.5em
    \forall x\in \left[{x}_0-\eta, {x}_0+\eta \right] $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_Equg.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
- en: In principle, we want to find the *global minimum* or, in other words, the point
    for which the function value is the smallest between all possible points. In the
    case of neural networks, identifying if the minimum is a local or a global minimum
    is impossible, due to the network function complexity. This is one (albeit not
    the only one) of the reasons that training large neural networks is such a challenging
    numerical problem. In the next chapters, we discuss at length what factors^([2](#Fn2))
    may make finding the global minimum easier or more challenging.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: Optimization Algorithms
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: So far, we have discussed the idea that learning is nothing less than minimizing
    a specific function, but we have not touched the issue of how this “minimizing”
    happens. This is achieved by what is called an “optimization algorithm,” whose
    goal it is to find the location of the (hopefully) absolute minimum. Practically
    speaking, all unconstrained minimization algorithms require the choice of a starting
    point, which you denote by *x*[0]. In the example of neural networks, this initial
    point would be the initial values of the weights. Typically starting from *x*[0],
    the optimization algorithms will generate a sequence of iterates ![$$ {\left\{{x}_k\right\}}_{k=0}^{\infty
    } $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq19.png) that
    will converge toward the global minimum.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: 'In all practical applications, only a finite number of terms will be generated,
    since we cannot generate an infinite number of *x*[*k*] of course. The sequence
    will stop when progress can no longer be made (the value of *x*[*k*] will not
    change any more^([3](#Fn3))) or a specific solution has been reached with sufficient
    accuracy. Usually, the rule to generate a new *x*[*k*] will use information about
    the function *f* to be minimized and one or more previous values (often properly
    weighted) of the *x*[*k*]. In general, there are two main strategies for optimization
    algorithms: line search and trust regions. Optimizers for neural networks use
    all a line search approach.'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: Line Search and Trust Region
  id: totrans-57
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: In the *line search* approach, the algorithm chooses a direction *p*[*k*] and
    searches along this direction for a new value *x*[*k* + 1] when trying to minimize
    a generic function *L*(*x*). In general, this approach, once a direction *p*[*k*]
    has been chosen, consists in solving
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \underset{\alpha &gt;0}{\min }L\left({x}_k+\alpha {p}_k\right) $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_Equh.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
- en: for each iteration. In other words, you would need to choose the optimal *α*
    along the direction *p*[*k*]. In general, this cannot be solved exactly, thus
    in a practical application (as you will see later), this approach is used by choosing
    a fixed *α*, or by reducing it in a way that is easy to calculate (independently
    of *L*). *α* is what is known as the *learning rate* when you deal with neural
    networks and is one of the most important hyper-parameters^([4](#Fn4)) when training
    networks. After you decide on a value for *α*, the new *x*[*k* + 1] is determined
    with the equation
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {x}_{k+1}={x}_k+\alpha {p}_k $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_Equi.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
- en: In the *trust region* approach , the information available on *L* is used to
    build a model function *m*[*k*] (typically quadratic in nature) that approximates
    *f* in a sufficiently small region around *x*[*k*]. Then this approximation is
    used to choose a new *x*[*k* + 1]. This book does not cover trust region approaches,
    but the interested reader can find a very complete introduction in *Numerical
    Optimization, 2*^(*nd*) *edition* by J. Nocedal and S.J. Wright, published by
    Springer.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: Steepest Descent
  id: totrans-63
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The most obvious, and the most used search direction for line search methods
    is the steepest direction *p*[*k*] =  −  ∇*L*(*x*[*k*]). After all, this is the
    direction along which the function *f* decreases more rapidly. To prove it, we
    can use Taylor expansion^([5](#Fn5)) for *L*(*x*[*k*] + *αp*) and try to determine
    along which direction the function decreases the most rapidly. We will stop at
    the first order and write
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ L\left({x}_k+\alpha p\right)\approx L\left({x}_k\right)+\alpha {p}^T\nabla
    L\left({x}_k\right) $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_Equj.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
- en: assuming that *α* is small enough. Our question (along which direction does
    the function *L* decrease more rapidly?) can be formulated as solving
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \underset{p}{\min }L\left({x}_k+\alpha p\right)\kern1.5em \mathrm{subject}\
    \mathrm{to}\kern1.25em \left\Vert p\right\Vert =1 $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_Equk.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
- en: Where ‖*p*‖ = 1 is the norm of the vector *p* (or in other words ![$$ \left\Vert
    p\right\Vert =\left({p}_1^2+\dots +{p}_n^2\right) $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq20.png)).
    Using the Taylor expansion and noting that *f* (*x*[*k*]) is a constant, we simply
    must solve for
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \underset{p}{\min }{p}^T\nabla L\left({x}_k\right) $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_Equl.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
- en: Always subject to ‖*p*‖ = 1\. Now, indicating with *θ* the angle between the
    direction *p* and ∇*L*(*x*[*k*]), we can write
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {p}^T\nabla L\left({x}_k\right)=\left\Vert p\right\Vert \left\Vert \nabla
    L\left({x}_k\right)\right\Vert \cos \theta $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_Equm.png)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
- en: It’s easy to see that this is minimized when cos *θ* =  − 1, or in other words,
    by choosing the search direction parallel to the gradient of the loss function
    but pointing in the opposite direction. In other words
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ p=-\frac{\nabla L\left({x}_k\right)}{\left\Vert \nabla L\left({x}_k\right)\right\Vert
    } $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_Equn.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
- en: as we claimed at the beginning.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: Note
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: The *steepest descent* method is a line-search method that searches for a better
    approximation of the minimum along the direction, minus the gradient of the function
    for every step. This method is at the basis of the *gradient descent optimizer*.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: There are of course other directions that may be used, but for neural networks,
    those can be neglected. Just to cite an example, possibly the most important is
    the Newton direction, which can be derived from the second-order Taylor expansion
    of *f*(*x*[*k*] + *p*), but it requires you to know the Hessian ∇²*L*(*x*).
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: The Gradient Descent Algorithm
  id: totrans-78
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The gradient descent (GD) optimizer finds *x*[*k* + 1] by using the gradient
    of the function *L* according to the formula
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {x}_{k+1}={x}_k-\alpha \nabla L\left({x}_k\right). $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_Equo.png)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
- en: Thus, the GD algorithm is simply a line-search algorithm that searches for better
    approximations along the steepest descent direction. We can create a simple one-dimensional
    example (*x* ∈ *ℝ*) and try the algorithm. Let’s suppose we want to minimize the
    function
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ L(x)={x}^2 $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_Equp.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
- en: This has a clear minimum at *x* = 0 as this is a simple quadratic form. If you
    know how to find the minimum of a function with calculus, it’s easy to see that
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{dL(x)}{dx}=0 $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_Equq.png)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
- en: implies that 2*x* = 0 → *x* = 0\. This is indeed a minimum since
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{d^2L(x)}{d{x}^2}=2&gt;0 $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_Equr.png)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
- en: How does the GD algorithm work in this case? The algorithm will generate a sequence
    of *x*[*k*] by using the formula *x*[*k* + 1] = *x*[*k*] − 2*αx*[*k*] (remember
    we are trying to minimize *f* (*x*) = *x*²). We need of course to choose an initial
    value *x*[0] and a step *α*. For a first try, let’s choose *x*[0] = 1 and *α* = 0.1\.
    The sequence can be seen in Table [1-1](#Tab1).
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
- en: Table 1-1
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
- en: The Sequence *x*[*k*] Generated for the Function *L*(*x*) = *x*² with the Parameters
    *x*[0] = 1 and *α* = 0.1
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: '| ***k*** | ***x***[***k***]  ***x***[**0**] ***=*** **1** |'
  id: totrans-90
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  id: totrans-91
  prefs: []
  type: TYPE_TB
- en: '| **0** | 1 |'
  id: totrans-92
  prefs: []
  type: TYPE_TB
- en: '| **1** | 0.8 |'
  id: totrans-93
  prefs: []
  type: TYPE_TB
- en: '| **2** | 0.64 |'
  id: totrans-94
  prefs: []
  type: TYPE_TB
- en: '| **3** | 0.512 |'
  id: totrans-95
  prefs: []
  type: TYPE_TB
- en: '| **…** | … |'
  id: totrans-96
  prefs: []
  type: TYPE_TB
- en: '| **40** | 0.00013 |'
  id: totrans-97
  prefs: []
  type: TYPE_TB
- en: '| **…** | … |'
  id: totrans-98
  prefs: []
  type: TYPE_TB
- en: '| **500** | 3.5·10^(−49) |'
  id: totrans-99
  prefs: []
  type: TYPE_TB
- en: 'From Table [1-1](#Tab1) it should be evident how, albeit slowly, the GD algorithm
    converges toward the right answer, *x* = 0\. That sounds good, right? What could
    go wrong? Not everything is so easy, and in the GD there is a marvelous hidden
    complexity. Let’s rewrite the formula that is used to generate the sequence *x*[*k*]:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {x}_{k+1}={x}_k-2\alpha {x}_k={x}_k\left(1-2\alpha \right) $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_Equs.png)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
- en: Consider for example the value *α* = 1\. In this case *x*[*k* + 1] =  − *x*[*k*].
    It is easy to see that this generates an oscillating sequence that never converges.
    In fact, it is easy to calculate that *x*[1] =  − 1, *x*[2] = 1 and so on. An
    oscillating sequence will always be generated for all values of 1 − 2*α* < 0,
    or for ![$$ \alpha &gt;\frac{1}{2}. $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq21.png)
    In Figure [1-2](#Fig2), you can see a plot of the sequence *x*[*k*] for various
    values of the parameter *α*.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/463356_2_En_1_Chapter/463356_2_En_1_Fig2_HTML.jpg)'
  id: totrans-103
  prefs: []
  type: TYPE_IMG
- en: Figure 1-2
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
- en: The sequence *x*[*k*] generated for the function *L*(*x*) = *x*² for various
    values of *α*
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: From Figure [1-2](#Fig2), when *α* is small, the convergence is very small (orange
    line), and as we discussed, for a value ![$$ \alpha &gt;\frac{1}{2} $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq22.png)
    (green line), an oscillating sequence is generated. It is interesting to note
    how this oscillating sequence converges quite faster than the others. The value
    *α* = 1 generates a sequence that does not converge. But what happens for *α* > 1?
    This is a very interesting case, as it turns out that the sequence diverges (albeit
    oscillating from positive to negative values). In Figure [1-3](#Fig3), you can
    see the plot of the sequence for *α* = 1.01.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/463356_2_En_1_Chapter/463356_2_En_1_Fig3_HTML.jpg)'
  id: totrans-107
  prefs: []
  type: TYPE_IMG
- en: Figure 1-3
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: The sequence *x*[*k*] for the parameter *α* = 1.01\. The sequence oscillates
    from positive to negative values while diverging in absolute value
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
- en: You can clearly see how it diverges. Note that from a numerical point of view,
    it is easy to get NaN (if you are using Python) or errors. If you are trying neural
    networks and you get NaN for your loss function (for example), one possible reason
    may be a learning rate that is too big .
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
- en: Note
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
- en: The learning rate is possibly one of the most important hyper-parameters that
    you have to decide on when training neural networks. Choose one that’s too small,
    and the training will be very slow, but choose one that’s too big, and the training
    will not converge! More advanced optimizers (Adam for example) try to compensate
    this shortcoming by effectively varying the learning rate^([6](#Fn6)) dynamically,
    but the initial value is still important.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
- en: Now I must admit this is a very trivial case. In fact, the formula for *x*[*k*]
    can also be written as
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {x}_k={x}_0{\left(1-2\alpha \right)}^k $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_Equt.png)'
  id: totrans-114
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_Equt.png)'
- en: Therefore, it’s easy to see that this sequence converges for |1 − 2*α*| < 1
    and diverges for |1 − 2*α*| > 1\. For |1 − 2*α*| = 1, it stays at 1 and if 1 − 2*α* =  − 1,
    it oscillates between 1 and −1\. Still, it is instructive to see how important
    the role of the learning rate is when using the GD.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，很容易看出，当 \(|1 - 2\alpha| < 1\) 时，这个序列收敛，而当 \(|1 - 2\alpha| > 1\) 时，它发散。当 \(|1
    - 2\alpha| = 1\) 时，它保持在 1，如果 \(1 - 2\alpha = -1\)，它将在 1 和 -1 之间振荡。尽管如此，看到学习率在
    GD 中的重要作用仍然是有教育意义的。
- en: Choosing the Right Learning Rate
  id: totrans-116
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 选择合适的学习率
- en: 'You may be wondering how to choose the right *α* at this point. This is a good
    question but unfortunately there is no real precise answer, and some clarifications
    are in order. In all practical cases, you will not use the plain GD algorithm.
    Consider that, for example, in TensorFlow 2.X, the GD is not even available out
    of the box, due to its inefficiency. But in general, to check if the (in some
    cases only the initial) learning rate is optimal, you can follow these steps,
    assuming you are trying to minimize a function *L*(*x*):'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: '此时，你可能想知道如何选择合适的 \(*\alpha*\)。这是一个好问题，但不幸的是，并没有真正的精确答案，需要一些澄清。在所有实际情况下，你都不会使用普通的
    GD 算法。例如，在 TensorFlow 2.X 中，由于效率低下，GD 甚至不是开箱即用的。但一般来说，为了检查（在某些情况下只是初始的）学习率是否最优，你可以遵循以下步骤，假设你正在尝试最小化函数
    \(*L*(x*)\):'
- en: Choose an initial learning rate. Typical values^([7](#Fn7)) are 10^(−2) or 10^(−3).
  id: totrans-118
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择一个初始学习率。典型的值^([7](#Fn7))是 \(10^{-2}\) 或 \(10^{-3}\)。
- en: Let your optimizer run for a certain number of iterations, saving the *L*(*x*[*k*])
    each time.
  id: totrans-119
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 让你的优化器运行一定次数的迭代，每次迭代保存 \(*L*(x*)[*k*]\)。
- en: Plot the sequence *L*(*x*[*k*]). This sequence should show a convergent behavior.
    From the plot, you can get an idea whether the learning is too small (slow convergence)
    or too big (divergence). For example, Figure [1-4](#Fig4) shows the sequence *L*(*x*[*k*])
    for the example we discussed in the previous section. The figure tells us that
    using *α* = 0.01 (orange line) is very slow. Trying larger values for *α* shows
    how convergence can be faster (blue and green). With *α* = 0.1 after 12-13 iterations,
    you already have a good approximation of the minimum, while for *α* = 0.01 you
    are still very far from a solution.
  id: totrans-120
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 绘制序列 \(*L*(x*)[*k*]\)。这个序列应该显示出收敛的行为。从图中，你可以得到一个想法，学习率是否太小（收敛慢）或太大（发散）。例如，图
    [1-4](#Fig4) 显示了我们之前章节中讨论的示例的序列 \(*L*(x*)[*k*]\)。这张图告诉我们，使用 \(*\alpha* = 0.01\)（橙色线）非常慢。尝试更大的
    \(*\alpha*\) 值显示了收敛可以有多快（蓝色和绿色）。对于 \(*\alpha* = 0.1\)，在 12-13 次迭代后，你已经得到了最小值的一个很好的近似，而对于
    \(*\alpha* = 0.01\)，你仍然离解决方案很远。
- en: Note
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 备注
- en: When training neural networks, always check the behavior of your loss function.
    This will give you important information about how the training process is going.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 在训练神经网络时，始终检查你的损失函数的行为。这将为你提供有关训练过程进展的重要信息。
- en: '![](../images/463356_2_En_1_Chapter/463356_2_En_1_Fig4_HTML.jpg)'
  id: totrans-123
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../images/463356_2_En_1_Chapter/463356_2_En_1_Fig4_HTML.jpg)'
- en: Figure 1-4
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-4
- en: The sequence *L*(*x*[*k*]) for the function *L*(*x*) = *x*² for various values
    of *α*
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 对于函数 \(*L*(x*) = x^2\) 的各种 \(*\alpha*\) 值，序列 \(*L*(x*)[*k*]\)
- en: This is why, when training neural networks, it is important to always check
    the behavior^([8](#Fn8)) of the loss function that you are trying to minimize.
    Never assume that your model is converging without checking the sequence *L*(*x*[*k*]).
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么在训练神经网络时，检查你试图最小化的损失函数的行为^([8](#Fn8))非常重要。永远不要假设你的模型正在收敛，而不检查序列 \(*L*(x*)[*k*]\)。
- en: Variations of GD
  id: totrans-127
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: GD 的变体
- en: To understand variations of GD, the easiest way is to start with the loss function.
    As mentioned at the beginning of the chapter, in the “The Problem of Learning”
    section, the goal is to minimize the loss function ![$$ L\left(f\left(\theta,
    \hat{y}\right),y\right) $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq23.png),
    where we have used the vector notation *y* ***=*** (*y*[1], …, *y*[*M*]), ![$$
    \hat{y}=\left({\hat{y}}_1,\dots, {\hat{y}}_M\right) $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq24.png)
    and *θ* = (*θ*[1], …, *θ*[*N*]). In other words, we have at our disposal *M* input
    tuples that we can use. In the plain version of GD, the loss function is written
    as
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ L\left(f\left(\theta, \hat{y}\right),y\right)=\frac{1}{M}\sum \limits_{i=1}^M{l}_i\left(f\left(\theta,
    {\hat{y}}_i\right),{y}_i\right) $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_Equu.png)'
  id: totrans-129
  prefs: []
  type: TYPE_IMG
- en: Where *l*[*i*] is the loss function evaluated over a single observation. For
    example, we could have a one-dimensional regression problem where our loss function
    is the mean square error (MSE). In this case we would have
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {l}_i\left(f\left(\theta, {\hat{y}}_i\right),{y}_i\right)={\left|f\left(\theta,
    {\hat{y}}_i\right)-{y}_i\right|}^2 $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_Equv.png)'
  id: totrans-131
  prefs: []
  type: TYPE_IMG
- en: And therefore
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ L\left(f\left(\theta, \hat{y}\right),y\right)=\frac{1}{M}\sum \limits_{i=1}^M{\left|f\left(\theta,
    {\hat{y}}_i\right)-{y}_i\right|}^2 $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_Equw.png)'
  id: totrans-133
  prefs: []
  type: TYPE_IMG
- en: That is the classical formula for the MSE that you may have already seen. In
    plain GD, we would use this formula to evaluate the gradient that we need to minimize
    *L*. Using all *M* observations has pros and cons.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
- en: 'Advantages:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
- en: Plain GD shows a stable convergence behavior
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Disadvantages:'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
- en: Usually, this algorithm is implemented in such a way that all the dataset must
    be in memory; therefore, it is computationally intensive.
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This algorithm is typically very slow with very big datasets.
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Variations of the GD are based on the idea of considering only some of the observations
    in the sum in the previous equation instead of all *M*. The two most important
    variations are called *mini-batch GD* (MBGD, where you consider a small number
    of observations *m* < *M*) and *stochastic GD* (SGD, where you consider only one
    observation at a time). Let’s look at both in detail, starting with the mini-batch
    GD.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
- en: Mini-Batch GD
  id: totrans-141
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: To clarify the idea behind the method, we can write the loss function as
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {L}_m\left(f\left(\theta, \hat{y}\right),y\right)=\frac{1}{M}\sum \limits_{i=1}^m{\left|f\left(\theta,
    {\hat{y}}_i\right)-{y}_i\right|}^2 $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_Equx.png)'
  id: totrans-143
  prefs: []
  type: TYPE_IMG
- en: Where we have introduced *m* ∈ *ℕ* with *m* < *M*, called *batch size. L*[*m*]
    is defined by summing over *m* observations sampled from the initial dataset.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
- en: 'The mini-batch GD is implemented according to the following algorithm:'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
- en: A mini-batch size *m* is chosen. Typical values are 32, 64, 128, or 256 (note
    that the mini-batch size *m* does not have to be a power of 2, and it can be any
    number, such as 137 or 17).
  id: totrans-146
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![$$ {N}_b=\left\lfloor \frac{M}{m}\right\rfloor +1 $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq25.png)
    subsets of observations are created^([9](#Fn9)) by sampling each time *m* observation
    from the initial dataset *S* without repetition. We indicate them with ![$$ {S}_1,{S}_2,\dots,
    {S}_{N_b} $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq26.png).
    Note that in general if *M* is not a multiple of *m* the last batch, ![$$ {S}_{N_b}
    $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq27.png) may have
    a number of observations smaller than *m*.'
  id: totrans-147
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The parameters *θ* are updated *N*[*b*] times using the GD algorithm with the
    gradient of *L*[*m*] evaluated over the observations in *S*[*i*] for *i* = 1,
    …, *N*[*b*].
  id: totrans-148
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Repeat Step 3 until the desired result is achieved (for example, the loss function
    does not vary much anymore).
  id: totrans-149
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: When training neural networks, you may have heard the term “epoch” instead of
    iteration. An epoch is *finished* after all the data has been used in the previous
    algorithm. Let’s look at an example. Suppose we have *M* = 1000 and we choose
    *m* = 100\. The parameters *θ* will be updated using 100 input observations each
    time. After ten iterations (![$$ \frac{M}{m} $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq28.png))
    the network will have used all *M* observations for its training. At this point,
    it is said that one epoch is finished. One epoch in this example consists of ten
    times the parameters being updated (or ten iterations). Here are the advantages
    and disadvantages.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
- en: 'Advantages:'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
- en: The parameters update frequency is higher than with plain gradient descent but
    lower than SGD, therefore allowing for a more robust convergence than SGD
  id: totrans-152
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This method is computationally much more efficient than plain gradient descent
    or Stochastic GD since fewer calculations (as in SGD) and resources (as in Plain
    GD) are needed.
  id: totrans-153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This variation is by far the fastest of the three and the most commonly used.
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Disadvantages :'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
- en: 'The use of this variation introduces a new hyper-parameter that needs to be
    tuned: the batch size (the number of observations in the mini-batch).'
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Note
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
- en: An epoch is *finished* after all the input data has been used to update the
    parameters of the neural network. Remember that in one epoch, the parameters of
    the network may be updated many times.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
- en: Stochastic GD
  id: totrans-159
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: SGD is a very common version of the GD, and it simply is the mini-batch version
    with *m* = 1\. This involves updating the parameters of the network by using one
    observation at a time for the loss function. This also has advantages and disadvantages.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
- en: 'Advantages:'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
- en: The frequent updates provide an easy way to check how the model learning is
    going (you don’t need to wait until all the dataset has been considered).
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In a few problems this algorithm may be faster than plain gradient descent.
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在一些问题中，这个算法可能比普通的梯度下降法更快。
- en: The model is intrinsically noisy and that may help the model avoid local minima
    when trying to find the absolute minimum of the cost function.
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型本质上是有噪声的，这可能在尝试找到成本函数的绝对最小值时帮助模型避免局部最小值。
- en: 'Disadvantages:'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 缺点：
- en: On large datasets, this method is quite slow, as it’s very computationally intensive
    due to the continuous updates.
  id: totrans-166
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在大型数据集上，这种方法相当慢，因为它由于连续更新而非常计算密集。
- en: The fact that the algorithm is noisy can make it hard for the algorithm to settle
    on a minimum for the cost function, and the convergence may not be as stable as
    expected.
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 该算法的噪声特性可能会使算法难以在成本函数的极小值上稳定下来，其收敛性可能不如预期稳定。
- en: How to Choose the Right Mini-Batch Size
  id: totrans-168
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何选择正确的迷你批大小
- en: So, what is the right mini-batch size *m*? Typical values used by practitioners
    are in the order of 100 or less. For example, the TensorFlow standard value (if
    you don’t specify otherwise) is 32\. Why is this value so special? To understand
    why, you need to study the behavior of MBGD for various choices of *m*. To make
    it resemble real cases, consider the MNIST dataset. You may have already seen
    it. It is a dataset that contains 70,000 hand-written digits from 0 to 9\. The
    images are gray-level 28x28 pixel images. We will build a classifier with a neural
    network with 16 neurons using the ReLU activation function and use the Adam optimizer.
    Note that if you don’t know what I am talking about, you can skip those details.
    The following discussion can be followed even without understanding the details
    of how the network is designed.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，正确的迷你批大小*m*是多少？从业者使用的典型值在100或更少。例如，TensorFlow的标准值（如果你没有指定其他值）是32。为什么这个值如此特殊？为了理解为什么，你需要研究不同*m*选择的MBGD行为。为了使其类似于实际情况，考虑MNIST数据集。你可能已经见过它了。这是一个包含0到9的手写数字的70,000个数据集。图像是灰度28x28像素图像。我们将使用ReLU激活函数和Adam优化器构建一个具有16个神经元的分类器。请注意，如果你不知道我在说什么，你可以跳过这些细节。即使不理解网络设计的细节，也可以继续下面的讨论。
- en: 'Secondly, using Adam is only for practical reasons, as in TensorFlow the MBGD
    is not available out of the box. But the conclusions continue to be valid. We
    have trained the network for ten epochs on 60,000 training images and then measured
    the running time^([10](#Fn10)) needed, the reached value of the loss function,
    and the accuracy at the end of the training. We used the following values for
    the mini-batch size *m*: 60000 (effectively using all the data, so no mini-batches),
    20000, 5000, 500, 50, 10, and 1\. Note that while for *m* = 10 the required time
    is 2.34 min, when using *m* = 1, 19.18 minutes are needed for ten epochs!'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 其次，使用Adam仅出于实际原因，因为在TensorFlow中MBGD不是默认可用的。但结论仍然有效。我们在60,000个训练图像上训练了网络十个epoch，然后测量了所需的运行时间^([10](#Fn10))、达到的损失函数值以及训练结束时的准确率。我们使用的迷你批大小*m*的值如下：60000（实际上使用所有数据，因此没有迷你批），20000，5000，500，50，10和1。请注意，当*m*
    = 10时，所需时间为2.34分钟，而当使用*m* = 1时，十个epoch需要19.18分钟！
- en: Figure [1-4](#Fig4) shows the results of this study.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 图[1-4](#Fig4)显示了这项研究的结果。
- en: '![](../images/463356_2_En_1_Chapter/463356_2_En_1_Fig5_HTML.jpg)'
  id: totrans-172
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/463356_2_En_1_Chapter/463356_2_En_1_Fig5_HTML.jpg)'
- en: Figure 1-5
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-5
- en: A plot of the loss function reached after ten epochs on the MNIST dataset plotted
    vs. the running time needed. *a* indicates the accuracy reached
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 在MNIST数据集上经过十个epoch后，损失函数的图像与所需运行时间的关系图。*a*表示达到的准确率
- en: Let’s see what Figure [1-5](#Fig5) is telling us. When we use *m* = 60000, the
    running time needed for ten epochs is the lowest, but the accuracy is quite low.
    Decreasing *m* increases the accuracy quite rapidly, until we reach the “elbow.”
    Between *m* = 500 and *m* = 50, the behavior changes. Decreasing *m* does not
    increase the accuracy much, but the running time becomes larger and larger. So,
    when we reach the elbow, a decrease in *m* is no longer advantageous. As you will
    notice, around the elbow, *m* is in the order of 100\. Figure 1-5 shows why typical
    values for *m* are in the order of 100\. Of course, the optimal value is dependent
    on the data and some testing is required, but in most cases a value around 100
    is a very good starting point.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
- en: Note
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
- en: A good starting point for the mini-batch size is in the order of 100\. The optimal
    value is dependent on the data you use and on the neural network architecture
    you train, and testing is required to find the optimal value.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
- en: '[Advanced Section] SGD and Fractals'
  id: totrans-178
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In the previous sections, we discussed how choosing the wrong learning rate
    can make the convergence slow or even diverge. But the discussion was for a one-dimensional
    case and thus was very simple. This section shows you how much complexity is hidden
    when using SGD. You’ll see how specific ranges of the learning rate make the convergence
    chaotic (in the mathematical sense of the word). This is one of the many hidden
    gems that you can find when dealing with optimization problems. Let’s consider
    a problem^([11](#Fn11)) in which the *M* inputs *x*^([*i*]) are bi-dimensional,
    in other words ![$$ {x}^{\left[i\right]}=\left({x}_1^{\left[i\right]},{x}_2^{\left[i\right]}\right)\in
    {\mathbb{R}}^2 $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq29.png).
    We call the target variables *y*^([*i*]). The optimization problem we are trying
    to solve involves minimizing this function
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ L=\frac{1}{2}\sum \limits_{i=1}^M{\left(f\left({x}_1^{\left[i\right]},{x}_2^{\left[i\right]}\right)-{y}^{\left[i\right]}\right)}^2
    $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_Equy.png)'
  id: totrans-180
  prefs: []
  type: TYPE_IMG
- en: with
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ f\left({x}_1^{\left[i\right]},{x}_2^{\left[i\right]}\right)={w}_1{x}_1^{\left[i\right]}+{w}_2\
    {x}_2^{\left[i\right]} $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_Equz.png)'
  id: totrans-182
  prefs: []
  type: TYPE_IMG
- en: This is a simple linear combination of the inputs. The problem is simple enough
    right? We minimize the MSE (Mean Square Error) and try to find the best parameters
    *w*[1] and *w*[2] that minimize *L*. Consider *M* = 3 inputs as well. In particular,
    to make it more concrete, consider the following input matrix^([12](#Fn12))
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ X=\left(\begin{array}{cc}0&amp; 1\\ {}1&amp; \frac{1}{2}\\ {}1&amp; -\frac{1}{2}\end{array}\right)
    $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_Equaa.png)'
  id: totrans-184
  prefs: []
  type: TYPE_IMG
- en: We write our labels in matrix form as well
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Y=\left(\begin{array}{c}0\\ {}4\\ {}0\end{array}\right) $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_Equab.png)'
  id: totrans-186
  prefs: []
  type: TYPE_IMG
- en: Note that what we show you here is not dependent on the numerical values. You
    can reproduce the results with different values without a problem. Let’s first
    find the minimum of *L* exactly (since in this easy case, we can do that). To
    do that, we need simply to derive *L* and solve the two equations
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\partial L}{\partial {w}_1}=0;\kern1.5em \frac{\partial L}{\partial
    {w}_2}=0 $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_Equac.png)'
  id: totrans-188
  prefs: []
  type: TYPE_IMG
- en: The calculations are boring but not overly complex. By solving these two equations,
    you will find that the minimum is at ![$$ {x}^{\ast }=\left(2,\frac{4}{3}\right)
    $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq30.png).
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
- en: Exercises
  id: totrans-190
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Exercise 1
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
- en: Solve these two equations
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\partial L}{\partial {w}_1}=0;\kern1.5em \frac{\partial L}{\partial
    {w}_2}=0 $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_Equad.png)'
  id: totrans-193
  prefs: []
  type: TYPE_IMG
- en: And prove that *L* has its global minimum at ![$$ {x}^{\ast }=\left(2,\frac{4}{3}\right)
    $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq31.png).
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
- en: 'To implement an SGD optimizer, the following algorithm can be followed:'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
- en: Choose a learning rate *α*.
  id: totrans-196
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Choose a random value between {1,2,3} and assign it to *i*.
  id: totrans-197
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Update the parameters *w*[1], *w*[2] by using ![$$ {l}_i=\frac{1}{2}{\left(f\left({x}_1^{\left[i\right]},{x}_2^{\left[i\right]}\right)-{y}^{\left[i\right]}\right)}^2
    $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq32.png); in other
    words, use *l*[*i*] to calculate the derivatives to update the weights according
    to the gradient descent rule *w*[*j*] → *w*[*j*] − *α∂l*[*i*]/*∂w*[*j*] for *j* = 1,
    2\. Each time, save the values *w*[1], *w*[2], for example in a Python list.
  id: totrans-198
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Repeat Steps 2 and 3 a certain number of times, *N*.
  id: totrans-199
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: By following the previous algorithm, you can plot in the (*w*[1], *w*[2]) space
    all the points you obtained and saved in Step 3\. Those are the all the values
    that the two parameters *w*[1] and *w*[2] will assume during the optimization
    procedure. Figure [1-6](#Fig6) shows the result for *α* = 0.65\. The result is
    nothing short of amazing.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/463356_2_En_1_Chapter/463356_2_En_1_Fig6_HTML.jpg)'
  id: totrans-201
  prefs: []
  type: TYPE_IMG
- en: Figure 1-6
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
- en: Each blue point is a tuple of values (*w*[1], *w*[2]) that are generated by
    using SGD as described in the section for a value of the learning rate *α* = 0.65\.
    The plot has been obtained using 4 · 10⁵ iterations
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
- en: 'Exercise 2 (Level: Difficult)'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
- en: Can you derive the equations of the lines delimiting the triangle from the input
    matrix *X*?
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
- en: Exercise 3
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
- en: Try to reproduce the image by implementing the SGD algorithm as described in
    this section from scratch. If you are stuck, you can find a complete implementation
    in the online version of the book.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
- en: It can be shown that what you see in Figure [1-6](#Fig6) is indeed a fractal.
    The mathematical proof is way beyond the scope of this book, but if you are interested,
    you can consult the book *Fractals Everywhere****,*** by M.F. Barnsley, published
    by Dover. One of the main property of fractals is that when you zoom in, you will
    find the same structure that you observe at a larger scale. To convince you that
    this is happening, Figure [1-7](#Fig7) shows you a detail of Figure [1-6](#Fig6).
    In the zoomed area you can observe the same kind of structure that you see at
    a larger scale.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/463356_2_En_1_Chapter/463356_2_En_1_Fig7_HTML.jpg)'
  id: totrans-209
  prefs: []
  type: TYPE_IMG
- en: Figure 1-7
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
- en: A zoomed region that shows the fractal nature that the SGD algorithm can generate.
    This picture has been generated with a learning rate of *α* = 0.65 and with 10⁷
    iterations. In the zoomed region, you can clearly see the same kind of structure
    that you observe at a larger scale on the left. The zoomed region is less sharp
    than the one on the left since only a fraction of the 10⁷ points happen to be
    in the small regioned zoomed in
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
- en: The particular structure of the fractal depends on the learning rate. In Figure
    [1-8](#Fig8), you can see the fractal structure for different learning rates,
    from 0.65 to 1.0\. It is fascinating to see how the structure changes, showing
    the great complexity that is hidden in using SGD.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/463356_2_En_1_Chapter/463356_2_En_1_Fig8_HTML.png)'
  id: totrans-213
  prefs: []
  type: TYPE_IMG
- en: Figure 1-8
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
- en: Fractal shapes obtained by SGD for different learning rates. Note in the figure
    the learning rate is indicated with *γ*.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
- en: When using smaller learning rates, at a certain point the fractal structure
    completely disappears quite suddenly, leaving an unstructured cloud of points,
    as you can see in Figure [1-9](#Fig9). The smaller the learning rate, the smaller
    the cloud of points.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/463356_2_En_1_Chapter/463356_2_En_1_Fig9_HTML.png)'
  id: totrans-217
  prefs: []
  type: TYPE_IMG
- en: Figure 1-9
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
- en: By choosing smaller and smaller learning rates, the fractal structures completely
    disappear, leaving an unstructured cloud of points centered on the global minimum
    *x*^∗ of *L*.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
- en: Finally, by choosing a very small learning rate, for example *α* = 5 · 10^(−4),
    SGD delivers the behavior you would expect, meaning the algorithm converges and
    remains close to the expected minimum. You can see how the plot looks in Figure
    [1-10](#Fig10).
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/463356_2_En_1_Chapter/463356_2_En_1_Fig10_HTML.jpg)'
  id: totrans-221
  prefs: []
  type: TYPE_IMG
- en: Figure 1-10
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
- en: By choosing a very small learning rate of *α* = 5 · 10^(−4), SGD will move in
    the direction of the expected global minimum *x*^∗ and remain in its vicinity,
    as can be seen in the zoomed-in region. Still, SGD continues to deliver points
    that remain around *x*^∗, but never converge to it. The smaller the learning rate,
    the smaller the cloud of points around *x*^∗
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
- en: 'Exercise 4 (Level: Difficult)'
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
- en: Prove that each of the updates done with SGD, as described in the previous section,
    moves the point in parameter space in the direction perpendicular to one of the
    three lines that describe the triangle in the previous figures. In other words,
    the direction between two subsequent updates of the parameters (*w*[1], *w*[2])
    and ![$$ \left({w}_1-\gamma \frac{\partial L}{\partial {w}_1},{w}_2-\frac{\partial
    L}{\partial {w}_2}\right) $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq33.png)
    is perpendicular to one of the three lines that delimitate the triangle in the
    previous figures. Note that this is not an easy exercise, and you can find some
    tips in the online version of the book if you get stuck.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 证明在上一节中描述的每次使用随机梯度下降（SGD）进行的更新，都会将参数空间中的点移动到与之前图中描述的三角形的三条线之一垂直的方向。换句话说，参数的两个后续更新（*w*[1]，*w*[2]）和
    ![$$ \left({w}_1-\gamma \frac{\partial L}{\partial {w}_1},{w}_2-\frac{\partial
    L}{\partial {w}_2}\right) $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq33.png)
    之间的方向与之前图中界定三角形的三条线之一垂直。请注意，这并不是一个简单的练习，如果你遇到困难，可以在书籍的在线版本中找到一些提示。
- en: Note
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: The gradient descent algorithm, especially in its stochastic version, has incredible
    hidden complexity, even for a trivial case, as the one described in the previous
    section. This is the reason that training neural networks can be so difficult
    and tricky, and why choosing the right learning rate and optimizer is so important.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度下降算法，尤其是在其随机版本中，具有难以置信的隐藏复杂性，即使是对于前一小节中描述的简单情况也是如此。这就是训练神经网络可能如此困难且棘手的原因，以及为什么选择合适的学习率和优化器如此重要的原因。
- en: Conclusion
  id: totrans-228
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: You should now have all the ingredients to (at least at a basic level) understand
    what it means for neural networks to learn. We have not yet covered how to build
    a neural network, except for the fact that it is a very complicated function *f*
    of the inputs that depend on a large number of parameters. We go into a lot more
    detail about how neurons work, how non-linearity is introduced, and so much more.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 你现在应该已经拥有了（至少在基本层面上）理解神经网络学习含义的所有成分。我们还没有涵盖如何构建神经网络，除了它是一个非常复杂的输入函数 *f*，这个函数依赖于大量参数。我们将更深入地探讨神经元的工作方式、非线性如何引入，以及更多内容。
- en: 'Let’s now summarize what we discussed in this chapter. To train neural networks,
    you need the following major ingredients:'
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来总结本章所讨论的内容。要训练神经网络，你需要以下主要成分：
- en: A neural network architecture, namely a way of getting from an input *x* to
    an answer ![$$ \hat{y} $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq34.png)
    (remember the function *f* ?) that can be tuned by changing a large number of
    parameters.
  id: totrans-231
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 神经网络架构，即从输入 *x* 到答案 ![$$ \hat{y} $$](../images/463356_2_En_1_Chapter/463356_2_En_1_Chapter_TeX_IEq34.png)（记住函数
    *f* 吗？）的一种方式，可以通过改变大量参数进行调整。
- en: A set of input observations *x*[*k*] (possibly a large number of them) with
    the expected values we want to predict (we are dealing with supervised learning).
  id: totrans-232
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一组输入观测值 *x*[*k*]（可能有很多）以及我们想要预测的期望值（我们处理的是监督学习）。
- en: An optimizer, or in other words, an algorithm that can find the best parameters
    of the network to get the outputs as close as possible to what you expect.
  id: totrans-233
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 优化器，或者说，一种可以找到网络最佳参数的算法，以使输出尽可能接近你期望的结果。
- en: This chapter discussed these points in a basic way. It is important that you
    get the main idea behind what training neural networks means. The next chapters
    discuss each of the three points in more detail and include a lot of examples
    to make the discussion as clear as possible. We build on what’s discussed here
    to bring you to a point where you can use these more advanced techniques for your
    projects.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 本章以基本的方式讨论了这些观点。理解训练神经网络背后的主要思想非常重要。下一章将更详细地讨论这三个观点，并包含大量示例，以使讨论尽可能清晰。我们基于这里讨论的内容，带你到一个可以开始使用这些更高级技术进行项目的地方。
