  type: TYPE_NORMAL
  zh: 摘要
- en: This chapter covered deep learning and how deep learning–based recommendation
    engines work. You saw this by implementing an end-to-end deep learning–based recommender
    system using NF. Deep learning–based recommender systems are a very new but relevant
    field, and it has shown quite promising results in recent times. If sufficient
    data and computational access are provided, then deep learning–based techniques
    will surely outperform any other techniques out there in the market, and hence
    is a very important concept to have in your repertoire.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 本章介绍了深度学习以及基于深度学习的推荐引擎是如何工作的。您通过使用 NF 实现了一个端到端的基于深度学习的推荐系统来看到这一点。基于深度学习的推荐系统是一个非常新但相关的领域，最近它已经显示出相当有希望的结果。如果提供足够的数据和计算访问，那么基于深度学习的技术肯定会在市场上优于任何其他技术，因此这是一个非常重要的概念，应该在您的知识库中占有重要位置。
