- en: 9. Deep Learning–Based Recommender System
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: So far, you have learned various methods for building recommender systems and
    saw their implementation in Python. The book began with basic and intuitive methods,
    like market basket analysis, arithmetic-based content, and collaborative filtering
    methods, and then moved on to more complex machine learning methods, like clustering,
    matrix factorizations, and machine learning classification-based methods. This
    chapter continues the journey by implementing an end-to-end recommendation system
    using advanced deep learning concepts.
  prefs: []
  type: TYPE_NORMAL
- en: Deep learning techniques utilize recent and rapidly growing network architectures
    and optimization algorithms to train on large amounts of data and build more expressive
    and better-performing models. Graphics Processing Units (GPUs) and deep learning
    have been driving advances in recommender systems for the past few years. Due
    to their massively parallel architecture, using GPUs for computation provides
    higher performance and cost savings. Let’s first explore the basics of deep learning
    and then look at the deep learning–based collaborative filtering method (neural
    collaborative filtering).
  prefs: []
  type: TYPE_NORMAL
- en: Basics of Deep Learning (ANNs)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Deep learning is a subtype of machine learning, which essentially covers algorithms
    based upon artificial neural networks (ANN), a network with connecting nodes resembling
    the neural links present in a biological brain. It is a set of connected nodes
    (artificial neurons) that transmit information through links or edges. It starts
    with an input layer (of nodes) and branches out into multiple layers of nodes,
    called the hidden layers, before rejoining into a single output node/layer, which
    gets the output predictions.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [9-1](#Fig1) shows a neural network, the building blocks of any deep
    learning algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537881_1_En_9_Chapter/537881_1_En_9_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A neural network model for deep learning algorithm. The network includes an
    input layer, a hidden layer, and an output layer.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 9-1
  prefs: []
  type: TYPE_NORMAL
- en: Neural network
  prefs: []
  type: TYPE_NORMAL
- en: Each node’s output transforms the input based on the weights provided to nodes
    and edges, and as you progress through the network, from input to output layer,
    the prediction is optimized and refined further by each layer. This is known as
    *forward propagation*. Another important process, known as *backpropagation*,
    uses loss optimization algorithms, such as gradient descent, to calculate and
    reduce the losses in prediction by adjusting the weights of the nodes and edges
    for each layer while moving backward from the output layer toward the input layer.
    These two processes work together to build the final network that gives accurate
    predictions.
  prefs: []
  type: TYPE_NORMAL
- en: This was a simple explanation of basic neural networks, which are typically
    the building blocks of every deep learning algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: Neural Collaborative Filtering (NCF)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Collaborative filtering methods have been the most popular for building recommendation
    systems in various domains. Popular techniques like matrix factorization have
    been extensively used because they are easy to implement and provide accurate
    predictions. But in recent times, through new areas of research, deep learning–based
    models are being used increasingly in all domains, including collaborative filtering.
  prefs: []
  type: TYPE_NORMAL
- en: Neural collaborative filtering (NCF) is a supercharged advanced collaborative
    filtering method using neural networks. In matrix factorization, the user-item
    relationship is defined through the inner product of user and item matrices. In
    NCF, this inner product is replaced by a neural network structure. Through this,
    it tries to achieve two things.
  prefs: []
  type: TYPE_NORMAL
- en: Generalize the matrix factorization into a neural network framework
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Learn the user-item interactions/relationship through a multilayer perceptron
    (MLP)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Figure [9-2](#Fig2) shows the overall NCF structure.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537881_1_En_9_Chapter/537881_1_En_9_Fig2_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration depicts the neural collaborative filtering structure. It includes
    an input layer (sparse), an embedding layer (user latent and item latent vector),
    neural C F layers, and an output layer.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 9-2
  prefs: []
  type: TYPE_NORMAL
- en: NCF
  prefs: []
  type: TYPE_NORMAL
- en: 'Multilayer perceptron (MLP) is a neural network with multiple layers that are
    fully connected (i.e., all nodes of the previous layer are connected to all nodes
    in the next layer). Every node in an MLP usually uses a sigmoid function as its
    activation function. The sigmoid function takes real values as input and returns
    a real value between 0 and 1 using this formula: sigmoid(x) = 1/(1 + exp(–x)),
    where x is the input. In NCF, the activation function is a rectified linear activation
    function (ReLU). The input returns the same number if it’s a positive value; it
    outputs a 0 if it’s a negative value. The formula for ReLU is max(0, x), where
    x is the input.'
  prefs: []
  type: TYPE_NORMAL
- en: Figure [9-3](#Fig3) shows a multilayer perceptron (MLP).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537881_1_En_9_Chapter/537881_1_En_9_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A neural network model of multilayer perceptron (M L P). It includes an input
    layer, a hidden layer, and an output layer.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 9-3
  prefs: []
  type: TYPE_NORMAL
- en: Multilayer perceptron (MLP)
  prefs: []
  type: TYPE_NORMAL
- en: The use of an MLP algorithm over a matrix factorization algorithm is surely
    an upgrade, as theoretically, an MLP can learn any continuous relationship with
    much greater accuracy, and it has a high level of non-linearity (due to multilayers),
    making it a better fit to learn the intricate interactions between users and items.
  prefs: []
  type: TYPE_NORMAL
- en: Now that you’ve heard about the basics of deep learning, neural nets, and neural
    collaborative filtering, let’s dive into an end-to-end implementation of a deep
    learning/NCF-based recommendation system in the following sections.
  prefs: []
  type: TYPE_NORMAL
