- en: Thank you to Ilia Karmanov and Miguel González-Fierro for writing Chapter [7](A463582_1_En_7_Chapter.html)
    , “ Recurrent Neural Networks,” and for many suggestions for improvement across
    the rest of the book. Thanks also to Mary Wahl and Thomas Delteil for their technical
    review of the book; the book wouldn’t be the same without them. Finally, thank
    you to our many colleagues who developed, shaped, and used the products and techniques
    mentioned in this book that influenced our presentation of them.
