- en: 'Artificial intelligence (AI) at its core is about empowering people and organizations
    to reason and interact with the increasingly digital world all around us. Whether
    it be in health care or in financial services or in government, AI is helping
    transform customer experiences, business models, and operational efficiencies
    in a dramatic way. In this book, Mathew, Danielle, and Wee Hyong present a practical
    overview of why the impact of AI and deep learning has accelerated recently and
    illustrate how to build these solutions on the Microsoft Cloud AI platform. They
    build on their experiences as leading data scientists at Microsoft working both
    with the product group as well as with external customers. In this book you will
    see a fresh perspective on how to approach building AI solutions: from the common
    types of models to training and deployment considerations for end-to-end systems.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能（AI）的核心在于赋予人们和组织能力，使他们能够推理和与周围日益数字化的世界互动。无论是在医疗保健、金融服务还是政府领域，人工智能正在以戏剧性的方式帮助转变客户体验、商业模式和运营效率。在这本书中，马修、丹妮尔和魏宏展示了为什么人工智能和深度学习的影响最近加速的原因，并说明了如何在微软云人工智能平台上构建这些解决方案。他们基于在微软担任领先数据科学家时的经验，与产品团队以及外部客户一起工作。在这本书中，您将看到如何构建人工智能解决方案的新视角：从常见的模型类型到端到端系统的训练和部署考虑因素。
- en: 'This topic is very near to my heart. As a Corporate Vice President and CTO
    of Artifical Intelligence at Microsoft, I have had the privilege of leading the
    development of many of our AI products mentioned in this book. Take Unilever,
    for example: They have built a collection of chat bots with a master bot to help
    their employees interact with human resources services and all services inside
    the enterprise. Jabil uses AI for quality control in the circuit board manufacturing
    process. Cochrane uses AI to classify medical documents and organize information
    for systematic reviews. Publicis used AI to build an app for makeup recommendations.
    eSmart Systems has a connected drone with deep learning-based defect detection
    for inspecting power lines in the energy sector. AI is even being used to identify
    and conserve snow leopards in the Himalayas. AI is becoming the new normal.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这个主题与我非常接近。作为微软人工智能的副总裁和首席技术官，我有幸领导了这本书中提到的许多人工智能产品的开发。以联合利华为例：他们构建了一个由主聊天机器人组成的聊天机器人集合，以帮助员工与人力资源服务以及企业内部的所有服务进行互动。Jabil在电路板制造过程中使用人工智能进行质量控制。Cochrane使用人工智能对医疗文件进行分类，并为系统综述组织信息。Publicis使用人工智能构建了一个化妆品推荐应用程序。eSmart
    Systems拥有一个与深度学习为基础的缺陷检测相连的无人机，用于检查能源部门的输电线路。人工智能甚至被用来识别和保护喜马拉雅山的雪豹。人工智能正在成为新常态。
- en: Contrast these examples to enterprise IT systems of the past. We first developed
    systems of record for enterprises to operate. We had enterprise resource planning
    (ERP) systems. We had customer resource management (CRM) systems. Most of these
    were rather siloed and served specific individual functions, with highly structured
    and curated data. Then the Web came along, and the Internet came along, and we
    built systems to interact with our customers over the Web. We started building
    Software as a Service (SaaS) applications hosted in the cloud.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 将这些例子与过去的企业IT系统进行对比。我们最初为企业开发了运营的系统记录。我们有企业资源规划（ERP）系统。我们有客户资源管理（CRM）系统。这些系统大多数都是相对孤立的，服务于特定的个别功能，拥有高度结构化和精心挑选的数据。然后，互联网出现了，我们构建了与客户通过互联网互动的系统。我们开始构建托管在云中的软件即服务（SaaS）应用程序。
- en: Now what we have at our disposal thanks to the type of technologies and techniques
    mentioned in this book are systems of intelligence in the cloud . A system of
    intelligence integrates data across all those systems of record, connects you
    to the systems of engagement, and creates a connected enterprise that understands,
    reasons, and interacts in a very natural way. Built as a collection of interoperating
    SaaS applications, these systems collect and organize all relevant data and interactions
    in the cloud. They constantly learn using AI and deliver new experiences. Live
    online experiments constantly explore a space of possibilities to teach and derive
    new AI capabilities. All this is done with the power of the cloud.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们得益于本书中提到的技术和方法，所拥有的智能系统是在云端。一个智能系统整合了所有记录系统中的数据，将您连接到参与系统，并创建一个能够理解、推理并以非常自然的方式互动的互联企业。这些系统作为一组互操作的SaaS应用程序构建，它们在云端收集和组织所有相关数据和交互。它们通过人工智能不断学习，并交付新的体验。实时在线实验不断探索可能性空间，以教授和推导新的AI能力。所有这些都是在云的力量下完成的。
- en: When you are building powerful systems like this, you need a very comprehensive
    platform. It’s not just one or two components, or a few components from open source
    integrated with existing enterprise applications. You can’t just take a deep learning
    tool, learn with a little bit of data, put the model in a virtual machine on the
    cloud, and build a system of intelligence. You need a comprehensive collection
    of platform services that only a cloud platform can bring, including systems for
    identity and security. This is the differentiation of the Microsoft AI platform.
    It is cloud-powered AI for next-generation systems of intelligence.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 当您构建如此强大的系统时，您需要一个非常全面的平台。这不仅仅是几个组件，或者将开源组件与现有企业应用程序集成。您不能仅仅使用深度学习工具，用一点数据学习，将模型放入云上的虚拟机中，然后构建一个智能系统。您需要一个全面的平台服务集合，只有云平台才能提供，包括身份和安全管理系统。这是微软AI平台的不同之处。这是为下一代智能系统提供的云动力AI。
- en: I am a big believer in democratizing AI for developers. A lot of AI itself should
    be almost as simple as calling a sort function. You just call a sort function,
    and you get an output. The Microsoft AI platform provides a wealth of prebuilt
    AI like speech recognition, translation, image understanding, optical character
    recognition (OCR), and handwriting recognition, many of which are built on top
    of advanced deep learning technology explained in this book. Many of these prebuilt
    AI capabilities can be fine-tuned with your own data. Developers can use such
    prebuilt AI to understand the content of every type of media and information —videos,
    images, natural handwriting—and organize and reason with it. For the use cases
    where prebuilt AI can solve the problem, these services dramatically increase
    developer productivity and time to market.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 我非常相信为开发者民主化AI。许多AI本身应该几乎像调用排序函数一样简单。您只需调用一个排序函数，就能得到输出。微软AI平台提供丰富的预构建AI，如语音识别、翻译、图像理解、光学字符识别（OCR）和手写识别，其中许多是基于本书中解释的先进深度学习技术构建的。许多这些预构建的AI能力可以用您自己的数据进行微调。开发者可以使用这些预构建的AI来理解各种媒体和信息的内容——视频、图像、自然手写文字——并对它们进行组织和推理。对于预构建AI可以解决问题的用例，这些服务显著提高了开发者的生产力和上市时间。
- en: When prebuilt AI isn’t flexible enough, there is the ability to build custom
    AI models on top of a powerful computing layer. This is all a part of the Azure
    cloud, and of course behind it are the innovations in hardware, the latest CPUs,
    field-programmable gate arrays (FPGAs), graphics processing units (GPUs), and
    more to come. Tools such as Azure Machine Learning and Visual Studio Tools for
    AI allow rapid AI model development using the state-of-the-art deep learning frameworks
    and open source toolkits. These models can be delivered as docker containers that
    can be hosted anywhere, in the cloud or on-premises.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 当预构建AI不够灵活时，您可以在强大的计算层之上构建定制的AI模型。这所有的一切都是Azure云的一部分，当然，其背后是硬件创新，包括最新的CPU、现场可编程门阵列（FPGA）、图形处理单元（GPU）以及更多。Azure机器学习工具和Visual
    Studio AI工具允许使用最先进的深度学习框架和开源工具包快速开发AI模型。这些模型可以作为可以在任何地方托管（在云或本地）的docker容器交付。
- en: Mathew, Danielle, and Wee Hyong have outlined in this book an overview of these
    different options for developing and deploying AI solutions with a specific focus
    on deep learning. In the last few years, deep learning has transformed AI, leading
    to an explosion of use cases. Now, software can learn to interpret the content
    and meaning of text, images, and video, almost as well as humans can. Applications
    can understand speech and text, have dialogues with humans in natural ways, and
    complete actions and tasks on behalf of users. The authors showcase how the best
    of open source, the best of Microsoft’s own AI technology, and the best of the
    cloud can all come together in one platform to enable you to build novel systems
    of intelligence.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: Mathew、Danielle和Wee Hyong在这本书中概述了开发和使用人工智能解决方案的不同选项，特别关注深度学习。在过去的几年里，深度学习已经改变了人工智能，导致用例的爆炸性增长。现在，软件可以学习解释文本、图像和视频的内容和意义，几乎与人类一样好。应用程序可以理解语音和文本，以自然的方式与人类进行对话，并代表用户完成行动和任务。作者展示了开源的精华、微软自身人工智能技术的精华以及云平台的精华如何在一个平台上汇聚，以使您能够构建新颖的智能系统。
- en: I invite all of you to take advantage of the power of the cloud and AI coming
    together as illustrated in this book. AI-infused SaaS applications are the new
    normal!
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我邀请大家利用本书中展示的云和人工智能结合的力量。人工智能增强的SaaS应用已成为新常态！
- en: Joseph Sirosh
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: Joseph Sirosh
- en: Corporate Vice President and CTO of Artificial Intelligence, Microsoft
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 微软人工智能副总裁兼首席技术官
- en: July 2018
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 2018年7月
- en: Introduction
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 引言
- en: This book spans topics such as general techniques and frameworks for deep learning,
    starter guides for several approaches in deep learning, and tools, services, and
    infrastructure for developing and deploying AI solutions using the Microsoft AI
    platform. This book is primarily targeted to data scientists who are familiar
    with basic machine learning techniques but have not used deep learning techniques
    or who are not familiar with the Microsoft AI platform. A secondary audience is
    developers who aim for an introduction to AI and getting started with the Microsoft
    AI platform.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 本书涵盖了深度学习的一般技术和框架、深度学习方法的入门指南，以及使用微软人工智能平台开发和部署人工智能解决方案的工具、服务和基础设施。本书主要面向熟悉基本机器学习技术但尚未使用深度学习技术或对微软人工智能平台不熟悉的数据科学家。次要受众是旨在了解人工智能并开始使用微软人工智能平台的开发者。
- en: It is recommended that you have a basic understanding of Python and machine
    learning before reading this book. It is also useful to have access to an Azure
    subscription to follow along with the code examples and get the most benefit from
    the material, although it is not required to read the book.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 建议在阅读本书之前，您对Python和机器学习有一个基本的了解。此外，如果您能访问Azure订阅，以便跟随代码示例并获得材料的最优效益，这将很有帮助，尽管阅读本书并不需要这一要求。
- en: How This Book Is Organized
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 本书组织结构
- en: In Part I of the book, we introduce the basic concepts of AI and the role Microsoft
    has related to AI solutions. Building on decades of research and technological
    innovations, Microsoft now provides services and infrastructure to enable others
    who want to build intelligent applications with the Microsoft AI platform built
    on top of the Azure cloud computing platform.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书的第一部分，我们介绍了人工智能的基本概念以及微软与人工智能解决方案相关的角色。基于数十年的研究和技术创新，微软现在提供服务和基础设施，以帮助其他人使用基于Azure云计算平台之上的微软人工智能平台构建智能应用程序。
- en: We introduce machine learning and deep learning in the context of AI and explain
    why these have become especially popular in the last few years for many different
    business applications. We outline example use cases utilizing AI, especially employing
    deep learning techniques, which span from several verticals such as manufacturing,
    health care, and utilities.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在人工智能的背景下介绍了机器学习和深度学习，并解释了为什么这些技术在过去几年中在许多不同的商业应用中变得特别受欢迎。我们概述了利用人工智能的示例用例，特别是采用深度学习技术，这些用例涵盖了从制造、医疗保健和公用事业等多个垂直领域。
- en: In the first part of the book, we also give an overview of deep learning, including
    common types of networks and trends in the field. We also discuss limitations
    of deep learning and go over how to get started.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书的第一部分，我们也概述了深度学习的概况，包括常见的网络类型和该领域的发展趋势。我们还讨论了深度学习的局限性，并介绍了如何入门。
- en: In Part II, we give a more in-depth overview of the Microsoft AI platform. For
    data scientists and developers getting started using AI in their applications,
    there are a range of solutions that are useful in different situations. The specific
    services and solutions will continue to evolve over time, but two main categories
    of solutions are available.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在第二部分，我们更深入地概述了微软AI平台。对于刚开始在应用程序中使用AI的数据科学家和开发者，有一系列在不同情况下有用的解决方案。具体的服务和解决方案将随着时间的推移而不断演变，但有两个主要的解决方案类别可用。
- en: The first category is custom solutions built on the Microsoft Azure AI platform.
    Chapter [4](A463582_1_En_4_Chapter.html) , “Microsoft AI Platform,” discusses
    the services and infrastructure on the Microsoft AI platform that allow one to
    build custom solutions, especially Azure Machine Learning services for accelerating
    the life cycle of developing machine learning applications as well as surrounding
    services such as Batch AI training and infrastructure such as the Deep Learning
    Virtual Machine.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 第一类是基于微软Azure AI平台构建的定制解决方案。第[4](A463582_1_En_4_Chapter.html)章，“微软AI平台”，讨论了在微软AI平台上提供的服务和基础设施，这些服务和基础设施允许用户构建定制解决方案，特别是用于加速机器学习应用程序开发生命周期的Azure机器学习服务，以及周围的服务，如批量AI训练和深度学习虚拟机等基础设施。
- en: The second category is Microsoft’s Cognitive Services, which are pretrained
    models that are available as a REST application programming interface (API). In
    other words, the models are already built on a set of data and users can use the
    pretrained model. Some of these are ready to use without any customization. For
    example, there is a text analytics service that allows one to submit text and
    get a sentiment score for how positive or negative the text is. This type of service
    could be useful in analyzing product feedback, for example. Other Cognitive Services
    are customizable, where you can bring your own data to customize the model. These
    services are covered in more detail in Chapter [5](A463582_1_En_5_Chapter.html)
    , “Cognitive Services and Custom Vision.”
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 第二类是微软的认知服务，这些是作为REST应用程序编程接口（API）提供的预训练模型。换句话说，这些模型已经在数据集上构建，用户可以使用预训练模型。其中一些模型无需任何定制即可使用。例如，有一个文本分析服务，允许用户提交文本并获取文本的积极或消极情感得分。这种类型的服务在分析产品反馈等方面可能很有用。其他认知服务是可定制的，您可以提供自己的数据来自定义模型。这些服务在第[5](A463582_1_En_5_Chapter.html)章，“认知服务和自定义视觉”中进行了更详细的介绍。
- en: In Part III, we cover three common types of deep learning models—convolutional
    neural networks, recurrent neural networks, and generative adversarial networks—that
    are useful to understand in building out custom AI solutions. Each chapter includes
    links to code samples for understanding the type of network and how one can build
    such a network using the Microsoft AI platform.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在第三部分，我们介绍了三种常见的深度学习模型——卷积神经网络、循环神经网络和生成对抗网络——这些模型在构建定制AI解决方案时很有用。每一章都包含了代码示例的链接，以了解网络类型以及如何使用微软AI平台构建此类网络。
- en: In the final part of the book, Part IV, we consider architecture choices for
    building AI solutions using the Microsoft AI platform along with sample code.
    Specifically, Chapter [9](A463582_1_En_9_Chapter.html) , “Training AI Models,”
    covers options for training neural networks such as Batch AI service and DL workspace.
    Chapter [10](A463582_1_En_10_Chapter.html) , “Operationalizing AI Models,” covers
    deployment options for scoring neural networks such as Azure Kubernetes Service
    for serving real-time models as well as Spark using the open source library MMLSpark
    from Microsoft.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书的最后部分，第四部分，我们考虑了使用微软AI平台构建AI解决方案的架构选择，并提供了示例代码。具体来说，第[9](A463582_1_En_9_Chapter.html)章，“训练AI模型”，涵盖了训练神经网络（如批量AI服务和DL工作区）的选项。第[10](A463582_1_En_10_Chapter.html)章，“部署AI模型”，涵盖了部署神经网络的选项，如用于实时模型服务的Azure
    Kubernetes服务以及使用微软的MMLSpark开源库的Spark。
- en: Note
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Bibliographic information for each chapter is provided in the Notes section
    in the Appendix of the book.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 每章的参考文献信息在附录中的注释部分提供。
