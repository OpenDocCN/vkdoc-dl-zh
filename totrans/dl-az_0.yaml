- en: 'Artificial intelligence (AI) at its core is about empowering people and organizations
    to reason and interact with the increasingly digital world all around us. Whether
    it be in health care or in financial services or in government, AI is helping
    transform customer experiences, business models, and operational efficiencies
    in a dramatic way. In this book, Mathew, Danielle, and Wee Hyong present a practical
    overview of why the impact of AI and deep learning has accelerated recently and
    illustrate how to build these solutions on the Microsoft Cloud AI platform. They
    build on their experiences as leading data scientists at Microsoft working both
    with the product group as well as with external customers. In this book you will
    see a fresh perspective on how to approach building AI solutions: from the common
    types of models to training and deployment considerations for end-to-end systems.'
  prefs: []
  type: TYPE_NORMAL
- en: 'This topic is very near to my heart. As a Corporate Vice President and CTO
    of Artifical Intelligence at Microsoft, I have had the privilege of leading the
    development of many of our AI products mentioned in this book. Take Unilever,
    for example: They have built a collection of chat bots with a master bot to help
    their employees interact with human resources services and all services inside
    the enterprise. Jabil uses AI for quality control in the circuit board manufacturing
    process. Cochrane uses AI to classify medical documents and organize information
    for systematic reviews. Publicis used AI to build an app for makeup recommendations.
    eSmart Systems has a connected drone with deep learning-based defect detection
    for inspecting power lines in the energy sector. AI is even being used to identify
    and conserve snow leopards in the Himalayas. AI is becoming the new normal.'
  prefs: []
  type: TYPE_NORMAL
- en: Contrast these examples to enterprise IT systems of the past. We first developed
    systems of record for enterprises to operate. We had enterprise resource planning
    (ERP) systems. We had customer resource management (CRM) systems. Most of these
    were rather siloed and served specific individual functions, with highly structured
    and curated data. Then the Web came along, and the Internet came along, and we
    built systems to interact with our customers over the Web. We started building
    Software as a Service (SaaS) applications hosted in the cloud.
  prefs: []
  type: TYPE_NORMAL
- en: Now what we have at our disposal thanks to the type of technologies and techniques
    mentioned in this book are systems of intelligence in the cloud . A system of
    intelligence integrates data across all those systems of record, connects you
    to the systems of engagement, and creates a connected enterprise that understands,
    reasons, and interacts in a very natural way. Built as a collection of interoperating
    SaaS applications, these systems collect and organize all relevant data and interactions
    in the cloud. They constantly learn using AI and deliver new experiences. Live
    online experiments constantly explore a space of possibilities to teach and derive
    new AI capabilities. All this is done with the power of the cloud.
  prefs: []
  type: TYPE_NORMAL
- en: When you are building powerful systems like this, you need a very comprehensive
    platform. It’s not just one or two components, or a few components from open source
    integrated with existing enterprise applications. You can’t just take a deep learning
    tool, learn with a little bit of data, put the model in a virtual machine on the
    cloud, and build a system of intelligence. You need a comprehensive collection
    of platform services that only a cloud platform can bring, including systems for
    identity and security. This is the differentiation of the Microsoft AI platform.
    It is cloud-powered AI for next-generation systems of intelligence.
  prefs: []
  type: TYPE_NORMAL
- en: I am a big believer in democratizing AI for developers. A lot of AI itself should
    be almost as simple as calling a sort function. You just call a sort function,
    and you get an output. The Microsoft AI platform provides a wealth of prebuilt
    AI like speech recognition, translation, image understanding, optical character
    recognition (OCR), and handwriting recognition, many of which are built on top
    of advanced deep learning technology explained in this book. Many of these prebuilt
    AI capabilities can be fine-tuned with your own data. Developers can use such
    prebuilt AI to understand the content of every type of media and information —videos,
    images, natural handwriting—and organize and reason with it. For the use cases
    where prebuilt AI can solve the problem, these services dramatically increase
    developer productivity and time to market.
  prefs: []
  type: TYPE_NORMAL
- en: When prebuilt AI isn’t flexible enough, there is the ability to build custom
    AI models on top of a powerful computing layer. This is all a part of the Azure
    cloud, and of course behind it are the innovations in hardware, the latest CPUs,
    field-programmable gate arrays (FPGAs), graphics processing units (GPUs), and
    more to come. Tools such as Azure Machine Learning and Visual Studio Tools for
    AI allow rapid AI model development using the state-of-the-art deep learning frameworks
    and open source toolkits. These models can be delivered as docker containers that
    can be hosted anywhere, in the cloud or on-premises.
  prefs: []
  type: TYPE_NORMAL
- en: Mathew, Danielle, and Wee Hyong have outlined in this book an overview of these
    different options for developing and deploying AI solutions with a specific focus
    on deep learning. In the last few years, deep learning has transformed AI, leading
    to an explosion of use cases. Now, software can learn to interpret the content
    and meaning of text, images, and video, almost as well as humans can. Applications
    can understand speech and text, have dialogues with humans in natural ways, and
    complete actions and tasks on behalf of users. The authors showcase how the best
    of open source, the best of Microsoft’s own AI technology, and the best of the
    cloud can all come together in one platform to enable you to build novel systems
    of intelligence.
  prefs: []
  type: TYPE_NORMAL
- en: I invite all of you to take advantage of the power of the cloud and AI coming
    together as illustrated in this book. AI-infused SaaS applications are the new
    normal!
  prefs: []
  type: TYPE_NORMAL
- en: Joseph Sirosh
  prefs: []
  type: TYPE_NORMAL
- en: Corporate Vice President and CTO of Artificial Intelligence, Microsoft
  prefs: []
  type: TYPE_NORMAL
