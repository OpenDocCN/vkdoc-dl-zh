- en: '7. Machine Learning: Artificial Neural Networks'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This chapter continues with the exploration of machine learning and focuses
    on the artificial neural network (ANN) . I would like to reacknowledge that several
    of the demonstrations were inspired by Bert van Dam.
  prefs: []
  type: TYPE_NORMAL
- en: Parts List
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For Demo 7-1, you need the Alfie robot car and additional parts, which are detailed
    in Table [7-1](#Tab1).
  prefs: []
  type: TYPE_NORMAL
- en: Table 7-1.
  prefs: []
  type: TYPE_NORMAL
- en: Parts Lists
  prefs: []
  type: TYPE_NORMAL
- en: '| Description | Quantity | Remarks |'
  prefs: []
