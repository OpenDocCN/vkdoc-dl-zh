- en: 'Let’s start by delving into one of the simplest of all ANNs: a Hopfield network.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: Hopfield Network
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Hopfield networks were popularized by John Hopfield in 1982, when he described
    an ANN that implemented an associative memory model closely resembling a human’s
    memory functions. The Hopfield network gained a bit of fame when it was discussed
    in Howard S. Smith’s book I, robot, (Robot Binaries, 2008) & Press; (not to be
    confused with Isaac Asimov’s I, Robot (Grosset & Dunlap, 1950), which was the
    basis for the 2004 Will Smith movie of the same name).
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: I need to describe the artificial neuron used in a Hopfield network before I
    describe the network itself. Figure [7-1](#Fig1) is a model of this artificial
    neuron.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_7_Fig1_HTML.jpg](A436848_1_En_7_Fig1_HTML.jpg)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
- en: Figure 7-1.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: Neuron model
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: While only three inputs are shown in Figure [7-1](#Fig1), many more exist in
    complex networks. There is only one output, no matter how many inputs enter the
    neuron. The neuron is in a state that is consistent or maintained until it is
    updated. The state of a neuron is binary, with a value of 1 or –1 (at least for
    the Hopfield networks used in this book). An update is done by going through the
    following three steps .
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: The value of each input is determined and a weighted sum is calculated.
  id: totrans-24
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The neuron output is set to 1 if the weighted sum input is equal to or greater
    than 0; otherwise, it is set to –1.
  id: totrans-25
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The neuron retains the output value until it is updated again.
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: There are two methods for updating neurons, which I describe next. It is not
    critical for you to understand the update methods because that is done in the
    mathematics of the network initialization and real-time operations.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: 'Asynchronous : Specific neurons are selected and immediately updated. This
    can be done in a preselected order or randomly.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Synchronous : All weighted input sums are calculated without outdating the
    neurons. Once completed, all neurons are updated.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now that I have introduced the basic artificial neuron, it is time to discuss
    the Hopfield network. This network is normally described as a recurrent network
    where output values are fed back to the input in an undirected manner. These feedback
    loops have an important impact on the learning capacity of the network. The following
    listing provides some of the important Hopfield network properties .
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: Consists of a set of N neurons, or nodes, as I refer to them from this point
    on
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Symmetric weights for all node interconnections
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: No node is directly connected back to itself (i.e., no self-loops are permitted)
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: No specialized input or output nodes
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Each node only has a binary or two-state output
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A firing node activates all nodes connected to it with a positive weight
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: All inputs are simultaneously applied to all nodes and then feedback
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The network takes a finite number of iterations to reach an equilibrium or constant
    state
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Figure [7-2](#Fig2) is a diagram of the six-node Hopfield network that I use
    in the next series of demonstrations.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_7_Fig2_HTML.jpg](A436848_1_En_7_Fig2_HTML.jpg)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
- en: Figure 7-2.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: Six-node Hopfield network
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: At the beginning of this section, I mentioned that a Hopfield network was based
    upon an associative memory model. It is definitely helpful to explore the associative
    memory model and learn how it works. Examine Figure [7-3](#Fig3). I am positive
    that you recognize it as the letter S.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_7_Fig3_HTML.jpg](A436848_1_En_7_Fig3_HTML.jpg)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
- en: Figure 7-3.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: Letter S
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: You recognize it because the shape of the S letter is ingrained in your memory
    since childhood. There is not much to understand regarding this memory recall,
    because all of the patterns of letters and numbers are very much embedded in our
    memories. However, look at Figure [7-4](#Fig4) and try to determine what it is.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_7_Fig4_HTML.jpg](A436848_1_En_7_Fig4_HTML.jpg)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
- en: Figure 7-4.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: Distorted letter
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: I am pretty sure that most readers recognize the same letter S, even though
    over 50 percent of the letter body has been erased. Your brain and inherent memories
    have essentially filled in the dots to form in your mind that it is indeed the
    S letter. In all likelihood, you didn’t recognize the distorted figure as a letter
    but instead “associated” the jumble of dots and black spots with the letter S.
    This concept of association between what is stored in machine memory and the reality
    of what is presented is an important point in the following demonstration.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: 'Just as you had to learn to recognize the letter S, machines also have to be
    taught to recognize things. The Hopfield network example that follows only uses
    +1 and –1 as input symbols. What these symbols represent in the real world is
    largely irrelevant to this discussion. Let’s begin with a six-input sample set
    of data consisting of the values 1, –1, –1, –1, 1, and 1\. However, to be mathematically
    precise, I express this input data set as the following vector :'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \left\{\begin{array}{c}\hfill \kern0.75em 1\hfill \\ {}\hfill -1\hfill
    \\ {}\hfill -1\hfill \\ {}\hfill -1\hfill \\ {}\hfill \kern0.75em 1\hfill \\ {}\hfill
    \kern0.75em 1\hfill \end{array}\right\} $$](A436848_1_En_7_Chapter_Equa.gif)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![矩阵乘法公式](A436848_1_En_7_Chapter_Equa.gif)'
- en: This vector has to be converted into a 6×6 matrix to represent all the node
    interconnections that result from a six-node Hopfield network. This is easily
    done by multiplying the input data vector by itself.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 这个向量需要被转换成一个 6×6 矩阵，以表示由六个节点 Hopfield 网络产生的所有节点互连。这可以通过将输入数据向量与其自身相乘轻松完成。
- en: '![$$ \left\{\begin{array}{c}\hfill \kern0.75em 1\hfill \\ {}\hfill -1\hfill
    \\ {}\hfill -1\hfill \\ {}\hfill -1\hfill \\ {}\hfill \kern0.75em 1\hfill \\ {}\hfill
    \kern0.75em 1\hfill \end{array}\right\}*\kern0.5em \left\{\begin{array}{c}\hfill
    1\hfill \\ {}\hfill -1\hfill \\ {}\hfill -1\hfill \\ {}\hfill -1\hfill \\ {}\hfill
    \kern0.75em 1\hfill \\ {}\hfill \kern0.75em 1\hfill \end{array}\right\}=\kern0.5em
    \left\{\left.\begin{array}{l}\kern0.5em 1\\ {}-1\\ {}-1\\ {}-1\\ {}\kern1em 1\\
    {}\kern1em 1\end{array}\right|\left.\begin{array}{l}-1\\ {}\kern1em 1\\ {}\kern1em
    1\\ {}\kern1em 1\\ {}-1\\ {}-1\end{array}\right|\left.\begin{array}{l}-1\\ {}\kern1em
    1\\ {}\kern1em 1\\ {}\kern1em 1\\ {}-1\\ {}-1\end{array}\right|\left.\begin{array}{l}-1\\
    {}\kern1em 1\\ {}\kern1em 1\\ {}\kern1em 1\\ {}-1\\ {}-1\end{array}\right|\left.\begin{array}{l}\kern1em
    1\\ {}-1\\ {}-1\\ {}-1\\ {}\kern1em 1\\ {}\kern1em 1\end{array}\right|\begin{array}{c}\hfill
    \kern1em 1\hfill \\ {}\hfill \begin{array}{l}-1\\ {}-1\\ {}-1\\ {}\kern1em 1\\
    {}\kern1em 1\end{array}\hfill \end{array}\right\} $$](A436848_1_En_7_Chapter_Equb.gif)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![矩阵乘法公式](A436848_1_En_7_Chapter_Equb.gif)'
- en: Table [7-2](#Tab2) shows the complete vector multiplication of the information.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 表 [7-2](#Tab2) 展示了信息的完整向量乘法。
- en: Table 7-2.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 表 7-2.
- en: Vector Multiplication
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 向量乘法
- en: '|   |  1 | –1 | –1 | –1 |  1  |  1  |'
  id: totrans-59
  prefs: []
  type: TYPE_TB
  zh: '|   |  1 | –1 | –1 | –1 |  1  |  1  |'
- en: '|  1 | 1 | –1 | –1 | –1 |  1 | 1 |'
  id: totrans-60
  prefs: []
  type: TYPE_TB
  zh: '|  1 | 1 | –1 | –1 | –1 |  1 | 1 |'
- en: '| –1 | –1 |  1 |  1 |  1 | –1 | –1 |'
  id: totrans-61
  prefs: []
  type: TYPE_TB
  zh: '| –1 | –1 |  1 |  1 |  1 | –1 | –1 |'
- en: '| –1 | –1 | 1 | 1 | 1 | –1 | –1 |'
  id: totrans-62
  prefs: []
  type: TYPE_TB
  zh: '| –1 | –1 | 1 | 1 | 1 | –1 | –1 |'
- en: '| –1 | –1 | 1 | 1 | 1 | –1 | –1 |'
  id: totrans-63
  prefs: []
  type: TYPE_TB
  zh: '| –1 | –1 | 1 | 1 | 1 | –1 | –1 |'
- en: '| 1 | 1 | –1 | –1 | –1 | 1 | 1 |'
  id: totrans-64
  prefs: []
  type: TYPE_TB
  zh: '| 1 | 1 | –1 | –1 | –1 | 1 | 1 |'
- en: '| 1 | 1 | –1 | –1 | –1 | 1 | 1 |'
  id: totrans-65
  prefs: []
  type: TYPE_TB
  zh: '| 1 | 1 | –1 | –1 | –1 | 1 | 1 |'
- en: Fortunately, the Python numpy library provides excellent matrix operations for
    all future calculations, which completely automates all of these tedious and error-prone
    manual calculations.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，Python numpy 库为所有未来的计算提供了出色的矩阵运算，这完全自动化了所有这些繁琐且容易出错的手动计算。
- en: 'Now, let’s suppose that there is another set of input data represented by the
    following vector:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们假设存在另一组由以下向量表示的输入数据：
- en: '![$$ \left\{\begin{array}{c}\hfill \kern0.75em 1\hfill \\ {}\hfill -1\hfill
    \\ {}\hfill \kern0.75em 1\hfill \\ {}\hfill -1\hfill \\ {}\hfill \kern0.75em 1\hfill
    \\ {}\hfill -1\hfill \end{array}\right\} $$](A436848_1_En_7_Chapter_Equc.gif)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![矩阵乘法公式](A436848_1_En_7_Chapter_Equc.gif)'
- en: 'Multiplying this new vector by itself yields this:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 将这个新向量与其自身相乘得到以下结果：
- en: '![$$ \left\{\begin{array}{c}\hfill \kern0.75em 1\hfill \\ {}\hfill -1\hfill
    \\ {}\hfill \kern1em 1\hfill \\ {}\hfill -1\hfill \\ {}\hfill \kern0.75em 1\hfill
    \\ {}\hfill -1\hfill \end{array}\right\}*\kern0.5em \left\{\begin{array}{c}\hfill
    1\hfill \\ {}\hfill -1\hfill \\ {}\hfill \kern1em 1\hfill \\ {}\hfill -1\hfill
    \\ {}\hfill \kern0.75em 1\hfill \\ {}\hfill -1\hfill \end{array}\right\}=\kern0.5em
    \left\{\left.\begin{array}{l}\kern0.5em 1\\ {}-1\\ {}\kern1em 1\\ {}-1\\ {}\kern1em
    1\\ {}-1\end{array}\right|\left.\begin{array}{l}-1\\ {}\kern1em 1\\ {}-1\\ {}\kern1em
    1\\ {}-1\\ {}\kern1em 1\end{array}\right|\left.\begin{array}{l}\kern1em 1\\ {}-1\\
    {}\kern1em 1\\ {}-1\\ {}\kern1em 1\\ {}-1\end{array}\right|\left.\begin{array}{l}-1\\
    {}\kern1em 1\\ {}-1\\ {}\kern1em 1\\ {}-1\\ {}\kern1em 1\end{array}\right|\left.\begin{array}{l}\kern1em
    1\\ {}-1\\ {}\kern1em 1\\ {}-1\\ {}\kern1em 1\\ {}-1\end{array}\right|\begin{array}{c}\hfill
    -1\hfill \\ {}\hfill \begin{array}{l}\kern1em 1\\ {}-1\\ {}\kern1em 1\\ {}-1\\
    {}\kern1em 1\end{array}\hfill \end{array}\right\} $$](A436848_1_En_7_Chapter_Equd.gif)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![矩阵乘法公式](A436848_1_En_7_Chapter_Equd.gif)'
- en: The next step is to add the two 6×6 matrices together. This yields a single
    6×6 matrix that “remembers” both sets of input data vectors. Let’s call this final
    matrix the weighting matrix to conform with the matrix shown in Figure [7-1](#Fig1).
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是将两个6×6矩阵相加。这会得到一个单一的6×6矩阵，该矩阵“记住”了两组输入数据向量。让我们称这个最终的矩阵为权重矩阵，以符合图[7-1](#Fig1)中所示的矩阵。
- en: '![$$ \left\{\left.\begin{array}{l}\kern1em 1\\ {}-1\\ {}-1\\ {}-1\\ {}\kern1em
    1\\ {}\kern1em 1\end{array}\right|\left.\begin{array}{l}-1\\ {}\kern1em 1\\ {}\kern1em
    1\\ {}\kern1em 1\\ {}-1\\ {}-1\end{array}\right|\left.\begin{array}{l}-1\\ {}\kern1em
    1\\ {}\kern1em 1\\ {}\kern1em 1\\ {}-1\\ {}-1\end{array}\right|\left.\begin{array}{l}-1\\
    {}\kern1em 1\\ {}\kern1em 1\\ {}\kern1em 1\\ {}-1\\ {}-1\end{array}\right|\left.\begin{array}{l}\kern1em
    1\\ {}-1\\ {}-1\\ {}-1\\ {}\kern1em 1\\ {}\kern1em 1\end{array}\right|\begin{array}{c}\hfill
    \kern1em 1\hfill \\ {}\hfill \begin{array}{l}-1\\ {}-1\\ {}-1\\ {}\kern1em 1\\
    {}\kern1em 1\end{array}\hfill \end{array}\right\}+\kern0.5em \left\{\left.\begin{array}{l}\kern0.5em
    1\\ {}-1\\ {}\kern1em 1\\ {}-1\\ {}\kern1em 1\\ {}-1\end{array}\right|\left.\begin{array}{l}-1\\
    {}\kern1em 1\\ {}-1\\ {}\kern1em 1\\ {}-1\\ {}\kern1em 1\end{array}\right|\left.\begin{array}{l}\kern1em
    1\\ {}-1\\ {}\kern1em 1\\ {}-1\\ {}\kern1em 1\\ {}-1\end{array}\right|\left.\begin{array}{l}-1\\
    {}\kern1em 1\\ {}-1\\ {}\kern1em 1\\ {}-1\\ {}\kern1em 1\end{array}\right|\left.\begin{array}{l}\kern1em
    1\\ {}-1\\ {}\kern1em 1\\ {}-1\\ {}\kern1em 1\\ {}-1\end{array}\right|\begin{array}{c}\hfill
    -1\hfill \\ {}\hfill \begin{array}{l}\kern1em 1\\ {}-1\\ {}\kern1em 1\\ {}-1\\
    {}\kern1em 1\end{array}\hfill \end{array}\right\}=\kern0.5em \left\{\left.\begin{array}{l}\kern0.5em
    2\\ {}-2\\ {}\kern1em 0\\ {}-2\\ {}\kern1em 2\\ {}\kern1em 0\end{array}\right|\left.\begin{array}{l}-2\\
    {}\kern1em 2\\ {}\kern1em 0\\ {}\kern1em 2\\ {}-2\\ {}\kern1em 0\end{array}\right|\left.\begin{array}{l}\kern1em
    0\\ {}\kern1em 0\\ {}\kern1em 2\\ {}\kern1em 0\\ {}\kern1em 0\\ {}-2\end{array}\right|\left.\begin{array}{l}-2\\
    {}\kern1em 2\\ {}\kern1em 0\\ {}\kern1em 2\\ {}-2\\ {}\kern1em 0\end{array}\right|\left.\begin{array}{l}\kern1em
    2\\ {}-2\\ {}\kern1em 0\\ {}-2\\ {}\kern1em 2\\ {}\kern1em 0\end{array}\right|\begin{array}{c}\hfill
    \kern1em 0\hfill \\ {}\hfill \begin{array}{l}\kern1em 0\\ {}-2\\ {}\kern1em 0\\
    {}\kern1em 0\\ {}\kern1em 2\end{array}\hfill \end{array}\right\} $$](A436848_1_En_7_Chapter_Eque.gif)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
- en: Given that the input matrices only contain ±1, the summed matrix can only contain
    ±2 or 0, which it does.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: To prove that the weighting matrix actually “remembers” the input data set vectors,
    I multiply the first vector by the weighting matrix and see what results.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \left\{\begin{array}{c}\hfill \kern0.75em 1\hfill \\ {}\hfill -1\hfill
    \\ {}\hfill -1\hfill \\ {}\hfill -1\hfill \\ {}\hfill \kern0.75em 1\hfill \\ {}\hfill
    \kern0.75em 1\hfill \end{array}\right\}*\kern0.5em \left\{\left.\begin{array}{l}\kern0.5em
    2\\ {}-2\\ {}\kern1em 0\\ {}-2\\ {}\kern1em 2\\ {}\kern1em 0\end{array}\right|\left.\begin{array}{l}-2\\
    {}\kern1em 2\\ {}\kern1em 0\\ {}\kern1em 2\\ {}-2\\ {}\kern1em 0\end{array}\right|\left.\begin{array}{l}\kern1em
    0\\ {}\kern1em 0\\ {}\kern1em 2\\ {}\kern1em 0\\ {}\kern1em 0\\ {}-2\end{array}\right|\left.\begin{array}{l}-2\\
    {}\kern1em 2\\ {}\kern1em 0\\ {}\kern1em 2\\ {}-2\\ {}\kern1em 0\end{array}\right|\left.\begin{array}{l}\kern1em
    2\\ {}-2\\ {}\kern1em 0\\ {}-2\\ {}\kern1em 2\\ {}\kern1em 0\end{array}\right|\begin{array}{c}\hfill
    \kern1em 0\hfill \\ {}\hfill \begin{array}{l}\kern1em 0\\ {}-2\\ {}\kern1em 0\\
    {}\kern1em 0\\ {}\kern1em 2\end{array}\hfill \end{array}\right\}=\kern0.75em \left\{\begin{array}{c}\hfill
    8\hfill \\ {}\hfill -8\hfill \\ {}\hfill -4\hfill \\ {}\hfill -8\hfill \\ {}\hfill
    \kern0.75em 8\hfill \\ {}\hfill \kern0.75em 4\hfill \end{array}\right\} $$](A436848_1_En_7_Chapter_Equf.gif)'
  id: totrans-75
  prefs: []
  type: TYPE_IMG
  zh: '![公式](A436848_1_En_7_Chapter_Equf.gif)'
- en: 'The preceding matrix multiplication process consists of six separate steps
    where the vector values are multiplied by every row in the weighting matrix row,
    and the resulting partial products are summed. For instance, the vector times
    the first row in the weighting matrix yields the following:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 上述矩阵乘法过程由六个独立的步骤组成，其中向量值与权重矩阵的每一行相乘，并将得到的部分乘积相加。例如，向量与权重矩阵的第一行相乘得到以下结果：
- en: (1 * 2) + (–1 * –2) (–1 * 0) + (–1 * –2) + (1 * 2) + (1 * 0) = 8
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: (1 * 2) + (-1 * -2) (-1 * 0) + (-1 * -2) + (1 * 2) + (1 * 0) = 8
- en: 'This resulting vector must next be normalized to match the format of the input
    data, which only consists of a 1 or –1\. The normalization rule is quite simple:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 这个结果向量接下来必须归一化以匹配输入数据的格式，输入数据只包含1或-1。归一化规则非常简单：
- en: All values 0 or greater are changed to 1, while all values less than 0 are changed
    to –1.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 所有0或0以上的值都变为1，而所有小于0的值都变为-1。
- en: It should be noted that the exact normalization of the 0 value is not an exact
    science. In some networks, normalizing it to 1 provides better results, while
    in other networks, normalizing it to –1 is preferable. For this network, I determined
    the former was more appropriate and yielded accurate results.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 应该注意的是，0值的精确归一化并不是一门精确的科学。在某些网络中，将其归一化为1可以提供更好的结果，而在其他网络中，将其归一化为-1可能更合适。对于这个网络，我确定前者更合适，并产生了准确的结果。
- en: 'Applying this rule to the vector resultant yields the following:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 将此规则应用于向量结果得到以下结果：
- en: '![$$ \left\{\begin{array}{c}\hfill \kern0.75em 8\hfill \\ {}\hfill -8\hfill
    \\ {}\hfill -4\hfill \\ {}\hfill -8\hfill \\ {}\hfill \kern0.75em 8\hfill \\ {}\hfill
    \kern0.75em 4\hfill \end{array}\right\}\mathrm{apply}\ \mathrm{rule}\left\{\begin{array}{c}\hfill
    \kern0.75em 1\hfill \\ {}\hfill -1\hfill \\ {}\hfill -1\hfill \\ {}\hfill -1\hfill
    \\ {}\hfill \kern0.75em 1\hfill \\ {}\hfill \kern0.75em 1\hfill \end{array}\right\}
    $$](A436848_1_En_7_Chapter_Equg.gif)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![公式](A436848_1_En_7_Chapter_Equg.gif)'
- en: You can now readily see that the normalized resultant vector is exactly the
    same as the original input data vector. You can do the preceding operations to
    the second input data vector, and it returns that one as well, thus proving the
    weighting matrix “remembers” the initial data stored in it.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 你现在可以清楚地看到，归一化后的结果向量与原始输入数据向量完全相同。你可以对第二个输入数据向量执行前面的操作，它也会返回该向量，从而证明权重矩阵“记得”存储在其中的初始数据。
- en: At this point, you are likely thinking that these operations are interesting,
    but what is their practical value? How can this Hopfield network be put to any
    use? To answer these legitimate questions, consider the following scenario.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 到这个时候，你可能认为这些操作很有趣，但它们的实际价值是什么？如何将这个Hopfield网络用于实际应用？为了回答这些合理的问题，考虑以下场景。
- en: 'Let’s say that the input vector represents some real-world thing, perhaps generated
    by one or more sensors, and the resulting vector is corrupted or distorted due
    to noise or a similar disturbance, much like how Figure [7-4](#Fig4) resembles
    Figure [7-3](#Fig3). Suppose the new input data vector is as follows, where the
    0s represent no data:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 假设输入向量代表一些现实世界的事物，可能由一个或多个传感器生成，并且由于噪声或类似的干扰，结果向量被损坏或扭曲，就像图[7-4](#Fig4)与图[7-3](#Fig3)相似。假设新的输入数据向量如下，其中0表示没有数据：
- en: '![$$ \left\{\begin{array}{c}\hfill \kern0.75em 0\hfill \\ {}\hfill \kern0.75em
    0\hfill \\ {}\hfill \kern0.75em 0\hfill \\ {}\hfill -1\hfill \\ {}\hfill \kern0.75em
    1\hfill \\ {}\hfill \kern0.75em 1\hfill \end{array}\right\} $$](A436848_1_En_7_Chapter_Equh.gif)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
  zh: '![公式](A436848_1_En_7_Chapter_Equh.gif)'
- en: 'Next, multiply this new vector by the weighting matrix and see what happens:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，将这个新向量乘以权重矩阵，看看会发生什么：
- en: '![$$ \left\{\begin{array}{c}\hfill \kern0.75em 0\hfill \\ {}\hfill \kern0.75em
    0\hfill \\ {}\hfill \kern0.75em 0\hfill \\ {}\hfill -1\hfill \\ {}\hfill \kern0.75em
    1\hfill \\ {}\hfill \kern0.75em 1\hfill \end{array}\right\}*\kern0.5em \left\{\left.\begin{array}{l}\kern0.5em
    2\\ {}-2\\ {}\kern1em 0\\ {}-2\\ {}\kern1em 2\\ {}\kern1em 0\end{array}\right|\left.\begin{array}{l}-2\\
    {}\kern1em 2\\ {}\kern1em 0\\ {}\kern1em 2\\ {}-2\\ {}\kern1em 0\end{array}\right|\left.\begin{array}{l}\kern1em
    0\\ {}\kern1em 0\\ {}\kern1em 2\\ {}\kern1em 0\\ {}\kern1em 0\\ {}-2\end{array}\right|\left.\begin{array}{l}-2\\
    {}\kern1em 2\\ {}\kern1em 0\\ {}\kern1em 2\\ {}-2\\ {}\kern1em 0\end{array}\right|\left.\begin{array}{l}\kern1em
    2\\ {}-2\\ {}\kern1em 0\\ {}-2\\ {}\kern1em 2\\ {}\kern1em 0\end{array}\right|\begin{array}{c}\hfill
    \kern1em 0\hfill \\ {}\hfill \begin{array}{l}\kern1em 0\\ {}-2\\ {}\kern1em 0\\
    {}\kern1em 0\\ {}\kern1em 2\end{array}\hfill \end{array}\right\}\kern0.5em =\kern0.75em
    \left\{\begin{array}{c}\hfill 4\hfill \\ {}\hfill -4\hfill \\ {}\hfill -2\hfill
    \\ {}\hfill -4\hfill \\ {}\hfill \kern0.75em 4\hfill \\ {}\hfill \kern0.75em 2\hfill
    \end{array}\right\}\mathrm{normalized}=\kern0.5em \left\{\begin{array}{c}\hfill
    \kern0.75em 1\hfill \\ {}\hfill -1\hfill \\ {}\hfill -1\hfill \\ {}\hfill -1\hfill
    \\ {}\hfill \kern0.75em 1\hfill \\ {}\hfill \kern0.75em 1\hfill \end{array}\right\}
    $$](A436848_1_En_7_Chapter_Equi.gif)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![公式](A436848_1_En_7_Chapter_Equi.gif)'
- en: The final, normalized resultant vector is exactly equal to the original input
    vector. The Hopfield network associated the corrupted input vector with what was
    stored within its structure and returned the vector that most closely resembled
    the distorted input version. This situation is very much akin to how you recognized
    the badly distorted letter from the original.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，归一化的结果向量与原始输入向量完全相同。Hopfield网络将损坏的输入向量与其结构中存储的内容关联起来，并返回与扭曲输入版本最相似的向量。这种情况与您从原始版本中识别出严重扭曲的字母非常相似。
- en: The next demonstration should help further define this association process.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个演示将有助于进一步定义这个关联过程。
- en: 'Demo 7-1: Numerical Figure Recognition Demonstration'
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例7-1：数值图形识别演示
- en: Figure [7-5](#Fig5) shows a unique way to represent the decimal numbers 0 to
    9 using only six straight line segments. There is no name for this scheme because
    I completely made it up.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_7_Fig5_HTML.jpg](A436848_1_En_7_Fig5_HTML.jpg)'
  id: totrans-93
  prefs: []
  type: TYPE_IMG
- en: Figure 7-5.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: Six-segment numerical scheme
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: I am pretty confident that you can easily recognize the majority of the segmented
    numbers in Figure [7-5](#Fig5) without a problem. The numbers 4 and 5 were the
    hardest due to the limitation on the number of available segments.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
- en: 'Suppose that an input data vector is created for each of these numbers, where
    a 1 is used for a displayed segment and a –1 is used for a non-displayed segment.
    For instance, the numbers 0 and 1 would be represented by these vectors :'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ 0\kern0.5em \approx \kern0.5em \left\{\begin{array}{c}\hfill -1\hfill
    \\ {}\hfill -1\hfill \\ {}\hfill -1\hfill \\ {}\hfill \kern0.75em 1\hfill \\ {}\hfill
    \kern0.75em 1\hfill \\ {}\hfill \kern0.75em 1\hfill \end{array}\right\}\kern3.5em
    1\kern0.5em \approx \left\{\begin{array}{c}\hfill -1\hfill \\ {}\hfill -1\hfill
    \\ {}\hfill \kern0.75em 1\hfill \\ {}\hfill \kern0.75em 1\hfill \\ {}\hfill -1\hfill
    \\ {}\hfill -1\hfill \end{array}\right\} $$](A436848_1_En_7_Chapter_Equj.gif)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
- en: Next, a Hopfield network would need to be created using all ten input data vectors
    that are shown in Table [7-3](#Tab3).
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: Table 7-3.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: Input Data Vectors for the Numerical Scheme
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: '| Number | 0 | 1 | 2 | 3 | 4 | 5 |'
  id: totrans-102
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- | --- | --- | --- |'
  id: totrans-103
  prefs: []
  type: TYPE_TB
- en: '| 0 | –1 | –1 | –1 | 1 | 1 | 1 |'
  id: totrans-104
  prefs: []
  type: TYPE_TB
- en: '| 1 | –1 | –1 | 1 | 1 | –1 | –1 |'
  id: totrans-105
  prefs: []
  type: TYPE_TB
- en: '| 2 | 1 | –1 | 1 | 1 | –1 | 1 |'
  id: totrans-106
  prefs: []
  type: TYPE_TB
- en: '| 3 | 1 | 1 | –1 | 1 | –1 | 1 |'
  id: totrans-107
  prefs: []
  type: TYPE_TB
- en: '| 4 | 1 | –1 | 1 | –1 | 1 | –1 |'
  id: totrans-108
  prefs: []
  type: TYPE_TB
- en: '| 5 | 1 | 1 | –1 | –1 | 1 | 1 |'
  id: totrans-109
  prefs: []
  type: TYPE_TB
- en: '| 6 | –1 | –1 | 1 | 1 | 1 | 1 |'
  id: totrans-110
  prefs: []
  type: TYPE_TB
- en: '| 7 | 1 | –1 | 1 | 1 | –1 | –1 |'
  id: totrans-111
  prefs: []
  type: TYPE_TB
- en: '| 8 | 1 | 1 | 1 | 1 | 1 | 1 |'
  id: totrans-112
  prefs: []
  type: TYPE_TB
- en: '| 9 | 1 | 1 | 1 | 1 | –1 | –1 |'
  id: totrans-113
  prefs: []
  type: TYPE_TB
- en: There is a lot of manual computation that I avoided by using the Python numpy
    matrix library that I mentioned earlier. In the ensuing discussion, I use the
    phrase dot product vector to describe the result of a matrix multiplication. I
    have included the following sidebar to describe dot and cross products and explain
    how they are applied to matrices.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
- en: Dot And Cross Products
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
- en: 'A dot product is also known as a scalar product , which is the result of multiplying
    two matrices or arrays together. The only requirement for a successful operation
    is that the number of rows in one matrix or array must match the number of columns
    in the other matrix or array. The following simple Python example should suffice
    to show how this works:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-117
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: The same result may be obtained by converting the arrays into matrices and using
    the multiplication operator (`*`).
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-119
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: For the previous example, Python automatically invoked the dot product operation
    when the interpreter determined that two matrices were to be multiplied.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
- en: A second type of matrix-like multiplication involves the cross product. A cross
    product is defined as a binary operation on two vectors in three-dimensional space.
    The resultant vector is orthogonal to the two input vectors.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 第二种类型的矩阵乘法涉及叉积。叉积定义为三维空间中两个向量的二元运算。结果向量与两个输入向量正交。
- en: 'This next example should clarify the definition. Suppose that there are two
    unit vectors created, as follows:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个例子应该可以阐明定义。假设创建了两个单位向量，如下所示：
- en: '[PRE2]'
  id: totrans-123
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Figure [7-6](#Fig6) shows these two vectors plotted in 3D space.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 图[7-6](#Fig6)显示了这两个向量在3D空间中的绘制。
- en: '![A436848_1_En_7_Fig6_HTML.jpg](A436848_1_En_7_Fig6_HTML.jpg)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_7_Fig6_HTML.jpg](A436848_1_En_7_Fig6_HTML.jpg)'
- en: Figure 7-6.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 图7-6。
- en: y and z unit vectors
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: y和z单位向量
- en: The following expression computes the cross product vector for y and z.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 以下表达式计算y和z的叉积向量。
- en: '[PRE3]'
  id: totrans-129
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: This new vector is orthogonal to y and z, and hence, must lie on the x axis,
    as shown in Figure [7-7](#Fig7).
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 这个新向量与y和z正交，因此，它必须位于x轴上，如图[7-7](#Fig7)所示。
- en: '![A436848_1_En_7_Fig7_HTML.jpg](A436848_1_En_7_Fig7_HTML.jpg)'
  id: totrans-131
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_7_Fig7_HTML.jpg](A436848_1_En_7_Fig7_HTML.jpg)'
- en: Figure 7-7.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 图7-7。
- en: Cross product resultant vector
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 交叉乘积结果向量
- en: 'The order of the arguments in the numpy cross function is important. If you
    were to reverse the order, the following would result:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: numpy交叉函数中参数的顺序很重要。如果您要反转顺序，以下结果会出现：
- en: '[PRE4]'
  id: totrans-135
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: It is the same unit magnitude vector but in the opposite direction. I did not
    plot this one since it is pretty simple to visualize. I do not use the cross product
    in any of the demonstrations, but I have included it for your information.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 这是相同的单位大小向量，但方向相反。我没有绘制这个向量，因为它很容易可视化。我在任何演示中都没有使用叉积，但我包括它供您参考。
- en: Figure [7-8](#Fig8) shows the beginning and ending of a Python interactive session
    where I created the Hopfield weighting matrix based on all 10 input data vectors.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 图[7-8](#Fig8)显示了Python交互会话的开始和结束，我在其中基于所有10个输入数据向量创建了Hopfield权重矩阵。
- en: '![A436848_1_En_7_Fig8_HTML.jpg](A436848_1_En_7_Fig8_HTML.jpg)'
  id: totrans-138
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_7_Fig8_HTML.jpg](A436848_1_En_7_Fig8_HTML.jpg)'
- en: Figure 7-8.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 图7-8。
- en: Python session for creating the Hopfield weighting matrix
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 创建Hopfield权重矩阵的Python会话
- en: 'The following is the final weighting matrix :'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是最终权重矩阵：
- en: '[PRE5]'
  id: totrans-142
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: I shall use this matrix and a slightly distorted number from the contrived numerical
    scheme and see if the Hopfield network can figure it out. Figure [7-9](#Fig9)
    shows the number 8 missing two segments.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 我将使用这个矩阵和从虚构的数值方案中略微扭曲的数字，看看Hopfield网络是否能识别出来。图[7-9](#Fig9)显示了缺少两段的数字8。
- en: '![A436848_1_En_7_Fig9_HTML.jpg](A436848_1_En_7_Fig9_HTML.jpg)'
  id: totrans-144
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_7_Fig9_HTML.jpg](A436848_1_En_7_Fig9_HTML.jpg)'
- en: Figure 7-9.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 图7-9。
- en: Distorted figure 8
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 扭曲的图形8
- en: 'The following is the corresponding input data vector for this distorted figure:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是对应的扭曲图形的输入数据向量：
- en: '![$$ \left\{\begin{array}{c}\hfill\ 1\hfill \\ {}\hfill\ 0\hfill \\ {}\hfill\
    0\hfill \\ {}\hfill\ 1\hfill \\ {}\hfill\ 1\hfill \\ {}\hfill\ 1\hfill \end{array}\right\}
    $$](A436848_1_En_7_Chapter_Equk.gif)'
  id: totrans-148
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \left\{\begin{array}{c}\hfill\ 1\hfill \\ {}\hfill\ 0\hfill \\ {}\hfill\
    0\hfill \\ {}\hfill\ 1\hfill \\ {}\hfill\ 1\hfill \\ {}\hfill\ 1\hfill \end{array}\right\}
    $$](A436848_1_En_7_Chapter_Equk.gif)'
- en: All that is needed to test the network is to multiply the distorted input vector
    by the weighting matrix and normalize the resulting dot product vector. Figure
    [7-10](#Fig10) shows the interactive session where the vector is multiplied by
    the weighting matrix and the resultant dot product vector is displayed.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 测试网络所需的所有操作是将扭曲的输入向量乘以权重矩阵，并对结果点积向量进行归一化。图[7-10](#Fig10)显示了交互会话，其中向量被乘以权重矩阵，并显示了结果点积向量。
- en: '![A436848_1_En_7_Fig10_HTML.jpg](A436848_1_En_7_Fig10_HTML.jpg)'
  id: totrans-150
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_7_Fig10_HTML.jpg](A436848_1_En_7_Fig10_HTML.jpg)'
- en: Figure 7-10.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 图7-10。
- en: Interactive Python session to compute the distorted figure
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 交互式Python会话以计算扭曲的图形
- en: The following shows the normalized vector . It exactly matches the figure 8
    input data vector.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 以下显示了归一化的向量。它与图8输入数据向量完全匹配。
- en: '![$$ \left\{\begin{array}{c}\hfill\ 8\hfill \\ {}\hfill\ 4\hfill \\ {}\hfill\
    0\hfill \\ {}\hfill\ 8\hfill \\ {}\hfill\ 8\hfill \\ {}\hfill\ 16\hfill \end{array}\right\}\kern0.5em
    \mathrm{normalized}\kern0.5em =\kern0.5em \left\{\begin{array}{c}\hfill\ 1\hfill
    \\ {}\hfill\ 1\hfill \\ {}\hfill\ 1\hfill \\ {}\hfill\ 1\hfill \\ {}\hfill\ 1\hfill
    \\ {}\hfill\ 1\hfill \end{array}\right\} $$](A436848_1_En_7_Chapter_Equl.gif)'
  id: totrans-154
  prefs: []
  type: TYPE_IMG
  zh: '![矩阵归一化结果](A436848_1_En_7_Chapter_Equl.gif)'
- en: This test shows once again that a Hopfield network really does store data that
    can readily help identify an unknown or distorted input data set given that it
    is part of the network. I did a brief and limited review of articles concerning
    the Hopfield network and character or pattern recognition, and I found that such
    networks typically have over a 90% success rate in recognizing proper characters
    from distorted or convoluted input vectors. Of course, it all depends on the amount
    and quality of the input data and the number of nodes created in the network.
    In my very simple and limited demonstration, I would be very surprised if the
    success rate was much over 70%, which is still impressive given its limitations
    and constraints.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 这个测试再次表明，Hopfield网络确实存储了数据，可以很容易地帮助识别未知或扭曲的输入数据集，前提是它是网络的一部分。我对有关Hopfield网络和字符或模式识别的文章进行了简要和有限的回顾，我发现这样的网络在从扭曲或卷曲的输入向量中识别正确的字符时通常有超过90%的成功率。当然，这完全取决于输入数据量和质量以及网络中创建的节点数量。在我的非常简单和有限的演示中，如果成功率远超过70%，我会感到非常惊讶，考虑到它的局限性和约束，这仍然是非常令人印象深刻的。
- en: The next demonstration considerably changes what I have done so far using a
    purely computation approach. It uses a more realistic application of ANN.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个演示在纯计算方法方面显著改变了我迄今为止所做的工作。它使用了一个更现实的人工神经网络（ANN）应用。
- en: 'Demo 7-2: Autonomous Robot Car Using ANN'
  id: totrans-157
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 演示7-2：使用ANN的自主机器人汽车
- en: This demonstration uses Alfie, the robot car introduced in the previous chapter.
    In Alfie’s last project, it was programmed to avoid all walls and doors as much
    as possible and also to conserve as much energy as it could while driving about.
    This project is significantly different in that the robot car approaches obstacles
    and tries to navigate around them. I dropped the energy conservation scheme because
    it was not important for this ANN demonstration. Alfie is equipped with another
    ultrasonic sensor, however, which should assist in its efforts to detect and avoid
    obstacles. A Hopfield network is implemented to help the robot remember past actions,
    which should promote the selection of better actions and behaviors in its journey
    through the environment.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 这个演示使用了在前一章中介绍的机器人汽车Alfie。在Alfie的最后一个项目中，它被编程为尽可能避免所有墙壁和门，同时在行驶过程中尽可能节约能量。这个项目与之前的项目显著不同，因为机器人汽车会接近障碍物并尝试绕过它们。我放弃了能量节约方案，因为对于这个人工神经网络（ANN）的演示来说并不重要。然而，Alfie装备了另一个超声波传感器，这应该有助于它在检测和避免障碍物时的努力。实现了一个Hopfield网络来帮助机器人记住过去的行为，这应该有助于它在环境中旅行时选择更好的行动和行为。
- en: 'A five-element input data vector is used with this network. The following are
    the elements making up the input vector:'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这个网络，采用了五个元素的输入数据向量。以下是构成输入向量的元素：
- en: left sensor
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 左侧传感器
- en: right sensor
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 右侧传感器
- en: both sensors
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 两个传感器
- en: left motor
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 左侧电机
- en: right motor
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 右侧电机
- en: These elements are all that is needed for the initial demonstration but more
    elements can easily be increased as desired. These five elements imply that a
    5×5 Hopfield network should be used to support the robot car control system. The
    nominal values of 1 and–1 are used, as I did in the previous example. What needs
    to be done is associate what a 1 or –1 means to each of the elements. Let’s start
    with the sensors. It seems very appropriate to have a 1 indicate that a sensor
    has not detected an object; or in the case of “both sensors,” that each sensor
    reports an obstacle ahead. Note that I have not yet defined a threshold distance
    for the ultrasonic sensors. That comes a bit later. The motor elements are also
    fairly easy to define. A 1 indicates that a motor is running, and a –1 shows that
    it is stopped. Note here, too, that the motors are either running or are not running;
    there is no intermediate power settings. So what would the following input vector
    mean?
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 这些元素对于初始演示就足够了，但可以根据需要轻松增加更多元素。这五个元素意味着应该使用一个5×5的Hopfield网络来支持机器人汽车控制系统。使用1和-1的标称值，就像我在上一个例子中所做的那样。需要做的是将1或-1的含义与每个元素关联起来。让我们从传感器开始。似乎用1表示传感器没有检测到物体非常合适；或者，在“两个传感器”的情况下，每个传感器报告前方有障碍物。请注意，我还没有为超声波传感器定义一个阈值距离。这将在稍后进行。电机元素的定义也很简单。1表示电机正在运行，而-1表示它已停止。在这里也要注意，电机要么在运行，要么不在运行；没有中间功率设置。那么以下输入向量意味着什么呢？
- en: '![$$ \left\{\begin{array}{c}\hfill\ 1\hfill \\ {}\hfill\ 1\hfill \\ {}\hfill\
    1\hfill \\ {}\hfill\ 1\hfill \\ {}\hfill\ 1\hfill \end{array}\right\} $$](A436848_1_En_7_Chapter_Equm.gif)'
  id: totrans-166
  prefs: []
  type: TYPE_IMG
  zh: '![矩阵](A436848_1_En_7_Chapter_Equm.gif)'
- en: All 1s for the sensors mean that no obstacles have been detected, and all 1s
    for the motors mean that the car is driving straight ahead. That is a pretty simple
    and unambiguous rule, which would be suitable if it not for the fact that the
    car is supposed to learn and not simply follow a set of stored rules. What is
    needed is a way for the car to learn what is a good rule or behavior, and what
    is not a very good rule. This approach implies that the car must try different
    things and determine which are good and should be remembered, and which are not
    good and should not be retained. Of course, what is good or not so good is fairly
    arbitrary, so there must be a way to assess those behaviors to keep and store,
    and those to be discarded.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 对于传感器的所有1表示没有检测到障碍物，而对于电机的所有1表示汽车正在直线前进。这是一个相当简单且明确的规则，如果汽车不是应该学习并不仅仅遵循一组存储的规则，那么它将是合适的。需要的是一种让汽车学习什么是好规则或行为，什么不是很好的规则的方法。这种方法意味着汽车必须尝试不同的事情，并确定哪些是好的并且应该被记住，哪些是不好的并且不应该被保留。当然，什么是好或不好是相当任意的，所以必须有一种方法来评估那些应该保留和存储的行为，以及那些应该被丢弃的行为。
- en: 'Trying different things really means randomly activating the motors such that
    new paths can be tried to see if obstacles are encountered. The only motion that
    is prohibited is backing up, because there is no sensor facing in that direction
    and no way for a valid input data vector to be generated. The following are the
    only motions that are allowed:'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试不同的事情实际上意味着随机激活电机，以便尝试新的路径以查看是否遇到障碍。唯一禁止的运动是倒退，因为没有传感器面向那个方向，也无法生成有效的输入数据向量。以下是被允许的唯一运动：
- en: turn left
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 向左转
- en: turn right
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 向右转
- en: go straight
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 直行
- en: stop
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 停止
- en: The stop option was not permitted in the last robot demonstration because of
    the nature of the experiment. This time, it is absolutely permitted. In fact,
    it is entirely possible that the robot eventually learns that the optimum behavior
    is to stop and not move at all. The way that turns are done is also a bit different
    from the last demonstration. In the previous test, the wheel on the side to turn
    stopped and other wheel kept rotating. The robot essentially pivoted on the stopped
    wheel. This time, the wheel on the side to turn is commanded to rotate in the
    opposite direction while the other wheel stops. This action allows the robot to
    turn within its own radius. This is generally known as making a zero-radius turn.
    Not quite accurate, but you get the idea that the actual turn radius is very small.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 由于实验的性质，上一次机器人演示中不允许停止选项。这次，绝对允许。事实上，机器人最终可能学会最佳行为是停止不动。转弯的方式也与上次演示有所不同。在上次测试中，转向侧的轮子停止转动，而其他轮子继续旋转。机器人实际上是在停止的轮子上旋转。这次，转向侧的轮子被命令向相反方向旋转，而另一侧的轮子停止。这个动作允许机器人在其自身半径内转弯。这通常被称为零半径转弯。虽然不是很准确，但你应该明白实际的转弯半径非常小。
- en: 'The next part of the robot learning process is more difficult: distinguishing
    good behavior or actions from not too good behavior. Fortunately, most of us had
    parents and teachers that were around as we were growing up to help with this
    important task. Unfortunately for the robot, there is no one around to help it
    with this critical task. It must do this on its own. We can help the robot by
    programming it to accept actions that “improve” its overall progress. The obvious
    tasks to accept are those actions that do not include detecting an obstacle. This
    approach is very much akin to the way the fitness values were adjusted in the
    previous robot demonstration. Whenever a wall or door was encountered, the fitness
    value in play at that time was slightly decreased. This time, there are no fitness
    values, just input data vectors that will either be stored or not be stored. To
    store the vector, all that matters is that the robot “believes” that the situation
    has improved. The next time the robot encounters a situation with the same vector,
    it recalls what was stored and repeats the action. This approach likely causes
    the robot to operate in a manner totally alien to what you expected, but that
    is fine because it is “learning” on its own terms. This is what it means for the
    robot car to be really autonomous. Besides, observing an unpredictable robot can
    be amusing, provided it does not chase your cat or tip over your expensive vase.'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 机器人学习过程的下一部分更困难：区分好的行为或动作与不太好的行为。幸运的是，我们大多数人在成长过程中都有父母和老师，他们可以帮助我们完成这项重要任务。不幸的是，对于机器人来说，没有人可以帮助它完成这项关键任务。它必须自己完成。我们可以通过编程让机器人接受“提高”其整体进步的行为。显然，应该接受的任务是不包括检测障碍物的行为。这种方法与上次机器人演示中调整适应度值的方式非常相似。每次遇到墙壁或门时，当时正在进行的适应度值会略微降低。这次，没有适应度值，只有输入数据向量，这些向量要么被存储，要么不被存储。要存储向量，唯一重要的是机器人“相信”情况已经改善。下次机器人遇到具有相同向量的情况时，它会回忆起存储的内容并重复该动作。这种方法可能导致机器人以完全不同于你预期的模式运行，但这没关系，因为它是在自己的条件下“学习”。这就是机器人汽车真正自主的含义。此外，观察一个不可预测的机器人可能会很有趣，只要它不会追逐你的猫或打翻你昂贵的花瓶。
- en: 'Another important question to answer is how the robot will recognize a new
    situation. Let’s assume that the robot sensors have not detected anything and
    that we have no idea about operating motors. This is very similar to the distorted
    input vector that I discussed in the beginning of the Hopfield network discussion.
    In this case, the input data vector would be as follows:'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个需要回答的重要问题是机器人将如何识别新的情况。让我们假设机器人的传感器没有检测到任何东西，而且我们对操作电机一无所知。这与我在Hopfield网络讨论开始时讨论的扭曲输入向量非常相似。在这种情况下，输入数据向量如下所示：
- en: '![$$ \left\{\begin{array}{c}\hfill\ 1\hfill \\ {}\hfill\ 1\hfill \\ {}\hfill\
    1\hfill \\ {}\hfill\ 0\hfill \\ {}\hfill\ 0\hfill \end{array}\right\} $$](A436848_1_En_7_Chapter_Equn.gif)'
  id: totrans-176
  prefs: []
  type: TYPE_IMG
  zh: '![矩阵](A436848_1_En_7_Chapter_Equn.gif)'
- en: You may remember that you need to multiply the distorted input vector by the
    weighting matrix. So, we must create the weighting matrix, which in this case
    is
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能记得，你需要将扭曲的输入向量乘以权重矩阵。因此，我们必须创建权重矩阵，在这种情况下是
- en: '![$$ \left\{\begin{array}{c}\hfill\ 1\hfill \\ {}\hfill\ 1\hfill \\ {}\hfill\
    1\hfill \\ {}\hfill\ 1\hfill \\ {}\hfill\ 1\hfill \end{array}\right\}\kern0.5em
    *\kern0.5em \left\{\begin{array}{c}\hfill\ 1\hfill \\ {}\hfill\ 1\hfill \\ {}\hfill\
    1\hfill \\ {}\hfill\ 1\hfill \\ {}\hfill\ 1\hfill \end{array}\right\}\kern0.5em
    =\kern0.5em \left\{\begin{array}{c}\hfill\ 1\ 1\ 1\ 1\ 1\hfill \\ {}\hfill\ 1\
    1\ 1\ 1\ 1\hfill \\ {}\hfill\ 1\ 1\ 1\ 1\ 1\hfill \\ {}\hfill\ 1\ 1\ 1\ 1\ 1\hfill
    \\ {}\hfill\ 1\ 1\ 1\ 1\ 1\hfill \end{array}\right\} $$](A436848_1_En_7_Chapter_Equo.gif)'
  id: totrans-178
  prefs: []
  type: TYPE_IMG
- en: The new vector times the weighting matrix is therefore
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \left\{\begin{array}{c}\hfill\ 1\hfill \\ {}\hfill\ 1\hfill \\ {}\hfill\
    1\hfill \\ {}\hfill\ 0\hfill \\ {}\hfill\ 0\hfill \end{array}\right\}\kern0.5em
    *\kern0.75em \left\{\begin{array}{c}\hfill\ 1\ 1\ 1\ 1\ 1\hfill \\ {}\hfill\ 1\
    1\ 1\ 1\ 1\hfill \\ {}\hfill\ 1\ 1\ 1\ 1\ 1\hfill \\ {}\hfill\ 1\ 1\ 1\ 1\ 1\hfill
    \\ {}\hfill\ 1\ 1\ 1\ 1\ 1\hfill \end{array}\right\}\kern0.5em = \left\{\begin{array}{c}\hfill\
    3\hfill \\ {}\hfill\ 3\hfill \\ {}\hfill\ 3\hfill \\ {}\hfill\ 3\hfill \\ {}\hfill\
    3\hfill \end{array}\right\}\kern0.5em \mathrm{normalized}\kern0.5em =\kern0.5em
    \left\{\begin{array}{c}\hfill\ 1\hfill \\ {}\hfill\ 1\hfill \\ {}\hfill\ 1\hfill
    \\ {}\hfill\ 1\hfill \\ {}\hfill\ 1\hfill \end{array}\right\} $$](A436848_1_En_7_Chapter_Equp.gif)'
  id: totrans-180
  prefs: []
  type: TYPE_IMG
- en: This vector result should not surprise you at this point in the discussion.
    The network has associated this unknown vector with what it knows about a vector
    that also contains sensor data that no objects have been detected, such as
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \left\{\begin{array}{c}\hfill\ 1\hfill \\ {}\hfill\ 1\hfill \\ {}\hfill\
    1\hfill \\ {}\hfill\ 1\hfill \\ {}\hfill\ 1\hfill \end{array}\right\} $$](A436848_1_En_7_Chapter_Equq.gif)'
  id: totrans-182
  prefs: []
  type: TYPE_IMG
- en: 'The stored action is to turn on the two motors and drive straight forward.
    This result leads to the following conclusion:'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
- en: If the known data are correct then you should assume that the unknown data are
    also correct.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
- en: While this conclusion looks good and is somewhat profound, it may also lead
    to an erroneous action if the stored vector itself is in error. Having an erroneous
    stored vector is quite similar to having a false memory. That is any memory that
    you believe to be factual and accurate, but in reality, it is not representative
    of the true experience. As we age, most people tend to substitute false memories
    for real ones, which prompts one to think of the “good old days” that were in
    all likelihood not that good.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
- en: Most of this discussion has been a prelude to the software discussion that starts
    next.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
- en: 'Demo 7-3: Python Control Script for the Obstacle-Avoiding Robot Car'
  id: totrans-187
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The robot car control program named annRobot.py uses a similar structure that
    was developed for the robotRoulette.py program. The motor control and ultrasonic
    sensor modules are identical. The random action selection code has been modified
    and there are several new matrix computation modules that are needed to support
    the Hopfield network. The new program (shown here) is quite long, with heavy annotations
    preceding the new sections or modules. I opted for this approach instead of presenting
    each new section or module, discussing it, and having a final comprehensive listing
    at the end. Please refer back to previous discussions or the robot build appendix
    for information concerning the modules already presented, such as the random draw
    or motor control.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 机器人汽车控制程序名为annRobot.py，它使用与robotRoulette.py程序开发的类似结构。电机控制和超声波传感器模块是相同的。随机动作选择代码已修改，并需要几个新的矩阵计算模块来支持Hopfield网络。新的程序（如下所示）相当长，新部分或模块之前有大量的注释。我选择这种方法，而不是逐个展示每个新部分或模块，讨论它们，并在最后有一个综合列表。请参考之前的讨论或机器人构建附录，以获取有关已展示模块的信息，例如随机抽取或电机控制。
- en: '[PRE6]'
  id: totrans-189
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Test Run
  id: totrans-190
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 测试运行
- en: The robot was powered by an external cell battery pack that enabled it to operate
    completely untethered. I initiated an SSH remote session, as shown in Figure [7-11](#Fig11),
    to start the annRobot program.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 机器人由外部电池组供电，使其能够完全无绳操作。我启动了一个如图[7-11](#Fig11)所示的SSH远程会话，以启动annRobot程序。
- en: '![A436848_1_En_7_Fig11_HTML.jpg](A436848_1_En_7_Fig11_HTML.jpg)'
  id: totrans-192
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_7_Fig11_HTML.jpg](A436848_1_En_7_Fig11_HTML.jpg)'
- en: Figure 7-11.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 图7-11.
- en: SSH session
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: SSH会话
- en: The robot’s moves began as turns predominantly, with an occasional straight
    drive. There were two solution “not found” messages shown within the first minute
    of operation as the robot encountered either the obstacle I placed in the playing
    field or a wall. I judged the overall motion as somewhat chaotic, which was expected.
    After about 4 to 5 minutes, the robot settled into mainly circular motions, and
    very occasionally moved in a straight line. Apparently, it learned that this was
    the best plan to avoid obstacles. It never stopped, even though that was one of
    the options.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 机器人的移动开始主要是转弯，偶尔直线行驶。在操作的前一分钟内，机器人遇到了我在比赛场地上放置的障碍物或墙壁，显示了两条“未找到解决方案”的消息。我判断整体运动有些混乱，这是预期的。大约4到5分钟后，机器人主要进入圆形运动，偶尔直线移动。显然，它学会了这是避开障碍物的最佳方案。它从未停止，尽管停止也是一个选项。
- en: The next demonstration is a modification of this one. It adds a goal-seeking
    behavior.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个演示是对这个演示的修改。它添加了寻找目标的行为。
- en: 'Demo 7-4: Light-Seeking Robot'
  id: totrans-197
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 演示7-4：寻光机器人
- en: 'The autonomous robot in Demo 7-3 was merely trying to avoid obstacles as it
    traveled about in its environment. This new adventure gives the robot more of
    a purpose by trying to travel to an objective, which will be a bright light. I
    will use a new light sensor in addition to the two ultrasonic sensors used in
    the previous project. A Hopfield network will help guide the robot to its destination.
    This means that an initial input data vector must be created with appropriate
    element definitions. The following vector defines this network:'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 在演示7-3中的自主机器人只是在它的环境中四处移动时试图避开障碍物。这次新的冒险通过试图到达一个目标（一个明亮的灯光）给机器人更多的目的性。我将使用一个新的光传感器，以及之前项目中使用的两个超声波传感器。Hopfield网络将帮助引导机器人到达目的地。这意味着必须创建一个具有适当元素定义的初始输入数据向量。以下向量定义了这个网络：
- en: v1 - Light sensor measurement (t[0])
  id: totrans-199
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: v1 - 光传感器测量（t[0]）
- en: v2 - Light sensor measurement (t[1])
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: v2 - 光传感器测量（t[1]）
- en: v3 - Ultrasonic senor 1
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: v3 - 超声波传感器1
- en: v4 - Ultrasonic sensor 2
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: v4 - 超声波传感器2
- en: v5 - Left motor
  id: totrans-203
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: v5 - 左电机
- en: v6 - Right motor
  id: totrans-204
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: v6 - 右电机
- en: I use 1 and –1 for the vector values representing the states for each vector
    element, as shown in Table [7-4](#Tab4).
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用1和-1作为向量值，代表每个向量元素的状态，如表[7-4](#Tab4)所示。
- en: Table 7-4.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 表7-4.
- en: Input Data Vector State Definitions
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 输入数据向量状态定义
- en: '| Vector Elements | Value | State Description |'
  id: totrans-208
  prefs: []
  type: TYPE_TB
  zh: '| 向量元素 | 值 | 状态描述 |'
- en: '| --- | --- | --- |'
  id: totrans-209
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| v1, v2 |  1 | Change to a higher light intensity |'
  id: totrans-210
  prefs: []
  type: TYPE_TB
  zh: '| v1, v2 |  1 | 提高光强度 |'
- en: '| v1, v2 | –1 | Same or change to a lower light intensity |'
  id: totrans-211
  prefs: []
  type: TYPE_TB
  zh: '| v1, v2 | –1 | 相同或降低光强度 |'
- en: '| v3, v4 | 1 | No object detected |'
  id: totrans-212
