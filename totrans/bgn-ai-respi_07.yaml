- en: '| v3, v4 | –1 | Object detected |'
  id: totrans-213
  prefs: []
  type: TYPE_TB
  zh: '| v3, v4 | –1 | 检测到物体 |'
- en: '| v5, v6 | 1 | Motor on |'
  id: totrans-214
  prefs: []
  type: TYPE_TB
  zh: '| v5, v6 | 1 | 电机开启 |'
- en: '| v5, v6 | –1 | Motor off |'
  id: totrans-215
