- en: '7. Machine Learning: Artificial Neural Networks'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This chapter continues with the exploration of machine learning and focuses
    on the artificial neural network (ANN) . I would like to reacknowledge that several
    of the demonstrations were inspired by Bert van Dam.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
- en: Parts List
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
