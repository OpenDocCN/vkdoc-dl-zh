  prefs: []
  type: TYPE_NORMAL
- en: Figure 10-38
  prefs: []
  type: TYPE_NORMAL
- en: The identified anomalies using the transformer predictions
  prefs: []
  type: TYPE_NORMAL
- en: Figure [10-38](#Fig41) shows that quite a few points are labeled as anomalies.
    Most importantly, the model managed to predict as anomalies Thanksgiving, Christmas,
    New Year’s Eve, and a snowstorm-type weather anomaly, among some other points.
    That being said, there are quite a few points that don’t seem like they should
    be anomalies. One problem with the transformer is that it does tend to overfit
    due to its high model capacity. However, you can play with the hyperparameters
    of the transformer model as well as add early stopping or any other mechanism
    to your training loop to see if you can manage the overfitting.
  prefs: []
  type: TYPE_NORMAL
- en: It’s a balancing act, because how well the transformer fits the training data
    during the training process informs the anomaly detection algorithm later on.
    This is due to significant deviations from the time Series as determined by the
    predicted outputs of the transformer will be flagged as anomalies. But if the
    model underfits the training data, you may not pick up on anomalies that you should.
  prefs: []
  type: TYPE_NORMAL
- en: Overall, this was an example of **unsupervised anomaly detection**. We took
    a subset of the original sequence, trained the model to output a prediction given
    rolling windows, and we calculated a threshold by which we can identify anomalies.
    None of the steps in this process involved a training label.
  prefs: []
  type: TYPE_NORMAL
