- en: Figure 2-8
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-8
- en: The Swish activation function for three different values of the parameter *β*
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: Swish激活函数针对三个不同的参数*β*值
- en: where *β* is a learnable parameter (see Figure [2-8](#Fig8)). Their studies
    have shown that simply replacing ReLU activation functions with Swish improves
    classification accuracy on ImageNet by 0.9%, which in today’s deep learning world
    is a lot. ImageNet is a large database of images that is often used to benchmark
    new network architectures or algorithms, as in this case, networks with a different
    activation functions. You can find more information about ImageNet at [`http://www.image-net.org/`](http://www.image-net.org/).
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 其中*β*是一个可学习的参数（见图[2-8](#Fig8)）。他们的研究表明，仅仅用Swish激活函数替换ReLU可以提高ImageNet的分类准确率0.9%，这在今天的深度学习世界中是一个很大的提升。ImageNet是一个大型图像数据库，常用于评估新的网络架构或算法，例如本例中的具有不同激活函数的网络。你可以在[`http://www.image-net.org/`](http://www.image-net.org/)找到更多关于ImageNet的信息。
- en: Other Activation Functions
  id: totrans-118
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 其他激活函数
- en: There are many other activation functions, but those are rarely used. As a reference,
    here are some additional ones. The list is by no means comprehensive and should
    serve the purposes of giving you an idea of the variety of activation functions
    that can be used when developing neural networks.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
- en: ArcTan
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![$$ f(z)={\tan}^{-1}z $$](../images/463356_2_En_2_Chapter/463356_2_En_2_Chapter_TeX_Equo.png)'
  id: totrans-121
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Exponential Linear unit (ELU)
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![$$ f(z)=\left\{\begin{array}{ccc}\alpha \left({e}^z-1\right)&amp; for&amp;
    z&lt;0\\ {}z&amp; for&amp; z\ge 0\end{array}\right. $$](../images/463356_2_En_2_Chapter/463356_2_En_2_Chapter_TeX_Equp.png)'
  id: totrans-123
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Softplus
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![$$ f(z)=\ln \left(1+{e}^z\right) $$](../images/463356_2_En_2_Chapter/463356_2_En_2_Chapter_TeX_Equq.png)'
  id: totrans-125
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: '**Note** Practitioners almost always use only two activation functions: the
    sigmoid and the ReLU (with probably the ReLU in the lead). With both you can achieve
    good results. Both can, given a complex enough network architecture, approximate
    any nonlinear function.^([3](#Fn3)) Remember that when using TensorFlow, you do
    not have to implement them by yourself. TensorFlow offers an efficient implementation
    for you to use. But is important to know how each activation function behaves
    to understand when to use which one.'
  id: totrans-126
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Now that we briefly discussed all the necessary components, you can use the
    neuron on some real problems. Let’s first see how to implement a neuron in Keras
    and then how to perform linear and logistic regression with it.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
- en: How to Implement a Neuron in Keras
  id: totrans-128
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Building a network with a single neuron in Keras is straightforward and can
    be done with
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  id: totrans-130
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: The **Sequential** class groups a linear stack of layers into a `tf.keras.Model`.
    In this straightforward case, we need just one layer made by a single neuron,
    defined by the **layers.Dense** command, which specifies **1** unit (neuron) inside
    a layer and the shape of the input dataset. The `Dense` class implements densely
    connected neural networks’ layers (more on that in the next chapters).
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
- en: In the next paragraphs, you see two practical examples of how to use this simple
    approach—choosing the right activation function and the proper loss function—to
    solve two different problems, namely linear regression and logistic regression.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
- en: 'Python Implementation Tips: Loops and NumPy'
  id: totrans-133
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As you have just seen, Keras does all the dirty work for you. Of course, you
    can also implement the neuron from scratch, using Python standard functionalities
    such as lists and loops, but those tend to become very slow as the number of variables
    and observations grows. A good rule of thumb is to avoid loops when possible and
    use NumPy (or TensorFlow) methods as often as possible.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
- en: 'It is easy to understand how fast NumPy can be (and how slow loops are). Let’s
    start by creating two standard lists of random numbers in Python with 10⁷ elements
    in each:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  id: totrans-136
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: The actual values are not relevant for our purposes. We are simply interested
    in how fast Python can multiply two lists, element by element. The time reported
    was measured on a 2017 Microsoft Surface laptop and will vary greatly depending
    on the hardware that the code runs on. We are not interested in the absolute values,
    but only in how much faster NumPy is in comparison to standard Python loops. If
    you are using a Jupyter Notebook, it is useful to know how to time Python code
    in a cell. To do this, you can use a “magic command.” Those commands start (in
    a Jupyter Notebook) with `%%` or with `%`. It’s a good idea to check the official
    documentation to better understand how they work ([`http://ipython.readthedocs.io/en/stable/interactive/magics.html`](http://ipython.readthedocs.io/en/stable/interactive/magics.html)).
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 实际值对我们来说并不重要。我们只是对Python如何逐个元素乘以两个列表的速度感兴趣。报告的时间是在2017年Microsoft Surface笔记本电脑上测量的，并且会根据代码运行的硬件有很大差异。我们感兴趣的并不是绝对值，而是NumPy与标准Python循环相比快了多少。如果你使用Jupyter
    Notebook，了解如何在单元格中计时Python代码是有用的。为此，你可以使用一个“魔法命令”。这些命令（在Jupyter Notebook中）以`%%`或`%`开头。了解它们的工作原理，查看官方文档是个好主意（[`http://ipython.readthedocs.io/en/stable/interactive/magics.html`](http://ipython.readthedocs.io/en/stable/interactive/magics.html))。
- en: Coming back to the test, let’s measure how much time a standard laptop takes
    to multiply, element by element, the two lists with standard loops. Using the
    code
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 回到测试，让我们测量一个标准笔记本电脑使用标准循环逐个元素乘以两个列表需要多少时间。使用以下代码
- en: '[PRE11]'
  id: totrans-139
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'gives us the following result (note that on your computer, you will probably
    get different numbers):'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 给出了以下结果（注意，在你的电脑上，你可能会得到不同的数字）：
- en: '[PRE12]'
  id: totrans-141
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: The code needed roughly two seconds averaged over seven runs. Now let’s try
    to do the same multiplication, but this time using NumPy
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 代码在七次运行中的平均时间大约是两秒。现在让我们尝试同样的乘法，但这次使用NumPy
- en: '[PRE13]'
  id: totrans-143
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: We first converted the two lists to `numpy` arrays with the following code
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先使用以下代码将两个列表转换为`numpy`数组
- en: '[PRE14]'
  id: totrans-145
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: This time we get the following results
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 这次我们得到了以下结果
- en: '[PRE15]'
  id: totrans-147
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 'The NumPy code needed only 21ms or, in other words, it was roughly 100 times
    faster than the code with standard loops. NumPy is faster for two reasons: the
    underlying routines are written in C, and it uses vectorized code as much as possible
    to speed up calculations on a large amount of data.'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: NumPy代码只需要21毫秒，换句话说，它比使用标准循环的代码快了大约100倍。NumPy之所以更快，有两个原因：底层例程是用C编写的，并且尽可能多地使用向量化代码来加速大量数据的计算。
- en: Note
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Vectorized code refers to operations performed on multiple components of a vector
    (or a matrix) at the same time (in one statement). Passing matrixes to NumPy functions
    is an excellent example of *vectorized code*. NumPy will perform operations on
    big chunks of data simultaneously, obtaining much better performance than standard
    Python loops since the latter must operate on one element at a time. Note that
    part of the excellent performance NumPy shows is also due to the underlying routines
    being written in C.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 向量化代码指的是同时对向量的多个组件（或矩阵）执行操作（在一个语句中）。将矩阵传递给NumPy函数是向量化代码的一个优秀例子。NumPy将对大量数据同时执行操作，由于后者必须逐个元素操作，因此性能比标准的Python循环要好得多。请注意，NumPy显示的出色性能部分也归因于底层例程是用C编写的。
- en: While training deep learning models, you will find yourself doing this kind
    of operation over and over. Such a speed gain will make the difference between
    having a model that can be trained and one that will never give you a result.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 在训练深度学习模型时，你会发现自己在反复进行这类操作。这种速度提升将决定模型是否能够训练，以及模型是否永远不会给出结果。
- en: Linear Regression with a Single Neuron
  id: totrans-152
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 单神经元线性回归
- en: This section explains how to build your first model in Keras and how to use
    it to solve a basic statistical problem. You can, of course, perform linear regression
    quickly by applying traditional math formulas or using dedicated functions such
    as those found in Scikit-learn. For example, you can find the complete implementation
    of linear regression from scratch with NumPy, using the analytical formulas (see
    [`http://adl.toelt.ai/single_neuron/Linear_regression_with_numpy.html`](http://adl.toelt.ai/single_neuron/Linear_regression_with_numpy.html))
    in the online version of the book. However, it is instructive to follow this example,
    since it gives a practical understanding of how the building blocks of deep learning
    architectures (i.e., neurons) work.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 本节解释了如何在Keras中构建您的第一个模型以及如何使用它来解决一个基本的统计问题。当然，您可以通过应用传统的数学公式或使用如Scikit-learn中的专用函数快速执行线性回归。例如，您可以在书籍的在线版本中找到使用NumPy从头开始实现线性回归的完整实现（使用解析公式，见[http://adl.toelt.ai/single_neuron/Linear_regression_with_numpy.html](http://adl.toelt.ai/single_neuron/Linear_regression_with_numpy.html)）。然而，遵循这个例子是有教育意义的，因为它提供了对深度学习架构构建块（即神经元）如何工作的实际理解。
- en: 'If you remember, we have said many times that NumPy is highly optimized to
    perform several parallel operations simultaneously. To get the best performance
    possible, it’s essential to write your equations in matrix form and feed the matrixes
    to NumPy. In this way, the code will be as efficient as possible. Remember: avoid
    loops at all costs whenever possible.'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您还记得，我们多次说过NumPy高度优化以同时执行多个并行操作。为了获得最佳性能，将您的方程式写成矩阵形式并将矩阵输入到NumPy中是至关重要的。这样，代码将尽可能高效。请记住：尽可能避免使用循环。
- en: The Dataset for the Real-World Example
  id: totrans-155
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 实际案例的数据集
- en: 'To make things a bit more interesting, let’s use an instructive dataset. We
    will use the so-called radon dataset [3]. Radon is a radioactive gas that enters
    homes through contact points with the ground. It is a carcinogen that is the primary
    cause of lung cancer in non-smokers. Radon levels vary significantly from household
    to household. The dataset contains measured radon levels in U.S. homes by county
    and state. The `activity` label is the measured radon concentration in pCi/L (referred
    to as the *target* variable, i.e., the one we want to predict using a linear regression
    model). Important features are:'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 为了让事情更有趣，让我们使用一个有教育意义的数据库集。我们将使用所谓的氡数据库[3]。氡是一种放射性气体，通过与地面的接触点进入房屋。它是一种致癌物质，是非吸烟者肺癌的主要原因。氡水平在家庭之间差异很大。该数据集包含按县和州测量的美国家庭氡水平。`activity`标签是测量的氡浓度，以pCi/L为单位（称为*目标*变量，即我们想要使用线性回归模型预测的变量）。重要的特征包括：
- en: Floor (the floor of the house in which the measurement was taken)
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 楼层（测量时所在的房屋楼层）
- en: County (the U.S. county in which the house is located)
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 县（房屋所在的美国县）
- en: uppm (a measurement of the uranium level of the soil by county)
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: uppm（通过县测量的土壤铀水平）
- en: This dataset fits a classical regression problem well since it contains a continuous
    variable (radon activity) to predict. The model that we will build is made of
    one neuron and will fit a linear function to the different features.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 由于该数据集包含一个用于预测的连续变量（氡活性），因此它非常适合经典回归问题。我们将构建的模型由一个神经元组成，并将拟合一个线性函数到不同的特征。
- en: You do not need to understand or study the features. The goal here is to understand
    how to build a linear regression model with what you have learned. Generally,
    in a machine learning project, you would first study your input data, check its
    distribution, quality, missing values, and so on. But we skip this part to concentrate
    on the implementation with Keras.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 您不需要理解或研究这些特征。这里的目的是理解如何使用您所学到的知识构建线性回归模型。通常，在一个机器学习项目中，您首先研究您的输入数据，检查其分布、质量、缺失值等。但我们跳过这部分，以便集中精力使用Keras进行实现。
- en: Note
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: In machine learning, the variable we want to predict is usually called the *target
    variable*.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 在机器学习中，我们想要预测的变量通常被称为*目标变量*。
- en: Now, let’s look at the data. We will skip all the import and load details for
    simplicity and concentrate on the fundamental steps of the code, such as dataset
    preparation, model creation, and performance evaluation. Remember that you can
    find the complete code on the online version of the book. We start by checking
    how many observations we have
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们看看数据。为了简化，我们将跳过所有导入和加载的细节，并专注于代码的基本步骤，例如数据集准备、模型创建和性能评估。请记住，您可以在书籍的在线版本中找到完整的代码。我们首先检查我们有多少观测值
- en: '[PRE16]'
  id: totrans-165
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: The code will give the following results
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 代码将给出以下结果
- en: '[PRE17]'
  id: totrans-167
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: So, we have 919 different measurements of radon activity in 85 distinct counties.
    The `radon_features.head()` command will give the following table as output (the
    first five lines of the `pandas` dataframe)
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们有85个不同县区的919个不同的氡活性测量值。`radon_features.head()`命令将输出以下表格（`pandas`数据框的前五行）
- en: '[PRE18]'
  id: totrans-169
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: We have four features (`floor`, `county`, `log_uranium_ppm`, and `pcterr`) that
    we will use as predictors of radon activity.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有四个特征（`floor`，`county`，`log_uranium_ppm`和`pcterr`），我们将使用这些特征作为氡活性的预测因子。
- en: As suggested, we have prepared the data in matrix form. Let’s briefly review
    the notation, which will come in handy when building the neuron. Normally we have
    many observations (919 in this case). We use an upper index to indicate the different
    observations between parentheses. The *i*^(*th*) observation is indicated with
    ***x***^((*i*)), and the *j*^(*th*) feature of the *i*^(*th*) observation is indicated
    with ![$$ {\boldsymbol{x}}_j^{(i)} $$](../images/463356_2_En_2_Chapter/463356_2_En_2_Chapter_TeX_IEq10.png).
    We indicate the number of observations with *m*.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 如建议的那样，我们已经将数据准备成矩阵形式。让我们简要回顾一下符号，这在构建神经元时将很有用。通常我们有很多观测值（本例中为919）。我们使用上标来表示括号内的不同观测值。第*i*个观测值用***x***^((*i*))表示，第*i*个观测值的第*j*个特征用![$$
    {\boldsymbol{x}}_j^{(i)} $$](../images/463356_2_En_2_Chapter/463356_2_En_2_Chapter_TeX_IEq10.png)表示。我们用*m*表示观测值的数量。
- en: Note
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: In this book, *m* is the *number of observations* and *n*[*x*] is the *number
    of features****.*** Our *j*^(*th*) feature of the *i*^(*th*) observation is indicated
    with ![$$ {\boldsymbol{x}}_j^{(i)} $$](../images/463356_2_En_2_Chapter/463356_2_En_2_Chapter_TeX_IEq11.png).
    In deep learning projects, the bigger the *m*, the better. So be prepared to deal
    with a massive number of observations.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 在这本书中，*m*是*观测值的数量*，*n*[*x*]是*特征的数量**。**我们的第*i*个观测值的第*j*个特征用![$$ {\boldsymbol{x}}_j^{(i)}
    $$](../images/463356_2_En_2_Chapter/463356_2_En_2_Chapter_TeX_IEq11.png)表示。在深度学习项目中，*m*越大越好。因此，请准备好处理大量观测值。
- en: '*n*[*x*] in this example is equal to 4, while *m* is equal to 919\. The entire
    set of inputs (features and observations) can be therefore written using the following
    notation'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，*n*[*x*]等于4，而*m*等于919。因此，整个输入集（特征和观测值）可以用以下符号表示
- en: '![$$ X=\left(\begin{array}{ccc}{x}_1^{(1)}&amp; \dots &amp; {x}_4^{(1)}\\ {}\vdots
    &amp; \ddots &amp; \vdots \\ {}{x}_1^{(m)}&amp; \dots &amp; {x}_4^{(m)}\end{array}\right)
    $$](../images/463356_2_En_2_Chapter/463356_2_En_2_Chapter_TeX_Equr.png)'
  id: totrans-175
  prefs: []
  type: TYPE_IMG
  zh: '![X=($$ \begin{array}{ccc}{x}_1^{(1)}& \dots & {x}_4^{(1)}\\ {}\vdots & \ddots
    & \vdots \\ {}{x}_1^{(m)}& \dots & {x}_4^{(m)}\end{array} $$)](../images/463356_2_En_2_Chapter/463356_2_En_2_Chapter_TeX_Equr.png)'
- en: where each row is an observation, and each column represents a feature in the
    matrix *X* that has the dimensions *m* × 4.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 其中每一行是一个观测值，每一列代表矩阵*X*中的一个特征，该矩阵的维度为*m* × 4。
- en: Dataset Splitting
  id: totrans-177
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 数据集分割
- en: 'In any machine learning project, to check how the model generalizes to unseen
    data, you need to split the dataset into different subsets.^([4](#Fn4)) When you
    build a machine learning model, you first need to train the model, and then you
    have to test it (i.e., verify the model’s performances on novel data). The most
    common way to do this is to split the dataset into two subsets: 80% of the original
    dataset to train the model (the more data you have, the better your model will
    perform) and the remaining 20% to test it.^([5](#Fn5))'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 在任何机器学习项目中，为了检查模型对未见数据的泛化能力，你需要将数据集分割成不同的子集。[4](#Fn4) 当你构建机器学习模型时，首先需要训练模型，然后你必须测试它（即验证模型在新型数据上的性能）。最常见的方法是将数据集分割成两个子集：80%的原数据集用于训练模型（你拥有的数据越多，你的模型表现越好）和剩余的20%用于测试。[5](#Fn5)
- en: 'The following code splits the dataset randomly into two parts with the following
    proportions: 80%/20%.'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 以下代码将数据集随机分割成两部分，比例为80%/20%。
- en: '[PRE19]'
  id: totrans-180
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: This code will give as output the following lines
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 此代码将输出以下行
- en: '[PRE20]'
  id: totrans-182
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: We will use 733 observations to train our linear regression model, and we will
    then evaluate it on the remaining 186 observations.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用733个观测值来训练我们的线性回归模型，然后将在剩余的186个观测值上对其进行评估。
- en: Linear Regression Model
  id: totrans-184
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 线性回归模型
- en: Keep in mind that using a single-neuron model is overkill for a linear regression
    task. We could solve linear regression exactly without using gradient descent
    or a similar optimization algorithm. As mentioned, you can find an exact regression
    solution example, implemented with NumPy library, in the book’s online version.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，对于线性回归任务来说，使用单个神经元模型是过度的。我们可以不使用梯度下降或类似的优化算法，精确地解决线性回归问题。正如之前提到的，你可以在本书的在线版本中找到一个精确的回归解决方案示例，该示例使用NumPy库实现。
- en: 'Given that the dataset can be expressed as a matrix (*X*) and the label we
    want to predict as a column vector (*y*), when we employ one neuron to perform
    linear regression, we simply try to find the best weights (*W*) that appear in
    the following equation:'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 由于数据集可以表示为一个矩阵（*X*），而我们想要预测的标签是一个列向量（*y*），当我们使用一个神经元进行线性回归时，我们只需尝试找到以下方程中出现的最佳权重（*W*）：
- en: '![$$ \hat{y}= WX+b $$](../images/463356_2_En_2_Chapter/463356_2_En_2_Chapter_TeX_Equs.png)'
  id: totrans-187
  prefs: []
  type: TYPE_IMG
  zh: '![预测公式](../images/463356_2_En_2_Chapter/463356_2_En_2_Chapter_TeX_Equs.png)'
- en: The weights and bias need to be chosen so that that the network output is as
    similar as possible to the expected target variable.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 需要选择权重和偏置，使得网络输出尽可能接近预期的目标变量。
- en: If you remember how a neuron is structured, you can easily see that, for the
    neuron to give as output a linear combination of the inputs, we need to use the
    *identity activation function* *.* How can we measure how close the neuron’s outputs
    are to the target variables? The difference is measured by using the Mean Squared
    Error (MSE) function.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你记得神经元的结构，你就可以很容易地看出，为了使神经元输出输入的线性组合，我们需要使用**恒等激活函数**。我们如何衡量神经元的输出与目标变量之间的接近程度呢？这个差异是通过使用均方误差（MSE）函数来衡量的。
- en: '![$$ L\left(\boldsymbol{w},b\right)=\frac{1}{m}\sum \limits_{i=1}^m{\left({y}^{(i)}-{\boldsymbol{w}}^T{\boldsymbol{x}}^{(i)}-b\right)}^2
    $$](../images/463356_2_En_2_Chapter/463356_2_En_2_Chapter_TeX_Equt.png)'
  id: totrans-190
  prefs: []
  type: TYPE_IMG
  zh: '![损失函数公式](../images/463356_2_En_2_Chapter/463356_2_En_2_Chapter_TeX_Equt.png)'
- en: where the sum is over all *m* observations. This is the typical loss function
    chosen in a regression problem. By minimizing *L*(***w***, *b*) with respect to
    the weights and bias, we can find their optimal values.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 其中求和是对所有*m*个观测值进行的。这是在回归问题中选择的典型损失函数。通过相对于权重和偏置最小化*L*(***w***, *b*)，我们可以找到它们的最佳值。
- en: Minimizing *L*(***w***, *b*) is done with an optimizer. If you remember from
    the last chapter, gradient descent is the most basic example of an optimizer and
    could be used to solve this problem. Since is not available out of the box in
    TensorFlow, we use the RMSProp optimizer for practical reasons. Don’t worry if
    you don’t know how it works. Just know that it is simply a more intelligent version
    of the GD algorithm. You learn how it works in detail in the following chapters.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 最小化*L*(***w***, *b*)是通过一个优化器来完成的。如果你还记得上一章的内容，梯度下降是最基本的优化器示例，可以用来解决这个问题。由于TensorFlow中默认没有提供，我们出于实际考虑使用了RMSProp优化器。如果你不知道它是如何工作的，不必担心。只需知道，它只是GD算法的一个更智能的版本。你将在接下来的章节中详细了解它是如何工作的。
- en: Keras Implementation
  id: totrans-193
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Keras实现
- en: If you have no experience with Keras , you can consult the appendixes of this
    book. There you will find an introduction to Keras that will give you enough information
    to be able to understand the following discussion.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有Keras的经验，可以查阅本书的附录。在那里，你将找到一个关于Keras的介绍，这将为你提供足够的信息，以便理解接下来的讨论。
- en: Implementing what we discussed with Keras is straightforward. The following
    function builds the one-neuron model for linear regression.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Keras实现我们讨论的内容是直接的。以下函数构建了用于线性回归的单神经元模型。
- en: '[PRE21]'
  id: totrans-196
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: 'Let’s analyze what this code does:'
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们分析一下这段代码的功能：
- en: First of all, we defined the network structure (also called network architecture)
    with the `keras.Sequential` class, adding one layer^([6](#Fn6)) made of one neuron
    (`layers.Dense`) and with `input dimensions` equal to the number of features used
    to build the model. The activation function is the one set by default, i.e. the
    identity function.
  id: totrans-198
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 首先，我们使用`keras.Sequential`类定义了网络结构（也称为网络架构），添加了一个由一个神经元（`layers.Dense`）组成的一层，并且`输入维度`等于构建模型所使用的特征数量。激活函数是默认设置的，即恒等函数。
- en: Then, we defined the optimizer (`tf.keras.optimizers.RMSprop`), setting the
    learning rate to 0.001\. The optimizer is the algorithm that Keras will use to
    minimize the cost function. We use the RMSprop algorithm in this example.
  id: totrans-199
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然后，我们定义了优化器(`tf.keras.optimizers.RMSprop`)，将学习率设置为0.001。优化器是Keras将用于最小化损失函数的算法。在这个例子中，我们使用了RMSprop算法。
- en: Finally, we compile the model (i.e., we configure the model for training), setting
    its loss function (i.e., the cost function to be minimized), its optimizer, and
    the metric to be calculated during performance evaluation (`model.compile`). The
    function returns the built `model` as a single Python object.
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后，我们编译模型（即，我们为训练配置模型），设置其损失函数（即要最小化的成本函数）、优化器以及在性能评估期间要计算的指标(`model.compile`)。该函数返回构建的`model`作为一个单独的Python对象。
- en: The *learning rate* is a very important parameter for the optimizer. In fact,
    it strongly influences the convergence of the minimization process. It is a common
    and good behavior to try different learning rate values and observe how the model’s
    convergence changes.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: '*学习率*是优化器的一个非常重要的参数。实际上，它强烈影响了最小化过程的收敛性。尝试不同的学习率值并观察模型收敛性的变化是一种常见且良好的行为。'
- en: Now, let’s apply the `build_model` function and look at the model summary
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们应用`build_model`函数并查看模型摘要
- en: '[PRE22]'
  id: totrans-203
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: This code gives the following output
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码给出了以下输出
- en: '[PRE23]'
  id: totrans-205
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: Thus, we have five parameters to be trained—the weights associated with the
    four features, plus the bias .
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们有五个参数需要训练——与四个特征相关的权重，加上偏置。
- en: The Model’s Learning Phase
  id: totrans-207
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型的学习阶段
- en: Training our neuron means finding the weights and biases that minimize the chosen
    cost function (the MSE in this case). The *minimization process* is iterative;
    therefore, it is necessary to decide when to stop it. For this example, we simply
    set a fixed number of epochs. We train the model for 1000 epochs and then look
    at the results in terms of the MSE.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 训练我们的神经元意味着找到最小化所选成本函数（在这种情况下是均方误差）的权重和偏置。*最小化过程*是迭代的；因此，有必要决定何时停止。对于这个例子，我们简单地设置了一个固定的训练轮数。我们训练模型1000个训练轮数，然后从均方误差的角度查看结果。
- en: '[PRE24]'
  id: totrans-209
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: As you can see, training the model in Keras is straightforward. It is enough
    to apply the `fit` method to our model object. `fit` takes as inputs the training
    data and the number of epochs.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，在Keras中训练模型很简单。只需将`fit`方法应用于我们的模型对象即可。`fit`方法接受训练数据和训练轮数作为输入。
- en: The cost function clearly decreases for a while and then stays almost constant.
    That is a good sign, indicating that the cost function has reached a minimum.
    That does not mean that our model is good or that it will give good predictions.
    This tells us only that learning has somehow worked. A very good way to immediately
    visualize the loss function decrease is by plotting the cost function vs. the
    number of epochs. This can be seen in Figure [2-9](#Fig9).
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 损失函数在一开始明显下降，然后几乎保持恒定。这是一个好兆头，表明损失函数已经达到最小值。这并不意味着我们的模型很好或者它将给出好的预测。这仅仅告诉我们学习在某种程度上是有效的。立即可视化损失函数下降的一个非常好的方法是绘制损失函数与训练轮数的关系图。这可以在图[2-9](#Fig9)中看到。
- en: '![](../images/463356_2_En_2_Chapter/463356_2_En_2_Fig9_HTML.jpg)'
  id: totrans-212
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/463356_2_En_2_Chapter/463356_2_En_2_Fig9_HTML.jpg)'
- en: Figure 2-9
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-9
- en: The cost function behavior during the model training, applied to the radon dataset
    with a learning rate of 0.001
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 模型训练过程中的损失函数行为，应用于学习率为0.001的氡数据集
- en: Looking at Figure [2-9](#Fig9), you can see that, after 400 epochs, the cost
    function remains almost constant in its value, indicating that a minimum has been
    reached.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 观察图[2-9](#Fig9)，你可以看到，在400个训练轮数之后，损失函数的值几乎保持恒定，这表明已经达到了最小值。
- en: Since we are doing a linear regression, we are interested in the coefficients
    of the linear equation. Those are the weights of our neuron. The first four are
    the linear regression coefficients, while the last one is the bias term. You can
    compare these numbers with the ones obtained by performing linear regression with
    traditional math formulas and using the NumPy library in the online version of
    the book. To get the weights in Keras, you simply use the `get_weights()` call.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们正在进行线性回归，我们对线性方程的系数感兴趣。这些是我们神经元的权重。前四个是线性回归系数，而最后一个是偏置项。您可以将这些数字与使用传统数学公式和在线版本书籍中的NumPy库进行的线性回归获得的数字进行比较。要在Keras中获取权重，您只需使用`get_weights()`调用。
- en: '[PRE25]'
  id: totrans-217
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: which returns
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: which returns
- en: '[PRE26]'
  id: totrans-219
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: Those are the weights we were expecting.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是我们预期的权重。
- en: Model’s Performance Evaluation on Unseen Data
  id: totrans-221
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在未见数据上的模型性能评估
- en: To determine if the model you just trained is suited for unseen data, you must
    check its performance over a dataset containing only unseen data (the test set).
    Then, predicted radon activity values are compared with real values (`test_y`)
    by simply plotting predictions vs. true values, as shown in Figure [2-10](#Fig10).
    A perfect model will show points distributed over the black line. The less precise
    the predictions are, the more spread out the points will be around the diagonal.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确定你刚刚训练的模型是否适合未见过的数据，你必须检查它在仅包含未见数据的数据集（测试集）上的性能。然后，通过简单地绘制预测值与真实值，如图[2-10](#Fig10)所示，将预测的氡活动值与真实值（`test_y`）进行比较。一个完美的模型将显示点分布在黑色线上。预测越不精确，点在对角线周围的分布就越分散。
- en: '![](../images/463356_2_En_2_Chapter/463356_2_En_2_Fig10_HTML.jpg)'
  id: totrans-223
  prefs: []
  type: TYPE_IMG
  zh: '![图2-10](../images/463356_2_En_2_Chapter/463356_2_En_2_Fig10_HTML.jpg)'
- en: Figure 2-10
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-10
- en: The predicted target value vs. measured target value for our model, applied
    to our testing data
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 我们模型应用于测试数据的预测目标值与测量目标值
- en: If you have followed so far, congratulations! You just built your very first
    neural network, with just one neuron, but still a neural network!
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你一直跟到现在，恭喜你！你刚刚构建了你自己的第一个神经网络，只有一个神经元，但仍然是一个神经网络！
- en: Logistic Regression with a Single Neuron
  id: totrans-227
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 单神经元逻辑回归
- en: 'Now let’s try to solve a classification problem with a single neuron. Logistic
    regression is a classical algorithm and probably the simplest classification.
    We will consider a binary classification problem: that means we will deal with
    the problem of recognizing two classes (that we label as 0 or 1). We need an activation
    function that’s different from the one we used for linear regression, a different
    cost function to minimize, and a slight modification of the output of our neuron.
    The goal is to be able to build a model that can predict if a certain new observation
    is in one of two classes. The neuron should give as output the probability *P*(*y* = 1|
    *x*) of the input *x* to be of class 1\. We will then classify our observation
    as being in class 1 if *P*(*y* = 1| *x*) > 0.5 or in class 0 if *P*(*y* = 1| *x*) < 0.5.'
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们尝试使用单个神经元解决一个分类问题。逻辑回归是一个经典的算法，可能是最简单的分类。我们将考虑一个二元分类问题：这意味着我们将处理识别两个类别（我们将其标记为0或1）的问题。我们需要一个不同于我们用于线性回归的激活函数，一个不同的成本函数来最小化，以及对我们神经元输出的轻微修改。目标是能够构建一个模型，可以预测某个新的观测值是否属于两个类别之一。神经元应该给出输入*x*属于类别1的概率*P*(*y* = 1|
    *x*)。然后，如果*P*(*y* = 1| *x*) > 0.5，我们将我们的观测值分类为类别1，如果*P*(*y* = 1| *x*) < 0.5，我们将分类为类别0。
- en: It is instructive to compare this example with the one about linear regression,
    since they both are applications of the one-neuron model yet are used to solve
    different tasks. You should pay attention to the similarities and differences
    with the linear regression model discussed previously. You are going to see how
    simple using Keras is in this case and how, by changing a few things (such as
    the activation and loss functions), you can easily obtain a different model that
    can solve a different problem.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 将这个例子与线性回归的例子进行比较是有教育意义的，因为它们都是单神经元模型的应用，但用于解决不同的任务。你应该注意与之前讨论的线性回归模型的相似之处和不同之处。你将看到在这种情况下使用Keras是多么简单，以及通过改变一些事情（如激活函数和损失函数），你可以轻松地获得一个可以解决不同问题的不同模型。
- en: The Dataset for the Classification Problem
  id: totrans-230
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 用于分类问题的数据集
- en: As in the linear regression example, we use a dataset taken from the real world,
    to make things more interesting. We employ the BCCD dataset, a small-scale dataset
    for blood cell classification. The dataset can be downloaded from its GitHub repository
    [8]. For this dataset, two Python scripts have been developed to make preparing
    the data easier. All the code can be found in the online version of the book.
    In the example, a slightly modified version of the two scripts is used. Remember,
    you are not interested at this point in how the data looks or how it is cleaned.
    You should focus on how to build the model with Keras.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 正如线性回归示例中那样，我们使用从现实世界获取的数据集，使事情更有趣。我们采用了BCCD数据集，一个用于血细胞分类的小规模数据集。该数据集可以从其GitHub仓库[8]下载。对于这个数据集，已经开发了两个Python脚本，以简化数据准备。所有代码都可以在本书的在线版本中找到。在示例中，使用了两个脚本的略微修改版本。记住，你现在对数据的形状或数据清洗不感兴趣。你应该专注于如何使用Keras构建模型。
- en: 'The dataset contains three kinds of labels:'
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集包含三种类型的标签：
- en: Red blood cells (RBC)
  id: totrans-233
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 红细胞（RBC）
- en: White blood cells (WBC)
  id: totrans-234
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 白细胞（WBC）
- en: Platelets
  id: totrans-235
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 血小板
- en: To make it a binary classification problem, we will consider only the RBC and
    WBC types. The model that will be trained has one neuron and will predict if an
    image contains an RBC or a WBC type by using the `xmin`, `xmax`, `ymin`, and `ymax`
    variables as features.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 为了将其变成一个二分类问题，我们将只考虑RBC和WBC类型。将要训练的模型有一个神经元，它将通过使用`xmin`，`xmax`，`ymin`，和`ymax`变量作为特征来预测图像是否包含RBC或WBC类型。
- en: For simplicity, as in the linear regression example, we will skip all the import
    and load details and concentrate on the fundamental steps of the code, such as
    dataset preparation, model creation, and performance evaluation. You can find
    the complete code on the online version of the book. Note that the greatest differences
    between this case and the linear regression lie in the chosen activation and cost
    function.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 为了简单起见，就像线性回归示例中一样，我们将跳过所有导入和加载的细节，专注于代码的基本步骤，例如数据集准备、模型创建和性能评估。您可以在书籍的在线版本中找到完整的代码。请注意，这个案例与线性回归之间最大的区别在于选择的激活函数和损失函数。
- en: 'Here is the data:'
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是数据：
- en: '[PRE27]'
  id: totrans-239
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: This code returns
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码返回
- en: '[PRE28]'
  id: totrans-241
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: Let’s display the first lines of the data
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们显示数据的开头几行
- en: '[PRE29]'
  id: totrans-243
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: which prints to the screen
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 它将打印到屏幕上
- en: '[PRE30]'
  id: totrans-245
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: The dataset is made up of 4527 observations, one target column (`cell_type`),
    and four features (`xmin`, `xmax`, `ymin`, and `ymax`). When working with images,
    it is always useful to get an idea of how they look. You can see an example in
    Figure [2-11](#Fig11).
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集由4527个观测值组成，一个目标列（`cell_type`）和四个特征（`xmin`，`xmax`，`ymin`，和`ymax`）。在处理图像时，了解它们的外观总是一个有用的想法。您可以在图[2-11](#Fig11)中看到一个示例。
- en: '![](../images/463356_2_En_2_Chapter/463356_2_En_2_Fig11_HTML.jpg)'
  id: totrans-247
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/463356_2_En_2_Chapter/463356_2_En_2_Fig11_HTML.jpg)'
- en: Figure 2-11
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-11
- en: A sample image from the BCCD dataset
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: BCCD数据集的一个样本图像
- en: Note that the features we employ in this example are not the pixel values of
    the image, but the location of the edges of the bounding box of the cell. In fact,
    for each image, we have only four values (`xmin`, `xmax`, `ymin`, and `ymax`).
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，我们在这个例子中使用的特征不是图像的像素值，而是细胞边界框的边缘位置。实际上，对于每张图像，我们只有四个值（`xmin`，`xmax`，`ymin`，和`ymax`）。
- en: Dataset Splitting
  id: totrans-251
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据集分割
- en: As stated, in any machine learning project, you have to split the dataset in
    different subsets. Let’s create a `train` and a `test` dataset by splitting the
    dataset randomly into two parts with a ratio of 80/20, as we did with the radon
    dataset.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 正如所述，在任何机器学习项目中，您都必须将数据集分成不同的子集。让我们通过将数据集随机分成两部分，比例为80/20来创建一个`train`和`test`数据集，就像我们在radon数据集中所做的那样。
- en: '[PRE31]'
  id: totrans-253
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: This code will give as output the following lines
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码将输出以下几行
- en: '[PRE32]'
  id: totrans-255
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: So, we use 3631 observations to train our logistic regression model and then
    evaluate it on the remaining 896 observations.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们使用3631个观测值来训练我们的逻辑回归模型，然后在对剩余的896个观测值进行评估。
- en: Now comes a particularly important point. The labels in this dataset as imported
    will be `'WBC'` or `'RBC'` strings (they simply tell you if an image contains
    white or red blood cells). But we will build our cost function with the assumptions
    that our class labels are 0 and 1\. That means we need to change our `train_y`
    and `test_y` arrays.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 现在来一个特别重要的点。在这个数据集中导入的标签将是`'WBC'`或`'RBC'`字符串（它们只是告诉您图像是否包含白细胞或红细胞）。但我们将构建我们的损失函数，假设我们的类别标签是0和1。这意味着我们需要更改我们的`train_y`和`test_y`数组。
- en: Note
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: When doing binary classifications, remember to check the values of the labels
    you are using for training. Sometimes using the wrong labels (not 0 and 1) may
    cost you quite some time in understanding why the model is not learning.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 在进行二分类时，请记住检查您用于训练的标签值。有时使用错误的标签（不是0和1）可能会让您花费相当多的时间来理解为什么模型没有学习。
- en: '[PRE33]'
  id: totrans-260
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: Now all images containing RBC will have a label of `0`, and all images containing
    WBC will have a label of `1`.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，所有包含RBC的图像都将有一个标签`0`，而所有包含WBC的图像都将有一个标签`1`。
- en: The Logistic Regression Model
  id: totrans-262
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 逻辑回归模型
- en: This model will be made up of one neuron and its goal will be to recognize two
    classes (labeled `0` or `1`, referring to RBC or WBC inside a cell image). This
    is a *binary classification problem* *.*
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 这个模型将由一个神经元组成，其目标将是识别两个类别（标记为`0`或`1`，指代细胞图像内的RBC或WBC）。这是一个**二分类问题****。
- en: As opposed to linear regression, the activation function will be a *sigmoid
    function* (leading to a different neuron's output) and the cost function will
    be *cross-entropy* [7]. If you don’t remember what a sigmoid function is, reread
    the beginning of this chapter. We use it because we want our neuron to output
    the probability of our observation being in class 1\. Therefore, we need an activation
    function that can assume only values between 0 and 1; otherwise we cannot regard
    it as a probability. The cross-entropy for one observation is
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 与线性回归不同，激活函数将是一个**sigmoid函数**（导致不同神经元的输出），而损失函数将是**交叉熵**[7]。如果你不记得sigmoid函数是什么，请重新阅读本章的开头部分。我们使用它是因为我们希望我们的神经元输出观察结果属于类别1的概率。因此，我们需要一个只能取0到1之间值的激活函数；否则，我们不能将其视为概率。一个观察值的交叉熵为
- en: '![$$ L\left({\hat{y}}^{(i)},{y}^{(i)}\right)=-\left({y}^{(i)}\ \log {\hat{y}}^{(i)}+\left(1-{y}^{(i)}\right)\log
    \left(1-{\hat{y}}^{(i)}\right)\right) $$](../images/463356_2_En_2_Chapter/463356_2_En_2_Chapter_TeX_Equu.png)'
  id: totrans-265
  prefs: []
  type: TYPE_IMG
  zh: '![$$ L\left({\hat{y}}^{(i)},{y}^{(i)}\right)=-\left({y}^{(i)}\ \log {\hat{y}}^{(i)}+\left(1-{y}^{(i)}\right)\log
    \left(1-{\hat{y}}^{(i)}\right)\right) $$](../images/463356_2_En_2_Chapter/463356_2_En_2_Chapter_TeX_Equu.png)'
- en: In presence of more than one observation, the cost function is the sum over
    all observations
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 在存在多个观察值的情况下，损失函数是所有观察值的总和
- en: '![$$ L\left(\boldsymbol{w},b\right)=\frac{1}{m}\sum \limits_{i=1}^mL\left({\hat{y}}^{(i)},{y}^{(i)}\right)
    $$](../images/463356_2_En_2_Chapter/463356_2_En_2_Chapter_TeX_Equv.png)'
  id: totrans-267
  prefs: []
  type: TYPE_IMG
  zh: '![$$ L\left(\boldsymbol{w},b\right)=\frac{1}{m}\sum \limits_{i=1}^mL\left({\hat{y}}^{(i)},{y}^{(i)}\right)
    $$](../images/463356_2_En_2_Chapter/463356_2_En_2_Chapter_TeX_Equv.png)'
- en: Explaining the cross-entropy loss function goes beyond the scope of this book,
    but if you are interested, you can find it described in many books and websites.
    For example, you can check out [7].
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 解释交叉熵损失函数超出了本书的范围，但如果你感兴趣，你可以在许多书籍和网站上找到它的描述。例如，你可以查看[7]。
- en: Keras Implementation
  id: totrans-269
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: Keras实现
- en: The following function builds the one-neuron model for logistic regression.
    The implementation is remarkably similar to that of linear regression. The differences,
    as already mentioned, are the activation function, the cost function, and the
    metrics (accuracy in this case, which we analyze more in detail in the testing
    phase).
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 以下函数构建了逻辑回归的单神经元模型。实现方式与线性回归非常相似。如前所述，区别在于激活函数、损失函数和度量标准（在这种情况下是准确率，我们将在测试阶段更详细地分析）。
- en: '[PRE34]'
  id: totrans-271
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: Now, let’s apply the `build_model` function and look at the model summary
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们应用`build_model`函数并查看模型摘要
- en: '[PRE35]'
  id: totrans-273
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: This code gives the following output
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码给出了以下输出
- en: '[PRE36]'
  id: totrans-275
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: We have five parameters to be trained in this case as well—the weights associated
    with the four features plus the bias.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，我们也有五个参数需要训练——与四个特征相关的权重以及偏差。
- en: The Model’s Learning Phase
  id: totrans-277
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型的学习阶段
- en: As with the linear regression example, training our neuron means finding the
    weights and biases that minimize the cost function. The cost function we chose
    to minimize in our logistic regression task is the cross-entropy function, as
    discussed in the previous section.
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 与线性回归示例一样，训练我们的神经元意味着找到最小化损失函数的权重和偏差。在我们之前的逻辑回归任务中，我们选择最小化的损失函数是交叉熵函数，如前所述。
- en: We start training our model for 500 epochs and then look at the summary in terms
    of performances (accuracy).
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 我们开始以500个epoch训练我们的模型，然后查看性能摘要（准确率）。
- en: '[PRE37]'
  id: totrans-280
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: In Figure [2-12](#Fig12), you can see the cost function vs. the number of iterations
    associated with the learning phase.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 在图[2-12](#Fig12)中，你可以看到与学习阶段相关的损失函数与迭代次数的关系。
- en: '![](../images/463356_2_En_2_Chapter/463356_2_En_2_Fig12_HTML.jpg)'
  id: totrans-282
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/463356_2_En_2_Chapter/463356_2_En_2_Fig12_HTML.jpg)'
- en: Figure 2-12
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-12
- en: The cost function resulting in our model applied to the BCCD dataset with a
    learning rate of 0.001
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 损失函数导致我们的模型应用于BCCD数据集，学习率为0.001
- en: Note that, after 100 epochs, the cost function remains almost constant, indicating
    that a minimum has been reached.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，在100个epoch之后，损失函数几乎保持不变，这表明已经达到了最小值。
- en: The Model’s Performance Evaluation
  id: totrans-286
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型的性能评估
- en: Now, to determine if the model you have just trained is suited for unseen data,
    you must check its performance against the test set. Moreover, an *optimizing
    metric* must be chosen. For a binary classification problem, a classic metric
    is the *accuracy,* which can be understood as a measure of how well the classifier
    correctly identified the two classes of the dataset. Mathematically it can be
    calculated as
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，为了确定你刚刚训练的模型是否适合未见过的数据，你必须检查其在测试集上的性能。此外，必须选择一个*优化指标*。对于二元分类问题，一个经典的指标是*准确率*，它可以理解为衡量分类器正确识别数据集两个类别的好坏程度。从数学上讲，它可以计算为
- en: '![$$ accuracy=\frac{number\ of\ cases\ correctly\ identified}{total\ number\
    of\ cases} $$](../images/463356_2_En_2_Chapter/463356_2_En_2_Chapter_TeX_Equw.png)'
  id: totrans-288
  prefs: []
  type: TYPE_IMG
  zh: '![准确率 = 正确识别的案例数 / 总案例数](../images/463356_2_En_2_Chapter/463356_2_En_2_Chapter_TeX_Equw.png)'
- en: where the number of cases correctly identified is the sum of all positive samples
    and negative samples (i.e., all 0s and 1s) that were correctly classified. These
    are usually called true positives and true negatives.
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 其中正确识别的案例数是所有正确分类的正样本和负样本（即所有0和1）的总和。这些通常被称为真阳性（true positives）和真阴性（true negatives）。
- en: To get the accuracy, we can run this code (remember, we will classify an observation
    *i* to be in class 0 if *P*(*y*^((*i*)) = 1| ***x***^((*i*))) < 0.5 or to be in
    class 1 if *P*(*y*^((*i*)) = 1| ***x***^((*i*))) > 0.5)
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 为了获得准确率，我们可以运行此代码（记住，我们将把观察值*i*分类到类别0，如果*P*(y^(*i*)) = 1| ***x***^(*i*)) < 0.5，或者将其分类到类别1，如果*P*(y^(*i*))
    = 1| ***x***^(*i*)) > 0.5）。
- en: '[PRE38]'
  id: totrans-291
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: This code prints this to the screen
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 此代码将此输出到屏幕上
- en: '[PRE39]'
  id: totrans-293
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: With this model, we reach an accuracy of 98%. Not bad for a network with just
    one neuron.
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这个模型，我们达到了98%的准确率。对于一个只有一个神经元的网络来说，这已经很不错了。
- en: Conclusion
  id: totrans-295
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: 'This chapter looked at many things. You learned how a neuron works and what
    its main components are. You also learned about the most common activation functions
    and saw how to implement a model with a single neuron in Keras to solve two problems:
    linear and logistic regression. In the next chapter, we look at how to build neural
    networks with a large number of neurons and how to train them.'
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 本章探讨了众多内容。你学习了神经元的工作原理及其主要组成部分。你还了解了最常见的激活函数，并看到了如何在Keras中使用单个神经元实现模型来解决两个问题：线性回归和逻辑回归。在下一章中，我们将探讨如何构建具有大量神经元的神经网络以及如何训练它们。
- en: Note
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Linear and logistic regression are two classical statistical models that can
    be implemented in many ways. This chapter used the neural network language to
    implement them and to show you how flexible neural networks are. When you understand
    their inner components, you can use them in many ways.
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 线性回归和逻辑回归是两种经典的统计模型，可以以多种方式实现。本章使用神经网络语言来实现它们，并展示了神经网络是多么灵活。当你理解它们的内部组件时，你可以以多种方式使用它们。
- en: Exercises
  id: totrans-299
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 练习
- en: 'Exercise 1 (Linear Regression) (Level: Easy)'
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 练习 1（线性回归）（难度：简单）
- en: Try using only one feature to predict radon activity and see how the results
    change.
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试仅使用一个特征来预测氡活动，并观察结果如何变化。
- en: 'Exercise 2 (Linear Regression) (Level: Medium)'
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 练习 2（线性回归）（难度：中等）
- en: Try to change the `learning_rate` parameter and then observe how the model’s
    convergence changes. Then try to reduce the `EPOCHS` parameter and observe when
    the model cannot reach convergence.
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试更改`learning_rate`参数，然后观察模型收敛性的变化。然后尝试减少`EPOCHS`参数，观察模型何时无法达到收敛。
- en: 'Exercise 3 (Linear Regression) (Level: Medium)'
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 练习 3（线性回归）（难度：中等）
- en: Try to see how a model’s results change based on the training dataset’s size
    (reduce it and use different sizes, comparing the results).
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试观察模型结果如何根据训练数据集的大小变化（减小它并使用不同的大小，比较结果）。
- en: 'Exercise 4 (Logistic Regression) (Level: Medium)'
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 练习 4（逻辑回归）（难度：中等）
- en: Try to change the `learning_rate` parameter and observe how the model’s convergence
    changes. Then try to reduce the `EPOCHS` parameter and observe when the model
    cannot reach convergence.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试更改`learning_rate`参数，观察模型收敛性的变化。然后尝试减少`EPOCHS`参数，观察模型何时无法达到收敛。
- en: 'Exercise 5 (Logistic Regression) (Level: Medium)'
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 练习 5（逻辑回归）（难度：中等）
- en: Try to see how a model’s results change based on the training dataset’s size
    (reduce it and use different sizes comparing the results).
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试观察模型结果如何根据训练数据集的大小变化（减小它并使用不同的大小，比较结果）。
- en: 'Exercise 6 (Logistic Regression) (Level: Difficult)'
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 练习 6（逻辑回归）（难度：困难）
- en: Try to add to labels to `Platelets` samples and generalize the binary classification
    model to a multiclass one (three possible classes).
  id: totrans-311
  prefs: []
