- en: This is a very commonly used function that gives only values between 0 and 1\.
    It is usually indicated with *σ*(*z*)
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个非常常用的函数，它只给出介于0和1之间的值。它通常用*σ*(*z*)表示
- en: '![$$ f(z)=\sigma (z)=\frac{1}{1+{e}^{-z}} $$](../images/463356_2_En_2_Chapter/463356_2_En_2_Chapter_TeX_Equj.png)'
  id: totrans-57
