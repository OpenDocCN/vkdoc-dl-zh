- en: The ReLU function
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: ReLU函数
- en: It is worth it to spend a few moments to see how to implement ReLU in a smart
    way in Python. Note that when you start using TensorFlow, it is implemented for
    you, but it’s still very instructive to see how different Python implementations
    can make a difference when implementing complex deep learning models.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 值得花几分钟时间看看如何在Python中以智能的方式实现ReLU。请注意，当你开始使用TensorFlow时，它已经为你实现了，但看到不同的Python实现如何在不同实现复杂深度学习模型时产生差异仍然是非常有教育意义的。
- en: 'In Python you can implement the ReLU function in several ways. Here are four
    different ways (try to understand why they work before going on):'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 在Python中，你可以用几种不同的方式实现ReLU函数。以下有四种不同的方法（在继续之前，尝试理解为什么它们可以工作）：
- en: '`np.maximum(x, 0, x)`'
  id: totrans-87
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`np.maximum(x, 0, x)`'
- en: '`np.maximum(x, 0)`'
  id: totrans-88
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`np.maximum(x, 0)`'
- en: '`x * (x > 0)`'
  id: totrans-89
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`x * (x > 0)`'
- en: '`(abs(x) + x) / 2`'
  id: totrans-90
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`(abs(x) + x) / 2`'
- en: 'The four methods have very different execution speeds. Let’s generate a NumPy
    array with 10⁸ elements:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 这四种方法具有非常不同的执行速度。让我们生成一个包含10⁸个元素的NumPy数组：
- en: '[PRE4]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Now we measure the time needed by the four different versions of the ReLU function
    when applied to it. Let the following code run
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们测量四个不同版本的ReLU函数在应用时的所需时间。让以下代码运行
- en: '[PRE5]'
  id: totrans-94
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: The results are
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 结果是
- en: '[PRE6]'
  id: totrans-96
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: The difference is stunning . Method 1 is four times faster than method 4\. The
    `numpy` library is highly optimized, with many routines written in C. But knowing
    how to code efficiently still makes a difference and can have a great impact.
    Why is `np.maximum(x, 0, x)` faster than `np.maximum(x, 0)`? The first version
    updates `x` in place, without creating a new array. This can save a lot of time,
    especially when the arrays are big. If you don’t want to (or can’t) update the
    input vector in place, you can still use the `np.maximum(x, 0) version.`
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 差异令人震惊。方法1比方法4快四倍。`numpy`库高度优化，其中许多例程是用C语言编写的。但知道如何高效编码仍然有区别，并且可以产生巨大影响。为什么`np.maximum(x,
    0, x)`比`np.maximum(x, 0)`更快？第一个版本在原地更新`x`，而不创建新的数组。这可以节省大量时间，尤其是在数组很大时。如果你不想（或不能）原地更新输入向量，你仍然可以使用`np.maximum(x,
    0)`版本。
- en: An implementation could look like this
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 一种可能的实现方式如下
- en: '[PRE7]'
  id: totrans-99
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Note
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Remember that, when optimizing your code, even small changes can make a huge
    difference. In deep learning programs, the same chunk of code is repeated millions
    and billions of times, so even a small improvement can have a huge impact in the
    long run. Spending time optimizing your code is a necessary step that will pay
    off.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，在优化你的代码时，即使是微小的变化也能产生巨大的影响。在深度学习程序中，相同的代码块会重复数百万甚至数十亿次，所以即使是小的改进在长期内也能产生巨大的影响。花时间优化你的代码是一个必要的步骤，这将带来回报。
