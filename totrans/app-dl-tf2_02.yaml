- en: Ramachandran , Zopf, and Le from Google Brain [4] recently studied a new activation
    function that shows great promise in the deep learning world; they named it Swish.
    It is defined as
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 来自Google Brain的Ramachandran、Zopf和Le最近研究了深度学习世界中具有巨大潜力的一个新激活函数；他们将其命名为Swish。它被定义为
