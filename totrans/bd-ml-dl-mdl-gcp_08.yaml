- en: Important Docker Commands
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this section, let’s review some important Docker commands.
  prefs: []
  type: TYPE_NORMAL
- en: Commands for Managing Images
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Table [45-2](#Tab2) contains commands for managing Docker images.
  prefs: []
  type: TYPE_NORMAL
- en: Table 45-2
  prefs: []
  type: TYPE_NORMAL
- en: Docker Commands for Managing Images
  prefs: []
  type: TYPE_NORMAL
- en: '| Command | Description |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| `docker images` | List all images on the machine. |'
  prefs: []
  type: TYPE_TB
