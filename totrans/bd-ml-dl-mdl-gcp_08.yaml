- en: Running a Docker Container
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Let’s break down the following command for running a Docker container:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: where
  prefs: []
  type: TYPE_NORMAL
- en: '`-d` runs the container in detached mode. This mode runs the container in the
    background.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`-it` runs in interactive mode, with a terminal session attached.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`--rm` removes the container when it exits.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`--name` specifies a name for the container.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`-p` does port forwarding from host to the container (i.e., host:container)
    .'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Kubernetes
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When a microservice application is deployed in production, it usually has many
    running containers that need to be allocated the right amount of resources in
    response to user demands. Also, there is a need to ensure that the containers
    are online, are running, and are communicating with one another. The need to efficiently
    manage and coordinate clusters of containerized applications gave rise to Kubernetes.
  prefs: []
  type: TYPE_NORMAL
- en: Kubernetes is a software system that addresses the concerns of deploying, scaling,
    and monitoring containers. Hence, it is called a container orchestrator. Examples
    of other container orchestrators in the wild are Docker Swarm, Mesos Marathon,
    and HashiCorp Nomad.
  prefs: []
  type: TYPE_NORMAL
- en: Kubernetes was built and released by Google as an open source software, which
    is now managed by the Cloud Native Computing Foundation (CNCF) . Google Cloud
    Platform offers a managed Kubernetes service called Google Kubernetes Engine (GKE).
    Amazon Elastic Container Service for Kubernetes (EKS) also provides a managed
    Kubernetes service.
  prefs: []
  type: TYPE_NORMAL
- en: Features of Kubernetes
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The following are some features of Kubernetes:'
  prefs: []
  type: TYPE_NORMAL
- en: '`Horizontal auto-scaling:` Dynamically scales containers based on resource
    demands'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`Self-healing:` Re-provisions failed nodes in response to health checks'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`Load balancing:` Efficiently distributes requests between containers in a
    pod'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`Rollbacks and updates:` Easily update or revert to a previous container deployment
    without causing application downtime'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`DNS service discovery:` Uses Domain Name System (DNS) to manage container
    groups as a Kubernetes service'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Components of Kubernetes
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The main components of the Kubernetes engine are
  prefs: []
  type: TYPE_NORMAL
- en: '`Master node(s):` Manages the Kubernetes cluster. There may be more than one
    master node in high availability mode for fault-tolerance purposes. In this case,
    only one is the master, and the others follow.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`Worker node(s):` Machine(s) that runs containerized applications that are
    scheduled as pod(s).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The illustration in Figure [45-6](#Fig6) provides an overview of the Kubernetes
    architecture.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_45_Chapter/463852_1_En_45_Fig6_HTML.jpg](../images/463852_1_En_45_Chapter/463852_1_En_45_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 45-6
  prefs: []
  type: TYPE_NORMAL
- en: High-level overview of Kubernetes components
  prefs: []
  type: TYPE_NORMAL
- en: Master Node(s)
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The master node consists of
  prefs: []
  type: TYPE_NORMAL
- en: '**etcd (distributed key-store):** It manages the Kubernetes cluster state.
    This distributed key-store can be a part of the master node or external to it.
    Nevertheless, all master nodes connect to it.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**api server:** It manages all administrative tasks. The `api server` receives
    commands from the user (`kubectl` cli, REST or GUI); these commands are executed
    and the new cluster state is stored in the distributed key-store.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**scheduler:** It schedules work to worker nodes by allocating pods. It is
    responsible for resource allocation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**controller:** It ensures that the desired state of the Kubernetes cluster
    is maintained. The desired state is what is contained in a JSON or YAML deployment
    file.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Worker Node(s)
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The worker node(s) consists of
  prefs: []
  type: TYPE_NORMAL
- en: '**kubelet:** The `kubelet` agent runs on each worker node. It connects the
    worker node to the `api server` on the master node and receives instructions from
    it. It ensures the pods on the node are healthy.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**kube-proxy:** It is the Kubernetes network proxy that runs on each worker
    node. It listens to the `api server` and forwards requests to the appropriate
    pod. It is important for load balancing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**pod(s):** It consists of one or more containers that share network and storage
    resources as well as container runtime instructions. Pods are the smallest deployable
    unit in Kubernetes.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Writing a Kubernetes Deployment File
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The Kubernetes deployment file defines the desired state for the various Kubernetes
    objects. Examples of Kubernetes objects are
  prefs: []
  type: TYPE_NORMAL
- en: '**Pods:** It is a collection of one or more containers.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**ReplicaSets:** It is part of the controller in the master node. It specifies
    the number of replicas of a pod that should be running at any given time. It ensures
    that the specified number of pods is maintained in the cluster.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Deployments:** It automatically creates `ReplicaSets`. It is also part of
    the `controller` in the master node. It ensures that the cluster’s current state
    matches the desired state.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Namespaces:** It partitions the cluster into sub-clusters to organize users
    into groups.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Service:** It is a logical group of pods with a policy to access them.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*ServiceTypes:* It specifies the type of service, for example, ClusterIP, NodePort,
    LoadBalancer, and ExternalName. As an example, LoadBalancer exposes the service
    externally using a cloud provider’s load balancer.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Other important tags in writing a Kubernetes deployment file
  prefs: []
  type: TYPE_NORMAL
- en: '**spec:** It describes the desired state of the cluster'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**metadata:** It contains information of the object'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**labels:** It is used to specify attributes of objects as key-value pairs'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**selector:** It is used to select a subset of objects based on their label
    values'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The deployment file is specified as a yaml file.
  prefs: []
  type: TYPE_NORMAL
- en: Deploying Kubernetes on Google Kubernetes Engine
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Google Kubernetes engine (GKE) provides a managed environment for deploying
    application containers. To create and deploy resources on GCP from the local shell,
    the Google command-line SDK gcloud will have to be installed and configured. If
    this is not the case on your machine, follow the instructions at [`https://cloud.google.com/sdk/gcloud/`](https://cloud.google.com/sdk/gcloud/)
    . Otherwise, a simpler option is to use the Google Cloud Shell which already has
    gcloud and kubectl (the Kubernetes command-line interface) installed.
  prefs: []
  type: TYPE_NORMAL
