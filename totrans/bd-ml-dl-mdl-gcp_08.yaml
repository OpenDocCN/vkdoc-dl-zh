- en: Table 45-3
  prefs: []
  type: TYPE_NORMAL
- en: Docker Commands for Managing Containers
  prefs: []
  type: TYPE_NORMAL
- en: '| Command | Description |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| `docker ps` | List all containers. Append `–a` to also list containers not
    running. |'
  prefs: []
  type: TYPE_TB
- en: '| `docker stop [CONTAINER_ID]` | Gracefully stop the container with `[CONTAINER_ID]`
    on the machine. |'
  prefs: []
  type: TYPE_TB
- en: '| `docker kill CONTAINER_ID]` | Forcefully stop the container with `[CONTAINER_ID]`
    on the machine. |'
  prefs: []
  type: TYPE_TB
- en: '| `docker rm [CONTAINER_ID]` | Remove the container with `[CONTAINER_ID`] from
    the machine. |'
  prefs: []
  type: TYPE_TB
- en: '| `docker rm $(docker ps -a -q)` | Remove all containers from the machine.
    |'
