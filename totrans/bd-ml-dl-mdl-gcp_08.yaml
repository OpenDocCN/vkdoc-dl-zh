- en: Part VIIIProductionalizing Machine Learning Solutions on GCP
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 45. Containers and Google Kubernetes Engine
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The microservice architecture is an approach for developing and deploying enterprise
    cloud-native software applications that involve separating the core business capabilities
    of the application into decoupled components. Each business capability represents
    some functionality that the application provides as services to the end user.
    The idea of microservices is in contrast to the monolithic architecture which
    involves building applications as a composite of its “individual” capabilities.
    See an illustration in Figure [45-1](#Fig1).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_45_Chapter/463852_1_En_45_Fig1_HTML.jpg](../images/463852_1_En_45_Chapter/463852_1_En_45_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 45-1
  prefs: []
  type: TYPE_NORMAL
- en: Microservice applications (right) vs. monolithic applications (left)
  prefs: []
  type: TYPE_NORMAL
- en: Microservices interact with each other using representational state transfer
    (REST) communications for stateless interoperability. By stateless, we mean that
    “the server does not store state about the client session.” These protocols can
    be HTTP request/response APIs or an asynchronous messaging queue. This flexibility
    allows the microservice to easily scale and respond to request even if another
    microservice fails.
  prefs: []
  type: TYPE_NORMAL
- en: '**Advantages of Microservices**'
  prefs: []
  type: TYPE_NORMAL
- en: Loosely coupled components make the application fault tolerant.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ability to scale out making each component highly available.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The modularity of components makes it easier to extend existing capabilities.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Challenges with Microservices**'
  prefs: []
  type: TYPE_NORMAL
- en: The software architecture increases in complexity.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Overhead in management and orchestration of microservices. We will, however,
    see in the next sessions how Docker and Kubernetes work to mitigate this challenge.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Docker
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Docker is a virtualization application that abstracts applications into isolated
    environments known as containers. The idea behind a container is to provide a
    unified platform that includes the software tools and dependencies for developing
    and deploying an application.
  prefs: []
  type: TYPE_NORMAL
- en: The traditional way of developing applications is where an application is designed
    and hosted on a single server. This is illustrated in Figure [45-2](#Fig2). This
    setup is prone to several problems including the famous “it works on my machine
    but not on yours”. Also in this architecture, apps are difficult to scale and
    to migrate resulting in huge costs and slow deployment.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_45_Chapter/463852_1_En_45_Fig2_HTML.jpg](../images/463852_1_En_45_Chapter/463852_1_En_45_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 45-2
  prefs: []
  type: TYPE_NORMAL
- en: Application running on a single server
  prefs: []
  type: TYPE_NORMAL
- en: Virtual Machines vs. Containers
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Virtual machines (VMs), illustrated in Figure [45-3](#Fig3), emulate the capabilities
    of a physical machine making it possible to install and run operating systems
    by using a hypervisor. The hypervisor is a piece of software on the physical machine
    (the host) that makes it possible to carry out virtualization where multiple guest
    machines are managed by the host machine.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_45_Chapter/463852_1_En_45_Fig3_HTML.jpg](../images/463852_1_En_45_Chapter/463852_1_En_45_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 45-3
  prefs: []
  type: TYPE_NORMAL
- en: Virtual machines
  prefs: []
  type: TYPE_NORMAL
- en: Containers on the other hand isolate the environment for hosting an application
    with its own libraries and software dependencies; however, as opposed to a VM,
    containers on a machine all share the same operating system kernel. Docker is
    an example of a container. This is illustrated in Figure [45-4](#Fig4).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_45_Chapter/463852_1_En_45_Fig4_HTML.jpg](../images/463852_1_En_45_Chapter/463852_1_En_45_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 45-4
  prefs: []
  type: TYPE_NORMAL
- en: Containers
  prefs: []
  type: TYPE_NORMAL
- en: Working with Docker
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Google Cloud Shell comes pre-configured with Docker.
  prefs: []
  type: TYPE_NORMAL
- en: Key concepts to note are
  prefs: []
  type: TYPE_NORMAL
- en: 'Dockerfile: A Dockerfile is a text file that specifies how an image will be
    created.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Docker images: Images are created by building a Dockerfile.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Docker containers: Docker containers are the running instance of an image.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The diagram in Figure [45-5](#Fig5) highlights the process to build an image
    and run a Docker container.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_45_Chapter/463852_1_En_45_Fig5_HTML.jpg](../images/463852_1_En_45_Chapter/463852_1_En_45_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 45-5
  prefs: []
  type: TYPE_NORMAL
- en: Steps to deploying a Docker container
  prefs: []
  type: TYPE_NORMAL
- en: Table [45-1](#Tab1) shows key commands when creating a Dockerfile.
  prefs: []
  type: TYPE_NORMAL
- en: Table 45-1
  prefs: []
  type: TYPE_NORMAL
- en: Commands for Creating Dockerfiles
  prefs: []
  type: TYPE_NORMAL
- en: '| Command | Description |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| **FROM** | The base Docker image for the Dockerfile. |'
  prefs: []
  type: TYPE_TB
- en: '| **LABEL** | Key-value pair for specifying image metadata. |'
  prefs: []
  type: TYPE_TB
- en: '| **RUN** | It executes commands on top of the current image as new layers.
    |'
  prefs: []
  type: TYPE_TB
- en: '| **COPY** | Copies files from the local machine to the container file system.
    |'
  prefs: []
  type: TYPE_TB
- en: '| **EXPOSE** | Exposes runtime ports for the Docker container. |'
  prefs: []
  type: TYPE_TB
- en: '| **CMD** | Specifies the command to execute when running the container. This
    command is overridden if another command is specified at runtime. |'
  prefs: []
  type: TYPE_TB
- en: '| **ENTRYPOINT** | Specifies the command to execute when running the container.
    Entrypoint commands are not overridden by a command specified at runtime. |'
  prefs: []
  type: TYPE_TB
- en: '| **WORKDIR** | Set working directory of the container. |'
  prefs: []
  type: TYPE_TB
- en: '| **VOLUME** | Mount a volume from the local machine file system to the Docker
    container. |'
  prefs: []
  type: TYPE_TB
- en: '| **ARG** | Set Environment variable as a key-value pair when building the
    image. |'
  prefs: []
  type: TYPE_TB
- en: '| **ENV** | Set Environment variable as a key-value pair that will be available
    in the container after building. |'
  prefs: []
  type: TYPE_TB
