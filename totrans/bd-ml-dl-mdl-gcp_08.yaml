- en: Note
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Always remember to clean up cloud resources when they are no longer needed.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter introduced the concepts of a microservice architecture and provided
    an overview of working with Docker containers for building applications in isolated
    environments/sandboxes. In the event that many of such containers are deployed
    in production, this chapter introduces Kubernetes as a container orchestrator
    for managing the concerns of deploying, scaling, and monitoring containers.
  prefs: []
  type: TYPE_NORMAL
- en: The next chapter will discuss on Kubeflow and Kubeflow Pipelines for deploying
    machine learning components into production on Kubernetes.
  prefs: []
  type: TYPE_NORMAL
- en: 46. Kubeflow and Kubeflow Pipelines
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Machine learning is often and rightly viewed as the use of mathematical algorithms
    to teach the computer to learn tasks that are computationally infeasible to program
    as a set of specified instructions. However, it turns out that these algorithms
    constitute only a small fraction of the overall learning pipeline from an engineering
    perspective. Building high-performant and dynamic learning models includes a number
    of other critical components. These components actually dominate the space of
    concerns for delivering an end-to-end machine learning product.
  prefs: []
  type: TYPE_NORMAL
- en: A typical machine learning production pipeline looks like the illustration in
    Figure [46-1](#Fig1).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_46_Chapter/463852_1_En_46_Fig1_HTML.jpg](../images/463852_1_En_46_Chapter/463852_1_En_46_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 46-1
  prefs: []
  type: TYPE_NORMAL
- en: Machine learning production pipeline
  prefs: []
  type: TYPE_NORMAL
- en: From the preceding diagram, observe that the process flow in the pipeline is
    iterative. This repetitive pattern is central to machine learning experimentation,
    design, and deployment.
  prefs: []
  type: TYPE_NORMAL
- en: The Efficiency Challenge
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: It is easy to recognize that the pipeline requires a significant amount of development
    operations for the seamless transition from one component to another when building
    a learning model. This interoperability of parts has given rise to Machine Learning
    Ops, also known as MLOps. The term is coined as an amalgam of Machine Learning
    and DevOps.
  prefs: []
  type: TYPE_NORMAL
- en: The conventional way of doing machine learning is to perform all of the Experiment
    and development work in Jupyter notebooks, and the model is exported and sent
    off to the software development team for deployment and endpoint generation for
    integration into downstream software products, while the DevOps team handles the
    infrastructure and configuration of the machine for model development. This monolithic
    style of working results in a machine learning process that is not reusable, difficult
    to scale and maintain, and even tougher to audit and perform model improvement,
    and it is easily fraught with errors and unnecessary complexities.
  prefs: []
  type: TYPE_NORMAL
- en: However, by incorporating the microservice design pattern to machine learning
    development, we can address a host of these concerns and really streamline the
    productionalization process.
  prefs: []
  type: TYPE_NORMAL
- en: Kubeflow
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Kubeflow is a platform that is created to enhance and simplify the process of
    deploying machine learning workflows on Kubernetes. Using Kubeflow, it becomes
    easier to manage a distributed machine learning deployment by placing components
    in the deployment pipeline such as the training, serving, monitoring, and logging
    components into containers on the Kubernetes cluster.
  prefs: []
  type: TYPE_NORMAL
- en: The goal of Kubeflow is to abstract away the technicalities of managing a Kubernetes
    cluster so that a machine learning practitioner can quickly leverage the power
    of Kubernetes and the benefits of deploying products within a microservice framework.
    Kubeflow has its history as an internal Google framework for implementing machine
    learning pipelines on Kubernetes before being open sourced late 2017.
  prefs: []
  type: TYPE_NORMAL
- en: Table [46-1](#Tab1) is a sample of some of the components that run on Kubeflow.
