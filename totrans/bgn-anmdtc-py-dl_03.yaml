- en: Machine Learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Artificial intelligence (AI) and machine learning (ML) have become popular topics
    of discussion in business, academia, and the media in recent years. This is not
    without reason. Thanks to computing power and algorithmic developments, machine
    learning has really taken off and has permanently transformed society. You may
    not know it, but machine learning powers nearly every part of your day, including
    online content/product recommendations, voice assistants, Google Search, and even
    resource consumption forecasting (done by energy companies and cable companies,
    for example).
  prefs: []
  type: TYPE_NORMAL
- en: Most of these advancements come primarily from deep learning, a subfield of
    machine learning that focuses on the concept of the artificial neuron. We will
    cover deep learning in more detail in Chapter [5](483137_2_En_5_Chapter.xhtml).
    However, there are fundamental aspects of machine learning that apply both to
    traditional ML algorithms (that don’t rely on neural networks) and to deep learning
    models, which we will cover in this chapter. In this chapter, we will go over
    what machine learning is, what the machine learning workflow looks like, how you
    can evaluate machine learning models, and how you can tune them to perform more
    optimally.
  prefs: []
  type: TYPE_NORMAL
- en: Introduction to Machine Learning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In its simplest sense, **machine learning** is the process of teaching a model
    how to perform a task by providing it with data. Instead of explicitly coding
    the model to do the task, we program the mechanisms by which this model can learn,
    improve, and repeat the task so that by the end of training, the model is able
    to perform whatever task we want it to.
  prefs: []
  type: TYPE_NORMAL
- en: You can think of it as providing a child (who serves as a blank slate and as
    the model, knowing nothing about the topic) with a proper learning environment
    and materials and letting the child study only that topic for a few days. By the
    end, the child will hopefully have picked up how to perform whatever task was
    taught by the learning material.
  prefs: []
  type: TYPE_NORMAL
- en: In the context of machine learning, a **model** is an advanced function that
    takes the input data and maps it to a specific output. When a model is **learning**,
    it is adjusting its internal mechanisms to better perform the task on the data
    it is given. When we say a model performs well or not, we define some metrics
    to evaluate the output predictions of these machine learning models to understand
    how well they’re performing. For example, accuracy is a simple metric by which
    we can measure predictive performance.
  prefs: []
  type: TYPE_NORMAL
- en: The concept of machine learning is often confused with the concepts of artificial
    intelligence and deep learning, so let’s define the other two terms.
  prefs: []
  type: TYPE_NORMAL
- en: '**Artificial intelligence** is a vast field of computer science that is focused
    on solving high-level, complex tasks that usually only humans can perform. Artificial
    intelligence programs are typically systems composed of many components that all
    work together to help complete the various tasks, which can range from being a
    voice assistant like Siri, Alexa and Cortana, to a powerful general purpose AI
    like ChatGPT which can write code, create picture and more, to self-driving cars.
    Each of these systems relies on various machine learning model components to work.
    Self-driving cars require a vision model to detect objects from video feed and
    classify them as pedestrians, cars, road signs, etc., and require another machine
    learning model to be in charge of making decisions such as “How much should I
    steer by at this given moment?”'
  prefs: []
  type: TYPE_NORMAL
- en: '**Deep learning** is a subfield of machine learning. It inherits all the typical
    modeling workflow processes, but deep learning is strictly concerned with the
    concept of the artificial neuron, which is a generous abstraction of a biological
    neuron. Despite that, it has proven immensely successful as a learning model,
    and paired with the explosion in computational power in the past decade, deep
    learning models have become incredibly powerful and capable. Perhaps the pinnacle
    of deep learning as of this writing is OpenAI’s ChatGPT.'
  prefs: []
  type: TYPE_NORMAL
- en: Figure [3-1](#Fig1) depicts how the three fields are related to one another.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_3_Chapter/483137_2_En_3_Fig1_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration of three concentric circles. The circles are labeled Deep Learning,
    Machine Learning, and Artificial Intelligence from the innermost to the outermost.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-1
  prefs: []
  type: TYPE_NORMAL
- en: Relationship between artificial intelligence, machine learning, and deep learning
  prefs: []
  type: TYPE_NORMAL
- en: Note that all three of these fields overlap with data science, since modeling
    can be a part of data science as well. Note also that AI itself is partially overlapped
    by other, related fields, such as robotics, reinforcement learning (which itself
    is overlapped with robotics, ML, and DL), statistics, and so on. AI is truly an
    interdisciplinary field.
  prefs: []
  type: TYPE_NORMAL
- en: 'Back to the abstracted definition of machine learning, we know that we have
    a machine and that it is trying to learn something given data. So, what does this
    workflow typically look like? Whether you’re dealing with machine learning models
    or deep learning models, a modeling workflow involves the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Problem statement**: What is the task you are trying to solve?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data collection**: You first need the relevant data before you can teach
    the model anything.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data processing**: Processing the data and manually annotating (if necessary)
    to show the model what correct performance on the task looks like. This is where
    you clean the data, analyze it, and perform feature engineering.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data splitting**: Partitioning the dataset into training, testing, and validation
    components. The idea is to train on the training split, evaluate on the testing
    split, and make improvements using the validation split. We will go over this
    in more detail in the next section.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Model training**: Training the model on the training dataset. There are many
    intricacies involved in model training, especially if you use an iterative method
    and/or deep learning models.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Model evaluation**: Evaluating your model’s performance on testing data and
    examining any faults with the process so far. The blind performance (testing data
    is unseen by the model) can indicate a lot about the effectiveness of the model.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Model tuning**: Optimizing the performance by tuning certain high-level parameters
    that can affect the learning ability of the model.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This is more or less the typical workflow of a machine learning model, whether
    you’re using a traditional machine learning model or a deep learning model.
  prefs: []
  type: TYPE_NORMAL
- en: Speaking of deep learning and machine learning, if deep learning is so popular
    nowadays, why even bother with machine learning? That’s a fair question. To look
    at how machine learning performs against deep learning with respect to the amount
    of data, refer to Figure [3-2](#Fig2).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_3_Chapter/483137_2_En_3_Fig2_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph of performance versus the amount of data plots 2 curves for deep
    learning and traditional M L algorithms that start at the origin. The traditional
    M L algorithm curve initially rises and then becomes horizontal. The deep learning
    curve continues to slope upward.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-2
  prefs: []
  type: TYPE_NORMAL
- en: The performance of deep learning algorithms and traditional machine learning
    algorithms as the amount of data increases
  prefs: []
  type: TYPE_NORMAL
- en: Generally, with low data scales (up to the hundreds of thousands and to the
    very low millions), machine learning models might outperform deep learning models
    at the same tasks. However, it’s not a hard-and-fast rule, just a general possible
    trend. And as you can see, deep learning far eclipses machine learning models
    with large amounts of data. For a great reference as to what deep learning models
    on the upper end of that curve can look like, ChatGPT is by far the most advanced
    model (again, as of this writing), and it is a very large deep learning model
    with about 175 billion parameters that trained on dozens of terabytes of data.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are some caveats you must consider when deciding the most appropriate
    model for your task. The following factors may make traditional ML models more
    suitable for usage than deep learning models:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Small dataset**: Datasets ranging from thousands of records to up to the
    low millions can be worth trying traditional machine learning models on**.**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Computational power**: Deep learning models can be trained and operated on
    the CPU but are far quicker on specialized hardware like GPUs (graphics processing
    units) and TPUs (tensor processing units)**.** These resources can be expensive
    to run, since deep learning models train for many iterations and take time as
    the data and model complexity scale up.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Interpretability**: Neural networks are known to be “black-box” models whose
    inner workings are nearly impossible to decipher. On the other hand, traditional
    ML algorithms such as decision trees and regression algorithms can clearly show
    you why they made the predictions they did. In contrast, the neural network output
    can depend on millions of other neurons.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Gradient-boosted trees**: Models like XGBoost and other gradient-boosted
    trees are quite good on tabular data, able to train much faster and even outperform
    neural networks in some cases. They’ve become popular recently due to these factors,
    though when the data scale is really high, neural networks are still preferable.
    Depending on the machine, even up to the low millions of record might be able
    to be modeled by these algorithms.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Again, there isn’t a hard-and-fast rule for when to use ML over DL; you’ll just
    need to try out various solutions and find the ones that work best. What is more
    feasible over the other will depend on what compute power you have, how much data
    you have, how complex the task is, and so on. We will go over the basic framework
    of how you can do this later in the “Validation” section.
  prefs: []
  type: TYPE_NORMAL
- en: Data Splitting
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The data processing step of the modeling workflow is covered in Chapter [2](483137_2_En_2_Chapter.xhtml).
    Typically, you have some kind of collection of data relevant to your task. After
    the processing, analyzing, and feature engineering steps, it is ready to be used
    for training. However, before you immediately pass the data in, you want to split
    the overall dataset into **train**, **test**, and **validation** splits.
  prefs: []
  type: TYPE_NORMAL
- en: 'In practice, you might encounter the train and testing splits only, but the
    validation split is quite useful in a deep learning context. First, we will go
    over what each of these splits means:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Training split**: This should be the largest proportion of the overall dataset,
    and it is reserved purely for the model to train on.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Testing split**: This data should be completely separate from the training
    dataset, and the model must never train on this.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Validation split**: Acts similar to the test dataset, except it can be used
    in the training process to help perform a variety of optimization tasks. It should
    be sourced from the training split.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Figure [3-3](#Fig3) depicts how these splits are derived. The validation set
    is generated from the training split, to keep it completely separate from the
    testing split since the validation set is used in the training phase.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_3_Chapter/483137_2_En_3_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: An illustration has two bars with unequal partitions. The first bar is divided
    into Train and Test in 4 is to 1 ratio of the bar. The second bar is divided into
    3 unequal partitions Train, Val, and Test in 3 is to 1 is to 1 ratio of the bar.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-3
  prefs: []
  type: TYPE_NORMAL
- en: 'Two possible ways to partition your data: a train-testing split, or a train-val-testing
    split. When deriving the validation split, you should first compute the train-test
    partitions, then take the train partition, and split it again into train-val splits.
    This way, the validation split is derived from the training split and is separate
    from the test data. This ensures absolutely no leakage of information when developing
    your models'
  prefs: []
  type: TYPE_NORMAL
- en: Your **training** set will typically comprise of 60–80% of your entire data
    split. Exactly what percentage you allocate usually depends on whether you’re
    using a deep learning model or a traditional machine learning model. With deep
    learning models, you may benefit from higher training splits because deep learning
    models scale better with more data. This also helps to avoid overfitting, discussed
    later in this chapter.
  prefs: []
  type: TYPE_NORMAL
- en: The **testing** set will comprise anywhere from 10–20% of your data split. If
    your data count numbers are high, such as in the millions, you can get away with
    a lesser ratio reserved for test data, because the number of data samples in the
    test set will be high enough to adequately evaluate whether your model is performing
    the task about as well on brand-new data that it hasn’t seen.
  prefs: []
  type: TYPE_NORMAL
- en: The **validation** set is optional, but it is also around 10–20% of your data
    split. The validation set is a small subset (derived from an original training
    split) that is useful for quick experimentation and prototyping, and in the case
    of models with iterative training methods (like deep learning), they can indicate
    whether the model is actively overfitting or not. We will cover the validation
    set in more detail in the final section of this chapter.
  prefs: []
  type: TYPE_NORMAL
- en: As for how these sets are used overall, the validation set is extremely useful
    for quickly determining which models are even appropriate for the data task. This
    way, you can create a list of candidate models for the task, use a validation
    training strategy like K-Fold cross validation (which will be covered soon), and
    gather the evidence to determine which model you should go with. Be careful, though,
    because some models, like deep learning models, might just need more data to out-scale
    their competitor models in performance.
  prefs: []
  type: TYPE_NORMAL
- en: Once you have a core set of models you want to train on the training split,
    it is important to ensure that they never train on the validation set nor the
    test set while they are actively being trained on the training set. You want to
    keep the evaluation data separate so that you can get a fair assessment of the
    model’s performance on unseen data, which is an important goal of machine learning
    model training. This is what is known as **generalization**, which refers to the
    model’s ability to learn the task in such a way that it achieves high performance
    conducting the task on data it has never seen.
  prefs: []
  type: TYPE_NORMAL
- en: Modeling and Evaluation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'When it comes to machine learning modeling, there are several paradigms that
    dictate how you can train your model:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Supervised learning**: A model is given input data and corresponding correct
    outputs. Its goal is to learn as correct a mapping as possible from input to output.
    Models will try and match their predictions as closely as possible to the true
    outputs. Two overarching learning tasks fall under supervised learning:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Classification**: Labeling data as a specific category. For example, predicting
    if an image is of a cat or a dog. Many other tasks fall under classification,
    such as anomaly detection (normal vs. anomaly), multiple label classification
    (an image of a dog can be classified as a mammal and as a dog simultaneously),
    and more.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Regression**: Any real valued output prediction task, like housing price
    prediction, stock price forecasting, etc.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Unsupervised learning**: A model is given the input data and must learn structures
    and patterns within the data by itself. The following learning tasks fall under
    unsupervised learning:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Clustering**: Grouping data points together by some shared commonalities.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Representation learning/dimensionality reduction**: Learning to represent
    the same data in a smaller dimension while minimizing loss of information.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Semi**-**supervised learning**: Falls somewhere between supervised and unsupervised
    learning and can encompass many learning approaches. Typically it involves both
    a small bit of supervised learning and a small bit of unsupervised learning. Examples:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Teacher**-**student model**: Hand-label a small portion of data and train
    a teacher model in a supervised manner. Then, have the teacher model create a
    larger training set by making predictions on many new, unseen examples. These
    input-output pairs can be algorithmically refined to eliminate uncertain predictions,
    and this new dataset is used to train a student model.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Training on one class**: In the context of anomaly detection, where you may
    have many normal data points and few anomalous data points, you could train a
    model to recognize only normal data. When making predictions on new data (which
    can include anomalies), the model may have trouble making confident predictions
    on the anomalous data points. Because of this uncertainty, you can label those
    points as anomalies. We will explore this approach later with the One-Class SVM
    model.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: What approach you use depends on your problem statement and your data distribution.
    If you have lots of unlabeled examples and can only annotate a few, then a semi-supervised
    approach may be best. If you have plenty of data that is easily labeled, then
    a supervised approach usually works best. If you do not want to annotate the data
    and want to let the model itself try and create categories (via clustering), unsupervised
    approaches would be best.
  prefs: []
  type: TYPE_NORMAL
- en: Regardless of the paradigm you follow, you need a way to measure error. **Error**
    is a measure of how wrong the model’s predictions are. Error is also commonly
    referred to as the **loss** of a model. For **classification** tasks, a simple
    loss function would be the **cross-entropy loss/log loss** function, defined as
    such by Equation 3-1.
  prefs: []
  type: TYPE_NORMAL
- en: The value y[i] is the prediction of the model for data input x[i]. P(y[i]) represents
    the confidence probability with which the model predicts y[i]. You can plug in
    y[i] = 1 and then y[i] = 0 to see how the same equation works for both predictions
    of 1 and 0\. For a logistic regression model output, p(y[i]) will be a probability
    score from 0 to 1, where anything above 0.5 counts as a classification of 1 and
    otherwise it is 0\. When you’re plugging in values to compute the loss, y[i] =
    1 and p(y[i]) can be 0.65, or yi=0 and p(yi) can be 0.34.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Log\  Loss=-\frac{1}{N}\sum \limits_{i=1}^N{y}_i\ast \log \left(p\left({y}_i\right)\right)+\left(1-{y}_i\right)\ast
    \log \left(1-p\left({y}_i\right)\right) $$](../images/483137_2_En_3_Chapter/483137_2_En_3_Chapter_TeX_Equa.png)'
  prefs: []
  type: TYPE_IMG
- en: '***Equation 3-1.****The log loss function*'
  prefs: []
  type: TYPE_NORMAL
- en: This is a loss function that is applicable if you’re classifying only two labels,
    represented by a 0 or a 1.
  prefs: []
  type: TYPE_NORMAL
- en: For **regression** tasks, a simple loss function is the **mean-squared error
    (MSE)**, defined in Equation 3-2\. It is simply the average of all the deviations
    between predictions and actual values squared.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ MSE=\frac{1}{N}\sum \limits_{i=1}^N{\left({y}_i-\hat{y_i}\right)}^2 $$](../images/483137_2_En_3_Chapter/483137_2_En_3_Chapter_TeX_Equb.png)'
  prefs: []
  type: TYPE_IMG
- en: '***Equation 3-2.****The* *mean-squared error (MSE) loss*'
  prefs: []
  type: TYPE_NORMAL
- en: The objective for any learning task is to **minimize the loss**. In other words,
    the measured difference between the prediction and the true output must be as
    low as possible.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have covered the gist of loss functions, let’s move on to performance
    metrics. Performance metrics can be as simple as classification accuracy, where
    you count how many predictions matched and divide it by the total number of predictions.
    For regression tasks, mean-squared error is itself a metric. However, there are
    a multitude of ways to measure your model’s performance that go far beyond simple
    accuracy, especially for classification.
  prefs: []
  type: TYPE_NORMAL
- en: Classification Metrics
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: What’s wrong with accuracy? Well, in the case of imbalanced data, you can have
    99 normal points and 1 anomaly. If the anomaly detection model predicted all the
    normal points correctly but missed the anomaly, your accuracy is 99%. However,
    you failed to detect the anomaly, which is the entire purpose of an anomaly detection
    model, so in this sense, accuracy is extremely misleading. How can we do better?
  prefs: []
  type: TYPE_NORMAL
- en: This is where the **confusion matrix** comes into play, depicted in Figure [3-4](#Fig4).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_3_Chapter/483137_2_En_3_Fig4_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A confusion matrix of predicted versus actual. From the top left going clockwise,
    the values are true positive, false positive, true negative, and false negative.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-4
  prefs: []
  type: TYPE_NORMAL
- en: The confusion matrix. The vertical axis corresponds to the predictions of the
    model. The horizontal axis corresponds to the true labels. The matrix will be
    populated by frequency counts of each type of prediction
  prefs: []
  type: TYPE_NORMAL
- en: 'The four quadrants of the confusion matrix are defined as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '**True positive (TP)**: Predicted positive, and the true label is positive'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**False positive (FP)**: Predicted positive, but the true label is negative'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**True negative (TN)**: Predicted negative, and the true label is negative'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**False negative (FN)**: Predicted negative, but the true label is positive'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s set the context to be whether or not an animal in a zoo is diseased based
    on several markers in its blood sample. The model will take these markers as input
    features and make a prediction of either positive, meaning the animal has a disease,
    or negative, meaning the animal does not have a disease. With this context, let’s
    put the confusion matrix metrics into perspective.
  prefs: []
  type: TYPE_NORMAL
- en: A **true positive** is whenever the model’s prediction turns out to be correct.
    Here, if the model predicted the animal is sick, and it really is sick, it’s a
    true positive prediction. A **true negative** is when the model predicts the animal
    is not sick, and it really is not sick. As for a **false positive**, it’s when
    the model predicts the animal is sick, but it is not actually sick. Similarly,
    a **false negative** is when the model predicts the animal is not sick, yet it
    is actually sick.
  prefs: []
  type: TYPE_NORMAL
- en: 'In statistics, there are similar terms to false positive and false negative:
    **type I error** and **type II error**. These errors are used in hypothesis testing
    where there is a null hypothesis (which usually states that no relation exists
    between two observed phenomena) and an alternate hypothesis (which aims to disprove
    the null hypothesis, meaning a statistically significant relation exists between
    the two observations).'
  prefs: []
  type: TYPE_NORMAL
- en: A **type I error** is when the null hypothesis turns out to be true, but you
    mistakingly reject it in favor of the alternate hypothesis—in other words, a false
    positive, since you reject what turns out to be true to accept something that
    is false. A **type II error** is when the null hypothesis is accepted to be true
    (meaning you don’t reject the null hypothesis), but it turns out the null hypothesis
    is false, and that the alternate hypothesis is true. This is a false negative,
    since you accept what is false, but reject what is true.
  prefs: []
  type: TYPE_NORMAL
- en: 'From the confusion matrix metrics, we can derive the following additional metrics:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Precision**: The percentage of positive predictions made by the model that
    were correct. Also known as *positive predictive value*.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Recall**: Of all the truly positive instances in the dataset, this is the
    percentage the model got correct. Also known as *sensitivity* or *true positive
    rate*.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**F1-measure**: The harmonic mean of precision and recall. The higher the precision
    and recall both are, the higher the F1-measure will be.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**True negative rate**: Of all truly negative instances evaluated by the model,
    this is the percentage the model got correct. Also known as *specificity*.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Accuracy**: The number of correct predictions over all predictions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Figure [3-5](#Fig5) shows the confusion matrix with the formulas for calculating
    **precision**, **recall**, and **accuracy**.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_3_Chapter/483137_2_En_3_Fig5_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A confusion matrix. True positive and false positive point to Precision equals
    T P over T P plus F P. True positive and true negative point to Accuracy equals
    T P plus T N over T P plus F P plus T P plus T N. True positive and false negative
    point to Recall equals T P over T P plus F N.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-5
  prefs: []
  type: TYPE_NORMAL
- en: Confusion matrix with calculation formulas for precision, recall, and accuracy
    displayed
  prefs: []
  type: TYPE_NORMAL
- en: As for how to calculate the **F1-measure**, refer to Equation 3-3\. To achieve
    higher F1-measure scores means the model’s precision and recall must both be high,
    implying that the model makes correct positive predictions as well as correctly
    captures a high proportion of the truly positive data samples.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ F1\  Measure=\frac{2\ast Precision\ast Recall}{Precision+ Recall} $$](../images/483137_2_En_3_Chapter/483137_2_En_3_Chapter_TeX_Equc.png)'
  prefs: []
  type: TYPE_IMG
- en: '***Equation 3-3.****F1-measure equation*'
  prefs: []
  type: TYPE_NORMAL
- en: For how to calculate the **true negative rate (TNR)**, refer to Equation 3-4\.
    The TNR tells us how accurately the model predicts negative. It is similar to
    recall, except that of all the truly negative instances, it calculates the percentage
    of these negative instances correctly predicted to be negative.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ TNR=\frac{TN}{TN+ FP} $$](../images/483137_2_En_3_Chapter/483137_2_En_3_Chapter_TeX_Equd.png)'
  prefs: []
  type: TYPE_IMG
- en: '***Equation 3-4.****True negative rate equation*'
  prefs: []
  type: TYPE_NORMAL
- en: It is important to understand the tradeoff between precision and recall. Having
    one or the other can lead to some disastrous results. For example, it is possible
    for the model to have perfect precision, having perfect positive predictions.
    However, of all the positive instances, it maybe only got 15% of them right, giving
    it a recall of 0.15\. This is terrible—the model is confident in its predictions,
    but barely identified anything from the positive data population.
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, a model could identify everything correctly from the truly
    positive data population by marking everything as positive. Its recall would be
    perfect, but its precision would be awful, since of all the positive predictions,
    only a fraction are correct.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is why F1-Measure (synonymous with F1-Score) is a good metric: to have
    a high F1-score, it is necessary to have both high precision and high recall.
    Beyond the F1-score, we can derive further insights from the confusion matrix.'
  prefs: []
  type: TYPE_NORMAL
- en: Using scikit-learn, we can graph a receiver operating characteristic (ROC) curve,
    which plots the true positive rate (recall) against the false positive rate (1
    – true negative rate). Figure [3-6](#Fig6) shows an example of an ROC curve.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_3_Chapter/483137_2_En_3_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A line graph of true positive rate versus false positive rate. The line classifier,
    A U C equals 0.76, starts at (0, 0), fluctuates till (0.3, 0.8), stays constant
    till (0.6, 0.8), and then rises unevenly up to (0.9, 1.0) and then becomes constant
    till (1, 1). Values are approximate.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-6
  prefs: []
  type: TYPE_NORMAL
- en: Example of an ROC curve for a slightly weak classifier. AUC = 1 indicates a
    perfect classifier, but AUC = 0.76 indicates a weaker one with both increased
    false positives and not as many true positives predicted
  prefs: []
  type: TYPE_NORMAL
- en: We can find the area under the ROC curve to derive a metric known as the area
    under curve (AUC) score. The higher the AUC score, the better the model can distinguish
    between the two classes. Intuitively, this makes sense, since the graph itself
    is plotting the model’s positive prediction correctness against its false positive
    rate. The most ideal graph would have a TPR of 1.0 at an FPR of 0.0 and carry
    that 1.0 all the way across, looking like Figure [3-7](#Fig7).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_3_Chapter/483137_2_En_3_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A line graph of true positive rate versus false positive rate. The line classifier,
    A U C equals 1, starts at (0, 0), rises vertically until (0, 1), and goes horizontal
    until (1, 1). Values are approximate.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-7
  prefs: []
  type: TYPE_NORMAL
- en: An ROC curve with perfect AUC, meaning all predictions were correct. This means
    that for every FPR the TPR remained at 1.0
  prefs: []
  type: TYPE_NORMAL
- en: This AUC score is known as the ROC-AUC score, which is the more commonly referenced
    AUC score. A good AUC score to target is around 0.95 or better.
  prefs: []
  type: TYPE_NORMAL
- en: There is another curve known as the precision-recall (PR) curve. We can similarly
    find the area under this curve, which scikit-learn calls the average precision
    (AP) score. Similar to the ROC-AUC score, an AP score of 1 indicates a perfect
    classifier that is able to perfectly distinguish between positive and negative
    classes.
  prefs: []
  type: TYPE_NORMAL
- en: The PR curve plots precision against recall, making it more friendly toward
    imbalanced datasets as it only concerns itself with the positive class. In anomaly
    detection, it is possible to have data heavily skewed toward the normal data,
    meaning the majority of your predictions would be true negatives. The PR curve
    deals with precision (correctness of model’s positive predictions) and recall
    (proportion of all positive instances correctly captured by the model), so it
    is easy to see why it is more informative when we are concerned with pure performance
    on anomaly detection.
  prefs: []
  type: TYPE_NORMAL
- en: However, the ROC curve, which is concerned with recall/TPR (proportion of all
    positive instances correctly captured by the model) and the false positive rate
    (proportion of all negative data incorrectly predicted as positive), is also useful,
    as it can give us a picture of the model’s performance on the overall data.
  prefs: []
  type: TYPE_NORMAL
- en: For our use cases, it is best to use both curves to get a solid picture of the
    model’s performance on both anomaly detection and overall predictive performance
    on normal and anomaly data both.
  prefs: []
  type: TYPE_NORMAL
- en: The code to graph these curves is very simple thanks to scikit-learn, as covered
    in later chapters in the context of analyzing machine learning model performances.
  prefs: []
  type: TYPE_NORMAL
- en: With that, you should have a good idea of classification metrics and how to
    evaluate them. Let’s now look at regression metrics.
  prefs: []
  type: TYPE_NORMAL
- en: Regression Metrics
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Regression is concerned with real-value outputs, not classes, so the loss functions
    we will deal with all compute some kind of deviation. Beyond simple mean-squared
    error (MSE), we have Mean Absolute Error (MAE), the average absolute value deviation
    from the prediction and true y-value, and Mean Absolute Percentage Error (MAPE),
    the average absolute percentage deviation of the prediction from the true y-value.
  prefs: []
  type: TYPE_NORMAL
- en: 'The question of which metric to use will depend on your modeling task as well
    as how the data distribution looks. On a high level:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Mean-squared error** penalizes larger deviations more than smaller ones because
    of the squared element. This is good for penalizing outlier predictions. The formula
    is shown in Equation 3-5.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![$$ MSE=\frac{1}{N}\sum \limits_{i=1}^N{\left({y}_i-\hat{y_i}\right)}^2 $$](../images/483137_2_En_3_Chapter/483137_2_En_3_Chapter_TeX_Eque.png)'
  prefs: []
  type: TYPE_IMG
- en: '***Equation 3-5.****The MSE equation, measuring the average squared deviance
    of prediction and true value*'
  prefs: []
  type: TYPE_NORMAL
- en: '**Mean absolute error** penalizes all the values much more equally. Larger
    deviations won’t incur as high an error as they would with MSE. This is more useful
    when prioritizing the bulk of the predictions over outliers. The formula is displayed
    in Equation 3-6.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![$$ MAE=\frac{1}{N}\sum \limits_{i=1}^N\left|{y}_i-\hat{y_i}\right| $$](../images/483137_2_En_3_Chapter/483137_2_En_3_Chapter_TeX_Equf.png)'
  prefs: []
  type: TYPE_IMG
- en: '***Equation 3-6.****The* *MAE equation**, measuring the average magnitude of
    deviance of prediction and true value*'
  prefs: []
  type: TYPE_NORMAL
- en: '**Mean absolute percentage error** measures percentage deviations of the prediction
    from the true value. This is a potentially more useful metric if the data being
    modeled fluctuates a lot (like stock prices) or varies in scale a lot. The errors
    are also on the percentage scale and aren’t measuring direct deviances, so they
    will not blow up the loss function if a deviation is large in magnitude. This
    is why it is potentially more stable if the data scale varies quite a bit. The
    formula is displayed in Equation 3-7.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![$$ MAPE=\frac{1}{N}\sum \limits_{i=1}^N\left|\frac{y_i-\hat{y_i}}{y_i}\right|
    $$](../images/483137_2_En_3_Chapter/483137_2_En_3_Chapter_TeX_Equg.png)'
  prefs: []
  type: TYPE_IMG
- en: '***Equation 3-7.****The* *MAPE equation**, measuring the magnitude of percentage
    error from the true value of the predicted value*'
  prefs: []
  type: TYPE_NORMAL
- en: Now that you know more about proper metrics for the various tasks you will be
    performing later in this book, let’s talk about the difference in performance
    of models on the training set and on blind, new data.
  prefs: []
  type: TYPE_NORMAL
- en: Overfitting and Bias-Variance Tradeoff
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: With the aforementioned performance metrics, we can now measure training, validation,
    and test loss. Ideally, your training and testing performance will be in the same
    neighborhood or match. If they don’t differ, and your performance is good, then
    the model has learned the task properly and is generalizing well. However, you
    might often see that the test error will be markedly worse than the training error.
    To better formulate this situation, let’s go over what the **bias-variance tradeoff**
    is.
  prefs: []
  type: TYPE_NORMAL
- en: First, what is bias? In simple terms, **bias** is a measure of how much the
    model’s average prediction differs from the true value. If the model has not properly
    learned the task on a training set, it will have high loss, and thus high bias.
    If the model has learned the task very well, then its bias will be low.
  prefs: []
  type: TYPE_NORMAL
- en: In statistical terms, bias is the measure of the difference between the expected
    value of an estimator and the parameter it is trying to estimate. An estimator
    is some kind of function that seeks to approximate a specific parameter. Back
    to our machine learning sense, a model can fill the role of an estimator.
  prefs: []
  type: TYPE_NORMAL
- en: As for the formula of bias, refer to Equation 3-8\. It measures the expected
    value of an estimator and its difference from the population parameter being estimated.
    If the bias amounts to zero, then the estimator ![$$ \hat{\theta} $$](../images/483137_2_En_3_Chapter/483137_2_En_3_Chapter_TeX_IEq1.png)
    is an unbiased estimator of *θ*.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Bias\left[\hat{\theta}\right]=E\left[\hat{\theta}\right]-\theta $$](../images/483137_2_En_3_Chapter/483137_2_En_3_Chapter_TeX_Equh.png)'
  prefs: []
  type: TYPE_IMG
- en: '***Equation 3-8.****The formula for* *bias*'
  prefs: []
  type: TYPE_NORMAL
- en: Take, for example, a Gaussian/normal distribution of student heights at a university.
    The population parameters of this distribution are given by mu and sigma. However,
    say we want to estimate *μ* using ![$$ \hat{\mu} $$](../images/483137_2_En_3_Chapter/483137_2_En_3_Chapter_TeX_IEq2.png).
    If we define ![$$ \hat{\mu} $$](../images/483137_2_En_3_Chapter/483137_2_En_3_Chapter_TeX_IEq3.png)
    to be the mean formula, then it turns out that ![$$ \hat{\mu} $$](../images/483137_2_En_3_Chapter/483137_2_En_3_Chapter_TeX_IEq4.png)is
    an unbiased estimator of *μ*, because if we plug in the values respectively into
    the bias equation, the ending bias becomes zero. When we say an estimator is **unbiased**,
    its bias is zero.
  prefs: []
  type: TYPE_NORMAL
- en: Similarly, a **biased** estimator has a nonzero bias. In practice, your machine
    learning models will likely all be biased, because a perfect model does not exist
    in a practical setting.
  prefs: []
  type: TYPE_NORMAL
- en: '**Variance** is simply the variance formula in statistics but applied to the
    model’s predictions. As a refresher, variance is defined as in Equation 3-9.'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Var\left[\hat{\theta}\right]=E\left[{\left(\hat{\theta}-E\left[\hat{\theta}\right]\right)}^2\right]
    $$](../images/483137_2_En_3_Chapter/483137_2_En_3_Chapter_TeX_Equi.png)'
  prefs: []
  type: TYPE_IMG
- en: '***Equation 3-9.****The variance formula for an estimator* ![$$ \hat{\theta}
    $$](../images/483137_2_En_3_Chapter/483137_2_En_3_Chapter_TeX_IEq5.png)'
  prefs: []
  type: TYPE_NORMAL
- en: If the bias is zero, then the result of Equation 3-9 should exactly equal the
    mean-squared error. So, what is variance measuring here? The variance measure
    the average spread of the predictions from its mean. If the data is relatively
    noise-free (the data points do not fluctuate very far from the average prediction),
    then the variance itself will be lower. But if the individual predictions deviate
    a bit from the mean of the predictions, then the variance will be higher. Higher
    variance is not good because the added noisiness of the predictions can lead to
    higher loss.
  prefs: []
  type: TYPE_NORMAL
- en: To view high bias vs. low and high variance, refer to Figure [3-8](#Fig8). The
    context is archery and target practice.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_3_Chapter/483137_2_En_3_Fig8_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration of high bias versus low and high variances. In low variance,
    the targets are concentrated in the upper left part. In high variance, the targets
    are scattered around the upper right part.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-8
  prefs: []
  type: TYPE_NORMAL
- en: High bias, low variance, and high variance are visually represented by target
    practice, a good example to illustrate how bias and variance relate to each other
  prefs: []
  type: TYPE_NORMAL
- en: Referring to Figure [3-8](#Fig8), high bias is apparent in how all the shots
    landed away from the center. With low variance, the shots landed very close to
    each other. In a mathematical sense, the shots did not deviate much from the center
    of all the shots. In contrast, with high variance, the shots are much more spread
    out. It’s still high bias because the center of those shots is quite far from
    the center of the target board. It’s now high variance because the average deviation
    from the center of the shots is much higher.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [3-9](#Fig9) shows what low bias looks like in both a low and high variance
    setting.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_3_Chapter/483137_2_En_3_Fig9_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration of low bias versus low and high variances. In low variance,
    the targets are concentrated at the center. In high variance, the targets are
    scattered around the center.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-9
  prefs: []
  type: TYPE_NORMAL
- en: Low bias, low variance, and high variance are visually represented by target
    practice
  prefs: []
  type: TYPE_NORMAL
- en: This time, we can see that the center of the distribution of shots is roughly
    aligned with the center of the target board. This means that there is low bias.
    Similar to before, low and high variance refer to how spread out the shots are
    on average. The best performance is attained by both low bias and low variance.
  prefs: []
  type: TYPE_NORMAL
- en: From a machine learning perspective, the population parameters are the true
    parameters of real-life populations that we do not actually know. This might be
    as simple as the true y-values corresponding to a set of x-values from the population.
  prefs: []
  type: TYPE_NORMAL
- en: 'The sample data we must train our models from simply comprises a tiny proportion
    of the entire population. And so, the problem becomes familiar: train on a small
    subset of the entire population and attempt to generalize correctly to the population
    by correctly predicting the unknown y-values.'
  prefs: []
  type: TYPE_NORMAL
- en: Since we do not know the entire population of y-values, it helps to evaluate
    on a test set, which is itself another sample of the overall population. However,
    because the distribution likely differs from the training set, it offers us a
    glimpse into how the model may perform on blind data. The larger our test set,
    the better we can evaluate the blind performance and generalization of the model.
  prefs: []
  type: TYPE_NORMAL
- en: 'With the terms bias and variance covered, let’s now relate them to the training
    and testing sets more directly:'
  prefs: []
  type: TYPE_NORMAL
- en: Bias refers to the error of the machine learning model on the training set.
    It is a measure of how well, on average, the machine learning model correctly
    predicts the y-values in the training set. Low bias implies low training error
    (and thus good fit), while high bias implies high training error (and thus a poor
    fit).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Variance refers to the error in predictions on test data. High variance means
    noisy and unstable predictions that will incur a high test loss, implying poor
    generalization. Low variance means stable and consistent predictions, leading
    to a lower test loss (provided the model is not too biased).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Put together, we get what is called a **bias-variance tradeoff**, where the
    objective is to minimize both the bias and the variance. Why is there a tradeoff,
    anyway? Well, it turns out that machine learning models tend to optimize on the
    training dataset so well that they end up **overfitting** on the training set.
    In other words, they learn the task so well on the training set that they end
    up learning to “memorize” the training data to maximize its performance. When
    evaluated on test data, the performance will differ quite a bit from what is seen
    on training data.
  prefs: []
  type: TYPE_NORMAL
- en: A similar example would be a student cramming and memorizing the problems from
    the homework, only to find out that the exam contains brand-new problems. The
    only way to have done well on the exam is to have a general understanding of the
    problems and how to solve them. So now, despite the student having 100% on the
    homework, they end up failing the exam because they did not properly learn the
    task.
  prefs: []
  type: TYPE_NORMAL
- en: '**Overfitting** is influenced by a few parameters:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Model complexity**: If the model is very complex, it tends to learn a very
    complicated function mapping of input-output data that may work well on the training
    data, but it harms its test data performance.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Training time**: If a model is allowed to keep training forever, it eventually
    adjusts its internal parameters to just suit the training data. This is more apparent
    in models that learn iteratively, like neural networks.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Insufficient training data**: If there are too few data samples to learn
    from, the model might not understand how to generalize properly. And so, even
    if it does well on the training data, its testing performance suffers.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Poor data processing**: If one of the features is large in magnitude or is
    too noisy, the model might tend to just fit to the noise or features that overwhelm
    others. (If one column has large-magnitude data, the loss will be really high.
    The quickest path to reduce loss is to cater only to this column, which is not
    the behavior the model should be learning.) And so, once the test data (with different
    noise distributions) is evaluated on, the model’s performance suffers.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Fortunately, there are many ways to avoid overfitting, including:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Loss penalty**: We can add penalties to the loss function to force the weights
    to be smaller, thus forcing the learning of more efficient mappings that are more
    robust to overfitting. This is called **regularization**.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Reduce complexity**: We can reduce the model complexity by having fewer learnable
    parameters in the model.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data processing**: This will ensure that the data is clean and that the model
    won’t learn poorly or be influenced by other factors in the data that will differ
    across training and test sets.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Hyperparameter tuning**: Tuning high-level parameters that dictate the model’s
    learning process can lead to good gains in its generalization capabilities.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Adding training data**: Sometimes, simply adding more training data can help
    a model learn how to generalize better.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'In contrast, **underfitting** occurs if a model has high bias on the training
    data. The following are factors for why a model may underfit:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Overly simple**: The model may not be complex enough to understand how to
    learn the task.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Not enough training**: The model may not have been trained long enough to
    have learned the task.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Poor data**: The data features may not have good predictive qualities. For
    example, what does the stock price have to do with the weather outlook? Additionally,
    the data may be far too noisy, which would prevent the model from learning because
    any signals from the data that may lead to learning the task are drowned out by
    the noise.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Harsh regularization**: If the regularization/loss penalty is too high, the
    model is penalized too harshly and cannot learn properly.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Regarding model complexity, we want to make sure the model has a sufficient
    quantity of parameters to be able to properly fit the data. Consider an example
    where we are trying to learn the true function y = 0.12x³ – 0.2x². We have sampled
    the x space and injected artificial noise to test how different complexities of
    the model will fit on this noisy data and to see if they can learn to approximate
    the true underlying function. To recreate this code, run the code shown in Figure
    [3-10](#Fig10).
