  prefs: []
  type: TYPE_NORMAL
- en: We have previously referred to generalization a few times. Once again, **generalization**
    of a model is when we see similar performance and errors across the training and
    testing datasets. So, how can we understand the generalization capability of the
    model by viewing its performance in terms of bias and variance?
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s look at the following scenarios and what they mean:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Low bias, low variance**: The ideal setting. The model performs well on training
    and testing data.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Low bias, high variance**: Overfitting. The model performs well on training
    data but not on testing data. Consider implementing strategies to reduce overfitting.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**High bias, low variance**: Underfitting. The model performs poorly on the
    training data, and somehow has low variance in its test data predictions. That
    means the model is really bad, like for example a model that predicts the same
    value no matter what the input is.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**High bias, high variance**: Underfitting. The model performs poorly on the
    training and testing data. A worst-case scenario of this is a model that predicts
    all random values.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Visually put together, observe the bias-variance tradeoff in Figure [3-14](#Fig14).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_3_Chapter/483137_2_En_3_Fig14_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A graph plots error versus model complexity. The error curve begins at the top
    then curves downward and then rises up. The curve bias squared starts below the
    error curve and then slopes downward. The variance curve begins near the origin
    and slopes upward.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-14
  prefs: []
  type: TYPE_NORMAL
- en: A graph depicting the Bias² , the variance, and the total error as model complexity
    increases. A similar curve exists for deep learning to find the optimal point
    to maximize generalization capability. The optimal complexity minimizes bias and
    variance both
  prefs: []
  type: TYPE_NORMAL
- en: As we saw earlier, the model complexity can vastly affect how well the model
    fits the data (bias), which can subsequently affect how it generalizes to new
    data (variance). Overall, this bias-variance tradeoff is likely the biggest component
    of machine learning model life cycles that you will struggle with, and it is this
    tradeoff that is critical to balance to produce good models.
  prefs: []
  type: TYPE_NORMAL
- en: Hyperparameter Tuning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Once you have a good-fitting model, you may seek to improve its performance.
    You can do this by adjusting the model’s **hyperparameters**, which are high-level
    parameters that control the modeling behavior of the model as well as its other
    internal mechanisms. Examples for deep learning may include adjusting the number
    of layers, adjusting the learning rate of the model (concepts we will cover in
    Chapter [5](483137_2_En_5_Chapter.xhtml)), and more. For machine learning models
    like linear regression or polynomial regression, they can include the model degree,
    as we saw earlier.
  prefs: []
  type: TYPE_NORMAL
- en: To find the optimal hyperparameters, you will have to just search through possible
    configurations of the hyperparameter and find what fits best. This can be done
    manually, which is very tedious, or through a script, which can take a lot of
    time and computational resources but can find good hyperparameter settings for
    you.
  prefs: []
  type: TYPE_NORMAL
- en: A process known as **grid search** can help you determine what hyperparameters
    you should pick. Grid search is an algorithmic framework that lets you iterate
    through a custom range of possible hyperparameter values, finish modeling and
    evaluating with that hyperparameter setting, and store the relevant metrics. By
    the end of the overall search, you can easily pull up the stored metrics per hyperparameter
    and find out where you should search next.
  prefs: []
  type: TYPE_NORMAL
- en: A good strategy is to first cast a wide net encompassing a larger range of hyperparameters,
    find the region of values that performs better, and conduct a narrower search.
    Figure [3-15](#Fig15) illustrates this wide-to-narrow approach on the polynomial
    regression example from earlier, assuming that degree = 8 is the most optimal
    fit.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_3_Chapter/483137_2_En_3_Fig15_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 3 illustrations. In grid search round 1, the best results are between M S E
    values 30 and 25\. In grid search round 2, the best results are between M S E
    values 15 and 25\. In grid search round 3, the best result is at an M S E value
    of 12\.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-15
  prefs: []
  type: TYPE_NORMAL
- en: Showing three rounds of grid search. The numbers in the blue box are specific
    hyperparameter settings that we searched over. The MSE values below the box are
    the corresponding obtained MSE loss values for using the parameter setting above
    it. As you can imagine, this is a computationally intensive process, which is
    why we need to be efficient about how we conduct grid search
  prefs: []
  type: TYPE_NORMAL
- en: With more complex models and many more combinations of hyperparameters (if you
    search multiple hyperparameter settings for different hyperparameters, you will
    have a cartesian product) to search over, this can blow up in complexity and computational
    intensity very easily. This is why it is important to be efficient about your
    search ranges.
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, you do not want to make the mistake of training on the entire training
    dataset again and again. Past certain ranges, you will be waiting forever to make
    progress. This is why the **validation set** exists—it allows for quicker hyperparameter
    tuning.
  prefs: []
  type: TYPE_NORMAL
- en: We will now go over some validation set strategies.
  prefs: []
  type: TYPE_NORMAL
- en: Validation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We have discussed the **validation set** a few times previously, but it is
    time to go over what you might use validation sets for:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Avoid overfitting**: In deep learning, we train neural networks on the training
    dataset many times over. This can easily lead to overfitting, so we need to know
    when to stop the training. The validation set in this setting acts as the test
    data. We can evaluate training loss and validation loss in fixed intervals during
    the training process, and when we detect that training loss is decreasing while
    validation loss is increasing (low bias, high variance), we can stop the training
    immediately.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Model picking**: We can use validation sets to thoroughly test and evaluate
    the performance of several models of differing architectures to find the most
    optimal one for this training task.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Hyperparameter tuning**: We can use the validation set during grid search
    to find optimal hyperparameter settings.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'So how can we go about doing any of this? There are a couple popular strategies
    we can employ:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Hold-out validation**: A validation set is derived from the training set
    and used for whatever purposes we need.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**K**-**fold cross-validation**: A more robust strategy where the entire dataset
    is partitioned into K separate bins. K rounds of training and evaluation are performed,
    and in each round of training, a unique bin serves as the evaluation dataset.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Hold-out validation** is a quick and simple strategy, but it is subject to
    randomness in the sense that a particular random split may result in validation
    data that is much easier to predict on than usual. It might not have the typical
    noise profile of the training data, for example. Most of the time, your situation
    may not be this drastic, but it is not a thoroughly experimentally sound strategy.'
  prefs: []
  type: TYPE_NORMAL
- en: '**K-fold cross-validation** is a very thorough and robust strategy because
    it takes your entire dataset and randomly partitions it into K different “folds”
    or bins. K rounds of training are performed, where each unique bin of the K total
    bins serves as the testing/evaluation split, while the rest of the bins are combined
    to form the training data. After one round, the next bin (which previously has
    not served as testing data) is chosen, and the process repeats.'
  prefs: []
  type: TYPE_NORMAL
- en: All-in-all, you will have repeated the training-testing process K times. As
    you can imagine, this is a computationally intensive strategy, but it is experimentally
    sound and will ensure that your validation results are accurate and not subject
    to influences by randomness. However, consider that if you combine this approach
    with grid search, you not only will wait a long time for the results to finish,
    but also will be spending a lot of time actively training the models. On large
    models that require specialized hardware to train on, you want to be conservative
    about how long your models are training.
  prefs: []
  type: TYPE_NORMAL
- en: That being said, it is possible to combine the two strategies. You can apply
    K-fold cross-validation on a specific random split of the full dataset for far
    more rapid prototyping. This random split will not encompass the entire dataset
    you are given, but you should make it sufficiently large.
  prefs: []
  type: TYPE_NORMAL
- en: Scikit-learn also provides easy functionality to implement K-fold cross-validation.
    Combined with the data science principles you learned in Chapter [2](483137_2_En_2_Chapter.xhtml),
    you can conduct various experiments, interpret the results, and make adjustments
    to your approach as needed, whether it is because of hyperparameter tuning, model
    selection, or anything else that requires comparisons between two different models.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The fundamentals of machine learning that you have learned in this chapter should
    aid you in understanding the intuition behind models in the rest of this book
    and beyond. They apply to traditional machine learning modeling approaches as
    well as to deep learning modeling approaches. In Chapter [4](483137_2_En_4_Chapter.xhtml),
    we will explore how to implement machine learning algorithms on datasets and perform
    anomaly detection.
  prefs: []
  type: TYPE_NORMAL
