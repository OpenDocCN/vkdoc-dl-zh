- en: 3. Introduction to Machine Learning
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This chapter introduces you to the basic principles of machine learning, including
    the machine learning workflow. These concepts will apply to nearly every modeling
    task you may come across, and they extend into deep learning modeling as well.
    This is a high-level theoretical introduction to machine learning, since the practical
    material and implementation of these machine learning principles will be covered
    in the subsequent chapters.
  prefs: []
  type: TYPE_NORMAL
- en: By the end of this chapter, you will understand the basic machine learning modeling
    workflow, what machine learning modeling is, how to evaluate and interpret model
    performances, and how to deal with getting the model to properly learn the task
    and perform just as well on brand-new data.
  prefs: []
  type: TYPE_NORMAL
- en: 'In a nutshell, this chapter covers the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: Introduction to machine learning
