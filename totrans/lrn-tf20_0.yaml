- en: Introduction
  prefs: []
  type: TYPE_NORMAL
- en: Google has been a pioneer in introducing groundbreaking technology and products.
    TensorFlow is no exception, when it comes to efficiency and scale, yet there have
    been some adoption challenges that have convinced Google’s TensorFlow team to
    implement changes to facilitate ease of use. Therefore, the idea of writing this
    book was simply to introduce to readers these important changes made by the TensorFlow
    core team. This book focuses on different aspects of TensorFlow, in terms of machine
    learning, and goes deeper into the internals of the recent changes in approach.
    This book is a good reference point for those who seek to migrate to TensorFlow
    to perform machine learning.
  prefs: []
  type: TYPE_NORMAL
- en: This book is divided into three sections. The first offers an introduction to
    data processing using TensorFlow 2.0\. The second section discusses using TensorFlow
    2.0 to build machine learning and deep learning models. It also includes neuro-linguistic
    programming (NLP) using TensorFlow 2.0\. The third section covers saving and deploying
    TensorFlow 2.0 models in production. This book also is useful for data analysts
    and data engineers, as it covers the steps of big data processing using TensorFlow
    2.0\. Readers who want to transition to the data science and machine learning
    fields will also find that this book provides a practical introduction that can
    lead to more complicated aspects later. The case studies and examples given in
    the book make it really easy to follow and understand the relevant fundamental
    concepts. Moreover, there are very few books available on TensorFlow 2.0, and
    this book will certainly increase the readers’ knowledge. The strength of this
    book lies in its simplicity and the applied machine learning to meaningful data
    sets.
  prefs: []
  type: TYPE_NORMAL
- en: We have tried our best to inject our entire experience and knowledge into this
    book and feel it is specifically relevant to what businesses are seeking to solve
    real challenges. We hope you gain some useful takeaways from it.
  prefs: []
  type: TYPE_NORMAL
- en: Acknowledgments
  prefs: []
  type: TYPE_NORMAL
- en: This is my third book with Apress, and a lot of thought went into writing it.
    The main objective was to introduce to the IT community the critical changes introduced
    in the new version of TensorFlow. I hope readers will find it useful, but first,
    I’d like to thank a few people who helped me along the journey. First, I must
    thank the most important person in my life, my beloved wife, Neha, who selflessly
    supported me throughout and sacrificed so much to ensure that I completed this
    book.
  prefs: []
  type: TYPE_NORMAL
- en: I must also thank my coauthor, Avinash Manure, who expended a great amount of
    effort to complete the project on time. In addition, my thanks to Celestin Suresh
    John, who believed in me and offered me this opportunity to write another book
    for Apress. Aditee Mirashi is one of the best editors in India. This is my third
    book with her, and it was quite exciting to collaborate again. She was, as usual,
    extremely supportive and always available to accommodate my requests. To James
    Markham, who had the patience to review every line of code and check the appropriateness
    of each example, thank you for your feedback and your encouragement. It really
    made a difference to me and the book. I also want to thank my mentors who have
    constantly encouraged me to chase my dreams. Thank you Sebastian Keupers, Dr.
    Vijay Agneeswaran, Sreenivas Venkatraman, Shoaib Ahmed, and Abhishek Kumar.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, I am infinitely grateful to my son, Ziaan, and my parents, for the
    endless love and support, irrespective of circumstances. You all make my world
    beautiful.
  prefs: []
  type: TYPE_NORMAL
- en: —Pramod Singh
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This is my first book, and a very special one indeed. As mentioned by Pramod,
    the objective of this book is to introduce readers to TensorFlow 2.0 and explain
    how this platform has evolved over the years to become one of the most popular
    and user-friendly source libraries for machine learning currently available. I
    would like to thank Pramod for having confidence in me and giving me the golden
    opportunity to coauthor this book. As this is my first book, Pramod has been guiding
    and helping me to complete it.
  prefs: []
  type: TYPE_NORMAL
- en: I would like to thank my wife, Jaya, who made sure I had the right environment
    at home to concentrate and complete this book on time. I would also like to thank
    the publishing team—Aditee Mirashi, Matthew Moodie, and James Markham—who have
    helped me immensely in ensuring that this book reaches the audience in its best
    state. I would also like to thank my mentors, who made sure I grew professionally
    and personally by always supporting me in my dreams and guiding me toward them.
    Thank you Tristan Bishop, Erling Amundson, Deepak Jain, Dr. Vijay Agneeswaran,
    and Abhishek Kumar for all the support that you have extended to me. Last but
    not least, I would like to acknowledge my parents, my friends, and colleagues,
    who have always been there in my tough times and motivated me to follow my dreams.
  prefs: []
  type: TYPE_NORMAL
- en: —Avinash Manure
  prefs:
