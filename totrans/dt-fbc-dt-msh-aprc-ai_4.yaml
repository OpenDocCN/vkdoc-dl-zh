- en: 18. In Summary and Onward
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Reaching the end of the book, it must have become obvious that both a Data Fabric
    architecture and Data Mesh solution are inevitably associated with applying AI,
    intelligent knowledge, and automation. Indeed, infusing AI is required to enable
    intelligent cataloging, to generate active metadata, to build semantic knowledge
    graphs, and to gain necessary and holistic insight to improve, optimize, and automate
    tasks and to enable self-service generation of data products that are ready for
    consumption. These capabilities are enabled via a knowledge catalog that stores
    active metadata and data product specifications as well.
  prefs: []
  type: TYPE_NORMAL
- en: While a Data Fabric is an architecture that facilitates the end-to-end integration
    of various data and AI pipelines across hybrid cloud environments through the
    use of intelligent and automated systems and applications, a Data Mesh should
    be seen as a solution, which is geared toward delivering data-as-a-product in
    an organizational federated approach. To understand the entanglement of these
    two concepts, we have presented the Data Mesh as a solution, which is underpinned
    and enabled by an AI-infused Data Fabric architecture.
  prefs: []
  type: TYPE_NORMAL
- en: A data product is based on semantically related raw data that is transformed
    into a meaningful business context and easily consumable by business users; it
    comes with data product ownership, defined SLAs, access methods, and policies
    and rules and is registered in the knowledge catalog using, for instance, a JSON
    format. Once data product specifications are stored in the knowledge catalog,
    the data products are searchable, discoverable, and ready for consumption by business
    users.
  prefs: []
  type: TYPE_NORMAL
- en: Data Fabric and Data Mesh Summarized
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'There are four distinct but nevertheless related entry points or use case scenarios,
    which could support a consumable and manageable Data Fabric journey. These entry
    points could be pursued individually or even in parallel, depending on business
    objectives and priorities:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Data and** **AI governance**: Automatically applies industry-specific regulatory
    policies and rules to your data and AI assets, to quickly establish an environment
    for highly automated and consistent AI governance and to automatically secure
    data across the enterprise.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Hybrid cloud data integration**: Creates a unified view of all enterprise
    data and AI assets, enabling consistency between operational applications. It
    furthermore consolidates and simplifies IT infrastructures to be deployed anywhere
    (on-premises or any cloud) and automates data operations to deliver trusted data
    to business users. It can also prevent delays and disruptions of mission-critical
    data through data resilience and easy data access, enabling data and AI assets
    to be easily consumable as data products.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Customer 360-degree insight**: Provides a comprehensive view of customers
    by integrating data across heterogeneous domains by spending more time on applying
    AI and analytics to business challenges vs. wasting time on hunting quality data
    that is not well understood. It breaks down data silos with an integrated view
    of data and supports relevant business outcomes at pace with competitive needs.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Trustworthy AI and MLOps**: Unlocks trustworthy, explainable AI starting
    with governed data access for data scientists. It furthermore enables automated
    MLOps infused with trust throughout the entire AI lifecycle and AI governance
    by introducing transparency and monitoring for each stage of the AI lifecycle.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The following list is a summary of the most essential Data Fabric and Data
    Mesh characteristics, which are all enabled through data and AI assets that are
    stored in the knowledge catalog. All of these characteristics have been elaborated
    on in this book. Some of these characteristics are interrelated with each other
    and subsequently treated in various chapters in this book; they have been discussed
    from different perspectives investigating different facets. This is especially
    true for metadata and data quality aspects:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Automated metadata enrichment**: Means infusing AI into the metadata enrichment
    process to discover non-obvious relationships, perform automatic data class assignments,
    generate semantic knowledge graphs, conduct data profiling and auto-correction
    of asset quality, etc.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Self-service information integration**: Data engineers and even business
    users need to perform information integration tasks, including data discovery,
    metadata enrichment, data exploration, preparation, and transformation, in a self-service
    manner and regardless of the complexity of source systems. We have also addressed
    this intelligent information integration.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Automated workload distribution**: AI-enabled automated workload distribution
    needs to be enabled and supported, considering underlying system capabilities,
    resource consumption and constraints, SLAs, and performance needs, such as related
    to data throughput and latency, query elapsed time, etc.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data product** (data-as-a-product, data marketplace): Clear ownership of
    data and AI assets, understanding semantically connected data, including discovery
    and access of data and AI assets, self-service consumption of data products without
    IT (or at least limited IT) involvement, SLAs, and enabling monetization of data
    and AI assets are key characteristics when producing and consuming data products.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Trustworthy and explainable AI**: Addressing emerging trustworthy AI regulations
    needs to be supported by automated detection and correction of model fairness
    (bias) and drift, explainability of AI models for business users, and measurement
    of key quality metrics.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Active metadata exploitation**: Business users should transparently leverage
    active metadata to gain pervasive and actionable insight regarding underlying
    data and AI assets, which includes search and discovery of assets, available access
    methods, asset ownership, enforced policies and rules, semantically connected
    assets, etc.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Leveraging the digital exhaust**: Information integration, workload distribution,
    data product build processes, and resource assignment should be improved over
    time by automatically activating the digital exhaust, that is, by optimizing resource
    allocation and data access methods for end-of-month integration tasks. Leveraging
    the digital exhaust means *learning* information integration and other tasks over
    time to improve, optimize, and simplify these tasks autonomously over time.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**AI governance**: Distributed, federated, and organizational data and AI governance
    should address the entire scope of data and AI assets. AI-infused governance should
    support auto-mapping to regulations, limiting human intervention, and thus accelerating
    and simplifying adherence to regulatory compliance. This is obviously related
    to trustworthy and explainable AI.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Where to Go from Here
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Looking at the dispersed systems and heterogeneous data landscape today on the
    one hand and the ever-increasing need for business agility and digitalization
    on the other results without a doubt in reimagining how to intelligently integrate
    and gain actionable insight from data. To build an intelligent fabric of data
    and AI enabling a mesh of data products that can easily be searched for and consumed
    by business users is the challenge enterprises are confronted with today.
  prefs: []
  type: TYPE_NORMAL
- en: In Chapter [17](537582_1_En_17_Chapter.xhtml), we have examined a few Data Fabric
    and Data Mesh trends that are prevalent in the research and academia community.
    Today’s focus may be on gaining more relevant and actionable insight by enriching
    metadata (generating active metadata), activating the digital exhaust, or discovering
    non-obvious and semantic relationships across data assets; tomorrow’s focus, however,
    will doubtless be to autonomously enhance Data Fabric and Data Mesh processes,
    which includes to auto-tune and auto-optimize and to auto-correct and auto-improve
    tasks, further reducing human intervention and thus improving business agility
    and time to value. This clearly affects how we need to look at DataOps, MLOps,
    ModelOps, and AIOps to intelligently entangle the operationalization of data and
    AI with addressing new business imperatives and circumstances.
  prefs: []
  type: TYPE_NORMAL
- en: Looking ahead, we should envision the Data Fabric architecture and Data Mesh
    solution to become more intelligent and autonomous over time, enabling business
    users and IT professionals to interact at an augmented level with increased efficiency
    and agility. As we further develop our passion for reinventing and improving capabilities,
    our hope is that this book may have given you useful ideas to get you started
    on your Data Fabric and Data Mesh journey.
  prefs: []
  type: TYPE_NORMAL
- en: Key Takeaways
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We conclude this chapter with a few key takeaways that are collectively derived
    from all previous chapters, summarized in Table [18-1](#Tab1).
  prefs: []
  type: TYPE_NORMAL
- en: Table 18-1
  prefs: []
  type: TYPE_NORMAL
- en: Key Takeaways
  prefs: []
  type: TYPE_NORMAL
- en: '| # | Key Takeaway | High-Level Description |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| 1 | Data Fabric and Data Mesh are inevitably associated with applying AI,
    intelligent knowledge, and automation. | Augmenting Data Fabric and Data Mesh
    capabilities by infusing AI enables us to do intelligent cataloging, generate
    active metadata, build semantic knowledge graphs, and gain necessary and holistic
    insight to improve, optimize, and – most importantly –automate Data Fabric and
    Data Mesh tasks. |'
  prefs: []
  type: TYPE_TB
- en: '| 2 | A Data Mesh solution is underpinned by a Data Fabric architecture. |
    A Data Mesh should be seen as a solution, which is geared toward delivering data-as-a-product
    (data marketplace) in an organizational federated approach; it is underpinned
    and enabled by an AI-infused Data Fabric architecture. |'
  prefs: []
  type: TYPE_TB
- en: '| 3 | A data product is a semantically related set of datasets and ready for
    business consumption. | A data product is based on semantically related raw data
    that is transformed into a meaningful business context and easily consumable by
    business users; it comes with data product ownership, defined SLAs, access methods,
    and policies and rules and is registered in the knowledge catalog. |'
  prefs: []
  type: TYPE_TB
- en: '| 4 | There are four key Data Fabric entry points. | The four key Data Fabric
    entry points are (a) data and AI governance, (b) hybrid cloud, (c) trustworthy
    AI and MLOps, and (d) 360-degree customer view. |'
  prefs: []
  type: TYPE_TB
- en: '| 5 | There are distinct drivers to implement a Data Fabric architecture and
    Data Mesh solution. | The key drivers for a Data Fabric architecture and Data
    Mesh solution are the need to locate data faster, to simplify access and consumption
    of data, to apply consistent data and AI governance, and to move the data engineer
    from being the perceived *owner* of the data to being the enabler for the data
    source owners. |'
  prefs: []
  type: TYPE_TB
- en: '| 6 | Trustworthy AI is an essential aspect of a Data Fabric. | Trustworthy
    AI means to detect AI model bias, to measure and ensure AI model fairness, to
    detect drift, to provide explainability, and to calculate model metrics that serve
    as input to enable trustworthy AI throughout the entire AI lifecycle, including
    AI operationalization. |'
  prefs: []
  type: TYPE_TB
- en: '| 7 | ML-infused entity matching is a key aspect of a Data Fabric. | Entity
    matching is a classification problem for labeled data and a clustering problem
    for unlabeled data. Many problems in the entity matching process can be solved
    by ML methods, where SVM, K-means, and decision trees are common algorithms. |'
  prefs: []
  type: TYPE_TB
- en: '| 8 | Data Fabric architecture implements DataOps, MLOps, ModelOps, and AIOps
    practices. | Data Fabric implements DataOps, MLOps, ModelOps, and AIOps practices
    via a unified enterprise data and AI architecture for consolidating dispersed
    data from a hybrid cloud environment through automated data discovery, intelligent
    information integration, and intelligent cataloging. |'
  prefs: []
  type: TYPE_TB
- en: '| 9 | Several intelligent information integration styles are needed. | Depending
    on use case requirements, Data Fabric needs to support multiple intelligent information
    integration styles, such as data federation and virtualization or microservices
    with REST APIs, SQL and NoSQL, streaming, messaging, etc. |'
  prefs: []
  type: TYPE_TB
- en: '| 10 | AI/ML needs to be leveraged to enable automated quality assessments.
    | Quality assessments in the context of a modern Data Fabric need to be infused
    with AI/ML and developed into intelligent automated quality management processes,
    including auto-correction of data quality issues. |'
  prefs: []
  type: TYPE_TB
- en: '| 11 | Hyper-automated Data and AI Fabric is largely subject to R&D. | The
    term *hyper-automation* refers to automating adjustments and optimization of Data
    and AI Fabric processes: auto-tune, self-correct, auto-implement improvements
    or changes to these processes – mainly via infusion of AI/ML. |'
  prefs: []
  type: TYPE_TB
