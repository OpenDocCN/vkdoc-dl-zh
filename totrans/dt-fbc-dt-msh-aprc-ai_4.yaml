- en: Part IVCurrent Offerings and Future Aspects
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 16. Sample Vendor Offerings
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: As we have mentioned in Chapter [2](537582_1_En_2_Chapter.xhtml), Gartner named
    Data Fabric as one of the top ten technology trends in data and analytics for
    2019 and 2021 and tipped it as one of the top ten emerging technology trends for
    2022\. Meanwhile, Forrester said that of the 25,000 reports the company published
    last year, reports on Data Fabric ranked in the top ten downloads for 2020.
  prefs: []
  type: TYPE_NORMAL
- en: As emerging technology trends, Data Fabric and Data Mesh have been in the spotlight
    since their inception. IBM, Amazon, and Microsoft, the world’s largest information
    technology companies; Denodo, the leader in data virtualization; Informatica,
    the established leader in data integration; and many other global top vendors
    like Snowflake, NetApp, and Talend have responded to Data Fabric and Data Mesh
    requirements and provided enterprise-ready solutions.
  prefs: []
  type: TYPE_NORMAL
- en: Let us look at some sample offerings from the major vendors, as well as their
    strengths and limitations.
  prefs: []
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The goal of Data Fabric^([1](#Fn1)) is to provide a flexible, seamless, and
    automated approach to data access, enabling self-service consumption of data at
    any time, and to keep data and AI trustworthy through proactive, intelligent,
    and sustainable data and AI governance. How does Data Fabric differentiate from
    other architectures as the best solution to deal with the diversity, complexity,
    and heterogeneity of data? It’s primarily due to three key features of the architecture
    design^([2](#Fn2)):'
  prefs: []
  type: TYPE_NORMAL
- en: '**Connecting data**, **not centralizing it**: One of the key principles of
    a Data Fabric architecture is the flexibility of data integration approaches,
    that is, the solution automatically chooses the best integration strategy, by
    either virtualizing, transforming, replicating, or providing direct access for
    users based on workload requirements and the policies of the enterprise, eliminating
    the need for users to manually build data pipelines and selecting compute storage
    solutions. What kind of data sources and data types are supported and in what
    way they are connected are all important decision factors in examining Data Fabric
    implementations.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Self-service****, not expert service**: A Data Fabric architecture and especially
    a Data Mesh solution are democratizing data and AI, allowing business users to
    easily discover and consume data and AI assets and enabling agile delivery of
    data products. In the existing centralized data provisioning model, data engineering
    teams have become the biggest bottleneck affecting the efficiency of data-driven
    decisions. Self-service data and AI consumption increases productivity of analysts
    and business users to meet exuberant data-driven requests. Self-service could
    be done through searching from the enterprise knowledge catalog to obtain connectivity
    information for data and AI assets, using it in conjunction with other tools,
    or directly accessing data assets using SQL, REST, etc.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Intelligent governance****, not manual operation**: Traditional data governance
    initiatives are driven by top-down governance mandates and often start after problems
    have occurred, which is an unsustainable and inappropriate approach to cope with
    the rapidly expanding data volume and domain complexity. Data Fabric and Data
    Mesh approaches, on the other hand, suggest that data and AI governance should
    be considered from the beginning and be infused with intelligence, building governance
    capabilities through an augmented knowledge base and integrating them into every
    stage of the data and AI lifecycle.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In summary, both concepts emphasize distributed data management with its core
    idea to deliver trusted data from all relevant data sources to all relevant data
    consumers in a flexible way by optimizing the discovery and access of heterogeneous
    data allowing data consumers to achieve agile data product delivery in self-service
    fashion. At the same time, infusing AI in all aspects enables semantic exploration,
    analysis, and usage recommendation of data and AI to make both approaches as automated
    as possible.
  prefs: []
  type: TYPE_NORMAL
- en: In addition to these core capabilities that are connecting data, self-service,
    and intelligent data and AI governance, the *deployment option* and the ability
    to *integrate with external services* are also criteria for selecting vendor offerings.
  prefs: []
  type: TYPE_NORMAL
- en: IBM Cloud Pak for Data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: IBM is recognized as a leader of enterprise Data Fabric^([3](#Fn3)) by the Forrester
    Wave Q2 2022\. IBM Cloud Pak for Data is IBM’s implementation for a Data Fabric
    architecture, implementing Data Mesh solutions. It simplifies the whole information
    supply chain from collecting and organizing to analyzing and infusing data and
    AI by dynamically and intelligently orchestrating governed data and AI across
    a distributed landscape to provide a common data foundation for data consumers.
    Let us take a closer look at how IBM Cloud Pak for Data delivers on the Data Fabric
    and Data Mesh promise.
  prefs: []
  type: TYPE_NORMAL
- en: With regard to connecting data, IBM Cloud Pak for Data provides a wealth of
    integration options. IBM Watson Query, a service available on IBM Cloud Pak for
    Data, uses a single distributed query engine across clouds, databases, data lakes,
    data warehouses, and streaming data without copying or moving data. In addition,
    IBM Db2 for z/OS Data Gate allows users to access current Db2 for z/OS data without
    accessing and consuming Db2 for z/OS resources.
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, IBM DataStage is an industry-leading ETL tool that helps users
    design and transform data. The choice of integration technology depends on policy,
    latency, and performance requirements. For example, data location regulations
    do not allow data generated in a particular country or region to be transferred
    abroad. Therefore, the available options include data virtualization or replication
    to data stores residing in the same country or region. IBM Cloud Pak for Data
    also supports extensive data sources^([4](#Fn4)) such as AWS S3, Cloud Object
    Storage, Db2, Snowflake, generic JDBC, and many more.
  prefs: []
  type: TYPE_NORMAL
- en: The data sources supported by each service may vary slightly, and new data sources
    are added with each new release, so please refer to IBM’s website for the latest
    list of support.
  prefs: []
  type: TYPE_NORMAL
- en: IBM Cloud Pak for Data provides the capabilities of self-service and intelligent
    governance through IBM Watson Knowledge Catalog, which is the knowledge core of
    Cloud Pak for Data. It has provided its full breadth of self-service discovery
    of data, data cataloging, data profiling, data quality management, and semantic
    search capabilities. Data stewards use IBM Watson Knowledge Catalog to curate
    metadata, define data policies for privacy, capture data lineage, and perform
    other tasks related to security and compliance. Once data assets are published
    in the knowledge catalog, business analysts and data scientists with corresponding
    authorization can find and consume these assets in self-service fashion.
  prefs: []
  type: TYPE_NORMAL
- en: Please see Figure [16-1](#Fig1) for details. Moreover, their activities will
    also be tracked per data asset in preparation for future audits.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_16_Chapter/537582_1_En_16_Fig1_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A screenshot represents a table providing the details of the name, owner, tags,
    business terms, asset type, and date added. A search box at the top highlights
    the search term account.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 16-1
  prefs: []
  type: TYPE_NORMAL
- en: Self-Service Capabilities with Cloud Pak for Data
  prefs: []
  type: TYPE_NORMAL
- en: Powered by the superior capabilities of the IBM Watson Knowledge Catalog, IBM
    Cloud Pak for Data automatically applies industry-specific regulations and rules
    to data assets to secure data access across the entire enterprise, as depicted
    in Figure [16-2](#Fig2).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_16_Chapter/537582_1_En_16_Fig2_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration represents the workflow in I B M cloud, cloud park for data
    as a service. It indicates the elements of data sources, ML and automation in
    the knowledge catalog, and the business-ready data foundation. It also indicates
    the role of data steward quality analyst, data governance team, and data citizens.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 16-2
  prefs: []
  type: TYPE_NORMAL
- en: Watson Knowledge Catalog
  prefs: []
  type: TYPE_NORMAL
- en: It instills intelligence in all aspects of data and AI governance. First, it
    automatically classifies, profiles, and analyzes the quality of data assets and
    assigns or recommends business terms and data categories with built-in semantic
    models. Second, when business analysts and data scientists access data assets,
    protection rules and policies are autonomously enforced to ensure the compliance
    with data privacy regulations and laws.
  prefs: []
  type: TYPE_NORMAL
- en: IBM Cloud Pak for Data has an on-premises software version that is built on
    the Red Hat OpenShift container platform and a fully managed version built on
    IBM Cloud. It offers a wide selection of IBM and third-party services spanning
    the entire data lifecycle, for example, EDB Postgres Enterprise with IBM and MongoDB
    Enterprise Advanced in data management and Palantir for infusing AI into decision-making.
  prefs: []
  type: TYPE_NORMAL
- en: Both the on-premises and public cloud versions are suitable for large enterprises
    to implement either an enterprise-wide Data Fabric architecture or organizational
    Data Mesh solutions that may be federated across organizations. It achieves full
    return on investment as more business units onboard the platform enabling the
    value of data and AI to be further realized.
  prefs: []
  type: TYPE_NORMAL
- en: Amazon Web Services
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Amazon Web Services (AWS) offers a wide variety of data services, which are
    like Lego building blocks that can be assembled to implement a Data Fabric architecture.
    Of all the services, AWS Glue is the heart of data integration, including data
    discovery, data catalog, data enrichment and ETL, etc., as depicted in Figure
    [16-3](#Fig3).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_16_Chapter/537582_1_En_16_Fig3_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A diagram represents the flow of the process, starting from the data sources
    to the A W S glue data catalog, followed by A W S glue studio and A W S glue E
    T L. It then goes through the A W S lake formation and data lakes and warehouses
    before reaching to the analytics.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 16-3
  prefs: []
  type: TYPE_NORMAL
- en: AWS Glue
  prefs: []
  type: TYPE_NORMAL
- en: Connecting data is being implemented by AWS Glue crawlers. They scan data from
    different data sources; retrieve metadata for structured data and unstructured
    data, such as instance schema, location, etc.; and store this information in a
    centralized repository called AWS Glue Data Catalog. The supported sources^([5](#Fn5))
    include data lakes in S3, data warehouses in Amazon Redshift, and other databases
    that are part of the [Amazon Relational Database Service](https://www.techtarget.com/searchaws/definition/Amazon-Relational-Database-Service-RDS)
    . Crawlers not only connect to data but run classifiers to infer the schema, format,
    and data types of your data. Once the data is cataloged, it is immediately available
    for search and query. AWS doesn’t have a virtualization solution, but Glue Elastic
    Views (in preview) uses SQL to provide a materialized view across many databases
    and data stores. It supports Amazon DynamoDB, Amazon Redshift, Amazon S3, and
    Amazon OpenSearch Service. In addition, AWS Data Migration Service allows customers
    to handle data capture for ongoing replication or changes.
  prefs: []
  type: TYPE_NORMAL
- en: AWS provides not just self-service by searching in AWS Glue Data Catalog, but
    direct SQL service via AWS Athena,^([6](#Fn6)) which is an interactive query interface
    for data analysts to run analytics queries on various data sources. The query
    engine behind is Presto,^([7](#Fn7)) which is an open source distributed query
    engine optimized for low-latency analysis over big data. A special feature worth
    mentioning is that Athena allows running federated queries to access multiple
    data types in multiple data sources without moving data. The supported data types
    by Athena include CSV, JSON, Apache Parquet, etc. Moreover, Athena and Glue have
    seamless integration of all data sources that Glue crawlers support and other
    JDBC-compatible databases.
  prefs: []
  type: TYPE_NORMAL
- en: AWS Lake Formation is yet another service that can be used to compose a Data
    Fabric. It implements a very important aspect – governance. With AWS Lake Formation,
    users can define fine-grained permissions at database, table, and column levels
    for a data lake. Lake Formation centrally manages security policies and enforces
    them across analysis services, eliminating the need for individual configuration
    of access controls for each service. It automatically filters data and displays
    only the data allowed by the defined policy to authorized users, without replicating
    it. Lake Formation has built-in ML models for entity resolutions^([8](#Fn8)) to
    link records from disparate data sources or remove duplicates from the same data
    source, increasing overall data quality.
  prefs: []
  type: TYPE_NORMAL
- en: Many AWS services are serverless services that can be easily scaled out. They
    are also optimized for S3 but not integrated with other third-party databases
    or S3\. This section only covers a few selected AWS core services in the Data
    Fabric context. AWS offers flexibility but also requires users to have advanced
    technical skills on AWS. A steep learning curve is to be expected. Finally, AWS
    does not have an on-premises version. All services are only available on AWS.
    If you already have built your application with AWS and data in S3, AWS is a great
    choice for building a Data Fabric.
  prefs: []
  type: TYPE_NORMAL
- en: Microsoft Azure
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Microsoft provides a unified experience and seamless integration across multiple
    services on Microsoft Azure, where customers can easily purchase new services
    as needed and get an integrated and consistent user experience. Microsoft has
    also developed several services for building a Data Fabric. Let us have a deeper
    look at these services.
  prefs: []
  type: TYPE_NORMAL
- en: For connecting data, Microsoft Purview is a unified data governance service
    that helps manage and govern users’ on-premises, multicloud, and SaaS data. Most
    Azure data sources^([9](#Fn9)) are supported through Microsoft Purview Data Map,
    including databases such as Amazon RDS, Db2, Oracle, MongoDB, Amazon S3, etc.
    In addition to that, Microsoft provides integration services via the Microsoft
    Azure Data Factory. It provides a no-code platform to construct ETL and orchestrate
    pipelines.
  prefs: []
  type: TYPE_NORMAL
- en: Microsoft also provides a data virtualization preview for Azure SQL Managed
    Instance, which currently only supports querying external files stored in Azure
    Data Lake Storage or Azure Blob Storage. Regarding a replicate data solution,
    Azure relies on the change data capture solution on the source, for example, based
    on Microsoft Azure SQL databases and SAP.
  prefs: []
  type: TYPE_NORMAL
- en: Coming to self-service, Microsoft Azure Synapse Analytics provides SQL service
    as well. Synapse Analytics, as depicted in Figure [16-4](#Fig4), is powered by
    the Data Factory^([10](#Fn10)) and supports a variety of data lakes, repositories,
    NoSQL, files, common protocols, and other services. It also has a common ODBC
    connector to extend the support for even more databases. With Microsoft Azure
    Synapse Analytics, users gain insights across DWH and big data platforms with
    a unified user experience. It transparently brings together the best technologies
    from multiple domains, such as the best SQL technologies for enterprise data warehouse,
    Spark technologies for big data, data explorer for logging and time series analysis,
    and pipelines for data integration and ETL/ELT. It also has deep integration with
    other Microsoft Azure services such as Power BI, CosmosDB, and AzureML.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_16_Chapter/537582_1_En_16_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: An illustration represents the data from different sources entering into the
    Azure synapse analytics. The analytics is categorized into Azure purview, Azure
    machine learning, and power B I.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 16-4
  prefs: []
  type: TYPE_NORMAL
- en: Azure Synapse
  prefs: []
  type: TYPE_NORMAL
- en: The core service of Microsoft’s Data Fabric approach is Purview, as depicted
    in Figure [16-5](#Fig5). It orchestrates with a few Microsoft Azure services to
    provide Data Fabric capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_16_Chapter/537582_1_En_16_Fig5_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration of the interface of Microsoft purview governance portal that
    receives the input from on-premises, cloud, and SaaS applications and interacts
    with the Azure synapse analytics, S Q L server, power B I, Azure S Q L, and Microsoft
    365.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 16-5
  prefs: []
  type: TYPE_NORMAL
- en: Microsoft Purview
  prefs: []
  type: TYPE_NORMAL
- en: First, Data Map automatical1ly keeps the data catalog up to date with built-in
    automated scanning and classification systems. Second, Purview Data Catalog enables
    business and technical users to quickly and easily find relevant data using multiple
    dimensions, such as glossary terms, classifications, sensitivity labels, and more.
    Third, Microsoft Purview Data Sharing enables organizations to securely share
    data both within the organization or across organizations with business partners
    and customers. Lastly, Microsoft Purview Data Lifecycle Management (formerly Microsoft
    Information Governance) provides users tools to retain the content they need to
    keep and archive or remove the content that is obsolete. Regarding governance,
    Data Policy (currently in preview) can enforce policies through Microsoft Purview
    to the data sources that have registered for the policies. When the new policy
    is published, it will enforce the underlying data sources asynchronously.
  prefs: []
  type: TYPE_NORMAL
- en: A key differentiator of Microsoft Azure is its Microsoft Purview Data Estate
    Insights, which provides a C-suite, a complete view of their data estate with
    actionable insights to bridge the gaps discovered by the governance process. Microsoft
    Purview and Azure Synapse are services on Microsoft Azure. As of today, Microsoft
    doesn’t have an on-premises version. In terms of functionality, Microsoft just
    gets started in some areas, like virtualization, but the user experience and integration
    are phenomenal. Even across so many services, Microsoft still manages to deliver
    a consistent and quality user experience.
  prefs: []
  type: TYPE_NORMAL
- en: Denodo
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Denodo is a niche vendor specialized in data virtualization, offering rich capabilities
    to build a logical Data Fabric focusing on data virtualization. It comprises a
    common semantic layer for provisioning data more quickly to the business, a dynamic
    data catalog for enterprise-wide data governance, and an industry-leading query
    engine powered by ML.
  prefs: []
  type: TYPE_NORMAL
- en: For connecting data, Denodo supports a variety of data sources,^([11](#Fn11))
    including most databases on the market, data lakes with SQL interfaces, or allowing
    connections with generic JDBC. It also supports direct connections to Db2 for
    z/OS. Moreover, it runs queries directly on Salesforce with Salesforce wrappers
    and JSON data sources via connection services like ServiceNow and on CSV, Avro,
    Map files, sequence files stored in HDFS, and AWS S3 with Distributed File System
    Custom Wrapper. Denodo is specialized for virtualizing data, so it doesn’t provide
    solutions for replication and transformation.
  prefs: []
  type: TYPE_NORMAL
- en: The Denodo platform provides comprehensive metadata and data discovery capabilities,
    including data governance, data lineage, change impact analysis, etc. The virtualization
    technology enables organizations to create unified data access and centralized
    governance policies across heterogeneous systems of structured and unstructured
    data sources.
  prefs: []
  type: TYPE_NORMAL
- en: Denodo has a self-service business glossary and information catalog that allow
    users to add their own business terms and find assets on users’ needs. In addition,
    Denodo’s data catalog uses AI/ML technology and provides interactive discovery
    features, collaboration capabilities, and personalized recommendations. Denodo
    also provides security and governance capabilities, including advanced data masking
    and attribute-based access control (ABAC), available for all data assets in the
    catalog, via a single point of control and administration.
  prefs: []
  type: TYPE_NORMAL
- en: Notably, Denodo’s core technology is its data virtualization, as depicted in
    the middle of Figure [16-6](#Fig6), and built-in query acceleration features,
    such as aggregation awareness, flexible caching options, and query optimization.
    It has superior support for active metadata, which is captured from the source
    of static connections and dynamic data processing, such as statistics of data
    access and queries, latency of requests, etc. These metadata can be further used
    to optimize the Data Fabric.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_16_Chapter/537582_1_En_16_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: An illustration exhibits the elements in the layers of consumers, logical data
    fabric, and sources from top to bottom. The sources comprise more than 150 adapters,
    the logical data fabric comprises the role of data virtualization, while the consumer's
    layer contains data catalog, S Q L, and data as a service.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 16-6
  prefs: []
  type: TYPE_NORMAL
- en: Denodo
  prefs: []
  type: TYPE_NORMAL
- en: Denodo has both an on-premises version and cloud services available on AWS,
    Microsoft Azure, and Google Cloud. It has more than 150 data adapters, supporting
    a broad spectrum of data sources. Denodo does not have a BI/AI solution, and customers
    need to integrate with other third-party solutions.
  prefs: []
  type: TYPE_NORMAL
- en: Informatica
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Informatica is one of the leading providers in the Data Fabric market, ranking
    as the leader in data integration, data quality, and MDM in Gartner’s Magic Quadrant.
    Please, see Figure [16-7](#Fig7) for Informatica’s architecture.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_16_Chapter/537582_1_En_16_Fig7_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration represents the flow of data from the sources to the consumers
    through 5 points. It indicates the data ingestion, data integration, data quality,
    data lake, Informatica master data management, data fabric semantic layer, data
    preparation, and data marketplace from bottom to top.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 16-7
  prefs: []
  type: TYPE_NORMAL
- en: Informatica
  prefs: []
  type: TYPE_NORMAL
- en: In terms of connecting *data*, Informatica Data Ingestion and Data Integration
    products and services support replication, ELT, and change data capture for many
    data sources^([12](#Fn12)) to enable customers to build a data lake or DWH solution
    across different cloud providers. It supports not only most relational databases,
    data lakes, and file storage solutions but also messaging and social media. It
    currently supports HBase for NoSQL databases.
  prefs: []
  type: TYPE_NORMAL
- en: Both data integration and data quality products by Informatica provide low-code
    or no-code experience for citizen data teams. Data engineers can easily drag and
    drop on the canvas to define data integration and data analysis jobs. Data curators
    can perform various types of operations through the GUI such as cleaning data,
    creating dictionaries, parsing, and labeling data, creating rule specifications
    and verifiers. It also supports automatic dictionary generation from data analysis
    results. The newly generated dictionary can be used in later parsers, taggers,
    rules, or verifiers.
  prefs: []
  type: TYPE_NORMAL
- en: Informatica supports the use of AI/ML technologies to automatically capture
    and enhance metadata from disparate data sources and create a knowledge graph
    to establish connections between technical and business contexts. Its catalog
    provides a browsable and hierarchical view for users to easily find data assets
    with extended knowledge, such as data lineage, profiling results, tribal knowledge,
    etc. Informatica also provides powerful governance features. The augmented knowledge
    graph, which is established by linking technical data and business terms, enables
    the enforcement of business-relevant policies. Users can easily find which policies
    are related to a particular data asset.
  prefs: []
  type: TYPE_NORMAL
- en: Informatica supports both on-premises and cloud deployments partnering with
    AWS, Google Cloud, Microsoft Azure, Oracle, and Snowflake. The on-premises version
    remains a standalone installation-based product, and it does not offer data warehouse,
    data lakes, and BI or AI solutions, so users still need to integrate other vendor
    offerings providing these capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: Key Takeaways
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We conclude this chapter with a few key takeaways as summarized in Table [16-1](#Tab1).
  prefs: []
  type: TYPE_NORMAL
- en: Table 16-1
  prefs: []
  type: TYPE_NORMAL
- en: Key Takeaways
  prefs: []
  type: TYPE_NORMAL
- en: '| # | Key Takeaway | High-Level Description |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| 1 | IBM Cloud Pak for Data | • A wealth of integration options: direct access,
    transformation, virtualization, and replication.• Comprehensive self-service and
    governance capabilities: data discovery, intelligent cataloging, data profiling,
    data quality, and semantic search and recommendation.• Supports both on-prem deployment
    on a Red Hat OpenShift cluster and SaaS on IBM Cloud.• Can be used for Data Fabric
    architecture and Data Mesh solutions. |'
  prefs: []
  type: TYPE_TB
- en: '| 2 | AWS | • Optimized for RDS and S3, requiring customization for other third-party
    data sources.• Crawlers scan data and retrieve metadata from different data sources.•
    No on-premises version.• Lego style, assembly required, steep learning curve.
    |'
  prefs: []
  type: TYPE_TB
- en: '| 3 | Microsoft | • Unified user experience across multiple products, easy
    for self-serve.• Provides a completed view of their data estate and actionable
    insights to C-suites.• Gets started in virtualization areas.• No on-premises version.
    |'
  prefs: []
  type: TYPE_TB
- en: '| 4 | Denodo | • Logic Data Fabric limited to data virtualization.• Specialized
    on virtualizing data, not moving or replicating data.• Supports both on-premises
    and SaaS. |'
  prefs: []
  type: TYPE_TB
- en: '| 5 | Informatica | • Supports most popular data sources with ETL, change data
    capture, or replication.• No-code platform for data integration and data quality
    management.• No data warhouse, no data lake solution, no AI and BI tool. Needs
    integration with other vendor offerings.• Supports both on-premises and SaaS.
    |'
  prefs: []
  type: TYPE_TB
- en: References
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Gartner, Gupta, A., *Data Fabric Architecture Is Key to Modernizing Data Management
    and Integration*, 2021, [`www.gartner.com/smarterwithgartner/data-fabric-architecture-is-key-to-modernizing-data-management-and-integration`](http://www.gartner.com/smarterwithgartner/data-fabric-architecture-is-key-to-modernizing-data-management-and-integration)
    (accessed August 24, 2022).
  prefs:
  - PREF_OL
