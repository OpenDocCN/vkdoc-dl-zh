- en: 17. Data Fabric and Data Mesh Research Areas
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Imagine a hyper-automated Data Fabric or Data Mesh that is self-acting, self-improving,
    and self-optimizing, meaning that it can operationalize intelligence and AI insight
    in real time without human intervention or significantly reducing human-driven
    data and AI management tasks. Such a modern Data Fabric architecture or Data Mesh
    solution is not only infused with AI to gain more relevant insight, discover assets,
    or activate the digital exhaust; it is action-oriented and capable to auto-tune
    and auto-correct operations of both concepts. Applying this to AI governance,
    imagine a new international law or regulation, which affects your company in terms
    of establishing new or adjusting existing data-related processes, for example,
    guaranteeing bias-free AI models. A modern Data Fabric or Data Mesh should be
    able to apply ontology-based semantic searches to identify relevant data and AI
    assets that are affected by the law or regulation and autonomously infuse these
    assets to be processed by the trustworthy AI component^([1](#Fn1)) of your Data
    Fabric architecture.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter we examine trends and directions and research areas, which are
    based on many concepts that we have elaborated on in this book, such as active
    metadata, semantic knowledge graphs, activating the digital exhaust, intelligent
    information integration, etc.
  prefs: []
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: It must have become obvious in this book that there is no unified Data Fabric
    architecture, which serves all purposes, use cases, and business scenarios. There
    is, for instance, a Data Fabric architecture that is specifically geared toward
    building a Data Mesh solution. However, there is also a *Data and AI Fabric*,^([2](#Fn2))
    which addresses a broader set of assets than just data. Furthermore, a *Communication
    Fabric* may specifically address the needs of an omni-channel digital experience
    in the financial service sector, or an *Edge Fabric* is geared toward the needs
    for mobile- and 5G-based scenarios. Each of these Data Fabric architectures may
    require specific functions and features.
  prefs: []
  type: TYPE_NORMAL
- en: However, in this chapter, we take a holistic view and introduce trends and directions
    to augment a generic Data Fabric architecture by further infusing mainly AI techniques,
    for example, ontology-based semantic search, semantic knowledge graphs, etc. In
    addition, we elaborate on an AI-infused automated AI governance scenario, taking
    trustworthy AI as an example.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, we introduce the concept of a hyper-automated Data and AI Fabric or
    Mesh that autonomously improves processes itself, limiting human intervention
    to approve, adjust, or also reject proposed actions.
  prefs: []
  type: TYPE_NORMAL
- en: AI-Based Augmented Insight
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As we have seen throughout this book, the modern Data Fabric or Data Mesh DNA
    is distinctly driven by AI, which constitutes indeed a paradigm shift in how metadata
    management, entity matching, information integration, information governance,
    semantic search, semantic knowledge graphs, etc. are seen today. In this section,
    we present a few research areas that are highly relevant for both approaches.
  prefs: []
  type: TYPE_NORMAL
- en: Generating a semantic knowledge graph is already a challenge by itself, especially
    if the graph is interspersed with business data and ontologies. However, exploiting
    and interpreting a semantic knowledge graph and transforming its inherent knowledge
    into automated recommendations and actionable insight represents another challenge.
    Both areas are dealt with in the research.^([3](#Fn3)) For instance, trustworthy
    and explainable AI is addressed by applying ML and related interpretation algorithms,
    as we have seen in Chapter [5](537582_1_En_5_Chapter.xhtml). Applying semantically
    enriched knowledge graphs improves the insight and explainability of AI.^([4](#Fn4))
    ML-based trustworthy AI approaches are limited by explaining and interpreting
    the influence of features for the predictive outcome or calculating the confusion
    matrix, which by itself limits the type of ML models that can be evaluated.
  prefs: []
  type: TYPE_NORMAL
- en: The attentive reader has certainly noticed that model fairness, drift detection,
    and the quality metrics discussed in the “Trustworthy AI” section of Chapter [5](537582_1_En_5_Chapter.xhtml)
    were limited to multiclass classification and regression problems. However, exploiting
    semantic knowledge graphs can support interpretability and explainability of nearly
    all AI model types by discovering and depicting semantic and non-obvious relationships
    or depicting an ML or DL model in a simplified and more readable, explainable
    way.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let us add a short note regarding terminology: we refer to the term *interpretation
    algorithms* in the context of model fairness, drift detection, etc. as dealt with
    in Chapter [5](537582_1_En_5_Chapter.xhtml), whereas *interpretability* is geared
    toward the explainability of the model itself and its inferred outcome, for example,
    its predictive outcome.'
  prefs: []
  type: TYPE_NORMAL
- en: A particularly hard problem to tackle is the trustworthiness and explainability
    of DL models, which relates to the semantics of the input, output, and middle
    layers of the Artificial Neural Network (ANN) or Deep Neural Network (DNN), the
    entanglement of the ANN or DNN nodes and their weights in the middle layer(s),
    and the continuous adjustments and learning that the ANN or DNN is subject to,
    which contributes to the black-box perception of DL models. Developing interpretation
    algorithms or self-interpretable models, where trustworthiness is an intrinsic
    capability of the model itself, is a subject in the research.^([5](#Fn5)) Semantic
    knowledge graphs^([6](#Fn6)) are particularly well suited to improve understanding,
    interpretability, and explainability of the DL model outcome and decision-making
    process. Current Data Fabric or Data Mesh approaches have not yet embraced these
    aspects. Applying ontology-based semantic knowledge graphs to AI tasks in general
    – going above and beyond trustworthy and explainable AI – is a key area in the
    research.^([7](#Fn7))
  prefs: []
  type: TYPE_NORMAL
- en: In Chapter [7](537582_1_En_7_Chapter.xhtml), we have discussed semantic enrichment
    and a few enhancements that are broadening the scope of standard SQL, such as
    AutoSQL, confidence-based query matching, and semantic SQL, which are all key
    Data Fabric and Data Mesh capabilities. We have furthermore suggested domain-
    or industry-specific taxonomies or ontologies to serve as input to the semantic
    enrichment engine. This leads us to the topic of ontology-based semantic search,
    which is another key Data Mesh`–`related topic that is dealt with in the research.
    SPARQL (Simple Protocol and RDF Query Language) is a well-established RDF (Resource
    Description Framework) semantic query language for databases, able to retrieve
    and manipulate data stored in the RDF format. RDF is a method to represent information
    as triples, where a set of triples defines a knowledge graph.^([8](#Fn8)) OWL
    (Ontology Web Language) is a knowledge representation and ontology language that
    can be used to describe RDF data. The RDF, OWL, and SPARQL^([9](#Fn9)) standards
    have already a long history in ontology-based semantic search.
  prefs: []
  type: TYPE_NORMAL
- en: In the context of a Data Fabric and Data Mesh, however, a key challenge in applying
    ontology-based semantic search is the heterogeneity of the data format and structure
    used in the knowledge catalog, particularly as it relates to the digital exhaust
    metadata and the varied AI artefacts (e.g., AI models, pipelines, ETL stages,
    etc.), which may not be represented in RDF format. Furthermore, using OWL to represent
    existing industry-specific ontologies and making them searchable for semantic
    enrichment via SPARQL may still be a relatively straightforward process. Nevertheless,
    domain-specific ontologies that relate to specific processes, for example, intelligent
    information integration and activating the digital exhaust, may first have to
    be developed using OWL. In addition, the relevant metadata, digital exhaust, and
    other input data for the Data Mesh semantic enrichment engine need to be transformed
    into the RDF format to make them accessible via SPARQL. Specific interfaces and
    tooling need to be developed to guide users through this process as well. Alternative
    approaches, partly based on open source initiatives, are currently investigated,^([10](#Fn10))
    for example, Apache Jena,^([11](#Fn11)) an open source Java framework for building
    semantic web and linked data applications.
  prefs: []
  type: TYPE_NORMAL
- en: Most of the current research in semantic knowledge graphs and ontology-based
    semantic search applies to the semantic enrichment tasks, such as generating active
    metadata, activating the digital exhaust, and searching for relevant data and
    AI assets in a self-service fashion within the context of a specific business
    or industry domain.
  prefs: []
  type: TYPE_NORMAL
- en: AI-Infused Automated AI Governance
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As we have seen in Chapter [15](537582_1_En_15_Chapter.xhtml), AI governance
    and ethics^([12](#Fn12)) have become a reality that enterprises need to embrace.
    Indeed, existing regulations published by the European Commission and the US Department
    of State^([13](#Fn13)) have already addressed trustworthy AI.
  prefs: []
  type: TYPE_NORMAL
- en: However, implementing AI governance with its many facets, like trustworthy and
    explainable AI and ethics, and addressing the AI lifecycle end to end – specifically
    as it relates to AIDevOps – still represents quite a challenge, especially with
    the claim to automate the implementation of AI governance as far as possible,
    for instance, by infusing AI into relevant processes.
  prefs: []
  type: TYPE_NORMAL
- en: The ever-increasing need of understanding these regulations and above all transforming
    and implementing the imperatives into the existing Data Fabric architecture or
    Data Mesh solution to guarantee compliance is often nontrivial.
  prefs: []
  type: TYPE_NORMAL
- en: AI-infused automated AI governance capabilities, as depicted in Figure [17-1](#Fig1),
    should support interpretation, transformation, and implementation of these regulations
    – at least as far as possible. With all the Data Fabric vendor offerings and their
    functions and features as we have discussed in Chapter [16](537582_1_En_16_Chapter.xhtml),
    this sophisticated automated AI governance scope, however, is not a reality yet
    and subject to R&D.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_17_Chapter/537582_1_En_17_Fig1_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration represents the inputs from regulation-specific knowledge graphs,
    regulation-specific ontologies, business and I T glossaries, and metadata to the
    automated A I governance insight component. It also indicates the A I M L capabilities
    to build, adjust and integrate.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 17-1
  prefs: []
  type: TYPE_NORMAL
- en: AI-Infused Automated AI Governance
  prefs: []
  type: TYPE_NORMAL
- en: Looking at Figure [17-1](#Fig1), let us discuss the various components and their
    functions. To illustrate the required functionality of an AI-infused *automated*
    AI governance platform, we are using trustworthy AI regulations from either the
    European Union or the US Department of State as an example.^([14](#Fn14))
  prefs: []
  type: TYPE_NORMAL
- en: 'The AI-infused automated AI governance platform comprises the following two
    main components:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Automated AI governance insight component**: This component is essentially
    generating actionable insight based on regulation-specific input data (e.g., regulations,
    documents, Internet sources, legal assets, etc.), regulation-specific ontologies
    and knowledge graphs, business and IT glossaries, and relevant active metadata
    from the knowledge catalog. This input data is analyzed via AI/ML capabilities
    to generate actionable insight, which can (or rather should) be autonomously processed
    by the automated *Data Fabric execution component*.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Automated Data Fabric execution component**: This component processes the
    insight generated from the *automated AI governance insight component* to build
    additional or adjust existing Data Fabric processes to comply with regulations.
    New processes may have to be integrated into the Data Fabric, and existing ones
    must be customized or updated accordingly.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Let us first take a closer look at the *automated AI governance insight component*,
    detailing out specifically the relevant AI/ML and other capabilities. Most of
    these capabilities are subject to R&D. Needless to mention that additional capabilities
    may be required, such as easy-to-use GUIs and transformation modules, for example,
    to prepare input datasets and to generate JSON or Avro output datasets for dataset
    exchange purposes and so on:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Knowledge** **graph inclusion**: Existing regulation-specific knowledge graphs
    must be factored in; if none is available, they may have to be built first prior
    to inclusion. Semantic knowledge graphs may have to be generated, as outlined
    in Chapter [5](537582_1_En_5_Chapter.xhtml), to leverage augmented insight related
    to non-obvious relationships or correlations, that is, of regulations to legal
    cases or aspects.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Ontology mapping**: Regulation-specific ontologies must be leveraged and
    mapped to relevant AI assets and Data Fabric processes. In our example, this means
    mapping to ML models, pipelines, and Data Fabric processes that are relevant to
    guarantee trustworthy AI. This could, for instance, require a mapping to the relevant
    IBM Watson Studio trusted AI functionality, which our examples for trustworthy
    AI in Chapter [5](537582_1_En_5_Chapter.xhtml) are based on.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Glossary matching**: Relevant business and IT glossaries available via the
    knowledge catalog must be matched to the regulation-specific key terms; new terms
    should be discovered and added to the existing glossaries.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Metadata analysis**: Existing active metadata should be analyzed to gain
    further insight; new metadata may have to be discovered and added to the knowledge
    catalog. Furthermore, active metadata will be used as input for some other modules,
    for example, *asset identification* and *asset correlation*.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Asset identification**: A key task is the identification of assets that are
    relevant for the trustworthy AI regulation, for example, existing ML or DL models,
    corresponding pipelines, Jupyter notebooks, etc. This requires discovery of AI
    assets stored in the knowledge catalog (active metadata) and may require input
    from the *linguistic analysis* and *text analysis* modules.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Asset correlation**: AI assets do not exist in isolation; they are correlated,
    which is either already captured in the knowledge catalog, or the correlation
    still needs to be discovered, that is, via the semantic enrichment engine of the
    Data Fabric architecture. In addition, the correlation goes above and beyond just
    the IT domain; it should also include, for instance, correlation to the business
    domain and semantics of the AI model, including its business outcome and meaning.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Text analysis**: The regulation-specific documents and text need to be analyzed
    by applying ML techniques to automatically classify and extract valuable insights
    from unstructured text data. This may require correlating the analysis step with
    the relevant ontologies and active metadata.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Linguistic analysis**: The relevant documents and text may have to be linguistically
    analyzed as well, especially if sophisticated and legally relevant, for instance,
    to better understand the semantics (meaning) of the regularity text and impact
    in case of noncompliance.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Let us continue by deep-diving into the *automated Data Fabric execution component*,
    detailing out the capabilities it is composed of. This is indeed an area where
    most R&D is required to augment a Data Fabric architecture to automatically adjust
    and integrate required changes. Whereas the *automated AI governance insight component*
    generates actionable insights, this component automatically transforms the insight
    into actionable insight and autonomously executes the identified steps to implement
    trustworthy AI to guarantee compliance with the corresponding regulation:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Module** **identification**: Corresponding Data Fabric components, modules,
    products, etc. need to be identified to understand where adjustments need to be
    implemented. This can refer to an existing tool or component that delivers trustworthy
    AI for other ML models already to, for instance, improve explainability in addition
    to its currently implemented functional scope.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Asset infusion**: Identified AI assets need to be infused and made available
    to corresponding Data Fabric processes, which may require new integration methods,
    leveraging asset exchange standards to be used. For instance, operationalized
    ML models and pipelines must be integrated into the existing trustworthy AI product
    or ecosystem.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Process adjustment**: Relevant Data Fabric processes themselves or parts
    of the process flow need to be adjusted, which could relate to customizing pipelines,
    Jupyter notebooks, or ETL transformation stages. This could include automatically
    discovering, accessing, transforming, cleansing, and integrating new data records
    that are stored in data stores or generated in transactional systems that have
    not been accessed before. This must be done while corresponding ML models are
    deployed and in operation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data Fabric integration**: Overall integration of required changes, new modules,
    assets, or even ML algorithms must be taken into consideration by the Data Fabric.
    Adopting trustworthy AI in the context of new regulations may, for instance, require
    new ML algorithms from vendors for their corresponding products to be integrated
    autonomously to calculate required measures related to AI interpretation or interpretability.
    This obviously relates to an established AIDevOps infrastructure to be in place.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In Chapter [14](537582_1_En_14_Chapter.xhtml)*,* we have seen several existing
    capabilities, such as to auto-discover and classify data, to auto-detect sensitive
    data, to auto-analyze quality data, and to auto-assign business terms. Nevertheless,
    the scope and aspiration of an AI-infused automated AI governance as outlined
    previously remains subject to R&D. Some vendors are already referring to an automated
    Data Fabric.^([15](#Fn15)) However, this relates to a subset of tasks and processes,
    for example, automated data lineage, automated data discovery, etc.
  prefs: []
  type: TYPE_NORMAL
- en: A Software as a Service (SaaS) cloud deployment model may impose additional
    requirements that consider a services-based Data Fabric or Data Mesh implementation.
  prefs: []
  type: TYPE_NORMAL
- en: Hyper-automated Data and AI Fabric
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As we have seen previously, vendors are already referring to an automated Data
    Fabric, meaning that certain tasks are performed automatically. Indeed, the Data
    Fabric journey is certainly moving toward identifying and automating as many business
    and IT processes as possible to eliminate or at least to reduce human intervention.
  prefs: []
  type: TYPE_NORMAL
- en: We refer to the term *hyper-automation*^([16](#Fn16)) to automate adjustments
    and optimization of Data and AI Fabric or Mesh processes, meaning to *auto-tune*,
    to *self-correct*, and to *auto-implement* improvements or changes to these processes
    – mainly implemented via infusion of AI/ML, which also includes auto-adjustments
    to already defined data products.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [17-2](#Fig2) introduces a few examples of how this might look like once
    vendor R&D organizations have delivered corresponding capabilities in their product
    suite.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_17_Chapter/537582_1_En_17_Fig2_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A diagram represents the inputs and outputs from the hyper-automated data ana
    A I fabric. The inputs include deployed A I model, Analytical data, existing batch
    processes, existing D W H, B I reports, and C D C based data replication. The
    outputs include the revised A I model, updated analytical data, revised batch
    processes, updated D W H, B I reports, and adjust data refresh.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 17-2
  prefs: []
  type: TYPE_NORMAL
- en: Hyper-automated Data and AI Fabric Examples
  prefs: []
  type: TYPE_NORMAL
- en: 'Needless to mention that AI/ML plays a pivotal role in delivering these hyper-automated
    Data and AI Fabric or Mesh capabilities. However, additional capabilities are
    required to address the integration into corresponding Data Fabric architectural
    components:'
  prefs: []
  type: TYPE_NORMAL
- en: '**AI model adjustments**: Once bias or drift or worsening accuracy or precision
    of operationalized AI models has been detected, this should be automatically corrected,
    by, for instance, taking new data for retraining, validation, and test of AI models.
    Revised AI models should be auto-deployed and operationalized.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data quality issue corrections**: Analytical or master data changes over
    time, which may cause new data quality issues to surface. Discovery and resolution
    of these quality issues should be performed autonomously and according to rules,
    policies, and business constraints, which could mean corrections to be auto-implemented
    in real time, delivering sustainable data quality.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Batch process flow optimization**: The elapsed time or resource consumption
    of batch processes themselves and the flow they are embedded in should be optimized
    and adjusted in an automated fashion, resulting in revised batch processes and
    flows.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**DWH/BI report adjustments**: New data from new or even existing source systems
    that may be relevant for existing DWH/BI reports should be auto-discovered, resulting
    in automated updates of corresponding ETL stages and DWH/BI reports.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data refresh adjustments**: Existing CDC-based data replication methods may
    result in large data volumes to be moved with high I/O or CPU cost. Introducing
    data load for some tables or table partitions may optimize the data refresh process
    by complementing the existing CDC-based replication.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The preceding examples illustrate the wide scope of Data Fabric`–`related processes;
    data quality (including data consistency, completeness, monitoring, preventing
    errors, etc.) as a particular Data Fabric area enjoys great popularity in the
    research and academia community.^([17](#Fn17)) The same is true for hyper-automation
    with the caveat that the core research is focused on IoT, Robotic Process Automation
    (RPA),^([18](#Fn18)) and specific industries.
  prefs: []
  type: TYPE_NORMAL
- en: However, specific research related to hyper-automation challenges seems to be
    left overall to vendor R&D organizations.
  prefs: []
  type: TYPE_NORMAL
- en: Key Takeaways
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We conclude this chapter with a few key takeaways as summarized in Table [17-1](#Tab1).
  prefs: []
  type: TYPE_NORMAL
- en: Table 17-1
  prefs: []
  type: TYPE_NORMAL
- en: Key Takeaways
  prefs: []
  type: TYPE_NORMAL
- en: '| # | Key Takeaway | High-Level Description |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| 1 | Exploiting semantic knowledge graphs. | Interpreting semantic knowledge
    graphs and transforming their inherent knowledge into automated and actionable
    insight to improve the Data Fabric or Data Mesh still represents a challenge.
    |'
  prefs: []
  type: TYPE_TB
- en: '| 2 | Explainability of AI models above and beyond multiclass classification
    problems. | Exploiting semantic knowledge graphs can support interpretability
    and explainability of nearly all AI model types (including DL models) by discovering
    and depicting semantic and non-obvious relationships or depicting an ML model
    in a simplified and more readable, explainable way. |'
  prefs: []
  type: TYPE_TB
- en: '| 3 | Developing domain-specific ontologies. | Domain-specific ontologies that
    relate to specific Data Fabric processes, for example, intelligent information
    integration and activating the digital exhaust, may have to be developed using
    OWL. |'
  prefs: []
  type: TYPE_TB
- en: '| 4 | Building an AI-infused automated AI governance. | The need of understanding
    regulations and implementing the imperatives into the existing Data Fabric or
    Data Mesh to guarantee compliance is nontrivial; capabilities and specific Data
    Fabric architectural components are required to automatically generate actionable
    insight and auto-execute identified steps. |'
  prefs: []
  type: TYPE_TB
- en: '| 5 | Hyper-automated Data and AI Fabric is largely subject to R&D. | The term
    *hyper-automation* refers to automating adjustments and optimization of Data and
    AI Fabric or Mesh processes: auto-tune, self-correct, auto-implement improvements
    or changes to these processes – mainly via infusion of AI/ML. |'
  prefs: []
  type: TYPE_TB
