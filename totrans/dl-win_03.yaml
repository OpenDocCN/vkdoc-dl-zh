  id: totrans-280
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: Summary
  id: totrans-281
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we learned how to set up all the tools needed to start building
    deep learning models.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们学习了如何设置所有开始构建深度学习模型所需的工具。
- en: 'You need to install Visual Studio, CMake, and Anaconda Python as prerequisites.
    Here are all the commands needed to install everything on an Anaconda Python environment
    on Windows:'
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 您需要安装 Visual Studio、CMake 和 Anaconda Python 作为先决条件。以下是安装 Windows 上 Anaconda
    Python 环境中所有内容的所需命令：
- en: '[PRE28]'
  id: totrans-284
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: These are only the core set of tools needed for learning to build deep learning
    models. You will install many more tools as you start building.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 这些只是学习构建深度学习模型所需的核心工具集。随着您开始构建，您将安装更多工具。
