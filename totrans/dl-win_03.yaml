- en: 3. Setting Up Your Tools
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 3. 设置您的工具
- en: Now that we know what we need to get started, let us begin setting up our tools.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们知道了我们需要什么来开始，让我们开始设置我们的工具。
- en: 'Since we will be using packages from several different sources—from Anaconda
    package channels, pip packages, and so on—the order in which we install them is
    somewhat important in order to get a smoother installation experience without
    any conflicts. We recommend the following order of operations:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们将使用来自多个不同来源的软件包——从 Anaconda 软件包通道、pip 软件包等——安装它们的顺序对于获得更平滑的安装体验且无冲突来说很重要。我们建议以下操作顺序：
- en: Install Visual Studio with C++ Support
  id: totrans-3
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 安装支持 C++ 的 Visual Studio
- en: Install CMake
  id: totrans-4
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 安装 CMake
- en: Install Anaconda Python
  id: totrans-5
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 安装 Anaconda Python
- en: Set up the Conda Environment and the Python Libraries
  id: totrans-6
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 设置 Conda 环境和 Python 库
- en: Install TensorFlow
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 安装 TensorFlow
- en: (Optional) Install Keras multibackend version
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: （可选）安装 Keras 多后端版本
- en: Install OpenCV
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 安装 OpenCV
- en: Install Dlib
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 安装 Dlib
- en: Verify Installations
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 验证安装
- en: Let us look at how to set up each of them.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看如何设置每一个。
- en: 'Step 1: Installing Visual Studio with C++ Support'
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第 1 步：安装支持 C++ 的 Visual Studio
- en: The first step we need to do is to install a compiler for C++.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要做的第一步是安装一个 C++ 编译器。
- en: Why do we need C++? Aren’t we going to code in Python?
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我们为什么需要 C++？我们不是要使用 Python 编码吗？
- en: Yes, we are going to use Python. And no, you do not need to learn C++ to learn
    deep learning (although C++ is a wonderful language).
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，我们将使用 Python。而且，学习深度学习不需要学习 C++（尽管 C++ 是一种很棒的语言）。
- en: But some of the more advanced Python libraries have parts that were written
    with C++ to improve their performance. So to install some of the libraries, we
    need to have a C++ compiler installed in our system.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 但是一些更高级的 Python 库的部分是用 C++ 编写的，以提高其性能。因此，为了安装一些库，我们需要在我们的系统中安装一个 C++ 编译器。
- en: On Windows, we use Visual Studio as the compiler.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Windows 上，我们使用 Visual Studio 作为编译器。
- en: Due to various compatibility issues of different Visual Studio versions with
    various packages, it is recommended that we stick with an older version of Visual
    Studio rather than the latest version. This older version can be downloaded from
    the Visual Studio Older Versions page.^([1](#Fn1)) Visual Studio 2015 is a good
    choice (Figure [3-1](#Fig1)). The free community edition will be enough for our
    tasks.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 由于不同版本的 Visual Studio 与各种软件包存在各种兼容性问题，建议我们坚持使用较旧版本的 Visual Studio 而不是最新版本。这个较旧的版本可以从
    Visual Studio 旧版本页面下载。[1](#Fn1) Visual Studio 2015 是一个不错的选择（图 [3-1](#Fig1)）。免费的社区版就足够我们使用了。
- en: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig1_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig1_HTML.jpg)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig1_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig1_HTML.jpg)'
- en: Figure 3-1
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-1
- en: Select to download “visual studio community 2015 with update 3” from the Visual
    Studio older versions page
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 从 Visual Studio 旧版本页面选择下载“visual studio community 2015 with update 3”
- en: When installing VS 2015, make sure to select the “custom” install option (Figure
    [3-2](#Fig2)).
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在安装 VS 2015 时，请确保选择“自定义”安装选项（图 [3-2](#Fig2)）。
- en: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig2_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig2_HTML.jpg)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig2_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig2_HTML.jpg)'
- en: Figure 3-2
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-2
- en: Visual Studio custom install
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: Visual Studio 自定义安装
- en: Select to install the Visual C++ option in the next screen (Figure [3-3](#Fig3)).
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一屏中选择安装“Visual C++”选项（图 [3-3](#Fig3)）。
- en: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig3_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig3_HTML.jpg)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig3_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig3_HTML.jpg)'
- en: Figure 3-3
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-3
- en: Select to install Visual C++
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 选择安装 Visual C++
- en: After the installation is completed, you can verify that C++ is available by
    launching Visual Studio and checking whether the ‘Visual C++’ option comes up
    (Figure [3-4](#Fig4)).
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 安装完成后，你可以通过启动 Visual Studio 并检查是否出现“Visual C++”选项来验证 C++ 是否可用（图 [3-4](#Fig4)）。
- en: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig4_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig4_HTML.jpg)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig4_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig4_HTML.jpg)'
- en: Figure 3-4
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-4
- en: Visual Studio 2015 with Visual C++
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 带有 Visual C++ 的 Visual Studio 2015
- en: 'Step 2: Installing CMake'
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第 2 步：安装 CMake
- en: CMake is a cross-platform build tool used to compile, test, and package software
    projects. CMake is used as a build tool in many open-source projects with C++
    libraries, such as Dlib. CMake requires to have a C++ compiler installed on the
    system, which is why we installed Visual Studio with C++ tools before installing
    CMake.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: CMake 是一个跨平台构建工具，用于编译、测试和打包软件项目。CMake 被用作许多具有 C++ 库的开源项目的构建工具，例如 Dlib。CMake
    需要在系统上安装 C++ 编译器，这就是为什么我们在安装 CMake 之前安装了带有 C++ 工具的 Visual Studio。
- en: In order to install CMake, head over to the CMake Downloads page^([2](#Fn2))
    and download the latest Windows win64-x64 installer package (Figure [3-5](#Fig5))
    and run the installation.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 为了安装 CMake，请转到 CMake 下载页面^([2](#Fn2)) 并下载最新的 Windows win64-x64 安装程序包（图 [3-5](#Fig5)）并运行安装。
- en: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig5_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig5_HTML.jpg)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig5_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig5_HTML.jpg)'
- en: Figure 3-5
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-5
- en: Download the latest CMake package
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 下载最新的 CMake 包
- en: When installing, make sure to add CMake to the system path (Figure [3-6](#Fig6)).
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在安装时，请确保将 CMake 添加到系统路径（图 [3-6](#Fig6)）。
- en: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig6_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig6_HTML.jpg)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig6_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig6_HTML.jpg)'
- en: Figure 3-6
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-6
- en: Add CMake to the system path
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 将 CMake 添加到系统路径
- en: Once the installation is completed, you can verify the installation by running
    the following on the Windows command prompt (Figure [3-7](#Fig7)).
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 安装完成后，你可以在 Windows 命令提示符中运行以下命令来验证安装（图 [3-7](#Fig7)）。
- en: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig7_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig7_HTML.jpg)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig7_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig7_HTML.jpg)'
- en: Figure 3-7
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-7
- en: Verify CMake version
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 验证 CMake 版本
- en: '[PRE0]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Step 3: Installing Anaconda Python'
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 步骤 3：安装 Anaconda Python
- en: 'Installing Anaconda is straightforward: simply head over to the Anaconda individual
    edition downloads page^([3](#Fn3)) and download the latest Python 3.x 64-Bit package
    for Windows (Figure [3-8](#Fig8)). The full installer is about 470MB in size,
    and contains the conda package manger, Python 3.8, and a set of prebundled commonly
    used packages. While the base installer comes with Python 3.8, we will be able
    to use other Python versions when creating the conda virtual environments.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 安装 Anaconda 很简单：只需转到 Anaconda 个人版下载页面^([3](#Fn3)) 并下载最新的 Windows 64 位 Python
    3.x 包（图 [3-8](#Fig8)）。完整安装程序大小约为 470MB，包含 conda 包管理器、Python 3.8 以及一系列预捆绑的常用包。虽然基本安装程序包含
    Python 3.8，但我们在创建 conda 虚拟环境时将能够使用其他 Python 版本。
- en: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig8_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig8_HTML.jpg)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig8_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig8_HTML.jpg)'
- en: Figure 3-8
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-8
- en: The Anaconda individual edition downloads page
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: Anaconda 个人版下载页面
- en: The list of packages bundled in the installer, as well as the full list of conda
    packages available to install, can be found at the Anaconda package lists.^([4](#Fn4))
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 安装程序中捆绑的包列表以及可供安装的 conda 包的完整列表可以在 Anaconda 包列表中找到.^([4](#Fn4))
- en: Tip
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士
- en: If you do not need the full installer with the prebundled packages, and only
    need the conda package manager and Python, you can get the **Miniconda** distribution,^([5](#Fn5))
    which has a much smaller size (~60MB). The miniconda installer package is also
    available with Python 3.8, but allows us to set up virtual environments with other
    Python versions.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不需要带有预捆绑包的完整安装程序，而只需要 conda 包管理器和 Python，你可以获取 **Miniconda** 发行版，^([5](#Fn5))
    它的大小要小得多（约 60MB）。Miniconda 安装程序包也适用于 Python 3.8，但它允许我们使用其他 Python 版本设置虚拟环境。
- en: Installing is as simple as running the downloaded graphical installer.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 安装过程就像运行下载的图形安装程序一样简单。
- en: Tip
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士
- en: In the graphical installer, the “add Anaconda to my PATH environment variable”
    option might be unchecked by default (Figure [3-9](#Fig9)). It is better to check
    this option, as it allows us to run the conda commands from the Windows command
    prompt.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在图形安装程序中，“将 Anaconda 添加到我的 PATH 环境变量”选项默认可能未勾选（图 [3-9](#Fig9)）。最好勾选此选项，因为它允许我们从
    Windows 命令提示符运行 conda 命令。
- en: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig9_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig9_HTML.jpg)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig9_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig9_HTML.jpg)'
- en: Figure 3-9
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-9
- en: The “add Anaconda to my PATH environment variable” option in the Anaconda installer
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: Anaconda 安装程序中的“将 Anaconda 添加到我的 PATH 环境变量”选项
- en: 'If you forget to check this option, do not worry. You can add Anaconda to the
    PATH manually by adding the following to the system PATH variable (where \path\to\anaconda3
    is the Anaconda installation directory):'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你忘记检查这个选项，不要担心。你可以通过将以下内容添加到系统 PATH 变量中来手动将 Anaconda 添加到 PATH（其中 \path\to\anaconda3
    是 Anaconda 的安装目录）：
- en: '`\path\to\anaconda\path\to\anaconda\Library\mingw-w64\bin\path\to\anaconda\Library\usr\bin\path\to\anaconda\Library\bin\path\to\anaconda\Scripts`'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '`\path\to\anaconda\path\to\anaconda\Library\mingw-w64\bin\path\to\anaconda\Library\usr\bin\path\to\anaconda\Library\bin\path\to\anaconda\Scripts`'
- en: 'For an example, if the user profile is at C:\Users\Thimira\, the paths should
    be:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果用户配置文件位于 C:\Users\Thimira\，则路径应该是：
- en: '`C:\Users\Thimira\Anaconda3C:\Users\Thimira\Anaconda3\Library\mingw-w64\binC:\Users\Thimira\Anaconda3\Library\usr\binC:\Users\Thimira\Anaconda3\Library\binC:\Users\Thimira\Anaconda3\Scripts`'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '`C:\Users\Thimira\Anaconda3C:\Users\Thimira\Anaconda3\Library\mingw-w64\binC:\Users\Thimira\Anaconda3\Library\usr\binC:\Users\Thimira\Anaconda3\Library\binC:\Users\Thimira\Anaconda3\Scripts`'
- en: 'Once the installation is completed open a Windows command prompt and run the
    following command:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 安装完成后，打开 Windows 命令提示符并运行以下命令：
- en: '[PRE1]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: If you get a list of installed conda packages, then Anaconda is installed and
    working properly.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你得到了已安装的 conda 软件包列表，那么 Anaconda 已经安装并且运行正常。
- en: Note
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: If you get an error message, make sure you closed and reopened the terminal
    window after installing, or do it now. Then verify that you are logged into the
    same user account that you used to install Anaconda.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你收到错误消息，请确保在安装后关闭并重新打开终端窗口，或者现在就做。然后验证你是否登录了用于安装 Anaconda 的同一用户账户。
- en: At this point, if you have not used Anaconda Python before, it is better to
    go through the “getting started with conda” guide.^([6](#Fn6)) This a tutorial
    that should take you less than 30 minutes, and helps you get familiarized with
    the commands and capabilities of Anaconda.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个阶段，如果你之前没有使用过 Anaconda Python，最好先通过“开始使用 conda”指南进行学习.^([6](#Fn6)) 这是一个少于
    30 分钟的教程，可以帮助你熟悉 Anaconda 的命令和功能。
- en: 'Step 4: Setting up the Conda Environment and the Python Libraries'
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第 4 步：设置 Conda 环境和 Python 库
- en: Once you get the hang of conda, it is time to create the conda environment and
    install the necessary packages.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你熟悉了 conda，就是时候创建 conda 环境并安装必要的软件包了。
- en: Note
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Make sure you performed the “`conda update conda`” command as mentioned in the
    getting started guide before proceeding.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 确保在继续之前，你已经按照入门指南中提到的执行了“`conda update conda`”命令。
- en: When creating the conda environment we also need to install the utility libraries
    we discussed in the previous chapter. We can install them one by one. But with
    conda, we do not have to.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 在创建 conda 环境时，我们还需要安装我们在上一章中讨论的实用库。我们可以逐个安装它们。但使用 conda，我们不必这样做。
- en: Conda has a *metapackage* named ‘anaconda’ that bundles many of the commonly
    used utility packages.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: Conda 有一个名为“anaconda”的元包，它捆绑了许多常用的实用软件包。
- en: So we just need to run the following command to create the conda virtual environment
    and install all the utility packages we want in it (this is a single command;
    see Figure [3-10](#Fig10)).
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们只需要运行以下命令来创建 conda 虚拟环境并安装我们想要在其中安装的所有实用软件包（这是一个单独的命令；见图 [3-10](#Fig10)）。
- en: '**--name deep-learning:** We set the name of the environment to be “deep-learning.”
    You can change that to anything you like.'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**--name deep-learning:** 我们将环境的名称设置为“deep-learning”。你可以将其更改为任何你喜欢的名称。'
- en: '**python=3.7:** We tell conda to create the new environment with Python 3.7\.
    You can specify another version of Python if you want to. But 3.7 is the one that
    is recommended now.'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**python=3.7:** 我们告诉 conda 创建一个使用 Python 3.7 的新环境。如果你想指定其他版本，也可以。但现在推荐使用 3.7。'
- en: '**Anaconda:** We tell conda to install the anaconda metapackage into the created
    environment. This will install the bundle of commonly used utility packages, which
    includes the set of utility libraries we discussed earlier.'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Anaconda:** 我们告诉 conda 在创建的环境中安装 anaconda 元包。这将安装常用实用软件包的捆绑包，包括我们之前讨论过的实用库集合。'
- en: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig10_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig10_HTML.jpg)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig10_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig10_HTML.jpg)'
- en: Figure 3-10
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-10
- en: Creating the Conda environment
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 创建 Conda 环境
- en: '[PRE2]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Note
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: 'Instead of using the metapackage—which installs a lot of packages that you
    might not need—you can also specify the list of packages to be installed when
    creating the environment:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以选择不使用元包——它会安装很多你可能不需要的软件包——在创建环境时也可以指定要安装的软件包列表：
- en: '`conda create --name deep-learning python=3.7 numpy scipy scikit-learn scikit-image
    pillow h5py matplotlib`'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: '`conda create --name deep-learning python=3.7 numpy scipy scikit-learn scikit-image
    pillow h5py matplotlib`'
- en: 'Once the environment is created (which may take several minutes to download
    and install all the required packages; Figure [3-11](#Fig11)), you can activate
    it by running:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦创建环境（可能需要几分钟来下载和安装所有必需的包；图 [3-11](#Fig11)），您可以通过运行以下命令来激活它：
- en: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig11_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig11_HTML.jpg)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig11_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig11_HTML.jpg)'
- en: Figure 3-11
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-11
- en: Environment creation finished
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 环境创建完成
- en: '[PRE3]'
  id: totrans-95
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: When an Anaconda environment is activated, the name of the environment will
    get prepended to the command prompt (Figure [3-12](#Fig12)).
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 当激活 Anaconda 环境时，环境名称将添加到命令提示符前（图 [3-12](#Fig12)）。
- en: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig12_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig12_HTML.jpg)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig12_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig12_HTML.jpg)'
- en: Figure 3-12
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-12
- en: Conda environment activated
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: Conda 环境已激活
- en: You can use this to verify that you are working on the correct environment.
    Always make sure that you have activated and working on the correct environment
    for all the following steps.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用此方法来验证您是否正在正确的环境中工作。始终确保您已激活并正在使用正确的环境进行所有后续步骤。
- en: 'Step 5: Installing TensorFlow'
  id: totrans-101
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第 5 步：安装 TensorFlow
- en: TensorFlow has both a CPU version and a GPU version. If your system has a CUDA
    capable NVIDIA GPU installed, the TensorFlow GPU version is able to harness the
    processing power of that GPU to accelerate the training of your models.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow 有 CPU 版本和 GPU 版本。如果您的系统已安装具备 CUDA 功能的 NVIDIA GPU，TensorFlow GPU 版本能够利用该
    GPU 的处理能力来加速您模型的训练。
- en: If you have a CUDA capable NVIDIA GPU I highly recommend installing the GPU
    version, as it gives massive speed-ups to your deep learning experiments.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您拥有具备 CUDA 功能的 NVIDIA GPU，我强烈建议安装 GPU 版本，因为它可以为您的深度学习实验带来巨大的速度提升。
- en: Tip
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士
- en: You can check whether your NVIDIA GPU is CUDA capable from the list of CUDA
    supported GPUs at the NVIDIA Developer site.^([7](#Fn7)) You will need a GPU with
    CUDA Compute Capability 3.5 or higher in order to run TensorFlow GPU.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以从 NVIDIA 开发者网站上支持的 CUDA GPU 列表中检查您的 NVIDIA GPU 是否具备 CUDA 功能.^([7](#Fn7))
    为了运行 TensorFlow GPU，您需要一个具备 CUDA Compute Capability 3.5 或更高版本的 GPU。
- en: As TensorFlow now has an Anaconda-native package, we will be using it to install
    TensorFlow, as it simplifies the installation of its dependencies such as the
    CUDA Toolkit and cuDNN libraries.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 TensorFlow 现在有一个 Anaconda 原生包，我们将使用它来安装 TensorFlow，因为它简化了其依赖项（如 CUDA 工具包和
    cuDNN 库）的安装。
- en: 'To install the GPU version of TensorFlow, run the following command (make sure
    you are in the activated conda environment we created earlier):'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 要安装 TensorFlow 的 GPU 版本，请运行以下命令（确保您处于我们之前创建的已激活的 conda 环境中）：
- en: '[PRE4]'
  id: totrans-108
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Note
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: We are specifying the version number of the package also as tensorflow-gpu**==2.1.0**
    because anaconda tends to install an older version. Hopefully this will be fixed
    in the future, but until then it is better to specify the package version.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还指定了包的版本号，即 tensorflow-gpu**==2.1.0**，因为 anaconda 倾向于安装较旧版本。希望这将在未来得到修复，但在此之前，指定包版本会更好。
- en: Tip
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士
- en: Always check for the latest available TensorFlow package version from the Anaconda
    package lists^([8](#Fn8)) and install that version. At the time of this writing
    the Anaconda package lists shows version 2.2.0 as the latest TensorFlow version
    available. However, if you attempt to install it, you may get a “PackagesNotFoundError”
    due to an issue with the conda package registry. Until that is fixed, we will
    stick with TensorFlow 2.1.0.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 总是检查 Anaconda 包列表中可用的最新 TensorFlow 包版本^([8](#Fn8)) 并安装该版本。在撰写本文时，Anaconda 包列表显示
    2.2.0 版本为最新的 TensorFlow 版本。然而，如果您尝试安装它，可能会因为 conda 包注册表的问题而遇到“PackagesNotFoundError”。直到这个问题得到解决，我们将坚持使用
    TensorFlow 2.1.0。
- en: 'For the CPU version:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 对于 CPU 版本：
- en: '[PRE5]'
  id: totrans-114
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Caution
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Do not attempt to install both the GPU and CPU versions in the same conda environment.
    If you want to switch the versions, uninstall the other version first, or use
    a different conda environment.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 不要尝试在同一 conda 环境中安装 GPU 和 CPU 版本。如果您想切换版本，请先卸载其他版本，或者使用不同的 conda 环境。
- en: Conda will take care of installing all the dependencies for you. If you opted
    to install the GPU version, this will also include the CUDA Toolkit and cuDNN
    libraries as well (Figure [3-13](#Fig13)).
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: Conda 将为您安装所有依赖项。如果您选择安装 GPU 版本，这还将包括 CUDA Toolkit 和 cuDNN 库（图 [3-13](#Fig13)）。
- en: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig13_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig13_HTML.jpg)'
  id: totrans-118
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig13_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig13_HTML.jpg)'
- en: Figure 3-13
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-13
- en: The CUDA-toolkit and cuDNN libraries being installed
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: CUDA-toolkit 和 cuDNN 库正在安装
- en: 'Step 6: (Optional) Installing Keras Multibackend version'
  id: totrans-121
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 步骤 6：（可选）安装 Keras 多后端版本
- en: This is an optional step.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个可选步骤。
- en: With TensorFlow versions 2.0 and up, Keras is integrated into the TensorFlow
    library and is available through its tf.keras Python interface.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 在 TensorFlow 2.0 及以上版本中，Keras 已集成到 TensorFlow 库中，并通过其 tf.keras Python 接口提供。
- en: 'But if you need to install the multibackend version of Keras for experimentation
    with other backends such as Theano, you can install it using pip:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果您需要安装 Keras 的多后端版本以进行与其他后端（如 Theano）的实验，您可以使用 pip 进行安装：
- en: '[PRE6]'
  id: totrans-125
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'Switching the backend of Keras is done in the keras.json file, which is located
    at *%USERPROFILE%\.keras\keras.json* on Windows. The default keras.json file looks
    like this:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 切换 Keras 的后端是在 keras.json 文件中完成的，该文件位于 Windows 的 *%USERPROFILE%\.keras\keras.json*。默认的
    keras.json 文件看起来像这样：
- en: '[PRE7]'
  id: totrans-127
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: When switching the backend, you need to be aware of the `image_data_format`
    parameter of Keras also. You can read more about it in Appendix 2.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 在切换后端时，您还需要注意 Keras 的 `image_data_format` 参数。您可以在附录 2 中了解更多信息。
- en: If you are sticking with TensorFlow, the default settings of Keras will work
    fine.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您坚持使用 TensorFlow，Keras 的默认设置将工作得很好。
- en: 'Step 7: Installing OpenCV'
  id: totrans-130
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 步骤 7：安装 OpenCV
- en: OpenCV has prebuilt binaries for Windows that can be downloaded from their official
    site. But you may run into issues with getting the Python bindings working with
    64-Bit Python 3.7.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: OpenCV 为 Windows 提供了预构建的二进制文件，可以从其官方网站下载。但您可能会遇到与 64 位 Python 3.7 一起使用 Python
    绑定时的问题。
- en: The easiest way to get OpenCV working on Windows with 64-Bit Python 3.7 is to
    use the Anaconda package (Figure [3-14](#Fig14)). As with TensorFlow, conda will
    handle all the dependency management.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Windows 上使用 64 位 Python 3.7 使 OpenCV 工作的最简单方法是使用 Anaconda 包（图 [3-14](#Fig14)）。与
    TensorFlow 一样，conda 将处理所有依赖项管理。
- en: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig14_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig14_HTML.jpg)'
  id: totrans-133
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig14_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig14_HTML.jpg)'
- en: Figure 3-14
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-14
- en: OpenCV being installed
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: OpenCV 已安装
- en: '[PRE8]'
  id: totrans-136
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'Step 8: Installing Dlib'
  id: totrans-137
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 步骤 8：安装 Dlib
- en: With all the great features in Dlib, installing it has always been a little
    bit troublesome because of some specific dependency requirements it needs that
    have a habit of almost always conflicting with your other libraries. With the
    latest versions, however, installing Dlib has become somewhat simple.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 Dlib 需要一些特定的依赖项要求，这些依赖项几乎总是与您的其他库冲突，因此尽管 Dlib 具有所有这些优秀功能，安装它一直有点麻烦。然而，在最新版本中，安装
    Dlib 已经变得相对简单。
- en: If you want the latest official package of Dlib installed, then using the pip
    package is the way to go.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您想安装 Dlib 的最新官方包，那么使用 pip 包是最佳选择。
- en: Note
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: You need to have Visual Studio and CMake installed before attempting to install
    Dlib. Make sure CMake is available in the system path by running `cmake --version.`
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 在尝试安装 Dlib 之前，您需要安装 Visual Studio 和 CMake。确保通过运行 `cmake --version` 来确认 CMake
    可在系统路径中可用。
- en: 'You can install the Dlib pip package with:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用以下方式安装 Dlib pip 包：
- en: '[PRE9]'
  id: totrans-143
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: It will collect the package, build the wheel using CMake, and then install it
    in your conda environment (Figure [3-15](#Fig15)).
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 它将收集包，使用 CMake 构建轮子，然后将其安装到您的 conda 环境中（图 [3-15](#Fig15)）。
- en: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig15_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig15_HTML.jpg)'
  id: totrans-145
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig15_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig15_HTML.jpg)'
- en: Figure 3-15
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-15
- en: Dlib PIP installation successful
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: Dlib PIP 安装成功
- en: 'Step 9: Verifying the Installations'
  id: totrans-148
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 步骤 9：验证安装
- en: After you install all the required packages and libraries, it is best to do
    some preliminary checks to ensure that everything is installed correctly. Otherwise,
    you will run into issues later when running your code and wouldn’t know whether
    there’s a bug in the code, or an issue with the installation.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 在安装所有必需的包和库之后，最好进行一些初步检查，以确保一切安装正确。否则，在运行代码时可能会遇到问题，而且你将不知道是代码中存在错误，还是安装存在问题。
- en: We will not be able to test everything without attempting to run a few deep
    learning models. But these steps will help you make sure everything is ready.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 如果不尝试运行几个深度学习模型，我们将无法测试所有内容。但这些步骤将帮助你确保一切准备就绪。
- en: 'First, make sure you have activated the conda environment we created earlier:'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，确保你已经激活了我们之前创建的 conda 环境：
- en: '[PRE10]'
  id: totrans-152
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: You can verify that the environment activated correctly by looking at the command
    prompt (Figure [3-16](#Fig16)).
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过查看命令提示符（图 [3-16](#Fig16)）来验证环境是否正确激活。
- en: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig16_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig16_HTML.jpg)'
  id: totrans-154
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig16_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig16_HTML.jpg)'
- en: Figure 3-16
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-16
- en: Conda environment activated
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: Conda 环境已激活
- en: 'Run the following to see a list of all the installed packages:'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 运行以下命令以查看所有已安装包的列表：
- en: '[PRE11]'
  id: totrans-158
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'You will get a long list like the following (Figure [3-17](#Fig17)):'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 你将得到一个像以下这样的长列表（图 [3-17](#Fig17)）：
- en: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig17_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig17_HTML.jpg)'
  id: totrans-160
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig17_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig17_HTML.jpg)'
- en: Figure 3-17
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-17
- en: Listing the installed packages in our Conda environment
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 列出我们 Conda 环境中的已安装包
- en: Glance through the list to see if all the packages we installed are there.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 快速浏览列表，查看我们安装的所有包是否都在那里。
- en: Then run the Python interpreter, and see whether it has the correct Python version
    (3.7.*) and architecture (64-Bit).
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 然后运行 Python 解释器，查看它是否具有正确的 Python 版本（3.7.*）和架构（64 位）。
- en: '[PRE12]'
  id: totrans-165
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'Next, within the Python interpreter, import each of the packages we installed,
    one at a time:'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，在 Python 解释器中，逐个导入我们安装的每个包：
- en: TensorFlow
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: TensorFlow
- en: OpenCV
  id: totrans-168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: OpenCV
- en: '[PRE13]'
  id: totrans-169
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Dlib
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Dlib
- en: '[PRE14]'
  id: totrans-171
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Multibackend Keras (if you installed it)
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 多后端 Keras（如果你已安装）
- en: '[PRE15]'
  id: totrans-173
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: '[PRE16]'
  id: totrans-174
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: If everything is set up properly, all these imports should complete without
    any errors. Some packages, such as TensorFlow and Keras, may display some info
    messages while importing (Figure [3-18](#Fig18)).
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 如果一切设置正确，所有这些导入应该会顺利完成，不会出现任何错误。一些包，例如 TensorFlow 和 Keras，在导入时可能会显示一些信息消息（图
    [3-18](#Fig18)）。
- en: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig18_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig18_HTML.jpg)'
  id: totrans-176
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig18_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig18_HTML.jpg)'
- en: Figure 3-18
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-18
- en: Test importing the installed packages
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 测试导入已安装的包
- en: 'Finally, let us check TensorFlow functionality. Run each of the following commands,
    one after the other, in the Python interpreter:'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，让我们检查 TensorFlow 的功能。在 Python 解释器中依次运行以下命令：
- en: '[PRE17]'
  id: totrans-180
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: If you have the TensorFlow GPU version installed, you may see some info messages
    of CUDA libraries being loaded (Figure [3-19](#Fig19)).
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经安装了 TensorFlow GPU 版本，你可能会看到一些关于 CUDA 库加载的信息消息（图 [3-19](#Fig19)）。
- en: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig19_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig19_HTML.jpg)'
  id: totrans-182
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig19_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig19_HTML.jpg)'
- en: Figure 3-19
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-19
- en: TensorFlow GPU version loading the CUDA libraries
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow GPU 版本加载 CUDA 库
- en: 'The final result should be shown as `hello, [[4.]]` (Figure [3-20](#Fig20)):'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 最终结果应显示为 `hello, [[4.]]`（图 [3-20](#Fig20)）：
- en: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig20_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig20_HTML.jpg)'
  id: totrans-186
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig20_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig20_HTML.jpg)'
- en: Figure 3-20
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-20
- en: TensorFlow test successful
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow 测试成功
- en: If all commands ran without errors, then we are good to go.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 如果所有命令都运行无误，那么我们就可以继续了。
- en: You can run `quit()` to exit the Python interpreter.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以运行 `quit()` 来退出 Python 解释器。
- en: 'Step 10: (Optional) Manually Installing CUDA Toolkit and cuDNN'
  id: totrans-191
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第 10 步：（可选）手动安装 CUDA 工具包和 cuDNN
- en: When we installed the TensorFlow GPU version via the conda package, you will
    notice that the CUDA Toolkit and the cuDNN library got also installed as conda
    dependencies. While this works with the TensorFlow conda package (and few other
    conda packages), for other libraries that might require CUDA functionality, you
    may need to install the CUDA toolkit globally.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们通过 conda 包安装 TensorFlow GPU 版本时，您会注意到 CUDA 工具包和 cuDNN 库也被作为 conda 依赖项安装。虽然这对于
    TensorFlow conda 包（以及少数其他 conda 包）是有效的，但对于可能需要 CUDA 功能的其他库，您可能需要全局安装 CUDA 工具包。
- en: You can download the CUDA Toolkit from the NVIDIA CUDA downloads page,^([9](#Fn9))
    which lists the latest CUDA Toolkit binaries. Older versions of CUDA can be downloaded
    from the CUDA toolkit archive page.^([10](#Fn10)) Select the toolkit version you
    require, and then select the appropriate package for your version of Windows (Figure
    [3-21](#Fig21)).
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以从 NVIDIA CUDA 下载页面下载 CUDA 工具包，^([9](#Fn9)) 其中列出了最新的 CUDA 工具包二进制文件。旧版本的 CUDA
    可以从 CUDA 工具包存档页面下载.^([10](#Fn10)) 选择您需要的工具包版本，然后选择适合您 Windows 版本的相应包（图 [3-21](#Fig21)）。
- en: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig21_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig21_HTML.jpg)'
  id: totrans-194
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig21_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig21_HTML.jpg)'
- en: Figure 3-21
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-21
- en: NVIDIA CUDA toolkit downloads page
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: NVIDIA CUDA 工具包下载页面
- en: Note
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Selecting the exe (local) installer will greatly reduce the installation time
    and is the better option if your Internet connection is slow or unreliable. Also,
    you can reuse the same installation package to start the installation over if
    anything goes wrong. Note that the download size is around 2.6GB in the latest
    version.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 选择 exe（本地）安装程序将大大减少安装时间，如果您的互联网连接速度慢或不稳定，这是一个更好的选择。此外，如果安装过程中出现问题，您还可以使用相同的安装包重新开始安装。请注意，最新版本的下载大小约为
    2.6GB。
- en: Next, you need to download cuDNN by heading over to NVIDIA cuDNN Page.^([11](#Fn11))
    The downloads page for cuDNN will list multiple versions of cuDNN. You must make
    sure to download the latest version of cuDNN that is compatible with the CUDA
    Toolkit version you are using. For example, if we selected CUDA Toolkit v10.2
    then we need to select Download cuDNN v7.6.5 (November 18, 2019), for CUDA 10.2
    or whatever the latest version is. The download is about 280MB is size (Figure
    [3-22](#Fig22)).
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，您需要通过访问 NVIDIA cuDNN 页面下载 cuDNN.^([11](#Fn11)) cuDNN 的下载页面将列出多个 cuDNN 版本。您必须确保下载与您使用的
    CUDA 工具包版本兼容的最新 cuDNN 版本。例如，如果我们选择了 CUDA 工具包 v10.2，那么我们需要选择下载 cuDNN v7.6.5（2019
    年 11 月 18 日），适用于 CUDA 10.2 或任何最新版本。下载大小约为 280MB（图 [3-22](#Fig22)）。
- en: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig22_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig22_HTML.jpg)'
  id: totrans-200
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig22_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig22_HTML.jpg)'
- en: Figure 3-22
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-22
- en: The cuDNN downloads page
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: cuDNN 下载页面
- en: Once both packages are downloaded, start by running the installer for the CUDA
    Toolkit. In the install options select the **Custom Install** option (Figure [3-23](#Fig23)).
    In the Custom Install Options page, **deselect** the options for GeForce Experience,
    Display Driver (Figure [3-24](#Fig24)), and Visual Studio Integration (Figure
    [3-25](#Fig25)).
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 下载完这两个包后，首先运行 CUDA 工具包的安装程序。在安装选项中选择 **自定义安装** 选项（图 [3-23](#Fig23)）。在自定义安装选项页中，**取消选择**
    GeForce Experience、显示驱动（图 [3-24](#Fig24)）和 Visual Studio 集成（图 [3-25](#Fig25)）的选项。
- en: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig25_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig25_HTML.jpg)'
  id: totrans-204
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig25_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig25_HTML.jpg)'
- en: Figure 3-25
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-25
- en: Deselect the Visual Studio integration option under CUDA
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 在 CUDA 下取消选择 Visual Studio 集成选项
- en: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig24_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig24_HTML.jpg)'
  id: totrans-207
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig24_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig24_HTML.jpg)'
- en: Figure 3-24
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-24
- en: Deselect GeForce experience and driver components
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 取消选择 GeForce 经验和驱动组件
- en: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig23_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig23_HTML.jpg)'
  id: totrans-210
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig23_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig23_HTML.jpg)'
- en: Figure 3-23
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-23
- en: Select the custom install option in the CUDA toolkit installer
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 在 CUDA 工具包安装程序中选择自定义安装选项
- en: Caution
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 警告
- en: If you go with the *Express Installation* option, and you already have the latest
    display driver for your GPU installed, the installer may attempt to overwrite
    the already installed display driver with an older version driver. Therefore,
    if you already have the latest driver (and GeForce Experience installed), it is
    better to go in the *Custom Installation* path.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您选择 *Express Installation* 选项，并且您已经安装了最新的 GPU 显示驱动程序，安装程序可能会尝试用较旧的驱动程序版本覆盖已安装的驱动程序。因此，如果您已经安装了最新的驱动程序（以及
    GeForce Experience），最好选择 *Custom Installation* 路径。
- en: The *Visual Studio Integration* option is known to cause issues with some versions
    of Visual Studio. Therefore, it is better to deselect it if you do not plan to
    build Visual C++ CUDA applications.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 已知 *Visual Studio Integration* 选项会导致某些版本的 Visual Studio 出现问题。因此，如果您不打算构建 Visual
    C++ CUDA 应用程序，最好取消选中它。
- en: You can keep the defaults for everything else in the CUDA installer.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以为 CUDA 安装程序中的其他所有内容保留默认设置。
- en: 'Once the CUDA installation is complete, you can verify the installation by
    running the following command in the command prompt:'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: CUDA 安装完成后，您可以通过在命令提示符中运行以下命令来验证安装：
- en: '[PRE18]'
  id: totrans-218
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: (Note the uppercase “V.”)
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: （注意大写“V.”）
- en: 'This will give an output of something like (Figure [3-26](#Fig26)):'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 这将输出类似（图 [3-26](#Fig26)）的内容：
- en: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig26_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig26_HTML.jpg)'
  id: totrans-221
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig26_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig26_HTML.jpg)'
- en: Figure 3-26
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-26
- en: CUDA toolkit installation verification
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: CUDA 工具包安装验证
- en: '[PRE19]'
  id: totrans-224
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Once the CUDA Toolkit is installed, you can install cuDNN.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: CUDA 工具包安装完成后，您可以安装 cuDNN。
- en: 'cuDNN is not an installer. It is a zip file. You *install* it by extracting
    it and copying its content to the CUDA installation directory. When you extract
    cuDNN, you get a cuda directory, with 3 subdirectories: bin, include, and lib
    (Figure [3-27](#Fig27)).'
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: cuDNN 不是一个安装程序。它是一个压缩文件。您通过提取它并将其内容复制到 CUDA 安装目录来 *安装* 它。当您提取 cuDNN 时，您会得到一个
    cuda 目录，其中包含 3 个子目录：bin、include 和 lib（图 [3-27](#Fig27)）。
- en: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig27_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig27_HTML.jpg)'
  id: totrans-227
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig27_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig27_HTML.jpg)'
- en: Figure 3-27
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-27
- en: cuDNN zip file extracted
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: cuDNN 压缩文件已提取
- en: If you go to your CUDA installation directory (by default it is `C:\Program
    Files\NVIDIA GPU Computing Toolkit\CUDA\vx.x`, where x.x. is the version you installed),
    you will see that it also contains directories named bin, include, and lib, with
    several other directories.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您访问您的 CUDA 安装目录（默认情况下是 `C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\vx.x`，其中
    x.x 是您安装的版本），您会看到它还包含名为 bin、include 和 lib 的目录，以及几个其他目录。
- en: You need to copy the contents of each directory in the cuDNN to the respective
    directory in the CUDA installation directory (Figure [3-28](#Fig28)). In other
    words, copy the contents of bin from cuDNN to bin of CUDA; lib of cuDNN to lib
    of CUDA; and include of cuDNN to include of CUDA.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 您需要将 cuDNN 中每个目录的内容复制到 CUDA 安装目录中相应的目录（图 [3-28](#Fig28)）。换句话说，将 cuDNN 的 bin
    目录内容复制到 CUDA 的 bin 目录；将 cuDNN 的 lib 目录内容复制到 CUDA 的 lib 目录；将 cuDNN 的 include 目录内容复制到
    CUDA 的 include 目录。
- en: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig28_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig28_HTML.jpg)'
  id: totrans-232
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig28_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig28_HTML.jpg)'
- en: Figure 3-28
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-28
- en: cuDNN files extracted to the CUDA toolkit installation directory
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: cuDNN 文件已提取到 CUDA 工具包安装目录
- en: Once everything is copied, the CUDA Toolkit and cuDNN will be ready for your
    CUDA experiments.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 一切复制完成后，CUDA 工具包和 cuDNN 将为您的 CUDA 实验做好准备。
- en: Troubleshooting
  id: totrans-236
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 故障排除
- en: To avoid most of the installation errors, make sure you perform the conda upgrade
    step before installing any packages (Figure [3-29](#Fig29)).
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 为了避免大多数安装错误，确保在安装任何软件包之前执行 conda 升级步骤（图 [3-29](#Fig29)）。
- en: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig29_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig29_HTML.jpg)'
  id: totrans-238
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig29_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig29_HTML.jpg)'
- en: Figure 3-29
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-29
- en: Conda upgrade step running
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: Conda 升级步骤正在运行
- en: '[PRE20]'
  id: totrans-241
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: Following are a set of issues that you might encounter, and how to fix them.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是一系列您可能会遇到的问题以及如何解决它们。
- en: Matplotlib Pyplot Error
  id: totrans-243
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Matplotlib Pyplot 错误
- en: At the time of writing, there is an issue with a one specific build of the Matplotlib
    library available on conda. You can check it by running the following commands
    in the Python interpreter.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 在撰写本文时，conda 上可用的 Matplotlib 库的一个特定版本存在问题。您可以通过在 Python 解释器中运行以下命令来检查它。
- en: 'First, try importing the Matplotlib package. It should not generate any errors:'
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，尝试导入 Matplotlib 包。它不应该产生任何错误：
- en: '[PRE21]'
  id: totrans-246
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: 'Next, try importing the matplotlib.pyplot package:'
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，尝试导入 matplotlib.pyplot 包：
- en: '[PRE22]'
  id: totrans-248
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: If the issue exists, it will crash your python interpreter.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 如果存在这个问题，它将导致你的 Python 解释器崩溃。
- en: 'If you have this issue, in order to solve this, you need to uninstall the Matplotlib
    library from conda and reinstall it using pip:'
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你遇到这个问题，为了解决这个问题，你需要从 conda 中卸载 Matplotlib 库，并使用 pip 重新安装它：
- en: '[PRE23]'
  id: totrans-251
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: You only need to do this if you have that error; it is possible that the faulty
    build will be fixed by the time you read this.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 只有在你有那个错误时才需要这样做；有可能在你阅读这段内容的时候，有问题的构建已经被修复。
- en: Not Getting the Latest Versions
  id: totrans-253
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 无法获取最新版本
- en: While you are installing packages in conda, you might notice that you are not
    getting the latest available versions of the packages. This may be due to one
    of several reasons.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在 conda 中安装包时，你可能注意到你并没有获得这些包的最新版本。这可能是由于以下几种原因之一。
- en: Conda package manager considers the inter compatibility between all the packages
    in an environment when installing, and may decide to go with an older version
    of a package for compatibility reasons.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: Conda 包管理器在安装时会考虑环境中所有包之间的互操作性，并可能出于兼容性原因决定使用包的较旧版本。
- en: 'Conda also caches the packages it downloads and installs. Therefore, it might
    sometimes use an older cached version of a package rather than fetching the latest
    one. You clean the cache using the following command:'
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: Conda 也会缓存它下载和安装的包。因此，有时它可能会使用较旧的缓存版本而不是获取最新版本。你可以使用以下命令来清理缓存：
- en: '[PRE24]'
  id: totrans-257
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: Cleaning the cache might allow conda to fetch the new versions.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 清理缓存可能允许 conda 获取新版本。
- en: If not, you can force conda to install the specific version of a package by
    specifying it in the install command (you can find the available package versions
    from the Anaconda package lists):^([12](#Fn12))
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 如果不是这样，你可以通过在安装命令中指定版本来强制 conda 安装特定版本的包（你可以从 Anaconda 包列表中找到可用的包版本）:^([12](#Fn12))。
- en: '[PRE25]'
  id: totrans-260
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: Conda will analyze the package version specified and will let you know whether
    it is compatible with the packages already installed in the conda environment,
    and whether any package upgrades or downgrades are required. It will wait for
    you to confirm whether to proceed with the installation or not, so that you can
    safely check whether the specific version you want will work or not.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: Conda 将分析指定的包版本，并会告诉你它是否与 conda 环境中已安装的包兼容，以及是否需要升级或降级任何包。它将等待你确认是否继续安装，这样你可以安全地检查你想要的特定版本是否可以工作。
- en: Not Using the Latest Version of OpenCV
  id: totrans-262
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 未使用 OpenCV 的最新版本
- en: If you recall, when we were installing OpenCV, we did not use the latest version,
    instead we let conda install an older version (version 3.4.1 in this case). Why
    didn't we force conda to install the latest version as we discussed in the previous
    section?
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你记得，当我们安装 OpenCV 时，我们没有使用最新版本，而是让 conda 安装了一个较旧的版本（在这个例子中是版本 3.4.1）。为什么我们没有像前一小节讨论的那样强制
    conda 安装最新版本呢？
- en: 'Well, if you try to install OpenCV v4 using the following command:'
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 嗯，如果你尝试使用以下命令安装 OpenCV v4：
- en: '[PRE26]'
  id: totrans-265
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: you will get an error such as the one shown in Figure [3-30](#Fig30).
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 你将得到如图 [3-30](#Fig30) 所示的错误。
- en: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig30_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig30_HTML.jpg)'
  id: totrans-267
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig30_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig30_HTML.jpg)'
- en: Figure 3-30
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-30
- en: OpenCV v4 Conda install error
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: OpenCV v4 Conda 安装错误
- en: Basically, the OpenCV v4 conda package requires Python 3.8 or higher and CUDA
    version 11.0, which does not work with the other libraries—such as TensorFlow—that
    we are using.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 基本上，OpenCV v4 conda 包需要 Python 3.8 或更高版本以及 CUDA 版本 11.0，这与我们使用的其他库（如 TensorFlow）不兼容。
- en: So we will stick with the 3.4.x version for now, which has all the functionality
    we will be exploring in this book.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们现在将坚持使用 3.4.x 版本，这个版本包含了本书将要探索的所有功能。
- en: Dlib Build Errors
  id: totrans-272
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Dlib 构建错误
- en: 'While installing Dlib pip package, you might run into an error such as this
    (Figure [3-31](#Fig31)):'
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 当你安装 Dlib pip 包时，你可能会遇到如下错误（如图 [3-31](#Fig31)）：
- en: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig31_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig31_HTML.jpg)'
  id: totrans-274
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_3_Chapter/502073_1_En_3_Fig31_HTML.jpg](../images/502073_1_En_3_Chapter/502073_1_En_3_Fig31_HTML.jpg)'
- en: Figure 3-31
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-31
- en: Dlib build error
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: Dlib 构建错误
- en: This happens when CMake is either not installed properly, not added to the system
    path properly, or when the Windows command prompt window was not closed and reopened
    after CMake was installed.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 这种情况发生在 CMake 没有正确安装，或者没有正确添加到系统路径中，或者当 CMake 安装后 Windows 命令提示符窗口没有关闭并重新打开时。
- en: If you encounter this, make sure CMake was properly installed and added to the
    path, and make sure you closed and reopened the command prompt window after it
    was installed.
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您遇到这种情况，请确保 CMake 已正确安装并添加到路径中，并且确保在安装后关闭并重新打开命令提示符窗口。
- en: 'You can verify CMake is properly installed by running:'
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以通过运行以下命令来验证 CMake 是否正确安装：
