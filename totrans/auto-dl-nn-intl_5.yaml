  type: TYPE_NORMAL
- en: '[PRE46]'
  prefs: []
  type: TYPE_PRE
- en: 'Defining `forward` method:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE47]'
  prefs: []
  type: TYPE_PRE
- en: Since we defined One-shot Model Space using NNI, we can move on to implementing
    advanced One-shot algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: One-Shot Algorithms
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'At the moment, One-shot NAS is a young area and is developing rapidly. Many
    algorithms that implement the One-shot concept are being invented at the moment.
    This section will study two of the most popular One-shot algorithms: Efficient
    Neural Architecture Search (ENAS) and Differentiable Architecture Search (DARTS).'
  prefs: []
  type: TYPE_NORMAL
- en: Efficient Neural Architecture Search (ENAS)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Efficient Neural Architecture Search (ENAS) is a fast and inexpensive approach
    for automatic model design. In ENAS, a controller discovers neural network architectures
    by searching for an optimal subnet within a large Supernet. The controller is
    trained with a policy gradient to select a subnet that maximizes the expected
    reward on a validation set. Meanwhile, the model corresponding to the selected
    subnet is trained to minimize the loss function. Sharing parameters among child
    models allows ENAS to deliver strong empirical performances. It uses much fewer
    GPU hours than classical Multi-trial NAS approaches.
  prefs: []
  type: TYPE_NORMAL
- en: The original paper “Efficient Neural Architecture Search via Parameter Sharing”
    ([`https://arxiv.org/pdf/1802.03268.pdf`](https://arxiv.org/pdf/1802.03268.pdf))
    has a lot of formulas and can be too complicated. Let’s study the idea of this
    approach in a more practical way.
  prefs: []
  type: TYPE_NORMAL
- en: One of the key concepts in ENAS is Reinforcement Learning Controller or RL Controller
    or simply Controller. RL Controller contains a neural network *θ* that learns
    how to extract the most efficient subnets from the Supernet. The main task of
    the RL Controller is to find the optimal subnet in the Supernet, and it is trained
    according to the Reinforcement Learning algorithm. The Controller creates a subnet
    by defining a binary mask, where 1 activates layer and 0 disables it. Figure [5-10](#Fig10)
    shows how RL Controller selects subnet from the Supernet using binary mask.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_5_Chapter/526245_1_En_5_Fig10_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-10
  prefs: []
  type: TYPE_NORMAL
- en: RL Controller subnet selection
  prefs: []
  type: TYPE_NORMAL
- en: RL Controller picks a subnet and runs one or several training epochs. The core
    of the ENAS approach is the weight-sharing technique. The same layers in different
    subnets share the same weights. When Controller picks a subnet, it is not being
    trained from scratch; layers share weights that have already been trained. Weight-sharing
    concept is demonstrated in Figure [5-11](#Fig11).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_5_Chapter/526245_1_En_5_Fig11_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-11
  prefs: []
  type: TYPE_NORMAL
- en: Weight sharing
  prefs: []
  type: TYPE_NORMAL
- en: 'The weight-sharing approach allows the Controller to find the best architecture
    with small iterations and without retraining a new subnet from scratch each time.
    ENAS algorithm can be demonstrated using the following pseudo-code:'
  prefs: []
  type: TYPE_NORMAL
- en: 'We initialize a Supernet: `S`'
  prefs: []
  type: TYPE_NORMAL
- en: 'And load train and validation datasets: `train_ds, val_ds`'
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, the algorithm initializes ENAS Controller (Controller(S, θ)), where *θ*
    denotes Controller weights that help choose optimal subnet from `S` Supernet:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE48]'
  prefs: []
  type: TYPE_PRE
- en: 'Main training loop:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Supernet training loop:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE49]'
  prefs: []
  type: TYPE_PRE
- en: 'Controller implements stochastic policy, which means that it operates with
    probabilities. The most promising subnet has the highest probability to be chosen:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE50]'
  prefs: []
  type: TYPE_PRE
- en: 'Subnet network is trained once (i.e., only one training epoch) on a training
    batch using weight-sharing technique (Figure [5-11](#Fig11)):'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE51]'
  prefs: []
  type: TYPE_PRE
- en: 'Controller training loop. In this loop, Controller learns how to find a subnet
    that gives the highest reward, that is, accuracy on validation dataset:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE52]'
  prefs: []
  type: TYPE_PRE
- en: 'Controller chooses subnet and calculates its accuracy on validation dataset
    batch:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE53]'
  prefs: []
  type: TYPE_PRE
- en: 'Controller collects experience about subnet performance:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE54]'
  prefs: []
  type: TYPE_PRE
- en: 'Controller updates its weights *θ* according to new experience:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE55]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE56]'
  prefs: []
  type: TYPE_PRE
- en: 'After training, Controller returns the best subnet:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE57]'
  prefs: []
  type: TYPE_PRE
- en: In the algorithm described earlier, the Controller trains various subnets on
    the training dataset and then tests them on the validation dataset. By repeating
    this process many times, the Controller understands which architectures show the
    best accuracy and gradually reduces the exploration process to a limited number
    of architectures. At the end of the training process, the Controller converges
    to one or several of the best architectures.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s see how ENAS works in practice:'
  prefs: []
  type: TYPE_NORMAL
- en: Initially, the Controller has no assumptions about subnets, and it chooses random
    subnets for single training (subnet is trained for one training epoch only) using
    the weight-sharing technique as depicted in Figure [5-11](#Fig11).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: After, Controller generates subnets based on *θ* weights and collects accuracy
    on the validation dataset.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Based on experience gained in step 2, Controller updates *θ* values.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Figure [5-12](#Fig12) demonstrates steps 1–3 we described earlier.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_5_Chapter/526245_1_En_5_Fig12_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-12
  prefs: []
  type: TYPE_NORMAL
- en: ENAS in action. Initial epoch
  prefs: []
  type: TYPE_NORMAL
- en: Next, Controller chooses the most promising subnets to train using the weight-sharing
    technique and tests their accuracy on the validation dataset, as shown in Figure
    [5-13](#Fig13).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_5_Chapter/526245_1_En_5_Fig13_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-13
  prefs: []
  type: TYPE_NORMAL
- en: ENAS in action. Middle training
  prefs: []
  type: TYPE_NORMAL
- en: After training Supernet layers separately and updating *θ* experience, Controller
    converges to some subnet that it considers the best. Figure [5-14](#Fig14) illustrates
    it.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_5_Chapter/526245_1_En_5_Fig14_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-14
  prefs: []
  type: TYPE_NORMAL
- en: ENAS in action. End training
  prefs: []
  type: TYPE_NORMAL
- en: One-shot ENAS algorithm is close to RL Strategy from Multi-trial NAS, but with
    one significant difference. ENAS does not make a complete subnet training cycle
    but uses weight sharing and incremental one-step training. This difference dramatically
    speeds up the process of finding the best architecture.
  prefs: []
  type: TYPE_NORMAL
