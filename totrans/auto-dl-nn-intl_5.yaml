- en: ENAS is one of the first One-shot NAS algorithms that made the community rethink
    the whole approach to Neural Architecture Search. But ENAS may seem complicated
    to an inexperienced reader due to the complex internal algorithm and nontrivial
    tuning. In the next section, we’ll study a more elegant One-shot NAS technique.
  prefs: []
  type: TYPE_NORMAL
- en: Differentiable Architecture Search (DARTS)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'From calculus, we know that one of the most efficient ways to find the maxima
    of a continuous differentiable surface is to use derivatives and gradient-based
    methods. Neural networks use gradient descent based on the principle of computing
    derivatives. It would also be very convenient to reduce NAS to a differentiation
    problem, and the DARTS algorithm does that. DARTS algorithm was proposed in the
    original paper “DARTS: Differentiable Architecture Search” ([`https://arxiv.org/abs/1806.09055`](https://arxiv.org/abs/1806.09055)).'
  prefs: []
  type: TYPE_NORMAL
- en: 'Using binary masks, ENAS algorithm chooses subnets from the Supernet, but this
    approach is discrete. ENAS Controller jumps from one subnet to another, trying
    to discover the best one. DARTS algorithm makes the search space continuous; it
    relaxes the categorical choice of a particular operation to a softmax over all
    possible operations:'
  prefs: []
  type: TYPE_NORMAL
- en: '*o*^′(*x*) = ![$$ \sum \limits_i\frac{\exp \left({\alpha}_i\right)\ {o}_i(x)}{\sum
    \limits_j\exp \left({\alpha}_j\right)} $$](../images/526245_1_En_5_Chapter/526245_1_En_5_Chapter_TeX_IEq1.png)'
  prefs: []
  type: TYPE_NORMAL
- en: This means that the DARTS algorithm creates a Supernet derived from Model Space
    with sum reducing, and each choice operation is followed with *α*[*i*] parameter
    that specifies the weight of the operation. This makes the {*α*} parameter set
    trainable as Supernet weights. At the end of Supernet training, the choices with
    the highest *α* values ​​are chosen as the optimal subnet operations. Figure [5-15](#Fig15)
    illustrates this concept.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_5_Chapter/526245_1_En_5_Fig15_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-15
  prefs: []
  type: TYPE_NORMAL
- en: DARTS operation relaxation
  prefs: []
  type: TYPE_NORMAL
- en: During Supernet training using the DARTS algorithm, inefficient choices tend
    to be zeroed, and the search converges to a single architecture, which is the
    search result. Figure [5-16](#Fig16) visualizes the DARTS algorithm applied to
    the LeNetSupermodel. It gradually relaxes inefficient layers showing the best
    architecture.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_5_Chapter/526245_1_En_5_Fig16_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-16
  prefs: []
  type: TYPE_NORMAL
- en: DARTS in action
  prefs: []
  type: TYPE_NORMAL
