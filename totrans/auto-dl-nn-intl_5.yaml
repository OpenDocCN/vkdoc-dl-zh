- en: DARTS is a clear and straightforward One-shot algorithm. It has an intuitive
    logic and is easy to tune. But DARTS requires more memory than ENAS because DARTS
    trains the whole Supernet, while ENAS trains the various subnets only. Anyway,
    DARTS is a good choice to implement Neural Architecture Search.
  prefs: []
  type: TYPE_NORMAL
- en: GeneralSupernet Solving CIFAR-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We considered the application of One-shot algorithms on the simplest LeNet Model
    Space solving the trivial MNIST problem. These examples are good as entry points,
    but they don’t show the power of the One-shot NAS approach. In this section, we
    will examine a more complex Model Space for solving the CIFAR-10 problem.
  prefs: []
  type: TYPE_NORMAL
- en: Usually, One-shot NAS deals with cell-designed Supernets. As the name suggests,
    a cell-designed Supernet consists of various cells. Each **cell** accepts a different
    number of inputs and creates a computational graph using a deep learning block
    operation inside. Each **block operation** is a `LayerChoice` of deep learning
    layers. Let’s build a cell-designed Supernet called **GeneralSupernet** to solve
    the CIFAR-10 problem.
  prefs: []
  type: TYPE_NORMAL
- en: In GeneralSupernet, we define block operation as a `LayerChoice` from
  prefs: []
  type: TYPE_NORMAL
- en: '`SepConvBranch(3)`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`NonSepConvBranch(3)`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`SepConvBranch(5)`'
  prefs:
