- en: The best neural architecture found by One-shot NAS is (`Conv 5×5, Conv 5×5`),
    which is exactly the same as the result of Multi-trial NAS. Incredible, isn’t
    it? We found the same result in a much shorter time!
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: The results presented in Table [5-2](#Tab2) are only needed to rank various
    combinations of architectures to pick the best one. These results do not characterize
    the accuracy of the corresponding combination. One-shot models are typically only
    used to rank architectures in the Model Space. The best-performing architectures
    are retrained from scratch after the search is completed.
  prefs: []
  type: TYPE_NORMAL
- en: 'Intuitively, the One-shot NAS approach can be illustrated as follows: *during
    Supernet training, the best performing candidate layers play much more significant
    roles in the Data Flow Graph of the Supernet neural network*. This fact allows
    finding these candidates by deactivating others during the evaluation process.
    Figure [5-4](#Fig4) demonstrates this concept.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_5_Chapter/526245_1_En_5_Fig4_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-4
  prefs: []
  type: TYPE_NORMAL
- en: Different layer importance in the Supernet
  prefs: []
  type: TYPE_NORMAL
- en: Since we have an intuition about the One-shot NAS approach, we can start implementing
    it using the NNI framework.
  prefs: []
  type: TYPE_NORMAL
- en: Supernet Architecture
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As we saw in the previous section, one of the main concepts in One-shot NAS
    is the *Supernet*. Supernet is a single neural network that contains all the various
    neural network architectures from the defined Model Space. Supernet is trained
    once according to the One-shot NAS technique, and then the optimal subnet is selected.
    In Multi-trial NAS, each Data Flow Graph is tried separately. But One-shot NAS
    creates a single Supernet based on all possible Data Flow Graphs in Model Space.
  prefs: []
  type: TYPE_NORMAL
- en: NNI creates Model Space for One-shot NAS using `LayerChoice` and `InputChoice`
    operations. `LayerChoice` candidates form a special block in the Supernet. Each
    `LayerChoice` candidate transforms input tensor, and then their output tensors
    are reduced according to a particular One-shot NAS algorithm. The reduce operation
    can be `sum`, `mean`, or any other operation that merges tensors. `InputChoice`
    candidate tensors are reduced in Supernet in the same way as `LayerChoice` candidates.
    Figure [5-5](#Fig5) demonstrates Model Space constructed with `LayerChoice` and
    `InputChoice` operations.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_5_Chapter/526245_1_En_5_Fig5_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-5
  prefs: []
  type: TYPE_NORMAL
- en: Model Space
  prefs: []
  type: TYPE_NORMAL
- en: Model Space depicted in Figure [5-5](#Fig5) generates Supernet with reduce operations.
    Figure [5-6](#Fig6) demonstrates Supernet with `sum` as reduce operations.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_5_Chapter/526245_1_En_5_Fig6_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-6
  prefs: []
  type: TYPE_NORMAL
- en: One-shot NAS Supernet
  prefs: []
  type: TYPE_NORMAL
- en: Supernet is trained according to a specific One-shot NAS algorithm. After the
    training, each subnet is evaluated, and the subnetwork with the best accuracy
    forms the target neural architecture. Figure [5-7](#Fig7) demonstrates the evaluation
    of a specific subnet.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_5_Chapter/526245_1_En_5_Fig7_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-7
  prefs: []
  type: TYPE_NORMAL
- en: Subnet Evaluation
  prefs: []
  type: TYPE_NORMAL
- en: One-shot NAS sets a strict restriction on the `LayerChoice` and `InputChoice`
    candidates. Each of the candidates must return a tensor of the same size. Otherwise,
    it will be impossible to implement the reduce operation. In the previous section,
    candidates for `conv1` layer returned 16×28×28 tensors, and candidates for `conv2`
    layer returned 32×14×14 tensors. Figure [5-8](#Fig8) demonstrates this fact.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_5_Chapter/526245_1_En_5_Fig8_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-8
  prefs: []
  type: TYPE_NORMAL
- en: Same size tensor outputs
  prefs: []
  type: TYPE_NORMAL
- en: This restriction does not exist in Multi-trial NAS since TensorFlow and PyTorch
    frameworks allowed layer parameters to be calculated depending on the input tensor;
    therefore, `LayerChoice` candidates could return tensors of various sizes. In
    the case of One-shot NAS, we must be sure that the candidates return tensors of
    the same size. Otherwise, the NAS algorithm fails with an error.
  prefs: []
  type: TYPE_NORMAL
