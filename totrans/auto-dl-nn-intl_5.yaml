- en: 5. One-Shot Neural Architecture Search
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In the previous chapter, we explored Multi-trial Neural Architecture Search,
    which is a very promising approach. And the reader might wonder why Multi-trial
    NAS is called that way. Are there any other non-Multi-trial NAS approaches, and
    is it really possible to search for the optimal neural network architecture in
    some other way without trying it? It looks pretty natural that the only way to
    find the optimal solution is to try different elements in the search space. In
    fact, it turns out that this is not entirely true. There is an approach that allows
    you to find the best architecture by training some Supernet. And this approach
    is called **One-shot Neural Architecture Search**. As the name “one-shot” implies,
    this approach involves only one try or shot. Of course, this “shot” is much longer
    than single neural network training, but nevertheless, it saves a lot of time.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we will study what One-shot NAS is and how to design architectures
    for this approach. We will examine two popular One-shot algorithms: **Efficient
    Neural Architecture Search via Parameter Sharing** (**ENAS**) and **Differentiable
    Architecture Search** (**DARTS**). Of course, we will apply these algorithms to
    solve practical problems.'
  prefs: []
  type: TYPE_NORMAL
- en: '`NNI 2.7` version (which is used in this book) has ENAS algorithm implementation
    for the TensorFlow framework, but it doesn’t have one for the DARTS algorithm.
    Anyway, ENAS algorithm is one of the most popular and efficient One-shot NAS implementations,
    so TensorFlow users shouldn’t get too frustrated.'
  prefs: []
  type: TYPE_NORMAL
- en: One-Shot NAS in Action
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Interest in automating neural network architecture design is growing, but the
    classical Multi-trial NAS approach is too computationally expensive, requiring
    thousands and millions of different architectures to be trained from scratch.
    This fact, unfortunately, makes Multi-trial NAS not applicable in practice. Indeed,
    some Multi-trial experiments can take weeks or months on the most modern computing
    resources. A new One-shot NAS approach has been proposed to address this weakness
    of Multi-trial architecture search.
  prefs: []
  type: TYPE_NORMAL
- en: The best way to introduce One-shot NAS is to provide an example. Let’s say we
    are looking for the optimal architecture for the MNIST problem. And we have the
    Model Space shown in Figure [5-1](#Fig1).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_5_Chapter/526245_1_En_5_Fig1_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-1
  prefs: []
  type: TYPE_NORMAL
- en: Model Space for MNIST problem
  prefs: []
  type: TYPE_NORMAL
- en: 'Figure [5-1](#Fig1) shows the Model Space with two mutable layers. Each mutable
    layer has the following choices: `Conv 1×1`, `Conv 3×3`, and `Conv 5×5`. In a
    classic Multi-shot scenario, we would perform 3×3=9 trials for each combination
    of parameters and pick the best one. While the One-shot NAS approach follows another
    technique, we create one *Supernet* that merges or reduces the output of each
    mutable layer and train the resulting neural network only once. Figure [5-2](#Fig2)
    demonstrates this Supernet.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_5_Chapter/526245_1_En_5_Fig2_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-2
  prefs: []
  type: TYPE_NORMAL
- en: Supernet for MNIST problem
  prefs: []
  type: TYPE_NORMAL
- en: After training the Supernet, we evaluate it by activating each combination of
    layers and zeroing out other layers. Figure [5-3](#Fig3) illustrates this concept.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_5_Chapter/526245_1_En_5_Fig3_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-3
  prefs: []
  type: TYPE_NORMAL
- en: Supernet for MNIST problem
  prefs: []
  type: TYPE_NORMAL
- en: And finally, we pick the combination which demonstrated the best performance.
    This combination represents the result of the One-shot NAS algorithm. For example,
    if a combination (`Conv 5×5`, `Conv 5×5`) showed the best accuracy, then our target
    network design is `Conv 5×5` → `Conv 5×5` → `Linear` → `Linear`.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s summarize what exactly we did during the One-shot NAS algorithm:'
  prefs: []
  type: TYPE_NORMAL
- en: We created a single *Supernet* derived from Model Space.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We *trained* it.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We *evaluated* it nine times, activating different layers in turn.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We picked the *best* neural design for the problem.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The main benefit we have here is that we trained Supernet only once instead
    of training each of nine candidate networks! It speeds up the whole neural architecture
    search dramatically, because the network training is the longest part of NAS process.
  prefs: []
  type: TYPE_NORMAL
- en: 'A reader may have a fair question: *“But wait! We trained a single Supernet
    network. All candidate layers learned to work together! But then we decided to
    break it into different parts, leaving the same weights. This is nonsense!”* I
    agree. This is a very counterintuitive concept. Indeed, all layers were trained
    together, and they learned to complement and help each other in solving the problem.
    Surely you can’t just throw out some layers from a neural network searching for
    the best architecture. But the most fantastic thing about One-shot NAS is that
    you can! There is still no sufficient mathematical basis for this approach, but
    it works in practice. Let’s implement this approach in practice using the example
    we considered earlier. In this section, we will not be using the NNI toolkit.
    Here, our goal is to get an intuition about the One-shot NAS approach.'
  prefs: []
  type: TYPE_NORMAL
