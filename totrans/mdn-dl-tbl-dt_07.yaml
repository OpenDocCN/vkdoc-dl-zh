  id: totrans-506
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尼古洛夫，科尔代夫，斯泰福诺娃. (2018). 基于循环神经网络分类器的网络入侵检测系统概念. *2018 IEEE 第27届国际科学会议电子学——ET*,
    第1–4页.
- en: Prajyot, M.A. (2018). Review on Intrusion Detection System Using Recurrent Neural
    Network with Deep Learning.
  id: totrans-507
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 普拉约特. (2018). 基于深度学习的入侵检测系统综述.
- en: Wang, S., Xia, C., & Wang, T. (2019). A Novel Intrusion Detector Based on Deep
