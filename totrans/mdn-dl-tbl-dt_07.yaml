    Cloud (BigDataSecurity), IEEE Intl Conference on High Performance and Smart Computing,
    (HPSC) and IEEE Intl Conference on Intelligent Data and Security (IDS)*, 300–305.
  id: totrans-508
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 王思，夏晨，王涛. (2019). 基于深度学习混合方法的创新入侵检测器. *2019 IEEE 第5届国际大数据安全云（BigDataSecurity）会议，IEEE
    高性能和智能计算国际会议（HPSC）以及IEEE 智能数据安全国际会议（IDS）*, 第300–305页.
- en: 'For a sample code notebook, see Kaggle user Kouki’s solution to the Mechanisms
    of Action competition, which uses a recurrent tabular model: [www.​kaggle.​com/​code/​kokitanisaka/​moa-ensemble/​notebook?​scriptVersionId=​​48123609](https://www.kaggle.com/code/kokitanisaka/moa-ensemble/notebook%253FscriptVersionId%253D48123609).'
  id: totrans-509
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一个示例代码笔记本，请参阅 Kaggle 用户 Kouki 对“作用机制”竞赛的解决方案，该方案使用循环表格模型：[www.kaggle.com/code/kokitanisaka/moa-ensemble/notebook?scriptVersionId=48123609](https://www.kaggle.com/code/kokitanisaka/moa-ensemble/notebook%253FscriptVersionId%253D48123609).
- en: Key Points
  id: totrans-510
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键点
- en: This chapter discussed three popular forms of recurrent models; demonstrated
    applications of recurrent models to text, time-series, and multimodal data; and
    proposed several methods to directly apply recurrent layers to tabular data.
  id: totrans-511
  prefs: []
  type: TYPE_NORMAL
  zh: 本章讨论了三种流行的循环模型形式；展示了循环模型在文本、时间序列和多模态数据上的应用；并提出了几种将循环层直接应用于表格数据的方法。
- en: Recurrent neurons process sequence data iteratively by “snaking” the output
    from the previous timestamp back into the input as a hidden state, combined with
    the current timestamp’s input. This allows the model to effectively learn patterns
    through time as an ordered sequence.
  id: totrans-512
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 循环神经元通过将前一个时间戳的输出“蜿蜒”回输入作为隐藏状态，并结合当前时间戳的输入来迭代地处理序列数据。这使得模型能够有效地通过有序序列学习时间上的模式。
- en: LSTMs improve on standard recurrent neurons by addressing the vanishing gradient
    problem. They use a gated mechanism, which allows the model to access crucial
    information from older timestamps, allowing for gradients that still retain meaningful
    information flowing backward all the way to the beginning timestamp.
  id: totrans-513
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LSTM 通过解决梯度消失问题改进了标准循环神经元。它们使用门控机制，允许模型从较旧的时间戳访问关键信息，从而使仍然保留有意义信息的梯度可以向后流动到起始时间戳。
- en: Exploding gradients in recurrent models can be solved using gradient clipping.
  id: totrans-514
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用梯度裁剪可以解决循环模型中的梯度爆炸问题。
- en: GRU is a modification to LSTM to simplify its training process by scraping the
    long-term memory unit from LSTMs and introducing update and reset gates as cheaper
    alternatives.
  id: totrans-515
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GRU 是对 LSTM 的改进，通过从 LSTM 中移除长期记忆单元并引入更新和重置门作为更经济的替代方案来简化其训练过程。
- en: 'To use recurrent layers to model text data: vectorize the text dataset, pass
    through an embedding layer to obtain embedded vectors, and pass through a stack
    of recurrent layers.'
  id: totrans-516
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要使用循环层来建模文本数据：将文本数据集向量化，通过嵌入层获取嵌入向量，然后通过一系列循环层。
- en: 'There are three general templates of time-series prediction: next-timestep
    forecasting, time-dependent target prediction, and time-independent time prediction.
    Deep learning approaches to time-series modeling often work well on high-frequency
    time-series datasets, such as high-volume stock datasets or audio waves. Such
    architectures often perform well with convolutional heads that “smooth out” and
    extract key information-rich sequences for a recurrent layer stack to process.'
  id: totrans-517
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 时间序列预测有三种通用模板：下一时间步预测、时间依赖性目标预测和时间独立性时间预测。深度学习在时间序列建模上通常对高频时间序列数据集表现良好，例如高量级的股票数据集或音频波。这样的架构通常与“平滑”和提取关键信息丰富的序列以供循环层堆栈处理的卷积头表现良好。
- en: By constructing multi-input network architectures, you can create models that
    simultaneously accept different data modalities. This can be used to process data
    for which there is both a text component and a tabular component, which is a common
    occurrence in online platform and business data science contexts.
  id: totrans-518
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过构建多输入网络架构，您可以创建同时接受不同数据模态的模型。这可以用于处理既有文本组件又有表格组件的数据，这在在线平台和商业数据科学环境中很常见。
- en: To understand the premise, motivation, and justification of direct application
    of recurrent models (and all other nontraditional mechanisms) to tabular data,
    we must understand the reversion of the traditional modeling paradigm “if the
    data has [property], then apply [model built for data with this property]” instead
    as “if we apply [model built for data with this property] to [data without this
    property in raw form], then the resulting data will realize [property].” The realization
    of novel properties as caused by mechanisms assuming such properties opens up
    the door for new, previously sealed-off techniques and methods.
  id: totrans-519
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要理解直接将循环模型（以及所有其他非传统机制）应用于表格数据的前提、动机和合理性，我们必须理解传统建模范式的逆转：“如果数据具有[属性]，则应用[为具有此属性的数据构建的模型]”，而不是“如果我们将[为具有此属性的数据构建的模型]应用于[在原始形式中不具有此属性的数据]，则生成的数据将实现[属性]。”由假设此类属性而产生的机制引起的属性实现开辟了新的、以前封闭的技术和方法的大门。
- en: By processing a tabular input with fully connected layers before passing into
    recurrent layers, the tabular input can be mapped to the optimal sequential representation.
    Applying convolutional layers before inputting to the recurrent layer stack can
    improve realization of contiguous semantics.
  id: totrans-520
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过在传递到循环层之前用全连接层处理表格输入，可以将表格输入映射到最优的序列表示。在输入到循环层堆栈之前应用卷积层可以提高连续语义的实现。
- en: We can also task full -connected layers to learn the optimal initial hidden
    state of the network and run it on a dummy stimulus sequence (one vector, transformer-style
    positional encoding, etc.) to produce a sequentially informed result. This method
    does not require the “input” to the mechanism (i.e., the learned optimal hidden
    state) to be assumed as ordered, but nevertheless produces an ordered result that
    can be processed sequentially by another recurrent layer.
  id: totrans-521
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们还可以让全连接层学习网络的最佳初始隐藏状态，并在一个虚拟刺激序列（一个向量、transformer风格的定位编码等）上运行，以产生一个按顺序提供的信息结果。这种方法不需要将机制“输入”（即学到的最佳隐藏状态）假设为有序，但仍然产生了一个可以由另一个循环层按顺序处理的有序结果。
- en: By combining the two previously discussed methods, we can construct a model
    that derives the optimal input sequence and the optimal hidden state (and optimal
    cell state for LSTMs) from the tabular input. This allows the recurrent modeling
    mechanism to be informed and optimized in heavy connectivity with respect to the
    input and increases expressivity and topological complexity/nonlinearity.
  id: totrans-522
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过结合之前讨论的两种方法，我们可以构建一个模型，从表格输入中推导出最佳输入序列和最佳隐藏状态（以及对于LSTMs的最佳细胞状态）。这使得循环建模机制能够在与输入的重连性方面得到信息并优化，从而增加了表达性和拓扑复杂性/非线性。
- en: In the next chapter, we will build upon recurrent models to explore the attention
    mechanism – both in its original introduction as a supercharger mechanism for
    recurrent models and as the key player in the transformer architecture – and how
    it can be applied to tabular data.
  id: totrans-523
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将基于循环模型来探索注意力机制——无论是作为循环模型的超级充电机制的原初引入，还是作为transformer架构中的关键角色——以及它如何应用于表格数据。
