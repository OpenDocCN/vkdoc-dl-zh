    and ![$$ \tilde{f}\ (x)-\sigma (x) $$](../images/463356_1_En_7_Chapter/463356_1_En_7_Chapter_TeX_IEq31.png).
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 黑盒函数f(x)（实线）、随机选择的点（用十字标记）以及六个新选择的点（用十字标记），代理函数（虚线），以及获取函数 ![$$ {\tilde{a}}_{UCB}\
    (x) $$](../images/463356_1_En_7_Chapter/463356_1_En_7_Chapter_TeX_IEq29.png)（点线），调整以适应图表。灰色区域是位于线
    ![$$ \tilde{f}\ (x)+\sigma (x) $$](../images/463356_1_En_7_Chapter/463356_1_En_7_Chapter_TeX_IEq30.png)
    和 ![$$ \tilde{f}\ (x)-\sigma (x) $$](../images/463356_1_En_7_Chapter/463356_1_En_7_Chapter_TeX_IEq31.png)
    之间的区域。
- en: Note the dashed line. Now our surrogate function approximates the black-box
    function quite well, especially around the real maximum. Using this surrogate
    function, we can find a very good approximation of our original function with
    just 11 evaluations in total! Keep in mind that we don’t have any additional information
    about *f*, except the 11 evaluations.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 注意虚线。现在我们的代理函数很好地逼近了黑盒函数，尤其是在真实最大值附近。使用这个代理函数，我们只需总共11次评估就能找到原始函数的一个非常好的近似！记住，我们除了这11次评估外，没有关于*f*的任何额外信息。
- en: Now let’s see what happens with the acquisition function ![$$ {\tilde{a}}_{UCB}(x)
    $$](../images/463356_1_En_7_Chapter/463356_1_En_7_Chapter_TeX_IEq32.png), and
    let’s check how fast we can find the maximum. In this case, we’ll use *η* = 3.0,
    to get a better balance between the maximum of the surrogate function and its
    variance. In Figure [7-20](#Fig20), you can see the result after just adding one
    single additional point, marked by a black circle. We have already a quite good
    approximation of the real maximum!
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来看看获取函数 ![$$ {\tilde{a}}_{UCB}(x) $$](../images/463356_1_En_7_Chapter/463356_1_En_7_Chapter_TeX_IEq32.png)
    会发生什么，并检查我们多快能找到最大值。在这种情况下，我们将使用 *η* = 3.0，以获得代理函数最大值和其方差之间的更好平衡。在图[7-20](#Fig20)中，你可以看到仅添加一个额外点（用黑色圆圈标记）后的结果。我们已经得到了一个相当好的真实最大值的近似！
