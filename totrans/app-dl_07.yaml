  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 图7-18
- en: Overview of the black-box function f(x) (solid line), the randomly selected
    points (marked with crosses), and with the new selected point around x ≈ 27 (marked
    by a circle), the surrogate function (dashed line), and the acquisition function
    a[UCB](x) (dotted line), shifted to fit in the plot. The gray area is the region
    contained between the lines ![$$ \tilde{f}\ (x)+\sigma (x) $$](../images/463356_1_En_7_Chapter/463356_1_En_7_Chapter_TeX_IEq27.png)
    and ![$$ \tilde{f}\ (x)-\sigma (x) $$](../images/463356_1_En_7_Chapter/463356_1_En_7_Chapter_TeX_IEq28.png).
