  zh: 图 7-21
- en: Overview of the black-box function f(x) (solid line), the randomly selected
    points with the additional selected points (marked by crosses), the surrogate
    function (dashed line), and the acquisition function ![$$ {\tilde{a}}_{UCB}(x)
    $$](../images/463356_1_En_7_Chapter/463356_1_En_7_Chapter_TeX_IEq36.png) (dotted
    line), shifted to fit in the plot. The gray area is the region contained between
    the lines ![$$ \tilde{f}\ (x)+\sigma (x) $$](../images/463356_1_En_7_Chapter/463356_1_En_7_Chapter_TeX_IEq37.png)
    and ![$$ \tilde{f}\ (x)-\sigma (x) $$](../images/463356_1_En_7_Chapter/463356_1_En_7_Chapter_TeX_IEq38.png).
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 黑盒函数 f(x)（实线）、随机选择的点以及额外选择的点（用十字标记）、代理函数（虚线）和获取函数 ![$$ {\tilde{a}}_{UCB}(x)
    $$](../images/463356_1_En_7_Chapter/463356_1_En_7_Chapter_TeX_IEq36.png)（点线），调整以适应图表。灰色区域是位于线
    ![$$ \tilde{f}\ (x)+\sigma (x) $$](../images/463356_1_En_7_Chapter/463356_1_En_7_Chapter_TeX_IEq37.png)
    和 ![$$ \tilde{f}\ (x)-\sigma (x) $$](../images/463356_1_En_7_Chapter/463356_1_En_7_Chapter_TeX_IEq38.png)
    之间的区域。
- en: If we choose to make *η* smaller, the point would be closer to the maximum,
    and if we choose to make it bigger, the point would be closer to the point with
    the highest variance, between 25 and roughly 32\. Now let’s add an additional
    point and see what happens. In Figure [7-22](#Fig22), you can see how the method
    now chooses a point close to another region with high variance, between 10 and
    roughly 22, again, marked by a black circle.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们选择使 *η* 更小，点会更接近最大值，如果我们选择使其更大，点会更接近具有最高方差（大约在 25 到 32 之间）的点。现在让我们添加一个额外的点，看看会发生什么。在图
    [7-22](#Fig22) 中，你可以看到方法现在选择了一个接近另一个具有高方差区域（大约在 10 到 22 之间）的点，同样用黑色圆圈标记。
- en: '![../images/463356_1_En_7_Chapter/463356_1_En_7_Fig22_HTML.jpg](../images/463356_1_En_7_Chapter/463356_1_En_7_Fig22_HTML.jpg)'
  id: totrans-280
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_7_Chapter/463356_1_En_7_Fig22_HTML.jpg](../images/463356_1_En_7_Chapter/463356_1_En_7_Fig22_HTML.jpg)'
- en: Figure 7-22
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7-22
- en: Overview of the black-box function f(x) (solid line), the randomly selected
    points (marked by crosses), and the additional selected point (marked by a black
    circle), the surrogate function (dashed line), and the acquisition function ![$$
    {\tilde{a}}_{UCB}(x) $$](../images/463356_1_En_7_Chapter/463356_1_En_7_Chapter_TeX_IEq39.png)
    (dotted line), shifted to fit in the plot. The gray area is the region contained
    between the lines ![$$ \tilde{f}\ (x)+\sigma (x) $$](../images/463356_1_En_7_Chapter/463356_1_En_7_Chapter_TeX_IEq40.png)
    and ![$$ \tilde{f}\ (x)-\sigma (x) $$](../images/463356_1_En_7_Chapter/463356_1_En_7_Chapter_TeX_IEq41.png).
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 黑盒函数 f(x)（实线）、随机选择的点（用十字标记）、额外选择的点（用黑色圆圈标记）、代理函数（虚线）和获取函数 ![$$ {\tilde{a}}_{UCB}(x)
    $$](../images/463356_1_En_7_Chapter/463356_1_En_7_Chapter_TeX_IEq39.png)（点线），调整以适应图表。灰色区域是位于线
    ![$$ \tilde{f}\ (x)+\sigma (x) $$](../images/463356_1_En_7_Chapter/463356_1_En_7_Chapter_TeX_IEq40.png)
    和 ![$$ \tilde{f}\ (x)-\sigma (x) $$](../images/463356_1_En_7_Chapter/463356_1_En_7_Chapter_TeX_IEq41.png)
    之间的区域。
- en: And, finally, the method refines the maximum area around 15, as you can see
    in Figure [7-23](#Fig23), adding a point around 14, marked by the black circle.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，方法在 15 附近细化了最大区域，如图 [7-23](#Fig23) 所示，添加了一个标记为黑色圆圈的点。
- en: '![../images/463356_1_En_7_Chapter/463356_1_En_7_Fig23_HTML.jpg](../images/463356_1_En_7_Chapter/463356_1_En_7_Fig23_HTML.jpg)'
  id: totrans-284
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_7_Chapter/463356_1_En_7_Fig23_HTML.jpg](../images/463356_1_En_7_Chapter/463356_1_En_7_Fig23_HTML.jpg)'
- en: Figure 7-23
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7-23
- en: Overview of the black-box function f(x) (solid line), the randomly selected
    points with the additional selected points (marked by crosses), the surrogate
    function (dashed line), and the acquisition function ![$$ {\tilde{a}}_{UCB}(x)
    $$](../images/463356_1_En_7_Chapter/463356_1_En_7_Chapter_TeX_IEq42.png) (dotted
    line), shifted to fit in the plot. The gray area is the region contained between
    the lines ![$$ \tilde{f}\ (x)+\sigma (x) $$](../images/463356_1_En_7_Chapter/463356_1_En_7_Chapter_TeX_IEq43.png)
    and ![$$ \tilde{f}\ (x)-\sigma (x) $$](../images/463356_1_En_7_Chapter/463356_1_En_7_Chapter_TeX_IEq44.png).
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 黑盒函数 f(x)（实线），随机选择的点以及额外选择的点（用十字标记），代理函数（虚线），以及获取函数 ![~a_{UCB}(x)](../images/463356_1_En_7_Chapter/463356_1_En_7_Chapter_TeX_IEq42.png)（点线），已移动以适应图表。灰色区域是位于线
    ![~f(x)+σ(x)](../images/463356_1_En_7_Chapter/463356_1_En_7_Chapter_TeX_IEq43.png)
    和 ![~f(x)-σ(x)](../images/463356_1_En_7_Chapter/463356_1_En_7_Chapter_TeX_IEq44.png)
    之间的区域。
- en: The previous discussion and comparison of the behavior of the two types of acquisition
    functions should have made clear how, depending on what strategy you want to apply
    to approximate your black-box function, you should choose the right acquisition
    function.
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 前面的讨论和比较两种类型获取函数的行为应该已经清楚地说明了，根据你想应用什么策略来近似你的黑盒函数，你应该选择合适的获取函数。
- en: Note
  id: totrans-288
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: Different types of acquisition functions will give different strategies in approximating
    the black-box function. For example, *a*[*UCB*](*x*) will add points in regions
    with the highest variance, while ![$$ {\tilde{a}}_{UCB}(x) $$](../images/463356_1_En_7_Chapter/463356_1_En_7_Chapter_TeX_IEq45.png)
    will add points finding a balance, regulated by *η*, between the maximum of the
    surrogate function and areas with high variance.
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 不同的获取函数类型在近似黑盒函数时将给出不同的策略。例如，*a*[*UCB*](*x*) 将在方差最高的区域添加点，而 ![~a_{UCB}(x)](../images/463356_1_En_7_Chapter/463356_1_En_7_Chapter_TeX_IEq45.png)
    将通过 *η* 调节代理函数的最大值和具有高方差区域之间的平衡来添加点。
- en: An analysis of all the different types of acquisition functions would exceed
    the scope of this book. A good deal of research and reading of published papers
    is required to gain sufficient experience and understand how different acquisition
    functions work and behave.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 对所有不同类型的获取函数的分析将超出本书的范围。要获得足够的经验并了解不同的获取函数如何工作和表现，需要进行大量的研究和阅读已发表的论文。
- en: 'If you want to use Bayesian optimization with your TensorFlow model, you don’t
    have to develop the method completely from scratch. You can try the library GPflowOpt
    that is described in a paper by Nicolas Knudde et al., “GPflowOpt: A Bayesian
    Optimization Library using TensorFlow,” available at [`https://goo.gl/um4LSy`](https://goo.gl/um4LSy)
    or [`arXiv.org`](http://arxiv.org) .'
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: '如果你想在 TensorFlow 模型中使用贝叶斯优化，你不必完全从头开始开发该方法。你可以尝试由 Nicolas Knudde 等人描述的库 GPflowOpt，该库在论文“GPflowOpt:
    A Bayesian Optimization Library using TensorFlow”中有描述，可在 [https://goo.gl/um4LSy](https://goo.gl/um4LSy)
    或 [arXiv.org](http://arxiv.org) 上找到。'
- en: Sampling on a Logarithmic Scale
  id: totrans-292
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 对数尺度上的采样
- en: There is a last small subtlety that I would like to discuss. Sometimes, you
    will find yourself in a situation in which you want to try a big range of possible
    values for a parameter, but you know from experience that the best value of it
    is probably in a specific range. Suppose you want to find the best value for the
    learning rate for your model, and you decide to test values from 10^(−4) to 1,
    but you know, or at least suspect, that your best value probably lies between
    10^(−3) and 10^(−4). Now let’s suppose you are working with grid search, and you
    sample 1000 points. You may think you have enough points, but you will get
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 有一个最后的微小细节我想讨论一下。有时，你可能会发现自己处于想要尝试一个参数可能值的广泛范围的情况，但你根据经验知道最佳值可能在一个特定的范围内。假设你想找到你模型的学习率最佳值，你决定测试从
    10^(-4) 到 1 的值，但你知道，或者至少怀疑，最佳值可能位于 10^(-3) 和 10^(-4) 之间。现在假设你正在使用网格搜索，并采样 1000
    个点。你可能认为你有了足够的点，但你将会得到
- en: 0 points between 10^(−4) and 10^(−3)
  id: totrans-294
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 介于 10^(-4) 和 10^(-3) 之间的 0 个点
- en: 8 points between 10^(−3) and 10^(−2)
  id: totrans-295
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 介于 10^(-3) 和 10^(-2) 之间的 8 个点
- en: 89 points between 10^(−1) and 10^(−2)
  id: totrans-296
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 介于 10^(-1) 和 10^(-2) 之间的 89 个点
- en: 899 points between 1 and 10^(−1)
  id: totrans-297
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 介于 1 和 10^(-1) 之间的 899 个点
- en: You get a lot more points in the less interesting ranges, and zero where you
    want them. In Figure [7-24](#Fig24), you can see the distribution of the points.
    Note that on the *x* axis, I am using a logarithmic scale. You can clearly see
    how you get much more points for bigger values of the learning rate.
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 在不太有趣的范围内，你得到了更多的点，而在你想要的地方得到零点。在图[7-24](#Fig24)中，你可以看到点的分布。请注意，在*x*轴上，我使用了对数刻度。你可以清楚地看到，对于较大的学习率值，你得到了更多的点。
- en: '![../images/463356_1_En_7_Chapter/463356_1_En_7_Fig24_HTML.jpg](../images/463356_1_En_7_Chapter/463356_1_En_7_Fig24_HTML.jpg)'
  id: totrans-299
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_7_Chapter/463356_1_En_7_Fig24_HTML.jpg](../images/463356_1_En_7_Chapter/463356_1_En_7_Fig24_HTML.jpg)'
- en: Figure 7-24
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 图7-24
- en: Distribution of 1000 points selected with grid search on a logarithmic x scale
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 使用网格搜索在以对数x轴选择的1000个点上的分布
- en: You probably want to sample in a much finer way for smaller values of the learning
    rate than for bigger ones. What you should do is sample your points on a logarithmic
    scale. Let me explain. The basic idea is that you want to sample the same number
    of points between 10^(−4) and 10^(−3), 10^(−3) and 10^(−2), 10^(−1) and 10^(−2),
    and 10^(−1) and 1\. To do this, you can use the following Python code. First,
    select a random number between 0 and subtract the absolute value of the highest
    number of the power of 10 you have, in this case -4.
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能希望对于学习率较小的值以更细的方式采样，而不是对于较大的值。你应该在以对数刻度上采样你的点。让我来解释一下。基本思想是，你希望在10^(−4)和10^(−3)、10^(−3)和10^(−2)、10^(−1)和10^(−2)、10^(−1)和1之间采样相同数量的点。为此，你可以使用以下Python代码。首先，选择一个介于0和减去10的幂的最高绝对值之间的随机数，在这个例子中是-4。
- en: '[PRE19]'
  id: totrans-303
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Then your array with the selected points can be created with
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 然后你可以创建包含所选点的数组
- en: '[PRE20]'
  id: totrans-305
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: In Figure [7-25](#Fig25), you can see now how the distributions of the points
    contained in the array `points2` is completely flat, as we wanted.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 在图[7-25](#Fig25)中，你现在可以看到包含在数组`points2`中的点的分布是完全平坦的，正如我们希望的那样。
- en: '![../images/463356_1_En_7_Chapter/463356_1_En_7_Fig25_HTML.jpg](../images/463356_1_En_7_Chapter/463356_1_En_7_Fig25_HTML.jpg)'
  id: totrans-307
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_7_Chapter/463356_1_En_7_Fig25_HTML.jpg](../images/463356_1_En_7_Chapter/463356_1_En_7_Fig25_HTML.jpg)'
- en: Figure 7-25
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 图7-25
- en: Distribution of 1000 points selected with grid search on a logarithmic x scale
    , with the modified selection method
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 使用网格搜索在以对数x轴选择的1000个点上的分布，使用修改后的选择方法
- en: 'You get 250 points in each region, as you can easily check with this code for
    the range 10^(−3) and 10^(−4) (for the other ranges simply change the numbers
    in the code):'
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 你在每个区域都得到250个点，你可以通过这段代码很容易地检查范围10^(−3)和10^(−4)（对于其他范围只需更改代码中的数字）：
- en: '[PRE21]'
  id: totrans-311
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: Now you can see how you have the same number of points between the different
    powers of 10\. With this simple trick, you can ensure that you also get enough
    points in the region of your chosen range, where, otherwise, you would get almost
    no points. Remember that in this example, with 1000 points, with the standard
    method, we get zero points between 10^(−3) and 10^(−4). This range is the most
    interesting for the learning rate, so you want to have enough points in this range
    to optimize your model. Note that the same applies to random search. It works
    in the exact same way.
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你可以看到在10的不同幂之间，你得到了相同数量的点。通过这个简单的技巧，你可以确保在所选范围的区域也得到足够多的点，否则你几乎得不到任何点。记住，在这个例子中，有1000个点，使用标准方法，我们在10^(−3)和10^(−4)之间得到零点。这个范围对于学习率来说是最有趣的，所以你希望在这个范围内有足够的点来优化你的模型。请注意，这同样适用于随机搜索。它以完全相同的方式工作。
- en: Hyperparameter Tuning with the Zalando Dataset
  id: totrans-313
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用Zalando数据集进行超参数调整
- en: To give you a concrete example of how hyperparameter tuning works, let’s apply
    what we have learned in a simple case. Let’s start with the data, as usual. We’ll
    use the Zalando dataset from Chapter [3](463356_1_En_3_Chapter.xhtml). For a complete
    discussion, please refer to that chapter. Let’s quickly load and prepare the data
    and then discuss tuning.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 为了给你一个超参数调整如何工作的具体例子，让我们应用我们所学到的知识在一个简单的案例中。让我们从数据开始，像往常一样。我们将使用第[3](463356_1_En_3_Chapter.xhtml)章中的Zalando数据集。关于完整的讨论，请参阅该章节。让我们快速加载数据并准备，然后讨论调整。
- en: First, as usual, load the necessary libraries.
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，像往常一样，加载必要的库。
- en: '[PRE22]'
  id: totrans-316
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: You will require the necessary CSV files in the folder in which your Jupyter
    notebook is. To get them, refer again to Chapter [3](463356_1_En_3_Chapter.xhtml).
    Once you have the files in the same folder as your notebook, you can simply load
    the data with
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 你将需要在你的Jupyter笔记本所在的文件夹中提供必要的CSV文件。要获取它们，请再次参考第[3](463356_1_En_3_Chapter.xhtml)章。一旦你将文件放在与你的笔记本相同的文件夹中，你就可以简单地使用以下方式加载数据：
- en: '[PRE23]'
  id: totrans-318
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: 'Remember: We have 60,000 observations in the train dataset and 10,000 in the
    dev dataset. For example, printing the shape of the `data_train` array with'
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  id: totrans-320
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: will give you (60000, 785). Remember that one of the columns in the `data_train`
    array contains the labels, and 784 are the gray values of the image pixels (that
    have a size of 28 × 28 pixels). We must separate the labels from the features
    (the gray values of the pixels), then we need to reshape the arrays.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE25]'
  id: totrans-322
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: Checking the dimensions with
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE26]'
  id: totrans-324
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: will give us
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE27]'
  id: totrans-326
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: as desired. (For a detailed discussion on data preparation for this dataset,
    refer to Chapter [3](463356_1_En_3_Chapter.xhtml).) We must, of course, do the
    same for the dev dataset.
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE28]'
  id: totrans-328
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: Now let’s normalize the features and transform everything in a `numpy` array
    .
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE29]'
  id: totrans-330
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: 'We have prepared the data as required. Now let’s move on to the model. Let’s
    start with something easy. As the metric, we’ll use accuracy for this example,
    because the dataset is balanced. Let’s consider a network with just one layer
    and see what number of neurons gives us the best accuracy. Our hyperparameter
    in this example will be the number of neurons in the hidden layer. Basically,
    we will have to build a new network for each value of the hyperparameter (the
    number of neurons in the hidden layer) and train it. We will require two functions:
    one to build the network and one to train it. To build the model, we can define
    the following function :'
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE30]'
  id: totrans-332
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: 'You should understand this function, since we have used the code several times
    in the book already. This function has an input parameter: `number_neurons` ,
    that will contain, as the name indicates, the number of neurons in the hidden
    layer. But there is a small difference: the functions return the tensors we must
    refer to during the training, for example, when we want to evaluate the `cost`
    tensor during training. If we don’t return them to the caller, they will be visible
    only inside this function, and we will not be able to train this model. The function
    to train the model will look like this:'
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE31]'
  id: totrans-334
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: You have already seen a function very similar to this one several times. The
    main parts should be clear. You will find a few things that are new. First, we
    build the model in the function itself with
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE32]'
  id: totrans-336
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: 'and, additionally, we evaluate the accuracy on the train dataset and on the
    dev dataset and return the values to the caller. In this way, we can run a loop
    for several values of the number of neurons in the hidden layer and get the accuracies.
    Note, this time, that the function has an additional input parameter: `number_neurons`.
    We must pass this number to the function that builds the model.'
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s suppose we choose the following parameters: minibatch size = 50, we train
    for 100 epochs, the learning rate =0.00 , and we build our model with 15 neurons
    in the hidden layer.'
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
- en: We then run the model.
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE33]'
  id: totrans-340
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: For the train dataset, we get 0.75755 accuracy and for the dev dataset 0.754
    accuracy. Can we do better? Well, we can surely do a grid search to start with.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE34]'
  id: totrans-342
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: Keep in mind that this will take quite some time. Three thousand neurons is
    quite a high number, so be warned, in case you want to attempt this. We get the
    results, as found in Table [7-1](#Tab1).
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，这将花费相当长的时间。3000个神经元是一个相当高的数字，所以如果你想要尝试这个，请小心。我们得到了如表[7-1](#Tab1)所示的结果。
- en: Table 7-1
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 表7-1
- en: Overview of the Accuaracy on the Train and Test Datasets for a Different Number
    of Neurons
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 不同神经元数量下训练和测试数据集准确率的概述
- en: '| Number of Neurons | Accuracy on the Train Dataset | Accuracy on the Test
    Dataset |'
  id: totrans-346
  prefs: []
  type: TYPE_TB
  zh: '| 神经元数量 | 训练数据集准确率 | 测试数据集准确率 |'
- en: '| --- | --- | --- |'
  id: totrans-347
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
