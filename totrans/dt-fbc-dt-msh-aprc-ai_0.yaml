- en: Foreword
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 前言
- en: 'This book in one sentence: “Data Mesh is being referred to as a solution, which
    is built on top of Data Fabric as an architecture, and the key message brought
    across in this book is that infused AI is the magic sauce that is going to help
    you being successful in implementing these concepts in your organization.”'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书一句话概括：“数据网格被视为一种解决方案，它作为架构建立在数据编织之上，而本书传达的关键信息是，融入AI的魔法酱料将帮助你成功地在组织中实施这些概念。”
- en: The structure of this book is very well organized taking you on a cohesive journey
    from a to z and covering traditional data management topics while linking it to
    buzzwords like Data Fabric, Data Mesh, AI, ML, DL, automation, etc.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 本书结构组织得非常好，从A到Z连贯地引导读者，同时涵盖传统数据管理主题，并将其与数据编织、数据网格、AI、ML、DL、自动化等热门词汇联系起来。
- en: For instance, the important topic of identity matching will briefly take you
    through the traditional way of doing it and identifying shortcomings and then
    expand on how AI, ML, and in particular DL, can help solve the challenge much
    more efficiently and accurately. In essence, this is applied AI to automate data
    management tasks, and who don’t like tedious task to become automated.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，重要的身份匹配主题将简要介绍传统的做法及其不足，然后扩展说明AI、ML，特别是DL如何更高效、更准确地解决挑战。本质上，这是应用AI来自动化数据管理任务，而且谁不喜欢将繁琐的任务自动化呢。
- en: It’s filled with nice charts and diagrams to support the written text, and at
    the end of each chapter you have key take aways that serves as a summary as well
    a quick refresher at a later state.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 书中充满了图表和图解来支持文字内容，并且每一章的结尾都有关键要点，这些要点既是对内容的总结，也是对未来快速回顾的便捷方式。
- en: Another key aspect is illuminating the importance of not only managing data
    as an asset but equally important AI related artefacts. This becomes even more
    significant with the emerging data and AI convergence happening with real time
    inference in a hybrid processing scenario.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个关键方面是阐明不仅管理数据作为资产的重要性，而且同样重要的是管理与AI相关的工件。随着数据与AI的融合以及混合处理场景中的实时推理的出现，这一点变得更加重要。
- en: My favorite part of this book is the stressing of the ed how noteworthy it is
    to have a single view across the enterprise when it comes to metadata or what
    they refer to as the Knowledge Catalogue. This is not to say that there will be
    one single catalog reflecting all about everything, but a virtually connected
    catalog with support of Egeria Open Cohort for metadata exchange, which becomes
    the glue that can hold it all together.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 我最喜欢的这本书的部分是强调在元数据或他们所说的知识目录方面，在整个企业中拥有单一视图的重要性。这并不是说将有一个单一的目录反映所有关于一切的信息，而是一个通过Egeria
    Open Cohort支持元数据交换的虚拟连接目录，这成为能够将其全部粘合在一起的东西。
- en: As they rightfully point out this becomes even more essential in a hybrid cloud
    scenario with a mix of public/private cloud as well an on-premises platform like
    the good old Mainframe still being the backbone of many large enterprises. A key
    concern of mine has always been to ensure that we don’t lose control of the data
    governance when Db2 for z/OS are being unlocked for cloud-initiated modernization
    initiatives.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 正如他们正确指出的，在混合云场景中，这种需求变得更加重要，因为这里既有公共/私有云的混合，还有像老式的主机系统这样的本地平台仍然是许多大型企业的支柱。我一直关注的一个关键问题是确保在Db2
    for z/OS被解锁用于云启发的现代化计划时，我们不会失去对数据治理的控制。
- en: Many organizations have already invested an immense amount of time and effort
    in creating metadata to meet the requirements of GDPR, but from a business user
    perspective this is often too detailed to support them on their Data Mesh journey
    to create data products. Hence, building on what’s already there, but enriching
    it to bring it higher level of abstraction seems like an appealing idea to pursue.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 许多组织已经投入了大量的时间和精力来创建元数据以满足GDPR的要求，但从业务用户的角度来看，这通常过于详细，无法支持他们在数据网格旅程中创建数据产品。因此，在现有基础上进行扩展，将其提升到更高层次的抽象似乎是一个值得追求的想法。
- en: Adapting the guidelines and recommendations in this book is what would make
    me sleep well at night during such transition phase going from predominantly on-premises
    based to a hybrid cloud setup.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在从以本地化为主过渡到混合云设置的转型阶段，遵循这本书中的指南和建议将使我能够安心入睡。
- en: —Bjarne Nelson, IBM Champion
  id: totrans-24
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: ——Bjarne Nelson，IBM冠军
- en: Introduction
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 引言
- en: Even with more data engineers, the demand for data and data products consistently
    outgrows the ability to deliver business value with existing data architecture
    capabilities. This book provides methods and guidance to successfully deploy Data
    Fabric architectures and Data Mesh solutions, which can lower the needed skill
    level to discover, access, prepare, and consume data through easy access to metadata
    in a business context and to intelligently automate the main tasks of a data engineer.
    It presents new AI-based Data Fabric and Data Mesh capabilities, such as self-service
    data discovery and data enrichment, automated data quality assessments, and data
    matching techniques, which helps breaking down the silos of responsibilities of
    a data source owner, data engineer, and data consumer as well as removing the
    dependency on the data engineer for data consumption, allowing business priorities
    to be implemented without the data engineer support capacity as a bottleneck.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 即使有更多的数据工程师，对数据和数据产品的需求也持续超过现有数据架构能力提供业务价值的能力。本书提供了部署数据编织架构和数据网格解决方案的方法和指导，这可以降低发现、访问、准备和消费数据所需的技能水平，通过在业务环境中轻松访问元数据，并智能地自动化数据工程师的主要任务。它介绍了基于人工智能的新数据编织和数据网格功能，如自助数据发现和数据丰富、自动数据质量评估和数据匹配技术，这有助于打破数据源所有者、数据工程师和数据消费者之间责任孤岛，以及消除对数据工程师进行数据消费的依赖，允许在不依赖数据工程师支持能力作为瓶颈的情况下实施业务优先事项。
- en: The book describes the role of AI in the context of intelligent information
    integration methods, data knowledge graphs based on enriched metadata, semantic
    insight for intelligent data consumption, and intelligent cataloging with automated
    metadata management. It presents Data Fabric and Data Mesh as essentially a metadata-
    and AI-driven approach of connecting a disparate collection of data and AI assets;
    it includes data and AI in hybrid cloud environments, Data Mesh with its particular
    focus on enabling a data marketplace with data products, data lake implementations,
    and traditional DWH/analytical systems.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 本书描述了人工智能在智能信息集成方法、基于丰富元数据的数据知识图谱、智能数据消费的语义洞察以及具有自动化元数据管理的智能编目中的角色。它将数据编织和数据网格视为一种本质上由元数据和人工智能驱动的连接不同数据集和人工智能资产的方法；它包括混合云环境中的数据和人工智能，特别关注通过数据产品、数据湖实现和传统的DWH/分析系统来启用数据市场。
- en: This book is for a reader who is looking for guidance and recommendations on
    how to successfully deploy a state-of-the-art Data Fabric architecture underpinning
    Data Mesh solutions and is furthermore eagerly interested in getting a comprehensive
    overview on how a Data Fabric architecture uses AI and ML for automated metadata
    management and self-service data discovery and consumption. The reader is furthermore
    interested to learn how Data Fabric and Data Mesh relate to other concepts, such
    as DataOps, ModelOps, and AIOps – to name a few. The anticipated reader is looking
    for examples on how to modernize the consumption of data and AI assets to enable
    a shopping-for-data (data-as-a-product) experience.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 本书面向寻求指导和建议以成功部署支撑数据网格解决方案的先进数据编织架构的读者，并且对如何全面了解数据编织架构如何使用人工智能和机器学习进行自动化元数据管理和自助数据发现与消费表现出浓厚的兴趣。读者还希望了解数据编织和数据网格如何与其他概念相关，例如数据操作、模型操作和人工智能操作——仅举几例。预期的读者正在寻找如何使数据和使用人工智能资产的消费现代化，以实现数据购物（数据作为产品）体验的示例。
- en: The chapters of this book are organized into four main parts.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 本书各章节分为四个主要部分。
- en: '**Part 1, “Data Fabric and Data Mesh Foundation,”** sets the scene for the
    book in terms of providing an introduction to these concepts, how some of the
    terms, for instance, Data Fabric architecture, Data Mesh solution, and data product,
    relate to each other, presenting some of the most relevant use case scenarios,
    and describing the key business benefits.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '**第一部分，“数据编织和数据网格基础”，**为本书设定了场景，提供了对这些概念的解释，例如数据编织架构、数据网格解决方案和数据产品等术语如何相互关联，展示了最相关的用例场景，并描述了关键的业务优势。'
- en: 'It consists of the following four chapters:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 它由以下四个章节组成：
- en: '**Chapter** [**1**](537582_1_En_1_Chapter.xhtml)**, “Evolution of Data Architecture,”**
    introduces the motivation for looking into data architectures. It shares an overview
    about data architecture evolution coming from traditional data warehouses to big
    data, data lakes, and data lakehouses and their main characteristics, value, and
    challenges. It outlines industry requirements in a data-driven world that led
    to the Data Fabric and Data Mesh concepts.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第1章** [**1**](537582_1_En_1_Chapter.xhtml)**，"数据架构的演变"，**介绍了研究数据架构的动机。它概述了从传统数据仓库到大数据、数据湖和数据湖屋的数据架构演变，以及它们的主要特征、价值和挑战。它概述了在数据驱动的世界中，导致数据编织和数据网格概念出现的行业需求。'
- en: '**Chapter** [**2**](537582_1_En_2_Chapter.xhtml)**, “Terminology: Data Fabric
    and Data Mesh,”** explains the key terms that will be used throughout the book,
    particularly the terms *Data Fabric*, *Data Mesh*, *data marketplace*, and *data
    product*, and how these terms relate to each other. We introduce the term *data-as-a-product*
    in the context of a Data Mesh and highlight the relationship of Data Fabric and
    Data Mesh concepts to DataOps, ModelOps, and AIOps, among others. It furthermore
    addresses the specific needs for knowledge catalog orchestration and metadata
    exchange in distributed organizationally structured Data Mesh deployments.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第2章** [**2**](537582_1_En_2_Chapter.xhtml)**，"术语：数据编织与数据网格"，**解释了本书中将使用的核心术语，特别是术语*数据编织*、*数据网格*、*数据市场*和*数据产品*，以及这些术语之间的关系。我们在数据网格的背景下引入了*数据即产品*这一术语，并强调了数据编织与数据网格概念与数据操作（DataOps）、模型操作（ModelOps）和人工智能操作（AIOps）等其他概念之间的关系。此外，它还针对分布式组织结构的数据网格部署中的知识目录编排和元数据交换的具体需求进行了阐述。'
- en: '**Chapter** [**3**](537582_1_En_3_Chapter.xhtml)**, “Data Fabric and Data Mesh
    Use Case Scenarios,”** walks through several use cases for implementing a Data
    Fabric and Data Mesh that also would be valid entry points. Data and AI governance
    and privacy initiatives are ongoing in almost every organization, enabling access
    to enterprise data and AI across platforms to the people who have a business need.
    Other use cases are driven by hybrid cloud data integration; the need for a comprehensive
    view on customers, vendors, and other parties for better business outcome; and
    development and integration of trustworthy AI into business processes.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第3章** [**3**](537582_1_En_3_Chapter.xhtml)**，"数据编织与数据网格用例场景"，**探讨了实施数据编织和数据网格的几个用例，这些用例也可以作为有效的切入点。几乎在每一个组织中，数据治理和AI隐私倡议都在进行中，这使得具有业务需求的人能够跨平台访问企业数据和AI。其他用例是由混合云数据集成驱动的；对客户、供应商和其他方进行全面视图的需求，以实现更好的业务成果；以及将可信AI集成到业务流程中的开发和集成。'
- en: '**Chapter** [**4**](537582_1_En_4_Chapter.xhtml)**, “Data Fabric and Data Mesh
    Business Benefits,”** dives into business needs and pain points that we hear in
    our conversations with enterprises. We will discuss business benefits of creating
    a Data Fabric and Data Mesh from the perspective of the technical team as well
    as the business teams consuming data and AI assets.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第4章** [**4**](537582_1_En_4_Chapter.xhtml)**，"数据编织与数据网格的商业效益"，**深入探讨了我们在与企业对话中听到的商业需求和痛点。我们将从技术团队以及消费数据AI资产的业务团队的角度，讨论创建数据编织和数据网格的商业效益。'
- en: '**Part 2, “Key Data Fabric and Data Mesh Capabilities and Concepts,”** presents
    key Data Fabric and Data Mesh capabilities and focuses on AI and ML methods applied
    to those Data Fabric capabilities. It introduces the reader to the most relevant
    AI and ML concepts that are required to implement a Data Fabric architecture and
    Data Mesh solution. It furthermore discusses the AI usage for entity matching
    purposes and how a Data Fabric implementation is leveraged for the entire AI lifecycle.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '**第2部分，"关键数据编织与数据网格功能与概念"，**介绍了关键数据编织与数据网格功能，并重点关注应用于这些数据编织功能的AI和ML方法。它向读者介绍了实施数据编织架构和数据网格解决方案所必需的最相关的AI和ML概念。此外，它还讨论了AI在实体匹配目的中的应用，以及数据编织实现如何被用于整个AI生命周期。'
- en: 'It consists of the following five chapters:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 本书由以下五个章节组成：
- en: '**Chapter** [**5**](537582_1_En_5_Chapter.xhtml)**, “Key Data Fabric and Data
    Mesh Capabilities,”** introduces the key Data Fabric and Data Mesh capabilities,
    such as self-service, AI and ML, trustworthy AI, intelligent information integration,
    and active metadata – among other topics. It also discusses semantic knowledge
    graphs (semantic networks) as underpinning of a Data Fabric and Data Mesh. A section
    on AI and ML to enable the “digital exhaust” elaborates on pattern recognition
    and correlation discovery from the “digital exhaust” to augment and operationalize
    this insight especially into the Data Fabric. This chapter discusses the concepts
    to deliver trustworthy and explainable AI and provides some examples, for example,
    to discover drift and bias in AI models. Finally, intelligent (smart) information
    integration capabilities are described.'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第** [**5**](537582_1_En_5_Chapter.xhtml)**章**，“关键数据编织和数据网格能力”，**介绍了关键数据编织和数据网格能力，例如自助服务、人工智能和机器学习、可信人工智能、智能信息集成和活动元数据——以及其他主题。它还讨论了语义知识图谱（语义网络）作为数据编织和数据网格的基础。关于人工智能和机器学习以实现“数字废气”的章节，详细阐述了从“数字废气”中识别模式和发现相关性的方法，以增强并实现这一洞察，特别是对数据编织。本章讨论了提供可信和可解释人工智能的概念，并提供了一些示例，例如发现人工智能模型中的漂移和偏差。最后，描述了智能（智能）信息集成能力。'
- en: '**Chapter** [**6**](537582_1_En_6_Chapter.xhtml)**, “Relevant ML and DL Concepts,”**
    explains the key ML and DL concepts used for building Data Fabric and Data Mesh
    capabilities. It starts with an introduction to AI, ML, and DL, their connections
    and differences, and how these technologies are being used to accelerate enterprise
    digital transformation initiatives. It also introduces key techniques in the AI
    lifecycle. Starting from data, it explains the methods of understanding data and
    the techniques to transform data into a usable shape suitable for AI model training.
    It furthermore discusses how to choose, train, and evaluate AI models, as well
    as how to deploy AI models to infuse AI/ML into the Data Fabric and Data Mesh.
    Lastly, it covers Natural Language Processing (NLP) and explains why it’s important
    to make use of unstructured data (especially text) in the context of a Data Fabric
    and Data Mesh for an enterprise.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第** [**6**](537582_1_En_6_Chapter.xhtml)**章**，“相关的机器学习和深度学习概念”，**解释了用于构建数据编织和数据网格能力的关键机器学习和深度学习概念。它从人工智能、机器学习和深度学习及其联系和区别的介绍开始，以及这些技术如何被用于加速企业数字化转型计划。它还介绍了人工智能生命周期中的关键技术。从数据开始，它解释了理解数据的方法以及将数据转换为适合人工智能模型训练的可用形状的技术。此外，它还讨论了如何选择、训练和评估人工智能模型，以及如何部署人工智能模型以将人工智能/机器学习注入数据编织和数据网格。最后，它涵盖了自然语言处理（NLP），并解释了为什么在数据编织和数据网格的企业环境中利用非结构化数据（尤其是文本）很重要。'
- en: '**Chapter** [**7**](537582_1_En_7_Chapter.xhtml)**, “AI and ML for a Data Fabric
    and Data Mesh,”** provides a deep dive into the exploitation of AI and ML for
    various topics and tasks, such as data discovery, profiling, and data access,
    to enable a “digital exhaust,” ML-based entity matching, automated data quality
    assessments, and semantic enrichment. This is an essential chapter, which highlights
    novel ideas to augment Data Fabric and Data Mesh concepts with AI and ML. The
    exploitation of AI for some of these topics is further explored in subsequent
    chapters.'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第** [**7**](537582_1_En_7_Chapter.xhtml)**章**，“数据编织和数据网格的人工智能和机器学习”，**深入探讨了人工智能和机器学习在数据发现、配置文件和数据访问等不同主题和任务中的应用，以实现“数字废气”，基于机器学习的实体匹配，自动数据质量评估和语义丰富化。这是一章重要的章节，强调了用人工智能和机器学习增强数据编织和数据网格概念的创新思想。后续章节将进一步探讨人工智能在这些主题中的应用。'
- en: '**Chapter** [**8**](537582_1_En_8_Chapter.xhtml)**, “AI for Entity Resolution,”**
    explains what entity resolution, also known as entity matching, is, why the problem
    has arisen, and why it’s important to the business. Next, the reader will learn
    more about what are the traditional approaches to solving this problem and how
    AI can reveal new possibilities for solving it, what will be the benefits and
    potential problems of using AI solutions, and how to choose a fit-for-purpose
    solution.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第** [**8**](537582_1_En_8_Chapter.xhtml)**章**，“实体解析的人工智能”，**解释了实体解析（也称为实体匹配）是什么，为什么会出现这个问题，以及为什么它对业务很重要。接下来，读者将了解更多关于解决这个问题的传统方法，以及人工智能如何揭示解决这个问题的新的可能性，使用人工智能解决方案的益处和潜在问题，以及如何选择适合目的的解决方案。'
- en: '**Chapter** [**9**](537582_1_En_9_Chapter.xhtml)**, “Data Fabric and Data Mesh
    for the AI Lifecycle,”** explains Data Fabric and Data Mesh capabilities during
    the entire AI lifecycle. First, it introduces the core ideas and concepts of AI
    engineering and how AI engineering relates to DataOps and ModelOps. To help readers
    better understand the essence of the Data Fabric and Data Mesh for the AI lifecycle,
    this chapter includes two case studies – the first one shows how Data Fabric can
    help in integrating data from various data sources in a hybrid cloud enterprise
    environment, and the second case study introduces operationalizing AI and key
    benefits Data Fabric and Data Mesh could bring to the production system such as
    security, explainability, governance, and scalability. It specifically highlights
    accelerating the implementation of MLOps with AutoAI. It further describes the
    best practices for operationalizing AI and common deployment patterns for AI engineering.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第** [**9**](537582_1_En_9_Chapter.xhtml) **章** “AI 生命周期中的数据编织与数据网格”，**阐述了在整个
    AI 生命周期中数据编织和数据网格的能力。首先，它介绍了 AI 工程的核心思想和概念，以及 AI 工程与 DataOps 和 ModelOps 的关系。为了帮助读者更好地理解
    AI 生命周期中数据编织和数据网格的本质，本章包括两个案例研究——第一个案例研究展示了数据编织如何帮助在混合云企业环境中整合来自各种数据源的数据，第二个案例研究介绍了将
    AI 运营化以及数据编织和数据网格可以为生产系统带来的关键好处，例如安全性、可解释性、治理和可扩展性。它特别强调了使用 AutoAI 加速 MLOps 的实施。它进一步描述了将
    AI 运营化的最佳实践和 AI 工程的常见部署模式**。'
- en: '**Part 3, “Deploying Data Fabric and Data Mesh in Context,”** introduces Data
    Fabric architecture patterns for different usage purposes, for instance, intelligent
    data integration styles and data consumption patterns. It discusses the meaning
    of automated Data Fabric and Data Mesh, intelligent cataloging, and augmented
    metadata management and describes the Data Fabric and Data Mesh concepts in the
    context of hybrid cloud landscapes, an enterprise data architecture, and data
    governance initiatives.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '**第三部分，"在特定环境中部署数据编织和数据网格"，**介绍了针对不同用途的数据编织架构模式，例如智能数据集成风格和数据消费模式。它讨论了自动化数据编织和数据网格的意义、智能编目和增强元数据管理，并描述了在混合云景观、企业数据架构和数据治理倡议背景下数据编织和数据网格的概念**。'
- en: 'It consists of the following six chapters:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 它包括以下六个章节：
- en: '**Chapter** [**10**](537582_1_En_10_Chapter.xhtml)**, “Data Fabric Architecture
    Patterns,”** provides a high-level overview of the Data Fabric architecture evolution
    and elaborates on key Data Fabric architecture patterns, such as a Data Fabric
    architecture serving as the underpinning for a Data Mesh solution, intelligent
    information integration styles, and data consumption patterns. This chapter describes
    the Data Fabric and Data Mesh evolution, discusses data consumption patterns,
    and provides a high-level Data Mesh architecture overview diagram.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第** [**10**](537582_1_En_10_Chapter.xhtml) **章** “数据编织架构模式”，**提供了数据编织架构演变的概述，并详细阐述了关键数据编织架构模式，例如作为数据网格解决方案基础的数据编织架构、智能信息集成风格和数据消费模式。本章描述了数据编织和数据网格的演变，讨论了数据消费模式，并提供了高级数据网格架构概述图**。'
- en: '**Chapter** [**11**](537582_1_En_11_Chapter.xhtml)**, “Data Fabric Within an
    Enterprise Architecture,”** is a continuation of Chapter [10](537582_1_En_10_Chapter.xhtml);
    it describes how a data architecture needs to be looked at in conjunction with
    the implemented enterprise and application architecture in an enterprise. Many
    organizations are in the process to modernize their application and data landscape.
    Applications have different requirements with respect to data characteristics
    that may recommend one data architecture implementation over another, for example,
    data access through virtualization or data replication and transformation.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第** [**11**](537582_1_En_11_Chapter.xhtml) **章** “企业架构中的数据编织”，**是第 [10](537582_1_En_10_Chapter.xhtml)
    章的延续；它描述了在企业中，数据架构需要与实施的企业和应用程序架构相结合进行考虑。许多组织正在现代化他们的应用程序和数据景观。应用程序对数据特性的要求不同，这可能导致推荐一种数据架构实现而不是另一种，例如，通过虚拟化进行数据访问或数据复制和转换**。'
- en: '**Chapter** [**12**](537582_1_En_12_Chapter.xhtml)**, “Data Fabric and Data
    Mesh in a Hybrid Cloud Landscape,”** introduces hybrid cloud, integrating IT on-premises
    and public cloud, and describes how to deploy a Data Fabric architecture and Data
    Mesh solution in hybrid cloud environments. This creates new challenges for accessing
    and integrating data and AI across organizations and boundaries of public cloud
    providers. It addresses the challenges and benefits of a Data Fabric and Data
    Mesh in a hybrid cloud landscape.'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第12章** [**12**](537582_1_En_12_Chapter.xhtml)**，"混合云环境中的数据编织和数据网格"，**介绍了混合云，即本地IT和公共云的整合，并描述了如何在混合云环境中部署数据编织架构和数据网格解决方案。这为跨组织以及公共云提供商边界的访问和整合数据与AI带来了新的挑战。它讨论了在混合云环境中数据编织和数据网格的挑战和益处。'
- en: '**Chapter** [**13**](537582_1_En_13_Chapter.xhtml)**, “Intelligent Cataloging
    and Metadata Management,”** introduces metadata management, followed by the key
    aspects of intelligent cataloging. It provides a deep dive into each key aspect
    and elaborates how Data Fabric and Data Mesh capabilities realize automated data
    discovery, classification of data assets, assignment of data assets with business
    terms, and creation of enterprise knowledge graphs by building connections between
    data and AI assets. It also highlights why data lineage and provenance are needed
    and how to implement them with a Data Fabric.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第13章** [**13**](537582_1_En_13_Chapter.xhtml)**，"智能编目和元数据管理"，**介绍了元数据管理，随后讨论了智能编目的关键方面。它深入探讨了每个关键方面，并阐述了数据编织和数据网格能力如何实现自动化数据发现、数据资产分类、数据资产与业务术语的分配，以及通过建立数据与AI资产之间的联系来创建企业知识图谱。它还强调了数据溯源和来源的必要性以及如何使用数据编织来实现它们。'
- en: '**Chapter** [**14**](537582_1_En_14_Chapter.xhtml)**, “Automated Data Fabric
    and Data Mesh Aspects,”** focuses on intelligent automation aspects. The desire
    to create an enterprise-wide description of data and AI is not a new concept.
    It was considered a failure about two decades ago. This chapter describes the
    usage of intelligent automation to collect metadata from different data sources
    and catalog them, automatically checking data quality and augmenting the data
    as well as automating data and AI governance services as a foundation of a Data
    Fabric and Data Mesh.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第14章** [**14**](537582_1_En_14_Chapter.xhtml)**，"自动数据编织和数据网格方面"，**专注于智能自动化方面。创建企业级的数据和AI描述的愿望并非新概念。大约二十年前，这被认为是一个失败。本章描述了使用智能自动化从不同的数据源收集元数据并将它们编目，自动检查数据质量，增强数据，以及作为数据编织和数据网格基础自动化的数据与AI治理服务。'
- en: '**Chapter** [**15**](537582_1_En_15_Chapter.xhtml)**, “Data Governance in the
    Context of Data Fabric and Data Mesh,”** explains why data and AI governance and
    privacy are critical to a data-driven strategy for enterprises. It introduces
    the key aspects of data governance – people, process, data regulations, data rules,
    data protection methods, etc. It further explores how Data Fabric and Data Mesh
    capabilities establish a data and AI governance foundation for an enterprise,
    make data trustworthy by automated quality analysis, and protect data by automatic
    enforcement of data protection regulations.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第15章** [**15**](537582_1_En_15_Chapter.xhtml)**，"数据编织和数据网格背景下的数据治理"，**解释了为什么数据与AI治理和隐私对于企业的数据驱动策略至关重要。它介绍了数据治理的关键方面——人员、流程、数据法规、数据规则、数据保护方法等。它进一步探讨了数据编织和数据网格能力如何为企业建立一个数据与AI治理基础，通过自动质量分析使数据可信，并通过自动执行数据保护法规来保护数据。'
- en: '**Part 4, “Current Offerings and Future Aspects,”** discusses a few sample
    vendor offerings and current Data Fabric and Data Mesh research areas. This part
    finishes with a short summary and key takeaways.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '**第四部分，"当前提供和未来方面"，**讨论了一些样本供应商提供的产品和当前数据编织和数据网格的研究领域。本部分以简短的总结和关键要点结束。'
- en: 'It consists of the following three chapters:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 它包括以下三个章节：
- en: '**Chapter** [**16**](537582_1_En_16_Chapter.xhtml)**, “Sample Vendor Offerings,”**
    introduces how different vendors implement a Data Fabric architecture and Data
    Mesh solution with commercial software or SaaS (Software as a Service). It further
    delves into each vendor’s offering and explains how it works and what are the
    strengths.'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第16章** [**16**](537582_1_En_16_Chapter.xhtml)**，"样本供应商提供的产品"，**介绍了不同的供应商如何使用商业软件或SaaS（软件即服务）实现数据编织架构和数据网格解决方案。它进一步深入到每个供应商的提供内容，并解释了它们的工作原理以及它们的优点。'
- en: '**Chapter** [**17**](537582_1_En_17_Chapter.xhtml)**, “Data Fabric and Data
    Mesh Research Areas,”** discusses Data Fabric and Data Mesh challenges as they
    are addressed by current research and academia initiatives, such as hyper-automation
    and knowledge-based consumption. It also describes the confluence of AI and Data
    Fabric and Data Mesh and outlines the road toward an AI-driven Data Fabric and
    Data Mesh.'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第17章** [**17**](537582_1_En_17_Chapter.xhtml)**，“数据编织和数据网格研究领域”，**讨论了数据编织和数据网格挑战，这些挑战是通过当前的研究和学术界倡议（如超自动化和基于知识的消费）来解决的。它还描述了人工智能与数据编织和数据网格的交汇，并概述了通往人工智能驱动数据编织和数据网格的道路。'
- en: '**Chapter** [**18**](537582_1_En_18_Chapter.xhtml)**, “In Summary and Onward,”**
    summarizes the main messages of this book and provides suggestions on how to get
    started on a Data Fabric and Data Mesh journey.'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第18章** [**18**](537582_1_En_18_Chapter.xhtml)**，“总结与展望”，**总结了本书的主要信息，并提供了如何开始数据编织和数据网格之旅的建议。'
- en: Acknowledgments
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 致谢
- en: We are eternally grateful to the many colleagues in several IBM development
    labs and client-facing organizations we have worked with around the globe, colleagues
    who have challenged and inspired us with their points of view and critical questions.
    Collaborating with universities provided us with an additional invaluable and
    product-agnostic view regarding Data Fabric and Data Mesh topics.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 我们对全球多个IBM开发实验室和面向客户的组织中与我们合作的许多同事表示永恒的感激，这些同事通过他们的观点和批判性问题挑战和激励了我们。与大学合作为我们提供了关于数据编织和数据网格主题的额外宝贵且产品无关的观点。
- en: The best way to connect with someone is not by talking, but by listening. We
    could not have undertaken this endeavor without the numerous enterprises and organizations
    that we have had an opportunity to listen to and work with in recent years that
    have provided us with an insight into elaborating on some of the key Data Fabric
    and Data Mesh challenges and – most importantly – how to deploy these concepts
    in an existing IT and business landscape. We are grateful to the many clients
    that we have worked with; their opinions and views have without a doubt increased
    our insight and genuine interest in this topic.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 与人建立联系的最佳方式不是通过交谈，而是通过倾听。如果没有近年来有机会聆听并与我们合作的多家企业和组织，我们就无法承担这项任务。这些组织为我们提供了深入了解一些关键数据编织和数据网格挑战的见解，以及——最重要的是——如何在现有的IT和商业环境中部署这些概念。我们对与我们合作过的众多客户表示感激；他们的观点和看法无疑增加了我们对这一主题的洞察力和真正的兴趣。
- en: We are grateful to *Akshay Kulkarni*, who has conducted a fantastic technical
    review, which has greatly improved the readability of this book.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 我们对*Akshay Kulkarni*表示衷心的感谢，他进行了出色的技术审阅，极大地提高了本书的可读性。
- en: 'Last but not least, thanks to everyone on the Apress Media team who helped
    us so much: Coordinating Editor *Jill Balzano* and Development Editor *Laura Berendson*.
    Special thanks to *Mark Powers*, ever-patient Editorial Operations Manager our
    amazing Editorial Assistant *Gryffin Winkler*, our production editor *Krishnan
    Sathyamurthy*, and the greatest project manager *Dulcy Nirmala*.'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 最后但同样重要的是，感谢Apress媒体团队中的每一个人，他们给予了我们巨大的帮助：协调编辑*Akshay Kulkarni*和开发编辑*Jill Balzano*。特别感谢始终耐心细致的编辑运营经理*Akshay
    Kulkarni*，我们出色的编辑助理*Gryffin Winkler*，我们的生产编辑*Krishnan Sathyamurthy*，以及最伟大的项目经理*Dulcy
    Nirmala*。
