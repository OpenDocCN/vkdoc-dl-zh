    (g/kg)* 是每千克的具体湿度。*H2OC (mmol/mol)* 是每摩尔水蒸气浓度。而 *T (℃)* 是摄氏度温度。我们仅为了演示目的选择了这些特征。特征的选择应基于问题域。
