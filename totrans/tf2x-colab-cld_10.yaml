- en: '[PRE36]'
  prefs: []
  type: TYPE_PRE
- en: A RNN is well suited to time series data because its layers can provide feedback
    to earlier layers. Specifically, it processes time series data time step by time
    step while remembering information it sees during training. Our model uses a GRU
    layer, which is a specialized RNN layer capable of remembering information over
    long periods of time. So it is especially well suited for time series modeling.
  prefs: []
  type: TYPE_NORMAL
- en: Model Summary
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Inspect the model:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE37]'
  prefs: []
  type: TYPE_PRE
- en: We use the formula *3* `×` *(n*^(*2*) `×` *mn + 2n)* to calculate the number
    of learnable parameters for a GRU, where *m* is the input dimension and *n* is
    the output dimension. For any neural net, multiply output from the previous layer
    by neurons at the current layer (*m* `×` *n*). In addition, account for neurons
    at the current layer. But count them twice because of feedback (*2n*). A GRU layer
    has feedback, so square the output dimension (*n*^(*2*)). Multiply by *3* because
    there are three sets of operations for a GRU (hidden state, reset gate, and update
    gate) that require weight matrices.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is the breakdown to calculate parameters for the GRU layer:'
  prefs: []
  type: TYPE_NORMAL
- en: 3 `×` (32² + 32 + 2 `×` 32)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 3 `×` (1024 + 32 + 64)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 3 `×` 1120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*3,360*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The output dimension is 32\. The input dimension doesn’t exist since there is
    no previous layer.
  prefs: []
  type: TYPE_NORMAL
- en: The dense layer has 33 learnable parameters calculated by multiplying neurons
    from the previous layer (32) by neurons at the current layer (1) and adding the
    number of neurons at the current layer (1).
  prefs: []
  type: TYPE_NORMAL
