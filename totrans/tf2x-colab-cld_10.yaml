- en: Multistep Model
  id: totrans-218
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 多步模型
- en: With relative humidity, we only predicted a single future point. But we can
    create a model to learn to predict a range of future values, which is what we
    are going to do with the multivariate data we just established.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 在相对湿度的情况下，我们只预测了一个未来的点。但我们可以创建一个模型来学习预测一系列未来的值，这正是我们将使用刚刚建立的多变量数据所要做的事情。
- en: Let’s say that we want to train our multistep model to learn to predict for
    the next 6 hours. Since our data time steps are 10 minutes (one observation every
    10 minutes), there are six observations every hour. Given that we want to predict
    for the next 6 hours, our model makes *36* (6 observations `×` 6) predictions.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们想要训练我们的多步模型来学习预测接下来的6小时。由于我们的数据时间步长是10分钟（每10分钟一个观测值），每小时有六个观测值。考虑到我们想要预测接下来的6小时，我们的模型做出
    *36*（6个观测值 `×` 6）个预测。
- en: Let’s also say that we want to show our model data from the last 3 days for
    each sample. Since there are 24 hours in a day, we have 144 (6 `×` 24) observations
    each day. So we have a total of *432* (3 `×` 144) observations. But we want to
    sample every hour because we don’t expect a drastic change in any of our features
    within 60 minutes. Thus, *72* (432 observations/6 observations per hour) observations
    represents each window of data.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们再假设我们想要展示每个样本过去3天的模型数据。由于一天有24小时，我们每天有144（6 `×` 24）个观测值。因此，我们总共有 *432*（3
    `×` 144）个观测值。但我们每小时想要采样一次，因为我们不期望在60分钟内任何特征都会有剧烈变化。因此，*72*（432个观测值/每小时6个观测值）个观测值代表每个数据窗口。
- en: Generators
  id: totrans-222
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 生成器
- en: Since we are training multiple features to predict a range of future values,
    we create a generator function to create train and test splits. A **generator**
    is a function that returns an object iterator that we iterate over one value at
    a time. A generator is defined like a normal function, but it generates a value
    with the *yield* keyword rather than *return*. So adding the yield keyword automatically
    makes a normal function a generator function.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们正在训练多个特征来预测一系列未来的值，我们创建了一个生成器函数来创建训练和测试分割。一个 **生成器** 是一个函数，它返回一个对象迭代器，我们一次迭代一个值。生成器定义得像正常函数一样，但它使用
    *yield* 关键字而不是 *return* 生成值。所以添加 yield 关键字自动将一个正常函数转换为生成器函数。
- en: Generators are easy to implement, but a bit difficult to understand. We invoke
    a generator function in the same way as a normal function. But, when we invoke
    it, a generator object is created. We must iterate over the generator object to
    see its contents. As we iterate over the generator object, all processes within
    the generator function are processed until it reaches a yield statement. Once
    this happens, the generator yields a new value from its contents and returns execution
    back to the for loop. So a generator yields one element from its contents for
    each yield statement encountered.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
- en: Advantages of Using a Generator
  id: totrans-225
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Generator functions allow us to declare a function that behaves like an iterator.
    So we can make iterators in a fast, easy, and clean way. An **iterator** is an
    object that can be iterated upon. It is used to abstract a container of data to
    make it behave like an iterable object. As programmers, we use iterable objects
    like strings, lists, and dictionaries frequently.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
- en: Generators save memory space because they don’t compute the value of each item
    when instantiated. Generators only compute a value when explicitly asked to do
    so. Such behavior is known as *lazy evaluation*. Lazy evaluation is useful when
    we process large datasets because it allows us to start using data immediately
    rather than having to wait until the entire dataset is processed. It also saves
    memory because data is generated only when needed.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
- en: Generator Caveats
  id: totrans-228
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A generator creates a single object. So a generator object can only be assigned
    to a *single* variable no matter how many values it yields.
  id: totrans-229
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Once iterated over, a generator is *exhausted*. So it must be rerun to be repopulated.
  id: totrans-230
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
