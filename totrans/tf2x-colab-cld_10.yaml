  - PREF_H3
  type: TYPE_NORMAL
- en: Create a function that splits a dataset into features and labels as shown in
    Listing [10-3](#PC19).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: The function accepts a dataset, an index where we want to start the split, an
    ending index, the size of each window, and the target size. Parameter *window*
    is the size of the past window of information. The *target_size* is how far in
    the future we want our model to learn how to predict.
  prefs: []
  type: TYPE_NORMAL
- en: The function creates lists to hold features and labels. It then establishes
    the starting point that reflects the window size. To create a test set, the function
    checks the *end* value. If *None*, it uses the length of the entire dataset less
    the target size as the ending value so the test set can start where the training
    set left off.
  prefs: []
  type: TYPE_NORMAL
- en: Once training and test starting points are established, the function creates
    the feature windows and labels. The *indices* for each feature window are established
    as the next window during iteration. That is, each subsequent set of *indices*
    begins where the last set ended. Feature windows are reshaped for TensorFlow consumption
    and added to the *features* list. Labels are created as the last observation in
    the next window and then added to the *labels* list. Both features and labels
    are returned as numpy arrays.
  prefs: []
  type: TYPE_NORMAL
- en: The function may seem confusing, but all it really does is create a feature
    set that holds windows of relative humidity observations (for our experiment)
    and another that holds targets. Targets are based on the last relative humidity
    observation from the next window of data. This makes sense because the last relative
    humidity from the next window is a pretty good indication of future relative humidity.
    So the feature set becomes a set of windows that contain time step observations.
    And the label set contains predictions for each window.
  prefs: []
  type: TYPE_NORMAL
