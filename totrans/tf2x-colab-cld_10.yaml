- en: For this experiment, use the first 315,413 rows of data for training and the
    remaining 105,138 (420,551 – 315,413) rows for the test set. Training data accounts
    for about 2,190 (315, 413/144) days of data. And test data accounts for about
    730 (105, 138/144) days of data.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个实验，使用数据的前315,413行进行训练，剩余的105,138行（420,551 - 315,413）用于测试集。训练数据大约占2,190天（315,413/144）的数据。测试数据大约占730天（105,138/144）的数据。
- en: Create Features and Labels
  id: totrans-86
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建特征和标签
- en: Create a function that splits a dataset into features and labels as shown in
    Listing [10-3](#PC19).
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数，将数据集分割成特征和标签，如列表[10-3](#PC19)所示。
- en: '[PRE18]'
  id: totrans-88
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: The function accepts a dataset, an index where we want to start the split, an
    ending index, the size of each window, and the target size. Parameter *window*
    is the size of the past window of information. The *target_size* is how far in
    the future we want our model to learn how to predict.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 该函数接受一个数据集，一个我们想要开始分割的索引，一个结束索引，每个窗口的大小和目标大小。参数*window*是过去信息窗口的大小。*target_size*是我们希望我们的模型学习预测的未来时间跨度。
- en: The function creates lists to hold features and labels. It then establishes
    the starting point that reflects the window size. To create a test set, the function
    checks the *end* value. If *None*, it uses the length of the entire dataset less
    the target size as the ending value so the test set can start where the training
    set left off.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 该函数创建列表来保存特征和标签。然后它建立反映窗口大小的起始点。为了创建测试集，函数检查*end*值。如果*None*，它使用整个数据集的长度减去目标大小作为结束值，这样测试集就可以从训练集结束的地方开始。
- en: Once training and test starting points are established, the function creates
    the feature windows and labels. The *indices* for each feature window are established
    as the next window during iteration. That is, each subsequent set of *indices*
    begins where the last set ended. Feature windows are reshaped for TensorFlow consumption
    and added to the *features* list. Labels are created as the last observation in
    the next window and then added to the *labels* list. Both features and labels
    are returned as numpy arrays.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦确定了训练和测试的起始点，该函数将创建特征窗口和标签。每个特征窗口的*索引*在迭代过程中作为下一个窗口建立。也就是说，每个后续的*索引*集从上一个集结束的地方开始。特征窗口被重塑以供TensorFlow使用，并添加到*features*列表中。标签作为下一个窗口中的最后一个观察结果创建，然后添加到*labels*列表中。特征和标签都以numpy数组的形式返回。
- en: The function may seem confusing, but all it really does is create a feature
    set that holds windows of relative humidity observations (for our experiment)
    and another that holds targets. Targets are based on the last relative humidity
    observation from the next window of data. This makes sense because the last relative
    humidity from the next window is a pretty good indication of future relative humidity.
    So the feature set becomes a set of windows that contain time step observations.
    And the label set contains predictions for each window.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 该函数可能看起来有些复杂，但它实际上只是创建了一个包含相对湿度观测窗口（对我们实验而言）的特征集，以及另一个包含目标的特征集。目标是基于下一个数据窗口中的最后一个相对湿度观测。这很有道理，因为下一个窗口的最后一个相对湿度是未来相对湿度的一个很好的指示。因此，特征集成为包含时间步观测的窗口集，而标签集包含每个窗口的预测。
- en: Create Train and Test Sets
  id: totrans-93
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建训练和测试集
- en: For the train set, start at index 0 from the dataset and continue up to 315,412\.
    For the test set, take the remainder. Set the window size to 20 and target to
    0.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 对于训练集，从数据集的索引0开始，继续到315,412。对于测试集，取剩余部分。设置窗口大小为20，目标为0。
- en: Invoke the function as shown in Listing [10-4](#PC20).
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表[10-4](#PC20)所示调用该函数。
- en: '[PRE19]'
  id: totrans-96
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: 'Inspect train and test data:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 检查训练和测试数据：
- en: '[PRE20]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: As expected, shapes reflect size of each dataset, window size, and the 1 dimension.
    The *1* dimension indicates that we are making one prediction into the future.
    The train set contains 315,393 records composed of windows holding 20 relative
    humidity readings. The test set contains 105,118 records composed of windows holding
    20 relative humidity readings.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 如预期，形状反映了每个数据集的大小、窗口大小和1维。*1*维表示我们正在对未来进行一次预测。训练集包含315,393条记录，由包含20个相对湿度读数的窗口组成。测试集包含105,118条记录，由包含20个相对湿度读数的窗口组成。
- en: So why do we have 315,393 training observations instead of the original 315,413?
    The reason is that we need the first window to act as history. So just subtract
    the first window of 20 from 315,413\. For test data, subtract the first window
    of 20 from 105,138 to get 105,118.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，为什么我们有315,393个训练观测值而不是原始的315,413个？原因是我们需要第一个窗口作为历史数据。所以，只需从315,413中减去第一个20个窗口。对于测试数据，从105,138中减去第一个20个窗口，得到105,118。
- en: We can create bigger windows, but this dramatically increases the amount of
    data we must process. With only 20 observations per window, we already have 6,307,860
    (315,393 `×` 20) data points for training and 2,102,360 (105,118 `×` 20) data
    points for testing!
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以创建更大的窗口，但这会显著增加我们必须处理的数据量。每个窗口只有20个观测值，我们已经有6,307,860（315,393 `×` 20）个训练数据点和2,102,360（105,118
    `×` 20）个测试数据点！
- en: View Windows of Past History
  id: totrans-102
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 查看过去历史窗口
- en: 'Inspect the first window from the train set:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 检查训练集中的第一个窗口：
- en: '[PRE21]'
  id: totrans-104
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: As expected, the window contains 20 relative humidity readings. So how did we
    get the target?
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 如预期，窗口包含20个相对湿度读数。那么我们是如何得到目标的？
- en: 'Take the last entry from the next window:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 从下一个窗口中取最后一条记录：
- en: '[PRE22]'
  id: totrans-107
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: 'Verify by inspecting the second window:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 通过检查第二个窗口进行验证：
- en: '[PRE23]'
  id: totrans-109
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: Let’s see if the pattern holds for the next few windows as shown in Listing
    [10-5](#PC25).
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看下一个几个窗口的模式是否保持不变，如列表[10-5](#PC25)所示。
- en: '[PRE24]'
  id: totrans-111
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: Plot a Single Example
  id: totrans-112
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 绘制单个示例
- en: 'Create a function that returns a list of time steps from *-length* to *0*:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数，返回从*长度*到*0*的时间步长列表：
- en: '[PRE25]'
  id: totrans-114
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: Start at -length to 0 to use the previous window as history.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 从-length到0开始，使用上一个窗口作为历史数据。
- en: Create another function that accepts a single data window and its target, delta,
    and a title as shown in Listing [10-6](#PC27).
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 创建另一个函数，接受单个数据窗口及其目标、delta和一个标题，如列表[10-6](#PC27)所示。
- en: '[PRE26]'
  id: totrans-117
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: Parameter *delta* indicates a change in a variable. The default is no change.
    The function plots each element in the data window with its associated time step.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 参数*delta*表示变量的变化。默认值为无变化。该函数将数据窗口中的每个元素及其相关的时间步长绘制出来。
- en: 'Invoke the function based on the first data window and target from the train
    set:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 根据训练集中的第一个数据窗口和目标调用该函数：
- en: '[PRE27]'
  id: totrans-120
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: The *actual future* for each window is its label, which is the last entry of
    the next window.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 每个窗口的*实际未来*是其标签，即下一个窗口的最后一条记录。
- en: Create a Visual Performance Baseline
  id: totrans-122
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建可视化性能基线
- en: Before training, it is a good idea to create a simple visual performance baseline
    to compare against model performance. Of course, there are many ways to do this,
    but a very simple way is to use the average of the last 20 observations.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 在训练之前，创建一个简单的可视化性能基线来与模型性能进行比较是个好主意。当然，有很多方法可以做到这一点，但一个非常简单的方法是使用最后20个观测值的平均值。
- en: 'Create a function that returns the average of a window of observations:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数，返回观测值窗口的平均值：
- en: '[PRE28]'
  id: totrans-125
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: 'Plot the first data window with a baseline prediction:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 使用基线预测绘制第一个数据窗口：
- en: '[PRE29]'
  id: totrans-127
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: Create a Baseline Metric
  id: totrans-128
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建基线指标
- en: It’s also a good idea to create a baseline metric to compare against our model.
    The simplest approach is to predict the last value for each window. We can then
    find the average mean squared error of the predictions and use this value as our
    metric.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个基线指标来与我们的模型进行比较也是个好主意。最简单的方法是预测每个窗口的最后值。然后我们可以找到预测的平均均方误差，并使用这个值作为我们的指标。
- en: Create a baseline metric as shown in Listing [10-7](#PC31).
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个基线指标，如列表[10-7](#PC31)所示。
- en: '[PRE30]'
  id: totrans-131
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: The MSE is very small, which means that our baseline metric might be hard to
    beat. Why? In general, machine learning has a pretty significant limitation. Unless
    the learning algorithm is hardcoded to look for a specific kind of simple model,
    parameter learning can sometimes fail to find a simple solution to a simple problem.
    Our time series problem is a very simple problem.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 均方误差（MSE）非常小，这意味着我们的基线指标可能很难超越。为什么？一般来说，机器学习有一个相当明显的局限性。除非学习算法被硬编码为寻找特定类型的简单模型，否则参数学习有时可能无法找到简单问题的简单解决方案。我们的时间序列问题是一个非常简单的问题。
- en: Finish the Input Pipeline
  id: totrans-133
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 完成输入管道
- en: Shuffle train data, batch, and cache as shown in Listing [10-8](#PC32).
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表[10-8](#PC32)所示，对训练数据进行洗牌、分批和缓存。
- en: '[PRE31]'
  id: totrans-135
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: 'Inspect tensors:'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 检查张量：
- en: '[PRE32]'
  id: totrans-137
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: As expected, windows have 20 observations and 1 prediction.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 如预期，窗口有20个观测值和1个预测值。
- en: Explore a Data Window
  id: totrans-139
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 探索数据窗口
- en: 'Verify that features and labels are batched in 256-element windows:'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 验证特征和标签是否以256元素窗口进行分批：
- en: '[PRE33]'
  id: totrans-141
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: 'Display the first window from the batch:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 显示批次中的第一个窗口：
- en: '[PRE34]'
  id: totrans-143
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: As expected, the window contains a feature set with 20 observations and a label
    with one prediction.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 如预期，窗口包含一个包含20个观测值的特征集和一个包含一个预测的标签。
- en: Create the Model
  id: totrans-145
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建模型
- en: 'Establish the input shape:'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 建立输入形状：
- en: '[PRE35]'
  id: totrans-147
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: Input shape indicates window size of 20 with 1 prediction.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 输入形状表示20个窗口大小和1个预测。
- en: Import requisite libraries, clear previous model sessions, generate a seed for
    reproducibility, and create the model as shown in Listing [10-9](#PC37).
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 导入必要的库，清除之前的模型会话，生成一个用于可重复性的种子，并创建如列表[10-9](#PC37)所示的模型。
- en: '[PRE36]'
  id: totrans-150
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: A RNN is well suited to time series data because its layers can provide feedback
    to earlier layers. Specifically, it processes time series data time step by time
    step while remembering information it sees during training. Our model uses a GRU
    layer, which is a specialized RNN layer capable of remembering information over
    long periods of time. So it is especially well suited for time series modeling.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: RNN非常适合时间序列数据，因为它的层可以为早期层提供反馈。具体来说，它按时间步逐个处理时间序列数据，同时记住它在训练期间看到的信息。我们的模型使用GRU层，这是一种专门的时间序列建模RNN层，能够记住长时间内的信息。因此，它非常适合时间序列建模。
- en: Model Summary
  id: totrans-152
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型摘要
- en: 'Inspect the model:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 检查模型：
- en: '[PRE37]'
  id: totrans-154
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: We use the formula *3* `×` *(n*^(*2*) `×` *mn + 2n)* to calculate the number
    of learnable parameters for a GRU, where *m* is the input dimension and *n* is
    the output dimension. For any neural net, multiply output from the previous layer
    by neurons at the current layer (*m* `×` *n*). In addition, account for neurons
    at the current layer. But count them twice because of feedback (*2n*). A GRU layer
    has feedback, so square the output dimension (*n*^(*2*)). Multiply by *3* because
    there are three sets of operations for a GRU (hidden state, reset gate, and update
    gate) that require weight matrices.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用公式 *3* `×` *(n*^(*2*) `×` *mn + 2n)* 来计算GRU的可学习参数数量，其中 *m* 是输入维度，*n* 是输出维度。对于任何神经网络，将前一层输出乘以当前层的神经元（*m*
    `×` *n*）。此外，考虑到当前层的神经元。但由于反馈（*2n*），需要将它们计数两次。GRU层有反馈，所以平方输出维度（*n*^(*2*)）。由于GRU有三个操作集（隐藏状态、重置门和更新门）需要权重矩阵，所以乘以*3*。
- en: 'Here is the breakdown to calculate parameters for the GRU layer:'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是计算GRU层参数的分解：
- en: 3 `×` (32² + 32 + 2 `×` 32)
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 3 `×` (32² + 32 + 2 `×` 32)
- en: 3 `×` (1024 + 32 + 64)
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 3 `×` (1024 + 32 + 64)
- en: 3 `×` 1120
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 3 `×` 1120
- en: '*3,360*'
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*3,360*'
- en: The output dimension is 32\. The input dimension doesn’t exist since there is
    no previous layer.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 输出维度是32。由于没有前一层，输入维度不存在。
- en: The dense layer has 33 learnable parameters calculated by multiplying neurons
    from the previous layer (32) by neurons at the current layer (1) and adding the
    number of neurons at the current layer (1).
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 密集层有33个可学习参数，这是通过将前一层（32）的神经元乘以当前层（1）的神经元，并加上当前层的神经元数量（1）计算得出的。
- en: Verify Model Output
  id: totrans-163
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 验证模型输出
- en: 'Make an *untrained* prediction from the model:'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 从模型中进行一个*未训练*的预测：
- en: '[PRE38]'
  id: totrans-165
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: The prediction shows batch size of 256 with 1 prediction. So the model is working
    as expected.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 预测显示批大小为256，预测1个。所以模型按预期工作。
- en: Compile the Model
  id: totrans-167
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编译模型
- en: 'Compile:'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 编译：
- en: '[PRE39]'
  id: totrans-169
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: Train the Model
  id: totrans-170
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 训练模型
- en: 'Train :'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 训练：
- en: '[PRE40]'
  id: totrans-172
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: Generalize on Test Data
  id: totrans-173
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在测试数据上推广
- en: 'Generalize:'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 推广：
- en: '[PRE41]'
  id: totrans-175
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: Make Predictions
  id: totrans-176
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 进行预测
- en: Make three predictions as shown in Listing [10-10](#PC43).
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表[10-10](#PC43)所示进行三次预测。
- en: '[PRE42]'
  id: totrans-178
  prefs: []
  type: TYPE_PRE
  zh: '[PRE42]'
- en: Although visual inspection is pretty, it doesn’t efficiently gauge overall performance.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然视觉检查很漂亮，但它并不能有效地衡量整体性能。
- en: Plot Model Performance
  id: totrans-180
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 绘制模型性能图
- en: 'Listing [10-11](#PC44) plots model performance:'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 列表[10-11](#PC44)绘制了模型性能：
- en: '[PRE43]'
  id: totrans-182
  prefs: []
  type: TYPE_PRE
  zh: '[PRE43]'
- en: Voilà! Our model performs pretty well!
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: Voilà！我们的模型表现相当不错！
- en: Forecast a Multivariate Time Series
  id: totrans-184
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 预测多元时间序列
- en: We just demonstrated how to make a single prediction based on a single feature.
    Now, let’s make multiple predictions on multiple variables. We can choose any
    of the 14 features (we don’t want to predict from the date-time reference).
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 我们刚刚展示了如何根据单个特征进行单次预测。现在，让我们对多个变量进行多次预测。我们可以选择14个特征中的任何一个（我们不想从日期时间参考中进行预测）。
- en: 'The following are the available 14 features:'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是可以用的14个特征：
- en: p (mbar) – Atmospheric pressure in millibars
