- en: We chose four features – Tdew (degC), sh (g/kg), H2OC (mmol/mol), and T (degC).
    *Tdew (degC)* is the temperature in Celsius relative to humidity. *sh (g/kg)*
    is the specific humidity in grams per kilogram. *H2OC (mmol/mol)* is the water
    vapor concentration in millimoles per mole. And *T (degC)* is the temperature
    in Celsius. We chose these features for demonstration purposes only. Choice of
    features should be based on a problem domain.
  prefs: []
