  type: TYPE_PRE
- en: As expected, shapes reflect size of each dataset, window size, and the 1 dimension.
    The *1* dimension indicates that we are making one prediction into the future.
    The train set contains 315,393 records composed of windows holding 20 relative
    humidity readings. The test set contains 105,118 records composed of windows holding
    20 relative humidity readings.
  prefs: []
  type: TYPE_NORMAL
- en: So why do we have 315,393 training observations instead of the original 315,413?
    The reason is that we need the first window to act as history. So just subtract
    the first window of 20 from 315,413\. For test data, subtract the first window
    of 20 from 105,138 to get 105,118.
  prefs: []
  type: TYPE_NORMAL
- en: We can create bigger windows, but this dramatically increases the amount of
