- en: 10. Time Series Forecasting with RNNs
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: We’ve already leveraged RNNs for NLP. In this chapter, we create experiments
    to forecast with time series data. We use the famous *Weather* dataset to demonstrate
    both a univariate and a multivariate example.
  prefs: []
  type: TYPE_NORMAL
- en: A RNN is well suited for time series forecasting because it remembers the past
    and its decisions are influenced by what it has learned from the past. So it makes
    good decisions as data changes. **Time series forecasting** is deploying a model
    to predict future values based on previously observed values.
  prefs: []
  type: TYPE_NORMAL
- en: Time series data is different than what we’ve worked with so far because it
    is a sequence of observations taken sequentially in time. Time series data includes
    a time dimension, which is an explicit order dependence between observations.
  prefs: []
  type: TYPE_NORMAL
- en: Weather Forecasting
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Forecasting the weather is a difficult and complex endeavor. But leading-edge
    companies like Google, IBM, Monsanto, and Facebook are leveraging AI technology
    to realize accurate and timely weather forecasts. Given the introductory nature
    of our lessons, we cannot hope to demonstrate such complex AI experiments. But
    we show you how to build simple time series forecasting models with weather data.
  prefs: []
  type: TYPE_NORMAL
- en: 'Notebooks for chapters are located at the following URL: [`https://github.com/paperd/tensorflow`](https://github.com/paperd/tensorflow).'
  prefs: []
  type: TYPE_NORMAL
- en: The Weather Dataset
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We introduce time series forecasting with RNNs for a univariate problem. We
    then forecast a multivariate time series. We use weather time series data to train
    our models. The data we use is recorded by the Max Planck Institute for Biogeochemistry.
