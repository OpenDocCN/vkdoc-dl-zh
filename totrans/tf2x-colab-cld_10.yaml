- en: We see that data collection began on January 1, 2009, and ended on December
    31, 2016\. The last data recorded was on January 1, 2017, but it’s irrelevant
    for our purposes since it is the only recorded piece of data for that year. We
    also see that data is recorded every 10 minutes. So the time step for this experiment
    is 10 minutes. A **time step** is a single occurrence of an event.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到数据收集始于 2009 年 1 月 1 日，结束于 2016 年 12 月 31 日。最后一条记录是在 2017 年 1 月 1 日，但对于我们的目的来说并不重要，因为它是该年度唯一记录的数据。我们还看到数据每
    10 分钟记录一次。因此，本实验的时间步长为 10 分钟。**时间步长**是事件的单次发生。
- en: The first timestamp begins on January 1, 2009 (01.01.2009), with data recorded
    from 00:00:00 to 00:10:00\. The second timestamp begins immediately after 00:10:00
    to 00:20:00\. This pattern continues throughout the day with the last time step
    at 23:50:00\. The second day (and all subsequent days), January 2, 2009 (02.01.2009),
    follows the same pattern. Generally, time series forecasting predicts the observation
    at the next time step.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个时间戳从2009年1月1日（01.01.2009）开始，数据记录从00:00:00到00:10:00。第二个时间戳从00:10:00开始，到00:20:00结束。这种模式一整天都在继续，最后的时间步在23:50:00。第二天（以及所有后续的日子），2009年1月2日（02.01.2009），遵循相同的模式。通常，时间序列预测预测下一个时间步的观测值。
