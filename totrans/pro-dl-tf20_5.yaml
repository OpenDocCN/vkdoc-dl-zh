  id: totrans-567
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: From Figure [5-22](#Fig24) and Figure [5-23](#Fig25), it is evident that the
    denoising autoencoder does a good job of removing the salt and pepper noise. Do
    note that the autoencoders are trained separately, once for handling Gaussian
    noise and once for handling salt and pepper noise.
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
- en: Variational Autoencoders
  id: totrans-569
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Variational autoencoders are a special form of autoencoders that can be used
    as generative models and are based on variational inference. Generally, in an
    autoencoder, the encoder has a fixed mapping from an observable *x* to a latent
    variable *z*, while in a variational autoencoder, the encoder maps the observable
    *x* to a probability distribution *P*(*z*| *x*). To appreciate variation autoencoder,
    let us spend some time on variational inference.
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
- en: Variational Inference
  id: totrans-571
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To understand variational inference, we assume a generative process where the
    latent variable *z* generates the observable *x* through some probability distribution
    *p*(*x*| *z*). We want to learn about the latent variable *z* by observing x.
    In other words, we are interested in the posterior distribution *p*(*z*| *x*).
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
- en: 'The posterior *p*(*z*| *x*) can be expressed as in the following using Bayes
    rule:'
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ p\left(z|x\right)=\frac{p\left(x,z\right)}{p(x)} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equcr.png)'
  id: totrans-574
  prefs: []
  type: TYPE_IMG
- en: 'The evidence *p*(*x*) can be expressed as follows:'
  id: totrans-575
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ p(x)=\underset{z}{\int }p\left(x|z\right)p(z) dz $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equcs.png)'
  id: totrans-576
  prefs: []
  type: TYPE_IMG
- en: Computing this integral is often intractable especially when *z* is very high
    dimensional. This makes computing *p*(*x*) intractable.
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
- en: One of the ways to get rid of the problem is to compute the integral using Markov
    chain Monte Carlo methods such as Metropolis-Hastings algorithm or Gibbs sampling.
    The integral computation in such cases would have low bias but high variance.
  id: totrans-578
  prefs: []
  type: TYPE_NORMAL
- en: The other way to deal with the problem is to resort to variational inference
    where we try to approximate the posterior *p*(*z*| *x*) by another distribution
    *q*[*θ*](*z*| *x*) by minimizing the KL(Kullback-Leibler) divergence between *q*[*θ*](*z*|
    *x*) and *p*(*z*| *x*). Remember we have studied earlier in this chapter that
    KL (Kullback-Leibler) divergence captures the discrepancy or distance between
    two probability distributions. The variational inference premises is captured
    in Figure [5-24](#Fig26) (see below).
  id: totrans-579
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig26_HTML.jpg)'
  id: totrans-580
  prefs: []
  type: TYPE_IMG
- en: A diagram illustrates 2 circles labeled latent variable and observation connected
    by generative process, posterior and posterior approximation. A text at the bottom
    reads, understand latent variable from observation through the posterior or through
    its approximation using variation inference.
  id: totrans-581
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-24
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
- en: Variational inference setup
  id: totrans-583
  prefs: []
  type: TYPE_NORMAL
- en: 'The KL divergence between the approximate posterior distribution *q*[*θ*](*z*|
    *x*) and the true posterior distribution is given by the following:'
  id: totrans-584
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ KL\Big(q\mid \left|p\right)={E}_{z\sim {q}_{\theta}\left(z|x\right)}\
    \log \frac{q_{\theta}\left(z|x\right)}{p\left(z|x\right)} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equct.png)'
  id: totrans-585
  prefs: []
  type: TYPE_IMG
- en: We would like to minimize the KL divergence with respect to the parameter set
    *θ*. Before we work on the minimization, let us try to simplify the KL divergence
    expression that would be convenient to have.
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ KL\Big(q\mid \left|p\right)={E}_{z\sim {q}_{\theta}\left(z|x\right)}\
    \log \frac{q_{\theta}\left(z|x\right)}{p\left(z|x\right)} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equcu.png)'
  id: totrans-587
  prefs: []
  type: TYPE_IMG
- en: '![$$ ={E}_{z\sim {q}_{\theta}\left(z|x\right)}\ \log\ \frac{q_{\theta}\left(z|x\right)p(x)}{p\left(x,z\right)}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equcv.png)'
  id: totrans-588
  prefs: []
  type: TYPE_IMG
- en: '![$$ ={E}_{z\sim {q}_{\theta}\left(z|x\right)}\ \log\ \frac{q_{\theta}\left(z|x\right)p(x)}{p\left(x|z\right)p(z)}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equcw.png)'
  id: totrans-589
  prefs: []
  type: TYPE_IMG
- en: '![$$ ={E}_{z\sim {q}_{\theta}\left(z|x\right)}\ \log\ \frac{q_{\theta}\left(z|x\right)}{p\left(x|z\right)p(z)}+{E}_{z\sim
    {q}_{\theta}\left(z|x\right)}\log p(x) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equcx.png)'
  id: totrans-590
  prefs: []
  type: TYPE_IMG
- en: 'The log*p*(*x*) does not depend on the latent variable *z* and hence is a constant.
    This makes the KL divergence expression as follows:'
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ KL\Big(q\mid \left|p\right)={E}_{z\sim {q}_{\theta}\left(z|x\right)}\
    \log \frac{q_{\theta}\left(z|x\right)}{p\left(z|x\right)} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equcy.png)'
  id: totrans-592
  prefs: []
  type: TYPE_IMG
- en: '![$$ ={E}_{z\sim {q}_{\theta}\left(z|x\right)}\ \log\ \frac{q_{\theta}\left(z|x\right)}{p\left(x|z\right)p(z)}+\log
    p(x){E}_{z\sim {q}_{\theta}\left(z|x\right)}(1) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equcz.png)'
  id: totrans-593
  prefs: []
  type: TYPE_IMG
- en: '![$$ ={E}_{z\sim {q}_{\theta}\left(z|x\right)}\ \log\ \frac{q_{\theta}\left(z|x\right)}{p\left(x|z\right)p(z)}+\log
    p(x) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equda.png)'
  id: totrans-594
  prefs: []
  type: TYPE_IMG
- en: If we rearrange the terms,
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \log p(x)= KL\Big(q\mid \left|p\right)-{E}_{z\sim {q}_{\theta}\left(z|x\right)}\
    \log\ \frac{q_{\theta}\left(z|x\right)}{p\left(x|z\right)p(z)} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equdb.png)'
  id: totrans-596
  prefs: []
  type: TYPE_IMG
- en: 'Since log*p*(*x*) is not dependent on *z* and is constant, minimization of
    the *KL*(*q* ∣ |*p*) which we had set out to do initially would simplify to maximization
    of the following:'
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ -{\boldsymbol{E}}_{\boldsymbol{z}\sim {\boldsymbol{q}}_{\boldsymbol{\theta}}\left(\boldsymbol{z}|\boldsymbol{x}\right)}\
    \mathbf{\log}\ \frac{{\boldsymbol{q}}_{\boldsymbol{\theta}}\left(\boldsymbol{z}|\boldsymbol{x}\right)}{\boldsymbol{p}\left(\boldsymbol{x}|\boldsymbol{z}\right)\boldsymbol{p}\left(\boldsymbol{z}\right)}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equdc.png)'
  id: totrans-598
  prefs: []
  type: TYPE_IMG
- en: Also, since the KL divergence is always greater than zero,
  id: totrans-599
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \mathbf{\log}\boldsymbol{p}\left(\boldsymbol{x}\right)\ge -{\boldsymbol{E}}_{\boldsymbol{z}\sim
    {\boldsymbol{q}}_{\boldsymbol{\theta}}\left(\boldsymbol{z}|\boldsymbol{x}\right)}\
    \mathbf{\log}\ \frac{{\boldsymbol{q}}_{\boldsymbol{\theta}}\left(\boldsymbol{z}|\boldsymbol{x}\right)}{\boldsymbol{p}\left(\boldsymbol{x}|\boldsymbol{z}\right)\boldsymbol{p}\left(\boldsymbol{z}\right)}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equdd.png)'
  id: totrans-600
  prefs: []
  type: TYPE_IMG
- en: Because the above holds true, ![$$ -{E}_{z\sim {q}_{\theta}\left(z|x\right)}\
    \log\ \frac{q_{\theta}\left(z|x\right)}{p\left(x|z\right)p(z)} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq28.png)
    is called the lower bound on the evidence log*p*(*x*). This lower bound on the
    evidence is also abbreviated as ELBO. Minimizing the KL divergence is equivalent
    to maximizing the ELBO objective.
  id: totrans-601
  prefs: []
  type: TYPE_NORMAL
- en: So, in variation inference, we can maximize ![$$ -{E}_{z\sim {q}_{\theta}\left(z|x\right)}\
    \log\ \frac{q_{\theta}\left(z|x\right)}{p\left(x|z\right)p(z)} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq29.png)
    or rather minimize the cost ![$$ {E}_{z\sim {q}_{\theta}\left(z|x\right)}\ \log\
    \frac{q_{\theta}\left(z|x\right)}{p\left(x|z\right)p(z)} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq30.png)
    with an objective to learn the encoder *q*[*θ*](*z*| *x*). We can represent the
    ELBO cost to be minimized as *L* and hence
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ L={E}_{z\sim {q}_{\theta}\left(z|x\right)}\ \log\ \frac{q_{\theta}\left(z|x\right)}{p\left(x|z\right)p(z)}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equde.png)'
  id: totrans-603
  prefs: []
  type: TYPE_IMG
- en: Variational Autoencoder Objective from ELBO
  id: totrans-604
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In a variational autoencoder, the posterior approximation *q*[*θ*](*z*| *x*)
    can be modeled as an encoder that takes *x* as input and outputs a conditional
    distribution *q*[*θ*](*z*| *x*) over the latent space *z*. We want to have a latent
    space of *z* from which we can sample *x* using a generative process *p*(*x*|
    *z*). Hence, we would like to constraint the latent space over *z* to a known
    distribution that we can sample from. An independent Gaussian distribution over
    the latent space *z* would be a good choice. Hence, we can constraint *z* ∈ *R*^(*d*)
    to have an independent Gaussian prior with zero mean and unit variance.
  id: totrans-605
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ p(z)=N\left(0,{I}_{d\times d}\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equdf.png)'
  id: totrans-606
  prefs: []
  type: TYPE_IMG
- en: Coming back to the generative process, we can define *p*[*ϕ*](*x*| *z*) through
    a decoder block which can take in *z* sampled from Gaussian prior *P*(*z*) and
    give out a distribution *p*[*ϕ*](*x*| *z*). Given an observation *x* if *z* happens
    to be sampled from *q*[*θ*](*z*| *x*) , then x should be highly probable under
    *p*[*ϕ*](*x*| *z*).
  id: totrans-607
  prefs: []
  type: TYPE_NORMAL
- en: The constraint on *z* to belong to a zero mean unit variance independent Gaussian
    prior also enforces the posterior approximation distribution *q*[*θ*](*z*| *x*)
    to give out *z* as if it has been sampled from the prior *p*(*z*). The variational
    autoencoder setup we just described is illustrated in Figure [5-25](#Fig27).
  id: totrans-608
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig27_HTML.jpg)'
  id: totrans-609
  prefs: []
  type: TYPE_IMG
- en: An illustration consists of 2 rectangles labeled encoder and decoder mapping.
    The space between them is marked as latent space.
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-25
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
- en: Variational autoencoder block diagram
  id: totrans-612
  prefs: []
  type: TYPE_NORMAL
- en: 'Now let us see if we can rearrange the ELBO cost to give the desired capabilities
    to the variational autoencoders as we have discussed earlier in this section:'
  id: totrans-613
  prefs: []
  type: TYPE_NORMAL
- en: '*z*~*q*[*θ*](*z*| *x*) should look like samples from the prior distribution
    *p*(*z*) so that we can use decoder *p*[*ϕ*](*x*| *z*) as a generative process
    that maps *z* to *x*.'
  id: totrans-614
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If *z* is sampled from *q*[*θ*](*z*| *x*), then *p*[*ϕ*](*x*| *z*) should be
    highly probable.
  id: totrans-615
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The ELBO cost that we last saw and would like to minimize can be simplified
    as follows:'
  id: totrans-616
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ L={E}_{z\sim {q}_{\theta}\left(z|x\right)}\ \log\ \frac{q_{\theta}\left(z|x\right)}{p\left(x|z\right)p(z)}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equdg.png)'
  id: totrans-617
  prefs: []
  type: TYPE_IMG
- en: '![$$ ={E}_{z\sim {q}_{\theta}\left(z|x\right)}\ \log\ \frac{q_{\theta}\left(z|x\right)}{p(z)}-\kern0.5em
    {E}_{z\sim {q}_{\theta}\left(z|x\right)}\ \log\ p\left(x|z\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equdh.png)'
  id: totrans-618
  prefs: []
  type: TYPE_IMG
- en: The first term ![$$ {E}_{z\sim {q}_{\theta}\left(z|x\right)}\ \log\ \frac{q_{\theta}\left(z|x\right)}{p(z)}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq31.png) is nothing
    but the KL divergence of *q*[*θ*](*z*| *x*) with that of prior *p*(*z*). So, to
    minimize the ELBO cost, we should minimize ![$$ {E}_{z\sim {q}_{\theta}\left(z|x\right)}\
    \log\ \frac{q_{\theta}\left(z|x\right)}{p(z)} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq32.png)
    which would basically make the distribution *q*[*θ*](*z*| *x*) biased toward the
    prior *p*(*z*).
  id: totrans-619
  prefs: []
  type: TYPE_NORMAL
- en: The minimization of the second term ![$$ -\kern0.5em {E}_{z\sim {q}_{\theta}\left(z|x\right)}\
    \log\ p\left(x|z\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq33.png)
    would mean, given a latent variable *z* sampled from the approximate posterior
    *q*[*θ*](*z*| *x*) with *x* as input, the same (latent variable *z*) should be
    highly probable under *p*[*ϕ*](*x*| *z*). The distribution *p*[*ϕ*](*x*| *z*)
    is represented by a mean prediction ![$$ \hat{x} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq34.png)
    and constant covariance matrix *σ*²*I*. Hence, ![$$ -\kern0.5em {E}_{z\sim {q}_{\theta}\left(z|x\right)}\
    \log\ p\left(x|z\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq35.png)
    can be expressed as a reconstruction loss ![$$ {L}_R\left(x,\hat{x}\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq36.png)
    in going from *x* to ![$$ \hat{x} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq37.png).
  id: totrans-620
  prefs: []
  type: TYPE_NORMAL
- en: 'Hence the overall ELBO cost can be rewritten as follows:'
  id: totrans-621
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ L= KL\left({q}_{\theta}\left(z|x\right)\Big\Vert p(z)\right)+{L}_R\left(x,\hat{x}\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equdi.png)'
  id: totrans-622
  prefs: []
  type: TYPE_IMG
- en: 'In general, we use a scalar *λ* to weight the two losses in ELBO, and hence
    we can write the overall ELBO cost as follows:'
  id: totrans-623
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ L= KL\left({q}_{\theta}\left(z|x\right)\Big\Vert p(z)\right)+{\lambda
    L}_R\left(x,\hat{x}\right) $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equdj.png)'
  id: totrans-624
  prefs: []
  type: TYPE_IMG
- en: 'If we take *M* training data points summing the loss for all *M* data points,
    we can express the loss as follows:'
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ L=\sum \limits_{i=0}^{M-1} KL\left({q}_{\theta}\left({z}_i|{x}_i\right)\Big\Vert
    p\left({z}_i\right)\right)+\lambda {\sum}_{i=0}^{M-1}{L}_R\left({x}_i,\hat{x_i}\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equdk.png)'
  id: totrans-626
  prefs: []
  type: TYPE_IMG
- en: The optimal estimates of encoder parameters *θ* and decoder parameters *ϕ* can
    be determined by minimizing *L* with respect to *θ* and *ϕ*.
  id: totrans-627
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \hat{\theta},\hat{\phi}=\arg \underset{\theta, \phi }{\min }L=\arg \underset{\theta,
    \phi }{\min}\sum \limits_{i=0}^{M-1} KL\left({q}_{\theta}\left({z}_i|{x}_i\right)\Big\Vert
    p\left({z}_i\right)\right)+\lambda {\sum}_{i=0}^{M-1}{L}_R\left({x}_i,\hat{x_i}\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equdl.png)'
  id: totrans-628
  prefs: []
  type: TYPE_IMG
- en: Implementation Details of the Variational Autoencoder
  id: totrans-629
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The reconstruction loss is generally taken as either the L2 or the L1 norm
    of the difference of the original input *x* and the reconstructed input ![$$ \hat{\boldsymbol{x}}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq38.png), and
    hence in a generalized form, we can write the reconstruction loss as follows:'
  id: totrans-630
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {L}_R\left({x}_i,\hat{x_i}\right)={\left\Vert x-\hat{x}\right\Vert}_p^p
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equdm.png)'
  id: totrans-631
  prefs: []
  type: TYPE_IMG
- en: where p=1 is for L1 norm reconstruction loss while *p* = 2 is for L2 norm reconstruction
    loss.
  id: totrans-632
  prefs: []
  type: TYPE_NORMAL
- en: Since in variational inference we want to use the decoder to induce a generative
    process, the prior *p*(*z*) is conveniently chosen as a zero mean and unit standard
    deviation Gaussian distribution. Also, the *d* components of *z* ∈ *R*^(*d*) are
    conveniently chosen to be independent.
  id: totrans-633
  prefs: []
  type: TYPE_NORMAL
- en: 'The encoder learns a mapping from the observation *x* to the conditional distribution
    *q*[*θ*](*z*| *x*). Since the sampled *z*~*q*[*θ*](*z*| *x*) should seem like
    they are from the prior distribution *p*(*z*), it is convenient to assume that
    *q*[*θ*](*z*| *x*) is Gaussian distribution as well where the dimensions of *z*
    are independent of each other. Hence for a given observable *x* and its corresponding
    latent variable vector *z* sampled from *q*[*θ*](*z*| *x*), the following will
    hold true where *z* = [*z*^((0))*z*^((1)). . *z*^((*d* − 1))]^(*T*):'
  id: totrans-634
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {q}_{\theta}\left(z|x\right)=\prod \limits_{j=0}^{d-1}{q}_{\theta}^{(j)}\left({z}^{(j)}|x\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equdn.png)'
  id: totrans-635
  prefs: []
  type: TYPE_IMG
- en: '![$$ {q}_{\theta}^{(j)}\left({z}^{(j)}|x\right)\sim N\left({u}^{(j)},{\sigma^{(j)}}^2\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equdo.png)'
  id: totrans-636
  prefs: []
  type: TYPE_IMG
- en: 'Since we have made the independent Gaussian distribution assumption over *z*,
    the encoder would output a mean *u*^((*j*)) and variance *σ*^((*j*)2) for each
    dimension of z. We should be able to sample each *z*^((*j*)) from *N*(*u*^((*j*)),
    *σ*^((*j*)2)) to come up with the *z* that can be fed to the decoder. However,
    basic random sampling of *z*^((*j*)) based on *N*(*u*^((*j*)), *σ*^((*j*)2)) would
    not suffice as we need to ensure that gradient can pass through the predicted
    *u*^((*j*)) and *σ*^((*j*)2) during backpropagation. The trick that we use is
    to sample a value *ϵ*~*N*(0, 1) and take the *z*^((*j*)) realization as follows:'
  id: totrans-637
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {z}^{(j)}={u}^{(j)}+\epsilon \ast {\sigma}^{(j)} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equdp.png)'
  id: totrans-638
  prefs: []
  type: TYPE_IMG
- en: This is called the reparameterization trick and is a clever way to ensure that
    gradient can still flow through the predicted *u*^((*j*)) and *σ*^((*j*)2).
  id: totrans-639
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have a good understanding as to how variational autoencoders work
    and how they are based on variational inference, we will work on its implementation
    in the next section.
  id: totrans-640
  prefs: []
  type: TYPE_NORMAL
- en: Implementation of Variational Autoencoder
  id: totrans-641
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this section, we implement the variation autoencoder using MNIST data. One
    of the key aspects in variational autoencoder is the predicted posterior distribution
    *q*[*θ*](*z*| *x*) and how we sample *z* from it before it is passed through the
    decoder *p*[*ϕ*](*x*| *z*) to get the reconstructed version of x that we denote
    as ![$$ \hat{x} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq39.png).
    The other aspect is the KL divergence loss we minimize between posterior distribution
    *q*[*θ*](*z*| *x*) and prior *p*(*z*) to ensure that *z* sampled from *q*[*θ*](*z*|
    *x*) can be made to look like coming from the prior *p*(*z*). This allows us to
    sample z from *p*(*z*) and construct realistic output images ![$$ \hat{x} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq40.png)
    through the decoder *p*[*ϕ*](*x*| *z*).
  id: totrans-642
  prefs: []
  type: TYPE_NORMAL
- en: 'We would have to derive a form for KL divergence ![$$ \sum \limits_{i=0}^{M-1}
    KL\left({q}_{\theta}\left({z}_i|{x}_i\right)\Big\Vert p\left({z}_i\right)\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq41.png) as it
    factors in the loss objective. Since we assume a zero mean unit variance Gaussian
    per latent dimension *z*^((*j*)), we can leverage the KL divergence formula for
    two univariate distributions. The KL divergence between two univariate normal
    distribution is given by the following:'
  id: totrans-643
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ KL\left(N\left({u}_1,{\sigma}_1^2\right)\Big\Vert N\left({u}_2,{\sigma}_2^2\right)\right)=\log
    \frac{\sigma_2}{\sigma_1}+\frac{\sigma_1^2+{\left({u}_1-{u}_2\right)}^2}{2{\sigma}_2^2}-\frac{1}{2}
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equdq.png)'
  id: totrans-644
  prefs: []
  type: TYPE_IMG
- en: 'Since we want to sample from a known distribution, we conveniently take the
    following:'
  id: totrans-645
  prefs: []
  type: TYPE_NORMAL
- en: '*p*(*z*^((*j*))) = *N*(0, 1)'
  id: totrans-646
  prefs: []
  type: TYPE_NORMAL
- en: 'Taking ![$$ {q}_{\theta}^{(j)}\left({z}^{(j)}|x\right)=N\left({u}_1,{\sigma}_1^2\right)
    $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_IEq42.png) and *p*(*z*^((*j*))) = *N*(0,
    1) , we have the following:'
  id: totrans-647
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ KL\left({q}_{\theta}^{(j)}\left({z}^{(j)}|x\right)\Big\Vert\ p\left({z}^{(j)}\right)\right)=-\log
    {\sigma}_1+\frac{\sigma_{!}^2+{u}_1^2}{2}-\frac{1}{2} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equdr.png)'
  id: totrans-648
  prefs: []
  type: TYPE_IMG
- en: This expression for KL divergence would be used in the loss objective for the
    variational autoencoder training for each latent dimension *z*^((*j*)).
  id: totrans-649
  prefs: []
  type: TYPE_NORMAL
- en: The detail implementation of the variational autoencoder implementation is outlined
    in Listing [5-6](#PC8).
  id: totrans-650
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig30_HTML.jpg)'
  id: totrans-651
  prefs: []
  type: TYPE_IMG
- en: An illustration represents 50 boxes arranged in 5 rows and 10 columns. Each
    box contains a single-digit number. The images are slightly blurred.
  id: totrans-652
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-28
  id: totrans-653
  prefs: []
  type: TYPE_NORMAL
- en: Images generated through the variational autoencoder’s decoder with noise *z*
    sampled from prior *p*(*z*) as input
  id: totrans-654
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig29_HTML.png)'
  id: totrans-655
  prefs: []
  type: TYPE_IMG
- en: An illustration represents 50 boxes arranged in 5 rows and 10 columns. Each
    box contains a single-digit number. The images are slightly blurred.
  id: totrans-656
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-27
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
- en: Reconstructed images by the variational autoencoder
  id: totrans-658
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig28_HTML.png)'
  id: totrans-659
  prefs: []
  type: TYPE_IMG
- en: An illustration represents 50 boxes arranged in 5 rows and 10 columns. Each
    box contains a single-digit number.
  id: totrans-660
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-26
  id: totrans-661
  prefs: []
