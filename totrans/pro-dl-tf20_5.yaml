- en: Original images fed to variational autoencoder
  id: totrans-662
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  id: totrans-663
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: We can see from Figure [5-26](#Fig28) and [5-27](#Fig29) that the variational
    autoencoder has done a good job of reconstructing the input images.
  id: totrans-664
  prefs: []
  type: TYPE_NORMAL
- en: Also, we can see from Figure [5-28](#Fig30) that the decoder of the variational
    autoencoder has learned to act as a generative model and is able to construct
    realistic MNIST images by taking in noise input *z* sampled from prior *p*(*z*).
  id: totrans-665
  prefs: []
  type: TYPE_NORMAL
- en: PCA and ZCA Whitening
  id: totrans-666
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Generally, images contain pixels whose intensities are highly correlated in
    any neighborhood of the image, and hence such correlation is highly redundant
    to a learning algorithm. These dependencies in the form of correlation between
    nearby pixels are generally of little use to any algorithm. Thus, it makes sense
    to remove this two-way correlation so that the algorithm puts more emphasis on
    higher-order correlations. Similarly, the mean intensity of an image might not
    be of any use to a learning algorithm in cases where the image is a natural image.
    Therefore, it makes sense to remove the mean intensity of an image. Do note that
    we are not subtracting the mean per-pixel location but rather the mean of pixel
    intensities of each image. This kind of mean normalization is different from the
    other mean normalization we do in machine learning where we subtract the mean
    per feature computed over a training set. Coming back to the concept of whitening,
    the advantages of whitening are twofold:'
  id: totrans-667
  prefs: []
  type: TYPE_NORMAL
- en: Remove the correlation among features in the data.
  id: totrans-668
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Make the variance equal along each feature direction.
  id: totrans-669
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: PCA and ZCA whitening are two techniques generally used to preprocess images
    before the images are processed through artificial neural networks. These techniques
    are almost the same, with a subtle difference. The steps involved in PCA whitening
    are illustrated first, followed by ZCA.
  id: totrans-670
  prefs: []
  type: TYPE_NORMAL
- en: 'Remove the mean pixel intensity from each image separately. So, if a 2D image
    is converted into a vector, one can subtract the mean of the elements in the image
    vector from itself. If each image is represented by the vector *x*^((*i*)) ∈ ℝ^(*nX*1),
    where *i* represents the *ith* image in the training set, then the mean normalized
    image for *x*^((*i*)) is given by the following:'
  id: totrans-671
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![$$ {x}^{(i)}={x}^{(i)}-\frac{1}{n}\sum \limits_{j=1}^n{x}_j^{(i)} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equds.png)'
  id: totrans-672
  prefs: []
  type: TYPE_IMG
- en: 'Once we have the mean normalized images, we can compute the covariance matrix
    as follows:'
  id: totrans-673
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![$$ C=\frac{1}{m}\sum \limits_{i=1}^m{x}^{(i)}{x}^{(i)T} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equdt.png)'
  id: totrans-674
  prefs: []
  type: TYPE_IMG
- en: 'Next, we need to decompose the covariance matrix through singular value decomposition
    (SVD) as follows:'
  id: totrans-675
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![$$ C={UDU}^T $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equdu.png)'
  id: totrans-676
  prefs: []
  type: TYPE_IMG
- en: In general, SVD decomposes as *C* = *UDV*^(*T*), but since *C* is a symmetric
    matrix, *U* = *V* in this case. *U* gives the Eigen vectors of the covariance
    matrix. The Eigen vectors are aligned in a column-wise fashion in *U*. The variances
    of the data along the direction of the Eigen vectors are given by the Eigen values
    housed along the diagonals of *D,* while the rest of the entries in *D* are zero
    since *D* is the covariance matrix for the uncorrelated directions given by the
    Eigen vectors.
  id: totrans-677
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'In PCA whitening, we project the data along the Eigen vectors, or one may say
    principal components, and then divide the projection value in each direction by
    the square root of the Eigen value—i.e., the standard deviation along that direction
    on which the data is projected. So, the PCA whitening transformation is as follows:'
  id: totrans-678
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![$$ T={D}^{-\frac{1}{2}}{U}^T $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equdv.png)'
  id: totrans-679
  prefs: []
  type: TYPE_IMG
- en: 'Once this transformation is applied to the data, the transformed data has zero
    correlation and unit variance along the newly transformed components. The transformed
    data for original mean-corrected image *x*^((*i*)) is as follows:'
  id: totrans-680
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![$$ {x^{(i)}}_{PW}={Tx}^{(i)} $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equdw.png)'
  id: totrans-681
  prefs: []
  type: TYPE_IMG
- en: The problem with PCA whitening is that although it decorrelates the data and
    makes the new feature variances unity, the features are no longer in the original
    space but rather are in a transformed rotated space. This makes the structure
    of objects such as images lose a lot of information in terms of their spatial
    orientation, because in the transformed feature space, each feature is the linear
    combination of all the features. For algorithms that make use of the spatial structure
    of the image, such as convolutional neural networks, this is not a good thing.
    So, we need some way to whiten the data such that the data is decorrelated and
    of unit variances along its features, but the features are still in the original
    feature space and not in some transformed rotated feature space. The transformation
    that provides all these relevant properties is called ZCA transform. Mathematically,
    any orthogonal matrix *R* (the column vectors of which are orthogonal to each
    other) when multiplied by the PCA whitening transform *T* produces another whitening
    transform. If one chooses, *R* = *U*, and the transform
  id: totrans-682
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Z= UT={UD}^{-\frac{1}{2}}{U}^T $$](../images/448418_2_En_5_Chapter/448418_2_En_5_Chapter_TeX_Equdx.png)'
  id: totrans-683
  prefs: []
  type: TYPE_IMG
- en: is called the ZCA transform. The advantage of ZCA transform is that the image
    data still resides in the same feature space of pixels, and hence, unlike in PCA
    whitening, the original pixel doesn’t get obscured by the creation of new features.
    At the same time, the data is whitened—i.e., decorrelated—and of unit variance
    for each of the features. The unit variance and decorrelated features may help
    several machine-learning or deep-learning algorithms achieve faster convergence.
    At the same time, since the features are still in the original space, they retain
    their topological or spatial orientation, and algorithms such as convolutional
    neural networks that make use of the spatial structure of the image can make use
    of the information.
  id: totrans-684
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig31_HTML.jpg)'
  id: totrans-685
  prefs: []
  type: TYPE_IMG
- en: A set of 2 graphical representations, The left one represents an elliptical
    structure in the x 1 x 2 plane, and the right one plots a circle through the origin
    in the P 1 P 2 plane. An arrow in the middle denotes Z C A whitening.
  id: totrans-686
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-29
  id: totrans-687
  prefs: []
  type: TYPE_NORMAL
- en: PCA whitening illustration
  id: totrans-688
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_5_Chapter/448418_2_En_5_Fig32_HTML.jpg)'
  id: totrans-689
  prefs: []
  type: TYPE_IMG
- en: A set of 2 graphical representations, The left one represents an elliptical
    structure in the x 1 x 2 plane, and the right one plots a circle through the origin
    in the P 1 P 2 plane. An arrow in the middle denotes P C A whitening.
  id: totrans-690
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-30
  id: totrans-691
  prefs: []
  type: TYPE_NORMAL
- en: ZCA whitening illustration
  id: totrans-692
  prefs: []
  type: TYPE_NORMAL
- en: The key difference between PCA whitening and ZCA whitening is illustrated in
    Figure [5-29](#Fig31) and Figure [5-30](#Fig32). As we can see, in both case,
    the 2D correlated data is transformed into uncorrelated new data. However, there
    is a major difference. While in PCA whitening, the new axes have changed from
    the original axes based on the principal components given by *p*[1] and *p*[2],
    the axes remain same as those of the original with ZCA whitening. The *p*[1] and
    *p*[2] are the Eigen vectors of the covariance matrix for the data. Also, we see
    the orientation of the marker *AB* has changed in the new axes for PCA whitening,
    while it remains intact for ZCA whitening. In both cases, the idea is to get rid
    of the not-so-useful two-way covariances between the input variables so that the
    model can concentrate on learning about higher-order correlations.
  id: totrans-693
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  id: totrans-694
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this chapter, we went through the most popular unsupervised techniques in
    deep learning, namely, restricted Boltzmann machines and autoencoders. Also, we
    discussed the different applications of using these methods and the training process
    related to each of these algorithms. Finally, we ended with PCA and ZCA whitening
    techniques, which are relevant preprocessing techniques used in several supervised
    deep-learning methods. By the end of this chapter, we had touched upon all the
    core methodologies in deep learning. Other improvised methods in deep learning
    can be easily comprehended and implemented given the methods and mathematics touched
    upon thus far.
  id: totrans-695
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we will discuss several improvised deep-learning networks
    that have gained popularity in recent times, such as generative adversarial networks,
    R-CNN, and so forth, and touch upon aspects of taking a TensorFlow application
    into production with ease.
  id: totrans-696
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将讨论一些近年来受到广泛关注的改进型深度学习网络，例如生成对抗网络、R-CNN等等，并简要介绍如何轻松地将TensorFlow应用程序投入生产。
