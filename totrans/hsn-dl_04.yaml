- en: 4. Training Deep Networks
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 4. 深度网络训练
- en: Introduction
  id: totrans-1
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介
- en: Now that you have studied various Neural Network architectures, the gradient
    descent algorithm, and the backpropagation algorithm, let us explore some more
    optimization techniques and analyze their effect on the smoothness of the loss
    curve. You will also explore the effect of these techniques on the performance
    of the model.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经学习了各种神经网络架构、梯度下降算法和反向传播算法，让我们探索一些更多的优化技术并分析它们对损失曲线平滑性的影响。你还将探索这些技术对模型性能的影响。
- en: In this chapter, you will study the ways of splitting a dataset and selecting
    an appropriate number of samples for training the network, in each iteration.
    You will also understand the problems in gradient descent and explore the techniques
    to deal with these problems. You will explore optimizers, namely, RMSprop, Momentum,
    and the Adam optimizer. Additionally, you will carry out an empirical analysis
    to study the effect of the above techniques on the performance of a network.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你将学习如何分割数据集并为每次迭代选择合适的样本数量来训练网络。你还将了解梯度下降中的问题并探索解决这些问题的技术。你将探索优化器，即RMSprop、动量（Momentum）和Adam优化器。此外，你将进行实证分析来研究上述技术对网络性能的影响。
- en: Train–Test Split
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 训练-测试分割
- en: The objective of a ML classification model is to learn the patterns from the
    training data and use these patterns to classify the unseen data. The data with
    which the model is trained is called the training data. This data helps the model
    learn the parameters. The model so formed is then used to classify the data that
    has not been seen so far (yet unseen data). This data is called the test data.
    The division of data into train and test can be done in many ways. To begin with,
    we can simply take 70% of the data for training and the rest for testing. This
    number may vary.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习分类模型的目标是从训练数据中学习模式，并使用这些模式来分类未见过的数据。用于训练模型的这些数据被称为训练数据。这些数据帮助模型学习参数。形成的模型随后用于分类尚未见过的数据（即未见数据）。这些数据被称为测试数据。数据的训练和测试分割可以有多种方式。首先，我们可以简单地用70%的数据进行训练，其余的用于测试。这个数字可能会有所不同。
- en: Train–Validation–Test Split
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 训练-验证-测试分割
- en: 'The second method is to divide the data into three parts: a bigger part and
    two smaller parts. The bigger part (training set) is used to train the model and
    learn the parameters of the model, whereas one of the smaller parts is used to
    set the hyperparameters. This is called the validation set. The third part is
    used to test the model. For example, if you are given a sufficient amount of data,
    you can take 70% of the data for training the model and find the performance with
    the validation set. If the performance is not good, you retrain the model by changing
    the hyperparameters such as learning rate, number of layers, number of units in
    each layer, etc. When all the hyperparameters are chosen so as to optimize the
    performance with the validation set, then you take the test set to test the model.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 第二种方法是将数据分为三部分：一个较大的部分和两个较小的部分。较大的部分（训练集）用于训练模型并学习模型的参数，其中较小部分之一用于设置超参数。这被称为验证集。第三部分用于测试模型。例如，如果你有足够的数据，你可以用70%的数据来训练模型，并使用验证集来找到性能。如果性能不佳，你可以通过改变学习率、层数、每层的单元数等超参数来重新训练模型。当所有超参数都选择以优化验证集的性能时，然后你使用测试集来测试模型。
- en: K-Fold Split
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: K-Fold 分割
- en: In the third method, the given data is divided into “K” parts. One of the parts
    (say part 1) is used as a test set, whereas the other “K `-` 1” parts are clubbed
    together and used as the training set. This process is repeated “K” times by taking
    all the “K” parts (one at a time) as the test set. Therefore, “K” such models
    are developed, and the average performance of the model is reported. Figure [4-1](#Fig1)
    shows the K-fold split.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在第三种方法中，给定的数据被分为“K”部分。其中一部分（比如说第1部分）被用作测试集，而其他“K `-` 1”部分则合并在一起用作训练集。这个过程通过将所有“K”部分（一次一个）作为测试集重复“K”次。因此，开发了“K”个这样的模型，并报告模型的平均性能。图
    [4-1](#Fig1) 展示了K-fold分割。
- en: '![](../images/611710_1_En_4_Chapter/611710_1_En_4_Fig1_HTML.jpg)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/611710_1_En_4_Chapter/611710_1_En_4_Fig1_HTML.jpg)'
- en: Figure 4-1
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-1
- en: K-fold splitting technique
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: K-fold 分割技术
- en: Having seen the splitting of data, let us now have a look at how many samples
    we should take before updating the parameters of the model.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在看到数据的分割之后，我们现在来看看在更新模型参数之前我们应该取多少样本。
- en: Batch, Stochastic, and Mini-batch Gradient Descent
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 批量、随机和小批量梯度下降
- en: As stated earlier, we aim to learn the parameters of the model with the help
    of a training set. For this, we can either take all the samples together in a
    single iteration and update the weights or take one sample at a time (before updating
    the weights). There is also a middle path, which is to take a few samples at a
    time, update the weights, and then proceed further.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，我们旨在通过训练集的帮助来学习模型的参数。为此，我们可以在单次迭代中一起取所有样本并更新权重，或者一次取一个样本（在更新权重之前）。还有一条中间道路，即一次取几个样本，更新权重，然后继续进行。
- en: Batch Gradient Descent
  id: totrans-16
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 批量梯度下降
- en: 'In batch gradient descent (BGD) we process all the examples at the same time.
    However, if the number of examples is huge, then the training is **computationally
    expensive**, and the whole data set might **not fit** into the **main memory**.
    Therefore, we prefer stochastic or mini-batch gradient descent. The formal algorithm
    of batch gradient descent is as follows:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在批量梯度下降（BGD）中，我们同时处理所有示例。然而，如果示例数量巨大，那么训练将**计算成本高昂**，整个数据集可能**无法**适应**主内存**。因此，我们更倾向于随机梯度下降或小批量梯度下降。批量梯度下降的正式算法如下：
- en: Initialize learning rate *η* and parameters *W*.
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 初始化学习率 *η* 和参数 *W*。
- en: 'Repeat till the termination condition is met:'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重复直到满足终止条件：
- en: Find the gradient (*g*)over all the training examples.
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算所有训练示例的梯度 (*g*)。
- en: Update *W* ⇢ *W* − *η* × *g*.
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更新 *W* ⇢ *W* − *η* × *g*。
- en: end while
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: end while
- en: Stochastic Gradient Descent
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 随机梯度下降
- en: In stochastic gradient descent, we take one training example at a time and update
    the weights. This is another extreme in which we will have to wait for a long
    time until the whole training set is seen by the model. However, **updating**
    the parameters is **fast**. When the number of training examples is very large,
    then there can be additional overhead for the model. In this case, we **generally
    reach the global minima**, whereas in the case of batch gradient descent, we **might
    miss the global minima**.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 在随机梯度下降中，我们一次取一个训练示例并更新权重。这是另一种极端情况，我们可能需要等待很长时间，直到整个训练集被模型看到。然而，**更新**参数是**快速**的。当训练示例数量非常大时，模型可能会有额外的开销。在这种情况下，我们**通常**达到全局最小值，而在批量梯度下降的情况下，我们**可能**错过全局最小值。
- en: Mini-batch Gradient Descent
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 小批量梯度下降
- en: In mini-batch gradient descent (mini-batch GD), we form small batches and update
    the parameters of the model with each batch. It is generally faster and gracefully
    handles the problems of batch and stochastic gradient descent. For example, if
    we have 1,048,576 samples in the training set and we take 1024 examples at a time,
    then there will be 1024 mini-batches. That is, the parameters will be updated
    1024 times in iterating over the whole dataset. In this case, the loss function
    might not be smooth because of the fact some of the batches might be easily trainable
    while others may not be. Here the selection of the number of samples in a mini-batch
    is a hyperparameter. It should not be very small or very large. Generally, mini-batch
    gradient descent is in between batch and stochastic gradient descent both in terms
    of accuracy and time.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在小批量梯度下降（mini-batch GD）中，我们形成小批量，并使用每个批量更新模型的参数。它通常更快，并且优雅地处理了批量随机梯度下降的问题。例如，如果我们训练集中有1,048,576个样本，我们一次取1024个示例，那么将有1024个小批量。也就是说，参数将在遍历整个数据集时更新1024次。在这种情况下，由于一些批量可能很容易训练而其他可能不容易，损失函数可能不光滑。在这里，小批量中样本数量的选择是一个超参数。它不应该太小或太大。通常，小批量梯度下降在准确性和时间方面都介于批量随机梯度下降之间。
- en: The following experiment evaluates the performance of different activation functions
    (sigmoid, ReLU, tanh, and a custom tanh) using three gradient descent methods
    (batch, mini-batch, and stochastic) with a Neural Network explained in the previous
    chapter on the MNIST dataset. The MNIST dataset consists of 60,000 training images
    and 10,000 test images of handwritten digits (0`–`9). The different models were
    created using the above stated activation functions. Each model was trained using
    the SGD. The training and validation accuracy and loss were plotted for each model
    over ten epochs as shown in Figures [4-2](#Fig2) and [4-3](#Fig3). It may be noted
    that the batch gradient descent had the shortest training time due to fewer updates,
    while the stochastic gradient descent had the longest training time due to more
    frequent updates. The mini-batch gradient descent provided a good balance between
    training time and performance.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 以下实验评估了不同激活函数（Sigmoid、ReLU、tanh和自定义tanh）在三种梯度下降方法（批量、小批量、随机）下使用前一章中关于MNIST数据集的神经网络进行评估的性能。MNIST数据集包含60,000个训练图像和10,000个测试图像的手写数字（0`–`9）。不同的模型使用上述声明的激活函数创建。每个模型都使用SGD进行训练。每个模型的训练和验证准确率和损失在十个epoch上进行了绘制，如图[4-2](#Fig2)和[4-3](#Fig3)所示。值得注意的是，批量梯度下降由于更新较少，因此训练时间最短，而随机梯度下降由于更新频繁，因此训练时间最长。小批量梯度下降在训练时间和性能之间提供了良好的平衡。
- en: '![](../images/611710_1_En_4_Chapter/611710_1_En_4_Fig3_HTML.jpg)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/611710_1_En_4_Chapter/611710_1_En_4_Fig3_HTML.jpg)'
- en: Figure 4-3
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-3
- en: Performance variation for different activation functions with three gradient
    descent methods
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 不同激活函数与三种梯度下降方法性能变化
- en: '![](../images/611710_1_En_4_Chapter/611710_1_En_4_Fig2_HTML.jpg)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/611710_1_En_4_Chapter/611710_1_En_4_Fig2_HTML.jpg)'
- en: Figure 4-2
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-2
- en: 'Loss variation for different activation functions with three gradient descent
    methods: batch, mini-batch, and stochastic'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 不同激活函数与三种梯度下降方法（批量、小批量、随机）的损失变化
- en: 'Now that we have seen the division of data into train and test sets, and studied
    how many samples should be taken before updating the weights of the model, let
    us now have a look at some important optimization methods. We begin with RMSprop.
    Also, we will study one of the most important optimization methods: Adam optimizer.'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经看到了数据被分为训练集和测试集，并研究了在更新模型权重之前应该取多少样本，让我们现在来看看一些重要的优化方法。我们首先从RMSprop开始。此外，我们还将研究最重要的优化方法之一：Adam优化器。
- en: RMSprop
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: RMSprop
- en: In the case of gradient descent, the initial weights and bias are updated in
    each iteration with the aim of minimizing the loss. However, the variation of
    loss with iterations may not be smooth. If we have a single weight and bias, then
    with each iteration the bias is updated, and this variation is shown in one of
    the axes (say Y), whereas the variation of weight is reflected in another axis
    (say X). The overall variation can be seen in Figure [4-5](#Fig5). Now we aim
    to slow the learning in the Y-axis, whereas keep the learning as good as earlier
    in the X-axis; we can make slight changes in the formulas that update the weight
    and bias. Kindly note that the notations used in the following algorithms are
    the same as the course slides (optimization algorithms) of DeepLearning.AI [[1](#CR1)].
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在梯度下降的情况下，初始权重和偏差在每个迭代中都会更新，目的是最小化损失。然而，损失随迭代的变可能不是平滑的。如果我们只有一个权重和偏差，那么随着每个迭代的进行，偏差会更新，这种变化显示在一个轴上（比如说Y轴），而权重的变化则反映在另一个轴上（比如说X轴）。整体变化可以在图[4-5](#Fig5)中看到。现在我们旨在减缓Y轴上的学习，同时保持X轴上的学习尽可能好；我们可以在更新权重和偏差的公式中做些轻微的调整。请注意，以下算法中使用的符号与DeepLearning.AI的（优化算法）课程幻灯片相同[[1](#CR1)]。
- en: 'After each update, divide *d*[*w*] and *d*[*b*], respectively, by ![$$ \sqrt{S_{dw}}
    $$](../images/611710_1_En_4_Chapter/611710_1_En_4_Chapter_TeX_IEq1.png) and ![$$
    \sqrt{S_{db}} $$](../images/611710_1_En_4_Chapter/611710_1_En_4_Chapter_TeX_IEq2.png)
    . Here *S*[*db*] is large in comparison with *S*[*dw*], and hence the change in
    weight in the Y-axis is small as compared with earlier. Here *S*[*dw*] is the
    weighted average of the earlier *S*[*dw*] and *dw*². Likewise, *S*[*db*] can also
    be considered as the weighted average of *S*[*db*] and *db*². Here we have a parameter
    *β* that may be considered a hyperparameter. That is, first of all, we initialize
    the following parameters:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: Learning rate (∝).
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Decay rate (*β*).
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Small constant (*ϵ*).
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Initialize *S*[*dw*] and *S*[*db*] to zero.
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This is followed by the application of the following algorithm to update the
    weights in each iteration.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: In each iteration
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: Calculate *d*[*w*] and *d*[*b*].
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Update the running average of the squared gradients:'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*S*[*dw*] = *β S*[*dw*] + (1 − *β*)*dw*²'
  id: totrans-46
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '*S*[*db*] = *β S*[*db*] + (1 − *β*)*db*²'
  id: totrans-47
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Update the parameters:'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![$$ w=w-\propto \frac{d_w}{\sqrt{S_{dw}+\epsilon }} $$](../images/611710_1_En_4_Chapter/611710_1_En_4_Chapter_TeX_IEq3.png)'
  id: totrans-49
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_IMG
- en: '![$$ b=b-\propto \frac{d_b}{\sqrt{S_{db}+\epsilon }} $$](../images/611710_1_En_4_Chapter/611710_1_En_4_Chapter_TeX_IEq4.png)'
  id: totrans-50
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_IMG
- en: RMSprop works better as compared with Momentum in the case of non-convex settings.
    The algorithm was suggested by G. Hinton in one of the Coursera courses. The algorithm
    that follows engulfs the good parts of both Momentum and RMSprop.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: Adam Optimizer
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The Adam optimizer combines the concepts of Momentum and RMSprop. It calculates
    *v*[*dw*], *v*[*db*], *S*[*dw*],and *S*[*db*] in the same way, as explained above.
    Initially, the values of these four can be taken as zero, and in each iteration
    *v*[*dw*] and *v*[*db*] are calculated using the following equations:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {v}_{dw}={\beta}_1\ {v}_{dw}+\left(1-{\beta}_1\right) dw $$](../images/611710_1_En_4_Chapter/611710_1_En_4_Chapter_TeX_Equa.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
- en: '![$$ {v}_{db}={\beta}_1\ {v}_{db}+\left(1-{\beta}_1\right) db $$](../images/611710_1_En_4_Chapter/611710_1_En_4_Chapter_TeX_Equb.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
- en: 'Likewise, *S*[*dw*]and *S*[*db*] can be calculated as follows:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {S}_{dw}={\beta}_2\ {S}_{dw}+\left(1-{\beta}_2\right){dw}^2 $$](../images/611710_1_En_4_Chapter/611710_1_En_4_Chapter_TeX_Equc.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
- en: '![$$ {S}_{db}={\beta}_2\ {S}_{db}+\left(1-{\beta}_2\right){db}^2 $$](../images/611710_1_En_4_Chapter/611710_1_En_4_Chapter_TeX_Equd.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
- en: 'Now we fix the bias using the following equations:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {v}_{dw}^{corrected}=\frac{v_{dw}}{1-{\beta}_1^t} $$](../images/611710_1_En_4_Chapter/611710_1_En_4_Chapter_TeX_Eque.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
- en: '![$$ {v}_{db}^{corrected}=\frac{v_{db}}{1-{\beta}_1^t} $$](../images/611710_1_En_4_Chapter/611710_1_En_4_Chapter_TeX_Equf.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
- en: '![$$ {S}_{dw}^{corrected}=\frac{S_{dw}}{1-{\beta}_1^t} $$](../images/611710_1_En_4_Chapter/611710_1_En_4_Chapter_TeX_Equg.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
- en: '![$$ {S}_{db}^{corrected}=\frac{S_{db}}{1-{\beta}_1^t} $$](../images/611710_1_En_4_Chapter/611710_1_En_4_Chapter_TeX_Equh.png)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
  zh: '![修正后的 $S_{db}^{corrected}=\frac{S_{db}}{1-{\beta}_1^t}$](../images/611710_1_En_4_Chapter/611710_1_En_4_Chapter_TeX_Equh.png)'
- en: 'Now the weights will be updated using the above calculated values:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 现在将使用上述计算出的值更新权重：
- en: '![$$ w=w-\propto \frac{v_{dw}^{corrected}}{\sqrt{S_{dw}^{corrected}}+\epsilon
    } $$](../images/611710_1_En_4_Chapter/611710_1_En_4_Chapter_TeX_Equi.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![ $w=w-\propto \frac{v_{dw}^{corrected}}{\sqrt{S_{dw}^{corrected}}+\epsilon
    } $](../images/611710_1_En_4_Chapter/611710_1_En_4_Chapter_TeX_Equi.png)'
- en: '![$$ b=b-\propto \frac{v_{db}^{corrected}}{\sqrt{S_{db}^{corrected}}+\epsilon
    } $$](../images/611710_1_En_4_Chapter/611710_1_En_4_Chapter_TeX_Equj.png)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
  zh: '![ $b=b-\propto \frac{v_{db}^{corrected}}{\sqrt{S_{db}^{corrected}}+\epsilon
    } $](../images/611710_1_En_4_Chapter/611710_1_En_4_Chapter_TeX_Equj.png)'
- en: 'Here, we have three hyperparameters ∝, *β*[1], and *β*[2]. The learning rate
    can be estimated using various methods like grid search and heuristic algorithms.
    *β*[1] is the parameter for Momentum and *β*[2] is the parameter of RMSprop. As
    per Krohn [[2](#CR2)], generally, the values of *β*[1] and *β*[2] are taken as
    0.9 and 0.99\. The formal algorithm for the Adam optimizer is as follows:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 这里，我们有三个超参数 ∝，*β*[1]，和 *β*[2]。学习率可以通过各种方法估计，如网格搜索和启发式算法。*β*[1] 是动量参数，*β*[2]
    是 RMSprop 的参数。根据 Krohn [[2](#CR2)]，通常，*β*[1] 和 *β*[2] 的值取为 0.9 和 0.99。Adam优化器的正式算法如下：
- en: '**Algorithm: Adam Optimizer**'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '**算法：Adam优化器**'
- en: 'Initialize parameters:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 初始化参数：
- en: Learning rate (∝).
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习率（∝）。
- en: Decay rates (*β*[1] and *β*[2]).
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 衰减率 (*β*[1] 和 *β*[2])。
- en: Small constant (*ϵ*).
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 小常数 (*ϵ*)。
- en: Initialize *v*[*dw*] and *S*[*dw*] to zero.
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将 *v*[*dw*] 和 *S*[*dw*] 初始化为零。
- en: Initialize *v*[*db*] and *S*[*db*] to zero.
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将 *v*[*db*] 和 *S*[*db*] 初始化为零。
- en: In each iteration
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 在每次迭代中
- en: Calculate the gradients *d*[*w*] and *d*[*b*].
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算梯度 *d*[*w*] 和 *d*[*b*]。
- en: 'Update biased first moment estimates:'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更新偏差校正的第一矩估计：
- en: '*v*[*dw*] = *β*[1] *v*[*dw*] + (1 − *β*[1])*dw*'
  id: totrans-78
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*v*[*dw*] = *β*[1] *v*[*dw*] + (1 − *β*[1])*dw*'
- en: '*v*[*db*] = *β*[1] *v*[*db*] + (1 − *β*[1])*db*'
  id: totrans-79
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*v*[*db*] = *β*[1] *v*[*db*] + (1 − *β*[1])*db*'
- en: 'Update biased second moment estimates:'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更新偏差校正的第二矩估计：
- en: '![$$ {S}_{dw}={\beta}_2\ {S}_{dw}+\left(1-{\beta}_2\right){d}_w^2 $$](../images/611710_1_En_4_Chapter/611710_1_En_4_Chapter_TeX_IEq5.png)'
  id: totrans-81
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_IMG
  zh: '![ $S_{dw}={\beta}_2\ {S}_{dw}+\left(1-{\beta}_2\right){d}_w^2 $](../images/611710_1_En_4_Chapter/611710_1_En_4_Chapter_TeX_IEq5.png)'
- en: '![$$ {S}_{db}={\beta}_2\ {S}_{db}+\left(1-{\beta}_2\right){d}_b^2 $$](../images/611710_1_En_4_Chapter/611710_1_En_4_Chapter_TeX_IEq6.png)'
  id: totrans-82
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_IMG
  zh: '![ $S_{db}={\beta}_2\ {S}_{db}+\left(1-{\beta}_2\right){d}_b^2 $](../images/611710_1_En_4_Chapter/611710_1_En_4_Chapter_TeX_IEq6.png)'
- en: 'Compute bias-corrected first moment estimates:'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算偏差校正的第一矩估计：
- en: '![$$ {v}_{dw}^{corrected}=\frac{v_{dw}}{1-{\beta}_1^t} $$](../images/611710_1_En_4_Chapter/611710_1_En_4_Chapter_TeX_IEq7.png)'
  id: totrans-84
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_IMG
  zh: '![修正后的 $v_{dw}^{corrected}=\frac{v_{dw}}{1-{\beta}_1^t}$](../images/611710_1_En_4_Chapter/611710_1_En_4_Chapter_TeX_IEq7.png)'
- en: '![$$ {v}_{db}^{corrected}=\frac{v_{db}}{1-{\beta}_1^t} $$](../images/611710_1_En_4_Chapter/611710_1_En_4_Chapter_TeX_IEq8.png)'
  id: totrans-85
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_IMG
  zh: '![修正后的 $v_{db}^{corrected}=\frac{v_{db}}{1-{\beta}_1^t}$](../images/611710_1_En_4_Chapter/611710_1_En_4_Chapter_TeX_IEq8.png)'
- en: 'Compute bias-corrected second moment estimates:'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算偏差校正的第二矩估计：
- en: '![$$ {S}_{dw}^{corrected}=\frac{S_{dw}}{1-{\beta}_1^t} $$](../images/611710_1_En_4_Chapter/611710_1_En_4_Chapter_TeX_IEq9.png)'
  id: totrans-87
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_IMG
  zh: '![修正后的 $S_{dw}^{corrected}=\frac{S_{dw}}{1-{\beta}_1^t}$](../images/611710_1_En_4_Chapter/611710_1_En_4_Chapter_TeX_IEq9.png)'
- en: '![$$ {S}_{db}^{corrected}=\frac{S_{db}}{1-{\beta}_1^t} $$](../images/611710_1_En_4_Chapter/611710_1_En_4_Chapter_TeX_IEq10.png)'
  id: totrans-88
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_IMG
  zh: '![修正后的 $S_{db}^{corrected}=\frac{S_{db}}{1-{\beta}_1^t}$](../images/611710_1_En_4_Chapter/611710_1_En_4_Chapter_TeX_IEq10.png)'
- en: 'Update the parameters:'
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更新参数：
- en: '![$$ w=w-\propto \frac{v_{dw}^{corrected}}{\sqrt{S_{dw}^{corrected}}+\epsilon
    } $$](../images/611710_1_En_4_Chapter/611710_1_En_4_Chapter_TeX_IEq11.png)'
  id: totrans-90
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_IMG
  zh: '![ $w=w-\propto \frac{v_{dw}^{corrected}}{\sqrt{S_{dw}^{corrected}}+\epsilon
    } $](../images/611710_1_En_4_Chapter/611710_1_En_4_Chapter_TeX_IEq11.png)'
- en: '![$$ b=b-\propto \frac{v_{db}^{corrected}}{\sqrt{S_{db}^{corrected}}+\epsilon
    } $$](../images/611710_1_En_4_Chapter/611710_1_En_4_Chapter_TeX_IEq12.png)'
  id: totrans-91
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_IMG
  zh: '![ $b=b-\propto \frac{v_{db}^{corrected}}{\sqrt{S_{db}^{corrected}}+\epsilon
    } $](../images/611710_1_En_4_Chapter/611710_1_En_4_Chapter_TeX_IEq12.png)'
- en: To understand the variations of the loss function with different optimizers
    such as gradient descent, RMSprop, and Adam, let us take a very simple example.
    The popular IRIS dataset has four features and three classes, out of which the
    first two classes are taken. Initially, the weights are set to small random numbers,
    and they are updated in each iteration using three different techniques stated
    above. Let us explore the variation of loss in each epoch. We vertically concatenate
    the weights in each epoch and then apply PCA to take the first component having
    maximum variance. Refer to Listing [4-1](#PC1). The variation of weight (X-axis)
    and bias (Y-axis) with the number of epochs is shown in Figures [4-4](#Fig4),
    [4-5](#Fig5), and [4-6](#Fig6).
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 为了理解损失函数在不同优化器（如梯度下降、RMSprop和Adam）下的变化，让我们来看一个非常简单的例子。流行的IRIS数据集有四个特征和三个类别，其中取了前两个类别。最初，权重被设置为小的随机数，并在每次迭代中使用上述三种不同的技术进行更新。让我们探索每个epoch中损失的变异。我们将每个epoch中的权重垂直拼接，然后应用PCA以获取具有最大方差的第一成分。请参阅列表[4-1](#PC1)。图[4-4](#Fig4)、[4-5](#Fig5)和[4-6](#Fig6)显示了权重（X轴）和偏差（Y轴）随epoch数量的变化。
- en: '![](../images/611710_1_En_4_Chapter/611710_1_En_4_Fig6_HTML.jpg)'
  id: totrans-93
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/611710_1_En_4_Chapter/611710_1_En_4_Fig6_HTML.jpg)'
- en: Figure 4-6
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-6
- en: Variation of bias and weight with number of epochs for the Adam optimizer
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: Adam优化器中偏差和权重随epoch数量的变化
- en: '![](../images/611710_1_En_4_Chapter/611710_1_En_4_Fig5_HTML.jpg)'
  id: totrans-96
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/611710_1_En_4_Chapter/611710_1_En_4_Fig5_HTML.jpg)'
- en: Figure 4-5
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-5
- en: Variation of bias and weight with the number of epochs for the RMSprop optimizer
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: RMSprop优化器中偏差和权重随epoch数量的变化
- en: '![](../images/611710_1_En_4_Chapter/611710_1_En_4_Fig4_HTML.jpg)'
  id: totrans-99
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/611710_1_En_4_Chapter/611710_1_En_4_Fig4_HTML.jpg)'
- en: Figure 4-4
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-4
- en: Variation of bias and weight with number of epochs for the SGD optimizer
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: SGD优化器中偏差和权重随epoch数量的变化
- en: '[PRE0]'
  id: totrans-102
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: The reader is requested to visit the Chapter [1](611710_1_En_1_Chapter.xhtml).
    The chapter contains an implementation to classify the MNIST dataset using Neural
    Networks. With reference to that, the following graphs compare the loss and performance
    of three popular optimization algorithms, namely, SGD, RMSprop, and Adam, using
    a network trained on the MNIST dataset. The size of each grayscale image in the
    dataset was 28 `×` 28 pixels. A simple network was employed with an input layer
    of 784 units (28 `×` 28 pixels), followed by a hidden layer of 128 neurons with
    ReLU activation and an output layer of 10 neurons with softmax activation. The
    model was trained separately using SGD, RMSprop, and Adam optimizers for 50 epochs.
    The training and validation loss and accuracy are then plotted for each optimizer
    as shown in Figure [4-7](#Fig7).
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 请读者访问第[1](611710_1_En_1_Chapter.xhtml)章。该章节包含了一个使用神经网络对MNIST数据集进行分类的实现。参考该实现，以下图表比较了三种流行的优化算法（即SGD、RMSprop和Adam）在MNIST数据集上训练的网络的损失和性能。数据集中每个灰度图像的大小为28
    `×` 28像素。使用了一个简单的网络，输入层有784个单位（28 `×` 28像素），后面跟着一个有ReLU激活的128个神经元的隐藏层，以及一个有softmax激活的10个神经元的输出层。使用SGD、RMSprop和Adam优化器分别对模型进行了50个epoch的训练。然后，为每个优化器绘制了训练和验证损失及准确率，如图[4-7](#Fig7)所示。
- en: '![](../images/611710_1_En_4_Chapter/611710_1_En_4_Fig7_HTML.jpg)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/611710_1_En_4_Chapter/611710_1_En_4_Fig7_HTML.jpg)'
- en: Figure 4-7
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-7
- en: Variation of loss and accuracy with the number of epochs for different optimizers
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 不同优化器中损失和准确率随epoch数量的变化
- en: Note that Adam and RMSprop showed faster and smoother convergence of the loss
    curve compared with SGD. Also, both Adam and RMSprop achieved higher accuracy
    than SGD.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，与SGD相比，Adam和RMSprop在损失曲线的收敛速度和平滑度上表现更好。此外，Adam和RMSprop的准确率也高于SGD。
- en: Conclusion
  id: totrans-108
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In the last chapters, the fundamentals of Neural Networks were discussed. Since
    we need to create deeper models as we proceed, it is important to know the best
    practices of (a) dividing the data for training the model and testing and (b)
    finding the number of training examples that should be considered before updating
    the weights of the model (c) to be able to work with better optimizers, vis-à-vis
    stochastic gradient descent, for achieving better performance [[3](#CR3)-[5](#CR5)].
    This chapter opens the door to the exciting world of efficient and effective Deep
    Neural Networks. The discussion continues in the next chapter, where we will study
    the concepts of bias and variance and study ways to deal with them.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 在最后几章中，我们讨论了神经网络的基本原理。由于我们需要创建更深的模型，了解以下最佳实践非常重要：(a) 为训练模型和测试划分数据，(b) 在更新模型权重之前考虑应该考虑的训练样本数量，(c)
    能够使用比随机梯度下降更好的优化器，以实现更好的性能 [[3](#CR3)-[5](#CR5)]。本章打开了高效且有效的深度神经网络世界的精彩大门。讨论将在下一章继续，我们将研究偏差和方差的概念，并研究处理它们的方法。
- en: Exercises
  id: totrans-110
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 练习
- en: Multiple-Choice Questions
  id: totrans-111
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
