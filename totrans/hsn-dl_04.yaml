- en: Which of the following can escape local minima more effectively, still better
    than SGD in many aspects?
  id: totrans-132
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 以下哪种方法可以更有效地逃离局部最小值，在许多方面优于SGD？
- en: Batch gradient descent (BGD).
  id: totrans-133
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 批量梯度下降（BGD）。
