- en: Which of the following techniques of updating the weights of a network may not
    work if the main memory is limited?
  id: totrans-112
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 以下哪种更新网络权重的技术如果主内存有限可能不起作用？
- en: Batch gradient descent (BGD).
  id: totrans-113
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 批量梯度下降（BGD）。
- en: Mini-batch gradient descent (mini-batch GD).
  id: totrans-114
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 小批量梯度下降（mini-batch GD）。
- en: Stochastic gradient descent (SGD).
  id: totrans-115
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 随机梯度下降（SGD）。
- en: All the above perform in the same manner.
  id: totrans-116
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 所以上述所有方法表现相同。
