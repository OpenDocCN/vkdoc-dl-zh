    You will find that option on the top-right side of the notebook; it’s called “Select
    Kernel”. Click this and select the same Python environment that you created for
    the local install and the one you selected for the Python Interpreter in Step
    5\. See Figure [1-5](#Fig5).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You are ready to explore the notebooks and execute the code cells contained
    in Jupyter Notebook.
  prefs: []
  type: TYPE_NORMAL
- en: Running on Google Colab (Recommended for a Cloud Option)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Google Colab is a free online platform that allows you to write and run Python
    code in your browser. It is based on Jupyter Notebook. Google Colab provides some
    advantages over Jupyter Notebook, such as:'
  prefs: []
  type: TYPE_NORMAL
- en: You can access Google Colab from any device with an Internet connection, without
    installing anything on your local machine.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can use the computing power of Google’s servers, including GPUs and TPUs,
    to speed up your code execution and save resources on your own device.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can easily share your notebooks with others and collaborate on them in real
    time.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can integrate your notebooks with Google Drive and other Google services,
    such as Google Sheets, Google Forms, and Google Maps.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To use Google Colab, you need a Google account and a web browser. You can create
    a new notebook by visiting [`https://colab.research.google.com/`](https://colab.research.google.com/)
    or opening an existing notebook from Google Drive. You can also upload a notebook
    file from your local machine or import one from GitHub or other sources. Once
    you have a notebook open, you can write and execute code cells, add text and images,
    and use various tools and features provided by Google Colab. You can also customize
    your notebook settings, such as the runtime type, the theme, and the keyboard
    shortcuts.
  prefs: []
  type: TYPE_NORMAL
- en: 'This book uses the GitHub option to directly open notebooks from the GitHub
    repository. It is just a matter of personal preference. If you have cloned the
    source code repository in GitHub to your GitHub account, you will also be able
    to make changes and issue commits to your repo, thus giving you a seamless developer
    experience without any local install on your computer. Here are the steps:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_1_Chapter/502835_2_En_1_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A screenshot of Google Colab. The open notebook screen is displayed. It consists
    of examples, recent, Google Drive, git hub, and upload. The left bottom consists
    of a button to add a new notebook.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-6
  prefs: []
  type: TYPE_NORMAL
- en: Selecting the repository and notebook in Google Colab
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to [`https://colab.research.google.com/`](https://colab.research.google.com/),
    which will open the web page with a dialog box giving you various options to open
    a notebook. For the current workflow, choose the GitHub option.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If this is the first time you are using GitHub from inside the Colaboratory
    (Google Colab), clicking the GitHub option will take you through an OAuth workflow
    to grant Google Colab access to your GitHub account.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: After the authentication is done and Google Colab is connected to your GitHub
    account, you can use the dialog box to open a specific notebook of interest or
    you can directly type the URL of the GitHub account housing the repository, such
    as [`https://github.com/nsanghi/`](https://github.com/nsanghi/).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click the repository dropdown to navigate to the repository. Keep the branch
    selection to “main” or whatever else is applicable for the repository you are
    trying to open. A sample of this dialog is shown in Figure [1-6](#Fig6).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_1_Chapter/502835_2_En_1_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A screenshot of Google Colab. The running in Colab or Kaggle screen displays
    the run comment and execution of the program consists of 3 and 15 lines to execute
    the cell to install all the dependencies.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-7
  prefs: []
  type: TYPE_NORMAL
- en: Running code cells for package installation in Google Colab
  prefs: []
  type: TYPE_NORMAL
- en: Select the notebook, for example `chapter2/2.a-RL-envrionment.ipynb`. It will
    close the dialog and open the notebook in the browser with an interface very similar
    to JupyterLab’s. There are some Google Colab-specific enhancements, but most are
    not relevant to this case. The only thing to note is the runtime type, which you
    can choose from the “Connect” dropdown on the top-right side of the Colab web
    page.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This example mostly uses the CPU environment, as the free tier of Google Colab
    provides limited access to the GPU/TPU environment. Most of the notebooks can
    be run on a CPU environment. However, from Chapter [6](502835_2_En_6_Chapter.xhtml)
    onward, once you enter the realm of deep reinforcement learning and start training
    agents on either large text data (such as RLHF) or images (such as Atari games),
    you’ll run those notebooks with GPU enabled.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Google Colab comes with most of the libraries preinstalled. However, I have
    designed the notebooks so that you can run some additional commands from inside
    the notebook to install system-level packages and the required Python libraries.
    One example is the `2.e-RL-Zoo.ipynb` notebook. Open this notebook in Google Colab
    following the instructions in Step 4\. Once it is opened, you will see two code
    execution cells that have code commented out, as shown in Figure [1-7](#Fig7).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The first cell installs the Ubuntu system-level packages. The second cell clones
    the GitHub repository and runs the `requirements.txt` file from the cloned repository
    to install all the dependencies.
  prefs: []
  type: TYPE_NORMAL
- en: Uncomment and run these cells before proceeding with the notebook.
  prefs: []
  type: TYPE_NORMAL
- en: Note that you do not need to run the commented code cells for any kind of local
    installation-based execution.
  prefs: []
  type: TYPE_NORMAL
- en: Running on Kaggle
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You can use a functionality offered by Kaggle that is similar to Google Colab.
  prefs: []
  type: TYPE_NORMAL
- en: Kaggle hosts data science and machine learning competitions, where you can find
    and explore various datasets, learn new skills, and share your solutions with
    other users. Kaggle also provides a cloud-based service called Kaggle Kernel,
    which allows you to run notebooks online without installing anything on your local
    machine. You can use Kaggle Kernel to access the datasets from the competitions,
    run code in Python or R, and publish your results as interactive web pages. Kaggle
    Kernel is a convenient way to experiment with different models and techniques,
    collaborate with other users, and showcase your work. You can also fork and edit
    existing notebooks from other users and use them as a starting point for your
    own projects.
  prefs: []
  type: TYPE_NORMAL
- en: Running the notebook from this book on Kaggle is pretty similar to the way you
    run it on Google Colab. You can read more about it in the Kaggle documentation
    and try this out.
  prefs: []
  type: TYPE_NORMAL
- en: Using devcontainer-Based Environments
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Another way to run notebooks is to use *devcontainer*, which stands for development
    container. A `.devcontainer` is a folder in a repository that contains a Docker
    file and a configuration file that specifies the tools and settings for a development
    environment. You can use `.devcontainer` to create a consistent and reproducible
    workspace that can run on any machine that supports Docker and Visual Studio Code
    (VS Code).
  prefs: []
  type: TYPE_NORMAL
- en: To use devcontainer, you need to have Docker and VS Code installed on your local
    machine or cloud service. You also need to install the Remote Development extension
    pack for VS Code, which enables you to work with remote environments. Then, you
    can find a repository that has a `.devcontainer` folder, which indicates that
    it supports devcontainer.
  prefs: []
  type: TYPE_NORMAL
- en: Once you have a devcontainer repository, you can clone it to your local machine
    or cloud service and open it with VS Code. VS Code will detect the `.devcontainer`
    folder and prompt you to reopen the folder in a container. This will build the
    Docker image and launch the container with the specified tools and settings. You
    can then open the notebook file and run it inside the container. You can also
    modify the code and push the changes back to the repository.
  prefs: []
  type: TYPE_NORMAL
- en: Using devcontainer is a convenient way to work with notebooks that require specific
    dependencies or configurations, without affecting your local machine or cloud
    service. You can also share your devcontainer setup with other users and ensure
    that they have the same development environment as you. Devcontainer is a useful
    feature for collaborating and deploying code. You can read more about it in the
    VS Code documentation and try it out.
  prefs: []
  type: TYPE_NORMAL
- en: The source code repository for this book has this capability enabled. This section
    looks at two ways to use this. One is using a local system, and another is using
    GitHub’s Codespaces, which provides a cloud environment to run code.
  prefs: []
  type: TYPE_NORMAL
- en: Running devcontainer Locally
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'As discussed previously, you need to have Docker and VS Code installed locally
    on your machine. To install Docker, head over to the [`https://www.docker.com/products/docker-desktop/`](https://www.docker.com/products/docker-desktop/)
    link and install the Docker Desktop version for your system. Download and run
    the binary for your platform and follow all the prompts, choosing the recommended/default
    options. VS Code can be installed from [`https://code.visualstudio.com/`](https://code.visualstudio.com/).
    Once VS Code is installed, also install the Remote Development extension pack
    for VS Code. After these steps, your local machine will be ready for local deployment
    of a Docker container. The advantage of this approach is that your development
    environment is housed in a Docker container, completely isolating your development
    environment from your local machine. Regardless of your local machine’s operating
    system, the code will run the same Docker configuration—in this case, it’s a Ubuntu
    image with all the required dependencies. The following steps walk through downloading
    the source code and running it locally:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_1_Chapter/502835_2_En_1_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A screenshot of the docker container. The menu bar consists of file, edit, selection,
    view, go, and run. The chapter 2 option is selected under open editors from Explorer.
    Show all commands, go to file, find in the filter, toggle full screen, and show
    settings options at the right bottom of the screen.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-8
  prefs: []
  type: TYPE_NORMAL
- en: Running in a Docker container
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to a folder of your choice on the local machine. If you are on a Windows
    machine, you can choose the WSL2 or Windows subsystem.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Clone the source code repository locally with this command:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: This command will create another subfolder named `drl-2ed` in the current folder
    where you ran this command. You can also visit the publisher’s source code link
    to clone the repository or download and unzip the code.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Navigate to the `drl-2ed` folder created with the `git` command and run VS
    Code from there with this command:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Do not forget the period (`.`) at the end of the command. This command instructs
    the system to open VS Code in the current folder.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: You may see a popup in the right corner with the message “Folder contains Dev
    Container configuration file. Reopen folder to develop in a container”. Click
    the “Reopen in Container” button to kick in the Docker build. It will use the
    development environment image specified inside the `.devcontainer` folder of the
    repository to create and start the Docker container. This is opposite of the instructions
    you had when running on VS Code locally, where you did not click the “Reopen in
    Container” button.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The first time you do this, it has to download the Docker image as well as install
    the required Ubuntu packages and run the `pip install requirements.txt` command
    to set up the Python environment. It may take a while—say about ten minutes or
    so to run the whole setup process. It will save the final Docker container locally
    and make it visible in your Docker desktop.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: The subsequent runs will be very fast, as they will use the saved Docker container.
    If you need to do a rebuild of the Docker environment, the VS Code command palette
    has options to do so.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'When the code is opened in a .`devcontainer` specified Docker image, you will
    see a status like “Dev Container: Python 3” in the bottom-left side of the VS
    Code, as shown in Figure [1-8](#Fig8). This confirms that you are now working
    inside a Docker-based dev container.'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_1_Chapter/502835_2_En_1_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A screenshot of the docket container. The menu bar consists of file, edit, selection,
    view, go, and run. The chapter 2 folder is selected under open editors from Explorer.
    The shortcuts to show all commands, go to file, find in files, toggle full screen,
    and show settings options are on the right.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-9
  prefs: []
  type: TYPE_NORMAL
- en: Selecting the Python environment in VS Code
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, press Control+Shift+P or Command+Shift+P to open the command palette
    in VS Code and type **Python** to see a list of commands for Python in VS Code.
    Choose the “Python: Select Interpreter” option, as shown in Figure [1-9](#Fig9).
    This time the Python Interpreter options will be different. Choose the Python
    3.9.18 version, as highlighted in Figure [1-9](#Fig9).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You can open any notebook. You again may need to select the same environment
    as the notebook kernel before you can execute the code in the notebook. You will
    find that option on the top-right side of the notebook; it’s called “Select Kernel”.
    Click this and select the same Python environment with Python 3.9.18.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You can now execute the code just as you would in a JupyterLab environment.
  prefs: []
  type: TYPE_NORMAL
- en: Running on GitHub Codespaces
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'GitHub Codespaces is a cloud-based development environment that allows you
    to create, edit, and run code from any device. You can access your codespaces
    from Visual Studio Code, a browser-based editor, or github.com. GitHub Codespaces
    integrates seamlessly with GitHub features, such as pull requests, issues, actions,
    and packages. You can also customize your codespaces with your own dotfiles, extensions,
    and settings. The key advantages of using something like Codespaces are:'
  prefs: []
  type: TYPE_NORMAL
- en: You can start coding quickly without setting up a local environment or installing
    dependencies.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can work on multiple projects and switch between them easily without cluttering
    your machine.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can collaborate with others in real time and share your codespaces with
    teammates or contributors.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can use the same tools and workflows that you are familiar with, such as
    VS Code, Git, and terminal.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can leverage the power and scalability of the cloud and run your code on
    fast and secure servers.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'You can start with Codespaces on the free tier, which will get you 60 hours
    per month of two-core machines. Here are the steps involved in using Codespaces:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_1_Chapter/502835_2_En_1_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A screenshot of Git Hub code spaces screen. The menu bar consists of codes,
    issues, pull requests, actions, projects, wiki, security, insights, and settings.
    Chapter 2 tested screen is open. The code option is selected and the create code
    space on the main is highlighted.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-10
  prefs: []
  type: TYPE_NORMAL
- en: Setting up GitHub Codespaces
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to the repository, for example, [`https://github.com/nsanghi/drl-2ed/`](https://github.com/nsanghi/drl-2ed/).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Make sure you are logged into your GitHub account and click the dropdown arrow
    next to the blue “Code” button. Next, click the “Create Codespace on Main” button,
    as shown in Figure [1-10](#Fig10). This will open a new tab and start setting
    up Codespaces using the Docker container specifications provided in the `.devcontainer`
    folder of the repository.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_1_Chapter/502835_2_En_1_Fig11_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A screenshot of the Git Hub code spaces screen. The menu bar consists of codes,
    issues, pull requests, actions, projects, wiki, security, insights, and settings.
    Chapter 2 tested screen is open. The code option is selected. It consists of code
    space and an effective lamp.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-11
  prefs: []
  type: TYPE_NORMAL
- en: Setting up GitHub Codespaces
  prefs: []
  type: TYPE_NORMAL
- en: Once the container is set up, it will open the repository in a cloud version
    of VS Code and run the pip install to install all the Python packages. Like the
    local Docker container setup, the first time this is set up on Codespaces, it
    may take about five to ten mins. However, subsequent runs will be faster, as it
    will reuse the cloud-saved Docker container it created during the first run.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Similar to the option of running on a local Docker, you need to select the right
    Python Interpreter with Python 3.9.18, as shown in Figure [1-9](#Fig9). You also
    need to select the same Python version as the kernel while running the notebooks.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You are now ready to run the code on GitHub Codespaces. This option gives you
    a full developer experience without any local install.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Because the Docker image is stored in Codespaces and is tied to your GitHub
    account, the next time you visit the GitHub repository and click the dropdown
    next to the “Code” button, you will see the previously created codespace, as shown
    in Figure [1-11](#Fig11). You can use that codespace to run the code in subsequent
    visits. It will use the saved Docker container and, in a matter of seconds, get
    your environment running.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You can click the three dots on the right side of the container name and open
    the codespace container. You can also use the menu to open the cloud-hosted codespace
    container inside your local VS Code.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Running on AWS Studio Lab
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: AWS Studio Lab is a free tier version from AWS and can be used as an alternative
    to Google Colab. It provides you with certain hours of free CPU and GPU access.
    You need to create an account by navigating to the [`https://studiolab.sagemaker.aws/`](https://studiolab.sagemaker.aws/)
    link.
  prefs: []
  type: TYPE_NORMAL
- en: 'Once you have created the account and logged in, you can clone the GitHub repository,
    create a Conda environment, and run the setup to install the Ubuntu packages as
    well as the Python libraries specified in the `requirements.txt` file. The steps
    involved are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: Once you are logged in, click the “Start Runtime” button to start a Jupyter
    instance.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: After the runtime is running, click the “Open Project” circle button. This will
    open a new tab with the JupyterLab interface.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Next you need to clone the repository. You can open a terminal from the JupyterLab
    interface or choose the Git ➤ Clone Git Repository menu option. Follow the instructions
    given in the dialog box to complete this step.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The next step is to create the Conda environment with Python 3.9, install the
    Ubuntu packages, and run the pip install. First open a terminal from the JupyterLab
    interface and run these commands:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: You can now open any of the notebooks from the explorer on the left side. When
    presented with the option to choose the kernel, choose `drl`, which is the Conda
    environment created in a previous step. If you do not see the option, you may
    need to choose the Amazon SageMaker Studio Lab ➤ Restart JupyterLab menu option.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: After selecting the right kernel, you may start executing the notebook code
    cells. The Conda environment you created persists between sessions, making subsequent
    runs very fast.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Using SageMaker Studio Lab allows you to run the code on-cloud, just like a
    few other options I have talked about in earlier sections. It requires no local
    install at all. Figure [1-12](#Fig12) shows a screenshot of AWS Studio Lab in
    action.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_1_Chapter/502835_2_En_1_Fig12_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A screenshot of Amazon Sage Maker Studio Lab. The menu bar consists of file,
    edit, view, run, kernel, git, tabs, settings, and help. The screen displays the
    Using R L Zoo Baseline 3\. The d r l python is selected from the select Kernel.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-12
  prefs: []
  type: TYPE_NORMAL
- en: AWS Studio Lab
  prefs: []
  type: TYPE_NORMAL
- en: Running Using Lightning.ai
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Lightning AI Studio ([`https://lightning.ai/`](https://lightning.ai/)) is a
    cloud-based AI development platform (similar to Google Colab and Amazon Sage maker
    Studio Lab) that aims to eliminate the hassle of setting up local environments
    for machine learning projects. Some key features of Lightning AI Studio include:'
  prefs: []
  type: TYPE_NORMAL
- en: It integrates popular machine learning tools into a single interface. This allows
    you to build scalable AI apps and endpoints more easily.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There is no environment setup required. You can code in the browser or connect
    your local IDE (VS Code or PyCharm). You can also easily switch between CPU and
    GPU with no environment changes.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It allows you to host and share AI apps built with Streamlit, Gradio, React
    JS, and so on. It also enables multi-user collaboration by coding together.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It provides unlimited storage and the ability to upload and share files as well
    as connect S3 buckets.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It enables training models at a massive scale using thousands of GPUs under
    paid plans.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There is a growing list of community templates (Studios) ready for different
    use cases and different models, which can act as your starting point.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Here are the high-level steps to run code on Lightning.ai studio:'
  prefs: []
  type: TYPE_NORMAL
- en: First go the [`https://lightning.ai/`](https://lightning.ai/) link and sign
    up.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Next click the “New Studio” button on the top right, choose the defaults on
    the prompt, and then click “Start”.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Once a studio starts, you can click the terminal on the right side of the studio
    and use the terminal to a) install `apt-get` packages b) clone the source code
    repository and c) run `pip install -r requirements.txt` to install required Python
    packages and libraries.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: At this point you are ready to start executing Jupyter Notebook. At the time
    of writing, the free tier version offers a four CPU configuration, making it a
    powerful experimentation platform in free tier offering. You also get access to
    GPU resources.
