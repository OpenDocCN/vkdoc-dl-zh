- en: 1. Introduction to Reinforcement Learning
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 1. 强化学习简介
- en: Reinforcement learning is a fast-growing discipline and is helping to make AI
    real, especially when it comes to robots and autonomous vehicles. Combining deep
    learning with reinforcement learning has led to many significant advances that
    are increasingly getting machines closer to acting the way humans do. Recently,
    deep reinforcement learning has been applied to Large Language Models like ChatGPT
    and others to make them follow human instructions and produce output that’s favored
    by humans. This is known as *Reinforcement Learning from Human Feedback* (RLHF).
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习是一个快速发展的学科，它正在帮助使人工智能成为现实，尤其是在机器人自动驾驶车辆方面。将深度学习与强化学习相结合已经导致了许多重大进步，这些进步使机器越来越接近人类的行为方式。最近，深度强化学习已被应用于像ChatGPT这样的大型语言模型和其他模型，使它们能够遵循人类的指令并产生人类偏好的输出。这被称为*从人类反馈中进行强化学习*（RLHF）。
- en: This book starts with the basics and finishes up discussing some of the most
    recent developments in the field. There is a good mix of theory (with minimal
    mathematics) and code implementations using PyTorch and other libraries.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 本书从基础知识开始，最后讨论了该领域的一些最新发展。其中包含了理论与实践（数学最少）以及使用PyTorch和其他库的代码实现的良好结合。
- en: This chapter sets the context and gets everything prepared for you to follow
    along in the rest of the book.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 本章设定了背景，并为你在本书的其余部分跟随内容做好了准备。
- en: Reinforcement Learning
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 强化学习
- en: 'All intelligent beings start with some knowledge. However, as they interact
    with the world and gain experience, they learn to adapt to the environment and
    become better at doing things. To quote a 1994 op-ed statement in the *Wall Street
    Journal*,^([1](#Fn1)) intelligence can be defined as follows:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 所有智能生命体都从一些知识开始。然而，随着它们与世界互动并获得经验，它们学会适应环境并变得擅长做事。引用1994年《华尔街日报》的一篇社论声明，^([1](#Fn1))
    智能可以定义为如下：
- en: '*A very general mental capability that, among other things, involves the ability
    to reason, plan, solve problems, think abstractly, comprehend complex ideas, learn
    quickly, and learn from experience. It is not merely book learning, a narrow academic
    skill, or test-taking smarts. Rather, it reflects a broader and deeper capability
    for comprehending our surroundings—“catching on,” “making sense” of things, or
    “figuring out” what to do.*'
  id: totrans-6
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*一种非常普遍的心智能力，它包括推理、规划、解决问题、抽象思维、理解复杂概念、快速学习和从经验中学习的能力。它不仅仅是书本知识，一种狭窄的学术技能，或考试时的聪明。相反，它反映了一种更广泛、更深入的能力，即理解我们的周围环境——“理解”，“弄懂”事物，或“弄清楚”该做什么。”*'
- en: 'Intelligence in the context of machines is called *artificial intelligence*.
    Oxford Languages defines artificial intelligence (AI) as follows:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在机器的背景下，智能被称为*人工智能*。牛津语言词典将人工智能（AI）定义为如下：
- en: '*The theory and development of computer systems able to perform tasks normally
    requiring human intelligence, such as visual perception, speech recognition, decision-making,
    and translation between languages.*'
  id: totrans-8
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*计算机系统的理论和发展，能够执行通常需要人类智能的任务，如视觉感知、语音识别、决策和语言之间的翻译。*'
- en: 'This is what you study in this book: the theory and design of algorithms that
    help machines (agents) gain the capability to perform tasks by interacting with
    the environment and continually learning from their successes, failures, and rewards.
    Originally AI revolved around designing solutions as a list of formal rules that
    could be expressed using logic and mathematical notations. These rules consisted
    of a collection of information codified into a knowledge base. The design of these
    AI systems also consisted of an inference engine that enabled users to query the
    knowledge base and combine the individual strands of rules/knowledge to make inferences.
    These systems were also known as *expert systems*, *decision support systems*,
    and so on. However, soon people realized that these systems were too brittle.
    As the complexity of problems grew, it became exponentially harder to codify the
    knowledge or to build an effective inference system.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书所研究的内容就是：帮助机器（代理）通过与环境交互并不断从成功、失败和奖励中学习来获得执行任务的能力的算法的理论和设计。最初，人工智能主要围绕设计解决方案，这些解决方案是一系列可以用逻辑和数学符号表达的形式规则。这些规则由一组编码到知识库中的信息组成。这些人工智能系统的设计还包括一个推理引擎，它使用户能够查询知识库并将单个规则/知识的线索结合起来进行推理。这些系统也被称为*专家系统*、*决策支持系统*等等。然而，很快人们意识到这些系统过于脆弱。随着问题复杂性的增加，将知识编码或构建有效的推理系统变得指数级困难。
- en: The modern concept of reinforcement learning is a combination of two different
    threads through their individual development. First is the concept of optimal
    control. Among many approaches to the problem of optimal control, in 1950 Richard
    Bellman came up with the discipline of *dynamic programming*, which is used extensively
    in this book. Dynamic programming, however, does not involve learning. It is all
    about planning through the space of various options using Bellman recursive equations.
    Chapters [2](502835_2_En_2_Chapter.xhtml) and [3](502835_2_En_3_Chapter.xhtml)
    have a lot to say about these equations.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习的现代概念是两个不同思路通过它们各自的发展而结合起来的。首先是最优控制的概念。在众多解决最优控制问题的方法中，1950年理查德·贝尔曼提出了*动态规划*这一学科，本书中广泛使用了这一学科。然而，动态规划并不涉及学习。它完全是关于通过贝尔曼递归方程在各种选项空间中进行规划。第[2](502835_2_En_2_Chapter.xhtml)章和第[3](502835_2_En_3_Chapter.xhtml)章对这些方程有很多讨论。
- en: 'The second thread is that of learning by trial and error, which finds its origin
    in the psychology of animal training. Edward Thorndike was the first one to express
    the concept of *trial and error* in clear terms. In his words:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个思路是试错学习，它起源于动物训练心理学。爱德华·桑代克是第一个用明确术语表达*试错*概念的人。用他的话说：
- en: '*Of several responses made to the same situation, those which are accompanied
    or closely followed by satisfaction to the animal will, other things being equal,
    be more firmly connected with the situation, so that, when it recurs, they will
    be more likely to recur; those which are accompanied or closely followed by discomfort
    to the animal will, other things being equal, have their connections with that
    situation weakened, so that, when it recurs, they will be less likely to occur.
    The greater the satisfaction or discomfort, the greater the strengthening or weakening
    of the bond.*'
  id: totrans-12
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*在针对同一情况所做出的几种反应中，那些伴随着或紧随动物满意度的反应，在其他条件相同的情况下，将与该情况更加紧密地联系在一起，因此，当它再次出现时，它们更有可能再次出现；那些伴随着或紧随动物不适的反应，在其他条件相同的情况下，它们与该情况的联系将减弱，因此，当它再次出现时，它们出现的可能性更小。满足感或不适感越强，这种联系加强或减弱的程度就越大。*'
- en: The concept of increasing the occurrence of good outcomes and decreasing the
    occurrence of bad outcomes is something you will see in use in Chapter [8](502835_2_En_8_Chapter.xhtml),
    on policy gradients.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 提高好结果发生的频率和降低坏结果发生的频率的概念，你将在第[8](502835_2_En_8_Chapter.xhtml)章中看到它的应用，该章讨论了策略梯度。
- en: In the 1980s, these two fields merged to give rise to the field of modern reinforcement
    learning. In the last decade, with the emergence of powerful deep learning methods,
    reinforcement learning (when combined with deep learning) is giving rise to very
    powerful algorithms that could make artificial intelligence real in coming times.
    Today’s reinforcement systems interact with the world to acquire experience and
    learn to optimize their actions based on the outcomes of their interactions with
    the world, by generalizing their experience. There is no explicit coding of expert
    knowledge.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在 20 世纪 80 年代，这两个领域合并产生了现代强化学习的领域。在过去十年中，随着强大的深度学习方法的兴起，强化学习（与深度学习相结合）正在产生非常强大的算法，这些算法可能在未来的某个时刻使人工智能成为现实。今天的强化系统通过与世界的互动来获取经验，并通过概括经验来学习优化其行为，基于与世界互动的结果，没有显式编码专家知识。
- en: Machine Learning Branches
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 机器学习分支
- en: Machine learning (ML) involves learning from the data presented to the system
    so that the system can perform a specified task. The system is not explicitly
    told how to do the task. Rather, it is presented with the data, and the system
    learns to carry out a task based on a defined objective. I do not say more about
    it, as I assume that you are familiar with the concept of machine learning. Machine
    learning approaches are traditionally divided into three broad categories, as
    shown in Figure [1-1](#Fig1).
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习（ML）涉及从系统呈现的数据中学习，以便系统能够执行特定的任务。系统没有明确被告知如何完成任务。相反，它被提供数据，系统根据定义的目标学习执行任务。我不多加说明，因为我假设你熟悉机器学习的概念。机器学习方法传统上分为三大类，如图
    [1-1](#Fig1) 所示。
- en: '![](../images/502835_2_En_1_Chapter/502835_2_En_1_Fig1_HTML.jpg)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![图 1-1](../images/502835_2_En_1_Chapter/502835_2_En_1_Fig1_HTML.jpg)'
- en: A Venn diagram of machine learning represents reinforcement learning, unsupervised
    learning, and supervised learning. The circles of supervised and unsupervised
    learning are shaded.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习的维恩图表示了强化学习、无监督学习和监督学习。监督学习和无监督学习的圆圈被阴影覆盖。
- en: Figure 1-1
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-1
- en: Branches of machine learning
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习的分支
- en: The three branches of machine learning differ in the sense of the “feedback”
    available to the learning system. They are discussed in the following sections.
    The distinction between supervised and unsupervised learning is blurring, with
    many nuanced approaches that mix and match the two paradigms in different ways.
    It has given rise to additional sub-categories, such as semi-supervised learning,
    self-supervised learning, and Generative AI.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习的三个分支在“反馈”方面对学习系统的意义不同。它们将在以下章节中讨论。监督学习和无监督学习之间的区别正在变得模糊，出现了许多细微的方法，以不同的方式混合和匹配这两种范例。它催生了额外的子类别，如半监督学习、自监督学习和生成式
    AI。
- en: Supervised Learning
  id: totrans-22
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 监督学习
- en: In supervised learning, the system is presented with the labeled data, and the
    objective is to generalize the knowledge so that new, unlabeled data can be labeled.
    Consider images of cats and dogs presented to a system, along with labels indicating
    whether the image shows a cat or a dog. The input data is represented as a set
    of data, *D* = (*x*[1], *y*[1]), (*x*[2], *y*[2]), …, (*x*[*n*], *y*[*n*]), where
    *x*[1], *x*[2], …, *x*[*n*] are the vectors of pixel values of individual images
    and *y*[1], *y*[2], …, *y*[*n*] are the labels of the respective images—say, a
    value of 0 for a cat and a value of 1 for a dog. The system/model takes this input
    and learns a mapping from image *x*[*i*] to label *y*[*i*]. Once trained, the
    system is presented with a new image *x*^′ to get a prediction of the label *y*^′ = 0
    or 1, depending on whether the image shows a cat or a dog.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在监督学习中，系统被提供带有标签的数据，目标是泛化知识，以便可以对新的、未标记的数据进行标记。考虑向系统展示的猫和狗的图像，以及指示图像是否显示猫或狗的标签。输入数据表示为数据集，*D*
    = (*x*[1], *y*[1]), (*x*[2], *y*[2]), …, (*x*[*n*], *y*[*n*])，其中 *x*[1], *x*[2],
    …, *x*[*n*] 是单个图像的像素值向量，*y*[1], *y*[2], …, *y*[*n*] 是相应图像的标签——例如，猫的值为 0，狗的值为 1。系统/模型接受这个输入，并学习从图像
    *x*[*i*] 到标签 *y*[*i*] 的映射。一旦训练完成，系统就会遇到一个新的图像 *x*^′ 来预测标签 *y*^′ = 0 或 1，这取决于图像是否显示猫或狗。
- en: This is a classification problem where the system learns to classify an input
    into the correct class. The other problem type is that of regression, such as
    when you’d want to predict the price of a house based on its features. The training
    data is again represented as *D* = (*x*[1], *y*[1]), (*x*[2], *y*[2]), …, (*x*[*n*],
    *y*[*n*]). The inputs are *x*[1], *x*[2], …, *x*[*n*] where each input *x*[*i*]
    is a vector of certain attributes—for example, the number of rooms in a house,
    its area, the size of the front lawn, and so on. The system is given a label *y*[*i*],
    which represents the market value of the house. The system uses the input data
    from many houses to learn to map the input features, *x*[*i*] to the value of
    a house, *y*[*i*]. The trained model is then presented with a vector *x*^′, which
    consists of the features of a new house, and the model predicts the market value
    *y*^′ of this new house.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个分类问题，系统学习将输入分类到正确的类别。另一种问题类型是回归，例如当你想根据房屋的特征预测房价时。训练数据再次表示为 *D* = (*x*[1],
    *y*[1]), (*x*[2], *y*[2]), …, (*x*[*n*], *y*[*n*])。输入是 *x*[1], *x*[2], …, *x*[*n*]，其中每个输入
    *x*[*i*] 是某些属性的向量——例如，房屋的房间数量、面积、前院的大小等等。系统被赋予一个标签 *y*[*i*]，它代表房屋的市场价值。系统使用来自许多房屋的输入数据来学习将输入特征
    *x*[*i*] 映射到房屋的价值 *y*[*i*]。训练好的模型随后被展示一个由新房屋特征组成的向量 *x*^′，模型预测这所新房屋的市场价值 *y*^′。
- en: Unsupervised Learning
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 无监督学习
- en: Unsupervised learning has no labels. It only has the inputs *D* = *x*[1], *x*[2],
    …, *x*[*n*] and no labels. The system uses this data to learn the hidden structure
    of the data so that it can cluster/categorize the data into broad categories.
    Post learning, when the system is presented with a new data point *x*^′, it can
    match the new data point to one of the learned clusters. Unlike supervised learning,
    there is no well-defined meaning to each category. Once the data is clustered
    into a category, based on the most common attributes within a cluster, you can
    assign some meaning to it. The other use of unsupervised learning is to leverage
    underlying input data to learn the data distribution so that the system can be
    subsequently queried to produce a new synthetic data point. This latter approach
    has been fueling the growth of image- and text generation. The new name for this
    approach is Generative AI. I elaborate on this in a section to follow.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 无监督学习没有标签。它只有输入 *D* = *x*[1], *x*[2], …, *x*[*n*] 以及没有标签。系统使用这些数据来学习数据的隐藏结构，以便可以将数据聚类/分类到广泛的类别中。学习后，当系统遇到新的数据点
    *x*^′ 时，它可以匹配新的数据点到已学习的某个簇中。与监督学习不同，每个类别都没有明确定义的意义。一旦数据被聚类到某个类别，基于簇内最常见的属性，你可以给它赋予一些意义。无监督学习的另一种用途是利用底层输入数据来学习数据分布，以便系统可以随后查询以生成新的合成数据点。这种后一种方法一直在推动图像和文本生成的增长。这种方法的新名字是生成式AI。我将在接下来的部分详细阐述这一点。
- en: Many times, unsupervised learning is used for feature extraction, which is then
    fed to a supervised learning system. By clustering data, you can first identify
    the hidden structure and remap the data to a lower dimensional form. With this
    lower dimensional data, supervised learning can learn faster. In this case, unsupervised
    learning is used as a feature extractor.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 许多时候，无监督学习用于特征提取，然后将这些特征输入到监督学习系统中。通过聚类数据，你可以首先识别隐藏结构，并将数据重新映射到低维形式。有了这种低维数据，监督学习可以更快地学习。在这种情况下，无监督学习被用作特征提取器。
- en: There is yet another way to leverage the unsupervised learning approach. Consider
    a case in which you have a small amount of labeled data and a large amount of
    unlabeled data. The labeled data and the unlabeled data are first clustered together.
    Next, in each such cluster, the unlabeled data is assigned labels based on the
    strength of labeled data in that cluster. You are basically leveraging labeled
    data to assign labels to the unlabeled data. The completely labeled data is next
    fed into the supervised learning algorithm to train a classification system. This
    approach of combining supervised and unsupervised learning together is known as
    *semi-supervised learning*. Semi-supervised learning is a good option when a large
    amount of unlabeled data has been collected and you want to avoid the additional
    workload of having to label all of it.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 还有另一种利用无监督学习方法的方式。考虑这样一个案例，你有一小部分标记数据和大量未标记数据。首先将标记数据和未标记数据聚类在一起。接下来，在每个这样的聚类中，根据该聚类中标记数据的强度，将未标记数据分配标签。你基本上是在利用标记数据来为未标记数据分配标签。接下来，将完全标记的数据输入到监督学习算法中，以训练一个分类系统。将监督学习和无监督学习结合在一起的方法称为“半监督学习”。当收集了大量未标记数据，而你又想避免对全部数据进行标记的额外工作量时，半监督学习是一个不错的选择。
- en: Reinforcement Learning
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 强化学习
- en: Now that you’ve learned about the supervised and unsupervised approaches, this
    section turns to the third broad category of machine learning—reinforcement learning.
    It is distinct from all the approaches discussed so far.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经了解了监督和无监督的方法，本节将转向机器学习的第三个广泛类别——强化学习。它与之前讨论的所有方法都不同。
- en: Let’s first look at an example. Say you are trying to design an autonomous vehicle
    that can drive on its own. You have a car called the *agent**;* that is, a system
    or an algorithm that is learning to drive on its own. It is learning the behavior
    of driving. Its current coordinates, speed, and direction of motion when combined
    as a vector of numbers is known as its *current state*. The agent uses its current
    state to make a decision to either apply the brake or press on the gas pedal.
    It also uses this information to turn the steering to change the direction of
    the car’s motion. The combined decision of “breaking/accelerating” and “steering
    the car” is known as an *action*. The mapping of a specific current state to a
    specific action is known as a *policy*. When the agent’s action is good, it will
    yield a happy outcome, and when an action is bad, it will result in an unhappy
    outcome. The agent uses this feedback of the outcome to assess the effectiveness
    of its action. The outcome as feedback is known as a *reward* that the agent gets
    for acting in a particular way in a specific state. Based on the current state
    and its action, the car reaches a new set of coordinates, speed, and direction.
    This is the *new state* that the agent finds itself in based on how it acted in
    the previous step. Who provides this outcome and decides the new state? It is
    the surroundings of the car, and it is something that the car/agent has no control
    over. Everything else that the agent does not control is known as the *environment*.
    I have a lot more to say about each of these terms throughout the book.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们来看一个例子。假设你正在尝试设计一辆能够自主驾驶的自动驾驶汽车。你有一辆叫做“代理”的车；也就是说，一个正在学习自主驾驶的系统或算法。它正在学习驾驶的行为。它的当前坐标、速度和运动方向，当它们组合成一个数字向量时，被称为其“当前状态”。代理使用其当前状态来做出决定，要么踩刹车，要么踩油门。它还使用这些信息来转动方向盘，改变汽车的运动方向。将“刹车/加速”和“转向汽车”的联合决策称为一个“动作”。将特定的当前状态映射到特定的动作称为一个“策略”。当代理的动作良好时，它将产生一个令人愉快的结局，而当动作不好时，它将导致一个不愉快的结局。代理使用这种结果的反馈来评估其动作的有效性。作为反馈的结果称为“奖励”，这是代理在特定状态下以特定方式行动所获得的。根据当前状态和其动作，汽车达到一组新的坐标、速度和方向。这是代理根据其在前一步中的行为而发现自己所处的“新状态”。谁提供这个结果并决定新的状态？是汽车的环境，这是汽车/代理无法控制的东西。代理无法控制的其他一切被称为“环境”。我在整本书中有很多关于这些术语要说的。
- en: In this setup, the data provided by the system in the form of state vectors,
    actions taken, and rewards obtained is sequential and correlated. Based on the
    action the agent takes, the next state and reward obtained from the environment
    could change drastically. In the previous example of the autonomous car, imagine
    a pedestrian who is crossing the road in front of the car. In this situation,
    the action of accelerating versus breaking would have very different outcomes.
    Accelerating the car could lead to injuring the pedestrian as well as damaging
    to the car and harming its occupants. Breaking could lead to avoiding any damage
    and the car continuing on its journey after the road is clear.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个设置中，系统以状态向量、采取的动作和获得的奖励的形式提供的数据是顺序相关联的。根据智能体采取的动作，从环境中获得的下一个状态和奖励可能会发生剧烈变化。在之前自动驾驶汽车的例子中，想象一下一辆汽车前方有行人正在过马路的情况。在这种情况下，加速与刹车的动作会有非常不同的结果。加速汽车可能会导致行人受伤，同时损坏汽车及其乘客。刹车则可能导致避免任何损坏，并在道路清晰后继续行驶。
- en: In reinforcement learning, the agent does not have prior knowledge of the system.
    It gathers feedback and uses that feedback to plan/learn actions to maximize a
    specific objective. As it does not have enough information about the environment
    initially, it must explore to gather insights. Once it gathers “enough” knowledge,
    it needs to exploit that knowledge and adjust its behavior to maximize the objective
    it is chasing. The difficult part is that there is no way to know when the exploration
    is “enough.” If the agent continues to explore even after it has perfect knowledge,
    it is wasting resources trying to gather new information, of which there is none.
    On the other hand, if the agent prematurely assumes that it has gathered enough
    knowledge, it may end up optimizing based on incomplete information and may perform
    poorly. This dilemma of when to explore and when to exploit is a core recurring
    theme of reinforcement learning algorithms. As you learn about different behavior
    optimization algorithms in this book, you will see this issue play out again and
    again.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在强化学习中，智能体对系统没有先验知识。它收集反馈并使用这些反馈来规划/学习动作以最大化特定的目标。由于它最初对环境的信息不足，它必须探索以收集洞察。一旦它收集了“足够”的知识，它就需要利用这些知识并调整其行为以最大化它追求的目标。困难的部分是不知道何时探索已经“足够”。如果智能体在拥有完美知识后仍然继续探索，它就是在浪费资源试图收集新的信息，而这些信息并不存在。另一方面，如果智能体过早地认为它已经收集了足够的知识，它最终可能会基于不完整的信息进行优化，并可能表现不佳。何时探索和何时利用的这种困境是强化学习算法的核心反复出现的主题。随着你在这本书中学习不同的行为优化算法，你将看到这个问题一次又一次地出现。
- en: Emerging Sub-branches
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 新兴子分支
- en: As the discipline of ML is seeing rapid advances and as ML-based solutions are
    becoming more and more sophisticated, the boundaries between the three traditional
    branches of machine learning are blurring. The last four to five years has seen
    innovative combinations of these three approaches, which has given rise to some
    common patterns, especially ones involving large volumes of unlabeled data that
    are used to develop models that act as supervised models. I discuss now the most
    prominent sub-branches.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 随着机器学习学科快速进步，以及基于机器学习的解决方案变得越来越复杂，机器学习三个传统分支之间的界限变得模糊。在过去的四到五年里，这些三种方法的创新组合出现了，这产生了一些常见的模式，特别是那些涉及大量未标记数据，这些数据被用来开发作为监督模型行动的模型。我现在讨论最突出的子分支。
- en: Self-Supervised Learning
  id: totrans-36
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 自监督学习
- en: 'Self-supervised learning is a sub-branch of machine learning that aims to learn
    useful representations from unlabeled data without human supervision. Unlike supervised
    learning, where the data is labeled with the correct output beforehand, self-supervised
    learning creates its own labels from the data. For example, a self-supervised
    learning system can generate labels by masking some parts of the data and trying
    to predict them from the rest of the data. This way, the system can learn general
    features and patterns that can be useful for various downstream tasks. Some examples
    of self-supervised learning are as follows:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 自监督学习是机器学习的一个子分支，旨在在没有人类监督的情况下，从未标记的数据中学习有用的表示。与监督学习不同，在监督学习中，数据在事先被标记为正确的输出，而自监督学习则从数据中创建自己的标签。例如，一个自监督学习系统可以通过遮蔽数据的一些部分并尝试从其余数据中预测它们来生成标签。这样，系统可以学习到对各种下游任务有用的通用特征和模式。以下是一些自监督学习的例子：
- en: '*Masked language modeling*: This method randomly masks some words in a sentence
    and tries to predict them from the remaining words. For example, given the sentence
    “She went to the [MASK] yesterday”, the system tries to fill in the blank with
    the most likely word. This way, the system can learn the syntax and semantics
    of natural language and the relationships between words. A popular model that
    uses this method is called BERT (Bidirectional Encoder Representations from Transformers).'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*掩码语言模型*：这种方法随机掩盖句子中的某些单词，并试图从剩余的单词中预测它们。例如，给定句子“她昨天去了_公园”，系统试图用最可能的单词填充空白。这样，系统可以学习自然语言的语法和语义以及单词之间的关系。使用这种方法的一个流行模型被称为BERT（来自变换器的双向编码器表示）。'
- en: '*Next sentence prediction*: This method takes two sentences as input and tries
    to predict whether they are consecutive or not. For example, given the sentences
    “He bought a new car” and “It was very expensive”, the system tries to determine
    if they are from the same paragraph or not. This way, the system can learn the
    coherence and logic of natural language and the structure of paragraphs. This
    method is also used by BERT, along with masked language modeling.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*下一句预测*：这种方法以两个句子作为输入，并试图预测它们是否连续。例如，给定句子“他买了一辆新车”和“它非常昂贵”，系统试图确定它们是否来自同一段落。这样，系统可以学习自然语言的连贯性和逻辑以及段落的结构。这种方法也被BERT使用，与掩码语言模型一起。'
- en: '*Denoising autoencoding*: This method randomly corrupts some parts of the input
    data and tries to reconstruct the original data from the corrupted version. For
    example, given the sentence “She wnt to the park yestrday” (words misspelled),
    the system tries to correct the spelling errors and output the sentence “She went
    to the park yesterday”. This way, the system can learn to recover information
    and reduce the noise in the data. A popular model that uses this method is called
    GPT-3 (Generative Pre-trained Transformer 3).'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*去噪自编码*：这种方法随机损坏输入数据的一些部分，并试图从损坏的版本中重建原始数据。例如，给定句子“她昨天去公园了”（单词拼写错误），系统试图纠正拼写错误并输出句子“她昨天去了公园”。这样，系统可以学习恢复信息并减少数据中的噪声。使用这种方法的一个流行模型被称为GPT-3（生成预训练变换器3）。'
- en: 'Another domain where self-supervised learning is widely used is computer vision,
    where large amounts of image data are available but not labeled. Self-supervised
    learning methods can leverage the visual features and patterns in images to learn
    robust image representations that can be useful for various downstream tasks.
    Some examples of self-supervised learning methods in computer vision are:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个广泛使用自监督学习的领域是计算机视觉，在该领域中有大量的图像数据可用但未标记。自监督学习方法可以利用图像中的视觉特征和模式来学习鲁棒的图像表示，这些表示对于各种下游任务可能很有用。计算机视觉中一些自监督学习方法的例子包括：
- en: '*Contrastive learning*: This method takes pairs of images as input and tries
    to determine whether they are similar or different. For example, given two images
    of the same object from different angles, the system tries to recognize that they
    are related. Conversely, given two images of different objects, the system tries
    to distinguish that they are not related. This way, the system can learn the invariant
    and discriminative features of images and the similarity and differences between
    images. A popular model that uses this method is called SimCLR (Simple Contrastive
    Learning of Visual Representations).'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*对比学习*：这种方法以成对的图像作为输入，并试图确定它们是否相似或不同。例如，给定两个从不同角度拍摄的同一样品的图像，系统试图识别它们之间的关系。相反，给定两个不同对象的图像，系统试图区分它们之间没有关系。这样，系统可以学习图像的不变性和判别性特征以及图像之间的相似性和差异。使用这种方法的一个流行模型被称为SimCLR（简单视觉表示对比学习）。'
- en: '*Generative modeling*: This method takes an image as input and tries to generate
    a new image that is similar to the input but not identical. For example, given
    an image of a face, the system tries to generate a new face that has different
    facial features but still looks realistic. This way, the system can learn the
    generative and creative aspects and the diversity and variability of images. A
    popular model that uses this method is called StyleGAN (Style-Based Generator
    Architecture for Generative Adversarial Networks).'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*生成建模*：这种方法以图像作为输入，并试图生成一个与输入相似但又不完全相同的新图像。例如，给定一张人脸图像，系统试图生成一个具有不同面部特征但仍然看起来逼真的新面孔。这样，系统可以学习生成和创造性方面以及图像的多样性和可变性。使用这种方法的一个流行模型称为StyleGAN（基于生成对抗网络的风格化生成器架构）。'
- en: '*Self-distillation*: This method takes a large and complex model as input and
    tries to compress it into a smaller and simpler model that can perform the same
    task. For example, given a large image classification model that can recognize
    thousands of classes of images, the system tries to create a smaller model that
    can achieve the same accuracy with less computational resources. This way, the
    system can learn to optimize and simplify the model and retain the essential information
    and functionality of the model. A popular model that uses this method is called
    DistilBERT (Distilled BERT).'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*自蒸馏*：这种方法以一个大型且复杂的模型作为输入，并试图将其压缩成一个更小、更简单的模型，使其能够执行相同的任务。例如，给定一个能够识别数千类图像的大型图像分类模型，系统试图创建一个更小的模型，以更少的计算资源达到相同的准确率。这样，系统可以学会优化和简化模型，并保留模型的基本信息和功能。使用这种方法的一个流行模型称为DistilBERT（蒸馏BERT）。'
- en: The field of self-supervised learning is fueling the explosive growth of AI
    post COVID-19\. In a matter of a few years, it has opened up unimaginable human
    quality models that were unthinkable a few years back. The approaches of generating
    novel images and text based on instructions and reference context have been combined
    under a new category called Generative AI.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 自监督学习领域正在推动人工智能在COVID-19之后的爆炸式增长。在短短几年内，它开辟了几年前无法想象的人类高质量模型。基于指令和参考上下文生成新图像和文本的方法被纳入了一个新的类别，称为生成式AI。
- en: Generative AI
  id: totrans-46
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 生成式AI
- en: Generative AI is a sub-branch of artificial intelligence that focuses on creating
    novel content or data from scratch, such as images, text, music, or speech. Generative
    AI models learn from a large amount of data and use statistical techniques to
    generate new data. This new data resembles the original data distribution but
    is not an exact copy of any existing sample. Generative AI can be used for various
    purposes, such as data augmentation, artistic expression, content creation, data
    synthesis, and anomaly detection.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI是人工智能的一个子分支，专注于从头开始创建新颖的内容或数据，如图像、文本、音乐或语音。生成式AI模型从大量数据中学习，并使用统计技术生成新数据。这种新数据类似于原始数据分布，但不是任何现有样本的精确副本。生成式AI可用于各种目的，如数据增强、艺术表达、内容创作、数据合成和异常检测。
- en: 'One of the most popular Generative AI techniques is generative adversarial
    networks (GANs), which consists of two neural networks: a generator and a discriminator.
    The generator tries to create fake data that can fool the discriminator, while
    the discriminator tries to distinguish between real and fake data. The two networks
    compete with each other and improve over time, until the generator can produce
    realistic data that can deceive the discriminator. GANs have been used to generate
    high-quality images of faces, animals, landscapes, and objects, as well as to
    manipulate and enhance existing images, such as face aging, style transfer, super-resolution,
    and inpainting.'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI中最受欢迎的技术之一是生成对抗网络（GANs），它由两个神经网络组成：一个生成器和判别器。生成器试图创建能够欺骗判别器的假数据，而判别器则试图区分真实和假数据。这两个网络相互竞争并随着时间的推移而改进，直到生成器能够产生能够欺骗判别器的逼真数据。GANs已被用于生成高质量的人脸、动物、风景和物体图像，以及操纵和增强现有图像，如人脸老化、风格迁移、超分辨率和修复。
- en: Another Generative AI technique is variational autoencoders (VAEs), which are
    a type of autoencoder that learns to encode the data into a latent space and then
    decodes it back to the original space. The latent space is a lower-dimensional
    representation of the data that captures its essential features. VAEs also impose
    a probabilistic distribution on the latent space, such as a Gaussian distribution,
    and then sample from it to generate new data. VAEs can generate diverse and smooth
    data, such as images of handwritten digits, faces, and flowers, as well as interpolate
    between different data points in the latent space.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种生成式AI技术是变分自编码器（VAEs），这是一种学习将数据编码到潜在空间并解码回原始空间的自动编码器。潜在空间是数据的低维表示，它捕捉了数据的基本特征。VAEs还在潜在空间上施加概率分布，例如高斯分布，然后从中采样以生成新数据。VAEs可以生成多样化和平滑的数据，例如手写数字、人脸和花卉的图像，以及潜在空间中不同数据点之间的插值。
- en: A third Generative AI technique is autoregressive models, which are a type of
    neural network that generates data sequentially, by predicting the next element
    in the sequence based on the previous elements. Autoregressive models can capture
    long-term dependencies and complex patterns in the data, such as natural language,
    music, and speech. Autoregressive models have been used to generate coherent and
    fluent text, such as stories, articles, summaries, and translations, as well as
    to generate realistic and expressive music and speech, such as songs, melodies,
    and voices. The GPT family of text-generation Large Language Models follow this
    paradigm.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 第三种生成式AI技术是自回归模型，这是一种通过根据前面的元素预测序列中的下一个元素来顺序生成数据的神经网络。自回归模型可以捕捉数据中的长期依赖性和复杂模式，例如自然语言、音乐和语音。自回归模型已被用于生成连贯流畅的文本，如故事、文章、摘要和翻译，以及生成逼真和富有表现力的音乐和语音，如歌曲、旋律和声音。文本生成大型语言模型的GPT系列遵循这一范式。
- en: A fourth Generative AI technique is deep learning diffusion models, which are
    a type of probabilistic model that learns to reverse the process of adding random
    noise to the data. The idea is to start with a noisy version of the data and gradually
    remove the noise until the original data is recovered. By doing so, the model
    learns to capture the distribution of the data and can generate new data by sampling
    from it. Deep learning diffusion models can generate high-fidelity and diverse
    data, such as images of faces, animals, and objects, as well as conditional generation
    based on text or class labels.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 第四种生成式AI技术是深度学习扩散模型，这是一种学习反转向数据添加随机噪声过程的概率模型。想法是从数据的有噪声版本开始，逐渐去除噪声，直到恢复原始数据。通过这样做，模型学习捕捉数据的分布，并通过从中采样来生成新数据。深度学习扩散模型可以生成高保真和多样化的数据，例如人脸、动物和物体的图像，以及基于文本或类标签的条件生成。
- en: Generative AI vs Other Learning Paradigms
  id: totrans-52
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 生成式AI与其他学习范式比较
- en: 'One way to categorize Generative AI models is based on how they learn from
    the data. As you have learned, there are three main types of learning paradigms:
    supervised, unsupervised, and self-supervised.'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 对生成式AI模型进行分类的一种方法是基于它们如何从数据中学习。正如你所学的，主要有三种学习范式：监督学习、无监督学习和自监督学习。
- en: '*Supervised learning* is when the model learns from labeled data, that is,
    data that has some ground truth or desired output associated with it.'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '*监督学习*是指模型从标记数据中学习，即与某些真实或期望输出相关联的数据。'
- en: '*Unsupervised learning* is when the model learns from unlabeled data, that
    is, data is grouped based on some similarity or difference criteria.'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '*无监督学习*是指模型从未标记数据中学习，即根据某些相似性或差异性标准对数据进行分组。'
- en: '*Self-supervised learning* is when the model learns from unlabeled data by
    creating its own labels or pseudo-labels based on some pretext task or objective.
    Self-supervised learning is useful for tasks that require learning rich and generalizable
    representations of the data that can be used for downstream tasks.'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '*自监督学习*是指模型通过创建自己的标签或伪标签来从未标记的数据中学习，这些标签或伪标签基于某些先验任务或目标。自监督学习对于需要学习数据丰富和可泛化表示的任务很有用，这些表示可以用于下游任务。'
- en: 'Another way to categorize Generative AI models is based on how they generate
    new data or content. There are two main types of generative models: explicit and
    implicit.'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种对生成式AI模型进行分类的方法是基于它们生成新数据或内容的方式。主要有两种生成模型：显式和隐式。
- en: '*Explicit generative models* are those that explicitly model the probability
    distribution of the data or the likelihood of generating a given data point. For
    example, a variational autoencoder (VAE) is an explicit generative model that
    learns to encode the data into a latent space and decode it back into the data
    space while maximizing the likelihood of the data given the latent variables.
    Explicit generative models can be used for tasks that require estimating the probability
    of the data or sampling from the data distribution.'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '*显式生成模型*是那些明确地建模数据概率分布或生成给定数据点的可能性的模型。例如，变分自编码器（VAE）是一个显式生成模型，它学习将数据编码到潜在空间，并解码回数据空间，同时最大化给定潜在变量的数据可能性。显式生成模型可用于需要估计数据概率或从数据分布中采样的任务。'
- en: '*Implicit generative models* are those that implicitly learn the data distribution
    by optimizing a different objective function than the likelihood function. For
    example, a generative adversarial network (GAN) is an implicit generative model
    that learns to generate realistic data by playing a minimax game between a generator
    and a discriminator.'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '*隐式生成模型*是那些通过优化不同于似然函数的不同目标函数来隐式学习数据分布的模型。例如，生成对抗网络（GAN）是一个隐式生成模型，它通过在生成器和判别器之间进行最小-最大游戏来学习生成逼真的数据。'
- en: '*Semi-supervised learning* is a hybrid approach that combines supervised and
    unsupervised learning methods.'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '*半监督学习*是一种结合监督学习和无监督学习方法的混合方法。'
- en: To summarize, *Generative AI* can be seen as a subset of unsupervised learning
    or self-supervised learning, depending on how the model learns from the data.
    Generative AI can also be seen as a distinct type of learning paradigm, depending
    on how the model generates new data or content. Generative AI can be compared
    with other learning paradigms based on their goals, methods, and applications.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，*生成式AI*可以根据模型如何从数据中学习被视为无监督学习或自监督学习的一个子集。根据模型生成新数据或内容的方式，生成式AI也可以被视为一种不同的学习范式。生成式AI可以根据其目标、方法和应用与其他学习范式进行比较。
- en: The next section returns to the topic of reinforcement learning (RL).
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 下一节将回到强化学习（RL）的主题。
- en: Core Elements of RL
  id: totrans-63
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 强化学习（RL）的核心要素
- en: 'A reinforcement learning system can be broken into four key components: policy,
    rewards, value functions, and model of the environment.'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 一个强化学习系统可以分解为四个关键组件：策略、奖励、价值函数和环境模型。
- en: '*Policy* is what forms the intelligence of the agent. An agent gets to interact
    with the environment to sense the current state of the environment, for example,
    a robot getting visual and other sensory inputs from the system, also known as
    the *current state* of the environment or the current observation data being perceived
    by the robot. The robot, like an intelligent entity, uses this current information
    and possibly the past history to decide what to do next, that is, what *action*
    to perform. The *policy* maps the state to the action that the agent takes. Policies
    can be *deterministic*. In other words, for a given state of environment, there
    is a single fixed action that the agent takes. Sometimes the policies can be *stochastic*;
    in other words, for a given state, there are multiple possible actions that the
    agent can take.'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '*政策*是形成智能体智能的要素。智能体通过与环境的交互来感知环境的当前状态，例如，机器人从系统中获取视觉和其他感官输入，也称为环境的*当前状态*或机器人感知到的当前观测数据。机器人，作为一个智能实体，利用这些当前信息和可能的历史信息来决定下一步要做什么，即执行什么*动作*。*政策*将状态映射到智能体采取的动作。政策可以是*确定性的*。换句话说，对于给定的环境状态，智能体采取的是单一固定的动作。有时政策可以是*随机的*；换句话说，对于给定的状态，智能体可以采取多个可能的动作。'
- en: '*Reward* refers to the goal/objective that the agent is trying to achieve.
    Consider a robot trying to go from Point A to Point B. It senses the current position
    and takes an action. If that action brings it near to its goal B, the reward should
    be positive. If it takes the robot away from Point B, it is an unfavorable outcome,
    the reward should be negative. In other words, the reward is a numerical value
    indicating the “goodness” of the action taken by the agent based on the objective/goal
    it is trying to achieve. The reward is the primary way for the agent to assess
    if the action was good or bad and use this information to adjust its behavior,
    thus optimizing the policy that it is learning.'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '**奖励**指的是智能体试图实现的目标/目标。考虑一个试图从点A移动到点B的机器人。它感知当前位置并采取行动。如果该行动使其接近目标B，则奖励应该是正的。如果它使机器人远离点B，则是不利的结局，奖励应该是负的。换句话说，奖励是一个数值，表示智能体根据其试图实现的目标/目标采取的行动的“好坏”。奖励是智能体评估行动是好是坏的主要方式，并利用这些信息来调整其行为，从而优化它正在学习的策略。'
- en: Rewards are an intrinsic property of the environment. The reward obtained is
    a function of the current state the agent is in and the action it takes while
    in that state. Rewards and the policy being followed by the agent define the *value
    functions*.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 奖励是环境的固有属性。获得的奖励是智能体当前状态和在该状态下采取的动作的函数。奖励和智能体遵循的策略定义了**价值函数**。
- en: '*Value* in a state is the total cumulative reward an agent is expected to get,
    based on the state it is in and the current policy it is following.'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 状态中的**价值**是指智能体根据其当前状态和遵循的策略预期获得的累积奖励总和。
- en: '*Rewards* are immediate feedback from the environment based on the state and
    action taken in that state. Unlike value, rewards do not change based on an agent’s
    actions. Taking a specific action in a specific state will always produce the
    same reward.'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**奖励**是基于状态和在该状态下采取的动作的环境的即时反馈。与价值不同，奖励不会根据智能体的动作而改变。在特定状态下采取特定动作将始终产生相同的奖励。'
- en: Value functions are like long-term rewards that are influenced not only by the
    environment but also by the policy the agent is following. Value exists because
    of the rewards. The agent accumulates rewards as it follows a policy and uses
    these cumulative rewards to assess the value in a state. It then makes changes
    to its policy to increase the value of the state.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 价值函数就像长期奖励，不仅受环境的影响，还受智能体遵循的策略的影响。价值的存在是因为奖励。智能体在遵循策略的过程中积累奖励，并使用这些累积奖励来评估状态的价值。然后，它调整其策略以增加状态的价值。
- en: You can connect this idea to the *exploration-exploitation dilemma* discussed
    earlier. There may be certain states in which an optimal action may bring an immediate
    negative reward. However, such an action may still be optimal, as it may put the
    agent in a new state from which it can get to its goal a lot faster. An example
    is reaching a goal by crossing over a hump that includes a shorter length path
    versus taking a detour with a longer path and avoiding the hump. In many cases,
    the detour, although longer, may be an easier path overall.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以将这个想法与之前讨论过的**探索-利用困境**联系起来。可能存在某些状态，其中最优动作可能会带来立即的负面奖励。然而，这样的动作仍然可能是最优的，因为它可能将智能体置于一个可以更快达到目标的新状态。一个例子是通过跨越一个包括较短路径的驼峰来达到目标，而不是通过较长路径绕行并避开驼峰。在许多情况下，虽然绕行路径更长，但整体上可能是一条更简单的路径。
- en: Unless the agent explores enough, it may not uncover these optimal paths and
    may end up settling for a less than optimal path. However, having discovered the
    better path, it has no way of knowing whether it still needs more exploration
    to find yet another quicker path to a goal or whether it’s better to just exploit
    its prior knowledge to race toward the goal.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 除非智能体进行足够的探索，否则它可能无法发现这些最优路径，最终可能只能满足于次优路径。然而，一旦发现了更好的路径，它就无法知道是否还需要更多的探索来找到另一条更快达到目标的路，或者是否最好利用先前的知识来向目标冲刺。
- en: Chapters [2](502835_2_En_2_Chapter.xhtml) to [7](502835_2_En_7_Chapter.xhtml)
    focus on algorithms that use the previously described value functions to find
    optimal behavior/policy.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 第 [2](502835_2_En_2_Chapter.xhtml) 章到 [7](502835_2_En_7_Chapter.xhtml) 章专注于使用之前描述的价值函数来寻找最优行为/策略的算法。
- en: The last component is the model of the *environment*. In some approaches of
    finding optimal behavior, agents use interactions with the environment to form
    an internal model of the environment. Such an internal model helps the agent plan,
    that is, consider one or more chains of actions to assess the best sequence of
    actions. This method is called *model-based* learning. At the same time, there
    are other methods that are completely based on trial and error. Such methods do
    not form any model of the environment. Hence, these are called *model-free* methods.
    The majority of the agents use a combination of model-based and model-free methods
    to find the optimal policy.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一个组成部分是*环境*模型。在一些寻找最优行为的方法中，智能体通过与环境交互来形成对环境的内部模型。这样的内部模型有助于智能体进行规划，即考虑一个或多个动作链以评估最佳动作序列。这种方法被称为*基于模型的*学习。同时，还有其他完全基于试错的方法。这些方法不形成任何环境模型。因此，这些被称为*无模型的*方法。大多数智能体使用基于模型和无模型方法的组合来寻找最优策略。
- en: Deep Learning with Reinforcement Learning
  id: totrans-75
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 深度学习与强化学习
- en: In recent years, a sub-branch of machine learning involving models based on
    neural networks has exploded. With the advent of powerful computers, the abundance
    of data, and new algorithms, it is now possible to train models to generalize
    based on raw inputs like images, text, and voice, similar to the way humans operate.
    The need for domain-specific handcrafted features to train the models is being
    replaced with powerful neural-network-based models under the sub-branch of deep
    learning.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 近年来，一个涉及基于神经网络模型的机器学习子分支迅速发展。随着强大计算机的出现、数据的丰富以及新算法的诞生，现在可以训练模型根据原始输入如图像、文本和声音进行泛化，类似于人类操作的方式。在深度学习子分支下，训练模型所需的特定领域的手工特征正被强大的基于神经网络的模型所取代。
- en: In 2014, DeepMind successfully combined deep learning techniques with reinforcement
    learning to learn from the raw data collected from an environment without any
    domain-specific processing of the raw input. Its first success was converting
    the conventional Q-learning algorithm under reinforcement learning into a deep
    Q-learning approach that was named Deep Q Networks (DQN). Q-learning involves
    an agent following some policy to gather experiences of its actions in the form
    of a tuple of the current state, the action it took, the reward it got, and the
    next state it found itself in. The agent then uses these experiences with Bellman
    equations in an iterative loop to find an optimal policy so that the value function
    (as explained earlier) of each state increases.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 2014年，DeepMind 成功地将深度学习技术与强化学习相结合，从环境中收集的原始数据中学习，而无需对原始输入进行任何特定领域的处理。它的第一个成功是将强化学习中的传统Q学习算法转换为名为深度Q网络（DQN）的深度Q学习方法。Q学习涉及智能体遵循某些策略来收集其动作的经验，这些经验以当前状态、所采取的动作、所获得的奖励和智能体发现自己所在的下个状态组成的元组的形式。然后，智能体使用贝尔曼方程在迭代循环中使用这些经验，以找到最优策略，从而使每个状态的价值函数（如前所述）增加。
- en: Earlier attempts to combine deep learning with reinforcement learning had not
    been successful due to the unstable performance of the combined approach. DeepMind
    made some interesting and smart changes to overcome instability issues. It first
    applied the combined approach of traditional reinforcement learning and deep learning
    for developing game-playing agents for Atari games*.* The agent would get a snapshot
    of the game and have no prior knowledge of the rules of the game. The agent would
    use this raw visual data to learn to play Atari video games. In many cases, it
    achieved human-level performance. The company subsequently extended the approach
    to develop agents that could defeat champion human players in a game like Go.
    The use of deep learning with reinforcement learning has given rise to robots
    that act a lot more intelligently, without the need to handcraft domain-specific
    knowledge.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 早期尝试将深度学习与强化学习相结合并不成功，因为结合方法的表现不稳定。DeepMind 对结合方法进行了一些有趣且聪明的改进，以克服不稳定性问题。它首先将传统的强化学习和深度学习的结合方法应用于开发用于Atari游戏的智能体。智能体会获得游戏的快照，并且对游戏的规则没有任何先验知识。智能体将使用这些原始视觉数据来学习玩Atari视频游戏。在许多情况下，它达到了人类水平的性能。该公司随后扩展了这种方法，开发了能够击败围棋冠军人类玩家的智能体。深度学习与强化学习的结合产生了更加智能的机器人，无需手工制作特定领域的知识。
- en: And most recently it has been applied to Large Language Models (LLMs) in the
    form of RLHF (Reinforcement Learning from Human Feedback) to make LLMs follow
    instructions and generate human-quality text based on the prompts. This is what
    made the world take notice of chatGPT3.5 and the emergence of new opportunities
    that arose.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 最近，它被应用于大型语言模型（LLMs）的RLHF（基于人类反馈的强化学习）形式，使LLMs能够遵循指令并根据提示生成人类质量的文本。这就是世界开始关注ChatGPT3.5以及由此产生的新机会的原因。
- en: This is an exciting and fast-growing field. Chapter [6](502835_2_En_6_Chapter.xhtml)
    covers deep learning with RL. Most of the algorithms from Chapter [6](502835_2_En_6_Chapter.xhtml)
    onward involve a combination of deep learning and reinforcement learning.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个令人兴奋且快速发展的领域。第[6](502835_2_En_6_Chapter.xhtml)章涵盖了带有强化学习的深度学习。从第[6](502835_2_En_6_Chapter.xhtml)章开始的多数算法都涉及深度学习和强化学习的结合。
- en: Examples and Case Studies
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 例子和案例研究
- en: To motivate you, this section looks at various uses of reinforcement learning
    and explains how it is helping solve some real-world problems today.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 为了激励你，本节探讨了强化学习的各种应用，并解释了它如何帮助解决当今的一些现实世界问题。
- en: Autonomous Vehicles
  id: totrans-83
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 自动驾驶汽车
- en: This section looks at the field of autonomous vehicles (AVs). AVs have sensors
    like LiDAR, radar, cameras, and so on, that sense their nearby environment. These
    sensors are then used to carry out object detection, lane detection, and so on.
    The raw sensory data and object detection are combined to get a unified scene
    representation that is used for planning a path to a destination. The planned
    path is next used to feed inputs to the controls to make the system/agent follow
    that path. The motion planning is the part in which trajectories are planned.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 本节探讨了自动驾驶汽车（AVs）这一领域。AVs配备了如激光雷达、雷达、摄像头等传感器，用于感知其附近的环境。这些传感器随后被用来执行目标检测、车道检测等任务。原始的感官数据和目标检测被结合以获得统一的场景表示，该表示用于规划到达目的地的路径。规划的路径随后被用来向控制系统输入，使系统/代理遵循该路径。运动规划是规划轨迹的部分。
- en: A concept like inverse reinforcement learning in which one observes an expert
    and learns the implied objective/reward based on the expert’s interaction can
    be used to optimize cost functions to come up with smooth trajectories. Actions
    such as overtaking, lane changing, and automated parking also leverage various
    parts of reinforcement learning to build intelligence into the behavior. The alternative
    would be to handcraft various rules, and that can never be exhaustive or flexible.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 像逆向强化学习这样的概念，其中观察一个专家并根据专家的交互学习隐含的目标/奖励，可以用来优化成本函数，从而得出平滑的轨迹。如超车、换道和自动泊车等动作也利用了强化学习的各个部分来构建行为中的智能。另一种选择是手动编写各种规则，但这永远无法穷尽或灵活。
- en: Robots
  id: totrans-86
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 机器人
- en: Using computer vision and natural language processing or speech recognition
    with deep learning techniques has added human-like perceptions to autonomous robots.
    Further, combined deep learning and reinforcement learning methods have resulted
    in teaching robots to learn human-like gaits to walk, pick up and manipulate objects,
    or observe human behavior through cameras and learn to perform like humans.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 使用计算机视觉和自然语言处理或语音识别结合深度学习技术，已经为自主机器人增添了类似人类的感知能力。更进一步，结合深度学习和强化学习方法，使得机器人能够学习类似人类的步态行走、拾取和操作物体，或者通过摄像头观察人类行为并学习像人类一样执行任务。
- en: Recommendation Systems
  id: totrans-88
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 推荐系统
- en: Today recommender systems are everywhere. Video sharing/hosting applications,
    YouTube, TikTok, and Facebook suggest videos that you might like to watch based
    on your viewing history. When you visit any e-commerce site, based on the current
    product you are viewing and your past purchase patterns or based on the way other
    users have acted, you are presented with other similar product recommendations.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 今天，推荐系统无处不在。视频分享/托管应用、YouTube、TikTok和Facebook根据你的观看历史向你推荐你可能想观看的视频。当你访问任何电子商务网站时，根据你当前查看的产品、你的过去购买模式，或者根据其他用户的行为方式，你会看到其他类似产品的推荐。
- en: All such recommender engines are increasingly driven by reinforcement learning–based
    systems. These systems continually learn from the way users respond to the suggestions
    presented by the engine. A user acting on the recommendation reinforces these
    actions as good actions given the context.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些推荐引擎越来越多地由基于强化学习的系统驱动。这些系统不断地从用户对引擎提出的建议的反应中学习。用户根据推荐采取行动，根据上下文强化这些行动作为好的行动。
- en: Finance and Trading
  id: totrans-91
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 金融和交易
- en: Because of its sequential action optimization focus, wherein past states and
    actions influence the future outcomes, reinforcement learning finds significant
    use in time-series analysis, especially in the field of finance and stock trading.
    Many automated trading strategies use a reinforcement learning approach to continually
    improve and fine-tune the trading algorithms based on the feedback from past actions.
    Banks and financial institutions use chatbots that interact with users to provide
    effective, low-cost user support and engagement. These bots again use reinforcement
    learning to fine-tune their behavior. Portfolio risk optimization and credit scoring
    systems have also benefitted from RL-based approaches.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 由于其关注于序列动作优化，其中过去的状态和动作影响未来结果，强化学习在时间序列分析中有着显著的应用，尤其是在金融和股票交易领域。许多自动交易策略使用强化学习方法，根据过去动作的反馈不断改进和微调交易算法。银行和金融机构使用与用户互动的聊天机器人提供有效、低成本的用户支持和参与。这些机器人再次使用强化学习来微调其行为。投资组合风险优化和信用评分系统也从基于RL的方法中受益。
- en: Healthcare
  id: totrans-93
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 医疗保健
- en: Reinforcement learning finds significant use in healthcare, be it generating
    predictive signals and enabling medical intervention at early stages or be it
    robot-assisted surgeries or managing the medical and patient data. It is also
    used to refine the interpretation of imaging data, which is dynamic in nature.
    RL-based systems provide recommendations learned from its experiences and continually
    evolve.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习在医疗保健领域有显著的应用，无论是生成预测信号和早期阶段实现医疗干预，还是机器人辅助手术或管理医疗和患者数据。它还被用于细化对动态性质的数据的解释。基于RL的系统提供从其经验中学习到的建议，并持续进化。
- en: Large Language Models and Generative AI
  id: totrans-95
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 大型语言模型和生成式人工智能
- en: One of the applications of reinforcement learning in Generative AI is to create
    Large Language Models that can generate coherent and diverse text. Reinforcement
    learning helps optimize the language models for specific objectives, such as relevance,
    informativeness, or creativity. For example, RLHF (Reinforcement Learning from
    Human Feedback) is a technique that uses human ratings as rewards to fine-tune
    the language models and improve their quality and fluency. RLHF has been used
    to generate more engaging and personalized dialogues, summaries, and stories.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习在生成式人工智能中的应用之一是创建能够生成连贯且多样化的文本的大型语言模型。强化学习有助于针对特定目标优化语言模型，例如相关性、信息性或创造性。例如，RLHF（基于人类反馈的强化学习）是一种使用人类评分作为奖励来微调语言模型并提高其质量和流畅性的技术。RLHF已被用于生成更具吸引力和个性化的对话、摘要和故事。
- en: Game Playing
  id: totrans-97
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 游戏玩法
- en: Finally, I cannot stress enough the way RL-based agents are able to beat human
    players in many board games. While it may seem wasteful to design agents that
    can play games, there is a reason for this. Games offer a simpler idealized world,
    making it easier to design, train, and compare approaches. Approaches learned
    under such idealized environments/setups can be subsequently enhanced to make
    agents perform well in real-world situations. Games provide a well-controlled
    environment to research deeper into the field.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我无法强调基于RL的代理在许多棋类游戏中击败人类玩家的方式。虽然设计能够玩游戏的游戏代理可能看似浪费，但这是有原因的。游戏提供了一个更简单理想化的世界，使得设计、培训和比较方法变得更容易。在这样理想化的环境/设置下学习的方法可以随后得到增强，使代理在现实世界情况下表现良好。游戏提供了一个受控良好的环境，可以更深入地研究该领域。
- en: As stated, deep reinforcement learning is a fascinating and rapidly evolving
    field, and I hope to provide you with a solid foundation to get started in your
    journey to master this field.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 正如所述，深度强化学习是一个令人着迷且快速发展的领域，我希望为你提供一个坚实的基础，以便你开始在这个领域的主修之旅。
- en: Libraries and Environment Setup
  id: totrans-100
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 库和环境设置
- en: All the code examples in this book are in Python and they use various Python
    packages/libraries, including PyTorch, TensorFlow, Gymnasium RL environments,
    Stable Baselines 3, and a few other ones. All the accompanying code has been set
    up as Jupyter notebooks to make the code execution interactive, with detailed
    explanations accompanying the code. Jupyter Notebook is a great way to mix the
    code and explanations with rich format. There are many ways to set up the environment
    and I will talk about a few common ways with step-by-step instructions. Note that
    the code is self-contained and can be run in any type of Python environment, local
    or cloud.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 本书中的所有代码示例都是Python编写的，并使用了各种Python包/库，包括PyTorch、TensorFlow、Gymnasium RL环境、Stable
    Baselines 3以及一些其他库。所有配套代码都已设置为Jupyter笔记本，以便代码执行具有交互性，并伴随详细的代码解释。Jupyter Notebook是一种将代码和解释与丰富格式混合的绝佳方式。有许多设置环境的方法，我将介绍几种常见方法，并提供逐步说明。请注意，代码是自包含的，可以在任何类型的Python环境中运行，无论是本地还是云上。
- en: As the book covers quite a few variations, readers should be able to use these
    instructions as guidance to set up code execution environments on other platforms
    of their choice. However, unless there is a reason, I suggest you choose one of
    the two recommended ways to go about setting it up—either a local environment
    or cloud-based Google Colab. Most of the notebooks have been designed to run on
    a local computer with just CPU. To leverage GPUs, you may need to do some platform-specific
    installs and make some minor code changes in relevant notebooks requiring GPU
    processing.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 由于本书涵盖了相当多的变体，读者应该能够使用这些说明作为指导，在其他平台设置代码执行环境。然而，除非有特殊原因，我建议您选择两种推荐方法之一来设置环境——要么是本地环境，要么是基于云的Google
    Colab。大多数笔记本都设计为在仅使用CPU的本地计算机上运行。要利用GPU，您可能需要进行一些特定平台的安装，并在需要GPU处理的相应笔记本中进行一些小的代码修改。
- en: Local Install (Recommended for a Local Option)
  id: totrans-103
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 本地安装（推荐用于本地选项）
- en: 'I first walk through the steps required for a local installation. This is the
    preferred approach for running the code locally. Follow these steps:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 我首先介绍本地安装所需的步骤。这是在本地运行代码的首选方法。按照以下步骤操作：
- en: I recommend Python version 3.9, as the code has been tested on this specific
    version of Python. Having said that, the code should work on most of the recent
    Python versions, including 3.10 and 3.11.
  id: totrans-105
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我推荐使用Python 3.9版本，因为代码已经在该特定版本的Python上进行了测试。话虽如此，代码应该能在大多数最新的Python版本上运行，包括3.10和3.11。
- en: On a Windows machine, I recommend using the WSL2-based Ubuntu distribution.
    On a Mac or Linux (especially the latest Ubuntu distributions), you should already
    have everything ready. If you are new to WSL2, refer to the [`https://learn.microsoft.com/en-us/windows/wsl/install`](https://learn.microsoft.com/en-us/windows/wsl/install)
    link to get it ready. All the code in the book has been tested using WSL2 with
    Ubuntu 22.04\. It should also work flawlessly on most other versions of Linux.
  id: totrans-106
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在Windows机器上，我推荐使用基于WSL2的Ubuntu发行版。在Mac或Linux（尤其是最新的Ubuntu发行版）上，您应该已经一切准备就绪。如果您是WSL2的新手，请参考[https://learn.microsoft.com/en-us/windows/wsl/install](https://learn.microsoft.com/en-us/windows/wsl/install)链接来准备它。书中所有的代码都是使用WSL2和Ubuntu
    22.04测试的。它也应该在其他大多数Linux版本上运行得非常流畅。
- en: Having identified the platform on which you will set up the local environment,
    the next step is to install a specific version of Python. This section explains
    two approaches. One is creating a virtual environment based on `venv`, the approach
    I take in the book. The other one is to set up a Miniconda-based virtual environment.
    Step 3 walks you through the `venv` setup and Step 4 details the `miniconda` based
    setup.
  id: totrans-107
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定了您将设置本地环境的平台后，下一步是安装特定版本的Python。本节解释了两种方法。一种是基于`venv`创建虚拟环境，这是我在书中采用的方法。另一种是基于Miniconda设置虚拟环境。第3步将指导您进行`venv`设置，第4步将详细介绍基于`miniconda`的设置。
- en: '`VENV`-based virtual environment: On Windows WSL and Ubuntu, you can use the
    `apt-get` command on your WSL2/Ubuntu shell to install the specific version of
    Python, 3.9.x in this case. Run the following set of commands to do so:'
  id: totrans-108
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 基于`VENV`的虚拟环境：在Windows WSL和Ubuntu上，您可以在WSL2/Ubuntu shell中使用`apt-get`命令安装特定版本的Python，在本例中为3.9.x。运行以下命令集来完成此操作：
- en: '[PRE0]'
  id: totrans-109
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Next, create and activate a virtual environment based on Python 3.9 using the
    following commands:'
  id: totrans-110
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 接下来，使用以下命令创建并激活基于Python 3.9的虚拟环境：
- en: '[PRE1]'
  id: totrans-111
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'At this point, the prompt in the shell window should show (`drl`) as a prefix
    on the command line. You can check the version of Python installed by using the
    following command on the shell prompt: `python -V`. It should print something
    like: `Python 3.9.18` with “18” in the end replaced with the latest sub-version
    3.9 has at the point in time you do the installation. You can also check the pip
    version with the command: `pip3 --version`. This should print the version number
    of whatever pip is linked in your virtual environment that you just installed.'
  id: totrans-112
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: To deactivate the virtual environment, you can use the `deactivate` command,
    which will deactivate the virtual environment and return you back to the original
    system default version of Python. Do not do this right now, as you need to be
    in the activate Python3.9.x version to follow the remaining steps of the installation.
  id: totrans-113
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: At this point, you can move to Step 5\. Step 4 uses Conda environment management
    to install a specific Python version and creates an isolated environment for the
    execution of code in this book.
  id: totrans-114
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Make sure that all the commands that I ask you to run in the upcoming steps
    are carried out in the same terminal where you activated the new `venv` environment.
  id: totrans-115
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Conda-based environment: Conda provides package dependency and environment
    management for any language. You can visit the [`https://conda.io/projects/conda/en/latest/index.html`](https://conda.io/projects/conda/en/latest/index.html)
    link for more details on what problem Conda solves, as well as its advantages
    and disadvantages. This section works through the steps for installing Conda on
    WSL2/UNIX. The links also have specific instructions for installing the same on
    macOS, both in the native way or with the help of Homebrew, a popular package
    manager for macOS.'
  id: totrans-116
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Visit [`https://docs.conda.io/en/latest/miniconda.html`](https://docs.conda.io/en/latest/miniconda.html)
    and download the Miniconda install for your platform. Choose the latest Python3.x
    version. If you already have Anaconda or Miniconda installed, you can skip this
    step. Run the downloaded program to install Miniconda on your local machine.
  id: totrans-117
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Next, create a specific environment with Python3.9 version. Open a shell window
    using the following command:'
  id: totrans-118
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-119
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE2]'
- en: where `drl` is the name of the environment. Answer Yes to all the prompts.
  id: totrans-120
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Switch to the new environment you created using the following command:'
  id: totrans-121
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-122
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Make sure that all the commands that I ask you to run in the upcoming steps
    are carried out in the same terminal where you activated the new Conda environment.
  id: totrans-123
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Having installed a specific Python version, you can continue to Step 5.
  id: totrans-124
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: With `venv` (Step 3) or Conda (Step 4) activated, follow along to complete the
    rest of the steps. Create a local folder and download or clone the source code
    provided in the links to the book. A mirror repository maintained by the author
    with the latest updates can be found at [`https://github.com/nsanghi/drl-2ed`](https://github.com/nsanghi/drl-2ed).
  id: totrans-125
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Change the directory (`cd`) to the newly created local folder and run the following
    command to make a local copy of the source code accompanying the book:'
  id: totrans-126
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 将目录（`cd`）更改为新创建的本地文件夹，并运行以下命令以制作与书籍配套的源代码的本地副本：
- en: '[PRE4]'
  id: totrans-127
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: This command will create another subfolder named `drl-2ed` in the current folder
    where you ran the command. You can also visit the publisher’s source code link
    to clone the repository or download and unzip the code.
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 此命令将在您运行命令的当前文件夹中创建一个名为 `drl-2ed` 的子文件夹。您还可以访问出版商的源代码链接以克隆存储库或下载并解压代码。
- en: 'Setting up the dependencies: You are now ready to install all the required
    libraries with the help of two commands, as follows:'
  id: totrans-129
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 设置依赖项：您现在可以使用以下两个命令安装所有必需的库：
- en: '[PRE5]'
  id: totrans-130
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE5]'
- en: These commands install the required system packages, which are required by some
    of the Python packages you will be installing next. On macOS, I recommend using
    the `brew` command from Homebrew to install these packages.
  id: totrans-131
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这些命令安装所需的系统包，这些包是您接下来将要安装的一些Python包所必需的。在macOS上，我建议使用Homebrew的 `brew` 命令来安装这些包。
- en: '[PRE6]'
  id: totrans-132
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Next, install the required Python packages. These have been provided as a `requirements.txt`
    file, which is a preferred and reproducible way to share environments in the Python
    ecosystem. Make sure that you are currently in the `drl-2ed` sub-folder, which
    was created with the `git clone` command or the `copy` and `unzip` commands in
    Step 5\. Once you have confirmed the same, you can run the following command to
    install all the required dependencies. Note that it may take five to ten minutes
    for the installation to finish. Time for you to grab a cup of coffee while the
    installation finishes.
  id: totrans-133
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 接下来，安装所需的Python包。这些包已作为 `requirements.txt` 文件提供，这是在Python生态系统中共享环境的首选且可重复的方式。确保您目前位于
    `drl-2ed` 子文件夹中，该文件夹是通过 `git clone` 命令或步骤5中的 `copy` 和 `unzip` 命令创建的。一旦确认无误，您就可以运行以下命令来安装所有必需的依赖项。请注意，安装可能需要五到十分钟。您可以在安装完成时喝杯咖啡。
- en: '[PRE7]'
  id: totrans-134
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE7]'
- en: On macOS if you face installation or build errors while running the above command,
    please run “pip install --use-pep517pymunk” and then rerun the above command.
    After this command is executed and completed, you have everything required to
    explore and execute the code.
  id: totrans-135
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在macOS上，如果您在运行上述命令时遇到安装或构建错误，请运行“pip install --use-pep517pymunk”，然后重新运行上述命令。在此命令执行并完成后，您将拥有探索和执行代码所需的一切。
- en: Steps 1 to 6 need to be run only once. After the initial installation, you do
    not need to run these again unless you want to do a reinstall.
  id: totrans-136
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 步骤1到6只需运行一次。在初始安装后，除非您想重新安装，否则不需要再次运行这些步骤。
- en: As part of the Python installation, you have also installed the JupyterLab package.
    JupyterLab is the latest web-based interactive development environment for notebooks,
    code, and data. Its flexible interface allows users to configure and arrange workflows
    in data science, scientific computing, computational journalism, and machine learning.
    You can use JupyterLab interface to open a notebook or even a command shell.
  id: totrans-137
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 作为Python安装的一部分，您还安装了JupyterLab包。JupyterLab是最新基于网络的交互式开发环境，用于笔记本、代码和数据。其灵活的界面允许用户配置和安排数据科学、科学计算、计算新闻学和机器学习中的工作流程。您可以使用JupyterLab界面打开一个笔记本，甚至是一个命令行。
- en: 'Make sure that your `venv` or Conda environment is active and you are currently
    inside the `drl-2ed` directory, where you cloned/copied the code. You can now
    start the JupyterLab session with this command:'
  id: totrans-138
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 确保您的 `venv` 或Conda环境处于活动状态，并且您目前位于 `drl-2ed` 目录中，您在该目录中克隆/复制了代码。您现在可以使用此命令启动JupyterLab会话：
- en: '[PRE8]'
  id: totrans-139
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'It will start the Jupyter session and will print the following instructions
    somewhere in the middle of the output created by this command:'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 它将启动Jupyter会话，并在该命令生成的输出中间某处打印以下指令：
- en: '[PRE9]'
  id: totrans-141
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Click any of the links to open your default browser. You should see a page similar
    to the one in Figure [1-2](#Fig2). You may navigate to any of the chapter specific
    folders and double-click the specific notebooks (files with the `.ipynb` extension)
    to open them. You are ready to follow the notebook instructions and code execution.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 点击任何链接以打开您的默认浏览器。您应该会看到一个类似于图[1-2](#Fig2)的页面。您可以导航到任何特定章节的文件夹，并双击具有 `.ipynb`
    扩展名的特定笔记本（文件）以打开它们。您现在可以遵循笔记本说明和代码执行。
- en: '![](../images/502835_2_En_1_Chapter/502835_2_En_1_Fig2_HTML.jpg)'
  id: totrans-143
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_1_Chapter/502835_2_En_1_Fig2_HTML.jpg)'
- en: A screenshot of the Jupyter lab landing page. The menu bar consists of file,
    edit, view, run, kernel, tabs, settings, and help. The + symbol is selected below
    the menu bar, filter files by names search box is displayed on the left. The launcher
    consists of notebook Python 3 and console Python 3 icons on the right.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-2
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
- en: JupyterLab landing page
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
- en: Local Install with VS Code
  id: totrans-147
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'If you want to use VS Code, you can still follow all the steps for “local Install”
    and then use VS Code to open, run, and execute the notebooks. It provides a similar
    experience to a local install, but with some additional capabilities. You may
    also use this if you prefer to use the richer GUI experience VS Code offers and
    if VS Code is already a part of your developer experience. The high-level steps
    to follow are as follows:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_1_Chapter/502835_2_En_1_Fig3_HTML.jpg)'
  id: totrans-149
  prefs: []
  type: TYPE_IMG
- en: A screenshot of the Ubuntu page. The menu bar consists of file, edit, selection,
    view, go, and run. The welcome option is selected under the open editors from
    the explorer. The welcome screen consists of the start and recent files. The walkthrough
    options are on the right. The reopen in container tab is selected.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-3
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
- en: Opening in VS Code
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
- en: Install VS Code on your local machine. Refer to the [`https://code.visualstudio.com/`](https://code.visualstudio.com/)
    link for detailed setup instructions.
  id: totrans-153
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Next, you need to enable a few plugins for Python: Python, Python Debugger,
    PyLance, Jupyter, Jupyter Notebook Renderers and Jupyter Keymap, Jupyter Cell
    Tags, and Jupyter Slide Show. Some of these are optional but installing all of
    them will give you a richer experience. You can read through each individual plugin
    and decide which ones you want to skip.'
  id: totrans-154
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Navigate to the `drl-2ed` directory where you cloned/downloaded the source
    code. Run the following command:'
  id: totrans-155
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE10]'
  id: totrans-156
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Do not forget the period (`.`) at the end of the command. This command instructs
    the system to open VS Code in the current folder.
  id: totrans-157
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: You may see a popup in the bottom-right corner with the message “Folder contains
    Dev Container configuration file. Reopen folder to develop in a container”. **Do
    not click the** “Reopen in Container” button. Instead click the cross at the top
    right of the popup to close it. See Figure [1-3](#Fig3).
  id: totrans-158
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_1_Chapter/502835_2_En_1_Fig4_HTML.jpg)'
  id: totrans-159
  prefs: []
  type: TYPE_IMG
- en: A screenshot of the Python environment screen. The menu bar consists of file,
    edit, selection, view, go, and run. The welcome option is selected under the open
    editors from the explorer. The Python select interpreter is selected from the
    recently used. The walkthrough options are on the right.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-4
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
- en: Selecting the Python environment in VS Code
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, press Control+Shift+P or Command+Shift+P to open the command palette
    in VS Code and type **Python** to see a list of commands applicable to Python
    in VS Code. Choose the “Python: Select Interpreter” option, as shown in Figure
    [1-4](#Fig4).'
  id: totrans-163
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: It will show all the Python environments found in your system. Choose the `venv`
    or Conda environment you created for the local install. Either you will find this
    option listed in the command palette or you can add it using the “Enter Interpreter
    Path…” option.
  id: totrans-164
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_1_Chapter/502835_2_En_1_Fig5_HTML.jpg)'
  id: totrans-165
  prefs: []
  type: TYPE_IMG
- en: A screenshot of the Python environment screen. The menu bar consists of file,
    edit, selection, view, go, and run. The Z e R L Zoo chapter 2 option is selected
    under open editors from Explorer. Using R L Zoo baselines 3 and running in Colab
    or Kaggle screen is displayed.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-5
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
- en: Selecting the Notebook Kernel in VS Code
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
- en: You may now open any notebook. At times, even after you have chosen the Python
    environment in the previous step, you again may need to select the same environment
    once more as the notebook kernel, before you can execute the code in the notebook.
    You will find that option on the top-right side of the notebook; it’s called “Select
    Kernel”. Click this and select the same Python environment that you created for
    the local install and the one you selected for the Python Interpreter in Step
    5\. See Figure [1-5](#Fig5).
  id: totrans-169
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You are ready to explore the notebooks and execute the code cells contained
    in Jupyter Notebook.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
- en: Running on Google Colab (Recommended for a Cloud Option)
  id: totrans-171
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Google Colab is a free online platform that allows you to write and run Python
    code in your browser. It is based on Jupyter Notebook. Google Colab provides some
    advantages over Jupyter Notebook, such as:'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
- en: You can access Google Colab from any device with an Internet connection, without
    installing anything on your local machine.
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can use the computing power of Google’s servers, including GPUs and TPUs,
    to speed up your code execution and save resources on your own device.
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can easily share your notebooks with others and collaborate on them in real
    time.
  id: totrans-175
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can integrate your notebooks with Google Drive and other Google services,
    such as Google Sheets, Google Forms, and Google Maps.
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To use Google Colab, you need a Google account and a web browser. You can create
    a new notebook by visiting [`https://colab.research.google.com/`](https://colab.research.google.com/)
    or opening an existing notebook from Google Drive. You can also upload a notebook
    file from your local machine or import one from GitHub or other sources. Once
    you have a notebook open, you can write and execute code cells, add text and images,
    and use various tools and features provided by Google Colab. You can also customize
    your notebook settings, such as the runtime type, the theme, and the keyboard
    shortcuts.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
- en: 'This book uses the GitHub option to directly open notebooks from the GitHub
    repository. It is just a matter of personal preference. If you have cloned the
    source code repository in GitHub to your GitHub account, you will also be able
    to make changes and issue commits to your repo, thus giving you a seamless developer
    experience without any local install on your computer. Here are the steps:'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 本书使用 GitHub 选项直接从 GitHub 仓库打开笔记本。这只是一种个人偏好。如果您已将源代码仓库克隆到您的 GitHub 账户中，您也将能够对您的仓库进行更改和提交，从而在您的计算机上无需任何本地安装即可获得无缝的开发者体验。以下是步骤：
- en: '![](../images/502835_2_En_1_Chapter/502835_2_En_1_Fig6_HTML.jpg)'
  id: totrans-179
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/502835_2_En_1_Chapter/502835_2_En_1_Fig6_HTML.jpg)'
- en: A screenshot of Google Colab. The open notebook screen is displayed. It consists
    of examples, recent, Google Drive, git hub, and upload. The left bottom consists
    of a button to add a new notebook.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: Google Colab 的屏幕截图。显示打开笔记本的屏幕。它包括示例、最近、Google Drive、GitHub 和上传。左下角有一个按钮用于添加新的笔记本。
- en: Figure 1-6
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-6
- en: Selecting the repository and notebook in Google Colab
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Google Colab 中选择仓库和笔记本
- en: Navigate to [`https://colab.research.google.com/`](https://colab.research.google.com/),
    which will open the web page with a dialog box giving you various options to open
    a notebook. For the current workflow, choose the GitHub option.
  id: totrans-183
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到 [`https://colab.research.google.com/`](https://colab.research.google.com/)，这将打开包含各种选项以打开笔记本的对话框。对于当前工作流程，请选择
    GitHub 选项。
- en: If this is the first time you are using GitHub from inside the Colaboratory
    (Google Colab), clicking the GitHub option will take you through an OAuth workflow
    to grant Google Colab access to your GitHub account.
  id: totrans-184
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果这是您第一次在 Colaboratory（Google Colab）内部使用 GitHub，点击 GitHub 选项将引导您通过 OAuth 工作流程以授予
    Google Colab 访问您的 GitHub 账户的权限。
- en: After the authentication is done and Google Colab is connected to your GitHub
    account, you can use the dialog box to open a specific notebook of interest or
    you can directly type the URL of the GitHub account housing the repository, such
    as [`https://github.com/nsanghi/`](https://github.com/nsanghi/).
  id: totrans-185
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 完成身份验证并将 Google Colab 连接到您的 GitHub 账户后，您可以使用对话框打开感兴趣的特定笔记本，或者您可以直接输入存放仓库的 GitHub
    账户的 URL，例如 [`https://github.com/nsanghi/`](https://github.com/nsanghi/)。
- en: Click the repository dropdown to navigate to the repository. Keep the branch
    selection to “main” or whatever else is applicable for the repository you are
    trying to open. A sample of this dialog is shown in Figure [1-6](#Fig6).
  id: totrans-186
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击仓库下拉菜单以导航到仓库。保持分支选择为“main”或适用于您要打开的仓库的任何其他选项。此对话框的示例如图 [1-6](#Fig6) 所示。
- en: '![](../images/502835_2_En_1_Chapter/502835_2_En_1_Fig7_HTML.jpg)'
  id: totrans-187
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/502835_2_En_1_Chapter/502835_2_En_1_Fig7_HTML.jpg)'
- en: A screenshot of Google Colab. The running in Colab or Kaggle screen displays
    the run comment and execution of the program consists of 3 and 15 lines to execute
    the cell to install all the dependencies.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: Google Colab 的屏幕截图。在 Colab 或 Kaggle 上的运行屏幕显示运行注释和执行程序，由 3 和 15 行代码组成，用于执行单元格以安装所有依赖项。
- en: Figure 1-7
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-7
- en: Running code cells for package installation in Google Colab
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Google Colab 中运行包安装的代码单元格
- en: Select the notebook, for example `chapter2/2.a-RL-envrionment.ipynb`. It will
    close the dialog and open the notebook in the browser with an interface very similar
    to JupyterLab’s. There are some Google Colab-specific enhancements, but most are
    not relevant to this case. The only thing to note is the runtime type, which you
    can choose from the “Connect” dropdown on the top-right side of the Colab web
    page.
  id: totrans-191
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择笔记本，例如 `chapter2/2.a-RL-envrionment.ipynb`。它将关闭对话框并在浏览器中打开笔记本，界面与 JupyterLab
    非常相似。有一些 Google Colab 特定的增强功能，但大多数与此案例不相关。需要注意的是运行类型，您可以从 Colab 网页右上角的“连接”下拉菜单中选择。
- en: This example mostly uses the CPU environment, as the free tier of Google Colab
    provides limited access to the GPU/TPU environment. Most of the notebooks can
    be run on a CPU environment. However, from Chapter [6](502835_2_En_6_Chapter.xhtml)
    onward, once you enter the realm of deep reinforcement learning and start training
    agents on either large text data (such as RLHF) or images (such as Atari games),
    you’ll run those notebooks with GPU enabled.
  id: totrans-192
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 此示例主要使用 CPU 环境，因为 Google Colab 的免费层对 GPU/TPU 环境的访问有限。大多数笔记本可以在 CPU 环境下运行。然而，从第
    [6](502835_2_En_6_Chapter.xhtml) 章开始，一旦您进入深度强化学习的领域并开始在大文本数据（如 RLHF）或图像（如 Atari
    游戏）上训练代理，您将使用启用 GPU 的笔记本运行这些笔记本。
- en: Google Colab comes with most of the libraries preinstalled. However, I have
    designed the notebooks so that you can run some additional commands from inside
    the notebook to install system-level packages and the required Python libraries.
    One example is the `2.e-RL-Zoo.ipynb` notebook. Open this notebook in Google Colab
    following the instructions in Step 4\. Once it is opened, you will see two code
    execution cells that have code commented out, as shown in Figure [1-7](#Fig7).
  id: totrans-193
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Google Colab预装了大多数库。然而，我设计notebooks以便您可以从notebook内部运行一些额外的命令来安装系统级软件包和所需的Python库。一个例子是`2.e-RL-Zoo.ipynb`笔记本。按照步骤4中的说明在Google
    Colab中打开此笔记本。一旦打开，您将看到两个代码执行单元格，其中代码已被注释，如图[1-7](#Fig7)所示。
- en: The first cell installs the Ubuntu system-level packages. The second cell clones
    the GitHub repository and runs the `requirements.txt` file from the cloned repository
    to install all the dependencies.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个单元格安装了Ubuntu系统级软件包。第二个单元格克隆了GitHub存储库，并从克隆的存储库中运行`requirements.txt`文件来安装所有依赖项。
- en: Uncomment and run these cells before proceeding with the notebook.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 在继续使用notebook之前，取消注释并运行这些单元格。
- en: Note that you do not need to run the commented code cells for any kind of local
    installation-based execution.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，您不需要运行任何基于本地安装执行的注释代码单元格。
- en: Running on Kaggle
  id: totrans-197
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在Kaggle上运行
- en: You can use a functionality offered by Kaggle that is similar to Google Colab.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用Kaggle提供的一种类似于Google Colab的功能。
- en: Kaggle hosts data science and machine learning competitions, where you can find
    and explore various datasets, learn new skills, and share your solutions with
    other users. Kaggle also provides a cloud-based service called Kaggle Kernel,
    which allows you to run notebooks online without installing anything on your local
    machine. You can use Kaggle Kernel to access the datasets from the competitions,
    run code in Python or R, and publish your results as interactive web pages. Kaggle
    Kernel is a convenient way to experiment with different models and techniques,
    collaborate with other users, and showcase your work. You can also fork and edit
    existing notebooks from other users and use them as a starting point for your
    own projects.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: Kaggle托管数据科学和机器学习竞赛，您可以在那里找到并探索各种数据集，学习新技能，并与其他用户分享您的解决方案。Kaggle还提供了一种名为Kaggle
    Kernel的基于云的服务，允许您在线运行notebooks而无需在本地机器上安装任何东西。您可以使用Kaggle Kernel访问竞赛中的数据集，用Python或R运行代码，并将您的结果发布为交互式网页。Kaggle
    Kernel是实验不同模型和技术、与其他用户协作以及展示您工作的便捷方式。您还可以从其他用户那里fork和编辑现有的notebooks，并将它们作为您自己项目的起点。
- en: Running the notebook from this book on Kaggle is pretty similar to the way you
    run it on Google Colab. You can read more about it in the Kaggle documentation
    and try this out.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 在Kaggle上运行本书中的notebook与在Google Colab上运行的方式非常相似。您可以在Kaggle文档中了解更多相关信息，并尝试一下。
- en: Using devcontainer-Based Environments
  id: totrans-201
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用基于devcontainer的环境
- en: Another way to run notebooks is to use *devcontainer*, which stands for development
    container. A `.devcontainer` is a folder in a repository that contains a Docker
    file and a configuration file that specifies the tools and settings for a development
    environment. You can use `.devcontainer` to create a consistent and reproducible
    workspace that can run on any machine that supports Docker and Visual Studio Code
    (VS Code).
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 运行notebooks的另一种方式是使用*devcontainer*，它代表开发容器。一个`.devcontainer`是一个存储库中的文件夹，其中包含一个Docker文件和一个配置文件，该文件指定了开发环境所需的工具和设置。您可以使用`.devcontainer`创建一个一致且可重复的工作空间，该工作空间可以在支持Docker和Visual
    Studio Code (VS Code)的任何机器上运行。
- en: To use devcontainer, you need to have Docker and VS Code installed on your local
    machine or cloud service. You also need to install the Remote Development extension
    pack for VS Code, which enables you to work with remote environments. Then, you
    can find a repository that has a `.devcontainer` folder, which indicates that
    it supports devcontainer.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用devcontainer，您需要在本地机器或云服务上安装Docker和VS Code。您还需要安装VS Code的远程开发扩展包，这使您能够与远程环境一起工作。然后，您可以找到一个包含`.devcontainer`文件夹的存储库，这表明它支持devcontainer。
- en: Once you have a devcontainer repository, you can clone it to your local machine
    or cloud service and open it with VS Code. VS Code will detect the `.devcontainer`
    folder and prompt you to reopen the folder in a container. This will build the
    Docker image and launch the container with the specified tools and settings. You
    can then open the notebook file and run it inside the container. You can also
    modify the code and push the changes back to the repository.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦您有了devcontainer仓库，您可以将它克隆到您的本地机器或云服务中，并用VS Code打开它。VS Code将检测到`.devcontainer`文件夹，并提示您在容器中重新打开文件夹。这将构建Docker镜像并启动带有指定工具和设置的容器。然后您可以在容器中打开笔记本文件并运行它。您还可以修改代码并将更改推送到仓库。
- en: Using devcontainer is a convenient way to work with notebooks that require specific
    dependencies or configurations, without affecting your local machine or cloud
    service. You can also share your devcontainer setup with other users and ensure
    that they have the same development environment as you. Devcontainer is a useful
    feature for collaborating and deploying code. You can read more about it in the
    VS Code documentation and try it out.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 使用devcontainer是一种方便的方式，可以处理需要特定依赖项或配置的笔记本，而不会影响您的本地机器或云服务。您还可以与其他用户共享您的devcontainer设置，并确保他们拥有与您相同的开发环境。Devcontainer是协作和部署代码的有用功能。您可以在VS
    Code文档中了解更多关于它的信息，并尝试使用它。
- en: The source code repository for this book has this capability enabled. This section
    looks at two ways to use this. One is using a local system, and another is using
    GitHub’s Codespaces, which provides a cloud environment to run code.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 本书源代码库已启用此功能。本节将探讨两种使用方法。一种是使用本地系统，另一种是使用GitHub的Codespaces，它提供了一个云环境来运行代码。
- en: Running devcontainer Locally
  id: totrans-207
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 本地运行devcontainer
- en: 'As discussed previously, you need to have Docker and VS Code installed locally
    on your machine. To install Docker, head over to the [`https://www.docker.com/products/docker-desktop/`](https://www.docker.com/products/docker-desktop/)
    link and install the Docker Desktop version for your system. Download and run
    the binary for your platform and follow all the prompts, choosing the recommended/default
    options. VS Code can be installed from [`https://code.visualstudio.com/`](https://code.visualstudio.com/).
    Once VS Code is installed, also install the Remote Development extension pack
    for VS Code. After these steps, your local machine will be ready for local deployment
    of a Docker container. The advantage of this approach is that your development
    environment is housed in a Docker container, completely isolating your development
    environment from your local machine. Regardless of your local machine’s operating
    system, the code will run the same Docker configuration—in this case, it’s a Ubuntu
    image with all the required dependencies. The following steps walk through downloading
    the source code and running it locally:'
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，您需要在您的机器上本地安装Docker和VS Code。要安装Docker，请访问[`https://www.docker.com/products/docker-desktop/`](https://www.docker.com/products/docker-desktop/)链接，并安装适用于您系统的Docker
    Desktop版本。下载并运行您平台的二进制文件，并按照所有提示操作，选择推荐/默认选项。可以从[`https://code.visualstudio.com/`](https://code.visualstudio.com/)安装VS
    Code。一旦安装了VS Code，也请安装VS Code的远程开发扩展包。完成这些步骤后，您的本地机器将准备好本地部署Docker容器。这种方法的优势是您的开发环境位于Docker容器中，完全隔离了您的开发环境与本地机器。无论您的本地机器的操作系统如何，代码都将运行相同的Docker配置——在这种情况下，是一个包含所有必需依赖项的Ubuntu镜像。以下步骤将指导您下载源代码并在本地运行：
- en: '![](../images/502835_2_En_1_Chapter/502835_2_En_1_Fig8_HTML.jpg)'
  id: totrans-209
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_1_Chapter/502835_2_En_1_Fig8_HTML.jpg)'
- en: A screenshot of the docker container. The menu bar consists of file, edit, selection,
    view, go, and run. The chapter 2 option is selected under open editors from Explorer.
    Show all commands, go to file, find in the filter, toggle full screen, and show
    settings options at the right bottom of the screen.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: Docker容器的截图。菜单栏包括文件、编辑、选择、查看、转到和运行。在资源管理器中的打开编辑器下选中了第2章选项。显示所有命令、转到文件、在过滤器中查找、切换全屏，并在屏幕右下角显示设置选项。
- en: Figure 1-8
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-8
- en: Running in a Docker container
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 在Docker容器中运行
- en: Navigate to a folder of your choice on the local machine. If you are on a Windows
    machine, you can choose the WSL2 or Windows subsystem.
  id: totrans-213
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到本地机器上您选择的文件夹。如果您使用的是Windows机器，可以选择WSL2或Windows子系统。
- en: 'Clone the source code repository locally with this command:'
  id: totrans-214
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用此命令在本地克隆源代码库：
- en: '[PRE11]'
  id: totrans-215
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE11]'
- en: This command will create another subfolder named `drl-2ed` in the current folder
    where you ran this command. You can also visit the publisher’s source code link
    to clone the repository or download and unzip the code.
  id: totrans-216
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Navigate to the `drl-2ed` folder created with the `git` command and run VS
    Code from there with this command:'
  id: totrans-217
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE12]'
  id: totrans-218
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Do not forget the period (`.`) at the end of the command. This command instructs
    the system to open VS Code in the current folder.
  id: totrans-219
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: You may see a popup in the right corner with the message “Folder contains Dev
    Container configuration file. Reopen folder to develop in a container”. Click
    the “Reopen in Container” button to kick in the Docker build. It will use the
    development environment image specified inside the `.devcontainer` folder of the
    repository to create and start the Docker container. This is opposite of the instructions
    you had when running on VS Code locally, where you did not click the “Reopen in
    Container” button.
  id: totrans-220
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The first time you do this, it has to download the Docker image as well as install
    the required Ubuntu packages and run the `pip install requirements.txt` command
    to set up the Python environment. It may take a while—say about ten minutes or
    so to run the whole setup process. It will save the final Docker container locally
    and make it visible in your Docker desktop.
  id: totrans-221
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: The subsequent runs will be very fast, as they will use the saved Docker container.
    If you need to do a rebuild of the Docker environment, the VS Code command palette
    has options to do so.
  id: totrans-222
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'When the code is opened in a .`devcontainer` specified Docker image, you will
    see a status like “Dev Container: Python 3” in the bottom-left side of the VS
    Code, as shown in Figure [1-8](#Fig8). This confirms that you are now working
    inside a Docker-based dev container.'
  id: totrans-223
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_1_Chapter/502835_2_En_1_Fig9_HTML.jpg)'
  id: totrans-224
  prefs: []
  type: TYPE_IMG
- en: A screenshot of the docket container. The menu bar consists of file, edit, selection,
    view, go, and run. The chapter 2 folder is selected under open editors from Explorer.
    The shortcuts to show all commands, go to file, find in files, toggle full screen,
    and show settings options are on the right.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-9
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
- en: Selecting the Python environment in VS Code
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, press Control+Shift+P or Command+Shift+P to open the command palette
    in VS Code and type **Python** to see a list of commands for Python in VS Code.
    Choose the “Python: Select Interpreter” option, as shown in Figure [1-9](#Fig9).
    This time the Python Interpreter options will be different. Choose the Python
    3.9.18 version, as highlighted in Figure [1-9](#Fig9).'
  id: totrans-228
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You can open any notebook. You again may need to select the same environment
    as the notebook kernel before you can execute the code in the notebook. You will
    find that option on the top-right side of the notebook; it’s called “Select Kernel”.
    Click this and select the same Python environment with Python 3.9.18.
  id: totrans-229
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You can now execute the code just as you would in a JupyterLab environment.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
- en: Running on GitHub Codespaces
  id: totrans-231
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'GitHub Codespaces is a cloud-based development environment that allows you
    to create, edit, and run code from any device. You can access your codespaces
    from Visual Studio Code, a browser-based editor, or github.com. GitHub Codespaces
    integrates seamlessly with GitHub features, such as pull requests, issues, actions,
    and packages. You can also customize your codespaces with your own dotfiles, extensions,
    and settings. The key advantages of using something like Codespaces are:'
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
- en: You can start coding quickly without setting up a local environment or installing
    dependencies.
  id: totrans-233
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can work on multiple projects and switch between them easily without cluttering
    your machine.
  id: totrans-234
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can collaborate with others in real time and share your codespaces with
    teammates or contributors.
  id: totrans-235
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can use the same tools and workflows that you are familiar with, such as
    VS Code, Git, and terminal.
  id: totrans-236
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can leverage the power and scalability of the cloud and run your code on
    fast and secure servers.
  id: totrans-237
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'You can start with Codespaces on the free tier, which will get you 60 hours
    per month of two-core machines. Here are the steps involved in using Codespaces:'
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_1_Chapter/502835_2_En_1_Fig10_HTML.jpg)'
  id: totrans-239
  prefs: []
  type: TYPE_IMG
- en: A screenshot of Git Hub code spaces screen. The menu bar consists of codes,
    issues, pull requests, actions, projects, wiki, security, insights, and settings.
    Chapter 2 tested screen is open. The code option is selected and the create code
    space on the main is highlighted.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-10
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
- en: Setting up GitHub Codespaces
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to the repository, for example, [`https://github.com/nsanghi/drl-2ed/`](https://github.com/nsanghi/drl-2ed/).
  id: totrans-243
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Make sure you are logged into your GitHub account and click the dropdown arrow
    next to the blue “Code” button. Next, click the “Create Codespace on Main” button,
    as shown in Figure [1-10](#Fig10). This will open a new tab and start setting
    up Codespaces using the Docker container specifications provided in the `.devcontainer`
    folder of the repository.
  id: totrans-244
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_1_Chapter/502835_2_En_1_Fig11_HTML.jpg)'
  id: totrans-245
  prefs: []
  type: TYPE_IMG
- en: A screenshot of the Git Hub code spaces screen. The menu bar consists of codes,
    issues, pull requests, actions, projects, wiki, security, insights, and settings.
    Chapter 2 tested screen is open. The code option is selected. It consists of code
    space and an effective lamp.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-11
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
- en: Setting up GitHub Codespaces
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
- en: Once the container is set up, it will open the repository in a cloud version
    of VS Code and run the pip install to install all the Python packages. Like the
    local Docker container setup, the first time this is set up on Codespaces, it
    may take about five to ten mins. However, subsequent runs will be faster, as it
    will reuse the cloud-saved Docker container it created during the first run.
  id: totrans-249
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Similar to the option of running on a local Docker, you need to select the right
    Python Interpreter with Python 3.9.18, as shown in Figure [1-9](#Fig9). You also
    need to select the same Python version as the kernel while running the notebooks.
  id: totrans-250
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You are now ready to run the code on GitHub Codespaces. This option gives you
    a full developer experience without any local install.
  id: totrans-251
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Because the Docker image is stored in Codespaces and is tied to your GitHub
    account, the next time you visit the GitHub repository and click the dropdown
    next to the “Code” button, you will see the previously created codespace, as shown
    in Figure [1-11](#Fig11). You can use that codespace to run the code in subsequent
    visits. It will use the saved Docker container and, in a matter of seconds, get
    your environment running.
  id: totrans-252
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You can click the three dots on the right side of the container name and open
    the codespace container. You can also use the menu to open the cloud-hosted codespace
    container inside your local VS Code.
  id: totrans-253
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Running on AWS Studio Lab
  id: totrans-254
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: AWS Studio Lab is a free tier version from AWS and can be used as an alternative
    to Google Colab. It provides you with certain hours of free CPU and GPU access.
    You need to create an account by navigating to the [`https://studiolab.sagemaker.aws/`](https://studiolab.sagemaker.aws/)
    link.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
- en: 'Once you have created the account and logged in, you can clone the GitHub repository,
    create a Conda environment, and run the setup to install the Ubuntu packages as
    well as the Python libraries specified in the `requirements.txt` file. The steps
    involved are as follows:'
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
- en: Once you are logged in, click the “Start Runtime” button to start a Jupyter
    instance.
  id: totrans-257
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: After the runtime is running, click the “Open Project” circle button. This will
    open a new tab with the JupyterLab interface.
  id: totrans-258
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Next you need to clone the repository. You can open a terminal from the JupyterLab
    interface or choose the Git ➤ Clone Git Repository menu option. Follow the instructions
    given in the dialog box to complete this step.
  id: totrans-259
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The next step is to create the Conda environment with Python 3.9, install the
    Ubuntu packages, and run the pip install. First open a terminal from the JupyterLab
    interface and run these commands:'
  id: totrans-260
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE13]'
  id: totrans-261
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE13]'
- en: You can now open any of the notebooks from the explorer on the left side. When
    presented with the option to choose the kernel, choose `drl`, which is the Conda
    environment created in a previous step. If you do not see the option, you may
    need to choose the Amazon SageMaker Studio Lab ➤ Restart JupyterLab menu option.
  id: totrans-262
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: After selecting the right kernel, you may start executing the notebook code
    cells. The Conda environment you created persists between sessions, making subsequent
    runs very fast.
  id: totrans-263
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Using SageMaker Studio Lab allows you to run the code on-cloud, just like a
    few other options I have talked about in earlier sections. It requires no local
    install at all. Figure [1-12](#Fig12) shows a screenshot of AWS Studio Lab in
    action.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_1_Chapter/502835_2_En_1_Fig12_HTML.jpg)'
  id: totrans-265
  prefs: []
  type: TYPE_IMG
- en: A screenshot of Amazon Sage Maker Studio Lab. The menu bar consists of file,
    edit, view, run, kernel, git, tabs, settings, and help. The screen displays the
    Using R L Zoo Baseline 3\. The d r l python is selected from the select Kernel.
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-12
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
- en: AWS Studio Lab
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
- en: Running Using Lightning.ai
  id: totrans-269
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Lightning AI Studio ([`https://lightning.ai/`](https://lightning.ai/)) is a
    cloud-based AI development platform (similar to Google Colab and Amazon Sage maker
    Studio Lab) that aims to eliminate the hassle of setting up local environments
    for machine learning projects. Some key features of Lightning AI Studio include:'
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
- en: It integrates popular machine learning tools into a single interface. This allows
    you to build scalable AI apps and endpoints more easily.
  id: totrans-271
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There is no environment setup required. You can code in the browser or connect
    your local IDE (VS Code or PyCharm). You can also easily switch between CPU and
    GPU with no environment changes.
  id: totrans-272
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It allows you to host and share AI apps built with Streamlit, Gradio, React
    JS, and so on. It also enables multi-user collaboration by coding together.
  id: totrans-273
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It provides unlimited storage and the ability to upload and share files as well
    as connect S3 buckets.
  id: totrans-274
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It enables training models at a massive scale using thousands of GPUs under
    paid plans.
  id: totrans-275
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There is a growing list of community templates (Studios) ready for different
    use cases and different models, which can act as your starting point.
  id: totrans-276
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Here are the high-level steps to run code on Lightning.ai studio:'
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
- en: First go the [`https://lightning.ai/`](https://lightning.ai/) link and sign
    up.
  id: totrans-278
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Next click the “New Studio” button on the top right, choose the defaults on
    the prompt, and then click “Start”.
  id: totrans-279
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Once a studio starts, you can click the terminal on the right side of the studio
    and use the terminal to a) install `apt-get` packages b) clone the source code
    repository and c) run `pip install -r requirements.txt` to install required Python
    packages and libraries.
  id: totrans-280
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: At this point you are ready to start executing Jupyter Notebook. At the time
    of writing, the free tier version offers a four CPU configuration, making it a
    powerful experimentation platform in free tier offering. You also get access to
    GPU resources.
  id: totrans-281
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Other Options to Run Code
  id: totrans-282
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'There are many more choices. If you want to run the code on GPU machines for
    graphic games or 3D environments, you can use many paid choices. A few of them
    are listed here. Depending on your need, you should refer to the documentation
    of the relevant platform to set them up for code execution:'
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
- en: Google Vertex AI Notebooks
  id: totrans-284
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: AWS SageMaker
  id: totrans-285
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: MS Azure ML Studio
  id: totrans-286
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Paperspace
  id: totrans-287
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Lambda Labs
  id: totrans-288
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Jarvis Labs
  id: totrans-289
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: There is a growing list of cloud GPU and CPU providers for deep learning workloads.
    For the purpose of running the source code of this book, any entry-level configuration
    is good enough.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  id: totrans-291
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter started by introducing the field of reinforcement learning and
    the history of how it has evolved from a rigid rule-based decision-making system
    to a flexible optimal behavior learning system. It did this by learning on its
    own from prior experiences.
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 本章首先介绍了强化学习领域及其从严格的基于规则的决策系统发展到灵活的最优行为学习系统的发展历史。它是通过从先前经验中自主学习来做到这一点的。
- en: The chapter explained the three sub-branches of machine learning—supervised
    learning, unsupervised learning, and reinforcement learning. In the context of
    the supervised and unsupervised methods, the chapter also discussed emerging hybrid
    approaches such as semi-supervised and self-supervised learning as Generative
    AI.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 本章解释了机器学习的三个子分支——监督学习、无监督学习和强化学习。在监督和无监督方法的背景下，本章还讨论了作为生成式AI的半监督学习和自监督学习等新兴混合方法。
- en: I compared the three core approaches of supervised, unsupervised, and reinforcement
    learning to elaborate on the context in which each of these makes sense. I also
    talked about the subcomponents and terms that comprise a reinforcement learning
    setup. These are *agent, behavior, state, action, policy, reward,* and *environment*.
    I used the example of a car and a robot to show how these subcomponents interact
    and what each of these terms means.
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 我比较了监督学习、无监督学习和强化学习的三种核心方法，以阐述每种方法适用的上下文。我还讨论了构成强化学习设置的子组件和术语。这些是*代理、行为、状态、动作、策略、奖励*和*环境*。我通过汽车和机器人的例子展示了这些子组件如何相互作用以及每个术语的含义。
- en: I also talked about the concept of reward and value functions. The chapter discussed
    that rewards are short-term feedback and that value functions are long-term feedback
    of the agent’s behavior. Finally, I introduced model-based and model-free learning
    approaches. Next, I talked about the influence of deep learning in the field of
    reinforcement learning and explained how DQN started the trend of combining deep
    learning with reinforcement learning. I also discussed how the combined approach
    has resulted in scalable learning, including from unstructured inputs such as
    images, text, and voice.
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 我还讨论了奖励和价值函数的概念。本章讨论了奖励是短期反馈，而价值函数是代理行为的长期反馈。最后，我介绍了基于模型和无模型的学习方法。接下来，我谈到了深度学习在强化学习领域的影响，并解释了DQN如何开启了将深度学习与强化学习相结合的趋势。我还讨论了这种结合方法如何导致可扩展的学习，包括从图像、文本和声音等非结构化输入中进行学习。
- en: The chapter moved on to talk about the various use cases of reinforcement learning,
    citing examples from the fields of autonomous vehicles, intelligent robots, recommender
    systems, Large Language Models and stock trading, healthcare, and video/board
    games.
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 本章接着讨论了强化学习的各种应用案例，引用了来自自动驾驶汽车、智能机器人、推荐系统、大型语言模型和股票交易、医疗保健以及视频/桌面游戏的领域的例子。
- en: Finally, I walked through various ways to set up a Python environment and be
    able to run the Jupiter notebooks accompanying this book.
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我介绍了各种设置Python环境的方法，以便能够运行本书附带的Jupyter笔记本。
