- en: 1. Introduction to TensorFlow 2.0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The intent of this book is to introduce readers to the latest version of the
    TensorFlow library. Therefore, this first chapter focuses mainly on what has changed
    in the TensorFlow library since its first version, TensorFlow 1.0\. We will cover
    the various changes, in addition to highlighting the specific parts for which
    changes are yet to be introduced. This chapter is divided into three sections:
    the first discusses the internals of TensorFlow; the second focuses on the changes
    that have been implemented in TensorFlow 2.0 after TensorFlow 1.0; and the final
    section covers TensorFlow 2.0 installation methods and basic operations.'
  prefs: []
  type: TYPE_NORMAL
- en: You may already be aware that TensorFlow is widely used as a machine learning
    implementation library. It was created by Google as part of the Google Brain project
    and was later made available as an open source product, as there were multiple
    machine learning and deep learning frameworks that were capturing the attention
    of users. With open source availability, more and more people in the artificial
    intelligence (AI) and machine learning communities were able to adopt TensorFlow
    and build features and products on top of it. It not only helped users with implementation
    of standard machine learning and deep learning algorithms but also allowed them
    to implement customized and differentiated versions of algorithms for business
    applications and various research purposes. In fact, it soon became one of the
    most popular libraries in the machine learning and AI communities—so much so that
    people have been building a huge number of apps using TensorFlow under the hood.
    This is principally owing to the fact that Google itself uses TensorFlow in most
    of its products, whether Google Maps, Gmail, or other apps.
  prefs: []
  type: TYPE_NORMAL
- en: While TensorFlow had its strengths in certain areas, it also had a few limitations,
    owing to which developers found it a bit difficult to adopt, compared to such
    other libraries as PyTorch, Theano, and OpenCV. As Google’s TensorFlow team took
    the feedback of the TensorFlow community seriously, it went back to the drawing
    board and started working on most of the changes required to make TensorFlow even
    more effective and easy to work with, soon launching the TensorFlow 2.0 alpha
    version this year. TensorFlow 2.0 claims to have removed some of the previous
    hurdles, in order to allow developers to use TensorFlow even more seamlessly.
    In this chapter, we will go over those changes one by one, but before covering
    these, let us spend some time understanding what exactly TensorFlow is and what
    makes it one of the best available options to perform machine learning and deep
    learning today.
  prefs: []
  type: TYPE_NORMAL
- en: Tensor + Flow = TensorFlow
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Tensors are the building blocks of TensorFlow, as all computations are done
    using tensors. So, what exactly is a tensor?
  prefs: []
  type: TYPE_NORMAL
- en: According to the definition provided by Google’s TensorFlow team,
  prefs: []
  type: TYPE_NORMAL
- en: '*A tensor is a generalization of vectors and matrices to potentially higher
    dimensions. Internally, TensorFlow represents tensors as n-dimensional arrays
    of base datatypes.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: But we would like to delve a little deeper into tensors, in order to provide
    more than a general overview of what they are. We would like to compare them with
    vectors or matrices, so as to highlight the key dynamic property that makes tensors
    so powerful. Let us start with a simple vector. A vector is commonly understood
    as something that has a magnitude and a direction. Simply put, it is an array
    that contains an ordered list of values. Without the direction of a vector, a
    tensor becomes a scalar value that has only magnitude.
  prefs: []
  type: TYPE_NORMAL
- en: A vector can be used to represent `n` number of things. It can represent area
    and different attributes, among other things. But let’s move beyond just magnitude
    and direction and try to understand the real components of a vector.
  prefs: []
  type: TYPE_NORMAL
- en: Components and Basis Vectors
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s suppose we have a vector ![$$ \hat{\mathrm{A}} $$](../images/489297_1_En_1_Chapter/489297_1_En_1_Chapter_TeX_IEq1.png),
    as shown in Figure [1-1](#Fig1). This is currently represented without any coordinate
    system consideration, but most of us are already aware of the Cartesian coordinate
    system (x, y, z axis).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_1_Chapter/489297_1_En_1_Fig1_HTML.jpg](../images/489297_1_En_1_Chapter/489297_1_En_1_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-1
  prefs: []
  type: TYPE_NORMAL
- en: Simple vector
  prefs: []
  type: TYPE_NORMAL
- en: If the vector ![$$ \hat{\mathrm{A}} $$](../images/489297_1_En_1_Chapter/489297_1_En_1_Chapter_TeX_IEq2.png)
    is represented in a three-dimensional space, it will look something like what
    is shown in Figure [1-2](#Fig2). This vector ![$$ \hat{\mathrm{A}} $$](../images/489297_1_En_1_Chapter/489297_1_En_1_Chapter_TeX_IEq3.png)
    can also be represented with the help of basis vectors.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_1_Chapter/489297_1_En_1_Fig2_HTML.jpg](../images/489297_1_En_1_Chapter/489297_1_En_1_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-2
  prefs: []
  type: TYPE_NORMAL
- en: Types of variables
  prefs: []
  type: TYPE_NORMAL
- en: Basis vectors are associated with the coordinate system and can be used to represent
    any vector. These basis vectors have a length of 1 and, hence, are also known
    as *unit vectors* . The direction of these basis vectors is determined by their
    respective coordinates. For example, for three-dimensional representation, we
    have three basis vectors![$$ \hat{\mathrm{x}},\hat{\mathrm{y}},\hat{\mathrm{z}}\Big)
    $$](../images/489297_1_En_1_Chapter/489297_1_En_1_Chapter_TeX_IEq4.png), so ![$$
    \hat{\mathrm{x}} $$](../images/489297_1_En_1_Chapter/489297_1_En_1_Chapter_TeX_IEq5.png)
    would have the direction of the x axis coordinate, and the ![$$ \hat{\mathrm{y}}
    $$](../images/489297_1_En_1_Chapter/489297_1_En_1_Chapter_TeX_IEq6.png) basis
    vector would have the direction of the y axis. Similarly, this would be the case
    for ![$$ \hat{\mathrm{z}} $$](../images/489297_1_En_1_Chapter/489297_1_En_1_Chapter_TeX_IEq7.png).
  prefs: []
  type: TYPE_NORMAL
- en: Once the basis vectors are present, we can use the coordinate system to find
    the components that represent the original vector ![$$ \hat{\mathrm{A}} $$](../images/489297_1_En_1_Chapter/489297_1_En_1_Chapter_TeX_IEq8.png).
    For simplicity, and to understand the components of the vector well, let’s reduce
    the coordinate system from three dimensions to two. So, now the vector ![$$ \hat{\mathrm{A}}
    $$](../images/489297_1_En_1_Chapter/489297_1_En_1_Chapter_TeX_IEq9.png) looks
    something like what is shown in Figure [1-3](#Fig3).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_1_Chapter/489297_1_En_1_Fig3_HTML.jpg](../images/489297_1_En_1_Chapter/489297_1_En_1_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-3
  prefs: []
  type: TYPE_NORMAL
- en: 2-dimensional view
  prefs: []
  type: TYPE_NORMAL
- en: To find the first component of the vector ![$$ \hat{\mathrm{A}} $$](../images/489297_1_En_1_Chapter/489297_1_En_1_Chapter_TeX_IEq10.png)
    along the x axis, we will project it onto the x axis, as shown in Figure [1-4](#Fig4).
    Now, wherever the projection meets the x axis is known as the x component, or
    first component, of the vector.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_1_Chapter/489297_1_En_1_Fig4_HTML.jpg](../images/489297_1_En_1_Chapter/489297_1_En_1_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-4
  prefs: []
  type: TYPE_NORMAL
- en: Vector Magnitude
  prefs: []
  type: TYPE_NORMAL
- en: If you look carefully, you can easily recognize this x component as the sum
    of a few basis vectors along the x axis. In this case, adding three basis vectors
    will give the x component of vector ![$$ \hat{\mathrm{A}} $$](../images/489297_1_En_1_Chapter/489297_1_En_1_Chapter_TeX_IEq11.png).
    Similarly, we can find the y component of vector ![$$ \hat{\mathrm{A}} $$](../images/489297_1_En_1_Chapter/489297_1_En_1_Chapter_TeX_IEq12.png)
    by projecting it on the y axis and adding up the basis vectors (2![$$ \hat{\mathrm{y}}
    $$](../images/489297_1_En_1_Chapter/489297_1_En_1_Chapter_TeX_IEq13.png)) along
    the y axis to represent it. In simple terms, we can think of this as how much
    one has to move in the x axis direction and y axis direction in order to reach
    vector ![$$ \hat{\mathrm{A}} $$](../images/489297_1_En_1_Chapter/489297_1_En_1_Chapter_TeX_IEq14.png).
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \hat{A} $$](../images/489297_1_En_1_Chapter/489297_1_En_1_Chapter_TeX_IEq15.png)
    = 3![$$ \hat{x}+2\ \hat{y} $$](../images/489297_1_En_1_Chapter/489297_1_En_1_Chapter_TeX_IEq16.png)'
  prefs: []
  type: TYPE_IMG
- en: One other thing worth noting is that as the angle between vector ![$$ \hat{\mathrm{A}}
    $$](../images/489297_1_En_1_Chapter/489297_1_En_1_Chapter_TeX_IEq17.png) and the
    x axis increases, the x component decreases, but the y component increases. Vectors
    are part of a bigger class of objects known as tensors.
  prefs: []
  type: TYPE_NORMAL
- en: If we end up multiplying a vector with another vector, we get a result that
    is a scalar quantity, whereas if we multiply a vector with a scalar value, it
    just increases or decreases in the same proportion, in terms of its magnitude,
    without changing its direction. However, if we multiply a vector with a tensor,
    it will result in a new vector that has a changed magnitude as well as a new direction.
  prefs: []
  type: TYPE_NORMAL
- en: Tensor
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: At the end of the day, a tensor is also a mathematical entity with which to
    represent different properties, similar to a scalar, vector, or matrix. It is
    true that a tensor is a generalization of a scalar or vector. In short, tensors
    are multidimensional arrays that have some dynamic properties. A vector is a one-dimensional
    tensor, whereas two-dimensional tensors are matrices (Figure [1-5](#Fig5)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_1_Chapter/489297_1_En_1_Fig5_HTML.jpg](../images/489297_1_En_1_Chapter/489297_1_En_1_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-5
  prefs: []
  type: TYPE_NORMAL
- en: Tensors
  prefs: []
  type: TYPE_NORMAL
- en: 'Tensors can be of two types: constant or variable.'
  prefs: []
  type: TYPE_NORMAL
- en: Rank
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Ranking tensors can sometimes be confusing for some people, but in terms of
    tensors, rank simply indicates the number of directions required to describe the
    properties of an object, meaning the dimensions of the array contained in the
    tensor itself. Breaking this down for different objects, a scalar doesn’t have
    any direction and, hence, automatically becomes a rank 0 tensor, whereas a vector,
    which can be described using only one direction, becomes a first rank tensor.
    The next object, which is a matrix, requires two directions to describe it and
    becomes a second rank tensor.
  prefs: []
  type: TYPE_NORMAL
- en: Shape
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The shape of a tensor represents the number of values in each dimension.
  prefs: []
  type: TYPE_NORMAL
- en: 'Scalar—32: The shape of the tensor would be [ ].'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Vector—[3, 4, 5]: The shape of the first rank tensor would be [3].'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Matrix = ![$$ {\displaystyle \begin{array}{ccc}1&amp; 2&amp; 3\\ {}4&amp; 5&amp;
    6\\ {}7&amp; 8&amp; 9\end{array}} $$](../images/489297_1_En_1_Chapter/489297_1_En_1_Chapter_TeX_IEq18.png):
    The second rank tensor would have a shape of [3, 3].'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Flow
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Now comes the second part of TensorFlow: flow. This is basically an underlying
    graph computation framework that uses tensors for its execution. A typical graph
    consists of two entities: nodes and edges, as shown in Figure [1-6](#Fig6). Nodes
    are also called vertices.'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_1_Chapter/489297_1_En_1_Fig6_HTML.jpg](../images/489297_1_En_1_Chapter/489297_1_En_1_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-6
  prefs: []
  type: TYPE_NORMAL
- en: Typical graph
  prefs: []
  type: TYPE_NORMAL
- en: The edges are essentially the connections between the nodes/vertices through
    which the data flows, and nodes are where actual computation takes place. Now,
    in general, the graph can be cyclic or acyclic, but in TensorFlow, it is always
    acyclic. It cannot start and end at the same node. Let’s consider a simple computational
    graph, as shown in Figure [1-7](#Fig7), and explore some of its attributes.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_1_Chapter/489297_1_En_1_Fig7_HTML.jpg](../images/489297_1_En_1_Chapter/489297_1_En_1_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-7
  prefs: []
  type: TYPE_NORMAL
- en: Computational graph
  prefs: []
  type: TYPE_NORMAL
- en: The nodes in the graph indicate some sort of computation, such as addition,
    multiplication, division, etc., except for the leaf nodes, which contain the actual
    tensors with either constant or variable values to be operated upon. These tensors
    flow through the edges or connections between nodes, and the computation at the
    next node results in formation of a new tensor. So, in the sample graph, a new
    tensor `m` is created through a computation at the node using other tensors x
    and y. The thing to focus on in this graph is that computations take place only
    at the next stage after leaf nodes, as leaf nodes can only be simple tensors,
    which become input for next-node computation flowing through edges. We can also
    represent the computations at each node through a hierarchical structure. The
    nodes at the same level can be executed in parallel, as there is no interdependency
    between them. In this case, `m` and `n` can be calculated in parallel at the same
    time. This attribute of `graph` helps to execute computational graphs in a distributed
    manner, which allows TensorFlow to be used for large-scale applications.
  prefs: []
  type: TYPE_NORMAL
- en: TensorFlow 1.0 vs. TensorFlow 2.0
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Although TensorFlow was well adopted by the IT community after it was made available
    on an open source basis, there were still a lot of gaps, in terms of its user-friendliness.
    Users found it somewhat difficult to write TensorFlow-based code. Therefore, there
    was a lot of critical feedback by the developer and research communities regarding
    a few aspects of TensorFlow. As a result, the TensorFlow core development team
    started incorporating the suggested changes, to make the product easier to use
    and more effective. This section reviews those changes that have been incorporated
    into the TensorFlow 2.0 beta version. There are mainly three broad categories
    of changes that have been introduced in TensorFlow 2.0.
  prefs: []
  type: TYPE_NORMAL
- en: Usability-related modifications
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Performance-related modifications
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Deployment-related modifications
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In this chapter, we are going to focus on only the first two categories, as
    Chapter [6](489297_1_En_6_Chapter.xhtml) covers TensorFlow model deployment.
  prefs: []
  type: TYPE_NORMAL
- en: Usability-Related Changes
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The first category of changes mainly focused on TensorFlow’s ease of use and
    more consistent APIs. To go through these changes in detail, we have further subcategorized
    them according to three broad types.
  prefs: []
  type: TYPE_NORMAL
- en: Simpler APIs
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Improved documentation
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: More inbuilt data sources
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Simpler APIs
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'One of the most common criticisms of TensorFlow by users regarded its APIs,
    which were not user-friendly, thus a major focus of TensorFlow 2.0 has been on
    overhauling its APIs. Now, TensorFlow 2.0 provides two levels of APIs:'
  prefs: []
  type: TYPE_NORMAL
- en: High-level APIs
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Lower-level APIs
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: High-Level APIs
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: The high-level APIs make it easier to use TensorFlow for various applications,
    as these APIs are more intuitive in nature. These new high-level APIs have made
    debugging relatively easier than in earlier versions. As TensorFlow 1.0 was graph
    control–based, users were not able to debug their programs easily. TensorFlow
    2.0 has now introduced eager execution, which performs operations and returns
    output instantly.
  prefs: []
  type: TYPE_NORMAL
- en: Lower-Level APIs
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: Another available set of APIs are lower level APIs which offer much more flexibility
    and configuration capability to the users in order to define and parameterise
    the models as per their specific requirements.
  prefs: []
  type: TYPE_NORMAL
- en: Session Execution
  prefs:
  - PREF_H6
  type: TYPE_NORMAL
- en: 'Readers who have used earlier versions of TensorFlow must have gone through
    the conventional procedure, session execution, to get to an operational graph,
    which likely consisted of the following steps:'
  prefs: []
  type: TYPE_NORMAL
- en: First, create the `tf.Graph` object and set it to the default graph for the
    current scope.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Declare the computation part in TensorFlow: `c=tf.matmul(m,n)`.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Define the variable sharing and scope, as required.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Create and configure the `tf.Session` to build the graph and connect to the
    `tf.Session`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Initialize all the variables in advance.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Use the `tf.Session.run` method to start the computation.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The `tf.Session.run` then triggers a procedure to compute the final output.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Eager Execution
  prefs:
  - PREF_H6
  type: TYPE_NORMAL
- en: With eager execution, TensorFlow 2.0 adopts a radically different approach and
    removes the need to execute most of the preceding steps.
  prefs: []
  type: TYPE_NORMAL
- en: TensorFlow 2.0 doesn’t require the graph definition.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: TensorFlow 2.0 doesn’t require the session execution.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: TensorFlow 2.0 doesn’t make it mandatory to initialize variables.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: TensorFlow 2.0 doesn’t require variable sharing via scopes.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: To understand these differences in detail, let’s consider an example using TensorFlow
    1.0 vs. TensorFlow 2.0.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Import the new version of TensorFlow.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '**TensorFlow 1.0**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '**TensorFlow 2.0**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '**TensorFlow 1.0**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: '**TensorFlow 2.0**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Note
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: With TensorFlow 1.0 graph execution, the program state (such as variables) is
    stored in global collections, and their lifetime is managed by the `tf.Session`
    object. By contrast, during eager execution, the lifetime of state objects is
    determined by the lifetime of their corresponding Python object.
  prefs: []
  type: TYPE_NORMAL
- en: tf.function
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: Another powerful introduction of TensorFlow 2.0 is its `tf.function` capability,
    which converts relevant Python code into a formidable TensorFlow graph. It combines
    the flexibility of eager execution and strength of graph computations. As mentioned,
    TensorFlow 2.0 doesn’t require the creation of a `tf.session` object. Instead,
    simple Python functions can be translated into a graph, using the `tf.function`
    decorator. In simple terms, in order to define a graph in TensorFlow 2.0, we must
    define a Python function and decorate it with `@tf.function`.
  prefs: []
  type: TYPE_NORMAL
- en: Keras
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: '`tf.keras` was originally meant for small-scale models, as it had very simple
    APIs, but it was not scalable. TensorFlow also had introduced estimators that
    were designed for scaling and distributed training of machine learning models.
    Estimators had a huge advantage as they offered fault tolerance training in a
    distributed environment, but its APIs were not very user-friendly and were often
    regarded as confusing and a little hard to consume. With this in mind, TensorFlow
    2.0 has introduced the standardized version of `tf.keras`, which combines the
    simplicity of Keras and power of estimators.'
  prefs: []
  type: TYPE_NORMAL
- en: The code for `tf.keras` in TensorFlow versions 1.13 and 2.0 remain the same,
    but what has changed under the hood is the integration of Keras with new features
    of TensorFlow 2.0\. To elaborate a little bit, if a particular piece of code was
    run with `tf.keras` in version 1.13, it would build a graph-based model that ran
    a session under the hood, which we initiated in the code. In version 2.0, the
    same model definition would run in eager mode, without any modification whatsoever.
  prefs: []
  type: TYPE_NORMAL
- en: With eager mode, it becomes easy to debug the code, compared to earlier graph-based
    execution. In eager mode, the data set pipelines behave exactly as those of a
    NumPy array, but TensorFlow takes care of the optimization in the best possible
    manner. Graphs are still very much part of TensorFlow but operate in the background.
  prefs: []
  type: TYPE_NORMAL
- en: Redundancy
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: Another useful feedback from the community regarding TensorFlow usage was that
    there were too many redundant components, which created confusion when using them
    in different places. For example, there were multiple optimizers and layers that
    one had to choose from while building the model. TensorFlow 2.0 has removed all
    the redundant elements and now comes with just one set of optimizers, metrics,
    losses, and layers. Duplicative classes have also been reduced, making it easier
    for users to figure out what to use and when.
  prefs: []
  type: TYPE_NORMAL
- en: Improved Documentation and More Inbuilt Data Sources
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '[`TensorFlow.org`](http://tensorflow.org) now contains much more exhaustive
    and detailed documentation for TensorFlow. This was critical from the user’s perspective,
    as earlier versions had limited examples and tutorials for reference. This new
    documentation includes a lot of new data sources (small as well as big) for users
    to make use of in their programs or for learning purposes. The new APIs also make
    it very easy to import any new data source in TensorFlow. Some of the data sets
    from different domains that are made available within TensorFlow are shown in
    Table [1-1](#Tab1).'
  prefs: []
  type: TYPE_NORMAL
- en: Table 1-1
  prefs: []
  type: TYPE_NORMAL
- en: Data Sets Within TensorFlow 2.0
  prefs: []
  type: TYPE_NORMAL
- en: '| Sr. No | Category | Data set |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| 1 | Text | `imdb_reviews`, `squad` |'
  prefs: []
  type: TYPE_TB
- en: '| 2 | Image | `mnist`, `imagenet2012` , `coco2014`, `cifar10` |'
  prefs: []
  type: TYPE_TB
- en: '| 3 | Video | `moving_mnist`, `starcraft_video`, `bair_robot_pushing_small`
    |'
  prefs: []
  type: TYPE_TB
- en: '| 4 | Audio | `Nsynth` |'
  prefs: []
  type: TYPE_TB
- en: '| 5 | Structured | `titanic`, `iris` |'
  prefs: []
  type: TYPE_TB
- en: Performance-Related Changes
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The TensorFlow development team also claims that new changes have improved product
    performance over earlier versions. Based on training and inference results using
    different processors (GPUs, TPUs), it seems TensorFlow has improved its speed
    two times, on average.
  prefs: []
  type: TYPE_NORMAL
- en: Installation and Basic Operations in TensorFlow 2.0
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There are multiple ways in which we can use TensorFlow (local as well as cloud).
    In this section, we go over two ways in which TensorFlow 2.0 can be used locally
    as well as in the cloud.
  prefs: []
  type: TYPE_NORMAL
- en: Anaconda
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Colab
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Databricks
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Anaconda
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'This is the simplest way of using TensorFlow on a local system. We can `pip`
    install the latest version of TensorFlow, as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Colab
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The most convenient way to use TensorFlow, provided by Google’s TensorFlow team,
    is Colab. Short for *Colaboratory* , this represents the idea of collaboration
    and online laboratories. It is a free Jupyter-based web environment requiring
    no setup, as it comes with all the dependencies prebuilt. It provides an easy
    and convenient way to let users write TensorFlow code within their browser, without
    having to worry about any sort of installations and dependencies. Let’s go over
    the steps to see how to use Google Colab for TensorFlow 2.0.
  prefs: []
  type: TYPE_NORMAL
- en: Go to [`https://colab.research.google.com`](https://colab.research.google.com).
    You will see that the console has multiple options, as shown in Figure [1-8](#Fig8).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_1_Chapter/489297_1_En_1_Fig8_HTML.jpg](../images/489297_1_En_1_Chapter/489297_1_En_1_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-8
  prefs: []
  type: TYPE_NORMAL
- en: Python Notebook Colaboratory (Colab) console
  prefs: []
  type: TYPE_NORMAL
- en: 'Select the relevant option from the console, which contains the following five
    tabs:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Examples. Shows the default notebooks provided in Colab
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Recent. The last few notebooks that the user worked on
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Google Drive. The notebooks linked to the user’s Google Drive account
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: GitHub. The option to link the notebooks present in the user’s GitHub account
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Upload. The option to upload a new `ipynb` or `github` file
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Click New Python 3 Notebook, and a new Colab notebook will appear, as shown
    in Figure [1-9](#Fig9).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_1_Chapter/489297_1_En_1_Fig9_HTML.jpg](../images/489297_1_En_1_Chapter/489297_1_En_1_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-9
  prefs: []
  type: TYPE_NORMAL
- en: New notebook
  prefs: []
  type: TYPE_NORMAL
- en: Install and import TensorFlow 2.0 (Beta).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: Another great advantage of using Colab is that it allows you to build your models
    on GPU in the back end, using Keras, TensorFlow, and PyTorch. It also provides
    12GB RAM, with usage up to 12 hours.
  prefs: []
  type: TYPE_NORMAL
- en: Databricks
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Another way to use TensorFlow is through the Databricks platform. The method
    of installing TensorFlow on Databricks is shown following, using a community edition
    account, but the same procedure can be adopted for business account usage as well.
    The first step is to log in to the Databricks account and spin up a cluster of
    desired size (Figures [1-10](#Fig10)–[1-12](#Fig12)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_1_Chapter/489297_1_En_1_Fig12_HTML.jpg](../images/489297_1_En_1_Chapter/489297_1_En_1_Fig12_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-12
  prefs: []
  type: TYPE_NORMAL
- en: Cluster settings
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_1_Chapter/489297_1_En_1_Fig11_HTML.jpg](../images/489297_1_En_1_Chapter/489297_1_En_1_Fig11_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-11
  prefs: []
  type: TYPE_NORMAL
- en: Clusters
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_1_Chapter/489297_1_En_1_Fig10_HTML.jpg](../images/489297_1_En_1_Chapter/489297_1_En_1_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-10
  prefs: []
  type: TYPE_NORMAL
- en: Databricks
  prefs: []
  type: TYPE_NORMAL
- en: Once the cluster is up and running, we go to the Libraries options of the cluster,
    via Actions, as shown in Figure [1-13](#Fig13).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_1_Chapter/489297_1_En_1_Fig13_HTML.jpg](../images/489297_1_En_1_Chapter/489297_1_En_1_Fig13_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-13
  prefs: []
  type: TYPE_NORMAL
- en: Cluster library
  prefs: []
  type: TYPE_NORMAL
- en: Within the Libraries tab, if the cluster already has a set of pre-installed
    libraries, they will be listed, or, in the case of a new cluster, no packages
    will be installed. We then click the Install New button (Figure [1-14](#Fig14)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_1_Chapter/489297_1_En_1_Fig14_HTML.jpg](../images/489297_1_En_1_Chapter/489297_1_En_1_Fig14_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-14
  prefs: []
  type: TYPE_NORMAL
- en: Installing a new library
  prefs: []
  type: TYPE_NORMAL
- en: This will open a new window with multiple options to import or install a new
    library in Databricks (Figure [1-15](#Fig15)). We select PyPI, and in the Package
    option, we mention the version of TensorFlow required to be installed, as shown
    in Figure [1-16](#Fig16).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_1_Chapter/489297_1_En_1_Fig16_HTML.jpg](../images/489297_1_En_1_Chapter/489297_1_En_1_Fig16_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-16
  prefs: []
  type: TYPE_NORMAL
- en: TensorFlow package
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_1_Chapter/489297_1_En_1_Fig15_HTML.jpg](../images/489297_1_En_1_Chapter/489297_1_En_1_Fig15_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-15
  prefs: []
  type: TYPE_NORMAL
- en: PyPI source
  prefs: []
  type: TYPE_NORMAL
- en: It will take some time, and we can then see TensorFlow successfully installed
    in Databricks, under Libraries. We can now open a new or existing notebook using
    the same cluster (Figures [1-17](#Fig17) and [1-18](#Fig18)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_1_Chapter/489297_1_En_1_Fig18_HTML.jpg](../images/489297_1_En_1_Chapter/489297_1_En_1_Fig18_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-18
  prefs: []
  type: TYPE_NORMAL
- en: New notebook
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_1_Chapter/489297_1_En_1_Fig17_HTML.jpg](../images/489297_1_En_1_Chapter/489297_1_En_1_Fig17_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-17
  prefs: []
  type: TYPE_NORMAL
- en: Running cluster
  prefs: []
  type: TYPE_NORMAL
- en: The final step is simply to import TensorFlow in the notebook and validate the
    version. We can print the TensorFlow version, as shown in Figure [1-19](#Fig19).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_1_Chapter/489297_1_En_1_Fig19_HTML.jpg](../images/489297_1_En_1_Chapter/489297_1_En_1_Fig19_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-19
  prefs: []
  type: TYPE_NORMAL
- en: TensorFlow notebook
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this chapter, we explained the fundamental difference between a vector and
    a tensor. We also covered the major differences between previous and current versions
    of TensorFlow. Finally, we went over the process of installing TensorFlow locally
    as well as in a cloud environment (with Databricks).
  prefs: []
  type: TYPE_NORMAL
