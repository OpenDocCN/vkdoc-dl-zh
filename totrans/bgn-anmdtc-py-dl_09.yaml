  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig64_HTML.png)'
- en: A 12-line code evaluates the performance of a T C N model on a testing dataset.
    It first prints the shape of the testing dataset sequences x. The model is then
    used to predict values on this testing dataset, and the predicted values are reshaped
    to align with the original structure.
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: 一段12行的代码评估了T C N模型在测试数据集上的性能。它首先打印出测试数据集序列x的形状。然后使用模型预测测试数据集上的值，并将预测值重塑以与原始结构对齐。
- en: Figure 9-58
