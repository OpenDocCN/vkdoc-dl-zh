- en: What Is a Temporal Convolutional Network?
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是时间卷积网络？
- en: Temporal convolutional networks are a family of architectures that incorporate
    one-dimensional convolutional layers. More specifically, these convolutions are
    **causal**, meaning no information from the future is leaked into the past. In
    other words, the model only processes information going forward in time. One of
    the problems with recurrent neural networks (covered in Chapter [8](483137_2_En_8_Chapter.xhtml))
    in the context of language translation is that they read sentences from left to
    right in time, leading them to mistranslate in some cases where the order of the
    sentence is switched around to create emphasis. To solve this, RNNs use bi-directional
    encoders, but this means future information is considered in the present. TCNs
    don’t have this problem because, unlike RNNs, they don’t rely on information from
    previous time steps, thanks to their causality. Additionally, TCNs can map an
    input sequence of any length to an output sequence with the same length, just
    as RNNs can do.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 时间卷积网络是一组包含一维卷积层的架构。更具体地说，这些卷积是**因果的**，这意味着未来信息不会泄露到过去。换句话说，模型只处理时间向前流动的信息。在语言翻译的背景下，循环神经网络（在第[8](483137_2_En_8_Chapter.xhtml)章中介绍）的一个问题是它们按时间顺序从左到右读取句子，这导致在某些情况下，句子的顺序被改变以创造强调，从而产生误译。为了解决这个问题，RNNs使用双向编码器，但这意味着未来信息被考虑在当前。TCNs没有这个问题，因为与RNNs不同，它们不依赖于先前时间步的信息，这得益于它们的因果性。此外，TCNs可以将任何长度的输入序列映射到相同长度的输出序列，就像RNNs可以做到的那样。
- en: 'Basically, TCNs seem to be a great alternative to RNNs. These are the advantages
    of TCNs, specifically considering RNNs in general:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 基本上，TCNs似乎是对RNNs的一个很好的替代品。具体来说，TCNs的优势在于，特别是考虑到RNNs的一般情况：
- en: '**Parallel computations**: Convolutional networks pair well with GPU training,
    particularly because the matrix-heavy calculations of the convolutional layers
    are well suited to the structure of GPUs, which are configured to carry out matrix
    calculations that are part of graphics processing. Because of that, TCNs can train
    much faster than RNNs.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**并行计算**：卷积网络与GPU训练配合良好，尤其是由于卷积层的矩阵密集计算非常适合GPU的结构，GPU被配置为执行图形处理中的一部分矩阵计算。因此，TCNs的训练速度可以比RNNs快得多。'
- en: '**Flexibility**: TCNs can change input size, change filter size, increase dilation
    factors, stack more layers, etc. in order to easily be applied to various domains.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**灵活性**：TCNs可以通过改变输入大小、改变滤波器大小、增加膨胀因子、堆叠更多层等，轻松应用于各种领域。'
- en: '**Consistent gradients**: Because TCNs are comprised of convolutional layers,
    they backpropagate differently than RNNs do, and thus all of the gradients are
    saved. RNNs have a problem called “exploding,” or “vanishing gradients,” where
    sometimes the calculated gradient is either extremely large or extremely small,
    leading to the readjusted weight to be either too extreme of a change or a relatively
    nonexistent change. To combat this, types of RNNs such as the LSTM, GRU, and HF-RNN
    were developed.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**一致的梯度**：由于TCNs由卷积层组成，它们的反向传播方式与RNNs不同，因此所有梯度都被保存。RNNs有一个称为“梯度爆炸”或“梯度消失”的问题，有时计算出的梯度要么非常大，要么非常小，导致调整后的权重要么变化过于极端，要么相对不存在。为了解决这个问题，开发了诸如LSTM、GRU和HF-RNN等类型的RNN。'
- en: '**Lighter on memory**: LSTMs store information in their cell gates, so if the
    input sequence is long, much more memory is used by the LSTM network. Comparatively,
    TCNs are relatively straightforward, as they are comprised of several layers that
    all share their own respective filters. Compared to LSTMs, TCNs are much lighter
    to run in regard to their memory usage during training.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**减轻记忆负担**：LSTMs将信息存储在其细胞门中，因此如果输入序列很长，LSTM网络将使用更多的内存。相比之下，TCNs相对简单，因为它们由几个层组成，每个层都有自己的相应滤波器。与LSTMs相比，TCNs在训练过程中的内存使用上运行起来要轻得多。'
- en: 'However, TCNs do have some disadvantages:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，TCNs确实有一些缺点：
- en: '**Memory usage during evaluation mode**: RNNs only need to know some input
    x[t] to generate a prediction, since they maintain a summary of everything they
    learned through their hidden state vectors. In comparison, TCNs need the entire
    sequence up until the current point again to make an evaluation, leading to potentially
    higher memory usage than RNNs when making predictions.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**评估模式下的内存使用**：RNNs只需要知道一些输入x[t]来生成预测，因为它们通过其隐藏状态向量维护了它们所学到的一切的摘要。相比之下，TCNs需要从当前点再次获取整个序列来做出评估，这可能导致在预测时比RNNs使用更多的内存。'
- en: '**Problems with transfer learning**: **Transfer learning** is when a model
    has been trained for one particular task (e.g., classifying vehicles) and has
    the last layer(s) taken out and retrained completely so that the model can be
    used for a new classification task (e.g., classifying animals).'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**迁移学习的问题**：**迁移学习**是指一个模型已经针对一个特定任务（例如，分类车辆）进行了训练，并且最后几层被取出并完全重新训练，以便模型可以用于新的分类任务（例如，分类动物）。'
- en: The of transfer learning is a powerful and useful concept. In computer vision,
    there are some really powerful models, such as the ResNet152 model, that have
    been trained on powerful GPUs for quite some time to achieve the performances
    that they do. Instead of training our own CNN from the ground up (and most of
    us don’t have the GPU hardware or the time to spend that long training an extremely
    deep model like ResNet152), we can simply take ResNet152, for example, which is
    really good at extracting features out of images, and train it to associate the
    features that it extracts with a completely new set of classes. This process takes
    a lot less time since the weights in the entire network are already well optimized,
    so we’re only concerned with finding the optimal weights for the layers we are
    retraining.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 转移学习的概念非常强大且有用。在计算机视觉中，有一些非常强大的模型，例如ResNet152模型，这些模型已经在强大的GPU上训练了一段时间，以实现它们的性能。我们不必从头开始训练自己的CNN（而且我们大多数人没有GPU硬件或时间花费那么长时间训练像ResNet152这样极其深层的模型），我们可以简单地取ResNet152，例如，它非常擅长从图像中提取特征，并训练它将提取的特征与一组全新的类别相关联。这个过程花费的时间要少得多，因为整个网络的权重已经非常优化，所以我们只关心找到我们正在重新训练的层的最佳权重。
- en: That’s why transfer learning is such a valuable process; it allows us to take
    a pretrained, high-performance model and simply retrain the last layer(s) with
    our hardware and teach the model a new classification task (for CNNs).
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: Going back to TCNs, the model might be required to remember varying levels of
    sequence history to make predictions. If the old model required some arbitrary
    length of history to make predictions, but in the new task, it suddenly requires
    a significantly different length of history to make predictions, that could cause
    issues and lead to poor performance. Transfer learning doesn’t make much sense
    anymore - you’d have to retrain the entire network because the only way to perform
    well on this new task is to have a different history length as input. In contrast,
    images are much more stable and are usually always at a fixed length, unlike one-dimensional
    sequences.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: In a one-dimensional convolutional layer, we still have a parameter **k** to
    determine the size of our kernel, or filter.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: As an example of what the one-dimensional convolutional operation looks like,
    assume that we have an input vector defined as shown in Figure [9-1](#Fig1) and
    a filter initialized as shown in Figure [9-2](#Fig2).
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig2_HTML.jpg)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
- en: An input vector for filter weights reads as follows. Left square bracket 1 0.2
    0.1 right square bracket.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: Figure 9-2
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: The filter weights associated with this one-dimensional convolutional layer
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig1_HTML.jpg)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
- en: X equals left square bracket 10 5 15 20 10 20 right square bracket.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: Figure 9-1
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: An input vector x defined with corresponding values
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: The output of the convolutional layer is calculated as shown in Figure [9-3](#Fig3),
    Figure [9-4](#Fig4), Figure [9-5](#Fig5), and Figure [9-6](#Fig6).
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig6_HTML.jpg)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
- en: An illustration of the input and output vectors of filter weights. Input includes
    values of 10, 5, 15, 20, 10, and 20\. Filter weight includes 1, 0.2, and 0.1\.
    The summed value after filtering includes 20 plus 2 plus 2\. Output includes 12.5,
    10, 20, and 24.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: Figure 9-6
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: How the last entry of the output vector is calculated using the filter weights
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig5_HTML.jpg)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
- en: An illustration of the input and output vectors of filter weights. Input includes
    values of 10, 5, 15, 20, 10, and 20\. Filter weight includes 1, 0.2, and 0.1\.
    The summed value after filtering includes 15 plus 4 plus 1\. Output includes 12.5,
    10, and 20.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: Figure 9-5
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: How the third entry of the output vector is calculated using the filter weights
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig4_HTML.jpg)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
- en: An illustration of the input and output vectors of filter weights. Input includes
    values of 10, 5, 15, 20, 10, and 20\. Filter weight includes 1, 0.2, and 0.1\.
    The summed value after filtering includes 5 plus 3 plus 2\. The output includes
    12.5 and 10.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: Figure 9-4
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: How the second entry of the output vector is calculated using the filter weights.
    The procedure is the same as in Figure [9-3](#Fig3), but the filter weights are
    shifted right one
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig3_HTML.jpg)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
- en: An illustration of the input and output vectors of filter weights. Input includes
    values of 10, 5, 15, 20, 10, and 20\. Filter weight includes 1, 0.2, and 0.1\.
    The summed value after filtering includes 10 plus 1 plus 1.5\. Output includes
    12.5.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: Figure 9-3
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: How the first entry of the output vector is calculated using the filter weights.
    The filter weights are multiplied element-wise with the first three entries in
    the input, and the results are summed up to produce the output value
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, we have the output of the one-dimensional convolutional layer. These one-dimensional
    convolutional layers are quite similar to how two-dimensional convolutional layers
    work, and they comprise nearly the entirety of the two different TCNs we will
    look at: the **dilated temporal convolutional network**, and the **encoder-decoder
    temporal convolutional network**. It is important to note that both models involve
    **supervised anomaly detection**, though the encoder-decoder TCN is capable of
    semi-supervised anomaly detection since it is an autoencoder.'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: Dilated Temporal Convolutional Network
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this type of TCN, we deal with a new property known as a **dilation**. Basically,
    when the dilation factor is greater than 1, we introduce gaps in the output data
    that correspond to the dilation factor. To understand the concept of dilation
    better, let’s look at how it works for a **two-dimensional convolutional layer**.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: This is a standard convolution, equivalent to what we looked at in Chapter [3](483137_2_En_3_Chapter.xhtml).
    You can also think of a standard convolutional layer as having a **dilation factor**
    of 1 (refer to Figure [9-7](#Fig7)).
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig7_HTML.jpg)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
- en: To the left, there is a 5 times 5 grid, with highlighted sections in columns
    1 and 2, as well as rows 1 and 2\. On the right is a corresponding feature map
    with a 4 times 4 layout. The highlighted box in column 1, row 1 on the right serves
    as an illustration of the highlighted boxes on the left.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: Figure 9-7
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: A standard convolution with a dilation factor of 1
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: Now, let’s look at what happens when we increase the dilation factor to 2.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: For the first entry in the feature map, the convolution looks like Figure [9-8](#Fig8).
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig8_HTML.jpg)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
- en: To the left, there is a 5 times 5 grid, with highlighted sections in columns
    1 and 3, as well as rows 1 and 3\. On the right is a corresponding feature map
    with a 3 times 3 layout. The highlighted box in column 1, row 1, on the right
    serves as an illustration of the highlighted boxes on the left.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: Figure 9-8
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: A standard convolution with a dilation factor of 2 defining the first entry
    in the feature map
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: Notice that the spacing between each sampled entry has increased by one across
    all directions. Vertically, horizontally, and diagonally, the sampled entries
    are all spaced apart by one entry. Essentially, this spacing is determined by
    finding what **d – 1** is, where **d** is the **dilation factor**. For a dilation
    factor of 3, this spacing will be two apart. Now, for the second entry, the convolution
    process proceeds as normal, as shown in Figure [9-9](#Fig9).
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig9_HTML.jpg)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
- en: To the left, there is a 5 times 5 grid, with highlighted sections in columns
    2 and 4, as well as rows 1 and 3\. On the right is a corresponding feature map
    with a 3 times 3 layout. The highlighted box in column 2, row 1, on the right
    serves as an illustration of the highlighted boxes on the left.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: Figure 9-9
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: The convolution with a dilation factor of 2 defining the second entry in the
    feature map
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: Once the process terminates, we will have our feature map. Notice the reduction
    in dimensionality of the feature map, which is a direct result of increasing the
    dilation factor. In the standard two-dimensional convolutional layer, we had a
    4×4 feature map since the dilation factor was 1, but now we have a 3×3 feature
    map after increasing this factor to 2.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: A one-dimensional dilated convolution is similar. Let’s revisit the one-dimensional
    convolution example from earlier and modify it a bit to illustrate this concept.
  id: totrans-75
