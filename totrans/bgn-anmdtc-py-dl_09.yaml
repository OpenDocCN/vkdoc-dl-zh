- en: A scatterplot titled Anomalies plots error versus data. The plots for normal
    lie in the range of 0 to 10000 on the horizontal axis and 0.0 to 0.19 on the vertical
    axis. The line for the threshold is linear and starts from 0.17 of the vertical
    axis.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
- en: Figure 9-35
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
- en: The plot showing the points that lie beyond the error threshold, thus being
    classified as anomalies
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
- en: Let’s create an anomaly prediction dataframe to more easily plot which points
