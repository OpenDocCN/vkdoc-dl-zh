  id: totrans-195
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig28_HTML.png)'
- en: A 4-line code configures and compiles a previously defined T C N model. The
    chosen optimizer is adam and the loss function for training is set to mean absolute
    error. The code prints a summary of the T C N model using the summary method.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 一段 4 行的代码配置和编译了一个先前定义的 T C N 模型。选择的优化器是 adam，训练的损失函数设置为平均绝对误差。代码使用 summary 方法打印了
    T C N 模型的摘要。
- en: Figure 9-27a
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-27a
- en: Compiling the model to use the Adam optimizer and mean absolute error as the
    loss function
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 编译模型以使用 Adam 优化器和平均绝对误差作为损失函数
- en: You should see output like that shown in Figure [9-27b](#Fig29).
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该看到图 [9-27b](#Fig29) 中所示的那种输出。
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig29_HTML.png)'
  id: totrans-200
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig29_HTML.png)'
- en: The output architecture represents a summary of a model named Model 1 for processing
    time series data. The summary provides information about each layer in the model,
    including its type, output shape, and the number of parameters.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 输出架构代表了名为 Model 1 的模型对时间序列数据进行处理的总结。该总结提供了关于模型中每个层的详细信息，包括其类型、输出形状和参数数量。
- en: Figure 9-27b
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-27b
- en: The output architecture printed out
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 打印出的输出架构
- en: Let’s initiate the training process. Refer to Figure [9-28](#Fig30).
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始训练过程。参见图 [9-28](#Fig30)。
