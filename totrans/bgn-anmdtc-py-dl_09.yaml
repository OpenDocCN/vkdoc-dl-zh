- en: The `MaxPooling1D` layers apply a filter of length `pool_size=2`, moving through
    the data two at a time (as specified by `strides=2`). It picks the maximum value
    in the filter to pass through to the next layer. It has the effect of halving
    the data dimension (not the filters), so we are lowering not only the filter dimension
    space, but also the data dimension space itself.
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
- en: We have an `UpSampling1D` layer in the decoder portion functions similarly to
    how we described UpSampling right before the coding section for the ED-TCN.
