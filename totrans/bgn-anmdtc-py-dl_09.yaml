  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig32_HTML.png)'
- en: An 11-line code evaluates the performance of a trained T C N model on a testing
    dataset. It uses the M S E metric to quantify the difference between the sequences
    y and the testing pred. The code calculates the errors by subtracting the predicted
    values from the actual values.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 11 行代码评估了训练好的 T C N 模型在测试数据集上的性能。它使用均方误差 (M S E) 指标来量化序列 y 和测试预测之间的差异。代码通过从实际值中减去预测值来计算误差。
- en: Figure 9-30
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-30
- en: Making predictions using the trained model
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 使用训练好的模型进行预测
- en: 'If all went well during training, the output should look something like the
    following:'
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
