  id: totrans-205
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig30_HTML.png)'
- en: A 17-line code prepares and trains a T C N model on time series data. The training
    process is initiated using the fit method, specifying the training input training
    x and target output timing y, along with parameters like batch size, number of
    epochs, and a validation dataset.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 一段 17 行的代码在时间序列数据上准备和训练了一个 T C N 模型。训练过程通过 fit 方法启动，指定训练输入训练 x 和目标输出 timing
    y，以及批大小、epoch 数和验证数据集等参数。
- en: Figure 9-28
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-28
- en: Specifying the training dataset to be half of the total dataset to teach the
    model what is normal before predicting on the entire dataset later on. This also
    specifies the training loop
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 将训练数据集指定为总数据集的一半，以在稍后对整个数据集进行预测之前教会模型什么是正常情况。这也指定了训练循环
- en: The output should look somewhat like Figure [9-29](#Fig31).
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 输出应该看起来类似于图 [9-29](#Fig31)。
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig31_HTML.png)'
  id: totrans-210
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig31_HTML.png)'
- en: The output provides an overview of the data shapes and the training progress
    of the T C N model. It includes key metrics such as loss and mean absolute error,
    offering insights into the model's performance during training and validation.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 输出提供了数据形状和 T C N 模型训练进度的概述。它包括关键指标，如损失和平均绝对误差，提供了模型在训练和验证期间性能的见解。
- en: Figure 9-29
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-29
- en: The output of the training code, with some of the outputs removed for a clearer
    display
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 训练代码的输出，其中一些输出已被移除以获得更清晰的显示
- en: One thing to note about TCN/one-dimensional CNNs in general is that they tend
    to be a bit sensitive, meaning that sometimes the training completely fails and
    the CNN just produces a straight-line output. The He Normal initialization technique
    should help combat this collapse, but sometimes you’ll just need to retrain the
    model to achieve a convergence.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 关于 TCN/一维 CNN 的一般注意事项是，它们往往比较敏感，这意味着有时训练完全失败，CNN 只会产生直线输出。He 正则化初始化技术应该有助于对抗这种崩溃，但有时您可能需要重新训练模型以实现收敛。
- en: If your results are not satisfactory or are a failure, feel free to rerun the
    model training a few times if necessary. Because neural networks in general depend
    on random weight initializations that are not privy to the geometry of the loss
    curve, they can get trapped into reaching suboptimal convergences or even a divergence.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您的结果不满意或失败，如果需要，请随意多次重新运行模型训练。因为神经网络通常依赖于随机权重初始化，这些初始化并不了解损失曲线的几何形状，它们可能会陷入达到次优收敛甚至发散。
- en: With the training completed, let’s move on to making the predictions. Execute
    the code shown in Figure [9-30](#Fig32).
