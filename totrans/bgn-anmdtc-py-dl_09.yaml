    scaled value in d f. The variable time steps are set to 16\. The code iterates
    through the time series data, creating windows of length for time steps. The resulting
    arrays are then printed.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 一段 15 行的代码从 d f 中的时间序列数据列 scaled value 生成滚动窗口序列。变量 time steps 设置为 16。代码遍历时间序列数据，创建长度为
    time steps 的窗口。然后打印出结果数组。
