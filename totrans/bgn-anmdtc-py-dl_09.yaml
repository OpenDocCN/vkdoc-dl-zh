  type: TYPE_NORMAL
- en: Code to plot the time-series sequences, color-coded so that `green` represents
    the true value of the entire sequence of values, `blue` only represents the training
    split, and `red` represents the model’s predictions on the whole dataset’s time-series
    values
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
- en: Let’s start making predictions for what the anomalies are using our calculated
    threshold. Refer to Figure [9-33](#Fig36).
  id: totrans-240
