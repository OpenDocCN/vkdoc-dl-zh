- en: Let’s now create the training dataset. We will be using a rolling-window approach
    and a window size of `time_steps`, which we will shorthand to **T** in this explanation.
    We will iterate through the dataset a window length of T at a time, taking the
    first T-1 values as the x and the T^(th) values as the y. We will teach the model
    to read an input of T-1 values and predict the T^(th). Refer to Figure [9-25](#Fig26).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig26_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A 15-line code generates rolling window sequences from a time series data column
    scaled value in d f. The variable time steps are set to 16\. The code iterates
    through the time series data, creating windows of length for time steps. The resulting
    arrays are then printed.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 9-25
  prefs: []
  type: TYPE_NORMAL
- en: Creating the rolling-window features to feed into the model
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have our data created, let’s define the model architecture. Refer
    to Figure [9-26](#Fig27).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig27_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A 30-line code to define the T C N model using Kernel for processing time series
    data. The model comprises a series of Con v 1 D. After each convolutional layer,
    a dropout layer, Spatial Dropout 1 D is applied. The convolutional layer includes
    parameters like filter size, dilation rate, and more.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 9-26
  prefs: []
  type: TYPE_NORMAL
- en: Defining the TCN architecture
  prefs: []
  type: TYPE_NORMAL
- en: 'There are a lot of new parameters to specify:'
  prefs: []
  type: TYPE_NORMAL
- en: '`kernel_size`: This controls the length of each filter that is being applied
    over the data.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`dilation_rate`: This controls d, the dilation size.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`padding`: Set to `''causal''`, this specifies that we want a causal layer,
    not an acausal layer.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`strides`: The stride length. Set to `1`, this means each filter shifts over
    by one value of the input data once it’s done with its computation. It’s like
    the rolling-window code described earlier in that each consecutive window is one
    stride or value apart.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`kernel_regularizer`: Specifying the L2 regularization prevents overfitting.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`kernel_initializer`: Set to `''he_normal''`, we are initializing the weights
    using the Kaiming/He normal method. This helps with training stability with networks
    that rely on ReLU activation functions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We have also added `SpatialDropout1D` layers, which act as dropout layers for
    one-dimensional CNN settings and helps with the regularization of the model.
  prefs: []
  type: TYPE_NORMAL
- en: The `Flatten` layer simply concatenates all of the outputs of the previous layer
    to make it one-dimensional into a (batch_size, 1) shape.
  prefs: []
  type: TYPE_NORMAL
