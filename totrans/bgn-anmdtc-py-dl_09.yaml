  type: TYPE_NORMAL
  zh: 打印出的输出架构
- en: As you can see, there is a compression of dimensions occurring throughout the
    model along with an expanding. We are getting the model to learn the attributes
    of the time-series model by having it learn an efficient representation of the
    input to reconstruct the original input back out from. The idea is that it will
    learn the properties of what makes a normal time-series dataset, and when applying
    these learned properties to encoding and decoding an anomalous sequence, it will
    have high reconstruction errors that would flag these sequences as anomalous.
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，在整个模型中发生了维度的压缩和扩展。我们通过让模型学习输入的有效表示来重建原始输入，从而让模型学习时间序列模型的属性。想法是它将学习构成正常时间序列数据集的属性，当将这些学习的属性应用于编码和解码异常序列时，它将具有高重建误差，这将将这些序列标记为异常。
- en: Let’s initiate the training process. Refer to Figure [9-56](#Fig62).
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始训练过程。参见图[9-56](#Fig62)。
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig62_HTML.png)'
  id: totrans-409
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig62_HTML.png)'
- en: A 13-line code reshapes the input sequences x sequences to a 3-D array of sequences
    x suitable for training T C N. The reshaped array has dimensions. The reshaping
    is followed by printing the shape of the newly created array.
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 一段13行的代码将输入序列x序列重塑为适合训练T C N的3-D数组序列x。重塑后的数组具有相应的维度。重塑后，打印出新创建数组的形状。
- en: Figure 9-56
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-56
- en: Specifying the training dataset to be half of the total dataset to teach the
    model what is normal before predicting on the entire dataset later on. This also
    specifies the training loop
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 将训练数据集指定为总数据集的一半，以在稍后对整个数据集进行预测之前教会模型什么是正常的。这也指定了训练循环
- en: The output should look somewhat like Figure [9-57](#Fig63).
