  prefs: []
  type: TYPE_NORMAL
  zh: 如果训练过程中一切顺利，输出应类似于以下内容：
- en: '[PRE9]'
  id: totrans-425
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Let’s now calculate the distance cutoffs to determine the anomaly threshold.
    Refer to Figure [9-59](#Fig65).
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们计算距离截止值以确定异常阈值。参见图[9-59](#Fig65)。
