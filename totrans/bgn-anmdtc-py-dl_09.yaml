    and mean absolute error as the loss function. The compile method is then called
    to finalize the model configuration. The model summary is printed to the console
    using t c n dot summary.
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: 一段 4 行代码配置了一个用于训练的 T C N 模型。它使用 Adam 优化器和平均绝对误差作为损失函数。然后调用 compile 方法来最终确定模型配置。使用
    t c n dot summary 将模型摘要打印到控制台。
