- en: A 30-line code to define the T C N model using Kernel for processing time series
    data. The model comprises a series of Con v 1 D. After each convolutional layer,
    a dropout layer, Spatial Dropout 1 D is applied. The convolutional layer includes
    parameters like filter size, dilation rate, and more.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 一段 30 行的代码使用核定义了用于处理时间序列数据的 T C N 模型。该模型由一系列 Conv 1 D 组成。在每个卷积层之后，应用一个 dropout
    层，即 Spatial Dropout 1 D。卷积层包括滤波器大小、膨胀率等参数。
- en: Figure 9-26
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-26
- en: Defining the TCN architecture
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 定义 TCN 架构
- en: 'There are a lot of new parameters to specify:'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 有很多新的参数需要指定：
- en: '`kernel_size`: This controls the length of each filter that is being applied
    over the data.'
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`kernel_size`：这控制了应用于数据的每个滤波器的长度。'
- en: '`dilation_rate`: This controls d, the dilation size.'
  id: totrans-187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`dilation_rate`：这控制了 d，即膨胀大小。'
- en: '`padding`: Set to `''causal''`, this specifies that we want a causal layer,
    not an acausal layer.'
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`padding`：设置为 `''causal''`，这指定了我们想要一个因果层，而不是非因果层。'
- en: '`strides`: The stride length. Set to `1`, this means each filter shifts over
    by one value of the input data once it’s done with its computation. It’s like
    the rolling-window code described earlier in that each consecutive window is one
    stride or value apart.'
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`strides`：步长长度。设置为 `1`，这意味着每个滤波器在其计算完成后会移动输入数据的一个值。这就像之前提到的滚动窗口代码，其中每个连续窗口相隔一个步长或值。'
- en: '`kernel_regularizer`: Specifying the L2 regularization prevents overfitting.'
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`kernel_regularizer`：指定 L2 正则化可以防止过拟合。'
- en: '`kernel_initializer`: Set to `''he_normal''`, we are initializing the weights
    using the Kaiming/He normal method. This helps with training stability with networks
    that rely on ReLU activation functions.'
  id: totrans-191
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`kernel_initializer`：设置为 `''he_normal''`，我们使用 Kaiming/He 正态方法初始化权重。这有助于依赖于
    ReLU 激活函数的网络的训练稳定性。'
- en: We have also added `SpatialDropout1D` layers, which act as dropout layers for
    one-dimensional CNN settings and helps with the regularization of the model.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还添加了 `SpatialDropout1D` 层，这些层作为一维 CNN 设置中的 dropout 层，有助于模型的正则化。
- en: The `Flatten` layer simply concatenates all of the outputs of the previous layer
    to make it one-dimensional into a (batch_size, 1) shape.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: '`Flatten` 层简单地将前一层所有输出连接起来，使其成为一维的 (batch_size, 1) 形状。'
- en: Let’s now compile the model and print the architecture. Refer to Figure [9-27a](#Fig28).
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来编译模型并打印其架构。参见图 [9-27a](#Fig28)。
