  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig36_HTML.png)'
  id: totrans-241
  prefs: []
  type: TYPE_IMG
- en: A 10-line code assigns labels to records as anomalies or not based on a specified
    threshold. The code uses the zip function to iterate over pairs of boolean values
    and distances. The resulting anomaly labels are stored in the y-label list, and
    the distances are stored in the error list.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
- en: Figure 9-33
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
- en: Code to calculate the anomaly label for each data point
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
- en: We can visualize this error threshold and find out what points lie beyond it.
    Refer to Figure [9-34](#Fig37) for the code to plot this threshold graph.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig37_HTML.png)'
  id: totrans-246
  prefs: []
  type: TYPE_IMG
- en: A 2-line code creates an instance of the Visualization class and calls its draw
    anomaly method. The method takes three arguments. y label, error, and threshold.
    The draw anomaly method generates a scatter plot to visualize anomalies in the
    data.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
- en: Figure 9-34
