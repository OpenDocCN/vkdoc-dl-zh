  prefs: []
  type: TYPE_TB
- en: '| **0** | 2014-07-01 00:00:00 | 10844 | 2014-07-01 00:00:00 | 0.276506 |'
  id: totrans-170
  prefs: []
  type: TYPE_TB
- en: '| **1** | 2014-07-01 00:30:00 | 8127 | 2014-07-01 00:30:00 | 0.207175 |'
  id: totrans-171
  prefs: []
  type: TYPE_TB
- en: '| **2** | 2014-07-01 01:00:00 | 6210 | 2014-07-01 01:00:00 | 0.158259 |'
  id: totrans-172
  prefs: []
  type: TYPE_TB
- en: '| **3** | 2014-07-01 01:30:00 | 4656 | 2014-07-01 01:30:00 | 0.118605 |'
