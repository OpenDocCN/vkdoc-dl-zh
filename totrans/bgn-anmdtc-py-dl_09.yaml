  type: TYPE_IMG
  zh: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig63_HTML.png)'
- en: A summary of the code first prints the shapes of two arrays. sequences x with
    dimensions (10305, 16, 1) and training x with dimensions (5160, 16, 1). The subsequent
    output displays the training progress for each epoch during the T C N training.
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 代码摘要首先打印出两个数组的形状。序列x的维度为(10305, 16, 1)和训练x的维度为(5160, 16, 1)。随后的输出显示了TCN训练过程中每个epoch的训练进度。
