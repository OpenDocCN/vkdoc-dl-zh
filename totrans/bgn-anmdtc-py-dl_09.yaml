    threshold using training error and calculate the total error over the full sequence.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 基于排序后误差的 13 行代码用于使用训练误差计算阈值并计算整个序列的总误差。
- en: Figure 9-31
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-31
