- en: Overall, this was an example of **unsupervised anomaly detection**. We took
    a subset of the original sequence, trained the model to output a prediction given
    rolling windows, and calculated a threshold by which we can identify anomalies.
    None of the steps in this process involved a training label.
  prefs: []
  type: TYPE_NORMAL
- en: For our next example, we will be implementing the encoder-decoder temporal convolutional
    network, essentially combining the TCN with the concept of an autoencoder to perform
    unsupervised anomaly detection.
  prefs: []
  type: TYPE_NORMAL
- en: Encoder-Decoder Temporal Convolutional Network
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The version of the encoder-decoder TCN (ED-TCN) we will be exploring involves
    a combination of one-dimensional causal convolutional and pooling layers to encompass
    the encoding stage, and a series of upsampling and one-dimensional causal convolutional
    layers to comprise the decoding stage. The convolutional layers in this model
    aren’t dilated, but they still count as layers of a TCN. To better understand
    the structure of this model, take a look at Figure [9-39](#Fig42).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig42_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: An interconnected link chart of decoding and encoding stages. The chart has
    six layers of output, softmax, con v 2, up sample 2, con v 1, and up sample 1
    in the decoding stage. In the encoding stage, there are five layers of pool 2,
    con v 2, pool 1, con v 1, and input.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 9-39
  prefs: []
  type: TYPE_NORMAL
- en: In both the encoding and decoding stages, the model is comprised of causal convolutional
    layers, and is structured so that the layers are always causal
  prefs: []
  type: TYPE_NORMAL
- en: The diagram might seem pretty complicated, so let’s break it down layer by layer.
  prefs: []
  type: TYPE_NORMAL
- en: First, look at the encoding stage and start with the input layer at the very
    bottom. From this layer, we perform a **causal convolution** on the input as part
    of the first convolutional layer. The outputs of the first convolutional layer,
    which we will call `conv_1`, are now the inputs of the first **max pooling layer**,
    which we will call `pool_1`.
  prefs: []
  type: TYPE_NORMAL
- en: Recall from Chapter [3](483137_2_En_3_Chapter.xhtml) that the pooling layer
    emphasizes the maximum value in the areas it passes through, effectively generalizing
    the inputs by choosing the heaviest values. From here, we have another set of
    causal convolutions and max pooling with layers `conv_2` and `pool_2`. Note the
    progressive reduction in size of the data as it passes through the encoding stage,
    a feature characteristic to autoencoders. Finally, we have a dense layer in the
    middle of the two stages, representing the final, encoded output of the encoding
    stage, as well as the encoded input of the decoding stage.
  prefs: []
  type: TYPE_NORMAL
- en: The decoding stage is a bit different in this case, since we make use of what
    is called **upsampling**. Upsampling is a technique in which we repeat the data
    **n** number of times to scale it up by a factor **n**. In the max pooling layers,
    the data was reduced by a factor of 2\. So, to upsample and increase the data
    by the same factor of 2, we repeat the data twice. In this case, we are using
    one-dimensional upsampling, so the layer would repeat each step **n** times with
    respect to the axis of time. To get a better understanding of what upsampling
    does, let’s apply one-dimensional upsampling as shown in Figure [9-40](#Fig43)
    and Figure [9-41](#Fig44).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig44_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A three-line text reads as follows. Line 1, n equals 2\. Line 2, so data increases
    by a factor of 2 forward-slash. Line 3, repeat each step two times.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 9-41
  prefs: []
  type: TYPE_NORMAL
- en: The upsampling factor n
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig43_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: X equals left square bracket 4 2 6 7 1 6 9 right square bracket.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 9-40
  prefs: []
  type: TYPE_NORMAL
- en: A vector x defined with the corresponding values
  prefs: []
  type: TYPE_NORMAL
- en: Keeping in mind that each individual temporal step is repeated twice, we would
    see something like procedure shown in Figure [9-42](#Fig45), Figure [9-43](#Fig46),
    and Figure [9-44](#Fig47).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig47_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A two-line vector input reads as follows. Line 1, left square bracket 4 4 2
    2 6 6 right square bracket. Line 2, left square bracket 4 2 6 7 1 6 9 5 right
    square bracket. An arrow from 6 of line 2 splits and points to 6 6 in line 1.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 9-44
  prefs: []
  type: TYPE_NORMAL
- en: This process is repeated with the third entry in the input vector to form the
    next third pair of entries in the output vector
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig46_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A two-line vector input reads as follows. Line 1, left square bracket 4 4 2
    2 right square bracket. Line 2, left square bracket 4 2 6 7 1 6 9 5 right square
    bracket. An arrow from 2 of line 2 splits and points to 2 2 in line 1.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 9-43
  prefs: []
  type: TYPE_NORMAL
- en: The next entry is repeated twice to form the next two entries in the output
    vector of the upsampling operation
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig45_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A two-line vector input reads as follows. Line 1, left square bracket 4 4 right
    square bracket. Line 2, left square bracket 4 2 6 7 1 6 9 5 right square bracket.
    An arrow from 4 of line 2 splits and points to 4 4 in line 1.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 9-42
  prefs: []
  type: TYPE_NORMAL
- en: The first entry in the input is repeated twice to form the first two entries
    in the upsampled output vector
  prefs: []
  type: TYPE_NORMAL
- en: This continues until we finally get to the result shown in Figure [9-45](#Fig48).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig48_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A two-line vector input reads as follows. Line 1, left square bracket 4 4 2
    2 6 6 7 7 1 1 6 6 9 9 5 5 right square bracket. Line 2, left square bracket 4
    2 6 7 1 6 9 5 right square bracket.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 9-45
  prefs: []
  type: TYPE_NORMAL
- en: The output vector after the upsampling operation compared to the original input
    vector below it
  prefs: []
  type: TYPE_NORMAL
- en: Going back to the model, each upsampling layer is then connected to a one-dimensional
    convolutional layer, and the pair of upsampling layer and one-dimensional convolutional
    layer repeats again until the final output is passed through a `softmax()` function
    to result in the output/prediction.
  prefs: []
  type: TYPE_NORMAL
