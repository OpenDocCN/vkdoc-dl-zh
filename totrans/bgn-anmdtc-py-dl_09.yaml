  zh: 训练代码的输出，为了更清晰地显示，删除了一些输出
- en: As this model is also based on the TCN/1D-CNN, it may also possibly fail training
    and produce a single-line output. Rerun the model training in this case, though
    we have initialized the weights with He Normal for stability.
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这个模型也是基于TCN/1D-CNN，它也可能在训练过程中失败并产生单行输出。在这种情况下，重新运行模型训练，尽管我们已经初始化了权重以He Normal来提高稳定性。
- en: With the training completed, let’s move on to making the predictions. Execute
    the code in Figure [9-58](#Fig64).
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 训练完成后，让我们继续进行预测。执行图[9-58](#Fig64)中的代码。
