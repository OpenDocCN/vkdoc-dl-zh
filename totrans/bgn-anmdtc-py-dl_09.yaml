  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一维卷积操作的一个例子，假设我们有一个如图 [9-1](#Fig1) 所示的输入向量和一个如图 [9-2](#Fig2) 所示的初始化滤波器。
