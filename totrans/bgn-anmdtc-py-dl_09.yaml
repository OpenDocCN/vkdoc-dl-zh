    convolutional layers comprising the decoding stage.
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 解码阶段的 30 行代码用于配对 upsampling 和因果 1-D 卷积层，这些层构成了解码阶段。
- en: Figure 9-54b
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-54b
