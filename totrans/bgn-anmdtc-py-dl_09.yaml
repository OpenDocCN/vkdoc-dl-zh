    28000), (2014-09, 27000), (2014-11, 40000), (2014-12, 25000), (2015-01, 32000),
    and (2015-02, 30000). Values are estimated.
  id: totrans-485
  prefs: []
  type: TYPE_NORMAL
  zh: 散点图绘制观测值与日期时间的对应关系。（2014-07，10000），（2014-08，28000），（2014-09，27000），（2014-11，40000），（2014-12，25000），（2015-01，32000），以及（2015-02，30000）。值是估计的。
- en: Figure 9-67
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-67
- en: The identified anomalies using the TCN’s predictions
  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 TCN 预测识别的异常
- en: Figure [9-67](#Fig74) shows that quite a few points are labeled as anomalies.
    There were more errors than in the Dilated TCN plot, but most importantly, the
    model heavily predicted the spikes around Thanksgiving and New Year’s Eve.
  id: totrans-488
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [9-67](#Fig74) 显示，相当多的点被标记为异常。错误数量比扩展 TCN 图中的要多，但最重要的是，模型在感恩节和新年除夕周围的峰值预测非常严重。
- en: It did miss Christmas and the snowstorm event in late January. Try playing around
    with the model architecture and parameters, as well as the `time_steps` parameter,
    in order to get better predictions.
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: 它确实错过了圣诞节和一月底的暴风雪事件。尝试调整模型架构和参数，以及 `time_steps` 参数，以获得更好的预测。
- en: Finally, this was another example of **unsupervised anomaly detection**. We
    took a subset of the original sequence, trained the model to encode and decode
    each rolling-window sequence, and calculated a threshold by which we can identify
    anomalies. None of the steps in this process involved a training label.
  id: totrans-490
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，这又是一个**无监督异常检测**的例子。我们取了原始序列的一个子集，训练模型对每个滚动窗口序列进行编码和解码，并计算了一个阈值，通过这个阈值我们可以识别出异常。在这个过程中，没有任何步骤涉及到训练标签。
- en: Summary
  id: totrans-491
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we discussed temporal convolutional networks and saw how they
    fare when applied to anomaly detection.
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们讨论了时间卷积网络，并看到了它们在应用于异常检测时的表现。
- en: In Chapter [10](483137_2_En_10_Chapter.xhtml), we will look at the practical
    use case of anomaly detection.
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
  zh: 在第[10](483137_2_En_10_Chapter.xhtml)章中，我们将探讨异常检测的实际应用案例。
