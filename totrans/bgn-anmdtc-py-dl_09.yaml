- en: Due to the rolling-window approach, we don’t have predictions for the first
    `time_steps-1` number of datapoints, which is why they are padded with zeros.
    Let’s now plot the final graph showing visually what the anomalies are. Refer
    to Figure [9-37](#Fig40) for this code.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 由于采用了滚动窗口方法，我们对于前`time_steps-1`个数据点没有预测，这就是为什么它们被填充为零。现在让我们绘制最终的图形，直观地展示异常情况。请参考图[9-37](#Fig40)中的代码。
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig40_HTML.png)'
  id: totrans-271
