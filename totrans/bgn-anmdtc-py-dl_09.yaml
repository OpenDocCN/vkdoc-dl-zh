- en: Let’s now create the training dataset. Instead of predicting the T^(th) value
    using the first T-1 values, we will directly predict the T values given the T
    values. In other words, we are teaching the model how to efficiently encode the
    T values to some lower-dimensional space such that they can be reconstructed with
    minimal error.
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来创建训练数据集。我们不是使用前 T-1 个值来预测 T^(th) 值，而是直接根据 T 值预测 T 值。换句话说，我们正在教模型如何高效地将
    T 值编码到某个低维空间，以便它们可以以最小的误差重建。
- en: And so, we won’t have a y set, but rather only the x set. Refer to Figure [9-53](#Fig57).
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们不会有一个 y 集合，而只有 x 集合。参见图 [9-53](#Fig57)。
