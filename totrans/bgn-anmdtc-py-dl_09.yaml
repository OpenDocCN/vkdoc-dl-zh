- en: One thing to note about TCN/one-dimensional CNNs in general is that they tend
    to be a bit sensitive, meaning that sometimes the training completely fails and
    the CNN just produces a straight-line output. The He Normal initialization technique
    should help combat this collapse, but sometimes you’ll just need to retrain the
    model to achieve a convergence.
  prefs: []
  type: TYPE_NORMAL
- en: If your results are not satisfactory or are a failure, feel free to rerun the
    model training a few times if necessary. Because neural networks in general depend
    on random weight initializations that are not privy to the geometry of the loss
    curve, they can get trapped into reaching suboptimal convergences or even a divergence.
  prefs: []
  type: TYPE_NORMAL
