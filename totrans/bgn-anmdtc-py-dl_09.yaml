  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该看到如下输出：
- en: '[PRE5]'
  id: totrans-329
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: After that, we proceed to defining our `Visualization` class, as shown in Figure
    [9-47](#Fig50).
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，我们继续定义我们的 `Visualization` 类，如图 [9-47](#Fig50) 所示。
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig50_HTML.png)'
  id: totrans-331
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig50_HTML.png)'
- en: A 38-line code defines a class named Visualization that encapsulates methods
    for drawing visualizations related to anomaly detection.
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 一段 38 行的代码定义了一个名为 Visualization 的类，该类封装了与异常检测相关的可视化方法。
- en: Figure 9-47
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-47
- en: Defining the `Visualization` class
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 定义 `Visualization` 类
- en: Next, let’s define the mechanism to load our data, as shown in Figure [9-48](#Fig51).
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们定义加载我们数据的机制，如图 [9-48](#Fig51) 所示。
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig51_HTML.png)'
  id: totrans-336
