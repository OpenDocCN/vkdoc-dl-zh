  zh: 由于采用了滚动窗口方法，我们对于前`time_steps-1`个数据点没有预测，这就是为什么它们被填充为零。现在让我们绘制最终的图形，直观地展示异常情况。请参考图[9-37](#Fig40)中的代码。
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig40_HTML.png)'
  id: totrans-271
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig40_HTML.png)'
- en: An 8-line code creates a time series plot to visualize the observations over
    time. The plot is displayed in a figure with dimensions 12 times 6\. Anomalies
    in the data, identified by the anomaly column having a value of 1, are highlighted
    with scatter points on the plot.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 8行代码创建了一个时间序列图来可视化随时间变化的观察值。该图显示在一个12×6尺寸的图形中。数据中的异常，通过异常列的值为1来识别，在图上用散点表示。
- en: Figure 9-37
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-37
- en: Code to plot the anomalous points on the original time-series sequence
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 在原始时间序列序列上绘制异常点的代码
- en: The result looks something like Figure [9-38](#Fig41).
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 结果看起来就像图[9-38](#Fig41)所示。
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig41_HTML.jpg)'
  id: totrans-276
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig41_HTML.jpg)'
- en: A scatterplot titled time series of value by date time plots observation versus
    date time. (2014-07, 30000), (2014-08, 31000), (2014-11, 40000), (2015-01, 32000),
    and (2015-02, 3000). Values are estimated.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 标题名为“按日期时间值的时间序列”的散点图绘制观察值与日期时间的对比。（2014-07，30000），（2014-08，31000），（2014-11，40000），（2015-01，32000）和（2015-02，3000）。值是估计的。
- en: Figure 9-38
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-38
- en: The identified anomalies using the TCN’s predictions
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 使用TCN预测识别出的异常
- en: Figure [9-38](#Fig41) shows that quite a few points are labeled as anomalies.
    Most importantly, the model managed to predict as anomalies Thanksgiving, Christmas,
    New Year’s Eve, and a snowstorm-type weather anomaly, among some other points.
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 图[9-38](#Fig41)显示，相当多的点被标记为异常。最重要的是，模型成功地预测了感恩节、圣诞节、除夕和类似暴风雪的天气异常，以及其他一些点。
- en: Overall, this was an example of **unsupervised anomaly detection**. We took
    a subset of the original sequence, trained the model to output a prediction given
    rolling windows, and calculated a threshold by which we can identify anomalies.
    None of the steps in this process involved a training label.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 总体来说，这是一个**无监督异常检测**的例子。我们取了原始序列的一个子集，训练模型在给定滚动窗口的情况下输出预测，并通过计算一个阈值来识别异常。在这个过程中，没有任何步骤涉及到训练标签。
- en: For our next example, we will be implementing the encoder-decoder temporal convolutional
    network, essentially combining the TCN with the concept of an autoencoder to perform
    unsupervised anomaly detection.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一个例子中，我们将实现编码器-解码器时间卷积网络，本质上是将TCN与自动编码器的概念相结合，以执行无监督异常检测。
- en: Encoder-Decoder Temporal Convolutional Network
  id: totrans-283
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 编码器-解码器时间卷积网络
- en: The version of the encoder-decoder TCN (ED-TCN) we will be exploring involves
    a combination of one-dimensional causal convolutional and pooling layers to encompass
    the encoding stage, and a series of upsampling and one-dimensional causal convolutional
    layers to comprise the decoding stage. The convolutional layers in this model
    aren’t dilated, but they still count as layers of a TCN. To better understand
    the structure of this model, take a look at Figure [9-39](#Fig42).
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将要探索的编码器-解码器TCN（ED-TCN）版本涉及一维因果卷积和池化层的组合，以涵盖编码阶段，以及一系列上采样和一维因果卷积层，以组成解码阶段。这个模型中的卷积层没有扩张，但它们仍然算作TCN的层。为了更好地理解这个模型的结构，请参考图[9-39](#Fig42)。
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig42_HTML.jpg)'
  id: totrans-285
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig42_HTML.jpg)'
- en: An interconnected link chart of decoding and encoding stages. The chart has
    six layers of output, softmax, con v 2, up sample 2, con v 1, and up sample 1
    in the decoding stage. In the encoding stage, there are five layers of pool 2,
    con v 2, pool 1, con v 1, and input.
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 解码和编码阶段的相互连接链接图。该图有六个输出层，解码阶段有softmax、con v 2、up sample 2、con v 1和up sample
    1。在编码阶段，有五个层：pool 2、con v 2、pool 1、con v 1和输入。
- en: Figure 9-39
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-39
- en: In both the encoding and decoding stages, the model is comprised of causal convolutional
    layers, and is structured so that the layers are always causal
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 在编码和解码阶段，模型由因果卷积层组成，并且结构是这样的，即层总是因果的。
- en: The diagram might seem pretty complicated, so let’s break it down layer by layer.
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 这个图可能看起来相当复杂，所以让我们一层层地分解它。
- en: First, look at the encoding stage and start with the input layer at the very
    bottom. From this layer, we perform a **causal convolution** on the input as part
    of the first convolutional layer. The outputs of the first convolutional layer,
    which we will call `conv_1`, are now the inputs of the first **max pooling layer**,
    which we will call `pool_1`.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，看看编码阶段，并从最底层的输入层开始。从这个层开始，我们执行输入的**因果卷积**，作为第一卷积层的一部分。我们称之为 `conv_1` 的第一卷积层的输出现在成为第一个**最大池化层**的输入，我们称之为
    `pool_1`。
- en: Recall from Chapter [3](483137_2_En_3_Chapter.xhtml) that the pooling layer
    emphasizes the maximum value in the areas it passes through, effectively generalizing
    the inputs by choosing the heaviest values. From here, we have another set of
    causal convolutions and max pooling with layers `conv_2` and `pool_2`. Note the
    progressive reduction in size of the data as it passes through the encoding stage,
    a feature characteristic to autoencoders. Finally, we have a dense layer in the
    middle of the two stages, representing the final, encoded output of the encoding
    stage, as well as the encoded input of the decoding stage.
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 回想第 [3](483137_2_En_3_Chapter.xhtml) 章的内容，池化层强调它通过区域的最大值，通过选择最大值有效地泛化输入。从这里，我们又有另一组因果卷积和最大池化，层
    `conv_2` 和 `pool_2`。注意数据在编码阶段通过时尺寸的逐渐减小，这是自动编码器的特征之一。最后，我们在两个阶段中间有一个密集层，代表编码阶段的最终、编码输出，以及解码阶段的编码输入。
- en: The decoding stage is a bit different in this case, since we make use of what
    is called **upsampling**. Upsampling is a technique in which we repeat the data
    **n** number of times to scale it up by a factor **n**. In the max pooling layers,
    the data was reduced by a factor of 2\. So, to upsample and increase the data
    by the same factor of 2, we repeat the data twice. In this case, we are using
    one-dimensional upsampling, so the layer would repeat each step **n** times with
    respect to the axis of time. To get a better understanding of what upsampling
    does, let’s apply one-dimensional upsampling as shown in Figure [9-40](#Fig43)
    and Figure [9-41](#Fig44).
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，解码阶段略有不同，因为我们使用了所谓的**上采样**。上采样是一种技术，我们将数据重复 n 次以将其按 n 倍放大。在最大池化层中，数据减少了
    2 倍。因此，为了以相同的 2 倍因子上采样并增加数据，我们需要将数据重复两次。在这种情况下，我们使用一维上采样，因此该层将根据时间轴重复每个步骤 n 次。为了更好地理解上采样做什么，让我们应用如图
    [9-40](#Fig43) 和图 [9-41](#Fig44) 所示的一维上采样。
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig44_HTML.jpg)'
  id: totrans-293
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig44_HTML.jpg)'
- en: A three-line text reads as follows. Line 1, n equals 2\. Line 2, so data increases
    by a factor of 2 forward-slash. Line 3, repeat each step two times.
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 一个三行文本的读取方式如下。第 1 行，n 等于 2。第 2 行，所以数据增加 2 倍。第 3 行，重复每个步骤两次。
- en: Figure 9-41
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-41
- en: The upsampling factor n
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 上采样因子 n
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig43_HTML.jpg)'
  id: totrans-297
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig43_HTML.jpg)'
- en: X equals left square bracket 4 2 6 7 1 6 9 right square bracket.
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: X 等于左方括号 4 2 6 7 1 6 9 右方括号。
- en: Figure 9-40
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-40
- en: A vector x defined with the corresponding values
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 定义了相应值的向量 x
- en: Keeping in mind that each individual temporal step is repeated twice, we would
    see something like procedure shown in Figure [9-42](#Fig45), Figure [9-43](#Fig46),
    and Figure [9-44](#Fig47).
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 记住每个单独的时间步骤重复两次，我们会看到如图 [9-42](#Fig45)、图 [9-43](#Fig46) 和图 [9-44](#Fig47) 所示的程序。
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig47_HTML.jpg)'
  id: totrans-302
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig47_HTML.jpg)'
- en: A two-line vector input reads as follows. Line 1, left square bracket 4 4 2
    2 6 6 right square bracket. Line 2, left square bracket 4 2 6 7 1 6 9 5 right
    square bracket. An arrow from 6 of line 2 splits and points to 6 6 in line 1.
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 一个两行向量输入的读取方式如下。第 1 行，左方括号 4 4 2 2 6 6 右方括号。第 2 行，左方括号 4 2 6 7 1 6 9 5 右方括号。从第
    2 行的 6 出发的一条箭头分支并指向第 1 行的 6 6。
- en: Figure 9-44
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-44
- en: This process is repeated with the third entry in the input vector to form the
    next third pair of entries in the output vector
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 此过程与输入向量的第三个条目重复，以形成输出向量中的下一个第三个条目对。
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig46_HTML.jpg)'
  id: totrans-306
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig46_HTML.jpg)'
- en: A two-line vector input reads as follows. Line 1, left square bracket 4 4 2
    2 right square bracket. Line 2, left square bracket 4 2 6 7 1 6 9 5 right square
    bracket. An arrow from 2 of line 2 splits and points to 2 2 in line 1.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 一个两行向量输入的读取方式如下。第 1 行，左方括号 4 4 2 2 右方括号。第 2 行，左方括号 4 2 6 7 1 6 9 5 右方括号。从第 2
    行的 2 出发的一条箭头分支并指向第 1 行的 2 2。
- en: Figure 9-43
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-43
- en: The next entry is repeated twice to form the next two entries in the output
    vector of the upsampling operation
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个条目被重复两次，以形成上采样操作输出向量中的下一个两个条目
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig45_HTML.jpg)'
  id: totrans-310
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig45_HTML.jpg)'
- en: A two-line vector input reads as follows. Line 1, left square bracket 4 4 right
    square bracket. Line 2, left square bracket 4 2 6 7 1 6 9 5 right square bracket.
    An arrow from 4 of line 2 splits and points to 4 4 in line 1.
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 一个两行向量输入的读取方式如下。第 1 行，左方括号 4 4 右方括号。第 2 行，左方括号 4 2 6 7 1 6 9 5 右方括号。从第 2 行的
    4 出发，箭头分裂并指向第 1 行的 4 4。
- en: Figure 9-42
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-42
- en: The first entry in the input is repeated twice to form the first two entries
    in the upsampled output vector
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 输入的第一个条目被重复两次，以形成上采样输出向量的前两个条目
- en: This continues until we finally get to the result shown in Figure [9-45](#Fig48).
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 这一直持续到我们最终得到图 [9-45](#Fig48) 所示的结果。
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig48_HTML.jpg)'
  id: totrans-315
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig48_HTML.jpg)'
- en: A two-line vector input reads as follows. Line 1, left square bracket 4 4 2
    2 6 6 7 7 1 1 6 6 9 9 5 5 right square bracket. Line 2, left square bracket 4
    2 6 7 1 6 9 5 right square bracket.
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 一个两行向量输入的读取方式如下。第 1 行，左方括号 4 4 2 2 6 6 7 7 1 1 6 6 9 9 5 5 右方括号。第 2 行，左方括号 4
    2 6 7 1 6 9 5 右方括号。
- en: Figure 9-45
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-45
- en: The output vector after the upsampling operation compared to the original input
    vector below it
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 与下面原始输入向量相比，上采样操作后的输出向量
- en: Going back to the model, each upsampling layer is then connected to a one-dimensional
    convolutional layer, and the pair of upsampling layer and one-dimensional convolutional
    layer repeats again until the final output is passed through a `softmax()` function
    to result in the output/prediction.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 回到模型，每个上采样层随后连接到一个一维卷积层，上采样层和一维卷积层的这对组合再次重复，直到最终输出通过 `softmax()` 函数传递，从而得到输出/预测。
- en: Anomaly Detection with the ED-TCN
  id: totrans-320
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用 ED-TCN 进行异常检测
- en: Let’s put this model to the test by applying it to the credit card dataset.
    Once again, this example will be another instance of **unsupervised learning**,
    so we will not have any anomaly or normal data labeled. Follow along with the
    notebook at [`https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%209%20Temporal%20Convolutional%20Networks/chapter9_ed_tcn.ipynb`](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%209%20Temporal%20Convolutional%20Networks/chapter9_ed_tcn.ipynb).
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们将这个模型应用于信用卡数据集进行测试。再次强调，这个例子将是另一个**无监督学习**的实例，因此我们不会有任何异常或正常数据被标记。请参考笔记本
    [https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%209%20Temporal%20Convolutional%20Networks/chapter9_ed_tcn.ipynb](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%209%20Temporal%20Convolutional%20Networks/chapter9_ed_tcn.ipynb)。
- en: The data is also available on GitHub. Much of the following code is very similar
    to the earlier dilated TCN example.
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 数据也可在 GitHub 上找到。以下代码的大部分与之前扩展的 TCN 示例非常相似。
- en: First, import all of the necessary packages, as shown in Figure [9-46](#Fig49).
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，导入所有必要的包，如图 [9-46](#Fig49) 所示。
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig49_HTML.png)'
  id: totrans-324
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig49_HTML.png)'
- en: A 27-line code imports various libraries and checks their versions. It includes
    a Tensor Flow module, s k-learn, and libraries like Mat plot lib and Seaborn.
    The code checks and prints the versions of Python and TensorFlow. The percent
    mat plot lib inline magic command is used for inline plotting.
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 一段 27 行的代码导入各种库并检查它们的版本。它包括 Tensor Flow 模块、s k-learn 以及 Mat plot lib 和 Seaborn
    等库。代码检查并打印 Python 和 TensorFlow 的版本。使用 percent mat plot lib 内联魔法命令进行内联绘图。
- en: Figure 9-46
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-46
- en: Importing all of the necessary packages
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 导入所有必要的包
