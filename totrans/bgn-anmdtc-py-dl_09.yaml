- en: Let’s now create the training dataset. We will be using a rolling-window approach
    and a window size of `time_steps`, which we will shorthand to **T** in this explanation.
    We will iterate through the dataset a window length of T at a time, taking the
    first T-1 values as the x and the T^(th) values as the y. We will teach the model
    to read an input of T-1 values and predict the T^(th). Refer to Figure [9-25](#Fig26).
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig26_HTML.png)'
  id: totrans-176
  prefs: []
  type: TYPE_IMG
- en: A 15-line code generates rolling window sequences from a time series data column
    scaled value in d f. The variable time steps are set to 16\. The code iterates
    through the time series data, creating windows of length for time steps. The resulting
    arrays are then printed.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
- en: Figure 9-25
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
- en: Creating the rolling-window features to feed into the model
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have our data created, let’s define the model architecture. Refer
    to Figure [9-26](#Fig27).
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig27_HTML.png)'
  id: totrans-181
  prefs: []
  type: TYPE_IMG
- en: A 30-line code to define the T C N model using Kernel for processing time series
    data. The model comprises a series of Con v 1 D. After each convolutional layer,
    a dropout layer, Spatial Dropout 1 D is applied. The convolutional layer includes
    parameters like filter size, dilation rate, and more.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
- en: Figure 9-26
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
- en: Defining the TCN architecture
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
- en: 'There are a lot of new parameters to specify:'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
- en: '`kernel_size`: This controls the length of each filter that is being applied
    over the data.'
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`dilation_rate`: This controls d, the dilation size.'
  id: totrans-187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`padding`: Set to `''causal''`, this specifies that we want a causal layer,
    not an acausal layer.'
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`strides`: The stride length. Set to `1`, this means each filter shifts over
    by one value of the input data once it’s done with its computation. It’s like
    the rolling-window code described earlier in that each consecutive window is one
    stride or value apart.'
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`kernel_regularizer`: Specifying the L2 regularization prevents overfitting.'
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`kernel_initializer`: Set to `''he_normal''`, we are initializing the weights
    using the Kaiming/He normal method. This helps with training stability with networks
    that rely on ReLU activation functions.'
  id: totrans-191
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We have also added `SpatialDropout1D` layers, which act as dropout layers for
    one-dimensional CNN settings and helps with the regularization of the model.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
- en: The `Flatten` layer simply concatenates all of the outputs of the previous layer
    to make it one-dimensional into a (batch_size, 1) shape.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
- en: Let’s now compile the model and print the architecture. Refer to Figure [9-27a](#Fig28).
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig28_HTML.png)'
  id: totrans-195
  prefs: []
  type: TYPE_IMG
- en: A 4-line code configures and compiles a previously defined T C N model. The
    chosen optimizer is adam and the loss function for training is set to mean absolute
    error. The code prints a summary of the T C N model using the summary method.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
- en: Figure 9-27a
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
- en: Compiling the model to use the Adam optimizer and mean absolute error as the
    loss function
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
- en: You should see output like that shown in Figure [9-27b](#Fig29).
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig29_HTML.png)'
  id: totrans-200
  prefs: []
  type: TYPE_IMG
- en: The output architecture represents a summary of a model named Model 1 for processing
    time series data. The summary provides information about each layer in the model,
    including its type, output shape, and the number of parameters.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
- en: Figure 9-27b
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
- en: The output architecture printed out
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
- en: Let’s initiate the training process. Refer to Figure [9-28](#Fig30).
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig30_HTML.png)'
  id: totrans-205
  prefs: []
  type: TYPE_IMG
- en: A 17-line code prepares and trains a T C N model on time series data. The training
    process is initiated using the fit method, specifying the training input training
    x and target output timing y, along with parameters like batch size, number of
    epochs, and a validation dataset.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
- en: Figure 9-28
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
- en: Specifying the training dataset to be half of the total dataset to teach the
    model what is normal before predicting on the entire dataset later on. This also
    specifies the training loop
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
- en: The output should look somewhat like Figure [9-29](#Fig31).
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig31_HTML.png)'
  id: totrans-210
  prefs: []
  type: TYPE_IMG
- en: The output provides an overview of the data shapes and the training progress
    of the T C N model. It includes key metrics such as loss and mean absolute error,
    offering insights into the model's performance during training and validation.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
- en: Figure 9-29
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
- en: The output of the training code, with some of the outputs removed for a clearer
    display
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
- en: One thing to note about TCN/one-dimensional CNNs in general is that they tend
    to be a bit sensitive, meaning that sometimes the training completely fails and
    the CNN just produces a straight-line output. The He Normal initialization technique
    should help combat this collapse, but sometimes you’ll just need to retrain the
    model to achieve a convergence.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
- en: If your results are not satisfactory or are a failure, feel free to rerun the
    model training a few times if necessary. Because neural networks in general depend
    on random weight initializations that are not privy to the geometry of the loss
    curve, they can get trapped into reaching suboptimal convergences or even a divergence.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
- en: With the training completed, let’s move on to making the predictions. Execute
    the code shown in Figure [9-30](#Fig32).
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig32_HTML.png)'
  id: totrans-217
  prefs: []
  type: TYPE_IMG
- en: An 11-line code evaluates the performance of a trained T C N model on a testing
    dataset. It uses the M S E metric to quantify the difference between the sequences
    y and the testing pred. The code calculates the errors by subtracting the predicted
    values from the actual values.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
- en: Figure 9-30
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
- en: Making predictions using the trained model
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
- en: 'If all went well during training, the output should look something like the
    following:'
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-222
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Let’s now calculate the distance cutoffs to determine the anomaly threshold.
    Refer to Figure [9-31](#Fig33).
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig33_HTML.png)'
  id: totrans-224
  prefs: []
  type: TYPE_IMG
- en: A 13-line code based on cutoff after sorting errors is used to calculate the
    threshold using training error and calculate the total error over the full sequence.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
- en: Figure 9-31
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
- en: Calculating the threshold for maximum prediction error that’s still normal
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
- en: 'You should see output like this:'
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-229
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Your determined threshold may differ, as it all depends on the model training
    process.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
- en: Let’s now plot the model’s predictions. Refer to Figure [9-32a](#Fig34) and
