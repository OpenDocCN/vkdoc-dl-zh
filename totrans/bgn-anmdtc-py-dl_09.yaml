  prefs: []
  type: TYPE_NORMAL
  zh: 使用滤波器权重计算输出向量的第一个条目的方法。滤波器权重与输入的前三个条目逐元素相乘，然后将结果相加以产生输出值。
- en: 'Now, we have the output of the one-dimensional convolutional layer. These one-dimensional
    convolutional layers are quite similar to how two-dimensional convolutional layers
    work, and they comprise nearly the entirety of the two different TCNs we will
    look at: the **dilated temporal convolutional network**, and the **encoder-decoder
    temporal convolutional network**. It is important to note that both models involve
    **supervised anomaly detection**, though the encoder-decoder TCN is capable of
    semi-supervised anomaly detection since it is an autoencoder.'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们有一维卷积层的输出。这些一维卷积层与二维卷积层的工作方式非常相似，并且构成了我们将要查看的两个不同TCN的几乎全部：**膨胀时间卷积网络**和**编码器-解码器时间卷积网络**。重要的是要注意，这两个模型都涉及**监督异常检测**，尽管编码器-解码器TCN能够进行半监督异常检测，因为它是一个自编码器。
- en: Dilated Temporal Convolutional Network
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 膨胀时间卷积网络
- en: In this type of TCN, we deal with a new property known as a **dilation**. Basically,
    when the dilation factor is greater than 1, we introduce gaps in the output data
    that correspond to the dilation factor. To understand the concept of dilation
    better, let’s look at how it works for a **two-dimensional convolutional layer**.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种类型的TCN中，我们处理一种称为**膨胀**的新属性。基本上，当膨胀因子大于1时，我们在输出数据中引入与膨胀因子相对应的间隔。为了更好地理解膨胀的概念，让我们看看它对于一个**二维卷积层**是如何工作的。
- en: This is a standard convolution, equivalent to what we looked at in Chapter [3](483137_2_En_3_Chapter.xhtml).
    You can also think of a standard convolutional layer as having a **dilation factor**
    of 1 (refer to Figure [9-7](#Fig7)).
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个标准卷积，与我们第[3](483137_2_En_3_Chapter.xhtml)章中看到的是等效的。你也可以将标准卷积层视为具有**膨胀因子**为1（参见图[9-7](#Fig7)）。
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig7_HTML.jpg)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig7_HTML.jpg)'
- en: To the left, there is a 5 times 5 grid, with highlighted sections in columns
    1 and 2, as well as rows 1 and 2\. On the right is a corresponding feature map
    with a 4 times 4 layout. The highlighted box in column 1, row 1 on the right serves
    as an illustration of the highlighted boxes on the left.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在左侧，有一个5x5的网格，1列和2列以及1行和2行的部分被突出显示。在右侧是相应的4x4布局的特征图。右侧1列1行的突出显示框是左侧突出显示框的示意图。
- en: Figure 9-7
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-7
- en: A standard convolution with a dilation factor of 1
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 膨胀因子为1的标准卷积
- en: Now, let’s look at what happens when we increase the dilation factor to 2.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们看看当我们将膨胀因子增加到2时会发生什么。
- en: For the first entry in the feature map, the convolution looks like Figure [9-8](#Fig8).
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 对于特征图中的第一个条目，卷积看起来像图[9-8](#Fig8)。
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig8_HTML.jpg)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig8_HTML.jpg)'
- en: To the left, there is a 5 times 5 grid, with highlighted sections in columns
    1 and 3, as well as rows 1 and 3\. On the right is a corresponding feature map
    with a 3 times 3 layout. The highlighted box in column 1, row 1, on the right
    serves as an illustration of the highlighted boxes on the left.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 在左侧，有一个5x5的网格，1列和3列以及1行和3行的部分被突出显示。在右侧是相应的3x3布局的特征图。右侧1列1行的突出显示框是左侧突出显示框的示意图。
- en: Figure 9-8
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-8
- en: A standard convolution with a dilation factor of 2 defining the first entry
    in the feature map
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 使用膨胀因子为2的标准卷积定义特征图中的第一个条目
- en: Notice that the spacing between each sampled entry has increased by one across
    all directions. Vertically, horizontally, and diagonally, the sampled entries
    are all spaced apart by one entry. Essentially, this spacing is determined by
    finding what **d – 1** is, where **d** is the **dilation factor**. For a dilation
    factor of 3, this spacing will be two apart. Now, for the second entry, the convolution
    process proceeds as normal, as shown in Figure [9-9](#Fig9).
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 注意到每个采样条目之间的间隔在所有方向上增加了1。垂直、水平和对角线上，采样条目都间隔一个条目。本质上，这个间隔是通过找到**d – 1**来确定的，其中**d**是**膨胀因子**。对于3的膨胀因子，这个间隔将是两个条目。现在，对于第二个条目，卷积过程按正常进行，如图[9-9](#Fig9)所示。
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig9_HTML.jpg)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig9_HTML.jpg)'
- en: To the left, there is a 5 times 5 grid, with highlighted sections in columns
    2 and 4, as well as rows 1 and 3\. On the right is a corresponding feature map
    with a 3 times 3 layout. The highlighted box in column 2, row 1, on the right
    serves as an illustration of the highlighted boxes on the left.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 在左侧，有一个5乘5的网格，列2和列4以及行1和行3的部分被突出显示。在右侧是一个相应的3乘3布局的特征图。右侧列2，行1中突出显示的框是左侧突出显示框的说明。
- en: Figure 9-9
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-9
- en: The convolution with a dilation factor of 2 defining the second entry in the
    feature map
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 定义特征图第二个条目的具有2倍膨胀因子的卷积
- en: Once the process terminates, we will have our feature map. Notice the reduction
    in dimensionality of the feature map, which is a direct result of increasing the
    dilation factor. In the standard two-dimensional convolutional layer, we had a
    4×4 feature map since the dilation factor was 1, but now we have a 3×3 feature
    map after increasing this factor to 2.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦过程结束，我们将得到我们的特征图。注意特征图维度的减少，这是增加膨胀因子的直接结果。在标准的二维卷积层中，由于膨胀因子为1，我们有一个4×4的特征图，但现在在将这个因子增加到2后，我们有一个3×3的特征图。
- en: A one-dimensional dilated convolution is similar. Let’s revisit the one-dimensional
    convolution example from earlier and modify it a bit to illustrate this concept.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 一维膨胀卷积类似。让我们回顾一下之前的一维卷积示例，并稍作修改来阐述这个概念。
- en: Assume now that the new input vector and filter weights are as shown in Figure
    [9-10](#Fig10) and Figure [9-11](#Fig11).
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 假设现在新的输入向量和滤波器权重如图[9-10](#Fig10)和图[9-11](#Fig11)所示。
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig11_HTML.jpg)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig11_HTML.jpg)'
- en: An input vector for filter weights reads as follows. Left square bracket 0.5
    0.2 0.4 right square bracket.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 滤波器权重的输入向量读作如下。左方括号0.5 0.2 0.4右方括号。
- en: Figure 9-11
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-11
- en: The new filter weights
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 新的滤波器权重
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig10_HTML.jpg)'
  id: totrans-81
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig10_HTML.jpg)'
- en: X equals left square bracket 2 8 12 4 6 4 2 12 right square bracket.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: X等于左方括号2 8 12 4 6 4 2 12右方括号。
- en: Figure 9-10
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-10
- en: The new input vector weights
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 新的输入向量权重
- en: Let’s also assume now that the dilation factor is 2, not 1\. The new output
    vector would be the following, using dilated one-dimensional convolutions with
    a dilation factor of 2 (Figure [9-12](#Fig12), Figure [9-13](#Fig13), Figure [9-14](#Fig14),
    and Figure [9-15](#Fig15)).
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 现在也假设膨胀因子是2，而不是1。新的输出向量如下，使用具有2倍膨胀因子的膨胀一维卷积（图[9-12](#Fig12)、图[9-13](#Fig13)、图[9-14](#Fig14)和图[9-15](#Fig15)）。
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig15_HTML.jpg)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig15_HTML.jpg)'
- en: An illustration of the input and output vectors of filter weights. Input includes
    values of 2 8 12 4 6 4 2 12\. Filter weight includes 0.5, 0.2, and 0.4\. The summed
    value after filtering includes 2 plus 0.8 plus 4.8\. Output includes 5.8, 6.4,
    8, and 7.6.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 滤波器权重的输入和输出向量的示意图。输入包括2 8 12 4 6 4 2 12的值。滤波器权重包括0.5、0.2和0.4。过滤后的总和包括2加0.8加4.8。输出包括5.8、6.4、8和7.6。
- en: Figure 9-15
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-15
- en: The final set of three input vector values are multiplied with the filter weights
    to produce the last output vector value
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 最后的三组输入向量值与滤波器权重相乘，以产生最后一个输出向量值
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig14_HTML.jpg)'
  id: totrans-90
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig14_HTML.jpg)'
- en: An illustration of the input and output vectors of filter weights. Input includes
    values of 2 8 12 4 6 4 2 12\. The spacing between the values is 1\. Filter weight
    includes 0.5, 0.2, and 0.4\. The summed value after filtering includes 6 plus
    1.2 plus 0.8\. Output includes 5.8, 6.4, and 8.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 过滤器权重输入和输出向量的示意图。输入包括2、8、12、4、6、4、2、12的值。值之间的间隔为1。过滤器权重包括0.5、0.2和0.4。过滤后的总和值为6加1.2加0.8。输出包括5.8、6.4和8。
- en: Figure 9-14
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-14
- en: The third set of three input vector values are multiplied with the filter weights
    to produce the next output vector value
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 第三组三个输入向量值与过滤器权重相乘，以产生下一个输出向量值
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig13_HTML.jpg)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig13_HTML.jpg)'
- en: An illustration of the input and output vectors of filter weights. Input includes
    values of 2 8 12 4 6 4 2 12\. Filter weight includes 0.5, 0.2, and 0.4\. The summed
    value after filtering includes 4 plus 0.8 plus 1.6\. The output includes 5.8 and
    6.4.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 过滤器权重输入和输出向量的示意图。输入包括2、8、12、4、6、4、2、12的值。过滤器权重包括0.5、0.2和0.4。过滤后的总和值为4加0.8加1.6。输出包括5.8和6.4。
- en: Figure 9-13
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-13
- en: The next set of three input vector values are multiplied with the filter weights
    to produce the next output vector value
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来的三个输入向量值与过滤器权重相乘，以产生下一个输出向量值
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig12_HTML.jpg)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig12_HTML.jpg)'
- en: An illustration of the input and output vectors of filter weights. Input includes
    values of 2 8 12 4 6 4 2 12\. The spacing between the values is 1\. Filter weight
    includes 0.5, 0.2, and 0.4\. The summed value after filtering includes 1 plus
    2.4 plus 2.4\. The output includes 5.8.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 过滤器权重输入和输出向量的示意图。输入包括2、8、12、4、6、4、2、12的值。值之间的间隔为1。过滤器权重包括0.5、0.2和0.4。过滤后的总和值为1加2.4加2.4。输出包括5.8。
- en: Figure 9-12
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-12
- en: Calculating the first entry in the output factor using dilated one-dimensional
    convolutions with a dilation factor of 2
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 使用扩张因子为2的一维扩张卷积计算输出因子的第一个条目
- en: Now that we’ve covered what a dilated convolution looks like in the context
    of one-dimensional convolutions, let’s look at the difference between an acausal
    and a causal dilated convolution. To illustrate this concept, assume that both
    examples that follow are referring to a set of dilated one-dimensional convolutional
    layers.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经讨论了在单维卷积的上下文中扩张卷积的样子，让我们看看无因果和因果扩张卷积之间的区别。为了说明这个概念，假设以下两个例子都是指一组扩张单维卷积层。
- en: With that in mind, Figure [9-16](#Fig16) shows what an acausal dilated network
    looks like.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 有了这个前提，图[9-16](#Fig16)展示了无因果扩张网络的样子。
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig16_HTML.jpg)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig16_HTML.jpg)'
- en: An acausal dilated network has four layers that form distinct nodes highlighted
    within sections of a horizontal rectangle. Starting from the top, these layers
    are organized as follows. The output layer, hidden layer 2, hidden layer 1, and
    the input layer.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 一个无因果扩张网络有四层，这些层在水平矩形的各个部分形成不同的节点，节点被突出显示。从顶部开始，这些层组织如下。输出层、隐藏层2、隐藏层1和输入层。
- en: Figure 9-16
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-16
- en: An acausal dilated network. The first hidden layer has a dilation factor of
    2, and the second hidden layer has a dilation factor of 4\. Notice how inputs
    “forward in the sequence” contribute to the next layer’s node as well
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 无因果扩张网络。第一隐藏层的扩张因子为2，第二隐藏层的扩张因子为4。注意输入“按序列向前”如何对下一层的节点做出贡献
- en: It might not be that apparent from the way the architecture is structured, but
    if you think of the input layer as a sequence of some data going forward in time,
    you might be able to see that information from the future would be accounted for
    when selecting the output. In a causal network, we only want information that
    we’ve learned up until the present, so none of the information from the future
    will be accounted for in the model’s predictions. Figure [9-17](#Fig17) shows
    what a causal dilated network looks like.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 从架构的结构来看，可能不是很明显，但如果你把输入层想象成一些数据按时间顺序向前推进的序列，你可能能够看到在选择输出时将考虑未来的信息。在因果网络中，我们只想了解我们直到现在的信息，所以模型预测中不会考虑未来的任何信息。图[9-17](#Fig17)展示了因果扩张网络的样子。
- en: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig17_HTML.jpg)'
  id: totrans-109
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig17_HTML.jpg)'
- en: An acausal dilated network has four layers that form distinct nodes highlighted
    within sections of a horizontal rectangle. Starting from the top, these layers
    are organized as follows. The output layer, hidden layer 2, hidden layer 1, and
    the input layer.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 无因果扩张网络有四层，形成在水平矩形部分中突出显示的独立节点。从顶部开始，这些层组织如下。输出层、隐藏层2、隐藏层1和输入层。
- en: Figure 9-17
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-17
- en: A causal dilated network. The first hidden layer has a dilation factor of 2,
    and the second hidden layer has a dilation factor of 4\. Notice how no inputs
    forward in the sequence contribute to the next layer’s node. This type of structure
    is ideal if the goal is to preserve some sort of flow within the data set, which
    is time in our case
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 因果扩张网络。第一隐藏层具有2的扩张因子，第二隐藏层具有4的扩张因子。注意在序列中没有任何输入向前传递以贡献给下一层的节点。如果目标是保留数据集中某种类型的流动，那么这种结构是理想的，在我们的例子中是时间。
- en: This shows how the linear nature of time is preserved in the model, and how
    no information from the future would be learned by the model. In causal networks,
    only information from the past until the present is considered by the model. The
    dilated temporal convolutional network we are referring to has a similar model
    architecture, utilizing dilated causal convolutions in each layer preceding the
    output layer.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 这显示了模型中时间的线性性质是如何被保留的，以及模型不会学习到未来的任何信息。在因果网络中，模型只考虑从过去到现在的信息。我们所说的扩张时间卷积网络具有类似的模型架构，在每个输出层之前的每一层都利用扩张因果卷积。
- en: The TCN can be used for supervised, semi-supervised, and unsupervised tasks,
    much like the LSTM and RNNs in general, for any task that involves sequences,
    whether it’s a time series, a sequence of video frames, or even geospatial coordinate
    data.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: TCN可以用于监督、半监督和无监督任务，就像一般的LSTM和RNNs一样，对于任何涉及序列的任务，无论是时间序列、视频帧序列，甚至是地理空间坐标数据。
- en: Anomaly Detection with the Dilated TCN
  id: totrans-115
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用扩张TCN进行异常检测
- en: Now that you know more about what a TCN is and how it works, let’s try applying
    a dilated TCN to the New York taxi dataset to see how it performs **unsupervised
    anomaly detection** in a time-series setting. Much like in the LSTM example from
    Chapter [8](483137_2_En_8_Chapter.xhtml), the TCN will be trained to predict the
    T^(th) time step’s value given the time step values from 1 to T-1, where T is
    some window size. An example would be using the first 15 values to predict the
    16^(th) value. Similarly, we will train it on the first half of the time series
    on strictly normal data. We will set the error threshold (95^(th) percentile error
    on the training set, so top 5% largest error) on the training prediction errors
    as the anomaly threshold. Any points with prediction errors given by the mean
    absolute error between predicted time-series values and actual time-series values
    higher than this threshold are counted as anomalies. As no labels are required
    for training, this is an unsupervised learning task.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经了解了TCN是什么以及它是如何工作的，让我们尝试将扩张TCN应用于纽约出租车数据集，看看它在时间序列设置中的**无监督异常检测**表现如何。与第[8](483137_2_En_8_Chapter.xhtml)章中的LSTM示例类似，TCN将被训练来预测第T个时间步的值，给定从1到T-1的时间步值，其中T是某个窗口大小。一个例子是使用前15个值来预测第16个值。同样，我们将在严格正常数据的时间序列的前半部分对其进行训练。我们将设置训练预测误差的误差阈值（训练集的第95百分位误差，即最大的5%误差）作为异常阈值。任何预测误差（预测时间序列值与实际时间序列值之间的平均绝对误差）高于此阈值的点都被计为异常。由于训练不需要标签，这是一个无监督学习任务。
- en: The reasoning for training only on the first half of the sequence is to teach
    the model what normal time-series values look like before we predict on the latter
    half with anomalies. The idea is that the predicted value will not match the anomaly,
    producing a higher error and being flagged as an anomaly. Since no labels are
    required for anomaly detection, this is an unsupervised learning task.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 仅在序列的前半部分进行训练的理由是，在我们用异常值预测后半部分之前，教会模型正常时间序列值看起来像什么。想法是预测值不会与异常值匹配，产生更高的错误并被标记为异常。由于异常检测不需要标签，这是一个无监督学习任务。
