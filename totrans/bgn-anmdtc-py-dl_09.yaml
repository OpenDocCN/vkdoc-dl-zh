- en: 9. Temporal Convolutional Networks
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 9. 时间卷积网络
- en: In this chapter, you will learn about temporal convolutional networks (TCNs).
    You will learn how TCNs work, how they can be used to detect anomalies, and how
    you can implement anomaly detection using a TCN.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你将了解时间卷积网络（TCNs）。你将学习TCNs是如何工作的，如何使用它们来检测异常，以及如何使用TCN实现异常检测。
