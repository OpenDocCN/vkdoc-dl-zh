  id: totrans-391
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_9_Chapter/483137_2_En_9_Fig58_HTML.png)'
- en: A 27-line code to pair causal 1-D convolutional layers and pooling layers comprising
    the encoding stage. The output of the encoding stage is provided.
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: 一段 27 行的代码用于配对编码阶段的因果 1-D 卷积层和池化层。编码阶段的输出已提供。
- en: Figure 9-54a
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-54a
- en: Defining the encoder portion of the ED-TCN architecture
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 定义 ED-TCN 架构的编码部分
- en: The `MaxPooling1D` layers apply a filter of length `pool_size=2`, moving through
    the data two at a time (as specified by `strides=2`). It picks the maximum value
    in the filter to pass through to the next layer. It has the effect of halving
    the data dimension (not the filters), so we are lowering not only the filter dimension
    space, but also the data dimension space itself.
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: '`MaxPooling1D` 层应用长度为 `pool_size=2` 的过滤器，每次移动两个数据点（如 `strides=2` 所指定）。它选择过滤器中的最大值传递到下一层。它具有将数据维度减半（不是过滤器）的效果，因此我们不仅降低了过滤器维度空间，也降低了数据维度空间本身。'
- en: We have an `UpSampling1D` layer in the decoder portion functions similarly to
    how we described UpSampling right before the coding section for the ED-TCN.
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 解码器部分有一个 `UpSampling1D` 层，其功能与我们描述的 ED-TCN 编码部分之前的 UpSampling 类似。
- en: Let’s now compile the model and print the architecture. Refer to Figure [9-55a](#Fig60).
