- en: 3. Neural Networks and Tabular Data
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The foundation of all technology is fire.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: —Isaac Asimov, Writer and Professor at Boston University
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Deep learning methods operate on entirely different concepts than classical
    machine learning algorithms introduced earlier. Neural networks are the core and
    foundation of deep learning and address many of the weaknesses of classical machine
    learning discussed toward the end of Chapter [1](525591_1_En_1_Chapter.xhtml).
    This chapter introduces you to the core theory and mathematics of deep learning,
    which operates on different paradigms than much of classical machine learning,
    as well as corresponding implementation in the popular and easy-to-approach deep
    learning framework Keras.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter will introduce you to neural networks from a mathematical perspective
    as well as corresponding implementation in the popular and easy-to-approach deep
    learning framework Keras. We will begin by exploring what neural networks are
    and the structure that enables their representation power. You’ll learn about
    defining and training Keras models but also discover that their performance is
    nowhere near their potential. Afterward, the chapter will dive deeper into the
    theory and mathematics behind the feed-forward and backpropagation processes.
    Along with that, you will learn the details of activation functions and why they
    play such a crucial role in unleashing the full power of neural networks. In the
    second part of the chapter, we will dive into more advanced neural network usage
    and manipulation, including training callbacks, the Keras functional API, and
    model weight sharing. Lastly, we will review several research papers demonstrating
    simple mechanisms to improve neural network performance on tabular data.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter sets the foundation of deep learning for the rest of the book!
    The following chapters rely upon a strong knowledge of the theory and tools discussed
    in this chapter.
  prefs: []
  type: TYPE_NORMAL
- en: What Exactly Are Neural Networks?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Machine learning surrounds the idea of generalization. The ability to adapt
    to and learn from similar but not identical situations is what differentiates
    machine learning from hard-coded algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: 'Take ourselves as an example: if we’re presented with two images that both
    resemble cats, even if the two images slightly differ in appearance, we’ll still
    be able to say that they are both cats confidently. Our minds can differentiate
    between the two images but also determine that they both are cats – this is a
    generalization. The brain achieves this by learning patterns that it is presented
    over our lifetime. Machine learning mimics this concept: algorithms learn from
    data and recognize patterns in order to generalize for data that they have never
    seen.'
  prefs: []
  type: TYPE_NORMAL
- en: The human brain consists of billions of neurons connected with each other by
    synapses, forming a very large network that controls our thinking and guides our
    actions. Our senses receive information and pass it to the brain; neurons process
    and transfer information between each other through electrical pulses and chemical
    signals. Afterward, the data is passed throughout our body to the nervous systems,
    which act upon the outputted information.
  prefs: []
  type: TYPE_NORMAL
- en: Each neuron in our body receives input and outputs its processed information.
    Perceptrons, mathematical models inspired by the neuron model of information processing,
    were proposed by Frank Rosenblatt in 1958 (long before the modern age of supercomputers).
    However, due to the technological limitations at that time, the full potential
    of perceptrons was not discovered. It was not until the 1980s, when more research
    was put into AI and machine learning, that the idea of a network of perceptions
    emerged. This is now known as an artificial neural network (Figure [3-1](#Fig1)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig1_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A diagram illustrates the conversion of one or more inputs into a single perceptron
    and the results in the output.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-1
  prefs: []
  type: TYPE_NORMAL
- en: The perceptron model
  prefs: []
  type: TYPE_NORMAL
- en: The core concept of a neural network mimics how human neurons connect and process
    information. Instead of electrical pulses, imagine each neuron stores a value
    that represents its ability and strength to communicate its information to other
    neighboring neurons (Figure [3-2](#Fig2)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig2_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A diagram presents a large number of neurons that depict several layers of input
    that are heavily interconnected from five neurons and reduce to one neuron as
    output.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-2
  prefs: []
  type: TYPE_NORMAL
- en: Simple illustration of a neural network
  prefs: []
  type: TYPE_NORMAL
- en: The network is structured into layers, with the first layer receiving inputs
    and the final one outputting results. Typically, each neuron in each layer is
    connected to every neuron in the previous and the next layer. Information flows
    forward from the first layer to the *n*^(*th*) layer. Every single connection
    differs from the other; some neurons may contribute more to the final prediction,
    while others may only affect a little bit. Information is passed through from
    layer to layer, from the input to the output. The training of neural networks
    happens through a process called backpropagation, which we will discuss in detail
    in later sections.
  prefs: []
  type: TYPE_NORMAL
- en: Neural Network Theory
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There are an absurd number of variations on the standard or so-called “classic”
    neural network. Some are going to be covered in this book, while others are left
    for you to explore on your own. The foundation that supports all these variations
    is known as the artificial neural network (ANN). Alternate names for ANN include
    multilayer perceptron (MLP) and fully connected network (FCN); these terms will
    be used interchangeably throughout the book. Understanding and learning to utilize
    the power of ANNs serve as a prerequisite to the endless land of deep learning.
  prefs: []
  type: TYPE_NORMAL
- en: Starting with a Single Neuron
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We start our understanding of neural networks with the simplest mathematical
    model of a neuron, a single perceptron with two inputs and one output. The neuron
    represents some function that combines the information from the two inputs and
    outputs a meaningful result (Figure [3-3](#Fig3)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig3_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Two neurons of input one and two convert into single perceptron and leads to
    the output.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-3
  prefs: []
  type: TYPE_NORMAL
- en: Demonstration of a perceptron model
  prefs: []
  type: TYPE_NORMAL
- en: Realistically, there would be some method for the perceptron model to learn
    from its mistakes and correct the output value. We can introduce adjustable weights
    that multiply with each value of the inputs, and the final output will be determined
    by the sum of each input multiplied by its weight. The weights of our “model”
    can be updated iteratively to produce the correct values for predictions. The
    process in which the weights update is currently unimportant to our current context.
    (We will discuss how weights are updated later in the chapter.) One additional
    improvement that we can implement is a trainable bias value. By shifting the weighted
    sum output by an optimal amount, we can ensure the network will be able to reach
    a wide variety of values, thus having the ability to model more complex functions
    (Figure [3-4](#Fig4)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig4_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Two neurons of weight one and two produce the sum of weight in addition to bias
    that results in the output.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-4
  prefs: []
  type: TYPE_NORMAL
- en: Perceptron model with weight and bias
  prefs: []
  type: TYPE_NORMAL
- en: 'We can extend our generalization of producing the output through a single perceptron
    into a mathematical formula where *x*[*i*] is the feature where *n* is the number
    of features, *w*[*i*] is the weight, and *b* is the bias:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \textrm{Output}=b+\sum \limits_{i=1}^n{x}_i{w}_i $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_Equa.png)'
  prefs: []
  type: TYPE_IMG
- en: Some may recognize that Linear Regression operates on similar concepts compared
    to the perceptron model described previously. The capability of Linear Regression
    is extremely limited as it can only model and understand linear relationships
    between variables, just like our simple perceptron model described previously.
    This is where the “network” in the neural network comes into play. With hundreds
    of neurons stacked into tens of layers, each layer processes different portions
    of the data, recognizing local patterns and combining information obtained by
    each layer or neuron.
  prefs: []
  type: TYPE_NORMAL
- en: Feed-Forward Operation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Expanding from the idea of a single neuron, we move onto a multilayer perceptron
    model or an ANN (Figure [3-5](#Fig5)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig5_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A diagram presents many neurons that depict several hidden layers of input that
    are heavily interconnected from five neurons and reduces to one neuron output.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-5
  prefs: []
  type: TYPE_NORMAL
- en: A simple neural network example
  prefs: []
  type: TYPE_NORMAL
- en: We consider each column of neurons to be a layer within the network, where the
    first layer receives input and the last outputs predictions. The number of features,
    or the dimension of the dataset, translates to the number of neurons in the input
    layer. In the case of regression, the output layer would contain a single neuron
    that produces a predicted value. Similarly, for binary classification, the output
    layer will only have one neuron, but this time the value of it will be limited
    to between 1 and 0 by an activation function. Activation functions will be explored
    further in-depth during subsequent sections. They can be temporarily seen as tools
    to help neurons adjust their values to fit the output range. For example, classification
    tasks require the output to be in the range of [0, 1], represented as a probability.
    Hence, we can use the sigmoid activation function to transform the raw output
    values to be between 0 and 1.
  prefs: []
  type: TYPE_NORMAL
- en: The layers between the input and the output layers are referred to as “hidden
    layers.” In the diagram shown previously, we have two hidden layers, each with
    three neurons. The number of hidden layers and neurons are hyperparameters that
    can be adjusted to improve a neural network’s performance.
  prefs: []
  type: TYPE_NORMAL
- en: We can imagine the neural network analyzes the data by breaking it into different
    portions. Moreover, we can interpret each weight value as a helper that manipulates
    the inputting data/intermediate result from the previous layer to fit the task
    that each neuron is trained to recognize. For instance, every neuron in the first
    hidden layer could be trained to discover certain underlying statistical distributions
    within the data, while the second hidden layer processes the information passed
    down from the first and produces intermediate results for the final hidden layer
    to compute predictions.
  prefs: []
  type: TYPE_NORMAL
- en: Depending on the input layer weights, each neuron in the first hidden layer
    could receive a “modified” version of the original input, thus being able to interpret
    the dataset from different perspectives (Figure [3-6](#Fig6)). If we count each
    weight, or connection, as a trainable parameter, our simple four-layer network
    with five inputs and one output will have 5 × 3 + 3 × 3 + 3 × 1 = 27 parameters.
    However, remember there’s also a bias added after the summation of weights from
    the previous layer for each neuron. Thus, our total parameter from the preceding
    example network will be 27 + 3 + 3 + 1 = 34.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig6_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Two inputs of five neurons connect with one neuron among three neurons in the
    first hidden layer.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-6
  prefs: []
  type: TYPE_NORMAL
- en: How different weights change input data
  prefs: []
  type: TYPE_NORMAL
- en: 'The process of passing information from the first layer forward to the last
    layer is referred to as a feed-forward operation. Not only is it the starting
    point for neural network training but it’s also how predictions are made. A general
    process for training a neural network can be outlined in five steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Initialize random weights and biases.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Calculate an initial prediction by feed-forward.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Calculate the network’s error based on a differentiable metric, essentially
    telling us how well the network is doing on the data.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Adjust the values of weights and biases based on the error made using backpropagation.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Repeat until the desired accuracy is reached.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Before diving into the complex yet fascinating math behind how neural networks
    learn using feed-forward and backpropagation, we’re going to construct a simple
    neural network in Python, familiarizing ourselves with the concepts introduced
    previously by a concrete example. For now, treat the backpropagation process as
    an algorithm that adjusts network parameters to increase performance based on
    the error.
  prefs: []
  type: TYPE_NORMAL
- en: Introduction to Keras
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The popular deep learning library Keras, created by Francois Chollet, allows
    straightforward implementation of neural networks from simple to sophisticated
    and convoluted models of any kind. Due to its remarkable usability and performance,
    we chose Keras as the framework in this book to develop and demonstrate deep learning
    concepts.
  prefs: []
  type: TYPE_NORMAL
- en: Meaning “Horn” in French, the name *Keras* is derived from the literary image
    presented in the *Odyssey*. Initially developed as a research project for ONEIROS
    (Open-ended Neuroelectronic Intelligent Robot Operating System), Keras quickly
    expanded to provide general uses and support across the field of deep learning.
    Keras offers performance and strength comparable to any modern standard by focusing
    on the idea of “progressive disclosure of complexity.” The Keras framework is
    widely employed around the world, with renowned companies like NASA and Google
    using it. While advanced modeling and workflow can be achieved through a clear
    process, simple and quick ideas can be implemented with minimal effort.
  prefs: []
  type: TYPE_NORMAL
- en: Keras itself is a high-level library designed to run on top of many low-level
    deep learning packages such as TensorFlow, Theano, and Cognitive Toolkit. The
    core motivation behind the library is to provide an easy interface that can better
    bridge ideas and implementation. By default, Keras is built upon the deep learning
    platform TensorFlow developed by Google. During its early releases, TensorFlow
    provided detailed but complex systems and classes for developing deep learning
    models. By version 2.0, Keras’s popularity made it the official API for TensorFlow.
    Although Keras remains a separate library, TensorFlow can fill in the gaps for
    any low-level training control Keras lacks. It is recommended to install TensorFlow
    instead of Keras’s standalone package to take full advantage of TensorFlow’s endless
    customization abilities along with Keras (Listing [3-1](#PC1)).
  prefs: []
  type: TYPE_NORMAL
- en: TensorFlow can be installed via pip from the command line as well as directly
    from the Jupyter Notebook by adding an exclamation mark before the command. Note
    that inserting an exclamation mark (!) before any line is equivalent to running
    the command from the command line in Jupyter Notebooks.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Modeling with Keras
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Before we start, remember that, at this point, not all mathematical concepts
    and neural network components are explained yet. However, you do not need to understand
    everything to build a working network in Keras. Proceeding this brief introduction
    to Keras will be an in-depth explanation of how neural networks function behind
    the curtains.
  prefs: []
  type: TYPE_NORMAL
- en: Consider the Fashion MNIST dataset. The dataset contains 70,000 grayscale images
    at 28-by-28-pixel resolution. Fashion MNIST is a multiclass classification task,
    sorting various images of clothing articles into ten categories (Figure [3-7](#Fig7)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig7_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A table of two columns and 10 rows present the class label and description listing
    10 items.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-7
  prefs: []
  type: TYPE_NORMAL
- en: Class description for Fashion MNIST
  prefs: []
  type: TYPE_NORMAL
- en: The dataset is automatically installed with TensorFlow and can be imported through
    the Keras API via `tf.keras.datasets.fashion_mnist.load_data()`, which returns
    the train images, train labels, test images, and test labels all as NumPy arrays
    (Listing [3-2](#PC2)). Fashion MNIST provides variety and a relatively challenging
    task compared with other commonly used benchmarking datasets.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: By calling `imshow()` from matplotlib, we can display our data as images, with
    each value representing the brightness of that pixel (Listing [3-3](#PC3)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Note that images are stored in a three-dimensional array, with each sample having
    28 columns and 28 rows of pixels and having 60,000 of 28-by-28 training images
    in total (Figure [3-8](#Fig8)) (Listing [3-4](#PC4)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Nine photographs of various shirt tops and footwear models.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-8
  prefs: []
  type: TYPE_NORMAL
- en: Visualization of the first nine images from the training data
  prefs: []
  type: TYPE_NORMAL
- en: Artificial neural networks are only capable of processing one-dimensional input.
    The input layer treats each row as a separate sample. By flattening each two-dimensional
    array and reshaping it into one single row, we can obtain the desired shape for
    the input of a fully connected neural network (Listing [3-5](#PC5)). By doing
    this, we do sacrifice any structural information that was present in a two-dimensional
    image, but for our context of ANNs, this is a viable solution. Models that are
    specifically designed to perform image recognition tasks will be discussed in
    Chapter [4](525591_1_En_4_Chapter.xhtml), along with how to utilize them for tabular
    data. But for now, treat Fashion MNIST as a tabular dataset with 784 features.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Each pixel in the image is a number between 0 and 255, with 0 being the darkest
    black and 255 being the brightest white. A common practice is to normalize these
    values between 1 and 0, speeding up model convergence and stabilizing training
    (Listing [3-6](#PC6)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'The modeling process in Keras follows three basic steps: define the architecture,
    compile with additional parameters, and finally train with provided data (Figure
    [3-9](#Fig9)).'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A flowchart illustrates the processing of defining architecture into compile
    model, and leads to training and evaluation.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-9
  prefs: []
  type: TYPE_NORMAL
- en: The Keras workflow
  prefs: []
  type: TYPE_NORMAL
- en: Defining the Architecture
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Since the flattened image data contains 784 input features, our first input
    layer will have 784 neurons, one for each feature. We can start by initializing
    the model with the `Sequential` class from `keras.models`. Keras’s sequential
    workflow allows us to stack layers linearly on top of each other in an ordered
    manner (Listing [3-7](#PC7)). This method of constructing neural networks is deemed
    adequate and convenient for simple prediction tasks like Fashion MNIST.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Layers are added by calling the `add()` method on the sequential model object
    after initialization (Listing [3-8](#PC8)). We start by adding our input layer,
    specifying the shape of the input data.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: Following, we will add our hidden layers. For the simplicity of architecture,
    our model will have two hidden layers, each with 64 neurons (Listing [3-9](#PC9)).
    You can experiment with these parameters and observe possible improvements to
    the model. Recall from earlier that in an ANN, each neuron in every hidden layer
    is connected to every neuron in the previous and the next layer. Such layers are
    categorized as fully connected layers and can be imported through `keras.layers`
    as `Dense` layers.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: Finally, the output layer contains ten neurons as there are ten classes, and
    similarly to hidden layers, the output layer will also be a `Dense` layer. The
    model would ideally be able to output an integer between 1 and 10, with each number
    corresponding to one class from the Fashion MNIST dataset. However, all neural
    networks and modern machine learning models output continuous values. Hence, we
    can insert an activation function that normalizes values to be within our output
    range. In multiclass classification tasks, the activation function softmax is
    used. With ten neurons in the output layer, logically, our network will output
    an array of ten values during prediction. Softmax will then convert these values
    into probabilities between 1 and 0, which represent the likelihood that the predicted
    image belongs to each of the ten classes while all the probabilities sum up to
    1 (unlike sigmoid, where each output neuron would be interpreted as a single probability
    with no relations to other outputs). The final prediction can be determined by
    finding the max of these values, and the position of the max value will be our
    result, a number between 1 and 10 (Figure [3-10](#Fig10)). Again, details of activation
    functions will be explored in later sections.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A diagram presents many neurons with continuous output values from a network
    connecting to Softmax and produces many classes from one to 10 with values.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-10
  prefs: []
  type: TYPE_NORMAL
- en: An intuition of softmax
  prefs: []
  type: TYPE_NORMAL
- en: Thus, the complete code for defining the architecture of our simple network
    is written as such in Listing [3-10](#PC10).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Compiling the Model
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Before training, our model needs a few more settings that specify how training
    should be done. There are three key parameters that should be defined during compilation:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Optimizer*: Controls the method of “learning” by telling backpropagation how
    to adjust the values of weight and bias. Different optimizers can affect the speed
    and the results of training. By default, the Adam (Adaptive Moment Estimation)
    optimizers are used. The intuition behind optimizers is best understood after
    learning about backpropagation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Loss function*: Differentiable functions that measure the performance of the
    model. As explained in Chapter [1](525591_1_En_1_Chapter.xhtml), the key difference
    between metrics and loss functions is that loss functions must be differentiable
    to be compatible with gradient descent. However, metrics don’t necessarily satisfy
    differentiability; it’s simply a measure of correctness used for evaluation to
    assess model performance. For multiclass classification, categorical cross-entropy
    is generally used as a loss function, while the Mean Squared Error is typically
    used for regression tasks. Different loss functions suited for the same task can
    produce different training results.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Metrics*: Different from loss functions, the training of neural networks doesn’t
    rely on the metric; it simply acts as another tool to better monitor the model
    performance. Metrics can usually provide an understanding of the model from a
    different aspect than the loss function. In some cases, metrics and loss functions
    can be the same.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The following code in Listing [3-11](#PC11) compiles the model with the Adam
    optimizer, categorical cross-entropy loss, and accuracy as the metric. The categorical
    cross-entropy loss is simply a modified version of the classic binary cross-entropy
    loss suited for multiclass classification tasks. More will be covered in the “Loss
    Functions” section.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: Training and Evaluation
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'After compiling, our model is ready to be trained. Again, there are a few key
    parameters to consider for the training process:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Training data*: It’s passed into the fit method as `x` and `y`. Similar to
    scikit-learn models, the data in the place of `x` and `y` can be NumPy arrays
    or Pandas DataFrames.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Epochs*: This is the number of times that the model will loop through the
    training data. More specifically, this represents the number of times the network
    will be evaluated as each loop through the dataset counts as one epoch, and at
    the end of each epoch, the selected metric will be calculated on the network to
    track performance. The parameter is passed in as `epoch=num_epochs`.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Batch size*: This parameter controls how many samples are processed at once
    in each training step. For the model’s batch size equal to 1, it means that in
    order to loop through the whole dataset once, it’d take 60,000 steps of learning
    as there are 60,000 samples in the training dataset. For a larger batch size,
    training speed will speed up significantly, and typically a large batch size will
    not only increase training speed but also improve performance compared with tiny
    batch sizes. This pattern varies for different datasets, and there’s no definite
    method to calculate the perfect batch size for training. Note that having large
    batch sizes may result in memory overflows. The parameter is passed in as `batch_size=num_batch`.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Although there are many more parameters that can affect training or reduce overfitting,
    these three are the most relevant to consider, while the rest will be discussed
    in later sections. Shown in Listings [3-12](#PC12) and [3-13](#PC13) are the code
    and results for training, along with the results displayed as progress bars. Remember
    that each time `.fit()` is called, the training result may be slightly different
    since each time, the neural network initializes with random weight.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: We observe that the accuracy of the model slowly converges to somewhere around
    0.82 at epoch 15, while the loss is at 0.49\. Model predictions can be done by
    fashion_model.predict(X_testdata). Performance measures on the validation or the
    test data, as the variables are named X_test and y_test in our example, can be
    done by fashion_model.evaluate(X_test, y_test). Performance is calculated by both
    the loss and metric(s) passed in at compilation.
  prefs: []
  type: TYPE_NORMAL
- en: As we expand on the knowledge of neural networks, we’ll improve upon our model
    by adjusting learning rates, adding activation functions, and more to improve
    not only training performance but also validation results.
  prefs: []
  type: TYPE_NORMAL
- en: Before exploring deeper into Keras and its capabilities in building neural networks
    and developing deep learning pipelines, let’s step back and understand a bit more
    about the math and intuition of neural networks. Prior to Keras, neural networks
    are introduced as these “components,” which multiply and add numbers together
    to form predictions, and they somehow adjust those “weights and biases” to improve
    performance through “backpropagation.” Along with the actual learning process,
    loss functions, activations, and optimizers will be introduced intuitively and
    through mathematical lenses to fully understand how they contribute to the network.
  prefs: []
  type: TYPE_NORMAL
- en: Loss Functions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Loss functions are briefly defined and compared with metrics in Chapter [1](525591_1_En_1_Chapter.xhtml).
    Both terms define a function that measures the performance of model predictions
    against ground-truth data. The difference that separates loss functions and metrics
    stems from the function’s differentiability.
  prefs: []
  type: TYPE_NORMAL
- en: Loss functions, speaking strictly in the context of deep learning, are differentiable,
    or their derivative is defined at any point in the domain of the function. We
    can use its differentiability for gradient descent as it helps us search through
    the loss landscape effectively and in an orderly manner.
  prefs: []
  type: TYPE_NORMAL
- en: To reiterate, a loss function requires two inputs, the model’s prediction and
    the ground-truth value, and outputs a measure that acts as an indicator of how
    “good” the predictions are compared with the ground-truth values. In the same
    way as regression methods, the core concept behind neural network learning relies
    on gradient descent. The goal of backpropagation is to minimize a high-dimensional
    non-convex loss function through the iterative process of gradient descent.
  prefs: []
  type: TYPE_NORMAL
- en: Theoretically, the loss landscape can be visualized in dimensions where the
    number of parameters and the added dimension represent the actual loss value.
    But our senses and visual abilities limit us to three-dimensional visualizations
    compared with the millions of dimensions in the context of a neural network. It’s
    helpful to see the actual “landscape” that the network is traversing through during
    training for a few reasons. First, some networks are known to produce loss functions
    that are “smoother” or easier to train in general. Being able to have a visual
    perception of the loss landscape can enable us to better understand the relationship
    between neural network structure and training results. Second, comparing loss
    landscapes can be another tool to assess model performance and its actual ability
    to fit the data based on the complexity of the loss landscape. Along with assessing
    the ability of the model, visualizations also help a lot in model interpretation
    and understanding. Interpreting models as complex as neural networks is rewarding
    as you get an insight into how training progresses and how the model “learns.”
  prefs: []
  type: TYPE_NORMAL
- en: There are a few methods through which the “landscape” of loss functions in a
    neural network can be visualized. Among them, the technique proposed by Hao Li,
    Zheng Xu, Gavin Taylor, Christoph Studer, and Tom Goldstein in their paper “Visualizing
    the Loss Landscape of Neural Nets”^([1](#Fn1)) proves to be effective and visually
    appealing. Using a method referred to as “Filter-Wise Normalization,” plots of
    loss functions are generated by a random Gaussian direction vector that has corresponding
    norms to that of the neural network parameters. We can apply this method to the
    network we previously trained with the Fashion MNIST dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Using the library Landscapeviz, we can implement the graphing method proposed
    in the paper with three simple lines of code. The process is shown in Listing
    [3-14](#PC14).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: Note that due to time and memory limitations, the graph presented in the following
    (Figure [3-11](#Fig11)) is only trained on the first 10,000 samples of the training
    data. The actual loss landscape for the entirety of training data can vary from
    the one shown here.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig11_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A representation of a three-dimensional surface graph that depicts the landscape
    status.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-11
  prefs: []
  type: TYPE_NORMAL
- en: Loss landscape for a model trained on the part of Fashion MNIST
  prefs: []
  type: TYPE_NORMAL
- en: The gradient of color represents different values on the graph, with blue being
    the lowest and red being the highest. The optimal value for the parameters of
    the network is given at the lowest point in the graph. Remember that the figure
    plotted is simply a projection of the actual landscape in three dimensions, and
    the numbers don’t correlate to the actual optimal values in the neural network.
    The only meaningful axis here is the z-axis, which represents the loss value,
    while the x- and y- axes are arbitrary parameter values. Visualizations like this
    are meant for analysis and interpretation; by modifying the architecture of the
    network, the mesh of the loss landscape changes. Shown in Figure [3-12](#Fig12)
    is the loss landscape for the same data, but instead of two layers with 64 neurons
    each, the structure of the network is changed to one layer with 512 neurons.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig12_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration of a three-dimensional surface graph provides the status of
    the landscape.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-12
  prefs: []
  type: TYPE_NORMAL
- en: Loss landscape of a model with one layer of 512 neurons trained on the part
    of Fashion MNIST
  prefs: []
  type: TYPE_NORMAL
- en: Model interpretation is as important as understanding the mechanics behind the
    model. Being able to not only learn and understand how the model works but also
    see how pieces interact and change the results can provide key insights as well.
    Notice that the network with one hidden layer of 512 neurons produces a relatively
    flatter and milder landscape compared with the network with two hidden layers
    of 64 neurons each. This can indicate that model convergence is faster and possibly
    more optimal on the network with two hidden layers. Remember that visualization
    is merely a tool for us to briefly understand and interpret the general training
    path that the model may take, but not a detailed guide on where the global minima
    are.
  prefs: []
  type: TYPE_NORMAL
- en: Other than the categorical cross-entropy loss that was used in the Fashion MNIST
    example, here are a couple of more commonly used losses in training neural networks.
  prefs: []
  type: TYPE_NORMAL
- en: '*Binary cross-entropy*: Can be used in Keras with the string “`binary_cross_entropy`”
    passed in place of the loss parameter. The loss function is used for binary classification;
    it calculates the log loss between the prediction and the labels. The math behind
    binary cross-entropy is the exact function used from Logistic Regression introduced
    in Chapter [1](525591_1_En_1_Chapter.xhtml).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Categorical cross-entropy/sparse categorical cross-entropy*: Can be used in
    Keras with string “`categorical_cross_entropy`”/“`sparse_categorical_cross_entropy`”
    passed in place of the loss parameter. Both loss functions are used for multiclass
    classification; they calculate the cross-entropy loss or the log loss between
    the prediction and the labels. The difference between sparse and non-sparse categorical
    entropy is that the sparse version is only used when the targets are not one-hot
    encoded. In cases where the classes are one-hot encoded into single columns that
    represent every single class, categorical cross-entropy should be used.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Mean Absolute Error/Mean Squared Error*: Can be used in Keras with the string
    “`mean_squared_error`”/“`mean_absolute_error`” passed in place of the loss parameter.
    MAE and MSE are both common loss functions used for regression tasks. For their
    simplicity and easy interpretation, MSE and MAE perform surprisingly well in most
    cases regardless of tabular or image data.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Math Behind Feed-Forward Operation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The explanation provided previously regarding feed-forward is more intuition
    based rather than technical. We can formulate the calculation between input, weights,
    and biases in the language of Linear Algebra.
  prefs: []
  type: TYPE_NORMAL
- en: Recall that the number of neurons in the first layer, referred to as the input
    layer, equals the number of features. Each feature feeds into one neuron. We organize
    the values from the input layer into a column vector of shape 1 × n _ features.
    The weights are then arranged into a matrix where the number of rows is the number
    of neurons in the first hidden layer and the number of columns is the number of
    neurons in the input layer. Note that each row of the weight matrix corresponds
    to the weights of each neuron from the input layer to a particular neuron in the
    next layer. From the perceptron model, the output is calculated by a “feed-forward”
    process in which each neuron in the input layer is multiplied by its weight and
    then summed with every other neuron multiplied by its own weight. The sum, along
    with the addition of the bias, becomes the input for one neuron in the next layer.
    Thus, with our feature vector and weight matrices, the calculation becomes as
    simple as dotting the weight matrix with the feature vector and adding a vector
    of bias for each neuron in the next layer (Figure [3-13](#Fig13)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig13_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 'A flow diagram presents the conversion of the input layer into the following:
    the first hidden layer, the weight matrix, the feature vector, and the addition
    to the bias vector.'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-13
  prefs: []
  type: TYPE_NORMAL
- en: Feed-forward operation demonstrated in the input and the first hidden layer
  prefs: []
  type: TYPE_NORMAL
- en: The operation continues between the first hidden layer and the second, the second
    and the third, and so on until reaching the final layer. For a more concise equation
    and readability, we can denote the weight matrix as *W*, the feature vector as
    *X*, and the bias vector as *b*. But the feature vector only exists in the first
    layer when it’s passed through the input layer. For layer outputs, we’ll denote
    it as *L*^((*n*)), where *n* represents the layer number counting from left to
    right. Thus, the values of the first layer are defined as a vector of shape *n*[neurons] × *one*;
    the output can be obtained by *L*^((1)) = *W*^((0)) ∙ *X* + *b*^((0)). Each layer
    contains different weights and biases connecting each neuron; thus, we denote
    the different sets of weights and biases the same way we distinguish layer outputs.
  prefs: []
  type: TYPE_NORMAL
- en: For each subsequent layer, the output of it will be calculated by *L*^((*n*)) = *W*^((*n* − 1)) ∙ *L*^((*n* − 1)) + *b*^((*n* − 1)).
    The feed-forward operation continues this calculation until it has reached the
    end of the network, producing the final output (Figure [3-14](#Fig14)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig14_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A diagram presents the input layer of neurons connecting to the first hidden
    layer and interacts with the last hidden layer connecting to the output.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-14
  prefs: []
  type: TYPE_NORMAL
- en: Feed-forward operation demonstrated in the entire network using notations defined
    previously
  prefs: []
  type: TYPE_NORMAL
- en: However, in most modern neural networks, we’re still missing an important piece
    in the feed-forward operation as well as in the structure of the entire network.
    Nonlinearity in data is common. Even though in a neural network, tens if not hundreds
    of neurons are stacked together in multiple layers, when it comes down to a single
    neuron’s calculations, it’s still a linear equation. Activation functions are
    introduced to add nonlinearity to the model.
  prefs: []
  type: TYPE_NORMAL
- en: Activation Functions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Activation functions are applied at the end output of each neuron in the network.
    By modifying or restricting output values at the end, the model becomes better
    at predicting nonlinearly separable data.
  prefs: []
  type: TYPE_NORMAL
- en: Intuitively, activation functions can be seen as switches that control how “active”
    each neuron is regardless of its weights and biases. In a biological context,
    the neuron only passes information forward when the signal from the dendrites
    reaches a certain threshold. Technically speaking, the neural networks that we
    built previously all contain activation functions at each layer in each neuron.
    But instead of any fancy nonlinear functions, the activation is simply *y* = *x*.
    Thus, its name is “linear activation.”
  prefs: []
  type: TYPE_NORMAL
- en: 'Nonlinear activation functions provide several key improvements to the network:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Add nonlinearity*: This improves the model’s performance on nontrivial datasets.
    Stacking neurons and neurons in layers doesn’t change the fundamental fact that
    each neuron is an affine transformation itself. The composition of affine transformations
    still results in an affine transformation, unable to model any complex relationship
    between variables. With a basic example using scalars, we can show that compositions
    of linear functions still result in a linear function. Let *f* (*x*) = *ax* + *b*
    and *g*(*x*) = *cx* + *b*; then (*f* ∘ *g*)(*x*) = *a*(*cx* + *b*) + *b* = (*ac*)*x* + *ab* + *b*.
    We know that *a*, *b*, and *c* are all scalars; thus, in the end, the equation
    still results in the form *y* = *ax* + *b*. The same concept applies to matrix
    operation too. Let ![$$ f\left(\overrightarrow{x}\right)=A\overrightarrow{x}+\overrightarrow{b}
    $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_IEq1.png) and ![$$
    g\left(\overrightarrow{x}\right)=C\overrightarrow{x}+\overrightarrow{b} $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_IEq2.png);
    then ![$$ \left(f\circ g\right)\left(\overrightarrow{x}\right)=(AC)\overrightarrow{x}+\overrightarrow{b}
    $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_IEq3.png). Since
    both *A* and *C* are invertible matrices, *AC* must be invertible as well. Thus
    ![$$ \left(f\circ g\right)\left(\overrightarrow{x}\right) $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_IEq4.png)
    is still an affine transformation. Without activation functions, multilayer networks
    essentially collapse into a network with one single layer as, in the end, hundreds
    of affine transformations combine into one single affine transformation. On the
    other hand, having nonlinearity in neural networks improves representation capability.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '*Address gradient problems*: Certain activation functions that restrict values
    to certain boundaries address the problems of vanishing gradients and exploding
    gradients. At each iteration, backpropagation changes the parameters of the network
    based on the indicators obtained by gradient descent. In some cases, due to calculations
    that will be discussed in later sections, the indicators from gradient descent
    will be either too small or too large. In the first case, the network parameters
    barely change, and it’ll be impossible for the network to reach values even close
    to the optimal ones. In the second case, the parameter values can grow rapidly,
    leading to overflows or “infinite” losses. Some specifically designed activation
    functions can help with both exploding and vanishing gradients while adding nonlinearity
    to the network.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '*Restrict output values*: As shown in the first example, during classification
    tasks, the output value of neurons must be in the range of 0 and 1\. Sigmoid activation
    restricts any input to be 0 and 1, while softmax restricts all output values to
    0 and 1 while keeping their sum at 1 (useful for multiclass classification). The
    hyperbolic tangent activation function restricts values between –1 and 1 and is
    used in recurrent models (see Chapter [5](525591_1_En_5_Chapter.xhtml)). In most
    regression tasks, a linear activation function is used as the output value is
    not restricted.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: With the addition of activation functions, the feed-forward operation is slightly
    modified. An activation function is applied to each layer after multiplying every
    neuron with its weights and adding the bias term. Thus, the equation for the nth
    layer of a neural network counting from the input becomes *L*^((*n*)) = *σ*(*W*^((*n* − 1)) ∙ *L*^((*n* − 1)) + *b*^((*n* − 1))) where
    *σ*(*x*) represents some activation function.
  prefs: []
  type: TYPE_NORMAL
- en: In the following subsections, we will introduce five commonly employed activation
    functions.
  prefs: []
  type: TYPE_NORMAL
- en: Sigmoid and Hyperbolic Tangent
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The sigmoid activation function is mostly used for restricting output values
    instead of adding nonlinearity between layers of neurons. The sigmoid activation
    is the logistic function used by Logistic Regression, as mentioned in Chapter
    [1](525591_1_En_1_Chapter.xhtml). Sigmoid activation is not recommended to be
    used between hidden layers due to the vanishing gradient problem, which is much
    more common than exploding gradients. Again, vanishing gradient leads to neural
    networks barely updating their parameters, essentially not learning anything from
    the data.
  prefs: []
  type: TYPE_NORMAL
- en: Similarly to sigmoid, the hyperbolic tangent (tanh) activation function, displayed
    in Figure [3-15](#Fig15), is not recommended to be used for activation between
    hidden layers but instead to restrict output values.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \textrm{Tanh}(x)=\frac{\left({e}^x-{e}^{-x}\right)}{\left({e}^x+{e}^{-x}\right)}
    $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_Equb.png)'
  prefs: []
  type: TYPE_IMG
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig15_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A line graph represents the curve that extends between the first and third quadrant
    and passes through the origin.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-15
  prefs: []
  type: TYPE_NORMAL
- en: Tanh activation function
  prefs: []
  type: TYPE_NORMAL
- en: Compared with sigmoid, the tanh activation function will perform better when
    used between hidden layers as it’s a zero-centric function while sigmoid’s output
    value is restricted between 0 and 1\. But tanh and sigmoid both suffer greatly
    from the vanishing gradient problem, and in almost all cases, activations such
    as ReLU (Rectified Linear Unit) should be chosen over them.
  prefs: []
  type: TYPE_NORMAL
- en: Rectified Linear Unit
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Rectified Linear Unit, commonly referred to as ReLU, is the simplest activation
    function that introduces nonlinearity to the network. It aims to add complexity
    to the network as well as solve the vanishing gradient problem. It’s defined as
    follows and graphed in Figure [3-16](#Fig16).
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \textrm{ReLU}(x)=\max \left(0,x\right) $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_Equc.png)'
  prefs: []
  type: TYPE_IMG
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig16_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph represents a line that overlaps the negative side of the x-axis,
    passes through the origin, and slopes upward in the first quadrant.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-16
  prefs: []
  type: TYPE_NORMAL
- en: Graph of ReLU
  prefs: []
  type: TYPE_NORMAL
- en: Despite its simplicity, ReLU avoids the vanishing gradient problem while adding
    nonlinearity. Compared with other activation functions, ReLU uses less space and
    has relatively little time complexity. However, with the flattened tail for negative
    inputs, sometimes too many weights and biases are unchanged, leading to the “dead”
    ReLU problem. Although it has been proven that sparsity (when a lot of activations
    are equal to 0) in neural networks caused by ReLU can improve performance, in
    some cases, this does become a problem leading to convergence issues. Finally,
    ReLU does not address the exploding gradient problem.
  prefs: []
  type: TYPE_NORMAL
- en: LeakyReLU
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: LeakyReLU is a modification from ReLU with an adjustable parameter *α*, which
    creates a downward tail compared with the flattened line from ReLU. This function
    addresses some problems in ReLU but also has some disadvantages (Figure [3-17](#Fig17)).
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \textrm{LeakyReLU}(x)=\left\{\begin{array}{c}x\kern1em if\ x&gt;0\\ {}\alpha
    x\kern0.5em if\ x\le 0\end{array}\right. $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_Equd.png)'
  prefs: []
  type: TYPE_IMG
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig17_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph represents a line which extends between the third and first quadrant
    passing through the origin and slopes upward in the first quadrant.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-17
  prefs: []
  type: TYPE_NORMAL
- en: LeakyReLU with *α* = 0.1
  prefs: []
  type: TYPE_NORMAL
- en: When *α* is greater than zero, the dead ReLU problem is solved since for any
    input less than zero, its value is adjusted so that it does not remain constant
    at zero, thus being able to update network parameters by a tiny amount. The hyperparameter
    *α* is typically chosen between 0 and 0.3\. However, LeakyReLU doesn’t solve the
    exploding gradient problem. Besides, to achieve optimal performance, we need to
    hand-tune the parameter .
  prefs: []
  type: TYPE_NORMAL
- en: Swish
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Swish presents itself as a newer but much more effective activation function
    (Figure [3-18](#Fig18)). Developed by researchers at Google Brain,^([2](#Fn2))
    its remarkable performance was seen in image recognition tasks but later also
    in tabular data predictions.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \textrm{swish}(x)=x\times \textrm{sigmoid}\left(\beta x\right)=\frac{x}{1+{e}^{-\beta
    x}} $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_Eque.png)'
  prefs: []
  type: TYPE_IMG
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig18_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph represents the curve that overlaps the negative side of the x-axis,
    passes through the origin and slopes upward in the first quadrant.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-18
  prefs: []
  type: TYPE_NORMAL
- en: Swish activation function
  prefs: []
  type: TYPE_NORMAL
- en: Like ReLU, the swish activation function is unbounded above as ![$$ \underset{x\to
    \infty }{\lim }f(x)=\infty $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_IEq5.png)
    but bounded below, meaning that as the domain of the function approaches negative
    infinity, there’s a definite value that *f* (*x*) approaches. However, unlike
    ReLU, with the combination of sigmoid, the swish function is smooth without any
    sudden changes or vertices, which prevents unwanted jumps in output values. More
    importantly, being unbounded avoids slow training time during shrinking gradients
    produced by backpropagation.
  prefs: []
  type: TYPE_NORMAL
- en: Visually, swish is essentially a “smoother” version of ReLU with a “bump,” as
    the original paper showed, during training, most output values before plugging
    into the activation fall in the domain range of the “bump,” indicating the importance
    of the addition of the “bump” compared with other similarly shaped activation
    functions such as ReLU. The importance of this downward “bump” lies in the differentiation
    of the function. The swish function is non-monotonic, meaning that there are no
    continually negative or positive values in the derivation. This property of swish
    addresses the vanishing gradient problem as the values won’t ever be restricted
    or bounded by a certain limit during backpropagation, which causes the gradient
    to result in extremely small values.
  prefs: []
  type: TYPE_NORMAL
- en: By adjusting the hyperparameter, *β*, we can see that when *β* = 0, the function
    becomes a scaled linear activation ![$$ f(x)=\frac{x}{2}, $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_IEq6.png)
    while as *β* → ∞, the sigmoid part of the function becomes somewhat a 0-1 function,
    making the entire swish function resemble the shape of ReLU (Figure [3-19](#Fig19)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig19_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph compares the two lines intersecting the origin by passing through
    the second and third quadrant, respectively. The two lines slopes upward.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-19
  prefs: []
  type: TYPE_NORMAL
- en: Comparing the values of β. The dotted green line represents β = 10000, and the
    solid blue line represents swish when β = 0
  prefs: []
  type: TYPE_NORMAL
- en: Thus, swish can be viewed as a nonlinear interpolation between a linear activation
    and the ReLU activation where the amount is controlled by the hyperparameter *β*.
    Usually, *β* is set to a certain value for the entirety of the training. However,
    it can be adjusted throughout training as a trainable parameter.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, the swish activation function has also been proven to generalize well
    due to its smoothness and ability to optimize networks with larger layer numbers
    and batch sizes compared with ReLU.
  prefs: []
  type: TYPE_NORMAL
- en: The Nonlinearity and Variability of Activation Functions
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'The nonlinearity and differences between activation functions can be further
    proven by a simple demonstration. Imagine the simplest neural network possible:
    one input neuron, two neurons in one hidden layer, and one output neuron. We will
    approximate the quadratic function *f* (*x*) = *x*² using a neural network. A
    linear function would not be able to accomplish this.'
  prefs: []
  type: TYPE_NORMAL
- en: The network is going to be trained on the swish activation function, currently
    one of the best-performing functions available for structured datasets. Afterward,
    we’re going to change the activation function of the network from swish to ReLU,
    sigmoid, linear (without activation functions), and more. The predictions of the
    networks over the range of the input dataset are plotted against the *x*² function
    for a visual comparison. Here’s the basic code to get started shown in Listing
    [3-15](#PC15).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: Like the network in the previous section, we first start off by defining the
    `Sequential` object, then adding `Dense` layers, specifying the number of neurons,
    and setting the activation to swish. After compiling the model, it’s trained for
    20 epochs with the Mean Absolute Error or the MAE as its loss function as it presents
    a straightforward intuition of how much error the model is producing compared
    with the targets (Listing [3-16](#PC16)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: The final MAE sits around 1.1287; considering the range of our dataset combined
    with how simple our network is, the model’s performance is decently well. Next,
    we can plot the neural network as a function where the input is the range of values
    across our input and the output is the predictions produced (Listing [3-17](#PC17)).
    We can compare this plot to the plot of our function to approximate, *f*(*x*) = *x*²,
    to visually evaluate the model’s performance (Figure [3-20](#Fig20)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig20_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph illustrates the two lines for x squared and network trained with
    swish, depict a parabola with an increasing trend.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-20
  prefs: []
  type: TYPE_NORMAL
- en: Graph of *f*(*x*) = *x*² against the network trained with the swish activation
    function
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: The trained network was able to replicate the general parabola shape of *f*(*x*) = *x*²
    relatively well with only two neurons and only seven trainable parameters (excluding
    those in the swish activation function). With the same weights in the network,
    we can replace the activation function with other ones or even remove it and observe
    the results (Figure [3-21](#Fig21)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig21_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Four line graphs present the comparison between the activation: linear, relu,
    sigmoid, and elu with another line, x squared.'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-21
  prefs: []
  type: TYPE_NORMAL
- en: Plots with networks trained on ReLU, sigmoid, linear (without activation functions),
    and ELU
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: ELU stands for the exponential linear unit, another type of activation function
    that is not as common as ReLU and swish. It’s defined as ELU(*x*) = *x* if *x* > 0
    and ELU(*x*) = *α*(*e*^(*x*) − 1) if *x* ≤ 0, where *α* is a hyperparameter usually
    between 0.1 and 0.3\. ELU contains the advantages of ReLU for *x* > 0 and solves
    the dead ReLU problem for *x* ≤ 0\. However, ELU is computationally expensive
    compared with other activation functions, and the *α* value is hand-adjusted based
    on training results.
  prefs: []
  type: TYPE_NORMAL
- en: From a visual perspective, ReLU seems to have the best performance, followed
    by ELU, then sigmoid, and, lastly, the network trained without activation functions.
    As proven in the previous section and shown in the graph, no matter how many neurons
    there are, a network without activation functions collapses into a linear function.
    Most, if not all, real-life datasets can’t be modeled by a simple linear relationship.
  prefs: []
  type: TYPE_NORMAL
- en: Observe that both swish and ELU’s graphs contain smooth curves without sharp
    turns in the plot, while ReLU has vertices and angles that produce a sudden change
    in output values. Swish and ELU’s smoothness gives them an upper hand in approximating
    functions that contain curves and soft turns. Given that many real-world datasets
    have gradually changing values instead of sudden jumps, swish and ELU tend to
    perform better in those cases.
  prefs: []
  type: TYPE_NORMAL
- en: The pool of activation functions is way broader than what was presented here;
    in most situations, using ReLU or swish will be sufficient, but there’s no strict
    rule for choosing a certain activation function, and the choice will be left for
    the data scientist.
  prefs: []
  type: TYPE_NORMAL
- en: The curious reader may also find the SELU activation, which is discussed in
    the “Selected Research” section of this chapter, an interesting addition to this
    family of functions.
  prefs: []
  type: TYPE_NORMAL
- en: The Math Behind Neural Network Learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The feed-forward operation comes first in the steps of neural network training.
    Random weights and biases are initialized and then passed through the network
    with the input data. Since the parameters of the network are randomly generated,
    they won't be a suitable fit for the input data. Therefore, we must tell the network
    how poorly it performed and how we can adjust the parameters to improve its performance.
  prefs: []
  type: TYPE_NORMAL
- en: Loss functions accomplish the first part, while gradient descent does the second.
    To calculate the “loss” of the network, we simply take the results from the feed-forward
    operation, which most likely will be gibberish upon initialization, considering
    the randomly generated parameters. The algorithm then uses it as an initial “prediction,”
    computing the loss against the targets. After the loss is computed, gradient descent
    is used to optimize the loss function, attempting to search for the global minima
    with respect to the perhaps millions of parameters in the network.
  prefs: []
  type: TYPE_NORMAL
- en: Gradient Descent in Neural Networks
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Recall from Chapter [1](525591_1_En_1_Chapter.xhtml) that gradient descent aims
    to search for the global minima in a non-convex function. By iteratively taking
    smaller and smaller steps toward the direction of greatest descent, we can eventually
    reach the global minima or a point relatively close to the theoretical “global
    minima” in the loss landscape.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: For the global minima, or the minima of a convex function, we can simply set
    the derivative of that function to zero and solve for its parameters. This method
    of finding the minima is often referred to as Ordinary Least Squares (OLS), and
    many Linear Regression algorithms utilize this method over gradient descent as
    it’s less computationally expensive and produces more accurate results. However,
    this method is intractable for neural network problems.
  prefs: []
  type: TYPE_NORMAL
- en: In the context of neural networks, since they usually contain up to millions
    of parameters that can be tweaked and optimized, instead of searching for the
    global minima in a 2D or 3D graph, the goal shifts to finding the lowest point
    on a hypersurface (Figure [3-22](#Fig22)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig22_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration of a three-dimensional graph in search of lowest point on a
    hypersurface.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-22
  prefs: []
  type: TYPE_NORMAL
- en: Gradient descent searches for the lowest point on a hypersurface demonstrated
    in 3D
  prefs: []
  type: TYPE_NORMAL
- en: The algorithm aims to search for a certain set of parameters that reduces the
    value of the cost function to the lowest. During the “descent” down the sloping
    hills of the loss landscape, the algorithm seeks to adjust the parameter, which
    can move the value of the function in a “downward” direction. Calculus tells us
    that taking the gradient of a function results in the direction of the steepest
    increase. Intuitively, negating the gradient gives us the direction of “decrease”
    or the direction of downhill in the loss landscape.
  prefs: []
  type: TYPE_NORMAL
- en: Taking the negative gradient of the function simply results in a gradient vector
    that tells us how to change the parameters of the network based on how sensitive
    the cost function is to changes in the parameters of the network, which, in terms,
    will take us “downward” in the loss landscape. Backpropagation refers to the algorithm
    that computes the gradient of the cost function with respect to millions of the
    parameters that the network contains.
  prefs: []
  type: TYPE_NORMAL
- en: The Backpropagation Algorithm
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We can start off by demonstrating backpropagation on a simple model, a network
    with one input neuron, two hidden layers with one neuron in each, and one output
    neuron. There are, in total, six parameters in this tiny neural network, three
    weights and three biases (Figure [3-23](#Fig23)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig23_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A diagram illustrates four neurons connecting to the consecutive neurons.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-23
  prefs: []
  type: TYPE_NORMAL
- en: Simple four-layer neural network
  prefs: []
  type: TYPE_NORMAL
- en: As previously described, before adjusting the parameters of the network, we
    need to produce an initial prediction and calculate its cost to know how “bad”
    the network is performing, thus giving us a starting point for optimization. We
    can denote each neuron, or essentially each layer in our case, as *a*^((*L* − *n*))
    where *a*^((*L*)) is the last layer, *a*^((*L* − 1)) is the second to last layer,
    and so on (Figure [3-24](#Fig24)). Backpropagation starts from the end, or the
    output of the network, and works its way forward. After producing the initial
    “guess” from randomized weights, we can calculate the loss between the prediction
    and the ground-truth labels. In the example here, MSE is used as the cost function.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig24_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A diagram illustrates the connections between the neurons in four consecutive
    neurons.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-24
  prefs: []
  type: TYPE_NORMAL
- en: Notation for layers in the network
  prefs: []
  type: TYPE_NORMAL
- en: 'We can further expand the value of *a*^((*L*)), or the output of the last neuron:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {a}^{(L)}=\sigma \left({z}^{(L)}\right) $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_Equf.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {z}^{(L)}={w}^{(L)}{a}^{\left(L-1\right)}+{b}^{(L)} $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_Equg.png)'
  prefs: []
  type: TYPE_IMG
- en: In the preceding equation, *σ*(*z*^((*L*))) denotes the activation of the last
    layer. *z*^((*L*)) is the weighted sum produced by the current layer’s weight
    *w*^((*L*)) multiplied by the previous layer’s activation output *a*^((*L* − 1)),
    then adding the current layer or neuron’s bias, *b*^((*L*)). Denoting the loss/cost
    function as *C*, the loss of the network after the forward pass can be defined
    as *C*(…) = (*a*^((*L*)) − *y*)². Recall that the input of the loss function is
    all the parameters in the network, while the output is the actual loss or the
    “cost” between the ground-truth labels and the predictions.
  prefs: []
  type: TYPE_NORMAL
- en: To obtain the “indicators” that tell us how to adjust the weights and biases
    of the network, we need to compute the derivative of the cost function with respect
    to that layer’s weight. Starting from *w*^((*L*)), we know that changing the value
    of the weight also changes the value of *z*^((*L*)). A slight change in *z*^((*L*))
    then influences the value of *a*^((*L*)), which directly changes the value of
    *C*, or the cost function (Figure [3-25](#Fig25)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig25_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A diagram represents changes by connecting the neurons that influences in the
    process till the end result.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-25
  prefs: []
  type: TYPE_NORMAL
- en: The influence of changing the value of the weight in the last layer with respect
    to the cost function
  prefs: []
  type: TYPE_NORMAL
- en: Expanding the derivative of the cost function with respect to the last layer’s
    weight using the chain rule, we obtain ![$$ \frac{\partial C}{\partial {w}^{(L)}}=\frac{\partial
    {z}^{(L)}}{\partial {w}^{(L)}}\frac{\partial {a}^{(L)}}{\partial {z}^{(L)}}\frac{\partial
    C}{\partial {a}^{(L)}} $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_IEq7.png).
    Note that in our example, the derivative calculated applies only to one specific
    training example. To obtain the full derivative across all training examples,
    the average of each individual derivative is computed. The same concept is applied
    to differentiating the bias with respect to the cost function, resulting in ![$$
    \frac{\partial C}{\partial {b}^{(L)}}=\frac{\partial {z}^{(L)}}{\partial {b}^{(L)}}\frac{\partial
    {a}^{(L)}}{\partial {z}^{(L)}}\frac{\partial C}{\partial {a}^{(L)}} $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_IEq8.png).
    This process can be iteratively applied to every layer in the network. For each
    “step” or layer that we take backward through the network, one more “chain” is
    added to the derivative.
  prefs: []
  type: TYPE_NORMAL
- en: For example, the derivative of the weight in the second to the last layer, *L* − 1,
    can be represented as ![$$ \frac{\partial C}{\partial {w}^{\left(L-1\right)}}=\frac{\partial
    {a}^{\left(L-1\right)}}{\partial {w}^{\left(L-1\right)}}\frac{\partial C}{\partial
    {a}^{\left(L-1\right)}} $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_IEq9.png);
    it essentially tells us that a change in *w*^((*L* − 1)) influences the value
    in *a*^((*L* − 1)), while a change in *a*^((*L* − 1)) directly influences the
    cost function. We can use the chain rule to expand the derivative like earlier
    to obtain the full equation.
  prefs: []
  type: TYPE_NORMAL
- en: We can expand our example to a network with multiple neurons in each layer,
    as shown in Figure [3-26](#Fig26).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig26_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A diagram illustrates the interaction of four neurons heavily interconnecting
    to two neurons linking to other set of two neurons.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-26
  prefs: []
  type: TYPE_NORMAL
- en: Network with multiple layers and neurons
  prefs: []
  type: TYPE_NORMAL
- en: For explanatory purposes, let’s only focus on the *L* and *L* − 1 layers; for
    each subsequent *L* − *n* layer, the same concept of computation is applied. Note
    that for each layer, the neuron is denoted with a subscript, with *i* representing
    neurons in the *L* layer and *j* representing neurons in the *L* − 1 layer.
  prefs: []
  type: TYPE_NORMAL
- en: 'The derivative of one specific weight, *w*[*ij*], turns out to be the same
    compared to the simple single-neuronnetwork described previously: ![$$ \frac{\partial
    C}{\partial {w}_{ij}^{(L)}}=\frac{\partial {z}^{(L)}}{\partial {w}_{ij}^{(L)}}\frac{\partial
    {a}^{(L)}}{\partial {z}^{(L)}}\frac{\partial C}{\partial {a}^{(L)}} $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_IEq10.png).
    However, the derivative of ![$$ {a}_j^{\left(L-1\right)} $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_IEq11.png)
    becomes the sumof the derivative of each neuron across the layer *L*: ![$$ \frac{\partial
    C}{\partial {a}_j^{\left(L-1\right)}}=\sum \limits_{i=0}^{n-1}\frac{\partial {z}^{(L)}}{\partial
    {w}_{ij}^{(L)}}\frac{\partial {a}^{(L)}}{\partial {z}^{(L)}}\frac{\partial C}{\partial
    {a}^{(L)}} $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_IEq12.png)
    where *n* is the number ofneurons in layer *L*. This applies not only to multiple
    output neurons but also to hidden layers where neurons are connected to more than
    one neuron in the next layer (this will be the case for most network architectures
    encountered) since a change in the activation will influence both outputs of the
    neurons in the next layer.'
  prefs: []
  type: TYPE_NORMAL
- en: The algorithm is applied to compute the derivative iteratively, traveling back
    to the beginning of the network, hence the name backpropagation. Once the gradient
    of the cost function is obtained – a vector of every derivative of every parameter
    in the network with respect to the cost function – the update rule for each parameter
    is the same as the gradient descent in regression models. A learning rate parameter
    is chosen, and it’s multiplied by the derivative of that parameter; the resulting
    value becomes the new weight/bias for the network.
  prefs: []
  type: TYPE_NORMAL
- en: Optimizers
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Optimizers refer to the algorithm that is used to update the parameters of
    the network. Recall from earlier, and in Chapter [1](525591_1_En_1_Chapter.xhtml),
    the update rule for gradient descent is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: For each training sample, differentiate the cost function with respect to every
    parameter in the network.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Average each derivative across all training samples.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Update each parameter in the network by *θ* ≔ *θ* − *α* ∙ ∇[*θ*]*C*(*θ*) where
    *θ* is the parameter being updated, while *α* is the learning rate and *C*(*θ*)
    is the cost function.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Repeat for the desired number of epochs.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In a real-world context, it’s extremely computationally expensive to sum up
    all the “influences” of each sample on every step. Not to mention that each parameter
    is only updated once after the model has seen the entire dataset, which proves
    to be unproductive and exceedingly slow. One solution to this could be updating
    the parameters of every sample by randomly shuffling the dataset. For every gradient
    descent step, the gradient is calculated only for that data point. However, taking
    one sample at a time would produce a very unstable descent. This can occur because
    the variation between each sample will lead to the model changing too specific
    for each sample, therefore ignoring the global trend, which to us will appear
    as unstable training. Unstable training can lead to missing the global minima
    or swaying away from it as this method focuses too much on the “local optimization”
    instead of looking at the “big picture” of the entire dataset, like gradient descent.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: For the clarity of terms used here, backpropagation refers to the algorithm
    that computes the gradient of the cost function that informs the model about how
    to change each parameter to decrease the cost function. On the other hand, one
    gradient descent step refers to the process of backpropagation over all samples
    of training data and using the gradient to update the parameters of the network.
  prefs: []
  type: TYPE_NORMAL
- en: Mini-batch Stochastic Gradient Descent (SGD) and Momentum
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Mini-batch stochastic gradient descent walks a middle path between the traditional
    gradient descent and updating sample by sample, compromising both algorithms’
    advantages and disadvantages. Instead of just focusing on how much impact one
    sample has on the loss or summing up the influence of every sample, mini-batch
    SGD divides the dataset into relatively small batches and computes the gradient
    with respect to each batch. The update rule for mini-batch SGD requires two more
    steps than gradient descent:'
  prefs: []
  type: TYPE_NORMAL
- en: Randomly divide the dataset into subsections or mini-batches.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For each mini-batch, differentiate the cost function with respect to every parameter
    in the network.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Average the derivatives across the entire mini-batch.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Update each parameter in the network by *θ* ≔ *θ* − *α* ∙ ∇[*θ*]*C*(*θ*) where
    *θ* is the parameter being updated, while *α* is the learning rate and *C*(*θ*)
    is the cost function.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Repeat for all mini-batches.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Repeat for the desired number of epochs.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Picture the training of a neural network as a person traveling downhill in a
    valley while blindfolded. Using traditional gradient descent, the person considers
    every parameter that may affect their next step. After careful calculation of
    all the possible factors that may influence their step downhill, they take a conservative
    step and does this until they slowly reach the bottom of the hill (Figure [3-27](#Fig27)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig27_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A circular scale of negative and positive values represents the parameter values.
    A straight line from 180 points towards the value, zero, in the middle.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-27
  prefs: []
  type: TYPE_NORMAL
- en: The possible path taken by traditional gradient descent
  prefs: []
  type: TYPE_NORMAL
- en: On the contrary, mini-batch SGD acts like a drunk man, swaying left and right
    in the correct direction while keeping with the overall path downward (Figure
    [3-28](#Fig28)). Since in mini-batch SGD the parameter change in the network does
    not reflect the overall trend of the data but rather a subset, although in most
    cases it provides the correct direction of descent, the process can be noisy but
    is way more time and computationally efficient compared with traditional gradient
    descent. Moreover, escaping saddle points – areas where there’s a local maximum
    in one direction but a local minimum in the other – is near impossible for mini-batch
    SGD since most of the gradients surrounding the terrain are close to zero.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig28_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A circular scale of negative and positive values represents the parameter values.
    A fluctuating line from 180 heads towards the value, zero.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-28
  prefs: []
  type: TYPE_NORMAL
- en: The possible path taken by mini-batch SGD
  prefs: []
  type: TYPE_NORMAL
- en: 'Another challenge that SGD usually faces is overcoming “ravines” that have
    curving dimensions steeper in one direction than the other. SGD tends to oscillate
    around the slopes of the ravine without making any actual progress. Introducing
    a technique known as “momentum” can assist with “pushing” SGD in the relevant
    direction without oscillation. Momentum modifies the update rule to include a
    partial update vector from the previous step into the current update vector by
    the following equation: *ν*[*t*] = *γν*[*t* − 1] − *α*∇[*θ*]*C*(*θ*) where *γ*
    is usually set to 0.9 and *ν*[*t* − 1] is the previous update vector. We then
    update the current parameter by *θ* = *θ* + *ν*[*t*]. Momentum increases the step
    size when both update vectors’ gradients point in the same direction while decreasing
    the update size when gradients point in a different direction.'
  prefs: []
  type: TYPE_NORMAL
- en: Nesterov Accelerated Gradient (NAG)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We can compare SGD with momentum to the analogy of a ball rolling downhill,
    accelerating when the slope steepens while slowing down when the steepness decreases
    or changes to an upward direction. Nesterov accelerated gradient can increase
    the “precision” that the ball has, letting it know when to slow down when the
    “terrain” ahead starts sloping up. In the equation involving momentum, we know
    that the update vector or the gradient of the cost function is “nudged” by an
    added momentum term, *γν*[*t* − 1], to “push” the gradient into the direction
    of the minima, dampening any oscillation. Hence, by adding *γν*[*t* − 1] to the
    current value of our parameter, we can approximate its next position; the estimate
    is not precise as the gradient term, −*α*∇[*θ*]*C*(*θ*), is excluded (we don’t
    have the term as we haven’t calculated it in the current step yet), but the value
    is precise enough to provide a point in the vicinity of where we will eventually
    end up (Figure [3-29](#Fig29)). We then can utilize this “look-ahead” technique,
    computing the gradient with respect to the approximated parameter rather than
    the current one: *ν*[*t*] = *γν*[*t* − 1] − *α*∇[*θ*]*C*(*θ* + *γν*[*t* − 1]).
    The parameters are updated the same way as before: *θ* = *θ* + *ν*[*t*].'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig29_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Two illustrations represent the comparison between S G D with momentum and N
    A G for the directions of the previous and current update.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-29
  prefs: []
  type: TYPE_NORMAL
- en: NAG’s update movement compared with the momentum
  prefs: []
  type: TYPE_NORMAL
- en: Nesterov accelerated gradient update can be interpreted in two phases. During
    the first phase, the accumulated gradient from the previous step acts as momentum,
    taking a big step in that direction. Then during the second phase, the gradient
    is computed w.r.t. to the “look-ahead” term; it then nudges or corrects the direction
    taken by momentum, resulting in the final update. Essentially, this lets the “ball”
    look ahead to where it’s rolling in the loss landscape before taking the next
    step, thus becoming more efficient and accurate than solely based on momentum.
  prefs: []
  type: TYPE_NORMAL
- en: By incorporating SGD along with a mini-batch into the traditional gradient descent,
    we were able to speed up the descent while reducing computational workload. Adding
    momentum and NAG to SGD increases the precision of descent while adjusting the
    step size adaptively to the slope of the loss landscape. Depending on the values
    of parameters, some are deemed more important than others; thus, updates can be
    done according to the importance of parameters.
  prefs: []
  type: TYPE_NORMAL
- en: Adaptive Moment Estimation (Adam)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The Adam optimizer computes the adaptive learning rate based on the importance
    of each parameter that it serves to the network. The learning rate of each parameter
    is adjusted based on its computed gradient during the step. In some older optimizers,
    such as AdaGrad, the gradients of previous steps are accumulated and summed with
    the current gradient, and the term is then squared to be used as the divisor for
    the learning rate. Following the trend of past gradients, AdaGrad performs smaller
    updates for parameters that are associated with frequently occurring features
    by reducing the learning rate. In contrast, AdaGrad performs larger updates for
    parameters that are associated with less frequently occurring features by increasing
    the learning rate. However, one major flaw emerges with AdaGrad. This is because
    the accumulated gradient grows to extremely large values during training. This
    shrinks the learning rate to an infinitesimally small value to the point where
    the model can’t acquire additional changes.
  prefs: []
  type: TYPE_NORMAL
- en: 'Instead of storing all past accumulated gradients, Adam imposes an exponentially
    decaying average of all past squared gradients. For the conciseness of notation,
    denote ∇[*θ*]*C*(*θ*[*t*]) as *g*[*t*], and the decaying average of past squared
    gradients can be defined as ![$$ {v}_t={\beta}_2{v}_{t-1}+\left(1-{\beta}_2\right){g}_t^2
    $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_IEq13.png) where
    *β*[2] is usually set to 0.999, as stated in the authors’ paper. Additionally,
    the gradient computed at the current step is replaced by a decaying average of
    past gradients without squaring the gradient term: *m*[*t*] = *β*[1]*m*[*t* − 1] + (1 − *β*[1])*g*[*t*].
    *β*[1] is usually set to 0.9, as stated in the paper. Both *m*[*t*] and *v*[*t*]
    estimate the nth moment of the gradient; specifically *m*[*t*] is the mean or
    the first moment, while *v*[*t*] is the uncentered variance, or the second moment
    of the gradient, hence the name “Moment Estimation.”'
  prefs: []
  type: TYPE_NORMAL
- en: Since both *m*[*t*] and *v*[*t*] are initialized as zero vectors, the values
    of both tend to be biased toward 0, especially during the beginning stage of training.
    The authors computed bias-corrected first and second moments of the gradients,
    which slightly modifies the value of both after computing the decaying average.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\hat{m}}_t=\frac{m_t}{1-{\beta}_1^t} $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_Equh.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ \hat{v_t}=\frac{v_t}{1-{\beta}_2^t} $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_Equi.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Then these values are incorporated into the Adam update rule, which is defined
    in the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\theta}_{t-1}={\theta}_t-\frac{\alpha }{\sqrt{\hat{v_t}}+\epsilon }{\hat{m}}_t
    $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_Equj.png)'
  prefs: []
  type: TYPE_IMG
- en: To avoid division by 0, a buffer term *ϵ* is added, usually set to a value around
    10^(-9).
  prefs: []
  type: TYPE_NORMAL
- en: If SGD with momentum represents a ball rolling down a slope, Adam can be seen
    as a heavier ball rolling down with friction. Adam is one of the most used optimizers
    in modern deep learning, regardless of the task at hand, due to its significantly
    improved performance compared with other optimizers such as SGD with NAG and AdaGrad
    measured on state-of-the-art (SOTA) models.
  prefs: []
  type: TYPE_NORMAL
- en: There are numerous other optimizers in the Adam family, such as AdaMax, which
    generalizes the squared gradient term to *l*[∞] norm, or Nadam (Nesterov Accelerated
    Momentum Estimation), which combines the concept of NAG and Adam, or AdaBelief,
    an optimizer that considers curvature information in the loss landscape and adjusts
    its step size by the “belief” of the current gradient direction.
  prefs: []
  type: TYPE_NORMAL
- en: Adaptive methods result in faster convergence but may lead to poorer generalization,
    while the SGD family may converge slower, but it’s typically steadier and generalizes
    better. Although there are optimizers that try to combine the benefit of both,
    such as AdaBound or AMSBound, currently, Adam still is one of the most used and
    best-performing optimizers.
  prefs: []
  type: TYPE_NORMAL
- en: A Deeper Dive into Keras
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In the section “Modeling with Keras,” only basic operations and techniques involving
    constructing a functioning neural network for classification were presented. Now,
    we’re going to dive deeper into advanced Keras modeling techniques, covering some
    of the most useful functionalities of Keras. We attempt to improve upon our initial
    model, which categorizes images of common clothing articles from the Fashion MNIST
    dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Recall from earlier that our model is defined as such in Listing [3-18](#PC18).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: Notice that there are no activation functions in the hidden layers that we previously
    constructed. In Keras syntax, there are two methods of adding activation functions;
    if none are used, the default activation becomes linear.
  prefs: []
  type: TYPE_NORMAL
- en: The first method is to specify the name of the activation as a string input
    into the “activation” parameter of the `Dense` call (Listing [3-19](#PC19)). Activation
    functions available by a string in Keras include `elu`, `exponential`, `gelu`,
    `hard_sigmoid`, `relu`, `selu`, `sigmoid`, `softmax`, `softplus`, `softsign`,
    `swish`, and `tanh`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: The second method is inserting an activation layer between Dense calls. By importing
    activation layers as objects, they can be called and added to the sequential model
    the same way as dense layers are added. For most activations, there’s no clear
    advantage between using strings in dense layers and using separate activation
    layers other than code readability and conciseness. However, for activations with
    user-defined hyperparameters such as LeakyReLU, they must be added to the model
    as separate layers as their hyperparameter is defined during the layer call, as
    shown in Listing [3-20](#PC20).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: We can modify the initial model to have swish activations in both hidden layers
    and possibly observe performance. The complete code for model definition and training
    is shown in Listing [3-21](#PC21).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: Compared with training results earlier, the accuracy improved from 0.82 to 0.90
    after the addition of activation functions, proving the importance of their presence
    in any neural network. Note that results may be slightly different over different
    runs as weights are initialized randomly.
  prefs: []
  type: TYPE_NORMAL
- en: Next, we’re going to discuss built-in validation methods and techniques to improve
    overfitting.
  prefs: []
  type: TYPE_NORMAL
- en: Training Callbacks and Validation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: During the fit call, Keras has built-in validation functionality by including
    some extra parameters in the call. During training, it’s useful to have the model
    evaluated on a validation set for every epoch. Instead of adjusting the number
    of epochs and learning rate for every training cycle based on the results of `model.evaluate`,
    we can simply set the epoch number to the epoch in which the validation set has
    the highest accuracy or whichever metric is used. Specifically, the validation
    features and targets can be passed into the fit call under the `validation_data`
    parameter as a tuple. It’s recommended to use cross-validation than simply splitting
    the data into a training and a validation chunk; the `validation_data` parameter
    is usually used for quick tests (Listing [3-22](#PC22)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: 'Although not required for training, Keras callbacks are processes performed
    after each epoch, allowing users for more in-depth and detailed control over training
    as well as model adjustments. Here are three common callbacks used:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Model Checkpoint: Imported as* `tensorflow.keras.callbacks.ModelCheckpoint`:
    Saves the model according to user specifications. Options include saving the entire
    model or solely the model weights every epoch that the training or validation
    metric improves. The callback can also be set to save every epoch.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Early Stopping*: *Imported as* `tensorflow.keras.callbacks.EarlyStopping`:
    Terminates the training process prior to reaching the desired `number` of epoch`s`
    based on some criteria such as training or validation metric not improving for
    a certain `number` of epochs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Reduce Learning Rate on Plateau: Imported as* `tensorflow.keras.callbacks.ReduceLROnPlateau`:
    Reduces the learning rate by a user-specified factor when training or validation
    loss stops improving for a certain `number` of epochs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Early Stopping callback is usually used in conjunction with Model Checkpoint
    – automatically stopping extensive training sessions while saving the best version
    of the model. It avoids potential progress loss during long, unmonitored training,
    which could last up to hours to days. The basic syntax of both callbacks is shown
    in the following, based off our `fashion_model` as an example (Listing [3-23](#PC23)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: Model Checkpoint will save the model weights, as set by “`save_weights_only=True`”,
    to the specified file path in the parameter “`filepath`”. The model is saved every
    epoch unless “`save_best_only`” is set to true as shown previously, in which case
    only epochs that show improvement to the metric monitored set by the “`monitor`”
    parameter are saved.
  prefs: []
  type: TYPE_NORMAL
- en: Early Stopping only ends training when the metric set by the “`monitor`” parameter
    stops improving by some specified epochs in the “`patience`” parameter. Additionally,
    using `min_delta`, a quantity can be set in which an improvement only counts when
    the improvement amount exceeds the set value. Finally, by setting the “`restore_best_weight`”
    parameter to true, Early Stopping will restore model weights from the epoch in
    which the monitored metric performed the best.
  prefs: []
  type: TYPE_NORMAL
- en: In Keras fit calls, an object is returned, and its attribute "history" returns
    a detailed training log, including values of all losses and metrics over all epochs.
    A dictionary containing all the information is returned where each key is the
    loss/metric monitored, while each value within the key is the value of that specific
    loss/metric at one epoch. We can utilize the data and visualize the trend in training
    or validation loss by plotting metric/loss values against the number of epochs
    (Listing [3-24](#PC24)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: By analyzing trends and patterns in training history, valuable information can
    be retrieved, which can assist future model adjustments and improvements. In the
    preceding example, the validation accuracy starts to plateau if not decrease at
    around epoch 20, an indicator that the learning rate should be reduced around
    the point of increase (Figure [3-30](#Fig30)). It’s likely that doing so will
    yield a slight performance boost in validation accuracy.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig30_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'A line graph plots accuracy versus epochs in training and validation accuracy
    for two lines: val acc and train acc. The lines slope upward.'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-30
  prefs: []
  type: TYPE_NORMAL
- en: Training performance plotted against the number of epochs
  prefs: []
  type: TYPE_NORMAL
- en: Reduce Learning Rate on Plateau reduces the learning rate if the monitored metric
    specified by the “`monitor`” parameter does not improve for the number of epochs
    specified in the “`patience`” parameter. Each time the learning rate is reduced,
    it’s multiplied by the factor set in the “`factor`” parameter.
  prefs: []
  type: TYPE_NORMAL
- en: By incorporating the callbacks described previously, validation results may
    be able to improve from previous training (Listing [3-25](#PC25)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
- en: Observe that the validation accuracy improved by around 0.01, from 0.87 to around
    0.88\. You can adjust callback parameters to further improve the results. However,
    based on the problem setting and the limited modification power that callbacks
    possess, a 0.01 accuracy improvement is considered a success.
  prefs: []
  type: TYPE_NORMAL
- en: Batch Normalization and Dropout
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Previously, different optimizers were explored; some lead to fast convergence,
    while others can stabilize training while improving the model’s ability to generalize
    on unseen datasets. Although by updating the gradient differently, the entirety
    of training can be stabilized, there are still issues regarding training stability
    within the model itself. As the layers of the model receive raw signals from the
    previous layer’s activation, the distribution of the activation could change drastically
    across different batches. This can lead to the algorithm always trying to fit
    a moving target. This problem is named internal covariate shift. The network relies
    on high interdependency between distributions, which can slow down training as
    well as decrease the stability (Figure [3-31](#Fig31)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig31_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A diagram illustrates three neurons heavily interconnecting to two neurons that
    link to the next neuron.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-31
  prefs: []
  type: TYPE_NORMAL
- en: Raw, unnormalized signals from the network can lead to training instability
  prefs: []
  type: TYPE_NORMAL
- en: Batch normalization produces a normalized signal, which mitigates interdependency
    between distributions. This not only can increase training stability and speed,
    but batch normalization can also insert regularization into training or the ability
    to reduce overfitting and increase generalization.
  prefs: []
  type: TYPE_NORMAL
- en: Batch normalization uses the first and second statistical moments of the current
    batch, normalizing activation vectors from hidden layers. Usually, batch normalization
    is applied after the activation function; however, having it before the nonlinear
    transformation is acceptable too.
  prefs: []
  type: TYPE_NORMAL
- en: 'We denote the activation vector/output as *z*. Then the first and second moments
    of the batch, or the mean and uncentered variance, are defined in the following
    as such:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \mu =\frac{1}{n}\sum \limits_i^n{z}_i $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_Equk.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {\sigma}^2=\frac{1}{n}\sum \limits_i^n{\left({z}_i-\mu \right)}^2 $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_Equl.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Then, based on the values obtained, the activation vector is normalized so
    that each output vector from every neuron follows a normal or Gaussian distribution
    across the entire batch. Note that *ϵ* is added for numerical stability:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\hat{z}}_i=\frac{z_i-\mu }{\sqrt{\sigma^2-\epsilon }} $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_Equm.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Then a linear transformation is applied to the normalized output with two learnable
    parameters, allowing each layer to choose its own optimal distribution. Specifically,
    *γ* tunes the standard deviation, while *β* controls the bias:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \textrm{new}\ {z}_i=\gamma \ast {\hat{z}}_i+\beta $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_Equn.png)'
  prefs: []
  type: TYPE_IMG
- en: The values of *γ* and *β* are trained along with gradient descent using an Exponential
    Moving Average, similar to the mechanics of the Adam optimizer.
  prefs: []
  type: TYPE_NORMAL
- en: During the evaluation phase, when the data fed in is not sufficient for an entire
    batch and thus not enough information to calculate the first and second moments,
    the mean and uncentered variance are replaced by a precomputed estimation from
    the training phase.
  prefs: []
  type: TYPE_NORMAL
- en: In practice, Keras implemented batch normalization as a layer call and used
    it just like any `Dense` call. We can add batch normalization layers to our model
    as shown in Listing [3-26](#PC26).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE25]'
  prefs: []
  type: TYPE_PRE
- en: By retraining the model with batch normalization, a slight improvement to the
    validation accuracy is observed, while the training accuracy improved by around
    0.02\. If we analyze the graph produced by the batch normalization model, notice
    that the accuracy of both training and validation data is a lot more stable than
    the model without. What’s more is that in the graph of the model with batch normalization,
    both validation and training metrics converge a lot faster than the model without,
    plateauing at around epoch 15, while the model without stops improving around
    epoch 50 with similar performance (Figure [3-32](#Fig32)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig32_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Two line graphs depict the comparison between stable and unstable training before
    a plateau in training and validation accuracy.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-32
  prefs: []
  type: TYPE_NORMAL
- en: Model with batch normalization compared with the model without
  prefs: []
  type: TYPE_NORMAL
- en: Note that batch normalization does indeed assist with overfitting (the larger
    the batch size, the less regularization that it poses). Its most prominent use
    is to speed up and stabilize training. In modern networks, whether large or small,
    batch normalization layers are almost a default. However, one major downside to
    adding batch normalization layers after every hidden layer is the computational
    cost. With each addition of batch normalization, the convergence or the number
    of epochs may be reduced, but the amount of time that each epoch takes will increase
    significantly. It’s best to find a balance between adding batch normalization
    for every layer and having no batch normalization at all.
  prefs: []
  type: TYPE_NORMAL
- en: One major reason that neural networks are so easily overfitted (and, in return,
    the absurd number of methods that can improve neural network generalization) is
    the sheer size and the insane number of parameters that one simple network can
    contain.
  prefs: []
  type: TYPE_NORMAL
- en: 'An analogy to the superiority of sexual reproduction over asexual reproduction
    can be described as follows: The role of sexual reproduction is not just to let
    new and diverse genes spread through the population but also to reduce complex
    co-adaptions that would decrease the chance of a new gene improving the fitness
    of an individual. It displays the importance of sexual production by training
    the genes to not always rely on the vast pool of genes available but rather leading
    them to be able to work with a small number of genes too. The same concept is
    applied to neural networks by adding dropouts to layers. Each hidden unit in the
    neural network can be trained to work with all other parameters but also to work
    with a randomly chosen small set of parameters. This can, in turn, improve the
    robustness of the network.'
  prefs: []
  type: TYPE_NORMAL
- en: Dropouts, as the name suggests, drop out neurons at random during the training
    phase (Figure [3-33](#Fig33)). The main purpose behind dropout is to decrease
    the codependency between neurons and increase generalization abilities against
    unseen datasets.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig33_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 'A diagram represents four layers of interlinked neurons: three, two, three,
    and one. One neuron in each of the second and fourth layers is dropped.'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-33
  prefs: []
  type: TYPE_NORMAL
- en: Example of dropouts in neural networks
  prefs: []
  type: TYPE_NORMAL
- en: In practice, like batch norm layers, Keras provides a dropout layer with a user-specified
    parameter/value. According to the Keras documentation, the dropout layer “randomly
    sets input units to 0 with a frequency of rate at each step during training time,
    which helps prevent overfitting.” Here, “rate” is a preset hyperparameter.
  prefs: []
  type: TYPE_NORMAL
- en: The basic syntax for adding any dropout layer to a hidden layer is shown in
    the following (Listing [3-27](#PC27)). Note that during evaluation, all neurons
    are turned on.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE26]'
  prefs: []
  type: TYPE_PRE
- en: You can experiment with different values and amounts of dropout layers on the
    `fashion_model` and possibly further improve model performance. In most cases,
    dropouts will slightly reduce the performance of the model on training data but
    significantly improve the results on validation sets or unseen data.
  prefs: []
  type: TYPE_NORMAL
- en: The Keras Functional API
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In the preceding examples, modeling with Keras is done through the `Sequential`
    object, adding layers in an orderly fashion. However, this type of functionality
    and process of constructing a model is extremely limited, and many complex model
    architectures are built using the Keras functional API. Before adding any fancy
    connections and structures to the network, in Listing [3-28](#PC28) is an example
    of `fashion_model` defined previously as an example in the preceding sections
    built with the Keras functional API.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE27]'
  prefs: []
  type: TYPE_PRE
- en: As the name “functional API” suggests, layers are defined as functions of the
    previous one. Each layer can be stored in its own variable while it’s created
    in relation to the layer or layers, as we will see later. Unlike the `Sequential`
    model, in which each layer becomes a “part” of the model object, the functional
    API lets each layer become its own structure with limitless connections and structural
    possibilities. With the potential of each layer becoming its own unique variable,
    we can reference it later and create nonlinear network connections or even skip
    connections. However, if this is not needed, most conventions define every layer
    as one variable being redefined over and over for conciseness and readability.
  prefs: []
  type: TYPE_NORMAL
- en: The notation of redefining different layers over the same variable can be confusing
    at times. It’s best to pay attention to where each function is directing to, whether
    it directs to the output layer or another separate branch of layers.
  prefs: []
  type: TYPE_NORMAL
- en: We establish a connection between the current layer and the previous layer by
    calling the current layer object (e.g., the `Dense` layer) as a function where
    its parameter is the previous layer’s variable. Then the output of the function
    call is assigned to a variable (e.g., `x` is a commonly used variable name). Then
    the variable that we assigned the current layer to contains information about
    the current layer and its connection to the previous layer (Figure [3-34](#Fig34)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig34_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A flow diagram represents four networks connecting to the consecutive networks
    from input to output.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-34
  prefs: []
  type: TYPE_NORMAL
- en: The intuition behind functional API
  prefs: []
  type: TYPE_NORMAL
- en: A simple analogy to the common data structure of linked lists can be made. Each
    variable, or layer, defined in the functional API acts as a node in a linked list.
    The single variable does not contain the full information about the entire model,
    just as how the user can’t access every value in the linked list through one node.
    However, each variable contains a “pointer” to the next layer in its connection.
    When “stringing” the model together using the `keras.Model` object, Keras then
    internally connects the input layer and the output layer together by looking for
    these “pointers” and retrieving the layer information. Note that in the actual
    Keras library, the process of constructing a `Model` object from the functional
    API doesn’t necessarily work like a linked list, but it’s a decent analogy that
    can help with understanding.
  prefs: []
  type: TYPE_NORMAL
- en: Nonlinear Topologies
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The gem of the Keras functional API lies in its ability to create nonlinear
    topology models and models with multiple inputs and outputs. These model architectures
    cannot be sequentially defined and may contain complex structures in which one
    layer’s output can be copied and fed into multiple other layers. These nonlinear
    topology models also utilize merging techniques such as concatenation – one layer
    consists of the combination of two or more different layers’ output.
  prefs: []
  type: TYPE_NORMAL
- en: Having the ability to construct nonlinear topology models is important since
    they allow for a deeper and possibly more meaningful analysis of the given data,
    hence being able to produce better results. In a sequentially defined model, the
    data would be limited to one set of parameters that encodes information from the
    input or the previous layer’s outputs. With nonlinear topology, inputs can be
    passed through and split into multiple different “branches” of the network, each
    with different settings and types of connections. Then at one point, the insights
    of all these different “branches” can be merged back together by concatenation
    or some other form of operation specified by the user. Although it’s been said
    that sequential models can adapt to data and create different parameterized neurons
    based on the data, it’s still beneficial to use nonlinear topology as the ability
    of sequential models is limited. Most, if not all, modern state-of-the-art (SOTA)
    models use nonlinear topology in one way or another, whether trained on tabular
    data or other forms of data.
  prefs: []
  type: TYPE_NORMAL
- en: Building nonlinear topology in a functional manner is extremely intuitive. In
    the following, we’re going to build a rather simple nonlinear topology network
    as an example. Then, more sophisticated concepts such as multi-input, multi-output,
    and weight sharing will be built upon and explored. As an example, we aim to build
    a network starting off with one input block and then splitting off into two separate
    branches with a different number of hidden layers and number of neurons; then,
    afterward, they concatenate back into one branch and finally output the prediction.
    The concept is illustrated in Figure [3-35](#Fig35).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig35_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'A flow diagram of nonlinear topology network: input, branch one and two with
    several layers, concatenation, and output.'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-35
  prefs: []
  type: TYPE_NORMAL
- en: Nonlinear topology network
  prefs: []
  type: TYPE_NORMAL
- en: Following a similar fashion to the simple, functional model defined previously,
    we start out by defining the input layer shown in Listing [3-29](#PC29).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE28]'
  prefs: []
  type: TYPE_PRE
- en: Then, the two branches are defined separately (Listing [3-30](#PC30)). An important
    note is that the layers within the branch can use the same variable name, but
    layers of different branches cannot be defined with the same variable name. Doing
    so can mess up layer-to-layer relations, and it simply doesn’t make sense.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE29]'
  prefs: []
  type: TYPE_PRE
- en: After the creation of these two separate “branches” (the number of layers and
    neurons are chosen at random – this model only serves as an example), a concatenation
    is imposed to merge the outputs of the layers. Finally, the output layer is defined
    in relation to the concatenated layer. Notice that in the “parameter” of the `L.Concatenate`
    “function call” is a list consisting of the layer outputs that should be concatenated.
    In our case, it’s the output of `x` and `y` (Listing [3-31](#PC31)). Concatenate
    simply joins the output of the layers on the specified axis. Usually, the axis
    of concatenation is assumed to be along the feature column (e.g., an array of
    shape `(100,3)` concatenated with an array of shape `(100,2)` would result in
    an array of shape `(100,5)`). The concatenate layer is used much more than any
    other merging method because of its ability to preserve outputs from all layers.
    Other merging layers include `Average` (averages value on the specified axis),
    `Dot` (performs dot product between the two vectors/matrices), `Maximum` (applies
    the max function on the specified axis), and many more. In most cases, Concatenate
    serves more than enough to the model; it's better for the model to “figure” out
    what operations to perform on the merged layers than assigning it a strict operation
    to perform between the outputs of different branches.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE30]'
  prefs: []
  type: TYPE_PRE
- en: Then, the entire model is composed of one `keras.Model` object where the input
    layer’s variable is passed into the “input” parameter, while the variable that
    contains the output layer is passed into the parameter “output”.
  prefs: []
  type: TYPE_NORMAL
- en: When building complex and intricate networks, it’s easy to use the Keras functional
    API and loose track of variable names, connections, and layers. Keras provides
    a set of simple functions that display information about the model as well as
    visualize the model architecture.
  prefs: []
  type: TYPE_NORMAL
- en: By calling `summary()` on the created model object (or a compiled model), Keras
    will output a detailed summary of the parameters, shapes, and size of each layer,
    the connection of each layer, as well as the total number of parameters in the
    network. The output of `summary()` called on the nonlinear model created previously
    is shown in Listing [3-32](#PC32) and Figure [3-36](#Fig36).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig36_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'A chart of four columns and nine rows lists the following: layer, output shape,
    param, and connected to with total, trainable, and non-trainable params.'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-36
  prefs: []
  type: TYPE_NORMAL
- en: Output produced by model.summary()
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE31]'
  prefs: []
  type: TYPE_PRE
- en: For a more intuitive and straightforward representation, Keras has a function
    that can plot the architecture of the model while including information about
    the layer shapes and types. The function is imported from `keras.utils` as `plot_model`.
    There are several parameters associated with the function. The model to be plotted
    is passed in as the first parameter. Then the `to_file` parameter creates the
    name of the visualization as well as the file path that it’s saved to. There are
    two other minor parameters, `show_shapes` and `show_layer_names`, which control
    whether the plot displays the input and the output shape of the layer and the
    name of the layer, respectively (Listing [3-33](#PC33) and Figure [3-37](#Fig37)).
    The name of each layer can be customized by passing in the name as a string to
    any layer call under the `name` parameter.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig37_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flow chart represents seven phases of layers with their input and output values.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-37
  prefs: []
  type: TYPE_NORMAL
- en: The plotted model diagram
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE32]'
  prefs: []
  type: TYPE_PRE
- en: Especially for nonlinear topologized models, being able to visualize how data
    is passed through between intertwined branches of a layer is extremely helpful
    to fix mistakes in model definition or simply to have a better grasp of the general
    model architecture. We will use this extensively in the remainder of the book
    as we grapple with new architectures.
  prefs: []
  type: TYPE_NORMAL
- en: Multi-input and Multi-output Models
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: In certain problem settings, multiple components of data are presented in different
    formats, or sometimes they fit into completely different categories that don’t
    make sense to be combined and trained together. The obvious solution would be
    to train a separate model for different types of data. One common example is in
    the medical field. Imagine classification on radiographs is oftentimes paired
    with metadata about the image’s patient given in the form of tabular data. Both
    image and tabular data provide crucial information that may be useful to the classification
    task. One might train a model handling the tabular data part, while another model
    processes the images. Then after each model predicts, the prediction is averaged
    to produce the final output. Although viable, the solution does encounter a few
    problems. Since each model only possesses certain portions of the “whole picture”
    and attempts to make a prediction based on the partial information, the results
    produced may be poorly informed. With multi-input models, however, we can jointly
    consider how all parts of the picture fit together. Luckily, there is a way to
    have one model receive two inputs and then, after processing both individually,
    combine the outputs of the layer into one single, merged layer. Then the entire
    model is trained together with backpropagation splitting its way back into each
    input “branch.” A model trained this way performs much better than multiple singular
    models as the model learns its own “language” to combine insights from two or
    more different types of data, producing results that cannot be replicated with
    separate models.
  prefs: []
  type: TYPE_NORMAL
- en: Similarly, there are situations where one set of data is given to predict multiple
    different types of outputs. An example could be predicting house prices and whether
    it will be sold in 5 years using the same set of features about the house. Again,
    having two models with the same feature predict different types of outputs can
    be done. However, it’s more beneficial to combine the two output “branches” into
    one single model. Backpropagation can relate the patterns of both branches into
    the model, acquiring the conjoined knowledge of both parts of the data that can’t
    be learned with two separate models.
  prefs: []
  type: TYPE_NORMAL
- en: Building these types of models with the `Sequential` object would be impossible,
    but with the functional API, it becomes both possible and entirely intuitive.
    For multi-input models, we simply define two input heads with different variables.
    Then once they’re processed through layers in their own “branches,” concatenation
    is used, or any other form of merging between layers can combine the input branches
    into one single hidden layer. An example code for constructing a multi-input model
    is shown in Listing [3-34](#PC34), along with the visualization of model architecture
    in Figure [3-38](#Fig38).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig38_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flow diagram presents the classification of multi-input model from input one
    to dense three with their input and output values.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-38
  prefs: []
  type: TYPE_NORMAL
- en: The model architecture of the multi-input model
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE33]'
  prefs: []
  type: TYPE_PRE
- en: During training, the different types of input data are passed in as a list within
    the `(x, y)` tuple in the same order that the layers are inputted into the list
    when creating the `Model` object (Listing [3-35](#PC35)). The same concept applies
    to evaluation.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE34]'
  prefs: []
  type: TYPE_PRE
- en: Multi-output models can be defined in a similar manner. The different output
    layers are passed in as a list into the `keras.Model` object, and during training,
    it’s passed in as a list within the `(x, y)` tuple. Shown in Listing [3-36](#PC36)
    is the basic code for defining a multi-output model, and its plotted model architecture
    is in Figure [3-39](#Fig39).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig39_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flow diagram depicts the steps of multi-input model from input one to dense
    three and five with their input and output values.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-39
  prefs: []
  type: TYPE_NORMAL
- en: The model architecture of the multi-output model
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE35]'
  prefs: []
  type: TYPE_PRE
- en: Embeddings
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Tabular datasets often have continuous features in addition to categorical features.
    One can use the categorical encoding methods discussed in Chapter [2](525591_1_En_2_Chapter.xhtml)
    to encode the categorical features, which may be successful. (See Chapter [10](525591_1_En_10_Chapter.xhtml)
    to see how you can automate the selection of the best data preprocessing operations.)
    Another way to encode categorical features is to have the network automatically
    learn to associate an *n*-dimensional vector with each unique categorical value
    – that is, to optimally *embed* unique values into *n*-dimensional space.
  prefs: []
  type: TYPE_NORMAL
- en: Embeddings are useful when there are a high number of unique values in a categorical
    feature and it is too difficult to capture their intricacies with alternative
    “classical” categorical encoding methods.
  prefs: []
  type: TYPE_NORMAL
- en: Embeddings are implemented as matrices applied to one-hot encoded categorical
    features, which are optimized just like any other parameter in the network. However,
    to use the Keras embedding layer, your feature must be ordinally encoded (beginning
    from zero). Moreover, to use embeddings on a categorical feature or multiple categorical
    features in conjunction with continuous features, you need to designate one head
    per categorical feature such that it can be passed into a unique embedding. After
    embedding the feature, the result can be concatenated with other vectors or processed
    as desired (Listing [3-37](#PC37)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE36]'
  prefs: []
  type: TYPE_PRE
- en: Note that we flatten the result of the embedding layer because its output is
    of shape `(1, dim)`; flattening produces a `dim`-length vector, which can be processed
    with fully connected layers and the like. The rank-two shape is because the embedding
    layer is built to work primarily with text, which is functionally a large bundle
    of categorical features each with the same number of classes (the vocabulary size).
    A 100-token-long sequence would have an embedding shape `(100, dim)`.
  prefs: []
  type: TYPE_NORMAL
- en: You will see examples of embeddings applied to categorical features and text
    data later in this chapter (“Selected Research” > “Wide and Deep Learning”), Chapter
    [4](525591_1_En_4_Chapter.xhtml) (Multimodal Image and Tabular Models), Chapter
    [5](525591_1_En_5_Chapter.xhtml) (Multimodal Recurrent Modeling), and Chapter
    [10](525591_1_En_10_Chapter.xhtml), among others.
  prefs: []
  type: TYPE_NORMAL
- en: Model Weight Sharing
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Computational costs are one major downside to training multi-input, multi-output,
    or any other complex nonlinear topologized models. As seen earlier in the chapter,
    the number of trainable parameters that a network can contain is absurd, up to
    millions in a simple model; with the addition of different branches of the network,
    the risk of overfitting increases as well as the training time. One technique
    that improves upon this disadvantage is weight sharing (Figure [3-40](#Fig40)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig40_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'A flow diagram of nonlinear topology network: input, branch one and two with
    layers, concatenation, and output.'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-40
  prefs: []
  type: TYPE_NORMAL
- en: Weight sharing intuition
  prefs: []
  type: TYPE_NORMAL
- en: 'It does exactly what it sounds like: sharing weights between different layers
    of the same shape. By doing so, the sets of weights in two separate layers are
    identical, meaning that backpropagation only needs to run through it once. However,
    by reducing the training time, we do come at the cost of model flexibility since
    the algorithm needs to find the same set of weights that fits both layers. But
    note that by doing so, we introduce regularization into the model, possibly improving
    validation performance.'
  prefs: []
  type: TYPE_NORMAL
- en: Using the Keras functional API, we can create a single layer that we want to
    share the weights off and assign to a variable. Following, each time that we want
    to reuse the layers, we simply call the layers in the functional API style, connecting
    them to whichever previous layer we want to connect. Shown in Listing [3-38](#PC38)
    is a basic example of weight sharing, and the plotted model architecture is in
    Figure [3-41](#Fig41). The example model built in the following is a multi-input
    model that shares the same layer weights in two different branches before merging
    into one. An important point to note, the input dimension from the previous layers
    that use the same shared layer must be the same.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig41_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flow diagram depicts the steps of wait sharing model from input 18 and 19
    to dense 38 with their input and output values.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-41
  prefs: []
  type: TYPE_NORMAL
- en: Weight sharing model architecture
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE37]'
  prefs: []
  type: TYPE_PRE
- en: The Universal Approximation Theorem
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: George Cybenko published the paper “Approximation by Superpositions of a Sigmoidal
    Function”^([3](#Fn3)) in a 1989 edition of the *Mathematics of Control, Signals,
    and Systems* journal (Figure [3-42](#Fig42)). This paper proposed the theoretical
    foundations of the Universal Approximation Theorem, which has been subsequently
    built on by a large body of expanding and generalizing work. Fundamentally, Cybenko’s
    paper and the Universal Approximation Theorem make statements about the ability
    of neural networks to theoretically fit any function to an arbitrary degree of
    correctness, given sufficient size.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig42_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A representation of the abstract and three keywords in approximation by superpositions
    of a sigmoidal function is rendered by the author, Cybenko.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-42
  prefs: []
  type: TYPE_NORMAL
- en: Title and abstract of Cybenko’s original paper
  prefs: []
  type: TYPE_NORMAL
- en: Cybenko’s paper considered a function to be “sigmoidal” if it approached 1 as
    its argument approached infinity and 0 as its argument approached negative infinity.
    Note that the “standard” sigmoid function ![$$ \frac{1}{1+{e}^{-x}} $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_IEq14.png)
    satisfies this property, but so do others, like a rescaled hyperbolic tangent
    (![$$ \frac{\tanh (x)+1}{2} $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_IEq15.png))
    and the Heaviside step function (*x* = 0 if *x* < 0, else 1). Cybenko was concerned
    primarily with activation functions that, at root, allowed arguments to manipulate
    an output near two “binary” states. Under these conditions, a single-hidden-layer
    neural network with a sufficient number of neurons can be shown to approximate
    an arbitrary function. In this case, we can interpret the network as a linear
    sum of sigmoidal functions.
  prefs: []
  type: TYPE_NORMAL
- en: Subsequently, similar results have been demonstrated for other activation functions
    like ReLU, multilayer networks, and other variants.
  prefs: []
  type: TYPE_NORMAL
- en: The original conditions outlined in Cybenko’s paper are difficult to get working.
    This neural network has a one-dimensional input, a very large hidden layer, and
    a one-dimensional output. With your experience in Keras, this should be simple
    to implement. However, it is difficult to obtain a functional approximation using
    this network. This stems from the difference between proving the existence of
    a set of weights that can approximate an arbitrary function and finding a method
    that reliably leads to the discovery of said weights.
  prefs: []
  type: TYPE_NORMAL
- en: 'However, it is simpler to demonstrate universal approximation capabilities
    with two modifications: using multilayer networks, which are more expressive than
    single-layer networks, and the ReLU activation, which is unbounded and therefore
    easier to manipulate and optimize for in the context of function approximation.
    Listing [3-39](#PC39) demonstrates implementation of a “Universal Approximation
    Theorem model generator,” which takes in the number of hidden layers, the number
    of nodes in each layer, and the activation function to use.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE38]'
  prefs: []
  type: TYPE_PRE
- en: Our arbitrary function of choice will be sin²*x* − *e*^(− cos *x*) within the
    domain [−20, 20], which is highly nonlinear (Listing [3-40](#PC40), Figure [3-43](#Fig43)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig43_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph represents the nonlinear function. The curve depicts continuous
    fluctuation in an M-shaped pattern throughout.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-43
  prefs: []
  type: TYPE_NORMAL
- en: Graph of *sin*²*x* − *e*^(− *cos x*) within the domain [−20, 20]
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE39]'
  prefs: []
  type: TYPE_PRE
- en: Figures [3-44](#Fig44), [3-45](#Fig45), and [3-46](#Fig46) demonstrate the fit
    for a neural network trained with 1024 nodes in each layer and one, two, and three
    layers (respectively). Note the angular fit of the ReLU activation functions and
    the successively improving fits as the number of layers and expressivity increase.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig46_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph depicts the fit for three layers with two lines of prediction and
    true function. The lines fluctuate in an M-shaped pattern and overlaps.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-46
  prefs: []
  type: TYPE_NORMAL
- en: Near-perfect learned fit for three layers
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig45_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph of two lines of prediction and true function in the fit for neural
    network for two layers. The prediction line presents variation.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-45
  prefs: []
  type: TYPE_NORMAL
- en: Learned fit for two layers
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig44_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph presents two lines of prediction and true function in the fit for
    neural network for one layer. The prediction line depicts variation.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-44
  prefs: []
  type: TYPE_NORMAL
- en: Learned fit for one layer
  prefs: []
  type: TYPE_NORMAL
- en: This is one demonstration of how you can observe interesting theoretical properties
    of neural networks with the skills you’ve acquired in constructing and fitting
    neural networks.
  prefs: []
  type: TYPE_NORMAL
- en: Selected Research
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We will further explore how more complex models and designs are being used in
    future chapters. However, one who has learned the material in just this chapter
    is already prepared to understand and work with a host of modern tabular deep
    learning techniques, which modify feed-forward networks to more effectively model
    tabular data. This section provides a brief overview and implementation directions
    for four selected research papers.
  prefs: []
  type: TYPE_NORMAL
- en: Simple Modifications to Improve Tabular Neural Networks
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: James Fiedler synthesizes a set of relatively low-labor modifications to standard
    neural networks from other research in the area that can be used to possibly improve
    performance on tabular problems in the 2021 paper “Simple Modifications to Improve
    Tabular Neural Networks.”^([4](#Fn4)) Two modifications that are approachable
    at this stage in the book and discussed in Fiedler’s paper are presented here.
  prefs: []
  type: TYPE_NORMAL
- en: Ghost Batch Normalization
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Previously, batch normalization was introduced as an effective mechanism to
    smooth the loss landscape and improve training performance by standardizing the
    inputs (Figure [3-47](#Fig47)). However, note that batch normalization performs
    differently for different batch sizes. The “generalization gap” is an observed
    phenomenon in which neural networks perform worse on validation data when trained
    on large batch sizes than on small batch sizes. Large batch sizes are constrained
    by a larger population of samples, so we would expect it to move “slower” and
    less sharply than the updates computed with small batch sizes. This, researchers
    hypothesize, prevents models trained with large batch sizes and batch normalization
    layers from moving out of attractive local minima with poor generalization. Moreover,
    computing batch normalization on large batches is subpar in efficiency.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig47_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 'A flow diagram lists the steps in a process for the following: original input,
    distribution calculations, batch normalization, and transformed input.'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-47
  prefs: []
  type: TYPE_NORMAL
- en: A diagram of batch normalization
  prefs: []
  type: TYPE_NORMAL
- en: To address this, we can use *ghost batch normalization*^([5](#Fn5)) (Figure
    [3-48](#Fig48)) in place of batch normalization. Rather than computing batch normalization
    statistics across the entire batch, we split the batch into virtual “ghost” batches
    and calculate normalization across these smaller groups of samples. This allows
    for training models with large batch sizes without experiencing generalization
    gap problems in which said large batches constrain learning activity.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig48_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 'A flow diagram lists the steps in the process for the following: original input,
    batch normalization, and transformed input.'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-48
  prefs: []
  type: TYPE_NORMAL
- en: A diagram of ghost batch normalization. The distribution calculation arrows
    are not shown.
  prefs: []
  type: TYPE_NORMAL
- en: You can pass the `virtual_batch_size` argument into Keras’s `BatchNormalization`
    layer to enable ghost batch normalization. The virtual batch size must divide
    into the batch size; for instance, 50 would not be a valid virtual batch size
    assuming a batch size of 256, but 32 would be.
  prefs: []
  type: TYPE_NORMAL
- en: This should not be confused with the “virtual batch normalization” method, used
    by the authors of the Generative Adversarial Network paper (see Chapter [9](525591_1_En_9_Chapter.xhtml)),
    in which a single batch’s calculations are used across an entire dataset to ensure
    greater stability.
  prefs: []
  type: TYPE_NORMAL
- en: Leaky Gates
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'A leaky gate is a simple “gating” mechanism in which the network learns simple
    element-wise linear transformations to determine whether each element “passes”
    the gate or not. Each element in a vector is multiplied by a vector and added
    to a bias. If the resulting value is larger than zero, the value passes through
    unchanged; otherwise, zero (or a value very close to zero) is returned. It is
    functionally an element-wise linear transformation followed by a ReLU. The leaky
    gate is defined as follows for a vector input *x* and an index *i* denoting the
    *i*th element of *x*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {g}_i\left({x}_i\right)=\left\{\begin{array}{c}{w}_i{x}_i+{b}_i,\kern0.5em
    {w}_i{x}_i+{b}_i\ge 0\\ {}\approx 0,\kern0.5em {w}_i{x}_i+{b}_i&lt;0\end{array}\right.
    $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_Equo.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Consider the following system:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ x=\left\langle 3,2,1\right\rangle $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_Equp.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ w=\left\langle -4,2,3\right\rangle $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_Equq.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ b=\left\langle 2,0,-1\right\rangle $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_Equr.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Then, we have the following element-wise linear transformation (where ⊗ denotes
    element-wise multiplication and ⊕ denotes element-wise addition):'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \left(x\otimes w\right)\oplus b=\left\langle 3\cdot -4+2,2\cdot 2+0,1\cdot
    3-1\right\rangle =\left\langle -10,4,2\right\rangle $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_Equs.png)'
  prefs: []
  type: TYPE_IMG
- en: After passing through the ReLU condition, we obtain ⟨0, 4, 2⟩. The first input
    did not pass, but the other two did.
  prefs: []
  type: TYPE_NORMAL
- en: Such gating mechanisms enable a form of explicit “feature selection” similar
    to how tree-based models select a subset of features to reason from. We will see
    more advanced neural network feature selection analogs in future research paper
    discussions.
  prefs: []
  type: TYPE_NORMAL
- en: We can implement a leaky gate with a custom Keras layer (Listing [3-41](#PC41)).
    In the `__init__` method, we “hook” the layer with the previous layer in the functional
    API style. Two learnable parameters, the weight and the bias, are each added in
    the `build` method. The `call` method orchestrates the transformation of the input
    by the layer’s internal parameters, which in this case is a simple element-wise
    multiplication (we use broadcasting to enable the same multiplication over the
    batch dimension) and addition.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE40]'
  prefs: []
  type: TYPE_PRE
- en: To verify the functionality of this layer, let us construct a simple model and
    gating task to train on (Listing [3-42](#PC42)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE41]'
  prefs: []
  type: TYPE_PRE
- en: One can verify with `(np.round(gate.w) == mask).all()` that the model exactly
    learns the mask.
  prefs: []
  type: TYPE_NORMAL
- en: This gating mechanism can be added throughout your network designs to encourage
    dynamic feature selection.
  prefs: []
  type: TYPE_NORMAL
- en: Wide and Deep Learning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Introduced by Heng-Tze Cheng et al. in the paper “Wide & Deep Learning for Recommender
    Systems,”^([6](#Fn6)) Wide and Deep is a relatively simple tabular deep learning
    paradigm that nevertheless has shown extraordinary success in many domains, including
    in recommendation systems.
  prefs: []
  type: TYPE_NORMAL
- en: A “wide” model is a simple linear model (Logistic Regression in the context
    of classification and functionally a zero-hidden-layer neural network). The inputs
    to such a model include both original features and *cross-product transformations*,
    in which selected features are multiplied by each other. This can capture when
    relevant phenomena occur simultaneously across multiple columns – for instance,
    if the cross-product of two columns, “isVideo?” and “isTrending?”, in a hypothetical
    social media content dataset indicates whether the sample both is a video and
    is trending. Computing cross-product transformations is necessary because simple
    linear models are not capable of developing these intermediate features on their
    own. Even if we add cross-product features, however, these products cannot generalize
    to new feature pairs because they are hard-coded as inputs to the model.
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, a “deep” model is a standard neural network that can develop
    meaningful embedding representations that can be internally combined and generalize
    well to new data. However, it is difficult for deep neural networks to learn effective
    low-dimensional embeddings when the dataset itself is complex and contains many
    intricacies.
  prefs: []
  type: TYPE_NORMAL
- en: The Wide and Deep paradigm (Figure [3-49](#Fig49)) is to take the best of both
    worlds by jointly training a model with both a wide and a deep component. In the
    resulting model, some features (original and cross-product computed) are passed
    into a “wide” linear model, and others are passed into a “deep” neural network.
    The outputs of both models are added to produce the final output, jointly informed
    by the generalizing influence of the wide component and the specificity power
    of the deep component.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig49_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration of the emerging and interconnected wide, wide and deep, and
    deep models depicts the factors involved, from input to sparse features.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-49
  prefs: []
  type: TYPE_NORMAL
- en: Merging a wide linear model and a deep model to form a Wide and Deep model,
    from Cheng et al.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let us demonstrate the Wide and Deep paradigm on the Forest Cover dataset (Listing
    [3-43](#PC43)). After loading the dataset into `data`, we create the inputs to
    the wide and deep models. There are two relevant categorical features: soil type
    and wilderness area. We will generate a feature cross between these two features
    by multiplying every one-hot column from one feature by every one-hot column in
    the other. The inputs to the deep model are all the continuous inputs and the
    categorical features, which are isolated and will be passed into their own respective
    embedding layers.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE42]'
  prefs: []
  type: TYPE_PRE
- en: The wide model is a simple linear model (Listing [3-44](#PC44)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE43]'
  prefs: []
  type: TYPE_PRE
- en: The deep model is more complex (Listing [3-45](#PC45)). We need to create three
    inputs – one for the continuous features, one for the soil type feature, and one
    for the wilderness area feature. Both categorical features are passed through
    an embedding layer with 16 dimensions, indicating that each unique class in each
    feature is associated with a unique 16-dimensional vector. These embeddings are
    concatenated with the continuous features and passed through a series of fully
    connected layers into an output.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE44]'
  prefs: []
  type: TYPE_PRE
- en: We can combine these two models using the `WideDeepModel` provided in Keras’s
    experimental module (Listing [3-46](#PC46)). The model accepts both a wide model
    and a deep model, as well as the final activation, and allows for their joint
    training. Note that we pass the wide model’s data and the deep model’s data together
    bundled in the same list, per multi-input model syntax.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE45]'
  prefs: []
  type: TYPE_PRE
- en: This method of combining models with different strengths can be adopted as a
    general modeling paradigm. Have a look at Chapter [11](525591_1_En_11_Chapter.xhtml)
    for more examples of how different models can be combined into effective ensembles.
  prefs: []
  type: TYPE_NORMAL
- en: 'See the following similar papers that make use of feature crosses and other
    explicit feature interaction modeling methods. Also, see Chapter [6](525591_1_En_6_Chapter.xhtml)
    to see how feature interactions can be learned (rather than manually set into
    the data):'
  prefs: []
  type: TYPE_NORMAL
- en: 'Huang, T., Zhang, Z., & Zhang, J. (2019). FiBiNET: Combining feature importance
    and bilinear feature interaction for click-through rate prediction. *Proceedings
    of the 13th ACM Conference on Recommender Systems*.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Lian, J., Zhou, X., Zhang, F., Chen, Z., Xie, X., & Sun, G. (2018). xDeepFM:
    Combining Explicit and Implicit Feature Interactions for Recommender Systems.
    *Proceedings of the 24th ACM SIGKDD International Conference on Knowledge Discovery
    & Data Mining*.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Qu, Y., Fang, B., Zhang, W., Tang, R., Niu, M., Guo, H., Yu, Y., & He, X. (2019).
    Product-Based Neural Networks for User Response Prediction over Multi-Field Categorical
    Data. *ACM Transactions on Information Systems (TOIS), 37*, 1 –35.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Wang, R., Fu, B., Fu, G., & Wang, M. (2017). Deep & Cross Network for Ad Click
    Predictions. *Proceedings of the ADKDD'17*.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Wang, R., Shivanna, R., Cheng, D.Z., Jain, S., Lin, D., Hong, L., & Chi, E.H.
    (2021). DCN V2: Improved Deep & Cross Network and Practical Lessons for Web-scale
    Learning to Rank Systems. *Proceedings of the Web Conference 2021*.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Self-Normalizing Neural Networks
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Günter Klambauer et al. introduce the scaled exponential linear unit (SELU)
    activation function in the paper “Self-Normalizing Neural Networks”^([7](#Fn7))
    as an alternative to ReLUs. The authors find that simple substitution of SELU
    over ReLU in standard fully connected neural networks can significantly improve
    performance on a large number of tasks. While the paper discusses applications
    to vision and text, we will focus on the implications for modeling tabular data.
  prefs: []
  type: TYPE_NORMAL
- en: Klambauer et al. assert that normalization mechanisms like batch normalization
    are perturbed by stochastic processes in the network, such as stochastic gradient
    descent and dropout (i.e., stochastic regularization), which makes it difficult
    to train deep fully connected neural networks on tabular data.
  prefs: []
  type: TYPE_NORMAL
- en: 'A *self-normalizing* *neural network* is roughly defined as a neural network
    for which the mean and variance of activations stably approach/converge toward
    a fixed point as the number of layers information is passed through increases.
    For instance, say that our ideal fixed point is a mean of 0 and a variance of
    1\. In the following examples of hypothetical means and variances of activations
    for each layer in a nine-layer network, progression A would be self-normalizing,
    whereas progression B would not:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE46]'
  prefs: []
  type: TYPE_PRE
- en: Note how this differs from a normalization scheme like batch normalization,
    where activations are immediately (perhaps even “abruptly”) normalized but don’t
    necessarily stay that way through the network. A network that satisfies the self-normalizing
    constraint can be thought of as adopting a more “sustainable” normalization trajectory.
  prefs: []
  type: TYPE_NORMAL
- en: 'The SELU activation, when used by a neural network, is self-normalizing (Figure
    [3-50](#Fig50)). It is defined as follows, given two parameters *λ* > 1 and *α* > 0:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \textrm{SELU}(x)=\lambda \left\{\begin{array}{c}x,\kern0.5em x&gt;0\\
    {}\alpha {e}^x-\alpha, \kern0.5em x\le 0\end{array}\right. $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_Equt.png)'
  prefs: []
  type: TYPE_IMG
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig50_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph represents the S E L U activation function. The curve rises from
    the origin and gradually slopes upward.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-50
  prefs: []
  type: TYPE_NORMAL
- en: The SELU activation function
  prefs: []
  type: TYPE_NORMAL
- en: 'This activation function possesses the following key properties:'
  prefs: []
  type: TYPE_NORMAL
- en: The capability to represent both negative and positive values to control the
    mean, which ReLU and sigmoid lack
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Regions with derivatives approaching zero (as *x* →  − ∞) to dampen the variance
    if it is too large (this maps high-variance inputs to low-variance activations,
    that is, to a “flat landscape”)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Regions with larger derivatives (a slope larger than 1 for *x* > 0) to increase
    the variance if it is too small (this maps low-variance data to high-variance
    activations, that is, to a “steep landscape”)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: A continuous curve upon which the previous three properties can be nudged and
    tuned toward self-normalization as information is propagated throughout the network
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: These properties endow the SELU function with theoretically and practically
    demonstrable self-normalizing behavior throughout the network.
  prefs: []
  type: TYPE_NORMAL
- en: SELU comes implemented in Keras with `activation=’selu’` in any layer that accepts
    an activation function.
  prefs: []
  type: TYPE_NORMAL
- en: The SELU function has been empirically observed to either perform about the
    same as ReLU or better than ReLU; moreover, when SELU performs better than ReLU,
    it often performs much better (as opposed to marginally better). Thus, it is not
    ill-advised to use SELU as a “default” activation function.
  prefs: []
  type: TYPE_NORMAL
- en: Regularization Learning Networks
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Regularization is a technique to combat overfitting by penalizing large weight
    values. We can generically express a regularized loss *L*[*r*] given *P* that
    returns model predictions on an input *x* given the weights *w* and the default
    loss *L* between the predicted labels and the true labels as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {L}_R\left(x,y,w\right)=L\left(P\left(x,w\right),y\right)+\lambda {\left|\left|w\right|\right|}_n
    $$](../images/525591_1_En_3_Chapter/525591_1_En_3_Chapter_TeX_Equu.png)'
  prefs: []
  type: TYPE_IMG
- en: Note that the double-pipe symbol represents the norm of the weights and *λ*
    the weight of the penalty term relative to the default prediction loss. It is
    most common to either use the L1 or L2 norm.
  prefs: []
  type: TYPE_NORMAL
- en: This modifies the loss such that the model can decrease regularized loss either
    by updating its weights in the direction that minimizes default prediction loss
    or by decreasing the magnitude of its weights. Weights are therefore “small” by
    default and do not exert heavy influence over the internal network information
    flow. If a model trained with regularized loss does have large weight values,
    these weights are so important to prediction that their contribution to default
    prediction loss outweighs their magnitude (penalized by the regularization term).
  prefs: []
  type: TYPE_NORMAL
- en: One can conceptualize the regularization penalty term as having the same effect
    as gravity does on our movement. Gravity is an always-present force that shapes
    how we move and expend our energy.
  prefs: []
  type: TYPE_NORMAL
- en: In Keras, users can apply L1 or L2 regularization to a given network layer’s
    parameters and/or activity (Listing [3-47](#PC48)). Applying regularization to
    parameters is more commonly used to avoid overfitting, whereas applying regularization
    to activity (i.e., the output of the layer) is used to encourage sparsity. See
    the “Sparse Autoencoders” section of Chapter [8](525591_1_En_8_Chapter.xhtml)
    for an example of applying regularization for the development of robust sparse
    learning representations.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE47]'
  prefs: []
  type: TYPE_PRE
- en: These regularizers apply a uniform penalty strength across all weights in a
    layer (this penalty strength being *λ*). It “equally pushes all weights down,”
    so to speak. This works for homogenous input data forms like images and text in
    which each feature resides in the same possible range of values as every other
    feature. However, tabular data often consists of heterogenous data in which features
    operate on many different scales. It therefore does not make sense to apply an
    equal weighting across all weights.
  prefs: []
  type: TYPE_NORMAL
- en: 'Ira Shavitt and Eran Segal propose the *Regularization Learning Network* in
    the 2018 paper “Regularization Learning Networks: Deep Learning for Tabular Datasets,”^([8](#Fn8))
    which addresses this problem by learning a different penalty strength for every
    weight. In order to optimize individual *λ*-values effectively, one needs to use
    gradient-based methods; however, there is no clear differentiable relation between
    the *λ*-values and the loss function as there is between the weights and the loss
    function. The *λ*-values do not directly affect the model’s predictions; they
    affect how the weights are learned. Therefore, *λ*-values enact change *temporally*
    (i.e., through time).'
  prefs: []
  type: TYPE_NORMAL
- en: 'Exploiting this, Shavitt and Segal put forth *counterfactual loss*, which is
    the loss that a network updated with the current set of *λ*-values *will* obtain.
    Out of this clever reformulation emerges a clear differentiable relation between
    the *λ*-values and the future loss. Rather than using a penalty term that augments
    the model’s loss, the model updates in two steps: updating the penalty strengths
    *λ* to minimize the counterfactual loss and then updating the weights themselves
    to minimize the default predictive loss (Figure [3-51](#Fig51)).'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_3_Chapter/525591_1_En_3_Fig51_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A chart represents the attempts to minimize the update and loss in model weights
    and regularization strengths.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-51
  prefs: []
  type: TYPE_NORMAL
- en: Approximate schematic illustrating how regularization penalty strengths can
    be optimized along with the model weights themselves by optimizing for the loss
    incurred by a model updated using the given model weights
  prefs: []
  type: TYPE_NORMAL
- en: Regularization Learning Networks (RLNs) are implemented as a Keras callback
    (Listing [3-48](#PC49)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE48]'
  prefs: []
  type: TYPE_PRE
- en: To use the callback, simply pass a regularized layer into the callback constructor
    and pass the callback(s) into the `.fit` function (Listing [3-49](#PC50)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE49]'
  prefs: []
  type: TYPE_PRE
- en: Applying regularization learning works well on heterogenous datasets that, for
    one reason or another, the network is likely to overfit on (the network is overparametrized
    with respect to the dataset size, the dataset is not very complex, etc.).
  prefs: []
  type: TYPE_NORMAL
- en: Key Points
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this chapter, the theory and foundation of neural networks, their applications
    to tabular data, and Keras were thoroughly discussed and visually explained.
  prefs: []
  type: TYPE_NORMAL
- en: Neural networks are machine learning models linked by numerous neurons with
    each of them assigned a trainable weight and bias. In an artificial neural network
    (ANN), each neuron is connected to every neuron in the previous and the next layer.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Feed-forward operation is needed to make predictions and is also involved in
    backpropagation. It takes in data in the form of vectors, or matrices when dealing
    with more than one sample at a time. As the data is passed through the input layer,
    the result of multiplication and addition with the neuron that’s associated is
    passed to every single neuron in the next layer. This process continues until
    the data reaches the output layer. Calculations are done by dot products for efficiency
    and conciseness. The produced output is treated as predictions or an intermediate
    step during backpropagation
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Backpropagation is the heart of neural network learning; it uses gradient descent
    to adjust each parameter in the network. Prior to training, the network is typically
    initialized with random weights or calculated according to some weight initialization
    algorithm. Then the data, generally batched by a user-specified parameter, is
    passed through the network to generate an initial prediction. The cost function
    acts as an objective or task that the gradient descent algorithm is trying to
    optimize. The number of parameters in the cost function is the number of parameters
    in the network as changes in any of these values would influence the final cost
    or loss value. Then the derivative of the cost function is taken with respect
    to every parameter in the network, or the gradient of the cost function is calculated
    by working backward to the input layers. The parameter update rule is determined
    by the optimizer used. Gradient descent–related algorithms such as NAG and acceleration
    tend to have stabilizing performance, but training speed is slow. On the contrary,
    modern optimizers such as Adam have fast convergence, but training results may
    be unstable when used on large models.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Keras, the high-level API built on TensorFlow, is a common framework or library
    chosen for building neural networks with easy-to-understand syntax. One downfall
    of Keras is that it does not have as much low-level control of the actual training
    process compared with its competitors such as PyTorch. But in most cases what
    Keras has to offer is enough.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: One of the most straightforward methods of constructing a neural network is
    through the Keras Sequential object. Although only limited to sequentially connected
    layers with each layer preceding the next without any skip connections or branches,
    mistakes are less likely to happen, and the readability of the code is high compared
    with the functional API.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The Keras functional API provides endless possibilities for neural network architectures
    from multi-input to multi-output models, skip connections and weight sharing,
    or a combination of all. By using the functional API, the code readability aspect
    will be sacrificed for complex structures and creating models to any constraint.
    Layers are defined in relation with the previous layer functionally, and all layers
    are stored in a variable.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The most common ordering of layers in a neural network is as follows: dense/fully
    connected layer, activation, dropout, and then finally batch normalization if
    needed.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Keras has built-in functions for monitoring training progress and retrieving
    the data for training after it’s done. Callbacks are used to monitor and gather
    certain information regarding the training process at each epoch. Commonly used
    ones include `ModelCheckpoint`, `EarlyStopping`, and `ReduceLROnPlateau`. By calling
    history on the object returned after fit, a `DataFrame` containing the specified
    metric and loss at each epoch will be generated. This can be plotted and used
    to analyze the overarching trend of training. Finally, by using the function `plot_model`
    imported from `keras.utils`, a diagram can be produced to display the model architecture.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Research into tabular deep learning demonstrates that several modifications
    of fully connected layers can yield successful models.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using ghost batch normalization rather than standard batch normalization can
    improve convergence speed and performance.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Using a self-gating mechanism allows for implicit feature selection, which somewhat
    replicates tree-based logic. (See Chapter [7](525591_1_En_7_Chapter.xhtml) on
    specific tree-inspired/replicative deep learning models.)
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Merging different-depth models, such as a “wide” linear model and a deep neural
    network model, can allow for the simultaneous utilization of each of their respective
    strengths. Moreover, manually computing feature crosses can provide helpful input
    signals to models, wide or deep.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Using the SELU activation can help automatically normalize activations throughout
    a network.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Using weight regularization can help reduce overfitting, but tabular networks
    often consist of heterogenous data for which using a universal regularization
    penalty strength is unreasonable. Regularization Learning Networks can be utilized
    as a callback in Keras training code and learn the optimal penalty strength for
    each weight.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: In the next chapter, you’ll learn about convolutional neural networks and how
    you can apply them to effectively solve computer vision, multimodal data, and
    tabular data problems.
  prefs: []
  type: TYPE_NORMAL
