- en: '[PRE7]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Last, close the class, and add `module.exports = new MnistDataset();` at the
    end of the file.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: Making the generator
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Now let’s make the GAN model, starting with the generator. Repeating what we
    discussed in the introduction, the generator takes as input a vector of random
    values sampled from a latent space and produces a tensor that represents the generated
    handwritten digit. So, throughout the training, the generator learns to project
    this vector to an image. Before getting to the model, create a new *trainer.js*
    file and add the following imports and constant variables:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'The generator model consists of 11 layers (Figure [10-2](#Fig2)). Layer number
    one is a dense layer with an input shape of 100 and output shape [12544]. The
    second one is a **batch normalization** layer. This layer normalizes the values
    of the activation tensor from the previous layer, meaning that it transforms its
    values to keep their mean near 0 and the standard deviation near 1\. After normalizing
    comes a **leaky ReLU** activation layer, whose output is an activation tensor
    of shape [7, 7, 256]. Next, there is a transposed convolutional layer, which reduces
    the depth from 256 to 128\. Following it is another batch normalization and leaky
    ReLU. Now it gets interesting. The next layer, another transposed convolution,
    is now used to *upsample* the width and height and reduce the width of the tensor.
    This layer “smartly” upsamples, meaning that it *learns* how to fill up the missing
    spaces during the upsampling operation. Last, we have another set of batch normalization,
    leaky ReLU, and transposed convolutional layer that transforms the tensor to [28,
    28, 1], the size of an MNIST image. The following is the function `makeGenerator()`
    that defines the model:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 生成器模型由 11 层组成（图 [10-2](#Fig2)）。第一层是一个输入形状为 100、输出形状为 [12544] 的密集层。第二层是一个**批归一化**层。这个层将前一层激活张量的值进行归一化，这意味着它将其值转换为保持其均值接近
    0 和标准差接近 1。归一化之后是一个**漏斗 ReLU**激活层，其输出是一个形状为 [7, 7, 256] 的激活张量。接下来是一个转置卷积层，将深度从
    256 减少到 128。接下来是另一个批归一化和漏斗 ReLU。现在事情变得有趣了。下一层，另一个转置卷积，现在用于**上采样**宽度和高度并减少张量的宽度。这一层“智能”地上采样，意味着它在上采样操作期间**学习**如何填充缺失的空间。最后，我们有一组另一个批归一化、漏斗
    ReLU 和转置卷积层，将张量转换为 [28, 28, 1]，这是 MNIST 图像的大小。以下定义模型的 `makeGenerator()` 函数：
- en: '[PRE9]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Note
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: A leaky ReLU is another rectifier activation function like ReLU that applies
    element-wise function *f* (*x*) = 1 if *x* > 0 or *f* (*x*) = 0.01*x* to the input
    tensor.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: Leaky ReLU 是另一种类似于 ReLU 的整元素激活函数，它将输入张量应用于元素函数 *f* (*x*) = 1 如果 *x* > 0 或 *f* (*x*) = 0.01*x*。
- en: The newest hyperparameters we see here are the **padding** on the transposed
    convolution and the **tanh** activation function. In Chapter [3](494424_1_En_3_Chapter.xhtml),
    we used convolutional layers with the default padding, “valid.” This type of padding
    ensures that the filter stays within the *valid* dimension of the input (no padding
    is added), resulting in an output that is smaller than the input, for example,
    if the stride length is 1, the width of the output is (input) width - 1\. In contrast,
    “same” padding guarantees that the output size stays the *same*, as long as the
    stride length is 1\. This is the reason why the first two dimensions remain unchanged
    after the first transposed convolutional layer. On the other hand, in a transposed
    convolutional layer—which in some way is an inverse convolutional layer—a stride
    of length 2 and “same” padding doubles the width and height dimensions, hence
    the increase from [7, 7, …] to [14, 14, …] and [14, 14, …] to [28, 28, …] after
    the second and third transposed layers. The activation function tanh, short for
    the hyperbolic tangent, bounds the values to (-1, 1).
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在这里看到的最新的超参数是转置卷积的**填充**和**tanh**激活函数。在第 [3](494424_1_En_3_Chapter.xhtml)
    章中，我们使用了具有默认填充“valid”的卷积层。这种填充确保滤波器保持在输入的**有效**维度内（不添加填充），从而使得输出比输入小，例如，如果步长长度为
    1，则输出宽度为（输入）宽度 - 1。相比之下，“same”填充确保输出大小保持**相同**，只要步长长度为 1。这就是为什么在第一个转置卷积层之后，前两个维度保持不变。另一方面，在转置卷积层——在某种程度上是逆卷积层——步长为
    2 和“same”填充将宽度和高度维度翻倍，因此在第二个和第三个转置层之后，从 [7, 7, …] 增加到 [14, 14, …]，再从 [14, 14,
    …] 增加到 [28, 28, …]。激活函数 tanh，即双曲正切，将值限制在 (-1, 1) 范围内。
- en: Making the discriminator
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 制作判别器
- en: Time for the discriminator, the soon-to-be-fooled model. This component of the
    GAN is the judge, responsible for predicting whether the image created by the
    generator comes from the real dataset or not—a binary classification problem.
    We will define this model using a different method. It will be more similar to
    how we did the transfer learning model, using a `tf.model()` object to set the
    input and output.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来是判别器，即将被愚弄的模型。GAN 的这个组件是裁判，负责预测生成器创建的图像是否来自真实数据集——这是一个二元分类问题。我们将使用不同的方法定义此模型。它将更类似于我们如何进行迁移学习模型，使用
    `tf.model()` 对象来设置输入和输出。
- en: '![../images/494424_1_En_10_Chapter/494424_1_En_10_Fig2_HTML.jpg](../images/494424_1_En_10_Chapter/494424_1_En_10_Fig2_HTML.jpg)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
- en: Figure 10-2
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: The generator's layers
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: 'Our discriminator has eight layers (Figure [10-3](#Fig3)). It starts with a
    convolutional layer of input shape [28, 28, 1] and output shape [14, 14, 64].
    After it is a leaky ReLU and a dropout layer. This combination of conv2D-leakyReLU-dropout
    is repeated once, producing a tensor of shape [7, 7, 128]. The tensor is then
    flattened to shape [6272] and sent through a dense layer with a sigmoid activation
    function. This last layer outputs a number between 0 and 1 that is the likelihood
    of the image being real or fake. The following is the function:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/494424_1_En_10_Chapter/494424_1_En_10_Fig3_HTML.jpg](../images/494424_1_En_10_Chapter/494424_1_En_10_Fig3_HTML.jpg)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
- en: Figure 10-3
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: The discriminator's inner layers
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: The function starts by defining the hidden layers using various calls to `model.add()`.
    These are the layers discussed in the previous paragraph. I call them hidden ones
    because none of them are the input or the output. Those are created separately.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: After the last `model.add()` , there is a call to `tf.input()`, a function that
    “instantiates an input to a model”^([4](#Fn4)) with attribute `shape` set to the
    image’s size. To add it to the model, we use `model.apply()`. To create the output,
    we use the same method. First, define the dense output layer and use the `apply()`
    to append it to the rest. With the input and output layers specified, use `tf.model()`
    with attribute `inputs` set to `inputLayer` and `outputs` to `outputLayers` to
    create the model. Then, compile it with the binary cross-entropy loss function
    and the Adam optimizer with `learningRate` 0.0002 and `beta1` 0.5, as specified
    in the DCGAN paper. This second argument, known as an exponential decay, *decays*,
    that is, reduces the learning rate over time.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: Figure [10-4](#Fig4) presents the summary of the new model, where `sequential_2`
    are the model’s hidden layers.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/494424_1_En_10_Chapter/494424_1_En_10_Fig4_HTML.jpg](../images/494424_1_En_10_Chapter/494424_1_En_10_Fig4_HTML.jpg)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
- en: Figure 10-4
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: The discriminator
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: Combining the models
  id: totrans-66
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Remember when we said that the algorithm trains both models simultaneously?
    That sentence was very literal. In this section, we will do something new: combining
    models. To be more precise, we will combine the generator and discriminator to
    create a new generator where the “original” generator comes before the discriminator
    (Figure [10-5](#Fig5)). With the two models working as one, the output of the
    generator is directly used to update its weights after the discriminator classifies
    the generated image.'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/494424_1_En_10_Chapter/494424_1_En_10_Fig5_HTML.jpg](../images/494424_1_En_10_Chapter/494424_1_En_10_Fig5_HTML.jpg)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
- en: Figure 10-5
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: The combined model
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: In this combined version of the model, we will change the *trainable* property
    of the discriminator component to **false** so that the weights do not update
    while it is part of this new combined model. Hence, this part of the model does
    not learn; the discriminator (the one created earlier) learns separately in another
    function. While training the combined model, we will set the labels of the latent
    vector to 1 (“real”) so that the discriminator believes the generated images are
    real. But we know they are not real. So, since the generator creates random noisy
    images (at first), the error rate early in training will be high, forcing it to
    get better.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个模型的组合版本中，我们将判别器组件的 *trainable* 属性更改为 **false**，这样在它是这个新组合模型的一部分时，权重就不会更新。因此，这部分模型不会学习；判别器（之前创建的那个）将在另一个函数中单独学习。在训练组合模型时，我们将潜在向量的标签设置为
    1（“真实”），这样判别器就会相信生成的图像是真实的。但我们知道它们不是真实的。因此，由于生成器最初创建的是随机噪声图像，训练初期的错误率会很高，迫使它变得更好。
- en: This configuration can be very confusing, and so I want to repeat and clarify
    some details. First of all, we are still using the “original” discriminator—the
    one that learns to tell the pictures apart defined in the past section. Its role
    has not changed. But what about its weights? We just changed it to nontrainable.
    How is it still learning? Good question. But again, the discriminator **will learn**
    because we compiled it **before** making its weights nontrainable. With the combined
    model’s discriminator, first, we changed the trainable property to false and **then**
    compiled it, so it does not learn. On the combined model, the discriminator’s
    purpose is to assess the generator performance on the “fake-labeled” generated
    images and to produce the activation tensors needed to update the generator.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 这种配置可能会非常令人困惑，因此我想重复并澄清一些细节。首先，我们仍然使用的是“原始”判别器——在之前章节中定义的学会区分图片的判别器。它的角色没有改变。但它的权重怎么办？我们刚刚将其更改为不可训练。它是如何仍然学习的？这是一个好问题。但再次强调，判别器
    **将会学习**，因为我们是在将其权重设置为不可训练之前编译它的。在组合模型中，我们首先将可训练属性更改为 false，然后 **再** 编译它，因此它不会学习。在组合模型中，判别器的目的是评估生成器在“虚假标记”生成的图像上的性能，并产生更新生成器所需的激活张量。
- en: 'Let’s see the function:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看这个函数：
- en: '[PRE11]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: The model is built like the discriminator earlier. It uses a mix of `tf.input()`,
    `model.apply()`, `tf.model()`, and the same compilation attributes to form it.
    Note the `discriminator.trainable = false` line before `combined.compile()`.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 该模型构建方式与早期的判别器类似。它通过混合使用 `tf.input()`、`model.apply()`、`tf.model()` 以及相同的编译属性来形成模型。注意在
    `combined.compile()` 之前的那行 `discriminator.trainable = false`。
- en: Training the discriminator
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 训练判别器
- en: 'With the models prepared, the next step is training them, starting with the
    discriminator and the function `trainDiscriminator()`. On this occasion, we will
    train differently. In the past chapters, we used `model.fit()`, a function that
    trains models “for a fixed number of epochs.”^([5](#Fn5)) But our current situation
    is very different from the previous exercises. Now, we want to use the output
    of one model (the generated images) as the input of the discriminator. So, we
    need to have more manual control over the training. To train both models, we will
    use `tf.Sequential.trainOnBatch()`, a method that runs one training update on
    a single batch of data. With this function, we will be able to run one training
    update, generate images, use them as input for the discriminator, and run another
    training update. Later, we will design the training loop. But for now, let’s see
    `trainDiscriminator()`:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 模型准备就绪后，下一步是训练它们，从判别器和 `trainDiscriminator()` 函数开始。在此场合，我们将采用不同的训练方式。在过去的章节中，我们使用了
    `model.fit()` 函数，这是一个“固定次数的周期”来训练模型的函数。^([5](#Fn5)) 但我们当前的情况与之前的练习非常不同。现在，我们希望使用一个模型（生成的图像）的输出作为判别器的输入。因此，我们需要在训练过程中有更多的手动控制。为了训练这两个模型，我们将使用
    `tf.Sequential.trainOnBatch()` 方法，这是一种在单个数据批次上运行一次训练更新的方法。使用这个函数，我们能够运行一次训练更新，生成图像，将它们作为判别器的输入，然后运行另一次训练更新。稍后，我们将设计训练循环。但现在，让我们看看
    `trainDiscriminator()` 函数：
- en: '[PRE12]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: '`trainDiscriminator()` takes four parameters. The first two are the discriminator
    and generator models, and the others are the training set and the batch number.
    Inside the function is one large `tf.tidy()`, where most of the functionalities
    occur. The first statement, `xTrain.slice()`, creates a batch of images from the
    real dataset. Then, we produce the latent vector (the noise) using `tf.randomNormal()`.
    The generator uses this vector to create a batch of generated images (`generatedImages`).
    Next, these images and the `imageBatch` are concatenated to form a tensor where
    half of the data is real and the other half generated. After that, we build the
    labels vector, where the vectors corresponding to the actual images are 1 (`tf.ones()`),
    and the labels of the generated images are 0 (`tf.zeros()`). Outside of `tf.tidy()`,
    call `model.trainOnBatch()` using as arguments the concatenated data and labels
    returned by `tf.tidy()` to execute one training batch. In the end, return the
    loss value.'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: Training the combined model
  id: totrans-80
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Now the combined model:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: The function is simpler than `trainDiscriminator()` because there is only one
    model, and it does not require the real dataset. The only thing needed is creating
    the latent vector and the labels, which, in this case, are 1s because we want
    to trick the discriminator. Then, as before, use `combined.trainOnBatch()`, and
    return the loss.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: Putting it all together
  id: totrans-84
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'After `trainCombined()`, create a new function and name it `init()`. Inside
    `init()`, call `makeGenerator()` and `makeDiscriminator()` and use their returned
    values as arguments to `buildCombinedModel()`. Next, use `data.loadData()` and
    `data.getTrainData()` to read the training set (we are not done yet with the function):'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  id: totrans-86
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Now comes the training loop. All the past models we have trained use either
    `model.fitDataset()` or `model.fit()` to fit the model. With them, you simply
    specify the epochs and batch size, and it does the rest for you. Here, because
    of the multimodel characteristic of GANs, and because we are using `trainOnBatch()`,
    training with `model.fit()` is not possible. So, we have to define the training
    loop.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
- en: 'Repeating some definitions we saw in Chapter [2](494424_1_En_2_Chapter.xhtml),
    the number of batches attribute describes the number of times the complete dataset
    passes through the network. Batches, on the other hand, is the number of samples
    a model sees before updating its weights. In code, this translates to creating
    one nested loop where the outer loop iterates `NUM_EPOCHS` time and the inner
    one, `numBatches` times. Then, at each iteration of the inner loop, we call the
    training functions (add this after `getData()`):'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: Before the loop, we define `numBatches` , whose value is the length of the training
    set divided by `BATCH_SIZE`. Then, we loop from 0 to `NUM_EPOCHS`, and in the
    inner loop, from `batch` to `numBatches`. At each (inner) iteration, call `trainDiscriminator()`
    and `trainCombined()`, followed by logging to console the loss values every 30
    batches. Last, after closing the loop, but before closing `init()`, save the generator
    model using
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Then call init().
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: Testing the app
  id: totrans-93
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Is our model capable of generating images that resemble the MNIST dataset? Let’s
    find out.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: But before that, I would like to say a few words about the procedure. First,
    it takes time—a lot. With my setup, each epoch took around 12 minutes, so 30 epochs
    are 6 hours. You do not have to train for that long. Instead, I recommend starting
    small—manually evaluate the generated images (we will learn how now)—and keep
    increasing the number of epochs based on how good the model is. Likewise, you
    do not have to wait for the training to end to try the model. If you wish to test
    it while it trains, move the `generator.save()` line inside the outer loop to
    save a version of the model after each epoch.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: While training, the program logs to the terminal the loss values of the discriminator
    and generator. Depending on the initial weights, these values might fluctuate
    a lot. This erratic behavior is (up to some level) acceptable. Keep in mind that
    a GAN is a fight between two models, and as one improves, the other worsens. During
    my tests, both losses were around 0.5 and 1.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
- en: 'Enough talk; let’s do this. Back in the terminal, execute `npm run train` to
    start the script. Once the training ends, you can find the model in the *model*
    directory. To test it and see the generated images, return to the code editor,
    create a new *index.html* file and add the following code:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: The preceding code is our generator app, an application consisting of one `<canvas>`
    and a `<button>` that, once clicked, generates an image using a function named
    `generate()`. Creating the generated picture follows a process like the one we
    used in the training loop. First, we must make a latent vector and use it as the
    argument to `model.predict()` to output the generated image. To draw the image
    on the screen, we have `tf.browser.toPixels()`, a function that takes a tensor
    and displays it on a `<canvas>`. Because we want to draw a grayscale image, the
    tensor must be of rank 2 and have its value between 0 and 1\. But our tensor is
    not like that. Its rank is 4, and the values are in the range [-1, 1] (remember
    the tanh activation function?). So, we need to use `tf.add()` and `tf.div()` to
    bound the values into the range [0, 1] and `tf.squeeze()` to remove the first
    and fourth dimensions.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: After `generated()`, add an `init()` function that calls `tf.loadLayersModel()`
    to read the model from the given path. Last, to use the app, start a local web
    server in the project’s directory and launch it.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: To illustrate how the generated images evolved, I will show several images produced
    at different epochs. At epoch 1 (Figure [10-6](#Fig6)), as expected, it is just
    random noise. After 5 epochs (Figure [10-7](#Fig7)), it is possible to notice
    some basic shapes like curves and circles. On epoch 10 (Figure [10-8](#Fig8)),
    you can distinguish some digits like 9, and after 20 (Figure [10-9](#Fig9)) and
    30 (Figure [10-10](#Fig10)) epochs, the model generates most complex numbers like
    4, 5, and 6\.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/494424_1_En_10_Chapter/494424_1_En_10_Fig10_HTML.jpg](../images/494424_1_En_10_Chapter/494424_1_En_10_Fig10_HTML.jpg)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
- en: Figure 10-10
  id: totrans-103
