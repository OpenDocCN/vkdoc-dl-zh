  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '`MnistClass`的第一个方法是`loadData()`，这是一个使用`loadImages()`和`loadLabels()`读取数据和标签的函数。我们不需要标签；我决定保留它们，以防你对将脚本应用于其他用例感兴趣（此方法和下一个方法都在类内部）：'
