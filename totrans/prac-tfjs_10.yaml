  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'After `loadData()`, add `getData()`. This function converts the dataset into
    one large tensor and returns it:'
  id: totrans-39
  prefs: []
