- en: '![../images/494424_1_En_10_Chapter/494424_1_En_10_Fig7_HTML.jpg](../images/494424_1_En_10_Chapter/494424_1_En_10_Fig7_HTML.jpg)'
  id: totrans-111
  prefs: []
  type: TYPE_IMG
- en: Figure 10-7
  id: totrans-112
  prefs: []
