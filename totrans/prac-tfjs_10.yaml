- en: '![../images/494424_1_En_10_Chapter/494424_1_En_10_Fig9_HTML.jpg](../images/494424_1_En_10_Chapter/494424_1_En_10_Fig9_HTML.jpg)'
  id: totrans-105
  prefs: []
  type: TYPE_IMG
- en: Figure 10-9
  id: totrans-106
  prefs: []
