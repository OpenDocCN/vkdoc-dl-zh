- en: 10. Generating handwritten digits with generative adversarial networks
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 10. 使用生成对抗网络生成手写数字
- en: In Chapter [9](494424_1_En_9_Chapter.xhtml), we delved into the generative and
    creative side of deep learning. There, we used two recurrent neural networks to
    forecast and generate classical-looking passages of text. But text data, or generally
    speaking, sequential data, is not the only thing that these neural networks can
    create. Images are possible too.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 在第[9](494424_1_En_9_Chapter.xhtml)章中，我们深入探讨了深度学习的生成和创造性方面。在那里，我们使用了两个循环神经网络来预测和生成看起来像经典文本的段落。但是，文本数据，或者说更一般地，序列数据，并不是这些神经网络能创建的唯一东西。图像也是可能的。
- en: If there is a recent and radical algorithm that has taken over the machine learning
    field, it has to be the **generative adversarial networks** (Goodfellow et al.,
    2014), or GANs. GANs—which *Yann LeCun*, one of the leading computer scientists
    in the field and corecipient of the Turing Award in 2018,^([1](#Fn1)) called “the
    most interesting idea in the last ten years in machine learning”—are a network
    architecture capable of creating incredibly realistic images that are almost indistinguishable
    from genuine ones. Like RNNs, the applications and use cases of GANs are vast.
    For instance, GANs do **image-to-image translation** (Isola et al., 2017), the
    task of translating an image from domain X to Y, for example, converting a picture
    of a horse to a zebra. They can improve an image’s resolution, a use case known
    as **super-resolution** (Ledig et al., 2017), and even replace someone’s face
    for another one in an image or video, a technique called **deepfake** .
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 如果有一个最近且革命性的算法接管了机器学习领域，那一定是**生成对抗网络**（Goodfellow等人，2014年），或称为GANs。GANs——由该领域的领先计算机科学家之一、2018年图灵奖共同获得者*杨立昆*称为“过去十年中机器学习中最有趣的想法”——是一种能够创建几乎与真实图像难以区分的极其逼真图像的网络架构。像RNNs一样，GANs的应用和用例非常广泛。例如，GANs可以进行**图像到图像的翻译**（Isola等人，2017年），即将图像从领域X翻译到Y的任务，例如，将一匹马的图片转换成斑马的图片。它们可以提高图像的分辨率，这种用例被称为**超分辨率**（Ledig等人，2017年），甚至可以在图像或视频中用一个人的脸替换另一个人的脸，这种技术被称为**深度伪造**。
- en: For the book’s last exercise, we will build the “hello, world” of GANs, a GAN
    model that generates handwritten digits using the MNIST dataset as the source.
    Because of the long training time, we will run the training script using Node.js
    to get as much performance as possible. Then, we are going to write an app that
    loads the model and produce generated images. Our model’s network architecture
    is based on the deep convolutional generative adversarial network (DCGAN) for
    the MNIST example^([2](#Fn2)) implemented with Keras (Python) Sequential API.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 对于本书的最后一个练习，我们将构建GANs的“hello, world”，即使用MNIST数据集作为源生成手写数字的GAN模型。由于训练时间较长，我们将使用Node.js运行训练脚本以获得尽可能多的性能。然后，我们将编写一个应用程序来加载模型并生成图像。我们的模型网络架构基于MNIST示例的深度卷积生成对抗网络（DCGAN），使用Keras（Python）的Sequential
    API实现。
- en: A friendly introduction to GANs
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: GANs的友好介绍
- en: The central notion behind GANs is very intuitive. You have two neural networks
    competing against each other. One of them, the generator, tries to generate images
    that resemble the training dataset, while the second network tells if the generated
    image comes from the dataset or if it is generated. The system converges when
    the generator’s synthetic images are so real that the discriminator can no longer
    tell them apart or, in simple words, once the generator fools the discriminator.
    Let’s explain it with a simplified example.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: GANs（生成对抗网络）背后的核心概念非常直观。你拥有两个相互竞争的神经网络。其中一个，生成器，试图生成与训练数据集相似的图像，而第二个网络则判断生成的图像是否来自数据集或是由生成器生成的。当生成器的合成图像如此逼真以至于判别器无法区分它们时，系统就会收敛，简单来说，一旦生成器欺骗了判别器。让我们用一个简化的例子来解释它。
- en: 'The generator never sees an image from the dataset. Never. In our case, it
    means that it does not know how an MNIST digit looks like. Therefore, the first
    generated images are just random noise (Figure [10-1](#Fig1)). Regardless of this
    situation, the generator shows the image to the discriminator (the “judge”). But
    the discriminator knows how the dataset is, and upon seeing the generator image,
    it says: “You can’t deceive me. I know how the dataset looks like, and this image
    looks nothing like it. I’m sure you created this.” So, the generator, as training
    progresses, starts to assume how the real dataset looks like based on what the
    discriminator says and, therefore, begins to generate better images. Then, at
    some point, it shows one to the discriminator, and it says: “Oh, this image is
    perfect; I’m sure it comes from the dataset. I don’t think this is yours.” But,
    surprisingly enough, the image actually came from the generator. So, in the end,
    the generator fooled the discriminator, without ever, ever seeing an actual image
    from the dataset.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/494424_1_En_10_Chapter/494424_1_En_10_Fig1_HTML.png](../images/494424_1_En_10_Chapter/494424_1_En_10_Fig1_HTML.png)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
- en: Figure 10-1
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: An example of a generated image from an untrained generator
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: Regarding the networks themselves, the generator is a neural network that produces
    images that mirror the target dataset. Its input is a vector of *N* random values
    (called the *latent space vector*) sampled from a random distribution (here known
    as the *latent space*), and the output is the image it wants to generate. So,
    its goal is to learn a function that maps the latent space into an image. The
    discriminator is a neural network that solves a classification problem. In our
    case, we have a convolutional neural network trained on fake data from the generator
    and real data from the training dataset. Its output is the likelihood of whether
    the image is real or fake.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: Like CNNs, and, for example, MobileNet, there are GAN architectures specialized
    for specific applications. In our exercise, we will use the **DCGAN** (Radford
    et al., 2015) architecture, a class of GAN introduced in 2015 that proved to be
    more stable than the original GAN. This model uses a peculiar convolution technique
    to learn the features of the target images in an unsupervised manner.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: Training a GAN
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s do this (one last time). The model’s training script consists of five
    functions:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: '`makeGenerator():` Defines the generator model.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`makeDiscriminator():` Defines the discriminator model.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`buildCombinedModel():` Builds a combined model made of the generator and discriminator.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`trainDiscriminator():` Trains the discriminator on a single batch of data.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`trainCombined():` Trains the combined model on a single batch of data.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We will dedicate one section per function.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: After training the model, the next step is making a web app that uses the trained
    generator model to generate images and show them on the browser. As a side note,
    I should mention that the code you will see here ignores several of the ESLint
    rules we have been using throughout the book. This change aims to improve the
    code’s readability—apologies for the lack of consistency.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: Preparing the environment
  id: totrans-21
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Since we are using Node.js, first, we must define the package’s manifest. So,
    in the project’s root directory, create a file named *package.json* and paste
    the following JSON to it:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Then, execute `npm i` to install the dependencies.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: Getting the data
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As we did in Chapter [4](494424_1_En_4_Chapter.xhtml), we will once again use
    a script from the official TensorFlow.js examples repository to download the data.^([3](#Fn3))
    But the script differs from the one we used there. Instead of downloading the
    whole dataset in one image, this one downloads four files that together complete
    the dataset (a copy is available on the book’s repository). Since the chapter’s
    primary goal is training the GAN, we will go through this code without focusing
    so much on the details.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: 'From the project’s directory, create a new file named *data.js*. Then, copy
    the following lines to import the modules and define several variables related
    to the MNIST dataset:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'Next, define the `fetchOnceAndSaveToDiskWithBuffer()` function to save the
    dataset to disk. If the file already exists, the function does not download it
