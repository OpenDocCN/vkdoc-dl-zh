- en: Recap
  id: totrans-117
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As Yann LeCun said, generative adversarial networks are indeed interesting and,
    if I may say, cool. Their ability to automatically create content has certainly
    earned them a spot as one of the most unique and revolutionary machine learning
    applications.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we successfully trained one to generate handwritten MNIST-like
    digits. But it was not an easy task. As fun as they are, GANs can be very complicated
    due to their simultaneous training property, the hyperparameters one needs to
    consider, the design of models’ architecture, and of course how long it takes
    to train them.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
- en: You can find my generator model in the book’s repository.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
- en: Exercises
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
- en: What is a GAN? How would you explain it to a kid?
  id: totrans-122
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: By looking at the models' architecture, could you tell which is the generator
    and which is the discriminator? What is their principal difference?
  id: totrans-123
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Run the training several times using different epochs. At what time did the
    images start to look like digits?
  id: totrans-124
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Use the MNIST classifier from Chapter [4](494424_1_En_4_Chapter.xhtml) to identify
    the generated digits.
  id: totrans-125
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Train a DCGAN using one of the classes of the personalized dataset from Chapter
    [7](494424_1_En_7_Chapter.xhtml).
  id: totrans-126
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Fit the model using the **fashion-MNIST** dataset (Xiao et al., 2017). This
    dataset serves as a drop-in replacement for the original MNIST dataset. The difference
    is that instead of digits, it has pieces of clothing. You can find it here: [`https://github.com/zalandoresearch/fashion-mnist`](https://github.com/zalandoresearch/fashion-mnist).'
  id: totrans-127
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
