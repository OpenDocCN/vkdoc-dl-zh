  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
- en: The optimal or least number of clusters for both methods is two. But let’s consider
    15 clusters for this use case.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
- en: Note
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
- en: You can consider any number of clusters for implementation, but it should be
    greater than the optimal, or the least, number of clusters from *k*-means clustering
    or dendrogram.
  id: totrans-147
