- en: 7. Clustering-Based Recommender Systems
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Recommender systems based on unsupervised machine learning algorithms are very
    popular because they overcome many challenges that collaborative, hybrid, and
    classification-based systems face. A clustering technique is used to recommend
    the products/items based on the patterns and behaviors captured within each segment/cluster.
    This technique is good when data is limited, and there is no labeled data to work
    with.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
- en: Unsupervised learning is a machine learning category where labeled data is not
    leveraged, but still, inferences are discovered using the data at hand. Let’s
    find the patterns without the dependent variables to solve business problems.
    Figure [7-1](#Fig1) shows the clustering outcome.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537881_1_En_7_Chapter/537881_1_En_7_Fig1_HTML.jpg)'
  id: totrans-3
  prefs: []
  type: TYPE_IMG
- en: A graph of unsupervised learning exhibits the clustering outcome. A set of three
    clusters are represented along the x (x subscript 1) and y (x subscript 2) axis.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: Figure 7-1
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: Clustering
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: Grouping similar things into segments is called *clustering*; in our terms,
    “things” are not data points but a collection of observations. They are
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: Similar to each other in the same group
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Dissimilar to the observations in other groups
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There are mainly two important algorithms that are highly being used in the
    industry. Before getting into the projects, let’s briefly examine how algorithms
    work.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
