  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, you learned how to build a recommendation engine using unsupervised
    ML algorithms, which is clustering. Customer and order data were used to recommend
    the products/items based on similar users. The product data was used to recommend
    the products/items using similar items.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你学习了如何使用无监督机器学习算法构建推荐引擎，即聚类。使用客户和订单数据根据相似用户推荐产品/商品。使用产品数据根据相似商品推荐产品/商品。
