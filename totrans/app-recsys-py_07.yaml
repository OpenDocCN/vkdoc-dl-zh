- en: Model Building
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This phase builds clusters using *k*-means clustering. To define an optimal
    number of clusters, you can also consider the elbow method or the dendrogram method.
  prefs: []
  type: TYPE_NORMAL
- en: K-Means Clustering
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '*k*-means clustering is an efficient and widely used technique that groups
    the data based on the distance between the points. Its objective is to minimize
    total variance within the cluster, as shown in Figure [7-11](#Fig11).'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537881_1_En_7_Chapter/537881_1_En_7_Fig11_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A graph represents the clustering of K means. There are 3 groups of clusters.
    It is observed that the clusters are plotted along - 1 and + 1.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 7-11
  prefs: []
  type: TYPE_NORMAL
- en: k-means clustering
  prefs: []
  type: TYPE_NORMAL
- en: The following steps generate clusters.
  prefs: []
  type: TYPE_NORMAL
- en: Use the elbow method to identify the optimum number of clusters. This acts as
    *k.*
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select random *k* points as cluster centers from the overall observations or
    points.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Calculate the distance between these centers and other points in the data and
    assign it to the closest center cluster that a particular point belongs to using
    any of the following distance metrics.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Euclidean distance
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Manhattan distance
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Cosine distance
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Hamming distance
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Recalculate the cluster center or centroid for each cluster.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Repeat steps 2, 3, and 4 until the same points are assigned to each cluster,
    and the cluster centroid is stabilized.
  prefs: []
  type: TYPE_NORMAL
- en: The Elbow Method
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The elbow method checks the consistency of clusters. It finds the ideal number
    of clusters in data. Explained variance considers the percentage of variance explained
    and derives an ideal number of clusters. Suppose the deviation percentage explained
    is compared with the number of clusters. In that case, the first cluster adds
    a lot of information, but at some point, explained variance decreases, giving
    an angle on the graph. At the moment, the number of clusters is selected.
  prefs: []
  type: TYPE_NORMAL
- en: The elbow method runs *k*-means clustering on the dataset for a range of values
    for *k* (e.g., from 1–10), and then for each value of *k*, it computes an average
    score for all clusters.
  prefs: []
  type: TYPE_NORMAL
- en: Hierarchical Clustering
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Hierarchical clustering is another type of clustering technique that also uses
    distance to create the groups. The following steps generate clusters.
  prefs: []
  type: TYPE_NORMAL
- en: Hierarchical clustering starts by creating each observation or point as a single
    cluster.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: It identifies the two observations or points that are closest together based
    on the distance metrics discussed earlier.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Combine these two most similar points and form one cluster.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This continues until all the clusters are merged and form a final single cluster.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Finally, using a dendrogram, decide the ideal number of clusters.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The tree is cut to decide the number of clusters. The tree cutting happens where
    there is a maximum jump from one level to another, as shown in Figure [7-12](#Fig12).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537881_1_En_7_Chapter/537881_1_En_7_Fig12_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A hierarchical dendrogram exposes the clustering. The tree-like structure represents
    the relationship between all the data points in the system.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 7-12
  prefs: []
  type: TYPE_NORMAL
- en: Hierarchical clustering
  prefs: []
  type: TYPE_NORMAL
- en: Usually, the distance between two clusters has been computed based on Euclidean
    distance. Many other distance metrics can be leveraged to do the same.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s build a *k*-means model for this use case. Before building the model,
    let’s execute the elbow method and the dendrogram method to find the optimal clusters.
