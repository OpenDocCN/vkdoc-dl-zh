- en: A computer scientist at the Xerox Research Center named Adrien Gaidon was surprised
    at how realistic it looked when he saw the trailer for the Assassin’s Creed video
    game. He thought it was a movie trailer because of its lifelike graphics. But
    then he realized that it was all computer-generated imagery (CGI), and he was
    amazed that AI algorithms could be fooled in the same way. Next, Gaidon and his
    team began creating scenes used to train deep learning algorithms with Unity,
    a 3-D video game development machine. They not only created a synthetic environment
    but also started to transfer real images to the virtual environment. This allowed
    them to compare the effectiveness of algorithms trained on real images with those
    trained in virtual environments [[9](#Par1109)].
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: Xerox 研究中心的计算机科学家 Adrien Gaidon 对他看到的刺客信条视频游戏的预告片看起来多么逼真感到惊讶。由于它的逼真图形，他认为这是一部电影的预告片。但随后他意识到这完全是计算机生成的图像
    (CGI)，并且他对 AI 算法能够以同样的方式被欺骗感到惊讶。接下来，Gaidon 和他的团队开始创建用于训练深度学习算法的场景，这些场景使用 Unity，一个
    3D 视频游戏开发工具。他们不仅创建了一个合成环境，而且还开始将真实图像转移到虚拟环境中。这使得他们能够比较在真实图像上训练的算法与在虚拟环境中训练的算法的有效性
    [[9](#Par1109)]。
- en: '*Grand Theft Auto* can be used to learn “stop” signs in traffic. Artur Filipowicz
    and his team at Princeton University used an AI algorithm they wrote for the video
    game to learn the meaning of stop signs. They trained the AI ​​algorithm with
    the appearance of partially covered, muddy, shaded, snow-covered stop signs at
    various times of the day. They used the video game *Grand Theft Auto V* as the
    training ground for the algorithm. Instead of a human playing the video game,
    they trained the AI ​​algorithm by having it use a computer program [[9](#Par1109)].'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: '*《侠盗猎车手》* 可以用来学习交通中的“停止”标志。Artur Filipowicz 和他在普林斯顿大学的团队使用他们为视频游戏编写的 AI 算法来学习停止标志的含义。他们使用各种时间段的半遮盖、泥泞、阴影、雪覆盖的停止标志的外观来训练
    AI 算法。他们使用视频游戏 *《侠盗猎车手V》* 作为算法的训练场。不是由人类玩游戏，而是通过让 AI 算法使用计算机程序来训练它 [[9](#Par1109)]。'
- en: '*Grand Theft Auto V* allows you to use the footage for noncommercial purposes
    if you follow certain conditions. A way to get data out of the game is to use a
    middleware between the game and its graphics library. This can be done by detouring
    the library [[10](#Par11010)]. Detours is a library that allows you to inject
    code into arbitrary Win32 functions on x86 machines. It can intercept Win32 functions
    by replacing the target function images with their code [[11](#Par11011)].'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: '*《侠盗猎车手V》* 允许你在满足某些条件的情况下，将游戏中的视频用于非商业用途。从游戏中获取数据的一种方法是在游戏与其图形库之间使用一个中间件。这可以通过绕过库
    [[10](#Par11010)] 来实现。Detours 是一个库，它允许你在 x86 机器上的任意 Win32 函数中注入代码。它可以通过用它们的代码替换目标函数图像来拦截
    Win32 函数 [[11](#Par11011)]。'
- en: Later, the technology in this field has developed in a way that detailed labeling
    can also be done automatically. We have found a way to automatically label things
    in videos using code from video games. This code comes from the Microsoft DirectX
    rendering API, which we use to inject specialized rendering code into the game
    as it is running. This code produces ground truth labels for things like segmenting
    objects, labeling their semantic meaning, estimating depth, tracking objects,
    and decomposing images into their intrinsic parts [[12](#Par11012)]. Researchers
    no longer need to laboriously label images; they can simply play video games all
    day long.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 此后，该领域的这项技术发展到了详细标记也可以自动完成的地步。我们发现了一种使用来自视频游戏代码自动标记视频中的事物的方法。此代码来自微软 DirectX
    渲染 API，我们使用它将专门的渲染代码注入到游戏运行时。此代码为分割对象、标记它们的语义含义、估计深度、跟踪对象以及将图像分解为其固有部分等事物生成地面真实标签
    [[12](#Par11012)]。研究人员不再需要费力地标记图像；他们可以整天玩游戏。
- en: Synthetic data has now become a crucial component in the development of software
    to be used in autonomous vehicles, and Unity has gained expertise in this area.
    Unity allows you to test autonomous car software in a virtual environment, which
    provides several benefits. This is about how technology can be used to create
    things that wouldn’t normally happen in the real world. For example, self-driving
    cars can be tested for millions of miles every day to make sure they are safe.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 合成数据现在已成为开发用于自动驾驶汽车软件的关键组成部分，Unity 在这一领域积累了专业知识。Unity 允许你在虚拟环境中测试自动驾驶汽车软件，这提供了几个好处。这是关于如何使用技术来创造在现实世界中不会发生的事情。例如，自动驾驶汽车每天可以测试数百万英里，以确保它们的安全性。
- en: The importance of real-world data for training autonomous vehicles, robots,
    and other computer-based systems cannot be understated. However, synthetic data-data
    generated by computers-can also be useful. This is because it can be rich with
    variation due to what is known as “*limitless domain randomization*”. This means
    that you can change colors, materials, and lighting within a simulation. You can
    use Unity to create a given simulation in which you can add multiple pedestrians
    and cars to an intersection and see how they interact with each other. This can be
    used to train a computer vision model [[1](#Par1101)]. For example, you can simulate
    car accidents or near misses.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 真实世界数据对于训练自动驾驶汽车、机器人以及其他基于计算机的系统的重要性不容忽视。然而，合成数据——由计算机生成的数据——也可以是有用的。这是因为它可以通过所谓的“*无限域随机化*”具有丰富的变化。这意味着你可以在模拟中改变颜色、材料和照明。你可以使用Unity创建一个特定的模拟，在其中你可以向交叉路口添加多个行人和汽车，并观察它们如何相互作用。这可以用来训练计算机视觉模型
    [[1](#Par1101)]。例如，你可以模拟车祸或险些发生的事故。
- en: Now let’s explore Synthetic-to-Real Domain Gap.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们来探讨合成到真实域差距。
- en: The Synthetic-to-Real Domain Gap
  id: totrans-107
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 合成到真实域差距
- en: The “synthetic-to-real domain gap” is a term used to describe the difference
    between the synthetic data use to train machine learning models and the real-world
    data that the models will be deployed on. This gap can lead to poor performance
    of machine learning models on real-world data, as the models have not been trained
    on data that is representative of the real world. Bridging the synthetic-to-real
    domain gap is therefore an important task to ensure that machine learning models
    can be deployed successfully on real-world data.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: “合成到真实域差距”是一个术语，用来描述用于训练机器学习模型的合成数据与模型将部署其上的真实世界数据之间的差异。这种差距可能导致机器学习模型在真实世界数据上的性能不佳，因为模型没有在代表真实世界的数据上进行训练。因此，弥合合成到真实域的差距是一个重要的任务，以确保机器学习模型可以成功部署到真实世界数据上。
- en: The synthetic-to-real domain gap can be caused by various factors, such as the
    different properties of the data in the two domains, the different distribution
    of the data in the two domains, or the different amounts of data in the two domains.
    This gap can be problematic for machine learning models because it can lead to
    overfitting of the synthetic data and poor performance on the real data. To address
    this issue, some methods have been proposed that aim to close the synthetic-to-real
    domain gap by either translating the synthetic data to the real domain or by training
    models on both synthetic and real data [[13](#Par11013)].
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 合成到真实域差距可能由各种因素引起，例如两个域中数据的属性不同，两个域中数据的分布不同，或者两个域中数据的数量不同。这个差距对于机器学习模型来说可能是个问题，因为它可能导致合成数据的过度拟合和在真实数据上的性能不佳。为了解决这个问题，已经提出了一些方法，旨在通过将合成数据转换为真实域或通过在合成和真实数据上训练模型来弥合合成到真实域的差距
    [[13](#Par11013)]。
- en: There are various ways of bridging the gap, which we’ll explore below.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 有多种方法可以弥合这一差距，我们将在下面进行探讨。
- en: Bridging the Gap
  id: totrans-111
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 弥合差距
- en: Several methods aim to close the synthetic-to-real domain gap, but each has its
    advantages and disadvantages. Some methods translate the synthetic data to the
    real domain, while others train models on both synthetic and real data. Each method
    has its benefits and drawbacks, so it is important to choose the right method
    for the specific problem at hand.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 有几种方法旨在弥合合成到真实域的差距，但每种方法都有其优缺点。一些方法将合成数据转换为真实域，而其他方法则在合成和真实数据上训练模型。每种方法都有其优点和缺点，因此选择适合特定问题的正确方法是重要的。
- en: '**Data augmentation** involves artificially generating new data that is similar
    to the existing data. This can be done by adding noise to the data or by using
    different algorithms to generate new data points. Data augmentation can help to
    close the synthetic-to-real domain gap by increasing the amount of data in the
    synthetic domain and by making the synthetic data more similar to the real data.'
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据增强**涉及通过人工生成与现有数据相似的新数据。这可以通过向数据添加噪声或使用不同的算法生成新的数据点来完成。数据增强可以通过增加合成域中的数据量以及使合成数据更接近真实数据来帮助缩小合成到真实域的差距。'
- en: '**Transfer learning** involves training a model in one domain and then transferring
    the knowledge learned to another domain. This can be done by either fine-tuning
    a model that has been pre-trained on the synthetic domain or by training a model
    on both the synthetic and real domains. Transfer learning can help to close the
    synthetic-to-real domain gap by making the synthetic data more like the real data.'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**迁移学习**涉及在一个领域训练一个模型，然后将学到的知识迁移到另一个领域。这可以通过微调在合成领域上预训练的模型，或者同时在合成和真实领域上训练模型来实现。迁移学习可以通过使合成数据更像真实数据来帮助缩小合成数据与真实数据之间的领域差距。'
- en: '**Data preprocessing** involves transforming the data in the synthetic domain
    to make it more similar to the data in the real domain. This can be done by either
    normalizing the data or by using different algorithms to transform the data. Data
    preprocessing can help to close the synthetic-to-real domain gap by making the
    synthetic data more similar to the real data.'
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据预处理**涉及将合成领域中的数据转换为更接近真实领域中的数据。这可以通过归一化数据或使用不同的算法转换数据来实现。数据预处理可以通过使合成数据更接近真实数据来帮助缩小合成数据与真实数据之间的领域差距。'
- en: '**Ensembles** involve training multiple models on the same data and then combining
    the predictions of the models. This can be done by either training the models
    on different subsets of the data or by training the models on different types
    of data [[14](#Par11014)], [[15](#Par11015)]. Ensembles can help to close the
    synthetic-to-real domain gap by making the predictions of the models more robust
    and by making the synthetic data more similar to the real data.'
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**集成学习**涉及在相同数据上训练多个模型，然后结合这些模型的预测。这可以通过在数据的不同子集上训练模型或在不同类型的数据上训练模型来实现 [[14](#Par11014)]，[[15](#Par11015)]。集成学习可以通过使模型的预测更加鲁棒，并使合成数据更接近真实数据，来帮助缩小合成数据与真实数据之间的领域差距。'
- en: Now let’s briefly explain the subject of the domain transfer.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们简要解释一下领域迁移的主题。
- en: Domain Transfer
  id: totrans-118
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 领域迁移
- en: Synthetic data is commonly used in machine learning to train models that learn
    to generalize from data. A model trained on synthetic data can be used to make
    predictions on real data. Domain transfer is the process of using a model trained
    on synthetic data to make predictions on real data. This can be done by retraining
    the model on real data,or by using the model to generate synthetic data that is
    similar to the real data. Domain transfer is important because it allows models
    to be trained to data that is not available in the real world. This can be useful
    for training models that need to be robust on data that is not representative
    of the real world, such as data that is corrupted or missing.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 在机器学习中，合成数据通常用于训练模型，使其能够从数据中泛化。在合成数据上训练的模型可以用于对真实数据进行预测。领域迁移是将训练在合成数据上的模型用于对真实数据进行预测的过程。这可以通过在真实数据上重新训练模型，或者使用模型生成与真实数据相似的数据来实现。领域迁移之所以重要，是因为它允许模型在真实世界中不可用的情况下进行训练。这对于训练需要对不具代表性的真实世界数据进行鲁棒性训练的模型来说可能很有用，例如，对于损坏或缺失的数据。
- en: Suppose you are going to put the autonomous vehicle you intend to produce for
    sale in San Francisco and Tokyo. The training data for the autonomous vehicle
    you will produce under these conditions must be obtained from San Francisco and
    Tokyo. If training data is only obtained from San Francisco and the vehicle is
    also sold in Tokyo, the vehicle’s performance in Tokyo would be worse. In order
    to ensure that the autonomous vehicle performs well in both San Francisco and
    Tokyo, training data must be obtained from both cities. By obtaining training
    data from both San Francisco and Tokyo, the autonomous vehicle will be able to
    learn the different driving conditions in both cities and be able to perform well in
    both cities.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你打算将你打算在旧金山和东京销售的自动驾驶汽车投入市场。在这些条件下，你将生产的自动驾驶汽车的训练数据必须从旧金山和东京获取。如果训练数据仅从旧金山获取，而车辆也在东京销售，那么车辆在东京的表现将会更差。为了确保自动驾驶汽车在旧金山和东京都能良好表现，必须从这两个城市获取训练数据。通过从旧金山和东京获取训练数据，自动驾驶汽车将能够学习两座城市的不同驾驶条件，并能在两座城市中良好表现。
- en: This time let’s look at the subject in terms of robots. Deep reinforcement learning
    can help us learn a lot of data, but when transferring from a simulated environment
    to the real world, we often see a significant drop in performance. Therefore,
    it’s important to have efficient transfer methods that close the gap between the
    two. Simulation-based training is less expensive than real-world training, but
    there are some differences between the two. One major difference is that simulation
    may not always match real-world settings. This can be a problem because it can
    be difficult to bridge the gap between simulation and reality. Methods that can
    account for mismatches in sensing and actuation are essential for making the most
    of simulation-based training. Reinforcement learning algorithms often use large
    amounts of labeled simulation data. However, the gap between simulation environments
    and the real world means that methods are needed to transfer knowledge learned
    in simulation to the real world [[16](#Par11016)]. The randomization algorithm
    is popular for sim-to-real transfer because it is effective in various tasks in
    robotics and autonomous driving. However, the reason why this algorithm works
    so well is not fully understood.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 这次，让我们从机器人的角度来探讨这个主题。深度强化学习可以帮助我们学习大量数据，但在从模拟环境转移到现实世界时，我们经常看到性能的显著下降。因此，拥有高效的迁移方法来缩小两者之间的差距非常重要。基于模拟的训练比现实世界的训练成本低，但两者之间有一些差异。一个主要差异是模拟可能并不总是与现实世界的设置相匹配。这可能是一个问题，因为它可能很难弥合模拟与现实之间的差距。能够解释感知和执行不匹配的方法对于充分利用基于模拟的训练至关重要。强化学习算法通常使用大量的标记模拟数据。然而，模拟环境和现实世界之间的差距意味着需要方法将模拟中学习到的知识转移到现实世界
    [[16](#Par11016)]。随机化算法在模拟到现实的迁移中很受欢迎，因为它在机器人和自动驾驶的各种任务中都很有效。然而，这个算法为什么如此有效的原因还没有完全理解。
- en: Domain transfer is the process of applying machine learning models trained on
    synthetic data to real-world data. This is often necessary because real-world
    data is often messy and difficult to work with, while synthetic data is cleaner
    and easier to use. By using domain transfer, we can improve the accuracy of our
    machine learning models and achieve better results in the real world. In this
    section, we will deal with two domain transfer problems such as domain adaptation
    and domain randomization.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 领域迁移是将训练在合成数据上的机器学习模型应用于现实世界数据的过程。这通常是必要的，因为现实世界的数据通常很混乱且难以处理，而合成数据则更干净且更容易使用。通过使用领域迁移，我们可以提高机器学习模型的准确性，并在现实世界中取得更好的结果。在本节中，我们将处理诸如领域适应和领域随机化等两个领域迁移问题。
- en: Now Let’s briefly explain the subject of domain adaptation.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们简要地解释一下领域适应的主题。
- en: Domain Adaptation
  id: totrans-124
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 领域适应
- en: In a machine learning setting if we want to make a disease diagnosis and if
    *x* is the properties of the patient, then *y=f(x)* is a disease. In a face recognition
    problem, if *x* is a bitmap picture of a person’s face; then *y=f(x)* is the name
    of that person. For an autonomous car, if *x* is a bitmap picture of the road
    surface in front of a car, then *y=f(x)* is the degree to turn the steering wheel.
    In all these problems, we know *x* and *y* pairs, but we don’t know the function
    *f*, and we try to find this function. At the forefront of machine learning problems,
    we slice our data set as training and test set. Besides we want our test set to
    be large enough to produce statistically meaningful results, and it should be
    representative of the data set so that the results are not skewed [[17](#Par11017)].
    Computer vision applications, such as face recognition, must be able to adapt
    to the specific distribution of data in each domain. For example, the distribution
    of faces in a crowd will be different from the distribution of faces in a family
    photo.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 在机器学习环境中，如果我们想要进行疾病诊断，并且如果 *x* 是患者的属性，那么 *y=f(x)* 就是一种疾病。在人脸识别问题中，如果 *x* 是一个人的位图人脸图片；那么
    *y=f(x)* 就是这个人的名字。对于自动驾驶汽车，如果 *x* 是汽车前方路面的位图图片，那么 *y=f(x)* 就是转向盘的转动程度。在这些所有问题中，我们知道
    *x* 和 *y* 的配对，但我们不知道函数 *f*，我们试图找到这个函数。在机器学习问题的前沿，我们将数据集划分为训练集和测试集。此外，我们希望测试集足够大，以便产生具有统计意义的成果，并且它应该代表数据集，这样结果就不会偏斜
    [[17](#Par11017)]。计算机视觉应用，如人脸识别，必须能够适应每个领域中的数据特定分布。例如，人群中的人脸分布将不同于家庭照片中的人脸分布。
- en: The assumption in classical machine learning is that the distributions of the
    training and test sets are the same. If this assumption is correct, then the model
    learned with the labeled training data should work well on the test data as well.
    However, in real life, the training and test sets may be collected from different
    sources for various reasons, and this assumption may not be correct. In this case,
    the learned model may not work well on the test data.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 经典机器学习的假设是训练集和测试集的分布是相同的。如果这个假设是正确的，那么使用标记的训练数据学习到的模型应该在测试数据上也表现良好。然而，在现实生活中，由于各种原因，训练集和测试集可能来自不同的来源，这个假设可能不正确。在这种情况下，学习到的模型可能在测试数据上表现不佳。
- en: If certain events occur more frequently in the data, then the data is biased.
    For example, data collected from older people relative to the total population
    is biased. The model we found for biased data would consider certain outcomes to
    occur with greater probability. And if we had to give an example, it might consider
    certain levels of blood pressure to be normal, when they would indicate a health
    risk for younger patients.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 如果某些事件在数据中出现的频率更高，那么数据就会有偏差。例如，相对于总人口而言，从老年人收集的数据就会有偏差。我们发现的针对偏差数据的模型会认为某些结果发生的概率更大。如果我们必须给出一个例子，它可能会认为某些血压水平是正常的，而实际上这些水平对于年轻患者来说可能表明健康风险。
- en: If we want our classification function to make accurate predictions for new
    samples, we must use a dataset that is representative of the distribution from
    which the samples are drawn. However, if our data is not randomly sampled from
    the population, our training and test data will be different. In this case, standard
    classifiers will not perform well. This is because the classifier will not be
    able to learn the true underlying distribution of the data.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们希望我们的分类函数对新样本做出准确的预测，我们必须使用一个代表样本来源分布的数据集。然而，如果我们的数据不是从总体中随机抽取的，我们的训练和测试数据将会有所不同。在这种情况下，标准分类器将不会表现良好。这是因为分类器将无法学习数据的真实潜在分布。
- en: 'There are two main ways to solve the problem of differences between the distributions
    of training and test data: domain adaptation and transfer learning. Domain adaptation
    focuses on how to make the training data more similar to the test data, while
    transfer learning focuses on how to use knowledge from one domain to another.
    Both of these concepts focus on how to solve the problem of disparity between
    distributions of training and test data.'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 解决训练数据和测试数据分布差异问题主要有两种方法：领域自适应和迁移学习。领域自适应关注的是如何使训练数据更接近测试数据，而迁移学习关注的是如何将一个领域的知识应用到另一个领域。这两个概念都聚焦于如何解决训练和测试数据分布差异的问题。
- en: Domain adaptation is a technique that is used to improve the performance of
    a machine learning algorithm when the data is collected from a different source
    domain than the one for which the algorithm was originally trained. This is often
    done by adjusting the algorithm to better fit the new data distribution. Transfer
    learning is a technique that is used to improve the performance of a machine learning
    algorithm [[18]](#Par11018) when the data is collected from a different target
    domain than the one for which the algorithm was originally trained. This is often
    done by adjusting the algorithm to better fit the new target data distribution.
    Domain adaptation is the ability to apply an algorithm that is trained on one
    or more source domains to a different target domain [[19](#Par11019)] so that
    the features extracted from the source and target dataset are similar. This is
    useful for tasks such as image recognition, where the features in the source and
    target datasets may be different.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 领域自适应是一种技术，用于在数据是从不同于算法原始训练的源域收集时提高机器学习算法的性能。这通常是通过调整算法以更好地适应新的数据分布来实现的。迁移学习是一种技术，用于在数据是从不同于算法原始训练的目标域收集时提高机器学习算法的性能
    [[18](#Par11018)]。这通常是通过调整算法以更好地适应新的目标数据分布来实现的。领域自适应是将在一个或多个源域上训练的算法应用于不同的目标域
    [[19](#Par11019)] 的能力，以便从源数据和目标数据集中提取的特征相似。这对于图像识别等任务很有用，在这些任务中，源数据和目标数据集中的特征可能不同。
- en: Domain adaptation is a problem of accurately transferring knowledge from a training
    dataset to a test dataset when the distributions of the two datasets are different.
    Some proposed solutions to this problem are to use a mix of real and synthetic
    data, or to use a domain-specific language model.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 域适应是一个问题，当两个数据集的分布不同时，如何准确地将知识从训练数据集转移到测试数据集。针对此问题的一些解决方案包括使用真实和合成数据的混合，或者使用特定领域的语言模型。
- en: One of the most important challenges in machine learning is to develop methods
    that can learn from data in a new domain, i.e., to adapt the learned model to
    the new domain. This is known as *domain adaptation*. Domain adaptation is important
    because the data in different domains can be quite different in terms of structure,
    distribution, and noise. It is also important in many practical applications such
    as cross-domain learning, where the task is to learn a model that can be applied
    to a new domain, or transfer learning, where a model is pre-trained on a large
    dataset and then used to learn a new task in a different domain.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习中最具挑战性的任务之一是开发能够从新域数据中学习的方法，即调整学习到的模型以适应新域。这被称为*域适应*。域适应之所以重要，是因为不同域中的数据在结构、分布和噪声方面可能存在很大差异。它在许多实际应用中也同样重要，例如跨域学习，其任务是学习一个可以应用于新域的模型，或者迁移学习，其中模型在一个大型数据集上预训练，然后用于学习不同域中的新任务。
- en: 'Domain adaptation has been studied in a variety of different ways, including:'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 域适应已经以多种不同的方式进行了研究，包括：
- en: Data augmentation, where additional data is artificially generated to make the
    data in the new domain more similar to the data in the source domain.
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据增强，即通过人工生成额外的数据，使新域中的数据与源域中的数据更加相似。
- en: Algorithmic adaptation, where the adaptation algorithm is specifically designed
    for the new domain.
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 算法适应，即适应算法专门设计用于新域。
- en: Feature adaptation, where the features used by the adaptation algorithm are
    adapted to the new domain; and
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 特征适应，即适应算法使用的特征被调整为适应新域；
- en: Algorithmic enhancement, where the adaptation algorithm is enhanced in some
    way for the new domain.
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 算法增强，即以某种方式增强适应算法以适应新域。
- en: 'One of the most common ways of adapting a machine learning algorithm is to
    use data augmentation. This involves artificially generating additional data to
    make the data in the new domain more similar to the data in the source domain.
    This can be done in several ways, including:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 适应机器学习算法最常见的方法之一是使用数据增强。这涉及到人工生成额外的数据，使新域中的数据与源域中的数据更加相似。这可以通过几种方式实现，包括：
- en: Binarization, where the data is converted to binary form.
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 二值化，即将数据转换为二进制形式。
- en: Noise addition, where random noise is added to the data.
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 噪声添加，即在数据中添加随机噪声。
- en: Transformations, where the data is transformed in some way, such as by scaling,
    translation, or rotation; and
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 转换，即以某种方式转换数据，例如通过缩放、平移或旋转；以及
- en: Generative models, where a generative model is used to generate additional data.
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成模型，即使用生成模型生成额外的数据。
- en: 'Algorithmic adaptation is another way of adapting a machine learning algorithm
    for a new domain. In this approach, the adaptation algorithm is specifically designed
    for the new domain. This can be done in several ways, including:'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 算法适应是适应机器学习算法以适应新域的另一种方法。在此方法中，适应算法专门设计用于新域。这可以通过几种方式实现，包括：
- en: Algorithmic modification, where the adaptation algorithm is modified to make
    it more suitable for the new domain.
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 算法修改，即修改适应算法以使其更适合新域。
- en: Algorithmic combination, where two or more adaptation algorithms are combined
    to form a new adaptation algorithm; and
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 算法组合，即将两个或多个适应算法组合成一个新的适应算法；以及
- en: Algorithmic optimization, where the adaptation algorithm is optimized to make
    it more suitable for the new domain.
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 算法优化，即优化适应算法以使其更适合新域。
- en: 'Feature adaptation is another way of adapting a machine learning algorithm
    for a new domain. In this approach, the features used by the adaptation algorithm
    are adapted to the new domain. This can be done in several ways, including:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 特征适应是适应机器学习算法以适应新域的另一种方法。在此方法中，适应算法使用的特征被调整为适应新域。这可以通过几种方式实现，包括：
- en: Feature selection, where the features used by the adaptation algorithm are selected
    based on their suitability for the new domain.
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 特征选择，即根据其对新域的适用性选择适应算法使用的特征。
- en: Feature extraction, where the features used by the adaptation algorithm are
    extracted from the data in the new domain.
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 特征提取，即将适应算法使用的特征从新领域的数据中提取出来。
- en: Feature transformation, where the features used by the adaptation algorithm
    are transformed to make them more suitable for the new domain; and
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 特征转换，即将适应算法使用的特征转换，使其更适合新领域；
- en: Feature combination, where two or more features are combined to form a new feature.
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 特征组合，即将两个或更多特征组合成一个新的特征。
- en: CNNs (convolutional neural networks) are being successfully used in industrial
    businesses such as autonomous driving and medical imaging for semantic segmentation.
    However, the large amount of data required for CNNs has been a problem for collecting
    and labeling data. However, recent technological developments have made it possible
    for CNN models to produce and label photo-like synthetic data. CNNs are effective
    at semantic segmentation of urban scenes, reducing the domain mismatch between
    real and synthetic images. A curriculum-style learning approach has been proposed
    to further improve results [[20](#Par11020)].
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: CNNs (卷积神经网络) 在自动驾驶和医学成像等工业业务中成功应用于语义分割。然而，CNNs 所需的大量数据一直是收集和标注数据的问题。然而，最近的技术发展使得
    CNN 模型能够生成和标注类似照片的合成数据。CNNs 在城市场景的语义分割中非常有效，减少了真实图像和合成图像之间的领域不匹配。一种课程式学习方法已被提出，以进一步提高结果
    [[20](#Par11020)]。
- en: Now let’s examine domain randomization in terms of synthetic data.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来探讨合成数据方面的领域随机化。
- en: Domain Randomization
  id: totrans-154
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 领域随机化
- en: Domain randomization is a technique for training neural networks that can improve
    classification performance by making the model more robust to domain shifts. In
    this figure, the input data is randomly perturbed, which makes the model more
    resistant to changes in the data distribution. This can be helpful when there
    is a mismatch between the training data and the test data.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 领域随机化是一种训练神经网络的技术，可以通过使模型对领域变化更加鲁棒来提高分类性能。在此图中，输入数据被随机扰动，这使得模型对数据分布的变化更加抵抗。当训练数据和测试数据之间存在不匹配时，这可能是有帮助的。
- en: One of the biggest problems when training artificial neural networks is the
    large data requirements of these networks. In applications such as CNN, although
    tens of thousands of images may be pre-labeled manually or automatically, the
    results obtained for data reserved for testing purposes may not be generalizable.
    With synthetic image datasets produced using domain randomization, it is possible
    to obtain accuracy rates close to real data, such as 88%. Domain randomization
    is a technique that is used to help an AI model understand the general pattern
    by using thousands of variations of an object and its environment. This allows
    the AI model to better understand real data when it is applied. In a summary,
    domain randomization is about learning a model by seeing the objects in different
    lights, and colors, in a different order, in short, in different environments.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 训练人工神经网络时最大的问题之一是这些网络的大量数据需求。在 CNN 等应用中，尽管可能有成千上万张图像是手动或自动预标注的，但对于用于测试目的保留的数据获得的结果可能不具有普遍性。使用领域随机化生成的合成图像数据集，可以获得接近真实数据的准确率，例如
    88%。领域随机化是一种技术，通过使用成千上万种对象及其环境的变化来帮助 AI 模型理解一般模式。这允许 AI 模型在应用时更好地理解真实数据。总的来说，领域随机化是通过在不同的光线、颜色、顺序下，简而言之，在不同的环境中观察对象来学习模型。
- en: Synthetic data can differ significantly from real data in several ways, such
    as the distribution of light and patterns. This often creates a “reality gap”
    between the two types of data. If domain randomization is applied and synthetic
    data is generated with a sufficiently large amount of variability, the reality
    gap is reduced. While applying domain randomization, synthetic data is tried to
    be produced in a wide variety of conditions, considering the angle, light, pattern,
    structure, shadow, and camera effects. In artificial neural networks trained on
    a sufficiently wide variety of synthetically generated data, the learned models
    can be generalized to real data (real objects). Thus, the essence of the concept
    of domain randomization is the generation of “a sufficiently wide variety” of
    synthetic data. Domain randomization is a technique used to reduce the reality
    gap. By randomly selecting different simulated environments to train the model in,
    the model is exposed to a greater variety of scenarios. This helps to ensure that
    the model performs well in a wider range of situations.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 合成数据在多个方面可能与真实数据显著不同，例如光分布和模式。这通常在两种类型的数据之间产生“现实差距”。如果应用领域随机化并生成具有足够大量可变性的合成数据，现实差距将减小。在应用领域随机化时，尝试在广泛的各种条件下生成合成数据，考虑角度、光线、模式、结构、阴影和相机效果。在训练于足够广泛合成数据的人工神经网络中，学习到的模型可以推广到真实数据（真实对象）。因此，领域随机化的概念本质上是生成“足够广泛”的合成数据。领域随机化是一种用于减少现实差距的技术。通过随机选择不同的模拟环境来训练模型，模型将接触到更多样化的场景。这有助于确保模型在更广泛的情境中表现良好。
- en: Domain randomization is a process that is used to create synthetic datasets.
    These datasets are used to train machine learning models for tasks such as cat
    vs. dog classification. The accuracy levels of synthetic datasets can reach up
    to 88% [[21](#Par11021)]. This is an important tool for machine learning researchers,
    as it allows them to train models using data that is more representative of the
    real world. In addition, randomization can be used to create more diverse datasets,
    which can help to improve the generalizability of models.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 领域随机化是一个用于创建合成数据集的过程。这些数据集用于训练机器学习模型，例如猫与狗的分类任务。合成数据集的准确率可以达到高达88% [[21](#Par11021)]。这对于机器学习研究人员来说是一个重要的工具，因为它允许他们使用更接近真实世界的数据来训练模型。此外，随机化可以用来创建更多样化的数据集，这有助于提高模型的泛化能力。
- en: 'A deep neural network system for object detection can be improved by using
    synthetic images that are generated with variability. This is done by using the
    domain randomization technique. Domain randomization is a technique used in machine
    learning to force the neural network to learn the essential features of the object
    of interest. In this technique, the simulator’s lighting, pose textures, etc.
    parameters are randomized in non-realistic ways [[22](#Par11022)]:'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用具有可变性的合成图像，可以改进用于目标检测的深度神经网络系统。这是通过使用领域随机化技术实现的。领域随机化是机器学习中用于迫使神经网络学习感兴趣对象的基本特征的技术。在此技术中，模拟器的照明、姿态、纹理等参数以非现实的方式进行随机化
    [[22](#Par11022)]：
- en: In the domain randomization technique, the domain of an image can be randomized
    in several ways. Some common methods are to randomize the color palette, the image
    content, or the image size. Another method is to randomly change the image compression
    algorithm, which can result in a significantly different image file size. Another
    method is to randomly select a different image processing filter to use on the
    image. This can result in a completely different look for the image. Finally,
    the image can be randomized by changing the order of the pixels in the image file.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 在领域随机化技术中，图像的领域可以通过多种方式随机化。一些常见的方法包括随机化调色板、图像内容或图像大小。另一种方法是随机改变图像压缩算法，这可能导致图像文件大小显著不同。另一种方法是随机选择不同的图像处理过滤器应用于图像。这可能导致图像外观完全不同。最后，可以通过改变图像文件中像素的顺序来随机化图像。
- en: Is Real-World Experience Unavoidable?
  id: totrans-161
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 真实世界的经验是否不可避免？
- en: According to Jonny Dyer, director of engineering in Lyft’s Level 5 self-driving
    division [[23](#Par11023)], simulations are not perfect, and they will never completely
    replace real-world experience. However, they are a valuable tool in helping us
    to develop self-driving technology. By calibrating and validating simulations
    against reality, we are making great progress in our ability to create self-driving
    cars. Simulations can help us to learn about and test different aspects of self-driving
    technology, including how the algorithms that control the cars respond to different
    situations. They can also help us to identify potential issues and problems before
    they occur in the real world. By using simulations, we can make self-driving cars that
    are much safer and more reliable.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 根据Lyft Level 5自动驾驶部门工程总监乔尼·戴尔的说法[[23](#Par11023)]，模拟并不完美，它们永远不会完全取代现实世界的经验。然而，它们是帮助我们开发自动驾驶技术的宝贵工具。通过将模拟与现实进行校准和验证，我们在创造自动驾驶汽车的能力上取得了巨大进步。模拟可以帮助我们了解和测试自动驾驶技术的不同方面，包括控制汽车的算法如何对不同情况进行响应。它们还可以帮助我们识别在现实世界中可能出现的问题和问题。通过使用模拟，我们可以制造出更加安全和可靠的自动驾驶汽车。
- en: Nowadays, both artificial and real data are being used together in machine learning
    applications. Most of the data used are synthetic, but some are real. This helps
    to improve the accuracy of the machine learning applications. Waymo CEO John Krafcik
    has said that real-world experience is necessary for developing driverless cars
    [[23](#Par11023)]. Also, Yandex has a similar view. According to Yandex, which
    operates autonomous cars in Moscow, the simulation benefits the development of
    these cars, but testing in the public domain is critical. Without real-world testing,
    autonomous car companies can’t get real driving data. Doing this work without
    fully testing simulation programs on real roads will prevent the development of
    autonomous vehicles in the short term. Some experts believe that a combination
    of both real and simulated data is necessary for developing driverless cars. Real-world
    experience is necessary to test the capabilities of the cars, while simulated
    data can be used to improve the accuracy of the machine learning applications.
    Without both, it would be difficult to develop autonomous vehicles in the short
    term.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，在机器学习应用中，人工数据和真实数据正一起被使用。大多数使用的数据是合成的，但也有一些是真实的。这有助于提高机器学习应用的准确性。Waymo首席执行官约翰·克拉夫西克表示，现实世界的经验对于开发自动驾驶汽车是必要的[[23](#Par11023)]。雅虎也有类似的看法。根据雅虎的说法，该公司在莫斯科运营自动驾驶汽车，模拟有助于这些汽车的开发，但在公共领域进行测试是至关重要的。没有现实世界的测试，自动驾驶汽车公司无法获得真实的驾驶数据。在没有在真实道路上完全测试模拟程序的情况下进行这项工作，将阻碍自动驾驶汽车在短期内的发展。一些专家认为，开发自动驾驶汽车需要真实和模拟数据的结合。现实世界的经验对于测试汽车的能力是必要的，而模拟数据可以用来提高机器学习应用的准确性。没有这两者，短期内开发自动驾驶汽车将非常困难。
- en: Now let’s briefly explain the subject of pretraining.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们简要地解释一下预训练的主题。
- en: Pretraining
  id: totrans-165
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 预训练
- en: Because it requires a lot of data and labeling this data, we know that supervised
    learning is a bottleneck. In self-supervised learning, which can be used to overcome
    this bottleneck, important features of the data are determined with the help of
    a model using some of the unlabeled data used in learning. Although the starting
    point here is unlabeled data, real data is still required for such applications.
    “Self-supervised learning is to predict any unobserved or hidden part (or property)
    of the input from any observed or unhidden part of the input” and it is known
    to accelerate apps like proactive detection of hate speech on Facebook [[24](#Par11024)].
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 由于它需要大量数据和标记这些数据，我们知道监督学习是一个瓶颈。在自监督学习中，它可以用来克服这个瓶颈，数据的重要特征是通过使用在学习中使用的部分未标记数据，并借助模型来确定的。尽管这里的起点是未标记数据，但此类应用仍需要真实数据。“自监督学习是从输入的任何已观察或未隐藏的部分预测任何未观察或隐藏的部分（或属性）”，并且已知它可以加速像Facebook上主动检测仇恨言论这样的应用[[24](#Par11024)]。
- en: Pretraining is a process whereby a deep learning model is first trained on a
    large dataset, typically using a supervised learning technique, before being fine-tuned
    on a smaller dataset. The large dataset is typically a labeled dataset that is
    similarly to the smaller dataset that the model will be fine-tuned on. The aim
    of pretraining is to provide the deep learning model with initial weights that
    are close to the optimum weights for the task at hand. This can save a lot of
    time and computational resources when training the model on the smaller dataset
    as the model will not need to learn from scratch.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 预训练是一个过程，其中深度学习模型首先在一个大型数据集上训练，通常使用监督学习技术，然后在较小的数据集上进行微调。这个大型数据集通常是一个标记数据集，与模型将要微调的较小数据集相似。预训练的目的是为深度学习模型提供接近当前任务最优权重的初始权重。当在较小的数据集上训练模型时，这可以节省大量时间和计算资源，因为模型不需要从头开始学习。
- en: Pretraining is a popular approach in deep learning as it can yield very good
    results with relatively little data. It is especially useful when labeled data
    is scarce or expensive to obtain. In these cases, pretraining can be used to train
    a model on a large dataset that is readily available, such as an unlabeled dataset.
    The model can then be fine-tuned on the smaller labeled dataset.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 预训练是深度学习中的一种流行方法，因为它可以在相对较少的数据上产生非常好的结果。当标记数据稀缺或获取成本高昂时，它尤其有用。在这些情况下，预训练可以用来在可轻松获得的大量数据集上训练模型，例如未标记的数据集。然后，模型可以在较小的标记数据集上进行微调。
- en: Pretraining can be done using a variety of methods, including self-supervised
    learning, unsupervised learning, and transfer learning [[25](#Par11025)]. Self-supervised
    learning is a technique whereby the model is trained to predict labels from data
    that is not labeled. This can be done, for example, by training the model to predict
    the next frame in a video or the next word in a sentence. Unsupervised learning
    is a technique whereby the model is trained on data that is not labeled and is
    not required to make predictions. Transfer learning is a technique whereby a model
    that has been trained on one task is used to initialize the weights of a model that
    is being trained on a different task.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 预训练可以通过多种方法进行，包括自监督学习、无监督学习和迁移学习 [[25](#Par11025)]。自监督学习是一种技术，其中模型被训练来从未标记的数据中预测标签。例如，可以通过训练模型来预测视频中的下一帧或句子中的下一个单词来实现。无监督学习是一种技术，其中模型在未标记且不需要进行预测的数据上进行训练。迁移学习是一种技术，其中在一个任务上训练过的模型被用来初始化在另一个任务上训练的模型的权重。
- en: Pretraining is an important technique in deep learning as it can provide the
    model with good initial weights that are close to the optimum weights for the
    task at hand. This can save a lot of time and computational resources when training
    the model on a smaller dataset. In pretraining applications with synthetic data
    against self-supervised learning, the need for real data is no longer required.
    For example, in information retrieval (IR) applications made with neural networks,
    it was seen that pre-training with synthetic data improves retrieval performance.
    Some authors have also used synthetic images generated via graphics engines for
    effective pretraining and explained their results as, “While a large portion of
    contemporary representation learning research focuses on self-supervision to avoid
    using labels, we hope our demonstration with Task2Sim motivates further research
    in using simulated data from graphics engines for this purpose” [[26](#Par11026)].
    By controlling the simulation parameters (lighting, pose, materials, etc.) with
    the graphics engines used in such applications, a pretraining dataset is created
    and can be used for learning purposes. The Unity Perception package provides a
    randomization framework that simplifies introducing variation into synthetic environments
    and includes a set of labelers. For example, a synthetic aerial image dataset
    for ship recognition, called UnityShip has been proposed. “This dataset contains
    over 100,000 synthetic images and 194,054 ship instances, including 79 different
    ship models in ten categories and six different large virtual scenes with different
    periods, weather environments, and altitudes” [[27](#Par11027)] and it has been
    found “that for small- and medium-sized real-world datasets, the synthetic dataset
    provides a large improvement in model pre-training and data augmentation” [[27](#Par11027)].
    One of the results obtained in synthetic data generation research is to achieve
    a high degree of realism with computer graphics.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 预训练是深度学习中的一个重要技术，因为它可以为模型提供接近任务最优权重的良好初始权重。在较小数据集上训练模型时，这可以节省大量时间和计算资源。在针对自监督学习的合成数据预训练应用中，不再需要真实数据。例如，在用神经网络制作的信息检索（IR）应用中，观察到使用合成数据进行预训练可以提高检索性能。一些作者还使用通过图形引擎生成的合成图像进行有效的预训练，并将他们的结果解释为：“虽然当代表示学习研究的大部分重点放在了自监督上以避免使用标签，但我们希望通过Task2Sim的演示激发进一步研究使用图形引擎的模拟数据来达到这个目的”
    [[26](#Par11026)]。通过控制此类应用中使用的图形引擎的模拟参数（照明、姿态、材料等），创建了一个预训练数据集，可用于学习目的。Unity Perception包提供了一个随机化框架，简化了将变化引入合成环境，并包含一组标签器。例如，一个用于船舶识别的合成航空图像数据集，称为UnityShip，已经被提出。“这个数据集包含超过100,000张合成图像和194,054个船舶实例，包括十个类别中的79种不同船舶模型，以及六个不同时期、不同天气环境和不同高度的六个不同大型虚拟场景”
    [[27](#Par11027)]，并且发现“对于小型和中型真实世界数据集，合成数据集在模型预训练和数据增强方面提供了很大的改进” [[27](#Par11027)]。合成数据生成研究获得的一个结果是，通过计算机图形学达到高度的真实感。
- en: Now let’s examine Reinforcement Learning in terms of synthetic data.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们从合成数据的角度来考察强化学习。
- en: Reinforcement Learning
  id: totrans-172
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 强化学习
- en: In machine learning we know that supervised learning requires labeled data,
    and unsupervised learning requires datasets that do not require labels. When we
    consider reinforcement learning, this technique is close to unsupervised learning
    as the data used while training the machine is not labeled. However, because reinforcement
    learning is trained through the reward and punishment mechanism of an agent, it
    is not well suited to the classification of supervised and unsupervised learning.
    GAN models can be used to generate synthetic data that can be used to train medical
    models [[28](#Par11028)]. This data can improve the accuracy of medical models
    and help be used to reduce the training time required. Additionally, synthetic
    data can be used to select images that are more likely to contain informative
    features.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 在机器学习中，我们知道监督学习需要标记数据，无监督学习需要不需要标记的数据集。当我们考虑强化学习时，这种技术与无监督学习相近，因为在训练机器时使用的数据没有标记。然而，由于强化学习是通过代理的奖励和惩罚机制进行训练的，它不适合于监督学习和无监督学习的分类。GAN模型可以用来生成可用于训练医疗模型的合成数据
    [[28](#Par11028)]。这些数据可以提高医疗模型的准确性，并有助于减少所需的训练时间。此外，合成数据可以用来选择更可能包含信息特征的图像。
- en: In reinforcement learning, the agent tries to find the best way to achieve a
    goal by learning through trial and error. Actions that lead to better results
    receive higher rewards, while actions that lead to worse results receive lower
    rewards or even punishments (negative rewards). The agent’s policy is the strategy
    it uses to select actions in each state. By interacting with the environment,
    the reinforcement learning system learns to solve a given task by finding an action
    selection policy that maximizes the accumulated reward. The agent continues to
    learn and update its policy as it interacts with the environment, to find the
    best possible strategy for achieving the goal. Over time, the reinforcement learning
    system should be able to solve the given task more efficiently and effectively.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 在强化学习中，智能体通过试错来寻找实现目标的最佳方式。导致更好结果的行为会获得更高的奖励，而导致更差结果的行为则会获得较低的奖励，甚至惩罚（负奖励）。智能体的策略是它在每个状态下选择行为的策略。通过与环境的交互，强化学习系统通过寻找一个最大化累积奖励的动作选择策略来学习解决给定的任务。智能体在与环境的交互过程中持续学习和更新其策略，以找到实现目标的最佳策略。随着时间的推移，强化学习系统应该能够更高效、更有效地解决给定的任务。
- en: Reinforcement learning is used in NLP to improve text summarization, question
    answering, and translation. This is done by giving feedback to the system on how
    well it is doing at a task. Reinforcement learning can be used to improve the
    performance of autonomous vehicles in areas such as trajectory optimization, motion
    planning, dynamic path determination, and controller optimization. DeepRacer is
    a self-driving car that has been designed to test out reinforcement learning on
    a physical track.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习在 NLP 中用于改进文本摘要、问答和翻译。这是通过向系统反馈它在任务中的表现来实现的。强化学习可以用来提高自动驾驶汽车在轨迹优化、运动规划、动态路径确定和控制优化等领域的性能。DeepRacer
    是一辆设计用来在物理赛道上测试强化学习的自动驾驶汽车。
- en: An autonomous vehicle is using reinforcement learning when it is learning how
    to complete a task by being rewarded for completing it correctly. This type of
    learning is done by giving the vehicle positive reinforcement (such as a treat)
    when it completes a task correctly and negative reinforcement (such as noise)
    when it completes a task incorrectly. This allows the vehicle to learn which tasks
    are correct and which are incorrect and allows it to improve its performance over
    time.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 当自动驾驶汽车通过正确完成任务获得奖励来学习如何完成任务时，它正在使用强化学习。这种学习是通过在车辆正确完成任务时给予正强化（如奖励）和在车辆错误完成任务时给予负强化（如噪音）来进行的。这允许车辆学习哪些任务是正确的，哪些是错误的，并允许它在时间上提高其性能。
- en: One advantage of using reinforcement learning is that it can be used to optimize
    things without human intervention. This can be useful for tasks that are difficult
    or impossible for humans to do, such as optimizing a robot’s grasping behavior.
    Additionally, reinforcement learning can be used to learn from experience, which
    can make it more efficient than other methods.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 使用强化学习的一个优点是它可以用来优化事物，而不需要人为干预。这对于人类难以或无法完成的任务很有用，例如优化机器人的抓取行为。此外，强化学习可以用来从经验中学习，这使得它比其他方法更有效率。
- en: There is a technique called reinforcement learning that can be used to optimize
    things in a simulated environment. For example, Facebook has developed a program
    called Horizon that uses reinforcement learning to help robots do tasks better,
    like grasping. This approach is effective in many different domains, from video
    games to industrial robotics.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 有一种称为强化学习的技术，可以用于在模拟环境中优化事物。例如，Facebook 开发了一个名为 Horizon 的程序，该程序使用强化学习来帮助机器人更好地完成任务，如抓取。这种方法在许多不同的领域都有效，从视频游戏到工业机器人。
- en: Finally, let’s examine self-supervised learning.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，让我们来考察一下自监督学习。
- en: Self-Supervised Learning
  id: totrans-180
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 自监督学习
- en: One common challenge in many medical applications is the scarcity of labeled
    data. However, unlabeled data is readily available in many medical domains. Self-supervised
    pretraining can be very helpful in applications where labeled data is scarce.
    CNNs can transfer well between tasks, meaning that they can be pre-trained on
    a task and then applied to a new task with a modest amount of labeled data [[29](#Par11029)].
    In this approach, the first step is to train a deep learning model on a dataset
    of labeled images, such as ImageNet. This tunes the parameters of the model’s
    layers to the general patterns found in all kinds of images.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 在许多医学应用中，一个常见的挑战是标记数据的稀缺。然而，在许多医学领域，未标记的数据很容易获得。在标记数据稀缺的应用中，自监督预训练可以非常有帮助。CNNs在不同任务之间可以很好地迁移，这意味着它们可以在一个任务上预训练，然后使用少量标记数据应用于新任务
    [[29](#Par11029)]。在这种方法中，第一步是在标记图像数据集（如ImageNet）上训练深度学习模型。这调整了模型层的参数，使其适应所有各种图像中发现的通用模式。
- en: Next, we have a trained deep learning model that can be fine-tuned on a limited
    set of labeled examples for the target task. However, it should be accepted that
    medical images are very different from natural images in ImageNet, and so the
    deep learning model may not be as accurate when used to classify medical images
    [[30](#Par11030)].
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们有一个经过训练的深度学习模型，可以在目标任务的有限标记示例上进行微调。然而，应该接受的是，医学图像与ImageNet中的自然图像非常不同，因此当用于分类医学图像时，深度学习模型可能不会那么准确
    [[30](#Par11030)]。
- en: The research team at Google used a variation of the SimCLR framework called
    Multi-Instance Contrastive Learning to create representations of images [[31](#Par11031)]
    that are stronger than if they had only been used in supervised learning. MICLe
    is a framework for learning from multiple images of the same patient, even if
    the images are not annotated for supervised learning [[30](#Par11030)]. This means
    that the Google team used a computer program to learn from unlabeled images. The
    program was able to learn how to recognize patterns in the images and create representations
    of them that were stronger than if the team had only used supervised learning.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 谷歌的研究团队使用了一种名为多实例对比学习的SimCLR框架变体，来创建比仅使用监督学习更强的图像表示 [[31](#Par11031)]。MICLe是一个用于从同一患者的多张图像中学习的框架，即使这些图像没有用于监督学习的标注
    [[30](#Par11030)]。这意味着谷歌团队使用了一个计算机程序从未标记的图像中学习。该程序能够学会如何识别图像中的模式，并创建比仅使用监督学习更强的图像表示。
- en: In the SimCLR framework called MICLe, the Google Research team found that the
    composition of data augmentations (adding new data to help improve predictions)
    plays a critical role in defining effective predictive tasks. They also found
    that introducing a learnable nonlinear transformation (a change in how data is
    represented) between the representation and the contrastive loss (the measure
    of how well predictions match the actual data) substantially improves the quality
    of the learned representations. Additionally, contrastive learning (learning how
    to predict differences between data sets) benefits from larger batch sizes and
    more training steps compare to supervised learning (learning how to predict specific
    values within data sets). Finally, they found that they could outperform previous
    methods for self-supervised and semi-supervised learning [[32](#Par11032)] (learning
    without complete data sets) on the ImageNet data set by combining these findings.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 在名为MICLe的SimCLR框架中，谷歌研究团队发现，数据增强（添加新数据以帮助改进预测）的组成在定义有效的预测任务中起着关键作用。他们还发现，在表示和对比损失（衡量预测与实际数据匹配程度）之间引入一个可学习的非线性变换（数据表示方式的变化）可以显著提高学习表示的质量。此外，与监督学习（学习如何在数据集中预测特定值）相比，对比学习（学习如何预测数据集之间的差异）从更大的批量大小和更多的训练步骤中受益。最后，他们发现，通过结合这些发现，他们可以在ImageNet数据集上优于先前的方法，这些方法用于自我监督和半监督学习
    [[32](#Par11032)]（在没有完整数据集的情况下学习）。
- en: In the medical imaging field one of the biggest challenges in medical imaging
    is the lack of data. So, researchers have turned to use GANs to generate fake
    medical images. This makes the data set bigger, and in turn, helps improve the
    accuracy of CNNs when it comes to classifying images. This is especially useful
    in cases where real data is difficult or impossible to obtain, such as in rare
    disease diagnoses. GANs have also been used to generate realistic-looking images
    of organs and tissues, which can be used to train CNNs for medical image segmentation.
    Overall, GANs can be a powerful tool in the medical imaging field, helping to
    improve the accuracy of CNNs and providing realistic images for training and testing.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 在医学影像领域，医学影像的最大挑战之一是数据不足。因此，研究人员转向使用GANs来生成假医学图像。这使得数据集更大，从而有助于提高CNN在图像分类方面的准确性。这在真实数据难以获得或无法获得的情况下特别有用，例如在罕见疾病的诊断中。GANs还被用于生成器官和组织的逼真图像，这些图像可以用于训练CNN进行医学图像分割。总的来说，GANs在医学影像领域可以成为一个强大的工具，帮助提高CNN的准确性，并为训练和测试提供逼真的图像。
- en: Self-supervised learning is a type of machine learning where the model is trained
    using data that is not labeled. This can be done in several ways, such as using
    data augmentation to create new data points from the original data or using unsupervised
    learning algorithms to learn from the data [[33](#Par11033)].
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 自监督学习是一种机器学习方法，其中模型使用未标记的数据进行训练。这可以通过几种方式实现，例如使用数据增强从原始数据中创建新的数据点，或者使用无监督学习算法从数据中学习
    [[33](#Par11033)]。
- en: Self-supervised learning has several advantages over traditional supervised
    learning. First, it is more efficient because it does not require labels. Second,
    it can be used to learn from data that is not easily labeled, such as images or
    videos. Finally, self-supervised learning can be used to learn features that are
    not easily learned with supervised learning, such as high-level features in images
    or videos.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 自监督学习相对于传统监督学习有几个优点。首先，它更高效，因为它不需要标签。其次，它可以用于从不易标记的数据中学习，例如图像或视频。最后，自监督学习可以用于学习用监督学习难以学习的特征，例如图像或视频中的高级特征。
- en: Self-supervised learning is a powerful tool for training deep neural networks.
    However, it is important to remember that self-supervised learning is not a replacement
    for supervised learning. Supervised learning is still necessary for tasks that
    require labels, such as classification.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 自监督学习是训练深度神经网络的有力工具。然而，重要的是要记住，自监督学习并不是监督学习的替代品。对于需要标签的任务，如分类，监督学习仍然是必要的。
- en: Summary
  id: totrans-189
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, you learned about the different types of synthetic data and
    how they can be used to generate fair synthetic data. You also learned about how
    to use video games to create synthetic data, as well as the synthetic-to-real
    domain gap. Additionally, you learned about domain transfer, domain adaptation,
    and domain randomization. Finally, you learned about whether the real-world experience
    is unavoidable, and about pretraining, reinforcement learning, and self-supervised
    learning.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你学习了不同类型的合成数据以及如何使用它们来生成公平的合成数据。你还学习了如何利用电子游戏来创建合成数据，以及合成数据与真实数据之间的领域差距。此外，你学习了领域迁移、领域适应和领域随机化。最后，你学习了现实世界经验是否不可避免，以及预训练、强化学习和自监督学习。
- en: Next, we’ll begin delving into Introduction to GANs.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将开始深入探讨《GANs入门》。
