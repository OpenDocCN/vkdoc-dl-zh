- en: FIT values ​​are found for all observations by replacing the TIME variable in
    the regression equation. We can think that FIT values ​​are synthetic data in
    a sense produced from DATA. When we think of the obtained FIT data as “data produced
    from data”, these are referred to as “*augmented data*”; when we consider that
    these are only data produced from the found regression equation, they are close
    to the concept of “*synthetic data*”. Another point to be noted in these results
    is that if we produce data with this regression equation, there will be a very
    large deviation from the real data in the 20th observations. The value of the
    20th Observation for this DATA dataset is 2 and it is an outlier or a black swan.
    Although outliers represent very important turning points in real life, these
    data are difficult to produce as synthetic data. Figure [2-2](#Fig2) was obtained
    as a result of regression analysis.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 通过替换回归方程中的 TIME 变量，为所有观测值找到 FIT 值。从某种意义上说，我们可以认为 FIT 值是从 DATA 中产生的合成数据。当我们把获得的
    FIT 数据视为“从数据产生的数据”时，这些被称为“*增强数据*”；当我们考虑这些数据只是从找到的回归方程产生的数据时，它们接近“*合成数据*”的概念。在这些结果中需要注意的另一点是，如果我们用这个回归方程产生数据，第
    20 个观测值与真实数据将会有很大的偏差。这个 DATA 数据集第 20 个观测值的值是 2，它是一个异常值或黑天鹅事件。尽管异常值代表现实生活中非常重要的转折点，但这些数据很难作为合成数据产生。图
    [2-2](#Fig2) 是回归分析的结果。
