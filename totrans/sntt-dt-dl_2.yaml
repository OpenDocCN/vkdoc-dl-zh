- en: 2. Foundations of Synthetic data
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2. 合成数据的基础
- en: This chapter explores the different types of synthetic data, how to generate
    fair synthetic data, and the benefits and challenges presented by synthetic data.
    It also explores the synthetic-real field gap and how to overcome it with field
    transfer, adaptation, and randomization. We discuss how simulation automates data
    labeling in autonomous vehicle companies and how real-world experience is inevitable.
    Finally, we discuss how data can be pretrained, learned with reinforcement, and
    self-supervised learning to learn medical images.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 本章探讨了合成数据的不同类型，如何生成公平的合成数据，以及合成数据带来的益处和挑战。它还探讨了合成-真实数据域的差距，以及如何通过领域迁移、适应和随机化来克服这一差距。我们讨论了模拟如何自动化自动驾驶公司的数据标注，以及现实世界经验是不可避免的。最后，我们讨论了数据如何通过预训练、强化学习和自监督学习来学习医学图像。
- en: How to Generated Fair Synthetic Data?
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何生成公平的合成数据？
- en: '*“Fair synthetic data”* refers to data that has been generated using causally-aware
    generative networks. These networks are designed to produce data that is free
    of bias and discrimination. This data can be used to train machine learning models
    that are fairer and more accurate. Additionally, this data can help reduce the
    overall amount of bias and discrimination in machine learning.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '*“公平的合成数据”*指的是使用因果感知生成网络生成的数据。这些网络被设计用来产生无偏见和歧视的数据。这些数据可以用来训练更加公平和准确的机器学习模型。此外，这些数据可以帮助减少机器学习中整体偏见和歧视的数量。'
- en: There are several reasons why it might be desirable to use fair synthetic data.
    For one, it can be difficult to obtain real-world data that is truly representative
    of the population. This is often due factors such as to self-selection bias, which
    can lead to certain groups being under-represented in the data. In addition, real-world
    data is often expensive to collect, so using synthetic data can be a more cost-effective
    option.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 有几个原因可能使得使用公平的合成数据变得有吸引力。一方面，可能很难获得真正代表人群的现实世界数据。这通常是由于自我选择偏差等因素造成的，这可能导致某些群体在数据中代表性不足。此外，现实世界数据通常收集成本高昂，因此使用合成数据可能是一个更具成本效益的选择。
- en: There are several ways to generate fair synthetic data. One approach is to use
    causally-aware generative networks. These networks are designed to learn the relationships
    between different variables in a data set and can than be used to generate new
    data that is consistent with these relationships. This ensures that the generated
    data is not biased concerning any sensitive attributes. This approach has several
    advantages over other methods of generating synthetic data. First, it is much
    more efficient, as it only requires a single training step. Second, it is more
    accurate, as the generated data will be consistent with the known relationships
    between the variables. Finally, it is fairer, as the generated data will not biased
    concerning any sensitive attributes.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 生成公平的合成数据有几种方法。一种方法是用因果感知生成网络。这些网络被设计用来学习数据集中不同变量之间的关系，然后可以用来生成与这些关系一致的新数据。这确保了生成数据在敏感属性方面没有偏见。这种方法在生成合成数据的方法中具有几个优点。首先，它更加高效，因为它只需要一个训练步骤。其次，它更加准确，因为生成数据将与变量之间已知的关系一致。最后，它更加公平，因为生成数据在敏感属性方面不会存在偏见。
- en: Generative models are a powerful tool for creating fair synthetic data, but
    they are not the only tool available. Other methods for creating synthetic data
    include data augmentation, which can be used to add diversity to a dataset, and
    resampling, which can be used to create balanced datasets. These methods can be
    used in conjunction with generative models to create even more realistic synthetic
    data.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 生成模型是创建公平的合成数据的有力工具，但它们并不是唯一可用的工具。其他创建合成数据的方法包括数据增强，它可以用来增加数据集的多样性，以及重采样，它可以用来创建平衡的数据集。这些方法可以与生成模型结合使用，以创建更加逼真的合成数据。
- en: One approach to generating fair synthetic data is to use data that has been
    anonymized or de-identified. This data has had all personally identifiable information
    removed, so it cannot be used to discriminate against individuals. However, this
    data may not be as realistic as data that has been generated using causally-aware
    generative networks. Another approach is to use data that has been generated using
    causally aware generative networks. This data is more realistic, but it may not
    be as anonymized or de-identified. Ultimately, the choice of method for generating
    fair synthetic data will depend on the needs of the user.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 生成公平合成数据的一种方法是用已经匿名化或去标识的数据。这些数据已经移除了所有可识别的个人身份信息，因此不能用来歧视个人。然而，这些数据可能不如使用因果感知生成网络生成的数据真实。另一种方法是使用使用因果感知生成网络生成的数据。这种数据更真实，但可能不如匿名化或去标识。最终，生成公平合成数据的方法选择将取决于用户的需求。
- en: Now let’s look at how to create synthetic data simply.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来看看如何简单地创建合成数据。
- en: Generating Synthetic Data in A Simple Way
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简单方式生成合成数据
- en: As shown in Figure [2-1](#Fig1), the synthetic data generation process is a
    three-step process that uses a statistical model to generate data that is statistically
    similar to real data. The first step is to create a model of the real data. The
    second step is to use the model to generate synthetic data. The third step is
    to compare the synthetic data to the real data to ensure that they are statistically
    similar. While generating synthetic data, a model is first fitted to the source
    data, and then synthetic data is generated by applying this model [[2](#Par1102)].
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 如图 [2-1](#Fig1) 所示，合成数据生成过程是一个三步过程，它使用统计模型生成与真实数据在统计上相似的数据。第一步是创建真实数据的模型。第二步是使用该模型生成合成数据。第三步是将合成数据与真实数据进行比较，以确保它们在统计上相似。在生成合成数据时，首先将模型拟合到源数据，然后通过应用此模型生成合成数据
    [[2](#Par1102)]。
- en: '![](../images/534235_1_En_2_Chapter/534235_1_En_2_Fig1_HTML.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/534235_1_En_2_Chapter/534235_1_En_2_Fig1_HTML.png)'
- en: A process of synthetic data generation initiates with source data, then leads
    to modeling. It has a fit model and an apply model. And the synthetic data is
    generated.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 合成数据生成过程从源数据开始，然后进行建模。它有一个拟合模型和一个应用模型。然后生成合成数据。
