    using various classification algorithms, from data cleaning to model building.
    These types of recommendations are an add-on to the e-commerce platform. With
    classification-based algorithm output, you can show the hidden products to the
    user, and the customer is more likely to be interested in those products/items.
    The conversion rate of these recommendations is high compared to other recommender
    techniques.
