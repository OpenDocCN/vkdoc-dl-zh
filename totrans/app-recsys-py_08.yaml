- en: Logistic Regression
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Linear regression is needed to predict a numerical value. But you also encounter
    classification problems where dependent variables are binary, like yes or no,
    1 or 0, true or false, and so on. In that case, *logistic regression* is needed.
    It is a classification algorithm and continues linear regression. Here, log odds
    are used to restrict the dependent variable between 0 and 1.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [8-20](#Fig20) shows the logistic regression formula.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537881_1_En_8_Chapter/537881_1_En_8_Fig20_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A formula that is used to calculate the logistic regression.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-20
  prefs: []
  type: TYPE_NORMAL
- en: Formula
  prefs: []
  type: TYPE_NORMAL
- en: Where (*P*/1 – *P*) is the odds ratio, β[0] is constant, and β is the coefficient.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [8-21](#Fig21) shows how logistic regression works.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537881_1_En_8_Chapter/537881_1_En_8_Fig21_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A logistic regression graph of probability (y = 1) versus x exhibits the plots
    that are plotted along 0.0 and 1.0 probability. The trend increases from 0.0 to
    1.0.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-21
  prefs: []
  type: TYPE_NORMAL
- en: Logistic regression
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s look at how to evaluate the classification model.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537881_1_En_8_Chapter/537881_1_En_8_Fig22_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A framework exhibits a confusion matrix. Actual and predicted classes are represented
    with positive (true positive and false positive) and negative (false negative
    and true negative) rates.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-22
  prefs: []
  type: TYPE_NORMAL
- en: Confusion matrix
  prefs: []
  type: TYPE_NORMAL
- en: Accuracy is the number of correct predictions divided by the total number of
    predictions. The values lie between 0 and 1; to convert it into a percentage,
    multiply the answer by 100\. But only considering accuracy as the evaluation parameter
    is not an ideal thing to do. For example, if the data is imbalanced, you can obtain
    very high accuracy.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The crosstab between an actual and a predicted class is called a *confusion
    matrix*. It's not only for binary, but you can also use it for multiclass classification.
    Figure [8-22](#Fig22) represents a confusion matrix.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../images/537881_1_En_8_Chapter/537881_1_En_8_Fig23_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A graph exposes the R O C curve along the false positive rate (x-axis) and true
    positive rate (y-axis). The trend of the curve increases from 0.0 to 1.0 rate.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-23
  prefs: []
  type: TYPE_NORMAL
- en: ROC curve
  prefs: []
  type: TYPE_NORMAL
- en: The ROC (receiver operating characteristic) curve is an evaluation metric for
    classification tasks. A plot with a false positive rate on the x axis and a true
    positive rate on the y axis is the ROC curve plot. It says how strongly the classes
    are distinguished when the thresholds are varied. Higher the value of the area
    under the ROC curve, the higher the predictive power. Figure [8-23](#Fig23) shows
    the ROC curve.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Linear and logistic regression are the traditional way of using statistics as
    a base to predict the dependent variable. But there are a few drawbacks to these
    algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: Statistical modeling must satisfy the assumptions that are discussed previously.
    If they are not satisfied, models won’t be reliable and thoroughly fit random
    predictions.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These algorithm face challenge when data and target feature is non-linear. Complex
    patterns are hard to decode.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Data should be clean (missing values and outliers should be treated).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Advanced machine learning concepts like decision tree, random forest, SVM, and
    neural networks can be used to overcome these limitations.
  prefs: []
  type: TYPE_NORMAL
- en: Implementation
