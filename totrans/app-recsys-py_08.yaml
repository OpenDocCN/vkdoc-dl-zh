- en: Decision Tree
  id: totrans-237
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 决策树
- en: The decision is a type of supervised learning in which the data is split into
    similar groups based on the most important variable to the least. It looks like
    a tree-shaped structure when all the variables split hence the name tree-based
    models.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 决策是一种监督学习类型，数据根据最重要的变量到最不重要的变量进行分组。当所有变量都进行分割时，它看起来像树形结构，因此得名基于树的模型。
- en: The tree comprises a root node, a decision node, and a leaf node. A decision
    node can have two or more branches, and a leaf node represents a decision. Decision
    trees handle any type of data, be it quantitative or qualitative. Figure [8-24](#Fig24)
    shows how the decision tree works.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 树包括根节点、决策节点和叶节点。决策节点可以有两条或更多分支，叶节点代表决策。决策树可以处理任何类型的数据，无论是定量还是定性。图[8-24](#Fig24)展示了决策树的工作方式。
- en: '![](../images/537881_1_En_8_Chapter/537881_1_En_8_Fig24_HTML.jpg)'
  id: totrans-240
  prefs: []
  type: TYPE_IMG
  zh: '![图8-24](../images/537881_1_En_8_Chapter/537881_1_En_8_Fig24_HTML.jpg)'
- en: A decision tree exhibits the data for "is a person fit ?". The tree comprises
    a root node (age is less than 30), decision, and leaf nodes with yes or no options.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 决策树展示了“是否适合一个人？”的数据。该树包括根节点（年龄小于30岁）、决策和带有是或否选项的叶节点。
- en: Figure 8-24
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-24
- en: Decision tree
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 决策树
- en: Let’s examine how tree splitting happens, which is the key concept in decision
    trees. The core of the decision tree algorithm is the process of splitting the
    tree. It uses different algorithms to split the node and is different for classification
    and regression problems.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考察一下树分裂的过程，这是决策树中的关键概念。决策树算法的核心是树的分裂过程。它使用不同的算法来分裂节点，并且对于分类和回归问题有所不同。
- en: The following are for classification problems.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 以下与分类问题相关。
- en: The *Gini index* is a probabilistic way of splitting the trees. It uses the
    sum of the probability square for success and failure and decides the purity of
    the nodes. CART (classification and regression tree) uses the Gini index to create
    splits.
  id: totrans-246
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*基尼指数*是分割树的概率方法。它使用成功和失败的概率平方和来决定节点的纯度。CART（分类和回归树）使用基尼指数来创建分割。'
- en: '*Chi-square* is the statistical significance between subnodes, and the parent
    node decides the splitting. Chi-square = ((actual – expected)^2 / expected)^1/2\.
    CHAID (Chi-square Automatic Interaction Detector) is an example of this.'
  id: totrans-247
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*卡方检验*是子节点之间的统计显著性，父节点决定分裂。卡方 = ((实际 - 预期)^2 / 预期)^1/2。CHAID（卡方自动交互检测器）是此类的一个例子。'
- en: The following pertains to regression problems.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 以下与回归问题相关。
- en: '*Reduction in variance* works based on the variance between two features (target
    and independent feature) to split a tree.'
  id: totrans-249
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*方差减少*基于两个特征（目标特征和独立特征）之间的方差来分割树。'
- en: '*Overfitting* occurs when the algorithms tightly fit the given training data
    but is inaccurate in predicting the outcomes of the untrained or test data. The
    same is the case with decision trees as well. It occurs when the tree is created
    to perfectly fit all samples in the training dataset, affecting test data accuracy.'
  id: totrans-250
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当算法紧密拟合给定的训练数据但在预测未训练或测试数据的输出时不够准确时，会发生*过拟合*。决策树也是如此。当树被创建以完美地拟合训练数据集中的所有样本时，会影响测试数据的准确性。
- en: Implementation
  id: totrans-251
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 实现
- en: '[PRE40]'
  id: totrans-252
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
