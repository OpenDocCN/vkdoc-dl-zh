- en: 8. Classification Algorithm–Based Recommender Systems
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 8. 基于分类算法的推荐系统
- en: A classification algorithm-based recommender system is also known as the *buying
    propensity model*. The goal here is to predict the propensity of customers to
    buy a product using historical behavior and purchases.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 基于分类算法的推荐系统也称为*购买倾向模型*。这里的目的是使用历史行为和购买来预测客户购买产品的倾向。
- en: The more accurately you predict future purchases, the better recommendations
    and, in turn, sales. This kind of recommender system is used more often to ensure
    100% conversion from the users who are likely to purchase with certain probabilities.
    Promotions are offered on those products, enticing users to make a purchase.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 你预测未来购买越准确，推荐和销售就越好。这种推荐系统更常用于确保具有一定概率可能购买的用户的 100% 转化率。在这些产品上提供促销，吸引用户进行购买。
