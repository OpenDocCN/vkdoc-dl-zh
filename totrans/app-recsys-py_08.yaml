  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 以下为输出结果。
- en: '[PRE41]'
  id: totrans-254
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: Random Forest
  id: totrans-255
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 随机森林
- en: Random forest is the most widely used machine learning algorithm because of
    its flexibility and ability to overcome the overfitting problem. A random forest
    is an ensemble algorithm that is an ensemble of multiple decision trees. The higher
    the number of trees, the better the accuracy.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 随机森林因其灵活性和克服过拟合问题的能力而成为最广泛使用的机器学习算法。随机森林是一个集成算法，由多个决策树组成。树的数量越多，准确性越好。
- en: The random forest can perform both classification and regression tasks. The
    following are some of its advantages.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 随机森林可以执行分类和回归任务。以下是其一些优点。
- en: It is insensitive to missing values and outliers.
  id: totrans-258
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它对缺失值和异常值不敏感。
- en: It prevents the algorithm from overfitting.
  id: totrans-259
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它防止算法过拟合。
- en: How does it work? It works on bagging and bootstrap sample techniques.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 它是如何工作的？它基于袋装和自助抽样技术。
- en: Randomly takes the square root of m features and 2/3 bootstrap data sample with
    a replacement for training each decision tree randomly and predicts the outcome
  id: totrans-261
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随机选取 m 个特征的平方根和 2/3 的带替换的自助数据样本，以随机训练每个决策树并预测结果。
- en: Builds n number of trees until the out-of-bag error rate is minimized and stabilized
  id: totrans-262
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构建数量为 n 的树，直到袋外错误率最小化并稳定。
- en: Computes the votes for each predicted target and considers the mode as a final
    prediction in terms of classification
  id: totrans-263
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算每个预测目标的投票数，并将众数视为分类的最终预测。
- en: Figure [8-25](#Fig25) shows the working of the random forest model.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [8-25](#Fig25) 显示了随机森林模型的工作原理。
- en: '![](../images/537881_1_En_8_Chapter/537881_1_En_8_Fig25_HTML.png)'
  id: totrans-265
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537881_1_En_8_Chapter/537881_1_En_8_Fig25_HTML.png)'
- en: A representation exhibits the function of the random forest. X is divided into
    three trees sub 1, 2, and 3\. k sub 1, 2, and 3 from trees sub 1, 2, and 3 goes
    under voting or averaging and that delivers out k.
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 一种表示展示了随机森林的功能。X 被分为三个子树 sub 1、2 和 3。从子树 sub 1、2 和 3 中选取 k 个子 1、2 和 3 进行投票或平均，从而得到
    k。
- en: Figure 8-25
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-25
- en: Random forest
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 随机森林
