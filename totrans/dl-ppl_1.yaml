- en: We construct the TensorFlow graph that helps us compute W and b. This is done
    in the function `linear_regression()`. In our formula *y* = *WX* + *b*; the *x*
    and *y* are nodes represented as TensorFlow placeholders.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE37]'
  prefs: []
  type: TYPE_PRE
- en: In the first argument of **tf.placeholder**, we define the data type as `float32` — a
    common data type in the placeholder. The second argument is the **shape** of the
    placeholder set to **None**, as we want it to be determined during training time.
    The third argument lets us set the **name** for the placeholder.
  prefs: []
  type: TYPE_NORMAL
- en: We now define our model by declaring `name_scope` as Model. This scope groups
    all the variables it contains in order to form a unique entity with homogeneous
    entities. In this scope, we first define a function that receives the variables
    of the x-axis coordinates, the weight, and the bias. Then we create a new variable,
    objects, to hold the changing parameters and instantiate the model with the `y_model`
    variable.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE38]'
  prefs: []
  type: TYPE_PRE
- en: In the **Cost Function**, we create a new scope to include all the operations
    of this group and use the previously created `y_model` to account for the calculated
    y-axis values that we use to calculate the loss.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE39]'
  prefs: []
  type: TYPE_PRE
- en: To define the chosen optimizer, we initialize `GradientDescentOptimizer`, and
    the step will be of 0.05, which seems like a reasonable start for convergence.
