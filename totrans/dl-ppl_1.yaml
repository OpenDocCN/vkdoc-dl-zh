- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now let’s do a brief recap about what we’ve seen and learned in this chapter.
    First we learned what deep learning is and about its approach, which is a subset
    of machine learning. We learned the basic function tools to build layers, which
    combine together to make a deep learning architecture. Finally, we went through
    the pipeline to give you a view about where the book will go, and what you will
    learn when you get into chapters that define it in detail. After finishing this
    chapter, we hope you found it valuable.
  prefs: []
  type: TYPE_NORMAL
- en: 4. Build Your First Toy TensorFlow app
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'In the previous chapter, we answered important questions you have to know before
    continuing reading the book, such as: *what is TensorFlow?*, *what makes it very
    valuable like this?*, and *is TensorFlow easy to learn?* All these questions come
    to your mind and many developers too, when you see a TensorFlow word, but yes,
    TensorFlow is a very valuable package in deep learning. However, there are many
    packages like it that are compatible with deep learning.'
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we continue introducing the important concepts you need in
    TensorFlow. We introduce the usage of TensorFlow in the field of deep learning,
    and how this library helps us a lot by giving us the necessary components and
    functions that represent the building blocks for any deep learning model. Also,
    we give you two small examples of how to build a tiny neural network with TensorFlow.
    So, let us get started.
  prefs: []
  type: TYPE_NORMAL
- en: Basic Development of TensorFlow
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let us consider another approach, teaching you all the needed TensorFlow functionalities
    by walking through examples. We will start by warming up, and then we will go
    to the hard parts bit by bit.
  prefs: []
  type: TYPE_NORMAL
- en: Hello World with TensorFlow
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To be fair enough, it’s good to understand TensorFlow by seeing a working example
    of it, so we will go through the advanced part of TensorFlow by giving it to you
    in small examples.
  prefs: []
  type: TYPE_NORMAL
- en: So, the first example is to warm up the information we gave you in *Chapter*
    [2](484548_1_En_2_Chapter.xhtml), we will build a small app that outputs the words
    “Hello, TensorFlow!”
  prefs: []
  type: TYPE_NORMAL
- en: As you see, we first import the `print_function` from the `__future__` module
    to make the `print` of Python 2 callable as the `print` function in Python 3\.
    After this, we of course have to import `TensorFlow` as `tf`, the popular alias
    we talked in a previous chapter. Then we initiate the `hello` variable that equals
    the `tf.constant`, and we set it to the word we need to print. Last, we create
    the session that we will use to run the whole program and we run it to print in
    the last line.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE25]'
  prefs: []
  type: TYPE_PRE
- en: 'So, when I first see this piece of code, I may have a question: *what is the*
    `tf.constant`*?* It is a good question, and `tf.constant` is one of many tensor
    type variables. But this one has an advantage, as indicated by its name: it cannot
    change its value through the runtime of the program. A constant has the following
    arguments, which can be tweaked as required to get the desired function.'
  prefs: []
  type: TYPE_NORMAL
- en: '`value`: A constant value (or list) of output type *dtype*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`dtype`: The type of the elements of the resulting tensor'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`shape`: Optional dimensions of the resulting tensor'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`name`: Optional name for the tensor'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Simple Iterations
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now we have warmed up with the previous example; what we saw in this example,
    we discussed in Chapter [2](484548_1_En_2_Chapter.xhtml) (constant, session).
  prefs: []
  type: TYPE_NORMAL
- en: So we need something new, and a bit harder; we need to see what more TensorFlow
    can do. We now have a session, constant, and variables.
  prefs: []
  type: TYPE_NORMAL
- en: In the next example, we learn to make loops in TensorFlow and make updates to
    certain variables. These variables simulate the model weights, and loops simulate
    the epochs that update the model weights.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE26]'
  prefs: []
  type: TYPE_PRE
- en: Note
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this code example we did not import the TensorFlow, as we assume that you
    imported it in the previous example and both are in the same Python session.
  prefs: []
  type: TYPE_NORMAL
- en: 'First things first: we created the `var` variable and initiated it with `tf.Variable`
    with 0 value, then we created the `add_operation` variable that is a TensorFlow
    addition block or operation. After that we initiated the `update_operation` with
    `tf.assign(var, add_operation)`, which simply updates the `var` variable by reference
    using the `add_operation` function, and all that happens when you call the `update_operation`
    variable.'
  prefs: []
  type: TYPE_NORMAL
- en: Now it’s time for creating the session, but if you noticed, we created the session
    within the `with` block. Why did we do that? The reason is that after initiating
    and running each session, we have to close it to free all the resources reserved
    by the program or by the TensorFlow graph. After that we ran the session `sess.run(tf.global_variables_initializer())`
    and you can see the weird `tf.global_variables_initializer()` function ; the main
    job of this function is to initialize all variables in the TensorFlow graph. So,
    if you run `tf.Variable` or `tf.Placeholder`—and we will see what it is later—you
    will see an error and that’s due to the uninitiated variables. And last, we do
    a simple loop that iterates and updates the `var` variable by running `update_operation`.
  prefs: []
  type: TYPE_NORMAL
- en: 'So, how does this simulate a real-world deep learning model? When you train
    a model, you use variables to hold and update parameters. Variables are in-memory
    buffers containing tensors. We know about tensors from Chapter [2](484548_1_En_2_Chapter.xhtml),
    so the question is: *is the tensor in the previous example a variable or constant?*
    It can’t be a constant type tensor, so we have to use `tf.Variable` because we
    need a form of tensors that can be updated in the runtime of our TensorFlow graph.'
  prefs: []
  type: TYPE_NORMAL
- en: Prepare the Input Data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Going a bit further, we need to simulate the input data for any model in TensorFlow.
    One may question how the user can enter any data to the model. We will make it
    harder; we will enter an image to TensorFlow. Using the `imread` command in **matplotlib**,
    we import a digital image in standard format colors (JPG, PNG, BMP, TIF):'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE27]'
  prefs: []
  type: TYPE_PRE
- en: 'However, we can see the rank and the shape of the tensor:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE28]'
  prefs: []
  type: TYPE_PRE
- en: 'You’ll see the output, which is `(220, 220, 3)`. This means the image is 220
    pixels high, 220 pixels wide, and 3 colors (red, green, blue) deep. Finally, using
    matplotlib, it is possible to visualize the imported image (Figure [4-1](#Fig1)):'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_4_Chapter/484548_1_En_4_Fig1_HTML.jpg](Images/484548_1_En_4_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4-1
  prefs: []
  type: TYPE_NORMAL
- en: The code output of the lena image
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE29]'
  prefs: []
  type: TYPE_PRE
- en: 'In this example, `slice` is a bidimensional segment of the starting image,
    where each pixel has the RGB components, so we need a placeholder to store all
    the values of the slice:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE30]'
  prefs: []
  type: TYPE_PRE
- en: 'For the last dimension, we’ll need only three values. Then we use the TensorFlow
    operator slice to create a subimage:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE31]'
  prefs: []
  type: TYPE_PRE
- en: 'The last step is to build a TensorFlow working session, an extra thing than
    the last example you saw. When we run the session, we need to feed it the placeholder
    we have (the data we have); we can do this by sending all the data to `feed_dict`,
    which will feed the input to the session (or your model perhaps):'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE32]'
  prefs: []
  type: TYPE_PRE
- en: '![../images/484548_1_En_4_Chapter/484548_1_En_4_Fig2_HTML.jpg](Images/484548_1_En_4_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4-2
  prefs: []
  type: TYPE_NORMAL
- en: The resulting shape is then as the image shows
  prefs: []
  type: TYPE_NORMAL
- en: To recap, we put a summary of the tf.Placeholder and tf.Variable in Table [4-1](#Tab1).
  prefs: []
  type: TYPE_NORMAL
- en: Table 4-1
  prefs: []
  type: TYPE_NORMAL
- en: A Comparison Between tf.Placeholder and tf.Variable
  prefs: []
  type: TYPE_NORMAL
- en: '| Placeholder | Variable |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| A placeholder is a node (same as a variable) whose value can be initialized
    in the future. These nodes basically output the value assigned to them during
    runtime. A placeholder node can be assigned using the tf.placeholder() class,
    to which you can provide arguments such as type of the variable and/or its shape.
    Placeholders are extensively used for representing the training dataset in a machine
    learning model, as the training dataset keeps changing. | A TensorFlow variable
    is the best way to represent a shared, persistent state manipulated by your program.
    Variables are manipulated via the tf.Variable class. Internally, a tf.Variable
    stores a persistent tensor. Specific operations allow you to read and modify the
    values of this tensor. These modifications are visible across multiple tf.Sessions,
    so multiple workers can see the same values for a tf.Variable. Variables must
    be initialized before using. |'
  prefs: []
  type: TYPE_TB
- en: '| **Examples** |'
  prefs: []
  type: TYPE_TB
- en: '| A = tf.placeholder(tf.float32, shape=(None, 3))B = A + 5 | x = tf.Variable(3,
    name=“x”)y = tf.Variable(4, name=“y”) f = x*x*y + y + 2 |'
  prefs: []
  type: TYPE_TB
- en: Doing the Gradients
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: TensorFlow has functions to solve other more complex tasks. For example, we
    will use a mathematical operator that calculates the derivative of *y* with respect
    to its expression *x* parameter. For this purpose, we use the `tf.gradients()`
    function .
  prefs: []
  type: TYPE_NORMAL
- en: 'Let us consider the math function *y* = 2*x*³. We want to compute the gradient
    ![$$ \frac{dx}{dy} $$](Images/484548_1_En_4_Chapter_TeX_IEq1.png) with respect
    to *x* = 1\. The following is the code to compute this gradient:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE33]'
  prefs: []
  type: TYPE_PRE
- en: So, what happens in the preceding code? Let us illustrate it step by step.
  prefs: []
  type: TYPE_NORMAL
- en: 'First, import the TensorFlow library: `import TensorFlow as tf`'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The x variable is the independent variable of the function: `x = tf.placeholder(tf.float32)`'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Let’s build the function: `y = 2*x*x`'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Finally, we call the `tf.gradients()` function with `y` and `x` as arguments:
    `grad = tf.gradients(y, x)`'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'To evaluate the gradient, we must build a session: `with tf.Session() as session:`'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The gradient will be evaluated on the variable x=1: `grad_val = session.run(var_grad,feed_dict={x:1})`'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The grad_val value is the feed result, to be printed: `print(grad_val)`'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'That gives the following result: `6.0`'
  prefs: []
  type: TYPE_NORMAL
- en: Linear Regression
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this section, we begin our exploration of machine learning techniques with
    the linear regression algorithm. Our goal is to build a model that is able to
    predict the values of a dependent variable from the values of one or more independent
    variables.
  prefs: []
  type: TYPE_NORMAL
- en: Why Linear Regression?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: It’s a basic machine learning algorithm. It’s very justifiable to start from
    there. First of all, it is a very plain algorithm, so the reader can grasp an
    understanding of fundamental machine learning concepts such as supervised learning,
    cost function, and gradient descent.
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, after learning linear regression, it is quite easy to understand
    the logistic regression algorithm, and believe it or not,  it is possible to categorize
    that one as a small neural network. It’s possible, yes; we can see it in the next
    chapters. In Part III we will see how neural networks work.
  prefs: []
  type: TYPE_NORMAL
- en: What Is Linear Regression?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Linear regression is a very common statistical method that allows us to learn
    a function or relationship from a given set of continuous data.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, we are given some data points of x and corresponding y, and we
    need to learn the relationship between them. That is called a hypothesis. The
    hypothesis is a statistical method that tries to predict the best model to fit
    the input data x. In the case of linear regression, the hypothesis is a straight
    line, as in the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ h(x)= wx+b $$](Images/484548_1_En_4_Chapter_TeX_Equa.png)'
  prefs: []
  type: TYPE_IMG
- en: We will now work on a project in which we will apply all the concepts we will
    discuss in the next chapters. In this example, we will create one approximately
    linear distribution; afterward, we will create a regression model that tries to
    fit a linear function that minimizes the error function (defined by least squares).
    This model will allow us to predict an outcome for an input value, given one new
    sample.
  prefs: []
  type: TYPE_NORMAL
- en: But before we start, let’s have a hint about datasets.
  prefs: []
  type: TYPE_NORMAL
- en: Dataset Description
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For this example, we will be generating a synthetic dataset consisting of a
    linear function with added noise.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s start with importing some packages:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE34]'
  prefs: []
  type: TYPE_PRE
- en: First, we see `matplotlib.pyplot as plt`. These packages are used for visualization
    methods, which we will talk about later. The third, `tensorflow`, is an open source
    software library for dataflow programming across a range of tasks, as discussed
    in previous chapters.
  prefs: []
  type: TYPE_NORMAL
- en: The second, `numpy`, is a package for mathematical combinations and multiplication,
    but we don’t need to talk about it in more detail now.
  prefs: []
  type: TYPE_NORMAL
- en: To begin, we start by generating our dataset, namely *x* and *y*. You can think
    of each value in *x* and *y* as points on the graph. We want NumPy to generate
    101 points with a value between (-1 and 1), spread evenly. The result is a NumPy
    array stored in `trX`. Similarly, we also want to randomly generate y such that
    it has a gradient of 2 (W) and some form of randomness using `np.random.randn()`
    . To make things interesting, we set y-intercept b to 0.2.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE35]'
  prefs: []
  type: TYPE_PRE
