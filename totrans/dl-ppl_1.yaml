- en: Summary
  id: totrans-268
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: 'In this chapter we started with a brief introduction to machine learning, then
    we introduced the backbone of the field—the three theories: information, probability,
    and decision. After that, we illustrated the evolution from machine learning to
    deep learning, and we gave you an introduction to the mathematical notation used
    in this book.'
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们首先对机器学习进行了简要介绍，然后介绍了该领域的核心——三个理论：信息、概率和决策。之后，我们阐述了从机器学习到深度学习的演变过程，并为您介绍了本书中使用的数学符号。
- en: 2. Setting Up Your Environment
  id: totrans-270
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2. 设置你的环境
- en: Now that the history and math lessons are out of the way, we must be fair and
    give you a dessert, so let’s now prepare for the upcoming dirty work by setting
    our environment.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 现在历史和数学课程已经结束，我们必须公平地给你一份甜点，所以现在让我们通过设置我们的环境来为即将到来的脏活做好准备。
- en: Most deep learning engineers have a development and research environment installed,
    ready to build and maintain deep learning models. But if you are new to this field,
    you may wonder about the best tool and programming language available to easily
    learn and effectively use to advance your career as a data scientist. We believe
    it’s Python and TensorFlow, so in this chapter we’ll be installing both.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数深度学习工程师都安装了开发和研究环境，准备构建和维护深度学习模型。但如果你是这一领域的新手，你可能想知道最适合学习和有效使用以提升数据科学家职业生涯的最佳工具和编程语言。我们相信是
    Python 和 TensorFlow，因此在本章中，我们将安装这两个工具。
- en: Background
  id: totrans-273
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 背景
- en: '**Python** is an interpreted high-level programming language for general-purpose
    programming. Created by Guido van Rossum and first released in 1991, Python has
    a design philosophy that emphasizes code readability, notably using significant
    whitespace. It provides constructs that enable clear programming on both small
    and large scales. Python has conquered the scientific community and taken the
    lead due to the huge data processing and analysis packages in it. Also, it allows
    the data scientist to make fast experiments, and easy development and deployment
    of scientific applications. Besides all these features, Python allows us to integrate
    scientific experiments to desktop or web applications.'
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: '**Python** 是一种用于通用编程的解释型高级编程语言。由吉多·范罗苏姆（Guido van Rossum）创建，并于1991年首次发布，Python的设计理念强调代码可读性，特别是使用重要的空白。它提供了能够在小规模和大规模上清晰编程的构造。Python凭借其内部庞大的数据处理和分析包征服了科学界，并引领了潮流。此外，它还允许数据科学家快速进行实验，并轻松开发和部署科学应用。除了所有这些特性之外，Python还允许我们将科学实验集成到桌面或Web应用中。'
- en: 'In addition to Python, there are other tools such as **R** and **MATLAB**,
    but what makes Python my favorite programming language is that it is open source
    with a huge community. Python completes your data scientist skills: it’s easier
    for development and deployment of applications to production.'
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 除了 Python 之外，还有其他工具，如 **R** 和 **MATLAB**，但使 Python 成为我的首选编程语言的原因是它是开源的，拥有庞大的社区。Python
    完善了数据科学家的技能：它使得应用的开发和部署到生产环境更加容易。
- en: Python 2 vs. Python 3
  id: totrans-276
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Python 2 与 Python 3
- en: '`wiki.python` `.org` goes into depth on the differences between Python 2.7
    and 3.3, saying that there are benefits to each. It really depends on what you
    are trying to achieve. But, in summation:'
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: '`wiki.python` `.org` 深入探讨了 Python 2.7 和 3.3 之间的差异，指出每个版本都有其优点。这完全取决于你想要实现的目标。但总的来说：'
- en: '*“Python 2.x is legacy, Python 3.x is the present and future of the language.”*'
  id: totrans-278
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*“Python 2.x 是遗留版本，Python 3.x 是语言的现在和未来。”*'
- en: There are subtle differences between the two. But the biggest difference is
    the print statement, taking the next phrase from Stack Overflow.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个工具之间有一些细微的差别。但最大的区别是打印语句，如Stack Overflow中的下一个短语所述。
- en: '*“The most visible (difference) is probably the way the “print” statement works.
    It''s different enough that the same script won''t be able to run on both versions
    at the same time, but pick one and you''ll be fine* *.”*'
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: '*“最明显的（区别）可能是“print”语句的工作方式。它足够不同，以至于相同的脚本不能同时在两个版本上运行，但选择一个版本，你就可以顺利运行了。”*'
- en: Installing Python
  id: totrans-281
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 安装Python
- en: 'Python is an open source, object-oriented and cross-platform programming language.
    When Python is compared with C++ or even Java as a competitor, Python wins the
    race due to several reasons:'
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: Python是一种开源的、面向对象和跨平台的编程语言。当Python与C++或Java等竞争对手进行比较时，Python由于以下几个原因赢得了比赛：
- en: Python allows you to build a working software prototype in a very short time.
  id: totrans-283
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Python允许你在非常短的时间内构建一个可工作的软件原型。
- en: Python is flexible, due to hundreds of packages that solve almost all of problems
    and fill most necessities.
  id: totrans-284
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Python非常灵活，因为有数百个包可以解决几乎所有问题并满足大多数需求。
- en: For those reasons, Python became the most used language in the data scientist’s
    toolbox (at least until we have written this book).
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这些原因，Python成为了数据科学家工具箱中最常用的语言（至少在我们写这本书的时候是这样）。
- en: So let us proceed to introduce all the settings you need in order to create
    the data science environment to run the examples and experiments provided with
    this book.
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，让我们继续介绍创建数据科学环境所需的全部设置，以便运行本书提供的示例和实验。
- en: Novice data scientists who have never used Python (who likely don’t have the
    language readily installed on their machines) need to download the installer from
    the main website of the project first ([`https://python.org/downloads/`](https://python.org/downloads/))
    and then install it on their local machine.
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 对于从未使用过Python的新手数据科学家（他们可能没有在他们的机器上安装该语言）来说，他们首先需要从项目的主网站下载安装程序（[`https://python.org/downloads/`](https://python.org/downloads/））然后在他们的本地机器上安装它。
- en: 'Remember that some of the latest versions of most Linux distributions (such
    as *CentOS*, *Fedora*, *Red Hat Enterprise*, *Ubuntu*, and some other minor ones)
    have Python 2 packaged in the repository. In such a case, and in case you already
    have a Python version on your computer (since our examples run on Python 3), you
    first have to check exactly what version you are running. To do such a check,
    just follow these instructions:'
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，大多数Linux发行版的最新版本（例如 *CentOS*、*Fedora*、*Red Hat Enterprise*、*Ubuntu* 以及一些较小的版本）在仓库中包含了Python
    2。在这种情况下，如果你已经在你的计算机上安装了Python版本（因为我们的示例是在Python 3上运行的），你首先需要检查你正在运行的确切版本。要进行这样的检查，请遵循以下说明：
- en: Open a Python shell, type python in the terminal, or click on any Python icon
    you find on your system.
  id: totrans-289
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 打开Python shell，在终端中输入python，或者点击你在系统上找到的任何Python图标。
- en: 'Then, after having Python started, test the installation by running the following
    code in the Python interactive shell or REPL:'
  id: totrans-290
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然后，在启动Python之后，通过在Python交互式shell或REPL中运行以下代码来测试安装：
- en: If you can read that your Python version has the major=2 attribute, it means
    that you are running a Python 2 instance. Otherwise, if the attribute is major=3,
    or if the print statement reports back to you something like v3.x.x (for instance
    v3.5.1), you are running the right version of Python and you are ready to move
    forward.
  id: totrans-291
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你看到你的Python版本有 major=2 属性，这意味着你正在运行一个Python 2实例。否则，如果属性是 major=3，或者打印语句回显给你类似
    v3.x.x（例如 v3.5.1）的信息，那么你正在运行正确的Python版本，你可以继续前进。
- en: '[PRE0]'
  id: totrans-292
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Note
  id: totrans-293
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: '*REPL* stands for *read-eval-print loop*—a simple environment that takes a
    user’s commands as an input line in a shell and outputs the result of the line
    by printing it.'
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: '*REPL* 代表 *read-eval-print loop*——一个简单的环境，它将用户的命令作为shell中的输入行，并通过打印结果来输出。'
- en: Python Packages
  id: totrans-295
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Python包
- en: 'Python won’t come bundled with all you need, unless you take a specific premade
    distribution. Therefore, to install the packages you need, you can use either
    `pip` (you can install pip by following instructions here) or `easy_install`.
    Both of these tools run in the command line and make the process of installation,
    upgrade, and removal of Python packages a breeze. To check which tools have been
    installed on your local machine, run the following command:'
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 除非你选择特定的预装发行版，否则Python不会包含你所需的一切。因此，为了安装所需的包，你可以使用 `pip`（你可以通过遵循这里的说明来安装pip）或
    `easy_install`。这两个工具都在命令行中运行，使得Python包的安装、升级和删除过程变得非常简单。要检查你的本地机器上安装了哪些工具，请运行以下命令：
- en: '[PRE1]'
  id: totrans-297
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: In most cases in this book, you will see packages installed using pip.
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书的大多数情况下，你将看到使用 pip 安装的包。
- en: Note
  id: totrans-299
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: You might find that *pip* is in your system as `pip3` and `easy_install` as
    `easy_install-3`, to stress the fact that both operate on packages for Python
    3\. For insurance, check the version `$> pip --version` for pip or `$> easy_install
    --version` for easy_install.
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会发现 *pip* 在你的系统中作为 `pip3`，而 `easy_install` 作为 `easy_install-3`，以强调两者都操作 Python
    3 的包。为了保险起见，检查 pip 的版本 `$> pip --version` 或 `easy_install` 的版本 `$> easy_install
    --version`。
- en: After this, you can install any Python package easily, and all its dependencies
    will be downloaded and installed. If you are not sure if the package is in your
    system or not, try to use it by importing it. If the Python interpreter raises
    an ImportError message, then you can be certain that the package has not been
    installed.
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，你可以轻松地安装任何 Python 包，以及所有其依赖项都将被下载并安装。如果你不确定该包是否已安装在你的系统中，尝试通过导入它来使用它。如果 Python
    解释器抛出 ImportError 信息，那么你可以确定该包尚未安装。
- en: 'This is what happens when the NumPy library has been installed:'
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 当 NumPy 库已安装时，会发生以下情况：
- en: '[PRE2]'
  id: totrans-303
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'This happens if it’s not installed:'
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 如果未安装，则会发生以下情况：
- en: '[PRE3]'
  id: totrans-305
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'In this case you should install NumPy by running the following command in your
    terminal:'
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，你应该在终端中运行以下命令来安装 NumPy：
- en: '[PRE4]'
  id: totrans-307
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: IPython
  id: totrans-308
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: IPython
- en: IPython (Interactive Python) is a command shell—like REPL but has a nicer interface—for
    interactive computing in multiple programming languages. Originally developed
    for the Python programming language, it offers introspection, rich media, shell
    syntax, tab completion, and history.
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: IPython（交互式 Python）是一个命令壳——类似于 REPL 但具有更友好的界面——用于多种编程语言的交互式计算。最初是为 Python 编程语言开发的，它提供了内省、丰富的媒体、shell
    语法、自动补全和历史记录。
- en: 'IPython provides the following features:'
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: IPython 提供以下功能：
- en: Interactive shells (terminal and Qt-based)
  id: totrans-311
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 交互式壳（终端和基于 Qt 的）
- en: A browser-based notebook interface with support for code, text, mathematical
    expressions, inline plots, and other media
  id: totrans-312
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于浏览器的笔记本界面，支持代码、文本、数学表达式、内联绘图和其他媒体
- en: Support for interactive data visualization and use of GUI toolkits
  id: totrans-313
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 支持交互式数据可视化和使用 GUI 工具包
- en: Flexible , embeddable interpreters to load into one’s own projects
  id: totrans-314
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 灵活、可嵌入的解释器，可加载到自己的项目中
- en: Tools for parallel computing
  id: totrans-315
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 并行计算工具
- en: Installing IPython
  id: totrans-316
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 安装 IPython
- en: 'You can install IPython (Figure [2-1](#Fig1)) using the following command line:'
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以使用以下命令行安装 IPython（图 [2-1](#Fig1)）：
- en: '[PRE5]'
  id: totrans-318
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'After finishing the installation, you can run IPython using this command:'
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 安装完成后，你可以使用以下命令运行 IPython：
- en: '[PRE6]'
  id: totrans-320
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Note
  id: totrans-321
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: You might find that you have to run `ipython3` instead of running just `ipython`,
    because *ipython3* is made for Python 3.
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会发现你必须运行 `ipython3` 而不是仅仅运行 `ipython`，因为 *ipython3* 是为 Python 3 制作的。
- en: 'When you run your code lines in an IPython shell, you will find that the code
    is written in a line that starts with `In[1]`. This means that the shell is writing
    your input in line 1, and the output is written with the same syntax except it
    starts with `Out[1]`, for example:'
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在 IPython 壳中运行代码行时，你会发现代码是写在以 `In[1]` 开头的一行。这意味着壳正在将你的输入写入第 1 行，输出以相同的语法写入，但以
    `Out[1]` 开头，例如：
- en: '![../images/484548_1_En_2_Chapter/484548_1_En_2_Fig1_HTML.jpg](Images/484548_1_En_2_Fig1_HTML.jpg)'
  id: totrans-324
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_2_Chapter/484548_1_En_2_Fig1_HTML.jpg](Images/484548_1_En_2_Fig1_HTML.jpg)'
- en: Figure 2-1
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-1
- en: What IPython looks like
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: IPython 的外观
- en: Jupyter
  id: totrans-327
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Jupyter
- en: As a data scientist or machine learning engineer, experimentation is the work
    approach, so fast experimentation is required. That’s why **IPython** was created,
    but it was limited to Python programming language only until **Jupyter** was created
    in 2015 by Fernando Perez, in order to address the need for an interactive command
    shell for several languages. This new project extends the potential usability
    of the original IPython interface to a wide range of programming languages, such
    as
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 作为数据科学家或机器学习工程师，实验是工作方法，因此需要快速实验。这就是为什么创建 **IPython** 的原因，但它仅限于 Python 编程语言，直到
    2015 年由 Fernando Perez 创建 **Jupyter**，以解决需要为多种语言提供交互式命令壳的需求。这个新项目将原始 IPython 界面的潜在可用性扩展到广泛的编程语言，例如
- en: Julia
  id: totrans-329
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Julia
- en: Scala
  id: totrans-330
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Scala
- en: R
  id: totrans-331
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: R
- en: For a more complete list of available kernels for Jupyter, please visit the
    page here [`https://github.com/jupyter/jupyter/wiki/Jupyter-kernels`](https://github.com/jupyter/jupyter/wiki/Jupyter-kernels).
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 要获取 Jupyter 可用内核的完整列表，请访问此处页面 [`https://github.com/jupyter/jupyter/wiki/Jupyter-kernels`](https://github.com/jupyter/jupyter/wiki/Jupyter-kernels)。
- en: Note
  id: totrans-333
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: You cannot mix or run the same notebook commands for different kernels; each
    notebook only refers to a single kernel, that is, the one it was initially created
    with. Consequently, on the same notebook you cannot mix languages or even versions
    of the same language like Python2 and Python3.
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 你不能混合或运行不同内核的相同笔记本命令；每个笔记本只引用一个内核，即它最初创建时使用的内核。因此，在同一个笔记本中，你不能混合语言，甚至不能混合同一语言的版本，如Python2和Python3。
- en: Jupyter Notebook is built off of IPython, an interactive way of running Python
    code in the terminal using the **REPL** model (Read-Eval-Print-Loop). The IPython
    kernel runs the computations and communicates with the Jupyter Notebook front-end
    interface.
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: Jupyter Notebook建立在IPython之上，这是一种在终端中使用**REPL**模型（读取-评估-打印-循环）运行Python代码的交互式方式。IPython内核执行计算并与Jupyter
    Notebook前端界面进行通信。
- en: Thanks to the great idea of kernels, which run the user’s code communicated
    by the web-based front-end interface and provide an output of the input code to
    the interface itself, you can use the same interface and interactive programming
    style no matter what language you are using for development.
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 多亏了内核的伟大想法，这些内核通过基于Web的前端界面与用户代码进行通信，并将输入代码的输出提供给界面本身，无论你使用什么语言进行开发，你都可以使用相同的界面和交互式编程风格。
- en: Note
  id: totrans-337
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: Without the IPython kernel, Jupyter will not even function, even if you have
    installed another kernel and linked it.
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 没有IPython内核，即使你安装了另一个内核并将其链接，Jupyter也无法运行。
- en: Jupyter is our favored choice throughout this book, and it is used to clearly
    and effectively illustrate operations with scripts and data and the consequent
    results.
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 在整本书中，我们首选Jupyter，它被用来清晰地有效地说明脚本和数据操作及其结果。
- en: Regular IDEs are built around the cycle of
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 常规的集成开发环境（IDE）是围绕以下周期构建的：
- en: Writing a script
  id: totrans-341
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 编写脚本
- en: Running it afterward
  id: totrans-342
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 运行之后
- en: Evaluating its results
  id: totrans-343
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 评估其结果
- en: Contrary to regular IDEs, Jupyter lets you write your code in chunks, named
    cells; run each of them sequentially; and evaluate the results of each one separately,
    examining both textual and graphic outputs—an advantage of this method.
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 与常规IDE不同，Jupyter允许你以块的形式编写代码，称为单元格；依次运行每个单元格；并单独评估每个单元格的结果，检查文本和图形输出——这是这种方法的优势。
- en: You can run a selected cell, and got an output from it.
  id: totrans-345
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以运行选定的单元格，并从中获取输出。
- en: If a certain cell got an error or exception, other cells saves their outputs
    instead of running the whole script from start.
  id: totrans-346
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果某个单元格出现错误或异常，其他单元格会保存它们的输出，而不是从头开始运行整个脚本。
- en: Such an approach is also particularly very good for tasks involving developing
    code based on data—like point 2 in the preceding list—since it automatically accomplishes
    the often neglected duty of documenting and illustrating how data analysis has
    been done, its premises and assumptions, and its intermediate and final results.
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法对于涉及基于数据开发代码的任务尤其非常好——就像前面列表中的第2点——因为它自动完成了通常被忽视的记录和说明数据分析如何进行、其前提和假设以及中间和最终结果的职责。
- en: If a part of your job is to also present your work to an internal or external
    stakeholder in the project, Jupyter can really do the job of storytelling without
    any effort.
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的工作的一部分也是向项目内部或外部的利益相关者展示你的工作，Jupyter可以轻松地完成讲故事的工作。
- en: Users can easily combine code, comments, formulas, charts, interactive plots,
    and media such as images and videos, making each Jupyter Notebook a scientific
    sketchpad to find all your experimentations and their results.
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 用户可以轻松地将代码、注释、公式、图表、交互式图表以及图像和视频等媒体结合起来，使每个Jupyter Notebook成为一个科学速写本，用于记录所有实验及其结果。
- en: Jupyter runs on all browser (such as Explorer, Firefox, or Chrome, for instance)
    and, when started, presents a cell waiting for code to be written in. Each block
    of code enclosed in a cell can be run, and its results are reported in the space
    just after the cell. Plots can be represented in the Notebook (inline plot) or
    in a separate window. In our example, we decided to plot our chart inline.
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: Jupyter在所有浏览器（例如，Internet Explorer、Firefox或Chrome等）上运行，启动时显示一个等待编写代码的单元格。每个单元格中封装的代码块都可以运行，其结果在单元格之后的空间中报告。图表可以在笔记本中（内联图表）或单独的窗口中显示。在我们的例子中，我们决定内联显示我们的图表。
- en: Installing Jupyter
  id: totrans-351
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 安装Jupyter
- en: You can find complete instructions about Jupyter installation—covering all operating
    systems—here ([`https://jupyter.readthedocs.io/en/latest/install.html`](https://jupyter.readthedocs.io/en/latest/install.html)).
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在这里找到关于Jupyter安装的完整说明——涵盖所有操作系统——[`https://jupyter.readthedocs.io/en/latest/install.html`](https://jupyter.readthedocs.io/en/latest/install.html)。
- en: 'If you do not have Jupyter installed on your system, you can promptly set it
    up using this command:'
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有在你的系统上安装 Jupyter，你可以使用以下命令立即设置它：
- en: '[PRE7]'
  id: totrans-354
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: After installation, you can run a Jupyter kernel by calling it from the command
    line
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: 安装后，你可以通过在命令行中调用它来运行 Jupyter 内核。
- en: '[PRE8]'
  id: totrans-356
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Once the Jupyter instance has opened in the browser, you can see this page (Figure
    [2-2](#Fig2)).
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦在浏览器中打开了 Jupyter 实例，你将看到这个页面（图 [2-2](#Fig2)）。
- en: '![../images/484548_1_En_2_Chapter/484548_1_En_2_Fig2_HTML.jpg](Images/484548_1_En_2_Fig2_HTML.jpg)'
  id: totrans-358
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_2_Chapter/484548_1_En_2_Fig2_HTML.jpg](Images/484548_1_En_2_Fig2_HTML.jpg)'
- en: Figure 2-2
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-2
- en: The Jupyter Notebook tree file
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: Jupyter Notebook 树文件
- en: 'This is the tree page of Jupyter that you can build and control Jupyter Notebooks
    from. You can see the following in Figure [2-2](#Fig2):'
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 这是 Jupyter 的树状页面，你可以从这里构建和控制 Jupyter Notebook。你可以在图 [2-2](#Fig2) 中看到以下内容：
- en: There are two notebooks in this folder.
  id: totrans-362
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这个文件夹中有两个笔记本。
- en: The notebook with the Green colored icon is running in the kernel right now.
  id: totrans-363
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 带有绿色图标的笔记本目前正在内核中运行。
- en: The notebook with the black colored icon is shut down.
  id: totrans-364
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 带有黑色图标的本子已经关闭。
- en: There is Upload button that lets you upload all type of files here (if you are
    running Jupyter on a remote server).
  id: totrans-365
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这里有一个上传按钮，允许你上传所有类型的文件（如果你在远程服务器上运行 Jupyter）。
- en: With the New button you can create new notebooks or empty files or even can
    open a terminal.
  id: totrans-366
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用新建按钮，你可以创建新的笔记本或空文件，甚至可以打开一个终端。
- en: Note
  id: totrans-367
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: The tree page of *Jupyter* can only see the directory where the command was
    executed.
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: Jupyter 的树页面只能看到执行命令的目录。
- en: Now click on the New button; in the Notebooks section, choose Python 3 (other
    kernels may be present in the section, depending on what you installed).
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 现在点击新建按钮；在笔记本部分，选择 Python 3（该部分可能还有其他内核，取决于你安装了什么）。
- en: You can also create a *Text File*, *Folder*, or open a *Terminal* (Figure [2-3](#Fig3)).
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以创建 *文本文件*、*文件夹* 或打开 *终端*（图 [2-3](#Fig3)）。
- en: '![../images/484548_1_En_2_Chapter/484548_1_En_2_Fig3_HTML.jpg](Images/484548_1_En_2_Fig3_HTML.jpg)'
  id: totrans-371
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_2_Chapter/484548_1_En_2_Fig3_HTML.jpg](Images/484548_1_En_2_Fig3_HTML.jpg)'
- en: Figure 2-3
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-3
- en: How to create a new file, folder, or even a terminal
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 如何创建新文件、文件夹，甚至终端
- en: At this point your new empty notebook will look like the next screenshot (Figure
    [2-4](#Fig4)), and you can start entering the commands in the cells. For instance,
    you may start by typing in the cell.
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一点上，你的新空笔记本将看起来像下一个截图（图 [2-4](#Fig4)），你可以在单元格中开始输入命令。例如，你可能从在单元格中输入开始。
- en: '![../images/484548_1_En_2_Chapter/484548_1_En_2_Fig4_HTML.jpg](Images/484548_1_En_2_Fig4_HTML.jpg)'
  id: totrans-375
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_2_Chapter/484548_1_En_2_Fig4_HTML.jpg](Images/484548_1_En_2_Fig4_HTML.jpg)'
- en: Figure 2-4
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-4
- en: The Jupyter Notebook file
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: Jupyter Notebook 文件
- en: After creating a Jupyter Notebook (and that is an achievement by the way), we
    need to make sure that you understand some concepts about the file you have created.
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: 创建 Jupyter Notebook（顺便说一句，这是一个成就）后，我们需要确保你理解一些关于你创建的文件的概念。
- en: What Is an ipynb File?
  id: totrans-379
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: ipynb 文件是什么？
- en: It will be useful to understand what this file really is.
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 理解这个文件真正是什么会有所帮助。
- en: Each *.ipynb* file is a text file that describes the contents of your Notebook
    in a format called JSON. Each cell and its contents, including image attachments
    that have been converted into strings of text, is listed therein along with some
    metadata. You can edit this yourself—if you know what you are doing—by selecting
    **Edit ➤ Edit Notebook Metadata** from the menu bar in the Notebook.
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 每个 *.ipynb* 文件都是一个文本文件，它以 JSON 格式描述了笔记本的内容。每个单元格及其内容，包括已转换为文本字符串的图像附件，以及一些元数据都被列在其中。如果你知道自己在做什么，你可以通过从笔记本菜单栏中选择
    **编辑 ➤ 编辑笔记本元数据**来自行编辑。
- en: 'There are two terms that you should notice, which may be new to you: **cells**
    and **kernels** are key both to understanding *Jupyter* and to what makes it more
    than just a word processor.'
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 有两个术语你应该注意，这些可能对你来说是新的：**单元格**和**内核**对于理解 *Jupyter* 以及它为何不仅仅是一个文字处理器至关重要。
- en: A kernel is a “computational engine” that executes the code contained in a Notebook
    file.
  id: totrans-383
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 内核是一个“计算引擎”，它执行笔记本文件中包含的代码。
- en: A cell is a container for text to be displayed in the notebook or code chunk
    to be executed by the Notebook’s kernel.
  id: totrans-384
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 单元格是笔记本中用于显示文本或由笔记本内核执行代码块的容器。
- en: 'Cells form the body of a Notebook. In the screenshot in Figure [2-5](#Fig5),
    that box with the green outline is an empty cell. There are two main cell types:'
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 单元格构成了笔记本的主体。在图 [2-5](#Fig5) 的截图中，那个带有绿色轮廓的框是一个空单元格。主要有两种单元格类型：
- en: '![../images/484548_1_En_2_Chapter/484548_1_En_2_Fig5_HTML.jpg](Images/484548_1_En_2_Fig5_HTML.jpg)'
  id: totrans-386
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_2_Chapter/484548_1_En_2_Fig5_HTML.jpg](Images/484548_1_En_2_Fig5_HTML.jpg)'
- en: Figure 2-5
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-5
- en: A selected, green cell
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 一个选中的绿色单元格
- en: A code cell contains code chunks to be executed in the kernel and displays its
    output below.
  id: totrans-389
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代码单元格包含要在内核中执行的代码块，并在其下方显示输出。
- en: Note
  id: totrans-390
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: The first cell in a new notebook by default is always a code cell.
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 默认情况下，新笔记本的第一个单元格始终是一个代码单元格。
- en: '![../images/484548_1_En_2_Chapter/484548_1_En_2_Fig6_HTML.jpg](Images/484548_1_En_2_Fig6_HTML.jpg)'
  id: totrans-392
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_2_Chapter/484548_1_En_2_Fig6_HTML.jpg](Images/484548_1_En_2_Fig6_HTML.jpg)'
- en: Figure 2-6
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-6
- en: Writing a simple Python command
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 编写简单的Python命令
- en: A **Markdown** cell contains text formatted using Markdown and displays its
    output in place when it is run (Figure [2-6](#Fig6)).
  id: totrans-395
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个**Markdown**单元格包含使用Markdown格式化的文本，并在运行时显示其输出（图[2-6](#Fig6)）。
- en: So, click the Notebook *Run* button in the toolbar or press Ctrl + Enter.
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，点击工具栏中的“笔记本运行”按钮或按Ctrl + Enter键。
- en: '![../images/484548_1_En_2_Chapter/484548_1_En_2_Fig7_HTML.jpg](Images/484548_1_En_2_Fig7_HTML.jpg)'
  id: totrans-397
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_2_Chapter/484548_1_En_2_Fig7_HTML.jpg](Images/484548_1_En_2_Fig7_HTML.jpg)'
- en: Figure 2-7
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-7
- en: The output of the first Python command
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个Python命令的输出
- en: The result should look like Figure [2-7](#Fig7).
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: 结果应如图[2-7](#Fig7)所示。
- en: Moreover, written notes can be written easily using Markdownm an effortless
    and fast-to-grasp markup language ([`https://daringfireball.net/projects/markdown/`](https://daringfireball.net/projects/markdown/)).
    Math formulas can be handled using MathJax ([`www.mathjax.org/`](http://www.mathjax.org/))
    to render any LaTeX script inside HTML/Markdown. Its syntax has a one-to-one correspondence
    with HTML tags, so some prior knowledge here would be helpful but is definitely
    not a prerequisite.
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，使用Markdown可以轻松地编写笔记，Markdown是一种简单易学、快速掌握的标记语言（[`https://daringfireball.net/projects/markdown/`](https://daringfireball.net/projects/markdown/)）。可以使用MathJax（[`www.mathjax.org/`](http://www.mathjax.org/））处理数学公式，以在HTML/Markdown中渲染任何LaTeX脚本。其语法与HTML标签一一对应，因此在这里有一些先验知识会有所帮助，但绝对不是先决条件。
- en: There are many ways to write a LaTex code in a cell. The easiest way is to use
    the Markdown syntax simply, wrapping the equations with single $ (dollar sign)
    for an inline LaTeX formula, or with a double dollar sign $$ for a one-line central
    equation. Remember that to have a correct output, the cell should be set as Markdown.
    Here’s an example (Figure [2-8](#Fig8)).
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: 在单元格中编写LaTeX代码有许多方法。最简单的方法是使用Markdown语法，将方程用单个$（美元符号）括起来以创建内联LaTeX公式，或者用双美元符号$$括起来以创建一行居中的方程。请记住，为了得到正确的输出，单元格应设置为Markdown。这里有一个例子（图[2-8](#Fig8)）。
- en: '![../images/484548_1_En_2_Chapter/484548_1_En_2_Fig8_HTML.jpg](Images/484548_1_En_2_Fig8_HTML.jpg)'
  id: totrans-403
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_2_Chapter/484548_1_En_2_Fig8_HTML.jpg](Images/484548_1_En_2_Fig8_HTML.jpg)'
- en: Figure 2-8
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-8
- en: A simple markdown command
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 一个简单的Markdown命令
- en: Packages Used in the Book
  id: totrans-406
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 书中使用的包
- en: All the packages that we are going to introduce now are strongly analytical,
    and used a lot in data science and machine learning projects. All these packages
    are made up of extensively tested and highly optimized functions for both memory
    usage and performance, ready to achieve any scripting operation with successful
    execution. A walkthrough on how to install them is provided in the following section.
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将要介绍的所有包都具有强烈的分析性，并且在数据科学和机器学习项目中使用得很多。所有这些包都由经过广泛测试和高度优化的函数组成，这些函数针对内存使用和性能进行了优化，可以成功执行任何脚本操作。以下章节提供了如何安装它们的说明。
- en: NumPy
  id: totrans-408
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: NumPy
- en: '**NumPy** stands for (Numerical Python), which is Travis Oliphant''s creation,
    and is the analytical backbone of the Python programming language. It provides
    multidimensional arrays, along with a large set of functions to operate a multiplicity
    of mathematical operations on these arrays. Arrays are blocks of data arranged
    along multiple dimensions, which implement mathematical vectors and matrices.
    Characterized by optimal memory allocation, arrays are useful not just for storing
    data, but also for fast matrix operations (vectorization).'
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: '**NumPy**代表（数值Python），这是Travis Oliphant的创造，是Python编程语言的解析骨干。它提供了多维数组，以及一大套函数来对这些数组执行多种数学运算。数组是沿着多个维度排列的数据块，实现了数学向量矩阵。以最优内存分配为特点，数组不仅用于存储数据，还用于快速矩阵运算（向量化）。'
- en: 'Website: [`www.numpy.org/`](http://www.numpy.org/)'
  id: totrans-410
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 网站：[`www.numpy.org/`](http://www.numpy.org/)
- en: 'Installation command: `pip install numpy`'
  id: totrans-411
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安装命令：`pip install numpy`
- en: 'Preferred alias of importing: `import numpy as np`'
  id: totrans-412
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 导入的首选别名：`import numpy as np`
- en: SciPy
  id: totrans-413
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: SciPy
- en: '**SciPy** (pronounced “Sigh Pie”) is open source software for mathematics,
    science, and engineering. The SciPy library depends on NumPy, an original project
    by Travis Oliphant, Pearu Peterson, and Eric Jones. SciPy completes NumPy’s functionalities,
    offering a larger variety of scientific algorithms for linear algebra, sparse
    matrices, signal and image processing, optimization, Fourier transformation, and
    much more.'
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: '**SciPy**（发音为“Sigh Pie”）是用于数学、科学和工程的开源软件。SciPy库依赖于NumPy，这是Travis Oliphant、Pearu
    Peterson和Eric Jones的原始项目。SciPy扩展了NumPy的功能，提供了更多种类的科学算法，包括线性代数、稀疏矩阵、信号和图像处理、优化、傅里叶变换等。'
- en: 'Website: [`www.scipy.org/`](http://www.scipy.org/)'
  id: totrans-415
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 网站：[`www.scipy.org/`](http://www.scipy.org/)
- en: 'Installation command: `pip install scipy`'
  id: totrans-416
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安装命令：`pip install scipy`
- en: 'Preferred alias of importing: `import scipy as sp`'
  id: totrans-417
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 导入的推荐别名：`import scipy as sp`
- en: Pandas
  id: totrans-418
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Pandas
- en: '**Pandas** deals with everything that NumPy and SciPy cannot do. Thanks to
    its specific data structures, namely *DataFrames* and *Series*, pandas allows
    you to handle complex tables of data of different types (which is something that
    NumPy arrays cannot do) and time series. Thanks to Wes McKinney’s creation, you
    will be able to easily and smoothly load data from a variety of sources. You can
    then slice, dice, handle missing elements, add, rename, aggregate, reshape, and
    finally visualize your data at will.'
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: '**Pandas**处理NumPy和SciPy无法处理的所有事情。多亏了其特定的数据结构，即*DataFrames*和*Series*，pandas允许您处理不同类型的数据的复杂表格，以及时间序列。多亏了Wes
    McKinney的创造，您将能够轻松、平滑地从各种来源加载数据。然后您可以随意切片、切块、处理缺失元素、添加、重命名、聚合、重塑，并最终可视化您的数据。'
- en: 'Website: [`https://pandas.pydata.org/`](https://pandas.pydata.org/)'
  id: totrans-420
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 网站：[`https://pandas.pydata.org/`](https://pandas.pydata.org/)
- en: 'Installation command: `pip install pandas`'
  id: totrans-421
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安装命令：`pip install pandas`
- en: 'Prefered alias of importing: `import pandas as pd`'
  id: totrans-422
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 导入的推荐别名：`import pandas as pd`
- en: Matplotlib
  id: totrans-423
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Matplotlib
- en: '**Matplotlib** is a Python 2-D plotting library that produces publication quality
    figures in a variety of hard copy formats and interactive environments across
    platforms. Originally developed by John Hunter, matplotlib contains all components
    that are required to create quality plots from data and to visualize them interactively.'
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: '**Matplotlib**是一个Python 2-D绘图库，可以在多种硬拷贝格式和跨平台的交互式环境中生成高质量的图形。最初由John Hunter开发，matplotlib包含创建高质量图形和交互式可视化的所有必需组件。'
- en: For simple plotting the *pyplot* module provides a MATLAB-like interface, particularly
    when combined with IPython. For the power user, you have full control of line
    styles, font properties, axes properties, etc, via an object-oriented interface
    or via a set of functions familiar to MATLAB users.
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: 对于简单的绘图，*pyplot*模块提供了一个类似MATLAB的界面，尤其是在与IPython结合使用时。对于高级用户，您可以通过面向对象的界面或通过一组MATLAB用户熟悉的函数，完全控制线条样式、字体属性、坐标轴属性等。
- en: 'Website: [`https://matplotlib.org/`](https://matplotlib.org/)'
  id: totrans-426
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 网站：[`https://matplotlib.org/`](https://matplotlib.org/)
- en: 'Installation command: `pip install matplotlib`'
  id: totrans-427
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安装命令：`pip install matplotlib`
- en: 'Preferred alias of importing: `import matplotlib.pyplot as plt`'
  id: totrans-428
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 导入的推荐别名：`import matplotlib.pyplot as plt`
- en: Note
  id: totrans-429
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: This importing is for visualization purposes, because matplotlib contains components
    used for many purposes other than data visualization.
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: 这种导入是为了可视化目的，因为matplotlib包含用于许多目的的组件，而不仅仅是数据可视化。
- en: NLTK
  id: totrans-431
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: NLTK
- en: '**NLTK** is a leading platform for building Python programs to work with human
    language data. It provides easy-to-use interfaces to more than 50 corpora and
    lexical resources. NLTK stands for **Natural Language Toolkit**, and it provides
    a complete suite of functions for statistical natural language processing (NLP),
    starting from *tokenizers* to *part-of-speech taggers* and from *tree models*
    to *named-entity recognition*. Initially, Steven Bird and Edward Loper created
    the package as an NLP teaching infrastructure for their course at the University
    of Pennsylvania.'
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: '**NLTK**是构建Python程序以处理人类语言数据的领先平台。它提供了对超过50个语料库和词汇资源的易于使用的接口。NLTK代表**自然语言工具包**，它提供了一套完整的函数，用于统计自然语言处理（NLP），从*分词器*到*词性标注器*，从*树模型*到*命名实体识别*。最初，Steven
    Bird和Edward Loper创建了这个包，作为他们在宾夕法尼亚大学课程中的NLP教学基础设施。'
- en: 'Website: [`www.nltk.org/`](http://www.nltk.org/)'
  id: totrans-433
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 网站：[`www.nltk.org/`](http://www.nltk.org/)
- en: 'Installation command: `pip install nltk`'
  id: totrans-434
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安装命令：`pip install nltk`
- en: 'Preferred alias of importing: `import nltk`'
  id: totrans-435
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 导入的推荐别名：`import nltk`
- en: Scikit-learn
  id: totrans-436
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Scikit-learn
- en: The **Scikit-learn** project started as scikits.learn, a Google Summer of Code
    project by David Cournapeau. Its name stems from the notion that it is a “SciKit”
    (SciPy Toolkit), a separately developed and distributed third-party extension
    to SciPy.
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: '**Scikit-learn** 项目最初是由 David Cournapeau 的 Google Summer of Code 项目 scikits.learn
    启动的。其名称来源于它是一个“SciKit”（SciPy 工具包），是一个独立开发和分发的第三方扩展，用于 SciPy。'
- en: Scikit-learn is the core of machine learning and data science operations on
    Python. It offers all that you need, such as data preprocessing, supervised and
    unsupervised learning, model selection, validation, and error metrics.
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: Scikit-learn 是 Python 机器学习和数据科学操作的核心。它提供了你所需要的一切，如数据预处理、监督学习和无监督学习、模型选择、验证和错误度量。
- en: 'Website: [`http://scikit-learn.org/`](http://scikit-learn.org/)'
  id: totrans-439
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 网站：[`http://scikit-learn.org/`](http://scikit-learn.org/)
- en: 'Installation command: `pip install scikit-learn`'
  id: totrans-440
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安装命令：`pip install scikit-learn`
- en: 'Preferred alias of importing: `import sklearn`'
  id: totrans-441
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 导入的首选别名：`import sklearn`
- en: Gensim
  id: totrans-442
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Gensim
- en: '**Gensim** was created by *Radim* Řehůřek, and it is a robust open source vector
    space modeling and topic modeling toolkit implemented in Python. It uses NumPy,
    SciPy, and optionally Cython for performance. Gensim is specifically designed
    to handle large text collections, using data streaming and efficient incremental
    algorithms, which differentiates it from most other scientific software packages
    that only target batch and in-memory processing. It implements latent semantic
    analysis (LSA), topic modeling by latent Dirichlet allocation (LDA), and Google’s
    word2vec, a powerful algorithm that transforms text into vector features.'
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: '**Gensim** 由 *Radim* Řehůřek 创建，是一个健壮的开源向量空间建模和主题建模工具包，用 Python 实现。它使用 NumPy、SciPy，并且可选地使用
    Cython 来提高性能。Gensim 特别设计用于处理大型文本集合，使用数据流和高效的增量算法，这使得它与大多数其他仅针对批处理和内存处理的科学软件包不同。它实现了潜在语义分析（LSA）、潜在狄利克雷分配（LDA）主题建模和谷歌的
    word2vec，这是一种将文本转换为向量特征的有力算法。'
- en: 'Website: [`https://radimrehurek.com/gensim/`](https://radimrehurek.com/gensim/)'
  id: totrans-444
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 网站：[`https://radimrehurek.com/gensim/`](https://radimrehurek.com/gensim/)
- en: 'Installation command: `pip install gensim`'
  id: totrans-445
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安装命令：`pip install gensim`
- en: 'Preferred alias of importing: `import` `gensim`'
  id: totrans-446
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 导入的首选别名：`import gensim`
- en: TensorFlow
  id: totrans-447
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: TensorFlow
- en: '**TensorFlow** is an open source software library for dataflow programming
    across a range of tasks. It is a symbolic math library, and is also used for machine
    learning applications such as neural networks. It is used for both research and
    production at Google. TensorFlow was developed by the Google Brain team for internal
    Google use. It was released under the Apache 2.0 open source license on November
    9, 2015.'
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
  zh: '**TensorFlow** 是一个用于跨各种任务的数据流编程的开源软件库。它是一个符号数学库，也用于机器学习应用，如神经网络。它被用于谷歌的研究和生产。TensorFlow
    由谷歌大脑团队为谷歌内部使用而开发。它于 2015 年 11 月 9 日以 Apache 2.0 开源许可证发布。'
- en: 'Website: [`www.tensorflow.org/`](http://www.tensorflow.org/)'
  id: totrans-449
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 网站：[`www.tensorflow.org/`](http://www.tensorflow.org/)
- en: 'Installation Command: `pip install tensorflow`'
  id: totrans-450
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安装命令：`pip install tensorflow`
- en: 'Preferred alias of importing: `import tensorflow as tf`'
  id: totrans-451
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 导入的首选别名：`import tensorflow as tf`
- en: Installing on Mac or Linux distributions
  id: totrans-452
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 在 Mac 或 Linux 发行版上安装
- en: 'The following are the steps to install TensorFlow on Mac and Linux systems:'
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是在 Mac 和 Linux 系统上安装 TensorFlow 的步骤：
- en: 'First, install pip and virtualenv (optional) if they are not already installed:'
  id: totrans-454
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 首先，如果尚未安装，请安装 pip 和 virtualenv（可选）：
- en: 'For Ubuntu/Linux 64-bit:'
  id: totrans-455
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于 Ubuntu/Linux 64 位：
- en: '[PRE9]'
  id: totrans-456
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'For Mac OS X:'
  id: totrans-457
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于 Mac OS X：
- en: '[PRE10]'
  id: totrans-458
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'Then you can create a virtual environment virtualenv. The following commands
    create a virtual environment virtualenv in the `~/tensorflow` directory:'
  id: totrans-459
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后，你可以创建一个虚拟环境 virtualenv。以下命令在 `~/tensorflow` 目录中创建一个名为 virtualenv 的虚拟环境：
- en: '`$ virtualenv --system-site-packages ~/tensorflow`'
  id: totrans-460
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '`$ virtualenv --system-site-packages ~/tensorflow`'
- en: 'The next step is to activate virtualenv as follows:'
  id: totrans-461
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 下一步是按照以下方式激活 virtualenv：
- en: '[PRE11]'
  id: totrans-462
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Henceforth , the name of the environment we’re working in precedes the command
    line. Once activated, pip is used to install TensorFlow within it.
  id: totrans-463
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从此以后，我们工作的环境名称将位于命令行之前。一旦激活，pip 就会用于在其中安装 TensorFlow。
- en: 'For Ubuntu/Linux 64-bit, CPU:'
  id: totrans-464
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于 Ubuntu/Linux 64 位，CPU：
- en: '[PRE12]'
  id: totrans-465
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'For Mac OS X, CPU:'
  id: totrans-466
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于 Mac OS X，CPU：
- en: '[PRE13]'
  id: totrans-467
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE13]'
- en: If you want to use your GPU card with TensorFlow, then install another package.
    I recommend you visit the official documentation to see if your GPU meets the
    specifications required to support TensorFlow.
  id: totrans-468
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 如果你想使用你的 GPU 卡与 TensorFlow 一起使用，那么请安装另一个包。我建议你访问官方文档，看看你的 GPU 是否满足支持 TensorFlow
    所需的规格。
- en: 'Finally , when you’ve finished, you must disable the virtual environment:'
  id: totrans-469
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最后，当您完成安装后，您必须禁用虚拟环境：
- en: '[PRE14]'
  id: totrans-470
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Installing on Windows
  id: totrans-471
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 在Windows上安装
- en: If you can’t get a Linux-based system, you can install Ubuntu on a virtual machine;
    just use a free application called VirtualBox, which lets you create a virtual
    PC on Windows and install Ubuntu in the latter. So, you can try the operating
    system without creating partitions or dealing with cumbersome procedures.
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您无法获得基于Linux的系统，您可以在虚拟机上安装Ubuntu；只需使用一个名为VirtualBox的免费应用程序，它允许您在Windows上创建虚拟PC并在其中安装Ubuntu。因此，您可以在不创建分区或处理繁琐的程序的情况下尝试操作系统。
- en: Keras
  id: totrans-473
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Keras
- en: '**Keras** is an open source neural network library written in Python. It is
    capable of running on top of TensorFlow, Microsoft Cognitive Toolkit, or Theano.
    Designed to enable fast experimentation with deep neural networks, it focuses
    on being user friendly, modular, and extensible.'
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: '**Keras** 是一个用Python编写的开源神经网络库。它能够在TensorFlow、Microsoft Cognitive Toolkit或Theano之上运行。它旨在使深度神经网络实验快速进行，它注重用户友好、模块化和可扩展性。'
- en: It was developed as part of the research effort of project ONEIROS (Open-ended
    Neuro-Electronic Intelligent Robot Operating System), and its primary author and
    maintainer is François Chollet, a Google engineer.
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
  zh: 它是作为项目ONEIROS（开放式神经电子智能机器人操作系统）研究工作的一部分开发的，其主要作者和维护者是谷歌工程师弗朗索瓦·肖莱特（François
    Chollet）。
- en: 'Website: [`https://keras.io/`](https://keras.io/)'
  id: totrans-476
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 网站：[`https://keras.io/`](https://keras.io/)
- en: 'Installation command: `pip install keras`'
  id: totrans-477
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安装命令：`pip install keras`
- en: 'Preferred alias of importing: `import keras`'
  id: totrans-478
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 导入的首选别名：`import keras`
- en: Summary
  id: totrans-479
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter we discussed the whole environment, installation, and preparation
    of Python; we also discussed how to install every package that will be used in
    the book from NumPy to TensorFlow. We illustrated the IDE you will use to develop
    and maintain the code for the exercises, and how to use it for both coding and
    documenting.
  id: totrans-480
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们讨论了整个环境、Python的安装和准备；我们还讨论了如何从NumPy到TensorFlow安装本书中将要使用的每个包。我们展示了您将用于开发和维护练习代码的IDE，以及如何用它进行编码和文档编写。
- en: In Chapter [3](484548_1_En_3_Chapter.xhtml) we will give a nice tour through
    the deep learning pipeline, introducing the pipeline step-by-step and also the
    deep learning approaches. We will get into some practicality with an introduction
    to TensorFlow.
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
  zh: 在第[3](484548_1_En_3_Chapter.xhtml)章中，我们将对深度学习管道进行一次愉快的游览，逐步介绍管道的步骤以及深度学习方法。我们将通过介绍TensorFlow来探讨一些实用性内容。
- en: 3. A Tour Through the Deep Learning Pipeline
  id: totrans-482
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 3. 深度学习管道之旅
- en: In Chapter [1](484548_1_En_1_Chapter.xhtml), we saw an introduction to the deep
    learning field, to the theories that are the basis of the field. We also discussed
    the evolution of deep learning and the needed mathematical notation to succeed
    while reading the book, and we showed you how to install the environment needed
    for the projects in this book.
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
  zh: 在第[1](484548_1_En_1_Chapter.xhtml)章中，我们看到了深度学习领域的介绍，以及该领域的基础理论。我们还讨论了深度学习的演变以及阅读本书时所需的数学符号，并展示了如何安装本书项目中需要的环境。
- en: In this chapter, we will start with the “flavors” of deep learning, the approaches
    of it, and different types of neural networks. Next, we will introduce the big
    picture of the deep learning pipeline; we also will go through the steps of the
    pipeline in detail. And as always, we will break things up with some technicality,
    by introducing TensorFlow; we will cover basic recipes in order to understand
    how TensorFlow works and how to access data for this book and additional resources.
  id: totrans-484
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将从深度学习的“风味”和其方法，以及不同类型的神经网络开始。接下来，我们将介绍深度学习管道的整体图景；我们还将详细讲解管道的步骤。一如既往地，我们将通过介绍TensorFlow来引入一些技术性内容，我们将涵盖基本配方，以便理解TensorFlow的工作原理以及如何访问本书和额外资源中的数据。
- en: Deep Learning Approaches
  id: totrans-485
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 深度学习方法
- en: This deep learning introduction considers how the pioneers in this field got
    their intuition to make neural networks, fundamental to deep learning. When we
    talk about something, we want to know where it comes from or how it will work.
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: 这本深度学习入门考虑了该领域先驱者如何获得构建神经网络的本能，神经网络是深度学习的基础。当我们谈论某事时，我们想知道它的来源或它将如何工作。
- en: This will guide us to learn some biologics. From this point, we will get into
    neural networks and how they get the data; extract the data; and push the data
    to the model, which should understand the data through the three learning approaches
    we talked about in Chapter [1](484548_1_En_1_Chapter.xhtml) (supervised, unsupervised,
    and semisupervised).
  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
  zh: 这将引导我们学习一些生物学知识。从这一点开始，我们将进入神经网络以及它们如何获取数据；提取数据；并将数据推送到模型，该模型应该通过我们在第[1](484548_1_En_1_Chapter.xhtml)章中讨论的三个学习方法（监督学习、无监督学习和半监督学习）来理解数据。
- en: What Is Deep Learning
  id: totrans-488
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 深度学习是什么
- en: As we mentioned before in Chapter [1](484548_1_En_1_Chapter.xhtml) when we discussed
    what deep learning is, we talked about types of deep learning, using either shallow
    or deep neural networks. We said that deep learning is basically neural; that
    we got the idea from the biological neural networks in our brain. So let us see
    how our brains work.
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: 如同我们在第[1](484548_1_En_1_Chapter.xhtml)章中提到的，当我们讨论深度学习是什么时，我们提到了深度学习的类型，使用浅层或深层神经网络。我们说深度学习基本上是神经的；我们是从我们大脑中的生物神经网络中得到这个想法的。那么，让我们看看我们的大脑是如何工作的。
- en: Biological Deep Learning
  id: totrans-490
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 生物深度学习
- en: To understand how neural networks work and where they come from, we need to
    mention neurons. There are some questions you might ask yourself, such as *in
    human brains how does data go from our eyes and we then recognize it and then
    say some words that seem to make sense?* A neuron is the basic unit in our brain
    that has all of this information (Figure [3-1](#Fig1)). The neuron is also the
    basic unit of computation in a neural network, often called a *node* or *unit*.
  id: totrans-491
  prefs: []
  type: TYPE_NORMAL
  zh: 要了解神经网络是如何工作的以及它们的来源，我们需要提到神经元。你可能自己会问一些问题，比如*在人类大脑中，数据是如何从我们的眼睛进入，然后我们识别它，然后说出一些似乎有意义的词语的？*
    神经元是我们大脑中的基本单位，它拥有所有这些信息（图[3-1](#Fig1)）。神经元也是神经网络中的基本计算单位，通常称为*节点*或*单元*。
- en: 'Mathematically speaking, a neuron receives input from some other nodes or from
    an external source and computes an output. Each *input* has an associated *weight*
    (w) and *bias* (b), which is assigned on the basis of its relative importance
    to other inputs. The node applies a function to the weighted sum of its inputs.
    The idea is that the synaptic strengths (the weights w) are learnable and control
    the strength of influence and its direction: excitatory (positive weight) or inhibitory
    (negative weight) of one neuron on another. In the basic model, the dendrites
    carry the signal to the cell body, where they all get summed. If the final sum
    is above a certain threshold, the neuron can fire, sending a spike along its axon.
    In the computational model, we assume that the precise timings of the spikes do
    not matter and that only the frequency of the firing communicates information.
    We model the firing rate of the neuron with an activation function (for instance,
    *sigmoid function*), which represents the frequency of the spikes along the axon.
    As we see that the representation of neutrals in our brains is most common to
    our neural which we will talk about it but let us see Figure [3-1](#Fig1).'
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
  zh: 从数学的角度来说，一个神经元从一些其他节点或外部来源接收输入并计算输出。每个*输入*都有一个相关的*权重*（w）和*偏置*（b），这是根据其相对于其他输入的相对重要性来分配的。节点对其输入的加权和应用一个函数。这个想法是，突触强度（权重w）是可学习的，并控制影响强度及其方向：一个神经元对另一个神经元的兴奋（正权重）或抑制（负权重）。在基本模型中，树突将信号传递到细胞体，在那里它们都被加总。如果最终的总和超过某个阈值，神经元就可以放电，沿着其轴突发送一个尖峰。在计算模型中，我们假设尖峰的确切时间不重要，只有放电频率传达信息。我们用激活函数（例如，*S形函数*）来模拟神经元的放电率，它表示轴突上尖峰的频率。正如我们所见，我们大脑中中性的表示与我们自己的神经网络最为常见，我们将会谈到这一点，但让我们先看看图[3-1](#Fig1)。
- en: '![../images/484548_1_En_3_Chapter/484548_1_En_3_Fig2_HTML.jpg](Images/484548_1_En_3_Fig2_HTML.jpg)'
  id: totrans-493
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_3_Chapter/484548_1_En_3_Fig2_HTML.jpg](Images/484548_1_En_3_Fig2_HTML.jpg)'
- en: Figure 3-2
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-2
- en: A machine neuron
  id: totrans-495
  prefs: []
  type: TYPE_NORMAL
  zh: 机器神经元
- en: '![../images/484548_1_En_3_Chapter/484548_1_En_3_Fig1_HTML.jpg](Images/484548_1_En_3_Fig1_HTML.jpg)'
  id: totrans-496
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_3_Chapter/484548_1_En_3_Fig1_HTML.jpg](Images/484548_1_En_3_Fig1_HTML.jpg)'
- en: Figure 3-1
  id: totrans-497
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-1
- en: A human neuron
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
  zh: 人类神经元
- en: 'However, the question is: *is an* *artificial neural network (ANN)* *similar
    to our brain’s neural net?* I think the answer is “not”; ANNs don’t work like
    our brain. An ANN is a simple crude comparison; the connections between biological
    networks are much more complex than those implemented by an ANN. But let us again
    try to define a neural network. As we define it again, we can say that:'
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，问题是：*人工神经网络（ANN）是否与我们的大脑神经网络相似？* 我认为答案是“不”；ANNs的工作方式与我们的大脑不同。ANN是一个简单的粗略比较；生物网络之间的连接比ANN实现的要复杂得多。但让我们再次尝试定义神经网络。当我们再次定义它时，我们可以这样说：
- en: '*The neural network* *is made of neurons (Figure* [*3-2*](#Fig2)*). Biologically
    the neurons are connected through synapses and our neural network is connected
    together by something like synapses or the representation of them (edges), where
    information flows (weights for out computational model). When we train a neural
    network, we want the neurons to fire whenever they learn specific patterns from
    the data, and we model the firing rate using an activation function.*'
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: '*神经网络*由神经元组成（图[*3-2*](#Fig2)*）。从生物学的角度来看，神经元通过突触连接，我们的神经网络通过类似突触或其表示（边）连接在一起，信息在其中流动（对于我们的计算模型，权重）。当我们训练神经网络时，我们希望神经元在从数据中学习特定模式时能够激活，我们使用激活函数来模拟激活率。'
- en: Let’s get through this definition. We say that the neuron is the basic unit
    of computation in a neural network. A machine neuron is a representation of a
    human neuron; it receives input from some other nodes, or from an external source,
    and computes an output. Each input has an associated **weight**(w), which is assigned
    on the basis of its relative importance to other inputs. The node applies a function
    **f** (defined in the following) to the weighted sum of its inputs, as shown in
    Figure [3-3](#Fig3).
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过这个定义来理解。我们说，神经元是神经网络中的基本计算单元。机器神经元是人的神经元的表示；它从其他节点或外部来源接收输入，并计算输出。每个输入都有一个相关的**权重**（w），它是根据其相对于其他输入的重要性分配的。节点将其输入的加权和应用于定义在以下函数**f**（如图[3-3](#Fig3)所示）。
- en: '![../images/484548_1_En_3_Chapter/484548_1_En_3_Fig3_HTML.png](Images/484548_1_En_3_Fig3_HTML.png)'
  id: totrans-502
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_3_Chapter/484548_1_En_3_Fig3_HTML.png](Images/484548_1_En_3_Fig3_HTML.png)'
- en: Figure 3-3
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-3
- en: How a neuron acts
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: 神经元的行为
- en: 'So, we now know how a neuron in an ANN works, and its architecture. If you
    have any problem with math notation, you can review mathematical notation sheet
    in chapter one. We have a new question: *is a neuron a perceptron?* Let’s see
    what perceptron is and get the connection between these two concepts. The perceptron
    is a linear classifier (binary, and by binary we mean that a single perceptron
    will output either a 0 or 1 label). Also, it is used in supervised learning. It
    helps to classify the given input data. So, let’s see some characteristics of
    the perceptron:'
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们现在知道了人工神经网络（ANN）中神经元的工作原理及其架构。如果你对数学符号有任何问题，可以在第一章中回顾数学符号表。我们有一个新的问题：*神经元是感知器吗？*
    让我们看看感知器是什么，并了解这两个概念之间的联系。感知器是一种线性分类器（二分类，我们这里所说的二分类是指单个感知器将输出0或1标签）。此外，它用于监督学习。它有助于对给定的输入数据进行分类。那么，让我们看看感知器的以下特性：
- en: Input values or one input layer
  id: totrans-506
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入值或一个输入层
- en: Weights and bias
  id: totrans-507
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 权重和偏置
- en: Net sum
  id: totrans-508
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 网络总和
- en: Activation function
  id: totrans-509
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 激活函数
- en: 'This is actually what a neuron has: it has *X* as *Input* examples or observations
    or input layer, *W* as *Weights, b* as *Bias*, and sum, and *a* as Activation
    function.'
  id: totrans-510
  prefs: []
  type: TYPE_NORMAL
  zh: 这实际上就是一个神经元所具有的：它有*X*作为*输入*示例或观察或输入层，*W*作为*权重，b*作为*偏置*，总和，以及*激活函数*。
- en: So we can conclude that *perceptron* is *neuron*, so let’s move forward into
    the neural network. The neural network isn’t the only perceptron, but it contains
    many concepts like layers. What are layers? A layer is a group of perceptrons
    or neurons. But how does it work, and what are the types of layers? A layer is
    changed by the concept or the algorithm. This will be discussed further and you
    will see these concepts, but the basic definitions of layers are
  id: totrans-511
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们可以得出结论，*感知器*是*神经元*，那么让我们继续深入到神经网络。神经网络不仅仅是感知器，它还包含许多概念，如层。什么是层？层是一组感知器或神经元。但是它是如何工作的，层的类型有哪些？层是通过概念或算法来改变的。这将在后面进一步讨论，你将看到这些概念，但层的基本定义是
- en: '*Input nodes (input layer)*: No computation is done here within this layer;
    they just pass the information to the next layer (hidden layer most of the time).
    A block of nodes is also called a layer.'
  id: totrans-512
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*输入节点（输入层）*：在这个层内不进行任何计算；它们只是将信息传递到下一层（通常是隐藏层）。节点块也称为层。'
- en: '*Hidden nodes (hidden layer)*: In hidden layers is where intermediate processing
    or computation is done; they perform computations and then transfer weights (signals
    or information) from the input layer to the following layer (another hidden layer
    or to the output layer). It is possible to have a neural network without a hidden
    layer, and we’ll explain this later.'
  id: totrans-513
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*隐藏节点（隐藏层）*：在隐藏层中进行中间处理或计算；它们执行计算并将权重（信号或信息）从输入层传输到下一层（另一个隐藏层或输出层）。可能存在没有隐藏层的神经网络，我们稍后会解释这一点。'
- en: '*Output nodes (output layer)*: Here, we finally use an activation function
    that maps to the desired output format (e.g., Softmax for classification).'
  id: totrans-514
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*输出节点（输出层）*：在这里，我们最终使用一个将映射到所需输出格式的激活函数（例如，用于分类的Softmax）。'
- en: What Are Neural Networks Architectures?
  id: totrans-515
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 神经网络架构是什么？
- en: 'We see the main three functions of layers in the neural network (input layer,
    hidden layer, output layer), but that can be changed through the concepts or the
    architectures of the neural network. It seems some layers may have only one perceptron,
    or many perceptrons connected together, or layers that we can’t see how they work.
    We need to have a lot of complex mathematical equations and combinations and it’s
    difficult to accurately get how these hidden layers work. Let’s see some examples
    of the architectures:'
  id: totrans-516
  prefs: []
  type: TYPE_NORMAL
  zh: 我们看到神经网络中层的三个主要功能（输入层、隐藏层、输出层），但可以通过神经网络的原理或架构进行更改。似乎某些层可能只有一个感知器，或者许多感知器连接在一起，或者我们无法了解其工作方式的层。我们需要很多复杂的数学方程和组合，很难准确地了解这些隐藏层是如何工作的。让我们看看一些架构的例子：
- en: '*Single-layer perceptron* . This is the simplest feedforward neural network
    and does not contain any hidden layer, which means it only consists of a single
    layer of output nodes. This is said to be single because when we count the layers
    we do not include the input layer. The reason for that is because at the input
    layer no computations are done; the inputs are fed directly to the outputs via
    a series of weights. Let us discuss the multilayer perceptron first and then talk
    about the feedforward neural network.'
  id: totrans-517
  prefs: []
  type: TYPE_NORMAL
  zh: '*单层感知器*。这是最简单的前馈神经网络，不包含任何隐藏层，这意味着它只包含一个输出节点层。之所以称为单层，是因为当我们计算层数时，不包括输入层。原因是输入层不执行任何计算；输入通过一系列权重直接馈送到输出。让我们先讨论多层感知器，然后再讨论前馈神经网络。'
- en: '![../images/484548_1_En_3_Chapter/484548_1_En_3_Fig4_HTML.jpg](Images/484548_1_En_3_Fig4_HTML.jpg)'
  id: totrans-518
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_3_Chapter/484548_1_En_3_Fig4_HTML.jpg](Images/484548_1_En_3_Fig4_HTML.jpg)'
- en: Figure 3-4
  id: totrans-519
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-4
- en: Neuron inputs, weights, and outputs
  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
  zh: 神经元的输入、权重和输出
- en: '*Multilayer perceptron (MLP).* This class of networks consists of multiple
    layers (input layer, hidden layer or layers) of computational units, usually interconnected
    in a feedforward way. Each neuron in one layer has direct connections to the neurons
    of the subsequent layer. While a single layer perceptron can only learn linear
    functions, a multilayer perceptron can also learn nonlinear functions.'
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
  zh: '*多层感知器 (MLP)*。这一类网络由多个计算单元层（输入层、隐藏层或层）组成，通常以前馈方式相互连接。一个层的每个神经元都与下一层的神经元有直接连接。虽然单层感知器只能学习线性函数，但多层感知器也可以学习非线性函数。'
- en: '*Input layer*: The input layer has three nodes. The bias node has a value of
    1\. The other two nodes take *X*[1] and *X*[2] as external inputs (which are numerical
    values depending upon the input dataset). As discussed, no computation is performed
    in the input layer, so the outputs from nodes in the input layer are 1, *X*[1],
    and *X*[2], respectively, which are fed into the hidden Layer.'
  id: totrans-522
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*输入层*：输入层有三个节点。偏置节点具有值为1。其他两个节点接受 *X*[1] 和 *X*[2] 作为外部输入（这些是依赖于输入数据集的数值）。如前所述，输入层不执行任何计算，因此输入层节点的输出分别是1、*X*[1]
    和 *X*[2]，这些被馈送到隐藏层。'
- en: '*Hidden layer*: The hidden layer also has three nodes, with the bias node having
    an output value of 1\. The output of the other two nodes in the hidden layer depends
    on the outputs from the input layer (1, *X*[1], and *X*[2]) as well as the weights
    associated with the connections (edges). Figure [3-4](#Fig4) shows the output
    calculation for one of the hidden nodes (highlighted). Similarly, the output from
    another hidden node can be calculated. Remember that f refers to the activation
    function. These outputs are then fed to the nodes in the output layer. So, what
    is a feedforward neural network?'
  id: totrans-523
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*隐藏层*：隐藏层也有三个节点，其中偏置节点输出值为1。隐藏层中其他两个节点的输出取决于输入层的输出（1, *X*[1]，和 *X*[2]）以及与连接（边）相关的权重。图[3-4](#Fig4)显示了其中一个隐藏节点的输出计算（突出显示）。同样，另一个隐藏节点的输出也可以计算。请记住，f指的是激活函数。这些输出随后被输入到输出层的节点。那么，什么是前馈神经网络呢？'
- en: '![../images/484548_1_En_3_Chapter/484548_1_En_3_Fig5_HTML.jpg](Images/484548_1_En_3_Fig5_HTML.jpg)'
  id: totrans-524
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/484548_1_En_3_Chapter/484548_1_En_3_Fig5_HTML.jpg](Images/484548_1_En_3_Fig5_HTML.jpg)'
- en: Figure 3-5
  id: totrans-525
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图3-5
- en: A feedforward neural network
  id: totrans-526
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 前馈神经网络
- en: '*Feedforward neural network* (Figure [3-5](#Fig5)). Let’s start with the specific
    regions first, which is the basic builder of our algorithm. The feedforward neural
    network was the first and simplest type of ANN devised. It contains multiple neurons
    (nodes) arranged in layers. Nodes from adjacent layers have connections or edges
    between them. All these connections have weights associated with them. In a feedforward
    network, the information moves in only one direction—forward—from the input nodes,
    through the hidden nodes (if any), and to the output nodes. There are no cycles
    or loops in the network, and it has two types (single-layer perceptron, multilayer
    perceptron). Let’s have a look at Figure [3-6](#Fig6) to see how it works and
    explain it in a good way.'
  id: totrans-527
  prefs: []
  type: TYPE_NORMAL
  zh: '*前馈神经网络*（图[3-5](#Fig5)）。让我们先从具体的区域开始，这是我们算法的基本构建块。前馈神经网络是第一个也是最简单的人工神经网络类型。它包含多个按层排列的神经元（节点）。相邻层的节点之间有连接或边。所有这些连接都与权重相关联。在前馈网络中，信息仅在一个方向上移动——从输入节点，通过隐藏节点（如果有），到输出节点。网络中没有循环或回路，它有两种类型（单层感知器，多层感知器）。让我们看看图[3-6](#Fig6)，了解它是如何工作的，并对其进行良好解释。'
- en: '![../images/484548_1_En_3_Chapter/484548_1_En_3_Fig6_HTML.jpg](Images/484548_1_En_3_Fig6_HTML.jpg)'
  id: totrans-528
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_3_Chapter/484548_1_En_3_Fig6_HTML.jpg](Images/484548_1_En_3_Fig6_HTML.jpg)'
- en: Figure 3-6
  id: totrans-529
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-6
- en: The difference between input, hidden, and output layers
  id: totrans-530
  prefs: []
  type: TYPE_NORMAL
  zh: 输入层、隐藏层和输出层之间的区别
- en: 'A feedforward neural network can consist of three types of nodes:'
  id: totrans-531
  prefs: []
  type: TYPE_NORMAL
  zh: 前馈神经网络可以由三种类型的节点组成：
- en: '*Input nodes*: The input nodes provide information from the outside world to
    the network, and are together referred to as the “input layer.” No computation
    is performed in any of the input nodes—they just pass on the information to the
    hidden nodes.'
  id: totrans-532
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*输入节点*：输入节点从外部世界向网络提供信息，并统称为“输入层”。输入节点中不执行任何计算——它们只是将信息传递给隐藏节点。'
- en: '*Hidden nodes*: The hidden nodes have no direct connection with the outside
    world (hence the name “hidden”). They perform computations and transfer information
    from the input nodes to the output nodes. A collection of hidden nodes forms a
    “hidden layer.” While a feedforward network will only have a single input layer
    and a single output layer, it can have zero or multiple hidden layers.'
  id: totrans-533
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*隐藏节点*：隐藏节点与外部世界没有直接连接（因此得名“隐藏”）。它们执行计算并将信息从输入节点传输到输出节点。一组隐藏节点构成一个“隐藏层”。虽然前馈网络可能只有一个输入层和一个输出层，但它可以有零个或多个隐藏层。'
- en: '*Output nodes*: The output nodes are collectively referred to as the “output
    layer” and are responsible for computations and transferring information from
    the network to the outside world.'
  id: totrans-534
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*输出节点*：输出节点统称为“输出层”，负责计算并将信息从网络传输到外部世界。'
- en: '*Feedforward neural networks are primarily used* *for supervised learning in
    cases where the data to be learned is neither sequential nor time dependent.*'
  id: totrans-535
  prefs: []
  type: TYPE_NORMAL
  zh: '*前馈神经网络主要用于* *监督学习，在这些情况下，要学习的数据既不是序列的也不是时间相关的。*'
- en: So we now know a lot about the one-direction neural network which is called
    a feedforward neural network, but we have many types of neural network architectures
    to talk about. We will discuss them in detail later in Part IV. We have **convolutional
    neural network**, **recurrent neural network**, and **self-organizing map (SOM)**.
    These are the types of neural network that can be used in any approach in deep
    learning—or machine learning (supervised, unsupervised, semisupervised, and reinforcement
    learning), as we say that deep learning is a subset of machine learning. Let’s
    look at these layers architectures.
  id: totrans-536
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们现在对单向神经网络，即前馈神经网络有了很多了解，但我们还有许多类型的神经网络架构要讨论。我们将在第四部分详细讨论它们。我们有**卷积神经网络**、**循环神经网络**和**自组织映射（SOM）**。这些是可以在深度学习（或机器学习，包括监督学习、无监督学习、半监督学习和强化学习）的任何方法中使用的神经网络类型。正如我们所说，深度学习是机器学习的一个子集。让我们看看这些层架构。
- en: First, we will talk about convolutional neural networks (CNNs). CNNs (Figure
    [3-7](#Fig7)) are very similar to ordinary neural networks; they are made up of
    neurons that have learnable weights and biases. In a convolutional neural network
    (CNN, or ConvNet, or shift invariant or space invariant) the unit connectivity
    pattern is inspired by the organization of the visual cortex. Units respond to
    stimuli in a restricted region of space known as the receptive field. Receptive
    fields partially overlap, over-covering the entire visual field. The unit response
    can be approximated mathematically by a convolution operation. They are variations
    of multilayer perceptrons that use minimal preprocessing. Their wide applications
    are in image and video recognition, recommender systems, and natural language
    processing. CNNs require large data to train on.
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们将讨论卷积神经网络（CNNs）。CNNs（图 [3-7](#Fig7)）与普通神经网络非常相似；它们由具有可学习权重和偏差的神经元组成。在卷积神经网络（CNN，或
    ConvNet，或位移不变或空间不变）中，单元连接模式受到视觉皮层组织的启发。单元对称为感受野的有限空间区域内的刺激做出反应。感受野部分重叠，覆盖整个视觉场。单元响应可以通过卷积运算进行数学近似。它们是多层感知器的变体，使用最少的预处理。它们在图像和视频识别、推荐系统和自然语言处理等领域有广泛的应用。CNNs
    需要大量数据来训练。
- en: Second, we will talk about recurrent neural networks (RNNs). In an RNN, connections
    between units form a directed cycle (they propagate data forward, but also backward,
    from later processing stages to earlier stages). This allows it to exhibit dynamic
    temporal behavior. Unlike feedforward neural networks, RNNs can use their internal
    memory to process arbitrary sequences of inputs. This makes them applicable to
    tasks such as unsegmented, connected handwriting recognition, speech recognition,
    and other general sequence processors.
  id: totrans-538
  prefs: []
  type: TYPE_NORMAL
  zh: 第二，我们将讨论循环神经网络（RNNs）。在 RNN 中，单元之间的连接形成一个有向循环（它们从前向传播数据，同时也向后传播，从后续处理阶段到早期阶段）。这使得它能够表现出动态的时间行为。与前馈神经网络不同，RNNs
    可以使用它们的内部记忆来处理任意序列的输入。这使得它们适用于诸如无分割、连续手写识别、语音识别和其他通用序列处理等任务。
- en: '![../images/484548_1_En_3_Chapter/484548_1_En_3_Fig7_HTML.jpg](Images/484548_1_En_3_Fig7_HTML.jpg)'
  id: totrans-539
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_3_Chapter/484548_1_En_3_Fig7_HTML.jpg](Images/484548_1_En_3_Fig7_HTML.jpg)'
- en: Figure 3-7
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-7
- en: An example of a convolution neural network
  id: totrans-541
  prefs: []
  type: TYPE_NORMAL
  zh: 卷积神经网络的一个示例
- en: Third is the **self-organizing map (SOM)** . It is a type of ANN that is trained
    using unsupervised learning to produce a low-dimensional (typically two-dimensional),
    discretized representation of the input space of the training samples, called
    a map. It is therefore a method to do dimensionality reduction. SOMs differ from
    other ANNs, as they apply competitive learning as opposed to error-correction
    learning (such as backpropagation with gradient descent), and in the sense that
    they use a neighborhood function to preserve the topological properties of the
    input space. And it is almost always used for unsupervised learning cases.
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: 第三是**自组织映射（SOM）**。它是一种使用无监督学习进行训练的ANN，以产生训练样本输入空间的低维（通常是二维）离散表示，称为映射。因此，它是一种降维方法。SOMs
    与其他 ANNs 不同，因为它们使用竞争学习而不是错误纠正学习（如梯度下降的逆传播），并且它们使用邻域函数来保留输入空间的整体拓扑属性。它几乎总是用于无监督学习案例。
- en: What we need you to learn in this chapter is the deep learning architectures
    and their forms. This is the first step of our stairs to TensorFlow and deep learning
    layers and how you can make these layers writeable to your project. So far we’ve
    talked about them in theoretical and academic ways. We will explore these concepts
    and know their purpose, and how to know of the architecture is good for your data
    or not. All this is discussed in our deep learning pipeline.
  id: totrans-543
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们需要你学习的是深度学习架构及其形式。这是我们通往TensorFlow和深度学习层的阶梯的第一步，以及如何将这些层写入你的项目。到目前为止，我们以理论和学术的方式讨论了它们。我们将探索这些概念，了解它们的目的，以及如何判断架构是否适合你的数据。所有这些都在我们的深度学习流程中讨论。
- en: Deep Learning Pipeline
  id: totrans-544
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 深度学习流程
- en: In the previous chapter we gave an introduction to book, to deep learning, and
    installed our environment. Yet we did not introduce what the book title means,
    so *what is the deep learning pipeline?*
  id: totrans-545
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一章中，我们介绍了书籍、深度学习以及安装了我们的环境。然而，我们并没有介绍书名所代表的意义，那么*什么是深度学习流程*？
- en: Answers to this question will go along with you through the end of the book,
    but to be fair, you deserve an overview of the meaning of the title.
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
  zh: 对这个问题的答案将伴随你直到书的结尾，但为了公平起见，你应得到对标题意义的概述。
- en: 'Before diving into Part II: Data, let’s take a moment to look at the overall
    deep learning pipeline, to make sure that you understand each part correctly.
    Also, this will help you get situated in the larger picture of the book. To that
    end, we’ll begin with a little musing on the basic concepts, like data and models.'
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: 在深入到第二部分：数据之前，让我们花一点时间来审视整个深度学习流程，以确保你正确理解了每个部分。此外，这将帮助你理解书的大局。为此，我们将从对基本概念，如数据和模型的一些思考开始。
- en: 'Any predictive modeling, which is any deep learning project, can be broken
    down into five common tasks:'
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
  zh: 任何预测建模，无论是任何深度学习项目，都可以分解为五个常见任务：
- en: Define and prepare problem
  id: totrans-549
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义和准备问题
- en: Summarize and understand data
  id: totrans-550
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 总结和理解数据
- en: Process and prepare data
  id: totrans-551
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 处理和准备数据
- en: Evaluate algorithms
  id: totrans-552
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 评估算法
- en: Improve results
  id: totrans-553
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提高结果
- en: These tasks can either be combined and used together or broken down and used
    apart further, but this is the general structure. To work through modeling deep
    learning problems in a pipeline, you need to map these tasks onto this process.
    Sometimes you will see these tasks renamed or presented in a different structure,
    but in general they have the same purpose. So, we will be stuck to this pipeline
    with these tasks in the exact order throughout the book.
  id: totrans-554
  prefs: []
  type: TYPE_NORMAL
  zh: 这些任务可以组合在一起使用，也可以拆分单独使用，但这是一般结构。要在流程中处理深度学习建模问题，你需要将这些任务映射到这个过程中。有时你会看到这些任务被重命名或以不同的结构呈现，但总的来说，它们具有相同的目的。因此，我们将坚持使用这个流程，并在整本书中按照这些任务的精确顺序进行。
- en: The tasks may need to be adapted or renamed slightly to suit the Python way
    of doing things (e.g., Pandas for data loading, matplotlib for visualization,
    and TensorFlow for modeling).
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
  zh: 这些任务可能需要根据Python的方式稍作调整或重命名（例如，Pandas用于数据加载，matplotlib用于可视化，TensorFlow用于建模）。
- en: In the next sections we will provide these mappings of the pipeline. We will
    also elaborate and illustrate each task and the types of subtasks, with examples
    and libraries that you can use for these types.
  id: totrans-556
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的章节中，我们将提供这些流程的映射。我们还将详细说明每个任务及其子任务的类型，并提供你可以用于这些类型的示例和库。
- en: Define and Prepare Problem
  id: totrans-557
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 定义和准备问题
- en: 'Why do you collect data ? There are questions that data you are collecting
    can help you answer: questions like *which stocks should I invest in?* or *how
    can I understand my customers?*'
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
  zh: 你为什么收集数据？你收集的数据可以帮助你回答一些问题：比如*我应该投资哪些股票？*或者*我如何理解我的客户*？
- en: The answer to these questions cannot be that simple. The path from data to answers
    is full of false starts and dead ends, like a maze. What starts out as a promising
    approach may not pan out or give the wanted answer, the right answer. What was
    originally just a hunch may end up leading to the best solution. Deep learning
    pipelines are made for specific types of reasons; workflows with data are frequently
    multistage, iterative processes.
  id: totrans-559
  prefs: []
  type: TYPE_NORMAL
  zh: 这些问题的答案不可能那么简单。从数据到答案的道路充满了错误的开端和死胡同，就像一个迷宫。一开始看起来很有希望的方法可能不会成功，或者给出想要的答案，正确的答案。最初只是一个直觉，最终可能导向最佳解决方案。深度学习流程是为了特定的原因而设计的；与数据相关的流程通常是多阶段、迭代的。
- en: For instance, stock prices are observed at the exchange, aggregated by an intermediary
    like Thomson Reuters, stored in a database, bought by a company, converted into
    a data warehouse or on a Hadoop cluster, pulled out of the store by a script,
    subsampled, cleaned by another script, dumped to a file, and converted to a format
    that you can try out in your favorite modeling library in Python or any other
    programming language. The predictions are then dumped back out to an *EXCEL* or
    a *CSV* file and parsed by an evaluator or file reader engine. And the model is
    iterated multiple times, rewritten in C++ or Java by your production team, and
    run on all of the data before the final predictions are pumped out to another
    database.
  id: totrans-560
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，股价在交易所被观察，由像路透社这样的中介机构汇总，存储在数据库中，由公司购买，转换成数据仓库或Hadoop集群，由脚本从存储中提取，子采样，由另一个脚本清理，倒入文件，并转换成你可以在Python或任何其他编程语言中尝试的格式。然后，预测被倒入一个*EXCEL*或*CSV*文件，并由评估器或文件读取器引擎解析。模型随后被迭代多次，由你的生产团队用C++或Java重写，并在最终预测被泵送到另一个数据库之前在所有数据上运行。
- en: So, we can say that this step is about understanding the problem and its domain,
    and to understand, collect, and load everything you need to start working on your
    problem. This includes
  id: totrans-561
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们可以说这一步是关于理解问题和其领域，以及为了理解，收集和加载你需要开始工作的所有内容。这包括
- en: Python modules, classes, and functions that you intend to use
  id: totrans-562
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你打算使用的Python模块、类和函数
- en: Loading your dataset from its source
  id: totrans-563
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从其来源加载数据集
- en: This is also the home of any global configuration you might need to do. It is
    also the place where you might need to make a reduced sample of your dataset if
    it is too large to work with.
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
  zh: 这也是你可能需要进行的任何全局配置的家园。这里也可能是你需要对你的数据集进行缩减样本的地方，如果它太大而难以处理。
- en: Ideally, your dataset should be small enough to build a model or create a visualization
    within a short period. You can always scale up well-performing models later.
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
  zh: 理想情况下，你的数据集应该足够小，以便在短时间内构建模型或创建可视化。你总是可以在之后将表现良好的模型扩展。
- en: Summarize and Understand Data
  id: totrans-566
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 总结和理解数据
- en: Data can be defined as observations of real-world phenomena, and as information
    that has been translated into a form that is efficient for movement or processing.
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: 数据可以被定义为对现实世界现象的观察，以及已经被转换成便于移动或处理的形式的信息。
- en: As examples, stock market data involves observations of daily stock prices,
    announcements of earnings by individual companies, and even opinion articles from
    pundits; or personal biometric data can include measurements of our minute-by-minute
    heart rate, blood sugar level, blood pressure, etc.
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，股市数据涉及对每日股价的观察，个别公司收益的公告，甚至专家的意见文章；或个人生物识别数据可以包括我们每分钟的心率、血糖水平、血压等的测量。
- en: As you need to work in the domain of these observations, you have to understand
    this domain and these observations, which sometimes you may know as distribution.
    You need to summarize and visualize these observations to understand them and
    be able to see trends. Each piece of data provides a small window into a limited
    aspect of reality. The collection of all of these observations gives us a picture
    of the whole.
  id: totrans-569
  prefs: []
  type: TYPE_NORMAL
  zh: 由于你需要在这些观察的领域内工作，你必须理解这个领域和这些观察，有时你可能称之为分布。你需要总结和可视化这些观察，以便理解它们并能够看到趋势。每一份数据都为现实的一个有限方面提供了一个小的窗口。所有这些观察的集合为我们描绘了整个画面。
- en: This step is about better understanding the data that you have available. This
    includes understanding your data through
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
  zh: 这一步是更好地理解你拥有的数据。这包括通过以下方式理解你的数据：
- en: Descriptive statistics such as summaries
  id: totrans-571
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 描述性统计，如摘要
- en: Use of data visualizations such as plots with Matplotlib, ideally using convenience
    functions from Pandas
  id: totrans-572
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用数据可视化，如Matplotlib中的图表，理想情况下使用Pandas的便利函数
- en: Taking your time and using the results to prompt a lot of questions, assumptions,
    and hypotheses, which you can investigate later with specialized models
  id: totrans-573
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 花时间并使用结果来引发大量问题、假设和假设，这些你可以稍后通过专门的模型进行调查
- en: Process and Prepare Data
  id: totrans-574
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 处理和准备数据
- en: After understanding the domain and the data, you need to prepare it for the
    next step. So, data processing is, generally, the collection and manipulation
    of items of data to produce meaningful information. You can think that you have
    a small piece of the puzzle, and the goal is to solve it. But the picture is messy
    because it is composed of a thousand little pieces, and in real-life data there’s
    always measurement noise and missing pieces. So, by processing the data, you make
    it easier for the model to see the clear picture and understand it very well.
    This is a crucial step in the pipeline, and the accuracy of the model depends
    on it.
  id: totrans-575
  prefs: []
  type: TYPE_NORMAL
  zh: 在理解了领域和数据之后，你需要为下一步做准备。因此，数据处理通常是指收集和操作数据项以产生有意义信息的过程。你可以认为你有一小块拼图，目标是解决它。但是图片很混乱，因为它由成千上万的小块组成，而在现实生活中的数据中，总是存在测量噪声和缺失的部分。因此，通过处理数据，你使模型更容易看到清晰的图片并很好地理解它。这是管道中的关键步骤，模型的准确性取决于它。
- en: 'This step is about preparing the data in such a way that it best exposes the
    structure of the problem and the relationships between your input attributes and
    the output variable. This includes tasks such as the following:'
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
  zh: 这一步是关于以最佳方式准备数据，以便最好地暴露问题结构和输入属性与输出变量之间的关系。这包括以下任务：
- en: Cleaning data by removing duplicates, marking missing values, and even imputing
    missing values
  id: totrans-577
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过删除重复项、标记缺失值甚至填充缺失值来清理数据
- en: Feature selection where redundant features may be removed and new features developed
  id: totrans-578
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 特征选择，其中可以删除冗余特征并开发新特征
- en: Data transforms where attributes are scaled or redistributed in order to best
    expose the structure of the problem later to learning algorithms
  id: totrans-579
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据转换，其中属性被缩放或重新分配，以便最好地暴露问题结构，以便稍后供学习算法使用
- en: Start simple. Revisit this step often and cycle with the next step until you
    converge on a subset of algorithms and a presentation of the data that results
    in accurate or accurate-enough models to proceed.
  id: totrans-580
  prefs: []
  type: TYPE_NORMAL
  zh: 从简单开始。经常回顾这一步，并与下一步循环，直到你收敛到一个算法子集和数据的展示，这些展示能够产生准确或足够准确的模型以继续进行。
- en: Evaluate Algorithms
  id: totrans-581
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 评估算法
- en: Trying to understand the world through data is like trying to piece together
    reality using a noisy, incomplete jigsaw puzzle with a bunch of extra pieces.
    This is where mathematical modeling—in particular statistical modeling too—comes
    in. The language of statistics contains concepts for many frequent characteristics
    of data, such as wrong, redundant, or missing. Wrong data is the result of a mistake
    in measurement. Redundant data contains multiple aspects that convey exactly the
    same information.
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
  zh: 通过数据理解世界就像试图使用嘈杂、不完整且带有许多额外拼图的拼图来拼凑现实。这就是数学建模——特别是统计建模——发挥作用的地方。统计学的语言包含了许多数据常见特征的概念，如错误、冗余或缺失。错误数据是测量错误的结果。冗余数据包含多个方面，传达了完全相同的信息。
- en: For instance, the day of the week may be present as a categorical variable with
    values of “*Saturday*,” “*Sunday*,” …, “*Friday*,” and again included as an integer
    value between 0 and 6\. If this day-of-the-week information is not present for
    some data points, then you’ve got missing data on your hands.
  id: totrans-583
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，星期几可能作为一个具有“*星期六*”、“*星期日*”……，“*星期五*”等值的分类变量，再次作为一个介于0和6之间的整数值包含在内。如果某些数据点的星期几信息不存在，那么你就有了缺失数据。
- en: A mathematical model of data describes the relationships between different aspects
    of the data. For instance, a model that predicts stock prices might be a formula
    that maps a company’s earning history, past stock prices, and an industry to the
    predicted stock price. A model that recommends music might measure the similarity
    between users (based on their listening habits), and recommend the same artists
    to users who have listened to a lot of the same songs. Mathematical formulas relate
    numeric quantities to each other. But raw data is often not numeric. (The action
    “Alice bought The Lord of the Rings trilogy on Wednesday” is not numeric, and
    neither is the review that she subsequently writes about the book.) There must
    be a piece that connects the two together. This is where features come in.
  id: totrans-584
  prefs: []
  type: TYPE_NORMAL
  zh: 数据的数学模型描述了数据不同方面的关系。例如，一个预测股票价格的模型可能是一个将公司的盈利历史、过去的股票价格和行业映射到预测股票价格的公式。一个推荐音乐的模型可能会测量用户之间的相似性（基于他们的收听习惯），并向那些听过很多相同歌曲的用户推荐相同的艺术家。数学公式将数值量相互关联。但原始数据通常不是数值的。（“爱丽丝在周三购买了《指环王》三部曲”这个动作不是数值的，她随后对该书的评论也不是。）必须有一个部分将两者连接起来。这就是特征发挥作用的地方。
- en: This step is about finding a subset of machine learning algorithms that are
    good at exploiting the structure of your data (e.g., have better than average
    skill). This involves steps such as
  id: totrans-585
  prefs: []
  type: TYPE_NORMAL
  zh: 这一步是寻找一组擅长利用你的数据结构（例如，技能优于平均水平）的机器学习算法。这包括以下步骤
- en: Separating out a validation dataset to use for later confirmation of the skill
    of your developed model. Or defining test options using scikit-learn, such as
    cross validation and the evaluation metric to use.
  id: totrans-586
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将验证数据集分离出来，用于以后确认你开发的模型技能。或者使用scikit-learn定义测试选项，例如交叉验证和要使用的评估指标。
- en: Spot-checking a suite of linear and nonlinear machine learning algorithms
  id: totrans-587
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对一系列线性和非线性机器学习算法进行抽查
- en: Comparing the estimated accuracy of algorithms
  id: totrans-588
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 比较算法的估计准确性
- en: On a given problem you will likely spend most of your time on this and the previous
    step until you converge on a set of three to five well-performing machine learning
    algorithms.
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: 在给定的问题上，你可能会在这步和上一步上花费大部分时间，直到你收敛到三到五个表现良好的机器学习算法。
- en: Improve Results
  id: totrans-590
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 提高结果
- en: Features and models sit between raw data and the desired insights. In a machine
    learning workflow, we pick not only the model, but also the features. This is
    a double-jointed lever, and the choice of one affects the other. Good features
    make the subsequent modeling step easy and the resulting model more capable of
    completing the desired task. Bad features may require a much more complicated
    model to achieve the same level of performance. In the rest of this book, we will
    cover different kinds of features and discuss their pros and cons for different
    types of data and models. Without further ado, let’s go.
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
  zh: 特征和模型位于原始数据和所需洞察之间。在机器学习工作流程中，我们不仅选择模型，还选择特征。这是一个双关节杠杆，一个的选择会影响另一个。好的特征使后续建模步骤变得容易，并使结果模型更有能力完成所需的任务。坏的特征可能需要更复杂的模型才能达到相同的性能水平。在本书的其余部分，我们将介绍不同种类的特征，并讨论它们对不同类型的数据和模型的优缺点。现在，让我们不再拖延，直接进入正题。
- en: Once you have a shortlist of machine learning algorithms, you need to get the
    most out of them.
  id: totrans-592
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你有一份机器学习算法的候选列表，你需要充分利用它们。
- en: 'There are two different ways to improve the accuracy of your models:'
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
  zh: 提高模型准确性的两种不同方法：
- en: Search for a combination of parameters for each algorithm using scikit-learn
    that yields the best results.
  id: totrans-594
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用scikit-learn为每个算法寻找一组参数，以获得最佳结果。
- en: Combine the prediction of multiple models into an ensemble prediction using
    ensemble techniques.
  id: totrans-595
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用集成技术将多个模型的预测组合成一个集成预测。
- en: The line between this and the previous step can blur when a project becomes
    concrete. There may be a little algorithm tuning in the previous step. And in
    the case of ensembles, you may bring more than a shortlist of algorithms forward
    to combine their predictions.
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
  zh: 当项目变得具体时，这一步和上一步之间的界限可能会变得模糊。上一步可能有一些算法调整。在集成的情况下，你可能将不止一个候选算法向前推进以组合它们的预测。
- en: Once you have found a model that you believe can make accurate predictions on
    unseen data, you are ready to finalize it. Finalizing a model may involve subtasks
    such as
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你找到一个你认为可以在未见数据上做出准确预测的模型，你就可以准备最终确定它了。确定模型可能涉及以下子任务
- en: Using an optimal model tuned by scikit-learn to make predictions on unseen data
  id: totrans-598
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 scikit-learn 调优的最优模型对未见数据进行预测
- en: Creating a standalone model using the parameters tuned by scikit-learn
  id: totrans-599
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 scikit-learn 调优的参数创建独立模型
- en: Saving an optimal model to file for later use
  id: totrans-600
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将最优模型保存到文件以供以后使用
- en: Once you make it this far, you are ready to present results to stakeholders
    and/or deploy your model to start making predictions on unseen data.
  id: totrans-601
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦您走到这一步，您就可以向利益相关者展示结果，并将您的模型部署以开始对未见数据做出预测。
- en: Fast Preview of the TensorFlow Pipeline
  id: totrans-602
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: TensorFlow 管道快速预览
- en: As we mentioned earlier, TensorFlow (TF) is an open source software library
    for numerical computation using data flow graphs. Nodes in the graph represent
    mathematical operations, while the graph edges represent the multidimensional
    data arrays (tensors) passed between them.
  id: totrans-603
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们之前提到的，TensorFlow (TF) 是一个开源软件库，用于使用数据流图进行数值计算。图中的节点表示数学运算，而图边表示在它们之间传递的多维数据数组（张量）。
- en: TensorFlow is available with Python and C++ support, and as we agreed in Chapter
    [1](484548_1_En_1_Chapter.xhtml), we shall use Python 3 in this book for learning,
    as indeed Python API is better supported and much easier to learn. In the next
    section, we explain very briefly the main features of the TensorFlow package,
    with some programming examples.
  id: totrans-604
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow 提供了 Python 和 C++ 支持，正如我们在第 [1](484548_1_En_1_Chapter.xhtml) 章中约定的，我们将在这本书中使用
    Python 3 进行学习，因为确实 Python API 的支持更好，而且更容易学习。在下一节中，我们将简要介绍 TensorFlow 包的主要特性，并附带一些编程示例。
- en: 'TensorFlow includes various types of rich functions and features that any deep
    learning engineer needs in their work; the main features include the following:'
  id: totrans-605
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow 包含了各种丰富的函数和特性，任何深度学习工程师在工作中都需要；主要特性包括以下内容：
- en: Defining, optimizing, and efficiently calculating mathematical expressions involving
    multidimensional arrays (tensors)
  id: totrans-606
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义、优化和高效计算涉及多维数组（张量）的数学表达式
- en: Programming support of deep neural networks and machine learning techniques
  id: totrans-607
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 深度神经网络和机器学习技术的编程支持
- en: Transparent use of GPU computing, automating management and optimization of
    the same memory and the data used. You can write the same code and run it either
    on CPUs or GPUs. More specifically, TensorFlow will figure out which parts of
    the computation should be moved to the GPU.
  id: totrans-608
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 透明使用 GPU 计算，自动化管理优化相同内存和数据。您可以编写相同的代码，并在 CPU 或 GPU 上运行。更具体地说，TensorFlow 将确定计算中哪些部分应该移动到
    GPU。
- en: High scalability of computation across machines and huge data sets
  id: totrans-609
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算在机器和大数据集上的高可扩展性
- en: Tensors—the Main Data Structure
  id: totrans-610
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 张量——主要数据结构
- en: TensorFlow bases its data management on tensors. Tensors are concepts from the
    field of mathematics and are developed as a generalization of the linear algebra
    terms of vectors and matrices.
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow 基于张量进行数据管理。张量是数学领域的概念，它作为向量矩阵线性代数术语的推广而发展起来。
- en: Talking specifically about TensorFlow, a tensor is just a typed, multidimensional
    array, with additional operations, modeled on the tensor object.
  id: totrans-612
  prefs: []
  type: TYPE_NORMAL
  zh: 具体谈到 TensorFlow，张量只是一个有类型的多维数组，具有基于张量对象的额外操作。
- en: Before going to see what the properties of tensors are, we need to teach you
    how to run these tensors. TensorFlow uses what’s called sessions to run tensors,
    so let’s go and see what these sessions mean.
  id: totrans-613
  prefs: []
  type: TYPE_NORMAL
  zh: 在查看张量的属性之前，我们需要教您如何运行这些张量。TensorFlow 使用所谓的会话来运行张量，所以让我们去看看这些会话意味着什么。
- en: First Session
  id: totrans-614
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第一次会话
- en: 'As in Chapter [1](484548_1_En_1_Chapter.xhtml), we installed our environment
    to make it easier to work on a step-by-step example throughout the book. It is
    time to move from theory to practice. To get an initial idea of how to use TensorFlow,
    open your favorite Python editor—it’s recommended to use Jupyter—and write the
    following lines of code:'
  id: totrans-615
  prefs: []
  type: TYPE_NORMAL
  zh: 如同第 [1](484548_1_En_1_Chapter.xhtml) 章所述，我们安装了我们的环境，以便在整本书中逐步举例时工作更加方便。现在是时候从理论转向实践了。为了对如何使用
    TensorFlow 有一个初步的了解，打开您最喜欢的 Python 编辑器——建议使用 Jupyter——并写下以下代码行：
- en: '[PRE15]'
  id: totrans-616
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: As you can easily understand in the first three lines, the constant x, set equal
    to 1, is then added to 9 to set the new value of the variable y, and then the
    end result of the variable y is printed on the screen.
  id: totrans-617
  prefs: []
  type: TYPE_NORMAL
  zh: 如您在前三行中可以轻易理解的那样，常数 x，设置为 1，然后加到 9 上，以设置变量 y 的新值，然后变量 y 的最终结果被打印在屏幕上。
- en: In the last four lines, we have translated according to the TensorFlow library
    the first three variables.
  id: totrans-618
  prefs: []
  type: TYPE_NORMAL
  zh: 在最后四行中，我们根据 TensorFlow 库翻译了前三个变量。
- en: 'If we run the program, we have the following output:'
  id: totrans-619
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们运行程序，我们将得到以下输出：
- en: '[PRE16]'
  id: totrans-620
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: The TensorFlow translation of the first three lines of the program example produces
    a different result. Let’s analyze them.
  id: totrans-621
  prefs: []
  type: TYPE_NORMAL
  zh: 程序示例的前三条 TensorFlow 代码的翻译产生了不同的结果。让我们分析一下。
- en: 'First. The following statement should never be missed if you want to use the
    TensorFlow library. It tells us that we are importing the library and call it
    tf:'
  id: totrans-622
  prefs: []
  type: TYPE_NORMAL
  zh: 第一点。如果你想要使用 TensorFlow 库，以下语句绝不能错过。它告诉我们我们正在导入库并称之为 tf：
- en: '[PRE17]'
  id: totrans-623
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: 'Second. We create a constant value called x, with a value equal to one:'
  id: totrans-624
  prefs: []
  type: TYPE_NORMAL
  zh: 第二点。我们创建一个名为 x 的常量值，其值等于一：
- en: '[PRE18]'
  id: totrans-625
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: 'Third. Then we create a variable called y. This variable is defined with the
    simple equation y=x+9:'
  id: totrans-626
  prefs: []
  type: TYPE_NORMAL
  zh: 第三点。然后我们创建一个名为 y 的变量。这个变量通过简单的方程 y=x+9 定义：
- en: '[PRE19]'
  id: totrans-627
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: 'Fourth. Finally, print out the result:'
  id: totrans-628
  prefs: []
  type: TYPE_NORMAL
  zh: 第四点。最后，打印出结果：
- en: '[PRE20]'
  id: totrans-629
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: 'So *how do we explain the different result?* The difference lies in the variable
    definition. In fact, the variable y doesn’t represent the current value of x +
    9, instead, it means that when the variable y is computed, take the value of the
    constant x and add 9 to it. This is the reason why the value of y has never been
    carried out. In the next section, I’ll try to fix it. So, we open the Python IDE
    (Figure [3-8](#Fig8)) and enter the following lines:'
  id: totrans-630
  prefs: []
  type: TYPE_NORMAL
  zh: 那么*我们如何解释不同的结果呢？* 差异在于变量定义。实际上，变量 y 并不代表 x + 9 的当前值，而是意味着当变量 y 被计算时，取常量 x 的值并加上
    9。这就是为什么 y 的值从未被计算出来的原因。在下一节中，我将尝试修复它。因此，我们打开 Python IDE（图 [3-8](#Fig8)）并输入以下行：
- en: '![../images/484548_1_En_3_Chapter/484548_1_En_3_Fig8_HTML.jpg](Images/484548_1_En_3_Fig8_HTML.jpg)'
  id: totrans-631
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_3_Chapter/484548_1_En_3_Fig8_HTML.jpg](Images/484548_1_En_3_Fig8_HTML.jpg)'
- en: Figure 3-8
  id: totrans-632
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-8
- en: TensorFlow code snippet
  id: totrans-633
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow 代码片段
- en: 'Running the preceding code, the output result is finally as follows:'
  id: totrans-634
  prefs: []
  type: TYPE_NORMAL
  zh: 运行前面的代码，最终输出结果如下：
- en: '[PRE21]'
  id: totrans-635
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: 'We have removed the print instruction, but we have initialized the model variables:'
  id: totrans-636
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经移除了打印指令，但我们已经初始化了模型变量：
- en: '[PRE22]'
  id: totrans-637
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: And, mostly, we have created a session for computing values. In the next step,
    we run the model, created previously, and finally, run just the variable y and
    print out its current value.
  id: totrans-638
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们主要创建了一个用于计算值的会话。在下一步中，我们运行之前创建的模型，最后，仅运行变量 y 并打印出其当前值。
- en: '[PRE23]'
  id: totrans-639
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: This is the magic trick that permits the correct result. In this fundamental
    step, the execution graph called the Data Flow Graph (another important feature
    in TensorFlow) is created in the session, with all the dependencies between the
    variables. The y variable depends on the variable x, and that value is transformed
    by adding 9 to it. The value is not computed until the session is executed.
  id: totrans-640
  prefs: []
  type: TYPE_NORMAL
  zh: 这是允许得到正确结果的神奇技巧。在这个基本步骤中，在会话中创建了一个名为数据流图（TensorFlow 中的另一个重要特性）的执行图，其中包含了变量之间的所有依赖关系。变量
    y 依赖于变量 x，并且该值通过加上 9 来转换。直到会话执行，值才被计算。
- en: Data Flow Graphs
  id: totrans-641
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据流图
- en: If you think about it, you will find that any deep learning application is just
    a result of the repeated computation of complex mathematical expressions. In TensorFlow,
    every computation can be described using the Data Flow Graph, where each node
    in the graph represents the instance of a mathematical operation (multiply, divide,
    add, subtract, and so on), and each edge is a multidimensional data set (tensors)
    on which the operations are performed.
  id: totrans-642
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你仔细想想，你会发现任何深度学习应用都是复杂数学表达式的重复计算的结果。在 TensorFlow 中，每个计算都可以使用数据流图来描述，其中图中的每个节点代表数学运算的实例（乘法、除法、加法、减法等），而每条边是在其上执行操作的多元数据集（张量）。
- en: TensorFlow supports these constructs and these operators. So, let’s see in detail
    how nodes and edges are managed by TensorFlow.
  id: totrans-643
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow 支持这些构造和这些运算符。那么，让我们详细看看 TensorFlow 如何管理节点和边。
- en: '*Normal edges*: They are carriers of data structures (tensors), where an output
    of one operation (from one node) becomes the input for another operation. For
    example, the node `tf.matmul()` would correspond to a single node with two incoming
    edges (the matrices to be multiplied) and one outgoing edge (the result of the
    multiplication).'
  id: totrans-644
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*普通边*：它们是数据结构（张量）的载体，其中某个操作的输出（来自一个节点）成为另一个操作的输入。例如，`tf.matmul()` 节点将对应于一个具有两个输入边（要相乘的矩阵）和一个输出边（乘法的结果）的单个节点。'
- en: '*Special edges*: These edges are not data carriers between the output of a
    node (operator) and the input of another node. A special edge indicates a control
    dependency between two nodes. Let’s suppose we have two nodes A and B and special
    edges connecting A to B; it means that B will start its operation only when the
    operation in A ends. Special edges are used in Data Flow Graphs to set the happens-before
    relationship between operations on the tensors.'
  id: totrans-645
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*特殊边*：这些边不是节点（操作）输出和另一个节点输入之间的数据载体。特殊边表示两个节点之间的控制依赖关系。假设我们有两个节点A和B，以及连接A到B的特殊边；这意味着B只有在A的操作结束后才会开始其操作。特殊边在数据流图中用于设置张量操作之间的happens-before关系。'
- en: '*Node*: In TensorFlow, each node can represent an instantiation of a single
    operation. Each operation has at least one input and may have an output or not.
    For instance, the TensorFlow `tf.add()` function represents one operation, which
    is the addition operation: it takes two inputs and produces only one output.'
  id: totrans-646
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*节点*：在TensorFlow中，每个节点可以表示单个操作的实例化。每个操作至少有一个输入，可能有一个输出或不输出。例如，TensorFlow的`tf.add()`函数表示一个操作，即加法操作：它接受两个输入并只产生一个输出。'
- en: '*Edges*: In TensorFlow, edges represent the data consumed or produced by a
    computation. There are two types of edge:'
  id: totrans-647
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*边*：在TensorFlow中，边表示计算所消耗或产生的数据。有两种类型的边：'
- en: After learning the structure of the Data Flow Graph, let’s now explore some
    features in deeper detail.
  id: totrans-648
  prefs: []
  type: TYPE_NORMAL
  zh: 在学习数据流图的结构之后，现在让我们更深入地探讨一些特性。
- en: '`session.extend`: In computation, the user can extend the execution graph,
    requesting to add more operations (nodes) and edges (data).'
  id: totrans-649
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`session.extend`：在计算中，用户可以扩展执行图，请求添加更多操作（节点）和边（数据）。'
- en: '`session.run`: Using TensorFlow, sessions are created with some graphs, and
    these full graphs are executed to get some outputs, or sometimes, subgraphs are
    executed thousands/millions of times in run invocations. Basically, the method
    runs the execution graph to provide outputs.'
  id: totrans-650
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`session.run`：使用TensorFlow，与某些图一起创建会话，并执行这些完整图以获取一些输出，或者有时在运行调用中执行子图数千/数百万次。基本上，该方法运行执行图以提供输出。'
- en: '*Operation*: This represents an abstract computation, such as adding or multiplying
    matrices. An operation manages tensors. It can just be polymorphic: the same operation
    can manipulate different tensor element types. For example, the addition of two
    `int32` tensors, the addition of two `float64` tensors, and so on.'
  id: totrans-651
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*操作*：这代表一个抽象的计算，例如矩阵的加法或乘法。操作管理张量。它可以具有多态性：相同的操作可以操作不同的张量元素类型。例如，两个`int32`张量的加法，两个`float64`张量的加法，等等。'
- en: '*Kernel*: This represents the concrete implementation of that operation. A
    kernel defines the implementation of the operation on a particular device. For
    example, an add matrix operation can have a CPU implementation and a GPU one.
    In the following section, we introduce the concept of sessions to create a model
    execution graph in TensorFlow. Let’s explain this topic.'
  id: totrans-652
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*内核*：这代表该操作的具体实现。内核定义了在特定设备上操作的实施。例如，加法矩阵操作可以有CPU实现和GPU实现。在下一节中，我们将介绍会话的概念，以在TensorFlow中创建模型执行图。让我们解释这个主题。'
- en: '*Session*: When the client program has to establish communication with the
    TensorFlow runtime system, a session must be created. As soon as the session is
    created for a client, an initial graph is created and is empty. It has two fundamental
    methods:'
  id: totrans-653
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*会话*：当客户端程序需要与TensorFlow运行时系统建立通信时，必须创建会话。一旦为客户端创建会话，就会创建一个初始图，并且它是空的。它有两个基本方法：'
- en: 'Dataflow has several advantages that TensorFlow leverages when executing your
    programs:'
  id: totrans-654
  prefs: []
  type: TYPE_NORMAL
  zh: 数据流有几个TensorFlow在执行程序时利用的优势：
- en: '*Parallelism*: By using explicit edges to represent dependencies between operations,
    it is easy for the system to identify operations that can execute in parallel.'
  id: totrans-655
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*并行性*：通过使用显式边来表示操作之间的依赖关系，系统可以轻松地识别可以并行执行的操作。'
- en: '*Distributed execution*: By using explicit edges to represent the values that
    flow between operations, it is possible for TensorFlow to partition your program
    across multiple devices (CPUs, GPUs, and TPUs) attached to different machines.
    TensorFlow inserts the necessary communication and coordination between devices.'
  id: totrans-656
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*分布式执行*：通过使用显式边来表示操作之间流动的值，TensorFlow可以在连接到不同机器的多个设备（CPU、GPU和TPU）上划分您的程序。TensorFlow在设备之间插入必要的通信和协调。'
- en: '*Compilation*: TensorFlow’s XLA compiler can use the information in your Data
    Flow Graph to generate faster code, for example, by fusing together adjacent operations.'
  id: totrans-657
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Portability*: The Data Flow Graph is a language-independent representation
    of the code in your model. You can build a Data Flow Graph in Python, store it
    in a SavedModel, and restore it in a C++ program for low-latency inference.'
  id: totrans-658
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Tensor Properties
  id: totrans-659
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As previously discussed, TensorFlow uses a tensor data structure to represent
    all data. Any tensor has a static type and dynamic dimensions, so you can change
    a tensor’s internal organization in real time.
  id: totrans-660
  prefs: []
  type: TYPE_NORMAL
- en: Another property of tensors is that only objects of the tensor type can be passed
    between nodes in the computation graph.
  id: totrans-661
  prefs: []
  type: TYPE_NORMAL
- en: Note
  id: totrans-662
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: From now on, every time we use the word tensor, we’ll be referring to TensorFlow’s
    tensor objects.
  id: totrans-663
  prefs: []
  type: TYPE_NORMAL
- en: Tensor Rank
  id: totrans-664
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: A tensor rank represents the dimensional aspect of a tensor, but is not the
    same as a matrix rank. It represents the number of dimensions in which the tensor
    lives, and is not a precise measure of the extension of the tensor in rows/columns
    or spatial equivalents.
  id: totrans-665
  prefs: []
  type: TYPE_NORMAL
- en: A rank one tensor is the equivalent of a vector, and a rank one tensor is a
    matrix. For a rank two tensor, you can access any element with the syntax t[i,
    j] similar to the syntax of accessing a matrix, as this rank will produce a matrix.
    For a rank three tensor, you would need to address an element with t[i, j, k],
    and so on.
  id: totrans-666
  prefs: []
  type: TYPE_NORMAL
- en: 'In the following example, we will create a tensor, and access one of its components:'
  id: totrans-667
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  id: totrans-668
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: This is a tensor of rank three, because in each element of the containing matrix,
    there is a vector element, and that’s why we need to specify three coordinates.
  id: totrans-669
  prefs: []
  type: TYPE_NORMAL
- en: Table [3-1](#Tab1) summarizes all the variables ranks and their math entity
    as well as the code definition by example.
  id: totrans-670
  prefs: []
  type: TYPE_NORMAL
- en: Table 3-1
  id: totrans-671
  prefs: []
  type: TYPE_NORMAL
- en: The Tensor Rank with Example
  id: totrans-672
  prefs: []
  type: TYPE_NORMAL
