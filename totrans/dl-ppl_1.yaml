- en: Part IIntroduction
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第一部分 引言
- en: 1. A Gentle Introduction
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 1.  轻松入门
- en: If you have ever tried to read a deep learning or even machine learning book,
    you will find that these books define **machine learning (ML)** as the science
    that teaches machines how to carry out tasks by themselves. That’s a simple idea
    if you think of it this way, but the complexity is in the details of this mysterious
    science; it’s within the black art of how these machines can act like humans.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您曾经尝试阅读深度学习或甚至机器学习书籍，您会发现这些书籍将 **机器学习（ML）** 定义为教导机器如何自行执行任务的科学。如果您这样想，这是一个简单的想法，但复杂性在于这个神秘科学的细节；它在于这些机器如何像人类一样行动的黑魔法之中。
- en: 'Because you are reading this book now, you are probably one of the following:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 因为您现在正在阅读这本书，您可能属于以下之一：
- en: A beginner to deep learning who wants to learn the art of deep learning in easy
    and straight steps
  id: totrans-4
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一个深度学习的初学者，希望通过简单直接的方式学习深度学习的艺术
- en: A developer who wants to choose a part of deep learning to work on and wants
    to gain the knowledge to compare between approaches to deep learning and choose
    the best option for him or her
  id: totrans-5
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一个想要选择深度学习的一部分进行工作并希望获得知识以比较深度学习方法的开发者
- en: An advanced engineer who wants to enhance their skills by learning the best
    practices of deep learning and how to build effective pipelines in a deep learning
    approach
  id: totrans-6
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一个高级工程师，希望通过学习深度学习的最佳实践和如何在深度学习方法中构建有效的管道来提高自己的技能
- en: 'Upon starting the book, we have to make sure that you know where machine learning
    and deep learning come from and that''s by describing the three theories: information,
    probability, and decision theory. After that, we will illustrate what is machine
    learning and what is deep learning, and also the evolution from machine learning
    to deep learning.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在开始本书之前，我们必须确保您知道机器学习和深度学习的来源，这通过描述三个理论：信息论、概率论和决策论来实现。之后，我们将阐述什么是机器学习，什么是深度学习，以及从机器学习到深度学习的演变。
- en: Information Theory, Probability Theory, and Decision Theory
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 信息论、概率论和决策论
- en: The first question that should spark in your mind is *where does deep learning
    come from?*
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 应该在你脑海中激发的第一个问题是 *深度学习从何而来？*
- en: If we wanted to write a good answer for this question, we could write another
    book titled *The Rise of Deep Learning*. Instead, we will show you the combination
    that made deep learning the state-of-art approach that many want to learn and
    understand how it works.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们想要为这个问题写一个很好的答案，我们可以写另一本书，书名为 *深度学习的崛起*。相反，我们将向您展示使深度学习成为许多人都想学习和理解其工作原理的尖端方法背后的组合。
- en: 'Deep learning—or we can generalize to machine learning—is built from three
    theories:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习——或者我们可以将其推广到机器学习——是由三个理论构建的：
- en: Information theory
  id: totrans-12
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 信息论
- en: Probability theory
  id: totrans-13
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 概率论
- en: Decision theory
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策论
- en: Each of these theories contributed to the rise of the deep learning approach
    and made it the rich science it is today.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 这些理论中的每一个都为深度学习方法的兴起做出了贡献，并使其成为今天如此丰富的科学。
- en: Information Theory
  id: totrans-16
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 信息论
- en: 'In this section, we start by answering a very good question: *what are the
    components of the deep learning approach?*'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们首先回答一个非常好的问题：*深度学习方法的组成部分是什么？*
- en: The first thing you do in any project is to get and prepare your dataset. And
    here, we start these theories by introducing some additional concepts from the
    field of information theory, which will also prove useful in our development of
    machine and deep learning approaches. We shall focus only on the key concepts,
    which barely scratch the surface of these theories, and we’ll refer the reader
    elsewhere for more detailed discussions.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在任何项目中，您首先要做的是获取和准备您的数据集。在这里，我们通过介绍来自信息理论领域的一些额外概念来开始这些理论，这些概念也将证明在开发机器和深度学习方法中是有用的。我们将只关注关键概念，这些概念几乎触及了这些理论的表面，我们将把读者引向其他地方进行更详细的讨论。
- en: 'We begin by considering input observations and asking a question: *how much
    information does the model receive when it’s trying to learn the pattern of the
    data?*'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先考虑输入观察，并提出一个问题：*当模型试图学习数据的模式时，它接收了多少信息？*
- en: The answer depends on many things. For example you should know that information
    the model gains from a dataset is related to many variables, so don’t be surprised
    if the model learned a lot more than you thought, or less. That’s why this amount
    of information can be viewed as the “degree of surprise” on learning the value
    of your dataset.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 答案取决于许多因素。例如，你应该知道模型从数据集中获得的信息与许多变量相关，所以如果模型学习到的比你想象的要多或要少，不要感到惊讶。这就是为什么这个信息量可以被视为学习数据集值时的“惊讶程度”。
- en: Because you want to make sure that a desired model should make accurate decisions
    based on what it learned from a dataset, you have to ensure that the data that
    entered your model has the proper information that the model needs. Also, the
    information the model gains is a variant from another dataset, and the type of
    dataset may also make it hard for some models to learn the inside patterns, for
    example, images and text datasets. If you did not have a proper model for these
    data, you will never extract these information and you will never find the pattern
    or even learn it.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 因为你要确保一个期望的模型能够根据从数据集中学习到的内容做出准确的决策，你必须确保进入你模型的这些数据拥有模型所需的信息。此外，模型获得的信息可能来自另一个数据集的变体，而且数据集的类型也可能使得某些模型难以学习内部模式，例如图像和文本数据集。如果你没有为这些数据设置合适的模型，你将永远无法提取这些信息，你也永远不会找到模式，甚至无法学习它。
- en: It’s good to make it easier for your model to learn from any dataset by munging
    and cleaning the data. This will make it clear for your model to see information
    and also distinguish it from any noise that exists in the data; and that’s what
    Part II of this book is about.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 通过对数据进行整理和清理，使你的模型更容易从任何数据集中学习是很好的。这将使模型更容易看到信息，并区分数据中存在的任何噪声；这正是本书第二部分的内容。
- en: Part II of this book is about dealing with data, starting by defining the data
    and the hidden information and type of data, then how to visualize and extract
    the information. After seeing the truth by visualization, then you now know the
    road to take and you only need to make this road, and that can done by cleaning
    the data. At the end of this part we show you some advanced techniques to make
    it easier for the model to learn by extracting and engineering the features of
    the data to ensure that the model can see and learn the pattern.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 本书第二部分是关于处理数据的，首先定义数据、隐藏信息和数据类型，然后是如何可视化和提取信息。通过可视化看到真相后，你现在知道应该走哪条路，你只需要走这条路，而这可以通过清理数据来实现。在本部分的最后，我们向你展示了一些高级技术，通过提取和工程数据特征来简化模型的学习过程，确保模型能够看到并学习模式。
- en: Probability Theory
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 概率论
- en: 'As deep learning is concerned with learning from data, it has to learn the
    pattern behind these data. And as you learn about this field of science, you will
    find yourself facing the key concept of uncertainty. While you are building a
    deep learning algorithm that should learn from and about a given dataset, you
    will find the most famous fact in the deep learning and machine learning world,
    which is the following:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习关注从数据中学习，它必须学习这些数据背后的模式。随着你对这个科学领域的学习，你会发现你面临的关键概念是不确定性。当你构建一个深度学习算法，该算法应该从和关于一个给定的数据集中学习时，你会在深度学习和机器学习世界中找到最著名的事实，即以下：
- en: '*There’s a relationship between the certainty of any learned model on a given
    dataset and both noise on measurements and the finite size of the dataset.*'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*任何学习模型在给定数据集上的确定性与其测量噪声和数据集的有限大小之间存在着关系。*'
- en: Let us re-illustrate it to make it clearer. Given a dataset that you are working
    on in some project, you tried to build a deep learning algorithm that should predict
    something based on the training dataset that you have. After the model had trained
    for a certain time, you tried to test its understanding of the dataset that it
    trained on, and you are surprised that it learned nothing at all.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们重新阐述一下，以便使其更清晰。假设你在某个项目中处理一个数据集，你试图构建一个深度学习算法，该算法应该根据你拥有的训练数据集进行预测。在模型训练了一段时间后，你试图测试其对训练数据集的理解，结果你惊讶地发现它什么都没学到。
- en: 'So you asked yourself *why after all the training time did the model fail to
    learn?* The answer may be one of the following:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 所以你问自己*为什么在所有训练时间之后，模型仍然无法学习？* 答案可能是以下之一：
- en: The model is too small for the data, and that means that it cannot capture all
    the knowledge or the patterns from the dataset.
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型对于数据来说太小了，这意味着它无法捕捉到数据集中的所有知识或模式。
- en: The model could not capture the pattern of the dataset due to the fact that
    the pattern of the data is hidden through a huge variation of noise, so the model
    failed to understand all that.
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于数据的模式被巨大的噪声变化所隐藏，模型无法捕捉数据集的模式，因此模型未能理解所有这些。
- en: The model could not capture the pattern due to the small sample of your dataset,
    and that means the model cannot learn and generalize using a small number of observations.
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于你的数据集样本量小，模型无法捕捉模式，这意味着模型无法使用少量观察结果进行学习和泛化。
- en: 'So, after understanding the problems you have to face that make your model
    unable to perform accurately, you have another question: *how can I overcome these
    obstacles and make my model achieve the desired accuracy?*'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在了解你面临的使你的模型无法准确执行的问题之后，你还有另一个问题：*我如何克服这些障碍，使我的模型达到所需的准确度？*
- en: The answer is behind the art of statistics, as before the invention of neural
    networks, statisticians used to make prediction based on a dataset.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 答案在于统计学的艺术，因为在神经网络发明之前，统计学家通常基于数据集进行预测。
- en: Statisticians used what are called distributions to simulate the trend of the
    dataset and extract properties like the skew of the data and parameters such as
    the measurement of center (mean, median, and mode) and measurement of spread (variance
    and standard deviation). All these are on one-dimensional data, and if the data
    is in multidimensional space they use the covariance to see how each pair of variables
    goes together. They detect the correlation between each pair to detect the relationship
    and the association between the variable pairs. Also, they use what's called hypothesis
    testing to infer the result of a hypothesis performed on sample data from a dataset.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 统计学家使用所谓的分布来模拟数据集的趋势并提取诸如数据的偏斜和诸如测量中心（均值、中位数和众数）以及测量分散（方差和标准差）等参数。所有这些都是在单维数据上，如果数据在多维空间中，他们使用协方差来查看每一对变量是如何一起工作的。他们检测每一对变量之间的相关性，以检测变量对之间的关系和关联。此外，他们使用所谓的假设检验来推断从数据集样本数据上执行假设的结果。
- en: As we use deep learning to predict the future outcome based on a given observation,
    we use a huge combination of linear algebra and statistics as a black box to build
    and optimize the model.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们使用深度学习根据给定的观察结果预测未来结果时，我们使用大量的线性代数和统计学作为黑盒来构建和优化模型。
- en: 'We can’t say that deep learning consists 100% of statistics. A main point to
    address is that deep learning is not just statistics—the same-old stuff, just
    with bigger computers and a fancier name. This notion comes from statistical concepts
    and terms that are prevalent in machine/deep learning, such as *regression*, *weights*,
    *biases*, *models*, etc. Additionally, many models approximate what can generally
    be considered statistical functions: the *softmax* output of a classification
    model consists of *logits*, making the process of training an image classifier
    a *logistic regression*. Also, the *least square algorithm* is a statistical approach
    to optimize the fitted line on linear regression.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不能说深度学习就是100%的统计学。一个需要解决的主要观点是，深度学习不仅仅是统计学——那些老掉牙的东西，只是用更大的计算机和更花哨的名字。这种观念源于在机器/深度学习中普遍存在的统计概念和术语，例如*回归*、*权重*、*偏差*、*模型*等。此外，许多模型近似了通常可以被认为是统计函数的东西：分类模型的*softmax*输出由*logits*组成，使得训练图像分类器的过程成为*逻辑回归*。同样，*最小二乘算法*是线性回归中拟合线优化的统计方法。
- en: Though the preceding paragraph is technically correct, reducing deep learning
    as a whole to nothing more than a subsidiary of statistics is quite wrong, and
    to think that deep learning just consists of statistics is a huge mistake. In
    fact, the comparison doesn’t make much sense. Statistics is the field of mathematics
    that deals with the understanding and interpretation of data.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管前一段在技术上正确，但将深度学习整体降低为统计学的附属品是非常错误的，认为深度学习只是由统计学组成是一个巨大的错误。事实上，这种比较并没有太多意义。统计学是处理数据理解和解释的数学领域。
- en: 'Deep learning is nothing more than a class of computational algorithms (hence
    its emergence from computer science). In many cases, these algorithms are completely
    useless in aiding with the understanding of data and assist only in certain types
    of uninterpretable predictive modeling. Let''s take a few examples:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习不过是一类计算算法（因此它起源于计算机科学）。在许多情况下，这些算法在帮助理解数据方面完全无用，仅在某些类型的不可解释的预测建模中提供帮助。让我们举几个例子：
- en: In *reinforcement learning* (we will describe what it is later), the algorithm
    may not use a preexisting dataset at all.
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在*强化学习*（我们将在后面描述它是什么）中，算法可能根本不会使用现有的数据集。
- en: In *image processing*, referring to images as instances of a dataset with pixels
    as features is a bit of a clue to start with.
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在*图像处理*中，将图像作为具有像素作为特征的具有像素的数据集的实例，是开始的一个小线索。
- en: In Part III, we deal with everything in the model building step—how to choose,
    build, and train your model—providing a step-by-step guide of model choosing and
    creation and the best practice techniques used in the industries for building
    and training.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在第三部分，我们处理模型构建步骤中的所有内容——如何选择、构建和训练你的模型——提供模型选择和创建的逐步指南以及工业界在构建和训练中使用的最佳实践技术。
- en: Decision Theory
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 决策理论
- en: We have discussed a variety of concepts from information theory and probability
    theory that will form the foundations for much of the subsequent discussion in
    this book.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经讨论了来自信息理论和概率论的各种概念，这些概念将构成本书后续讨论的基础。
- en: In the previous section we talked about the importance of probability theory
    and how it is used to infer and train the model, but also we said that deep learning
    science does not consist only of statistics. Here we will show you another component
    that deep learning uses, and we will turn to a discussion about decision theory.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一节中，我们讨论了概率论的重要性以及它是如何用于推断和训练模型的，但我们还说过，深度学习科学并不仅仅由统计学组成。在这里，我们将向你展示深度学习使用的另一个组件，我们将转向关于决策理论的讨论。
- en: When we combine decision theory with probability theory, it allows us to make
    optimal decisions in situations involving uncertainty, such as those encountered
    in machine and deep learning.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们将决策理论与概率理论结合起来时，它使我们能够在涉及不确定性的情况下做出最优决策，例如在机器学习和深度学习中遇到的情况。
- en: Let's take an example to prove how decision theory is an important element and
    also describe its position in the process of building a deep learning model.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过一个例子来证明决策理论是一个重要的元素，并描述它在构建深度学习模型过程中的位置。
- en: Suppose that we have a dataset that is labeled, and you want to get the function
    that predicts the label, given an input. This problem is called inference, and
    it’s what probability theory is about. Let us consider that the label consists
    of one of two values (discrete), either true or false; the statistical term in
    the model you have built will infer the value of the label given its input, but
    you have to ensure that this choice is optimal in some appropriate sense. This
    is the decision step, and it is the main key concept that decision theory will
    tell us. It’s how to make optimal decisions given the appropriate probabilities.
    We shall see that the decision stage is generally very simple, even trivial.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们有一个标记好的数据集，你想要得到一个给定输入预测标签的函数。这个问题被称为推理，这正是概率论所涉及的内容。让我们考虑标签由两个值之一（离散）组成，即真或假；你构建的模型中的统计术语将根据其输入推断标签的值，但你必须确保这个选择在某种适当的意义上是最佳的。这是决策步骤，它是决策理论将告诉我们的主要关键概念。这是如何在适当的概率下做出最优决策。我们将看到决策阶段通常非常简单，甚至可以说是微不足道的。
- en: So to make sure that you have the idea, the model will use the statistics and
    will try to guess an output to a new given observation. The model will output
    a probability for each class of the label—one probability if the output is true
    and another if the output is false. And if we aim to minimize the chance of assigning
    the input observation to the wrong output label, then intuitively we would choose
    the class having the higher probability (confidence) value. We now show that this
    information is correct, and we also discuss more general criteria for making decisions.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保你理解了这个概念，模型将使用统计方法，并尝试对新给定的观测值猜测一个输出。模型将为标签的每个类别输出一个概率——如果输出为真，则输出一个概率，如果输出为假，则输出另一个概率。如果我们旨在最小化将输入观测值分配给错误输出标签的机会，那么直观上我们会选择具有更高概率（置信度）值的类别。我们现在将证明这个信息是正确的，并且我们还将讨论做出决策的更一般标准。
- en: In Part III, we also continue to talk about error measurement, how to assess
    the accuracy of your model, and how to evaluate your model with easy clean step.
    Also, as there are different types of data, we will show you a variant type of
    measurement for each type.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在第三部分，我们还将继续讨论错误测量，如何评估你模型的准确性，以及如何通过简单的清洁步骤评估你的模型。此外，由于存在不同类型的数据，我们将为每种类型展示一种变体类型的测量。
- en: Figure [1-1](#Fig1) describes the difference and the correlation between the
    three theories. We can say that each of these theories is a necessary step for
    any deep learning pipeline; in other words, each theory participates in the building
    of any machine or deep learning model.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [1-1](#Fig1) 描述了三种理论之间的差异和相关性。我们可以这样说，这些理论中的每一个都是任何深度学习流程的必要步骤；换句话说，每个理论都参与了任何机器或深度学习模型的构建。
- en: '![../images/484548_1_En_1_Chapter/484548_1_En_1_Fig1_HTML.jpg](Images/484548_1_En_1_Fig1_HTML.jpg)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_1_Chapter/484548_1_En_1_Fig1_HTML.jpg](Images/484548_1_En_1_Fig1_HTML.jpg)'
- en: Figure 1-1
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-1
- en: How the three theories are correlated to each other and how they are a necessary
    component for deep learning pipelines. These theories describe the building process
    of the machine/deep learning process
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 三种理论之间是如何相互关联的，以及它们是如何成为深度学习流程的必要组成部分的。这些理论描述了机器/深度学习过程的构建过程。
- en: Introduction to Machine Learning
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 机器学习简介
- en: The term “machine learning” was coined by Arthur Samuel in 1959, an American
    pioneer in the field of computer gaming and artificial intelligence, and stated
    that “it gives computers the ability to learn without being explicitly programmed.”
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: “机器学习”这个术语是由1959年的亚瑟·塞缪尔（Arthur Samuel）提出的，他是计算机游戏和人工智能领域的美国先驱，并指出“它使计算机能够在没有明确编程的情况下学习。”
- en: 'So let’s start to answer a few good questions: *what is machine learning?*
    and *what is the difference between traditional programming and machine learning?*
    It’s easy to get the difference between them as follows :'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，让我们开始回答一些好的问题：*什么是机器学习？*以及*传统编程与机器学习之间的区别是什么？*它们之间的区别很容易理解如下：
- en: '![../images/484548_1_En_1_Chapter/484548_1_En_1_Fig3_HTML.jpg](Images/484548_1_En_1_Fig3_HTML.jpg)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_1_Chapter/484548_1_En_1_Fig3_HTML.jpg](Images/484548_1_En_1_Fig3_HTML.jpg)'
- en: Figure 1-3
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-3
- en: Traditional programming diagram
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 传统编程图
- en: '![../images/484548_1_En_1_Chapter/484548_1_En_1_Fig2_HTML.jpg](Images/484548_1_En_1_Fig2_HTML.jpg)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_1_Chapter/484548_1_En_1_Fig2_HTML.jpg](Images/484548_1_En_1_Fig2_HTML.jpg)'
- en: Figure 1-2
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-2
- en: The machine learning diagram
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习图
- en: '*Traditional programming*: In traditional programming, we have a box that has
    two inputs (Input, Rule) and the traditional model generates the output based
    on the rule we add. Figure [1-2](#Fig2) shows an example diagram of traditional
    programming.'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*传统编程*：在传统编程中，我们有一个包含两个输入（输入，规则）的盒子，传统模型根据我们添加的规则生成输出。图 [1-2](#Fig2) 展示了传统编程的示例图。'
- en: '*Machine learning*: In machine learning, we have a box that has two inputs
    (Input, Output) and the machine learning model trains to get the rule that generates
    the output from input. Figure [1-3](#Fig3) shows the machine learning programming
    example, and this shows how it differs from traditional programming.'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*机器学习*：在机器学习中，我们有一个包含两个输入（输入，输出）的盒子，机器学习模型通过训练来获取从输入生成输出的规则。图 [1-3](#Fig3)
    展示了机器学习编程示例，这显示了它与传统编程的不同之处。'
- en: Predictive Analytics and Its Connection with Machine learning
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 预测分析与机器学习的联系
- en: 'To simplify this, we will answer the question: *what is predictive analytics?*'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 为了简化这一点，我们将回答以下问题：*什么是预测分析？*
- en: Predictive analytics is a commercial name for machine learning, which is used
    to devise complex models and algorithms that lend themselves to prediction. So
    machine learning is a tool for analytics! Maybe, but we can say that it’s a model
    used by researchers, data scientists, engineers, and analysts to produce reliable
    decisions and results and uncover hidden insights through learning from historical
    relationships and trends in the dataset.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 预测分析是机器学习的商业名称，用于设计适合预测的复杂模型和算法。因此，机器学习是分析的一个工具！也许吧，但我们可以这样说，它是研究人员、数据科学家、工程师和分析员用来通过学习数据集中的历史关系和趋势来产生可靠决策和结果，并揭示隐藏洞察力的一个模型。
- en: 'Let''s consider an example. Suppose that you decide to check out that offer
    for a vacation; you browse through the travel agency web site and search for a
    hotel. When you look at a specific hotel, just below the hotel description there
    is a section titled “You might also like these hotels.” This is a common use case
    of Machine Learning called a “recommendation engine.” In the previous example,
    they think that you will like these specific hotels, based on a lot of information
    they already know about you (**historical dataset**) . And here we will leave
    a question for you: *is machine learning a technique or an approach?*'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑一个例子。假设你决定查看那个度假的优惠；你浏览旅行社网站并搜索酒店。当你查看一家特定的酒店时，在酒店描述下方有一个标题为“你可能也会喜欢这些酒店”的部分。这是机器学习的一个常见用例，称为“推荐引擎”。在先前的例子中，他们认为你会喜欢这些特定的酒店，基于他们已经知道你很多信息（**历史数据集**）。这里我们给你留下一个问题：*机器学习是一种技术还是一种方法？*
- en: Machine Learning Approaches
  id: totrans-69
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 机器学习方法
- en: 'Machine learning has three main approaches:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习有三种主要方法：
- en: '*Supervised* learning'
  id: totrans-71
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*监督学习*'
- en: '*Unsupervised* learning'
  id: totrans-72
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*无监督学习*'
- en: S*emisupervised* learning
  id: totrans-73
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*半监督学习*'
- en: So, let us go and discuss each approach in detail.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，让我们详细讨论每种方法。
- en: Supervised Learning
  id: totrans-75
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 监督学习
- en: When an algorithm learns from example data and associated target responses that
    can consist of numeric values or string labels, such as classes or tags, in order
    to later predict the correct response when posed with new examples, it comes under
    the category of supervised learning. This approach is indeed similar to human
    learning under the supervision of someone.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 当一个算法从示例数据和相关的目标响应中学习，这些响应可以包括数值或字符串标签，如类别或标签，以便在后来面对新示例时预测正确的响应时，它属于监督学习的范畴。这种方法确实类似于在某人监督下的人类学习。
- en: For example, the teacher provides good examples for the student to memorize,
    and the student then derives general rules from these specific examples.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，老师为学生提供好的例子来记忆，然后学生从这些具体的例子中推导出一般规则。
- en: Let’s see it in a visualization graph (Figure [1-4](#Fig4)) which will give
    you a clear illustration of supervised learning. The data is labeled (as each
    real-world observation/input has a certain output value), as we see in Figure
    [1-4](#Fig4). The model in supervised learning should see the data, as shown,
    to allow it to classify the data. The model should use the labeled data to get
    from Figure 1 on the left to Figure 2 on the right, or in other words, we will
    classify each data observation/input to a certain response/output.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们在可视化图表（图[1-4](#Fig4)）中看看，这将为您提供一个清晰的监督学习的说明。数据被标记了（因为每个现实世界的观察/输入都有一个确定的输出值），如图[1-4](#Fig4)所示。在监督学习中，模型应该看到如图所示的数据，以便允许它对数据进行分类。模型应该使用标记的数据从左边的图1到右边的图2，换句话说，我们将把每个数据观察/输入分类到某个响应/输出。
- en: 'In the previous example, when we explore data we see a type of supervised learning
    approach called Classification; there are two types actually, and they solve two
    problems that describe supervised learning:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 在先前的例子中，当我们探索数据时，我们看到一种称为分类的监督学习方法；实际上有两种类型，它们解决了描述监督学习的两个问题：
- en: Classification
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分类
- en: Regression
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 回归
- en: So a good question that might come to mind is *what exactly are classification
    and regression?*
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，一个可能出现在你脑海中的好问题是*分类和回归究竟是什么？*
- en: '![../images/484548_1_En_1_Chapter/484548_1_En_1_Fig4_HTML.jpg](Images/484548_1_En_1_Fig4_HTML.jpg)'
  id: totrans-83
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_1_Chapter/484548_1_En_1_Fig4_HTML.jpg](Images/484548_1_En_1_Fig4_HTML.jpg)'
- en: Figure 1-4
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-4
- en: A dataset with a model that classifies different observations (x and o) into
    two regions
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 一个包含模型的数据库，该模型将不同的观察（x和o）分类到两个区域
- en: We define a *classification problem* as when the output variable is a category
    or a group, such as “black” and “white” or “spam” and “ham (no-spam)” or even
    X’s and O’s.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将*分类问题*定义为当输出变量是一个类别或一组时，例如“黑色”和“白色”或“垃圾邮件”和“非垃圾邮件”或甚至X和O。
- en: On the other hand, a *regression problem* is when the output variable is a real
    value, such as “dollars” or “height.”
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，*回归问题*是当输出变量是一个实值时，例如“美元”或“身高”。
- en: So if you have to choose between two or more labels, you now face a classification
    problem; and if you try to estimate the f loating points of the output, you now
    face a regression problem (Figure [1-5](#Fig5)).
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，如果你必须在两个或多个标签之间进行选择，你现在面临的是一个分类问题；如果你试图估计输出的浮点数，你现在面临的是一个回归问题（图[1-5](#Fig5)）。
- en: '![../images/484548_1_En_1_Chapter/484548_1_En_1_Fig5_HTML.jpg](Images/484548_1_En_1_Fig5_HTML.jpg)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_1_Chapter/484548_1_En_1_Fig5_HTML.jpg](Images/484548_1_En_1_Fig5_HTML.jpg)'
- en: Figure 1-5
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-5
- en: How a regression model tries to fit the dataset
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 回归模型如何尝试拟合数据集
- en: Unsupervised Learning
  id: totrans-92
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 无监督学习
- en: Unsupervised Learning is a class of machine learning techniques to find the
    patterns in data. The data given to unsupervised algorithm are not labeled, which
    means only the input variables are given with no corresponding output variables.
    In unsupervised learning, the algorithms are left to themselves to discover interesting
    structures in the data.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 无监督学习是一类机器学习技术，用于在数据中找到模式。无监督算法所接受的数据没有标签，这意味着只提供了输入变量，没有相应的输出变量。在无监督学习中，算法被留给自身去发现数据中的有趣结构。
- en: In supervised learning, the system tries to learn from the previous examples
    that are given. On the other hand, in unsupervised learning, the system attempts
    to find the patterns directly from the example given. So if the dataset is labeled,
    it comes under a supervised problem; if the dataset is unlabeled, it is an unsupervised
    problem.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 在监督学习中，系统试图从给出的先前示例中学习。另一方面，在无监督学习中，系统试图直接从给出的示例中找到模式。因此，如果数据集被标记，它属于监督问题；如果数据集未标记，它是一个无监督问题。
- en: In unsupervised learning, the algorithms are left to themselves to discover
    interesting structures in the data, where you only have input data and no corresponding
    output variables. The easy definition for us ML engineers is that in unsupervised
    learning we wish to learn the inherent structure of our data without using explicitly
    provided labels.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 在无监督学习中，算法被留给自身去发现数据中的有趣结构，其中你只有输入数据，没有相应的输出变量。对于我们这些机器学习工程师来说，简单的定义是在无监督学习中，我们希望学习数据的内在结构，而不使用明确提供的标签。
- en: But *why do we call it unsupervised learning?* We call it unsupervised learning
    because unlike supervised learning, there are no given correct answers and the
    machine itself finds the answers.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 但*为什么我们称之为无监督学习？*我们称之为无监督学习，因为与监督学习不同，没有给出正确的答案，机器本身找到答案。
- en: For example, suppose we have undergraduate students in a physics course and
    we need to predict who will pass and who will not, based on their demographic/educational
    factors. The model should explore the data and try to catch the patterns to get
    the right answer based on features it has; this is an unsupervised case.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假设我们有一门物理课程中的本科生，我们需要根据他们的人口统计/教育因素预测谁会通过考试，谁不会。模型应该探索数据，并试图捕捉模式，根据它所具有的特征得到正确答案；这是一个无监督案例。
- en: So let’s see it in Figure [1-6](#Fig6), which illustrates unsupervised learning.
    The data is labeled as we see in the graph. The model in unsupervised learning
    should see the data as shown in the figure, to allow it to cluster the data.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看图[1-6](#Fig6)，它说明了无监督学习。数据被标记如图所示。无监督学习中的模型应该看到如图所示的数据，以便它能够聚类数据。
- en: '![../images/484548_1_En_1_Chapter/484548_1_En_1_Fig6_HTML.jpg](Images/484548_1_En_1_Fig6_HTML.jpg)'
  id: totrans-99
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_1_Chapter/484548_1_En_1_Fig6_HTML.jpg](Images/484548_1_En_1_Fig6_HTML.jpg)'
- en: Figure 1-6
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-6
- en: How an unsupervised learning algorithm clusters data into groups or zones
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 无监督学习算法如何将数据聚类成组或区域
- en: 'In Figure [1-6](#Fig6), we grouped data into zones. This phenomenon is called
    **Clustering** . Actually, we have many problems and problem-solving techniques,
    but the two most common problems that describe unsupervised learning are:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 在图[1-6](#Fig6)中，我们将数据分组到区域中。这种现象被称为**聚类**。实际上，我们有许多问题和解决问题的技术，但描述无监督学习的两个最常见问题是：
- en: Clustering
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 聚类
- en: Association
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关联
- en: So, *what are those types?*
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，*这些类型是什么？*
- en: An **association rule learning** problem is where you want to discover rules
    that describe large portions of your data, such as *“people who buy X also tend
    to buy Y.”*
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: '**关联规则学习**问题是你想要发现描述你数据大部分的规则，例如*“购买X的人也倾向于购买Y。”*'
- en: A **clustering** problem is where you want to discover the inherent groupings
    in the data, such as grouping customers by purchasing behavior.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: '**聚类**问题是你想要发现数据中的固有分组，例如根据购买行为对客户进行分组。'
- en: Semisupervised Learning
  id: totrans-108
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 半监督学习
- en: When you have a problem where you have a large amount of input data and only
    some of the data is labeled, this is called a *semisupervised learning* problem.
    These problems sit in between supervised and unsupervised learning.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 当你遇到一个问题，你有大量的输入数据，但只有其中一部分数据被标记时，这被称为*半监督学习问题*。这些问题介于监督学习和无监督学习之间。
- en: Consider an example, a photo archive where only some of the images are labeled,
    (e.g., dog, cat, person) and the majority are unlabeled.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑一个例子，一个照片存档，其中只有一些图像被标记（例如，狗、猫、人），而大多数图像未被标记。
- en: '*How does it work?* You can use unsupervised learning techniques to discover
    and learn the structure in the input variables, then use supervised learning techniques
    to make best-guess predictions for the unlabeled data, feed that data back into
    the supervised learning algorithm as training data, and use the model to make
    predictions on new unseen data.'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: '*它是如何工作的？* 你可以使用无监督学习技术来发现和从输入变量中学习结构，然后使用监督学习技术对未标记的数据进行最佳猜测预测，将数据反馈到监督学习算法作为训练数据，并使用该模型对新未见数据做出预测。'
- en: Checkpoint
  id: totrans-112
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 检查点
- en: To not get confused, we will make a checkpoint to summarize the difference between
    the machine learning approaches. Table [1-1](#Tab1) summarize the difference between
    the three approaches, supervised, unsupervised, and semisupervised learning (see
    also Figure [1-7](#Fig7)).
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 为了避免混淆，我们将创建一个检查点来总结机器学习方法的差异。表 [1-1](#Tab1) 总结了三种方法的差异，即监督学习、无监督学习和半监督学习（参见图
    [1-7](#Fig7)）。
- en: '![../images/484548_1_En_1_Chapter/484548_1_En_1_Fig7_HTML.jpg](Images/484548_1_En_1_Fig7_HTML.jpg)'
  id: totrans-114
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_1_Chapter/484548_1_En_1_Fig7_HTML.jpg](Images/484548_1_En_1_Fig7_HTML.jpg)'
- en: Figure 1-7
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-7
- en: The tree of classical machine learning
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 经典机器学习的树状结构
- en: Table 1-1
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 表 1-1
- en: The Three Approaches of Machine Learning—Summarized to Make a Checkpoint
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习的三种方法——总结以创建检查点
- en: '| Supervised | Unsupervised | Semisupervised |'
  id: totrans-119
  prefs: []
  type: TYPE_TB
  zh: '| 监督学习 | 无监督学习 | 半监督学习 |'
- en: '| --- | --- | --- |'
  id: totrans-120
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| All data is labeled and the algorithms learn to predict the output from the
    input data. | All data is unlabeled and the algorithms learn to the inherent structure
    from the input data. | Some data is labeled but most of it is unlabeled, and a
    mixture of supervised and unsupervised techniques can be used. |'
  id: totrans-121
  prefs: []
  type: TYPE_TB
  zh: '| 所有数据都有标签，算法学习从输入数据预测输出。 | 所有数据都没有标签，算法学习从输入数据中学习内在结构。 | 部分数据有标签，但大部分数据没有标签，可以使用监督和无监督技术的混合。
    |'
- en: Reinforcement Learning
  id: totrans-122
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 强化学习
- en: Reinforcement learning is an area of machine learning. It’s all about taking
    suitable action to maximize the reward in this situation. Reward is one of the
    main aspects of reinforcement learning.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习是机器学习的一个领域。它全部关于采取合适的动作来最大化这种情况下的奖励。奖励是强化学习的主要方面之一。
- en: For example, when you have a dog in your home and try to teach it how to sit,
    jump, or turn around, you start by showing the dog how to do it and then let it
    try itself. When you say “sit” and the dog sits, you reward it. But if it can’t
    understand, you don’t reward it. Let’s explain reinforcement. The dog is an *agent*;
    when you say “sit” it’s an *environment* state and the agent response is called
    *action*. When the dog does what you say, you will give it a reward, and the dog
    tries to maximize this reward by understanding what you say every time. This is
    reinforcement learning, but the reinforcement learning is out of the scope because
    it requires more knowledge of mathematics.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，当你家里有一只狗并试图教它如何坐下、跳跃或转身时，你首先向狗展示如何做，然后让它自己尝试。当你说“坐下”而狗坐下时，你会奖励它。但如果它不理解，你不会奖励它。让我们解释一下强化。狗是一个
    *代理*；当你说“坐下”时，它处于 *环境* 状态，代理的响应被称为 *动作*。当狗按照你说的做时，你会给它奖励，狗会通过理解你每次说的话来最大化这个奖励。这就是强化学习，但强化学习超出了范围，因为它需要更多的数学知识。
- en: Let’s gain more understanding with Figure [1-8](#Fig8), which shows the environment
    system in reinforcement learning.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过图 [1-8](#Fig8) 来获得更多的理解，它显示了强化学习中的环境系统。
- en: '![../images/484548_1_En_1_Chapter/484548_1_En_1_Fig8_HTML.jpg](Images/484548_1_En_1_Fig8_HTML.jpg)'
  id: totrans-126
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_1_Chapter/484548_1_En_1_Fig8_HTML.jpg](Images/484548_1_En_1_Fig8_HTML.jpg)'
- en: Figure 1-8
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-8
- en: A typical system in reinforcement learning
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习中的一个典型系统
- en: As we see, the agent receives a state from the environment, and the agent performs
    an action. Based on this action, the environment will reward the agent or punish
    (not reward) it.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所见，代理从环境中接收一个状态，并执行一个动作。基于这个动作，环境将奖励代理或惩罚（不奖励）它。
- en: The agent tries to maximize these rewards as much as possible (r*einforcement
    learning*).
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 代理试图尽可能多地最大化这些奖励（*强化学习*）。
- en: But there is some commonality between supervised and reinforcement learning,
    as summarized in Table [1-2](#Tab2).
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，监督学习和强化学习之间存在一些共性，如表 [1-2](#Tab2) 所总结。
- en: Table 1-2
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 表 1-2
- en: The Commonality Between Reinforcement Learning and Supervised Learning
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习与监督学习之间的共性
- en: '| Reinforcement Learning | Supervised Learning |'
  id: totrans-134
  prefs: []
  type: TYPE_TB
  zh: '| 强化学习 | 监督学习 |'
- en: '| --- | --- |'
  id: totrans-135
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| In reinforcement learning the decision is dependent, so we give labels to
    sequences of dependent decisions. | In supervised learning the decisions are independent
    of each other, so labels are given to each decision. |'
  id: totrans-136
  prefs: []
  type: TYPE_TB
  zh: '| 在强化学习中，决策是相互依赖的，因此我们为一系列依赖决策赋予标签。 | 在监督学习中，决策之间相互独立，因此每个决策都赋予标签。 |'
- en: From Machine Learning to Deep Learning
  id: totrans-137
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从机器学习到深度学习
- en: We now know and understand that machine learning is a subset of artificial intelligence
    (AI), and deep learning is a subset of machine learning. So every machine learning
    program is under the category of AI programs but not vice versa. The question
    then is *are the approaches of machine learning and AI the same?* The answer is
    **yes**, because every machine learning problem is an AI problem and deep learning
    is a subset of machine learning. Understanding this connection is fundamenatl
    to our book. You should keep in mind that deep learning is nothing more than methods
    that enhance machine learning algorithms to be more accurate and make some stages
    easy, like feature extractions, etc.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在知道并理解，机器学习是人工智能（AI）的一个子集，而深度学习是机器学习的一个子集。因此，每个机器学习程序都属于人工智能程序类别，但反之则不然。那么问题来了，*机器学习和人工智能的方法是否相同？*
    答案是**是的**，因为每个机器学习问题都是一个人工智能问题，而深度学习是机器学习的一个子集。理解这种联系对我们这本书至关重要。你应该记住，深度学习不过是增强机器学习算法以使其更准确，并使某些阶段变得容易，比如特征提取等。
- en: The easiest takeaway for understanding the difference between machine learning
    and deep learning is to remember that deep learning is a subset of machine learning.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 理解机器学习与深度学习之间区别的最简单方法就是记住深度学习是机器学习的一个子集。
- en: Lets’ See What Some Heroes of Machine Learning Say About the Field
  id: totrans-140
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 让我们看看一些机器学习领域的英雄人物对此有何看法
- en: '*Andrew Ng*, the chief scientist of China’s major search engine Baidu and one
    of the leaders of the Google Brain Project, shared a great analogy for deep learning
    with Wired Magazine: “I think AI is akin to building a rocket ship. You need a
    huge engine and a lot of fuel,” he told Wired journalist Caleb Garling. “If you
    have a large engine and a tiny amount of fuel, you won’t make it to orbit. If
    you have a tiny engine and a ton of fuel, you can’t even lift off. To build a
    rocket you need a huge engine and a lot of fuel.”'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 百度首席科学家、谷歌大脑项目领导者之一*安德鲁·吴*在《Wired》杂志上分享了一个关于深度学习的精彩类比：“我认为人工智能就像建造一艘火箭。你需要一个巨大的发动机和大量的燃料，”他告诉《Wired》记者凯勒布·加林。
    “如果你有一个大发动机但燃料很少，你无法进入轨道。如果你有一个小发动机但燃料很多，你甚至无法起飞。建造火箭需要一个大发动机和大量的燃料。”
- en: The analogy to deep learning is that the rocket engine is the deep learning
    models and the fuel is the huge amounts of data we can feed to these algorithms.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 与深度学习的类比是，火箭发动机是深度学习模型，而燃料是我们可以向这些算法提供的海量数据。
- en: '*Nvidia*: Machine learning at its most basic is the practice of using algorithms
    to parse data, learn from it, and then make a determination or prediction about
    something in the world.'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: '*Nvidia*：机器学习最基本的实践是使用算法解析数据，从中学习，然后对世界上的某事物做出判断或预测。'
- en: '*Stanford*: Machine learning is the science of getting computers to act without
    being explicitly programmed.'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: '*斯坦福大学*：机器学习是让计算机在没有明确编程的情况下行动的科学。'
- en: '*McKinsey & Co*: Machine learning is based on algorithms that can learn from
    data without relying on rules-based programming.'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: '*麦肯锡公司*：机器学习基于可以从不依赖基于规则的编程中学习的算法。'
- en: '*The University of Washington*: Machine learning algorithms can figure out
    how to perform important tasks by generalizing from examples.'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: '*华盛顿大学*：机器学习算法可以通过从例子中归纳来找出执行重要任务的方法。'
- en: '*Carnegie Mellon University*: “The field of Machine Learning seeks to answer
    the question *‘How can we build computer systems that automatically improve with
    experience, and what are the fundamental* *laws that govern all learning processes?’ .”*'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: '*卡内基梅隆大学*：“机器学习领域试图回答‘我们如何构建能够随着经验自动改进的计算机系统，以及所有学习过程的基本* *法则是什么？’的问题。”'
- en: Connections Between Machine Learning and Deep Learning
  id: totrans-148
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 机器学习与深度学习之间的联系
- en: 'Machine learning and deep learning use some statistical learning methods from
    inside, but each method has its own approach to data extraction. Take machine
    learning for example: when extracting data, each instance in a dataset is described
    by a set of features or attributes. On the other hand, deep Learning extracts
    features and attributes from raw data by using a *neural network* with many hidden
    layers. We will see later what a neural network is and what its components are,
    and we’ll answer these questions in detail.'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习和深度学习都使用一些来自内部的数据统计学习方法，但每种方法都有其自己的数据提取方法。以机器学习为例：在提取数据时，数据集中每个实例都由一组特征或属性来描述。另一方面，深度学习通过使用具有许多隐藏层的*神经网络*从原始数据中提取特征和属性。我们稍后会看到什么是神经网络及其组成部分，并将详细回答这些问题。
- en: Difference Between ML and DL
  id: totrans-150
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 机器学习与深度学习的区别
- en: For the sake of simplicity and as a best practice, we are going to make the
    comparison between machine learning (ML) and deep learning (DL) using an example.
    We will start with a cats and dogs example as follows.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 为了简化并作为最佳实践，我们将通过一个例子来比较机器学习（ML）和深度学习（DL）。我们将从一个关于猫和狗的例子开始，如下所示。
- en: First, we will explain and talk about this dataset. The cat and dog dataset
    is set of images that in which each image (an observation) is either labeled dog
    if the image contains a dog, or cat if the image contains a cat.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们将解释和讨论这个数据集。猫和狗数据集是一组图像，其中每个图像（一个观察）要么被标记为狗（如果图像包含狗），要么被标记为猫（如果图像包含猫）。
- en: Second, we will show the difference between the machine learning approach and
    the deep learning approach by applying each approach on the dataset and concluding
    the result of each one.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 第二，我们将通过在数据集上应用每种方法并总结每种方法的结果来展示机器学习方法与深度学习方法的区别。
- en: In Machine Learning
  id: totrans-154
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 在机器学习中
- en: 'The images according to the dataset are either one of two categories: dogs
    or cats. The question here is *does the algorithm know which is a dog and which
    is a cat?*'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 根据数据集，图像要么属于两类之一：狗或猫。这里的问题是*算法是否知道哪一个是狗，哪一个是猫？*
- en: The answer is simply that the model will try to label the pictures as one of
    the two categories. It will correctly classify these labels sometimes, and will
    incorrectly classify the other label of some images, so it will end with a disaster
    and very low accuracy.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 答案很简单，模型将尝试将图片标记为两类之一。它有时会正确分类这些标签，而有时会错误地分类某些图像的另一个标签，因此最终结果会是一场灾难，准确度非常低。
- en: This means that your model failed to learn the differences between a cat and
    a dog. That’s because your model simply labels the pictures of dogs and cats in
    a way that defines specific features of *both* the animals from a general view.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着你的模型未能学习猫和狗之间的差异。那是因为你的模型只是以定义两种动物从一般观点出发的特定特征的方式来标记狗和猫的图片。
- en: Let’s take an example wherin the pictures of dogs are always taken outside,
    so maybe if we have a picture of a cat outside, the model may recognize it as
    a dog because it doesn't take specific dog features into account. It sees that
    those pictures of dogs have a sky in them, so any picture that contains animal
    and sky will be considered a dog picture. This is just a simplified example.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们举一个例子，其中狗的图片总是在外面拍摄的，所以如果我们有一张外面的猫的图片，模型可能会将其识别为狗，因为它没有考虑到特定的狗的特征。它看到那些狗的图片中都有天空，所以任何包含动物和天空的图片都将被视为狗的图片。这只是一个简化的例子。
- en: In Deep Learning
  id: totrans-159
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 在深度学习中
- en: Now, you have used the deep learning approach and you can see a huge difference
    in results. So, you wonder *what's the difference that made such a good effect?*
    Of course with some data preprocessing, you can now make the model learn the difference
    between the two animals by pointing the model to the animal in the image. That
    process is called data annotation. Thanks to that, the model can detect and correctly
    classify the animal in the newly entered image.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你已经使用了深度学习方法，你可以看到结果有了巨大的差异。所以，你可能会想*是什么区别使得效果如此之好？*当然，通过一些数据预处理，你现在可以通过指向图像中的动物来让模型学习两种动物之间的差异。这个过程被称为数据标注。多亏了这一点，模型可以检测并正确分类新进入的图像中的动物。
- en: Now the model classifies the two animals, the deep learning approach uses what’s
    called an *artificial neural network* (ANN) that sends the input (data of images)
    through different layers of the network, and each layer is hierarchically learning
    and defining specific features of each animal.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 现在模型对两种动物进行分类，深度学习方法使用所谓的*人工神经网络*（ANN），将输入（图像数据）通过网络的多个层次传递，每个层次都是按层次学习和定义每种动物的具体特征。
- en: After the data is processed through layers within the neural network, the system
    finds the appropriate identifiers for classifying both animals from their images.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 在神经网络内部通过层次处理数据后，系统找到了从它们的图像中分类两种动物的正确标识符。
- en: What Have We Learned Here?
  id: totrans-163
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 我们在这里学到了什么？
- en: One of the differences between deep learning vs. machine learning may appear
    in the way data is presented to the system. Machine learning algorithms almost
    always require structured data, whereas deep learning networks rely on layers
    of the ANNs.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习与机器学习之间可能的一个区别在于数据呈现给系统的方式。机器学习算法几乎总是需要结构化数据，而深度学习网络依赖于人工神经网络的层次。
- en: Machine learning algorithms are built to “learn” to do things by understanding
    labeled data, and then use it to produce further outputs with more sets of data.
    However, they need to be retrained through human intervention when the actual
    output isn’t the desired one.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习算法被构建成通过理解标记数据来“学习”做事情，然后使用它来产生更多数据集的进一步输出。然而，当实际输出不是期望的输出时，它们需要通过人类干预进行重新训练。
- en: Deep learning networks do not require human intervention, as the nested layers
    in the neural networks put data through hierarchies of different concepts, which
    eventually learn through their own errors. However, even these are subject to
    flawed outputs if the quality of data isn’t good enough.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习网络不需要人类干预，因为神经网络中的嵌套层次将数据通过不同概念的不同层次传递，最终通过它们自己的错误进行学习。然而，如果数据的质量不够好，即使是这些也可能产生有缺陷的输出。
- en: '*Data is the governor here. It is the quality of data that ultimately determines
    the quality of the result* *.*'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: '*数据是关键。数据的质量最终决定了结果的优劣* *.*'
- en: Why Should We Learn About Deep Learning (Advantages of Deep learning)?
  id: totrans-168
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 我们为什么要学习深度学习（深度学习的优势）？
- en: 'Deep learning is hyped nowadays because of four main reasons:'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习如今之所以备受推崇，主要有四个原因：
- en: '*The data*: One of the things that increased the popularity of deep kearning
    is the massive amount of data that is available by 2018, which has been gathered
    over the past years and decades. This enables neural networks to really show their
    potential, since they get better the more data you put into them. We have questioned
    whether the huge amount of data is useful for machine learning too, but unfortunately
    not. Traditional machine learning algorithms will certainly reach a level where
    more data doesn’t improve their performance.'
  id: totrans-170
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*数据*：到2018年，由于过去几年和几十年收集的大量数据，深度学习的普及率有所提高。这使得神经网络真正显示出它们的潜力，因为它们放入的数据越多，它们就越好。我们质疑了大量的数据是否对机器学习也有用，但不幸的是不是。传统的机器学习算法肯定会达到一个水平，更多的数据不会提高它们的性能。'
- en: '*The power*: The computational power available nowadays enables us to process
    more data.'
  id: totrans-171
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*力量*：现在的计算能力使我们能够处理更多的数据。'
- en: '*The algorithms*: These recent breakthroughs in the development of algorithms
    are mostly due to making them run much faster than before; optimization and parallelism
    also made the dream come true.'
  id: totrans-172
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*算法*：这些算法发展的最新突破主要归功于使它们运行得比以前快得多；优化和并行性也使梦想成真。'
- en: '*The marketing*: Neural networks were around for decades (proposed in 1944
    for the first time) and already had some hype but also faced times where no one
    wanted to believe and invest in them. The phrase “deep learning” gave it a new
    fancy name, which made a new hype possible. This means that deep learning isn''t
    a newly created field; you should know that it has been redeveloped again in a
    new decade.'
  id: totrans-173
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*营销*：神经网络已经存在了几十年（1944年首次提出）并且已经有一些炒作，但也面临过没有人愿意相信和投资它们的时期。“深度学习”给它起了一个新的时髦名字，这使得新的炒作成为可能。这意味着深度学习不是一个新创建的领域；你应该知道它已经在新的十年里被重新开发。'
- en: Deep learning comes more popular, since machine learning algorithms require
    labeled data, they aren’t suitable to solve complex queries which involve a huge
    amount of data.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习越来越受欢迎，因为机器学习算法需要标记数据，它们不适用于解决涉及大量数据的复杂查询。
- en: Disadvantages of Deep Learning (Cost of Greatness)
  id: totrans-175
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 深度学习的缺点（伟大的代价）
- en: What should be known is that deep learning requires much more data than a traditional
    machine learning algorithm.
  id: totrans-176
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 应该知道的是，深度学习比传统的机器学习算法需要更多的数据。
- en: A neural network is Black Box, meaning that you don’t know how and why your
    neural network came up with a certain output.
  id: totrans-177
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 神经网络是黑盒，这意味着你不知道你的神经网络是如何以及为什么得出某个特定输出的。
- en: 'Duration of development: it takes a lot of time to develop a neural network.
    Although there are libraries like Keras out there, which make the development
    of neural networks fairly simple, you sometimes need more control over the details
    of the algorithm. For example, when you try to solve a difficult problem with
    machine learning that no one has ever done before, you probably use TensorFlow
    (which we will talk about in detail in this book).'
  id: totrans-178
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 开发时长：开发一个神经网络需要花费很多时间。尽管有像Keras这样的库，使得神经网络的开发相对简单，但你有时需要更多控制算法的细节。例如，当你试图用机器学习解决一个以前没有人做过的问题时，你可能使用TensorFlow（我们将在本书中详细介绍）。
- en: Neural networks are also more computationally expensive than traditional algorithms.
    State-of-the art deep learning algorithms, which realize successful training of
    bottomless neural networks, can take several weeks to train completely from scratch
    (don't worry; this is solved using transfer learning techniques) .
  id: totrans-179
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 与传统算法相比，神经网络在计算上更昂贵。最先进的深度学习算法，实现无底神经网络的成功训练，可能需要几周时间从头开始完全训练（不用担心；这可以通过迁移学习技术解决）。
- en: Introduction to Deep Learning
  id: totrans-180
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 深度学习简介
- en: So, *what is deep learning?* It’s fair enough to answer that question by saying
    that deep learning just means machine learning using deep neural networks. Deep
    learning is a subset of machine learning but using a human brains representation;
    scientists try to simulate what human brains do by creating some algorithms. Many
    people say that neural networks (NNs) and deep neural networks (DNNs) are a new
    approach.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，*什么是深度学习？* 通过说深度学习只是使用深度神经网络的机器学习来回答这个问题是公平的。深度学习是机器学习的一个子集，但使用人类大脑的表示；科学家们通过创建一些算法来尝试模拟人类大脑的工作。许多人说神经网络（NNs）和深度神经网络（DNNs）是一种新的方法。
- en: Let’s go back to the History of the neural network. The history of Ddeep learning
    can be traced back to 1943, when Walter Pitts and Warren McCulloch created a computer
    model based on the neural networks of the human brain. They used a combination
    of algorithms and mathematics they called “threshold logic” to mimic the thought
    process.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回顾一下神经网络的历史。深度学习的起源可以追溯到1943年，当时沃尔特·皮茨（Walter Pitts）和沃伦·麦克洛奇（Warren McCulloch）基于人脑神经网络创建了一个计算机模型。他们使用了一种他们称之为“阈值逻辑”的算法和数学组合来模拟思维过程。
- en: Then in 1965, Alexey Grigoryevich Ivakhnenko (developer of the group method
    of data handling) and Valentin Grigor′evich Lapa (author of *Cybernetics and Forecasting
    Techniques*) used models with polynomial activation functions that were then analyzed
    statistically. From each layer, the best statistically chosen features were then
    forwarded on to the next layer.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，在1965年，亚历克谢·格里戈里耶维奇·伊瓦赫涅科（数据处理的组方法开发者）和瓦伦丁·格里戈里耶维奇·拉帕（*控制论与预测技术*的作者）使用了具有多项式激活函数的模型，这些模型随后被统计地分析。从每一层，最佳统计选择的特征随后被转发到下一层。
- en: 1985-1990s is the second winter of AI and deep learning. Deep learning has its
    own researchers; they gave more attention to deep learning.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 1985-1990年代是人工智能和深度学习的第二个冬天。深度学习有自己的研究人员；他们更多地关注深度学习。
- en: In 1995, Dana Cortes and Vladimir Vapnik developed the support vector machine
    (a system for mapping and recognizing similar data).
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 在1995年，达娜·科尔特斯（Dana Cortes）和弗拉基米尔·瓦普尼克（Vladimir Vapnik）开发了支持向量机（一种映射和识别相似数据的系统）。
- en: LSTM (long short-term memory) for recurrent neural networks (RNNs) was developed
    in 1997 by Sepp Hochreiter and Juergen Schmidhuber.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: LSTM（长短期记忆）用于循环神经网络（RNNs）是在1997年由塞普·霍克瑞特（Sepp Hochreiter）和尤尔根·施米德胡贝尔（Juergen
    Schmidhuber）开发的。
- en: We don’t need to spend all our time in the history of deep learning and how
    it is raising our world these days, but we wanted to show that deep learning wasn’t
    invented in our days. We gave you some references to the history. Now is the time
    for deep learning.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不需要把所有时间都花在深度学习的历史以及它是如何改变我们今天的世界上，但我们想表明深度学习并不是在我们这个时代发明的。我们给你提供了一些关于历史的参考资料。现在是深度学习的时候了。
- en: Deep learning is based on the way the human brain processes information and
    learns. It consists of a machine learning model composed of several levels of
    representation, in which every level uses the information from the previous level
    to learn deeply. Deep learning consists of neural networks, neural networks consists
    of layers, and layers consist of hidden units called **perceptrons** .
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习基于人类大脑处理信息和学习的方式。它由一个由多个表示层组成的机器学习模型组成，其中每一层都使用前一层的信息来深入学习。深度学习由神经网络组成，神经网络由层组成，层由称为**感知器**的隐藏单元组成。
- en: Now let’s see the previous structure when we put them together. First, we should
    see the types of neural networks, which will allow us to understand the previous
    structure. We have two main types of neural network (shallow and deep). Table
    [1-3](#Tab3) shows the difference between them.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们看看当我们将它们组合在一起时的先前结构。首先，我们应该了解神经网络的类型，这将使我们能够理解先前结构。我们有两种主要的神经网络类型（浅层和深层）。表[1-3](#Tab3)显示了它们之间的区别。
- en: Table 1-3
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 表1-3
- en: Shallow vs. Deep Neural Networks
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 浅层与深层神经网络
- en: '| Shallow | Deep |'
  id: totrans-192
  prefs: []
  type: TYPE_TB
  zh: '| 浅层 | 深层 |'
- en: '| --- | --- |'
  id: totrans-193
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| The word “shallow” means NOT DEEP; it has only one hidden layer. | The word
    “deep” means it has many hidden units. |'
  id: totrans-194
  prefs: []
  type: TYPE_TB
  zh: '| “浅层”一词意味着“不深”；它只有一个隐藏层。 | “深层”一词意味着它有许多隐藏单元。 |'
- en: 'Now we know the difference between shallow and deep. But what is a unit? What
    is a layer? Which is the main factor of comparison? And what are the types of
    layers? This is the start for deep learning; we should begin with basic function
    and go up to the complex module. Let’s start with the unit, the simplest function
    of deep learning; it contains the approach of machine learning (supervised, unsupervised,
    semisupervised, and reinforcement). It may have an activation function (we will
    explore it later), like logistic regression, or regression function, or clustering
    function and so on. This shows that deep learning is a subset of machine learning;
    for now, it’s a good explanation for the unit of a deep learning layer. Then,
    when we have more than one unit together, we create something called a layer:
    every unit is connected with the units in the previous layer (which is called
    a fully connected neural network). We have three types of layers (input, hidden
    (encoders), and output), so after we make units of the input layer and connect
    it with input data, and create new units for the next layer and connect it with
    the input and output layers this network is called a shallow neural network. But
    if we connect this hidden layer with another hidden layer, we will have a deep
    neural network. It seems simple enough to understand the difference between deep
    and shallow neural networks. But let’s see an image to better understand the difference
    (Figure [1-9](#Fig9)).'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们知道了浅层和深层的区别。但什么是单元？什么是层？比较的主要因素是什么？层的类型有哪些？这是深度学习的起点；我们应该从基本功能开始，逐步过渡到复杂模块。让我们从单元开始，这是深度学习中最简单的功能；它包含了机器学习的各种方法（监督学习、无监督学习、半监督学习和强化学习）。它可能包含一个激活函数（我们将在后面探讨），比如逻辑回归、回归函数或聚类函数等等。这表明深度学习是机器学习的一个子集；目前，这是对深度学习层单元的一个很好的解释。然后，当我们有多个单元组合在一起时，我们创建了一个称为层的东西：每个单元都与前一层的单元相连（这被称为全连接神经网络）。我们有三种类型的层（输入、隐藏（编码器）和输出），因此在我们创建输入层的单元并将其与输入数据连接，并为下一层创建新的单元并将其与输入和输出层连接后，这个网络被称为浅层神经网络。但如果我们把这个隐藏层与另一个隐藏层连接起来，我们就会得到一个深层神经网络。理解深层和浅层神经网络之间的区别似乎很简单。但让我们通过一张图片来更好地理解这种区别（图[1-9](#Fig9))。
- en: '![../images/484548_1_En_1_Chapter/484548_1_En_1_Fig9_HTML.jpg](Images/484548_1_En_1_Fig9_HTML.jpg)'
  id: totrans-196
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_1_Chapter/484548_1_En_1_Fig9_HTML.jpg](Images/484548_1_En_1_Fig9_HTML.jpg)'
- en: Figure 1-9
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-9
- en: The difference between shallow and deep neural networks
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 浅层与深层神经网络的区别
- en: 'Now let’s see the types of deep neural networks:'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来看看深层神经网络的类型：
- en: Feedforward neural network
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 前馈神经网络
- en: Radial basis function neural network
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 径向基函数神经网络
- en: Multilayer perceptron
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 多层感知器
- en: Convolutional neural network
  id: totrans-203
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 卷积神经网络
- en: Recurrent neural network—Long short-term memory
  id: totrans-204
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 循环神经网络——长短期记忆
- en: Modular neural network
  id: totrans-205
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模块化神经网络
- en: Sequence to sequence models
  id: totrans-206
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 序列到序列模型
- en: These are the most common neural networks in deep learning. We will talk about
    some of them in the next chapters in this book, but for now, we can learn their
    names and get motivated to understand them in detail.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是深度学习中最常见的神经网络。我们将在本书的下一章中讨论其中的一些，但到目前为止，我们可以学习它们的名称，并激发我们深入了解它们的兴趣。
- en: 'The most common applications in deep learning:'
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习中最常见的应用：
- en: Computer vision and image processing research (e.g., self-driving cars).
  id: totrans-209
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算机视觉和图像处理研究（例如，自动驾驶汽车）。
- en: Natural language processing (speech recognition, machine translation, and natural
    language understanding)
  id: totrans-210
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自然语言处理（语音识别、机器翻译和自然语言理解）
- en: Recommendation engines
  id: totrans-211
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 推荐引擎
- en: Automatic colorization
  id: totrans-212
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自动着色
- en: Advertising, such as social media ads and user-targeted ads
  id: totrans-213
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 广告，例如社交媒体广告和用户定位广告
- en: Machine Learning Mathematical Notations
  id: totrans-214
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 机器学习数学符号
- en: After introducing the field of deep learning to you, we need to collect some
    math notations that will be used to prove or conclude some theories. We do not
    use this book for mathematical proofs or rigorous explanations, but we go more
    into practical aspects. We will use these math notations to write down some equations
    that explain why we make something in a certain way, not in another one. So let’s
    start now; in Table [1-4](#Tab4) we’ve tried to collect all the notations that
    we need in this book.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 在向您介绍深度学习领域之后，我们需要收集一些将用于证明或得出某些理论的数学符号。我们不使用这本书进行数学证明或严格的解释，而是更深入地探讨实际方面。我们将使用这些数学符号来写下一些方程，解释为什么我们以某种方式而不是另一种方式做某事。那么，现在就开始吧；在表
    [1-4](#Tab4) 中，我们尝试收集了这本书中所需的所有符号。
- en: '*X*[*i*, *j*] is a notation for a constant, the smallest element in a matrix;
    or we can say it’s the basic notation in a vector, which we use to build the vector.
    So what is a vector? But first, let’s talk about the subscript values (i,j); they
    are indexing values. *i*^(*th*) is an index for rows and *j*^(*th*) is an index
    for columns, to allow us to get the specific value from the vector. Let’s see
    about vectors.'
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: '*X*[*i*, *j*] 是一个表示常数的符号，矩阵中的最小元素；或者说，它是向量中的基本符号，我们用它来构建向量。那么什么是向量呢？但首先，让我们谈谈下标值（i,j）；它们是索引值。*i*^(*th*)
    是行的索引，*j*^(*th*) 是列的索引，以便我们能从向量中获取特定值。让我们来看看向量。'
- en: 'While *X*[*i*] is a notation for a group of constants grouped together to make
    a variable called a vector, in the vector we mentioned before about indexing we
    have *i*^(*th*) and *j*^(*th*) indexes. But *X*[*i*] has only subscript *i*^(*th*);
    this means that we have only one row in the vector or we have only one column.
    For instance, if we have one row and multiple columns, we will see it like this:
    *X*[1, *j*]. This *j* means you iterate over columns. On the other hand, if we
    have one column and many rows, we will see it like this: *X*[*i*, 1]. This *i*
    means you iterate over rows. Let’s make it easier: in an array you have rows and
    columns. If you have only one column and many rows, then *X*[*i*][0]; if you have
    one row and many columns, then *X* [0][ *j*].'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 当 *X*[*i*] 是一个表示一组常数组合成变量（向量）的符号时，在我们之前提到的关于索引的向量中，我们有 *i*^(*th*) 和 *j*^(*th*)
    索引。但 *X*[*i*] 只有下标 *i*^(*th*)；这意味着我们在向量中只有一行，或者我们只有一列。例如，如果我们有一行和多列，我们会看到它像这样：*X*[1,
    *j*]。这里的 *j* 表示你遍历列。另一方面，如果我们有一列和多行，我们会看到它像这样：*X*[*i*, 1]。这里的 *i* 表示你遍历行。让我们让它更简单：在一个数组中，你有行和列。如果你只有一列和多行，那么
    *X*[*i*][0]；如果你只有一行和多列，那么 *X* [0][ *j*]。
- en: 'Let’s go through this a bit more. If we get some constants together we have
    a Vector, so if we group some vectors together, *what will we see?* It’s The Matrix.
    ***X*** is a notation for a matrix, which is used to represent data in dimensions.
    When we say dimensions in matrices, we may mean columns and rows (in the case
    of a 2-D matrix), or maybe spaces like 2-D space. On the other hand, we can’t
    say this matrix is 2-D when we have two columns and say 3-D when we have three
    columnss: it is not true at all. Next, let’s see some you some special types of
    Matrices:'
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们再深入一点。如果我们把一些常数放在一起，我们得到一个向量，所以如果我们把一些向量放在一起，*我们会看到什么？* 是矩阵。***X*** 是矩阵的符号，用于在维度中表示数据。当我们说矩阵中的维度时，我们可能是指列和行（在二维矩阵的情况下），或者可能是像二维空间这样的空间。另一方面，当我们有两个列时，我们不能说这个矩阵是二维的，当我们有三个列时，我们也不能说它是三维的：这完全是不正确的。接下来，让我们看看一些特殊的矩阵类型：
- en: '*I* denotes an identity matrix. An identity matrix is a matrix has its values
    with zeros; only the main diagonal values are ones.'
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: '*I* 表示一个单位矩阵。单位矩阵是一个其值为零的矩阵；只有主对角线上的值是1。'
- en: '*X* ^(*T*) is a transpose matrix. A transpose matrix is a good method for matrix
    multiplication or inverting the matrix. We don’t need to go into this complex
    algebra process, but you should know that it is a transpose matrix.'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: '*X* ^(*T*) 是一个转置矩阵。转置矩阵是矩阵乘法或矩阵求逆的好方法。我们不需要深入到这个复杂的代数过程，但你应该知道它是一个转置矩阵。'
