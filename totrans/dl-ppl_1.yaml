- en: '| 3 | 3d-tensor | tensor = [[[4], [3], [2]], [[6], [100], [4]], [[5], [1],
    [4]]] |'
  prefs: []
  type: TYPE_TB
- en: Tensor Shape
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'The TensorFlow documentation uses three notational conventions to describe
    tensor dimensionality: rank, shape, and dimension number. Table [3-2](#Tab2) shows
    how these relate to one another.'
  prefs: []
  type: TYPE_NORMAL
- en: Table 3-2
