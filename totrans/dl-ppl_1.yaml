- en: XOR Implementation Using TensorFlow
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Exclusive or exclusive disjunction is a logical operation that outputs true
    only when inputs differ (one is *true*, the other is *false*). We will learn something
    about it, but if you need to learn it in detail, you can read more about Boolean
    functions. In calculus, XOR is a solution for a gates problem: *A* ⊕ *B* = (*A U B*) ^ (~*A U*~*B*).
    Let’s see how it works (Table [4-2](#Tab2)).'
  prefs: []
  type: TYPE_NORMAL
- en: Table 4-2
  prefs: []
  type: TYPE_NORMAL
- en: The input and output of the XOR gate
  prefs: []
  type: TYPE_NORMAL
- en: '| A | B | A XOR B |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| 0 | 0 | 0 |'
  prefs: []
  type: TYPE_TB
- en: '| 0 | 1 | 1 |'
  prefs: []
  type: TYPE_TB
- en: '| 1 | 0 | 1 |'
  prefs: []
  type: TYPE_TB
- en: '| 1 | 1 | 0 |'
  prefs: []
  type: TYPE_TB
- en: This a short explanation about the XOR gate, but it’s not our aim to discuss
    the XOR gate; our aim is to use TensorFlow to make a model XOR. Let’s start some
    code.
  prefs: []
  type: TYPE_NORMAL
- en: We don’t need to reexplain these lines of code again, as we just explained it
    in the linear regression example. And as always, we will start by importing the
    needed packages.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE46]'
  prefs: []
  type: TYPE_PRE
- en: Let’s construct the dataset as a table. We will make both A and B as columns
    in `X_train` and the result of the A XOR B function as `y_train`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE47]'
  prefs: []
  type: TYPE_PRE
- en: Then we will create the placeholders that we will enter the data with in the
    model. We will create one called `X` for the `X_train` with shape 4∗2—because
    it has 4 rows and 2 columns, and `y` for `y_train` with shape 4∗1—because it has
    4 rows and it is one column. Both will have the same name of variables.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE48]'
  prefs: []
  type: TYPE_PRE
- en: Let’s construct some variables, like the number of training examples (number
    of rows) and features we have in our dataset (number of columns) and some hyperparameters,
    like learning rate and number of units in our model hidden layer.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE49]'
  prefs: []
  type: TYPE_PRE
- en: To build the model that should solve the XOR problem, we need to add new things
    like *theta* and *hidden layers*, and of course, we described the *activation
    functions* before. So, don’t worry about this complex code; we’ll explain this
    code in.
  prefs: []
  type: TYPE_NORMAL
- en: The neural network mainly is composed of layers, so each layer is connected
    by another layer. Hence, we can define every layer as the output of the earlier
    or previous layer multiplied by some weights, and we add some bias to it too.
    For instance, layer one *Z*[1] is equal to the output of the previous layer, which
    is *A*[0] or the input *X* multiplied by its weights *W*[1] and then bias *b*[1]
    is added. After this, the output of this layer goes through the activation function
    before sending it to the next layer *A*[1] = *Sigmoid*(*Z*[1]). And the process
    is repeated for the next layer.
  prefs: []
  type: TYPE_NORMAL
- en: 'So, let do one last and fast recap: in the first layer *Z*[1] = *W*[1] ∗ *X* + *b*[1],
    and then *A*[1] = *Sigmoid*(*Z*[1]). In the next layer, or we can call it the
    hidden layer, *Z*[2] = *W*[2] ∗ *A*[1] + *b*[2], and then *A*[2] = *Sigmoid*(*Z*[2]).
    So please remember this function, and we will discuss the activation function
    and the weights and hyperparameters in a later chapter. But for now, we want you
    to see an end-to-end example.'
  prefs: []
  type: TYPE_NORMAL
- en: Now, let us write the model code that does the same as we described in the preceding
    equations. We start by building the model in a scope called *Model*; using `tf.name_scope`
