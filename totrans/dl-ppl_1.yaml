  id: totrans-673
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  id: totrans-674
  prefs: []
  type: TYPE_TB
- en: '| 0 | Scalar | scalar = 1000 |'
  id: totrans-675
  prefs: []
  type: TYPE_TB
- en: '| 1 | Vector | vector = [2, 8, 3] |'
  id: totrans-676
  prefs: []
  type: TYPE_TB
- en: '| 2 | Matrix | matrix = [[4, 2, 1], [5, 3, 2], [5, 5, 6]] |'
  id: totrans-677
  prefs: []
  type: TYPE_TB
- en: '| 3 | 3d-tensor | tensor = [[[4], [3], [2]], [[6], [100], [4]], [[5], [1],
    [4]]] |'
  id: totrans-678
  prefs: []
  type: TYPE_TB
- en: Tensor Shape
  id: totrans-679
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'The TensorFlow documentation uses three notational conventions to describe
    tensor dimensionality: rank, shape, and dimension number. Table [3-2](#Tab2) shows
    how these relate to one another.'
  id: totrans-680
  prefs: []
  type: TYPE_NORMAL
- en: Table 3-2
  id: totrans-681
  prefs: []
  type: TYPE_NORMAL
- en: The Tensor Shape with Example
  id: totrans-682
  prefs: []
  type: TYPE_NORMAL
- en: '| Rank | Shape | Dimension Number | Example |'
  id: totrans-683
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- |'
  id: totrans-684
  prefs: []
  type: TYPE_TB
- en: '| 0 | [ ] | 0 | Scaler = 10 |'
  id: totrans-685
  prefs: []
  type: TYPE_TB
- en: '| 1 | [d0] | 1 | Vector = [4] |'
  id: totrans-686
  prefs: []
  type: TYPE_TB
- en: '| 2 | [d0, d1] | 2 | Matrix = [2, 2] |'
  id: totrans-687
  prefs: []
  type: TYPE_TB
- en: '| 3 | [d0, d1, d2] | 3 | Tensor = [2, 2, 4] |'
  id: totrans-688
  prefs: []
  type: TYPE_TB
- en: '| n | [d0, ..., dn-1] | D |   |'
  id: totrans-689
  prefs: []
  type: TYPE_TB
- en: Summary
  id: totrans-690
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now let’s do a brief recap about what we’ve seen and learned in this chapter.
    First we learned what deep learning is and about its approach, which is a subset
    of machine learning. We learned the basic function tools to build layers, which
    combine together to make a deep learning architecture. Finally, we went through
    the pipeline to give you a view about where the book will go, and what you will
    learn when you get into chapters that define it in detail. After finishing this
    chapter, we hope you found it valuable.
  id: totrans-691
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们简要回顾一下在本章中我们看到和学到的内容。首先，我们学习了深度学习是什么以及其方法，它是机器学习的一个子集。我们学习了构建层的基函数工具，这些层组合在一起构成了深度学习架构。最后，我们通过流程来给你一个关于本书将走向何方以及你将在详细定义它的章节中学到什么的看法。完成本章后，我们希望你觉得它很有价值。
- en: 4. Build Your First Toy TensorFlow app
  id: totrans-692
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 4. 构建您的第一个玩具TensorFlow应用程序
- en: 'In the previous chapter, we answered important questions you have to know before
    continuing reading the book, such as: *what is TensorFlow?*, *what makes it very
    valuable like this?*, and *is TensorFlow easy to learn?* All these questions come
    to your mind and many developers too, when you see a TensorFlow word, but yes,
    TensorFlow is a very valuable package in deep learning. However, there are many
    packages like it that are compatible with deep learning.'
  id: totrans-693
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一章中，我们回答了您在继续阅读本书之前必须知道的重要问题，例如：*什么是TensorFlow？*，*是什么让它如此有价值？*，以及*TensorFlow容易学习吗？*
    当你看到TensorFlow这个词时，这些问题会出现在你的脑海中，许多开发者也会有同样的疑问，但是的，TensorFlow是深度学习中的一个非常有价值的包。然而，还有许多与深度学习兼容的类似包。
- en: In this chapter, we continue introducing the important concepts you need in
    TensorFlow. We introduce the usage of TensorFlow in the field of deep learning,
    and how this library helps us a lot by giving us the necessary components and
    functions that represent the building blocks for any deep learning model. Also,
    we give you two small examples of how to build a tiny neural network with TensorFlow.
    So, let us get started.
  id: totrans-694
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们继续介绍您在TensorFlow中需要的重要概念。我们介绍了TensorFlow在深度学习领域的应用，以及这个库如何通过提供必要的组件和函数来帮助我们构建任何深度学习模型的构建块。此外，我们还提供了两个使用TensorFlow构建小型神经网络的示例。那么，让我们开始吧。
- en: Basic Development of TensorFlow
  id: totrans-695
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: TensorFlow的基本开发
- en: Let us consider another approach, teaching you all the needed TensorFlow functionalities
    by walking through examples. We will start by warming up, and then we will go
    to the hard parts bit by bit.
  id: totrans-696
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑另一种方法，通过示例向您展示所有需要的TensorFlow功能。我们将从热身开始，然后逐步进入难点部分。
- en: Hello World with TensorFlow
  id: totrans-697
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用TensorFlow的Hello World
- en: To be fair enough, it’s good to understand TensorFlow by seeing a working example
    of it, so we will go through the advanced part of TensorFlow by giving it to you
    in small examples.
  id: totrans-698
  prefs: []
  type: TYPE_NORMAL
  zh: 为了公平起见，通过查看TensorFlow的工作示例来理解TensorFlow是很好的，因此我们将通过给出的小示例来介绍TensorFlow的高级部分。
- en: So, the first example is to warm up the information we gave you in *Chapter*
    [2](484548_1_En_2_Chapter.xhtml), we will build a small app that outputs the words
    “Hello, TensorFlow!”
  id: totrans-699
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，第一个示例是为了回顾我们在*第二章* [2](484548_1_En_2_Chapter.xhtml)中给出的信息，我们将构建一个输出“Hello,
    TensorFlow！”的小应用程序。
- en: As you see, we first import the `print_function` from the `__future__` module
    to make the `print` of Python 2 callable as the `print` function in Python 3\.
    After this, we of course have to import `TensorFlow` as `tf`, the popular alias
    we talked in a previous chapter. Then we initiate the `hello` variable that equals
    the `tf.constant`, and we set it to the word we need to print. Last, we create
    the session that we will use to run the whole program and we run it to print in
    the last line.
  id: totrans-700
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你所见，我们首先从`__future__`模块中导入`print_function`，以便Python 2中的`print`可以像Python 3中的`print`函数一样调用。之后，我们当然必须导入`TensorFlow`作为`tf`，这是我们之前章节中提到的流行别名。然后我们初始化`hello`变量，它等于`tf.constant`，并将其设置为需要打印的单词。最后，我们创建一个会话，我们将使用它来运行整个程序，并在最后一行打印它。
- en: '[PRE25]'
  id: totrans-701
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: 'So, when I first see this piece of code, I may have a question: *what is the*
    `tf.constant`*?* It is a good question, and `tf.constant` is one of many tensor
    type variables. But this one has an advantage, as indicated by its name: it cannot
    change its value through the runtime of the program. A constant has the following
    arguments, which can be tweaked as required to get the desired function.'
  id: totrans-702
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，当我第一次看到这段代码时，我可能会有一个疑问：*什么是* `tf.constant`*？* 这是一个好问题，`tf.constant`是许多张量类型变量之一。但这个有一个优势，正如其名称所示：它不能在程序运行时改变其值。一个常量有以下参数，可以根据需要调整以获得所需的功能。
- en: '`value`: A constant value (or list) of output type *dtype*'
  id: totrans-703
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`value`：输出类型的常量值（或列表）*dtype*'
- en: '`dtype`: The type of the elements of the resulting tensor'
  id: totrans-704
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`dtype`：结果张量元素的类型'
- en: '`shape`: Optional dimensions of the resulting tensor'
  id: totrans-705
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`shape`：结果张量的可选维度'
- en: '`name`: Optional name for the tensor'
  id: totrans-706
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`name`：张量的可选名称'
- en: Simple Iterations
  id: totrans-707
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 简单迭代
- en: Now we have warmed up with the previous example; what we saw in this example,
    we discussed in Chapter [2](484548_1_En_2_Chapter.xhtml) (constant, session).
  id: totrans-708
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经通过前面的例子进行了预热；在这个例子中我们看到的内容，我们在第 [2](484548_1_En_2_Chapter.xhtml) 章节中进行了讨论（常量、会话）。
- en: So we need something new, and a bit harder; we need to see what more TensorFlow
    can do. We now have a session, constant, and variables.
  id: totrans-709
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们需要一些新的，并且稍微复杂一些的东西；我们需要看看 TensorFlow 还能做什么。我们现在有一个会话、常量和变量。
- en: In the next example, we learn to make loops in TensorFlow and make updates to
    certain variables. These variables simulate the model weights, and loops simulate
    the epochs that update the model weights.
  id: totrans-710
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一个例子中，我们学习如何在 TensorFlow 中创建循环并更新某些变量。这些变量模拟模型权重，而循环模拟更新模型权重的轮次。
- en: '[PRE26]'
  id: totrans-711
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: Note
  id: totrans-712
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: In this code example we did not import the TensorFlow, as we assume that you
    imported it in the previous example and both are in the same Python session.
  id: totrans-713
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个代码示例中，我们没有导入 TensorFlow，因为我们假设你在前面的例子中已经导入了它，并且它们都在同一个 Python 会话中。
- en: 'First things first: we created the `var` variable and initiated it with `tf.Variable`
    with 0 value, then we created the `add_operation` variable that is a TensorFlow
    addition block or operation. After that we initiated the `update_operation` with
    `tf.assign(var, add_operation)`, which simply updates the `var` variable by reference
    using the `add_operation` function, and all that happens when you call the `update_operation`
    variable.'
  id: totrans-714
  prefs: []
  type: TYPE_NORMAL
  zh: 首先：我们创建了 `var` 变量，并使用 `tf.Variable` 和 0 值对其进行初始化，然后我们创建了 `add_operation` 变量，它是一个
    TensorFlow 加法块或操作。之后，我们使用 `tf.assign(var, add_operation)` 初始化 `update_operation`，这简单地通过引用使用
    `add_operation` 函数更新 `var` 变量，所有这些都是在调用 `update_operation` 变量时发生的。
- en: Now it’s time for creating the session, but if you noticed, we created the session
    within the `with` block. Why did we do that? The reason is that after initiating
    and running each session, we have to close it to free all the resources reserved
    by the program or by the TensorFlow graph. After that we ran the session `sess.run(tf.global_variables_initializer())`
    and you can see the weird `tf.global_variables_initializer()` function ; the main
    job of this function is to initialize all variables in the TensorFlow graph. So,
    if you run `tf.Variable` or `tf.Placeholder`—and we will see what it is later—you
    will see an error and that’s due to the uninitiated variables. And last, we do
    a simple loop that iterates and updates the `var` variable by running `update_operation`.
  id: totrans-715
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是创建会话的时候了，但如果你注意到了，我们是在 `with` 块中创建会话的。我们为什么要这样做？原因是在初始化和运行每个会话之后，我们必须关闭它以释放程序或
    TensorFlow 图保留的所有资源。之后，我们运行了 `sess.run(tf.global_variables_initializer())`，你可以看到奇怪的
    `tf.global_variables_initializer()` 函数；这个函数的主要任务是初始化 TensorFlow 图中的所有变量。所以，如果你运行
    `tf.Variable` 或 `tf.Placeholder`（我们稍后会看到它是什么）——你会看到一个错误，这是由于未初始化的变量引起的。最后，我们进行了一个简单的循环，通过运行
    `update_operation` 来迭代并更新 `var` 变量。
- en: 'So, how does this simulate a real-world deep learning model? When you train
    a model, you use variables to hold and update parameters. Variables are in-memory
    buffers containing tensors. We know about tensors from Chapter [2](484548_1_En_2_Chapter.xhtml),
    so the question is: *is the tensor in the previous example a variable or constant?*
    It can’t be a constant type tensor, so we have to use `tf.Variable` because we
    need a form of tensors that can be updated in the runtime of our TensorFlow graph.'
  id: totrans-716
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，如何模拟一个真实的深度学习模型呢？当你训练一个模型时，你使用变量来保存和更新参数。变量是包含张量的内存缓冲区。我们从第 [2](484548_1_En_2_Chapter.xhtml)
    章节中了解了张量，所以问题是：*前一个例子中的张量是变量还是常量？* 它不能是常量类型张量，因此我们必须使用 `tf.Variable`，因为我们需要一个可以在
    TensorFlow 图的运行时更新的张量形式。
- en: Prepare the Input Data
  id: totrans-717
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 准备输入数据
- en: 'Going a bit further, we need to simulate the input data for any model in TensorFlow.
    One may question how the user can enter any data to the model. We will make it
    harder; we will enter an image to TensorFlow. Using the `imread` command in **matplotlib**,
    we import a digital image in standard format colors (JPG, PNG, BMP, TIF):'
  id: totrans-718
  prefs: []
  type: TYPE_NORMAL
  zh: 再进一步，我们需要为 TensorFlow 中的任何模型模拟输入数据。有人可能会质疑用户如何将任何数据输入到模型中。我们将使它更难；我们将向 TensorFlow
    输入一张图片。使用 **matplotlib** 中的 `imread` 命令，我们导入标准格式的数字图像（JPG、PNG、BMP、TIF）：
- en: '[PRE27]'
  id: totrans-719
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: 'However, we can see the rank and the shape of the tensor:'
  id: totrans-720
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们可以看到张量的秩和形状：
- en: '[PRE28]'
  id: totrans-721
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: 'You’ll see the output, which is `(220, 220, 3)`. This means the image is 220
    pixels high, 220 pixels wide, and 3 colors (red, green, blue) deep. Finally, using
    matplotlib, it is possible to visualize the imported image (Figure [4-1](#Fig1)):'
  id: totrans-722
  prefs: []
  type: TYPE_NORMAL
  zh: 您将看到输出，它是 `(220, 220, 3)`。这意味着图像高度为 220 像素，宽度为 220 像素，深度为 3 种颜色（红色、绿色、蓝色）。最后，使用
    matplotlib，可以可视化导入的图像（图 [4-1](#Fig1)）：
- en: '![../images/484548_1_En_4_Chapter/484548_1_En_4_Fig1_HTML.jpg](Images/484548_1_En_4_Fig1_HTML.jpg)'
  id: totrans-723
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_4_Chapter/484548_1_En_4_Fig1_HTML.jpg](Images/484548_1_En_4_Fig1_HTML.jpg)'
- en: Figure 4-1
  id: totrans-724
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-1
- en: The code output of the lena image
  id: totrans-725
  prefs: []
  type: TYPE_NORMAL
  zh: lena 图像的代码输出
- en: '[PRE29]'
  id: totrans-726
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: 'In this example, `slice` is a bidimensional segment of the starting image,
    where each pixel has the RGB components, so we need a placeholder to store all
    the values of the slice:'
  id: totrans-727
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，`slice` 是起始图像的二维段，其中每个像素都有 RGB 分量，因此我们需要一个占位符来存储切片的所有值：
- en: '[PRE30]'
  id: totrans-728
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: 'For the last dimension, we’ll need only three values. Then we use the TensorFlow
    operator slice to create a subimage:'
  id: totrans-729
  prefs: []
  type: TYPE_NORMAL
  zh: 对于最后一个维度，我们只需要三个值。然后我们使用 TensorFlow 操作 slice 创建子图像：
- en: '[PRE31]'
  id: totrans-730
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: 'The last step is to build a TensorFlow working session, an extra thing than
    the last example you saw. When we run the session, we need to feed it the placeholder
    we have (the data we have); we can do this by sending all the data to `feed_dict`,
    which will feed the input to the session (or your model perhaps):'
  id: totrans-731
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一步是构建一个 TensorFlow 工作会话，这比您之前看到的例子多了一步。当我们运行会话时，我们需要向它提供我们有的占位符（我们有的数据）；我们可以通过将所有数据发送到
    `feed_dict` 来完成此操作，这将向会话（或您的模型）提供输入：
- en: '[PRE32]'
  id: totrans-732
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: '![../images/484548_1_En_4_Chapter/484548_1_En_4_Fig2_HTML.jpg](Images/484548_1_En_4_Fig2_HTML.jpg)'
  id: totrans-733
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_4_Chapter/484548_1_En_4_Fig2_HTML.jpg](Images/484548_1_En_4_Fig2_HTML.jpg)'
- en: Figure 4-2
  id: totrans-734
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-2
- en: The resulting shape is then as the image shows
  id: totrans-735
  prefs: []
  type: TYPE_NORMAL
  zh: 结果形状如图所示
- en: To recap, we put a summary of the tf.Placeholder and tf.Variable in Table [4-1](#Tab1).
  id: totrans-736
  prefs: []
  type: TYPE_NORMAL
  zh: 总结一下，我们在表 [4-1](#Tab1) 中对 tf.Placeholder 和 tf.Variable 进行了总结。
- en: Table 4-1
  id: totrans-737
  prefs: []
  type: TYPE_NORMAL
  zh: 表 4-1
- en: A Comparison Between tf.Placeholder and tf.Variable
  id: totrans-738
  prefs: []
  type: TYPE_NORMAL
  zh: tf.Placeholder 与 tf.Variable 的比较
- en: '| Placeholder | Variable |'
  id: totrans-739
  prefs: []
  type: TYPE_TB
  zh: '| 占位符 | 变量 |'
- en: '| --- | --- |'
  id: totrans-740
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| A placeholder is a node (same as a variable) whose value can be initialized
    in the future. These nodes basically output the value assigned to them during
    runtime. A placeholder node can be assigned using the tf.placeholder() class,
    to which you can provide arguments such as type of the variable and/or its shape.
    Placeholders are extensively used for representing the training dataset in a machine
    learning model, as the training dataset keeps changing. | A TensorFlow variable
    is the best way to represent a shared, persistent state manipulated by your program.
    Variables are manipulated via the tf.Variable class. Internally, a tf.Variable
    stores a persistent tensor. Specific operations allow you to read and modify the
    values of this tensor. These modifications are visible across multiple tf.Sessions,
    so multiple workers can see the same values for a tf.Variable. Variables must
    be initialized before using. |'
  id: totrans-741
  prefs: []
  type: TYPE_TB
  zh: '| 占位符是一个节点（与变量相同），其值可以在未来初始化。这些节点基本上在运行时输出分配给它们的值。占位符节点可以使用 tf.placeholder()
    类进行分配，您可以为它提供诸如变量类型和/或其形状之类的参数。占位符在机器学习模型中表示训练数据集时被广泛使用，因为训练数据集不断变化。 | TensorFlow
    变量是表示由您的程序操作的共享、持久状态的最佳方式。变量通过 tf.Variable 类进行操作。内部，tf.Variable 存储一个持久的张量。特定的操作允许您读取和修改此张量的值。这些修改在多个
    tf.Sessions 中可见，因此多个工作者可以看到 tf.Variable 的相同值。变量在使用之前必须进行初始化。 |'
- en: '| **Examples** |'
  id: totrans-742
  prefs: []
  type: TYPE_TB
  zh: '| **示例** |'
- en: '| A = tf.placeholder(tf.float32, shape=(None, 3))B = A + 5 | x = tf.Variable(3,
    name=“x”)y = tf.Variable(4, name=“y”) f = x*x*y + y + 2 |'
  id: totrans-743
  prefs: []
  type: TYPE_TB
  zh: '| A = tf.placeholder(tf.float32, shape=(None, 3))B = A + 5 | x = tf.Variable(3,
    name=“x”)y = tf.Variable(4, name=“y”) f = x*x*y + y + 2 |'
- en: Doing the Gradients
  id: totrans-744
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 进行梯度计算
- en: TensorFlow has functions to solve other more complex tasks. For example, we
    will use a mathematical operator that calculates the derivative of *y* with respect
    to its expression *x* parameter. For this purpose, we use the `tf.gradients()`
    function .
  id: totrans-745
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow 有用于解决其他更复杂任务的函数。例如，我们将使用一个数学运算符来计算 *y* 关于其表达式 *x* 参数的导数。为此，我们使用 `tf.gradients()`
    函数。
- en: 'Let us consider the math function *y* = 2*x*³. We want to compute the gradient
    ![$$ \frac{dx}{dy} $$](Images/484548_1_En_4_Chapter_TeX_IEq1.png) with respect
    to *x* = 1\. The following is the code to compute this gradient:'
  id: totrans-746
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑数学函数 *y* = 2*x*³。我们想要计算关于 *x* = 1 的梯度 ![$$ \frac{dx}{dy} $$](Images/484548_1_En_4_Chapter_TeX_IEq1.png)。以下是对该梯度进行计算的代码：
- en: '[PRE33]'
  id: totrans-747
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: So, what happens in the preceding code? Let us illustrate it step by step.
  id: totrans-748
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，前面的代码中发生了什么？让我们一步一步地说明。
- en: 'First, import the TensorFlow library: `import TensorFlow as tf`'
  id: totrans-749
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 首先，导入TensorFlow库：`import TensorFlow as tf`
- en: 'The x variable is the independent variable of the function: `x = tf.placeholder(tf.float32)`'
  id: totrans-750
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: x变量是函数的独立变量：`x = tf.placeholder(tf.float32)`
- en: 'Let’s build the function: `y = 2*x*x`'
  id: totrans-751
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 让我们构建函数：`y = 2*x*x`
- en: 'Finally, we call the `tf.gradients()` function with `y` and `x` as arguments:
    `grad = tf.gradients(y, x)`'
  id: totrans-752
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最后，我们使用`y`和`x`作为参数调用`tf.gradients()`函数：`grad = tf.gradients(y, x)`
- en: 'To evaluate the gradient, we must build a session: `with tf.Session() as session:`'
  id: totrans-753
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为了评估梯度，我们必须构建一个会话：`with tf.Session() as session:`
- en: 'The gradient will be evaluated on the variable x=1: `grad_val = session.run(var_grad,feed_dict={x:1})`'
  id: totrans-754
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 梯度将在变量x=1上评估：`grad_val = session.run(var_grad,feed_dict={x:1})`
- en: 'The grad_val value is the feed result, to be printed: `print(grad_val)`'
  id: totrans-755
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`grad_val`值是输出结果，需要打印：`print(grad_val)`'
- en: 'That gives the following result: `6.0`'
  id: totrans-756
  prefs: []
  type: TYPE_NORMAL
  zh: 这给出了以下结果：`6.0`
- en: Linear Regression
  id: totrans-757
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 线性回归
- en: In this section, we begin our exploration of machine learning techniques with
    the linear regression algorithm. Our goal is to build a model that is able to
    predict the values of a dependent variable from the values of one or more independent
    variables.
  id: totrans-758
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们开始用线性回归算法探索机器学习技术。我们的目标是构建一个模型，能够根据一个或多个自变量的值预测因变量的值。
- en: Why Linear Regression?
  id: totrans-759
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么是线性回归？
- en: It’s a basic machine learning algorithm. It’s very justifiable to start from
    there. First of all, it is a very plain algorithm, so the reader can grasp an
    understanding of fundamental machine learning concepts such as supervised learning,
    cost function, and gradient descent.
  id: totrans-760
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个基本的机器学习算法。从那里开始是非常合理的。首先，它是一个非常简单的算法，因此读者可以掌握基本机器学习概念的理解，例如监督学习、损失函数和梯度下降。
- en: Additionally, after learning linear regression, it is quite easy to understand
    the logistic regression algorithm, and believe it or not,  it is possible to categorize
    that one as a small neural network. It’s possible, yes; we can see it in the next
    chapters. In Part III we will see how neural networks work.
  id: totrans-761
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，在学习线性回归之后，理解逻辑回归算法相当容易，而且信不信由你，它甚至可以被归类为一个小的神经网络。是的，可能；我们将在下一章中看到这一点。在第三部分，我们将看到神经网络是如何工作的。
- en: What Is Linear Regression?
  id: totrans-762
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么是线性回归？
- en: Linear regression is a very common statistical method that allows us to learn
    a function or relationship from a given set of continuous data.
  id: totrans-763
  prefs: []
  type: TYPE_NORMAL
  zh: 线性回归是一种非常常见的统计方法，它允许我们从给定的一组连续数据中学习一个函数或关系。
- en: 'For example, we are given some data points of x and corresponding y, and we
    need to learn the relationship between them. That is called a hypothesis. The
    hypothesis is a statistical method that tries to predict the best model to fit
    the input data x. In the case of linear regression, the hypothesis is a straight
    line, as in the following:'
  id: totrans-764
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我们被给出一些x和相应的y的数据点，我们需要学习它们之间的关系。这被称为假设。假设是一种统计方法，试图预测最适合输入数据x的最佳模型。在线性回归的情况下，假设是一条直线，如下所示：
- en: '![$$ h(x)= wx+b $$](Images/484548_1_En_4_Chapter_TeX_Equa.png)'
  id: totrans-765
  prefs: []
  type: TYPE_IMG
  zh: '![h(x)= wx+b](Images/484548_1_En_4_Chapter_TeX_Equa.png)'
- en: We will now work on a project in which we will apply all the concepts we will
    discuss in the next chapters. In this example, we will create one approximately
    linear distribution; afterward, we will create a regression model that tries to
    fit a linear function that minimizes the error function (defined by least squares).
    This model will allow us to predict an outcome for an input value, given one new
    sample.
  id: totrans-766
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在将进行一个项目，在这个项目中，我们将应用下一章中将要讨论的所有概念。在这个例子中，我们将创建一个大约线性分布的合成数据集；之后，我们将创建一个回归模型，尝试拟合一个最小化误差函数（由最小二乘法定义）的线性函数。这个模型将使我们能够预测给定一个新样本的输入值的输出。
- en: But before we start, let’s have a hint about datasets.
  id: totrans-767
  prefs: []
  type: TYPE_NORMAL
  zh: 但在我们开始之前，让我们了解一下数据集。
- en: Dataset Description
  id: totrans-768
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据集描述
- en: For this example, we will be generating a synthetic dataset consisting of a
    linear function with added noise.
  id: totrans-769
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们将生成一个包含线性函数和附加噪声的合成数据集。
- en: 'Let’s start with importing some packages:'
  id: totrans-770
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从导入一些包开始：
- en: '[PRE34]'
  id: totrans-771
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: First, we see `matplotlib.pyplot as plt`. These packages are used for visualization
    methods, which we will talk about later. The third, `tensorflow`, is an open source
    software library for dataflow programming across a range of tasks, as discussed
    in previous chapters.
  id: totrans-772
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们看到 `matplotlib.pyplot as plt`。这些包用于可视化方法，我们将在后面讨论。第三个是 `tensorflow`，这是一个开源软件库，用于在一系列任务中进行数据流编程，如前几章所述。
- en: The second, `numpy`, is a package for mathematical combinations and multiplication,
    but we don’t need to talk about it in more detail now.
  id: totrans-773
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个是 `numpy`，这是一个用于数学组合和乘法的包，但我们现在不需要详细讨论它。
- en: To begin, we start by generating our dataset, namely *x* and *y*. You can think
    of each value in *x* and *y* as points on the graph. We want NumPy to generate
    101 points with a value between (-1 and 1), spread evenly. The result is a NumPy
    array stored in `trX`. Similarly, we also want to randomly generate y such that
    it has a gradient of 2 (W) and some form of randomness using `np.random.randn()`
    . To make things interesting, we set y-intercept b to 0.2.
  id: totrans-774
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们生成我们的数据集，即 *x* 和 *y*。你可以把 *x* 和 *y* 中的每个值看作是图上的点。我们希望 NumPy 生成 101 个值在
    (-1 和 1) 之间的点，均匀分布。结果是存储在 `trX` 中的 NumPy 数组。同样，我们还想随机生成 y，使其具有 2 的梯度（W）和某种形式的随机性，使用
    `np.random.randn()`。为了使事情更有趣，我们将 y 的截距 b 设置为 0.2。
- en: '[PRE35]'
  id: totrans-775
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: Let’s start to see how data will be plotted and how data is distributed (Figure
    [4-3](#Fig3)).
  id: totrans-776
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始看看数据是如何绘制的以及数据是如何分布的（图 [4-3](#Fig3)）。
- en: '![../images/484548_1_En_4_Chapter/484548_1_En_4_Fig3_HTML.jpg](Images/484548_1_En_4_Fig3_HTML.jpg)'
  id: totrans-777
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_4_Chapter/484548_1_En_4_Fig3_HTML.jpg](Images/484548_1_En_4_Fig3_HTML.jpg)'
- en: Figure 4-3
  id: totrans-778
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-3
- en: The points of the dataset
  id: totrans-779
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集的点
- en: '[PRE36]'
  id: totrans-780
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: We construct the TensorFlow graph that helps us compute W and b. This is done
    in the function `linear_regression()`. In our formula *y* = *WX* + *b*; the *x*
    and *y* are nodes represented as TensorFlow placeholders.
  id: totrans-781
  prefs: []
  type: TYPE_NORMAL
  zh: 我们构建 TensorFlow 图，帮助我们计算 W 和 b。这是在 `linear_regression()` 函数中完成的。在我们的公式 *y* =
    *WX* + *b* 中，*x* 和 *y* 是作为 TensorFlow 占位符表示的节点。
- en: '[PRE37]'
  id: totrans-782
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: In the first argument of **tf.placeholder**, we define the data type as `float32` — a
    common data type in the placeholder. The second argument is the **shape** of the
    placeholder set to **None**, as we want it to be determined during training time.
    The third argument lets us set the **name** for the placeholder.
  id: totrans-783
  prefs: []
  type: TYPE_NORMAL
  zh: 在 `tf.placeholder` 的第一个参数中，我们定义数据类型为 `float32`——这是占位符中的一种常见数据类型。第二个参数是占位符的 **shape**，设置为
    **None**，因为我们希望在训练时确定它。第三个参数允许我们为占位符设置 **name**。
- en: We now define our model by declaring `name_scope` as Model. This scope groups
    all the variables it contains in order to form a unique entity with homogeneous
    entities. In this scope, we first define a function that receives the variables
    of the x-axis coordinates, the weight, and the bias. Then we create a new variable,
    objects, to hold the changing parameters and instantiate the model with the `y_model`
    variable.
  id: totrans-784
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在通过声明 `name_scope` 为 Model 来定义我们的模型。这个作用域将包含的所有变量分组，以形成一个具有同质实体的唯一实体。在这个作用域中，我们首先定义一个函数，该函数接收
    x 轴坐标的变量、权重和偏差。然后我们创建一个新的变量，objects，来保存变化的参数，并用 `y_model` 变量实例化模型。
- en: '[PRE38]'
  id: totrans-785
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: In the **Cost Function**, we create a new scope to include all the operations
    of this group and use the previously created `y_model` to account for the calculated
    y-axis values that we use to calculate the loss.
  id: totrans-786
  prefs: []
  type: TYPE_NORMAL
  zh: 在 **成本函数** 中，我们创建一个新的作用域来包含这个组中的所有操作，并使用之前创建的 `y_model` 来计算我们用于计算损失的 y 轴值。
- en: '[PRE39]'
  id: totrans-787
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: To define the chosen optimizer, we initialize `GradientDescentOptimizer`, and
    the step will be of 0.05, which seems like a reasonable start for convergence.
  id: totrans-788
  prefs: []
  type: TYPE_NORMAL
  zh: 为了定义选择的优化器，我们初始化 `GradientDescentOptimizer`，步长为 0.05，这似乎是收敛的合理起点。
- en: '[PRE40]'
  id: totrans-789
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: Let’s create the session and initialize the variables we want to save for reviewing
    in TensorBoard. We will be saving one scalar variable with the error result of
    the last sample for each iteration. We will also save the graph structure in a
    file for reviewing.
  id: totrans-790
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们创建会话并初始化我们希望在 TensorBoard 中查看的变量。我们将为每个迭代保存一个标量变量，该变量包含最后一个样本的错误结果。我们还将保存图形结构到一个文件中以便查看。
- en: '[PRE41]'
  id: totrans-791
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: For model training, we set an objective of 100 iterations (epochs), where we
    send each of the samples to the train operation of the gradient descent. After
    each iteration, we plot the modeling line and add the value of the last error
    to the summary.
  id: totrans-792
  prefs: []
  type: TYPE_NORMAL
  zh: 对于模型训练，我们设置了 100 次迭代（epochs）的目标，其中我们将每个样本发送到梯度下降的训练操作。在每个迭代之后，我们绘制建模线并将最后一个错误的值添加到摘要中。
- en: '[PRE42]'
  id: totrans-793
  prefs: []
  type: TYPE_PRE
  zh: '[PRE42]'
- en: Let’s see how our model is trained in a visualization chart (Figure [4-4](#Fig4)).
    Note that the X data was set on the x-axis, while each line is a model trying
    to predict the corresponding response y for it.
  id: totrans-794
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看我们的模型是如何在可视化图表中训练的（图 [4-4](#Fig4)）。注意，X 数据被设置在 x 轴上，而每条线都是一个试图预测对应响应 y
    的模型。
- en: '![../images/484548_1_En_4_Chapter/484548_1_En_4_Fig4_HTML.jpg](Images/484548_1_En_4_Fig4_HTML.jpg)'
  id: totrans-795
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_4_Chapter/484548_1_En_4_Fig4_HTML.jpg](Images/484548_1_En_4_Fig4_HTML.jpg)'
- en: Figure 4-4
  id: totrans-796
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-4
- en: Different lines from different models
  id: totrans-797
  prefs: []
  type: TYPE_NORMAL
  zh: 来自不同模型的不同的线
- en: Now let’s check the parameter results, printing the run output of the *w* and
    *b* variables.
  id: totrans-798
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们检查参数结果，打印 *w* 和 *b* 变量的运行输出。
- en: '[PRE43]'
  id: totrans-799
  prefs: []
  type: TYPE_PRE
  zh: '[PRE43]'
- en: It’s time to graphically review the data again and the suggested final line—the
    final predictor line (Figure [4-5](#Fig5)).
  id: totrans-800
  prefs: []
  type: TYPE_NORMAL
  zh: 是时候再次图形化地回顾数据以及建议的最终线——最终的预测线（图 [4-5](#Fig5)）了。
- en: '![../images/484548_1_En_4_Chapter/484548_1_En_4_Fig5_HTML.jpg](Images/484548_1_En_4_Fig5_HTML.jpg)'
  id: totrans-801
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_4_Chapter/484548_1_En_4_Fig5_HTML.jpg](Images/484548_1_En_4_Fig5_HTML.jpg)'
- en: Figure 4-5
  id: totrans-802
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-5
- en: How the model line fits the data points. Notice that the x-axis is the input
    data, while the y-axis is the corresponding response; also notice that the blue
    points are the data observations, while the line is the model trying to fit it
  id: totrans-803
  prefs: []
  type: TYPE_NORMAL
  zh: 模型线如何拟合数据点。注意 x 轴是输入数据，而 y 轴是对应的响应；也请注意，蓝色点是数据观测值，而线是试图拟合它的模型
- en: '[PRE44]'
  id: totrans-804
  prefs: []
  type: TYPE_PRE
  zh: '[PRE44]'
- en: Full Source Code
  id: totrans-805
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 完整源代码
- en: '[PRE45]'
  id: totrans-806
  prefs: []
  type: TYPE_PRE
  zh: '[PRE45]'
- en: XOR Implementation Using TensorFlow
  id: totrans-807
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 TensorFlow 实现的 XOR
- en: 'Exclusive or exclusive disjunction is a logical operation that outputs true
    only when inputs differ (one is *true*, the other is *false*). We will learn something
    about it, but if you need to learn it in detail, you can read more about Boolean
    functions. In calculus, XOR is a solution for a gates problem: *A* ⊕ *B* = (*A U B*) ^ (~*A U*~*B*).
    Let’s see how it works (Table [4-2](#Tab2)).'
  id: totrans-808
  prefs: []
  type: TYPE_NORMAL
  zh: 独异或（Exclusive or exclusive disjunction）是一种逻辑运算，仅在输入不同时输出为真（一个为 *true*，另一个为 *false*）。我们将了解一些关于它的内容，但如果你需要详细了解，可以阅读更多关于布尔函数的内容。在微积分中，XOR
    是一个门问题解决方案：*A* ⊕ *B* = (*A U B*) ^ (~*A U*~*B*)。让我们看看它是如何工作的（表 [4-2](#Tab2)）。
- en: Table 4-2
  id: totrans-809
  prefs: []
  type: TYPE_NORMAL
  zh: 表 4-2
- en: The input and output of the XOR gate
  id: totrans-810
  prefs: []
  type: TYPE_NORMAL
  zh: XOR 门的输入和输出
- en: '| A | B | A XOR B |'
  id: totrans-811
  prefs: []
  type: TYPE_TB
  zh: '| A | B | A XOR B |'
- en: '| --- | --- | --- |'
  id: totrans-812
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| 0 | 0 | 0 |'
  id: totrans-813
  prefs: []
  type: TYPE_TB
  zh: '| 0 | 0 | 0 |'
- en: '| 0 | 1 | 1 |'
  id: totrans-814
  prefs: []
  type: TYPE_TB
  zh: '| 0 | 1 | 1 |'
- en: '| 1 | 0 | 1 |'
  id: totrans-815
  prefs: []
  type: TYPE_TB
  zh: '| 1 | 0 | 1 |'
- en: '| 1 | 1 | 0 |'
  id: totrans-816
  prefs: []
  type: TYPE_TB
  zh: '| 1 | 1 | 0 |'
- en: This a short explanation about the XOR gate, but it’s not our aim to discuss
    the XOR gate; our aim is to use TensorFlow to make a model XOR. Let’s start some
    code.
  id: totrans-817
  prefs: []
  type: TYPE_NORMAL
  zh: 这是对 XOR 门的简短解释，但我们的目标不是讨论 XOR 门；我们的目标是使用 TensorFlow 来创建一个 XOR 模型。让我们开始写一些代码。
- en: We don’t need to reexplain these lines of code again, as we just explained it
    in the linear regression example. And as always, we will start by importing the
    needed packages.
  id: totrans-818
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不需要再次解释这些代码行，因为我们已经在线性回归示例中解释过了。而且，一如既往，我们将从导入所需的包开始。
- en: '[PRE46]'
  id: totrans-819
  prefs: []
  type: TYPE_PRE
  zh: '[PRE46]'
- en: Let’s construct the dataset as a table. We will make both A and B as columns
    in `X_train` and the result of the A XOR B function as `y_train`.
  id: totrans-820
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们构建数据集作为表格。我们将使 A 和 B 都作为 `X_train` 中的列，A XOR B 函数的结果作为 `y_train`。
- en: '[PRE47]'
  id: totrans-821
  prefs: []
  type: TYPE_PRE
  zh: '[PRE47]'
- en: Then we will create the placeholders that we will enter the data with in the
    model. We will create one called `X` for the `X_train` with shape 4∗2—because
    it has 4 rows and 2 columns, and `y` for `y_train` with shape 4∗1—because it has
    4 rows and it is one column. Both will have the same name of variables.
  id: totrans-822
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们将创建在模型中输入数据的占位符。我们将创建一个名为 `X` 的占位符用于 `X_train`，其形状为 4×2——因为它有 4 行和 2 列，以及一个名为
    `y` 的占位符用于 `y_train`，其形状为 4×1——因为它有 4 行且只有一列。这两个都将有相同的变量名。
- en: '[PRE48]'
  id: totrans-823
  prefs: []
  type: TYPE_PRE
  zh: '[PRE48]'
- en: Let’s construct some variables, like the number of training examples (number
    of rows) and features we have in our dataset (number of columns) and some hyperparameters,
    like learning rate and number of units in our model hidden layer.
  id: totrans-824
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们构建一些变量，比如训练示例的数量（行数）和我们在数据集中拥有的特征（列数），以及一些超参数，比如学习率和模型隐藏层中的单元数。
- en: '[PRE49]'
  id: totrans-825
  prefs: []
  type: TYPE_PRE
  zh: '[PRE49]'
- en: To build the model that should solve the XOR problem, we need to add new things
    like *theta* and *hidden layers*, and of course, we described the *activation
    functions* before. So, don’t worry about this complex code; we’ll explain this
    code in.
  id: totrans-826
  prefs: []
  type: TYPE_NORMAL
  zh: 要构建解决 XOR 问题的模型，我们需要添加新的东西，比如 *theta* 和 *hidden layers*，当然，我们之前也描述了 *激活函数*。所以，不要担心这段复杂的代码；我们将在后面解释这段代码。
- en: The neural network mainly is composed of layers, so each layer is connected
    by another layer. Hence, we can define every layer as the output of the earlier
    or previous layer multiplied by some weights, and we add some bias to it too.
    For instance, layer one *Z*[1] is equal to the output of the previous layer, which
    is *A*[0] or the input *X* multiplied by its weights *W*[1] and then bias *b*[1]
    is added. After this, the output of this layer goes through the activation function
    before sending it to the next layer *A*[1] = *Sigmoid*(*Z*[1]). And the process
    is repeated for the next layer.
  id: totrans-827
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络主要由层组成，因此每一层都通过另一层连接。因此，我们可以将每一层定义为早期或前一层的输出乘以一些权重，并添加一些偏差。例如，第一层 *Z*[1]
    等于前一层的输出，即 *A*[0] 或输入 *X* 乘以其权重 *W*[1] 并添加偏差 *b*[1]。然后，这一层的输出通过激活函数，在发送到下一层 *A*[1]
    = *Sigmoid*(*Z*[1]) 之前。这个过程在下一层重复。
- en: 'So, let do one last and fast recap: in the first layer *Z*[1] = *W*[1] ∗ *X* + *b*[1],
    and then *A*[1] = *Sigmoid*(*Z*[1]). In the next layer, or we can call it the
    hidden layer, *Z*[2] = *W*[2] ∗ *A*[1] + *b*[2], and then *A*[2] = *Sigmoid*(*Z*[2]).
    So please remember this function, and we will discuss the activation function
    and the weights and hyperparameters in a later chapter. But for now, we want you
    to see an end-to-end example.'
  id: totrans-828
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，让我们最后快速回顾一下：在第一层 *Z*[1] = *W*[1] * *X* + *b*[1]，然后 *A*[1] = *Sigmoid*(*Z*[1])。在下一层，或者我们可以称之为隐藏层，*Z*[2]
    = *W*[2] * *A*[1] + *b*[2]，然后 *A*[2] = *Sigmoid*(*Z*[2])。所以请记住这个函数，我们将在后面的章节中讨论激活函数和权重以及超参数。但现在，我们想让您看到端到端的示例。
- en: Now, let us write the model code that does the same as we described in the preceding
    equations. We start by building the model in a scope called *Model*; using `tf.name_scope`
    we can achieve this and build small scopes in our system.
  id: totrans-829
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们编写模型代码，它执行与前面方程中描述的相同操作。我们首先在一个名为 *Model* 的作用域中构建模型；使用 `tf.name_scope`
    我们可以实现这一点，并在我们的系统中构建小的作用域。
- en: '[PRE50]'
  id: totrans-830
  prefs: []
  type: TYPE_PRE
  zh: '[PRE50]'
- en: 'Now we call the function that will build the model for us, as in the following:'
  id: totrans-831
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们调用将为我们构建模型的函数，如下所示：
- en: '[PRE51]'
  id: totrans-832
  prefs: []
  type: TYPE_PRE
  zh: '[PRE51]'
- en: 'This cost function (Figure [4-6](#Fig6)) is captured by the log function, such
    that:'
  id: totrans-833
  prefs: []
  type: TYPE_NORMAL
  zh: 这个成本函数（图[4-6](#Fig6)）被对数函数捕获，如下所示：
- en: '![../images/484548_1_En_4_Chapter/484548_1_En_4_Fig6_HTML.jpg](Images/484548_1_En_4_Fig6_HTML.jpg)'
  id: totrans-834
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_4_Chapter/484548_1_En_4_Fig6_HTML.jpg](Images/484548_1_En_4_Fig6_HTML.jpg)'
- en: Figure 4-6
  id: totrans-835
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-6
- en: The cost function equation
  id: totrans-836
  prefs: []
  type: TYPE_NORMAL
  zh: 成本函数方程
- en: '[PRE52]'
  id: totrans-837
  prefs: []
  type: TYPE_PRE
  zh: '[PRE52]'
- en: To define the chosen optimizer, we initialize `GradientDescentOptimizer`, and
    the step will be of 0.05, a reasonable start for convergence. But the optimizer
    now works with the hyperparameter learning rate.
  id: totrans-838
  prefs: []
  type: TYPE_NORMAL
  zh: 为了定义所选的优化器，我们初始化 `GradientDescentOptimizer`，步长为0.05，这是收敛的合理起点。但优化器现在与学习率超参数一起工作。
- en: '[PRE53]'
  id: totrans-839
  prefs: []
  type: TYPE_PRE
  zh: '[PRE53]'
- en: 'Let’s create the session and initialize the variables we want to save for reviewing
    in TensorBoard. We will be saving one scalar variable with the error result of
    the last sample for each iteration. We will also save the graph structure in a
    file for reviewing as follows:'
  id: totrans-840
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们创建会话并初始化我们想要在TensorBoard中查看的变量。我们将为每个迭代保存一个标量变量，该变量包含最后一个样本的错误结果。我们还将保存图形结构到一个文件中，如下所示：
- en: '[PRE54]'
  id: totrans-841
  prefs: []
  type: TYPE_PRE
  zh: '[PRE54]'
- en: For model training, we set an objective of 100 iterations (epochs), where we
    send each of the samples to the train operation of the gradient descent. After
    each iteration, we plot the modeling line and add the value of the last error
    to the summary.
  id: totrans-842
  prefs: []
  type: TYPE_NORMAL
  zh: 对于模型训练，我们设定了100次迭代（周期），我们将每个样本发送到梯度下降的训练操作。每次迭代后，我们绘制建模线并将最后一次错误的值添加到摘要中。
- en: '[PRE55]'
  id: totrans-843
  prefs: []
  type: TYPE_PRE
  zh: '[PRE55]'
- en: Now let’s check the parameter results, printing the run output of the *w* and
    *b* variables.
  id: totrans-844
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们检查参数结果，打印 *w* 和 *b* 变量的运行输出。
- en: '[PRE56]'
  id: totrans-845
  prefs: []
  type: TYPE_PRE
  zh: '[PRE56]'
- en: It’s time to graphically review the data again and the suggested final line—the
    final predictor line.
  id: totrans-846
  prefs: []
  type: TYPE_NORMAL
  zh: 是时候再次图形化地查看数据以及建议的最终线——最终的预测线了。
- en: '[PRE57]'
  id: totrans-847
  prefs: []
  type: TYPE_PRE
  zh: '[PRE57]'
- en: Full Source Code
  id: totrans-848
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 完整源代码
- en: '[PRE58]'
  id: totrans-849
  prefs: []
  type: TYPE_PRE
  zh: '[PRE58]'
- en: Summary
  id: totrans-850
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we broke down the theories and used illustrations with practical
    work and hard code with TensorFlow. We showed you the TensorFlow basics to understand
    its components and make it easier for you to follow this book and develop products.
    Then we gave you step-by-step examples, which walk you through the most needed
    functionalities and API of TensorFlow.
  id: totrans-851
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们分解了理论，并使用TensorFlow的实际工作和硬编码来展示插图。我们向您展示了TensorFlow的基础知识，以便您更好地理解其组件，并更容易地跟随本书并开发产品。然后我们提供了逐步示例，这些示例引导您了解TensorFlow最需要的功能和API。
- en: This chapter was the last one in the first part of the book. In the second part
    the fun begins with a data journey, taking you from data novice to data engineer
    with a full guide from data definition to data engineering.
  id: totrans-852
  prefs: []
  type: TYPE_NORMAL
  zh: 本章是本书第一部分最后一章。在第二部分，乐趣从一次数据之旅开始，带你从数据新手成长为数据工程师，从数据定义到数据工程的全过程都有详细的指导。
