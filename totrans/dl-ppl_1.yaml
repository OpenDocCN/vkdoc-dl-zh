  prefs: []
  type: TYPE_NORMAL
- en: '| Rank/Dimension | Math Entity | Code Definition Example |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| 0 | Scalar | scalar = 1000 |'
  prefs: []
  type: TYPE_TB
- en: '| 1 | Vector | vector = [2, 8, 3] |'
  prefs: []
  type: TYPE_TB
- en: '| 2 | Matrix | matrix = [[4, 2, 1], [5, 3, 2], [5, 5, 6]] |'
  prefs: []
