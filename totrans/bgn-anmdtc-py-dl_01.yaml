- en: 1. Introduction to Anomaly Detection
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, you will learn about anomalies in general, the categories of
    anomalies, and anomaly detection. You will also learn why anomaly detection is
    important, how anomalies can be detected, and the use case for such a mechanism.
  prefs: []
  type: TYPE_NORMAL
- en: 'In a nutshell, this chapter covers the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: What is an anomaly?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Categories of different anomalies
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What is anomaly detection?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Where is anomaly detection used?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What Is an Anomaly?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before you get started with learning about anomaly detection, you must first
    understand what exactly you are targeting. Generally, an **anomaly** is an outcome
    or value that deviates from what is expected, but the exact criteria for what
    determines an anomaly can vary from situation to situation.
  prefs: []
  type: TYPE_NORMAL
- en: Anomalous Swans
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To get a better understanding of what an anomaly is, let’s take a look at some
    swans sitting by a lake (Figure [1-1](#Fig1)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_1_Chapter/483137_2_En_1_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: An illustration of 2 swans on a grassy field beside a lake.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-1
  prefs: []
  type: TYPE_NORMAL
- en: A couple swans by a lake
  prefs: []
  type: TYPE_NORMAL
- en: Let’s say that we want to observe these swans and make assumptions about the
    color of the swans at this particular lake. Our goal is to determine what the
    normal color of swans is and to see if there are any swans that are of a different
    color than this (Figure [1-2](#Fig2)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_1_Chapter/483137_2_En_1_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: An illustration of 9 swans on a grassy field beside a lake, of which 3 face
    right, and 6 face left.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-2
  prefs: []
  type: TYPE_NORMAL
- en: More swans show up, all of which are white
  prefs: []
  type: TYPE_NORMAL
- en: We continue to observe swans for a few years and all of them have been white.
    Given these observations, we can reasonably conclude that every swan at this lake
    should be white. The very next day, we are observing swans at the lake again.
    But wait! What’s this? A black swan has just flown in (Figure [1-3](#Fig3)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_1_Chapter/483137_2_En_1_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: An illustration of 9 swans on a grassy field beside a lake, of which 3 face
    right, and 6 face left. A black swan facing left is near the lake.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-3
  prefs: []
  type: TYPE_NORMAL
- en: A black swan appears
  prefs: []
  type: TYPE_NORMAL
- en: Considering our previous observations, we thought that we had seen enough swans
    to assume that the next swan would also be white. However, the black swan defies
    that assumption entirely, making it an *anomaly*. It’s not really an outlier,
    which would be, for example, a really big white swan or a really small white swan;
    it’s a swan that’s entirely a different color, making it an anomaly. In our scenario,
    the overwhelming majority of swans are white, making the black swan extremely
    rare.
  prefs: []
  type: TYPE_NORMAL
- en: In other words, given a swan by the lake, the probability of it being black
    is very small. We can explain our reasoning for labeling the black swan as an
    anomaly with one of two approaches (though we aren’t limited to only these two
    approaches).
  prefs: []
  type: TYPE_NORMAL
- en: First, given that a vast majority of swans observed at this particular lake
    are white, we can assume that, through a process similar to inductive reasoning,
    the normal color for a swan here is white. Naturally, we would label the black
    swan as an anomaly purely based on our prior assumptions that all swans are white,
    considering that we’d only seen white swans before the black swan arrived.
  prefs: []
  type: TYPE_NORMAL
- en: Another way to look at why the black swan is an anomaly is through probability.
    Now assume that there is a total of 1000 swans at this lake and only two are black
    swans; the probability of a swan being black is 2 / 1000, or 0.002\. Depending
    on the *probability threshold*, meaning the lowest probability for an outcome
    or event that will be accepted as normal, the black swan could be labeled as anomalous
    or normal. In our case, we will consider it an anomaly because of its extreme
    rarity at this lake.
  prefs: []
  type: TYPE_NORMAL
- en: Anomalies as Data Points
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We can extend this same concept to a real-world application. In the following
    example, we will take a look at a factory that produces screws and attempt to
    determine what an anomaly could be in this context and individual screws are sampled
    from each batch and are tested to ensure a certain level of quality is maintained.
    For each sampled screw, assume that the density and tensile strength (how resistant
    the screw is to breaking under stress) are measured.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [1-4](#Fig4) is an example graph of various sampled screws with the dotted
    lines representing the range of densities and tensile strengths allowed. The solid
    lines form a bounding box where any value of tensile strength and density inside
    it is considered good.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_1_Chapter/483137_2_En_1_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A scatter plot of density versus tensile strength. The dots are concentrated
    at the top right of the plane.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-4
  prefs: []
  type: TYPE_NORMAL
- en: Density and tensile strength in a batch of screw samples
  prefs: []
  type: TYPE_NORMAL
- en: The intersections of the dotted lines have created several different regions
    containing data points. Of interest is the bounding box (solid lines) created
    from the intersection of both sets of dotted lines since it contains the data
    points for samples deemed acceptable (Figure [1-5](#Fig5)). Any data point outside
    of that specific box will be considered anomalous.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_1_Chapter/483137_2_En_1_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A scatter plot of density versus tensile strength. Datapoints for Good are concentrated
    at the top right of the plane. Anomaly are scattered around good datapoints.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-5
  prefs: []
  type: TYPE_NORMAL
- en: Data points are identified as “good” or “anomaly” based on their location
  prefs: []
  type: TYPE_NORMAL
- en: Now that we know which points are and aren’t acceptable, let’s pick out a sample
    from a new batch of screws and check its data to see where it falls on the graph
    (Figure [1-6](#Fig6)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_1_Chapter/483137_2_En_1_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A scatter plot of density versus tensile strength. Datapoints for Good are concentrated
    at the top right of the plane. Anomaly are scattered around good. A unique point
    merges with good.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-6
  prefs: []
  type: TYPE_NORMAL
- en: A new data point representing the new sample screw is generated, with the data
    falling within the bounding box
  prefs: []
  type: TYPE_NORMAL
- en: The data for this sample screw falls within the acceptable range. That means
    that this batch of screws is good to use since its density as well as tensile
    strength is appropriate for use by the consumer. Now let’s look at a sample from
    the next batch of screws and check its data (Figure [1-7](#Fig7)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_1_Chapter/483137_2_En_1_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A scatter plot of density versus tensile strength. Good are concentrated at
    the top right of the plane. Anomaly are scattered around good. A unique point
    is at the left of the plane.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-7
  prefs: []
  type: TYPE_NORMAL
- en: A new data point is generated for another sample, but this falls outside the
    bounding box
  prefs: []
  type: TYPE_NORMAL
- en: The data falls far outside the acceptable range. For its density, the screw
    has abysmal tensile strength and is unfit for use. Since it has been flagged as
    an anomaly, the factory can investigate why this batch of screws turned out to
    be brittle. For a factory of considerable size, it is important to hold a high
    standard of quality as well as maintain a high volume of steady output to keep
    up with consumer demands. For a monumental task like that, automation to detect
    any anomalies to avoid sending out faulty screws is essential and has the benefit
    of being extremely scalable.
  prefs: []
  type: TYPE_NORMAL
- en: So far, we have explored anomalies as data points that are either out of place,
    in the case of the black swan, or unwanted, in the case of faulty screws. So what
    happens when we introduce time as a new variable?
  prefs: []
  type: TYPE_NORMAL
- en: Anomalies in a Time Series
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: With the introduction of time as a variable, we are now dealing with a notion
    of *temporality* associated with the data sets. What this means is that certain
    patterns are dependent on time. For example, daily, monthly, or yearly occurrences
    are time-series patterns as they present on regular time intervals.
  prefs: []
  type: TYPE_NORMAL
- en: To better understand time series–based anomalies, let’s look at a few examples.
  prefs: []
  type: TYPE_NORMAL
- en: Personal Spending Pattern
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Figure [1-8](#Fig8) depicts a random person’s spending habits over the course
    of a month.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_1_Chapter/483137_2_En_1_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A scatter plot of money spent versus weeks 1 to 4\. Week 1 has the highest and
    in between weeks 1 and 2 is the lowest.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-8
  prefs: []
  type: TYPE_NORMAL
- en: Spending habits of a person over the course of a month
  prefs: []
  type: TYPE_NORMAL
- en: Assume the initial spike in expenditures at the start of the month is due to
    the payment of bills such as rent and insurance. During the weekdays, our example
    person occasionally eats out, and on the weekends goes shopping for groceries,
    clothes, and various other items. Also assume that this month does not include
    any major holidays.
  prefs: []
  type: TYPE_NORMAL
- en: These expenditures can vary from month to month, especially in months with major
    holidays. Assume that our person lives in the United States, in which the holiday
    of Thanksgiving falls on the last Thursday of the month of November. Many U.S.
    employers also include the Friday after Thanksgiving as a day off for employees.
    U.S. retailers have leveraged that fact to entice people to begin their Christmas
    shopping by offering special deals on what has colloquially become known as “Black
    Friday.” With that in mind, let’s take a look at our person’s spending pattern
    in November (Figure [1-9](#Fig9)). As expected, a massive spike in purchases occurred
    on Black Friday, some of them quite expensive.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_1_Chapter/483137_2_En_1_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A scatter plot of money spent versus weeks 1 to 4\. Week 4 has the highest and
    in between weeks 1 and 2 is the lowest.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-9
  prefs: []
  type: TYPE_NORMAL
- en: Spending habits for the same person during the month of November
  prefs: []
  type: TYPE_NORMAL
- en: Now assume that, unfortunately, our person has had their credit card information
    stolen, and the criminals responsible for it have decided to purchase various
    items of interest to them. Using the same month as in the first example (Figure
    [1-8](#Fig8); no major holidays), the graph in Figure [1-10](#Fig10) depicts what
    could happen.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_1_Chapter/483137_2_En_1_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A scatter plot of money spent versus weeks 1 to 4\. Week 1 has the highest and
    in between weeks 1 and 2 is the lowest. Four unique dots are in between weeks
    2 and 3.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-10
  prefs: []
  type: TYPE_NORMAL
- en: Purchases in the person’s name during the same month as in Figure [1-8](#Fig8)
  prefs: []
  type: TYPE_NORMAL
- en: Let’s assume we have a record of purchases for this user going back many years.
    Thanks to this established prior history, this sudden influx in purchases would
    be flagged as anomalies. Such a cluster of purchases might be normal for Black
    Friday or in the weeks before Christmas, but in any other month without a major
    holiday, it looks out of place. In this case, our person might be contacted by
    the credit card company to confirm whether or not they made the purchases.
  prefs: []
  type: TYPE_NORMAL
- en: Some companies might even flag purchases that follow normal societal trends.
    What if that TV wasn’t really bought by our person on Black Friday? In that case,
    the credit card company’s software can ask the client directly through a phone
    app, for example, whether or not they actually bought the item in question, allowing
    for some additional protection against fraudulent purchases.
  prefs: []
  type: TYPE_NORMAL
- en: Taxi Cabs
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: As another example of anomalies in a time series, let’s look at some sample
    data for taxi cab pickups and drop-offs over time for a random city and an arbitrary
    taxi company and see if we can detect any anomalies.
  prefs: []
  type: TYPE_NORMAL
- en: On an average day, the total number of pickups can look somewhat like the pattern
    shown in Figure [1-11](#Fig11).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_1_Chapter/483137_2_En_1_Fig11_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A plot with datapoints of number of pickups versus time of a day. 4 A M has
    the lowest and around 6 P M is the highest.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-11
  prefs: []
  type: TYPE_NORMAL
- en: Number of pickups for a taxi company throughout the day
  prefs: []
  type: TYPE_NORMAL
- en: From the graph, we see that there’s a bit of post-midnight activity that drops
    off to near zero during the late-night hours. However, customer traffic picks
    up suddenly around morning rush hour and remains high until the early evening,
    when it peaks during evening rush hour. This is essentially what an average day
    looks like.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s expand the scope out a bit more to gain some perspective of passenger
    traffic throughout the week (Figure [1-12](#Fig12)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_1_Chapter/483137_2_En_1_Fig12_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A plot with datapoints of number of pickups versus days of the week. Tuesday
    and Thursday have the highest, and Sunday has the lowest.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-12
  prefs: []
  type: TYPE_NORMAL
- en: Number of pickups for a taxi company throughout the week
  prefs: []
  type: TYPE_NORMAL
- en: As expected, most of the pickups occur during the weekday when commuters must
    get to and from work. On the weekends, a fair amount of people still go out to
    get groceries or just go out somewhere for the weekend.
  prefs: []
  type: TYPE_NORMAL
- en: On a small scale like this, causes for anomalies would be anything that prevents
    taxis from operating or incentivizes customers not to use a taxi. For example,
    say that a terrible thunderstorm hits on Friday. Figure [1-13](#Fig13) shows that
    graph.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_1_Chapter/483137_2_En_1_Fig13_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A plot with datapoints of number of pickups versus days of the week. Tuesday
    and Thursday have the highest, and Friday has the lowest marked by a different
    shade.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-13
  prefs: []
  type: TYPE_NORMAL
- en: Number of pickups for a taxi company throughout the week, with a heavy thunderstorm
    on Friday
  prefs: []
  type: TYPE_NORMAL
- en: The thunderstorm likely influenced some people to stay indoors, resulting in
    a lower number of pickups than unusual for a weekday. However, these sorts of
    anomalies are usually too small-scale to have any noticeable effect on the overall
    pattern.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s take a look at the data over the entire year, as shown in Figure [1-14](#Fig14).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_1_Chapter/483137_2_En_1_Fig14_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A histogram of number of pickups versus months of the year with a nearly uniform
    trend mostly. End of December has the highest and the third quarter of January
    has the lowest.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-14
  prefs: []
  type: TYPE_NORMAL
- en: Number of pickups for a taxi company throughout the year
  prefs: []
  type: TYPE_NORMAL
- en: The largest dips occur during the winter months when snowstorms are expected.
    These are regular patterns that can be observed at similar times every year, so
    they are not an anomaly. But what happens to customer traffic levels when a relatively
    rare polar vortex descends on the city in early April and unleashes several intense
    blizzards? Figure [1-15](#Fig15) shows the graph.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_1_Chapter/483137_2_En_1_Fig15_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A histogram of number of pickups versus months of the year. End of December
    has the highest and the first quarter of April has the lowest. The first three
    quarters of April are marked by a different shade.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-15
  prefs: []
  type: TYPE_NORMAL
- en: Number of pickups for a taxi company throughout the year, with a polar vortex
    descending on the city in April
  prefs: []
  type: TYPE_NORMAL
- en: As you can see in Figure [1-15](#Fig15), the intense blizzards severely slowed
    down all traffic in the first week of April and burdened the city in the following
    two weeks. Comparing this graph to the graph shown in Figure [1-14](#Fig14), there’s
    a clearly defined anomaly in April caused by the polar vortex. Since this pattern
    is extremely rare for the month of April, it would be flagged as an anomaly.
  prefs: []
  type: TYPE_NORMAL
- en: Categories of Anomalies
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Now that you have more perspective of what anomalies can be in various situations,
    you can see that they generally fall into these broad categories:'
  prefs: []
  type: TYPE_NORMAL
- en: Data point–based anomalies
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Context-based anomalies
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Pattern-based anomalies
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Data Point–Based Anomalies
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Data point–based anomalies** may seem comparable to outliers in a set of
    data points. However, as previously mentioned, anomalies and outliers are not
    the same thing, though these terms are sometimes used interchangeably. **Outliers**
    are data points that are expected to be present in the data set and can be caused
    by unavoidable random errors or from systematic errors relating to how the data
    was sampled. **Anomalies** would be outliers or other values that one doesn’t
    expect to exist. These data anomalies might be present wherever a data set of
    values exist.'
  prefs: []
  type: TYPE_NORMAL
- en: As an example of a data set in which data point–based anomalies may exist, consider
    a data set of thyroid diagnostic values, where the majority of the data points
    are indicative of normal thyroid functionality. In this case, anomalous values
    represent sick thyroids. While they are not necessarily outliers, they have a
    low probability of existing when taking into account all the normal data.
  prefs: []
  type: TYPE_NORMAL
- en: We can also detect individual purchases totaling excessive amounts and label
    them as anomalies since, by definition, they are not expected to occur or have
    a very low probability of occurrence. In this case, they are labeled as potentially
    fraudulent transactions, and the card holder is contacted to ensure the validity
    of the purchase.
  prefs: []
  type: TYPE_NORMAL
- en: 'Basically, we can say this about the difference between anomalies and outliers:
    we should expect a data set to include outliers, but we should not expect it to
    include anomalies. Though the terms “anomaly” and “outlier” are sometimes interchanged,
    anomalies are not always outliers, and not all outliers are anomalies.'
  prefs: []
  type: TYPE_NORMAL
- en: Context-Based Anomalies
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Context-based anomalies** consist of data points that might seem normal at
    first but are considered anomalies in their respective contexts. Returning to
    our earlier personal spending example, we might expect a sudden surge in purchases
    near certain holidays, but these purchases could seem unusual in the middle of
    August. The person’s high volume of purchases on Black Friday was not flagged
    because it is typical spending behavior for people on Black Friday. However, if
    the purchases were made in a month where it is out of place given previous purchase
    history, it would be flagged as an anomaly. This might seem similar to the example
    presented for data point–based anomalies, but the distinction for context-based
    anomalies is that the individual purchase does not have to be expensive. If a
    person never buys gasoline because they own an electric car, sudden purchases
    of gasoline would be out of place given the context. Buying gasoline is normal
    behavior for many people, but in this context, it is an anomaly.'
  prefs: []
  type: TYPE_NORMAL
- en: Pattern-Based Anomalies
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Pattern-based anomalies** are patterns and trends that deviate from their
    historical counterparts, and they often occur in time-series or other sequence-based
    data. In the earlier taxi cab company example, the customer pickup counts for
    the month of April were pretty consistent with the rest of the year. However,
    once the polar vortex hit, the numbers tanked visibly, resulting in a huge drop
    in the graph, labeled as an anomaly.'
  prefs: []
  type: TYPE_NORMAL
- en: Similarly, when monitoring network traffic in the workplace, expected patterns
    of network traffic are formed from constant monitoring of data over several months
    or even years for some companies. If an employee attempts to download or upload
    large volumes of data, it generates a certain pattern in the overall network traffic
    flow that could be considered anomalous if it deviates from the employee’s usual
    behavior.
  prefs: []
  type: TYPE_NORMAL
- en: As another example of pattern-based anomalies, if an external hacker decided
    to hit a company’s website with a **distributed denial-of-service (DDoS) attack****—**an
    attempt to overwhelm the server that handles network flow to a certain website
    in an attempt to bring the entire website down or stop its functionality—every
    single attempt would register as an unusual spike in network traffic. All of these
    spikes are clearly deviants from normal traffic patterns and would be considered
    anomalous.
  prefs: []
  type: TYPE_NORMAL
- en: Anomaly Detection
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that you have a better understanding of the different types of anomalies,
    we can proceed to discuss approaches to creating models to detect anomalies. This
    section presents a few approaches we can take, but keep in mind we are not limited
    to just these methods.
  prefs: []
  type: TYPE_NORMAL
- en: Recall our reasoning for labeling the black swan as an anomaly. One reason was
    that since all the swans we have seen thus far were white, the single black swan
    is an obvious anomaly. A statistical way to explain this reasoning is that as
    of the most recent set of observations, we have one black swan and tens of thousands
    of white swans. Thus, the probability of occurrence of the black swan is one out
    of tens of thousands of all observed swans. Since this probability is so low,
    it would make the black swan an anomaly just because we do not expect to see it
    at all.
  prefs: []
  type: TYPE_NORMAL
- en: The anomaly detection models we will explore in this book follow these approaches
    either by training on unlabeled data, training on normal, nonanomalous data, or
    training on labeled data for normal and anomalous data. In the context of identifying
    swans, we would be told which swans are normal and which swans are anomalies.
  prefs: []
  type: TYPE_NORMAL
- en: So, what is anomaly detection? Quite simply, **anomaly detection** is the process
    in which an advanced algorithm identifies certain data or data patterns to be
    anomalous. Falling under anomaly detection are the tasks of outlier detection,
    noise removal, novelty detection, event detection, change point detection, and
    anomaly score calculation. In this book, we will explore all of these as they
    are all basically anomaly detection methods. The following tasks of anomaly detection
    are not exhaustive, but are some of the more common anomaly detection tasks today.
  prefs: []
  type: TYPE_NORMAL
- en: Outlier Detection
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Outlier detection** is a technique that aims to detect anomalous outliers
    within a given data set. As previously discussed, three methods that can be applied
    to this situation are to train a model only on normal data to identify anomalies
    (by a high reconstruction error, described next), to model a probability distribution
    in which anomalies would be labeled based on their association with really low
    probabilities, or to train a model to recognize anomalies by teaching it what
    an anomaly looks like and what a normal point looks like.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Regarding the high reconstruction error, think of it this way: the model trains
    on a set of normal data and learns the patterns corresponding to normal data.
    When exposed to an anomalous data point, the patterns do not line up with what
    the model learned to associate with normal data. The reconstruction error can
    be analogous to the deviance in learned patterns between the anomalous point and
    the normal points the model trained on. We will formally go over reconstruction
    error in Chapter 6\. Going back to the example of the swans, the black swan is
    different based on the patterns that we learned by observing swans at the lake,
    and was thus anomalous because it did not follow the color pattern.'
  prefs: []
  type: TYPE_NORMAL
- en: Noise Removal
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Noise removal** involves filtering out any constant background noise in the
    data set. Imagine that you are at a party and you are talking with a friend. There
    is a lot of background noise, but your brain focuses on your friend’s voice and
    isolates it because that’s what you want to hear. Similarly, a model learns to
    efficiently encode the original sound to represent only the essential information.
    For example, encoding the pitch of your friend’s voice, the tempo, the vocal inflections,
    etc. Then, it is able to reconstruct the original sound without the anomalous
    interference noise.'
  prefs: []
  type: TYPE_NORMAL
- en: This can also be a case where an image has been altered in some form, such as
    by having perturbations, loss of detail, fog, etc. The model learns an accurate
    representation of the original image and outputs a reconstruction without any
    of the anomalous elements in the image.
  prefs: []
  type: TYPE_NORMAL
- en: Novelty Detection
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Novelty detection** is very similar to outlier detection. In this case, a
    novelty is a data point outside of the training set the model was exposed to,
    that was shown to the model to determine if it is an anomaly or not. The key difference
    between novelty detection and outlier detection is that in outlier detection,
    the job of the model is to determine what is an anomaly within the training data
    set. In novelty detection, the model learns what is a normal data point and what
    isn’t and tries to classify anomalies in a new data set that it has never seen
    before.'
  prefs: []
  type: TYPE_NORMAL
- en: Examples can include quality assurance in factories to make sure new batches
    of created products are up to par, such as with the example of screws from earlier.
    Another case is network security. Incoming traffic data can be monitored to ensure
    there is no anomalous behavior going on. Both of these situations involve novelties
    (new data) to constantly predict on.
  prefs: []
  type: TYPE_NORMAL
- en: Event Detection
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Event detection** involves the detection of points in a time-series dataset
    that deviate anomalously from the norm. For example, in the taxi cab company example
    earlier in the chapter, the polar vortex reduced the customer pickup counts for
    April. These deviations from the norm for April were all associated with an anomalous
    event that occurred in the dataset, which an event detector algorithm would identify.
    Another example of event detection would be the tracking of sea-ice levels at
    the poles over time, forming a time series. An event detector algorithm could
    flag exactly when sea-ice levels deviate anomalously from the usual norm, such
    as occurred recently in July 2023, when the sea-ice levels were detected to be
    six standard deviations below the established average.'
  prefs: []
  type: TYPE_NORMAL
- en: Change Point Detection
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Change point detection** involves the detection of points in the dataset
    where their statistical properties start to consistently deviate from the established
    norm given by the rest of the data. In other words, change point detection algorithms
    measure shifts in statistical trends. A good example is global average temperatures
    over time. A change point detection algorithm could identify periods of sustained
    warming where the statistical properties start to shift over time. A change point
    detection algorithm could identify accelerated warming periods that differ from
    the normal rate of warming.'
  prefs: []
  type: TYPE_NORMAL
- en: Anomaly Score Calculation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Anomaly score calculation** involves assigning a score of how anomalous a
    given data sample is. Rather than an outright determination of whether or not
    something is an anomaly, this is for when we want to assign some type of measure
    to how deviant from the normal a data sample may be. In some cases, anomaly score
    calculation is a direct prelude to anomaly detection, since you could assign a
    threshold that determines what are anomalies and what aren’t by the anomaly score.
    In other cases, anomaly score calculation can help with understanding a data set
    more deeply and aid with data analysis by providing a more nuanced measure of
    the normalcy of a data point or a measure of how much a data sample deviates from
    the norm.'
  prefs: []
  type: TYPE_NORMAL
- en: The Three Styles of Anomaly Detection
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'There are three overarching “styles” of anomaly detection:'
  prefs: []
  type: TYPE_NORMAL
- en: Supervised anomaly detection
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Semi-supervised anomaly detection
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Unsupervised anomaly detection
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Supervised anomaly detection** is a technique in which the training data
    has labels for both anomalous data points and normal data points. Basically, we
    tell the model during the training process if a data point is an anomaly or not.
    Unfortunately, this isn’t the most practical method of training, especially because
    the entire data set needs to be processed and each data point needs to be labeled.
    Since supervised anomaly detection is basically a type of binary classification
    task, meaning the job of the model is to categorize data under one of two labels,
    any classification model can be used for the task, though not every model can
    attain a high level of performance. Chapter [9](483137_2_En_9_Chapter.xhtml) provides
    an example in the context of a temporal convolutional network.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Semi-supervised anomaly detection** involves partially labeling the training
    data set. Exact implementations and definitions for what “semi-supervised” entails
    may differ, but the gist of it is that you are working with partially labeled
    data. In the context of anomaly detection, this can be a case where only the normal
    data is labeled. Ideally, the model will learn what normal data points look like
    so that it can flag as anomalous data points that differ from normal data points.
    Examples of models that can use semi-supervised learning for anomaly detection
    include autoencoders, which you will learn about in Chapter [6](483137_2_En_6_Chapter.xhtml).'
  prefs: []
  type: TYPE_NORMAL
- en: '**Unsupervised anomaly detection**, as the name implies, involves training
    the model on unlabeled data. After the training process, the model is expected
    to know what data points are normal and what points are anomalous within the data
    set. Isolation forest, a model we will explore in Chapter [4](483137_2_En_4_Chapter.xhtml),
    is one such model that can be used for unsupervised anomaly detection.'
  prefs: []
  type: TYPE_NORMAL
- en: Where Is Anomaly Detection Used?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Whether we realize it or not, anomaly detection is being utilized in nearly
    every facet of our lives today. Pretty much any task involving data collection
    of any sort could have anomaly detection applied to it. Let’s look at some of
    the most prevalent fields and topics to which anomaly detection can be applied.
  prefs: []
  type: TYPE_NORMAL
- en: Data Breaches
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In today’s age of big data, where huge volumes of information are stored about
    users in various companies, information security is vital. Any information breaches
    must be reported and flagged immediately, but it is hard to do so manually at
    such a scale. Data leaks can range from simple accidents, such as an employee
    losing a USB stick that contains sensitive company information that someone picks
    up and accesses the data on, to intentional actions, such as an employee intentionally
    sending data to an outside party, or an attacker gaining access to a database
    via an intrusion attack. Several high-profile data leaks have been widely reported
    in news media, from Facebook / Meta, iCloud, and Google security breaches where
    millions of passwords or photos were leaked. All of those companies operate on
    an international scale, requiring automation to monitor everything in order to
    ensure the fastest response time to any data breach.
  prefs: []
  type: TYPE_NORMAL
- en: The data breaches might not even need network access. For example, an employee
    could email an outside party or another employee with connections to rival companies
    about travel plans to meet up and exchange confidential information. Of course,
    these emails would not be so obvious as to state such intentions directly. However,
    monitoring these emails could be helpful as a post-breach analysis to find out
    anyone suspicious from within the company, or as part of a real-time monitoring
    software to ensure data confidentiality compliance across teams for example. Anomaly
    detection models can sift through and process employee emails to flag any suspicious
    activity by employees. The software can pick up key words and process them to
    understand the context and decide whether or not to flag an employee’s email for
    review.
  prefs: []
  type: TYPE_NORMAL
- en: 'The following are a few more examples of how anomaly detection software can
    detect an internal data breach:'
  prefs: []
  type: TYPE_NORMAL
- en: Employees may be assigned a specific connection to upload data to. For example,
    a mass storage drive that employees should not frequently access.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: An employee may regularly be accessing data as part of their work responsibilities.
    However, if they suddenly start downloading a lot of data that they shouldn’t,
    then the anomaly detector may flag this.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The detector would be looking at many variables, including who the user is,
    what data store is being accessed, what volume of data was transferred, how frequently
    did the user interact with this data store, etc. to find out if this recent interaction
    was a deviation from established patterns.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In this case, something won’t add up, which the software will detect and then
    flag the employee. It could either turn out to be a one-off sanctioned event,
    which great, the model did its job but it was ok this time, or it could turn out
    that the employee somehow accessed data they shouldn’t have, which would mean
    there was a data breach.
  prefs: []
  type: TYPE_NORMAL
- en: The key benefit to using anomaly detection in the workspace is how easy it is
    to scale up. These models can be used for small companies as well as large-scale
    international companies.
  prefs: []
  type: TYPE_NORMAL
- en: Identity Theft
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Identity theft is another common problem in today’s society. Thanks to development
    of online services allowing for ease of access when purchasing items, the volume
    of credit and debit card transactions that take place every day has grown immensely.
    However, this development also makes it easier to steal credit and debit card
    information or bank account information, allowing the criminals to purchase anything
    they want if the card isn’t deactivated or if the account isn’t secured again.
    Because of the huge volume of transactions, monitoring everything is difficult.
    However, this is where anomaly detection can step in and help, since it is highly
    scalable and can help detect fraud transactions the moment the request is sent.
  prefs: []
  type: TYPE_NORMAL
- en: As we discussed earlier, context matters. When a payment card transaction is
    made, the payment card company’s anomaly detection software takes into account
    the card holder’s previous history to determine if the new transaction should
    be flagged or not. Obviously, a series of high value purchases made suddenly would
    raise alarms immediately, but what if the criminals were smart enough to realize
    that and just make a series of purchases over time that won’t put a noticeable
    hole in the card holder’s account? Again, depending on the context, the software
    would pick up on these transactions and flag them again.
  prefs: []
  type: TYPE_NORMAL
- en: For example, let’s say that someone’s grandmother was recently introduced to
    Amazon and to the concept of buying things online. One day, unfortunately, she
    stumbles upon an Amazon lookalike website and enters her credit card information.
    On the other side, some criminal takes it and starts buying random things, but
    not all at once so as not to raise suspicion—or so he thought. The grandmother’s
    identity theft insurance company starts noticing some recent purchases of batteries,
    hard drives, flash drives, and other electronic items. While these purchases might
    not be that expensive, they certainly stand out when all the prior purchases made
    by the grandmother consisted of groceries, pet food, and various decorative items.
    Based on this previous history, the detection software would flag the new purchases
    and the grandmother would be contacted to verify these purchases. These transactions
    might even be flagged as soon as an attempt to purchase is made. In this case,
    either the location of the purchaser or the nature of the transactions could raise
    alarms and stop the transaction from being successful.
  prefs: []
  type: TYPE_NORMAL
- en: Manufacturing
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We have explored a use case of anomaly detection in manufacturing. Manufacturing
    plants usually have a certain level of quality that they must ensure their products
    meet before shipping them out. When factories are configured to produce massive
    quantities of output at a near constant rate, it becomes necessary to automate
    the process of checking the quality of various samples. Similar to the fictitious
    example of the screw manufacturer, manufacturing plants in real life might test
    and use anomaly detection software to ensure the quality of various metal parts,
    tools, engines, food, clothes, etc.
  prefs: []
  type: TYPE_NORMAL
- en: Networking
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Perhaps one of the most important use cases for anomaly detection is in networking.
    The Internet is host to a vast array of various websites located on servers all
    around the world. Unfortunately, due to the ease of access to the Internet, many
    individuals access the Internet for nefarious purposes. Similar to the data leaks
    that were discussed earlier in the context of protecting company data, hackers
    can launch attacks on websites as well to leak their information.
  prefs: []
  type: TYPE_NORMAL
- en: One such example would be hackers attempting to leak government secrets through
    a network attack. With such sensitive information as well as the high volumes
    of expected attacks every day, automation is a necessary tool to help cybersecurity
    professionals deal with the attacks and preserve state secrets. On a smaller scale,
    hackers might attempt to breach a cloud network or a local area network and try
    to leak data. Even in smaller cases like this, anomaly detection can help detect
    network intrusion attacks as they happen and notify the proper officials. An example
    data set for network intrusion anomaly detection is the KDD Cup 1999 data set.
    This data set contains a large amount of entries that detail various types of
    network intrusion attacks as well as a detailed list of variables for each attack
    that can help a model identify each type of attack.
  prefs: []
  type: TYPE_NORMAL
- en: Medicine
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Anomaly detection also has a massive role to play in the field of medicine.
    For example, models can detect subtle irregularities in a patient’s heartbeat
    in order to classify diseases, or they can measure brainwave activity to help
    doctors diagnose certain conditions. Beyond that, they can help analyze raw diagnostic
    data for a patient’s organ and process it in order to quickly diagnose any possible
    problems, similarly to the thyroid example discussed earlier.
  prefs: []
  type: TYPE_NORMAL
- en: Anomaly detection can even be used in medical imagery to determine whether a
    given image contains anomalous objects. For example, suppose an anomaly detection
    model was trained by exposing it only to MRI imagery of normal bones. When shown
    an image of a broken bone, it would flag the new image as an anomaly. Similarly,
    anomaly detection can even be extended to tumor detection, allowing for the model
    to analyze every image in a full-body MRI scan and look for the presence of abnormal
    growth or patterns.
  prefs: []
  type: TYPE_NORMAL
- en: Video Surveillance
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Anomaly detection also has uses in video surveillance. Anomaly detection software
    can monitor video feeds and flag any videos that capture anomalous action. While
    this might seem dystopian, it can certainly help catch criminals and maintain
    public safety on busy streets and other transportation systems. For example, this
    type of software could potentially identify a mugging in a street at night as
    an anomalous event and alert the nearest police department. Additionally, this
    type of software can detect unusual events at crossroads, such as an accident
    or some unusual obstruction, and immediately call attention to the footage.
  prefs: []
  type: TYPE_NORMAL
- en: Environment
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Anomaly detection can be used to monitor environmental conditions as well. For
    example, anomaly detection systems are used to monitor heavy-metal levels in rivers
    to pick up potential spills or leaks into the water supply. Another example is
    air quality monitoring, which can detect anything from seasonal pollen to wildfire
    smoke coming in from far away. Additionally, anomaly detection can be utilized
    to monitor soil health in agricultural or environmental survey cases to gauge
    the health of an ecosystem. Any dips in soil moisture or specific nutrient levels
    could indicate some kind of problem.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Generally, anomaly detection is utilized heavily in medicine, finance, cybersecurity,
    banking, networking, transportation, and manufacturing, but it is not limited
    to those fields. For nearly every case imaginable involving data collection, anomaly
    detection can be put to use to help users automate the process of detecting anomalies
    and possibly removing them. Many fields in science can benefit from anomaly detection
    because of the large volume of raw data collection that goes on. Anomalies that
    would interfere with the interpretation of results or otherwise introduce some
    sort of bias into the data could be detected and removed, provided that the anomalies
    are caused by systematic or random errors.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we discussed what anomalies are and why detecting anomalies
    can be very important to the data processing we have at our organizations.
  prefs: []
  type: TYPE_NORMAL
- en: Next, Chapter [2](483137_2_En_2_Chapter.xhtml) introduces you to core data science
    concepts that you need to know to follow along for the rest of the book.
  prefs: []
  type: TYPE_NORMAL
