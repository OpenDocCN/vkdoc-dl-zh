- en: 8. Transfer Learning
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 8. 迁移学习
- en: Introduction
  id: totrans-1
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 引言
- en: Assume that you have been assigned the responsibility of developing an app that
    can classify ten new musical instruments developed recently by renowned musicians.
    You only have a few hundred images of these instruments. To classify these images,
    you decide to use GoogLeNet architecture, which has around 6.8 million parameters.
    If you decide to train the model using the given images, you will realize that
    you have an insufficient number of images. However, if you train the model using
    the pictures of known instruments, you might be able to train it, but it will
    take a lot of time and computational resources. So the challenge is to train a
    sufficiently complex model on a dataset that does not have a sufficient number
    of images, and you probably do not have GPU as well.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你被分配了开发一个能够分类最近由著名音乐家开发的十种新乐器的应用程序的责任。你只有几百张这些乐器的图片。为了对这些图片进行分类，你决定使用大约有680万个参数的GoogLeNet架构。如果你决定使用这些图片来训练模型，你会意识到图片数量不足。然而，如果你使用已知乐器的图片来训练模型，你可能能够训练它，但这将需要大量的时间和计算资源。因此，挑战是在没有足够图片的数据集上训练一个足够复杂的模型，而且你可能也没有GPU。
- en: This chapter presents a methodology called transfer learning, which will help
    you deal with such situations. This chapter discusses the ideas, types, strategies,
    and limitations of transfer learning.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 本章介绍了一种称为迁移学习的方法，这将帮助你处理此类情况。本章讨论了迁移学习的理念、类型、策略和局限性。
- en: Idea
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理念
- en: In transfer learning, we train a model on a given dataset for a particular task.
    This model is then
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在迁移学习中，我们在给定数据集上为特定任务训练一个模型。然后
- en: Used with some other dataset for the same task. For example, suppose you aim
    to develop a model that classifies patients suffering from Alzheimer’s from controls.
    You can train the model on the publicly available Alzheimer’s Disease Neuroimaging
    Initiative (ADNI) dataset and then use the same model on the dataset collected
    from a local hospital.
  id: totrans-6
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在同一任务中使用其他数据集。例如，假设你旨在开发一个模型，用于从对照组中区分患有阿尔茨海默病的患者。你可以在公开可用的阿尔茨海默病神经影像学倡议（ADNI）数据集上训练该模型，然后使用相同的模型在本地医院收集的数据集上。
- en: We use the same model and the same dataset for some other task. For example,
    we develop a model to classify cats and dogs using given images and then use the
    same model by some means for segmenting the parts of the image. The interested
    readers may refer to references given at the end of the chapter for such examples
    of this type of transfer learning.
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们对于一些其他任务使用相同的模型和相同的数据集。例如，我们开发了一个模型，使用给定的图像来对猫和狗进行分类，然后通过某种方式使用相同的模型对图像的部分进行分割。对此类迁移学习示例感兴趣的读者可以参考本章末尾给出的参考文献。
- en: We use the part of the same model and a new dataset for different tasks. For
    example, we generally use the pretrained VGG 16 model and freeze the initial layers
    except for the last ones (fully connected), and we train the model to perform
    the classification on other datasets.
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们使用相同模型的一部分和新数据集来完成不同的任务。例如，我们通常使用预训练的VGG 16模型，并冻结除了最后几层（全连接层）之外的所有初始层，然后训练模型在其他数据集上进行分类。
- en: One of the ways to accomplish the task stated in “Introduction” is “**to extract
    knowledge from some model trained on some dataset and use it to accomplish a similar
    task**.” This is referred to as transfer learning.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 完成引言中所述任务的一种方法是“**从某些数据集上训练的模型中提取知识，并使用它来完成类似的任务**。”这被称为迁移学习。
- en: This is possible because the earlier layers of a complex model trained on sufficiently
    large datasets learn **low-level features**, the next layers may learn the **combination
    of such features,** and so on. To understand this, imagine you develop a model
    and train it using a huge dataset of faces. The earlier layers of the model learn
    lines, curves, etc. The later layers learn objects; still later layers learn eyes,
    nose, etc. You can use this information to classify some other dataset of faces
    for a particular organization to develop their face recognition system.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这之所以可能，是因为在足够大的数据集上训练的复杂模型的早期层学习**低级特征**，下一层可能学习这些特征的**组合**，依此类推。为了理解这一点，想象你开发了一个模型，并使用一个包含大量面部数据集对其进行训练。模型的早期层学习线条、曲线等。较晚的层学习物体；更晚的层学习眼睛、鼻子等。你可以使用这些信息来对某个特定组织的一些其他面部数据集进行分类，以开发他们的面部识别系统。
- en: VGG 16 and VGG 19 for Binary Classification
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: VGG 16 和 VGG 19 用于二分类
- en: VGG 16 and VGG 19 are two deep Convolutional Neural Networks having 16 and 19
    layers, respectively (trainable). They have historically outperformed the benchmarks
    for many image-related tasks. The VGG 16 model is an outcome of the work “Very
    Deep Convolutional Networks for Large-Scale Image Recognition” [1].
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: VGG 16 和 VGG 19 是两种具有 16 和 19 层的深度卷积神经网络（可训练）。它们在历史上在很多图像相关任务上优于基准测试。VGG 16
    模型是“用于大规模图像识别的超深卷积神经网络” [1] 这篇工作的成果。
- en: VGG 16 achieved 92.7% top 5 test accuracy on the ImageNet dataset containing
    14 million images belonging to 1000 classes. This model takes 224 × 224 × 3 as
    the input. It contains two convolutional layers with a filter size of 3 × 3 followed
    by a max pooling layer with a filter size of 2 × 2\. This is repeated twice. After
    which it contains three convolutional layers with a filter size of 3 × 3 followed
    by a single max pooling layer of filter size 2 × 2, and this combination is repeated
    thrice. This is followed by two fully connected layers of size 4096 followed by
    an output layer having 1000 neurons. VGG 19 has a similar architecture, but it
    has 19 layers instead of 16\. Figures [8-1](#Fig1) and [8-2](#Fig2) show the architecture
    of VGG 16 and VGG 19.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: VGG 16 在包含 1000 个类别、1400 万张图像的 ImageNet 数据集上实现了 92.7% 的前 5 测试准确率。该模型以 224 ×
    224 × 3 作为输入。它包含两个 3 × 3 的卷积层，后面跟着一个 2 × 2 的最大池化层。这重复了两次。之后，它包含三个 3 × 3 的卷积层，后面跟着一个
    2 × 2 的单个最大池化层，这种组合重复了三次。之后是两个大小为 4096 的全连接层，然后是一个有 1000 个神经元的输出层。VGG 19 有类似的架构，但它有
    19 层而不是 16 层。图 [8-1](#Fig1) 和 [8-2](#Fig2) 展示了 VGG 16 和 VGG 19 的架构。
- en: '![](../images/611710_1_En_8_Chapter/611710_1_En_8_Fig2_HTML.jpg)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/611710_1_En_8_Chapter/611710_1_En_8_Fig2_HTML.jpg)'
- en: Figure 8-2
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-2
- en: VGG 19 architecture
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: VGG 19 架构
- en: '![](../images/611710_1_En_8_Chapter/611710_1_En_8_Fig1_HTML.jpg)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/611710_1_En_8_Chapter/611710_1_En_8_Fig1_HTML.jpg)'
- en: Figure 8-1
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-1
- en: VGG 16 architecture
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: VGG 16 架构
- en: VGG 16 and VGG 19 have been trained on huge datasets (ImageNet) having a massive
    number of images across a thousand categories. This training gives the model the
    ability to learn generalizable features and empowers these models with the ability
    to capture complex patterns; hence, they perform well with other datasets as well.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: VGG 16 和 VGG 19 在包含成千上万类别的海量数据集（ImageNet）上进行了训练。这种训练使模型能够学习可泛化的特征，并赋予这些模型捕捉复杂模式的能力；因此，它们在与其他数据集上也能表现出色。
- en: To be able to use the information gathered in the training process, we generally
    freeze the earlier layers and train the last layers of these models. These models
    have shown good performance on many image-related tasks.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 为了能够使用训练过程中收集到的信息，我们通常冻结早期层，并训练这些模型的最后几层。这些模型在许多图像相关任务上表现出良好的性能。
- en: In the following experiment (Listing [8-1](#PC1)), the pretrained VGG 16 and
    VGG 19 models are to classify X-ray images of patients diagnosed with tuberculosis
    (TB) and healthy controls. The dataset, obtained from Kaggle (“[`https://www.kaggle.com/datasets/tawsifurrahman/tuberculosis-tb-chest-xray-dataset”`](https://www.kaggle.com/datasets/tawsifurrahman/tuberculosis-tb-chest-xray-dataset%25E2%2580%259D)),
    contains 400 images of healthy controls and 240 images of TB patients.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在以下实验（列表 [8-1](#PC1)）中，预训练的 VGG 16 和 VGG 19 模型被用于对被诊断为肺结核（TB）的患者和健康对照者的 X 射线图像进行分类。该数据集来自
    Kaggle（“[`https://www.kaggle.com/datasets/tawsifurrahman/tuberculosis-tb-chest-xray-dataset`](https://www.kaggle.com/datasets/tawsifurrahman/tuberculosis-tb-chest-xray-dataset)”），包含
    400 张健康对照者的图像和 240 张 TB 患者的图像。
- en: The given images were resized to 224 × 224 × 3 shape to match the input shape
    of the original model. The initial layers of the pretrained models were frozen
    to extract low-level features. The last few layers were then trained on the above
    mentioned dataset to learn high-level, data-specific features that distinguish
    between TB patients and controls. The loss and performance curves of both the
    models are shown in Figures [8-3](#Fig3) and [8-4](#Fig4).
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 给定的图像被调整到 224 × 224 × 3 的形状，以匹配原始模型的输入形状。预训练模型的初始层被冻结以提取低级特征。然后，在上述提到的数据集上训练最后几层，以学习区分
    TB 患者和对照者的高级、数据特定的特征。两个模型的损失和性能曲线分别显示在图 [8-3](#Fig3) 和 [8-4](#Fig4) 中。
- en: '![](../images/611710_1_En_8_Chapter/611710_1_En_8_Fig4_HTML.jpg)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/611710_1_En_8_Chapter/611710_1_En_8_Fig4_HTML.jpg)'
- en: Figure 8-4
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-4
- en: 'Loss and accuracy curves: VGG 19'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 损失和准确率曲线：VGG 19
- en: '![](../images/611710_1_En_8_Chapter/611710_1_En_8_Fig3_HTML.jpg)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/611710_1_En_8_Chapter/611710_1_En_8_Fig3_HTML.jpg)'
- en: Figure 8-3
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-3
- en: 'Loss and accuracy curves: VGG 16'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 损失和准确率曲线：VGG 16
- en: '[PRE0]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: From the above figures, it can be observed that the mean validation accuracy
    of the two models is 0.9880 (VGG 16) and 0.9886 (VGG 19), respectively. Also,
    there is a slight difference between the loss curves of the two models.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 从上述图中可以看出，两个模型的平均验证准确率分别为0.9880（VGG 16）和0.9886（VGG 19）。此外，两个模型的损失曲线之间也存在细微的差异。
- en: Let us take another example to understand the applications of transfer learning.
    The following experiment (Listing [8-2](#PC2)) employs a transfer learning approach
    to classify Alzheimer’s patients from controls using the OASIS-1 dataset. The
    dataset includes s-MRI scans of 53 controls and 28 patients suffering from Alzheimer’s
    disease (AD). The grayscale images were resized to (224 × 224). The additional
    Conv2D layer is added to convert the single-channel input to three channels by
    repeating the grayscale information across three channels to match the input shape
    of the pretrained VGG 19 model. The initial layers of the pretrained model were
    frozen to extract low-level features. The last few layers were then trained on
    the abovementioned dataset to learn high-level, data-specific features that distinguish
    between AD patients and controls. The loss and performance curves of the model
    are shown in Figure [8-5](#Fig5).
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们再举一个例子来了解迁移学习的应用。以下实验（列表[8-2](#PC2)）采用迁移学习方法，使用OASIS-1数据集对阿尔茨海默病患者进行分类。该数据集包括53个对照组和28个患有阿尔茨海默病（AD）患者的s-MRI扫描。灰度图像被调整大小为（224 × 224）。添加了一个额外的Conv2D层，通过在三个通道中重复灰度信息以匹配预训练的VGG
    19模型的输入形状，将单通道输入转换为三个通道。预训练模型的初始层被冻结以提取低级特征。然后，在上述数据集上训练最后几层，以学习区分AD患者和对照组的高级、数据特定的特征。模型的损失和性能曲线如图[8-5](#Fig5)所示。
- en: '![](../images/611710_1_En_8_Chapter/611710_1_En_8_Fig5_HTML.jpg)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/611710_1_En_8_Chapter/611710_1_En_8_Fig5_HTML.jpg)'
- en: Figure 8-5
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-5
- en: 'Loss and accuracy curves: VGG 19'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 损失和准确率曲线：VGG 19
- en: '[PRE1]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Types and Strategies
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 类型与策略
- en: An important aspect of transfer learning is its ability to transform the representation.
    One of the interesting examples as stated in [2] is as follows.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 迁移学习的一个重要方面是其转换表示的能力。正如[2]中所述的一个有趣的例子如下。
- en: Assume that you need to classify two classes in which the 2D coordinate system
    is represented as a circle (Class I) within another circle (Class II) and somehow
    this model transforms this distribution to a linearly separable one; then the
    classification will become easier. At times transfer learning transforms the given
    data space into a feature set relatively easy to classify.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你需要对两个类别进行分类，其中二维坐标系表示为一个圆（类别I）在另一个圆内（类别II），并且这个模型以某种方式将这种分布转换为线性可分的一个；那么分类将变得更容易。有时迁移学习将给定的数据空间转换为一个相对容易分类的特征集。
- en: 'As per [2], the domain of transfer learning consists of a feature space and
    a probability distribution, whereas the task contains the label space. The probability
    *P*(*X*|*Y*) is derived from a function that learns from a feature vector and
    the label space. Transfer learning can also be segregated into the following types:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 根据[2]，迁移学习的领域包括特征空间和概率分布，而任务包括标签空间。概率*P*(*X*|*Y*)是从一个从特征向量和标签空间学习的函数中导出的。迁移学习也可以分为以下类型：
- en: 'When the feature spaces are not equal: Suppose that you are asked to develop
    a software that converts a given algorithm into a code in a functional language
    such as Scala or F#. Note that the input to the software is in English, whereas
    the output is in complex functional language. In this case the feature spaces
    are not the same. Such situations can be handled using a concept similar to cross-lingual
    adaptation. Here transfer learning comes to your rescue.'
  id: totrans-41
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当特征空间不相等时：假设你被要求开发一个软件，将给定的算法转换成Scala或F#等函数式语言中的代码。请注意，软件的输入是英文，而输出是复杂的函数式语言。在这种情况下，特征空间是不相同的。可以使用类似跨语言适应的概念来处理这种情况。在这种情况下，迁移学习将帮助你。
- en: 'When the marginal probability distributions of the source and the target are
    not same: Consider a scenario in which you are required to develop a model to
    distinguish between cats and dogs. The model is then trained on high-definition
    pictures obtained from the Internet. The application so developed is intended
    to be used by people in the lower middle strata who click the pictures of dogs
    and cats using their phone, which are not of high quality. In this situation the
    probability distributions of the source and the target are not same, and transfer
    learning can help.'
  id: totrans-42
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当源和目标的数据边缘概率分布不同时：考虑一个场景，你需要开发一个模型来区分猫和狗。该模型随后在从互联网上获得的高清图片上进行训练。这样开发的应用程序旨在供中下阶层的人使用，他们使用手机点击猫和狗的图片，这些图片质量不高。在这种情况下，源和目标的数据概率分布不同，迁移学习可以帮助。
- en: 'When the labels are different: Suppose you train your model on images of animals
    and the model is to be used for classifying different types of cats. Here, the
    labels of the model originally developed with the original dataset have different
    labels vis-à-vis the required model.'
  id: totrans-43
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当标签不同时：假设你使用动物图像训练你的模型，而该模型将被用于分类不同类型的猫。在这里，与原始数据集开发的原始模型相比，所需的模型的标签不同。
- en: 'When the conditional probability of the labels is not the same: When you train
    your model with a balanced dataset and then use it for an imbalanced one.'
  id: totrans-44
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当标签的条件概率不同时：当你使用平衡数据集训练模型，然后将其用于不平衡数据集时。
- en: Transfer learning is tricky and whether to use it or not can be decided based
    on
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 迁移学习很复杂，是否使用它可以根据
- en: The task to be performed
  id: totrans-46
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 需要执行的任务
- en: Domain
  id: totrans-47
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 领域
- en: Availability of data
  id: totrans-48
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数据的可用性
- en: For a detailed discussion on the above strategies, the interested readers may
    refer to the references given at the end of the chapter. Researchers [2] have
    proposed many transfer learning strategies as shown in Figure [8-6](#Fig6).
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 对于上述策略的详细讨论，感兴趣的读者可以参考本章末尾给出的参考文献。研究者[2]提出了许多迁移学习策略，如图[8-6](#Fig6)所示。
- en: '![](../images/611710_1_En_8_Chapter/611710_1_En_8_Fig6_HTML.jpg)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/611710_1_En_8_Chapter/611710_1_En_8_Fig6_HTML.jpg)'
- en: Figure 8-6
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-6
- en: Transfer learning strategies
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 迁移学习策略
- en: The interested reader may refer to the references given at the end of the chapter.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 感兴趣的读者可以参考本章末尾给出的参考文献。
- en: Limitations and Applications of Transfer Learning
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 迁移学习的局限性和应用
- en: 'Despite being awesome transfer learning has many limitations. If the target
    dataset does not have anything similar to the original dataset, then the transfer
    learning will not work. For example, if you train your model with the images of
    dogs and cats and then test it on a particular disease related to the brain, then
    the model is bound to fail. Likewise, if the number of labels in your target set
    is huge, then the model might not work as well. Some of the cases where transfer
    learning may not work are as follows:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管迁移学习很棒，但它有很多局限性。如果目标数据集与原始数据集没有任何相似之处，那么迁移学习将不起作用。例如，如果你使用狗和猫的图像训练你的模型，然后在特定的大脑相关疾病上测试它，那么模型注定会失败。同样，如果你的目标集中标签的数量很大，那么模型可能不会很好地工作。迁移学习可能不起作用的一些情况如下：
- en: When the training data is insufficient, transfer learning may not work. In some
    cases, the training data might not be similar to the data used for the task at
    hand, or there is a domain mismatch or task mismatch. In such cases, the transfer
    learning generally fails.
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当训练数据不足时，迁移学习可能不起作用。在某些情况下，用于当前任务的训练数据可能与训练数据不相似，或者存在领域不匹配或任务不匹配。在这种情况下，迁移学习通常会失败。
- en: In addition to the above, the size of the target data also decides whether or
    not we can use transfer learning. If the size of the target data is small, there
    is a possibility of overfitting; also if the target data is too large, transfer
    learning may not be able to capture the complexities of the data. In transfer
    learning, freezing of incorrect layers may also affect the recital of the network.
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 除了上述内容之外，目标数据的大小也决定了我们是否可以使用迁移学习。如果目标数据的大小很小，可能会出现过拟合的风险；同样，如果目标数据太大，迁移学习可能无法捕捉到数据的复杂性。在迁移学习中，冻结错误层也可能影响网络的性能。
- en: Some of the prominent applications of transfer learning are
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 迁移学习的一些显著应用包括
- en: Classification of diseases using models trained on similar diseases
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用在类似疾病上训练的模型对疾病进行分类
- en: Task related to self-driven cars
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与自动驾驶汽车相关的任务
- en: Natural language processing
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自然语言处理
- en: Identifying rare elements and so on
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 识别稀有元素等
- en: Conclusion
  id: totrans-63
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: It is commonly believed that Deep Learning can only be applied if there is a
    lot of data. Also, as per common perception, a lot of computing power is consumed
    to train a DL [[3](#Par90), [4](#Par91)] model. However, for many practical tasks,
    this may not be required. We can learn micro-level or intermediate-level features
    from a particular source and apply the knowledge so obtained on another task or
    another dataset [[5](#Par92)]. This chapter introduced transfer learning and explained
    the need, types, and implementation of transfer learning. After reading this chapter,
    the reader must have realized the need for huge datasets for carrying out tasks
    that are not related to the ones for which those datasets were collected. We have
    seen how to extract the representations and how to fine-tune a model for carrying
    out some of the assorted tasks using transfer learning.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 人们普遍认为，深度学习只有在有大量数据的情况下才能应用。按照普遍的看法，训练深度学习模型需要消耗大量的计算能力 [[3](#Par90), [4](#Par91)]。然而，对于许多实际任务，这可能不是必需的。我们可以从特定的来源学习微观或中级特征，并将所获得的知识应用于其他任务或数据集
    [[5](#Par92)]。本章介绍了迁移学习，并解释了迁移学习的需求、类型和实现。阅读本章后，读者必须已经意识到，对于与收集这些数据集无关的任务，需要大量的数据集。我们看到了如何提取表示，以及如何通过迁移学习对某些混合任务进行微调。
- en: The next chapter takes the reader to the mesmerizing world of sequences, where
    words play with each other and spin prose and poetry. We will study the models
    that will help us comprehend sequences and play with them.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 下一章将读者带入迷人的序列世界，在这个世界里，文字相互嬉戏，编织散文和诗歌。我们将研究那些帮助我们理解和玩转序列的模型。
- en: Exercises
  id: totrans-66
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 练习
- en: Multiple-Choice Questions
  id: totrans-67
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 多选题
- en: Which of the following exemplifies the scenario when feature spaces are not
    equal in transfer learning?
  id: totrans-68
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 以下哪个例子说明了在迁移学习中特征空间不相等的场景？
- en: Translating text from English to Spanish
  id: totrans-69
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 翻译英文到西班牙文
- en: Converting an algorithm into code in a functional language such as Scala or
    F#
  id: totrans-70
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将算法转换为功能性语言（如Scala或F#）的代码
- en: Translating a book from English to French
  id: totrans-71
  prefs:
  - PREF_IND
  - PREF_OL
