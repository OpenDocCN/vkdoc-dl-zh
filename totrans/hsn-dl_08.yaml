  type: TYPE_NORMAL
- en: It always requires a large amount of data.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: It can help when the feature spaces are equal.
  prefs:
  - PREF_IND
  - PREF_OL
