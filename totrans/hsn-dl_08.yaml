- en: What scenario exemplifies when the marginal probability distributions of the
    source and target are not the same?
  id: totrans-73
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 哪种场景可以说明源和目标边缘概率分布不同的情况？
- en: Translating an algorithm to code in a functional language
  id: totrans-74
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将算法翻译成功能性语言的代码
- en: Developing a model to distinguish between cats and dogs with high-definition
    pictures and using it on low-quality phone pictures
  id: totrans-75
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用高清图片区分猫和狗的模型，并将其应用于低质量手机照片
- en: Classifying different types of cats using a model trained on images of animals
  id: totrans-76
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用训练在动物图像上的模型对不同的猫进行分类
- en: Translating a book from one language to another
  id: totrans-77
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将一本书从一种语言翻译成另一种语言
- en: What factor does NOT affect the decision to use transfer learning?
  id: totrans-78
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 哪个因素不会影响使用迁移学习的决策？
- en: The task to be performed
  id: totrans-79
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要执行的任务
- en: Domain
  id: totrans-80
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义域
- en: Availability of data
  id: totrans-81
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数据的可用性
- en: The programming language used
  id: totrans-82
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 所使用的编程语言
- en: Which statement about transfer learning is TRUE?
  id: totrans-83
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 关于迁移学习的哪个陈述是正确的？
- en: It always requires a large amount of data.
  id: totrans-84
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它总是需要大量的数据。
- en: It can help when the feature spaces are equal.
  id: totrans-85
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当特征空间相等时，它可以帮助。
- en: It makes it possible to develop a Deep Learning model with less data and computation
    power.
  id: totrans-86
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它使得在更少的数据和计算能力下开发深度学习模型成为可能。
- en: It is only useful in natural language processing tasks.
  id: totrans-87
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它仅在自然语言处理任务中才有用。
- en: What are the benefits of transfer learning mentioned in the text?
  id: totrans-88
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 文中提到的迁移学习的优点是什么？
- en: It requires more data and computation power.
  id: totrans-89
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它需要更多的数据和计算能力。
- en: It allows for classification with less data and less computation power.
  id: totrans-90
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它允许在更少的数据和计算能力下进行分类。
- en: It eliminates the need for training models.
  id: totrans-91
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它消除了训练模型的需求。
- en: It always produces higher-accuracy models.
  id: totrans-92
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它总是产生更高精度的模型。
- en: Which type of transfer learning involves developing a software that converts
    a given algorithm into a code in a functional language?
  id: totrans-93
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 哪种类型的迁移学习涉及开发将给定算法转换为功能性语言（如Scala或F#）代码的软件？
