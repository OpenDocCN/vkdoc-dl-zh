- en: '***To friends and adventures.***'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '***致朋友们和冒险家们。***'
- en: Introduction
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 引言
- en: 'Many celebrated works of science fiction portray a futuristic Earth as a planet
    occupied by flying cars, otherworldly structures, and artificial intelligence.
    The latter is, to some extent, now a reality. But this type of artificial intelligence
    (AI) is different from what we see in the movies. There are no sentient or organic
    robots, know-it-all virtual assistants, or computers with a human conscience.
    Instead, the AI we are currently experiencing focuses on a subtle component of
    intelligence: prediction. In their book *Prediction Machines*, the economists
    Ajay Agrawal, Avi Goldfarb, and Joshua Gans define prediction as “the process
    of filling in missing information” using as a basis previous information, better
    known as **data**.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 许多著名的科幻作品描绘了一个未来地球，那里有飞行汽车、超凡脱俗的结构和人工智能。后者在某种程度上，现在已经成为现实。但这种人工智能（AI）与我们在电影中看到的不同。没有具有感知能力的或有机的机器人、无所不知的虚拟助手，或者具有人类良知的计算机。相反，我们目前正在体验的人工智能专注于智能的一个微妙组成部分：预测。在他们的著作《预测机器》中，经济学家Ajay
    Agrawal、Avi Goldfarb和Joshua Gans将预测定义为“使用先前信息作为基础来填补缺失信息”的过程，这种信息更广为人知的是**数据**。
- en: Data is the backbone of a predictive system. The more you have, the better the
    system learns. Nowadays, thanks to the advances in computing power, cheaper storage,
    accessible Internet, the interconnectivity between us, and the advent of the modern
    mobile device, we are amassing data on an unprecedented scale. But by itself,
    data does not do much. It needs a model to consume it and learn from it.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 数据是预测系统的骨架。你拥有的越多，系统学习得越好。如今，得益于计算能力的进步、更便宜的存储、可访问的互联网、我们之间的互联互通以及现代移动设备的出现，我们正在以前所未有的规模积累数据。但数据本身并不能做很多事情。它需要一个模型来消费它并从中学习。
- en: The discipline of artificial intelligence that involves predictive systems is
    called **machine learning**. This discipline studies algorithms that use data
    to learn a task without being explicitly programmed. For example, a machine learning
    model that sees many pictures of cats will eventually learn to identify cats.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 涉及预测系统的人工智能学科被称为**机器学习**。这个学科研究使用数据学习任务而不需要明确编程的算法。例如，一个看到许多猫的图片的机器学习模型最终会学会识别猫。
- en: While AI is not a new concept, after their first groundbreaking discoveries
    in the 1950s and 1960s, the public interest, funding, and development of AI projects
    decreased significantly. This period is known as the “AI Winter” in the community.
    In the late 2000s, the field of artificial intelligence awoke from its slumber.
    This resurfacing is often attributed to the publication of two computer vision
    papers by Geoffrey Hinton and Alex Krizhevsky. Hinton developed a neural network
    capable of recognizing handwritten digits, while Krizhevsky created a neural network
    architecture capable of classifying everyday objects with state-of-the-art accuracy.
    These papers coined the name “deep learning,” a term used to refer to deep artificial
    neural networks.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 AI 并不是一个新概念，但在 1950 年代和 1960 年代他们首次取得突破性发现之后，公众的兴趣、资金和 AI 项目的开发显著减少。这一时期在社区中被称为“AI
    寒冬”。到了 2000 年代末，人工智能领域从沉睡中苏醒。这种复苏通常归因于杰弗里·辛顿和亚历克斯·克里泽夫斯基发表的关于计算机视觉的两篇论文。辛顿开发了一个能够识别手写数字的神经网络，而克里泽夫斯基创建了一个能够以最先进的精度对日常物体进行分类的神经网络架构。这些论文创造了“深度学习”这个术语，它用来指代深度人工神经网络。
- en: The achievements of these two deep networks put machine learning back in the
    spotlight and started a wave of innovation and interest that has no foreseeable
    end. In the last ten years, machine learning and deep learning models have been
    applied to a range of use cases, such as image classification, object detection,
    forecasting, text and image generation, speech recognition, and language translation.
    More impressive is that some of these models outperform humans at the same task.
    So now that we have the theory to understand these networks, the data to feed
    them, the computing power to handle them, and the interest of the industry and
    academic communities to try deep learning, what we need is more frameworks to
    train them in your platform of choice. This last reason brings us to TensorFlow.js
    and this book.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个深度网络的成就使机器学习重新回到了聚光灯下，并引发了一波创新和兴趣的浪潮，其结束似乎遥不可及。在过去的十年中，机器学习和深度学习模型被应用于各种用例，例如图像分类、物体检测、预测、文本和图像生成、语音识别和语言翻译。更令人印象深刻的是，其中一些模型在相同任务上的表现超过了人类。因此，我们现在有了理解这些网络的理论，有了为它们提供数据的数据，有了处理它们的计算能力，以及工业和学术社区对尝试深度学习的兴趣，我们所需要的是更多框架来在您选择的平台上训练它们。最后一个原因将我们带到了
    TensorFlow.js 和这本书。
- en: About the book
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关于本书
- en: TensorFlow.js is a machine learning framework for developing and serving artificial
    neural network–based models in **JavaScript**, the language of the Web, directly
    on your web browser. In this book, *Practical TensorFlow.js*, you will learn and
    explore, through hands-on examples, how to develop and deploy models using TensorFlow.js.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow.js 是一个用于在 **JavaScript**（网络的语言）中直接在您的网络浏览器中开发和部署基于人工神经网络的模型的机器学习框架。在这本名为
    *Practical TensorFlow.js* 的书中，您将通过动手实例学习和探索如何使用 TensorFlow.js 开发和部署模型。
- en: As the title states, in this book, we will focus on practical use cases, applications
    that go further than just training models. For example, in one chapter, you will
    build a game, and in another, a Google Chrome Extension. The apps you will write
    here do not end at the browser. In the later chapters, you will learn how to run
    TensorFlow.js server-side using Node.js to train and deploy a model. Since we
    are in a web environment, building web applications, the examples include basic
    web development concepts. But do not worry if you do not have a web development
    background because the book also explains those parts.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 正如标题所述，在这本书中，我们将专注于实际用例，这些用例不仅限于训练模型。例如，在某一章中，你将构建一个游戏，在另一章中，一个 Google Chrome
    扩展程序。你将在这里编写的应用程序不会止步于浏览器。在后面的章节中，你将学习如何使用 Node.js 在服务器端运行 TensorFlow.js 来训练和部署模型。由于我们处于网络环境，构建网络应用程序，示例包括基本的网络开发概念。但如果你没有网络开发背景，请不要担心，因为本书也解释了这些部分。
- en: Some machine learning applications we will cover in the book include image classification,
    object detection, natural language processing, transfer learning, and time series
    analysis. You will explore them using networks such as convolutional neural networks,
    recurrent neural networks, and generative adversarial networks and “traditional”
    machine learning algorithms like linear regression. However, you will not implement
    all of them. One feature of TensorFlow.js is the availability of several pre-trained
    models for various scenarios. Through our adventures, we will learn how to use
    some of them.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 本书将涵盖的一些机器学习应用包括图像分类、目标检测、自然语言处理、迁移学习和时间序列分析。你将使用卷积神经网络、循环神经网络和生成对抗网络以及“传统”的机器学习算法（如线性回归）等网络来探索它们。然而，你不会实现所有这些。TensorFlow.js
    的一个特点是提供了针对各种场景的多个预训练模型。在我们的冒险中，我们将学习如何使用其中的一些。
- en: While the book focuses on the practical side of deep learning, before each exercise,
    there is a brief review of the model involved in the chapter. Last, to extend
    the reach of the examples, you will use other tools and frameworks like TensorFlow.js
    Visualization, Google Cloud, TensorBoard, and ml5.js.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然本书侧重于深度学习的实际应用，但在每个练习之前，都会简要回顾章节中涉及到的模型。最后，为了扩展示例的范围，你将使用其他工具和框架，如 TensorFlow.js
    可视化、Google Cloud、TensorBoard 和 ml5.js。
- en: Who is this book for?
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 这本书是为谁写的？
- en: This book targets those interested in developing deep learning solutions for
    the Web with TensorFlow.js. You do not need previous machine learning experience.
    However, it would help at least knowing what it is. For the beginner out there,
    firstmost, welcome to the exciting field of machine learning! This book will give
    you the right tools and knowledge to get you started in your machine learning
    (ML) path. After finishing it, you will be able to understand neural networks,
    a variety of them, and their uses. Most importantly, after the book, you will
    be capable of developing neural networks using TensorFlow.js, building applications
    around the networks, and deploying them on different platforms.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 本书针对那些对使用 TensorFlow.js 开发 Web 深度学习解决方案感兴趣的人。你不需要之前的机器学习经验。然而，至少了解它是什么会有所帮助。对于初学者来说，首先，欢迎来到激动人心的机器学习领域！这本书将为你提供正确的工具和知识，让你开始你的机器学习（ML）之路。完成它之后，你将能够理解各种神经网络，它们的用途。最重要的是，在本书之后，你将能够使用
    TensorFlow.js 开发神经网络，围绕网络构建应用程序，并在不同的平台上部署它们。
- en: To the expert, the chances are that you come from a Python background. If so,
    with this book, you will learn how to develop your models using TensorFlow.js
    Keras-like API or train them in Google Cloud, how to bring existing models to
    TensorFlow.js, and how to serve them in Node.js.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 对于专家来说，你很可能来自 Python 背景。如果是这样，通过这本书，你将学习如何使用 TensorFlow.js Keras-like API 开发你的模型，或者在
    Google Cloud 中训练它们，如何将现有模型带到 TensorFlow.js，以及如何在 Node.js 中提供服务。
- en: The book assumes that you have experience programming and doing software development
    since we will be writing code hands-on and using technical terms like “server,”
    “Git,” and “backend.” The book’s main language is JavaScript, so it would help
    to know the basics of it. Nonetheless, the book assumes that you do not know it,
    and so it explains those details that might be confusing or particular to the
    language. The goal here is that you will fully understand every detail behind
    the exercises.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 结构
- en: Structure
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 本书假设你具有编程和软件开发的经验，因为我们将会动手编写代码并使用像“服务器”、“Git”和“后端”这样的技术术语。本书的主要语言是JavaScript，因此了解其基础知识会有所帮助。然而，本书假设你不知道它，因此它解释了那些可能令人困惑或特定于该语言的细节。这里的目的是让你完全理解练习背后的每一个细节。
- en: Most of the chapters in the book consist of five principal sections. These are
    an introduction, an overview of the model, an explanation of the dataset, the
    application, and a recap.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 书中的大多数章节由五个主要部分组成。这些部分是一个引言、模型的概述、数据集的解释、应用和总结。
- en: Introduction
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 引言
- en: In the introduction, I will present the problem we will solve, the model or
    algorithm used to solve the problem, and the frameworks or libraries we will see
    throughout the chapter.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在引言中，我将介绍我们将要解决的问题、用于解决问题的模型或算法，以及我们将在本章中看到的框架或库。
- en: The model
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型
- en: In this part, we will learn about the model, its characteristics, peculiarities,
    and how it works.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在这部分，我们将了解模型、其特征、特性以及它是如何工作的。
- en: The dataset
  id: totrans-28
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据集
- en: This brief section describes the dataset we will use to train the model.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 本节简要描述我们将用于训练模型的数据库。
- en: The application
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 应用
- en: Here, we will build the application. Since most of the exercises are web apps,
    we will start by designing its interface in an HTML file. Then, we will proceed
    to build the functionalities.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们将构建应用。由于大多数练习都是Web应用，我们将首先在HTML文件中设计其界面。然后，我们将继续构建功能。
- en: Recap and further exercises
  id: totrans-32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 总结和进一步练习
- en: To end each chapter, we will see a small recap of the main terms and lessons
    discovered, followed by further exercises you could do to keep building on what
    you learned.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 为了结束每一章，我们将看到主要术语和发现的课程的小总结，然后是你可以做的进一步练习，以继续巩固你所学的内容。
- en: The source code
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 源代码
- en: 'You will write the exercises in JavaScript and use HTML and CSS for the interface
    and styling. The JavaScript code follows the ESLint coding style. During the explanations,
    I will (usually) present the code snippets split by functions, for example:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 你将使用JavaScript编写练习，并使用HTML和CSS进行界面和样式设计。JavaScript代码遵循ESLint编码风格。在解释过程中，我通常会按函数分割代码片段，例如：
- en: '[PRE0]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'And in another code snippet:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个代码片段中：
- en: '[PRE1]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: However, on some occasions, when the function is long, I will divide it across
    several code chunks. In those cases, I will explicitly indicate that the following
    code goes after the previous line.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在某些情况下，当函数很长时，我会将其分成几个代码块。在这些情况下，我将明确指出以下代码是在上一行之后。
- en: All of the exercises’ code is available on GitHub at [`https://github.com/Apress/Practical-TensorFlow.js`](https://github.com/Apress/Practical-TensorFlow.js)
    . There, you will find a directory per chapter with the complete code and datasets.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 所有练习的代码都可在GitHub上找到，链接为[`https://github.com/Apress/Practical-TensorFlow.js`](https://github.com/Apress/Practical-TensorFlow.js)。在那里，你可以找到每个章节的目录，包含完整的代码和数据集。
- en: Now, without further ado, let me welcome you to TensorFlow.js. I hope you will
    enjoy this adventure. Follow me!
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，无需多言，让我欢迎你加入TensorFlow.js的冒险之旅。我希望你会喜欢这次冒险。跟我来吧！
- en: Acknowledgments
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 致谢
- en: I wrote this book during my backpacking adventures through Asia and New Zealand.
    Before starting the trip, I told myself, "it would be amazing to write a book
    during this time." Luckily, and fortunately, on November 20, 2019, Aaron Black,
    Senior Editor from Apress, contacted me asking if I was interested in writing
    a book on TensorFlow.js. The answer was yes, and so I would like to first thank
    him for giving me such a fantastic opportunity. Also, from Apress, I want to thank
    Jessica Vakili, Coordinating Editor, for answering those little questions I had,
    and Technical Editors Ali Mezgani and Massimo Nardone for correcting my oversights.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我在穿越亚洲和新西兰的背包旅行中撰写了这本书。在开始旅行之前，我告诉自己，“在这段时间里写一本书将会很棒。”幸运的是，2019年11月20日，Apress的高级编辑Aaron
    Black联系我，问我是否对撰写一本关于TensorFlow.js的书感兴趣。答案是肯定的，因此我想首先感谢他给了我这样一个极好的机会。此外，我还想感谢Apress的协调编辑Jessica
    Vakili，她回答了我那些小问题，以及技术编辑Ali Mezgani和Massimo Nardone，他们纠正了我的疏忽。
- en: To all my former LOVOO colleagues, thank you so much for all the help! Alexander
    Bresk, thanks for taking the time to review the introduction to artificial neural
    networks. Sergio Camilo Hernández, *gracias* for going through Chapter [1](494424_1_En_1_Chapter.xhtml)
    and giving me that initial feedback, and Helton Luiz Marques for finding inconsistencies
    in Chapter [3](494424_1_En_3_Chapter.xhtml).
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 致我所有的前LOVOO同事，非常感谢你们所有的帮助！Alexander Bresk，感谢你抽出时间审阅人工神经网络引言。Sergio Camilo Hernández，*gracias*，感谢你审阅了第[1](494424_1_En_1_Chapter.xhtml)章并给予我最初的反馈，以及Helton
    Luiz Marques，感谢你在第[3](494424_1_En_3_Chapter.xhtml)章中找出不一致之处。
- en: 'To my friends: Jesús Luzón González, thanks for shedding some light on several
    definitions and for helping to correct Chapter [8](494424_1_En_8_Chapter.xhtml).
    Jean Rodríguez Aulet for comments regarding the brain’s visual cortex (Chapter
    [4](494424_1_En_4_Chapter.xhtml)). José Figueroa Salgado, Christos Sakalis, and
    Owen Baxter for making sure the introduction catches the reader. Daniel Llatas
    Spiers for correcting several concepts. To Nancy Wächtler, *vielen dank* for helping
    with the designs of the figures. To Vincent Warmerdam, thanks for taking the time
    to go over the USE explanation from Chapter [6](494424_1_En_6_Chapter.xhtml).
    Felipe Hoffa, thanks for taking a look at the introduction to the Google Cloud
    section from Chapter [7](494424_1_En_7_Chapter.xhtml).'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 致我的朋友们：Jesús Luzón González，感谢你为几个定义提供了一些启示，并帮助纠正了第[8](494424_1_En_8_Chapter.xhtml)章。Jean
    Rodríguez Aulet，感谢你对大脑视觉皮层的评论（第[4](494424_1_En_4_Chapter.xhtml)章）。José Figueroa
    Salgado、Christos Sakalis和Owen Baxter，感谢你们确保引言能够吸引读者。Daniel Llatas Spiers，感谢你纠正了几个概念。向Nancy
    Wächtler致以衷心的感谢，*vielen dank*，感谢你帮助设计图表。感谢Vincent Warmerdam抽出时间审阅第[6](494424_1_En_6_Chapter.xhtml)章中关于USE的解释。Felipe
    Hoffa，感谢你审阅了第[7](494424_1_En_7_Chapter.xhtml)章中关于Google Cloud部分的引言。
