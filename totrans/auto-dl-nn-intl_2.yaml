- en: 'The best trial demonstrated a **0.9941** accuracy on test dataset, which is
    an excellent result. We have indeed managed to build a model that distinguishes
    complex colored objects with a very high degree of accuracy. This is a good development!
    The reader may wonder: *Why is this section called From LeNet to AlexNet*? Well,
    itвЂ™s time to answer it. AlexNet is the name of a convolutional neural network
    architecture that won the 2012 Image Recognition competition. AlexNet classified
    images into 1000 different classes. At that time, it was a pretty advanced deep
    learning model. LetвЂ™s now compare three models: the LeNet model, the model we
    constructed in this section using HPO techniques (LeNet Evolution), and the AlexNet
    model.'
  prefs: []
  type: TYPE_NORMAL
- en: Figure [2-22](#Fig22) shows that the model we built in this section for humans
    and horses classification is somewhere between the original LeNet model and the
    AlexNet model. Our model shows a remarkable test result of **99.41%** accuracy.
    But most importantly, it was built entirely automatically with the help of HPO
    techniques and the NNI tool! We did not do any complex calculations or analytical
    analysis. We have just constructed a flexible LeNet Evolution model whose architecture
    depended on the passed hyperparameters. And as a result, we got a unique model
    that is fully adapted to solving a specific task. These results confirm the promise
    of HPOвЂ™s approach to solving deep learning problems.
  prefs: []
  type: TYPE_NORMAL
