- en: Summary
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this chapter, we started the HPO study. We studied how to create NNI experiments
    and solve practical problems. We managed to optimize the original LeNet model
    for handwritten digit recognition, upgrade the LeNet model using ReLU and dropout
    techniques, and construct a new complex color pattern recognition model based
    on the existing LeNet model. The results that we have obtained demonstrate the
    promise of AutoDL. In the next chapter, we will continue to study HPO and dive
    into the more advanced NNI usage in Hyperparameter Optimization problems.
  prefs: []
  type: TYPE_NORMAL
