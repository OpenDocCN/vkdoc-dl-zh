- en: Organizing Experiment
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: And so, we are all set to begin our first explorations. LetвЂ™s look at the file
    organization pattern weвЂ™ll be using in this book. I also recommend that you follow
    the same approach.
  prefs: []
  type: TYPE_NORMAL
- en: 'These simple rules will help you avoid unnecessary errors when running an experiment:'
  prefs: []
  type: TYPE_NORMAL
- en: Use a separate directory for each experiment.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Specify the current directory as trial code directory in the experiment configuration.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Keep the model class and training/testing methods in a separate file.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Add root code folder to the system path in trial file.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Do not mix model and trial files.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
