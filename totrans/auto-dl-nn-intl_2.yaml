    numbers. If a human has difficulties recognizing some handwritten characters,
    then the neural network is already close to its performance threshold. The current
    result of the upgraded LeNet model we have developed is close to the best.
  prefs: []
  type: TYPE_NORMAL
- en: This section demonstrates how new deep learning techniques can be injected into
    existing architecture. We defined a search space to choose the best design combination.
    HPO chose an upgraded model design that significantly improved the performance
    of the original model. And this is a very simple and useful technique that will
    allow you to uptune your models using the latest advances in machine learning.
  prefs: []
  type: TYPE_NORMAL
- en: From LeNet to AlexNet
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Libraries: TensorFlow (Keras API), PyTorch (PyTorch Lightning)'
  prefs: []
  type: TYPE_NORMAL
- en: Well, handwriting recognition is a rather important task, but it seems that
    itвЂ™s time to move on to more complicated problems. LetвЂ™s try to classify more
    complex objects. How about developing a model that will classify humans and horses?
    Figure [2-18](#Fig18) shows samples of вЂњhumans or horsesвЂќ dataset. This dataset
    contains 300Г—300 color images, that is, (300, 300, 3) tensors. Obviously, the
    image of a human or a horse is more complex than a 28Г—28 grayscale image of a
    handwritten number. And perhaps, we will need to evolve the LeNet model that we
    considered earlier. We will call it *LeNet Evolution* model.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig18_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-18
  prefs: []
  type: TYPE_NORMAL
- en: Humans vs. horses dataset
  prefs: []
  type: TYPE_NORMAL
- en: 'LetвЂ™s look at the architecture of the LeNet model again. LeNet model design
    can be divided into two components: *feature extraction* and *decision making*.
    Indeed, the convolution layer stack (*Conv2D в†’ Activation в†’ MaxPool2D в†’ Conv2D
    в†’ Activation в†’ MaxPool2D в†’ Flatten*) is responsible for extracting image patterns,
    that is, feature extraction. At the same time, the fully connected layer stack
    (*Linear в†’ Activation в†’ Linear в†’ SoftMax*) is responsible for selecting particular
    patterns to classify an input object. Figure [2-19](#Fig19) shows the areas of
    responsibility for each component.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig19_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-19
  prefs: []
  type: TYPE_NORMAL
- en: Feature extraction and decision maker components
  prefs: []
  type: TYPE_NORMAL
- en: 'Since human and horse images are more complex, we need to make the feature
    extraction component more sophisticated. Two types of layer sequences are usually
    responsible for extracting image patterns: *Conv2D в†’ Activation в†’ MaxPool2D* and
    *Conv2D в†’ Activation*. We can build an experiment that will inject different feature
    extraction sequences to find the best model design to solve the вЂњhuman and horsesвЂќ
    classification problem. In the following, we define three types of feature extraction
    layer sequences adding `none` as an empty sequence:'
  prefs: []
  type: TYPE_NORMAL
- en: '`simple`: *Conv2D в†’ Activation*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`with_pool`: *Conv2D в†’ Activation в†’ MaxPool2D*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`none`: Identity layer'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Each feature extraction sequence will have additional layer hyperparameters:
    `filters`, `kernel`, `pool_size`.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let the LeNet Evolution model have three pattern extraction slots. Each of
    these slots can be filled with one of the feature extraction sequences: `simple`,
    `with_pool`, `none`. For example, a LeNet Evolution model can have three feature
    extraction slots filled with the following layer sequences:'
  prefs: []
  type: TYPE_NORMAL
- en: '`with_pool`: *Conv2D(*`kernel_size`*=5,* `filters`*=16) в†’ Activation в†’ MaxPool2D(*`pool_size`*=3)*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`none`: Identity'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`simple`: *Conv2D(*`kernel_size`*=3,* `filters`*=8)в†’ Activation*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'And finally, the LeNet Evolution feature extraction component will look the
    following way: *Conv2D(*`kernel_size`*=5,* `filters`*=16) в†’ Activation в†’ MaxPool2D(*`pool_size`*=3)
    в†’ Conv2D(*`kernel_size`*=3,* `filters`*=8) в†’ Activation*.'
  prefs: []
  type: TYPE_NORMAL
- en: We can consider feature extraction sequences as the building blocks of the LeNet
    Evolution model, as shown in Figure [2-20](#Fig20).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig20_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-20
