- en: Random Search Tuner
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The Random Search Tuner is the most straightforward approach to choosing a combination
    of hyperparameters. As the name implies, the combination of hyperparameters is
    chosen absolutely randomly. Despite the simplicity of this approach, it can sometimes
    give very good results.
  prefs: []
  type: TYPE_NORMAL
