- en: Random Search Tuner
  prefs: []
  type: TYPE_NORMAL
- en: In some cases, Random Search Tuner is well suited for exploring the search space
    when you need to extract information about hyperparametersвЂ™ impact on model performance.
    After a random search space exploration, you can redefine hyperparameter search
    space and select another tuner.
  prefs: []
