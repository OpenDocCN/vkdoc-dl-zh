- en: Fine! WeвЂ™ve defined different hyperparameter types, examined how to define search
    spaces, studied simple tuners, and represented a pattern for creating experiments.
    We are now ready to move on to real research. The following sections will examine
    how HPO methods optimize the model for the specific problem and help develop a
    new model design.
  prefs: []
  type: TYPE_NORMAL
- en: Optimizing LeNet for MNIST Problem
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Libraries: TensorFlow (Keras API), PyTorch'
  prefs: []
  type: TYPE_NORMAL
- en: 'MNIST Classifier problem is a common problem to test various machine learning
    approaches. Convolutional neural networks have made a breakthrough in image recognition,
    so we also use the MNIST dataset for diving into the HPO area. The MNIST database
    contains images of handwritten digits. It is split into two sets: a training set
    of 60,000 samples and a test set of 10,000 examples.В Figure [2-9](#Fig9) displays
    several samples from the MNIST dataset.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-9
  prefs: []
  type: TYPE_NORMAL
- en: MNIST database
  prefs: []
  type: TYPE_NORMAL
- en: MNIST dataset is a set of 28Г—28 grayscale images. Therefore, each dataset object
    is a (28, 28, 1) tensor. LetвЂ™s examine several samples of this dataset.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE31]'
  prefs: []
  type: TYPE_PRE
- en: Listing [2-7](#PC32) displays the image in Figure [2-10](#Fig10).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-10
  prefs: []
  type: TYPE_NORMAL
- en: MNIST samples
  prefs: []
  type: TYPE_NORMAL
- en: This may seem like a very simple task, but it is not. Recall how often you could
    not understand the number written down by another personвЂ™s hand. Handwritten digit
    recognition was one of the first fundamental problems of pattern recognition.
    LeNet-5 is one of the earliest neural networks used for recognizing handwritten
    and machine-printed characters. The main reason behind the popularity of this
    model was its straightforward architecture. It is a multilayer convolution neural
    network for image classification. Abstract LeNet model design is depicted in Figure
    [2-11](#Fig11).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_2_Chapter/526245_1_En_2_Fig11_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-11
  prefs: []
  type: TYPE_NORMAL
- en: LeNet architecture
  prefs: []
  type: TYPE_NORMAL
- en: 'Our goal is to optimize the LeNet model to the handwritten digit recognition
    problem. The easiest thing is to start Layer Hyperparameter Optimization. LetвЂ™s
    just count the number of layer hyperparameters in the LeNet model:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Conv2D layer**: Five basic hyperparameters (`out_channels`, `kernel_size`,
    `stride`, `padding`, `dilation`)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**MaxPool2D layer**: Two basic hyperparameters (`kernel_size`, `stride`)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Linear layer****:** Two basic hyperparameters (`out_features`, `use_bias`)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: LeNet contains two Conv2D layers, two MaxPool2D layers, and two linear layers.
    Thus, we have 2Г—5 + 2Г—2 + 2Г—2 = 14 layer hyperparameters in LeNet model. LetвЂ™s
    assume that for each hyperparameter, we will have a set of possible values вЂ‹вЂ‹that
    will consist of only two elements, although, of course, many hyperparameters require
    more values вЂ‹вЂ‹for the flexibility of the experiment. But even this binary search
    space contains 2^(14) = 16 384 elements. And these are just the most primitive
    layer hyperparameters for one of the simplest deep learning models. As the complexity
    of the model increases, the number of possible hyperparameters in it grows exponentially.
    Even the most advanced tuner can take a very long time to explore this search
    space. Therefore, we need some experience and intuition, which will allow us to
    select the critical hyperparameter range for each model without increasing the
    search space too much.
  prefs: []
  type: TYPE_NORMAL
- en: 'LetвЂ™s consider only the following layer hyperparameters:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Conv2D layer 1**: `filter_size_1`, `kernel_size_1`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Conv2D layer 2**: `filter_size_2`, `kernel_size_2`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Linear layer**: `out_features`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In order to reduce the size of the search space, we set
  prefs: []
  type: TYPE_NORMAL
- en: '`filter_size_2 = 2 * filter_size_1`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`kernel_size_1 = kernel_size_2`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Then, we will focus on only three hyperparameters for LeNet model:'
  prefs: []
  type: TYPE_NORMAL
- en: '`filter_size`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`kernel_size`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`out_features`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Usually, the best values вЂ‹вЂ‹for the `filter_size` of the convolutional layer
    are presented as 2^n. Therefore, we will choose the following ones for the search
    space: 8, 16, 32\. The `kernel_size` values вЂ‹вЂ‹are usually chosen in a set of 2n
    + 1\. And the larger the image is, the larger `kernel_size` value вЂ‹вЂ‹вЂ‹вЂ‹should be
    chosen. The samples of the MNIST dataset are 28Г—28 images. These are pretty small
    images, so we shouldnвЂ™t choose large `kernel_size` values: 2, 3, 5\. The best
    values вЂ‹вЂ‹for `l1_size` are powers of two, as for `filter_size`. The linear layer
    is applied to the tensor after the flatten layer, which means that we have to
    consider the dimension of the tensor that the previous layers will produce. In
    the case of the MNIST problem, we will focus on the following `l1_size` values:
    32, 64, 128\. For MaxPool2D layerВ we will set the lowest possible value of `pool_size`,
    which is 2, and set `sigmoid` as the activation function. Yes! ThatвЂ™s the function
    that has been used for quite a long time as an activation function for most pattern
    recognition problems. We will return to the problem of choosing an activation
    function in the next section.'
  prefs: []
  type: TYPE_NORMAL
- en: 'We will use classic batch neural network training with `Adam` optimizer. So
    letвЂ™s now look at training hyperparameters. I suggest starting the study by selecting
    the simplest hyperparameters: `batch_size` and `learning rate`. The best parameters
    for `batch_size` are expressed as 2^n and `learning_rate` as 10^(-n). For this
    case, we will choose the following: 256, 512, 1024 for `batch_size` and 0.01,
    0.001, 0.0001 for `learning_rate`.'
  prefs: []
  type: TYPE_NORMAL
- en: Now letвЂ™s convert the hyperparameter constraints we made earlier into NNI search
    space.В Listing [2-8](#PC33) defines the search space for LeNet hyperparameter
    optimization search space.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE32]'
  prefs: []
  type: TYPE_PRE
- en: Fine! In the next step, we will create TensorFlow and PyTorch implementations
    of the LeNet model considering the HPO problem.
