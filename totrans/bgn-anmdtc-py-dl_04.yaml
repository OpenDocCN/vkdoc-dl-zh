- en: '[PRE0]'
  id: totrans-273
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: The output result should be a score of 0.9928\. With an AUC score that high,
    and an F1-measure of 0.979, we have a strong anomaly detector. We can also check
    the confusion matrix. Execute the code in Figure [4-40](#Fig40).
  id: totrans-274
