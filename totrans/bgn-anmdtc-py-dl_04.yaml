  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-30
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
- en: Repeating hyperparameter grid search with a narrower range of `max_samples`
    candidate values
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
- en: Now rerun the code in Figure [4-28](#Fig28) by either rerunning that cell or
