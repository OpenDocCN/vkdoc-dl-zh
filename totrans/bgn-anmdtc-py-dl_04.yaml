  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-10
  prefs: []
  type: TYPE_NORMAL
- en: Creating a dictionary of `df` columns and their respective datatypes
  prefs: []
  type: TYPE_NORMAL
- en: The attribute `.dtypes` returns a pandas Series of datatypes with the columns
