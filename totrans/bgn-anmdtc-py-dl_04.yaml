  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
- en: From Figure [4-31](#Fig31), we can see that the optimal range is somewhere within
    the range of 900–1100, and again from 1300–1700.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
- en: Let’s repeat the tuning process one more time with a narrower range and see
    how much higher we can get with the F1-score. Execute the code in Figure [4-32](#Fig32).
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig32_HTML.png)'
  id: totrans-227
  prefs: []
  type: TYPE_IMG
- en: A set of program codes in Python. It repeats the validation with a narrower
    range for max samples and fixes the n estimators to be quicker using the Isolation
    Forest, x, and y values.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-32
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
- en: Repeating the hyperparameter search with a more focused range of candidate values
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
- en: Once done, rerun the code in Figure [4-28](#Fig28). You should notice that the
    parameter setting of 950 had the best F1-score by far at 0.963\. We can keep going
    with the hyperparameter tuning or accept the values we are seeing. After some
    point, we will see diminishing gains, so keep that in mind in the future. From
    our results, it seems that the setting of 950 actually performed the best somehow,
    so we will use this setting as we go forward with tuning the other hyperparameters.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
- en: Next, we will tune `max_features`. Execute the code in Figure [4-33](#Fig33).
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig33_HTML.png)'
  id: totrans-233
  prefs: []
  type: TYPE_IMG
- en: A set of program codes in Python. It tunes the maximum features, fixes the n
    estimators to be quicker, and trains all the cores using the isolation forest,
    x, and y values.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-33
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
- en: The parameter `max_features` is a fraction, which is why we divide by ten. We
    are searching from 0.5 to 0.7 in a 0.1 interval
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
- en: Once done, rerun the code in Figure [4-28](#Fig28). You should see that the
    `max_features` setting of 0.6 has given us an F1-score of 0.972.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
- en: We can try another round of hyperparameter tuning and see if a narrower range
    nets us more gains. Let’s search from 0.55 to 0.70 with a 0.01 interval. Run the
    code in Figure [4-34](#Fig34).
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig34_HTML.png)'
  id: totrans-239
  prefs: []
  type: TYPE_IMG
- en: A set of program codes in Python. It tunes the maximum features with a narrower
    range, fixes the n estimators to be quicker, trains all the cores using the isolation
    forest, x, and y values, and returns the validation results.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-34
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
- en: Trying a much narrower range of 0.55 to 0.70 with 0.01 intervals for `max_features`
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
- en: Once done, execute the code in Figure [4-28](#Fig28) again. You should see that
    0.55 through 0.61 are the same values of approximately 0.9722, after which the
    scores drop. Let’s just pick `max_features` = 0.55 and tune the final hyperparameter,
    `n_estimators`. The reason we chose `max_features` = 0.55 is just to pick the
    smallest hyperparameter setting that still netted us the most performance. There
    is a principle called Occam’s razor which, when applied to machine learning, is
    where performance being equal, picking the simpler machine learning model is likely
    to be better.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
- en: This choice is consistent with the Occam’s razor principle, which, when applied
    to machine learning models with relatively equal performance, means that the simplest
    machine learning model is likely the best choice. Picking a smaller ratio of random
    features to isolate by and still getting the same performance means it might be
    better to keep things simpler and pick the lowest value of `max_features` given
    the best performance. It’s not a hard-and-fast rule, though.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
- en: Now execute the code in Figure [4-35](#Fig35) to conduct a broad search of `n_estimators`
    candidate values.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig35_HTML.png)'
  id: totrans-246
  prefs: []
  type: TYPE_IMG
- en: A set of program codes in Python. It tunes the maximum features with a narrower
    range, fixes the n estimators to be quicker to conduct a broad search of n estimators
    candidate values, trains all the cores using the isolation forest, x, and y values,
    and returns the validation results.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-35
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
- en: Doing a broad search of `n_estimators` candidate values
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
- en: Once done, rerun Figure [4-28](#Fig28) to observe the results. It seems that
    `n_estimators` = 10 actually gives us the best F1-score, 0.9799, which is the
    strongest performance we have seen thus far. And so, with as little as ten estimators
    in the forest, the Isolation Forest is able to predict anomalies quite well on
    the validation set. Let’s keep all these hyperparameter settings, train on the
    training data, and evaluate on the test data and see what performance we get.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
- en: Evaluation and Summary
  id: totrans-251
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
