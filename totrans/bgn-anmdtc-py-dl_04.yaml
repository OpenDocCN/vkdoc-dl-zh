  type: TYPE_NORMAL
- en: The output shapes of the train, val, and test sets
  prefs: []
  type: TYPE_NORMAL
- en: Training
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: Finally, we can get started with the Isolation Forest modeling task. Run Figure
    [4-19](#Fig19) to instantiate our model.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig19_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A set of program codes in Python. It implements the isolation forest algorithm
    with stock parameters and calls the random state value 42.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-19
  prefs: []
  type: TYPE_NORMAL
- en: With default parameters, instantiating an Isolation Forest model
  prefs: []
  type: TYPE_NORMAL
- en: The code in Figure [4-20](#Fig20) trains on the training data and generates
    anomaly scores from the training data.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig20_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A set of program codes in Python. It trains the training data and generates
    anomaly scores from the training data using the isolation forest decision function.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-20
  prefs: []
  type: TYPE_NORMAL
- en: Training the model and predicting anomaly scores
  prefs: []
  type: TYPE_NORMAL
- en: We can visualize the anomaly scores and get an idea of the distribution of average
    path lengths. Remember, the Isolation *Forest* contains many individual trees
    that each have a specific path length, which is why we are averaging them all.
    We should see a left skew, meaning the tail is long to the left of the graph,
    while most of the data is distributed toward the right. Figure [4-21](#Fig21)
    shows how to plot this.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig21_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A set of program codes in Python. It defines the codes to plot the histogram
    of anomaly scores by labeling the x-axis as Average Path Lengths and the y-axis
    as the Number of Data Points.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-21
  prefs: []
  type: TYPE_NORMAL
- en: Code to plot a histogram of the anomaly scores, derived from average path lengths
    of each sample in the data
  prefs: []
  type: TYPE_NORMAL
- en: The output should look like the graph shown in Figure [4-22](#Fig22).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig22_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A histogram of the number of data points versus average path lengths. It plots
    exponentially increasing trends with the highest value at (0.18, 100000). Data
    is approximated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-22
  prefs: []
  type: TYPE_NORMAL
- en: A histogram showing the average path lengths (anomaly scores). Since most of
    the data is normal, there should be a left skew as we see in the graph. The little
    clump of outliers far to the left are obvious anomalies
  prefs: []
  type: TYPE_NORMAL
- en: Given what we see in the graph, let’s manually set a threshold. The idea is
    that any anomaly score below this threshold is counted as an anomaly, while any
    anomaly score above this threshold is counted as a normal point.
  prefs: []
  type: TYPE_NORMAL
- en: Run the code in Figure [4-23](#Fig23) to do this, as well as check the precision,
    recall, and F1-score of the resulting predictions. The negative path lengths are
    a result of the specific scoring algorithm used by Scikit-Learn’s implementation
    of the Isolation Forest. Negative scores represent anomalies, and positive scores
    represent normal points. As we can clearly see a small clump of outliers to the
    left of –0.3, we will set a threshold of –0.3 based on this observation. Will
    this be enough to capture our anomalies? This is a tunable hyperparameter. Feel
    free to adjust it and notice the resulting change in performance.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig23_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A set of program codes in Python. It sets the threshold, anomalies, precision,
    recall, and f 1 and prints the precision, recall, and f 1 measure.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-23
  prefs: []
  type: TYPE_NORMAL
- en: Setting the threshold and predicting anomalies based on what side of the threshold
    each score falls under. Then displaying the precision, recall, and F1-measure
  prefs: []
  type: TYPE_NORMAL
- en: The precision, recall, and F1-measure are chosen because they help paint a clear
    picture of how the model does with respect to predicting anomalies. We want to
    maximize both precision (the model’s anomaly prediction success rate) and the
    recall (the model’s true anomaly capture rate). Only when both are maximized do
    we have a proper anomaly detector. The output of executing the code in Figure
    [4-23](#Fig23) is shown in Figure [4-24](#Fig24).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig24_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A set of program codes in Python displays the following. Line 1\. Precision
    colon 1.0\. Line 2\. Recall colon 0.4050179211469534\. Line 3\. F 1 Measure colon
    0.576530612244898.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-24
  prefs: []
  type: TYPE_NORMAL
- en: The model’s predictive performance is poor, as indicated by the recall and F1-measure
    being so low. This is a bad anomaly detector
  prefs: []
  type: TYPE_NORMAL
- en: Looking at Figure [4-24](#Fig24), the precision is 1.0\. This means that we
    certainly did isolate the anomalies by picking our threshold, except it is clearly
    not enough, as we only captured ~40% of the anomalies.
  prefs: []
  type: TYPE_NORMAL
- en: This does not mean that the Isolation Forest model is bad, but rather that we
    now have to embark upon the hyperparameter tuning process to better fit the isolation
    model to our specific dataset and use case.
  prefs: []
  type: TYPE_NORMAL
- en: Hyperparameter Tuning
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: Isolation Forest depends quite heavily on the hyperparameter settings, which
    must be tailored to your specific dataset. It’s not like a deep neural network
    that mostly learns by itself; most of the work with these traditional machine
    learning algorithms is getting the hyperparameter tuning just right.
  prefs: []
  type: TYPE_NORMAL
- en: 'With the Isolation Forest, the following are the hyperparameters of interest
    to tune:'
  prefs: []
  type: TYPE_NORMAL
- en: '`max_samples`: How many samples to use to train each tree in the forest'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`max_features`: How many features per data point to use to train each tree
    in the forest'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`n_estimators`: How many trees should comprise the forest'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There is also a feature, **contamination**, that tells the Isolation Forest
    what proportion of the data is contaminated by anomalies. But for this, we can
    calculate the proportion of anomalies from our training set and pass it in directly.
  prefs: []
  type: TYPE_NORMAL
- en: As for the method of hyperparameter tuning, we will use holdout validation combined
    with grid search. Holdout validation, given a sufficient data size, is good for
    getting ballpark estimates of what direction to move in with respect to hyperparameter
    adjustments. Holdout validation does a good job of massively boosting predictive
    capability. However, if you want to be experimentally thoroughly sound and robust,
    K-fold cross-validation is the way to go if you can afford the computational expenses
    or if your validation data size is not sufficient enough.
  prefs: []
  type: TYPE_NORMAL
- en: With that being said, let’s calculate the `contamination` parameter first, as
    shown in Figure [4-25](#Fig25).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig25_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A set of program codes in Python. It estimates the proportion of anomalies about
    0.0065 and 0.006 from the y train and the length of the y train.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-25
  prefs: []
  type: TYPE_NORMAL
- en: Calculating the proportion of anomalies in the training dataset
  prefs: []
  type: TYPE_NORMAL
- en: The output should be around 0.00658, which we can round up to 0.0066\. Now,
    let’s define one single experimental run as a function to make our code more modular.
    Refer to Figure [4-26](#Fig26).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig26_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A set of program codes in Python. It uses the isolation forest instance, x,
    and y data, train, evaluate, and return the results. It uses the stock Logistic
    Regression model to predict the labels of precision, recall, and F 1 score.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-26
  prefs: []
  type: TYPE_NORMAL
- en: Code to perform one experimental trial given an Isolation Forest model and the
    x and y data. The precision, recall, and F1-measure metrics are calculated and
    returned as a dictionary
  prefs: []
  type: TYPE_NORMAL
- en: Notice that we are using a logistic regression model to predict the anomaly
    scores. This is to avoid manual tuning of the threshold and to get a model to
    find this threshold by itself. The logistic regression model takes in the input
    features and essentially serves as a threshold function, where if the threshold
    is passed, the output is 1, otherwise it is 0\. The intention here is to have
    the model learn the threshold automatically and use that learned threshold to
    predict anomaly labels for future data.
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s start by tuning the `max_samples` parameter. We don’t really know
    where to start, so let’s begin with powers of two covering 256 and going up to
    4096\. Make sure to read the documentation to find out the ballpark you should
    start in when conducting your grid search. You don’t want to be so far off that
    movement in any direction doesn’t give you much gain.
  prefs: []
  type: TYPE_NORMAL
- en: Execute the code in Figure [4-27](#Fig27). It may take a bit of time.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig27_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A set of program codes in Python. It performs the experimental search for max
    samples and fixes the n estimators to be quicker by calling the isolation forest,
    x, and y values.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-27
  prefs: []
  type: TYPE_NORMAL
- en: Grid search over `max_sample` sizes from 256 to 4,096 to find out which setting
    provides the best result on the validation split
  prefs: []
  type: TYPE_NORMAL
- en: Note that we have switched to using our validation set. This lets us perform
    faster prototyping than training on the entire training set every time.
  prefs: []
  type: TYPE_NORMAL
- en: If you run the code in Figure [4-28](#Fig28), you should see the results of
    this grid search displayed as the cell output.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig28_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A set of program codes in Python. It prints out the validation results. The
    optimal setting is between 512 and 4096 and runs the code.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-28
  prefs: []
  type: TYPE_NORMAL
- en: Code to navigate through the results dictionary and display the hyperparameter
    value and the corresponding F1-measure. Since F1-measure reflects both precision
    and recall, maximizing F1-measure will also maximize both precision and recall
  prefs: []
  type: TYPE_NORMAL
- en: The output of Figure [4-28](#Fig28) is shown in Figure [4-29](#Fig29).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig29_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A set of program codes in Python displays the output from the results of the
    validation and the optimal setting with max samples as 1024 and F 1 measure as
    0.954.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-29
  prefs: []
  type: TYPE_NORMAL
- en: Just looking at `max_samples` = 1024, it looks like our results are almost good
    to go already, as the F1-measure is 0.954
  prefs: []
  type: TYPE_NORMAL
- en: As you can see in Figure [4-28](#Fig28), just tuning one hyperparameter has
    made a world of difference. Let’s see if we can keep tuning `max_samples` and
    arrive at a more precise value that might perform even better.
  prefs: []
  type: TYPE_NORMAL
- en: We will narrow our search to be in between 500 and 2000, since that seems to
    be the range where the F1-scores peak and start to reduce again.
  prefs: []
  type: TYPE_NORMAL
- en: Run the code in Figure [4-30](#Fig30).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig30_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A set of program codes in Python. It repeats the validation with a narrower
    range for max samples, fixes the n estimators to be quicker, and trains on all
    the cores using the Isolation Forest algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-30
  prefs: []
  type: TYPE_NORMAL
- en: Repeating hyperparameter grid search with a narrower range of `max_samples`
    candidate values
  prefs: []
  type: TYPE_NORMAL
- en: Now rerun the code in Figure [4-28](#Fig28) by either rerunning that cell or
    pasting the same code in a new cell. You should see output like that shown in
    Figure [4-31](#Fig31).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig31_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A set of program codes in Python displays the output of the results of the validation,
    optimal setting, repeated validation with a narrower range for max samples, n
    estimators, and Isolation Forest algorithm cores.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-31
  prefs: []
  type: TYPE_NORMAL
- en: Output of running the code in Figure [4-28](#Fig28) after running the code in
    Figure [4-30](#Fig30)
  prefs: []
  type: TYPE_NORMAL
- en: From Figure [4-31](#Fig31), we can see that the optimal range is somewhere within
    the range of 900–1100, and again from 1300–1700.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s repeat the tuning process one more time with a narrower range and see
    how much higher we can get with the F1-score. Execute the code in Figure [4-32](#Fig32).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig32_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A set of program codes in Python. It repeats the validation with a narrower
    range for max samples and fixes the n estimators to be quicker using the Isolation
    Forest, x, and y values.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-32
  prefs: []
  type: TYPE_NORMAL
- en: Repeating the hyperparameter search with a more focused range of candidate values
  prefs: []
  type: TYPE_NORMAL
- en: Once done, rerun the code in Figure [4-28](#Fig28). You should notice that the
    parameter setting of 950 had the best F1-score by far at 0.963\. We can keep going
    with the hyperparameter tuning or accept the values we are seeing. After some
    point, we will see diminishing gains, so keep that in mind in the future. From
    our results, it seems that the setting of 950 actually performed the best somehow,
    so we will use this setting as we go forward with tuning the other hyperparameters.
  prefs: []
  type: TYPE_NORMAL
- en: Next, we will tune `max_features`. Execute the code in Figure [4-33](#Fig33).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig33_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A set of program codes in Python. It tunes the maximum features, fixes the n
    estimators to be quicker, and trains all the cores using the isolation forest,
    x, and y values.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-33
  prefs: []
  type: TYPE_NORMAL
- en: The parameter `max_features` is a fraction, which is why we divide by ten. We
    are searching from 0.5 to 0.7 in a 0.1 interval
  prefs: []
  type: TYPE_NORMAL
- en: Once done, rerun the code in Figure [4-28](#Fig28). You should see that the
    `max_features` setting of 0.6 has given us an F1-score of 0.972.
  prefs: []
  type: TYPE_NORMAL
- en: We can try another round of hyperparameter tuning and see if a narrower range
    nets us more gains. Let’s search from 0.55 to 0.70 with a 0.01 interval. Run the
    code in Figure [4-34](#Fig34).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig34_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A set of program codes in Python. It tunes the maximum features with a narrower
    range, fixes the n estimators to be quicker, trains all the cores using the isolation
    forest, x, and y values, and returns the validation results.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-34
  prefs: []
  type: TYPE_NORMAL
- en: Trying a much narrower range of 0.55 to 0.70 with 0.01 intervals for `max_features`
  prefs: []
  type: TYPE_NORMAL
- en: Once done, execute the code in Figure [4-28](#Fig28) again. You should see that
    0.55 through 0.61 are the same values of approximately 0.9722, after which the
    scores drop. Let’s just pick `max_features` = 0.55 and tune the final hyperparameter,
    `n_estimators`. The reason we chose `max_features` = 0.55 is just to pick the
    smallest hyperparameter setting that still netted us the most performance. There
    is a principle called Occam’s razor which, when applied to machine learning, is
    where performance being equal, picking the simpler machine learning model is likely
    to be better.
  prefs: []
  type: TYPE_NORMAL
- en: This choice is consistent with the Occam’s razor principle, which, when applied
    to machine learning models with relatively equal performance, means that the simplest
    machine learning model is likely the best choice. Picking a smaller ratio of random
    features to isolate by and still getting the same performance means it might be
    better to keep things simpler and pick the lowest value of `max_features` given
    the best performance. It’s not a hard-and-fast rule, though.
  prefs: []
  type: TYPE_NORMAL
- en: Now execute the code in Figure [4-35](#Fig35) to conduct a broad search of `n_estimators`
    candidate values.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig35_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A set of program codes in Python. It tunes the maximum features with a narrower
    range, fixes the n estimators to be quicker to conduct a broad search of n estimators
    candidate values, trains all the cores using the isolation forest, x, and y values,
    and returns the validation results.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-35
  prefs: []
  type: TYPE_NORMAL
- en: Doing a broad search of `n_estimators` candidate values
  prefs: []
  type: TYPE_NORMAL
- en: Once done, rerun Figure [4-28](#Fig28) to observe the results. It seems that
    `n_estimators` = 10 actually gives us the best F1-score, 0.9799, which is the
    strongest performance we have seen thus far. And so, with as little as ten estimators
    in the forest, the Isolation Forest is able to predict anomalies quite well on
    the validation set. Let’s keep all these hyperparameter settings, train on the
    training data, and evaluate on the test data and see what performance we get.
  prefs: []
  type: TYPE_NORMAL
