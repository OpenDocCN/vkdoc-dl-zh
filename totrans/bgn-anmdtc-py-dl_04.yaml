  prefs: []
  type: TYPE_NORMAL
- en: The first thing to note is that the dataset is very imbalanced and that there
    are very few anomalies by proportion. The second thing to note is that these are
    categorical labels. We need to encode them as a numeric format. To do this, we
    can simply assign 0 to a normal data point and 1 to an anomalous data point, since
    our only goal is to differentiate between an anomaly and a normal point. Figure
    [4-8](#Fig8) shows the code to do this.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig8_HTML.png)'
  prefs: []
  type: TYPE_IMG
