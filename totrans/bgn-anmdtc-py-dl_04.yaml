- en: 4. Traditional Machine Learning Algorithms
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This chapter introduces you to the Isolation Forest and the One-Class Support
    Vector Machine algorithms and walks you through how to use them for anomaly detection.
    In the process, you will also practice incorporating the fundamental machine learning
    workflow and incorporating hyperparameter tuning using the validation set.
  prefs: []
  type: TYPE_NORMAL
- en: 'In a nutshell, this chapter covers the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: Isolation Forest
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: One-Class Support Vector Machine
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: Code examples are provided in Python 3.8\. The code repository for this book
    is available at [`https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/tree/master`](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/tree/master).
  prefs: []
  type: TYPE_NORMAL
- en: The repository also includes a requirements.txt file to check your packages
    and their versions.
  prefs: []
  type: TYPE_NORMAL
- en: Code examples for this chapter are available in two locations. For the Isolation
    Forest algorithm, go to [`https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%204%20Traditional%20Machine%20Learning%20Algorithms/chapter4_isolationforest.ipynb`](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%204%20Traditional%20Machine%20Learning%20Algorithms/chapter4_isolationforest.ipynb).
  prefs: []
  type: TYPE_NORMAL
- en: For the One-Class Support Vector Machine, go to [`https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%204%20Traditional%20Machine%20Learning%20Algorithms/chapter4_ocsvm.ipynb`](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%204%20Traditional%20Machine%20Learning%20Algorithms/chapter4_ocsvm.ipynb).
  prefs: []
  type: TYPE_NORMAL
- en: Navigate to “Chapter 4 Traditional Machine Learning Algorithms” and then click
    chapter4_isolationforest.ipynb and chapter4_ocsvm.ipynb. The code is provided
