  prefs: []
  type: TYPE_NORMAL
- en: Now that we have dealt with all of the categorical variables and converted everything
    to numerical equivalents, we can check the correlation matrix. Run the code shown
    in Figure [4-12](#Fig12). You can explore the rest of the correlation matrix on
    your own if you would like.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig12_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A set of program codes in Python. It checks the variables with the highest correlation
    with the label.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-12
  prefs: []
  type: TYPE_NORMAL
- en: Creating a copy of `df` (so that we have a restore point if needed) and saving
    the label column of the correlation matrix as its own variable
  prefs: []
  type: TYPE_NORMAL
- en: 'We want to keep only the columns that have at least a 0.2 magnitude correlation
    with label. In other words, if it is at least weakly linearly correlated, we want
    to include those variables only. The following list provides a general rule of
    thumb to follow in terms of magnitude:'
  prefs: []
  type: TYPE_NORMAL
- en: '**0.0 correlation**: No linear correlation'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**0.2 to 0.4**: Weak linear correlation'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**0.4 to 0.6**: Moderate linear correlation'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**0.6 to 0.8**: Strong linear correlation'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**0.8 to 1.0**: Very strong linear correlation'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**1.0 correlation**: Perfect linear correlation, like the relation y = mx,
    where m is a positive coefficient and all the points lie on a straight line'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Correlation can also be negative. Positive correlation means as y increases,
    x also increases. Negative correlation means as y increases, x decreases. An example
    of –1.0 correlation is the relation y = mx, where m is a negative coefficient.
    The points all lie on a straight line.
  prefs: []
  type: TYPE_NORMAL
- en: We picked 0.2 as the threshold since practically no linear correlation exists
    below that point. Ultimately, this is another hyperparameter to tune and experiment
    with to see how this affects the end performance.
  prefs: []
  type: TYPE_NORMAL
- en: Run the code in Figure [4-13](#Fig13). Feel free to explore `label_corr` in
    its entirety.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_4_Chapter/483137_2_En_4_Fig13_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A set of program codes in Python. It runs the code by filtering out anything
    that has a null entry or is not weakly correlated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-13
  prefs: []
  type: TYPE_NORMAL
- en: Filtering out columns with null entries or no linear correlation. We also index
    t`rain_cols[:-1]` to remove label as its own correlation
  prefs: []
  type: TYPE_NORMAL
- en: As a result of the correlation pruning, we have gone from 42 total columns to
    just 13, reducing the computational complexity of training our models as there’s
    much less data to ingest for the model. You should see output like that shown
