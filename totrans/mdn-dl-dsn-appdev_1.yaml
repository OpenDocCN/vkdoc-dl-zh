- en: 1. A Deep Dive into Keras
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '*Imagination is more important than knowledge. For knowledge is limited, whereas
    imagination embraces the entire world.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: —Albert Einstein^([1](#Fn1))
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: One of the key goals of this book is to explore concepts in deep learning as
    an analytical art – the computing environment is your canvas, and deep learning
    design is your brush. A strong grasp of analytical creativity and imagination
    is integral to understanding deep learning at an instinctive, visceral level.
    This book aims to provide you with that understanding. As the world of deep learning
    constantly changes, those that attach their knowledge of deep learning to only
    the tools of today will find it difficult to work with deep learning when new
    syntaxes and libraries are introduced. An intuitive sense of playfulness and intellectual
    freedom and curiosity, though, can get us closer to working with deep learning
    closely, personally, and successfully beyond an interdependence on any one specific
    model architecture or framework.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, interdependence is a lofty ideal; yet, in response to Einstein’s
    famous quote, imagination and creativity must be grounded in certain concrete
    sets of knowledge to exist at all. Being able to explore and understand the analytical
    art of deep learning first requires setting up the framework for implementation,
    much like laying the foundation for a house. The knowledge – from concepts to
    code – will allow us to explore more abstracted and complex ideas in deep learning
    in later chapters.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter will take a deep dive into Keras, the chosen framework for understanding
    how to build and implement the concepts we’ll develop. The content covered in
    this chapter is not intended to be a substitute for easily accessible online syntax
    documentation – Keras and TensorFlow API docs are the best for those purposes.
    Rather, it is meant both as a quick introduction to the key building blocks of
    Keras to build more complex structures we’ll work with later and as a concept
    reference guide that may be valuable to refer back to later. Beyond covering the
    syntax of Keras – as most online code tutorials or API docs do – we’ll dive into
    frameworks to understand tips, tricks, and concepts to ensure efficient and masterful
    usage of Keras and the process of thinking.
  prefs: []
  type: TYPE_NORMAL
- en: Why Keras?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In Greek, Keras (κέρας) means “horn,” in reference to the *Odyssey*. It was
    initially developed for project ONEIROS (Open-ended Neuro-Electronic Intelligent
    Robot Operating System) but has since become exceedingly popular in the modern
    deep learning community for a wide scope of applications and contexts.
  prefs: []
  type: TYPE_NORMAL
- en: There are many deep learning frameworks available, but Keras is particularly
    remarkable in its simplicity and versatility. Keras brands itself as “deep learning
    for humans,” but its user-friendliness speaks for itself. Keras’ design minimizes
    the time and energy required to bridge idea and implementation.
  prefs: []
  type: TYPE_NORMAL
- en: 'A 2019 survey asked top-scoring teams in Kaggle competitions about which machine
    learning frameworks they used and found that Keras ranked first.^([2](#Fn2)) Francis
    Chollet, the creator of Keras, wrote in a Quora post about his thoughts on why
    this was:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Developing good models requires iterating many times on your initial ideas,
    up until the deadline; you can always improve your models further… Keras was designed
    as a way to quickly prototype many different models, with a focus on reducing
    as much as possible the time it takes to go from having an idea to experimental
    results.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: —Francis Chollet^([3](#Fn3))
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Keras’ speed of development and versatility also makes it a popular choice for
    companies like Netflix and Instacart, researchers, and scientific organizations
    like CERN and NASA. As of early 2021, Keras has over 400,000 users.^([4](#Fn4))
  prefs: []
  type: TYPE_NORMAL
- en: This is not a book fundamentally about Keras – it’s a book about modern deep
    learning design. An integral part of design, though, as discussed, is implementation.
    Keras will be the valuable medium through which we can frame and realize the ideas
    we discuss. With Keras, we are freer to explore the possibilities of deep learning
    without being tied to arduous and lengthy implementations.
  prefs: []
  type: TYPE_NORMAL
- en: Installing and Importing Keras
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Keras can be installed by itself via `pip` as `pip install keras` and imported
    as `import keras`. This (and all future installments) can be installed in the
    command prompt interface directly or in Jupyter Notebook by adding an exclamation
    mark (!) before the command. However, Keras has become part of TensorFlow, a deep
    learning framework by Google that allows for more low-level control. Since this
    merger, Keras users can take advantage of both Keras’ user-friendliness and TensorFlow’s
    lower-level customization abilities.
  prefs: []
  type: TYPE_NORMAL
- en: Since TensorFlow includes Keras, it’s redundant to install Keras separately.
    Thus, often only TensorFlow is installed, and Keras is imported from TensorFlow
    (Listing [1-1](#PC1)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'If you do not already have a workspace, consider the following to get started:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Jupyter Notebook*: Jupyter Notebook is especially popular for data science
    because its cell-based input-output structure allows for rapid experimentation
    and clean organization. Installing via Anaconda automatically installs important
    data science libraries.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Kaggle*: Kaggle is an online data science platform that hosts competitions,
    datasets, data science forums, and code notebooks. Kaggle notebooks support both
    Jupyter Notebooks and Python or R scripts. Although Kaggle cannot handle highly
    computation or memory intensive operations, as it is web-based, it provides easy-to-access
    GPU and TPU. Moreover, Kaggle allows you to easily run notebooks for several hours
    on their own servers, which is a simple alternative to setting up virtual machines
    or other computational workflows. As of 2021, Kaggle usually puts a 30- to 42-hour
    weekly cap on GPU usage (varying by week) and a 30-hour weekly cap on TPU usage.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Google Colab*: Google Colab also allows for GPU and TPU usage, which is technically
    unlimited but can be cut off when the available computational resources cannot
    handle the demand and you’ve already been consuming the resources for a significant
    period of time. Google Colab is good for sharing and for quick experimentation
    on high-powered computation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Simple Keras Workflow
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'When building any model with Keras, there are generally three steps in the
    deep learning workflow: define architecture, compile, and fit and analyze (Figure
    [1-1](#Fig1)). The simplest to the most complex models follow this workflow. In
    this section, we’ll review each of the steps in this workflow in detail.'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_1_Chapter/516104_1_En_1_Fig1_HTML.jpg](../images/516104_1_En_1_Chapter/516104_1_En_1_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-1
  prefs: []
  type: TYPE_NORMAL
- en: The input-body-output model of a neural network
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Define Architecture'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There are three key parts of a neural network’s architecture (Figure [1-2](#Fig2)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_1_Chapter/516104_1_En_1_Fig2_HTML.jpg](../images/516104_1_En_1_Chapter/516104_1_En_1_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-2
  prefs: []
  type: TYPE_NORMAL
- en: The input-body-output model of a neural network
  prefs: []
  type: TYPE_NORMAL
- en: '*Input*: This part defines and receives the format of the input data that the
    neural network will use for the basis of prediction.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Body*: This part performs a series of operations on the input to transform
    it into an output. The body is composed of the layers of the neural network.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Output*: This part defines the format of the neural network’s output result.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: In this section, we will use the Sequential Keras API to illustrate the Keras
    workflow. The Sequential model allows the user to build models by stacking on
    layers linearly or sequentially. It suffices for simpler architectures, but more
    complex designs require the Functional API, which will be discussed later.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s consider a very simple dataset to define the architecture of a neural
    network (Table [1-1](#Tab1)). This sample dataset contains three binary features
    – *A*, *B*, and *C* – and two binary labels. Label 1 is 1 only if any of the features
    is 1, and Label 2 is 1 only if at least two of the features have value 1.
  prefs: []
  type: TYPE_NORMAL
- en: Table 1-1
  prefs: []
  type: TYPE_NORMAL
- en: Sample dummy dataset with three features and two labels
  prefs: []
  type: TYPE_NORMAL
- en: '| A | B | C | Label 1 | Label 2 |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| 0 | 0 | 0 | 0 | 0 |'
  prefs: []
  type: TYPE_TB
- en: '| 1 | 0 | 0 | 1 | 0 |'
  prefs: []
  type: TYPE_TB
- en: '| 0 | 1 | 0 | 1 | 0 |'
  prefs: []
  type: TYPE_TB
- en: '| 0 | 1 | 1 | 1 | 1 |'
  prefs: []
  type: TYPE_TB
- en: '| 1 | 1 | 0 | 1 | 1 |'
  prefs: []
  type: TYPE_TB
- en: '| 1 | 1 | 1 | 1 | 1 |'
  prefs: []
  type: TYPE_TB
- en: This dataset has three features, which means that the input is three-dimensional.
    Let’s begin by importing Keras, the Sequential model, and the Input layer; we
    can create a model and define the input (Listing [1-2](#PC2)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: If the model were to handle images, the input shape may look something like
    `Input((128,128,3))` for a 128x128 pixel colored image, in which each pixel holds
    three values corresponding to a color. The specifics of the shape of your image,
    like the difference between the shapes `(3,)` and `(3,1)`, depend on how you handled
    your data. You can always use `x_data[0].shape` to find the specific shape of
    your data. You’ll see more examples of this in later chapters that demonstrate
    image-based deep learning methods.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we’ve specified the shape of our input, we can begin adding layers
    to form the body of the neural network. This simple neural network will have only
    `Dense` layers, which are regular densely connected neural network layers (Listing
    [1-3](#PC3)). Generally, two parameters are provided when using `Dense` layers
    – the number of units (neurons, nodes) in the layer and the activation function.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: The `Dense` layer is limited in its range of activation functions. To use advanced
    activation functions, do not provide an activation function in the standard densely
    connected layer (it will not apply one by default) and follow it with an `Activation`
    class layer, like `model.add(keras.layers.LeakyReLU())`.
  prefs: []
  type: TYPE_NORMAL
- en: These two layers comprise the body of the neural network – they do the heavy
    lifting of learning relationships to understand the mapping between the input
    and the output. In this case, the data is relatively simple, so this small body
    will suffice, but more difficult problems will require larger and more complex
    bodies. We’ll become familiar with the design of more complex neural network architectures
    in the following chapters.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: It is possible to pass `input_shape=(...)` as a parameter in the first layer
    of a neural network to avoid the usage of the `Input` layer. While stylistic choices
    vary by person, it is generally better to use the `Input` layer rather than `input_shape=(...)`
    because it is clearer in terms of code organization. Moreover, the `Input` layer
    offers more options for handling data (see Keras documentation).
  prefs: []
  type: TYPE_NORMAL
- en: You may find these other layers generally helpful to add to neural network architectures,
    regardless of the specific application, to add more complexity or stability; the
    addition of these layers usually increases network performance (Table [1-2](#Tab2)).
  prefs: []
  type: TYPE_NORMAL
- en: Table 1-2
  prefs: []
  type: TYPE_NORMAL
- en: Table of useful regularization and normalization layers. Convolutional layers
    will be discussed later
  prefs: []
  type: TYPE_NORMAL
- en: '| Layer | Implementation | Description |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Dropout | `keras.layers.Dropout(rate=0.1)` | The dropout layer randomly drops
    some percent of the connections between the layer before dropout and the layer
    afterward. This percent can be specified via the `rate` parameter. Despite being
    simple, dropout is one of the most effective regularization methods to prevent
    large neural networks from overfitting. |'
  prefs: []
  type: TYPE_TB
- en: '| Batch normalization | `keras.layers.BatchNormalization()` | Batch normalization
    normalizes the outputs to the layer before it such that the mean is 0 and the
    standard deviation is 1\. It was initially conceived to address a phenomena termed
    Internal Covariate Shift, in which the distribution of inputs to hidden layers
    in a deep neural network changes erratically as the parameters of the model are
    updated. However, Internal Covariate Shift has been shown not to affect model
    performance much. Nevertheless, batch normalization significantly smooths the
    loss landscape (the terrain that the optimizer must navigate to minimize the loss),
    which seems to be the reason it aids model performance so much. Many modern neural
    networks employ batch normalization because of the large boost it gives to most
    models in most problems. |'
  prefs: []
  type: TYPE_TB
- en: '| Gaussian noise | `keras.layers.GaussianNoise(stddev=1)` | The Gaussian noise
    layer adds zero-centered Gaussian noise to the outputs of the layer before it.
    Like dropout, the Gaussian noise layer adds an element of noise to prevent the
    neural network from overfitting. The Gaussian noise layer provides a different
    form of noise, though. Generally, placing noise layers near the input allows the
    neural network to become more robust to noisy data. We’ll explore how this layer
    and layers like this can be used effectively in Chapter [2](516104_1_En_2_Chapter.xhtml)
    in the context of self-supervised learning. |'
  prefs: []
  type: TYPE_TB
- en: 'Now that the input and the body have been built, we can construct the output.
    The model should output two numbers corresponding to the targets in the dummy
    dataset, *Label 1* and *Label 2*. Moreover, these two numbers should be between
    0 and 1, which means that we should apply the sigmoid function to its output.
    The sigmoid function allows for the output to be bounded between 0 and 1, representing
    the probability the input has the label *1*. One final `Dense` layer allows us
    to define two outputs and a sigmoid activation function: model.add(Dense(2, activation=‘sigmoid’)).'
  prefs: []
  type: TYPE_NORMAL
- en: Thus, our complete small neural network is as follows (Listing [1-4](#PC4)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: It should be noted that there are many ways of importing that different people
    may find more or less effective given their coding style. For instance, in the
    preceding example, layers were imported as `from keras.layers import a, b, ...`.
    When constructing large neural networks that require many different layers, however,
    importing individual layers is not necessary. In this case, one can use `import
    keras.layers as L` and reference each layer as `L.layer_name`. Using this method,
    the neural network could be rewritten without needing to import each layer by
    name at the beginning as follows (Listing [1-5](#PC5)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Note that this book will use L.Layer format for most cases, except when it is
    necessary to present each layer individually to explain their purpose, in which
    the from keras.layers import a, b syntax is used (this occurring mostly in earlier
    chapters).
  prefs: []
  type: TYPE_NORMAL
- en: Now that we’ve defined the architecture of the model with the input-body-output
    framework, we need to provide information on other aspects of the model before
    it can be fitted on the data.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 2: Compile'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now that we’ve defined the architecture of the model with the input-body-output
    framework, we need to provide information on other aspects of the model.
  prefs: []
  type: TYPE_NORMAL
- en: 'The `.compile()` method of Keras models requires three key arguments:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Loss function* : The loss function is a mathematical function that takes in
    the true labels and the predicted labels and outputs the corresponding error.
    The loss function quantifies the “character” of the error – whether it punishes
    certain types of errors disproportionately, for example.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Optimizer*: The optimizer determines how the neural network changes its weights
    to minimize the loss function. Different optimizers are better suited toward different
    loss landscapes; some optimizers may be better, for instance, in loss landscapes
    that are smooth and flat. Others may succeed in more jagged ones.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Metric(s)*: This parameter does not affect how the neural network is trained,
    but it lets Keras now which metrics you want to use to monitor the neural network’s
    performance. By default, Keras will record and provide information about the loss
    (and validation loss if you provide a validation dataset). However, it can also
    provide other metrics of error to provide a more holistic understanding of the
    neural network’s performance.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'For instance, a simple model could use mean squared error as the loss function,
    the Adam optimizer (Adam is generally used as a default optimizer), and also provide
    information on the mean absolute error and the accuracy: model.compile(loss=‘binary_crossentropy’,
    optimizer=‘adam’, metrics=[‘mae‘,’accuracy’]).'
  prefs: []
  type: TYPE_NORMAL
- en: A good way to understand the compiling step is to understand each of these three
    parameters in relation to the loss landscape. The loss landscape is the relationship
    between each of the parameters of the model and the corresponding loss a model
    with those parameters will obtain.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, consider the following loss landscape. The goal of the neural
    network is to find the location in the loss landscape with the smallest loss value.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_1_Chapter/516104_1_En_1_Fig3_HTML.jpg](../images/516104_1_En_1_Chapter/516104_1_En_1_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-3
  prefs: []
  type: TYPE_NORMAL
- en: Example loss landscape with the global minimum marked
  prefs: []
  type: TYPE_NORMAL
- en: 'There are a few attributes that are common in most loss landscapes to note:'
  prefs: []
  type: TYPE_NORMAL
- en: There is a large range of feasible parameters. Parameters outside this range
    have a huge loss, which can be demonstrated by large sloping sides in which the
    loss increases dramatically. The feasible range, in this case, is approximately
    between –4.0 and 11.0\. This means that a parameter value between this range results
    in a model that produces reasonable behavior with respect to the dataset.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There is a global optimum/minimum marked with a cross. This is the parameter
    that minimizes the loss function and optimizes performance. In this example loss
    function, the parameter that optimizes the hypothetical model performance is about
    7.5.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There is a local minimum/plateau around the parameter range from –2.5 to 0.0\.
    This is an area in which moving in either direction either increases error or
    leads to no increase in error. It can be difficult for a neural network to navigate
    these regions because the slope of the curve at that point does not give an indication
    of where the global minimum resides.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These features are common in loss landscapes, although in modern neural networks
    with millions or billions of parameters these landscapes are much more high-dimensional
    and difficult to interpret/visualize than in this example.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s get a better understanding of each of these elements of compiling a Keras
    model in relation to the concept of the loss landscape.
  prefs: []
  type: TYPE_NORMAL
- en: Loss Functions
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The loss function is crucial to determining how the neural network arrives at
    its optimal solution. It defines the shape of the loss landscape by taking in
    the model predictions and the true labels and then returning a number to quantify
    the “goodness” of the model predictions.
  prefs: []
  type: TYPE_NORMAL
- en: The goal of designing a loss function is to best represent computationally or
    mathematically the features of a “best,” “better,” and “worse” model. A good loss
    function should be lowest where the model is the best. The loss should be lower
    if a set of model parameters is better and higher if a model is worse. Moreover,
    decreases and increases in the loss should be proportional to the “better-ness”
    or “worse-ness” of a model. If, for instance, we deem some behavior to be disproportionately
    more damaging to model performance than other behavior, our loss function should
    penalize that behavior disproportionately more to reflect our sense of what is
    better and worse.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, the logic behind the mean squared error (MSE) loss, which calculates
    the average squared difference between the predicted label and the true label,
    is that large errors are disproportionately more damaging than small errors. The
    squaring mechanism forces any large errors to become especially prominent, and
    a model must address these large errors for the most significant reduction in
    loss before it focuses on smaller ones.
  prefs: []
  type: TYPE_NORMAL
- en: In many cases, optimizing the model on a different loss function results in
    a different solution (i.e., the set of parameters the final neural network has
    after training). There are several general loss functions that generally suffice
    for most problems and can be used to begin with. These are organized in Table
    [1-3](#Tab3).
  prefs: []
  type: TYPE_NORMAL
- en: It should be noted that some default loss functions can be mentioned explicitly
    by name by passing a string as an argument to the `.compile()` method , like `.compile(loss='mse')`
    or `.compile(loss='mae')`. However, if you want to use a more complex loss with
    specific parameters, pass a `keras.losses` object into the `loss` parameter rather
    than a string. For instance, if one wanted to use label smoothing (a method to
    prevent overconfidence) with binary cross-entropy loss, the model would be compiled
    as follows (Listing [1-6](#PC6)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Even TensorFlow/Keras’ default losses, however, are limited. TensorFlow Addons
    is a collection of community-contributed code that works with TensorFlow/Keras
    and builds upon its capabilities. TensorFlow Addons supports many more complex
    losses that are commonly used for certain types of problems. TensorFlow Addons
    can be installed via `pip install tensorflow-addons` and imported as `import tensorflow_addons
    as tfa`.
  prefs: []
  type: TYPE_NORMAL
- en: The `Implementation Name` column in Table [1-3](#Tab3) explicating helpful loss
    functions and use cases contains either a string (`'loss_name'`), a `keras.losses`
    object (`keras.losses.loss_name()`), or a `tfa.losses` object (`tfa.losses.loss_name()`).
    These can be passed into the `loss` parameter of the `.compile` command. Only
    a string is provided when there is no need for a `keras.losses` object because
    there are no parameters the user can provide.
  prefs: []
  type: TYPE_NORMAL
- en: Table 1-3
  prefs: []
  type: TYPE_NORMAL
- en: A list of common loss functions for regression and classification problems
  prefs: []
  type: TYPE_NORMAL
- en: '| Loss Function | Problem Type | Implementation Name | Description |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Mean squared error | Regression | `''mse''` | The mean squared error is the
    averaged squared difference between the predicted label and the true label. MSE
    has the advantage of punishing larger errors disproportionately. For instance,
    if a model predicts an output of 1 and the true label was 3, the MSE would be
    4\. If the model increased its prediction by one unit to 2 instead of 1, the MSE
    would be 1\. Increasing the model’s prediction by one unit led to a fourfold decrease
    in error. As the model’s prediction becomes closer to the true prediction, the
    MSE will decrease by less. |'
  prefs: []
  type: TYPE_TB
- en: '| Mean absolute error | Regression | `''mae''` | The mean absolute error is
    perhaps the simplest loss function – it is simply the average distance the predicted
    value is from the actual value. It’s almost never used in deep learning because
    of this simplicity, although it may suffice for certain simpler tasks and architectures.
    |'
  prefs: []
  type: TYPE_TB
- en: '| Huber loss | Regression | `''huber''` (default delta value is 1.0)`keras.losses.huber(y_true,
    y_pred, delta=1.0)` | Huber loss is designed to be a combination of MSE and MAE,
    with the usage of a delta parameter. When the delta parameter equals 0, the Huber
    loss is equal to MAE; when it equals infinity, the Huber loss is equal to MSE.
    When the data is highly varied and has many outliers, use a low delta value; when
    the data is less varied, use a higher delta value. |'
  prefs: []
  type: TYPE_TB
- en: '| Mean squared logarithmic error | Regression | `''msle''` | Mean squared logarithmic
    error is the mean squared difference between the logarithm of the true values
    and the logarithm of the predicted values. It is concerned with the ratio between
    the true and predicted values; it measures the percent-wise difference between
    target and prediction. MSLE especially penalizes underestimates more than overestimates.
    |'
  prefs: []
  type: TYPE_TB
- en: '| Cosine similarity | Regression | `''cosine_similarity''` | Cosine similarity
    computes the cosine of the angle between two vectors, being the true *y* values
    and the predicted *y* values. Cosine similarity loss in Keras is implemented such
    that a cosine similarity loss of 1 means two vectors are directly opposite each
    other (least similar), a loss of –1 indicates the two vectors point in the exact
    same direction (most similar), and a loss of 0 indicates the two vectors are orthogonal,
    or perpendicular, to one another. Cosine similarity loss is used when the direction
    of vector representations of the prediction matters more than its magnitude. |'
  prefs: []
  type: TYPE_TB
- en: '| Cross-entropy loss/negative log likelihood | Classification | `keras.losses.BinaryCrossentropy(y_true,
    y_pred)` for binary classification`keras.losses.CategoricalCrossentropy(y_true,
    y_pred)` for classification with more than two labels. Labels are one-hot encoded.`keras.losses.SparseCategoricalCrossentropy(y_true,
    y_pred)` for classification with more than two labels. Labels are integers. |
    Cross-entropy loss is one of the most popular and default losses for classification.
    It is the negative average of the logarithm of corrected probabilities. That is,
    one first finds the corrected probabilities, meaning simply *p* if the prediction
    is correct and 1 – *p* if the prediction is incorrect. The higher the corrected
    probabilities, the better the performance. Taking the negative logarithm of these
    probabilities allows for low corrected probabilities to have a disproportionately
    higher error than high corrected probabilities. The mean of these logarithms is
    the result of cross-entropy. Utilizing probabilities and logarithms is also related
    to information theory and entropy as a measure of a distribution’s uncertainty.
    |'
  prefs: []
  type: TYPE_TB
- en: '| Focal loss | Classification | `tfa.losses.SigmoidFocalCrossEntropy()` | Focal
    loss is most often used in classification with a highly imbalanced dataset. It
    is an altered form of cross-entropy that places a higher weight on less common
    examples and a lesser weight on more common ones. Focal loss was designed for
    the task of dense object detection, in which there is a very large imbalance between
    a specific class and other classes, but it has many other use cases. |'
  prefs: []
  type: TYPE_TB
- en: There are many other losses not covered in this table that can be useful for
    certain subsets of problems. They can be found in Keras/TensorFlow/Tensorflow-Addons
    documentation.
  prefs: []
  type: TYPE_NORMAL
- en: However, even Keras and TensorFlow/Tensorflow Addons are limited with their
    selection of loss functions. You can create *custom loss functions* to use functions
    that have not been implemented or to change existing loss functions for your own
    purposes in ways that cannot be done through existing methods.
  prefs: []
  type: TYPE_NORMAL
- en: Creating a custom loss function takes the general following form (Listing [1-7](#PC7)).
    We’ll use custom loss functions in later chapters to solve problems that require
    specialized loss functions beyond the currently existing ones.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Note that because the loss function is dealing with Keras tensors, it’s easiest
    to use Keras backend or `tf.math` functions to perform mathematical operations,
    like `K.sum()` or `K.square()`. For instance, consider the following custom implementation
    of the mean squared error (Listing [1-8](#PC8)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: If the loss function is more complex, though, it can be difficult to write loss
    functions with only backend functions. In this case, TensorFlow’s `.py_function()`
    allows for Python functions to be written as TensorFlow graphs that can be utilized
    as loss functions in neural networks. For instance, we can write `if/else` relationships
    in our loss function that otherwise would need to be written with TensorFlow functions
    like `tf.cond()`, which allows for condition statements but is difficult to work
    with and unintuitive (Listing [1-9](#PC9)).
  prefs: []
  type: TYPE_NORMAL
- en: 'Using TensorFlow’s `.py_function()` to write Python operations into loss functions
    involves at least two functions:'
  prefs: []
  type: TYPE_NORMAL
- en: A Python function that handles the Python operations, like if/else/elif, for
    loops, etc. It must accept a list of `tf.Tensor` inputs and output a list of tensors.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A function that formally functions as the “real” loss function that is passed
    into the `loss` parameter of compiling. This function operates completely using
    TensorFlow/Keras objects and operations.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: The Tout parameter in py_function helps to specify the type of the output of
    the Python function. In general, defining custom losses is associated with type
    errors; these can generally be addressed by putting var = tf.cast(var, tf.float32)
    (or some other data type, like tf.float64) at the beginning of functions such
    that all input parameters to that function conform to a certain data type.
  prefs: []
  type: TYPE_NORMAL
- en: 'Additionally, your custom loss function needs to be able to handle batched
    data. One way of accommodating batches is to use the following structure: `[func(batch)
    for batch in y_true]`. This applies an operation to each batch.'
  prefs: []
  type: TYPE_NORMAL
- en: It’s also worth noting that loss functions cannot involve functions from external
    libraries unless they are converted into Keras/TensorFlow-adaptable functions,
    because loss functions need to be differentiable and non-Keras/TensorFlow functions
    are nondifferentiable. Your code might still run, but the model will not be able
    to access meaningful gradients and perform poorly.
  prefs: []
  type: TYPE_NORMAL
- en: In general, most custom loss function designs are simple enough to create that
    it’s worth it to write up a custom loss function and reap the benefits of better
    performance. The loss function most directly determines the shape of your loss
    landscape, which controls which solution the neural network converges to. Choosing
    and/or adjusting the loss function to your particular problem is especially important
    for high performance.
  prefs: []
  type: TYPE_NORMAL
- en: Optimizers
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: While the loss function determines the shape of the loss landscape, the choice
    of optimizer determines how the neural network updates its weights to traverse
    the loss landscape to find its minimum. Which optimizer works best depends on
    the shape of the loss landscape, which is determined most directly by the loss
    function, as mentioned prior, but also by a variety of other factors, including
    the network architecture.
  prefs: []
  type: TYPE_NORMAL
- en: Like loss functions, when compiling, optimizers can be passed as string names,
    like `'adam'`, which initializes the default optimizer object or a TensorFlow/Keras
    optimizer object, like `keras.optimizers.Adam()`. TensorFlow Addons also has many
    optimizers not implemented in the core TensorFlow/Keras library that may be better
    suited for particular problems than the default available optimizers.
  prefs: []
  type: TYPE_NORMAL
- en: Almost all modern neural network optimizers are gradient-based, meaning that
    they rely upon the derivative, or slope, of the loss function at some point to
    judge which direction it should move in. This way, the optimizer can move in a
    “downward” direction, hopefully reaching the global minimum.
  prefs: []
  type: TYPE_NORMAL
- en: The primary problem with gradient-based methods is that loss landscapes of complex
    datasets and models have many local minima that the optimizer can get “stuck”
    in. Generally, optimizers are distinguished by how they handle local minima and
    plateaus. Some methods of dealing with these problems include
  prefs: []
  type: TYPE_NORMAL
- en: '*Momentum* : Imagine the optimizer as a ball rolling down a hilly landscape,
    trying to find the region of lowest elevation. Minima reside in the space between
    two hills. Once the ball reached a minimum, it would not immediately stop, because
    it has momentum from rolling down the hill – this momentum would allow it to continue
    rolling up the next hill for a little bit. If the next hill is too high, the ball
    will roll back down and oscillate until it reaches the minimum. If the next hill
    is not too high, the ball’s momentum may allow it to roll over the next hill into
    potentially lower minima. Nesterov accelerated gradient (NAG) and other momentum-based
    optimization strategies use this logic to “jump out” of local minima.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Volatility of update*: Every step of fitting, the model evaluates the loss
    function and determines which direction to step in. If each update is highly volatile
    – it varies erratically and significantly – the optimizer can “jump” out of local
    minima simply because of this highly active behavior. However, this also means
    it risks jumping out of good local minima into worse solutions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Adjusting learning rate* : While the derivative tells the optimizer which
    direction to step in, the learning rate decides how far the step should be. A
    high learning rate results in large step sizes, which can step over local minima
    that a low learning rate would have struggled to get out of. It should be noted,
    however, that if the model has found the true global minimum, setting a high learning
    rate runs the risk of jumping out of that global minimum.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: See the following common optimizers and their implementation in a Keras model
    (Table [1-4](#Tab4)).
  prefs: []
  type: TYPE_NORMAL
- en: Table 1-4
  prefs: []
  type: TYPE_NORMAL
- en: A list of common less optimizers
  prefs: []
  type: TYPE_NORMAL
- en: '| Optimizer | Keras Implementation | **Description** |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Stochastic gradient descent (SGD) | `''sgd''``keras.optimizers.SGD()` | Stochastic
    gradient descent performs an update to the weights for each training example,
    so it’s faster than “vanilla” (standard) gradient descent. Because SGD updates
    weights frequently, training can be volatile. This means that SGD can jump and
    discover new local minima but also that it has difficult converging to a solution.
    SGD with Nesterov accelerated gradient performs well with shallow networks. |'
  prefs: []
  type: TYPE_TB
- en: '| Adagrad | `''adagrad''``keras.optimizers.Adagrad()` | Adagrad automates the
    adjustment of learning rates such that frequently occurring features are updated
    with a smaller learning rate (more caution) and less frequently occurring features
    are updated with a larger learning rate. Because of this automated learning rate
    adjustment, Adagrad is well suited toward sparse data. However, with time, the
    learning rate decreases steadily until it becomes functionally equal to 0, at
    which nothing new can be learned. |'
  prefs: []
  type: TYPE_TB
- en: '| Root Mean Square Propagation (RMSProp) | `''rmsprop''``keras.optimizers.RMSProp()`
    | RMSProp dampens Adagrad’s problem of a continually decaying learning rate by
    decreasing the rate at which it decays. RMSProp is a common choice for deep neural
    networks because its method of decaying learning rate is effective in most loss
    landscapes. |'
  prefs: []
  type: TYPE_TB
- en: '| Adaptive Moment Estimation (Adam) | `''adam''``keras.optimizers.Adam()`See
    `tfa.optimizers.LazyAdam()` for sparse data.See `tfa.optimizers.RectifiedAdam()
    ()` to address (rectify) the high variance of adaptive learning rates. | Adam
    addresses Adagrad’s aggressive learning rate problem in a similar way to RMSProp.
    However, Adam considers the gradient-update history, meaning that the update is
    not only based on the current gradient but also on the previous updates. We don’t
    need to rely on the current gradient but can inform the update behavior based
    on several steps. Adam is commonly used in deep networks. |'
  prefs: []
  type: TYPE_TB
- en: Choosing an appropriate loss function to optimize upon is essential toward good
    model performance .
  prefs: []
  type: TYPE_NORMAL
- en: Metrics
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Metrics are not involved with changing or navigating the loss landscape. Rather,
    they help to understand the goodness of the model more holistically. Although
    the metric and the loss are structurally similar in that they take in the predicted
    label and the true label and output a number to quantify the error, they should
    be designed differently. The purpose of a loss is to guide the optimizer to the
    best solution, whereas the purpose of a metric is to understand as a human if
    a model is good.
  prefs: []
  type: TYPE_NORMAL
- en: Thus, in designing a loss function, there is an emphasis on movement (i.e.,
    guiding the optimizer to move toward an ideal solution), which can come at the
    cost of interpretability. That is, we care more about guiding the network than
    actually interpreting its performance during training. On the other hand, a good
    *metric* in the context of deep learning is one that, beyond the prerequisite
    of being suitable to your problem (problem and dataset type – classification/regression,
    balanced/imbalanced, etc.), must be easily interpretable. Ideally, metrics can
    provide a richer set of data either to support human decisions about what you
    should do with the model. For instance, if the model reaches a very low loss value
    *and* several other meaningfully different metrics confirm the model’s high performance,
    you can trust that the model is not simply good in terms of the *loss function*,
    but generally across several metrics. A model that performs well both in their
    loss and in their metrics will likely succeed at modeling the *phenomena the dataset
    represents*, not only the dataset itself (i.e., overfitting).
  prefs: []
  type: TYPE_NORMAL
- en: 'If a model performs well in their loss but performs poorly with other metrics,
    there are two possibilities to consider:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Is the loss function representative of a “good solution”?* If the loss function
    is not well constructed, it may guide the neural network to a solution that minimizes
    the loss but does not perform well for other metrics.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Are the metrics relevant to the problem?* It may be that certain metrics are
    not relevant to the phenomenon the neural network is attempting to model. If you
    deem that this is the case, you can choose other metrics that are more relevant
    to the problem.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Comparing metric indicators to model performance can yield important insights
    into how the model is performing. Remember that deep learning and machine learning
    generally are concerned with modeling *phenomena*, or the source of data, not
    the actual dataset itself (although we must model the dataset to model the phenomena).
    That is, we want a model to separate images of cats and dogs, not to – as its
    end goal purpose – memorize an image dataset, even though in order to do so the
    model needs to learn representations in the image dataset. Metrics allow us to
    consider the model’s performance and behavior more broadly and richly than only
    with the loss.
  prefs: []
  type: TYPE_NORMAL
- en: You can pass in many of the losses discussed prior as metrics, like mean squared
    error or cross-entropy. However, there are some additional metrics that cannot,
    should not, or are very difficult to be used as loss functions that are nevertheless
    valuable as metrics for monitoring network performance (displayed in Table [1-5](#Tab5)).
  prefs: []
  type: TYPE_NORMAL
- en: Like loss functions and optimizers, in Keras metrics can be passed into the
    `metrics` parameter of compiling as a string, a `keras.metrics` object, or a `tfa.metrics`
    object.
  prefs: []
  type: TYPE_NORMAL
- en: Table 1-5
  prefs: []
  type: TYPE_NORMAL
- en: A sample list of common metrics used in classification. More or less all loss
    functions for regression can be used as metrics
  prefs: []
  type: TYPE_NORMAL
- en: '| Metric | Keras Name | Description |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Accuracy | `keras.metrics.BinaryAccuracy()` for binary labels`keras.metrics.CategoricalAccuracy()`
    for categorical one-hot labels | Accuracy is one of the most basic metrics, calculated
    as the number of labels predicted correctly divided by the total number of labels.
    |'
  prefs: []
  type: TYPE_TB
- en: '| Area Under the Curve (AUC) | `keras.metrics.AUC()` | The AUC (or AUROC, or
    Area Under Receiver Operating Curve) is a metric used for binary classification
    that ranges from 0 to 1\. The AUC indicates the probability that a positive drawn
    uniform randomly has a model output higher than a negative drawn uniform randomly.
    |'
  prefs: []
  type: TYPE_TB
- en: '| F1 score | `tfa.metrics.F1Score` | The F1 score is the harmonic mean of the
    precision and the recall, ranging from 0 to 1\. Functionally, it is similar to
    accuracy in balancing consideration of the correctness and incorrectness of the
    model but works better with imbalanced datasets. |'
  prefs: []
  type: TYPE_TB
- en: One can also create a custom metric using the same methods as creating a custom
    loss function. It’s good to build custom metrics to suit your particular problem,
    since general metrics often have weaknesses that may be misleading on datasets
    with certain attributes, like being imbalanced or having many outliers. However,
    make sure that custom metrics are interpretable.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 3: Fit and Evaluate'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Now that the model architecture has been defined and the model has been compiled,
    the model can be fitted to the data. Fitting generally takes the following form:
    model.fit(x=x_data, y=y_data, epochs=30, callbacks=[callback1, callback2]).'
  prefs: []
  type: TYPE_NORMAL
- en: In this case, `x_data` and `y_data` are provided to fit the model. These can
    take the form of `numpy` arrays or `pandas` DataFrames. However, for many large
    datasets, for instance, of images, using these explicit methods often causes memory
    problems. Other more efficient data flow methods will be discussed later.
  prefs: []
  type: TYPE_NORMAL
- en: The `epochs` parameter refers to the number of times the model will loop over
    the entire provided dataset. If epochs=5, for instance, the model will run over
    the entire dataset five times.
  prefs: []
  type: TYPE_NORMAL
- en: Although callbacks are not required for fitting a model, it is good practice
    to use them. Callbacks are operations performed after each epoch and therefore
    allow for recording or changing of the model during its training. Three callbacks
    are commonly used – save model weights, early stopping, and slowing learning rate
    on plateau.
  prefs: []
  type: TYPE_NORMAL
- en: The `ModelCheckpoint` callback (Listing [1-10](#PC10)) saves model weights after
    each epoch to a specified `filepath`; if `save_best_only` is set to `True`, only
    the best set of model weights is stored to the location. Which weights are best
    can be specified by the argument for the `monitor`, which specifies the metric
    or loss to monitor, and `mode`, which specifies whether the best model is the
    one that minimizes or maximizes the metric or loss. For instance, if `monitor`
    is set to `'accuracy'` (and accuracy is a metric provided during compiling), `mode`
    should be `'max'`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: 'The `ModelCheckpoint` callback allows for the model to stop training once it
    stops improving. This can help conserve computing resources. The `monitor` parameter
    specifies the metric or loss that will be monitored for improvement. A change
    in the monitored metric or loss less than `min_delta` will be counted as no improvement.
    By default, `min_delta` will be counted as `0`. Lastly, `patience` determines
    how many epochs of no improvement are needed for the model to stop training. It
    can be used in Keras as such: es = C.EarlyStopping( monitor=“val_loss”, min_delta=0,
    patience=3).'
  prefs: []
  type: TYPE_NORMAL
- en: 'The `ReduceLROnPlateau` callback also checks if the model stops improving (it
    hits a “plateau”) but lowers the learning rate instead of stopping training, as
    `EarlyStopping` does. The `monitor` and `patience` parameters play the same role
    as `EarlyStopping` does; the `ReduceLROnPlateau` callback has another parameter,
    `factor`, which determines the factor by which the learning rate is multiplied
    by every time when the model is determined to have stopped improving. It can be
    used in Keras as such: rp = C.ReduceLROnPlateau( monitor=“val_loss”, patience=3,
    factor=0.1).'
  prefs: []
  type: TYPE_NORMAL
- en: Running the `.fit()` method for this neural network on the dummy dataset for
    1000 epochs yields a progress output as displayed. The value of the loss function
    and metrics are displayed in the progress output (Listing [1-11](#PC11)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: 'While these are good indicators of the model’s performance, the progress can
    be stored for analysis and visualization by assigning the output of model.fit()
    to a variable, like such: history = model.fit(...).'
  prefs: []
  type: TYPE_NORMAL
- en: '`history.history` is a dictionary in which each key is the name of a loss or
    metric, like `''loss''`, `''mae''`, and `''accuracy''`, and the corresponding
    value is an array of those values for each epoch. The loss can be visualized,
    for instance, as follows (Listing [1-12](#PC12), Figure [1-4](#Fig4)).'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_1_Chapter/516104_1_En_1_Fig4_HTML.jpg](../images/516104_1_En_1_Chapter/516104_1_En_1_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-4
  prefs: []
  type: TYPE_NORMAL
- en: Training performance of example model over epochs
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: Visualizations can yield insights into training behavior, as well as future
    training decisions. The model seems to decline in loss rather steadily and consistently,
    although it is decreasing in speed. It is thus likely that a few more epochs of
    training can lead to a marginal decrease in loss. You can call `model.fit(...)`
    again and the model will continue fitting from where fitting terminated prior.
  prefs: []
  type: TYPE_NORMAL
- en: Model predictions can be computed with `model.predict(X_sample)`, and the model’s
    performance on validation data can be computed with `model.evaluate(X_test, y_
    test)`. Evaluations compute the loss and metrics passed in the compiling step
    for the provided dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Based on the results of training, the model architecture and the parameters
    of training specified in the compiling step can be adjusted to optimize performance.
    Chapter [5](516104_1_En_5_Chapter.xhtml) will discuss methods to automate this
    optimization.
  prefs: []
  type: TYPE_NORMAL
- en: Visualizing Model Architectures
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Large and complex neural network architectures can be difficult to conceptualize
    when building. Keras provides a helpful utility to visualize the architecture
    of models that is invaluable when constructing neural networks. We can begin by
    plotting the architecture of the model we just built (Listing [1-13](#PC13), Figure
    [1-5](#Fig5)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_1_Chapter/516104_1_En_1_Fig5_HTML.jpg](../images/516104_1_En_1_Chapter/516104_1_En_1_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-5
  prefs: []
  type: TYPE_NORMAL
- en: Output of default `plot_model` command
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: 'Keras visualizes each layer as a rectangle; each layer is annotated in the
    form “name: layer type.” Keras automatically associates each layer with a name
    if the user needs to reference a specific layer. We can get more information about
    the model, however, by enabling Keras to show each layer’s shape transformation
    and data type: plot_model(model, show_shapes=True, show_dtype=True). The output
    is visualized in Figure [1-6](#Fig6).'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_1_Chapter/516104_1_En_1_Fig6_HTML.jpg](../images/516104_1_En_1_Chapter/516104_1_En_1_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-6
  prefs: []
  type: TYPE_NORMAL
- en: Output of `plot_model` command with data type and shapes displayed
  prefs: []
  type: TYPE_NORMAL
- en: The data type for all four layers in this example is `float32`. Knowing the
    data type allows you to debug any data type problems you may encounter with more
    complex data types and flows.
  prefs: []
  type: TYPE_NORMAL
- en: Knowing how each layer transforms the shape of the data is especially valuable,
    especially when working with high-dimensional data like images or text that require
    complex transformations. By looking at the diagram, for instance, we can see that
    the “`dense_1`” layer takes in data with a shape of `(None, 10)` and outputs data
    with a shape of `(None, 5)`. Thus, this layer projects ten-dimensional data into
    a five-dimensional space.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: The word “dimension” means many things in deep learning. In the traditional
    sense, a dataset with five features would be considered to be “five-dimensional.”
    However, in image data, for instance, there are often three *spatial* dimensions,
    in that each image has a shape like `(a, b, 3)`. Even though the data has three
    spatial dimensions, the neural network is technically operating in `a*b*3`-dimensional
    space. The term “dimensions” alone will refer to the number of elements in each
    data instance without regard for how they are organized, whereas the term “spatial
    dimensions” refers to the number of axes along which elements of each data instance
    are organized.
  prefs: []
  type: TYPE_NORMAL
- en: We will see examples in which visualizing models is helpful both immediately
    with nonlinear topologies and in Chapter [3](516104_1_En_3_Chapter.xhtml) with
    autoencoder design.
  prefs: []
  type: TYPE_NORMAL
- en: Lastly, if you need high-resolution architecture diagrams, for example, in case
    of very large architectures that make viewing specific components more difficult,
    use the to_file=’path/image.png’ and dpi parameters. The latter controls the dots
    per inch; 200 to 400 is usually good for a clear and crisp image.
  prefs: []
  type: TYPE_NORMAL
- en: Functional API
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The `Sequential` model adds layers sequentially via the `.add()` method . However,
    this type of model is limited in many respects, and more complex neural network
    structures use the Functional API.
  prefs: []
  type: TYPE_NORMAL
- en: In the Functional API, individual layers are defined as functions of the previous
    one (Listing [1-14](#PC14)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: Each layer begins as its own variable, and each layer is initialized in relation
    to another layer (except for the first input layer), unlike the `Sequential` model,
    in which layers are defined in code in direct relationship to a `keras.models`
    object. It’s important to note breakdown that this “double parentheses notation,”
    as it is sometimes known to beginners, is two parts – the first set of parentheses
    is part of Python notation for initializing the layer object, and the second set
    is used to pass the previous layer into this initialized layer object. You don’t
    have to perform both of these operations together (sometimes you cannot because
    the implementation requires separation, but generally it’s easier to chain them
    together); for instance, you could write curr_layer = L.Layer_Name(params) to
    initialize some current layer on one line and write curr_layer = curr_layer(prev_layer)
    to connect it with the previous layer.
  prefs: []
  type: TYPE_NORMAL
- en: 'Once each of the layers are defined functionally, they need to be aggregated
    into a model object: model = keras.Model(inputs=input_layer, outputs=output_layer).'
  prefs: []
  type: TYPE_NORMAL
- en: The benefit of assigning each layer to a unique and appropriately named variable
    is that they can then be referenced individually later. However, if this is not
    needed, it is common to redefine the layer each time with a variable like `x`.
    This builds the neural network functionally just as the prior method, but without
    the ability to reference individual layers (Listing [1-15](#PC15)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: 'This variable redefinition notation can be confusing. Let’s break it down:
    in line 3 of Listing [1-15](#PC15), x is defined as a layer connected to the input
    layer. In line 4, x is defined as a layer connected to x; however, the object
    L.Layer_Name(params)(x) is initialized and connected before the variable x in
    line 4 is actually assigned. Thus, when the object is being initialized, x holds
    the previous layer defined in line 3\. After the object is initialized and connected
    to the previously defined layer, the object itself is defined as x. In line 5,
    a new layer connected to this layer defined in line 4 is redefined as x, and so
    on. In line 6, x holds the last layer of the architecture and thus holds the output;
    all other intermediate layers besides the input layer have been lost in terms
    of being assigned to a variable (we can retrieve them by name; layer naming is
    discussed soon in this chapter, and non-variable layer retrieval methods are discussed
    in Chapter [2](516104_1_En_2_Chapter.xhtml), where it is more relevant).'
  prefs: []
  type: TYPE_NORMAL
- en: The process of training, predicting, and evaluating is the same for models based
    on the Functional API as the `Sequential` model once the model object is created.
    You can visualize this functionally defined model and compare it with the architecture
    of the sequentially defined model to verify their equivalence.
  prefs: []
  type: TYPE_NORMAL
- en: We will see more examples where the Functional API becomes extremely useful
    soon in the following chapters.
  prefs: []
  type: TYPE_NORMAL
- en: Translating a Sequential to a Functional Model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Earlier, we built the following model sequentially (Listing [1-16](#PC16)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: Now, we can build the model functionally without using the `.add()` method that
    `Sequential` models use (Listing [1-17](#PC17)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: We could also write the architecture of the sequentially defined model by using
    the variable redefinition method (Listing [1-18](#PC18)). Note that because the
    second step of aggregating the layers into the model requires an input and output
    layer, we cannot define the input layer as x.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: Building Nonlinear Topologies
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In the prior section, we translated/rewrote a sequentially defined model into
    a functionally defined model. The Functional API is especially valuable, though,
    with nonlinear topologies, which are neural network architectures that are not
    and cannot be sequentially defined. Nonlinear topologies use *copying*, in which
    the output of one layer is copied and sent to two or more separate layers, and
    *concatenating* or other forms of merging, in which one layer’s input is an aggregation
    of multiple layers before it. Contrast this with linear, sequentially defined
    topologies, in which each layer’s input is only one layer’s output and one layer’s
    output is passed to only one layer’s input.
  prefs: []
  type: TYPE_NORMAL
- en: Nonlinear topologies are valuable because they allow for more complex and differentiated
    representations of data. For instance, let’s say that we want to train a neural
    network to classify if an image is of a cat or a dog. If we had trained a sequentially
    built convolutional neural network, the image would be passed through a set filter,
    and the extracted features from that one form of filter would be passed to the
    next layer. That is, each layer is limited by the one set of parameters determining
    how the prior character extracted information. You can find a more detailed and
    technical discussion of architectural nonlinearity in Chapter [6](516104_1_En_6_Chapter.xhtml).
  prefs: []
  type: TYPE_NORMAL
- en: 'With a nonlinear topology in this example, we could pass the input through
    three separate filters to extract three different meaningful representations and
    extractions of the image:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Small size filter*: This layer captures smaller details, like the shape of
    the nose.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Medium size filter*: This layer captures larger details, like the textures
    of the fur or facial structure.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Large size filter*: This layer captures macro-scale patterns, like the shape
    of the animal body.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Although sequentially built models are said to go through these same steps (i.e.,
    can develop their own “large,” “medium,” and “small” filter internal representations),
    they are more limited and constrained by their topology. Almost all modern deep
    neural network designs use nonlinear topologies of some sort.
  prefs: []
  type: TYPE_NORMAL
- en: Building nonlinear topologies with the Functional API is very intuitive. Let’s
    work backward, beginning from a visualization of a topology (Figure [1-7](#Fig7))
    and writing code using the Functional API to create the model.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_1_Chapter/516104_1_En_1_Fig7_HTML.jpg](../images/516104_1_En_1_Chapter/516104_1_En_1_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-7
  prefs: []
  type: TYPE_NORMAL
- en: Sample diagram of nonlinear topology to be reconstructed
  prefs: []
  type: TYPE_NORMAL
- en: 'It should be noted that the diagram follows a naming procedure:'
  prefs: []
  type: TYPE_NORMAL
- en: '`b` (branch): This is the series of layers after it is copied and before it
    is merged. Thus, “`b1`” indicates “`branch1`.”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`l` (layer): Thus, “`l1`” indicates “`layer1`.”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`m` (merging): This is the series of layers during and after the merging of
    branches.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This naming procedure, of course, is arbitrary and cannot handle more complex
    architectures, like if there are multiple merging sites. It’s best to establish
    a naming procedure when working with nonlinear topologies for organization.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s begin by defining the input layer (Listing [1-19](#PC19)). Although Keras
    automatically names layers for you, it is good practice in complex topologies
    to implement your own naming procedure, which can be done by passing `name='name'`
    into each layer. You can also change the name after the layer is initialized by
    calling `layer._name = 'name'`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: The first branch can be constructed as such (Listing [1-20](#PC20)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: The second branch can similarly be constructed (Listing [1-21](#PC21)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: Now that the two branches have been created, we need to implement a merging.
    Merging layers take the form `merging_layer()([l1,l2,...])`, where `l1`, `l2`,
    and so on are prior layers whose outputs are being merged.
  prefs: []
  type: TYPE_NORMAL
- en: 'Keras offers many methods of merging:'
  prefs: []
  type: TYPE_NORMAL
- en: '`Concatenate()`: The outputs of the previous layers are concatenated next to
    each other. For instance, if one layer outputs `[0,1]` and the other outputs `[2,3,4]`,
    concatenating would yield `[0,1,2,3,4]`.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`Average()`: The outputs of the previous layers are averaged. For instance,
    if one layer outputs `[0,1]` and the other outputs `[2,3]`, averaging would yield
    `[1,2]`. Unlike concatenating, in averaging all outputs must be of the same length.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`Maximum()`: Returns the maximum for each corresponding element of the outputs
    of previous layers. For instance, if one layer outputs `[0,5]` and the other outputs
    `[4,2]`, taking the maximum would yield `[4,5]`. Like averaging, in taking the
    maximum all outputs must be of the same length.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Keras also has similar `Minimum()`, `Add()`, `Subtract()`, `Multiply()`, and
    `Dot()` layers. Generally, the `Concatenate()` layer is used because it can handle
    previous layers of different lengths and because it preserves all their elements.
    The network can be trained to automatically perform its own aggregations after
    concatenation. However, in cases where you have a strong idea of what role you
    want certain branches or merging sites to perform, using other merging methods
    may be more successful than trusting the model to discover such relationships
    on its own with concatenation.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: If working with image data, make sure that all the feature maps being merged
    are the same dimension (e.g., you can’t merge a convolutional layer with output
    shape (100, 100) and another with output shape (105, 105)). For concatenation-style
    merging of image data, Keras performs a depth-wise concatenation by default, in
    which the feature maps are stacked along the depth/filters/channels axis. If feature
    maps with shape (100, 100, 32) are concatenated with default parameters to feature
    maps with shape (100, 100, 64), the concatenated output has shape (100, 100, 96).
  prefs: []
  type: TYPE_NORMAL
- en: The diagram demonstrates that the method of merging for this network is concatenation.
    We can finish the remainder of the network after the branches have been merged
    (Listing [1-22](#PC22)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: 'The finished model can be aggregated into a `Model` object: model = keras.Model(inputs=input_layer,
    outputs=output_layer).'
  prefs: []
  type: TYPE_NORMAL
- en: Throughout this book, we’ll use a similar logic of first conceptualizing the
    network architectures and then using the Functional API to implement it. The simple
    design of the Functional API allows for building complex nonlinear topologies
    with for loops and conditionals. We will see a demonstration of this in later
    chapters.
  prefs: []
  type: TYPE_NORMAL
- en: Dealing with Data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Earlier, it was mentioned that training with `x_data` and `y_data` as `numpy`
    arrays or `pandas` DataFrames was possible, but usually too inefficient for most
    data types that would require deep learning applications. There are a few key
    signs or reasons why one would want to utilize alternative data flows to brute-force
    explicit data loading:'
  prefs: []
  type: TYPE_NORMAL
- en: Loading the data via an explicit brute-force method takes too much time.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The raw data is in a complex enough form that writing a script to reform it
    into the desired formats would be arduous, and there are easier alternatives.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The model runs into an OOM (out of memory) error.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The raw dataset physically cannot fit into the memory allotted.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Because most deep learning applications will involve at least one of these problems,
    it’s usually best practice to use alternative data flows to explicit data loading.
    There are many data flow methods, though, and it’s important to choose one that
    fits your particular problem. There is no universal best solution for all problems,
    and choosing a specialized data flow method that is not suitable for your particular
    problem can be worse than just writing an explicit script.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: The term “explicit” is used to refer to methods that very explicitly load the
    data as it is, without any special formatting or compression adapted to the data
    structure for efficiency. Sometimes, explicit methods are the best solution, especially
    with smaller datasets, in which setting up data flows may require more time investment
    than they return in value.
  prefs: []
  type: TYPE_NORMAL
- en: TensorFlow Dataset from Loaded Data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you already have your dataset loaded into memory, there’s a simple solution
    to put the data into the form of a TensorFlow dataset. This allows for the data
    to be processed more efficiently than in raw form. It can address OOM errors that
    you may encounter when using the raw data to train a model.
  prefs: []
  type: TYPE_NORMAL
- en: Note that we will need to import TensorFlow here to take advantage of its backend
    capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: Say, you have two `numpy` arrays, `X_train` and `y_train`; you can use the `from_tensor_slices`
    function to convert these two `numpy` arrays into a TensorFlow dataset (Listing
    [1-23](#PC23)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: Note that the *x* and *y* data are grouped together into one dataset. When passing
    a TensorFlow dataset object into a Keras model for training, only one can be used,
    not two.
  prefs: []
  type: TYPE_NORMAL
- en: It’s good practice to shuffle the dataset with `train_data.shuffle(l)`, where
    `l` is the length of the dataset. This means that the order with which the network
    sees the data – which can influence its learning – is not influenced by how you
    loaded the data. If a cat/dog classification dataset is organized such that the
    first 50% of dataset items are all images of cats and the last 50% of items are
    all images of dogs, for instance, the network will learn poorly because it can’t
    directly differentiate images of dogs and cats without both classes being present
    in close proximity to one another. Additionally, before training, batch the dataset
    with `train_data.batch(n)`, where each batch has `n` data instances. This is not
    an optional step – failing to do so will yield an error in fitting.
  prefs: []
  type: TYPE_NORMAL
- en: 'When fitting the Keras model, the model can be correspondingly fitted by passing
    in the dataset: model.fit(train_data, epochs=10, ...).'
  prefs: []
  type: TYPE_NORMAL
- en: There are many methods of loading data directly into TensorFlow dataset from
    arrays, like text files or image files organized in a directory, which will be
    discussed next.
  prefs: []
  type: TYPE_NORMAL
- en: TensorFlow Dataset from Image Files
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you are working with an image dataset , it is likely arranged in a directory.
    It is not necessary to manually use another library like `cv2` or `matplotlib`
    to load the images into memory and then to convert them into a TensorFlow dataset
    format with the prior method. TensorFlow allows us to automatically read images
    and convert them into elements of a TensorFlow dataset in one move with `.map`,
    which allows us to apply a function to each element of the dataset.
  prefs: []
  type: TYPE_NORMAL
- en: 'The idea is to have a dataset in which *x* is the filename of an image and
    *y* is the true label. Then, a parsing function will be applied to the dataset
    such that each filename is replaced with its corresponding image: unparsed_data
    = d.from_tensor_slices((filenames, labels)).'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let us define a function that takes in the filenames and outputs their image.
    It follows the following steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Read the content of the file.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Decode the file format (jpeg, png, etc.).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Convert to float values.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Resize the image to the desired size.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Luckily, TensorFlow has all of these operations implemented (Listing [1-24](#PC24)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: 'A few notes about this function:'
  prefs: []
  type: TYPE_NORMAL
- en: You can use `decode_png` or another decoding function for particular image formats
    in place of `decode_jpeg`.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Note that the `label` parameter is passed in and out of the function untouched.
    We still need to include this parameter because the dataset contains the label,
    which needs to be accounted for in a function that maps over the entire dataset.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: After resizing and before returning the image and label, you can also add several
    out of the many `tf.image` functions to perform image preprocessing, like adding
    random changes, flipping, cropping, adjusting saturation, brightness, and hue,
    and more.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'This function can be mapped to the unparsed dataset and then batched, shuffled,
    and used for training: parsed_data = unparsed_data.map(parse_files).'
  prefs: []
  type: TYPE_NORMAL
- en: You can use the logic of mapping a function upon a TensorFlow dataset to load
    and organize other data beyond images. Using a mapping function allows for a high
    level of control in organizing the data into some desired format.
  prefs: []
  type: TYPE_NORMAL
- en: TensorFlow datasets are commonly used for complex data of all types because
    of their efficiency and ease of usage.
  prefs: []
  type: TYPE_NORMAL
- en: Automatic Image Dataset from Directory
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Keras provides a helpful function, `.image_dataset_from_directory`, which automatically
    constructs a `tf.data.Dataset` based on data organized in a directory where images
    are put into a folder of the corresponding class (see Listing [1-25](#PC25)).
    You can use Python libraries like `os` and `cv2` to automate rearrangement of
    data into this format if it is not already.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
- en: The following code can be used to quickly convert the directory into an image
    dataset (Listing [1-26](#PC26)). The `directory` parameter passes a string with
    the name of the directory directly containing the subfolders corresponding to
    each class.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE25]'
  prefs: []
  type: TYPE_PRE
- en: The dataset can be then used like any standard TensorFlow dataset. However,
    since the data and labels are already zipped together, to apply transformations,
    the dataset needs to be unzipped.
  prefs: []
  type: TYPE_NORMAL
- en: ImageDataGenerator
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A popular alternative to the TensorFlow dataset format is the `ImageDataGenerator`
    object, which generates image data in tensor form and augments them in real time
    rather than loading all data and generating image data first. Thus, `ImageDataGenerator`
    (Listing [1-27](#PC27)) is popular both because it deals with large datasets efficiently
    and because it continually offers new sources of random augmentation. Although
    TensorFlow datasets can also handle large data efficiently, it cannot add randomness
    to the data during training.
  prefs: []
  type: TYPE_NORMAL
- en: To use the generator, begin by initializing an `ImageDataGenerator` object.
    When initializing the object, provide it with information on what the augmentation
    or preprocessing for the images looks like. For instance, `rotation_range` takes
    in the degree range from which a random degree is selected and used to rotate
    the image. `width_shift_range` and `height_shift_range` randomly shift the image
    up or down a certain quantity of pixels. `horizontal_flip` randomly flips the
    image horizontally. There are numerous other parameters that can be used to augment
    the image via brightening, normalization, shearing, zooming, and more – you can
    find specifics in the Keras documentation. If these available transformations
    aren’t enough or don’t suit your purposes, you can pass in a custom function to
    the `preprocessing_function`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE26]'
  prefs: []
  type: TYPE_PRE
- en: The generator acts like a mold through which data is transformed and shaped
    into a desired form. Note that the Image Data Generator doesn’t actually generate
    new data by increasing the size of the dataset – it acts like an automated transformation
    that is run on the data every time before training. It technically is constantly
    generating new data, but not in a way that takes up more space; this makes it
    a popular form of augmentation in large dataset problems.
  prefs: []
  type: TYPE_NORMAL
- en: Now that you’ve specified the framework for how data should be changed, there
    are three methods through which data can be provided to the generator.
  prefs: []
  type: TYPE_NORMAL
- en: 'If your data is already loaded into array format but you want to take advantage
    of the `ImageDataGenerator`’s real-time random augmentation capabilities, you
    can use the `.flow()` method, which takes in an *x* dataset and a *y* dataset
    and passes it through the specified parameters of the data generator. When fitting
    the model, the data generator functions as a dataset: model.fit(data_gen.flow(x_train,
    y_train), ...).'
  prefs: []
  type: TYPE_NORMAL
- en: If the directory paths of images and their corresponding labels are in a DataFrame,
    you can use the `.flow_from_dataframe` method to “fill” the data with a source
    of data before it is passed as an argument into fitting (Listing [1-28](#PC28)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE27]'
  prefs: []
  type: TYPE_PRE
- en: If the images are organized into a directory where each subfolder contains all
    images of one class (like the format discussed earlier with TensorFlow datasets),
    you can use the `.flow_from_directory` method (Listing [1-29](#PC29)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE28]'
  prefs: []
  type: TYPE_PRE
- en: Key Points
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In this chapter, we discussed concepts and code to use Keras for implementing
    neural networks:'
  prefs: []
  type: TYPE_NORMAL
- en: Keras is simple to get started with and is extremely versatile.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The Keras workflow has three steps: define model architecture, compile, and
    fit.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the Sequential model, the model architecture is defined by stacking neural
    network layers upon each other. The input and output must be designed to accommodate
    the shape of your data.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The compiling step should take in at least three parameters: loss function,
    optimizer, and metrics. Each of these parameters deals with understanding the
    model in relation to the loss landscape. For each of these parameters, you can
    pass in a string, a Keras loss/optimizer/metrics object, or a TensorFlow Addons
    loss/optimizer/metric object.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: When fitting the model, provide the data, the callbacks, and the number of epochs
    to train for. You can collect and visualize the model performance to determine
    future steps.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Keras offers utilities to visualize model architectures, which are valuable
    when constructing complex relationships between layers and/or analyzing how the
    shape of the data changes as it passes throughout the neural network.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Functional API allows you to define nonlinear topologies, which encourage
    the neural network to develop more complex representations of the data.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Although you can pass data into the neural network as numpy arrays or pandas
    DataFrames, there are two more efficient formats that you can use: TensorFlow
    datasets and Keras Image Data Generators (for image data).'
  prefs:
  - PREF_UL
