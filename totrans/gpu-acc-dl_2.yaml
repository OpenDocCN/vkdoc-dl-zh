- en: 3. Advanced Deep Learning Architectures for GPU Workloads
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 3. 高性能GPU工作负载的深度学习架构
- en: 3.1 Transfer Learning with GPU Acceleration
  id: totrans-1
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3.1 基于GPU加速的迁移学习
- en: Having developed several convolutional neural networks from the ground up, it
    is evident that these models can learn relevant features from data. Nonetheless,
    there remains considerable scope for enhancement. Improvements could be pursued
    through extensive experimentation with model configurations, such as modifying
    the number of layers, adjusting the learning rate, or varying the number of neurons
    per layer. However, such trial-and-error approaches are often labor-intensive
    and time-consuming.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 从零开始开发了几种卷积神经网络后，很明显这些模型可以从数据中学习相关特征。然而，仍有相当大的改进空间。可以通过对模型配置进行广泛的实验来追求改进，例如修改层数、调整学习率或改变每层的神经元数量。然而，这种试错方法通常既费时又费力。
- en: 'A practical alternative to building models from scratch is the application
    of *transfer learning*. This technique involves utilizing pretrained models—those
    that have already learned meaningful patterns (weights) from large-scale datasets—and
    adapting them to a new but related problem. Transfer learning offers two significant
    advantages: it enables the use of established neural network architectures known
    to perform well on similar tasks. It allows for the reuse of learned representations,
    often resulting in high performance with relatively limited custom data. This
    approach significantly reduces development time while enhancing model effectiveness,
    making it a widely adopted strategy in modern deep learning workflows.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 与从头开始构建模型相比，一种实用的替代方法是应用*迁移学习*。这种技术涉及利用预训练模型——那些已经从大规模数据集中学习到有意义模式（权重）的模型——并将它们适应到新的但相关的问题。迁移学习提供了两个显著的优势：它允许使用已知在类似任务上表现良好的既定神经网络架构。它允许重用学习到的表示，通常在相对有限的自定义数据上实现高性能。这种方法显著减少了开发时间，同时提高了模型的有效性，使其成为现代深度学习工作流程中广泛采用的战略。
- en: When combined with *GPU acceleration*, the benefits of transfer learning are
    further amplified. Pretrained models can be fine-tuned significantly faster on
    GPUs due to their ability to perform parallel computation on large matrix operations.
    This synergy between transfer learning and GPU hardware accelerates the training
    process and enables researchers to handle larger datasets and more complex models
    efficiently. As a result, deploying deep learning solutions becomes more feasible
    in terms of both time and computational cost.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 当与*GPU加速*结合使用时，迁移学习的优势进一步放大。由于能够在大型矩阵运算上执行并行计算，预训练模型在GPU上可以显著更快地进行微调。迁移学习与GPU硬件加速之间的这种协同作用加速了训练过程，并使研究人员能够高效地处理更大的数据集和更复杂的模型。因此，从时间和计算成本的角度来看，部署深度学习解决方案变得更加可行。
- en: 3.1.1 Motivation and Need
  id: totrans-5
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.1.1 动机和需求
- en: Modern deep learning models routinely excel on tasks with millions of carefully
    annotated examples. However, building such large-scale datasets is costly, time-consuming,
    and often infeasible in specialized domains. Transfer learning addresses this
    limitation by reusing the representations (weights) learned from a data-rich source
    task to jumpstart learning on a data scarce target task. Importing prior knowledge
    reduces the amount of labeled data and the computational budget required to reach
    competitive accuracy. This makes state-of-the-art vision and language models accessible
    to smaller organizations, research groups, and edge deployable systems that cannot
    afford great annotation efforts or prolonged training cycles. The general model
    for transfer learning is given in Figure [3.1](#Fig1).
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 现代深度学习模型在具有数百万精心标注示例的任务上通常表现出色。然而，构建这样的大型数据集成本高昂、耗时且在特定领域往往不可行。迁移学习通过重用从数据丰富的源任务中学习到的表示（权重）来启动数据稀缺的目标任务的学习，从而解决了这一限制。引入先验知识减少了达到有竞争力准确率所需的有标签数据和计算预算。这使得最先进的视觉和语言模型对较小的组织、研究小组和边缘部署系统变得可访问，这些组织或系统负担不起大量的标注工作或长时间的训练周期。迁移学习的一般模型如图[3.1](#Fig1)所示。
- en: '![Diagram of a neural network flow chart. The network consists of three main
    sections: the input layer on the left, frozen layers in the middle, and trainable
    layers on the right. The frozen layers are labeled as "Pretrained" and are depicted
    in white, while the trainable layers are labeled as "Fine-Tuned" and shown in
    green. Arrows indicate the flow of information from the input layer through the
    network to the output layer, which is labeled as "Target Task."](../images/641715_1_En_3_Chapter/641715_1_En_3_Fig1_HTML.jpg)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
  zh: '![神经网络流程图示意图。网络由三个主要部分组成：左侧的输入层，中间的冻结层，以及右侧的可训练层。冻结层被标记为“预训练”并以白色表示，而可训练层被标记为“微调”并以绿色表示。箭头指示信息从输入层通过网络流向输出层，输出层被标记为“目标任务。”](../images/641715_1_En_3_Chapter/641715_1_En_3_Fig1_HTML.jpg)'
- en: Fig. 3.1
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3.1
- en: A general model of Transfer learning is given which consist of Input Layer,
    Frozen Layer, Trainable Layer and Output Layer. Flow from Input layers to output
    layers without weights are shown
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 迁移学习的一般模型包括输入层、冻结层、可训练层和输出层。显示了从输入层到输出层无权重的流动。
- en: 3.1.2 Mathematical Model for Transfer Learning
  id: totrans-10
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.1.2 迁移学习的数学模型
- en: 'Let us define the symbols used in our mathematical model as follows:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们定义我们数学模型中使用的符号如下：
- en: '![Table showing symbols and their descriptions related to neural networks.
    Symbols include: mathcal{D}_S, mathcal{D}_T for source and target domains; mathcal{T}_S,
    mathcal{T}_T for source and target tasks; f(x; theta) for neural network function;
    mathcal{L} for loss function; Omega(cdot) for regularization function; "arg min"
    for optimization operator; sigma for activation function (e.g., ReLU, sigmoid);
    theta for model parameters; nabla_theta mathcal{L} for gradient with respect to
    parameters.](../images/641715_1_En_3_Chapter/641715_1_En_3_Equa_HTML.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![展示与神经网络相关的符号及其描述的表格。符号包括：mathcal{D}_S, mathcal{D}_T 表示源域和目标域；mathcal{T}_S,
    mathcal{T}_T 表示源任务和目标任务；f(x; theta) 表示神经网络函数；mathcal{L} 表示损失函数；Omega(cdot) 表示正则化函数；“arg
    min”表示优化算子；sigma 表示激活函数（例如，ReLU，sigmoid）；theta 表示模型参数；nabla_theta mathcal{L} 表示关于参数的梯度。](../images/641715_1_En_3_Chapter/641715_1_En_3_Equa_HTML.png)'
- en: Transfer learning leverages knowledge from a **source domain** and task to improve
    learning in a **target domain** and task, especially where labeled data is scarce.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 迁移学习利用源域和任务的知识来提高目标域和任务的学习，尤其是在标记数据稀缺的情况下。
- en: Let the source and target domains and tasks be defined as
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们定义源域和目标域以及任务如下：
- en: '**Source Domain:** $$$ \mathcal {D}_S = \{ \mathcal {X}_S, P_S(X) \} $$$'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**源域:** $$$ \mathcal {D}_S = \{ \mathcal {X}_S, P_S(X) \} $$$'
- en: '**Source Task:** $$$ \mathcal {T}_S = \{ \mathcal {Y}_S, f_S(\cdot ) \} $$$'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**源任务:** $$$ \mathcal {T}_S = \{ \mathcal {Y}_S, f_S(\cdot ) \} $$$'
- en: '**Target Domain:** $$$ \mathcal {D}_T = \{ \mathcal {X}_T, P_T(X) \} $$$'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**目标域:** $$$ \mathcal {D}_T = \{ \mathcal {X}_T, P_T(X) \} $$$'
- en: '**Target Task:** $$$ \mathcal {T}_T = \{ \mathcal {Y}_T, f_T(\cdot ) \} $$$'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**目标任务:** $$$ \mathcal {T}_T = \{ \mathcal {Y}_T, f_T(\cdot ) \} $$$'
- en: The goal of transfer learning is to learn the predictive function $$$ f_T(\cdot
    ) $$$ on $$$ \mathcal {D}_T $$$ using knowledge from $$$ f_S(\cdot ) $$$, even
    when $$$\displaystyle \begin{aligned} \mathcal{D}_S \ne \mathcal{D}_T \quad \text{or}
    \quad \mathcal{T}_S \ne \mathcal{T}_T \end{aligned} $$$ (3.1)
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 迁移学习的目标是利用从 $$$ f_S(\cdot ) $$$ 获取的知识在 $$$ \mathcal {D}_T $$$ 上学习预测函数 $$$ f_T(\cdot
    ) $$$，即使当 $$$\displaystyle \begin{aligned} \mathcal{D}_S \ne \mathcal{D}_T \quad
    \text{或} \quad \mathcal{T}_S \ne \mathcal{T}_T \end{aligned} $$$ (3.1)
- en: A deep neural network can be represented as $$$\displaystyle \begin{aligned}
    f(x; \theta) = f_n \circ f_{n-1} \circ \dots \circ f_1(x) \end{aligned} $$$ (3.2)
    where
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 深度神经网络可以表示为 $$$\displaystyle \begin{aligned} f(x; \theta) = f_n \circ f_{n-1}
    \circ \dots \circ f_1(x) \end{aligned} $$$ (3.2) 其中
- en: $$$ x \in \mathbb {R}^d $$$ is the input vector,
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: $$$ x \in \mathbb {R}^d $$$ 是输入向量，
- en: $$$ f_i(x) = \sigma (W_i x + b_i) $$$ is the activation of layer $$$ i $$$,
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: $$$ f_i(x) = \sigma (W_i x + b_i) $$$ 是第 $$$ i $$$ 层的激活，
- en: $$$ \theta = \{ W_i, b_i \}_{i=1}^{n} $$$ is the model parameters.
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: $$$ \theta = \{ W_i, b_i \}_{i=1}^{n} $$$ 是模型参数。
- en: In transfer learning, we typically freeze layers $$$ 1 $$$ through $$$ k $$$
    and fine-tune layers $$$ k+1 $$$ through $$$ n $$$.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 在迁移学习中，我们通常冻结第 $$$ 1 $$$ 层到第 $$$ k $$$ 层，并微调第 $$$ k+1 $$$ 层到第 $$$ n $$$ 层。
- en: 'We aim to minimize a task-specific loss on the target task: $$$\displaystyle
    \begin{aligned} \min_{\theta_T} \mathcal{L}_T(f_T(x; \theta_T), y_T) + \lambda
    \cdot \Omega(\theta_T) \end{aligned} $$$ (3.3) where'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的目标是在目标任务上最小化特定任务的损失：$$$\displaystyle \begin{aligned} \min_{\theta_T} \mathcal{L}_T(f_T(x;
    \theta_T), y_T) + \lambda \cdot \Omega(\theta_T) \end{aligned} $$$ (3.3) 其中
- en: $$$ \mathcal {L}_T $$$ is the loss function (e.g., cross-entropy),
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: $$$ \mathcal {L}_T $$$ 是损失函数（例如，交叉熵），
- en: $$$ \Omega (\theta _T) $$$ is the regularization term (e.g., $$$ \|\theta _T\|_2^2
    $$$),
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: $$ \Omega (\theta _T) $$ 是正则化项（例如，$$ \|\theta _T\|_2^2 $$），
- en: $$$ \lambda $$$ is the regularization weight.
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: $$ \lambda $$ 是正则化权重。
- en: Deep learning computations involve high-dimensional linear algebra, well suited
    for parallel execution on GPUs. Common operations include $$$\displaystyle \begin{aligned}
    Z = WX + b \end{aligned} $$$ (3.4) where
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习计算涉及高维线性代数，非常适合在GPU上并行执行。常见操作包括 $$\displaystyle \begin{aligned} Z = WX +
    b \end{aligned} $$（3.4）其中
- en: $$$ W \in \mathbb {R}^{m \times d} $$$ is the weight matrix,
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: $$ W \in \mathbb {R}^{m \times d} $$ 是权重矩阵，
- en: $$$ X \in \mathbb {R}^{d \times n} $$$ is the input matrix (batch of inputs),
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: $$ X \in \mathbb {R}^{d \times n} $$ 是输入矩阵（输入批次），
- en: $$$ b \in \mathbb {R}^{m} $$$ is the bias vector,
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: $$ b \in \mathbb {R}^{m} $$ 是偏置向量，
- en: $$$ Z \in \mathbb {R}^{m \times n} $$$ is the activation input.
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: $$ Z \in \mathbb {R}^{m \times n} $$ 是激活输入。
- en: GPUs accelerate training through libraries like `cuBLAS` and `cuDNN` by performing
    matrix multiplications and activations in parallel.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 通过并行执行矩阵乘法和激活操作，GPU通过库如`cuBLAS`和`cuDNN`加速训练。
- en: 'Use pretrained ResNet-50 on ImageNet: $$$ f_S(x; \theta _S) $$$'
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用在ImageNet上预训练的ResNet-50：$$ f_S(x; \theta _S) $$
- en: 'Apply to a medical imaging dataset with limited data: $$$ \mathcal {D}_T $$$'
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 应用到数据有限医学影像数据集：$$ \mathcal {D}_T $$
- en: 'Freeze base layers (feature extractor), fine-tune final layers: $$$\displaystyle
    \begin{aligned} \hat{y} = \text{softmax}(W_T h + b_T) \end{aligned}$$$'
  id: totrans-37
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 冻结基层（特征提取器），微调最终层：$$$\displaystyle \begin{aligned} \hat{y} = \text{softmax}(W_T
    h + b_T) \end{aligned}$$$
- en: where $$$ h = f_k(x; \theta _S) $$$ is the output of the frozen base.
  id: totrans-38
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 其中 $$ h = f_k(x; \theta _S) $$ 是冻结基的输出。
- en: 'Use cross-entropy loss: $$$\displaystyle \begin{aligned} \mathcal{L} = -\sum_{i=1}^C
    y_i \log(\hat{y}_i) \end{aligned}$$$'
  id: totrans-39
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用交叉熵损失：$$$\displaystyle \begin{aligned} \mathcal{L} = -\sum_{i=1}^C y_i \log(\hat{y}_i)
    \end{aligned}$$$
- en: 3.1.3 Relevance with GPUs
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.1.3 与GPU的相关性
- en: The forward and backward passes of the neural network involve large-scale matrix
    operations such as $$$\displaystyle \begin{aligned} Z = W X + b \end{aligned}
    $$$ (3.5) where $$$ W \in \mathbb {R}^{m \times d} $$$, $$$ X \in \mathbb {R}^{d
    \times n} $$$, and $$$ b \in \mathbb {R}^m $$$. These operations are computationally
    intensive and benefit significantly from GPU acceleration due to the highly parallel
    nature of matrix multiplication and activation functions.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络的正向和反向传播涉及大规模矩阵运算，如 $$\displaystyle \begin{aligned} Z = W X + b \end{aligned}
    $$（3.5）其中 $$ W \in \mathbb {R}^{m \times d} $$，$$ X \in \mathbb {R}^{d \times
    n} $$，和 $$ b \in \mathbb {R}^m $$。这些操作计算密集，并且由于矩阵乘法和激活函数的高度并行性，从GPU加速中受益显著。
- en: Using GPU-enabled libraries (e.g., cuDNN, cuBLAS), the training and fine-tuning
    process becomes 10$$$\times $$$ to 100$$$\times $$$ faster compared to CPU-only
    environments. This allows rapid adaptation of large models to new domains with
    minimal data.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 使用支持GPU的库（例如，cuDNN，cuBLAS），训练和微调过程比仅使用CPU的环境快10$$$\times$$$到100$$$\times$$$。这允许快速适应新领域的大型模型，数据量最小。
- en: 3.2 GPU Benefits in Fine-Tuning Pretrained Models
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3.2 微调预训练模型时的GPU优势
- en: Fine-tuning is a machine learning technique that adapts a pretrained model to
    perform a specific task or address a particular use case. It falls under the broader
    concept of transfer learning, which leverages the knowledge already acquired by
    a model to solve new, related problems. Fine-tuning is especially valuable in
    deep learning, where training models with millions or billions of parameters from
    scratch can be costly and time-consuming. Instead, developers refine existing
    models—such as large language models (LLMs) for NLP or convolutional neural networks
    (CNNs) and vision transformers (ViTs) for computer vision—to achieve task-specific
    performance more efficiently. This approach significantly reduces the computational
    resources and labeled data needed to create specialized models for niche applications.
    For instance, it can tailor a model’s behavior, like changing the tone of a chatbot
    or enhancing an image generation model with a specific artistic style. Fine-tuning
    also allows organizations to integrate proprietary or domain-specific data into
    a model’s training, improving relevance and accuracy for their unique needs. Fine-tuning
    is a practical strategy for customizing powerful pretrained models, making advanced
    AI more accessible and adaptable.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 微调是一种机器学习技术，它通过选择性地更新参数来调整预训练模型以执行特定任务或解决特定用例。它属于更广泛的概念迁移学习，该学习利用模型已经获得的知识来解决新的、相关的问题。在深度学习中，微调特别有价值，因为从头开始训练具有数百万或数十亿参数的模型可能既昂贵又耗时。相反，开发者可以改进现有的模型——例如，用于自然语言处理的大型语言模型（LLMs）或用于计算机视觉的卷积神经网络（CNNs）和视觉变换器（ViTs）——以更有效地实现特定任务的性能。这种方法显著减少了创建针对利基应用的专用模型所需的计算资源和标记数据。例如，它可以调整模型的行为，如改变聊天机器人的语气或增强具有特定艺术风格的图像生成模型。微调还允许组织将专有或特定领域的数据集成到模型的训练中，提高其独特需求的关联性和准确性。微调是定制强大预训练模型的一种实用策略，使高级人工智能更加易于访问和适应。
- en: 3.2.1 Fine-Tuning vs. Training
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2.1 微调与训练的比较
- en: Although fine-tuning is a type of model training, it differs significantly from
    what is typically referred to as “training” in machine learning. To avoid confusion,
    the initial stage where a model is trained from scratch is commonly termed **Pretraining**,
    especially when contrasted with fine-tuning. Table [3.1](#Tab1) gives the conceptual
    difference between Pretraining and Fine-Tuning.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然微调是一种模型训练方法，但它与通常所说的机器学习中的“训练”有显著区别。为了避免混淆，从零开始训练模型的第一阶段通常被称为**预训练**，尤其是在与微调对比时。表
    [3.1](#Tab1) 展示了预训练与微调之间的概念差异。
- en: 3.2.2 Fine-Tuning Techniques
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2.2 微调技术
- en: 'Fine-tuning is adapting a pretrained model to a new task by selectively updating
    its parameters. This approach allows the model to retain general knowledge while
    learning domain-specific features. The following techniques are commonly used
    to fine-tune deep learning models effectively:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 微调通过选择性地更新参数来调整预训练模型以适应新任务。这种方法允许模型保留通用知识，同时学习特定领域的特征。以下技术通常用于有效地微调深度学习模型：
- en: Table 3.1
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 表 3.1
- en: Differences Between Pretraining and Fine-tuning
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 预训练与微调之间的差异
- en: '| Aspect | Pretraining | Fine-tuning |'
  id: totrans-51
  prefs: []
  type: TYPE_TB
  zh: '| 方面 | 预训练 | 微调 |'
- en: '| --- | --- | --- |'
  id: totrans-52
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| Definition | Initial training of a model on a large dataset to learn general
    features or representations | Further training of a pretrained model on a smaller,
    task-specific dataset |'
  id: totrans-53
  prefs: []
  type: TYPE_TB
  zh: '| 定义 | 在大型数据集上对模型进行初始训练以学习通用特征或表示 | 在较小的、特定任务的较小数据集上对预训练模型进行进一步训练 |'
- en: '| Data Requirement | Requires large-scale datasets, often unlabeled | Requires
    smaller, often labeled, task-specific datasets |'
  id: totrans-54
  prefs: []
  type: TYPE_TB
  zh: '| 数据需求 | 需要大规模数据集，通常是未标记的 | 需要较小、通常是标记的特定任务数据集 |'
- en: '| Learning State | Model starts with random weights (no prior knowledge) |
    Model starts with learned weights from pretraining |'
  id: totrans-55
  prefs: []
  type: TYPE_TB
  zh: '| 学习状态 | 模型从随机权重（无先验知识）开始 | 模型从预训练中学习的权重开始 |'
- en: '| Purpose | To learn general knowledge that can be transferred to many tasks
    | To adapt the model to a specific use case or domain |'
  id: totrans-56
  prefs: []
  type: TYPE_TB
  zh: '| 目的 | 学习可以转移到许多任务中的通用知识 | 将模型适应到特定的用例或领域 |'
- en: '| Training Cost | High computational cost due to large datasets and long training
    times | Lower cost, as training is shorter and data is limited |'
  id: totrans-57
  prefs: []
  type: TYPE_TB
  zh: '| 训练成本 | 由于大型数据集和长时间训练，计算成本高 | 训练时间短，数据有限，成本较低 |'
- en: '| Risk of Overfitting | Less prone to overfitting due to large dataset | Higher
    risk if the dataset is small and model is not properly regularized |'
  id: totrans-58
  prefs: []
  type: TYPE_TB
  zh: '| 过拟合风险 | 由于数据集大，不太可能过拟合 | 如果数据集小且模型没有适当正则化，风险较高 |'
- en: '| Typical Use Cases | Foundation model development, general-purpose LLMs, vision
    models like ViT | Task-specific adaptation such as domain-specific chatbots, custom
    image classifiers |'
  id: totrans-59
  prefs: []
  type: TYPE_TB
  zh: '| 典型用例 | 基础模型开发、通用LLM、ViT等视觉模型 | 针对特定任务的适应，如特定领域的聊天机器人、定制图像分类器 |'
- en: '**Initialize the New Model:**'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**初始化新模型：**'
- en: The feature extractor (encoder) is initialized using the parameters from a pretrained
    model.
  id: totrans-61
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 特征提取器（编码器）使用预训练模型的参数进行初始化。
- en: The output layer (decoder/classifier) is randomly initialized, as the label
    space is typically different from that of the original task.
  id: totrans-62
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输出层（解码器/分类器）是随机初始化的，因为标签空间通常与原始任务不同。
- en: '**Start from a Local Minimum:** Since the model begins with a set of learned
    parameters, it starts near a local minimum in the loss landscape, accelerating
    convergence.'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**从局部最小值开始：** 由于模型开始时有一组已学习的参数，它开始接近损失景观中的局部最小值，从而加速收敛。'
- en: '**Use a Small Learning Rate:** Fine-tuning is typically done with a small learning
    rate to make minor, controlled updates to the pretrained weights. This helps preserve
    useful knowledge acquired during the initial training.'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用较小的学习率：** 微调通常使用较小的学习率，以对预训练权重进行细微、可控的更新。这有助于保留在初始训练期间获得的有用知识。'
- en: '**Train for a Few Epochs:** As the model has already learned general representations,
    it often requires only a few additional epochs of training on the target dataset.'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**训练几个周期：** 由于模型已经学习了一般表示，它通常只需要在目标数据集上进行几个额外的训练周期。'
- en: '**Regularize the Search Space:** Techniques such as weight decay, dropout,
    or freezing early layers can be used to prevent overfitting and constrain the
    optimization process, especially when training data is limited.'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**正则化搜索空间：** 可以使用权重衰减、dropout或冻结早期层等技术来防止过拟合并约束优化过程，尤其是在训练数据有限的情况下。'
- en: 3.2.2.1 Freezing Bottom Layer
  id: totrans-67
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 3.2.2.1 冻结底层
- en: In deep neural networks, learning occurs hierarchically across layers. The bottom
    layers (closer to the input) typically learn low-level, universal features such
    as edges, textures, and simple shapes. These features are largely dataset-independent
    and form the foundational building blocks of visual understanding. In contrast,
    the upper layers (closer to the output) capture high-level, task-specific patterns,
    such as object parts or semantic classes, varying significantly between tasks
    and datasets.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在深度神经网络中，学习在层之间分层发生。底层（靠近输入）通常学习低级、通用特征，如边缘、纹理和简单形状。这些特征在很大程度上与数据集无关，构成了视觉理解的基础构建块。相比之下，上层（靠近输出）捕获高级、特定任务的模式，如物体部分或语义类别，这些在任务和数据集之间差异很大。
- en: 'Conceptually, the architecture looks like:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 从概念上讲，架构看起来像：
- en: '![Table showing symbols and their descriptions related to neural networks.
    Symbols include: mathcal{D}_S, mathcal{D}_T for source and target domains; mathcal{T}_S,
    mathcal{T}_T for source and target tasks; f(x; theta) for neural network function;
    mathcal{L} for loss function; Omega(cdot) for regularization function; "arg min"
    for optimization operator; sigma for activation function (e.g., ReLU, sigmoid);
    theta for model parameters; nabla_theta mathcal{L} for gradient with respect to
    parameters.](../images/641715_1_En_3_Chapter/641715_1_En_3_Equd_HTML.png)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![展示与神经网络相关的符号及其描述的表格。符号包括：mathcal{D}_S, mathcal{D}_T表示源域和目标域；mathcal{T}_S,
    mathcal{T}_T表示源任务和目标任务；f(x; theta)表示神经网络函数；mathcal{L}表示损失函数；Omega(cdot)表示正则化函数；“arg
    min”表示优化算子；sigma表示激活函数（例如ReLU，sigmoid）；theta表示模型参数；nabla_theta mathcal{L}表示关于参数的梯度。](../images/641715_1_En_3_Chapter/641715_1_En_3_Equd_HTML.png)'
- en: During fine-tuning, a common strategy is to freeze the bottom layers of a pretrained
    model, i.e., prevent their weights from being updated, while retraining only the
    top layers on the new dataset. This technique ensures that general low-level features
    remain intact, preserving the previously acquired knowledge of the model. Meanwhile,
    the upper layers are retrained or newly initialized to adapt to the new task’s
    specific characteristics and label space. The freezing of the bottom layers offers
    several benefits. It significantly reduces the number of trainable parameters,
    leading to faster convergence and lower computational cost. Moreover, it is an
    effective regularization method, helping avoid overfitting when working with small
    task-specific datasets. This strategy is beneficial when the new task is closely
    related to the original task on which the model was trained, allowing efficient
    transfer of learned representations.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 在微调过程中，一种常见的策略是冻结预训练模型的底层，即防止其权重被更新，而仅在新的数据集上重新训练顶层。这项技术确保了低级通用特征保持完整，保留了模型之前获得的知识。同时，上层被重新训练或重新初始化以适应新任务的具体特征和标签空间。底层冻结提供了几个好处。它显著减少了可训练参数的数量，从而加快了收敛速度并降低了计算成本。此外，它是一种有效的正则化方法，有助于在使用小任务特定数据集时避免过拟合。当新任务与模型训练的原任务密切相关时，这种策略是有益的，它允许高效地迁移学习到的表示。
- en: Pretrained models are typically developed on large-scale datasets—most commonly
    in image classification tasks—where vast amounts of labeled data are available.
    These models learn generalizable feature representations in the early layers,
    such as edges, textures, and shapes, which are not specific to any one dataset.
    Once trained, the learned weights serve as a strong initialization point for a
    wide range of downstream tasks, such as object detection, segmentation, or domain-specific
    classification problems.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 预训练模型通常是在大规模数据集上开发的——最常见的是在图像分类任务中——在这些任务中，有大量的标记数据可用。这些模型在早期层学习了一般化的特征表示，例如边缘、纹理和形状，这些特征并不特定于任何单个数据集。一旦训练完成，学到的权重就作为一系列下游任务的强大初始化点，例如目标检测、分割或特定领域的分类问题。
- en: By initializing a new model with pretrained weights, fine-tuning allows faster
    convergence during training because the model starts from an informed state rather
    than from random initialization. This not only reduces the number of epochs and
    computational cost but can also lead to improved performance, especially when
    the downstream task has limited training data. The combination of pretraining
    and fine-tuning thus enables efficient and effective transfer learning across
    different computer vision applications.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 通过用预训练权重初始化新模型，微调可以在训练期间实现更快的收敛，因为模型是从一个知情状态而不是从随机初始化开始的。这不仅减少了训练周期和计算成本，还可以提高性能，尤其是在下游任务训练数据有限的情况下。因此，预训练和微调的结合使得在不同计算机视觉应用之间实现高效和有效的迁移学习成为可能。
- en: 3.2.2.2 Parameter-Efficient Fine-Tuning (PEFT)
  id: totrans-74
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 3.2.2.2 参数高效微调（PEFT）
- en: Parameter-efficient fine-tuning (PEFT) techniques offer a compelling alternative
    to full model fine-tuning by enabling comparable performance while updating only
    a small subset of parameters. This selective training reduces computational overhead
    and storage requirements, making it suitable for deploying large language models
    (LLMs) in resource-constrained environments. Additionally, PEFT helps mitigate
    the issue of catastrophic forgetting—a common problem during full fine-tuning—where
    the model loses previously acquired knowledge when trained on new tasks.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 参数高效微调（PEFT）技术通过只更新一小部分参数来实现与完整模型微调相当的性能，从而提供了一个有吸引力的替代方案。这种选择性的训练减少了计算开销和存储需求，使其适合在资源受限的环境中部署大型语言模型（LLMs）。此外，PEFT有助于缓解灾难性遗忘的问题——这是全微调过程中常见的问题——当模型在新的任务上训练时，会丢失之前获得的知识。
- en: PEFT methods have demonstrated superior performance in low-data scenarios, where
    full fine-tuning may lead to overfitting or unstable convergence. Moreover, these
    approaches generalize more effectively to out-of-domain tasks, enhancing the model’s
    robustness in real-world applications. PEFT enables efficient adaptation while
    preserving the pretrained model’s core capabilities by focusing on minimal yet
    impactful parameter updates.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: PEFT方法在低数据场景中表现出优异的性能，在这些场景中，完整的微调可能导致过拟合或不稳定收敛。此外，这些方法更有效地泛化到域外任务，增强了模型在实际应用中的鲁棒性。PEFT通过关注最小但影响深远的参数更新，实现了高效的适应，同时保留了预训练模型的核心能力。
- en: Low-Rank Adaptation (LoRA)
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 低秩适应（LoRA）
- en: Training large language models (LLMs) by updating all their weights can be computationally
    prohibitive, particularly due to GPU memory constraints. Among various parameter-efficient
    fine-tuning (PEFT) methods, **low-rank adaptation (LoRA)** has emerged as one
    of the most efficient techniques. LoRA significantly reduces the number of trainable
    parameters, enabling the customization of LLMs with minimal resource usage.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 通过更新所有权重来训练大型语言模型（LLMs）在计算上可能是不可行的，尤其是由于GPU内存限制。在各种参数高效微调（PEFT）方法中，**低秩适应（LoRA）**已成为最有效的技术之一。LoRA显著减少了可训练参数的数量，使得LLMs在最小资源使用的情况下也能进行定制。
- en: For illustration, consider a simplified scenario where the LLM contains a single
    weight matrix $$$ W $$$. During standard fine-tuning, the optimizer computes a
    gradient estimate $$$ \Delta W $$$ based on the loss function through backpropagation,
    and the weight update is given by $$$\displaystyle \begin{aligned} W_{\text{updated}}
    = W + \Delta W \end{aligned} $$$ (3.6)
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明，考虑一个简化的场景，其中LLM包含一个单一的权重矩阵 $$$ W $$$. 在标准微调过程中，优化器通过反向传播根据损失函数计算梯度估计 $$$
    \Delta W $$$, 权重更新由以下公式给出：$$$\displaystyle \begin{aligned} W_{\text{updated}}
    = W + \Delta W \end{aligned} $$$(3.6)
- en: If $$$ W $$$ contains, for instance, seven billion parameters, then $$$ \Delta
    W $$$ also contains seven billion elements, resulting in high memory and computation
    demands. LoRA addresses this by representing $$$ \Delta W $$$ as a low-rank product
    of two much smaller matrices. Specifically, it learns matrices $$$ A \in \mathbb
    {R}^{d \times r} $$$ and $$$ B \in \mathbb {R}^{r \times k} $$$, such that $$$\displaystyle
    \begin{aligned} \Delta W \approx A B \end{aligned} $$$ (3.7)
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 如果 $$$ W $$ 含有，例如，七十亿个参数，那么 $$$ \Delta W $$ 也包含七十亿个元素，导致高内存和计算需求。LoRA通过将 $$$
    \Delta W $$ 表示为两个远小矩阵的低秩乘积来解决这一问题。具体来说，它学习矩阵 $$$ A \in \mathbb {R}^{d \times r}
    $$$ 和 $$$ B \in \mathbb {R}^{r \times k} $$$，使得$$$\displaystyle \begin{aligned}
    \Delta W \approx A B \end{aligned} $$$(3.7)
- en: 'Here, $$$ r \ll \min (d, k) $$$ is a rank hyperparameter controlling the trade-off
    between performance and memory savings. Instead of directly updating $$$ W $$$,
    LoRA injects $$$ AB $$$ into the forward pass while keeping $$$ W $$$ frozen:
    $$$\displaystyle \begin{aligned} W_{\text{updated}} = W + A B \end{aligned} $$$
    (3.8)'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，$$ r \ll \min (d, k) $$ 是一个控制性能和内存节省之间权衡的秩超参数。LoRA不是直接更新 $$$ W $$$, 而是在保持
    $$$ W $$ 冻结的同时将 $$$ AB $$ 注入前向传递：$$$\displaystyle \begin{aligned} W_{\text{updated}}
    = W + A B \end{aligned} $$$(3.8)
- en: This decomposition dramatically reduces the number of parameters being trained,
    while maintaining model expressiveness. The technique is particularly effective
    in low-resource settings and when adapting models to new tasks, making it a cornerstone
    of modern PEFT approaches for LLMs.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 这种分解显著减少了需要训练的参数数量，同时保持了模型的表达能力。该技术在资源有限的环境中和适应新任务时特别有效，使其成为现代LLMs PEFT方法的基石。
- en: 3.2.2.3 Prompt Tuning
  id: totrans-83
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 3.2.2.3 提示调整
- en: Prompt tuning is a parameter-efficient fine-tuning technique designed to adapt
    large language models (LLMs) by learning a small set of trainable vectors known
    as *soft prompts*. Unlike full fine-tuning, where all the model weights are updated,
    prompt tuning keeps the pretrained model’s parameters frozen and instead optimizes
    the prompt embeddings through supervised learning. These soft prompt vectors,
    typically ranging between 20 and 100 in number, are prepended to the input embedding
    sequence and serve to guide the model’s behavior in a task-specific way. This
    technique is especially useful when computational resources are limited or when
    rapid adaptation to multiple tasks is required.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 提示微调是一种参数高效的微调技术，旨在通过学习一组称为*软提示*的可训练向量来适应大型语言模型（LLMs）。与全微调不同，全微调会更新所有模型权重，提示微调保持预训练模型的参数冻结，并通过监督学习优化提示嵌入。这些软提示向量通常数量在20到100之间，被添加到输入嵌入序列之前，以指导模型以特定任务的方式行为。这种技术在计算资源有限或需要快速适应多个任务时特别有用。
- en: 'Mathematically, consider an input sequence of tokens $$$ X = [x_1, x_2, \ldots
    , x_n] $$$, with corresponding embeddings $$$ E_X = [e_1, e_2, \ldots , e_n] $$$,
    where $$$ e_i \in \mathbb {R}^d $$$. In prompt tuning, a set of learnable prompt
    vectors $$$ P = [p_1, p_2, \ldots , p_m] $$$, where each $$$ p_j \in \mathbb {R}^d
    $$$, is introduced. These soft prompts are prepended to the input embeddings:
    $$$\displaystyle \begin{aligned} \tilde{X} = [p_1, p_2, \ldots, p_m, e_1, e_2,
    \ldots, e_n] \end{aligned} $$$ (3.9) The model $$$ \mathcal {M} $$$ takes $$$
    \tilde {X} $$$ as input, and during training, only the parameters in $$$ P $$$
    are updated:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 从数学上考虑，考虑一个标记序列的输入$$ X = [x_1, x_2, \ldots , x_n] $$，对应的嵌入为$$ E_X = [e_1, e_2,
    \ldots , e_n] $$，其中$$ e_i \in \mathbb {R}^d $$。在提示微调中，引入了一组可学习的提示向量$$ P = [p_1,
    p_2, \ldots , p_m] $$，其中每个$$ p_j \in \mathbb {R}^d $$，这些软提示被添加到输入嵌入之前：$$\displaystyle
    \begin{aligned} \tilde{X} = [p_1, p_2, \ldots, p_m, e_1, e_2, \ldots, e_n] \end{aligned}
    $$（3.9）模型$$ \mathcal {M} $$以$$ \tilde {X} $$作为输入，在训练过程中，仅更新$$ P $$中的参数：
- en: '![Mathematical formula depicting a transformation process. The expression is:
    theta_{frozen} cup {P} xrightarrow{train} theta_{frozen} cup {P^*}. This illustrates
    a training process where a set P is transformed into P^* while theta_{frozen}
    remains unchanged.](../images/641715_1_En_3_Chapter/641715_1_En_3_Equ10_HTML.png)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
  zh: '![描述变换过程的数学公式。表达式为：theta_{frozen} cup {P} xrightarrow{train} theta_{frozen}
    cup {P^*}。这展示了在theta_{frozen}保持不变的同时，将集合P转换为P^*的训练过程。](../images/641715_1_En_3_Chapter/641715_1_En_3_Equ10_HTML.png)'
- en: (3.10) where $$$ \theta _{\text{frozen}} $$$ represents the frozen parameters
    of the LLM and $$$ P^* $$$ the optimized soft prompt vectors.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: （3.10）其中，$$ \theta _{\text{frozen}} $$表示LLM的冻结参数，$$ P^* $$表示优化的软提示向量。
- en: Prompt tuning offers several benefits over other PEFT methods. It requires significantly
    fewer trainable parameters, reducing memory and computational costs. This makes
    it particularly advantageous in multi-task or multi-domain settings where deploying
    separate fully fine-tuned models would be impractical. Additionally, because the
    core model remains unchanged, prompt tuning allows for seamless task switching
    and faster experimentation, while still achieving competitive performance, especially
    in low-resource and out-of-domain generalization scenarios.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 提示微调相较于其他PEFT方法具有几个优势。它需要显著更少的可训练参数，减少了内存和计算成本。这使得它在多任务或多领域设置中特别有利，在这些设置中，部署单独的全微调模型将是不切实际的。此外，由于核心模型保持不变，提示微调允许无缝的任务切换和更快的实验，同时仍然实现有竞争力的性能，尤其是在低资源和域外泛化场景中。
- en: 3.2.3 Role of GPU in Fine-Tuning
  id: totrans-89
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2.3 GPU在微调中的作用
- en: Graphics processing units (GPUs) play a vital role in fine-tuning deep learning
    models due to their ability to perform highly parallel computations efficiently.
    Fine-tuning involves updating the weights of a pretrained model through forward
    and backward passes, which rely heavily on matrix multiplications and tensor operations.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 图形处理单元（GPUs）在微调深度学习模型中发挥着至关重要的作用，因为它们能够高效地执行高度并行的计算。微调涉及通过正向和反向传播更新预训练模型的权重，这严重依赖于矩阵乘法和张量运算。
- en: These computationally expensive operations benefit significantly from the GPU’s
    parallel architecture. Compared to CPUs, GPUs can process large batches of data
    simultaneously, considerably accelerating the training process. Additionally,
    GPUs offer high-bandwidth memory (such as GDDR6 or HBM), which is essential for
    handling large parameter sizes and intermediate activations in models like BERT,
    GPT, or ResNet during fine-tuning.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 这些计算密集型操作从GPU的并行架构中受益显著。与CPU相比，GPU可以同时处理大量数据批次，大大加快训练过程。此外，GPU提供高带宽内存（如GDDR6或HBM），这对于处理BERT、GPT或ResNet等模型在微调期间的大参数大小和中间激活至关重要。
- en: By utilizing GPUs, data scientists, and researchers can fine-tune in a fraction
    of the time it would take on conventional hardware. Deep learning frameworks such
    as TensorFlow and PyTorch are optimized to run efficiently on GPUs, further streamlining
    the process and enabling effective model adaptation to specific domains or tasks.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 通过利用GPU，数据科学家和研究人员可以在传统硬件上所需时间的一小部分内进行微调。TensorFlow和PyTorch等深度学习框架经过优化，可以在GPU上高效运行，进一步简化流程，并使模型能够有效适应特定领域或任务。
- en: Fine-tuning is the process of adapting a pretrained model $$$\mathcal {M}_{\theta
    }$$$ to a specific task by continuing the training on a smaller, task-specific
    dataset. The model parameters $$$\theta $$$ are updated through gradient descent
    based on the loss computed from the task-specific data.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 微调是通过在较小的、特定任务的训练数据集上继续训练来调整预训练模型$$$\mathcal {M}_{\theta }$$$的过程。模型参数$$$\theta
    $$$
- en: 3.2.4 Forward Pass
  id: totrans-94
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2.4 前向传播
- en: 'Given input $$$x \in \mathbb {R}^n$$$, the model produces a prediction $$$\hat
    {y}$$$ using the current parameters $$$\theta $$$: $$$\displaystyle \begin{aligned}
    \hat{y} = \mathcal{M}_{\theta}(x) \end{aligned} $$$ (3.11)'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 给定输入$$$\mathbf{x} \in \mathbb {R}^n$$$, 模型使用当前参数$$$\theta $$$
- en: 3.2.5 Loss Function
  id: totrans-96
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2.5 损失函数
- en: 'The loss $$$\mathcal {L}$$$ is computed between the predicted output $$$\hat
    {y}$$$ and the true label *y*: $$$\displaystyle \begin{aligned} \mathcal{L}(\theta)
    = \ell(\hat{y}, y) = \ell(\mathcal{M}_{\theta}(x), y) \end{aligned} $$$ (3.12)'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 损失$$$\mathcal {L}$$$是在预测输出$$$\hat {y}$$$和真实标签*y*之间计算的：$$$\displaystyle \begin{aligned}
    \mathcal{L}(\theta) = \ell(\hat{y}, y) = \ell(\mathcal{M}_{\theta}(x), y) \end{aligned}
    $$$ (3.12)
- en: Common loss functions include mean squared error (MSE) for regression or Cross-Entropy
    Loss for classification.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 常见的损失函数包括回归中的均方误差（MSE）或分类中的交叉熵损失。
- en: 3.2.6 Backpropagation and Gradient Update
  id: totrans-99
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2.6 反向传播和梯度更新
- en: 'The gradient of the loss with respect to model parameters is computed: $$$\displaystyle
    \begin{aligned} \nabla_{\theta} \mathcal{L} = \frac{\partial \mathcal{L}}{\partial
    \theta} \end{aligned} $$$ (3.13)'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 计算损失相对于模型参数的梯度：$$$\displaystyle \begin{aligned} \nabla_{\theta} \mathcal{L}
    = \frac{\partial \mathcal{L}}{\partial \theta} \end{aligned} $$$ (3.13)
- en: 'Using stochastic gradient descent (SGD) or its variants (like Adam), the model
    parameters are updated: $$$\displaystyle \begin{aligned} \theta_{t+1} = \theta_{t}
    - \eta \cdot \nabla_{\theta} \mathcal{L} \end{aligned} $$$ (3.14) where $$$\eta
    $$$ is the learning rate.'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 使用随机梯度下降（SGD）或其变体（如Adam），模型参数更新如下：$$$\displaystyle \begin{aligned} \theta_{t+1}
    = \theta_{t} - \eta \cdot \nabla_{\theta} \mathcal{L} \end{aligned} $$$ (3.14)
    其中$$$\eta $$$
- en: 3.2.7 An Example
  id: totrans-102
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2.7 一个例子
- en: 'Assume a pretrained linear model with one input and one output neuron: $$$\displaystyle
    \begin{aligned} \hat{y} = w \cdot x + b \end{aligned}$$$ Given: $$$\displaystyle
    \begin{aligned} w = 0.5,\quad b = 0.1,\quad \text{input } x = 2.0,\quad \text{true
    label } y = 1.5 \end{aligned}$$$'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 假设一个具有一个输入神经元和一个输出神经元的预训练线性模型：$$$\displaystyle \begin{aligned} \hat{y} = w \cdot
    x + b \end{aligned}$$$ 给定：$$$\displaystyle \begin{aligned} w = 0.5,\quad b = 0.1,\quad
    \text{输入 } x = 2.0,\quad \text{真实标签 } y = 1.5 \end{aligned}$$$
- en: 3.2.8 Forward Pass
  id: totrans-104
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2.8 前向传播
- en: $$$\displaystyle \begin{aligned} \hat{y} = 0.5 \cdot 2.0 + 0.1 = 1.0 + 0.1 =
    1.1 \end{aligned}$$$
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: $$$\displaystyle \begin{aligned} \hat{y} = 0.5 \cdot 2.0 + 0.1 = 1.0 + 0.1 =
    1.1 \end{aligned}$$$
- en: 3.2.9 Loss Calculation (Mean Squared Error)
  id: totrans-106
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2.9 损失计算（均方误差）
- en: $$$\displaystyle \begin{aligned} \mathcal{L} = \frac{1}{2}(y - \hat{y})^2 =
    \frac{1}{2}(1.5 - 1.1)^2 = \frac{1}{2}(0.4)^2 = 0.08 \end{aligned}$$$
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: $$$\displaystyle \begin{aligned} \mathcal{L} = \frac{1}{2}(y - \hat{y})^2 =
    \frac{1}{2}(1.5 - 1.1)^2 = \frac{1}{2}(0.4)^2 = 0.08 \end{aligned}$$$
- en: 3.2.10 Backpropagation (Gradient Calculation)
  id: totrans-108
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2.10 反向传播（梯度计算）
- en: $$$\displaystyle \begin{aligned} \frac{\partial \mathcal{L}}{\partial \hat{y}}
    = \hat{y} - y = 1.1 - 1.5 = -0.4 \end{aligned}$$$ $$$\displaystyle \begin{aligned}
    \frac{\partial \mathcal{L}}{\partial w} = \frac{\partial \mathcal{L}}{\partial
    \hat{y}} \cdot \frac{\partial \hat{y}}{\partial w} = -0.4 \cdot x = -0.4 \cdot
    2.0 = -0.8 \end{aligned}$$$ $$$\displaystyle \begin{aligned} \frac{\partial \mathcal{L}}{\partial
    b} = \frac{\partial \mathcal{L}}{\partial \hat{y}} \cdot \frac{\partial \hat{y}}{\partial
    b} = -0.4 \cdot 1 = -0.4 \end{aligned}$$$
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: $$\displaystyle \begin{aligned} \frac{\partial \mathcal{L}}{\partial \hat{y}}
    = \hat{y} - y = 1.1 - 1.5 = -0.4 \end{aligned}$$ $$\displaystyle \begin{aligned}
    \frac{\partial \mathcal{L}}{\partial w} = \frac{\partial \mathcal{L}}{\partial
    \hat{y}} \cdot \frac{\partial \hat{y}}{\partial w} = -0.4 \cdot x = -0.4 \cdot
    2.0 = -0.8 \end{aligned}$$ $$\displaystyle \begin{aligned} \frac{\partial \mathcal{L}}{\partial
    b} = \frac{\partial \mathcal{L}}{\partial \hat{y}} \cdot \frac{\partial \hat{y}}{\partial
    b} = -0.4 \cdot 1 = -0.4 \end{aligned}$$
- en: 3.2.11 Parameter Update (Using SGD, $$$ \eta = 0.1$$$)
  id: totrans-110
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2.11 参数更新（使用SGD，$$$\eta = 0.1$$$）
- en: $$$\displaystyle \begin{aligned} w_{\text{new}} = w - \eta \cdot \frac{\partial
    \mathcal{L}}{\partial w} = 0.5 - 0.1 \cdot (-0.8) = 0.5 + 0.08 = 0.58 \end{aligned}$$$
    $$$\displaystyle \begin{aligned} b_{\text{new}} = b - \eta \cdot \frac{\partial
    \mathcal{L}}{\partial b} = 0.1 - 0.1 \cdot (-0.4) = 0.1 + 0.04 = 0.14 \end{aligned}$$$
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: $$\displaystyle \begin{aligned} w_{\text{new}} = w - \eta \cdot \frac{\partial
    \mathcal{L}}{\partial w} = 0.5 - 0.1 \cdot (-0.8) = 0.5 + 0.08 = 0.58 \end{aligned}$$
    $$\displaystyle \begin{aligned} b_{\text{new}} = b - \eta \cdot \frac{\partial
    \mathcal{L}}{\partial b} = 0.1 - 0.1 \cdot (-0.4) = 0.1 + 0.04 = 0.14 \end{aligned}$$
- en: 3.3 Fine-Tuning in Computer Vision
  id: totrans-112
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3.3 计算机视觉中的微调
- en: In computer vision (CV), transferring knowledge refers to utilizing models pretrained
    on large-scale, labeled datasets—such as ImageNet—for new tasks with much smaller
    datasets. This approach is efficient in image classification, where labeling data
    is relatively inexpensive and abundant. The central idea is that the representations
    and features learned by deep models on large datasets can generalize well to other
    related tasks. Once a model has learned to detect fundamental patterns like edges,
    textures, and shapes, these features can be reused (transferred) for other vision
    problems, such as object detection, segmentation, or specialized classification
    tasks—often with datasets that are 10–100 times smaller than the original training
    set. This process dramatically reduces data and computational requirements for
    training high-performing models in custom applications. Fine-tuning or feature
    extraction techniques are commonly used to adapt these pretrained models to the
    specific characteristics of the new task or domain.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 在计算机视觉（CV）中，知识迁移是指利用在大规模、标记数据集（如ImageNet）上预训练的模型，用于具有小得多数据集的新任务。这种方法在图像分类中效率很高，因为标记数据相对便宜且丰富。核心思想是，在大数据集上通过深度模型学习到的表示和特征可以很好地泛化到其他相关任务。一旦模型学会了检测基本模式，如边缘、纹理和形状，这些特征就可以被重用（迁移）用于其他视觉问题，如目标检测、分割或专门的分类任务——通常数据集比原始训练集小10-100倍。这个过程显著降低了在定制应用中训练高性能模型所需的数据和计算需求。微调或特征提取技术通常用于适应这些预训练模型以适应新任务或领域的特定特征。
- en: 3.4 GPU Acceleration in Deep Network Tuning
  id: totrans-114
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3.4 深度网络调优中的GPU加速
- en: Deep neural network tuning, especially for large-scale models such as CNNs,
    RNNs, and Transformers, requires intensive matrix operations, gradient propagation,
    and iterative optimization. These computations are highly parallelizable, making
    GPUs (graphics processing units) essential for accelerating training and fine-tuning
    processes. With thousands of parallel cores, GPUs are well-suited to execute large-scale
    tensor operations efficiently.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 深度神经网络调优，特别是对于像CNN、RNN和Transformer这样的大规模模型，需要密集的矩阵运算、梯度传播和迭代优化。这些计算高度可并行化，使得GPU（图形处理单元）对于加速训练和微调过程至关重要。具有数千个并行核心的GPU非常适合高效执行大规模张量运算。
- en: For example, fine-tuning a pretrained ResNet-50 model for high-resolution medical
    image classification can be prohibitively time-consuming on CPUs. High-performance
    GPUs like the NVIDIA A100 or RTX 4090 significantly reduce training time per epoch,
    enabling faster experimentation and model convergence.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在CPU上对预训练的ResNet-50模型进行微调以进行高分辨率医学图像分类可能会非常耗时。高性能的GPU，如NVIDIA A100或RTX 4090，可以显著减少每个epoch的训练时间，从而实现更快的实验和模型收敛。
- en: GPU acceleration is achieved by offloading computationally demanding operations—such
    as forward propagation, backpropagation, and weight updates—to specialized hardware.
    Deep learning frameworks like PyTorch and TensorFlow abstract this functionality
    via CUDA and cuDNN, which handle memory allocation, kernel execution, and device-level
    optimization. Advanced techniques such as mixed-precision training and batch parallelism
    further improve efficiency by reducing memory consumption and increasing throughput.
    Together, these optimizations enable scalable and effective tuning of deep learning
    models across diverse domains.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将计算密集型操作（如前向传播、反向传播和权重更新）卸载到专用硬件来实现GPU加速。深度学习框架如PyTorch和TensorFlow通过CUDA和cuDNN抽象化此功能，它们处理内存分配、内核执行和设备级优化。混合精度训练和批量并行等高级技术通过减少内存消耗和提高吞吐量进一步提高了效率。这些优化共同使得能够跨不同领域可扩展和有效地调整深度学习模型。
- en: 3.5 GPU-Accelerated Vector Search Indexing Methods
  id: totrans-118
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3.5 GPU加速的向量搜索索引方法
- en: With the growth of large-scale embedding models and vector databases, approximate
    nearest neighbor (ANN) search has become a key computational component. GPU-accelerated
    indexing methods offer a powerful alternative to traditional CPU-bound solutions
    by drastically improving index build times and query throughput. The RAPIDS cuVS
    library supports several GPU-optimized index types, including IVF-Flat, IVF-PQ,
    and CAGRA, each providing trade-offs between accuracy, performance, and memory
    usage.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 随着大规模嵌入模型和向量数据库的增长，近似最近邻（ANN）搜索已成为关键的计算组件。GPU加速的索引方法通过显著提高索引构建时间和查询吞吐量，为传统的CPU密集型解决方案提供了一种强大的替代方案。RAPIDS
    cuVS库支持多种GPU优化的索引类型，包括IVF-Flat、IVF-PQ和CAGRA，每种都提供了在准确性、性能和内存使用之间的权衡。
- en: 3.5.1 IVF-Flat
  id: totrans-120
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.5.1 IVF-Flat
- en: IVF-Flat (Inverted File with Flat Quantization) partitions the embedding space
    into $$$n_{\text{lists}}$$$ clusters using k-means and stores exact vectors in
    GPU memory. During the search, $$$n_{\text{probes}}$$$ closest clusters are queried,
    and precise distances are computed within these partitions, ensuring high recall
    when sufficient probes are used.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: IVF-Flat（逆文件与平面量化）使用k-means将嵌入空间划分为`n_lists`个聚类，并在GPU内存中存储精确向量。在搜索过程中，查询最近的`n_probes`个聚类，并在这些分区内部计算精确距离，确保在足够探针的情况下具有高召回率。
- en: '**Indexing parameters:**'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**索引参数：**'
- en: '`n_lists`—number of clusters (index granularity)'
  id: totrans-123
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`n_lists`—聚类数量（索引粒度）'
- en: '`n_probes`—number of clusters searched per query'
  id: totrans-124
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`n_probes`—每次查询搜索的聚类数量'
- en: '**Strengths:** High recall, fast GPU-based distance computation, suitable when
    the index fits in GPU memory'
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优势：** 高召回率，快速基于GPU的距离计算，当索引适合GPU内存时适用'
- en: 3.5.2 IVF-PQ
  id: totrans-126
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.5.2 IVF-PQ
- en: 'IVF-PQ (Inverted File with Product Quantization) extends IVF-Flat with lossy
    compression using vector quantization. This allows large-scale datasets to be
    indexed on GPUs by reducing memory footprint through parameters:'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: IVF-PQ（逆文件与产品量化）通过使用向量量化进行有损压缩扩展了IVF-Flat。这允许通过参数减少内存占用，在GPU上对大规模数据集进行索引：
- en: '`pq_dim`: Reduced vector dimensionality'
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`pq_dim`: 降维后的向量维度'
- en: '`pq_bits`: Number of bits per dimension (typically 4–8)'
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`pq_bits`：每维度的位数（通常为4-8）'
- en: Compressed storage and approximate distance computation make IVF-PQ the most
    memory-efficient cuVS index. Further accuracy can be achieved through refinement,
    where a larger candidate set is retrieved and reranked using original vectors
    stored on host memory.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 压缩存储和近似距离计算使IVF-PQ成为最内存高效的cuVS索引。通过细化可以进一步提高准确性，其中检索更大的候选集并使用存储在主机内存中的原始向量重新排序。
- en: 3.5.3 CAGRA
  id: totrans-131
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.5.3 CAGRA
- en: CAGRA (CUDA Accelerated Graph Retrieval Algorithm) represents a state-of-the-art
    GPU-native graph-based ANN method. It constructs a fixed-degree k-NN graph optimized
    for single-query or small-batch performance. Unlike hierarchical methods like
    HNSW, CAGRA maps graph substructures to GPU thread blocks to ensure parallelism.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: CAGRA（CUDA加速图检索算法）代表了一种最先进的基于GPU的图结构近似最近邻（ANN）方法。它构建了一个固定度k-NN图，优化了单次查询或小批量性能。与HNSW等分层方法不同，CAGRA将图子结构映射到GPU线程块，以确保并行性。
- en: '`graph_degree`: Degree of each node in the search graph'
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`graph_degree`：搜索图中每个节点的度'
- en: '`intermediate_graph_degree`: Controls initial k-NN graph quality'
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`intermediate_graph_degree`：控制初始k-NN图的质量'
- en: '`itopk_size`, `search_width`, `iterations`: Search-time parameters to trade
    speed vs. recall'
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`itopk_size`、`search_width`、`iterations`：搜索时权衡速度与召回率的参数'
- en: CAGRA enables low-latency ANN search with consistent GPU utilization, making
    it well-suited for applications with real-time or interactive requirements.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: CAGRA 通过一致的 GPU 利用实现了低延迟的 ANN 搜索，非常适合具有实时或交互性要求的场景。
- en: Each vector search indexing technique presents unique strengths and trade-offs,
    depending on the application requirements. This chapter has discussed the operational
    principles of major GPU-accelerated algorithms—such as IVF-Flat, IVF-PQ, and CAGRA—along
    with key tunable parameters that influence storage efficiency, index construction
    time, recall, and query performance. Across all use cases, the utilization of
    GPUs significantly enhances both indexing speed and search throughput.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 每种向量搜索索引技术根据应用需求具有独特的优势和权衡。本章讨论了主要 GPU 加速算法的操作原理，例如 IVF-Flat、IVF-PQ 和 CAGRA，以及影响存储效率、索引构建时间、召回率和查询性能的关键可调参数。在所有用例中，GPU
    的利用显著提高了索引速度和搜索吞吐量。
- en: The RAPIDS cuVS library, developed by NVIDIA, is open source and accessible
    on GitHub. It provides comprehensive documentation, reproducible benchmarks, and
    example workflows to facilitate rapid adoption. cuVS can also be seamlessly integrated
    with popular vector search platforms like FAISS and Milvus, enabling flexible
    deployment in real-world systems. For continued updates and community support,
    refer to the RAPIDS AI channels and documentation resources.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: NVIDIA 开发的 RAPIDS cuVS 库是开源的，可在 GitHub 上访问。它提供了全面的文档、可复现的基准测试和示例工作流程，以促进快速采用。cuVS
    还可以无缝集成到流行的向量搜索平台如 FAISS 和 Milvus，使实际系统中的灵活部署成为可能。有关持续更新和社区支持，请参阅 RAPIDS AI 频道和文档资源。
- en: 3.5.4 GPU Architecture for Deep Network Tuning
  id: totrans-139
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.5.4 深度网络调优的 GPU 架构
- en: Fine-tuning deep neural networks involves computationally intensive operations
    such as forward propagation, backpropagation, and gradient descent, which are
    highly parallelizable. GPUs are architected with thousands of smaller cores organized
    into streaming multiprocessors (SMs), enabling simultaneous execution of matrix
    operations and tensor computations across large batches of data. This parallelism
    significantly reduces training time and improves throughput during fine-tuning.
    Additionally, GPUs support mixed-precision training through dedicated tensor cores,
    accelerating matrix multiplications while conserving memory and computing resources.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 微调深度神经网络涉及计算密集型操作，如前向传播、反向传播和梯度下降，这些操作高度可并行化。GPU 采用成千上万的较小核心组织成流式多处理器（SM），能够在大量数据批次上同时执行矩阵运算和张量计算。这种并行性显著减少了训练时间并提高了微调期间的吞吐量。此外，GPU
    通过专门的张量核心支持混合精度训练，加速矩阵乘法同时节省内存和计算资源。
- en: Architecturally, GPUs feature high-bandwidth memory (HBM), shared memory blocks,
    and L2 caches to support rapid data access and storage of model parameters. Fine-tuning
    pipelines benefit from optimized software stacks such as CUDA, cuDNN, and deep
    learning frameworks like PyTorch and TensorFlow, which abstract low-level operations
    for seamless GPU utilization. These frameworks enable efficient memory management,
    automatic kernel scheduling, and parallel optimization strategies. As a result,
    the GPU architecture is an enabler for scalable and efficient tuning and a critical
    foundation for deploying large-scale models in real-world, time-sensitive applications.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 在架构上，GPU 特有高带宽内存（HBM）、共享内存块和 L2 缓存，以支持快速的数据访问和模型参数的存储。微调流水线得益于优化的软件堆栈，如 CUDA、cuDNN
    以及深度学习框架如 PyTorch 和 TensorFlow，这些框架抽象了底层操作，以实现无缝的 GPU 利用。这些框架使得高效的内存管理、自动内核调度和并行优化策略成为可能。因此，GPU
    架构是实现可扩展和高效调优的推动力，也是在大规模实际应用中部署时间敏感型模型的关键基础。
- en: 3.6 GPU Benefits in Fine-Tuning
  id: totrans-142
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3.6 微调中的 GPU 优势
- en: 'Fine-tuning pretrained models on GPUs offers several practical and technical
    benefits that significantly enhance model development workflows:'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 在 GPU 上微调预训练模型提供了多个实际和技术的优势，这些优势显著增强了模型开发工作流程：
- en: '**Faster Training Time:** GPUs can process thousands of operations in parallel,
    dramatically reducing the time required for backpropagation and gradient updates.
    This is particularly beneficial for large-scale models with millions or billions
    of parameters.'
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**更快的训练时间：** GPU 可以并行处理数千个操作，显著减少了反向传播和梯度更新的时间。这对于具有数百万或数十亿参数的大规模模型尤其有益。'
- en: '**Support for Large Batch Sizes:** Due to their high memory bandwidth and capacity,
    GPUs allow larger batch sizes, which can improve training stability and convergence
    speed.'
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**支持大批量大小：** 由于其高内存带宽和容量，GPU 允许使用更大的批量大小，这可以提高训练稳定性和收敛速度。'
- en: '**Efficient Resource Utilization:** Fine-tuning typically uses smaller datasets
    than pretraining. GPUs allow rapid iteration over such datasets, enabling faster
    experimentation and hyperparameter tuning without the overhead of full retraining.'
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高效资源利用：** 微调通常使用的数据集比预训练小。GPU 允许快速迭代这些数据集，从而实现更快的实验和超参数调整，而无需进行完整重新训练的开销。'
- en: '**Optimized Framework Integration:** Deep learning frameworks such as PyTorch,
    TensorFlow, and JAX provide GPU-accelerated operations out-of-the-box. This includes
    automatic differentiation, memory management, and support for mixed-precision
    training to reduce memory usage.'
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优化框架集成：** 深度学习框架如 PyTorch、TensorFlow 和 JAX 提供了开箱即用的 GPU 加速操作。这包括自动微分、内存管理和对混合精度训练的支持，以减少内存使用。'
- en: '**Scalability:** GPU architectures support multi-GPU and distributed training
    setups, allowing scaling of fine-tuning workloads for even larger models or datasets
    when necessary.'
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可扩展性：** GPU 架构支持多 GPU 和分布式训练设置，当需要时，允许扩展微调工作负载以适应更大的模型或数据集。'
- en: '**Energy Efficiency:** While GPUs consume significant power, they are more
    energy-efficient than CPUs for parallel computations. This reduces overall energy
    costs per training cycle, especially when training needs to be repeated multiple
    times.'
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**能效：** 虽然 GPU 消耗大量电力，但它们在并行计算方面比 CPU 更节能。这降低了每次训练周期的整体能源成本，尤其是在需要多次重复训练时。'
- en: These benefits make GPUs essential tools for initial model training and fine-tuning
    tasks where speed, efficiency, and scalability are crucial. This is particularly
    important in practical deployments, such as adapting foundation models for specific
    domains like healthcare, finance, legal, or conversational AI.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 这些优势使 GPU 成为初始模型训练和微调任务中的必备工具，在这些任务中，速度、效率和可扩展性至关重要。这在实际部署中尤为重要，例如，为特定领域（如医疗保健、金融、法律或对话式
    AI）定制基础模型。
- en: GPU architecture enables the real-time, scalable fine-tuning of large neural
    networks by drastically reducing the time and energy needed for each training
    iteration.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: GPU 架构通过大幅减少每次训练迭代所需的时间和能量，实现了对大型神经网络的实时、可扩展的微调。
- en: 3.7 Summary
  id: totrans-152
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3.7 概述
- en: This chapter explores how GPUs enhance the performance of advanced deep learning
    architectures. It begins with transfer learning, explaining its mathematical model
    and how GPUs accelerate model adaptation. Fine-tuning pretrained models is discussed,
    highlighting GPU advantages in speed and efficiency. Applications in computer
    vision demonstrate real-world benefits of GPU-powered tuning. The chapter also
    covers GPU acceleration in deep network optimization and vector search indexing
    methods like IVF-Flat, IVF-PQ, and CAGRA. It explains how GPUs support generative
    models such as GANs, improving training stability and output quality. Transformer
    models are introduced with attention to GPU/TPU training strategies. Efficient
    variants like DistilBERT and Longformer are also discussed. Optimization techniques
    including batch size tuning, regularization, and mixed-precision training are
    presented. Overall, the chapter emphasizes GPU’s central role in scaling and refining
    deep learning systems.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 本章探讨了 GPU 如何提升高级深度学习架构的性能。它从迁移学习开始，解释了其数学模型以及 GPU 如何加速模型适应。讨论了微调预训练模型，突出了 GPU
    在速度和效率方面的优势。计算机视觉中的应用展示了 GPU 驱动的调优的实际益处。本章还涵盖了深度网络优化和向量搜索索引方法（如 IVF-Flat、IVF-PQ
    和 CAGRA）的 GPU 加速。它解释了 GPU 如何支持生成模型，如 GAN，提高训练稳定性和输出质量。介绍了 Transformer 模型，并关注了
    GPU/TPU 训练策略。还讨论了高效的变体，如 DistilBERT 和 Longformer。介绍了包括批量大小调整、正则化和混合精度训练在内的优化技术。总体而言，本章强调了
    GPU 在扩展和精炼深度学习系统中的核心作用。
- en: Exercise
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 练习
- en: Define the CUDA programming model and explain how it supports heterogeneous
    computing for deep learning applications.
  id: totrans-155
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义 CUDA 编程模型，并解释它如何支持深度学习应用的异构计算。
- en: Describe the SIMT (Single Instruction, Multiple Threads) architecture. How does
    it differ from traditional CPU execution models?
  id: totrans-156
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 描述 SIMT（单指令，多线程）架构。它与传统的 CPU 执行模型有何不同？
- en: Discuss the various types of memory in GPU architecture. How does understanding
    the memory hierarchy improve deep learning performance?
  id: totrans-157
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论GPU架构中的各种内存类型。理解内存层次结构如何提高深度学习性能？
- en: Explain the concept of tiled matrix multiplication and its role in optimizing
    deep learning operations on GPUs.
  id: totrans-158
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解释分块矩阵乘法的概念及其在优化GPU上深度学习操作中的作用。
- en: Illustrate the differences between thread-level and instruction-level optimizations.
    Provide examples of how each improves performance.
  id: totrans-159
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 阐述线程级和指令级优化的区别。提供每个如何提高性能的例子。
- en: What is asynchronous execution in the context of CUDA? How can overlapping computation
    and communication enhance GPU utilization?
  id: totrans-160
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在CUDA的上下文中，异步执行是什么？如何通过重叠计算和通信来提高GPU利用率？
- en: Describe the use of profiling tools like NVIDIA Nsight or nvprof. How do these
    tools help in identifying GPU performance bottlenecks?
  id: totrans-161
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 描述使用NVIDIA Nsight或nvprof等分析工具的使用。这些工具如何帮助识别GPU性能瓶颈？
- en: Discuss gradient checkpointing. Why is it important for training large models
    on memory-constrained GPUs?
  id: totrans-162
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论梯度检查点。为什么在内存受限的GPU上训练大型模型时它很重要？
- en: Explain the advantages of mixed-precision training. How do tensor cores support
    this approach in modern GPUs?
  id: totrans-163
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解释混合精度训练的优势。张量核心如何支持现代GPU中的这种方法？
- en: Evaluate the impact of optimizing matrix multiplication kernels in GPU programming.
    What are the best practices to achieve high throughput?
  id: totrans-164
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 评估优化GPU编程中矩阵乘法内核的影响。实现高吞吐量的最佳实践是什么？
