- en: 2. Where to Start Your Deep Learning
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Welcome to the exciting world of deep learning, AI, and computer vision.
  prefs: []
  type: TYPE_NORMAL
- en: With a high-level understanding of what deep learning is and its capabilities
    from the last chapter, you might be eager to learn building practical deep learning
    and computer vision systems.
  prefs: []
  type: TYPE_NORMAL
- en: But are you reluctant to switch to Linux for the development? Do you feel like
    you are more familiar with Windows, and wish that you could build everything on
    Windows?
  prefs: []
  type: TYPE_NORMAL
- en: Well, you do not need to worry anymore. The latest deep learning and computer
    vision libraries have matured to the point that almost everything now can be made
    to work seamlessly on Windows as well.
  prefs: []
  type: TYPE_NORMAL
- en: We will look at building deep learning systems on Windows step by step.
  prefs: []
  type: TYPE_NORMAL
- en: But first, let us answer a concern you might be having.
  prefs: []
  type: TYPE_NORMAL
- en: Can We Build Deep Learning Models on Windows?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you have been a developer for long, you might have noticed that Windows did
    not used to work well with cutting-edge development, especially open-source projects.
  prefs: []
  type: TYPE_NORMAL
- en: While deep learning and computer vision frameworks weren't necessarily limited
    to a particular OS, the ease of development on Linux or Unix-based systems and
    the pace of which the development happened meant that the latest features and
    options were either delayed or not available on Windows. And thus for a time,
    if you wanted to make any serious machine learning, AI, or computer vision models,
    it seemed like you would have to stick with Linux or a Unix-based system.
  prefs: []
  type: TYPE_NORMAL
- en: But fortunately, things have improved for Windows greatly in recent years.
  prefs: []
  type: TYPE_NORMAL
- en: Cutting-edge deep learning frameworks like TensorFlow and Keras, as well as
    computer vision libraries like OpenCV and Dlib, now have their newer versions
    working natively on Windows. Driver support and GPU acceleration also work seamlessly
    on Windows now.
  prefs: []
  type: TYPE_NORMAL
- en: In fact, in some cases, it is easier to get GPU acceleration such as NVIDIA
    CUDA support working with Windows than on Linux. Windows driver support for consumer
    graphics cards has been ahead for many years.
  prefs: []
  type: TYPE_NORMAL
- en: Advantages of Using Windows
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Windows is the most popular operating system in the world, with over 70% of
    desktop PCs using some version of it (see Figure [2-1](#Fig1)).^([1](#Fn1))
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_2_Chapter/502073_1_En_2_Fig1_HTML.png](../images/502073_1_En_2_Chapter/502073_1_En_2_Fig1_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-1
  prefs: []
  type: TYPE_NORMAL
- en: Windows usage on desktop PCs¹
  prefs: []
  type: TYPE_NORMAL
- en: In most cases, unless you are a dedicated DL/ML researcher, if you already have
    a decently powerful general-purpose PC—or are thinking of getting or building
    one—you tend to use Windows on it. Probably you are more familiar with using Windows
    as the OS of your home PC and are using other software on your PC that is only
    available on Windows.
  prefs: []
  type: TYPE_NORMAL
- en: So, if you are thinking of learning to build deep learning models, it is easier
    when you do not need to switch your OS to do so.
  prefs: []
  type: TYPE_NORMAL
- en: If you are planning to use GPU accelerations on your models—which we cover later
    in this chapter—then getting them working on Windows is much easier than other
    operating systems due to better driver support (although Linux GPU driver support
    is now improving).
  prefs: []
  type: TYPE_NORMAL
- en: And if you do have a good GPU in your PC, chances are that you want to use that
    for other things like gaming or productivity instread of dedicating it to deep
    learning. By sticking to Windows, you get the best of both worlds.
  prefs: []
  type: TYPE_NORMAL
- en: Limitations of Using Windows
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In addition to the advantages we discussed, there are some limitations in using
    Windows that you should be aware of.
  prefs: []
  type: TYPE_NORMAL
- en: While most of the frameworks and libraries for deep learning and computer vision
    are now available on Windows, you may find that the latest versions of them are
    typically delayed more than their Linux counterparts.
  prefs: []
  type: TYPE_NORMAL
- en: If you try to customize or build the libraries from source, you may find that
    the requirements to build them on Windows are a little bit strict. It is the main
    reason that the native packages tend to be delayed for Windows.
  prefs: []
  type: TYPE_NORMAL
- en: Because support for Windows was recent, you may also find that the community
    support for issues on Windows is also less than that for Linux. This will hopefully
    improve in the future, with more people starting deep learning development on
    Windows.
  prefs: []
  type: TYPE_NORMAL
- en: The bottom line is that you do not have to switch from Windows to an OS like
    Linux in order to learn deep learning if you don't want to. In this book, we will
    see how to get everything needed to build deep learning systems that work on Windows.
  prefs: []
  type: TYPE_NORMAL
- en: Linux is a great OS for developers. If you feel like it, you should definitely
    check out developing on Linux. Serious researchers on deep learning and computer
    vision do tend to use Linux systems for their development due to the flexibilities
    it provides. But it is not a must for you to start learning.
  prefs: []
  type: TYPE_NORMAL
- en: You can start building practical deep learning systems right on Windows. And
    once you learn how, you can later switch to any OS for your development if you
    prefer.
  prefs: []
  type: TYPE_NORMAL
- en: So what do you need to start?
  prefs: []
  type: TYPE_NORMAL
- en: You need to select a programming language to write your code and select a couple
    of deep learning frameworks for that language, throw in a selection of utility
    libraries and tools to help you, and then just start coding.
  prefs: []
  type: TYPE_NORMAL
- en: Does that sound too overwhelming?
  prefs: []
  type: TYPE_NORMAL
- en: Let us look at these requirements one at a time.
  prefs: []
  type: TYPE_NORMAL
- en: 'Programming Language: Python'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You might wonder, why Python? Is it the only language for deep learning? Definitely
    not.
  prefs: []
  type: TYPE_NORMAL
- en: When you understand the concepts, you can use pretty much any language to implement
    deep learning. But some languages have already established tools, libraries, and
    frameworks for supporting machine learning and deep learning tasks. To avoid reinventing
    already existing elements, we chose a language that has a lot of such pre-existing
    support.
  prefs: []
  type: TYPE_NORMAL
- en: Is Python the best language for deep learning? That is a tricky question.
  prefs: []
  type: TYPE_NORMAL
- en: 'When we look for the most popular languages for machine learning, a couple
    of languages stand out: Python, R, C++, C, and MATLAB. Each of them has its advantages
    and disadvantages.'
  prefs: []
  type: TYPE_NORMAL
- en: We chose Python for several reasons that are especially important when you are
    just starting to learn deep learning.
  prefs: []
  type: TYPE_NORMAL
- en: For a beginner in deep learning—especially for someone with a programming background—writing
    code in Python would be more natural. You can use most of the familiar object-oriented
    and functional programming concepts. While performance may not be as good as C
    or C++, Python is still quite fast. Having the capability to run the code on multiple
    CPUs and GPUs helps a lot too. Another plus point is that most C and C++ libraries
    tend to have Python interfaces as well (e.g., OpenCV, Dlib, Caffe). Compared to
    R and MATLAB, the availability of deep learning and machine learning libraries
    are similar in Python. But considering the maturity of the libraries, Python libraries
    seem to be more bleeding edge. Most of the latest deep learning frameworks are
    currently being developed primarily targeting Python (e.g., TensorFlow).
  prefs: []
  type: TYPE_NORMAL
- en: One of the biggest advantages of using Python is its deployability. Say you
    build an awesome deep learning program, and you want to deploy it as a web service.
    With Python, it is fairly straightforward. With R, MATLAB, or C/C++, it will take
    quite a bit of effort.
  prefs: []
  type: TYPE_NORMAL
- en: Considering all these benefits, we are going to use Python for our deep learning
    experiments.
  prefs: []
  type: TYPE_NORMAL
- en: 'Package and Environment Management: Anaconda'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Anaconda is an open source platform of Python and R languages meant for machine
    learning, data science, large-scale data processing, and scientific computing.
    Anaconda contains optimized versions of Python for many platforms and architectures.
  prefs: []
  type: TYPE_NORMAL
- en: It is not only a Python distribution, but also a package, dependency, and environment
    manager for Python. Through its conda package manager, Anaconda allows easy creation
    of virtual isolated environments—with its Python binaries and packages—to experiment
    with. You can create multiple independent Python environments of multiple Python
    versions, and their own independent installed packages, based on your needs.
  prefs: []
  type: TYPE_NORMAL
- en: Anaconda also contains hundreds of prebuilt and tested packages for machine
    learning, scientific computing, and data processing that you can directly install
    through the conda package manager. It removes the hassle of finding, building,
    installing, and dependency managing of packages and libraries.
  prefs: []
  type: TYPE_NORMAL
- en: Python Utility Libraries for Deep Learning and Computer Vision
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'When working with Python and the deep learning frameworks (which we will be
    looking at in a bit), having the following set of utility libraries will make
    a lot of tasks easier:'
  prefs: []
  type: TYPE_NORMAL
- en: '**NumPy:** adds support to handle large multidimensional arrays in Python,
    along with a collection of high-level mathematical functions that can be applied
    across arrays.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**SciPy:** the scientific cousin of NumPy. SciPy adds support for mathematical
    optimization, linear algebra, integral and differential equations, interpolation,
    special functions, Fourier transforms, and signal processing to Python.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Pillow:** pillow is a fork of PIL (Python Image Library), which adds image
    processing capabilities to Python. It adds extensive file format support for images,
    with efficient internal representation mechanisms.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Scikit-Image:** adds a set of higher-level image processing capabilities
    to Python, such as edge detection, equalization, feature detection, and segmentation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**h5py:** adds the support of the HDF5 binary data format to Python. The HDF5
    format is used in many of the machine learning frameworks, as it allows easy storage
    and handling of large, terabyte-level data as if they were internal data arrays.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Matplotlib:** Matplotlib is a sophisticated 2D and 3D plotting and data visualization
    library for Python, allowing you to create publication-quality plots and figures
    on a variety of platforms.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: These are just a few of the utility libraries that we would need to get our
    code working. We will be needing more as we go along. But having these will help
    make things easier from the start.
  prefs: []
  type: TYPE_NORMAL
- en: With Anaconda, we also do not need to install them one by one. Anaconda has
    utility functions to quickly install these—and more—which we will investigate
    in the next chapter.
  prefs: []
  type: TYPE_NORMAL
- en: Deep Learning Frameworks
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: TensorFlow
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: TensorFlow is currently one of the most actively developed machine learning
    libraries in the world. At its core it is a symbolic math library, which specializes
    in applications such as neural networks.
  prefs: []
  type: TYPE_NORMAL
- en: TensorFlow is the second-generation machine learning library by the Google Brain
    Team, and has gained huge popularity in recent times due to its deep learning
    capabilities. First released in November 2015, as the successor to DistBelief
    (Google Brains first-generation machine learning library), TensorFlow initially
    only supported Python and C on Linux. Since then it has added support to C++,
    Java, Go, JavaScript, and experimental support for Swift. Third-party support
    is also available for C#, Haskell, Julia, MATLAB, R, Scala, Rust, OCaml, and Crystal.
    TensorFlow now works on Windows and Mac OS natively.
  prefs: []
  type: TYPE_NORMAL
- en: TensorFlow is capable of running on either CPU or GPU (with NVIDIA CUDA). It
    also runs on Google’s proprietary Tensor Processing Units (TPUs)—application-specific
    integrated circuit (ASIC) units built specifically for machine learning and tailored
    for TensorFlow. TensorFlow can also run on lower-end devices like mobile phones—on
    Android and iOS—and Raspberry Pi devices when running inference.
  prefs: []
  type: TYPE_NORMAL
- en: TensorFlow uses stateful data flow graphs for its numerical calculations, where
    the nodes of the graph represent mathematical operations, while the edges of the
    graph represent the data that flows through the nodes. The data is represented
    as multidimensional arrays (tensors), hence the name “TensorFlow.”
  prefs: []
  type: TYPE_NORMAL
- en: In February 2017, TensorFlow released version 1.0.
  prefs: []
  type: TYPE_NORMAL
- en: TensorFlow.js 1.0 was released in March 2018.
  prefs: []
  type: TYPE_NORMAL
- en: TensorFlow 2.0 was released in January 2019, version 2.1 in January 2020, and
    version 2.2 in May 2020.
  prefs: []
  type: TYPE_NORMAL
- en: The 2.x versions come with many new features and improvements, such as eager
    execution, multi-GPU support, tighter Keras integration, and new deployment options
    such as TensorFlow Serving (Figure [2-2](#Fig2)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_2_Chapter/502073_1_En_2_Fig2_HTML.jpg](../images/502073_1_En_2_Chapter/502073_1_En_2_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-2
  prefs: []
  type: TYPE_NORMAL
- en: The TensorFlow 2.0 Ecosystem^([2](#Fn2))
  prefs: []
  type: TYPE_NORMAL
- en: Keras
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Keras is a higher-level neural networks library for Python, which can run on
    top of TensorFlow, CNTK (Microsoft Cognitive Toolkit), or Theano, and has limited
    support for MXNet and Deeplearning4j. The focus on Keras is to allow fast experimentation
    and prototyping of code by being user-friendly, minimal, modular, and extensible.
    Keras gives you a more clean and structured code than when using the backend libraries
    directly.
  prefs: []
  type: TYPE_NORMAL
- en: Keras supports convolutional networks and recurrent networks, as well as combinations
    of the two, and can run on both CPU and GPU, based on the capabilities of the
    backend being used.
  prefs: []
  type: TYPE_NORMAL
- en: With the release of TensorFlow v1.0 in February 2017, the TensorFlow team added
    dedicated support to Keras in the TensorFlow library.
  prefs: []
  type: TYPE_NORMAL
- en: With TensorFlow 2.0, released in January 2019, the Keras library is fully integrated
    into the TensorFlow library and is available through the tf.keras interface. The
    multibackend Keras implementation is also maintained as a separate branch, but
    the main development now happens on tf.keras.
  prefs: []
  type: TYPE_NORMAL
- en: Other Frameworks
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Scikit-Learn
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Scikit-Learn (formerly scikits.learn) is a library for machine learning, data
    mining, and data analytics. It gives capabilities such as classification, regression,
    clustering, dimensionality reduction, model selection, and preprocessing (feature
    extraction and normalization). Scikit-Learn has one of the best collections of
    machine learning and utility algorithms for data processing.
  prefs: []
  type: TYPE_NORMAL
- en: Theano
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Theano is a machine learning and numerical computation library developed by
    the researchers at the University of Montreal. The idea behind Theano is to allow
    developers to write symbolic expressions, which it would then dynamically compile
    to run on various architectures. The dynamic C code generation feature of Theano
    allows programs to efficiently run and take advantage of different CPU or GPU
    architectures. Theano has tight integration with NumPy, which it uses to represent
    its multidimensional data structures.
  prefs: []
  type: TYPE_NORMAL
- en: Theano has been in active development since 2007 and is considered as a good
    alternative to TensorFlow, as both support similar features.
  prefs: []
  type: TYPE_NORMAL
- en: Computer Vision Libraries
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Why do we need computer vision libraries?
  prefs: []
  type: TYPE_NORMAL
- en: As we discussed in the previous chapter, when working with deep learning, you
    will run into many tasks requiring computer vision and image processing.
  prefs: []
  type: TYPE_NORMAL
- en: Having these libraries will make things easier.
  prefs: []
  type: TYPE_NORMAL
- en: OpenCV
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: OpenCV (open source computer vision) is the de facto standard library when it
    comes to computer vision. Aimed at real-time computer vision applications, OpenCV
    is loaded with vision and image processing algorithms. It also has some machine
    learning capabilities built in to aid with building computer vision applications.
  prefs: []
  type: TYPE_NORMAL
- en: Originally developed by Intel and initially released in June 2000, OpenCV has
    since been made open-source and is now released under the BSD license. The current
    versions of OpenCV is primarily written in C++, but still contains some legacy
    C components as well as C interfaces. OpenCV has interfaces for C, C++, Python,
    MATLAB, and Java. It can run on Windows, Linux, Mac OS, iOS, and Android.
  prefs: []
  type: TYPE_NORMAL
- en: As well as the computer vision aspect of it, OpenCV provides excellent image
    processing and manipulation options such as cropping, resizing, transforming,
    color channel manipulating, and many more options on a variety of image types.
    This makes it essential to many applications in which images are used, such as
    building deep learning computer vision models with frameworks such as TensorFlow.
    OpenCV is also able to process video streams from cameras as well as video files
    (Figure [2-3](#Fig3)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_2_Chapter/502073_1_En_2_Fig3_HTML.jpg](../images/502073_1_En_2_Chapter/502073_1_En_2_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-3
  prefs: []
  type: TYPE_NORMAL
- en: OpenCV processing a video file
  prefs: []
  type: TYPE_NORMAL
- en: 'Currently there are two major branches of OpenCV: v3.x and v4.x. The 4.x branch
    contains the latest development and is more optimized. However, the 3.x versions
    may be more cross-compatible with other libraries we are using.'
  prefs: []
  type: TYPE_NORMAL
- en: Dlib
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Dlib is a toolkit for C++ and Python containing machine learning algorithms
    and tools for creating complex software to solve real-world problems. Dlib provides
    algorithms for machine learning and deep learning, multiclass classification and
    clustering models, support vector machines, regression models, a large set of
    numerical algorithms for areas such as matrix manipulations and linear algebra,
    graphical model inference algorithms, and utility algorithms for computer vision
    and image processing. And due to C++ implementations backing most of these implementations,
    they are optimized to the point that can be used in some real-time applications
    as well.
  prefs: []
  type: TYPE_NORMAL
- en: If you’re interested in facial recognition models or facial emotion processing,
    then Dlib is a library you should try out, as Dlib has some of the most optimized
    out-of-the-box face detection and face landmark detection models available (Figure
    [2-4](#Fig4)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_2_Chapter/502073_1_En_2_Fig4_HTML.jpg](../images/502073_1_En_2_Chapter/502073_1_En_2_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-4
  prefs: []
  type: TYPE_NORMAL
- en: Dlib Face Landmark Detection in action
  prefs: []
  type: TYPE_NORMAL
- en: Dlib also has easy to use functions to train your own object detectors, shape
    predictors, and deep learning–based semantic segmentation of images.
  prefs: []
  type: TYPE_NORMAL
- en: Optimizers and Accelerators
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Building and training deep learning models are computationally complex tasks,
    usually taking a lot of processing power and time of a system. Optimizers and
    accelerators are libraries and tools which help to perform those steps faster.
    Most optimizers and accelerator tools work by giving your deep learning code direct
    access to the capabilities of the hardware of the system, allowing them to harness
    the full potentials of the hardware.
  prefs: []
  type: TYPE_NORMAL
- en: NVIDIA CUDA and cuDNN
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: CUDA is a parallel computing platform and programming model invented by NVIDIA.
    It enables dramatic increases in computing performance by harnessing the power
    of the GPU. cuDNN—CUDA Deep Neural Network library—is a GPU-accelerated library
    of primitives for deep neural networks. cuDNN provides highly tuned implementations
    for standard routines such as forward and backward convolution, pooling, normalization,
    and activation layers.
  prefs: []
  type: TYPE_NORMAL
- en: Using CUDA and cuDNN along with either Theano or TensorFlow can speed up your
    neural networks extensively (networks that took hours to train might take just
    minutes, but this would depend entirely on your model). The only requirement is
    that you need to have a CUDA supported NVIDIA GPU in your system.
  prefs: []
  type: TYPE_NORMAL
- en: OpenBLAS
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: OpenBLAS is an open-source implementation of the BLAS (basic linear algebra
    subprograms), containing optimizations for many specific processor types. Machine
    learning libraries such as Theano can speed up certain routines by utilizing BLAS
    libraries. You will see a noticeable speed difference when running your models
    with OpenBLAS on CPU. However, some libraries, such as TensorFlow, have their
    internal optimizers, and will not see any improvements with OpenBLAS.
  prefs: []
  type: TYPE_NORMAL
- en: What About Hardware?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The next question that might strike you is: What kind of hardware do I need
    to do deep learning experiments?'
  prefs: []
  type: TYPE_NORMAL
- en: 'It is a tricky question, as we need to think about the two phases of a deep
    learning system: *training* and *inference*.'
  prefs: []
  type: TYPE_NORMAL
- en: To build a deep learning system—or any machine learning system—we first gather
    some data to train the system on. We then build a deep learning model and run
    it through the training dataset. This is where our model “learns” the characteristics
    of the data. Once the system runs through the training dataset, we typically do
    some validation steps to make sure it has been trained properly. These steps are
    called the *training phase* of the system.
  prefs: []
  type: TYPE_NORMAL
- en: Once the system completes the training phase, it is ready to be put to real
    use. This is where the system is presented with new, real-world data and utilizes
    what it has learned. The system will use what it has learned, to infer things
    about the new data it is being presented. This is called the *inference phase*
    of the system.
  prefs: []
  type: TYPE_NORMAL
- en: So how does this relate to our question about hardware?
  prefs: []
  type: TYPE_NORMAL
- en: The training phase is the most resource-intensive of the two. It requires high
    computation power (either CPU or GPU) to run the training through a deep learning
    model, and large amounts of memory to hold the data needed for the training. So
    for training deep learning models, you will need a machine with sufficient computing
    power and memory. The more power you have, the faster and the more complex the
    models you can train. Having GPU-computing capable graphics card (such as a one
    with an NVIDIA CUDA enabled GPU) would be a plus here.
  prefs: []
  type: TYPE_NORMAL
- en: But remember, even a moderate PC is capable of training sufficiently large deep
    learning models. There are techniques you can use to handle large data sets with
    limited memory. So do not let your PCs specs discourage you from experimenting.
    All the code we discuss in this book can run on a standard PC or laptop.
  prefs: []
  type: TYPE_NORMAL
- en: If you feel that your local computing power is not sufficient for your experiments,
    you can easily use cloud computing services to train your deep learning models.
    Amazon Web Services provides their P3 GPU Compute instances, which are backed
    by NVIDIA Tesla GPUs (see AWS P3 Instances^([3](#Fn3))), which should be able
    to handle massive deep learning models, or Google Colab Notebooks (see Google
    Colaboratory^([4](#Fn4))).
  prefs: []
  type: TYPE_NORMAL
- en: What about the inference phase?
  prefs: []
  type: TYPE_NORMAL
- en: A properly optimized deep learning model would be able to run inference on a
    limited resource device such as a Raspberry Pi device or a smartphone. This typically
    depends on the size of the final trained model. There are deep learning architectures—such
    as MobileNet and SqueezeNet, which are specifically designed to be fast and smaller
    in size, so they can fit into mobile devices.
  prefs: []
  type: TYPE_NORMAL
- en: Recommended PC Hardware Configurations
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you are thinking of building (or upgrading) or buying a PC that you plan
    to use for deep learning, machine learning, or computer vision tasks, here are
    some recommendations for the hardware.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: Please note that these are only recommendations. The libraries and frameworks
    mentioned in this book can be set up and will work on a variety of hardware configurations.
  prefs: []
  type: TYPE_NORMAL
- en: As mentioned earlier, the main requirements for a machine aimed at deep learning
    and computer vision are processing power and memory. Processing power dictates
    how fast the required calculations can be performed and is determined by how fast
    your CPU and GPU are. The number of processor cores your CPU has will also have
    an impact on the speed as it dictates how parallel the operations can be. Memory
    dictates how complex your models can be (as they need to be loaded into the memory)
    as well as how much of the training data can be loaded into the memory at a time,
    indirectly affecting the training speed. The complexity of the models you will
    be able to train will be determined by both the amount of RAM the machine has
    and the amount of VRAM the GPU has.
  prefs: []
  type: TYPE_NORMAL
- en: Therefore, the ideal deep learning PC would consist of a faster, powerful CPU
    with a high core count, with large amounts of RAM, and a faster GPU with higher
    VRAM.
  prefs: []
  type: TYPE_NORMAL
- en: But unless you have an unlimited amount of money to spend on the absolute highest-end
    PC, you would have to balance out these requirements. So let us see what we should
    practically look in to.
  prefs: []
  type: TYPE_NORMAL
- en: For the CPU, balance out the power and affordability. Something like an Intel
    Core-i5 or an AMD Ryzen 5 would be sufficient as a minimum. A Core-i7 or higher
    (eighth-generation or higher) for Intel,^([5](#Fn5)) or Ryzen 7 or higher (second-generation
    or higher) for AMD,^([6](#Fn6)) would be a better choice if you can go for it.
    Consider the core count as well as the single-core performance when selecting.
    An overclockable processor (i.e., multiplier unlocked processor, such as the Intel
    K series) is only recommended if you are experienced with overclocking, as we
    prefer stability over raw speed for deep learning workloads. You can usually save
    several hundred dollars by going for a non-overclockable processor.
  prefs: []
  type: TYPE_NORMAL
- en: Pair up the processor with a decent motherboard. You will not need a fancy gaming-featured
    motherboard. But look for a one with good power distribution, with a higher number
    of VRMs (voltage regulator modules). In deep learning workflows, both the CPU
    and GPU would be running at their max, so better power delivery will keep them
    stable. Also, look for the expandability of the motherboard as well. Having more
    RAM slots would allow you to add more RAM later, while more PCIe 16x slots will
    allow you to go for a multi-GPU option later. However, these are optional features
    if you are just starting.
  prefs: []
  type: TYPE_NORMAL
- en: Go for the highest amount of RAM you can afford. It is recommended to have 16GB
    of RAM at a minimum. Also, be aware of the recommended speed of the RAM that your
    processor and motherboard support. Higher speed RAM with XMP profiles may introduce
    instabilities if you are unfamiliar with how they work.
  prefs: []
  type: TYPE_NORMAL
- en: As mentioned with the motherboard, stable power is essential to the stability
    of the system. Some deep learning training tasks can take hours, if not days.
    Therefore, a stable power supply is a must. When selecting a power supply look
    for a one with an energy efficiency rating of “80+ Gold” or better. Based on the
    processor and the graphics card you select, typically a 500W power supply may
    suffice. But you may go for a higher one if, for example, you plan to go for multiple
    GPUs later.
  prefs: []
  type: TYPE_NORMAL
- en: Selecting a GPU can be a bit tricky, as they are usually the most expensive
    component of a PC build. Since most deep learning and machine learning frameworks
    and libraries use NVIDIA CUDA for GPU processing, we would need to select an NVIDIA
    graphics card.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: While AMD has some excellent graphics card models, their compatibility and support
    with ML tasks are still experimental. So we will need to stick to NVIDIA here.
  prefs: []
  type: TYPE_NORMAL
- en: 'When considering a graphics card for deep learning, machine learning, or computer
    vision tasks, few things needs to be considered:'
  prefs: []
  type: TYPE_NORMAL
- en: '**CUDA core count:** The higher the core count, the better it can parallelize
    the processing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Memory:** Higher memory allows you to fit more training data at a time for
    processing. (If your dataset is bigger than the available GPU memory, you will
    have to chunk it and perform incremental learning.)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Clock speed:** The higher the clock speed, usually the better (if you’re
    just starting, don’t think too much about numbers such as “base clock” and “boost
    clock,” as several other factors are affecting the speed of the card).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Other features:** Having additional features such as Tensor Cores found in
    GPUs with NVIDIA Turing microarchitecture (GeForce RTX 20 series or newer), might
    help increase the training speed of your models. But you may need to tune your
    models to utilize these features.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Based on these factors, the following graphics cards families can be recommended:'
  prefs: []
  type: TYPE_NORMAL
- en: '**GeForce 10 series:** An older generation, but still fairly good performance.
    You may also be able to find these very cheaply in the used market if you are
    comfortable getting a used GPU. Recommended cards: GTX 1070Ti or better (1070Ti,
    1080, 1080Ti).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**GeForce 16 series:** The same Turing architecture as the 20 series, but without
    the Tensor Cores and RT Cores (Ray-Tracing). Recommended cards: GTX 1660 or better
    (1660, 1660Ti).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**GeForce 20 series:** The latest generation of NVIDIA GeForce (at the time
    of this writing). Turing architecture with Tensor Cores and RT Cores. Recommended
    cards: RTX 2060 Super or better (2060 Super, 2070 Super, 2080 Super, 2080Ti, Titan
    RTX).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**GeForce 30 series:** It is still too early to say anything about the deep
    learning performance of the next generation of NVIDIA GeForce. But with the new
    Ampere microarchitecture, it is expected to outperform the previous generations.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: NVIDIA graphics cards are sold either directly through NVIDIA—the “Founders
    Edition” cards—or through NVIDIA partners such as ASUS, MSI, EVGA, Gigabyte, and
    many more. When selecting a graphics card, it is better to select one from a well-known
    brand, as those tend to have better build quality, better and stable power delivery,
    and better cooling. Deep learning tasks will stress your GPU and sustain the stress
    more than any game or application.
  prefs: []
  type: TYPE_NORMAL
- en: In addition to this, faster storage such as an SSD would also help to speed
    up your system.
  prefs: []
  type: TYPE_NORMAL
- en: What we discussed here are only recommendations; it is possible to build deep
    learning models with much older or slower hardware than this. Therefore, do not
    be discouraged if your current machine does not meet these recommendations. As
    mentioned in the previous section, optimizing your models plays a larger role
    than the speed of the hardware you train on. So start learning, and start building.
  prefs: []
  type: TYPE_NORMAL
