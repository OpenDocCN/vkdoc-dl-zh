- en: 'Exercise 10.3: Utilizing a **cognitive architecture** as described and shown
    in this chapter, design, develop, and program your assigned hardware (robot) with
    software to perform a mission assigned by your instructor utilizing intelligence
    (AI).'
  prefs: []
  type: TYPE_NORMAL
- en: Task
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'There are four categories: Time, Subject of Action, Movement, and Dependency.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Time:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Fixed time. Ex.: Collect as many items in 20 minutes.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Minimum time. Ex.: Visit all buildings in area as fast as possible (minimize
    the time).'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Unlimited time. Ex.: Patrol the buildings in the area.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Synchronization required. Ex.: Push two or more buttons at same time.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Subject of Action: This has two categories: object-based and robot-based.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Movement. Going-to or going-while, coverage or convergence.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Dependency: Independent, dependent, and interdependent.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
