- en: An autoencoder is split into an encoder and a decoder. The encoder encodes examples
    into smaller denser representations. The decoder takes these dense representations
    and tries to reconstruct the output back to the original input.
  prefs: []
  type: TYPE_NORMAL
- en: 'Create the encoder:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: The encoder accepts 28 × 28-pixel grayscale images, flattens them so that each
    image is represented as a vector of size 784, and processes the vectors through
    three Dense layers of diminishing sizes (128 units to 64 units to 32 units). The
    32-unit layer is the coding layer (central hidden layer). For each input image,
    the encoder outputs a vector of size 32.
  prefs: []
  type: TYPE_NORMAL
- en: 'Create the decoder:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: The decoder accepts codings of size 32 from the encoder and processes them through
    three Dense layers of increasing sizes (64 units to 128 units to 784 units). It
    then reshapes the final vectors into 28 × 28 arrays so the decoder’s outputs have
    the same shape as the encoder’s inputs.
  prefs: []
  type: TYPE_NORMAL
