- en: Basic Stacked Encoder Experiment
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基本堆叠编码器实验
- en: '*Stacked encoders* have multiple hidden layers. The architecture is typically
    symmetrical with regard to the central hidden layer, which is called the *coding
    layer*. We show you how to create and train a stacked encoder in this experiment.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '*堆叠编码器*具有多个隐藏层。该架构在中心隐藏层方面通常是对称的，该层被称为 *编码层*。在这个实验中，我们将向您展示如何创建和训练堆叠编码器。'
- en: Load Data
  id: totrans-28
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 加载数据
- en: 'Load Fashion-MNIST as NumPy arrays:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 将 Fashion-MNIST 加载为 NumPy 数组：
- en: '[PRE2]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Notice that we don’t load the class labels from Fashion-MNIST because autoencoders
    are unsupervised models! That is, they *don’t need labeled data to learn!*
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，我们没有从 Fashion-MNIST 加载类标签，因为自动编码器是无监督模型！也就是说，它们 *不需要标记数据来学习*！
- en: Scale Data
  id: totrans-32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 缩放数据
- en: 'Scale by dividing datasets by the number of pixels that represent an image:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将数据集除以表示图像的像素数进行缩放：
- en: '[PRE3]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Scaling data is recommended for deep learning experiments because it typically
    smooths optimization during training.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在深度学习实验中推荐对数据进行缩放，因为这通常可以平滑训练过程中的优化。
- en: Build the Stacked Encoder Model
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建堆叠编码器模型
- en: 'Clear and seed:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 清除和设置随机种子：
- en: '[PRE4]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'Get input shape:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 获取输入形状：
- en: '[PRE5]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'Import libraries:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 导入库：
- en: '[PRE6]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: An autoencoder is split into an encoder and a decoder. The encoder encodes examples
    into smaller denser representations. The decoder takes these dense representations
    and tries to reconstruct the output back to the original input.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 自动编码器分为编码器和解码器。编码器将示例编码为更小、更密集的表示。解码器接受这些密集表示，并尝试将输出重建回原始输入。
- en: 'Create the encoder:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 创建编码器：
- en: '[PRE7]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The encoder accepts 28 × 28-pixel grayscale images, flattens them so that each
    image is represented as a vector of size 784, and processes the vectors through
    three Dense layers of diminishing sizes (128 units to 64 units to 32 units). The
    32-unit layer is the coding layer (central hidden layer). For each input image,
    the encoder outputs a vector of size 32.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 编码器接受 28 × 28 像素的灰度图像，将它们展平，使每个图像都表示为一个大小为 784 的向量，并通过三个大小递减的 Dense 层（128 个单位到
    64 个单位到 32 个单位）进行处理。32 个单位的层是编码层（中心隐藏层）。对于每个输入图像，编码器输出一个大小为 32 的向量。
- en: 'Create the decoder:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 创建解码器：
- en: '[PRE8]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: The decoder accepts codings of size 32 from the encoder and processes them through
    three Dense layers of increasing sizes (64 units to 128 units to 784 units). It
    then reshapes the final vectors into 28 × 28 arrays so the decoder’s outputs have
    the same shape as the encoder’s inputs.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 解码器接受来自编码器的大小为 32 的编码，并通过三个大小递增的 Dense 层（64 个单位到 128 个单位到 784 个单位）进行处理。然后它将最终的向量重塑为
    28 × 28 数组，这样解码器的输出形状与编码器的输入相同。
- en: 'Create the stacked autoencoder:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 创建堆叠自动编码器：
- en: '[PRE9]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Compile and Train
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编译和训练
- en: 'Create a function for the accuracy metric:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个用于准确度指标的函数：
- en: '[PRE10]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Reconstruction is a binary problem. Either outputs match inputs or they do not
    match. Reconstruction loss penalizes a network for creating outputs different
    from inputs. So binary accuracy is ideal for this experiment.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 重建是一个二进制问题。输出要么与输入匹配，要么不匹配。重建损失会惩罚网络创建与输入不同的输出。因此，二进制准确度对于这个实验是理想的。
- en: 'Compile :'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 编译：
- en: '[PRE11]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'Train:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 训练：
- en: '[PRE12]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Visualize Performance
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可视化性能
- en: 'Import a plotting library:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 导入绘图库：
- en: '[PRE13]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Create a plotting function as shown in Listing [8-1](#PC15).
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个如图 [8-1](#PC15) 所示的绘图函数。
- en: '[PRE14]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'Visualize:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化：
- en: '[PRE15]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: Visualize the Reconstructions
  id: totrans-67
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可视化重建结果
- en: 'Create a function to plot a grayscale 28 × 28 image:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个用于绘制灰度 28 × 28 图像的函数：
- en: '[PRE16]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Create a function to visualize original images and reconstructions as shown
    in Listing [8-2](#PC18).
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数来可视化原始图像和重建结果，如图 [8-2](#PC18) 所示。
- en: '[PRE17]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: The function accepts the trained model, a set of *test* images, and a number
    that represents a batch of images. The function computes predictions for the batch
    of *test* images. It then squeezes out the *1* dimension from the predictions
    for visualization purposes. Keep in mind that our autoencoder model is trained
    on the training data (*x_train*) and reconstructions are based on the test data
    (*x_test*) from the Fashion-MNIST dataset. Also be aware that reconstructions
    are created *without any labeled data*.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 该函数接受训练好的模型、一组 *测试* 图像和一个表示图像批次的数字。该函数计算图像批次的 *测试* 图像的预测。然后它从预测中挤压出 *1* 维度以进行可视化。请注意，我们的自动编码器模型是在训练数据
    (*x_train*) 上训练的，重建是基于 Fashion-MNIST 数据集的测试数据 (*x_test*)。还请注意，重建是在 *没有任何标记数据*
    的情况下创建的。
- en: 'Check the dimensionality of test data:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 检查测试数据的维度：
- en: '[PRE18]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Shape is (10000, 28, 28, 1). So there are 10,000 28 × 28 × 1 images in the test
    dataset.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 形状为 (10000, 28, 28, 1)。因此测试数据集中有 10,000 个 28 × 28 × 1 的图像。
- en: 'To visualize with the imshow() function, remove dimensions of size “1” from
    the tensor:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使用imshow()函数进行可视化，从张量中移除尺寸为“1”的维度：
- en: '[PRE19]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: The shape is now TensorShape([10000, 28, 28]), which is what the imshow() function
    expects for images.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 现在的形状是TensorShape([10000, 28, 28])，这是imshow()函数期望的图像形状。
- en: 'Visualize:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化：
- en: '[PRE20]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: Reconstructed images are generated from test images based on predictions from
    the trained model. The autoencoder is able to learn how to decompose images into
    small bits of data. The small bits of data provide representations of the images.
    The autoencoder learns how to reconstruct original images from these representations.
    Of course, the reconstructions are not exactly the same as the originals because
    we use a simple stacked autoencoder.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 重建图像是根据训练模型的预测从测试图像生成的。自动编码器能够学习如何将图像分解成小块数据。这些小块数据提供了图像的表示。自动编码器学习如何从这些表示中重建原始图像。当然，重建的图像并不完全相同于原始图像，因为我们使用了一个简单的堆叠自动编码器。
- en: Breakdown
  id: totrans-82
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 分解
- en: Let’s break down the function in Listing [8-2](#PC18) to see how it works.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们分解[8-2](#PC18)中的函数，看看它是如何工作的。
- en: 'Grab the first image from the test set as a batch of one:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 从测试集中获取第一个图像作为单个批次的批次：
- en: '[PRE21]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: Since prediction method computations are done in batches, grab the first image
    as a batch of one.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 由于预测方法计算是在批量中完成的，因此获取第一个图像作为单个批次的批次。
- en: 'Make a prediction based on the first image batch:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 基于第一个图像批次进行预测：
- en: '[PRE22]'
  id: totrans-88
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: 'Drop the “1” dimension:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 删除“1”维度：
- en: '[PRE23]'
  id: totrans-90
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: 'Plot the reconstruction:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 绘制重建图：
- en: '[PRE24]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: 'Plot the actual image:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 绘制实际图像：
- en: '[PRE25]'
  id: totrans-94
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: Squeeze out the “1” dimension from the image to plot.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 从图像中挤压出“1”维度以进行绘图。
- en: Dimensionality Reduction
  id: totrans-96
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 降维
- en: Autoencoders are useful for dimensionality reduction. **Dimensionality reduction**
    is the process of reducing the number of random variables under consideration
    (or input features) in a deep learning experiment by obtaining a set of principal
    variables. Principal variables are the most important features in a dataset. Dimensionality
    reduction is commonly used in deep learning because large numbers of input features
    can cause poor performance for ML algorithms.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 自动编码器在降维方面很有用。**降维**是通过获得一组主变量来减少深度学习实验中考虑的随机变量数量（或输入特征）的过程。主变量是数据集中的最重要的特征。降维在深度学习中常用，因为大量的输入特征可能导致机器学习算法性能不佳。
- en: 'To perform dimensionality reduction, *we need labels*. So load labels from
    the test dataset:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 为了进行降维，*我们需要标签*。因此，从测试数据集中加载标签：
- en: '[PRE26]'
  id: totrans-99
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: 'Slice test labels from the test dataset:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 从测试数据集中切片测试标签：
- en: '[PRE27]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: Use the encoder to reduce dimensionality as shown in Listing [8-3](#PC29).
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 使用编码器按[8-3](#PC29)所示降低维度。
- en: '[PRE28]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: Use scikit-learn’s implementation of the t-SNE (t-distributed stochastic neighbor
    embedding) algorithm to reduce dimensionality to 2D for visualization. The algorithm
    reduces dimensionality to 32\. The *t-SNE* algorithm is a statistical method for
    visualizing high-dimensional data by giving each data point a location in a two-
    or three-dimensional map.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 使用scikit-learn实现的t-SNE（t-分布随机邻域嵌入）算法将维度降低到2D以进行可视化。该算法将维度降低到32。*t-SNE*算法是一种统计方法，通过在二维或三维地图中为每个数据点指定一个位置来可视化高维数据。
- en: 'Visualize:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化：
- en: '[PRE29]'
  id: totrans-106
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: Each class is represented by a different color.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 每个类别都由不同的颜色表示。
- en: Create a prettier visualization as shown in Listing [8-4](#PC31).
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个更美观的如图[8-4](#PC31)所示的可视化。
- en: '[PRE30]'
  id: totrans-109
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: With this visualization, we can see extracted class labels with the help of
    dimensionality reduction.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这种可视化，我们可以借助降维看到提取的类别标签。
- en: Tying Weights Experiment
  id: totrans-111
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 权重绑定实验
- en: When an autoencoder is neatly symmetrical, we can tie the weights of the decoder
    layers to the weights of the encoder layers. *Neatly symmetrical* means that the
    encoder and decoder have symmetrical layer construction. So we halve the number
    of weights in the model, which speeds training and reduces overfitting.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 当自动编码器结构对称时，我们可以将解码器层的权重与编码器层的权重绑定。*结构对称*意味着编码器和解码器具有对称的层结构。因此，我们模型中的权重数量减半，这加快了训练速度并减少了过拟合。
- en: An autoencoder with tied weights has decoder weights that are the transpose
    of the encoder weights, which is a form of parameter sharing. We reduce the number
    of parameters with parameter sharing.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 权重绑定的自动编码器的解码器权重是编码器权重的转置，这是一种参数共享的形式。我们通过参数共享减少了参数数量。
- en: Define a Custom Layer
  id: totrans-114
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 定义一个自定义层
- en: To tie the weights of the encoder and the decoder, use the transpose of the
    encoder’s weights as the decoder weights as shown in Listing [8-5](#PC32).
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 要绑定编码器和解码器的权重，使用编码器权重的转置作为解码器权重，如列表 [8-5](#PC32) 所示。
- en: '[PRE31]'
  id: totrans-116
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: The class accepts a layer from a model and an activation function (if included
    in a layer) and transposes the data. A lot of times we have to preprocess data
    fed into ML algorithms. The reason is that data may be stored as rows, but the
    ML algorithm expects input as columns or vice versa. So transposition is a very
    useful operation in ML activities.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 该类接受来自模型的层和一个激活函数（如果包含在层中）并转置数据。很多时候，我们必须预处理输入到机器学习算法中的数据。原因是数据可能以行存储，但机器学习算法期望输入为列或反之亦然。因此，转置在机器学习活动中是一个非常有用的操作。
- en: Build the Tied Weights Model
  id: totrans-118
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建绑定权重的模型：
- en: 'Clear and seed:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 清除和设置随机种子：
- en: '[PRE32]'
  id: totrans-120
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: 'For convenience, create three Dense layers for the model:'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 为了方便起见，为模型创建三个 Dense 层：
- en: '[PRE33]'
  id: totrans-122
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: We optionally create these variables to use in the encoder. Of course, you can
    include the layer syntax directly in the model if you wish.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以创建这些变量以在编码器中使用。当然，如果您愿意，可以直接在模型中包含层语法。
- en: 'Build the encoder:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 构建编码器：
- en: '[PRE34]'
  id: totrans-125
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: 'Build the decoder:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 构建解码器：
- en: '[PRE35]'
  id: totrans-127
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: Since the autoencoder is neatly symmetrical, we can map the DenseTranspose class
    onto the layers from the encoder. A DenseTranspose layer is similar to a Dense
    one, but the input matrix is stored in column-major order rather than row-major
    order, That is, it is the transpose of an ordinary Dense matrix.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 由于自动编码器是对称的，我们可以将 DenseTranspose 类映射到编码器的层。DenseTranspose 层类似于 Dense 层，但输入矩阵以列主序存储而不是行主序，也就是说，它是普通
    Dense 矩阵的转置。
- en: 'Build the tied weights autoencoder:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 构建绑定权重的自动编码器：
- en: '[PRE36]'
  id: totrans-130
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: Compile and Train
  id: totrans-131
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编译和训练：
- en: 'Compile :'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 编译：
- en: '[PRE37]'
  id: totrans-133
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: 'Train:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 训练：
- en: '[PRE38]'
  id: totrans-135
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: Visualize Training Performance
  id: totrans-136
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可视化训练性能：
- en: 'Visualize :'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化：
- en: '[PRE39]'
  id: totrans-138
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: Visualize Reconstructions
  id: totrans-139
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可视化重建结果：
- en: 'Show test image reconstructions based on predictions from the trained model:'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 根据训练模型的预测显示测试图像重建：
- en: '[PRE40]'
  id: totrans-141
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: Denoising Experiment
  id: totrans-142
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 去噪实验：
- en: An autoencoder can also be trained to remove noise from images. The idea is
    to add *random noise* to inputs and train to recover the original noise-free inputs.
    This sounds counterintuitive, but it works!
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 自动编码器也可以训练以从图像中去除噪声。想法是在输入中添加*随机噪声*并训练以恢复原始的无噪声输入。这听起来有些反直觉，但它确实有效！
- en: Noise inherent in images can create trouble because algorithms may believe that
    the noise is a pattern that should be learned. But adding random noise keeps the
    network from memorizing training samples because they are changing all of the
    time.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 图像中固有的噪声可能会造成麻烦，因为算法可能会认为噪声是应该学习的模式。但是添加随机噪声可以防止网络记住训练样本，因为它们总是在变化。
- en: Random noise allows us to test the robustness and performance of an algorithm
    in the presence of known amounts of noise. That is, we know what noise we are
    adding. By adding noise to input data, we get more data for which our deep neural
    network can train. But training on noisy data means that the model generalizes
    on noisy data.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 随机噪声使我们能够在已知噪声量的情况下测试算法的鲁棒性和性能。也就是说，我们知道我们添加了什么噪声。通过向输入数据添加噪声，我们得到了更多数据，我们的深度神经网络可以对其进行训练。但在噪声数据上训练意味着模型在噪声数据上泛化。
- en: Build the Denoising Model
  id: totrans-146
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建去噪模型：
- en: 'Clear and seed:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 清除和设置随机种子：
- en: '[PRE41]'
  id: totrans-148
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: 'Import the library for Gaussian noise:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 导入高斯噪声库：
- en: '[PRE42]'
  id: totrans-150
  prefs: []
  type: TYPE_PRE
  zh: '[PRE42]'
- en: The library enables us to apply additive zero-centered Gaussian noise. **Gaussian
    noise** (named after Carl Friedrich Gauss) is statistical noise with a probability
    density function equal to that of the normal distribution (also known as the Gaussian
    distribution). So the values of added noise are Gaussian-distributed (or normally
    distributed).
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 该库使我们能够应用加性零均值高斯噪声。**高斯噪声**（以卡尔·弗里德里希·高斯命名）是一种具有与正态分布（也称为高斯分布）相同的概率密度函数的统计噪声。因此，添加的噪声值是高斯分布的（或正态分布的）。
- en: We add Gaussian noise because it is the basic noise model used in information
    theory to mimic the effect of many random processes that occur naturally in nature.
    And Gaussian noise is normally distributed noise, so it fits many natural phenomena.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 我们添加高斯噪声，因为它是在信息理论中用于模拟自然界中自然发生的许多随机过程的基本噪声模型。高斯噪声是正态分布的噪声，因此它适合许多自然现象。
- en: 'Add pure Gaussian noise directly to the encoder:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 直接将高斯噪声添加到编码器中：
- en: '[PRE43]'
  id: totrans-154
  prefs: []
  type: TYPE_PRE
  zh: '[PRE43]'
- en: 'Build the decoder:'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 构建解码器：
- en: '[PRE44]'
  id: totrans-156
  prefs: []
  type: TYPE_PRE
  zh: '[PRE44]'
- en: For better performance, tie the weights of the decoder layers to the weights
    of the encoder layers.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 为了获得更好的性能，将解码器层的权重绑定到编码器层的权重。
- en: 'Build the denoising autoencoder:'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 构建去噪自动编码器：
- en: '[PRE45]'
  id: totrans-159
  prefs: []
  type: TYPE_PRE
  zh: '[PRE45]'
- en: Compile and Train
  id: totrans-160
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编译和训练：
- en: 'Compile :'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 编译：
- en: '[PRE46]'
  id: totrans-162
  prefs: []
  type: TYPE_PRE
  zh: '[PRE46]'
- en: 'Train:'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 训练：
- en: '[PRE47]'
  id: totrans-164
  prefs: []
  type: TYPE_PRE
  zh: '[PRE47]'
- en: Visualize Training Performance
  id: totrans-165
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可视化训练性能
- en: 'Visualize :'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化：
- en: '[PRE48]'
  id: totrans-167
  prefs: []
  type: TYPE_PRE
  zh: '[PRE48]'
- en: Visualize Reconstructions
  id: totrans-168
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可视化重建
- en: 'Add the same amount of Gaussian noise to test images:'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 向测试图像添加相同数量的高斯噪声：
- en: '[PRE49]'
  id: totrans-170
  prefs: []
  type: TYPE_PRE
  zh: '[PRE49]'
- en: Dropout Experiment
  id: totrans-171
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Dropout实验
- en: '**Dropout** is a regularization technique that helps prevent overfitting. Dropout
    randomly *turns off* some neurons during training to turn a neural network into
    an ensemble of neural networks. The idea is to approximate training a large number
    of neural networks with different architectures in parallel.'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: '**Dropout**是一种正则化技术，有助于防止过拟合。在训练过程中，Dropout随机*关闭*一些神经元，将神经网络转换为一个神经网络集合。这种想法是并行训练大量具有不同架构的神经网络。'
- en: The effect of Dropout makes the layer look like and be treated like a layer
    with a different number of nodes and connectivity to the prior layer. So each
    update to a layer during training is performed with a *different view* of the
    configured layer.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: Dropout的效果使得层看起来像，并且被当作具有不同节点数量和与前一层连接性的层来处理。因此，在训练过程中对层的每次更新都是使用配置层的一个*不同视角*来执行的。
- en: However, any amount of Dropout represents an information loss! By setting a
    layer to a Dropout probability of 0.5, we lose half of the information at that
    layer during each epoch (or training iteration)! Using Dropout is recommended
    in most cases, but not at every layer, and it should not be set above 0.5.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，任何数量的Dropout都代表了一种信息损失！通过将层设置为0.5的Dropout概率，我们在每个epoch（或训练迭代）中失去了该层一半的信息！在大多数情况下推荐使用Dropout，但不是在每个层，并且它不应设置在0.5以上。
- en: Dropout makes the training process noisy, which forces nodes within a layer
    to probabilistically take on more or less responsibility for the inputs. By dropping
    out a neuron, it is temporarily removed from the network along with all of its
    incoming and outgoing connections.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: Dropout使训练过程变得嘈杂，这迫使层内的节点以概率承担更多或更少的输入责任。通过丢弃神经元，它及其所有传入和传出连接暂时从网络中移除。
- en: Dropout is implemented per layer in a neural network. It can be used with most
    types of layers such as Dense fully connected layers, convolutional layers, and
    recurrent layers.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: Dropout在神经网络中的每一层都实现。它可以与大多数类型的层一起使用，例如全连接层、卷积层和循环层。
- en: Dropout may be implemented on any or all hidden layers. A hyperparameter specifies
    the probability that outputs of the layer are dropped out. A common value for
    hidden layers is a probability of 0.5, which seems to be close to optimal for
    a wide range of networks and tasks. For input layers, the optimal value must be
    closer to 0 than to 0.5.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: Dropout可以应用于任何或所有隐藏层。一个超参数指定了层输出被丢弃的概率。对于隐藏层，一个常见的值是0.5的概率，这似乎对于广泛的网络和任务来说接近最优。对于输入层，最优值必须更接近0而不是0.5。
- en: The experiment demonstrates how easy it is to build and train a Dropout autoencoder.
    The only change is to add a Dropout value in the encoder.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 该实验展示了构建和训练Dropout自动编码器是多么容易。唯一的变化是在编码器中添加一个Dropout值。
- en: Build the Dropout Model
  id: totrans-179
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建Dropout模型
- en: 'Clear and seed:'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 清除并设置随机种子：
- en: '[PRE50]'
  id: totrans-181
  prefs: []
  type: TYPE_PRE
  zh: '[PRE50]'
- en: 'Import the library for Dropout:'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 导入Dropout库：
- en: '[PRE51]'
  id: totrans-183
  prefs: []
  type: TYPE_PRE
  zh: '[PRE51]'
- en: 'Build the encoder with Dropout of 0.5:'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 使用0.5的Dropout构建编码器：
- en: '[PRE52]'
  id: totrans-185
  prefs: []
  type: TYPE_PRE
  zh: '[PRE52]'
- en: 'Build the decoder with tied weights for better performance:'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 使用绑定权重构建解码器以获得更好的性能：
- en: '[PRE53]'
  id: totrans-187
  prefs: []
  type: TYPE_PRE
  zh: '[PRE53]'
- en: 'Build the Dropout autoencoder:'
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 构建Dropout自动编码器：
