  id: totrans-189
  prefs: []
  type: TYPE_PRE
  zh: '[PRE54]'
- en: Compile and Train
  id: totrans-190
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编译和训练
- en: 'Compile :'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 编译：
- en: '[PRE55]'
  id: totrans-192
  prefs: []
  type: TYPE_PRE
  zh: '[PRE55]'
- en: 'Train:'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 训练：
- en: '[PRE56]'
  id: totrans-194
  prefs: []
  type: TYPE_PRE
  zh: '[PRE56]'
- en: Visualize Training Performance
  id: totrans-195
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可视化训练性能
- en: 'Visualize :'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化：
- en: '[PRE57]'
  id: totrans-197
  prefs: []
  type: TYPE_PRE
  zh: '[PRE57]'
- en: Visualize Reconstructions
  id: totrans-198
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可视化重建
- en: 'Add the same amount of Dropout noise to test images:'
