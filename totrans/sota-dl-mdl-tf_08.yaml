- en: 8. Stacked Autoencoders
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The first seven chapters focused on supervised learning algorithms. **Supervised
    learning** is a subcategory of ML that uses *labeled* datasets to train algorithms
    to classify data and predict outcomes accurately. The remaining chapters focus
    on unsupervised learning algorithms. **Unsupervised learning** uses ML algorithms
    to analyze and cluster *unlabeled* datasets. Such algorithms discover hidden patterns
    or data groupings *without the need for human intervention*.
  prefs: []
  type: TYPE_NORMAL
- en: '**Autoencoders** are artificial neural networks that learn dense representations
    of input data without any supervision. Learned dense representations are often
    called latent representations (or codings) . Codings are used to reconstruct the
    original output.'
  prefs: []
  type: TYPE_NORMAL
- en: Codings typically have much lower dimensionality than the input data, which
    makes autoencoders useful for dimensionality reduction. Autoencoders can also
    be used for feature extraction, unsupervised pre-training of deep neural networks,
    and generative models. As generative models, they can randomly generate new data
    that looks very similar to the training data.
  prefs: []
  type: TYPE_NORMAL
- en: It may seem counterintuitive to train autoencoders if they just produce the
    same output from input data. But we show how a trained autoencoder can reconstruct
    images from *new* data! We also show how they are effective dimensionality reduction
    mechanisms.
  prefs: []
  type: TYPE_NORMAL
- en: An autoencoder consists of an encoder component, a code component, and a decoder
    component. The encoder compresses the input and produces the code. The decoder
    then reconstructs the original input from the code.
  prefs: []
  type: TYPE_NORMAL
- en: 'Notebooks for chapters are located at the following URL:'
  prefs: []
  type: TYPE_NORMAL
- en: '[`https://github.com/paperd/deep-learning-models`](https://github.com/paperd/deep-learning-models)'
  prefs: []
  type: TYPE_NORMAL
- en: We present four stacked autoencoder experiments. We begin with a basic stacked
    encoder experiment. We continue with a tying weights experiment. We end with denoising
    and simple tuning experiments.
  prefs: []
  type: TYPE_NORMAL
- en: We start with a simple stacked encoder because it is the most basic type of
    autoencoder. Each subsequent experiment adds complexity demonstrated with tying
    weights, denoising, and tuning autoencoders.
  prefs: []
  type: TYPE_NORMAL
