  type: TYPE_NORMAL
- en: Display interpolated image vectors to deconstruct the image generation process.
  prefs: []
  type: TYPE_NORMAL
- en: 'Get the number of interpolated images in the latent space bounded by random
    vectors v1 and v2:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: We set interpolation steps to 100, so we have 100 interpolated images.
  prefs: []
  type: TYPE_NORMAL
- en: 'Display the initial interpolated image:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: 'Display the final interpolated image:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: So the animation begins with the initial image and morphs into the final image
    because interpolated vectors are along a line in the latent space bounded by random
    vectors v1 and v2.
  prefs: []
  type: TYPE_NORMAL
- en: Create a function to display generated image vectors from the latent space as
    shown in Listing [11-4](#PC24).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: 'Display interpolated images:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
- en: It’s fascinating to see how the model creates a series of images that morph
    from the initial to final one based on interpolated vectors from the latent space!
    So a learning model can create a series of vectors on a linear path between two
    points in the latent space as we demonstrated with our animation.
  prefs: []
  type: TYPE_NORMAL
- en: Display Multiple Images from a Single Vector
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Create a function to return a latent vector and image:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE25]'
  prefs: []
  type: TYPE_PRE
- en: The function returns a random normal latent vector and an image generated by
    progan-128 from the random latent vector. Each time the function is executed,
    images are different because each latent vector is generated from a random vector,
    fed into progan-128, and generated.
  prefs: []
  type: TYPE_NORMAL
- en: 'Display:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE26]'
  prefs: []
  type: TYPE_PRE
- en: For each loop cycle, a slice from each latent vector and its corresponding image
    are displayed. The two images are dissimilar and have no relationship because
    we create a latent vector close to a *random vector* for each loop cycle. But
    there is no path between the vectors because we didn’t create a series of latent
    vectors on a linear path bounded by two random vectors! We only interpolated a
    single vector from the latent space for each loop cycle.
  prefs: []
  type: TYPE_NORMAL
- en: Display several images as shown in Listing [11-5](#PC28).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE27]'
  prefs: []
  type: TYPE_PRE
- en: Again, images are dissimilar and have no relationship because the function creates
    a latent vector close to a random latent vector each time it is invoked!
