- en: 11. Progressive Growing Generative Adversarial Networks
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: GANs are effective at generating crisp synthetic images, but are limited in
    size to about 64 × 64 pixels. A **Progressive Growing GAN** is an extension of
    the GAN that enables training generator models to generate large high-quality
    images up to about 1024 × 1024 pixels (as of this writing). The approach has proven
    effective at generating high-quality synthetic faces that are startlingly realistic.
  prefs: []
  type: TYPE_NORMAL
- en: The key innovation of Progressive Growing GANs is the incremental increase in
    the size of images output by the generator. By generating small images at the
    beginning of training and gradually adding convolutional layers to both generator
    and discriminator models, larger and larger images with finer and finer resolution
    are generated.
  prefs: []
  type: TYPE_NORMAL
- en: The technique begins with a low-resolution vector as input. It continues by
    progressively growing the generator and discriminator by adding new layers so
    the model can increasingly learn fine details during the training process. The
    technique also speeds and stabilizes training while generating images of unprecedented
    quality.
  prefs: []
  type: TYPE_NORMAL
- en: Latent Space Learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Latent space** is a representation of compressed data in which similar data
    points are closer together in space. Latent space is useful for learning data
    features and finding simpler representations of data for analysis. The idea behind
    creating a latent space is to compress reality so vector math works. Latent space
    can also be referred to as *latent vector space*.'
  prefs: []
  type: TYPE_NORMAL
- en: When we observe our world, we see a vast landscape of pixels (or *observed pixel
    space*). But how can we hope to learn from such a giant canvas of data? One solution
    is to create a latent space that compresses an observed pixel space into manageable
    pixel images. For instance, to teach a model to learn human faces, we begin by
    taking (or using existing) pictures of them. We then convert the pictures into
    a set of pixel images. So each face is represented by a set of pixels. Now that
    we have a latent representation, we can apply calculus and vector arithmetic on
    image pixels to teach a learning model the essence of human faces (at least from
    a pixel image perspective). Substantively, the latent space for our experiment
    is a compressed pixel space representation culled from observed pixel spaces of
    actual human faces.
  prefs: []
  type: TYPE_NORMAL
- en: In an observed pixel space, there may be no immediate similarity between any
    two images. But mapping a pixel space to a latent space compresses images to be
    much closer together so we can more easily learn about such images.
  prefs: []
  type: TYPE_NORMAL
- en: A generative model in the GAN architecture learns to map points in a latent
    space for image generation. It takes a point from the latent space as input and
    applies vector arithmetic to generate a new image. A series of points can also
    be created on a linear path between two points in the latent space to create multiple
    generated images. In practice, a generative model effectively uses its latent
    space representation to interpolate between points in its latent space with the
    goal of deriving meaningful and targeted effects from its generated images. But
    the latent space only has meaning as it applies to the generative model being
    trained. That is, every learning experiment has its own latent space.
  prefs: []
  type: TYPE_NORMAL
