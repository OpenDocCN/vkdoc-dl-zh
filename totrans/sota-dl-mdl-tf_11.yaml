- en: Create a Function to Find the Closest Latent Vector
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The function defines a loss function between the feature vector and target image.
    It uses gradient descent to find variable values that minimize loss as shown in
    Listing [11-6](#PC40).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE39]'
  prefs: []
  type: TYPE_PRE
- en: The function accepts the feature vector, number of steps, steps per image, and
    loss algorithm. It then initializes variables including the optimizer and loss
    function. It also converts the feature vector to a tf.Variable. A *tf.Variable*
    is a tensor whose value can be changed during training.
  prefs: []
  type: TYPE_NORMAL
- en: The function continues with a custom training loop. For custom loop learning,
    TensorFlow provides the *tf.GradientTape* API for automatic differentiation. TensorFlow
    records relevant operations executed inside the context of a tf.GradientTape onto
    a virtual tape. TensorFlow then uses the virtual tape to compute the gradients
    of a recorded computation using reverse-mode differentiation.
  prefs: []
  type: TYPE_NORMAL
- en: '**Automatic differentiation** (AD) is a set of techniques to numerically evaluate
    the derivative of a function specified by a computer program. We use AD to compute
    the gradient of a computation with respect to some inputs (e.g., tf.Variables).
    AD implements two distinct modes. *Forward-mode differentiation* traverses the
    chain rule from inside out. *Reverse-mode differentiation* traverses the chain
    rule from outside to inside. Automatic differentiation is useful for implementing
    ML algorithms such as back-propagation for training neural networks.'
  prefs: []
  type: TYPE_NORMAL
- en: For an excellent resource on automatic differentiation, peruse
  prefs: []
  type: TYPE_NORMAL
- en: '[`https://rufflewind.com/2016-12-30/reverse-mode-automatic-differentiation`](https://rufflewind.com/2016-12-30/reverse-mode-automatic-differentiation)'
  prefs: []
  type: TYPE_NORMAL
- en: To differentiate automatically, TensorFlow needs to remember what operations
    happen in what order during the forward pass. Then, during the backward pass,
    TensorFlow traverses this list of operations in *reverse order* to compute gradients.
  prefs: []
  type: TYPE_NORMAL
- en: The gradient tape uses the pre-trained model to generate an image, finds the
    space between the feature image and target image, uses regularization to get more
    realistic images, calculates loss, applies the gradient descent algorithm, and
    optimizes the gradients. Once training is completed, the function returns an array
    of generated images and an array of losses calculated during training.
  prefs: []
  type: TYPE_NORMAL
- en: Since latent vectors are sampled from a normal distribution, we can get more
    realistic images if we regularize the length of the latent vector to the average
    length of all vectors from this distribution. We implement regularization with
    the *regularizer* variable in the gradient tape section of the function.
  prefs: []
  type: TYPE_NORMAL
