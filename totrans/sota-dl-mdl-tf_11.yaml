- en: Custom Loop Learning Experiment
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The objective of a supervised learning experiment is to predict the correct
    label for newly presented input data. The model learns how to connect input features
    to a predicted outcome in a very precise manner. Although GANs are unsupervised
    experiments, we can create a *pseudo-supervised* experiment by creating a series
    of latent vectors on a linear path bounded by two randomly generated vectors.
    We identify one of the generated vectors as the feature vector and the other as
    the predicted (or target) image. A **latent vector** is one that is drawn from
    the latent space that cannot be accessed or manipulated during training. The idea
    is similar to how feedforward neural networks cannot manipulate values output
    by hidden layers.
  prefs: []
  type: TYPE_NORMAL
- en: We train the model by defining a loss function between the feature vector and
    target image and use gradient descent on the feature vector to find variable values
    that minimize the loss. Training begins by defining a loss function between the
    feature image and target image. A custom training loop enables a gradient descent
    algorithm and the loss function to find variable values that minimize the loss
    between the feature vector and target.
  prefs: []
  type: TYPE_NORMAL
- en: Create the Feature Vector
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Generate a seed for reproducibility and create a feature vector:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE33]'
  prefs: []
  type: TYPE_PRE
- en: Change the seed to generate a different image. Be careful to use the same seed
    value to maintain reproducibility between experiments.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: We set a different random seed for this experiment. We could have kept the global
    random seed that we set in the first experiment. But we decided to separate the
    seeds for the two experiments.
  prefs: []
  type: TYPE_NORMAL
- en: The feature vector can be thought of as the initial vector because the model
    learns through gradient steps how to proceed from an initial latent vector to
    the final target image.
  prefs: []
  type: TYPE_NORMAL
- en: 'Verify that the feature vector was drawn from the latent space:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE34]'
  prefs: []
  type: TYPE_PRE
- en: The feature vector is drawn from the 512-dimensional latent space as indicated
    by shape 1 × 512\. So the feature vector is a one-dimensional vector with 512
    elements.
  prefs: []
  type: TYPE_NORMAL
- en: Display an Image from the Feature Vector
