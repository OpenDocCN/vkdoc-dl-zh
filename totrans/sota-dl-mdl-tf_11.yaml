- en: Generate and Display an Image
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A *new* image can be generated from a random point in the latent space. Begin
    by creating a random normal vector in the latent space. Continue by feeding the
    vector to progan-128\. The pre-trained model identifies the closest vector in
    the latent space to the random vector and generates an image from the closest
    vector. Algorithmically, progan-128 identifies the closest latent vector by minimizing
    the overall distance between the real and generated distributions.
  prefs: []
  type: TYPE_NORMAL
- en: 'Create a function to find the closest vector in the latent space:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: The function creates a random normal vector between 1 and 512 (the size of our
    latent space). It then uses progan-128 to generate an image from the closest latent
    vector to the random latent vector we created.
  prefs: []
  type: TYPE_NORMAL
- en: 'Display a generated image:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: Not bad! The pre-trained model generates a relatively realistic image from a
    vector drawn from the latent space.
  prefs: []
  type: TYPE_NORMAL
- en: Create a Function to Generate Multiple Images
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The function creates two random vectors, interpolates the space between them
    in the latent space, and uses progan-128 to generate images as shown in Listing
    [11-3](#PC19).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: The function creates two random normal variables from the 512-dimensional latent
    space. It then creates a tensor with *n* steps of interpolation between v1 and
    v2\. It ends by using progan-128 to generate *n* images based on the tensor. Since
    the tensor consists of n steps of interpolation, generated images are along a
    line of interpolation bounded by the closest vectors in the latent space between
    v1 and v2.
  prefs: []
  type: TYPE_NORMAL
- en: Create an Animation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Create an animation based on n generated images:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: Pretty amazing! With the help of progan-128, we create an animation based on
    interpolation between two vectors in the latent space closest to the two random
    vectors we created. The number of steps makes a big difference in the animation
    process! The higher the number of steps, the more interpolated images are created
    between the vectors in the latent space. So experiment with the number of steps
    to see what happens. But don’t use too big of an n size because you may run out
    of memory!
  prefs: []
  type: TYPE_NORMAL
- en: Tip
  prefs: []
  type: TYPE_NORMAL
- en: Keep interpolation steps relatively low to avoid a memory crash! Although Colab
    is a cloud service, the free version is pretty limited in the amount of allocated
    RAM to a notebook.
  prefs: []
  type: TYPE_NORMAL
