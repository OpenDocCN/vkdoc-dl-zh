- en: Implementing NMF
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Let’s start by modeling the non-negative matrix factorization method.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [5-9](#Fig9) explains matrix factorization (multiplication).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537881_1_En_5_Chapter/537881_1_En_5_Fig9_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A representation of matrix factorization. The purchase matrix is equal to the
    user matrix multiplied by the item matrix. A, B, C, and D indicate the users.
    W, X, Y, and Z indicate the items.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-9
  prefs: []
  type: TYPE_NORMAL
- en: Matrix factorization
  prefs: []
  type: TYPE_NORMAL
- en: Matrix factorization is a popular method used in building collaborative filtering-based
    recommendation systems. It is a basic embedding model where latent/hidden features
    (embeddings) are generated from the user and item matrixes using matrix multiplication.
    This reduces the dimensionality of the full input matrix and hence is a compact
    representation, increasing the scalability and performance. These latent features
    are then used to fit an optimization problem (usually minimizing an error equation)
    to get to the predictions.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: Using built-in functions, you can calculate the performance metrics like RMSE
    (root-mean-squared error) and MAE (mean absolute error).
