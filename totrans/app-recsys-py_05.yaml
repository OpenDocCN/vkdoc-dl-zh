- en: Implementing SVD
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Singular value decomposition is a linear algebra concept generally used as a
    dimensionality reduction method. It is also a type of matrix factorization. It
    works similarly in collaborative filtering, where a matrix with rows and columns
    as users and items is reduced further into latent feature matrixes. An error equation
    is minimized to get to the prediction.
  prefs: []
  type: TYPE_NORMAL
