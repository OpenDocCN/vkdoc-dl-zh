- en: 5. Collaborative Filtering Using Matrix Factorization, Singular Value Decomposition,
    and Co-Clustering
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Chapter [4](537881_1_En_4_Chapter.xhtml) explored collaborative filtering and
    using the KNN method. A few more important methods are covered in this chapter:
    matrix factorization (MF), singular value decomposition (SVD), and co-clustering.
    These methods (along with KNN) fall into the model-based collaborative filtering
    approach. The basic arithmetic method of calculating cosine similarity to find
    similar users falls into the memory-based approach. Each approach has pros and
    cons; depending on the use case, you must select the suitable approach.'
  prefs: []
  type: TYPE_NORMAL
- en: Figure [5-1](#Fig1) explains the two types of approaches in collaborative filtering.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537881_1_En_5_Chapter/537881_1_En_5_Fig1_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 'A framework exposes the classification of collaborative filtering. It classifies
    into 2 techniques: memory-based approach and model-based approach. The definitions,
    advantages, and disadvantages are exposed.'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-1
  prefs: []
  type: TYPE_NORMAL
- en: The two approaches of collaborative filtering explained
  prefs: []
  type: TYPE_NORMAL
- en: The memory-based approach is much easier to implement and explain, but its performance
    is often affected due to sparse data. But on the other hand, model-based approaches,
    like MF, handle the sparse data well, but it’s usually not intuitive or easy to
    explain and can be much more complex to implement. But the model-based approach
    performs better with large datasets and hence is quite scalable.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter focuses on a few popular model-based approaches, such as implementing
    matrix factorization using the same data from Chapter [4](537881_1_En_4_Chapter.xhtml),
    SVD, and co-clustering models.
  prefs: []
  type: TYPE_NORMAL
