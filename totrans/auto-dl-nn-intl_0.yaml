  prefs: []
  type: TYPE_NORMAL
  zh: 本书包含许多实际示例和代码列表。本书的每一章都附有源代码列表。您可以从以下GitHub仓库下载源代码：[https://github.com/Apress/automated-deep-learning-using-neural-network-intelligence](https://github.com/Apress/automated-deep-learning-using-neural-network-intelligence)。
