- en: Introduction
  prefs: []
  type: TYPE_NORMAL
- en: Machine learning is a big part of our lives in today’s world. We cannot even
    think of a world without machine learning approaches at the moment, and it has
    already started to take a huge part of our daily activities. Websites, mobile
    applications, self-driving cars, home devices, and many things surrounding us
    use machine learning algorithms. The dawn of computing power, especially the graphics
    processing unit, was accompanied by the practical start of the deep learning implementation.
    Deep learning studies the design of deep neural networks. This approach shows
    impressive efficiency and has experienced explosive growth in recent years.
  prefs: []
  type: TYPE_NORMAL
- en: Not surprisingly, the number of tasks to be solved and the need for machine
    learning specialists are constantly growing. At the same time, the number of routine
    actions that developers and data scientists execute to solve machine learning
    problems is increasing. Meanwhile, researchers developed special techniques to
    save time and automate the most common machine learning tasks. These techniques
    were separated into the special area called automated machine learning, or AutoML.
    This book focuses on the automated deep learning (AutoDL) area, which studies
    the automation of deep learning problems. AutoDL considers the issues of creating
    and designing optimal deep learning models. This approach has been rapidly developed
    in recent years and, in some cases, can completely automate the solution of typical
    tasks.
  prefs: []
  type: TYPE_NORMAL
- en: 'This book is about implementing AutoDL methods using Microsoft Neural Network
    Intelligence (NNI). NNI is a Python toolkit that contains the most common and
    advanced AutoDL methods: Hyperparameter Optimization (HPO), Neural Architecture
    Search (NAS), and Model Compression. NNI supports the most popular deep learning
    frameworks. This book covers the NNI implementation of various AutoDL techniques
    using the PyTorch and TensorFlow frameworks.'
  prefs: []
  type: TYPE_NORMAL
- en: Сhapter [1](526245_1_En_1_Chapter.xhtml) focuses on automated deep learning
    basics and why we should put this approach into practice. We will also install
    NNI and examine the main basic scenarios for its use. We will learn how to run
    simple Hello World Experiments and interact with NNI via the command line and
    WebUI.
  prefs: []
  type: TYPE_NORMAL
- en: In Сhapter [2](526245_1_En_2_Chapter.xhtml), we will move on to the study of
    the most common AutoDL task – Hyperparameter Optimization (HPO). We will learn
    what Hyperparameter Optimization is, what hyperparameters are, and how to organize
    an NNI HPO experiment using PyTorch and TensorFlow. We will also construct three
    kinds of research that will make a historical journey to the origins of deep learning.
    The first one will help us determine the best LeNet model hyperparameters for
    the MNIST problem. The second research integrates a new dropout layer and rectified
    linear unit (ReLU) activation into the original LeNet model. And the third one
    will show us how we can evolve the LeNet model in AlexNet using simple HPO techniques.
  prefs: []
  type: TYPE_NORMAL
- en: 'In Сhapter [3](526245_1_En_3_Chapter.xhtml), we will study NNI’s main search
    algorithms (Tuners), which aim to solve HPO tasks. Here, we will consider the
    practical application and the description of the following algorithms: Evolution
    Tuner, Anneal Tuner, and SMBO Tuners. Chapter [3](526245_1_En_3_Chapter.xhtml)
    provides the creation of a custom Tuner and applies it to the classic Shallow
    AutoML problem – building an optimal pipeline using Scikit methods.'
  prefs: []
  type: TYPE_NORMAL
- en: 'In Chapter [4](526245_1_En_4_Chapter.xhtml), we will begin to research Neural
    Architecture Search (NAS). NAS is an approach that studies the creation and design
    of neural networks best suited to solve a specific problem. This chapter covers
    Multi-trial NAS and its main principles. We’ll discuss the NNI Retiari framework,
    define Model Spaces and Model Mutators, and set up experiments that construct
    optimal neural networks. Also, this chapter introduces various exploration algorithms
    that explore Multi-trial NAS Model Space: Regularized Evolution, TPE Strategy,
    and RL Strategy. Next, we will build LeNet-based and ResNet-based Multi-trial
    NAS experiments to solve the CIFAR-10 problem.'
  prefs: []
  type: TYPE_NORMAL
- en: In Chapter [5](526245_1_En_5_Chapter.xhtml), we move on to One-shot NAS, one
    of the latest advances in AutoDL. This chapter explains how to construct a Supernet,
    how to design cell-based neural architectures, and perform Efficient Neural Architecture
    Search (ENAS) and Differentiable Architecture Search (DARTS) One-shot NAS algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: In Chapter [6](526245_1_En_6_Chapter.xhtml), we will cover the important topic
    of model pruning. Model pruning compresses neural network removing redundant weights
    or even layers. This technique is crucial for lightweight devices when we need
    to save computing resources. This chapter will examine basic One-shot and iterative
    pruning algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter [7](526245_1_En_7_Chapter.xhtml) will focus on practical recipes for
    using NNI to organize robust, extensive, and big data experiments.
  prefs: []
  type: TYPE_NORMAL
- en: This book explores practical NNI applications of AutoDL methods and describes
    their theory also. Therefore, this book can be helpful for data scientists who
    want to get the idea that underlies various AutoDL techniques and algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: This book requires intermediate deep learning understanding and TensorFlow or
    PyTorch knowledge.
  prefs: []
  type: TYPE_NORMAL
