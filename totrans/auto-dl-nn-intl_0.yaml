- en: 'This book has many practical examples and code listings. Source code listings
    accompany each chapter in this book. You can download the source code from the
    following GitHub repository: [`https://github.com/Apress/automated-deep-learning-using-neural-network-intelligence`](https://github.com/Apress/automated-deep-learning-using-neural-network-intelligence).'
