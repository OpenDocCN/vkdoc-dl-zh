- en: 5. Understanding What We Built
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Running our first deep learning model gave us a small glimpse of what deep learning
    can do. There are many exciting projects we can build with deep learning.
  prefs: []
  type: TYPE_NORMAL
- en: But first, it is better to understand what we built, and how it works.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let us look back at the model we built. We used the LeNet architecture, which
    looks like this (Figure [5-1](#Fig1)):'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_5_Chapter/502073_1_En_5_Fig1_HTML.jpg](../images/502073_1_En_5_Chapter/502073_1_En_5_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-1
  prefs: []
  type: TYPE_NORMAL
- en: The LeNet model
  prefs: []
  type: TYPE_NORMAL
- en: 'Looking through the model architecture and going through our code, we see that
    the workings of our model is based on few functions:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Input: Digital Images'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Convolutions
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Nonlinearity function (ReLU)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Pooling
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Classifier (Fully Connected Layer)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Let us see how each of these functions work and how they contribute to our model.
  prefs: []
  type: TYPE_NORMAL
- en: Digital Images
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Our input image is the first piece of the process.
  prefs: []
  type: TYPE_NORMAL
- en: Although we consider them as images based on our perception, for a machine,
    images are just another form of digital data.
  prefs: []
  type: TYPE_NORMAL
- en: A digital image consists of a collection of pixels. Each pixel is defined by
    the color value of one or more color-channels. A grayscale image has only a single
    channel. Each pixel in the image has a value from 0 to 255, where 0 indicates
    black and 255 indicates white (Figure [5-2](#Fig2)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_5_Chapter/502073_1_En_5_Fig2_HTML.jpg](../images/502073_1_En_5_Chapter/502073_1_En_5_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-2
  prefs: []
  type: TYPE_NORMAL
- en: An image is just a matrix of pixel values
  prefs: []
  type: TYPE_NORMAL
- en: A color image has three channels—red, green, and blue for an RGB image (Figure
    [5-3](#Fig3)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_5_Chapter/502073_1_En_5_Fig3_HTML.jpg](../images/502073_1_En_5_Chapter/502073_1_En_5_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-3
  prefs: []
  type: TYPE_NORMAL
- en: A color image is a set of pixel values per each channel
  prefs: []
  type: TYPE_NORMAL
- en: Therefore, in mathematical terms, an image is a matrix of pixel values.
  prefs: []
  type: TYPE_NORMAL
- en: The operations in a deep learning model (and in neural networks in general)
    are performed on these matrices of values.
  prefs: []
  type: TYPE_NORMAL
- en: Convolutions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The mathematical convolution operation on matrices is capable of extracting
    features from a matrix such as an image, as it preserves the spatial relationship
    between the elements of the matrix. CNNs extensively use convolution operations,
    which is where they get the name convolutional neural networks. As we discussed
    in Chapter [1](502073_1_En_1_Chapter.xhtml), the mathematical convolutions on
    an image work like the receptive fields of the visual cortex in humans and animals.
    Like the receptive fields, convolutions work by processing small squares of the
    input at a time.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: 'You can learn more about the properties of mathematical convolution operation
    at the Wikipedia page for “Convolution” here: [`https://en.wikipedia.org/wiki/Convolution`](https://en.wikipedia.org/wiki/Convolution).'
  prefs: []
  type: TYPE_NORMAL
- en: 'To get a simple understanding of how convolutions works, think of two matrices:
    the input and the convolution matrix (Figure [5-4](#Fig4)).'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_5_Chapter/502073_1_En_5_Fig4_HTML.jpg](../images/502073_1_En_5_Chapter/502073_1_En_5_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-4
  prefs: []
  type: TYPE_NORMAL
- en: The input and the convolution matrices
  prefs: []
  type: TYPE_NORMAL
- en: The convolution operation happens by the convolution matrix “sliding on” the
    input matrix, to produce the convoluted output (Figure [5-5](#Fig5)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_5_Chapter/502073_1_En_5_Fig5_HTML.jpg](../images/502073_1_En_5_Chapter/502073_1_En_5_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-5
  prefs: []
  type: TYPE_NORMAL
- en: The convolution operation
  prefs: []
  type: TYPE_NORMAL
- en: As the convolution operation happens, the convolution matrix only sees part
    of the input matrix, but it maintains the spatial relationship of what it sees.
    Various different convolution matrices produce different outputs from the input.
  prefs: []
  type: TYPE_NORMAL
- en: What if we apply the same operation to an image?
  prefs: []
  type: TYPE_NORMAL
- en: As we discussed, a digital image is a matrix of pixel values.
  prefs: []
  type: TYPE_NORMAL
- en: Therefore, we should be able to perform the same convolution operations on an
    image as well.
  prefs: []
  type: TYPE_NORMAL
- en: If we attempted the same operation—where the input is an image—with different
    convolution matrices, the output of them would show various representations of
    the features of the image. Following are a few examples (Figure [5-6](#Fig6)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_5_Chapter/502073_1_En_5_Fig6_HTML.jpg](../images/502073_1_En_5_Chapter/502073_1_En_5_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-6
  prefs: []
  type: TYPE_NORMAL
- en: Effects of different convolutions on an image
  prefs: []
  type: TYPE_NORMAL
- en: As these different convolution operations filter and extract different features
    of the images, they are typically called “filters.”
  prefs: []
  type: TYPE_NORMAL
- en: In a CNN, many filters are used to extract and learn different features from
    the input images. When using deep learning libraries such as TensorFlow or Keras,
    we do not need to specify what each of the filters should be. Instead, we only
    specify the number and the size of the filters. The training process of the library
    will determine which filters get used. Typically, the more filters you have in
    a network, the better it is at learning patterns from the input.
  prefs: []
  type: TYPE_NORMAL
- en: Nonlinearity Function
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Once the convolution step is complete and the various feature maps of the input
    image have been generated, a CNN applies a nonlinearity function on the feature
    maps. Nonlinearity is needed because real-world data is nonlinear, but the convolution
    function is a linear operation. Therefore, to handle the representation of real-world
    data, we need to apply a nonlinearity function.
  prefs: []
  type: TYPE_NORMAL
- en: Rectified linear unit, or ReLU, is a commonly used nonlinearity function. Other
    functions such as tanh or sigmoid can also be used as nonlinearity functions.
    Which function to use will depend on the architecture of your model. ReLU performs
    better in most general cases when using backpropagation for training. In most
    cases, ReLU also performs better with deeper model architectures than sigmoid
    and tanh. Therefore, ReLU is a good starting point when developing new model architectures.
  prefs: []
  type: TYPE_NORMAL
- en: The ReLU function can be seen in Figure [5-7](#Fig7).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_5_Chapter/502073_1_En_5_Fig7_HTML.jpg](../images/502073_1_En_5_Chapter/502073_1_En_5_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-7
  prefs: []
  type: TYPE_NORMAL
- en: The ReLU function
  prefs: []
  type: TYPE_NORMAL
- en: This may look complicated, but ReLU is quite simple. It goes through each pixel
    and sets the negative values to zero, and retains the positive pixel values as
    they are.
  prefs: []
  type: TYPE_NORMAL
- en: 'The function can also be shown as:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'When applied to a feature map, the results from ReLU looks like this (Figure
    [5-8](#Fig8)):'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_5_Chapter/502073_1_En_5_Fig8_HTML.jpg](../images/502073_1_En_5_Chapter/502073_1_En_5_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-8
  prefs: []
  type: TYPE_NORMAL
- en: ReLU applied to a feature map
  prefs: []
  type: TYPE_NORMAL
- en: Pooling
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: After the nonlinearity is applied, the CNN does a pooling step (also known as
    spatial pooling, subsampling, or downsampling). Pooling reduces the dimensionality
    of each feature map by retaining only the most important information. It can be
    done in several ways, such as max pooling, average pooling, and sum pooling. Out
    of these, max pooling has shown better results in general.
  prefs: []
  type: TYPE_NORMAL
- en: In max pooling, we define a window (an area of the feature map) and get the
    max value from the pixels in that area (Figure [5-9](#Fig9)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_5_Chapter/502073_1_En_5_Fig9_HTML.jpg](../images/502073_1_En_5_Chapter/502073_1_En_5_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-9
  prefs: []
  type: TYPE_NORMAL
- en: Max pooling
  prefs: []
  type: TYPE_NORMAL
- en: 'Pooling gives a CNN several benefits:'
  prefs: []
  type: TYPE_NORMAL
- en: It makes the feature dimensions smaller and more manageable.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: It reduces the potential to overfit by reducing the number of parameters and
    computations needed in the network.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: It makes the network invariant to small transformations, distortions, and translations
    in the input, which means that small changes in the input will not significantly
    affect the output. This allows the network to generalize better.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: It makes the network scale invariant, allowing objects to be detected wherever
    they are in the input image.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: At this point the work of a single convolution layer of the CNN is complete.
    The next convolution layers would take the output feature maps of the previous
    layer, as their inputs and continue the same operation until they reach the fully
    connected layers.
  prefs: []
  type: TYPE_NORMAL
- en: Classifier (Fully Connected Layer)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The classifier (also known as a fully connected layer or dense layer) is a traditional
    multilayer perceptron network. Each neuron of a layer in the classifier connects
    with every neuron in the next layer. The final output layer of the classifier
    typically uses a softmax activation function. Other activation functions such
    as sigmoid can also be used for different scenarios. Sigmoid generally performs
    well with binary classification problems, while softmax performs well with multiclass
    classifications.
  prefs: []
  type: TYPE_NORMAL
- en: The purpose of the classifier is to take the high-level features extracted by
    the convolution and the pooling layers and combine them in order for the final
    classification (Figure [5-10](#Fig10)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_5_Chapter/502073_1_En_5_Fig10_HTML.jpg](../images/502073_1_En_5_Chapter/502073_1_En_5_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-10
  prefs: []
  type: TYPE_NORMAL
- en: The feature extraction and classification
  prefs: []
  type: TYPE_NORMAL
- en: How Does This All Come Together?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: How do these elements that we discussed—convolutions, ReLU, pooling, and classifiers—work
    together to understand the images?
  prefs: []
  type: TYPE_NORMAL
- en: 'To understand this, let us take an extremely simplified example: let''s see
    how a neural network might learn to recognize a square shape.'
  prefs: []
  type: TYPE_NORMAL
- en: Like any other training task, the neural network would need to go through hundreds,
    or maybe thousands, of training images.
  prefs: []
  type: TYPE_NORMAL
- en: What it needs to learn are the defining features of a square.
  prefs: []
  type: TYPE_NORMAL
- en: For us humans, as we have a firm grasp of visual elements, the defining features
    of a square would be “lines,” “length,” and “angles.” And we know—that is, our
    minds have been trained to know—which of the combinations of those features results
    in a square and what to look for when recognizing one (Figure [5-11](#Fig11)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_5_Chapter/502073_1_En_5_Fig11_HTML.png](../images/502073_1_En_5_Chapter/502073_1_En_5_Fig11_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-11
  prefs: []
  type: TYPE_NORMAL
- en: A possible thought process of identifying a square
  prefs: []
  type: TYPE_NORMAL
- en: But a machine (or an untrained AI) has no concept of what a line, length, or
    angle is. What the AI (the neural network in this case) would try to do is to
    look for any common features that can be seen in the provided training set.
  prefs: []
  type: TYPE_NORMAL
- en: The ability to “see” features of a neural network can be greatly increased by
    using a feature extraction method such as convolutions.
  prefs: []
  type: TYPE_NORMAL
- en: As you can see in the preceding diagram (Figure [5-12](#Fig12)), the convolution
    filters allow to extract out some unique elements out of the images.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_5_Chapter/502073_1_En_5_Fig12_HTML.jpg](../images/502073_1_En_5_Chapter/502073_1_En_5_Fig12_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-12
  prefs: []
  type: TYPE_NORMAL
- en: Possible features learned by a model using convolutions
  prefs: []
  type: TYPE_NORMAL
- en: Using feature extraction flows like this (with convolutions, ReLU, and pooling),
    a neural network would be able to better generalize the identified features from
    the input images. As such, it would be able to narrow down the common features
    of the given data set more easily.
  prefs: []
  type: TYPE_NORMAL
- en: Our handwritten digit classifier works in the same way.
  prefs: []
  type: TYPE_NORMAL
- en: The model we built uses many convolutional filters to identify the common features
    of the digits and tries to identify which combinations of them contributes to
    which of the digit classes (Figure [5-13](#Fig13)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_5_Chapter/502073_1_En_5_Fig13_HTML.jpg](../images/502073_1_En_5_Chapter/502073_1_En_5_Fig13_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-13
  prefs: []
  type: TYPE_NORMAL
- en: Possible features learned on the digits of the MNIST dataset
  prefs: []
  type: TYPE_NORMAL
- en: This same concept can be applied to recognize more complex inputs, such as more
    real-world images, as well. The following diagram shows how an image of a car
    might be identified with feature extraction in a CNN (Figure [5-14](#Fig14)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_5_Chapter/502073_1_En_5_Fig14_HTML.jpg](../images/502073_1_En_5_Chapter/502073_1_En_5_Fig14_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-14
  prefs: []
  type: TYPE_NORMAL
- en: How the filters extract features
  prefs: []
  type: TYPE_NORMAL
- en: What we talked about here is the flow of our simple convolutional neural network
    with just a handful of layers. But the concepts within that model—convolutions,
    regularization, pooling, and so on—are used within more complex models as well.
    You will notice combinations of these same concepts applied within larger, more
    complex models as we start to build them.
  prefs: []
  type: TYPE_NORMAL
