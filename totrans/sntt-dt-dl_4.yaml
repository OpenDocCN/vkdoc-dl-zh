- en: Generating an Artificial Neural Network Using Package “nnet” in R
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Neural networks are powerful tools for modeling complex patterns in data. The
    main difference between these tools and other machine learning tools is that they
    consist of many interconnected neurons that can learn to recognize input patterns.
    Artificial neural networks are widely used in many different applications, including
    pattern recognition, classification, and prediction. For example, they can be
    used in security cameras; in authentication processes, to determine who a person
    is; They can be used to authenticate at a bank ATM. The neural network can also
    work with many different types of sensors and process many different types of
    input data.
  prefs: []
  type: TYPE_NORMAL
- en: In this example, you will learn how to use the “nnet” package to create and
    train a simple neural network. The “nnet” package in R provides users with a variety
    of tools to create and train neural networks. The “nnet” package includes functions
    for creating and training neural networks, as well as for evaluating the performance
    of a neural network model. The package also includes functions for predicting
    the output of a neural network.
  prefs: []
  type: TYPE_NORMAL
- en: The data used in this example are from [`https://archive.ics.uci.edu/ml/datasets/Glass+Identification`](https://archive.ics.uci.edu/ml/datasets/Glass%252BIdentification) and
    the codes used in this example are from “[`https://rpubs.com/khunter/cares_neuralnets`](https://rpubs.com/khunter/cares_neuralnets)”.
  prefs: []
  type: TYPE_NORMAL
