- en: Gaussian Copula
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The Gaussian copula is a function that describes the dependence between two
    random variables. It is often used to model the joint distribution of two variables,
    which may be normal or not normal. The Gaussian (Normal) copula is calculated
    as follows.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\displaystyle \begin{array}{c}C\left(u,v;\theta \right)={\Phi}_G\left({\Phi}^{-1}(u),{\Phi}^{-1}(v);\theta
    \right)\kern11.5em \\ {}=\int_{-\infty}^{\Phi^{-1}(u)}\int_{-\infty}^{\Phi^{-1}(v)}\frac{1}{2\pi
    {\left(1-{\theta}^2\right)}^{1/2}}\times \left\{\frac{-\left({x}^2-2\theta xy+{y}^2\right)}{2\left(1-{\theta}^2\right)}\right\}
    dxdy\end{array}} $$](../images/534235_1_En_4_Chapter/534235_1_En_4_Chapter_TeX_Equl.png)'
  prefs: []
  type: TYPE_IMG
- en: The Φ^(−1)(.) in the above equation is the inverse function of the standard
    normal distribution (Φ(.)). *θ* is the linear correlation coefficient between
    Φ^(−1)(*u*) and Φ^(−1)(*v*).
  prefs: []
  type: TYPE_NORMAL
- en: The Gaussian copula density function is a mathematical function that describes
    the distribution of a set of jointly Gaussian random variables. This function
    is calculated as follows.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ c(x)=\frac{1}{{\left|R\right|}^{1/2}}\mathit{\exp}\left\{-\frac{1}{2}{u}^{\prime}\left({\textrm{R}}^{-1}-I\right)u\right\}
    $$](../images/534235_1_En_4_Chapter/534235_1_En_4_Chapter_TeX_Equm.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The “copula” package of the R software is used to statistically model copulas.
    Two objects are created here. One of them is the copula object, and the other
    is the multivariate normal object. The codes used in this example are taken from
    here [`https://rpubs.com/lance4869/copula`](https://rpubs.com/lance4869/copula):'
  prefs: []
  type: TYPE_NORMAL
