- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this chapter, you learned how to generate synthetic data in R using different
    packages and functions. You learned how to create a value vector from a known
    univariate distribution. You also learned how to generate synthetic data from
    a multivariate categorical variable. You learned how to generate synthetic data
    from a multivariate distribution with correlation. You learned how to generate
    an artificial neural network using the nnet package in R. You also learned about
    augmented data, and image augmentation using the torch package. Also, you learned
    how to generate synthetic data using the mice, conjurer, and synthpop package
    in R. Finally, you learned how to generate synthetic data using the copula package
    in R.
  prefs: []
  type: TYPE_NORMAL
- en: Next, we’ll being delving into Synthetic Data Generation with Python.
