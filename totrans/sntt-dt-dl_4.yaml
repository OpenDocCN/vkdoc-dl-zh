- en: Augmented Data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The general purpose of machine learning is to automatically classify and label
    data or discover patterns in a dataset. Using machine learning, we can classify
    datasets and make predictions using the data. If we aim to classify a dataset,
    for example, to separate photos into cats and dogs, we need to give some of the
    data to the machine by labeling it. The labeling process is the process of identifying
    the types of data in a set of raw data, such as images, text, and photographs.
    From such labeled data, the computer learns whether a photo contains a cat or
    a tumor and can then identify classes of unlabeled data. The data labeling process
    is a necessary process for the computer to see and recognize images, text, and
    speech.
  prefs: []
  type: TYPE_NORMAL
- en: Data augmentation is a technique used in synthetic data, which is a technique
    used to generate new data points using a training dataset. The purpose of data
    augmentation is to improve the quality of the training dataset, which can help to
    improve the quality of the model. Data augmentation can be used to add more data
    points to the dataset, to improve the distribution of the data, to add more variety
    to the data, or to improve the data quality.
  prefs: []
  type: TYPE_NORMAL
- en: Computer vision and machine learning are ways to make images look better. Image
    augmentation is a technique used in these fields to make images look better. This
    can involve applying “geometric transformations, color space augmentations, kernel
    filters, mixing images, random erasing, feature space augmentation, adversarial
    training, GANs, neural style transfer, and meta-learning” [[1](#Par7001)]. These
    algorithms can be applied in different ways to produce different results.
  prefs: []
  type: TYPE_NORMAL
- en: 'AlexNet is a deep learning network that was developed by Alex Krizhevsky. It
    was one of the first networks to use data augmentation, which helped it to achieve
    better results. AlexNet used two types of augmentations: horizontal reflections
    and image translations.'
  prefs: []
  type: TYPE_NORMAL
- en: All inputs in AlexNet must be of size 256x256\. If the input image is not of
    that size, it must be converted to that size before being used for training the
    network.
  prefs: []
  type: TYPE_NORMAL
- en: Supervised learning is a way to get a computer to learn from data. In this approach,
    data is first labeled (or classified), and then the computer uses that data to
    learn how to do things on its own. This means that the computer is taught how
    to do something by being shown examples of what is wanted. Supervised learning
    is important to train the model using labeled data based on “*ground truth."*
    For example, people might ask, “Is there a bird in this photo?” when working with
    unlabeled data. The accuracy of the models depends on the correctness of the data.
    For example, the accuracy of a facial recognition model depends on the correctness
    of the data labeling the faces.
  prefs: []
  type: TYPE_NORMAL
- en: In natural language processing processes, important parts of the text are determined
    manually, and labels are given to them to create the training dataset. In this
    type of labeling, if sentiment analysis is to be applied, text parts, names, places,
    and people that determine the sentiment are labeled. Also, in such a process,
    certain parts of the text can be marked using a bounding box. In audio data, sounds
    (such as barking, chirping, bird sounds, breaking) are first converted into text
    and these are used as training data in structured data format.
  prefs: []
  type: TYPE_NORMAL
- en: The “ggpubr” package is an add-on for the popular “ggplot2” package for R that
    provides several functions for creating and manipulating publication-quality graphs.
    These functions include creating custom themes, adding annotations and labels,
    and customizing the layout and appearance of graphs. The “ggpubr” package also
    includes several functions for importing and exporting data to and from different
    formats, making it easy to create graphs that can be used in reports or presentations.
  prefs: []
  type: TYPE_NORMAL
- en: An example of how to create a text graphical object with R’s “ggpubr” package.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
