- en: Copula
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In statistics, it is necessary to look at the common distributions of these
    variables to capture the true relationship between random variables. The person
    correlation ρ, Spearman’s rank ρ, and Kendall’s τ methods simply provide a numerical
    value to measure. This numerical value is perceived by our mind and the real relationship
    is in the common distribution.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ F\left({x}_1,{x}_2,\dots, {x}_n\right) $$](../images/534235_1_En_4_Chapter/534235_1_En_4_Chapter_TeX_Equc.png)'
  prefs: []
  type: TYPE_IMG
- en: The copula function links the joint distribution of a set of variables to the
    marginal distributions of those variables. Copulas is very good at modeling and
    simulating correlated random variables. Using copulas, the correlation structure
    and marginal variables can be modeled separately. These models can often be useful.
    Because for some combinations of marginal variables, no function will generate
    the desired multivariate distribution. It is not easy to generate random samples
    with a distribution whose margins are Beta, Gamma and Student respectively. However,
    random samples from a multivariate normal distribution can be simply generated
    using R.
  prefs: []
  type: TYPE_NORMAL
- en: 'The copula function is mathematically represented by the symbol *C*. The *C*
    function is an application that maps a multivariate distribution to its univariate
    margins (marginal distributions). The two-dimensional copula function has the
    following two properties [[7](#Par7007)]:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\displaystyle \begin{array}{c}\begin{array}{c}C:{\boldsymbol{I}}^2\to
    \boldsymbol{I}\\ {}1.\kern0.5em \forall u,v\in \boldsymbol{I}\kern2.5em C\left(u,0\right)=0\kern2em
    and\kern1.5em C\left(0,v\right)=0\\ {}\kern8.25em C\left(u,1\right)=u\kern1.5em
    and\kern2em C\left(1,v\right)=v\end{array}\\ {}2.\kern0.5em \forall {u}_1,{u}_2,{v}_1,{v}_2\in
    \boldsymbol{I},\kern1em {u}_1\le {u}_2\kern1.25em and\kern1.75em {v}_1,\le {v}_2,\\
    {}C\left({u}_2,{v}_2\right)-C\left({u}_2,{v}_1\right)-C\left({u}_1,{v}_2\right)+C\left({u}_1,{v}_1\right)\ge
    0.\end{array}} $$](../images/534235_1_En_4_Chapter/534235_1_En_4_Chapter_TeX_Equd.png)'
  prefs: []
  type: TYPE_IMG
- en: The ***I*** used in the above function is in the range [0, 1].
  prefs: []
  type: TYPE_NORMAL
- en: Let *c* denote the density of the copula. In this case, the copula density *c*
    is calculated as follows.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ c=\frac{\partial C}{\partial {F}_1\dots \partial {F}_p} $$](../images/534235_1_En_4_Chapter/534235_1_En_4_Chapter_TeX_Eque.png)'
  prefs: []
  type: TYPE_IMG
- en: Joint density is calculated as follows.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ f(x)=c\left({F}_1\left({x}_1\right),\dots, {F}_p\left({x}_p\right)\right)\prod
    \limits_{i=1}^p{f}_i\left({x}_i\right) $$](../images/534235_1_En_4_Chapter/534235_1_En_4_Chapter_TeX_Equf.png)'
  prefs: []
  type: TYPE_IMG
- en: The copula generator phi function can be used to create Archimedean copulas.
    Archimedean copulas are calculated as follows.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ C\left(u,v\right)={\varphi}^{\left[-1\right]}\left(\varphi (u)+\varphi
    (v)\right) $$](../images/534235_1_En_4_Chapter/534235_1_En_4_Chapter_TeX_Equg.png)'
  prefs: []
  type: TYPE_IMG
- en: The Gumbel copula is a specific type of copula that is used to model the distribution
    of the failure time of a system. It is named after its creator, Harry Gumbel.
    Gumbel copula is created using the generator function below.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\varphi}_{\theta }(t)={\left(- lnt\right)}^{\theta } $$](../images/534235_1_En_4_Chapter/534235_1_En_4_Chapter_TeX_Equh.png)'
  prefs: []
  type: TYPE_IMG
- en: When mathematical transformations are made, the following equation is obtained.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {C}_{\theta}\left(u,v\right)=\mathit{\exp}\left[-{\left(\left(\mathit{\ln}(u)\right)\right)}^{\theta
    }+{\left({\left(\left(-\mathit{\ln}(v)\right)\right)}^{\theta}\right)}^{1/\theta}\right],\theta
    \in \left[1,\infty \right] $$](../images/534235_1_En_4_Chapter/534235_1_En_4_Chapter_TeX_Equi.png)'
  prefs: []
  type: TYPE_IMG
- en: In finance, it is often assumed that there are strong or weak correlations between
    multiple assets. There is always a correlation between the economic activities
    of human beings. These correlations are used to predict price and value movement.
    However, *t* is a big problem how to detect and measure these correlations is
    a big problem.
  prefs: []
  type: TYPE_NORMAL
- en: In finance, each asset can be assumed to have a return, such as the normal distribution
    *N*(*μ*, *σ*) or the student *t* distribution *t*(*n*). But when it comes to investing,
    people prefer to diversify to minimize risk and keep several different instruments
    in their portfolios. Here, the weighted mean and variance can be used to estimate
    the parameter. However, the joint distribution of the portfolio is unknown. A
    common distribution can be produced using the known marginal distribution of assets.
    This way, it comes to the copula. Usually, Gaussian copula and *t* copula are
    used. During the financial crisis of 2008, MBS gathered most of its products.
    Gauss used the copula to estimate the distribution of MBS products and estimate
    the risk value.
  prefs: []
  type: TYPE_NORMAL
- en: t Copula
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The *t* copula is a statistical tool that is used to measure the correlation
    between two variables. It that is used determine if there is a relationship between
    the two variables and to quantify that relationship. *t* copula is calculated
    as in the following equation.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {C}^t\left({u}_1,\dots; {u}_n,{R}_n,v\right)={t}_{R_n,v}\left({t}_v^{-1}\left({u}_1\right),\dots,
    {t}_v^{-1}\left({u}_1\right)\right) $$](../images/534235_1_En_4_Chapter/534235_1_En_4_Chapter_TeX_Equj.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The density of *t* copula is defined by the following equation [[8](#Par7008)]:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {C}^t\left({u}_1,\dots; {u}_n,{R}_n,v\right)=\frac{f_{R_n,v}\left({t}_v^{-1}\left({u}_1\right),\dots,
    {t}_v^{-1}\left({u}_1\right)\right)}{\prod \limits_{i=1}^n{f}_v\left({t}_v^{-1}\left({u}_i\right)\right)}
    $$](../images/534235_1_En_4_Chapter/534235_1_En_4_Chapter_TeX_Equk.png)'
  prefs: []
  type: TYPE_IMG
- en: A *t* copula is a special case of the Gaussian copula and is often used when
    the variables are not normally distributed. The *t* copula is characterized by
    its heavy tails, which means that it is more likely than the Gaussian copula to
    generate extreme values. This makes it a good choice for modeling data with outliers.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this example, the codes used to generate *t* copula are taken from [`http://copula.r-forge.r-project.org/book/04_fitting.xhtml`](http://copula.r-forge.r-project.org/book/04_fitting.xhtml):'
  prefs: []
  type: TYPE_NORMAL
