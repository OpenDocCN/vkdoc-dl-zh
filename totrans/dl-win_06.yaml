- en: 6. Visualizing Models
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 6. 可视化模型
- en: When building a deep learning model, it is often better to be able to visualize
    the model. Although the model we created—the LeNet model—is simple, it is better
    if we can see the structure. Especially when we are tweaking or modifying the
    model, we can easily compare their structures. And when working with more complex
    models (which we will look at in the next chapter), it is easier to wrap your
    head around them if you can see their structure visually.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 当构建深度学习模型时，能够可视化模型通常更好。虽然我们创建的模型——LeNet模型——很简单，但如果能看到其结构会更好。尤其是在我们调整或修改模型时，可以轻松比较它们的结构。当与更复杂的模型（我们将在下一章中探讨）一起工作时，如果你能从视觉上看到它们的结构，那么理解它们会更容易。
- en: But wouldn’t it be better if there was a way to automatically draw the structure
    of a model?
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果有一种方法可以自动绘制模型的结构会更好吗？
- en: As it happens, TensorFlow/Keras has just the method for it. But first, we first
    need to learn how to save our models properly.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 恰好，TensorFlow/Keras正好有这样一个方法。但首先，我们首先需要学习如何正确地保存我们的模型。
- en: Saving Models in Keras
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在Keras中保存模型
- en: In Chapter [4](502073_1_En_4_Chapter.xhtml), when we build our first deep learning
    model, we learned of a one way to save a Keras model, which is to use the `model.save_weights()`
    function . This method, as the name suggests, only saves the weights of the model’s
    neurons. The weights of a model are what the model has learned through the training.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在第[4](502073_1_En_4_Chapter.xhtml)章中，当我们构建我们的第一个深度学习模型时，我们了解到一种保存Keras模型的方法，即使用`model.save_weights()`函数。正如其名称所暗示的，这种方法只保存模型神经元的权重。模型的权重是模型通过训练所学习到的。
- en: But a model is more than just its weights.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 但模型不仅仅是其权重。
- en: In order to use the saved weights, we have to reconstruct the model structure
    in code, and load the weights into it. Furthermore, the `save_ weights ()` function
    does not save the optimizer state of the model. Therefore, we cannot use it to
    resume the training of a model from a previous training state.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使用保存的权重，我们必须在代码中重建模型结构，并将权重加载到其中。此外，`save_weights()`函数不会保存模型的优化器状态。因此，我们无法使用它从先前的训练状态恢复模型的训练。
- en: 'For those requirements Keras provides another save option: `model.save()`.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这些需求，Keras提供了另一个保存选项：`model.save()`。
- en: 'When using model.save() it saves all of the following as a single file:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用model.save()时，它将以下所有内容保存为单个文件：
- en: The model’s structure, architecture, and configuration
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型的结构、架构和配置
- en: The model’s learned weights
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型的学习权重
- en: The model’s compilation information (configuration used with model.compile())
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型的编译信息（与model.compile()一起使用的配置）
- en: The optimizer and its state of the model (allowing you to resume training)
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 优化器和模型的状态（允许你恢复训练）
- en: This provides much more versatility to the saved models.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 这为保存的模型提供了更多的灵活性。
- en: Note
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: The model.save_weights() function has its own usage as well. In more advanced
    situations, such as when the learned weights of one model needs to be transferred
    to a different model architecture, the save_weights() function is highly useful.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '`model.save_weights()`函数也有其自身的用途。在更高级的情况下，例如当一个模型的学习权重需要转移到不同的模型架构时，`save_weights()`函数非常有用。'
- en: 'Let us add model.save() function to our LeNet model. We will modify the following
    code segment from our original code (lines 178, 179):'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们给LeNet模型添加model.save()函数。我们将修改以下代码段（原始代码的第178行和第179行）：
- en: '[PRE0]'
  id: totrans-18
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Now, if we run training on our model, it will save the full model as `lenet_model.h5`
    in the data directory (Figure [6-1](#Fig1)).
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，如果我们对我们的模型进行训练，它将在数据目录中保存完整的模型为`lenet_model.h5`（图[6-1](#Fig1)）。
- en: '![../images/502073_1_En_6_Chapter/502073_1_En_6_Fig1_HTML.jpg](../images/502073_1_En_6_Chapter/502073_1_En_6_Fig1_HTML.jpg)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_6_Chapter/502073_1_En_6_Fig1_HTML.jpg](../images/502073_1_En_6_Chapter/502073_1_En_6_Fig1_HTML.jpg)'
- en: Figure 6-1
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-1
- en: The saved model file
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 保存的模型文件
- en: With the full model saved, we can now use the built-in functions of Keras to
    visualize the model.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在保存了完整的模型之后，我们现在可以使用Keras的内置函数来可视化模型。
- en: Using the plot_model Function of Keras
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用Keras的plot_model函数
- en: We can use the `plot_model` function from the `tf.keras.utils` package to plot
    the structure of a Keras or tf.keras model.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用`tf.keras.utils`包中的`plot_model`函数来绘制Keras或tf.keras模型的结构。
- en: 'However, to get the plot_model function to work, we will need to install few
    additional packages:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，为了使plot_model函数正常工作，我们需要安装一些额外的包：
- en: '**Graphviz library:** an open-source graph visualization library'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Graphviz库**：一个开源的图形可视化库'
- en: '**Pydot:** the Python bindings of the Dot language used by Graphviz'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Pydot:** Graphviz使用的Dot语言的Python绑定'
- en: 'We can install both the packages in to our conda environment by running (Figure
    [6-2](#Fig2)):'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过运行以下命令将这两个包安装到我们的conda环境中（见图[6-2](#Fig2)）：
- en: '![../images/502073_1_En_6_Chapter/502073_1_En_6_Fig2_HTML.jpg](../images/502073_1_En_6_Chapter/502073_1_En_6_Fig2_HTML.jpg)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_6_Chapter/502073_1_En_6_Fig2_HTML.jpg](../images/502073_1_En_6_Chapter/502073_1_En_6_Fig2_HTML.jpg)'
- en: Figure 6-2
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-2
- en: Installing Graphviz and Pydot packages
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 安装Graphviz和Pydot包
- en: '[PRE1]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Once the packages are installed, we can start a new code file to add our visualization
    code. We will name it model_visualization.py.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦安装了这些包，我们就可以开始创建一个新的代码文件来添加我们的可视化代码。我们将将其命名为model_visualization.py。
- en: 'In this new file we will start by importing the necessary packages:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个新文件中，我们将首先导入必要的包：
- en: '[PRE2]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: We will use the `load_model` function to load the LeNet model we saved in the
    earlier step.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用`load_model`函数来加载我们在之前步骤中保存的LeNet模型。
- en: The `plot_model` function is what we will use for the visualization.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: '`plot_model`函数是我们将用于可视化的函数。'
- en: 'We can then load our model by passing the path to our saved model file to the
    load_model function:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们可以通过将保存的模型文件的路径传递给`load_model`函数来加载我们的模型：
- en: '[PRE3]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Finally, we can generate the model structure visualization by using the plot_model
    function:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们可以通过使用`plot_model`函数来生成模型结构可视化：
- en: '[PRE4]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'The parameters for the plot_model function are as follows:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '`plot_model`函数的参数如下：'
- en: '**model:** the model object we want to visualize'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**model:** 我们想要可视化的模型对象'
- en: '**to_file:** the file name for the image that generates'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**to_file:** 生成图像的文件名'
- en: '**show_shapes:** whether to show the input and output shapes of the layers'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**show_shapes:** 是否显示层的输入和输出形状'
- en: '**show_layer_names:** whether to show the layer names of the model'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**show_layer_names:** 是否显示模型的层名称'
- en: '**rankdir:** this is an argument passed on to PyDot which determines the format
    of the generated plot. rankdir is the direction of the plot. TB or Top-to-Bottom
    will generate a vertical plot, while LR or Left-to-Right will generate a horizontal
    plot.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**rankdir:** 这是传递给PyDot的参数，用于确定生成的图表格式。rankdir是图表的方向。TB或Top-to-Bottom将生成垂直图表，而LR或Left-to-Right将生成水平图表。'
- en: '**expand_nested:** if your model has nested models, this will specify whether
    to expand them in the plot or not'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**expand_nested:** 如果你的模型有嵌套模型，这将指定是否在图表中展开它们'
- en: '**dpi:** the resolution of the generated plot in dots-per-inch'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**dpi:** 生成的图表的分辨率，以每英寸点数表示'
- en: 'When we run our code, the visualization will be saved as model.png on the same
    folder as the code file, and would look like this (Figure [6-3](#Fig3)):'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们运行我们的代码时，可视化将保存为model.png，位于代码文件相同的文件夹中，看起来像这样（见图[6-3](#Fig3)）：
- en: '![../images/502073_1_En_6_Chapter/502073_1_En_6_Fig3_HTML.png](../images/502073_1_En_6_Chapter/502073_1_En_6_Fig3_HTML.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_6_Chapter/502073_1_En_6_Fig3_HTML.png](../images/502073_1_En_6_Chapter/502073_1_En_6_Fig3_HTML.png)'
- en: Figure 6-3
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-3
- en: The structure of the LeNet model visualized using plot_model
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 使用`plot_model`可视化的LeNet模型结构
- en: The `show_shapes` and `show_layer_names` parameters allows you to control the
    amount of details that will be displayed in the generated plot (Figure [6-4](#Fig4)).
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '`show_shapes`和`show_layer_names`参数允许你控制将在生成的图表中显示的详细程度（见图[6-4](#Fig4)）。'
- en: '![../images/502073_1_En_6_Chapter/502073_1_En_6_Fig4_HTML.jpg](../images/502073_1_En_6_Chapter/502073_1_En_6_Fig4_HTML.jpg)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_6_Chapter/502073_1_En_6_Fig4_HTML.jpg](../images/502073_1_En_6_Chapter/502073_1_En_6_Fig4_HTML.jpg)'
- en: Figure 6-4
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-4
- en: The layer name and the shape in the visualized plot
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化图中层的名称和形状
- en: 'You can try turning them off:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以尝试将它们关闭：
- en: '[PRE5]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'Which would result in (Figure [6-5](#Fig5)):'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 这将导致（见图[6-5](#Fig5)）：
- en: '![../images/502073_1_En_6_Chapter/502073_1_En_6_Fig5_HTML.png](../images/502073_1_En_6_Chapter/502073_1_En_6_Fig5_HTML.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_6_Chapter/502073_1_En_6_Fig5_HTML.png](../images/502073_1_En_6_Chapter/502073_1_En_6_Fig5_HTML.png)'
- en: Figure 6-5
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-5
- en: Plot with both show_shapes and show_layer_names off
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 关闭show_shapes和show_layer_names的绘图
- en: 'Finally, with the rankdir parameter, you can switch to generating a horizontal
    plot:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，通过rankdir参数，你可以切换到生成水平图表：
- en: '[PRE6]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: This results in a horizontal plot (Figure [6-6](#Fig6)).
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 这将生成一个水平图表（见图[6-6](#Fig6)）。
- en: '![../images/502073_1_En_6_Chapter/502073_1_En_6_Fig6_HTML.png](../images/502073_1_En_6_Chapter/502073_1_En_6_Fig6_HTML.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_6_Chapter/502073_1_En_6_Fig6_HTML.png](../images/502073_1_En_6_Chapter/502073_1_En_6_Fig6_HTML.png)'
- en: Figure 6-6
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-6
- en: Horizontal plot
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 水平图表
- en: Because of these flexibilities of the plot_model function, it can be an excellent
    tool when you are building more complex models.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 由于plot_model函数的这些灵活性，它在你构建更复杂的模型时可以成为一个出色的工具。
- en: 'Using an Opensource tool to Visualize Model Structures: Netron'
  id: totrans-72
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用开源工具可视化模型结构：Netron
- en: Netron is an opensource visualizer for neural network, deep learning, and machine
    learning models. Netron has been created by Lutz Roeder,^([1](#Fn1)) and is available
    through its GitHub page.^([2](#Fn2))
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: Netron是一个开源的神经网络、深度学习和机器学习模型可视化工具。Netron由Lutz Roeder创建，^([1](#Fn1))并且可以通过其GitHub页面获取.^([2](#Fn2))
- en: 'At the time of this writing, Netron supports the following model file formats:
    ONNX (.onnx, .pb, .pbtxt), Keras (.h5, .keras), Core ML (.mlmodel), Caffe (.caffemodel,
    .prototxt), Caffe2 (predict_net.pb), Darknet (.cfg), MXNet (.model, -symbol.json),
    Barracuda (.nn), ncnn (.param), Tengine (.tmfile), TNN (.tnnproto), UFF (.uff),
    and TensorFlow Lite (.tflite). It also has experimental support for many other
    formats and is actively being developed to constantly add support to more formats.'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 在撰写本文时，Netron支持以下模型文件格式：ONNX (.onnx, .pb, .pbtxt), Keras (.h5, .keras), Core
    ML (.mlmodel), Caffe (.caffemodel, .prototxt), Caffe2 (predict_net.pb), Darknet
    (.cfg), MXNet (.model, -symbol.json), Barracuda (.nn), ncnn (.param), Tengine
    (.tmfile), TNN (.tnnproto), UFF (.uff), 和 TensorFlow Lite (.tflite)。它还实验性地支持许多其他格式，并且正在积极开发以不断添加对更多格式的支持。
- en: Netron has standalone installer packages for MacOS, Linux, and Windows.^([3](#Fn3))
    It also has a browser version.^([4](#Fn4))
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: Netron为MacOS、Linux和Windows提供了独立的安装包.^([3](#Fn3)) 它还有一个浏览器版本.^([4](#Fn4))
- en: Once installed (or with the browser version), you just need to open the saved
    model file from its UI (Figure [6-7](#Fig7)).
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦安装（或使用浏览器版本），你只需从其UI打开保存的模型文件（图[6-7](#Fig7)）。
- en: '![../images/502073_1_En_6_Chapter/502073_1_En_6_Fig7_HTML.jpg](../images/502073_1_En_6_Chapter/502073_1_En_6_Fig7_HTML.jpg)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_6_Chapter/502073_1_En_6_Fig7_HTML.jpg](../images/502073_1_En_6_Chapter/502073_1_En_6_Fig7_HTML.jpg)'
- en: Figure 6-7
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-7
- en: The Netron UI
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: Netron用户界面
- en: When the model is loaded, you can select nodes/layers from the visualized graph
    to view their properties (Figure [6-8](#Fig8)).
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 当模型加载时，你可以从可视化的图中选择节点/层来查看它们的属性（图[6-8](#Fig8)）。
- en: '![../images/502073_1_En_6_Chapter/502073_1_En_6_Fig8_HTML.jpg](../images/502073_1_En_6_Chapter/502073_1_En_6_Fig8_HTML.jpg)'
  id: totrans-81
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_6_Chapter/502073_1_En_6_Fig8_HTML.jpg](../images/502073_1_En_6_Chapter/502073_1_En_6_Fig8_HTML.jpg)'
- en: Figure 6-8
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-8
- en: Netron displaying a properties of a layer
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: Netron显示层的属性
- en: Netron gives many other visualization properties as well as the ability to export
    the visualized plot.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: Netron还提供了许多其他可视化属性，以及导出可视化图表的能力。
- en: Visualizing the Features Learned by Convolutional Filters
  id: totrans-85
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 可视化卷积滤波器学习到的特征
- en: In the past few chapters, we have been looking into building our first deep
    learning model and learn how it uses convolutional filters to extract features
    from the input and procedurally “learn” how to interpret the input using those
    features.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去的几章中，我们一直在探讨构建我们的第一个深度学习模型，并学习它如何使用卷积滤波器从输入中提取特征，并“学习”如何使用这些特征来解释输入。
- en: But what does convolutional filters see? What features do they learn?
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 但卷积滤波器看到了什么？它们学习了哪些特征？
- en: We can attempt to see the features learned by the filters by maximizing the
    activations of them.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过最大化滤波器的激活来尝试查看它们学习到的特征。
- en: Let us attempt it on our LeNet model. We will start with a new code file, which
    we will name `lenet_filter_visualization.py`.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们在我们的LeNet模型上尝试一下。我们将从一个新的代码文件开始，我们将将其命名为`lenet_filter_visualization.py`。
- en: 'We start by importing the necessary packages:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先导入必要的包：
- en: '[PRE7]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'For the technique we are going to use, we need to disable eager execution,
    which is in TensorFlow v2.x:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们将要使用的技巧，我们需要禁用TensorFlow v2.x中的eager execution：
- en: '[PRE8]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'We then set the parameters for the generated images, and select the layer from
    the model we are going to visualize:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们设置生成图像的参数，并从我们将要可视化的模型中选择层：
- en: '[PRE9]'
  id: totrans-95
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'As the layer name, we need to select a convolutional layer. If we look back
    at the model structure we visualized earlier, we can see that our LeNet model
    has two convolutional layers: conv2d and conv2d_1\. We will select conv2d_1 here.'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 作为层名，我们需要选择一个卷积层。如果我们回顾一下我们之前可视化的模型结构，我们可以看到我们的LeNet模型有两个卷积层：conv2d和conv2d_1。在这里我们将选择conv2d_1。
- en: 'We then load our model, using the model file we saved earlier in this chapter:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们使用本章中保存的模型文件加载我们的模型：
- en: '[PRE10]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'The `model.summary()` function will give you a text representation of the model
    structure. The output would look like this (Figure [6-9](#Fig9)):'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: '`model.summary()` 函数将给出模型结构的文本表示。输出将类似于这样（图 [6-9](#Fig9)）：'
- en: '![../images/502073_1_En_6_Chapter/502073_1_En_6_Fig9_HTML.jpg](../images/502073_1_En_6_Chapter/502073_1_En_6_Fig9_HTML.jpg)'
  id: totrans-100
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_6_Chapter/502073_1_En_6_Fig9_HTML.jpg](../images/502073_1_En_6_Chapter/502073_1_En_6_Fig9_HTML.jpg)'
- en: Figure 6-9
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-9
- en: The summary of the LeNet model
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: LeNet 模型的摘要
- en: 'We then define the input data and the dictionary of layers with their names:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先定义输入数据和层及其名称的字典：
- en: '[PRE11]'
  id: totrans-104
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'We then define two utility functions:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们定义了两个实用函数：
- en: '[PRE12]'
  id: totrans-106
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: The normalize function normalizes a given tensor by its L2-norm to allow a smooth
    gradient ascent. The `deprocess_image` transforms a given tensor into a valid
    image.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 正则化函数通过其 L2-范数对给定的张量进行归一化，以允许平滑的梯度上升。`deprocess_image` 函数将给定的张量转换成有效的图像。
- en: Next comes the main chunk of the code. We loop over the 50 filters of the conv2d_1
    layer, obtain the loss and gradients of each, and normalize the gradients (using
    the normalize function defined earlier). We then start with a gray image with
    random noise and run gradient ascent for 20 steps. 20 was selected here as the
    number of epochs based on the results from past experiments which resulted in
    sharper visualizations. You can attempt to change the number of epochs and see
    how it affects the output.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来是代码的主要部分。我们遍历 conv2d_1 层的 50 个过滤器，获取每个过滤器的损失和梯度，并使用之前定义的正则化函数对梯度进行归一化。然后，我们从一张带有随机噪声的灰色图像开始，进行
    20 步的梯度上升。这里选择 20 作为周期数是基于过去实验的结果，这些实验产生了更清晰的可视化。你可以尝试更改周期数并看看它如何影响输出。
- en: 'Finally, the processed filters are converted to images (using the `deprocess_image`
    function defined earlier) and added to a list named `kept_filters`:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，将处理过的过滤器转换为图像（使用之前定义的 `deprocess_image` 函数）并添加到名为 `kept_filters` 的列表中：
- en: '[PRE13]'
  id: totrans-110
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'With the images of the filters ready, we can stitch them into a single 6x6
    grid image and enlarge to make it more visible:'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 当过滤器的图像准备就绪后，我们可以将它们拼接成一个 6x6 的网格图像并放大以使其更明显：
- en: '[PRE14]'
  id: totrans-112
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'The resulting image, named lenet_filters_6x6.png, will be saved in the same
    folder as the code file, and will look something like this (Figure [6-10](#Fig10)):'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 生成的图像，命名为 lenet_filters_6x6.png，将被保存在代码文件相同的文件夹中，看起来可能像这样（图 [6-10](#Fig10)）：
- en: '![../images/502073_1_En_6_Chapter/502073_1_En_6_Fig10_HTML.jpg](../images/502073_1_En_6_Chapter/502073_1_En_6_Fig10_HTML.jpg)'
  id: totrans-114
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_6_Chapter/502073_1_En_6_Fig10_HTML.jpg](../images/502073_1_En_6_Chapter/502073_1_En_6_Fig10_HTML.jpg)'
- en: Figure 6-10
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-10
- en: The visualized activations of convolutional filters of the LeNet model
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: LeNet 模型卷积过滤器的可视化激活
- en: While at first glance this may seem like random noise, if you look closely you
    can see some subtle patterns in the output. These patterns represent attempts
    in matching lines, edges, and textures of the input images from various directions.
    As we discussed in the last chapter, the different filters extract different features
    from the images. Once the filters “learn” the features, a combination of those
    are used to match the input images to determine what the image is.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然乍一看这可能看起来像是随机噪声，但如果你仔细观察，你可以在输出中看到一些微妙的模式。这些模式代表了从不同方向尝试匹配输入图像的线条、边缘和纹理。正如我们在上一章中讨论的，不同的过滤器从图像中提取不同的特征。一旦过滤器“学习”了这些特征，这些特征的组合就被用来匹配输入图像以确定图像的内容。
