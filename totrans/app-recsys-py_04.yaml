- en: Memory-Based Approach
  id: totrans-67
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Let’s examine the most basic approach to implementing collaborative filtering:
    the memory-based approach. This approach uses simple arithmetic operations or
    metrics to calculate the similarities between two users or two items to group
    them. For example, to find user-user relations, both users’ historically liked
    items are used to find the similarity metric, that measures how similar the two
    users are.'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: Cosine similarity is a common similarity metric. Euclidean distance and Pearson’s
    correlation are other popular metrics. A metric is considered geometric if the
    row (column) of a given user (item) is treated as a vector or a matrix. In cosine
    similarity, the similarity of two users (say) is measured as the cosine of the
    angle between the vectors of the two users. For users A and B, the cosine similarity
    is given by the formula shown in Figure [4-4](#Fig4).
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537881_1_En_4_Chapter/537881_1_En_4_Fig4_HTML.jpg)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
- en: 'A formula states: similarity equals cos theta equals start fraction A dot B
    over modulus of A and modulus of B end fraction.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-4
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: Cosine similarity formula
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: This approach is easy to implement and understand because no model training
    or heavy optimization algorithms are involved. However, its performance degrades
    when there is sparse data. For this method to work precisely, huge amounts of
    clean data on multiple users and items are required, which hinders the scalability
    of this approach for most real-world applications.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: The memory-based approach is further divided into user-to-user-based and item-to-item-based
    collaborative filtering.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: The implementation of both methods is explored in this chapter.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: Figure [4-5](#Fig5) illustrates user-based and item-based filtering.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537881_1_En_4_Chapter/537881_1_En_4_Fig5_HTML.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
- en: A set of two network models depicts collaborative filtering. 1\. User-based
    filtering (based on user's similarity). 2\. Item-based filtering (based on items
    similarity)
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-5
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: User-based and item-based collaborative filtering
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: User-to-User Collaborative Filtering
  id: totrans-82
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: User-to-user-based collaborative filtering recommends items that a particular
    user might like by finding similar users, using purchase history or ratings on
    various items, and then suggesting the items liked by these similar users.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: Here, a matrix is formed to describe the behavior of all the users (purchase
    history in our example) corresponding to all the items. Using this matrix, you
    can calculate the similarity metrics (cosine similarity) between users to formulate
    user-user relations. These relations help find users similar to a given user and
    recommend the items bought by these similar users.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: Implementation
  id: totrans-85
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Let’s first create a data matrix covering purchase history. It contains all
    customer IDs for all items (whether a customer has purchased an item or not).
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: Figure [4-6](#Fig6) shows the purchase data matrix.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537881_1_En_4_Chapter/537881_1_En_4_Fig6_HTML.png)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
- en: An output file depicts five rows of the list of purchase data matrices. It collects
    the total quantity purchased by the users against the item (only the items purchased
    are necessary).
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-6
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: Purchase data matrix
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: The data matrix shown in Figure [4-6](#Fig6) reveals the total quantity purchased
    by each user against each item. Only information about whether the item was bought
    or not by the user is needed, not the quantity.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: Thus, an encoding of 0 or 1 is used, where 0 is not purchased, and 1 is purchased.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: Let’s first write a function for encoding the data matrix.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  id: totrans-96
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Next, apply this function to the data matrix.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Figure [4-7](#Fig7) shows the purchase data matrix after encoding.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537881_1_En_4_Chapter/537881_1_En_4_Fig7_HTML.png)'
  id: totrans-100
  prefs: []
  type: TYPE_IMG
- en: An output file depicts five rows of the list of purchase data after encoding.
    It reveals users' similarity score matrix (user-to-user similarity score).
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-7
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
- en: Purchase data matrix after encoding
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: The purchase data matrix reveals the behavior of customers across all items.
    This matrix finds the user similarity scores matrix, and the similarity metric
    uses cosine similarity. The user similarity score matrix has user-to-user similarity
    for each user pair.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
- en: First, let’s apply cosine_similarity to the purchase data matrix.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  id: totrans-106
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Now, let’s store the user similarity scores in a DataFrame (i.e., the similarity
    scores matrix).
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  id: totrans-108
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Figure [4-8](#Fig8) shows the user similarity scores data matrix.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537881_1_En_4_Chapter/537881_1_En_4_Fig8_HTML.png)'
  id: totrans-110
  prefs: []
  type: TYPE_IMG
- en: An output file depicts five rows of the user similarity score data. It depends
    on two values 0 and 1\. A value closer to 0 represents less similar and a value
    closer to 1 represents more similar customers.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-8
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
- en: User similarity scores DataFrame
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
- en: The similarity score values are between 0 to 1, where values closer to 0 represent
    less similar, and values closer to 1 represent more similar customers.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 相似度得分值介于0到1之间，其中接近0的值表示相似度较低，接近1的值表示相似客户较多。
- en: Using this user similarity scores data, let’s get recommendations for a given
    user.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 使用此用户相似度得分数据，让我们为给定用户获取推荐。
- en: Create a function for this.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 为此创建一个函数。
- en: '[PRE20]'
  id: totrans-117
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: This function separates the selected user from all other users and then takes
    a cosine similarity of the selected user with all users to find similar users.
    Return the top k similar users (by CustomerID) to our selected user.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 此函数将选定的用户与其他所有用户区分开来，然后计算选定用户与所有用户的余弦相似度，以找到相似用户。返回与选定用户最相似的k个用户（按CustomerID排序）。
- en: For example, let’s find the similar to user 12347.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，让我们找到与用户12347相似的客户。
- en: '[PRE21]'
  id: totrans-120
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: The following is the output.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的输出如下。
- en: '[PRE22]'
  id: totrans-122
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: As expected, the default five users are similar to user 12347.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 如预期的那样，默认的五位用户与用户12347相似。
- en: Now, let’s get the recommendations by showing the items bought by similar users.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们通过显示相似用户的购买商品来获取推荐。
- en: Write another function to get similar user recommendations.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 编写另一个函数以获取相似用户推荐。
- en: '[PRE23]'
  id: totrans-126
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: This function gets the similar users for the given customer (ID) and obtains
    a list of all the items bought by these similar users. This list is then flattened
    to get a final list of unique items, from which shows randomly chosen ten recommended
    items for a given user.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 此函数获取给定客户（ID）的相似用户，并获取这些相似用户购买的所有商品的列表。然后，此列表被展平以获取最终的商品唯一列表，从中随机选择十种推荐商品供给定用户。
- en: Using this function on user 12347 to get recommendations results in the following
    suggestions.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 使用此函数对用户12347进行推荐的结果如下所示。
- en: '[PRE24]'
  id: totrans-129
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: The following is the output.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的输出如下。
- en: '[PRE25]'
  id: totrans-131
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: User 12347 had ten suggestions from the items bought by similar users.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 用户12347从相似用户的购买商品中获得了十个建议。
- en: Item-to-Item Collaborative Filtering
  id: totrans-133
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 项目-项目协同过滤
- en: Item-to-item based collaborative filtering recommends items that a particular
    user might like by finding items similar to ones they already purchased and then
    creating a matrix profile for each item. Purchase history or user ratings are
    also used.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 基于项目的协同过滤推荐可能喜欢的项目，通过找到他们已经购买的商品的相似商品，并为每个商品创建一个矩阵配置文件。购买历史或用户评分也被使用。
- en: A matrix is formed to describe the behavior of all the users (purchase history
    in our example) corresponding to all the items. This matrix helps calculate the
    similarity metrics (cosine similarity) between items to formulate the item-item
    relations. This relation is used to recommend items similar to those previously
    purchased by the selected user.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 形成一个矩阵来描述所有用户（以我们的示例为例）对应所有商品的行为。此矩阵有助于计算项目之间的相似度度量（余弦相似度），以制定项目-项目关系。此关系用于推荐与选定用户之前购买的项目相似的项目。
- en: Implementation
  id: totrans-136
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 实现
- en: Following the initial steps used in user-to-user collaborative filtering methods,
    let’s first create the data matrix, which contains all the item IDs across their
    purchase history (i.e., quantity purchased by each customer).
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 在用户到用户协同过滤方法中使用的初始步骤之后，让我们首先创建数据矩阵，该矩阵包含所有商品ID及其购买历史（即每个客户的购买量）。
- en: '[PRE26]'
  id: totrans-138
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: The following is the output.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的输出如下。
- en: Figure [4-9](#Fig9) shows the item purchase data matrix.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 图[4-9](#Fig9)显示了商品购买数据矩阵。
- en: '![](../images/537881_1_En_4_Chapter/537881_1_En_4_Fig9_HTML.png)'
  id: totrans-141
  prefs: []
  type: TYPE_IMG
  zh: '![图4-9](../images/537881_1_En_4_Chapter/537881_1_En_4_Fig9_HTML.png)'
- en: An output file depicts an item purchased data matrix. It reveals the total quantity
    purchased by a single user against each item, depending on 0 or 1\. Value 0 represents
    not purchased and 1 purchased by the user.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 输出文件描述了一个购买数据矩阵。它显示了单个用户针对每个商品的购买总量，取决于0或1。值0表示未购买，值1表示用户已购买。
- en: Figure 4-9
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-9
- en: Item purchase data matrix
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 项目购买数据矩阵
- en: This data matrix shows the total quantity purchased by each user against each
    item. But the only information needed is whether the user bought the item.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 此数据矩阵显示了每个用户针对每个商品的购买总量。但所需的信息只是用户是否购买了该商品。
- en: Thus, an encoding of 0 or 1 is used, where 0 is not purchased, and 1 is purchased.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，使用0或1的编码，其中0表示未购买，1表示购买。
- en: Use the same encode_units function created earlier.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 使用之前创建的相同encode_units函数。
- en: '[PRE27]'
  id: totrans-148
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: The items purchase data matrix reveals the behavior of customers across all
    items. Let’s use this matrix to find item similarity scores with the cosine similarity
    metric. The item similarity score matrix has item-to-item similarity for each
    item pair.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
- en: First, let’s apply cosine_similarity to the item purchase data matrix.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE28]'
  id: totrans-151
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: Now, let’s store the item similarity scores in a DataFrame (i.e., the similarity
    scores matrix).
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE29]'
  id: totrans-153
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: Figure [4-10](#Fig10) shows the item similarity scores data matrix.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537881_1_En_4_Chapter/537881_1_En_4_Fig10_HTML.png)'
  id: totrans-155
  prefs: []
  type: TYPE_IMG
- en: An output file depicts the item similarity score data matrix. The similarity
    score is between 0 and 1\. Value 0 represents less similarity and closer to 1
    represents more similar items.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-10
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
- en: Item similarity scores DataFrame
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
- en: The similarity score values are between 0 and 1, where values closer to 0 represent
    less similarity and values closer to 1 represent more similar items.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
- en: Using this item similarity score data, let’s get recommendations for a given
    user.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
- en: The following creates a function for this.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE30]'
  id: totrans-162
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: This function separates the selected item from all other items and then takes
    a cosine similarity of the selected item with all items to find the similarities.
    Return the top k similar items (StockCodes) to our selected item.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
- en: For example, let’s find similar items for user 12347.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE31]'
  id: totrans-165
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: The following is the output.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE32]'
  id: totrans-167
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: As expected, you see the default ten similar items to item 10002.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s get the recommendations by showing similar items to those bought by
    a particular user.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
- en: Write another function to get similar item recommendations.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE33]'
  id: totrans-171
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: This function gets the list of similar items for all previously bought items
    by our given customer (ID). This list is then flattened to get a final list of
    unique items, from which randomly chosen ten items as recommendations for our
    given user are shown.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
- en: Again, trying this function on user 12347 to get the recommendations for that
    user results in the following suggestions.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE34]'
  id: totrans-174
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: The following is the output.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE35]'
  id: totrans-176
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: User 12347 has ten suggestions that are similar to items previously bought.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
- en: KNN-based Approach
  id: totrans-178
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You have learned the basics of collaborative filtering and implementing user-to-user
    and item-to-item filtering. Now let’s dive into machine learning-based approaches,
    which are more robust and popular in building recommendation systems.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
- en: Machine Learning
  id: totrans-180
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Machine learning is a machine’s capability to learn from experience (data) and
    make meaningful predictions without being explicitly programmed. It is a subfield
    of artificial intelligence that deals with building systems that can learn from
    data. The objective is to make computers learn on their own without any intervention
    from humans.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
- en: There are three primary machine learning categories.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
- en: Supervised Learning
  id: totrans-183
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: In supervised learning, labeled training data is leveraged to derive the pattern
    or function and make a model or machine learn. Data consists of a dependent variable
    (Target label) and the independent variables or predictors. The machine tries
    to learn the function of labeled data and predict the output of unseen data.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 在监督学习中，利用标记训练数据来推导模式或函数并使模型或机器学习。数据由一个依赖变量（目标标签）和独立变量或预测变量组成。机器试图学习标记数据的函数并预测未见数据的输出。
- en: Unsupervised Learning
  id: totrans-185
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 非监督学习
- en: In unsupervised learning, a machine learns the hidden pattern without leveraging
    labeled data, so training doesn’t happen. These algorithms learn to capture patterns
    based on similarities or distances between data points.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 在非监督学习中，机器学习隐藏模式而不利用标记数据，因此不进行训练。这些算法根据数据点之间的相似性或距离来学习捕获模式。
- en: Reinforcement Learning
  id: totrans-187
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 强化学习
- en: Reinforcement learning is the process of maximizing a reward by taking action.
    The algorithms learn how to reach a goal through experience.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习是通过采取行动来最大化奖励的过程。算法通过经验学习如何达到目标。
- en: Figure [4-11](#Fig11) explains all the categories and subcategories.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 图[4-11](#Fig11)解释了所有类别和子类别。
- en: '![](../images/537881_1_En_4_Chapter/537881_1_En_4_Fig11_HTML.png)'
  id: totrans-190
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/537881_1_En_4_Chapter/537881_1_En_4_Fig11_HTML.png)'
- en: An illustration depicts the categories and subcategories of machine learning
    supervised (regression, classification), unsupervised (clustering, dimensionally
    reduction), and reinforcement learning.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 一幅插图展示了机器学习监督（回归、分类）、非监督（聚类、降维）和强化学习的类别和子类别。
- en: Figure 4-11
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-11
- en: Machine learning categories
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习类别
- en: Supervised Learning
  id: totrans-194
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 监督学习
- en: 'There are two types of supervised learning: regression and classification.'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 监督学习有两种类型：回归和分类。
- en: Regression
  id: totrans-196
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 回归
- en: Regression is a statistical predictive modeling technique that finds the relationship
    between a dependent variable and one or more independent variables. Regression
    is used when the dependent variable is continuous; prediction can take any numerical
    value.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 回归是一种统计预测建模技术，它寻找依赖变量与一个或多个独立变量之间的关系。当依赖变量是连续的时，回归被使用；预测可以取任何数值。
- en: Popular regression algorithms include linear regression, decision tree, random
    forest, SVM, LightGBM, and XGBoost.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 流行的回归算法包括线性回归、决策树、随机森林、SVM、LightGBM和XGBoost。
- en: Classification
  id: totrans-199
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 分类
- en: Classification is a supervised machine learning technique in which the dependent
    or output variable is categorical; for example, spam/ham, churn/not churned, and
    so on.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 分类是监督机器学习技术，其中依赖变量或输出变量是分类的；例如，垃圾邮件/非垃圾邮件，流失/未流失，等等。
- en: In binary classification, it's either yes or no. There is no third option; for
    example, the customer can churn or not churn from a given business.
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在二元分类中，要么是是，要么是否。没有第三种选择；例如，客户可以从一个给定的业务中流失或未流失。
- en: In multiclass classification, the labeled variable can be multiclass, for example,
    product categorization of an e-commerce website.
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在多类分类中，标记变量可以是多类的，例如，电子商务网站的产品分类。
- en: Logistic regression, k-nearest neighbor, decision tree, random forest, SVM,
    LightGBM, and XGBoost are popular classification algorithms.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 逻辑回归、k-最近邻、决策树、随机森林、SVM、LightGBM和XGBoost是流行的分类算法。
- en: K-Nearest Neighbor
  id: totrans-204
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: K-最近邻
- en: The k-nearest neighbor (KNN) algorithm is a supervised machine learning model
    that is used for both classification and regression problems. It is a very robust
    algorithm that is easy to implement and interpret and uses less calculation time.
    Labeled data is needed since it’s a supervised learning algorithm.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: k-最近邻（KNN）算法是一种用于分类和回归问题的监督机器学习模型。它是一个非常稳健的算法，易于实现和解释，并且使用较少的计算时间。由于它是一个监督学习算法，需要标记数据。
- en: Figure [4-12](#Fig12) explains KNN algorithms.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 图[4-12](#Fig12)解释了KNN算法。
- en: '![](../images/537881_1_En_4_Chapter/537881_1_En_4_Fig12_HTML.png)'
  id: totrans-207
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/537881_1_En_4_Chapter/537881_1_En_4_Fig12_HTML.png)'
- en: A set of four illustrations depict the K N N algorithm. 1\. Look at the data
    (three potential classes). 2\. Calculate distances (between grey points and all
    other points). 3\. Find Neighbours. 4\. Vote on labels.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 一组四个插图描绘了KNN算法。1. 查看数据（三个潜在类别）。2. 计算距离（灰色点与其他所有点之间的距离）。3. 找到邻居。4. 投票标签。
- en: Figure 4-12
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-12
- en: KNN algorithm explained
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: KNN算法解释
- en: Now let’s try implementing a simple KNN model on purchase_df, created in user-to-user
    filtering. This approach follows similar steps you have seen before (i.e., base
    recommendations from a list of items purchased by similar users). The difference
    is that a KNN model finds similar users (for a given user).
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们尝试在user-to-user过滤中创建的purchase_df上实现一个简单的KNN模型。这种方法遵循你之前看到的类似步骤（即从相似用户购买的商品列表中生成基本推荐）。不同之处在于，KNN模型找到相似用户（对于给定用户）。
- en: Implementation
  id: totrans-212
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 实现
- en: Before passing our sparse matrix (i.e., purchase_df) into KNN, it must be converted
    into a CSR matrix.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 在将我们的稀疏矩阵（即purchase_df）传递给KNN之前，必须将其转换为CSR矩阵。
- en: CSR divides a sparse matrix into three separate arrays.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: CSR将稀疏矩阵划分为三个独立的数组。
- en: values
  id: totrans-215
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 值
- en: extent of rows
  id: totrans-216
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 行的范围
- en: index of columns
  id: totrans-217
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列的索引
- en: So, let’s convert the sparse matrix into a CSR matrix.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，让我们将稀疏矩阵转换为CSR矩阵。
- en: '[PRE36]'
  id: totrans-219
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: Next, create the KNN model using the Euclidean distance metric.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，使用欧几里得距离度量标准创建KNN模型。
- en: '[PRE37]'
  id: totrans-221
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: Once the model is created, fit it on the data/matrix.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 创建模型后，将其拟合到数据/矩阵上。
- en: '[PRE38]'
  id: totrans-223
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: Figure [4-13](#Fig13) shows the fitted KNN model.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 图[4-13](#Fig13)显示了拟合的KNN模型。
- en: '![](../images/537881_1_En_4_Chapter/537881_1_En_4_Fig13_HTML.jpg)'
  id: totrans-225
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../images/537881_1_En_4_Chapter/537881_1_En_4_Fig13_HTML.jpg)'
- en: A display of fitted K N N model. It reads nearest neighbors of the algorithm
    equals 'brute', and metric equals 'Euclidean'.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 拟合的KNN模型显示。它读取算法的最近邻为'brute'，度量标准为'Euclidean'。
- en: Figure 4-13
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-13
- en: Fitted KNN model
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 拟合的KNN模型
- en: Now that the KNN model is in place, let’s write a function to fetch similar
    users using the model.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 既然KNN模型已经就位，让我们编写一个函数来使用该模型获取相似用户。
- en: '[PRE39]'
  id: totrans-230
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: This function first calculates the distances and indices of the five nearest
    neighbors using our KNN model’s function. This output is then processed, and a
    list of similar users alone is returned. Instead of user_id as the input, take
    the index in the DataFrame.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 此函数首先使用我们的KNN模型函数计算五个最近邻的距离和索引。然后处理此输出，并仅返回相似用户列表。输入不是user_id，而是DataFrame中的索引。
- en: Let’s test this out for index 1497.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们测试索引1497。
- en: '[PRE40]'
  id: totrans-233
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: The following is the output.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的输出。
- en: '[PRE41]'
  id: totrans-235
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: The following is the output.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的输出。
- en: '[PRE42]'
  id: totrans-237
  prefs: []
  type: TYPE_PRE
  zh: '[PRE42]'
- en: Now that we have similar users, let’s get the recommendations by showing the
    items bought by these similar users.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 既然我们已经找到了相似用户，让我们通过展示这些相似用户购买的商品来获取推荐。
- en: Write a function to get similar user recommendations.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 编写一个获取相似用户推荐的函数。
- en: '[PRE43]'
  id: totrans-240
  prefs: []
  type: TYPE_PRE
  zh: '[PRE43]'
- en: This function replicates the logic used in user-to-user filtering. Next, let’s
    get the final list of items that similar users purchased and recommend any random
    ten items from it.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 此函数复制了用户到用户过滤中使用的逻辑。接下来，让我们获取相似用户购买的商品的最终列表，并从中推荐任意十个商品。
- en: Using this function on the previously generated similar users list gets the
    following recommendations.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 使用此函数对之前生成的相似用户列表进行操作，得到以下推荐。
- en: '[PRE44]'
  id: totrans-243
  prefs: []
  type: TYPE_PRE
  zh: '[PRE44]'
- en: The following is the output using the KNN approach.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的输出是使用KNN方法得到的。
- en: '[PRE45]'
  id: totrans-245
  prefs: []
  type: TYPE_PRE
  zh: '[PRE45]'
- en: User 14729 has ten suggestions from the products bought by similar users.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 用户14729有来自相似用户购买产品的十个建议。
- en: Summary
  id: totrans-247
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: This chapter covered collaborative filtering-based recommendation engines and
    implementing the two types of filtering methods—user-to-user and item-to-item—using
    basic arithmetic operations. The chapter also explored the k-nearest neighbor
    algorithm (along with some machine learning basics). It ended by implementing
    user-to-user-based collaborative filtering using the KNN approach. The next chapter
    explores other popular methods to implement collaborative filtering-based recommendation
    engines.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 本章介绍了基于协同过滤的推荐引擎及其实现两种过滤方法——用户到用户和项目到项目——使用基本的算术运算。本章还探讨了k最近邻算法（以及一些机器学习基础知识）。最后，通过KNN方法实现了基于用户到用户的协同过滤。下一章将探讨其他流行的实现基于协同过滤的推荐引擎的方法。
