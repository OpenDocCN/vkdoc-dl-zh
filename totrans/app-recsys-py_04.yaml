- en: 4. Collaborative Filtering
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Collaborative filtering is a very popular method in recommendation engines.
    It is the predictive process behind the suggestions provided by these systems.
    It processes and analyzes customers’ information and suggests items they will
    likely appreciate.
  prefs: []
  type: TYPE_NORMAL
- en: Collaborative filtering algorithms use a customer’s purchase history and ratings
    to find similar customers and then suggest items that they liked.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [4-1](#Fig1) explains collaborative filtering at a high level.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537881_1_En_4_Chapter/537881_1_En_4_Fig1_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 'An illustration of high-level collaborative filtering. It includes an example:
    A user who tastes pizza, burgers, and finger chips recommends the other user with
    similar tastes.'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-1
  prefs: []
  type: TYPE_NORMAL
- en: Collaborative filtering explained
  prefs: []
  type: TYPE_NORMAL
- en: For example, to find a new movie or show to watch, you can ask your friends
    for suggestions since you all share similar tastes in content. The same concept
    is used in collaborative filtering, where user-user similarity finds similar users
    to get recommendations based on each other’s likes.
  prefs: []
  type: TYPE_NORMAL
- en: There are two types of collaborative filtering methods—user-to-user and item-to-item.
    They are explored in the upcoming sections. This chapter looks at the implementation
    of these two methods using cosine similarity before diving into implementing the
    more popularly used KNN-based algorithm for collaborative filtering.
  prefs: []
  type: TYPE_NORMAL
