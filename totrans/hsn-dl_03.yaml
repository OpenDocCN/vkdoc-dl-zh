- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter introduced Neural Networks, which are the basis of Deep Learning
    models. The chapter began with an informed discussion on Single-Layer Perceptron
    and its limitations. It then moved to a discussion on Multi-layer Perceptron and
    the solution of the XOR problem. The chapter also discussed the feed-forward networks
    and the backpropagation algorithm for Neural Networks. Furthermore, topics such
    as the variation of performance with the learning rate and the depth of the network
    have been discussed in the chapter. The chapter includes the implementation of
    some important models that demonstrate the effect of these hyperparameters on
    the performance of the model. The next two chapters continue the discussion and
    introduce the reader to two important concepts, namely, bias and variance. The
    reader is requested to attempt the exercises to get hold of the concepts learned
    in the chapter.
  prefs: []
  type: TYPE_NORMAL
