- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Our brain receives signals via neurons, processes them, and generates responses.
    Generally, the receptors send information to the neurons, which is passed to the
    brain. The brain, in turn, processes these signals and sends the response to the
    effectors. This concept was given by Cajal [[1](#CR1)]. Though these neurons are
    slower than the logic gates, their magnitude helps us deal with the given situation
    quickly.
  prefs: []
  type: TYPE_NORMAL
- en: The structure of a neuron is shown in Figure [3-1](#Fig1). The dendrites act
    as receptor zones, the cell body processes the inputs, and the axons transmit
    the signals. The neurons are connected to each other via synapses.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_3_Chapter/611710_1_En_3_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-1
  prefs: []
  type: TYPE_NORMAL
- en: Picture of a neuron generated using AI ([`https://pixlr.com/image-generator/`](https://pixlr.com/image-generator/))
  prefs: []
  type: TYPE_NORMAL
- en: The computational model shown in Figure [3-2](#Fig2) is similar to the neuron.
    This model receives a two-dimensional input and classifies the input into one
    of the two classes.
  prefs: []
  type: TYPE_NORMAL
- en: It receives the inputs (*X*[1], *X*[2]) from the input nodes, multiplies them
    with the corresponding weights (*W*[1], *W*[2]), takes the summation, and passes
    it through a function. If the output of this function is greater than the threshold,
    then the output of the model becomes 1; else, it becomes 0\. This model can therefore
    act as a binary classifier.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_3_Chapter/611710_1_En_3_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-2
  prefs: []
  type: TYPE_NORMAL
- en: Computational model based on the structure of a neuron
  prefs: []
  type: TYPE_NORMAL
- en: 'The above model, referred to as Single-Layer Perceptron or SLP, can be extended
    to one that takes “d” inputs. The following points are worth noting as regards
    SLP:'
  prefs: []
  type: TYPE_NORMAL
- en: The number of neurons in the input layer is the same as the number of inputs.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The number of weights will be the same as the number of inputs, and each weight
    denotes the importance of that input.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The weighted sum presents the linear combination of the inputs and the weights.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The weighted sum added with the bias passes through an activation function.
    The activation functions are discussed in section “Activation Functions.”
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If the output of the last step is greater than the threshold, then the final
    output of the model is 1; else, it is 0.
  prefs: []
  type: TYPE_NORMAL
- en: The above model is referred to as the Rosenblatt Perceptron model named after
    Frank Rosenblatt [[2](#CR2)]. Now consider a simpler model in which the inputs
    are binary (either 0 or 1) and each of the weights has values that signify the
    importance of the input. The weights can be positive or negative, depicting excitatory
    or inhibitory connections. This model is referred to as the McCulloch and Pitts
    model [[3](#CR3)]. This model can be used to implement logic gates, wherein output
    can be classified using a linear hyperplane. Having seen the basics, let us now
    move to a detailed discussion on SLP.
  prefs: []
  type: TYPE_NORMAL
- en: Single-Layer Perceptron
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A Single-Layer Perceptron is a linear classifier. It can classify two classes
    that can be segregated using a line in the case of two dimensions, a plane in
    the case of three dimensions, and a hyperplane in the case of multiple dimensions.
    However, it cannot classify nonlinearly separable data. Let’s discuss how this
    classification can be done.
  prefs: []
  type: TYPE_NORMAL
- en: Consider Figure [3-3](#Fig3) having
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {X}_1,{X}_2,{X}_3,{X}_4\dots ..{X}_n $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equa.png)'
  prefs: []
  type: TYPE_IMG
- en: as inputs.
  prefs: []
  type: TYPE_NORMAL
- en: The corresponding weights are
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {W}_1,{W}_2,{W}_3,{W}_4\dots ..{W}_n. $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equb.png)'
  prefs: []
  type: TYPE_IMG
- en: The product of the inputs and the weights is summated, and a bias is added to
    the result. That is,
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {U}_i=\sum {W}_i{X}_i+b $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equc.png)'
  prefs: []
  type: TYPE_IMG
- en: 'This result *U*[*i*] passes through a non-linear activation function ”f” resulting
    in *V*[*i*]:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {V}_i=f\left({U}_i\right) $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equd.png)'
  prefs: []
  type: TYPE_IMG
- en: 'One of the most common activations used in the case of Neural Networks is the
    sigmoid function, which is given by the following equation:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ f(x)=\frac{1}{1+{e}^{-x}} $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Eque.png)'
  prefs: []
  type: TYPE_IMG
- en: The so-obtained value (*V*[*i*]) is passed through a threshold (in the case
    of classification). Note that the same model can be used for regression, in which
    case thresholding is not done. In this model, the weights and bias are initialized
    to random numbers and then updated in each iteration.
  prefs: []
  type: TYPE_NORMAL
- en: 'The formal algorithm of SLP is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: Initialize the weights (W) and biases (b) to random numbers between 0 and 1.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For each input sample *X*[*i*], calculate the net input as *U*[*i*] by taking
    the dot product of the input features and the weights and adding the bias, that
    is,
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![$$ \sum {W}_i{X}_i+b. $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equf.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Compute the activation value *V*[*i*] or ![$$ \hat{y} $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_IEq1.png)by
    passing the net input *U*[*i*] through a nonlinear activation function:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![$$ \hat{y}=f\left(\sum {W}_i{X}_i+b\right) $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equg.png)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Update the weights and bias using the formula
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![$$ W=W-\alpha\ f\left(1-f\right)\left(\hat{y}-y\right){X}_i, $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equh.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ b=b-\alpha\ f\left(1-f\right)\left(\hat{y}-y\right) $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equi.png)'
  prefs: []
  type: TYPE_IMG
- en: Repeat steps 2 to 4 till convergence is reached or the number of iterations
    becomes equal to the number of samples available.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Figure [3-3](#Fig3) shows the SLP model.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_3_Chapter/611710_1_En_3_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-3
  prefs: []
  type: TYPE_NORMAL
- en: Single-Layer Perceptron model
  prefs: []
  type: TYPE_NORMAL
- en: Here, gradient descent is used for updating the weights and bias in each iteration.
    This topic is discussed in the following sections.
  prefs: []
  type: TYPE_NORMAL
- en: Implementation of a SLP
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The following code implements SLP (Listing [3-1](#PC1)). The code uses the first
    100 samples of the popular IRIS dataset having four features. Each sample in the
    first 100 samples belongs to one of the two classes (binary classification) Setosa
    and Versicolor.
  prefs: []
  type: TYPE_NORMAL
- en: Let the weights corresponding to the four inputs be [w[1], w[2], w[3], w[4]]
    and the bias be b. The input to the output neuron would be the dot product of
    the weights and inputs, followed by the addition of bias. This sum is then passed
    through the activation function. The so-obtained output is compared with the expected
    output, and the squared error is evaluated.
  prefs: []
  type: TYPE_NORMAL
- en: The weights of the model are then updated in the following iterations, till
    there is no further change in the weights or for a pre-decided number of iterations.
  prefs: []
  type: TYPE_NORMAL
- en: The so-obtained weights are then used for predicting the class of an unseen
    sample for evaluating the given model.
  prefs: []
  type: TYPE_NORMAL
- en: Note that the hyperparameter α (learning rate) affects the performance of the
    model. The output shown in Figure [3-4](#Fig4) shows the variation of performance
    with α. Chapter [5](611710_1_En_5_Chapter.xhtml) discusses the hyperparameters
    of Neural Networks in detail.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_3_Chapter/611710_1_En_3_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-4
  prefs: []
  type: TYPE_NORMAL
- en: Variation of performance with learning rate
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: The following code (Listing [3-2](#PC2)) implements SLP using ***sklearn.linear_model.Perceptron***
    on the Breast Cancer dataset containing 569 samples and 30 features. Table [3-1](#Tab1)
    shows the functions used for implementing the SLP.
  prefs: []
  type: TYPE_NORMAL
- en: Table 3-1
  prefs: []
  type: TYPE_NORMAL
- en: sklearn Functions for Implementing Perceptron and Their Description
  prefs: []
  type: TYPE_NORMAL
- en: '| Function | Description |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| ***perceptron = Perceptron ()*** | Initializes the classification algorithm.
    |'
  prefs: []
  type: TYPE_TB
- en: '| ***perceptron.fit(X_train, y_train)*** | Fits or trains the model with the
    training set. |'
  prefs: []
  type: TYPE_TB
- en: '| ***perceptron.predict(X_test)*** | Predicts the class for each sample in
    X_test. |'
  prefs: []
  type: TYPE_TB
- en: '| ***accuracy_score(y_test, y_pred)*** | Calculates the accuracy of the model.
    |'
  prefs: []
  type: TYPE_TB
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Having seen the implementation by scratch and using ***sklearn***, let’s move
    to the implementation of SLP using ***Keras***. The following code (Listing [3-3](#PC3))
    implements the SLP using ***Keras*** on the Breast Cancer dataset having 30 features
    and 569 samples. A sequential model is created with a dense layer having a single
    neuron. The model is compiled with a stochastic gradient descent (SGD) optimizer,
    binary cross-entropy (loss function), and accuracy (metric). It is trained on
    training data for 50 epochs with a batch size of 32\. The model’s loss and accuracy
    on training and test sets are shown in Figure [3-5](#Fig5).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_3_Chapter/611710_1_En_3_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-5
  prefs: []
  type: TYPE_NORMAL
- en: Variation of loss and performance with the number of epochs (Listing [3-3](#PC3))
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: It can be seen that the loss decreases (in general) with the number of epochs
    and the performance improves. Let’s use SLP for classifying a slightly complex
    dataset.
  prefs: []
  type: TYPE_NORMAL
- en: The following code (Listing [3-4](#PC4)) implements the SLP using ***Keras***
    on **Myocardial Infarction Complications** having 1700 samples and 109 features
    after preprocessing the data. The architecture and the training process are the
    same as the previous model. The model’s loss and accuracy on training and test
    sets are shown in Figure [3-6](#Fig6).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_3_Chapter/611710_1_En_3_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-6
  prefs: []
  type: TYPE_NORMAL
- en: Variation of loss and performance with the number of epochs (Listing [3-4](#PC4))
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: The results of the above models are summarized in Table [3-2](#Tab2). In this
    case, the results are not perfect since this data is not linearly separable.
  prefs: []
  type: TYPE_NORMAL
- en: Table 3-2
  prefs: []
  type: TYPE_NORMAL
- en: Results of SLP with Two Different Datasets
  prefs: []
  type: TYPE_NORMAL
- en: '| SLP No. | Dataset | Model | Accuracy | Loss |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| 1. | Breast Cancer | SLP model_1 (with a single neuron in the output layer)
    | 0.907 | 84.899 |'
  prefs: []
  type: TYPE_TB
- en: '| 2. | Myocardial Infarction Complications | SLP model_1 (with a single neuron
    in the output layer) | 0.7697 | 57.6161 |'
  prefs: []
  type: TYPE_TB
- en: 'As stated earlier, SLP can classify linearly separable inputs. However, when
    the input is not linearly separable, SLP might not work well. Let us have a look
    at a famous problem that cannot be solved using SLP: the XOR problem.'
  prefs: []
  type: TYPE_NORMAL
- en: XOR Problem
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Assume that you have two input variables (binary), to be segregated into two
    classes as shown in Table [3-3](#Tab3).
  prefs: []
  type: TYPE_NORMAL
- en: Table 3-3
  prefs: []
  type: TYPE_NORMAL
- en: XOR Table
  prefs: []
  type: TYPE_NORMAL
- en: '| A | B | Y |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| 0 | 0 | 0 |'
  prefs: []
  type: TYPE_TB
- en: '| 0 | 1 | 1 |'
  prefs: []
  type: TYPE_TB
- en: '| 1 | 0 | 1 |'
  prefs: []
  type: TYPE_TB
- en: '| 1 | 1 | 0 |'
  prefs: []
  type: TYPE_TB
- en: Figure [3-7](#Fig7) shows the value of (A, B) and the corresponding values of
    Y. Y=0 is shown using circles and Y=1 using triangles. Note that the circles and
    triangles cannot be segregated using a single line.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_3_Chapter/611710_1_En_3_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-7
  prefs: []
  type: TYPE_NORMAL
- en: XOR problem
  prefs: []
  type: TYPE_NORMAL
- en: XOR Problem
  prefs: []
  type: TYPE_NORMAL
- en: The XOR problem requires a classifier to be created that can classify the outputs
    of the XOR function treating the inputs of this function as two dimensions.
  prefs: []
  type: TYPE_NORMAL
- en: Since the data is not linearly separable, we cannot use SLP to classify the
    data. The Multi-layer Perceptron, discussed later in the chapter, will help us
    in solving the XOR problem.
  prefs: []
  type: TYPE_NORMAL
- en: Activation functions play an important role in the recital of the model. Before
    proceeding further let us have a look at some of the most famous activation functions.
  prefs: []
  type: TYPE_NORMAL
- en: Activation Functions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This section presents a brief overview of the activation functions used in Neural
    Networks. The formula, range, derivative, and problems associated with each activation
    function are summarized in this section.
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Sigmoid
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The sigmoid activation function can be represented using the following equation:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ f(x)=\frac{1}{1+{e}^{-x}}. $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equj.png)'
  prefs: []
  type: TYPE_IMG
- en: The graph of this function is shown in Figure [3-8](#Fig8).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_3_Chapter/611710_1_En_3_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-8
  prefs: []
  type: TYPE_NORMAL
- en: Sigmoid activation function graph
  prefs: []
  type: TYPE_NORMAL
- en: It is a smooth and differentiable function whose output range is between 0 and
    1, which makes it suitable for representing output that depicts probabilities.
    However, it suffers from a vanishing gradient problem as discussed in Multi-layer
    Perceptron. This problem can slow down the learning process in the case of deeper
    networks; hence, newer activation functions like ReLU were later proposed by the
    researchers.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Tanh
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The tanh activation function can be represented using the following equation:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ f(x)=\frac{e^x-{e}^{-x}}{e^x+{e}^{-x}}. $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equk.png)'
  prefs: []
  type: TYPE_IMG
- en: The graph of this function is shown in Figure [3-9](#Fig9).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_3_Chapter/611710_1_En_3_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-9
  prefs: []
  type: TYPE_NORMAL
- en: Tanh activation function graph
  prefs: []
  type: TYPE_NORMAL
- en: It is a smooth and differentiable function having an output range between -1
    and 1\. This is zero-centered as against the sigmoid function. This function also
    suffers from the vanishing gradient problem.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Rectified Linear Unit (ReLU)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The ReLU activation function can be represented using the following equation:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ f(x)=\mathit{\max}\left(0,x\right). $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equl.png)'
  prefs: []
  type: TYPE_IMG
- en: The graph of this function is shown in Figure [3-10](#Fig10).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_3_Chapter/611710_1_En_3_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-10
  prefs: []
  type: TYPE_NORMAL
- en: ReLU activation function graph
  prefs: []
  type: TYPE_NORMAL
- en: This is one of the most computationally efficient activation functions whose
    output range is between 0 and infinity, and it handles the problem of vanishing
    gradient gracefully. One of the problems faced by using these functions is that
    **if the input is negative, then the output becomes zero**. In addition to this,
    if the output of these functions is not bounded, then it results in a problem
    called **exploding gradient**.
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Softmax
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In the case of multiclass classification problems, softmax is considered one
    of the best activation functions. In softmax the output of a particular neuron
    in the output layer is given by the following formula:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ f\left({x}_i\right)=\frac{e^{x_i}}{\sum_j{e}^{x_j}}. $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equm.png)'
  prefs: []
  type: TYPE_IMG
- en: The graph of this function is shown in Figure [3-11](#Fig11).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_3_Chapter/611710_1_En_3_Fig11_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-11
  prefs: []
  type: TYPE_NORMAL
- en: Softmax activation function graph
  prefs: []
  type: TYPE_NORMAL
- en: Note that the output range of each neuron is between 0 and 1 and these outputs
    may be considered as the probabilities whose sum is 1\. So the neuron having the
    highest probability may be selected as the output.
  prefs: []
  type: TYPE_NORMAL
- en: Multi-layer Perceptron
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We have already seen that a SLP forms a linear combination of input features
    and gives it as an argument to a nonlinear activation function. Now, imagine that
    various such combinations of input features are created in a layer, and they act
    as input to the next layer, thus creating a ***hierarchy of features***. The Multi-layer
    Perceptron does create a hierarchical feature representation and can handle nonlinearly
    separable data. Let’s begin with solving the XOR problem (nonlinearly separable
    data) using MLP.
  prefs: []
  type: TYPE_NORMAL
- en: Solving the XOR Problem Using Multi-layer Perceptron
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let us consider an **XOR** gate. We have already seen that it cannot be implemented
    by a SLP. However, **AND** and **OR** gates can be implemented using SLP. We have
    also seen earlier that a **NAND** gate can be created in the same way as an **AND**
    gate with negated inputs. Now, consider a network having two inputs *X*[1] and
    *X*[2]. You can easily create a SLP for the implementation of the **NAND** gate
    and **OR** gate as shown in Figure [3-12](#Fig12).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_3_Chapter/611710_1_En_3_Fig12_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-12
  prefs: []
  type: TYPE_NORMAL
- en: Implementing **NAND** and **OR** gates using SLP
  prefs: []
  type: TYPE_NORMAL
- en: To construct an **XOR** gate, the output of the above networks acts as an input
    to a neuron in the next layer, which implements the **AND** gate shown in Figure
    [3-13](#Fig13).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_3_Chapter/611710_1_En_3_Fig13_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-13
  prefs: []
  type: TYPE_NORMAL
- en: Implementing an XOR gate using **NAND**, **OR,** and **AND** gates
  prefs: []
  type: TYPE_NORMAL
- en: 'Let us see why the above construction is mathematically correct. As we understand
    XOR can be represented by the following Boolean expression:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Y=A\underset{\_}{B}+\underset{\_}{A}B $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equn.png)'
  prefs: []
  type: TYPE_IMG
- en: NAND can be represented as
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Y=\underset{\_}{A.B} $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equo.png)'
  prefs: []
  type: TYPE_IMG
- en: which can be written as follows (applying De Morgan’s Law).
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Y=\underset{\_}{A}+\underset{\_}{B} $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equp.png)'
  prefs: []
  type: TYPE_IMG
- en: Now, multiplying *A* + *B with Y*, we get
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Z=\left(\underset{\_}{A}+\underset{\_}{B}\right)\left(A+B\right) $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equq.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ Z=\underset{\_}{A}A+\underset{\_}{A}B+\underset{\_}{B}A+\underset{\_}{B}B
    $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equr.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ Z=\underset{\_}{A}B+A\underset{\_}{B} $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equs.png)'
  prefs: []
  type: TYPE_IMG
- en: which is the same as XOR. Therefore, it can be concluded that XOR can be perceived
    as **AND** of **NAND** and **OR**. Also, **NAND** and **OR** can be implemented
    by SLP. It implies that XOR can be recreated using two layers of SLP and can classify
    nonlinearly separable data.
  prefs: []
  type: TYPE_NORMAL
- en: Tip
  prefs: []
  type: TYPE_NORMAL
- en: The multi-layer Neural Network can classify nonlinearly separable data.
  prefs: []
  type: TYPE_NORMAL
- en: Architecture of MLP and Forward Pass
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A Multi-layer Perceptron has an input layer, an output layer, and at least one
    hidden layer. Figure [3-14](#Fig14) shows the architecture of a MLP having **n**
    inputs and a single output. Assume that there is only one hidden layer having
    **p** neurons.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_3_Chapter/611710_1_En_3_Fig14_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-14
  prefs: []
  type: TYPE_NORMAL
- en: Multi-layer Perceptron having n neurons in the input layer and a single neuron
    in the output layer
  prefs: []
  type: TYPE_NORMAL
- en: Let the inputs be *X*[1], *X*[2], *X*[3], *X*[4]…. . *X*[*n*] and the weights
    between the first and the second layer are *W*[*ij*]. Consider a particular neuron,
    say **p**, in the hidden layer.
  prefs: []
  type: TYPE_NORMAL
- en: 'At the p^(th) neuron in the hidden layer, the input features, multiplied by
    the corresponding weights, added with the bias become the input to the activation
    function:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {U}_p=\sum {X}_i{W}_{ip}+{b}_p $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equt.png)'
  prefs: []
  type: TYPE_IMG
- en: The output of the pth neuron can be represented as
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {V}_p=f\left({U}_p\right) $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equu.png)'
  prefs: []
  type: TYPE_IMG
- en: where f is the activation function. Likewise, the input to all the neurons in
    the hidden layer can be calculated.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now consider a neuron (q) at the output layer. The output of this neuron can
    be calculated as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {U}_q=\sum {V}_p{W}_{pq}+{b}_q $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equv.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {V}_q=f\left({U}_q\right) $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equw.png)'
  prefs: []
  type: TYPE_IMG
- en: At each layer, we process the input and calculate the output, which becomes
    the input to the next layer. This network would henceforth be referred to as **Feed-Forward
    Network**.
  prefs: []
  type: TYPE_NORMAL
- en: 'As an example, consider a network to classify the standard IRIS dataset having
    four features. From this dataset consider the first 100 samples, having two classes:
    Setosa and Versicolor. Let us develop a network to classify this dataset. The
    network has four neurons in the input layer, two neurons in the hidden layer (how?),
    and one neuron in the output layer, as shown in Figure [3-15](#Fig15). The weights
    from the input to the first hidden layer have 1 as superscript and those from
    hidden to the output have 2 as superscript.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_3_Chapter/611710_1_En_3_Fig15_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-15
  prefs: []
  type: TYPE_NORMAL
- en: Architecture of the network having four neurons in the input layer and two neurons
    in the hidden layer and a single neuron in the output layer
  prefs: []
  type: TYPE_NORMAL
- en: Let us now calculate the values of the outputs of each layer in the feed-forward
    pass, assuming that initial weights and bias are given.
  prefs: []
  type: TYPE_NORMAL
- en: '**Feed-Forward**'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {U}_1={\sum}_i{X}_i{w}_{i1}^1+{b}_1^1 $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equx.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {V}_1=f\left({\sum}_i{X}_i{w}_{i1}^1+{b}_1^1\right)=f\left(\left({X}_1\times
    {w}_{11}^1\right)+\left({X}_2\times {w}_{21}^1\right)+\left({X}_3\times {w}_{31}^1\right)+\left({X}_4\times
    {w}_{41}^1\right)+{b}_1^1\right) $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equy.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {U}_2={\sum}_i{X}_i{w}_{i2}^1+{b}_2^1 $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equz.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {V}_2=f\left({\sum}_i{X}_i{w}_{i2}^1+{b}_2^1\right)=f\left(\left({X}_1\times
    {w}_{12}^1\right)+\left({X}_2\times {w}_{22}^1\right)+\left({X}_3\times {w}_{32}^1\right)+\left({X}_4\times
    {w}_{42}^1\right)+{b}_2^1\right) $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equaa.png)'
  prefs: []
  type: TYPE_IMG
- en: Now the output of the network can be represented as
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {O}_i=f\left({\sum}_j{V}_j{w}_{j1}^2+{b}_1^2\right)=f\left(\left({V}_1\times
    {w}_{11}^2\right)+\left({V}_2\times {w}_{21}^2\right)+{b}_1^2\right) $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equab.png)'
  prefs: []
  type: TYPE_IMG
- en: The value obtained using the above calculations (forward pass) is the output
    of the network.
  prefs: []
  type: TYPE_NORMAL
- en: The output so obtained is then compared with the expected output, and error
    is calculated. This is followed by updating weights between the output and the
    hidden layer; the weights between the input and the hidden layer are then updated.
    The process is examined in the following section.
  prefs: []
  type: TYPE_NORMAL
- en: Gradient Descent
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In a conventional Machine Learning pipeline, you generally preprocess the given
    data, extract features out of it, select the relevant features, make predictions,
    and design a loss function that minimizes the difference between the expected
    and the predicted value. In each iteration, the model tries to minimize this loss.
    To accomplish this task, one of the methods that is commonly employed is the gradient
    descent method. To understand the method, let us consider a SLP in which the weights
    and bias are initialized to random values. These parameters are multiplied with
    input features to give a linear combination that passes through a nonlinear activation
    function to generate a predicted value. In the case of classification, thresholding
    is done after this step.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let the predicted value be ![$$ \hat{y}=f\left({W}^TX+b\right) $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_IEq2.png)
    and the loss function be ![$$ \frac{1}{2}{\left(\hat{y_i}-{y}_i\right)}^2 $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_IEq3.png),
    that is, the squared difference between the expected and the predicted value (1/2
    is multiplied for mathematical convenience). The gradient of loss with respect
    to weight can be calculated as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\partial L}{\partial W}=\frac{\partial\ \Big(\left(\frac{1}{2}{\left(\hat{y_i}-{y}_i\right)}^2\right)}{\partial
    W} $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equac.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ \frac{\partial L}{\partial W}=\frac{\partial \left(\frac{1}{2}{\left(f\left({W}^TX+b\right)-{y}_i\right)}^2\right)}{\partial
    W} $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equad.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ \frac{\partial L}{\partial W}=\left(f\left({W}^TX+b\right)-{y}_i\right)\times
    f\left(1-f\right)\times X $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equae.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The weights are then updated using the following formula:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {W}_{new}={W}_{old}-\propto \frac{\partial L}{\partial W} $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equaf.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Here, *W*[*old*] is the value of weight in the previous iteration (some random
    value), and ![$$ \frac{\partial L}{\partial W} $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_IEq4.png)is
    calculated in the previous step. ∝ is the learning rate that determines the step
    size. If the value of ∝ is very small, then it will take a large amount of time
    to reach the optimal value. On the other hand, if the value of ∝ is very large,
    then it might skip the local minima. The formula for updating the value of bias
    is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {b}_{new}={b}_{old}-\propto \left(\hat{y_i}-{y}_i\right)\ f\left(1-f\right).
    $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equag.png)'
  prefs: []
  type: TYPE_IMG
- en: The above procedure can be used to find the weights in each iteration for a
    single-layer Neural Network. However, for multiple layers updating the weights
    becomes problematic as explained earlier. For updating weights in a MLP, first
    start with the outermost layer. Update the weights using the above algorithm.
    Once we have updated the weights, we move backward and update the weights of the
    second last layer using the backpropagation algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: Backpropagation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Once we calculate the squared error by taking the square of the difference
    between the expected and the obtained value, we then proceed to update the weights
    of the network. To do so, we first update the weights between the output and the
    hidden layer using the formula obtained using gradient descent in the previous
    section. This is followed by updating the weights of the hidden layer using the
    backpropagation algorithm:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {W}_{ij}^k={W}_{ij}^k-\eta {\delta}_j^k{O}_i^{k-1} $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equah.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {\delta}_j^k={O}_j^k\left(1-{O}_j^k\right)\left({O}_j^k-{t}_j\right) $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equai.png)'
  prefs: []
  type: TYPE_IMG
- en: Let’s have a look at the backpropagation algorithm for learning the weights
    of the hidden layer.
  prefs: []
  type: TYPE_NORMAL
- en: '**Backpropagation Algorithm**'
  prefs: []
  type: TYPE_NORMAL
- en: Initialize the weights and biases for each layer with small random values.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For each layer (forward pass)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Calculate the weighted sum of inputs for each neuron: ∑*X*[*i*]*W*[*ij*] + *b*.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Apply the activation function *f* (∑*X*[*i*]*W*[*ij*] + *b*) to generate the
    output of that layer.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Calculate the error at the output layer: ![$$ \frac{1}{2}{\left(\hat{y_i}-{y}_i\right)}^2
    $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_IEq5.png)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Calculate the gradient of loss for weights: ![$$ \frac{\partial L}{\partial
    W}=\frac{\partial\ \Big(\left(\frac{1}{2}{\left(\hat{y_i}-{y}_i\right)}^2\right)}{\partial
    W} $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_IEq6.png)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Update the weights of the last layer using the computed gradient and with a
    learning rate ∝: ![$$ {W}_{new}={W}_{old}-\propto \frac{\partial L}{\partial W}
    $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_IEq7.png)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Update the weights of the hidden layer using the following equation.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'For any hidden layer weight: ![$$ {W}_{ij}^k $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_IEq8.png)'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {W}_{ij}^k={W}_{ij}^k-\eta {\delta}_i^k{O}_j^{k-1} $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equaj.png)'
  prefs: []
  type: TYPE_IMG
- en: where
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\delta}_i^k={O}_i^k\left(1-{O}_i^k\right){\sum}_{j=1}^{M_{k+1}}{\partial}_j^{k+1}{W}_{ij}^{k+1}
    $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equak.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {\partial}_j^{k+1}={O}_j^{k+1}\left(1-{O}_j^{k+1}\right)\left({O}_j^{k+1}-{t}_j\right)
    $$](../images/611710_1_En_3_Chapter/611710_1_En_3_Chapter_TeX_Equal.png)'
  prefs: []
  type: TYPE_IMG
- en: Repeat the forward and backward pass for a predefined number of epochs or until
    convergence.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Implementation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The MLPs must contain at least one hidden layer. However, they can have multiple
    hidden layers as well. Note that the
  prefs: []
  type: TYPE_NORMAL
- en: Number of hidden layers
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Number of neurons in the hidden layer
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Activation function
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Learning rate
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: are some of the important hyperparameters in the case of MLPs. One of the ways
    of determining these hyperparameters is empirical analysis. The topic is dealt
    with in Chapter [5](611710_1_En_5_Chapter.xhtml).
  prefs: []
  type: TYPE_NORMAL
- en: To understand this, let us take an example. The example that follows classifies
    the wine dataset’s first two classes having 13 features and 130 samples (Listing
    [3-5](#PC5)). Note that the implementation that follows uses the ***sklearn.neural_network.MLPClassifier***
    function of the ***sklearn*** module. Two models have been created, one with the
    default number of neurons in the single hidden layer, that is, 100, and the other
    with only 3 neurons in the hidden layer.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Note that the model gives an accuracy of 92.3% with 100 neurons in the hidden
    layer and 80.76% with 3 neurons in the hidden layer. Neural Networks can have
    more than one hidden layer as well. The number of hidden layers and the number
    of neurons in each hidden layer can be found by various methods, one of which
    is empirical analysis. To understand this, consider the Breast Cancer dataset
    having 30 features and 569 samples. The following code implements two different
    models (Listings [3-6](#PC6) and [3-7](#PC7)). The first model has a single hidden
    layer of 16 neurons, whereas the second model has two hidden layers of 16 and
    8 neurons, respectively. By analyzing the results, one can infer that near-optimal
    performance can be obtained by multiple hidden layers or a single layer. However,
    the total number of parameters is different in both the cases. The following implementations
    also analyze the performance of the model by varying the learning rate and optimizers.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Figure [3-16](#Fig16) (left) shows the variation of training and validation
    loss with the number of epochs, and Figure [3-16](#Fig16) (right) shows the variation
    of performance with the number of epochs for model 1.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_3_Chapter/611710_1_En_3_Fig16_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-16
  prefs: []
  type: TYPE_NORMAL
- en: Training and validation loss and accuracy variation with number of epochs
  prefs: []
  type: TYPE_NORMAL
- en: Figure
  prefs: []
  type: TYPE_NORMAL
- en: The choice of different optimizers also affects the performance of a model and
    the variation in the loss. As you can see in Figures [3-17](#Fig17), [3-18](#Fig18),
    and [3-19](#Fig19), the variation of performance and loss with the learning rate
    with different optimizers gives different results. For this particular dataset
    and this model, the performance does not change with the learning rate in the
    case of stochastic gradient descent. However, the variation of loss is noticeable.
    In the case of RMSprop and Adam with the same model, the accuracy touches 90%
    on a learning rate of 10^(-1). However, the variation of loss is stable.
  prefs: []
  type: TYPE_NORMAL
- en: '**Stochastic Gradient Descent**'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_3_Chapter/611710_1_En_3_Fig17_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-17
  prefs: []
  type: TYPE_NORMAL
- en: Variation of loss and accuracy with learning rate for the stochastic gradient
    descent optimizer
  prefs: []
  type: TYPE_NORMAL
- en: '**RMSprop**'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_3_Chapter/611710_1_En_3_Fig18_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-18
  prefs: []
  type: TYPE_NORMAL
- en: Variation of loss and accuracy with learning rate for the RMSprop optimizer
  prefs: []
  type: TYPE_NORMAL
- en: '**Adam**'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_3_Chapter/611710_1_En_3_Fig19_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-19
  prefs: []
  type: TYPE_NORMAL
- en: Variation of loss and accuracy with learning rate for the Adam optimizer
  prefs: []
  type: TYPE_NORMAL
- en: Now let us move to the implementation of Multi-layer Perceptron to classify
    the Breast Cancer dataset with two hidden layers using the ***Keras*** module
    (Listing [3-7](#PC7)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: '![](../images/611710_1_En_3_Chapter/611710_1_En_3_Fig20_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-20
  prefs: []
  type: TYPE_NORMAL
- en: Training and validation loss and accuracy variation with number of epochs
  prefs: []
  type: TYPE_NORMAL
- en: Figure [3-20](#Fig20) (left) shows the variation of training and validation
    loss with the number of epochs, and Figure [3-20](#Fig20) (right) shows the variation
    of performance with the number of epochs for model 2.
  prefs: []
  type: TYPE_NORMAL
- en: Here the model is trained through 50 epochs. Note that on increasing the number
    of epochs, the loss should decrease, whereas the performance should increase.
    The results are summarized in Table [3-4](#Tab4).
  prefs: []
