  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数来从 TFRecord 文件构建输入管道，如列表 [5-14](#PC64) 所示。
- en: '[PRE63]'
  id: totrans-250
  prefs: []
  type: TYPE_PRE
  zh: '[PRE63]'
- en: The function accepts TFRecord files and calls the *load_dataset* function. The
    function continues by building an input pipeline by caching, repeating, shuffling,
    batching, and prefetching the dataset. Repeating and shuffling are only mapped
    to training data. We follow best practices by repeating and shuffling only the
    training data.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 函数接受 TFRecord 文件并调用 *load_dataset* 函数。函数接着通过缓存、重复、打乱、分批和预取数据集来构建输入管道。重复和打乱仅映射到训练数据。我们遵循最佳实践，只对训练数据进行重复和打乱。
