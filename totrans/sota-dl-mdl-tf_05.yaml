    has 230 data items.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 数据项（花卉图像）的数量写在 TFRecord 文件的名字中。例如，TFRecord 文件 b’gs://flowers-public/tfrecords-jpeg-192x192-2/flowers02-*230*.tfrec’
    有 230 个数据项。
