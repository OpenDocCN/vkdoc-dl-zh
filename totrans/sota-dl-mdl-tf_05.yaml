- en: Flowers Experiment
  id: totrans-214
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 花卉实验
- en: The flowers dataset is not that large, but images are much more complex than
    those in Fashion-MNIST. Flower images contain many more pixels than the other
    datasets in this chapter. We believe that it is great practice to work with a
    complex dataset like flowers.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 花卉数据集并不大，但图像比Fashion-MNIST中的图像复杂得多。花卉图像包含比本章中其他数据集更多的像素。我们认为，与花卉这样的复杂数据集一起工作是非常好的实践。
- en: TPUs are very fast. So the training data streaming into the model must keep
    pace with the training speed of the model to fully leverage the power of TPUs.
    The preferred method for TPU usage is to store data into the protobuf-based TFRecord
    format. The *TFRecord format* stores data in a sequence of binary strings as TFRecords.
    Binary strings are storage and data transfer efficient.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: TPUs非常快。因此，流入模型的数据流必须与模型的训练速度保持一致，以充分利用TPUs的强大功能。TPU使用的首选方法是存储数据到基于protobuf的TFRecord格式。*TFRecord格式*将数据存储为一系列二进制字符串作为TFRecords。二进制字符串在存储和数据传输方面效率高。
- en: The flowers dataset is stored on the Google Cloud Storage (GCS) as TFRecords.
    To fully apply the parallelism that TPUs offer and to avoid bottlenecking on data
    transfer, we read data as TFRecord files with approximately 230 images per file.
    The number of 230 is used to equally distribute flowers data into several buckets.
    We discovered this number through experimentation. We use tf.data.experimental.AUTOTUNE
    to optimize different parts of input loading. We use AUTOTUNE for this experiment
    because the dataset contains complex images. This optimization technique wasn’t
    necessary for the earlier experiments.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 花卉数据集存储在 Google Cloud Storage（GCS）上作为 TFRecords。为了充分利用 TPU 提供的并行性并避免数据传输瓶颈，我们以每文件约
    230 张图像的方式读取数据。230 这个数字用于将花卉数据均匀分配到几个桶中。我们通过实验发现了这个数字。我们使用 tf.data.experimental.AUTOTUNE
    来优化输入加载的不同部分。我们在这个实验中使用 AUTOTUNE 是因为数据集包含复杂的图像。这种优化技术对早期的实验不是必需的。
- en: For a nice tutorial on TPUs in Colab, peruse
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 对于 Colab 中的 TPU 教程，请参阅
- en: '[`https://colab.research.google.com/notebooks/tpu.ipynb`](https://colab.research.google.com/notebooks/tpu.ipynb)'
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: '[Colab 中的 TPU 教程](https://colab.research.google.com/notebooks/tpu.ipynb)'
- en: For a nice introduction to TPU data pipeline processing, peruse
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 对于 TPU 数据管道处理的良好介绍，请参阅
- en: '[`https://codelabs.developers.google.com/codelabs/keras-flowers-data`](https://codelabs.developers.google.com/codelabs/keras-flowers-data)'
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: '[Keras 花卉数据代码实验室](https://codelabs.developers.google.com/codelabs/keras-flowers-data)'
