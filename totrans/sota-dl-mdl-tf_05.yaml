- en: We import the loss function to reduce the characters included in the model.
    If we didn’t do this, we would have to tell the model where the loss function
    resides. So we would have to include the entire library name. We include this
    code as an alternative to what we did in previous experiments.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 我们导入损失函数以减少模型中包含的字符数。如果我们不这样做，我们就必须告诉模型损失函数的位置。因此，我们必须包括整个库的名称。我们将此代码作为之前实验中做法的替代方案。
