  zh: 获取桶的数量：
- en: '[PRE55]'
  id: totrans-226
  prefs: []
  type: TYPE_PRE
  zh: '[PRE55]'
- en: Images are contained in 16 buckets (or TFRecord files). We know from earlier
    flower experiments that there are 3670 images in the flowers dataset. The first
    15 TFRecord files contain 230 images each, and the final TFRecord file contains
    220 images.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 图像包含在 16 个桶（或 TFRecord 文件）中。我们知道从早期的花卉实验中，花卉数据集中有 3670 张图像。前 15 个 TFRecord 文件每个包含
    230 张图像，最后一个 TFRecord 文件包含 220 张图像。
