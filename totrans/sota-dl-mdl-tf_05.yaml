- en: Create a Distribution Strategy
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A **distribution strategy** is an abstraction used to distribute training across
    multiple CPUs, GPUs, or TPUs. To change how a model runs on a given device, simply
    swap out the distribution strategy. The *tf.distribute.Strategy* is the TensorFlow
    API for applying a distribution strategy to a model. Applying this API allows
    us to distribute training for existing models across multiple devices with minimal
    code changes.
  prefs: []
  type: TYPE_NORMAL
- en: 'The API is designed with three key goals in mind:'
  prefs: []
  type: TYPE_NORMAL
- en: '* Easy to use and support for multiple user segments (e.g., data scientists)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* Provides good performance out of the box'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* Easy switching between strategies'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Create a TPU strategy for this notebook:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
