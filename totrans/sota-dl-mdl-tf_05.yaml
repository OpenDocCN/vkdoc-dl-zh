  zh: 在 TPU 策略范围内，创建并编译，如列表 [5-6](#PC33) 所示。
- en: '[PRE32]'
  id: totrans-156
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: Creating the model within the TPUStrategy scope means that we train the model
    on the TPU system. The idea is to leverage a TPU to speed up learning. In industry,
    we have to work with systems engineers to take advantage of parallel processing
    between multiple TPUs and other memory sources. Experiment with *steps_per_execution*.
    Anything between 2 and *steps_per_epoch* could improve performance.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 在 TPUStrategy 范围内创建模型意味着我们在TPU系统上训练模型。这个想法是利用TPU来加速学习。在工业界，我们必须与系统工程师合作，以利用多个TPU和其他内存源之间的并行处理。尝试
    *steps_per_execution*。介于2和 *steps_per_epoch* 之间的任何值都可能提高性能。
