- en: Tip
  prefs: []
  type: TYPE_NORMAL
- en: If you get the error **NAME ‘TF’ IS NOT DEFINED**, re-execute the code to import
    the TensorFlow library! For some reason, we sometimes have to re-execute the TensorFlow
    library import in Colab. We don’t know why this is the case.
  prefs: []
  type: TYPE_NORMAL
- en: The *tf.distribute.cluster_resolver.TPUClusterResolver()* API is the Cluster
    Resolver for Google Cloud TPU. *Cluster Resolvers* provide a way for TensorFlow
    to communicate with various cluster management systems (e.g., GCE, AWS, etc.)
    and access necessary information to set up distributed training. By letting TensorFlow
    communicate with these systems, it is able to automatically discover and resolve
    IP addresses for various TensorFlow workers. So it is able to eventually automatically
    recover from underlying machine failures and scale TensorFlow worker clusters
    up and down system pipelines.
  prefs: []
  type: TYPE_NORMAL
