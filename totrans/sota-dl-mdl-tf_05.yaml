- en: '[PRE60]'
  prefs: []
  type: TYPE_PRE
- en: The function accepts an example from a TFRecord file. A dictionary holds datatypes
    common to TFRecords. The tf.string API converts an image to byte strings (list
    of bytes). The tf.int64 API converts a class label to a 64-bit integer scalar
    value. The example is parsed into (image, label) tuples. The image element (a
    JPEG-encoded image) is decoded into a uint8 image tensor. The image tensor is
    scaled to the [0, 1] range for faster training. It is then reshaped to a standard
    size for model consumption. The class label element is cast to a scalar.
  prefs: []
  type: TYPE_NORMAL
