  zh: '[PRE42]'
- en: Within the TPU strategy scope, create and compile the model as shown in Listing
    [5-8](#PC44).
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 在TPU策略范围内，创建并编译模型，如列表[5-8](#PC44)所示。
- en: '[PRE43]'
