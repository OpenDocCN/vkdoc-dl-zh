  prefs: []
  type: TYPE_NORMAL
- en: Manual Device Placement
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: After the TPU system is initialized, we can use manual device placement to direct
    computation on a single TPU device as shown in Listing [5-1](#PC6).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Multiply matrix a by matrix b and place the result in matrix c within the scope
    of TPU device 7\. Next, multiply matrix c by the Identity matrix and place the
    result in matrix d within the scope of TPU device 6.
  prefs: []
  type: TYPE_NORMAL
- en: Run a Computation in All TPU Cores
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To replicate a computation so it can run in all TPU cores, pass it to the *strategy.run*
    API:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Create a function that multiplies two matrices. If eager behavior is enabled,
    make the function a *tf.function* or call *strategy.run* inside a tf.function.
    Eager behavior is automatically enabled in Colab!
  prefs: []
  type: TYPE_NORMAL
- en: Invoke the function with the *strategy.run* API we create, which ensures that
    all the TPU cores obtain the same inputs (a, b) and matmul is applied on each
    core independently. The outputs are the values from all of the core replicas.
  prefs: []
  type: TYPE_NORMAL
- en: Eager Execution
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Eager execution must be enabled for Cloud TPU to operate. *Eager execution*
    (or eager behavior) is an imperative programming environment because it evaluates
    operations immediately without building graphs. So TensorFlow operations return
    concrete values instead of constructing a computational graph to run later. It
    also offers an intuitive interface that allows you to structure code naturally
    and use Python data structures. Other benefits include quick iteration on small
    models and small data and easier debugging because you can call ops directly to
    inspect running models and test changes.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: Eager execution is enabled by default in TensorFlow 2.x.
  prefs: []
  type: TYPE_NORMAL
- en: Experiments
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We include four Cloud TPU experiments. Experiments begin with simple datasets
    and progress to more complex ones. The importance of working with multiple datasets
    is to gain experience and confidence. Each dataset is different, so the experiments
    are a bit different. The learning process is generally the same, but each dataset
    has different characteristics. The main reason we present multiple experiences
    is to give you more practice. We have found, through working with seminar participants,
    that they learn faster by working with multiple datasets and they also enjoy the
    learning experience much more!
  prefs: []
  type: TYPE_NORMAL
- en: Digits Experiment
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The *digits* dataset is embedded in the *sklearn.datasets* package. It consists
    of 1,797 8 × 8 images of handwritten digits from 0 to 9\. *Scikit-learn* (also
    known as sklearn) is a ML library in Python. It contains a few small standard
    datasets (e.g., digits) that do not require to download any file from an external
    website.
  prefs: []
  type: TYPE_NORMAL
