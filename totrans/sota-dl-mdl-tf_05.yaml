- en: To train a model in the Cloud TPU, we must create and compile it inside the
    TPU strategy scope we created earlier in the chapter.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 要在Cloud TPU上训练一个模型，我们必须在章节中之前创建的TPU策略范围内创建和编译它。
- en: 'Inspect the model:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 检查模型：
- en: '[PRE21]'
  id: totrans-125
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: 'Train the model:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 训练模型：
- en: '[PRE22]'
  id: totrans-127
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: We can train a model with as many or as few epochs as we wish. However, large
    datasets consume memory much faster than small ones. Since digits is very small
    and images are simple, we can train on more epochs with little worry about memory
    consumption. Keep in mind that we arrived at 60 epochs through a lot of experimentation.
    This is why we encourage you to practice a lot!
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以用我们想要的任何多或少个epoch来训练一个模型。然而，大数据集比小数据集消耗内存要快得多。由于digits非常小且图像简单，我们可以放心地使用更多epoch进行训练，而不必担心内存消耗。记住，我们通过大量的实验达到了60个epoch。这就是我们鼓励你多练习的原因！
- en: MNIST Experiment
  id: totrans-129
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: MNIST实验
- en: Although MNIST is being replaced by Fashion-MNIST for deep learning practice,
    it is still much larger than the digits dataset.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然MNIST正在被Fashion-MNIST取代用于深度学习实践，但它仍然比数字数据集大得多。
- en: 'Load the dataset as a TFDS object:'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 将数据集作为 TFDS 对象加载：
- en: '[PRE23]'
  id: totrans-132
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: We leave it to you to explore the metadata since we’ve already described this
    dataset object in detail in an earlier chapter.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将其留给你去探索元数据，因为我们已经在早期章节中详细描述了此数据集对象。
- en: Build the Input Pipeline
  id: totrans-134
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建输入管道
- en: 'Create a function to scale the data:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数来缩放数据：
- en: '[PRE24]'
  id: totrans-136
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: 'Build the pipeline:'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 构建管道：
- en: '[PRE25]'
  id: totrans-138
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: Only shuffle and repeat the training dataset. The *repeat()* method repeats
    the dataset count *n* number of times. If no number is included, the dataset count
    is infinite. The advantage of an infinite dataset for training is to avoid the
    potential last partial batch in each epoch so users don’t need to think about
    scaling the gradients based on the actual batch size. Since the model only learns
    from the training set, we don’t shuffle and repeat the test set.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 仅对训练数据集进行洗牌和重复。*repeat()* 方法将数据集计数重复 *n* 次。如果没有包含数字，则数据集计数是无限的。无限数据集用于训练的优势是避免每个epoch中潜在的最后一个部分批次，这样用户就不需要根据实际的批次大小调整梯度缩放。由于模型只从训练集中学习，所以我们不对测试集进行洗牌和重复。
- en: Model Data Within TPU Scope
  id: totrans-140
  prefs:
