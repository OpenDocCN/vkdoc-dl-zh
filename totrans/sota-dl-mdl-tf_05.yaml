- en: Create Functions to Load and Process TFRecord Files
  id: totrans-240
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建加载和处理 TFRecord 文件的函数
- en: Create a function to parse a TFRecord file as shown in Listing [5-12](#PC61).
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数来解析 TFRecord 文件，如列表 [5-12](#PC61) 所示。
- en: '[PRE60]'
  id: totrans-242
  prefs: []
  type: TYPE_PRE
  zh: '[PRE60]'
- en: The function accepts an example from a TFRecord file. A dictionary holds datatypes
    common to TFRecords. The tf.string API converts an image to byte strings (list
    of bytes). The tf.int64 API converts a class label to a 64-bit integer scalar
    value. The example is parsed into (image, label) tuples. The image element (a
    JPEG-encoded image) is decoded into a uint8 image tensor. The image tensor is
    scaled to the [0, 1] range for faster training. It is then reshaped to a standard
    size for model consumption. The class label element is cast to a scalar.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 该函数接受来自 TFRecord 文件的示例。一个字典包含 TFRecords 中常见的数据类型。tf.string API 将图像转换为字节字符串（字节列表）。tf.int64
    API 将类别标签转换为 64 位整数标量值。示例被解析为（图像，标签）元组。图像元素（一个 JPEG 编码的图像）被解码为一个 uint8 图像张量。图像张量被缩放到
    [0, 1] 范围以提高训练速度。然后将其重塑为模型消费的标准大小。类别标签元素被转换为标量。
- en: Create a function to load TFRecord files as a tf.data.Dataset as shown in Listing
    [5-13](#PC62).
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数来将 TFRecord 文件作为 tf.data.Dataset 加载，如列表 [5-13](#PC62) 所示。
- en: '[PRE61]'
  id: totrans-245
  prefs: []
  type: TYPE_PRE
  zh: '[PRE61]'
- en: The function accepts TFRecord files. For optimal performance, code is included
    to read from multiple TFRecord files at once. The options setting allows order-altering
    optimizations. As such, *n* files are read in parallel, and data order is disregarded
    in favor of reading speed.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 函数接受 TFRecord 文件。为了获得最佳性能，代码中包含了同时读取多个 TFRecord 文件的实现。选项设置允许改变顺序的优化。因此，*n* 个文件并行读取，并为了读取速度而忽略数据顺序。
