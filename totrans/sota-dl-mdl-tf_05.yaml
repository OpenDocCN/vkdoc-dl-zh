  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: '**Batch normalization** is a technique for training very deep neural networks
    that standardizes the inputs to a layer for each mini-batch. The technique stabilizes
    the learning process and dramatically reduces the number of training epochs required
    to train deep networks.'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: '**批量归一化**是一种用于训练非常深的神经网络的技巧，它为每个小批量标准化层的输入。该技术稳定了学习过程，显著减少了训练深度网络所需的训练周期数。'
- en: 'Clear and seed:'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 清除和设置随机种子：
- en: '[PRE42]'
  id: totrans-184
