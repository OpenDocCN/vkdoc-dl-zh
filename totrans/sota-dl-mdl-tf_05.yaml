- en: 5. Introduction to Tensor Processing Units
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 5. 张量处理单元简介
- en: We introduce you to Tensor Processing Units with code examples. A **Tensor Processing
    Unit (TPU)** is an application-specific integrated circuit (ASIC) designed to
    accelerate ML workloads. The TPUs available in TensorFlow are custom-developed
    from the ground up by the Google Brain team based on its plethora of experience
    and leadership in the ML community. *Google Brain* is a deep learning artificial
    intelligence (AI) research team at Google who research ways to make machines intelligent
    for the improvement of people’s lives.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过代码示例向您介绍张量处理单元。**张量处理单元（TPU）**是一种专为加速机器学习工作负载而设计的专用集成电路（ASIC）。TensorFlow中可用的TPU是由Google
    Brain团队从头开始定制开发的，基于其在机器学习社区中的丰富经验和领导地位。“Google Brain”是谷歌的一个深度学习人工智能（AI）研究团队，他们研究使机器智能以改善人们生活的途径。
- en: 'Notebooks for chapters are located at the following URL:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 各章节的Notebooks位于以下URL：
- en: '[`https://github.com/paperd/deep-learning-models`](https://github.com/paperd/tensorflow)'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://github.com/paperd/deep-learning-models](https://github.com/paperd/tensorflow)'
- en: TPU Hardware Accelerator
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: TPU硬件加速器
- en: We demonstrate learning experiments with the TPU hardware accelerator available
    from the Google Colab cloud service. Our examples do not demonstrate the full
    efficacy of a TPU, but are provided to get you started. We use high-level TensorFlow
    APIs to get models running on Cloud TPU hardware.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我们展示了使用来自Google Colab云服务的TPU硬件加速器的学习实验。我们的示例并不展示TPU的全部功效，但可以为您提供一个起点。我们使用高级TensorFlow
    API在Cloud TPU硬件上运行模型。
- en: The hardware accelerator we use in Colab is commonly referred to as Cloud TPU.
    *Cloud TPU* is designed to run cutting-edge ML models with AI services on Google
    Cloud. It enables processing of ML workloads on Google’s TPU accelerator hardware
    using TensorFlow. Its custom high-speed network offers over 100 petaflops of performance
    in a single pod, which is enough computational power to transform a business to
    AI-ready or create the next research breakthrough. Cloud TPU is designed for maximum
    performance and flexibility to help researchers, developers, and businesses build
    TensorFlow compute clusters that can leverage CPUs, GPUs, and TPUs.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在Colab中使用的硬件加速器通常被称为Cloud TPU。**Cloud TPU**旨在在Google Cloud上运行具有AI服务的尖端机器学习模型。它允许使用TensorFlow在Google的TPU加速器硬件上处理机器学习工作负载。其定制的快速网络在一个Pod中提供超过100
    petaflops的性能，这足以将企业转变为AI就绪或创造下一个研究突破。Cloud TPU旨在提供最大性能和灵活性，以帮助研究人员、开发人员和企业在可以利用CPU、GPU和TPU的TensorFlow计算集群中构建。
- en: For a comprehensive guide to deploying Cloud TPU, peruse
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 对于部署Cloud TPU的全面指南，请参阅
- en: '[`https://cloud.google.com/tpu/docs/tpus`](https://cloud.google.com/tpu/docs/tpus)'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://cloud.google.com/tpu/docs/tpus](https://cloud.google.com/tpu/docs/tpus)'
- en: For all available tutorials on Cloud TPU (as of this writing), peruse
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 对于本写作时所有可用的Cloud TPU教程，请参阅
- en: '[`https://cloud.google.com/tpu/docs/tutorials`](https://cloud.google.com/tpu/docs/tutorials)'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://cloud.google.com/tpu/docs/tutorials](https://cloud.google.com/tpu/docs/tutorials)'
- en: Advantages of Cloud TPU
  id: totrans-11
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Cloud TPU的优势
- en: Cloud TPU resources accelerate the performance of linear algebra computation,
    which is used heavily in ML applications. Cloud TPU minimizes the time-to-accuracy
    when we train large, complex neural network models. Models that previously took
    weeks to train on other hardware platforms can converge in hours on Cloud TPU.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: Cloud TPU资源加速了线性代数计算的性能，这在机器学习应用中得到了广泛的应用。Cloud TPU最小化了我们在训练大型、复杂的神经网络模型时的准确度时间。在其他硬件平台上原本需要数周时间训练的模型，在Cloud
    TPU上可以数小时内收敛。
- en: When to Use Cloud TPU
  id: totrans-13
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 当使用Cloud TPU时
- en: Cloud TPU is optimized for specific workloads. In some situations, we use GPUs
    or CPUs to run ML workloads. In general, decide what hardware to use based on
    the following guidelines.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: Cloud TPU针对特定工作负载进行了优化。在某些情况下，我们使用GPU或CPU来运行机器学习工作负载。通常，根据以下指南决定使用哪种硬件。
- en: CPUs
  id: totrans-15
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: CPU
- en: '* Quick prototyping that requires maximum flexibility'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '* 需要最大灵活性的快速原型设计'
- en: '* Simple models that do not take long to train'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '* 训练时间不长的简单模型'
- en: '* Small models with small effective batch sizes'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '* 带有小型有效批次的简单模型'
- en: '* Models dominated by custom TensorFlow operations written in C++'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '* 以C++编写的自定义TensorFlow操作为主的模型'
- en: '* Models limited by available I/O or the networking bandwidth of the host system'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '* 受限于可用I/O或主机系统网络带宽的模型'
- en: GPUs
  id: totrans-21
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: GPU
- en: '* Models where source code doesn’t exist or is too onerous to change'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '* 源代码不存在或修改过于繁琐的模型'
- en: '* Models with a significant number of custom TensorFlow operations that must
    run at least partially on CPUs'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '* 包含大量必须至少部分在 CPU 上运行的定制 TensorFlow 操作的模型'
- en: '* Models with TensorFlow ops that are not available on Cloud TPU'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '* 包含在 Cloud TPU 上不可用的 TensorFlow 操作的模型'
- en: '* Medium-to-large models with larger effective batch sizes'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '* 中等至大型模型，具有更大的有效批量大小'
- en: TPUs
  id: totrans-26
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: TPUs
- en: '* Models dominated by matrix computations'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '* 以矩阵计算为主的模型'
- en: '* Models with no custom TensorFlow operations inside the main training loop'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '* 主训练循环中没有定制 TensorFlow 操作的模型'
- en: '* Models that train for weeks or months'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '* 训练数周或数月的模型'
- en: '* Very large models with very large effective batch sizes'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '* 非常大的模型，具有非常大的有效批量大小'
- en: Cloud TPU is not suited for linear algebra programs that require frequent branching
    or are dominated element-wise by algebra. Cloud TPU is optimized to perform fast
    on bulky matrix multiplication. So a workload that is not dominated by matrix
    multiplication is unlikely to perform well on Cloud TPU compared to other platforms.
    Workloads that require high-precision arithmetic are not suitable for Cloud TPU
    (e.g., double-precision arithmetic). Workloads that access memory in a sparse
    manner might not be available on Cloud TPU.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: Cloud TPU 不适合需要频繁分支或主要由元素级代数主导的线性代数程序。Cloud TPU 优化以快速执行大量矩阵乘法。因此，非矩阵乘法主导的工作负载在与其他平台相比不太可能在
    Cloud TPU 上表现良好。需要高精度算术的工作负载不适合 Cloud TPU（例如，双精度算术）。以稀疏方式访问内存的工作负载可能在 Cloud TPU
    上不可用。
- en: For a great resource on Cloud TPU, peruse
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 关于 Cloud TPU 的丰富资源，请参阅
- en: '[`https://cloud.google.com/tpu/docs/tpus`](https://cloud.google.com/tpu/docs/tpus)'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://cloud.google.com/tpu/docs/tpus](https://cloud.google.com/tpu/docs/tpus)'
- en: Import the TensorFlow Library
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 导入 TensorFlow 库
- en: 'Import the library and alias it as **tf**:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 导入库并将其别名为 **tf**：
- en: '[PRE0]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Enable TPU Runtime
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 启用 TPU 运行时
- en: 'It’s very easy to enable the TPU in a Colab notebook:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Colab 笔记本中启用 TPU 非常简单：
- en: Click *Runtime* in the top-left menu.
  id: totrans-39
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在右上角菜单中点击 *运行时*。
- en: Click *Change runtime type* from the drop-down menu.
  id: totrans-40
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从下拉菜单中选择 *更改运行时类型*。
- en: Choose *TPU* from the *Hardware accelerator* drop-down menu.
  id: totrans-41
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从 *硬件加速器* 下拉菜单中选择 *TPU*。
- en: Click *Save*.
  id: totrans-42
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 *保存*。
- en: Note
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: The TPU must be enabled in *each* notebook. But it only has to be enabled once.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: TPU 必须在每个笔记本中启用。但只需启用一次。
- en: TPU Detection
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: TPU 检测
- en: 'Set up the TPU resolver and verify that it is running:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 设置 TPU 解析器并验证其是否正在运行：
- en: '[PRE1]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'The message looks something like this:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 消息看起来可能像这样：
- en: Running on TPU [‘10.112.96.162:8470’]
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在 TPU [‘10.112.96.162:8470’] 上运行
- en: Tip
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士
- en: If you get the error **NAME ‘TF’ IS NOT DEFINED**, re-execute the code to import
    the TensorFlow library! For some reason, we sometimes have to re-execute the TensorFlow
    library import in Colab. We don’t know why this is the case.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 如果出现错误 **NAME ‘TF’ IS NOT DEFINED**，请重新执行代码以导入 TensorFlow 库！由于某些原因，我们有时不得不在
    Colab 中重新执行 TensorFlow 库的导入。我们不知道这是为什么。
- en: The *tf.distribute.cluster_resolver.TPUClusterResolver()* API is the Cluster
    Resolver for Google Cloud TPU. *Cluster Resolvers* provide a way for TensorFlow
    to communicate with various cluster management systems (e.g., GCE, AWS, etc.)
    and access necessary information to set up distributed training. By letting TensorFlow
    communicate with these systems, it is able to automatically discover and resolve
    IP addresses for various TensorFlow workers. So it is able to eventually automatically
    recover from underlying machine failures and scale TensorFlow worker clusters
    up and down system pipelines.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '*tf.distribute.cluster_resolver.TPUClusterResolver()* API 是 Google Cloud TPU
    的集群解析器。*集群解析器* 为 TensorFlow 提供了一种与各种集群管理系统（例如，GCE、AWS 等）通信的方式，并访问设置分布式训练所需的信息。通过让
    TensorFlow 与这些系统通信，它能够自动发现并解析各种 TensorFlow 工作器的 IP 地址。因此，它能够最终从底层机器故障中自动恢复，并调整
    TensorFlow 工作器集群的系统管道的上下文。'
- en: Configure the TPU for This Notebook
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为此笔记本配置 TPU
- en: 'Make devices on the cluster available to use:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 使集群上的设备可用于使用：
- en: '[PRE2]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Initialize TPU devices:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 初始化 TPU 设备：
- en: '[PRE3]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Note
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Both configurations are experimental, which means that they may be changed in
    the future.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 这两种配置都是实验性的，这意味着它们将来可能会更改。
- en: Create a Distribution Strategy
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建分发策略
- en: A **distribution strategy** is an abstraction used to distribute training across
    multiple CPUs, GPUs, or TPUs. To change how a model runs on a given device, simply
    swap out the distribution strategy. The *tf.distribute.Strategy* is the TensorFlow
    API for applying a distribution strategy to a model. Applying this API allows
    us to distribute training for existing models across multiple devices with minimal
    code changes.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '**分布策略**是一种用于在多个CPU、GPU或TPU之间分配训练的抽象。要更改模型在给定设备上的运行方式，只需更换分布策略。*tf.distribute.Strategy*是TensorFlow
    API，用于将分布策略应用于模型。应用此API允许我们在最小代码更改的情况下将现有模型的训练分配到多个设备。'
- en: 'The API is designed with three key goals in mind:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 该API的设计考虑了三个关键目标：
- en: '* Easy to use and support for multiple user segments (e.g., data scientists)'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*易于使用并支持多个用户群体（例如，数据科学家）'
- en: '* Provides good performance out of the box'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '* 提供了开箱即用的良好性能'
- en: '* Easy switching between strategies'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*易于在策略之间切换'
- en: 'Create a TPU strategy for this notebook:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 为此笔记本创建一个TPU策略：
- en: '[PRE4]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: A list of available TPUs and other devices is displayed.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 显示可用的TPU和其他设备列表。
- en: Manual Device Placement
  id: totrans-69
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 手动设备放置
- en: After the TPU system is initialized, we can use manual device placement to direct
    computation on a single TPU device as shown in Listing [5-1](#PC6).
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 在TPU系统初始化后，我们可以使用手动设备放置来指导计算在单个TPU设备上执行，如列表[5-1](#PC6)所示。
- en: '[PRE5]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Multiply matrix a by matrix b and place the result in matrix c within the scope
    of TPU device 7\. Next, multiply matrix c by the Identity matrix and place the
    result in matrix d within the scope of TPU device 6.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 在TPU设备7的范围内将矩阵a乘以矩阵b，并将结果放置在矩阵c中。接下来，将矩阵c乘以单位矩阵，并将结果放置在TPU设备6的范围内矩阵d中。
- en: Run a Computation in All TPU Cores
  id: totrans-73
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在所有TPU核心上运行计算
- en: 'To replicate a computation so it can run in all TPU cores, pass it to the *strategy.run*
    API:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使计算可以在所有TPU核心上运行，将其传递给*strategy.run* API：
- en: '[PRE6]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Create a function that multiplies two matrices. If eager behavior is enabled,
    make the function a *tf.function* or call *strategy.run* inside a tf.function.
    Eager behavior is automatically enabled in Colab!
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个乘以两个矩阵的函数。如果启用贪婪行为，则使该函数成为*tf.function*或在tf.function内部调用*strategy.run*。在Colab中，贪婪行为自动启用！
- en: Invoke the function with the *strategy.run* API we create, which ensures that
    all the TPU cores obtain the same inputs (a, b) and matmul is applied on each
    core independently. The outputs are the values from all of the core replicas.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 使用我们创建的*strategy.run* API调用函数，这确保所有TPU核心获得相同的输入（a，b），并且在每个核心上独立应用矩阵乘法。输出是所有核心副本的值。
- en: Eager Execution
  id: totrans-78
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 贪婪执行
- en: Eager execution must be enabled for Cloud TPU to operate. *Eager execution*
    (or eager behavior) is an imperative programming environment because it evaluates
    operations immediately without building graphs. So TensorFlow operations return
    concrete values instead of constructing a computational graph to run later. It
    also offers an intuitive interface that allows you to structure code naturally
    and use Python data structures. Other benefits include quick iteration on small
    models and small data and easier debugging because you can call ops directly to
    inspect running models and test changes.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: Cloud TPU的操作必须启用贪婪执行。*贪婪执行*（或贪婪行为）是一种命令式编程环境，因为它立即评估操作而不构建图。因此，TensorFlow操作返回具体值而不是构建用于稍后运行的计算图。它还提供了一个直观的接口，允许您自然地组织代码并使用Python数据结构。其他好处包括对小型模型和小型数据的快速迭代以及更易于调试，因为您可以直接调用ops来检查正在运行的模式并测试更改。
- en: Note
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Eager execution is enabled by default in TensorFlow 2.x.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow 2.x默认启用贪婪执行。
- en: Experiments
  id: totrans-82
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实验
- en: We include four Cloud TPU experiments. Experiments begin with simple datasets
    and progress to more complex ones. The importance of working with multiple datasets
    is to gain experience and confidence. Each dataset is different, so the experiments
    are a bit different. The learning process is generally the same, but each dataset
    has different characteristics. The main reason we present multiple experiences
    is to give you more practice. We have found, through working with seminar participants,
    that they learn faster by working with multiple datasets and they also enjoy the
    learning experience much more!
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 我们包括四个Cloud TPU实验。实验从简单的数据集开始，逐渐过渡到更复杂的数据集。与多个数据集一起工作的意义在于获得经验和信心。每个数据集都不同，因此实验略有不同。学习过程通常是相同的，但每个数据集都有不同的特征。我们展示多个经验的主要原因是为了给您提供更多的练习机会。通过与研讨会参与者一起工作，我们发现他们通过使用多个数据集学习得更快，他们也更加享受学习过程！
- en: Digits Experiment
  id: totrans-84
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数字实验
- en: The *digits* dataset is embedded in the *sklearn.datasets* package. It consists
    of 1,797 8 × 8 images of handwritten digits from 0 to 9\. *Scikit-learn* (also
    known as sklearn) is a ML library in Python. It contains a few small standard
    datasets (e.g., digits) that do not require to download any file from an external
    website.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: '*digits*数据集嵌入在*sklearn.datasets*包中。它由1797个0到9的手写数字的8 × 8图像组成。*Scikit-learn*（也称为sklearn）是Python中的一个机器学习库。它包含一些小的标准数据集（例如digits），这些数据集不需要从外部网站下载任何文件。'
- en: 'Import requisite libraries:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 导入必需的库：
- en: '[PRE7]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'Load the dataset:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 加载数据集：
- en: '[PRE8]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'Get the keys:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 获取键：
- en: '[PRE9]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Keys include “data,” “target,” “target_names,” “images,” and “DESCR.” Key *data*
    contains images as a flattened data matrix of shape (1797, 64). Key *target* contains
    labels as a vector of shape (1797,). Key *target_names* is a list of the names
    of target classes. Key *images* contains images as a matrix of shape (1797, 8,
    8). Key *DESCR* contains the full description of the dataset. So digits contains
    1,797 images of 8 × 8 pixels and 1,797 corresponding scalar labels.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 键包括“data”、“target”、“target_names”、“images”和“DESCR”。键*data*包含形状为(1797, 64)的图像作为展平的数据矩阵。键*target*包含形状为(1797,)的标签向量。键*target_names*是目标类别的名称列表。键*images*包含形状为(1797,
    8, 8)的图像矩阵。键*DESCR*包含数据集的完整描述。因此digits包含1797个8 × 8像素的图像和1797个相应的标量标签。
- en: The reason that this dataset has keys is because it is a scikit-learn (sklearn)
    dataset. It features various classification, regression, and clustering algorithms
    including support vector machines, random forests, gradient boosting, k-means,
    and DBSCAN. It is designed to interoperate with the Python numerical and scientific
    libraries NumPy and SciPy. It also contains practice datasets like digits.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 这个数据集有键的原因是因为它是一个scikit-learn (sklearn)数据集。它包含各种分类、回归和聚类算法，包括支持向量机、随机森林、梯度提升、k-means和DBSCAN。它被设计为与Python数值和科学库NumPy和SciPy互操作。它还包含像digits这样的实践数据集。
- en: 'Display an image:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 显示图像：
- en: '[PRE10]'
  id: totrans-95
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Preprocess the Data
  id: totrans-96
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 预处理数据
- en: Since digits is a scikit-learn practice set, we can preprocess it very easily.
    The *train_test_split* method automatically splits data into training and test
    sets. You can adjust the split ratio with the *test_size* parameter.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 由于digits是一个scikit-learn实践集，我们可以非常容易地预处理它。*train_test_split*方法自动将数据分割成训练集和测试集。你可以通过*test_size*参数调整分割比例。
- en: Create a function to preprocess the data as shown in Listing [5-2](#PC12).
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数来预处理数据，如列表[5-2](#PC12)所示。
- en: '[PRE11]'
  id: totrans-99
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'Preprocess the data:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 预处理数据：
- en: '[PRE12]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Data split is 67% training and 33% test. Of course, you can adjust it to be
    a different split by changing the 0.33 to another value.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 数据分割为67%的训练和33%的测试。当然，你可以通过将0.33更改为另一个值来调整分割比例。
- en: 'Get target names and number of classes:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 获取目标名称和类别数量：
- en: '[PRE13]'
  id: totrans-104
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: We take advantage of the built-in sklearn method *target_names* to get the target
    (class label) names.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 我们利用内置的sklearn方法*target_names*来获取目标（类别标签）名称。
