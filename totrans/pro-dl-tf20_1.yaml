  zh: '![θ3→每间浴室的附加成本](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfc.png)'
- en: Now that we have some understanding of how to construct a regression problem
    and its associated cost function, let’s simplify the problem and proceed toward
    deriving the model parameters.
  id: totrans-764
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经对如何构建回归问题及其相关的成本函数有了些了解，让我们简化问题并继续推导模型参数。
- en: Model parameter ![$$ {\theta}^{\ast }=\underset{\theta }{\underbrace{Arg\kern0.5em
    \mathit{\operatorname{Min}}}}C\left(\theta \right)= \underset{\theta }{\underbrace{Arg\kern0.5em
    \mathit{\operatorname{Min}}}}{\sum}_{i=1}^m{\left({\theta}^T{x}_i-{y}^{(i)}\right)}^2
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq74.png)
  id: totrans-765
  prefs: []
  type: TYPE_NORMAL
  zh: 模型参数 ![$$ {\theta}^{\ast }=\underset{\theta }{\underbrace{Arg\kern0.5em \mathit{\operatorname{Min}}}}C\left(\theta
    \right)= \underset{\theta }{\underbrace{Arg\kern0.5em \mathit{\operatorname{Min}}}}{\sum}_{i=1}^m{\left({\theta}^T{x}_i-{y}^{(i)}\right)}^2
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq74.png)
- en: The input vectors for all the samples can be combined to a matrix *X*, and the
    corresponding target output can be represented as a vector *Y*.
  id: totrans-766
  prefs: []
  type: TYPE_NORMAL
  zh: 所有样本的输入向量可以组合成一个矩阵 *X*，相应的目标输出可以表示为一个向量 *Y*。
- en: '![$$ X=\left[\begin{array}{c}{x}_0^{(1)}\kern0.5em {x}_1^{(1)}{x}_2^{(1)}{x}_3^{(1)}\\
    {}\begin{array}{cc}{x}_0^{(2)}&amp; {x}_1^{(2)}{x}_2^{(2)}{x}_3^{(2)}\end{array}\\
    {}\begin{array}{cc}{x}_0^{(3)}&amp; {x}_1^{(3)}{x}_2^{(3)}{x}_3^{(3)}\end{array}\\
    {}.\\ {}.\\ {}\begin{array}{cc}{x}_0^{(m)}&amp; {x}_1^{(m)}{x}_2^{(m)}{x}_3^{(m)}\end{array}\end{array}\right]Y=\left[\begin{array}{c}{y}^{(1)}\\
    {}{y}^{(2)}\\ {}{y}^{(3)}\\ {}.\\ {}.\\ {}{y}^{(m)}\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfd.png)'
  id: totrans-767
  prefs: []
  type: TYPE_IMG
  zh: '![X=[$$ \begin{array}{c}{x}_0^{(1)}\kern0.5em {x}_1^{(1)}{x}_2^{(1)}{x}_3^{(1)}\\
    {}\begin{array}{cc}{x}_0^{(2)}&amp; {x}_1^{(2)}{x}_2^{(2)}{x}_3^{(2)}\end{array}\\
    {}\begin{array}{cc}{x}_0^{(3)}&amp; {x}_1^{(3)}{x}_2^{(3)}{x}_3^{(3)}\end{array}\\
    {}.\\ {}.\\ {}\begin{array}{cc}{x}_0^{(m)}&amp; {x}_1^{(m)}{x}_2^{(m)}{x}_3^{(m)}\end{array}\end{array}\right]Y=\left[\begin{array}{c}{y}^{(1)}\\
    {}{y}^{(2)}\\ {}{y}^{(3)}\\ {}.\\ {}.\\ {}{y}^{(m)}\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfd.png)'
- en: 'If we represent the vector of predictions as *Yp*, then *Yp* = *Xθ*. So, the
    error in prediction vector *e* can be represented as follows:'
  id: totrans-768
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们将预测向量表示为 *Yp*，那么 *Yp* = *Xθ*。因此，预测向量 *e* 的误差可以表示如下：
- en: '![$$ e= X\theta -Y $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfe.png)'
  id: totrans-769
  prefs: []
  type: TYPE_IMG
  zh: '![$$ e= X\theta -Y $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfe.png)'
- en: Hence, *C(θ)* can be expressed as the square of the *l*² norm of the error vector
    *e*, i.e.,
  id: totrans-770
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，*C(θ)* 可以表示为误差向量 *e* 的 l² 范数的平方，即，
- en: '![$$ {\displaystyle \begin{array}{l}C\left(\theta \right)={\left\Vert e\right\Vert}_2^2\\
    {}\kern2.12em =\left\Vert X\theta -\kern0.5em {Y}_2^2\right\Vert \\ {}\kern2.12em
    ={\left( X\theta \kern0.5em -\kern0.5em Y\right)}^T\left( X\theta \kern0.5em -\kern0.5em
    Y\right)\end{array}} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equff.png)'
  id: totrans-771
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\displaystyle \begin{array}{l}C\left(\theta \right)={\left\Vert e\right\Vert}_2^2\\
    {}\kern2.12em =\left\Vert X\theta -\kern0.5em {Y}_2^2\right\Vert \\ {}\kern2.12em
    ={\left( X\theta \kern0.5em -\kern0.5em Y\right)}^T\left( X\theta \kern0.5em -\kern0.5em
    Y\right)\end{array}} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equff.png)'
- en: Now that we have a simplified cost function in matrix form, it will be easy
    to apply different optimization techniques. These techniques would work for most
    cost functions, be it a convex cost function or a non-convex one. For non-convex
    ones, there are some additional things that need to be considered, which we will
    discuss in detail while considering neural networks.
  id: totrans-772
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经得到了矩阵形式的简化成本函数，应用不同的优化技术将会变得容易。这些技术适用于大多数成本函数，无论是凸成本函数还是非凸成本函数。对于非凸的，有一些额外的事情需要考虑，我们将在考虑神经网络时详细讨论。
- en: We can directly derive the model parameters by computing the gradient and setting
    it to zero vector. You can apply the rules that we learned earlier to check if
    the conditions of minima are satisfied.
  id: totrans-773
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过计算梯度并将其设置为零向量来直接推导出模型参数。你可以应用我们之前学到的规则来检查最小值条件是否满足。
- en: 'The gradient of the cost function with respect to the parameter vector *θ*
    is as seen here:'
  id: totrans-774
  prefs: []
  type: TYPE_NORMAL
  zh: 关于参数向量 *θ* 的成本函数的梯度如下所示：
- en: '![$$ \nabla C\left(\theta \right)=2{X}^T\left( X\theta \kern0.5em -\kern0.5em
    Y\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfg.png)'
  id: totrans-775
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \nabla C\left(\theta \right)=2{X}^T\left( X\theta \kern0.5em -\kern0.5em
    Y\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfg.png)'
- en: Setting ∇*C*(*θ*) = 0, we get ![$$ {X}^T X\theta ={X}^TY=&gt;\overset{\frown
    }{\theta} ={\left({X}^TX\right)}^{-1}{X}^T\kern0.5em Y $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq75.png).
  id: totrans-776
  prefs: []
  type: TYPE_NORMAL
  zh: 将 ∇*C*(*θ*) = 0，我们得到 ![$$ {X}^T X\theta ={X}^TY=&gt;\overset{\frown }{\theta}
    ={\left({X}^TX\right)}^{-1}{X}^T\kern0.5em Y $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq75.png)。
- en: If one looks at this solution closely, one can observe that the pseudo-inverse
    of *X*—i.e., (*X*^(*T*)*X*)^(−1)*X*^(*T*)—comes into the solution of the linear
    regression problem. This is because a linear regression parameter vector can be
    looked at as a solution to the equation *Xθ* = *Y*, where X is an *m* × *n* rectangular
    matrix with *m* > *n*.
  id: totrans-777
  prefs: []
  type: TYPE_NORMAL
  zh: 如果仔细观察这个解，可以观察到 *X* 的伪逆——即 (*X*^(*T*)*X*)^(−1)*X*^(*T*)——进入了线性回归问题的解中。这是因为线性回归参数向量可以看作是方程
    *Xθ* = *Y* 的解，其中 X 是一个 *m* × *n* 的矩形矩阵，且 *m* > *n*。
- en: The preceding expression for ![$$ \hat{\theta} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq76.png)
    is the closed-form solution for the model parameter. Using this derived ![$$ \hat{\theta}
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq77.png) for new
    data point *x*[*new*], we can predict the price of housing as ![$$ {\hat{\theta}}^T{x}_{new}
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq78.png).
  id: totrans-778
  prefs: []
  type: TYPE_NORMAL
  zh: 上述关于 ![$$ \hat{\theta} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq76.png)
    的表达式是该模型参数的闭式解。使用这个推导出的 ![$$ \hat{\theta} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq77.png)
    对新的数据点 *x*[*new*] 进行预测，我们可以预测房价为 ![$$ {\hat{\theta}}^T{x}_{new} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq78.png)。
- en: The computation of the inverse of (*X*^(*T*)*X*) is both cost- and memory-intensive
    for large datasets. Also, there are situations when the matrix *X*^(*T*)*X* is
    singular and hence its inverse is not defined. Therefore, we need to look at alternative
    methods to get to the minima point.
  id: totrans-779
  prefs: []
  type: TYPE_NORMAL
  zh: 对于大数据集，计算 (*X*^(*T*)*X*) 的逆既耗时又耗内存。此外，当矩阵 *X*^(*T*)*X* 是奇异的，因此其逆未定义时，也存在这种情况。因此，我们需要考虑替代方法来达到最小值点。
- en: One thing to validate after building a linear regression model is the distribution
    of residual errors for the training data points. The errors should be approximately
    normally distributed with a 0 mean and some finite variance. The *QQ* plot that
    plots the actual quantile values for the error distribution vs. the theoretical
    quantile values for the error distribution can be used to check whether the Gaussian
    assumption for the residual is satisfied.
  id: totrans-780
  prefs: []
  type: TYPE_NORMAL
  zh: 在构建线性回归模型后，需要验证的是训练数据点的残差误差分布。误差应该近似正态分布，均值为0，并且具有某些有限的方差。可以用来检查残差高斯假设是否满足的*QQ*图是绘制误差分布的实际分位数值与误差分布的理论分位数值。
- en: Linear Regression Through Vector Space Approach
  id: totrans-781
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 通过向量空间方法进行线性回归
- en: 'The linear regression problem is to determine the parameter vector *θ* such
    that *Xθ* is as close to the output vector *Y* as possible. *X* ∈ *R*^(*m* × *n*)
    is the data matrix and can be thought of as *n* column vectors *c*[*i*] ∈ *R*^(*m* × 1)
    stacked one after the other, as shown here:'
  id: totrans-782
  prefs: []
  type: TYPE_NORMAL
  zh: 线性回归问题是要确定参数向量*θ*，使得*Xθ*尽可能接近输出向量*Y*。*X* ∈ *R*^(*m* × *n*)是数据矩阵，可以将其视为*n*个列向量*c[*i*] ∈ *R*^(*m* × 1)依次堆叠，如下所示：
- en: '![$$ X=\left[{c}_{1\kern0.5em }{c}_2\dots ..\kern0.5em {c}_n\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfh.png)'
  id: totrans-783
  prefs: []
  type: TYPE_IMG
  zh: '![$$ X=\left[{c}_{1\kern0.5em }{c}_2\dots ..\kern0.5em {c}_n\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfh.png)'
- en: 'The dimension of column space is *m,* whereas the number of column vectors
    is *n*. Hence, the column vectors at best can span a subspace of dimension *n*
    within the *m*-dimensional vector space. The subspace is depicted in Figure [1-33](#Fig34).
    Although it looks like a 2-D surface, we need to imagine it as an *n*-dimensional
    space. The linear combination of the columns of *X* with the parameters gives
    the prediction vector, as shown here:'
  id: totrans-784
  prefs: []
  type: TYPE_NORMAL
  zh: 列空间的维度是*m*，而列向量的数量是*n*。因此，列向量最多可以在*m*-维向量空间中跨越一个维度为*n*的子空间。该子空间在图[1-33](#Fig34)中展示。尽管它看起来像一个二维表面，但我们需要将其想象成一个*n*-维空间。*X*的列与参数的线性组合给出了预测向量，如下所示：
- en: '![$$ X\theta ={\theta}_1{c}_1+{\theta}_1{c}_1 +..\kern0.5em {\theta}_n{c}_n
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfi.png)'
  id: totrans-785
  prefs: []
  type: TYPE_IMG
  zh: '![$$ X\theta ={\theta}_1{c}_1+{\theta}_1{c}_1 +..\kern0.5em {\theta}_n{c}_n
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfi.png)'
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig36_HTML.jpg)'
  id: totrans-786
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig36_HTML.jpg)'
- en: The parallelogram plane has four vectors marked as c subscripts 1, 2, 3, and
    n. The vectors of equations X theta and Y with an eccentricity of e are visible.
  id: totrans-787
  prefs: []
  type: TYPE_NORMAL
  zh: 平行四边形平面上有四个向量，分别标记为c的下标1、2、3和n。具有偏心率e的X theta和Y向量是可见的。
- en: Figure 1-35
  id: totrans-788
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-35
- en: Linear regression as a vector space problem
  id: totrans-789
  prefs: []
  type: TYPE_NORMAL
  zh: 线性回归作为向量空间问题
- en: Since *Xθ* is nothing but the linear combination of the column vectors of *X*,
    *Xθ* stays in the same subspace as the ones spanned by the column vectors *c*[*i*] ∀ *i* = {1,
    2, 3…*n*}.
  id: totrans-790
  prefs: []
  type: TYPE_NORMAL
  zh: 由于*Xθ*不过是*X*的列向量的线性组合，*Xθ*保持在由列向量*c[*i*] ∀ *i* = {1, 2, 3…*n*}张成的相同子空间中。
- en: Now the actual target-value vector *Y* lies outside the subspace spanned by
    the column vectors of *X*; thus, no matter what *θ* we combine *X* with, *Xθ*
    can never equal or align itself in the direction of *Y*. There is going to be
    a nonzero error vector given by *e* = *Y* − *Xθ*.
  id: totrans-791
  prefs: []
  type: TYPE_NORMAL
  zh: 现在实际的目标值向量*Y*位于由*X*的列向量张成的子空间之外；因此，无论我们如何将*θ*与*X*结合，*Xθ*都无法等于或与其方向对齐*Y*。将会有一个非零的误差向量给出，由*e* = *Y* − *Xθ*表示。
- en: Now that we know that we have an error, we need to investigate how to reduce
    the *l*² norm of the error. For the *l*² norm of the error vector to be at a minimum,
    it should be perpendicular to the prediction vector *Xθ*. Since *e* = *Y* − *Xθ*
    is perpendicular to *Xθ*, it should be perpendicular to all vectors in that subspace.
  id: totrans-792
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们知道我们有一个误差，我们需要研究如何降低误差的*l*²范数。为了使误差向量的*l*²范数达到最小，它应该垂直于预测向量*Xθ*。由于*e* = *Y* − *Xθ*垂直于*Xθ*，它应该垂直于该子空间中的所有向量。
- en: 'So, the dot product of all the column vectors of *X* with the error vector
    *Y* − *Xθ* should be zero, which gives us the following:'
  id: totrans-793
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，*X*的所有列向量与误差向量*Y* − *Xθ*的点积应该为零，这给我们以下结果：
- en: '![$$ {c_1}^T\left[Y- X\theta \right]=0,\kern0.5em {c_2}^T\left[Y- X\theta \right]=0,\dots
    ..{c_n}^T\left[Y- X\theta \right]=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfj.png)'
  id: totrans-794
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {c_1}^T\left[Y- X\theta \right]=0,\kern0.5em {c_2}^T\left[Y- X\theta \right]=0,\dots
    ..{c_n}^T\left[Y- X\theta \right]=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfj.png)'
- en: 'This can be rearranged in a matrix form as follows:'
  id: totrans-795
  prefs: []
  type: TYPE_NORMAL
  zh: 这可以重新排列成以下矩阵形式：
- en: '![$$ {\left[{c}_{1\kern0.5em }{c}_2\dots ..\kern0.5em {c}_n\right]}^T\left[Y-
    X\theta \right]=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfk.png)'
  id: totrans-796
  prefs: []
  type: TYPE_IMG
  zh: '![等式 $$ {\left[{c}_{1\kern0.5em }{c}_2\dots ..\kern0.5em {c}_n\right]}^T\left[Y-
    X\theta \right]=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfk.png)'
- en: '![$$ =&gt;{X}^T\left[Y- X\theta \right]=0=&gt;\hat{\theta} ={\left({X}^TX\right)}^{-1}{X}^T\kern0.5em
    Y $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfl.png)'
  id: totrans-797
  prefs: []
  type: TYPE_IMG
  zh: '![等式 $$ =&gt;{X}^T\left[Y- X\theta \right]=0=&gt;\hat{\theta} ={\left({X}^TX\right)}^{-1}{X}^T\kern0.5em
    Y $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfl.png)'
- en: Also, please note that the error vector will be perpendicular to the prediction
    vector only if *Xθ* is the projection of *Y* in the subspace spanned by the column
    vectors of *X*. The sole purpose of this illustration is to emphasize the importance
    of vector spaces in solving machine-learning problems.
  id: totrans-798
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，请注意，只有当 *Xθ* 是 *Y* 在由 *X* 的列向量张成的子空间中的投影时，错误向量才会垂直于预测向量。本图的唯一目的是强调向量空间在解决机器学习问题中的重要性。
- en: Classification
  id: totrans-799
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 分类
- en: Similarly, we may look at classification problems where instead of predicting
    the value of a continuous variable we predict the class label associated with
    an input feature vector. For example, we can try to predict whether a customer
    is likely to default based on his recent payment history and transaction details
    as well as his demographic and employment information. In such a problem, we would
    have data with the features just mentioned as input and a target indicating whether
    the customer has defaulted as the class label. Based on this labeled data, we
    can build a classifier that can predict a class label indicating whether the customer
    will default, or we can provide a probability score that the customer will default.
    In this scenario, the problem is a binary classification problem with two classes—the
    defaulter class and the non-defaulter class. When building such a classifier,
    the least square method might not give a good cost function since we are trying
    to guess the label and not predict a continuous variable. The popular cost functions
    for classification problems are generally log-loss cost functions that are based
    on maximum likelihood and entropy-based cost functions, such as Gini entropy and
    Shannon entropy.
  id: totrans-800
  prefs: []
  type: TYPE_NORMAL
  zh: 类似地，我们可以考虑分类问题，在这种问题中，我们不是预测连续变量的值，而是预测与输入特征向量相关的类别标签。例如，我们可以尝试根据客户的近期支付历史和交易详情以及其人口统计和就业信息来预测客户是否可能违约。在这种情况下，我们将具有上述提到的特征作为输入数据，并将客户是否违约作为类别标签的目标。基于这些标记数据，我们可以构建一个分类器，该分类器可以预测客户是否会违约的类别标签，或者我们可以提供一个客户违约的概率分数。在这种情况下，问题是一个具有两个类别的二元分类问题——违约类别和非违约类别。在构建这样的分类器时，最小二乘法可能不会给出一个好的成本函数，因为我们试图猜测标签而不是预测连续变量。分类问题的流行成本函数通常是基于最大似然和熵的成本函数，如基尼熵和香农熵。
- en: The classifiers that have linear decision boundaries are called linear classifiers.
    Decision boundaries are hyperplanes or surfaces that separate the different classes.
    In the case of linear decision boundaries, the separating plane is a hyperplane.
  id: totrans-801
  prefs: []
  type: TYPE_NORMAL
  zh: 具有线性决策边界的分类器被称为线性分类器。决策边界是分隔不同类别的超平面或表面。在线性决策边界的情况下，分隔平面是一个超平面。
- en: Figures [1-36](#Fig37) and [1-37](#Fig38) illustrate linear and nonlinear decision
    boundaries, respectively, for the separation of two classes.
  id: totrans-802
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [1-36](#Fig37) 和 [1-37](#Fig38) 分别展示了用于两个类别分离的线性和非线性决策边界。
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig38_HTML.jpg)'
  id: totrans-803
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig38_HTML.jpg)'
- en: The two-dimensional plane of x 2 versus x 1\. It consists of an ellipse for
    a non-linear decision boundary. The ellipse contains a negative class, and the
    outside of the ellipse contains a positive class.
  id: totrans-804
  prefs: []
  type: TYPE_NORMAL
  zh: x2与x1构成的二维平面。对于非线性决策边界来说，它由一个椭圆组成。椭圆包含一个负类别，而椭圆的外部包含一个正类别。
- en: Figure 1-37
  id: totrans-805
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-37
- en: Classification by a nonlinear decision boundary
  id: totrans-806
  prefs: []
  type: TYPE_NORMAL
  zh: 非线性决策边界下的分类
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig37_HTML.jpg)'
  id: totrans-807
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig37_HTML.jpg)'
- en: The two-dimensional plane of x 2 versus x 1 consists of a decreasing line for
    the linear decision boundary. The negative class with the negative symbol and
    the positive class with the positive symbol are indicated.
  id: totrans-808
  prefs: []
  type: TYPE_NORMAL
  zh: x2与x1构成的二维平面对于线性决策边界来说是一条下降的线。带有负号的负类别和带有正号的正类别被指示出来。
- en: Figure 1-36
  id: totrans-809
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-36
- en: Classification by a linear decision boundary
  id: totrans-810
  prefs: []
  type: TYPE_NORMAL
  zh: 线性决策边界下的分类
- en: I would like to briefly discuss one of the most popular and simple classifiers,
    logistic regression, so that it becomes clear how the log-loss cost function comes
    into the picture via maximum likelihood methods in case of classification problems.
  id: totrans-811
  prefs: []
  type: TYPE_NORMAL
  zh: 我想简要讨论最流行且简单的分类器之一，逻辑回归，以便清楚地了解在分类问题中，通过最大似然方法，如何通过 log-loss 成本函数进入画面。
- en: 'Suppose (*x*^((*i*)), *y*^((*i*))) are the labeled data points, where *x*^((*i*)) ∈ *R*^(*n* × 1)  ∀ *i* ∈ {1,
    2, .. *m*} is the input vector, which includes the constant feature value of 1
    as a component, and *y*^((*i*)) determines the class. The value of *y*^((*i*))
    is set to 1 when the data point corresponds to a customer who has defaulted on
    his loan and 0 if the customer has not defaulted. The input vector *x*^((*i*))
    can be represented in terms of its components as follows:'
  id: totrans-812
  prefs: []
  type: TYPE_NORMAL
  zh: 假设 (*x*^((*i*)), *y*^((*i*))) 是标记数据点，其中 *x*^((*i*)) ∈ *R*^(*n* × 1) ∀ *i* ∈
    {1, 2, .. *m*} 是输入向量，它包括常数特征值 1 作为其组成部分，而 *y*^((*i*)) 决定了类别。当数据点对应于违约贷款的客户时，*y*^((*i*))
    的值设为 1，如果客户没有违约，则设为 0。输入向量 *x*^((*i*)) 可以用其分量表示如下：
- en: '![$$ {x}^{(i)}=\left[1{x}_0^{(1)}\kern0.5em {x}_1^{(1)}\kern0.5em {x}_2^{(1)}{x}_3^{(1)}\right]
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfm.png)'
  id: totrans-813
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {x}^{(i)}=\left[1{x}_0^{(1)}\kern0.5em {x}_1^{(1)}\kern0.5em {x}_2^{(1)}{x}_3^{(1)}\right]
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfm.png)'
- en: Logistic regression in general is a linear classifier and uses a squashing function
    to convert the linear score into probability. Let *θ* = [*θ*[0] *θ*[1] *θ*[2]…*θ*[*n*]]
    be the model parameter with each *θ*[*j*]  ∀ *j*  ∈ {0, 1, 2, …, *n*} representing
    the model parameter component with respect to the *jth* feature *x*[*j*] of the
    input vector *x*.
  id: totrans-814
  prefs: []
  type: TYPE_NORMAL
  zh: 逻辑回归通常是一个线性分类器，并使用压缩函数将线性得分转换为概率。设 *θ* = [*θ*[0] *θ*[1] *θ*[2]…*θ*[*n*]] 为模型参数，其中每个
    *θ*[*j*]  ∀ *j*  ∈ {0, 1, 2, …, *n*} 代表输入向量 *x* 的 *jth* 特征 *x*[*j*] 的模型参数分量。
- en: The term *θ*[0] is the bias term. In linear regression, the bias is nothing
    but the intercept on the output *y* axis. We will look at what this bias term
    means for logistic regression (and for other linear classifiers) shortly.
  id: totrans-815
  prefs: []
  type: TYPE_NORMAL
  zh: 项 *θ*[0] 是偏置项。在线性回归中，偏置就是输出 *y* 轴上的截距。我们将很快探讨这个偏置项对逻辑回归（以及其他线性分类器）的意义。
- en: 'The dot product *θ*^(*T*)*x* determines whether the given data point is likely
    to be a positive class or a negative class. For the problem at hand, the positive
    class is the event the customer defaults on his loan repayment, and the negative
    class is the event that the customer doesn’t default. The probability that the
    customer will default given the input and the model is given by the following:'
  id: totrans-816
  prefs: []
  type: TYPE_NORMAL
  zh: 点积 *θ*^(*T*)*x* 决定了给定数据点是否可能属于正类或负类。对于当前问题，正类是客户违约还款的事件，负类是客户未违约的事件。给定输入和模型，客户违约的概率如下：
- en: '![$$ P\left(y=1/x,\theta \right)=1/\left(1+\mathit{\exp}\left(-{\theta}^Tx\right)\right)=p
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfn.png)'
  id: totrans-817
  prefs: []
  type: TYPE_IMG
  zh: '![$$ P\left(y=1/x,\theta \right)=1/\left(1+\mathit{\exp}\left(-{\theta}^Tx\right)\right)=p
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfn.png)'
- en: '![$$ P\left(y=0/x,\theta \right)=1-1/\left(1+\mathit{\exp}\left(-{\theta}^Tx\right)\right)
    =\mathit{\exp}\left(-{\theta}^Tx\right)/\left(1+\mathit{\exp}\left(-{\theta}^Tx\right)\right)
    =q $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfo.png)'
  id: totrans-818
  prefs: []
  type: TYPE_IMG
  zh: '![$$ P\left(y=0/x,\theta \right)=1-1/\left(1+\mathit{\exp}\left(-{\theta}^Tx\right)\right)
    =\mathit{\exp}\left(-{\theta}^Tx\right)/\left(1+\mathit{\exp}\left(-{\theta}^Tx\right)\right)
    =q $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfo.png)'
- en: 'Now, let us look at the probability values for different values of *θ*^(*T*)*x*:'
  id: totrans-819
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们来看一下不同值下的 *θ*^(*T*)*x* 的概率值：
- en: When *θ*^(*T*)*x* = 0, then the probability of positive class is 1/2.
  id: totrans-820
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当 *θ*^(*T*)*x* = 0 时，正类概率为 1/2。
- en: When *θ*^(*T*)*x* > 0, the probability of a positive class is greater than 1/2
    and less than 1.
  id: totrans-821
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当 *θ*^(*T*)*x* > 0 时，正类概率大于 1/2 且小于 1。
- en: When *θ*^(*T*)*x* < 0, the probability of a positive class is less than 1/2
    and greater than 0.
  id: totrans-822
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当 *θ*^(*T*)*x* < 0 时，正类概率小于 1/2 且大于 0。
- en: When *θ*^(*T*)*x* is sufficiently large and positive, i.e., *θ*^(*T*)*x*  → ∞,
    the probability →1.
  id: totrans-823
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当 *θ*^(*T*)*x* 足够大且为正时，即 *θ*^(*T*)*x* → ∞，概率 →1。
- en: When *θ*^(*T*)*x* is sufficiently large and negative, i.e., *θ*^(*T*)*x*  →  − ∞,
    the probability →0.
  id: totrans-824
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当 *θ*^(*T*)*x* 足够大且为负时，即 *θ*^(*T*)*x* →  − ∞，概率 →0。
- en: The good thing about this probability formulation is that it keeps the values
    between 0 and 1, which would not have been possible with linear regression. Also,
    instead of the actual class, it gives continuous probability. Thus, depending
    on the problem at hand, the cutoff probability thresholds can be defined to determine
    the class.
  id: totrans-825
  prefs: []
  type: TYPE_NORMAL
  zh: 这种概率公式的优点是它保持了值在0到1之间，这在线性回归中是不可能的。此外，它给出的是连续概率，而不是实际的类别。因此，根据具体问题，可以定义截止概率阈值来确定类别。
- en: This probability model function is called a logistic or sigmoid function. It
    has smooth, continuous gradients that make the model training mathematically convenient.
  id: totrans-826
  prefs: []
  type: TYPE_NORMAL
  zh: 这个概率模型函数被称为逻辑或Sigmoid函数。它具有平滑、连续的梯度，这使得模型训练在数学上很方便。
- en: 'If we look carefully, we will see that the customer class *y* for each training
    sample follows a Bernoulli distribution, which we discussed earlier. For every
    data point, the class *y*^((i))/*x*^((i))~*Bernoulli*(1, *p*[*i*]). Based on the
    probability mass function of Bernoulli distribution, we can say the following:'
  id: totrans-827
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们仔细观察，我们会看到每个训练样本的客户类别 *y* 遵循伯努利分布，这是我们之前讨论过的。对于每个数据点，类别 *y^((i*)/x^((i*))~Bernoulli*(1,
    *p*[i*])。基于伯努利分布的概率质量函数，我们可以得出以下结论：
- en: '![$$ P\left({y}^{(i)}/{x}^{(i)},\theta \right)={\left(1-{p}_i\right)}^{1-{y}^{(i)}}
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq79.png) where
    *p*[*i*] = 1/(1 +  *exp* (−*θ*^(*T*)*x*))'
  id: totrans-828
  prefs: []
  type: TYPE_IMG
  zh: '![P(y^(i)/x^(i),θ)=(1-p_i)^(1-y^(i))] (../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq79.png)
    其中 *p*[i] = 1/(1 + exp(−θ^T*x*))'
- en: 'Now, how do we define the cost function? We compute the likelihood of the data
    given the model parameters and then determine the model parameters that maximize
    the computed likelihood. We define the likelihood by *L*, and it can be represented
    as follows:'
  id: totrans-829
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们如何定义损失函数？我们计算给定模型参数的数据似然，然后确定最大化计算似然的模型参数。我们用 *L* 来定义似然，它可以表示如下：
- en: '![$$ L=P\left( Data/ model\right)=P\left({D}^{(1)}{D}^{(2)}\dots {D}^{(m)}/\theta
    \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfp.png)'
  id: totrans-830
  prefs: []
  type: TYPE_IMG
  zh: '![L=P(Data/model)=P(D^(1)D^(2)...D^(m)/θ)](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfp.png)'
- en: where *D*^((*i*)) represents the *ith* training sample (*x*^((*i*)), *y*^((*i*))).
  id: totrans-831
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *D^((i*)) 代表第 *i* 个训练样本 (*x^((i*)), *y^((i*)))。
- en: 'Assuming the training samples are independent, given the model, *L* can be
    factorized as follows:'
  id: totrans-832
  prefs: []
  type: TYPE_NORMAL
  zh: 假设训练样本是独立的，给定模型，*L* 可以如下分解：
- en: '![$$ L=P\left({D}^{(1)}{D}^{(2)}\dots {D}^{(m)}/\theta \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfq.png)'
  id: totrans-833
  prefs: []
  type: TYPE_IMG
  zh: '![L=P(D^(1)D^(2)...D^(m)/θ)](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfq.png)'
- en: '![$$ =P\left({D}^{(1)}/\theta \right)\kern0.5em P\left({D}^{(2)}/\theta \right)\kern0.5em
    .\dots \kern0.5em P\left({D}^{(m)}/\theta \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfr.png)'
  id: totrans-834
  prefs: []
  type: TYPE_IMG
  zh: '![=P(D^(1)/θ) P(D^(2)/θ) ... P(D^(m)/θ)](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfr.png)'
- en: '![$$ =\prod \limits_{i=1}^mP\left({D}^{(i)}/\theta \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfs.png)'
  id: totrans-835
  prefs: []
  type: TYPE_IMG
  zh: '![=∏_(i=1)^m P(D^(i)/θ)](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfs.png)'
- en: We can take the log on both sides to convert the product of probabilities into
    a sum of the log of the probabilities. Also, the optimization remains the same
    since the maxima point for both *L* and *logL* would be the same, as log is a
    monotonically increasing function.
  id: totrans-836
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以对两边取对数，将概率的乘积转换为概率对数的和。由于对数是一个单调递增函数，因此优化过程保持不变，因为 *L* 和 *logL* 的最大值点将是相同的。
- en: 'Taking log on both sides, we get the following:'
  id: totrans-837
  prefs: []
  type: TYPE_NORMAL
  zh: 对两边取对数，我们得到以下结果：
- en: '![$$ logL=\sum \limits_{i=1}^m\mathit{\log}\kern0.5em P\left({D}^{(i)}/\theta
    \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equft.png)'
  id: totrans-838
  prefs: []
  type: TYPE_IMG
  zh: '![logL=∑_(i=1)^m log P(D^(i)/θ)](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equft.png)'
- en: Now, *P*(*D*^((*i*))/*θ*) = *P*((*x*^((*i*)), *y*^((*i*)))/*θ*) = *P*(*x*^((*i*))/ *θ*) *P*(*y*^((*i*))/*x*^((*i*)),
     *θ*).
  id: totrans-839
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，*P*(D^((i*)/θ*) = *P*((*x^((i*)), *y^((i*)))/*θ*) = *P*(x^((i*))/θ*) * P*(y^((i*)/x^((i*)),
    θ*)。
- en: We are not concerned about the probability of the data point—i.e., *P*(*x*^((*i*))/
    *θ*)—and assume that all the data points in the training are equally likely for
    the given model. So, *P*(*D*^((*i*))/*θ*)  = *k P*(*y*^((*i*))/*x*^((*i*)),  *θ*),
    where *k* is a constant.
  id: totrans-840
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不关心数据点的概率——即 *P*(x^((i))/θ*)——并假设对于给定的模型，训练集中的所有数据点具有相同的可能性。因此，*P*(D^((i))/θ*)
    = k * P*(y^((i))/x^((i)), θ*)，其中 *k* 是一个常数。
- en: 'Taking the log on both sides, we get the following:'
  id: totrans-841
  prefs: []
  type: TYPE_NORMAL
  zh: 对两边取对数，我们得到以下结果：
- en: '![$$ \mathit{\log}\kern0.5em P\left({D}^{(i)}/\theta \right)= logk+{y}^{(i)}{logp}_i+\left(1-{y}^{(i)}\right)\log
    \left(1-{p}_i\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfu.png)'
  id: totrans-842
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfu.png)'
- en: 'Summing over all data points, we get the following:'
  id: totrans-843
  prefs: []
  type: TYPE_NORMAL
  zh: 对所有数据点求和，我们得到以下结果：
- en: '![$$ logL=\sum \limits_{i=1}^m logk+{y}^{(i)}{logp}_i+\left(1-{y}^{(i)}\right)\log
    \left(1-{p}_i\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfv.png)'
  id: totrans-844
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfv.png)'
- en: 'We need to maximize the *logL* to get the model parameter *θ*. Maximizing *logL*
    is the same as minimizing −*logL*, and so we can take the −*logL* as the cost
    function for logistic regression and minimize it. Also, we can drop the *logk*
    sum since it’s a constant and the model parameter at the minima would be same
    irrespective of whether we have the *logk* sum. If we represent the cost function
    as *C*(*θ*), it can be expressed as seen here:'
  id: totrans-845
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要最大化 *logL* 来获取模型参数 *θ*。最大化 *logL* 等同于最小化 −*logL*，因此我们可以将 −*logL* 作为逻辑回归的成本函数并对其进行最小化。此外，我们可以省略
    *logk* 的和，因为它是一个常数，并且无论是否有 *logk* 的和，模型参数在最小值处都会相同。如果我们用 *C*(*θ*) 表示成本函数，它可以表示如下：
- en: '![$$ C\left(\theta \right)=\sum \limits_{i=1}^m-{y}^{(i)}{logp}_i-\left(1-{y}^{(i)}\right)\log
    \left(1-{p}_i\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfw.png)'
  id: totrans-846
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfw.png)'
- en: where *p*[*i*] = 1/(1 +  *exp* (−*θ*^(*T*)*x*))
  id: totrans-847
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *p*[*i*] = 1/(1 + exp(−*θ*^(*T*)*x*))
- en: '*C*(*θ*) is a convex function in *θ*, and the reader is encouraged to verify
    it with the rules learned earlier in the “Calculus” section. *C*(*θ*) can be minimized
    by common optimization techniques.'
  id: totrans-848
  prefs: []
  type: TYPE_NORMAL
  zh: '*C*(*θ*) 是 *θ* 上的凸函数，读者被鼓励使用在“微积分”部分学到的规则来验证它。*C*(*θ*) 可以通过常见的优化技术来最小化。'
- en: Hyperplanes and Linear Classifiers
  id: totrans-849
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 超平面和线性分类器
- en: Linear classifiers in some way or another are related to a hyperplane, so it
    makes sense to look at that relationship. In a way, learning a linear classifier
    is about learning about the hyperplane that separates the positive class from
    the negative class.
  id: totrans-850
  prefs: []
  type: TYPE_NORMAL
  zh: 线性分类器以某种方式与超平面相关联，因此研究这种关系是有意义的。从某种意义上说，学习线性分类器就是学习将正类与负类分开的超平面。
- en: A hyperplane in an *n*-dimensional vector space is a plane of dimension (*n* − 1)
    that divides the *n*-dimensional vector space into two regions. One region consists
    of vectors lying above the hyperplane, and the other region consists of vectors
    lying below the hyperplane. For a two-dimensional vector space, straight lines
    act as a hyperplane. Similarly, for a three-dimensional vector space, a two-dimensional
    plane acts as a hyperplane.
  id: totrans-851
  prefs: []
  type: TYPE_NORMAL
  zh: 在 *n*-维向量空间中的超平面是一个 (*n* - 1) 维的平面，它将 *n*-维向量空间分成两个区域。一个区域由位于超平面之上的向量组成，另一个区域由位于超平面之下的向量组成。对于二维向量空间，直线充当超平面。同样，对于三维向量空间，二维平面充当超平面。
- en: 'A hyperplane is defined by two major parameters: its perpendicular distance
    from the origin represented by a bias term *b*′ and the orientation of the hyperplane
    determined by a unit vector *w* perpendicular to the hyperplane surface as shown
    in Figure [1-38](#Fig39).'
  id: totrans-852
  prefs: []
  type: TYPE_NORMAL
  zh: 超平面由两个主要参数定义：其与原点的垂直距离由偏置项 *b*′ 表示，以及由垂直于超平面表面的单位向量 *w* 确定的超平面的方向，如图 [1-38](#Fig39)
    所示。
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig39_HTML.jpg)'
  id: totrans-853
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig39_HTML.jpg)'
- en: Negative and positive classes are separated by a decreasing line on the two-dimensional
    plane. Two vectors, x from the origin and w from the decreasing line, are indicated.
  id: totrans-854
  prefs: []
  type: TYPE_NORMAL
  zh: 在二维平面上，负类和正类由一条下降的线分开。两个向量，从原点出发的 x 和从下降线出发的 w 被标记出来。
- en: Figure 1-38
  id: totrans-855
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-38
- en: Hyperplanes separating the two classes
  id: totrans-856
  prefs: []
  type: TYPE_NORMAL
  zh: 分隔两个类别的超平面
- en: For a vector *x* ∈ *R*^(*n* × 1) to lie on the hyperplane, the projection of
    the vector in the direction of *w* should equal the distance of the hyperplane
    from origin—i.e., *w*^(*T*)*x* = *b*′. Thus, any point lying on the hyperplane
    must satisfy *w*^(*T*)*x* − *b*′ = 0\. Similarly, *w*^(*T*)*x* − *b*′ > 0 must
    be satisfied for points lying above the hyperplane and *w*^(*T*)*x* − *b*′ < 0
    for points lying below the hyperplane.
  id: totrans-857
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一个向量 *x* ∈ R^(n × 1) 要位于超平面上，向量在 *w* 方向上的投影应等于超平面到原点的距离，即 *w*^T*x* = *b*′。因此，位于超平面上的任何点都必须满足
    *w*^T*x* - *b*′ = 0。同样，对于位于超平面上的点，必须满足 *w*^T*x* - *b*′ > 0，而对于位于超平面下的点，必须满足 *w*^T*x*
    - *b*′ < 0。
- en: In linear classifiers, we learn to model the hyperplane or learn the model parameters
    *w* and *b*. The vector *w* is generally aligned toward the positive class. The
    Perceptron and linear SVM are linear classifiers. Of course, the ways SVM and
    Perceptron learn the hyperplane are totally different, and hence they would come
    up with different hyperplanes, even for the same training data.
  id: totrans-858
  prefs: []
  type: TYPE_NORMAL
  zh: 在线性分类器中，我们学习建模超平面或学习模型参数 *w* 和 *b*。向量 *w* 通常指向正类。感知器和线性 SVM 是线性分类器。当然，SVM 和感知器学习超平面的方式完全不同，因此即使对于相同的训练数据，它们也会得出不同的超平面。
- en: Even if we look at logistic regression, we see that it is based on a linear
    decision boundary. The linear decision boundary is nothing but a hyperplane, and
    points lying on the hyperplane (i.e., *w*^(*T*)*x* − *b*′ = 0) are assigned a
    probability of 0.5 for either of the classes. And again, the way the logistic
    regression learns the decision boundary is totally different from the way SVM
    and Perceptron models do.
  id: totrans-859
  prefs: []
  type: TYPE_NORMAL
  zh: 即使查看逻辑回归，我们也会看到它基于线性决策边界。线性决策边界不过是超平面，位于超平面上的点（即 *w*^T*x* - *b*′ = 0）被分配给两个类别的概率为
    0.5。再次强调，逻辑回归学习决策边界的方式与 SVM 和感知器模型的方式完全不同。
- en: Unsupervised Learning
  id: totrans-860
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 无监督学习
- en: Unsupervised machine-learning algorithms aim at finding patterns or internal
    structures within datasets that contain input data points without labels or targets.
    *K*-means clustering, the mixture of Gaussians, and so on are methods of unsupervised
    learning. Even data-reduction techniques like principal component analysis (PCA),
    singular value decomposition (SVD), auto-encoders, and so forth are unsupervised
    learning methods.
  id: totrans-861
  prefs: []
  type: TYPE_NORMAL
  zh: 无监督机器学习算法旨在寻找包含无标签或目标输入数据点的数据集中的模式或内部结构。K-均值聚类、高斯混合等是无监督学习的方法。甚至数据降维技术，如主成分分析（PCA）、奇异值分解（SVD）、自动编码器等，也都是无监督学习方法。
- en: Reinforcement Learning
  id: totrans-862
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 强化学习
- en: Reinforcement learning (RL) deals with training an “Agent” that can take suitable
    “actions” given a specific “state” of the “environment” using a “policy” to maximize
    some long-term “reward.” Each of the term in the definition is important to understand
    reinforcement learning.
  id: totrans-863
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习（RL）涉及训练一个“智能体”，该智能体可以使用“策略”在“环境”的特定“状态”下采取适当的“动作”，以最大化某些长期“奖励”。定义中的每个术语对于理解强化学习都很重要。
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig40_HTML.jpg)'
  id: totrans-864
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig40_HTML.jpg)'
- en: The representation of a reinforcement learning paradigm. It has two rectangular
    blocks for agents and the environment, and the lines connecting them denote state,
    policy, action, and transition.
  id: totrans-865
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习范式的表示。它有两个矩形块，分别代表智能体和环境，连接它们的线条表示状态、策略、动作和转换。
- en: Figure 1-39
  id: totrans-866
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-39
- en: High-level representation of a reinforcement learning paradigm
  id: totrans-867
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习范式的高级表示
- en: In an RL environment, the Agent learns a policy by interacting with the environment
    in such a way to maximize some long-term reward.
  id: totrans-868
  prefs: []
  type: TYPE_NORMAL
  zh: 在强化学习环境中，智能体通过与环境的交互，以最大化某些长期奖励的方式来学习策略。
- en: A state in RL can be any condition of the environment. For instance, when one
    drives a car, the state can be defined by the position and speed of the car as
    well as the position and speed of the neighboring cars. In the diagram above,
    the state of the system at time *t* is defined as *s*^((*t*)).
  id: totrans-869
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习中的状态可以是环境的任何条件。例如，当一个人开车时，状态可以由汽车的位置和速度以及相邻汽车的位置和速度来定义。在上面的图中，时间 *t* 时系统的状态定义为
    *s*^((t))。
- en: Presented with a state *s*^((*t*)), the RL agent tries to determine an optimal
    action *a*^((*t*)) using the leant policy *π*(.). A policy is a mapping from states
    to actions and can be probabilistic or deterministic. The RL agent learns the
    policy by interacting with the environment.
  id: totrans-870
  prefs: []
  type: TYPE_NORMAL
  zh: 当呈现状态 *s*^((*t*)) 时，强化学习智能体尝试使用学习到的策略 *π*(.) 来确定最优动作 *a*^((*t*))。策略是从状态到动作的映射，可以是概率性的或确定性的。强化学习智能体通过与环境的交互来学习策略。
- en: The reward is the environment’s feedback of the action in each state. The immediate
    reward at time *t* on taking action *a*^((*t*)) at state *s*^((*t*)) is given
    by *r*^((*t*)).
  id: totrans-871
  prefs: []
  type: TYPE_NORMAL
  zh: 奖励是环境对每个状态下动作的反馈。在时间 *t*，于状态 *s*^((*t*)) 采取动作 *a*^((*t*)) 所获得的即时奖励由 *r*^((*t*))
    给出。
- en: When the agent takes an action *a*^((*t*)) at a given state *s*^((*t*)) along
    with the immediate reward *r*^((*t*)), it is presented with a new state *s*^((*t* + 1))
    based on the transition function of the environment *P*(*s*^((*t* + 1)), *r*^((*t* + 1))|
    *s*^((*t*)), *a*^((*t*))). The agent should learn the policy in such a way that
    it not only maximizes the immediate reward *r*^((*t*+)) but also moves to a favorable
    next step *s*^((*t* + 1)) that favors high rewards. In essence, the action in
    each state should be taken in such a way so that the long-term reward is maximized.
  id: totrans-872
  prefs: []
  type: TYPE_NORMAL
  zh: 当智能体在给定状态 *s*^((*t*)) 下采取动作 *a*^((*t*)) 并获得即时奖励 *r*^((*t*)) 时，它会根据环境的转移函数 *P*(*s*^((*t* + 1)),
    *r*^((*t* + 1))| *s*^((*t*)), *a*^((*t*))) 进入一个新状态 *s*^((*t* + 1))。智能体应以这样的方式学习策略：它不仅最大化即时奖励
    *r*^((*t*+))，而且转移到有利于获得高奖励的下一步状态 *s*^((*t* + 1))。本质上，在每个状态下采取的动作应使长期奖励最大化。
- en: 'To understand long-term reward, let us suppose an agent realizes the sequence
    of states, actions, and rewards following a policy *π* as the following:'
  id: totrans-873
  prefs: []
  type: TYPE_NORMAL
  zh: 为了理解长期奖励，假设智能体遵循策略 *π* 实现了以下状态、动作和奖励序列：
- en: Sequence of state, action, and rewards following a policy *π*
  id: totrans-874
  prefs: []
  type: TYPE_NORMAL
  zh: 遵循策略 *π* 的状态、动作和奖励序列
- en: '*s*^((0)), *a*^((0)), *r*^((1)), *s*^((1)), *a*^((1)), *r*^((2))… … … … . *s*^((*t*)),
    *a*^((*t*)), ***r***^((***t +*** **1**)), *s*^((*t* + 1)), *a*^((*t* + 1)), *r*^((*t* + 2)),
    *s*^((*t* + 2))… *         s*^((*t* + *N* − 1)), *a*^((*t* + *N* − 1)), *r*^((*t* + *N*)),
    *s*^((*t* + *N*))'
  id: totrans-875
  prefs: []
  type: TYPE_NORMAL
  zh: '*s*^((0)), *a*^((0)), *r*^((1)), *s*^((1)), *a*^((1)), *r*^((2))… … … … . *s*^((*t*)),
    *a*^((*t*)), ***r***^((***t +*** **1**)), *s*^((*t* + 1)), *a*^((*t* + 1)), *r*^((*t* + 2)),
    *s*^((*t* + 2))… *         s*^((*t* + *N* − 1)), *a*^((*t* + *N* − 1)), *r*^((*t* + *N*)),
    *s*^((*t* + *N*))'
- en: Long-term reward at time *t* choosing action *a*^((*t*)) when presented with
    state *s*^((*t*))
  id: totrans-876
  prefs: []
  type: TYPE_NORMAL
  zh: 在时间 *t* 呈现状态 *s*^((*t*)) 时，选择动作 *a*^((*t*)) 所获得的长期奖励
- en: '![$$ G(t)={\sum}_{i=1}^N{r}^{\left(t+i\right)} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfx.png)'
  id: totrans-877
  prefs: []
  type: TYPE_IMG
  zh: '![$$ G(t)={\sum}_{i=1}^N{r}^{\left(t+i\right)} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfx.png)'
- en: 'Generally, the near-term rewards are given more precedence over the future
    rewards, and hence the long-term reward using a discount factor *γ* is expressed
    as follows:'
  id: totrans-878
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，近期奖励比未来奖励更受重视，因此使用折扣因子 *γ* 表示的长期奖励如下：
- en: '![$$ G(t)={\sum}_{i=1}^N{\gamma}^{i-1}{r}^{\left(t+i\right)} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfy.png)'
  id: totrans-879
  prefs: []
  type: TYPE_IMG
  zh: '![$$ G(t)={\sum}_{i=1}^N{\gamma}^{i-1}{r}^{\left(t+i\right)} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfy.png)'
- en: The discount factor *γ* < 1, and hence it helps in ensuring the long-term reward
    does not diverge in case of very long or infinite horizon problems.
  id: totrans-880
  prefs: []
  type: TYPE_NORMAL
  zh: 折扣因子 *γ* < 1，这有助于确保在非常长或无限时间范围的问题中，长期奖励不会发散。
- en: Optimization Techniques for Machine-Learning Gradient Descent
  id: totrans-881
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 机器学习的优化技术：梯度下降
- en: Gradient descent, along with its several variants, is probably the most widely
    used optimization technique in machine learning and deep learning. It’s an iterative
    method that starts with a random model parameter and uses the gradient of the
    cost function with respect to the model parameter to determine the direction in
    which the model parameter should be updated.
  id: totrans-882
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度下降及其几种变体，可能是机器学习和深度学习中最广泛使用的优化技术。它是一种迭代方法，从随机模型参数开始，利用成本函数相对于模型参数的梯度来确定模型参数的更新方向。
- en: Suppose we have a cost function *C*(*θ*), where *θ* represents the model parameters.
    We know the gradient of the cost function with respect to *θ* gives us the direction
    of maximum increase of *C*(*θ*) in a linear sense at the value of *θ* at which
    the gradient is evaluated. So, to get the direction of maximum decrease of *C*(*θ*)
    in a linear sense, one should use the negative of the gradient.
  id: totrans-883
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们有一个代价函数 *C*(*θ*)，其中 *θ* 代表模型参数。我们知道代价函数关于 *θ* 的梯度给出了在梯度评估的 *θ* 值处 *C*(*θ*)
    在线性意义上的最大增加方向。因此，为了得到 *C*(*θ*) 在线性意义上的最大减少方向，应该使用梯度的负值。
- en: 'The update rule of the model parameter *θ* at iteration (*t* + 1) is given
    by the following:'
  id: totrans-884
  prefs: []
  type: TYPE_NORMAL
  zh: 模型参数 *θ* 在迭代 (*t* + 1) 时的更新规则如下：
- en: '![$$ {\theta}^{\left(t+1\right)}={\theta}^{(t)}\kern0.5em -\kern0.5em \eta
    \nabla C\left({\theta}^{(t)}\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfz.png)'
  id: totrans-885
  prefs: []
  type: TYPE_IMG
  zh: '![更新规则公式](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfz.png)'
- en: where *η* represents the learning rate and *θ*^((*t* + 1)) and *θ*^((*t*)) represent
    the parameter vector at iteration (*t* + 1) and *t,* respectively.
  id: totrans-886
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *η* 代表学习率，*θ*^((*t* + 1)) 和 *θ*^((*t*)) 分别代表迭代 (*t* + 1) 和 *t* 时的参数向量。
- en: Once minima is reached through this iterative process, the gradient of the cost
    function at minima would technically be zero, and hence there would be no further
    updates to *θ*. However, because of rounding errors and other limitations of computers,
    converging to true minima might not be achievable. Thus, we would have to come
    up with some other logic to stop the iterative process when we believe we have
    reached minima—or at least close enough to the minima—to stop the iterative process
    of model training. One of the ways generally used is to check the magnitude of
    the gradient vector, and if it is less than some predefined minute quantity—say,
    *ε*—stop the iterative process. The other crude way that can be used is to stop
    the iterative process of the parameter update after a fixed number of iterations,
    like 1000.
  id: totrans-887
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦通过这个迭代过程达到最小值，代价函数在最小值处的梯度在技术上将是零，因此不会有进一步的 *θ* 更新。然而，由于舍入误差和计算机的其他限制，达到真正的最小值可能是不可能的。因此，当我们认为我们已经达到最小值——或者至少足够接近最小值以停止模型训练的迭代过程时，我们必须想出一些其他逻辑来停止迭代过程。通常使用的一种方法是通过检查梯度向量的幅度，如果它小于某个预定义的极小量——比如说，*ε*——则停止迭代过程。另一种可以使用的粗略方法是，在固定次数的迭代后停止参数更新的迭代过程，比如
    1000 次。
- en: Learning rate plays a very vital role in the convergence of the gradient descent
    to the minima point. If the learning rate is large, the convergence might be faster
    but might lead to severe oscillations around the point of minima. A small learning
    rate might take a longer time to reach the minima, but the convergence is generally
    oscillation-free.
  id: totrans-888
  prefs: []
  type: TYPE_NORMAL
  zh: 学习率在梯度下降收敛到最小值点中起着非常关键的作用。如果学习率很大，收敛可能会更快，但可能导致最小值点周围的剧烈振荡。学习率较小可能需要更长的时间才能达到最小值，但通常收敛是振荡无的。
- en: To see why gradient descent works, let’s take a model that has one parameter
    and a cost function *C*(*θ*) = (*θ* − *a*)² + *b* and see why the method works.
  id: totrans-889
  prefs: []
  type: TYPE_NORMAL
  zh: 为了了解梯度下降为什么有效，让我们考虑一个只有一个参数和代价函数 *C*(*θ*) = (*θ* - *a*)² + *b* 的模型，并看看为什么这种方法有效。
- en: As we can see from Figure [1-37](#Fig38), the gradient (in this case it’s just
    the derivative) at point *θ*[1] is positive, and thus if we move along the gradient
    direction, the cost function would increase. Instead, at *θ*[1] if we move along
    the negative of the gradient, the cost reduces. Again, let’s take the point *θ*[2]
    where the gradient is negative. If we take the gradient direction here for updating
    *θ*, the cost function would increase. Taking the negative direction of the gradient
    would ensure that we move toward the minima. Once we reach the minima at *θ* = *a*,
    the gradient is 0, and hence there would be no further update to *θ*.
  id: totrans-890
  prefs: []
  type: TYPE_NORMAL
  zh: 从图 [1-37](#Fig38) 可以看出，在点 *θ*[1] 处的梯度（在这种情况下就是导数）是正的，因此如果我们沿着梯度方向移动，代价函数会增加。相反，在
    *θ*[1] 处，如果我们沿着梯度的负方向移动，代价会减少。再次，让我们考虑梯度为负的点 *θ*[2]。如果我们在这里取梯度方向来更新 *θ*，代价函数会增加。取梯度的负方向可以确保我们朝着最小值移动。一旦我们达到
    *θ* = *a* 的最小值，梯度为 0，因此不会有进一步的 *θ* 更新。
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig41_HTML.jpg)'
  id: totrans-891
  prefs: []
  type: TYPE_IMG
  zh: '![图 41](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig41_HTML.jpg)'
- en: The two-dimensional plane of function of theta versus theta. It represents a
    sagging curve with two tangent vectors, theta 1 and theta 2.
  id: totrans-892
  prefs: []
  type: TYPE_NORMAL
  zh: 函数的 theta 与 theta 的二维平面。它表示一个下凹曲线，有两个切向量，theta 1 和 theta 2。
- en: Figure 1-40
  id: totrans-893
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-40
- en: Gradient-descent intuition with simple cost function in one variable
  id: totrans-894
  prefs: []
  type: TYPE_NORMAL
  zh: 单变量简单代价函数的梯度下降直觉
- en: Gradient Descent for a Multivariate Cost Function
  id: totrans-895
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 多变量代价函数的梯度下降
- en: Now that we have some intuition about gradient descent from looking at a cost
    function based on one parameter, let us look at gradient descent when the cost
    function is based on multiple parameters.
  id: totrans-896
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经从基于一个参数的代价函数中获得了关于梯度下降的一些直觉，让我们看看当代价函数基于多个参数时的梯度下降。
- en: Let us look at a Taylor series expansion of a function of multiple variables.
    Multiple variables can be represented by the vector *θ*. Let us consider a cost
    function *C*(*θ*) where *θ* ∈ *R*^(*n* × 1) .
  id: totrans-897
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看一个多变量函数的泰勒级数展开。多个变量可以用向量 *θ* 来表示。让我们考虑一个代价函数 *C*(*θ*)，其中 *θ* ∈ *R*^(*n* × 1) .
- en: 'As discussed earlier, the Taylor series expansion around a point *θ* can be
    expressed in matrix notation, as shown here:'
  id: totrans-898
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，围绕点 *θ* 的泰勒级数展开可以用矩阵表示法表示，如下所示：
- en: '![$$ C\left(\theta +\varDelta \theta \right)=C\left(\theta \right)+\varDelta
    {\theta}^T\mathit{\nabla}C\left(\theta \right)+\frac{1}{2} \varDelta {\theta}^TH\left(\theta
    \right)\varDelta \theta + higher\kern0.5em order\kern0.5em terms $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equga.png)'
  id: totrans-899
  prefs: []
  type: TYPE_IMG
  zh: '![ $$ C\left(\theta +\varDelta \theta \right)=C\left(\theta \right)+\varDelta
    {\theta}^T\mathit{\nabla}C\left(\theta \right)+\frac{1}{2} \varDelta {\theta}^TH\left(\theta
    \right)\varDelta \theta + higher\kern0.5em order\kern0.5em terms $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equga.png)'
- en: '![$$ \varDelta \theta \to \kern0.5em Change\kern0.5em in\kern0.5em \theta \kern0.5em
    vector $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgb.png)'
  id: totrans-900
  prefs: []
  type: TYPE_IMG
  zh: '![ $$ \varDelta \theta \to \kern0.5em Change\kern0.5em in\kern0.5em \theta
    \kern0.5em vector $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgb.png)'
- en: '![$$ \nabla C\left(\theta \right)\to \kern0.5em Gradient\kern0.5em vector\kern0.5em
    of\kern0.5em C\left(\theta \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgc.png)'
  id: totrans-901
  prefs: []
  type: TYPE_IMG
  zh: '![梯度向量 $$ \nabla C\left(\theta \right)\to \kern0.5em Gradient\kern0.5em vector\kern0.5em
    of\kern0.5em C\left(\theta \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgc.png)'
- en: '![$$ H\left(\theta \right)\kern0.5em \to \kern0.5em Hessian\kern0.5em matrix\kern0.5em
    of\kern0.5em C\left(\theta \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgd.png)'
  id: totrans-902
  prefs: []
  type: TYPE_IMG
  zh: '![ $$ H\left(\theta \right)\kern0.5em \to \kern0.5em Hessian\kern0.5em matrix\kern0.5em
    of\kern0.5em C\left(\theta \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgd.png)'
- en: Let us suppose at iteration *t* of gradient descent the model parameter is *θ*
    and we want update *θ* to (*θ* + *Δθ*) by making an update of *Δθ* such that *C*(*θ* + *Δθ*)
    is lesser than *C*(*θ*).
  id: totrans-903
  prefs: []
  type: TYPE_NORMAL
  zh: 假设梯度下降的迭代 *t* 中模型参数是 *θ*，我们希望通过更新 *Δθ* 来将 *θ* 更新为 (*θ* + *Δθ*)，使得 *C*(*θ* + *Δθ*)
    小于 *C*(*θ*).
- en: 'If we assume linearity of the function in the neighborhood of *θ*, then from
    Taylor series expansion, we get the following:'
  id: totrans-904
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们假设函数在 *θ* 附近的线性，那么从泰勒级数展开，我们得到以下结果：
- en: '![$$ C\left(\theta +\varDelta \theta \right)=C\left(\theta \right)+\varDelta
    {\theta}^T\nabla C\left(\theta \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equge.png)'
  id: totrans-905
  prefs: []
  type: TYPE_IMG
  zh: '![ $$ C\left(\theta +\varDelta \theta \right)=C\left(\theta \right)+\varDelta
    {\theta}^T\nabla C\left(\theta \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equge.png)'
- en: We want to choose *Δθ* in such a way that *C*(*θ* + *Δθ*) is less than *C*(*θ*).
  id: totrans-906
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望选择 *Δθ*，使得 *C*(*θ* + *Δθ*) 小于 *C*(*θ*).
- en: 'For all *Δθ* with the same magnitude, the one that will maximize the dot product
    *Δθ*^(*T*) 𝛻 *C*(*θ*) should have a direction the same as that of 𝛻*C*(*θ*). But
    that would give us the maximum possible *Δθ*^(*T*) 𝛻 *C*(*θ*). Hence, to get the
    minimum value of the dot product *Δθ*^(*T*) 𝛻 *C*(*θ*), the direction of *Δθ*
    should be the exact opposite of that of 𝛻*C*(*θ*). In other words, *Δθ* should
    be proportional to the negative of the gradient vector :'
  id: totrans-907
  prefs: []
  type: TYPE_NORMAL
  zh: 对于所有具有相同大小的 *Δθ*，将最大化点积 *Δθ*^(*T*) 𝛻 *C*(*θ*) 的方向应该与 𝛻*C*(*θ*) 的方向相同。但那样会给我们带来最大的
    *Δθ*^(*T*) 𝛻 *C*(*θ*)。因此，为了得到点积 *Δθ*^(*T*) 𝛻 *C*(*θ*) 的最小值，*Δθ* 的方向应该与 𝛻*C*(*θ*)
    的方向完全相反。换句话说，*Δθ* 应该与梯度向量的负值成比例：
- en: '![$$ \varDelta \theta \propto -\mathit{\nabla}C\left(\theta \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgf.png)'
  id: totrans-908
  prefs: []
  type: TYPE_IMG
  zh: '![ $$ \varDelta \theta \propto -\mathit{\nabla}C\left(\theta \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgf.png)'
- en: => *Δθ* =  − *η* 𝛻 *C*(*θ*), where *η* is the learning rate
  id: totrans-909
  prefs: []
  type: TYPE_NORMAL
  zh: => *Δθ* =  − *η* 𝛻 *C*(*θ*), 其中 *η* 是学习率
- en: =>*θ* + *Δθ* = *θ* − *η𝛻C*(*θ*)
  id: totrans-910
  prefs: []
  type: TYPE_NORMAL
  zh: =>*θ* + *Δθ* = *θ* − *η𝛻C*(*θ*)
- en: =>*θ*^((*t* + 1)) = *θ*^((*t*)) − *η* 𝛻 *C*(*θ*^((*t*)))
  id: totrans-911
  prefs: []
  type: TYPE_NORMAL
  zh: =>*θ*^((*t* + 1)) = *θ*^((*t*)) − *η* 𝛻 *C*(*θ*)
- en: which is the famous equation for gradient descent. To visualize how the gradient
    descent proceeds to the minima, we need to have some basic understanding of contour
    plots and contour lines.
  id: totrans-912
  prefs: []
  type: TYPE_NORMAL
  zh: 这是著名的梯度下降方程。为了可视化梯度下降如何达到最小值，我们需要对等高线和等高线图有一些基本了解。
- en: Contour Plot and Contour Lines
  id: totrans-913
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 等高线图和等高线
- en: Let us consider a function *C*(*θ*) where *θ* ∈ *R*^(*n* × 1). A contour line
    is a line/curve in the vector space of *θ* that connects points that have the
    same value of the function *C*(*θ*). For each unique value of *C*(*θ*), we would
    have separate contour lines.
  id: totrans-914
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑一个函数 *C*(*θ*)，其中 *θ* ∈ *R*^(*n* × 1)。等高线是连接函数 *C*(*θ*)具有相同值的点的向量空间中的线/曲线。对于
    *C*(*θ*)的每个唯一值，我们都会有单独的等高线。
- en: Let us plot the contour lines for a function *C*(*θ*) = *θ*^(*T*)*Aθ*, where
    *θ* = [*θ*[1]*θ*[2]]^(*T*) ∈ *R*^(2 × 1) and
  id: totrans-915
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们绘制函数 *C*(*θ*) = *θ*^(*T*)*Aθ* 的等高线，其中 *θ* = [*θ*[1]*θ*[2]]^(*T*) ∈ *R*^(2
    × 1)，
- en: '![$$ A=\left[\begin{array}{cc}7&amp; 2\\ {}2&amp; 5\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgg.png)'
  id: totrans-916
  prefs: []
  type: TYPE_IMG
  zh: '![$$ A=\left[\begin{array}{cc}7& 2\\ 2& 5\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgg.png)'
- en: 'Expanding the expression for *C*(*θ*), we get the following:'
  id: totrans-917
  prefs: []
  type: TYPE_NORMAL
  zh: 展开关于 *C*(*θ*)的表达式，我们得到以下结果：
- en: '![$$ C\left({\theta}_1,{\theta}_2\right)=7{\theta_1}^2+5{\theta_2}^2+4{\theta}_1{\theta}_2
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgh.png)'
  id: totrans-918
  prefs: []
  type: TYPE_IMG
  zh: '![$$ C\left({\theta}_1,{\theta}_2\right)=7{\theta_1}^2+5{\theta_2}^2+4{\theta}_1{\theta}_2
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgh.png)'
- en: The contour plot for the cost function is depicted in Figure [1-38](#Fig39).
  id: totrans-919
  prefs: []
  type: TYPE_NORMAL
  zh: 成本函数的等高线图如图[1-38](#Fig39)所示。
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig42_HTML.jpg)'
  id: totrans-920
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig42_HTML.jpg)'
- en: The graph of theta 2 versus theta 1 displays the inclined concentric ellipse
    with all shaded regions.
  id: totrans-921
  prefs: []
  type: TYPE_NORMAL
  zh: θ2与θ1的图形显示了所有阴影区域的倾斜同心椭圆。
- en: Figure 1-41
  id: totrans-922
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-41
- en: Contour plots
  id: totrans-923
  prefs: []
  type: TYPE_NORMAL
  zh: 等高线图
- en: Each of the ellipses are contour lines specific to a fixed value of the function
    *C*(*θ*[1], *θ*[2]). If *C*(*θ*[1], *θ*[2]) = *a*, where *a* is a constant, then
    the equation
  id: totrans-924
  prefs: []
  type: TYPE_NORMAL
  zh: 每个椭圆都是针对函数 *C*(*θ*[1], *θ*[2]) 的固定值特定的等高线。如果 *C*(*θ*[1], *θ*[2]) = *a*，其中 *a*
    是一个常数，那么方程
- en: '*a* = 7*θ*[1]² + 5*θ*[2]² + 4*θ*[1]*θ*[2] represents an ellipse.'
  id: totrans-925
  prefs: []
  type: TYPE_NORMAL
  zh: '*a* = 7*θ*[1]² + 5*θ*[2]² + 4*θ*[1]*θ*[2] 表示一个椭圆。'
- en: For different values of constant, *we* get different ellipses, as depicted in
    Figure [1-38](#Fig39). All points on a specific contour line have the same value
    of the function.
  id: totrans-926
  prefs: []
  type: TYPE_NORMAL
  zh: 对于不同的常数值，我们得到不同的椭圆，如图[1-38](#Fig39)所示。等高线上的所有点都具有函数的相同值。
- en: Now that we know what a contour plot is, let us look at gradient-descent progression
    in a contour plot for the cost function *C*(*θ*), where *θ* ∈ *R*^(2 × 1). The
    gradient-descent steps have been illustrated in Figure [1-39](#Fig40).
  id: totrans-927
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经知道了等高线图是什么，让我们看看成本函数 *C*(*θ*) 的等高线图中的梯度下降过程，其中 *θ* ∈ *R*^(2 × 1)。梯度下降步骤已在图[1-39](#Fig40)中说明。
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig43_HTML.jpg)'
  id: totrans-928
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig43_HTML.jpg)'
- en: The concentric circles of seven layers are represented on the two-dimensional
    plane of theta 2 versus theta 1\. Four tangent vectors are marked with dotted
    lines.
  id: totrans-929
  prefs: []
  type: TYPE_NORMAL
  zh: 七层同心圆在θ2与θ1的二维平面上表示。有四个切向量用虚线标记。
- en: Figure 1-42
  id: totrans-930
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-42
- en: Gradient descent for a two-variable cost function
  id: totrans-931
  prefs: []
  type: TYPE_NORMAL
  zh: 二变量成本函数的梯度下降
- en: Let us take the largest ellipse corresponding to cost *C*[1] and assume our
    current *θ* is at the point *θ*^((1)) in *C*[1].
  id: totrans-932
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们取对应于成本 *C*[1] 的最大椭圆，并假设我们的当前 *θ* 位于 *C*[1] 中的点 *θ*^((1))。
- en: 'Assuming the linearity of the *C*(*θ*) about *θ*, the change in cost function
    *C*(*θ*) can be presented as seen here:'
  id: totrans-933
  prefs: []
  type: TYPE_NORMAL
  zh: 假设 *C*(*θ*)关于 *θ* 的线性，成本函数 *C*(*θ*)的变化可以表示如下：
- en: '![$$ \varDelta C\left(\theta \right)=\varDelta {\theta}^T\nabla C\left(\theta
    \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgi.png)'
  id: totrans-934
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \varDelta C\left(\theta \right)=\varDelta {\theta}^T\nabla C\left(\theta
    \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgi.png)'
- en: If we take a small change in cost between two points very close to each other
    in the same contour line, then *ΔC*(*θ*) = 0, since all points on the same contour
    line have the same fixed value. Also, it should be noted that when we take two
    points very close to each other on the same contour line, the *Δθ* represents
    the tangent to the contour line represented by tangential arrows to the contour
    line. Please do not confuse this *Δθ* to be the *Δθ* update to the parameter in
    gradient descent.
  id: totrans-935
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们在同一等高线上的两个非常接近的点之间取成本的小变化，那么 *ΔC*(*θ*) = 0，因为同一等高线上的所有点都具有相同的固定值。此外，应注意，当我们取同一等高线上的两个非常接近的点时，*Δθ*
    表示由等高线切向箭头表示的等高线的切线。请勿将此 *Δθ* 与梯度下降中参数的 *Δθ* 更新混淆。
- en: '*ΔC*(*θ*) = 0 → *Δθ*^(*T*) ∇ *C*(*θ*) = 0, which basically means that the gradient
    is perpendicular to the tangent at the point *θ*^((1)) in the contour line *C*[1].
    The gradient would have pointed outward, whereas the negative of the gradient
    points inward, as depicted by the arrow perpendicular to the tangent. Based on
    the learning rate, it will reach a point *θ*^((2)) in a different contour line
    represented by *C*[2], whose cost-function value would be less than that of *C*[1].
    Again, the gradient would be evaluated at *θ*^((2)), and the same process would
    be repeated for several iterations until it reached the minima point, where the
    gradient would drop to 0 technically, after which there would be no more updates
    to *θ*.'
  id: totrans-936
  prefs: []
  type: TYPE_NORMAL
  zh: '*ΔC*(*θ*) = 0 → *Δθ*^(*T*) ∇ *C*(*θ*) = 0，这基本上意味着梯度在等高线 *C* 上的点 *θ*^((1)) 处垂直于切线。梯度会指向外侧，而梯度的负值指向内侧，如垂直于切线的箭头所示。根据学习率，它将达到由
    *C*[2] 表示的不同等高线上的点 *θ*^((2))，其成本函数值将低于 *C*[1]。再次，梯度将在 *θ*^((2)) 处评估，并且相同的步骤将在几个迭代中重复，直到达到极小值点，此时梯度在技术上会下降到
    0，之后将不再更新 *θ*。'
- en: Steepest Descent
  id: totrans-937
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 最速下降法
- en: Steepest descent is a form of gradient descent where the learning rate is not
    constant but rather is computed at every iteration to ensure that the parameter
    update through gradient descent takes the cost function to minima with respect
    to the learning rate. In other words, the learning rate at every iteration in
    steepest descent is optimized to ensure that the movement in the direction of
    the gradient is utilized to the maximum extent.
  id: totrans-938
  prefs: []
  type: TYPE_NORMAL
  zh: 最速下降法是一种梯度下降的形式，其中学习率不是常数，而是在每次迭代时计算，以确保通过梯度下降进行的参数更新将成本函数带到相对于学习率的极小值。换句话说，在最速下降法中，每次迭代的
    learning rate 都被优化，以确保在梯度方向上的移动被最大限度地利用。
- en: 'Let us take our usual cost function *C*(*θ*) and look at successive iterations
    *t* and (*t* + 1). As with gradient descent, we have the parameter update rule
    as follows:'
  id: totrans-939
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们以我们常用的成本函数 *C*(*θ*) 为例，看看连续的迭代 *t* 和 (*t* + 1)。与梯度下降一样，我们有以下参数更新规则：
- en: '![$$ {\theta}^{\left(t+1\right)}={\theta}^{(t)}\kern0.5em -\kern0.5em \eta
    \nabla C\left({\theta}^{(t)}\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgj.png)'
  id: totrans-940
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\theta}^{\left(t+1\right)}={\theta}^{(t)}\kern0.5em -\kern0.5em \eta
    \nabla C\left({\theta}^{(t)}\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgj.png)'
- en: 'So, the cost function at iteration (*t* + 1) can be expressed as follows:'
  id: totrans-941
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，迭代(*t* + 1)的成本函数可以表示如下：
- en: '![$$ C\left({\theta}^{\left(t+1\right)}\right)=C\left({\theta}^{(t)}\kern0.5em
    -\kern0.5em \eta \nabla C\left({\theta}^{(t)}\right)\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgk.png)'
  id: totrans-942
  prefs: []
  type: TYPE_IMG
  zh: '![$$ C\left({\theta}^{\left(t+1\right)}\right)=C\left({\theta}^{(t)}\kern0.5em
    -\kern0.5em \eta \nabla C\left({\theta}^{(t)}\right)\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgk.png)'
- en: 'To minimize the cost function at iteration (*t* + 1) with respect to the learning
    rate, see the following:'
  id: totrans-943
  prefs: []
  type: TYPE_NORMAL
  zh: 为了在迭代(*t* + 1)中相对于学习率最小化成本函数，请参阅以下内容：
- en: '![$$ \frac{\partial C\left({\theta}^{\left(t+1\right)}\right)}{\partial \eta
    }=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgl.png)'
  id: totrans-944
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \frac{\partial C\left({\theta}^{\left(t+1\right)}\right)}{\partial \eta
    }=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgl.png)'
- en: '![$$ =&gt;\nabla C\left({\theta}^{\left(t+1\right)}\right)\frac{\partial \left[C\Big({\theta}^{(t)}\kern0.5em
    -\kern0.5em \eta \nabla C\left({\theta}^{(t)}\right)\right]}{\partial \eta }=0
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgm.png)'
  id: totrans-945
  prefs: []
  type: TYPE_IMG
  zh: '![$$ =&gt;\nabla C\left({\theta}^{\left(t+1\right)}\right)\frac{\partial \left[C\Big({\theta}^{(t)}\kern0.5em
    -\kern0.5em \eta \nabla C\left({\theta}^{(t)}\right)\right]}{\partial \eta }=0
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgm.png)'
- en: '![$$ =&gt;-\nabla C{\left({\theta}^{\left(t+1\right)}\right)}^T\nabla C\left({\theta}^{(t)}\right)=0
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgn.png)'
  id: totrans-946
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgn.png)'
- en: '![$$ =&gt;\nabla C{\left({\theta}^{\left(t+1\right)}\right)}^T\nabla C\left({\theta}^{(t)}\right)=0
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgo.png)'
  id: totrans-947
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgo.png)'
- en: So, for steepest descent, the dot product of the gradients at (*t* + 1) and
    *t* is 0, which implies that the gradient vector at every iteration should be
    perpendicular to the gradient vector at its previous iteration.
  id: totrans-948
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，对于最速下降法，梯度在 (*t* + 1) 和 *t* 之间的点积为 0，这意味着在每次迭代中，梯度向量都应该与之前迭代的梯度向量垂直。
- en: Stochastic Gradient Descent
  id: totrans-949
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 随机梯度下降
- en: Both steepest descent and gradient descent are full-batch models; i.e., the
    gradients are computed based on the whole training dataset. So, if the dataset
    is huge, the gradient computation becomes expensive, and the memory requirement
    increases. Also, if the dataset has huge redundancy, then computing the gradient
    on the full dataset is not useful since similar gradients can be computed by using
    much smaller batches called mini-batches. The most popular method to overcome
    the preceding problems is to use an optimization technique called stochastic gradient
    descent.
  id: totrans-950
  prefs: []
  type: TYPE_NORMAL
  zh: 最速下降法和梯度下降法都是全批量模型；即梯度是基于整个训练数据集计算的。因此，如果数据集很大，梯度计算变得昂贵，内存需求增加。此外，如果数据集具有大量冗余，那么在完整数据集上计算梯度是没有用的，因为可以通过使用称为小批量的更小的批次来计算相似的梯度。克服上述问题的最流行方法是使用一种称为随机梯度下降的优化技术。
- en: Stochastic gradient descent is a technique for minimizing a cost function based
    on the gradient-descent method where the gradient at each step is not based on
    the entire dataset but rather on single data points.
  id: totrans-951
  prefs: []
  type: TYPE_NORMAL
  zh: 随机梯度下降是一种基于梯度下降法来最小化成本函数的技术，其中每一步的梯度不是基于整个数据集，而是基于单个数据点。
- en: Let *C*(*θ*) be the cost function based on *m* training samples. The gradient
    descent at each step is not based on *C*(*θ*) but rather on *C*^((*i*))(*θ*),
    which is the cost function based on the *ith* training sample. So, if we must
    plot the gradient vectors at each iteration against the overall cost function,
    the contour lines would not be perpendicular to the tangents since they are based
    on gradients of *C*^((*i*))(*θ*) and not on the overall C(*θ*).
  id: totrans-952
  prefs: []
  type: TYPE_NORMAL
  zh: 设 *C*(*θ*) 为基于 *m* 个训练样本的成本函数。每一步的梯度下降不是基于 *C*(*θ*)，而是基于 *C*^((*i*))(*θ*)，即基于第
    *i* 个训练样本的成本函数。因此，如果我们必须将每次迭代的梯度向量与整体成本函数绘制出来，等高线将不会与切线垂直，因为它们是基于 *C*^((*i*))(*θ*)
    的梯度，而不是基于整体 C(*θ*)。
- en: The cost functions *C*^((*i*))(*θ*) are used for gradient computation at each
    iteration, and the model parameter vector *θ* is updated by the standard gradient
    descent in each iteration until we have made a pass over the entire training dataset.
    We can perform several such passes over the entire dataset until a reasonable
    convergence is obtained.
  id: totrans-953
  prefs: []
  type: TYPE_NORMAL
  zh: 在每次迭代中，使用成本函数 *C*^((*i*))(*θ*) 进行梯度计算，并且通过每次迭代的标准梯度下降更新模型参数向量 *θ*，直到我们遍历了整个训练数据集。我们可以对整个数据集进行多次这样的遍历，直到获得合理的收敛。
- en: Since the gradients at each iteration are not based on the entire training dataset
    but rather on single training samples, they are generally very noisy and may change
    direction rapidly. This may lead to oscillations near the minima of the cost function,
    and hence the learning rate should be less while converging to the minima so that
    the update to the parameter vector is as small as possible. The gradients are
    cheaper and faster to compute, and so the gradient descent tends to converge faster.
  id: totrans-954
  prefs: []
  type: TYPE_NORMAL
  zh: 由于每次迭代的梯度不是基于整个训练数据集，而是基于单个训练样本，因此它们通常非常嘈杂，并且可能迅速改变方向。这可能导致成本函数最小值附近的振荡，因此在学习率收敛到最小值时应减小，以便参数向量的更新尽可能小。梯度计算更便宜且更快，因此梯度下降倾向于更快收敛。
- en: One thing that is important in stochastic gradient descent is that the training
    samples should be as random as possible. This will ensure that a stochastic gradient
    descent over a period of a few training samples provides a similar update to the
    model parameter as that resulting from an actual gradient descent, since the random
    samples are more likely to represent the total training dataset. If the samples
    at each iteration of stochastic gradient descent are biased, they don’t represent
    the actual dataset, and hence the update to the model parameter might be in a
    direction that would result in it taking a long time for the stochastic gradient
    descent to converge.
  id: totrans-955
  prefs: []
  type: TYPE_NORMAL
  zh: 在随机梯度下降中，一个重要的事情是训练样本应该尽可能随机。这将确保在一段时间内对几个训练样本的随机梯度下降提供的模型参数更新与实际梯度下降产生的更新相似，因为随机样本更有可能代表整个训练数据集。如果随机梯度下降的每次迭代的样本有偏差，它们就不代表实际数据集，因此模型参数的更新可能是在导致随机梯度下降收敛需要很长时间的方向上。
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig44_HTML.jpg)'
  id: totrans-956
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig44_HTML.jpg)'
- en: The graph of cost versus iterations displays the variable fluctuations in the
    total cost-function value.
  id: totrans-957
  prefs: []
  type: TYPE_NORMAL
  zh: 成本与迭代次数的图表显示了总成本函数值的变量波动。
- en: Figure 1-43
  id: totrans-958
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-43
- en: Fluctuation in the total cost-function value over iterations in stochastic gradient
    descent
  id: totrans-959
  prefs: []
  type: TYPE_NORMAL
  zh: 随机梯度下降中总成本函数值迭代的波动
- en: As illustrated in Figure [1-44](#Fig45), the gradients at each step for stochastic
    gradient descent are not perpendicular to the tangents at the contour lines. However,
    they would be perpendicular to the tangents to the contour lines for individual
    training samples had we plotted them. Also, the associated cost reduction over
    iterations is noisy because of the fluctuating gradients.
  id: totrans-960
  prefs: []
  type: TYPE_NORMAL
  zh: 如图 [1-44](#Fig45) 所示，随机梯度下降在每一步的梯度与等高线的切线不垂直。然而，如果我们绘制单个训练样本的切线，它们将是垂直的。此外，由于梯度的波动，迭代过程中的相关成本降低也是嘈杂的。
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig45_HTML.jpg)'
  id: totrans-961
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig45_HTML.jpg)'
- en: The concentric circles of seven layers are represented on the two-dimensional
    plane of theta 2 versus theta 1\. Six arrows are marked in the layers.
  id: totrans-962
  prefs: []
  type: TYPE_NORMAL
  zh: 七层同心圆在 theta 2 与 theta 1 的二维平面上表示。在层中标记了六个箭头。
- en: Figure 1-44
  id: totrans-963
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-44
- en: Stochastic gradient-descent parameter update
  id: totrans-964
  prefs: []
  type: TYPE_NORMAL
  zh: 随机梯度下降参数更新
- en: 'The gradient computations become very cheap when we use single training data
    points. Also, convergence is quite fast, but it does come with its own set of
    disadvantages, as follows:'
  id: totrans-965
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们使用单个训练数据点时，梯度计算变得非常便宜。此外，收敛速度相当快，但它也带来了一组自己的缺点，如下所述：
- en: Since the estimated gradients at each iteration are based not on the total cost
    function but rather on the cost function associated with single data points, the
    gradients are very noisy. This leads to convergence problems at the minima and
    may lead to oscillations.
  id: totrans-966
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于每迭代的估计梯度是基于单个数据点的成本函数，而不是总成本函数，因此梯度非常嘈杂。这导致最小值处的收敛问题，并可能导致振荡。
- en: The tuning of the learning rate becomes important since a high learning rate
    might lead to oscillations while converging to the minima. This is because the
    gradients are very noisy, and hence if the gradient estimates at the convergence
    are not near to zero, a high learning rate will take the update well past the
    minima point, and the process can repeat on either side of the minima.
  id: totrans-967
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习率的调整变得很重要，因为高学习率可能会导致在收敛到最小值时出现振荡。这是因为梯度非常嘈杂，因此如果收敛时的梯度估计值不接近零，高学习率会将更新远远超过最小值点，并且过程可以在最小值点的两侧重复。
- en: 'Since the gradients are noisy, the model parameter values after each iteration
    are also very noisy, and thus heuristics need to be added to the stochastic gradient
    descent to determine which value of model parameter to take. This also brings
    about another question: when to stop the training.'
  id: totrans-968
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于梯度是嘈杂的，每次迭代后的模型参数值也非常嘈杂，因此需要添加启发式方法到随机梯度下降中，以确定要采取的模型参数值。这也带来了另一个问题：何时停止训练。
- en: A compromise between full-batch model and stochastic gradient descent is a mini-batch
    approach wherein the gradient is based neither on the full training dataset nor
    on the single data points. Rather, it uses a mini-batch of training data points
    to compute the cost function. Most of the deep-learning algorithms use a mini-batch
    approach for stochastic gradient descent. The gradients are less noisy and at
    the same time don’t cause many memory constraints because the mini-batch sizes
    are moderate.
  id: totrans-969
  prefs: []
  type: TYPE_NORMAL
  zh: 在全批量模型和随机梯度下降之间的一种折衷方法是迷你批量方法，其中梯度既不是基于整个训练数据集，也不是基于单个数据点。相反，它使用迷你批量的训练数据点来计算成本函数。大多数深度学习算法都使用迷你批量方法进行随机梯度下降。梯度噪声较小，同时不会引起许多内存限制，因为迷你批量的大小是适中的。
- en: We will discuss mini-batches in more detail in Chapter [2](448418_2_En_2_Chapter.xhtml).
  id: totrans-970
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在第[2](448418_2_En_2_Chapter.xhtml)章中更详细地讨论迷你批量。
- en: Newton’s Method
  id: totrans-971
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 牛顿法
- en: Before we start Newton’s method for optimizing a cost function for its minima,
    let us look at the limitations of gradient-descent techniques.
  id: totrans-972
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开始使用牛顿法优化成本函数的最小值之前，让我们看看梯度下降技术的局限性。
- en: Gradient-descent methods rely on the linearity of the cost function between
    successive iterations; i.e., the parameter value at iteration (*t* + 1) can be
    reached from the parameter value at time *t* by following the gradient, since
    the path of the cost function C(*θ*) from *t* to (*t* + 1) is linear or can be
    joined by a straight line. This is a very simplified assumption and would not
    yield good directions for gradient descent if the cost function is highly nonlinear
    or has curvature. To get a better idea of this, let us look at the plot of a cost
    function with a single variable for three different cases.
  id: totrans-973
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度下降方法依赖于成本函数在连续迭代之间的线性；即，通过跟随梯度，可以从时间t的参数值到达迭代(*t* + 1)的参数值，因为成本函数C(*θ*)从t到(*t* + 1)的路径是线性的或可以通过直线连接。这是一个非常简化的假设，如果成本函数高度非线性或具有曲率，则不会给出良好的梯度下降方向。为了更好地理解这一点，让我们看看具有单变量的成本函数的三个不同情况的图。
- en: Linear Curve
  id: totrans-974
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 线性曲线
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig46_HTML.jpg)'
  id: totrans-975
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig46_HTML.jpg)'
- en: The two-dimensional plane of the function of x versus x displays a decreasing
    line to illustrate a linear function.
  id: totrans-976
  prefs: []
  type: TYPE_NORMAL
  zh: 函数x与x的二维平面显示了一条下降的直线，以说明线性函数。
- en: Figure 1-45
  id: totrans-977
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-45
- en: Linear cost function
  id: totrans-978
  prefs: []
  type: TYPE_NORMAL
  zh: 线性成本函数
- en: Negative Curvature
  id: totrans-979
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 负曲率
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig47_HTML.jpg)'
  id: totrans-980
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig47_HTML.jpg)'
- en: The two-dimensional plane of the function of x versus x displays a hogging curve
    with a tangent P to illustrate negative curvature.
  id: totrans-981
  prefs: []
  type: TYPE_NORMAL
  zh: 函数x与x的二维平面显示了一条带有切线P的凸曲线，以说明负曲率。
- en: Figure 1-46
  id: totrans-982
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-46
- en: Cost function with negative curvature at point P
  id: totrans-983
  prefs: []
  type: TYPE_NORMAL
  zh: 点P处的负曲率成本函数
- en: Positive Curvature
  id: totrans-984
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 正曲率
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig48_HTML.jpg)'
  id: totrans-985
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig48_HTML.jpg)'
- en: The two-dimensional plane of the function of x versus x displays a sagging curve
    with a tangent P to illustrate positive curvature.
  id: totrans-986
  prefs: []
  type: TYPE_NORMAL
  zh: 函数x与x的二维平面显示了一条带有切线P的凹曲线，以说明正曲率。
- en: Figure 1-47
  id: totrans-987
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-47
- en: Cost function with positive curvature at point P
  id: totrans-988
  prefs: []
  type: TYPE_NORMAL
  zh: 点P处的正曲率成本函数
- en: For the linear cost function, as shown in Figure [1-45](#Fig46), the negative
    of the gradient would give us the best direction for reaching the minima since
    the function is linear and does not have any curvature. For both the negative
    and positive curvature cost functions, shown in Figures [1-46](#Fig47) and [1-47](#Fig48),
    respectively, the derivative would not give us a good direction for minima, and
    so to take care of the curvature, we would need the Hessian along with the derivative.
    Hessians, as we have seen, are nothing but a matrix of second derivatives. They
    contain information about the curvature and thus would give a better direction
    for a parameter update as compared to a simple gradient descent.
  id: totrans-989
  prefs: []
  type: TYPE_NORMAL
  zh: 对于线性成本函数，如图[1-45](#Fig46)所示，梯度的负值将给出达到最小值的最优方向，因为函数是线性的，没有曲率。对于具有正负曲率的成本函数，分别如图[1-46](#Fig47)和[1-47](#Fig48)所示，导数不会给出良好的最小值方向，因此为了处理曲率，我们需要使用Hessian矩阵以及导数。正如我们所见，Hessian矩阵不过是二阶导数的矩阵。它们包含了关于曲率的信息，因此与简单的梯度下降相比，会给出更好的参数更新方向。
- en: Gradient-descent methods are first-order approximation methods for optimization,
    whereas Newton’s methods are second-order methods for optimization since they
    use the Hessian along with the gradient to take care of curvatures in the cost
    function.
  id: totrans-990
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度下降法是优化的一阶近似方法，而牛顿法是使用Hessian矩阵和梯度来处理成本函数中的曲率的二阶优化方法。
- en: 'Let us take our usual cost function *C*(*θ*), where *θ* ∈ *R*^(*n* × 1) is
    an *n*-dimensional model parameter vector. We can approximate the cost function
    *C*(*θ*) in the neighborhood of *θ* by its second-order Taylor series expansion,
    as shown here:'
  id: totrans-991
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑我们通常的成本函数 *C*(*θ*)，其中 *θ* ∈ *R*^(*n* × 1) 是一个 *n*-维度的模型参数向量。我们可以在 *θ* 的邻域内通过其二阶泰勒级数展开来近似成本函数
    *C*(*θ*)，如下所示：
- en: '![$$ C\left(\theta +\varDelta \theta \right)=C\left(\theta \right)+\varDelta
    {\theta}^T\nabla C\left(\theta \right)+\frac{1}{2}\varDelta {\theta}^TH\left(\theta
    \right)\varDelta \theta $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgp.png)'
  id: totrans-992
  prefs: []
  type: TYPE_IMG
  zh: '![成本函数展开公式](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgp.png)'
- en: ∇*C*(*θ*) is the gradient and *H*(*θ*) is the Hessian of the cost function *C*(*θ*).
  id: totrans-993
  prefs: []
  type: TYPE_NORMAL
  zh: ∇*C*(*θ*) 是成本函数 *C*(*θ*) 的梯度，而 *H*(*θ*) 是其Hessian矩阵。
- en: Now, if *θ* is the value of the model parameter vector at iteration *t*, and
    (*θ* + *Δθ*) is the value of the model parameter at iteration, then
  id: totrans-994
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，如果 *θ* 是迭代 *t* 时模型参数向量的值，而 (*θ* + *Δθ*) 是迭代时模型参数的值，那么
- en: '![$$ C\left({\theta}^{\left(t+1\right)}\right)=C\left({\theta}^{(t)}\right)+\varDelta
    {\theta}^T\mathit{\nabla}C\left({\theta}^{(t)}\right)+\frac{1}{2}\varDelta {\theta}^TH\left({\theta}^{(t)}\right)\varDelta
    \theta $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgq.png)'
  id: totrans-995
  prefs: []
  type: TYPE_IMG
  zh: '![成本函数泰勒展开公式](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgq.png)'
- en: where *Δθ* = *θ*^((*t* + 1))  − *θ*^((*t*)).
  id: totrans-996
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *Δθ* = *θ*^((*t* + 1)) - *θ*^((*t*)).
- en: 'Taking the gradient with respect to *θ*^((*t* + 1))[,] we have the following:'
  id: totrans-997
  prefs: []
  type: TYPE_NORMAL
  zh: 对 *θ*^((*t* + 1)) 求梯度，我们得到以下结果：
- en: '![$$ \mathit{\nabla}C\left({\theta}^{\left(t+1\right)}\right) = \mathit{\nabla}C\left({\theta}^{(t)}\right)+H\left({\theta}^{(t)}\right)\varDelta
    \theta $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgr.png)'
  id: totrans-998
  prefs: []
  type: TYPE_IMG
  zh: '![梯度更新公式](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgr.png)'
- en: 'Setting the gradient ∇*C*(*θ*^((*t* + 1))) to 0, we get the following:'
  id: totrans-999
  prefs: []
  type: TYPE_NORMAL
  zh: 将梯度 ∇*C*(*θ*^((*t* + 1))) 设置为 0，我们得到以下结果：
- en: '![$$ \nabla C\left({\theta}^{(t)}\right)+H\left({\theta}^{(t)}\right)\varDelta
    \theta =0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgs.png)'
  id: totrans-1000
  prefs: []
  type: TYPE_IMG
  zh: '![梯度下降法公式](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgs.png)'
- en: '![$$ =&gt;\varDelta \theta =-H{\left({\theta}^{(t)}\right)}^{-1}\nabla C\left({\theta}^{(t)}\right)
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgt.png)'
  id: totrans-1001
  prefs: []
  type: TYPE_IMG
  zh: '![牛顿法更新公式](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgt.png)'
- en: 'So, the parameter update for Newton’s method is as follows:'
  id: totrans-1002
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，牛顿法的参数更新如下：
- en: '![$$ =&gt;{\theta}^{\left(t+1\right)}={\theta}^{(t)}-H{\left({\theta}^{(t)}\right)}^{-1}\nabla
    C\left({\theta}^{(t)}\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgu.png)'
  id: totrans-1003
  prefs: []
  type: TYPE_IMG
  zh: => *θ*^((*t+1*)) = *θ*^((*t*)) - *H*^(-1)*(*θ*^((*t*))) *∇*C*(*θ*^((*t*)))
- en: We do not have a learning rate for Newton’s method, but one may choose to use
    a learning rate, much like with gradient descent. Since the directions for nonlinear
    cost functions are better with Newton’s method, the iterations to converge to
    the minima would be fewer as compared to gradient descent. One thing to note is
    that if the cost function that we are trying to optimize is a quadratic cost function,
    such as the one in linear regression, then Newton’s method would technically converge
    to the minima in one step.
  id: totrans-1004
  prefs: []
  type: TYPE_NORMAL
  zh: 我们没有为牛顿法指定学习率，但可以选择使用一个学习率，就像梯度下降法一样。由于牛顿法在非线性成本函数的方向上更好，因此与梯度下降法相比，收敛到最小值的迭代次数会更少。需要注意的是，如果我们试图优化的成本函数是一个二次成本函数，例如线性回归中的那个，那么牛顿法在技术上会一步收敛到最小值。
- en: However, computing the Hessian matrix and its inverse is computationally expensive
    or intractable at times, especially when the number of input features is large.
    Also, at times there might be functions for which the Hessian is not even properly
    defined. So, for large machine-learning and deep-learning applications, gradient-descent—especially
    stochastic gradient descent—techniques with mini-batches are used since they are
    relatively less computationally intensive and scale up well when the data size
    is large.
  id: totrans-1005
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，计算Hessian矩阵及其逆矩阵在计算上可能非常昂贵或有时难以处理，尤其是在输入特征数量很大时。有时，甚至可能存在Hessian矩阵没有正确定义的函数。因此，对于大型机器学习和深度学习应用，使用梯度下降——特别是随机梯度下降——技术，因为它们相对计算量较小，并且在大数据量时具有良好的扩展性。
- en: Constrained Optimization Problem
  id: totrans-1006
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 约束优化问题
- en: In a constrained optimization problem, along with the cost function that we
    need to optimize, we have a set of constraints that we need to adhere to. The
    constraints might be equations or inequalities.
  id: totrans-1007
  prefs: []
  type: TYPE_NORMAL
  zh: 在约束优化问题中，除了需要优化的成本函数外，我们还需要遵守一系列约束条件。这些约束条件可能是方程或不等式。
- en: 'Whenever we want to minimize a function that is subject to an equality constraint,
    we use the Lagrange formulation. Let’s say we must minimize *f*(*θ*) subject to
    *g*(*θ*) = 0 where *θ* ∈ *R*^(*n* × 1). For such a constrained optimization problem,
    we need to minimize a function *L*(*θ*,  *λ*) = *f*(*θ*) + *λg*(*θ*). Taking the
    gradient of *L*, which is called the Lagrangian, with respect to the combined
    vector *θ*, *λ*, and setting it to 0 would give us the required *θ* that minimizes
    *f*(*θ*) and adheres to the constraint. *λ* is called the Lagrange multiplier.
    When there are several constraints, we need to add all such constraints, using
    a separate Lagrange multiplier for each constraint. Let’s say we want to minimize
    *f*(*θ*) subject to *m* constraints *g*[*i*](*θ*) = 0 ∀ *i* ∈{1, 2, 3, …*m*};
    the Lagrangian can be expressed as follows:'
  id: totrans-1008
  prefs: []
  type: TYPE_NORMAL
  zh: 每当我们想要最小化一个受等式约束的函数时，我们使用拉格朗日公式。比如说，我们必须在 *g*(*θ*) = 0 的约束下最小化 *f*(*θ*)，其中 *θ*
    ∈ *R*^(*n* × 1)。对于这样的约束优化问题，我们需要最小化函数 *L*(*θ*,  *λ*) = *f*(*θ*) + *λg*(*θ*)。对
    *L* 求梯度，即拉格朗日乘数，相对于组合向量 *θ*, *λ*，并将其设为0，将给出所需的 *θ*，它将最小化 *f*(*θ*) 并遵守约束。*λ* 被称为拉格朗日乘数。当存在多个约束时，我们需要添加所有这样的约束，并为每个约束使用一个单独的拉格朗日乘数。比如说，我们想要在
    *m* 个约束 *g*[*i*](*θ*) = 0 (对所有 *i* ∈ {1, 2, 3, …*m*}) 下最小化 *f*(*θ*)；拉格朗日乘数可以表示如下：
- en: '![$$ L\left(\theta, \kern0.5em \lambda \right)=f\left(\theta \right)+\sum \limits_{i=1}^m{\lambda}_i{g}_i\left(\theta
    \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgv.png)'
  id: totrans-1009
  prefs: []
  type: TYPE_IMG
  zh: '![L(θ, λ)=f(θ)+∑limits_{i=1}^mλ_i{g}_i(θ)](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgv.png)'
- en: where *λ* = [*λ*[1]*λ*[2] . . *λ*[*m*]]^(*T*)
  id: totrans-1010
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *λ* = [*λ*[1]*λ*[2] . . *λ*[*m*]]^(*T*)
- en: To minimize the function, the gradient of *L*(*θ*, *λ*) with respect to both
    *θ* and *λ* vectors should be a zero vector, i.e.,
  id: totrans-1011
  prefs: []
  type: TYPE_NORMAL
  zh: 要最小化该函数，需要计算 *L*(*θ*, *λ*) 关于 *θ* 和 *λ* 向量的梯度，使其为零向量，即，
- en: '![$$ {\nabla}_{\theta}\left(\theta, \kern0.5em \lambda \right)=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgw.png)'
  id: totrans-1012
  prefs: []
  type: TYPE_IMG
  zh: '![∇θ(θ, λ)=0](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgw.png)'
- en: '![$$ {\nabla}_{\lambda}\left(\theta, \kern0.5em \lambda \right)=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgx.png)'
  id: totrans-1013
  prefs: []
  type: TYPE_IMG
  zh: '![∇λ(θ, λ)=0](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgx.png)'
- en: The preceding method cannot be directly used for constraints with inequality.
    In such cases, a more generalized approach called the Karush-Kuhn-Tucker method
    can be used.
  id: totrans-1014
  prefs: []
  type: TYPE_NORMAL
  zh: 前述方法不能直接用于不等式约束。在这种情况下，可以使用更通用的Karush-Kuhn-Tucker方法。
- en: 'Let *C*(*θ*) be the cost function that we wish to minimize, where . Also, let
    there be *k* number of constraint on *θ* such that the following:'
  id: totrans-1015
  prefs: []
  type: TYPE_NORMAL
  zh: 设 *C*(*θ*) 为我们希望最小化的成本函数，其中。同时，设对 *θ* 有 *k* 个约束条件，如下：
- en: '![$$ {f}_1\left(\theta \right)={a}_1 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgy.png)'
  id: totrans-1016
  prefs: []
  type: TYPE_IMG
  zh: '![f1(θ)=a1](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgy.png)'
- en: '![$$ {f}_2\left(\theta \right)={a}_2 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgz.png)'
  id: totrans-1017
  prefs: []
  type: TYPE_IMG
  zh: '![f2(θ)=a2](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgz.png)'
- en: '![$$ {f}_3\left(\theta \right)\le \kern0.5em {a}_3 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equha.png)'
  id: totrans-1018
  prefs: []
  type: TYPE_IMG
  zh: '![f3(θ)≤ a3](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equha.png)'
- en: '![$$ {f}_4\left(\theta \right)\ge \kern0.5em {a}_4 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhb.png)'
  id: totrans-1019
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {f}_4\left(\theta \right)\ge \kern0.5em {a}_4 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhb.png)'
- en: …
  id: totrans-1020
  prefs: []
  type: TYPE_NORMAL
  zh: …
- en: …
  id: totrans-1021
  prefs: []
  type: TYPE_NORMAL
  zh: …
- en: '![$$ {f}_k\left(\theta \right)={a}_k $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhc.png)'
  id: totrans-1022
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {f}_k\left(\theta \right)={a}_k $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhc.png)'
- en: This becomes a constrained optimization problem since there are constraints
    that *θ* should adhere to. Every inequality can be transformed into a standard
    form where a certain function is less than or less than equal to zero. For example,
  id: totrans-1023
  prefs: []
  type: TYPE_NORMAL
  zh: 由于存在约束条件，*θ* 应该遵守，这变成了一个有约束的优化问题。每个不等式都可以转换成一种标准形式，其中某个函数小于或等于零。例如，
- en: '![$$ {f}_4\left(\theta \right)\ge \kern0.5em {a}_4=&gt;-{f}_4\left(\theta \right)\le
    -{a}_4=&gt;-{f}_4\left(\theta \right)+{a}_4\le 0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhd.png)'
  id: totrans-1024
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {f}_4\left(\theta \right)\ge \kern0.5em {a}_4=&gt;-{f}_4\left(\theta \right)\le
    -{a}_4=&gt;-{f}_4\left(\theta \right)+{a}_4\le 0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhd.png)'
- en: Let each such constraint strictly less than, or less than equal to, zero be
    represented by *g*[*i*](*θ*). Also, let there be some strict equality equations
    *e*[*j*](*θ*). Such minimization problems are solved through the Karush-Kuhn-Tucker
    version of Lagrangian formulation.
  id: totrans-1025
  prefs: []
  type: TYPE_NORMAL
  zh: Let each such constraint strictly less than, or less than equal to, zero be
    represented by *g*[*i*](*θ*). Also, let there be some strict equality equations
    *e*[*j*](*θ*). Such minimization problems are solved through the Karush-Kuhn-Tucker
    version of Lagrangian formulation.
- en: 'Instead of minimizing *C*(*θ*), we need to minimize a cost function *L*(*θ*,
    *α*, *β*) as follows:'
  id: totrans-1026
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不是要最小化 *C*(*θ*)，而是需要最小化一个成本函数 *L*(*θ*, *α*, *β*)，如下所示：
- en: '![$$ L\left(\theta, \kern0.5em \alpha, \beta \right)=C\left(\theta \right)+\sum
    \limits_{i=1}^{k_1}{\alpha}_i{g}_i\left(\theta \right)+\sum \limits_{j=1}^{k_2}{\beta}_j{e}_j\left(\theta
    \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhe.png)'
  id: totrans-1027
  prefs: []
  type: TYPE_IMG
  zh: '![$$ L\left(\theta, \kern0.5em \alpha, \beta \right)=C\left(\theta \right)+\sum
    \limits_{i=1}^{k_1}{\alpha}_i{g}_i\left(\theta \right)+\sum \limits_{j=1}^{k_2}{\beta}_j{e}_j\left(\theta
    \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhe.png)'
- en: The scalers *α*[*i*] ∀ *i* ∈ {1, 2, 3, ..*k*[1]} and *β*[*j*] ∀ *j* ∈ {1, 2,
    3, ..*k*[2]} are called the Lagrangian multipliers, and there would be *k* of
    them corresponding to *k* constraints. So, we have converted a constrained minimization
    problem into an unconstrained minimization problem.
  id: totrans-1028
  prefs: []
  type: TYPE_NORMAL
  zh: 规模因子 *α*[*i*] ∀ *i* ∈ {1, 2, 3, ..*k*[1]} 和 *β*[*j*] ∀ *j* ∈ {1, 2, 3, ..*k*[2]}
    被称为拉格朗日乘数，对应于 *k* 个约束条件，因此会有 *k* 个这样的乘数。因此，我们将一个有约束的最小化问题转换成了一个无约束的最小化问题。
- en: 'To solve the problem, the Karush-Kuhn-Tucker conditions should be met at the
    minima point as follows:'
  id: totrans-1029
  prefs: []
  type: TYPE_NORMAL
  zh: 'To solve the problem, the Karush-Kuhn-Tucker conditions should be met at the
    minima point as follows:'
- en: The gradient of *L*(*θ*, *α*, *β*) with respect to *θ* should be the zero vector,
    i.e.,
  id: totrans-1030
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*L*(*θ*, *α*, *β*) 关于 *θ* 的梯度应该是零向量，即，'
- en: '![$$ {\nabla}_{\theta}\left(\theta, \kern0.5em \alpha, \beta \right)=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhf.png)'
  id: totrans-1031
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\nabla}_{\theta}\left(\theta, \kern0.5em \alpha, \beta \right)=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhf.png)'
- en: '![$$ =&gt;{\nabla}_{\theta }C\left(\theta \right)+\sum \limits_{i=1}^{k_1}{\alpha}_i{\nabla}_{\theta
    }{g}_i\left(\theta \right)+\sum \limits_{j=1}^{k_2}{\beta}_j{\nabla}_{\theta }{e}_j\left(\theta
    \right)=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhg.png)'
  id: totrans-1032
  prefs: []
  type: TYPE_IMG
  zh: '![$$ =&gt;{\nabla}_{\theta }C\left(\theta \right)+\sum \limits_{i=1}^{k_1}{\alpha}_i{\nabla}_{\theta
    }{g}_i\left(\theta \right)+\sum \limits_{j=1}^{k_2}{\beta}_j{\nabla}_{\theta }{e}_j\left(\theta
    \right)=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhg.png)'
- en: 'The gradient of the *L*(*θ*, *α*, *β*) with respect to *β*, which is the Lagrange
    multiplier vector corresponding to the equality conditions, should be zero:'
  id: totrans-1033
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'The gradient of the *L*(*θ*, *α*, *β*) with respect to *β*, which is the Lagrange
    multiplier vector corresponding to the equality conditions, should be zero:'
- en: '![$$ {\nabla}_{\beta}\left(\theta, \kern0.5em \alpha, \beta \right)=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhh.png)'
  id: totrans-1034
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\nabla}_{\beta}\left(\theta, \kern0.5em \alpha, \beta \right)=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhh.png)'
- en: '![$$ =&gt;{\nabla}_{\beta }C\left(\theta \right)+\sum \limits_{i=1}^{k_1}{\alpha}_i{\nabla}_{\beta
    }{g}_i\left(\theta \right)+\sum \limits_{j=1}^{k_2}{\beta}_j{\nabla}_{\beta }{e}_j\left(\theta
    \right)=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhi.png)'
  id: totrans-1035
  prefs: []
  type: TYPE_IMG
  zh: '![$$ =&gt;{\nabla}_{\beta }C\left(\theta \right)+\sum \limits_{i=1}^{k_1}{\alpha}_i{\nabla}_{\beta
    }{g}_i\left(\theta \right)+\sum \limits_{j=1}^{k_2}{\beta}_j{\nabla}_{\beta }{e}_j\left(\theta
    \right)=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhi.png)'
- en: 'The inequality conditions should become equality conditions at the minima point.
    Also, the inequality Lagrange multipliers should be nonnegative:'
  id: totrans-1036
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在最小值点，不等式条件应变为等式条件。此外，不等式拉格朗日乘数应为非负：
- en: '![$$ {\alpha}_i{g}_i\left(\theta \right)=0\; and\kern0.5em {\alpha}_i\ge 0\kern1em
    \forall i\kern0.5em \in \left\{1,2,\dots, {k}_1\right\} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhj.png)'
  id: totrans-1037
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\alpha}_i{g}_i\left(\theta \right)=0\; and\kern0.5em {\alpha}_i\ge 0\kern1em
    \forall i\kern0.5em \in \left\{1,2,\dots, {k}_1\right\} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhj.png)'
- en: Solving for the preceding conditions would provide the minima to the constrained
    optimization problem.
  id: totrans-1038
  prefs: []
  type: TYPE_NORMAL
  zh: 解决前面的条件将提供约束优化问题的最小值。
- en: A Few Important Topics in Machine Learning
  id: totrans-1039
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 机器学习中的几个重要主题
- en: In this section, we will discuss a few important topics that are very much relevant
    to machine learning. Their underlying mathematics is very rich.
  id: totrans-1040
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将讨论一些与机器学习非常相关的重要主题。它们的潜在数学非常丰富。
- en: Dimensionality-Reduction Methods
  id: totrans-1041
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 维度降低方法
- en: Principal component analysis and singular value decomposition are the most used
    dimensionality-reduction techniques in the machine-learning domain. We will discuss
    these techniques to some extent here. Please note that these data-reduction techniques
    are based on linear correlation and do not capture nonlinear correlation such
    as co-skewness, co-Kurtosis, and so on. We will talk about a few dimensionality-reduction
    techniques that are based on artificial neural networks, such as auto-encoders,
    in the latter part of the book.
  id: totrans-1042
  prefs: []
  type: TYPE_NORMAL
  zh: 主成分分析和奇异值分解是机器学习领域中应用最广泛的维度降低技术。我们将在这里对这些技术进行一定程度的讨论。请注意，这些数据降低技术基于线性相关性，并不能捕捉到如共偏度、共峰度等非线性相关性。我们将在本书的后半部分讨论一些基于人工神经网络的维度降低技术，例如自编码器。
- en: Principal Component Analysis
  id: totrans-1043
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 主成分分析
- en: Principal component analysis is a dimensionality-reduction technique that ideally
    should have been discussed in the “Linear Algebra” section. However, to make its
    mathematics much easier to grasp, I intentionally kept it for after the constrained
    optimization problem. Let us look at the two-dimensional data plot in Figure [1-45](#Fig46).
    As we can see, the maximum variance of the data is neither along the *x* direction
    nor along the *y* direction, but somewhat in a direction in between. So, had we
    projected the data in a direction where the variance is at maximum, it would have
    covered most of the variability in the data. Also, the rest of the variance could
    have been ignored as noise.
  id: totrans-1044
  prefs: []
  type: TYPE_NORMAL
  zh: 主成分分析是一种维度降低技术，理想情况下应该在“线性代数”部分进行讨论。然而，为了使其数学更容易理解，我故意将其放在约束优化问题之后。让我们看看图[1-45](#Fig46)中的二维数据图。正如我们所见，数据的最大方差既不在*x*方向也不在*y*方向，而是在两者之间的某个方向。因此，如果我们把数据投影到方差最大的方向，它将覆盖数据中的大部分变异性。此外，剩余的方差可以忽略不计，视为噪声。
- en: The data along the *x* direction and the *y* direction are highly correlated
    (see Figure [1-48](#Fig49)). The covariance matrix would provide the required
    information about the data to reduce the redundancy. Instead of looking at the
    *x* and *y* directions, we can look at the *a*[1] direction, which has the maximum
    variance.
  id: totrans-1045
  prefs: []
  type: TYPE_NORMAL
  zh: 沿*x*方向和*y*方向的数据高度相关（见图[1-48](#Fig49)）。协方差矩阵将提供关于数据以减少冗余所需的信息。我们不必关注*x*和*y*方向，我们可以关注*a*[1]方向，它具有最大的方差。
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig49_HTML.jpg)'
  id: totrans-1046
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig49_HTML.jpg)'
- en: The two-dimensional plane of y versus x displays dense scatterplots with two
    vectors, a 2 and a 1.
  id: totrans-1047
  prefs: []
  type: TYPE_NORMAL
  zh: y与x的二维平面显示了密集的散点图，包含两个向量，一个2和一个1。
- en: Figure 1-48
  id: totrans-1048
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-48
- en: Correlated 2-D data. a[1] and a[2] are the directions along which the data is
    uncorrelated and are the principal components
  id: totrans-1049
  prefs: []
  type: TYPE_NORMAL
  zh: 相关的二维数据。a[1]和a[2]是数据不相关的方向，是主成分
- en: Now, let us get into some math and assume that we do not have the plot and we
    only have the data for *m* number of samples *x*^((*i*)) ∈ *R*^(*n* × 1).
  id: totrans-1050
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们深入数学，并假设我们没有图表，我们只有*m*个样本的数据*x*^((*i*)) ∈ *R*^(*n* × 1)。
- en: We want to find out independent directions in the *n*-dimensional plane in the
    order of decreasing variances. By independent directions, I mean the covariance
    between those directions should be 0\. Let *a*[1] be the unit vector along which
    the variance of the data is maximum. We first subtract the mean of the data vector
    to center the data on the origin. Let *μ* be the mean vector of the data vector
    *x*; i.e., *E*[*x*] = *μ*.
  id: totrans-1051
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望在 *n*-维平面上找到按方差递减顺序的独立方向。独立方向意味着这些方向之间的协方差应为 0。让 *a*[1] 是方差最大的数据向量的单位向量；即，数据向量
    *x* 的均值 *μ*。
- en: 'A component of the (*x* − *μ*) vector in the direction of *a*[1] is the projection
    of (*x* − *μ*) on *a*[1]; let it be denoted by *z*[1]:'
  id: totrans-1052
  prefs: []
  type: TYPE_NORMAL
  zh: (*x* − *μ*) 向量在 *a*[1] 方向上的一个分量是 (*x* − *μ*) 在 *a*[1] 上的投影；用 *z*[1] 表示：
- en: '![$$ {z}_1={a_1}^T\left(x-\mu \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhk.png)'
  id: totrans-1053
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {z}_1={a_1}^T\left(x-\mu \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhk.png)'
- en: '*var* (*z*[1]) =*var* [*a*[1]^(*T*)(*x* − *μ*)] = *a*[1]^(*T*)*cov*(*x*)*a*[1],
    where *var* denotes variance and *cov*(*x*) denotes the covariance matrix.'
  id: totrans-1054
  prefs: []
  type: TYPE_NORMAL
  zh: '*var* (*z*[1]) =*var* [*a*[1]^(*T*)(*x* − *μ*)] = *a*[1]^(*T*)*cov*(*x*)*a*[1]，其中
    *var* 表示方差，*cov*(*x*) 表示协方差矩阵。'
- en: 'For given data points, the variance is a function of *a*[1]. So, we would have
    to maximize the variance with respect to *a*[1] given that *a*[1] is a unit vector:'
  id: totrans-1055
  prefs: []
  type: TYPE_NORMAL
  zh: 对于给定的数据点，方差是 *a*[1] 的函数。因此，我们需要在 *a*[1] 是单位向量的条件下最大化方差：
- en: '![$$ {a_1}^T{a}_1=1\kern1em =&gt;{a_1}^T{a}_1-1=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhl.png)'
  id: totrans-1056
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {a_1}^T{a}_1=1\kern1em =&gt;{a_1}^T{a}_1-1=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhl.png)'
- en: So, we can express the function to be maximized as
  id: totrans-1057
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们可以将待最大化的函数表示为
- en: '*L*(*a*[1],  *λ*) = *a*[1]^(*T*) *cov* (*x*)*a*[1] − *λ*(*a*[1]^(*T*)*a*[1] − 1),
    where *λ* is a Lagrangian multiplier.'
  id: totrans-1058
  prefs: []
  type: TYPE_NORMAL
  zh: '*L*(*a*[1],  *λ*) = *a*[1]^(*T*) *cov* (*x*)*a*[1] − *λ*(*a*[1]^(*T*)*a*[1] − 1)，其中
    *λ* 是拉格朗日乘子。'
- en: 'For maxima, setting the gradient of *L* with respect to *a*[1] to 0, we get
    the following:'
  id: totrans-1059
  prefs: []
  type: TYPE_NORMAL
  zh: 对于极大值，将 *L* 关于 *a*[1] 的梯度设为 0，我们得到以下：
- en: '![$$ \nabla L=2\mathit{\operatorname{cov}}(x){a}_1-2\lambda {a}_1=0\kern1em
    =&gt;\mathit{\operatorname{cov}}(x){a}_1=\lambda {a}_1 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhm.png)'
  id: totrans-1060
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \nabla L=2\mathit{\operatorname{cov}}(x){a}_1-2\lambda {a}_1=0\kern1em
    =&gt;\mathit{\operatorname{cov}}(x){a}_1=\lambda {a}_1 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhm.png)'
- en: We can see something come up that we studied earlier. The *a*[1] vector is nothing
    but an Eigen vector of the covariance matrix, and *λ* is the corresponding Eigen
    value.
  id: totrans-1061
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到一些我们之前研究过的东西。*a*[1] 向量不过是协方差矩阵的特征向量，而 *λ* 是相应的特征值。
- en: 'Now, substituting this into the variance expression along *a*[1], we get the
    following:'
  id: totrans-1062
  prefs: []
  type: TYPE_NORMAL
  zh: 现在将此代入沿着 *a*[1] 的方差表达式，我们得到以下：
- en: '![$$ \mathit{\operatorname{var}}\left({z}_1\right)={a_1}^T\mathit{\operatorname{cov}}(x){a}_1={a_1}^T\lambda
    {a}_1=\lambda {a_1}^T{a}_1=\lambda $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhn.png)'
  id: totrans-1063
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \mathit{\operatorname{var}}\left({z}_1\right)={a_1}^T\mathit{\operatorname{cov}}(x){a}_1={a_1}^T\lambda
    {a}_1=\lambda {a_1}^T{a}_1=\lambda $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhn.png)'
- en: Since the expression for variance along *a*[1] is the Eigen value itself, the
    Eigen vector corresponding to the highest Eigen value gives us the first principal
    component or the direction along which the variance in data is maximum.
  id: totrans-1064
  prefs: []
  type: TYPE_NORMAL
  zh: 由于沿着 *a*[1] 的方差表达式本身就是特征值，对应于最高特征值的特点向量给出了第一个主成分或数据方差最大的方向。
- en: Now, let us get the second principal component, or the direction along which
    the variance is maximum right after *a*[1].
  id: totrans-1065
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们获取第二个主成分，或者说是 *a*[1] 之后方差最大的方向。
- en: Let the direction of the second principal component be given by the unit vector
    *a*[2]. Since we are looking for orthogonal components, the direction of *a*[2]
    should be perpendicular to *a*[1].
  id: totrans-1066
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个主成分的方向由单位向量 *a*[2] 给出。由于我们正在寻找正交分量，*a*[2] 的方向应该垂直于 *a*[1]。
- en: A projection of the data along *a*[2] can be expressed by the variable *z*[2]=
    *a*[2]^(*T*)(*x* − *μ*).
  id: totrans-1067
  prefs: []
  type: TYPE_NORMAL
  zh: 沿着 *a*[2] 的数据投影可以用变量 *z*[2]= *a*[2]^(*T*)(*x* − *μ*) 来表示。
- en: Hence, the variance of the data along *a*[2] is Var (*z*[2]) = Var [*a*[2]^(*T*)(*x* − *μ*)]
    = *a*[2]^(*T*)*cov*(*x*)*a*[2].
  id: totrans-1068
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，沿着 *a*[2] 的数据方差是 Var (*z*[2]) = Var [*a*[2]^(*T*)(*x* − *μ*)] = *a*[2]^(*T*)*cov*(*x*)*a*[2]。
- en: We would have to maximize *Var*(*z*[2]) subject to the constraints *a*[2]^(*T*)*a*[2] = 1
    since *a*[2] is a unit vector and
  id: totrans-1069
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 *a*[2] 是一个单位向量，我们需要在约束 *a*[2]^(*T*)*a*[2] = 1 下最大化 *Var*(*z*[2])。
- en: '*a*[2]^(*T*)*a*[1] = 0 since *a*[2] should be orthogonal to *a*[1].'
  id: totrans-1070
  prefs: []
  type: TYPE_NORMAL
  zh: '*a*[2]^(*T*)*a*[1] = 0 因为 *a*[2] 应该与 *a*[1] 正交。'
- en: 'We need to maximize the following function *L*(*a*[2], *α*, *β*) with respect
    to the parameters *a*[2], *α*, *β*:'
  id: totrans-1071
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要最大化以下函数 *L*(*a*[2], *α*, *β*) 关于参数 *a*[2], *α*, *β*：
- en: '![$$ L\left({a}_2,\alpha, \beta \right)={a_2}^T\mathit{\operatorname{cov}}(x){a}_2-\alpha
    \left({a_2}^T{a}_2\kern0.5em -\kern0.5em 1\right)\kern0.5em -\kern0.5em \beta
    \left({a_2}^T{a}_1\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equho.png)'
  id: totrans-1072
  prefs: []
  type: TYPE_IMG
  zh: '![$$ L\left({a}_2,\alpha, \beta \right)={a_2}^T\mathit{\operatorname{cov}}(x){a}_2-\alpha
    \left({a_2}^T{a}_2\kern0.5em -\kern0.5em 1\right)\kern0.5em -\kern0.5em \beta
    \left({a_2}^T{a}_1\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equho.png)'
- en: 'By taking a gradient with respect to *a*[2] and setting it to zero vector,
    we get the following:'
  id: totrans-1073
  prefs: []
  type: TYPE_NORMAL
  zh: 通过对 *a*[2] 求梯度并将其设为零向量，我们得到以下结果：
- en: '![$$ \nabla L=2\mathit{\operatorname{cov}}(x){a}_2-2\alpha {a}_2-\beta {a}_1=0
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhp.png)'
  id: totrans-1074
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \nabla L=2\mathit{\operatorname{cov}}(x){a}_2-2\alpha {a}_2-\beta {a}_1=0
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhp.png)'
- en: 'By taking the dot product of the gradient ∇*L* with vector *a*[1,] we get the
    following:'
  id: totrans-1075
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将梯度 ∇*L* 与向量 *a*[1,] 进行点积，我们得到以下结果：
- en: '![$$ 2{a_1}^T\mathit{\operatorname{cov}}(x){a}_2-2\alpha {a_1}^T{a}_2-\beta
    {a_1}^T{a}_1=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhq.png)'
  id: totrans-1076
  prefs: []
  type: TYPE_IMG
  zh: '![$$ 2{a_1}^T\mathit{\operatorname{cov}}(x){a}_2-2\alpha {a_1}^T{a}_2-\beta
    {a_1}^T{a}_1=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhq.png)'
- en: '*a*[1]^(*T*)*cov*(*x*)*a*[2] is a scalar and can be written as *a*[2]^(*T*)*cov*(*x*)*a*[1].'
  id: totrans-1077
  prefs: []
  type: TYPE_NORMAL
  zh: '*a*[1]^(*T*)*cov*(*x*)*a*[2] 是一个标量，可以写成 *a*[2]^(*T*)*cov*(*x*)*a*[1]。'
- en: On simplification, *a*[2]^(*T*)*cov*(*x*)*a*[1] = *a*[2]^(*T*)*λa*[1] = *λa*[2]^(*T*)*a*[1] = 0\.
    Also, the term 2*αa*[1]^(*T*)*a*[2] is equal to 0, which leaves *βa*[1]^(*T*)*a*[1] = 0\.
    Since *a*[1]^(*T*)*a*[1] = 1, *β* must be equal to 0.
  id: totrans-1078
  prefs: []
  type: TYPE_NORMAL
  zh: 简化后，*a*[2]^(*T*)*cov*(*x*)*a*[1] = *a*[2]^(*T*)*λa*[1] = *λa*[2]^(*T*)*a*[1]
    = 0。此外，项 2*αa*[1]^(*T*)*a*[2] 等于 0，这留下 *βa*[1]^(*T*)*a*[1] = 0。由于 *a*[1]^(*T*)*a*[1]
    = 1，*β* 必须等于 0。
- en: 'Substituting *β* = 0 in the expression for ∇*L* = 2 *cov* (*x*)*a*[2] − 2*αa*[2] − *βa*[1] = 0,
    we have the following:'
  id: totrans-1079
  prefs: []
  type: TYPE_NORMAL
  zh: 将 *β* = 0 代入 ∇*L* = 2 *cov* (*x*) *a*[2] - 2*αa*[2] - *βa*[1] = 0 的表达式中，我们得到以下结果：
- en: '![$$ 2\mathit{\operatorname{cov}}(x){a}_2-2\alpha {a}_2=0\kern0.5em i.e.\kern0.5em
    \mathit{\operatorname{cov}}(x){a}_2=\alpha {a}_2 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhr.png)'
  id: totrans-1080
  prefs: []
  type: TYPE_IMG
  zh: '![$$ 2\mathit{\operatorname{cov}}(x){a}_2-2\alpha {a}_2=0\kern0.5em i.e.\kern0.5em
    \mathit{\operatorname{cov}}(x){a}_2=\alpha {a}_2 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhr.png)'
- en: Hence, the second principal component is also an Eigen vector of the covariance
    matrix, and the Eigen value *α* must be the second largest Eigen value just after
    *λ*. In this way, we would get *n* Eigen vectors from the covariance matrix *cov*(*x*) ∈ *R*^(*n* × *n*),
    and the variance of the data along each of those Eigen vector directions (or principal
    components) would be represented by the Eigen values. One thing to note is that
    the covariance matrix is always symmetrical and thus the Eigen vectors would always
    be orthogonal to each other and so would give independent directions.
  id: totrans-1081
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，第二个主成分也是协方差矩阵的一个特征向量，特征值 *α* 必须是紧随 *λ* 的第二大特征值。这样，我们就从协方差矩阵 *cov*(*x*) ∈
    *R*^(*n* × *n*) 中得到了 *n* 个特征向量，并且数据在每个特征向量方向（或主成分）上的方差将由特征值表示。需要注意的是，协方差矩阵总是对称的，因此特征向量总是相互正交，从而给出独立的方向。
- en: The covariance matrix is always positive semi-definite.
  id: totrans-1082
  prefs: []
  type: TYPE_NORMAL
  zh: 协方差矩阵总是正半定的。
- en: This is true because the Eigen values of the covariance matrix represent variances,
    and variance cannot be negative. If *cov*(*x*) is positive definite, i.e., *a*^(*T*) *cov* (*x*)*a* > 0,
    then all the Eigen values of covariance matrices are positive.
  id: totrans-1083
  prefs: []
  type: TYPE_NORMAL
  zh: 这是因为协方差矩阵的特征值代表方差，而方差不能为负。如果 *cov*(*x*) 是正定的，即 *a*^(*T*) *cov* (*x*) *a* > 0，那么协方差矩阵的所有特征值都是正的。
- en: Figure [1-49](#Fig50) illustrates a principal component analysis transformation
    of the data. As we can see, PCA has centered the data and got rid of correlation
    among the PCA transformed variables.
  id: totrans-1084
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [1-49](#Fig50) 展示了数据的主成分分析变换。如图所示，PCA 将数据进行了中心化，并消除了 PCA 变量之间的相关性。
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig50_HTML.jpg)'
  id: totrans-1085
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig50_HTML.jpg)'
- en: The ellipse has two vectors, z 2 and z 1 on the two-dimensional planes, arrows
    point to another ellipse with two vectors, z 2 and z 1.
  id: totrans-1086
  prefs: []
  type: TYPE_NORMAL
  zh: 椭圆上有两个向量，z 2 和 z 1 在二维平面上，箭头指向另一个椭圆，该椭圆上有两个向量，z 2 和 z 1。
- en: Figure 1-49
  id: totrans-1087
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-49
- en: Principal component analysis centers the data and then projects the data into
    axes along which variance is maximum. The data along z[2] can be ignored if the
    variance along it is negligible
  id: totrans-1088
  prefs: []
  type: TYPE_NORMAL
  zh: 主成分分析（PCA）首先将数据中心化，然后将数据投影到方差最大的轴上。如果 z[2] 方向上的方差可以忽略不计，则可以忽略 z[2] 方向上的数据。
- en: When Will PCA Be Useful in Data Reduction?
  id: totrans-1089
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 当PCA在数据降维中何时有用？
- en: When there is high correlation between the different dimensions of the input,
    there would only be a few independent directions along which the variance of data
    would be high, and along other directions the variance would be insignificant.
    With PCA, one can keep the data components in the few directions in which variance
    is high and make a significant contribution to the overall variance, ignoring
    the rest of the data.
  id: totrans-1090
  prefs: []
  type: TYPE_NORMAL
  zh: 当输入的不同维度之间存在高度相关性时，数据的高方差将只沿着少数几个独立的方向存在，而沿其他方向方差将微不足道。通过主成分分析（PCA），可以保留数据成分在方差高的少数几个方向上，并对总体方差做出重大贡献，忽略其余数据。
- en: How Do You Know How Much Variance Is Retained by the Selected Principal Components?
  id: totrans-1091
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 你如何知道选定的主成分保留了多少方差？
- en: If the *z* vector presents the transformed components for input vector *x*,
    then the *cov*(*z*) would be a diagonal matrix containing the Eigen values of
    the *cov*(*x*) matrix as its diagonal entries.
  id: totrans-1092
  prefs: []
  type: TYPE_NORMAL
  zh: 如果 *z* 向量表示输入向量 *x* 的变换成分，那么 *cov*(*z*) 将是一个对角矩阵，其对角元素是 *cov*(*x*) 矩阵的特征值。
- en: '![$$ \mathit{\operatorname{cov}}(z)=\left[\begin{array}{ccc}{\lambda}_1&amp;
    \cdots &amp; 0\\ {}\vdots &amp; {\lambda}_2&amp; \vdots \\ {}0&amp; \cdots \kern0.5em
    &amp; {\lambda}_n\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhs.png)'
  id: totrans-1093
  prefs: []
  type: TYPE_IMG
  zh: '![ \mathit{\operatorname{cov}}(z)=\left[\begin{array}{ccc}{\lambda}_1 & \cdots
    & 0\\ \vdots & {\lambda}_2 & \vdots \\ 0 & \cdots & {\lambda}_n\end{array}\right]
    ](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhs.png)'
- en: Also, let us suppose the Eigen values are ordered like *λ*[1] > *λ*[2] > *λ*[3] .
    . > *λ*[*n*].
  id: totrans-1094
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，让我们假设特征值按如下顺序排列：*λ*[1] > *λ*[2] > *λ*[3] . . > *λ*[*n*]。
- en: 'Let us suppose we choose to keep only the first *k* principal components; the
    proportion of variance in the data captured is as follows:'
  id: totrans-1095
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们选择只保留前 *k* 个主成分；数据中捕获的方差比例如下：
- en: '![$$ \frac{\lambda_1+{\lambda}_2+{\lambda}_3+\dots +{\lambda}_k}{\lambda_1+{\lambda}_2+{\lambda}_3+\dots
    +{\lambda}_k+\dots +{\lambda}_n} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equht.png)'
  id: totrans-1096
  prefs: []
  type: TYPE_IMG
  zh: '![ \frac{\lambda_1+{\lambda}_2+{\lambda}_3+\dots +{\lambda}_k}{\lambda_1+{\lambda}_2+{\lambda}_3+\dots
    +{\lambda}_k+\dots +{\lambda}_n} ](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equht.png)'
- en: Singular Value Decomposition
  id: totrans-1097
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 奇异值分解
- en: Singular value decomposition is a dimensionality-reduction technique that factorizes
    a matrix *A*  ∈ ℝ^(*m* × *n*) *A* ∈ *R*^(*m* × *n*) into a product of three matrices,
    as *A* = *USV*^(*T*) where
  id: totrans-1098
  prefs: []
  type: TYPE_NORMAL
  zh: 奇异值分解是一种降维技术，它将矩阵 *A* ∈ ℝ^(*m* × *n*) 分解为三个矩阵的乘积，即 *A* = *USV*^(*T*)，其中
- en: '*U* ∈ *R*^(*m* × *m*) and is composed of all the Eigen vectors of the matrix
    *AA*^(*T*)*.*'
  id: totrans-1099
  prefs: []
  type: TYPE_NORMAL
  zh: '*U* ∈ *R*^(*m* × *m*) 并且由矩阵 *AA*^(*T*)* 的所有特征向量组成。'
- en: '*V* ∈ *R*^(*n* × *n*) and is composed of all the Eigen vectors of the matrix
    *A*^(*T*)*A.*'
  id: totrans-1100
  prefs: []
  type: TYPE_NORMAL
  zh: '*V* ∈ *R*^(*n* × *n*) 并且由矩阵 *A*^(*T*)*A* 的所有特征向量组成。'
- en: '*S* ∈ *R*^(*m* × *n*) and is composed of *k* square root of the Eigen vectors
    of both *A*^(*T*)*A* and *AA*^(*T*), where *k* is the rank of matrix *A*.'
  id: totrans-1101
  prefs: []
  type: TYPE_NORMAL
  zh: '*S* ∈ *R*^(*m* × *n*) 并且由 *A*^(*T*)*A* 和 *AA*^(*T*) 的特征向量的平方根组成，其中 *k* 是矩阵
    *A* 的秩。'
- en: 'The column vectors of *U* are all orthogonal to each other and hence form an
    orthogonal basis. Similarly, the column vectors of *V* also form an orthogonal
    basis:'
  id: totrans-1102
  prefs: []
  type: TYPE_NORMAL
  zh: '*U* 的列向量彼此正交，因此形成一个正交基。同样，*V* 的列向量也形成一个正交基：'
- en: '![$$ U=\left[{u}_1{u}_2 \dots {u}_m\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhu.png)'
  id: totrans-1103
  prefs: []
  type: TYPE_IMG
  zh: '![U=\left[{u}_1{u}_2 \dots {u}_m\right]](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhu.png)'
- en: where *u*[*i*] ∈ *R*^(*m* × 1) are the column vectors of *U*.
  id: totrans-1104
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *u*[*i*] ∈ *R*^(*m* × 1) 是 *U* 的列向量。
- en: '![$$ V=\left[{v}_1{v}_2 \dots {v}_m\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhv.png)'
  id: totrans-1105
  prefs: []
  type: TYPE_IMG
  zh: '![V=\left[{v}_1{v}_2 \dots {v}_m\right]](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhv.png)'
- en: where *v*[*i*] ∈ *R*^(*n* × 1) are the column vectors of *V*.
  id: totrans-1106
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *v*[*i*] ∈ *R*^(*n* × 1) 是矩阵 *V* 的列向量。
- en: '![$$ S=\left[\begin{array}{ccc}{\sigma}_1&amp; \cdots &amp; 0\\ {}\vdots &amp;
    {\sigma}_2&amp; \vdots \\ {}0&amp; \cdots \kern0.5em &amp; 0\end{array}\right]
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhw.png)'
  id: totrans-1107
  prefs: []
  type: TYPE_IMG
  zh: '![S=\left[\begin{array}{ccc}{\sigma}_1 & \cdots & 0\\ \vdots & {\sigma}_2 &
    \vdots \\ 0 & \cdots & 0\end{array}\right] ](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhw.png)'
- en: 'Depending on the rank of *A*, there would be *σ*[1], *σ*[2,] `… … ….` *σ*[*k*]
    diagonal entries corresponding to the rank *k* of matrix *A*:'
  id: totrans-1108
  prefs: []
  type: TYPE_NORMAL
  zh: 根据 *A* 的秩，会有 *σ*[1]，*σ*[2,] `… … ….` *σ*[*k*] 个对角线项，对应于矩阵 *A* 的秩 *k*：
- en: '![$$ A={\sigma}_1{u}_1{v_1}^T+{\sigma}_2{u}_2{v_2}^T+.\kern0.5em .\kern0.5em
    .\kern0.5em .+{\sigma}_k{u}_k{v_k}^T $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhx.png)'
  id: totrans-1109
  prefs: []
  type: TYPE_IMG
  zh: '![矩阵表示公式](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhx.png)'
- en: The *σ*[*i*]  ∀ *i*  ∈ {1, 2, 3, ..*k*}, also called singular values, are the
    square root of the Eigen values of both *A*^(*T*)*A* and *AA*^(*T*), and hence
    they are measures of variance in the data. Each of the *σ*[*i*]*u*[*i*]*v*[*i*]^(*T*) ∀ *i*  ∈ {1,
    2, 3, ..*k*} is a rank-one matrix. We can only keep the rank-one matrices for
    which the singular values are significant and explain a considerable proportion
    of the variance in the data.
  id: totrans-1110
  prefs: []
  type: TYPE_NORMAL
  zh: '*σ*[*i*]  ∀ *i*  ∈ {1, 2, 3, ..*k*}，也称为奇异值，是 *A*^(*T*)*A* 和 *AA*^(*T*) 的特征值的平方根，因此它们是数据中方差的度量。对于每个
    *σ*[*i*]*u*[*i*]*v*[*i*]^(*T*) ∀ *i*  ∈ {1, 2, 3, ..*k*}，都是一个秩一矩阵。我们只能保留那些奇异值显著的秩一矩阵，这些矩阵可以解释数据中相当比例的方差。'
- en: 'If one takes only the first *p* rank-one matrices corresponding to the first
    *p* singular values of largest magnitude, then the variance retained in the data
    is given by the following:'
  id: totrans-1111
  prefs: []
  type: TYPE_NORMAL
  zh: 如果只取对应于最大奇异值的前 *p* 个秩一矩阵，则保留在数据中的方差由以下公式给出：
- en: '![$$ \frac{{\sigma_1}^2+{\sigma_2}^2+{\sigma_3}^2+\dots +{\sigma_p}^2}{{\sigma_1}^2+{\sigma_2}^2+{\sigma_3}^2+\dots
    +{\sigma_p}^2+\dots +{\sigma_k}^2} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhy.png)'
  id: totrans-1112
  prefs: []
  type: TYPE_IMG
  zh: '![方差比例公式](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhy.png)'
- en: 'Images can be compressed using singular value decomposition. Similarly, singular
    value decomposition is used in collaborative filtering to decompose a user-rating
    matrix to two matrices containing user vectors and item vectors. The singular
    value decomposition of a matrix is given by *USV*^(*T*). The user-rating matrix
    *R* can be decomposed as follows:'
  id: totrans-1113
  prefs: []
  type: TYPE_NORMAL
  zh: 图像可以通过奇异值分解进行压缩。同样，奇异值分解在协同过滤中用于分解用户评分矩阵，得到包含用户向量和项目向量的两个矩阵。矩阵的奇异值分解由 *USV*^(*T*)
    给出。用户评分矩阵 *R* 可以分解如下：
- en: '![$$ R={US V}^T={US}^{\frac{1}{2}}{S}^{\frac{1}{2}}{V}^T={U}^{\hbox{''}}V{\hbox{''}}^T
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhz.png)'
  id: totrans-1114
  prefs: []
  type: TYPE_IMG
  zh: '![矩阵分解公式](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhz.png)'
- en: where *U*′ is the user-vector matrix and is equal to ![$$ {US}^{\frac{1}{2}}
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq80.png) and *V*′
    is the items-vector matrix where ![$$ {V}^{\prime }={S}^{\frac{1}{2}}{V}^T $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq81.png).
  id: totrans-1115
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *U*′ 是用户向量矩阵，等于 ![$$ {US}^{\frac{1}{2}} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq80.png)，而
    *V*′ 是项目向量矩阵，其中 ![$$ {V}^{\prime }={S}^{\frac{1}{2}}{V}^T $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq81.png)。
- en: Regularization
  id: totrans-1116
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 正则化
- en: The process of building a machine-learning model involves deriving parameters
    that fit the training data. If the model is simple, then the model lacks sensitivity
    to the variation in data and suffers from high bias. However, if the model is
    too complex, it tries to model for as much variation as possible and in the process
    models for random noise in the training data. This removes the bias produced by
    simple models but introduces high variance, i.e., the model is sensitive to very
    small changes in the input. High variance for a model is not a good thing, especially
    if the noise in the data is considerable. In such cases, the model in the pursuit
    of performing too well on the training data performs poorly on the test dataset
    since the model loses its capability to generalize well with the new data. This
    problem of models’ suffering from high variance is called *overfitting*.
  id: totrans-1117
  prefs: []
  type: TYPE_NORMAL
  zh: 构建机器学习模型的过程涉及推导出适合训练数据的参数。如果模型简单，那么模型对数据的变异不敏感，并存在高偏差。然而，如果模型过于复杂，它试图尽可能多地模拟变异，在这个过程中模拟了训练数据中的随机噪声。这消除了简单模型产生的偏差，但引入了高方差，即模型对输入的微小变化非常敏感。对于模型来说，高方差不是一个好现象，特别是如果数据中的噪声相当大。在这种情况下，模型在追求在训练数据上表现得太好的过程中，在测试数据集上的表现不佳，因为模型失去了与新数据良好泛化的能力。模型遭受高方差的问题被称为
    *过拟合*。
- en: As we can see in Figure [1-50](#Fig51), we have three models fit to the data.
    The one parallel to the horizontal is suffering from high bias, while the curvy
    one is suffering from high variance. The straight line in between at around 45
    degrees to the horizontal has neither high variance nor high bias.
  id: totrans-1118
  prefs: []
  type: TYPE_NORMAL
  zh: 如图[1-50](#Fig51)所示，我们拟合了三个模型到数据上。与水平线平行的模型遭受高偏差，而曲线模型则遭受高方差。位于水平线约45度角之间的直线既没有高方差也没有高偏差。
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig51_HTML.jpg)'
  id: totrans-1119
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig51_HTML.jpg)'
- en: The two two-dimensional planes of y versus x, for the train dataset and test
    dataset, respectively. It consists of a horizontal line and an increasing line
    with curves and dots.
  id: totrans-1120
  prefs: []
  type: TYPE_NORMAL
  zh: 对于训练数据集和测试数据集，y与x的二维平面图。它包括一条水平线和一条带有曲线和点的递增线。
- en: Figure 1-50
  id: totrans-1121
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-50
- en: Illustration of models with high variance and high bias
  id: totrans-1122
  prefs: []
  type: TYPE_NORMAL
  zh: 高方差和高偏差模型的示意图
- en: The model with high variance does well on the train data but fails to do well
    on the test dataset, even when the dataset’s nature has not changed much. The
    model represented in blue color may not fit the training perfectly, but it does
    better on the test data since the model does not suffer from high variance. The
    trick is to have a model that does not suffer from high bias and at the same time
    is not so complex that it models for random noise as well.
  id: totrans-1123
  prefs: []
  type: TYPE_NORMAL
  zh: 高方差模型在训练数据上表现良好，但在测试数据集上表现不佳，即使数据集的性质没有发生很大变化。用蓝色表示的模型可能无法完美地拟合训练数据，但由于模型没有遭受高方差，它在测试数据上表现更好。关键在于拥有一个既不受高偏差影响，又不会过于复杂以至于将随机噪声也建模在内的模型。
- en: Models with high variance typically have model parameters with a large magnitude
    since the sensitivity of the models to small changes in data is high. To overcome
    the problem of overfitting resulting from high model variance, a popular technique
    called regularization is widely used.
  id: totrans-1124
  prefs: []
  type: TYPE_NORMAL
  zh: 高方差模型通常具有较大的模型参数幅度，因为模型对数据的小变化非常敏感。为了克服由高模型方差引起过拟合的问题，广泛使用了一种称为正则化的流行技术。
- en: 'To put things into perspective, let us look at the linear regression cost function
    that we looked at earlier:'
  id: totrans-1125
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更清楚地说明问题，让我们看看我们之前看过的线性回归代价函数：
- en: '![$$ C\left(\theta \right)={\left\Vert X\theta \kern0.5em -\kern0.5em Y\right\Vert}_2^2
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equia.png)'
  id: totrans-1126
  prefs: []
  type: TYPE_IMG
  zh: '![$$ C\left(\theta \right)={\left\Vert X\theta \kern0.5em -\kern0.5em Y\right\Vert}_2^2
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equia.png)'
- en: '![$$ ={\left( X\theta \kern0.5em -\kern0.5em Y\right)}^T\left( X\theta \kern0.5em
    -\kern0.5em Y\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equib.png)'
  id: totrans-1127
  prefs: []
  type: TYPE_IMG
  zh: '![$$ ={\left( X\theta \kern0.5em -\kern0.5em Y\right)}^T\left( X\theta \kern0.5em
    -\kern0.5em Y\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equib.png)'
- en: As discussed earlier, models with high variance have model parameters with a
    large magnitude. We can put an extra component into the cost function *C*(*θ*)
    that penalizes the overall cost function in case the magnitude of the model parameter
    vector is high.
  id: totrans-1128
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，高方差模型具有幅度较大的模型参数。我们可以在代价函数*C*(*θ*)中添加一个额外的组件，当模型参数向量的幅度较高时，它会惩罚整体代价函数。
- en: 'So, we can have a new cost function, ![$$ L\left(\theta \right)={\left\Vert
    X\theta \kern0.5em -\kern0.5em Y\right\Vert}_2^2+\lambda {\left\Vert \theta \right\Vert}_2^2
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq82.png), where
    ‖*θ*‖[2]² is the square of the *l*² norm of the model parameter vector. The optimization
    problem becomes as follows:'
  id: totrans-1129
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们可以有一个新的代价函数，![$$ L\left(\theta \right)={\left\Vert X\theta \kern0.5em -\kern0.5em
    Y\right\Vert}_2^2+\lambda {\left\Vert \theta \right\Vert}_2^2 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq82.png)，其中‖*θ*‖[2]²是模型参数向量l²范数的平方。优化问题变为以下形式：
- en: '![$$ {\theta}^{\ast }=\underset{\theta }{\underbrace{Arg\kern0.5em \mathit{\operatorname{Min}}}}\kern0.5em
    L\left(\theta \right)={\left\Vert X\theta \kern0.5em -\kern0.5em Y\right\Vert}_2^2+\lambda
    {\left\Vert \theta \right\Vert}_2^2 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equic.png)'
  id: totrans-1130
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\theta}^{\ast }=\underset{\theta }{\underbrace{Arg\kern0.5em \mathit{\operatorname{Min}}}}\kern0.5em
    L\left(\theta \right)={\left\Vert X\theta \kern0.5em -\kern0.5em Y\right\Vert}_2^2+\lambda
    {\left\Vert \theta \right\Vert}_2^2 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equic.png)'
- en: Taking the gradient ∇*L* with respect to *θ* and setting it to 0 give us *θ*^∗ = (*X*^(*T*)*X* + *λI*)^(−1)*X*^(*T*)*Y*.
  id: totrans-1131
  prefs: []
  type: TYPE_NORMAL
  zh: 对*θ*求梯度∇*L*并将其设为0，我们得到*θ*^∗ = (*X*^(*T*)*X* + *λI*)^(−1)*X*^(*T*)*Y*。
- en: Now, as we can see because of the ‖*θ*‖[2]² term in the cost function, the model
    parameter’s magnitude cannot be too large since it would penalize the overall
    cost function. *λ* determines the weight of the regularization term. A higher
    value for *λ* would result in smaller values of ‖*θ*‖[2]², thus making the model
    simpler and prone to high bias or underfitting. In general, even smaller values
    of *λ* go a long way in reducing the model complexity and the model variance.
    *λ* is generally optimized using cross-validation.
  id: totrans-1132
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，正如我们所看到的，由于成本函数中的‖*θ*‖[2]²项，模型参数的幅度不能太大，因为这会惩罚整体成本函数。*λ*决定了正则化项的权重。*λ*的值越高，‖*θ*‖[2]²的值就越小，从而使模型更简单，更容易出现高偏差或欠拟合。一般来说，即使*λ*的值很小，也能在很大程度上减少模型复杂性和模型方差。*λ*通常使用交叉验证进行优化。
- en: When the square of the *l*² norm is used as the regularization term, the optimization
    method is called *l*² regularization. At times, the *l*¹ norm of model parameter
    vectors is used as the regularization term, and the optimization method is termed
    *l*¹ regularization. *l*² regularization applied to regression problems is called
    ridge regression, whereas *l*¹ regularization applied to such regression problems
    is termed lasso regression.
  id: totrans-1133
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用**l**²范数的平方作为正则化项时，这种优化方法被称为**l**²正则化。有时，模型参数向量的**l**¹范数被用作正则化项，这种优化方法被称为**l**¹正则化。将**l**²正则化应用于回归问题称为岭回归，而将**l**¹正则化应用于此类回归问题称为Lasso回归。
- en: 'For *l*¹ regularization, the preceding regression problem becomes the following:'
  id: totrans-1134
  prefs: []
  type: TYPE_NORMAL
  zh: 对于**l**¹正则化，前面的回归问题变为以下形式：
- en: '![$$ {\theta}^{\ast }= \underset{\theta }{\underbrace{Arg\kern0.5em \mathit{\operatorname{Min}}}}L\left(\theta
    \right)={\left\Vert X\theta \kern0.5em -\kern0.5em Y\right\Vert}_2^2+\lambda {\left\Vert
    \theta \right\Vert}_1 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equid.png)'
  id: totrans-1135
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\theta}^{\ast }= \underset{\theta }{\underbrace{Arg\kern0.5em \mathit{\operatorname{Min}}}}L\left(\theta
    \right)={\left\Vert X\theta \kern0.5em -\kern0.5em Y\right\Vert}_2^2+\lambda {\left\Vert
    \theta \right\Vert}_1 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equid.png)'
- en: Ridge regression is mathematically more convenient since it has a closed-form
    solution, whereas lasso regression does not have a closed-form solution. However,
    lasso regression is much more robust to outliers in comparison with ridge regression.
    Lasso problems give sparse solutions, so it is good for feature selection, especially
    when there is moderate to high correlation among the input features.
  id: totrans-1136
  prefs: []
  type: TYPE_NORMAL
  zh: 岭回归在数学上更方便，因为它有一个封闭形式的解，而Lasso回归没有封闭形式的解。然而，与岭回归相比，Lasso回归对异常值具有更强的鲁棒性。Lasso问题给出稀疏解，因此它适用于特征选择，尤其是在输入特征之间存在中等至高相关性时。
- en: Regularization Viewed as a Constraint Optimization Problem
  id: totrans-1137
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 将正则化视为约束优化问题
- en: 'Instead of adding the penalty term, we can add a constraint on the magnitude
    of the model parameter vector to be less than or equal to some constant value.
    We can then have an optimization problem as follows:'
  id: totrans-1138
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以不对模型参数向量的幅度添加惩罚项，而是添加一个约束，使其小于或等于某个常数。这样，我们就可以得到以下优化问题：
- en: '![$$ {\theta}^{\ast }={argmin}_{\theta}\kern0.5em C\left(\theta \right)={\left\Vert
    X\theta \kern0.5em -\kern0.5em Y\right\Vert}_2^2 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equie.png)'
  id: totrans-1139
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\theta}^{\ast }={argmin}_{\theta}\kern0.5em C\left(\theta \right)={\left\Vert
    X\theta \kern0.5em -\kern0.5em Y\right\Vert}_2^2 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equie.png)'
- en: such that ![$$ {\left\Vert \theta \right\Vert}_2^2\le b $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq83.png)
  id: totrans-1140
  prefs: []
  type: TYPE_NORMAL
  zh: 使得 ![$$ {\left\Vert \theta \right\Vert}_2^2\le b $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq83.png)
- en: where b is a constant.
  id: totrans-1141
  prefs: []
  type: TYPE_NORMAL
  zh: 其中b是一个常数。
- en: 'We can convert this constrained minimization problem to an unconstrained minimization
    problem by creating a new Lagrangian formulation, as seen here:'
  id: totrans-1142
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过创建一个新的拉格朗日公式，将这个约束最小化问题转换为无约束最小化问题，如下所示：
- en: '![$$ L\left(\theta, \lambda \right)={\left\Vert X\theta \kern0.5em -\kern0.5em
    Y\right\Vert}_2^2+\lambda \left({\left\Vert \theta \right\Vert}_2^2-b\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equif.png)'
  id: totrans-1143
  prefs: []
  type: TYPE_IMG
  zh: '![$$ L\left(\theta, \lambda \right)={\left\Vert X\theta \kern0.5em -\kern0.5em
    Y\right\Vert}_2^2+\lambda \left({\left\Vert \theta \right\Vert}_2^2-b\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equif.png)'
- en: 'To minimize the Lagrangian cost function per the Karush-Kuhn-Tucker conditions,
    the following are important:'
  id: totrans-1144
  prefs: []
  type: TYPE_NORMAL
  zh: 根据Karush-Kuhn-Tucker条件最小化拉格朗日成本函数时，以下条件很重要：
- en: 'The gradient of *L* with respect to *θ*; i.e., ∇[*θ*]*L*(*θ*, *λ*) should be
    the zero vector, which on simplification gives the following:'
  id: totrans-1145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**L**相对于**θ**的梯度；即，∇[*θ*]*L*(*θ*, *λ*)应该是零向量，简化后得到以下结果：'
- en: '![$$ \theta ={\left({X}^TX+\lambda I\right)}^{-1}{X}^T\textrm{Y} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equ4.png)'
  id: totrans-1146
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \theta ={\left({X}^TX+\lambda I\right)}^{-1}{X}^T\textrm{Y} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equ4.png)'
- en: (1)
  id: totrans-1147
  prefs: []
  type: TYPE_NORMAL
  zh: (1)
- en: If we consider regularization, i.e., *λ* > 0, then ![$$ {\left\Vert \theta \right\Vert}_2^2-\textrm{b}=0
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq85.png) (2)
  id: totrans-1148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果我们考虑正则化，即*λ* > 0，那么 ![$$ {\left\Vert \theta \right\Vert}_2^2-\textrm{b}=0
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq85.png) (2)
- en: Also, at the optimal point ![$$ \lambda \left({\left\Vert \theta \right\Vert}_2^2-b\right)
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq84.png) = 0 and
    *λ*  ≥ 0
  id: totrans-1149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 此外，在最优点 ![$$ \lambda \left({\left\Vert \theta \right\Vert}_2^2-b\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq84.png)
    = 0 和 *λ* ≥ 0
- en: As we can see from (1), *θ* obtained is a function of *λ. λ* should be adjusted
    such that the constraint from (2) is satisfied.
  id: totrans-1150
  prefs: []
  type: TYPE_NORMAL
  zh: 从(1)中我们可以看到，*θ*的获得是*λ*的函数。*λ*应该调整到满足(2)中的约束。
- en: The solution *θ* = (*X*^(*T*)*X* + *λI*)^(−1)*X*^(*T*)*Y* from (1) is the same
    as what we get from *l*² regularization. In machine-learning applications, the
    Lagrange multiplier is generally optimized through hyperparameter tuning or cross-validation
    since we have no knowledge of what a good value for *b* would be. When we take
    small values of *λ*, the value of *b* increases and so does the norm of *θ*, whereas
    larger values of *λ* provide smaller *b* and hence a smaller norm for *θ*.
  id: totrans-1151
  prefs: []
  type: TYPE_NORMAL
  zh: (1)中的解*θ* = (*X*^(*T*)*X* + *λI*)^(−1)*X*^(*T*)*Y*与从*l*²正则化得到的相同。在机器学习应用中，拉格朗日乘数通常通过超参数调整或交叉验证来优化，因为我们不知道*b*的好值是什么。当我们取小的*λ*值时，*b*的值增加，*θ*的范数也随之增加，而大的*λ*值提供较小的*b*，因此*θ*的范数更小。
- en: Coming back to regularization, any component in the cost function that penalizes
    the complexity of the model provides regularization. In tree-based models, as
    we increase the number of leaf nodes, the complexity of the tree grows. We can
    add a term to the cost function that is based on the number of leaf nodes in the
    tree, and it will provide regularization. A similar thing can be done for the
    depth of the tree.
  id: totrans-1152
  prefs: []
  type: TYPE_NORMAL
  zh: 回到正则化，任何惩罚模型复杂性的成本函数中的组件都提供正则化。在基于树的模型中，随着叶节点数量的增加，树的复杂性增加。我们可以在成本函数中添加一个基于树中叶节点数量的项，这将提供正则化。对于树的深度也可以做类似的事情。
- en: Even stopping the model-training process early provides regularization. For
    instance, in gradient-descent method, the more iterations we run, the more complex
    the model gets since with each iteration, the gradient descent tries to reduce
    the cost-function value further. We can stop the model-learning process early
    based on some criteria, such as an increase in the cost-function value for the
    test dataset in the iterative process. Whenever in the iterative process of training
    the training cost-function value decreases while the test cost-function value
    increases, it might be an indication of the onset of overfitting, and thus it
    makes sense to stop the iterative learning.
  id: totrans-1153
  prefs: []
  type: TYPE_NORMAL
  zh: 即使提前停止模型训练过程也能提供正则化。例如，在梯度下降法中，我们运行的迭代次数越多，模型就越复杂，因为每次迭代，梯度下降都会尝试进一步降低成本函数的值。我们可以根据某些标准，如迭代过程中测试数据集的成本函数值增加，提前停止模型学习过程。每当在训练过程中，训练成本函数值下降而测试成本函数值上升时，这可能表明过拟合的开始，因此停止迭代学习是有意义的。
- en: Whenever training data is less in comparison with the number of parameters the
    model must learn, there is a high chance of overfitting, because the model will
    learn too many rules for a small dataset and might fail to generalize well to
    the unseen data. If the dataset is adequate in comparison with the number of parameters,
    then the rules learned are over a good proportion of the population data, and
    hence the chances of model overfitting go down.
  id: totrans-1154
  prefs: []
  type: TYPE_NORMAL
  zh: 当训练数据与模型必须学习的参数数量相比较少时，过拟合的可能性很高，因为模型将学习太多规则来适应小数据集，并且可能无法很好地泛化到未见过的数据。如果数据集与参数数量相比是充足的，那么学习的规则覆盖了很大比例的总体数据，因此模型过拟合的可能性降低。
- en: Bias and Variance Trade-Off
  id: totrans-1155
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 偏差和方差权衡
- en: As we have discussed earlier, a model which is too simple in comparison with
    the system or relationship that we are trying to learn suffers from high bias.
    Whereas when the model is too complex in comparison with the desired relationship
    it must learn, it suffers from high variance.
  id: totrans-1156
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们之前讨论的，与我们试图学习的系统或关系相比过于简单的模型会遭受高偏差。而当我们试图学习的模型与期望的关系相比过于复杂时，它会遭受高方差。
- en: Mathematically to define bias precisely, let us assume the world model represented
    as *y* = *f*(*X*; *θ*) where function *f* parameterized by *θ* ∈ *R*^(*n*) maps
    input *X* ∈ *R*^(*n*) to output *y* ∈ *R*.
  id: totrans-1157
  prefs: []
  type: TYPE_NORMAL
  zh: 从数学上精确地定义偏差，让我们假设世界模型表示为*y* = *f*(*X*; *θ*)，其中函数*f*由*θ* ∈ *R*^(*n*)参数化，将输入*X*
    ∈ *R*^(*n*)映射到输出*y* ∈ *R*。
- en: 'With a ML model we would estimate *θ* as ![$$ \hat{\theta} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq86.png).
    If we use different datasets, we will get different estimate of ![$$ \hat{\theta}
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq87.png) in general.
    The model is said to suffer from high bias if the expected value of ![$$ \hat{\theta}
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq88.png) differs
    from the world value or oracle value *θ* by a large amount. Bias can hence be
    expressed as follows:'
  id: totrans-1158
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ML模型，我们将估计*θ*为![公式](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq86.png)。如果我们使用不同的数据集，我们通常会得到不同的![公式](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq87.png)估计。如果![公式](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq88.png)的期望值与世界值或占卜值*θ*有很大差异，则模型被认为具有高偏差。因此，偏差可以表示如下：
- en: '![$$ Bias=E\left[\hat{\theta}\right]-\theta $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equig.png)'
  id: totrans-1159
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equig.png)'
- en: 'Variance on the model on the other hand is the variability in the estimates
    ![$$ \hat{\theta} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq89.png)
    of the parameter *θ* and can be expressed as ![$$ E{\left[\hat{\theta}-E\left[\hat{\theta}\right]\right]}^2
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq90.png) when
    *θ* is a scalar. When *θ* is a vector, we can investigate the covariance matrix
    instead for variance of the model as shown in the following:'
  id: totrans-1160
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，模型的方差是参数*θ*的估计![公式](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq89.png)的变化性，当*θ*是标量时，可以表示为![公式](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq90.png)。当*θ*是向量时，我们可以研究协方差矩阵来代替模型的方差，如下所示：
- en: '![$$ E\left[\left(\hat{\theta}-E\left[\hat{\theta}\right]\right){\left(\hat{\theta}-E\left[\hat{\theta}\right]\right)}^T\right]
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equih.png)'
  id: totrans-1161
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equih.png)'
- en: The model error in general can be broken down into variance of the model and
    square of the bias of the model. To prove the same, let us assume we have a model
    with one parameter the oracle value of which is *θ*. We estimate the parameter
    of the model *θ* as ![$$ \hat{\theta} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq91.png).
    Since training on different sample of the data would yield different ![$$ \hat{\theta}
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq92.png), ![$$
    \hat{\theta} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq93.png)
    here is a random variable with some mean ![$$ E\left[\hat{\theta}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq94.png)
    and finite variance. The expectation on the square of the difference between ![$$
    \hat{\theta} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq95.png)and
    *θ* as shown in the following would give us our model error.
  id: totrans-1162
  prefs: []
  type: TYPE_NORMAL
  zh: 一般情况下，模型误差可以分为模型的方差和模型偏差的平方。为了证明这一点，让我们假设我们有一个只有一个参数的模型，其值为*θ*。我们估计模型的参数*θ*为![公式](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq91.png)。由于在不同的数据样本上训练会产生不同的![公式](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq92.png)，![公式](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq93.png)在这里是一个具有某些均值![公式](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq94.png)和有限方差的随机变量。以下方差的期望值与*θ*之间的差值将给出我们的模型误差。
- en: 'We can expand the above expression as shown in the following:'
  id: totrans-1163
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将上述表达式展开，如下所示：
- en: '![$$ E\left[{\left(\hat{\theta}-\theta \right)}^2\right]=E\left[{\left(\hat{\theta}-E\left[\hat{\theta}\right]+E\left[\hat{\theta}\right]-\theta
    \right)}^2\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equii.png)'
  id: totrans-1164
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equii.png)'
- en: '![$$ =E\left[{\left(\hat{\theta}-E\left[\hat{\theta}\right]\right)}^2\right]+E\left[{\left(E\left[\hat{\theta}\right]-\theta
    \right)}^2\right]+2\ E\left[\left(\hat{\theta}-E\left[\hat{\theta}\right]\right)\right]\left[E\left[\hat{\theta}\right]-\theta
    \right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equij.png)'
  id: totrans-1165
  prefs: []
  type: TYPE_IMG
  zh: '![$$ =E\left[{\left(\hat{\theta}-E\left[\hat{\theta}\right]\right)}^2\right]+E\left[{\left(E\left[\hat{\theta}\right]-\theta
    \right)}^2\right]+2\ E\left[\left(\hat{\theta}-E\left[\hat{\theta}\right]\right)\right]\left[E\left[\hat{\theta}\right]-\theta
    \right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equij.png)'
- en: 'The first term ![$$ E\left[{\left(\hat{\theta}-E\left[\hat{\theta}\right]\right)}^2\right]
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq96.png) is the
    variance of the model. Everything in the second term is constant and hence ![$$
    E\left[{\left(E\left[\hat{\theta}\right]-\theta \right)}^2\right]={\left(E\left[\hat{\theta}\right]-\theta
    \right)}^2 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq97.png).
    A closer look at ![$$ {\left(E\left[\hat{\theta}\right]-\theta \right)}^2 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq98.png)
    suggests that ![$$ {\left(E\left[\hat{\theta}\right]-\theta \right)}^2 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq99.png)
    is the bias squared. In the third term ![$$ E\left[\left(\hat{\theta}-E\left[\hat{\theta}\right]\right)\right]\left[E\left[\hat{\theta}\right]-\theta
    \right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq100.png)
    since ![$$ E\left[\hat{\theta}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq101.png)
    and *θ* are constants, the expression simplifies to as the following:'
  id: totrans-1166
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个项 ![$$ E\left[{\left(\hat{\theta}-E\left[\hat{\theta}\right]\right)}^2\right]
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq96.png) 是模型的方差。第二个项中的所有内容都是常数，因此
    ![$$ E\left[{\left(E\left[\hat{\theta}\right]-\theta \right)}^2\right]={\left(E\left[\hat{\theta}\right]-\theta
    \right)}^2 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq97.png)。仔细观察
    ![$$ {\left(E\left[\hat{\theta}\right]-\theta \right)}^2 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq98.png)
    可以看出，![$$ {\left(E\left[\hat{\theta}\right]-\theta \right)}^2 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq99.png)
    是偏差的平方。在第三个项 ![$$ E\left[\left(\hat{\theta}-E\left[\hat{\theta}\right]\right)\right]\left[E\left[\hat{\theta}\right]-\theta
    \right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq100.png)
    中，由于 ![$$ E\left[\hat{\theta}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq101.png)
    和 *θ* 是常数，表达式简化为以下形式：
- en: '![$$ 2\ E\left[\left(\hat{\theta}-E\left[\hat{\theta}\right]\right)\right]\left[E\left[\hat{\theta}\right]-\theta
    \right]=2\ast \left[E\left[\hat{\theta}\right]-\theta \right]\ast E\left[\left(\hat{\theta}-E\left[\hat{\theta}\right]\right)\right]
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equik.png)'
  id: totrans-1167
  prefs: []
  type: TYPE_IMG
  zh: '![$$ 2\ E\left[\left(\hat{\theta}-E\left[\hat{\theta}\right]\right)\right]\left[E\left[\hat{\theta}\right]-\theta
    \right]=2\ast \left[E\left[\hat{\theta}\right]-\theta \right]\ast E\left[\left(\hat{\theta}-E\left[\hat{\theta}\right]\right)\right]
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equik.png)'
- en: Since mean of ![$$ \hat{\theta} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq102.png)
    is ![$$ E\left[\hat{\theta}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq103.png)
    hence ![$$ E\left[\left(\hat{\theta}-E\left[\hat{\theta}\right]\right)\right]=0\.
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq104.png)
  id: totrans-1168
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 ![$$ \hat{\theta} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq102.png)
    的均值是 ![$$ E\left[\hat{\theta}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq103.png)，因此
    ![$$ E\left[\left(\hat{\theta}-E\left[\hat{\theta}\right]\right)\right]=0\. $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq104.png)
- en: Hence, we can see that model error is a combination of variance and bias in
    the model estimate. So, for a given model error, sum of variance of the model
    and square of the bias remain constant—if we try to reduce one, the other would
    increase.
  id: totrans-1169
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们可以看到模型误差是模型估计中方差和偏差的组合。所以，对于给定的模型误差，模型的方差和偏差的平方和保持不变——如果我们试图减少其中一个，另一个就会增加。
- en: Summary
  id: totrans-1170
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we have touched upon all the required mathematical concepts
    for proceeding with machine-learning and deep-learning concepts. The reader is
    still advised to go through proper textbooks pertaining to these subjects in his
    or her spare time for more clarity. However, this chapter is a good starting point.
    In the next chapter, we will start with artificial neural networks and the basics
    of TensorFlow.
  id: totrans-1171
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们已经涉及了进行机器学习和深度学习概念所需的所有数学概念。读者仍建议在空闲时间阅读与这些主题相关的适当教科书，以获得更清晰的了解。然而，本章是一个良好的起点。在下一章中，我们将从人工神经网络和TensorFlow的基础开始。
