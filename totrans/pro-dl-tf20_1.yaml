- en: 1.¬†Mathematical Foundations
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Deep learning is a branch of machine learning that uses many layers of artificial
    neurons stacked one on top of the other for identifying complex features within
    the input data and solving complex real-world problems. It can be used for both
    supervised and unsupervised machine-learning tasks. Deep learning is currently
    used in areas such as computer vision, video analytics, pattern recognition, anomaly
    detection, text processing, sentiment analysis, and recommender system, among
    other things. Also, it has widespread use in robotics, self-driving car mechanisms,
    and artificial intelligence systems in general.
  prefs: []
  type: TYPE_NORMAL
- en: 'Mathematics is at the heart of any machine-learning algorithm. A strong grasp
    of the core concepts of mathematics goes a long way in enabling one to select
    the right algorithms for a specific machine-learning problem, keeping in mind
    the end objectives. Also, it enables one to tune machine-learning/deep-learning
    models better and understand the possible reasons for an algorithm not performing
    as desired. Deep learning being a branch of machine learning demands as much expertise
    in mathematics, if not more, than that required for other machine-learning tasks.
    Mathematics as a subject is vast, but there are a few specific topics that machine-learning
    or deep-learning professionals and/or enthusiasts should be aware of to extract
    the most out of this wonderful domain of machine learning, deep learning, and
    artificial intelligence. Illustrated in Figure [1-1](#Fig1) are the different
    branches of mathematics along with their importance in the field of machine learning
    and deep learning. We will discuss the relevant concepts in each of the following
    branches in this chapter:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A pie chart, with values in percentages. Optimization and machine learning formulation,
    25\. Probability and statistics, 25\. Linear algebra, 35.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-1
  prefs: []
  type: TYPE_NORMAL
- en: Importance of mathematics topics for machine learning and data science
  prefs: []
  type: TYPE_NORMAL
- en: Linear algebra
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Calculus
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Probability
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Optimization and formulation of machine-learning algorithms
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: Readers who are already familiar with these topics can choose to skip this chapter
    or have a casual glance through the content.
  prefs: []
  type: TYPE_NORMAL
- en: Linear Algebra
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Linear algebra is a branch of mathematics that deals with vectors and their
    transformation from one vector space to another vector space. Since in machine
    learning and deep learning we deal with multidimensional data and their manipulation,
    linear algebra plays a crucial role in almost every machine-learning and deep-learning
    algorithm. Illustrated in Figure [1-2](#Fig2) is a three-dimensional vector space
    where *v*[1],¬†*v*[2,] and *v*[3] are vectors and *P* is a 2-D plane within the
    three-dimensional vector space.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'A plane surface with axes X, Y, and Z. The neutral axis gives rise to three
    lines: v subscripts 1&#x2013;3.'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-2
  prefs: []
  type: TYPE_NORMAL
- en: Three-dimensional vector space with vectors and a vector plane
  prefs: []
  type: TYPE_NORMAL
- en: Vector
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: An array of numbers, either continuous or discrete, is called a vector, and
    the space consisting of vectors is called a vector space. Vector space dimensions
    can be finite or infinite, but most machine-learning or data-science problems
    deal with fixed-length vectors, for example, the velocity of a car moving in the
    plane with velocities *Vx* and *Vy* in the *x* and *y* direction respectively
    (see Figure [1-3](#Fig3)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The X-Y plane consists of a car moving in the x-y vector plane, which denotes
    the x and y components of vehicle velocity.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-3
  prefs: []
  type: TYPE_NORMAL
- en: Car moving in the x-y vector plane with velocity components Vx and Vy
  prefs: []
  type: TYPE_NORMAL
- en: In machine learning, we deal with multidimensional data, so vectors become very
    crucial. Let‚Äôs say we are trying to predict the housing prices in a region based
    on the area of the house, number of bedrooms, number of bathrooms, and population
    density of the locality. All these features form an input feature vector for the
    housing price prediction problem.
  prefs: []
  type: TYPE_NORMAL
- en: Scalar
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A one-dimensional vector is a scalar. As learned in high school, a scalar is
    a quantity that has only magnitude and no direction. This is because, since it
    has only one direction along which it can move, its direction is immaterial, and
    we are only concerned about the magnitude.
  prefs: []
  type: TYPE_NORMAL
- en: 'Examples: height of a child, weight of fruit, etc.'
  prefs: []
  type: TYPE_NORMAL
- en: Matrix
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A matrix is a two-dimensional array of numbers arranged in rows and columns.
    The size of the matrix is determined by its row length and column length. If a
    matrix *A* has *m* rows and *n* columns, it can be represented as a rectangular
    object (see Figure [1-4a](#Fig4)) having *m* √ó *n* elements, and it can be denoted
    as *A*[*m* √ó *n*.]
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The m by n matrix. The elements are denoted by a subscript i j.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-4a
  prefs: []
  type: TYPE_NORMAL
- en: Structure of a matrix
  prefs: []
  type: TYPE_NORMAL
- en: A few vectors belonging to the same vector space form a matrix.
  prefs: []
  type: TYPE_NORMAL
- en: For example, an image in grayscale is stored in a matrix form. The size of the
    image determines the image matrix size, and each matrix cell holds a value from
    0 to 255 representing the pixel intensity. Illustrated in Figure [1-4b](#Fig5)
    is a grayscale image followed by its matrix representation.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The photo of a dog with a cat, and an arrow points to its internal representation
    in matrix form.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-4b
  prefs: []
  type: TYPE_NORMAL
- en: Structure of a matrix
  prefs: []
  type: TYPE_NORMAL
- en: Tensor
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A tensor is a multidimensional array of numbers. In fact, vectors and matrices
    can be treated as 1-D and 2-D tensors. In deep learning, tensors are mostly used
    for storing and processing data. For example, an image in RGB is stored in a three-dimensional
    tensor, where along one dimension we have the horizontal axis and along the other
    dimension we have the vertical axis and where the third dimension corresponds
    to the three color channels, namely, red, green, and blue. Another example is
    the four-dimensional tensors used in feeding images through mini-batches in a
    convolutional neural network. Along the first dimension, we have the image number
    in the batch, and along the second dimension, we have the color channels, and
    the third and fourth dimensions correspond to pixel location in the horizontal
    and vertical directions.
  prefs: []
  type: TYPE_NORMAL
- en: Matrix Operations and Manipulations
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Most deep-learning computational activities are done through basic matrix operations,
    such as multiplication, addition, subtraction, transposition, and so forth. Hence,
    it makes sense to review the basic matrix operations.
  prefs: []
  type: TYPE_NORMAL
- en: 'A matrix *A* of *m* rows and *n* columns can be considered a matrix that contains
    *n* number of column vectors of dimension *m* stacked side-by-side. We represent
    the matrix as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {A}_{m\times n}\in {{\mathbb{R}}}^{m\times n} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equa.png)'
  prefs: []
  type: TYPE_IMG
- en: Addition of Two Matrices
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The addition of two matrices *A* and *B* implies their element-wise addition.
    We can only add two matrices, provided their dimensions match. If *C* is the sum
    of matrices *A* and *B*, then
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {c}_{ij}={a}_{ij}+{b}_{ij}\kern1em \forall \kern0.5em i\kern0.5em \in
    \left\{1,2,..m\right\},\forall \kern0.5em j\kern0.5em \in \left\{1,2,..n\right\}
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equb.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ where\kern0.5em {a}_{ij} \in A,{b}_{ij} \in \kern0.5em B,{c}_{ij} \in
    \kern0.5em C $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equc.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Example: ![$$ A=\left[\begin{array}{cc}1&amp; 2\\ {}3&amp; 4\end{array}\right]B=\left[\begin{array}{cc}5&amp;
    6\\ {}7&amp; 8\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq1.png)
    then ![$$ A+B=\left[\begin{array}{cc}1+5&amp; 2+6\\ {}3+7&amp; 4+8\end{array}\right]=\left[\begin{array}{cc}6&amp;
    8\\ {}10&amp; 12\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq2.png)'
  prefs: []
  type: TYPE_NORMAL
- en: Subtraction of Two Matrices
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The subtraction of two matrices *A* and *B* implies their element-wise subtraction.
    We can only subtract two matrices provided their dimensions match.
  prefs: []
  type: TYPE_NORMAL
- en: If *C* is the matrix representing *A*¬†‚ąí¬†*B*, then
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {c}_{ij}={a}_{ij}-{b}_{ij} \forall \kern0.5em i\kern0.5em \in \left\{1,2,..m\right\},\forall
    \kern0.5em j\kern0.5em \in \left\{1,2,..n\right\} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equd.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ where\kern0.5em {a}_{ij} \in A,{b}_{ij} \in \kern0.5em B,{c}_{ij} \in
    \kern0.5em C $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Eque.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Example: ![$$ A=\left[\begin{array}{cc}1&amp; 2\\ {}3&amp; 4\end{array}\right]B=\left[\begin{array}{cc}5&amp;
    6\\ {}7&amp; 8\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq3.png)
    then ![$$ A-B=\left[\begin{array}{cc}1-5&amp; 2-6\\ {}3-7&amp; 4-8\end{array}\right]=\left[\begin{array}{cc}-4&amp;
    -4\\ {}-4&amp; -4\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq4.png)'
  prefs: []
  type: TYPE_NORMAL
- en: Product of Two Matrices
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'For two matrices *A*¬†‚ąą¬†*R*^(*m*¬†√ó¬†*n*)¬†and *B*¬†‚ąą¬†*R*^(*p*¬†√ó¬†*q*) to be multipliable,
    *n* should be equal to *p*. The resulting matrix is *C*¬†‚ąą¬†*R*^(*m*¬†√ó¬†*q*). The
    elements of *C* can be expressed as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {c}_{ij}=\sum \limits_{k=1}^n{a}_{ik}{b}_{kj} \forall \kern0.5em i\kern0.5em
    \in \left\{1,2,..m\right\},\forall \kern0.5em j\kern0.5em \in \left\{1,2,..q\right\}
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equf.png)'
  prefs: []
  type: TYPE_IMG
- en: 'For example, the matrix multiplication of the two matrices *A*, *B*¬†‚ąą¬†*R*^(2¬†√ó¬†2)
    can be computed as seen here:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ A=\left[\begin{array}{cc}1&amp; 2\\ {}3&amp; 4\end{array}\right]B=\left[\begin{array}{cc}5&amp;
    6\\ {}7&amp; 8\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equg.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {c}_{11}=\left[1\space 2\right]\left[\begin{array}{c}5\\ {}7\end{array}\right]=\space
    1\times 5+2\times 7=19\space {c}_{12}=\left[1\space 2\right]\left[\begin{array}{c}6\\
    {}8\end{array}\right]=\space 1\times 6+2\times 8=22 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equh.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {c}_{21}=\left[3\kern1em 4\right]\left[\begin{array}{c}5\\ {}7\end{array}\right]=\space
    3\times 5+4\times 7=43\kern1em {c}_{22}=\left[3\space 4\right]\left[\begin{array}{c}6\\
    {}8\end{array}\right]=\space 3\times 6+4\times 8=50 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equi.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ C=\left[\begin{array}{cc}{c}_{11}&amp; {c}_{12}\\ {}{c}_{21}&amp; {c}_{22}\end{array}\right]=\left[\begin{array}{cc}19&amp;
    22\\ {}43&amp; 50\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equj.png)'
  prefs: []
  type: TYPE_IMG
- en: Transpose of a Matrix
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The transpose of a matrix *A*¬†‚ąą¬†*R*^(*m*¬†√ó¬†*n*) is generally represented by
    *A*^(*T*)¬†‚ąą¬†*R*^(*n*¬†√ó¬†*m*) and is obtained by transposing the column vectors
    as row vectors.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {a}_{ji}^{\prime }={a}_{ij}\kern1em \forall \kern0.5em i\kern0.5em \in
    \left\{1,2,..m\right\},\forall \kern0.5em j\kern0.5em \in \left\{1,2,..n\right\}
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equk.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ where {a}_{ji}^{\prime}\kern0.5em \in {A}^T\kern0.5em and\kern0.5em {a}_{ij}\kern0.5em
    \in A $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equl.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Example: ![$$ \textrm{Example}:\kern0.5em A=\left[\begin{array}{cc}1&amp; 2\\
    {}3&amp; 4\end{array}\right]\textrm{then}\kern0.5em {A}^T=\left[\begin{array}{cc}1&amp;
    3\\ {}2&amp; 4\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq5.png)'
  prefs: []
  type: TYPE_NORMAL
- en: The transpose of the product of two matrices *A* and *B* is the product of the
    transposes of matrices *A* and *B* in the reverse order; i.e., (*AB*)^(*T*)¬†=¬†*B*^(*T*)*A*^(*T*)[.]
  prefs: []
  type: TYPE_NORMAL
- en: For example, if we take two matrices ![$$ A=\left[\begin{array}{cc}19&amp; 22\\
    {}43&amp; 50\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq6.png)
    and ![$$ B=\left[\begin{array}{cc}5&amp; 6\\ {}7&amp; 8\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq7.png),
    then
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ (AB)=\left[\begin{array}{cc}19&amp; 22\\ {}43&amp; 50\end{array}\right]\left[\begin{array}{cc}5&amp;
    6\\ {}7&amp; 8\end{array}\right]=\left[\begin{array}{cc}95&amp; 132\\ {}301&amp;
    400\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq8.png)
    and hence ![$$ {(AB)}^T=\left[\begin{array}{cc}95&amp; 301\\ {}132&amp; 400\end{array}\right]
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq9.png)'
  prefs: []
  type: TYPE_IMG
- en: Now, ![$$ {A}^T=\left[\begin{array}{cc}19&amp; 43\\ {}22&amp; 50\end{array}\right]
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq10.png) and ![$$
    {B}^T=\left[\begin{array}{cc}5&amp; 7\\ {}6&amp; 8\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq11.png)
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {B}^T{A}^T=\left[\begin{array}{cc}5&amp; 7\\ {}6&amp; 8\end{array}\right]\left[\begin{array}{cc}19&amp;
    43\\ {}22&amp; 50\end{array}\right]=\left[\begin{array}{cc}95&amp; 301\\ {}132&amp;
    400\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equm.png)'
  prefs: []
  type: TYPE_IMG
- en: Hence, the equality (*AB*)^(*T*)¬†=¬†*B*^(*T*)*A*^(*T*) holds.
  prefs: []
  type: TYPE_NORMAL
- en: Dot Product of Two Vectors
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Any vector of dimension *n* can be represented as a matrix *v*¬†‚ąą¬†*R*^(*n*¬†√ó¬†1).
    Let us denote two *n*-dimensional vectors *v*[1]¬†‚ąą¬†*R*^(*n*¬†√ó¬†1) and *v*[2]¬†‚ąą¬†*R*^(*n*¬†√ó¬†1).
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {v}_1= \left[\begin{array}{c}{v}_{11}\\ {}{v}_{12}\\ {}.\\ {}.\\ {}.\\
    {}{v}_{1n}\end{array}\right]{v}_2= \left[\begin{array}{c}{v}_{21}\\ {}{v}_{22}\\
    {}.\\ {}.\\ {}.\\ {}{v}_{2n}\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equn.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The dot product of two vectors is the sum of the product of corresponding components‚ÄĒi.e.,
    components along the same dimension‚ÄĒand can be expressed as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {v}_1.{v}_2={v_1}^T{v}_2={v_2}^T{v}_1={v}_{11}{v}_{21}+{v}_{12}{v}_{22}+.\kern0.5em
    .+{v}_{1n}{v}_{2n}=\sum \limits_{k=1}^n{v}_{1k}{v}_{2k} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equo.png)'
  prefs: []
  type: TYPE_IMG
- en: ^(Example:) ![$$ {v}_1=\left[\begin{array}{c}1\\ {}2\\ {}3\end{array}\right]{v}_2=\left[\begin{array}{c}3\\
    {}5\\ {}-1\end{array}\right]{v}_1.{v}_2= {v_1}^T{v}_2=1\times 3+2\times 5-3\times
    1=10 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq12.png)
  prefs: []
  type: TYPE_NORMAL
- en: Matrix Working on a Vector
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'When a matrix is multiplied by a vector, the result is another vector. Let‚Äôs
    say *A*¬†‚ąą¬†*R*^(*m*¬†√ó¬†*n*) is multiplied by the vector *x*¬†‚ąą¬†*R*^(*n*¬†√ó¬†1). The
    result would produce a vector *b*¬†‚ąą¬†*R*^(*m*¬†√ó¬†1):'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ A=\left[\begin{array}{c}{c}_1^{(1)}{c}_1^{(2)}\dots .\kern0.5em {c}_1^{(n)}\\
    {}{c}_2^{(1)}{c}_2^{(2)}\dots .\kern0.5em {c}_2^{(n)}\\ {}.\\ {}.\\ {}.\\ {}{c}_m^{(1)}{c}_m^{(2)}\dots
    .\kern0.5em {c}_m^{(n)}\end{array}\right]x=\left[\begin{array}{c}{x}_1\\ {}{x}_2\\
    {}.\\ {}.\\ {}.\\ {}{x}_n\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equp.png)'
  prefs: []
  type: TYPE_IMG
- en: '*A* consists of *n* column vectors *c*^((*i*))¬†‚ąą¬†*R*^(*m*¬†√ó¬†1)‚ÄÉ¬†‚ąÄ¬†*i*¬†‚ąą¬†{1,
    2, ‚Ä¶, *n*}.'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ A=\left[{c}^{(1)}{c}^{(2)}{c}^{(3)}\dots .\kern0.5em {c}^{(n)}\right]
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equq.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ b= Ax=\left[{c}^{(1)}{c}^{(2)}{c}^{(3)}\dots .\kern0.5em {c}^{(n)}\right]\left[\begin{array}{c}{x}_1\\
    {}{x}_2\\ {}.\\ {}.\\ {}.\\ {}{x}_n\end{array}\right]={x}_1{c}^{(1)}+{x}_2{c}^{(2)}+\dots
    ..+{x}_n{c}^{(n)} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equr.png)'
  prefs: []
  type: TYPE_IMG
- en: As we can see, the product is nothing but the linear combination of the column
    vectors of matrix *A*, with the components of vector *x* being the linear coefficients.
  prefs: []
  type: TYPE_NORMAL
- en: The new vector *b* formed through the multiplication has the same dimension
    as that of the column vectors of *A* and stays in the same column space. This
    is such a beautiful fact; no matter how we combine the column vectors, we can
    never leave the space spanned by the column vectors.
  prefs: []
  type: TYPE_NORMAL
- en: Now, let‚Äôs work on an example.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ A=\left[\begin{array}{ccc}1&amp; 2&amp; 3\\ {}4&amp; 5&amp; 6\end{array}\right]x=\left[\begin{array}{c}2\\
    {}2\\ {}3\end{array}\right] b= Ax=2\left[\begin{array}{c}1\\ {}4\end{array}\right]+2\left[\begin{array}{c}2\\
    {}5\end{array}\right]+3\left[\begin{array}{c}3\\ {}6\end{array}\right]=\left[\begin{array}{c}15\\
    {}36\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equs.png)'
  prefs: []
  type: TYPE_IMG
- en: We can see both the column vectors of *A* and *b*¬†‚ąą¬†*R*^(2¬†√ó¬†1).
  prefs: []
  type: TYPE_NORMAL
- en: Linear Independence of Vectors
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A vector is said to be linearly dependent on other vectors if it can be expressed
    as the linear combination of other vectors.
  prefs: []
  type: TYPE_NORMAL
- en: If *v*[1]¬†=¬†5*v*[2]¬†+¬†7*v*[3], then *v*[1],¬†*v*[2,] and *v*[3] are not linearly
    independent since at least one of them can be expressed as the sum of other vectors.
    In general, a set of *n* vectors *v*[1], *v*[2], . . , *v*[*n*] where *v*[*i*]¬†‚ąą¬†*R*^(*m*¬†√ó¬†1)¬†‚ąÄ¬†*i*¬†‚ąą¬†{1,
    2, .. *n*} is said to be linearly independent if and only if *a*[1]*v*[1]¬†+¬†*a*[2]*v*[2]¬†+¬†*a*[3]*v*[3]¬†+¬†.‚Äā.‚Äā.¬†+¬†*a*[*n*]*v*[*n*]¬†=¬†0
    implies each of *a*[*i*]¬†=¬†0‚ÄÉ¬†‚ąÄ‚Äā*i*¬†‚ąą¬†{1, 2, ‚Ä¶*n*}.
  prefs: []
  type: TYPE_NORMAL
- en: If *a*[1]*v*[1]¬†+¬†*a*[2]*v*[2]¬†+¬†*a*[3]*v*[3]¬†+¬†.‚Äā.‚Äā.¬†+¬†*a*[*n*]*v*[*n*]¬†=¬†0
    and not all *a*[*i*]¬†=¬†0, then the vectors are not linearly independent.
  prefs: []
  type: TYPE_NORMAL
- en: Given a set of vectors, the following method can be used to check whether they
    are linearly independent or not.
  prefs: []
  type: TYPE_NORMAL
- en: '*a*[1]*v*[1]¬†+¬†*a*[2]*v*[2]¬†+¬†*a*[3]*v*[3]¬†+¬†.‚Äā.‚Äā.¬†+¬†*a*[*n*]*v*[*n*] = 0 can
    be written as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \left[{v}_1\ {v}_2\dots {v}_n\right]\left[\begin{array}{c}{a}_1\\ {}.\\
    {}{a}_n\end{array}\right]=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equt.png)'
  prefs: []
  type: TYPE_IMG
- en: Solving for [*a*[1] *a*[2] .... *a*[*n*]]^(*T*), if the only solution we get
    is the zero vector, then the set of vectors *v*[1],*v*[2],‚Ä¶. *v*[*n*] is said
    to be linearly independent.
  prefs: []
  type: TYPE_NORMAL
- en: If a set of *n* vectors *v*[*i*]¬†‚ąą¬†*R*^(*n*¬†√ó¬†1) is linearly independent, then
    those vectors span the whole *n*-dimensional space. In other words, by taking
    linear combinations of the *n* vectors, one can produce all possible vectors in
    the *n*-dimensional space. If the *n* vectors are not linearly independent, they
    span only a subspace within the *n*-dimensional space.
  prefs: []
  type: TYPE_NORMAL
- en: To illustrate this fact, let us take vectors in three-dimensional space, as
    illustrated in Figure [1-5](#Fig6).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A rectangular 2 D structure on the 3 D vector space, with three vectors of v
    1, v 2 and v 3\. The product of v 1 and v 2 is a 1 v 1 + a 2 v 2, which forms
    a parallelogram.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-5
  prefs: []
  type: TYPE_NORMAL
- en: A two-dimensional subspace spanned by v[1] and v[2] in a three-dimensional vector
    space
  prefs: []
  type: TYPE_NORMAL
- en: If we have a vector *v*[1]¬†=¬†[1‚Äā2‚Äā3]^(*T*), we can span only one dimension in
    the three-dimensional space because all the vectors that can be formed with this
    vector would have the same direction as that of *v*[1], with the magnitude being
    determined by the scaler multiplier. In other words, each vector would be of the
    form *a*[1]*v*[1].
  prefs: []
  type: TYPE_NORMAL
- en: Now, let‚Äôs take another vector *v*[2]¬†=¬†[‚Äā5‚Äā9‚Äā7‚Äā]^(*T*), whose direction is
    not the same as that of *v*[1]. So, the span of the two vectors *Span*(*v*[1],¬†*v*[2])
    is nothing but the linear combination of *v*[1] and *v*[2]. With these two vectors,
    we can form any vector of the form *av*[1]¬†+¬†*bv*[2] that lies in the plane of
    the two vectors. Basically, we will span a two-dimensional subspace within the
    three-dimensional space. The same is illustrated in the following diagram.
  prefs: []
  type: TYPE_NORMAL
- en: Let‚Äôs us add another vector *v*[3]¬†=¬†[‚Äā4‚Äā8‚Äā1]^(*T*) to our vector set. Now,
    if we consider the *Span*(*v*[1],¬†*v*[2,]*v*[3]), we can form any vector in the
    three-dimensional plane. You take any three-dimensional vector you wish, and it
    can be expressed as a linear combination of the preceding three vectors.
  prefs: []
  type: TYPE_NORMAL
- en: These three vectors form a basis for the three-dimensional space. Any three
    linearly independent vectors would form a basis for the three-dimensional space.
    The same can be generalized for any *n*-dimensional space.
  prefs: []
  type: TYPE_NORMAL
- en: If we had taken a vector *v*[3], which is a linear combination of *v*[1] and
    *v*[2], then it wouldn‚Äôt have been possible to span the whole three-dimensional
    space. We would have been confined to the two-dimensional subspace spanned by
    *v*[1] and *v*[2].
  prefs: []
  type: TYPE_NORMAL
- en: Rank of a Matrix
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: One of the most important concepts in linear algebra is the rank of a matrix.
    The rank of a matrix is the number of linearly independent column vectors or row
    vectors. The number of independent column vectors would always be equal to the
    number of independent row vectors for a matrix.
  prefs: []
  type: TYPE_NORMAL
- en: 'Example: Consider the matrix ![$$ A=\left[\begin{array}{ccc}1&amp; 3&amp; 4\\
    {}2&amp; 5&amp; 7\\ {}3&amp; 7&amp; 10\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq13.png)'
  prefs: []
  type: TYPE_NORMAL
- en: The column vectors ![$$ \left[\begin{array}{c}1\\ {}2\\ {}3\end{array}\right]
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq14.png) and ![$$
    \left[\begin{array}{c}3\\ {}5\\ {}7\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq15.png)
    are linearly independent. However, ![$$ \left[\begin{array}{c}4\\ {}7\\ {}10\end{array}\right]
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq16.png) is not
    linearly independent [since it‚Äôs the linear combination of the other two column
    vectors; i.e.,] ![$$ \left[\begin{array}{c}4\\ {}7\\ {}10\end{array}\right]=\left[\begin{array}{c}1\\
    {}2\\ {}3\end{array}\right]+\left[\begin{array}{c}3\\ {}5\\ {}7\end{array}\right]
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq17.png)[. Hence,
    the rank of] the matrix is 2 since it has two linearly independent column vectors.
  prefs: []
  type: TYPE_NORMAL
- en: As the rank of the matrix is 2, the column vectors of the matrix can span only
    a two-dimensional subspace inside the three-dimensional vector space. The two-dimensional
    subspace is the one that can be formed by taking the linear combination of ![$$
    \left[\begin{array}{c}1\\ {}2\\ {}3\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq18.png)
    and ![$$ \left[\begin{array}{c}3\\ {}5\\ {}7\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq19.png).
  prefs: []
  type: TYPE_NORMAL
- en: 'The following are a few important notes:'
  prefs: []
  type: TYPE_NORMAL
- en: A square matrix *A*¬†‚ąą¬†*R*^(*n*¬†√ó¬†*n*) is said to be full rank if the rank of
    A is *n*. A square matrix of rank *n* implies that all the *n* column vectors
    and even the *n* row vectors for that matter are linearly independent, and hence
    it would be possible to span the whole *n*-dimensional space by taking the linear
    combination of the *n* column vectors of the matrix *A*.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If a square matrix *A*¬†‚ąą¬†*R*^(*n*¬†√ó¬†*n*) is not full rank, then it is a singular
    matrix; i.e., all its column vectors or row vectors are not linearly independent.
    A singular matrix has an undefined matrix inverse and zero determinant.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Identity Matrix or Operator
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A matrix *I*¬†‚ąą¬†*R*^(*n*¬†√ó¬†*n*) is said to be an identity matrix or operator
    if any vector or matrix when multiplied by *I* remains unchanged. A 3¬†√ó¬†3 identity
    matrix is given by
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ I=\left[\begin{array}{ccc}1&amp; 0&amp; 0\\ {}0&amp; 1&amp; 0\\ {}0&amp;
    0&amp; 1\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equu.png)'
  prefs: []
  type: TYPE_IMG
- en: Let‚Äôs say we take the vector *v*¬†=¬†[2‚Äā3‚Äā4]^(*T*)
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Iv=\left[\begin{array}{ccc}1&amp; 0&amp; 0\\ {}0&amp; 1&amp; 0\\ {}0&amp;
    0&amp; 1\end{array}\right]\left[\begin{array}{c}2\\ {}3\\ {}4\end{array}\right]=\left[\begin{array}{c}2\\
    {}3\\ {}4\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equv.png)'
  prefs: []
  type: TYPE_IMG
- en: Similarly, let‚Äôs say we have a matrix ![$$ A=\left[\begin{array}{ccc}1&amp;
    2&amp; 3\\ {}4&amp; 5&amp; 6\\ {}7&amp; 8&amp; 9\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq20.png)
  prefs: []
  type: TYPE_NORMAL
- en: The matrices *AI* and *IA* are both equal to matrix *A*. Hence, the matrix multiplication
    is commutative when one of the matrices is an identity matrix.
  prefs: []
  type: TYPE_NORMAL
- en: Determinant of a Matrix
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'A determinant of a square matrix *A* is a number and is denoted by *det*(*A*).
    It can be interpreted in several ways. For a matrix *A*¬†‚ąą¬†*R*^(*n*¬†√ó¬†*n*), the
    determinant denotes the *n*-dimensional volume enclosed by the *n* row vectors
    of the matrix. For the determinant to be nonzero, all the column vectors or the
    row vectors of *A* should be linearly independent. If the *n* row vectors or column
    vectors are not linearly independent, then they don‚Äôt span the whole *n*-dimensional
    space, but rather a subspace of dimension less than *n*, and hence the *n*-dimensional
    volume is zero. For a matrix *A*¬†‚ąą¬†*R*^(2¬†√ó¬†2), the determinant is expressed as
    follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ A=\left[\begin{array}{cc}{a}_{11}&amp; {a}_{12}\\ {}{a}_{21}&amp; {a}_{22}\end{array}\right]\in
    {R}^{2\times 2} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equw.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ \mathit{\det}(A)=\left|\begin{array}{cc}{a}_{11}&amp; {a}_{12}\\ {}{a}_{21}&amp;
    {a}_{22}\end{array}\right|={a}_{11}{a}_{22}-{a}_{12}{a}_{21} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equx.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Similarly, for a matrix *B*¬†‚ąą¬†*R*^(3¬†√ó¬†3), the determinant of the matrix is
    given by the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ B=\left[\begin{array}{ccc}{a}_{11}&amp; {a}_{12}&amp; {a}_{13}\\ {}{a}_{21}&amp;
    {a}_{22}&amp; {a}_{23}\\ {}{a}_{31}&amp; {a}_{32}&amp; {a}_{33}\end{array}\right]\kern0.5em
    \in \kern0.5em {{\mathbb{R}}}^{3\times 3} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equy.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ B\in \left[\begin{array}{ccc}{a}_{11}&amp; {a}_{12}&amp; {a}_{13}\\ {}{a}_{21}&amp;
    {a}_{22}&amp; {a}_{23}\\ {}{a}_{31}&amp; {a}_{32}&amp; {a}_{33}\end{array}\right]\in
    {R}^{3\times 3} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equz.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ \mathit{\det}(B)={a}_{11}\left|\begin{array}{cc}{a}_{22}&amp; {a}_{23}\\
    {}{a}_{32}&amp; {a}_{33}\end{array}\right|-{a}_{12}\left|\begin{array}{cc}{a}_{21}&amp;
    {a}_{23}\\ {}{a}_{31}&amp; {a}_{33}\end{array}\right|+{a}_{13}\left|\begin{array}{cc}{a}_{21}&amp;
    {a}_{22}\\ {}{a}_{31}&amp; {a}_{32}\end{array}\right| $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equaa.png)'
  prefs: []
  type: TYPE_IMG
- en: where ![$$ \mathit{\det}(B)={a}_{11}\left|\begin{array}{cc}{a}_{22}&amp; {a}_{23}\\
    {}{a}_{32}&amp; {a}_{33}\end{array}\right|-{a}_{12}\left|\begin{array}{cc}{a}_{21}&amp;
    {a}_{23}\\ {}{a}_{31}&amp; {a}_{33}\end{array}\right|+{a}_{13}\left|\begin{array}{cc}{a}_{21}&amp;
    {a}_{22}\\ {}{a}_{31}&amp; {a}_{32}\end{array}\right| $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq21.png)
  prefs: []
  type: TYPE_NORMAL
- en: 'The method for determinant computation can be generalized to matrices in *R*^(*n*¬†√ó¬†*n*).
    Treating *B* as an *n*-dimensional matrix, its determinant can be expressed as
    follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \mathit{\det}(B)=\left[\begin{array}{ccc}{a}_{11}\times &amp; &amp; \\
    {}&amp; {a}_{22}&amp; {a}_{23}\\ {}&amp; {a}_{32}&amp; {a}_{33}\end{array}\right]-\left[\begin{array}{ccc}&amp;
    {a}_{12\times }&amp; \\ {}{a}_{21}&amp; &amp; {a}_{23}\\ {}{a}_{31}&amp; &amp;
    {a}_{33}\end{array}\right]+\left[\begin{array}{ccc}&amp; &amp; {a}_{13 \times}\\
    {}{a}_{21}&amp; {a}_{22}&amp; \\ {}{a}_{31}&amp; {a}_{32}&amp; \end{array}\right]
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equab.png)'
  prefs: []
  type: TYPE_IMG
- en: 'For example, the determinant of the matrix ![$$ A=\left[\begin{array}{ccc}6&amp;
    1&amp; 1\\ {}4&amp; -2&amp; 5\\ {}2&amp; 8&amp; 7\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq22.png)
    can be computed as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\displaystyle \begin{array}{l}\mathit{\det}(A)=\left[\begin{array}{ccc}6\times
    &amp; &amp; \\ {}&amp; -2&amp; 5\\ {}&amp; 8&amp; 7\end{array}\right]-\left[\begin{array}{ccc}&amp;
    1\times &amp; \\ {}4&amp; &amp; 5\\ {}2&amp; &amp; 7\end{array}\right]+\left[\begin{array}{ccc}&amp;
    &amp; 1\times \\ {}4&amp; -2&amp; \\ {}2&amp; 8&amp; \end{array}\right]\\ {} \operatorname{}=6\times
    \left|\begin{array}{cc}-2&amp; 5\\ {}8&amp; 7\end{array}\right|-1\times \left|\begin{array}{cc}4&amp;
    5\\ {}2&amp; 7\end{array}\right|+1\times \left|\begin{array}{cc}4&amp; -2\\ {}2&amp;
    8\end{array}\right|=6\left(-14-40\right)-1\left(28-10\right)+1\left(32+4\right)\\
    {}\operatorname{}=6\times \left(-54\right)-1(18)+36=-306\end{array}} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equac.png)'
  prefs: []
  type: TYPE_IMG
- en: Interpretation of Determinant
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: As stated earlier, the absolute value of the determinant of a matrix determines
    the volume enclosed by the row vectors acting as edges.
  prefs: []
  type: TYPE_NORMAL
- en: For a matrix *A*¬†‚ąą¬†*R*^(2¬†√ó¬†2), it denotes the area of the parallelogram with
    the two-row vector acting as edges.
  prefs: []
  type: TYPE_NORMAL
- en: For a matrix ![$$ A=\left[\begin{array}{cc}a&amp; b\\ {}c&amp; d\end{array}\right]
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq23.png), the
    *det*(*A*) is equal to the area of the parallelogram with vectors *u*¬†=¬†[*a‚Äāb*]^(*T*)
    and *v*¬†=¬†[‚Äā*c‚Äād*]^(*T*) as edges.
  prefs: []
  type: TYPE_NORMAL
- en: Area of the parallelogram = |*u*||*v*|¬†`sin`¬†*őł* where *őł* is the angle between
    *u* and *v* (see Figure [1-6](#Fig7)).
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ =\sqrt{a^2+{b}^2}\sqrt{c^2+{d}^2}\frac{\left( ad- bc\right)}{\sqrt{a^2+{b}^2}\sqrt{c^2+{d}^2}}=\left(
    ad- bc\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equad.png)'
  prefs: []
  type: TYPE_IMG
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The 2 D plane displays the parallelogram formed by two vectors of u and v, with
    a theta angle.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-6
  prefs: []
  type: TYPE_NORMAL
- en: Parallelogram formed by two vectors
  prefs: []
  type: TYPE_NORMAL
- en: Similarly, for a matrix *B*¬†‚ąą¬†*R*^(3¬†√ó¬†3), the determinant is the volume of
    the parallelepiped with the three-row vectors as edges.
  prefs: []
  type: TYPE_NORMAL
- en: Inverse of a Matrix
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: An inverse of a square matrix *A*¬†‚ąą¬†*R*^(*n*¬†√ó¬†*n*) is denoted by *A*^(‚ąí1) and
    produces the identity matrix *I*¬†‚ąą¬†*R*^(*n*¬†√ó¬†*n*) when multiplied by *A*.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {AA}^{-1}={A}^{-1}A=I $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equae.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Not all square matrices have inverses for *A*. The formula for computing the
    inverse of *A* is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {A}^{-1}=\frac{adjoint(A)}{\det (A)}=\frac{{\left( cofactor\kern0.5em
    matrix\kern0.5em of\kern0.5em A\right)}^T}{\det (A)} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equaf.png)'
  prefs: []
  type: TYPE_IMG
- en: If a square matrix *A*¬†‚ąą¬†*R*^(*n*¬†√ó¬†*n*) is singular‚ÄĒi.e., if *A* doesn‚Äôt have
    *n* independent column or row vectors‚ÄĒthen the inverse of *A* doesn‚Äôt exist. This
    is because for a singular matrix *det*(*A*)¬†=¬†0 and hence the inverse becomes
    undefined.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ A=\left[\begin{array}{ccc}a&amp; b&amp; c\\ {}d&amp; e&amp; f\\ {}g&amp;
    h&amp; i\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equag.png)'
  prefs: []
  type: TYPE_IMG
- en: Let the elements of *A* be represented by *a*[*ij*], where *i* represents the
    row number and *j* the column number for an element.
  prefs: []
  type: TYPE_NORMAL
- en: Then, the cofactor for *a*[*ij*]¬†=¬†(‚ąí1)^(*i*¬†+¬†*j*)*d*[*ij*], where *d*[*ij*]
    is the determinant of the matrix formed by deleting the row *i* and the column
    *j* from A.
  prefs: []
  type: TYPE_NORMAL
- en: The cofactor for the element ![$$ a={\left(-1\right)}^{1+1}\left|\begin{array}{cc}e&amp;
    f\\ {}h&amp; i\end{array}\right|= ei- fh $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq24.png).
  prefs: []
  type: TYPE_NORMAL
- en: Similarly, the cofactor for element ![$$ b={\left(-1\right)}^{1+2}\left|\begin{array}{cc}d&amp;
    f\\ {}g&amp; i\end{array}\right|=-\left( di- fg\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq25.png).
  prefs: []
  type: TYPE_NORMAL
- en: Once the cofactor matrix is formed, the transpose of the cofactor matrix would
    give us *adjoint*(*A*). The *adjoint*(*A*) divided by the *det*(*A*) gives *A*^(‚ąí1).
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, the inverse matrix of ![$$ A=\left[\begin{array}{cc}4&amp; 3\\
    {}3&amp; 2\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq26.png)
    can be computed as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: Cofactor matrix of ![$$ A=\left[\begin{array}{cc}1(2)&amp; -1(3)\\ {}-1(3)&amp;
    1(4)\end{array}\right]=\left[\begin{array}{cc}2&amp; -3\\ {}-3&amp; 4\end{array}\right]
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq27.png)
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \mathit{\det}(A)=\left|\begin{array}{cc}4&amp; 3\\ {}3&amp; 2\end{array}\right|=8-9=-1
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq28.png) Therefore,
    ![$$ {A}^{-1}=\frac{{\left( cofactor\kern0.5em matrix\kern0.5em of\kern0.5em A\right)}^T}{\det
    (A)}= \frac{{\left[\begin{array}{cc}2&amp; -3\\ {}-3&amp; 4\end{array}\right]}^T}{-1}=\left[\begin{array}{cc}-2&amp;
    3\\ {}3&amp; -4\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq29.png).'
  prefs: []
  type: TYPE_NORMAL
- en: 'The following are a few rules for inverses of a matrix:'
  prefs: []
  type: TYPE_NORMAL
- en: (*AB*)^(‚ąí1)¬†=¬†*B*^(‚ąí1)*A*^(‚ąí1)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*I*^(‚ąí1)¬†=¬†*I*, where *I* is the identity matrix.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Norm of a Vector
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The norm of a vector is a measure of its magnitude. There are several kinds
    of such norms. The most familiar is the Euclidean norm, defined next. It is also
    known as the *l*¬≤ norm.
  prefs: []
  type: TYPE_NORMAL
- en: 'For a vector *x*¬†‚ąą¬†*R*^(*n*¬†√ó¬†1), the *l*¬≤ norm is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \left\Vert {x}_2\right\Vert {\left({\left|{x}_1\right|}^2+{\left|{x}_2\right|}^2+\dots
    +{\left|{x}_n\right|}^2\kern0.5em \right)}^{1/2}={(x.x)}^{1/2}={\left({x}^Tx\right)}^{1/2}
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equah.png)'
  prefs: []
  type: TYPE_IMG
- en: Similarly, the *l*¬Ļ norm is the sum of the absolute values of the vector components.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\left\Vert x\right\Vert}_1=\left|{x}_1\left|+\right|{x}_2\left|+\dots
    +\right|{x}_n\right| $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equai.png)'
  prefs: []
  type: TYPE_IMG
- en: 'In general, the *l*^(*p*) norm of a vector can be defined as follows when 1
    < p < ‚ąě:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\left({\left|{x}_1\right|}^p+{\left|{x}_2\right|}^p+\dots +{\left|{x}_n\right|}^p\kern0.5em
    \right)}^{1/p} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equaj.png)'
  prefs: []
  type: TYPE_IMG
- en: 'When *p*‚Äā¬†‚Üí‚Äā‚ąě then the norm is called Supremum norm and is defined as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \underset{p\to \infty }{\lim}\left\Vert {x}_p\right\Vert =\underset{p\to
    \infty }{\lim }{\left({\left|{x}_1\right|}^p+{\left|{x}_2\right|}^p+\dots +{\left|{x}_n\right|}^p\kern0.5em
    \right)}^{1/p} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equak.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ =\mathit{\max}\left({x}_1,{x}_2,\kern0.5em .\dots, {x}_n\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equal.png)'
  prefs: []
  type: TYPE_IMG
- en: In Figure [1-7](#Fig8), the unit norm curves have been plotted for *l*¬Ļ,¬†*l*¬≤
    and Supremum norm.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Three quadrants represent a rhombus for modulus of x 1 equals 1, a circle for
    modulus of x 2 equals 1, and a square for modulus of x infinite equals 1\. All
    with their centers on the neutral axis.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-7
  prefs: []
  type: TYPE_NORMAL
- en: Unit l¬Ļ,l¬≤ and Supremum norms of vectors *R*^(2¬†√ó¬†1)
  prefs: []
  type: TYPE_NORMAL
- en: Generally, for machine learning, we use both *l*¬≤ and *l*¬Ļ norms for several
    purposes. For instance, the least square cost function that we use in linear regression
    is the *l*¬≤ norm of the error vector; i.e., the difference between the actual
    target-value vector and the predicted target-value vector. Similarly, very often
    we would have to use regularization for our model, with the result that the model
    doesn‚Äôt fit the training data very well and fails to generalize to new data. To
    achieve regularization, we generally add the square of either the *l*¬≤ norm or
    the *l*¬Ļ norm of the parameter vector for the model as a penalty in the cost function
    for the model. When the *l*¬≤ norm of the parameter vector is used for regularization,
    it is generally known as Ridge regularization, whereas when the *l*¬Ļ norm is used
    instead, it is known as Lasso regularization.
  prefs: []
  type: TYPE_NORMAL
- en: Pseudo-Inverse of a Matrix
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If we have a problem *Ax*¬†=¬†*b* where *A*¬†‚ąą¬†*R*^(*n*¬†√ó¬†*n*) and *b*¬†‚ąą¬†*R*^(*n*¬†√ó¬†1)
    are provided and we are required to solve for *x*¬†‚ąą¬†*R*^(*n*¬†√ó¬†1), we can solve
    for *x* as *x*¬†=¬†*A*^(‚ąí1)*b* provided *A* is not singular and its inverse exists.
  prefs: []
  type: TYPE_NORMAL
- en: However, if *A*¬†‚ąą¬†*R*^(*m*¬†√ó¬†*n*)‚ÄĒi.e., if *A* is a rectangular matrix and *m*¬†>¬†*n*‚ÄĒthen
    *A*^(‚ąí1) doesn‚Äôt exist, and hence we can‚Äôt solve for *x* by the preceding approach.
    In such cases, we can get an optimal solution, as *x*^‚ąó¬†=¬†(*A*^(*T*)*A*)^(‚ąí1)*A*^(*T*)*b*.
    The matrix (*A*^(*T*)*A*)^(‚ąí1)*A*^(*T*) is called the pseudo-inverse since it
    acts as an inverse to provide the optimal solution. This pseudo-inverse would
    come up in least square techniques, such as linear regression.
  prefs: []
  type: TYPE_NORMAL
- en: Unit Vector in the Direction of a Specific Vector
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Unit vector in the direction of the specific vector is the vector divided by
    its magnitude or norm. For a Euclidian space, also called an *l*¬≤ space, the unit
    vector in the direction of the vector *x*¬†=¬†[3‚Äā4]^(*T*) is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{x}{{\left\Vert x\right\Vert}_2}=\frac{x}{{\left({x}^Tx\right)}^{1/2}}=\frac{{\left[3\kern0.5em
    4\right]}^T}{5}={\left[0.6\kern0.5em 0.8\right]}^T $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equam.png)'
  prefs: []
  type: TYPE_IMG
- en: Projection of a Vector in the Direction of Another Vector
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Projection of a vector *v*[1] in the direction of *v*[2] is the dot product
    of *v*[1] with the unit vector in the direction of *v*[2].‚ÄĖ*v*[12]‚ÄĖ¬†=¬†*v*[1]^(*T*)*u*[2],
    where ‚ÄĖ*v*[12]‚ÄĖ is the projection of *v*[1] onto *v*[2] and *u*[2] is the unit
    vector in the direction of *v*[2].
  prefs: []
  type: TYPE_NORMAL
- en: Since ![$$ {u}_2=\frac{v_2}{v_{22}} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq30.png)
    as per the definition of a unit vector, the projection can also be expressed as
    ‚ÄĖ*v*[12]‚ÄĖ¬†=¬†*v*[1]^(*T*)*u*[2] = ![$$ {v_1}^T\frac{v_2}{v_{22}}={v_1}^T\frac{v_2}{{\left({v_2}^T{v}_2\right)}^{1/2}}
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq31.png)
  prefs: []
  type: TYPE_NORMAL
- en: For example, the projection of the vector [1 1]^(*T*) in the direction of vector
    [3 4]^(*T*) is the dot product of [1 1]^(*T*) with the unit vector in the direction
    of [3 4]^(*T*), i.e., [0.6 0.8]^(*T*) as computed earlier.
  prefs: []
  type: TYPE_NORMAL
- en: The required projection = ![$$ {\left[1\kern0.5em 1\right]}^T\left[\begin{array}{c}0.6\\
    {}0.8\end{array}\right]=1\times 0.6+1\times 0.8=1.4 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq32.png).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A representation of the vectors v 1 and v 2 with the theta angle and origin
    point O. A perpendicular dotted line projected onto v 2 from v 1\. The formula
    to calculate the magnitude of O A is given.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-8
  prefs: []
  type: TYPE_NORMAL
- en: The length of the projection of the vector v[1] onto v[2]
  prefs: []
  type: TYPE_NORMAL
- en: In Figure [1-8](#Fig9), the length of the line segment *OA* gives the length
    of the projection of the vector *v*[1] onto *v*[2].
  prefs: []
  type: TYPE_NORMAL
- en: Eigen Vectors
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Here we come to one of the most important concepts in linear algebra‚ÄĒEigen vectors
    and Eigen values. Eigen values and Eigen vectors come up in several areas of machine
    learning. For example, the principal components in principal-component analysis
    are the Eigen vectors of the covariance matrix, while the Eigen values are the
    covariances along the principal components. Similarly, in Google‚Äôs page-rank algorithm,
    the vector of the page-rank score is nothing but an Eigen vector of the page transition-probability
    matrix corresponding to the Eigen value of 1.
  prefs: []
  type: TYPE_NORMAL
- en: A matrix works on a vector as an operator. The operation of the matrix on the
    vector is to transform the vector into another vector whose dimensions might or
    might not be same as the original vector based on the matrix dimension.
  prefs: []
  type: TYPE_NORMAL
- en: 'When a matrix *A*¬†‚ąą¬†*R*^(*n*¬†√ó¬†*n*) works on a vector *x*¬†‚ąą¬†*R*^(*n*¬†√ó¬†1),
    we again get back a vector *Ax*¬†‚ąą¬†*R*^(*n*¬†√ó¬†1). Generally, the magnitude as well
    as the direction of the new vector is different from that of the original vector.
    If in such a scenario the newly generated vector has the same direction or exactly
    the opposite direction as that of the original vector, then any vector in such
    a direction is called an Eigen vector. The magnitude by which the vector gets
    stretched is called the Eigen value (see Figure [1-9](#Fig10)):'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Ax=\lambda x $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equan.png)'
  prefs: []
  type: TYPE_IMG
- en: where *A* is the matrix operator operating on the vector *v* by multiplication,
    which is also the Eigen vector, and *őĽ* is the Eigen value.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig11_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Two photos of Mona Lisa, one in a straight position and the other is slightly
    tilted.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-10
  prefs: []
  type: TYPE_NORMAL
- en: The famous Mona Lisa image has a transformation applied to the vector space
    of pixel location
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The two-dimensional plane of x 2 versus x 1 represents vector x and its eigenvectors,
    eigenvalues, and characteristic equations.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-9
  prefs: []
  type: TYPE_NORMAL
- en: Eigen vector unaffected by the matrix transformation A
  prefs: []
  type: TYPE_NORMAL
- en: As we can see from Figure [1-10](#Fig11), the pixels along the horizontal axis
    represented by a vector have changed direction when a transformation to the image
    space is applied, while the pixel vector along the horizontal direction hasn‚Äôt
    changed direction. Hence, the pixel vector along the horizontal axis is an Eigen
    vector to the matrix transformation being applied to the *Mona Lisa* image.
  prefs: []
  type: TYPE_NORMAL
- en: Characteristic Equation of a Matrix
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The roots of the characteristic equation of a matrix *A*¬†‚ąą¬†*R*^(*n*¬†√ó¬†*n*) give
    us the Eigen values of the matrix. There would be *n* Eigen values corresponding
    to *n* Eigen vectors for a square matrix of order *n*.
  prefs: []
  type: TYPE_NORMAL
- en: 'For an Eigen vector *v*¬†‚ąą¬†*R*^(*n*¬†√ó¬†1) corresponding to an Eigen value of
    *őĽ*, we have the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Av=\lambda v $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equao.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ =&gt;\left(A-\lambda I\right)v=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equap.png)'
  prefs: []
  type: TYPE_IMG
- en: Now, *v* being an Eigen vector is nonzero, and hence (*A*¬†‚ąí¬†*őĽI*) must be singular
    for the preceding to hold true.
  prefs: []
  type: TYPE_NORMAL
- en: For (*A*¬†‚ąí¬†*őĽI*) to be singular, *det*(*A*¬†‚ąí¬†*őĽI*) = 0, which is the characteristic
    equation for matrix *A*. The roots of the characteristic equation give us the
    Eigen values. Substituting the Eigen values in the *Av*¬†=¬†*őĽv* equation and then
    solving for *v* gives the Eigen vector corresponding to the Eigen value.
  prefs: []
  type: TYPE_NORMAL
- en: For example, the Eigen values and Eigen vectors of the matrix
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ A=\left[\begin{array}{cc}0&amp; 1\\ {}-2&amp; -3\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equaq.png)'
  prefs: []
  type: TYPE_IMG
- en: can be computed as seen next.
  prefs: []
  type: TYPE_NORMAL
- en: The characteristic equation for the matrix *A* is det(*A*¬†‚ąí¬†*őĽI*)¬†=¬†0.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \left|\begin{array}{cc}-\lambda &amp; 1\\ {}-2&amp; -3-\lambda \end{array}\right|=0\kern1em
    =&gt;{\lambda}^2+3\lambda +2=0=&gt;\lambda =-2,-1 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equar.png)'
  prefs: []
  type: TYPE_IMG
- en: The two Eigen values are ‚ąí2 and ‚ąí1.
  prefs: []
  type: TYPE_NORMAL
- en: Let the Eigen vector corresponding to the Eigen value of ‚ąí2 be *u*¬†=¬†[*a‚Äāb*]^(*T*).
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \left[\begin{array}{cc}0&amp; 1\\ {}-2&amp; -3\end{array}\right]\left[\begin{array}{c}a\\
    {}b\end{array}\right]=-2\left[\begin{array}{c}a\\ {}b\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equas.png)'
  prefs: []
  type: TYPE_IMG
- en: 'This gives us the following two equations:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ 0a+1b=-2a =&gt;2a+b=0\kern1em -\kern1em (1) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equat.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ -2a-3b=-2b =&gt;2a+b=0 -\kern1em (2) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equau.png)'
  prefs: []
  type: TYPE_IMG
- en: Both the equations are the same; i.e., ![$$ 2a+b=0=&gt;\frac{a}{b}=\frac{1}{-2}
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq33.png).
  prefs: []
  type: TYPE_NORMAL
- en: Let *a*¬†=¬†*k*[1] and *b*¬†=¬†¬†‚ąí¬†2*k*[1], where *k*[1] is a constant.
  prefs: []
  type: TYPE_NORMAL
- en: Therefore, the Eigen vector corresponding to the Eigen value -2 is ![$$ u={k}_1\left[\begin{array}{c}1\\
    {}-2\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq34.png).
  prefs: []
  type: TYPE_NORMAL
- en: Using the same process, the Eigen vector *v* corresponding to the Eigen value
    of ‚ąí1 is ![$$ v={k}_2\left[\begin{array}{c}1\\ {}-1\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq35.png).
  prefs: []
  type: TYPE_NORMAL
- en: One thing to note is that Eigen vectors and Eigen values are always related
    to a specific operator (in the preceding case, matrix *A* is the operator) working
    on a vector space. Eigen values and Eigen vectors are not specific to any vector
    space.
  prefs: []
  type: TYPE_NORMAL
- en: Functions can be treated as vectors. Let‚Äôs say we have a function *f*(*x*)¬†=¬†*e*^(*ax*).
  prefs: []
  type: TYPE_NORMAL
- en: Each of the infinite values of *x* would be a dimension, and the value of *f*(*x*)
    evaluated at those values would be the vector component along that dimension.
    So, what we would get is an infinite vector space.
  prefs: []
  type: TYPE_NORMAL
- en: Now, let‚Äôs look at the differentiator operator.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{dy}{dx}\left(f(x)\right)=\frac{dy}{dx}\left({e}^{ax}\right)={ae}^{ax}
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equav.png)'
  prefs: []
  type: TYPE_IMG
- en: Here, ![$$ \frac{dy}{dx} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq36.png)
    is the operator and *e*^(*ax*) is an Eigen function with respect to the operator,
    while *a* is the corresponding Eigen value.
  prefs: []
  type: TYPE_NORMAL
- en: As expressed earlier, the applications of Eigen vectors and Eigen values are
    profound and far reaching in almost any domain, and this is true for machine learning
    as well. To get an idea of how Eigen vectors have influenced modern applications,
    we will look at the Google page-ranking algorithm in a simplistic setting.
  prefs: []
  type: TYPE_NORMAL
- en: Let us look at the page-ranking algorithm for a simple website that has three
    pages‚ÄĒA, B, and C‚ÄĒas illustrated in Figure [1-11](#Fig12).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig12_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Three nodes with nine curves connected to each other denote the transition-probability
    diagram for three pages, marked as A, B, and C.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-11
  prefs: []
  type: TYPE_NORMAL
- en: Transition-probability diagram for three pages A, B, and C
  prefs: []
  type: TYPE_NORMAL
- en: In a web setting, one can jump from one page to another page given that the
    original page has a link to the next page. Also, a page can self-reference and
    have a link to itself. So, if a user goes from page A to B because page A references
    page B, the event can be denoted by *B*/*A. P*(*B*/*A*) can be computed by the
    total number of visits to page B from page A divided by the total number of visits
    to page A. The transition probabilities for all page combinations can be computed
    similarly. Since the probabilities are computed by normalizing count, the individual
    probabilities for pages would carry the essence of the importance of the pages.
  prefs: []
  type: TYPE_NORMAL
- en: In the steady state, the probabilities of each page would become constant. We
    need to compute the steady-state probability of each page based on the transition
    probabilities.
  prefs: []
  type: TYPE_NORMAL
- en: 'For the probability of any page to remain constant at steady state, probability
    mass going out should be equal to probability mass coming in, and each of them‚ÄĒwhen
    summed up with probability mass that stays in a page‚ÄĒshould equal the probability
    of the page. In that light, if we consider the equilibrium equation around page
    A, the probability mass going out of A is *P*(*B*/*A*)*P*(*A*)¬†+¬†*P*(*C*/*A*)*P*(*A*)
    whereas the probability mass coming into A is *P*(*A*/*B*)*P*(*B*)¬†+¬†*P*(*A*/*C*)*P*(*C*).
    The probability mass *P*(*A*/*A*)*P*(*A*) remains at A itself. Hence, at equilibrium,
    the sum of probability mass coming from outside‚ÄĒi.e., *P*(*A*/*B*)*P*(*B*)¬†+¬†*P*(*A*/*C*)*P*(*C*)‚ÄĒand
    probability mass remaining at A, i.e., *P*(*A*/*A*)*P*(*A*), should equal *P*(*A*),
    as expressed here:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ P\left(A/A\right)P(A)+P\left(A/B\right)P(B)+P\left(A/C\right)P(C)=P(A)
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equ1.png)'
  prefs: []
  type: TYPE_IMG
- en: (1)
  prefs: []
  type: TYPE_NORMAL
- en: 'Similarly, if we consider the equilibrium around pages B and C, the following
    holds true:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ P\left(B/A\right)P(A)+P\left(B/B\right)P(B)+P\left(B/C\right)P(C)=P(B)
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equ2.png)'
  prefs: []
  type: TYPE_IMG
- en: (2)
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ P\left(C/A\right)P(A)+P\left(C/B\right)P(B)+P\left(C/C\right)P(C)=P(C)
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equ3.png)'
  prefs: []
  type: TYPE_IMG
- en: (3)
  prefs: []
  type: TYPE_NORMAL
- en: 'Now comes the linear algebra part. We can arrange the three equations into
    a matrix working on a vector, as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \left[\begin{array}{ccc}P\left(A/A\right)&amp; P\left(A/B\right)&amp;
    P\left(A/C\right)\\ {}P\left(B/A\right)&amp; P\left(B/B\right)&amp; P\left(B/C\right)\\
    {}P\left(C/A\right)&amp; P\left(C/B\right)&amp; P\left(C/C\right)\end{array}\right]\left[\begin{array}{c}P(A)\\
    {}P(B)\\ {}P(C)\end{array}\right]=\left[\begin{array}{c}P(A)\\ {}P(B)\\ {}P(C)\end{array}\right]
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equaw.png)'
  prefs: []
  type: TYPE_IMG
- en: The transition-probability matrix works on the page-probability vector to produce
    again the page-probability vector. The page-probability vector, as we can see,
    is nothing but an Eigen vector to the page-transition-probability matrix, and
    the corresponding Eigen value for the same is 1.
  prefs: []
  type: TYPE_NORMAL
- en: So, computing the Eigen vector corresponding to the Eigen value of 1 would give
    us the page-probability vector, which in turn can be used to rank the pages. Several
    page-ranking algorithms of reputed search engines work on the same principle.
    Of course, the actual algorithms of the search engines have several modifications
    to this na√Įve model, but the underlying concept is the same. The probability vector
    can be determined through methods such as power iteration, as discussed in the
    next section.
  prefs: []
  type: TYPE_NORMAL
- en: Power Iteration Method for Computing Eigen Vector
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The power iteration method is an iteration technique used to compute the Eigen
    vector of a matrix corresponding to the Eigen value of largest magnitude.
  prefs: []
  type: TYPE_NORMAL
- en: Let *A*¬†‚ąą¬†*R*^(*n*¬†√ó¬†*n*) and then let that the *n* Eigen values in order of
    magnitude are *őĽ*[1]¬†>¬†*őĽ*[2]¬†>¬†*őĽ*[3]¬†>¬†.‚Äā.‚Äā. > *őĽ*[*n*] and the corresponding
    Eigen vectors are *v*[1]¬†>¬†*v*[2]¬†>¬†*v*[3]¬†>¬†.‚Äā.‚Äā. > *v*[*n*].
  prefs: []
  type: TYPE_NORMAL
- en: Power iteration starts with a random vector *v*, which should have some component
    in the direction of the Eigen vector corresponding to the largest Eigen value,
    i.e., *v*[1].
  prefs: []
  type: TYPE_NORMAL
- en: 'The approximate Eigen vector in any iteration is given by the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {v}^{\left(k+1\right)}=\frac{Av^{(k)}}{Av^{(k)}} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equax.png)'
  prefs: []
  type: TYPE_IMG
- en: After a sufficient number of iterations, *v*^((*k*¬†+¬†1)) converges to *v*[1].
    In every iteration, we multiply the matrix *A* by the vector obtained from the
    prior step. If we remove the normalizing of the vector to convert it to a unit
    vector in the iterative method, we have *v*^((*k*¬†+¬†1))¬†=¬†*A*^(*k*)*v*.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let the initial vector *v* be represented as a combination of the Eigen vectors:'
  prefs: []
  type: TYPE_NORMAL
- en: '*v*¬†=¬†*k*[1]*v*[1]¬†+¬†*k*[2]*v*[2]¬†+¬†.‚Äā.¬†+¬†*k*[*n*]*v*[*n*] where *k*[*i*]¬†‚ąÄ‚Äā*i*‚Äā¬†‚ąą¬†{1,
    2, 3, ..*n*} are constants.'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\displaystyle \begin{array}{c}{v}^{\left(k+1\right)}={A}^kv={A}^k\left({k}_1{v}_1+{k}_2{v}_2+..+{k}_n{v}_n\right)\\
    {} ={k}_1{A}^k{v}_1+{k}_2{A}^k{v}_2+..+{k}_n{A}^k{v}_n\\ {}={k}_1{\lambda_1}^k{v}_1+{k}_2{\lambda_2}^k{v}_2+..+{k}_n{\lambda_n}^k{v}_n\\
    {}={\lambda_1}^k\left({k}_1{v}_1+{k}_2{\left(\frac{\lambda_2}{\lambda_1}\right)}^k{v}_2+..+{k}_n{\left(\frac{\lambda_n}{\lambda_1}\right)}^k{v}_n\right)\end{array}}
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equay.png)'
  prefs: []
  type: TYPE_IMG
- en: Now, when *k* is sufficiently large‚ÄĒi.e., (‚ÄĒall the terms except the first will
    vanish since
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\left(\frac{\lambda_i}{\lambda_1}\right)}^k\kern0.5em \to 0 \forall \kern0.5em
    i\kern0.5em \in \left\{2,3,..n\right\} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equaz.png)'
  prefs: []
  type: TYPE_IMG
- en: Therefore, *v*^((*k*¬†+¬†1))¬†=¬†*őĽ*[1]^(*k*)*k*[1]*v*[1], which gives us the Eigen
    vector corresponding to the Eigen value of largest magnitude. The rate of convergence
    depends on the magnitude of the second largest Eigen value in comparison with
    the largest Eigen value. The method converges slowly if the second largest Eigen
    value is close in magnitude to the largest one.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, I have touched upon the basics of linear algebra so that readers
    who are not familiar with this subject have some starting point. However, I would
    suggest the reader to take up linear algebra in more detail in his or her spare
    time. Renowned Professor Gilbert Strang‚Äôs book *Linear Algebra and Its Applications*
    is a wonderful way to get started.
  prefs: []
  type: TYPE_NORMAL
- en: Calculus
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In its very simplest form, calculus is a branch of mathematics that deals with
    differentials and integrals of functions. Having a good understanding of calculus
    is important for machine learning for several reasons:'
  prefs: []
  type: TYPE_NORMAL
- en: Different machine-learning models are expressed as functions of several variables.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To build a machine-learning model, we generally compute a cost function for
    the model based on the data and model parameters, and through optimization of
    the cost function, we derive the model parameters that best explain the given
    data.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Differentiation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Differentiation of a function generally means the rate of change of a quantity
    represented by a function with respect to another quantity on which the function
    is dependent on.
  prefs: []
  type: TYPE_NORMAL
- en: Let‚Äôs say a particle moves in a one-dimensional plane‚ÄĒi.e., a straight line‚ÄĒand
    its distance at any specific time is defined by the function *f*(*t*)¬†=¬†5*t*¬≤.
  prefs: []
  type: TYPE_NORMAL
- en: The velocity of the particle at any specific time would be given by the derivative
    of the function with respect to time *t*.
  prefs: []
  type: TYPE_NORMAL
- en: 'The derivative of the function is defined as ![$$ \frac{df(t)}{dt} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq37.png)
    and is generally expressed by the following formulae based on whichever is convenient:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{df}{dt}=\underset{h\to 0}{\lim}\frac{\kern0.5em f\left(t+h\right)-f(t)\kern0.5em
    }{h} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equba.png)'
  prefs: []
  type: TYPE_IMG
- en: or
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{df}{dt}=\underset{h\to 0}{\lim}\frac{\kern0.5em f\left(t+h\right)-f\left(t-h\right)\kern0.5em
    }{2h} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equbb.png)'
  prefs: []
  type: TYPE_IMG
- en: When we deal with a function that is dependent on multiple variables, the derivative
    of the function with respect to each of the variables keeping the others fixed
    is called a partial derivative, and the vector of partial derivatives is called
    the gradient of the function.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let‚Äôs say the price *z* of a house is dependent on two variables: square feet
    area of the house *x* and the number of bedrooms *y*.'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ z=f\left(x,y\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equbc.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The partial derivative of *z* with respect to *x* is represented by the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\partial z}{\partial x}=\underset{h\to 0}{\lim}\frac{f\left(x+h,y\right)-f\left(x,y\right)}{h}
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equbd.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Similarly, the partial derivative of *z* with respect to *y* is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\partial z}{\partial y}=\underset{h\to 0}{\lim}\frac{f\left(x,y+h\right)-f\left(x,y\right)}{h}
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Eqube.png)'
  prefs: []
  type: TYPE_IMG
- en: Bear in mind that in a partial derivate, except the variable with respect to
    which the derivate is being taken, are held constant.
  prefs: []
  type: TYPE_NORMAL
- en: Gradient of a Function
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For a function with two variables *z*¬†=¬†*f*(*x*, *y*), the vector of partial
    derivatives ![$$ {\left[\frac{\partial z}{\partial x}\kern0.5em \frac{\partial
    z}{\partial y}\right]}^T $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq38.png)
    is called the gradient of the function and is denoted by ‚ąá*z*. The same can be
    generalized for a function with *n* variables. A multivariate function *f*(*x*[1],¬†*x*[2],..,¬†*x*[*n*])
    can also be expressed as *f*(*x*), where *x*¬†=¬†[*x*[1], *x*[2]‚Ä¶. *x*[*n*]]^(*T*)¬†‚ąą¬†‚ĄĚ^(*n*¬†√ó¬†1).
    The gradient vector for the multivariate function *f*(*x*) with respect to *x*
    can be expressed as ![$$ \nabla f={\left[\frac{\partial f}{\partial {x}_1}\kern0.5em
    \frac{\partial f}{\partial {x}_2}\dots \dots \frac{\partial f}{\partial {x}_n}\right]}^T
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq39.png).
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, the gradient of a function with three variables *f*(*x*, *y*,
    *z*)¬†=¬†*x*¬†+¬†*y*¬≤¬†+¬†*z*¬≥ is given by the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \nabla f={\left[1\kern0.5em 2y\kern0.5em 3{z}^2\right]}^T $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equbf.png)'
  prefs: []
  type: TYPE_IMG
- en: The gradient and the partial derivatives are important in machine-learning algorithms
    when we try to maximize or minimize cost functions with respect to the model parameters,
    since at the maxima and minima the gradient vector of a function is zero. At the
    maxima and minima of a function, the gradient vector of the function should be
    a zero vector.
  prefs: []
  type: TYPE_NORMAL
- en: Successive Partial Derivatives
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We can have successive partial derivatives of a function with respect to multiple
    variables. For example, for a function *z*¬†=¬†*f*(*x*, *y*)
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\partial }{\partial y}\left(\frac{\partial z}{\partial x}\right)=\frac{\partial^2z}{\partial
    y\partial x} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equbg.png)'
  prefs: []
  type: TYPE_IMG
- en: This is the partial derivative of *z* with respect to *x* first and then with
    respect to *y*.
  prefs: []
  type: TYPE_NORMAL
- en: Similarly,
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\partial }{\partial x}\left(\frac{\partial z}{\partial y}\right)=\frac{\partial^2z}{\partial
    x\partial y} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equbh.png)'
  prefs: []
  type: TYPE_IMG
- en: If the second derivatives are continuous, the order of partial derivatives doesn‚Äôt
    matter and
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\partial^2z}{\partial x\partial y}=\frac{\partial^2z}{\partial y\partial
    x} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq40.png).'
  prefs: []
  type: TYPE_NORMAL
- en: Hessian Matrix of a Function
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The Hessian of a multivariate function is a matrix of second-order partial
    derivatives. For a function *f*(*x*,¬†*y*,¬†*z*), the Hessian is defined as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Hf=\left[\begin{array}{ccc}\frac{\delta^2f}{\delta {x}^2}&amp; \frac{\delta^2f}{\delta
    x\delta y}&amp; \frac{\delta^2f}{\delta x\delta z}\\ {}\frac{\delta^2f}{\delta
    y\delta x}&amp; \frac{\delta^2f}{\delta {y}^2}&amp; \frac{\delta^2f}{\delta y\delta
    z}\\ {}\frac{\delta^2f}{\delta z\delta x}&amp; \frac{\delta^2f}{\delta z\delta
    y}&amp; \frac{\delta^2f}{\delta {z}^2}\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equbi.png)'
  prefs: []
  type: TYPE_IMG
- en: The Hessian is useful in the optimization problems that we come across so frequently
    in the machine-learning domain. For instance, in minimizing a cost function to
    arrive at a set of model parameters, the Hessian is used to get better estimates
    for the next set of parameter values, especially if the cost function is nonlinear
    in nature. Nonlinear optimization techniques, such as Newton‚Äôs method, Broyden-Fletcher-Goldfarb-Shanno
    (BFGS), and its variants, use the Hessian for minimizing cost functions.
  prefs: []
  type: TYPE_NORMAL
- en: Maxima and Minima of Functions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Evaluating the maxima and minima of functions has tremendous applications in
    machine learning. Building machine-learning models relies on minimizing cost functions
    or maximizing likelihood functions, entropy, and so on in both supervised and
    unsupervised learning.
  prefs: []
  type: TYPE_NORMAL
- en: Rules for Maxima and Minima for a Univariate Function
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The derivative of *f*(*x*) with respect to *x* would be zero at maxima and minima.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The second derivative of *f*(*x*), which is nothing but the derivative of the
    first derivative represented by ![$$ \frac{d^{2\kern0.5em }f(x)}{dx^2} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq41.png),
    needs to be investigated at the point where the first derivative is zero. If the
    second derivative is less than zero, then it‚Äôs a point of maxima, while if it
    is greater than zero, it‚Äôs a point of minima. If the second derivative turns out
    to be zero as well, then the point is called a point of inflection.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let‚Äôs take a very simple function, *y*¬†=¬†*f*(*x*)¬†=¬†*x*¬≤. If we take the derivative
    of the function w.r.t *x* and set it to zero, we get ![$$ \frac{dy}{dx}=2x=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq42.png),
    which gives us *x*¬†=¬†0\. Also, the second derivative ![$$ \frac{d^{2\kern0.5em
    }y}{dx^2}=2 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq43.png).
    Hence, for all values of *x*, including *x*¬†=¬†0, the second derivative is greater
    than zero, and hence *x*¬†=¬†0 is the minima point for the function *f*(*x*).
  prefs: []
  type: TYPE_NORMAL
- en: Let‚Äôs try the same exercise for *y*¬†=¬†*g*(*x*)¬†=¬†*x*¬≥.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{dy}{dx}=3{x}^2=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq44.png)
    gives us *x*¬†=¬†0\. The second derivative ![$$ \frac{d^{2\kern0.5em }y}{dx^2}=6x
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq45.png), and
    if we evaluate it at *x*¬†=¬†0 we get 0\. So, *x*¬†=¬†0 is neither the minima nor
    the maxima point for the function *g*(*x*). Points at which the second derivative
    is zero are called points of inflection. At points of inflection, the sign of
    the curvature changes.'
  prefs: []
  type: TYPE_NORMAL
- en: The points at which the derivative of a univariate function is zero or the gradient
    vector for a multivariate function is a zero vector are called stationary points.
    They may or may not be points of maxima or minima.
  prefs: []
  type: TYPE_NORMAL
- en: Illustrated in Figure [1-12](#Fig13) are different kinds of stationary points,
    i.e., maxima, minima, and points of inflection.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig13_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Three graphs of three different equations illustrate the maxima, minima, and
    point of inflection. The equations are y equals x square, -x square, and x cube,
    respectively.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-12
  prefs: []
  type: TYPE_NORMAL
- en: Different types of stationary points‚ÄĒmaxima, minima, point of inflection
  prefs: []
  type: TYPE_NORMAL
- en: 'Maxima and minima for a multivariate function are a bit more complicated. Let‚Äôs
    proceed with an example, and then we will define the rules. We look at a multivariate
    function with two variables:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ f\left(x,y\right)={x}^2{y}^3+3y+x+5 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equbj.png)'
  prefs: []
  type: TYPE_IMG
- en: To determine the stationary points, the gradient vector needs to be zero.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\left[\frac{\partial f}{\partial x}\kern0.5em \frac{\partial f}{\partial
    y}\right]}^T=\left[\begin{array}{c}0\\ {}0\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equbk.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Setting ![$$ \frac{\partial f}{\partial x} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq46.png)
    and ![$$ \frac{\partial f}{\partial y} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq47.png)
    to zero, we get the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\partial f}{\partial x}=2{xy}^3+1=0,\frac{\partial f}{\partial x}=3{\textrm{x}}^2{\textrm{y}}^2+3=0
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equbl.png)'
  prefs: []
  type: TYPE_IMG
- en: 'We need to compute the Hessian as well:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\partial^2f}{\partial {x}^2}={f}_{xx}= 2{y}^3, $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equbm.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ \frac{\partial^2f}{\partial {y}^2}={f}_{yy}=6{\textrm{x}}^2y, $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equbn.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ \frac{\partial^2f}{\partial x\partial y}={f}_{xy}=6{xy}^2 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equbo.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ \frac{\partial^2f}{\partial y\partial x}={f}_{yx}=6{xy}^2 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equbp.png)'
  prefs: []
  type: TYPE_IMG
- en: For functions with continuous second derivatives, *f*[‚ÄÜ*xy*]¬†=¬†*f*[*yx*].
  prefs: []
  type: TYPE_NORMAL
- en: 'Let‚Äôs say the gradient is zero at (*x*¬†=¬†*a*, *y*¬†=¬†*b*):'
  prefs: []
  type: TYPE_NORMAL
- en: If *f*[*xx*]*f*[*yy*]¬†‚ąí¬†(*f*[*xy*])¬≤¬†=¬†0 then more advanced methods are required
    to classify the stationary point correctly.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If *f*[‚ÄÜ*xx*]‚ÄÜ*f*[‚ÄÜ*yy*]¬†‚ąí¬†(‚ÄÜ*f*[‚ÄÜ*xy*])¬≤¬†<¬†0‚Äā*at*‚Äā(*x*¬†=¬†*a*, *y*¬†=¬†*b*) then
    (*x*¬†=¬†*a*, *y*¬†=¬†*b*) is a saddle point.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If *f*[*xx*]‚ÄÜ*f*[*yy*]¬†‚ąí¬†(*f*[‚ÄÜ*xy*])¬≤¬†>¬†0‚Äā*at*‚Äā(*x*¬†=¬†*a*, *y*¬†=¬†*b*) then
    (*x*¬†=¬†*a*, *y*¬†=¬†*b*) is an extremum point; i.e., maxima or minima exists.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If *f*[*xx*]¬†<¬†0‚Äā*and‚Äāf*[*yy*]¬†<¬†0‚Äā*at*‚Äā(*x*¬†=¬†*a*, *y*¬†=¬†*b*) then *f*‚ÄÜ(*x*,¬†*y*)
    has the maximum at (*x*¬†=¬†*a*, *y*¬†=¬†*b*).
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: If *f*[*xx*]¬†>¬†0 and *f*[*yy*]¬†>¬†0‚Äāat‚Äā(*x*¬†=¬†*a*, *y*¬†=¬†*b*) then *f*‚ÄÜ(*x*,¬†*y*)
    has the minimum at (*x*¬†=¬†*a*, *y*¬†=¬†*b*).
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'For a function with *n* variables, the following are the guidelines for checking
    for the maxima, minima, and saddle points of a function:'
  prefs: []
  type: TYPE_NORMAL
- en: Computing the gradient and setting it to zero vector would give us the list
    of stationary points.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For a stationary point *x*[0]¬†‚ąą¬†*R*^(*n*¬†√ó¬†1), if the Hessian matrix of the
    function at *x*[0] has both positive and negative Eigen values, then *x*[0] is
    a saddle point. If the Eigen values of the Hessian matrix are all positive, then
    the stationarity point is a local minima where as if the Eigen values are all
    negative, then the stationarity point is a local maxima.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Local Minima and Global Minima
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Functions can have multiple minima at which the gradient is zero, each of which
    is called a local minima point. The local minima at which the function has the
    minimum value is called the global minima. The same applies for maxima. Maxima
    and minima of a function are derived by optimization methods. Since closed-form
    solutions are not always available or are computationally intractable, the minima
    and maxima are most often derived through iterative approaches, such as gradient
    descent, gradient ascent, and so forth. In the iterative way of deriving minima
    and maxima, the optimization method may get stuck in a local minima or maxima
    and be unable to reach the global minima or maxima. In iterative methods, the
    algorithm utilizes the gradient of the function at a point to get to a more optimal
    point. When traversing a series of points in this fashion, once a point with a
    zero gradient is encountered, the algorithm stops assuming the desired minima
    or maxima is reached. This works well when there is a global minima or maxima
    for the function. Also, the optimization can get stuck at a saddle point too.
    In all such cases, we would have a suboptimal model.
  prefs: []
  type: TYPE_NORMAL
- en: Illustrated in Figure [1-13](#Fig14) are global and local minima as well as
    global and local maxima of a function.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig14_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The quadrantal diagram with a variable curve on the X-axis illustrates local
    minima, local maxima, global minima, and global maxima.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-13
  prefs: []
  type: TYPE_NORMAL
- en: Local and global minima/maxima
  prefs: []
  type: TYPE_NORMAL
- en: Positive Semi-definite and Positive Definite
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A square matrix *A*¬†‚ąą¬†*R*^(*n*¬†√ó¬†1) is positive semi-definite if for any nonzero
    vector *x*¬†‚ąą¬†*R*^(*n*¬†√ó¬†1) the expression *x*^(*T*)*Ax*¬†>¬†0[.] The matrix *A*
    is positive definite if the expression *x*^(*T*)*Ax*¬†>¬†0\. All the Eigen values
    for a positive semi-definite matrix should be nonnegative, whereas for a positive
    definite matrix, the Eigen values should be positive. For example, if we consider
    *A* as the 2¬†√ó¬†2 identity matrix‚ÄĒi.e., ![$$ \left[\begin{array}{cc}1&amp; 0\\
    {}0&amp; 1\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq48.png)‚ÄĒthen
    it is positive definite since both of its Eigen values, i.e., 1,1, are positive.
    Also, if we compute *x*^(*T*)*Ax*, where *x*¬†=¬†[*x*[1]‚Äā*x*[2]]^(*T*), we get *x*^(*T*)*Ax*¬†=¬†*x*[1]¬≤¬†+¬†*x*[2]¬≤,
    which is always greater than zero for nonzero vector *x*, which confirms that
    *A* is a positive definite matrix.
  prefs: []
  type: TYPE_NORMAL
- en: Convex Set
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A set of points is called convex if, given any two points *x* and *y* belonging
    to the set, all points joining the straight line from *x* to *y* also belong to
    the set. In Figure [1-14](#Fig15), a convex set and a non-convex set are illustrated.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig15_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Two points, x and y, join to make straight lines in convex and concave sets.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-14
  prefs: []
  type: TYPE_NORMAL
- en: Convex and non-convex set
  prefs: []
  type: TYPE_NORMAL
- en: Convex Function
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'A function *f*(*x*) defined on a convex set *D*, where *x*¬†‚ąą¬†‚ĄĚ^(*n*¬†√ó¬†1) and
    *D* is the domain, is said to be convex if the straight line joining any two points
    in the function lies above or on the graph of the function. Mathematically, this
    can be expressed as the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ f\left( tx+\left(1\kern0.5em -\kern0.5em t\right)y\right)\kern0.5em \le
    \kern0.5em tf(x)+\left(1-t\right)f(y)\forall \kern0.5em x,y \in \kern0.5em D,\kern0.5em
    \forall \kern0.5em t\kern0.5em \in \kern0.5em \left[0,1\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equbq.png)'
  prefs: []
  type: TYPE_IMG
- en: For a convex function that is twice continuously differentiable, the Hessian
    matrix of the function evaluated at each point in the domain *D* of the function
    should be positive semi-definite; i.e., for any vector *x*¬†‚ąą¬†*R*^(*n*¬†√ó¬†1),
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {x}^T Hx\ge 0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equbr.png)'
  prefs: []
  type: TYPE_IMG
- en: A convex function has the local minima as its global minima. Bear in mind that
    there can be more than one global minima, but the value of the function would
    be same at each of the global minima for a convex function.
  prefs: []
  type: TYPE_NORMAL
- en: In Figure [1-15](#Fig16), a convex function *f*(*x*) is illustrated. As we can
    see, the *f*(*x*) clearly obeys the property of convex functions stated earlier.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig16_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The two-dimensional plane displays a straight line for the function x and a
    curve line below it. Three lines are projected on the X-axis from the straight
    line, two of them are from meeting points.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-15
  prefs: []
  type: TYPE_NORMAL
- en: Convex function illustration
  prefs: []
  type: TYPE_NORMAL
- en: Non-convex Function
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A non-convex function can have many local minima, all of which are not global
    minima.
  prefs: []
  type: TYPE_NORMAL
- en: In any machine-learning model building process where we try to learn the model
    parameters by minimizing a cost function, we prefer the cost function to be convex,
    since with a proper optimization technique we would attain the global minima for
    sure. For a non-convex cost function, there is a high chance that the optimization
    technique will get stuck at a local minima or a saddle point, and hence it might
    not attain its global minima.
  prefs: []
  type: TYPE_NORMAL
- en: Multivariate Convex and Non-convex Functions Examples
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Since we would be dealing with high-dimensional functions in deep learning,
    it makes sense to look at convex and non-convex functions with two variables.
  prefs: []
  type: TYPE_NORMAL
- en: '*f*(*x*, ‚Äā*y*)¬†=¬†2*x*¬≤¬†+¬†3*y*¬≤¬†‚ąí¬†5 is a convex function with minima at *x*¬†=¬†0,
    *y*¬†=¬†0, and the minimum value of *f*(*x*,¬†*y*) at (*x*¬†=¬†0, *y*¬†=¬†0) is ‚ąí5\.
    The function is plotted in Figure [1-16](#Fig17) for reference.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig17_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The three-dimensional axis x, y, and the function of x and y, displays four
    minima points for the convex function of the equation 2 times of x square plus
    3 times of y square minus 5.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-16
  prefs: []
  type: TYPE_NORMAL
- en: Plot of the convex function 2*x*¬≤¬†+¬†3*y*¬≤¬†‚ąí¬†5
  prefs: []
  type: TYPE_NORMAL
- en: Now, let‚Äôs consider the function *f*(*x*, *y*)¬†=¬†¬†log¬†*x*/*y*‚Äā¬†‚ąÄ‚Äā*x*¬†>¬†0, *y*¬†>¬†0.
  prefs: []
  type: TYPE_NORMAL
- en: 'The preceding is a non-convex function, and the easiest way to verify this
    is to look at the Hessian matrix for the following function:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \textrm{Hessian} H=\left[\begin{array}{cc}-\frac{1}{x^2}&amp; 0\\ {}0&amp;
    \frac{1}{y^2}\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equbs.png)'
  prefs: []
  type: TYPE_IMG
- en: The Eigen values of the Hessian are ![$$ -\frac{1}{x^2} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq49.png)
    and ![$$ \frac{1}{y^2} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq50.png).
    ![$$ -\frac{1}{x^2} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq51.png)
    would always be negative for real *x*. Hence, the Hessian is not positive semi-definite,
    making the function non-convex.
  prefs: []
  type: TYPE_NORMAL
- en: We can see in Figure [1-17](#Fig18) that the plot of the function *log*(*x*/*y*)
    looks non-convex.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig18_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The three-dimensional axis x, y, and the function of x and y, display a mesh
    sheet structure for the non-convex function of the log of x by y.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-17
  prefs: []
  type: TYPE_NORMAL
- en: Plot of the non-convex function log(x/y)
  prefs: []
  type: TYPE_NORMAL
- en: Linear regression through least squares and logistic regression through log-loss
    cost functions (binary cross-entropy) are all convex optimization problems, and
    hence the model parameters learned through optimization are a global minima solution.
    Similarly, in SVM, the cost function that we optimize is convex.
  prefs: []
  type: TYPE_NORMAL
- en: Whenever there are hidden layers or latent factors involved in any model, the
    cost function tends to be non-convex in nature. A neural network with hidden layers
    gives non-convex cost or error surface irrespective of whether we are solving
    regression or classification problems.
  prefs: []
  type: TYPE_NORMAL
- en: Similarly, in K-means, clustering the introduction of clusters makes the cost
    function to optimize a non-convex cost function. Intelligent methods need to be
    adopted for non-convex cost functions so that we achieve some local minima that
    are good enough if it is not possible to reach the global minima.
  prefs: []
  type: TYPE_NORMAL
- en: Parameter initialization becomes very important when dealing with a non-convex
    problem. The closer the initialized parameters are to the global minima or to
    some acceptable local minima, the better. For *k* means, one method of ensuring
    that the solution is not suboptimal is to run the *k*-means algorithm several
    times with different randomly initialized model parameters, i.e., the cluster
    centroids. We may then take the one that reduces the sum of the intra-cluster
    variances the most. For neural networks, one needs to use advanced gradient-descent
    methods involving momentum parameters to come out of the local minima and move
    forward. We will get to gradient-based optimization methods for neural networks
    in more detail later in this book.
  prefs: []
  type: TYPE_NORMAL
- en: Taylor Series
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Any function can be expressed as an infinite sum by considering the value of
    the function and its derivatives at a specific point. Such an expansion of the
    function is called Taylor series expansion. The Taylor series expansion of a univariate
    function around a point *x* can be expressed as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ f\left(x+h\right)=f(x)+{hf}^{\prime }(x)+\frac{1}{2!}{h}^2{f}^{\prime
    \prime }(x)+\frac{1}{3!}{h}^3{f}^{\prime \prime \prime }(x)+.\kern0.5em .+\frac{1}{n!}{h}^n{f}^n(x)+..
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equbt.png)'
  prefs: []
  type: TYPE_IMG
- en: where *f*‚ÄÜ^(*n*)(*x*) is the *nth* derivative of the function *f*‚ÄÜ(*x*) and
    *n*¬†`! denotes the factorial of the number` *n*. The term *h* has the same dimension
    as that of *x*, and both *h*,¬†*x* are scalars.
  prefs: []
  type: TYPE_NORMAL
- en: If *f*‚ÄÜ(*x*) is a constant function, then all the derivatives are zero and *f*‚ÄÜ(*x*¬†+¬†*h*)
    and *f*‚ÄÜ(*x*) are same.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If the function is linear around the neighborhood of *x*, then for any point
    (*x*¬†+¬†*h*) that lies in the region of the linearity,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If the function is quadratic around the neighborhood of *x*, then for any point
    that lies in the quadratic zone, *f*‚ÄÜ(*x*¬†+¬†*h*)¬†=¬†*f*‚ÄÜ(*x*)¬†+¬†*hf*‚ÄÜ‚Ä≤(*x*).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Taylor series expansion becomes very important in iterative methods such as
    gradient-descent methods and Newton‚Äôs methods for optimization as well as in numerical
    methods for integration and differentiation.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Taylor series expansion for multivariate functions around a point *x*¬†‚ąą¬†*R*^(*n*¬†√ó¬†1)
    can be expressed as ![$$ f\left(x+\Delta x\right)=f(x)+\Delta {x}^T\nabla f(x)+\frac{1}{2}\Delta
    {x}^T{\nabla}^2f(x)\Delta x+ $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq52.png)
    higher-order terms
  prefs: []
  type: TYPE_NORMAL
- en: where ‚ąá*f*‚ÄÜ(*x*) is the gradient vector and ‚ąá¬≤*f*‚ÄÜ(*x*) is the Hessian matrix
    for the function *f*‚ÄÜ(*x*).
  prefs: []
  type: TYPE_NORMAL
- en: Generally, for practical purposes, we don‚Äôt go beyond second-order Taylor series
    expansion in machine-learning applications since in numerical methods they are
    hard to compute. Even for second-order expansion, computing the Hessian is cost-intensive,
    and hence several second-order optimization methods rely on computing the approximate
    Hessians from gradients instead of evaluating them directly. Please note that
    the third-order derivatives object ‚ąá¬≥*f*‚ÄÜ(*x*) would be a three-dimensional tensor.
  prefs: []
  type: TYPE_NORMAL
- en: Probability
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before we go on to probability, it is important to know what a random experiment
    and a sample space are.
  prefs: []
  type: TYPE_NORMAL
- en: In many types of work, be it in a research laboratory or an otherwise, repeated
    experimentation under almost identical conditions is a standard practice. For
    example, a medical researcher may be interested in the effect of a drug that is
    to be launched, or an agronomist might want to study the effect of chemical fertilizer
    on the yield of a specific crop. The only way to get information about these interests
    is to conduct experiments. At times, we might not need to perform experiments,
    as the experiments are conducted by nature and we just need to collect the data.
  prefs: []
  type: TYPE_NORMAL
- en: Each experiment would result in an outcome. Suppose the outcome of the experiments
    cannot be predicted with absolute certainty. However, before we conduct the experiments,
    suppose we know the set of all possible outcomes. If such experiments can be repeated
    under almost the same conditions, then the experiment is called a random experiment,
    and the set of all possible outcomes is called the sample space.
  prefs: []
  type: TYPE_NORMAL
- en: Do note that sample space is only the set of outcomes we are interested in.
    A throw of dice can have several outcomes. One is the set of outcomes that deals
    with the face on which the dice lands. The other possible set of outcomes can
    be the velocity with which the dice hits the floor. If we are only interested
    in the face on which the dice lands, then our sample space is ő©¬†=¬†{1, 2, 3, 4,
    5, 6}, i.e., the face number of the dice.
  prefs: []
  type: TYPE_NORMAL
- en: Let‚Äôs continue with the experiment of throwing the dice and noting down the
    face on which it lands as the outcome. Suppose we conduct the experiment *n* times
    and face 1 turns up *m* times. Then, from the experiment, we can say that the
    probability of the event of the dice face‚Äôs being 1 is equal to the number of
    experiments in which the dice face that turned up was 1 divided by the total number
    of experiments conducted; i.e., ![$$ P\left(x=1\right)=\frac{m}{n} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq53.png),
    where *x* denotes the number on the face of the dice.
  prefs: []
  type: TYPE_NORMAL
- en: Let‚Äôs suppose we are told that a dice is fair. What is the probability of the
    number coming up as 1?
  prefs: []
  type: TYPE_NORMAL
- en: Well, given that the dice is fair and that we have no other information, most
    of us would believe in the near symmetry of the dice such that it would produce
    100 faces with number 1 if we were to throw the dice 600 times. This would give
    us the probability as ![$$ \frac{1}{6} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq54.png).
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, let‚Äôs say we have gathered some 1000 data points about the numbers on
    the dice head during recent rolls of the dice. Here are the statistics:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ 1\to \kern0.5em 200\kern0.5em times $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equbu.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ 2\kern0.5em \to \kern0.5em 100\kern0.5em times $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equbv.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ 3\kern0.5em \to \kern0.5em 100\kern0.5em times $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equbw.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ 4\kern0.5em \to \kern0.5em 100\kern0.5em times $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equbx.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ 5\kern0.5em \to \kern0.5em 300\kern0.5em times $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equby.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ 6\kern0.5em \to \kern0.5em 200\kern0.5em time\textrm{s} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equbz.png)'
  prefs: []
  type: TYPE_IMG
- en: In this case, you would come up with the probability of the dice face‚Äôs being
    1 as *P*(*x*¬†=¬†1)¬†=¬†200/1000¬†=¬†0.2\. The dice is either not symmetric or is biased.
  prefs: []
  type: TYPE_NORMAL
- en: Unions, Intersection, and Conditional Probability
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '*P*(*A* ‚ą™ *B*) = Probability of the event A or event B or both'
  prefs: []
  type: TYPE_NORMAL
- en: '*P*(*A*¬†‚ą©¬†*B*) = Probability of event A and event B'
  prefs: []
  type: TYPE_NORMAL
- en: '*P*(*A*/*B*)‚Äā) = Probability of event A given that B has already occurred.'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ P\left(A\kern0.5em \cap \kern0.5em B\right)=P\left(A/B\right)P(B)=P\left(B/A\right)P(A)
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equca.png)'
  prefs: []
  type: TYPE_IMG
- en: From now on, we will drop the notation of *A* intersection *B* as *A*¬†‚ą©¬†*B*
    and will denote it as *AB* for ease of notation.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ P\left(A\kern0.5em -\kern0.5em B\right)=P(A)-P(AB) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equcb.png)'
  prefs: []
  type: TYPE_IMG
- en: All the preceding proofs become easy when we look at the Venn diagram of the
    two events A and B as represented in Figure [1-18](#Fig19).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig19_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The Venn diagram demonstrates the union and intercepts for events A and B. Event
    A is shaded.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-18
  prefs: []
  type: TYPE_NORMAL
- en: Venn diagram of two events A and B showing the union and intersection of the
    two events
  prefs: []
  type: TYPE_NORMAL
- en: Let‚Äôs say there are *n* occurrences of an experiment in which *A* has occurred
    *n*[1] times, *B* has occurred *n*[2] times, and *A* and *B* together have occurred
    *m* times.
  prefs: []
  type: TYPE_NORMAL
- en: Let‚Äôs represent this with a Venn diagram.
  prefs: []
  type: TYPE_NORMAL
- en: '*P*(*A* ‚ą™ *B*) can be represented by the sum of the probability of the three
    disjointed events: (*A* ‚Äď *B*), (*B* ‚Äď *A*), and *AB*.'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\displaystyle \begin{array}{l}P(AUB)=P\left(A\kern0.5em -\kern0.5em B\right)+P\left(B\kern0.5em
    -\kern0.5em A\right)+P(AB)\\ {}\operatorname{} \kern0.36em =P(A)-P(AB)+P(B)\kern0.5em
    -\kern0.5em P(AB)+P(AB)\\ {}\operatorname{}\kern0.36em =P(A)+P(B)-P(AB)\end{array}}
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equcc.png)'
  prefs: []
  type: TYPE_IMG
- en: '*P*(*A*/*B*) is the probability of *A* given that *B* has already occurred.
    Given than *B* has already happened in *n*[2] ways, the event *A* is restricted
    to the event *AB* that can occur in *m* different ways. So, the probability of
    *A* given *B* can be expressed as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ P\left(A/B\right)=\frac{m}{n_2} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equcd.png)'
  prefs: []
  type: TYPE_IMG
- en: Now, ![$$ \frac{m}{n_2} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq55.png)
    can be written as ![$$ \frac{\frac{m}{n}}{\frac{n_2}{\textrm{n}\kern0.5em }} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq56.png)
    = ![$$ \frac{P(AB)}{P(B)} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq57.png).
  prefs: []
  type: TYPE_NORMAL
- en: Hence, *P*(*A*/*B*)¬†=¬†*P*(*AB*)/*P*(*B*)¬†=¬†¬†>¬†*P*(*AB*)¬†=¬†*P*(*B*)*P*(*A*/*B*).
  prefs: []
  type: TYPE_NORMAL
- en: Similarly, if we consider *P*(*B*/*A*), then the relation *P*(*AB*)¬†=¬†*P*(*A*)*P*(*B*/*A*)
    also holds true.
  prefs: []
  type: TYPE_NORMAL
- en: Chain Rule of Probability for Intersection of Event
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The product rule of intersection as just discussed for two events can be extended
    to *n* events.
  prefs: []
  type: TYPE_NORMAL
- en: 'If *A*[1],¬†*A*[2], *A*[3], ‚Ä¶ *A*[*n*] are the set of *n* events, then the joint
    probability of these events can be expressed as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\displaystyle \begin{array}{l}P\left({A}_1{A}_2{A}_3\dots {A}_n\right)=P\left({A}_1\right)P\left({A}_2/{A}_1\right)P\left({A}_3/{A}_1{A}_2\right)\kern0.5em
    ..\dots \kern0.5em P\left({A}_n/{A}_1{A}_2..{A}_{\left(n-1\right)}\right)\\ {}\operatorname{}\operatorname{}\kern0.48em
    =P\left({A}_1\right)\prod \limits_{i=2}^nP\left({A}_i/{A}_1{A}_2{A}_3\dots {A}_{\left(n-1\right)}\right)\end{array}}
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equce.png)'
  prefs: []
  type: TYPE_IMG
- en: Mutually Exclusive Events
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Two events *A* and *B* are said to be mutually exclusive if they do not co-occur.
    In other words, *A* and *B* are mutually exclusive if *P*(*AB*)¬†=¬†0\. For mutually
    exclusive events, *P*(*A‚ÄāU‚ÄāB*)¬†=¬†*P*(*A*)¬†+¬†*P*(*B*).
  prefs: []
  type: TYPE_NORMAL
- en: 'In general, the probability of the union of *n* mutually exclusive events can
    be written as the sum of their probabilities:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ P\left({A}_1\cup {A}_2\kern0.5em ..\cup {A}_n\right)=P\left({A}_1\right)+P\left({A}_2\right)\Big)+..\kern0.5em
    P\left({A}_n\right)=\sum \limits_{i=1}^nP\left({A}_i\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equcf.png)'
  prefs: []
  type: TYPE_IMG
- en: Independence of Events
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Two events *A* and *B* are said to be independent if the probability of their
    intersection is equal to the product of their individual probabilities, i.e.,
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ P(AB)=P(A)P(B) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equcg.png)'
  prefs: []
  type: TYPE_IMG
- en: This is possible because the conditional probability of *A* given *B* is the
    same as the probability of *A*; i.e.,
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ P\left(A/B\right)=P(A) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equch.png)'
  prefs: []
  type: TYPE_IMG
- en: This means that *A* is as likely to happen in the set of all the events as it
    is in the domain of *B*.
  prefs: []
  type: TYPE_NORMAL
- en: Similarly, *P*(*B*/*A*)¬†=¬†*P*(*B*) in order for events *A* and *B* to be independent.
  prefs: []
  type: TYPE_NORMAL
- en: When two events are independent, neither of the events is influenced by the
    fact the other event has happened.
  prefs: []
  type: TYPE_NORMAL
- en: Conditional Independence of Events
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Two events *A* and *B* are conditionally independent given a third event *C*
    if the probability of co-occurrence of *A* and *B* given *C* can be written as
    follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ P\left( AB/C\right)=P\left(A/C\right)P\left(B/C\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equci.png)'
  prefs: []
  type: TYPE_IMG
- en: By the factorization property, *P*(*AB*/*C*)¬†=¬†*P*(*A*/*C*)*P*(*B*/*AC*).
  prefs: []
  type: TYPE_NORMAL
- en: By combining the preceding equations, we see that *P*(*B*/*AC*)¬†=¬†*P*(*B*/*C*)
    as well.
  prefs: []
  type: TYPE_NORMAL
- en: Do note that the conditional independence of events *A* and *B* doesn‚Äôt guarantee
    that *A* and *B* are independent too. The conditional independence of events property
    is used a lot in machine-learning areas where the likelihood function is decomposed
    into simpler form through the conditional independence assumption. Also, a class
    of network models known as Bayesian networks uses conditional independence as
    one of several factors to simplify the network.
  prefs: []
  type: TYPE_NORMAL
- en: Bayes Rule
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now that we have a basic understanding of elementary probability, let‚Äôs discuss
    a very important theorem called the Bayes rule. We take two events *A* and *B*
    to illustrate the theorem, but it can be generalized for any number of events.
  prefs: []
  type: TYPE_NORMAL
- en: We take *P*(*AB*)¬†=¬†*P*(*A*)*P*(*B*/*A*) from the product rule of probability.
    (1)
  prefs: []
  type: TYPE_NORMAL
- en: Similarly, *P*(*AB*)¬†=¬†*P*(*B*)*P*(*A*/*B*). (2)
  prefs: []
  type: TYPE_NORMAL
- en: Combining (1) and (2), we get
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ P(A)P\left(B/A\right)=P(B)P\left(A/B\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equcj.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ =&gt;P\left(A/B\right)=P(A)P\left(B/A\right)/P(B) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equck.png)'
  prefs: []
  type: TYPE_IMG
- en: The preceding deduced rule is called the Bayes rule, and it would come handy
    in many areas of machine learning, such as in computing posterior distribution
    from likelihood, using Markov chain models, maximizing a posterior algorithm,
    and so forth.
  prefs: []
  type: TYPE_NORMAL
- en: Probability Mass Function
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The probability mass function (pmf) of a random variable is a function that
    gives the probability of each discrete value that the random variable can take
    up. The sum of the probabilities must add up to 1.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, in a throw of a fair dice, let the number on the dice face be
    the random variable *X*.
  prefs: []
  type: TYPE_NORMAL
- en: 'Then, the pmf can be defined as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ P\left(X=i\right)=\frac{1}{6} i\in \left\{1,2,3,4,5,6\right\} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equcl.png)'
  prefs: []
  type: TYPE_IMG
- en: Probability Density Function
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The probability density function (pdf) gives the probability density of a continuous
    random variable at each value in its domain. Since it‚Äôs a continuous variable,
    the integral of the probability density function over its domain must be equal
    to 1.
  prefs: []
  type: TYPE_NORMAL
- en: Let *X* be a random variable with domain *D. P*(*x*) denotes it‚Äôs a probability
    density function, so that
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\int}_DP(x)\kern0.5em dx=1 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equcm.png)'
  prefs: []
  type: TYPE_IMG
- en: For example, the probability density function of a continuous random variable
    that can take up values from 0 to 1 is given by *P*(*x*)¬†=¬†2*x* where *x*¬†‚ąą¬†[0,
    1]. Let‚Äôs validate whether it is a probability density function.
  prefs: []
  type: TYPE_NORMAL
- en: For *P*(*x*) to be a probability density function, ![$$ {\int}_{x=0}^1P(x) dx
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq58.png) should
    be 1.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\int}_{x=0}^1P(x) dx=\kern0.5em {\int}_{x=0}^12 xdx ={\left[{x}^2\right]}_0^1=1
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq59.png). Hence,
    *P*(*x*) is a probability density function.'
  prefs: []
  type: TYPE_NORMAL
- en: One thing to be noted is that the integral computes the area under the curve,
    and since *P*(*x*) is a probability density function (pdf), the area under the
    curve for a probability curve should be equal to 1.
  prefs: []
  type: TYPE_NORMAL
- en: Expectation of a Random Variable
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Expectation of a random variable is nothing but the mean of the random variable.
    Let‚Äôs say the random variable *X* takes *n* discrete values, *x*[1],¬†*x*[2],‚Ä¶¬†*x*[*n*],
    with probabilities *p*[1],¬†*p*[2],¬†`‚Ä¶`¬†*p*[*n*]. In other words, *X* is a discrete
    random variable with pmf *P*(*X*¬†=¬†*x*[*i*])¬†=¬†*p*[*i*]. Then, the expectation
    of the random variable *X* is given by
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ E\left[X\right]={x}_1{p}_1+{x}_2{p}_2+\dots +{x}_n{p}_n =\sum \limits_{i=1}^n{x}_i{p}_i
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equcn.png)'
  prefs: []
  type: TYPE_IMG
- en: If *X* is a continuous random variable with a probability density function of
    *P*(*x*), the expectation of *X* is given by
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ E\left[X\right]={\int}_D xP(x)\kern0.5em dx $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equco.png)'
  prefs: []
  type: TYPE_IMG
- en: where *D* is the domain of *P*(*x*).
  prefs: []
  type: TYPE_NORMAL
- en: Variance of a Random Variable
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Variance of a random variable measures the variability in the random variable.
    It is the mean (expectation) of the squared deviations of the random variable
    from its mean (or expectation).
  prefs: []
  type: TYPE_NORMAL
- en: Let *X* be a random variable with mean *őľ*¬†=¬†*E*[*X*]
  prefs: []
  type: TYPE_NORMAL
- en: '*Var*[*X*]¬†=¬†*E*[(*X*¬†‚ąí¬†*őľ*)¬≤] where *őľ*¬†=¬†*E*[*X*]'
  prefs: []
  type: TYPE_NORMAL
- en: 'If *X* is a discrete random variable that takes *n* discrete values with a
    pmf given by *P*(*X*¬†=¬†*x*[*i*])¬†=¬†*p*[*i*], the variance of *X* can be expressed
    as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Var\left[X\right]=E\left[{\left(X-\mu \right)}^2\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equcp.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ =\sum \limits_{i=1}^n{\left({x}_i-\mu \right)}^2{p}_i $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equcq.png)'
  prefs: []
  type: TYPE_IMG
- en: 'If *X* is a continuous random variable having a probability density function
    of *P*(*x*), then *Var*[*X*] can be expressed as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Var\left[X\right]=\underset{D}{\int }{\left(x-\mu \right)}^2\kern0.5em
    P(x) dx $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equcr.png)'
  prefs: []
  type: TYPE_IMG
- en: where *D* is the domain of *P*(*x*).
  prefs: []
  type: TYPE_NORMAL
- en: Skewness and Kurtosis
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Skewness and Kurtosis are higher-order moment statistics for a random variable.
    Skewness measures the symmetry in a probability distribution, whereas Kurtosis
    measures whether the tails of the probability distribution are heavy or not. Skewness
    is a third-order moment and is expressed as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Skew(X)=\frac{E\Big[\left(X\kern0.5em -\kern0.5em \mu \Big){}^3\right]}{{\left(
    Var\left[X\right]\right)}^{3/2}} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equcs.png)'
  prefs: []
  type: TYPE_IMG
- en: A perfectly symmetrical probability distribution has a skewness of 0, as shown
    in the Figure [1-19](#Fig20). A positive value of skewness means that the bulk
    of the data is toward the left, as illustrated in Figure [1-20](#Fig21), while
    a negative value of skewness means the bulk of the data is toward the right, as
    illustrated in Figure [1-21](#Fig22).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig22_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The two-dimensional plane demonstrates a symmetric probability distribution
    curve with a negative value of skewness. The mean, median, and mode are indicated
    on the curve.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-21
  prefs: []
  type: TYPE_NORMAL
- en: Probability distribution with negative skewness
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig21_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The two-dimensional plane demonstrates a symmetric probability distribution
    curve with a positive value of skewness. The mean, median, and mode, are indicated
    on the curve.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-20
  prefs: []
  type: TYPE_NORMAL
- en: Probability distribution with positive skewness
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig20_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The two-dimensional plane demonstrates a symmetric probability distribution
    curve with zero skewness. The mean equals the median, which equals the mode, as
    indicated on the curve.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-19
  prefs: []
  type: TYPE_NORMAL
- en: Symmetric probability distribution
  prefs: []
  type: TYPE_NORMAL
- en: 'Kurtosis is a fourth-order statistic, and for a random variable *X* with a
    mean of *őľ*, it can be expressed as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Kurt(X)=E\left[{\left[X\kern0.5em -\kern0.5em \mu \right]}^4\right]/{\left(
    Var\left[X\right]\right)}^2 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equct.png)'
  prefs: []
  type: TYPE_IMG
- en: Higher Kurtosis leads to heavier tails for a probability distribution, as we
    can see in Figure [1-23](#Fig24). The Kurtosis for a normal distribution (see
    Figure [1-22](#Fig23)) is 3\. However, to measure the Kurtosis of other distributions
    in terms of a normal distribution, one generally refers to excess Kurtosis, which
    is the actual Kurtosis minus the Kurtosis for a normal distribution‚ÄĒi.e., 3.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig24_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The graph displays the curve of the heavier tail for a student's T distribution
    with kurtosis equal to infinite.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-23
  prefs: []
  type: TYPE_NORMAL
- en: Student‚Äôs T distribution with Kurtosis = ‚ąě
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig23_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The graph displays the curve for a standard normal distribution with Kurtosis
    equal to 3.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-22
  prefs: []
  type: TYPE_NORMAL
- en: Standard normal distribution with Kurtosis = 3
  prefs: []
  type: TYPE_NORMAL
- en: Covariance
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The covariance between two random variables *X* and *Y* is a measure of their
    joint variability. The covariance is positive if higher values of *X* correspond
    to higher values of *Y* and lower values of *X* correspond to lower values of
    *Y*. On the other hand, if higher values of *X* correspond to lower values of
    *Y* and lower values of *X* correspond to higher values of *Y,* then the covariance
    is negative.
  prefs: []
  type: TYPE_NORMAL
- en: 'The formula for covariance of *X* and *Y* is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '*cov*(*X*, *Y*)¬†=¬†*E*[*X*¬†‚ąí¬†*u*[*x*]][*Y*¬†‚ąí¬†*u*[*y*]] where *u*[*x*]¬†=¬†*E*[*X*],‚Äā*u*[*y*]¬†=¬†*E*[*Y*]'
  prefs: []
  type: TYPE_NORMAL
- en: 'On simplification of the preceding formula, an alternate is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \mathit{\operatorname{cov}}\left(X,Y\right)=E\left[ XY\right]-{u}_x{u}_y
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equcu.png)'
  prefs: []
  type: TYPE_IMG
- en: If two variables are independent, their covariance is zero since *E*[*XY*]¬†=¬†*E*[*X*]*E*[*Y*]¬†=¬†*u*[*x*]*u*[*y*]
  prefs: []
  type: TYPE_NORMAL
- en: Correlation Coefficient
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The covariance in general does not provide much information about the degree
    of association between two variables, because the two variables maybe on very
    different scales. Getting a measure of the linear dependence between two variables‚Äô
    correlation coefficients, which is a normalized version of covariance, is much
    more useful.
  prefs: []
  type: TYPE_NORMAL
- en: 'The correlation coefficient between two variables *X* and *Y* is expressed
    as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \rho =\frac{\mathit{\operatorname{cov}}\left(X,Y\right)}{\sigma_x{\sigma}_y}
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equcv.png)'
  prefs: []
  type: TYPE_IMG
- en: where *ŌÉ*[*x*] and *ŌÉ*[*y*] are the standard deviation of *X* and *Y,* respectively.
    The value of *ŌĀ* lies between ‚ąí1 and +1.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [1-24](#Fig25) illustrates both positive and negative correlations between
    two variables *X* and *Y*.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig25_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The two two-dimensional planes of y versus x. It represents two straight lines,
    one rising and the other falling, for correlation coefficients of 1 and negative
    1, respectively.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-24
  prefs: []
  type: TYPE_NORMAL
- en: Plot of variables with correlation coefficients of +1 and -1
  prefs: []
  type: TYPE_NORMAL
- en: Some Common Probability Distribution
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this section, we will go through some of the common probability distributions
    that are frequently used in the machine-learning and deep-learning domains.
  prefs: []
  type: TYPE_NORMAL
- en: Uniform Distribution
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'The probability density function for a uniform distribution is constant. For
    a continuous random variable that takes up values between *a* and *b*(*b*¬†>¬†*a*),
    the probability density function is expressed as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ P\left(X=x\right)=f(x)= \left\{\begin{array}{c}1/\left(b\kern0.5em -\kern0.5em
    a\right) for x\kern0.5em \in \kern0.5em \left[a,b\right]\\ {} 0 elsewhere \end{array}\right.
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equcw.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Illustrated in Figure [1-25](#Fig26) is the probability density curve for a
    uniform distribution. The different statistics for a uniform distribution are
    outlined here:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ E\left[X\right]=\frac{\left(b+a\right)}{2} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equcx.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ Median\left[X\right]=\frac{\left(b+a\right)}{2} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equcy.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ Mode\left[X\right]\kern1em = All\kern0.5em points\kern0.5em in\kern0.5em
    the\kern0.5em in terval\kern0.5em a\kern0.5em to\kern0.5em b $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equcz.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ Var\left[X\right] ={\left(b\kern0.5em -\kern0.5em a\right)}^2/12 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equda.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ Skew\left[X\right]\kern1em =0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equdb.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ Excessive\kern0.5em Kurt\left[X\right]=-6/5 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equdc.png)'
  prefs: []
  type: TYPE_IMG
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig26_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The function of x versus x in a two-dimensional plane. It is made up of a horizontal
    straight line for 1, divided by b minus a, with ends projected on the X-axis at
    a and b.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-25
  prefs: []
  type: TYPE_NORMAL
- en: Uniform probability distribution
  prefs: []
  type: TYPE_NORMAL
- en: Please note that the excess Kurtosis is the actual Kurtosis minus 3, 3 being
    the actual Kurtosis for a normal distribution. Hence, the excess Kurtosis is the
    relative Kurtosis with respect to a normal distribution.
  prefs: []
  type: TYPE_NORMAL
- en: Normal Distribution
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'This is probably the most important scenario for probability distribution in
    the real world. In a normal distribution, the maximum probability density is at
    the mean of the distribution, and the density falls symmetrically and exponentially
    to the square of the distance from the mean. The probability density function
    of a normal distribution can be expressed as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ P\left(X=x\right)=\frac{1}{\sqrt{2\pi}\kern0.5em \sigma }{e}^{\frac{-{\left(x-\mu
    \right)}^2}{2{\sigma}^2}} \operatorname{}\operatorname{}-\infty &lt;x&lt;+\infty
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equdd.png)'
  prefs: []
  type: TYPE_IMG
- en: where *őľ* is the mean and *ŌÉ*¬≤ is the variance of the random variable *X*. Illustrated
    in Figure [1-26](#Fig27) is the probability density function of a univariate normal
    distribution.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig27_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The graph demonstrates a symmetrical normal probability distribution with eight
    parts. It is made up of 0.1 percent, 2.1 percent, 13.6 percent, and 34.1 percent.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-26
  prefs: []
  type: TYPE_NORMAL
- en: Normal probability distribution
  prefs: []
  type: TYPE_NORMAL
- en: 'As shown in Figure [1-26](#Fig27), 68.2% of the data in a normal distribution
    falls within one standard deviation (+1/-1ŌÉ) of the mean, and around 95.4% of
    the data is expected to fall within +2/-2ŌÉ of the mean. The important statistics
    for a normal distribution are outlined here:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ E\left[X\right]=\mu $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equde.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ Median\left[X\right] = \mu $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equdf.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ Mode\left[X\right]=\mu $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equdg.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ Var\left[X\right]= {\sigma}^2 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equdh.png)'
  prefs: []
  type: TYPE_IMG
- en: Skew[X] = 0
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Excess\kern0.5em Kurt\left[X\right]=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equdi.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Any normal distribution can be transformed into a standard normal distribution
    by using the following transformation:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ z=\frac{\left(x\kern0.5em -\mu \right)}{\sigma } $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equdj.png)'
  prefs: []
  type: TYPE_IMG
- en: The mean and standard deviation for the standard normal random variable *z*
    are 0 and 1, respectively. The standard normal distribution is used a lot in statistical
    inference tests. Similarly, in linear regression, the errors are assumed to be
    normally distributed.
  prefs: []
  type: TYPE_NORMAL
- en: Multivariate Normal Distribution
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: A multivariate normal distribution, or Gaussian distribution in *n* variables
    denoted by vector *x*¬†‚ąą¬†*R*^(*n*¬†√ó¬†1), is the joint probability distribution of
    the associated variables parameterized by the mean vector *őľ*¬†‚ąą¬†*R*^(*n*¬†√ó¬†1)
    and covariance matrix ő£¬†‚ąą¬†*R*^(*n*¬†√ó¬†*n*).
  prefs: []
  type: TYPE_NORMAL
- en: 'The probability density function (pdf) of a multivariate normal distribution
    is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ P\left(x/\mu; \varSigma \right)=\frac{1}{{\left(2\uppi \right)}^{n/2}{\left|\varSigma
    \right|}^{-1/2}}{e}^{-\frac{1}{2}{\left(x-\mu \right)}^T{\varSigma}^{-1}\kern0.5em
    \left(x-\mu \right)} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equdk.png)'
  prefs: []
  type: TYPE_IMG
- en: where *x*¬†=¬†[*x*[1]*x*[2]‚Ä¶*x*[*n*]]^(*T*)
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ -\infty &lt;{x}_i&lt;+\infty \forall i\kern0.5em \in \left\{1,2,3,..n\right\}
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equdl.png)'
  prefs: []
  type: TYPE_IMG
- en: Illustrated in Figure [1-27](#Fig28) is the probability density function of
    a multivariate normal distribution. A multivariate normal distribution, or Gaussian
    distribution, has several applications in machine learning. For instance, for
    multivariate input data that has correlation, the input features are often assumed
    to follow multivariate normal distribution, and based on the probability density
    function, points with low probability density are tagged as anomalies. Also, multivariate
    normal distributions are widely used in a mixture of Gaussian models wherein a
    data point with multiple features is assumed to belong to several multivariate
    normal distributions with different probabilities. Mixtures of Gaussians are used
    in several areas, such as clustering, anomaly detection, hidden Markov models,
    and so on.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig28_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The three-dimensional planes of x, y, and the functions of x and y. It displays
    a mesh-like structure on the X-Y plane with a steep rise in the center along the
    third axis.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-27
  prefs: []
  type: TYPE_NORMAL
- en: Multivariate normal distribution in two variables
  prefs: []
  type: TYPE_NORMAL
- en: Bernoulli Distribution
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: An experiment in which the two outcomes are mutually exclusive and exhaustive
    (the sum of probability of the two outcomes is 1) is called a Bernoulli trail.
  prefs: []
  type: TYPE_NORMAL
- en: 'A Bernoulli trail follows a Bernoulli distribution. Let‚Äôs say in a Bernoulli
    trail the two outcomes are success and failure. If the probability of success
    is *p* then, since these two events exhaust the sample space, the probability
    of failure is 1 ‚Äď *p*. Let *x*¬†=¬†1 denote success. Thus, the probability of success
    or failure can be denoted as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ P\left(X=x\right)=f(x)={p}^x{\left(1\kern0.5em -\kern0.5em p\right)}^{\left(1-x\right)}\kern1em
    x\kern0.5em \in \kern0.5em \left\{0,1\right\} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equdm.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The preceding expression for *P*(*X*¬†=¬†*x*) denotes the probability mass function
    of a Bernoulli distribution. The expectation and variance of the probability mass
    function are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ E\left[X\right]=p $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equdn.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ Var\left[X\right]=p\left(1-p\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equdo.png)'
  prefs: []
  type: TYPE_IMG
- en: The Bernoulli distribution can be extended to multiclass events that are mutually
    exclusive and exhaustive. Any two-class classification problem can be modeled
    as a Bernoulli trail. For instance, the logistic regression likelihood function
    is based on a Bernoulli distribution for each training data point, with the probability
    *p* being given by the sigmoid function.
  prefs: []
  type: TYPE_NORMAL
- en: Binomial Distribution
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'In a sequence of Bernoulli trails, we are often interested in the probability
    of the total number of successes and failures instead of the actual sequence in
    which they occur. If in a sequence of *n* successive Bernoulli trails *x* denotes
    the number of successes, then the probability of *x* successes out of *n* Bernoulli
    trails can be expressed by a probability mass function denoted by as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ P\left(X=x\right)=\left(\begin{array}{c}n\\ {}x\end{array}\right){p}^x{\left(1-p\right)}^{\left(n-x\right)}
    x\kern0.5em \in \left\{0,1,2\dots, n\right\} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equdp.png)'
  prefs: []
  type: TYPE_IMG
- en: where *p* is the probability of success.
  prefs: []
  type: TYPE_NORMAL
- en: 'The expectation and variance of the distribution are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ E\left[X\right]= np $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equdq.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ Var\left[X\right]= np\left(1-p\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equdr.png)'
  prefs: []
  type: TYPE_IMG
- en: Illustrated in Figure [1-28](#Fig29) is the probability mass function of a binomial
    distribution with *n*¬†=¬†4 and *p*¬†=¬†0.3.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig29_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The graph of the function of x versus x. It demonstrates five nodes and projects
    them on the X-axis at 0, 1, 2, 3, and 4.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-28
  prefs: []
  type: TYPE_NORMAL
- en: Probability mass function of a binomial distribution with n=4 and p = 0.3
  prefs: []
  type: TYPE_NORMAL
- en: Poisson Distribution
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Whenever the rate of some quantity is of concern, like the number of defects
    in a 1000-product lot, the number of alpha particles emitted by a radioactive
    substance in the previous four-hour duration, and so on, Poisson distribution
    is generally the best way to represent such phenomenon. The probability mass function
    for Poisson distribution is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ P\left(X=x\right)=\frac{e^{-\lambda }{\lambda}^x}{x!} where\kern0.5em
    x\kern0.5em \in \kern0.5em \left\{0,1,2,\dots \dots \dots \infty \right\} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equds.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ E\left[X\right]=\lambda $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equdt.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ Var\left[X\right]=\lambda $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equdu.png)'
  prefs: []
  type: TYPE_IMG
- en: Illustrated in Figure [1-29](#Fig30) is the probability mass function of a Poisson
    distribution with mean of *őĽ*¬†=¬†15.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig30_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The graph of the function of x versus x. It demonstrates thirty nodes and projects
    them on the X-axis, and makes a symmetrical probability distribution curve.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-29
  prefs: []
  type: TYPE_NORMAL
- en: Probability mass function of a Poisson distribution with mean = 15
  prefs: []
  type: TYPE_NORMAL
- en: Beta Distribution
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Beta distribution comes up several times in machine learning especially in
    Bayesian analysis for defining Priors over parameters as we will see later. It
    is characterized by two parameters *őĪ* and *ő≤*, and the probability density function
    of a variable X following gamma distribution can be represented as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ f\left(X=x;\alpha; b\right)=\frac{x^{\alpha -1}{\left(1-x\right)}^{\beta
    -1}\ }{B\left(\alpha, \beta \right)};\alpha &gt;0,\beta &gt;0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equdv.png)'
  prefs: []
  type: TYPE_IMG
- en: The domain of X is from 0 to 1, and hence it helps us define distribution over
    parameters *őł*¬†‚ąą¬†[0, 1]. In Bayesian analysis, it is used to define distribution
    over the probabilities as probabilities lie between 0 and 1.
  prefs: []
  type: TYPE_NORMAL
- en: 'The function *B*(*őĪ*, *ő≤*) is a normalization factor in the density function
    and is given by the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ B\left(\alpha, \beta \right)=\frac{\tau \left(\alpha \right)\tau \left(\beta
    \right)}{\tau \left(\alpha +\beta \right)} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equdw.png)'
  prefs: []
  type: TYPE_IMG
- en: '*ŌĄ* is called the gamma function and for any positive integer n *ŌĄ*(*n*)¬†=¬†(*n*¬†‚ąí¬†1)!'
  prefs: []
  type: TYPE_NORMAL
- en: 'When *őĪ*¬†=¬†1; *ő≤*¬†=¬†1¬†, then the beta distribution represents a uniform distribution
    as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \left(X=x;\alpha; b\right)=\frac{x^{1-1}{\left(1-x\right)}^{1-1}\ }{B\left(1,1\right)}
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equdx.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ =\frac{x^0{\left(1-x\right)}^0}{1}=1 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equdy.png)'
  prefs: []
  type: TYPE_IMG
- en: The probability density function for different values of *őĪ*, *ő≤* is illustrated
    in Figure [1-30](#Fig31).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig31_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The graph of the function of x versus x. It demonstrates five curves for different
    value combinations of alpha and beta.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-30
  prefs: []
  type: TYPE_NORMAL
- en: Probability density function of beta distribution for different alpha and beta
    values
  prefs: []
  type: TYPE_NORMAL
- en: Dirichlet Distribution
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The Dirichlet distribution is the multivariate equivalent of the beta distribution
    and is characterized by a vector of parameters *őĪ*¬†=¬†[*őĪ*[1], *őĪ*[2], ‚Ä¶*őĪ*[*k*]]
    where k is the number of variables involved in the Dirichlet distribution.
  prefs: []
  type: TYPE_NORMAL
- en: 'If *X*[1], *X*[2], ‚Ä¶*X*[*k*] are the k random variables such that ![$$ \sum
    \limits_{i=1}^k{x}_i=1 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq60.png),
    then the Dirichlet distribution is defined as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ f\left({X}_1={x}_1,{X}_2={x}_2;..;{X}_k={x}_k;\alpha \right)=\frac{1}{B\left(\alpha
    \right)}\prod \limits_{i=1}^k{x}_i^{\alpha_i-1} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equdz.png)'
  prefs: []
  type: TYPE_IMG
- en: '*B*(*őĪ*) much like in the beta distribution can be expressed in terms of Gamma
    function as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ B\left(\alpha \right)=\frac{\prod \limits_{i=1}^k\tau \left({\alpha}_i\right)}{\tau
    \left(\sum \limits_{i=1}^k{\alpha}_i\right)} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equea.png)'
  prefs: []
  type: TYPE_IMG
- en: In Bayesian statistics, the Dirichlet distribution is generally used to express
    a prior probability distribution over the probabilities of a multinomial distribution.
    As we know for a multinomial distribution, the probabilities of the different
    events ![$$ \sum \limits_{i=1}^k{x}_i $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq61.png)
    should sum to 1 which is the constraint on the random variables for a Dirichlet
    distribution.
  prefs: []
  type: TYPE_NORMAL
- en: Gamma Distribution
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'The gamma distribution of a random variable X is characterized by two parameters:
    *őĪ* and *ő≤*. Its probability density function is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ f\left(X=x;\alpha, \beta \right)=\frac{1}{\tau \left(\alpha \right)}{\beta}^{\alpha
    }{x}^{\alpha -1}{e}^{-\beta\ x}\kern0.5em ;x&gt;0\ \alpha, \beta &gt;0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equeb.png)'
  prefs: []
  type: TYPE_IMG
- en: The gamma distribution is often used to model time to failure of machine, time
    to next earthquake, and time to loan defaults, among other things.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig32_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The graph of the function of x versus x. It demonstrates three curves for different
    value combinations of alpha and beta. The curve rises abruptly, then falls abruptly,
    and then continues at the same level.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-31
  prefs: []
  type: TYPE_NORMAL
- en: Probability density function of gamma distribution for different alpha and beta
    values
  prefs: []
  type: TYPE_NORMAL
- en: The gamma probability density function corresponding to different pairs of *őĪ*,
    *ő≤* is illustrated in Figure [1-31](#Fig32).
  prefs: []
  type: TYPE_NORMAL
- en: Likelihood Function
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Likelihood is the probability of the observed data given the parameters that
    generate the underlying data. Let‚Äôs suppose we observe *n* observations *x*[1],¬†*x*[2],‚Ä¶*x*[*n*]
    and assume that the observations are independent and identically normally distributed
    with mean *őľ* and variance *ŌÉ*¬≤.
  prefs: []
  type: TYPE_NORMAL
- en: 'The likelihood function in this case would be as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ P\left( Data/ Model\kern0.5em parameters\right)=P\left({x}_1,{x}_2,..\dots
    {x}_n/\kern0.5em \mu, \kern0.5em {\sigma}^2\kern0.5em \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equec.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Since the observations are independent, we can factorize the likelihood as
    follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ P\left( Data/ Model\kern0.5em parameters\right)=\prod \limits_{i=1}^nP\left({x}_i/\kern0.5em
    \mu, \kern0.5em {\sigma}^2\kern0.5em \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equed.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Each of the *x*[*i*]~*Normal*(*őľ*, *ŌÉ*¬≤); hence, the likelihood can be further
    expanded as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ P\left( Data/ Modelparameters\right)=\prod \limits_{i=1}^n\frac{1}{\sqrt{2\pi}\sigma
    }{e}^{\frac{-{\left({x}_i-\mu \right)}^2}{2{\sigma}^2}} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equee.png)'
  prefs: []
  type: TYPE_IMG
- en: Maximum Likelihood Estimate
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Maximum likelihood estimate (MLE) is a technique for estimating the parameters
    of a distribution or model. This is achieved by deriving the parameters that would
    maximize the likelihood function‚ÄĒi.e., maximize the probability of observing the
    data given the parameters of the model. Let‚Äôs work through an example to understand
    maximum likelihood estimates.
  prefs: []
  type: TYPE_NORMAL
- en: Suppose Adam tosses a coin ten times and observes seven heads and three tails.
    Also, assume that the tosses are independent and identical. What would be the
    maximum likelihood estimate for the probability of heads for the given coin?
  prefs: []
  type: TYPE_NORMAL
- en: Each toss of a coin is a Bernoulli trial, with the probability of heads being,
    let us say, *p*, which is an unknown parameter that we want to estimate. Also,
    let the event that a toss produces heads be denoted by 1 and tails by 0.
  prefs: []
  type: TYPE_NORMAL
- en: 'The likelihood function can be represented as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ P\left( Data/ parameter\right)=L(p)=P\left({x}_1,{x}_2,..\dots {x}_{10}/\kern0.5em
    p\kern0.5em \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equef.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ =\prod \limits_{i=1}^{10}P\left({x}_i/\kern0.5em p\kern0.5em \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equeg.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ = {p}^7{\left(1\kern0.5em -\kern0.5em p\right)}^3 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equeh.png)'
  prefs: []
  type: TYPE_IMG
- en: Just for clarification, let us see how the likelihood *L* came to be *p*‚Ā∑(1
    ‚Äď *p*)¬≥.
  prefs: []
  type: TYPE_NORMAL
- en: For each head, the probability from the Bernoulli distribution is *P*(*x*[*i*]¬†=¬†1/‚Äā*p*)¬†=¬†*p*¬Ļ(1¬†‚ąí¬†*p*)‚Āį¬†=¬†*p*.
    Similarly, for each tails, the probability is *P*(*x*[*i*]¬†=¬†0/‚Äā*p*)¬†=¬†*p*‚Āį(1¬†‚ąí¬†*p*)¬Ļ¬†=¬†1¬†‚ąí¬†*p*.
    As we have seven heads and three tails, we get the likelihood *L*(*p*) to be *p*‚Ā∑(1
    ‚Äď *p*)¬≥.
  prefs: []
  type: TYPE_NORMAL
- en: To maximize the likelihood *L*, we need to take the derivate of *L* with respect
    to *p* and set it to 0.
  prefs: []
  type: TYPE_NORMAL
- en: Now, instead of maximizing the likelihood *L*(*p*), we can maximize the logarithm
    of the likelihood‚ÄĒi.e., *logL*(*p*). Since logarithmic is a monotonically increasing
    function, the parameter value that maximizes *L*(*p*) would also maximize *logL*(*p*).
    Taking the derivative of the log of the likelihood is mathematically more convenient
    than taking the derivative of the product form of the original likelihood.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ logL(p)=7 logp+3\mathit{\log}\left(1\kern0.5em -\kern0.5em p\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equei.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Taking the derivative of both sides and setting it to zero look as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{dLog\left(L(p)\right)}{dp}=\frac{7}{p}-\frac{3}{1\kern0.5em -\kern0.5em
    p}=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equej.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ =&gt;p=7/10 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equek.png)'
  prefs: []
  type: TYPE_IMG
- en: Interested readers can compute the second derivative ![$$ \frac{d^2 Log(L)}{dp^2}
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq62.png) at ![$$
    p=\frac{7}{10} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq63.png);
    you will for sure get a negative value, confirming that ![$$ p=\frac{7}{10\kern0.5em
    } $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq64.png) is
    indeed the point of maxima.
  prefs: []
  type: TYPE_NORMAL
- en: Some of you would have already had ![$$ \frac{7}{10\kern0.5em } $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq65.png)
    in mind without even going through maximum likelihood, just by the basic definition
    of probability. As you will see later, with this simple method, a lot of complex
    model parameters are estimated in the machine-learning and deep-learning world.
  prefs: []
  type: TYPE_NORMAL
- en: Let us look at another little trick that might come in handy while working on
    optimization. Computing the maxima of a function *f*(*x*) is the same as computing
    the minima for the function ‚ąí*f*(*x*). The maxima for *f*(*x*) and the minima
    for ‚ąí*f*(*x*) would take place at the same value of *x*. Similarly, the maxima
    for *f*(*x*) and the minima for 1/*f*(*x*) would happen at the same value of *x*.
  prefs: []
  type: TYPE_NORMAL
- en: Often in machine-learning and deep-learning applications, we use advanced optimization
    packages, which only know to minimize a cost function to compute the model parameters.
    In such cases, we conveniently convert the maximization problem to a minimization
    problem by either changing the sign or taking the reciprocal of the function,
    whichever makes more sense. For example, in the preceding problem, we could have
    taken the negative of the log likelihood function‚ÄĒi.e.,‚Äā*LogL*(*p*)‚ÄĒand minimized
    it; we would have gotten the same probability estimate of 0.7.
  prefs: []
  type: TYPE_NORMAL
- en: Hypothesis Testing and p Value
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Often, we need to do some hypothesis testing based on samples collected from
    a population. We start with a null hypothesis and, based on the statistical test
    performed, accept the null hypothesis or reject it.
  prefs: []
  type: TYPE_NORMAL
- en: Before we start with hypothesis testing, let us first consider one of the core
    fundamentals in statistics, which is the Central Limit theorem.
  prefs: []
  type: TYPE_NORMAL
- en: Let *x*[1],¬†*x*[2],¬†*x*[3],. ‚Ä¶.. , *x*[*n*] be the *n* independent and identically
    distributed observation of a sample from a population with mean *őľ* and finite
    variance *ŌÉ*¬≤.
  prefs: []
  type: TYPE_NORMAL
- en: The sample mean denoted by ![$$ \overline{x} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq66.png)
    follows normal distribution, with mean *őľ* and variance ![$$ \frac{\sigma^2}{n}
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq67.png); i.e.,
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \overline{x} \sim Normal\left(\mu, \frac{\sigma^2}{n}\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq68.png)
    where ![$$ \overline{x}=\frac{x_1+{x}_2+{x}_3+\dots +{x}_{n\kern0.5em }}{n} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq69.png)'
  prefs: []
  type: TYPE_IMG
- en: This is called the Central Limit theorem. As the sample size *n* increases,
    the variance of ![$$ \overline{x} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq70.png)
    reduces and tends toward zero as *n*¬†‚Üí¬†‚ąě.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [1-32](#Fig33) illustrates a population distribution and a distribution
    of the mean of samples of fixed size *n* drawn from the population.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig33_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Two probability distribution curves for population distribution and sample mean
    distribution. The mean, standard deviation, and sample mean are marked with symbols.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-32
  prefs: []
  type: TYPE_NORMAL
- en: Distribution for population and distribution for sample mean
  prefs: []
  type: TYPE_NORMAL
- en: Please note that the sample mean follows normal distribution irrespective of
    whether the population variable is normally distributed or not. Now, let us consider
    a simple hypothesis-testing problem.
  prefs: []
  type: TYPE_NORMAL
- en: Boys who are 10 years old are known to have a mean weight of 85 pounds, with
    a standard deviation of 11.6\. Boys in one county are checked as to whether they
    are obese. To test this, the mean weight of a group of 25 random boys from the
    county is collected. The mean weight is found to be 89.16 pounds.
  prefs: []
  type: TYPE_NORMAL
- en: We would have to form a null hypothesis and would reject it through the test
    if the evidence against the null hypothesis were strong enough.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let us consider the null hypothesis: *H*[0]. The children in the county are
    not obese, i.e., they come from the same population with a mean of *őľ*¬†=¬†85.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Under the null hypothesis *H*[0], the sample mean is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \overline{x}\sim Normal\left(\Big(85,\frac{11.6^2}{25}\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equel.png)'
  prefs: []
  type: TYPE_IMG
- en: The closer the sample mean observed is to the population mean, the better it
    is for the null hypothesis to be true. On the other hand, the further the sample
    mean observed is away from the population mean, the stronger the evidence is against
    the null hypothesis.
  prefs: []
  type: TYPE_NORMAL
- en: The standard normal variate ![$$ z=\left(\overline{x}-\mu \right)/\Big({\sigma}^2/n
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq71.png) = ![$$
    \left(89.16-85\right)/\Big(11.6/\sqrt{25\Big)} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq72.png)
    = +1.75
  prefs: []
  type: TYPE_NORMAL
- en: For every hypothesis test, we determine a *p* value. The *p* value of this hypothesis
    test is the probability of observing a sample mean that is further away from what
    is observed, i.e., ![$$ P\left(\overline{x}\kern0.5em \ge 89.16\right)\kern0.5em
    \textrm{or}\kern0.5em P\left(z\ge 1.75\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq73.png).
    So, the smaller the *p* value is, the stronger the evidence is against the null
    hypothesis.
  prefs: []
  type: TYPE_NORMAL
- en: When the *p* value is less than a specified threshold percentage *őĪ*, which
    is called the type-1 error, the null hypothesis is rejected.
  prefs: []
  type: TYPE_NORMAL
- en: Please note that the deviation of the sample mean from the population can be
    purely the result of randomness since the sample mean has finite variance *ŌÉ*¬≤/*n*.
    The *őĪ* gives us a threshold beyond which we should reject the null hypothesis
    even when the null hypothesis is true. We might be wrong, and the huge deviation
    might just be because of randomness. But the probability of that happening is
    very small, especially if we have a large sample size, since the sample mean standard
    deviation reduces significantly. When we do reject the null hypothesis even if
    the null hypothesis is true, we commit a type-1 error, and hence *őĪ* gives us
    the probability of a type-1 error.
  prefs: []
  type: TYPE_NORMAL
- en: The *p* value for this test is *P*(*Z*‚Äā¬†‚Č•‚Äā1.75)¬†=¬†0.04
  prefs: []
  type: TYPE_NORMAL
- en: The type-1 error *őĪ* that one should choose depends on one‚Äôs knowledge of the
    specific domain in which the test is performed. The type-1 error denotes the probability
    of rejecting the null hypothesis given that the null hypothesis is true. In practice,
    *őĪ*¬†=¬†0.05 is a good enough type-1 error setting. Basically, we are taking a chance
    of only 5% of rejecting the null hypothesis by mistake. Since the *p* value computed
    is less than the type-1 error specified for the test, we cannot accept the null
    hypothesis. We say the test is statistically significant. The *p* value has been
    illustrated in Figure [1-33](#Fig34).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig34_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The graph displays a symmetrical probability distribution curve. After z equals
    1.75, the areas are shaded.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-33
  prefs: []
  type: TYPE_NORMAL
- en: Z test showing p value
  prefs: []
  type: TYPE_NORMAL
- en: The dark-colored area corresponds to the *p* value, i.e., *P*(*z*‚Äā¬†‚Č•‚Äā1.75).
    *Z*[1¬†‚ąí¬†*őĪ*] corresponds to the *z* value beyond which we are likely to commit
    a type-1 error given the null hypothesis is true. The area beyond *z*[1¬†‚ąí¬†*őĪ*]‚ÄĒi.e.,
    *P*(*z*‚Äā¬†‚Č•‚Äā*Z*[1¬†‚ąí¬†*őĪ*])‚ÄĒstands for the type-1 error probability. Since the *p*
    value is less than the type-1 error probability for the test, the null hypothesis
    cannot be taken as true. A *Z* test such as this is generally followed up by another
    good practice‚ÄĒthe confidence interval test.
  prefs: []
  type: TYPE_NORMAL
- en: Also, the preceding test, popularly known as the *Z* test, is not always possible
    unless we have the population variance provided to us. For certain problems, we
    might not have the population variance. In such cases, the student T-test is more
    convenient since it uses sample variances instead of population variances.
  prefs: []
  type: TYPE_NORMAL
- en: The reader is encouraged to explore further regarding these statistical tests.
  prefs: []
  type: TYPE_NORMAL
- en: Formulation of Machine-Learning Algorithm and Optimization Techniques
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The aim of modeling is to minimize the cost function of the model parameters
    given the data by using different optimization techniques. One may ask that if
    we set the derivative or gradient of the cost function to zero, we would have
    the model parameters. This is not always possible, since all solutions might not
    have a closed-form solution, or the closed-form solution might be computationally
    expensive or intractable. Further, when the data size is huge, there would be
    memory constraints when going for a closed-form solution. Hence, iterative methods
    are generally used for complex optimization problems.
  prefs: []
  type: TYPE_NORMAL
- en: 'Machine learning can be broadly classified into two types:'
  prefs: []
  type: TYPE_NORMAL
- en: Supervised machine learning
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Unsupervised machine learning
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There is another paradigm of learning called reinforcement learning which has
    got lot of traction in the last few years. We will discuss on its generalized
    formulation later in this chapter.
  prefs: []
  type: TYPE_NORMAL
- en: Supervised Learning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In supervised learning, each training data point is associated with several
    input features‚ÄĒtypically an input feature vector and its corresponding label.
    A model is constructed with several parameters that try to predict the output
    label given the input feature vector. The model parameters are derived by optimizing
    some form of cost function that is based on the error of prediction, i.e., the
    discrepancy between the actual labels and the predicted labels for the training
    data points. Alternatively, maximizing the likelihood of the training data would
    also provide us with the model parameters.
  prefs: []
  type: TYPE_NORMAL
- en: Linear Regression as a Supervised Learning Method
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: We might have a dataset that has the prices for houses as the target variable
    or output label, whereas features like area of the house, number of bedrooms,
    number of bathrooms, and so forth are its input feature vector. We can define
    a function that would predict the price of the house based on the input feature
    vector.
  prefs: []
  type: TYPE_NORMAL
- en: Let the input feature vector be represented by *x*‚Ä≤ and the predicted value
    be *y*[*p*]. Let the actual value of the housing price‚ÄĒi.e., the output label‚ÄĒbe
    denoted by *y*. We can define a model where the output label is expressed as a
    function of the input feature vector, as shown in the following equation. The
    model is parameterized by several constants that we wish to learn via the training
    process.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ y\mid {x}^{\prime }={\theta^{\prime}}^T{x}^{\prime }+b+\epsilon $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equem.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Here *ŌĶ* is the random variation in prediction that can be modeled to be generated
    from zero mean finite variance Gaussian distribution, and hence we can write the
    following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \epsilon \sim N\left(0,{\sigma}^2\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equen.png)'
  prefs: []
  type: TYPE_IMG
- en: So, the housing price given an input *y* given *x*, i.e., *y*¬†‚ą£¬†*x*, is a linear
    combination of the input vector *x*‚Ä≤ plus a bias term *b* and a random component
    *ŌĶ*, which follows a normal distribution with a 0 mean and a finite variance of
    *ŌÉ*¬≤.
  prefs: []
  type: TYPE_NORMAL
- en: As *ŌĶ* is a random component, it cannot be predicted, and the best we can predict
    is the mean of housing prices given a feature value, i.e.,
  prefs: []
  type: TYPE_NORMAL
- en: The predicted value *y*[*p*]¬†‚ą£¬†*x*¬†=¬†*E*[*y*| *x*]¬†=¬†*őł‚Ä≤*^(*T*)*x*‚Ä≤¬†+¬†*b*
  prefs: []
  type: TYPE_NORMAL
- en: Here, *őł*‚Ä≤ is the linear combiner and *b* is the bias or the intercept. Both
    *őł*‚Ä≤ and *b* are the model parameters that we wish to learn. We can express *y*[*p*]¬†=¬†*őł*^(*T*)*x*,
    where the bias has been added to the model parameter corresponding to the constant
    feature 1\. This small trick makes the representation simpler.
  prefs: []
  type: TYPE_NORMAL
- en: Let us say we have *m* samples (*x*^((1)),¬†*y*^((1))),¬†`(`*x*^((2)),¬†*y*^((2)))....¬†`(`*x*^((*m*)),¬†*y*^((*m*))).
    We can compute a cost function that takes the sum of the squares of the difference
    between the predicted and the actual values of the housing prices and try to minimize
    it to derive the model parameters.
  prefs: []
  type: TYPE_NORMAL
- en: 'The cost function can be defined as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ C\left(\theta \right)=\sum \limits_{i=1}^m{\left({\theta}^T{x}_i-{y}^{(i)}\right)}^2
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equeo.png)'
  prefs: []
  type: TYPE_IMG
- en: We can minimize the cost function with respect to *őł* to determine the model
    parameter. This is a linear regression problem where the output label or target
    is continuous. Regression falls under the supervised class of learning. Figure
    [1-34](#Fig35) illustrates the relationship between housing prices and number
    of bedrooms.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig35_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The two-dimensional plane of housing prices versus the number of bedrooms represents
    various dots with an increasing straight line in between.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-34
  prefs: []
  type: TYPE_NORMAL
- en: Regression fit to the housing prices vs. number of bedrooms data. The red points
    denote the data points, and the blue line indicates the fitted regression line
  prefs: []
  type: TYPE_NORMAL
- en: Let the input vector be *x*‚Ä≤¬†=¬†[*x*[1]‚Äā*x*[2]‚Äā*x*[3]]^(*T*), where
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {x}_1\to \kern0.5em the\kern0.5em area\kern0.5em of\kern0.5em the\kern0.5em
    house $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equep.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {x}_2\to \kern0.5em the\kern0.5em number\kern0.5em of\kern0.5em bedrooms
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equeq.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {x}_3\to \kern0.5em the\kern0.5em number\kern0.5em of\kern0.5em bathrooms
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equer.png)'
  prefs: []
  type: TYPE_IMG
- en: Let the parameter vector corresponding to the input feature vector be, where
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\theta}_1\kern0.5em \to \kern0.5em additional\kern0.5em Cost\kern0.5em
    per\kern0.5em unit\kern0.5em area $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Eques.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {\theta}_2\to \kern0.5em additional\kern0.5em cost\; per\kern0.5em bedroom
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equet.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {\theta}_3 \to \kern0.5em additional\kern0.5em cost\kern0.5em per\kern0.5em
    bathroom $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equeu.png)'
  prefs: []
  type: TYPE_IMG
- en: After taking into consideration the bias term, the input feature vector becomes
    *x*¬†=¬†[*x*[0]‚Äā*x*[1‚Äā]*x*[2]‚Äā*x*[3]]^(*T*), where
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {x}_0\to \kern0.5em constant\kern0.5em value\kern0.5em of\kern0.5em 1,\kern0.5em
    i.e.,\kern0.5em feature\kern0.5em corresponding\kern0.5em to\kern0.5em the\kern0.5em
    bias\kern0.5em term $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equev.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {x}_1\to \kern0.5em the\kern0.5em area\kern0.5em of\kern0.5em the\kern0.5em
    house $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equew.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {x}_2\to \kern0.5em the\kern0.5em number\kern0.5em of\kern0.5em bedrooms
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equex.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {x}_3\to \kern0.5em the\kern0.5em number\kern0.5em of\kern0.5em bathrooms
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equey.png)'
  prefs: []
  type: TYPE_IMG
- en: and *őł*¬†=¬†[*őł*[0‚Äā]*őł*[1‚Äā]*őł*[2‚Äā]*őł*[3]], where
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\theta}_0\kern0.5em \to \kern0.5em bias\kern0.5em term\kern0.5em or\kern0.5em
    intercept $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equez.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {\theta}_1\kern0.5em \to \kern0.5em additional\kern0.5em cost\kern0.5em
    per\kern0.5em unit\kern0.5em area $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfa.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {\theta}_2\to \kern0.5em additional\kern0.5em costper\kern0.5em bedroom
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfb.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {\theta}_3 \to \kern0.5em additional\kern0.5em cost\kern0.5em per\kern0.5em
    bathroom $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfc.png)'
  prefs: []
  type: TYPE_IMG
- en: Now that we have some understanding of how to construct a regression problem
    and its associated cost function, let‚Äôs simplify the problem and proceed toward
    deriving the model parameters.
  prefs: []
  type: TYPE_NORMAL
- en: Model parameter ![$$ {\theta}^{\ast }=\underset{\theta }{\underbrace{Arg\kern0.5em
    \mathit{\operatorname{Min}}}}C\left(\theta \right)= \underset{\theta }{\underbrace{Arg\kern0.5em
    \mathit{\operatorname{Min}}}}{\sum}_{i=1}^m{\left({\theta}^T{x}_i-{y}^{(i)}\right)}^2
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq74.png)
  prefs: []
  type: TYPE_NORMAL
- en: The input vectors for all the samples can be combined to a matrix *X*, and the
    corresponding target output can be represented as a vector *Y*.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ X=\left[\begin{array}{c}{x}_0^{(1)}\kern0.5em {x}_1^{(1)}{x}_2^{(1)}{x}_3^{(1)}\\
    {}\begin{array}{cc}{x}_0^{(2)}&amp; {x}_1^{(2)}{x}_2^{(2)}{x}_3^{(2)}\end{array}\\
    {}\begin{array}{cc}{x}_0^{(3)}&amp; {x}_1^{(3)}{x}_2^{(3)}{x}_3^{(3)}\end{array}\\
    {}.\\ {}.\\ {}\begin{array}{cc}{x}_0^{(m)}&amp; {x}_1^{(m)}{x}_2^{(m)}{x}_3^{(m)}\end{array}\end{array}\right]Y=\left[\begin{array}{c}{y}^{(1)}\\
    {}{y}^{(2)}\\ {}{y}^{(3)}\\ {}.\\ {}.\\ {}{y}^{(m)}\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfd.png)'
  prefs: []
  type: TYPE_IMG
- en: 'If we represent the vector of predictions as *Yp*, then *Yp*¬†=¬†*Xőł*. So, the
    error in prediction vector *e* can be represented as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ e= X\theta -Y $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfe.png)'
  prefs: []
  type: TYPE_IMG
- en: Hence, *C(őł)* can be expressed as the square of the *l*¬≤ norm of the error vector
    *e*, i.e.,
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\displaystyle \begin{array}{l}C\left(\theta \right)={\left\Vert e\right\Vert}_2^2\\
    {}\kern2.12em =\left\Vert X\theta -\kern0.5em {Y}_2^2\right\Vert \\ {}\kern2.12em
    ={\left( X\theta \kern0.5em -\kern0.5em Y\right)}^T\left( X\theta \kern0.5em -\kern0.5em
    Y\right)\end{array}} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equff.png)'
  prefs: []
  type: TYPE_IMG
- en: Now that we have a simplified cost function in matrix form, it will be easy
    to apply different optimization techniques. These techniques would work for most
    cost functions, be it a convex cost function or a non-convex one. For non-convex
    ones, there are some additional things that need to be considered, which we will
    discuss in detail while considering neural networks.
  prefs: []
  type: TYPE_NORMAL
- en: We can directly derive the model parameters by computing the gradient and setting
    it to zero vector. You can apply the rules that we learned earlier to check if
    the conditions of minima are satisfied.
  prefs: []
  type: TYPE_NORMAL
- en: 'The gradient of the cost function with respect to the parameter vector *őł*
    is as seen here:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \nabla C\left(\theta \right)=2{X}^T\left( X\theta \kern0.5em -\kern0.5em
    Y\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfg.png)'
  prefs: []
  type: TYPE_IMG
- en: Setting ‚ąá*C*(*őł*)¬†=¬†0, we get ![$$ {X}^T X\theta ={X}^TY=&gt;\overset{\frown
    }{\theta} ={\left({X}^TX\right)}^{-1}{X}^T\kern0.5em Y $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq75.png).
  prefs: []
  type: TYPE_NORMAL
- en: If one looks at this solution closely, one can observe that the pseudo-inverse
    of *X*‚ÄĒi.e., (*X*^(*T*)*X*)^(‚ąí1)*X*^(*T*)‚ÄĒcomes into the solution of the linear
    regression problem. This is because a linear regression parameter vector can be
    looked at as a solution to the equation *Xőł*¬†=¬†*Y*, where X is an *m*¬†√ó¬†*n* rectangular
    matrix with *m*¬†>¬†*n*.
  prefs: []
  type: TYPE_NORMAL
- en: The preceding expression for ![$$ \hat{\theta} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq76.png)
    is the closed-form solution for the model parameter. Using this derived ![$$ \hat{\theta}
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq77.png) for new
    data point *x*[*new*], we can predict the price of housing as ![$$ {\hat{\theta}}^T{x}_{new}
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq78.png).
  prefs: []
  type: TYPE_NORMAL
- en: The computation of the inverse of (*X*^(*T*)*X*) is both cost- and memory-intensive
    for large datasets. Also, there are situations when the matrix *X*^(*T*)*X* is
    singular and hence its inverse is not defined. Therefore, we need to look at alternative
    methods to get to the minima point.
  prefs: []
  type: TYPE_NORMAL
- en: One thing to validate after building a linear regression model is the distribution
    of residual errors for the training data points. The errors should be approximately
    normally distributed with a 0 mean and some finite variance. The *QQ* plot that
    plots the actual quantile values for the error distribution vs. the theoretical
    quantile values for the error distribution can be used to check whether the Gaussian
    assumption for the residual is satisfied.
  prefs: []
  type: TYPE_NORMAL
- en: Linear Regression Through Vector Space Approach
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'The linear regression problem is to determine the parameter vector *őł* such
    that *Xőł* is as close to the output vector *Y* as possible. *X*¬†‚ąą¬†*R*^(*m*¬†√ó¬†*n*)
    is the data matrix and can be thought of as *n* column vectors *c*[*i*]¬†‚ąą¬†*R*^(*m*¬†√ó¬†1)
    stacked one after the other, as shown here:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ X=\left[{c}_{1\kern0.5em }{c}_2\dots ..\kern0.5em {c}_n\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfh.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The dimension of column space is *m,* whereas the number of column vectors
    is *n*. Hence, the column vectors at best can span a subspace of dimension *n*
    within the *m*-dimensional vector space. The subspace is depicted in Figure [1-33](#Fig34).
    Although it looks like a 2-D surface, we need to imagine it as an *n*-dimensional
    space. The linear combination of the columns of *X* with the parameters gives
    the prediction vector, as shown here:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ X\theta ={\theta}_1{c}_1+{\theta}_1{c}_1 +..\kern0.5em {\theta}_n{c}_n
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfi.png)'
  prefs: []
  type: TYPE_IMG
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig36_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The parallelogram plane has four vectors marked as c subscripts 1, 2, 3, and
    n. The vectors of equations X theta and Y with an eccentricity of e are visible.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-35
  prefs: []
  type: TYPE_NORMAL
- en: Linear regression as a vector space problem
  prefs: []
  type: TYPE_NORMAL
- en: Since *Xőł* is nothing but the linear combination of the column vectors of *X*,
    *Xőł* stays in the same subspace as the ones spanned by the column vectors *c*[*i*]¬†‚ąÄ¬†*i*¬†=¬†{1,
    2, 3‚Ä¶*n*}.
  prefs: []
  type: TYPE_NORMAL
- en: Now the actual target-value vector *Y* lies outside the subspace spanned by
    the column vectors of *X*; thus, no matter what *őł* we combine *X* with, *Xőł*
    can never equal or align itself in the direction of *Y*. There is going to be
    a nonzero error vector given by *e*¬†=¬†*Y*¬†‚ąí¬†*Xőł*.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we know that we have an error, we need to investigate how to reduce
    the *l*¬≤ norm of the error. For the *l*¬≤ norm of the error vector to be at a minimum,
    it should be perpendicular to the prediction vector *Xőł*. Since *e*¬†=¬†*Y*¬†‚ąí¬†*Xőł*
    is perpendicular to *Xőł*, it should be perpendicular to all vectors in that subspace.
  prefs: []
  type: TYPE_NORMAL
- en: 'So, the dot product of all the column vectors of *X* with the error vector
    *Y*¬†‚ąí¬†*Xőł* should be zero, which gives us the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {c_1}^T\left[Y- X\theta \right]=0,\kern0.5em {c_2}^T\left[Y- X\theta \right]=0,\dots
    ..{c_n}^T\left[Y- X\theta \right]=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfj.png)'
  prefs: []
  type: TYPE_IMG
- en: 'This can be rearranged in a matrix form as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\left[{c}_{1\kern0.5em }{c}_2\dots ..\kern0.5em {c}_n\right]}^T\left[Y-
    X\theta \right]=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfk.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ =&gt;{X}^T\left[Y- X\theta \right]=0=&gt;\hat{\theta} ={\left({X}^TX\right)}^{-1}{X}^T\kern0.5em
    Y $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfl.png)'
  prefs: []
  type: TYPE_IMG
- en: Also, please note that the error vector will be perpendicular to the prediction
    vector only if *Xőł* is the projection of *Y* in the subspace spanned by the column
    vectors of *X*. The sole purpose of this illustration is to emphasize the importance
    of vector spaces in solving machine-learning problems.
  prefs: []
  type: TYPE_NORMAL
- en: Classification
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Similarly, we may look at classification problems where instead of predicting
    the value of a continuous variable we predict the class label associated with
    an input feature vector. For example, we can try to predict whether a customer
    is likely to default based on his recent payment history and transaction details
    as well as his demographic and employment information. In such a problem, we would
    have data with the features just mentioned as input and a target indicating whether
    the customer has defaulted as the class label. Based on this labeled data, we
    can build a classifier that can predict a class label indicating whether the customer
    will default, or we can provide a probability score that the customer will default.
    In this scenario, the problem is a binary classification problem with two classes‚ÄĒthe
    defaulter class and the non-defaulter class. When building such a classifier,
    the least square method might not give a good cost function since we are trying
    to guess the label and not predict a continuous variable. The popular cost functions
    for classification problems are generally log-loss cost functions that are based
    on maximum likelihood and entropy-based cost functions, such as Gini entropy and
    Shannon entropy.
  prefs: []
  type: TYPE_NORMAL
- en: The classifiers that have linear decision boundaries are called linear classifiers.
    Decision boundaries are hyperplanes or surfaces that separate the different classes.
    In the case of linear decision boundaries, the separating plane is a hyperplane.
  prefs: []
  type: TYPE_NORMAL
- en: Figures [1-36](#Fig37) and [1-37](#Fig38) illustrate linear and nonlinear decision
    boundaries, respectively, for the separation of two classes.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig38_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The two-dimensional plane of x 2 versus x 1\. It consists of an ellipse for
    a non-linear decision boundary. The ellipse contains a negative class, and the
    outside of the ellipse contains a positive class.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-37
  prefs: []
  type: TYPE_NORMAL
- en: Classification by a nonlinear decision boundary
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig37_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The two-dimensional plane of x 2 versus x 1 consists of a decreasing line for
    the linear decision boundary. The negative class with the negative symbol and
    the positive class with the positive symbol are indicated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-36
  prefs: []
  type: TYPE_NORMAL
- en: Classification by a linear decision boundary
  prefs: []
  type: TYPE_NORMAL
- en: I would like to briefly discuss one of the most popular and simple classifiers,
    logistic regression, so that it becomes clear how the log-loss cost function comes
    into the picture via maximum likelihood methods in case of classification problems.
  prefs: []
  type: TYPE_NORMAL
- en: 'Suppose (*x*^((*i*)), *y*^((*i*))) are the labeled data points, where *x*^((*i*))¬†‚ąą¬†*R*^(*n*¬†√ó¬†1)‚Äā¬†‚ąÄ¬†*i*¬†‚ąą¬†{1,
    2, .. *m*} is the input vector, which includes the constant feature value of 1
    as a component, and *y*^((*i*)) determines the class. The value of *y*^((*i*))
    is set to 1 when the data point corresponds to a customer who has defaulted on
    his loan and 0 if the customer has not defaulted. The input vector *x*^((*i*))
    can be represented in terms of its components as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {x}^{(i)}=\left[1{x}_0^{(1)}\kern0.5em {x}_1^{(1)}\kern0.5em {x}_2^{(1)}{x}_3^{(1)}\right]
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfm.png)'
  prefs: []
  type: TYPE_IMG
- en: Logistic regression in general is a linear classifier and uses a squashing function
    to convert the linear score into probability. Let *őł*¬†=¬†[*őł*[0]‚Äā*őł*[1]‚Äā*őł*[2]‚Ä¶*őł*[*n*]]
    be the model parameter with each *őł*[*j*]‚ÄÉ¬†‚ąÄ¬†*j*‚Äā¬†‚ąą¬†{0, 1, 2, ‚Ä¶, *n*} representing
    the model parameter component with respect to the *jth* feature *x*[*j*] of the
    input vector *x*.
  prefs: []
  type: TYPE_NORMAL
- en: The term *őł*[0] is the bias term. In linear regression, the bias is nothing
    but the intercept on the output *y* axis. We will look at what this bias term
    means for logistic regression (and for other linear classifiers) shortly.
  prefs: []
  type: TYPE_NORMAL
- en: 'The dot product *őł*^(*T*)*x* determines whether the given data point is likely
    to be a positive class or a negative class. For the problem at hand, the positive
    class is the event the customer defaults on his loan repayment, and the negative
    class is the event that the customer doesn‚Äôt default. The probability that the
    customer will default given the input and the model is given by the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ P\left(y=1/x,\theta \right)=1/\left(1+\mathit{\exp}\left(-{\theta}^Tx\right)\right)=p
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfn.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ P\left(y=0/x,\theta \right)=1-1/\left(1+\mathit{\exp}\left(-{\theta}^Tx\right)\right)
    =\mathit{\exp}\left(-{\theta}^Tx\right)/\left(1+\mathit{\exp}\left(-{\theta}^Tx\right)\right)
    =q $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfo.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Now, let us look at the probability values for different values of *őł*^(*T*)*x*:'
  prefs: []
  type: TYPE_NORMAL
- en: When *őł*^(*T*)*x* = 0, then the probability of positive class is 1/2.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When *őł*^(*T*)*x* > 0, the probability of a positive class is greater than 1/2
    and less than 1.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When *őł*^(*T*)*x* < 0, the probability of a positive class is less than 1/2
    and greater than 0.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When *őł*^(*T*)*x* is sufficiently large and positive, i.e., *őł*^(*T*)*x*‚Äā¬†‚Üí¬†‚ąě,
    the probability ‚Üí1.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When *őł*^(*T*)*x* is sufficiently large and negative, i.e., *őł*^(*T*)*x*‚Äā¬†‚Üí¬†¬†‚ąí¬†‚ąě,
    the probability ‚Üí0.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The good thing about this probability formulation is that it keeps the values
    between 0 and 1, which would not have been possible with linear regression. Also,
    instead of the actual class, it gives continuous probability. Thus, depending
    on the problem at hand, the cutoff probability thresholds can be defined to determine
    the class.
  prefs: []
  type: TYPE_NORMAL
- en: This probability model function is called a logistic or sigmoid function. It
    has smooth, continuous gradients that make the model training mathematically convenient.
  prefs: []
  type: TYPE_NORMAL
- en: 'If we look carefully, we will see that the customer class *y* for each training
    sample follows a Bernoulli distribution, which we discussed earlier. For every
    data point, the class *y*^((i))/*x*^((i))~*Bernoulli*(1, *p*[*i*]). Based on the
    probability mass function of Bernoulli distribution, we can say the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ P\left({y}^{(i)}/{x}^{(i)},\theta \right)={\left(1-{p}_i\right)}^{1-{y}^{(i)}}
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq79.png) where
    *p*[*i*]¬†=¬†1/(1¬†+¬†¬†*exp*¬†(‚ąí*őł*^(*T*)*x*))'
  prefs: []
  type: TYPE_IMG
- en: 'Now, how do we define the cost function? We compute the likelihood of the data
    given the model parameters and then determine the model parameters that maximize
    the computed likelihood. We define the likelihood by *L*, and it can be represented
    as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ L=P\left( Data/ model\right)=P\left({D}^{(1)}{D}^{(2)}\dots {D}^{(m)}/\theta
    \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfp.png)'
  prefs: []
  type: TYPE_IMG
- en: where *D*^((*i*)) represents the *ith* training sample (*x*^((*i*)),¬†*y*^((*i*))).
  prefs: []
  type: TYPE_NORMAL
- en: 'Assuming the training samples are independent, given the model, *L* can be
    factorized as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ L=P\left({D}^{(1)}{D}^{(2)}\dots {D}^{(m)}/\theta \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfq.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ =P\left({D}^{(1)}/\theta \right)\kern0.5em P\left({D}^{(2)}/\theta \right)\kern0.5em
    .\dots \kern0.5em P\left({D}^{(m)}/\theta \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfr.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ =\prod \limits_{i=1}^mP\left({D}^{(i)}/\theta \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfs.png)'
  prefs: []
  type: TYPE_IMG
- en: We can take the log on both sides to convert the product of probabilities into
    a sum of the log of the probabilities. Also, the optimization remains the same
    since the maxima point for both *L* and *logL* would be the same, as log is a
    monotonically increasing function.
  prefs: []
  type: TYPE_NORMAL
- en: 'Taking log on both sides, we get the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ logL=\sum \limits_{i=1}^m\mathit{\log}\kern0.5em P\left({D}^{(i)}/\theta
    \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equft.png)'
  prefs: []
  type: TYPE_IMG
- en: Now, *P*(*D*^((*i*))/*őł*)¬†=¬†*P*((*x*^((*i*)), *y*^((*i*)))/*őł*)¬†=¬†*P*(*x*^((*i*))/‚Äā*őł*)‚Äā*P*(*y*^((*i*))/*x*^((*i*)),
    ‚Äā*őł*).
  prefs: []
  type: TYPE_NORMAL
- en: We are not concerned about the probability of the data point‚ÄĒi.e., *P*(*x*^((*i*))/
    *őł*)‚ÄĒand assume that all the data points in the training are equally likely for
    the given model. So, *P*(*D*^((*i*))/*őł*)¬†¬†=¬†*k‚ÄāP*(*y*^((*i*))/*x*^((*i*)), ‚Äā*őł*),
    where *k* is a constant.
  prefs: []
  type: TYPE_NORMAL
- en: 'Taking the log on both sides, we get the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \mathit{\log}\kern0.5em P\left({D}^{(i)}/\theta \right)= logk+{y}^{(i)}{logp}_i+\left(1-{y}^{(i)}\right)\log
    \left(1-{p}_i\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfu.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Summing over all data points, we get the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ logL=\sum \limits_{i=1}^m logk+{y}^{(i)}{logp}_i+\left(1-{y}^{(i)}\right)\log
    \left(1-{p}_i\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfv.png)'
  prefs: []
  type: TYPE_IMG
- en: 'We need to maximize the *logL* to get the model parameter *őł*. Maximizing *logL*
    is the same as minimizing ‚ąí*logL*, and so we can take the ‚ąí*logL* as the cost
    function for logistic regression and minimize it. Also, we can drop the *logk*
    sum since it‚Äôs a constant and the model parameter at the minima would be same
    irrespective of whether we have the *logk* sum. If we represent the cost function
    as *C*(*őł*), it can be expressed as seen here:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ C\left(\theta \right)=\sum \limits_{i=1}^m-{y}^{(i)}{logp}_i-\left(1-{y}^{(i)}\right)\log
    \left(1-{p}_i\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfw.png)'
  prefs: []
  type: TYPE_IMG
- en: where *p*[*i*]¬†=¬†1/(1¬†+¬†¬†*exp*¬†(‚ąí*őł*^(*T*)*x*))
  prefs: []
  type: TYPE_NORMAL
- en: '*C*(*őł*) is a convex function in *őł*, and the reader is encouraged to verify
    it with the rules learned earlier in the ‚ÄúCalculus‚ÄĚ section. *C*(*őł*) can be minimized
    by common optimization techniques.'
  prefs: []
  type: TYPE_NORMAL
- en: Hyperplanes and Linear Classifiers
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Linear classifiers in some way or another are related to a hyperplane, so it
    makes sense to look at that relationship. In a way, learning a linear classifier
    is about learning about the hyperplane that separates the positive class from
    the negative class.
  prefs: []
  type: TYPE_NORMAL
- en: A hyperplane in an *n*-dimensional vector space is a plane of dimension (*n*¬†‚ąí¬†1)
    that divides the *n*-dimensional vector space into two regions. One region consists
    of vectors lying above the hyperplane, and the other region consists of vectors
    lying below the hyperplane. For a two-dimensional vector space, straight lines
    act as a hyperplane. Similarly, for a three-dimensional vector space, a two-dimensional
    plane acts as a hyperplane.
  prefs: []
  type: TYPE_NORMAL
- en: 'A hyperplane is defined by two major parameters: its perpendicular distance
    from the origin represented by a bias term *b*‚Ä≤ and the orientation of the hyperplane
    determined by a unit vector *w* perpendicular to the hyperplane surface as shown
    in Figure [1-38](#Fig39).'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig39_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Negative and positive classes are separated by a decreasing line on the two-dimensional
    plane. Two vectors, x from the origin and w from the decreasing line, are indicated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-38
  prefs: []
  type: TYPE_NORMAL
- en: Hyperplanes separating the two classes
  prefs: []
  type: TYPE_NORMAL
- en: For a vector *x*¬†‚ąą¬†*R*^(*n*¬†√ó¬†1) to lie on the hyperplane, the projection of
    the vector in the direction of *w* should equal the distance of the hyperplane
    from origin‚ÄĒi.e., *w*^(*T*)*x*¬†=¬†*b*‚Ä≤. Thus, any point lying on the hyperplane
    must satisfy *w*^(*T*)*x*¬†‚ąí¬†*b*‚Ä≤¬†=¬†0\. Similarly, *w*^(*T*)*x*¬†‚ąí¬†*b*‚Ä≤¬†>¬†0 must
    be satisfied for points lying above the hyperplane and *w*^(*T*)*x*¬†‚ąí¬†*b*‚Ä≤¬†<¬†0
    for points lying below the hyperplane.
  prefs: []
  type: TYPE_NORMAL
- en: In linear classifiers, we learn to model the hyperplane or learn the model parameters
    *w* and *b*. The vector *w* is generally aligned toward the positive class. The
    Perceptron and linear SVM are linear classifiers. Of course, the ways SVM and
    Perceptron learn the hyperplane are totally different, and hence they would come
    up with different hyperplanes, even for the same training data.
  prefs: []
  type: TYPE_NORMAL
- en: Even if we look at logistic regression, we see that it is based on a linear
    decision boundary. The linear decision boundary is nothing but a hyperplane, and
    points lying on the hyperplane (i.e., *w*^(*T*)*x*¬†‚ąí¬†*b*‚Ä≤¬†=¬†0) are assigned a
    probability of 0.5 for either of the classes. And again, the way the logistic
    regression learns the decision boundary is totally different from the way SVM
    and Perceptron models do.
  prefs: []
  type: TYPE_NORMAL
- en: Unsupervised Learning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Unsupervised machine-learning algorithms aim at finding patterns or internal
    structures within datasets that contain input data points without labels or targets.
    *K*-means clustering, the mixture of Gaussians, and so on are methods of unsupervised
    learning. Even data-reduction techniques like principal component analysis (PCA),
    singular value decomposition (SVD), auto-encoders, and so forth are unsupervised
    learning methods.
  prefs: []
  type: TYPE_NORMAL
- en: Reinforcement Learning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Reinforcement learning (RL) deals with training an ‚ÄúAgent‚ÄĚ that can take suitable
    ‚Äúactions‚ÄĚ given a specific ‚Äústate‚ÄĚ of the ‚Äúenvironment‚ÄĚ using a ‚Äúpolicy‚ÄĚ to maximize
    some long-term ‚Äúreward.‚ÄĚ Each of the term in the definition is important to understand
    reinforcement learning.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig40_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The representation of a reinforcement learning paradigm. It has two rectangular
    blocks for agents and the environment, and the lines connecting them denote state,
    policy, action, and transition.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-39
  prefs: []
  type: TYPE_NORMAL
- en: High-level representation of a reinforcement learning paradigm
  prefs: []
  type: TYPE_NORMAL
- en: In an RL environment, the Agent learns a policy by interacting with the environment
    in such a way to maximize some long-term reward.
  prefs: []
  type: TYPE_NORMAL
- en: A state in RL can be any condition of the environment. For instance, when one
    drives a car, the state can be defined by the position and speed of the car as
    well as the position and speed of the neighboring cars. In the diagram above,
    the state of the system at time *t* is defined as *s*^((*t*)).
  prefs: []
  type: TYPE_NORMAL
- en: Presented with a state *s*^((*t*)), the RL agent tries to determine an optimal
    action *a*^((*t*)) using the leant policy *ŌÄ*(.). A policy is a mapping from states
    to actions and can be probabilistic or deterministic. The RL agent learns the
    policy by interacting with the environment.
  prefs: []
  type: TYPE_NORMAL
- en: The reward is the environment‚Äôs feedback of the action in each state. The immediate
    reward at time *t* on taking action *a*^((*t*)) at state *s*^((*t*)) is given
    by *r*^((*t*)).
  prefs: []
  type: TYPE_NORMAL
- en: When the agent takes an action *a*^((*t*)) at a given state *s*^((*t*)) along
    with the immediate reward *r*^((*t*)), it is presented with a new state *s*^((*t*¬†+¬†1))
    based on the transition function of the environment *P*(*s*^((*t*¬†+¬†1)), *r*^((*t*¬†+¬†1))|
    *s*^((*t*)), *a*^((*t*))). The agent should learn the policy in such a way that
    it not only maximizes the immediate reward *r*^((*t*+)) but also moves to a favorable
    next step *s*^((*t*¬†+¬†1)) that favors high rewards. In essence, the action in
    each state should be taken in such a way so that the long-term reward is maximized.
  prefs: []
  type: TYPE_NORMAL
- en: 'To understand long-term reward, let us suppose an agent realizes the sequence
    of states, actions, and rewards following a policy *ŌÄ* as the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Sequence of state, action, and rewards following a policy *ŌÄ*
  prefs: []
  type: TYPE_NORMAL
- en: '*s*^((0)), *a*^((0)), *r*^((1)), *s*^((1)), *a*^((1)), *r*^((2))‚Ä¶ ‚Ä¶ ‚Ä¶ ‚Ä¶ . *s*^((*t*)),
    *a*^((*t*)), ***r***^((***t¬†+***¬†**1**)), *s*^((*t*¬†+¬†1)), *a*^((*t*¬†+¬†1)), *r*^((*t*¬†+¬†2)),
    *s*^((*t*¬†+¬†2))‚Ä¶ *‚ÄÉ‚ÄÉ‚ÄÉ‚ÄÉ‚ÄÉ‚ÄÉ‚ÄÉ‚ÄÉ‚ÄÉs*^((*t*¬†+¬†*N*¬†‚ąí¬†1)), *a*^((*t*¬†+¬†*N*¬†‚ąí¬†1)), *r*^((*t*¬†+¬†*N*)),
    *s*^((*t*¬†+¬†*N*))'
  prefs: []
  type: TYPE_NORMAL
- en: Long-term reward at time *t* choosing action *a*^((*t*)) when presented with
    state *s*^((*t*))
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ G(t)={\sum}_{i=1}^N{r}^{\left(t+i\right)} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfx.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Generally, the near-term rewards are given more precedence over the future
    rewards, and hence the long-term reward using a discount factor *ő≥*‚Äāis expressed
    as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ G(t)={\sum}_{i=1}^N{\gamma}^{i-1}{r}^{\left(t+i\right)} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfy.png)'
  prefs: []
  type: TYPE_IMG
- en: The discount factor *ő≥*¬†<¬†1, and hence it helps in ensuring the long-term reward
    does not diverge in case of very long or infinite horizon problems.
  prefs: []
  type: TYPE_NORMAL
- en: Optimization Techniques for Machine-Learning Gradient Descent
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Gradient descent, along with its several variants, is probably the most widely
    used optimization technique in machine learning and deep learning. It‚Äôs an iterative
    method that starts with a random model parameter and uses the gradient of the
    cost function with respect to the model parameter to determine the direction in
    which the model parameter should be updated.
  prefs: []
  type: TYPE_NORMAL
- en: Suppose we have a cost function *C*(*őł*), where *őł* represents the model parameters.
    We know the gradient of the cost function with respect to *őł* gives us the direction
    of maximum increase of *C*(*őł*) in a linear sense at the value of *őł* at which
    the gradient is evaluated. So, to get the direction of maximum decrease of *C*(*őł*)
    in a linear sense, one should use the negative of the gradient.
  prefs: []
  type: TYPE_NORMAL
- en: 'The update rule of the model parameter *őł* at iteration (*t*¬†+¬†1) is given
    by the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\theta}^{\left(t+1\right)}={\theta}^{(t)}\kern0.5em -\kern0.5em \eta
    \nabla C\left({\theta}^{(t)}\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equfz.png)'
  prefs: []
  type: TYPE_IMG
- en: where *ő∑* represents the learning rate and *őł*^((*t*¬†+¬†1)) and *őł*^((*t*)) represent
    the parameter vector at iteration (*t*¬†+¬†1) and *t,* respectively.
  prefs: []
  type: TYPE_NORMAL
- en: Once minima is reached through this iterative process, the gradient of the cost
    function at minima would technically be zero, and hence there would be no further
    updates to *őł*. However, because of rounding errors and other limitations of computers,
    converging to true minima might not be achievable. Thus, we would have to come
    up with some other logic to stop the iterative process when we believe we have
    reached minima‚ÄĒor at least close enough to the minima‚ÄĒto stop the iterative process
    of model training. One of the ways generally used is to check the magnitude of
    the gradient vector, and if it is less than some predefined minute quantity‚ÄĒsay,
    *őĶ*‚ÄĒstop the iterative process. The other crude way that can be used is to stop
    the iterative process of the parameter update after a fixed number of iterations,
    like 1000.
  prefs: []
  type: TYPE_NORMAL
- en: Learning rate plays a very vital role in the convergence of the gradient descent
    to the minima point. If the learning rate is large, the convergence might be faster
    but might lead to severe oscillations around the point of minima. A small learning
    rate might take a longer time to reach the minima, but the convergence is generally
    oscillation-free.
  prefs: []
  type: TYPE_NORMAL
- en: To see why gradient descent works, let‚Äôs take a model that has one parameter
    and a cost function *C*(*őł*)¬†=¬†(*őł*¬†‚ąí¬†*a*)¬≤¬†+¬†*b* and see why the method works.
  prefs: []
  type: TYPE_NORMAL
- en: As we can see from Figure [1-37](#Fig38), the gradient (in this case it‚Äôs just
    the derivative) at point *őł*[1] is positive, and thus if we move along the gradient
    direction, the cost function would increase. Instead, at *őł*[1] if we move along
    the negative of the gradient, the cost reduces. Again, let‚Äôs take the point *őł*[2]
    where the gradient is negative. If we take the gradient direction here for updating
    *őł*, the cost function would increase. Taking the negative direction of the gradient
    would ensure that we move toward the minima. Once we reach the minima at *őł*¬†=¬†*a*,
    the gradient is 0, and hence there would be no further update to *őł*.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig41_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The two-dimensional plane of function of theta versus theta. It represents a
    sagging curve with two tangent vectors, theta 1 and theta 2.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-40
  prefs: []
  type: TYPE_NORMAL
- en: Gradient-descent intuition with simple cost function in one variable
  prefs: []
  type: TYPE_NORMAL
- en: Gradient Descent for a Multivariate Cost Function
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Now that we have some intuition about gradient descent from looking at a cost
    function based on one parameter, let us look at gradient descent when the cost
    function is based on multiple parameters.
  prefs: []
  type: TYPE_NORMAL
- en: Let us look at a Taylor series expansion of a function of multiple variables.
    Multiple variables can be represented by the vector *őł*. Let us consider a cost
    function *C*(*őł*) where *őł*¬†‚ąą¬†*R*^(*n*¬†√ó¬†1)¬†.
  prefs: []
  type: TYPE_NORMAL
- en: 'As discussed earlier, the Taylor series expansion around a point *őł* can be
    expressed in matrix notation, as shown here:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ C\left(\theta +\varDelta \theta \right)=C\left(\theta \right)+\varDelta
    {\theta}^T\mathit{\nabla}C\left(\theta \right)+\frac{1}{2} \varDelta {\theta}^TH\left(\theta
    \right)\varDelta \theta + higher\kern0.5em order\kern0.5em terms $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equga.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ \varDelta \theta \to \kern0.5em Change\kern0.5em in\kern0.5em \theta \kern0.5em
    vector $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgb.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ \nabla C\left(\theta \right)\to \kern0.5em Gradient\kern0.5em vector\kern0.5em
    of\kern0.5em C\left(\theta \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgc.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ H\left(\theta \right)\kern0.5em \to \kern0.5em Hessian\kern0.5em matrix\kern0.5em
    of\kern0.5em C\left(\theta \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgd.png)'
  prefs: []
  type: TYPE_IMG
- en: Let us suppose at iteration *t* of gradient descent the model parameter is *őł*
    and we want update *őł* to (*őł*¬†+¬†*őĒőł*) by making an update of *őĒőł* such that *C*(*őł*¬†+¬†*őĒőł*)
    is lesser than *C*(*őł*).
  prefs: []
  type: TYPE_NORMAL
- en: 'If we assume linearity of the function in the neighborhood of *őł*, then from
    Taylor series expansion, we get the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ C\left(\theta +\varDelta \theta \right)=C\left(\theta \right)+\varDelta
    {\theta}^T\nabla C\left(\theta \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equge.png)'
  prefs: []
  type: TYPE_IMG
- en: We want to choose *őĒőł* in such a way that *C*(*őł*¬†+¬†*őĒőł*) is less than *C*(*őł*).
  prefs: []
  type: TYPE_NORMAL
- en: 'For all *őĒőł* with the same magnitude, the one that will maximize the dot product
    *őĒőł*^(*T*)¬†ūĚõĽ¬†*C*(*őł*) should have a direction the same as that of ūĚõĽ*C*(*őł*). But
    that would give us the maximum possible *őĒőł*^(*T*)¬†ūĚõĽ¬†*C*(*őł*). Hence, to get the
    minimum value of the dot product *őĒőł*^(*T*)¬†ūĚõĽ¬†*C*(*őł*), the direction of *őĒőł*
    should be the exact opposite of that of ūĚõĽ*C*(*őł*). In other words, *őĒőł* should
    be proportional to the negative of the gradient vector :'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \varDelta \theta \propto -\mathit{\nabla}C\left(\theta \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgf.png)'
  prefs: []
  type: TYPE_IMG
- en: => *őĒőł*¬†=¬†¬†‚ąí¬†*ő∑*¬†ūĚõĽ¬†*C*(*őł*), where *ő∑* is the learning rate
  prefs: []
  type: TYPE_NORMAL
- en: =>*őł*¬†+¬†*őĒőł*¬†=¬†*őł*¬†‚ąí¬†*ő∑ūĚõĽC*(*őł*)
  prefs: []
  type: TYPE_NORMAL
- en: =>*őł*^((*t*¬†+¬†1))¬†=¬†*őł*^((*t*))¬†‚ąí¬†*ő∑*¬†ūĚõĽ¬†*C*(*őł*^((*t*)))
  prefs: []
  type: TYPE_NORMAL
- en: which is the famous equation for gradient descent. To visualize how the gradient
    descent proceeds to the minima, we need to have some basic understanding of contour
    plots and contour lines.
  prefs: []
  type: TYPE_NORMAL
- en: Contour Plot and Contour Lines
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Let us consider a function *C*(*őł*) where *őł*¬†‚ąą¬†*R*^(*n*¬†√ó¬†1). A contour line
    is a line/curve in the vector space of *őł* that connects points that have the
    same value of the function *C*(*őł*). For each unique value of *C*(*őł*), we would
    have separate contour lines.
  prefs: []
  type: TYPE_NORMAL
- en: Let us plot the contour lines for a function *C*(*őł*)¬†=¬†*őł*^(*T*)*Aőł*, where
    *őł*¬†=¬†[*őł*[1]*őł*[2]]^(*T*)¬†‚ąą¬†*R*^(2¬†√ó¬†1) and
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ A=\left[\begin{array}{cc}7&amp; 2\\ {}2&amp; 5\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgg.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Expanding the expression for *C*(*őł*), we get the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ C\left({\theta}_1,{\theta}_2\right)=7{\theta_1}^2+5{\theta_2}^2+4{\theta}_1{\theta}_2
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgh.png)'
  prefs: []
  type: TYPE_IMG
- en: The contour plot for the cost function is depicted in Figure [1-38](#Fig39).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig42_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The graph of theta 2 versus theta 1 displays the inclined concentric ellipse
    with all shaded regions.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-41
  prefs: []
  type: TYPE_NORMAL
- en: Contour plots
  prefs: []
  type: TYPE_NORMAL
- en: Each of the ellipses are contour lines specific to a fixed value of the function
    *C*(*őł*[1],¬†*őł*[2]). If *C*(*őł*[1], *őł*[2])¬†=¬†*a*, where *a* is a constant, then
    the equation
  prefs: []
  type: TYPE_NORMAL
- en: '*a*¬†=¬†7*őł*[1]¬≤¬†+¬†5*őł*[2]¬≤¬†+¬†4*őł*[1]*őł*[2] represents an ellipse.'
  prefs: []
  type: TYPE_NORMAL
- en: For different values of constant, *we* get different ellipses, as depicted in
    Figure [1-38](#Fig39). All points on a specific contour line have the same value
    of the function.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we know what a contour plot is, let us look at gradient-descent progression
    in a contour plot for the cost function *C*(*őł*), where *őł*¬†‚ąą¬†*R*^(2¬†√ó¬†1). The
    gradient-descent steps have been illustrated in Figure [1-39](#Fig40).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig43_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The concentric circles of seven layers are represented on the two-dimensional
    plane of theta 2 versus theta 1\. Four tangent vectors are marked with dotted
    lines.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-42
  prefs: []
  type: TYPE_NORMAL
- en: Gradient descent for a two-variable cost function
  prefs: []
  type: TYPE_NORMAL
- en: Let us take the largest ellipse corresponding to cost *C*[1] and assume our
    current *őł* is at the point *őł*^((1)) in *C*[1].
  prefs: []
  type: TYPE_NORMAL
- en: 'Assuming the linearity of the *C*(*őł*) about *őł*, the change in cost function
    *C*(*őł*) can be presented as seen here:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \varDelta C\left(\theta \right)=\varDelta {\theta}^T\nabla C\left(\theta
    \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgi.png)'
  prefs: []
  type: TYPE_IMG
- en: If we take a small change in cost between two points very close to each other
    in the same contour line, then *őĒC*(*őł*)¬†=¬†0, since all points on the same contour
    line have the same fixed value. Also, it should be noted that when we take two
    points very close to each other on the same contour line, the *őĒőł* represents
    the tangent to the contour line represented by tangential arrows to the contour
    line. Please do not confuse this *őĒőł* to be the *őĒőł* update to the parameter in
    gradient descent.
  prefs: []
  type: TYPE_NORMAL
- en: '*őĒC*(*őł*)¬†=¬†0¬†‚Üí‚Äā*őĒőł*^(*T*)¬†‚ąá¬†*C*(*őł*)¬†=¬†0, which basically means that the gradient
    is perpendicular to the tangent at the point *őł*^((1)) in the contour line *C*[1].
    The gradient would have pointed outward, whereas the negative of the gradient
    points inward, as depicted by the arrow perpendicular to the tangent. Based on
    the learning rate, it will reach a point *őł*^((2)) in a different contour line
    represented by *C*[2], whose cost-function value would be less than that of *C*[1].
    Again, the gradient would be evaluated at *őł*^((2)), and the same process would
    be repeated for several iterations until it reached the minima point, where the
    gradient would drop to 0 technically, after which there would be no more updates
    to *őł*.'
  prefs: []
  type: TYPE_NORMAL
- en: Steepest Descent
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Steepest descent is a form of gradient descent where the learning rate is not
    constant but rather is computed at every iteration to ensure that the parameter
    update through gradient descent takes the cost function to minima with respect
    to the learning rate. In other words, the learning rate at every iteration in
    steepest descent is optimized to ensure that the movement in the direction of
    the gradient is utilized to the maximum extent.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let us take our usual cost function *C*(*őł*) and look at successive iterations
    *t* and (*t*¬†+¬†1). As with gradient descent, we have the parameter update rule
    as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\theta}^{\left(t+1\right)}={\theta}^{(t)}\kern0.5em -\kern0.5em \eta
    \nabla C\left({\theta}^{(t)}\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgj.png)'
  prefs: []
  type: TYPE_IMG
- en: 'So, the cost function at iteration (*t*¬†+¬†1) can be expressed as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ C\left({\theta}^{\left(t+1\right)}\right)=C\left({\theta}^{(t)}\kern0.5em
    -\kern0.5em \eta \nabla C\left({\theta}^{(t)}\right)\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgk.png)'
  prefs: []
  type: TYPE_IMG
- en: 'To minimize the cost function at iteration (*t*¬†+¬†1) with respect to the learning
    rate, see the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\partial C\left({\theta}^{\left(t+1\right)}\right)}{\partial \eta
    }=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgl.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ =&gt;\nabla C\left({\theta}^{\left(t+1\right)}\right)\frac{\partial \left[C\Big({\theta}^{(t)}\kern0.5em
    -\kern0.5em \eta \nabla C\left({\theta}^{(t)}\right)\right]}{\partial \eta }=0
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgm.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ =&gt;-\nabla C{\left({\theta}^{\left(t+1\right)}\right)}^T\nabla C\left({\theta}^{(t)}\right)=0
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgn.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ =&gt;\nabla C{\left({\theta}^{\left(t+1\right)}\right)}^T\nabla C\left({\theta}^{(t)}\right)=0
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgo.png)'
  prefs: []
  type: TYPE_IMG
- en: So, for steepest descent, the dot product of the gradients at (*t*¬†+¬†1) and
    *t* is 0, which implies that the gradient vector at every iteration should be
    perpendicular to the gradient vector at its previous iteration.
  prefs: []
  type: TYPE_NORMAL
- en: Stochastic Gradient Descent
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Both steepest descent and gradient descent are full-batch models; i.e., the
    gradients are computed based on the whole training dataset. So, if the dataset
    is huge, the gradient computation becomes expensive, and the memory requirement
    increases. Also, if the dataset has huge redundancy, then computing the gradient
    on the full dataset is not useful since similar gradients can be computed by using
    much smaller batches called mini-batches. The most popular method to overcome
    the preceding problems is to use an optimization technique called stochastic gradient
    descent.
  prefs: []
  type: TYPE_NORMAL
- en: Stochastic gradient descent is a technique for minimizing a cost function based
    on the gradient-descent method where the gradient at each step is not based on
    the entire dataset but rather on single data points.
  prefs: []
  type: TYPE_NORMAL
- en: Let *C*(*őł*) be the cost function based on *m* training samples. The gradient
    descent at each step is not based on *C*(*őł*) but rather on *C*^((*i*))(*őł*),
    which is the cost function based on the *ith* training sample. So, if we must
    plot the gradient vectors at each iteration against the overall cost function,
    the contour lines would not be perpendicular to the tangents since they are based
    on gradients of *C*^((*i*))(*őł*) and not on the overall C(*őł*).
  prefs: []
  type: TYPE_NORMAL
- en: The cost functions *C*^((*i*))(*őł*) are used for gradient computation at each
    iteration, and the model parameter vector *őł* is updated by the standard gradient
    descent in each iteration until we have made a pass over the entire training dataset.
    We can perform several such passes over the entire dataset until a reasonable
    convergence is obtained.
  prefs: []
  type: TYPE_NORMAL
- en: Since the gradients at each iteration are not based on the entire training dataset
    but rather on single training samples, they are generally very noisy and may change
    direction rapidly. This may lead to oscillations near the minima of the cost function,
    and hence the learning rate should be less while converging to the minima so that
    the update to the parameter vector is as small as possible. The gradients are
    cheaper and faster to compute, and so the gradient descent tends to converge faster.
  prefs: []
  type: TYPE_NORMAL
- en: One thing that is important in stochastic gradient descent is that the training
    samples should be as random as possible. This will ensure that a stochastic gradient
    descent over a period of a few training samples provides a similar update to the
    model parameter as that resulting from an actual gradient descent, since the random
    samples are more likely to represent the total training dataset. If the samples
    at each iteration of stochastic gradient descent are biased, they don‚Äôt represent
    the actual dataset, and hence the update to the model parameter might be in a
    direction that would result in it taking a long time for the stochastic gradient
    descent to converge.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig44_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The graph of cost versus iterations displays the variable fluctuations in the
    total cost-function value.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-43
  prefs: []
  type: TYPE_NORMAL
- en: Fluctuation in the total cost-function value over iterations in stochastic gradient
    descent
  prefs: []
  type: TYPE_NORMAL
- en: As illustrated in Figure [1-44](#Fig45), the gradients at each step for stochastic
    gradient descent are not perpendicular to the tangents at the contour lines. However,
    they would be perpendicular to the tangents to the contour lines for individual
    training samples had we plotted them. Also, the associated cost reduction over
    iterations is noisy because of the fluctuating gradients.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig45_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The concentric circles of seven layers are represented on the two-dimensional
    plane of theta 2 versus theta 1\. Six arrows are marked in the layers.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-44
  prefs: []
  type: TYPE_NORMAL
- en: Stochastic gradient-descent parameter update
  prefs: []
  type: TYPE_NORMAL
- en: 'The gradient computations become very cheap when we use single training data
    points. Also, convergence is quite fast, but it does come with its own set of
    disadvantages, as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: Since the estimated gradients at each iteration are based not on the total cost
    function but rather on the cost function associated with single data points, the
    gradients are very noisy. This leads to convergence problems at the minima and
    may lead to oscillations.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The tuning of the learning rate becomes important since a high learning rate
    might lead to oscillations while converging to the minima. This is because the
    gradients are very noisy, and hence if the gradient estimates at the convergence
    are not near to zero, a high learning rate will take the update well past the
    minima point, and the process can repeat on either side of the minima.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Since the gradients are noisy, the model parameter values after each iteration
    are also very noisy, and thus heuristics need to be added to the stochastic gradient
    descent to determine which value of model parameter to take. This also brings
    about another question: when to stop the training.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A compromise between full-batch model and stochastic gradient descent is a mini-batch
    approach wherein the gradient is based neither on the full training dataset nor
    on the single data points. Rather, it uses a mini-batch of training data points
    to compute the cost function. Most of the deep-learning algorithms use a mini-batch
    approach for stochastic gradient descent. The gradients are less noisy and at
    the same time don‚Äôt cause many memory constraints because the mini-batch sizes
    are moderate.
  prefs: []
  type: TYPE_NORMAL
- en: We will discuss mini-batches in more detail in Chapter [2](448418_2_En_2_Chapter.xhtml).
  prefs: []
  type: TYPE_NORMAL
- en: Newton‚Äôs Method
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Before we start Newton‚Äôs method for optimizing a cost function for its minima,
    let us look at the limitations of gradient-descent techniques.
  prefs: []
  type: TYPE_NORMAL
- en: Gradient-descent methods rely on the linearity of the cost function between
    successive iterations; i.e., the parameter value at iteration (*t*¬†+¬†1) can be
    reached from the parameter value at time *t* by following the gradient, since
    the path of the cost function C(*őł*) from *t* to (*t*¬†+¬†1) is linear or can be
    joined by a straight line. This is a very simplified assumption and would not
    yield good directions for gradient descent if the cost function is highly nonlinear
    or has curvature. To get a better idea of this, let us look at the plot of a cost
    function with a single variable for three different cases.
  prefs: []
  type: TYPE_NORMAL
- en: Linear Curve
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig46_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The two-dimensional plane of the function of x versus x displays a decreasing
    line to illustrate a linear function.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-45
  prefs: []
  type: TYPE_NORMAL
- en: Linear cost function
  prefs: []
  type: TYPE_NORMAL
- en: Negative Curvature
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig47_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The two-dimensional plane of the function of x versus x displays a hogging curve
    with a tangent P to illustrate negative curvature.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-46
  prefs: []
  type: TYPE_NORMAL
- en: Cost function with negative curvature at point P
  prefs: []
  type: TYPE_NORMAL
- en: Positive Curvature
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig48_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The two-dimensional plane of the function of x versus x displays a sagging curve
    with a tangent P to illustrate positive curvature.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-47
  prefs: []
  type: TYPE_NORMAL
- en: Cost function with positive curvature at point P
  prefs: []
  type: TYPE_NORMAL
- en: For the linear cost function, as shown in Figure [1-45](#Fig46), the negative
    of the gradient would give us the best direction for reaching the minima since
    the function is linear and does not have any curvature. For both the negative
    and positive curvature cost functions, shown in Figures [1-46](#Fig47) and [1-47](#Fig48),
    respectively, the derivative would not give us a good direction for minima, and
    so to take care of the curvature, we would need the Hessian along with the derivative.
    Hessians, as we have seen, are nothing but a matrix of second derivatives. They
    contain information about the curvature and thus would give a better direction
    for a parameter update as compared to a simple gradient descent.
  prefs: []
  type: TYPE_NORMAL
- en: Gradient-descent methods are first-order approximation methods for optimization,
    whereas Newton‚Äôs methods are second-order methods for optimization since they
    use the Hessian along with the gradient to take care of curvatures in the cost
    function.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let us take our usual cost function *C*(*őł*), where *őł*¬†‚ąą¬†*R*^(*n*¬†√ó¬†1) is
    an *n*-dimensional model parameter vector. We can approximate the cost function
    *C*(*őł*) in the neighborhood of *őł* by its second-order Taylor series expansion,
    as shown here:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ C\left(\theta +\varDelta \theta \right)=C\left(\theta \right)+\varDelta
    {\theta}^T\nabla C\left(\theta \right)+\frac{1}{2}\varDelta {\theta}^TH\left(\theta
    \right)\varDelta \theta $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgp.png)'
  prefs: []
  type: TYPE_IMG
- en: ‚ąá*C*(*őł*) is the gradient and *H*(*őł*) is the Hessian of the cost function *C*(*őł*).
  prefs: []
  type: TYPE_NORMAL
- en: Now, if *őł* is the value of the model parameter vector at iteration *t*, and
    (*őł*¬†+¬†*őĒőł*) is the value of the model parameter at iteration, then
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ C\left({\theta}^{\left(t+1\right)}\right)=C\left({\theta}^{(t)}\right)+\varDelta
    {\theta}^T\mathit{\nabla}C\left({\theta}^{(t)}\right)+\frac{1}{2}\varDelta {\theta}^TH\left({\theta}^{(t)}\right)\varDelta
    \theta $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgq.png)'
  prefs: []
  type: TYPE_IMG
- en: where *őĒőł*¬†=¬†*őł*^((*t*¬†+¬†1))‚Äā¬†‚ąí‚Äā*őł*^((*t*)).
  prefs: []
  type: TYPE_NORMAL
- en: 'Taking the gradient with respect to *őł*^((*t*¬†+¬†1))[,] we have the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \mathit{\nabla}C\left({\theta}^{\left(t+1\right)}\right) = \mathit{\nabla}C\left({\theta}^{(t)}\right)+H\left({\theta}^{(t)}\right)\varDelta
    \theta $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgr.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Setting the gradient ‚ąá*C*(*őł*^((*t*¬†+¬†1))) to 0, we get the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \nabla C\left({\theta}^{(t)}\right)+H\left({\theta}^{(t)}\right)\varDelta
    \theta =0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgs.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ =&gt;\varDelta \theta =-H{\left({\theta}^{(t)}\right)}^{-1}\nabla C\left({\theta}^{(t)}\right)
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgt.png)'
  prefs: []
  type: TYPE_IMG
- en: 'So, the parameter update for Newton‚Äôs method is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ =&gt;{\theta}^{\left(t+1\right)}={\theta}^{(t)}-H{\left({\theta}^{(t)}\right)}^{-1}\nabla
    C\left({\theta}^{(t)}\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgu.png)'
  prefs: []
  type: TYPE_IMG
- en: We do not have a learning rate for Newton‚Äôs method, but one may choose to use
    a learning rate, much like with gradient descent. Since the directions for nonlinear
    cost functions are better with Newton‚Äôs method, the iterations to converge to
    the minima would be fewer as compared to gradient descent. One thing to note is
    that if the cost function that we are trying to optimize is a quadratic cost function,
    such as the one in linear regression, then Newton‚Äôs method would technically converge
    to the minima in one step.
  prefs: []
  type: TYPE_NORMAL
- en: However, computing the Hessian matrix and its inverse is computationally expensive
    or intractable at times, especially when the number of input features is large.
    Also, at times there might be functions for which the Hessian is not even properly
    defined. So, for large machine-learning and deep-learning applications, gradient-descent‚ÄĒespecially
    stochastic gradient descent‚ÄĒtechniques with mini-batches are used since they are
    relatively less computationally intensive and scale up well when the data size
    is large.
  prefs: []
  type: TYPE_NORMAL
- en: Constrained Optimization Problem
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In a constrained optimization problem, along with the cost function that we
    need to optimize, we have a set of constraints that we need to adhere to. The
    constraints might be equations or inequalities.
  prefs: []
  type: TYPE_NORMAL
- en: 'Whenever we want to minimize a function that is subject to an equality constraint,
    we use the Lagrange formulation. Let‚Äôs say we must minimize *f*(*őł*) subject to
    *g*(*őł*)¬†=¬†0 where *őł*¬†‚ąą¬†*R*^(*n*¬†√ó¬†1). For such a constrained optimization problem,
    we need to minimize a function *L*(*őł*, ‚Äā*őĽ*)¬†=¬†*f*(*őł*)¬†+¬†*őĽg*(*őł*). Taking the
    gradient of *L*, which is called the Lagrangian, with respect to the combined
    vector *őł*, *őĽ*, and setting it to 0 would give us the required *őł* that minimizes
    *f*(*őł*) and adheres to the constraint. *őĽ* is called the Lagrange multiplier.
    When there are several constraints, we need to add all such constraints, using
    a separate Lagrange multiplier for each constraint. Let‚Äôs say we want to minimize
    *f*(*őł*) subject to *m* constraints *g*[*i*](*őł*)¬†=¬†0¬†‚ąÄ¬†*i*‚Äā‚ąą{1, 2, 3, ‚Ä¶*m*};
    the Lagrangian can be expressed as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ L\left(\theta, \kern0.5em \lambda \right)=f\left(\theta \right)+\sum \limits_{i=1}^m{\lambda}_i{g}_i\left(\theta
    \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgv.png)'
  prefs: []
  type: TYPE_IMG
- en: where *őĽ*¬†=¬†[*őĽ*[1]*őĽ*[2]¬†. .‚Äā*őĽ*[*m*]]^(*T*)
  prefs: []
  type: TYPE_NORMAL
- en: To minimize the function, the gradient of *L*(*őł*, *őĽ*) with respect to both
    *őł* and *őĽ* vectors should be a zero vector, i.e.,
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\nabla}_{\theta}\left(\theta, \kern0.5em \lambda \right)=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgw.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {\nabla}_{\lambda}\left(\theta, \kern0.5em \lambda \right)=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgx.png)'
  prefs: []
  type: TYPE_IMG
- en: The preceding method cannot be directly used for constraints with inequality.
    In such cases, a more generalized approach called the Karush-Kuhn-Tucker method
    can be used.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let *C*(*őł*) be the cost function that we wish to minimize, where . Also, let
    there be *k* number of constraint on *őł* such that the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {f}_1\left(\theta \right)={a}_1 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgy.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {f}_2\left(\theta \right)={a}_2 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equgz.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {f}_3\left(\theta \right)\le \kern0.5em {a}_3 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equha.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {f}_4\left(\theta \right)\ge \kern0.5em {a}_4 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhb.png)'
  prefs: []
  type: TYPE_IMG
- en: ‚Ä¶
  prefs: []
  type: TYPE_NORMAL
- en: ‚Ä¶
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {f}_k\left(\theta \right)={a}_k $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhc.png)'
  prefs: []
  type: TYPE_IMG
- en: This becomes a constrained optimization problem since there are constraints
    that *őł* should adhere to. Every inequality can be transformed into a standard
    form where a certain function is less than or less than equal to zero. For example,
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {f}_4\left(\theta \right)\ge \kern0.5em {a}_4=&gt;-{f}_4\left(\theta \right)\le
    -{a}_4=&gt;-{f}_4\left(\theta \right)+{a}_4\le 0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhd.png)'
  prefs: []
  type: TYPE_IMG
- en: Let each such constraint strictly less than, or less than equal to, zero be
    represented by *g*[*i*](*őł*). Also, let there be some strict equality equations
    *e*[*j*](*őł*). Such minimization problems are solved through the Karush-Kuhn-Tucker
    version of Lagrangian formulation.
  prefs: []
  type: TYPE_NORMAL
- en: 'Instead of minimizing *C*(*őł*), we need to minimize a cost function *L*(*őł*,
    *őĪ*, *ő≤*) as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ L\left(\theta, \kern0.5em \alpha, \beta \right)=C\left(\theta \right)+\sum
    \limits_{i=1}^{k_1}{\alpha}_i{g}_i\left(\theta \right)+\sum \limits_{j=1}^{k_2}{\beta}_j{e}_j\left(\theta
    \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhe.png)'
  prefs: []
  type: TYPE_IMG
- en: The scalers *őĪ*[*i*]¬†‚ąÄ‚Äā*i*¬†‚ąą¬†{1, 2, 3, ..*k*[1]} and *ő≤*[*j*]¬†‚ąÄ *j*¬†‚ąą¬†{1, 2,
    3, ..*k*[2]} are called the Lagrangian multipliers, and there would be *k* of
    them corresponding to *k* constraints. So, we have converted a constrained minimization
    problem into an unconstrained minimization problem.
  prefs: []
  type: TYPE_NORMAL
- en: 'To solve the problem, the Karush-Kuhn-Tucker conditions should be met at the
    minima point as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: The gradient of *L*(*őł*, *őĪ*,¬†*ő≤*) with respect to *őł* should be the zero vector,
    i.e.,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![$$ {\nabla}_{\theta}\left(\theta, \kern0.5em \alpha, \beta \right)=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhf.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ =&gt;{\nabla}_{\theta }C\left(\theta \right)+\sum \limits_{i=1}^{k_1}{\alpha}_i{\nabla}_{\theta
    }{g}_i\left(\theta \right)+\sum \limits_{j=1}^{k_2}{\beta}_j{\nabla}_{\theta }{e}_j\left(\theta
    \right)=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhg.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The gradient of the *L*(*őł*, *őĪ*,¬†*ő≤*) with respect to *ő≤*, which is the Lagrange
    multiplier vector corresponding to the equality conditions, should be zero:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![$$ {\nabla}_{\beta}\left(\theta, \kern0.5em \alpha, \beta \right)=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhh.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ =&gt;{\nabla}_{\beta }C\left(\theta \right)+\sum \limits_{i=1}^{k_1}{\alpha}_i{\nabla}_{\beta
    }{g}_i\left(\theta \right)+\sum \limits_{j=1}^{k_2}{\beta}_j{\nabla}_{\beta }{e}_j\left(\theta
    \right)=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhi.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The inequality conditions should become equality conditions at the minima point.
    Also, the inequality Lagrange multipliers should be nonnegative:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![$$ {\alpha}_i{g}_i\left(\theta \right)=0\; and\kern0.5em {\alpha}_i\ge 0\kern1em
    \forall i\kern0.5em \in \left\{1,2,\dots, {k}_1\right\} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhj.png)'
  prefs: []
  type: TYPE_IMG
- en: Solving for the preceding conditions would provide the minima to the constrained
    optimization problem.
  prefs: []
  type: TYPE_NORMAL
- en: A Few Important Topics in Machine Learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this section, we will discuss a few important topics that are very much relevant
    to machine learning. Their underlying mathematics is very rich.
  prefs: []
  type: TYPE_NORMAL
- en: Dimensionality-Reduction Methods
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Principal component analysis and singular value decomposition are the most used
    dimensionality-reduction techniques in the machine-learning domain. We will discuss
    these techniques to some extent here. Please note that these data-reduction techniques
    are based on linear correlation and do not capture nonlinear correlation such
    as co-skewness, co-Kurtosis, and so on. We will talk about a few dimensionality-reduction
    techniques that are based on artificial neural networks, such as auto-encoders,
    in the latter part of the book.
  prefs: []
  type: TYPE_NORMAL
- en: Principal Component Analysis
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Principal component analysis is a dimensionality-reduction technique that ideally
    should have been discussed in the ‚ÄúLinear Algebra‚ÄĚ section. However, to make its
    mathematics much easier to grasp, I intentionally kept it for after the constrained
    optimization problem. Let us look at the two-dimensional data plot in Figure [1-45](#Fig46).
    As we can see, the maximum variance of the data is neither along the *x* direction
    nor along the *y* direction, but somewhat in a direction in between. So, had we
    projected the data in a direction where the variance is at maximum, it would have
    covered most of the variability in the data. Also, the rest of the variance could
    have been ignored as noise.
  prefs: []
  type: TYPE_NORMAL
- en: The data along the *x* direction and the *y* direction are highly correlated
    (see Figure [1-48](#Fig49)). The covariance matrix would provide the required
    information about the data to reduce the redundancy. Instead of looking at the
    *x* and *y* directions, we can look at the *a*[1] direction, which has the maximum
    variance.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig49_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The two-dimensional plane of y versus x displays dense scatterplots with two
    vectors, a 2 and a 1.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-48
  prefs: []
  type: TYPE_NORMAL
- en: Correlated 2-D data. a[1] and a[2] are the directions along which the data is
    uncorrelated and are the principal components
  prefs: []
  type: TYPE_NORMAL
- en: Now, let us get into some math and assume that we do not have the plot and we
    only have the data for *m* number of samples *x*^((*i*))¬†‚ąą¬†*R*^(*n*¬†√ó¬†1).
  prefs: []
  type: TYPE_NORMAL
- en: We want to find out independent directions in the *n*-dimensional plane in the
    order of decreasing variances. By independent directions, I mean the covariance
    between those directions should be 0\. Let *a*[1] be the unit vector along which
    the variance of the data is maximum. We first subtract the mean of the data vector
    to center the data on the origin. Let *őľ* be the mean vector of the data vector
    *x*; i.e., *E*[*x*]¬†=¬†*őľ*.
  prefs: []
  type: TYPE_NORMAL
- en: 'A component of the (*x*¬†‚ąí¬†*őľ*) vector in the direction of *a*[1] is the projection
    of (*x*¬†‚ąí¬†*őľ*) on *a*[1]; let it be denoted by *z*[1]:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {z}_1={a_1}^T\left(x-\mu \right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhk.png)'
  prefs: []
  type: TYPE_IMG
- en: '*var* (*z*[1]) =*var* [*a*[1]^(*T*)(*x*¬†‚ąí¬†*őľ*)] = *a*[1]^(*T*)*cov*(*x*)*a*[1],
    where *var* denotes variance and *cov*(*x*) denotes the covariance matrix.'
  prefs: []
  type: TYPE_NORMAL
- en: 'For given data points, the variance is a function of *a*[1]. So, we would have
    to maximize the variance with respect to *a*[1] given that *a*[1] is a unit vector:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {a_1}^T{a}_1=1\kern1em =&gt;{a_1}^T{a}_1-1=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhl.png)'
  prefs: []
  type: TYPE_IMG
- en: So, we can express the function to be maximized as
  prefs: []
  type: TYPE_NORMAL
- en: '*L*(*a*[1], ‚Äā*őĽ*)¬†=¬†*a*[1]^(*T*)¬†*cov*¬†(*x*)*a*[1]¬†‚ąí¬†*őĽ*(*a*[1]^(*T*)*a*[1]¬†‚ąí¬†1),
    where *őĽ* is a Lagrangian multiplier.'
  prefs: []
  type: TYPE_NORMAL
- en: 'For maxima, setting the gradient of *L* with respect to *a*[1] to 0, we get
    the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \nabla L=2\mathit{\operatorname{cov}}(x){a}_1-2\lambda {a}_1=0\kern1em
    =&gt;\mathit{\operatorname{cov}}(x){a}_1=\lambda {a}_1 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhm.png)'
  prefs: []
  type: TYPE_IMG
- en: We can see something come up that we studied earlier. The *a*[1] vector is nothing
    but an Eigen vector of the covariance matrix, and *őĽ* is the corresponding Eigen
    value.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, substituting this into the variance expression along *a*[1], we get the
    following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \mathit{\operatorname{var}}\left({z}_1\right)={a_1}^T\mathit{\operatorname{cov}}(x){a}_1={a_1}^T\lambda
    {a}_1=\lambda {a_1}^T{a}_1=\lambda $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhn.png)'
  prefs: []
  type: TYPE_IMG
- en: Since the expression for variance along *a*[1] is the Eigen value itself, the
    Eigen vector corresponding to the highest Eigen value gives us the first principal
    component or the direction along which the variance in data is maximum.
  prefs: []
  type: TYPE_NORMAL
- en: Now, let us get the second principal component, or the direction along which
    the variance is maximum right after *a*[1].
  prefs: []
  type: TYPE_NORMAL
- en: Let the direction of the second principal component be given by the unit vector
    *a*[2]. Since we are looking for orthogonal components, the direction of *a*[2]
    should be perpendicular to *a*[1].
  prefs: []
  type: TYPE_NORMAL
- en: A projection of the data along *a*[2] can be expressed by the variable *z*[2]=
    *a*[2]^(*T*)(*x*¬†‚ąí¬†*őľ*).
  prefs: []
  type: TYPE_NORMAL
- en: Hence, the variance of the data along *a*[2] is Var (*z*[2]) = Var [*a*[2]^(*T*)(*x*¬†‚ąí¬†*őľ*)]
    = *a*[2]^(*T*)*cov*(*x*)*a*[2].
  prefs: []
  type: TYPE_NORMAL
- en: We would have to maximize *Var*(*z*[2]) subject to the constraints *a*[2]^(*T*)*a*[2]¬†=¬†1
    since *a*[2] is a unit vector and
  prefs: []
  type: TYPE_NORMAL
- en: '*a*[2]^(*T*)*a*[1] = 0 since *a*[2] should be orthogonal to *a*[1].'
  prefs: []
  type: TYPE_NORMAL
- en: 'We need to maximize the following function *L*(*a*[2],¬†*őĪ*,¬†*ő≤*) with respect
    to the parameters *a*[2],¬†*őĪ*,¬†*ő≤*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ L\left({a}_2,\alpha, \beta \right)={a_2}^T\mathit{\operatorname{cov}}(x){a}_2-\alpha
    \left({a_2}^T{a}_2\kern0.5em -\kern0.5em 1\right)\kern0.5em -\kern0.5em \beta
    \left({a_2}^T{a}_1\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equho.png)'
  prefs: []
  type: TYPE_IMG
- en: 'By taking a gradient with respect to *a*[2] and setting it to zero vector,
    we get the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \nabla L=2\mathit{\operatorname{cov}}(x){a}_2-2\alpha {a}_2-\beta {a}_1=0
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhp.png)'
  prefs: []
  type: TYPE_IMG
- en: 'By taking the dot product of the gradient ‚ąá*L* with vector *a*[1,] we get the
    following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ 2{a_1}^T\mathit{\operatorname{cov}}(x){a}_2-2\alpha {a_1}^T{a}_2-\beta
    {a_1}^T{a}_1=0 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhq.png)'
  prefs: []
  type: TYPE_IMG
- en: '*a*[1]^(*T*)*cov*(*x*)*a*[2] is a scalar and can be written as *a*[2]^(*T*)*cov*(*x*)*a*[1].'
  prefs: []
  type: TYPE_NORMAL
- en: On simplification, *a*[2]^(*T*)*cov*(*x*)*a*[1] = *a*[2]^(*T*)*őĽa*[1]¬†=¬†*őĽa*[2]^(*T*)*a*[1]¬†=¬†0\.
    Also, the term 2*őĪa*[1]^(*T*)*a*[2] is equal to 0, which leaves *ő≤a*[1]^(*T*)*a*[1]¬†=¬†0\.
    Since *a*[1]^(*T*)*a*[1]¬†=¬†1, *ő≤* must be equal to 0.
  prefs: []
  type: TYPE_NORMAL
- en: 'Substituting *ő≤*¬†=¬†0 in the expression for ‚ąá*L*¬†=¬†2¬†*cov*¬†(*x*)*a*[2]¬†‚ąí¬†2*őĪa*[2]¬†‚ąí¬†*ő≤a*[1]¬†=¬†0,
    we have the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ 2\mathit{\operatorname{cov}}(x){a}_2-2\alpha {a}_2=0\kern0.5em i.e.\kern0.5em
    \mathit{\operatorname{cov}}(x){a}_2=\alpha {a}_2 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhr.png)'
  prefs: []
  type: TYPE_IMG
- en: Hence, the second principal component is also an Eigen vector of the covariance
    matrix, and the Eigen value *őĪ* must be the second largest Eigen value just after
    *őĽ*. In this way, we would get *n* Eigen vectors from the covariance matrix *cov*(*x*)¬†‚ąą¬†*R*^(*n*¬†√ó¬†*n*),
    and the variance of the data along each of those Eigen vector directions (or principal
    components) would be represented by the Eigen values. One thing to note is that
    the covariance matrix is always symmetrical and thus the Eigen vectors would always
    be orthogonal to each other and so would give independent directions.
  prefs: []
  type: TYPE_NORMAL
- en: The covariance matrix is always positive semi-definite.
  prefs: []
  type: TYPE_NORMAL
- en: This is true because the Eigen values of the covariance matrix represent variances,
    and variance cannot be negative. If *cov*(*x*) is positive definite, i.e., *a*^(*T*)¬†*cov*¬†(*x*)*a*¬†>¬†0,
    then all the Eigen values of covariance matrices are positive.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [1-49](#Fig50) illustrates a principal component analysis transformation
    of the data. As we can see, PCA has centered the data and got rid of correlation
    among the PCA transformed variables.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig50_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The ellipse has two vectors, z 2 and z 1 on the two-dimensional planes, arrows
    point to another ellipse with two vectors, z 2 and z 1.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-49
  prefs: []
  type: TYPE_NORMAL
- en: Principal component analysis centers the data and then projects the data into
    axes along which variance is maximum. The data along z[2] can be ignored if the
    variance along it is negligible
  prefs: []
  type: TYPE_NORMAL
- en: When Will PCA Be Useful in Data Reduction?
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: When there is high correlation between the different dimensions of the input,
    there would only be a few independent directions along which the variance of data
    would be high, and along other directions the variance would be insignificant.
    With PCA, one can keep the data components in the few directions in which variance
    is high and make a significant contribution to the overall variance, ignoring
    the rest of the data.
  prefs: []
  type: TYPE_NORMAL
- en: How Do You Know How Much Variance Is Retained by the Selected Principal Components?
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: If the *z* vector presents the transformed components for input vector *x*,
    then the *cov*(*z*) would be a diagonal matrix containing the Eigen values of
    the *cov*(*x*) matrix as its diagonal entries.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \mathit{\operatorname{cov}}(z)=\left[\begin{array}{ccc}{\lambda}_1&amp;
    \cdots &amp; 0\\ {}\vdots &amp; {\lambda}_2&amp; \vdots \\ {}0&amp; \cdots \kern0.5em
    &amp; {\lambda}_n\end{array}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhs.png)'
  prefs: []
  type: TYPE_IMG
- en: Also, let us suppose the Eigen values are ordered like *őĽ*[1]¬†>¬†*őĽ*[2]¬†>¬†*őĽ*[3]‚Äā.
    .¬†>¬†*őĽ*[*n*].
  prefs: []
  type: TYPE_NORMAL
- en: 'Let us suppose we choose to keep only the first *k* principal components; the
    proportion of variance in the data captured is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\lambda_1+{\lambda}_2+{\lambda}_3+\dots +{\lambda}_k}{\lambda_1+{\lambda}_2+{\lambda}_3+\dots
    +{\lambda}_k+\dots +{\lambda}_n} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equht.png)'
  prefs: []
  type: TYPE_IMG
- en: Singular Value Decomposition
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Singular value decomposition is a dimensionality-reduction technique that factorizes
    a matrix *A*‚Äā¬†‚ąą‚Äā‚ĄĚ^(*m*¬†√ó¬†*n*) *A*¬†‚ąą¬†*R*^(*m*¬†√ó¬†*n*) into a product of three matrices,
    as *A*¬†=¬†*USV*^(*T*) where
  prefs: []
  type: TYPE_NORMAL
- en: '*U*¬†‚ąą¬†*R*^(*m*¬†√ó¬†*m*)¬†and is composed of all the Eigen vectors of the matrix
    *AA*^(*T*)*.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*V*¬†‚ąą¬†*R*^(*n*¬†√ó¬†*n*) and is composed of all the Eigen vectors of the matrix
    *A*^(*T*)*A.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*S*¬†‚ąą¬†*R*^(*m*¬†√ó¬†*n*) and is composed of *k* square root of the Eigen vectors
    of both *A*^(*T*)*A* and *AA*^(*T*), where *k* is the rank of matrix *A*.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The column vectors of *U* are all orthogonal to each other and hence form an
    orthogonal basis. Similarly, the column vectors of *V* also form an orthogonal
    basis:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ U=\left[{u}_1{u}_2 \dots {u}_m\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhu.png)'
  prefs: []
  type: TYPE_IMG
- en: where *u*[*i*]¬†‚ąą¬†*R*^(*m*¬†√ó¬†1)¬†are the column vectors of *U*.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ V=\left[{v}_1{v}_2 \dots {v}_m\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhv.png)'
  prefs: []
  type: TYPE_IMG
- en: where *v*[*i*]¬†‚ąą¬†*R*^(*n*¬†√ó¬†1)¬†are the column vectors of *V*.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ S=\left[\begin{array}{ccc}{\sigma}_1&amp; \cdots &amp; 0\\ {}\vdots &amp;
    {\sigma}_2&amp; \vdots \\ {}0&amp; \cdots \kern0.5em &amp; 0\end{array}\right]
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhw.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Depending on the rank of *A*, there would be *ŌÉ*[1],¬†*ŌÉ*[2,]¬†`‚Ä¶¬†‚Ä¶¬†‚Ä¶.`¬†*ŌÉ*[*k*]
    diagonal entries corresponding to the rank *k* of matrix *A*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ A={\sigma}_1{u}_1{v_1}^T+{\sigma}_2{u}_2{v_2}^T+.\kern0.5em .\kern0.5em
    .\kern0.5em .+{\sigma}_k{u}_k{v_k}^T $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhx.png)'
  prefs: []
  type: TYPE_IMG
- en: The *ŌÉ*[*i*]‚Äā¬†‚ąÄ¬†*i*‚Äā¬†‚ąą¬†{1, 2, 3, ..*k*}, also called singular values, are the
    square root of the Eigen values of both *A*^(*T*)*A* and *AA*^(*T*), and hence
    they are measures of variance in the data. Each of the *ŌÉ*[*i*]*u*[*i*]*v*[*i*]^(*T*)¬†‚ąÄ¬†*i*‚Äā¬†‚ąą¬†{1,
    2, 3, ..*k*} is a rank-one matrix. We can only keep the rank-one matrices for
    which the singular values are significant and explain a considerable proportion
    of the variance in the data.
  prefs: []
  type: TYPE_NORMAL
- en: 'If one takes only the first *p* rank-one matrices corresponding to the first
    *p* singular values of largest magnitude, then the variance retained in the data
    is given by the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{{\sigma_1}^2+{\sigma_2}^2+{\sigma_3}^2+\dots +{\sigma_p}^2}{{\sigma_1}^2+{\sigma_2}^2+{\sigma_3}^2+\dots
    +{\sigma_p}^2+\dots +{\sigma_k}^2} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhy.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Images can be compressed using singular value decomposition. Similarly, singular
    value decomposition is used in collaborative filtering to decompose a user-rating
    matrix to two matrices containing user vectors and item vectors. The singular
    value decomposition of a matrix is given by *USV*^(*T*). The user-rating matrix
    *R* can be decomposed as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ R={US V}^T={US}^{\frac{1}{2}}{S}^{\frac{1}{2}}{V}^T={U}^{\hbox{''}}V{\hbox{''}}^T
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equhz.png)'
  prefs: []
  type: TYPE_IMG
- en: where *U*‚Ä≤ is the user-vector matrix and is equal to ![$$ {US}^{\frac{1}{2}}
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq80.png) and *V*‚Ä≤
    is the items-vector matrix where ![$$ {V}^{\prime }={S}^{\frac{1}{2}}{V}^T $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq81.png).
  prefs: []
  type: TYPE_NORMAL
- en: Regularization
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The process of building a machine-learning model involves deriving parameters
    that fit the training data. If the model is simple, then the model lacks sensitivity
    to the variation in data and suffers from high bias. However, if the model is
    too complex, it tries to model for as much variation as possible and in the process
    models for random noise in the training data. This removes the bias produced by
    simple models but introduces high variance, i.e., the model is sensitive to very
    small changes in the input. High variance for a model is not a good thing, especially
    if the noise in the data is considerable. In such cases, the model in the pursuit
    of performing too well on the training data performs poorly on the test dataset
    since the model loses its capability to generalize well with the new data. This
    problem of models‚Äô suffering from high variance is called *overfitting*.
  prefs: []
  type: TYPE_NORMAL
- en: As we can see in Figure [1-50](#Fig51), we have three models fit to the data.
    The one parallel to the horizontal is suffering from high bias, while the curvy
    one is suffering from high variance. The straight line in between at around 45
    degrees to the horizontal has neither high variance nor high bias.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/448418_2_En_1_Chapter/448418_2_En_1_Fig51_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The two two-dimensional planes of y versus x, for the train dataset and test
    dataset, respectively. It consists of a horizontal line and an increasing line
    with curves and dots.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-50
  prefs: []
  type: TYPE_NORMAL
- en: Illustration of models with high variance and high bias
  prefs: []
  type: TYPE_NORMAL
- en: The model with high variance does well on the train data but fails to do well
    on the test dataset, even when the dataset‚Äôs nature has not changed much. The
    model represented in blue color may not fit the training perfectly, but it does
    better on the test data since the model does not suffer from high variance. The
    trick is to have a model that does not suffer from high bias and at the same time
    is not so complex that it models for random noise as well.
  prefs: []
  type: TYPE_NORMAL
- en: Models with high variance typically have model parameters with a large magnitude
    since the sensitivity of the models to small changes in data is high. To overcome
    the problem of overfitting resulting from high model variance, a popular technique
    called regularization is widely used.
  prefs: []
  type: TYPE_NORMAL
- en: 'To put things into perspective, let us look at the linear regression cost function
    that we looked at earlier:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ C\left(\theta \right)={\left\Vert X\theta \kern0.5em -\kern0.5em Y\right\Vert}_2^2
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equia.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ ={\left( X\theta \kern0.5em -\kern0.5em Y\right)}^T\left( X\theta \kern0.5em
    -\kern0.5em Y\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equib.png)'
  prefs: []
  type: TYPE_IMG
- en: As discussed earlier, models with high variance have model parameters with a
    large magnitude. We can put an extra component into the cost function *C*(*őł*)
    that penalizes the overall cost function in case the magnitude of the model parameter
    vector is high.
  prefs: []
  type: TYPE_NORMAL
- en: 'So, we can have a new cost function, ![$$ L\left(\theta \right)={\left\Vert
    X\theta \kern0.5em -\kern0.5em Y\right\Vert}_2^2+\lambda {\left\Vert \theta \right\Vert}_2^2
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq82.png), where
    ‚ÄĖ*őł*‚ÄĖ[2]¬≤ is the square of the *l*¬≤ norm of the model parameter vector. The optimization
    problem becomes as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\theta}^{\ast }=\underset{\theta }{\underbrace{Arg\kern0.5em \mathit{\operatorname{Min}}}}\kern0.5em
    L\left(\theta \right)={\left\Vert X\theta \kern0.5em -\kern0.5em Y\right\Vert}_2^2+\lambda
    {\left\Vert \theta \right\Vert}_2^2 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equic.png)'
  prefs: []
  type: TYPE_IMG
- en: Taking the gradient ‚ąá*L* with respect to *őł* and setting it to 0 give us *őł*^‚ąó¬†=¬†(*X*^(*T*)*X*¬†+¬†*őĽI*)^(‚ąí1)*X*^(*T*)*Y*.
  prefs: []
  type: TYPE_NORMAL
- en: Now, as we can see because of the ‚ÄĖ*őł*‚ÄĖ[2]¬≤ term in the cost function, the model
    parameter‚Äôs magnitude cannot be too large since it would penalize the overall
    cost function. *őĽ* determines the weight of the regularization term. A higher
    value for *őĽ* would result in smaller values of ‚ÄĖ*őł*‚ÄĖ[2]¬≤, thus making the model
    simpler and prone to high bias or underfitting. In general, even smaller values
    of *őĽ* go a long way in reducing the model complexity and the model variance.
    *őĽ* is generally optimized using cross-validation.
  prefs: []
  type: TYPE_NORMAL
- en: When the square of the *l*¬≤ norm is used as the regularization term, the optimization
    method is called *l*¬≤ regularization. At times, the *l*¬Ļ norm of model parameter
    vectors is used as the regularization term, and the optimization method is termed
    *l*¬Ļ regularization. *l*¬≤ regularization applied to regression problems is called
    ridge regression, whereas *l*¬Ļ regularization applied to such regression problems
    is termed lasso regression.
  prefs: []
  type: TYPE_NORMAL
- en: 'For *l*¬Ļ regularization, the preceding regression problem becomes the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\theta}^{\ast }= \underset{\theta }{\underbrace{Arg\kern0.5em \mathit{\operatorname{Min}}}}L\left(\theta
    \right)={\left\Vert X\theta \kern0.5em -\kern0.5em Y\right\Vert}_2^2+\lambda {\left\Vert
    \theta \right\Vert}_1 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equid.png)'
  prefs: []
  type: TYPE_IMG
- en: Ridge regression is mathematically more convenient since it has a closed-form
    solution, whereas lasso regression does not have a closed-form solution. However,
    lasso regression is much more robust to outliers in comparison with ridge regression.
    Lasso problems give sparse solutions, so it is good for feature selection, especially
    when there is moderate to high correlation among the input features.
  prefs: []
  type: TYPE_NORMAL
- en: Regularization Viewed as a Constraint Optimization Problem
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Instead of adding the penalty term, we can add a constraint on the magnitude
    of the model parameter vector to be less than or equal to some constant value.
    We can then have an optimization problem as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\theta}^{\ast }={argmin}_{\theta}\kern0.5em C\left(\theta \right)={\left\Vert
    X\theta \kern0.5em -\kern0.5em Y\right\Vert}_2^2 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equie.png)'
  prefs: []
  type: TYPE_IMG
- en: such that ![$$ {\left\Vert \theta \right\Vert}_2^2\le b $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq83.png)
  prefs: []
  type: TYPE_NORMAL
- en: where b is a constant.
  prefs: []
  type: TYPE_NORMAL
- en: 'We can convert this constrained minimization problem to an unconstrained minimization
    problem by creating a new Lagrangian formulation, as seen here:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ L\left(\theta, \lambda \right)={\left\Vert X\theta \kern0.5em -\kern0.5em
    Y\right\Vert}_2^2+\lambda \left({\left\Vert \theta \right\Vert}_2^2-b\right) $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equif.png)'
  prefs: []
  type: TYPE_IMG
- en: 'To minimize the Lagrangian cost function per the Karush-Kuhn-Tucker conditions,
    the following are important:'
  prefs: []
  type: TYPE_NORMAL
- en: 'The gradient of *L* with respect to *őł*; i.e., ‚ąá[*őł*]*L*(*őł*, *őĽ*) should be
    the zero vector, which on simplification gives the following:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![$$ \theta ={\left({X}^TX+\lambda I\right)}^{-1}{X}^T\textrm{Y} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equ4.png)'
  prefs: []
  type: TYPE_IMG
- en: (1)
  prefs: []
  type: TYPE_NORMAL
- en: If we consider regularization, i.e., *őĽ*¬†>¬†0, then ![$$ {\left\Vert \theta \right\Vert}_2^2-\textrm{b}=0
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq85.png) (2)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Also, at the optimal point ![$$ \lambda \left({\left\Vert \theta \right\Vert}_2^2-b\right)
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq84.png) = 0 and
    *őĽ*‚Äā¬†‚Č•¬†0
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As we can see from (1), *őł* obtained is a function of *őĽ. őĽ* should be adjusted
    such that the constraint from (2) is satisfied.
  prefs: []
  type: TYPE_NORMAL
- en: The solution *őł*¬†=¬†(*X*^(*T*)*X*¬†+¬†*őĽI*)^(‚ąí1)*X*^(*T*)*Y* from (1) is the same
    as what we get from *l*¬≤ regularization. In machine-learning applications, the
    Lagrange multiplier is generally optimized through hyperparameter tuning or cross-validation
    since we have no knowledge of what a good value for *b* would be. When we take
    small values of *őĽ*, the value of *b* increases and so does the norm of *őł*, whereas
    larger values of *őĽ* provide smaller *b* and hence a smaller norm for *őł*.
  prefs: []
  type: TYPE_NORMAL
- en: Coming back to regularization, any component in the cost function that penalizes
    the complexity of the model provides regularization. In tree-based models, as
    we increase the number of leaf nodes, the complexity of the tree grows. We can
    add a term to the cost function that is based on the number of leaf nodes in the
    tree, and it will provide regularization. A similar thing can be done for the
    depth of the tree.
  prefs: []
  type: TYPE_NORMAL
- en: Even stopping the model-training process early provides regularization. For
    instance, in gradient-descent method, the more iterations we run, the more complex
    the model gets since with each iteration, the gradient descent tries to reduce
    the cost-function value further. We can stop the model-learning process early
    based on some criteria, such as an increase in the cost-function value for the
    test dataset in the iterative process. Whenever in the iterative process of training
    the training cost-function value decreases while the test cost-function value
    increases, it might be an indication of the onset of overfitting, and thus it
    makes sense to stop the iterative learning.
  prefs: []
  type: TYPE_NORMAL
- en: Whenever training data is less in comparison with the number of parameters the
    model must learn, there is a high chance of overfitting, because the model will
    learn too many rules for a small dataset and might fail to generalize well to
    the unseen data. If the dataset is adequate in comparison with the number of parameters,
    then the rules learned are over a good proportion of the population data, and
    hence the chances of model overfitting go down.
  prefs: []
  type: TYPE_NORMAL
- en: Bias and Variance Trade-Off
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As we have discussed earlier, a model which is too simple in comparison with
    the system or relationship that we are trying to learn suffers from high bias.
    Whereas when the model is too complex in comparison with the desired relationship
    it must learn, it suffers from high variance.
  prefs: []
  type: TYPE_NORMAL
- en: Mathematically to define bias precisely, let us assume the world model represented
    as *y*¬†=¬†*f*(*X*; *őł*) where function *f* parameterized by *őł*¬†‚ąą¬†*R*^(*n*) maps
    input *X*¬†‚ąą¬†*R*^(*n*) to output *y*¬†‚ąą¬†*R*.
  prefs: []
  type: TYPE_NORMAL
- en: 'With a ML model we would estimate *őł* as ![$$ \hat{\theta} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq86.png).
    If we use different datasets, we will get different estimate of ![$$ \hat{\theta}
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq87.png) in general.
    The model is said to suffer from high bias if the expected value of ![$$ \hat{\theta}
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq88.png) differs
    from the world value or oracle value *őł* by a large amount. Bias can hence be
    expressed as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Bias=E\left[\hat{\theta}\right]-\theta $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equig.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Variance on the model on the other hand is the variability in the estimates
    ![$$ \hat{\theta} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq89.png)
    of the parameter *őł* and can be expressed as ![$$ E{\left[\hat{\theta}-E\left[\hat{\theta}\right]\right]}^2
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq90.png) when
    *őł* is a scalar. When *őł* is a vector, we can investigate the covariance matrix
    instead for variance of the model as shown in the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ E\left[\left(\hat{\theta}-E\left[\hat{\theta}\right]\right){\left(\hat{\theta}-E\left[\hat{\theta}\right]\right)}^T\right]
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equih.png)'
  prefs: []
  type: TYPE_IMG
- en: The model error in general can be broken down into variance of the model and
    square of the bias of the model. To prove the same, let us assume we have a model
    with one parameter the oracle value of which is *őł*. We estimate the parameter
    of the model *őł* as ![$$ \hat{\theta} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq91.png).
    Since training on different sample of the data would yield different ![$$ \hat{\theta}
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq92.png), ![$$
    \hat{\theta} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq93.png)
    here is a random variable with some mean ![$$ E\left[\hat{\theta}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq94.png)
    and finite variance. The expectation on the square of the difference between ![$$
    \hat{\theta} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq95.png)and
    *őł* as shown in the following would give us our model error.
  prefs: []
  type: TYPE_NORMAL
- en: 'We can expand the above expression as shown in the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ E\left[{\left(\hat{\theta}-\theta \right)}^2\right]=E\left[{\left(\hat{\theta}-E\left[\hat{\theta}\right]+E\left[\hat{\theta}\right]-\theta
    \right)}^2\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equii.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ =E\left[{\left(\hat{\theta}-E\left[\hat{\theta}\right]\right)}^2\right]+E\left[{\left(E\left[\hat{\theta}\right]-\theta
    \right)}^2\right]+2\ E\left[\left(\hat{\theta}-E\left[\hat{\theta}\right]\right)\right]\left[E\left[\hat{\theta}\right]-\theta
    \right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equij.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The first term ![$$ E\left[{\left(\hat{\theta}-E\left[\hat{\theta}\right]\right)}^2\right]
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq96.png) is the
    variance of the model. Everything in the second term is constant and hence ![$$
    E\left[{\left(E\left[\hat{\theta}\right]-\theta \right)}^2\right]={\left(E\left[\hat{\theta}\right]-\theta
    \right)}^2 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq97.png).
    A closer look at ![$$ {\left(E\left[\hat{\theta}\right]-\theta \right)}^2 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq98.png)
    suggests that ![$$ {\left(E\left[\hat{\theta}\right]-\theta \right)}^2 $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq99.png)
    is the bias squared. In the third term ![$$ E\left[\left(\hat{\theta}-E\left[\hat{\theta}\right]\right)\right]\left[E\left[\hat{\theta}\right]-\theta
    \right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq100.png)
    since ![$$ E\left[\hat{\theta}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq101.png)
    and *őł* are constants, the expression simplifies to as the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ 2\ E\left[\left(\hat{\theta}-E\left[\hat{\theta}\right]\right)\right]\left[E\left[\hat{\theta}\right]-\theta
    \right]=2\ast \left[E\left[\hat{\theta}\right]-\theta \right]\ast E\left[\left(\hat{\theta}-E\left[\hat{\theta}\right]\right)\right]
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_Equik.png)'
  prefs: []
  type: TYPE_IMG
- en: Since mean of ![$$ \hat{\theta} $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq102.png)
    is ![$$ E\left[\hat{\theta}\right] $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq103.png)
    hence ![$$ E\left[\left(\hat{\theta}-E\left[\hat{\theta}\right]\right)\right]=0\.
    $$](../images/448418_2_En_1_Chapter/448418_2_En_1_Chapter_TeX_IEq104.png)
  prefs: []
  type: TYPE_NORMAL
- en: Hence, we can see that model error is a combination of variance and bias in
    the model estimate. So, for a given model error, sum of variance of the model
    and square of the bias remain constant‚ÄĒif we try to reduce one, the other would
    increase.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this chapter, we have touched upon all the required mathematical concepts
    for proceeding with machine-learning and deep-learning concepts. The reader is
    still advised to go through proper textbooks pertaining to these subjects in his
    or her spare time for more clarity. However, this chapter is a good starting point.
    In the next chapter, we will start with artificial neural networks and the basics
    of TensorFlow.
  prefs: []
  type: TYPE_NORMAL
