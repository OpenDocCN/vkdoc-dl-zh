- en: 2. Microsoft Bot Framework
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2. Microsoft Bot Framework
- en: 'This chapter covers the Microsoft Bot Framework. We will start with a brief
    introduction to the Microsoft Bot Framework. After that, we will move to:'
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 本章涵盖了 Microsoft Bot Framework。我们将从对 Microsoft Bot Framework 的简要介绍开始。之后，我们将转向：
- en: The template for Bot Framework with Visual Studio
  id: totrans-2
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 Visual Studio 的 Bot Framework 模板
- en: Begin working with the Bot Framework with Visual Studio
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 Visual Studio 开始与 Bot Framework 一起工作
- en: Talk about different Bot Framework states such as Intent, Entities for Bots
    and then describe dialogs and form flow
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 讨论不同的 Bot Framework 状态，如意图、机器人的实体，然后描述对话框和表单流程
- en: Language Understanding and Intelligent Service (LUIS).
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 语言理解与智能服务（LUIS）。
- en: The new LUIS web site, the changes, and explore and discuss its features
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 新的 LUIS 网站，变化，探索并讨论其功能
- en: Developing an end-to-end bot using different bot properties
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用不同的机器人属性开发端到端机器人
- en: Publishing the bot
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 发布机器人
- en: Using Dynamics CRM to use it in Bot Framework
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 Dynamics CRM 在 Bot Framework 中使用它
- en: Studying the structure of AI and bots.
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习 AI 和机器人的结构。
- en: When we are working toward building connections that is the interactive nature
    of chatbots and a well-managed conversation flow, we aim to use frameworks that
    make the work easier for us. The Microsoft Bot Framework is an essential collection
    of tools and supportive software development kits (SDKs) for making the work easier
    when creating and deploying well-managed conversation bots.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们致力于构建连接，即聊天机器人的交互性质和良好的对话流程管理时，我们旨在使用使我们的工作更简单的框架。Microsoft Bot Framework
    是创建和部署良好管理的对话机器人时使工作更简单的工具和辅助软件开发工具包（SDK）的必要集合。
- en: Starting with the Prerequisites
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从先决条件开始
- en: 'To use the Microsoft Bot Framework for development, we first need to satisfy
    some prerequisites. This section describes some of the things that are necessary
    in order to get started:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用 Microsoft Bot Framework 进行开发，我们首先需要满足一些先决条件。本节描述了一些为了开始所需的必要事项：
- en: '*IDE*: Visual Studio'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*集成开发环境*：Visual Studio'
- en: '*Operating system*: Windows 10'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*操作系统*：Windows 10'
- en: '*Bot development framework*: Bot Builder'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*机器人开发框架*：Bot Builder'
- en: '*Emulator for testing*: Bot Framework Emulator'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*测试模拟器*：Bot Framework 模拟器'
- en: Visual Studio
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Visual Studio
- en: First, for the framework to work, we need an integrated development environment
    (IDE), a place where we can code the entire thing. Visual Studio is an essential
    choice for developing for Microsoft Bot Framework. It combines the use of Microsoft
    technology smoothly and it is aligned well with the Microsoft technology stack.
    In this book, we will work with Visual Studio 2015, but we could use Visual Studio
    2017\. You can download Visual Studio from [`https://docs.microsoft.com/en-us/visualstudio/install/install-visual-studio`](https://docs.microsoft.com/en-us/visualstudio/install/install-visual-studio)
    .
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，为了让框架工作，我们需要一个集成开发环境（IDE），一个我们可以编写整个代码的地方。Visual Studio 是为 Microsoft Bot
    Framework 开发的一个基本选择。它将 Microsoft 技术的使用结合得非常顺畅，并且与 Microsoft 技术栈很好地对齐。在这本书中，我们将使用
    Visual Studio 2015，但我们也可以使用 Visual Studio 2017。您可以从[https://docs.microsoft.com/en-us/visualstudio/install/install-visual-studio](https://docs.microsoft.com/en-us/visualstudio/install/install-visual-studio)下载
    Visual Studio。
- en: Windows 10
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Windows 10
- en: We need to have an operating system in place for developing and hosting the
    IDE. The operating system of choice is Windows 10, and you can download it from
    [`www.microsoft.com/en-in/software-download/windows10`](https://www.microsoft.com/en-in/software-download/windows10)
    . Figure [2-1](#Fig1) shows the Windows 10 download page.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要有一个操作系统来开发和托管 IDE。首选的操作系统是 Windows 10，您可以从[www.microsoft.com/en-in/software-download/windows10](https://www.microsoft.com/en-in/software-download/windows10)下载它。图
    [2-1](#Fig1) 显示了 Windows 10 下载页面。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig1_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig1_HTML.jpg)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig1_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig1_HTML.jpg)'
- en: Figure 2-1
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-1
- en: The page to download Windows 10
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 下载 Windows 10 的页面
- en: Bot Builder
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Bot Builder
- en: We also need to have a blueprint for our Bot Framework development with Visual
    Studio. We will have to download a template, and, yes, we will have to choose
    a programming language in which to develop our bot. The programming language of
    choice is C#. We will be dealing with the same programming language most of the
    time during our bot development.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还需要为我们的 Bot Framework 开发在 Visual Studio 中有一个蓝图。我们将需要下载一个模板，是的，我们还需要选择一种编程语言来开发我们的机器人。首选的编程语言是
    C#。在机器人开发的大部分时间里，我们将处理相同的编程语言。
- en: You can download the template from [`https://docs.microsoft.com/en-us/bot-framework/bot-builder-overview-getstarted`](https://docs.microsoft.com/en-us/bot-framework/bot-builder-overview-getstarted)
    . Scroll down this page to find the template to download, as shown in Figure [2-2](#Fig2).
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以从[`https://docs.microsoft.com/en-us/bot-framework/bot-builder-overview-getstarted`](https://docs.microsoft.com/en-us/bot-framework/bot-builder-overview-getstarted)下载模板。滚动到该页面以找到要下载的模板，如图
    [2-2](#Fig2) 所示。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig2_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig2_HTML.jpg)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig2_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig2_HTML.jpg)'
- en: Figure 2-2
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-2
- en: The link to download the Visual Studio template
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 下载 Visual Studio 模板的链接
- en: Bot Framework Emulator
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Bot Framework 模拟器
- en: When we are done coding, we’ll need to test the bot locally before hosting it.
    We’ll use a bot emulator to test all the functionalities and the entire flow of
    the bot. You can download the Bot Framework Emulator from [`https://docs.microsoft.com/en-us/bot-framework/debug-bots-emulator`](https://docs.microsoft.com/en-us/bot-framework/debug-bots-emulator)
    . Figure [2-3](#Fig3) shows the emulator’s download page.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们完成编码后，在托管之前，我们需要在本地测试机器人。我们将使用机器人模拟器来测试所有功能以及机器人的整个流程。你可以从[`https://docs.microsoft.com/en-us/bot-framework/debug-bots-emulator`](https://docs.microsoft.com/en-us/bot-framework/debug-bots-emulator)下载
    Bot Framework 模拟器。图 [2-3](#Fig3) 显示了模拟器的下载页面。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig3_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig3_HTML.jpg)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig3_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig3_HTML.jpg)'
- en: Figure 2-3
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-3
- en: The emulator download page
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 模拟器下载页面
- en: The main page hosts all the bot emulators. From that list, we can download and
    run the emulator’s EXE file. The executable will create a shortcut on the desktop.
    You can then double-click that shortcut to get the emulator running. The direct
    link to get the EXE is [`https://github.com/Microsoft/BotFramework-Emulator/releases/tag/v3.5.34`](https://github.com/Microsoft/BotFramework-Emulator/releases/tag/v3.5.34)
    .
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 主页托管所有机器人模拟器。从该列表中，我们可以下载并运行模拟器的 EXE 文件。可执行文件将在桌面上创建一个快捷方式。然后你可以双击该快捷方式来运行模拟器。获取
    EXE 的直接链接是[`https://github.com/Microsoft/BotFramework-Emulator/releases/tag/v3.5.34`](https://github.com/Microsoft/BotFramework-Emulator/releases/tag/v3.5.34)。
- en: Figure [2-4](#Fig4) shows the appropriate EXE to download .
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [2-4](#Fig4) 显示了要下载的正确 EXE 文件。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig4_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig4_HTML.jpg)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig4_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig4_HTML.jpg)'
- en: Figure 2-4
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-4
- en: The EXE file for the emulator
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 模拟器的 EXE 文件
- en: Creating a Simple Bot Framework App
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建简单的 Bot Framework 应用
- en: In this section, you will create a simple bot framework app by using the VS
    template in the C# language. Then you’ll test the app first by running it locally
    and then by using the Bot Framework Emulator.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，你将通过使用 C# 语言的 VS 模板来创建一个简单的机器人框架应用。然后你将首先通过本地运行应用来测试该应用，然后使用 Bot Framework
    模拟器进行测试。
- en: Using a Template to Create the Project
  id: totrans-43
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用模板创建项目
- en: To get started, you first have to start the Visual Studio IDE for development.
    When you open Visual Studio, the IDE screen looks like Figure [2-5](#Fig5).
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始，你首先需要启动 Visual Studio IDE 进行开发。当你打开 Visual Studio 时，IDE 屏幕看起来像图 [2-5](#Fig5)。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig5_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig5_HTML.jpg)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig5_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig5_HTML.jpg)'
- en: Figure 2-5
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-5
- en: The Visual Studio IDE screen when opened for the first time
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 首次打开 Visual Studio IDE 的屏幕
- en: You need to open a new template to create a project. Click the File tab at the
    top left and then click New ➤ Project, as shown in Figure [2-6](#Fig6).
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要打开一个新的模板来创建项目。点击左上角的文件选项卡，然后点击新建 ➤ 项目，如图 [2-6](#Fig6) 所示。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig6_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig6_HTML.jpg)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig6_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig6_HTML.jpg)'
- en: Figure 2-6
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-6
- en: Creating a new project
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 创建新项目
- en: In the New Project window that opens, you will see that the downloaded Visual
    Studio template for C# is available for creating a bot. Within the templates for
    Visual C#, you can find the Bot Application template (see Figure [2-7](#Fig7)).
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在打开的新项目窗口中，你会看到下载的 Visual Studio C# 模板可用于创建机器人。在 Visual C# 的模板中，你可以找到机器人应用程序模板（见图
    [2-7](#Fig7)）。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig7_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig7_HTML.jpg)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig7_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig7_HTML.jpg)'
- en: Figure 2-7
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-7
- en: The Bot Application template
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: Bot应用程序模板
- en: You are now ready to create an app from the template. In this example, you will
    use the template without changing any parameters so you can see what the Bot Application
    template does.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 您现在可以准备好从模板创建一个应用程序了。在这个示例中，您将使用未更改任何参数的模板，以便您可以看到Bot应用程序模板的功能。
- en: First, you need to name the app. In this example, you will name it App1\. Then
    click OK to continue. In the back end, the template will formulate the bot framework
    essentials and create the necessary files to get your first bot application working.
    Let’s run and observe the code created.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，您需要命名应用程序。在这个示例中，您将将其命名为App1。然后点击“确定”继续。在后台，模板将构建机器人框架的基本要素并创建必要的文件以使您的第一个机器人应用程序工作。让我们运行并观察创建的代码。
- en: Working with the Code
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 与代码一起工作
- en: As the project file is created, you will focus on the Solution Explorer option,
    where you can see the hierarchy of the available files. Figure [2-8](#Fig8) shows
    the files created at the start of the project.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 随着项目文件的创建，您将关注解决方案资源管理器选项，在那里您可以查看可用文件的层次结构。图[2-8](#Fig8)显示了项目开始时创建的文件。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig8_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig8_HTML.jpg)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig8_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig8_HTML.jpg)'
- en: Figure 2-8
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-8
- en: The available files for the new project
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 新项目可用的文件
- en: In terms of getting everything right, the most important file is the `web.config`
    file. This is used for hosting the app on the Web with Azure as well as having
    the entire key details filled in correctly. It’s an XML file in which you have
    to provide the details for the application ID as well as other details from the
    Bot Framework web site, which we will discuss later.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 在确保一切正确的情况下，最重要的文件是`web.config`文件。它用于在Azure上托管应用程序，并确保所有关键细节都填写正确。它是一个XML文件，您必须提供应用程序ID以及来自Bot
    Framework网站的其他详细信息，我们将在后面讨论。
- en: Figure [2-9](#Fig9) shows the how the XML file looks when accessed in the IDE.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 图[2-9](#Fig9)展示了在IDE中访问XML文件时的样子。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig9_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig9_HTML.jpg)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig9_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig9_HTML.jpg)'
- en: Figure 2-9
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-9
- en: The web.config file in the IDE
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 在IDE中的web.config文件
- en: The entire web.config XML file has the structure shown in Listing [2-1](#PC1).
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 整个web.config XML文件的结构如列表[2-1](#PC1)所示。
- en: '[PRE0]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Figure [2-10](#Fig10) shows the most important part of the XML file, where we
    have to make changes. The Configuration tab is where we have to put in all the
    information. The appID, BotID and the AppPassword needs to be updated.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 图[2-10](#Fig10)显示了XML文件最重要的部分，我们需要在这里进行更改。配置选项卡是我们必须填写所有信息的地方。需要更新appID、BotID和AppPassword。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig10_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig10_HTML.jpg)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig10_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig10_HTML.jpg)'
- en: Figure 2-10
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-10
- en: Code for the Confiuration tab
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 配置选项卡的代码
- en: Listing [2-2](#PC2) shows how to get the `BotId`, `MicrosoftAppId`, and `MicrosoftAppPassword`
    values that need to be put in.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 列表[2-2](#PC2)展示了如何获取需要填入的`BotId`、`MicrosoftAppId`和`MicrosoftAppPassword`值。
- en: '[PRE1]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: You will get the details of the bot ID, Microsoft app ID, and the password from
    the Bot Framework web site. You will go through that process later in this chapter,
    when you publish the app. For now, let’s concentrate on the coding logic.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 您将从Bot Framework网站上获取机器人ID、Microsoft应用ID和密码的详细信息。您将在本章后面的发布应用程序时进行此过程。现在，让我们集中精力在编码逻辑上。
- en: 'Inside the `controllers` folder, you will find the `MessageController.cs` file
    . The logic for the template works like this: The `MessageController.cs` file
    checks for activity and then scans any message sent to the bot. The file checks
    the string length and then returns the character size or message length. Listing
    [2-3](#PC3) shows the process in C# of checking the length of the characters .'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 在`controllers`文件夹中，您将找到`MessageController.cs`文件。模板的逻辑是这样的：`MessageController.cs`文件检查活动并扫描发送给机器人的任何消息。该文件检查字符串长度，然后返回字符大小或消息长度。列表[2-3](#PC3)展示了使用C#检查字符长度的过程。
- en: '[PRE2]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'The first line of code uses the Client connector. This connector establishes
    a channel to communicate via the bot messaging system. The next line checks for
    the string length of the message. Using the `??` operator provides two options:
    `activity.Text ?? string.Empty`. If we get a character of a certain length, the
    logic on the left is implemented. If the message is empty, the logic on the right
    is implemented.'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 第一行代码使用客户端连接器。此连接器通过机器人消息系统建立通信通道。下一行检查消息的字符串长度。使用 `??` 运算符提供两个选项：`activity.Text
    ?? string.Empty`。如果我们得到一定长度的字符，则执行左侧的逻辑。如果消息为空，则执行右侧的逻辑。
- en: Listing [2-4](#PC4) shows the complete `MessageController.cs` file .
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 [2-4](#PC4) 显示了完整的 `MessageController.cs` 文件。
- en: '[PRE3]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Running the Application
  id: totrans-82
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 运行应用程序
- en: Now let’s run the bot project. To run the project file, select the green Play
    button with the browser selected, as shown in Figure [2-11](#Fig11).
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们运行机器人项目。要运行项目文件，选择带有浏览器选择的绿色播放按钮，如图 [2-11](#Fig11) 所示。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig11_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig11_HTML.jpg)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig11_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig11_HTML.jpg)'
- en: Figure 2-11
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-11
- en: Running the project
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 运行项目
- en: When you run the application, you will see that it opens locally in a web browser;
    see Figure [2-12](#Fig12).
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 当您运行应用程序时，您会看到它在本地的网页浏览器中打开；见图 [2-12](#Fig12)。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig12_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig12_HTML.jpg)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig12_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig12_HTML.jpg)'
- en: Figure 2-12
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-12
- en: The bot running in the web browser
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 在网页浏览器中运行的机器人
- en: Take note of the localhost address. For testing purposes, you have to use this
    link. Now, let’s start the emulator. Figure [2-13](#Fig13) shows the screen when
    the Bot Framework Emulator starts.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 注意本地主机地址。为了测试目的，您必须使用此链接。现在，让我们启动模拟器。图 [2-13](#Fig13) 显示了机器人框架模拟器启动时的屏幕。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig13_HTML.png](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig13_HTML.png)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig13_HTML.png](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig13_HTML.png)'
- en: Figure 2-13
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-13
- en: The Bot Framework Emulator screen
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 机器人框架模拟器屏幕
- en: You have to provide the endpoint URL or the localhost URL for the bot app. After
    providing the localhost address, and keeping the other options vacant, click the
    Connect button, as shown in Figure [2-14](#Fig14).
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 您必须提供机器人应用的端点 URL 或本地主机 URL。在提供本地主机地址后，保持其他选项为空，然后单击连接按钮，如图 [2-14](#Fig14) 所示。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig14_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig14_HTML.jpg)'
  id: totrans-96
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig14_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig14_HTML.jpg)'
- en: Figure 2-14
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-14
- en: Sharing the localhost address and then connecting
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 分享本地主机地址并连接
- en: Testing the Application
  id: totrans-99
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 测试应用程序
- en: Now let’s test the application. First, send a message of *Hi there who are you*.
    The reply message provides the number of characters, as shown in Figure [2-15](#Fig15).
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们测试应用程序。首先，发送一条消息“Hi there who are you”。回复消息提供了字符数，如图 [2-15](#Fig15) 所示。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig15_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig15_HTML.jpg)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig15_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig15_HTML.jpg)'
- en: Figure 2-15
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-15
- en: The response for the message
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 消息的响应
- en: The bot code and the logic is a combination of three things, illustrated in
    Figure [2-16](#Fig16).
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 机器人代码和逻辑是三者的组合，如图 [2-16](#Fig16) 所示。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig16_HTML.png](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig16_HTML.png)'
  id: totrans-105
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig16_HTML.png](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig16_HTML.png)'
- en: Figure 2-16
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-16
- en: Bot code logic
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 机器人代码逻辑
- en: The *connector* handles all communications. The *activities* are the events
    that occur between a bot and a user. The *messages* are the messages that are
    displayed between a bot and a user.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 连接器处理所有通信。活动是机器人与用户之间发生的事件。消息是显示在机器人和用户之间的消息。
- en: Let’s modify the code a bit. This time, in the activities section, you’ll use
    Markdown content. So let’s go back to the code. Keep everything in the activities
    section and add the code in Listing [2-5](#PC5).
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们稍微修改一下代码。这次，在活动部分，您将使用 Markdown 内容。所以让我们回到代码。保持活动部分的所有内容，并在列表 [2-5](#PC5)
    中添加代码。
- en: '[PRE4]'
  id: totrans-110
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Let’s run this code and test it in the emulator. As you run the code in the
    emulator, you’ll see that it prints the messages in Markdown format. The added
    text is also printed. Figure [2-17](#Fig17) shows the response.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们运行这段代码并在模拟器中测试它。当你模拟运行代码时，你会看到它以 Markdown 格式打印消息。添加的文本也会被打印出来。图 [2-17](#Fig17)
    展示了响应。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig17_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig17_HTML.jpg)'
  id: totrans-112
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig17_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig17_HTML.jpg)'
- en: Figure 2-17
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-17
- en: The response after updating the code
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 更新代码后的响应
- en: Managing State
  id: totrans-115
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 管理状态
- en: This section shows how to manage states in bots. When we have to manage complex
    communication, we need to have a kind of communication medium, or a place, to
    get the conversation going. Figure [2-18](#Fig18) shows options for managing states
    in bots. Table [2-1](#Tab1) explains each state.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 本节展示了如何在机器人中管理状态。当我们需要管理复杂的通信时，我们需要有一种通信媒介或一个地方来开始对话。图 [2-18](#Fig18) 展示了在机器人中管理状态的可选方案。表
    [2-1](#Tab1) 解释了每个状态。
- en: Table 2-1
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 表 2-1
- en: Managing States
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 管理状态
- en: '| Managing State | Description |'
  id: totrans-119
  prefs: []
  type: TYPE_TB
  zh: '| 管理状态 | 描述 |'
- en: '| --- | --- |'
  id: totrans-120
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Storage methods | We can save the state of a bot with the help of databases.
    We can save the data in SQL Server, Azure, and so forth. |'
  id: totrans-121
  prefs: []
  type: TYPE_TB
  zh: '| 存储方法 | 我们可以使用数据库的帮助来保存机器人的状态。我们可以在 SQL Server、Azure 等中保存数据。 |'
- en: '| Class-specific logic at runtime | We can initiate a class at runtime and
    make the bot work. Then we can understand the logic as the bot evolves with different
    functionality for the lifetime of the bot. |'
  id: totrans-122
  prefs: []
  type: TYPE_TB
  zh: '| 运行时类特定逻辑 | 我们可以在运行时启动一个类，并使机器人工作。然后我们可以通过机器人随着不同功能的变化而演变，来理解机器人的逻辑。 |'
- en: '| Form flow, or dialog flow | If we want to initiate certain things sequentially,
    we need to implement form flow, or dialog processes. |'
  id: totrans-123
  prefs: []
  type: TYPE_TB
  zh: '| 表单流程，或对话流程 | 如果我们想要按顺序启动某些事物，我们需要实现表单流程或对话流程。 |'
- en: '| State client | This option is similar to viewing state or session states
    in .NET or MVCs. |'
  id: totrans-124
  prefs: []
  type: TYPE_TB
  zh: '| 状态客户端 | 此选项类似于在 .NET 或 MVC 中查看状态或会话状态。 |'
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig18_HTML.png](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig18_HTML.png)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig18_HTML.png](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig18_HTML.png)'
- en: Figure 2-18
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-18
- en: Ways of managing bots
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 管理机器人的方式
- en: Understanding the Use of Dialogs
  id: totrans-128
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解对话的使用
- en: '*Dialogs* are the flow of conversation to provide a way to communicate a response
    by using messages in chained manner.'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: '*对话* 是以链式方式使用消息提供的一种交流方式，以传达响应。'
- en: When we are creating a bot, we are working in an efficient manner so that we
    get a response in proper way. More specifically, we are trying to receive the
    interaction which should be responsive. Therefore, we are working toward a quality
    experience of the bot conversation. Dialogs help us realize the perfect experience
    for the bot.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们创建机器人时，我们以高效的方式工作，以便以适当的方式获得响应。更具体地说，我们试图接收应该响应的交互。因此，我们致力于提供机器人对话的优质体验。对话帮助我们实现机器人的完美体验。
- en: Let’s just work on the code concept for dialogs now. First, open Visual Studio
    and select the bot template again. Name it ManishaBot, as shown in Figure [2-19](#Fig19).
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们专注于对话的代码概念。首先，打开 Visual Studio 并再次选择机器人模板。将其命名为 ManishaBot，如图 [2-19](#Fig19)
    所示。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig19_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig19_HTML.jpg)'
  id: totrans-132
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig19_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig19_HTML.jpg)'
- en: Figure 2-19
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-19
- en: Creating the dialog bot
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 创建对话机器人
- en: 'Within the directory structure of the project, you need to create a `Dialogs`
    folder. The process for creating the folder is shown in Figure [2-20](#Fig20):
    click Add ➤ New Folder.'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 在项目的目录结构中，你需要创建一个 `Dialogs` 文件夹。创建文件夹的过程如图 [2-20](#Fig20) 所示：点击添加 ➤ 新建文件夹。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig20_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig20_HTML.jpg)'
  id: totrans-136
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig20_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig20_HTML.jpg)'
- en: Figure 2-20
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-20
- en: Creating a folder named Dialogs
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 创建名为 Dialogs 的文件夹
- en: Within the `Dialogs` folder, you will add one class file. Click Add ➤ New Item
    , as shown in Figure [2-21](#Fig21).
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 在 `Dialogs` 文件夹中，你将添加一个类文件。点击添加 ➤ 新建项，如图 [2-21](#Fig21) 所示。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig21_HTML.png](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig21_HTML.png)'
  id: totrans-140
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig21_HTML.png](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig21_HTML.png)'
- en: Figure 2-21
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-21
- en: Adding a new item. From the Visual Studio we select a new item and then add
    a class file.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 添加新项目。从 Visual Studio 中选择新项目，然后添加一个类文件。
- en: Now you will add a class file. The process, as shown in Figure [2-22](#Fig22).
    Name the class file `RandomFactDialog.cs`.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，您将添加一个类文件。过程如图 [2-22](#Fig22) 所示。将类文件命名为 `RandomFactDialog.cs`。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig22_HTML.png](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig22_HTML.png)'
  id: totrans-144
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig22_HTML.png](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig22_HTML.png)'
- en: Figure 2-22
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-22
- en: Creating a class. Here we are creating a separate class so that we can formulate
    the logic in here.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个类。在这里，我们创建一个单独的类，以便我们可以在这里制定逻辑。
- en: Next you’ll link the message controller to the dialog class you created; see
    Listing [2-6](#PC6).
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，您将消息控制器链接到您创建的对话类；请参阅列表 [2-6](#PC6)。
- en: '[PRE5]'
  id: totrans-148
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Now the `RandomFactDialog` class file where you implement chaining for messages
    looks like Listing [2-7](#PC7).
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，`RandomFactDialog` 类文件，您在其中实现消息链，看起来像列表 [2-7](#PC7)。
- en: '[PRE6]'
  id: totrans-150
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Let’s run the code and see what exactly happens. Type *hi*. With the dialog
    chaining, the response is available in the bot, as you can see in Figure [2-23](#Fig23).
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们运行代码并查看具体发生了什么。输入 *hi*。在对话链中，响应在机器人中可用，如图 [2-23](#Fig23) 所示。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig23_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig23_HTML.jpg)'
  id: totrans-152
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig23_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig23_HTML.jpg)'
- en: Figure 2-23
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-23
- en: The response for the bot
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 机器人的响应
- en: Now you will develop a more complex dialog chaining. Listing [2-8](#PC8) shows
    the changes in the structure of the dialog chaining.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，您将开发更复杂的对话链。列表 [2-8](#PC8) 显示了对话链结构的更改。
- en: '[PRE7]'
  id: totrans-156
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Listing [2-9](#PC9) provides the class file in its entirety.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 [2-9](#PC9) 提供了整个类文件。
- en: '[PRE8]'
  id: totrans-158
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: If you run the code now, you will get the result shown in Figure [2-24](#Fig24).
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 如果现在运行代码，您将得到图 [2-24](#Fig24) 中显示的结果。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig24_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig24_HTML.jpg)'
  id: totrans-160
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig24_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig24_HTML.jpg)'
- en: Figure 2-24
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-24
- en: Working on a complex chaining process
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 在处理复杂的链式过程
- en: You start the conversation with *hi*. The bot responds with *Say ‘tell me a
    fact’*. When you type *tell me a fact*, the bot gets inside the chaining logic
    and pops up a message.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 您通过输入 *hi* 开始对话。机器人响应为 *说‘告诉我一个事实’*。当您输入 *告诉我一个事实* 时，机器人进入链式逻辑并弹出一条消息。
- en: Publishing the Bot to the Cloud by Using Azure
  id: totrans-164
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 Azure 将机器人发布到云端
- en: In order to publish the bot to the cloud, you first need to register the bot.
    You do that by heading to [`https://dev.botframework.com/`](https://dev.botframework.com/)
    .
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 为了将机器人发布到云端，您首先需要注册机器人。您可以通过访问[`https://dev.botframework.com/`](https://dev.botframework.com/)来完成此操作。
- en: The Bot Framework page is shown in Figure [2-25](#Fig25).
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 机器人框架页面如图 [2-25](#Fig25) 所示。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig25_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig25_HTML.jpg)'
  id: totrans-167
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig25_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig25_HTML.jpg)'
- en: Figure 2-25
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-25
- en: The Bot Framework page
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 机器人框架页面
- en: At the top of the page, click the My Bots link, as shown in Figure [2-26](#Fig26).
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 在页面顶部，点击图 [2-26](#Fig26) 中显示的“我的机器人”链接。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig26_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig26_HTML.jpg)'
  id: totrans-171
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig26_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig26_HTML.jpg)'
- en: Figure 2-26
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-26
- en: My Bots option
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 我的机器人选项
- en: From the My Bots page, click the Create a Bot button, shown in Figure [2-27](#Fig27).
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 从“我的机器人”页面，点击图 [2-27](#Fig27) 中显示的“创建机器人”按钮。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig27_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig27_HTML.jpg)'
  id: totrans-175
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig27_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig27_HTML.jpg)'
- en: Figure 2-27
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-27
- en: The Create a Bot option
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 创建机器人选项
- en: On the next page, click the Create button, shown in Figure [2-28](#Fig28).
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一页，点击图 [2-28](#Fig28) 中显示的“创建”按钮。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig28_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig28_HTML.jpg)'
  id: totrans-179
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig28_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig28_HTML.jpg)'
- en: Figure 2-28
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-28
- en: Creating a bot
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 创建机器人
- en: Click the radio button labeled Register an Existing Bot Using Bot Builder SDK,
    shown in Figure [2-29](#Fig29). Then click the OK button.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 点击图 [2-29](#Fig29) 中显示的“使用 Bot Builder SDK 注册现有机器人”单选按钮。然后点击“确定”按钮。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig29_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig29_HTML.jpg)'
  id: totrans-183
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig29_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig29_HTML.jpg)'
- en: Figure 2-29
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-29
- en: Selecting the Bot Builder option
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 选择“机器人构建器”选项
- en: Next, provide the details for the bot, as shown in Figure [2-30](#Fig30).
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，提供机器人的详细信息，如图 [2-30](#Fig30) 所示。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig30_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig30_HTML.jpg)'
  id: totrans-187
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig30_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig30_HTML.jpg)'
- en: Figure 2-30
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-30
- en: Providing details about the bot
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 提供关于机器人的详细信息
- en: After you provide the details for the bot, you need to generate an application
    ID and password. Click the option to Create Microsoft App ID and Password, as
    shown in Figure [2-31](#Fig31).
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 在您提供机器人的详细信息后，您需要生成一个应用程序 ID 和密码。点击“创建 Microsoft 应用 ID 和密码”选项，如图 [2-31](#Fig31)
    所示。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig31_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig31_HTML.jpg)'
  id: totrans-191
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig31_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig31_HTML.jpg)'
- en: Figure 2-31
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-31
- en: Generating App ID and password
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 生成应用程序 ID 和密码
- en: In the next window, your application ID is displayed, as shown in Figure [2-32](#Fig32).
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一个窗口中，您的应用程序 ID 将显示，如图 [2-32](#Fig32) 所示。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig32_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig32_HTML.jpg)'
  id: totrans-195
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig32_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig32_HTML.jpg)'
- en: Figure 2-32
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-32
- en: You have the app ID
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 您已拥有应用程序 ID
- en: Click the Generate an App Password to Continue button. Type in the application
    ID, password, and bot handle in the `web.config` file. The new password is generated,
    as shown in Figure [2-33](#Fig33).
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 点击“生成应用程序密码以继续”按钮。在 `web.config` 文件中输入应用程序 ID、密码和机器人句柄。新密码将生成，如图 [2-33](#Fig33)
    所示。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig33_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig33_HTML.jpg)'
  id: totrans-199
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig33_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig33_HTML.jpg)'
- en: Figure 2-33
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-33
- en: The new password is generated
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 新密码已生成
- en: To publish the bot from Visual Studio, right-click it to access the Publish
    option, as shown in Figure [2-34](#Fig34).
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 要从 Visual Studio 发布机器人，右键单击它以访问“发布”选项，如图 [2-34](#Fig34) 所示。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig34_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig34_HTML.jpg)'
  id: totrans-203
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig34_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig34_HTML.jpg)'
- en: Figure 2-34
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-34
- en: Preparing for publishing
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 准备发布
- en: The App Service screen opens, as shown in Figure [2-35](#Fig35). Click the New
    button for the Azure service.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 打开 App Service 屏幕，如图 [2-35](#Fig35) 所示。点击 Azure 服务的“新建”按钮。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig35_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig35_HTML.jpg)'
  id: totrans-207
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig35_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig35_HTML.jpg)'
- en: Figure 2-35
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-35
- en: Click the New button
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 点击“新建”按钮
- en: The bot is ready to be published. You will validate the connection and publish
    , as shown in Figure [2-36](#Fig36).
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 机器人已准备好发布。您将验证连接并发布，如图 [2-36](#Fig36) 所示。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig36_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig36_HTML.jpg)'
  id: totrans-211
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig36_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig36_HTML.jpg)'
- en: Figure 2-36
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-36
- en: Validating and publishing the bot
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 验证并发布机器人
- en: After the bot is published, you need to edit the configuration in the Bot Framework
    portal. Figure [2-37](#Fig37) shows how the Azure web page looks.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 机器人发布后，您需要编辑 Bot 框架门户中的配置。图 [2-37](#Fig37) 显示了 Azure 网页的样式。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig37_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig37_HTML.jpg)'
  id: totrans-215
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig37_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig37_HTML.jpg)'
- en: Figure 2-37
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-37
- en: The bot is published in Azure
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 机器人已发布在 Azure 上
- en: Now head back to the Bot Framework portal. You need to edit the message endpoint
    for the bot. It will be the Azure web site followed by `/api/messages`. See the
    underlined section in Figure [2-38](#Fig38) .
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，返回到 Bot 框架门户。您需要编辑机器人的消息端点。它将是 Azure 网站，后面跟着 `/api/messages`。见图 [2-38](#Fig38)
    中的下划线部分。
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig38_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig38_HTML.jpg)'
  id: totrans-219
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig38_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig38_HTML.jpg)'
- en: Figure 2-38
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-38
- en: Adding the details in the configuration option
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 在配置选项中添加详细信息
- en: The bot is now ready and in the cloud.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 机器人现在已准备好并位于云端。
- en: Conclusion
  id: totrans-223
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: This chapter presented the Microsoft Bot Framework so that you could learn about
    its fundamentals, and publish a bot to the cloud.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 本章介绍了 Microsoft Bot Framework，以便你了解其基础知识，并将机器人发布到云端。
- en: You learned about the Bot Framework template and created an example that could
    recognize the characters sent to the bot. You saw how to reference a class file
    in the main bot framework logic. Next, you learned how to log in to the Bot Framework
    web site to generate the application ID and password needed for your `web.config`
    file. Finally, you learned how to publish the bot from Visual Studio to Azure
    Cloud.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 你学习了 Bot Framework 模板，并创建了一个可以识别发送给机器人的字符的示例。你看到了如何在主机器人框架逻辑中引用类文件。接下来，你学习了如何登录到
    Bot Framework 网站，以生成用于你的 `web.config` 文件的应用程序 ID 和密码。最后，你学习了如何将机器人从 Visual Studio
    发布到 Azure 云。
- en: This first introduction forms the basis of how a bot framework works. In the
    next chapter, you’ll learn about new bots from other organizations.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 这第一次介绍构成了理解机器人框架工作原理的基础。在下一章中，你将了解来自其他组织的新机器人。
