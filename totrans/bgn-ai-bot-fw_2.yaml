- en: 2. Microsoft Bot Framework
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'This chapter covers the Microsoft Bot Framework. We will start with a brief
    introduction to the Microsoft Bot Framework. After that, we will move to:'
  prefs: []
  type: TYPE_NORMAL
- en: The template for Bot Framework with Visual Studio
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Begin working with the Bot Framework with Visual Studio
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Talk about different Bot Framework states such as Intent, Entities for Bots
    and then describe dialogs and form flow
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Language Understanding and Intelligent Service (LUIS).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The new LUIS web site, the changes, and explore and discuss its features
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Developing an end-to-end bot using different bot properties
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Publishing the bot
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using Dynamics CRM to use it in Bot Framework
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Studying the structure of AI and bots.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When we are working toward building connections that is the interactive nature
    of chatbots and a well-managed conversation flow, we aim to use frameworks that
    make the work easier for us. The Microsoft Bot Framework is an essential collection
    of tools and supportive software development kits (SDKs) for making the work easier
    when creating and deploying well-managed conversation bots.
  prefs: []
  type: TYPE_NORMAL
- en: Starting with the Prerequisites
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To use the Microsoft Bot Framework for development, we first need to satisfy
    some prerequisites. This section describes some of the things that are necessary
    in order to get started:'
  prefs: []
  type: TYPE_NORMAL
- en: '*IDE*: Visual Studio'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Operating system*: Windows 10'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Bot development framework*: Bot Builder'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Emulator for testing*: Bot Framework Emulator'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Visual Studio
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: First, for the framework to work, we need an integrated development environment
    (IDE), a place where we can code the entire thing. Visual Studio is an essential
    choice for developing for Microsoft Bot Framework. It combines the use of Microsoft
    technology smoothly and it is aligned well with the Microsoft technology stack.
    In this book, we will work with Visual Studio 2015, but we could use Visual Studio
    2017\. You can download Visual Studio from [`https://docs.microsoft.com/en-us/visualstudio/install/install-visual-studio`](https://docs.microsoft.com/en-us/visualstudio/install/install-visual-studio)
    .
  prefs: []
  type: TYPE_NORMAL
- en: Windows 10
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We need to have an operating system in place for developing and hosting the
    IDE. The operating system of choice is Windows 10, and you can download it from
    [`www.microsoft.com/en-in/software-download/windows10`](https://www.microsoft.com/en-in/software-download/windows10)
    . Figure [2-1](#Fig1) shows the Windows 10 download page.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig1_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-1
  prefs: []
  type: TYPE_NORMAL
- en: The page to download Windows 10
  prefs: []
  type: TYPE_NORMAL
- en: Bot Builder
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We also need to have a blueprint for our Bot Framework development with Visual
    Studio. We will have to download a template, and, yes, we will have to choose
    a programming language in which to develop our bot. The programming language of
    choice is C#. We will be dealing with the same programming language most of the
    time during our bot development.
  prefs: []
  type: TYPE_NORMAL
- en: You can download the template from [`https://docs.microsoft.com/en-us/bot-framework/bot-builder-overview-getstarted`](https://docs.microsoft.com/en-us/bot-framework/bot-builder-overview-getstarted)
    . Scroll down this page to find the template to download, as shown in Figure [2-2](#Fig2).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig2_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-2
  prefs: []
  type: TYPE_NORMAL
- en: The link to download the Visual Studio template
  prefs: []
  type: TYPE_NORMAL
- en: Bot Framework Emulator
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When we are done coding, we’ll need to test the bot locally before hosting it.
    We’ll use a bot emulator to test all the functionalities and the entire flow of
    the bot. You can download the Bot Framework Emulator from [`https://docs.microsoft.com/en-us/bot-framework/debug-bots-emulator`](https://docs.microsoft.com/en-us/bot-framework/debug-bots-emulator)
    . Figure [2-3](#Fig3) shows the emulator’s download page.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig3_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-3
  prefs: []
  type: TYPE_NORMAL
- en: The emulator download page
  prefs: []
  type: TYPE_NORMAL
- en: The main page hosts all the bot emulators. From that list, we can download and
    run the emulator’s EXE file. The executable will create a shortcut on the desktop.
    You can then double-click that shortcut to get the emulator running. The direct
    link to get the EXE is [`https://github.com/Microsoft/BotFramework-Emulator/releases/tag/v3.5.34`](https://github.com/Microsoft/BotFramework-Emulator/releases/tag/v3.5.34)
    .
  prefs: []
  type: TYPE_NORMAL
- en: Figure [2-4](#Fig4) shows the appropriate EXE to download .
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig4_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-4
  prefs: []
  type: TYPE_NORMAL
- en: The EXE file for the emulator
  prefs: []
  type: TYPE_NORMAL
- en: Creating a Simple Bot Framework App
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this section, you will create a simple bot framework app by using the VS
    template in the C# language. Then you’ll test the app first by running it locally
    and then by using the Bot Framework Emulator.
  prefs: []
  type: TYPE_NORMAL
- en: Using a Template to Create the Project
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To get started, you first have to start the Visual Studio IDE for development.
    When you open Visual Studio, the IDE screen looks like Figure [2-5](#Fig5).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig5_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-5
  prefs: []
  type: TYPE_NORMAL
- en: The Visual Studio IDE screen when opened for the first time
  prefs: []
  type: TYPE_NORMAL
- en: You need to open a new template to create a project. Click the File tab at the
    top left and then click New ➤ Project, as shown in Figure [2-6](#Fig6).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig6_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-6
  prefs: []
  type: TYPE_NORMAL
- en: Creating a new project
  prefs: []
  type: TYPE_NORMAL
- en: In the New Project window that opens, you will see that the downloaded Visual
    Studio template for C# is available for creating a bot. Within the templates for
    Visual C#, you can find the Bot Application template (see Figure [2-7](#Fig7)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig7_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-7
  prefs: []
  type: TYPE_NORMAL
- en: The Bot Application template
  prefs: []
  type: TYPE_NORMAL
- en: You are now ready to create an app from the template. In this example, you will
    use the template without changing any parameters so you can see what the Bot Application
    template does.
  prefs: []
  type: TYPE_NORMAL
- en: First, you need to name the app. In this example, you will name it App1\. Then
    click OK to continue. In the back end, the template will formulate the bot framework
    essentials and create the necessary files to get your first bot application working.
    Let’s run and observe the code created.
  prefs: []
  type: TYPE_NORMAL
- en: Working with the Code
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As the project file is created, you will focus on the Solution Explorer option,
    where you can see the hierarchy of the available files. Figure [2-8](#Fig8) shows
    the files created at the start of the project.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig8_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-8
  prefs: []
  type: TYPE_NORMAL
- en: The available files for the new project
  prefs: []
  type: TYPE_NORMAL
- en: In terms of getting everything right, the most important file is the `web.config`
    file. This is used for hosting the app on the Web with Azure as well as having
    the entire key details filled in correctly. It’s an XML file in which you have
    to provide the details for the application ID as well as other details from the
    Bot Framework web site, which we will discuss later.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [2-9](#Fig9) shows the how the XML file looks when accessed in the IDE.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig9_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-9
  prefs: []
  type: TYPE_NORMAL
- en: The web.config file in the IDE
  prefs: []
  type: TYPE_NORMAL
- en: The entire web.config XML file has the structure shown in Listing [2-1](#PC1).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Figure [2-10](#Fig10) shows the most important part of the XML file, where we
    have to make changes. The Configuration tab is where we have to put in all the
    information. The appID, BotID and the AppPassword needs to be updated.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig10_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-10
  prefs: []
  type: TYPE_NORMAL
- en: Code for the Confiuration tab
  prefs: []
  type: TYPE_NORMAL
- en: Listing [2-2](#PC2) shows how to get the `BotId`, `MicrosoftAppId`, and `MicrosoftAppPassword`
    values that need to be put in.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: You will get the details of the bot ID, Microsoft app ID, and the password from
    the Bot Framework web site. You will go through that process later in this chapter,
    when you publish the app. For now, let’s concentrate on the coding logic.
  prefs: []
  type: TYPE_NORMAL
- en: 'Inside the `controllers` folder, you will find the `MessageController.cs` file
    . The logic for the template works like this: The `MessageController.cs` file
    checks for activity and then scans any message sent to the bot. The file checks
    the string length and then returns the character size or message length. Listing
    [2-3](#PC3) shows the process in C# of checking the length of the characters .'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'The first line of code uses the Client connector. This connector establishes
    a channel to communicate via the bot messaging system. The next line checks for
    the string length of the message. Using the `??` operator provides two options:
    `activity.Text ?? string.Empty`. If we get a character of a certain length, the
    logic on the left is implemented. If the message is empty, the logic on the right
    is implemented.'
  prefs: []
  type: TYPE_NORMAL
- en: Listing [2-4](#PC4) shows the complete `MessageController.cs` file .
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Running the Application
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now let’s run the bot project. To run the project file, select the green Play
    button with the browser selected, as shown in Figure [2-11](#Fig11).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig11_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig11_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-11
  prefs: []
  type: TYPE_NORMAL
- en: Running the project
  prefs: []
  type: TYPE_NORMAL
- en: When you run the application, you will see that it opens locally in a web browser;
    see Figure [2-12](#Fig12).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig12_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig12_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-12
  prefs: []
  type: TYPE_NORMAL
- en: The bot running in the web browser
  prefs: []
  type: TYPE_NORMAL
- en: Take note of the localhost address. For testing purposes, you have to use this
    link. Now, let’s start the emulator. Figure [2-13](#Fig13) shows the screen when
    the Bot Framework Emulator starts.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig13_HTML.png](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig13_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-13
  prefs: []
  type: TYPE_NORMAL
- en: The Bot Framework Emulator screen
  prefs: []
  type: TYPE_NORMAL
- en: You have to provide the endpoint URL or the localhost URL for the bot app. After
    providing the localhost address, and keeping the other options vacant, click the
    Connect button, as shown in Figure [2-14](#Fig14).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig14_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig14_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-14
  prefs: []
  type: TYPE_NORMAL
- en: Sharing the localhost address and then connecting
  prefs: []
  type: TYPE_NORMAL
- en: Testing the Application
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now let’s test the application. First, send a message of *Hi there who are you*.
    The reply message provides the number of characters, as shown in Figure [2-15](#Fig15).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig15_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig15_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-15
  prefs: []
  type: TYPE_NORMAL
- en: The response for the message
  prefs: []
  type: TYPE_NORMAL
- en: The bot code and the logic is a combination of three things, illustrated in
    Figure [2-16](#Fig16).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig16_HTML.png](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig16_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-16
  prefs: []
  type: TYPE_NORMAL
- en: Bot code logic
  prefs: []
  type: TYPE_NORMAL
- en: The *connector* handles all communications. The *activities* are the events
    that occur between a bot and a user. The *messages* are the messages that are
    displayed between a bot and a user.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s modify the code a bit. This time, in the activities section, you’ll use
    Markdown content. So let’s go back to the code. Keep everything in the activities
    section and add the code in Listing [2-5](#PC5).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Let’s run this code and test it in the emulator. As you run the code in the
    emulator, you’ll see that it prints the messages in Markdown format. The added
    text is also printed. Figure [2-17](#Fig17) shows the response.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig17_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig17_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-17
  prefs: []
  type: TYPE_NORMAL
- en: The response after updating the code
  prefs: []
  type: TYPE_NORMAL
- en: Managing State
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This section shows how to manage states in bots. When we have to manage complex
    communication, we need to have a kind of communication medium, or a place, to
    get the conversation going. Figure [2-18](#Fig18) shows options for managing states
    in bots. Table [2-1](#Tab1) explains each state.
  prefs: []
  type: TYPE_NORMAL
- en: Table 2-1
  prefs: []
  type: TYPE_NORMAL
- en: Managing States
  prefs: []
  type: TYPE_NORMAL
- en: '| Managing State | Description |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Storage methods | We can save the state of a bot with the help of databases.
    We can save the data in SQL Server, Azure, and so forth. |'
  prefs: []
  type: TYPE_TB
- en: '| Class-specific logic at runtime | We can initiate a class at runtime and
    make the bot work. Then we can understand the logic as the bot evolves with different
    functionality for the lifetime of the bot. |'
  prefs: []
  type: TYPE_TB
- en: '| Form flow, or dialog flow | If we want to initiate certain things sequentially,
    we need to implement form flow, or dialog processes. |'
  prefs: []
  type: TYPE_TB
- en: '| State client | This option is similar to viewing state or session states
    in .NET or MVCs. |'
  prefs: []
  type: TYPE_TB
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig18_HTML.png](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig18_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-18
  prefs: []
  type: TYPE_NORMAL
- en: Ways of managing bots
  prefs: []
  type: TYPE_NORMAL
- en: Understanding the Use of Dialogs
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '*Dialogs* are the flow of conversation to provide a way to communicate a response
    by using messages in chained manner.'
  prefs: []
  type: TYPE_NORMAL
- en: When we are creating a bot, we are working in an efficient manner so that we
    get a response in proper way. More specifically, we are trying to receive the
    interaction which should be responsive. Therefore, we are working toward a quality
    experience of the bot conversation. Dialogs help us realize the perfect experience
    for the bot.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s just work on the code concept for dialogs now. First, open Visual Studio
    and select the bot template again. Name it ManishaBot, as shown in Figure [2-19](#Fig19).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig19_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig19_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-19
  prefs: []
  type: TYPE_NORMAL
- en: Creating the dialog bot
  prefs: []
  type: TYPE_NORMAL
- en: 'Within the directory structure of the project, you need to create a `Dialogs`
    folder. The process for creating the folder is shown in Figure [2-20](#Fig20):
    click Add ➤ New Folder.'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig20_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig20_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-20
  prefs: []
  type: TYPE_NORMAL
- en: Creating a folder named Dialogs
  prefs: []
  type: TYPE_NORMAL
- en: Within the `Dialogs` folder, you will add one class file. Click Add ➤ New Item
    , as shown in Figure [2-21](#Fig21).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig21_HTML.png](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig21_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-21
  prefs: []
  type: TYPE_NORMAL
- en: Adding a new item. From the Visual Studio we select a new item and then add
    a class file.
  prefs: []
  type: TYPE_NORMAL
- en: Now you will add a class file. The process, as shown in Figure [2-22](#Fig22).
    Name the class file `RandomFactDialog.cs`.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig22_HTML.png](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig22_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-22
  prefs: []
  type: TYPE_NORMAL
- en: Creating a class. Here we are creating a separate class so that we can formulate
    the logic in here.
  prefs: []
  type: TYPE_NORMAL
- en: Next you’ll link the message controller to the dialog class you created; see
    Listing [2-6](#PC6).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Now the `RandomFactDialog` class file where you implement chaining for messages
    looks like Listing [2-7](#PC7).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Let’s run the code and see what exactly happens. Type *hi*. With the dialog
    chaining, the response is available in the bot, as you can see in Figure [2-23](#Fig23).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig23_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig23_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-23
  prefs: []
  type: TYPE_NORMAL
- en: The response for the bot
  prefs: []
  type: TYPE_NORMAL
- en: Now you will develop a more complex dialog chaining. Listing [2-8](#PC8) shows
    the changes in the structure of the dialog chaining.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: Listing [2-9](#PC9) provides the class file in its entirety.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: If you run the code now, you will get the result shown in Figure [2-24](#Fig24).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig24_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig24_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-24
  prefs: []
  type: TYPE_NORMAL
- en: Working on a complex chaining process
  prefs: []
  type: TYPE_NORMAL
- en: You start the conversation with *hi*. The bot responds with *Say ‘tell me a
    fact’*. When you type *tell me a fact*, the bot gets inside the chaining logic
    and pops up a message.
  prefs: []
  type: TYPE_NORMAL
- en: Publishing the Bot to the Cloud by Using Azure
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In order to publish the bot to the cloud, you first need to register the bot.
    You do that by heading to [`https://dev.botframework.com/`](https://dev.botframework.com/)
    .
  prefs: []
  type: TYPE_NORMAL
- en: The Bot Framework page is shown in Figure [2-25](#Fig25).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig25_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig25_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-25
  prefs: []
  type: TYPE_NORMAL
- en: The Bot Framework page
  prefs: []
  type: TYPE_NORMAL
- en: At the top of the page, click the My Bots link, as shown in Figure [2-26](#Fig26).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig26_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig26_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-26
  prefs: []
  type: TYPE_NORMAL
- en: My Bots option
  prefs: []
  type: TYPE_NORMAL
- en: From the My Bots page, click the Create a Bot button, shown in Figure [2-27](#Fig27).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig27_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig27_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-27
  prefs: []
  type: TYPE_NORMAL
- en: The Create a Bot option
  prefs: []
  type: TYPE_NORMAL
- en: On the next page, click the Create button, shown in Figure [2-28](#Fig28).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig28_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig28_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-28
  prefs: []
  type: TYPE_NORMAL
- en: Creating a bot
  prefs: []
  type: TYPE_NORMAL
- en: Click the radio button labeled Register an Existing Bot Using Bot Builder SDK,
    shown in Figure [2-29](#Fig29). Then click the OK button.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig29_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig29_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-29
  prefs: []
  type: TYPE_NORMAL
- en: Selecting the Bot Builder option
  prefs: []
  type: TYPE_NORMAL
- en: Next, provide the details for the bot, as shown in Figure [2-30](#Fig30).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig30_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig30_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-30
  prefs: []
  type: TYPE_NORMAL
- en: Providing details about the bot
  prefs: []
  type: TYPE_NORMAL
- en: After you provide the details for the bot, you need to generate an application
    ID and password. Click the option to Create Microsoft App ID and Password, as
    shown in Figure [2-31](#Fig31).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig31_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig31_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-31
  prefs: []
  type: TYPE_NORMAL
- en: Generating App ID and password
  prefs: []
  type: TYPE_NORMAL
- en: In the next window, your application ID is displayed, as shown in Figure [2-32](#Fig32).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig32_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig32_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-32
  prefs: []
  type: TYPE_NORMAL
- en: You have the app ID
  prefs: []
  type: TYPE_NORMAL
- en: Click the Generate an App Password to Continue button. Type in the application
    ID, password, and bot handle in the `web.config` file. The new password is generated,
    as shown in Figure [2-33](#Fig33).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig33_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig33_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-33
  prefs: []
  type: TYPE_NORMAL
- en: The new password is generated
  prefs: []
  type: TYPE_NORMAL
- en: To publish the bot from Visual Studio, right-click it to access the Publish
    option, as shown in Figure [2-34](#Fig34).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig34_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig34_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-34
  prefs: []
  type: TYPE_NORMAL
- en: Preparing for publishing
  prefs: []
  type: TYPE_NORMAL
- en: The App Service screen opens, as shown in Figure [2-35](#Fig35). Click the New
    button for the Azure service.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig35_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig35_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-35
  prefs: []
  type: TYPE_NORMAL
- en: Click the New button
  prefs: []
  type: TYPE_NORMAL
- en: The bot is ready to be published. You will validate the connection and publish
    , as shown in Figure [2-36](#Fig36).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig36_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig36_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-36
  prefs: []
  type: TYPE_NORMAL
- en: Validating and publishing the bot
  prefs: []
  type: TYPE_NORMAL
- en: After the bot is published, you need to edit the configuration in the Bot Framework
    portal. Figure [2-37](#Fig37) shows how the Azure web page looks.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig37_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig37_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-37
  prefs: []
  type: TYPE_NORMAL
- en: The bot is published in Azure
  prefs: []
  type: TYPE_NORMAL
- en: Now head back to the Bot Framework portal. You need to edit the message endpoint
    for the bot. It will be the Azure web site followed by `/api/messages`. See the
    underlined section in Figure [2-38](#Fig38) .
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_2_Chapter/457478_1_En_2_Fig38_HTML.jpg](../images/457478_1_En_2_Chapter/457478_1_En_2_Fig38_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-38
  prefs: []
  type: TYPE_NORMAL
- en: Adding the details in the configuration option
  prefs: []
  type: TYPE_NORMAL
- en: The bot is now ready and in the cloud.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter presented the Microsoft Bot Framework so that you could learn about
    its fundamentals, and publish a bot to the cloud.
  prefs: []
  type: TYPE_NORMAL
- en: You learned about the Bot Framework template and created an example that could
    recognize the characters sent to the bot. You saw how to reference a class file
    in the main bot framework logic. Next, you learned how to log in to the Bot Framework
    web site to generate the application ID and password needed for your `web.config`
    file. Finally, you learned how to publish the bot from Visual Studio to Azure
    Cloud.
  prefs: []
  type: TYPE_NORMAL
- en: This first introduction forms the basis of how a bot framework works. In the
    next chapter, you’ll learn about new bots from other organizations.
  prefs: []
  type: TYPE_NORMAL
