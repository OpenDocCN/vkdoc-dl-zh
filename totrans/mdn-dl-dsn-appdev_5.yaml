- en: 5. Automating Model Design with Meta-optimization
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 5. 使用元优化自动化模型设计
- en: '*Learning how to learn is life’s most important skill.*'
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*学习如何学习是生活中最重要的技能*。'
- en: ''
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: —Tony Buzan, Writer and Educational Consultant
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: ——托尼·布赞，作家和教育顾问
- en: As the content we find we need to learn changes throughout life, we find new
    methods of learning that work for us. Through your education, you might have considered
    brute-force solving dozens of repetitive, minimally varying problems to be helpful
    when mastering the basics of algebra, active reading with a highlighter and notes
    on hand to help you succeed in more advanced English classes, and, later on with
    more advanced topics, understanding the conceptual framework and intuition more
    helpful than rotely solving a series of problems.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们发现需要学习的内容在一生中不断变化，我们发现对我们有效的新学习方法。通过你的教育，你可能已经考虑过通过 brute-force 解决数十个重复性、变化最小的问题来帮助掌握代数的基本原理，使用荧光笔进行积极阅读并手写笔记以帮助你在更高级的英语课程中取得成功，以及后来在更高级的主题中，理解概念框架和直觉比机械地解决一系列问题更有帮助。
- en: Ultimately, the task of learning is not just one of optimizing your mastery
    of the content within certain learning conditions but of optimizing those very
    learning conditions. To become efficient agents and designers of learning processes,
    we must recognize that learning is multi-tiered, controlled not only by our progress
    within the learning framework an agent may currently be operating in but also
    the learning framework itself.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，学习的任务不仅仅是优化你在特定学习条件下的内容掌握，还包括优化那些学习条件本身。为了成为高效的学习过程代理和设计师，我们必须认识到学习是多层次的，不仅受我们目前在某个代理可能运行的框架中的学习进展所控制，还受学习框架本身所控制。
- en: This necessity applies to neural network design. Designing neural networks involves
    making many choices, and many of these can often feel arbitrary and therefore
    unoptimized or optimizable. While intuition is certainly a valuable guide in building
    model architectures, there are many aspects of neural network design that a human
    designer simply cannot effectively tune by hand, especially when multiple variables
    are involved.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 这种必要性适用于神经网络设计。设计神经网络涉及到做出许多选择，其中许多选择常常感觉是任意的，因此可能未优化或可优化。虽然直觉在构建模型架构时确实是一个有价值的指导，但神经网络设计中有许多方面是人类设计师无法通过手工有效调整的，尤其是在涉及多个变量时。
- en: '*Meta-optimization*, also referred to in this context as meta-learning or auto-ML,
    is the process of “learning how to learn” – a meta-model (or “*controller* model”)
    finds the best parameters for the *controlled* model’s validation performance.
    With its tools and knowledge about its underlying dynamics and best use cases,
    meta-optimization is a valuable box of methods to aid you in developing more structured,
    efficient models.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '*元优化*，也在此背景下称为元学习或自动机器学习（auto-ML），是“学习如何学习”的过程——一个元模型（或“*控制器*模型”）找到受控模型验证性能的最佳参数。凭借其工具和对其底层动态和最佳用例的了解，元优化是一套有价值的方法，可以帮助你开发出更有结构、更高效的模型。'
- en: Introduction to Meta-optimization
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 元优化简介
- en: A deep learning model is already a learner itself, optimizing its designated
    weights to maximize its performance on the training data it is given. *Meta-optimization*
    involves another model on a higher level optimizing the “fixed” parameters in
    the first model such that the first model, when trained under the conditions of
    those fixed parameters, will learn weights that maximize its performance on the
    test dataset (Figure [5-1](#Fig1)). In machine learning – a domain in which meta-optimization
    is frequently applied – these fixed parameters could be factors like the gamma
    parameter in support vector classifiers, the value of *k* in the *k*-nearest neighbors
    algorithm, or the number of trees in a gradient boosting model. In the context
    of deep learning – the focus of this book and thus the application of meta-optimization
    in this chapter – these include factors like the architecture of the model and
    elements of its training procedure, like the choice of optimizer or the learning
    rate.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习模型本身就是一个学习者，它会优化其指定的权重，以最大化其在给定训练数据上的性能。*元优化*涉及在更高层次上另一个模型优化第一个模型中的“固定”参数，使得第一个模型在那些固定参数的条件下进行训练时，将学习到最大化其在测试数据集上性能的权重（图[5-1](#Fig1)）。在机器学习——一个经常应用元优化的领域——这些固定参数可能包括支持向量机分类器中的伽马参数、*k*-最近邻算法中的*k*值，或者在梯度提升模型中的树的数量。在深度学习——本书的重点，因此本章中元优化的应用——这些包括模型的架构和其训练过程中的元素，如优化器的选择或学习率。
- en: Note
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Here, we use the terms “parameters” and “weights” selectively for the sake of
    clarity, even though the two are more or less synonymous. “Parameter” will refer
    to broader factors in the model’s fundamental structure that remain unchanged
    during training and influence the outcome of the learned knowledge. “Weight” refers
    to changeable, trainable values that are used in representing a model’s learned
    knowledge.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们为了清晰起见，有选择性地使用“参数”和“权重”这两个术语，尽管这两个术语在某种程度上是同义的。“参数”将指模型基本结构中在训练过程中保持不变的更广泛的因素，这些因素影响学习到的知识的输出。“权重”指的是可变、可训练的值，用于表示模型学习到的知识。
- en: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig1_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig1_HTML.jpg)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig1_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig1_HTML.jpg)'
- en: Figure 5-1
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-1
- en: Relationship between controller model and controlled model in meta-optimization
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 元优化中控制器模型与受控模型之间的关系
- en: 'So-called “naïve” meta-optimization algorithms use the following general structure:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 所说的“天真”元优化算法采用以下一般结构：
- en: Select structural parameters for a proposed controlled model.
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为一个提议的受控模型选择结构参数。
- en: Obtain the performance of a controlled model trained under those selected structural
    parameters.
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在所选的结构参数下训练受控模型，获取其性能。
- en: Repeat.
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重复。
- en: 'There are two generally recognized naïve meta-optimization algorithms used
    as a baseline against more sophisticated meta-optimization methods:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 有两种通常认可的“天真”元优化算法被用作更复杂元优化方法的基准：
- en: '*Grid search*: In a grid search, every combination of a user-specified list
    of values for each parameter is tried and evaluated. Consider a hypothetical model
    with two structural parameters we would like to optimize, *A* and *B*. The user
    may specify the search space for *A* to be [1, 2, 3] and the search space for
    *B* to be [0.5, 1.2]. Here, “search space” indicates the values for each parameter
    that will be tested. A grid search would train six models for every combination
    of these parameters – *A* = 1 and *B* = 0.5, *A* = 1 and *B* = 1.2, *A* = 2 and
    *B* = 0.5, and so on.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*网格搜索*：在网格搜索中，尝试并评估每个参数用户指定列表中值的每一种组合。考虑一个假设的模型，我们希望优化两个结构参数*A*和*B*。用户可能指定*A*的搜索空间为[1,
    2, 3]，而*B*的搜索空间为[0.5, 1.2]。在这里，“搜索空间”表示将测试的每个参数的值。网格搜索将为这些参数的每一种组合训练六个模型——*A*
    = 1 和 *B* = 0.5，*A* = 1 和 *B* = 1.2，*A* = 2 和 *B* = 0.5，等等。'
- en: '*Random search*: In a random search, the user provides information about a
    feasible distribution of potential values that each structural parameter could
    take on. For instance, the search space for *A* may be a normal distribution with
    mean 2 and standard deviation 1, and the search space for *B* might be a uniform
    choice from the list of values [0.5, 1.2]. A random search would then randomly
    sample parameter values and return the best performing set of values.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*随机搜索*：在随机搜索中，用户提供有关每个结构参数可能取值的可行分布的信息。例如，*A*的搜索空间可能是一个均值为2、标准差为1的正态分布，而*B*的搜索空间可能是一个从值列表[0.5,
    1.2]中均匀选择的选项。然后随机搜索将随机采样参数值并返回表现最好的值集。'
- en: Grid search and random search are considered to be naïve search algorithms because
    they do not incorporate the results from their previously selected structural
    parameters into how they select the next set of structural parameters; they simply
    repeatedly “query” structural parameters blindly and return the best performing
    set. While grid and random search have their place in certain meta-optimization
    problems – grid search suffices for small meta-optimization problems, and random
    search proves to be a surprisingly strong strategy for models that are relatively
    cheaper to train – they cannot produce consistently strong results for more complex
    models, like neural networks. The problem is not that these naïve methods inherently
    cannot produce good sets of parameters, but that they take too long to do so.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 网格搜索和随机搜索被认为是简单的搜索算法，因为它们没有将先前所选结构参数的结果纳入如何选择下一组结构参数的方法中；它们只是盲目地反复“查询”结构参数并返回表现最好的集合。虽然网格搜索和随机搜索在某些元优化问题中有其位置——网格搜索对于小型的元优化问题足够，而随机搜索对于相对较便宜训练的模型来说证明是一种出人意料的强大策略——但它们不能为更复杂的模型，如神经网络，产生一致的良好结果。问题不在于这些简单方法本质上不能产生好的参数集，而在于它们需要太长时间才能做到这一点。
- en: A key component of the unique character of meta-optimization that distinguishes
    it from other fields of optimization problems is the impact of the evaluation
    step in amplifying any inefficiencies in the meta-optimization system. Generally,
    to quantify how good certain selected structural parameters are, a model is fully
    trained under those structural parameters and its performance on the test set
    is used as the evaluation. (See the “Neural Architecture Search” section for proxy
    evaluation to learn about faster alternatives). In the context of neural networks,
    this evaluation step can take hours. Thus, an effective meta-optimization system
    should attempt to require as few models to be built and trained as possible before
    arriving at a good solution. (Compare this to standard neural network optimization,
    in which the model queries the loss function and updates its weights accordingly
    anywhere from hundreds of thousands to millions of times in the span of hours.)
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 元优化独特的特点之一，使其区别于其他优化问题领域的是评估步骤对元优化系统中任何低效的影响。通常，为了量化某些所选结构参数的好坏，模型将在这些结构参数下进行完全训练，并在测试集上的表现作为评估标准。（参见“神经架构搜索”部分，了解代理评估以了解更快的替代方案）。在神经网络的情况下，这一评估步骤可能需要数小时。因此，一个有效的元优化系统应尽量减少在找到良好解决方案之前需要构建和训练的模型数量。（与标准神经网络优化相比，在数小时内，模型可能查询损失函数并相应地更新其权重数百上千次。）
- en: 'To prevent inefficiency in the selection of new structural parameters to evaluate,
    successful meta-optimization methods used for models like neural networks include
    another step – incorporating knowledge from previous “experiments” into determining
    the next best set of parameters to select:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 为了防止在评估新结构参数选择时的低效，用于神经网络等模型的成功元优化方法包括另一个步骤——将先前“实验”中的知识纳入确定下一次最佳参数集的选择中：
- en: Select structural parameters for a proposed controlled model.
  id: totrans-25
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为一个拟议的受控模型选择结构参数。
- en: Obtain the performance of a controlled model trained under those selected structural
    parameters.
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 获取在所选结构参数下训练的受控模型的表现。
- en: Incorporate knowledge about the relationship between selected structural parameters
    and the performance of a model trained under such parameters into the next selection.
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将关于所选结构参数与在相应参数下训练的模型性能之间关系的信息纳入下一次选择中。
- en: Repeat.
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重复。
- en: Even with these adaptations, meta-optimization methods are taxing on computational
    and time resources. A primary factor in the success of a meta-optimization campaign
    is how you define the *search space* – the feasible distribution of values the
    meta-optimization algorithm can draw from. Choosing the search space is another
    trade-off. Clearly, if you specify too large a search space, the meta-optimization
    algorithm will need to select and evaluate more structural parameters to arrive
    at a good solution. Each additional parameter enlarges the existing search space
    by a significant factor, so leaving too many parameters to be optimized by the
    meta-optimization algorithm will likely perform worse than user-specified values
    or a random search, which doesn’t need to deal with the complexities of navigating
    an incredibly sparse space.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 即使有这些调整，元优化方法对计算和时间资源的要求很高。元优化活动成功的一个主要因素是如何定义*搜索空间*——元优化算法可以从中抽取值的可行分布。选择搜索空间是另一个权衡。显然，如果你指定了太大的搜索空间，元优化算法将需要选择和评估更多的结构参数，以到达一个好的解决方案。每个额外的参数都会将现有的搜索空间扩大一个很大的因子，因此，让太多的参数由元优化算法进行优化可能会比用户指定的值或随机搜索表现得更差，因为随机搜索不需要处理导航一个极其稀疏空间的复杂性。
- en: 'Herein lies an important principle in meta-optimization design: *be conservative
    in determining parameters to be optimized by meta-optimization as possible*. If
    you know that batch normalization will benefit a network’s performance, for instance,
    it’s probably not worth it to use meta-optimization to determine if batch normalization
    should be included in the network architecture or not. Moreover, if you decide
    a certain parameter should be optimized via meta-optimization, attempt to decrease
    its “size.” For instance, this could be the number or range of possible values
    a parameter can take on, the range of possible values.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是元优化设计中一个重要的原则：*尽可能保守地确定元优化要优化的参数*。例如，如果你知道批量归一化将有助于网络性能，那么使用元优化来确定是否应该将批量归一化包含在网络架构中可能并不值得。此外，如果你决定某个参数应该通过元优化进行优化，尝试减小其“大小”。例如，这可能是一个参数可以取的可能值或范围的数目，或者可能值的范围。
- en: 'On the other hand, if you define too small a search space, you should ask yourself
    another question – *is meta-optimization worth performing in the first place*?
    A meta-optimization algorithm is likely to find the optimal set of parameters
    for a search space defined as {*A*: normal distribution with mean 1 and standard
    deviation 0.001 and *B*: uniform distribution from 3.2 to 3.3} very efficiently,
    for instance, but it’s not useful. The user could have likely set *A*=1 and *B*=3.25
    with no visible impact on the resulting model’s performance.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '另一方面，如果你定义的搜索空间太小，你应该问自己另一个问题——*元优化是否从一开始就值得进行*？例如，元优化算法可能会非常高效地找到一个搜索空间的最优参数集，该搜索空间定义为{*A*:
    均值为1和标准差为0.001的正态分布和 *B*: 从3.2到3.3的均匀分布}，但这并不有用。用户可能已经将*A*=1和*B*=3.25设置好了，这对最终模型性能没有明显影响。'
- en: Note
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: What is a “small” or “large” range is dependent on the nature of the parameter
    and the variation required to make visible change in the performance of the model.
    Parameters sampled from a normal distribution with mean 0.005 and standard deviation
    0.001 may yield a very similar model if that parameter is the C parameter in a
    support vector machine. However, if the parameter is the learning rate of a deep
    learning model, it is likely that such a distribution would yield visible differences
    in model test performance.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: “小”或“大”的范围取决于参数的性质以及为了在模型性能中产生明显变化所需的变化量。从均值为0.005和标准差为0.001的正态分布中采样的参数，如果该参数是支持向量机中的C参数，则可能产生一个非常相似的模型。然而，如果该参数是深度学习模型的学习率，那么这种分布很可能会在模型测试性能中产生明显的差异。
- en: Thus, the crucial balance in meta-optimization is that of engineering a search
    space conservative enough not to be redundant, but free and “open” enough to yield
    significant results.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，元优化中的关键平衡是在设计搜索空间时既要保守，以免冗余，又要足够自由和“开放”，以产生显著的结果。
- en: 'This chapter will discuss two forms of meta-optimization as applicable to deep
    learning: general hyperparameter optimization and Neural Architecture Search (NAS),
    along with the Hyperopt, Hyperas, and Auto-Keras libraries.'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将讨论适用于深度学习的两种元优化形式：一般超参数优化和神经架构搜索（NAS），以及Hyperopt、Hyperas和Auto-Keras库。
- en: General Hyperparameter Optimization
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一般超参数优化
- en: General hyperparameter optimization is a broad field within meta-optimization
    concerning general methods to optimize the parameters of a wide variety of models.
    These methods are not explicitly built for neural network designs, so additional
    work will be required for effective results.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 通用超参数优化是元优化中的一个广泛领域，涉及优化各种模型参数的通用方法。这些方法并非专门为神经网络设计构建，因此需要额外的工作才能获得有效结果。
- en: In this section, we’ll discuss Bayesian optimization – the leading general hyperparameter
    optimization method for machine and deep learning, as well as the usage of the
    popular meta-optimization library Hyperopt and its accompanying Keras wrapper,
    Hyperas, to optimize neural network design.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将讨论贝叶斯优化——机器学习和深度学习中最领先的通用超参数优化方法，以及使用流行的元优化库Hyperopt及其配套的Keras包装器Hyperas来优化神经网络设计。
- en: Bayesian Optimization Intuition and Theory
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 贝叶斯优化直觉与理论
- en: 'Here’s a function: *f*(*x*). You only have access to its output given a certain
    input, and you know that it is expensive to calculate. Your task is to find the
    set of inputs that minimizes the output of the function as much as possible.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个函数：*f*(*x*)。你只能访问其给定输入的输出，并且知道计算它很昂贵。你的任务是找到一组输入，尽可能最小化该函数的输出。
- en: This sort of setup is known as a black-box optimization problem, because the
    algorithm or entity attempting to find a solution to the problem has access to
    very little information about the function (Figure [5-2](#Fig2)). You have access
    only to the output of any input passed into the function, but not the derivative,
    barring the usage of gradient-based methods that have proved successful in the
    domain of neural networks. Moreover, because *f*(*x*) is expensive to evaluate
    (i.e., takes a significant amount of time to get the output of an input), we cannot
    employ a host of non-gradient optimization methods from the simple grid search
    to the more sophisticated simulated annealing. These methods require a large quantity
    of queries to the black-box function to discover reasonably well-performing results.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 这种设置被称为黑盒优化问题，因为试图找到问题解决方案的算法或实体对函数的了解非常有限（见图 [5-2](#Fig2)）。你只能访问传递给函数的任何输入的输出，但不能访问导数，除非使用在神经网络领域证明成功的基于梯度的方法。此外，由于*f*(*x*)的评估成本很高（即，获取输入的输出需要花费大量时间），我们不能使用从简单的网格搜索到更复杂的模拟退火等大量非梯度优化方法。这些方法需要大量查询黑盒函数以发现表现良好的结果。
- en: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig2_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig2_HTML.jpg)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig2_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig2_HTML.jpg)'
- en: Figure 5-2
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-2
- en: Objective functions to minimize. Top – black-box function; bottom – explicitly
    defined loss function (in this case MSE)
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 要最小化的目标函数。顶部 – 黑盒函数；底部 – 显式定义的损失函数（在这种情况下为均方误差MSE）
- en: Bayesian optimization is often used in these sorts of black-box optimization
    problems because it succeeds in obtaining reliably good results with a relatively
    small number of required queries to the objective function *f*(*x*). Hyperopt,
    in addition to many other libraries, uses optimization algorithms built upon the
    fundamental model of Bayesian optimization. The spirit of Bayesian modeling is
    to begin with a set of *prior* beliefs and continually update that set of beliefs
    with new information to form posterior beliefs. It is this spirit of continuous
    update – searching for new information in places where it is needed – that makes
    Bayesian optimization a robust and versatile tool in black-box optimization problems.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 贝叶斯优化常用于这类黑盒优化问题，因为它能够在对目标函数*f*(*x*)进行相对较少的查询的情况下获得可靠的良好结果。Hyperopt除了许多其他库之外，还使用基于贝叶斯优化基本模型的优化算法。贝叶斯建模的精神是从一组*先验*信念开始，并不断用新信息更新这组信念以形成后验信念。正是这种持续更新的精神——在需要的地方寻找新信息——使得贝叶斯优化在黑盒优化问题中成为一个强大而通用的工具。
- en: Consider this hypothetical objective function, *c*(*x*) (Figure [5-3](#Fig3)).
    In the context of meta-learning/meta-optimization, *c*(*x*) represents the loss
    or cost of a certain model and *x* represents the set of parameters used in the
    model that are being optimized.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑这个假设的目标函数，*c*(*x*)（见图 [5-3](#Fig3)）。在元学习/元优化的背景下，*c*(*x*)代表某种模型的损失或成本，而*x*代表模型中用于优化的参数集合。
- en: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig3_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig3_HTML.jpg)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig3_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig3_HTML.jpg)'
- en: Figure 5-3
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-3
- en: Hypothetical cost function – the loss incurred by a model with some parameter
    x. For the sake of visualization, in this case we are optimizing only one parameter
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 假设成本函数 – 某些参数 x 的模型产生的损失。为了可视化，在这种情况下，我们只优化一个参数
- en: Because this is a black-box function and the Bayesian optimization algorithm
    doesn’t “know” its full shape, it develops its own representations of what it
    “thinks” the objective function looks like via a *surrogate function* (Figure
    [5-4](#Fig4)). The surrogate function approximates the objective function and
    represents the current set of beliefs on how the objective function behaves.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 因为这是一个黑盒函数，贝叶斯优化算法“不知道”其完整的形状，它通过一个 *代理函数*（图 [5-4](#Fig4)）来发展它“认为”目标函数看起来如何的自身表示。代理函数近似目标函数，并代表对目标函数行为的当前信念集合。
- en: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig4_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig4_HTML.jpg)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig4_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig4_HTML.jpg)'
- en: Figure 5-4
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-4
- en: Example surrogate function and how the surrogate function informs the sampling
    of new points in the objective function
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 代理函数示例以及代理函数如何告知目标函数中新的采样点的采样
- en: Note that the representation of the surrogate model here is deterministic, but
    in practice it is a probabilistic model that returns *p*(*y*| *x*) or the probability
    that the objective function’s output is *y* given an input *x*. Probabilistic
    surrogate models are easier and more natural to update in a Bayesian function.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，这里的代理模型表示是确定性的，但在实践中它是一个概率模型，返回 *p*(*y*| *x*) 或在输入 *x* 给定的情况下，目标函数输出为 *y*
    的概率。概率代理模型在贝叶斯函数中更容易且更自然地更新。
- en: 'Based on the surrogate function, the algorithm can identify which points look
    “promising” in addition to which areas need more exploration and samples from
    these promising regions accordingly (Figure [5-5](#Fig5)). Note that there is
    an exploration-exploitation trade-off dynamic at play here: if the algorithm sampled
    only from regions immediately suggested to be minima (purely exploiting), it would
    completely overlook other promising minima that were not captured in the first
    round of sampling. Likewise, if the algorithm was purely explorative, it would
    behave little differently from a random search by not considering previous findings.
    The *acquisition function* is responsible for determining how surrogate functions
    are updated.'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 基于代理函数，算法可以识别哪些点看起来“有希望”，以及哪些区域需要更多的探索和从这些有希望的区域内采集样本（图 [5-5](#Fig5)）。请注意，这里存在一个探索-利用的权衡动态：如果算法只从被立即建议为最小值的区域采样（纯粹利用），它将完全忽略第一轮采样中未捕获的其他有希望的极小值。同样，如果算法纯粹是探索性的，它将不会考虑先前的发现，其行为与随机搜索几乎没有区别。*获取函数*负责确定如何更新代理函数。
- en: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig5_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig5_HTML.jpg)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig5_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig5_HTML.jpg)'
- en: Figure 5-5
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-5
- en: Updating the surrogate function with the new, second iteration of sampled points
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 使用新的、第二次迭代的采样点更新代理函数
- en: After just a few number of iterations, there is a very high probability that
    the Bayesian optimization algorithm has obtained a relatively accurate representation
    of the minima within the black-box function.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 经过几次迭代后，贝叶斯优化算法获得黑盒函数内最小值的相对准确表示的概率非常高。
- en: Because a random or grid search does not take any of the previous results into
    consideration when determining the next sampled set of parameters, these “naïve”
    algorithms save time in calculating the next set of parameters to sample. However,
    the additional computation Bayesian optimization algorithms use to determine the
    next point to sample is used to construct a surrogate function more intelligently
    with fewer queries. Net-wise, the reduction in necessary queries to the objective
    function outweighs the increase in time to determine the next sampled point, making
    the Bayesian optimization method more efficient.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 由于随机搜索或网格搜索在确定下一个参数集时没有考虑任何先前结果，这些“天真”的算法在计算下一个参数集时节省了时间。然而，贝叶斯优化算法用于确定下一个采样点的额外计算被用来更智能地构建代理函数，从而减少查询次数。总的来说，减少对目标函数的必要查询次数超过了确定下一个采样点所需时间的增加，这使得贝叶斯优化方法更加高效。
- en: 'This process of optimization is known more abstractly as *Sequential Model-Based
    Optimization (SMBO)* . It operates as a central concept or template against which
    various model optimization strategies can be formulated and compared and contains
    one key feature: a surrogate function for the objective function that is updated
    with new information and used to determine new points to sample. Across various
    SMBO methods, the primary differentiators are the design of the acquisition function
    and the method of constructing the surrogate model. Hyperopt uses the Tree-structured
    Parzen Estimator (TPE) surrogate model and acquisition strategy.'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 这种优化过程更抽象地被称为 *序列模型优化（SMBO）*。它作为一个核心概念或模板，各种模型优化策略可以据此制定和比较，并包含一个关键特性：一个用于目标函数的代理函数，该函数会根据新信息进行更新，并用于确定新的采样点。在各种
    SMBO 方法中，主要区别在于获取函数的设计和构建代理模型的方法。Hyperopt 使用树结构帕累托估计器（TPE）代理模型和获取策略。
- en: The expected improvement measurement quantifies the expected improvement with
    respect to the set of parameters to be optimized, *x*. For instance, if the surrogate
    model *p*(*y*| *x*) evaluates to zero for all values of *y* less than some threshold
    value *y*^∗ – that is, there is zero probability that the set of input parameters
    *x* could yield an output of the objective function less than *y*^∗ – there is
    likely little improvement.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 预期改进测量量化了相对于要优化的参数集 *x* 的预期改进。例如，如果代理模型 *p*(*y*| *x*) 对于所有小于某个阈值值 *y*^∗ 的 *y*
    值都评估为零——也就是说，输入参数集 *x* 产生目标函数输出小于 *y*^∗ 的概率为零——那么很可能是改进很小。
- en: 'The Tree-structured Parzen Estimator (Figure [5-6](#Fig6)) is built to work
    toward a set of parameters *x* that maximizes expected improvement. Like all surrogate
    functions used in Bayesian optimization, it returns *p*(*y*| *x*) – the probability
    that the objective function’s output is *y* given an input *x*. Instead of directly
    obtaining this probability, it uses Bayes’ rule:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 树结构帕累托估计器（图 [5-6](#Fig6)）旨在寻找一组参数 *x*，以最大化预期改进。像贝叶斯优化中使用的所有代理函数一样，它返回 *p*(*y*|
    *x*)——给定输入 *x*，目标函数输出的概率。它不是直接获得这个概率，而是使用贝叶斯定理：
- en: '![$$ p(x)=\frac{p(y)\cdotp p(y)}{p(x)} $$](../images/516104_1_En_5_Chapter/516104_1_En_5_Chapter_TeX_Equa.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/516104_1_En_5_Chapter/516104_1_En_5_Chapter_TeX_Equa.png)'
- en: 'The *p*(*x*| *y*) term represents the probability that the input to the objective
    function was *x* given an output *y*. To calculate this, two distribution functions
    are used: *l*(*x*) if the output *y* is less than some threshold *y*^∗ and *g*(*x*)
    if the output *y* is less than some threshold *y*^∗. To sample values of *x* that
    yield objective function outputs less than the threshold, the strategy is to draw
    from *l*(*x*) rather than *g*(*x*). (The other terms, *p*(*y*) and *p*(*x*), can
    be easily calculated as they do not involve conditionals.) Sampled values with
    the highest expected improvement are evaluated through the objective function.
    The resulting value is used to update the probability distributions *l*(*x*) and
    *g*(*x*) for better prediction.'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '*p*(*x*| *y*)项表示在给定输出 *y* 的情况下，目标函数的输入为 *x* 的概率。为了计算这个概率，使用了两个分布函数：*l*(*x*)，如果输出
    *y* 小于某个阈值 *y*^∗，以及 *g*(*x*)，如果输出 *y* 小于某个阈值 *y*^∗。为了采样那些使得目标函数输出小于阈值的 *x* 值，策略是从
    *l*(*x*) 中抽取，而不是从 *g*(*x*) 中抽取。（其他项，如 *p*(*y*) 和 *p*(*x*)，可以很容易地计算，因为它们不涉及条件。）具有最高预期改进的采样值将通过目标函数进行评估。得到的值用于更新概率分布
    *l*(*x*) 和 *g*(*x*)，以实现更好的预测。'
- en: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig6_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig6_HTML.jpg)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig6_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig6_HTML.jpg)'
- en: Figure 5-6
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-6
- en: Visualizing where the Tree-structured Parzen Estimator strategy falls in relation
    to the Sequential Model-Based Optimization procedure
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化树结构帕尔森估计器策略相对于基于序列模型优化过程的位置
- en: It’s a little bit math heavy, but ultimately the Tree-structured Parzen Estimator
    strategy attempts to find the best objective function inputs to sample by continually
    updating its two internal probability distributions to maximize the quality of
    prediction.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 这需要一点数学知识，但最终树结构帕尔森估计器策略试图通过不断更新其两个内部概率分布来最大化预测质量，以找到最佳的目标函数输入。
- en: Note
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: 'You may be wondering – what is tree-structured about the Tree-structured Parzen
    Estimator strategy? In the original TPE paper, the authors suggest that the “tree”
    component of the algorithm’s name is derived from the tree-like nature of the
    hyperparameter space: the value chosen for one hyperparameter determines the set
    of possible values for other parameters. For instance, if we are optimizing the
    architecture of a neural network, we first determine the number of layers before
    determining the number of nodes in the third layer.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能想知道——树结构帕尔森估计器策略中的“树”指的是什么？在原始的 TPE 论文中，作者建议算法名称中的“树”部分来源于超参数空间的树状特性：一个超参数的值决定了其他参数可能值的集合。例如，如果我们正在优化神经网络架构，我们首先确定层数，然后再确定第三层的节点数。
- en: Hyperopt Syntax, Concepts, and Usage
  id: totrans-72
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Hyperopt 语法、概念和用法
- en: 'Hyperopt is a popular framework for Bayesian optimization. Its flexible syntax
    allows for you to test hyperparameter tuning on any framework and for any purpose.
    Using Hyperopt requires three key elements (Figure [5-7](#Fig7)):'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: Hyperopt 是一个流行的贝叶斯优化框架。其灵活的语法允许你在任何框架和任何目的上测试超参数调整。使用 Hyperopt 需要三个关键元素（图 [5-7](#Fig7)）：
- en: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig7_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig7_HTML.jpg)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig7_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig7_HTML.jpg)'
- en: Figure 5-7
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-7
- en: Relationship between the search space, objective function, and search operation
    in the Hyperopt framework
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: Hyperopt 框架中搜索空间、目标函数和搜索操作之间的关系
- en: '*Objective function* : This is a function that takes in a dictionary of hyperparameters
    (the inputs to the objective function) and outputs the “goodness” of those hyperparameters
    (the output of the objective function). In this context of meta-learning, the
    objective function takes in the hyperparameters, uses the hyperparameters to build
    a model, trains the model, and returns the performance of the model on validation/test
    data. “Better” is synonymous with “less” in Hyperopt, so make sure that metrics
    like accuracy are negated.'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*目标函数*：这是一个接收超参数字典（目标函数的输入）并输出这些超参数“良好度”的函数（目标函数的输出）。在这个元学习的上下文中，目标函数接收超参数，使用超参数构建模型，训练模型，并返回模型在验证/测试数据上的性能。“更好”在
    Hyperopt 中等同于“更少”，所以请确保像准确度这样的指标是取反的。'
- en: '*Search space* : This is the space of parameters with which Hyperopt will search.
    It is implemented as a dictionary of parameters in which the key is the name of
    the parameter (for your own reference later) and the corresponding value is a
    Hyperopt search space objective defining the range and type of distribution to
    sample values for that parameter from.'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*搜索空间*：这是 Hyperopt 将搜索的参数空间。它实现为一个参数的字典，其中键是参数的名称（供你以后参考），相应的值是 Hyperopt 搜索空间目标，定义了从该参数中采样值的范围和类型。'
- en: '*Search* : Once you have defined the objective function and the search space,
    you can initiate the actual search function, which will return the best set of
    parameters from the search.'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*搜索*：一旦你定义了目标函数和搜索空间，你就可以启动实际的搜索函数，它将返回搜索中最佳的一组参数。'
- en: Install Hyperopt with `pip install hyperopt` and import with `import hyperopt`.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 `pip install hyperopt` 安装 Hyperopt，并使用 `import hyperopt` 导入。
- en: 'Hyperopt Syntax Overview: Finding the Minimum of a Simple Objective Function'
  id: totrans-81
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: Hyperopt 语法概述：寻找简单目标函数的最小值
- en: 'To illustrate the basic syntax and concepts in Hyperopt, we will use Hyperopt
    to solve a very simple problem: find the minimum of *f*(*x*) = (*x* − 1)². Let’s
    first define the search space with `hyperopt.hp` (Listing [5-1](#PC1)).'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明 Hyperopt 中的基本语法和概念，我们将使用 Hyperopt 解决一个非常简单的问题：找到函数 *f*(*x*) = (*x* − 1)²
    的最小值。让我们首先使用 `hyperopt.hp` 定义搜索空间（见列表 [5-1](#PC1)）。
- en: '[PRE0]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'In this case, we are telling Hyperopt that the search space consists of one
    parameter with label “`x`”, which can reasonably be found from a uniform distribution
    from –1000 to 1000\. However, from domain knowledge we know that it’s more likely
    that the optimal value of `x` that minimizes the objective function is more likely
    to be near zero than equally likely to be any value from –1000 to 1000\. Ideally,
    we would like the optimizer to sample values of `x` near zero more often than
    values near 1000 or –1000\. We can formulate this domain knowledge regarding the
    probability that the optimal value is near a certain value by using other spaces
    (see Figure [5-8](#Fig8)):'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，我们告诉 Hyperopt 搜索空间由一个标签为“`x`”的参数组成，这个参数可以从 -1000 到 1000 的均匀分布中合理地找到。然而，从领域知识我们知道，`x`
    的最优值，即最小化目标函数的最优值，更有可能接近零，而不是从 -1000 到 1000 的任何值具有同等可能性。理想情况下，我们希望优化器更频繁地采样接近零的
    `x` 值，而不是接近 1000 或 -1000 的值。我们可以通过使用其他空间来制定关于最优值接近某个值的概率的领域知识（见图 [5-8](#Fig8)）：
- en: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig8_HTML.png](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig8_HTML.png)'
  id: totrans-85
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig8_HTML.png](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig8_HTML.png)'
- en: Figure 5-8
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-8
- en: Visualizations of the normal and quantized normal distributions (top) and the
    log-normal and quantized log-normal distributions (bottom). The quantized distribution
    visualization is not completely faithful – values that fall into a sampled “segment”
    are assigned the same value
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 正态和量化正态分布（顶部）以及对数正态和量化对数正态分布（底部）的可视化。量化分布的可视化并不完全忠实——落入采样“段”中的值被赋予相同的值
- en: '`hp.normal(label, mu, sigma)`: The distribution of the search space for this
    parameter is a normal distribution with mean `mu` and standard deviation `sigma`.'
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`hp.normal(label, mu, sigma)`：此参数的搜索空间分布是一个均值为 `mu` 和标准差 `sigma` 的正态分布。'
- en: '`hp.lognormal(label, mu, sigma)`: The distribution of the search space for
    this parameter is a log-normal distribution with mean `mu` and standard deviation
    `sigma`. It acts as a modification of `hp.normal` that returns only positive values.
    This is useful for parameters like the learning rate of a neural network that
    are continuous and contain a concentration of likelihood at some point, but require
    a positive value.'
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`hp.lognormal(label, mu, sigma)`：此参数的搜索空间分布是一个均值为 `mu` 和标准差 `sigma` 的对数正态分布。它作为
    `hp.normal` 的修改版，只返回正值。这对于像神经网络的学习率这样的参数很有用，这些参数是连续的，并在某一点上具有概率集中，但需要正值。'
- en: '`hp.qnormal(label, mu, sigma, q)` and `hp.qlognormal(label, mu, sigma, q)`:
    These act as distributions for quasi-continuous parameters, like the number of
    layers or number of nodes within a layer in a neural network – while these are
    not continuous (a network with 3.5 layers is invalid), they contain transitive
    relative relationships (a network with 4 layers is longer than a network with
    3 layers). Correspondingly, we may want to formulate certain relationships, like
    wanting the number of layers to be shorter than longer. `hp.qnormal` and `hp.qlognormal`
    “quantize” the outputs of `hp.normal` and `hp.lognormal` by performing the following
    operation: ![$$ q\cdotp round\left(\frac{o}{q}\right) $$](../images/516104_1_En_5_Chapter/516104_1_En_5_Chapter_TeX_IEq1.png),
    where *o* is the output of the “unquantized” operation and *q* is the quantization
    factor. `hp.qnormal(''x'', 5, 3, 1)`, for instance, defines a search space of
    “normally distributed” integers (`q = 1`) with mean 5 and standard deviation 3.'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`hp.qnormal(label, mu, sigma, q)` 和 `hp.qlognormal(label, mu, sigma, q)`：这些函数作为准连续参数的分布，例如神经网络中的层数或每层中的节点数——虽然这些不是连续的（3.5层的网络是无效的），但它们包含传递的相对关系（4层的网络比3层的网络长）。相应地，我们可能希望制定某些关系，例如希望层数比更长的层数短。`hp.qnormal`
    和 `hp.qlognormal` 通过执行以下操作将 `hp.normal` 和 `hp.lognormal` 的输出“量化”：![$$ q\cdotp
    round\left(\frac{o}{q}\right) $$](../images/516104_1_En_5_Chapter/516104_1_En_5_Chapter_TeX_IEq1.png)，其中
    *o* 是“未量化”操作的输出，*q* 是量化因子。例如，`hp.qnormal(''x'', 5, 3, 1)` 定义了一个具有均值 5 和标准差 3 的“正态分布”整数搜索空间（`q
    = 1`）。'
- en: If the search space is not continuous or quasi-continuous, but instead a series
    of discrete, non-comparable choices, use `hp.choice()`, which takes in a list
    of possible choices.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 如果搜索空间不是连续或准连续的，而是一系列离散、不可比较的选择，请使用`hp.choice()`，它接受一个可能的选项列表。
- en: In this case, we can use a standard normal distribution to more accurately describe
    where we think the optimal location of the parameter is (Listing [5-2](#PC2)).
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，我们可以使用标准正态分布来更准确地描述我们认为参数最佳位置在哪里（列表[5-2](#PC2)）。
- en: '[PRE1]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'We can now define the objective function, which simply involves subtracting
    1 from `x` and squaring: `obj_func = lambda params: (params[''x'']-1)**2`.'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: '我们现在可以定义目标函数，它只是简单地从`x`中减去1并平方：`obj_func = lambda params: (params[''x'']-1)**2`。'
- en: 'Only returning the associated output of the objective function is fine if the
    objective function always returns a valid output or you have configured the search
    space such that it is impossible for any invalid input to be passed into the objective
    function. If not, however, Hyperopt provides one additional feature that may be
    helpful if certain combinations of parameters may be invalid: a status. For instance,
    if we are trying to find the minimum of ![$$ f(x)=\left|\frac{1}{x}\right|+{x}^2
    $$](../images/516104_1_En_5_Chapter/516104_1_En_5_Chapter_TeX_IEq2.png), the input
    *x* = 0 would be invalid. There’s no easy way to restrict the search space to
    exclude *x* = 0, though. If *x* ≠ 0, the output of the objective function is `{''loss'':value,
    ''status'':''ok''}`. If the input parameter is equal to 0, though, the objective
    function returns `{''status'':''fail''}`.'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 如果目标函数始终返回有效的输出或者你已经配置了搜索空间，使得任何无效的输入都不可能传递到目标函数，那么只返回目标函数的相关输出是完全可以的。如果不这样做，Hyperopt提供了一个可能有助于某些参数组合可能无效的额外功能：状态。例如，如果我们试图找到函数
    ![$$ f(x)=\left|\frac{1}{x}\right|+{x}^2 $$](../images/516104_1_En_5_Chapter/516104_1_En_5_Chapter_TeX_IEq2.png)
    的最小值，输入 *x* = 0 将是无效的。然而，没有简单的方法来限制搜索空间以排除 *x* = 0。如果 *x* ≠ 0，目标函数的输出是 `{'loss':value,
    'status':'ok'}`。如果输入参数等于0，那么目标函数返回 `{'status':'fail'}`。
- en: In the context of modeling, certain parameter constructions may not be valid.
    Given that restricting the search space is impossible or too difficult, you can
    construct your objective function with a try/except catching mechanism such that
    any error Keras throws when building the graph is communicated to Hyperopt in
    the form of a failed status (Listing [5-3](#PC3)).
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 在建模的上下文中，某些参数构造可能无效。鉴于限制搜索空间是不可能的或过于困难，你可以使用try/except捕获机制来构建你的目标函数，这样Keras在构建图时抛出的任何错误都会以失败状态的形式传达给Hyperopt（列表[5-3](#PC3)）。
- en: '[PRE2]'
  id: totrans-97
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Now that the search space and the objective function have been defined, we can
    initiate a search to find the parameter values specified in the search space that
    minimize the objective function (Listing [5-4](#PC4)).
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 现在搜索空间和目标函数已经定义，我们可以启动搜索以找到搜索空间中指定的参数值，这些参数值将最小化目标函数（列表[5-4](#PC4)）。
- en: '[PRE3]'
  id: totrans-99
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Here, `algo=tpe.suggest` uses the Tree-structured Parzen Estimator optimization
    algorithm and `max_evals=500` lets Hyperopt know that the code will tolerate a
    maximum 500 evaluations of the objective function. In the context of modeling,
    `max_evals` indicates the maximum number of models that will be built and trained,
    because each evaluation of the objective function requires building a new model
    architecture, training it, evaluating it, and returning its performance.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，`algo=tpe.suggest`使用树结构帕累托估计器优化算法，`max_evals=500`让Hyperopt知道代码可以容忍最多500次目标函数的评估。在建模的上下文中，`max_evals`表示将构建和训练的最大模型数量，因为每次评估目标函数都需要构建一个新的模型架构，训练它，评估它，并返回其性能。
- en: After the search completes, `best` is a dictionary of the best parameters found.
    `best['x']` should contain a value very close to 1 (the true minimum).
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 搜索完成后，`best`是一个包含找到的最佳参数的字典。`best['x']`应该包含一个非常接近1（真实最小值）的值。
- en: Using Hyperopt to Optimize Training Procedure
  id: totrans-102
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 使用Hyperopt优化训练过程
- en: 'Parameters involved in a model’s training procedure include the learning rate,
    the choice of optimizer, callbacks, and other parameters involved in how the model
    is trained rather than the architecture of the model. Let’s use Hyperopt to determine
    the optimal optimizer and learning rate for training. We’ll need to define specific
    search space types for these two parameters:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 涉及到模型训练过程的参数包括学习率、优化器的选择、回调以及其他与模型如何训练而不是模型架构相关的参数。让我们使用Hyperopt来确定训练的最佳优化器和学习率。我们需要为这两个参数定义特定的搜索空间类型：
- en: '`hp.choice(''optimizer'', [''adam'', ''rmsprop'', ''sgd''])` for the optimizer:
    This will find the optimal optimizer to train the network on.'
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`hp.choice(''optimizer'', [''adam'', ''rmsprop'', ''sgd''])`用于优化器：这将找到训练网络的最佳优化器。'
- en: '`hp.lognormal(''lr'', mu=0.005, sigma=0.001)` for the optimizer learning rate:
    The log-normal distribution is used here because the learning rate must be positive.'
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`hp.lognormal(''lr'', mu=0.005, sigma=0.001)`用于优化器的学习率：这里使用对数正态分布是因为学习率必须是正数。'
- en: We can define these two spaces in a dictionary (Listing [5-5](#PC5)). Note that
    we import optimizer objects without actually instantiating them (i.e., `keras.optimizers.Adam`
    rather than `keras.optimizers.Adam()`). This is because we need to pass the learning
    rate as a parameter within the instantiation of the parameter object, which we’ll
    do when we’re building the model in the objective function.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以在字典中定义这两个空间（见列表[5-5](#PC5)）。请注意，我们导入优化器对象时并没有实际实例化它们（即使用`keras.optimizers.Adam`而不是`keras.optimizers.Adam()`）。这是因为我们需要在参数对象的实例化过程中传递学习率作为参数，我们将在构建模型时在目标函数中这样做。
- en: '[PRE4]'
  id: totrans-107
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'The objective function will take in a dictionary of parameters sampled from
    the search space and use them to train a model architecture (Listing [5-6](#PC6)).
    In this particular case, we will measure model performance by its accuracy on
    the test dataset. We perform the following operations in the objective function:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 目标函数将接受从搜索空间中采样的参数字典，并使用它们来训练模型架构（见列表[5-6](#PC6)）。在这种情况下，我们将通过模型在测试数据集上的准确率来衡量模型性能。在目标函数中，我们执行以下操作：
- en: '*Build the model*: We will use a simple sequential model with a convolutional
    and fully connected component. This can be built without accessing the `params`
    dictionary because we’re not tuning any hyperparameters that influence how the
    architecture is built.'
  id: totrans-109
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*构建模型*：我们将使用一个简单的序列模型，包含卷积和全连接组件。由于我们不需要调整影响架构构建的超参数，因此可以不访问`params`字典来构建它。'
- en: '*Compile*: This is the relevant component of the construction and training
    of the model because parameters we are tuning (optimizer and learning rate) are
    explicitly used in this step. We will instantiate the sampled optimizer with the
    sampled learning rate and then pass the optimizer object with that learning rate
    into `model.compile()`. We will also pass `metrics=[''accuracy'']` into compiling
    such that we can access the accuracy of the model on the test data in evaluation
    as the output of the objective function.'
  id: totrans-110
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*编译*：这是模型构建和训练的相关组件，因为我们正在调整的参数（优化器和学习率）在这个步骤中被明确使用。我们将使用采样学习率实例化采样优化器，然后将带有该学习率的优化器对象传递给`model.compile()`。我们还将传递`metrics=[''accuracy'']`到编译中，这样我们就可以在评估时作为目标函数的输出访问测试数据上的模型准确率。'
- en: '*Fit model*: We fit the model as usual for some number of epochs.'
  id: totrans-111
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*拟合模型*：我们将像通常一样，对模型进行一定数量的epoch拟合。'
- en: '*Evaluate accuracy*: We can call `model.evaluate()` to return a list of loss
    and metrics calculated on the test data. The first element is the loss, and the
    second is the accuracy; we index the output of evaluation accordingly to assess
    the accuracy.'
  id: totrans-112
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*评估准确率*：我们可以调用`model.evaluate()`来返回在测试数据上计算的损失和指标列表。第一个元素是损失，第二个是准确率；我们根据评估输出的索引来评估准确率。'
- en: '*Return negated accuracy on validation set*: The accuracy is negated such that
    smaller is “better.”'
  id: totrans-113
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*返回验证集的否定准确率*：准确率被否定，使得较小的值表示“更好”。'
- en: '[PRE5]'
  id: totrans-114
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Note that we specify `verbose=0` with both `model.fit()` and `model.evaluate()`,
    which prevents Keras from printing progress bars and metrics during training.
    While these progress bars are helpful when training a Keras model in isolation,
    in the context of hyperparameter optimization with Hyperopt, they interfere with
    Hyperopt’s own progress bar printing.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，我们在`model.fit()`和`model.evaluate()`中都指定了`verbose=0`，这阻止了Keras在训练过程中打印进度条和指标。虽然这些进度条在单独训练Keras模型时很有帮助，但在Hyperopt的参数优化上下文中，它们会干扰Hyperopt自己的进度条打印。
- en: 'We can use the objective function and the search space, along with the Tree-structured
    Parzen Estimator and the maximum number of evaluations, into the `fmin` function:
    best = fmin(objective, space, algo=tpe.suggest, max_evals=30).'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将目标函数、搜索空间以及树结构帕累托估计器和最大评估次数一起传递给`fmin`函数：best = fmin(objective, space,
    algo=tpe.suggest, max_evals=30)。
- en: After the search has completed, `best` should contain a dictionary of best performing
    values for each parameter specified in the search space. In order to use these
    best parameters in your model, you can rebuild the model as it is built in the
    objective function and replace the `params` dictionary with the `best` dictionary.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 搜索完成后，`best`应包含一个字典，其中包含搜索空间中每个参数的最佳性能值。为了在你的模型中使用这些最佳参数，你可以按照目标函数中构建模型的方式重建模型，并将`params`字典替换为`best`字典。
- en: 'For even better performance, two adaptations should be made:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 为了获得更好的性能，应进行两项调整：
- en: '*Early stopping callback*: This stops training after performance plateaus to
    save as many resources (computational and time-wise) as possible, as meta-optimization
    is an inherently expensive operation. This can usually be coupled with a high
    number of epochs, such that each model design is trained toward fruition – its
    potential is extracted as much as reasonably possible, and training stops after
    there seems to be no more potential to extract.'
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*早期停止回调*: 这会在性能停滞后停止训练，以尽可能多地节省资源（计算和时间），因为元优化本质上是一项昂贵的操作。这通常可以与高数量的epoch结合使用，使得每个模型设计都能充分训练——尽可能多地提取其潜力，并在似乎没有更多潜力可提取时停止训练。'
- en: '*Model checkpoint callback with weight reloading before evaluation*: Rather
    than evaluating the state of the neural network after it has completed training,
    it is optimal to evaluate the best “version” of that neural network. This can
    be done via the model checkpoint callback, which saves the weights of the best
    performing model. Before evaluating the performance of the model, reload these
    weights.'
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*在评估前使用带权重重载的模型检查点回调*: 与在神经网络完成训练后评估其状态相比，评估该神经网络的“最佳版本”更为理想。这可以通过模型检查点回调来实现，该回调保存了表现最佳模型的权重。在评估模型性能之前，重新加载这些权重。'
- en: These two measures will further increase the efficiency of the search.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个措施将进一步提高搜索效率。
- en: Using Hyperopt to Optimize Model Architecture
  id: totrans-122
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 使用Hyperopt优化模型架构
- en: Although Hyperopt is often used to tune parameters in the model’s training procedure,
    you can also use it to make fine-tuned optimizations to the model architecture.
    It’s important, though, to consider whether you should use a general meta-optimization
    method like Hyperopt or a more specialized architecture optimization method like
    Neural Architecture Search. If you want to optimize large changes in the model
    architecture, it’s best to use Neural Architecture Search via Auto-Keras (this
    is covered later in the chapter). On the other hand, if you want to optimize small
    changes, Auto-Keras may not offer you the level of precision you desire, and thus
    Hyperopt may be the better solution. Note that if the change in architecture you
    intend to optimize is very small (like finding the optimal number of neurons in
    a layer), it may not be fruitful to even optimize it at all, provided that you
    have set a reasonable default parameter.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然Hyperopt通常用于调整模型训练过程中的参数，但你也可以用它来对模型架构进行微调优化。不过，重要的是要考虑你是否应该使用像Hyperopt这样的通用元优化方法，还是使用像神经架构搜索这样的更专业的架构优化方法。如果你想优化模型架构的大幅变化，最好通过Auto-Keras进行神经架构搜索（这将在本章后面介绍）。另一方面，如果你想优化小的变化，Auto-Keras可能无法提供你想要的精度水平，因此Hyperopt可能是更好的解决方案。请注意，如果你打算优化的架构变化非常小（比如找到一个层的最优神经元数量），即使设置了合理的默认参数，优化也可能没有成效。
- en: Good architecture components to optimize with a general optimization framework
    like Hyperopt that are neither too large to optimize with a more specialized Neural
    Architecture Search method nor too small to be insignificant with respect to the
    model performance include
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 适合使用像Hyperopt这样的通用优化框架进行优化的良好架构组件，这些组件既不是太大以至于无法使用更专业的神经架构搜索方法进行优化，也不是太小以至于对模型性能来说微不足道，包括
- en: '*Number of layers in a certain block/component* (provided the range is long
    enough): The number of layers is quite a significant factor in the model architecture,
    especially if it is compounded via a block/cell-based design.'
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*特定块/组件中的层数*（假设范围足够长）：层数是模型架构中的一个相当重要的因素，尤其是如果它是通过基于块/单元的设计复合的。'
- en: '*Presence of batch normalization*: Batch normalization is an important layer
    that aids in smoothing the loss space. However, it succeeds only if used in certain
    locations and with a certain frequency.'
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*批归一化的存在*: 批归一化是一个重要的层，有助于平滑损失空间。然而，只有在其被用于特定位置并以特定频率使用时才能成功。'
- en: '*Presence and rate of dropout layer*: Like batch normalization, dropout can
    be an incredibly powerful regularization method. Successful usage of dropout requires
    placement in certain locations, with a certain frequency, and a well-tuned dropout
    rate.'
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*dropout层的存在率和率*：与批量归一化一样，dropout可以是一个非常强大的正则化方法。成功使用dropout需要放置在特定的位置，以一定的频率，以及一个良好的dropout率。'
- en: 'For this example, we’ll tune three general factors of the model architecture:
    the number of layers in the convolutional component, the number of layers in the
    dense component, and the dropout rate of a dropout layer inserted in between every
    layer. (You could also tune the dropout rate of all dropout layers, which offers
    less customizability but may be more successful in some circumstances.)'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个例子，我们将调整模型架构的三个一般因素：卷积组件中的层数，密集组件中的层数，以及插入到每层之间的dropout层的dropout率。（您也可以调整所有dropout层的dropout率，这提供了更少的可定制性，但在某些情况下可能更成功。）
- en: Because we are keeping track of the dropout rate of several dropout layers,
    we cannot merely define it as a single parameter in the search space. Rather,
    we will need to automate the storage and organization of several parameters in
    the search space corresponding to each dropout layer.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们正在跟踪多个dropout层的dropout率，我们不能仅仅将其定义为搜索空间中的单个参数。相反，我们需要自动化存储和组织搜索空间中与每个dropout层对应的多个参数。
- en: Let’s begin by defining some key variables that we’ll need to use repeatedly
    later (Listing [5-7](#PC7)). We’re willing to accept any number of convolutional
    layers from a minimum of 3 layers to a maximum of 8 layers and any number of dense
    layers from 2 to 5\. (You can adjust this, of course, to your particular problem.)
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从定义一些关键变量开始，这些变量我们稍后需要反复使用（见列表[5-7](#PC7)）。我们愿意接受从3层到8层的任意数量的卷积层，以及从2层到5层的任意数量的密集层。（当然，您可以根据您的问题进行调整。）
- en: '[PRE6]'
  id: totrans-131
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Using this information, we will generate two lists, `conv_drs` and `dense_drs`,
    which contain a Hyperopt search space object for the dropout rate of each layer
    in the convolutional and dense components, respectively (Listing [5-8](#PC8)).
    This allows us to store multiple related but different search parameters efficiently;
    these can be accessed easily via indexing when constructing the model. We use
    string formatting to provide a unique string name to the Hyperopt search space.
    Note that while the name you provide to each search space parameter is arbitrary
    (the user accesses each parameter through other means), Hyperopt requires (a)
    string names and (b) unique names (i.e., no two parameters can have the same name).
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这些信息，我们将生成两个列表，`conv_drs`和`dense_drs`，分别包含卷积和密集组件中每层的dropout率的Hyperopt搜索空间对象（见列表[5-8](#PC8)）。这使我们能够有效地存储多个相关但不同的搜索参数；这些参数在构建模型时可以通过索引轻松访问。我们使用字符串格式化来为Hyperopt搜索空间提供唯一的字符串名称。请注意，虽然您提供的每个搜索空间参数的名称是任意的（用户通过其他方式访问每个参数），但Hyperopt需要（a）字符串名称和（b）唯一的名称（即，两个参数不能有相同的名称）。
- en: '[PRE7]'
  id: totrans-133
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Note that we are constructing as many search space variables as the maximum
    number of layers for the convolutional and fully connected components, which means
    that there will be redundancy if the number of layers sampled is less than the
    maximum number (i.e., some dropout rates will not be used). This is fine; Hyperopt
    will handle it and adapt to these relationships. Additionally, we are defining
    a normal search space for the dropout rate that could theoretically sample values
    less than 0 or larger than 1 (i.e., invalid dropout rates). We will adjust these
    within the objective function to demonstrate custom manipulation of the search
    space when Hyperopt does not provide a function that fits your particular needs
    (in this case, a normal-shaped distribution that is bounded on both ends).
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，我们在构建卷积和全连接组件的最大层数那么多搜索空间变量，这意味着如果采样的层数少于最大层数，将会有冗余（即，某些dropout率将不会被使用）。这是可以的；Hyperopt会处理它并适应这些关系。此外，我们还在定义一个正常的搜索空间，用于dropout率，理论上可以采样小于0或大于1的值（即，无效的dropout率）。我们将在目标函数中调整这些值，以展示当Hyperopt没有提供适合您特定需求的功能时（在这种情况下，两端有界的一般形状分布），如何自定义搜索空间。
- en: We can use these parameters to create the search space (Listing [5-9](#PC9)).
    When defining the number of layers in the convolutional and dense components,
    we use a quantized uniform distribution with `q=1` to sample all integers from
    `min_num_convs/dense` to `max_num_convs/dense` (inclusive). Additionally, note
    that we passed in lists for the `'conv_dr'` and `'dense_dr'` parameters. Hyperopt
    will interpret this (or any other data type that contains several Hyperopt search
    space objects) as a sub-class of parameters that will be tuned like any other
    parameter.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用这些参数来创建搜索空间（见列表[5-9](#PC9)）。在定义卷积和密集组件中的层数时，我们使用 `q=1` 的量化均匀分布来采样从 `min_num_convs/dense`
    到 `max_num_convs/dense`（包括）的所有整数。此外，请注意，我们为 `'conv_dr'` 和 `'dense_dr'` 参数传递了列表。Hyperopt
    将其（或任何包含多个 Hyperopt 搜索空间对象的任何数据类型）解释为参数的子类，这些参数将像任何其他参数一样进行调整。
- en: '[PRE8]'
  id: totrans-136
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Building the objective function in this context is an elaborate process, so
    we’ll build it in multiple pieces.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 在此上下文中构建目标函数是一个复杂的过程，因此我们将分多个部分构建它。
- en: Recall that the Hyperopt search space for the dropout rate was defined to be
    normally distributed, meaning that it is possible to sample invalid dropout rates
    (less than 0 or larger than 1). We can address sampled parameters that are invalid
    at the beginning of the objective function (Listing [5-10](#PC10)).
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 回想一下，Hyperopt 为丢弃率定义的搜索空间是正态分布的，这意味着可能采样到无效的丢弃率（小于0或大于1）。我们可以在目标函数的开始处处理采样到的无效参数（见列表[5-10](#PC10)）。
- en: If the dropout rate is larger than 0.9, we set it to 0.9 (Keras does not accept
    a dropout rate equal to 1, and any dropout rate larger than 90% is unlikely to
    succeed anyways). On the other hand, if the dropout rate is less than 0, we set
    it to 0\. Given the mean and standard deviation parameters defined in the search
    space, it is unlikely for either of these to be sampled, but it’s important to
    define these catch mechanisms to prevent errors that disrupt the optimization
    process. Note that another alternative would be to return `{'status':'fail'}`
    to indicate an invalid parameter(s). The Bayesian optimization algorithm will
    adapt to any of these measures.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 如果丢弃率大于0.9，我们将其设置为0.9（Keras 不接受等于1的丢弃率，并且任何大于90%的丢弃率成功的可能性也很低）。另一方面，如果丢弃率小于0，我们将其设置为0。考虑到搜索空间中定义的均值和标准差参数，这两种情况都不太可能被采样，但定义这些捕获机制以防止中断优化过程的错误是很重要的。请注意，另一种选择是将
    `{'status':'fail'}` 返回以指示无效的参数。贝叶斯优化算法将适应这些措施中的任何一种。
- en: '[PRE9]'
  id: totrans-140
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: We can then build the model “template” (the Sequential base model) and attach
    an input to it (Listing [5-11](#PC11)).
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们可以构建模型“模板”（Sequential基本模型）并将其附加到它上（见列表[5-11](#PC11)）。
- en: '[PRE10]'
  id: totrans-142
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: When building the convolutional component, we add however many convolutional
    layers specified in the input parameters via a for loop (Listing [5-12](#PC12)).
    Note that we wrap the sampled number of convolutional layers `params['#convs']`
    in an `int()` function; the output of the quantized value will not technically
    be an integer (e.g., `3.0`, `4.0`), whereas Python requires an integer object
    input to the `range()` function . After each convolutional layer, we add a dropout
    layer with the dropout rate accessed by indexing the previously defined `conv_drs`
    list of dropout rates. By organizing dropout rates into the easily accessible
    and storable list format, we are able to integrate several parameters into the
    optimization procedure.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 在构建卷积组件时，我们通过一个循环（见列表[5-12](#PC12)）添加输入参数中指定的任意多个卷积层。请注意，我们将采样到的卷积层数量 `params['#convs']`
    包裹在一个 `int()` 函数中；量化值的输出在技术上不会是一个整数（例如，`3.0`，`4.0`），而Python要求 `range()` 函数的输入是一个整数对象。在每个卷积层之后，我们添加一个具有通过索引先前定义的
    `conv_drs` 列表中的丢弃率来访问的丢弃率层的dropout层。通过将丢弃率组织成易于访问和存储的列表格式，我们能够将多个参数集成到优化过程中。
- en: '[PRE11]'
  id: totrans-144
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Constructing the dense component follows the same logic (Listing [5-13](#PC13)).
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 构建密集组件遵循相同的逻辑（见列表[5-13](#PC13)）。
- en: '[PRE12]'
  id: totrans-146
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Afterward, append the model output and perform the previously discussed remaining
    steps of compiling, fitting, evaluating, and returning the output of the objective
    function.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，附加模型输出并执行之前讨论的剩余步骤，包括编译、拟合、评估和返回目标函数的输出。
- en: As you can see, Hyperopt allows for a tremendous amount of control over specific
    elements of the model, even if it involves a little bit more work – your imagination
    (and your capability for organization) is the limit!
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，Hyperopt 允许对模型的具体元素进行大量的控制，即使这需要一点更多的工作——您的想象力（以及您的组织能力）是极限！
- en: Hyperas Syntax, Concepts, and Usage
  id: totrans-149
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Hyperas语法、概念和用法
- en: Hyperopt offers a tremendous amount of customizability and adaptability toward
    your particular optimization needs, but it can be a lot of work, especially for
    relatively simpler tasks. Hyperas is a wrapper that operates on Hyperopt but is
    specialized in syntax for meta-optimizing Keras models. The primary advantage
    of Hyperas is that you can define parameters to be optimized with much fewer code
    than Hyperopt syntax requires.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: Hyperopt提供了大量的可定制性和适应性，以满足您特定的优化需求，但这也意味着需要做很多工作，尤其是在相对简单的任务中。Hyperas是一个包装器，它运行在Hyperopt之上，专门用于元优化Keras模型的语法。Hyperas的主要优势是，您可以使用比Hyperopt语法所需的代码少得多来定义要优化的参数。
- en: Note
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: While Hyperas is a useful resource, it’s important to know how to use Hyperopt
    because (a) often, problems that require meta-optimization in the first place
    are complex enough to warrant using Hyperopt and (b) Hyperas is a less developed
    and stable package (it is currently archived by the owner). Additionally, be warned
    that there are complications with using Hyperas with Jupyter Notebooks in an environment
    like Kaggle or Colab – if you are working with these circumstances, it may be
    easier to use Hyperopt.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然Hyperas是一个有用的资源，但了解如何使用Hyperopt很重要，因为（a）首先需要元优化的问题通常足够复杂，值得使用Hyperopt；（b）Hyperas是一个不太发达且不稳定的包（它目前已被所有者存档）。此外，请注意，在Kaggle或Colab等环境中使用Hyperas与Jupyter
    Notebooks一起使用可能会出现一些问题——如果您在这些情况下工作，可能更容易使用Hyperopt。
- en: Install Hyperas with `pip install hyperas` and import with `import hyperas`.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 使用`pip install hyperas`安装Hyperas，并使用`import hyperas`导入。
- en: Using Hyperas to Optimize Training Procedure
  id: totrans-154
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 使用Hyperas优化训练过程
- en: 'Let’s use Hyperas’ syntax to perform the same optimization of the model training
    procedure by finding the best combination of optimizer and learning rate. Hyperas
    has three primary components (Figure [5-9](#Fig9)):'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们使用Hyperas的语法来执行相同的模型训练过程优化，通过找到最佳优化器和学习率的组合。Hyperas有三个主要组件（图[5-9](#Fig9)）：
- en: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig9_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig9_HTML.jpg)'
  id: totrans-156
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig9_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig9_HTML.jpg)'
- en: Figure 5-9
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-9
- en: Key components of the Hyperas framework – data feeder, objective function, and
    search operation
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: Hyperas框架的关键组件——数据提供者、目标函数和搜索操作
- en: '*Data feeder function* : A function must be defined to load data, perform any
    preprocessing, and return four sets of data: *x* train, *y* train, *x* test, and
    *y* test (in that order). By defining the data feeding process as a function,
    Hyperas can make shortcuts to prevent redundancy in data loading in training the
    model.'
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*数据提供函数*：必须定义一个函数来加载数据，执行任何预处理，并返回四组数据：*x* 训练、*y* 训练、*x* 测试和 *y* 测试（按此顺序）。通过将数据提供过程定义为函数，Hyperas可以在训练模型时避免数据加载的冗余。'
- en: '*Objective function* : This function takes in the four sets of data from the
    data feeder function. It builds the model with unique markers for parameters to
    be optimized, fits on the training data, and returns whatever loss is used for
    evaluation. The objective function should return a dictionary with three key-value
    pairs: the loss, the status, and the model the loss was evaluated on.'
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*目标函数*：这个函数接受数据提供函数的四组数据。它使用独特的标记参数构建模型，在训练数据上拟合，并返回用于评估的任何损失。目标函数应返回一个包含三个键值对的字典：损失、状态以及评估损失的模型。'
- en: '*Minimization* : This function takes in the objective function (model creating
    function) and the data feeder function, alongside the Tree-structured Parzen Estimators
    algorithm from Hyperopt and a `max_evals` parameter. Because Hyperas is implemented
    with lots of recording, the minimization procedure requires a `hyperopt.Trials()`
    object, which serves as an additional documentation/recording object. (You can
    also pass this into `fmin()` for Hyperopt, although it’s not required.)'
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*最小化*：这个函数接受目标函数（模型创建函数）、数据提供函数，以及来自Hyperopt的树结构Parzen估计器算法和一个`max_evals`参数。由于Hyperas实现了大量的记录，最小化过程需要一个`hyperopt.Trials()`对象，它作为一个额外的文档/记录对象。（您也可以将其传递给Hyperopt的`fmin()`，尽管这不是必需的。）'
- en: 'Assuming the data feeder function has already been created, we will create
    the objective function (Listing [5-14](#PC14)). It is almost identical to the
    objective function in Hyperopt, with two key differences: the objective function
    takes in the four sets of data rather than the parameters dictionary, and optimizable
    parameters are defined completely within the objective function and with as little
    user attachment and handling as necessary.'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 假设数据提供函数已经创建，我们将创建目标函数（代码清单 [5-14](#PC14)）。它与 Hyperopt 中的目标函数几乎相同，有两个关键区别：目标函数接收四组数据而不是参数字典，并且可优化参数完全在目标函数内定义，并且尽可能减少用户依赖和处理。
- en: To specify an optimizable parameter, put double braces around a `hyperas.distributions`
    search space distribution object (e.g., `{{hyperas.distributions.choice(['a','b','c'])}}`).
    Hyperas contains all the distributions implemented in Hyperopt. Note that no label
    is required, which allows for easy definition of numerous optimizable parameters.
    The double-brace syntax can only be used in the context of the objective function,
    which Hyperas uses Jinja style for template replacement and temporary files. Note
    that because Hyperas is creating these models in separate “environments,” you
    may need to re-import certain models or layers again within the objective function.
    In this case, we import the `Sequential` model and the Keras layers.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 要指定一个可优化参数，将双大括号放在 `hyperas.distributions` 搜索空间分布对象周围（例如，`{{hyperas.distributions.choice(['a','b','c'])}}`）。Hyperas
    包含了 Hyperopt 中实现的所有分布。请注意，不需要标签，这允许轻松定义多个可优化参数。双大括号语法只能在目标函数的上下文中使用，Hyperas 使用
    Jinja 风格进行模板替换和临时文件。请注意，由于 Hyperas 在单独的“环境”中创建这些模型，您可能需要在目标函数中重新导入某些模型或层。在这种情况下，我们导入了
    `Sequential` 模型和 Keras 层。
- en: '[PRE13]'
  id: totrans-164
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: To perform optimization, use the `hyperas.optim.minimize` function (Listing
    [5-15](#PC15)), which helpfully returns both the best parameters and the best
    model from the optimization procedure. (Recall that Hyperopt returns only the
    best set of parameters, which you need to store into a rebuilt model.) `optim.minimize()`
    takes in the user-specified objective function and the data feeder function, as
    well as the `tpe.suggest` and `Trials()` entities from Hyperopt. If you are working
    in Jupyter Notebooks, `optim.minimize()` also requires the name of your notebook.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 要执行优化，使用 `hyperas.optim.minimize` 函数（代码清单 [5-15](#PC15)），它方便地返回优化过程中的最佳参数和最佳模型。（回想一下，Hyperopt
    只返回最佳参数集，您需要将其存储到重建的模型中。）`optim.minimize()` 接收用户指定的目标函数和数据提供函数，以及来自 Hyperopt 的
    `tpe.suggest` 和 `Trials()` 实体。如果您在 Jupyter Notebooks 中工作，`optim.minimize()` 还需要您笔记本的名称。
- en: '[PRE14]'
  id: totrans-166
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: After training, you can save the model and parameters for later usage.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 训练后，您可以保存模型和参数以供以后使用。
- en: Using Hyperas to Optimize Model Architecture
  id: totrans-168
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 使用 Hyperas 优化模型架构
- en: The true convenience of Hyperas is exposed when applied to a task like earlier
    of optimizing a host of parameters all at once. Rather than needing to create
    elaborate lists and organization structures for the search space, we can define
    parameters to optimize within the function itself (Listing [5-16](#PC16)). To
    prevent sampled parameters for the dropout rate from exceeding 0.9 or falling
    below 0, we can implement a custom rounding function, `r`, which takes in a parameter
    `x_` (an underscore was added to distinguish it from `x`, which Hyperas uses internally
    and can cause problems) and either adjusts it if it is invalid or lets it pass.
    We wrap `r` around all sampled rates.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 当应用于像之前优化大量参数这样的任务时，Hyperas 的真正便利性才显现出来。我们不需要为搜索空间创建复杂的列表和组织结构，我们可以在函数本身中定义要优化的参数（代码清单
    [5-16](#PC16)）。为了防止从 dropout 率中采样的参数超过 0.9 或低于 0，我们可以实现一个自定义舍入函数 `r`，它接收一个参数 `x_`（添加下划线以区分
    Hyperas 内部使用的 `x`，这可能会引起问题）并调整它（如果它无效）或让它通过。我们将 `r` 包裹在所有采样的速率周围。
- en: '[PRE15]'
  id: totrans-170
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: This objective function can then be used in `hyperas.optim.minimize()` as usual.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 这个目标函数可以像往常一样用在 `hyperas.optim.minimize()` 中。
- en: Making adaptations is simple too – if you want to have one dropout rate per
    component, for instance, just sample the dropout rate outside of the loop such
    that only one parameter is created for the entire component (Listing [5-17](#PC17)).
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 进行调整也很简单——如果您想为每个组件有一个 dropout 率，例如，只需在循环外部采样 dropout 率，这样整个组件就只创建一个参数（代码清单
    [5-17](#PC17)）。
- en: '[PRE16]'
  id: totrans-173
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Neural Architecture Search
  id: totrans-174
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 神经架构搜索
- en: In our previous discussion of meta-optimization methods, we have used generalized
    frameworks for the optimization of parameters in all sorts of contexts that are
    also applicable to neural network architecture and training procedure optimization.
    While Bayesian optimization suffices for some relatively detailed or non-architectural
    parameter optimizations, in other cases we desire a meta-optimization method that
    is designed particularly for the task of optimizing the architecture of a neural
    network.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们之前关于元优化方法的讨论中，我们使用了适用于各种上下文中参数优化的通用框架，这些框架也适用于神经网络架构和训练过程优化。虽然贝叶斯优化对于一些相对详细或非架构参数优化来说是足够的，但在其他情况下，我们希望有一个专门为优化神经网络架构的任务设计的元优化方法。
- en: Neural Architecture Search (NAS) is the process of automating the engineering
    of neural network architectures. Because NAS methods are designed specifically
    for the task of searching architectures, they are generally more efficient in
    finding high-performing architectures than more generalized optimization methods
    like Bayesian optimization. Moreover, because Neural Architecture Search often
    requires searching for practical, efficient architectures, many view NAS as a
    form of model compression – building an architecture that can effectively represent
    the same knowledge as a larger architecture more effectively.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 神经架构搜索（Neural Architecture Search，简称NAS）是自动化神经网络架构工程的过程。由于NAS方法是为搜索架构的任务专门设计的，因此它们在寻找高性能架构方面通常比贝叶斯优化等更通用的优化方法更有效率。此外，由于神经架构搜索通常需要寻找实用、高效的架构，许多人认为NAS是一种模型压缩的形式——构建一个能够更有效地表示与更大架构相同知识的架构。
- en: NAS Intuition and Theory
  id: totrans-177
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: NAS直觉与理论
- en: Many of the well-known deep learning architectures – ResNet and Inception, for
    instance – are built with incredibly complex structures that require a team of
    deep learning engineers to conceive and experiment with. The process of building
    such structures, too, has never quite been a precise science, but instead a continual
    process of following hunches/intuition and experimentation. Deep learning is such
    a quickly evolving field that theoretical explanations for the success of a method
    almost always follow empirical evidence rather than vice versa.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 许多知名的深度学习架构——例如ResNet和Inception——都是用极其复杂的结构构建的，这需要一支深度学习工程师团队来构思和实验。构建此类结构的过程也从未完全是一门精确的科学，而是一个不断跟随直觉/直觉和实验的持续过程。深度学习是一个发展如此迅速的领域，以至于一个方法成功的原因的理论解释几乎总是紧随经验证据之后，而不是相反。
- en: Neural Architecture Search is a growing subfield of deep learning, attempting
    to develop structured and efficient searches for the most optimal neural network
    architectures. Although earlier work in Neural Architecture Search (early 2010s
    and before) used primarily Bayesian-based methods, modern NAS work involves the
    usage of deep learning structures to optimize deep learning architectures. That
    is, a neural network system is trained to “design” the best neural network architectures.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 神经架构搜索是深度学习的一个新兴子领域，试图为最优化神经网络架构开发结构化和高效的搜索方法。尽管神经架构搜索的早期工作（2010年代早期及之前）主要使用基于贝叶斯的方法，但现代NAS工作涉及使用深度学习结构来优化深度学习架构。也就是说，一个神经网络系统被训练来“设计”最佳的神经网络架构。
- en: 'Modern Neural Architecture Search methods contain three key components: the
    search space, the search strategy, and the evaluation strategy (Figure [5-10](#Fig10)).'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 现代神经架构搜索方法包含三个关键组件：搜索空间、搜索策略和评估策略（见图[5-10](#Fig10)）。
- en: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig10_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig10_HTML.jpg)'
  id: totrans-181
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig10_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig10_HTML.jpg)'
- en: Figure 5-10
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-10
- en: Relationship between three key components of Neural Architecture Search – the
    search space, the search strategy, and evaluation strategy
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 神经架构搜索三个关键组件之间的关系——搜索空间、搜索策略和评估策略
- en: This is a similar structure to how Bayesian optimization frameworks perform
    optimization. However, NAS systems are differentiated from general optimization
    frameworks in that they do not approach neural network architecture optimization
    as a black-box problem. Neural Architecture Search methods take advantage of domain
    knowledge about neural network architecture representation and optimization by
    building it into the design of all three components.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 这与贝叶斯优化框架执行优化的结构类似。然而，NAS系统与通用优化框架的区别在于，它们不是将神经网络架构优化视为一个黑盒问题。神经网络架构搜索方法通过将其构建到所有三个组件的设计中，利用了关于神经网络架构表示和优化的领域知识。
- en: Representing the search space of neural network architectures is an interesting
    problem. The search space must not only be capable of representing a wide array
    of neural network architectures but also must be set up in a way that enables
    the search strategy to navigate the search space to sample new promising architectures
    – there must be some concept of distance (i.e., certain architectures are “closer”
    to others, Figure [5-11](#Fig11)).
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 表示神经网络架构的搜索空间是一个有趣的问题。搜索空间必须能够表示一系列广泛的神经网络架构，并且必须以某种方式设置，以便搜索策略能够在搜索空间中导航以采样新的有希望的架构——必须有一些距离的概念（即，某些架构比其他架构“更接近”，见图
    [5-11](#Fig11))。
- en: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig11_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig11_HTML.jpg)'
  id: totrans-186
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig11_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig11_HTML.jpg)'
- en: Figure 5-11
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-11
- en: Left – a sequential topology; right – a more complex nonlinear topology
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 左边 - 顺序拓扑；右边 - 更复杂的非线性拓扑
- en: Moreover, the search space must be capable of representing both linear and nonlinear
    neural network topologies, which further complicates the organization of such
    a search space.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，搜索空间必须能够表示线性和非线性神经网络拓扑，这进一步复杂化了这种搜索空间的组织。
- en: Note that Neural Architecture Search systems go to tremendous trouble to represent
    neural networks in seemingly contrived ways primarily for the purposes of the
    *search strategy* component , not the search space itself. If the only purpose
    of the search space component is to represent the model, current graph network
    implementations more than suffice. However, it’s incredibly difficult to create
    a search strategy that is able to effectively output and work with a neural network
    architecture in that exact format. The medium of the search space representation
    allows the search strategy to output a *representation*, which can be used to
    build and evaluate the corresponding model. Moreover, limiting the search space
    to only certain architecture designs likely to be successful forces the search
    strategy to sample from and explore more high-potential architectures.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，神经网络架构搜索系统为了主要服务于 *搜索策略* 组件，在表示神经网络时付出了巨大的努力，这种表示方式看似人为设计，但并非针对搜索空间本身。如果搜索空间组件的唯一目的是表示模型，当前的图网络实现已经足够。然而，创建一个能够以那种确切格式有效地输出和操作神经网络架构的搜索策略是非常困难的。搜索空间表示的中介允许搜索策略输出一个
    *表示*，该表示可以用来构建和评估相应的模型。此外，将搜索空间限制在只有可能成功的某些架构设计，迫使搜索策略从更多高潜力架构中进行采样和探索。
- en: Perhaps the most simple representation of neural network topologies is to represent
    them as a sequential string of structured information with many rules to encode
    and decode the representation (Figure [5-12](#Fig12)). If a “block” of information
    indicates the existence of a convolutional layer, for instance, then other blocks
    must follow containing information regarding parameters in the convolutional layer,
    like the kernel size and number of filters.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络拓扑的最简单表示可能是将它们表示为具有许多编码和解码表示规则的有序结构信息字符串（见图 [5-12](#Fig12))。例如，如果一个“信息块”表示存在一个卷积层，那么其他块必须跟随，包含有关卷积层参数的信息，如内核大小和滤波器数量。
- en: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig12_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig12_HTML.jpg)'
  id: totrans-192
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig12_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig12_HTML.jpg)'
- en: Figure 5-12
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-12
- en: Sequential representation of a linear neural network topology
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 线性神经网络拓扑的顺序表示
- en: Additional adaptations can be made to represent more complex nonlinear topologies
    and recurrent neural networks by incorporating indices and “anchor points” into
    the sequential string of information. Skip connections can be modeled via an attention-style
    mechanism, in which the modeling agent can add skip connections between any two
    anchor points. The sequential string representation is powerful in that any neural
    network architecture – regardless of how complex – can be represented in and rebuilt
    from this format, even if it takes a very long sequence of information.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 可以通过将索引和“锚点”纳入信息序列字符串中，来对表示更复杂非线性拓扑和循环神经网络进行额外的调整。跳过连接可以通过一种注意力机制来建模，其中建模代理可以在任何两个锚点之间添加跳过连接。序列字符串表示非常强大，因为任何神经网络架构——无论多么复杂——都可以用这种格式表示并重建，即使它需要非常长的信息序列。
- en: This sort of sequential representation was used to represent the search spaces
    of earlier NAS work by Barret Zoph and Quoc V. Le in 2017\. The sequential representation
    of the search space, while being powerful (i.e., it can model many neural network
    architectures), proved not to be very efficient. Because the search space is so
    large, however, sequential representations of neural networks proved to be inefficient
    to navigate.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 这种类型的序列表示被用于在2017年由Barret Zoph和Quoc V. Le在早期NAS工作中表示搜索空间。尽管这种搜索空间的序列表示非常强大（即，它可以建模许多神经网络架构），但它证明效率不高。然而，由于搜索空间如此之大，神经网络序列表示在导航上证明是低效的。
- en: Cell-based representations of the architecture search space (Figure [5-13](#Fig13))
    have decreased representative power (i.e., they cannot represent as many architectures
    as a sequential representation can), but they have proven to be more efficient
    to navigate. The Neural Architecture Search algorithm learns the architecture
    of a cell structure, for instance, by selecting operations to fill in a blank
    “template cell.” The cell structure is then repeated in the final neural network
    architecture. Multiple different types of cell types can be used, and cells can
    be stacked together in nonlinear ways.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 架构搜索空间的基于细胞的表示（图[5-13](#Fig13)）降低了表示能力（即，它们不能表示像序列表示那样多的架构），但它们已被证明在导航上更有效。神经网络架构搜索算法通过选择操作来填充空白“模板细胞”来学习细胞结构的架构。然后，这种细胞结构在最终的神经网络架构中重复。可以使用多种不同的细胞类型，并且细胞可以以非线性方式堆叠在一起。
- en: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig13_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig13_HTML.jpg)'
  id: totrans-198
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig13_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig13_HTML.jpg)'
- en: Figure 5-13
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-13
- en: Cell-based neural network architecture representation. See NASNet for an example
    of a cell-based space
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 基于细胞的神经网络架构表示。参见NASNet，了解基于细胞的空间的示例
- en: While the representative power of cell-based search spaces is significantly
    smaller than that of sequential representations (a network must be built with
    repeated segments to be efficiently represented cell-wise), it has yielded better
    performing architectures with shorter resource investment. Moreover, these learned
    cells can be rearranged, selectively chosen, and transferred to other data contexts
    and tasks.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管基于细胞的搜索空间的表示能力显著小于序列表示（必须使用重复段构建网络才能有效地以细胞为单位表示），但它产生了性能更好的架构，并且资源投资更少。此外，这些学习到的细胞可以被重新排列、选择性选择，并转移到其他数据上下文和任务中。
- en: The search strategy operates within the search space to find the most optimal
    representation of the neural network. As discussed prior, the search strategy
    employed is dependent on the design of the search space representation. For instance,
    a sequential representation can be modeled with a recurrent based neural network,
    which takes in previous elements of the network and predicts the next corresponding
    piece of information (Figure [5-14](#Fig14)).
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 搜索策略在搜索空间内运行，以找到神经网络的最优表示。如前所述，采用的搜索策略取决于搜索空间表示的设计。例如，可以使用基于循环的神经网络来模拟序列表示，该网络接受网络的先前元素并预测下一个相应的信息片段（图[5-14](#Fig14)）。
- en: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig14_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig14_HTML.jpg)'
  id: totrans-203
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig14_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig14_HTML.jpg)'
- en: Figure 5-14
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-14
- en: Example recurrent neural network-based search strategy with a sequential information-based
    search space. This sort of design was used in early 2017 Neural Architecture Search
    work by Barret Zoph and Quoc. V. Le
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 基于序列信息搜索空间的示例循环神经网络搜索策略。这种设计在2017年早期Barret Zoph和Quoc. V. Le的神经网络架构搜索工作中被使用。
- en: Reinforcement learning is a commonly used search strategy for Neural Architecture
    Search. In the preceding example, for instance, the recurrent based neural network
    functions as the *agent* and its parameters function as the *policy*. The agent’s
    policy is iteratively updated to maximize the expected performance of the generated
    architecture.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习是神经网络架构搜索中常用的一种搜索策略。例如，在前面的例子中，基于循环的神经网络充当**代理**，其参数充当**策略**。代理的策略会迭代更新，以最大化生成架构的预期性能。
- en: 'Most search strategy methods face a problem: search space representations are
    discrete, not continuous, but gradient-based search strategies cannot operate
    on purely discrete problems. Thus, search strategies seeking to take advantage
    of gradients involve some operation to differentiate discrete operations.'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数搜索策略方法面临一个问题：搜索空间表示是离散的，而不是连续的，但基于梯度的搜索策略不能在纯离散问题上操作。因此，试图利用梯度的搜索策略涉及一些对离散操作进行微分操作的运算。
- en: For example, the Differentiable Architecture Search (DARTS) (Figure [5-15](#Fig15))
    search strategy uses *continuous relaxation*. Every potential operation (e.g.,
    convolution, pooling, activation, etc.) that could be performed to link one “block”
    to another (think of these not as blocks of layers, but instead as network “anchor
    points”) is represented in a graph. Each operation is associated with a weight.
    The operation between any two blocks with the highest weight is built into the
    final model, and a gradient-based method is used to find the weight associations
    that lead to the selected model with the best performance.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，可微架构搜索（DARTS）的搜索策略使用**连续松弛**。每个可能的操作（例如，卷积、池化、激活等）都可以用来将一个“块”连接到另一个（将这些视为不是层的块，而是网络“锚点”）。每个操作都与一个权重相关联。具有最高权重的两个块之间的操作被构建到最终模型中，并使用基于梯度的方法来找到导致所选模型性能最佳的权重关联。
- en: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig15_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig15_HTML.jpg)'
  id: totrans-209
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig15_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig15_HTML.jpg)'
- en: Figure 5-15
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-15
- en: Visualization of continuous relaxation in DARTS. Blue, green, and yellow connections
    represent potential operations that could be performed on blocks, like a convolution
    with a 5x5 filter size and 56 filters
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: DARTS中连续松弛的可视化。蓝色、绿色和黄色连接表示可以在块上执行的可能操作，例如使用5x5滤波器大小和56个滤波器的卷积
- en: Evolutionary search strategy methods don’t require this discrete-to-continuous
    mapping mechanism, however. Evolutionary algorithms repeatedly mutate, evaluate,
    and select models to obtain the best performing designs. While evolutionary search
    was one of the first proposed Neural Architecture Search designs in the early
    2000s, genetic-based NAS methods continue to yield promising results in the modern
    context. Modern evolutionary search strategies generally use more specialized
    search spaces and mutation strategies to decrease the inefficiency often associated
    with evolution-based methods.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 进化搜索策略方法不需要这种离散到连续的映射机制。进化算法反复变异、评估和选择模型以获得最佳性能的设计。虽然进化搜索是2000年代初最早提出的神经网络架构搜索设计之一，但基于遗传的NAS方法在现代背景下仍然产生有希望的结果。现代进化搜索策略通常使用更专业的搜索空间和变异策略，以减少与基于进化方法相关联的效率低下。
- en: The simplest method to evaluate the performance of a search strategy is to train
    the proposed network architecture to completion and to evaluate the performance.
    This direct method of neural network evaluation suffices and is the most precise
    method of evaluation, but it is costly on computational and time resources. Unless
    the searching strategy requires relatively few models to be searched to arrive
    at a good solution, it’s usually infeasible to directly evaluate all proposed
    architectures.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 评估搜索策略性能的最简单方法是训练所提出的网络架构并将其性能评估到完成。这种直接的网络评估方法足够精确，但计算和时间资源成本高昂。除非搜索策略需要相对较少的模型来找到好的解决方案，否则通常无法直接评估所有提出的架构。
- en: 'A proxy evaluation method is a method used to indicate the direct evaluation
    performance. Several techniques exist:'
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 代理评估方法是一种用于指示直接评估性能的方法。存在几种技术：
- en: '*Training on a smaller sampled dataset*: Rather than training the model on
    the entire dataset, train proposed architectures on a smaller, sampled dataset.
    The dataset can be selected randomly or to be representative of different “components”
    of the data (e.g., equal/proportional quantities per label or data cluster).'
  id: totrans-215
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*在较小的样本数据集上训练*：而不是在整个数据集上训练模型，而是在较小的、样本化的数据集上训练所提出的架构。数据集可以随机选择，或者代表数据的不同“组件”（例如，每个标签或数据簇的相等/成比例的数量）。'
- en: '*Train a smaller*-*scaled* version of the architecture: For architecture searching
    strategies involving predicting a cell-based architecture, the proposed architecture
    used for evaluation can be scaled down (i.e., fewer number of repeats or less
    complexity).'
  id: totrans-216
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*训练架构的较小*-*缩放*版本：对于涉及预测基于单元格的架构的搜索策略，用于评估的所提出架构可以被缩小（即，更少的重复次数或更低的复杂性）。'
- en: '*Predicting test performance curve*: The proposed architecture is trained for
    a few epochs, and a time series regression model is trained to extrapolate out
    the expected future performance. The maximum of the extrapolated future performance
    is taken to be the predicted performance of the proposed architecture.'
  id: totrans-217
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*预测测试性能曲线*：所提出的架构经过几个epoch的训练，并训练一个时间序列回归模型来预测预期的未来性能。预测性能的最大值被认为是所提出架构的预测性能。'
- en: See different approaches toward the three components of Neural Architecture
    Search visually mapped in Figure [5-16](#Fig16).
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 在图[5-16](#Fig16)中可视地映射了针对神经网络架构搜索三个组成部分的不同方法。
- en: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig16_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig16_HTML.jpg)'
  id: totrans-219
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig16_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig16_HTML.jpg)'
- en: Figure 5-16
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-16
- en: Demonstration of methods discussed for the search space, search strategy, and
    evaluation strategy components of NAS. Note that the discussed methods, of course,
    only cover some of modern NAS research
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: NAS的搜索空间、搜索策略和评估策略组件中讨论的方法的演示。请注意，所讨论的方法当然只覆盖了现代NAS研究的一部分。
- en: For more information on advances in NAS, see this chapter’s case studies, which
    detail three key advances in Neural Architecture Search.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 关于NAS的进展，请参阅本章的案例研究，其中详细介绍了神经网络架构搜索的三个关键进展。
- en: Neural Architecture Search is currently a quite cutting-edge area of deep learning
    research. Many of the NAS methods discussed still require massive quantities of
    time and computational resources and are not suitable for general usage in the
    same way architectures like convolutional neural networks are. We will use Auto-Keras
    – a library that efficiently adapts the Sequential Model-Based Optimization framework
    for architecture optimization – for NAS.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络架构搜索目前是深度学习研究的一个相当前沿的领域。许多讨论的NAS方法仍然需要大量的时间和计算资源，并且与卷积神经网络等架构一样，不适合通用使用。我们将使用Auto-Keras——一个库，它有效地将基于序列模型的优化框架用于架构优化——来进行NAS。
- en: Auto-Keras
  id: totrans-224
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Auto-Keras
- en: There are many auto-ML libraries like PyCaret, H2O, and Azure; for the purposes
    of this book, we use Auto-Keras, an auto-ML library built natively upon Keras.
    Auto-Keras demonstrates the progressive disclosure of complexity principle, meaning
    that users can both build incredibly simple searches and run more complex operations.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 有许多自动机器学习库，如PyCaret、H2O和Azure；为了本书的目的，我们使用Auto-Keras，这是一个在Keras原生构建的自动机器学习库。Auto-Keras展示了复杂性的渐进披露原则，这意味着用户既可以构建极其简单的搜索，也可以运行更复杂的操作。
- en: To install, use `pip install auto-keras`.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 安装时，使用`pip install auto-keras`。
- en: Auto-Keras System
  id: totrans-227
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: Auto-Keras系统
- en: The Auto-Keras Neural Architecture Search system is one of very few easily accessible
    NAS libraries, as of the writing of this book – even state-of-the-art NAS designs
    are still too computationally expensive and intricate to be feasibly written into
    an approachable package.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 截至本书编写时，Auto-Keras神经网络架构搜索系统是少数几个易于访问的NAS库之一——即使是当前最先进的NAS设计，由于计算成本过高且复杂，也难以实际写入易于接触的包中。
- en: Auto-Keras uses Sequential Model-Based Optimization (SMBO) , which was earlier
    presented as a formal framework for understanding Bayesian optimization.^([1](#Fn1))
    However, while generalized SMBO is designed to solve black-box problems, like
    the Tree-structured Parzen Estimator strategy used in Hyperopt, Auto-Keras exploits
    domain knowledge about the problem domain – neural network architectures – to
    develop more efficient SMBO components.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: Auto-Keras 使用基于模型的优化（SMBO），这之前被提出作为一个理解贝叶斯优化的正式框架。[1](#Fn1)。然而，虽然广义 SMBO 被设计用来解决黑盒问题，如
    Hyperopt 中使用的 Tree-structured Parzen Estimator 策略，但 Auto-Keras 利用关于问题域（神经网络架构）的领域知识来开发更有效的
    SMBO 组件。
- en: While the Tree-structured Parzen Estimator strategy employs the TPE surrogate
    model, Auto-Keras utilizes another commonly used model, the Gaussian process.
    Like all surrogate models used in SMBO, the Gaussian process probabilistically
    represents knowledge about the true function. Unlike TPE, however, the Gaussian
    process does so by learning the probability distribution of functions that could
    feasibly represent the sampled data (Figure [5-17](#Fig17)). A function that fits
    the sampled data well will be associated with a high probability, whereas a function
    that fits the data poorly is associated with a low probability. The mean of this
    probability distribution is the most representative function. (Note that there
    is an infinite quantity of existing functions, so few functions have significant
    probabilities.)
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 Tree-structured Parzen Estimator 策略采用 TPE 代理模型，但 Auto-Keras 使用了另一个常用的模型，即高斯过程。与所有用于
    SMBO 的代理模型一样，高斯过程以概率形式表示关于真实函数的知识。然而，与 TPE 不同的是，高斯过程通过学习可以合理地表示采样数据的函数的概率分布来实现这一点（图
    [5-17](#Fig17)）。拟合采样数据良好的函数将与高概率相关联，而拟合数据不佳的函数将与低概率相关联。这个概率分布的均值是最具代表性的函数。（请注意，存在无限数量的现有函数，因此只有少数函数具有显著的概率。）
- en: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig17_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig17_HTML.jpg)'
  id: totrans-231
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig17_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig17_HTML.jpg)'
- en: Figure 5-17
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-17
- en: Simplified representation of the idea behind Gaussian processes – different
    fitted functions on sampled points and their associated probabilities. In practice,
    you probably won’t see a polynomial fit next to a sinusoidal fit in the same Gaussian
    process operation, but it is included for the sake of conceptual visualization
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 高斯过程背后的思想的简化表示——在采样点上的不同拟合函数及其相关概率。在实践中，你可能在同一个高斯过程操作中不会看到多项式拟合和正弦拟合并排，但这是为了概念上的可视化
- en: Gaussian processes require a probability distribution of functions in Euclidean
    space, but it is very difficult to map neural network architectures to vectors
    in the Euclidean space. To address this problem, Auto-Keras uses the *edit distance
    neural network kernel* (Figure [5-18](#Fig18)), which quantifies the minimum number
    of edits required to morph some network *f*[*a*] into another network *f*[*b*].
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 高斯过程需要欧几里得空间中函数的概率分布，但将神经网络架构映射到欧几里得空间中的向量是非常困难的。为了解决这个问题，Auto-Keras 使用了 *编辑距离神经网络核*（图
    [5-18](#Fig18)），它量化了将某些网络 *f*[*a*] 变形成另一个网络 *f*[*b*] 所需的最小编辑次数。
- en: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig18_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig18_HTML.jpg)'
  id: totrans-235
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig18_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig18_HTML.jpg)'
- en: Figure 5-18
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-18
- en: Figure showing morphing process used in the edit distance neural network kernel.
    First, the second and third layers in *f*[*a*] are widened to contain the same
    number of neurons as the corresponding layers in *f*[*b*]. Then, another layer
    is added to *f*[*a*]. Created by Auto-Keras authors
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 展示了在编辑距离神经网络核中使用的变形过程。首先，将 *f*[*a*] 中的第二和第三层扩展，以包含与 *f*[*b*] 中相应层相同数量的神经元。然后，向
    *f*[*a*] 中添加另一个层。由 Auto-Keras 作者创建
- en: The edit distance neural network kernel allows for a quantification of similarity
    between neural network structures, which – roughly speaking – provides the necessary
    link from the discrete neural network architecture search space to the Euclidean
    space of the Gaussian process. Using the edit distance kernel and a correspondingly
    designed acquisition function, the Auto-Keras NAS algorithm is able to control
    the crucial exploit/explore dynamic – it samples network architectures with a
    low edit distance with respect to successful networks to exploit and samples network
    architectures with a high edit distance with respect to poorer performing networks
    to explore.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 编辑距离神经网络核允许对神经网络结构之间的相似性进行量化，这——粗略地说——提供了从离散的神经网络架构搜索空间到高斯过程欧几里得空间的必要联系。使用编辑距离核和相应设计的获取函数，Auto-Keras
    NAS算法能够控制关键的利用/探索动态——它采样与成功网络具有低编辑距离的网络架构以进行利用，并采样与表现较差的网络具有高编辑距离的网络架构以进行探索。
- en: Auto-Keras trains each model to completion for some number of user-specified
    epochs (i.e., it uses a direct evaluation method rather than a proxy method),
    but its Bayesian character requires a fewer number of networks to be sampled and
    trained, provided the search space is well defined. In experiments carried out
    by Auto-Keras’ authors, Auto-Keras achieves a lower classification error than
    state-of-the-art network morphism and Bayesian-based approaches to Neural Architecture
    Search in the benchmark MNIST, CIFAR-10, and Fashion datasets.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: Auto-Keras为每个模型训练指定数量的用户定义的epoch（即，它使用直接评估方法而不是代理方法），但它的贝叶斯特性需要较少的网络进行采样和训练，前提是搜索空间定义良好。在Auto-Keras作者进行的实验中，Auto-Keras在基准MNIST、CIFAR-10和Fashion数据集上实现了比最先进的网络形态和基于贝叶斯的方法更低的分类错误。
- en: The Auto-Keras API further employs the usage of parallelism between CPU and
    GPU; the GPU is used to train the generated model architectures, whereas the CPU
    is used to perform searching and updating (Figure [5-19](#Fig19)). Moreover, Auto-Keras
    utilizes a memory estimation function to enable efficient GPU usage and to prevent
    GPU memory crashes (Figure [5-20](#Fig20)).
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: Auto-Keras API进一步利用CPU和GPU之间的并行性；GPU用于训练生成的模型架构，而CPU用于执行搜索和更新（图[5-19](#Fig19)）。此外，Auto-Keras利用内存估计函数以实现高效的GPU使用并防止GPU内存崩溃（图[5-20](#Fig20)）。
- en: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig20_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig20_HTML.jpg)'
  id: totrans-241
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig20_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig20_HTML.jpg)'
- en: Figure 5-20
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-20
- en: Auto-Keras’ system design – relationship between searcher, queue, GPU, and CPU
    usage. Proposed graphs are generated in CPU, kept in the queue, and trained in
    GPU
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: Auto-Keras的系统设计 – 搜索器、队列、GPU和CPU使用之间的关系。提出的图在CPU上生成，保存在队列中，并在GPU上训练
- en: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig19_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig19_HTML.jpg)'
  id: totrans-244
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig19_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig19_HTML.jpg)'
- en: Figure 5-19
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-19
- en: Auto-Keras’ API task-level and search-level operations in hardware. Created
    by Auto-Keras authors
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: Auto-Keras API的任务级和搜索级操作在硬件上。由Auto-Keras作者创建
- en: Both in its design and implementation, Auto-Keras is a key library in making
    Neural Architecture Search algorithms more efficient and accessible.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 在其设计和实现中，Auto-Keras是使神经架构搜索算法更高效和易于访问的关键库。
- en: Simple NAS
  id: totrans-248
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 简单的NAS
- en: 'The simplest form of Neural Architecture Search is to define the inputs and
    outputs and allow the NAS algorithm to automatically determine all processing
    layers to “connect” input to output. Let’s consider building a neural network
    for an image classification task. Auto-Keras follows a very similar syntax to
    the Keras Functional API. For this particular task, we need to define three key
    elements, linked together via function notation:'
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 神经架构搜索的最简单形式是定义输入和输出，并允许NAS算法自动确定所有处理层以“连接”输入到输出。让我们考虑构建一个用于图像分类任务的神经网络。Auto-Keras遵循与Keras
    Functional API非常相似的语法。对于这个特定任务，我们需要定义三个关键元素，通过函数表示法相互连接：
- en: '*The* *input node* : In this particular case, the input is an image input,
    so we use `ak.ImageInput()`, which accepts numpy arrays and TensorFlow datasets.
    For other input data types, use `ak.StructuredDataInput()` for tabular data (accepts
    pandas DataFrames in addition to numpy arrays and TensorFlow datasets), `ak.TextInput()`
    for text data (must be a numpy array or TensorFlow dataset of strings; Auto-Keras
    performs vectorization automatically), or `ak.Input()` as a general input method
    accepting tensor data from numpy arrays or TensorFlow datasets from all contexts.
    Using this last method comes at the cost of helpful preprocessing and linkage
    that Auto-Keras performs automatically when a context-specific data input is specified.
    These are known in Auto-Keras terminology as *node* objects. There is no need
    to specify the input shape; Auto-Keras automatically infers it from the passed
    data and constructs architectures that are valid with respect to the input data
    shape.'
  id: totrans-250
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*输入节点*：在这种情况下，输入是一个图像输入，所以我们使用 `ak.ImageInput()`，它接受 numpy 数组和 TensorFlow 数据集。对于其他输入数据类型，使用
    `ak.StructuredDataInput()` 处理表格数据（除了 numpy 数组和 TensorFlow 数据集外，还接受 pandas DataFrame），使用
    `ak.TextInput()` 处理文本数据（必须是字符串的 numpy 数组或 TensorFlow 数据集；Auto-Keras 会自动进行向量化），或者使用
    `ak.Input()` 作为通用输入方法，接受来自所有上下文的 numpy 数组或 TensorFlow 数据集的张量数据。使用最后一种方法会牺牲 Auto-Keras
    在指定特定上下文数据输入时自动执行的有助于预处理和链接的功能。这些在 Auto-Keras 术语中被称为 *节点* 对象。无需指定输入形状；Auto-Keras
    会自动从传递的数据中推断它，并构建与输入数据形状有效的架构。'
- en: '*The* *processing block* : You can think of blocks in Auto-Keras as supercharged
    clumps of Keras layers – they perform similar functions as groups of layers, but
    are integrated into the Auto-Keras NAS framework such that key parameters (e.g.,
    number of layers in the block, which layers are in the block, parameters for each
    layer) can be left unspecified and are automatically tuned. For instance, the
    `ak.ConvBlock()` block consists of the standard “vanilla” series of convolutional,
    max pooling, dropout, and activation layers – the specific number, sequence, and
    types of layers can be left to the NAS algorithm. Other blocks, like `ak.ResNetBlock()`,
    generate a ResNet model; the NAS algorithm tunes factors like which version of
    the ResNet model to use and whether to enable pretrained ImageNet weights or not.
    Blocks represent the primary components of neural networks; Auto-Keras’ design
    is centered around manipulating blocks, which allows for more high-level manipulation
    of neural network structure. If you want to be even more general, you can use
    context-specific blocks like `ak.ImageBlock()`, which will automatically choose
    which image-based block to use (e.g., vanilla convolutional block, ResNet block,
    etc.).'
  id: totrans-251
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*处理块*：你可以将 Auto-Keras 中的块想象成经过强化的 Keras 层的集合——它们执行与层组相似的功能，但被集成到 Auto-Keras
    NAS 框架中，使得关键参数（例如，块中的层数量、块中的层、每层的参数）可以留空未指定，并自动调整。例如，`ak.ConvBlock()` 块由标准的“vanilla”系列卷积、最大池化、dropout
    和激活层组成——具体的层数、序列和类型可以留给 NAS 算法决定。其他块，如 `ak.ResNetBlock()`，生成 ResNet 模型；NAS 算法调整因素，例如使用
    ResNet 模型的哪个版本以及是否启用预训练的 ImageNet 权重。块代表神经网络的主要组成部分；Auto-Keras 的设计围绕操作块展开，这允许对神经网络结构进行更高级别的操作。如果你想更加通用，可以使用特定上下文的块，如
    `ak.ImageBlock()`，它将自动选择使用哪种基于图像的块（例如，vanilla 卷积块、ResNet 块等）。'
- en: '*The* *head/output block* : Whereas the input node defines what Auto-Keras
    should expect to be passed into the input of the architecture, the head block
    defines what type of prediction task the architecture should be participating
    in by determining two key factors: the activation of the output layer and the
    loss function. For instance, in a classification task, `ak.ClassificationHead()`
    is used; this block automatically infers the nature of the classification head
    (binary or multiclass classification) and correspondingly imposes limits on the
    architecture (sigmoid and binary cross-entropy for binary classification vs. softmax
    and categorical cross-entropy for multiclass classification). If it detects “raw”
    labels (i.e., labels that have not been preprocessed), Auto-Keras will automatically
    perform binary encoding, one-hot encoding, or any other encoding procedure required
    to conform the data to the inferred prediction task. It’s usually best to make
    sure Auto-Keras does not need to make any drastic changes based on its inferences
    on your intent, however, as a precaution. Similarly, use `ak.RegressionHead()`
    for regression problems.'
  id: totrans-252
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*头部/输出块*：与输入节点定义了 Auto-Keras 应期望传递到架构输入中的内容不同，头部块通过确定两个关键因素来定义架构应参与哪种预测任务：输出层的激活函数和损失函数。例如，在分类任务中，使用
    `ak.ClassificationHead()`；此块自动推断分类头部（二分类或多分类分类）的性质，并相应地对架构施加限制（二分类使用 sigmoid 和二元交叉熵，多分类使用
    softmax 和分类交叉熵）。如果检测到“原始”标签（即，未经过预处理的标签），Auto-Keras 将自动执行二进制编码、独热编码或其他任何必要的编码过程，以使数据符合推断的预测任务。然而，出于预防措施，通常最好确保
    Auto-Keras 不需要根据其对您意图的推断进行任何重大更改。同样，对于回归问题，使用 `ak.RegressionHead()`。'
- en: To build an incredibly simple and general image classification model, we can
    begin by importing Auto-Keras and defining the three key components of the neural
    network architecture in functional relation to one another (Listing [5-18](#PC18)).
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 为了构建一个极其简单且通用的图像分类模型，我们可以从导入 Auto-Keras 并定义神经网络架构的三个关键组件开始，这些组件以功能关系相互关联（见列表
    [5-18](#PC18)）。
- en: '[PRE17]'
  id: totrans-254
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Note
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: For text data, use `ak.TextBlock()`, which chooses from vanilla, transformer,
    or n-gram text-processing blocks. Auto-Keras will automatically choose a vectorizer
    based on the processing block used. For tabular/structured data, use `ak.StructuredDataBlock()`;
    Auto-Keras will automatically perform categorical encoding and normalization.
    This will need to be followed by a processing block like `ak.DenseBlock()`, which
    stacks FC layers together.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 对于文本数据，使用 `ak.TextBlock()`，它可以从纯文本、转换器或 n-gram 文本处理块中选择。Auto-Keras 将根据所使用的处理块自动选择一个向量器。对于表格/结构化数据，使用
    `ak.StructuredDataBlock()`；Auto-Keras 将自动执行分类编码和归一化。这之后需要跟随一个处理块，如 `ak.DenseBlock()`，它将堆叠全连接层。
- en: Just as in the Keras Functional API, these layers can be aggregated into a “model”
    by specifying the input and output layers (Listing [5-19](#PC19)). The `max_trials`
    parameter indicates the maximum number of different Keras models to try, although
    the search may conclude before reaching that quantity. The “model” can then be
    fitted on the data; the `epochs` parameter represents the number of epochs to
    train each candidate Keras model on.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 正如在 Keras 功能 API 中一样，可以通过指定输入和输出层将这些层聚合到一个“模型”中（见列表 [5-19](#PC19)）。`max_trials`
    参数表示要尝试的不同 Keras 模型的最大数量，尽管搜索可能在达到该数量之前就结束了。“模型”然后可以在数据上拟合；`epochs` 参数表示在每个候选
    Keras 模型上训练的轮数。
- en: '[PRE18]'
  id: totrans-258
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: During the search, Auto-Keras will not only automatically determine which type
    of image-based block to choose but also various normalization and augmentation
    methods to optimize model performance.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 在搜索过程中，Auto-Keras 不仅会自动确定选择哪种类型的图像块，还会确定各种归一化和增强方法以优化模型性能。
- en: You may also see some error messages printed when working with Auto-Keras for
    debugging purposes – as long as the code keeps on running, it’s generally safe
    to ignore the warnings.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用 Auto-Keras 进行调试时，您可能会看到一些错误信息打印出来——只要代码继续运行，通常可以忽略警告。
- en: It’s important to realize that this “model” is not really a model, but a searching
    object that acts as a template upon which various model candidates are created
    and evaluated. In order to extract the best model after training, call `best_model
    = search.export_model()`. You can then use `best_model.summary()` or `plot_model(best_model)`
    to list or visualize the architecture of the best model from the search (Figure
    [5-21](#Fig21)).
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要认识到这个“模型”实际上并不是一个模型，而是一个搜索对象，它作为一个模板，在之上创建和评估各种模型候选者。为了在训练后提取最佳模型，请调用`best_model
    = search.export_model()`。然后你可以使用`best_model.summary()`或`plot_model(best_model)`来列出或可视化搜索中最佳模型的架构（图[5-21](#Fig21)）。
- en: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig21_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig21_HTML.jpg)'
  id: totrans-262
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig21_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig21_HTML.jpg)'
- en: Figure 5-21
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-21
- en: Example sampled architecture of Auto-Keras model search
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: Auto-Keras模型搜索的示例采样架构
- en: Unfortunately, such an approach – simply defining the inputs and outputs and
    letting Neural Architecture Search figure out the rest – is unlikely to yield
    good results in a feasible amount of time. Recall that every parameter you leave
    untuned is another parameter the NAS algorithm must consider in its optimization,
    which expands the number of trials it needs.
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，这种简单定义输入和输出，让神经架构搜索（Neural Architecture Search）自行解决其余部分的方法，在可行的时间内不太可能产生好的结果。回想一下，你未调整的每一个参数都是NAS算法在优化过程中必须考虑的另一个参数，这增加了它所需的试验次数。
- en: NAS with Custom Search Space
  id: totrans-266
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: NAS with Custom Search Space
- en: We can design a more practical architecture in terms of time to reach a good
    solution and computational burden by providing certain limitations on the search
    space using strategies that we know work.
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用我们知道有效的策略对搜索空间施加某些限制，我们可以设计一个在达到良好解决方案的时间和计算负担方面更加实用的架构。
- en: Recall that using Auto-Keras means playing with higher-level blocks or components.
    We know the following image recognition pipeline to be successful (see Chapter
    [2](516104_1_En_2_Chapter.xhtml) on transfer learning and pretrained models, Figure
    [5-22](#Fig22)).
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 回想一下，使用Auto-Keras意味着玩转更高层次的块或组件。我们知道以下图像识别流程是成功的（参见关于迁移学习和预训练模型的第[2](516104_1_En_2_Chapter.xhtml)章，图[5-22](#Fig22)）。
- en: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig22_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig22_HTML.jpg)'
  id: totrans-269
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig22_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig22_HTML.jpg)'
- en: Figure 5-22
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-22
- en: General component-level design of image recognition models
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 图像识别模型的通用组件级设计
- en: 'We can build these blocks using Auto-Keras blocks:'
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用Auto-Keras块构建这些模块：
- en: '`ak.ImageInput()`, as discussed prior, is the input node.'
  id: totrans-273
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`ak.ImageInput()`，如前所述，是输入节点。'
- en: '`ak.ImageAugmentation()` is an augmentation block that performs various image
    augmentation procedures, like random flipping, zooming, and rotating. Augmentation
    parameters, like whether to randomly perform horizontal flips or the range with
    which to select a factor to zoom or rotate, are automatically tuned by Auto-Keras
    if left unspecified.'
  id: totrans-274
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`ak.ImageAugmentation()`是一个执行各种图像增强过程的增强块，如随机翻转、缩放和旋转。如果未指定，增强参数，如是否随机执行水平翻转或选择缩放或旋转因子的范围，将由Auto-Keras自动调整。'
- en: '`ak.ResNetBlock()`, as discussed prior, is a ResNet architecture with only
    two parameters – which version of ResNet to use (v1 or v2) and whether to initialize
    with ImageNet pretrained weights or not. This serves as the pretrained model component
    of our image model design.'
  id: totrans-275
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`ak.ResNetBlock()`，如前所述，是一个只有两个参数的ResNet架构——要使用哪个版本的ResNet（v1或v2）以及是否使用ImageNet预训练权重进行初始化。这作为我们图像模型设计中的预训练模型组件。'
- en: '`ak.DenseBlock()` is a block consisting of fully connected layers. If left
    unspecified, Auto-Keras tunes four parameters: the number of layers, whether or
    not to use batch normalization in between layers, the number of units in each
    layer, and the dropout rate to use (a rate of 0 indicates not to use dropout).'
  id: totrans-276
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`ak.DenseBlock()`是一个由全连接层组成的块。如果未指定，Auto-Keras调整四个参数：层的数量、是否在层之间使用批归一化、每层的单元数以及要使用的dropout率（0表示不使用dropout）。'
- en: '`ak.ClassificationHead()`, as discussed prior, is the head block specifying
    the loss function to use and the activation of the last output layer.'
  id: totrans-277
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '`ak.ClassificationHead()`，如前所述，是头部块，指定要使用的损失函数和最后一个输出层的激活函数。'
- en: Let’s define these functionally in relation to one another and specify parameters
    which we have a good idea of what we want (Listing [5-20](#PC20)). For instance,
    in augmentation, we may know that we don’t want to flip vertically or horizontally
    (e.g., in the MNIST dataset, flipping some digits will necessitate changing their
    label). We also know that we want a translation factor of 10% the image width
    – not too large nor small. However, we’re not quite sure which zoom or contrast
    factor is best; these parameters can be left as `None` and will be automatically
    tuned by Auto-Keras. Similarly, we would like the ResNet block to use pretrained
    weights – enough to further process the output of the ResNet block, but not enough
    to cause network length and overfitting problems.
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们定义这些功能之间的关系，并指定我们对其有良好了解的参数（见列表 [5-20](#PC20)）。例如，在增强中，我们可能知道我们不想垂直或水平翻转（例如，在
    MNIST 数据集中，翻转一些数字将需要更改它们的标签）。我们还知道我们想要一个翻译因子为图像宽度的 10% – 不太大也不小。然而，我们并不完全确定哪个缩放或对比度因子最好；这些参数可以留为
    `None`，并将由 Auto-Keras 自动调整。同样，我们希望 ResNet 块使用预训练的权重 – 足够进一步处理 ResNet 块的输出，但不足以导致网络长度和过拟合问题。
- en: '[PRE19]'
  id: totrans-279
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Since Auto-Keras leaves all parameters at `None` by default, we can more compactly
    represent the same specified parameters by removing all parameters we set explicitly
    to `None` (Listing [5-21](#PC21)).
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 Auto-Keras 默认将所有参数设置为 `None`，我们可以通过删除所有显式设置为 `None` 的参数来更紧凑地表示相同的指定参数（见列表
    [5-21](#PC21)）。
- en: '[PRE20]'
  id: totrans-281
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: The layers can then be aggregated into an `ak.AutoModel` (visualized in Figure
    [5-23](#Fig23)) and fitted accordingly. By specifying a custom search space, you
    dramatically increase the chance that you will arrive at a satisfactory solution
    in less chance.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，可以将这些层聚合到一个 `ak.AutoModel` 中（如图 [5-23](#Fig23) 所示）并相应地进行拟合。通过指定自定义搜索空间，您可以显著增加在更少的尝试中找到满意解决方案的机会。
- en: Note
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: For text data, use `ak.TextBlock()`, use `ak.Embedding()` for embedding (can
    use GloVe, fastText, or word2vec pretrained embeddings as pretraining), and use
    `ak.RNNBlock()` for recurrent layers. For tabular/structured data, use `ak.CategoricalToNumerical()`
    for numerical encoding of categorical features in addition to standard processing
    blocks, like `ak.DenseBlock()`.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 对于文本数据，使用 `ak.TextBlock()`，使用 `ak.Embedding()` 进行嵌入（可以使用预训练的 GloVe、fastText
    或 word2vec 嵌入作为预训练），并使用 `ak.RNNBlock()` 作为循环层。对于表格/结构化数据，除了标准处理块（如 `ak.DenseBlock()`）外，还使用
    `ak.CategoricalToNumerical()` 对分类特征进行数值编码。
- en: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig23_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig23_HTML.jpg)'
  id: totrans-285
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig23_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig23_HTML.jpg)'
- en: Figure 5-23
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-23
- en: Example sampled architecture of Auto-Keras model search
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: Auto-Keras 模型搜索的示例采样架构
- en: NAS with Nonlinear Topology
  id: totrans-288
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 基于非线性拓扑的 NAS
- en: Because Auto-Keras is built using Functional API-like syntax, we can also define
    broadly nonlinear topologies using components. For instance, rather than passing
    the input through only one pretrained model block, we could pass it through two
    pretrained models to obtain their “insights”/“perspectives” on the inputs and
    then merge and process the two together (Figure [5-24](#Fig24)).
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 因为 Auto-Keras 是使用类似 Functional API 的语法构建的，我们也可以使用组件定义广泛的非线性拓扑。例如，我们不仅可以通过一个预训练模型块传递输入，还可以通过两个预训练模型传递输入，以获得它们对输入的“见解”/“观点”，然后合并并共同处理这两个模型（见图
    [5-24](#Fig24)）。
- en: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig24_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig24_HTML.jpg)'
  id: totrans-290
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig24_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig24_HTML.jpg)'
- en: Figure 5-24
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-24
- en: Component-wise plan for implementing a nonlinear topology in Auto-Keras
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Auto-Keras 中实现非线性拓扑的分量式计划
- en: We can express this idea using Function API-like syntax, aggregating and fitting
    afterward (Listing [5-22](#PC22), Figure [5-25](#Fig25)).
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用类似 Function API 的语法来表达这个想法，并在之后进行聚合和拟合（见列表 [5-22](#PC22)，图 [5-25](#Fig25)）。
- en: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig25_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig25_HTML.jpg)'
  id: totrans-294
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig25_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig25_HTML.jpg)'
- en: Figure 5-25
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-25
- en: Example sampled architecture of Auto-Keras model search
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: Auto-Keras 模型搜索的示例采样架构
- en: '[PRE21]'
  id: totrans-297
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: Case Studies
  id: totrans-298
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 案例研究
- en: These three case studies discuss three different approaches to developing more
    successful and efficient Neural Architecture Search systems, building upon topics
    discussed both in the NAS and the Bayesian optimization sections of this chapter.
    As pillars of the rapidly developing Neural Architecture Search research frontier,
    these case studies will themselves serve as the foundations upon future work in
    the automation of more powerful neural network architectures.
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 这三个案例研究讨论了三种不同的方法来开发更成功、更高效的神经架构搜索系统，这些方法基于本章中NAS和贝叶斯优化部分讨论的主题。作为快速发展的神经架构搜索研究前沿的支柱，这些案例研究本身将成为未来在自动化更强大的神经网络架构方面工作的基础。
- en: NASNet
  id: totrans-300
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: NASNet
- en: 'The NASNet search space , proposed by Barret Zoph, Vijay Vasudevan, Jonathon
    Shlens, and Quoc V. Le,^([2](#Fn2)) is cell-based. The NAS algorithm learns two
    types of cells: normal and reduction cells. Normal cells make no change to the
    shape of the feature map (i.e., input and output feature maps have identical shapes),
    whereas reduction cells halve the width and height of the input feature map.'
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: NASNet搜索空间，由Barret Zoph、Vijay Vasudevan、Jonathon Shlens和Quoc V. Le提出，是基于细胞的。NAS算法学习两种类型的细胞：普通细胞和缩减细胞。普通细胞不会改变特征图的形状（即，输入和输出特征图具有相同的形状），而缩减细胞将输入特征图的高度和宽度减半。
- en: Cells are built as complex topological combinations of blocks, which are small,
    architecturally predefined “templates” that contain several “blank operation slots”
    that are learned by the NAS algorithm and are arranged together into a network
    cell. A cell is defined as a certain fixed number of these blocks *B*. (*B=*5
    in the authors’ experiments.) These cells can then be sequentially stacked to
    form a neural network (Figure [5-26](#Fig26)).
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 细胞被构建为复杂的拓扑组合块，这些块是小型、预先定义的“模板”，包含几个由NAS算法学习的“空白操作槽”，这些槽位一起排列成一个网络细胞。一个细胞被定义为一定数量的这些块*B*。(*B=5在作者的实验中。)然后，这些细胞可以依次堆叠形成神经网络（图[5-26](#Fig26)）。
- en: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig26_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig26_HTML.jpg)'
  id: totrans-303
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig26_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig26_HTML.jpg)'
- en: Figure 5-26
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-26
- en: The generation of architectures via a recurrent model, which outputs hidden
    states, operations, and a merging method to select in the design of a cell
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 通过循环模型生成架构，该模型输出隐藏状态、操作以及合并方法以在细胞设计中选择
- en: A recurrent neural network is used to iteratively generate these blocks by choosing
    two hidden states to combine in the operation, two operations to apply to the
    two hidden states individually, and one merging method. Operations include the
    identity operation, standard square kernel convolutions, rectangular kernel convolutions,
    dilated convolutions (the kernel is widened or “inflated” with empty spaces in
    between kernel weights), separable convolutions (convolutions that apply not only
    to spatial but also depth dimensions), pooling, and more. Two branches can be
    merged either through adding or concatenation. The network is trained via reinforcement
    learning methods to maximize the test performance of the resulting neural network
    architecture proposal (Figure [5-27](#Fig27)).
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 使用循环神经网络通过选择两个用于组合的操作中的隐藏状态、对两个隐藏状态分别应用的两个操作以及一个合并方法来迭代生成这些块。操作包括恒等操作、标准平方核卷积、矩形核卷积、膨胀卷积（核宽度变宽或“膨胀”并在核权重之间留有空隙）、可分离卷积（不仅应用于空间维度，也应用于深度维度）、池化等。两个分支可以通过加法或连接合并。该网络通过强化学习方法训练，以最大化最终神经网络架构提案的测试性能（图[5-27](#Fig27)）。
- en: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig27_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig27_HTML.jpg)'
  id: totrans-307
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig27_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig27_HTML.jpg)'
- en: Figure 5-27
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-27
- en: Relationship between the recurrent based controller and the proposed architecture
    (the child network). The controller is updated to maximize the validation performance
    of the child network. Created by NASNet authors
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 基于循环的控制器与所提出的架构（子网络）之间的关系。控制器被更新以最大化子网络的验证性能。由NASNet作者创建
- en: Moreover, because the recurrent neural network is able to select which two outputs
    of previously constructed cell outputs to perform the cell operation on, it is
    able to construct incredibly elaborate architectures in an elegant, recursive
    manner (Figures [5-28](#Fig28) and [5-29](#Fig29)).
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，由于循环神经网络能够选择先前构建的单元输出的两个输出来进行单元操作，因此它能够以优雅、递归的方式构建极其复杂的架构（图 [5-28](#Fig28)
    和 [5-29](#Fig29)）。
- en: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig29_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig29_HTML.jpg)'
  id: totrans-311
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig29_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig29_HTML.jpg)'
- en: Figure 5-29
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-29
- en: High-performing NASNet normal and reduction cell architectures on ImageNet.
    Created by NASNet authors
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 在 ImageNet 上的高性能 NASNet 常规和缩减单元架构。由 NASNet 作者创建
- en: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig28_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig28_HTML.jpg)'
  id: totrans-314
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig28_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig28_HTML.jpg)'
- en: Figure 5-28
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-28
- en: Example selection of hidden states and operations via recurrent style generation.
    Created by NASNet authors
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 通过循环风格生成选择隐藏状态和操作的示例。由 NASNet 作者创建
- en: The derived normal and reduction cells can be stacked together in different
    lengths to suit different datasets (Figure [5-30](#Fig30)). A network built for
    the CIFAR-10 dataset, for instance, with its incredibly small 32x32 resolution,
    uses fewer reduction cells than a network built for the ImageNet architecture.
    This sort of ease in transferring the results of an intensive Neural Architecture
    Search to all sorts of different contexts greatly increases its practicality.
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 派生的常规和缩减单元可以堆叠成不同长度，以适应不同的数据集（图 [5-30](#Fig30)）。例如，为 CIFAR-10 数据集构建的网络，其令人难以置信的
    32x32 分辨率，比为 ImageNet 架构构建的网络使用的缩减单元更少。这种将密集的神经架构搜索的结果转移到各种不同环境中的便利性大大增加了其实用性。
- en: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig30_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig30_HTML.jpg)'
  id: totrans-318
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig30_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig30_HTML.jpg)'
- en: Figure 5-30
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-30
- en: Stacking normal and reduction cells to suit a certain dataset image size. Created
    by NASNet authors
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 将常规和缩减单元堆叠以适应特定数据集图像大小。由 NASNet 作者创建
- en: The NASNet architecture family is constructed from the best performing normal
    and reduction cells. It manages to obtain better top 1 and top 5 accuracy in ImageNet
    classification against previous architectural giants like Inception and more recently
    proposed architectures with a fewer number of parameters (Table [5-1](#Tab1)).
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: NASNet 架构家族由最佳性能的常规和缩减单元构建。它设法在 ImageNet 分类中获得了比 Inception 等之前的架构巨头以及最近提出的参数更少的架构更好的
    top 1 和 top 5 准确率（表 [5-1](#Tab1)）。
- en: Table 5-1
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 表 5-1
- en: Performance of various sizes of NASNet (sizes determined by stacking different
    combinations and lengths of normal and reduction cells) against similarly sized
    models
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 不同尺寸的 NASNet（尺寸由常规和缩减单元的不同组合和长度堆叠确定）与类似尺寸模型的性能对比
- en: '| Model | # Parameters | Performance |'
  id: totrans-324
  prefs: []
  type: TYPE_TB
  zh: '| 模型 | # 参数 | 性能 |'
- en: '| --- | --- | --- |'
  id: totrans-325
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| Top 1 Acc. | Top 5 Acc. |'
  id: totrans-326
  prefs: []
  type: TYPE_TB
  zh: '| 排名 1 准确率 | 排名 5 准确率 |'
- en: '| --- | --- |'
  id: totrans-327
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Small-sized models– InceptionV2– *Small NASNet* | 11.2 M*10.9 M* | 74.8%*78.6%*
    | 92.2%*94.2%* |'
  id: totrans-328
  prefs: []
  type: TYPE_TB
  zh: '| 小型模型– InceptionV2– *Small NASNet* | 11.2 M*10.9 M* | 74.8%*78.6%* | 92.2%*94.2%*
    |'
- en: '| Medium-sized models– InceptionV3– Xception– Inception ResNetV2– *Medium NASNet*
    | 23.8 M22.8 M55.8 M*22.6 M* | 78.8%79.0%80.1%*80.8%* | 94.%94.5%95.1%*95.3%*
    |'
  id: totrans-329
  prefs: []
  type: TYPE_TB
  zh: '| 中型模型– InceptionV3– Xception– Inception ResNetV2– *Medium NASNet* | 23.8 M22.8
    M55.8 M*22.6 M* | 78.8%79.0%80.1%*80.8%* | 94.%94.5%95.1%*95.3%* |'
- en: '| Large-sized models– ResNeXt– PolyNet– DPN– *Large NASNet* | 83.6 M92 M79.5
    M*88.9 M* | 80.9%81.3%81.5%*82.7%* | 95.6%95.8%95.8%*96.2%* |'
  id: totrans-330
  prefs: []
  type: TYPE_TB
  zh: '| 大型模型– ResNeXt– PolyNet– DPN– *Large NASNet* | 83.6 M92 M79.5 M*88.9 M* |
    80.9%81.3%81.5%*82.7%* | 95.6%95.8%95.8%*96.2%* |'
- en: The NASNet architecture (not the search process) with ImageNet weights is available
    in Keras. It comes in two versions, NASNet Large and NASNet Mobile, which are
    scaled versions of the best performing learned cell architectures from the NASNet
    search space. The architectures are available in `keras.applications` at
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: NASNet 架构（而非搜索过程）带有 ImageNet 权重，在 Keras 中可用。它有两个版本，NASNet Large 和 NASNet Mobile，它们是
    NASNet 搜索空间中性能最佳的学习单元架构的缩放版本。这些架构在 `keras.applications` 中可用。
- en: '`keras.applications.nasnet.NASNetMobile`: 23 MB storage size with 5.3 m parameters.'
  id: totrans-332
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`keras.applications.nasnet.NASNetMobile`: 23 MB 存储大小，包含 5.3 m 个参数。'
- en: '`keras.applications.nasnet.NASNetLarge`: 343 MB storage size with 88.9 m parameters.
    (NASNet Large, as of the writing of this book, holds the highest ImageNet top
    1 and top 5 accuracy of all `keras.applications` models with such reported metrics.)'
  id: totrans-333
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`keras.applications.nasnet.NASNetLarge`：343 MB存储大小，拥有88.9 m个参数。（截至本书编写时，NASNet
    Large在所有报告了此类指标的`keras.applications`模型中，拥有最高的ImageNet top 1和top 5准确率。）'
- en: See Chapter [2](516104_1_En_2_Chapter.xhtml) on usage of pretrained models.
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 请参阅第[2](516104_1_En_2_Chapter.xhtml)章，了解预训练模型的使用。
- en: Even given NASNet’s advances in developing high-performing cell architectures,
    such results required hundreds of GPUs and 3–4 days of training in Google’s powerful
    laboratories. Other advances worked to build more computationally accessible search
    operations.
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 即使在NASNet在开发高性能细胞架构方面取得了进展，这样的结果也需要数百个GPU和3-4天在谷歌强大实验室的训练时间。其他进展旨在构建更易于计算访问的搜索操作。
- en: Progressive Neural Architecture Search
  id: totrans-336
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 渐进式神经网络架构搜索
- en: 'Chenxi Liu, along with other coauthors at Johns Hopkins University, Google
    AI, and Stanford University, proposes the *Progressive Neural Architecture Search*
    (PNAS).^([3](#Fn3)) True to its naming, PNAS adopts a progressive approach to
    the building of neural network architectures from simple to complex. Moreover,
    PNAS interestingly combines many of the earlier discussed Neural Architecture
    Search methods into one cohesive, efficient approach: a cell-based search space,
    a Sequential Model-Based Optimization search strategy, and proxy evaluation.'
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 刘晨曦，与约翰霍普金斯大学、谷歌AI和斯坦福大学的其他合著者一起，提出了**渐进式神经网络架构搜索**（PNAS）。^([3](#Fn3)) 如其命名所示，PNAS采用了一种从简单到复杂的渐进式方法来构建神经网络架构。此外，PNAS巧妙地将许多先前讨论过的神经网络架构搜索方法结合成一个统一、高效的方法：基于细胞的搜索空间、基于序列模型优化的搜索策略和代理评估。
- en: 'The search space used by Progressive Neural Architecture Search is very similar
    to that of the NASNet design, with one key difference: rather than learning two
    different cells (a normal and reduction cell), PNAS only learns one type of “normal
    cell” (Figure [5-31](#Fig31)). A “reduction cell” is formed by using a normal
    cell with a stride of 2\. This slightly reduces the size of the search space relative
    to that of NASNet.'
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 渐进式神经网络架构搜索所使用的搜索空间与NASNet设计非常相似，但有一个关键的区别：PNAS不是学习两种不同的细胞（一个普通细胞和一个缩减细胞），而是只学习一种“普通细胞”（见图[5-31](#Fig31))。通过使用步长为2的普通细胞，可以形成一个“缩减细胞”。这略微减少了相对于NASNet的搜索空间大小。
- en: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig31_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig31_HTML.jpg)'
  id: totrans-339
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig31_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig31_HTML.jpg)'
- en: Figure 5-31
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-31
- en: Progressive Neural Architecture Search cell design. Left – high-performing PNAS
    cell design. Right – examples of how PNAS cell architectures can be stacked with
    different stride lengths to adapt to datasets of different sizes. Created by PNAS
    authors
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 渐进式神经网络架构搜索的细胞设计。左 - 高性能PNAS细胞设计。右 - PNAS细胞架构如何通过不同的步长堆叠以适应不同大小的数据集。由PNAS作者创建
- en: PNAS makes use of a Sequential Model-Based Optimization search strategy, in
    which the most “promising” model proposals are selected for evaluation, in conjunction
    with a proxy evaluator.
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: PNAS使用了基于序列模型优化的搜索策略，其中选择最“有希望”的模型提案进行评估，并配合一个代理评估器。
- en: The proxy evaluator, an LSTM, is trained to read an information sequence representing
    the architecture of a proposed model and to predict the performance of the proposed
    model. A recurrent based model was chosen for its ability to handle variable length
    inputs. Note that the proxy evaluator is trained on a very small dataset (the
    label – the performance of a proposed model – is expensive to obtain), so an ensemble
    of LSTMs trained on a subset of the data is used to support generalization and
    decrease variation. An RNN-based method’s predicted performance of candidate model
    architectures can reach as high as 0.996 Spearman rank correlation with the true
    performance rank.
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 代理评估器，一个LSTM，被训练去读取表示提议模型架构的信息序列，并预测提议模型的表现。由于处理可变长度输入的能力，选择了基于循环的模型。请注意，代理评估器在一个非常小的数据集上进行了训练（标签
    - 提议模型的表现 - 获得成本高昂），因此使用在数据集子集上训练的LSTM集合来支持泛化并减少变化。基于RNN的方法预测的候选模型架构的性能可以达到与真实性能排名高达0.996的Spearman等级相关系数。
- en: Progressive Neural Architecture Search (Figure [5-32](#Fig32)) begins with the
    simplest cell architectures first, which consist of only one block. Then, each
    cell is expanded by adding another block to the cell architecture. As the number
    of blocks in the cell architecture increases, the number of candidates and the
    resources required to train grows exponentially, so these candidate models cannot
    all be trained. This is where the proxy evaluator comes in – the proxy evaluator
    evaluates hundreds of thousands of proposed architectures in negligible time,
    and the top *K* most promising architectures (highest performing according to
    the proxy evaluator) are sampled for direct evaluation. The results of these architectures
    are in turn used as additional training data to update the proxy evaluator. This
    is repeated until a satisfactory number of blocks per cell is reached.
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 渐进式神经网络架构搜索（Progressive Neural Architecture Search，图 [5-32](#Fig32)）首先从最简单的细胞架构开始，这些架构仅包含一个模块。然后，通过向细胞架构中添加另一个模块来扩展每个细胞。随着细胞架构中模块数量的增加，候选数量和训练所需的资源呈指数增长，因此这些候选模型不能全部进行训练。这就是代理评估器发挥作用的地方——代理评估器在可忽略的时间内评估数十万个提出的架构，并从中采样出最具有潜力的
    *K* 个架构（根据代理评估器的性能最高）进行直接评估。这些架构的结果反过来又用作额外的训练数据来更新代理评估器。这个过程会重复进行，直到达到每个细胞中模块数量的满意数量。
- en: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig32_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig32_HTML.jpg)'
  id: totrans-345
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig32_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig32_HTML.jpg)'
- en: Figure 5-32
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-32
- en: Visualization of the PNAS search and evaluation process. From *S*[1] to *S*′[2]
    trained cell architectures are expanded by one block. These generated cell architectures
    are evaluated via a proxy evaluator (labeled “predictor” in the visualization)
    and the top few are selected for training in *S*[2]. Created by PNAS authors.
    The performance of the generated architectures is used to update the proxy evaluator.
    The process repeats
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: PNAS 搜索和评估过程的可视化。从 *S*[1] 到 *S*′[2] 训练的细胞架构通过增加一个模块进行扩展。这些生成的细胞架构通过代理评估器（在可视化中标记为“预测器”）进行评估，并从中选择几个进行
    *S*[2] 的训练。由 PNAS 作者创建。生成的架构的性能用于更新代理评估器。这个过程会重复进行。
- en: The proxy evaluator functions as the surrogate function in Sequential Model-Based
    Optimization, used to perform sampling and updated using sampled results to be
    more accurate. Its progressive design allows for computational efficiency – if
    a smaller number of blocks per cell returns good performance, we have saved ourselves
    from needing to run through architectures with higher blocks per cell; even if
    a smaller number of blocks per cell does not yield good results, it functions
    as live training for the proxy evaluator.
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 代理评估器在基于序列模型优化的代理函数中充当代理函数，用于执行采样，并通过使用采样结果进行更新以提高准确性。其渐进式设计允许计算效率——如果每个细胞中模块数量较少就能获得良好的性能，我们就可以避免运行每个细胞中模块数量较多的架构；即使每个细胞中模块数量较少不能产生良好的结果，它也作为代理评估器的实时训练。
- en: This design allows Progressive Neural Architecture Search to yield significant
    speedups over previous NAS methods, reducing the number of models that need to
    be trained by the thousands while reaching the same accuracy. Moreover, its cell-based
    design, like NASNet, allows for transferability of the cell design across different
    datasets (Table [5-2](#Tab2)).
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 这种设计使得渐进式神经网络架构搜索（Progressive Neural Architecture Search）在速度上比之前的 NAS 方法有显著提升，在达到相同准确率的同时，减少了需要训练的模型数量数千个。此外，其基于细胞的架构设计，类似于
    NASNet，允许细胞设计在不同数据集之间进行迁移（见表 [5-2](#Tab2)）。
- en: Table 5-2
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 表 5-2
- en: Performance of PNAS against earlier work by Barret and Zoph in 2017, in which
    reinforcement learning is used to optimize a RNN to generate sequential representations
    of CNN architectures. Note that this is different from the closely related work
    by Zoph, Vasudevan, Shlens, and Le in 2018 on NASNet, which uses a cell-based
    representation. “# models trained on <method>” indicates the number of models
    the method trains to reach the listed corresponding performance. PNAS can reach
    almost a fivefold decrease in the number of models trained
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 'PNAS 与 2017 年 Barret 和 Zoph 的早期工作的性能对比，其中使用强化学习来优化 RNN 以生成 CNN 架构的顺序表示。请注意，这与
    2018 年 Zoph、Vasudevan、Shlens 和 Le 的密切相关的工作不同，后者在 NASNet 中使用基于细胞的表示。“<方法>上训练的 #
    模型”表示该方法训练的模型数量以达到所列的对应性能。PNAS 可以将训练的模型数量减少近五倍。'
