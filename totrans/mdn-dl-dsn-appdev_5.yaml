- en: Key Points
  id: totrans-383
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键点
- en: 'In this chapter, we discussed the intuition, theory, and implementation for
    general hyperparameter optimization and Neural Architecture Search and their implementations
    in Hyperopt, Hyperas, and Auto-Keras:'
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们讨论了通用超参数优化和神经架构搜索的直觉、理论和实现，以及它们在 Hyperopt、Hyperas 和 Auto-Keras 中的实现：
- en: In meta-optimization, a controller model optimizes the structural parameters
    of a controlled model to maximize the controlled model’s performance. It allows
    for a more structured search for the best “type” of model to train. Meta-optimization
    methods repeatedly select structural parameters for a proposed controlled model
    and evaluate their performance. Meta-optimization algorithms used in practice
    incorporate information about the performance of previously selected structural
    parameters to inform how the next set of parameters is selected, unlike naïve
    methods like grid or random search.
  id: totrans-385
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在元优化中，控制器模型优化受控模型的架构参数，以最大化受控模型的表现。它允许进行更有结构的搜索，以找到最佳的“类型”模型进行训练。实际中使用的元优化方法会重复选择受控模型的架构参数并评估其性能。与网格搜索或随机搜索等天真方法不同，实际中使用的元优化算法会结合先前选择的架构参数的性能信息，以指导下一组参数的选择。
- en: A key balance in meta-optimization is that of the size of the search space.
    Defining search space to be larger than it needs to significantly expands the
    computational resources and time required to obtain a good solution, whereas defining
    too narrow a search space is likely to yield results no different from user-specified
    parameters (i.e., meta-optimization is not necessary). Be as conservative in determining
    parameters to be optimized by meta-optimization (i.e., do not be overly redundant
    in your search space), but ensure that parameters allocated for meta-optimization
    are “wide” enough to yield significant results.
  id: totrans-386
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 元优化中的一个关键平衡是搜索空间的大小。将搜索空间定义得比实际需要的大，会显著增加获得良好解决方案所需的计算资源和时间，而将搜索空间定义得太窄，很可能会得到与用户指定的参数没有区别的结果（即元优化不是必要的）。在确定元优化要优化的参数时，要尽可能保守（即不要在搜索空间中过度冗余），但确保分配给元优化的参数“足够宽”，以产生显著的结果。
- en: Bayesian optimization is a meta-optimization method to address black-box problems
    in which the only information provided about the objective function is the corresponding
    output of an input (a “query”) and in which queries to the function are expensive
    to obtain. Bayesian optimization makes use of a surrogate function, which is a
    probabilistic representation of the objective function. The surrogate function
    determines how new inputs to the objective function are sampled. The results of
    these samples in turn affect how the surrogate function is updated. Over time,
    the surrogate function develops accurate representations of the objective function,
    from which the optimal set of parameters can be easily derived.
  id: totrans-387
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 贝叶斯优化是一种元优化方法，用于解决黑盒问题，其中关于目标函数的唯一信息是输入（即“查询”）的对应输出，并且查询函数的成本很高。贝叶斯优化利用代理函数，这是目标函数的概率表示。代理函数决定了如何对目标函数的新输入进行采样。这些样本的结果反过来又影响代理函数的更新。随着时间的推移，代理函数会发展出对目标函数的准确表示，从而可以轻松地推导出最优参数集。
- en: Sequential Model-Based Optimization (SMBO) is a formalization of Bayesian optimization
    and acts as a central component or template against which various model optimization
    strategies can be formulated and compared.
  id: totrans-388
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于模型的序列优化（SMBO）是贝叶斯优化的形式化，它作为一个核心组件或模板，各种模型优化策略都可以据此制定和比较。
- en: The Tree-structured Parzen Estimator (TPE) strategy is used by Hyperopt and
    represents the surrogate function via Bayes’ rule and a two-distribution threshold-based
    design. TPE samples from locations with lower objective function outputs.
  id: totrans-389
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 树结构帕泽恩估计器（TPE）策略被Hyperopt使用，它通过贝叶斯规则和基于双分布阈值的方案来表示代理函数。TPE从目标函数输出较低的位置进行采样。
- en: 'Hyperopt usage consists of three key components: the objective function, the
    search space, and the search operation. In the context of meta-optimization, the
    model is built inside the objective function with the sampled parameters. The
    search space is defined via a dictionary containing `hyperopt.hp` distributions
    (normal, log-normal, quantized normal, choice, etc.). Hyperopt can be used to
    optimize the training procedure, as well as to make fine-tuned optimizations to
    the model architecture. Hyperas is a Hyperopt wrapper that makes using Hyperopt
    to optimize various components of neural network design more convenient by removing
    the need to define a separate search space and independent labels for each parameter.'
  id: totrans-390
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: Hyperopt 的使用包括三个关键组件：目标函数、搜索空间和搜索操作。在元优化的背景下，模型是在目标函数内部通过采样参数构建的。搜索空间通过包含 `hyperopt.hp`
    分布（正态分布、对数正态分布、量化正态分布、选择等）的字典来定义。Hyperopt 可以用于优化训练过程，以及对模型架构进行精细调整的优化。Hyperas
    是一个 Hyperopt 包装器，通过消除为每个参数定义单独搜索空间和独立标签的需求，使得使用 Hyperopt 优化神经网络设计的各个组件变得更加方便。
- en: 'Neural Architecture Search (NAS) is the process of automating the engineering
    of neural network architectures. NAS consists of three key components: the search
    space, the search strategy, and the evaluation strategy. The search space of a
    neural network can be represented most simply as a sequential sequence of operations,
    but it’s not as efficient as a cell-based design. Search strategies include reinforcement
    learning methods (a controller model is trained to find the optimal policy – the
    parameters of the controlled model) and evolutionary designs. Methods like DARTS
    map the discrete search space of the neural network into a continuous, differentiable
    one. Evaluation of sampled parameters can take the form of direct evaluation or
    via proxy evaluation, in which the performance of the parameters is estimated
    with fewer resources at the cost of precision.'
  id: totrans-391
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 神经架构搜索（NAS）是自动化神经网络架构工程的过程。NAS 包含三个关键组件：搜索空间、搜索策略和评估策略。神经网络的搜索空间可以最简单地表示为一系列操作的顺序序列，但这并不如基于单元的设计高效。搜索策略包括强化学习方法（训练一个控制器模型以找到最优策略——受控模型的参数）和进化设计。像
    DARTS 这样的方法将神经网络的离散搜索空间映射到一个连续且可微分的空间。对采样参数的评估可以采取直接评估或代理评估的形式，其中通过牺牲精度，以更少的资源估计参数的性能。
- en: The Auto-Keras system uses Sequential Model-Based Optimization, with a Gaussian
    process-based surrogate model design and the edit distance neural network kernel
    to quantify similarity between network structures. Moreover, Auto-Keras is built
    with GPU-CPU parallelism for optimal efficiency. In terms of user usage, Auto-Keras
    employs the progressive disclosure of complexity principle, allowing users to
    build both incredibly simple and more complex architectures with few lines of
    code. Moreover, because it follows Functional API-like syntax, users can build
    searchable architectures with nonlinear topologies.
  id: totrans-392
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: Auto-Keras 系统使用基于序列模型的优化，结合基于高斯过程代理模型设计和编辑距离神经网络核来量化网络结构之间的相似性。此外，Auto-Keras
    通过 GPU-CPU 并行构建，以实现最佳效率。在用户使用方面，Auto-Keras 采用渐进式复杂性披露原则，使用少量代码即可构建极其简单和更复杂的架构。此外，因为它遵循类似
    Functional API 的语法，用户可以构建具有非线性拓扑的可搜索架构。
- en: In the next chapter, we will discuss patterns and concepts in the design of
    successful neural network architectures.
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将讨论成功神经网络架构设计中的模式和概念。
