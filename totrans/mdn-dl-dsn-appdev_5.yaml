- en: Efficient Neural Architecture Search
  id: totrans-357
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 高效神经架构搜索
- en: While proxy evaluation in Progressive Neural Architecture Search allows for
    quick prediction on the potential of a proposed model architecture and thus decreases
    the number of models that needs to be trained for good performance, the computational
    and time bottleneck in the process still remains in the training stage. Hieu Pham
    and Melody Y. Guan, along with Barret Zoph, Quoc V. Le, and Jeff Dean, put forth
    the *Efficient Neural Architecture Search* (ENAS) ^([4](#Fn4)) method, which attempts
    to decrease the time needed to obtain accurate measurements on the performance
    of a candidate model by forcing *weight sharing* across all candidate architectures
    during training.
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然渐进式神经架构搜索中的代理评估允许快速预测所提出模型架构的潜力，从而减少了需要训练以获得良好性能的模型数量，但过程中的计算和时间瓶颈仍然存在于训练阶段。Hieu
    Pham 和 Melody Y. Guan，以及 Barret Zoph、Quoc V. Le 和 Jeff Dean 提出了 *高效神经架构搜索*（ENAS）^([4](#Fn4)）方法，该方法试图通过在训练期间强制所有候选架构之间进行
    *权重共享* 来减少获得候选模型性能准确度所需的时间。
- en: 'ENAS uses a similar reinforcement learning and recurrent based architecture
    generation model as the NASNet creators use, with one key difference: rather than
    predefining the “template” or “slots” of the cell and training the architecture
    generation model to identify which operations to “fill in” the “slots” with, in
    ENAS the controller model not only identifies which operations to choose but also
    how operations are connected.'
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: ENAS 使用与 NASNet 创作者使用的类似的基于强化学习和循环的架构生成模型，但有一个关键区别：ENAS 中控制器模型不仅识别要选择的操作，还识别操作如何连接，而不是预先定义单元的“模板”或“槽位”，并训练架构生成模型来识别哪些操作要“填充”到“槽位”中。
- en: Candidate network architectures can be represented as directed acyclic graphs
    (DAGs) or a graph with directions but no cycles (i.e., you cannot end up in a
    loop by following directed connections between nodes). A DAG with *N* nodes is
    initialized (Figure [5-33](#Fig33), *N*=4) in which each node is connected to
    every other node. This “fully connected” DAG represents the search space for that
    block, and architectures can be sampled by selecting *sub-graphs* within the full
    DAG. Nodes that are included in the sampled sub-graphs are attached to an operation,
    and all the “dead ends” of the graph are averaged and considered outputs of the
    cell.
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 候选网络架构可以用有向无环图（DAG）或具有方向但没有环的图（即，通过跟随节点之间的有向连接，你不会陷入循环）来表示。一个具有 *N* 个节点的 DAG（图
    [5-33](#Fig33)，*N*=4）被初始化，其中每个节点都连接到其他所有节点。这个“完全连接”的 DAG 代表了该块的搜索空间，架构可以通过在完整的
    DAG 内选择 *子图* 来采样。包含在采样子图中的节点连接到操作，并且所有图的“死胡同”都被平均并被认为是单元的输出。
- en: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig33_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig33_HTML.jpg)'
  id: totrans-361
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig33_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig33_HTML.jpg)'
- en: Figure 5-33
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-33
- en: 'Left: “Fully connected” DAG with selected sub-graph shown in red. Right: example
    selected architecture based on sampled sub-graph'
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 左：红色显示的“完全连接”DAG及其选定的子图。右：基于采样子图的示例架构
- en: These architectures are generated by an LSTM trained using reinforcement learning
    methods to maximize the validation performance of generated architectures (Figure
    [5-34](#Fig34)). The LSTM selects sub-graphs by outputting the index of the node
    that the node being generated currently will be attached to. This sort of generation
    procedure can be applied both to generate cells that will be stacked into full
    architectures and to produce an entire architecture single handedly.
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 这些架构是通过使用强化学习方法训练的 LSTM 生成的，以最大化生成架构的验证性能（图 [5-34](#Fig34)）。LSTM 通过输出当前生成节点将要连接到的节点的索引来选择子图。这种生成过程可以应用于生成将被堆叠到完整架构中的单元，也可以单独生成整个架构。
- en: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig34_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig34_HTML.jpg)'
  id: totrans-365
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_5_Chapter/516104_1_En_5_Fig34_HTML.jpg](../images/516104_1_En_5_Chapter/516104_1_En_5_Fig34_HTML.jpg)'
- en: Figure 5-34
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-34
- en: Recurrent model selection of sub-graphs from the “fully connected” DAG for the
    example model shown in Figure [5-30](#Fig30)
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 对图 [5-30](#Fig30) 中所示示例模型的“完全连接”DAG中的子图进行循环模型选择
- en: The conceptual understanding of all sampled architectures as sub-graphs of the
    “super-graph,” “fully connected” DAG is crucial as the underlying basis of ENAS’
    usage of weight sharing. The “fully connected” DAG represents a series of knowledge-based
    relationships between nodes; for maximum efficiency, the knowledge stored in the
    “fully connected” DAG’s connections should be transferred to selected sub-graphs.
    Thus, all proposed sub-graphs that contain the same connection will share the
    same value for that connection. Gradient updates performed on one proposed architecture’s
    connections are also performed identically on other proposed architectures with
    the same corresponding connections.
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: 所有采样架构作为“超级图”、“全连接”DAG 的子图的概念理解至关重要，这是 ENAS 使用权重共享的基础。这个“全连接”DAG 代表节点之间的一系列基于知识的关系；为了最大效率，存储在“全连接”DAG
    连接中的知识应转移到选定的子图中。因此，所有包含相同连接的提出的子图将共享该连接的相同值。对一个提出的架构的连接进行的梯度更新也将在具有相同对应连接的其他提出的架构上以相同的方式进行。
- en: By sharing weights, proposed models can “learn from one another” by updating
    weights they have in common via the insights derived by another model architecture.
    Moreover, it serves as a rough approximation as to how models with similar architectures
    would have developed regardless under the same conditions.
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 通过共享权重，提出的模型可以通过更新它们共有的权重来“相互学习”，这些权重是通过另一个模型架构的见解得出的。此外，它还提供了一个粗略的近似，即具有相似架构的模型在相同条件下会如何发展。
- en: This aggressive weight sharing “approximation” allows for massive quantities
    of proposed model architectures to be trained with much smaller computation and
    time consumption. Once the child models are trained, they are evaluated on a small
    batch of validation data and the most promising child model is trained from scratch.
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 这种激进的权重共享“近似”允许大量提出的模型架构在较小的计算和时间消耗下进行训练。一旦子模型被训练，它们将在一小批验证数据上评估，并且从零开始训练最有希望的子模型。
- en: With additional regularization, Efficient Neural Architecture Search allows
    for a tremendous speedup from several days to a fraction of a day with very few
    GPUs (Table [5-3](#Tab3)). ENAS is a huge step toward making Neural Architecture
    Search a reality outside of high-computation laboratories.
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 通过额外的正则化，高效的神经架构搜索可以从几天加速到一天的小部分，使用非常少的 GPU（见表 [5-3](#Tab3)）。ENAS 是将神经架构搜索变为现实，走出高计算实验室的一大步。
- en: Table 5-3
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 表 5-3
- en: Performance of ENAS against the results of other Neural Architecture Search
    methods. CutOut is an image augmentation method for regularization in which square
    regions of the input are randomly masked during training. CutOut is applied to
    NASNet and ENAS to increase performance of final architecture
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: ENAS 与其他神经架构搜索方法结果的性能对比。CutOut 是一种用于正则化的图像增强方法，在训练过程中随机遮蔽输入的方形区域。CutOut 应用于
    NASNet 和 ENAS 以提高最终架构的性能
