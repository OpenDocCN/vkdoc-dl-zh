- en: Leverage Pretrained Embeddings
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Amazingly, we can reuse modules from pretrained models on the IMDb dataset.
    The *TensorFlow Hub project* is a library with hundreds of reusable machine learning
    modules. A **module** is a self-contained piece of a TensorFlow graph, along with
    its weights and assets, that can be reused across different tasks in a process
    known as transfer learning. **Transfer learning** is a machine learning method
    where a model developed for a task is reused as the starting point for a model
    on a different task.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can browse the library by perusing the following URL:'
  prefs: []
  type: TYPE_NORMAL
- en: '[`http://tfhub.dev`](http://tfhub.dev)'
  prefs: []
  type: TYPE_NORMAL
- en: Once you locate a module, copy the URL into your model. The module is automatically
    downloaded along with its pretrained weights. A huge advantage of using pretrained
    models is that we don’t have to create and train our own models from scratch!
  prefs: []
  type: TYPE_NORMAL
