- en: 9. Sentiment Analysis
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: We’ve already demonstrated how to train a character-level RNN to create original
    text. Now, we create a *word-level* RNN to analyze sentiment.
  prefs: []
  type: TYPE_NORMAL
- en: '**Sentiment analysis** is the interpretation and classification of polarity,
    emotions, and intentions within text data using NLP text analysis tools. Polarity
    can be positive, negative, or neutral. Emotions can vary across a wide range of
    feelings such as anger, happiness, frustration, and sadness, to name a few. Intentions
    can also vary across a wide range of motives such as interested or not interested.
    A common application of sentiment analysis is to identify customer sentiment toward
    products, brands, or services through online feedback. General application includes
    social media monitoring, brand monitoring, customer service, customer feedback,
    and market research.'
  prefs: []
  type: TYPE_NORMAL
- en: 'For an excellent discussion of sentiment analysis, consult the following URL:'
  prefs: []
  type: TYPE_NORMAL
- en: '[`https://monkeylearn.com/sentiment-analysis/#:~:text=Sentiment%20analysis%20is%20the%20interpretation,or%20services%20in%20online%20feedback`](https://monkeylearn.com/sentiment-analysis/%2523:%253F:text%253DSentiment%2520analysis%2520is%2520the%2520interpretation,or%2520services%2520in%2520online%2520feedback)'
  prefs: []
  type: TYPE_NORMAL
- en: Sentiment analysis is a very common NLP task. Technically, it computationally
    identifies and categorizes opinions expressed in a text corpus to determine attitude
    or sentiment. Typically, sentiment analysis is used to determine a positive, negative,
    or neutral opinion toward a particular topic or product.
  prefs: []
  type: TYPE_NORMAL
- en: 'Notebooks for chapters are located at the following URL: [`https://github.com/paperd/tensorflow`](https://github.com/paperd/tensorflow).'
  prefs: []
  type: TYPE_NORMAL
- en: IMDb Dataset
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A popular dataset used to practice NLP is the IMDb reviews dataset. **IMDb**
    is a benchmark dataset for binary sentiment classification. The dataset contains
    50,000 movie reviews labeled as either positive (1) or negative (0). Reviews are
    preprocessed with each encoded as a sequence of word indexes in the form of integers.
    Words within the reviews are indexed by their overall frequency within the dataset.
    The 50,000 reviews are split into 25,000 for training and 25,000 for testing.
    So we can predict the number of positive and negative reviews using either classification
    or other deep learning algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: IMDb is popular because it is simple to use, relatively easy to process, and
    challenging enough for machine learning aficionados. We enjoy working with IMDb
    because it’s just plain fun to work with movie data.
  prefs: []
  type: TYPE_NORMAL
