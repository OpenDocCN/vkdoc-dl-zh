- en: '[PRE50]'
  prefs: []
  type: TYPE_PRE
- en: Instead of finding misclassifications, the code finds correct predictions. The
    code begins by comparing an actual label to a predicted one. If the actual label
    is predicted correctly, a Boolean *True* is appended to a list. Once the first
    batch is traversed, the number of elements in the list is counted. This count
    is divided by batch size of 32 to determine accuracy, which is displayed as a
    percentage.
  prefs: []
  type: TYPE_NORMAL
- en: Explore IMDb with Keras
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Since Keras is very popular in industry, we demonstrate how to train IMDb with
    keras.datasets. We use the *keras.datasets.imdb.load_data* function to load the
    dataset in a format-ready fashion for use in neural network and deep learning
    models.
  prefs: []
  type: TYPE_NORMAL
- en: Loading the Keras IMDb has some advantages. First, words have already been encoded
    with integers. Second, encoded words are arranged by their absolute popularity
    in the dataset. So sentences in each review are comprised of a sequence of integers.
    Third, calling *imdb.load_data* the first time downloads IMDb to your computer
    and stores it in your home directory under *~/.keras/datasets/imdb.pkl* as a 32-megabyte
    file. The imdb.load_data function also provides additional arguments including
    number of top words to load (where words with a lower integer are marked as zero
    in the returned data), number of top words to skip (to avoid words like *the*),
    and the maximum length of reviews to support.
  prefs: []
  type: TYPE_NORMAL
- en: 'Load the Keras IMDb:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE51]'
  prefs: []
  type: TYPE_PRE
- en: The function loads data into train and test tuples. So *train[0]* contains training
    reviews and *train[1]* contains training labels. And *test[0]* contains test reviews
    and *test[1]* contains test labels. Each review is represented as a numpy array
    of integers with each integer representing a word. The labels contain lists of
    integer labels (0 is a negative review and 1 is positive).
  prefs: []
  type: TYPE_NORMAL
