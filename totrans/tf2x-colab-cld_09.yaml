- en: The function uses the *tf.keras.datasets.imdb.get_word_index* utility to obtain
    a dictionary of words and their uniquely assigned integers. The function then
    creates another dictionary containing key-value groupings as value and key groupings
    from the first dictionary. Finally, it returns the words based on their IDs (or
    keys). The indices are offset by 3 because 0, 1, and 2 are reserved indices for
    *padding*, *start of sequence*, and *unknown*.
