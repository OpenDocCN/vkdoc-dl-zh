- en: Create the Model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Plant seeds, import libraries, clear previous models, and create the model as
    shown in Listing [9-4](#PC21).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: The first layer is an embedding layer. The *embedding* layer is used to create
    word vectors for incoming words. During training, representations of word categories
    (or word vectors) are learned in a way where similar categories are closer to
    one another. So word vectors can store relationships between words like *good*
    and *great*. Word vectors are dense because our model learns word relationships.
    As a result, word vectors aren’t padded with a huge number of zeros like what
    we do with one-hot encodings.
  prefs: []
  type: TYPE_NORMAL
- en: The embedding layer accepts vocabulary size, embedding size, and input shape.
    We set *mask_zero=True* to inform the model to ignore padding tokens by all downstream
    layers. Ignoring padding tokens improves performance.
  prefs: []
  type: TYPE_NORMAL
- en: The next two layers are GRU layers, and the final layer is a single-neuron dense
    output layer. The output layer uses sigmoid activation to output the estimated
    probability that the review expresses a positive or negative sentiment regarding
    the movie.
  prefs: []
  type: TYPE_NORMAL
- en: Model Summary
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Inspect the model:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: The first layer is an embedding. So calculate the number of learnable parameters
    by multiplying vocabulary size of 8185 by embedding dimension (embed_size) of
    128 for a total of 1,047,680.
  prefs: []
  type: TYPE_NORMAL
- en: The second layer is a GRU. The number of learnable parameters is thereby based
    on the formula *3* `×` *(n*^(*2*) `×` *mn + 2n)* where *m* is the input dimension
    and *n* is the output dimension. Multiply by *3* because there are three sets
    of operations for a GRU that requires weight matrices of these sizes. Multiply
    *n* by *2* because of the feedback loops of a RNN. So we get 99,072 learnable
    parameters.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s how we break down the result:'
  prefs: []
  type: TYPE_NORMAL
- en: '* 3 `×` (128² + 128 `×` 128 + 2 `×` 128)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* 3 `×` (16384 + 16384 + 256)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* 3 `×` 33024'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* 99,072'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As we can see, calculating learnable parameters for the second layer is pretty
    complex. So let’s break it down logically. A GRU layer is a feedforward layer
    with feedback loops. Learnable parameters for a feedforward network are calculated
    by multiplying output from the previous layer (128 neurons) with neurons at the
    current layer (128 neurons). With a feedforward network, we also have to account
    for the 128 neurons at this layer. But we multiply the 128 neurons at this layer
    by 2 because of the feedback mechanism of a RNN. Finally, the current layer’s
    128 neurons are fed back resulting in 128² learnable parameters. A GRU uses three
    sets of operations (hidden state, reset gate, and update gate) requiring weight
    matrices, so we multiply the learnable parameters by 3.
  prefs: []
  type: TYPE_NORMAL
- en: The third layer is a GRU. We get 99,072 learnable parameters because *n* and
    *m* are exactly the same as the second layer. So the calculations are the same.
  prefs: []
  type: TYPE_NORMAL
- en: The final layer is dense. So calculate the number of learnable parameters by
    multiplying output dimension of 1 by input dimension of 128 and adding 1 to account
    for the number of neurons at this layer for a total of 129.
  prefs: []
  type: TYPE_NORMAL
