- en: We use the *imdb_reviews/subwords8k* TFDS so we train the model on a smaller
    vocabulary. The *subwords8k* subset has a vocabulary size of 8,000, which means
    that we are training the model on the 8,000 most commonly used words in the reviews.
    It also means that we don’t have to build our own vocabulary dictionary! We can
    get good performance with this subset and substantially reduce training time.
    Loading the TFDS also gives us access to the *tfds.features.text.SubwordTextEncoder*,
    which is the TFDS text encoder.
  prefs: []
  type: TYPE_NORMAL
- en: We set *with_info=True* to enable access to information about the dataset and
    the encoder. We set *as_supervised=True* so that the returned TFDS has a two-tuple
    structure (input, label) in accordance with *builder.info.supervised_keys*. If
    set to *False* (the default), the returned TFDS will have a dictionary with all
    features included. We set *shuffle_files=True* because shuffling typically improves
    performance.
  prefs: []
  type: TYPE_NORMAL
