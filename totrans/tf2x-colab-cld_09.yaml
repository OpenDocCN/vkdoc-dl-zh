- en: 9. Sentiment Analysis
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 9. 情感分析
- en: We’ve already demonstrated how to train a character-level RNN to create original
    text. Now, we create a *word-level* RNN to analyze sentiment.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经展示了如何训练一个字符级 RNN 来创建原始文本。现在，我们创建一个 *词级* RNN 来分析情感。
- en: '**Sentiment analysis** is the interpretation and classification of polarity,
    emotions, and intentions within text data using NLP text analysis tools. Polarity
    can be positive, negative, or neutral. Emotions can vary across a wide range of
    feelings such as anger, happiness, frustration, and sadness, to name a few. Intentions
    can also vary across a wide range of motives such as interested or not interested.
    A common application of sentiment analysis is to identify customer sentiment toward
    products, brands, or services through online feedback. General application includes
    social media monitoring, brand monitoring, customer service, customer feedback,
    and market research.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '**情感分析**是使用自然语言处理文本分析工具对文本数据中的极性、情感和意图进行解释和分类。极性可以是积极的、消极的或中性的。情感可以跨越广泛的感受，如愤怒、快乐、挫败感和悲伤等。意图也可以跨越广泛的动机，如感兴趣或不感兴趣。情感分析的一个常见应用是通过在线反馈识别客户对产品、品牌或服务的情感。一般应用包括社交媒体监控、品牌监控、客户服务、客户反馈和市场研究。'
- en: 'For an excellent discussion of sentiment analysis, consult the following URL:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 要了解情感分析的精彩讨论，请参阅以下 URL：
- en: '[`https://monkeylearn.com/sentiment-analysis/#:~:text=Sentiment%20analysis%20is%20the%20interpretation,or%20services%20in%20online%20feedback`](https://monkeylearn.com/sentiment-analysis/%2523:%253F:text%253DSentiment%2520analysis%2520is%2520the%2520interpretation,or%2520services%2520in%2520online%2520feedback)'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '[情感分析](https://monkeylearn.com/sentiment-analysis/%2523:%253F:text%253DSentiment%2520analysis%2520is%2520the%2520interpretation,or%2520services%2520in%2520online%2520feedback)'
- en: Sentiment analysis is a very common NLP task. Technically, it computationally
    identifies and categorizes opinions expressed in a text corpus to determine attitude
    or sentiment. Typically, sentiment analysis is used to determine a positive, negative,
    or neutral opinion toward a particular topic or product.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 情感分析是一个非常常见的自然语言处理任务。技术上，它通过计算识别和分类文本语料库中表达的意见来确定态度或情感。通常，情感分析用于确定对特定主题或产品的正面、负面或中性意见。
- en: 'Notebooks for chapters are located at the following URL: [`https://github.com/paperd/tensorflow`](https://github.com/paperd/tensorflow).'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 各章节的笔记本位于以下 URL：[GitHub 上的 tensorflow](https://github.com/paperd/tensorflow)。
- en: IMDb Dataset
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: IMDb 数据集
- en: A popular dataset used to practice NLP is the IMDb reviews dataset. **IMDb**
    is a benchmark dataset for binary sentiment classification. The dataset contains
    50,000 movie reviews labeled as either positive (1) or negative (0). Reviews are
    preprocessed with each encoded as a sequence of word indexes in the form of integers.
    Words within the reviews are indexed by their overall frequency within the dataset.
    The 50,000 reviews are split into 25,000 for training and 25,000 for testing.
    So we can predict the number of positive and negative reviews using either classification
    or other deep learning algorithms.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 用于练习自然语言处理的流行数据集是 IMDb 评论数据集。**IMDb** 是二元情感分类的基准数据集。该数据集包含 50,000 条标记为正面（1）或负面（0）的电影评论。评论经过预处理，每个评论都被编码为整数形式的单词索引序列。评论中的单词通过其在数据集中的整体频率进行索引。50,000
    条评论分为 25,000 条用于训练和 25,000 条用于测试。因此，我们可以使用分类或其他深度学习算法来预测正面和负面评论的数量。
- en: IMDb is popular because it is simple to use, relatively easy to process, and
    challenging enough for machine learning aficionados. We enjoy working with IMDb
    because it’s just plain fun to work with movie data.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: IMDb 流行是因为它易于使用，相对容易处理，并且对机器学习爱好者来说挑战性足够。我们喜欢与 IMDb 合作，因为它与电影数据一起工作非常有趣。
- en: 'Enable the GPU (if not already enabled):'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 启用 GPU（如果尚未启用）：
- en: Click *Runtime* in the top-left menu.
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在右上角菜单中点击 *运行时*。
- en: Click *Change runtime type* from the drop-down menu.
  id: totrans-12
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从下拉菜单中选择 *更改运行时类型*。
- en: Choose *GPU* from the *Hardware accelerator* drop-down menu.
  id: totrans-13
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从 *硬件加速器* 下拉菜单中选择 *GPU*。
- en: Click *SAVE*.
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 *保存*。
- en: 'Test if GPU is active:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 测试 GPU 是否激活：
- en: '[PRE0]'
  id: totrans-16
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Import the *tensorflow* library. If ‘/device:GPU:0’ is displayed, the GPU is
    active. If ‘..’ is displayed, the regular CPU is active.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 导入 *tensorflow* 库。如果显示 ‘/device:GPU:0’，则 GPU 已激活。如果显示 ‘..’，则常规 CPU 已激活。
- en: Load IMDb as a TFDS
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将 IMDb 作为 TFDS 加载
- en: 'The recommended way to load IMDb is as a TFDS:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 加载 IMDb 的推荐方式是作为 TFDS：
- en: '[PRE1]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: We use the *imdb_reviews/subwords8k* TFDS so we train the model on a smaller
    vocabulary. The *subwords8k* subset has a vocabulary size of 8,000, which means
    that we are training the model on the 8,000 most commonly used words in the reviews.
    It also means that we don’t have to build our own vocabulary dictionary! We can
    get good performance with this subset and substantially reduce training time.
    Loading the TFDS also gives us access to the *tfds.features.text.SubwordTextEncoder*,
    which is the TFDS text encoder.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用 *imdb_reviews/subwords8k* TFDS，因此我们在较小的词汇量上训练模型。*subwords8k* 子集的词汇量为 8,000，这意味着我们在
    8,000 个在评论中最常用的单词上训练模型。这也意味着我们不需要构建自己的词汇字典！我们可以使用这个子集并获得良好的性能，并且显著减少训练时间。加载 TFDS
    还为我们提供了访问 *tfds.features.text.SubwordTextEncoder* 的权限，这是 TFDS 文本编码器。
- en: We set *with_info=True* to enable access to information about the dataset and
    the encoder. We set *as_supervised=True* so that the returned TFDS has a two-tuple
    structure (input, label) in accordance with *builder.info.supervised_keys*. If
    set to *False* (the default), the returned TFDS will have a dictionary with all
    features included. We set *shuffle_files=True* because shuffling typically improves
    performance.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将 *with_info=True* 设置为启用对数据集和编码器的信息访问。我们将 *as_supervised=True* 设置为使返回的 TFDS
    具有两个元组结构（输入，标签），这与 *builder.info.supervised_keys* 一致。如果设置为 *False*（默认值），则返回的 TFDS
    将包含所有特征的字典。我们将 *shuffle_files=True* 设置为因为通常可以提高性能。
- en: Display the Keys
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 显示键
- en: 'By loading the dataset as a TFDS, we have access to its keys:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将数据集作为 TFDS 加载，我们可以访问其键：
- en: '[PRE2]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: We see that the dataset is split into test, train, and unsupervised samples.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到数据集被分为测试、训练和无监督样本。
- en: Split into Train and Test Sets
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 将数据集分为训练集和测试集
- en: 'Since we are building a supervised model, we only have interest in the train
    and test samples:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们正在构建一个监督模型，我们只对训练和测试样本感兴趣：
- en: '[PRE3]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Display the First Sample
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 显示第一个样本
- en: 'It’s always a good idea to explore a sample from the dataset:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 探索数据集的一个样本总是一个好主意：
- en: '[PRE4]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: The first training example contains an encoded review and a label. The review
    is already encoded as a tensor of integers with datatype *int64*. The label is
    a scalar value of either 0 (negative) or 1 (positive) with datatype *int64*.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个训练示例包含一个编码的评论和一个标签。评论已经编码为一个整数张量，数据类型为 *int64*。标签是一个标量值，可以是 0（负面）或 1（正面），数据类型为
    *int64*。
- en: The shape of the review tensor indicates the number of words it contains. For
    readability, we convert the target tensor to values with the *numpy* method.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 审查张量的形状表示了它包含的单词数量。为了提高可读性，我们使用 *numpy* 方法将目标张量转换为数值。
- en: Display Information About the TFDS
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 显示 TFDS 的信息
- en: 'The *info* object gives us access to metadata:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '*info* 对象为我们提供了访问元数据的方式：'
- en: '[PRE5]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Peruse Metadata
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 浏览元数据
- en: 'See the number of examples in train and test splits:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 查看训练和测试分割中的示例数量：
- en: '[PRE6]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'See supervised keys:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 查看监督键：
- en: '[PRE7]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'See feature information:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 查看特征信息：
- en: '[PRE8]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'See the TFDS name and a slice of its description:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 查看TFDS的名称及其描述的一部分：
- en: '[PRE9]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'We can even slice the citation string to get the title:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 我们甚至可以截取引用字符串以获取标题：
- en: '[PRE10]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Create the Encoder
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建编码器
- en: An encoder is built into the TFDS *SubwordTextEncoder*. With the encoder, we
    can easily decode (integer to text) and encode (text to integer). We access the
    encoder from the dataset’s *info* object.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 编码器内置在 TFDS 的 *SubwordTextEncoder* 中。有了编码器，我们可以轻松地进行解码（整数到文本）和编码（文本到整数）。我们从数据集的
    *info* 对象访问编码器。
- en: 'Create an encoder based on the IMDb dataset we loaded into memory:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 根据我们加载到内存中的 IMDb 数据集创建一个编码器：
- en: '[PRE11]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Now that the encoder is built, we can use it to vectorize strings and decode
    vectorized strings back into text strings.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 现在编码器已经构建完成，我们可以用它来将字符串向量化，并将向量化字符串解码回文本字符串。
- en: 'Test the encoder:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 测试编码器：
- en: '[PRE12]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Use the Encoder on Samples
  id: totrans-56
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在样本上使用编码器
- en: 'Create a function that returns the label rating in readable form:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个返回可读形式标签评分的函数：
- en: '[PRE13]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Display the first review as shown in Listing [9-1](#PC15).
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 显示如列表 [9-1](#PC15) 所示的第一个评论。
- en: '[PRE14]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Display multiple reviews as shown in Listing [9-2](#PC16).
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 显示如列表 [9-2](#PC16) 所示的多个评论。
- en: '[PRE15]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: We skip the first review because we’ve already seen it.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 我们跳过了第一条评论，因为我们已经看过它了。
- en: 'Display vocabulary size:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 显示词汇量大小：
- en: '[PRE16]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Finish the Input Pipeline
  id: totrans-66
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 完成输入管道
- en: Create batches of the encoded strings (or reviews) to greatly enhance performance.
    Since machine learning algorithms expect batches of the same size, use the *padded_batch*
    method to zero-pad the sequences so that each review is the same length as the
    longest string in the batch.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 创建编码字符串（或评论）的批次，以极大地提高性能。由于机器学习算法期望相同大小的批次，请使用`*padded_batch*`方法对序列进行零填充，以便每个评论的长度与批次中最长字符串的长度相同。
- en: 'Initialize variables:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 初始化变量：
- en: '[PRE17]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Shuffle (where appropriate), batch, cache, and prefetch train and test sets
    as shown in Listing [9-3](#PC19).
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表[9-3](#PC19)所示，在适当的地方进行洗牌、分批、缓存和预取训练和测试集。
- en: '[PRE18]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: 'Inspect tensors:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 检查张量：
- en: '[PRE19]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: 'Consult the following URL for updates on padding character tensors:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 查询以下URL获取有关填充字符张量的更新：
- en: '[`www.tensorflow.org/tutorials/text/text_classification_rnn`](http://www.tensorflow.org/tutorials/text/text_classification_rnn)'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '[TensorFlow文本分类RNN教程](http://www.tensorflow.org/tutorials/text/text_classification_rnn)'
- en: Create the Model
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建模型
- en: Plant seeds, import libraries, clear previous models, and create the model as
    shown in Listing [9-4](#PC21).
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 播种种子、导入库、清除以前的模型，并创建模型，如列表[9-4](#PC21)所示。
- en: '[PRE20]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: The first layer is an embedding layer. The *embedding* layer is used to create
    word vectors for incoming words. During training, representations of word categories
    (or word vectors) are learned in a way where similar categories are closer to
    one another. So word vectors can store relationships between words like *good*
    and *great*. Word vectors are dense because our model learns word relationships.
    As a result, word vectors aren’t padded with a huge number of zeros like what
    we do with one-hot encodings.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 第一层是嵌入层。`*embedding*`层用于为传入的单词创建词向量。在训练过程中，通过使相似类别彼此更接近的方式学习词类别的表示（或词向量）。因此，词向量可以存储单词之间的关系，如`*good*`和`*great*`。由于我们的模型学习单词关系，词向量是密集的。因此，词向量不会像我们对one-hot编码那样用大量的零进行填充。
- en: The embedding layer accepts vocabulary size, embedding size, and input shape.
    We set *mask_zero=True* to inform the model to ignore padding tokens by all downstream
    layers. Ignoring padding tokens improves performance.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 嵌入层接受词汇大小、嵌入大小和输入形状。我们将`*mask_zero=True*`设置为通知模型忽略填充标记，所有下游层。忽略填充标记可以提高性能。
- en: The next two layers are GRU layers, and the final layer is a single-neuron dense
    output layer. The output layer uses sigmoid activation to output the estimated
    probability that the review expresses a positive or negative sentiment regarding
    the movie.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来的两层是GRU层，最后一层是单神经元密集输出层。输出层使用sigmoid激活来输出评论表达对电影正面或负面情绪的估计概率。
- en: Model Summary
  id: totrans-82
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型摘要
- en: 'Inspect the model:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 检查模型：
- en: '[PRE21]'
  id: totrans-84
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: The first layer is an embedding. So calculate the number of learnable parameters
    by multiplying vocabulary size of 8185 by embedding dimension (embed_size) of
    128 for a total of 1,047,680.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 第一层是嵌入层。因此，通过将词汇大小8185乘以嵌入维度（embed_size）128，得到总共1,047,680个可学习的参数。
- en: The second layer is a GRU. The number of learnable parameters is thereby based
    on the formula *3* `×` *(n*^(*2*) `×` *mn + 2n)* where *m* is the input dimension
    and *n* is the output dimension. Multiply by *3* because there are three sets
    of operations for a GRU that requires weight matrices of these sizes. Multiply
    *n* by *2* because of the feedback loops of a RNN. So we get 99,072 learnable
    parameters.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 第二层是GRU层。可学习的参数数量基于公式`*3* `×` *(n*^(*2*) `×` *mn + 2n)*，其中*m*是输入维度，*n*是输出维度。乘以`*3*`是因为GRU需要这些大小的权重矩阵的三套操作。将*n*乘以`*2*`是因为RNN的反馈循环。因此，我们得到99,072个可学习的参数。
- en: 'Here’s how we break down the result:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是如何分解结果：
- en: '* 3 `×` (128² + 128 `×` 128 + 2 `×` 128)'
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '* 3 `×` (128² + 128 `×` 128 + 2 `×` 128)'
- en: '* 3 `×` (16384 + 16384 + 256)'
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '* 3 `×` (16384 + 16384 + 256)'
- en: '* 3 `×` 33024'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '* 3 `×` 33024'
- en: '* 99,072'
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '* 99,072'
- en: As we can see, calculating learnable parameters for the second layer is pretty
    complex. So let’s break it down logically. A GRU layer is a feedforward layer
    with feedback loops. Learnable parameters for a feedforward network are calculated
    by multiplying output from the previous layer (128 neurons) with neurons at the
    current layer (128 neurons). With a feedforward network, we also have to account
    for the 128 neurons at this layer. But we multiply the 128 neurons at this layer
    by 2 because of the feedback mechanism of a RNN. Finally, the current layer’s
    128 neurons are fed back resulting in 128² learnable parameters. A GRU uses three
    sets of operations (hidden state, reset gate, and update gate) requiring weight
    matrices, so we multiply the learnable parameters by 3.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所见，计算第二层的可学习参数相当复杂。所以让我们逻辑上分解它。一个GRU层是一个具有反馈循环的前馈层。前馈网络的可学习参数是通过将前一层（128个神经元）的输出与当前层的神经元（128个神经元）相乘来计算的。在前馈网络中，我们还需要考虑该层的128个神经元。但由于RNN的反馈机制，我们需要将这层的128个神经元乘以2。最后，当前层的128个神经元被反馈，产生128²个可学习参数。GRU使用三组操作（隐藏状态、重置门和更新门），需要权重矩阵，所以我们把可学习参数乘以3。
- en: The third layer is a GRU. We get 99,072 learnable parameters because *n* and
    *m* are exactly the same as the second layer. So the calculations are the same.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 第三层是一个GRU。由于n和m与第二层完全相同，我们得到99,072个可学习参数。所以计算是相同的。
- en: The final layer is dense. So calculate the number of learnable parameters by
    multiplying output dimension of 1 by input dimension of 128 and adding 1 to account
    for the number of neurons at this layer for a total of 129.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 最终层是密集层。因此，通过将输出维度1乘以输入维度128，并加1来考虑该层的神经元数量，总共得到129个可学习参数。
- en: Compile the Model
  id: totrans-95
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编译模型
- en: 'Compile :'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 编译：
- en: '[PRE22]'
  id: totrans-97
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: Train the Model
  id: totrans-98
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 训练模型
- en: We found that two epochs provide pretty good accuracy without tuning. However,
    your results may differ. So you can experiment to your heart’s content. But keep
    in mind that training text models requires a lot of training time!
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 我们发现两个epoch提供了相当好的准确度，无需调整。然而，你的结果可能会有所不同。所以你可以尽情地实验。但请记住，训练文本模型需要大量的训练时间！
- en: '[PRE23]'
  id: totrans-100
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: Generalize on Test Data
  id: totrans-101
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在测试数据上泛化
- en: 'Although model fit information provides validation loss and accuracy values
    during training, it is always a good idea to explicitly evaluate a model on test
    data because accuracy and loss values may differ:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然模型拟合信息在训练过程中提供了验证损失和准确度值，但始终明确地在测试数据上评估模型是一个好主意，因为准确度和损失值可能会有所不同：
- en: '[PRE24]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: Visualize Training Performance
  id: totrans-104
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可视化训练性能
- en: Visualize as shown in Listing [9-5](#PC26).
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表[9-5](#PC26)所示进行可视化。
- en: '[PRE25]'
  id: totrans-106
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: Make Predictions from Fabricated Reviews
  id: totrans-107
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从虚构评论中进行预测
- en: Let’s make predictions from reviews that we fabricate. Begin by creating a function
    that returns the predictions. Since we create our own reviews, the function must
    convert the text review for TensorFlow consumption.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从我们虚构的评论中进行预测。首先，创建一个返回预测的函数。由于我们创建了自己的评论，该函数必须将文本评论转换为TensorFlow可以消费的形式。
- en: 'Create the function:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 创建函数：
- en: '[PRE26]'
  id: totrans-110
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: The function accepts a text review. It begins by encoding the review. It then
    converts the encoded review to float32\. The function ends by making the prediction
    and returning it to the calling environment. We add the *1* dimension to the encoded
    text so it can be consumed by the TensorFlow model.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 函数接受一个文本评论。它首先对评论进行编码。然后，将编码后的评论转换为float32。函数通过进行预测并将结果返回到调用环境结束。我们向编码后的文本添加*1*维，以便它可以被TensorFlow模型消费。
- en: 'Test the function with a fabricated review:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 使用虚构的评论测试函数：
- en: '[PRE27]'
  id: totrans-113
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: We have a prediction. Predictions greater than 0.5 mean that the review is positive.
    Otherwise, the review is negative.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有一个预测。预测值大于0.5表示评论是正面的。否则，评论是负面的。
- en: 'Let’s make the prediction more palatable by creating another function:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过创建另一个函数来使预测更加易于接受：
- en: '[PRE28]'
  id: totrans-116
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: The function converts the prediction to a numpy scalar.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 函数将预测转换为numpy标量。
- en: 'Invoke the function:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 调用函数：
- en: '[PRE29]'
  id: totrans-119
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: The function removes the *1* dimension from the prediction.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 函数从预测中移除了*1*维。
- en: 'Let’s go a step further by creating a function that returns the review in plain
    English:'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们进一步创建一个函数，该函数返回纯英文的评论：
- en: '[PRE30]'
  id: totrans-122
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: 'Invoke the function:'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 调用函数：
- en: '[PRE31]'
  id: totrans-124
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: As expected, the review is positive.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 如预期，评论是正面的。
- en: 'Let’s try another one:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们再试一次：
- en: '[PRE32]'
  id: totrans-127
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: As expected, the review is negative.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 如预期，评论是负面的。
- en: Make Predictions on a Test Data Batch
  id: totrans-129
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在测试数据批次上进行预测
- en: We can also predict from the test set. Let’s make predictions on the *first*
    test batch with the *predict* method. Since test data is already in tensor form,
    we don’t need to encode.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 我们也可以从测试集中进行预测。让我们使用*predict*方法对第一个测试批次进行预测。由于测试数据已经以张量形式存在，我们不需要进行编码。
- en: Predict from the test set batch and display the first review as shown in Listing
    [9-6](#PC34).
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 从测试集批次中进行预测并显示如清单 [9-6](#PC34) 所示的第一个评论。
- en: '[PRE33]'
  id: totrans-132
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: We take the first batch from *test_ds*. We make predictions with the *predict*
    method and place them in y_pred_64\. Variable *y_pred_64* holds 64 predictions
    because batch size is 64\. We then display the first review and its associated
    label from this batch. Remember that label *1* means the review is positive and
    label *0* means it is negative. We end by displaying the size of the sample and
    target to verify that we have 64 examples in our first batch.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从*test_ds*中获取第一个批次。我们使用*predict*方法进行预测，并将它们放置在y_pred_64变量中。变量*y_pred_64*包含64个预测，因为批次大小是64。然后我们显示该批次的第一个评论及其相关标签。记住，标签*1*表示评论是积极的，标签*0*表示它是消极的。最后，我们显示样本大小和目标的大小，以验证我们第一个批次中有64个示例。
- en: 'Get the first prediction:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 获取第一个预测：
- en: '[PRE34]'
  id: totrans-135
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: 'Make it palatable:'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 使其易于接受：
- en: '[PRE35]'
  id: totrans-137
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: 'Compare the prediction to the actual label:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 将预测与实际标签进行比较：
- en: '[PRE36]'
  id: totrans-139
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: If the prediction matches the actual label, it was correct.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 如果预测与实际标签匹配，则它是正确的。
- en: Listing [9-7](#PC38) displays prediction efficacy for the first five predictions.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 清单 [9-7](#PC38) 显示了前五个预测的预测效果。
- en: '[PRE37]'
  id: totrans-142
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: Prediction Accuracy for the First Batch
  id: totrans-143
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第一批次的预测准确率
- en: 'Create a function to convert an impression back to a label of either 1 or 0:'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数将印象转换回1或0的标签：
- en: '[PRE38]'
  id: totrans-145
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: Return prediction accuracy for the entire first batch as shown in Listing [9-8](#PC40).
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 返回整个第一个批次的预测准确率，如清单 [9-8](#PC40) 所示。
- en: '[PRE39]'
  id: totrans-147
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: We begin by traversing the first batch and comparing labels to predictions.
    If a prediction is correct, we add this information to a list. We continue by
    counting the number of correct predictions. We end by dividing correct predictions
    by the batch size to get overall prediction accuracy.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先遍历第一个批次，并将标签与预测进行比较。如果预测正确，我们将此信息添加到列表中。然后我们继续计算正确预测的数量。最后，我们将正确预测的数量除以批次大小，以获得整体预测准确率。
- en: Leverage Pretrained Embeddings
  id: totrans-149
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 利用预训练嵌入
- en: Amazingly, we can reuse modules from pretrained models on the IMDb dataset.
    The *TensorFlow Hub project* is a library with hundreds of reusable machine learning
    modules. A **module** is a self-contained piece of a TensorFlow graph, along with
    its weights and assets, that can be reused across different tasks in a process
    known as transfer learning. **Transfer learning** is a machine learning method
    where a model developed for a task is reused as the starting point for a model
    on a different task.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 令人惊讶的是，我们可以在IMDb数据集上重用预训练模型中的模块。*TensorFlow Hub项目*是一个包含数百个可重用机器学习模块的库。**模块**是TensorFlow图的一个自包含部分，包括其权重和资产，可以在称为迁移学习的过程中的不同任务之间重用。**迁移学习**是一种机器学习方法，其中为某个任务开发的模型被用作不同任务中模型的起点。
- en: 'You can browse the library by perusing the following URL:'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以通过浏览以下URL来浏览库：
- en: '[`http://tfhub.dev`](http://tfhub.dev)'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: '[`http://tfhub.dev`](http://tfhub.dev)'
- en: Once you locate a module, copy the URL into your model. The module is automatically
    downloaded along with its pretrained weights. A huge advantage of using pretrained
    models is that we don’t have to create and train our own models from scratch!
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你找到了一个模块，将URL复制到你的模型中。该模块及其预训练权重将自动下载。使用预训练模型的一个巨大优势是我们不需要从头开始创建和训练自己的模型！
- en: Load the IMDb Dataset
  id: totrans-154
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 加载IMDb数据集
- en: 'Since we are using a pretrained model, we can load the IMDb dataset with the
    full vocabulary:'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们使用的是预训练模型，我们可以使用完整词汇表加载IMDb数据集：
- en: '[PRE40]'
  id: totrans-156
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: We use the full vocabulary because we don’t have to worry about training with
    it!
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用完整词汇表，因为我们不需要担心用它进行训练！
- en: 'Display metadata:'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 显示元数据：
- en: '[PRE41]'
  id: totrans-159
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: Build the Input Pipeline
  id: totrans-160
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建输入管道
- en: 'Create train and test sets:'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 创建训练集和测试集：
- en: '[PRE42]'
  id: totrans-162
  prefs: []
  type: TYPE_PRE
  zh: '[PRE42]'
- en: 'Batch and prefetch:'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 批量和预取：
- en: '[PRE43]'
  id: totrans-164
  prefs: []
  type: TYPE_PRE
  zh: '[PRE43]'
- en: 'Inspect tensors:'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 检查张量：
- en: '[PRE44]'
  id: totrans-166
  prefs: []
  type: TYPE_PRE
  zh: '[PRE44]'
- en: Create the Pretrained Model
  id: totrans-167
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建预训练模型
- en: Import the TF Hub library and create a skeleton model to house the pretrained
    module as shown in Listing [9-9](#PC46).
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 导入TF Hub库并创建一个骨架模型来容纳预训练模块，如清单 [9-9](#PC46) 所示。
- en: '[PRE45]'
  id: totrans-169
  prefs: []
  type: TYPE_PRE
  zh: '[PRE45]'
- en: The *hub.KerasLayer* downloads the sentence encoder module. Each string input
    into this layer is automatically encoded as a 50D vector. So each vector represents
    50 words. Each word is embedded based on an embedding matrix pretrained on the
    7 billion–word Google News corpus. The next two dense layers are added to provide
    a basic model for sentiment analysis. Using TF Hub is convenient and efficient
    because we can use what was already learned from the pretrained model.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: '*hub.KerasLayer* 下载句子编码模块。每个输入到该层的字符串都会自动编码为 50D 向量。因此，每个向量代表 50 个单词。每个单词都是基于在
    70 亿词的 Google 新闻语料库上预训练的嵌入矩阵进行嵌入的。接下来添加了两个密集层，以提供基本情感分析模型。使用 TF Hub 方便且高效，因为我们可以使用从预训练模型中学到的知识。'
- en: Compile the Model
  id: totrans-171
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编译模型
- en: 'Compile the model:'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 编译模型：
- en: '[PRE46]'
  id: totrans-173
  prefs: []
  type: TYPE_PRE
  zh: '[PRE46]'
- en: Train the Model
  id: totrans-174
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 训练模型
- en: 'Train the model:'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 训练模型：
- en: '[PRE47]'
  id: totrans-176
  prefs: []
  type: TYPE_PRE
  zh: '[PRE47]'
- en: Training time is substantially reduced!
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 训练时间显著减少！
- en: Make Predictions
  id: totrans-178
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 进行预测
- en: 'Make predictions based on the first *test_set* batch:'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 基于第一个 *test_set* 批次进行预测：
- en: '[PRE48]'
  id: totrans-180
  prefs: []
  type: TYPE_PRE
  zh: '[PRE48]'
- en: Since batch size is 32, we have 32 predictions for each batch.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 由于批大小为 32，因此每个批次有 32 个预测。
- en: Display misclassifications in test_set by index as shown in Listing [9-10](#PC50).
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表 [9-10](#PC50) 所示，通过索引显示测试集中的误分类。
- en: '[PRE49]'
  id: totrans-183
  prefs: []
  type: TYPE_PRE
  zh: '[PRE49]'
- en: Calculate Prediction Accuracy for the First Batch
  id: totrans-184
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 计算第一个批次的预测准确度
- en: Listing [9-11](#PC51) shows the code to calculate prediction accuracy for the
    first batch.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 [9-11](#PC51) 展示了计算第一个批次预测准确度的代码。
- en: '[PRE50]'
  id: totrans-186
  prefs: []
  type: TYPE_PRE
  zh: '[PRE50]'
- en: Instead of finding misclassifications, the code finds correct predictions. The
    code begins by comparing an actual label to a predicted one. If the actual label
    is predicted correctly, a Boolean *True* is appended to a list. Once the first
    batch is traversed, the number of elements in the list is counted. This count
    is divided by batch size of 32 to determine accuracy, which is displayed as a
    percentage.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 代码不是寻找误分类，而是找到正确的预测。代码首先将实际标签与预测标签进行比较。如果实际标签被正确预测，则将布尔值 *True* 添加到列表中。一旦遍历完第一个批次，就计算列表中的元素数量。这个数量除以批大小
    32，以确定准确度，并以百分比的形式显示。
- en: Explore IMDb with Keras
  id: totrans-188
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 Keras 探索 IMDb
- en: Since Keras is very popular in industry, we demonstrate how to train IMDb with
    keras.datasets. We use the *keras.datasets.imdb.load_data* function to load the
    dataset in a format-ready fashion for use in neural network and deep learning
    models.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 Keras 在工业界非常流行，我们演示了如何使用 keras.datasets 训练 IMDb。我们使用 *keras.datasets.imdb.load_data*
    函数以格式就绪的方式加载数据集，以便在神经网络和深度学习模型中使用。
- en: Loading the Keras IMDb has some advantages. First, words have already been encoded
    with integers. Second, encoded words are arranged by their absolute popularity
    in the dataset. So sentences in each review are comprised of a sequence of integers.
    Third, calling *imdb.load_data* the first time downloads IMDb to your computer
    and stores it in your home directory under *~/.keras/datasets/imdb.pkl* as a 32-megabyte
    file. The imdb.load_data function also provides additional arguments including
    number of top words to load (where words with a lower integer are marked as zero
    in the returned data), number of top words to skip (to avoid words like *the*),
    and the maximum length of reviews to support.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 加载 Keras IMDb 有一些优势。首先，单词已经被编码为整数。其次，编码的单词按照其在数据集中的绝对流行度排列。因此，每条评论中的句子由一系列整数组成。第三，第一次调用
    *imdb.load_data* 时，将 IMDb 下载到您的计算机上，并存储在您的家目录下 *~/.keras/datasets/imdb.pkl* 作为
    32 兆字节的文件。imdb.load_data 函数还提供了额外的参数，包括要加载的前置单词数量（在返回的数据中，整数较低的单词标记为零），要跳过的前置单词数量（以避免像
    *the* 这样的单词），以及支持的评论最大长度。
- en: 'Load the Keras IMDb:'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 加载 Keras IMDb：
- en: '[PRE51]'
  id: totrans-192
  prefs: []
  type: TYPE_PRE
  zh: '[PRE51]'
- en: The function loads data into train and test tuples. So *train[0]* contains training
    reviews and *train[1]* contains training labels. And *test[0]* contains test reviews
    and *test[1]* contains test labels. Each review is represented as a numpy array
    of integers with each integer representing a word. The labels contain lists of
    integer labels (0 is a negative review and 1 is positive).
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 函数将数据加载到训练和测试元组中。因此 *train[0]* 包含训练评论，*train[1]* 包含训练标签。而 *test[0]* 包含测试评论，*test[1]*
    包含测试标签。每个评论都表示为一个整数 numpy 数组，每个整数代表一个单词。标签包含整数标签列表（0 表示负面评论，1 表示正面评论）。
- en: 'For readability, create variables to represent reviews and labels:'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 为了提高可读性，创建变量来表示评论和标签：
- en: '[PRE52]'
  id: totrans-195
  prefs: []
  type: TYPE_PRE
  zh: '[PRE52]'
- en: 'Display the shape of train and test review samples:'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 显示训练和测试评论样本的形状：
- en: '[PRE53]'
  id: totrans-197
  prefs: []
  type: TYPE_PRE
  zh: '[PRE53]'
- en: As expected, we have 25,000 train and 25,000 test reviews.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 如预期的那样，我们有 25,000 条训练和 25,000 条测试评论。
- en: 'Display the shape of train and test labels:'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 显示训练和测试标签的形状：
- en: '[PRE54]'
  id: totrans-200
  prefs: []
  type: TYPE_PRE
  zh: '[PRE54]'
- en: As expected, we have 25,000 train and 25,000 test labels.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 如预期，我们有25,000个训练标签和25,000个测试标签。
- en: Explore the Train Sample
  id: totrans-202
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 探索训练样本
- en: 'Display label categories and number of unique words:'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 显示标签类别和唯一单词数量：
- en: '[PRE55]'
  id: totrans-204
  prefs: []
  type: TYPE_PRE
  zh: '[PRE55]'
- en: The dataset is labeled by two categories that represent sentiment of each review.
    And the train sample contains 88,585 unique words.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集由两个类别标记，代表每个评论的情感。训练样本包含88,585个唯一单词。
- en: 'Let’s see how many words are in the longest training review:'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看最长训练评论中有多少单词：
- en: '[PRE56]'
  id: totrans-207
  prefs: []
  type: TYPE_PRE
  zh: '[PRE56]'
- en: We create a list containing the number of words in each review and then find
    the length of the review with the maximum number of words.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 我们创建一个包含每个评论单词数的列表，然后找到单词数最多的评论的长度。
- en: 'Get the index of the longest review:'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 获取最长评论的索引：
- en: '[PRE57]'
  id: totrans-210
  prefs: []
  type: TYPE_PRE
  zh: '[PRE57]'
- en: We use the *np.where* function to find the index. We used double indexing because
    the function returns a tuple containing a list that holds the index we desire.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用*np.where*函数来查找索引。我们使用了双重索引，因为该函数返回一个包含我们所需索引的列表的元组。
- en: Create a Decoding Function
  id: totrans-212
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建解码函数
- en: Create a function that decodes a review into English readable form as shown
    in Listing [9-12](#PC59).
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数，将评论解码为可读的英文形式，如列表[9-12](#PC59)所示。
- en: '[PRE58]'
  id: totrans-214
  prefs: []
  type: TYPE_PRE
  zh: '[PRE58]'
- en: The function uses the *tf.keras.datasets.imdb.get_word_index* utility to obtain
    a dictionary of words and their uniquely assigned integers. The function then
    creates another dictionary containing key-value groupings as value and key groupings
    from the first dictionary. Finally, it returns the words based on their IDs (or
    keys). The indices are offset by 3 because 0, 1, and 2 are reserved indices for
    *padding*, *start of sequence*, and *unknown*.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 函数使用*tf.keras.datasets.imdb.get_word_index*实用工具来获取单词及其唯一分配的整数的字典。然后，该函数创建另一个包含从第一个字典中的值和键分组作为键和值的键值对字典。最后，它根据其ID（或键）返回单词。索引偏移量为3，因为0、1和2是保留索引，用于*填充*、*序列开始*和*未知*。
- en: Invoke the Decoding Function
  id: totrans-216
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 调用解码函数
- en: Let’s see what the longest review looks like as shown in Listing [9-13](#PC60).
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看最长评论的样子，如列表[9-13](#PC60)所示。
- en: '[PRE59]'
  id: totrans-218
  prefs: []
  type: TYPE_PRE
  zh: '[PRE59]'
- en: Since we already know the index of the longest review, we can easily retrieve
    it from *train_reviews*. Display a slice of it since the review is pretty long.
    We can also easily retrieve the label from *train_labels*. Make the label readable
    and display it. Finally, display the length of the longest review.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们已经知道最长评论的索引，我们可以轻松地从*train_reviews*中检索它。显示其一部分，因为评论相当长。我们也可以轻松地从*train_labels*中检索标签。使标签可读并显示它。最后，显示最长评论的长度。
- en: Let’s see what the shortest review looks like. But we can’t do this directly.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看最短评论的样子。但我们不能直接这样做。
- en: 'We must first find the minimum number of words:'
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 我们必须首先找到单词的最小数量：
- en: '[PRE60]'
  id: totrans-222
  prefs: []
  type: TYPE_PRE
  zh: '[PRE60]'
- en: Since we don’t know which review is the shortest, we use the *amin* method to
    return the minimum.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们不知道哪个评论是最短的，我们使用*amin*方法来返回最小值。
- en: 'We can now get the index of the shortest review in the train sample:'
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在可以获取训练样本中最短评论的索引：
- en: '[PRE61]'
  id: totrans-225
  prefs: []
  type: TYPE_PRE
  zh: '[PRE61]'
- en: We use the *where* method to return the index we seek. Since the method returns
    all reviews that meet the criterion, we grab the first one and display its index.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用*where*方法来返回我们寻求的索引。由于该方法返回所有满足条件的评论，我们抓取第一个并显示其索引。
