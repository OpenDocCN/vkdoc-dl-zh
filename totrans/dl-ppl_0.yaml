  prefs: []
  type: TYPE_NORMAL
- en: '*Artificial intelligence* (AI) is the field of embeddings human thinking into
    computers: in other words, creating an artificial brain that mimics the functions
    of the biological brain. Whatever the human can do intelligently is now required
    to be moved into machines. First-generation AI focuses on problems that can be
    formally described by humans. Using AI, steps for doing something intelligent
    are described in a form of instructions that machines follow. Machines follow
    humans without changes. These features are characteristic of the first era of
    AI.'
  prefs: []
  type: TYPE_NORMAL
- en: Humans can fully describe only simple problems such as chess, and fail to describe
    more complicated problems. In chess, the problem can be simply explained by representing
    the board as a matrix of size 8×8, describing each piece and how it moves and
    describing the goals. Machines will be restricted to those tasks formally described
    by humans. By programming such instructions, machines can play chess intelligently.
    Machine intelligence is now artificial. The machine itself is not intelligent,
    but humans have transferred their intelligence to the machine in the form of several
    static lines of code. “Static” means that the behavior is the same in all cases.
    The machine, in this case, is tied to the human and can’t work on its own. This
    is like a master–slave relationship. The human is the master and the machines
    are the slaves, which just follow the human’s orders and no more.
  prefs: []
  type: TYPE_NORMAL
- en: To make the machine able to recognize objects, we can give it previous knowledge
    from experts in a way the machine can understand. Such knowledge-based systems
    form the second era of AI. One of the challenges in such systems is how to handle
    uncertainty and unknowns. Humans can recognize objects even in different and complex
    environments, and are able to handle uncertainty and unknowns intelligently, but
    machines can’t.
  prefs: []
  type: TYPE_NORMAL
- en: The Goal
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Deep learning is a branch of machine learning where you model the world in terms
    of a hierarchy of concepts. This pattern of learning is similar to the way a human
    brain learns, and it allows computers to model complex concepts that often go
    unnoticed in other traditional methods of modeling. Hence, in the modern computing
    paradigm, deep learning plays a vital role in modeling complex real-world problems,
    especially by leveraging the massive amount of unstructured data available today.
  prefs: []
  type: TYPE_NORMAL
- en: Because of the complexities involved in a deep learning model, many times it
    is treated as a black box by people using it. However, to derive the maximum benefit
    from this branch of machine learning, one needs to uncover the hidden mystery
    by looking at the science and mathematics associated with it. In this book, great
    care has been taken to explain the concepts and techniques associated with deep
    learning from a mathematical as well as a scientific viewpoint. Also, the first
    chapter is totally dedicated to building the mathematical base required to comprehend
    deep learning concepts with ease. TensorFlow has been chosen as the deep learning
    package because of its flexibility for research purposes and its ease of use.
    Another reason for choosing TensorFlow is its capability to load models with ease
    in a live production environment using its serving capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: In summary,*Deep Learning Pipeline* should provide practical expertise so you
    can learn deep learning pipeline from scratch in such a way that you can deploy
    meaningful deep learning solutions. This book will allow you to get up to speed
    quickly using TensorFlow and to optimize different deep learning architectures.
    All the practical aspects of deep learning that are relevant in any industry are
    emphasized in this book. You will be able to use the prototypes demonstrated to
    build new deep learning applications. The code presented in the book is available
    in the form of iPython notebooks and scripts that allow you to try out examples
    and extend them in interesting ways. You will be equipped with the mathematical
    foundation and scientific knowledge to pursue research in this field and give
    back to the community.
  prefs: []
  type: TYPE_NORMAL
- en: All code in the book is implemented using Python. Because native Python is complex
    for handling images, multiple libraries are used to help to produce an efficient
    implementation for applications across the chapters.
  prefs: []
  type: TYPE_NORMAL
- en: Who This Book Is For
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This book is for data scientists and machine learning professionals looking
    at deep learning solutions to solve complex business problems, software developers
    working on deep learning solutions through TensorFlow, and graduate students and
    open source enthusiasts with a constant desire to learn.
  prefs: []
  type: TYPE_NORMAL
- en: Prerequisites
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Python and all the deep learning tools mentioned in the book, from IPython to
    TensorFlow to model that you will use, are free of charge and can be freely downloaded
    from the Internet. To run the code that accompanies the book, you need a computer
    that uses a Windows, Linux, or Mac OS operating system. The book will introduce
    you step-by-step to the process of installing the Python interpreter and all the
    tools and data that you need to run the examples.
  prefs: []
  type: TYPE_NORMAL
- en: How this Book Is Organized
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Parts
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '*Part I**: Introduction* —In this part, we prepare the readers by giving them
    all the prerequisites needed to start the journey with machine learning to deep
    learning.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Part II: Data* —As the first step of the pipeline, readers need to know everything
    about data, from data collection and understanding information from data to data
    processing and preparation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Part III: TensorFlow* —In this part, we start the interesting stuff. First,
    we illustrate the fundamental and important concepts of deep learning; then we
    deep dive into the core of neural networks and the types of neural networks, describing
    each type; and show the important concepts of the equation of deep learning. Also,
    we can’t forget to show a real-life example of each type.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Part IV: Applying What You’ve Learned* —This part is designed to ensure readers
    practice by using TensorFlow and build the pipeline.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Chapters
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '*Chapter* [*1*](484548_1_En_1_Chapter.xhtml) *: A gentle introduction* —This
    chapter provides the big picture that shows readers what is the field that the
    book describes; introduction to this field; and the mathematical equations and
    notations that describe how machine learning works.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Chapter* [*2*](484548_1_En_2_Chapter.xhtml) *: Setting Up Your Environment*
    —This chapter introduces the programming tools and packages you need in this book
    and some theories to help in understanding; it also includes a bit of introduction
    to the Python programming language.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Chapter* [*3*](484548_1_En_3_Chapter.xhtml) *: A Nice Tour Through the Deep
    Learning Pipeline* —In chapter [3](484548_1_En_3_Chapter.xhtml) we introduce the
    pipeline that the whole book is for; the deep learning approaches and subfields;
    the steps of the deep learning pipeline; and the extras added to TensorFlow that
    make it unique compared with other deep learning frameworks.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Chapter* [*4*](484548_1_En_4_Chapter.xhtml) *: Build Your First Toy TensorFlow
    App* —To make sure that we will not drop readers in the middle of the book, we
    show them a small example using TensorFlow that will go fast at each step of the
    deep learning pipeline; and make sure that the audience knows each step of the
    pipeline, how it is important, and how to use it.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Chapter* [*5*](484548_1_En_5_Chapter.xhtml) *: Defining Data* —This chapter,
    as its name implies, is about defining data. Readers should know what type of
    data they are dealing with, and that’s very important so they can choose the right
    approach for preparing the data.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Chapter* [*6*](484548_1_En_6_Chapter.xhtml) *: Data Wrangling and Preprocessing*
    —After understanding the data, the readers now should choose the approaches and
    methodologies for preparing it, so this chapter helps ensure that the readers
    will choose the right approaches in this step.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Chapter* [*7*](484548_1_En_7_Chapter.xhtml) *: Data Resampling* —After cleaning
    and preparing the dataset, now the reader should know how to sample this dataset
    in the right way. Choosing the wrong samples from your data may influence the
    result of your models, so in this chapter we illustrate all techniques and approaches
    needed to sample your dataset in the right way.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Chapter* [*8*](484548_1_En_8_Chapter.xhtml) *: Feature Selection and Feature
    Engineering* —In this chapter we describe a very important topic in data step
    of the pipeline: feature selection and engineering. Readers should know how to
    select and choose the important input feature that contributes most to the output
    feature in which they are interested. Feature engineering is the process of using
    domain knowledge of the data to create features that make machine learning algorithms
    work. Feature selection and engineering are fundamental to the application of
    machine and deep learning, and readers should know when and how to use them.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Chapter* [*9*](484548_1_En_9_Chapter.xhtml) *: Deep Learning Fundamentals*
    —In this chapter we describe a very important topic in deep learning fundamentals,
    the basic functions that deep learning is built on. Then we try to build layers
    from these functions and combine these layers together to get a more complex model
    that will help us solve more complex problems. All that will be described by TensorFlow
    examples.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Chapter* [*10*](484548_1_En_10_Chapter.xhtml) *: Improving Deep Neural Networks*
    —In this chapter we describe an important topic: after building the deep learning
    models, the improvement starts. This chapter concerns optimization, tuning and
    choosing hyperparameter techniques, and weight normalization and how that will
    make the learning process easier and faster. After that, the reader should know
    how to evaluate, optimize, and tune the model parameters to reach the optimal
    solution and a satisfying accuracy.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Chapter* [*11*](484548_1_En_11_Chapter.xhtml) *: Convolutional Neural Network*
    —One of the important classes of deep learning is the convolutional neural network.
    In this chapter we illustrate everything about CNN from the one-dimensional mask
    to the advanced stuff like weight sharing and the difference between equivariance
    and invariance. We illustrate a case study using the famous dataset CIFAR-10.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Chapter* [*12*](484548_1_En_12_Chapter.xhtml) *: Sequential Models* —Another
    class of deep learning is sequential models. In this chapter we describe the problem
    of sequential data and the rise of recurrent neural networks, the problem and
    also the evolution of the GRU and LSTM, and of course we include a case study.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Chapter* [*13*](484548_1_En_13_Chapter.xhtml) *: Selected Topics in Computer
    Vision* —After finishing CNN in Part III, it’s good to add some extra knowledge
    that makes it easier for readers when they work, like using prebuilt architectures
    and transfer learning.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Chapter* [*14*](484548_1_En_14_Chapter.xhtml) *: Selected Topics in Natural
    Language Processing* —This chapter fills the gaps that readers need in working
    with text, giving readers all the advanced approaches and techniques of natural
    language processing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Chapter* [*15*](484548_1_En_15_Chapter.xhtml) *: Applications* —Here we show
    some case studies to make sure that readers get the full knowledge and understanding
    of how to build a pipeline, with real-life examples.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
