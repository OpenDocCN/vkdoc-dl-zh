- en: Introduction
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 引言
- en: This book is about reinforcement learning, taking the readers through the basics
    to advanced topics. Although this book assumes no prior knowledge of the field
    of reinforcement learning, it expects the readers to be familiar with the basics
    of machine learning. Have you coded in Python? Are you comfortable working with
    libraries like NumPy and scikit-learn? Have you heard of deep learning and have
    you explored the basic build blocks of training simple models in PyTorch? You
    should answer yes to these questions to get the most out of this book. If not,
    I suggest you learn a bit about these concepts first. Nothing too deep—any introductory
    online tutorial or book from Apress on these topics will be sufficient.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 本书关于强化学习，将读者从基础知识引导到高级主题。尽管本书假定读者对强化学习领域没有先验知识，但它期望读者熟悉机器学习的基础。你用Python编写过代码吗？你是否熟悉NumPy和scikit-learn等库？你听说过深度学习，并探索过在PyTorch中训练简单模型的基本构建块吗？你应该对这些问题的回答是肯定的，以便充分利用本书。如果不是，我建议你先学习一些这些概念。不需要太深入——任何关于这些主题的Apress在线教程或书籍都足够了。
- en: In this second edition, I have made some major changes while keeping most of
    the content from the first edition. The main additions are related to the new
    developments in the field of Large Language Models (LLM) and Multimodal Generative
    AI, which have revolutionized the world since late 2022\. Reinforcement learning
    (RL) has played a crucial role in enabling this through Reinforcement Learning
    from Human Feedback (RLHF). This edition has a new chapter dedicated to this topic.
    It gives the reader a high-level overview of transformers, LLMs, and related topics
    like prompt engineering, Retrieval Augmented Generation (RAG), parameter efficient
    fine-tuning (PEFT), and chaining of LLMs and LLM-based auto agents, followed by
    a detailed explanation of the concept of RLHF. In the same chapter, you'll also
    explore Proximal Policy Optimization (PPO), which is a popular state-of-the-art
    RL based algorithm that was used by OpenAI for the RLHF fine-tuning of ChatGPT.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一版中，我在保留第一版大部分内容的同时，进行了一些重大修改。主要新增内容与大型语言模型（LLM）和多模态生成人工智能领域的新发展有关，这些发展自2022年底以来彻底改变了世界。强化学习（RL）通过人类反馈强化学习（RLHF）在实现这一点中发挥了关键作用。这一版新增了一章专门介绍这一主题。它为读者提供了关于transformers、LLMs以及相关主题（如提示工程、检索增强生成（RAG）、参数高效微调（PEFT）和LLMs及其基于LLM的自动代理的链式操作）的高级概述，随后详细解释了RLHF的概念。在同一章中，你还将探索近端策略优化（PPO），这是一种流行的最先进的基于强化学习的算法，OpenAI曾用它来对ChatGPT进行RLHF微调。
- en: Another addition is a chapter on multi-agent RL (MARL) and deep MARL (DMARL),
    which deals with more than one agent cooperating or competing in the same environment.
    In this chapter, I start with the introduction and go all the way to a working
    example. I limit the discussion to introducing the key concepts, enabling interested
    readers to follow specialized texts on MARL for further exploration.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个新增内容是关于多智能体强化学习（MARL）和深度多智能体强化学习（DMARL）的章节，它涉及多个智能体在同一环境中合作或竞争的情况。在这一章中，我从介绍开始，一直讲解到可工作的示例。我限制讨论范围，仅介绍关键概念，使感兴趣的读者能够进一步探索关于MARL的专业文本。
- en: This edition also covers additional topics, like hyperparameter tuning. It includes
    an overview of other topics like curiosity learning, use of transformers in RL
    in various ways, emerging areas such as sample efficient offline RL, decision
    transformers, automated curriculum learning, zero-shot RL, and various other advances
    in the field since the first edition. The chapter on Deep Q networks has been
    split into two to provide better organization to the topic.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 这一版还涵盖了其他主题，如超参数调整。它包括其他主题的概述，如好奇心学习、在强化学习中以各种方式使用transformers、样本高效离线强化学习、决策transformers、自动课程学习、零样本强化学习以及自第一版以来该领域的其他各种进步。关于深度Q网络的章节已被拆分为两部分，以更好地组织这一主题。
- en: On the code front, there have been significant changes too. I cover a lot more
    about RL environments. I introduce Gymnasium, the successor library of OpenAI
    Gym. I also introduce other environments, like FinRL, which is dedicated to applying
    RL in market trading, other robotic environments, and environments for MARL. I
    cover various other RL libraries that have gained popularity since the first edition.
    The way code runs in 2024 is very different. Therefore, immediately in Chapter
    [1](502835_2_En_1_Chapter.xhtml) the book gives readers step-by-step installation
    instructions to be able to run the accompanying code on local machines and/or
    cloud providers, including cloud-based monitoring and tracking of training.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在代码方面，也发生了显著的变化。我涵盖了更多关于强化学习环境的内容。我介绍了Gymnasium，这是OpenAI Gym的后继库。我还介绍了其他环境，例如FinRL，它专注于在市场交易、其他机器人环境和多智能体强化学习（MARL）环境中应用强化学习。我还涵盖了自第一版以来获得流行度的各种其他强化学习库。2024年代码的运行方式与以往大不相同。因此，在第一章[1](502835_2_En_1_Chapter.xhtml)中，本书立即为读者提供了逐步安装说明，以便能够在本地机器和/或云服务提供商上运行配套代码，包括基于云的训练监控和跟踪。
- en: This book walks readers through the basics of reinforcement learning, spending
    a lot of time explaining the concepts in the initial chapters. A reader with prior
    knowledge of reinforcement learning can go through the first four chapters quickly.
    Chapter [5](502835_2_En_5_Chapter.xhtml) picks up pace and starts exploring advanced
    topics, combining deep learning with reinforcement learning. The accompanying
    code hosted on GitHub is an integral part of this book. While the book has listings
    of the relevant code, Jupyter notebooks in the code repository provide additional
    insights and practical tips on coding these algorithms. The reader is best served
    by first reading the chapter and going through the explanations followed by working
    through the code in the Jupyter notebooks. The reader is also encouraged to try
    and rewrite the code on their own training agents for different additional environments,
    as discussed in the book.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 本书引导读者了解强化学习的基础，在初始章节花费了大量时间解释概念。对强化学习有先验知识的读者可以快速浏览前四章。第 [5](502835_2_En_5_Chapter.xhtml)
    章开始加快节奏，并开始探讨高级主题，将深度学习与强化学习相结合。GitHub上提供的配套代码是本书的重要组成部分。虽然本书列出了相关代码，但代码仓库中的Jupyter笔记本提供了关于编写这些算法的额外见解和实用技巧。读者最好先阅读章节，然后通过Jupyter笔记本中的解释来工作，最后通过代码来实践。本书还鼓励读者尝试自己编写代码，为不同的附加环境训练智能体，正如书中所讨论的那样。
- en: For a subject like this, math is unavoidable. However, I have tried to keep
    it minimal. The book quotes a lot of research papers giving short explanations
    of the approach taken. Readers wanting a deeper understanding of the theory should
    go through these research papers. This book’s purpose is to introduce practitioners
    to the motivation and high-level approach behind many of the latest techniques
    in this field. However, by no means it is meant to provide a complete theoretical
    understanding of these techniques, which is best gained by reading the original
    papers.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这类主题，数学是不可避免的。然而，我已经尽量将其保持到最小。本书引用了许多研究论文，对所采取的方法进行了简要说明。希望对理论有更深入理解的读者应该阅读这些研究论文。本书的目的是向实践者介绍该领域许多最新技术的动机和高级方法。然而，本书绝无提供这些技术完整理论理解之意，这种理解最好通过阅读原始论文来获得。
- en: The book is organized into 13 chapters.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 本书共分为13章。
- en: 'Chapter [1](502835_2_En_1_Chapter.xhtml), Introduction to Reinforcement Learning:
    Readers will learn about the basics and the applications of reinforcement learning
    in the real world. This chapter also provides the steps for setting up the code
    that comes with this book on different platforms, such as a local computer or
    the cloud.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第 [1](502835_2_En_1_Chapter.xhtml) 章，强化学习简介：读者将了解强化学习的基础及其在现实世界中的应用。本章还提供了在不同平台（如本地计算机或云）上设置本书附带代码的步骤。
- en: 'Chapter [2](502835_2_En_2_Chapter.xhtml), The Foundation: Markov Decision Processes:
    This chapter describes the problem that reinforcement learning aims to solve.
    I introduce the components of an RL system—the agent, environment, rewards, value
    functions, model, and policy. I explain the Markov process and its different variants,
    along with backup equations by Richard Bellman.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第 [2](502835_2_En_2_Chapter.xhtml) 章，基础：马尔可夫决策过程：本章描述了强化学习旨在解决的问题。我介绍了强化学习系统的组成部分——智能体、环境、奖励、价值函数、模型和政策。我解释了马尔可夫过程及其不同变体，以及理查德·贝尔曼的回溯方程。
- en: 'Chapter [3](502835_2_En_3_Chapter.xhtml), Model-Based Approaches: This chapter
    looks at the scenario where the agent has a model and plans its action for the
    best result. I also introduce Gymnasium, a popular RL environment library. Lastly,
    I examine value and policy iteration methods for planning, including generalized
    policy iteration and asynchronous backups.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第 [3](502835_2_En_3_Chapter.xhtml) 章，基于模型的途径：本章探讨了智能体拥有模型并为其行动制定最佳结果计划的情况。我还介绍了Gymnasium，一个流行的强化学习环境库。最后，我考察了用于规划的值迭代和政策迭代方法，包括广义政策迭代和异步回溯。
- en: 'Chapter [4](502835_2_En_4_Chapter.xhtml), Model-Free Approaches: This chapter
    explores the model-free learning methods that the agent can use when it cannot
    access the environment/model''s dynamics. It focuses on the Monte Carlo (MC) and
    Temporal Difference (TD) approaches to learning. It first examines them separately
    and then merges them under the concept of n-step returns and eligibility traces.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第 [4](502835_2_En_4_Chapter.xhtml) 章，无模型方法：本章探讨了当智能体无法访问环境/模型的动态时可以使用的无模型学习方法。它专注于蒙特卡洛（MC）和时间差分（TD）学习方法。它首先分别检查它们，然后根据
    n 步回报和资格痕迹的概念将它们合并。
- en: 'Chapter [5](502835_2_En_5_Chapter.xhtml), Function Approximation and Deep Learning:
    Explores continuous valued states instead of discrete states as in the previous
    chapters. It starts with the conventional method of designing function approximation
    by hand, especially the linear ones. At the end, the chapter presents the idea
    of using deep learning-based models as non-linear function approximators.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第 [5](502835_2_En_5_Chapter.xhtml) 章，函数逼近与深度学习：探讨了连续值状态，而不是像前几章那样使用离散状态。它从传统的手动设计函数逼近方法开始，特别是线性方法。最后，本章提出了使用基于深度学习的模型作为非线性函数逼近器的想法。
- en: 'Chapter [6](502835_2_En_6_Chapter.xhtml), Deep Q-Learning (DQN): Dives into
    DQN, an approach that successfully demonstrated the use of deep learning together
    with reinforcement learning. It introduces the popular libraries for hyperparameter
    optimization and experiment tracking. Finally, it does a broad survey of RL environments
    from robotics, finance and trading, and so on.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第 [6](502835_2_En_6_Chapter.xhtml) 章，深度 Q-Learning（DQN）：深入探讨了 DQN，这是一种成功展示了深度学习与强化学习相结合的方法。它介绍了用于超参数优化和实验跟踪的流行库。最后，它对来自机器人、金融和交易等领域的强化学习环境进行了广泛的调查。
- en: 'Chapter [7](502835_2_En_7_Chapter.xhtml), Improvements to DQN: This is an optional
    chapter that discusses enhancements to the DQN. For each of these, theoretical
    discussions are followed by complete implementation in Python and PyTorch. It
    covers topics like Prioritized Replay, Double DQN, Dueling DQN, NoisyNets DQN,
    C51 DQN, Qunatile DQN, and Hindsight Experience Replay.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第 [7](502835_2_En_7_Chapter.xhtml) 章，DQN 的改进：这是一个可选章节，讨论了 DQN 的改进。对于这些改进中的每一个，都有理论讨论，随后是使用
    Python 和 PyTorch 的完整实现。它涵盖了优先回放、双 DQN、对抗 DQN、噪声网络 DQN、C51 DQN、Qunatile DQN 和事后经验回放等主题。
- en: 'Chapter [8](502835_2_En_8_Chapter.xhtml), Policy Gradient Algorithms: This
    chapter shifts gears from value-based methods to direct policy learning. After
    establishing the foundations, it discusses various approaches, including recent
    and highly successful ones like Trust Region Policy Optimization and Proximal
    Policy Optimization, complete with implementations in PyTorch. It also looks at
    curiosity-driven learning.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第 [8](502835_2_En_8_Chapter.xhtml) 章，策略梯度算法：本章从基于价值的方法转向直接策略学习。在建立基础之后，它讨论了各种方法，包括最近的和非常成功的方法，如信任域策略优化和近端策略优化，并包括
    PyTorch 中的实现。它还探讨了好奇心驱动的学习。
- en: 'Chapter [9](502835_2_En_9_Chapter.xhtml), Combining Policy Gradients and Q-Learning:
    This chapter looks at DQN with policy gradients methods to leverage the advantages
    of both approaches, which also allows for continuous action spaces, which are
    not easily feasible otherwise. It looks at three very popular ones—Deep Deterministic
    Policy Gradients (DDPG), Twin Delayed DDPG (TD3), and Soft Actor-Critic (SAC).'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第 [9](502835_2_En_9_Chapter.xhtml) 章，结合策略梯度与 Q-Learning：本章探讨了使用策略梯度方法与 Q-Learning
    相结合的 DQN，以利用两种方法的优势，这也使得连续动作空间成为可能，这在其他情况下是不易实现的。它讨论了三种非常流行的算法——深度确定性策略梯度（DDPG）、双延迟
    DDPG（TD3）和软演员-评论家（SAC）。
- en: 'Chapter [10](502835_2_En_10_Chapter.xhtml), Integrated Planning and Learning:
    This chapter is all about combing the model-based approach from Chapter [3](502835_2_En_3_Chapter.xhtml)
    and the model-free approach from Chapters [4](502835_2_En_4_Chapter.xhtml) through
    [9](502835_2_En_9_Chapter.xhtml). It discusses a general framework called Dyna
    along with some variants. Finally, it looks at Monte Carlo Tree Search (MCTS)
    along with its application for training AlphaGo that can beat champion human Go
    players.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第 [10](502835_2_En_10_Chapter.xhtml) 章，集成规划和学习：本章主要关于将第 [3](502835_2_En_3_Chapter.xhtml)
    章中的基于模型的方法和第 [4](502835_2_En_4_Chapter.xhtml) 章至第 [9](502835_2_En_9_Chapter.xhtml)
    章中的无模型方法相结合。它讨论了一个名为 Dyna 的一般框架及其一些变体。最后，它探讨了蒙特卡洛树搜索（MCTS）及其在训练能够击败冠军围棋选手的 AlphaGo
    中的应用。
- en: 'Chapter [11](502835_2_En_11_Chapter.xhtml), Proximal Policy Optimization (PPO)
    and RLHF: This chapter looks at natural policy gradients that motivated PPO along
    with a line-by-line walkthrough of PPO implementation. The chapter introduces
    Large Language Models (LLM) and related concepts. This is followed by an in-depth
    discussion on RLHF along with a working example.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第 [11](502835_2_En_11_Chapter.xhtml) 章，近端策略优化（PPO）和强化学习与人类反馈（RLHF）：本章探讨了激励 PPO
    的自然策略梯度，并逐行介绍了 PPO 的实现。本章介绍了大型语言模型（LLM）和相关概念。随后，对 RLHF 进行了深入讨论，并附有工作示例。
- en: 'Chapter [12](502835_2_En_12_Chapter.xhtml), Multiagent RL (MARL): This chapter
    introduces the concept of multiple agents in the same environment, the theoretical
    foundations, the new taxonomy for MARL, its linkage to game theory, the new challenges,
    and the RL solution approaches for MARL.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第 [12](502835_2_En_12_Chapter.xhtml) 章，多智能体强化学习（MARL）：本章介绍了同一环境中的多个智能体概念，其理论基础，MARL
    的新分类法，它与博弈论的联系，新挑战，以及 MARL 的强化学习解决方案方法。
- en: 'Chapter [13](502835_2_En_13_Chapter.xhtml), Additional Topics and Recent Advances:
    This chapter surveys various other extensions of reinforcement learning. It touches
    on concepts like world models, decision transformers, automatic curriculum learning
    imitation and inverse learning, derivative-free methods, transfer and multi-task
    learning, meta learning, unsupervised zero-shot RL, and a lot more.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第 [13](502835_2_En_13_Chapter.xhtml) 章，额外主题和最新进展：本章概述了强化学习的各种其他扩展。它涉及世界模型、决策转换器、自动课程学习、模仿和逆学习、无导数方法、迁移和多任务学习、元学习、无监督零样本强化学习等内容。
- en: Acknowledgments
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 致谢
- en: A huge thank you to the Apress team—particularly Sowmya Thodur, Celestin John,
    Mark Powers, and Joseph Quatela—for their guidance and help in making this publication
    possible. A huge shoutout to Akshay Kulkarni for meticulously reviewing the drafts
    to ensure accuracy and completeness and for verifying the code. My gratitude also
    extends to all the Apress staff who contributed in various ways.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢 Apress 团队——尤其是 Sowmya Thodur、Celestin John、Mark Powers 和 Joseph Quatela——在使这本书成为可能的过程中提供的指导和帮助。特别感谢
    Akshay Kulkarni 对草稿进行了细致的审查，以确保准确性和完整性，并验证了代码。我对所有以各种方式为 Apress 做出贡献的员工也表示感激。
- en: A special mention to my wife, Suman, who once again became the pillar of our
    family, shielding me from distractions and providing me the peace and space needed
    to write this second edition. Your unwavering support was crucial.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 特别感谢我的妻子，Suman，她再次成为我们家庭的支柱，保护我免受干扰，为我提供写作第二版所需的平静和空间。您的坚定支持至关重要。
- en: I must also express my gratitude to the readers of the first edition, whose
    constructive feedback was instrumental in shaping this edition. I eagerly await
    your honest opinions of this book—did it meet your expectations, and was it worth
    your time? Your feedback is invaluable, and I’m available at `nimish.sanghi@gmail.com`
    or [`https://github.com/nsanghi`](https://github.com/nsanghi) for any comments
    or suggestions.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我还必须向第一版的读者表示感谢，他们的建设性反馈对于塑造这一版至关重要。我热切期待您对这本书的真实评价——它是否达到了您的期望，是否值得您的时间？您的反馈是无价的，我可通过
    `nimish.sanghi@gmail.com` 或 [https://github.com/nsanghi](https://github.com/nsanghi)
    接收任何评论或建议。
