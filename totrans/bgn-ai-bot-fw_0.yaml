- en: Acknowledgments
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 致谢
- en: For me, writing this book was highly inspiring and challenging because of ongoing
    changes to the technology stacks of the various bot frameworks, so I would like
    to express special thanks and gratitude to all my teachers and mentors. It was
    a fascinating journey to complete the book; thanks to all my friends and family
    for the support.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我来说，由于各种机器人框架的技术堆栈持续变化，撰写这本书既具有高度启发性又充满挑战，因此我想向所有我的老师和导师表达特别的感谢和感激。完成这本书的过程非常迷人；感谢所有我的朋友和家人给予的支持。
