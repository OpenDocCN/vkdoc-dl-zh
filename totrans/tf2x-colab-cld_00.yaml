- en: Introduction
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 引言
- en: We apply the TensorFlow 2.x end-to-end open source platform within the Google
    Colaboratory cloud service to demonstrate deep learning exercises with Python
    code to help readers solve deep learning problems. The book is designed for those
    with intermediate to advanced programming skills and some experience with machine
    learning algorithms. We focus on application of the algorithms rather than theory.
    So readers should read about the theory online or from other sources if appropriate.
    The reader should also be willing to spend a lot of time working through the code
    examples because they are pretty deep. But the effort will pay off because the
    exercises are intended to help the reader tackle complex problems.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在 Google Colaboratory 云服务中应用 TensorFlow 2.x 的端到端开源平台，通过 Python 代码演示深度学习练习，帮助读者解决深度学习问题。本书是为那些具有中级到高级编程技能以及一些机器学习算法经验的读者所设计的。我们侧重于算法的应用，而不是理论。因此，如果适当的话，读者应该从网上或其他来源了解理论。读者还应愿意花大量时间通过代码示例，因为它们相当深入。但这样的努力是值得的，因为这些练习旨在帮助读者解决复杂问题。
- en: The book is organized into ten chapters. Chapter [1](501128_1_En_1_Chapter.xhtml)
    introduces the topic of deep learning, neural networks, TensorFlow 2.x, Google
    Colaboratory, tensors, and input pipelines. Chapter [2](501128_1_En_2_Chapter.xhtml)
    works through a complete deep learning example. Chapter [3](501128_1_En_3_Chapter.xhtml)
    introduces TensorFlow datasets and works through a complete example. Chapter [4](501128_1_En_4_Chapter.xhtml)
    demonstrates how to work with other types of data. Chapter [5](501128_1_En_5_Chapter.xhtml)
    introduces classification and works through a complete deep learning example.
    Chapter [6](501128_1_En_6_Chapter.xhtml) introduces regression and works through
    deep learning examples. Chapter [7](501128_1_En_7_Chapter.xhtml) introduces convolutional
    neural networks (CNNs) and their architecture and works through a complete example.
    Chapter [8](501128_1_En_8_Chapter.xhtml) introduces recurrent neural networks
    and works through an automated text generation example. Chapter [9](501128_1_En_9_Chapter.xhtml)
    uses recurrent neural networks for sentiment analysis. Chapter [10](501128_1_En_10_Chapter.xhtml)
    uses recurrent neural networks for time series forecasting.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 本书分为十章。第一章[1](501128_1_En_1_Chapter.xhtml)介绍了深度学习、神经网络、TensorFlow 2.x、Google
    Colaboratory、张量和输入管道等主题。第二章[2](501128_1_En_2_Chapter.xhtml)通过一个完整的深度学习示例进行讲解。第三章[3](501128_1_En_3_Chapter.xhtml)介绍了TensorFlow数据集，并通过一个完整的示例进行讲解。第四章[4](501128_1_En_4_Chapter.xhtml)演示了如何处理其他类型的数据。第五章[5](501128_1_En_5_Chapter.xhtml)介绍了分类，并通过一个完整的深度学习示例进行讲解。第六章[6](501128_1_En_6_Chapter.xhtml)介绍了回归，并通过深度学习示例进行讲解。第七章[7](501128_1_En_7_Chapter.xhtml)介绍了卷积神经网络（CNNs）及其架构，并通过一个完整的示例进行讲解。第八章[8](501128_1_En_8_Chapter.xhtml)介绍了循环神经网络，并通过自动文本生成示例进行讲解。第九章[9](501128_1_En_9_Chapter.xhtml)使用循环神经网络进行情感分析。第十章[10](501128_1_En_10_Chapter.xhtml)使用循环神经网络进行时间序列预测。
