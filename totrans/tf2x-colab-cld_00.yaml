- en: Download this book’s example data by clicking the “Download source code” button
    found on the book’s catalog page at [`www.apress.com/us/book/9781484266489`](http://www.apress.com/us/book/9781484266489)
    . It can also be downloaded directly from [`www.github.com/Apress/tensorflow-2.x-in-the-colab-cloud`](http://www.github.com/Apress/tensorflow-2.x-in-the-colab-cloud)
    .
