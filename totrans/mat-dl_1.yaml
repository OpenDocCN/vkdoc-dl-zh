- en: 1. Machine Learning
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 1. 机器学习
- en: You easily find examples where the concepts of Machine Learning and Deep Learning
    are used interchangeably in the media. However, experts generally distinguish
    them. If you have decided to study this field, it’s important you understand what
    these words actually mean, and more importantly, how they differ.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 你很容易在媒体中找到将机器学习和深度学习的概念互换使用的例子。然而，专家们通常将它们区分开来。如果你已经决定学习这个领域，了解这些词的实际含义非常重要，更重要的是，了解它们之间的区别。
- en: What occurred to you when you heard the term “Machine Learning” for the first
    time? Did you think of something that was similar to Figure [1-1](#Fig1)? Then
    you must admit that you are seriously literal-minded.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 当你第一次听到“机器学习”这个术语时，你想到的是什么？你是否想到了与图 [1-1](#Fig1) 类似的东西？那么你必须承认你非常字面化。
- en: '![A448947_1_En_1_Fig1_HTML.jpg](A448947_1_En_1_Fig1_HTML.jpg)'
  id: totrans-3
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_1_Fig1_HTML.jpg](A448947_1_En_1_Fig1_HTML.jpg)'
- en: Figure 1-1.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-1。
- en: Machine Learning or Artificial Intelligence ? Courtesy of Euclidean Technologies
    Management ( [`www.euclidean.com`](http://www.euclidean.com) )
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习或人工智能？感谢欧几里得技术管理公司（[www.euclidean.com](http://www.euclidean.com)）
- en: Figure [1-1](#Fig1) portrays Artificial Intelligence much more than Machine
    Learning. Understanding Machine Learning in this way will bring about serious
    confusion. Although Machine Learning is indeed a branch of Artificial Intelligence,
    it conveys an idea that is much different from what this image may imply.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [1-1](#Fig1) 展示的更多是人工智能而非机器学习。以这种方式理解机器学习将导致严重的混淆。尽管机器学习确实是人工智能的一个分支，但它传达的理念与这幅图像可能暗示的内容大相径庭。
- en: 'In general, Artificial Intelligence , Machine Learning , and Deep Learning
    are related as follows:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，人工智能、机器学习和深度学习之间的关系如下：
- en: “Deep Learning is a kind of Machine Learning, and Machine Learning is a kind
    of Artificial Intelligence.”
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “深度学习是一种机器学习，机器学习是一种人工智能。”
- en: How is that? It’s simple, isn’t it? This classification may not be as absolute
    as the laws of nature, but it is widely accepted.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这是怎么样的？很简单，不是吗？这种分类可能不如自然法则那样绝对，但它被广泛接受。
- en: Let’s dig into it a little further. Artificial Intelligence is a very common
    word that may imply many different things. It may indicate any form of technology
    that includes some intelligent aspects rather than pinpoint a specific technology
    field. In contrast, Machine Learning refers to a specific field. In other words,
    we use Machine Learning to indicate a specific technological group of Artificial
    Intelligence. Machine Learning itself includes many technologies as well. One
    of them is Deep Learning , which is the subject of this book.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们进一步挖掘。人工智能是一个非常常见的词，它可能意味着许多不同的事情。它可能指代任何包含一些智能方面的技术，而不是指明一个特定的技术领域。相比之下，机器学习指的是一个特定的领域。换句话说，我们使用机器学习来指代人工智能的一个特定技术群体。机器学习本身也包括许多技术。其中之一是深度学习，这是本书的主题。
- en: The fact that Deep Learning is a type of Machine Learning is very important,
    and that is why we are going through this lengthy review on how Artificial Intelligence,
    Machine Learning, and Deep Learning are related. Deep Learning has been in the
    spotlight recently as it has proficiently solved some problems that have challenged
    Artificial Intelligence. Its performance surely is exceptional in many fields.
    However, it faces limitations as well. The limitations of Deep Learning stems
    from its fundamental concepts that has been inherited from its ancestor, Machine
    Learning. As a type of Machine Learning, Deep Learning cannot avoid the fundamental
    problems that Machine Learning faces. That is why we need to review Machine Learning
    before discussing the concept of Deep Learning.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习是一种机器学习的事实非常重要，这就是为什么我们要通过这个冗长的回顾来了解人工智能、机器学习和深度学习之间的关系。深度学习最近一直处于聚光灯下，因为它成功地解决了人工智能面临的某些挑战。它在许多领域的表现无疑是卓越的。然而，它也面临着局限性。深度学习的局限性源于其从祖先机器学习继承的基本概念。作为一种机器学习，深度学习无法避免机器学习面临的基本问题。这就是为什么在讨论深度学习的概念之前，我们需要回顾机器学习。
- en: What Is Machine Learning?
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是机器学习？
- en: In short, Machine Learning is a modeling technique that involves data. This
    definition may be too short for first-timers to capture what it means. So, let
    me elaborate on this a little bit. Machine Learning is a technique that figures
    out the “model” out of “data.” Here, the data literally means information such
    as documents, audio, images, etc. The “model” is the final product of Machine
    Learning.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，机器学习是一种涉及数据的建模技术。这个定义可能对初学者来说太简短，无法捕捉其含义。所以，让我稍微详细地解释一下。机器学习是一种从“数据”中找出“模型”的技术。在这里，“数据”字面上指的是诸如文档、音频、图像等信息。而“模型”是机器学习的最终产品。
- en: Before we go further into the model, let me deviate a bit. Isn’t it strange
    that the definition of Machine Learning only addresses the concepts of data and
    model and has nothing to do with “learning”? The name itself reflects that the
    technique analyzes the data and finds the model by itself rather than having a
    human do it. We call it “learning” because the process resembles being trained
    with the data to solve the problem of finding a model. Therefore, the data that
    Machine Learning uses in the modeling process is called “training” data. Figure
    [1-2](#Fig2) illustrates what happens in the Machine Learning process .
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们进一步讨论模型之前，让我稍微偏离一下。机器学习的定义只涉及数据和模型的概念，而没有涉及到“学习”，这不是很奇怪吗？这个名字本身反映了这种技术是分析数据并自行找到模型，而不是由人类来完成。我们称之为“学习”，因为这个过程类似于用数据训练以解决找到模型的问题。因此，机器学习在建模过程中使用的数据被称为“训练数据”。图
    [1-2](#Fig2) 阐述了机器学习过程中发生的情况。
- en: '![A448947_1_En_1_Fig2_HTML.gif](A448947_1_En_1_Fig2_HTML.gif)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_1_Fig2_HTML.gif](A448947_1_En_1_Fig2_HTML.gif)'
- en: Figure 1-2.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-2。
- en: What happens during the machine learning process
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习过程中发生的情况
- en: Now, let’s resume our discussion about the model. Actually, the model is nothing
    more than what we want to achieve as the final product. For instance, if we are
    developing an auto-filtering system to remove spam mail, the spam mail filter
    is the model that we are talking about. In this sense, we can say the model is
    what we actually use. Some call the model a hypothesis. This term seems more intuitive
    to those with statistical backgrounds.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们继续讨论模型。实际上，模型不过是我们要作为最终产品实现的东西。例如，如果我们正在开发一个自动过滤系统以删除垃圾邮件，那么垃圾邮件过滤器就是我们所说的模型。从这个意义上说，我们可以说模型是我们实际使用的。有些人把模型称为假设。这个术语对有统计背景的人来说似乎更直观。
- en: Machine Learning is not the only modeling technique. In the field of dynamics,
    people have been using a certain modeling technique , which employs Newton’s laws
    and describes the motion of objects as a series of equations called equations
    of motion, for a long time. In the field of Artificial Intelligence, we have the
    expert system, which is a problem-solving model that is based on the knowledge
    and know-how of the experts. The model works as well as the experts themselves.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习并不是唯一的建模技术。在动力学领域，人们长期以来一直在使用一种特定的建模技术，该技术采用牛顿定律，将物体的运动描述为一系列称为运动方程的方程。在人工智能领域，我们有专家系统，这是一个基于专家知识和技能的问题解决模型。该模型的效果与专家本人一样好。
- en: However, there are some areas where laws and logical reasoning are not very
    useful for modeling. Typical problems can be found where intelligence is involved,
    such as image recognition, speech recognition, and natural language processing.
    Let me give you an example. Look at Figure [1-3](#Fig3) and identify the numbers.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在涉及智能的某些领域，法律和逻辑推理对于建模并不非常有效。典型的例子可以在涉及智能的领域找到，例如图像识别、语音识别和自然语言处理。让我给你举一个例子。看看图
    [1-3](#Fig3) 并识别出数字。
- en: '![A448947_1_En_1_Fig3_HTML.jpg](A448947_1_En_1_Fig3_HTML.jpg)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_1_Fig3_HTML.jpg](A448947_1_En_1_Fig3_HTML.jpg)'
- en: Figure 1-3.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-3。
- en: How does a computer identify numbers when they have no recognizable pattern?
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 当数字没有可识别的模式时，计算机是如何识别它们的？
- en: I’m sure you have completed the task in no time. Most people do. Now, let’s
    make a computer do the same thing. What do we do? If we use a traditional modeling
    technique, we will need to find some rule or algorithm to distinguish the written
    numbers. Hmm, why don’t we apply the rules that you have just used to identify
    the numbers in your brain? Easy enough, isn’t it? Well, not really. In fact, this
    is a very challenging problem. There was a time when researchers thought it must
    be a piece of cake for computers to do this, as it is very easy for even a human
    and computers are able to calculate much faster than humans. Well, it did not
    take very long until they realized their misjudgment.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我相信你很快就完成了任务。大多数人都是这样。现在，让我们让计算机做同样的事情。我们怎么做？如果我们使用传统的建模技术，我们需要找到一些规则或算法来区分手写的数字。嗯，为什么不应用你刚才用来识别大脑中数字的规则呢？这很容易，不是吗？实际上，这是一个非常具有挑战性的问题。曾经研究人员认为，对于计算机来说做这件事轻而易举，因为即使是人类也很容易做到，而且计算机的计算速度比人类快得多。然而，他们很快意识到自己的误判。
- en: How were you able to identify the numbers without a clear specification or a
    rule? It is hard to answer, isn’t it? But, why? It is because we have never learned
    such a specification. From a young age, we have just learned that this is 0, and
    that this is 1\. We just thought that’s what it is and became better at distinguishing
    numbers as we faced a variety of numbers. Am I right?
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 没有明确的指定或规则，你是如何识别这些数字的？这很难回答，不是吗？但是，为什么？这是因为我们从未学习过这样的指定。从很小的时候起，我们就只是学习了这是0，这是1。我们只是认为这就是它，并且随着我们面对各种各样的数字，我们变得更加擅长区分数字。我说的对吗？
- en: What about computers, then? Why don’t we let computers do the same thing? That’s
    it! Congratulations! You have just grasped the concept of Machine Learning . Machine
    Learning has been created to solve the problems for which analytical models are
    hardly available. The primary idea of Machine Learning is to achieve a model using
    the training data when equations and laws are not promising.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，计算机呢？为什么我们不让计算机做同样的事情？就是这样！恭喜你！你刚刚掌握了机器学习的概念。机器学习是为了解决那些分析模型几乎不可用的问题而创建的。机器学习的主要思想是在方程式和法律不奏效的情况下，使用训练数据来实现模型。
- en: Challenges with Machine Learning
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 机器学习的挑战
- en: We just discovered that Machine Learning is the technique used to find (or learn)
    a model from the data. It is suitable for problems that involve intelligence,
    such as image recognition and speech recognition, where physical laws or mathematical
    equations fail to produce a model. On the one hand, the approach that Machine
    Learning uses is what makes the process work. On the other hand, it brings inevitable
    problems. This section provides the fundamental issues Machine Learning faces.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我们刚刚发现，机器学习是一种从数据中寻找（或学习）模型的技术。它适用于涉及智能的问题，如图像识别和语音识别，在这些领域中，物理定律或数学方程式无法产生模型。一方面，机器学习使用的方法使得这个过程得以工作。另一方面，它也带来了不可避免的问题。本节提供了机器学习面临的基本问题。
- en: Once the Machine Learning process finds the model from the training data, we
    apply the model to the actual field data. This process is illustrated in Figure
    [1-4](#Fig4). The vertical flow of the figure indicates the learning process,
    and the trained model is described as the horizontal flow, which is called inference.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦机器学习过程从训练数据中找到模型，我们就将模型应用于实际领域数据。这个过程如图[1-4](#Fig4)所示。图中的垂直流程表示学习过程，而训练好的模型则描述为水平流程，这被称为推理。
- en: '![A448947_1_En_1_Fig4_HTML.gif](A448947_1_En_1_Fig4_HTML.gif)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_1_Fig4_HTML.gif](A448947_1_En_1_Fig4_HTML.gif)'
- en: Figure 1-4.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-4。
- en: Applying a model based on field data
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 基于现场数据应用模型
- en: The data that is used for modeling in Machine Learning and the data supplied
    in the field application are distinct. Let’s add another block to this image,
    as shown in Figure [1-5](#Fig5), to better illustrate this situation.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在机器学习和实际应用领域提供的数据是不同的。让我们在这个图像中添加另一个块，如图[1-5](#Fig5)所示，以更好地说明这种情况。
- en: '![A448947_1_En_1_Fig5_HTML.gif](A448947_1_En_1_Fig5_HTML.gif)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_1_Fig5_HTML.gif](A448947_1_En_1_Fig5_HTML.gif)'
- en: Figure 1-5.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-5。
- en: Training and input data are sometimes very distinct
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 训练数据和输入数据有时非常不同
- en: The distinctness of the training data and input data is the structural challenge
    that Machine Learning faces. It is no exaggeration to say that every problem of
    Machine Learning originates from this. For example, what about using training
    data, which is composed of handwritten notes from a single person? Will the model
    successfully recognize the other person’s handwriting? The possibility will be
    very low.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 训练数据和输入数据的区别是机器学习面临的结构性挑战。说每个机器学习问题都源于这一点并不夸张。例如，使用由单个人手写笔记组成的训练数据会怎样？模型能否成功识别其他人的手写笔迹？可能性非常低。
- en: No Machine Learning approach can achieve the desired goal with the wrong training
    data. The same ideology applies to Deep Learning. Therefore, it is critical for
    Machine Learning approaches to obtain unbiased training data that adequately reflects
    the characteristics of the field data. The process used to make the model performance
    consistent regardless of the training data or the input data is called generalization
    . The success of Machine Learning relies heavily on how well the generalization
    is accomplished.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 没有一种机器学习方法可以用错误的训练数据达到预期的目标。同样的理念也适用于深度学习。因此，对于机器学习方法来说，获取能够充分反映领域数据特征的、无偏见的训练数据至关重要。使模型性能在训练数据或输入数据变化时保持一致的过程称为泛化。机器学习的成功在很大程度上取决于泛化是否成功。
- en: Overfitting
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 过度拟合
- en: One of the primary causes of corruption of the generalization process is overfitting.
    Yes, another new term. However, there is no need to be frustrated. It is not a
    new concept at all. It will be much easier to understand with a case study than
    with just sentences.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 泛化过程腐败的一个主要原因是过度拟合。是的，另一个新术语。然而，没有必要感到沮丧。这根本不是什么新概念。通过案例研究比仅仅通过句子更容易理解。
- en: Consider a classification problem shown in Figure [1-6](#Fig6). We need to divide
    the position (or coordinate) data into two groups. The points on the figure are
    the training data. The objective is to determine a curve that defines the border
    of the two groups using the training data.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑图[1-6](#Fig6)中显示的分类问题。我们需要将位置（或坐标）数据划分为两组。图上的点代表训练数据。目标是使用训练数据确定一条曲线，以定义两组数据的边界。
- en: '![A448947_1_En_1_Fig6_HTML.jpg](A448947_1_En_1_Fig6_HTML.jpg)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_1_Fig6_HTML.jpg](A448947_1_En_1_Fig6_HTML.jpg)'
- en: Figure 1-6.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-6。
- en: Determine a curve to divide two groups of data
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 确定一条曲线来划分两组数据
- en: Although we see some outliers that deviate from the adequate area, the curve
    shown in Figure [1-7](#Fig7) seems to act as a reasonable border between the groups.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们看到一些偏离适当区域的异常值，但图[1-7](#Fig7)中显示的曲线似乎在两组之间充当了一个合理的边界。
- en: '![A448947_1_En_1_Fig7_HTML.jpg](A448947_1_En_1_Fig7_HTML.jpg)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_1_Fig7_HTML.jpg](A448947_1_En_1_Fig7_HTML.jpg)'
- en: Figure 1-7.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-7。
- en: Curve to differentiate between two types of data
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 用于区分两种数据的曲线
- en: When we judge this curve, there are some points that are not correctly classified
    according to the border. What about perfectly grouping the points using a complex
    curve, as shown in Figure [1-8](#Fig8)?
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们评估这条曲线时，有一些点根据边界没有被正确分类。那么，使用如图[1-8](#Fig8)所示的复杂曲线完美分组这些点怎么样？
- en: '![A448947_1_En_1_Fig8_HTML.jpg](A448947_1_En_1_Fig8_HTML.jpg)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_1_Fig8_HTML.jpg](A448947_1_En_1_Fig8_HTML.jpg)'
- en: Figure 1-8.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-8。
- en: Better grouping, but at what cost?
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 更好的分组，但代价是什么？
- en: This model yields the perfect grouping performance for the training data. How
    does it look? Do you like this model better? Does it seem to reflect correctly
    the general behavior?
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 这个模型为训练数据提供了完美的分组性能。它看起来怎么样？你是否更喜欢这个模型？它似乎正确反映了总体行为？
- en: Now, let’s use this model in the real world. The new input to the model is indicated
    using the symbol ■, as shown in Figure [1-9](#Fig9).
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们将这个模型应用于现实世界。模型的新输入用符号■表示，如图[1-9](#Fig9)所示。
- en: '![A448947_1_En_1_Fig9_HTML.jpg](A448947_1_En_1_Fig9_HTML.jpg)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_1_Fig9_HTML.jpg](A448947_1_En_1_Fig9_HTML.jpg)'
- en: Figure 1-9.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-9。
- en: The new input is placed into the data
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 新输入被放入数据中
- en: This proud error-free model identifies the new data as a class ∆. However, the
    general trend of the training data tells us that this is doubtable. Grouping it
    as a class • seems more reasonable. What happened to the model that yielded 100%
    accuracy for the training data?
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 这个无错误的骄傲模型将新数据识别为类别∆。然而，训练数据的一般趋势告诉我们这是可疑的。将其分组为类别•似乎更合理。那个为训练数据产生100%准确率的模型怎么了？
- en: Let’s take another look at the data points. Some outliers penetrate the area
    of the other group and disturb the boundary. In other words, this data contains
    much noise. The problem is that there is no way for Machine Learning to distinguish
    this. As Machine Learning considers all the data, even the noise, it ends up producing
    an improper model (a curve in this case). This would be penny-wise and pound-foolish.
    As you may notice here, the training data is not perfect and may contain varying
    amounts of noise. If you believe that every element of the training data is correct
    and fits the model precisely, you will get a model with lower generalizability.
    This is called overfitting.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们再次审视数据点。一些异常值穿透了其他组的区域并干扰了边界。换句话说，这些数据包含了很多噪声。问题是机器学习无法区分这些噪声。由于机器学习考虑了所有数据，包括噪声，最终产生了一个不恰当的模型（在这种情况下是一个曲线）。这将是小聪明，大愚蠢。正如你可能注意到的，训练数据并不完美，可能包含不同数量的噪声。如果你认为训练数据中的每个元素都是正确的，并且精确地符合模型，那么你将得到一个泛化能力较低的模型。这被称为过拟合。
- en: Certainly, because of its nature, Machine Learning should make every effort
    to derive an excellent model from the training data. However, a working model
    of the training data may not reflect the field data properly. This does not mean
    that we should make the model less accurate than the training data on purpose.
    This will undermine the fundamental strategy of Machine Learning .
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，由于机器学习的本质，我们应该尽一切努力从训练数据中推导出一个优秀的模型。然而，训练数据的工作模型可能无法正确反映现场数据。这并不意味着我们应该故意使模型比训练数据更不准确。这将破坏机器学习的基本策略。
- en: Now we face a dilemma—reducing the error of the training data leads to overfitting
    that degrades generalizability. What do we do? We confront it, of course! The
    next section introduces the techniques that prevent overfitting.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们面临一个困境——减少训练数据的错误会导致过拟合，从而降低泛化能力。我们该怎么办？当然，我们要面对它！下一节将介绍防止过拟合的技术。
- en: Confronting Overfitting
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 面对过拟合
- en: 'Overfitting significantly affects the level of performance of Machine Learning.
    We can tell who is a pro and who is an amateur by watching their respective approaches
    in dealing with overfitting. This section introduces two typical methods used
    to confront overfitting: regularization and validation.'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 过拟合显著影响了机器学习的性能水平。我们可以通过观察他们处理过拟合的方法来区分谁是专家，谁是业余爱好者。本节介绍了两种用于面对过拟合的典型方法：正则化和验证。
- en: Regularization is a numerical method that attempts to construct a model structure
    as simple as possible. The simplified model can avoid the effects of overfitting
    at the small cost of performance. The grouping problem of the previous section
    can be used as a good example. The complex model (or curve) tends to be overfitting.
    In contrast, although it fails to classify correctly some points, the simple curve
    reflects the overall characteristics of the group much better. If you understand
    how it works, that is enough for now. We will revisit regularization with further
    details in Chapter Three’s “Cost Function and Learning Rule” section.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 正则化是一种尝试构建尽可能简单模型结构的数值方法。简化的模型可以在牺牲性能的小代价下避免过拟合的影响。上一节中的分组问题可以用作一个好的例子。复杂的模型（或曲线）往往容易过拟合。相比之下，尽管它未能正确分类一些点，但简单的曲线能更好地反映组的整体特征。如果你理解它是如何工作的，那么现在就足够了。我们将在第三章的“代价函数和学习规则”部分进一步详细介绍正则化。
- en: We are able to tell that the grouping model is overfitted because the training
    data is simple, and the model can be easily visualized. However, this is not the
    case for most situations, as the data has higher dimensions. We cannot draw the
    model and intuitively evaluate the effects of overfitting for such data. Therefore,
    we need another method to determine whether the trained model is overfitted or
    not. This is where validation comes into play.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 我们能够判断分组模型是否过拟合，因为训练数据简单，模型可以轻易可视化。然而，在大多数情况下并非如此，因为数据具有更高的维度。我们无法绘制模型并直观地评估过拟合对这类数据的影响。因此，我们需要另一种方法来确定训练的模型是否过拟合。这就是验证发挥作用的地方。
- en: The validation is a process that reserves a part of the training data and uses
    it to monitor the performance. The validation set is not used for the training
    process. Because the modeling error of the training data fails to indicate overfitting,
    we use some of the training data to check if the model is overfitted. We can say
    that the model is overfitted when the trained model yields a low level of performance
    to the reserved data input. In this case, we will modify the model to prevent
    the overfitting. Figure [1-10](#Fig10) illustrates the division of the training
    data for the validation process .
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 验证是一个保留部分训练数据并使用它来监控性能的过程。验证集不用于训练过程。因为训练数据的建模误差无法指示过度拟合，我们使用一些训练数据来检查模型是否过度拟合。当训练模型对保留的数据输入产生低水平的表现时，我们可以称模型为过度拟合。在这种情况下，我们将修改模型以防止过度拟合。图
    [1-10](#Fig10) 阐述了验证过程中训练数据的划分。
- en: '![A448947_1_En_1_Fig10_HTML.gif](A448947_1_En_1_Fig10_HTML.gif)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_1_Fig10_HTML.gif](A448947_1_En_1_Fig10_HTML.gif)'
- en: Figure 1-10.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-10.
- en: Dividing the training data for the validation process
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 验证过程中的训练数据划分
- en: 'When validation is involved, the training process of Machine Learning proceeds
    by the following steps:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及验证时，机器学习的训练过程按照以下步骤进行：
- en: 'Divide the training data into two groups: one for training and the other for
    validation. As a rule of thumb, the ratio of the training set to the validation
    set is 8:2.'
  id: totrans-71
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将训练数据分为两组：一组用于训练，另一组用于验证。一般来说，训练集与验证集的比例为 8:2。
- en: Train the model with the training set.
  id: totrans-72
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用训练集训练模型。
- en: Evaluate the performance of the model using the validation set.
  id: totrans-73
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用验证集评估模型的性能。
- en: If the model yields satisfactory performance, finish the training.
  id: totrans-74
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果模型产生令人满意的表现，完成训练。
- en: If the performance does not produce sufficient results, modify the model and
    repeat the process from Step 2.
  id: totrans-75
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果性能没有产生足够的结果，修改模型并从步骤 2 重复过程。
- en: Cross-validation is a slight variation of the validation process . It still
    divides the training data into groups for the training and validation, but keeps
    changing the datasets. Instead of retaining the initially divided sets, cross-validation
    repeats the division of the data. The reason for doing this is that the model
    can be overfitted even to the validation set when it is fixed. As the cross-validation
    maintains the randomness of the validation dataset, it can better detect the overfitting
    of the model. Figure [1-11](#Fig11) describes the concept of cross-validation.
    The dark shades indicate the validation data, which is randomly selected throughout
    the training process.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 交叉验证是验证过程的一种轻微变化。它仍然将训练数据分为用于训练和验证的组，但不断改变数据集。而不是保留最初划分的集合，交叉验证重复数据的划分。这样做的原因是，当数据集固定时，模型甚至可能过度拟合验证集。由于交叉验证保持了验证数据集的随机性，它可以更好地检测模型的过度拟合。图
    [1-11](#Fig11) 描述了交叉验证的概念。深色阴影表示验证数据，在整个训练过程中随机选择。
- en: '![A448947_1_En_1_Fig11_HTML.gif](A448947_1_En_1_Fig11_HTML.gif)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_1_Fig11_HTML.gif](A448947_1_En_1_Fig11_HTML.gif)'
- en: Figure 1-11.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-11.
- en: Cross-validation
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 交叉验证
- en: Types of Machine Learning
  id: totrans-80
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 机器学习的类型
- en: Many different types of Machine Learning techniques have been developed to solve
    problems in various fields. These Machine Learning techniques can be classified
    into three types depending on the training method (see Figure [1-12](#Fig12)).
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 已经开发了许多不同类型的机器学习技术来解决各个领域的问题。这些机器学习技术可以根据训练方法（见图 [1-12](#Fig12)）分为三种类型。
- en: '![A448947_1_En_1_Fig12_HTML.gif](A448947_1_En_1_Fig12_HTML.gif)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_1_Fig12_HTML.gif](A448947_1_En_1_Fig12_HTML.gif)'
- en: Figure 1-12.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-12.
- en: Three types of Machine Learning techniques
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 三种机器学习技术类型
- en: Supervised learning
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 监督学习
- en: Unsupervised learning
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无监督学习
- en: Reinforcement learning
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 强化学习
- en: Supervised learning is very similar to the process in which a human learns things.
    Consider that humans obtain new knowledge as we solve exercise problems.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 监督学习非常类似于人类学习的过程。考虑人类在解决练习问题时获得新知识。
- en: Select an exercise problem. Apply current knowledge to solve the problem. Compare
    the answer with the solution.
  id: totrans-89
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择一个练习问题。应用当前知识解决问题。比较答案与解决方案。
- en: If the answer is wrong, modify current knowledge.
  id: totrans-90
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果答案错误，修改当前知识。
- en: Repeat Steps 1 and 2 for all the exercise problems.
  id: totrans-91
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对所有练习问题重复步骤 1 和 2。
- en: When we apply an analogy between this example and the Machine Learning process,
    the exercise problems and solutions correspond to the training data, and the knowledge
    corresponds to the model. The important thing is the fact that we need the solutions.
    This is the vital aspect of the supervised learning. Its name even implies the
    tutoring in which the teacher gives solutions to the students to memorize.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们将这个例子与机器学习过程进行类比时，练习问题和解决方案对应于训练数据，知识对应于模型。重要的是我们需要解决方案。这是监督学习的关键方面。它的名字甚至暗示了教师向学生提供解决方案以供记忆的辅导。
- en: In supervised learning, each training dataset should consist of input and correct
    output pairs. The correct output is what the model is supposed to produce for
    the given input.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 在监督学习中，每个训练数据集应包含输入和正确输出对。正确的输出是模型对于给定输入应该产生的结果。
- en: '[PRE0]'
  id: totrans-94
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Learning in supervised learning is the series of revisions of a model to reduce
    the difference between the correct output and the output from the model for the
    same input. If a model is perfectly trained, it will produce a correct output
    that corresponds to the input from the training data.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 在监督学习中，学习是模型的一系列修订，以减少正确输出和模型对于相同输入的输出之间的差异。如果一个模型被完全训练，它将产生与训练数据输入相对应的正确输出。
- en: In contrast, the training data of the unsupervised learning contains only inputs
    without correct outputs.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 相比之下，无监督学习的训练数据只包含输入，没有正确输出。
- en: '[PRE1]'
  id: totrans-97
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: At a first glance, it may seem difficult to understand how to train without
    correct outputs. However, many methods of this type have been developed already.
    Unsupervised learning is generally used for investigating the characteristics
    of the data and preprocessing the data. This concept is similar to a student who
    just sorts out the problems by construction and attribute and doesn’t learn how
    to solve them because there are no known correct outputs.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 乍一看，可能觉得很难理解没有正确输出如何进行训练。然而，已经开发了许多此类方法。无监督学习通常用于调查数据的特征和预处理数据。这个概念类似于一个学生只是通过构造和属性整理问题，而没有学习如何解决问题，因为没有已知的正确输出。
- en: Reinforcement learning employs sets of input, some output, and grade as training
    data. It is generally used when optimal interaction is required, such as control
    and game plays.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习使用输入集、一些输出和评分作为训练数据。它通常用于需要最佳交互的情况，例如控制和游戏玩法。
- en: '[PRE2]'
  id: totrans-100
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: This book only covers supervised learning. It is used for more applications
    compared to unsupervised learning and reinforcement learning, and more importantly,
    it is the first concept you will study when entering the world of Machine Learning
    and Deep Learning.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 本书仅涵盖监督学习。与无监督学习和强化学习相比，它有更多的应用，更重要的是，它是进入机器学习和深度学习世界时首先学习的基本概念。
- en: Classification and Regression
  id: totrans-102
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 分类和回归
- en: The two most common types of application of supervised learning are classification
    and regression. These words may sound unfamiliar, but are actually not so challenging.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 监督学习的两种最常见应用类型是分类和回归。这些词可能听起来不熟悉，但实际上并不那么具有挑战性。
- en: Let’s start with classification. This may be the most prevailing application
    of Machine Learning. The classification problem focuses on literally finding the
    classes to which the data belongs. Some examples may help.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从分类开始。这可能是机器学习最普遍的应用。分类问题侧重于字面上找到数据所属的类别。一些例子可能会有所帮助。
- en: Spam mail filtering service ➔ Classifies the mails by regular or spam
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 垃圾邮件过滤服务 ➔ 根据常规或垃圾邮件对邮件进行分类
- en: Digit recognition service ➔ Classifies the digit image into one of 0-9
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 数字识别服务 ➔ 将数字图像分类为0-9之一
- en: Face recognition service ➔ Classifies the face image into one of the registered
    users
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 面部识别服务 ➔ 将面部图像分类为注册用户之一
- en: 'We addressed in the previous section that supervised learning requires input
    and correct output pairs for the training data. Similarly, the training data of
    the classification problem looks like this:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一节中，我们提到监督学习需要输入和正确输出对作为训练数据。同样，分类问题的训练数据看起来是这样的：
- en: '[PRE3]'
  id: totrans-109
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: In the classification problem, we want to know which class the input belongs
    to. So the data pair has the class in place of the correct output corresponding
    to the input.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 在分类问题中，我们想知道输入属于哪个类别。因此，数据对中用类别代替了与输入对应的正确输出。
- en: Let’s proceed with an example. Consider the same grouping problem that we have
    been discussing. The model we want Machine Learning to answer is which one of
    the two classes (∆ and •) does the user’s input coordinate (X, Y) belong (see
    Figure [1-13](#Fig13)).
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用一个例子来继续。考虑我们一直在讨论的相同分组问题。我们希望机器学习回答的模型是用户的输入坐标（X, Y）属于两个类别（∆和•）中的哪一个（见图
    [1-13](#Fig13)）。
- en: '![A448947_1_En_1_Fig13_HTML.jpg](A448947_1_En_1_Fig13_HTML.jpg)'
  id: totrans-112
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_1_Fig13_HTML.jpg](A448947_1_En_1_Fig13_HTML.jpg)'
- en: Figure 1-13.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-13。
- en: Same data viewed from the perspective of classification
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 从分类的角度看相同的数据
- en: In this case, the training data of N sets of the element will look like Figure
    [1-14](#Fig14).
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，N组元素的训练数据将类似于图 [1-14](#Fig14)。
- en: '![A448947_1_En_1_Fig14_HTML.jpg](A448947_1_En_1_Fig14_HTML.jpg)'
  id: totrans-116
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_1_Fig14_HTML.jpg](A448947_1_En_1_Fig14_HTML.jpg)'
- en: Figure 1-14.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-14。
- en: Classifying the data
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 对数据进行分类
- en: In contrast, the regression does not determine the class. Instead, it estimates
    a value. As an example, if you have datasets of age and income (indicated with
    a •) and want to find the model that estimates income by age, it becomes a regression
    problem (see Figure [1-15](#Fig15)).[¹](#Fn1)
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，回归并不确定类别。相反，它估计一个值。例如，如果你有年龄和收入（用•表示）的数据集，并希望找到通过年龄估计收入的模型，那么它就变成了一个回归问题（见图
    [1-15](#Fig15)）。[¹](#Fn1)
- en: '![A448947_1_En_1_Fig15_HTML.gif](A448947_1_En_1_Fig15_HTML.gif)'
  id: totrans-120
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_1_Fig15_HTML.gif](A448947_1_En_1_Fig15_HTML.gif)'
- en: Figure 1-15.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-15。
- en: Datasets of age and income
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 年龄和收入数据集
- en: The dataset of this example will look like the table in Figure [1-16](#Fig16),
    where X and Y are age and income, respectively.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 本例的数据集将类似于图 [1-16](#Fig16) 中的表格，其中 X 和 Y 分别代表年龄和收入。
- en: '![A448947_1_En_1_Fig16_HTML.jpg](A448947_1_En_1_Fig16_HTML.jpg)'
  id: totrans-124
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_1_Fig16_HTML.jpg](A448947_1_En_1_Fig16_HTML.jpg)'
- en: Figure 1-16.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-16。
- en: Classifying the age and income data
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 对年龄和收入数据进行分类
- en: Both classification and regression are parts of supervised learning. Therefore,
    their training data is equally in the form of `{input, correct output}`. The only
    difference is the type of correct outputs—classification employs classes, while
    the regression requires values.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 分类和回归都是监督学习的一部分。因此，它们的训练数据都是以 `{输入，正确输出}` 的形式。唯一的区别是正确输出的类型——分类使用类别，而回归需要值。
- en: In summary, analysis can become classification when it needs a model to judge
    which group the input data belongs to and regression when the model estimates
    the trend of the data.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，当分析需要模型来判断输入数据属于哪个组时，它就变成了分类；而当模型估计数据的趋势时，它就变成了回归。
- en: Just for reference, one of the representative applications of unsupervised learning
    is clustering . It investigates the characteristics of the individual data and
    categorizes the related data. It is very easy to confuse clustering and classification,
    as their results are similar. Although they yield similar outputs, they are two
    completely different approaches. We have to keep in mind that clustering and classification
    are distinct terms. When you encounter the term clustering, just remind yourself
    that it focuses on unsupervised learning .
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 仅作参考，无监督学习的一个代表性应用是聚类。它研究单个数据的特点，并对相关数据进行分类。聚类和分类很容易混淆，因为它们的结果相似。尽管它们产生相似的结果，但它们是完全不同的方法。我们必须记住，聚类和分类是不同的术语。当你遇到“聚类”这个术语时，只需提醒自己它侧重于无监督学习。
- en: Summary
  id: totrans-130
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 总结
- en: 'Let’s briefly recap what we covered in this chapter:'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们简要回顾一下本章我们讨论的内容：
- en: 'Artificial Intelligence , Machine Learning, and Deep Learning are distinct.
    But they are related to each other in the following way: “Deep Learning is a kind
    of Machine Learning, and Machine Learning is a kind of Artificial Intelligence”.'
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能、机器学习和深度学习是不同的。但它们以以下方式相互关联：“深度学习是一种机器学习，而机器学习是一种人工智能”。
- en: Machine Learning is an inductive approach that derives a model from the training
    data. It is useful for image recognition, speech recognition, and natural language
    processing etc.
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 机器学习是一种归纳方法，它从训练数据中推导出一个模型。它在图像识别、语音识别和自然语言处理等方面非常有用。
- en: The success of Machine Learning heavily relies on how well the generalization
    process is implemented. In order to prevent performance degradation due to the
    differences between the training data and actual input data, we need a sufficient
    amount of unbiased training data.
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 机器学习的成功很大程度上取决于泛化过程的实施效果。为了防止由于训练数据和实际输入数据之间的差异导致的性能下降，我们需要足够数量的无偏训练数据。
- en: Overfitting occurs when the model has been overly customized to the training
    data that it yields poor performance for the actual input data, while its performance
    for the training data is excellent. Overfitting is one of the primary factors
    that reduces the generalization performance.
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当模型过度定制于训练数据，以至于对实际输入数据的性能较差，而其训练数据的性能却很优秀时，就会发生过拟合。过拟合是降低泛化性能的主要因素之一。
- en: Regularization and validation are the typical approaches used to solve the overfitting
    problem. Regularization is a numerical method that yields the simplest model as
    possible. In contrast, validation tries to detect signs of overfitting during
    training and takes action to prevent it. A variation of validation is cross-validation.
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 正则化和验证是解决过拟合问题的典型方法。正则化是一种数值方法，旨在得到尽可能简单的模型。相比之下，验证试图在训练过程中检测过拟合的迹象，并采取措施防止其发生。交叉验证是验证的一种变体。
- en: Depending on the training method, Machine Learning can be supervised learning,
    unsupervised learning, and reinforcement learning. The formats of the training
    data for theses learning methods are shown here.
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据训练方法，机器学习可以分为监督学习、无监督学习和强化学习。这些学习方法的训练数据格式在此展示。
- en: '| Training Method | Training Data |'
  id: totrans-138
  prefs:
  - PREF_IND
  type: TYPE_TB
  zh: '| 训练方法 | 训练数据 |'
- en: '| --- | --- |'
  id: totrans-139
  prefs:
  - PREF_IND
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Supervised Learning | `{ input, correct output }` |'
  id: totrans-140
  prefs:
  - PREF_IND
  type: TYPE_TB
  zh: '| 监督学习 | `{ 输入, 正确输出 }` |'
- en: '| Unsupervised Learning | `{ input }` |'
  id: totrans-141
  prefs:
  - PREF_IND
  type: TYPE_TB
  zh: '| 无监督学习 | `{ 输入 }` |'
- en: '| Reinforced Learning | `{ input, some output, grade for this output }` |'
  id: totrans-142
  prefs:
  - PREF_IND
  type: TYPE_TB
  zh: '| 强化学习 | `{ 输入, 一些输出, 对这个输出的评分 }` |'
- en: Supervised learning can be divided into classification and regression, depending
    on the usage of the model. Classification determines which group the input data
    belongs to. The correct output of the classification is given as categories. In
    contrast, regression predicts values and takes the values for the correct output
    in the training data.
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据模型的用途，监督学习可以分为分类和回归。分类确定输入数据属于哪个组别。分类的正确输出以类别形式给出。相比之下，回归预测值，并在训练数据中取正确的输出值。
- en: Footnotes[1](#Fn1_source)
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 脚注[1](#Fn1_source)
- en: The original meaning of the word “regress” is to go back to an average. Francis
    Galton, a British geneticist, researched the correlation of the height of parents
    and children and found out that the individual height converged to the average
    of the total population. He named his methodology “regression analysis.”
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: “regress”这个词的原始含义是回到平均值。英国遗传学家弗朗西斯·高尔顿研究了父母身高与子女身高的相关性，并发现个体身高会收敛到总人口的平均值。他将自己的方法命名为“回归分析”。
