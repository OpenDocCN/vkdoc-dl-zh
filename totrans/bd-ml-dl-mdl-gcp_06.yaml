- en: Part VIDeep Learning in Practice
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第 7 部分：实践中的深度学习
- en: 30. TensorFlow 2.0 and Keras
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 30. TensorFlow 2.0 和 Keras
- en: TensorFlow (TF) is a specialized numerical computation library for deep learning.
    It is the preferred tool by numerous deep learning researchers and industry practitioners
    for developing deep learning models and architectures as well as for serving learned
    models into production servers and software products. This chapter is focused
    on TensorFlow 2.0.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow (TF) 是一个专门用于深度学习的数值计算库。它是众多深度学习研究人员和行业从业者开发深度学习模型和架构以及将学习模型部署到生产服务器和软件产品中的首选工具。本章专注于
    TensorFlow 2.0。
- en: Navigating Through the TensorFlow API
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 探索 TensorFlow API
- en: Understanding the different levels of the TF API hierarchy is critical to working
    effectively with TF. The task of building a TF deep learning model may be addressed
    via different TF API levels. An understanding of the API hierarchy provides clarity
    on implementing neural network models with TF as well as navigating the TF ecosystem.
    The TF API hierarchy is primarily composed of three API levels, the high-level
    API, the mid-level API which provides components for building neural network models,
    and the low-level API. A diagrammatic representation of this is shown in Figure
    [30-1](#Fig1).
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 理解 TF API 层次结构的不同级别对于有效地使用 TF 至关重要。构建 TF 深度学习模型的任务可以通过不同的 TF API 级别来解决。了解 API
    层次结构可以提供使用 TF 实现神经网络模型以及导航 TF 生态系统的清晰度。TF API 层次结构主要由三个 API 级别组成：高级 API、提供构建神经网络模型组件的中级
    API 和低级 API。这种结构的图示在图 [30-1](#Fig1) 中展示。
- en: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig1_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig1_HTML.jpg)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig1_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig1_HTML.jpg)'
- en: Figure 30-1
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 图 30-1
- en: TensorFlow API hierarchy
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow API 层次结构
- en: The Low-Level TensorFlow APIs
  id: totrans-8
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 低级 TensorFlow API
- en: The low-level API gives the tools for building network graphs from the ground
    up using mathematical operations. This API level affords the greatest level of
    flexibility to tweak and tune the model as desired. Moreover, the higher-level
    APIs implement low-level operations under the hood.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 低级 API 提供了从底层使用数学运算构建网络图的工具。此 API 级别提供了最大的灵活性来调整和调整模型，以满足需求。此外，高级 API 在底层实现了低级操作。
- en: The Mid-Level TensorFlow APIs
  id: totrans-10
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 中级 TensorFlow API
- en: TensorFlow provides a set of reusable packages for simplifying the process involved
    in creating neural network models. Some examples of these functions include the
    layers **(tf.keras.layers)**, Datasets **(tf.data)**, metrics **(tf.keras.metrics)**,
    loss **(tf.keras.losses)**, and FeatureColumns **(tf.feature_column)** packages.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow 提供了一系列可重用的包，用于简化创建神经网络模型的过程。这些函数的例子包括层 **(tf.keras.layers**)、数据集
    **(tf.data**)、度量 **(tf.keras.metrics**)、损失 **(tf.keras.losses**) 和特征列 **(tf.feature_column**)
    包。
- en: Layers
  id: totrans-12
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 层
- en: The layers package **(tf.keras.layers)** provides a handy set of functions to
    simplify the construction of layers in a neural network architecture. For example,
    consider the convolutional network architecture in Figure [30-2](#Fig2) and how
    the layers API simplifies the creation of the network layers.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 层包 **(tf.keras.layers**) 提供了一套方便的函数，用于简化神经网络架构中层的构建。例如，考虑图 [30-2](#Fig2) 中的卷积网络架构以及层
    API 如何简化网络层的创建。
- en: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig2_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig2_HTML.jpg)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig2_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig2_HTML.jpg)'
- en: Figure 30-2
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 图 30-2
- en: Using the layers API to simplify creating the layers of a neural network
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 使用层 API 简化创建神经网络层
- en: Datasets
  id: totrans-17
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 数据集
- en: The Dataset package **(tf.data)** provides a convenient set of high-level functions
    for creating complex dataset input pipelines. The goal of the Dataset package
    is to have a fast, flexible, and easy-to-use interface for fetching data from
    various data sources, performing data transform operations on them before passing
    them as inputs to the learning model. The Dataset API provides a more efficient
    means of fetching records from a dataset. The major classes of the Dataset API
    are illustrated in Figure [30-3](#Fig3).
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集包 **(tf.data**) 提供了一套方便的高级函数，用于创建复杂的数据集输入管道。数据集包的目标是提供一个快速、灵活且易于使用的接口，用于从各种数据源获取数据，在将它们作为学习模型的输入之前对它们进行数据转换操作。数据集
    API 提供了一种更有效的方法来从数据集中检索记录。数据集 API 的主要类在图 [30-3](#Fig3) 中展示。
- en: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig3_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig3_HTML.jpg)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig3_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig3_HTML.jpg)'
- en: Figure 30-3
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 图 30-3
- en: Dataset API class hierarchy
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集 API 类层次结构
- en: 'From the illustration in Figure [30-3](#Fig3), the subclasses perform the following
    functions:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 从图 [30-3](#Fig3) 的说明中，子类执行以下功能：
- en: 'TextLineDataset: This class is used for reading lines from text files.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: TextLineDataset：此类用于从文本文件中读取行。
- en: 'TFRecordDataset: This class is responsible for reading records from TFRecord
    files. A TFRecord file is a TensorFlow binary storage format. It is faster and
    easier to work with data stored as TFRecord files as opposed to raw data files.
    Working with TFRecord also makes the data input pipeline more easily aligned for
    applying vital transformations such as shuffling and returning data in batches.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: TFRecordDataset：此类负责从 TFRecord 文件中读取记录。TFRecord 文件是 TensorFlow 的二进制存储格式。与原始数据文件相比，处理存储为
    TFRecord 文件的数据更快、更简单。使用 TFRecord 还使得数据输入管道更容易对齐，以便应用重要的转换，如洗牌和分批返回数据。
- en: 'FixedLengthRecordDataset: This class is responsible for reading records of
    fixed sizes from binary files.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: FixedLengthRecordDataset：此类负责从二进制文件中读取固定大小的记录。
- en: FeatureColumns
  id: totrans-26
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: FeatureColumns
- en: FeatureColumns **tf.feature_column** is a TensorFlow functionality for describing
    the features of the dataset that will be fed into a high-level Keras or Estimator
    models for training and validation. FeatureColumns makes it easy to prepare data
    for modeling by carrying out tasks such as the conversion of categorical features
    of the dataset into a one-hot encoded vector.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: FeatureColumns **tf.feature_column** 是 TensorFlow 用于描述将要输入到高级 Keras 或 Estimator
    模型进行训练和验证的数据集特征的函数。FeatureColumns 通过执行诸如将数据集的分类特征转换为独热编码向量等任务，使得准备数据以进行建模变得容易。
- en: The **feature_column** API is broadly divided into two categories; they are
    the categorical and dense columns. The categories and subsequent functions are
    illustrated in Figure [30-4](#Fig4).
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**feature_column** API 广泛分为两大类；它们是分类列和密集列。类别及其后续函数在图 [30-4](#Fig4) 中进行了说明。'
- en: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig4_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig4_HTML.jpg)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig4_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig4_HTML.jpg)'
- en: Figure 30-4
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 图 30-4
- en: Function calls of the Feature Column API
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: Feature Column API 的函数调用
- en: Let’s go through each API function briefly in Table [30-1](#Tab1).
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们简要地通过表 [30-1](#Tab1) 介绍每个 API 函数。
- en: Table 30-1
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 表 30-1
- en: '***tf.feature_column*** API Functions'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '***tf.feature_column*** API 函数'
- en: '| Function name | Description |'
  id: totrans-35
  prefs: []
  type: TYPE_TB
  zh: '| 函数名称 | 描述 |'
- en: '| --- | --- |'
  id: totrans-36
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Numeric column – **tf.feature_column.numeric_column()** | This is a high-level
    wrapper for numeric features in the dataset. |'
  id: totrans-37
  prefs: []
  type: TYPE_TB
  zh: '| 数值列 – **tf.feature_column.numeric_column()** | 这是一个对数据集中的数值特征的高级包装。 |'
- en: '| Indicator column – **tf.feature_column.indicator_column()** | The indicator
    column takes as input a categorical column and transforms it into a one-hot encoded
    vector. |'
  id: totrans-38
  prefs: []
  type: TYPE_TB
  zh: '| 指示列 – **tf.feature_column.indicator_column()** | 指示列将一个分类列作为输入，并将其转换为独热编码向量。
    |'
- en: '| Embedding column – **tf.feature_column.embedding_column()** | The embedding
    column function transforms a categorical column with multiple levels or classes
    into a lower-dimensional numeric representation that captures the relationships
    between the categories. Using embeddings mitigates the problem of a large sparse
    vector (an array with mostly zeros) created via one-hot encoding for a dataset
    feature with lots of different classes. |'
  id: totrans-39
  prefs: []
  type: TYPE_TB
  zh: '| 嵌入列 – **tf.feature_column.embedding_column()** | 嵌入列函数将具有多个级别或类别的分类列转换为低维数值表示，以捕捉类别之间的关系。使用嵌入可以缓解通过独热编码为具有许多不同类别的数据集特征创建的大稀疏向量（大部分为零的数组）的问题。
    |'
- en: '| Categorical column with identity – **tf.feature_column.categorical_ column_with_identity()**
    | This function creates a one-hot encoded output of a categorical column containing
    identities, e.g, [‘0’, ‘1’, ‘2’, ‘3’]. |'
  id: totrans-40
  prefs: []
  type: TYPE_TB
  zh: '| 具有身份的分类列 – **tf.feature_column.categorical_column_with_identity()** | 此函数创建一个包含身份的分类列的独热编码输出，例如，[‘0’，‘1’，‘2’，‘3’]。
    |'
- en: '| Categorical column with vocabulary list – **tf.feature_column.categorical_
    column_with_vocabulary_list()** | This function creates a one-hot encoded output
    of a categorical column with strings. It maps each string to an integer based
    on a vocabulary list. However, if the vocabulary list is long, it is best to create
    a file containing the vocabulary and use the function **tf.feature_column.categorical_
    column_with_vocabulary_file().** |'
  id: totrans-41
  prefs: []
  type: TYPE_TB
  zh: '| 带词汇表的分类列 – **tf.feature_column.categorical_column_with_vocabulary_list()**
    | 此函数创建一个分类列的one-hot编码输出，其中字符串被映射到整数，基于词汇表。然而，如果词汇表很长，最好创建一个包含词汇表的文件，并使用函数 **tf.feature_column.categorical_column_with_vocabulary_file().**
    |'
- en: '| Categorical column with hash bucket – **tf.feature_column.categorical_ column_with_hash_buckets()**
    | This function specifies the number of categories by using the hash of the inputs.
    It is used when it is not possible to create a vocabulary for the number of categories
    due to memory considerations. |'
  id: totrans-42
  prefs: []
  type: TYPE_TB
  zh: '| 带哈希桶的分类列 – **tf.feature_column.categorical_column_with_hash_buckets()** |
    此函数通过使用输入的哈希值来指定类别数量。当由于内存考虑无法为类别数量创建词汇表时使用。|'
- en: '| Crossed column – **tf.feature_columns.crossed_column()** | The function gives
    the ability to combine multiple input features into a single input feature. |'
  id: totrans-43
  prefs: []
  type: TYPE_TB
  zh: '| 交叉列 – **tf.feature_columns.crossed_column()** | 该函数提供了将多个输入特征组合成单个输入特征的能力。|'
- en: '| Bucketized column – **tf.feature_column.bucketized_column()** | The function
    splits a column of numerical inputs into buckets to form new classes based on
    a specified set of numerical ranges. |'
  id: totrans-44
  prefs: []
  type: TYPE_TB
  zh: '| 分桶列 – **tf.feature_column.bucketized_column()** | 该函数将数值输入列分割成桶，根据指定的数值范围形成新的类别。|'
- en: The High-Level TensorFlow APIs
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 高级TensorFlow API
- en: The high-level API provides simplified API calls that encapsulate lots of the
    details that are typically involved in creating a deep learning TensorFlow model.
    These high-level abstractions make it easier to develop powerful deep learning
    models quickly with fewer lines of code.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 高级API提供了简化的API调用，封装了创建深度学习TensorFlow模型时通常涉及的大量细节。这些高级抽象使得用更少的代码快速开发强大的深度学习模型变得更容易。
- en: Estimator API
  id: totrans-47
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 估算器API
- en: The Estimator API is a high-level TensorFlow functionality that is aimed at
    reducing the complexity involved in building machine learning models by exposing
    methods that abstract common models and processes. There are two ways of working
    with Estimators, and they include
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 估算器API是TensorFlow的高级功能，旨在通过公开抽象常见模型和过程的API来降低构建机器学习模型所涉及复杂性。与估算器一起工作的有两种方式，包括
- en: '**Using the premade Estimators**: The premade Estimators are black box models
    made available by the TensorFlow team for building common machine learning/deep
    learning architectures such as linear regression/classification, Random forest
    regression/classification and deep neural networks for regression and classification.
    An illustration of the premade Estimators as subclasses of the Estimator class
    is shown in Figure [30-5](#Fig5).'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用预制的估算器**：预制的估算器是由TensorFlow团队提供的黑盒模型，用于构建常见的机器学习/深度学习架构，如线性回归/分类、随机森林回归/分类以及用于回归和分类的深度神经网络。预制的估算器作为估算器类的子类的示例如图[30-5](#Fig5)所示。'
- en: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig5_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig5_HTML.jpg)'
  id: totrans-50
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig5_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig5_HTML.jpg)'
- en: Figure 30-5
  id: totrans-51
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图30-5
- en: Estimator class API hierarchy
  id: totrans-52
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 估算器类API层次结构
- en: '**Creating a custom Estimator**: It is also possible to use the low-level TensorFlow
    methods to create a custom black box model for easy reusability. To do this, you
    must put your code in a method called the **model_fn**. The model function will
    include code that defines operations such as the labels or predictions, loss function,
    the training operations, and the operations for evaluation.'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创建自定义估算器**：还可以使用低级TensorFlow方法创建一个自定义的黑盒模型，以便于重用。为此，您必须将代码放入名为 **model_fn**
    的方法中。模型函数将包括定义操作，如标签或预测、损失函数、训练操作以及评估操作。'
- en: The Estimator class exposes four major methods, namely, the **fit()** , **evaluate()**
    , **predict()** , and **export_savedmodel()** methods. The **fit()** method is
    called to train the data by running a loop of training operations. The **evaluate()**
    method is called to evaluate the model performance by looping through a set of
    evaluation operations. The **predict()** method uses the trained model to make
    predictions, while the **export_savedmodel()** method is used for exporting the
    trained model to a specified directory. For both the premade and custom Estimators,
    we must write a method to build the data input pipeline into the model. This pipeline
    is built for both the training and evaluation data inputs. This is further illustrated
    in Figure [30-6](#Fig6).
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig6_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig6_HTML.jpg)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
- en: Figure 30-6
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: Estimator data input pipeline
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: Keras API
  id: totrans-58
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Keras provides a high-level specification for developing deep neural network
    models. The Keras API was initially separate from TensorFlow and only provided
    an interface for model building with TensorFlow as one of the frameworks running
    at the backend. However, in TensorFlow 2.0, Keras is an integral part of the TensorFlow
    codebase as preferred high-level API.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: The Keras API version internal to TensorFlow is available from the ‘tf.keras’
    package, whereas the broader Keras API blueprint that is not tied to a specific
    backend will remain available from the ‘keras’ package. In summary, when working
    with the ‘keras’ package, the backend can run with either TensorFlow, Microsoft
    CNTK, or Theano. On the other hand, working with ‘tf.keras’ provides a TensorFlow
    only version which is tightly integrated and compatible with all of the functionality
    of the core TensorFlow library.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: In this book, we will focus on **‘tf.Keras’** as a high-level API of TensorFlow.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: The Anatomy of a Keras Program
  id: totrans-62
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The Keras **‘Model’** forms the core of a Keras program. A ‘Model’ is first
    constructed, then it is compiled. Next, the compiled model is trained and evaluated
    using their respective training and evaluation datasets. Upon successful evaluation
    using the relevant metrics, the model is then used for making predictions on previously
    unseen data samples. Figure [30-7](#Fig7) shows the program flow for modeling
    with Keras.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig7_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig7_HTML.jpg)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
- en: Figure 30-7
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: The anatomy of a Keras program
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: As shown in Figure [30-7](#Fig7), the Keras ‘Model’ can be constructed using
    the Sequential API ‘tf.keras.Sequential’ or the Keras Functional API which defines
    a model instance ‘tf.keras.Model’. The Sequential model is the simplest method
    for creating a linear stack of neural network layers. The Functional model is
    used if a more complex graph is desired. Keras is the de facto API for building
    neural network architectures with TensorFlow.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: From here on, the code examples in this book will use the Sequential API, Functional
    API, and Model subclassing methods for building neural network architectures with
    Keras. In doing this, the reader can play around with the various examples as
    samples to get a feel of how they work.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: TensorBoard
  id: totrans-69
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: TensorBoard is an interactive visualization tool that comes bundled with TensorFlow.
    The goal of TensorBoard is to gain a visual insight into how the computational
    graph is constructed and executed. This information provides greater visibility
    for understanding, optimizing, and debugging deep learning models.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: TensorBoard has a variety of visualization dashboard, such as
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: 'Scalar dashboard: This dashboard captures metrics that change with time, such
    as the loss of a model or other model evaluation metrics such as accuracy, precision,
    recall, f1, and so on.'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Histogram dashboard: This dashboard shows the histogram distribution for a
    Tensor as it has changed over time.'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Distribution dashboard: This dashboard is similar to the histogram dashboard.
    However, it displays the histogram as a distribution.'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Graph explorer: This dashboard gives a graphical overview of the TensorFlow
    computational graph and how information flows from one node to the other. This
    dashboard provides invaluable insights into the network architecture.'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Image dashboard: This dashboard displays images saved using the method **tf.summary.image**.'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Audio dashboard: This dashboard provides audio clips saved using the method
    **tf.summary.audio**.'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Embedding projector: The dashboard makes it easy to visualize high-dimensional
    datasets after they have been transformed using **Embeddings**. The visualization
    uses principal component analysis (PCA) and another technique called t-distributed
    Stochastic Neighbor Embedding (t-SNE). Embedding is a technique for capturing
    the latent variables in a high-dimensional dataset by converting the data units
    into real numbers that capture their relationship. This technique is broadly similar
    to how PCA reduces data dimensionality. Embeddings are also useful for converting
    sparse matrices (matrices made up of mostly zeros) into a dense representation.'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Text dashboard: This dashboard is for displaying textual information.'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig8_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig8_HTML.jpg)'
  id: totrans-80
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 30-8
  id: totrans-81
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: TensorBoard
  id: totrans-82
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Features in TensorFlow 2.0
  id: totrans-83
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: TensorFlow 2.0 comes with new features for building machine learning models.
    Some of these new features include
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: A more pythonic feel to model design and debugging with eager execution as the
    de facto execution mode.
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Eager execution enables instant evaluation of TensorFlow operations. This is
    opposed to previous versions of Tensorflow where we first construct a computational
    graph and then execute it in a session.
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using tf.function to transform a Python method into high-performance TensorFlow
    graphs.
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using Keras as the core high-level API for model design.
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using FeatureColumns to parse data as input into Keras models.
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The ease of training on distributed architectures and devices.
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To install and work with TensorFlow 2.0 on Google Colab, run
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: The GCP Deep Learning VM has images with TensorFlow 2.0 pre-configured.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: A Simple TensorFlow Program
  id: totrans-94
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s start by building a simple TF program. Here, we will build a graph to
    find the roots of the quadratic expression *x*² + 3*x* − 4 = 0.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-96
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**tf.constant()** is a Tensor for storing a constant type. Now let’s calculate
    the roots of the expression.'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: TensorFlow 2.0 is eager-first; this implies that operations are executed immediately
    after they are defined, just like regular python code.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: Building Efficient Input Pipelines with the Dataset API
  id: totrans-100
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The Dataset API **‘tf.data’** offers an efficient mechanism for building robust
    input pipelines for passing data into a TensorFlow program. This section uses
    the Boston housing dataset to illustrate working with the Dataset API methods
    for building data input pipelines in TensorFlow.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-102
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'From the preceding code listing, take note of the following:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: The method **‘tf.data.Dataset.from_tensor_slices()’** is used to create a Dataset
    whose elements are Tensor slices.
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Dataset method **‘shuffle()’** shuffles the Dataset at each epoch.
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Dataset method **‘batch()’** is used to set the size of each mini-batch
    of the Dataset. In the preceding example, each Dataset batch contains five observations.
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Linear Regression with TensorFlow
  id: totrans-107
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this section, we use TensorFlow to implement a linear regression machine
    learning model. In the following example, we use the Boston house-prices dataset
    from the **Keras dataset package** to build a linear regression model with TensorFlow
    2.0.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-109
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'Here are a few points and methods to take note of in the preceding code listing
    for linear regression with TensorFlow :'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
- en: Note that transformation to standardize the feature dataset is performed after
    splitting the data into train and test sets. This action is performed in this
    manner to prevent information from the training data to pollute the test data
    which must remain unseen by the model.
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The class named **‘LinearRegressionModel’** builds a Keras model by subclassing
    the **‘tf.keras.Model’** class. The linear regression model is created as a layer
    of the neural network in the **‘__init__’** method, and it is defined as a forward
    pass in the **‘call’** method. In Chapter [31](463852_1_En_31_Chapter.xhtml) on
    Keras, we will see how to use simpler routines with the Keras Functional API.
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The **‘tf.data.Dataset.from_tensor_slices’** method uses the **‘.minimize()’**
    method to update the loss function.
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The squared error loss function is defined with **‘tf.keras.losses.MeanSquaredError()’**.
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The gradient descent optimization algorithm is defined using **‘tf.keras.optimizers.SGD()’**
    with the learning rate set as a parameter to the method.
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The method to capture the loss and root mean squared error estimates is defined
    using **‘tf.keras.metrics.Mean(name=‘train_loss’)’** and **‘tf.keras.metrics.RootMeanSquaredError()’**
    functions, respectively.
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The @tf.function is a python decorator to transform a method into high-performance
    TensorFlow graphs.
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The method **‘train_step’** uses the **‘tf.GradientTape()’** method to record
    operations for automatic differentiation. These gradients are later used to minimize
    the cost function by calling the **‘apply_gradients()’** method of the optimization
    algorithm.
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The method **‘test_step’** uses the trained model to obtain predictions on test
    data .
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Classification with TensorFlow
  id: totrans-120
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this example, we’ll use the Iris flower dataset to build a multivariable
    logistic regression machine learning classifier with TensorFlow 2.0\. The dataset
    is gotten from the Scikit-learn dataset package.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  id: totrans-122
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'From the preceding code, listing is similar to the example on linear regression
    with TensorFlow 2.0\. However, take note of the following procedures:'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
- en: The target variable **‘y’** is converted to a one-hot encoded matrix by using
    the **‘OneHotEncoder’** function from Scikit-learn. There exists a TensorFlow
    method named **‘tf.one_hot’** for performing the same function, even easier! The
    reader is encouraged to Experiment with this.
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Observe how the **‘tf.reduce_mean’** and the **‘tf.nn.softmax_cross_entropy_with_logits’**
    methods are used to implement the loss for optimizing the logistic model.
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Stochastic Gradient Descent optimization algorithm **‘tf.keras.optimizers.SGD()’**
    is used to train the logistic model.
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Observe how the **‘weight’** and **‘bias’** variables are updated by the gradient
    descent optimizer within the **‘train_step’** method using **‘tf.GradientTape()’**
    to capture and compute the derivatives from the trainable model variables.
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The **‘tf.keras.metrics.Accuracy’** method is used to evaluate the accuracy
    of the model.
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Visualizing with TensorBoard
  id: totrans-129
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this section, we will go through visualizing TensorFlow graphs and statistics
    with TensorBoard. The following code improves on the previous code to build a
    linear regression model by adding methods to visualize the graph and other variable
    statistics in TensorBoard using the **‘tf.summary’** method calls. The TensorBoard
    output (illustrated in Figure [30-9](#Fig9)) is displayed within the notebook.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  id: totrans-131
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'From the preceding code listing, take note of the following steps:'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig9_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig9_HTML.jpg)'
  id: totrans-133
  prefs: []
  type: TYPE_IMG
- en: Figure 30-9
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
- en: TensorBoard visualization dashboard for linear regression metrics
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
- en: The **‘tf.summary.create_file_writer’** method creates summary writers to write
    the summaries to disk.
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The **‘tf.summary.scalar’** method is used to capture scalar metrics for TensorBoard.
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The magic command ‘%tensorboard’ is used to launch TensorBoard by pointing to
    the appropriate log directory.
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Running TensorFlow with GPUs
  id: totrans-139
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: GPU is short for graphics processing unit. It is a specialized processor designed
    for carrying out complex computations on large memory blocks. GPUs provide more
    efficient processing for building deep learning models.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
- en: TensorFlow can leverage processing on multiple GPUs to speed up computation
    especially when training a complex network architecture. To take advantage of
    parallel processing, a replica of the network architecture resides on each GPU
    machine and trains a subset of the data. However, for synchronous updates, the
    model parameters from each tower (or GPU machines) are stored and updated on a
    CPU. It turns out that CPUs are generally good at mean or averaging processing.
    A diagram of this operation is shown in Figure [30-10](#Fig10).
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig10_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig10_HTML.jpg)'
  id: totrans-142
  prefs: []
  type: TYPE_IMG
- en: Figure 30-10
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
- en: Framework for training on multiple GPUs
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
- en: 'TensorFlow 2.0 performs distributed training across multiple machines (i.e.,
    CPUs, GPUs, or TPUs) using the **‘tf.distribute.Strategy’** API. To use GPUs on
    Google Colab, first change the runtime type to GPU and install the TensorFlow
    with GPU library by running the following code in the notebook cell:'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  id: totrans-146
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The following code block uses GPUs for model training. In this example we train
    a simple regression model on the Boston housing dataset. The method **‘tf.distribute.MirroredStrategy()’**
    implements a distribution strategy called MirroredStrategy. This strategy supports
    distributed training with multiple GPUs on a single machine. The code is similar
    to the previous code for linear regression with TensorFlow 2.0\. However, minimal
    changes are added to make the components such as variables, layers, models, optimizers,
    metrics, summaries, and checkpoints strategy-aware using the strategy scope().
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  id: totrans-148
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'Please note the following from the preceding code block:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
- en: When writing a custom training loop, sum the per example losses and divide the
    sum by the global batch size. In the code tf.reduce_sum(per_example_loss) * (1\.
    / global_batch_size). This needs to be done because after calculation on each
    replica, the gradients are synced across the replicas by summing them. When using
    tf.keras.losses classes, the loss reduction needs to be explicitly specified to
    be one of NONE or SUM.
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'TensorFlow High-Level APIs: Using Estimators'
  id: totrans-151
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this section, we will use the high-level TensorFlow Estimator API for modeling
    with premade Estimators. Estimators provide another high-level API for building
    TensorFlow models for execution on CPUs, GPUs, or TPUs with minimal code modification.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
- en: 'The following steps are typically followed when working with premade Estimators:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
- en: Write the **‘input_fn’** to handle the data pipeline.
  id: totrans-154
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Define the type of data attributes into the model using feature columns **‘tf.feature_column’**.
  id: totrans-155
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Instantiate one of the premade Estimators by passing in the feature columns
    and other relevant attributes.
  id: totrans-156
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Use the **‘train()’**, **‘evaluate()’**, and **‘predict()’** methods to train
    and evaluate the model on evaluation dataset and use the model to make prediction/inference.
  id: totrans-157
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Let’s see a simple example of working with a TensorFlow premade Estimator again
    using the Boston housing dataset.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
- en: Note
  id: totrans-159
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Reset session before running the following cells and change runtime type to
    None.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  id: totrans-161
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Neural Networks with Keras
  id: totrans-162
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this section, we will use the Sequential and Functional Keras API to build
    a simple neural network model. A Sequential API is the most commonly used method
    to build deep neural network models by stacking one layer on another. The Functional
    API offers more flexibility to build more complex neural network architectures.
    Both API methods are relatively easy to construct in Keras as we will see in the
    examples.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
- en: Subclassing a model as we did in the preceding examples provides even more flexibility
    for building and inspecting complex models. However, the code is more verbose
    and may be prone to errors. This technique should be used when it makes the most
    sense to, depending on the problem use case. We used them previously to serve
    as an illustration.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
- en: The following examples will use the Iris Dataset to build a neural network with
    one hidden layer as illustrated in Figure [30-11](#Fig11).
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig11_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig11_HTML.jpg)'
  id: totrans-166
  prefs: []
  type: TYPE_IMG
- en: Figure 30-11
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
- en: Iris dataset – neural network architecture
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
- en: Using the Keras Sequential API
  id: totrans-169
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This code segment will construct a neural network model with the Sequential
    API using the method **‘tf.keras.Sequential()’** to stack layers on each other.
    The model creates a hidden layer with 32 neurons and an output layer with 3 output
    units because the Iris target contains 3 classes.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  id: totrans-171
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Using the Keras Functional API
  id: totrans-172
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The general code pattern for the Functional API is structurally the same as
    the Sequential version. The only change here is in how the network model is constructed.
    We also demonstrated the Keras feature for printing the graph of the model in
    this example. The output is illustrated in Figure [30-12](#Fig12).
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig12_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig12_HTML.jpg)'
  id: totrans-174
  prefs: []
  type: TYPE_IMG
- en: Figure 30-12
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
- en: The graph of the model – produced with Keras
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  id: totrans-177
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Model Visualization with Keras
  id: totrans-178
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: With Keras, it is quite easy and straightforward to plot the metrics of the
    model to have a better graphical perspective as to how the model is performing
    for every training epoch. This view is also useful for dealing with issues of
    bias or variance of the model.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
- en: A callback function of the ‘model.fit()’ method returns the loss and evaluation
    score for each epoch. This information is stored in a variable and plotted.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
- en: In this example, we use the same Iris dataset model to illustrate visualization
    with Keras. The plots of the loss and accuracy of the model at each epoch are
    shown in Figure [30-13](#Fig13) and Figure [30-14](#Fig14), respectively.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig13_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig13_HTML.jpg)'
  id: totrans-182
  prefs: []
  type: TYPE_IMG
- en: Figure 30-13
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
- en: Model loss per epoch
  id: totrans-184
