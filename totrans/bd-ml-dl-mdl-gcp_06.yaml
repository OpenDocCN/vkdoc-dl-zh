- en: '[PRE13]'
  id: totrans-189
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: TensorBoard with Keras
  id: totrans-190
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To visualize models with TensorBoard, attach a TensorBoard callback **‘tf.keras.callbacks.TensorBoard()’**
    to the **‘model.fit()’** method before training the model. The model graph, scalars,
    histograms, and other metrics are stored as event files in the log directory.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
- en: For this example, we modify the Iris model to use TensorBoard. The TensorBoard
    output is shown in Figure [30-15](#Fig15).
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig15_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig15_HTML.jpg)'
  id: totrans-193
  prefs: []
  type: TYPE_IMG
- en: Figure 30-15
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
- en: TensorBoard output of Iris model
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  id: totrans-196
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Checkpointing to Select Best Models
  id: totrans-197
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Checkpointing makes it possible to save the weights of the neural network model
    when there is an increase in the validation accuracy metric. This is achieved
    in Keras using the **‘tf.keras.callbacks.ModelCheckpoint()’**. The saved weights
    can then be loaded back into the model and used to make predictions. Using the
    Iris dataset, we'll build a model that saves the weights to file only when there
    is an improvement in the validation set performance. For completeness sake as
    we have done in the previous segments, we will produce this example within a complete
    code listing.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  id: totrans-199
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: This chapter covered the foundation of working with TensorFlow 2.0 and its exciting
    features for developing machine learning models. Some of these new features include
    a more pythonic feel to model design and debugging, using tf.function to transform
    a Python method into high-performance TensorFlow graphs, using Keras as the core
    high-level API for model design, using FeatureColumns to parse data as input into
    Keras models, and the ease of training on distributed architectures and devices.
    The chapter also covered the principles of building models using the high-level
    Estimator API.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapters, we will take a deeper dive into deep neural networks and
    how they are implemented in TensorFlow with Keras. In TensorFlow 2.0, Keras is
    the de facto method for developing neural network.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
- en: 31. The Multilayer Perceptron (MLP)
  id: totrans-202
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The multilayer perceptron (MLP) is the fundamental example of a deep neural
    network. The architecture of a MLP consists of multiple hidden layers to capture
    more complex relationships that exist in the training dataset. Another name for
    the MLP is the deep feedforward neural network (DFN). An illustration of an MLP
    is shown in Figure [31-1](#Fig1).
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_31_Chapter/463852_1_En_31_Fig1_HTML.jpg](../images/463852_1_En_31_Chapter/463852_1_En_31_Fig1_HTML.jpg)'
  id: totrans-204
  prefs: []
  type: TYPE_IMG
- en: Figure 31-1
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
- en: Deep feedforward neural network
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
- en: The Concept of Hierarchies
  id: totrans-207
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The more the number of hidden layers in a neural network, the deeper the network
    becomes. Deep networks are able to learn more sophisticated representations of
    the inputs. The concept of hierarchical representation is when each layer learns
    a set of features that describe the input and hierarchically pass that information
    across the hidden layers. Initially, the hidden layers closer to the input layer
    learn a simple set of features, which then grow to increasingly complex features
    as information flows to deeper layers of the network, to capture the mapping between
    the inputs and the target. See Figure [31-2](#Fig2).
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_31_Chapter/463852_1_En_31_Fig2_HTML.jpg](../images/463852_1_En_31_Chapter/463852_1_En_31_Fig2_HTML.jpg)'
  id: totrans-209
  prefs: []
  type: TYPE_IMG
- en: Figure 31-2
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
- en: Hierarchical learning
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
- en: 'Choosing the Number of Hidden Layers: Bias/Variance Trade-Off'
  id: totrans-212
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: From experience, increasing the number of hidden layers may improve the representational
    quality of the network; however, arbitrarily increasing the number of hidden layers
    in your network design can have detrimental effects on the overall network performance
    with respect to generalizing to unseen observations. This is because the neural
    network will learn more closely the irreducible errors inherent in the training
    dataset and will fail to generalize to new examples.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
- en: Appropriate caution should be taken when selecting the number of hidden layers
    to avoid overfitting. Regularization techniques for neural networks such as Tikhonov
    regularization, Dropout, or early stopping are different methods of mitigating
    overfitting. Regularization for neural networks will be covered in more detail
    in a later section.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
- en: Empirically, one hidden layer will produce good results for simple learning
    problems, but if the number of output classes increases or there exists a high
    degree of non-linearities among the data features, then it is recommended to add
    more layers while taking care to ensure that the model performs well on test data.
    Choosing the number of neurons in a hidden layer and the number of hidden layers
    is usually a case of a trial-and-error heuristics and presents the case of applying
    hyper-parameter tuning to improve the network performance. Using a grid search
    for hyper-parameter tuning is a good way to approximate an optimal neural network
    architecture that performs well on test data.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
- en: Multilayer Perceptron (MLP) with Keras
  id: totrans-216
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In this section, we examine a motivating example by building an MLP model with
    Keras. In doing so, we’ll go through the following steps:'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
- en: Import and transform the dataset.
  id: totrans-218
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Build and compile the model.
  id: totrans-219
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Train the data using **‘Model.fit()’**.
  id: totrans-220
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Evaluate the model using **‘Model.evaluate()’**.
  id: totrans-221
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Predict on unseen data using **‘Model.predict()’**.
  id: totrans-222
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The dataset used for this example is the Fashion-MNIST database of fashion
    articles. This dataset contains 60,000 28 x 28 pixel grayscale images of ten clothing
    items (the target classes). This dataset is downloaded from the **‘tf.keras.datasets’**
    package. The following code example will build a simple MLP neural network for
    the computer to classify an image of a clothing item into its appropriate class.
    The network architecture has the following layers:'
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
- en: A dense hidden layer with 250 neurons
  id: totrans-224
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A second hidden layer with 64 neurons
  id: totrans-225
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A third hidden layer with 32 neurons
  id: totrans-226
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: An output layer with 10 output classes
  id: totrans-227
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE16]'
  id: totrans-228
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: 'Observe the following from the preceding code:'
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
- en: A Keras Sequential Model is built by calling the **‘tf.keras.Sequential()’**
    method from which layers are then added to the model.
  id: totrans-230
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: After constructing the model layers, the model is compiled by calling the method
    ‘.compile()’.
  id: totrans-231
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The model is trained by calling the **‘.fit()’** method which receives the training
    features and targets from the **‘tf.data.Dataset’** pipeline.
  id: totrans-232
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The method **‘.evaluate()’** is used to get the final metric estimate and the
    loss score of the model after training.
  id: totrans-233
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In this chapter, we introduced the multilayer perceptron network and how it
    achieves good performance on complex learning problems by stacking layers of neurons
    together to form a deep representational hierarchy. By doing this, the network
    learns what features are relevant and also learns what weights of the network
    will best approximate the target function.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we will discuss on other considerations for training deep
    neural network.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
- en: 32. Other Considerations for Training the Network
  id: totrans-236
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we will cover some other important techniques to consider when
    training a deep neural network.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
- en: Weight Initialization
  id: totrans-238
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Weight initialization is a technique for assigning initial values to the weights
    (parameters) of the neural network before training (see Figure [32-1](#Fig1)).
    Proper weight initialization may mitigate the effects of vanishing and exploding
    gradients when training the network. It may also speed up the training process.
    Two commonly used methods for weight initializations are the Xavier and the He
    techniques. We will not go into the technical explanation of these initialization
    strategies. However, they are implemented in the standard deep learning framework
    libraries such as TensorFlow and Keras. In TensorFlow 2.0, the dense layer in
    **‘tf.keras.layers.Dense()’** has the Glorot uniform initializer, also called
    Xavier uniform initializer as its default kernel initializer.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_32_Chapter/463852_1_En_32_Fig1_HTML.jpg](../images/463852_1_En_32_Chapter/463852_1_En_32_Fig1_HTML.jpg)'
  id: totrans-240
  prefs: []
  type: TYPE_IMG
- en: Figure 32-1
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
- en: Weight initialization
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
- en: Batch Normalization
  id: totrans-243
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The technique of batch normalization involves normalizing the data (to have
    zero mean and unit variance), as well as scaling and shifting the data batch at
    each layer of the neural network during the training phase. Batch normalization
    occurs after the affine transformation of the input matrix and their weights,
    but before passing the transformation into the activation function (see Figure
    [32-2](#Fig2)).
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_32_Chapter/463852_1_En_32_Fig2_HTML.jpg](../images/463852_1_En_32_Chapter/463852_1_En_32_Fig2_HTML.jpg)'
  id: totrans-245
  prefs: []
  type: TYPE_IMG
- en: Figure 32-2
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
- en: Batch normalization, also known as batch norm
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
- en: The neural network learns the parameters for scaling and shifting the data at
    every layer during training. Also at the training phase, the score of the running
    mean and standard deviation of the data is maintained so that it can be used to
    normalize the test data before evaluation.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
- en: Batch normalization also mitigates the exploding and vanishing gradient problem
    irrespective of weight initialization. However, due to the added computational
    step at each layer, the network may be a bit slower. A batch normalization layer
    is added to a TensorFlow 2.0 network model by calling the method **‘tf.keras.layers.
    BatchNormalization()’** as shown in the following code listing.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  id: totrans-250
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Gradient Clipping
  id: totrans-251
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Gradient clipping is another technique for hemming the problem of vanishing
    and exploding gradients mostly seen in recurrent networks due to training via
    backpropagation across a large number of deep recurrent layers. Gradient clipping
    involves trimming the computed gradients so that they remain within a specific
    range; in doing so, the gradients are prevented from saturating as the network
    trains across multiple deep layers.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
- en: Gradient clipping is implemented in TensorFlow 2.0 by adjusting the **‘** **clipnorm’**
    or **‘** **clipvalue’** parameters of the selected optimizer from the **‘tf.keras.optimizers’**
    package. **‘clipnorm’** clips the gradients by norm, while **‘clipvalue’** clips
    the gradients by value.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
- en: This chapter introduces some important techniques that are employed to improve
    the performance of a neural network by further mitigating the issue of vanishing
    and exploding gradients. In the next chapter, we will see more optimization techniques
    for training deep neural network model.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
- en: 33. More on Optimization Techniques
  id: totrans-255
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we’ll go over some other optimization techniques for improving
    the ability of a neural network to learn complex patterns in a dataset.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
- en: Momentum
  id: totrans-257
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Momentum is a technique for improving the convergence speed of stochastic gradient
    descent (SGD) optimization. Remember that stochastic gradient works by learning
    the direction of steepest descent by evaluating a training example at each time
    step to optimize the weights of the network. Momentum improves on this by calculating
    the average of previous gradients in a process called exponentially smoothed averages.
    It then uses this computed average to continue to move in the direction of steepest
    descent. By doing so, it quickens the learning process. In computing this exponentially
    decayed average, a momentum hyper-parameter is introduced to control how the weight
    parameters are updated. Figure [33-1](#Fig1) shows an example of stochastic gradient
    descent with and without momentum as it converges in a function space. In TensorFlow
    2.0, momentum is added to a SGD optimizer by adjusting the **‘momentum’** parameter
    of the **SGD method, ‘tf.keras.optimizers.SGD(momentum=[float >=0])’**. The momentum
    value must be a float value that is greater or equal to 0 that accelerates SGD
    in the relevant direction and dampens oscillations.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_33_Chapter/463852_1_En_33_Fig1_HTML.jpg](../images/463852_1_En_33_Chapter/463852_1_En_33_Fig1_HTML.jpg)'
  id: totrans-259
  prefs: []
  type: TYPE_IMG
- en: Figure 33-1
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
- en: SGD with and without momentum
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
- en: Variable Learning Rates
  id: totrans-262
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Remember that the learning rate controls how large a step the gradient descent
    algorithm makes when moving in the direction of steepest descent. If the learning
    rate is large, the algorithm takes larger steps in the direction of the steepest
    gradient, as is faster. However, the algorithm may overshoot the global minimum
    and fail to converge. But if the learning rate is set to a small number, closer
    to zero, the algorithm converges slowly, but it is more guaranteed to converge.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
- en: Variable learning rates are a set of techniques for adjusting the learning rate
    of the gradient descent algorithm at every time instance while training. These
    methods are also called learning rate scheduling. Examples of variable learning
    rates include
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
- en: 'Step decay: This method reduces the learning rate by a constant factor after
    a certain number of iterations.'
  id: totrans-265
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Exponential decay: The exponential decay adapts the learning rate following
    an exponential distribution.'
  id: totrans-266
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Decay proportion: This method reduces the learning rate by a ratio of 1 over
    the time instance, **t**. The learning rate decay can be adjusted by modifying
    the proportionality constant.'
  id: totrans-267
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In TensorFlow 2.0, the **‘decay’** parameter of the selected optimizer from
    the **‘tf.keras.optimizers’** module allows time inverse decay of learning rate.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
- en: Adaptive Learning Rates
  id: totrans-269
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Adaptive learning rate, on the other hand, re-adjusts the learning rate in
    accordance with the training data. It basically uses a different learning rate
    for each parameter and adapts it during training. These techniques are based on
    the observation that each parameter results in a different type of gradient. The
    following list outlines types of adaptive learning rates in use and their method
    calls in TensorFlow 2.0:'
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
- en: 'AdaGrad: **tf.keras.optimizers.Adagrad()**'
  id: totrans-271
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'AdaDelta: **tf.keras.optimizers.Adadelta()**'
  id: totrans-272
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'RMSProp: **tf.keras.optimizers.RMSprop()**'
  id: totrans-273
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Adaptive Moments, (Adam): **tf.keras.optimizers.Adam()**'
  id: totrans-274
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: However, AdaGrad performs poorly when used for training deep learning models
    due to its monotonic learning rate which could be too aggressive, and learning
    may stop early during training. As of now, there is no proven best optimization
    technique, so the choice of the optimization technique is down to the preference
    of the model designer.
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
- en: This chapter surveys some other techniques for optimizing the weights of a deep
    neural network. These techniques have implementations in deep learning libraries
    such as Tensorflow and Keras and can be explored as hyper-parameters when designing
    a neural network solution for a particular learning use case.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we will discuss techniques for applying regularization
    to a deep neural network to prevent overfitting.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
- en: 34. Regularization for Deep Learning
  id: totrans-278
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Regularization is a technique for reducing the variance in the validation set,
    thus preventing the model from overfitting during training. In doing so, the model
    can better generalize to new examples. When training deep neural networks, a couple
    of strategies exist for use as a regularizer.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
- en: Dropout
  id: totrans-280
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Dropout is a regularization technique that prevents a deep neural network from
    overfitting by randomly discarding a number of neurons at every layer during training.
    In doing so, the neural network is not overly dominated by any one feature as
    it only makes use of a subset of neurons in each layer during training. In doing
    so, Dropout resembles an ensemble of neural networks as a similar but distinct
    neural network is trained at each layer. Dropout works by designating a probability
    that a neuron will be dropped in a layer. This probability value is called the
    Dropout rate. Figure [34-1](#Fig1) shows an example of a network with and without
    Dropout.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_34_Chapter/463852_1_En_34_Fig1_HTML.jpg](../images/463852_1_En_34_Chapter/463852_1_En_34_Fig1_HTML.jpg)'
  id: totrans-282
  prefs: []
  type: TYPE_IMG
- en: Figure 34-1
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
- en: 'Dropout. Top: Neural network without Dropout. Bottom: Neural network with Dropout.'
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
- en: In TensorFlow 2.0 Dropout is added to a model with the method **‘tf.keras.layers.Dropout()’**
    . The **‘rate’** parameter of the method controls the fraction of the input units
    to drop. It is assigned a float value between 0 and 1\. The following code listing
    shows an MLP Keras model with Dropout applied.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  id: totrans-286
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Data Augmentation
  id: totrans-287
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Data augmentation is a method for artificially generating more training data
    points. This technique is precipitated on the observation that for an increasingly
    large training dataset mitigates the problem of overfitting. For some problems,
    it may be easy to artificially generate fake data, while for others it may not
    readily be the case. A classic example where we can use data augmentation is in
    the case of image classification. Here artificial images can easily be created
    by rotating or scaling the original images to create more variations of the dataset
    for a particular image class.
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
- en: Noise Injection
  id: totrans-289
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The noise injection regularization method adds some Gaussian noise to the network
    inputs during training. Also, Gaussian noise can be added to the hidden units
    to mitigate overfitting. Yet still another form of injecting noise into the network
    is to add some Gaussian noise to the network weights. Noise injection can be considered
    as a form of data augmentation. The amount of noise added is a configurable hyper-parameter.
    Too little noise has no effect, whereas too much noise makes the mapping function
    too challenging to learn.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
- en: In TensorFlow 2.0, noise injection can be added to the model as a form of data
    augmentation using the method **‘tf.keras.layers.GaussianNoise()** **’**. The
    **‘stddev’** parameter of the method controls the standard deviation of the noise
    distribution. The following code listing shows an MLP Keras model with Gaussian
    noise applied to the model.
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  id: totrans-292
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Early Stopping
  id: totrans-293
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Early stopping involves storing the model parameters each time there is an improvement
    in the loss (or error) estimate on the validation dataset. At the end of the training
    phase, the stored model parameters are used rather than the last known parameter
    before termination.
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
- en: The technique of early stopping is based on the observation that for a sufficiently
    complex classifier, as the training phase progresses, the error estimate on the
    training data continues to decrease, whereas the validation data will see an increase
    in the model error measure. This is illustrated in Figure [34-2](#Fig2).
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_34_Chapter/463852_1_En_34_Fig2_HTML.jpg](../images/463852_1_En_34_Chapter/463852_1_En_34_Fig2_HTML.jpg)'
  id: totrans-296
  prefs: []
  type: TYPE_IMG
- en: Figure 34-2
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
- en: Early stopping
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
- en: In TensorFlow 2.0, early stopping can be applied to stop training when there
    is no improvement in the validation accuracy or loss by applying the **‘tf. keras.callbacks.EarlyStopping()’**
    method as a callback when training the model. For completeness sake, we will produce
    a complete code listing with early stopping applied to the MLP Fashion-MNIST model.
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  id: totrans-300
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: With early stopping applied to the preceding code, the training will stop once
    there is no improvement to the loss on the validation dataset. The **‘patience’**
    parameter in the EarlyStopping method represents the number of epochs with no
    improvement, after which training will be stopped.
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
- en: This chapter surveys some techniques to tackle the problem of overfitting when
    training with a deep neural network. In the next chapter, we will discuss on convolutional
    neural networks for building predictive models for computer vision use cases such
    as image recognition with TensorFlow 2.0.
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
- en: 35. Convolutional Neural Networks (CNN)
  id: totrans-303
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Convolutional neural networks (CNN) are a specific type of neural network systems
    that are particularly suited for computer vision problems such as image recognition.
    In such tasks, the dataset is represented as a 2-D grid of pixels. See Figure
    [35-1](#Fig1).
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig1_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig1_HTML.jpg)'
  id: totrans-305
  prefs: []
  type: TYPE_IMG
- en: Figure 35-1
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
- en: 2-D representation of an image
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
- en: An image is depicted in the computer as a matrix of pixel intensity values ranging
    from 0 to 255\. A grayscale (or black and white) image consists of a single channel
    with 0 representing the black areas and 255 the white regions with the values
    in between for various shades of gray.
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
- en: For example, the image in Figure [35-2](#Fig2) is a 10 x 10 grayscale image
    with its matrix representation.
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig2_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig2_HTML.jpg)'
  id: totrans-310
  prefs: []
  type: TYPE_IMG
- en: Figure 35-2
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
- en: Grayscale image with matrix representation
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, a colored image consists of three channels, red, green, and
    blue, with each channel also containing pixel intensity values from 0 to 255\.
    A colored image has a matrix shape of [height x width x channel]. In Figure [35-3](#Fig3),
    we have an image of shape [10 x 10 x 3] indicating a 10 x 10 matrix with three
    channels.
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig3_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig3_HTML.jpg)'
  id: totrans-314
  prefs: []
  type: TYPE_IMG
- en: Figure 35-3
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
- en: Colored image with matrix representation
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
- en: Local Receptive Fields of the Visual Cortex
  id: totrans-317
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The core concept of convolutional neural networks is built on understanding
    the local receptive fields found in the neurons of the visual cortex – the part
    of the brain responsible for processing visual information.
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
- en: A local receptive field is an area on the neuron that excites or activates that
    neuron to fire information to other neurons. When viewing an image, the neurons
    in the visual cortex react to a small or limited area of the overall image due
    to the presence of a small local receptive field.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
- en: Hence, the neurons in the visual cortex do not all sense the entire image at
    the same time, but they are activated by viewing a local area of the image via
    its local receptive field.
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
- en: In Figure [35-4](#Fig4), the local receptive fields overlap to give a collective
    perspective on the entire image. Each neuron in the visual cortex reacts to a
    different type of visual information (e.g., lines with different orientations).
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig4_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig4_HTML.jpg)'
  id: totrans-322
  prefs: []
  type: TYPE_IMG
- en: Figure 35-4
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
- en: Local receptive field
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
- en: Other neurons have large receptive fields that react to more complex visual
    patterns such as edges, regions, and so on. From here we get the idea that neurons
    with larger receptive field receive information from those with lower receptive
    fields as they progressively learn the visual information of the image.
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
- en: Advantages of CNN over MLP
  id: totrans-326
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Suppose we have a 28 x 28 pixel set of image data, a feedforward neural network
    or multilayer perceptron will need 784 input weights plus a bias. By flattening
    an image as you would in MLP, we lose the spatial relationship of the pixels in
    the image.
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
- en: CNN, on the other hand, can learn complex image features by preserving the spatial
    relationship between the image pixels. It does so by stacking convolutional layers
    whereby the neurons in the higher layers with a larger receptive field receive
    information from neurons in the lower layers having a smaller receptive field.
    CNN learns a hierarchy of increasingly complex features from the input data as
    it flows through the network.
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
- en: In CNN, the neurons (or filters) in the convolutional layer are not all connected
    to the pixels in the input image as we have in the dense multilayer perceptron.
    Hence, a CNN is also called a sparse neural network.
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
- en: A distinct advantage of CNN over MLP is the reduced number of weights needed
    for training the network.
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
- en: 'Convolutional neural networks are composed of three fundamental types of layers:'
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
- en: Convolutional layer
  id: totrans-332
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Pooling layer
  id: totrans-333
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Fully connected layer
  id: totrans-334
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Convolutional Layer
  id: totrans-335
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The convolution layer is made up of filters and feature maps. A filter is passed
    over the input image pixels to capture a specific set of features in a process
    called convolution (see Figure [35-5](#Fig5)). The output of a filter is called
    a feature map.
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig5_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig5_HTML.jpg)'
  id: totrans-337
  prefs: []
  type: TYPE_IMG
- en: Figure 35-5
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
- en: The convolution process
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
- en: Convolution
  id: totrans-340
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Convolution is the process by which a function is applied to a matrix to extract
    specific information from the matrix. The function is implemented as a sliding
    window through the matrix, and it is more popularly called a convolutional filter
    or a kernel. Both terms are used interchangeably in the literature. The image
    in Figure [35-6](#Fig6) illustrates a filter sliding through a matrix to extract
    information from it.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig6_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig6_HTML.jpg)'
  id: totrans-342
  prefs: []
  type: TYPE_IMG
- en: Figure 35-6
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
- en: Sliding window of a filter through a matrix
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
- en: Filters are neurons in the convolutional layer. They are assigned weights and
    are applied as a sliding window through the matrix. The output of a filter is
    a feature map. Filters which are basically neurons also have a non-linear activation
    function.
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
- en: The inputs into a filter can be the matrix of the image pixels if the filter
    is at the input layer, or it can be the feature maps of a previous convolutional
    layer if the filter is applied at a deeper layer in the network.
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
- en: Filters are assigned a fixed square block for its input size. This input size
    can also be seen as the local receptive field of the filter. A common input size
    for filters is a 3 x 3 square patch as illustrated in Figure [35-7](#Fig7); other
    standard sizes include a 5 x 5 or 7 x 7 filter for extracting features from images.
    It is also a best practice to use more filters at deeper layers of the network
    and fewer filter at the input layer.
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig7_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig7_HTML.jpg)'
  id: totrans-348
  prefs: []
  type: TYPE_IMG
- en: Figure 35-7
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
- en: An example of a 3 x 3 filter kernel
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
- en: Observe that each cell in the filter has an associated weight or value. These
    values are used to multiply its associated pixel intensities and then sum up their
    results, which are filled in the appropriate cell of the convolutional result.
    This procedure is illustrated in Figure [35-8](#Fig8).
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig8_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig8_HTML.jpg)'
  id: totrans-352
  prefs: []
  type: TYPE_IMG
- en: Figure 35-8
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
- en: Sliding a convolutional filter across an image matrix to extract features
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
- en: The weights on the filter determine the filter operation and consequently the
    type of features that are extracted from the filter inputs. Different filters
    are responsible for edge detection, line detection, and so on. See Figure [35-9](#Fig9).
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig9_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig9_HTML.jpg)'
  id: totrans-356
  prefs: []
  type: TYPE_IMG
- en: Figure 35-9
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
- en: Filter types
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
- en: Key considerations to make when designing a convolutional layer are
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
- en: The filter size
  id: totrans-360
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The stride of the filter
  id: totrans-361
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The padding for the layer input
  id: totrans-362
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The *stride* of the filter determines how many pixel steps the filter makes
    when moving from one image activation to another. It is typical to use a stride
    of 1, although this could be increased for large images. See Figure [35-10](#Fig10).
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig10_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig10_HTML.jpg)'
  id: totrans-364
  prefs: []
  type: TYPE_IMG
- en: Figure 35-10
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
- en: An illustration of stride width
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
- en: Sometimes the choice of our filter size and the selected stride may not evenly
    divide up the size of the input to the filter. So to avoid losing pixel information
    since we don’t slide past the edge of the image, a technique called *zero padding*
    is employed to pad the borders of the image pixels with a defined layer of zeros.
    This allows the filter to stride evenly through all the pixels in the image by
    including the zeros in the convolution. See Figure [35-11](#Fig11).
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig11_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig11_HTML.jpg)'
  id: totrans-368
  prefs: []
  type: TYPE_IMG
- en: Figure 35-11
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
- en: An illustration of zero padding
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
- en: Feature Maps
  id: totrans-371
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Feature maps are the outputs of a filter in a convolutional layer. Feature maps
    bring to the fore certain patterns of the input image such as horizontal lines,
    vertical lines, edges, and so on. These feature maps of the various neurons stacked
    together are what forms a convolutional neural layer and enable the layer to learn
    complex patterns and features of an image.
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
- en: Moving deeper across the convolutional neural network, the inputs to a deeper
    convolutional layer are the feature maps of the previous layer. See Figure [35-12](#Fig12).
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig12_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig12_HTML.jpg)'
  id: totrans-374
  prefs: []
  type: TYPE_IMG
- en: Figure 35-12
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
- en: Feature maps as inputs to a convolutional layer
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
- en: The Pooling Layer
  id: totrans-377
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Pooling layers typically follow one or more convolutional layers. The goal of
    the pooling layer is to reduce or downsample the feature map of the convolutional
    layer. The pooling layer summarizes the image features learned in the previous
    network layers. By doing so, it also helps prevent the network from overfitting.
    Moreso, the reduction in the input size also bodes well for processing and memory
    costs when training the network.
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
- en: The pooling layer can be seen as an aggregation function that consolidates learned
    features and extracts the essential features from previous layers. It does not
    conduct any multiplicative transformation on the input feature maps as seen in
    the convolutional layer.
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
- en: The aggregation functions carried out by the pooling layer include max, sum,
    and average. The most frequently used aggregation function in practice is the
    max and is commonly called the MaxPool.
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
- en: The aggregation functions of the pooling layer serve as the layers’ filters.
    Just like the filters of the convolutional layer, they have a receptive field
    (although smaller in size than that of the convolutional layer) and a stride width.
    Howbeit, the filters which are the neurons of the pooling layer have no weight
    or biases. A typical size for the pooling filter is a 2 x 2 matrix as shown in
    Figure [35-13](#Fig13).
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig13_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig13_HTML.jpg)'
  id: totrans-382
  prefs: []
  type: TYPE_IMG
- en: Figure 35-13
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
- en: Example of pooling with MaxPooling
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
- en: The essential advantage of the pooling layer is its ability to inject location
    invariance into the network. Location invariance means that features can be detected
    by the network no matter where they are on the image.
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
- en: The pooling layer applies its aggregation function to all the channels of the
    input image. For example, in an R, G, B image (i.e., an image with three channels,
    red, green, and blue), the MaxPool will be applied independently to all the three
    channels. Similarly, for feature maps with a particular depth, the pooling aggregation
    will be applied separately to each feature map. See Figure [35-14](#Fig14) as
    an example of applying pooling to the channel depth of its inputs.
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig14_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig14_HTML.jpg)'
  id: totrans-387
  prefs: []
  type: TYPE_IMG
- en: Figure 35-14
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
- en: Example of applying pooling to input with depth. Note that the filters in the
    pooling layer have no weights or biases
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
- en: The Fully Connected Network Layer
  id: totrans-390
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The fully connected network (FCN) layer is our regular feedforward neural network
    or multilayer perceptron. These layers typically have a non-linear activation
    function. In any case, the FCN is the final layer of the convolutional neural
    network. In this case, a softmax activation is used to output the probabilities
    that an input belongs to a particular class.
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
- en: Before passing an input into the FCN, the image matrix will have to be flattened.
    For example, a 28 x 28 x 3 image matrix will become 2352 input weights plus a
    bias of 1 into the fully connected network.
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
- en: In the case of our convolutional network , the feature maps of either the convolutional
    or pooling layer are flattened before passing into the FCN to compute the final
    network probabilities using the softmax function.
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
- en: An Example CNN Architecture
  id: totrans-394
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We have discussed the building blocks of a convolutional neural network system.
    As you’ve seen, a CNN system is principally composed of convolution layers, pooling
    layers, and the fully connected layer. However, the way these layers are arranged
    and in what number are down to the preferred heuristics of the particular use
    case that a CNN is employed in solving.
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
- en: 'An example CNN modeling pipeline is shown here:'
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
- en: The first layer following the input layer of images must be a convolutional
    layer for extracting image features. A 3 x 3 image filter is commonly used depending
    on the size of the input image.
  id: totrans-397
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Pooling layers typical follow a set of one or more convolutional layers. Typically,
    a 2 x 2 filter size is used in the pooling layer.
  id: totrans-398
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The fully connected layer must be the final layer of the CNN. It is also called
    the dense layer. It contains the softmax activation function to give the probabilities
    of class membership.
  id: totrans-399
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: CNN may include one or more Dropout layers to prevent the network from overfitting.
  id: totrans-400
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Figure [35-15](#Fig15) is an example of a CNN architecture.
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig15_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig15_HTML.jpg)'
  id: totrans-402
  prefs: []
  type: TYPE_IMG
- en: Figure 35-15
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
- en: CNN architecture
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
- en: CNN for Image Recognition with TensorFlow 2.0
  id: totrans-405
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this example, we will build a convolutional neural network (CNN) to classify
    images from the CIFAR-10 dataset. CIFAR-10 is another standard image classification
    dataset to classify a colored 32 x 32 pixel image data into ten image classes,
    namely, airplane, automobile, bird, cat, deer, dog, frog, horse, ship, and truck.
    The focus of this section is exclusively on using TensorFlow 2.0 methods to build
    a CNN image classifier.
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
- en: 'The CNN model architecture implemented loosely mirrors the Krizhevsky’s architecture,
    also known as AlexNet. The network architecture has the following layers:'
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
- en: 'Convolution layer: kernel_size = [5 x 5]'
  id: totrans-408
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Convolution layer: kernel_size = [5 x 5]'
  id: totrans-409
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Batch normalization layer
  id: totrans-410
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Convolution layer: kernel_size = [5 x 5]'
  id: totrans-411
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Max pooling: pool size = [2 x 2]'
  id: totrans-412
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Convolution layer: kernel_size = [5 x 5]'
  id: totrans-413
