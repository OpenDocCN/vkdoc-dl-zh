- en: Part VIDeep Learning in Practice
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第 7 部分：实践中的深度学习
- en: 30. TensorFlow 2.0 and Keras
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 30. TensorFlow 2.0 和 Keras
- en: TensorFlow (TF) is a specialized numerical computation library for deep learning.
    It is the preferred tool by numerous deep learning researchers and industry practitioners
    for developing deep learning models and architectures as well as for serving learned
    models into production servers and software products. This chapter is focused
    on TensorFlow 2.0.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow (TF) 是一个专门用于深度学习的数值计算库。它是众多深度学习研究人员和行业从业者开发深度学习模型和架构以及将学习模型部署到生产服务器和软件产品中的首选工具。本章专注于
    TensorFlow 2.0。
- en: Navigating Through the TensorFlow API
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 探索 TensorFlow API
- en: Understanding the different levels of the TF API hierarchy is critical to working
    effectively with TF. The task of building a TF deep learning model may be addressed
    via different TF API levels. An understanding of the API hierarchy provides clarity
    on implementing neural network models with TF as well as navigating the TF ecosystem.
    The TF API hierarchy is primarily composed of three API levels, the high-level
    API, the mid-level API which provides components for building neural network models,
    and the low-level API. A diagrammatic representation of this is shown in Figure
    [30-1](#Fig1).
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 理解 TF API 层次结构的不同级别对于有效地使用 TF 至关重要。构建 TF 深度学习模型的任务可以通过不同的 TF API 级别来解决。了解 API
    层次结构可以提供使用 TF 实现神经网络模型以及导航 TF 生态系统的清晰度。TF API 层次结构主要由三个 API 级别组成：高级 API、提供构建神经网络模型组件的中级
    API 和低级 API。这种结构的图示在图 [30-1](#Fig1) 中展示。
- en: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig1_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig1_HTML.jpg)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig1_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig1_HTML.jpg)'
- en: Figure 30-1
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 图 30-1
- en: TensorFlow API hierarchy
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow API 层次结构
- en: The Low-Level TensorFlow APIs
  id: totrans-8
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 低级 TensorFlow API
- en: The low-level API gives the tools for building network graphs from the ground
    up using mathematical operations. This API level affords the greatest level of
    flexibility to tweak and tune the model as desired. Moreover, the higher-level
    APIs implement low-level operations under the hood.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 低级 API 提供了从底层使用数学运算构建网络图的工具。此 API 级别提供了最大的灵活性来调整和调整模型，以满足需求。此外，高级 API 在底层实现了低级操作。
- en: The Mid-Level TensorFlow APIs
  id: totrans-10
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 中级 TensorFlow API
- en: TensorFlow provides a set of reusable packages for simplifying the process involved
    in creating neural network models. Some examples of these functions include the
    layers **(tf.keras.layers)**, Datasets **(tf.data)**, metrics **(tf.keras.metrics)**,
    loss **(tf.keras.losses)**, and FeatureColumns **(tf.feature_column)** packages.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow 提供了一系列可重用的包，用于简化创建神经网络模型的过程。这些函数的例子包括层 **(tf.keras.layers**)、数据集
    **(tf.data**)、度量 **(tf.keras.metrics**)、损失 **(tf.keras.losses**) 和特征列 **(tf.feature_column**)
    包。
- en: Layers
  id: totrans-12
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 层
- en: The layers package **(tf.keras.layers)** provides a handy set of functions to
    simplify the construction of layers in a neural network architecture. For example,
    consider the convolutional network architecture in Figure [30-2](#Fig2) and how
    the layers API simplifies the creation of the network layers.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 层包 **(tf.keras.layers**) 提供了一套方便的函数，用于简化神经网络架构中层的构建。例如，考虑图 [30-2](#Fig2) 中的卷积网络架构以及层
    API 如何简化网络层的创建。
- en: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig2_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig2_HTML.jpg)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig2_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig2_HTML.jpg)'
- en: Figure 30-2
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 图 30-2
- en: Using the layers API to simplify creating the layers of a neural network
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 使用层 API 简化创建神经网络层
- en: Datasets
  id: totrans-17
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 数据集
- en: The Dataset package **(tf.data)** provides a convenient set of high-level functions
    for creating complex dataset input pipelines. The goal of the Dataset package
    is to have a fast, flexible, and easy-to-use interface for fetching data from
    various data sources, performing data transform operations on them before passing
    them as inputs to the learning model. The Dataset API provides a more efficient
    means of fetching records from a dataset. The major classes of the Dataset API
    are illustrated in Figure [30-3](#Fig3).
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集包 **(tf.data**) 提供了一套方便的高级函数，用于创建复杂的数据集输入管道。数据集包的目标是提供一个快速、灵活且易于使用的接口，用于从各种数据源获取数据，在将它们作为学习模型的输入之前对它们进行数据转换操作。数据集
    API 提供了一种更有效的方法来从数据集中检索记录。数据集 API 的主要类在图 [30-3](#Fig3) 中展示。
- en: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig3_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig3_HTML.jpg)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig3_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig3_HTML.jpg)'
- en: Figure 30-3
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 图 30-3
- en: Dataset API class hierarchy
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集 API 类层次结构
- en: 'From the illustration in Figure [30-3](#Fig3), the subclasses perform the following
    functions:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 从图 [30-3](#Fig3) 的说明中，子类执行以下功能：
- en: 'TextLineDataset: This class is used for reading lines from text files.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: TextLineDataset：此类用于从文本文件中读取行。
- en: 'TFRecordDataset: This class is responsible for reading records from TFRecord
    files. A TFRecord file is a TensorFlow binary storage format. It is faster and
    easier to work with data stored as TFRecord files as opposed to raw data files.
    Working with TFRecord also makes the data input pipeline more easily aligned for
    applying vital transformations such as shuffling and returning data in batches.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: TFRecordDataset：此类负责从 TFRecord 文件中读取记录。TFRecord 文件是 TensorFlow 的二进制存储格式。与原始数据文件相比，处理存储为
    TFRecord 文件的数据更快、更简单。使用 TFRecord 还使得数据输入管道更容易对齐，以便应用重要的转换，如洗牌和分批返回数据。
- en: 'FixedLengthRecordDataset: This class is responsible for reading records of
    fixed sizes from binary files.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: FixedLengthRecordDataset：此类负责从二进制文件中读取固定大小的记录。
- en: FeatureColumns
  id: totrans-26
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: FeatureColumns
- en: FeatureColumns **tf.feature_column** is a TensorFlow functionality for describing
    the features of the dataset that will be fed into a high-level Keras or Estimator
    models for training and validation. FeatureColumns makes it easy to prepare data
    for modeling by carrying out tasks such as the conversion of categorical features
    of the dataset into a one-hot encoded vector.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: FeatureColumns **tf.feature_column** 是 TensorFlow 用于描述将要输入到高级 Keras 或 Estimator
    模型进行训练和验证的数据集特征的函数。FeatureColumns 通过执行诸如将数据集的分类特征转换为独热编码向量等任务，使得准备数据以进行建模变得容易。
- en: The **feature_column** API is broadly divided into two categories; they are
    the categorical and dense columns. The categories and subsequent functions are
    illustrated in Figure [30-4](#Fig4).
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**feature_column** API 广泛分为两大类；它们是分类列和密集列。类别及其后续函数在图 [30-4](#Fig4) 中进行了说明。'
- en: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig4_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig4_HTML.jpg)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig4_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig4_HTML.jpg)'
- en: Figure 30-4
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 图 30-4
- en: Function calls of the Feature Column API
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: Feature Column API 的函数调用
- en: Let’s go through each API function briefly in Table [30-1](#Tab1).
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们简要地通过表 [30-1](#Tab1) 介绍每个 API 函数。
- en: Table 30-1
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 表 30-1
- en: '***tf.feature_column*** API Functions'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '***tf.feature_column*** API 函数'
- en: '| Function name | Description |'
  id: totrans-35
  prefs: []
  type: TYPE_TB
  zh: '| 函数名称 | 描述 |'
- en: '| --- | --- |'
  id: totrans-36
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Numeric column – **tf.feature_column.numeric_column()** | This is a high-level
    wrapper for numeric features in the dataset. |'
  id: totrans-37
  prefs: []
  type: TYPE_TB
  zh: '| 数值列 – **tf.feature_column.numeric_column()** | 这是一个对数据集中的数值特征的高级包装。 |'
- en: '| Indicator column – **tf.feature_column.indicator_column()** | The indicator
    column takes as input a categorical column and transforms it into a one-hot encoded
    vector. |'
  id: totrans-38
  prefs: []
  type: TYPE_TB
  zh: '| 指示列 – **tf.feature_column.indicator_column()** | 指示列将一个分类列作为输入，并将其转换为独热编码向量。
    |'
- en: '| Embedding column – **tf.feature_column.embedding_column()** | The embedding
    column function transforms a categorical column with multiple levels or classes
    into a lower-dimensional numeric representation that captures the relationships
    between the categories. Using embeddings mitigates the problem of a large sparse
    vector (an array with mostly zeros) created via one-hot encoding for a dataset
    feature with lots of different classes. |'
  id: totrans-39
  prefs: []
  type: TYPE_TB
  zh: '| 嵌入列 – **tf.feature_column.embedding_column()** | 嵌入列函数将具有多个级别或类别的分类列转换为低维数值表示，以捕捉类别之间的关系。使用嵌入可以缓解通过独热编码为具有许多不同类别的数据集特征创建的大稀疏向量（大部分为零的数组）的问题。
    |'
- en: '| Categorical column with identity – **tf.feature_column.categorical_ column_with_identity()**
    | This function creates a one-hot encoded output of a categorical column containing
    identities, e.g, [‘0’, ‘1’, ‘2’, ‘3’]. |'
  id: totrans-40
  prefs: []
  type: TYPE_TB
  zh: '| 具有身份的分类列 – **tf.feature_column.categorical_column_with_identity()** | 此函数创建一个包含身份的分类列的独热编码输出，例如，[‘0’，‘1’，‘2’，‘3’]。
    |'
- en: '| Categorical column with vocabulary list – **tf.feature_column.categorical_
    column_with_vocabulary_list()** | This function creates a one-hot encoded output
    of a categorical column with strings. It maps each string to an integer based
    on a vocabulary list. However, if the vocabulary list is long, it is best to create
    a file containing the vocabulary and use the function **tf.feature_column.categorical_
    column_with_vocabulary_file().** |'
  id: totrans-41
  prefs: []
  type: TYPE_TB
  zh: '| 带词汇表的分类列 – **tf.feature_column.categorical_column_with_vocabulary_list()**
    | 此函数创建一个分类列的one-hot编码输出，其中字符串被映射到整数，基于词汇表。然而，如果词汇表很长，最好创建一个包含词汇表的文件，并使用函数 **tf.feature_column.categorical_column_with_vocabulary_file().**
    |'
- en: '| Categorical column with hash bucket – **tf.feature_column.categorical_ column_with_hash_buckets()**
    | This function specifies the number of categories by using the hash of the inputs.
    It is used when it is not possible to create a vocabulary for the number of categories
    due to memory considerations. |'
  id: totrans-42
  prefs: []
  type: TYPE_TB
  zh: '| 带哈希桶的分类列 – **tf.feature_column.categorical_column_with_hash_buckets()** |
    此函数通过使用输入的哈希值来指定类别数量。当由于内存考虑无法为类别数量创建词汇表时使用。|'
- en: '| Crossed column – **tf.feature_columns.crossed_column()** | The function gives
    the ability to combine multiple input features into a single input feature. |'
  id: totrans-43
  prefs: []
  type: TYPE_TB
  zh: '| 交叉列 – **tf.feature_columns.crossed_column()** | 该函数提供了将多个输入特征组合成单个输入特征的能力。|'
- en: '| Bucketized column – **tf.feature_column.bucketized_column()** | The function
    splits a column of numerical inputs into buckets to form new classes based on
    a specified set of numerical ranges. |'
  id: totrans-44
  prefs: []
  type: TYPE_TB
  zh: '| 分桶列 – **tf.feature_column.bucketized_column()** | 该函数将数值输入列分割成桶，根据指定的数值范围形成新的类别。|'
- en: The High-Level TensorFlow APIs
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 高级TensorFlow API
- en: The high-level API provides simplified API calls that encapsulate lots of the
    details that are typically involved in creating a deep learning TensorFlow model.
    These high-level abstractions make it easier to develop powerful deep learning
    models quickly with fewer lines of code.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 高级API提供了简化的API调用，封装了创建深度学习TensorFlow模型时通常涉及的大量细节。这些高级抽象使得用更少的代码快速开发强大的深度学习模型变得更容易。
- en: Estimator API
  id: totrans-47
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 估算器API
- en: The Estimator API is a high-level TensorFlow functionality that is aimed at
    reducing the complexity involved in building machine learning models by exposing
    methods that abstract common models and processes. There are two ways of working
    with Estimators, and they include
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 估算器API是TensorFlow的高级功能，旨在通过公开抽象常见模型和过程的API来降低构建机器学习模型所涉及复杂性。与估算器一起工作的有两种方式，包括
- en: '**Using the premade Estimators**: The premade Estimators are black box models
    made available by the TensorFlow team for building common machine learning/deep
    learning architectures such as linear regression/classification, Random forest
    regression/classification and deep neural networks for regression and classification.
    An illustration of the premade Estimators as subclasses of the Estimator class
    is shown in Figure [30-5](#Fig5).'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用预制的估算器**：预制的估算器是由TensorFlow团队提供的黑盒模型，用于构建常见的机器学习/深度学习架构，如线性回归/分类、随机森林回归/分类以及用于回归和分类的深度神经网络。预制的估算器作为估算器类的子类的示例如图[30-5](#Fig5)所示。'
- en: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig5_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig5_HTML.jpg)'
  id: totrans-50
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig5_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig5_HTML.jpg)'
- en: Figure 30-5
  id: totrans-51
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图30-5
- en: Estimator class API hierarchy
  id: totrans-52
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 估算器类API层次结构
- en: '**Creating a custom Estimator**: It is also possible to use the low-level TensorFlow
    methods to create a custom black box model for easy reusability. To do this, you
    must put your code in a method called the **model_fn**. The model function will
    include code that defines operations such as the labels or predictions, loss function,
    the training operations, and the operations for evaluation.'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创建自定义估算器**：还可以使用低级TensorFlow方法创建一个自定义的黑盒模型，以便于重用。为此，您必须将代码放入名为 **model_fn**
    的方法中。模型函数将包括定义操作，如标签或预测、损失函数、训练操作以及评估操作。'
- en: The Estimator class exposes four major methods, namely, the **fit()** , **evaluate()**
    , **predict()** , and **export_savedmodel()** methods. The **fit()** method is
    called to train the data by running a loop of training operations. The **evaluate()**
    method is called to evaluate the model performance by looping through a set of
    evaluation operations. The **predict()** method uses the trained model to make
    predictions, while the **export_savedmodel()** method is used for exporting the
    trained model to a specified directory. For both the premade and custom Estimators,
    we must write a method to build the data input pipeline into the model. This pipeline
    is built for both the training and evaluation data inputs. This is further illustrated
    in Figure [30-6](#Fig6).
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: Estimator类公开了四个主要方法，即**fit()**、**evaluate()**、**predict()**和**export_savedmodel()**方法。**fit()**方法用于通过运行训练操作的循环来训练数据。**evaluate()**方法用于通过循环一组评估操作来评估模型性能。**predict()**方法使用训练好的模型进行预测，而**export_savedmodel()**方法用于将训练好的模型导出到指定的目录。对于预制的和自定义的Estimator，我们必须编写一个方法将数据输入管道构建到模型中。这个管道是为训练和评估数据输入构建的。这进一步在图[30-6](#Fig6)中得到了说明。
- en: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig6_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig6_HTML.jpg)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![Keras程序结构图](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig6_HTML.jpg)'
- en: Figure 30-6
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 图30-6
- en: Estimator data input pipeline
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: Estimator数据输入管道
- en: Keras API
  id: totrans-58
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: Keras API
- en: Keras provides a high-level specification for developing deep neural network
    models. The Keras API was initially separate from TensorFlow and only provided
    an interface for model building with TensorFlow as one of the frameworks running
    at the backend. However, in TensorFlow 2.0, Keras is an integral part of the TensorFlow
    codebase as preferred high-level API.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: Keras为开发深度神经网络模型提供了一个高级规范。Keras API最初是独立于TensorFlow的，并且仅提供了一个用于使用TensorFlow作为后端之一进行模型构建的接口。然而，在TensorFlow
    2.0中，Keras成为了TensorFlow代码库的组成部分，作为首选的高级API。
- en: The Keras API version internal to TensorFlow is available from the ‘tf.keras’
    package, whereas the broader Keras API blueprint that is not tied to a specific
    backend will remain available from the ‘keras’ package. In summary, when working
    with the ‘keras’ package, the backend can run with either TensorFlow, Microsoft
    CNTK, or Theano. On the other hand, working with ‘tf.keras’ provides a TensorFlow
    only version which is tightly integrated and compatible with all of the functionality
    of the core TensorFlow library.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow内部的Keras API版本可以从‘tf.keras’包中获取，而与特定后端无关的更广泛的Keras API蓝图将仍然可以从‘keras’包中获取。总之，当使用‘keras’包时，后端可以运行在TensorFlow、Microsoft
    CNTK或Theano上。另一方面，使用‘tf.keras’提供的是仅适用于TensorFlow的版本，它与核心TensorFlow库的所有功能紧密集成和兼容。
- en: In this book, we will focus on **‘tf.Keras’** as a high-level API of TensorFlow.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书中，我们将重点关注**‘tf.Keras’**作为TensorFlow的高级API。
- en: The Anatomy of a Keras Program
  id: totrans-62
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Keras程序的结构
- en: The Keras **‘Model’** forms the core of a Keras program. A ‘Model’ is first
    constructed, then it is compiled. Next, the compiled model is trained and evaluated
    using their respective training and evaluation datasets. Upon successful evaluation
    using the relevant metrics, the model is then used for making predictions on previously
    unseen data samples. Figure [30-7](#Fig7) shows the program flow for modeling
    with Keras.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: Keras **‘Model’**构成了Keras程序的核心。首先构建一个‘Model’，然后对其进行编译。接下来，使用各自的训练和评估数据集对编译好的模型进行训练和评估。在成功使用相关指标进行评估后，该模型用于对之前未见过的数据样本进行预测。图[30-7](#Fig7)显示了使用Keras进行建模的程序流程。
- en: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig7_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig7_HTML.jpg)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![Keras程序结构图](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig7_HTML.jpg)'
- en: Figure 30-7
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 图30-7
- en: The anatomy of a Keras program
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: Keras程序的结构
- en: As shown in Figure [30-7](#Fig7), the Keras ‘Model’ can be constructed using
    the Sequential API ‘tf.keras.Sequential’ or the Keras Functional API which defines
    a model instance ‘tf.keras.Model’. The Sequential model is the simplest method
    for creating a linear stack of neural network layers. The Functional model is
    used if a more complex graph is desired. Keras is the de facto API for building
    neural network architectures with TensorFlow.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 如图[30-7](#Fig7)所示，Keras的‘Model’可以使用Sequential API的‘tf.keras.Sequential’或Keras
    Functional API构建，后者定义了一个模型实例‘tf.keras.Model’。Sequential模型是创建线性堆叠神经网络层的最简单方法。当需要更复杂的图时，使用Functional模型。Keras是使用TensorFlow构建神经网络架构的事实上的API。
- en: From here on, the code examples in this book will use the Sequential API, Functional
    API, and Model subclassing methods for building neural network architectures with
    Keras. In doing this, the reader can play around with the various examples as
    samples to get a feel of how they work.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 从现在起，本书中的代码示例将使用 Keras 的 Sequential API、Functional API 和模型子类化方法来构建神经网络架构。通过这种方式，读者可以尝试各种示例作为样本，以了解它们的工作方式。
- en: TensorBoard
  id: totrans-69
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: TensorBoard
- en: TensorBoard is an interactive visualization tool that comes bundled with TensorFlow.
    The goal of TensorBoard is to gain a visual insight into how the computational
    graph is constructed and executed. This information provides greater visibility
    for understanding, optimizing, and debugging deep learning models.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: TensorBoard 是 TensorFlow 内置的一个交互式可视化工具。TensorBoard 的目标是帮助我们通过可视化了解计算图是如何构建和执行的。这些信息有助于我们更好地理解、优化和调试深度学习模型。
- en: TensorBoard has a variety of visualization dashboard, such as
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: TensorBoard 提供了多种可视化仪表板，例如
- en: 'Scalar dashboard: This dashboard captures metrics that change with time, such
    as the loss of a model or other model evaluation metrics such as accuracy, precision,
    recall, f1, and so on.'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 标量仪表板：此仪表板捕获随时间变化的度量，例如模型的损失或其他模型评估指标，如准确率、精确度、召回率、f1 等等。
- en: 'Histogram dashboard: This dashboard shows the histogram distribution for a
    Tensor as it has changed over time.'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 直方图仪表板：此仪表板显示了 Tensor 随时间变化的直方图分布。
- en: 'Distribution dashboard: This dashboard is similar to the histogram dashboard.
    However, it displays the histogram as a distribution.'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分布仪表板：此仪表板与直方图仪表板类似。然而，它以分布的形式显示直方图。
- en: 'Graph explorer: This dashboard gives a graphical overview of the TensorFlow
    computational graph and how information flows from one node to the other. This
    dashboard provides invaluable insights into the network architecture.'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 图形探索器：此仪表板提供了 TensorFlow 计算图的图形概述以及信息如何从一个节点流向另一个节点。此仪表板为网络架构提供了宝贵的见解。
- en: 'Image dashboard: This dashboard displays images saved using the method **tf.summary.image**.'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 图像仪表板：此仪表板显示了使用 **tf.summary.image** 方法保存的图像。
- en: 'Audio dashboard: This dashboard provides audio clips saved using the method
    **tf.summary.audio**.'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 音频仪表板：此仪表板提供了使用 **tf.summary.audio** 方法保存的音频片段。
- en: 'Embedding projector: The dashboard makes it easy to visualize high-dimensional
    datasets after they have been transformed using **Embeddings**. The visualization
    uses principal component analysis (PCA) and another technique called t-distributed
    Stochastic Neighbor Embedding (t-SNE). Embedding is a technique for capturing
    the latent variables in a high-dimensional dataset by converting the data units
    into real numbers that capture their relationship. This technique is broadly similar
    to how PCA reduces data dimensionality. Embeddings are also useful for converting
    sparse matrices (matrices made up of mostly zeros) into a dense representation.'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 嵌入投影仪：该仪表板使得在数据集使用 **Embeddings** 转换后轻松可视化高维数据集变得容易。可视化使用主成分分析（PCA）和另一种称为 t
    分布随机邻域嵌入（t-SNE）的技术。嵌入是一种通过将数据单位转换为捕获其关系的实数来捕获高维数据集中潜在变量的技术。这种方法在广义上类似于 PCA 如何降低数据维度。嵌入对于将稀疏矩阵（主要由零组成的矩阵）转换为密集表示也非常有用。
- en: 'Text dashboard: This dashboard is for displaying textual information.'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文本仪表板：此仪表板用于显示文本信息。
- en: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig8_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig8_HTML.jpg)'
  id: totrans-80
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig8_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig8_HTML.jpg)'
- en: Figure 30-8
  id: totrans-81
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 30-8
- en: TensorBoard
  id: totrans-82
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: TensorBoard
- en: Features in TensorFlow 2.0
  id: totrans-83
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: TensorFlow 2.0 的特性
- en: TensorFlow 2.0 comes with new features for building machine learning models.
    Some of these new features include
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow 2.0 为构建机器学习模型带来了新特性。其中一些新特性包括
- en: A more pythonic feel to model design and debugging with eager execution as the
    de facto execution mode.
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以立即执行作为默认执行模式，模型设计和调试具有更 Pythonic 的感觉。
- en: Eager execution enables instant evaluation of TensorFlow operations. This is
    opposed to previous versions of Tensorflow where we first construct a computational
    graph and then execute it in a session.
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 立即执行使 TensorFlow 操作的即时评估成为可能。这与 TensorFlow 的早期版本相反，在早期版本中，我们首先构建一个计算图，然后在会话中执行它。
- en: Using tf.function to transform a Python method into high-performance TensorFlow
    graphs.
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 `tf.function` 将 Python 方法转换为高性能的 TensorFlow 图。
- en: Using Keras as the core high-level API for model design.
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将 Keras 作为模型设计的核心高级 API。
- en: Using FeatureColumns to parse data as input into Keras models.
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用特征列将数据解析为Keras模型的输入。
- en: The ease of training on distributed architectures and devices.
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在分布式架构和设备上训练的简便性。
- en: To install and work with TensorFlow 2.0 on Google Colab, run
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 要在Google Colab上安装和使用TensorFlow 2.0，请运行
- en: '[PRE0]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: The GCP Deep Learning VM has images with TensorFlow 2.0 pre-configured.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: GCP深度学习VM具有预配置了TensorFlow 2.0的镜像。
- en: A Simple TensorFlow Program
  id: totrans-94
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一个简单的TensorFlow程序
- en: Let’s start by building a simple TF program. Here, we will build a graph to
    find the roots of the quadratic expression *x*² + 3*x* − 4 = 0.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从构建一个简单的TF程序开始。在这里，我们将构建一个图来找到二次表达式 *x*² + 3*x* - 4 = 0 的根。
- en: '[PRE1]'
  id: totrans-96
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**tf.constant()** is a Tensor for storing a constant type. Now let’s calculate
    the roots of the expression.'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: '**tf.constant()** 是用于存储常量类型的张量。现在让我们计算表达式的根。'
- en: '[PRE2]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: TensorFlow 2.0 is eager-first; this implies that operations are executed immediately
    after they are defined, just like regular python code.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow 2.0以 eager-first为特点；这意味着操作在定义后立即执行，就像常规Python代码一样。
- en: Building Efficient Input Pipelines with the Dataset API
  id: totrans-100
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用Dataset API构建高效输入管道
- en: The Dataset API **‘tf.data’** offers an efficient mechanism for building robust
    input pipelines for passing data into a TensorFlow program. This section uses
    the Boston housing dataset to illustrate working with the Dataset API methods
    for building data input pipelines in TensorFlow.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集API **‘tf.data’** 提供了一种高效机制，用于构建健壮的输入管道，以便将数据传递到TensorFlow程序中。本节使用波士顿房价数据集来说明在TensorFlow中使用数据集API方法构建数据输入管道的工作方式。
- en: '[PRE3]'
  id: totrans-102
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'From the preceding code listing, take note of the following:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 从先前的代码列表中，请注意以下内容：
- en: The method **‘tf.data.Dataset.from_tensor_slices()’** is used to create a Dataset
    whose elements are Tensor slices.
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 **‘tf.data.Dataset.from_tensor_slices()’** 方法创建一个元素为张量切片的数据集。
- en: The Dataset method **‘shuffle()’** shuffles the Dataset at each epoch.
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据集方法 **‘shuffle()’** 在每个epoch中对数据集进行洗牌。
- en: The Dataset method **‘batch()’** is used to set the size of each mini-batch
    of the Dataset. In the preceding example, each Dataset batch contains five observations.
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据集方法 **‘batch()’** 用于设置数据集每个小批次的尺寸。在先前的示例中，每个数据集批次包含五个观测值。
- en: Linear Regression with TensorFlow
  id: totrans-107
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用TensorFlow进行线性回归
- en: In this section, we use TensorFlow to implement a linear regression machine
    learning model. In the following example, we use the Boston house-prices dataset
    from the **Keras dataset package** to build a linear regression model with TensorFlow
    2.0.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们使用TensorFlow实现线性回归机器学习模型。在以下示例中，我们使用来自 **Keras数据集包** 的波士顿房价数据集，使用TensorFlow
    2.0构建线性回归模型。
- en: '[PRE4]'
  id: totrans-109
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'Here are a few points and methods to take note of in the preceding code listing
    for linear regression with TensorFlow :'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 在先前的代码列表中，对于使用TensorFlow进行线性回归，以下是一些需要注意的要点和方法：
- en: Note that transformation to standardize the feature dataset is performed after
    splitting the data into train and test sets. This action is performed in this
    manner to prevent information from the training data to pollute the test data
    which must remain unseen by the model.
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 注意，在将数据分为训练集和测试集之后，执行标准化特征数据集的转换。这样做是为了防止训练数据的信息污染测试数据，测试数据必须保持对模型不可见。
- en: The class named **‘LinearRegressionModel’** builds a Keras model by subclassing
    the **‘tf.keras.Model’** class. The linear regression model is created as a layer
    of the neural network in the **‘__init__’** method, and it is defined as a forward
    pass in the **‘call’** method. In Chapter [31](463852_1_En_31_Chapter.xhtml) on
    Keras, we will see how to use simpler routines with the Keras Functional API.
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 命名为 **‘LinearRegressionModel’** 的类通过继承 **‘tf.keras.Model’** 类来构建Keras模型。线性回归模型在
    **‘__init__’** 方法中作为神经网络的一层创建，并在 **‘call’** 方法中定义为前向传递。在第[31](463852_1_En_31_Chapter.xhtml)章中，我们将看到如何使用Keras功能API进行更简单的操作。
- en: The **‘tf.data.Dataset.from_tensor_slices’** method uses the **‘.minimize()’**
    method to update the loss function.
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**‘tf.data.Dataset.from_tensor_slices’** 方法使用 **‘.minimize()’** 方法更新损失函数。'
- en: The squared error loss function is defined with **‘tf.keras.losses.MeanSquaredError()’**.
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 **‘tf.keras.losses.MeanSquaredError()’** 定义了平方误差损失函数。
- en: The gradient descent optimization algorithm is defined using **‘tf.keras.optimizers.SGD()’**
    with the learning rate set as a parameter to the method.
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 **‘tf.keras.optimizers.SGD()’** 定义梯度下降优化算法，并将学习率设置为方法的参数。
- en: The method to capture the loss and root mean squared error estimates is defined
    using **‘tf.keras.metrics.Mean(name=‘train_loss’)’** and **‘tf.keras.metrics.RootMeanSquaredError()’**
    functions, respectively.
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 **‘tf.keras.metrics.Mean(name=‘train_loss’)’** 和 **‘tf.keras.metrics.RootMeanSquaredError()’**
    函数分别定义了捕获损失和均方根误差估计的方法。
- en: The @tf.function is a python decorator to transform a method into high-performance
    TensorFlow graphs.
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '@tf.function 是一个 Python 装饰器，用于将方法转换为高性能的 TensorFlow 图。'
- en: The method **‘train_step’** uses the **‘tf.GradientTape()’** method to record
    operations for automatic differentiation. These gradients are later used to minimize
    the cost function by calling the **‘apply_gradients()’** method of the optimization
    algorithm.
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 方法 **‘train_step’** 使用 **‘tf.GradientTape()’** 方法记录用于自动微分的操作。这些梯度随后通过调用优化算法的
    **‘apply_gradients()’** 方法来最小化成本函数。
- en: The method **‘test_step’** uses the trained model to obtain predictions on test
    data .
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 方法 **‘test_step’** 使用训练好的模型对测试数据进行预测。
- en: Classification with TensorFlow
  id: totrans-120
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 TensorFlow 进行分类
- en: In this example, we’ll use the Iris flower dataset to build a multivariable
    logistic regression machine learning classifier with TensorFlow 2.0\. The dataset
    is gotten from the Scikit-learn dataset package.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 在本例中，我们将使用 Iris 花数据集，利用 TensorFlow 2.0 构建一个多变量逻辑回归机器学习分类器。数据集来自 Scikit-learn
    数据集包。
- en: '[PRE5]'
  id: totrans-122
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'From the preceding code, listing is similar to the example on linear regression
    with TensorFlow 2.0\. However, take note of the following procedures:'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 从前面的代码列表中，与 TensorFlow 2.0 中的线性回归示例类似。然而，请注意以下步骤：
- en: The target variable **‘y’** is converted to a one-hot encoded matrix by using
    the **‘OneHotEncoder’** function from Scikit-learn. There exists a TensorFlow
    method named **‘tf.one_hot’** for performing the same function, even easier! The
    reader is encouraged to Experiment with this.
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 目标变量 **‘y’** 通过使用 Scikit-learn 的 **‘OneHotEncoder’** 函数转换为独热编码矩阵。存在一个名为 **‘tf.one_hot’**
    的 TensorFlow 方法，用于执行相同的功能，而且更加简单！鼓励读者进行实验。
- en: Observe how the **‘tf.reduce_mean’** and the **‘tf.nn.softmax_cross_entropy_with_logits’**
    methods are used to implement the loss for optimizing the logistic model.
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 观察如何使用 **‘tf.reduce_mean’** 和 **‘tf.nn.softmax_cross_entropy_with_logits’**
    方法实现逻辑模型的损失以进行优化。
- en: The Stochastic Gradient Descent optimization algorithm **‘tf.keras.optimizers.SGD()’**
    is used to train the logistic model.
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 **‘tf.keras.optimizers.SGD()’** 优化的随机梯度下降算法用于训练逻辑模型。
- en: Observe how the **‘weight’** and **‘bias’** variables are updated by the gradient
    descent optimizer within the **‘train_step’** method using **‘tf.GradientTape()’**
    to capture and compute the derivatives from the trainable model variables.
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 观察如何在 **‘train_step’** 方法中使用 **‘tf.GradientTape()’** 来捕获和计算可训练模型变量的导数，从而更新 **‘weight’**
    和 **‘bias’** 变量。
- en: The **‘tf.keras.metrics.Accuracy’** method is used to evaluate the accuracy
    of the model.
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**‘tf.keras.metrics.Accuracy’** 方法用于评估模型的准确度。'
- en: Visualizing with TensorBoard
  id: totrans-129
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 TensorBoard 进行可视化
- en: In this section, we will go through visualizing TensorFlow graphs and statistics
    with TensorBoard. The following code improves on the previous code to build a
    linear regression model by adding methods to visualize the graph and other variable
    statistics in TensorBoard using the **‘tf.summary’** method calls. The TensorBoard
    output (illustrated in Figure [30-9](#Fig9)) is displayed within the notebook.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将通过 TensorBoard 来可视化 TensorFlow 图和统计信息。以下代码在之前代码的基础上进行了改进，通过添加用于在 TensorBoard
    中可视化图和其他变量统计信息的方法来构建线性回归模型，使用的是 **‘tf.summary’** 方法调用。TensorBoard 输出（如图 [30-9](#Fig9)
    所示）在笔记本中显示。
- en: '[PRE6]'
  id: totrans-131
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'From the preceding code listing, take note of the following steps:'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 从前面的代码列表中，请注意以下步骤：
- en: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig9_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig9_HTML.jpg)'
  id: totrans-133
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig9_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig9_HTML.jpg)'
- en: Figure 30-9
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 图 30-9
- en: TensorBoard visualization dashboard for linear regression metrics
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 线性回归指标的 TensorBoard 可视化仪表板
- en: The **‘tf.summary.create_file_writer’** method creates summary writers to write
    the summaries to disk.
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**‘tf.summary.create_file_writer’** 方法创建用于将摘要写入磁盘的摘要写入器。'
- en: The **‘tf.summary.scalar’** method is used to capture scalar metrics for TensorBoard.
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**‘tf.summary.scalar’** 方法用于捕获 TensorBoard 的标量指标。'
- en: The magic command ‘%tensorboard’ is used to launch TensorBoard by pointing to
    the appropriate log directory.
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用魔法命令 ‘%tensorboard’ 通过指向适当的日志目录来启动 TensorBoard。
- en: Running TensorFlow with GPUs
  id: totrans-139
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在 GPU 上运行 TensorFlow
- en: GPU is short for graphics processing unit. It is a specialized processor designed
    for carrying out complex computations on large memory blocks. GPUs provide more
    efficient processing for building deep learning models.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: GPU 是图形处理单元的缩写。它是一种专为在大型内存块上执行复杂计算而设计的专用处理器。GPU 为构建深度学习模型提供了更高效的处理能力。
- en: TensorFlow can leverage processing on multiple GPUs to speed up computation
    especially when training a complex network architecture. To take advantage of
    parallel processing, a replica of the network architecture resides on each GPU
    machine and trains a subset of the data. However, for synchronous updates, the
    model parameters from each tower (or GPU machines) are stored and updated on a
    CPU. It turns out that CPUs are generally good at mean or averaging processing.
    A diagram of this operation is shown in Figure [30-10](#Fig10).
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow 可以利用多 GPU 的处理能力来加速计算，尤其是在训练复杂的网络架构时。为了利用并行处理，网络架构的副本位于每个 GPU 机器上，并训练数据的一个子集。然而，对于同步更新，每个塔（或
    GPU 机器）的模型参数存储和更新在 CPU 上。结果证明，CPU 通常擅长均值或平均处理。该操作的示意图如图 [30-10](#Fig10) 所示。
- en: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig10_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig10_HTML.jpg)'
  id: totrans-142
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig10_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig10_HTML.jpg)'
- en: Figure 30-10
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 图 30-10
- en: Framework for training on multiple GPUs
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 多 GPU 训练框架
- en: 'TensorFlow 2.0 performs distributed training across multiple machines (i.e.,
    CPUs, GPUs, or TPUs) using the **‘tf.distribute.Strategy’** API. To use GPUs on
    Google Colab, first change the runtime type to GPU and install the TensorFlow
    with GPU library by running the following code in the notebook cell:'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow 2.0 使用 **‘tf.distribute.Strategy’** API 在多台机器（即 CPU、GPU 或 TPUs）上执行分布式训练。要在
    Google Colab 上使用 GPU，首先将运行时类型更改为 GPU，并在笔记本单元中运行以下代码来安装具有 GPU 库的 TensorFlow：
- en: '[PRE7]'
  id: totrans-146
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The following code block uses GPUs for model training. In this example we train
    a simple regression model on the Boston housing dataset. The method **‘tf.distribute.MirroredStrategy()’**
    implements a distribution strategy called MirroredStrategy. This strategy supports
    distributed training with multiple GPUs on a single machine. The code is similar
    to the previous code for linear regression with TensorFlow 2.0\. However, minimal
    changes are added to make the components such as variables, layers, models, optimizers,
    metrics, summaries, and checkpoints strategy-aware using the strategy scope().
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 以下代码块使用 GPU 进行模型训练。在这个例子中，我们使用波士顿房价数据集训练一个简单的回归模型。方法 **‘tf.distribute.MirroredStrategy()’**
    实现了一个名为 MirroredStrategy 的分布式策略。这个策略支持在单台机器上使用多个 GPU 进行分布式训练。代码与 TensorFlow 2.0
    中用于线性回归的先前代码类似。然而，为了使变量、层、模型、优化器、指标、摘要和检查点等组件策略感知，添加了一些最小更改，使用 strategy scope()
    函数。
- en: '[PRE8]'
  id: totrans-148
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'Please note the following from the preceding code block:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意以下来自先前代码块的内容：
- en: When writing a custom training loop, sum the per example losses and divide the
    sum by the global batch size. In the code tf.reduce_sum(per_example_loss) * (1\.
    / global_batch_size). This needs to be done because after calculation on each
    replica, the gradients are synced across the replicas by summing them. When using
    tf.keras.losses classes, the loss reduction needs to be explicitly specified to
    be one of NONE or SUM.
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当编写自定义训练循环时，计算每个示例的损失总和，然后除以全局批量大小。在代码中为 tf.reduce_sum(per_example_loss) * (1.
    / global_batch_size)。这是因为在每个副本的计算之后，通过求和将梯度同步到各个副本。当使用 tf.keras.losses 类时，需要显式指定损失减少为
    NONE 或 SUM 之一。
- en: 'TensorFlow High-Level APIs: Using Estimators'
  id: totrans-151
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: TensorFlow 高级 API：使用 Estimators
- en: In this section, we will use the high-level TensorFlow Estimator API for modeling
    with premade Estimators. Estimators provide another high-level API for building
    TensorFlow models for execution on CPUs, GPUs, or TPUs with minimal code modification.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将使用高级 TensorFlow Estimator API 和预制的 Estimators 进行建模。Estimators 提供了另一个高级
    API，用于构建 TensorFlow 模型，以便在 CPU、GPU 或 TPUs 上执行，而无需进行大量代码修改。
- en: 'The following steps are typically followed when working with premade Estimators:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用预制的 Estimators 时，通常遵循以下步骤：
- en: Write the **‘input_fn’** to handle the data pipeline.
  id: totrans-154
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 编写 **‘input_fn’** 以处理数据管道。
- en: Define the type of data attributes into the model using feature columns **‘tf.feature_column’**.
  id: totrans-155
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用特征列 **‘tf.feature_column’** 将数据属性的类型定义为模型。
- en: Instantiate one of the premade Estimators by passing in the feature columns
    and other relevant attributes.
  id: totrans-156
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过传递特征列和其他相关属性来实例化一个预制的 Estimator。
- en: Use the **‘train()’**, **‘evaluate()’**, and **‘predict()’** methods to train
    and evaluate the model on evaluation dataset and use the model to make prediction/inference.
  id: totrans-157
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用 **‘train()’**、**‘evaluate()’** 和 **‘predict()’** 方法在评估数据集上训练和评估模型，并使用模型进行预测/推理。
- en: Let’s see a simple example of working with a TensorFlow premade Estimator again
    using the Boston housing dataset.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们再次通过使用波士顿房价数据集来查看一个使用 TensorFlow 预制 Estimator 的工作示例。
- en: Note
  id: totrans-159
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: Reset session before running the following cells and change runtime type to
    None.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 在运行以下单元格之前重置会话，并将运行时类型更改为 None。
- en: '[PRE9]'
  id: totrans-161
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Neural Networks with Keras
  id: totrans-162
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 Keras 的神经网络
- en: In this section, we will use the Sequential and Functional Keras API to build
    a simple neural network model. A Sequential API is the most commonly used method
    to build deep neural network models by stacking one layer on another. The Functional
    API offers more flexibility to build more complex neural network architectures.
    Both API methods are relatively easy to construct in Keras as we will see in the
    examples.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将使用 Sequential 和 Functional Keras API 构建一个简单的神经网络模型。Sequential API 是通过堆叠一层又一层的层来构建深度神经网络模型的最常用方法。Functional
    API 提供了更多的灵活性来构建更复杂的神经网络架构。这两种 API 方法在 Keras 中相对容易构建，正如我们将在示例中看到的那样。
- en: Subclassing a model as we did in the preceding examples provides even more flexibility
    for building and inspecting complex models. However, the code is more verbose
    and may be prone to errors. This technique should be used when it makes the most
    sense to, depending on the problem use case. We used them previously to serve
    as an illustration.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 如前例所示，通过子类化模型提供了构建和检查复杂模型更多的灵活性。然而，代码更冗长，可能更容易出错。这种技术应根据问题的使用场景来决定是否使用。我们之前使用它们作为示例。
- en: The following examples will use the Iris Dataset to build a neural network with
    one hidden layer as illustrated in Figure [30-11](#Fig11).
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 以下示例将使用 Iris 数据集构建一个包含一个隐藏层的神经网络，如图 [30-11](#Fig11) 所示。
- en: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig11_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig11_HTML.jpg)'
  id: totrans-166
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig11_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig11_HTML.jpg)'
- en: Figure 30-11
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 图 30-11
- en: Iris dataset – neural network architecture
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: Iris 数据集 - 神经网络架构
- en: Using the Keras Sequential API
  id: totrans-169
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 Keras 顺序 API
- en: This code segment will construct a neural network model with the Sequential
    API using the method **‘tf.keras.Sequential()’** to stack layers on each other.
    The model creates a hidden layer with 32 neurons and an output layer with 3 output
    units because the Iris target contains 3 classes.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 此代码段将使用 **‘tf.keras.Sequential()’** 方法构建一个神经网络模型，通过堆叠层来创建一个包含 32 个神经元的隐藏层和一个包含
    3 个输出单元的输出层，因为 Iris 目标包含 3 个类别。
- en: '[PRE10]'
  id: totrans-171
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Using the Keras Functional API
  id: totrans-172
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 Keras 功能 API
- en: The general code pattern for the Functional API is structurally the same as
    the Sequential version. The only change here is in how the network model is constructed.
    We also demonstrated the Keras feature for printing the graph of the model in
    this example. The output is illustrated in Figure [30-12](#Fig12).
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 功能 API 的一般代码模式在结构上与顺序版本相同。这里唯一的区别在于网络模型的构建方式。我们还在这个例子中展示了 Keras 打印模型图的特性。输出如图
    [30-12](#Fig12) 所示。
- en: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig12_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig12_HTML.jpg)'
  id: totrans-174
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig12_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig12_HTML.jpg)'
- en: Figure 30-12
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 图 30-12
- en: The graph of the model – produced with Keras
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 模型的图 - 使用 Keras 生成
- en: '[PRE11]'
  id: totrans-177
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Model Visualization with Keras
  id: totrans-178
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 Keras 进行模型可视化
- en: With Keras, it is quite easy and straightforward to plot the metrics of the
    model to have a better graphical perspective as to how the model is performing
    for every training epoch. This view is also useful for dealing with issues of
    bias or variance of the model.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 Keras，绘制模型的度量指标非常简单直接，可以更好地从图形上了解模型在每个训练epoch的表现。这种视图对于处理模型的偏差或方差问题也很有用。
- en: A callback function of the ‘model.fit()’ method returns the loss and evaluation
    score for each epoch. This information is stored in a variable and plotted.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: ‘model.fit()’ 方法的回调函数返回每个epoch的损失和评估分数。这些信息存储在一个变量中并进行了绘图。
- en: In this example, we use the same Iris dataset model to illustrate visualization
    with Keras. The plots of the loss and accuracy of the model at each epoch are
    shown in Figure [30-13](#Fig13) and Figure [30-14](#Fig14), respectively.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们使用相同的 Iris 数据集模型来展示使用 Keras 的可视化。模型在每个时期的损失和准确度图分别显示在图 [30-13](#Fig13)
    和图 [30-14](#Fig14) 中。
- en: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig13_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig13_HTML.jpg)'
  id: totrans-182
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig13_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig13_HTML.jpg)'
- en: Figure 30-13
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 图 30-13
- en: Model loss per epoch
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 每个时期的模型损失
- en: '[PRE12]'
  id: totrans-185
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig14_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig14_HTML.jpg)'
  id: totrans-186
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig14_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig14_HTML.jpg)'
- en: Figure 30-14
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 图 30-14
- en: Model accuracy per epoch
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 每个时期的模型准确度
- en: '[PRE13]'
  id: totrans-189
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: TensorBoard with Keras
  id: totrans-190
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: TensorBoard 与 Keras
- en: To visualize models with TensorBoard, attach a TensorBoard callback **‘tf.keras.callbacks.TensorBoard()’**
    to the **‘model.fit()’** method before training the model. The model graph, scalars,
    histograms, and other metrics are stored as event files in the log directory.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用 TensorBoard 可视化模型，在训练模型之前，将 TensorBoard 回调 **‘tf.keras.callbacks.TensorBoard()’**附加到
    **‘model.fit()’** 方法上。模型图、标量、直方图和其他指标作为事件文件存储在日志目录中。
- en: For this example, we modify the Iris model to use TensorBoard. The TensorBoard
    output is shown in Figure [30-15](#Fig15).
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个例子，我们将 Iris 模型修改为使用 TensorBoard。TensorBoard 的输出显示在图 [30-15](#Fig15) 中。
- en: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig15_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig15_HTML.jpg)'
  id: totrans-193
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig15_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig15_HTML.jpg)'
- en: Figure 30-15
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 图 30-15
- en: TensorBoard output of Iris model
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: Iris 模型的 TensorBoard 输出
- en: '[PRE14]'
  id: totrans-196
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Checkpointing to Select Best Models
  id: totrans-197
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 检查点以选择最佳模型
- en: Checkpointing makes it possible to save the weights of the neural network model
    when there is an increase in the validation accuracy metric. This is achieved
    in Keras using the **‘tf.keras.callbacks.ModelCheckpoint()’**. The saved weights
    can then be loaded back into the model and used to make predictions. Using the
    Iris dataset, we'll build a model that saves the weights to file only when there
    is an improvement in the validation set performance. For completeness sake as
    we have done in the previous segments, we will produce this example within a complete
    code listing.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 检查点（Checkpointing）使得在验证准确度指标增加时保存神经网络模型的权重成为可能。在 Keras 中，这是通过使用 **‘tf.keras.callbacks.ModelCheckpoint()’**
    实现的。保存的权重可以随后被加载回模型中，并用于进行预测。使用 Iris 数据集，我们将构建一个模型，仅在验证集性能有所改进时才将权重保存到文件中。为了完整性，就像我们在前面的部分所做的那样，我们将在完整的代码列表中展示这个例子。
- en: '[PRE15]'
  id: totrans-199
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: This chapter covered the foundation of working with TensorFlow 2.0 and its exciting
    features for developing machine learning models. Some of these new features include
    a more pythonic feel to model design and debugging, using tf.function to transform
    a Python method into high-performance TensorFlow graphs, using Keras as the core
    high-level API for model design, using FeatureColumns to parse data as input into
    Keras models, and the ease of training on distributed architectures and devices.
    The chapter also covered the principles of building models using the high-level
    Estimator API.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 本章介绍了 TensorFlow 2.0 的工作基础及其在开发机器学习模型方面的激动人心的新特性。这些新特性包括模型设计和调试的更 Pythonic 感觉，使用
    tf.function 将 Python 方法转换为高性能 TensorFlow 图，使用 Keras 作为模型设计的核心高级 API，使用 FeatureColumns
    将数据解析为 Keras 模型的输入，以及在分布式架构和设备上训练的便利性。本章还介绍了使用高级 Estimator API 构建模型的原则。
- en: In the next chapters, we will take a deeper dive into deep neural networks and
    how they are implemented in TensorFlow with Keras. In TensorFlow 2.0, Keras is
    the de facto method for developing neural network.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的章节中，我们将更深入地探讨深度神经网络以及它们如何在 TensorFlow 的 Keras 中实现。在 TensorFlow 2.0 中，Keras
    是开发神经网络的默认方法。
- en: 31. The Multilayer Perceptron (MLP)
  id: totrans-202
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 31. 多层感知器（MLP）
- en: The multilayer perceptron (MLP) is the fundamental example of a deep neural
    network. The architecture of a MLP consists of multiple hidden layers to capture
    more complex relationships that exist in the training dataset. Another name for
    the MLP is the deep feedforward neural network (DFN). An illustration of an MLP
    is shown in Figure [31-1](#Fig1).
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 多层感知器（MLP）是深度神经网络的基本示例。MLP 的架构由多个隐藏层组成，以捕捉训练数据集中存在的更复杂的关系。MLP 的另一个名称是深度前馈神经网络（DFN）。MLP
    的示意图显示在图 [31-1](#Fig1) 中。
- en: '![../images/463852_1_En_31_Chapter/463852_1_En_31_Fig1_HTML.jpg](../images/463852_1_En_31_Chapter/463852_1_En_31_Fig1_HTML.jpg)'
  id: totrans-204
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_31_Chapter/463852_1_En_31_Fig1_HTML.jpg](../images/463852_1_En_31_Chapter/463852_1_En_31_Fig1_HTML.jpg)'
- en: Figure 31-1
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 图31-1
- en: Deep feedforward neural network
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 深度前馈神经网络
- en: The Concept of Hierarchies
  id: totrans-207
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 层次的概念
- en: The more the number of hidden layers in a neural network, the deeper the network
    becomes. Deep networks are able to learn more sophisticated representations of
    the inputs. The concept of hierarchical representation is when each layer learns
    a set of features that describe the input and hierarchically pass that information
    across the hidden layers. Initially, the hidden layers closer to the input layer
    learn a simple set of features, which then grow to increasingly complex features
    as information flows to deeper layers of the network, to capture the mapping between
    the inputs and the target. See Figure [31-2](#Fig2).
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络中隐藏层的数量越多，网络就越深。深度网络能够学习更复杂的输入表示。层次表示的概念是，每一层学习一组描述输入的特征，并将这些信息层次化地传递到隐藏层。最初，靠近输入层的隐藏层学习一组简单的特征，随着信息流向网络的深层，这些特征变得越来越复杂，以捕捉输入和目标之间的映射。见图[31-2](#Fig2)。
- en: '![../images/463852_1_En_31_Chapter/463852_1_En_31_Fig2_HTML.jpg](../images/463852_1_En_31_Chapter/463852_1_En_31_Fig2_HTML.jpg)'
  id: totrans-209
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_31_Chapter/463852_1_En_31_Fig2_HTML.jpg](../images/463852_1_En_31_Chapter/463852_1_En_31_Fig2_HTML.jpg)'
- en: Figure 31-2
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 图31-2
- en: Hierarchical learning
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 层次学习
- en: 'Choosing the Number of Hidden Layers: Bias/Variance Trade-Off'
  id: totrans-212
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 选择隐藏层数量：偏差/方差权衡
- en: From experience, increasing the number of hidden layers may improve the representational
    quality of the network; however, arbitrarily increasing the number of hidden layers
    in your network design can have detrimental effects on the overall network performance
    with respect to generalizing to unseen observations. This is because the neural
    network will learn more closely the irreducible errors inherent in the training
    dataset and will fail to generalize to new examples.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 从经验来看，增加隐藏层的数量可能会提高网络的表示质量；然而，任意增加网络设计中的隐藏层数量可能会对网络的总体性能产生不利影响，尤其是在泛化到未见过的观察结果方面。这是因为神经网络将更紧密地学习训练数据集中固有的不可减少的错误，并且无法泛化到新的例子。
- en: Appropriate caution should be taken when selecting the number of hidden layers
    to avoid overfitting. Regularization techniques for neural networks such as Tikhonov
    regularization, Dropout, or early stopping are different methods of mitigating
    overfitting. Regularization for neural networks will be covered in more detail
    in a later section.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 在选择隐藏层数量时，应采取适当的谨慎措施，以避免过拟合。对于神经网络的正则化技术，如Tikhonov正则化、Dropout或提前停止，是减轻过拟合的不同方法。神经网络的正则化将在后面的章节中更详细地介绍。
- en: Empirically, one hidden layer will produce good results for simple learning
    problems, but if the number of output classes increases or there exists a high
    degree of non-linearities among the data features, then it is recommended to add
    more layers while taking care to ensure that the model performs well on test data.
    Choosing the number of neurons in a hidden layer and the number of hidden layers
    is usually a case of a trial-and-error heuristics and presents the case of applying
    hyper-parameter tuning to improve the network performance. Using a grid search
    for hyper-parameter tuning is a good way to approximate an optimal neural network
    architecture that performs well on test data.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 经验上，一个隐藏层对于简单的学习问题会产生良好的结果，但如果输出类别的数量增加或数据特征之间存在高度的非线性，则建议在确保模型在测试数据上表现良好的同时添加更多层。选择隐藏层中的神经元数量和隐藏层的数量通常是一个试错启发式方法，并且是应用超参数调优以改进网络性能的案例。使用网格搜索进行超参数调优是近似一个在测试数据上表现良好的最优神经网络架构的好方法。
- en: Multilayer Perceptron (MLP) with Keras
  id: totrans-216
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基于Keras的多层感知器（MLP）
- en: 'In this section, we examine a motivating example by building an MLP model with
    Keras. In doing so, we’ll go through the following steps:'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将通过使用Keras构建MLP模型来考察一个激励性的例子。这样做时，我们将进行以下步骤：
- en: Import and transform the dataset.
  id: totrans-218
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 导入并转换数据集。
- en: Build and compile the model.
  id: totrans-219
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构建和编译模型。
- en: Train the data using **‘Model.fit()’**.
  id: totrans-220
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用**‘Model.fit()’**训练数据。
- en: Evaluate the model using **‘Model.evaluate()’**.
  id: totrans-221
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用**‘Model.evaluate()’**评估模型。
- en: Predict on unseen data using **‘Model.predict()’**.
  id: totrans-222
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用**‘Model.predict()’**对未见数据做出预测。
- en: 'The dataset used for this example is the Fashion-MNIST database of fashion
    articles. This dataset contains 60,000 28 x 28 pixel grayscale images of ten clothing
    items (the target classes). This dataset is downloaded from the **‘tf.keras.datasets’**
    package. The following code example will build a simple MLP neural network for
    the computer to classify an image of a clothing item into its appropriate class.
    The network architecture has the following layers:'
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 本例中使用的数据库是时尚MNIST数据库，包含60,000个28 x 28像素的灰度图像，代表十种服装项目（目标类别）。此数据集是从**‘tf.keras.datasets’**包中下载的。以下代码示例将构建一个简单的MLP神经网络，用于计算机将服装图像分类到适当的类别。该网络架构具有以下层：
- en: A dense hidden layer with 250 neurons
  id: totrans-224
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个包含250个神经元的密集隐藏层
- en: A second hidden layer with 64 neurons
  id: totrans-225
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个包含64个神经元的第二隐藏层
- en: A third hidden layer with 32 neurons
  id: totrans-226
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个包含32个神经元的第三隐藏层
- en: An output layer with 10 output classes
  id: totrans-227
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 具有十个输出类别的输出层
- en: '[PRE16]'
  id: totrans-228
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: 'Observe the following from the preceding code:'
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 从前面的代码中观察以下内容：
- en: A Keras Sequential Model is built by calling the **‘tf.keras.Sequential()’**
    method from which layers are then added to the model.
  id: totrans-230
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过调用**‘tf.keras.Sequential()’**方法构建Keras顺序模型，然后向模型中添加层。
- en: After constructing the model layers, the model is compiled by calling the method
    ‘.compile()’.
  id: totrans-231
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构建模型层之后，通过调用方法‘.compile()’来编译模型。
- en: The model is trained by calling the **‘.fit()’** method which receives the training
    features and targets from the **‘tf.data.Dataset’** pipeline.
  id: totrans-232
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过调用**‘.fit()’**方法来训练模型，该方法从**‘tf.data.Dataset’**管道接收训练特征和目标。
- en: The method **‘.evaluate()’** is used to get the final metric estimate and the
    loss score of the model after training.
  id: totrans-233
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用**‘.evaluate()’**方法来获取训练后模型的最终指标估计和损失分数。
- en: In this chapter, we introduced the multilayer perceptron network and how it
    achieves good performance on complex learning problems by stacking layers of neurons
    together to form a deep representational hierarchy. By doing this, the network
    learns what features are relevant and also learns what weights of the network
    will best approximate the target function.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们介绍了多层感知器网络及其如何通过堆叠神经元层形成深度表示层次结构，从而在复杂学习问题上实现良好的性能。通过这样做，网络学习哪些特征是相关的，同时也学习网络中哪些权重将最佳地逼近目标函数。
- en: In the next chapter, we will discuss on other considerations for training deep
    neural network.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将讨论训练深度神经网络的其他考虑因素。
- en: 32. Other Considerations for Training the Network
  id: totrans-236
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 32. 训练网络的其他考虑因素
- en: In this chapter, we will cover some other important techniques to consider when
    training a deep neural network.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将介绍在训练深度神经网络时需要考虑的一些其他重要技术。
- en: Weight Initialization
  id: totrans-238
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 权重初始化
- en: Weight initialization is a technique for assigning initial values to the weights
    (parameters) of the neural network before training (see Figure [32-1](#Fig1)).
    Proper weight initialization may mitigate the effects of vanishing and exploding
    gradients when training the network. It may also speed up the training process.
    Two commonly used methods for weight initializations are the Xavier and the He
    techniques. We will not go into the technical explanation of these initialization
    strategies. However, they are implemented in the standard deep learning framework
    libraries such as TensorFlow and Keras. In TensorFlow 2.0, the dense layer in
    **‘tf.keras.layers.Dense()’** has the Glorot uniform initializer, also called
    Xavier uniform initializer as its default kernel initializer.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 权重初始化是在训练前为神经网络（参数）的权重分配初始值的技术（见图[32-1](#Fig1)）。适当的权重初始化可以减轻网络训练时梯度消失和爆炸的影响。它还可能加快训练过程。两种常用的权重初始化方法是Xavier和He技术。我们不会深入解释这些初始化策略的技术细节。然而，它们在标准的深度学习框架库（如TensorFlow和Keras）中得到了实现。在TensorFlow
    2.0中，**‘tf.keras.layers.Dense()’**中的密集层默认使用Glorot均匀初始化器，也称为Xavier均匀初始化器。
- en: '![../images/463852_1_En_32_Chapter/463852_1_En_32_Fig1_HTML.jpg](../images/463852_1_En_32_Chapter/463852_1_En_32_Fig1_HTML.jpg)'
  id: totrans-240
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_32_Chapter/463852_1_En_32_Fig1_HTML.jpg](../images/463852_1_En_32_Chapter/463852_1_En_32_Fig1_HTML.jpg)'
- en: Figure 32-1
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 图32-1
- en: Weight initialization
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 权重初始化
- en: Batch Normalization
  id: totrans-243
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 批标准化
- en: The technique of batch normalization involves normalizing the data (to have
    zero mean and unit variance), as well as scaling and shifting the data batch at
    each layer of the neural network during the training phase. Batch normalization
    occurs after the affine transformation of the input matrix and their weights,
    but before passing the transformation into the activation function (see Figure
    [32-2](#Fig2)).
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 批标准化技术涉及在训练阶段对数据进行标准化（使其具有零均值和单位方差），以及在每个神经网络的每一层中对数据批次进行缩放和偏移。批标准化发生在输入矩阵及其权重进行仿射变换之后，但在将变换传递到激活函数之前（见图
    [32-2](#Fig2)）。
- en: '![../images/463852_1_En_32_Chapter/463852_1_En_32_Fig2_HTML.jpg](../images/463852_1_En_32_Chapter/463852_1_En_32_Fig2_HTML.jpg)'
  id: totrans-245
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_32_Chapter/463852_1_En_32_Fig2_HTML.jpg](../images/463852_1_En_32_Chapter/463852_1_En_32_Fig2_HTML.jpg)'
- en: Figure 32-2
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 图 32-2
- en: Batch normalization, also known as batch norm
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 批标准化，也称为批归一化
- en: The neural network learns the parameters for scaling and shifting the data at
    every layer during training. Also at the training phase, the score of the running
    mean and standard deviation of the data is maintained so that it can be used to
    normalize the test data before evaluation.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络在训练过程中学习每个层上数据缩放和偏移的参数。在训练阶段，还维护数据的运行均值和标准差得分，以便在评估之前用于标准化测试数据。
- en: Batch normalization also mitigates the exploding and vanishing gradient problem
    irrespective of weight initialization. However, due to the added computational
    step at each layer, the network may be a bit slower. A batch normalization layer
    is added to a TensorFlow 2.0 network model by calling the method **‘tf.keras.layers.
    BatchNormalization()’** as shown in the following code listing.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 批标准化无论权重初始化如何，都可以减轻梯度爆炸和消失的问题。然而，由于在每个层中增加了计算步骤，网络可能稍微慢一些。通过调用方法 **‘tf.keras.layers.
    BatchNormalization()’** 将批标准化层添加到 TensorFlow 2.0 网络模型中，如下面的代码示例所示。
- en: '[PRE17]'
  id: totrans-250
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Gradient Clipping
  id: totrans-251
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 梯度裁剪
- en: Gradient clipping is another technique for hemming the problem of vanishing
    and exploding gradients mostly seen in recurrent networks due to training via
    backpropagation across a large number of deep recurrent layers. Gradient clipping
    involves trimming the computed gradients so that they remain within a specific
    range; in doing so, the gradients are prevented from saturating as the network
    trains across multiple deep layers.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度裁剪是解决由于在大量深度循环层之间通过反向传播进行训练而在循环网络中常见梯度消失和爆炸问题的另一种技术。梯度裁剪涉及修剪计算出的梯度，使它们保持在特定范围内；这样做可以防止梯度在网络跨越多个深度层训练时饱和。
- en: Gradient clipping is implemented in TensorFlow 2.0 by adjusting the **‘** **clipnorm’**
    or **‘** **clipvalue’** parameters of the selected optimizer from the **‘tf.keras.optimizers’**
    package. **‘clipnorm’** clips the gradients by norm, while **‘clipvalue’** clips
    the gradients by value.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 在 TensorFlow 2.0 中，梯度裁剪是通过调整从 **‘tf.keras.optimizers’** 包中选择的优化器的 **‘clipnorm’**
    或 **‘clipvalue’** 参数来实现的。**‘clipnorm’** 通过梯度范数进行裁剪，而 **‘clipvalue’** 通过梯度值进行裁剪。
- en: This chapter introduces some important techniques that are employed to improve
    the performance of a neural network by further mitigating the issue of vanishing
    and exploding gradients. In the next chapter, we will see more optimization techniques
    for training deep neural network model.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 本章介绍了用于通过进一步减轻梯度消失和爆炸问题来提高神经网络性能的一些重要技术。在下一章中，我们将看到更多用于训练深度神经网络模型的优化技术。
- en: 33. More on Optimization Techniques
  id: totrans-255
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 33. 更多关于优化技术
- en: In this chapter, we’ll go over some other optimization techniques for improving
    the ability of a neural network to learn complex patterns in a dataset.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将介绍一些其他优化技术，以提高神经网络在数据集中学习复杂模式的能力。
- en: Momentum
  id: totrans-257
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 动量
- en: Momentum is a technique for improving the convergence speed of stochastic gradient
    descent (SGD) optimization. Remember that stochastic gradient works by learning
    the direction of steepest descent by evaluating a training example at each time
    step to optimize the weights of the network. Momentum improves on this by calculating
    the average of previous gradients in a process called exponentially smoothed averages.
    It then uses this computed average to continue to move in the direction of steepest
    descent. By doing so, it quickens the learning process. In computing this exponentially
    decayed average, a momentum hyper-parameter is introduced to control how the weight
    parameters are updated. Figure [33-1](#Fig1) shows an example of stochastic gradient
    descent with and without momentum as it converges in a function space. In TensorFlow
    2.0, momentum is added to a SGD optimizer by adjusting the **‘momentum’** parameter
    of the **SGD method, ‘tf.keras.optimizers.SGD(momentum=[float >=0])’**. The momentum
    value must be a float value that is greater or equal to 0 that accelerates SGD
    in the relevant direction and dampens oscillations.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 动量是一种提高随机梯度下降（SGD）优化收敛速度的技术。记住，随机梯度通过在每个时间步评估一个训练示例来学习最陡下降的方向，以优化网络的权重。动量通过计算一个称为指数平滑平均的先前梯度的平均值来改进这一点。然后，它使用这个计算出的平均值继续沿最陡下降方向移动。通过这样做，它加快了学习过程。在计算这个指数衰减的平均值时，引入了一个动量超参数来控制权重参数的更新。图[33-1](#Fig1)展示了在函数空间中收敛时带有和没有动量的随机梯度下降的例子。在TensorFlow
    2.0中，通过调整**‘momentum’**参数将动量添加到**‘tf.keras.optimizers.SGD(momentum=[float >=0])’**的SGD方法中。动量值必须是一个大于或等于0的浮点数，它会在相关方向上加速SGD并减少振荡。
- en: '![../images/463852_1_En_33_Chapter/463852_1_En_33_Fig1_HTML.jpg](../images/463852_1_En_33_Chapter/463852_1_En_33_Fig1_HTML.jpg)'
  id: totrans-259
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_33_Chapter/463852_1_En_33_Fig1_HTML.jpg](../images/463852_1_En_33_Chapter/463852_1_En_33_Fig1_HTML.jpg)'
- en: Figure 33-1
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 图33-1
- en: SGD with and without momentum
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 带有和没有动量的SGD
- en: Variable Learning Rates
  id: totrans-262
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 变量学习率
- en: Remember that the learning rate controls how large a step the gradient descent
    algorithm makes when moving in the direction of steepest descent. If the learning
    rate is large, the algorithm takes larger steps in the direction of the steepest
    gradient, as is faster. However, the algorithm may overshoot the global minimum
    and fail to converge. But if the learning rate is set to a small number, closer
    to zero, the algorithm converges slowly, but it is more guaranteed to converge.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，学习率控制梯度下降算法在沿最陡下降方向移动时迈出多大的步长。如果学习率较大，算法会在最陡梯度的方向上迈出更大的步子，这会更快。然而，算法可能会超过全局最小值，无法收敛。但如果学习率设置为一个接近零的小数，算法收敛会慢一些，但更有保证能够收敛。
- en: Variable learning rates are a set of techniques for adjusting the learning rate
    of the gradient descent algorithm at every time instance while training. These
    methods are also called learning rate scheduling. Examples of variable learning
    rates include
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 变量学习率是一组在训练过程中调整梯度下降算法在每个时间实例的学习率的技巧。这些方法也被称为学习率调度。变量学习率的例子包括
- en: 'Step decay: This method reduces the learning rate by a constant factor after
    a certain number of iterations.'
  id: totrans-265
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 步长衰减：这种方法在经过一定次数的迭代后通过一个常数因子减少学习率。
- en: 'Exponential decay: The exponential decay adapts the learning rate following
    an exponential distribution.'
  id: totrans-266
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指数衰减：指数衰减根据指数分布调整学习率。
- en: 'Decay proportion: This method reduces the learning rate by a ratio of 1 over
    the time instance, **t**. The learning rate decay can be adjusted by modifying
    the proportionality constant.'
  id: totrans-267
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 衰减比例：这种方法通过时间实例的1/t比例减少学习率。可以通过修改比例常数来调整学习率衰减。
- en: In TensorFlow 2.0, the **‘decay’** parameter of the selected optimizer from
    the **‘tf.keras.optimizers’** module allows time inverse decay of learning rate.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 在TensorFlow 2.0中，从**‘tf.keras.optimizers’**模块选择的优化器的**‘decay’**参数允许学习率的时间逆衰减。
- en: Adaptive Learning Rates
  id: totrans-269
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自适应学习率
- en: 'Adaptive learning rate, on the other hand, re-adjusts the learning rate in
    accordance with the training data. It basically uses a different learning rate
    for each parameter and adapts it during training. These techniques are based on
    the observation that each parameter results in a different type of gradient. The
    following list outlines types of adaptive learning rates in use and their method
    calls in TensorFlow 2.0:'
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，自适应学习率会根据训练数据重新调整学习率。它基本上为每个参数使用不同的学习率，并在训练过程中进行自适应调整。这些技术基于观察，每个参数会导致不同类型的梯度。以下列表概述了TensorFlow
    2.0中使用的自适应学习率类型及其方法调用：
- en: 'AdaGrad: **tf.keras.optimizers.Adagrad()**'
  id: totrans-271
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AdaGrad：**tf.keras.optimizers.Adagrad()**
- en: 'AdaDelta: **tf.keras.optimizers.Adadelta()**'
  id: totrans-272
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AdaDelta：**tf.keras.optimizers.Adadelta()**
- en: 'RMSProp: **tf.keras.optimizers.RMSprop()**'
  id: totrans-273
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: RMSProp：**tf.keras.optimizers.RMSprop()**
- en: 'Adaptive Moments, (Adam): **tf.keras.optimizers.Adam()**'
  id: totrans-274
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自适应矩，(Adam)：**tf.keras.optimizers.Adam()**
- en: However, AdaGrad performs poorly when used for training deep learning models
    due to its monotonic learning rate which could be too aggressive, and learning
    may stop early during training. As of now, there is no proven best optimization
    technique, so the choice of the optimization technique is down to the preference
    of the model designer.
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，由于AdaGrad的学习率是单调的，可能会过于激进，因此在训练深度学习模型时表现不佳，学习过程可能会在训练早期停止。到目前为止，还没有证明有最好的优化技术，因此优化技术的选择取决于模型设计者的偏好。
- en: This chapter surveys some other techniques for optimizing the weights of a deep
    neural network. These techniques have implementations in deep learning libraries
    such as Tensorflow and Keras and can be explored as hyper-parameters when designing
    a neural network solution for a particular learning use case.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 本章概述了一些优化深度神经网络权重的其他技术。这些技术在深度学习库（如Tensorflow和Keras）中有实现，可以在设计特定学习用例的神经网络解决方案时作为超参数进行探索。
- en: In the next chapter, we will discuss techniques for applying regularization
    to a deep neural network to prevent overfitting.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将讨论将正则化应用于深度神经网络以防止过拟合的技术。
- en: 34. Regularization for Deep Learning
  id: totrans-278
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 34. 深度学习的正则化
- en: Regularization is a technique for reducing the variance in the validation set,
    thus preventing the model from overfitting during training. In doing so, the model
    can better generalize to new examples. When training deep neural networks, a couple
    of strategies exist for use as a regularizer.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 正则化是一种减少验证集方差的技术，从而防止模型在训练过程中过拟合。这样做，模型可以更好地泛化到新的例子。在训练深度神经网络时，存在几种策略可以作为正则化器使用。
- en: Dropout
  id: totrans-280
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Dropout
- en: Dropout is a regularization technique that prevents a deep neural network from
    overfitting by randomly discarding a number of neurons at every layer during training.
    In doing so, the neural network is not overly dominated by any one feature as
    it only makes use of a subset of neurons in each layer during training. In doing
    so, Dropout resembles an ensemble of neural networks as a similar but distinct
    neural network is trained at each layer. Dropout works by designating a probability
    that a neuron will be dropped in a layer. This probability value is called the
    Dropout rate. Figure [34-1](#Fig1) shows an example of a network with and without
    Dropout.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: Dropout是一种正则化技术，通过在训练过程中随机丢弃每一层的部分神经元来防止深度神经网络过拟合。这样做，神经网络不会过度依赖于任何单一特征，因为它在训练过程中只使用每一层的子集神经元。因此，Dropout类似于一个神经网络集成，因为每个层都训练了一个相似但不同的神经网络。Dropout通过指定一个概率来决定一个神经元是否会在某一层中被丢弃。这个概率值被称为Dropout率。图[34-1](#Fig1)展示了带有和不带有Dropout的网络示例。
- en: '![../images/463852_1_En_34_Chapter/463852_1_En_34_Fig1_HTML.jpg](../images/463852_1_En_34_Chapter/463852_1_En_34_Fig1_HTML.jpg)'
  id: totrans-282
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_34_Chapter/463852_1_En_34_Fig1_HTML.jpg](../images/463852_1_En_34_Chapter/463852_1_En_34_Fig1_HTML.jpg)'
- en: Figure 34-1
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 图34-1
- en: 'Dropout. Top: Neural network without Dropout. Bottom: Neural network with Dropout.'
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: Dropout. 顶部：没有Dropout的神经网络。底部：带有Dropout的神经网络。
- en: In TensorFlow 2.0 Dropout is added to a model with the method **‘tf.keras.layers.Dropout()’**
    . The **‘rate’** parameter of the method controls the fraction of the input units
    to drop. It is assigned a float value between 0 and 1\. The following code listing
    shows an MLP Keras model with Dropout applied.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 在TensorFlow 2.0中，可以通过方法**‘tf.keras.layers.Dropout()’**将Dropout添加到模型中。该方法的**‘rate’**参数控制要丢弃的输入单元的比例。它被分配一个介于0和1之间的浮点值。以下代码示例展示了应用了Dropout的MLP
    Keras模型。
- en: '[PRE18]'
  id: totrans-286
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Data Augmentation
  id: totrans-287
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据增强
- en: Data augmentation is a method for artificially generating more training data
    points. This technique is precipitated on the observation that for an increasingly
    large training dataset mitigates the problem of overfitting. For some problems,
    it may be easy to artificially generate fake data, while for others it may not
    readily be the case. A classic example where we can use data augmentation is in
    the case of image classification. Here artificial images can easily be created
    by rotating or scaling the original images to create more variations of the dataset
    for a particular image class.
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 数据增强是一种人工生成更多训练数据点的技术。这种技术基于观察，对于越来越大的训练数据集可以缓解过拟合的问题。对于某些问题，可能很容易人工生成假数据，而对于其他问题则可能不那么容易。一个我们可以使用数据增强的经典例子是在图像分类的情况下。在这里，可以通过旋转或缩放原始图像来轻松创建人工图像，从而为特定图像类别创建更多数据集的变体。
- en: Noise Injection
  id: totrans-289
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 噪声注入
- en: The noise injection regularization method adds some Gaussian noise to the network
    inputs during training. Also, Gaussian noise can be added to the hidden units
    to mitigate overfitting. Yet still another form of injecting noise into the network
    is to add some Gaussian noise to the network weights. Noise injection can be considered
    as a form of data augmentation. The amount of noise added is a configurable hyper-parameter.
    Too little noise has no effect, whereas too much noise makes the mapping function
    too challenging to learn.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 噪声注入正则化方法在训练期间向网络输入添加一些高斯噪声。此外，还可以将高斯噪声添加到隐藏单元中，以减轻过拟合。将高斯噪声添加到网络权重中也是向网络注入噪声的另一种形式。噪声注入可以被视为一种数据增强。添加的噪声量是一个可配置的超参数。噪声过少没有效果，而噪声过多则使得映射函数难以学习。
- en: In TensorFlow 2.0, noise injection can be added to the model as a form of data
    augmentation using the method **‘tf.keras.layers.GaussianNoise()** **’**. The
    **‘stddev’** parameter of the method controls the standard deviation of the noise
    distribution. The following code listing shows an MLP Keras model with Gaussian
    noise applied to the model.
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 在TensorFlow 2.0中，可以通过使用方法**‘tf.keras.layers.GaussianNoise()’**将噪声注入作为数据增强的一种形式添加到模型中。该方法的**‘stddev’**参数控制噪声分布的标准差。下面的代码示例展示了应用高斯噪声的MLP
    Keras模型。
- en: '[PRE19]'
  id: totrans-292
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Early Stopping
  id: totrans-293
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提前停止
- en: Early stopping involves storing the model parameters each time there is an improvement
    in the loss (or error) estimate on the validation dataset. At the end of the training
    phase, the stored model parameters are used rather than the last known parameter
    before termination.
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 提前停止涉及在验证数据集上的损失（或误差）估计每次有改进时存储模型参数。在训练阶段结束时，使用存储的模型参数而不是终止前的最后一个已知参数。
- en: The technique of early stopping is based on the observation that for a sufficiently
    complex classifier, as the training phase progresses, the error estimate on the
    training data continues to decrease, whereas the validation data will see an increase
    in the model error measure. This is illustrated in Figure [34-2](#Fig2).
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 提前停止的技术基于观察，对于一个足够复杂的分类器，随着训练阶段的进行，训练数据上的误差估计持续下降，而验证数据将看到模型误差测量的增加。这如图[34-2](#Fig2)所示。
- en: '![../images/463852_1_En_34_Chapter/463852_1_En_34_Fig2_HTML.jpg](../images/463852_1_En_34_Chapter/463852_1_En_34_Fig2_HTML.jpg)'
  id: totrans-296
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_34_Chapter/463852_1_En_34_Fig2_HTML.jpg](../images/463852_1_En_34_Chapter/463852_1_En_34_Fig2_HTML.jpg)'
- en: Figure 34-2
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 图34-2
- en: Early stopping
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 提前停止
- en: In TensorFlow 2.0, early stopping can be applied to stop training when there
    is no improvement in the validation accuracy or loss by applying the **‘tf. keras.callbacks.EarlyStopping()’**
    method as a callback when training the model. For completeness sake, we will produce
    a complete code listing with early stopping applied to the MLP Fashion-MNIST model.
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 在TensorFlow 2.0中，可以通过在训练模型时应用**‘tf.keras.callbacks.EarlyStopping()’**方法作为回调来应用提前停止，以停止训练，当验证准确率或损失没有改进时。为了完整性，我们将提供一个完整的代码示例，其中包含对MLP
    Fashion-MNIST模型应用提前停止。
- en: '[PRE20]'
  id: totrans-300
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: With early stopping applied to the preceding code, the training will stop once
    there is no improvement to the loss on the validation dataset. The **‘patience’**
    parameter in the EarlyStopping method represents the number of epochs with no
    improvement, after which training will be stopped.
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 应用提前停止到前面的代码后，一旦验证数据集上的损失没有改进，训练将停止。EarlyStopping方法中的**‘patience’**参数表示没有改进的epoch数，之后训练将停止。
- en: This chapter surveys some techniques to tackle the problem of overfitting when
    training with a deep neural network. In the next chapter, we will discuss on convolutional
    neural networks for building predictive models for computer vision use cases such
    as image recognition with TensorFlow 2.0.
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 本章概述了一些解决使用深度神经网络训练时过拟合问题的技术。在下一章中，我们将讨论用于构建计算机视觉用例预测模型的卷积神经网络，例如使用 TensorFlow
    2.0 进行图像识别。
- en: 35. Convolutional Neural Networks (CNN)
  id: totrans-303
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 35. 卷积神经网络（CNN）
- en: Convolutional neural networks (CNN) are a specific type of neural network systems
    that are particularly suited for computer vision problems such as image recognition.
    In such tasks, the dataset is represented as a 2-D grid of pixels. See Figure
    [35-1](#Fig1).
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 卷积神经网络（CNN）是一种特别适合于计算机视觉问题（如图像识别）的特定类型的神经网络系统。在这些任务中，数据集被表示为一个像素的二维网格。见图 [35-1](#Fig1)。
- en: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig1_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig1_HTML.jpg)'
  id: totrans-305
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig1_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig1_HTML.jpg)'
- en: Figure 35-1
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 图 35-1
- en: 2-D representation of an image
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 图像的二维表示
- en: An image is depicted in the computer as a matrix of pixel intensity values ranging
    from 0 to 255\. A grayscale (or black and white) image consists of a single channel
    with 0 representing the black areas and 255 the white regions with the values
    in between for various shades of gray.
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 在计算机中，图像被表示为一个像素强度值的矩阵，范围从 0 到 255。灰度（或黑白）图像由一个单通道组成，其中 0 代表黑色区域，255 代表白色区域，中间的值代表各种灰度级别。
- en: For example, the image in Figure [35-2](#Fig2) is a 10 x 10 grayscale image
    with its matrix representation.
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，图 [35-2](#Fig2) 中的图像是一个 10 x 10 的灰度图像，其矩阵表示。
- en: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig2_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig2_HTML.jpg)'
  id: totrans-310
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig2_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig2_HTML.jpg)'
- en: Figure 35-2
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 图 35-2
- en: Grayscale image with matrix representation
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 灰度图像的矩阵表示
- en: On the other hand, a colored image consists of three channels, red, green, and
    blue, with each channel also containing pixel intensity values from 0 to 255\.
    A colored image has a matrix shape of [height x width x channel]. In Figure [35-3](#Fig3),
    we have an image of shape [10 x 10 x 3] indicating a 10 x 10 matrix with three
    channels.
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，彩色图像由三个通道组成，分别是红色、绿色和蓝色，每个通道也包含从 0 到 255 的像素强度值。彩色图像具有 [高度 x 宽度 x 通道] 的矩阵形状。在图
    [35-3](#Fig3) 中，我们有一个形状为 [10 x 10 x 3] 的图像，表示一个 10 x 10 的矩阵，有三个通道。
- en: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig3_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig3_HTML.jpg)'
  id: totrans-314
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig3_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig3_HTML.jpg)'
- en: Figure 35-3
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 图 35-3
- en: Colored image with matrix representation
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 彩色图像的矩阵表示
- en: Local Receptive Fields of the Visual Cortex
  id: totrans-317
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 视觉皮层的局部感受野
- en: The core concept of convolutional neural networks is built on understanding
    the local receptive fields found in the neurons of the visual cortex – the part
    of the brain responsible for processing visual information.
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 卷积神经网络的核心概念建立在理解视觉皮层神经元中发现的局部感受野之上——这是大脑中处理视觉信息的部分。
- en: A local receptive field is an area on the neuron that excites or activates that
    neuron to fire information to other neurons. When viewing an image, the neurons
    in the visual cortex react to a small or limited area of the overall image due
    to the presence of a small local receptive field.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 局部感受野是神经元上的一个区域，它可以激发或激活该神经元，向其他神经元传递信息。在观察图像时，由于存在小的局部感受野，视觉皮层中的神经元对整体图像的较小或有限区域做出反应。
- en: Hence, the neurons in the visual cortex do not all sense the entire image at
    the same time, but they are activated by viewing a local area of the image via
    its local receptive field.
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，视觉皮层中的神经元不是同时感知整个图像，而是通过其局部感受野观察图像的局部区域来激活。
- en: In Figure [35-4](#Fig4), the local receptive fields overlap to give a collective
    perspective on the entire image. Each neuron in the visual cortex reacts to a
    different type of visual information (e.g., lines with different orientations).
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 在图 [35-4](#Fig4) 中，局部感受野重叠，从而对整个图像提供了一个整体视角。视觉皮层中的每个神经元对不同的视觉信息（例如，不同方向的线条）做出反应。
- en: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig4_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig4_HTML.jpg)'
  id: totrans-322
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig4_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig4_HTML.jpg)'
- en: Figure 35-4
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 图 35-4
- en: Local receptive field
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 局部感受野
- en: Other neurons have large receptive fields that react to more complex visual
    patterns such as edges, regions, and so on. From here we get the idea that neurons
    with larger receptive field receive information from those with lower receptive
    fields as they progressively learn the visual information of the image.
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 其他神经元具有较大的感受野，能够对更复杂的视觉模式（如边缘、区域等）做出反应。从这里我们可以得到这样的想法：具有较大感受野的神经元从具有较小感受野的神经元那里接收信息，随着它们逐步学习图像的视觉信息。
- en: Advantages of CNN over MLP
  id: totrans-326
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: CNN相较于MLP的优势
- en: Suppose we have a 28 x 28 pixel set of image data, a feedforward neural network
    or multilayer perceptron will need 784 input weights plus a bias. By flattening
    an image as you would in MLP, we lose the spatial relationship of the pixels in
    the image.
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们有一个28 x 28像素的图像数据集，前馈神经网络或多层感知器将需要784个输入权重加上一个偏置。通过将图像展平，就像在MLP中做的那样，我们会失去图像中像素的空间关系。
- en: CNN, on the other hand, can learn complex image features by preserving the spatial
    relationship between the image pixels. It does so by stacking convolutional layers
    whereby the neurons in the higher layers with a larger receptive field receive
    information from neurons in the lower layers having a smaller receptive field.
    CNN learns a hierarchy of increasingly complex features from the input data as
    it flows through the network.
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，CNN可以通过保留图像像素之间的空间关系来学习复杂的图像特征。它是通过堆叠卷积层来实现的，其中具有较大感受野的高层神经元从具有较小感受野的低层神经元接收信息。随着数据流经网络，CNN从输入数据中学习到越来越复杂的特征层次。
- en: In CNN, the neurons (or filters) in the convolutional layer are not all connected
    to the pixels in the input image as we have in the dense multilayer perceptron.
    Hence, a CNN is also called a sparse neural network.
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 在CNN中，卷积层的神经元（或滤波器）并不像在密集的多层感知器中那样与输入图像的像素全部连接。因此，CNN也被称为稀疏神经网络。
- en: A distinct advantage of CNN over MLP is the reduced number of weights needed
    for training the network.
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: CNN相较于MLP的一个显著优势是训练网络所需的权重数量减少。
- en: 'Convolutional neural networks are composed of three fundamental types of layers:'
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 卷积神经网络由三种基本类型的层组成：
- en: Convolutional layer
  id: totrans-332
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 卷积层
- en: Pooling layer
  id: totrans-333
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 池化层
- en: Fully connected layer
  id: totrans-334
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 全连接层
- en: The Convolutional Layer
  id: totrans-335
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 卷积层
- en: The convolution layer is made up of filters and feature maps. A filter is passed
    over the input image pixels to capture a specific set of features in a process
    called convolution (see Figure [35-5](#Fig5)). The output of a filter is called
    a feature map.
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 卷积层由滤波器和特征图组成。滤波器通过输入图像像素进行传递，以捕获特定的一组特征，这个过程称为卷积（见图[35-5](#Fig5)）。滤波器的输出称为特征图。
- en: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig5_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig5_HTML.jpg)'
  id: totrans-337
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig5_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig5_HTML.jpg)'
- en: Figure 35-5
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 图35-5
- en: The convolution process
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 卷积过程
- en: Convolution
  id: totrans-340
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 卷积
- en: Convolution is the process by which a function is applied to a matrix to extract
    specific information from the matrix. The function is implemented as a sliding
    window through the matrix, and it is more popularly called a convolutional filter
    or a kernel. Both terms are used interchangeably in the literature. The image
    in Figure [35-6](#Fig6) illustrates a filter sliding through a matrix to extract
    information from it.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 卷积是将一个函数应用于矩阵以从矩阵中提取特定信息的过程。该函数通过矩阵中的滑动窗口实现，更通俗地称为卷积滤波器或核。这两个术语在文献中可以互换使用。图[35-6](#Fig6)展示了滤波器在矩阵中滑动以提取信息的过程。
- en: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig6_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig6_HTML.jpg)'
  id: totrans-342
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig6_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig6_HTML.jpg)'
- en: Figure 35-6
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 图35-6
- en: Sliding window of a filter through a matrix
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 滤波器在矩阵中的滑动窗口
- en: Filters are neurons in the convolutional layer. They are assigned weights and
    are applied as a sliding window through the matrix. The output of a filter is
    a feature map. Filters which are basically neurons also have a non-linear activation
    function.
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 滤波器是卷积层中的神经元。它们被分配权重，并以滑动窗口的形式应用于矩阵。滤波器的输出是一个特征图。这些基本上是神经元的滤波器也具有非线性激活函数。
- en: The inputs into a filter can be the matrix of the image pixels if the filter
    is at the input layer, or it can be the feature maps of a previous convolutional
    layer if the filter is applied at a deeper layer in the network.
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 如果滤波器位于输入层，则滤波器的输入可以是图像像素的矩阵；如果滤波器应用于网络中的深层，则可以是前一个卷积层的特征图。
- en: Filters are assigned a fixed square block for its input size. This input size
    can also be seen as the local receptive field of the filter. A common input size
    for filters is a 3 x 3 square patch as illustrated in Figure [35-7](#Fig7); other
    standard sizes include a 5 x 5 or 7 x 7 filter for extracting features from images.
    It is also a best practice to use more filters at deeper layers of the network
    and fewer filter at the input layer.
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 滤波器为其输入大小分配一个固定的正方形块。这个输入大小也可以看作是滤波器的局部感受野。滤波器的一个常见输入大小是图 [35-7](#Fig7) 中所示的一个
    3x3 的正方形块；其他标准大小包括用于从图像中提取特征的 5x5 或 7x7 滤波器。在网络的深层使用更多滤波器，在输入层使用较少滤波器也是一个最佳实践。
- en: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig7_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig7_HTML.jpg)'
  id: totrans-348
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig7_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig7_HTML.jpg)'
- en: Figure 35-7
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 图 35-7
- en: An example of a 3 x 3 filter kernel
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 3x3 滤波器核的示例
- en: Observe that each cell in the filter has an associated weight or value. These
    values are used to multiply its associated pixel intensities and then sum up their
    results, which are filled in the appropriate cell of the convolutional result.
    This procedure is illustrated in Figure [35-8](#Fig8).
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 观察到滤波器中的每个单元格都关联着一个权重或值。这些值用于乘以其关联的像素强度，然后将它们的总和填充到卷积结果的适当单元格中。这个过程在图 [35-8](#Fig8)
    中得到了说明。
- en: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig8_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig8_HTML.jpg)'
  id: totrans-352
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig8_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig8_HTML.jpg)'
- en: Figure 35-8
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 图 35-8
- en: Sliding a convolutional filter across an image matrix to extract features
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 在图像矩阵上滑动卷积滤波器以提取特征
- en: The weights on the filter determine the filter operation and consequently the
    type of features that are extracted from the filter inputs. Different filters
    are responsible for edge detection, line detection, and so on. See Figure [35-9](#Fig9).
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: 滤波器上的权重决定了滤波器的操作，从而决定了从滤波器输入中提取的特征类型。不同的滤波器负责边缘检测、线条检测等。见图 [35-9](#Fig9)。
- en: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig9_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig9_HTML.jpg)'
  id: totrans-356
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig9_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig9_HTML.jpg)'
- en: Figure 35-9
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 图 35-9
- en: Filter types
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 滤波器类型
- en: Key considerations to make when designing a convolutional layer are
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 设计卷积层时需要考虑的关键因素
- en: The filter size
  id: totrans-360
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 滤波器的大小
- en: The stride of the filter
  id: totrans-361
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 滤波器的步长
- en: The padding for the layer input
  id: totrans-362
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 层输入的填充
- en: The *stride* of the filter determines how many pixel steps the filter makes
    when moving from one image activation to another. It is typical to use a stride
    of 1, although this could be increased for large images. See Figure [35-10](#Fig10).
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 滤波器的 *步长* 决定了滤波器在从一个图像激活移动到另一个图像激活时移动的像素步数。通常使用步长为 1，尽管对于大图像可以增加步长。见图 [35-10](#Fig10)。
- en: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig10_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig10_HTML.jpg)'
  id: totrans-364
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig10_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig10_HTML.jpg)'
- en: Figure 35-10
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 图 35-10
- en: An illustration of stride width
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 步长宽度的示例
- en: Sometimes the choice of our filter size and the selected stride may not evenly
    divide up the size of the input to the filter. So to avoid losing pixel information
    since we don’t slide past the edge of the image, a technique called *zero padding*
    is employed to pad the borders of the image pixels with a defined layer of zeros.
    This allows the filter to stride evenly through all the pixels in the image by
    including the zeros in the convolution. See Figure [35-11](#Fig11).
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，我们选择的滤波器大小和选定的步长可能不能均匀地分割滤波器输入的大小。为了避免由于我们没有滑过图像边缘而丢失像素信息，采用了一种称为 *零填充* 的技术，用定义好的零层填充图像像素的边缘。这允许滤波器通过包括零在卷积中，均匀地跨越图像中的所有像素。见图
    [35-11](#Fig11)。
- en: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig11_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig11_HTML.jpg)'
  id: totrans-368
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig11_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig11_HTML.jpg)'
- en: Figure 35-11
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 图 35-11
- en: An illustration of zero padding
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 零填充的示例
- en: Feature Maps
  id: totrans-371
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 特征图
- en: Feature maps are the outputs of a filter in a convolutional layer. Feature maps
    bring to the fore certain patterns of the input image such as horizontal lines,
    vertical lines, edges, and so on. These feature maps of the various neurons stacked
    together are what forms a convolutional neural layer and enable the layer to learn
    complex patterns and features of an image.
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 特征图是卷积层中滤波器的输出。特征图将输入图像的某些模式（如水平线、垂直线、边缘等）凸显出来。这些不同神经元堆叠的特征图共同构成了卷积神经层，并使该层能够学习图像的复杂模式和特征。
- en: Moving deeper across the convolutional neural network, the inputs to a deeper
    convolutional layer are the feature maps of the previous layer. See Figure [35-12](#Fig12).
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 在卷积神经网络中向更深层次移动，更深层的卷积层的输入是前一层特征图。见图[35-12](#Fig12)。
- en: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig12_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig12_HTML.jpg)'
  id: totrans-374
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig12_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig12_HTML.jpg)'
- en: Figure 35-12
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 图35-12
- en: Feature maps as inputs to a convolutional layer
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 特征图作为卷积层的输入
- en: The Pooling Layer
  id: totrans-377
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 池化层
- en: Pooling layers typically follow one or more convolutional layers. The goal of
    the pooling layer is to reduce or downsample the feature map of the convolutional
    layer. The pooling layer summarizes the image features learned in the previous
    network layers. By doing so, it also helps prevent the network from overfitting.
    Moreso, the reduction in the input size also bodes well for processing and memory
    costs when training the network.
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: 池化层通常跟随着一个或多个卷积层。池化层的目标是减少或下采样卷积层的特征图。池化层总结了之前网络层中学习的图像特征。通过这样做，它也有助于防止网络过拟合。此外，输入尺寸的减少在训练网络时对处理和内存成本也有利。
- en: The pooling layer can be seen as an aggregation function that consolidates learned
    features and extracts the essential features from previous layers. It does not
    conduct any multiplicative transformation on the input feature maps as seen in
    the convolutional layer.
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 池化层可以看作是一个聚合函数，它巩固了学习到的特征并从之前的层中提取了基本特征。它不像卷积层那样对输入特征图进行任何乘法变换。
- en: The aggregation functions carried out by the pooling layer include max, sum,
    and average. The most frequently used aggregation function in practice is the
    max and is commonly called the MaxPool.
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 池化层执行的聚合函数包括最大值、求和和平均值。实践中最常用的聚合函数是最大值，通常称为MaxPool。
- en: The aggregation functions of the pooling layer serve as the layers’ filters.
    Just like the filters of the convolutional layer, they have a receptive field
    (although smaller in size than that of the convolutional layer) and a stride width.
    Howbeit, the filters which are the neurons of the pooling layer have no weight
    or biases. A typical size for the pooling filter is a 2 x 2 matrix as shown in
    Figure [35-13](#Fig13).
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 池化层的聚合函数作为层的滤波器。就像卷积层的滤波器一样，它们有一个感受野（虽然比卷积层的小）和步长宽度。然而，池化层的滤波器（即神经元）没有权重或偏差。典型的池化滤波器大小是一个2
    x 2的矩阵，如图[35-13](#Fig13)所示。
- en: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig13_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig13_HTML.jpg)'
  id: totrans-382
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig13_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig13_HTML.jpg)'
- en: Figure 35-13
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 图35-13
- en: Example of pooling with MaxPooling
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: MaxPooling的池化示例
- en: The essential advantage of the pooling layer is its ability to inject location
    invariance into the network. Location invariance means that features can be detected
    by the network no matter where they are on the image.
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 池化层的基本优势在于其将位置不变性注入网络的能力。位置不变性意味着无论特征在图像的哪个位置，网络都可以检测到这些特征。
- en: The pooling layer applies its aggregation function to all the channels of the
    input image. For example, in an R, G, B image (i.e., an image with three channels,
    red, green, and blue), the MaxPool will be applied independently to all the three
    channels. Similarly, for feature maps with a particular depth, the pooling aggregation
    will be applied separately to each feature map. See Figure [35-14](#Fig14) as
    an example of applying pooling to the channel depth of its inputs.
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 池化层将其聚合函数应用于输入图像的所有通道。例如，在一个R、G、B图像（即具有三个通道，红色、绿色和蓝色）中，MaxPool将独立应用于所有三个通道。同样，对于具有特定深度的特征图，池化聚合将分别应用于每个特征图。见图[35-14](#Fig14)作为将池化应用于其输入通道深度的示例。
- en: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig14_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig14_HTML.jpg)'
  id: totrans-387
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig14_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig14_HTML.jpg)'
- en: Figure 35-14
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 图35-14
- en: Example of applying pooling to input with depth. Note that the filters in the
    pooling layer have no weights or biases
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 应用池化到具有深度的输入的示例。请注意，池化层中的滤波器没有权重或偏置
- en: The Fully Connected Network Layer
  id: totrans-390
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 完全连接网络层
- en: The fully connected network (FCN) layer is our regular feedforward neural network
    or multilayer perceptron. These layers typically have a non-linear activation
    function. In any case, the FCN is the final layer of the convolutional neural
    network. In this case, a softmax activation is used to output the probabilities
    that an input belongs to a particular class.
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 完全连接网络（FCN）层是我们常规的前馈神经网络或多层感知器。这些层通常具有非线性激活函数。无论如何，FCN是卷积神经网络的最后一层。在这种情况下，使用softmax激活函数来输出输入属于特定类别的概率。
- en: Before passing an input into the FCN, the image matrix will have to be flattened.
    For example, a 28 x 28 x 3 image matrix will become 2352 input weights plus a
    bias of 1 into the fully connected network.
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: 在将输入传递到FCN之前，图像矩阵必须被展平。例如，一个28 x 28 x 3的图像矩阵将变成2352个输入权重加上一个偏置1，传递到完全连接网络。
- en: In the case of our convolutional network , the feature maps of either the convolutional
    or pooling layer are flattened before passing into the FCN to compute the final
    network probabilities using the softmax function.
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的卷积网络中，卷积层或池化层的特征图在传递到FCN之前会被展平，以使用softmax函数计算最终网络概率。
- en: An Example CNN Architecture
  id: totrans-394
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一个CNN架构示例
- en: We have discussed the building blocks of a convolutional neural network system.
    As you’ve seen, a CNN system is principally composed of convolution layers, pooling
    layers, and the fully connected layer. However, the way these layers are arranged
    and in what number are down to the preferred heuristics of the particular use
    case that a CNN is employed in solving.
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经讨论了卷积神经网络系统的构建块。如您所见，CNN系统主要由卷积层、池化层和完全连接层组成。然而，这些层的排列方式和数量取决于CNN在解决特定用例时的偏好启发式方法。
- en: 'An example CNN modeling pipeline is shown here:'
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 这里展示了CNN建模流程的示例：
- en: The first layer following the input layer of images must be a convolutional
    layer for extracting image features. A 3 x 3 image filter is commonly used depending
    on the size of the input image.
  id: totrans-397
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在图像输入层的下一层必须是卷积层，用于提取图像特征。根据输入图像的大小，通常使用3 x 3的图像滤波器。
- en: Pooling layers typical follow a set of one or more convolutional layers. Typically,
    a 2 x 2 filter size is used in the pooling layer.
  id: totrans-398
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 池化层通常跟随一组一个或多个卷积层。通常，池化层使用2 x 2的滤波器大小。
- en: The fully connected layer must be the final layer of the CNN. It is also called
    the dense layer. It contains the softmax activation function to give the probabilities
    of class membership.
  id: totrans-399
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 完全连接层必须是CNN的最后一层。它也被称为密集层。它包含softmax激活函数，以给出类成员的概率。
- en: CNN may include one or more Dropout layers to prevent the network from overfitting.
  id: totrans-400
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: CNN可能包含一个或多个Dropout层以防止网络过拟合。
- en: Figure [35-15](#Fig15) is an example of a CNN architecture.
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 图[35-15](#Fig15)是CNN架构的一个示例。
- en: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig15_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig15_HTML.jpg)'
  id: totrans-402
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig15_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig15_HTML.jpg)'
- en: Figure 35-15
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 图35-15
- en: CNN architecture
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: CNN架构
- en: CNN for Image Recognition with TensorFlow 2.0
  id: totrans-405
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用TensorFlow 2.0进行图像识别的CNN
- en: In this example, we will build a convolutional neural network (CNN) to classify
    images from the CIFAR-10 dataset. CIFAR-10 is another standard image classification
    dataset to classify a colored 32 x 32 pixel image data into ten image classes,
    namely, airplane, automobile, bird, cat, deer, dog, frog, horse, ship, and truck.
    The focus of this section is exclusively on using TensorFlow 2.0 methods to build
    a CNN image classifier.
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们将构建一个卷积神经网络（CNN）来对CIFAR-10数据集中的图像进行分类。CIFAR-10是另一个标准图像分类数据集，用于将32 x
    32像素的彩色图像数据分类到十个图像类别中，即飞机、汽车、鸟、猫、鹿、狗、青蛙、马、船和卡车。本节的重点是专门使用TensorFlow 2.0方法构建CNN图像分类器。
- en: 'The CNN model architecture implemented loosely mirrors the Krizhevsky’s architecture,
    also known as AlexNet. The network architecture has the following layers:'
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 实现的CNN模型架构大致反映了Krizhevsky的架构，也称为AlexNet。网络架构具有以下层：
- en: 'Convolution layer: kernel_size = [5 x 5]'
  id: totrans-408
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 卷积层：kernel_size = [5 x 5]
- en: 'Convolution layer: kernel_size = [5 x 5]'
  id: totrans-409
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 卷积层：kernel_size = [5 x 5]
- en: Batch normalization layer
  id: totrans-410
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 批标准化层
- en: 'Convolution layer: kernel_size = [5 x 5]'
  id: totrans-411
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 卷积层：kernel_size = [5 x 5]
- en: 'Max pooling: pool size = [2 x 2]'
  id: totrans-412
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最大池化：pool size = [2 x 2]
- en: 'Convolution layer: kernel_size = [5 x 5]'
  id: totrans-413
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 卷积层：kernel_size = [5 x 5]
- en: 'Convolution layer: kernel_size = [5 x 5]'
  id: totrans-414
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 卷积层：kernel_size = [5 x 5]
- en: Batch normalization layer
  id: totrans-415
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 批标准化层
- en: 'Max pooling: pool size = [2 x 2]'
  id: totrans-416
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最大池化：pool size = [2 x 2]
- en: 'Convolution layer: kernel_size = [5 x 5]'
  id: totrans-417
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 卷积层：kernel_size = [5 x 5]
- en: 'Convolution layer: kernel_size = [5 x 5]'
  id: totrans-418
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 卷积层：kernel_size = [5 x 5]
- en: 'Convolution layer: kernel_size = [5 x 5]'
  id: totrans-419
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 卷积层：kernel_size = [5 x 5]
- en: 'Max pooling: pool size = [2 x 2]'
  id: totrans-420
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最大池化：pool size = [2 x 2]
- en: Dropout layer
  id: totrans-421
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Dropout层
- en: 'Dense layer: units = [512]'
  id: totrans-422
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 密集层：units = [512]
- en: 'Dense layer: units = [256]'
  id: totrans-423
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 密集层：units = [256]
- en: Dropout layer
  id: totrans-424
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Dropout层
- en: 'Dense layer: units = [10]'
  id: totrans-425
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 密集层：units = [10]
- en: This CNN model has close to a million trainable variables as can be seen from
    the model summary when running **‘** **model.summary()** **’**. Training on a
    CPU will take an inordinate amount of time (about 1 hour and 30 minutes). For
    this code example, we will train on a GPU instance. If running the code on Google
    Colab, change the runtime type to GPU and install TensorFlow 2.0 with GPU package.
    The graph of the model in Tensorboard is shown in Figure [35-16](#Fig16).
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 从运行**‘** **model.summary()** **’**时的模型摘要中可以看出，这个CNN模型有接近一百万个可训练变量。在CPU上训练将花费不寻常的时间（大约1小时30分钟）。对于这个代码示例，我们将在一个GPU实例上训练。如果在Google
    Colab上运行代码，请将运行时类型更改为GPU，并安装带有GPU包的TensorFlow 2.0。模型在Tensorboard中的图如图[35-16](#Fig16)所示。
- en: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig16_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig16_HTML.jpg)'
  id: totrans-427
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig16_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig16_HTML.jpg)'
- en: Figure 35-16
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: 图35-16
- en: Tensorboard output of CIFAR-10 model graph
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: CIFAR-10模型图的Tensorboard输出
- en: '[PRE21]'
  id: totrans-430
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: In this chapter, we discussed the convolutional neural network (CNN) as an example
    of a deep neural network. We went through the design details in architecting a
    CNN and implemented a CNN model with TensorFlow 2.0\. In the next chapter, we
    will examine another type of deep neural network called the recurrent neural network.
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们以卷积神经网络（CNN）为例讨论了深度神经网络。我们探讨了CNN的设计细节，并使用TensorFlow 2.0实现了CNN模型。在下一章中，我们将考察另一种称为循环神经网络（RNN）的深度神经网络。
- en: 36. Recurrent Neural Networks (RNNs)
  id: totrans-432
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 36. 循环神经网络（RNNs）
- en: Recurrent neural networks (RNNs) are another specialized scheme of neural network
    architectures. RNNs are developed to solve learning problems where information
    about the past (i.e., past instants/events) is directly linked to making future
    predictions. Such sequential examples play up frequently in many real-world tasks
    such as language modeling where the previous words in the sentence are used to
    determine what the next word will be. Also in stock market prediction, the last
    hour/day/week stock prices define the future stock movement. RNNs are particularly
    tuned for time series or sequential tasks.
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
  zh: 循环神经网络（RNNs）是神经网络架构的另一种专用方案。RNNs是为了解决那些过去信息（即过去的瞬间/事件）与未来预测直接相关联的学习问题而开发的。这种顺序示例在许多现实世界任务中经常出现，例如语言模型，其中句子中的前一个词用于确定下一个词将是什么。在股票市场预测中，过去一小时/一天/一周的股票价格定义了未来的股票走势。RNNs特别适用于时间序列或顺序任务。
- en: In a sequential problem, there is a looping or feedback framework that connects
    the output of one sequence to the input of the next sequence. RNNs are ideal for
    processing 1-D sequential data, unlike the grid-like 2-D image data in convolutional
    neural networks.
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: 在顺序问题中，存在一个循环或反馈框架，它将一个序列的输出与下一个序列的输入连接起来。RNNs非常适合处理1-D顺序数据，与卷积神经网络中网格状的2-D图像数据不同。
- en: This feedback framework enables the network to incorporate information from
    past sequences or from time-dependent datasets when making a prediction. In this
    section, we will cover the broad conceptual overview of recurrent neural networks
    and in particular the Long Short-Term Memory RNN variant (LSTM) which is the state-of-the-art
    technique for various sequential problems such as image captioning, stock market
    prediction, machine translation, and text classification.
  id: totrans-435
  prefs: []
  type: TYPE_NORMAL
  zh: 这种反馈框架使得网络在做出预测时能够结合来自过去序列或时间依赖数据集的信息。在本节中，我们将介绍循环神经网络的概念概述，特别是长短期记忆RNN变体（LSTM），它是图像标题、股票市场预测、机器翻译和文本分类等各种顺序问题的最先进技术。
- en: The Recurrent Neuron
  id: totrans-436
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 循环神经元
- en: The first building block of the RNN is the recurrent neuron (see Figure [36-1](#Fig1)).
    The neurons of the recurrent network are entirely different from those of other
    neural network architectures. The key difference here is that the recurrent neuron
    maintains a memory or a state from past computations. It does this by taking as
    input the output of the previous instant *y*[*t* − 1] in addition to its current
    input at a particular instant *x*[*t*].
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: RNN的第一个构建块是循环神经元（见图[36-1](#Fig1)）。循环网络的神经元与其他神经网络架构中的神经元完全不同。这里的关键区别在于循环神经元维护了从过去计算中的记忆或状态。它是通过将前一个时间瞬间*y*[*t* − 1]的输出以及特定时间瞬间*x*[*t*]的当前输入作为输入来实现的。
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig1_HTML.jpg](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig1_HTML.jpg)'
  id: totrans-438
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig1_HTML.jpg](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig1_HTML.jpg)'
- en: Figure 36-1
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
  zh: 图36-1
- en: A recurrent neuron
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: 循环神经元
- en: In Figure [36-1](#Fig1), the recurrent neuron stands in contrast with neurons
    of the MLP and CNN architectures because instead of transferring a hierarchy of
    information across the network from one neuron to the other, data is looped back
    into the same neuron at every new time instant. A time instant can also mean a
    new sequence.
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
  zh: 在图[36-1](#Fig1)中，循环神经元与MLP和CNN架构中的神经元形成对比，因为循环神经元不是将信息层次从网络中的一个神经元传递到另一个神经元，而是在每个新的时间瞬间将数据循环回同一个神经元。时间瞬间也可以指一个新的序列。
- en: Hence, the recurrent neuron has two input weights, ![$$ {W}_{x_t} $$](../images/463852_1_En_36_Chapter/463852_1_En_36_Chapter_TeX_IEq1.png)
    and ![$$ {W}_{y_{t-1}} $$](../images/463852_1_En_36_Chapter/463852_1_En_36_Chapter_TeX_IEq2.png),
    for the input at time *x*[*t*] and for the input at time instant *y*[*t* − 1].
    See Figure [36-2](#Fig2).
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，循环神经元有两个输入权重，分别是![$$ {W}_{x_t} $$](../images/463852_1_En_36_Chapter/463852_1_En_36_Chapter_TeX_IEq1.png)和![$$
    {W}_{y_{t-1}} $$](../images/463852_1_En_36_Chapter/463852_1_En_36_Chapter_TeX_IEq2.png)，用于在时间*x*[*t*]的输入和*y*[*t* − 1]时间瞬间的输入。见图[36-2](#Fig2)。
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig2_HTML.jpg](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig2_HTML.jpg)'
  id: totrans-443
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig2_HTML.jpg](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig2_HTML.jpg)'
- en: Figure 36-2
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: 图36-2
- en: Recurrent neuron with input weights
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
  zh: 带有输入权重的循环神经元
- en: Similar to other neurons, the recurrent neuron also injects non-linearity into
    the network by passing its weighted sums or affine transformations through a non-linear
    activation function.
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
  zh: 与其他神经元类似，循环神经元也通过通过非线性激活函数传递其加权和或仿射变换来向网络注入非线性。
- en: Unfolding the Recurrent Computational Graph
  id: totrans-447
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 展开循环计算图
- en: A recurrent neural network is formalized as an unfolded computational graph.
    An unfolded computational graph shows the flow of information through the recurrent
    layer at every time instant in the sequence. Suppose we have a sequence of five
    time steps, we will unfold the recurrent neuron five times across the number of
    instants. The number of sequences constitutes the layers of the recurrent neural
    network architecture. See Figure [36-3](#Fig3).
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
  zh: 循环神经网络被形式化为展开的计算图。展开的计算图显示了在序列中的每个时间瞬间通过循环层的信流。假设我们有一个五个时间步长的序列，我们将循环神经元在五个时间瞬间中展开五次。序列的数量构成了循环神经网络架构的层数。见图[36-3](#Fig3)。
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig3_HTML.jpg](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig3_HTML.jpg)'
  id: totrans-449
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig3_HTML.jpg](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig3_HTML.jpg)'
- en: Figure 36-3
  id: totrans-450
  prefs: []
  type: TYPE_NORMAL
  zh: 图36-3
- en: Unfolding the recurrent neuron into a recurrent neural network
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
  zh: 将循环神经元展开成循环神经网络
- en: From the unrolled graph of the recurrent neural network, we can observe how
    the input into the recurrent layer includes the output of the previous time step
    *t* − 1 in addition to the current input at time step *t*. This architecture of
    the recurrent neuron is central to how the recurrent neural network learns from
    past events or past sequences.
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
  zh: 从循环神经网络的展开图中，我们可以观察到循环层的输入除了包含当前时间步*t*的输入外，还包括前一个时间步*t* − 1的输出。这种循环神经元的架构对于循环神经网络如何从过去事件或过去序列中学习至关重要。
- en: Up until now, we have seen that the recurrent neuron captures information from
    the past by storing memory or state in its memory cell. The recurrent neuron can
    have a much more complicated memory cell (such as the GRU or LSTM cell) than the
    basic RNN cell as illustrated in the images so far, where the output at time instant
    *t* − 1 holds the memory.
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经看到循环神经元通过在它的记忆细胞中存储记忆或状态来捕获过去的信息。循环神经元可以拥有比迄今为止图中所示的基本RNN细胞更复杂的记忆细胞（如GRU或LSTM细胞），其中在时间点
    *t* − 1的输出保持记忆。
- en: Basic Recurrent Neural Network
  id: totrans-454
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基本循环神经网络
- en: Earlier on, we mentioned that when a recurrent network is unfolded, we can see
    how information flows from one recurrent layer to the other. Further, we noted
    that the sequence length of the dataset determines the number of recurrent layers.
    Let’s briefly illustrate this point in Figure [36-4](#Fig4). Suppose we have a
    time series dataset of ten layers, for each row sequence in the dataset, we will
    have ten layers in the recurrent network system.
  id: totrans-455
  prefs: []
  type: TYPE_NORMAL
  zh: 之前我们提到，当循环神经网络展开时，我们可以看到信息是如何从一个循环层流向另一个循环层的。此外，我们还指出数据集的序列长度决定了循环层的数量。让我们简要地通过图[36-4](#Fig4)来说明这一点。假设我们有一个包含十个层的时序数据集，对于数据集中的每一行序列，我们将在循环神经网络系统中拥有十个层。
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig4_HTML.png](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig4_HTML.png)'
  id: totrans-456
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig4_HTML.png](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig4_HTML.png)'
- en: Figure 36-4
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
  zh: 图36-4
- en: Dataset to layers
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集到层
- en: At this point, we must firmly draw attention to the fact that the recurrent
    layer does not comprise of just one neuron cell, but it is instead a set of neurons
    or neuron cells as shown in Figure [36-5](#Fig5). The choice of the number of
    neurons in a recurrent layer is a design decision when composing the network architecture.
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一点上，我们必须坚决指出，循环层不仅仅包含一个神经元细胞，而是一组神经元或神经元细胞，如图[36-5](#Fig5)所示。循环层中神经元数量的选择是在构建网络架构时的一个设计决策。
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig5_HTML.jpg](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig5_HTML.jpg)'
  id: totrans-460
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig5_HTML.jpg](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig5_HTML.jpg)'
- en: Figure 36-5
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
  zh: 图36-5
- en: Neurons in a recurrent layer
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: 循环层中的神经元
- en: Each neuron in a recurrent layer receives as input the output of the previous
    layer and its current input. Hence, the neurons each have two weight vectors.
    Again, just like other neurons, they perform an affine transformation of the inputs
    and pass it through a non-linear activation function (usually the hyperbolic tangent,
    tanh). Still, within the recurrent layer, the output of the neurons is moved to
    a dense or fully connected layer with a softmax activation function for outputting
    the class probabilities. This operation is illustrated in Figure [36-6](#Fig6).
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: 循环层中的每个神经元都接收前一层的输出和当前输入作为输入。因此，每个神经元都有两个权重向量。同样，就像其他神经元一样，它们对输入执行仿射变换，并通过非线性激活函数（通常是双曲正切，tanh）传递。然而，在循环层内，神经元的输出被移动到一个具有softmax激活函数的密集或全连接层，以输出类概率。这一操作在图[36-6](#Fig6)中进行了说明。
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig6_HTML.jpg](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig6_HTML.jpg)'
  id: totrans-464
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig6_HTML.jpg](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig6_HTML.jpg)'
- en: Figure 36-6
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
  zh: 图36-6
- en: Computations within a recurrent layer
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: 循环层内的计算
- en: Recurrent Connection Schemes
  id: totrans-467
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 循环连接方案
- en: There are two main schemes for forming recurrent connections from one recurrent
    layer to another. The first is to have recurrent connections between hidden units,
    and the other is recurrent connections between the hidden unit and the output
    of the previous layer. The different schemes are visually illustrated in Figure
    [36-7](#Fig7).
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: 从一个循环层到另一个循环层形成循环连接有两种主要方案。第一种是在隐藏单元之间有循环连接，另一种是在隐藏单元和前一层的输出之间有循环连接。不同的方案在图[36-7](#Fig7)中进行了视觉说明。
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig7_HTML.jpg](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig7_HTML.jpg)'
  id: totrans-469
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig7_HTML.jpg](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig7_HTML.jpg)'
- en: Figure 36-7
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: 图36-7
- en: Recurrent connection schemes
  id: totrans-471
  prefs: []
  type: TYPE_NORMAL
  zh: 循环连接方案
- en: The hidden-to-hidden recurrent configuration is found to be superior to the
    output-to-hidden form because it better captures the high-dimensional feature
    information about the past. In any case, the output-to-hidden recurrent form is
    less computationally expensive to train and can more easily be parallelized.
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
  zh: 隐藏到隐藏的循环配置被发现优于输出到隐藏的形式，因为它更好地捕捉了关于过去的维特征信息。无论如何，输出到隐藏的循环形式在训练时计算成本更低，并且更容易并行化。
- en: Sequence Mappings
  id: totrans-473
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 序列映射
- en: Recurrent neural networks can represent sequence problems in a variety of ways.
    The flexibility of RNN mappings is that it operates on inputs and outputs of the
    network as sequences, thus freeing the network from the fixed sized input-output
    constraints found in other neural network architectures such as MLP and CNN.
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: 循环神经网络可以用多种方式表示序列问题。RNN 映射的灵活性在于它作为序列操作网络的输入和输出，从而使得网络摆脱了其他神经网络架构（如 MLP 和 CNN）中发现的固定大小输入输出约束。
- en: 'Here are a few examples of variating sequence problems solved using RNNs:'
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些使用 RNN 解决的序列问题的例子：
- en: An input to a sequence of output. This configuration is used for image captioning
    problems when an image is passed as an input to the network, and the output is
    a sequence of words. See Figure [36-8](#Fig8).
  id: totrans-476
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输入到序列输出。这种配置用于图像字幕问题，当图像作为输入传递给网络时，输出是一系列单词。见图 [36-8](#Fig8)。
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig8_HTML.jpg](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig8_HTML.jpg)'
  id: totrans-477
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig8_HTML.jpg](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig8_HTML.jpg)'
- en: Figure 36-8
  id: totrans-478
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 36-8
- en: An input to a sequence of output
  id: totrans-479
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 输入到序列输出
- en: A sequence of inputs to an output. For example, in sentiment analysis, we need
    to pass in a sequence of words as input to the network, and the output is a class
    indicating either a positive or negative review or sentiment. See Figure [36-9](#Fig9).
  id: totrans-480
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输出到序列。例如，在情感分析中，我们需要将一系列单词作为输入传递给网络，输出是一个表示正面或负面评论或情感的类别。见图 [36-9](#Fig9)。
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig9_HTML.jpg](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig9_HTML.jpg)'
  id: totrans-481
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig9_HTML.jpg](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig9_HTML.jpg)'
- en: Figure 36-9
  id: totrans-482
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 36-9
- en: A sequence of inputs to an output
  id: totrans-483
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 输出到序列
- en: Sequence input to sequence output. This mapping operation is suited in application
    areas such as machine translation and speech recognition. It is more popularly
    called the encoder-decoder or sequence-to-sequence architecture. In this case,
    we may have a sequence of words in a particular language as input, and we want
    a sequence of words as output in another language. See Figure [36-10](#Fig10).
  id: totrans-484
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 序列输入到序列输出。这种映射操作适用于机器翻译和语音识别等应用领域。它更普遍地被称为编码器-解码器或序列到序列架构。在这种情况下，我们可能有特定语言的单词序列作为输入，并希望以另一种语言的单词序列作为输出。见图
    [36-10](#Fig10)。
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig10_HTML.png](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig10_HTML.png)'
  id: totrans-485
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig10_HTML.png](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig10_HTML.png)'
- en: Figure 36-10
  id: totrans-486
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 36-10
- en: Sequence input to sequence output
  id: totrans-487
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 序列输入到序列输出
- en: Synced sequence input to output. This sort of framework is ideal for video classification
    in the event we want to label each video frame. See Figure [36-11](#Fig11).
  id: totrans-488
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 同步序列输入到输出。这种框架在需要为每个视频帧标记时，非常适合视频分类。见图 [36-11](#Fig11)。
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig11_HTML.jpg](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig11_HTML.jpg)'
  id: totrans-489
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig11_HTML.jpg](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig11_HTML.jpg)'
- en: Figure 36-11
  id: totrans-490
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 36-11
- en: Synced sequence input to output
  id: totrans-491
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 同步序列输入到输出
- en: In the schemes illustrated in this sub-section, information flows from the hidden
    unit (or memory cell) of the recurrent layer at time instant *t* − 1 to the hidden
    unit at time instant *t*. As discussed earlier, this is because the transferred
    information is more feature-rich and contains more information from the past.
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
  zh: 在本小节中说明的方案中，信息从时间实例 *t* − 1 的循环层的隐藏单元（或记忆单元）流向时间实例 *t* 的隐藏单元。如前所述，这是因为传递的信息更丰富，包含更多来自过去的信息。
- en: 'Training the Recurrent Network: Backpropagation Through Time'
  id: totrans-493
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 循环网络的训练：时间反向传播
- en: The recurrent neural network is trained in much the same way as other traditional
    neural networks by using the backpropagation algorithm. However, the backpropagation
    algorithm is modified into what is called backpropagation through time (BPTT)
    .
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: 循环神经网络与其他传统神经网络一样，通过使用反向传播算法进行训练。然而，反向传播算法被修改成了称为时间反向传播（BPTT）的形式。
- en: Due to the architectural loop or recurrent structure of the recurrent network,
    vanilla backpropagation as is cannot work. Training a network using backpropagation
    involves calculating the error gradient, moving backward from the output layer
    through the hidden layers of the network and adjusting the network weights. However,
    this operation cannot work in the recurrent neuron because we have just one neural
    cell with recurrent connections to itself.
  id: totrans-495
  prefs: []
  type: TYPE_NORMAL
  zh: 由于循环网络的结构循环或循环结构，普通的反向传播无法工作。使用反向传播训练网络涉及计算误差梯度，从输出层向后移动通过网络的隐藏层，并调整网络权重。然而，这种操作在循环神经元中无法进行，因为我们只有一个具有自我循环连接的单个神经元。
- en: So, in order to train the recurrent network using backpropagation, we unroll
    the recurrent neuron across the time instants and apply backpropagation to the
    unrolled neurons at each time layer the same way it is done for a traditional
    feedforward neural network. This operation is further illustrated in Figure [36-12](#Fig12).
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，为了使用反向传播训练循环网络，我们需要在时间点展开循环神经元，并在每个时间层对展开的神经元应用反向传播，就像在传统的前馈神经网络中所做的那样。这一操作在图[36-12](#Fig12)中进一步说明。
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig12_HTML.png](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig12_HTML.png)'
  id: totrans-497
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig12_HTML.png](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig12_HTML.png)'
- en: Figure 36-12
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
  zh: 图36-12
- en: Backpropagation through time
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
  zh: 时间反向传播
- en: A significant challenge of training the recurrent neural network is the vanishing
    and exploding gradient problem. When training a deep recurrent network for many
    layers of time instants, calculating the gradients of the weights of the neurons
    can become very volatile. When this happens, the value of the gradient can become
    extremely large tending to infinity, or they become tiny, all the way to zero.
    When this happens, the neurons become dead and cannot train or learn any new information
    further. This effect is called the exploding and vanishing gradient problem.
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: 训练循环神经网络的一个显著挑战是梯度消失和梯度爆炸问题。当对一个多层的深度循环网络进行训练时，计算神经元的权重梯度可能会变得非常不稳定。当这种情况发生时，梯度的值可能会变得非常大，趋向于无穷大，或者变得非常小，直至为零。当这种情况发生时，神经元会变得“死亡”，无法再训练或学习任何新的信息。这种现象被称为梯度爆炸和消失问题。
- en: The exploding and vanishing gradient problem is most prevalent in recurrent
    neural networks because of the long-term dependencies or time instant of the unrolled
    recurrent neuron. A proposed alternative technique for mitigating this problem
    in recurrent networks (in addition to other discussed methods such as gradient
    clipping, batch normalization, and using a non-saturating activation function
    such as ReLu) is to discard early time instances or time instances in the distant
    past. This technique is called Truncated Backpropagation Through Time (truncated
    BPTT).
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度爆炸和消失问题在循环神经网络中最普遍，这是由于展开的循环神经元的长期依赖或时间点。为了减轻循环网络中这个问题（除了其他讨论过的方法，如梯度裁剪、批量归一化和使用非饱和激活函数如ReLu等），提出了一种替代技术，即丢弃早期时间点或遥远过去的时间点。这种技术被称为截断时间反向传播（truncated
    BPTT）。
- en: However, truncated BPTT suffers a significant drawback, and this is that some
    problems rely heavily on long-term dependencies to be able to make a prediction.
    A typical example is in language modeling where the long-term sequence of words
    in the past is vital in predicting the next word in the sequence.
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，截断BPTT存在一个显著的缺点，那就是某些问题严重依赖于长期依赖来进行预测。一个典型的例子是在语言模型中，过去长期序列中的单词对于预测序列中的下一个单词至关重要。
- en: The shortcoming of truncated BPTT and the need to deal with the problem of exploding
    and vanishing gradients led to the development of a memory cell called the Long
    Short-Term Memory or LSTM for short, which can store the long-term information
    of the problem in the memory cell of the recurrent network .
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: 截断BPTT的不足以及处理梯度爆炸和消失问题的需要，导致了长短期记忆（LSTM）或简称LSTM的内存单元的发明，它可以在循环网络的内存单元中存储问题的长期信息。
- en: The Long Short-Term Memory (LSTM) Network
  id: totrans-504
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 长短期记忆（LSTM）网络
- en: Long Short-Term Memory (LSTM) belongs to a class of RNN called gated recurrent
    unit. They are called *gated* because unlike the basic recurrent units, they contain
    extra components called gates that control the flow of information within the
    recurrent cell. This includes choosing what information to store in the cell and
    what information to discard or forget.
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: 长短期记忆（LSTM）属于一类称为门控循环单元的 RNN。它们被称为“门控”，因为与基本循环单元不同，它们包含额外的称为门的组件，这些门控制循环单元内的信息流。这包括选择存储在单元中的信息以及要丢弃或遗忘的信息。
- en: LSTM is very efficient for capturing the long-term dependencies across a large
    number of time instants. It does this by having a slightly more sophisticated
    cell than the basic recurrent units. The components of the LSTM are the
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: LSTM 在捕捉大量时间瞬间之间的长期依赖关系方面非常高效。它是通过比基本循环单元稍微复杂一点的单元来实现的。LSTM 的组件包括
- en: Memory cell
  id: totrans-507
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 存储单元
- en: Input gate
  id: totrans-508
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入门
- en: Forget gate
  id: totrans-509
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 忘记门
- en: Output gate
  id: totrans-510
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输出门
- en: These extra components enable the RNN to remember and store important events
    from the distant past. The LSTM takes as input the previous cell state, *c*[*t* − 1];
    the previous hidden state, *h*[*t* − 1]; and the current input, *x*[*t*]. To keep
    in line with the simplicity of this book, we provide a high-level illustration
    of the LSTM cell showing how the extra components of the cell come together .
    In TensorFlow 2.0, LSTM layer is implemented in the method **‘tf.keras.layers.LSTM()’**
    .
  id: totrans-511
  prefs: []
  type: TYPE_NORMAL
  zh: 这些额外的组件使 RNN 能够记住并存储来自遥远过去的重大事件。LSTM 以先前的单元状态*c*[*t* − 1]、先前的隐藏状态*h*[*t* − 1]和当前输入*x*[*t*]作为输入。为了保持本书的简洁性，我们提供了一个高级的
    LSTM 单元示意图，展示了单元的额外组件是如何结合在一起的。在 TensorFlow 2.0 中，LSTM 层是通过方法**‘tf.keras.layers.LSTM()’**实现的。
- en: 'The illustration in Figure [36-13](#Fig13) is the LSTM memory cell. The components
    of the LSTM cell serve distinct functions in preserving long-term dependencies
    in sequence data. Let’s go through them:'
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [36-13](#Fig13) 中的插图是 LSTM 存储单元。LSTM 单元的组件在保留序列数据中的长期依赖关系方面具有不同的功能。让我们逐一了解它们：
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig13_HTML.png](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig13_HTML.png)'
  id: totrans-513
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig13_HTML.png](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig13_HTML.png)'
- en: Figure 36-13
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
  zh: 图 36-13
- en: LSTM cell
  id: totrans-515
  prefs: []
  type: TYPE_NORMAL
  zh: LSTM 单元
- en: 'The input gate: This gate is responsible for controlling what information gets
    stored in the long-term state or the memory cell, *c*. Working in tandem with
    the input gate is another gate that regulates the information flowing into the
    input gate. This gate analyzes the current input to the LSTM cell, *x*[*t*], and
    the previous short-term state, *h*[*t* − 1].'
  id: totrans-516
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入门：这个门负责控制哪些信息被存储在长期状态或存储单元*c*中。它与输入门协同工作，另一个门则调节流入输入门的信息。这个门分析 LSTM 单元*c*[*t*]的当前输入和先前的短期状态*h*[*t* − 1]。
- en: 'The forget gate: The role of this gate is to regulate how much of the information
    in the long-term state is persisted across time instants.'
  id: totrans-517
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 忘记门：这个门的作用是调节长期状态中的信息在时间瞬间之间持续的程度。
- en: 'The output gate: This gate controls how much information to output from the
    cell at a particular time instant. This gate controls the value of *h*[*t*] (the
    short-term state) and *y*[*t*] (the output at time *t*).'
  id: totrans-518
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输出门：这个门控制特定时间瞬间从单元中输出的信息量。这个门控制*h*[*t*]（短期状态）和*y*[*t*]（时间*t*的输出）的值。
- en: It is important to note that the components of the LSTM cells are all fully
    connected neural networks. There exist other variants of recurrent networks with
    memory cells, two of such are the peephole connections and the gated recurrent
    units.
  id: totrans-519
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要注意，LSTM 单元的组件都是全连接神经网络。存在其他具有存储单元的循环网络变体，其中两种是窥视孔连接和门控循环单元。
- en: Peephole Connection
  id: totrans-520
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 窥视孔连接
- en: The peephole connection extends the LSTM network by also using information from
    the memory cell or long-term state of the previous time instant *c*[*t* − 1] as
    input to the LSTM gates. The goal of the peephole is to provide extra information
    into the LSTM unit by peeping at the stored long-term memory. This is further
    illustrated in Figure [36-14](#Fig14). In TensorFlow 2.0, the implementation of
    peephole connections to an LSTM layer is provided by the method **‘tf.keras.experimental.PeepholeLSTMCell()’**
    .
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
  zh: 窥视孔连接通过使用来自存储单元或先前时间瞬间*c*[*t* − 1]的长期状态信息作为 LSTM 门的输入来扩展 LSTM 网络。窥视孔的目的是通过窥视存储的长期记忆来向
    LSTM 单元提供额外信息。这进一步在图 [36-14](#Fig14) 中得到说明。在 TensorFlow 2.0 中，将窥视孔连接到 LSTM 层的实现由方法**‘tf.keras.experimental.PeepholeLSTMCell()’**提供。
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig14_HTML.png](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig14_HTML.png)'
  id: totrans-522
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig14_HTML.png](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig14_HTML.png)'
- en: Figure 36-14
  id: totrans-523
  prefs: []
  type: TYPE_NORMAL
  zh: 图36-14
- en: Peephole connection
  id: totrans-524
  prefs: []
  type: TYPE_NORMAL
  zh: 窥视连接
- en: Gated Recurrent Unit (GRU)
  id: totrans-525
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 门控循环单元（GRU）
- en: The gated recurrent unit (GRU) is a more recent recurrent neural network architecture
    than the LSTM, and it is also comparable simpler to implement with respect to
    the number of components within the unit and their operations. Despite its comparative
    simplicity, GRUs are high-performing recurrent architectures and, in most cases,
    even perform better than the LSTM in sequence modeling problems.
  id: totrans-526
  prefs: []
  type: TYPE_NORMAL
  zh: 门控循环单元（GRU）是比LSTM更近期的循环神经网络架构，并且在单元内组件数量及其操作方面也相对简单易实现。尽管相对简单，GRUs是高性能的循环架构，在大多数情况下，在序列建模问题中甚至比LSTM表现更好。
- en: GRUs combine the forget and the input gates to decide on what information should
    be committed to the long-term memory or the memory cell and what information should
    be left out. Moreover, the GRU combines the cell (i.e., long-term state) and short-term
    states into a single state vector *h*[*t*]. Also, the GRU removes the output gate
    and returns the state vector *h*[*t*] at each time instant. This is further illustrated
    in Figure [36-15](#Fig15). In TensorFlow 2.0, the GRU layer is implemented in
    the method **‘tf.keras.layers.GRU()’**.
  id: totrans-527
  prefs: []
  type: TYPE_NORMAL
  zh: GRUs将遗忘门和输入门结合以决定哪些信息应该被提交到长期记忆或记忆单元，以及哪些信息应该被排除在外。此外，GRU将细胞（即长期状态）和短期状态合并为一个单一的状态向量
    *h*[*t*]。这进一步在图[36-15](#Fig15)中得到了说明。在TensorFlow 2.0中，GRU层是通过方法 **‘tf.keras.layers.GRU()’**
    实现的。
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig15_HTML.png](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig15_HTML.png)'
  id: totrans-528
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig15_HTML.png](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig15_HTML.png)'
- en: Figure 36-15
  id: totrans-529
  prefs: []
  type: TYPE_NORMAL
  zh: 图36-15
- en: Gated recurrent unit
  id: totrans-530
  prefs: []
  type: TYPE_NORMAL
  zh: 门控循环单元
- en: Recurrent Neural Networks Applied to Sequence Problems
  id: totrans-531
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 应用于序列问题的循环神经网络
- en: 'Recurrent neural networks have many application areas for using LSTM models
    for sequence tasks. A couple of problems under this domain include sentiment analysis,
    machine translation, image captioning, video captioning, and voice recognition.
    As mentioned earlier, these problems can be modeled as a one-to-many model, a
    many-to-one model, or a many-to-many model. The section will survey a few LSTM
    architectures for tackling/modeling sequence problems:'
  id: totrans-532
  prefs: []
  type: TYPE_NORMAL
  zh: 循环神经网络在序列任务中应用广泛，使用LSTM模型进行序列任务。这个领域的一些问题包括情感分析、机器翻译、图像字幕、视频字幕和语音识别。如前所述，这些问题可以建模为一对一模型、多对一模型或多对多模型。本节将概述一些用于解决/建模序列问题的LSTM架构：
- en: Long-term recurrent convolutional neural network, also known as CNN LSTM
  id: totrans-533
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 长期循环卷积神经网络，也称为CNN LSTM
- en: Encoder-Decoder LSTMs
  id: totrans-534
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 编码器-解码器LSTM
- en: Bidirectional recurrent neural networks
  id: totrans-535
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 双向循环神经网络
- en: Long-Term Recurrent Convolutional Network (LRCN)
  id: totrans-536
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 长期循环卷积网络（LRCN）
- en: The long-term recurrent convolutional network (LRCN) is a unique neural network
    architecture for generating descriptions of images and videos (which is seen as
    a sequence of images). These problems can be termed as visual time series modeling.
    The LRCN architecture combines the ability of the convolutional neural network
    (CNN) to extract image features together with a recurrent network for learning
    sequences or long-term dependencies. The LRCN passes visual inputs into a CNN
    to retrieve image features as outputs. These outputs are then passed into a recurrent
    LSTM network layer to generate the natural language descriptions. The recurrent
    layer can contain stacked LSTMs.
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
  zh: 长期循环卷积网络（LRCN）是一种独特的神经网络架构，用于生成图像和视频的描述（被视为一系列图像）。这些问题可以称为视觉时间序列建模。LRCN架构结合了卷积神经网络（CNN）提取图像特征的能力以及循环网络学习序列或长期依赖的能力。LRCN将视觉输入传递到CNN以检索图像特征作为输出。然后，这些输出被传递到循环LSTM网络层以生成自然语言描述。循环层可以包含堆叠的LSTM。
- en: One core advantage of LRCN for modeling sequential vision problems such as image
    captioning and video captioning is that the network is not constrained to fixed
    lengths of inputs and outputs. Hence, it can be used to model sequential data
    with different lengths such as textual data and videos.
  id: totrans-538
  prefs: []
  type: TYPE_NORMAL
  zh: LRCN在建模序列视觉问题（如图像字幕和视频字幕）方面的一个核心优势是网络不受输入和输出固定长度的限制。因此，它可以用于建模不同长度的序列数据，如文本数据和视频。
- en: 'The following illustrations show how LRCN is applied to a variety of sequence
    problems:'
  id: totrans-539
  prefs: []
  type: TYPE_NORMAL
  zh: 以下插图展示了LRCN如何应用于各种序列问题：
- en: 'Image captioning: Image captioning can be seen as a one-to-many sequence problem.
    The input is an image and therefore a static input, and the output is a sequence
    of text that describes the objects in the image; this is a sequential output.
    The use of LRCN for image captioning is illustrated in Figure [36-16](#Fig16).'
  id: totrans-540
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 图片标题：图片标题可以被视为一个一对一的序列问题。输入是一个图像，因此是一个静态输入，输出是一系列描述图像中对象的文本；这是一个序列输出。图[36-16](#Fig16)展示了使用LRCN进行图片标题的示例。
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig16_HTML.png](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig16_HTML.png)'
  id: totrans-541
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig16_HTML.png](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig16_HTML.png)'
- en: Figure 36-16
  id: totrans-542
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图36-16
- en: Image captioning (photo by Daniel Llorente on Unsplash)
  id: totrans-543
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图片标题（照片由Daniel Llorente在Unsplash提供）
- en: 'Video captioning: Video can be seen as a sequence of images. Hence, in a video
    captioning problem, a sequence of images is passed as input to the LRCN model
    which in turn returns a sequence of outputs as a textual description for each
    video frame. Hence, video captioning can be seen as a many-to-many sequence problem.
    This approach is an example of an Encoder-Decoder LSTM where CNN is used as an
    image encoder that is initially trained for image classification. The final hidden
    layer, which is also called a bottleneck, is then passed as input to the RNN decode.
    It is typical to use an already pre-trained CNN on a large-scale image recognition
    task. A number of such models exist in the public domain. We will survey Encoder-Decoder
    LSTMs in more detail shortly. Video captioning is illustrated in Figure [36-17](#Fig17).'
  id: totrans-544
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 视频标题：视频可以被视为一系列图像。因此，在视频标题问题中，一系列图像作为输入传递给LRCN模型，该模型随后返回一系列输出，作为每个视频帧的文本描述。因此，视频标题可以被视为一个多对多的序列问题。这种方法是编码器-解码器LSTM的一个例子，其中CNN用作图像编码器，最初用于图像分类的训练。最终的隐藏层，也称为瓶颈，然后作为输入传递给RNN解码。通常使用在大规模图像识别任务上已经预训练的CNN。存在许多此类模型。我们将在稍后更详细地调查编码器-解码器LSTM。视频标题在图[36-17](#Fig17)中展示。
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig17_HTML.png](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig17_HTML.png)'
  id: totrans-545
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig17_HTML.png](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig17_HTML.png)'
- en: Figure 36-17
  id: totrans-546
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图36-17
- en: Video captioning
  id: totrans-547
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 视频标题
- en: Encoder-Decoder LSTMs
  id: totrans-548
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编码器-解码器LSTM
- en: Encoder-Decoder LSTM architecture handles a particular class of sequence problems
    that takes as input multiple time steps and also returns a multiple time step
    output. A major challenge of this sort of problems is that both the input and
    output sequences can have varied lengths.
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: 编码器-解码器LSTM架构处理一类特定的序列问题，它接受多个时间步长的输入，并返回多个时间步长的输出。这类问题的主要挑战是输入和输出序列的长度可能不同。
- en: The first part of the architecture, that is, the Encoder, is responsible for
    receiving and encoding the input sequence; the second part of the architecture,
    that is, the Decoder, takes in the output from the Encoder and then predicts the
    output sequence.
  id: totrans-550
  prefs: []
  type: TYPE_NORMAL
  zh: 架构的第一部分，即编码器，负责接收和编码输入序列；架构的第二部分，即解码器，接收来自编码器的输出，然后预测输出序列。
- en: The sort of architecture is made for natural language processing problems where
    the output is a sequence of words. It is commonly used in machine translation,
    video captioning, and speech recognition. An illustration is already provided
    in Figure [36-10](#Fig10).
  id: totrans-551
  prefs: []
  type: TYPE_NORMAL
  zh: 这种架构是为自然语言处理问题设计的，其中输出是一系列单词。它通常用于机器翻译、视频标题和语音识别。图[36-10](#Fig10)已经提供了这种架构的示例。
- en: Bidirectional Recurrent Neural Networks
  id: totrans-552
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 双向循环神经网络
- en: Bidirectional RNN is another particular type of recurrent neural network architecture
    that involves placing the recurrent layers beside each other where one layer works
    to learn the long-term dependencies from the past; this layer is called the forward
    LSTM. For the other layer, the input is reversed and fed into the network, so
    the network learns long-term dependencies from the future. This layer is called
    the backward LSTM. The bidirectional RNN is illustrated in Figure [36-18](#Fig18).
  id: totrans-553
  prefs: []
  type: TYPE_NORMAL
  zh: 双向循环神经网络是另一种特殊的循环神经网络架构，它涉及将循环层并排放置，其中一层用于从过去学习长期依赖；这一层被称为正向LSTM。对于另一层，输入被反转并输入到网络中，因此网络从未来学习长期依赖。这一层被称为反向LSTM。双向RNN在图[36-18](#Fig18)中展示。
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig18_HTML.png](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig18_HTML.png)'
  id: totrans-554
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig18_HTML.png](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig18_HTML.png)'
- en: Figure 36-18
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
  zh: 图36-18
- en: Bidirectional LSTM
  id: totrans-556
  prefs: []
  type: TYPE_NORMAL
  zh: 双向LSTM
- en: When the outputs from these side-by-side networks are combined, it is easier
    to predict the next time step of a sequence having privy to the entire information
    gamut, because they process both information from the past and the future. Although
    this architecture was first designed for speech recognition tasks, it has performed
    impressively across a variety of other sequence prediction tasks. It is built
    to improve on the vanilla unidirectional LSTM which only has knowledge of the
    past.
  id: totrans-557
  prefs: []
  type: TYPE_NORMAL
  zh: 当这些并排网络的输出被组合时，由于它们处理了过去和未来的信息，因此更容易预测具有整个信息范围的序列的下一个时间步，这使得预测更加容易。尽管这种架构最初是为语音识别任务设计的，但它已经在各种其他序列预测任务中表现出色。它旨在改进传统的单向LSTM，后者只知道过去的信息。
- en: This network is built on the understanding that some learning problems only
    make sense when a coherent set of information is present. For example, if a human
    interpreter is interpreting from one language to another, he first listens to
    a cohesive set of information in one language before interpreting to another language.
    This is because the context of an entire cohesive sentence gives the right basis
    for a correct interpretation.
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
  zh: 该网络建立在这样的理解之上：某些学习问题只有在存在一致的信息集时才有意义。例如，如果一个人工翻译者从一种语言翻译到另一种语言，他首先会听到一种语言中连贯的信息集，然后再将其翻译成另一种语言。这是因为整个连贯句子的上下文为正确的解释提供了正确的基础。
- en: 'RNN with TensorFlow 2.0: Univariate Timeseries'
  id: totrans-559
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用TensorFlow 2.0的RNN：单变量时间序列
- en: This section makes use of the Nigeria power consumption dataset to implement
    a univariate timeseries model with LSTM recurrent neural networks. The dataset
    for this example is the Nigeria power consumption data from January 1 to March
    11 by Hipel and McLeod (1994), retrieved from DataMarket.
  id: totrans-560
  prefs: []
  type: TYPE_NORMAL
  zh: 本节使用尼日利亚电力消耗数据集，通过LSTM循环神经网络实现单变量时间序列模型。本例中的数据集是Hipel和McLeod（1994年）提供的尼日利亚1月1日至3月11日的电力消耗数据，从DataMarket检索而来。
- en: The dataset is preprocessed for timeseries modeling with RNNs by converting
    the data input and outputs into sequences using the method **‘convert_to_ sequences’**.
    This method splits the dataset into rolling sequences consisting of 20 rows (or
    time steps) using a window of **1**}. In Figure [36-19](#Fig19), the example univariate
    dataset is converted into sequences of five time steps, where output sequence
    is one step ahead of the input sequence. Each sequence contains five rows (determined
    by the **time_steps** variable) and in this univariate case, 1 column.
  id: totrans-561
  prefs: []
  type: TYPE_NORMAL
  zh: 该数据集通过使用方法**‘convert_to_sequences’**将数据输入和输出转换为序列，以进行RNN的时间序列建模。此方法使用**1**个窗口将数据集分割成由20行（或时间步）组成的滚动序列。在图[36-19](#Fig19)中，示例单变量数据集被转换为五个时间步的序列，其中输出序列比输入序列提前一步。每个序列包含五行（由**time_steps**变量确定）和在这个单变量情况下，1列。
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig19_HTML.png](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig19_HTML.png)'
  id: totrans-562
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig19_HTML.png](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig19_HTML.png)'
- en: Figure 36-19
  id: totrans-563
  prefs: []
  type: TYPE_NORMAL
  zh: 图36-19
- en: 'Converting a univariate series into sequences for prediction with RNNs. Left:
    Sample univariate dataset. Center: Input sequence. Right: Output sequence'
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
  zh: 将单变量序列转换为RNNs进行预测。左侧：样本单变量数据集。中间：输入序列。右侧：输出序列
- en: When modeling using RNNs, it is important to scale the dataset to have values
    within the same range. The plot in Figure [36-20](#Fig20) shows predictions of
    the model along with the original targets and the lagging training instances.
    The next plots in Figure [36-21](#Fig21) and Figure [36-22](#Fig22) show the original
    series and the RNN generated series in both the scaled and normal values.
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用循环神经网络（RNNs）建模时，将数据集缩放到相同的范围内是很重要的。图[36-20](#Fig20)中的图表显示了模型的预测结果，包括原始目标值和滞后训练实例。图[36-21](#Fig21)和图[36-22](#Fig22)中的后续图表显示了原始序列和RNN生成的序列，在缩放和正常值下。
- en: For increased training speed, the model will train on a GPU. If running the
    code on Google Colab, change the runtime type to GPU and install TensorFlow 2.0
    with GPU package.
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: 为了提高训练速度，模型将在GPU上训练。如果在Google Colab上运行代码，请将运行类型更改为GPU，并安装带有GPU包的TensorFlow 2.0。
- en: '[PRE22]'
  id: totrans-567
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig20_HTML.png](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig20_HTML.png)'
  id: totrans-568
