- en: This CNN model has close to a million trainable variables as can be seen from
    the model summary when running **‘** **model.summary()** **’**. Training on a
    CPU will take an inordinate amount of time (about 1 hour and 30 minutes). For
    this code example, we will train on a GPU instance. If running the code on Google
    Colab, change the runtime type to GPU and install TensorFlow 2.0 with GPU package.
    The graph of the model in Tensorboard is shown in Figure [35-16](#Fig16).
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_35_Chapter/463852_1_En_35_Fig16_HTML.jpg](../images/463852_1_En_35_Chapter/463852_1_En_35_Fig16_HTML.jpg)'
  id: totrans-427
