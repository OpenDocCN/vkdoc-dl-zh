  type: TYPE_IMG
  zh: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig20_HTML.png](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig20_HTML.png)'
- en: Figure 36-20
  id: totrans-569
  prefs: []
  type: TYPE_NORMAL
  zh: 图36-20
- en: Keras LSTM Model Testing
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
  zh: Keras LSTM模型测试
- en: '[PRE23]'
  id: totrans-571
  prefs: []
  type: TYPE_PRE
