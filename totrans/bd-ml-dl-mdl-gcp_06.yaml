  zh: '[PRE12]'
- en: '![../images/463852_1_En_30_Chapter/463852_1_En_30_Fig14_HTML.jpg](../images/463852_1_En_30_Chapter/463852_1_En_30_Fig14_HTML.jpg)'
  id: totrans-186
