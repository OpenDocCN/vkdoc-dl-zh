  type: TYPE_NORMAL
- en: '[PRE21]'
  id: totrans-430
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: In this chapter, we discussed the convolutional neural network (CNN) as an example
    of a deep neural network. We went through the design details in architecting a
    CNN and implemented a CNN model with TensorFlow 2.0\. In the next chapter, we
    will examine another type of deep neural network called the recurrent neural network.
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
- en: 36. Recurrent Neural Networks (RNNs)
  id: totrans-432
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Recurrent neural networks (RNNs) are another specialized scheme of neural network
    architectures. RNNs are developed to solve learning problems where information
    about the past (i.e., past instants/events) is directly linked to making future
    predictions. Such sequential examples play up frequently in many real-world tasks
    such as language modeling where the previous words in the sentence are used to
    determine what the next word will be. Also in stock market prediction, the last
    hour/day/week stock prices define the future stock movement. RNNs are particularly
    tuned for time series or sequential tasks.
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
- en: In a sequential problem, there is a looping or feedback framework that connects
    the output of one sequence to the input of the next sequence. RNNs are ideal for
    processing 1-D sequential data, unlike the grid-like 2-D image data in convolutional
    neural networks.
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
- en: This feedback framework enables the network to incorporate information from
    past sequences or from time-dependent datasets when making a prediction. In this
    section, we will cover the broad conceptual overview of recurrent neural networks
    and in particular the Long Short-Term Memory RNN variant (LSTM) which is the state-of-the-art
    technique for various sequential problems such as image captioning, stock market
    prediction, machine translation, and text classification.
  id: totrans-435
  prefs: []
  type: TYPE_NORMAL
- en: The Recurrent Neuron
  id: totrans-436
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The first building block of the RNN is the recurrent neuron (see Figure [36-1](#Fig1)).
    The neurons of the recurrent network are entirely different from those of other
    neural network architectures. The key difference here is that the recurrent neuron
    maintains a memory or a state from past computations. It does this by taking as
    input the output of the previous instant *y*[*t* − 1] in addition to its current
    input at a particular instant *x*[*t*].
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig1_HTML.jpg](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig1_HTML.jpg)'
  id: totrans-438
  prefs: []
  type: TYPE_IMG
- en: Figure 36-1
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
- en: A recurrent neuron
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
- en: In Figure [36-1](#Fig1), the recurrent neuron stands in contrast with neurons
    of the MLP and CNN architectures because instead of transferring a hierarchy of
    information across the network from one neuron to the other, data is looped back
    into the same neuron at every new time instant. A time instant can also mean a
    new sequence.
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
- en: Hence, the recurrent neuron has two input weights, ![$$ {W}_{x_t} $$](../images/463852_1_En_36_Chapter/463852_1_En_36_Chapter_TeX_IEq1.png)
    and ![$$ {W}_{y_{t-1}} $$](../images/463852_1_En_36_Chapter/463852_1_En_36_Chapter_TeX_IEq2.png),
    for the input at time *x*[*t*] and for the input at time instant *y*[*t* − 1].
    See Figure [36-2](#Fig2).
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig2_HTML.jpg](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig2_HTML.jpg)'
  id: totrans-443
  prefs: []
  type: TYPE_IMG
- en: Figure 36-2
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
- en: Recurrent neuron with input weights
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
- en: Similar to other neurons, the recurrent neuron also injects non-linearity into
    the network by passing its weighted sums or affine transformations through a non-linear
    activation function.
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
- en: Unfolding the Recurrent Computational Graph
  id: totrans-447
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A recurrent neural network is formalized as an unfolded computational graph.
    An unfolded computational graph shows the flow of information through the recurrent
    layer at every time instant in the sequence. Suppose we have a sequence of five
    time steps, we will unfold the recurrent neuron five times across the number of
    instants. The number of sequences constitutes the layers of the recurrent neural
    network architecture. See Figure [36-3](#Fig3).
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig3_HTML.jpg](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig3_HTML.jpg)'
  id: totrans-449
  prefs: []
  type: TYPE_IMG
- en: Figure 36-3
  id: totrans-450
  prefs: []
  type: TYPE_NORMAL
- en: Unfolding the recurrent neuron into a recurrent neural network
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
- en: From the unrolled graph of the recurrent neural network, we can observe how
    the input into the recurrent layer includes the output of the previous time step
    *t* − 1 in addition to the current input at time step *t*. This architecture of
    the recurrent neuron is central to how the recurrent neural network learns from
    past events or past sequences.
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
- en: Up until now, we have seen that the recurrent neuron captures information from
    the past by storing memory or state in its memory cell. The recurrent neuron can
    have a much more complicated memory cell (such as the GRU or LSTM cell) than the
    basic RNN cell as illustrated in the images so far, where the output at time instant
    *t* − 1 holds the memory.
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
- en: Basic Recurrent Neural Network
  id: totrans-454
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Earlier on, we mentioned that when a recurrent network is unfolded, we can see
    how information flows from one recurrent layer to the other. Further, we noted
    that the sequence length of the dataset determines the number of recurrent layers.
    Let’s briefly illustrate this point in Figure [36-4](#Fig4). Suppose we have a
    time series dataset of ten layers, for each row sequence in the dataset, we will
    have ten layers in the recurrent network system.
  id: totrans-455
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig4_HTML.png](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig4_HTML.png)'
  id: totrans-456
  prefs: []
  type: TYPE_IMG
- en: Figure 36-4
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
- en: Dataset to layers
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
- en: At this point, we must firmly draw attention to the fact that the recurrent
    layer does not comprise of just one neuron cell, but it is instead a set of neurons
    or neuron cells as shown in Figure [36-5](#Fig5). The choice of the number of
    neurons in a recurrent layer is a design decision when composing the network architecture.
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig5_HTML.jpg](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig5_HTML.jpg)'
  id: totrans-460
  prefs: []
  type: TYPE_IMG
- en: Figure 36-5
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
- en: Neurons in a recurrent layer
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
- en: Each neuron in a recurrent layer receives as input the output of the previous
    layer and its current input. Hence, the neurons each have two weight vectors.
    Again, just like other neurons, they perform an affine transformation of the inputs
    and pass it through a non-linear activation function (usually the hyperbolic tangent,
    tanh). Still, within the recurrent layer, the output of the neurons is moved to
    a dense or fully connected layer with a softmax activation function for outputting
    the class probabilities. This operation is illustrated in Figure [36-6](#Fig6).
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig6_HTML.jpg](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig6_HTML.jpg)'
  id: totrans-464
  prefs: []
  type: TYPE_IMG
- en: Figure 36-6
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
- en: Computations within a recurrent layer
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
- en: Recurrent Connection Schemes
  id: totrans-467
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There are two main schemes for forming recurrent connections from one recurrent
    layer to another. The first is to have recurrent connections between hidden units,
    and the other is recurrent connections between the hidden unit and the output
    of the previous layer. The different schemes are visually illustrated in Figure
    [36-7](#Fig7).
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig7_HTML.jpg](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig7_HTML.jpg)'
  id: totrans-469
  prefs: []
  type: TYPE_IMG
- en: Figure 36-7
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
- en: Recurrent connection schemes
  id: totrans-471
  prefs: []
  type: TYPE_NORMAL
- en: The hidden-to-hidden recurrent configuration is found to be superior to the
    output-to-hidden form because it better captures the high-dimensional feature
    information about the past. In any case, the output-to-hidden recurrent form is
    less computationally expensive to train and can more easily be parallelized.
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
- en: Sequence Mappings
  id: totrans-473
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Recurrent neural networks can represent sequence problems in a variety of ways.
    The flexibility of RNN mappings is that it operates on inputs and outputs of the
    network as sequences, thus freeing the network from the fixed sized input-output
    constraints found in other neural network architectures such as MLP and CNN.
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are a few examples of variating sequence problems solved using RNNs:'
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
- en: An input to a sequence of output. This configuration is used for image captioning
    problems when an image is passed as an input to the network, and the output is
    a sequence of words. See Figure [36-8](#Fig8).
  id: totrans-476
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig8_HTML.jpg](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig8_HTML.jpg)'
  id: totrans-477
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 36-8
  id: totrans-478
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: An input to a sequence of output
  id: totrans-479
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: A sequence of inputs to an output. For example, in sentiment analysis, we need
    to pass in a sequence of words as input to the network, and the output is a class
    indicating either a positive or negative review or sentiment. See Figure [36-9](#Fig9).
  id: totrans-480
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig9_HTML.jpg](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig9_HTML.jpg)'
  id: totrans-481
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 36-9
  id: totrans-482
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: A sequence of inputs to an output
  id: totrans-483
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Sequence input to sequence output. This mapping operation is suited in application
    areas such as machine translation and speech recognition. It is more popularly
    called the encoder-decoder or sequence-to-sequence architecture. In this case,
    we may have a sequence of words in a particular language as input, and we want
    a sequence of words as output in another language. See Figure [36-10](#Fig10).
  id: totrans-484
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig10_HTML.png](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig10_HTML.png)'
  id: totrans-485
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 36-10
  id: totrans-486
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Sequence input to sequence output
  id: totrans-487
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Synced sequence input to output. This sort of framework is ideal for video classification
    in the event we want to label each video frame. See Figure [36-11](#Fig11).
  id: totrans-488
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig11_HTML.jpg](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig11_HTML.jpg)'
  id: totrans-489
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 36-11
  id: totrans-490
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Synced sequence input to output
  id: totrans-491
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: In the schemes illustrated in this sub-section, information flows from the hidden
    unit (or memory cell) of the recurrent layer at time instant *t* − 1 to the hidden
    unit at time instant *t*. As discussed earlier, this is because the transferred
    information is more feature-rich and contains more information from the past.
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
- en: 'Training the Recurrent Network: Backpropagation Through Time'
  id: totrans-493
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The recurrent neural network is trained in much the same way as other traditional
    neural networks by using the backpropagation algorithm. However, the backpropagation
    algorithm is modified into what is called backpropagation through time (BPTT)
    .
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
- en: Due to the architectural loop or recurrent structure of the recurrent network,
    vanilla backpropagation as is cannot work. Training a network using backpropagation
    involves calculating the error gradient, moving backward from the output layer
    through the hidden layers of the network and adjusting the network weights. However,
    this operation cannot work in the recurrent neuron because we have just one neural
    cell with recurrent connections to itself.
  id: totrans-495
  prefs: []
  type: TYPE_NORMAL
- en: So, in order to train the recurrent network using backpropagation, we unroll
    the recurrent neuron across the time instants and apply backpropagation to the
    unrolled neurons at each time layer the same way it is done for a traditional
    feedforward neural network. This operation is further illustrated in Figure [36-12](#Fig12).
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig12_HTML.png](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig12_HTML.png)'
  id: totrans-497
  prefs: []
  type: TYPE_IMG
- en: Figure 36-12
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
- en: Backpropagation through time
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
- en: A significant challenge of training the recurrent neural network is the vanishing
    and exploding gradient problem. When training a deep recurrent network for many
    layers of time instants, calculating the gradients of the weights of the neurons
    can become very volatile. When this happens, the value of the gradient can become
    extremely large tending to infinity, or they become tiny, all the way to zero.
    When this happens, the neurons become dead and cannot train or learn any new information
    further. This effect is called the exploding and vanishing gradient problem.
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
- en: The exploding and vanishing gradient problem is most prevalent in recurrent
    neural networks because of the long-term dependencies or time instant of the unrolled
    recurrent neuron. A proposed alternative technique for mitigating this problem
    in recurrent networks (in addition to other discussed methods such as gradient
    clipping, batch normalization, and using a non-saturating activation function
    such as ReLu) is to discard early time instances or time instances in the distant
    past. This technique is called Truncated Backpropagation Through Time (truncated
    BPTT).
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
- en: However, truncated BPTT suffers a significant drawback, and this is that some
    problems rely heavily on long-term dependencies to be able to make a prediction.
    A typical example is in language modeling where the long-term sequence of words
    in the past is vital in predicting the next word in the sequence.
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
- en: The shortcoming of truncated BPTT and the need to deal with the problem of exploding
    and vanishing gradients led to the development of a memory cell called the Long
    Short-Term Memory or LSTM for short, which can store the long-term information
    of the problem in the memory cell of the recurrent network .
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
- en: The Long Short-Term Memory (LSTM) Network
  id: totrans-504
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Long Short-Term Memory (LSTM) belongs to a class of RNN called gated recurrent
    unit. They are called *gated* because unlike the basic recurrent units, they contain
    extra components called gates that control the flow of information within the
    recurrent cell. This includes choosing what information to store in the cell and
    what information to discard or forget.
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
- en: LSTM is very efficient for capturing the long-term dependencies across a large
    number of time instants. It does this by having a slightly more sophisticated
    cell than the basic recurrent units. The components of the LSTM are the
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
- en: Memory cell
  id: totrans-507
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Input gate
  id: totrans-508
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Forget gate
  id: totrans-509
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Output gate
  id: totrans-510
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These extra components enable the RNN to remember and store important events
    from the distant past. The LSTM takes as input the previous cell state, *c*[*t* − 1];
    the previous hidden state, *h*[*t* − 1]; and the current input, *x*[*t*]. To keep
    in line with the simplicity of this book, we provide a high-level illustration
    of the LSTM cell showing how the extra components of the cell come together .
    In TensorFlow 2.0, LSTM layer is implemented in the method **‘tf.keras.layers.LSTM()’**
    .
  id: totrans-511
  prefs: []
  type: TYPE_NORMAL
- en: 'The illustration in Figure [36-13](#Fig13) is the LSTM memory cell. The components
    of the LSTM cell serve distinct functions in preserving long-term dependencies
    in sequence data. Let’s go through them:'
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig13_HTML.png](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig13_HTML.png)'
  id: totrans-513
  prefs: []
  type: TYPE_IMG
- en: Figure 36-13
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
- en: LSTM cell
  id: totrans-515
  prefs: []
  type: TYPE_NORMAL
- en: 'The input gate: This gate is responsible for controlling what information gets
    stored in the long-term state or the memory cell, *c*. Working in tandem with
    the input gate is another gate that regulates the information flowing into the
    input gate. This gate analyzes the current input to the LSTM cell, *x*[*t*], and
    the previous short-term state, *h*[*t* − 1].'
  id: totrans-516
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The forget gate: The role of this gate is to regulate how much of the information
    in the long-term state is persisted across time instants.'
  id: totrans-517
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The output gate: This gate controls how much information to output from the
    cell at a particular time instant. This gate controls the value of *h*[*t*] (the
    short-term state) and *y*[*t*] (the output at time *t*).'
  id: totrans-518
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It is important to note that the components of the LSTM cells are all fully
    connected neural networks. There exist other variants of recurrent networks with
    memory cells, two of such are the peephole connections and the gated recurrent
    units.
  id: totrans-519
  prefs: []
  type: TYPE_NORMAL
- en: Peephole Connection
  id: totrans-520
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The peephole connection extends the LSTM network by also using information from
    the memory cell or long-term state of the previous time instant *c*[*t* − 1] as
    input to the LSTM gates. The goal of the peephole is to provide extra information
    into the LSTM unit by peeping at the stored long-term memory. This is further
    illustrated in Figure [36-14](#Fig14). In TensorFlow 2.0, the implementation of
    peephole connections to an LSTM layer is provided by the method **‘tf.keras.experimental.PeepholeLSTMCell()’**
    .
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig14_HTML.png](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig14_HTML.png)'
  id: totrans-522
  prefs: []
  type: TYPE_IMG
- en: Figure 36-14
  id: totrans-523
  prefs: []
  type: TYPE_NORMAL
- en: Peephole connection
  id: totrans-524
  prefs: []
  type: TYPE_NORMAL
- en: Gated Recurrent Unit (GRU)
  id: totrans-525
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The gated recurrent unit (GRU) is a more recent recurrent neural network architecture
    than the LSTM, and it is also comparable simpler to implement with respect to
    the number of components within the unit and their operations. Despite its comparative
    simplicity, GRUs are high-performing recurrent architectures and, in most cases,
    even perform better than the LSTM in sequence modeling problems.
  id: totrans-526
  prefs: []
  type: TYPE_NORMAL
- en: GRUs combine the forget and the input gates to decide on what information should
    be committed to the long-term memory or the memory cell and what information should
    be left out. Moreover, the GRU combines the cell (i.e., long-term state) and short-term
    states into a single state vector *h*[*t*]. Also, the GRU removes the output gate
    and returns the state vector *h*[*t*] at each time instant. This is further illustrated
    in Figure [36-15](#Fig15). In TensorFlow 2.0, the GRU layer is implemented in
    the method **‘tf.keras.layers.GRU()’**.
  id: totrans-527
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig15_HTML.png](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig15_HTML.png)'
  id: totrans-528
  prefs: []
  type: TYPE_IMG
- en: Figure 36-15
  id: totrans-529
  prefs: []
  type: TYPE_NORMAL
- en: Gated recurrent unit
  id: totrans-530
  prefs: []
  type: TYPE_NORMAL
- en: Recurrent Neural Networks Applied to Sequence Problems
  id: totrans-531
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Recurrent neural networks have many application areas for using LSTM models
    for sequence tasks. A couple of problems under this domain include sentiment analysis,
    machine translation, image captioning, video captioning, and voice recognition.
    As mentioned earlier, these problems can be modeled as a one-to-many model, a
    many-to-one model, or a many-to-many model. The section will survey a few LSTM
    architectures for tackling/modeling sequence problems:'
  id: totrans-532
  prefs: []
  type: TYPE_NORMAL
- en: Long-term recurrent convolutional neural network, also known as CNN LSTM
  id: totrans-533
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Encoder-Decoder LSTMs
  id: totrans-534
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Bidirectional recurrent neural networks
  id: totrans-535
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Long-Term Recurrent Convolutional Network (LRCN)
  id: totrans-536
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The long-term recurrent convolutional network (LRCN) is a unique neural network
    architecture for generating descriptions of images and videos (which is seen as
    a sequence of images). These problems can be termed as visual time series modeling.
    The LRCN architecture combines the ability of the convolutional neural network
    (CNN) to extract image features together with a recurrent network for learning
    sequences or long-term dependencies. The LRCN passes visual inputs into a CNN
    to retrieve image features as outputs. These outputs are then passed into a recurrent
    LSTM network layer to generate the natural language descriptions. The recurrent
    layer can contain stacked LSTMs.
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
- en: One core advantage of LRCN for modeling sequential vision problems such as image
    captioning and video captioning is that the network is not constrained to fixed
    lengths of inputs and outputs. Hence, it can be used to model sequential data
    with different lengths such as textual data and videos.
  id: totrans-538
  prefs: []
  type: TYPE_NORMAL
- en: 'The following illustrations show how LRCN is applied to a variety of sequence
    problems:'
  id: totrans-539
  prefs: []
  type: TYPE_NORMAL
- en: 'Image captioning: Image captioning can be seen as a one-to-many sequence problem.
    The input is an image and therefore a static input, and the output is a sequence
    of text that describes the objects in the image; this is a sequential output.
    The use of LRCN for image captioning is illustrated in Figure [36-16](#Fig16).'
  id: totrans-540
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig16_HTML.png](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig16_HTML.png)'
  id: totrans-541
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 36-16
  id: totrans-542
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Image captioning (photo by Daniel Llorente on Unsplash)
  id: totrans-543
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Video captioning: Video can be seen as a sequence of images. Hence, in a video
    captioning problem, a sequence of images is passed as input to the LRCN model
    which in turn returns a sequence of outputs as a textual description for each
    video frame. Hence, video captioning can be seen as a many-to-many sequence problem.
    This approach is an example of an Encoder-Decoder LSTM where CNN is used as an
    image encoder that is initially trained for image classification. The final hidden
    layer, which is also called a bottleneck, is then passed as input to the RNN decode.
    It is typical to use an already pre-trained CNN on a large-scale image recognition
    task. A number of such models exist in the public domain. We will survey Encoder-Decoder
    LSTMs in more detail shortly. Video captioning is illustrated in Figure [36-17](#Fig17).'
  id: totrans-544
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig17_HTML.png](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig17_HTML.png)'
  id: totrans-545
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 36-17
  id: totrans-546
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Video captioning
  id: totrans-547
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Encoder-Decoder LSTMs
  id: totrans-548
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Encoder-Decoder LSTM architecture handles a particular class of sequence problems
    that takes as input multiple time steps and also returns a multiple time step
    output. A major challenge of this sort of problems is that both the input and
    output sequences can have varied lengths.
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
- en: The first part of the architecture, that is, the Encoder, is responsible for
    receiving and encoding the input sequence; the second part of the architecture,
    that is, the Decoder, takes in the output from the Encoder and then predicts the
    output sequence.
  id: totrans-550
  prefs: []
  type: TYPE_NORMAL
- en: The sort of architecture is made for natural language processing problems where
    the output is a sequence of words. It is commonly used in machine translation,
    video captioning, and speech recognition. An illustration is already provided
    in Figure [36-10](#Fig10).
  id: totrans-551
  prefs: []
  type: TYPE_NORMAL
- en: Bidirectional Recurrent Neural Networks
  id: totrans-552
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Bidirectional RNN is another particular type of recurrent neural network architecture
    that involves placing the recurrent layers beside each other where one layer works
    to learn the long-term dependencies from the past; this layer is called the forward
    LSTM. For the other layer, the input is reversed and fed into the network, so
    the network learns long-term dependencies from the future. This layer is called
    the backward LSTM. The bidirectional RNN is illustrated in Figure [36-18](#Fig18).
  id: totrans-553
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig18_HTML.png](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig18_HTML.png)'
  id: totrans-554
  prefs: []
  type: TYPE_IMG
- en: Figure 36-18
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
- en: Bidirectional LSTM
  id: totrans-556
  prefs: []
  type: TYPE_NORMAL
- en: When the outputs from these side-by-side networks are combined, it is easier
    to predict the next time step of a sequence having privy to the entire information
    gamut, because they process both information from the past and the future. Although
    this architecture was first designed for speech recognition tasks, it has performed
    impressively across a variety of other sequence prediction tasks. It is built
    to improve on the vanilla unidirectional LSTM which only has knowledge of the
    past.
  id: totrans-557
  prefs: []
  type: TYPE_NORMAL
- en: This network is built on the understanding that some learning problems only
    make sense when a coherent set of information is present. For example, if a human
    interpreter is interpreting from one language to another, he first listens to
    a cohesive set of information in one language before interpreting to another language.
    This is because the context of an entire cohesive sentence gives the right basis
    for a correct interpretation.
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
- en: 'RNN with TensorFlow 2.0: Univariate Timeseries'
  id: totrans-559
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This section makes use of the Nigeria power consumption dataset to implement
    a univariate timeseries model with LSTM recurrent neural networks. The dataset
    for this example is the Nigeria power consumption data from January 1 to March
    11 by Hipel and McLeod (1994), retrieved from DataMarket.
  id: totrans-560
  prefs: []
  type: TYPE_NORMAL
- en: The dataset is preprocessed for timeseries modeling with RNNs by converting
    the data input and outputs into sequences using the method **‘convert_to_ sequences’**.
    This method splits the dataset into rolling sequences consisting of 20 rows (or
    time steps) using a window of **1**}. In Figure [36-19](#Fig19), the example univariate
    dataset is converted into sequences of five time steps, where output sequence
    is one step ahead of the input sequence. Each sequence contains five rows (determined
    by the **time_steps** variable) and in this univariate case, 1 column.
  id: totrans-561
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig19_HTML.png](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig19_HTML.png)'
  id: totrans-562
  prefs: []
  type: TYPE_IMG
- en: Figure 36-19
  id: totrans-563
  prefs: []
  type: TYPE_NORMAL
- en: 'Converting a univariate series into sequences for prediction with RNNs. Left:
    Sample univariate dataset. Center: Input sequence. Right: Output sequence'
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
- en: When modeling using RNNs, it is important to scale the dataset to have values
    within the same range. The plot in Figure [36-20](#Fig20) shows predictions of
    the model along with the original targets and the lagging training instances.
    The next plots in Figure [36-21](#Fig21) and Figure [36-22](#Fig22) show the original
    series and the RNN generated series in both the scaled and normal values.
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
- en: For increased training speed, the model will train on a GPU. If running the
    code on Google Colab, change the runtime type to GPU and install TensorFlow 2.0
    with GPU package.
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  id: totrans-567
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig20_HTML.png](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig20_HTML.png)'
  id: totrans-568
  prefs: []
  type: TYPE_IMG
- en: Figure 36-20
  id: totrans-569
  prefs: []
  type: TYPE_NORMAL
- en: Keras LSTM Model Testing
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  id: totrans-571
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig21_HTML.jpg](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig21_HTML.jpg)'
  id: totrans-572
  prefs: []
  type: TYPE_IMG
- en: Figure 36-21
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
- en: Original series vs. RNN generated series – scaled data values
  id: totrans-574
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig22_HTML.jpg](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig22_HTML.jpg)'
  id: totrans-575
  prefs: []
  type: TYPE_IMG
- en: Figure 36-22
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
- en: Original series vs. RNN generated series – normal data values
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  id: totrans-578
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: From the Keras LSTM code listing, the method **tf.keras.layers.LSTM()** is used
    to implement the LSTM recurrent layer. The attribute **return_sequences** is set
    to **True** to return the last output in the output sequence, or the full sequence.
  id: totrans-579
  prefs: []
  type: TYPE_NORMAL
- en: 'RNN with TensorFlow 2.0: Multivariate Timeseries'
  id: totrans-580
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The dataset for this example is the Dow Jones Index Data Set from the famous
    UCI Machine Learning Repository. In this stock dataset, each row contains the
    stock price record for a week including the percentage of return that stock has
    in the following week **percent_change_next_weeks_price()**. For this example,
    the record for the previous week is used to predict the percent change in price
    for the next 2 weeks for Bank of America, BAC stock prices.
  id: totrans-581
  prefs: []
  type: TYPE_NORMAL
- en: The method named **clean_dataset()** carries out some rudimentary cleanup of
    the dataset to make it suitable for modeling. The actions taken on this particular
    dataset involve removing the dollar sign from certain of the data columns, removing
    missing values, and rearranging the data columns so target attribute **percent_change_next_weeks_price**
    is the last column.
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
- en: The method named **data_transform()** subselects the stock records belonging
    to ‘Bank of America,’ and the target attribute is adjusted so that the previous
    week record is used to predict the percent change in price for the next 2 weeks.
    Also, the dataset is split into training and testing sets. The method named **normalize_and_scale()**
    removes the non-numeric columns and scales the dataset attributes.
  id: totrans-583
  prefs: []
  type: TYPE_NORMAL
- en: Again, the model will train on a GPU instance. The model will be a stacked GRU
    with multiple GRU layers. This stacking of RNN layers with memory cells makes
    the network more expressive and can learn more complex long-running sequences.
    If running the code on Google Colab, change the runtime type to GPU and install
    TensorFlow 2.0 with GPU package. The output plot in Figure [36-23](#Fig23) is
    the model predictions showing the targets and the lag training instances.
  id: totrans-584
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_36_Chapter/463852_1_En_36_Fig23_HTML.jpg](../images/463852_1_En_36_Chapter/463852_1_En_36_Fig23_HTML.jpg)'
  id: totrans-585
  prefs: []
  type: TYPE_IMG
- en: Figure 36-23
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
- en: GRU RNN Model Testing for Bank of America stock
  id: totrans-587
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE25]'
  id: totrans-588
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: This chapter gave an overview of recurrent neural networks (RNNs) and its application
    in learning recurrent models for different types of sequence problems. The next
    chapter will discuss how we can use neural networks to reconstruct the inputs
    as some form of unsupervised learning using autoencoders.
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
- en: 37. Autoencoders
  id: totrans-590
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Autoencoder is an unsupervised learning algorithm that uses neural networks
    to reconstruct the features of a dataset. Just like the unsupervised algorithms
    that we earlier discussed in the chapter on machine learning, autoencoders can
    be used to reduce the dimensionality of a dataset and to extract relevant features.
    Moreso, peculiar to autoencoders is the ability to generate more examples of the
    dataset after learning an internal representation (also called coding) that reconstructs
    the features of the inputs to the neural network.
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
- en: An autoencoder receives as input the features of the dataset. These features
    are passed through a set of encoders, which are the hidden layers of a neural
    network to create an internal representation called codings. The learned coding
    is then used to reconstruct the output through a set of decoders, which are also
    hidden neural network layers. The autoencoder cannot merely do a trivial memorization
    of the inputs, because a constraint is placed on the encoders by reducing the
    input dimension to force the network to learn an efficient set of representation
    from which the decoders use to reconstruct the inputs.
  id: totrans-592
  prefs: []
  type: TYPE_NORMAL
- en: Autoencoders with restricted Encoders and Decoders are called **undercomplete**
    . A reconstruction error term is used to evaluate the performance of an autoencoder
    by testing how well the output corresponds with the input. Of course, just like
    other neural networks, the neurons of the Encoders and Decoders have non-linear
    activation functions for learning complex patterns. An example of a simple autoencoder
    network architecture is shown in Figure [37-1](#Fig1).
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_37_Chapter/463852_1_En_37_Fig1_HTML.jpg](../images/463852_1_En_37_Chapter/463852_1_En_37_Fig1_HTML.jpg)'
  id: totrans-594
  prefs: []
  type: TYPE_IMG
- en: Figure 37-1
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
- en: A simple autoencoder architecture
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
- en: Stacked Autoencoders
  id: totrans-597
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Stacked autoencoder is when the simple autoencoder architecture as shown in
    Figure [37-1](#Fig1) is enhanced with multiple hidden layers. Just like other
    deep neural network architectures with hidden layers, the hidden layers of an
    autoencoder enable the network to learn more complex patterns of the input dataset.
  id: totrans-598
  prefs: []
  type: TYPE_NORMAL
- en: The hidden layers of a stacked or deep autoencoder are added symmetrically at
    both the Encoder and Decoder part of the network as shown in Figure [22-2](463852_1_En_22_Chapter.xhtml#Fig2).
    The neurons of the hidden layers are restricted to be less than that of the input
    layer. This formulation places a restriction on the network, so it doesn’t merely
    memorize the input. Moreso, care must be taken not to create too many deep layers,
    so the autoencoder does not overfit the input data and fail to generalize to out-of-sample
    examples. To optimize the training of a deep autoencoder, the weights of the symmetrical
    neural layers are shared in a technique called *tying* .
  id: totrans-599
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_37_Chapter/463852_1_En_37_Fig2_HTML.jpg](../images/463852_1_En_37_Chapter/463852_1_En_37_Fig2_HTML.jpg)'
  id: totrans-600
  prefs: []
  type: TYPE_IMG
- en: Figure 37-2
  id: totrans-601
  prefs: []
  type: TYPE_NORMAL
- en: Stacked or deep autoencoder. The hidden layers are added symmetrically at both
    the Encoder and Decoder
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
- en: Stacked Autoencoders with TensorFlow 2.0
  id: totrans-603
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The code example in this section shows how to implement an autoencoder network
    using TensorFlow 2.0\. For simplicity, the MNIST handwriting dataset is used to
    create reconstructions of the original images. In this example, a stacked autoencoder
    is implemented with the original and reconstructed image shown in Figure [37-3](#Fig3).
    The code listing is presented in the following, and corresponding notes on the
    code are shown thereafter.
  id: totrans-604
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE26]'
  id: totrans-605
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: 'From the preceding code listing, take note of the following:'
  id: totrans-606
  prefs: []
  type: TYPE_NORMAL
- en: Observe the arrangement of the encoder layers and the decoder layers of the
    stacked autoencoder. Specifically note how the corresponding layer arrangement
    of the encoder and the decoder has the same number of neurons.
  id: totrans-607
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The loss error measures the squared difference between the inputs into the autoencoder
    network and the decoder output.
  id: totrans-608
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The image in Figure [37-3](#Fig3) contrasts the reconstructed images from the
    autoencoder network with the original images in the dataset.
  id: totrans-609
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_37_Chapter/463852_1_En_37_Fig3_HTML.jpg](../images/463852_1_En_37_Chapter/463852_1_En_37_Fig3_HTML.jpg)'
  id: totrans-610
  prefs: []
  type: TYPE_IMG
- en: Figure 37-3
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
- en: 'Stacked autoencoder reconstruction. Left: Original image. Right: Reconstructed
    image.'
  id: totrans-612
  prefs: []
  type: TYPE_NORMAL
- en: Denoising Autoencoders
  id: totrans-613
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Denoising autoencoders add a different type of constraint to the network by
    imputing some Gaussian noise into the inputs. This noise injection forces the
    autoencoder to learn the uncorrupted form of the input features; by doing so,
    the autoencoder learns the internal representation of the dataset without memorizing
    the inputs.
  id: totrans-614
  prefs: []
  type: TYPE_NORMAL
- en: Another way a denoising autoencoder constrains the input is by deactivating
    some input neurons in a similar fashion to the Dropout technique. Denoising autoencoders
    use an overcomplete network architecture. This means that the dimensions of the
    hidden Encoder and Decoder layers are not restricted; hence, they are overcomplete.
    An illustration of a denoising autoencoder architecture is shown in Figure [37-4](#Fig4).
  id: totrans-615
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_37_Chapter/463852_1_En_37_Fig4_HTML.jpg](../images/463852_1_En_37_Chapter/463852_1_En_37_Fig4_HTML.jpg)'
  id: totrans-616
  prefs: []
  type: TYPE_IMG
- en: Figure 37-4
  id: totrans-617
  prefs: []
  type: TYPE_NORMAL
- en: Denoising autoencoder. Constraint is applied by either adding Gaussian noise
    or by switching off some a random selection of the input neurons.
  id: totrans-618
  prefs: []
  type: TYPE_NORMAL
- en: This chapter discussed how deep neural networks can be employed in an unsupervised
    fashion to reconstruct the inputs to the network as the network’s output. This
    is the final chapter in Part 6 that provides a general theoretical background
    to deep neural networks and how they are implemented in TensorFlow 2.0\. In Part
    7, we will discuss doing advanced analytics and machine learning on Google Cloud
    Platform.
  id: totrans-619
  prefs: []
  type: TYPE_NORMAL
