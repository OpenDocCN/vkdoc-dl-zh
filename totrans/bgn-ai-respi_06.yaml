  zh: 本章讨论了一个机器人演示，你可以通过遵循附录中的说明来构建它。你也可以简单地阅读机器人讨论，从而对概念有所了解。
- en: 'Demo 6-1: Color Selection'
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 演示 6-1：颜色选择
- en: In this demonstration, you teach the computer your preferred color, which is
    either green or yellow. First, the Raspberry Pi must be set up according to the
    Fritzing diagram shown in Figure [6-1](#Fig1).
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个演示中，你教计算机你喜欢的颜色，要么是绿色，要么是黄色。首先，Raspberry Pi 必须根据图 [6-1](#Fig1) 中显示的 Fritzing
    图表进行设置。
- en: '![A436848_1_En_6_Fig1_HTML.jpg](A436848_1_En_6_Fig1_HTML.jpg)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_6_Fig1_HTML.jpg](A436848_1_En_6_Fig1_HTML.jpg)'
- en: Figure 6-1.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-1.
- en: Fritzing diagram Caution
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: Fritzing 图表注意事项
- en: Ensure that you connect one side of the push button switch to 3.3 V and not
    5 V because you will destroy the GPIO pin if you inadvertently connect it to the
    higher voltage.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 确保将按钮开关的一侧连接到 3.3 V，而不是 5 V，因为如果你不小心将其连接到更高的电压，你会损坏 GPIO 引脚。
- en: Next, I explain how the color selection algorithm works.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我将解释颜色选择算法是如何工作的。
- en: Algorithm
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 算法
- en: Consider the horizontal bar shown in Figure [6-2](#Fig2). It has a total numerical
    scale of 0 to 255\. The left half of the bar has a scale of 0 to 127, which represents
    the green LED activation. The right half has a scale of 128 to 255, which represents
    the yellow LED activation.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑图 [6-2](#Fig2) 中所示的横向条形。它有一个从 0 到 255 的总数值刻度。条形左侧的刻度是 0 到 127，代表绿色 LED 的激活。条形右侧的刻度是
    128 到 255，代表黄色 LED 的激活。
- en: '![A436848_1_En_6_Fig2_HTML.jpg](A436848_1_En_6_Fig2_HTML.jpg)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_6_Fig2_HTML.jpg](A436848_1_En_6_Fig2_HTML.jpg)'
- en: Figure 6-2.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-2.
- en: LED activation bar
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: LED 激活条
- en: 'Let’s create an integer random-number generator that produces a number between
    0 and 255, inclusively. This is easily done with the following function, which
    I have used in previous Python programs:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们创建一个整数随机数生成器，它可以生成介于 0 到 255 之间的数字（包括 0 和 255）。这可以通过以下函数轻松实现，我在之前的 Python
    程序中使用过这个函数：
- en: '[PRE0]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '`randint()` is the random integer generator method from the Python `random`
    library. The variable decision is a value between 0 and 255\. If it is between
    0 and 127, the green LED is lit; otherwise, the value is between 128 and 255,
    in which case the yellow LED is lit. Now, if the decision point remains unchanged,
    there is a 50/50 chance (or probability, over the long run) that the green LED
    lights up in each program repetition; there is an equal chance that the yellow
    LED will light. But that is not the goal of this program. The goal is to “teach”
    the program to select your favorite color. This goal can eventually be reached
    by moving the decision point so that it favors the favorite color selection. Let’s
    decide that green is the favorite color. Therefore, the decision point changes
    each time the green LED lights up because the user pressed the push button. This
    button press creates an interrupt with a callback function that increments the
    decision point value. Eventually, the decision point will be increased to such
    a value that just about every random number generated will fall within the green
    LED portion of the bar, as shown in Figure [6-3](#Fig3).'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '`randint()` 是来自 Python `random` 库的随机整数生成方法。变量 decision 的值在 0 到 255 之间。如果它在
    0 到 127 之间，则绿色LED灯亮；否则，值在 128 到 255 之间，在这种情况下，黄色LED灯亮。现在，如果决策点保持不变，那么在每次程序重复中绿色LED灯亮起的概率（或长期来看的概率）是
    50/50；黄色LED灯亮起的概率同样。但这不是本程序的目标。目标是要“教”程序选择你的最喜欢的颜色。通过移动决策点以偏袒最喜欢的颜色选择，最终可以达到这个目标。让我们决定绿色是最喜欢的颜色。因此，每次绿色LED灯亮起时，决策点都会改变，因为用户按下了按钮。这个按钮按下创建了一个中断，并调用一个回调函数来增加决策点值。最终，决策点将增加到这样一个值，几乎每个生成的随机数都将落在条形图的绿色LED部分，如图
    [6-3](#Fig3) 所示。'
- en: '![A436848_1_En_6_Fig3_HTML.jpg](A436848_1_En_6_Fig3_HTML.jpg)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_6_Fig3_HTML.jpg](A436848_1_En_6_Fig3_HTML.jpg)'
- en: Figure 6-3.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-3。
- en: Adjusted number bar
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 调整数字条
- en: 'The following program, named color_selection.py, implements the algorithm:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 以下名为 color_selection.py 的程序实现了该算法：
- en: '[PRE1]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Note
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Press CTRL+C to exit the program.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 按下 CTRL+C 退出程序。
- en: When the program began, it was easy to see that the LEDs were on and off about
    equal amounts of time. However, as I continually pressed the push button, it rapidly
    became apparent that the green LED stayed lit for a longer time, until the dp
    value equaled 255 and the yellow LED never lit. The program thus “learned” that
    my favorite color was green.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 当程序开始时，很容易看出LED灯亮和灭的时间几乎相等。然而，随着我不断按下按钮，很快就变得明显，绿色LED灯亮的时间更长，直到dp值等于255，黄色LED灯从未亮起。因此，程序“学习”到我最喜欢的颜色是绿色。
- en: But did the computer actually learn anything? This is more of a philosophical
    question than a technical one. It is the type of question that has continually
    bothered AI researchers and enthusiasts. I could easily restart the program, and
    the computer would reset the decision point and “forgot” the previous program
    execution. Likewise, I could change the program such that the dp value is stored
    externally in a separate data file that would load each time the program is run,
    thus remembering the favorite color selection. I will sidetrack the question of
    what computer learning actually means and focus on AI practicalities, as was the
    path taken by Dr. McCarthy, who I mentioned in Chapter [1](A436848_1_En_1_Chapter.html).
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 但计算机实际上是否真的学到了什么？这与其说是一个技术问题，不如说是一个哲学问题。这是那种一直困扰着人工智能研究人员和爱好者的问题。我可以轻松地重新启动程序，计算机将重置决策点并“忘记”之前的程序执行。同样，我可以更改程序，使dp值存储在外部单独的数据文件中，每次程序运行时都会加载，从而记住最喜欢的颜色选择。我将绕过关于计算机学习实际上意味着什么的问题，并专注于人工智能的实际问题，正如我在第
    [1](A436848_1_En_1_Chapter.html) 章中提到的麦卡锡博士所采取的路径。
- en: The next section extends the concepts discussed in this simple demonstration.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个部分扩展了在本简单演示中讨论的概念。
- en: Roulette Wheel Algorithm
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 轮盘赌算法
- en: Figure [6-4](#Fig4) shows a very simplified roulette wheel with four equal sectors
    (A through D), which represent events in a problem domain that compose the complete
    circle.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [6-4](#Fig4) 展示了一个非常简化的轮盘赌盘，有四个相等的区域（A到D），它们代表问题域中的事件，这些事件构成了完整的圆圈。
- en: '![A436848_1_En_6_Fig4_HTML.jpg](A436848_1_En_6_Fig4_HTML.jpg)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_6_Fig4_HTML.jpg](A436848_1_En_6_Fig4_HTML.jpg)'
- en: Figure 6-4.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-4。
- en: Simple roulette wheel
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 简单轮盘赌
- en: 'There is an average 0.25 probability that any segment will be selected on a
    given spin of the wheel. An equation to compute this event probability is directly
    related to the area of each segment. It can be expressed as follows:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在轮盘赌的每次旋转中，任何一段被选中的平均概率为0.25。计算这一事件概率的方程与每个段的面积直接相关。它可以表示如下：
- en: '![$$ {p}_A = \frac{ A re{a}_A}{ A re{a}_A+ Are{a}_B+ Are{a}_C+ Are{a}_D} $$](A436848_1_En_6_Chapter_Equa.gif)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {p}_A = \frac{ A re{a}_A}{ A re{a}_A+ Are{a}_B+ Are{a}_C+ Are{a}_D} $$](A436848_1_En_6_Chapter_Equa.gif)'
- en: A particular issue with using an equation such as this is that even though only
    p [A] may be needed, the representative areas B, C, and D must also be calculated
    to derive a valid probability for event A. From a computational point of view,
    it is very advantageous to focus on p [A] and not be concerned with the other
    event probabilities. All you really need to know is that a p [A] exists for the
    particular event A, and that it can be modified to accommodate a dynamic situation.
    In AI terminology, A, B, C, and D are known as fitness. In addition, the initial
    assumption is that all fitness ranges are equal, given that there is no apparent
    evidence to change this obvious choice.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 使用此类方程的一个特定问题是，尽管可能只需要p [A]，但代表区域B、C和D也必须计算出来，以推导出事件A的有效概率。从计算的角度来看，专注于p [A]而不关心其他事件概率是非常有利的。你真正需要知道的是，对于特定事件A存在一个p
    [A]，并且它可以修改以适应动态情况。在人工智能术语中，A、B、C和D被称为适应度。此外，初始假设是所有适应度范围都相等，因为没有明显的证据改变这种明显的选择。
- en: It is somewhat easier to discuss fitness using a horizontal bar, as with the
    first example in this chapter. Figure [6-5](#Fig5) shows the fitness variables
    set in a horizontal bar, with 25 arbitrary values assigned to each one. Also shown
    on the bar are the results of three random draws, whose percentage values can
    range from 0 to 100\. My selection of the individual fitness ranges makes it a
    one-to-one conversion with the draw percentages.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 使用水平条形图讨论适应度相对容易，就像本章的第一个例子一样。图[6-5](#Fig5)显示了在水平条形图中设置的适应度变量，每个变量分配了25个任意值。条形图上还显示了三个随机抽签的结果，其百分比值可以从0到100。我选择的个人适应度范围使其与抽签百分比一一对应。
- en: '![A436848_1_En_6_Fig5_HTML.jpg](A436848_1_En_6_Fig5_HTML.jpg)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_6_Fig5_HTML.jpg](A436848_1_En_6_Fig5_HTML.jpg)'
- en: Figure 6-5.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-5。
- en: Four fitness variables with three random draws
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 四个适应度变量和三个随机抽签
- en: The matching fitness for each draw is shown in Table [6-2](#Tab2).
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 每次抽签的匹配适应度在表[6-2](#Tab2)中显示。
- en: Table 6-2.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 表6-2。
- en: Initial Fitness Selection
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 初始适应度选择
- en: '| Draw Number | Draw Percentage | Numerical Value | Fitness Selected |'
  id: totrans-59
  prefs: []
  type: TYPE_TB
  zh: '| 抽签编号 | 抽签百分比 | 数值 | 选择的适应度 |'
- en: '| --- | --- | --- | --- |'
  id: totrans-60
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- |'
- en: '| 1 | 9 | 9 | A |'
  id: totrans-61
  prefs: []
  type: TYPE_TB
  zh: '| 1 | 9 | 9 | A |'
- en: '| 2 | 60 | 60 | C |'
  id: totrans-62
  prefs: []
  type: TYPE_TB
  zh: '| 2 | 60 | 60 | C |'
- en: '| 3 | 93 | 93 | D |'
  id: totrans-63
  prefs: []
  type: TYPE_TB
  zh: '| 3 | 93 | 93 | D |'
- en: However, let’s say that the initial assumption was wrong and that the four fitness
    ranges were not equal, but are as shown in Figure [6-6](#Fig6). The same draw
    percentages from Figure [6-5](#Fig5) are also shown.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，假设最初的假设是错误的，并且四个适应度范围并不相等，而是如图[6-6](#Fig6)所示。图[6-5](#Fig5)中显示的相同抽签百分比也显示出来。
- en: '![A436848_1_En_6_Fig6_HTML.jpg](A436848_1_En_6_Fig6_HTML.jpg)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_6_Fig6_HTML.jpg](A436848_1_En_6_Fig6_HTML.jpg)'
- en: Figure 6-6.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-6。
- en: True fitness ranges
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 真实适应度范围
- en: This new information changes the fitness choices, as displayed in Table [6-3](#Tab3).
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 这条新信息改变了适应度选择，如表[6-3](#Tab3)所示。
- en: Table 6-3.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 表6-3。
- en: Modified Fitness Selection
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 修改后的适应度选择
- en: '| Draw Number | Draw Percentage | Numerical Value | Fitness Selected |'
  id: totrans-71
  prefs: []
  type: TYPE_TB
  zh: '| 抽签编号 | 抽签百分比 | 数值 | 选择的适应度 |'
- en: '| --- | --- | --- | --- |'
  id: totrans-72
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- |'
- en: '| 1 | 9 | 6.3 | A |'
  id: totrans-73
  prefs: []
  type: TYPE_TB
  zh: '| 1 | 9 | 6.3 | A |'
- en: '| 2 | 60 | 42 | D |'
  id: totrans-74
  prefs: []
  type: TYPE_TB
  zh: '| 2 | 60 | 42 | D |'
- en: '| 3 | 93 | 65.1 | D |'
  id: totrans-75
  prefs: []
  type: TYPE_TB
  zh: '| 3 | 93 | 65.1 | D |'
- en: 'The now reduced A and B fitness ranges leads to the draw #2 fitness choice,
    which changes from C to D. This scenario is precisely the same activity that happened
    in the color selection example, where every button press changed the decision
    point, which in-turn changed the fitness ranges for the two color selections.'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 现在减少的A和B适应度范围导致抽签#2的适应度选择，从C变为D。这种情况与颜色选择示例中发生的确切相同活动完全一样，其中每次按钮按下都会改变决策点，进而改变两种颜色选择的适应度范围。
- en: Modifying the fitness range and the consequent selection of a strategy are the
    fundamental bases for the roulette wheel algorithm. As you will shortly learn,
    this algorithm is very useful in implementing a learning behavior for an autonomous
    vehicle, such as a small mobile robot. The roulette algorithm is used in medicine
    in the study of chromosome survival statistics, for example.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 修改适应度范围和随之而来的策略选择是轮盘赌算法的基本基础。正如你很快就会学到的那样，这个算法在实现自主车辆（如小型移动机器人）的学习行为时非常有用。例如，轮盘赌算法在医学研究中用于染色体生存统计的研究。
- en: 'Demo 6-2: Autonomous Robot'
  id: totrans-78
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 演示6-2：自主机器人
- en: Meet Alfie, a name I picked for my small mobile and autonomous robot. Alfie
    is pictured in Figure [6-7](#Fig7).
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 来认识一下阿尔菲，这是我为我的小型移动和自主机器人挑选的名字。阿尔菲在图[6-7](#Fig7)中有展示。
- en: '![A436848_1_En_6_Fig7_HTML.jpg](A436848_1_En_6_Fig7_HTML.jpg)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_6_Fig7_HTML.jpg](A436848_1_En_6_Fig7_HTML.jpg)'
- en: Figure 6-7.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-7。
- en: Alfie
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 阿尔菲
- en: I mentioned that the build instructions for Alfie are in the appendix. Feel
    free to read the following section without concern about all the tedious technical
    details involved in building the robot. However, you are certainly able to replicate
    this demonstration after you build and program Alfie.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 我提到阿尔菲的构建说明在附录中。请随意阅读以下部分，无需担心构建机器人所涉及的繁琐技术细节。然而，在你构建和编程阿尔菲之后，你当然能够复制这个演示。
- en: The robot’s main task is to avoid all obstacles in its path. The path the robot
    takes is randomly generated in 2-second increments. Sometimes the path is straight
    ahead, whereas other times it is a circling motion to the left or right. Technically,
    the robot is not really avoiding obstacles because that would imply a predetermined
    path. It is avoiding all containment surfaces, actually, which are any nearby
    walls and doors.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 机器人主要任务是避开其路径上的所有障碍物。机器人的路径以2秒的增量随机生成。有时路径是直行，而有时是向左或向右的环绕运动。技术上，机器人并不是真正避开障碍物，因为这会意味着一个预定的路径。实际上，它是在避开所有包含表面，实际上是指任何附近的墙壁和门。
- en: 'The robot has an ultrasonic sensor that is beaming or “looking” forward. The
    objective is that if the ultrasonic sensor detects an obstacle, the robot must
    take immediate action to avoid it. The following are the only actions that the
    robot can take:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 机器人有一个超声波传感器，正在向前发射或“观察”。目标是如果超声波传感器检测到障碍物，机器人必须立即采取行动避免它。以下机器人可以采取的唯一行动是：
- en: drive forward
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 向前行驶
- en: turn left
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 向左转
- en: turn right
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 向右转
- en: There is no option for simply stopping. The robot must continue to move, even
    though it may not be the best option in a particular situation.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 没有简单地停止的选项。机器人必须继续移动，即使这可能不是特定情况下的最佳选择。
- en: Autonomous Algorithm
  id: totrans-90
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 自主算法
- en: 'Let’s start implementing the roulette wheel algorithm by arbitrarily assigning
    a fitness value of 20 to each of the actions. This initial value can be changed
    if it is found to be ineffective in the algorithm. Next, a random choice or draw
    is made. This draw is done every 2 seconds to prevent the robot from settling
    into a static behavior and not “learning” anything. I use the same 256 numerical
    range that was in the color selection example. The equation for a fitness selection
    is as follows:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始实现轮盘赌算法，通过任意分配每个动作的适应度值为20。如果发现这个初始值在算法中无效，可以更改它。接下来，进行一次随机选择或抽取。这个抽取每2秒进行一次，以防止机器人陷入静态行为，不“学习”任何东西。我使用与颜色选择示例中相同的256个数值范围。适应度选择的方程如下：
- en: '![$$ draw = \left( randomInt*\left( A + B + C\right)\right)/255 $$](A436848_1_En_6_Chapter_Equb.gif)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![$$ draw = \left( randomInt*\left( A + B + C\right)\right)/255 $$](A436848_1_En_6_Chapter_Equb.gif)'
- en: randomInt ranges from 0 to 255.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: randomInt的范围从0到255。
- en: The horizontal bar display for this setup is shown in Figure [6-8](#Fig8).
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 该设置的横向条形显示屏如图[6-8](#Fig8)所示。
- en: '![A436848_1_En_6_Fig8_HTML.jpg](A436848_1_En_6_Fig8_HTML.jpg)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_6_Fig8_HTML.jpg](A436848_1_En_6_Fig8_HTML.jpg)'
- en: Figure 6-8.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-8。
- en: Robot roulette wheel fitness configuration
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 机器人轮盘赌适应度配置
- en: The fitness regions are continually updated and modified based on the robot’s
    activities and whether it has encountered an obstacle. Typically, if an obstacle
    is encountered, the fitness for the particular activity is decremented by one,
    thus slightly reducing its overall probability of being chosen in a draw. You
    can imagine that, over a long enough time span, all the activity finesses is reduced
    to 0\. At that point, the robot is commanded to stop, essentially giving up in
    its quest to avoid obstacles.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 适应性区域会根据机器人的活动和是否遇到障碍物不断更新和修改。通常，如果遇到障碍物，特定活动的适应性会减少一个单位，从而略微降低其在绘图中被选中的整体概率。你可以想象，在足够长的时间内，所有活动适应性都会降低到0。在此之后，机器人会被命令停止，实际上是在放弃避免障碍物的追求。
- en: 'The following code segment contains the initialization statements for all the
    component modules and the selection logic for the roulette wheel algorithm:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 以下代码段包含了所有组件模块的初始化语句以及轮盘赌算法的选择逻辑：
- en: '[PRE2]'
  id: totrans-100
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: The `robotAction(select)` method commands the robot to do one of the actions,
    or to stop in the extreme case where all the finesses have been reduced to 0\.
    The selected `robotAction` is effective for only 2 seconds, until another draw
    is generated and an action is randomly selected. It could be the same as the one
    that just completed or one of the other two actions. The selection probabilities
    change as obstacles are encountered.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: '`robotAction(select)`方法命令机器人执行一个动作，或者在所有适应性都降低到0的极端情况下停止。选定的`robotAction`在2秒内有效，直到生成另一个绘图并随机选择一个动作。它可能是刚刚完成的那个动作，也可能是其他两个动作之一。随着障碍物的出现，选择概率会发生变化。'
- en: 'The following code implements the `robotAction` method :'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 以下代码实现了`robotAction`方法：
- en: '[PRE3]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: The robot program utilizes a polling routine to indicate when the robot is within
    10 inches or 25.4 cm of an obstacle. This routine causes the robot to momentarily
    stop and then back up for 2 seconds, at which point a new draw is generated. In
    addition, the fitness that was in effect when the obstacle was detected is decremented
    by one unit. This activity is all set in an infinite loop, such that the robot
    continues to roam or reaches a quiescent state where it just rotates in place.
    All the fitness levels could also be reduced to 0, stopping it permanently.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 机器人程序使用轮询程序来指示机器人距离障碍物10英寸或25.4厘米以内。这个程序会导致机器人暂时停止，然后后退2秒钟，此时生成一个新的绘图。此外，当检测到障碍物时，有效的适应性会减少一个单位。所有这些活动都在一个无限循环中设置，这样机器人会继续漫游或达到静止状态，只是原地旋转。所有适应性级别也可以降低到0，使其永久停止。
- en: The operation and wiring of the ultrasonic sensor is covered in the appendix,
    but now it is important to realize that when the ultrasonic sensor’s distance
    output values reach 10 inches or 25.4 cm, the polling routine will jump to the
    backup action and decrement the current active fitness sector.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: '超声波传感器的工作原理和接线在附录中有说明，但现在重要的是要意识到，当超声波传感器的距离输出值达到10英寸或25.4厘米时，轮询程序将跳转到备份动作并减少当前活动适应性区域。 '
- en: 'The following code segment lists the distance calculation routine for the ultrasonic
    sensor:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 以下代码段列出了超声波传感器的距离计算程序：
- en: '[PRE4]'
  id: totrans-107
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'The `backup()`method is only called if the detected distance falls below 10
    inches or 25.4 cm. In this routine, the robot is commanded to move backward from
    whatever position it is in when the ultrasonic sensor polling routine triggers
    the method. The backup method also decrements the active fitness controlling the
    robot when the backup event is initiated. The following is the backup method listing:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: '`backup()`方法仅在检测到的距离低于10英寸或25.4厘米时被调用。在这个程序中，当超声波传感器轮询程序触发该方法时，机器人被命令从其当前位置向后移动。备份方法还会在备份事件启动时减少控制机器人的活动适应性。以下为备份方法列表：'
- en: '[PRE5]'
  id: totrans-109
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: I have now covered all the principal modules that make up the autonomous control
    program. The following listing combines all the modules into a comprehensive program.
    I also incorporated a time routine in the main loop that ensures that each of
    the robot actions selected by the draw is activated for 2 seconds. The ultrasonic
    sensor is also running while the robot actions are being performed. The only exception
    is when an obstacle is detected; this causes the robot to immediately stop what
    it is doing and back up for an unconditional 2 seconds. This program is named
    robotRoulette.py.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 我现在已经涵盖了组成自主控制程序的所有主要模块。以下列表将所有模块组合成一个综合程序。我还将一个时间例程集成到主循环中，确保由绘制选择的每个机器人动作持续激活2秒钟。当机器人执行动作时，超声波传感器也在运行。唯一的例外是当检测到障碍物时；这会导致机器人立即停止正在做的事情，并无条件地后退2秒钟。这个程序被命名为robotRoulette.py。
- en: '[PRE6]'
  id: totrans-111
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Test Run
  id: totrans-112
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 测试运行
- en: 'I placed the robot in an L-shaped hallway in my home, where it was completely
    enclosed by walls and doors. The robot was powered by an external cell phone battery.
    I was able to SSH into the Raspberry Pi through my home Wi-Fi network. I started
    the program by entering the following command:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 我将机器人放在了我家的一个L形走廊里，那里被墙壁和门完全封闭。机器人由外部手机电池供电。我可以通过家庭Wi-Fi网络SSH到树莓派。我通过输入以下命令启动了程序：
- en: '[PRE7]'
  id: totrans-114
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The robot immediately responded by making a turn, moving straight ahead, or
    backing up as it neared a wall or a door. It appeared that the robot essentially
    confined itself to an approximate 3 × 3 ft area, but there were occasional excursions.
    This behavior lasted for about 6 minutes when it began to move only in a back-and-forth
    motion, which probably meant the turning fitness sectors were reduced to 0, or
    near 0\. After 7 minutes, the robot shut down as the program exited when all the
    fitness values finally equaled 0.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 机器人立即做出反应，转弯、直行或后退，以接近墙壁或门。看起来机器人基本上将自己限制在一个大约3 × 3英尺的区域，但偶尔会有一些偏离。这种行为持续了大约6分钟，然后它开始只进行来回运动，这可能意味着转向适应性区域减少到0，或者接近0。7分钟后，当所有适应性值最终等于0时，程序退出，机器人关闭。
- en: This test demonstrated that the robot did change its operational behavior based
    on dynamically changing fitness values. I will leave it up to you to call it learning
    or not.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 这个测试表明，机器人确实根据动态变化的适应性值改变了其操作行为。我是否将其称为学习，留给你自己决定。
- en: What would you need to do if you wanted to add some additional learning to the
    robot car? That is the subject for the next section.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想给机器人汽车添加一些额外的学习功能，你应该在下一节中了解这一点。
- en: Additional Learning
  id: totrans-118
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 额外学习
- en: It is critical to understand the basic requirements for learning if you want
    to add learning behaviors to the robot car. Just consider how the robot car changed
    its behavior in the previous example. First, the actions that the car is allowed
    to take were defined. They are pretty straightforward so there is really no learning
    involved at this point. Next, the fitness sectors were created and a randomized
    method of selecting a particular sector was implemented to actuate a consequent
    action. Again, no learning was involved. Finally, a sensor was incorporated into
    the scheme so that the sensor output could affect the fitness values, and ultimately,
    the robot’s behavior. That is where the learning kicks in. Thus learning, at least
    in this case, requires a sensor and a technique to modify the fitness values based
    on the sensor output. If you reflect on this for a moment, you recognize that
    this is the way humans also learn. It could be by reading a book where the eyes
    are the sensors, or listening to music where the ears are the primary sensors.
    It could even be the fingers of a small child touching a hot radiator.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想在机器人汽车中添加学习行为，理解学习的基本要求是至关重要的。只需考虑一下在先前的例子中，机器人汽车是如何改变其行为的。首先，定义了汽车可以采取的动作。它们相当直接，所以在这个阶段实际上没有涉及学习。接下来，创建了适应性区域，并实施了一种随机选择特定区域的方法来激活后续动作。再次，没有涉及学习。最后，将传感器集成到方案中，以便传感器输出可以影响适应性值，并最终影响机器人的行为。这就是学习开始的地方。因此，至少在这个案例中，学习需要一个传感器和一个基于传感器输出的修改适应性值的技术。如果你稍加思考，你会认识到这也是人类学习的方式。这可能是通过阅读书籍，眼睛是传感器，或者通过听音乐，耳朵是主要的传感器。甚至可能是小孩子触摸一个热散热器时的手指。
- en: It is therefore likely that we will either need a new sensor or somehow modify
    the existing one to implement additional learning. I elected to consider energy
    management to be the new learning behavior. Specifically, favoring those actions
    that minimize energy consumption to enhance the robot car’s learning potential.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们可能需要一个新的传感器或以某种方式修改现有的传感器来实现额外的学习。我选择将能源管理视为新的学习行为。具体来说，优先考虑那些最小化能耗的动作，以增强机器人车的学习潜力。
- en: 'Directly measuring energy consumption is difficult, but measuring energy used
    per unit of time is quite easy. Of course, energy used over a time period is simply
    power, which is easily computed using Ohm’s law:'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 直接测量能耗是困难的，但测量每单位时间的能耗相当容易。当然，一段时间内使用的能量仅仅是功率，可以使用欧姆定律轻松计算：
- en: '![$$ P= I{}^2 R $$](A436848_1_En_6_Chapter_Equc.gif)'
  id: totrans-122
  prefs: []
  type: TYPE_IMG
  zh: '![$$ P= I{}^2 R $$](A436848_1_En_6_Chapter_Equc.gif)'
- en: 'or the equivalent:'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 或者等价于：
- en: '![$$ P=\frac{E^2}{R} $$](A436848_1_En_6_Chapter_Equd.gif)'
  id: totrans-124
  prefs: []
  type: TYPE_IMG
  zh: '![$$ P=\frac{E^2}{R} $$](A436848_1_En_6_Chapter_Equd.gif)'
- en: A small resistor needs to be inserted into the motor power supply so that the
    current through it or the voltage drop across it can be measured. I elected to
    measure the voltage drop because it is compatible with the analog-to-digital converter
    chip that used with the Raspberry Pi to obtain sensor readings. The resistor value
    has to be quite small so as to not drop the motor supply voltage to the point
    that it would interfere with the required motor operation.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 需要在电机电源中插入一个小电阻，以便测量通过它的电流或它上的电压降。我选择测量电压降，因为它与用于通过 Raspberry Pi 获取传感器读数的模拟数字转换器芯片兼容。电阻值必须非常小，以免降低电机电源电压到足以干扰所需电机操作的程度。
- en: To determine the resistor value, I placed a VOM in series with the positive
    motor power supply lead and measured the average current while both motors were
    operating in the forward direction. The average current draw was about 190 ma.
    A series 5Ω resistor has about a 1 V drop with this current, while dissipating
    0.2 W of power. The single volt drop should not have much of an impact on motor
    operation, considering that the maximum full-scale voltage output from the motor
    power supply is 7.5 V. The robot motors are nominally rated at 6 V, but can accept
    somewhat higher voltages without any harm. Higher voltages simply cause the motors
    to rotate faster.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确定电阻值，我将万用表串联在正电机电源引线上，并测量了两个电机以正向运行时的平均电流。平均电流消耗约为 190 毫安。串联 5Ω 电阻在此电流下约有
    1 伏的电压降，同时消耗 0.2 瓦的功率。考虑到电机电源的最大满量程电压输出为 7.5 伏，单个电压降对电机操作的影响应该不大。机器人电机的标称额定电压为
    6 伏，但可以接受略高的电压而不会造成损害。更高的电压只会使电机转速加快。
- en: The voltage drop across the resistor is measured using a MCP3008 multi-channel
    analog-to-digital converter (ADC). The setup and installation of this ADC chip
    is thoroughly covered in the robot build appendix. Two ADC channels are used because
    the differential voltage across the resistor is required to determine the current.
    Figure [6-9](#Fig9) is a schematic of the ADC connection with the current sense
    resistor.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 MCP3008 多通道模拟数字转换器（ADC）测量电阻上的电压降。该 ADC 芯片的设置和安装在机器人构建附录中进行了详细说明。使用两个 ADC
    通道，因为需要测量电阻上的差分电压来确定电流。图 [6-9](#Fig9) 是 ADC 连接到电流检测电阻的示意图。
- en: '![A436848_1_En_6_Fig9_HTML.jpg](A436848_1_En_6_Fig9_HTML.jpg)'
  id: totrans-128
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_6_Fig9_HTML.jpg](A436848_1_En_6_Fig9_HTML.jpg)'
- en: Figure 6-9.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-9。
- en: ADC connection to the current sense resistor
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: ADC 连接到电流检测电阻
- en: 'The following code is a test program that proves that the ADC is connected
    and functioning properly. It is a slight modification of the simpletest.py program
    sourced from the Adafruit Learn website:'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 以下代码是一个测试程序，证明 ADC 已连接且运行正常。它是从 Adafruit Learn 网站获取的 simpletest.py 程序的微小修改：
- en: '[PRE8]'
  id: totrans-132
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Figure [6-10](#Fig10) is a screenshot of the program output after it ran for
    about 30 seconds.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [6-10](#Fig10) 是程序运行约 30 秒后的输出截图。
- en: '![A436848_1_En_6_Fig10_HTML.jpg](A436848_1_En_6_Fig10_HTML.jpg)'
  id: totrans-134
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_6_Fig10_HTML.jpg](A436848_1_En_6_Fig10_HTML.jpg)'
- en: Figure 6-10.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-10。
- en: Test program output
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 测试程序输出
- en: Notice that channel 1 shows a consistent value of 1023 because it was tied to
    the 3.3 V supply. V[ref] is also tied to the 3.3 V supply, causing the maximum
    value to be 1023\. This maximum value is a direct result of there being 10 bits
    in the conversion process. Also of interest is that channel 0 shows varying values,
    ranging from 0 to 66, while not connected to anything or basically floating. Channels
    2 through 7 are also floating, but only display values from 0 to 9\. It is my
    guess that there exists a high-impedance cross-coupling between channels 0 and
    1, which is influencing the channel 0 reading. This coupling should not matter
    when channel 0 is actually connected to the sense resistor.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 注意到通道 1 显示的是一致的值 1023，因为它连接到了 3.3 V 电源。V[ref] 也连接到了 3.3 V 电源，导致最大值为 1023。这个最大值是转换过程中有
    10 位直接导致的结果。还有一点值得注意的是，通道 0 显示的是变化的值，范围从 0 到 66，而未连接到任何东西或基本上是浮动的。通道 2 到 7 也是浮动的，但只显示从
    0 到 9 的值。我的猜测是，通道 0 和 1 之间存在高阻抗交叉耦合，这影响了通道 0 的读数。当通道 0 实际连接到感测电阻时，这种耦合不应该产生影响。
- en: The actual total power computation requires the difference of two ADC readings
    from channels 0 and 1\. Channel 0 is also the input motor supply voltage. I chose
    to use the absolute count difference across the resistor because there is almost
    an exact ratio of 1 count per millivolt thanks to the 1 V resistor drop and 1023
    maximum ADC range. Both inputs use a voltage divider network that reduces the
    input voltage by two-thirds to keep them within the 3.3 V input range for the
    ADC chip. Theses voltage reductions are compensated for in the power calculation,
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 实际的总功率计算需要从通道 0 和 1 的两个 ADC 读数之间的差值。通道 0 也是输入电机电源电压。我选择使用电阻上的绝对计数差，因为得益于 1 V
    电阻降和 1023 的最大 ADC 范围，几乎每个计数对应 1 毫伏的精确比例。两个输入都使用电压分压器网络，将输入电压降低三分之二，以保持它们在 ADC
    芯片的 3.3 V 输入范围内。这些电压降低在功率计算中得到补偿。
- en: 'The total power dissipated includes the resistor power and the motor power.
    This value (expressed in watts) is computed as follows:'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 总功率损耗包括电阻功率和电机功率。这个值（以瓦特为单位）是按照以下方式计算的：
- en: Let ![$$ diff= count0- count1 $$](A436848_1_En_6_Chapter_IEq1.gif)
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 让！[$$ diff= count0- count1 $$](A436848_1_En_6_Chapter_IEq1.gif)
- en: This is also the resistor’s voltage drop.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 这也是电阻的电压降。
- en: The current is therefore![$$ I= diff/5 $$](A436848_1_En_6_Chapter_IEq2.gif)
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，电流是：![$$ I= diff/5 $$](A436848_1_En_6_Chapter_IEq2.gif)
- en: Voltage drop across the motors:![$$ {E}_L=3* count0- diff $$](A436848_1_En_6_Chapter_IEq3.gif)
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 电机上的电压降：![$$ {E}_L=3* count0- diff $$](A436848_1_En_6_Chapter_IEq3.gif)
- en: '![$$ P=\frac{{E_{resistor}}^2}{R_{resistor}}+{E}_{L\;}* I=\frac{dif{ f}^2}{5}+\left(3*
    count0- diff\right)*\frac{dif f}{5}=\frac{dif{ f}^2}{5}+\frac{3* count0* diff}{5}-\frac{dif{
    f}^2}{5}=\frac{3* count0* diff}{5} $$](A436848_1_En_6_Chapter_Eque.gif)'
  id: totrans-144
  prefs: []
  type: TYPE_IMG
  zh: '![$$ P=\frac{{E_{resistor}}^2}{R_{resistor}}+{E}_{L\;}* I=\frac{dif{ f}^2}{5}+\left(3*
    count0- diff\right)*\frac{dif f}{5}=\frac{dif{ f}^2}{5}+\frac{3* count0* diff}{5}-\frac{dif{
    f}^2}{5}=\frac{3* count0* diff}{5} $$](A436848_1_En_6_Chapter_Eque.gif)'
- en: The next step is to consider how to integrate the power measurement and the
    energy consumption minimization approach into the existing robotRoulette program.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是考虑如何将功率测量和能耗最小化方法集成到现有的 robotRoulette 程序中。
- en: 'Demo 6-3: Adaptive Learning with an Energy Consumption Consideration'
  id: totrans-146
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 演示 6-3：考虑能耗的自适应学习
- en: Minimizing energy consumption should be considered as a background activity
    for the robot car, instead of a primary activity such as driving forward or turning.
    The reason for this distinction is that all primary activities use energy, but
    some use less than others. Since all activities are involved with energy consumption,
    it makes no sense to create a separate fitness category for it. Instead, it is
    more logical to reward those activities that use less energy and to penalize activities
    that use more energy. The rewards and penalties take the form of slight adjustments
    to the respective activity fitness values. I arbitrarily decided that 0.5 points
    are added or subtracted to the fitness values depending upon whether the measured
    power level is above or below a preset milliwatt threshold value. This adjustment
    is included in the robotAction module. No other changes were made to the existing
    code except for inserting a new module that computes the power level. The new
    power module and modified robotAction modules are listed next.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 应将最小化能耗视为机器人汽车的背景活动，而不是像向前行驶或转弯这样的主要活动。这种区分的原因是所有主要活动都会消耗能量，但有些消耗的能量少于其他活动。由于所有活动都涉及能量消耗，因此为它创建一个单独的适应性类别是没有意义的。相反，更合理的是奖励那些消耗较少能量的活动，并惩罚那些消耗更多能量的活动。奖励和惩罚以对相应活动适应性值的轻微调整的形式出现。我任意决定，如果测量的功率水平高于或低于预设的毫瓦阈值值，则适应性值增加或减少0.5分。这种调整包含在robotAction模块中。除了插入一个计算功率水平的新模块外，没有对现有代码进行其他更改。下面列出了新的功率模块和修改后的robotAction模块。
- en: '[PRE9]'
  id: totrans-148
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: My expectation was that, on average, the energy consumption in the turning activities
    would be less than in driving forward. The reason is because only one motor is
    powered during a turn but two motors are powered while driving forward. This naturally
    leads to a gradual increase in both the fitB and fitC values, while the fitA value
    is reduced. Of course, the fitness adjustments related to obstacle detection are
    still taking place. My weighting of 0.5 fitness points for energy consumption
    makes that learning factor only 50 percent as effective as the obstacle-learning
    factor. I expected that the robot would eventually reach a quiescent state where
    it only turns in circles.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 我预期，在转弯活动中，平均能耗将低于向前行驶。原因是转弯时只有一个电机供电，而向前行驶时有两个电机供电。这自然导致fitB和fitC值逐渐增加，而fitA值减少。当然，与障碍物检测相关的适应性调整仍在进行。我为能耗分配了0.5个适应性分数，这使得这个学习因子只有障碍物学习因子的50%有效。我预期机器人最终会达到一个静息状态，此时它只会转圈。
- en: I renamed the main program to rre.py (short for robotRoulette_energy) after
    incorporating the modifications and the initializations needed to support the
    modifications . The complete listing follows.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 在对程序进行修改和初始化以支持这些修改后，我将主程序重命名为rre.py（代表robotRoulette_energy）。以下是完整的列表。
- en: '[PRE10]'
  id: totrans-151
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Test Run
  id: totrans-152
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 测试运行
- en: 'I placed the robot in the same hallway as the previous test run. I initiated
    another SSH session and started the program by the entering the following command:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 我将机器人放在与上次测试运行相同的走廊里。我启动了另一个SSH会话，通过输入以下命令来启动程序：
- en: '[PRE11]'
  id: totrans-154
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: The robot immediately responded, as it did previously, by making a turn, moving
    straight ahead, or backing up as it neared a wall or door. The motions were fairly
    well mixed. After approximately 5 minutes, the vast majority of motions were the
    turning actions, with only an occasional straight-ahead action. The backups only
    happened if the robot came too close to a wall while turning. It certainly became
    apparent to me that the robot had “learned” that turning motions were indeed the
    best way to conserve energy.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 机器人立即做出了反应，就像之前一样，通过转弯、直线前进或后退来接近墙壁或门。动作相当混合。大约5分钟后，绝大多数动作都是转弯动作，只有偶尔的直线前进动作。后退动作只有在机器人转弯时离墙壁太近时才会发生。对我来说，机器人显然已经“学会”了转弯动作确实是节省能量的最佳方式。
- en: This project concludes this chapter’s focus on machine learning. The next chapter
    takes machine leaning to a much deeper level.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 本项目结束了本章对机器学习的关注。下一章将机器学习推向一个更深层次。
- en: Summary
  id: totrans-157
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: This chapter is the first of several that explore the highly interesting topic
    of machine learning. The first Raspberry Pi demonstration involved the user pressing
    a push button whenever the favored LED randomly lit. Before long, the computer
    “learned” the favorite color and consistently lit that particular LED. The concept
    of fitness was introduced in this project.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 本章是几章中关于机器学习这一高度有趣主题的第一章。第一个树莓派演示涉及用户在喜欢的LED随机点亮时按下按钮。不久，计算机“学习”了喜欢的颜色，并持续点亮那个特定的LED。在这个项目中引入了适应性（fitness）的概念。
- en: I next discussed the roulette wheel algorithm, which was a prelude to the next
    demonstration of an autonomous robot car that incorporated learning behaviors.
    Alfie, the robot car, performed a few selected actions or behaviors, which eventually
    became either reinforced or diminished, depending on whether the car encountered
    an obstacle while performing the action. Eventually, the car reached a quiescent
    state where it could not perform any actions and it simply shut down.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我讨论了轮盘赌算法，这是下一个演示的自主机器人汽车学习行为的序曲。机器人汽车Alfie执行了一些选定的动作或行为，这些动作最终根据汽车在执行动作时是否遇到障碍物而得到强化或减弱。最终，汽车达到了一个静息状态，无法执行任何动作，它只是简单地关闭了。
- en: The final demonstration illustrated how to add another behavior to the robot
    car. This new behavior focused on energy conservation. The car rapidly learned
    to favor those actions that consumed less energy than the ones that consumed more
    than the preset threshold.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 最后的演示说明了如何给机器人汽车添加另一种行为。这种新的行为专注于节能。汽车迅速学会了优先选择那些消耗能量少于预设阈值的动作。
