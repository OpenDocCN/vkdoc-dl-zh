- en: 6. Machine Learning
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 6. 机器学习
- en: 'This chapter starts an exploration into the broad topic of machine learning
    , which I introduced in Chapter [2](A436848_1_En_2_Chapter.html). Machine learning
    is a hot topic in current industry and academia. Companies such as Google, Amazon,
    and Facebook have invested many millions of dollars in machine learning to improve
    their products and services. I begin with some fairly simple demonstrations on
    the Raspberry Pi to examine how a computer can “learn” in a primitive or naive
    sense. First, I would like to acknowledge that I drew much inspiration and knowledge
    for this chapter from Bert van Dam’s book Artificial Intelligence: 23 Projects
    to Bring Your Microcontroller to Life (Elektor Electronics Publishing, 2009).
    Although van Dam did not use a Raspberry Pi as a microcontroller, the concepts
    and techniques he applied are completely valid and especially appreciated.'
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 本章开始对机器学习这一广泛主题进行探索，我在第 [2](A436848_1_En_2_Chapter.html) 章中介绍了这一主题。机器学习是当前工业和学术界的热门话题。像
    Google、Amazon 和 Facebook 这样的公司已经投资了数百万美元用于机器学习，以改进他们的产品和服务。我从 Bert van Dam 的书中获得了许多灵感和知识，这本书是《人工智能：23
    个项目让你的微控制器生动起来》（Elektor Electronics Publishing，2009年）。尽管 van Dam 没有使用 Raspberry
    Pi 作为微控制器，但他应用的概念和技术是完全有效的，并且特别值得赞赏。
