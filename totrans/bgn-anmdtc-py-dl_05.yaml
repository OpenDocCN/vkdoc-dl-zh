- en: 'Let’s create our dataloaders. This is a three-step process:'
  id: totrans-647
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们创建我们的数据加载器。这是一个三步过程：
- en: Convert our datasets into tensors.
  id: totrans-648
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将我们的数据集转换为张量。
- en: Create a TensorDataset from the tensors.
  id: totrans-649
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从张量创建 TensorDataset。
- en: Create the DataLoader using the TensorDataset.
  id: totrans-650
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用 TensorDataset 创建数据加载器。
- en: Refer to Figure [5-67](#Fig67) to see the code for this.
  id: totrans-651
  prefs: []
  type: TYPE_NORMAL
  zh: 请参考图 [5-67](#Fig67) 以查看此代码。
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig67_HTML.png)'
  id: totrans-652
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig67_HTML.png)'
- en: A code snippet involves converting training, validation, and test data into
    P y torch tensors, specifying the data types as needed. It creates PyTorch datasets
    train underscore set, val underscore set, and test underscore set using the tensorized
    data.
  id: totrans-653
  prefs: []
  type: TYPE_NORMAL
  zh: 一个代码片段涉及将训练、验证和测试数据转换为 PyTorch 张量，根据需要指定数据类型。它使用张量化数据创建了 PyTorch 数据集 train_set、val_set
    和 test_set。
- en: Figure 5-67
  id: totrans-654
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-67
- en: Creating the DataLoader objects to be used in the training and evaluation processes
  id: totrans-655
  prefs: []
  type: TYPE_NORMAL
  zh: 创建用于训练和评估过程的数据加载器对象。
- en: Now that we have our datasets prepared, let’s look at how to build a model in
    PyTorch, which is relatively straightforward. We will construct a class for our
    custom model and define all the layers within. Refer to Figure [5-68](#Fig68).
  id: totrans-656
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经准备好了数据集，让我们看看如何在 PyTorch 中构建模型，这相对简单。我们将为我们的自定义模型构造一个类，并在其中定义所有层。请参考图
    [5-68](#Fig68)。
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig68_HTML.png)'
  id: totrans-657
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig68_HTML.png)'
- en: A code snippet that consists of five fully connected linear layers and each
    layer is followed by a R e L U activation function. It inputs a variable x and
    forwards it using the forward method through each of the layers.
  id: totrans-658
  prefs: []
  type: TYPE_NORMAL
  zh: 一个由五个全连接线性层组成的代码片段，每个层后面都跟着一个 R e L U 激活函数。它输入一个变量 x，并通过前向方法将 x 传递到每一层。
- en: Figure 5-68
  id: totrans-659
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-68
- en: Model building in PyTorch. We can first define the layers as private variables
    (not necessary, but it’s a standard way of doing it) and then, in the `forward()`
    function, determine how the input data is processed through all the layers
  id: totrans-660
  prefs: []
  type: TYPE_NORMAL
  zh: 在 PyTorch 中构建模型。我们首先可以将层定义为私有变量（不是必需的，但这是一个标准的做法），然后在 `forward()` 函数中确定输入数据是如何通过所有层的。
- en: The layers in PyTorch are more straightforward in what parameters they take.
    For the `Linear` layer’s documentation, refer to [`https://pytorch.org/docs/stable/generated/torch.nn.Linear.xhtml`](https://pytorch.org/docs/stable/generated/torch.nn.Linear.xhtml).
  id: totrans-661
  prefs: []
  type: TYPE_NORMAL
  zh: PyTorch 中的层在参数方面更为直接。对于 `Linear` 层的文档，请参考[https://pytorch.org/docs/stable/generated/torch.nn.Linear.xhtml](https://pytorch.org/docs/stable/generated/torch.nn.Linear.xhtml)。
- en: Following this, we must define both what our optimizer is and what our loss
    function is. We will be choosing the Adam optimizer and the Categorical CrossEntropy
    Loss (just called `CrossEntropyLoss` in PyTorch). Refer to Figure [5-69](#Fig69).
  id: totrans-662
  prefs: []
  type: TYPE_NORMAL
  zh: 在此之后，我们必须定义我们的优化器是什么以及我们的损失函数是什么。我们将选择 Adam 优化器和分类交叉熵损失（在 PyTorch 中简称为 `CrossEntropyLoss`）。参见图
    [5-69](#Fig69)。
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig69_HTML.png)'
  id: totrans-663
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig69_HTML.png)'
- en: A code snippet reads as follows. Optim equals Adam left paranthesis m l p dot
    parameters blank parenthesis, l r equals 1 e minus 3 right parenthesis criterion
    equals cross-entropy loss blank parenthesis.
  id: totrans-664
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一个代码片段。Optim 等于 Adam 左括号 m l p 点 parameters 空括号，l r 等于 1 e minus 3 右括号 criterion
    等于交叉熵损失 空括号。
- en: Figure 5-69
  id: totrans-665
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-69
- en: Defining the optimizer and the loss function. The optimizer as the first parameter
    takes in the model’s learnable parameters, which we can get by using `model_name.parameters()`.
    We pass in the learning rate to be 1e-3
  id: totrans-666
  prefs: []
  type: TYPE_NORMAL
  zh: 定义优化器和损失函数。优化器作为第一个参数接受模型的可学习参数，我们可以通过使用 `model_name.parameters()` 获取这些参数。我们传入的学习率是
    1e-3
- en: Now we can define our training loop, which has early stopping incorporated into
    it. The parameter `patience` works just as it does in the Keras `EarlyStopping`
    callback function, and the `tolerance` variable is the equivalent to `min_delta`
    in `EarlyStopping`. We manually save the best path using PyTorch save/load functionality
    so that we can retain the best-performing model’s weights.
  id: totrans-667
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们可以定义我们的训练循环，其中包含了早期停止功能。参数 `patience` 在 Keras `EarlyStopping` 回调函数中的作用与此相同，而
    `tolerance` 变量相当于 `EarlyStopping` 中的 `min_delta`。我们使用 PyTorch 的保存/加载功能手动保存最佳路径，以便我们可以保留表现最佳模型的权重。
- en: 'This is a long training loop, so we will split it up into two figures: Figure
    [5-70](#Fig70) and Figure [5-71](#Fig71). Mind the tabbing—the validation loop
    should be in the same indent level as the actual training `for` loop. For best
    consistency, refer to the GitHub notebook.'
  id: totrans-668
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个很长的训练循环，所以我们将其分成两个图：图 [5-70](#Fig70) 和图 [5-71](#Fig71)。注意缩进——验证循环应该与实际的训练
    `for` 循环处于相同的缩进级别。为了最佳一致性，请参考 GitHub 笔记本。
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig71_HTML.png)'
  id: totrans-669
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig71_HTML.png)'
- en: A code snippet that implements a validation loop with early stopping based on
    the validation loss. If the validation loss does not improve for a specified number
    of epochs, that are defined by patience method, the training is stopped, and the
    best model is loaded.
  id: totrans-670
  prefs: []
  type: TYPE_NORMAL
  zh: 一个代码片段，实现了基于验证损失的早期停止的验证循环。如果验证损失在指定的轮数内没有改善，这些轮数由耐心方法定义，则停止训练，并加载最佳模型。
- en: Figure 5-71
  id: totrans-671
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-71
- en: The second half of the training loop, containing the validation logic as well
    as the early stopper logic. The idea is for the validation loss to either be the
    best or be within an absolute deviation within the threshold from the best validation
    loss. If it is not, we increment the counter until we hit the `patience` limit,
    after which point we early stop
  id: totrans-672
  prefs: []
  type: TYPE_NORMAL
  zh: 训练循环的第二部分，包含验证逻辑以及早期停止器的逻辑。想法是验证损失要么是最佳的，要么在最佳验证损失阈值内的绝对偏差内。如果不是，我们增加计数器，直到达到
    `patience` 限制，然后进行早期停止
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig70_HTML.png)'
  id: totrans-673
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig70_HTML.png)'
- en: A code snippet that runs for 20 epochs. It makes use of gradient descent, forward
    pass, L 2 regularization, early stop counter, backward pass, and accuracy prediction.
  id: totrans-674
  prefs: []
  type: TYPE_NORMAL
  zh: 一个运行 20 轮的代码片段。它使用了梯度下降、前向传递、L 2 正则化、早期停止计数器和反向传递以及准确度预测。
- en: Figure 5-70
  id: totrans-675
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-70
- en: The first half of the training script. This contains all of the hyperparameter
    settings for the early stop algorithm as well as the training loop itself, such
    as the number of epochs
  id: totrans-676
  prefs: []
  type: TYPE_NORMAL
  zh: 训练脚本的第一个部分。这包含了早期停止算法的所有超参数设置以及训练循环本身，例如训练轮数
- en: Figures [5-70](#Fig70) and [5-71](#Fig71) contain the entire training loop.
    Executing the code should start the training process and the training output.
    Once done, you should see output resembling Figure [5-72](#Fig72).
  id: totrans-677
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [5-70](#Fig70) 和 [5-71](#Fig71) 包含了整个训练循环。执行代码应启动训练过程和训练输出。完成后，你应该会看到类似于图
    [5-72](#Fig72) 的输出。
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig72_HTML.png)'
  id: totrans-678
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig72_HTML.png)'
- en: A code that indicates the progress of the training for each epoch. The epochs
    0 to 5 involve consistently decreasing training loss. In epoch 6, the validation
    loss slightly improves. From epoch 7 onwards, the validation loss continues to
    increase, and the validation accuracy decreases.
  id: totrans-679
  prefs: []
  type: TYPE_NORMAL
  zh: 一个代码，表示每个epoch的训练进度。从epoch 0到5，训练损失持续下降。在epoch 6中，验证损失略有提高。从epoch 7开始，验证损失继续增加，验证准确度下降。
- en: Figure 5-72
  id: totrans-680
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-72
- en: The training output of the code in Figure [5-70](#Fig70) and [5-71](#Fig71),
    the training script. We early stopped because the validation loss was no longer
    improving after hitting its lowest point, indicating overfitting. The best weights
    were restored, so we don’t keep the overfitted weights
  id: totrans-681
  prefs: []
  type: TYPE_NORMAL
  zh: 图[5-70](#Fig70)和[5-71](#Fig71)中代码的训练输出，即训练脚本。我们提前停止了训练，因为验证损失在达到最低点后不再提高，这表明过拟合。我们恢复了最佳权重，因此我们不保留过拟合的权重。
- en: Once we have our trained model, we can begin the evaluation loop to get the
    loss and accuracy in a similar manner to the Keras model `evaluate` function.
    Refer to Figure [5-73](#Fig73) to see the code.
  id: totrans-682
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们有了训练好的模型，我们就可以开始评估循环，以类似Keras模型的`evaluate`函数的方式获取损失和准确度。请参考图[5-73](#Fig73)查看代码。
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig73_HTML.png)'
  id: totrans-683
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig73_HTML.png)'
- en: A code snippet provides an evaluation of the trained model on the test set,
    including loss and accuracy metrics for each batch and overall metrics for the
