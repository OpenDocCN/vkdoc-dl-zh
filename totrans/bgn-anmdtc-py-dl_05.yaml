- en: With that, we have now prepared the datasets for further modeling with either
    PyTorch or Keras. Before we proceed, let’s go over the architecture of the neural
    network we will be implementing. Refer to Figure [5-52](#Fig52).
  id: totrans-544
  prefs: []
  type: TYPE_NORMAL
  zh: 有了这些，我们现在已经为使用PyTorch或Keras进行进一步建模准备了数据集。在我们继续之前，让我们回顾一下我们将要实现的神经网络架构。参见图[5-52](#Fig52)。
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig52_HTML.jpg)'
  id: totrans-545
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig52_HTML.jpg)'
- en: A schematic illustrates the architecture of the neural network as follows. From
    the top, input layer, 13 cross 26, hidden layer 1 26 cross 26, hidden layer 2
    26 cross 26, hidden layer 3 26 cross 26, hidden layer 4 26 cross 6, and output
    layer 6 cross 2.
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
  zh: 一张示意图展示了神经网络的结构如下。从上到下，输入层13乘以26，隐藏层1 26乘以26，隐藏层2 26乘以26，隐藏层3 26乘以26，隐藏层4 26乘以6，以及输出层6乘以2。
- en: Figure 5-52
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-52
- en: The neural network architecture we will be implementing. The number of layers
    and the number of units were arbitrarily chosen—feel free to experiment with fewer
    or more layers and/or neuron counts. Each hidden layer, including the input layer,
    has the ReLU activation function. The output layer has the `softmax()` activation
    function
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将要实现的神经网络架构。层数和单元数是任意选择的——请随意尝试更少或更多的层和/或神经元计数。每个隐藏层，包括输入层，都有ReLU激活函数。输出层有`softmax()`激活函数。
- en: In your implementations of the neural network, feel free to experiment with
    different activation functions, the number of hidden layers, and the number of
    neurons for each layer to get a sense of what works and what doesn’t. The architecture
    shown in Figure [5-52](#Fig52) was arbitrarily chosen, so don’t take it as a model
    example of what to do for every task. What architecture works will differ per
    task, along with how deep it really needs to be and how many neurons each layer
    should have.
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: 在您实现神经网络时，请随意尝试不同的激活函数、隐藏层的数量以及每层的神经元数量，以了解哪些有效，哪些无效。图[5-52](#Fig52)中显示的架构是任意选择的，所以不要将其视为每个任务的模型示例。适合每个任务的架构会有所不同，包括它实际上需要有多深以及每层应该有多少神经元。
- en: With that information in mind, let’s begin with TensorFlow and Keras.
  id: totrans-550
  prefs: []
  type: TYPE_NORMAL
  zh: 在考虑到这些信息后，让我们从TensorFlow和Keras开始。
- en: 'Simple Neural Network: Keras'
  id: totrans-551
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 简单神经网络：Keras
- en: Be sure to follow along with the Jupyter notebook for this section, available
    at [`https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%205%20Introduction%20to%20Deep%20Learning/chapter5_mlp_keras.ipynb`](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%205%20Introduction%20to%20Deep%20Learning/chapter5_mlp_keras.ipynb).
    The examples in the notebook were run on TensorFlow 2.7.0.
  id: totrans-552
  prefs: []
  type: TYPE_NORMAL
  zh: 请确保跟随本节中的Jupyter笔记本进行操作，该笔记本可在以下链接找到[`https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%205%20Introduction%20to%20Deep%20Learning/chapter5_mlp_keras.ipynb`](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%205%20Introduction%20to%20Deep%20Learning/chapter5_mlp_keras.ipynb)。笔记本中的示例是在TensorFlow
    2.7.0上运行的。
- en: Before we get started with the modeling, we need to transform the y-sets into
    a one-hot format. This is necessary because Keras expects the output predictions
    to be post-`softmax()` scores. To do this, Keras provides a utility function called
    `to_categorical()` that we can use to transform an array of integers into a one-hot
    output. Refer to Figure [5-53](#Fig53).
  id: totrans-553
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开始建模之前，我们需要将y集转换为one-hot格式。这是必要的，因为Keras期望输出预测是经过`softmax()`后的分数。为此，Keras提供了一个名为`to_categorical()`的实用函数，我们可以使用它将整数数组转换为one-hot输出。参见图[5-53](#Fig53)。
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig53_HTML.png)'
  id: totrans-554
  prefs: []
  type: TYPE_IMG
  zh: '![图5-53](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig53_HTML.png)'
- en: A code snippet that imports from tensor flow dot keras dot utils to categorical.
    It defines y sets as follows. Y train equals to categorical y train. Y test equals
    to categorical y test. Y val equals to categorical y val.
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
  zh: 一段代码片段，从tensor flow dot keras dot utils导入to categorical。它定义y集如下。Y train等于categorical
    y train。Y test等于categorical y test。Y val等于categorical y val。
- en: Figure 5-53
  id: totrans-556
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-53
- en: Using the Keras `to_categorical()` function to transform the y-sets into one-hot
    encoded equivalents
  id: totrans-557
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Keras的`to_categorical()`函数将y集转换为one-hot编码的等效值
- en: After running Figure [5-53](#Fig53), let’s check the shapes again by rerunning
    Figure [5-51](#Fig51). You should see output like that shown in Figure [5-54](#Fig54).
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
  zh: 在运行图[5-53](#Fig53)之后，让我们通过重新运行图[5-51](#Fig51)再次检查形状。你应该会看到图[5-54](#Fig54)中所示的那种输出。
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig54_HTML.png)'
  id: totrans-559
  prefs: []
  type: TYPE_IMG
  zh: '![图5-54](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig54_HTML.png)'
- en: A code snippet that defines shapes for the x and y training, validation, and
    testing sets.
  id: totrans-560
  prefs: []
  type: TYPE_NORMAL
  zh: 一段代码片段，定义了x和y训练、验证和测试集的形状。
- en: Figure 5-54
  id: totrans-561
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-54
- en: Looking at the shapes of the y-sets after applying `to_categorical()`. AThey
    are one-hot encoded over the two possible output classes
  id: totrans-562
  prefs: []
  type: TYPE_NORMAL
  zh: 查看应用`to_categorical()`后的y集的形状。它们是在两个可能的输出类别上进行了one-hot编码
- en: Next, let’s import all of the components of Keras that we will use. Refer to
    Figure [5-55](#Fig55).
  id: totrans-563
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们导入我们将使用的所有Keras组件。参见图[5-55](#Fig55)。
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig55_HTML.png)'
  id: totrans-564
  prefs: []
  type: TYPE_IMG
  zh: '![图5-55](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig55_HTML.png)'
- en: A code that imports as follows. From tensor flow dot keras dot models import
    model. From tensor flow dot keras dot layers import Input, dense. From tensor
    flow dot keras dot regularizers import L 2\. From tensor flow dot keras dot call
    backs import early stopping.
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
  zh: 一段代码，如下所示导入。从tensor flow dot keras dot models导入model。从tensor flow dot keras
    dot layers导入Input, dense。从tensor flow dot keras dot regularizers导入L 2。从tensor
    flow dot keras dot call backs导入early stopping。
- en: Figure 5-55
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-55
- en: The `import` statements required
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: 需要的`import`语句
- en: Now let’s define our neural network structure and explain what each layer type
    means. Refer to Figure [5-56](#Fig56).
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们定义我们的神经网络结构，并解释每个层类型的意义。参见图[5-56](#Fig56)。
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig56_HTML.png)'
  id: totrans-569
  prefs: []
  type: TYPE_IMG
  zh: '![图5-56](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig56_HTML.png)'
- en: A code snippet sets up a feed-forward neural network model that has an input
    layer with 13 features, several hidden layers with R e L U activation and L 2
    regularization, and an output layer with softmax activation for two-class classification.
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
  zh: 一段代码片段设置了一个前馈神经网络模型，该模型具有一个包含13个特征的输入层，几个具有R e L U激活和L 2正则化的隐藏层，以及一个具有softmax激活函数的输出层，用于二分类。
- en: Figure 5-56
  id: totrans-571
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-56
- en: Implementing the neural network structure described in Figure [5-52](#Fig52)
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
  zh: 实现图[5-52](#Fig52)中描述的神经网络结构
- en: 'Let’s now go over what each of the layer types means:'
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们现在来了解一下每种层类型的意义：
- en: '**Input**: The input layer specifies the dimensionality of the x-features.
    That is, what is the dimensionality of each individual x data point? In this case,
    we selected 13 features to pass in, so this would be 13\. However, it’s possible
    to have multidimensional x data points, such as with images that have a length,
    width, and color channel data.'
  id: totrans-574
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**输入**：输入层指定x特征的维度。也就是说，每个单独的x数据点的维度是多少？在这种情况下，我们选择了13个特征传入，所以这将是一个13。然而，也可能有多维的x数据点，例如具有长度、宽度和颜色通道数据的图像。'
- en: You can find out more information about this layer at [`https://www.tensorflow.org/versions/r2.7/api_docs/python/tf/keras/layers/InputLayer`](https://www.tensorflow.org/versions/r2.7/api_docs/python/tf/keras/layers/InputLayer).
  id: totrans-575
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 你可以在[这里](https://www.tensorflow.org/versions/r2.7/api_docs/python/tf/keras/layers/InputLayer)找到更多关于这个层的详细信息。
- en: '**Dense**: This is a neural network layer comprised of many neurons and is
    the basic layer discussed earlier in the chapter. There are many possible arguments
    to this class, but the most important and commonly used parameters are these two:'
  id: totrans-576
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**密集层**：这是一个由许多神经元组成的神经网络层，是本章前面讨论的基本层。这个类有许多可能的参数，但最重要的和最常用的参数是这两个：'
- en: '`units`: The number of neurons in this layer'
  id: totrans-577
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`units`：此层的神经元数量'
- en: '`activation`: The activation function to use'
  id: totrans-578
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`activation`：要使用的激活函数'
- en: Many other possible parameters, such as `kernel_regularizer` in Figure [5-56](#Fig56),
    let you customize the behavior of a `Dense` layer. If you wanted to specify how
    to initialize the weights and biases, you could do so, as well as determine whether
    to use a bias at all. More information on the possible parameters can be found
    at [`https://www.tensorflow.org/versions/r2.7/api_docs/python/tf/keras/layers/Dense`](https://www.tensorflow.org/versions/r2.7/api_docs/python/tf/keras/layers/Dense).
  id: totrans-579
  prefs: []
  type: TYPE_NORMAL
  zh: 许多其他可能的参数，如图[5-56](#Fig56)中的`kernel_regularizer`，让你可以自定义`Dense`层的行为。如果你想指定如何初始化权重和偏置，你也可以这样做，以及确定是否使用偏置。有关可能参数的更多信息，请参阅[这里](https://www.tensorflow.org/versions/r2.7/api_docs/python/tf/keras/layers/Dense)。
- en: The code in Figure [5-56](#Fig56) also specifies the `kernel_initializer` parameter
    to be `he_uniform`. This parameter is used to initialize the weights, and it can
    have a noticeable effect on the resulting stability and performance of the model.
    By default, Keras uses a method known as `'``glorot_uniform``'`, which is more
    suited for stability in networks using sigmoid or tanh functions. (It is named
    after Xavier Glorot. You may see this method referred to as Glorot initialization
    or Xavier initialization.)
  id: totrans-580
  prefs: []
  type: TYPE_NORMAL
  zh: 图[5-56](#Fig56)中的代码还指定了`kernel_initializer`参数为`he_uniform`。这个参数用于初始化权重，并且可以显著影响模型的结果稳定性和性能。默认情况下，Keras使用一种称为`'glorot_uniform'`的方法，这种方法更适合使用sigmoid或tanh函数的网络稳定性。（它是以Xavier
    Glorot的名字命名的。你可能看到这种方法被称为Glorot初始化或Xavier初始化。）
- en: For ReLU networks, an initialization method known as Kaiming Normal or He Normal
    (named after Kaiming He) is more optimal for model stability and proper learning.
    In PyTorch, the default is Kaiming Uniform.
  id: totrans-581
  prefs: []
  type: TYPE_NORMAL
  zh: 对于ReLU网络，一种称为Kaiming Normal或He Normal（以Kaiming He的名字命名）的初始化方法对于模型稳定性和适当学习更为优化。在PyTorch中，默认是Kaiming
    Uniform。
- en: Finally, we create the model by using the `Model()` class and passing in the
    input and output layers. This is what is called the **functional API**, when we
    define each layer separately like we did in Figure [5-56](#Fig56), each calling
    upon the previous layer, and then create a model using the input and output layers.
    There is another method of creating a model called the **sequential API**, where
    we pass in a list of layers to a class named `Sequential()`.
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们通过使用`Model()`类并传入输入层和输出层来创建模型。这就是所谓的**功能API**，当我们像图[5-56](#Fig56)中那样分别定义每个层，每个层都调用前一个层，然后使用输入层和输出层创建一个模型。还有一种创建模型的方法叫做**顺序API**，我们将一系列层传递给名为`Sequential()`的类。
- en: Which method you choose is up to you. You can find more information on the functional
    API at [`https://www.tensorflow.org/guide/keras/functional_api`](https://www.tensorflow.org/guide/keras/functional_api),
    and find more information on the sequential API at [`https://www.tensorflow.org/guide/keras/sequential_model`](https://www.tensorflow.org/guide/keras/sequential_model).
  id: totrans-583
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以选择哪种方法。你可以在[这里](https://www.tensorflow.org/guide/keras/functional_api)找到更多关于功能API的信息，以及[这里](https://www.tensorflow.org/guide/keras/sequential_model)找到更多关于顺序API的信息。
- en: Now that we have defined our model, let’s define our early stopping mechanism
    and compile our model. Refer to Figure [5-57](#Fig57).
  id: totrans-584
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经定义了我们的模型，让我们定义我们的早期停止机制并编译我们的模型。参见图 [5-57](#Fig57)。
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig57_HTML.png)'
  id: totrans-585
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig57_HTML.png)'
- en: A code snippet that configures early stopping, creates a list callbacks containing
    the early stopping object. It also compiles the neural network model using the
    Adam optimizer, categorical cross-entropy loss function, and accuracy as the evaluation
    metric.
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一个配置早期停止、创建包含早期停止对象的回调列表的代码片段。它还使用 Adam 优化器、分类交叉熵损失函数和准确率作为评估指标来编译神经网络模型。
- en: Figure 5-57
  id: totrans-587
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-57
- en: Defining the early stopping callback and adding it to a list of callbacks to
    be used in the training process. Then, we compile the model with the Adam optimizer
    (at default parameter settings) and categorical cross-entropy loss
  id: totrans-588
  prefs: []
  type: TYPE_NORMAL
  zh: 定义早期停止回调并将其添加到训练过程中要使用的回调列表中。然后，我们使用 Adam 优化器（默认参数设置）和分类交叉熵损失来编译模型。
- en: In Keras, callbacks are a set of functions that can be called throughout the
    training process. Figure [5-57](#Fig57) shows the `EarlyStopping()` callback function.
    If the target metric, such as validation loss, does not decrease or remain within
    some threshold within a certain number of epochs, `EarlyStopping` stops the training
    and can optionally restore the best-performing epoch’s weights. This ties back
    to the discussion earlier in the chapter of the loss curve and the optimal stopping
    point during the training process.
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Keras 中，回调是一组可以在训练过程中调用的函数。图 [5-57](#Fig57) 展示了 `EarlyStopping()` 回调函数。如果目标指标，如验证损失，在一定的epoch数内没有下降或保持在某个阈值内，`EarlyStopping`
    将停止训练，并且可以选择恢复表现最佳的epoch的权重。这回到了本章前面关于损失曲线和训练过程中的最佳停止点的讨论。
- en: 'The following list explains the parameters of `EarlyStopping`:'
  id: totrans-590
  prefs: []
  type: TYPE_NORMAL
  zh: 以下列表解释了 `EarlyStopping` 的参数：
- en: '`patience`: The number of epochs with no improvement after which training will
    be stopped. The model will keep training as long as the monitored metric keeps
    improving, even if the improvements are small. If the metric stops improving for
    a number of epochs specified by `patience`, then the training process will stop
    early.'
  id: totrans-591
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`patience`: 在没有改进后停止训练的epoch数。只要监控指标持续改进，即使改进很小，模型也会继续训练。如果指标在 `patience` 指定的epoch数内停止改进，则训练过程将提前停止。'
- en: '`min_delta`: The threshold for considering whether an improvement is significant.
    If the absolute change in the monitored metric between epochs is less than `min_delta`,
    it is not considered an improvement. If the metric fails to improve significantly
    for a `patience` number of epochs, training will stop early.'
  id: totrans-592
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`min_delta`: 考虑改进是否显著的阈值。如果监控指标在epoch之间的绝对变化小于 `min_delta`，则不认为是改进。如果指标在经过
    `patience` 个epoch后未能显著改进，则训练将提前停止。'
- en: '`monitor`: The metric to monitor for early stopping purposes. Setting it to
    `''val_loss''` to monitor validation loss can help stop overfitting, since if
    validation loss stops decreasing over a `patience` number of epochs, we will early
    stop.'
  id: totrans-593
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`monitor`: 用于早期停止的指标。将其设置为 `''val_loss''` 以监控验证损失可以帮助防止过拟合，因为如果在经过 `patience`
    个epoch后验证损失停止下降，我们将提前停止。'
- en: '`restore_best_weights`: If set to `True`, the model’s weights will be reverted
    to the state of the epoch with the best value of the monitored metric. This means
    that even if the model’s performance deteriorated in later epochs due to overfitting,
    you would still retain the best model state.'
  id: totrans-594
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`restore_best_weights`: 如果设置为 `True`，模型的权重将恢复到监控指标最佳值的epoch状态。这意味着即使模型在后续epoch由于过拟合而性能下降，你仍然会保留最佳模型状态。'
- en: Other callback functions in Keras include `ReduceLROnPlateau`, which reduces
    the learning rate if the target metric doesn’t really improve. This can address
    oscillating behavior caused by step sizes that are too large, allowing the optimizer
    to take smaller and more precise steps and lead to an even better convergence.
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
  zh: Keras 中的其他回调函数包括 `ReduceLROnPlateau`，如果目标指标没有真正改进，它会降低学习率。这可以解决由于步长过大而引起的振荡行为，允许优化器采取更小、更精确的步骤，从而实现更好的收敛。
- en: Now that you’re familiar with the early stopping mechanism, you’re ready to
