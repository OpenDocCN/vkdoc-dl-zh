- en: With that, you now know how to implement a neural network from scratch, train
    it, and evaluate it with TensorFlow and Keras. Let’s now do the same but in PyTorch.
  prefs: []
  type: TYPE_NORMAL
- en: 'Simple Neural Network: PyTorch'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Be sure to follow along with the notebook at [`https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%205%20Introduction%20to%20Deep%20Learning/chapter5_mlp_pytorch.ipynb`](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%205%20Introduction%20to%20Deep%20Learning/chapter5_mlp_pytorch.ipynb).
    We are running torch version 1.9.0+cu111.
  prefs: []
  type: TYPE_NORMAL
- en: We do not need to perform any one-hot encoding with PyTorch. However, we will
    be constructing dataloaders using PyTorch’s APIs so that we can easily batch our
    dataset and sample minibatches during training. Refer to Figure [5-66](#Fig66)
