- en: 5. Introduction to Deep Learning
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This chapter introduces you to deep learning and all the fundamental, high-level
    concepts you need to know to implement powerful neural network models. These concepts
    will apply to the rest of the book and beyond. In the process, you will also implement
    a simple neural network model in both TensorFlow/Keras and PyTorch to perform
    supervised anomaly detection and serve as a gateway into learning how to model
    in these frameworks.
