    from 0 to 80000\. The data are as follows. 566 (1, 1), 3 (1, 0), 0 (0, 1), 92895
    (0, 0).
  id: totrans-712
  prefs: []
  type: TYPE_NORMAL
  zh: 混淆矩阵绘制以下数据。右侧的热图范围从 0 到 80000。数据如下：566 (1, 1)，3 (1, 0)，0 (0, 1)，92895 (0, 0)。
