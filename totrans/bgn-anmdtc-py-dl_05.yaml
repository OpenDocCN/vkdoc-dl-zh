- en: Introduction to Deep Learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Deep learning is a subset of machine learning that involves the use of neural
    networks to perform the modeling task. Neural networks can be comprised of hundreds
    of layers of interconnected neurons, forming a “deep” architecture, hence the
    term “deep learning.”
  prefs: []
  type: TYPE_NORMAL
- en: As described in Chapter [4](483137_2_En_4_Chapter.xhtml), “traditional” machine
    learning algorithms are non-neural network architectures like k-nearest neighbors,
    support vector machines, random forests, decision trees, and so on. These models
    are still quite popular, especially in forms such as XGBoost (gradient boosted
    trees), which remain quite competitive with neural networks on structured, tabular
    data. Other popular algorithms that remain in use include clustering algorithms
    and trees. Though deep learning models may receive the spotlight, traditional
    machine learning algorithms have not fallen out of favor and still have good uses,
    especially in the cases discussed in Chapter [3](483137_2_En_3_Chapter.xhtml).
  prefs: []
  type: TYPE_NORMAL
- en: What Is Deep Learning?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Deep learning is a subfield of machine learning that incorporates the concept
    of the artificial neuron. What sets deep learning further apart from traditional
    machine learning in general is its use of many layers of these interconnected
    artificial neurons to comprise a “deep” network, as opposed to a “shallow” network
    just a layer or two deep. The number of layers can range from a handful to up
    to several hundred. The depth combined with the addition of nonlinearity (covered
    later in this chapter) enables deep learning models to learn how to perform highly
    intricate tasks that until recently only humans could perform, such as advanced
    chatbots, generation of extremely impressive art, and autonomous driving. Most
    of the impressive groundbreaking technologies widely covered by the media in recent
    years, such as ChatGPT, deepfakes, voice synthesis, and AI art, are all powered
    by deep learning. Though deep learning slightly differs from machine learning
    and is more complex by nature, the basic fundamentals of machine learning all
    still apply.
  prefs: []
  type: TYPE_NORMAL
- en: 'In Python, deep learning is implemented primarily with two popular frameworks:
    PyTorch and TensorFlow. Keras also is popular, but it has been integrated into
    TensorFlow as of version 2.0\. From a beginner’s perspective, the TensorFlow 2.0+
    Keras module is a great starting point. It abstracts away much of the complexities
    of the deep learning modeling workflow from you, allowing you to define models
    in a few lines of code and train and make inferences with just a function each.
    This feature also makes Keras an excellent tool for rapid prototyping, allowing
    you to conduct quick experiments or turn to an easier-to-use API when you just
    need a standard deep learning model for a task.'
  prefs: []
  type: TYPE_NORMAL
- en: If you need to delve deeper and define things like custom neural network layers,
    loss functions, and neural network architectures, or just implement the workflow
    on a low level, you can use the full functionality of the TensorFlow API beyond
    Keras.
  prefs: []
  type: TYPE_NORMAL
- en: By contrast, PyTorch is less abstracted than Keras, requiring you to define
    the model, training loop, and inference loop from scratch. You do not need to
    reimplement commonly used layers, but PyTorch does not “hold your hand” in the
    manner that Keras does. However, because of PyTorch’s Pythonic API and simpler
    syntax compared to TensorFlow’s API, it remains intuitive and relatively straightforward
    to use. It is also a favorite among researchers due to its flexibility and ease
    of use.
  prefs: []
  type: TYPE_NORMAL
- en: Historically, before TensorFlow 2.0 integrated Keras and simplified much of
    its syntax, TensorFlow was quite syntax heavy and challenging to understand. This
    posed a barrier both for beginners, since they had a steep learning curve to get
    started, and for researchers, since they had to deal with all the syntax as well
    as a harder operating environment in which to debug their models. When PyTorch
    became available, it quickly grew in popularity. Both frameworks are still quite
    popular today, though TensorFlow does have a longer history of usage as well as
    a larger community of support.
  prefs: []
  type: TYPE_NORMAL
- en: Both frameworks are suitable for use in an industrial setting, though TensorFlow
    might have a slight edge due to its ability to deploy to browsers (via TensorFlow.js)
    and to mobile devices (TensorFlow Lite). PyTorch is quickly closing the gap with
    its own deployment capabilities, such as with PyTorch Mobile.
  prefs: []
  type: TYPE_NORMAL
- en: We will cover both PyTorch and Keras in this chapter and provide code for either
    framework in later chapters on the GitHub repository for those chapters. However,
    we’ll turn to Keras (TensorFlow 2.0+) where applicable due to its brevity.
  prefs: []
  type: TYPE_NORMAL
- en: The Neuron
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The artificial neuron is the backbone of the entire deep learning subfield.
    What exactly is it, and why is it called a neuron? The artificial neuron is loosely
    derived from its biological counterpart in the brain. A biological neuron’s structure
    is shown in Figure [5-1](#Fig1).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A neuron. There are primary short branches labeled dendrites. The single long
    branch is labeled axon. The final branches of the axon are labeled as the terminal
    axon.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-1
  prefs: []
  type: TYPE_NORMAL
- en: A representation of a biological neuron. The dendrite connects to other terminal
    axons to form a connection between neurons by which signals can potentially be
    transmitted
  prefs: []
  type: TYPE_NORMAL
- en: These neurons form connections between one another where the dendrites seek
    connections with terminal axons. Once these connections, known as *synapses*,
    are established, signals can pass through individual neurons based on the input
    signals it receives from other neurons it connects to. Figure [5-2](#Fig2) shows
    a connection between two neurons.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: An illustration of 2 neurons. The terminal branches of the first axon articulate
    with the dendrites of the second neuron.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-2
  prefs: []
  type: TYPE_NORMAL
- en: A connection between two neurons, known as a synapse
  prefs: []
  type: TYPE_NORMAL
- en: A synapse is a special junction between two neurons that allows signals to pass
    through from one neuron to another. Referring to Figure [5-2](#Fig2), when the
    presynaptic neuron (on the left) fires, it sends a signal outward into the terminal
    axon, which signal is picked up by the dendrites of postsynaptic neurons (on the
    right) that have formed synapses with the presynaptic neuron. What determines
    whether a neuron fires or not? The combined signal inputs collected by the dendrites
    of the postsynaptic neuron must collectively pass an activation threshold unique
    to this neuron to allow the signal to pass through to other neurons.
  prefs: []
  type: TYPE_NORMAL
- en: This is a simplification of what truly occurs on the microscopic level, though
    it is enough to inspire the principles behind the artificial neuron as well as
    the structures that it builds up. Figure [5-3](#Fig3) shows what an artificial
    neuron looks like.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig3_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A schematic illustrates the artificial neuron. On the left are 3 nodes representing
    inputs from x 1, x 2, up to x n. These are fed into the activation function based
    on 0 and 1 processing. On the right are 3 nodes representing new outputs labeled
    y 1, y 2, up to y m.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-3
  prefs: []
  type: TYPE_NORMAL
- en: Structure of an artificial neuron. The input, a vector from x[1] to x[n], is
    multiplied element-wise by a weight vector w[1] to w[n] and then summed together.
    The sum is then offset by a bias term b, and the result passes through an “activation
    function,” which is some mathematical function that delivers an output signal
    based on the magnitude and sign of the input. An example is a simple step function
    that outputs 1 if the combined input passes a threshold, or 0 otherwise. These
    now form the outputs, y[1] to y[m]. This y-vector can now serve as the input to
    another neuron
  prefs: []
  type: TYPE_NORMAL
- en: As shown in Figure [5-3](#Fig3), the artificial neuron takes in an n-length
    vector X, multiplies it element-wise by an n-length vector W, adds a bias constant
    b to each element, and passes it through an activation function. In this case,
    the activation function is simply 1 if the combined input X•W+b passes a threshold,
    and 0 otherwise. Here, the • stands for *dot product*. The shorthand version is
    Wx + b, also known as an *affine transformation* (which is of the general form
    Ax + b).
  prefs: []
  type: TYPE_NORMAL
- en: Mathematically, as a refresher, Figure [5-4](#Fig4) is what dot-product is.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig4_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: The expression of the dot product is as follows. Vector a, b, d multiplied by
    vector e, f, and g equals a e plus b f plus d g.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-4
  prefs: []
  type: TYPE_NORMAL
- en: Dot-product between a vector < a, b, d> and a vector < e, f, g>
  prefs: []
  type: TYPE_NORMAL
- en: Figure [5-5](#Fig5) shows this in a matrix-style format.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig5_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A matrix format of the dot product multiplication. A single-column matrix a
    b c is multiplied by a single-column matrix e f g and yields a e plus b f plus
    c g.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-5
  prefs: []
  type: TYPE_NORMAL
- en: Figure [5-4](#Fig4) displayed in a different format to resemble matrices
  prefs: []
  type: TYPE_NORMAL
- en: Mathematically, the entire operation can be summarized as shown in Equation
    [5-1](#Equa).
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ y=f\left(\sum \limits_{i=1}^n{x}_i{w}_i+b\right) $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_Equa.png)'
  prefs: []
  type: TYPE_IMG
- en: '***Equation 5-1.****Formula representing the artificial neuron’s structure**.
    Here, f() is an abstraction for the activation function*'
  prefs: []
  type: TYPE_NORMAL
- en: Now that you now know what an artificial neuron looks like and how it operates,
    let’s delve into what activation functions are and why they are used.
  prefs: []
  type: TYPE_NORMAL
- en: Activation Functions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Activation functions are a way to map the input signals into some form of output
    signal to be interpreted by subsequent neurons. If you do not use an activation
    function (sometimes called a “linear activation function”), then the output of
    the affine transformation is just the final output of the neuron.
  prefs: []
  type: TYPE_NORMAL
- en: However, we want to model complex functions that are beyond the scope of linear
    modeling, so we want to use a nonlinear activation function that maps the inputs
    into some nonlinear space. Furthermore, most tasks and data are nonlinear, so
    if we map these inputs into a linear space, we would be severely underfitting.
    Examples of such nonlinear activation functions include sigmoid and hyperbolic
    tangent.
  prefs: []
  type: TYPE_NORMAL
- en: Another reason for using nonlinear activation functions is that if we used only
    a linear activation function, even if we had a deep neural network, it would effectively
    just become a single layer. A neural network is a sequence of linear transformations.
    This sequence of linear transformations can itself be rewritten in terms of the
    original input to be only one linear transformation.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s start with the **sigmoid** activation function, a simple way to introduce
    nonlinearity. If you’d like to know how to generate the figures presented in this
    section, follow along with the notebook at [`https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%205%20Introduction%20to%20Deep%20Learning/chapter5_activation_functions.ipynb`](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%205%20Introduction%20to%20Deep%20Learning/chapter5_activation_functions.ipynb).
  prefs: []
  type: TYPE_NORMAL
- en: The formula for sigmoid is shown in Equation [5-2](#Equb).
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ f(x)=\frac{1}{1+{e}^{-x}} $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_Equb.png)'
  prefs: []
  type: TYPE_IMG
- en: '***Equation 5-2.****The formula for the sigmoid function*'
  prefs: []
  type: TYPE_NORMAL
- en: This is a nonlinear function, meaning that it cannot be adequately modeled by
    trying to draw a line to hit all of the points. Figure [5-6](#Fig6) shows what
    the sigmoid graph looks like.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A line graph plots sigmoid output versus x values. The curve passes through
    the following points. (negative 4, 0), (negative 2, 0.1), (0, 0.5), (2, 0.9),
    (4, 1). Values are estimated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-6
  prefs: []
  type: TYPE_NORMAL
- en: The graph of the sigmoid function. Input values are mapped into a range of (0,
    1). The input domain takes any and all x-values, but really large or really small
    x-values approach 1 or 0, respectively
  prefs: []
  type: TYPE_NORMAL
- en: As shown in Figure [5-6](#Fig6), the sigmoid activation function maps its inputs
    into a curved output that ranges from (0, 1), with the function changing most
    rapidly around its center. Because of this, the sigmoid activation function is
    well suited for modeling a probability score; for example, “What is the probability
    of this image being of a dog?”
  prefs: []
  type: TYPE_NORMAL
- en: As a result, sigmoid is appropriate for being used at the very end of the neural
    network to map the last layer’s raw output into a probability score. Sigmoid can
    also be used as intermediate activation functions to be used within the different
    non-output layers of the network.
  prefs: []
  type: TYPE_NORMAL
- en: 'That being said, there are some issues with using sigmoid:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Vanishing gradient**: The gradient at the extremes of the graph will be very
    small. Neural networks update their parameters using the gradient, so tiny gradients
    would lead to tiny updates, thus slowing down the learning process or even halting
    it in extreme cases.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Not zero**-**centered**: The output space itself is not zero-centered. This
    has a few implications for the neural network in general:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Turning “off” neurons** requires negative weights large in magnitude to output
    to near zero. Weights generally should be smaller in magnitude so that the model
    is stable. Otherwise, neuron inputs larger in magnitude may either overly activate
    or overly deactivate the neuron when it shouldn’t.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Inputs near zero still pass signals** because if x were zero, the output
    would still be 0.5\. If the activation function were zero-centered, then zero
    inputs would also be zero outputs. Tying in with the previous point, it is more
    efficient and more stable for the model if turning off a neuron required both
    the weight’s magnitude to be small and the input itself to be near zero.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Neuron outputs will have their own distributions**, meaning the subsequent
    layer will have to continually learn the preceding layer’s activation output distributions
    as the weights update throughout the training process. This is called **internal
    covariate shift**, and it is certainly a potential problem with the sigmoid activation
    function.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Zig-zag gradient updates**. We update a weight by finding the gradient of
    the loss function with respect to the same weight. In a neural network with subsequent
    sigmoid layers, the inputs to each layer will only ever be positive, along with
    the gradient. And so, the direction of the final gradient step depends entirely
    on the gradient of the loss function with respect to the output. This leads to
    a phenomenon where gradient steps tend to zig-zag, leading to inefficient optimization
    as well as potentially poorer convergence.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: With a zero-centered output space, this issue is largely eliminated because
    the activation outputs can now be either positive or negative. With the final
    gradient’s sign no longer depending on just the loss gradient with respect to
    the outputs, gradient steps can be more direct and not oscillate as much.
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Computationally expensive**: Because of the exponential operation, the sigmoid
    function itself can be a bit computationally expensive. It may slow down training
    a bit compared to simpler activation functions (like ReLU, which we will cover
    shortly).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In practice, sigmoid is not a good activation function to use in your neural
    network layers, though it is useful to use as a final layer activation function
    to predict a probability score. You can either have a single output (probability
    of being an anomaly) or have several output categories that each carry a probability
    score (e.g., given health metrics, probability of disease X, probability of disease
    Y).
  prefs: []
  type: TYPE_NORMAL
- en: 'However, not being zero-centered causes a lot of issues, so let’s look at a
    similar function that is zero-centered: the hyperbolic tangent (**tanh**) function.
    Its formula is given by Equation [5-3](#Equc).'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ f(x)=\frac{e^x-{e}^{-x}}{e^x+{e}^{-x}} $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_Equc.png)'
  prefs: []
  type: TYPE_IMG
- en: '***Equation 5-3.****The formula for the hyperbolic tangent function*'
  prefs: []
  type: TYPE_NORMAL
- en: The tanh graph is quite similar to the sigmoid graph, but with some differences,
    as shown in Figure [5-7](#Fig7).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A line graph plots tan h output versus x values. The curve passes through the
    following points. (negative 4, 0), (negative 2, 0), (0, 0.5), (0, 0), (2, 1),
    (4, 1). Values are estimated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-7
  prefs: []
  type: TYPE_NORMAL
- en: The graph of the tanh function. Input values are mapped into an output range
    of (–1, 1). Really large or really small x-values approach 1 or –1, respectively
  prefs: []
  type: TYPE_NORMAL
- en: 'As you can see in Figure [5-7](#Fig7), the tanh graph is zero-centered and
    is symmetric about the origin. Compared to sigmoid, tanh carries the following
    advantages due to being zero-centered:'
  prefs: []
  type: TYPE_NORMAL
- en: '**No zig-zag updates**: Gradient updates won’t be zig-zagged since activation
    outputs can now be positive or negative. Subsequent layers now have positive and
    negative inputs, so layer-wise gradients are no longer only positive.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Better distribution**: Being zero-centered means that the distributions of
    the neuron outputs are more closely centered on a mean of zero, unlike sigmoid.
    The outputs are now on a more consistent scale compared to sigmoid, though internal
    covariate shift is still a potential issue. Having a mean potentially near zero
    means the subsequent layers need not continuously learn an offset, so learning
    becomes more stable.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Inputs near zero have near zero outputs**: Because of this property of tanh,
    it’s far simpler to turn a neuron “off” without needing weights of very large
    magnitude to transform the input x-values into something very negative just to
    output something near zero, like in the case of sigmoid.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Though tanh is not perfect, practically speaking, using it as the hidden layer
    activation function is much more preferable than using sigmoid. However, tanh
    still has the issue of vanishing gradients, because if the x-inputs tend to be
    very large in magnitude, then the corresponding gradients will be nearly zero,
    potentially arresting learning. Some strategies for dealing with this are available,
    but in practice there are much better-suited activation functions that are used
    more commonly. One such example is the Rectified Linear Unit, or **ReLU**.
  prefs: []
  type: TYPE_NORMAL
- en: The ReLU activation function is very simple and computationally efficient. Its
    formula is presented in Equation [5-4](#Equd).
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ f(x)=\max \left(0,x\right) $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_Equd.png)'
  prefs: []
  type: TYPE_IMG
- en: '***Equation 5-4.****The ReLU activation function. Since there is no exponential
    function involved, it is very computationally simple as it just involves a direct
    comparison between x and 0*'
  prefs: []
  type: TYPE_NORMAL
- en: The resulting graph of ReLU is shown in Figure [5-8](#Fig8).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A line graph plots R e L u output versus the x-values curve. The curve passes
    through the following points. (negative 4, 0), (negative 2, 0), (0, 0), (2, 2),
    and (4, 4).
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-8
  prefs: []
  type: TYPE_NORMAL
- en: The resulting graph of the ReLU activation function. For x-values above 0, the
    result is a linear function, but below zero, the output is mapped to zero. ReLU
    clips the outputs that are negative
  prefs: []
  type: TYPE_NORMAL
- en: Though it may seem counterintuitive, ReLU also introduces nonlinearities. This
    has to do with the way it cuts off inputs below a certain threshold, creating
    pieces of linear sections that can be composed together to form a complex, nonlinear
    output. When used in tandem with many other ReLU activation functions, with respect
    to both the breadth (how many neurons in a layer) and depth (how many layers)
    of the network, the neural network can learn to approximate nonlinear functions
    in a much more computationally efficient manner than tanh.
  prefs: []
  type: TYPE_NORMAL
- en: To demonstrate this, we will compute a forward pass through a neural network
    with manually set weights to show how the network, by the end, can piece together
    a complex, nonlinear function. This function can be used as a decision boundary
    for classification tasks, or regression for regression tasks. If you would like
    to follow along with the code, you can find the notebook at [`https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%205%20Introduction%20to%20Deep%20Learning/chapter5_relu_keras.ipynb`](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%205%20Introduction%20to%20Deep%20Learning/chapter5_relu_keras.ipynb).
    You will encounter code that hasn’t been formally introduced yet, like the Keras
    neural network code—Keras modeling is covered later in this chapter.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s explore a neural network with two hidden layers that follow the input
    layer and precede the final layer, the output layer. In total, the network is
    four layers deep.
  prefs: []
  type: TYPE_NORMAL
- en: For the sake of demonstrating that ReLU can produce nonlinear outputs, we will
    manually compute a forward pass of data through each layer in the network and
    observe the corresponding outputs. However, Figure [5-9](#Fig9) also shows the
    results of a trained network on the input data.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A graph titled, train values plots y versus x for noisy data. The curve passes
    through the following points. (negative 1, negative 1.5), (negative 0.75, negative
    0.75), (negative 0.5, negative 0.25), (negative 0.25, 0), (0, 0), (0.25, 0), (0.5,
    0), (1, 0.5). Values are estimated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-9
  prefs: []
  type: TYPE_NORMAL
- en: Noisy data that represents the arbitrarily chosen polynomial 0.9x³ – 0.5x² +
    0.07x. We added noise to make the task of approximating this function more difficult
    for a network, as it is forced to generalize and not fit to the noise
  prefs: []
  type: TYPE_NORMAL
- en: After the first pass, which is summarized by the computation in Equation [5-5](#Par83),
    we see output like that shown Figure [5-10](#Fig10).
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {z}_1={x}_{train}{w}_1+{b}_1 $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_Eque.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ ReLU(x)=\max \left(0,x\right) $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_Equf.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {a}_1= ReLU\left({z}_1\right) $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_Equg.png)'
  prefs: []
  type: TYPE_IMG
- en: '***Equation 5-5.****A set of equations that represent the computation for the
    first pass. Here, z*[*1*] *represents the raw output of the first layer, while
    a*[*1*] *represents the output after the ReLU activation function*'
  prefs: []
  type: TYPE_NORMAL
- en: Figure [5-10](#Fig10) shows the activation outputs along with the raw outputs.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A line graph titled, layer 1 R e L U output plots activation versus x index
    value. It plots 3 lines. Line 1 (4000, 0), (6000, 0.25), (8000, 0.75), (10000,
    1). Line 2 (6000, 0), (8000, 0.15), (10000, 0.25). Line 3 (0, 0.25), (4000, 0.2),
    (8000, 0.05), (10000, 0). Values are estimated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-10
  prefs: []
  type: TYPE_NORMAL
- en: Both the raw layer outputs and the ReLU outputs are shown here. The ReLU outputs
    are the lines in a darker color. The raw outputs are also graphed here in a lighter
    color to show how they’re clipped off by the ReLU. Anything below zero is set
    as zero
  prefs: []
  type: TYPE_NORMAL
- en: As you can see, initially, all of the raw outputs are lines. The ReLU operation
    sets any value below zero to zero, leaving us with the portions of the lines that
    are darker. These are the linear snippets that remain, and they’re the outputs
    that become the input to the following layer.
  prefs: []
  type: TYPE_NORMAL
- en: Equation [5-6](#Par87) shows the computation for the next layer.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {z}_2={a}_1{w}_2+{b}_2 $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_Equh.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {a}_2= ReLU\left({z}_2\right) $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_Equi.png)'
  prefs: []
  type: TYPE_IMG
- en: '***Equation 5-6.****The computation for the next layer. It takes the post-activation
    output of the previous layer and uses that as the input*'
  prefs: []
  type: TYPE_NORMAL
- en: Recall that a neuron takes a weighted sum of its inputs and offsets it by some
    bias vector. This means that the raw output for a neuron in the next layer should
    be some combination of ReLU outputs of the previous layer. Figure [5-11](#Fig11)
    illustrates this.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig11_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The line graph titled, layer 2 R e L U output plots activation versus x index
    value. Line 1 (0, 0.4), (4000, 0.3), (9000, 0). Line 2 (10000, 0.8), (8000, 0.6),
    (2000, 0). Line 3 (0, 0.4), (4000, 0.2) (8000, 0.1). Values are estimated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-11
  prefs: []
  type: TYPE_NORMAL
- en: ReLU outputs and raw outputs of the second layer in the network. Notice how
    it no longer looks linear. If you follow along with the code in the notebook,
    you can see that layer 2’s red output is a weighted combination of 2.3 times layer
    1’s red output, –0.9 times layer 1’s green output, 5.3 times layer 1’s blue output,
    and all of it offset by –0.1
  prefs: []
  type: TYPE_NORMAL
- en: The output no longer looks linear. Figure [5-12](#Fig12) shows how the third
    layer outputs look. As a reminder, all of the weights have been manually set just
    to illustrate how the ReLU function can be composited to create nonlinear outputs.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig12_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A line graph titled, layer 3 R e L U output plots activation versus x index
    value as follows. Line 1 (0, 0.5), (2000, 0.45), (6000, 0.25). Line 2 (0, 0),
    (4000, 0), (7000, 0.25), (10000, 0.15). Line 3 (5000, 0), (8000, 0), (10000, 0.6).
    Values are estimated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-12
  prefs: []
  type: TYPE_NORMAL
- en: Raw and activation outputs of the third layer
  prefs: []
  type: TYPE_NORMAL
- en: Finally, Figure [5-13](#Fig13) shows the output layer’s raw output. The output
    layer in this case does not have any activation function.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig13_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A line graph titled, layer 4 raw output plots activation versus x-index value.
    The curve passes through the following points. (0, 0.64), (2000, 0.52), (4000,
    0.45), (6000, 0.35), (8000, 0.85), (10000, 0.9). Values are estimated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-13
  prefs: []
  type: TYPE_NORMAL
- en: The output of the final layer, which takes three neuron outputs and combines
    it into one single output
  prefs: []
  type: TYPE_NORMAL
- en: In a regression context, where the job of the network is to approximate a function
    given input data, Figure [5-13](#Fig13) shows how it can learn a nonlinear function.
    Figure [5-13](#Fig13) is not meant to approximate Figure [5-9](#Fig9) and was
    created as part of an example to show how flexible ReLU can be while remaining
    very computationally efficient compared to tanh.
  prefs: []
  type: TYPE_NORMAL
- en: This is why ReLU is such a good activation function. Not only is it more computationally
    efficient to perform the ReLU operation as well as find the gradient, but it is
    still able to serve as a nonlinearity to allow the network to learn complex functions.
    It is no wonder, then, that ReLU is commonly used in practical settings. There
    are some variations of ReLU, like LeakyReLU, that instead of clipping negative
    values to zero allow a very small signal to pass through. Either way, ReLU is
    a good baseline to start with when training networks.
  prefs: []
  type: TYPE_NORMAL
- en: 'Compared to tanh, using ReLU has the following advantages:'
  prefs: []
  type: TYPE_NORMAL
- en: '**No gradient traps**. There is no longer the case where gradients on any extreme
    of the graph become very small, like in tanh. With ReLU, the gradient is simply
    1 wherever ReLU was positive and 0 otherwise.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Computationally efficient**. There is no exponential to calculate. It’s a
    simple mask that sets anything non-positive to zero.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'However, there are some possible drawbacks:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Exploding outputs**. ReLU is uncapped in its positive upper bound. This means
    that activation outputs can be extremely large and destabilize the network entirely,
    leading to divergence. This can be somewhat mitigated by proper initialization
    techniques such as Kaiming He initialization to keep learning more stable, but
    it is still a possibility.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Dying ReLU**. Because the gradient for inputs below zero is simply zero,
    neurons that produce this kind of output don’t get updated. This can lead to a
    lot of “dead” neurons that don’t update anymore, leading to inefficiencies in
    the network. He initialization can help stabilize the network to combat dying
    ReLU, but it doesn’t fully solve it.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Not zero-centered**. Like with sigmoid, the values and gradient will always
    be positive, meaning there could be zig-zag optimization steps taken.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: However, modifications of ReLU, such as LeakyReLU, can help because they allow
    some negative input through (through max(0.01x, x) instead of max(0, x) like in
    regular ReLU), helping mitigate zig-zag gradient steps as well as the dying ReLU
    problem.
  prefs: []
  type: TYPE_NORMAL
- en: That said, Figure [5-14](#Fig14) shows an example of a simple neural network
    approximating the Figure [5-9](#Fig9) true function using the tanh activation
    function.
  prefs: []
  type: TYPE_NORMAL
- en: Each network was trained for 50 epochs with a batch size of 128\. Don’t worry
    if you don’t know what these parameters mean; you simply need to know that both
    networks have identical architectures and have been trained under the same setting.
    The only difference is that one network uses tanh for its activation function
    while the other network uses ReLU.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig14_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A line graph titled, neural network using tan h plots approximation and true
    function curves. The curves pass through the following estimated points. Approximation
    (0, negative 1.25), (2000, negative 0.25), (6000, 0). True function (0, negative
    1.5), (2000, negative 0.25), (8000, 0), (10000, 0.5).
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-14
  prefs: []
  type: TYPE_NORMAL
- en: The output approximation of the Figure [5-9](#Fig9) data using tanh as the activation
    function
  prefs: []
  type: TYPE_NORMAL
- en: While it’s not a perfect fit, it was pretty close. Let’s compare this output
    to a neural network trained using ReLU, shown in Figure [5-15](#Fig15).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig15_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A line graph titled, neural network using R e L U plots approximation and true
    function curves. The curves pass through the following points. Approximation (0,
    negative 1.25), (2000, negative 0.5), (4000, 0). True function (0, negative 1.5),
    (2000, negative 0.5), (8000, 0), (10000, 0.5).
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-15
  prefs: []
  type: TYPE_NORMAL
- en: The output approximation of the Figure [5-9](#Fig9) data using ReLU as the activation
    function. Note how you can see linear sections composed together. It’s much rougher
    than the smooth tanh curves shown in Figure [5-14](#Fig14), but this output is
    more computationally efficient and quicker to compute
  prefs: []
  type: TYPE_NORMAL
- en: Finally, there is another activation function called `softmax()` that is important
    to know. The equation for `softmax()` is shown in Equation [5-7](#Par105).
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ softmax\left({z}_i\right)=\frac{e^{z_i}}{\sum \limits_j{e}^{z_j}} $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_Equj.png)'
  prefs: []
  type: TYPE_IMG
- en: '***Equation 5-7.****The equation for* `softmax()`. *It transforms some vector
    of some real values into a vector of real values that specifically sum up to 1\.
    This makes it ideal for creating a probability distribution over a specific output
    space represented by the vector*'
  prefs: []
  type: TYPE_NORMAL
- en: Equation [5-7](#Par105) shows how to obtain a `softmax()` score for the i^(th)
    element of a vector z.
  prefs: []
  type: TYPE_NORMAL
- en: '`Softmax()` has the property of turning the input vector, which sums to some
    arbitrary number, into an output vector with entries that sum up to 1\. This makes
    the output vector ideal for representing a probability distribution.'
  prefs: []
  type: TYPE_NORMAL
- en: In classification tasks, neural networks have an output layer with multiple
    neurons, each corresponding to a specific class. The first node corresponds to
    class 0, and the n^(th) neuron corresponds to the n-1 class. Think back to how
    we categorically encoded strings in Chapter [2](483137_2_En_2_Chapter.xhtml)—this
    is exactly the same thing. The output neurons correspond to some categorically
    encoded class.
  prefs: []
  type: TYPE_NORMAL
- en: To check how `softmax()` works, let’s manually define a vector to represent
    the raw output of an output layer. You may also come across the term **logits**,
    which refers to the raw output of the output layer. Refer to Figure [5-16](#Fig16)
    for the code to run an example of `softmax()`.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig16_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A code snippet uses a softmax function using a lambda expression to initialize
    a variable z and calculate the probability scores and the index of the maximum
    probability score. It prints the raw output, probability scores, and prediction
    values.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-16
  prefs: []
  type: TYPE_NORMAL
- en: Code to simulate logits (represented by z), `softmax()` operation to get probability
    scores, as well as the logic to make a prediction (simply choosing the class with
    the highest probability)
  prefs: []
  type: TYPE_NORMAL
- en: As shown in Figure [5-16](#Fig16), the operation `argmax()` returns the index
    that holds the highest value in that vector. In terms of `softmax()` output, it
    should return the index holding the highest probability score. You should now
    see something like the output shown in Figure [5-17](#Fig17).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig17_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A code snippet reads as follows. Raw output left parenthesis logits right parenthesis
    colon left big bracket negative 1.2 2.5 0.1 right big bracket. Probability scores
    colon left big bracket 0.02216479 0.89650602 0.08132919 right big bracket. Prediction
    colon 1.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-17
  prefs: []
  type: TYPE_NORMAL
- en: Output of executing the code in Figure [5-16](#Fig16). The prediction refers
    to the index of the probability vector with the highest probability value. This
    index happened to be index 1, corresponding to class 1, whatever that may be
  prefs: []
  type: TYPE_NORMAL
- en: '`Softmax()` is very heavily used in practice in any classification task that
    involves the prediction of one specific class given some input. If you want each
    class to have its own probability distribution, implying that an input can be
    an example of multiple classes, then you want to use sigmoid over the output layer.
    This is a task called *multilabel classification*. In this case, whatever class
    has a probability more than some threshold will be considered to be the prediction.'
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have covered the various activation functions, let’s dive right
    into neural networks and their architecture.
  prefs: []
  type: TYPE_NORMAL
- en: Neural Networks
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now that you are familiar with neurons and activation functions, it’s time to
    dig deeper into the layers of neurons alluded to in the previous section.
  prefs: []
  type: TYPE_NORMAL
- en: A **layer** in a neural network is a collection of neurons that each compute
    some output value using the entire input. The output of a layer is comprised of
    all the output values computed by the neurons within that layer. A neural network
    is a sequence of layers of neurons where the output of one layer is the input
    to the next.
  prefs: []
  type: TYPE_NORMAL
- en: As previously mentioned in the context of ReLU, the first layer of the neural
    network is the *input layer*, and it takes in the training data as the input.
    The last layer of the network is the *output layer*, and it outputs values that
    are used as predictions for whatever task the network is being trained to perform.
    All layers in between are called *hidden layers*.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [5-18](#Fig18) shows what a neural network looks like in terms of layers.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig18_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A schematic represents the neural network architecture. It has interconnected
    nodes representing from the left, the input layer, the hidden layer 1, the hidden
    layer 2, and the output layer.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-18
  prefs: []
  type: TYPE_NORMAL
- en: Architecture of a neural network with two hidden layers. Each neuron is fully
    connected to the previous layer’s neurons as well as to the succeeding layer’s
    neurons
  prefs: []
  type: TYPE_NORMAL
- en: In a mathematical sense, the entire network is a Series of chained matrix multiplication
    operations with activation functions applied to them. Refer to Equations 5-5 and
    5-6 to understand how the layer computations are calculated mathematically. We
    use the notation z[L] to denote layer L’s affine transformation output, and a[l]
    to denote the activation function output using z[L] as the input. The value a[L]
    is now the input to layer L+1, becoming z[L+1] and then a[L+1].
  prefs: []
  type: TYPE_NORMAL
- en: When data flows from the leftmost layer to the rightmost layer, this is called
    the **forward pass**. In other words, the forward pass is the process through
    which the final output is calculated from some given input.
  prefs: []
  type: TYPE_NORMAL
- en: The **backward pass** involves moving from the rightmost layer to the leftmost
    layer one layer at a time, using the backpropagation algorithm to compute the
    gradients. **Backpropagation**, short for “backward propagation of errors,” computes
    the gradients with respect to the learnable parameters of each layer by using
    chain-rule in such a manner as to avoid recomputing all intermediate terms. Since
    the processes are so interrelated, these two terms are used interchangeably at
    times. However, the distinction is that the backward pass is strictly the process
    of going backward through the network layer by layer, whereas backpropagation
    (used in the backward pass) is the process of computing the gradients.
  prefs: []
  type: TYPE_NORMAL
- en: Once all of the gradients have been computed, the optimization step of updating
    the learnable parameters takes place. We will go over this later in the chapter
    in the section “Gradient Descent and Backpropagation.”
  prefs: []
  type: TYPE_NORMAL
- en: Let’s now look at how the data propagates through the network during the forward
    pass to result in the output prediction by revisiting Figure [5-18](#Fig18) in
    the context of classification. Each of the three output nodes, respectively, corresponds
    to output classes 0, 1, and 2, standing in for “dog,” “cat,” and “bird.” Let’s
    say that the input data, though only four nodes wide in this case, is a highly
    compressed representation of images of either dogs, cats, or birds.
  prefs: []
  type: TYPE_NORMAL
- en: Assume for the sake of illustration in the following figures that the activation
    functions used are sigmoid, that the neurons that maximally fire are black (activation
    output is close to 1), and that the neurons that minimally fire are white (activation
    output is close to 0). Neurons that fire more strongly will propagate that signal
    to the next layer, while neurons that fire very weakly will not propagate a signal
    to the next layer.
  prefs: []
  type: TYPE_NORMAL
- en: As for the weights themselves (represented by the lines [edges] interconnecting
    neurons between the two layers), edges corresponding with very strong weights
    are depicted with thicker lines, while edges corresponding to small weights are
    depicted with thinner lines. How “strong” a weight on an edge is, is in terms
    of the magnitude. An edge with a thick line can have a weight that is strongly
    negative or strongly positive.
  prefs: []
  type: TYPE_NORMAL
- en: Remember that a neuron is fully connected with every neuron in the preceding
    layer and that it will have a different weight assigned to each of these connections.
    Two neurons are considered to have a strong connection if the activation of the
    former very likely activates the latter, which is represented by a higher weight
    on the edge connecting these two neurons. The opposite case is also true, and
    you will see a lower weight on the edge connecting two neurons where the firing
    of the former rarely leads to the firing of the latter.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s say some arbitrary neuron rarely ever fires except when the input data
    represents a dog. In this case, let’s also assume that the neuron fires very strongly.
    Then, the weights connecting this neuron to the next layer may likely be large
    in magnitude because of the significant influence of this neuron’s activation
    on the output prediction.
  prefs: []
  type: TYPE_NORMAL
- en: Unfortunately, how neural networks come to “understand” the input data and interpret
    it will differ across architectures and even across different instances of the
    same architecture. Because there are so many connections, explainability of neural
    networks is extremely poor, and they’re often regarded as a black box for this
    reason. When networks make a decision, we do not know exactly why, only that after
    a forward pass through a network with up to millions of finely tuned parameters,
    we got a certain prediction. Compare this to a decision tree that can tell us
    why it made the decision it did. Furthermore, it is important not to anthropomorphize
    neural networks, as they’re basically large mathematical functions that map inputs
    to outputs.
  prefs: []
  type: TYPE_NORMAL
- en: With that said, take the following illustrations with a grain of salt—they are
    meant to be gross simplifications of what truly goes on in a neural network. The
    reality of understanding how neural networks make decisions is far more complex
    and is an active area of research.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [5-19](#Fig19) shows the initial data transformation in layer 1, the
    input layer.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig19_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A schematic illustrates a neural network architecture. The network comprises
    4 layers. From the left, these are, input layer, hidden layer 1, hidden layer
    2, and output layer. The input layer has 1 non-shaded and 3 shaded nodes representing
    4 inputs. The output layer produces 3 outputs, 0, 1, and 2.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-19
  prefs: []
  type: TYPE_NORMAL
- en: The input data has just been processed by layer 1, the input layer, and the
    signal has not propagated to layer 2 yet. The edges represented as thicker lines
    indicate that in the process of training this network, these connections have
    been reinforced to have higher weights because the activation of the former neuron
    was important to correctly determine the output class
  prefs: []
  type: TYPE_NORMAL
- en: Referencing Figure [5-19](#Fig19), we can see in the input layer that one neuron
    has not activated much, while two neurons have mildly activated (with an activation
    of around 0.5). One neuron has a higher activation at around 0.8\. These signals
    will propagate to the next layer, and the subsequent neurons will fire based on
    the weighted combination of the inputs along with the post-sigmoid output.
  prefs: []
  type: TYPE_NORMAL
- en: As shown in Figure [5-20](#Fig20), the next layer’s neurons activate according
    to their individual weights and post-sigmoid activations. The outputs of layer
    2 will now be the inputs to layer 3, which will fire depending on their own individual
    weights and biases, as shown in Figure [5-21](#Fig21).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig21_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A schematic illustrates the 4 interconnected layers of a neural network. Input
    layer 1, hidden layer 1, and hidden layer 2 are processing the inputs. The outputs
    produced are 0, 1, and 2.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-21
  prefs: []
  type: TYPE_NORMAL
- en: Layer 3’s neurons fire according to their weighted sums and sigmoid activations.
    These signals will now be interpreted by the output layer to generate probability
    scores
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig20_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A schematic illustrates the 4 interconnected layers of a neural network. The
    layer 1 and hidden layer 1 are processing the inputs, while the hidden layer 2
    is not. The outputs produced are 0, 1, and 2.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-20
  prefs: []
  type: TYPE_NORMAL
- en: Signals have propagated to the next layer, layer 2, and have fired according
    to the weighted sum of the inputs (weights can be positive or negative, so a bold
    edge can be a strongly negative connection) as well as the post-sigmoid activation
    output
  prefs: []
  type: TYPE_NORMAL
- en: As shown in Figure [5-21](#Fig21), the input signals have propagated all the
    way to just before the output layer. The output layer has the `softmax()` activation
    function, so its activations should all sum to 1 because, with `softmax()`, the
    output layer becomes a probability distribution. Refer to Figure [5-22](#Fig22)
    to see how the network makes its final predictions.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig22_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A schematic illustrates the 4 interconnected layers of a neural network. The
    nodes in the input layer, hidden layer 1, hidden layer 2, and the output layer
    are all shaded. The output layer has 3 shaded nodes labeled 0, 1, and 2.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-22
  prefs: []
  type: TYPE_NORMAL
- en: The final predictions are made and the output layer outputs probability scores
    for each class. The neuron representing class zero has the highest probability
    of approximately 0.75\. The other two neurons have a much lower probability that
    together sums to 0.25\. The way to interpret the prediction made by the network
    is to take the neuron’s index that has the highest probability (by using `argmax()`).
    In this case, the output neuron at index zero has the highest probability, and
    so the model’s prediction for the input will be class zero
  prefs: []
  type: TYPE_NORMAL
- en: As Figure [5-22](#Fig22) shows, this is the sequence of activations that resulted
    in the output prediction of zero given the input. After reversing the categorical
    encoding, we find that the label associated with the encoded value of zero is
    “dog.”
  prefs: []
  type: TYPE_NORMAL
- en: Now that you have a better idea of how neural networks operate, let’s cover
    the concept of the loss function, which determines how far off the neural network’s
    predictions are compared to the true correct values that we want the network to
    predict.
  prefs: []
  type: TYPE_NORMAL
- en: Loss Functions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The loss function is a way to measure the deviance between the model’s predictions
    and what the model should be predicting. You may also see the loss function referred
    to as a **cost function**. In a supervised learning setting, this means either
    measuring the loss in a regression task (predicted real-value output vs. the target
    real-value output) or measuring the loss in a classification task (predicted integer
    output vs. target integer output).
  prefs: []
  type: TYPE_NORMAL
- en: A difference between the predicted value and the target value can be referred
    to as an “error,” and the goal for any modeling task is to reduce this error as
    much as possible so that the target and predicted values are as close in value
    as they can be.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s begin with regression loss functions.
  prefs: []
  type: TYPE_NORMAL
- en: Regression
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: A straightforward loss function used in regression tasks is the **mean-squared
    error (MSE)**. Recall from Chapter [3](483137_2_En_3_Chapter.xhtml) that the MSE
    loss can be used for regression tasks in machine learning. The same loss can be
    used in deep learning tasks as well. As a reminder, the MSE loss equation is shown
    in Equation [5-8](#Par138).
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ MSE=\frac{1}{N}\sum \limits_{i=1}^N{\left({y}_i-\hat{y_i}\right)}^2 $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_Equk.png)'
  prefs: []
  type: TYPE_IMG
- en: '***Equation 5-8.***![$$ \hat{y_i} $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_IEq1.png)
    *is the prediction made on the i*^(*th*) *data sample, x*[*i*]*. y*[*i*] *is the
    corresponding true output we want the model to target. If the model made perfect
    predictions, the MSE would be 0*'
  prefs: []
  type: TYPE_NORMAL
- en: Also recall from Chapter [3](483137_2_En_3_Chapter.xhtml) that other regression
    loss functions exist, such as **mean absolute error (MAE)** (Equation [5-9](#Par140)),
    **mean absolute percentage error (MAPE)** (Equation [5-10](#Par141)), and more,
    though what loss function you choose to use may depend on the nature of the task
    and the threshold of tolerance for deviances from the true outputs.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ MAE=\frac{1}{N}\sum \limits_{i=1}^N\left|{y}_i-\hat{y_i}\right| $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_Equl.png)'
  prefs: []
  type: TYPE_IMG
- en: '***Equation 5-9.****Mean absolute error* *finds the average magnitude of deviance
    of the prediction from the true value*'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ MAPE=\frac{1}{N}\sum \limits_{i=1}^N\left|\frac{y_i-\hat{y_i}}{y_i}\right|
    $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_Equm.png)'
  prefs: []
  type: TYPE_IMG
- en: '***Equation 5-10.****Mean absolute percentage error* *finds the deviance of
    the prediction from the true value in terms of percentages and averages these
    out*'
  prefs: []
  type: TYPE_NORMAL
- en: Which loss/cost function you should use depends on the exact nature of the task.
    If you want to penalize prediction errors more harshly, then the MSE loss function
    is good choice due to the squaring component of the loss. If you don’t want the
    loss to be as sensitive to outliers, then MAE loss may be a good error metric
    because it measures only the direct magnitude of errors.
  prefs: []
  type: TYPE_NORMAL
- en: If you simply want to view the errors in relative terms, then MAPE may be a
    good choice, since it measures errors in terms of the target value. This can be
    more appropriate for time-series forecasting tasks, for example, where magnitude
    error or squared error differences may incur a higher loss than a percentage error.
    For example, if you predicted a stock price would be 10,100 but it was actually
    10,000, your absolute error would be 100 and your squared error would be 10,000\.
    However, your percentage error would be 0.01 (1% error).
  prefs: []
  type: TYPE_NORMAL
- en: Classification
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: With classification tasks, you’re dealing with discrete integer labels, so it’s
    not as simple as finding the numerical deviation between the target and the prediction.
    Furthermore, the model outputs real-value probabilities that the input example
    belongs to a certain class. We want to incorporate this probability prediction
    into the loss because it provides an indication of the strength of the prediction.
    Though both 0.71 and 0.99 round up to 1, the latter is a much stronger prediction
    than the former.
  prefs: []
  type: TYPE_NORMAL
- en: Once again, we can bring back the **cross-entropy loss/log loss** function from
    Chapter [3](483137_2_En_3_Chapter.xhtml). Given a binary classification task (there
    are only two possible labels, either 0 or 1), we can incorporate an equation like
    Equation [5-11](#Par146). Since this loss function only deals with two classes,
    it can also be referred to as **binary cross-entropy loss**.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Log\  Loss=-\frac{1}{N}\sum \limits_{i=1}^N{y}_i\ast \log \left(\hat{y_i}\right)+\left(1-{y}_i\right)\ast
    \log \left(1-\hat{y_i}\right) $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_Equn.png)'
  prefs: []
  type: TYPE_IMG
- en: '***Equation 5-11.****In this loss function, y*[*i*] *represents the true label
    (a discrete value either 0 or 1) corresponding to x*[*i*]*, the i*^(*th*) *input
    value, while* ![$$ \hat{y_i} $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_IEq2.png)*represents
    the probability score output by the model (a real value between 0 and 1) for the
    input x*[*i*]'
  prefs: []
  type: TYPE_NORMAL
- en: However, we can have more than just two classes. For several classes, we want
    to extend the binary cross-entropy loss into a generalized **categorical cross-entropy
    loss** function that is capable of dealing with multiple classes.
  prefs: []
  type: TYPE_NORMAL
- en: Recall from Chapter [2](483137_2_En_2_Chapter.xhtml) that **one-hot encoding**
    creates vector of all 0s except for a single 1 at a particular index. This index
    value where the encoding holds a 1 is the integer class label.
  prefs: []
  type: TYPE_NORMAL
- en: For example, if there were three classes total in a classification task, then
    the one-hot encoding for class 0 is [1, 0, 0], the one-hot encoding for class
    1 is [0, 1, 0], and the one-hot encoding for class 2 is [0, 0, 1].
  prefs: []
  type: TYPE_NORMAL
- en: 'With this in mind, let’s visit the formula for categorical cross-entropy. There
    will be two summations: the outer one loops through each individual logits (z)
    and ground truth (y) pair. The logits is of the same dimension as the one-hot
    encoded y vector. The index where the logits is maximum is the class prediction
    of the model. Now refer to Equation [5-12](#Par151).'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ CE=-\frac{1}{N}\sum \limits_{i=1}^N\sum \limits_{j=1}^C{y}_{i,j}\log \left(
    softmax{\left({z}_i\right)}_j\right) $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_Equo.png)'
  prefs: []
  type: TYPE_IMG
- en: '***Equation 5-12.****The categorical cross-entropy loss**. Here, y*[*i*] *is
    the i*^(*th*) *ground truth/target value that corresponds with x*[*i*]*, the i*^(*th*)
    *input value being passed in. z*[*i*] *refers to the output logits of the model
    (no* `softmax()` *is applied) that was produced by the neural network given x*[*i*]*.
    C refers to the total number of classes and is also the length of each y*[*i*]
    *vector*'
  prefs: []
  type: TYPE_NORMAL
- en: Equation [5-13](#Par153) shows the categorical cross-entropy loss without one-hot
    encoded true labels. In this case, the true labels are just an array of integer
    labels. This is a simplified version of Equation [5-12](#Par151) that does not
    require additional one-hot encoding processing of the ground truths.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ CE=-\frac{1}{N}\sum \limits_{i=1}^N\log \left( softmax{\left({z}_i\right)}_{y_i}\right)
    $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_Equp.png)'
  prefs: []
  type: TYPE_IMG
- en: '***Equation 5-13.****A simpler, equivalent version of Equation* [*5-12*](#Par151)*.
    All that is required is the score at the index of the y-label of the logits after*
    `softmax()`'
  prefs: []
  type: TYPE_NORMAL
- en: This is equivalent to Equation [5-12](#Par151) because, looking at it closer,
    the one-hot encoding of the y vector sets the summation terms to 0 anywhere other
    than the index containing 1, so these terms do not contribute to the loss function
    anyway.
  prefs: []
  type: TYPE_NORMAL
- en: Now that you know some of the basic loss functions that we will use in regression
    and classification tasks, let’s get into how exactly neural networks update the
    weights and biases using the loss and calculated gradients.
  prefs: []
  type: TYPE_NORMAL
- en: Gradient Descent and Backpropagation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Recall that neural networks update their weights using gradients, which are
    calculated through backpropagation during the backward pass. So, what are these
    gradients, and how exactly are they computed? To follow the code used to generate
    the graphs in this section, refer to the notebook at [`https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%205%20Introduction%20to%20Deep%20Learning/chapter5_gradient_descent.ipynb`](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%205%20Introduction%20to%20Deep%20Learning/chapter5_gradient_descent.ipynb).
  prefs: []
  type: TYPE_NORMAL
- en: If you remember from calculus class, the **derivative** is the instantaneous
    rate of change of a function at a specific point with respect to a single variable.
    Take a simple graph like the parabola with its equation of y=x². Its derivative
    is simply ![$$ \frac{dy}{dx}=2x $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_IEq3.png).
    Refer to Figure [5-23](#Fig23) to see this graphically.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig23_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A line graph titled, graph of x squared and its derivative at x equals 2\. The
    graph plots a curve labeled y equals x squared and a line labeled dy by dx equals
    2 x as follows. Curve (negative 2.75, 8), (negative 2, 4), (0, 0), (2, 3.5), (2.5,
    6). Line (1, 0), (2, 4), (3, 8). Values estimated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-23
  prefs: []
  type: TYPE_NORMAL
- en: The graph of y=x² and its derivative function, ![$$ \frac{dy}{dx}=2x $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_IEq4.png).
    The instantaneous slope at x=y points in the direction of the maximum since the
    slope is 4\. Thus, if we want to find the minimum, we must simply go in the opposite
    direction, or –4\. This would lead us to the minimum at x=0
  prefs: []
  type: TYPE_NORMAL
- en: The slope has an interesting property in that it always points toward the direction
    on the original graph that would increase the y-value. For example, at x=2, the
    instantaneous slope (value of the derivative) is 4\. This means that at x=2, at
    that instant, the y-value is increasing by 4 for a 1 increase in x. As we keep
    increasing x, we will find that y keeps increasing as well.
  prefs: []
  type: TYPE_NORMAL
- en: If we look at a different graph, y = x³ – 5x², captured in Figure [5-24](#Fig24),
    we can see another example of how the derivative points toward a direction that
    would maximize the y-value.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig24_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A line graph titled, graph of x cubed minus 5 x squared and its derivative at
    x equals 2 plots the respective curves as follows. Y equals x cubed minus 5 x
    squared curve (negative 3, negative 70), (0, 0), (1, negative 5). dy by dx curve
    (1, negative 5), (2, negative 10), (3, negative 20).
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-24
  prefs: []
  type: TYPE_NORMAL
- en: The equation y = x³ – 5x² and its derivative, ![$$ \frac{dy}{dx}=3{x}^2-10x
    $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_IEq5.png) at x=2\.
    As we can see, the derivative at this instant is –8\. If we traveled in this direction
    (left), we would see an increase in the y-value until it hits the local maximum
    at x=0
  prefs: []
  type: TYPE_NORMAL
- en: This time, our derivative at x=2 is –8\. This can be interpreted as either an
    instantaneous rate of change of y decreasing by 8 for every increase of 1 in x,
    or y increasing by 8 for every decrease of 1 in x. Remember that slope is change
    in y over change in x, so the negative can apply to either the numerator or the
    denominator.
  prefs: []
  type: TYPE_NORMAL
- en: In this case, the derivative “points” at the local maximum of the graph at x=0\.
    This also happens to be the global maximum of the graph.
  prefs: []
  type: TYPE_NORMAL
- en: This definition works fine in a two-dimensional setting, but machine learning
    problems tend to deal with variables that can go up to even hundreds of dimensions.
    In a three-dimensional setting and beyond, we can extend the concept of a derivative
    and call it the **gradient**, which instead of a scalar value, is now a vector.
    For y = x² + z², thegradient would be ![$$ \nabla y=\left\langle \frac{\partial
    y}{\partial x},\frac{\partial y}{\partial z}\right\rangle $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_IEq6.png),
    where the *∂* symbol refers to the partial derivative.The partial derivative is
    just the derivative of y, which is multivariate, with respect to just one of the
    variables. Now, as we can see in Figure [5-25](#Fig25) (3D example of y = x² +
    z²), the same principles apply as we saw with the derivative in the 2D example.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig25_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A 3-D plot represents the y-function as a parabolic area. The tangent plane
    is represented as a diagonal plane. A point is marked on the x-z plane.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-25
  prefs: []
  type: TYPE_NORMAL
- en: A three-dimensional graph depicting the y function as well as a point at x=0.75,
    z=0.75, and the tangent plane
  prefs: []
  type: TYPE_NORMAL
- en: Since the gradient is just the higher-dimensional extension of the derivative,
    it stands to reason that the direction opposite of the gradient should point toward
    the minimum. Let’s assume that we have initialized our x and z values to be 0.75
    both (where the red dot is located in Figure [5-25](#Fig25)). Hypothetically,
    if we wanted to find the x and z values that would lead to the minimum y-value
    in this graph (x=0, z=0), then starting at x=0.75 and z=0.75, we should take a
    step in the opposite direction of the gradient. Not too large a step, but a small
    one so that we don’t overshoot the minimum. We can repeat this process of taking
    small steps many times until we get close to the minimum to find the values of
    x and z that effectively “minimize” y.
  prefs: []
  type: TYPE_NORMAL
- en: 'We can formulate this general “optimization step” as follows, where the gradient
    is with respect to x:'
  prefs: []
  type: TYPE_NORMAL
- en: x = x – step_size * gradient
  prefs: []
  type: TYPE_NORMAL
- en: The **step_size** parameter controls how large of an update step to take at
    each iteration. In this case, this step size can also be referred to as the **learning
    rate**. We will cover more details about the learning rate in the “Optimizers”
    section.
  prefs: []
  type: TYPE_NORMAL
- en: Having discussed the foundational theory, let’s see if we can apply this to
    a simple y=mx+b line and iteratively solve for m and b given some data.
  prefs: []
  type: TYPE_NORMAL
- en: First, let’s set up the problem. We want to approximate the line y = 4x + 3
    using the approximation ![$$ \hat{y} $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_IEq7.png)
    = mx+b with m = 1 and b = 0 as the initial starting values. The loss we will be
    using is MSE. We need to find the derivative of the MSE loss function with respect
    to m and with respect to b.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s go over how we can calculate this. First, we must begin with what the
    MSE loss function is defined to be. We will generalize the loss function to L(y,
    ![$$ \hat{y} $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_IEq8.png)),
    as shown in Equation [5-14](#Par170).
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ L\left(y,\hat{y}\right)=\frac{\sum \limits_i^N{\left({y}_i-{\hat{y}}_i\right)}^2\
    }{N} $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_Equq.png)'
  prefs: []
  type: TYPE_IMG
- en: '***Equation 5-14.****The equation for MSE loss* *referred to as L(y,* ![$$
    \hat{y} $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_IEq9.png)*)*'
  prefs: []
  type: TYPE_NORMAL
- en: The loss function in Equation 5-14 will serve as a feedback mechanism for how
    “bad” our predictions are using m and b. To achieve perfect predictions, we’d
    need to minimize the loss function so that, in the best case, it equals zero.
    Intuitively, what exactly does this mean? We can visualize the loss curve by taking
    a grid of m, b values, computing the corresponding loss, and plotting it. Refer
    to Figure [5-26](#Fig26).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig26_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A 3-D plot is composed of the axes labeled m, b, and loss. A parabolic plane
    that passes through the initial point (m = 1, and b = 0) and the optimal point
    (m = 4, b = 3) is plotted on it.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-26
  prefs: []
  type: TYPE_NORMAL
- en: The loss surface of our problem setup visualized with the initial starting point
    on this surface given by m = 1 and b = 0, and the optimal target point given by
    m = 4 and b = 3
  prefs: []
  type: TYPE_NORMAL
- en: As we can see in Figure [5-26](#Fig26), the parameter settings for m and for
    b are quite far off from what is optimal. If we took the gradient of the loss
    with respect to m and b, and took a step in the opposite direction of the gradient,
    m and b would be updated to be closer to the optimal m and b.
  prefs: []
  type: TYPE_NORMAL
- en: Now what would the gradient even look like? And how do we find the gradient
    of the loss function with respect to our variables? First, let’s use chain-rule
    to help us out. The gradients of the loss function with respect to m and b are
    given in Equation [5-15](#Par174) and Equation [5-16](#Par175).
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\partial L\left(y,\hat{y}\right)}{\partial m}=\frac{\partial L\left(y,\hat{y}\right)}{\partial
    \hat{y}}\ast \frac{\partial \hat{y}}{\partial m} $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_Equr.png)'
  prefs: []
  type: TYPE_IMG
- en: '***Equation 5-15.****The derivative of the* *loss function* *with respect to
    m can be obtained through chain-rule. We first find the derivative of the loss
    with respect to our predictions, then get the derivative of our prediction function
    with respect to m*'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\partial L\left(y,\hat{y}\right)}{\partial b}=\frac{\partial L\left(y,\hat{y}\right)}{\partial
    \hat{y}}\ast \frac{\partial \hat{y}}{\partial b} $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_Equs.png)'
  prefs: []
  type: TYPE_IMG
- en: '***Equation 5-16.***The same logic in Equation [*5-15*](#Par174) is applicable
    here, except we take the derivative of the prediction function with respect to
    b'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s derive each of these. The formula for the derivative of the loss function
    with respect to the prediction function is given in Equation [5-17](#Par177).
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\partial L\left(y,\hat{y}\right)}{\partial \hat{y}}=\frac{1}{N}\sum
    \limits_{i=1}^N\frac{\partial {\left({y}_i-{\hat{y}}_i\right)}^2}{\partial {\hat{y}}_i}=\frac{1}{N}\sum
    \limits_{i=1}^N\frac{2\left({y}_i-{\hat{y}}_i\right)\ast -\partial {\hat{y}}_i}{\partial
    {\hat{y}}_i}=\frac{1}{N}\sum \limits_{i=1}^N-2\left({y}_i-{\hat{y}}_i\right) $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_Equt.png)'
  prefs: []
  type: TYPE_IMG
- en: '***Equation 5-17.****The derivative of the loss with respect to the prediction
    function*'
  prefs: []
  type: TYPE_NORMAL
- en: Next, let’s derive the derivatives of the prediction function with respect to
    m and b. Refer to Equations [5-18](#Par179) and [5-19](#Par180).
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\partial \hat{y}}{\partial m}=\frac{\partial \left( mx+b\right)}{\partial
    m}=x $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_Equu.png)'
  prefs: []
  type: TYPE_IMG
- en: '***Equation 5-18.****When you have several variables but need to take the derivative
    with respect to only one, treat the other variables as a constant. This leaves
    us with a simple result of just x*'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\partial \hat{y}}{\partial b}=\frac{\partial \left( mx+b\right)}{\partial
    b}=1 $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_Equv.png)'
  prefs: []
  type: TYPE_IMG
- en: '***Equation 5-19.***Similarly, we achieve a simple result of just 1 by following
    the logic in Equation [*5-18*](#Par179) but taking the derivative with respect
    to b this time'
  prefs: []
  type: TYPE_NORMAL
- en: Putting it all together, we achieve Equations [5-20](#Par182) and [5-21](#Par183).
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\partial L\left(y,\hat{y}\right)}{\partial m}=\frac{1}{N}\sum \limits_{i=1}^N-2\left({y}_i-{\hat{y}}_i\right)\ast
    x $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_Equw.png)'
  prefs: []
  type: TYPE_IMG
- en: '***Equation 5-20.****Plugging in the earlier derivations, we get the final
    derivative equation for the derivative of the loss with respect to m*'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\partial L\left(y,\hat{y}\right)}{\partial b}=\frac{1}{N}\sum \limits_{i=1}^N-2\left({y}_i-{\hat{y}}_i\right)\ast
    1 $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_Equx.png)'
  prefs: []
  type: TYPE_IMG
- en: '***Equation 5-21.****Similarly, we obtain the derivative of the loss with respect
    to b*'
  prefs: []
  type: TYPE_NORMAL
- en: This type of derivation is the same principle that powers neural networks. If
    you have many nested layers, you simply need to apply chain-rule until you can
    get the derivative that you need. This is how we can obtain all of the gradients
    that we need. With this in mind, let’s minimize the loss curve using simple **gradient
    descent**. Gradient descent is the process of iteratively updating some learnable
    parameters by taking small steps in the opposite direction of computed gradients
    with respect to these parameters. Our update steps for m and b are shown in Equation
    [5-22](#Par185) and Equation [5-23](#Par186), respectively.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ m=m- step\_ size\kern0.5em \ast \frac{\partial L\left(y,\hat{y}\right)}{\partial
    m} $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_Equy.png)'
  prefs: []
  type: TYPE_IMG
- en: '***Equation 5-22.****The update step to update m toward the optimal m*'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ b=b- step\_ size\kern0.5em \ast \frac{\partial L\left(y,\hat{y}\right)}{b}
    $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_Equz.png)'
  prefs: []
  type: TYPE_IMG
- en: '***Equation 5-23.****The update step to update b toward the optimal b*'
  prefs: []
  type: TYPE_NORMAL
- en: With our starting values of m=1 and b = 0, our initial predictions look like
    Figure [5-27](#Fig27).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig27_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A line graph titled, estimated line for m = 1 and b = 0\. It plots 2 lines labeled
    true line and predicted line that pass through the following points. True line
    (0, 3), (1, 7), (2, 11), (2.5, 13). Predicted line (0, 0), (1, 1), (2.5, 2), (3,
    3). Values are estimated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-27
  prefs: []
  type: TYPE_NORMAL
- en: A comparison between the true line we want to approximate and the predicted
    line using m=1 and b=0
  prefs: []
  type: TYPE_NORMAL
- en: With a step size of 0.001 and 1,000 iterations (both arbitrarily chosen), we
    will run gradient descent and plot the results. Be sure to follow along with the
    code to find out how to implement gradient descent from scratch as well as visualize
    all these plots. After running this, we obtained values for m and b to be approximately
    m=4.34 and b = 2.28 after rounding. Refer to Figure [5-28](#Fig28) to see the
    predicted line this time.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig28_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A line graph titled, estimated line for m = 4.337094299306109 and b = 2.278258979398369\.
    It plots 2 lines labeled true line and predicted line that pass through the following
    points. True line (0, 3), (1, 7), (2, 11), (2.5, 13). Predicted line (0, 2), (0.5,
    4), (2.5, 13). Values are estimated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-28
  prefs: []
  type: TYPE_NORMAL
- en: Plotting the approximation of the true line after running gradient descent.
    It is clear that while it’s not the most optimal, the learned parameters are pretty
    close to the true values of m=4 and b=3
  prefs: []
  type: TYPE_NORMAL
- en: Let’s now look at how the learned m and b parameters appear on the loss curve.
    Refer to Figure [5-29](#Fig29).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig29_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A 3-D graph plots a descending parabolic plane that passes through 3 points,
    labeled initial, estimated, and optimal. The estimated and optimal points are
    close to each other.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-29
  prefs: []
  type: TYPE_NORMAL
- en: The estimated parameters of m and b result in a loss that is very close to the
    optimal loss. Gradient descent worked, even if the resulting parameters are not
    fully optimal
  prefs: []
  type: TYPE_NORMAL
- en: From Figure [5-29](#Fig29), we can gather that gradient descent is a simple
    yet powerful mechanism to allow us to learn parameters to approximate various
    functions. It is this same premise that powers deep learning models, even extremely
    capable models like ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are some variations of gradient descent to be aware of:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Stochastic gradient descent**: Performing a gradient update after computing
    the gradient for each individual data sample'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Mini**-**batch gradient descent**: Performing a gradient update after computing
    the averaged gradients for a mini-batch of N data samples'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Batch gradient descent:** Performing a gradient update after computing the
    average gradient for the entire batch of data'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There are certain observations to be made for each.
  prefs: []
  type: TYPE_NORMAL
- en: '**Stochastic gradient descent (SGD)** can be thought of as having a mini-batch
    size of 1, although mini-batch gradient descent is sometimes referred to as SGD.
    The pros and cons of stochastic gradient descent are list next.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Pros:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Computationally efficient**: You only need a sample size of one, so in terms
    of resources and computational time, it is really quick and not as demanding.
    If you have a very large, computationally hungry model, sometimes SGD is the only
    way you can run it on your machine.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Escaping local minima**: In very complex loss curves, there may be local
    minima (local valleys) that aren’t as good as other minima (other local minima
    with lower loss or global minima). Sometimes, gradients may point to these suboptimal
    minima, and the learning process might be stuck at a bad solution.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With the potential noisiness of SGD updates, we might arrive at a parameter
    setting that escapes this valley, allowing the new gradients to point toward a
    deeper/more optimal minimum. This way, the learning process eventually learns
    a better set of parameters that results in a lower loss than if learning stopped
    at the earlier, shallower minimum.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Cons:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Unstable**: Updating variables based on feedback from just one sample might
    introduce a lot of noisiness and lead to suboptimal optimization steps.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Assume for a second you’re a tourist in Italy and need to find the Leaning
    Tower of Pisa. The true location is somewhere northwest of you. You plan to keep
    asking tourists after traversing some arbitrary distance (taking a gradient descent
    step). You ask four people: three point north (correct direction), while the other
    points southeast. The directions received from these people represent individual
    gradient directions toward the minimum. If you followed SGD, you’d take three
    “steps” north, and then take a step southeast. However, if you used mini-batch
    or even batched gradient descent, you’d consider the average direction, north.'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Poorer convergence**: Because of the potentially noisy and unstable nature
    of SGD optimization, you might have trouble converging more closely to the optimal
    solution; the parameter values might keep oscillating around the minimum on the
    loss curve due to the noisy updates.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Mini-batch gradient descent** considers mini-batches (commonly just referred
    to as having a batch size of N) of N data samples at a time when performing gradient
    updates. This helps to average out the noise and allows for more accurate update
    steps toward the minimum.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Pros:'
  prefs: []
  type: TYPE_NORMAL
- en: '**More stable**: Averaging out the noise helps to take more accurate update
    steps and potentially avoid unintended oscillation due to noise.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Computationally efficient**: Due to how neural networks are constructed,
    we can easily take advantage of the matrix form to perform the computations on
    batches of data at a time, improving throughput and taking advantage of the GPU’s
    parallel computation architectures. This allows mini-batch GD to be efficient
    and fast if you have the hardware.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Con:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Batch-size hyperparameter**: The mini-batch size becomes a hyperparameter
    to tune. Too small, and you may make the optimization more susceptible to the
    noisiness of the data. Too large, and you might average out the gradients too
    much, potentially leading to the parameters getting stuck in some local minimum.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Mini-batch gradient descent is usually the optimal learning strategy when incorporating
    gradient descent learning, and it is by far the most prevalent in practice. It
    can lead to better convergence to more optimal solutions, as SGD is too vulnerable
    to noise and tends to oscillate too much, while batch gradient descent dulls out
    the signal too much and may lead to suboptimal solutions that are unable to escape
    local minima.
  prefs: []
  type: TYPE_NORMAL
- en: With a better, more thorough understanding of gradient descent and the mechanism
    behind the training process, let’s move on to how we can interpret the loss curves
    of neural networks.
  prefs: []
  type: TYPE_NORMAL
- en: Loss Curve
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Loss curves can tell us a lot about a model’s training process as well as its
    ability to generalize to new data. Recall that we can split the data into training,
    validation, and testing sets. The training set is obviously what we train the
    model on. More specifically, it is what we pass through the network, compute the
    loss and perform gradient descent with.
  prefs: []
  type: TYPE_NORMAL
- en: One **epoch** represents one full pass of the entire training dataset through
    the network. Regardless of what batch size you use (1 being SGD, the full number
    of training samples, and N being batch gradient descent, with mini-batch gradient
    descent using a batch size anywhere in between), once the model has seen every
    sample of data in the training set, you have completed one epoch of training.
  prefs: []
  type: TYPE_NORMAL
- en: The validation set can serve as a blind “test” set that you evaluate your neural
    network on after one epoch of training. Really, it is up to the implementation
    how the validation set is used, but ideally, it will give you a good indication
    of the training process and what the model’s generalization capabilities look
    like.
  prefs: []
  type: TYPE_NORMAL
- en: The test set is something you use for model evaluation after your training process
    has been completed.
  prefs: []
  type: TYPE_NORMAL
- en: The loss curve shows the current training loss over the number of iterations,
    optimization steps, or epochs, depending on how you display it. The goal is to
    simply display the loss as the training progresses.
  prefs: []
  type: TYPE_NORMAL
- en: For the code used to generate the graphs in this section, be sure to refer to
    the accompanying notebook at [`https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%205%20Introduction%20to%20Deep%20Learning/chapter5_overfitting.ipynb`](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%205%20Introduction%20to%20Deep%20Learning/chapter5_overfitting.ipynb).
  prefs: []
  type: TYPE_NORMAL
- en: Figure [5-30](#Fig30) shows an example training and validation loss curve that
    was obtained during the training process. A convolutional neural network was trained
    on the MNIST dataset for 64 epochs (to make overfitting more likely to occur,
    a higher number of epochs was chosen).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig30_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A line graph titled, loss curve plots loss versus epoch, for training loss and
    validation loss as follows. Training loss (0, 2), (2, 0.25), (10, 0.125), (20,
    0.1), (60, 0). Validation loss (0, 0.75), (10, 0.13), (60, 0.25). Overfitting
    is represented as a dashed vertical line at epochs = 16.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-30
  prefs: []
  type: TYPE_NORMAL
- en: An example of a neural network loss curve showing both the training loss and
    the validation loss. When the validation loss reaches its lowest point and starts
    ticking upward again, you have crossed the line into overfitting, which is shown
    by the red dashed vertical line on epoch 17
  prefs: []
  type: TYPE_NORMAL
- en: As you can see in Figure [5-30](#Fig30), both training and validation loss start
    off high and then decline over time. At some point, both training loss and validation
    loss are at their lowest, which is the best time to stop the training of the network
    so that you can ensure the model doesn’t continue to overfit but instead generalizes
    as best as it can.
  prefs: []
  type: TYPE_NORMAL
- en: The accuracy curve, plotting the training accuracy and validation accuracy throughout
    the training process, is shown in Figure [5-31](#Fig31).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig31_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A line graph titled, accuracy curve plots training accuracy and validation accuracy
    curves as follows. Training accuracy (0, 0.4), (2, 0.95), (30, 0.975), (40, 0.98),
    (60, 1). Validation accuracy (0, 0.74), (10, 0.96), (30, 0.965), (50, 0.97). Values
    are estimated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-31
  prefs: []
  type: TYPE_NORMAL
- en: Graph showing the training accuracy against the validation accuracy. Gains in
    validation accuracy stop after some point, while training accuracy keeps getting
    better. This is yet another sign of overfitting
  prefs: []
  type: TYPE_NORMAL
- en: If the training is allowed to continue, the training loss decreases, but the
    validation loss starts to increase. This is a clear sign the model is overfitting.
    If we were to pick an epoch to stop at, we could simply take the epoch with the
    lowest validation loss, which happens to be epoch 17 in this particular training
    run.
  prefs: []
  type: TYPE_NORMAL
- en: If you rerun the code for this section, your epoch where overfitting begins
    may differ, but you should see similar results to the graphs shown here. The graph
    in Figure [5-30](#Fig30) shows the approximate point at which the validation loss
    starts to tick upward again. The graph in Figure [5-30](#Fig30) shows a similar
    trend, where we get a disparity between the training accuracy and validation accuracy
    as we keep training the model because the training accuracy keeps improving while
    the validation accuracy either stagnates or very slightly starts to decrease.
  prefs: []
  type: TYPE_NORMAL
- en: So how can we combat overfitting? We can employ a bunch of regularization techniques
    combined with early stopping to ensure we get the model to generalize as best
    as it can.
  prefs: []
  type: TYPE_NORMAL
- en: Regularization
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'There are a variety of techniques that we can use to combat overfitting:'
  prefs: []
  type: TYPE_NORMAL
- en: '**L1/L2 penalty**: We can apply a penalty by using either the L1 norm (sum
    of absolute value of weights) or the L2 norm (sum of squares of the weights),
    incentivizing them to become smaller in magnitude to minimize the penalty.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Dropout**: Given the probability of retaining a node, p, we randomly deactivate
    certain nodes within a layer and prevent them from passing a signal to the next
    layer. This process repeats with each forward pass, so no neuron is guaranteed
    to stay active across successive forward passes.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These deactivated neurons also do not contribute toward the backward pass, so
    they do not take part in the training process whatsoever if they are dropped.
    Since the following layer can no longer rely on any one neuron to be present during
    the forward pass, it must learn to form connections with as many other neurons
    as it can. This helps avoid overfitting and promotes generalization because single
    neurons will no longer dominate the connections with the following layer and such
    connections cannot take place as easily.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Early stopping**: As discussed in the previous section on loss curves, early
    stopping halts training at the point of best generalization performance (using
    the blind validation data that the model never trains on) so that the model won’t
    have overfit on the data. To simply stop overfitting just as it starts to occur
    is a form of regularization to ensure your model generalizes.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**More training data**: Sometimes, your training data cannot sufficiently capture
    the possible input space compared to the test data or any other new data. In these
    cases, adding more, diverse training samples can help the model properly learn
    the task and generalize better.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As an example of this, if you trained a model only on clear images of dogs and
    cats but then evaluated the model on a test dataset that also included partially
    obscured images, the model would not generalize well, and would have overfit to
    the training data. Adding images with occlusion in the training data can help
    the model properly learn the task and generalize better to the new data.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: You can use any combination of these techniques to help your model generalize
    well to new data, although you don’t necessarily want to go too hard on the regularization
    because that might actually lead to worse performance overall.
  prefs: []
  type: TYPE_NORMAL
- en: A model that is overregularized (such as too harsh of an L1/L2 penalty combined
    with too high a dropout rate) can fail to learn the training task properly, consequently
    doing worse on the testing set since training went poorly.
  prefs: []
  type: TYPE_NORMAL
- en: Both Keras and PyTorch allow you to implement these techniques. The parameter
    regularizers are something supported by the frameworks themselves as you construct
    the neural network architecture. We will go over this in the examples of a supervised
    neural network later this chapter.
  prefs: []
  type: TYPE_NORMAL
- en: Dropout is also supported by both frameworks. Early stopping is easily supported
    in Keras, though in PyTorch, you will have to manually code this as part of the
    training loop. We will implement this in our PyTorch example.
  prefs: []
  type: TYPE_NORMAL
- en: Optimizers
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There are many optimizer techniques that go beyond simple gradient descent.
    We previously covered stochastic gradient descent, but we can make many modification
    to SGD to improve the optimization process and help the neural networks converge
    to better solutions.
  prefs: []
  type: TYPE_NORMAL
- en: In the context of optimization, **convergence** means to iteratively arrive
    at an optimal set of weights that minimizes loss to a certain extent. We cannot
    find the globally optimal set of weights to find the globally optimal minimum,
    because iterative techniques won’t ever exactly arrive at the best solution, but
    they can get very close to it.
  prefs: []
  type: TYPE_NORMAL
- en: So, when a model converges to a solution, it has arrived at some local minimum
    on the loss curve, but not necessarily the best global minimum. The opposite scenario
    is when a model **diverges** or starts to balloon up the loss instead of minimizing
    it. Diverging models are a sign of instability in your network or training setup
    and may indicate poor hyperparameter settings (too high a learning rate can lead
    to large optimization steps).
  prefs: []
  type: TYPE_NORMAL
- en: Covering the optimization methods would get deeply mathematical very quickly,
    so we will just go over the high-level intuition behind each optimizer as well
    as its pros and cons. If you are interested in the code to generate the visualizations
    in this section, refer to the notebook at [`https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%205%20Introduction%20to%20Deep%20Learning/chapter5_optimizers.ipynb`](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%205%20Introduction%20to%20Deep%20Learning/chapter5_optimizers.ipynb).
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s formally go over the generalized SGD algorithm. Before we get into the
    code itself, let’s go over the variables and functions:'
  prefs: []
  type: TYPE_NORMAL
- en: '`compute_gradient()`: An abstract function that takes the loss, the data, and
    the learnable parameters of the model and returns the corresponding gradients.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`parameters`: A list of the weights and biases of some arbitrary neural network.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`gradients`: A list of the gradients of the weights and biases in the variable
    `parameters`. The gradients correspond one-to-one to the parameters as the order
    is preserved.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`lr`: The step size used in the gradient update.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Figure [5-24](#Fig24) demonstrates the variations of the SGD algorithm on the
    function in shown in Equation [5-24](#Par246).
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ y=\sin \frac{\left(4\pi x\right)}{3.75x}+{\left(x-1\right)}^4 $$](../images/483137_2_En_5_Chapter/483137_2_En_5_Chapter_TeX_Equaa.png)'
  prefs: []
  type: TYPE_IMG
- en: '***Equation 5-24.****A variation of the Gramacy & Lee (2012) function (Source:*
    [`https://www.sfu.ca/~ssurjano/grlee12.xhtml`](https://www.sfu.ca/%257Essurjano/grlee12.xhtml)*)*'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig32_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A line graph plots y versus x curve passing through the following points. (0.5,
    0), (0.625, 0.5), (1.125, 0.5), (1.5, 0.4), (2, 1), (2.25, 2.5), (2.5, 5). Values
    are estimated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-32
  prefs: []
  type: TYPE_NORMAL
- en: The function we will apply SGD and its variations on. This function can be thought
    of as the loss function we are trying to minimize by finding the optimal x. There
    are a couple local minima in the graph that must be overcome in order to reach
    the global minima (lowest point on the graph). A poor optimizer will get stuck
    in a local minima that is suboptimal, which would result in the model achieving
    subpar performance since it would not minimize the loss as well as it could
  prefs: []
  type: TYPE_NORMAL
- en: Refer to Figure [5-33](#Fig33) to see the template code for SGD’s update algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig33_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A code snippet reads as follows. For batch in training underscore data. Gradients
    equal compute underscore gradient lef parenthesis loss, batch, parameters right
    parenthesis. For p in range left parenthesis len left parenthesis parameters right
    parenthesis and further.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-33
  prefs: []
  type: TYPE_NORMAL
- en: SGD training loop including the gradient update step. The gradients are computed
    and the update step is executed. The base SGD algorithm is very simple
  prefs: []
  type: TYPE_NORMAL
- en: Utilizing PyTorch and a starting x-value of 2.25, we iteratively use base SGD
    over 1,000 iterations to see if we can converge to a good solution. The resulting
    optimization history is shown in Figure [5-34](#Fig34).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig34_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A line graph titled, optimizer s g d. It plots a curve that passes through the
    following points. (0.5, 0), (1.25, 0), (1.75, 0.5), (2.5, 5). Bold solid dots
    are marked on the curve at the following points (1.75, 0.5), (2, 1.4), (2.25,
    2.5). Values are estimated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-34
  prefs: []
  type: TYPE_NORMAL
- en: Base SGD’s optimization performance over 1,000 iterations. The optimizer got
    stuck in the local minimum
  prefs: []
  type: TYPE_NORMAL
- en: As we can see in Figure [5-34](#Fig34), SGD got stuck in a very shallow local
    minimum, having reached the minimum loss in 52 iterations. How can we improve
    upon this and keep the optimizer going toward a better minimum? This is where
    the concept of **momentum** comes in. Imagine the red dots as a ball rolling down
    the hill. Wouldn’t it be great if the ball accrued some momentum that kept it
    going forward, allowing it to overcome that tiny hill and keep going until it
    fell into a deeper minimum?
  prefs: []
  type: TYPE_NORMAL
- en: To achieve this, we can use the concept of **velocity**, which is a decaying
    average of accumulated gradients added to the gradient update. This gives the
    optimizer some inertia that helps overcome shallow valleys in the curvature as
    well as dampen any oscillating behavior.
  prefs: []
  type: TYPE_NORMAL
- en: 'Figure [5-35](#Fig35) shows the SGD with momentum training loop algorithm.
    There are two additional variables to consider:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig35_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A code snippet applies the gradient descent with momentum to iteratively update
    the model parameters, to minimize the loss function during the training process.
    It updates the velocities for each parameter using a momentum term alpha and the
    computed gradients.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-35
  prefs: []
  type: TYPE_NORMAL
- en: Adding the concept of velocity to the base SGD algorithm with the decay of accumulated
    gradient updates controlled by alpha
  prefs: []
  type: TYPE_NORMAL
- en: '`velocities`: An initial vector of all zeros that, like the variable `gradients`,
    corresponds one-to-one with each parameter by index. This variable holds the decaying
    average of the accumulated gradient updates to be added to the new gradient update
    to add inertia to the optimization process.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`alpha`: A coefficient applied to the old velocity when adding it to the update
    step. It controls the rate of decay of the accumulated velocity. A high `alpha`
    value adds much more weight to past gradients and adds a lot more inertia. An
    `alpha` closer to zero makes SGD with momentum behave more like plain SGD, with
    `alpha` equal to zero being vanilla SGD exactly.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Revisiting the prior function in Figure [5-34](#Fig34), Figure [5-36](#Fig36)
    shows how this simple modification has allowed the optimizer to overcome the minima.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig36_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A line graph titled, optimizer plots a curve that passes through the following
    points. (0, 0.5), (1, 0), (1.65, 0.5), (2, 1), (2.25, 2.5). Values are estimated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-36
  prefs: []
  type: TYPE_NORMAL
- en: Performance of SGD with momentum optimizer. The momentum coefficient, alpha,
    was set to 0.9
  prefs: []
  type: TYPE_NORMAL
- en: The optimizer reached the lowest loss in 190 iterations and has hit the global
    minimum. However, as we can see, quite a bit of oscillation is still going on,
    likely because there is a lot of inertia retained that needs to be dissipated.
    There is yet another modification we could make here. Wouldn’t it be nice if the
    red ball were able to see where it was heading and decelerate if needed? This
    way it could start “braking” before reaching some minimum so that it could converge
    much sooner.
  prefs: []
  type: TYPE_NORMAL
- en: This is where **Nesterov momentum** comes into play. The idea with Nesterov
    momentum is that when computing the gradients, we will not use the active parameters
    for that current iteration, but rather a gradient-updated “future” version of
    those parameters. In a sense, the optimizer “looks ahead” into the future, allowing
    it to compute a different, final gradient update with this “future” outcome in
    mind. This will result in acceleration/deceleration as well as more accurate gradient
    updates. Now, the optimizer won’t oscillate as much because there won’t be as
    much accumulated velocity that needs to be shed—the optimizer would decelerate
    in advance before hitting the bottom of a steeper valley, for example.
  prefs: []
  type: TYPE_NORMAL
- en: The code for SGD with Nesterov (also referred to as Nesterov Accelerated Gradient,
    or NAG) is shown in Figure [5-37](#Fig37).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig37_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A code snippet implements a variant of gradient descent with a look-ahead update
    mechanism. The code initializes a velocity vector for each parameter = 0 and then
    computes the gradients of the loss function with respect to each parameter.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-37
  prefs: []
  type: TYPE_NORMAL
- en: Before we compute the gradients, we update the parameters with the existing
    accumulated velocity. In this sense, the optimizer “looks ahead” to see where
    the momentum would carry it, and with the new gradients, it can apply any correction
    such as acceleration/deceleration, resulting in more accurate parameter updates
  prefs: []
  type: TYPE_NORMAL
- en: Figure [5-38](#Fig38) shows the results of this modification to SGD with momentum.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig38_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A line graph titled, optimizer s g d nesterov plots a curve that passes through
    the following points. (0.5, 0), (1.125, 0.4), (1.5, 0.35), (2, 1), (2.25, 2.5),
    (2.5, 5). Values are estimated. Plotted on the curve are solid balls.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-38
  prefs: []
  type: TYPE_NORMAL
- en: Compared to Figure [5-36](#Fig36), SGD with Nesterov momentum looks like it
    had far fewer oscillations. At the global minimum, it looks like the “red ball”
    was able to slow down. Over the hump just before the global minimum, it looks
    like it slowed down at the peak but accelerated toward the valley once it got
    over. Using the “ball on a hill” analogy, this looks much more realistic, direct,
    and iteration-efficient compared to the prior versions of SGD
  prefs: []
  type: TYPE_NORMAL
- en: As we can see in Figure [5-38](#Fig38), the optimizer looked like it converged
    much sooner with less oscillation. Indeed, the lowest loss was achieved in 42
    iterations.
  prefs: []
  type: TYPE_NORMAL
- en: Although this looks like a huge improvement over SGD and SGD with momentum and
    is a pretty good optimizer, it isn’t perfect. One issue is the fact that the learning
    rate remains constant. We could manually adjust this or use a learning rate scheduler
    that automatically changes learning rate over time, but then the learning rate
    would become yet another hyperparameter to tune.
  prefs: []
  type: TYPE_NORMAL
- en: It would be great to have an optimizer that could dynamically update the learning
    rate, wouldn’t it? There are optimizers like RMSProp and Adadelta that deal with
    some decaying average of the square of accumulated gradients to dynamically adapt
    the learning rate per parameter and follow the topology of the loss curve better.
    They are also well suited for higher-dimensional problems as well as sparse data
    in general, making optimizers like RMSProp a strong optimizer for situations like
    training Long-Short Term Memory (LSTM) models for natural language processing
    (NLP) problems such as sentiment analysis or text generation.
  prefs: []
  type: TYPE_NORMAL
- en: 'Figure [5-39](#Fig39) shows the RMSProp code. There are a few new variables
    to consider:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig39_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A code snippet implements the R M S prop update equation. It initializes a vector
    r of the same length as the parameters with zeros. Then, it computes the gradients
    of the loss function for each parameter. The algorithm uses an exponentially decaying
    average of squared gradients.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-39
  prefs: []
  type: TYPE_NORMAL
- en: The RMSProp update equation. The update step coefficient of the gradients will
    differ across iterations, effectively making the step size (learning rate) dynamic.
    You can set some initial learning rate, but throughout training, it will vary
  prefs: []
  type: TYPE_NORMAL
- en: '`r`: The squared gradient accumulation variable. Similar to velocity, it holds
    the exponentially decaying average of the squared gradients.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`rho`: The decay coefficient.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`eps`: A very small number, like 1e-6 or 1e-7, added for numerical stability.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The function that we used to demonstrate SGD and its variations on is too simple
    to properly showcase the perks of RMSProp, so we will do a full comparison of
    all the optimizers we discussed along with the Adam optimizer.
  prefs: []
  type: TYPE_NORMAL
- en: The Adam optimizer can be thought of as a “best-of-both-worlds” type optimizer
    that incorporates momentum as well as accumulated squared gradients like in RMSProp
    and Adadelta.
  prefs: []
  type: TYPE_NORMAL
- en: Although RMSProp can be modified to include momentum (and even Nesterov momentum),
    the Adam optimizer incorporates bias correction (allowing for more stable learning,
    especially earlier in the training process). The Adam optimizer is also more robust
    to hyperparameter choices, making it a great go-to optimizer across various different
    training tasks. The Adam optimizer has also been found to typically outperform
    RMSProp. With these advantages, the Adam optimizer is used pretty widely in practice.
  prefs: []
  type: TYPE_NORMAL
- en: However, there is no best overall optimizer, and what optimizer performs best
    can vary based on the training task. Each optimizer also has pros and cons. For
    example, the Adam optimizer is much more memory intensive due to how many variables
    it uses. In comparison, SGD is more memory efficient and is computationally lighter,
    though it may not be the best-performing optimizer. It may be worth trying out
    different optimizers with different hyperparameter settings if you have the computational
    power to spare and if performance is a very high priority.
  prefs: []
  type: TYPE_NORMAL
- en: 'The code for the Adam optimizer is show in Figure [5-40](#Fig40). It introduces
    several new parameters to consider:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig40_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A code snippet implements the Adam optimizer. It initializes variables s and
    r and iterates over batches in the training data, computing the gradients of the
    loss function for each parameter.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-40
  prefs: []
  type: TYPE_NORMAL
- en: The pseudocode for the Adam optimizer. It is more resource heavy due to having
    to store the first-order momentum as well as the squared gradients. We must also
    keep track of the iteration number
  prefs: []
  type: TYPE_NORMAL
- en: '`s`: The first-order moment array. Similar to the `velocities` vector, `s`
    stores the velocities and can be considered akin to momentum.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`r`: The second-order moment array. Like in RMSProp, this holds the squared
    gradients and computes an exponentially decaying average on it.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`beta1`: The exponentially decaying average coefficient used for the first-order
    moment `s` vector.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`beta2`: The exponentially decaying average coefficient used for the second-order
    moment `r` vector.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`eps`: A very small number added for numerical stability, typically something
    like 1e-6 or 1e-7.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`t`: The iteration counter. Keeps count of what iteration of forward pass it
    is.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As you can see in Figure [5-40](#Fig40), the Adam optimizer is a bit more computationally
    involved than the other optimizer algorithms previously introduced. It keeps track
    of both the first-order moment (the momentum) and the second-order moment (the
    accumulation of the squared gradients we saw in RMSProp). The Adam optimizer can
    also be modified to incorporate Nesterov momentum.
  prefs: []
  type: TYPE_NORMAL
- en: Having covered SGD, SGD + momentum, NAG, RMSProp, and the Adam optimizer, let’s
    see how each of these optimizers performs on a simple neural network trained on
    the MNIST dataset. All of the optimizers will have a learning rate of 1e-3, be
    trained on a batch size of 256, and be trained for 64 epochs.
  prefs: []
  type: TYPE_NORMAL
- en: For more details on the experimental setup, be sure to refer to the accompanying
    Jupyter notebook on GitHub at [`https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%205%20Introduction%20to%20Deep%20Learning/chapter5_optimizer_comparison.ipynb`](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%205%20Introduction%20to%20Deep%20Learning/chapter5_optimizer_comparison.ipynb).
  prefs: []
  type: TYPE_NORMAL
- en: Refer to Figure [5-41](#Fig41) to see the results.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig41_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A line graph titled, comparison of optimizers plots loss versus epochs curves
    for s g d, s g d momentum, s g d nesterov, r m s prop, adam, and nadam. The curves
    have a rectangular hyperbolic declining trend.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-41
  prefs: []
  type: TYPE_NORMAL
- en: The training results of all of the optimizer setups. This time, RMSProp performed
    the best out of all the optimizers, reaching convergence the soonest as well as
    achieving the best solution. SGD performed the worst by far, with Adam and Nadam
    eventually reaching a similarly optimal solution as RMSProp did
  prefs: []
  type: TYPE_NORMAL
- en: It is important to keep in mind that this is a simple toy example and not necessarily
    indicative of real-world performance in all cases. These problems are far too
    complex, but as a general rule of thumb, the Adam optimizer is a relatively good
    pick to experiment with due to its robustness to the initial learning rate as
    well as its relatively quick rate of convergence.
  prefs: []
  type: TYPE_NORMAL
- en: In this case, RMSProp converged the soonest and to the best solution. Again,
    this isn’t always indicative of real-world performance, so if you can afford the
    computational costs, trying out several optimizers is a good strategy (via cross-validation,
    for example, to ensure experimentally sound results) to further boost your model’s
    performance.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have gone over all the major components of deep learning modeling,
    let’s begin creating our first supervised multilayer perceptron model for anomaly
    detection.
  prefs: []
  type: TYPE_NORMAL
