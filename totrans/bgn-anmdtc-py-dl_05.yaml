    PyTorch.
  id: totrans-715
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们从图 [5-78](#Fig78) 所见，这是一个非常强大的异常检测模型。现在您知道了如何在 PyTorch 中实现、训练和评估神经网络。
- en: Summary
  id: totrans-716
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: This chapter gave you a solid understanding of what deep learning is, how it
    works, and how you can implement neural networks in both TensorFlow/Keras and
    PyTorch. Using this knowledge, you should be able to follow along with the rest
    of the book as we delve into the implementation of various deep learning architectures
    to perform anomaly detection.
  id: totrans-717
