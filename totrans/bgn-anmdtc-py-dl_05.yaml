  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig76_HTML.png)'
- en: An output reads as follows. Precision 1.0\. Recall 0.9947275922671354\. F 1
    measure 0.9973568281938325.
  id: totrans-699
  prefs: []
  type: TYPE_NORMAL
  zh: 一个输出如下所示。精确度1.0。召回率0.9947275922671354。F1度量0.9973568281938325。
- en: Figure 5-76
  id: totrans-700
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-76
- en: The model achieved perfect precision, meaning all of its anomaly predictions
    were correct. Its recall was near perfect, meaning that of all the true anomalies,
    the model almost got all of them
  id: totrans-701
  prefs: []
  type: TYPE_NORMAL
  zh: 模型实现了完美的精确度，这意味着其所有异常预测都是正确的。其召回率几乎完美，这意味着在所有真实异常中，模型几乎都得到了它们。
- en: To compute the AUC score, execute
  id: totrans-702
  prefs: []
  type: TYPE_NORMAL
  zh: 要计算AUC分数，执行
- en: '[PRE1]'
  id: totrans-703
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: You should see a result somewhat like 0.9973637961335677, which indicates a
    very strong predictor.
  id: totrans-704
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该看到一个结果，类似于0.9973637961335677，这表明一个非常强大的预测器。
