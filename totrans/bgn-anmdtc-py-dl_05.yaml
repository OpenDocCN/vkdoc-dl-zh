  id: totrans-684
  prefs: []
  type: TYPE_NORMAL
  zh: 一个代码片段提供了对训练模型在测试集上的评估，包括每个批次的损失和准确度指标以及整个测试集的整体指标。
- en: Figure 5-73
  id: totrans-685
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-73
- en: The evaluation code, which is identical to the validation loop
  id: totrans-686
  prefs: []
  type: TYPE_NORMAL
  zh: 评估代码，与验证循环相同。
- en: The output of executing the code in Figure [5-73](#Fig73) should look somewhat
    like Figure [5-74](#Fig74).
  id: totrans-687
  prefs: []
  type: TYPE_NORMAL
  zh: 执行图[5-73](#Fig73)中代码的输出应该看起来类似于图[5-74](#Fig74)。
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig74_HTML.png)'
  id: totrans-688
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig74_HTML.png)'
- en: A one-line code reads as follows. Evaluating 730 slash 731 pipe symbol loss
    colon 0.00024468251649472625 accuracy colon 0.9999679020799452.
  id: totrans-689
  prefs: []
  type: TYPE_NORMAL
  zh: 一行代码的读法如下。评估730/731管道符号损失：0.00024468251649472625准确度：0.9999679020799452。
- en: Figure 5-74
  id: totrans-690
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-74
- en: Output of executing the evaluation code in Figure [5-73](#Fig73). The model
    achieved a very close convergence—closer than the Keras model in this case
  id: totrans-691
  prefs: []
  type: TYPE_NORMAL
  zh: 执行图[5-73](#Fig73)中评估代码的输出。模型实现了非常接近的收敛——比这个案例中的Keras模型更接近。
- en: Let’s now look at the precision, recall, and related metrics. Execute the code
    in Figure [5-75](#Fig75).
  id: totrans-692
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们看看精确度、召回率和相关指标。执行图[5-75](#Fig75)中的代码。
- en: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig75_HTML.png)'
  id: totrans-693
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_5_Chapter/483137_2_En_5_Fig75_HTML.png)'
- en: A code block that performs inference on the test set using the trained model
    m l p and computes precision, recall, and F1-measure scores for a classification
    task. It prints the calculated precision, recall, and F 1 measure scores.
  id: totrans-694
  prefs: []
  type: TYPE_NORMAL
  zh: 一个代码块，使用训练好的模型m l p在测试集上进行推理，并计算分类任务的精确度、召回率和F1度量分数。它打印出计算出的精确度、召回率和F1度量分数。
- en: Figure 5-75
  id: totrans-695
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-75
- en: Computing the precision, recall, and F1-measure scores
  id: totrans-696
  prefs: []
  type: TYPE_NORMAL
  zh: 计算精确度、召回率和F1度量分数
- en: You should see output like that shown in Figure [5-76](#Fig76).
  id: totrans-697
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该看到图[5-76](#Fig76)中所示的输出。
