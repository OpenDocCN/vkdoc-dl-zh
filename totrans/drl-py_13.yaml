- en: 13. Additional Topics and Recent Advances
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This is the last chapter of the book. Throughout the book, I have discussed
    in-depth many foundational aspects of reinforcement learning (RL). You learned
    about MDP and planning in MDP using dynamic planning. You learned about model-free
    value methods. You learned about scaling up solution techniques using function
    approximation, specifically with deep learning–based approaches such as DQN. The
    book also covered policy-based methods such as REINFORCE, TRPO, PPO, and so on,
    as well as unification of value and policy optimization methods in the actor-critic
    (AC) approaches. You explored the possibility of combining the model-based and
    model-free methods. A full chapter was devoted to dissecting PPO and its application
    in LLM fine-tuning with the RLHF approach. The previous chapter included an introduction
    to Multi-Agent RL (MARL).
  prefs: []
  type: TYPE_NORMAL
- en: Most of the discussion so far has been foundational and focused on mastering
    reinforcement learning. However, reinforcement learning is a rapidly expanding
    area with lots of specialized use cases in autonomous vehicles, robotics, and
    similar other fields. These go beyond the problem setup used throughout this book
    to explain the concepts.
  prefs: []
  type: TYPE_NORMAL
- en: This last chapter covers some of the topics that I think you should be aware
    of at a high level. I keep the discussion at a conceptual level with links to
    the relevant research/academic papers, where applicable. You may use these references
    to extend your knowledge horizon based on your individual interest area in the
    field of RL. Unlike previous chapters, you will not always find the detailed pseudocode
    or actual code implementations. This has been done on purpose to provide a survey
    of some emerging areas and new advances. You should use this chapter to get a
    30,000-foot understanding of different topics. Based on your specific interests,
    you are advised to dive deep into specific topics using the references given here
    as a starting point.
  prefs: []
  type: TYPE_NORMAL
- en: Other Interesting RL Environments
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: So far, the book has used some popular RL environments to explain the concepts
    and algorithms. The most frequently discussed one was Gymnasium, which is a fork
    of the OpenAI Gym. I briefly introduced a few other environments in Chapter [6](502835_2_En_6_Chapter.xhtml)
    on DQN. In this section, I cover a few more and revisit one or two previous ones.
  prefs: []
  type: TYPE_NORMAL
- en: MineRL
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: MineRL was discussed in Chapter [6](502835_2_En_6_Chapter.xhtml). MineRL^([1](#Fn1))
    is a Python 3 library that provides a OpenAI Gym interface for interacting with
    the video game Minecraft, accompanied with datasets of human gameplay. Started
    as a research project at Carnegie-Mellon University, MineRL aims to assist in
    the development of various aspects of artificial intelligence within Minecraft.
    MineRL mainly houses *BASALT Competition Environments* and *MineRL Obtain Diamonds
    Environments*.
  prefs: []
  type: TYPE_NORMAL
- en: In the “Benchmark for Agents that Solve Almost-Lifelike Task” (BASALT) competition,
    participants solved tasks based on human judgement, instead of predefined reward
    functions. The goal was to produce agents that are judged by real humans to be
    effective at solving a given task. This calls for training on human feedback,
    whether it is training from demonstrations, training on human preferences, or
    using humans to correct agents’ actions. BASALT provides a set of Gym environments
    paired with human demonstrations, since methods based on imitation are an important
    building block for solving hard-to-specify tasks.
  prefs: []
  type: TYPE_NORMAL
- en: In `MineRLBasaltFindCave-v0`, one of the BASALT environments, the agent needs
    to explore and find a cave. When inside a cave, the agent ends the episode. The
    agent is not allowed to dig down from the surface to find a cave.
  prefs: []
  type: TYPE_NORMAL
- en: In the second environment, `MineRLBasaltCreateVillageAnimalPen-v0`, after spawning
    in a village, the agent builds an animal pen next to one of the houses in a village.
    The agent uses fence posts to build one animal pen that contains at least two
    of the same animals. There should be at least one gate that allows players to
    enter and exit easily. The animal pen should not contain more than one type of
    animal. While building the pen, the agent should not harm villagers or existing
    village structures in the process.
  prefs: []
  type: TYPE_NORMAL
- en: In the third environment, `MineRLBasaltMakeWaterfall-v0`, after spawning in
    an extreme hills biome, the agent uses a water bucket to make a beautiful waterfall.
    Then the agent takes an aesthetic “picture” of it by moving to a good location,
    positioning the player’s camera to have a nice view of the waterfall.
  prefs: []
  type: TYPE_NORMAL
- en: In the final and fourth BASALT environment, `MineRLBasaltBuildVillageHouse-v0`,
    the agent is supposed to build a house in the style of the village without damaging
    the village. It should be in an appropriate location, such as next to the path
    through the village. The agent then gives a brief tour of the house, spinning
    around slowly so that all the walls and roof are visible.
  prefs: []
  type: TYPE_NORMAL
- en: In the `MineRLObtainDiamondShovel-v0` environment, the agent is required to
    obtain a diamond shovel. The agent begins in a random starting location on a random
    survival map without any items, matching the normal starting conditions for human
    players in Minecraft. During an episode, the agent is rewarded according to the
    requisite item hierarchy needed to obtain a diamond shovel.
  prefs: []
  type: TYPE_NORMAL
- en: All five environments in MineRL have RGB images as an observation. This is the
    image from the agent’s first-person perspective.
  prefs: []
  type: TYPE_NORMAL
- en: The documentation contains a set of nice tutorials to set up MineRL on Google
    Colab, as well as getting-started steps for doing Video-Pre-Training (VPT) using
    OpenAI VPT library. VPT is the process of the “Learning to Act by Watching Unlabeled
    Online Videos under Behavior Cloning” (BC) fine-tuning approach. You can access
    these Colab notebooks under the Tutorial section of the documentation. You may
    also refer to the [`https://minerl.io/`](https://minerl.io/) website for more
    information.
  prefs: []
  type: TYPE_NORMAL
- en: Donkey Car RL
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Donkey Car^([2](#Fn2)) is an open-source DIY self-driving platform for small-scale
    RC cars. Donkey Car is made up of several components: It is a high-level self-driving
    library written in Python. It was developed with a focus on enabling fast experimentation
    and easy contribution. It is an open-source hardware design that makes it easy
    for you to build your own car. It also has a simulator that enables you to use
    Donkey Car without hardware. The whole initiative is driven by a community of
    enthusiasts, developers, and data scientists who enjoy racing, coding, and discussing
    the future of ML, cars, and who will win the next race.'
  prefs: []
  type: TYPE_NORMAL
- en: There are multiple RL environments that have been built on top of the simulator
    to enable RL training. I will talk about a specific one that uses a Gymnasium/OpenAI-Gym
    kind of API interface, making it easy to port all the algorithms that you have
    learned in this book over to Donkey Car. The library is called OpenAI Gym Environments
    for Donkey Car.^([3](#Fn3)) This library can be installed with pip using the `pip
    install gym-donkeycar` command. Simulator binaries for your platform also need
    to be installed, the details of which can be found in the documentation. The simulator
    has about eleven racing environments with different types of track settings. The
    state/observation of the car in this environment is an image of size (120,160,3)
    from the viewpoint of the car. Reward is a combination of game-over flag, how
    far the car is from the center, and its speed. Action is composed of two floating
    point values, `steer` and `throttle`. `Steer` refers to the steering direction
    of the car, with negative values indicating steering to left and positive values
    indicating steering to right. `Throttle` refers to acceleration.
  prefs: []
  type: TYPE_NORMAL
- en: The library also contains code to train the Donkey Car using StableBaselines3
    and the DQN and PPO algorithms. Listing [13-1](#PC1) shows the part of the code
    responsible for training the car using PPO.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Readers can refer to the library and run the training code to experiment with
    other algorithms. Readers may also at adding Weights and Biases (`wandb`) logging
    as well as hosting trained models on the Hugging Face (HF) hub.
  prefs: []
  type: TYPE_NORMAL
- en: FinRL
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Reinforcement learning can also be applied to finance, especially when trading
    and managing portfolios. This section briefly discusses the concept and one of
    the libraries from this field. It is at an introductory level. If you are new
    to finance and you want to explore the field of RL in finance further, you may
    want to take a course or two on portfolio theory, trading in markets, derivates
    and futures, and so on. The discussion does not provide investment advice, nor
    does it prepare readers to trade using the RL in Finance approaches discussed
    here.
  prefs: []
  type: TYPE_NORMAL
- en: To motivate the discussion, consider a trader who wants to develop a trading
    strategy for one single stock or for a set of stocks. The pattern is that they
    trade once a day. Accordingly, the “action” frequency is one per day. They get
    the daily price of the stocks, which is commonly four prices in a day—the opening
    price(O), the closing price (C), the high (H) price, and low price (L). This is
    usually referred to as the OHLC data.
  prefs: []
  type: TYPE_NORMAL
- en: 'Note that sometimes traders trade multiple times in a day, such as every five
    minutes, every minute, every second, or even every fraction of a second in a Medium/High
    Frequency Trading (MFT or HFT) practice. The faster the frequency of trade, the
    less the benefit of using a complex machine learning algorithm to develop trading
    strategy. This is due to two reasons: a) most of the trading decisions require
    processing multiple time-series data and a complex ML model may have a latency
    larger than the trading time interval, and b) the higher the frequency, the less
    the predictive power of the algorithm due to reduction in the signal-to-noise
    ratio.'
  prefs: []
  type: TYPE_NORMAL
- en: Moving back to the example of trading in a basket of stocks once per day, you
    get the daily OHLC price of the stocks. You also get the daily volume data, which
    is the number of stocks bought/sold in a day. The data over a period (say over
    many months or many years) forms a time-series. A sample of such data is shown
    in Figure [13-1](#Fig1), which plots the last five year’s OHLC price along with
    volume date for NVIDIA stock.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_13_Chapter/502835_2_En_13_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: An O H L C chart represents the trend of NVIDIA stock price between 2020 and
    2024\. It has a slow growth initially and a decline after 2022\. The trend increases
    exponentially in 2024 and reaches a value of 788.17.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-1
  prefs: []
  type: TYPE_NORMAL
- en: 'NVIDIA price (OHLC chart) chart for five years (Mar 19 to Feb 24) Source: Yahoo
    Finance'
  prefs: []
  type: TYPE_NORMAL
- en: If you zoom into the data, you will notice that each day’s price is denoted
    as a bar with two horizontal lines, as shown in Figure [13-2](#Fig2). Each day
    is represented as a vertical bar with two horizontal ticks. The vertical bar represents
    the high and low prices of that day. The tick on the left of the vertical bar
    signifies the opening price and the tick on the right of the vertical bar signifies
    the closing price of the day.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_13_Chapter/502835_2_En_13_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A bar chart represents the NVIDIA stock price on 10 different days between January
    3 and January 17\. The bars represent the rise and drop in the piece. Each bar
    has 2 horizontal ticks pointing toward the left and right, which indicate the
    opening and closing prices of the day.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-2
  prefs: []
  type: TYPE_NORMAL
- en: 'NVIDIA chart for 10 days Source: Yahoo Finance'
  prefs: []
  type: TYPE_NORMAL
- en: On top of this time-series of price data, traders feature analysis happens,
    which in the field of trading is known as *technical indicators analysis*. There
    are many indicators, each with a different purpose. Some simple ones are Simple
    Moving Average (SMA) of the closing price with the average being taken over 7
    days, 10 days, 20 days, and so on, Exponential Moving Average (EMA), Moving Average
    Convergence/Divergence (MACD), Aroon Indicator (Aroon means dawn’s early light
    in Sanskrit), Relative Strength Index (RSI), Average Directional Index (ADX),
    and Commodity Channel Index (CCI). You can think of the prices and the various
    indicators as part of the “state” of the environment in the RL world. Another
    part of the “state” is the current portfolio composition—what is the current quantity
    of each stock in the portfolio as well as the amount of cash the trader has in
    their trading account.
  prefs: []
  type: TYPE_NORMAL
- en: 'The traders use these time-series of past data to design an algorithm that
    they hope will help them achieve the financial objective of maximum return. There
    are a few other objectives people choose while investing. I’ll briefly touch on
    these. The first and most common objective is the return on investment over the
    period of investment. It is easy to define as (final price – initial price)/initial
    price: (*S*[*T*] − *S*[0])/*S*[0]. Sometimes, you are not looking for just the
    *maximum return* but the *maximizing risk adjusted return*, which is the return
    you are expecting per unit of volatility. The *volatility* of a stock is measured
    as the standard deviation of the daily return of the stock. Volatility signifies
    the risks. The higher the volatility, the higher the average daily price fluctuation.
    Therefore, another good optimization target is the *sharpe ratio,* which is the
    ratio of (return from stock – risk free return) / volatility: (*r* − *r*[*f*])/σ
    where a risk-free return is the return an investor expects with zero risk—usually
    the return they would get by investing in government issued bonds and securities.
    Another one that traders usually want to optimize is the *max drawdown*, which
    is the maximum percentage loss in portfolio value. They want to minimize the max
    drawdown. All these objectives are constructed from the daily profit or loss of
    the trader based on their current stock position and the price changes from one
    day to the next.'
  prefs: []
  type: TYPE_NORMAL
- en: The daily profit or loss can be equated to the per step reward in RL. These
    objectives can be thought of as the return from an episode in RL which an RL agent
    will want to optimize based on the need of the trader.
  prefs: []
  type: TYPE_NORMAL
- en: The “action” in RL maps to the action the trader takes on a daily basis, which
    are buy/hold/sell. They can either increase their position in the stock or do
    nothing (hold or sell a portion or all of the quantity of the stock they have).
  prefs: []
  type: TYPE_NORMAL
- en: 'To summarize the mapping of trading to an RL setup as shown in Figure [13-3](#Fig3),
    you have:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_13_Chapter/502835_2_En_13_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A block diagram represents the cycle of workflow between 4 units, which include
    R L environment, objective, trading agent, and action. The R L environment includes
    the external market and state.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-3
  prefs: []
  type: TYPE_NORMAL
- en: Stock trading casted as an RL problem
  prefs: []
  type: TYPE_NORMAL
- en: 'State: Price and other indicators of the various tocks, cash in bank and current
    quantity of holding in individual stocks, current portfolio composition'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Action: Buy/hold/sell decisions by the algorithm/agent/trader'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Rewards: The objective—the return over the lifetime, daily average return,
    volatility of the portfolio, Sharpe ratio, or max drawdown'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Having cast the trading in stocks as an RL problem, consider the data involved.
    Unlike games and other RL environments, you have a lot of historical data for
    financial markets. However, unlike robotics, you have no way to build a simulator
    that can closely resemble the actual market movements. Therefore, a common approach
    to applying RL or any other machine learning algorithm is to use past market data
    to train, validate, and test the agent. Assume you have five years’ worth of data.
    You could use the first four years of data as the training data to do episode
    rollouts in the RL environment for a given trading strategy and train the agent.
    The next six months of data could be used as a validation set to fine-tune all
    the hyperparameters, using any of the hyperparameter optimization libraries and
    techniques discussed in earlier chapters. The last six months of data can be used
    to test the performance of the final strategy. Running a strategy for hyperparameter
    optimization and/or final testing on the past data is called *back-testing**,*
    as it tests the effectiveness of an algorithm on past data.
  prefs: []
  type: TYPE_NORMAL
- en: Once you are ready to deploy, there are two stages. The first stage is to do
    something called *paper trading* wherein the strategy is deployed to generate
    trades and use these trades to update the state; no actual trading in the market
    is carried out. In other words, you deploy the trained algorithm on paper. The
    second and final stage of deployment is to connect the agent to the trade execution
    systems so that the action to the portfolio is carried out using real money and
    a real stock exchange. The final stage involves money, so if your strategy does
    not perform well, you will lose actual hard money.
  prefs: []
  type: TYPE_NORMAL
- en: A very tricky aspect of time-series analysis is data leakage, whereby the data
    from the future leaks into the current due to some wrong time index setting, or
    some other bug in the way different indicators are stacked together. At times
    it can be very hard to figure that out. As an example of this this problem, consider
    that when the agent takes an action for a given day *t*, somehow due to some bug,
    it has access to the price for the next day—time *t* + 1\. In this case, the agent
    can easily find the most optimal trade to do today, as it already knows the future.
    Running paper trading on live market data post training alleviates this issue.
    If you find that paper trading gives you very different, sub-optimal results from
    train and back-testing, it is a sure sign of leakage of future into past.
  prefs: []
  type: TYPE_NORMAL
- en: This completes the introduction of how RL can be applied in trading. You will
    now explore at a high level how all the steps can be achieved using FinRL.^([4](#Fn4))
    FinRL provides a framework that supports various markets, state-of-the-art DRL
    algorithms, benchmarks of many quant finance tasks, live trading, and so on. The
    FinRL library consists of three layers, as shown in Figure [13-4](#Fig4).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_13_Chapter/502835_2_En_13_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A block diagram represents the layers of application, D R L agents, and market
    environments from top to bottom. Each layer includes multiple entities. The market
    environment at the bottom sends the reward and state and takes the action.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-4
  prefs: []
  type: TYPE_NORMAL
- en: 'FinRL layered architecture Source: FinRL documentation'
  prefs: []
  type: TYPE_NORMAL
- en: The base layer is called *market environments* and is housed in a separate library
    called *FinRL Meta*. FinRL Meta starts by processing the market data, and then
    creates stock market environments. The environment monitors the variation of stock
    price and multiple features, the agent performs an action and gets the reward
    from the environment, and then the agent adapts its strategy accordingly. By interacting
    with the environment, the intelligent agent will develop a trading strategy to
    maximize the long-term total rewards (also called Q-value). FinRL environments
    are based on OpenAI Gym, and they simulate the markets with real market data,
    using time-driven simulation. FinRL provides trading environments across many
    stock exchanges. FinRL Meta establishes a standard pipeline for financial data
    engineering in RL, ensuring that data of different formats from different sources
    can be incorporated in a unified framework. Further, it automates the pipeline
    with a data processor, which can access data, clean data, and extract features
    from various data sources.
  prefs: []
  type: TYPE_NORMAL
- en: You read about data leakage. FinRL employs a training-testing-trading pipeline.
    The DRL agent first learns from the training environment and is then validated
    in the validation environment for further adjustment. The validated agent is tested
    in historical datasets. Finally, the tested agent will be deployed in paper trading
    or live trading markets. This pipeline solves the information leakage problem
    with much more ease.
  prefs: []
  type: TYPE_NORMAL
- en: 'The second layer of the FinRL is that of Deep RL agents. There are three standard
    libraries that are used in conjunction with FinRL: a) StableBaselines3 b) RLlib,
    and c) Elegant RL. Elegant RL has been developed by the group responsible for
    FinRL.'
  prefs: []
  type: TYPE_NORMAL
- en: The final layer is the actual application built on top of this to carry out
    trading in different markets and for any other business purposes.
  prefs: []
  type: TYPE_NORMAL
- en: FinRL has a set of nicely written tutorials with Python notebooks. Interested
    readers may want to go through the sequence of tutorials as suggested in the FinRL
    documentation.
  prefs: []
  type: TYPE_NORMAL
- en: 'Star Craft II: PySc2'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: PySC2^([5](#Fn5)) is DeepMind’s Python component of the StarCraft II Learning
    Environment (SC2LE). It exposes Blizzard Entertainment’s StarCraft II Machine
    Learning API^([6](#Fn6)) as a Python RL Environment. This is a collaboration between
    DeepMind and Blizzard to develop StarCraft II into an environment for RL research.
    PySC2 provides an interface for RL agents to interact with StarCraft 2, getting
    observations and sending actions.
  prefs: []
  type: TYPE_NORMAL
- en: The goal in StarCraft is to build a base, manage an economy, build an army,
    and destroy your enemies. You control your base and army from a third-person perspective,
    then multi-task and micro-manage your units for maximum effect. StarCraft has
    three distinct races—Terran, Protoss, and Zerg—which have different units and
    strategies. Starcraft II is mostly deterministic, but it does have some randomness
    mainly for cosmetic reasons. The two main random elements are weapon speed and
    update order.
  prefs: []
  type: TYPE_NORMAL
- en: Starcraft II has a very rich action and observation space. The game outputs
    both spatial/visual and structured elements. The structured elements are given
    because there is a lot of text and numbers that agents aren’t expected to learn
    to read, especially at low resolution. It’s also because it’s hard to reverse
    replays back to exactly the same visuals that the human saw.
  prefs: []
  type: TYPE_NORMAL
- en: The SC2 action space is very large. It has hundreds of potential actions, many
    of which require a point on the screen or the mini map, and many of which need
    an extra modifier. If you were to turn the action space into a single line, it
    would have millions or even billions of options, most of which are invalid, and
    many of which are very similar. So, a simple discrete action space is not very
    suitable. Instead, the library made “function actions” that can combine well,
    without the difficulty of a random hierarchy. This is based on the idea of a C-style
    function call that can take some arguments of specific types. Interested readers
    can read more about it in the documentation on PySc2 and Blizzard ML API.
  prefs: []
  type: TYPE_NORMAL
- en: Godot RL Agents
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Godot Engine^([7](#Fn7)) is a feature-packed, cross-platform game engine to
    create 2D and 3D games from a unified interface. It provides a set of common tools,
    so that users can focus on making games without having to reinvent the wheel.
    Games can be exported to a number of platforms, including desktop platforms (Linux,
    macOS, Windows), mobile platforms (Android, iOS), and web-based platforms and
    consoles. Godot is completely free and open-source. It is supported by the Godot
    Foundation.
  prefs: []
  type: TYPE_NORMAL
- en: Godot Reinforcement Learning (RL) Agents^([8](#Fn8)) is an open-source interface
    for developing environments and agents in the Godot Game Engine. The Godot RL
    Agents interface allows the design, creation, and learning of agent behaviors
    in challenging 2D and 3D environments with various on-policy and off-policy Deep
    RL algorithms. It provides a standard Gym interface, with wrappers for learning
    in the Ray RLlib, StableBaselines3, CleanRL and Sample Factory RL frameworks.
    The framework is a versatile one with the ability to create environments with
    discrete, continuous, and mixed action spaces.
  prefs: []
  type: TYPE_NORMAL
- en: Interested readers can find out more about Godot RL agents in the 2022 paper
    titled “Godot Reinforcement Learning Agents.”^([9](#Fn9)) Readers may also refer
    to the documentation to Godot RL library or Godot Engine documentation for more
    details on how to create your own games and how to carry out RL training. The
    Getting Started sections of both the libraries are well documented with respect
    to installation and initial explorations.
  prefs: []
  type: TYPE_NORMAL
- en: This completes the discussion on RL environments. There are many more and you
    could always write a customer environment of your own based on the problem you
    are trying to solve using RL.
  prefs: []
  type: TYPE_NORMAL
- en: 'Model-Based RL: Additional Approaches'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In a previous chapter, you learned about model-based RL, wherein you learned
    the model by having the agent interact with the environment. The learned model
    was then used to generate additional transitions, that is, to augment the data
    gathered by the agent through actual interaction with the real world. This was
    the approach that the *Dyna algorithm* took.
  prefs: []
  type: TYPE_NORMAL
- en: While Dyna helps speed up the learning process and addresses some of the sample
    inefficiency issues seen in model-free RL, it is mostly used for problems with
    simple function approximators. It has not been successful in deep learning function
    approximators that require lots of samples to get trained. Too many training samples
    from simulators could degrade the quality of learning due to imperfections of
    the simulators’ ability to model the world accurately. In the next section, you
    look at some recent approaches of combining the learned model with model-free
    methods within the context of deep learning. You also look at some of the most
    recent theoretical advances in this field.
  prefs: []
  type: TYPE_NORMAL
- en: World Models
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In a 2018 paper titled “World Models,”^([10](#Fn10)) the authors proposed an
    approach to building a generative neural network model, which is a compressed
    representation of the spatial and temporal aspects of the environment, and using
    it to train the agent.
  prefs: []
  type: TYPE_NORMAL
- en: Humans develop a mental model of the world they see around them. They do not
    store all the smallest possible details of the environment. Rather, they store
    an abstract, higher-level representation of the world that compresses spatial
    aspects as well as temporal aspects of the world and the relationships between
    the different entities of the world. They store only part of the world that they
    have been exposed to or is relevant for them.
  prefs: []
  type: TYPE_NORMAL
- en: 'Humans look at the current state or the context of the task at hand, think
    of the action they want to take, and predict the state that the proposed action
    will take them into. Based on this predictive thinking, they choose the best action.
    Think of a baseball batter. They have milliseconds to act, swinging the bat at
    the right time and in the right direction to connect with the ball. How do you
    think they do it? With years of practice, the batter has developed a strong internal
    model in which they can predict the future trajectory of the ball and can start
    swinging the bat at current time instance to reach that exact point in the trajectory
    milliseconds later. The difference between a good player and a bad player largely
    boils down to this predictive capability of the player based on the internal model.
    Years of practice make the whole thing intuitive without a lot of conscious planning
    in the mind. The decisions and actions humans make are based on this internal
    model. Jay Wright Forrester, the father of system dynamics, described a mental
    model as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“The image of the world around us, which we carry in our head, is just a model.
    Nobody in his head imagines all the world, government or country. He has only
    selected concepts, and relationships between them, and uses those to represent
    the real system.”*^([11](#Fn11))'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In the paper, the authors show the way they achieved the predictive internal
    model using a large/powerful recurrent neural network (RNN) model that they called
    the *world model* and using a small controller model. The reason for the small
    controller model is to keep the credit assignment problem within bounds, have
    policies iterate faster during training, and be able to use faster training algorithms
    like Covariance-Matrix Adaptation Evolution Strategy (CMA-ES). I talk about CMA-Es
    later in this chapter under the concept of derivate-free methods. The large “world
    model” allows it to retain all the spatial and temporal expressiveness required
    to have a good model of the environment and have a small controller model to keep
    the policy search focused on fast iterations during training.
  prefs: []
  type: TYPE_NORMAL
- en: The authors explore the ability to train agents on generated world models, completely
    replacing the interaction with the real world. Once the agent is well trained,
    fusing the internal world model representation, the learned policy is transferred
    to the real world. They also show the benefit of adding a small random noise to
    the internal world model to ensure that the agent does not over-exploit the imperfections
    of the learned model.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s next look at the breakdown of the model that was used. Figure [13-5](#Fig5)
    gives a high-level overview of the pipeline. At each instant, the agent receives
    an observation from the environment.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_13_Chapter/502835_2_En_13_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A diagram illustrates the overview of the agent model. It depicts a workflow
    through different layers, where the received observations proceed through the
    world model, the small controllers use the representations to select good actions,
    and the agents perform the actions that go back and affect the environment.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-5
  prefs: []
  type: TYPE_NORMAL
- en: 'Overview of the agent model used in the “world view” Source: “Recurrent World
    Models Facilitate Policy Evolution,” 2018^([12](#Fn12))'
  prefs: []
  type: TYPE_NORMAL
- en: The world model consists of two modules.
  prefs: []
  type: TYPE_NORMAL
- en: The vision model (*V*) encodes the high-dimensional image (observation vector)
    into a low-dimensional latent vector using a variational auto encoder (VAE) from
    deep learning. The latent vector *z*, the output of module V, compresses the spatial
    information of the observation into a smaller vector.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The latent vector *z* is fed into a memory RNN (M) module to capture the temporal
    aspects of the environment. The *M* model, being an RNN network, compresses what
    happens over time and serves as a predictive model. Because many complex environments
    are stochastic and also because of the imperfections in learning, the M model
    is trained to predict a distribution of the next state *P*(*z*[*t* + 1]) instead
    of predicting a deterministic value *z*[*t* + 1]. It does so by predicting the
    distribution of the next latent vector *z*[*t* + 1] based on the current and past
    (the RNN part) as a mixture of Gaussian distribution *p*(*z*[*t* + 1]| *a*[*t*],
    *z*[*t*], *h*[*t*]), where *h*[*t*], the hidden state of RNN, captures the history.
    That is why it is called a *mixture density model based on a recurrent neural
    network* (MDM-RNN).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The controller model is responsible for taking the spatial information (*z*[*t*])
    and temporal information (*h*[*t*]), concatenating them, and feeding them into
    a single-layer linear model. The overall flow of the information is shown in Figure
    [13-6](#Fig6) and can be broken down as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_13_Chapter/502835_2_En_13_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A block diagram represents the overview of the agent model, indicating the interaction
    between the world model, environment, and observation. The communication between
    the V A E and M D N R N N is indicated inside the world model.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-6
  prefs: []
  type: TYPE_NORMAL
- en: 'Overview of the agent model used in the world view Source: “Recurrent World
    Models Facilitate Policy Evolution,” 2018'
  prefs: []
  type: TYPE_NORMAL
- en: The agent gets an observation at time *t*. The observation is fed into the *V*
    model, which codifies it into a smaller latent vector *z*[*t*].
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Next, the latent vector is fed into an *M* model along with action *a*[*t*,]
    which updates its internal state to produce the hidden state *h*[*t* + 1].
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The output of the *V* (*z*[*t*]) and the output of the *M* model (*h*[*t*])
    are concatenated and fed into the C controller, which produces the action, *a*[*t*].
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The action is fed into the real world and used by the *M* model to update its
    hidden state.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The action in the real world produces the next state/observation, and the next
    cycle begins.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For other details like the pseudocode, the implementation details of the networks
    used, and the losses used in training, refer to the previously referenced paper.
    In the paper, the authors also talk about how they used the predictive power to
    come up with hypothetical scenarios by feeding back the prediction *z*[*t* + 1]
    as the next real-world observation. They further show how they were able to train
    an agent in the “dream world” and then transfer the learning to the real world.
  prefs: []
  type: TYPE_NORMAL
- en: Imagination-Augmented Agents (I2A)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As discussed earlier, Dyna proposed a way to combine the *model-free* and *model-based*
    approaches. The model-free methods have higher scalability in terms of complex
    environments and has been seen to work well with deep learning. However, these
    are not sample efficient, because deep learning requires a large number of training
    samples to be effective. Even a simple Atari game policy training could take millions
    of examples to get trained. The model-based approach, on the other hand, is sample
    efficient. Dyna provided a way to combine the two advantages. Apart from using
    the real-world transitions to train the agent, the real-world transitions are
    also used to learn a model that is used to generate/simulate additional training
    examples. The problem, however, is that *model learning may not be perfect*, and
    unless this fact is accounted for, direct use of Dyna in a complex deep learning
    combined reinforcement learning does not give good results. The poor model knowledge
    can lead to over-optimism and poor agent performance.
  prefs: []
  type: TYPE_NORMAL
- en: 'As with the previous approach of using world models, the *imagination augmented
    agents* (I2A) method combines model-based and model-free approaches in a way that
    makes the combined approach work well for complex environments. I2A forms an approximate
    environment model and leverages it by “learning to interpret” the learned model
    imperfections. It provides an end-to-end learning approach to extract useful information
    gathered from model simulations without relying exclusively on the simulated returns.
    The internal model is used by agents, also referred to as *imagining,* to seek
    positive outcomes while avoiding adverse outcomes. The authors from DeepMind,
    in their 2018 paper titled *“*Imagination-Augmented Agents for Deep Reinforcement
    Learning,*”*^([13](#Fn13)) show that this approach can learn better with less
    data and imperfect models. Figure [13-7](#Fig7) illustrates the I2A architecture
    as explained in the referenced paper. I2A has the following components:'
  prefs: []
  type: TYPE_NORMAL
- en: The environment model in Figure [13-7(a)](#Fig7), given the present information,
    makes predictions about the future. The imagination core (IC) has a policy net
    ![$$ \hat{\uppi} $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq1.png),
    which takes the current observation *o*[*t*] (real observation) or ![$$ {\hat{o}}_t
    $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq2.png) (imagined
    observation) as input and produces a rollout action ![$$ {\hat{a}}_t $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq3.png).
    The observation *o*[*t*] or ![$$ {\hat{o}}_t $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq4.png)
    and rollout action ![$$ {\hat{a}}_t $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq5.png)
    are fed into the environment model, an RNN-based network, to predict the next
    observation ![$$ {\hat{o}}_{t+1} $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq6.png)
    and reward ![$$ {\hat{r}}_{t+1} $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq7.png).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Many such ICs are strung together, feeding the output of the previous IC to
    the next IC and producing an *imaged rollout trajectory* of length *τ* as shown
    in Figure [13-7(b)](#Fig7). *n* such trajectories ![$$ {\hat{T}}_1,{\hat{T}}_2,\dots,
    {\hat{T}}_n $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq8.png)
    are produced. Each imagined trajectory ![$$ \hat{T} $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq9.png)
    is a sequence of features ![$$ \left({\hat{f}}_{t+1},\dots, {\hat{f}}_{t+\tau}\right)
    $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq10.png) where
    *t* is the current time, *τ* the length of the rollout, and ![$$ {\hat{f}}_{t+i}
    $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq11.png) the
    output of the environment model (i.e., the predicted observation and/or reward).
    As the learned model cannot be assumed to be perfect, depending solely on the
    predicted rewards may not be a good idea. Also, the trajectories may contain information
    beyond the reward sequence. Therefore, each rollout is encoded by sequentially
    processing the output to get an embedding on each trajectory, ![$$ {e}_i=\upvarepsilon
    \left({\hat{T}}_i\right) $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq12.png),
    as shown on the right side of Figure [13-7(b)](#Fig7). The encoder is an LSTM
    with convolutional encoder, which sequentially processes a trajectory *T*. The
    features ![$$ {\hat{f}}_t $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq13.png)
    are fed to the LSTM in reverse order, from ![$$ {\hat{f}}_{t+\tau } $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq14.png)
    to ![$$ {\hat{f}}_{t+1} $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq15.png),
    to mimic Bellman type backup operations. You can see this approach being represented
    by the direction of arrows in the encoder block of Figure [13-7(b)](#Fig7).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Finally, the aggregator in Figure [13-7(c)](#Fig7) combines these individual
    *n* rollouts and feeds them as an additional context to the policy network along
    with the model-free path of feeding the observation directly. For the model-free
    path of the I2A, the authors chose a standard network of convolutional layers
    plus one fully connected one. The I2A therefore learns to combine information
    from its model-free and imagination-augmented paths; note that without the model-based
    path, I2As reduce to a standard model-free network. I2As can thus be thought of
    as augmenting model-free agents by providing additional information from model-based
    planning, and as having strictly more expressive power than the underlying model-free
    agent.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_13_Chapter/502835_2_En_13_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Three illustrations. a. The Imagination core comprises policy ney and environment
    model. b.The single imagination rollout comprises the future imagination and encoding
    units. c. It represents the full I 2 A architecture, indicating the model-based
    path, free path, aggregator, and rollout encoders.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-7
  prefs: []
  type: TYPE_NORMAL
- en: 'I2A architecture. It depicts the IC in (a), the single imagination rollout
    in (b), and the full I2A architecture in (c) Source: Figure 1 from the paper “Imagination-Augmented
    Agents for Deep Reinforcement Learning,” 2018^([14](#Fn14))'
  prefs: []
  type: TYPE_NORMAL
- en: The environment model shown in Figure [13-8](#Fig8) defines a distribution that
    is optimized by using a negative log likelihood loss *l*[*model*]. The input action
    is broadcast and concatenated to the observation. A convolutional network transforms
    this into a pixel-wise probability distribution for the output image, and a distribution
    for the reward.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_13_Chapter/502835_2_En_13_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A block diagram illustrates a flow from the input observation going through
    the stacked context, convolution net, predicted observation, and predicted reward.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-8
  prefs: []
  type: TYPE_NORMAL
- en: 'I2A enviroment model Source: Figure 2 from the paper “Imagination-Augmented
    Agents for Deep Reinforcement Learning,” 2018^([15](#Fn15))'
  prefs: []
  type: TYPE_NORMAL
- en: '*Training Process*: The training was carried out using a fixed pretrained environment
    model. The training involved the remaining I2A parameters with asynchronous advantage
    actor-critic (A3C). An entropy regularizer was added to the policy *π* to encourage
    exploration and the auxiliary loss to distill *π* into the rollout policy ![$$
    \hat{\pi} $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq16.png).
    A separate hyperparameter search was carried out for each agent architecture in
    order to ensure optimal performance.'
  prefs: []
  type: TYPE_NORMAL
- en: The authors used a puzzle environment, Sokoban, to demonstrate the performance
    of I2A over baselines. Sokoban is a classic planning problem, where the agent
    has to push a number of boxes onto given target locations. Because boxes can only
    be pushed (as opposed to pulled), many moves are irreversible, and mistakes can
    render the puzzle unsolvable. A human player is thus forced to plan moves ahead
    of time. The purpose of this was to confirm the expectation that artificial agents
    will similarly benefit from internal simulation. Readers may refer to Figure 3
    of the referenced paper for a sample rendering of Sokoban environments.
  prefs: []
  type: TYPE_NORMAL
- en: Learning curves from various experiments shown in the paper are reproduced in
    Figure [13-9](#Fig9).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_13_Chapter/502835_2_En_13_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Two line graphs of the fraction of solved levels versus the environment steps
    represent an increasing trend of lines under the Sokoban performance and Unroll
    depth analysis. a. The lines represent I 2 A, standard large, standard, no reward
    I 2 A, and copy model I 2 A. b. The lines represent Unroll depths of 1, 3, 5,
    and 15.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-9
  prefs: []
  type: TYPE_NORMAL
- en: 'Sokoban learning curves. Left: training curves of I2A and baselines. Right:
    I2A training curves for various values of imagination depth Source: Figure 4 from
    the paper “Imagination-Augmented Agents for Deep Reinforcement Learning,” 2018^([16](#Fn16))'
  prefs: []
  type: TYPE_NORMAL
- en: 'Some interesting insights that the authors drew from this are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: Figure [13-9](#Fig9) (right) shows that using longer rollouts, while not increasing
    the number of parameters, increases performance. Three unrolling steps improve
    the speed of learning and top performance significantly over one unrolling step;
    five outperforms three; and as a test for significantly longer rollouts, 15 outperforms
    five, reaching above 90 percent of levels solved. However, in general, the graph
    demonstrates diminishing returns with using I2A with longer rollouts. The authors
    also highlight that five steps are relatively small compared to the number of
    steps taken to solve a level, for which the best agents needed about 50 steps
    on average. This implies that even short rollouts can be highly informative. For
    example, they allow the agent to learn about moves it cannot recover from (such
    as pushing boxes against walls, in certain contexts).
  prefs: []
  type: TYPE_NORMAL
- en: In terms of data efficiency, as shown in Figure [13-9](#Fig9) (left), it should
    be noted that the environment model in I2A was pretrained with roughly about 1e8
    frames. Thus, even taking pretraining into account, I2A outperforms the baselines
    after seeing about 3e8 frames in total.
  prefs: []
  type: TYPE_NORMAL
- en: The authors also demonstrate how a single model, which provides the I2A with
    a general understanding of the dynamics governing an environment, can be used
    to solve a collection of different tasks. Such an approach makes data efficiency
    even better due to reuse of the environment model to solve multiple tasks in the
    same environment.
  prefs: []
  type: TYPE_NORMAL
- en: The authors also show that learning the rollout encoder plays a significant
    role in being able to handle the imperfect model learning well.
  prefs: []
  type: TYPE_NORMAL
- en: Model-Based RL with Model-Free Fine-Tuning (MBMF)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In a 2017 paper titled *“*Neural Network Dynamics for Model-Based Deep Reinforcement
    Learning with Model-Free Fine-Tuning,”^([17](#Fn17)) the authors demonstrate yet
    another way to combine model-free and model-based RL. They looked at the domain
    of locomotion tasks. The model-free methods of training robots for locomotion
    suffer from high sample complexity, something seen in all deep learning–based
    models. The authors combined the model-free and model-based approaches to come
    up with sample efficient models to learn the dynamics of locomotion with varying
    task goals. They demonstrated that medium-sized neural network models could be
    combined with model predictive control (MPC) to achieve excellent sample complexity
    in a model-based reinforcement learning algorithm, producing stable and plausible
    gaits to accomplish various complex locomotion tasks. They also proposed using
    deep neural network dynamics models to initialize a model-free learner, in order
    to combine the sample efficiency of model-based approaches with the high, task-specific
    performance of model-free methods. With the help of experiments and learning trajectory
    on MuJoCo environments, the authors also showed that pure model-based approach
    trained on random action data can follow arbitrary trajectories with excellent
    sample efficiency, and that the hybrid algorithm can accelerate model-free learning
    further.
  prefs: []
  type: TYPE_NORMAL
- en: 'I first cover the Model Predictive Control (MPC). In model-based RL, a model
    of robot/environment dynamics is used to make predictions of the next state based
    on the current state and the current action. Let ![$$ {\hat{f}}_{\uptheta}\left({s}_t,{a}_t\right)
    $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq17.png) be
    the learned dynamics, which is parameterized by θ. It takes current state *s*[*t*]
    and current action *a*[*t*] to output an estimate of state at the next time-step
    *t* + Δ*t*. Assume that the reward function is known and is represented as *r*(*s*[*t*],
    *a*[*t*]). The RL optimization problem to choose optimal actions will involve
    solving the following equation:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \left({a}_t,\dots, {a}_{t+H-1}\right)=\mathit{\arg}\kern0.5em \underset{a_t,\dots,
    {a}_{t+H-1}}{\max}\sum \limits_{t^{\prime }=t}^{t+H-1}{\gamma}^{t\prime -t}\cdotp
    r\left({s}_{t\prime },{a}_{t\prime}\right) $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_Equ1.png)'
  prefs: []
  type: TYPE_IMG
- en: (13-1)
  prefs: []
  type: TYPE_NORMAL
- en: However, due to errors in the learned model, rather than have the policy execute
    this complete action sequence in open-loop, the better option is to execute only
    the first action *a*[*t*] from the sequence, and then replan at the next time-step
    with the updated state information *s*[*t* + 1]. This is followed by resolving
    the optimization problem. This approach of resolving the optimization problem
    at each step is known as *Model Predictive Control* (MPC).
  prefs: []
  type: TYPE_NORMAL
- en: Now consider the reward function *r*[*t*] = *r*(*s*[*t*], *a*[*t*]), which is
    considered known since it can be calculated based on the state of the robot. The
    paper gives examples of the reward functions used for *moving forward* and *trajectory
    following*. Trajectory is shown by sparse *waypoints* that define the path the
    robot needs to follow. Waypoints are points on a given trajectory that, when connected
    with lines, approximate the given trajectory, as shown in Figure [13-10](#Fig10).
    For more details on how waypoints are used for trajectory planning, refer to any
    text on autonomous vehicles and robots.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_13_Chapter/502835_2_En_13_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: An illustration represents a sigmoid curve with multiple points indicated on
    it from bottom to top. The curve is marked as the trajectory. The points from
    w p 1 to w p 8 are denoted as wavepoints.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-10
  prefs: []
  type: TYPE_NORMAL
- en: Trajectory and waypoints
  prefs: []
  type: TYPE_NORMAL
- en: At any point, the robot’s projected sequence of actions is considered. For each
    action, the line segment joining the current state ![$$ {\hat{s}}_t $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq18.png)
    and the estimated next state ![$$ {\hat{s}}_{t+1}={\hat{f}}_{\uptheta}\left({\hat{s}}_t,{a}_t\right)
    $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq19.png) is
    projected on the closest line segment joining two consecutive waypoints of the
    trajectory. The reward is positive if the robot’s movement is along the waypoint
    line segment and negative for a movement perpendicular to the waypoint line segment.
    Similarly, the paper has another set of reward functions for the *moving forward*
    goal.
  prefs: []
  type: TYPE_NORMAL
- en: The neural network is learning the dynamics ![$$ {\hat{s}}_{t+1}={\hat{f}}_{\uptheta}\left({\hat{s}}_t,{a}_t\right)
    $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq20.png). However,
    this function can be difficult to learn when states *s*[*t*] and *s*[*t* + 1]
    are very similar and therefore the action *a*[*t*] seemingly has little effect
    on the output. This problem becomes even more pronounced as the time between states
    Δ*t* becomes smaller. Therefore, instead of predicting the next state, the model
    predicts the difference between the two states *s*[*t* + 1] − *s*[*t*]. With this,
    the next state becomes ![$$ {\hat{s}}_{t+1}={\hat{s}}_t+{\hat{f}}_{\uptheta}\left({\hat{s}}_t,{a}_t\right)
    $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq21.png). Predicting
    the difference instead of the whole new state amplifies the changes and allows
    for small changes to be captured.
  prefs: []
  type: TYPE_NORMAL
- en: Now turn your attention to the model-based RL algorithm. Figure [13-11](#Fig11)
    illustrates this algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_13_Chapter/502835_2_En_13_Fig11_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A block diagram represents the workflow cycle under the model-based R L. The
    data points from the agent proceed through the neural network dynamic model and
    M P C controller, which also receives inputs from the reward function and agent.
    The selected action from the controller loops back to the agent.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-11
  prefs: []
  type: TYPE_NORMAL
- en: 'Model-based RL Source: MBMF paper^([18](#Fn18))'
  prefs: []
  type: TYPE_NORMAL
- en: The algorithm works in the following manner. The reward function and dynamics
    model are fed into a *model predictive controller* (MPC). MPC takes in the reward
    and the next state to plan ahead for *H* steps using predicted ![$$ {\hat{s}}_{t+1}
    $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq22.png) as
    the new input to predict ![$$ {\hat{s}}_{t+2} $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq23.png)
    and so on. *K* randomly generated action sequences, each of length *H* steps,
    are evaluated to find the best action at initial time-step *t* based on the highest
    cumulative reward among the *K* sequences. The robot then takes the action *a*[*t*].
    At this point, the sample sequences are dropped, and complete replanning of the
    next *K* sequences, each of length *H*, is done at time *t* + 1\. The use of this
    model’s predictive controller (instead of an open loop approach) ensures that
    errors are not propagated forward. There is a replanning at each step. Figure
    [13-12](#Fig12) shows the complete algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_13_Chapter/502835_2_En_13_Fig12_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A snippet of pseudocode represents the model-based reinforcement algorithm.
    It comprises 11 lines from start to end. The algorithm includes multiple calculations
    and actions under the For loop.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-12
  prefs: []
  type: TYPE_NORMAL
- en: 'MBMF algorithm Source: MBMF paper^([19](#Fn19))'
  prefs: []
  type: TYPE_NORMAL
- en: Once the model is trained, to further improve the model, the authors fine-tuned
    it by initializing a model-free agent with the model-based learner trained, as
    discussed earlier. The model-free training can be done using any of the previous
    approaches you learned. This is the reason for naming it *model-based with model-free
    fine-tuning* (MBMF).
  prefs: []
  type: TYPE_NORMAL
- en: Model-Based Value Expansion (MBVE)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In a 2018 paper titled “Model-Based Value Expansion for Efficient Model-Free
    Reinforcement Learning,”^([20](#Fn20)) the authors take the approach of combining
    the model-based and model-free approaches with a known reward function to get
    a more disciplined approach to value estimation.
  prefs: []
  type: TYPE_NORMAL
- en: The MBMF approach in the previous section combined the model-based (MB) approach
    with the model-free (MF) approach by using MB as a way to train the agent and
    then using the policy learned to initialize the MF agent. Model-free approaches
    are known to have a high capacity to learn complex behaviors but are very sample-inefficient,
    which can become a problem when real-world interactions are required. On the other
    hand, model-based approaches can arrive at a near-optimal solution with learned
    models but under fairly restricted dynamics of the environment, such as a simple
    robot with limited capabilities. In this paper, authors combine the two approaches
    to “*…reduce sample complexity while supporting complex nonlinear dynamics by
    combining MB and MF learning techniques through disciplined model use for value
    estimation.*”
  prefs: []
  type: TYPE_NORMAL
- en: Model-based value expansion (MBE) is a hybrid algorithm that uses a dynamics
    model to simulate the short-term horizon and Q-learning to estimate the long-term
    value beyond the simulation horizon. This improves Q-learning by providing higher-quality
    target values for training. Splitting value estimates into a near-future MB component
    and a distant future MF component offers a model-based value estimate that (1)
    creates a decoupled interface between value estimation and model use and (2) does
    not require differentiable dynamics.
  prefs: []
  type: TYPE_NORMAL
- en: 'MVE improves value estimates for a policy π by assuming that it has access
    to a dynamics model ![$$ \hat{f}:S\times A\to S $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq24.png)
    as well as the true reward function *r*. The improved estimate of value could
    be used as a critic (C) in any actor-critic algorithm. The authors in the paper
    modified DDPG with the improved critic from MVE to show the benefits MVE approach
    brings. As far as the dynamics model is concerned, the algorithm assumes that
    it is accurate only to certain depth H, which can be varied based on the confidence
    on the learned dynamics. In other words, for first H steps, you can use the dynamics
    model and a given policy to estimate the next state and rewards: ![$$ {\hat{r}}_t=r\left({\hat{s}}_t,\uppi
    \left({\hat{s}}_t\right)\right) $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq25.png),
    ![$$ {\hat{s}}_t={\hat{f}}^{\uppi}\left({\hat{s}}_{t-1}\right) $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq26.png).
    Accordingly, the *H*-step model value expansion (MVE) estimate for the value of
    a given state under policy π, *V*^π(*s*[0]) is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\hat{V}}_H\left({s}_0\right)={\sum}_{t=0}^{H-1}{\upgamma}^t{\hat{r}}_t+{\upgamma}^H\hat{V}\left({\hat{s}}_H\right)
    $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_Equ2.png)'
  prefs: []
  type: TYPE_IMG
- en: (13-2)
  prefs: []
  type: TYPE_NORMAL
- en: The H-step MVE estimation is a composition of two components—the component estimated
    by learned dynamics ![$$ {\sum}_{t=0}^{H-1}{\upgamma}^t{\hat{r}}_t $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq27.png)
    and the tail component estimate ![$$ {\upgamma}^H\hat{V}\left({\hat{s}}_H\right)
    $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq28.png). Since
    ![$$ {\hat{r}}_t $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq29.png)
    is derived from actions ![$$ {\hat{a}}_t=\uppi \left({\hat{s}}_t\right) $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq30.png),
    this is an on-policy. Therefore, in both deterministic and Stochastic cases, MVE
    does not require importance weights. This is in contrast to the use of traces
    generated by off-policy trajectories.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [13-13](#Fig13) shows the pseudocode for the MVE algorithm. If you look
    carefully, you will notice that it is very similar to the regular Actor-Critic
    algorithms except for Step 7, which is to learn the environment dynamics, and
    Step 3 in how the critic is evaluated using Equation [13-2](#Equ2).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_13_Chapter/502835_2_En_13_Fig13_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A snippet of pseudocode represents the model-based value expansion algorithm.
    It comprises 18 lines from start to end. The text at the top instructs to use
    model-based value expansion to enhance critic target values in a generic actor-critic
    method. The values of theta and phi are returned at the end.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-13
  prefs: []
  type: TYPE_NORMAL
- en: 'Pseudocode for the MVE algorithm Source: MVE paper^([21](#Fn21))'
  prefs: []
  type: TYPE_NORMAL
- en: The authors show the performance of combining MBVE with DDPG versus vanilla
    DDPG and demonstrate significant improvement by combining MBVE with DDPG. Readers
    may refer to Figure 3 of the referenced paper for more information.
  prefs: []
  type: TYPE_NORMAL
- en: 'IRIS: Transformers as World Models'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Transformers as a deep learning architecture came to scene in 2017 and today
    are the driving force behind the exploding AI growth, especially the transformer-driven
    Large Language Models in the form of auto-regressive prediction. This architecture
    is known as GPT, and Chapter [11](502835_2_En_11_Chapter.xhtml) covers it. Transformers
    have increasingly replaced Recurrent Neural Network (RNN) architecture over the
    last four to five years for processing temporal or sequence-driven data. In the
    case of RL, the temporal sequence is the sequence of states and actions over multiple
    steps.
  prefs: []
  type: TYPE_NORMAL
- en: In order to learn the system dynamics and combine the benefits of the model-based
    approach with the model-free approach, you need a way to predict a sequence processor
    that can take past and present states, as well as actions to predict the next
    state and optionally the reward. All the papers that you have seen so far take
    different approaches to bringing sample efficiency while controlling the quality
    of solution due to imperfections in the dynamics learned inside the model-based
    approach versus real-world dynamics.
  prefs: []
  type: TYPE_NORMAL
- en: You also saw a need to bring sample efficiency by doing look-aheads like Monte
    Carlo Tree Search (MCTS) even when the dynamics were known but the search space
    was just too large to explore exhaustively. This is another way to think about
    bringing efficiency within a reasonable number of sample/computation processing.
  prefs: []
  type: TYPE_NORMAL
- en: The authors of a paper in 2023 titled “Transformers Are Sample-Efficient World
    Models,”^([22](#Fn22)) taking inspiration from “world model” paper’s approach
    of learning in imagination, replaced the RNN used in that paper with a transformer-based
    approach and made a few other changes. The authors call their approach IRIS (Imagination
    with auto-Regression over an Inner Speech). They applied this technique to the
    Atari games benchmark. Atari games was introduced as an RL environment in Chapter
    [8](502835_2_En_8_Chapter.xhtml) when covering DQN.
  prefs: []
  type: TYPE_NORMAL
- en: As per the authors, IRIS sets a new state-of-the-art in the Atari100k benchmark
    for methods without look-ahead search. They claim that the IRIS-based world model
    acquires a deep understanding of game mechanics, resulting in pixel perfect predictions
    in some games. The paper also illustrates the generative capabilities of the world
    model, providing a rich gameplay experience when training in imagination. With
    minimal tuning compared to existing state-of-the-art agents, IRIS opens a new
    path toward efficiently solving complex environments.
  prefs: []
  type: TYPE_NORMAL
- en: The authors also posit that in the future, IRIS could be scaled up to computationally
    demanding and challenging tasks that would benefit from the speed of its world
    model. Besides, its policy currently learns from reconstructed frames, but it
    could probably leverage the internal representations of the world model. The authors
    also suggest an area of research that involves combining learning in imagination
    with MCTS.
  prefs: []
  type: TYPE_NORMAL
- en: One more thing to highlight is the motivation for building sample efficiency.
    You may wonder that, when LLMs are being trained for months on datasets consisting
    of trillions of word tokens, why this obsession with sample efficiency in RL?
    One answer is that LLMs are a lot bigger model and when you take the ratio of
    number of training tokens and the number of model parameters, the ratio does not
    look that large, while the training data as a ratio of model parameter is higher
    in RL world. However, this is not the core point. There is an even more fundamental
    point to be made. LLMs deal with textual data. During training these models can
    be making errors and learning from those errors with some kind of gradient descent
    approach. The errors during training do not cause any harm or pose any threat
    to anyone. In contrast, RL as an approach is used a lot with physical machines
    such as self-driving cars, robots, and other scenarios involving human behavior.
    RL by design needs to collect new data as the agent learns and explores new states
    of the environment. Now, if these imperfect agents need to interact with the real
    world as part of collecting newer training data, these agents may act in a way
    that could be harmful to itself, to people around it, or even to property and
    assets that it interacts with. Even if such an interaction is possible, interacting
    with a real-world environment and collecting samples is a lot costlier and slower
    than using a software-based simulation model.
  prefs: []
  type: TYPE_NORMAL
- en: Further, you have seen that sample efficiency is higher in approaches like DQN
    vs policy-based learning approach. However, policy-based algorithms are a lot
    easier to carry out. The Actor-Critic family of approaches is one way to combine
    the benefits of both approaches. The model-based approach with learned dynamics
    is yet another efficiency step being added.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now briefly consider the components of the IRIS approach proposed in this paper.
    Figure [13-14](#Fig14) shows the approach. The problem is formulated as a Partially
    Observable Markov Decision Process (POMDP) with image observations ![$$ {x}_t\in
    {R}^{h\times w\times \mathbbm{3}} $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq31.png),
    discrete actions *a*[*t*] ∈ {1, …, *A*}, scalar rewards *r*[*t*] ∈ *R*, episode
    termination *d*[*t*] ∈ {0, 1}, discount factor *γ* ∈ (0, 1), initial observation
    distribution *ρ*[0], and environment dynamics *x*[*t* + 1], *r*[*t*], *d*[*t*] ∼ *p*(*x*[*t* + 1],
    *r*[*t*], *d*[*t*]∣ *x*[≤*t*], *a*[≤*t*]). The reinforcement learning objective
    is to train a policy *π* that learns to output actions that maximize the expected
    sum of rewards *E*[*π*][∑[*t* ≥ 0]*γ*^(*t*)*r*[*t*]]. The approach relies on the
    three components to learn in imagination: experience collection, world model learning,
    and behavior learning. The agent learns to act exclusively within its world model
    and uses real experience to learn the environment dynamics. The three steps are:'
  prefs: []
  type: TYPE_NORMAL
- en: '`collect_experience`: Collects experience in the real environment with the
    agent’s current policy.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`update_world_model`: Trains the model to improve predictions for rewards,
    episode ends, and next observations.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`update_behavior`: In imagination, improves the policy and value functions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_13_Chapter/502835_2_En_13_Fig14_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A block diagram depicts the transformer-based world model approach. 3 blocks
    denote the flow sequence at the t values of 0, 1, up to s. Interaction between
    different labels, including x hat 0, x hat 1, x hat s, a 0, a 1, a s, pi, r hat
    0, d hat 0, r hat 1, and d hat 1 are indicated around the diagram.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-14
  prefs: []
  type: TYPE_NORMAL
- en: 'IRIS: Transformer-based world model approach Source^([23](#Fn23))'
  prefs: []
  type: TYPE_NORMAL
- en: Consider the world model. How is it constructed? To process images through a
    transformer, you need to convert the image to a sequence of tokens just like LLMs
    convert a sentence into a sequence of tokens. A standard approach is something
    called Variational Auto Encoder (VAE). At a high level, VAE takes the image and
    passes it through a neural network called encoder ![$$ E:{R}^{h\times w\times
    \mathbbm{3}}\to {\left\{1,\dots, N\right\}}^K $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq32.png).
    The encoder converts an input image *x*[*t*] into *K* tokens from a vocabulary
    of size *N*, which converts the image to a smaller compressed representation ![$$
    {z}_t=\left({z}_t^1,\dots, {z}_t^K\right)\in {\left\{1,\dots, N\right\}}^K $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq33.png)
    where ![$$ {z}_t^k=\mathit{\arg}\underset{i}{\min }{\left\Vert {y}_t^k-{e}_i\right\Vert}_2
    $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq34.png), that
    is, the index *i* of the closest embedding vector in ![$$ \mathcal{E}={\left\{{e}_i\right\}}_{i=1}^N\in
    {R}^{N\times d} $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq35.png).
    The decoder part of the VAE, ![$$ D:{\left\{1,\dots, N\right\}}^K\to {R}^{h\times
    w\times \mathbbm{3}} $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq36.png),
    turns *K* tokens back into a reconstructed image ![$$ {\hat{x}}_t $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq37.png).
    The flow of image to a latent representation and back to a reconstructed image
    is shown by the green arrows in Figure [13-14](#Fig14).
  prefs: []
  type: TYPE_NORMAL
- en: The authors claim that the discrete autoencoder (*E*, *D*) learns a symbolic
    language of its own to represent high-dimensional images as a small number of
    tokens. This discrete autoencoder is trained on previously collected frames, with
    an equally weighted combination of a *L*[1] reconstruction loss, a commitment
    loss, and a perceptual loss.
  prefs: []
  type: TYPE_NORMAL
- en: The reconstructed image ![$$ {\hat{x}}_t $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq38.png)
    is used in the policy network to output the action *a*[*t*] as shown in the purple
    arrow in the Figure [13-14](#Fig14).
  prefs: []
  type: TYPE_NORMAL
- en: The latent representation *z*[*t*] passes through the transformer along with
    the action *a*[*t*] to predict the next time-step values like latent representation
    ![$$ {\hat{\mathrm{z}}}_{\mathrm{t}+1} $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq39.png)
    of the next state, the reward ![$$ {\hat{r}}_t $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq40.png),
    and the done flag ![$$ {\hat{r}}_t $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq41.png).
    This next time-step prediction is done in an auto-regressive way, currently the
    most popular GPT way of predicting the future from the past and present.
  prefs: []
  type: TYPE_NORMAL
- en: The next state latent ![$$ {\hat{z}}_{t+1} $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq42.png)
    is the imagined next state latent based on the past latent and action. This is
    then passed through the decoder of the VAE to get the imagined next state of the
    game ![$$ {\hat{x}}_{t+1} $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq43.png),
    which in turn is fed into the policy network to produce the next state action
    *a*[*t* + 1]. As you can see from Figure [13-14](#Fig14), the real-world images
    are not used except for the start image depicted as *x*[*o*]. The rest of the
    action is taken based on the decoded imagined images ![$$ \hat{x} $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq44.png).
    This flow is shown as purple arrows in Figure [13-14](#Fig14).
  prefs: []
  type: TYPE_NORMAL
- en: The transformer *G* is trained in a self-supervised manner on segments of *L*
    time-steps, sampled from past experiences. Cross-entropy loss is used for the
    transition and termination predictors, and a mean-squared error loss or a cross-entropy
    loss for the reward predictor, depending on the reward function.
  prefs: []
  type: TYPE_NORMAL
- en: Many Actor-Critic methods could be employed to train *π* and *V* in imagination.
    Based on the experiments carried out on various environments, the authors document
    the performance gains.
  prefs: []
  type: TYPE_NORMAL
- en: Causal World Models
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A 2024 paper from DeepMind titled “Robust Agents Learn Causal World Models”^([24](#Fn24))
    starts with a premise that causal reasoning is foundational to human intelligence
    and has been conjectured to be necessary for achieving human-level AI. They further
    state that in recent years, this conjecture has been challenged by the development
    of artificial agents that achieve strong generalization without explicitly learning
    or reasoning on causal models. And while the necessity of causal models for solving
    causal inference tasks has been established, their role in decision tasks such
    as classification or reinforcement learning has been less clear.
  prefs: []
  type: TYPE_NORMAL
- en: 'In the paper, the authors establish in a model-independent way that any agent
    capable of robustly solving a decision task must have learned a causal model of
    the data generating process, regardless of how the agent was trained or the details
    of its architecture. It hints at an even deeper link between causality and general
    intelligence, as the causal model the agent learns can in turn support a much
    wider range of tasks beyond the original training objective. The authors conclude
    with the statement that:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“…By establishing this formal connection between causality and generalisation,
    our results show that causal reasoning is a fundamental ingredient for developing
    robust and general AI”.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Interested readers can refer to the paper for details.
  prefs: []
  type: TYPE_NORMAL
- en: Offline RL
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: What do the terms *online* and *offline* mean? You have seen what an on-policy
    and off-policy algorithm is. On-policy algorithms deal with the scenario when
    an agent interacts with the environment, collects the experiences, and uses experiences
    these to improve the agent. Immediately after that, the agent discards all the
    prior experiences and goes back to the cycle of interacting, collecting, and training.
    The agent uses the data samples from the latest policy alone to train. An off-policy
    approach deals with the scenario where the policy used to collect the experiences
    like the epsilon greedy policy is different from the policy that was learned.
    In DQN, you also keep storing all prior experiences in a buffer use these. A point
    to note is that in off-policy, while you are using the old experience data from
    buffer, you still periodically collect new data by interacting with the environment.
  prefs: []
  type: TYPE_NORMAL
- en: There is another approach where the agent gets the data from past interactions
    and then does not interact with the environment during training; it is expected
    to work well when deployed in the real world. Essentially it is a variation of
    an off-policy algorithm with no further interaction with the environment periodically
    during the training. The data collected before the beginning of the training is
    kept static and not modified during the whole process of the training.
  prefs: []
  type: TYPE_NORMAL
- en: The main motivation for such an approach is that in certain scenarios, such
    as robotics and autonomous vehicles, it is usually very difficult to simultaneously
    train and collect new experiences while the agent is getting trained. At the same
    time, there is an abundance of past data available for such environments that
    has been collected over many years. The offline approach (known as *offline RL*)
    can make training from past data lot more efficient. This makes offline RL a very
    practical and compelling proposition in the field of robotics and autonomous vehicles.
    However, offline RL is hard because of the difference between online interactions
    and a fixed dataset of recorded interactions, that is, when the learned agent
    takes a different action than the data collection agent, you can’t determine the
    reward that should be given. This issue is also known as *distribution shift*.
    In other words, when the data seen by the agent as it gets progressively more
    trained is way different from the data distribution from the initial fixed set
    of interaction that is being used to train the agent.
  prefs: []
  type: TYPE_NORMAL
- en: The three approaches—on-policy, off-policy, and offline RL—can be summarized
    in the table shown in Figure [13-15](#Fig15). Let’s spend a minute to get the
    terminology right. What you have studied so far in this book can be classified
    as online algorithms, both on-policy as well as off-policy. These are all online
    algorithms, as the agent keeps collecting the data during training. The difference
    has been about the reuse of data. In an online on-policy, after you collect the
    data and use it once to train the agent, it becomes stale. You throw away that
    data and the agent collects a completely new set of interaction data/experience
    from the environment for the next iteration of training. In online off-policy,
    while you are collecting the new interaction data, you also keep using the previously
    collected data—the use of the replay buffer in DQN. The premise of offline RL
    is never to collect new data during the training; only to use the prior collected
    data for training the agent and then to deploy these agents in real life, either
    as fully operational in production or after a short fine-tuning with any online
    approach.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_13_Chapter/502835_2_En_13_Fig15_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A table with 2 rows and 2 columns compares offline and online R L. The column
    headers are as follows. Only use the latest policy data to train the current agent
    and mix past and latest policy data. The rows denote the current agent collects
    data and does not interact with the environment during training.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-15
  prefs: []
  type: TYPE_NORMAL
- en: Offline RL vs online RL
  prefs: []
  type: TYPE_NORMAL
- en: 'You can find a comprehensive tutorial of offline RL in the paper “Offline Reinforcement
    Learning: Tutorial, Review, and Perspectives on Open Problems.”^([25](#Fn25))
    A visualization of the comparison between three approaches is shown in Figure
    [13-16](#Fig16). The table in Figure [13-15](#Fig15) and the diagram in Figure
    [13-16](#Fig16) represent the same concept—the comparison of three high-level
    approaches in RL. By the way, offline RL is also known as data-driven RL or batch
    RL.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_13_Chapter/502835_2_En_13_Fig16_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 3 block diagrams illustrate different online and offline R L approaches. a.
    It depicts online reinforcement learning. b. It represents off-policy reinforcement
    learning. c. It demonstrates offline reinforcement learning, indicating the sequence
    of data collection, training, and deployment phases.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-16
  prefs: []
  type: TYPE_NORMAL
- en: 'Offline RL vs online RL Source: Figure 1 of the survey paper^([26](#Fn26))'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s now briefly look at the scenarios in which offline RL can be beneficial.
  prefs: []
  type: TYPE_NORMAL
- en: '**Robotics****:** While it may be feasible to collect online data during robot
    training, we would like to train the robots on various skills. Each skill teaching
    in robotics usually requires a very large amount of interaction and doing so for
    a wider range of skills multiplies the problem many folds. Instead of that, if
    you could use all the previously collected data to train the agent in a multi-task
    offline RL learning way, you could make the training lot more sample efficient.
    Such a pre-trained robot could easily be deployed to do a new task with a very
    small amount of skill specific online agent training.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Healthcare****:** An example of RL in healthcare could be modelling the whole
    interaction of a doctor and a patient as a Markov MDP. Diagnostic tests and drugs
    and treatments prescribed by the doctors could be modelled as actions and the
    past medical history of the patient could be treated as states/observations. The
    reward could be the longevity or the health score of the individual. Training
    such an agent with online data is usually not feasible due to the fear of wrong
    diagnosis leading/treatment and other safety concerns. However, hospitals have
    years of historical data that could be used in an offline RL approach to train
    the agent without any online interaction during the training.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Autonomous vehicles****:** It possesses the same challenge as healthcare
    example. Training the vehicles online and learning from the mistakes and rewards
    would not be feasible due to safety and accident damage concerns. However, a human
    driver can drive the car around and collect the data to train the agent in an
    offline RL way.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Offline RL makes RL start looking like supervised learning. Many such sharp
    distinctions are getting blurred, as researchers are finding unique ways to leverage
    the benefits of different approaches to overcome the weaknesses of any single
    approach.
  prefs: []
  type: TYPE_NORMAL
- en: Let us now talk about the existing approaches for offline RL. In theory, the
    usual off-policy algorithms can be used as offline RL by just switching off the
    real-world data collection loop during training and solely relying on the initial
    data collection. However, this would lead to data distribution mismatch issues,
    which need careful handling to reduce the mismatch issue. However, there is a
    fundamental mismatch issue that cannot be handled, where the initial data and
    observations during training are starkly different, and it is not just a marginal
    drift. Assume that you are training the agent on a game that has multiple levels,
    with each level being very different and contain new adversarial characters with
    unseen behavior. Further assume that you have found the ideal optimal offline
    RL to train the agent but train the agent only on the data seen in the first level
    of the game. Do you think such an agent will perform well as the agent moves progressively
    through levels encountering newer agents with unseen complex behaviors? The answer
    is a big no. These cannot be solved based entirely using offline RL. In a scenario
    like this, the agent trained on the offline different data could be used as a
    good starting point and then progressively trained on newer data in an online
    fashion.
  prefs: []
  type: TYPE_NORMAL
- en: Turning the focus back to extending an *off-policy* approach to *offline RL*,
    consider one example in which DQN has been extended. A paper titled “An Optimistic
    Perspective on Offline Reinforcement Learning”^([27](#Fn27)) has one solution.
    The paper is accompanied by a blog and code repository as well. The authors use
    a *DQN replay dataset**,* which consists of a collection of tuples of (observation,
    action, reward, next observation) (approximately 50 million) encountered during
    training of a DQN agent, on all 60 Atari 2600 games with sticky actions enabled
    for 200 million frames, with the process repeated five times for each game.
  prefs: []
  type: TYPE_NORMAL
- en: A lot of approaches of extending DQN to offline RL have to do with the tampering
    down of optimistic Q-estimates. First, the authors tried DQN and QR-DQN in a full
    offline setup on the dataset. They compared the results of these approaches against
    the best performing online DQN agent obtained after training, that is, a fully-trained
    DQN. The experiments lead to the conclusion that offline DQN underperforms fully-trained
    online DQN on most of the games. They also found that offline QR-DQN outperforms
    offline DQN and fully-trained DQN on most of the games. Based on the findings,
    they suggested two variants toward fully offline DQN (offline RL).
  prefs: []
  type: TYPE_NORMAL
- en: The first one is called *Ensemble-DQN* and is a simple extension of DQN that
    trains multiple Q-value estimates and averages them for evaluation.
  prefs: []
  type: TYPE_NORMAL
- en: The second one is called *Random Ensemble Mixture (**REM)**,* which is an easy-to-implement
    extension of DQN inspired by Dropout. The main idea behind REM is that you can
    use a weighted mix of Q-value estimates as another Q-value estimate, if you have
    multiple Q-value estimates available. Therefore, in each training step, REM randomly
    mixes different Q-value estimates and uses this random mix for stable training.
  prefs: []
  type: TYPE_NORMAL
- en: A pictorial comparison of Q-value estimates in the four approaches—DQN, QR-DQN,
    offline Ensemble DQN, and offline REM—is shown in Figure [13-17](#Fig17).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_13_Chapter/502835_2_En_13_Fig17_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: An illustration represents the architectures of D Q N, Q R D Q N, Ensemble D
    Q N, and R E M. D Q N process through a neural network, while the rest of the
    models proceed through the shared neural networks to obtain the actions and returns
    at the end.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-17
  prefs: []
  type: TYPE_NORMAL
- en: 'Architecture comparison: offline DQN vs online DQN Source^([28](#Fn28))'
  prefs: []
  type: TYPE_NORMAL
- en: The experiments they conducted found that offline REM gave the best results;
    it outperforms offline DQN as well as offline QR-DQN. They also found out that
    the gains from offline REM are more than the gains from a fully trained online
    C51, a strong distributional agent.
  prefs: []
  type: TYPE_NORMAL
- en: The tutorial paper referenced earlier contains many other approaches being tried
    out. It is a lengthy but a very rewarding starting point for those who are interested
    in offline RL.
  prefs: []
  type: TYPE_NORMAL
- en: Decision Transformers
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In a 2021 paper titled “Decision Transformer: Reinforcement Learning via Sequence
    Modeling,”^([29](#Fn29)) the authors took the approach of language modeling using
    transformers in LLMs. The authors describe the Decision Transformer model as an
    architecture that casts the problem of RL as conditional sequence modeling. Unlike
    prior approaches to RL that fit value functions or compute policy gradients, Decision
    Transformer simply outputs the optimal actions by leveraging a causally masked
    transformer. By conditioning an autoregressive model on the desired return (reward),
    past states, and actions, the Decision Transformer model can generate future actions
    that achieve the desired return. The authors, via experiments, show that Decision
    Transformer matches or exceeds the performance of state-of-the-art model-free
    offline RL baselines on Atari, OpenAI Gym, and Key-to-Door tasks. A schematic
    of the Decision Transformer model is shown in Figure [13-18](#Fig18). In Decision
    Transformer, states, actions, and returns are fed into modality-specific linear
    embeddings and a positional episodic time-step encoding is added. Tokens are fed
    into a GPT architecture, which predicts actions autoregressively using a causal
    self-attention mask. In the authors’ words:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“In contrast to prior work using transformers as an architectural choice for
    components within traditional RL algorithms, we seek to study if generative trajectory
    modeling—i.e., modeling the joint distribution of the sequence of states, actions,
    and reward—can serve as a replacement for conventional RL algorithms.”*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_13_Chapter/502835_2_En_13_Fig18_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A diagram illustrates the decision transformer method. The state, action, and
    return are fed into the linear embeddings with the addition of a positional episodic
    time-step encoding, followed by the casual transformer and linear decoder.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-18
  prefs: []
  type: TYPE_NORMAL
- en: 'The Decision Transformer method Source: Figure 1 of the Decision Transformer
    paper^([30](#Fn30))'
  prefs: []
  type: TYPE_NORMAL
- en: Consider the high-level architecture as well as the pseudocode of the algorithm.
    Figure [13-19](#Fig19) shows the pseudocode of the algorithm. The key idea of
    the architecture is that the choice of trajectory representation should enable
    transformers to learn meaningful patterns and should be able to conditionally
    generate actions at test time.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_13_Chapter/502835_2_En_13_Fig19_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A snippet of pseudocode represents the decision transformer algorithm. The sections
    for computing embedding for tokens, using the transformer to get hidden states,
    selecting hidden states for action prediction tokens, action prediction, and training
    and evaluation loops are indicated in the code.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-19
  prefs: []
  type: TYPE_NORMAL
- en: 'Decision Transformer pseudocode Source: Algorithm 1 of the paper^([31](#Fn31))'
  prefs: []
  type: TYPE_NORMAL
- en: As the idea is to generate actions based on the future desired rewards instead
    of depending on past rewards, the authors feed the model with the returns-to-go
    ![$$ {\hat{R}}_t={\sum}_{t^{\prime }=t}^T{r}_{t^{\prime }} $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq45.png).
    As a result of this, the trajectory representation being fed to the transformer
    is given in Equation [13-3](#Equ3). Since returns-to-go capture the future, they
    are suited for autoregressive training, guiding the autoregressive model toward
    the desired outcome.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \uptau =\left({\hat{R}}_1,{s}_1,{a}_1,{\hat{R}}_2,{s}_2,{a}_2,\dots, {\hat{R}}_T,{s}_T,{a}_T\right)
    $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_Equ3.png)'
  prefs: []
  type: TYPE_IMG
- en: (13-3)
  prefs: []
  type: TYPE_NORMAL
- en: At test time, the desired performance (e.g., 1 for success or 0 for failure)
    can be specified along with the environment starting state as the conditioning
    information to initiate generation. After executing the generated action for the
    current state, the target return is decremented by the achieved reward and this
    process is repeated until episode termination.
  prefs: []
  type: TYPE_NORMAL
- en: 'With respect to the training, the last *K* time-steps are fed into Decision
    Transformer, for a total of 3*K* tokens—one for each modality: return-to-go, state,
    or action. The embeddings are obtained with a linear layer for each modality,
    which projects the raw inputs into the embedding dimension of the Decision Transformer.
    This is followed by a usual practice of layer normalization. If the observations
    are visual inputs, the observation is processed through a convolutional encoder
    instead of a linear layer. You saw this approach in the case of “IRIS: Transformers
    as World Models”. Time-step encoding is learned and added to each token. However,
    note that this is different than the standard positional embedding used by transformers,
    as here one time-step corresponds to three tokens. The tokens are then processed
    by a GPT model, which predicts future action tokens via autoregressive modeling.'
  prefs: []
  type: TYPE_NORMAL
- en: From a given dataset of offline trajectories, minibatches of sequence length
    *K* are sampled. The last layer—the prediction head corresponding to the input
    token *s*[*t*]—is trained to predict *a*[*t*]. The loss used for training is cross-entropy
    loss for discrete actions and mean-squared error for continuous actions.
  prefs: []
  type: TYPE_NORMAL
- en: The authors also noted that predicting the states or returns-to-go did not improve
    performance, although the Decision Transformer architecture allows for easy integration
    of the same. They have left further exploration of this for future study.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [13-19](#Fig19) shows the pseudocode of the Decision Transformer algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: 'In the paper, the authors conduct experiments to answer the following questions:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Does the Decision Transformer model perform* *behavior cloning* *on a subset
    of the data?* The experiments suggest this to be true with the finding that Decision
    Transformers can be more effective than simply performing imitation learning on
    a subset of the dataset.'
  prefs: []
  type: TYPE_NORMAL
- en: '*How well does Decision Transformer model the* *distribution of returns**?*
    The experiments show that the desired target returns and the true observed returns
    are highly correlated. They further show that one can prompt the Decision Transformer
    with higher returns than the maximum episode return available in the dataset,
    demonstrating that Decision Transformer is sometimes capable of extrapolation.'
  prefs: []
  type: TYPE_NORMAL
- en: '*What is the* *benefit* *of using a longer context length?* It is generally
    considered that the previous state (i.e., K = 1) is enough for reinforcement learning
    algorithms when frame stacking is used. However, the results show that that performance
    of Decision Transformer is significantly worse when K = 1, indicating that past
    information is useful for Atari games. One hypothesis is that when the current
    approach is representing a distribution of policies—as with sequence modeling—the
    context allows the transformer to identify which policy generated the actions,
    enabling better learning and/or improving the training dynamics.'
  prefs: []
  type: TYPE_NORMAL
- en: '*Does Decision Transformer perform effective long-term* *credit assignment**?*
    The authors show that with spare reward environments like Key-to-Door, Decision
    Transformers are able to learn effective policies, producing near-optimal paths,
    despite only training on random walks. TD learning cannot effectively propagate
    Q-values over the long horizons involved and gets poor performance. Delayed returns
    minimally affect Decision Transformer due to the nature of the training process.'
  prefs: []
  type: TYPE_NORMAL
- en: '*Can transformers be accurate critics in sparse* *reward settings**?* As Decision
    Transformers can produce effective policies (actors), the authors also evaluate
    whether Decision Transformer models can also be effective critics. Their results
    show that to be true.'
  prefs: []
  type: TYPE_NORMAL
- en: The authors also state that they believe Decision Transformer can meaningfully
    improve online RL methods by serving as a strong model for behavior generation.
    As an example, Decision Transformer can serve as a powerful “memorization engine”
    and, along with powerful exploration algorithms, has the potential to simultaneously
    model and generate a diverse set of behaviors.
  prefs: []
  type: TYPE_NORMAL
- en: Automatic Curriculum Learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Curriculum learning is a training strategy that originates from the way humans
    learn, gradually moving from simple concepts to more complex ones. This approach
    has been adapted in the field of artificial intelligence (AI) and, more specifically,
    in reinforcement learning (RL) to improve the efficiency and effectiveness of
    training machine learning models. Curriculum learning in RL involves structuring
    the learning process in stages or lessons that progressively become more challenging
    or complex, guiding the agent to learn more efficiently.
  prefs: []
  type: TYPE_NORMAL
- en: 'The core idea behind curriculum learning is to start with easier tasks or environments
    that capture the fundamental aspects of a problem and gradually introduce more
    complexity. This method stands in contrast to the traditional approach of training
    an agent on the full complexity of a problem from the beginning. By breaking down
    the learning process into manageable steps, curriculum learning aims to achieve
    the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Accelerate learning**: By focusing on simpler tasks initially, an agent can
    quickly learn basic skills that are foundational to more complex tasks, leading
    to faster overall learning.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Improve** **learning stability**: Starting with simpler tasks reduces the
    initial difficulty, helping to stabilize the learning process by providing clearer
    learning signals.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Enhance final performance**: Agents trained with a curriculum usually achieve
    better final performance on complex tasks because the gradual increase in difficulty
    allows for more effective skill acquisition.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Implementing curriculum learning involves several key components:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Task Selection**: Deciding on a sequence of tasks or environments that start
    simple and gradually increase in complexity. This can be based on various factors
    such as the number of obstacles, the size of the environment, or the complexity
    of the interactions required.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Progression Criteria**: Establishing metrics or criteria to determine when
    the agent is ready to progress to the next task. This could be based on performance
    thresholds, such as achieving a certain average reward, or learning stability
    measures.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Curriculum Design**: Designing the curriculum itself, which involves not
    just selecting the tasks and progression criteria but also deciding how to modify
    the environment or the task parameters to create the progression of difficulty.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: While curriculum learning has shown promise in various reinforcement learning
    applications, it also presents several challenges. The first challenge is that
    of *curriculum design*. Designing an effective curriculum is not trivial. It requires
    insight into the task at hand and an understanding of what constitutes an “easier”
    version of the problem. The second issue is about *adaptability*. The curriculum
    must be adaptable to the learning progress of the agent. A fixed curriculum might
    not suit all agents or learning scenarios. The next one is about *transferability*.
    Skills learned in earlier stages of the curriculum should transfer to later stages
    and the final task. Ensuring this transferability is crucial for the effectiveness
    of curriculum learning.
  prefs: []
  type: TYPE_NORMAL
- en: Curriculum learning has been applied successfully in various domains within
    reinforcement learning, such as robotics, where agents learn basic movements before
    tackling complex manipulation tasks, or in game playing, where AI learns to play
    simpler levels before advancing to more difficult ones. These applications demonstrate
    the versatility and potential of curriculum learning to enhance learning processes
    in reinforcement learning.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are two very good resources to get started in this area. The first one
    is a survey paper titled “Automatic Curriculum Learning For Deep RL: A Short Survey”^([32](#Fn32))
    and the second one is a blog titled “Curriculum for Reinforcement Learning.”^([33](#Fn33))'
  prefs: []
  type: TYPE_NORMAL
- en: In conclusion, curriculum learning offers a promising approach to improve the
    training of reinforcement learning agents by structuring the learning process
    into a progression of increasing difficulty. By leveraging the principles of how
    humans learn, it seeks to make the learning process more efficient, stable, and
    effective. However, the challenges in designing and implementing effective curricula
    highlight the need for ongoing research and development in this area. As our understanding
    of both human learning and artificial intelligence deepens, curriculum learning
    in reinforcement learning is likely to become an even more powerful tool in the
    development of intelligent agents.
  prefs: []
  type: TYPE_NORMAL
- en: Imitation Learning and Inverse Reinforcement Learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There is another branch of learning called *imitation learning*. You record
    the interactions of an expert and then use a supervised setting to learn a behavior
    that can mimic the expert. I briefly touched on this when talking about various
    world model approaches in this chapter.
  prefs: []
  type: TYPE_NORMAL
- en: As shown in Figure [13-20](#Fig20), you have an expert who looks at states *s*[*t*]
    and produces the actions *a*[*t*]. You use this data in a supervised setting with
    the states *s*[*t*] as input to the model and the actions *a*[*t*] as targets
    to learn a policy π[θ](*a*[*t*]| *s*[*t*]), as shown in the middle of Figure [13-20](#Fig20).
    This is the easiest way to learn a behavior, called *behavior cloning*. It’s even
    simpler than the whole discipline of reinforcement learning. The system/learner
    does not analyze or reason about anything; it just blindly learns to mimic the
    behavior of the expert.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_13_Chapter/502835_2_En_13_Fig21_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A line graph of state versus time denotes 2 curved arrows emerging from the
    origin at an increasing trend. The upper arrow is marked as pi theta trajectory
    and the bottom arrow is denoted as training trajectory.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-21
  prefs: []
  type: TYPE_NORMAL
- en: Drift in trajectory over time
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_13_Chapter/502835_2_En_13_Fig20_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: An illustration depicts an input photograph of a road proceeding through a neural
    network and obtaining the final output. The input is marked as S t and the output
    is a t. A pair of leftward and rightward arrows are denoted in the output.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-20
  prefs: []
  type: TYPE_NORMAL
- en: Expert demonstration
  prefs: []
  type: TYPE_NORMAL
- en: However, the learning is not perfect. Suppose you learn a near-perfect policy
    with some minor errors, and suppose you start in a state *s*[1]. You follow the
    learned policy to take action *a*[1], which, say, is a minor deviation from what
    an expert would have taken. You keep taking these actions in a sequence, some
    matching the expert and some deviating a little bit from what an expert would
    have done. These deviations over multiple actions can add up and bring your vehicle
    (see Figure [13-20](#Fig20)) to the edge of the road. Most likely, the expert
    would not have driven so badly to get to the edge of the road. The expert training
    data never saw what the expert would have done in this situation. The policy has
    not been trained with these kinds of situations. The learned policy will most
    likely take an action that could be random and definitely not designed to correct
    the error to bring the vehicle back toward the center of the road.
  prefs: []
  type: TYPE_NORMAL
- en: This is an *open loop problem*. Errors from every action are compounded to make
    the actual trajectory drift from the expert trajectory, as shown in Figure [13-21](#Fig21).
  prefs: []
  type: TYPE_NORMAL
- en: This is also known as *distributional shift*. In other words, the distribution
    of states in the policy training is different from the distribution of states
    the agent sees when it executes the policy in an open loop with no corrective
    feedback.
  prefs: []
  type: TYPE_NORMAL
- en: In cases like this, with additive errors, there is an alternative algorithm
    known as *DAgger* (for “dataset aggregation”), in which the agent is iteratively
    trained by first training the agent on the data from the expert demonstration.
    The trained policy is used to generate additional states. The expert then provides
    the correct action for these generated states. The augmented data, along with
    the original data, are again used to fine-tune the policy. The cycle goes on,
    and the agent gets closer and closer to the expert in terms of following the behavior.
    This can be classified as *direct policy learning*. Figure [13-22](#Fig22) shows
    the pseudocode of DAgger.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_13_Chapter/502835_2_En_13_Fig22_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A set of lines of statements represents the Dagger algorithm. The statements
    instruct to train pi theta from human data D, run pi theta to get data set D pi,
    ask human or expert to label D pi with actions, and aggregate.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-22
  prefs: []
  type: TYPE_NORMAL
- en: DAgger for behavior cloning
  prefs: []
  type: TYPE_NORMAL
- en: DAgger has a human expert label the unseen states as the policy is played out,
    which trains the agent to recover from mistakes/drifts. DAgger is simple and efficient.
    However, it is just behavior cloning and not reinforcement learning. It does not
    reason about anything other than trying to learn a behavior to follow the expert
    actions. If the expert covers a large part of the state space that the agent is
    likely to see, this algorithm can help the agent learn a good behavior. However,
    anything requiring long-term planning is not suited for DAgger.
  prefs: []
  type: TYPE_NORMAL
- en: If it is not reinforcement learning, why am I talking about it here? It turns
    out that in many cases, having an expert give a demonstration is a good way to
    understand the objective that the agent is trying to achieve. When coupled with
    other enhancements, imitation learning is a useful approach.
  prefs: []
  type: TYPE_NORMAL
- en: Up to now, in this book you have studied various algorithms to train the agent.
    With some algorithms, you knew the dynamics and transitions like the model-based
    setups. In others, you learned in a model-free setup without explicitly learning
    the model, and finally in some other cases, you learned the model from interaction
    with the world to augment model-free learning. However, you always considered
    the reward to be something simple, intuitive, and well known. In some other setups,
    you could handcraft a simple reward function, such as learning to follow a trajectory
    using MBMF. But all real-world cases are not so simple. The reward at times is
    ill defined and/or sparse. Many of the previous algorithms will not work in the
    absence of a well-defined reward.
  prefs: []
  type: TYPE_NORMAL
- en: Consider a case where you are trying to train a robot to pick up a jug of water
    and pour the water into a glass. What will the reward be for each action in the
    whole sequence? Will it be 1 when the robot is able to pour the water into a glass
    without spilling any on the table or breaking/dropping the jug/glass? Or will
    you define a range of rewards based on how much water was spilled? How will you
    induce a behavior to have the robot learn smooth actions like a human? Can you
    think of a reward that can provide correct feedback to the robot on what is a
    good move and what is a bad move?
  prefs: []
  type: TYPE_NORMAL
- en: Now look at the alternate scenario. The robot gets to watch a human carry out
    the task of pouring water. Instead of learning a behavior, the robot first learns
    a reward function, noting all actions matching the human behavior as good and
    others as bad, with goodness depending on the extent of the deviation from what
    it saw the humans do. It can then use the learned reward function, as a next step,
    to learn a policy/sequence of actions to perform similar actions. This is the
    domain of *inverse reinforcement learning (inverse RL)* *coupled with imitation
    learning*.
  prefs: []
  type: TYPE_NORMAL
- en: Table [13-1](#Tab1) compares behavior cloning, direct policy learning, and inverse
    RL.
  prefs: []
  type: TYPE_NORMAL
- en: Table 13-1
  prefs: []
  type: TYPE_NORMAL
- en: Types of Imitation Learning
  prefs: []
  type: TYPE_NORMAL
- en: '|   | Direct Policy Learning | Reward Learning | Access to Environment | Interactive
    Demonstrator/Expert | Pre-Collected Demonstrations |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Behavioral cloning | Yes | No | No | No | Yes |'
  prefs: []
  type: TYPE_TB
- en: '| Direct policy learning | Yes | No | Yes | Yes | Optional |'
  prefs: []
  type: TYPE_TB
- en: '| Inverse reinforcement learning | No | Yes | Yes | No | Yes |'
  prefs: []
  type: TYPE_TB
- en: 'Inverse Reinforcement learning is the MDP setup where you know the model dynamics,
    but you have no knowledge of the reward function. Mathematically, it can be expressed
    as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Given: ![$$ D=\left\{{\uptau}_1,{\uptau}_2,\dots .,{\uptau}_m\right\}=\left\{\left({s}_0^i,{a}_0^i,\dots
    .{s}_T^I,{a}_T^i\right)\right\}\sim {\uppi}^{\ast } $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq46.png)'
  prefs: []
  type: TYPE_NORMAL
- en: 'Goal: Learn a reward function *r*^∗'
  prefs: []
  type: TYPE_NORMAL
- en: So that π^∗ = *argmax*[π]*E*[π][*r*^∗(*s*, *a*)]
  prefs: []
  type: TYPE_NORMAL
- en: Figure [13-23](#Fig23) shows the high-level pseudocode for inverse RL. You collect
    sample trajectories from the expert, and you use them to learn the reward function.
    Next, using the learned reward function, you learn a policy that maximizes the
    reward. The learned policy is compared with the expert, and the difference is
    used to tweak the learned reward. This cycle goes on.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_13_Chapter/502835_2_En_13_Fig23_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A set of lines of statements represents the inverse R L algorithm. The expert
    human data is denoted at the top. The statements at the bottom instruct to learn
    the reward function and policy given reward function, and compare the learned
    policy with the expert.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-23
  prefs: []
  type: TYPE_NORMAL
- en: Inverse Reinforcement learning
  prefs: []
  type: TYPE_NORMAL
- en: 'Note that the inner *do loop* has a step (Step 2, “Learn policy given reward
    function”) of learning the policy iteratively. It is a loop abstracted to a single
    line of pseudocode. To scale this approach when the state space is continuous
    and highly dimensional and also when the system dynamics are unknown, you need
    tweaks to make the previous approach work. In a 2016 paper titled “Guided Cost
    Learning: Deep Inverse Optimal Control via Policy Optimization,”^([34](#Fn34))
    the authors used a sample-based approximation of Max Entropy Inverse RL.^([35](#Fn35))
    You can look at the referenced papers for further details. Figure [13-24](#Fig24)
    shows the high-level diagram of the approach.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_13_Chapter/502835_2_En_13_Fig24_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A diagram illustrates the workflow cycle between the generator and discriminator.
    The initial policy proceeds through the generator to generate policy samples.
    The discriminator updates the reward using samples and human demonstration data.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-24
  prefs: []
  type: TYPE_NORMAL
- en: 'Guided cost learning: deep inverse optimal control via policy optimization'
  prefs: []
  type: TYPE_NORMAL
- en: The architecture can be compared to *generative adversarial networks* (GANs)
    from deep learning. In GAN, a *generator network* tries to generate synthetic
    examples, and a *discriminator network* tries to give a high score to actual samples
    while giving a low score to synthetic examples. The generator tries to get better
    in generating examples that iteratively get harder to distinguish from “real-world
    examples,” and the discriminator gets better and better at making a distinction
    between synthetic versus real-world examples.
  prefs: []
  type: TYPE_NORMAL
- en: 'In the same way, the guided cost learning as given in Figure [13-24](#Fig24)
    can be thought of as a GAN setup, where the discriminator is getting better at
    giving a high reward to human observations while giving a low one to the actions/trajectories
    generated by the policy network. The policy network gets better and better at
    producing actions similar to a human expert. The uses of inverse learning coupled
    with imitation learning are many:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Making characters in animation movies*: You can move the face and lips in
    sync with the words the characters are speaking. The face/lip movements of a human
    expert are first recorded (expect demonstrations), and a policy is trained to
    make a character’s face/lips move like a human.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Parts of speech tagging*: This is based on some expert/human labels.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Smooth imitation learning*: To have an autonomous camera follow a game like
    basketball, similar to what a human operation would do, to follow the ball across
    the court, zoom, and pan based on certain events.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Coordinated multi-agent imitation learning*: To look at recordings of, say,
    a soccer game (human expert demonstrations) and then learn a policy to predict
    the next place for the players to be, based on the sequence.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Imitation learning is an expanding area. I have barely touched the surface to
    just introduce the topic. There are tons of good places to start exploring these
    topics. A good place to start this is the ICML2018 tutorial on imitation learning.^([36](#Fn36))
    It is a two-hour video tutorial with slides given by two experts from Caltech.
  prefs: []
  type: TYPE_NORMAL
- en: Derivative-Free Methods
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s move back to the regular model-free RL that you saw in major parts of
    the book. This section briefly covers the methods that allow you to improve policies
    without taking derivatives of policy π[θ](*a*| *s*) with respect to policy parameters
    *θ*.
  prefs: []
  type: TYPE_NORMAL
- en: Consider *evolutionary methods*. Why are they evolutionary? Because they work
    like natural evolution. Things that are better/fitter survive, and things that
    are weaker fade away.
  prefs: []
  type: TYPE_NORMAL
- en: The first method you look at is called the *cross-entropy method*. It is embarrassingly
    simple.
  prefs: []
  type: TYPE_NORMAL
- en: Pick a random/stochastic policy.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Roll out a few sessions.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Pick some percentage of sessions with higher rewards.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Improve the policy to increase the probability of selecting those actions.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Figure [13-25](#Fig25) gives the pseudocode of the cross-entropy method for
    training a continuous action policy, which is assumed to be a normal distribution
    with d-dimensional action space. Any other distribution could also be used, but
    for many domains, it has been shown that normal distribution is the best in terms
    of balancing the expressibility of the distribution and the number of parameters
    of the distribution.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_13_Chapter/502835_2_En_13_Fig25_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Six lines of statements represent the cross-entropy method. The mu and sigma
    values are updated at the end, which are the mean and standard deviation of the
    normal distribution.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-25
  prefs: []
  type: TYPE_NORMAL
- en: Cross-entropy method
  prefs: []
  type: TYPE_NORMAL
- en: A similar approach, called the *covariance matrix adaptation evolutionary strategy*
    (CMA-ES), is popular in the graphics world for an optimal gait of characters.
    In the cross-entropy method, you fit a diagonal Gaussian to the top *k*% of rollouts.
    However, in CMA-ES, you optimize the covariance matrix, and it amounts to the
    second-order model learning as compared to the first-order in the usual derivative
    methods.
  prefs: []
  type: TYPE_NORMAL
- en: A major drawback of the cross-entropy methods is that they work well for a relatively
    low-dimensional action space such as the `CartPole, Lunar-Lander`, and so on.
    Can the evolutionary strategy (ES) be made to work for deep net policies with
    high-dimensional action spaces? In a 2017 paper titled “Evolution Strategies as
    a Scalable Alternative to Reinforcement Learning,”^([37](#Fn37)) the authors show
    that ES can reliably train neural network policies, in a fashion well suited to
    be scaled up to modern distributed computer systems for controlling robots in
    the MuJoCo physics simulator.
  prefs: []
  type: TYPE_NORMAL
- en: 'This section conceptually walks through the approach that was taken in this
    paper. Consider a probability distribution of policy parameters: θ ∼ *P*[μ](θ).
    Here, *θ* means the parameters of the policy, and these parameters follow some
    probability distribution *P*[μ](θ) parameterized by μ.'
  prefs: []
  type: TYPE_NORMAL
- en: The goal is to find the policy parameter *θ* such that it generates trajectories
    that maximize the cumulative return. This is similar to the objective of the policy
    gradient approach.
  prefs: []
  type: TYPE_NORMAL
- en: 'Goal: ![$$ \operatorname{Maximize}\ {E}_{\uptheta \sim {P}_{\upmu}\left(\uptheta
    \right),\uptau \sim {\uppi}_{\uptheta}}\left[R\left(\uptau \right)\right] $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_IEq47.png)'
  prefs: []
  type: TYPE_NORMAL
- en: Like with policy gradient, you do a stochastic gradient ascent, but unlike policy
    gradient, you do not do so in *θ*, rather in *μ* space.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\nabla}_{\upmu}{E}_{\uptheta \sim {P}_{\upmu}\left(\uptheta \right),\uptau
    \sim {\uppi}_{\uptheta}}\left[R\left(\uptau \right)\right]={E}_{\uptheta \sim
    {P}_{\upmu}\left(\uptheta \right),\uptau \sim {\uppi}_{\uptheta}}\left[{\nabla}_{\upmu}\mathit{\log}{P}_{\upmu}\left(\uptheta
    \right)\cdotp R\left(\uptau \right)\right] $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_Equ4.png)'
  prefs: []
  type: TYPE_IMG
- en: (13-4)
  prefs: []
  type: TYPE_NORMAL
- en: The previous expression is similar to what you saw in policy gradients. However,
    there is a subtle difference. You are not doing a gradient step in *θ*. Hence,
    you do not worry about π[θ](*a*| *s*). You ignore most of the information about
    a trajectory, that is, states, actions, and rewards. We only worry about the policy
    parameter *θ* and the total trajectory reward *R*(*τ*). This in turn enables scalable
    distributed training similar to the A3C approach of running multiple workers as
    shown in Chapter [8](502835_2_En_8_Chapter.xhtml).
  prefs: []
  type: TYPE_NORMAL
- en: 'Consider a concrete example. Suppose *θ* ∼ *P*[*μ*](*θ*) is a Gaussian distribution
    with a mean of *μ* and a covariance matrix of σ² · *I*. Log*P*[*μ*](θ) given inside
    the “expectation” in Equation [13-4](#Equ4) can then be expressed as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \mathit{\log}{P}_{\mu}\left(\theta \right)=-\frac{{\left|\left|\theta
    -\mu \right|\right|}^2}{2{\sigma}^2}+ const $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_Equa.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Taking the gradient of the previous expression with regard to *μ*, you have
    this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\nabla}_{\mu }l{ogP}_{\mu}\left(\theta \right)=\frac{\theta -\mu }{\sigma^2}
    $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_Equb.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Let’s say you draw two parameter samples *θ*[1] and *θ*[2] and obtain two trajectories:
    *τ*[1] and *τ*[2].'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {E}_{\uptheta \sim {P}_{\upmu}\left(\uptheta \right),\uptau \sim {\uppi}_{\uptheta}}\left[{\nabla}_{\upmu}\mathit{\log}{P}_{\upmu}\left(\uptheta
    \right)R\left(\uptau \right)\right]\approx \frac{1}{2}\left[R\left({\uptau}_1\right)\frac{\uptheta_1-\upmu}{\upsigma^1}+R\left({\uptau}_2\right)\frac{\uptheta_2-\upmu}{\upsigma^2}\right]
    $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_Equ5.png)'
  prefs: []
  type: TYPE_IMG
- en: (13-5)
  prefs: []
  type: TYPE_NORMAL
- en: This merely converts the expectation in Equation [13-4](#Equ4) to an estimate
    based on two samples. Can you interpret Equation [13-5](#Equ5)? The analysis is
    similar to what you saw in Chapter [8](502835_2_En_8_Chapter.xhtml). If a reward
    of trajectory is +ve, you adjust the mean *μ* to get closer to that *θ*. If the
    trajectory reward is -ve, you move *μ* away from that sampled *θ*. In other words,
    like with the policy gradient, you adjust *μ* to increase the probability of good
    trajectories and reduce the probability of bad trajectories. However, you do so
    by making adjustments directly to the distribution from which the parameters came
    and not by adjusting the *θ* on which the policy depends. The approach allows
    you to ignore the details of states and actions.
  prefs: []
  type: TYPE_NORMAL
- en: 'The referenced paper uses *antithetic sampling*. In other words, it samples
    a pair of policies with mirror noise (*θ*[+] = *μ* + *σϵ*, *θ*[−] = *μ* − *σϵ*)
    and then samples the two trajectories *τ*[+] and *τ*[−] to evaluate Equation [13-5](#Equ5).
    Substituting these in Equation [13-5](#Equ5), the expression can be simplified
    as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\nabla}_{\mu }E\left[R\left(\tau \right)\right]\approx \frac{\epsilon
    }{2\sigma}\left[R\left({\tau}_{+}\right)+R\left({\tau}_{-}\right)\right] $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_Equc.png)'
  prefs: []
  type: TYPE_IMG
- en: The previous manipulation allows efficient parameter passing between workers
    and parameter servers. At the beginning, *μ* is known, and only *ϵ* needs to be
    communicated, which reduces the number of parameters that need to be passed back
    and forth. It brings significant scalability in making the approach parallel.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [13-26](#Fig26) shows the parallelized evolution strategy pseudocode.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_13_Chapter/502835_2_En_13_Fig26_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A snippet of pseudocode represents the algorithm for parallelized evolution
    strategies. The inputs include the learning rate alpha, noise standard deviation
    sigma, and the initial policy parameters theta 0\. Multiple operations are performed
    under different For loops.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-26
  prefs: []
  type: TYPE_NORMAL
- en: Parallelized evolution strategies algorithm 2^([38](#Fn38))
  prefs: []
  type: TYPE_NORMAL
- en: 'The authors of the paper reported the following:'
  prefs: []
  type: TYPE_NORMAL
- en: They found that the use of virtual batch normalization and other reparameterizations
    of the neural network policy greatly improved the reliability of the evolution
    strategies.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: They found the evolution strategies method to be highly parallelizable (as discussed
    earlier). In particular, using 1,440 workers, it was able to solve the MuJoCo
    3D humanoid task in less than ten minutes.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The data efficiency of evolution strategies was surprisingly good. One-hour
    ES results require about the same amount of computation as the published one-day
    results for asynchronous Advantage Actor-Critic (A3C). On MuJoCo tasks, they were
    able to match the learned policy performance of TRPO.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: ES exhibited better exploration behavior than policy gradient methods like TRPO.
    On the MuJoCo humanoid task, ES was able to learn a wide variety of gaits (such
    as walking sideways or backward). These unusual gaits were never observed with
    TRPO, which suggests a qualitatively different exploration behavior.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: They found the evolution strategies method to be robust.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you are interested, you should read through the paper to get into the details
    and see how it compares with other methods.
  prefs: []
  type: TYPE_NORMAL
- en: Transfer Learning and Multitask Learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In the previous chapters, you looked at using DQN and the policy gradient algorithms
    to train agents to play Atari games. If you check out the papers that showcase
    these experiments, you will notice that some Atari games are easier to train and
    some are harder. If you look at Atari Breakout versus Montezuma’s Revenge, as
    shown in Figure [13-27](#Fig27), you will notice that it is easier to train on
    Breakout as compared to training on Montezuma. Why is this?
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_13_Chapter/502835_2_En_13_Fig27_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Two screenshots exhibit different gaming scenarios. The left one is marked as
    Breakout Easy. The right one is denoted as Montezuma's revenge hard.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-27
  prefs: []
  type: TYPE_NORMAL
- en: Easy and hard to learn Atari games
  prefs: []
  type: TYPE_NORMAL
- en: Breakout has simple rules. However, Montezuma’s Revenge has complex rules. They
    are not easy to learn. If you are playing it for the first time and have no prior
    knowledge of the exact rules, you know that the “keys” are something you usually
    pick to open new things and/or get big rewards. You know “ladders” can be used
    to climb up or down and that “skulls” are something to be avoided. In other words,
    human’s past experience of having played other games or having read about treasure
    hunts or having watched movies gives them the context, or previous learning, to
    quickly perform new tasks that they might not have seen before.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prior understanding of the problem structure can help you solve new complex
    tasks quickly. When an agent solves prior tasks, it acquires useful knowledge
    that can help the agent solve new tasks. But where is this knowledge stored? The
    following are some possible options:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Q-function*: They tell you what a good state and action are.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Policy*: They tell you which actions are useful and which are not.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Models*: They codify the learned knowledge about how the world operates, such
    as the laws of physics such as Newton’s laws, friction, gravity, momentum, and
    so on.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Features/hidden states*: The hidden layers of neural networks abstract higher-level
    constructs and knowledge that can be generalized across different domains/tasks.
    You can see this in computer vision in supervised learning.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The ability to use the experience from one set of tasks to get faster and more
    effective performance on a new task is called *transfer learning*. Knowledge gained
    is transferred from past experiences to tackle new tasks. This is significantly
    used in supervised learning, especially in the domain of computer vision when
    popular convolutional network architectures like ResNet trained on an ImageNet
    dataset are used as pretrained networks to train on new vision tasks. You can
    also see these in Large Language Models where pre-trained models on languages
    can be further fine-tuned with a very small corpus of data on newer tasks. This
    section looks at how this technique can be applied to the field of reinforcement
    learning. Let’s first define some terminology that is commonly found in transfer
    learning literature.
  prefs: []
  type: TYPE_NORMAL
- en: '*Task*: In RL, the MDP problem that you are trying to train the agent to solve.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Source domain*: The problem that the agent is trained on first.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Target domain*: The MDP that you hope to solve faster by leveraging the knowledge
    from the “source domain.”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Shot*: The number of attempts in the target domain.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*0-shot*: Running a policy trained on the source domain directly on the target
    domain.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*1-shot*: Retraining the source domain’s trained agent just once on the target
    domain.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Few-shot*: Retraining the source domain’s trained agent a few times on the
    target domain.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Next let’s look at how you can transfer the knowledge gained from the source
    domain to the target domain in the context of reinforcement learning. At this
    point, three broad classes of approaches have been tried.
  prefs: []
  type: TYPE_NORMAL
- en: '*Forward transfer*: Training on one task and transferring it to a new task.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Multitask transfer*: Training on many tasks and transferring it to a new task.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Transfer models and value functions*.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This section briefly talks about each of these approaches. *Forward transfer*
    is one of the most common ways to transfer knowledge in supervised learning, especially
    in computer vision. One model, like the popular architecture ResNet, is trained
    to classify images on the ImageNet dataset. This is called *pretraining*. The
    trained model is then changed by replacing the last layer or last few layers.
    The network is retrained on a new task called *fine-tuning*. However, forward
    transfer in reinforcement learning can face some issues of domain shift. In other
    words, the representations learned in the source domain may not work well in the
    target domain. In addition, there is a difference in the MDP. In other words,
    certain things are possible in the source domain that are not possible in the
    target domain. There are also fine-tuning issues. For example, the policies trained
    on the source domain could have sharp peaks in probability distribution, almost
    close to being deterministic. Such a peaked distribution could hamper exploration
    while fine-tuning on target domain.
  prefs: []
  type: TYPE_NORMAL
- en: The transfer learning in supervised learning seems to work well probably because
    the large set of varied images in the ImageNet dataset helps the network learn
    very good, generalized representation, which can then be fine-tuned to specific
    tasks. However, in reinforcement learning, the tasks are generally much less diverse,
    which makes it harder for the agent to learn the high-level generalizations. Further,
    there is the issue of policies being too deterministic, which hampers exploration
    for better convergence during fine-tuning. This issue can be handled by making
    the policies learn on a source domain with an objective that has an entropy regularizer
    term, something you saw in a few examples from previous chapters, such as Soft
    Actor-Critic (SAC) in Chapter [9](502835_2_En_9_Chapter.xhtml). The entropy regularization
    ensures that the policies learned on the source system retain enough Stochasticity
    to allow for exploration during fine-tuning.
  prefs: []
  type: TYPE_NORMAL
- en: There is another approach to make learning on the source domain more generic.
    You can add some randomization to the source domain. Say you are training a robot
    to do some tasks; you could instantiate many versions of the source domain with
    a different mass of each arm for the robot, or the friction coefficients. This
    will induce the agent to learn the underlying physics instead of memorizing to
    do well in a specific configuration. In another real-world setup involving images,
    you can again borrow from the “image augmentation” practice from computer vision,
    wherein you augment the training images with some random rotation, scaling, and
    so on.
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, consider *multitask transfer*, the second way to approach transfer learning.
    There are two key ideas to this: accelerate learning of all the tasks that are
    executed together and solve multiple tasks to provide better pretraining for the
    target domain.'
  prefs: []
  type: TYPE_NORMAL
- en: One easy approach to train an agent on multiple tasks is to augment the state
    with a code/indicator signifying the specific task, for example, extending state
    *S* as (*S* + *Indicator*). When an episode starts, the system chooses an MDP
    (task) at random and then chooses the initial state based on the initial state
    distribution. The training then runs like any other MDP. Figure [13-28](#Fig28)
    shows a schematic of this approach. This kind of approach can be tough at times.
    Imagine a policy getting better at solving a specific MDP; the optimization will
    start prioritizing the learning of that MDP at the cost of others.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_13_Chapter/502835_2_En_13_Fig28_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A diagram illustrates the approach of solving multiple tasks together. The sample
    M D Ps are selected randomly at the initial state. The M D P is fixed during the
    run. The samples are marked as S 0 initially and S 1 after the initial state distribution.
    M D Ps are labeled from M D P 0 to M D P n.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-28
  prefs: []
  type: TYPE_NORMAL
- en: Solving multiple tasks together
  prefs: []
  type: TYPE_NORMAL
- en: You could also train the agents to solve different tasks separately and then
    combine these learnings to solve a new task. You need to combine/distill the policies
    learned for different tasks to a single one in some way. There are various approaches
    for this, and I do not get into the details here.
  prefs: []
  type: TYPE_NORMAL
- en: 'Consider another variation of multitask transfer: *that of a single agent learning
    two different tasks in the same environment*. An example would be a robot learning
    to do laundry as well as wash utensils. In this approach, you augment the state
    to add the context of the task and train the agent. This is known as *contextual
    policies*. Using this approach, the state is represented as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \overset{\sim }{s}=\left[\begin{array}{c}s\\ {}\upomega \end{array}\right]
    $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_Equd.png)'
  prefs: []
  type: TYPE_IMG
- en: 'You learn the policies as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\uppi}_{\uptheta}\left(a|s,\upomega \right) $$](../images/502835_2_En_13_Chapter/502835_2_En_13_Chapter_TeX_Eque.png)'
  prefs: []
  type: TYPE_IMG
- en: Here, *ω* is the context, that is, the task.
  prefs: []
  type: TYPE_NORMAL
- en: 'Lastly, there is a third approach of transfer learning, that of *transferring
    models or value functions*. In this setting, you assume that the dynamics *p*(*s*[*t* + 1]|
    *s*[*t*], *a*[*t*]) are the same in both the source and target domains. However,
    the reward functions are different; for example, the autonomous car learns to
    drive to a small set of places (source domain). It then has to navigate to a new
    destination (target domain). You could transfer either of the three: the model,
    the value functions, or the policies. Models are a logical choice and simple to
    transfer, since the model *p*(*s*[*t* + 1]| *s*[*t*], *a*[*t*]) in principle is
    independent of the reward function. Transferring policies is usually done via
    contextual policies but otherwise not easy, as policies π[θ](*a*| *s*) contain
    the least information about the dynamics function. Value function transfer is
    also not so simple. Value functions couple dynamics, rewards, and policies.'
  prefs: []
  type: TYPE_NORMAL
- en: You can do value transfer using successor features and representation, the details
    of which can be found in texts detailing transfer learning.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_13_Chapter/502835_2_En_13_Fig29_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A mathematical expression represents the formula for Q superscript pi s a. The
    expressions are grouped as reward, dynamics, and policy.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-29
  prefs: []
  type: TYPE_NORMAL
- en: Transferring Q functions
  prefs: []
  type: TYPE_NORMAL
- en: Meta-Learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You have looked at various approaches to making agents learn from experiences.
    But is that the way humans learn? Current AI systems excel at mastering a single
    skill. Agents like AlphaGo have beaten the best human Go player. IBM Watson beat
    the best human Jeopardy player. But can AlphaGo play the card game of Bridge?
    Can the Jeopardy agent hold an intelligent chat? Can an expert helicopter controller
    for aerobatics be used to carry out a rescue mission? Comparatively, humans learn
    to act intelligently in many new situations, drawing on their past experience
    or current expertise.
  prefs: []
  type: TYPE_NORMAL
- en: If we want agents to be able to acquire many skills across different domains,
    we cannot afford to train agents for each specific task in a data-inefficient
    way—the way current RL agents are. To get true AI, we need agents to be able to
    learn new tasks quickly by leveraging their past experiences. This approach of
    *learning to learn* is called *meta-learning*. It is a key step to making RL agents
    human-like, always learning and improving based on experience and learning across
    varied tasks efficiently.
  prefs: []
  type: TYPE_NORMAL
- en: Meta-learning systems are trained on many different tasks (meta-training set)
    and then tested on new tasks. The terms *meta-learning* and *transfer-learning*
    can be confusing. These are evolving disciplines, and the terms are used inconsistently.
    However, one easy way to distinguish them is to think of meta-learning as learning
    to optimize hyperparameters of the model (e.g., number of nodes, architecture)
    and to think of transfer learning as fine-tuning an already tuned network.
  prefs: []
  type: TYPE_NORMAL
- en: During meta-learning, there are two optimizations at play—the learner, which
    learns (optimizes) the tasks, and the meta-learner, which trains (optimizes) the
    agents. There are three broad categories of meta-learning methods.
  prefs: []
  type: TYPE_NORMAL
- en: '*Recurrent models*: This approach trains a recurrent model like long short-term
    memory (LSTM) through episodes of tasks in the meta-training set.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Metric learning*: In this approach, the agent learns a new metric space in
    which learning is efficient.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Learning optimizers*: In this approach, there are two networks: the meta-learning
    and the learner. The meta-learner learns to update the learner network. The meta-learner
    can be thought of learning to optimize the hyperparameters of the model, and the
    learner network can be thought of as the regular network that is used to predict
    the action.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It is an interesting area of study with a lot of potential. Interested readers
    can refer to a great tutorial from the International Conference on Machine Learning
    (ICML-2019).^([39](#Fn39))
  prefs: []
  type: TYPE_NORMAL
- en: Unsupervised Zero-Shot Reinforcement Learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Following the idea of multitask learning, a good agent is one that can achieve
    many goals in a domain. The more chores they can do, the more useful household
    robots are; the more places they can go, the better self-driving cars are. Based
    on this idea and inspired by the recent success of unsupervised learning in language
    and vision—which has shown that a single model trained on data from the Internet
    can solve a variety of tasks without further training or fine-tuning—the authors
    of a recent paper titled “Unsupervised Zero-Shot Reinforcement Learning via Functional
    Reward Encodings”^([40](#Fn40)) explore a similar way to train a generalist agent
    from unlabeled offline data so that it can solve new tasks specified by users
    without training. This is called the *zero-shot reinforcement learning* (RL) problem.
    The hard challenge from this data is how to find, without labels, a task representation
    that is resilient to downstream objectives, avoiding the need for a human to provide
    well shaped reward functions before training.
  prefs: []
  type: TYPE_NORMAL
- en: The main contribution of the paper is to directly learn a latent representation
    that can capture any arbitrary reward functions based on their samples of state-reward
    pairs. The paper calls this concept *Functional Reward Encoding* (FRE). This is
    different from previous works in zero-shot RL or multi-task RL that use domain-specific
    task representations.
  prefs: []
  type: TYPE_NORMAL
- en: An FRE is trained using a prior distribution over reward functions. When the
    downstream tasks are unknown, a prior distribution is chosen that covers a wide
    range of possible objectives in a way that does not depend on a specific domain.
    In the paper’s experiments, the authors demonstrate that a combination of random
    unsupervised reward functions, such as reaching goals and random MLP rewards,
    are a good option for the reward prior. They improve an FRE-conditioned policy
    for all rewards in this space. By doing this, they have already learned approximate
    solutions to many downstream tasks, and the zero-shot RL problem becomes simply
    finding the FRE encoding for the task, which the learned encoder does.
  prefs: []
  type: TYPE_NORMAL
- en: The framework in the paper presents a simple yet scalable method for training
    zero-shot RL agents in an unsupervised manner, as shown in Figure [13-30](#Fig30).
    The main idea is to (1) train an FRE network over random unsupervised reward functions,
    then (2) optimize a generalist FRE-conditioned policy toward maximizing said rewards,
    (3) after which, novel tasks can be solved by simply encoding samples of their
    reward functions, so that the FRE agent can immediately act without further training.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_13_Chapter/502835_2_En_13_Fig30_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: An illustration of the functional reward encoding represents the prior distribution
    of random reward functions, including random M L Ps, goal-reaching, linear functions,
    and novel tasks. The upper part is denoted as training general policy, and the
    bottom part is for 0-shot policy execution.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-30
  prefs: []
  type: TYPE_NORMAL
- en: 'FRE discovers latent representations over random unsupervised reward functions.
    At evaluation, user-given downstream objectives can be encoded into the latent
    space to enable zero-shot policy executionSource: Figure 1 of the paper^([41](#Fn41))'
  prefs: []
  type: TYPE_NORMAL
- en: Interested readers should refer to the paper. In this chapter, you have already
    seen a few examples of how advances from LLMs and diffusion models trained in
    an unsupervised way with generalist capabilities are being applied in RL. I am
    expecting a lot of these in the near future.
  prefs: []
  type: TYPE_NORMAL
- en: REINFORCE Learning from Human Feedback in LLMs
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In Chapter [11](502835_2_En_11_Chapter.xhtml) on PPL and RLHF, you saw the
    use of PPO-based RL fine-tuning on LLM. A 2024 paper titled “Back to Basics: Revisiting
    REINFORCE Style Optimization for Learning from Human Feedback in LLMs”^([42](#Fn42))
    shows the use of REINFORCE-style optimization and demonstrates that it outperforms
    the PPO-based RLHF and RL-free Direct Preference Optimization (DPO) as well as
    Reward Ranked Fine Tuning (RAFT) approaches to AI alignment by finetuning LLMs
    .'
  prefs: []
  type: TYPE_NORMAL
- en: 'The authors argue that the PPO approach has high computational cost and needs
    careful hyperparameter tuning. The authors claim that many of the reasons that
    motivated the development of PPO are less relevant in RLHF and propose a simpler
    method that saves computation and improves performance. They review the formulation
    of alignment from human preferences in RL. Following simplicity as a key principle,
    they show that many parts of PPO are not needed in an RLHF setting and that the
    basic REINFORCE-style optimization variants do better, suggesting that tailoring
    to LLMs alignment features allows you to use online RL optimization with low cost.
    This list summarizes the key findings of the paper:'
  prefs: []
  type: TYPE_NORMAL
- en: '**PPO** **is not the right tool for doing RL in RLHF**. The paper breaks apart
    PPO and shows that the most “basic” policy gradient algorithm, Vanilla Policy
    Gradient REINFORCE, is consistently outperforming PPO by 3.2 to 20.3 percent in
    terms of win rate.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**REINFORCE Leave-One-Out (RLOO)** **outperforms key baselines**. Built on
    top of REINFORCE, RLOO enables using multiple online samples, and the authors
    empirically show that it consistently outperforms baselines such as PPO, DPO,
    and RAFT. The paper shows that RLOO makes better use of online samples than RAFT,
    while presenting a higher robustness to noise and degree of KL penalty.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Modeling partial completions is not necessary**. The paper effectively demonstrates
    that modeling partial sequences is an unnecessary undertaking for LLM preference
    training. Instead, modeling the full generations preserves performance while reducing
    complexity in the RL stage and significantly accelerating learning.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**RLOO** **is relatively robust to noise and KL penalty sensitivity**. The
    paper showcases RLOO robustness to noise and degree of KL penalty compared to
    RAFT.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: How to Continue Studying
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Deep reinforcement learning is seeing a lot of growth, and this is the most
    favored approach today to get agents to learn from experiences to behave intelligently.
    I hope that this book is just a start for you. I hope that you will continue to
    learn about this exciting field. You can use the following resources to continue
    learning.
  prefs: []
  type: TYPE_NORMAL
- en: Look for courses and online videos to extend your knowledge. MIT, Stanford,
    and UC Berkeley have many online courses that are the next logical way to dive
    deeper into this discipline. There are some YouTube videos from DeepMind and other
    experts in this field as well.
  prefs: []
  type: TYPE_NORMAL
- en: Make it a habit to visit the OpenAI and DeepMind websites regularly. They have
    a ton of material supplementing the research papers and are the basis of many
    of the algorithms you saw in this book.
  prefs: []
  type: TYPE_NORMAL
- en: Subscribe to Deep Learning, RL, and Generative AI-related newsletters and mailing
    lists. Use Notions (or something similar) to keep track of what you read.
  prefs: []
  type: TYPE_NORMAL
- en: Set up a Google alert for new papers in the field of reinforcement learning
    and try to follow along with the papers. Reading research papers is an art, and
    Professor Andrew Ng of Stanford has some useful tips on what it takes to master
    a subject.^([43](#Fn43))
  prefs: []
  type: TYPE_NORMAL
- en: Finally, follow along with the algorithms covered in this book. Dive deep into
    the papers that form the basis of these algorithms. Try to reimplement the code
    yourself, either by following the code given in the notebooks accompanying this
    book or by looking at the implementations, especially in the Baselines3 and CleanRL
    libraries. Pick a domain and develop smaller weekend projects in application of
    RL.
  prefs: []
  type: TYPE_NORMAL
- en: At the end, each reader has a unique need and style. You should follow what
    already works for you and what you find interesting in these suggestions.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter was a whirlwind tour of various emerging topics in and around reinforcement
    learning.
  prefs: []
  type: TYPE_NORMAL
- en: The first section presented some RL settings that are not the same as the ones
    used in the prior chapters, such as the MineRL, Donkey Car RL, FinRL, PySC2, and
    Godot RL agents. These settings pose various difficulties and possibilities for
    RL research and applications.
  prefs: []
  type: TYPE_NORMAL
- en: Next, you looked at additional methods in model-based RL in the context of deep
    learning, such as world models, imagination-augmented agents, model-based value
    expansion, and IRIS. These methods aim to take advantage of the sample efficiency
    of model-based methods and the scalability of model-free methods. Causal world
    models briefly mentioned a paper that establishes a formal link between causality
    and generalization in RL and suggests that causal reasoning is a crucial component
    for developing reliable and general AI.
  prefs: []
  type: TYPE_NORMAL
- en: This was followed by a quick introduction to imitation learning and inverse
    reinforcement learning, which are methods to learn from expert demonstrations
    or observations. The chapter discussed the differences between behavior cloning,
    direct policy learning, and inverse reinforcement learning, and have some examples
    of their applications.
  prefs: []
  type: TYPE_NORMAL
- en: The section on derivative-free methods showed some methods that optimize policies
    without taking derivatives, such as the cross-entropy method and the covariance
    matrix adaptation evolutionary strategy. These methods are based on evolutionary
    algorithms that select and improve the best policies from a set of candidates.
  prefs: []
  type: TYPE_NORMAL
- en: Next, the chapter covered the transfer learning and multitask learning methods
    that use the experience from one or more tasks to improve the learning of new
    tasks, such as forward transfer, multitask transfer, transfer models, and value
    functions. These methods aim to achieve faster and better learning by leveraging
    the similarities and generalizations across different tasks.
  prefs: []
  type: TYPE_NORMAL
- en: 'The section on meta-learning described the concept of meta-learning, which
    is learning to learn from past experiences. The chapter outlined three broad categories
    of meta-learning methods: recurrent models, metric learning, and learning optimizers.
    Meta-learning is a key step to making RL agents more human-like and adaptable
    to new situations.'
  prefs: []
  type: TYPE_NORMAL
- en: The unsupervised zero-shot reinforcement learning section introduced a new approach
    to zero-shot reinforcement learning, which is the problem of learning a generalist
    agent from unlabeled offline data that can solve new tasks without further training.
    The approach is based on functional reward encodings, which are latent representations
    that capture any arbitrary reward functions from their samples.
  prefs: []
  type: TYPE_NORMAL
- en: The last section talked about a new approach to RLHF fine-tuning, that of replacing
    PPO with a simpler REINFORCE Leave-One-Out (RLOO) that’s shown to be faster and
    performs better.
  prefs: []
  type: TYPE_NORMAL
- en: Lastly, the chapter covered some ways to continue exploring this field.
  prefs: []
  type: TYPE_NORMAL
