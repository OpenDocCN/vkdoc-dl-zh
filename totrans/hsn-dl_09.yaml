- en: Image Captioning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You are given images along with their captions, and you are required to obtain
    the caption corresponding to a new image. How do you think you could solve the
    problem?
  prefs: []
  type: TYPE_NORMAL
- en: '**Hint**: One of the simplest solutions to this problem, based on what we have
    studied so far, is to convert the input pictures to embeddings using a CNN model
    and then give this as input to a one-to-many RNN model as shown in Figure [9-20](#Fig20).'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_9_Chapter/611710_1_En_9_Fig20_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-20
  prefs: []
  type: TYPE_NORMAL
- en: Image captioning
  prefs: []
  type: TYPE_NORMAL
- en: 'To accomplish this task, you can try the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Create embeddings of the given image using a pretrained Convolutional Neural
    Network such as VGG 19.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Create embeddings of the given image using autoencoders (Chapter [11](611710_1_En_11_Chapter.xhtml)).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Use RNN with a single layer having 64 units.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Use RNN with two layers, having 64 and 32 units.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Use dropout and analyze the effect of introducing this layer on the performance
    of the model with the test set.
  prefs:
