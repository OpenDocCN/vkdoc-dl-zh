  prefs: []
  type: TYPE_IMG
  zh: '![图 9-12](../images/611710_1_En_9_Chapter/611710_1_En_9_Fig12_HTML.jpg)'
- en: Figure 9-12
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-12
- en: 'Loss and accuracy curves: Model 3'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 损失和准确率曲线：模型 3
- en: '![](../images/611710_1_En_9_Chapter/611710_1_En_9_Fig11_HTML.jpg)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
  zh: '![图 9-11](../images/611710_1_En_9_Chapter/611710_1_En_9_Fig11_HTML.jpg)'
- en: Figure 9-11
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-11
- en: 'Loss and accuracy curves: Model 2'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 损失和准确率曲线：模型 2
- en: '![](../images/611710_1_En_9_Chapter/611710_1_En_9_Fig10_HTML.jpg)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![图 9-10](../images/611710_1_En_9_Chapter/611710_1_En_9_Fig10_HTML.jpg)'
- en: Figure 9-10
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-10
- en: 'Loss and accuracy curves: Model 1'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 损失和准确率曲线：模型 1
- en: '[PRE0]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: The results of the above experiments are summarized in Table [9-1](#Tab1).
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 上述实验的结果总结在表[9-1](#Tab1)中。
- en: Table 9-1
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 表9-1
- en: Mean Validation Accuracy of Four Different RNN Models on the IMDB Dataset
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: IMDB数据集上四个不同RNN模型的平均验证准确率
- en: '| Architecture | Mean Validation Accuracy |'
  id: totrans-105
  prefs: []
  type: TYPE_TB
  zh: '| 架构 | 平均验证准确率 |'
