- en: '| Stacked RNN with two layers having 32 units in each layer | 0.8173 |'
  id: totrans-108
  prefs: []
  type: TYPE_TB
  zh: '| 每层有32个单元的堆叠RNN | 0.8173 |'
- en: '| Bidirectional RNN with a single layer having 32 units | 0.8323 |'
  id: totrans-109
  prefs: []
  type: TYPE_TB
  zh: '| 单层32个单元的双向RNN | 0.8323 |'
- en: '| Stacked bidirectional RNN with two layers having 32 units in each layer |
    0.8031 |'
  id: totrans-110
  prefs: []
  type: TYPE_TB
