- en: 9. Recurrent Neural Network
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Consider a person named Nishant, about to go to meet someone important. Just
    by looking at the image in Figure [9-1](#Fig1), can you guess where will he head?
    Your answer would be a random guess at best. Now if you are given the position
    of this person in the past five time stamps and you need to guess the position
    at the next time stamp, your work will become a little easier. Your answer is
    now based on a sequence depicting the position at various time intervals.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_9_Chapter/611710_1_En_9_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-1
  prefs: []
  type: TYPE_NORMAL
- en: If no context is given, can you guess where will the person move next? (Image
    generated by [`https://pixlr.com/image-generator/`](https://pixlr.com/image-generator/))
  prefs: []
  type: TYPE_NORMAL
- en: In many cases, if the values of a sequence at previous time stamps are known,
    then it becomes easy to guess the position at the next time stamp. Can you apply
    the same analogy to the prices of a stock, given its prices in the previous few
    weeks? It turns out that this is practically possible. Likewise, elements of music
    and text data also constitute sequences. To handle sequence data, we need slightly
    different kinds of models. To appreciate the need of a different kind of model,
    let us first try to handle this problem using Neural Networks.
  prefs: []
  type: TYPE_NORMAL
- en: Assume that *X*[1], *X*[2]…*X*[*k*] are the values of the sequence at various
    time stamps. To predict the value of the sequence at the next time stamp, we create
    a Neural Network shown in Figure [9-2](#Fig2). You train this network using such
    sequences. However, the network might not perform well. (Why?)
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_9_Chapter/611710_1_En_9_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-2
  prefs: []
  type: TYPE_NORMAL
- en: Handling sequence data using Neural Networks
  prefs: []
  type: TYPE_NORMAL
- en: To accomplish the above task, we need special types of networks constituting
    independent units in which *x*[0] predicts *y*[0], *x*[1] predicts *y*[1], and
    *x*[2] predicts *y*[2]. (At time stamp 0 the value of the input is *x*[0] and
    the value of the output is *y*[0]. Likewise, at time stamp 1 the value of the
    input is *x*[1] and the value of the output is *y*[1].) If we have to predict
    *y*[*k*], then it does not only depend on *x*[*k*]; it may also depend on the
    previous inputs. Let us go a little deep!
  prefs: []
  type: TYPE_NORMAL
- en: Why Neural Networks Cannot Infer Sequences
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Consider a sequence {*x*[1], *x*[2], *x*[3], …*x*[*n*]}, where *x*[1] is the
    value at time *t*[1], *x*[2] is the value at time *t*[2], and so on. We aim to
    design a model that understands this sequence. That is, predict values at the
    next time stamp. We start with a fully connected neural network, that takes k
    values and predicts the next value. For example, if the value of k is 4, then
    the model takes{*x*[1], *x*[2], *x*[3], *x*[4]} as input and predicts *x*[5];
    then takes {*x*[2], *x*[3], *x*[4], *x*[5]} as input and predicts *x*[6]; and
    so on (Figure [9-3](#Fig3)). To accomplish this task, we create a Neural Network
    having four neurons in the input layer and a single neuron at the output layer.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_9_Chapter/611710_1_En_9_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-3
  prefs: []
  type: TYPE_NORMAL
- en: Neural Network to predict the next element of the sequence. At t=1, the first
    four elements of the sequence are given as the input, and the network predicts
    the fifth element.
  prefs: []
  type: TYPE_NORMAL
- en: 'The division of input data in such a manner is referred to as the **overlapping
    window**. The model, if trained with a sufficient amount of data, may start predicting
    the next element. However, if the order of the elements changes (say {*x*[3],
    *x*[2], *x*[1], *x*[4]}), the model still predicts the same value (*x*[5]). The
    reason for this is that the Neural Networks do not understand the context. However,
    for a programmer handling sequence data, this can be disastrous. For example,
    consider the following part of the sentence and try predicting the next word:'
  prefs: []
  type: TYPE_NORMAL
- en: “In a place called Shangri-La, a person kills the son of one of the richest
    persons by his speeding car. He should go to …”
  prefs: []
  type: TYPE_NORMAL
- en: Here “jail” should be the next word that is obvious. However, for the following
    sentence
  prefs: []
  type: TYPE_NORMAL
- en: “In a place called Shangri-La, the son of one of the richest people kills a
    person by his speeding car. He should go to …”
  prefs: []
  type: TYPE_NORMAL
- en: since this is Shangri-La, the next word is not obvious; it can be “jail” or
    “essay-writing-classes.”. So a fully connected network may not be able to generate
    the correct (expected) answer.
  prefs: []
  type: TYPE_NORMAL
- en: This is because, for a fully connected neural network, the output is some function
    of inputs. The sequence models discussed in this chapter can infer the patterns
    in a sequence and extract temporal information from it. As stated earlier, sequences
    are found everywhere, from text to sound and to time series. In addition to the
    above, there is another prominent difference between Neural Networks and sequence
    models, which is that the sequence models can handle the variable-length dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Idea
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A unit in a sequence model is expected to extract the context of a particular
    element, so it should remember some information regarding the earlier elements
    of the sequence. That is, it should have memory. We can use a recurrent unit to
    accomplish this task. In the recurrent unit, we give the input, it produces an
    output, and there is a hidden state. Let the weight associated with the input
    be *W*[*xh*], that with the output be *W*[*yh*], and that with the hidden state
    be *W*[*hh*]. With each input, these weights are updated.
  prefs: []
  type: TYPE_NORMAL
- en: The unit of a Recurrent Neural Network (RNN) (Figure [9-4](#Fig4)) can be considered
    as having an input *x*^(<*t*>)associated with the weight *W*[*xh*], an output
    *y*^(<*t*>)associated with the weight *W*[*hy*], and the hidden state *h*^(<*t*>)associated
    with the weight*W*[*hh*]. Note that the input and output change with the time
    “t,” whereas the weights remain the same at all the time stamps. When we unwind
    it for different time stamps, we get an architecture as shown in Figure [9-4](#Fig4).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_9_Chapter/611710_1_En_9_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-4
  prefs: []
  type: TYPE_NORMAL
- en: A Recurrent Neural Network
  prefs: []
  type: TYPE_NORMAL
- en: Note that the above is just one type of architecture; there are three more types
    of RNN, discussed in the following sections. The weights in this architecture
    are updated using an algorithm called Backpropagation Through Time (BPTT), discussed
    in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: Backpropagation Through Time
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Consider a sequence of length “T” and apply the forward and backward pass only
    on the unfolded network (K units). As stated earlier, we have two activation functions,
    one for the hidden state and one for the output. The value of the hidden state
    at time t and output are given in the following equations:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {h}^{&lt;t&gt;}={g}_1\left({W}_{hh}{h}^{&lt;t-1&gt;}+{W}_{xh}{x}^{&lt;t&gt;}+{b}_h\right)
    $$](../images/611710_1_En_9_Chapter/611710_1_En_9_Chapter_TeX_Equ1.png)'
  prefs: []
  type: TYPE_IMG
- en: (1)
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {y}^{&lt;t&gt;}={g}_2\left({W}_{yh}{h}^{&lt;t&gt;}+{b}_y\right) $$](../images/611710_1_En_9_Chapter/611710_1_En_9_Chapter_TeX_Equ2.png)'
  prefs: []
  type: TYPE_IMG
- en: (2)
  prefs: []
  type: TYPE_NORMAL
- en: 'The total loss is the sum of the losses at time t:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ L\left(\hat{y},y\right)={\sum}_{t=1}^{T_y}l\left({\hat{y}}^{&lt;t&gt;},{y}^{&lt;t&gt;}\right)
    $$](../images/611710_1_En_9_Chapter/611710_1_En_9_Chapter_TeX_Equa.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The derivative of loss with respect to the weight is then found, which by chain
    rule becomes *y*^(<*t*>) = *g*[2](*W*[*yh*](*g*[1](*W*[*hh*]*h*^(<*t* − 1>) + *W*[*xh*]*x*^(<*t*>) + *b*[*h*])) + *b*[*y*])
    (substituting the value of *h*^(<*t*>) from equation ([1](#Equ1)) to equation
    ([2](#Equ2))):'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\partial L}{\partial {W}_{hh}}=\frac{\partial {L}^{&lt;t&gt;}}{\partial
    {\hat{y}}^{&lt;t&gt;}}\times \frac{\partial {\hat{y}}^{&lt;t&gt;}}{\partial {h}^{&lt;t&gt;}}\times
    \frac{\partial {h}^{&lt;t&gt;}}{\partial {W}_{hh}} $$](../images/611710_1_En_9_Chapter/611710_1_En_9_Chapter_TeX_Equb.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ \frac{\partial {h}^{&lt;t&gt;}}{\partial {W}_{hh}}={\sum}_{k=1}^t\frac{\partial
    {h}^{&lt;t&gt;}}{\partial {h}^{&lt;k&gt;}}\times \frac{\partial {h}^{&lt;k&gt;}}{\partial
    {W}_{hh}} $$](../images/611710_1_En_9_Chapter/611710_1_En_9_Chapter_TeX_Equ3.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ \frac{\partial {h}^{&lt;t&gt;}}{\partial {h}^{&lt;k&gt;}}=\frac{\partial
    {h}^{&lt;t&gt;}}{\partial {h}^{&lt;t-1&gt;}}\times \frac{\partial {h}^{&lt;t-1&gt;}}{\partial
    {h}^{&lt;t-2&gt;}}\dots \frac{\partial {h}^{&lt;k+1&gt;}}{\partial {h}^{&lt;k&gt;}}={\prod}_{j=k+1}^t\frac{\partial
    {h}^{&lt;j&gt;}}{\partial {h}^{&lt;j-1&gt;}} $$](../images/611710_1_En_9_Chapter/611710_1_En_9_Chapter_TeX_Equ4.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ \frac{\partial {L}^{&lt;t&gt;}}{\partial {W}_{hh}}=\frac{\partial {L}^{&lt;t&gt;}}{\partial
    {\hat{y}}^{&lt;t&gt;}}\times \frac{\partial {\hat{y}}^{&lt;t&gt;}}{\partial {h}^{&lt;t&gt;}}\times
    \left(\frac{\partial {h}^{&lt;t&gt;}}{\partial {W}_{hh}}+\frac{\partial {h}^{&lt;t&gt;}}{\partial
    {h}^{&lt;t-1&gt;}}\times \frac{\partial {h}^{&lt;t-1&gt;}}{\partial {W}_{hh}}+\frac{\partial
    {h}^{&lt;t&gt;}}{\partial {h}^{&lt;t-1&gt;}}\times \frac{\partial {h}^{&lt;t-1&gt;}}{\partial
    {h}^{&lt;t-2&gt;}}\times \frac{\partial {h}^{&lt;t-2&gt;}}{\partial {W}_{hh}}\dots
    \right) $$](../images/611710_1_En_9_Chapter/611710_1_En_9_Chapter_TeX_Equ5.png)'
  prefs: []
  type: TYPE_IMG
- en: Using this formula, we can update the weights of the network. Note that if the
    sequence is very long, then the gradients either explode or vanish. To handle
    the exploding gradient, we update the gradient after k time stamps.
  prefs: []
  type: TYPE_NORMAL
- en: Types of RNN
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'An RNN can take a single input or multiple inputs and output a single vector
    or multiple vectors. Based on this, the RNNs can be classified into four types:'
  prefs: []
  type: TYPE_NORMAL
- en: One to one
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: One to many
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Many to one
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Many to many
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The **one-to-one RNN**, shown in Figure [9-5](#Fig5), can be perceived as a
    normal Neural Network. It takes an input, produces some output, and has some hidden
    state.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_9_Chapter/611710_1_En_9_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-5
  prefs: []
  type: TYPE_NORMAL
- en: One-to-one RNN
  prefs: []
  type: TYPE_NORMAL
- en: The **one-to-many RNN** shown in Figure [9-6](#Fig6) takes an input and produces
    outputs at different time stamps. Here, *x* is the input, *y*^(<*t*>) is the output
    at the *t*^(*th*) time stamp, and *h*^(<*t*>) is the activation at the *t*^(*th*)
    time stamp.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_9_Chapter/611710_1_En_9_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-6
  prefs: []
  type: TYPE_NORMAL
- en: One-to-many RNN
  prefs: []
  type: TYPE_NORMAL
- en: 'These architectures are used in the following applications:'
  prefs: []
  type: TYPE_NORMAL
- en: Image captioning
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Music generation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The **many-to-one RNN** shown in Figure [9-7](#Fig7) takes inputs at each time
    stamp and produces output at the *t*^(*th*) time stamp. Here, *x*^(<*t*>) is the
    input, *y*^(<*t*>)is the output, and *h*^(<*t*>) is the activation at the *t*^(*th*)
    time stamp.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_9_Chapter/611710_1_En_9_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-7
  prefs: []
  type: TYPE_NORMAL
- en: Many-to-one RNN
  prefs: []
  type: TYPE_NORMAL
- en: Some of the prominent applications in which these architectures are used are
  prefs: []
  type: TYPE_NORMAL
- en: Sentiment Analysis
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Spam detection
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Stock price prediction
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The **many-to-many RNN**, shown in Figure [9-8](#Fig8), takes inputs at different
    time stamps and produces outputs at the *t*^(*th*) time stamp. Here, *x*^(<*t*>)
    is the input, *y*^(<*t*>) is the output, and *h*^(<*t*>) is the activation at
    the *t*^(*th*) time stamp.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_9_Chapter/611710_1_En_9_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-8
  prefs: []
  type: TYPE_NORMAL
- en: Many-to-many RNN like those used in parts of speech tagging
  prefs: []
  type: TYPE_NORMAL
- en: There is another type of **many-to-many RNN** architecture that has two parts,
    encoder and decoder (Figure [9-9](#Fig9)). The encoder is like a many-to-one architecture,
    and the decoder is one to many. In tasks like language translation, these architectures
    are used.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_9_Chapter/611710_1_En_9_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-9
  prefs: []
  type: TYPE_NORMAL
- en: 'Many-to-many RNN: encoder and decoder type'
  prefs: []
  type: TYPE_NORMAL
- en: Applications
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'RNNs are used for sequence modeling. They (or latest sequence models) are often
    used to accomplish the following tasks:'
  prefs: []
  type: TYPE_NORMAL
- en: Sentiment Analysis
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Handwritten text recognition
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Image captioning
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Machine translation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Speech-to-text conversion
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: to name a few. The first is an example of a many-to-one network; the second
    and third are examples of one-to-many models. The fourth uses the many-to-many
    model. The last task can be accomplished using models discussed later in this
    chapter. Let us explore some of these examples in detail.
  prefs: []
  type: TYPE_NORMAL
- en: Sentiment Classification
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Sentiment Analysis can be implemented using a many-to-one RNN, in which the
    input is X (text, consisting of a sequence of words) and the output is an integer
    y representing the sentiment. Here the length of X is the same as the length of
    a sentence. However, the length of each sentence may not be the same, so we consider
    a maximum length, and the sentences that do not have that many words are padded
    with zeros or fixed numbers.
  prefs: []
  type: TYPE_NORMAL
- en: The problem is now to convert the words of a sentence into embeddings. Consider
    each word being represented as an embedding of m numbers. If the maximum length
    of sentences is considered to be n, then a sentence will be represented as a 2D
    array of dimension *n* × *m*. So, in each iteration, the model is trained using
    sentence X, *x*[*i*] ∈ *X* and *x*[*i*] ∈ *R*^(*m*), and *y* ∈ (0, 1) in the case
    of binary classification or else equal to the number of sentiments.
  prefs: []
  type: TYPE_NORMAL
- en: The following Listing [9-1](#PC1) classifies the given sentences into positive
    or negative sentiments. The four different RNN models were created and evaluated
    on the IMDB movie review sentiment dataset. This dataset contains 50,000 movie
    reviews, evenly split into positive and negative sentiments. The dataset was preprocessed
    by removing stop words, tokenizing, and padding the reviews. The four models were
    created including a simple RNN with a single layer having 32 units, a stacked
    RNN with two layers having 32 units in each layer, a bidirectional RNN with a
    single layer having 32 units, and a stacked bidirectional RNN with two layers
    having 32 units in each layer. The variation of accuracy and loss with the number
    of epochs is shown in figures from Figure [9-10](#Fig10) to Figure [9-13](#Fig13).
    The mean validation accuracy for each model was calculated and is shown in Table
    [9-1](#Tab1).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_9_Chapter/611710_1_En_9_Fig13_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-13
  prefs: []
  type: TYPE_NORMAL
- en: 'Loss and accuracy curves: Model 4'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_9_Chapter/611710_1_En_9_Fig12_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-12
  prefs: []
  type: TYPE_NORMAL
- en: 'Loss and accuracy curves: Model 3'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_9_Chapter/611710_1_En_9_Fig11_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-11
  prefs: []
  type: TYPE_NORMAL
- en: 'Loss and accuracy curves: Model 2'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_9_Chapter/611710_1_En_9_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-10
  prefs: []
  type: TYPE_NORMAL
- en: 'Loss and accuracy curves: Model 1'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: The results of the above experiments are summarized in Table [9-1](#Tab1).
  prefs: []
  type: TYPE_NORMAL
- en: Table 9-1
  prefs: []
  type: TYPE_NORMAL
- en: Mean Validation Accuracy of Four Different RNN Models on the IMDB Dataset
  prefs: []
  type: TYPE_NORMAL
- en: '| Architecture | Mean Validation Accuracy |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Simple RNN with a single layer having 32 units | 0.8325 |'
  prefs: []
  type: TYPE_TB
- en: '| Stacked RNN with two layers having 32 units in each layer | 0.8173 |'
  prefs: []
  type: TYPE_TB
- en: '| Bidirectional RNN with a single layer having 32 units | 0.8323 |'
  prefs: []
  type: TYPE_TB
- en: '| Stacked bidirectional RNN with two layers having 32 units in each layer |
    0.8031 |'
  prefs: []
  type: TYPE_TB
- en: Having seen an application of a many-to-one model, let us have a look at an
    application of many-to-many models.
  prefs: []
  type: TYPE_NORMAL
- en: Parts of Speech Tagging
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Parts of speech (POS) tagging maps each word in a sentence to the corresponding
    part of speech. It can be implemented using a many-to-many RNN model in which
    the input is a sentence and the output is a number corresponding to each part
    of speech. Consider the following sentence:'
  prefs: []
  type: TYPE_NORMAL
- en: “Nishant is traveling to the United States to pursue a postgraduate degree.”
  prefs: []
  type: TYPE_NORMAL
- en: 'The parts of speech corresponding to each word in the above sentence are as
    follows:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Nishant: Noun'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'is: Verb'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'traveling: Verb'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'to: Preposition'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'the: Determiner'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'United States: Noun'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'to: Preposition'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'pursue: Verb'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'a: Determiner'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'postgraduate: Noun'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'degree: Noun'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The problem is now to convert the words of a sentence into embeddings. Consider
    each word being represented as an embedding of m numbers, and if the maximum length
    of sentences is considered to be n, then a sentence is represented as a 2D array
    of dimension *n* × *m*. So, in each iteration, the model is trained using sentence
    X, *x*[*i*] ∈ *X* and *x*[*i*] ∈ *R*^(*m*), *y* ∈ (1, 2, 3, , …) equal to the
    number of parts of speech.
  prefs: []
  type: TYPE_NORMAL
- en: The Penn Treebank dataset provided by NLTK consists of tagged sentences in English
    and contains over 4.5 million words of American English text, taken from a variety
    of sources. The dataset was preprocessed by extracting unique words and tags,
    mapping them to indices, and converting sentences to sequences of word indices
    and corresponding tag indices. The four different RNN architectures were implemented
    (Listing [9-2](#PC2)) using ***Keras***. **Model 1** utilized a single-layer simple
    RNN with 64 units. **Model 2** employed a stacked simple RNN with two layers,
    each containing 64 units. **Model 3** employed a single-layer bidirectional RNN
    with 64 units. **Model 4** incorporated a stacked bidirectional RNN with two layers,
    each containing 64 units. Each model was trained for ten epochs with a batch size
    of 32\. The accuracy and loss curves for each model are shown in Figure [9-14](#Fig14)
    to Figure [9-17](#Fig17). The mean validation accuracies were computed for each
    model architecture and are shown in Table [9-2](#Tab2).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '![](../images/611710_1_En_9_Chapter/611710_1_En_9_Fig17_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-17
  prefs: []
  type: TYPE_NORMAL
- en: 'Loss and accuracy curves: Model 4'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_9_Chapter/611710_1_En_9_Fig16_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-16
  prefs: []
  type: TYPE_NORMAL
- en: 'Loss and accuracy curves: Model 3'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_9_Chapter/611710_1_En_9_Fig15_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-15
  prefs: []
  type: TYPE_NORMAL
- en: 'Loss and accuracy curves: Model 2'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_9_Chapter/611710_1_En_9_Fig14_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-14
  prefs: []
  type: TYPE_NORMAL
- en: 'Loss and accuracy curves: Model 1'
  prefs: []
  type: TYPE_NORMAL
- en: The results of the above experiments are summarized in Table [9-2](#Tab2).
  prefs: []
  type: TYPE_NORMAL
- en: Table 9-2
  prefs: []
  type: TYPE_NORMAL
- en: Mean Validation Accuracy of Four Different RNN Models on the Treebank Dataset
  prefs: []
  type: TYPE_NORMAL
- en: '| Architecture | Mean Validation Accuracy |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Simple RNN with a single layer having 64 units | 0.9206 |'
  prefs: []
  type: TYPE_TB
- en: '| Stacked RNN with two layers having 64 units in each layer | 0.9040 |'
  prefs: []
  type: TYPE_TB
- en: '| Bidirectional RNN with a single layer having 64 units | 0.9284 |'
  prefs: []
  type: TYPE_TB
- en: '| Stacked bidirectional RNN with two layers having 64 units in each layer |
    0.9314 |'
  prefs: []
  type: TYPE_TB
- en: Note that the bidirectional RNN performs better as it can capture both the forward
    and the backward context. That is, it finds the relation of an element with the
    element before it and those after it. Let us have a look at an application that
    uses a one-to-many RNN model.
  prefs: []
  type: TYPE_NORMAL
- en: Handwritten Text Recognition
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You are given images containing some handwritten text in English, and you are
    required to obtain the text corresponding to it. That is, you are required to
    recognize images of handwritten text. How do you think you could solve the problem?
  prefs: []
  type: TYPE_NORMAL
- en: One of the simplest solutions to this problem, based on what we have studied
    so far, is to convert the input pictures to embeddings using a CNN model and then
    give this as input to a one-to-many RNN model as shown in Figure [9-18](#Fig18).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_9_Chapter/611710_1_En_9_Fig18_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-18
  prefs: []
  type: TYPE_NORMAL
- en: Handwritten text recognition model
  prefs: []
  type: TYPE_NORMAL
- en: 'To accomplish this task, you can try the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Create embedding of the input image using some pretrained Convolutional Neural
    Network.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Create embeddings using autoencoders (Chapter [11](611710_1_En_11_Chapter.xhtml)).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Use RNN with a single layer having 64 units (you can change the number of units
    if you want).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Use RNN with two layers, having 64 and 32 units.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Use dropout and analyze the effect of introducing this layer on the performance
    of the model with the test set.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The reader is expected to try all the combinations of the above and find the
    model that works well. You can obtain any publicly available dataset to accomplish
    the task. One of the options is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[`https://www.kaggle.com/datasets/landlord/handwriting-recognition`](https://www.kaggle.com/datasets/landlord/handwriting-recognition)'
  prefs: []
  type: TYPE_NORMAL
- en: Speech to Text
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You are given audio containing the recordings of some hours of speech in English
    and the corresponding transcriptions. You are required to get the transcript corresponding
    to yet unheard (by the model) speech. That is, you are required to transcribe
    speech. How do you think you could solve the problem?
  prefs: []
  type: TYPE_NORMAL
- en: Again, there can be many interesting solutions to this problem, one of which,
    based on what we have studied so far, is to obtain the embeddings of the audio
    data (try obtaining the embeddings of segments first) and then give these as input
    to a one-to-many RNN model as shown in Figure [9-19](#Fig19).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_9_Chapter/611710_1_En_9_Fig19_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-19
  prefs: []
  type: TYPE_NORMAL
- en: Speech to text
  prefs: []
  type: TYPE_NORMAL
- en: 'To accomplish this task, you can try the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Create embeddings of the given audio data using Mel-spectrograms or Cepstral,
    followed by the application of Local Binary Pattern.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Create embeddings of the images obtained in (a) using autoencoders (Chapter
    [11](611710_1_En_11_Chapter.xhtml)).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Use RNN with a single layer having 32 units (you can change the number of units
    if you want).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Use RNN with two layers, having 32 and 16 units.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Use dropout and analyze the effect of introducing this layer on the performance
    of the model with the test set.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The reader is expected to try all the combinations of the above and find the
    model that works well. You can obtain any publicly available dataset to accomplish
    the task. One of the options is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[`https://www.openslr.org/12`](https://www.openslr.org/12)'
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter introduced the Recurrent Neural Network, a sequence model capable
    of handling sequence data. The architectures of RNN and the algorithm to train
    the model are discussed in the chapter. This chapter contains some very interesting
    applications of RNN including Sentiment Analysis, parts of speech tagging, and
    handwritten text recognition. The reader is expected to attempt the exercises
    to get hold of the concepts studied in this chapter. The next chapter takes the
    discussion forward and introduces Gate Recurrent Unit (GRU) and Long Short-Term
    Memory (LSTM) that handle the problem of vanishing gradient gracefully.
  prefs: []
  type: TYPE_NORMAL
