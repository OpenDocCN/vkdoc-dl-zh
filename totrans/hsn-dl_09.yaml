- en: Having seen an application of a many-to-one model, let us have a look at an
    application of many-to-many models.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 看过了一个多对一模型的示例后，让我们来看看多对多模型的示例。
- en: Parts of Speech Tagging
  id: totrans-112
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 词性标注
- en: 'Parts of speech (POS) tagging maps each word in a sentence to the corresponding
    part of speech. It can be implemented using a many-to-many RNN model in which
    the input is a sentence and the output is a number corresponding to each part
    of speech. Consider the following sentence:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 词性标注（POS）将句子中的每个词映射到相应的词性。它可以使用一个多对多RNN模型实现，其中输入是一个句子，输出是每个词性的对应数字。考虑以下句子：
- en: “Nishant is traveling to the United States to pursue a postgraduate degree.”
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: “Nishant is traveling to the United States to pursue a postgraduate degree.”
- en: 'The parts of speech corresponding to each word in the above sentence are as
    follows:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 上述句子中每个词对应的词性如下：
- en: 'Nishant: Noun'
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'Nishant: 名词'
- en: 'is: Verb'
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'is: 动词'
- en: 'traveling: Verb'
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'traveling: 动词'
- en: 'to: Preposition'
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'to: 介词'
- en: 'the: Determiner'
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'the: 冠词'
- en: 'United States: Noun'
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'United States: 名词'
- en: 'to: Preposition'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'to: 介词'
- en: 'pursue: Verb'
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'pursue: 动词'
- en: 'a: Determiner'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'a: 冠词'
- en: 'postgraduate: Noun'
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'postgraduate: 名词'
- en: 'degree: Noun'
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'degree: 名词'
- en: The problem is now to convert the words of a sentence into embeddings. Consider
    each word being represented as an embedding of m numbers, and if the maximum length
    of sentences is considered to be n, then a sentence is represented as a 2D array
    of dimension *n* × *m*. So, in each iteration, the model is trained using sentence
    X, *x*[*i*] ∈ *X* and *x*[*i*] ∈ *R*^(*m*), *y* ∈ (1, 2, 3, , …) equal to the
    number of parts of speech.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 现在的问题是将句子的单词转换为嵌入。考虑每个单词被表示为m个数字的嵌入，如果考虑句子的最大长度为n，则句子表示为维度为*n* × *m*的二维数组。因此，在每个迭代中，模型使用句子X，*x*[*i*] ∈ *X*和*x*[*i*] ∈ *R*^(*m*)，*y* ∈ (1,
    2, 3, …)等于词性的数量进行训练。
- en: The Penn Treebank dataset provided by NLTK consists of tagged sentences in English
    and contains over 4.5 million words of American English text, taken from a variety
    of sources. The dataset was preprocessed by extracting unique words and tags,
    mapping them to indices, and converting sentences to sequences of word indices
    and corresponding tag indices. The four different RNN architectures were implemented
    (Listing [9-2](#PC2)) using ***Keras***. **Model 1** utilized a single-layer simple
    RNN with 64 units. **Model 2** employed a stacked simple RNN with two layers,
    each containing 64 units. **Model 3** employed a single-layer bidirectional RNN
    with 64 units. **Model 4** incorporated a stacked bidirectional RNN with two layers,
    each containing 64 units. Each model was trained for ten epochs with a batch size
    of 32\. The accuracy and loss curves for each model are shown in Figure [9-14](#Fig14)
    to Figure [9-17](#Fig17). The mean validation accuracies were computed for each
    model architecture and are shown in Table [9-2](#Tab2).
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: NLTK提供的宾州树库数据集包含英语的标记句子，包含来自各种来源的450多万个美式英语单词。数据集通过提取唯一单词和标签、将它们映射到索引以及将句子转换为单词索引和相应标签索引的序列进行预处理。实现了四种不同的RNN架构（列表[9-2](#PC2)），使用***Keras***。**模型1**使用了一个包含64个单元的单层简单RNN。**模型2**使用了包含64个单元的两个层的堆叠简单RNN。**模型3**使用了一个包含64个单元的单层双向RNN。**模型4**包含了一个包含64个单元的两个层的堆叠双向RNN。每个模型都使用32个批次的32个epoch进行训练。每个模型的准确率和损失曲线显示在图[9-14](#Fig14)到图[9-17](#Fig17)中。计算了每个模型架构的平均验证准确率，并显示在表[9-2](#Tab2)中。
- en: '[PRE1]'
  id: totrans-129
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '![](../images/611710_1_En_9_Chapter/611710_1_En_9_Fig17_HTML.jpg)'
  id: totrans-130
