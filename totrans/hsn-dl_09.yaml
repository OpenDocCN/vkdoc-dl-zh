- en: The results of the above experiments are summarized in Table [9-2](#Tab2).
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 上述实验的结果总结在表[9-2](#Tab2)中。
- en: Table 9-2
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 表9-2
- en: Mean Validation Accuracy of Four Different RNN Models on the Treebank Dataset
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 四种不同的RNN模型在Treebank数据集上的平均验证准确率
- en: '| Architecture | Mean Validation Accuracy |'
  id: totrans-145
  prefs: []
  type: TYPE_TB
  zh: '| 架构 | 平均验证准确率 |'
- en: '| --- | --- |'
  id: totrans-146
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Simple RNN with a single layer having 64 units | 0.9206 |'
  id: totrans-147
  prefs: []
  type: TYPE_TB
  zh: '| 简单RNN，单层有64个单元 | 0.9206 |'
- en: '| Stacked RNN with two layers having 64 units in each layer | 0.9040 |'
  id: totrans-148
  prefs: []
  type: TYPE_TB
  zh: '| 堆叠RNN，每层有64个单元 | 0.9040 |'
- en: '| Bidirectional RNN with a single layer having 64 units | 0.9284 |'
  id: totrans-149
  prefs: []
  type: TYPE_TB
  zh: '| 单层双向RNN，每层有64个单元 | 0.9284 |'
- en: '| Stacked bidirectional RNN with two layers having 64 units in each layer |
    0.9314 |'
  id: totrans-150
  prefs: []
  type: TYPE_TB
  zh: '| 堆叠双向RNN，每层有64个单元 | 0.9314 |'
- en: Note that the bidirectional RNN performs better as it can capture both the forward
    and the backward context. That is, it finds the relation of an element with the
    element before it and those after it. Let us have a look at an application that
    uses a one-to-many RNN model.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，双向RNN表现更好，因为它可以捕捉到前向和后向的上下文。也就是说，它找到元素与其之前和之后的元素之间的关系。让我们看看一个使用一对多RNN模型的实际应用。
- en: Handwritten Text Recognition
  id: totrans-152
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 手写文本识别
- en: You are given images containing some handwritten text in English, and you are
    required to obtain the text corresponding to it. That is, you are required to
    recognize images of handwritten text. How do you think you could solve the problem?
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 你被提供了包含一些英语手写文本的图像，你需要获取与之对应的文本。也就是说，你需要识别手写文本的图像。你认为你该如何解决这个问题？
- en: One of the simplest solutions to this problem, based on what we have studied
    so far, is to convert the input pictures to embeddings using a CNN model and then
    give this as input to a one-to-many RNN model as shown in Figure [9-18](#Fig18).
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 基于我们迄今为止所学的内容，解决这个问题的最简单的方法之一是使用CNN模型将输入图片转换为嵌入，然后将这个嵌入作为输入给一个如图[9-18](#Fig18)所示的一对多RNN模型。
- en: '![](../images/611710_1_En_9_Chapter/611710_1_En_9_Fig18_HTML.jpg)'
  id: totrans-155
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/611710_1_En_9_Chapter/611710_1_En_9_Fig18_HTML.jpg)'
- en: Figure 9-18
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-18
- en: Handwritten text recognition model
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 手写文本识别模型
- en: 'To accomplish this task, you can try the following:'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 要完成这个任务，你可以尝试以下方法：
- en: Create embedding of the input image using some pretrained Convolutional Neural
    Network.
  id: totrans-159
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用某些预训练的卷积神经网络创建输入图像的嵌入。
- en: Create embeddings using autoencoders (Chapter [11](611710_1_En_11_Chapter.xhtml)).
  id: totrans-160
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用自动编码器创建嵌入（第[11章](611710_1_En_11_Chapter.xhtml)）。
- en: Use RNN with a single layer having 64 units (you can change the number of units
    if you want).
  id: totrans-161
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用单层RNN，每层有64个单元（如果你想，可以更改单元数）。
- en: Use RNN with two layers, having 64 and 32 units.
  id: totrans-162
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用两层RNN，每层有64和32个单元。
- en: Use dropout and analyze the effect of introducing this layer on the performance
    of the model with the test set.
  id: totrans-163
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用dropout并分析引入此层对测试集模型性能的影响。
- en: 'The reader is expected to try all the combinations of the above and find the
    model that works well. You can obtain any publicly available dataset to accomplish
    the task. One of the options is as follows:'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 预期读者尝试上述所有组合，找到表现良好的模型。你可以获取任何公开可用的数据集来完成此任务。以下是一个选项：
- en: '[`https://www.kaggle.com/datasets/landlord/handwriting-recognition`](https://www.kaggle.com/datasets/landlord/handwriting-recognition)'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: '[Kaggle数据集](https://www.kaggle.com/datasets/landlord/handwriting-recognition)'
- en: Speech to Text
  id: totrans-166
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 语音转文本
- en: You are given audio containing the recordings of some hours of speech in English
    and the corresponding transcriptions. You are required to get the transcript corresponding
    to yet unheard (by the model) speech. That is, you are required to transcribe
    speech. How do you think you could solve the problem?
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 你被提供了包含一些英语语音录音的音频和相应的转录。你需要获取对应于尚未被模型听到的（语音）的转录。也就是说，你需要转录语音。你认为你该如何解决这个问题？
- en: Again, there can be many interesting solutions to this problem, one of which,
    based on what we have studied so far, is to obtain the embeddings of the audio
    data (try obtaining the embeddings of segments first) and then give these as input
    to a one-to-many RNN model as shown in Figure [9-19](#Fig19).
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，这个问题可能有多种有趣的解决方案，其中之一，基于我们迄今为止所学的，是获取音频数据的嵌入（首先尝试获取段落的嵌入）然后将这些作为输入给一个如图[9-19](#Fig19)所示的一对多RNN模型。
- en: '![](../images/611710_1_En_9_Chapter/611710_1_En_9_Fig19_HTML.jpg)'
  id: totrans-169
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/611710_1_En_9_Chapter/611710_1_En_9_Fig19_HTML.jpg)'
- en: Figure 9-19
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-19
- en: Speech to text
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 语音转文本
- en: 'To accomplish this task, you can try the following:'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 要完成这项任务，你可以尝试以下方法：
- en: Create embeddings of the given audio data using Mel-spectrograms or Cepstral,
    followed by the application of Local Binary Pattern.
  id: totrans-173
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用梅尔频谱图或声谱图创建给定音频数据的嵌入，然后应用局部二进制模式。
- en: Create embeddings of the images obtained in (a) using autoencoders (Chapter
    [11](611710_1_En_11_Chapter.xhtml)).
  id: totrans-174
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用自动编码器（第[11](611710_1_En_11_Chapter.xhtml)章）创建（a）中获得的图像的嵌入。
- en: Use RNN with a single layer having 32 units (you can change the number of units
    if you want).
  id: totrans-175
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用具有32个单元的单层RNN（如果你想，可以更改单元数量）。
- en: Use RNN with two layers, having 32 and 16 units.
  id: totrans-176
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用具有32和16个单元的两层RNN。
- en: Use dropout and analyze the effect of introducing this layer on the performance
    of the model with the test set.
  id: totrans-177
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用dropout并分析引入此层对测试集模型性能的影响。
- en: 'The reader is expected to try all the combinations of the above and find the
    model that works well. You can obtain any publicly available dataset to accomplish
    the task. One of the options is as follows:'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 读者应尝试上述所有组合，找到效果良好的模型。你可以获取任何公开可用的数据集来完成这项任务。以下是一个选项：
- en: '[`https://www.openslr.org/12`](https://www.openslr.org/12)'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://www.openslr.org/12](https://www.openslr.org/12)'
- en: Conclusion
  id: totrans-180
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: This chapter introduced the Recurrent Neural Network, a sequence model capable
    of handling sequence data. The architectures of RNN and the algorithm to train
    the model are discussed in the chapter. This chapter contains some very interesting
    applications of RNN including Sentiment Analysis, parts of speech tagging, and
    handwritten text recognition. The reader is expected to attempt the exercises
    to get hold of the concepts studied in this chapter. The next chapter takes the
    discussion forward and introduces Gate Recurrent Unit (GRU) and Long Short-Term
    Memory (LSTM) that handle the problem of vanishing gradient gracefully.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 本章介绍了循环神经网络（RNN），这是一种能够处理序列数据的序列模型。本章讨论了RNN的架构和训练模型的算法。本章包含了一些非常有趣的RNN应用，包括情感分析、词性标注和手写文本识别。读者应尝试练习以掌握本章研究的概念。下一章将讨论继续，并介绍了门控循环单元（GRU）和长短期记忆（LSTM），它们优雅地处理梯度消失问题。
- en: Exercises
  id: totrans-182
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 练习
- en: Multiple-Choice Questions
  id: totrans-183
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 多选题
- en: What type of data is RNN used to handle?
  id: totrans-184
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: RNN用于处理哪种类型的数据？
- en: Imaging data
  id: totrans-185
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 图像数据
- en: Sequential data
  id: totrans-186
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 顺序数据
- en: Numeric tabular data
  id: totrans-187
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数字表格数据
- en: Graph data
  id: totrans-188
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 图数据
- en: In Neural Networks, how are the input and output related?
  id: totrans-189
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在神经网络中，输入和输出是如何相关的？
- en: They are linearly dependent on each other.
  id: totrans-190
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它们彼此线性相关。
- en: They are independent of each other.
  id: totrans-191
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它们彼此独立。
- en: They are processed sequentially.
  id: totrans-192
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它们是顺序处理的。
- en: They are processed recursively.
  id: totrans-193
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它们是递归处理的。
- en: How does an RNN process information vis-à-vis a general Neural Network?
  id: totrans-194
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: RNN与一般神经网络相比，是如何处理信息的？
- en: Independently
  id: totrans-195
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 独立地
- en: Randomly
  id: totrans-196
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 随机
- en: In parallel
  id: totrans-197
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 并行
- en: Sequentially
  id: totrans-198
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 顺序
- en: Which of the following is true regarding the parameters in RNNs?
  id: totrans-199
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 关于RNN中的参数，以下哪项是正确的？
- en: Initialized randomly.
  id: totrans-200
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 随机初始化。
- en: Share parameters across each layer.
  id: totrans-201
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在每一层之间共享参数。
- en: Different parameters for each layer.
  id: totrans-202
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 每一层的不同参数。
- en: They do not use parameters.
  id: totrans-203
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它们不使用参数。
- en: Which algorithm do RNNs use to compute the loss?
  id: totrans-204
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: RNN使用哪种算法来计算损失？
- en: Gradient descent
  id: totrans-205
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 梯度下降
- en: Backpropagation
  id: totrans-206
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 反向传播
- en: BPTT
  id: totrans-207
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: BPTT
- en: Genetic algorithm
  id: totrans-208
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 遗传算法
- en: How do traditional feed-forward networks differ from RNNs in terms of weights?
  id: totrans-209
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 传统前馈网络在权重方面如何与RNN不同？
- en: Feed-forward networks share the same weights across each layer.
  id: totrans-210
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 前馈网络在每一层共享相同的权重。
- en: They have different weights for each layer.
  id: totrans-211
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它们为每一层有不同的权重。
- en: Feed-forward networks have different weights for each layer.
  id: totrans-212
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 前馈网络为每一层有不同的权重。
- en: Both have the same weights across each layer.
  id: totrans-213
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它们在每一层都有相同的权重。
- en: What can RNNs handle that traditional feed-forward networks cannot?
  id: totrans-214
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: RNN可以处理传统前馈网络无法处理的内容是什么？
- en: Fixed-length input data
  id: totrans-215
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 固定长度输入数据
- en: Sequential data
  id: totrans-216
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 顺序数据
- en: Input data of any length
  id: totrans-217
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 任何长度的输入数据
- en: Non-sequential data
  id: totrans-218
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 非顺序数据
- en: Which of the following activation functions is commonly used in RNNs?
  id: totrans-219
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 以下哪个激活函数在RNN中常用？
- en: Softmax
  id: totrans-220
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: Softmax
- en: Tanh
  id: totrans-221
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: Tanh
- en: Leaky ReLU
  id: totrans-222
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: Leaky ReLU
- en: SIREN
  id: totrans-223
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: SIREN
- en: What challenges do RNNs face when capturing long-term dependencies?
  id: totrans-224
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: RNN在捕捉长期依赖关系时面临哪些挑战？
- en: Overfitting
  id: totrans-225
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过拟合
- en: Underfitting
  id: totrans-226
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 欠拟合
- en: Exponential increase or decrease in multiplicative gradients
  id: totrans-227
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 乘法梯度的指数增加或减少
- en: Lack of enough training data
  id: totrans-228
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏足够的训练数据
- en: What happens during the BPTT process in RNNs?
  id: totrans-229
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: RNN中的BPTT过程中发生了什么？
- en: The network unfolds in multiple layers.
  id: totrans-230
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 网络在多个层展开。
- en: The network computes gradients at each time step independently.
  id: totrans-231
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 网络在每个时间步独立计算梯度。
- en: The network unfolds in multiple time steps and computes gradients over these
    steps.
  id: totrans-232
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 网络在多个时间步展开，并计算这些步骤的梯度。
- en: The network uses a genetic algorithm to update parameters.
  id: totrans-233
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 网络使用遗传算法更新参数。
- en: Theory
  id: totrans-234
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 理论
- en: Why are RNNs better compared with Neural Networks for sequential data?
  id: totrans-235
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 与神经网络相比，为什么RNN在处理顺序数据时更好？
- en: Explain Backpropagation Through Time.
  id: totrans-236
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解释时间反向传播。
- en: What are the various types of RNNs? Give examples of each type.
  id: totrans-237
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: RNN有哪些不同类型？给出每种类型的例子。
- en: Image Captioning
  id: totrans-238
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 图像描述
- en: You are given images along with their captions, and you are required to obtain
    the caption corresponding to a new image. How do you think you could solve the
    problem?
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 给定图像及其标题，你需要为新的图像获取相应的标题。你认为如何解决这个问题？
- en: '**Hint**: One of the simplest solutions to this problem, based on what we have
    studied so far, is to convert the input pictures to embeddings using a CNN model
    and then give this as input to a one-to-many RNN model as shown in Figure [9-20](#Fig20).'
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示**：基于我们迄今为止所学的内容，解决此问题的一个最简单的方法是将输入图片转换为使用CNN模型生成的嵌入，然后将此作为输入给一个如图[9-20](#Fig20)所示的一对多RNN模型。'
- en: '![](../images/611710_1_En_9_Chapter/611710_1_En_9_Fig20_HTML.jpg)'
  id: totrans-241
  prefs: []
  type: TYPE_IMG
  zh: '![图9-20](../images/611710_1_En_9_Chapter/611710_1_En_9_Fig20_HTML.jpg)'
- en: Figure 9-20
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-20
- en: Image captioning
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 图像描述
- en: 'To accomplish this task, you can try the following:'
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 要完成这个任务，你可以尝试以下方法：
- en: Create embeddings of the given image using a pretrained Convolutional Neural
    Network such as VGG 19.
  id: totrans-245
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用预训练的卷积神经网络（如VGG 19）创建给定图像的嵌入。
- en: Create embeddings of the given image using autoencoders (Chapter [11](611710_1_En_11_Chapter.xhtml)).
  id: totrans-246
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用自动编码器（第[11](611710_1_En_11_Chapter.xhtml)章）创建给定图像的嵌入。
- en: Use RNN with a single layer having 64 units.
  id: totrans-247
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用具有64个单元的单层RNN。
- en: Use RNN with two layers, having 64 and 32 units.
  id: totrans-248
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用具有64和32个单元的两个层的RNN。
- en: Use dropout and analyze the effect of introducing this layer on the performance
    of the model with the test set.
  id: totrans-249
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用dropout并分析引入此层对模型性能的测试集的影响。
- en: 'The reader is expected to try all the combinations of the above and find the
    model that works well. You can obtain any publicly available dataset to accomplish
    the task. One of the options is as follows:'
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 预期读者尝试上述所有组合，找到表现良好的模型。你可以获取任何公开可用的数据集来完成此任务。以下是一个选项：
- en: '[`https://paperswithcode.com/dataset/conceptual-captions`](https://paperswithcode.com/dataset/conceptual-captions)'
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: '[概念描述数据集](https://paperswithcode.com/dataset/conceptual-captions)'
