- en: 10. Gated Recurrent Unit and Long Short-Term Memory
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: So far, we have studied Dense Neural Networks (DNNs) and various optimization
    techniques. We also studied the Convolutional Neural Networks (CNNs) that can
    handle imaging data and the Recurrent Neural Networks (RNNs) capable of handling
    sequence data. Let us pause for a moment and explore sequence data from another
    perspective.
  prefs: []
  type: TYPE_NORMAL
- en: 'Consider a program on a popular TV channel in Shangri La, hosted by their star
    anchor Mr. A. He only talks about four things:'
  prefs: []
  type: TYPE_NORMAL
- en: His favorite leader
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Why some people are problematic
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Advantages of all the policies of dispensation
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The mistakes of the previous dispensations of the country
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In order to guess what his today’s topic will be, you create a Neural Network.
    The inputs to the network are
  prefs: []
  type: TYPE_NORMAL
- en: Day of the week (number from 1 to 7)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Whether a new policy is announced that day (0 or 1)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Whether elections are approaching or going on (0 or 1)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You train the network using historical data and try to predict today’s topic.
    However, your network does not predict effectively. Now you realize that there
    is a sequence in Mr. A’s deciding the topic. A particular topic always comes after
    one topic. To handle such sequential data, you design a network that takes input
    and predicted output as the input in the next time stamp. This is called a recursive
    network (Figure [10-1](#Fig1)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_10_Chapter/611710_1_En_10_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10-1
  prefs: []
  type: TYPE_NORMAL
- en: Recurrent unit
  prefs: []
  type: TYPE_NORMAL
- en: 'However, there is a problem with such kind of architecture. For the sake of
    simplification, assume that a single scalar is output through the network. If
    that scalar is greater than one, then at one point in time the output will explode
    or become very large, whereas if it is less than one, then after successive multiplications
    its effect will become negligible. The first problem was discussed in the previous
    chapter, and the second problem is referred to as the vanishing gradient, which
    can be handled using two models: Long Short-Term Memory (LSTM) and Gated Recurrent
    Unit (GRU), discussed in this chapter. Let us begin the discussion with GRU.'
  prefs: []
  type: TYPE_NORMAL
- en: GRU
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'GRU is a type of RNN that can gracefully handle the problem of vanishing gradient.
    The hidden state of GRU depends on the previous hidden state *h*[*t* − 1] and
    the new memory. Assume that *z*[*t*] is a scalar between 0 and 1; then *h*[*t*]
    can be found using the following equation:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {h}_t=\left(1-{z}_t\right)\ast \overset{\sim }{h_t}+{z}_t\ast {h}_{t-1}
    $$](../images/611710_1_En_10_Chapter/611710_1_En_10_Chapter_TeX_Equa.png)'
  prefs: []
  type: TYPE_IMG
- en: where *h*[*t*] is the new memory and *z*[*t*] is the factor that controls what
    part of the previous hidden state goes into the new hidden state. Here ^"∗” represents
    point-by-point multiplication.
  prefs: []
  type: TYPE_NORMAL
- en: '*z*[*t*], referred to as the update gate,is the combination of *x*[*t*] and
    *h*[*t* − 1] given as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {z}_t=\sigma \left({W}_{xz}{x}_t+{W}_{hz}{h}_{t-1}\right) $$](../images/611710_1_En_10_Chapter/611710_1_En_10_Chapter_TeX_Equb.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Now, *r*[*t*] (reset gate) is also calculated as a combination of *x*[*t*]
    and *h*[*t* − 1]. It tells us how much part of *h*[*t* − 1] is summated to the
    new memory state:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {r}_t=\sigma \left({W}_{xr}{x}_t+{W}_{hr}{h}_{t-1}\right) $$](../images/611710_1_En_10_Chapter/611710_1_En_10_Chapter_TeX_Equc.png)'
  prefs: []
  type: TYPE_IMG
- en: The new memory is calculated as
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \overset{\sim }{h_t}=\mathit{\tanh}\left({W}_h\left({r}_t\ast {h}_{t-1}\right)+{W}_x{x}_t\right)
    $$](../images/611710_1_En_10_Chapter/611710_1_En_10_Chapter_TeX_Equd.png)'
  prefs: []
  type: TYPE_IMG
- en: Note that if
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {z}_t=1\  then\ {h}_t={h}_{t-1} $$](../images/611710_1_En_10_Chapter/611710_1_En_10_Chapter_TeX_Eque.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {z}_t=0\  then\ {h}_t=\overset{\sim }{h_t} $$](../images/611710_1_En_10_Chapter/611710_1_En_10_Chapter_TeX_Equf.png)'
  prefs: []
  type: TYPE_IMG
- en: The above process can be depicted as follows (Figure [10-2](#Fig2)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_10_Chapter/611710_1_En_10_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10-2
  prefs: []
  type: TYPE_NORMAL
- en: GRU architecture
  prefs: []
  type: TYPE_NORMAL
- en: To summarize
  prefs: []
  type: TYPE_NORMAL
- en: The input and *h*[*t* − 1] decide the value of the reset gate.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The reset gate decides what portion of *h*[*t* − 1] goes into the new memory.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The update gate depends on the input and *h*[*t* − 1].
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The update gate decides what portion of *h*[*t* − 1] and what portion of new
    the memory make *h*[*t*].
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Having seen the architecture of GRU, let us move to another elegant architecture
    called LSTM.
  prefs: []
  type: TYPE_NORMAL
- en: Long Short-Term Memory
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The LSTM is a type of RNN that is capable of handling long-term dependencies.
    The memory cell in an LSTM can store information for a long period. The cell state
    is the core of LSTM and depends on the input, forget, and output gates. Let us
    have a brief look at the gates in an LSTM:'
  prefs: []
  type: TYPE_NORMAL
- en: Input gate (i)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Forget gate (f)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Output (o)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The input gate decides whether or not to write to a cell. The output gate decides
    how much to reveal. The forget gate tells us whether to erase a cell, and the
    gate tells us how much to write.
  prefs: []
  type: TYPE_NORMAL
- en: 'If the previous activation *h*[*t* − 1] and the input *x*[*t*] are stacked,
    then the product of the weight *W* with this stacked input can become an input
    to various activations like sigmoid or tanh. The internal state *c*[*t*] of an
    LSTM does not get exposed to the outside world. This *c*[*t*] passed through an
    activation, along with o, decides the value of *h*[*t*]:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {c}_t=f\ast {c}_{t-1}+i\ast g $$](../images/611710_1_En_10_Chapter/611710_1_En_10_Chapter_TeX_Equg.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {h}_t=o\ast \mathit{\tanh}\left({c}_t\right) $$](../images/611710_1_En_10_Chapter/611710_1_En_10_Chapter_TeX_Equh.png)'
  prefs: []
  type: TYPE_IMG
- en: The above process can be depicted as follows (Figure [10-3](#Fig3)). It may
    be noted that people came up with their own architectures for LSTM. The architecture
    shown in the following figure has been adopted from [`https://cs231n.stanford.edu/slides/2017/cs231n_2017_lecture10.pdf`](https://cs231n.stanford.edu/slides/2017/cs231n_2017_lecture10.pdf)
    [[4](#CR4)].
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_10_Chapter/611710_1_En_10_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10-3
  prefs: []
  type: TYPE_NORMAL
- en: LSTM architecture as suggested by Fei-Fei Li, Justin Johnson, and Serena Yeung
    [[4](#CR4)]
  prefs: []
  type: TYPE_NORMAL
- en: 'The gates of an LSTM can be used to remember the important information and
    forget the unnecessary ones. A brief explanation of each gate is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Forget Gate: The forget gate decides what information from the cell state is
    needed or not. It takes the previous hidden state and the current input and passes
    them through a sigmoid function, resulting in a value between 0 and 1 for each
    number in the cell state. A value of 1 indicates complete retention of the information,
    while a value of 0 means forgetting the information.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Input Gate: The input gate decides what new information should be added to
    the cell state. It consists of an input gate that decides which values to update
    and a gate that creates a vector of new candidate values that could be added to
    the state. The output of these two layers is combined to update the cell state.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Output Gate: The output gate determines what the next hidden state should be.
    This hidden state is used for the next time step and also for making predictions.
    The output gate processes the current input and the previous hidden state through
    a sigmoid function and then multiplies it by the tanh of the updated cell state
    to produce the next hidden state.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: LSTMs have the capability to retain important information over long sequences
    and discard irrelevant data, making them very effective for tasks involving the
    modeling of sequential data.
  prefs: []
  type: TYPE_NORMAL
- en: Having seen the architectures of GRU and LSTM, let us now move to two important
    applications of these models.
  prefs: []
  type: TYPE_NORMAL
- en: Named Entity Recognition
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Given a sequence of words, Named Entity Recognition (NER) aims to identify the
    named entities from the given sequence. It takes a sentence as an input and finds
    which words are the named entities. This section implements NER using the LSTM
    and GRU.
  prefs: []
  type: TYPE_NORMAL
- en: The CoNLL-2003 dataset is utilized in the following Listing [10-1](#PC1) and
    contains labeled examples of sentences annotated with named entity tags. Each
    sentence is tokenized, and each token is tagged with an entity label. The dataset
    is organized in a CoNLL format, where each word in a sentence is followed by its
    corresponding entity tag. The sentences are separated by blank lines. Eight different
    models were implemented using ***Keras*** for NER.
  prefs: []
  type: TYPE_NORMAL
- en: These models employed different architectures of LSTM and GRU and their bidirectional
    variants. Each model consisted of an embedding layer, followed by recurrent layers
    and a dense layer with softmax activation. Each model is compiled with categorical
    cross-entropy loss and accuracy metrics over ten epochs. The accuracy and loss
    curves for each model are shown in Figure [10-4](#Fig4) to Figure [10-11](#Fig11).
    The code has been divided into various steps, enlisted as follows.
