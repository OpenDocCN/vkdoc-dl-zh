- en: Keras Overview
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This section introduces a front-end wrapper to a deep learning framework known
    as Keras. Then we will work along with how we implement Keras using a Jupyter
    Notebook and creating chatbots with it.
  prefs: []
  type: TYPE_NORMAL
- en: Keras is front-end wrapper that can be used with lots of deep learning frameworks
    at the back end.
  prefs: []
  type: TYPE_NORMAL
- en: 'Keras has already been built up neural network function that you can use to
    get the neural networks easily and fast. It maintains the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Modularity
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Minimalism
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Extensibility
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Python nativeness
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As a basic starting point for Keras, you will run a “Hello World” example. With
    respect to machine learning and deep learning, a Hello World example is different.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this example, you will use the `iris` dataset. You need to check that the
    following libraries are installed:'
  prefs: []
  type: TYPE_NORMAL
- en: '`seaborn`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`numpy`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`sklearn`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`keras`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`tensorflow`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: TensorFlow will be the background for the Keras wrapper.
  prefs: []
  type: TYPE_NORMAL
- en: 'You will sync a GitHub project:'
  prefs: []
  type: TYPE_NORMAL
- en: '[`https://github.com/fastforwardlabs/keras-hello-world`](https://github.com/fastforwardlabs/keras-hello-world)'
  prefs: []
  type: TYPE_NORMAL
- en: The important files will be downloaded via a `reqirements.txt` file.
  prefs: []
  type: TYPE_NORMAL
