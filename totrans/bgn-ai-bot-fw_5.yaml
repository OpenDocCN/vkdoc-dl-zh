- en: Copy and paste the three folders from `C:\Users\j\Downloads\cudnn-8.0-windows10-x64-v6.0.zip\cuda`
    to `C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v8.0`.
  id: totrans-418
