- en: 5. Chatbot with TensorFlow
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, you will create chatbots by using TensorFlow. You’ll start
    by learning some TensorFlow basics.
  prefs: []
  type: TYPE_NORMAL
- en: You’ll work on open source models. Then you’ll then move on to different approaches
    for creating the chatbots. You’ll set up a TensorFlow GPU with access to NVDIA
    CUDA. You’ll closely examine CUDA and then create the chatbots.
  prefs: []
  type: TYPE_NORMAL
- en: TensorFlow Basics
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '*TensorFlow* is a data science framework primarily meant for dataflow-based
    work. It uses Tensors and their approach to nodes in an effective way so that
    we can easily implement it in machine learning as well as deep learning, a Tensor
    is a generalized matrix that might be 1d, 2d or of higher order.'
  prefs: []
  type: TYPE_NORMAL
- en: This section presents the basics of Tensors and of setting up the proper working
    environment. Later in this chapter, you will construct a neural network from scratch
    in TensorFlow and then use the TensorBoard feature to see how a TensorFlow graph
    works.
  prefs: []
  type: TYPE_NORMAL
