  prefs: []
  type: TYPE_NORMAL
- en: 'Here are the steps to download and install CUDA:'
  prefs: []
  type: TYPE_NORMAL
- en: Go to [CUDA Toolkit downloads](https://developer.nvidia.com/cuda-downloads).
  prefs: []
  type: TYPE_NORMAL
- en: After CUDA downloads, run the downloaded file and install it with Express Settings.
    This might take a while and flicker the screen (because of the graphics card).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Verify that you have the following path on your system:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE71]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'OS: Windows'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Architecture: x86_64'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Version: 10'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Scroll down to Legacy Releases.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Click the version you want (CUDA Toolkit X.Y):'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For 8.0, you'll see CUDA Toolkit 8.0 GA, so replace *<Z>* with the highest number
    available. Z is the version that is available. I downloaded CUDA Toolkit 8.0 GA2.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: For 9.0, the file is CUDA Toolkit 9.0
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: For 9.1, the file is CUDA Toolkit 9.1.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Select your operating system. Mine is as follows:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Download and Install cuDNN
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To install the Cuda Deep Neural Network library (cuDNN), you need an NVIDIA
    developer account. It’s free.
  prefs: []
  type: TYPE_NORMAL
- en: 'Create a free NVIDIA Developer Membership [here](https://developer.nvidia.com/developer-program/signup):'
  prefs: []
  type: TYPE_NORMAL
- en: 'After you sign up, go to [`https://developer.nvidia.com/cudnn`](https://developer.nvidia.com/cudnn)
    . Then follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Click the Download cuDNN button (ignore the current listed version for now).
    Agree to the Terms.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Remember how above we need cuDNN v6.0 from above? You might see this listed
    here, or you might not. If you don’t, just select Archived cuDNN Releases.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click the version you need as well as the system you need.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Download cuDNN v6.0 (April 27, 2017) for CUDA 8.0, and then download cuDNN
    v6.0 Library for Windows 10\. Unzip your recent downloaded zip file, such as:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE72]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Open `cuda` and you should see the following:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE73]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Copy and paste the three folders from `C:\Users\j\Downloads\cudnn-8.0-windows10-x64-v6.0.zip\cuda`
    to `C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v8.0`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Note that dragging and dropping will merge the folders and not replace them;
    I don't believe the same is true for Mac/Linux. If Cuda asks you to replace anything,
    say No and just drag and drop each folder's contents from cuDNN to Cuda. Cuda
    might as about admin privileges, in which case, you should just say Yes.
  prefs: []
  type: TYPE_NORMAL
- en: 'Verify that you did the last step correctly. If you did, you should be able
    to find this path:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE74]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Uninstall TensorFlow, Install TensorFlow GPU
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'You can remove TensorFlow from your system if it’s currently installed by using
    this command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE75]'
  prefs: []
  type: TYPE_PRE
- en: 'You want to use TensorFlow with GPU support, and doing that is easy:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE76]'
  prefs: []
  type: TYPE_PRE
- en: I’m glad that was easy. :)
  prefs: []
  type: TYPE_NORMAL
- en: Update the %PATH% on the System
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Update your system environment variables’ `PATH` to have the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE77]'
  prefs: []
  type: TYPE_PRE
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this chapter, you used TensorFlow to create chatbots. You found out that
    for deep learning chatbots, LSTM is the best technique. This chapter also introduced
    Keras, and you built a chatbot with the Keras wrapper and TensorFlow as the back
    end. Finally, you looked at some common chatbots and reviewed a Seq2seq model
    approach to creating chatbots.
  prefs: []
  type: TYPE_NORMAL
