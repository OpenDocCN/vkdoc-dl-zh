  id: totrans-269
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用输入和输出编码器进行翻译。
- en: The NMT-Bot first reads the sentence through the encoder.
  id: totrans-270
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: NMT-Bot 首先通过编码器读取句子。
- en: A decoder processes the sentence vector.
  id: totrans-271
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解码器处理句子向量。
- en: The Chatbot uses LSTM approach.
  id: totrans-272
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 聊天机器人使用 LSTM 方法。
- en: Tokenize the input.
  id: totrans-273
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对输入进行分词。
- en: You will use Anaconda to create an environment, so let’s get Anaconda first.
    Anaconda is an open source distribution for Python that is generally used for
    managing different packages.
