- en: 5. Chatbot with TensorFlow
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 5. TensorFlow 聊天机器人
- en: In this chapter, you will create chatbots by using TensorFlow. You’ll start
    by learning some TensorFlow basics.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，您将通过使用 TensorFlow 来创建聊天机器人。您将从学习一些 TensorFlow 基础知识开始。
- en: You’ll work on open source models. Then you’ll then move on to different approaches
    for creating the chatbots. You’ll set up a TensorFlow GPU with access to NVDIA
    CUDA. You’ll closely examine CUDA and then create the chatbots.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 您将使用开源模型进行工作。然后，您将转向创建聊天机器人的不同方法。您将设置一个具有 NVDIA CUDA 访问权限的 TensorFlow GPU。您将仔细检查
    CUDA，然后创建聊天机器人。
- en: TensorFlow Basics
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: TensorFlow 基础
- en: '*TensorFlow* is a data science framework primarily meant for dataflow-based
    work. It uses Tensors and their approach to nodes in an effective way so that
    we can easily implement it in machine learning as well as deep learning, a Tensor
    is a generalized matrix that might be 1d, 2d or of higher order.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '*TensorFlow* 是一个主要用于数据流工作的数据科学框架。它有效地使用张量和它们对节点的处理方法，以便我们可以在机器学习和深度学习中轻松实现它，张量是一个通用的矩阵，可能是
    1 维、2 维或更高阶。'
- en: This section presents the basics of Tensors and of setting up the proper working
    environment. Later in this chapter, you will construct a neural network from scratch
    in TensorFlow and then use the TensorBoard feature to see how a TensorFlow graph
    works.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 本节介绍了张量以及设置适当工作环境的基础知识。在本章的后面部分，您将从头开始使用 TensorFlow 构建神经网络，然后使用 TensorBoard
    功能来查看 TensorFlow 图的运行情况。
- en: Setting Up the Working Environment
  id: totrans-6
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 设置工作环境
- en: This section provides an overview of the way the Anaconda distribution for Python
    is set up with the GPU version.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 本节概述了 Python 的 Anaconda 发行版如何设置 GPU 版本。
- en: You will work on activating the Anaconda environment and start your TensorFlow
    basics from there.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 您将激活 Anaconda 环境，并从这里开始您的 TensorFlow 基础学习。
- en: You’ll use an Anaconda distribution for Python and then install TensorFlow with
    it. You’ll be working with the GPU version. First you activate the Anaconda environment,
    as shown in Figure [5-1](#Fig1).
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 您将使用 Python 的 Anaconda 发行版，并使用它安装 TensorFlow。您将使用 GPU 版本。首先，您激活 Anaconda 环境，如图
    [5-1](#Fig1) 所示。
