- en: Note that dragging and dropping will merge the folders and not replace them;
    I don't believe the same is true for Mac/Linux. If Cuda asks you to replace anything,
    say No and just drag and drop each folder's contents from cuDNN to Cuda. Cuda
    might as about admin privileges, in which case, you should just say Yes.
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，拖放会合并文件夹而不是替换它们；我不相信Mac/Linux的情况相同。如果Cuda要求你替换任何内容，请说“不”，只需将每个文件夹的内容从cuDNN拖放到Cuda。Cuda可能会要求管理员权限，在这种情况下，你应该只说“是”。
