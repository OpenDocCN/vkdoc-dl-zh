  zh: 接下来，你实现层函数。
- en: For the layer, you should have inputs; this is the information being processed
    from the last layer. Using `in_size` determines the size of the input; this also
    describes the number of hidden neurons for the last layer. Using `out_layer` shows
    the number of neurons for this layer. Then you declare the activation function,
    which is `None`—that is, you are using a linear activation function.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 对于层，你应该有输入；这是从最后一层处理的信息。使用`in_size`确定输入的大小；这也描述了最后一层的隐藏神经元的数量。使用`out_layer`显示这一层的神经元数量。然后你声明激活函数，它是`None`——也就是说，你正在使用线性激活函数。
- en: You have to define weight that is based on input and output size.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须定义基于输入和输出大小的权重。
- en: You will have to use random normal to generate the weights. You will then pass
    the input and the output size. Initially, you use randomized values because it
    improves the neural network.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 你将必须使用随机正态分布来生成权重。然后你将传递输入和输出大小。最初，你使用随机值，因为它可以提高神经网络。
- en: You declare one-dimensional biases. You will initialize biases as zeros and
    initialize all variables as 0.1\. The dimension of it is 1 row and `out_size`
    the no of columns. Because you want to add the weights to the bias, the shape
    should be the same, so you use `out_size`.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 你声明一维偏差。你将偏差初始化为零，并将所有变量初始化为0.1。它的维度是1行和`out_size`列数。因为你想要将权重加到偏差上，所以形状应该是相同的，因此你使用`out_size`。
- en: 'For the operation or the compute process, you use matrix multiplication:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 对于操作或计算过程，你使用矩阵乘法：
- en: '[PRE29]'
  id: totrans-109
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: In the next section, you will review an important feature of TensorFlow known
    as TensorBoard, which is useful for viewing the graph as well as debugging.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，你将回顾TensorFlow的一个重要特性，即TensorBoard，它用于查看图以及调试。
- en: TensorBoard
  id: totrans-111
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: TensorBoard
- en: Let’s talk about TensorBoard. *TensorBoard* is a data visualization tool that
    is packaged within TensorFlow. When you are dealing with creating a network in
    TensorFlow, it’s composed of operations and tensors. When you feed data into the
    neural network, the data flows in through tensors performing operations, and finally
    getting an output.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来谈谈TensorBoard。*TensorBoard*是一个数据可视化工具，它包含在TensorFlow中。当你处理在TensorFlow中创建网络时，它由操作和张量组成。当你将数据输入到神经网络中，数据通过执行操作的张量流动，最终得到输出。
- en: TensorBoard was created to know the flow of tensors in a model. It helps in
    debugging and optimization. Let’s create some graphs and then show them in TensorBoard.
    The basic operations are addition and multiplication.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: TensorBoard是为了了解模型中张量的流动而创建的。它有助于调试和优化。让我们创建一些图表，然后在TensorBoard中显示它们。基本操作是加法和乘法。
