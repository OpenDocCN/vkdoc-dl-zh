- en: End-to-End Systems
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: End-to-end machine learning is the best approach for chatbots as we ingest the
    data through the chatbot and then score the test data. This type of machine learning
    helps in taking the decisions very faster for response that is very swift to communicate
    between user and the bot. One system is trained on one dataset. The chatbot makes
    no assumptions of the use cases and the dialogue and trains it on relevant data
    and have conversation of the data with user. Use Feed Forward Neural Network to
    implement it in Deep Learning.
  prefs: []
  type: TYPE_NORMAL
- en: Before explaining further, you need to know about recurrent neural networks.
  prefs: []
  type: TYPE_NORMAL
- en: Recurrent Neural Network
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '*Recurrent neural networks* (RNNs) are useful in learning scenarios based on
    natural language processing.'
  prefs: []
  type: TYPE_NORMAL
- en: Predicting the next word in a sequence is tough. That’s why we need to know
    the sequence of words prior to making a prediction.
  prefs: []
  type: TYPE_NORMAL
- en: RNNs are called *recurrent* because the same principle is applied to every element
    (phrase or a word) in a sequence, where the output is based upon previous computations.
  prefs: []
  type: TYPE_NORMAL
- en: To better understand RNNs, consider this example. Say you have a sentence of
    seven words. In an RNN, you’d have to break the neural network into seven different
    layers, with one layer for each word.
  prefs: []
  type: TYPE_NORMAL
- en: The most common RNNs are Long short-term memory networks (LSTMs).
  prefs: []
  type: TYPE_NORMAL
- en: LSTMs
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: To resolve long-term dependencies in RNNs, you need LSTMs. These networks are
    capable of learning long short-term dependencies in a sequence for better predictions
    of the output. Figure [5-30](#Fig30) shows a standard RNN with one layer.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_5_Chapter/457478_1_En_5_Fig30_HTML.jpg](../images/457478_1_En_5_Chapter/457478_1_En_5_Fig30_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-30
  prefs: []
  type: TYPE_NORMAL
- en: RNN
  prefs: []
  type: TYPE_NORMAL
- en: LSTMs contain four neural network layers in a network, as illustrated in Figure
    [5-31](#Fig31).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_5_Chapter/457478_1_En_5_Fig31_HTML.jpg](../images/457478_1_En_5_Chapter/457478_1_En_5_Fig31_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-31
  prefs: []
  type: TYPE_NORMAL
- en: LSTM with neural network layers
  prefs: []
  type: TYPE_NORMAL
- en: The key concept behind LSTMs are the cell states. Figure [5-32](#Fig32) shows
    the usage of cells.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_5_Chapter/457478_1_En_5_Fig32_HTML.jpg](../images/457478_1_En_5_Chapter/457478_1_En_5_Fig32_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-32
  prefs: []
  type: TYPE_NORMAL
- en: Using the cells. The cell states formulate the way the communication works
  prefs: []
  type: TYPE_NORMAL
- en: The Sigmoid layer in the LSTM outputs a value between 0 and 1\. A value of 1
    means you let all information go through it. A value of 0 means that nothing goes
    through it. Knowing these concepts, you can move along to the Seq2seq model.
  prefs: []
  type: TYPE_NORMAL
- en: Seq2seq model has
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE66]'
  prefs: []
  type: TYPE_PRE
- en: The flow is shown in Figure [5-33](#Fig33).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_5_Chapter/457478_1_En_5_Fig33_HTML.jpg](../images/457478_1_En_5_Chapter/457478_1_En_5_Fig33_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-33
  prefs: []
  type: TYPE_NORMAL
- en: Encoder-Decoder model
  prefs: []
  type: TYPE_NORMAL
- en: We generally use embeddings. So to recognize a sentence after that for doing
    prediction we have to make a vocabulary of words that are to be fed to the model
    to be read. Figure [5-34](#Fig34) shows the message process.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_5_Chapter/457478_1_En_5_Fig34_HTML.jpg](../images/457478_1_En_5_Chapter/457478_1_En_5_Fig34_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-34
  prefs: []
  type: TYPE_NORMAL
- en: Message output process
  prefs: []
  type: TYPE_NORMAL
- en: 'Seq2seq vocabulary works in the following way:'
  prefs: []
  type: TYPE_NORMAL
- en: '<PAD>: During training, you need to feed your examples to the network in batches.
    The inputs in these batches all need to be the same width for the network to do
    its calculation. Our examples, however, are not of the same length. That’s why
    you’ll need to pad shorter inputs to bring them to the same width of the batch.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '<EOS>: This is another necessity of batching as well, but more on the decoder
    side. It allows us to tell the decoder where a sentence ends, and it allows the
    decoder to indicate the same thing in its outputs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '<UNK>: If you’re training your model on real data, you’ll find you can vastly
    improve the resource efficiency of your model by ignoring words that don’t show
    up often enough in your vocabulary to warrant consideration. We replace those
    with <UNK>.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '<GO>: This is the input to the first time-step of the decoder to let the decoder
    know when to start generating output.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
