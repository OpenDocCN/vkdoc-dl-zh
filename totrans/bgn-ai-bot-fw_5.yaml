  zh: 训练过程
- en: After training is finished, you will get a message. Figure [5-28](#Fig28) shows
    that the training process is complete.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 训练完成后，你将收到一条消息。图 [5-28](#Fig28) 显示训练过程已完成。
- en: '![../images/457478_1_En_5_Chapter/457478_1_En_5_Fig28_HTML.jpg](../images/457478_1_En_5_Chapter/457478_1_En_5_Fig28_HTML.jpg)'
  id: totrans-315
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_5_Chapter/457478_1_En_5_Fig28_HTML.jpg](../images/457478_1_En_5_Chapter/457478_1_En_5_Fig28_HTML.jpg)'
- en: Figure 5-28
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-28
- en: The training process is complete
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 训练过程已完成
- en: 'Use `inference.py` to interact directly with the bot:'
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 `inference.py` 直接与机器人交互：
- en: '[PRE65]'
  id: totrans-319
  prefs: []
  type: TYPE_PRE
  zh: '[PRE65]'
- en: Figure [5-29](#Fig29) shows the inference models.
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [5-29](#Fig29) 展示了推理模型。
- en: '![../images/457478_1_En_5_Chapter/457478_1_En_5_Fig29_HTML.jpg](../images/457478_1_En_5_Chapter/457478_1_En_5_Fig29_HTML.jpg)'
  id: totrans-321
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_5_Chapter/457478_1_En_5_Fig29_HTML.jpg](../images/457478_1_En_5_Chapter/457478_1_En_5_Fig29_HTML.jpg)'
- en: Figure 5-29
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-29
- en: Inference models
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 推理模型
- en: End-to-End Systems
  id: totrans-324
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 端到端系统
- en: End-to-end machine learning is the best approach for chatbots as we ingest the
    data through the chatbot and then score the test data. This type of machine learning
    helps in taking the decisions very faster for response that is very swift to communicate
    between user and the bot. One system is trained on one dataset. The chatbot makes
    no assumptions of the use cases and the dialogue and trains it on relevant data
    and have conversation of the data with user. Use Feed Forward Neural Network to
    implement it in Deep Learning.
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 端到端机器学习是聊天机器人的最佳方法，因为我们通过聊天机器人摄取数据，然后对测试数据进行评分。这种类型的机器学习有助于快速做出响应决策，以便用户和机器人之间快速通信。一个系统在一个数据集上训练。聊天机器人不假设用例和对话，它基于相关数据训练，并与用户进行数据对话。使用前馈神经网络在深度学习中实现它。
- en: Before explaining further, you need to know about recurrent neural networks.
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 在进一步解释之前，你需要了解循环神经网络。
- en: Recurrent Neural Network
  id: totrans-327
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 循环神经网络
- en: '*Recurrent neural networks* (RNNs) are useful in learning scenarios based on
    natural language processing.'
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: '*循环神经网络*（RNNs）在基于自然语言处理的学习场景中非常有用。'
- en: Predicting the next word in a sequence is tough. That’s why we need to know
    the sequence of words prior to making a prediction.
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 预测序列中的下一个单词是困难的。这就是为什么我们需要知道预测之前的单词序列。
- en: RNNs are called *recurrent* because the same principle is applied to every element
    (phrase or a word) in a sequence, where the output is based upon previous computations.
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: RNN 被称为 *循环*，因为相同的原理应用于序列中的每个元素（短语或单词），其中输出基于之前的计算。
- en: To better understand RNNs, consider this example. Say you have a sentence of
    seven words. In an RNN, you’d have to break the neural network into seven different
    layers, with one layer for each word.
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更好地理解 RNNs，考虑以下示例。假设你有一个包含七个单词的句子。在 RNN 中，你需要将神经网络分解成七个不同的层，每个单词对应一层。
- en: The most common RNNs are Long short-term memory networks (LSTMs).
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 最常见的 RNN 是长短期记忆网络（LSTMs）。
- en: LSTMs
  id: totrans-333
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: LSTM
- en: To resolve long-term dependencies in RNNs, you need LSTMs. These networks are
    capable of learning long short-term dependencies in a sequence for better predictions
    of the output. Figure [5-30](#Fig30) shows a standard RNN with one layer.
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决 RNN 中的长期依赖，你需要 LSTM。这些网络能够学习序列中的长期短期依赖，以更好地预测输出。图 [5-30](#Fig30) 展示了一个具有一层标准
    RNN。
- en: '![../images/457478_1_En_5_Chapter/457478_1_En_5_Fig30_HTML.jpg](../images/457478_1_En_5_Chapter/457478_1_En_5_Fig30_HTML.jpg)'
  id: totrans-335
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_5_Chapter/457478_1_En_5_Fig30_HTML.jpg](../images/457478_1_En_5_Chapter/457478_1_En_5_Fig30_HTML.jpg)'
- en: Figure 5-30
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-30
- en: RNN
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: RNN
- en: LSTMs contain four neural network layers in a network, as illustrated in Figure
    [5-31](#Fig31).
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 如图 [5-31](#Fig31) 所示，LSTMs 在网络中包含四个神经网络层。
- en: '![../images/457478_1_En_5_Chapter/457478_1_En_5_Fig31_HTML.jpg](../images/457478_1_En_5_Chapter/457478_1_En_5_Fig31_HTML.jpg)'
  id: totrans-339
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_5_Chapter/457478_1_En_5_Fig31_HTML.jpg](../images/457478_1_En_5_Chapter/457478_1_En_5_Fig31_HTML.jpg)'
- en: Figure 5-31
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-31
- en: LSTM with neural network layers
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 带有神经网络层的 LSTM
- en: The key concept behind LSTMs are the cell states. Figure [5-32](#Fig32) shows
    the usage of cells.
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: LSTM 的关键概念是单元格状态。图 [5-32](#Fig32) 展示了单元格的使用。
- en: '![../images/457478_1_En_5_Chapter/457478_1_En_5_Fig32_HTML.jpg](../images/457478_1_En_5_Chapter/457478_1_En_5_Fig32_HTML.jpg)'
  id: totrans-343
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_5_Chapter/457478_1_En_5_Fig32_HTML.jpg](../images/457478_1_En_5_Chapter/457478_1_En_5_Fig32_HTML.jpg)'
- en: Figure 5-32
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-32
- en: Using the cells. The cell states formulate the way the communication works
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 使用单元格。单元格状态定义了通信的方式
- en: The Sigmoid layer in the LSTM outputs a value between 0 and 1\. A value of 1
    means you let all information go through it. A value of 0 means that nothing goes
    through it. Knowing these concepts, you can move along to the Seq2seq model.
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: LSTM 输出的 Sigmoid 层在 0 和 1 之间输出一个值。值为 1 表示您让所有信息通过它。值为 0 表示没有任何信息通过它。了解这些概念后，您可以继续了解
    Seq2seq 模型。
- en: Seq2seq model has
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: Seq2seq 模型具有
- en: '[PRE66]'
  id: totrans-348
  prefs: []
  type: TYPE_PRE
  zh: '[PRE66]'
- en: The flow is shown in Figure [5-33](#Fig33).
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 流程如图 [5-33](#Fig33) 所示。
- en: '![../images/457478_1_En_5_Chapter/457478_1_En_5_Fig33_HTML.jpg](../images/457478_1_En_5_Chapter/457478_1_En_5_Fig33_HTML.jpg)'
  id: totrans-350
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_5_Chapter/457478_1_En_5_Fig33_HTML.jpg](../images/457478_1_En_5_Chapter/457478_1_En_5_Fig33_HTML.jpg)'
- en: Figure 5-33
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-33
- en: Encoder-Decoder model
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 编码器-解码器模型
- en: We generally use embeddings. So to recognize a sentence after that for doing
    prediction we have to make a vocabulary of words that are to be fed to the model
    to be read. Figure [5-34](#Fig34) shows the message process.
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通常使用嵌入。因此，为了在预测后识别句子，我们必须创建一个词汇表，将单词输入到模型中进行读取。图 [5-34](#Fig34) 展示了消息处理过程。
- en: '![../images/457478_1_En_5_Chapter/457478_1_En_5_Fig34_HTML.jpg](../images/457478_1_En_5_Chapter/457478_1_En_5_Fig34_HTML.jpg)'
  id: totrans-354
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_5_Chapter/457478_1_En_5_Fig34_HTML.jpg](../images/457478_1_En_5_Chapter/457478_1_En_5_Fig34_HTML.jpg)'
- en: Figure 5-34
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-34
- en: Message output process
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 消息输出过程
- en: 'Seq2seq vocabulary works in the following way:'
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: Seq2seq 词汇表按以下方式工作：
- en: '<PAD>: During training, you need to feed your examples to the network in batches.
    The inputs in these batches all need to be the same width for the network to do
    its calculation. Our examples, however, are not of the same length. That’s why
    you’ll need to pad shorter inputs to bring them to the same width of the batch.'
  id: totrans-358
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`<PAD>`：在训练过程中，您需要将示例批量输入到网络中。这些批量中的所有输入都需要与网络的计算宽度相同。然而，我们的示例长度并不相同。这就是为什么您需要填充较短的输入，以使它们达到与批量相同的宽度。'
- en: '<EOS>: This is another necessity of batching as well, but more on the decoder
    side. It allows us to tell the decoder where a sentence ends, and it allows the
    decoder to indicate the same thing in its outputs.'
  id: totrans-359
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`<EOS>`：这是批处理过程中的另一个必要性，但更多地是在解码器一侧。它允许我们告诉解码器句子在哪里结束，并允许解码器在其输出中指示相同的事情。'
- en: '<UNK>: If you’re training your model on real data, you’ll find you can vastly
    improve the resource efficiency of your model by ignoring words that don’t show
    up often enough in your vocabulary to warrant consideration. We replace those
    with <UNK>.'
  id: totrans-360
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`<UNK>`：如果您在真实数据上训练模型，您会发现通过忽略在词汇表中出现频率不够高的单词，可以大大提高模型的资源效率。我们将这些替换为 `<UNK>`。'
- en: '<GO>: This is the input to the first time-step of the decoder to let the decoder
    know when to start generating output.'
  id: totrans-361
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`<GO>`：这是解码器第一个时间步的输入，让解码器知道何时开始生成输出。'
- en: Working with a Seq2seq Bot
  id: totrans-362
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 与 Seq2seq 机器人一起工作
- en: In this section, you will see how to work with a Seq2seq bot. We will clone
    or copy one of the GitHub repo locally and then run the bot accordingly.
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，您将了解如何与 Seq2seq 机器人一起工作。我们将克隆或复制 GitHub 仓库中的一个，然后在本地运行该机器人。
- en: 'First you need to clone the repo to get inside the folder:'
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，您需要克隆仓库以进入文件夹：
- en: '[`https://github.com/llSourcell/tensorflow_chatbot`](https://github.com/llSourcell/tensorflow_chatbot)'
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: '[`https://github.com/llSourcell/tensorflow_chatbot`](https://github.com/llSourcell/tensorflow_chatbot)'
- en: 'Use this command to prepare the data:'
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 使用此命令准备数据：
- en: '[PRE67]'
  id: totrans-367
  prefs: []
  type: TYPE_PRE
  zh: '[PRE67]'
- en: 'Then open the `seq2seq.ini` file and change the mode to `training as`. Use
    this command:'
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: 然后打开 `seq2seq.ini` 文件，将模式更改为 `training as`。使用此命令：
- en: '[PRE68]'
  id: totrans-369
  prefs: []
  type: TYPE_PRE
  zh: '[PRE68]'
- en: Figure [5-35](#Fig35) shows the training process.
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 图[5-35](#Fig35)显示了训练过程。
- en: '![../images/457478_1_En_5_Chapter/457478_1_En_5_Fig35_HTML.jpg](../images/457478_1_En_5_Chapter/457478_1_En_5_Fig35_HTML.jpg)'
  id: totrans-371
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_5_Chapter/457478_1_En_5_Fig35_HTML.jpg](../images/457478_1_En_5_Chapter/457478_1_En_5_Fig35_HTML.jpg)'
- en: Figure 5-35
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-35
- en: Training process
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 训练过程
- en: After training, go back into the `seq2seq.ini file` and update the mode to testing.
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 训练后，返回到`seq2seq.ini文件`并更新模式为测试。
- en: 'When you start testing, The bot will workaround find the checkpoints from training
    and start communicating, as shown here and in Figure [5-36](#Fig36):'
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 当你开始测试时，机器人将绕过找到训练中的检查点并开始通信，如图[5-36](#Fig36)所示：
- en: '![../images/457478_1_En_5_Chapter/457478_1_En_5_Fig36_HTML.jpg](../images/457478_1_En_5_Chapter/457478_1_En_5_Fig36_HTML.jpg)'
  id: totrans-376
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_5_Chapter/457478_1_En_5_Fig36_HTML.jpg](../images/457478_1_En_5_Chapter/457478_1_En_5_Fig36_HTML.jpg)'
- en: Figure 5-36
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-36
- en: Testing the bot
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: 测试机器人
- en: '[PRE69]'
  id: totrans-379
  prefs: []
  type: TYPE_PRE
  zh: '[PRE69]'
- en: Instructions for Updating
  id: totrans-380
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 更新说明
- en: Future major versions of TensorFlow will allow gradients to flow into the labels
    input on backprop by default. There are some expected changes in the later version
    of Tensorflow.
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 未来TensorFlow的主要版本将默认允许梯度在反向传播时流入标签输入。Tensorflow的后续版本中可能会有一些预期的变化。
- en: See `tf.nn.softmax_cross_entropy_with_logits_v2`.
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 查看`tf.nn.softmax_cross_entropy_with_logits_v2`。
- en: Reading model parameters from `working_dir/seq2seq.ckpt-4200`. We are using
    the `ckpt` file created after training to see how the trained model works
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 从`working_dir/seq2seq.ckpt-4200`读取模型参数。我们使用训练后创建的`ckpt`文件来查看训练好的模型如何工作。
- en: '[PRE70]'
  id: totrans-384
  prefs: []
  type: TYPE_PRE
  zh: '[PRE70]'
- en: Install NVIDIA’s card on your computer along with drivers.
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的计算机上安装NVIDIA的显卡及其驱动程序。
- en: Download and install CUDA.
  id: totrans-386
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 下载并安装CUDA。
- en: Download and “install” cuDNN.
  id: totrans-387
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 下载并“安装”cuDNN。
- en: Uninstall TensorFlow, and install Tensorflow GPU.
  id: totrans-388
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 卸载TensorFlow，并安装Tensorflow GPU。
- en: Update the `%PATH%` on the system.
  id: totrans-389
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 更新系统的`%PATH%`。
- en: Verify installation.
  id: totrans-390
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 验证安装。
- en: Download and Install CUDA
  id: totrans-391
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 下载并安装CUDA
- en: CUDA has different versions. You need CUDA version 8.0\. I have 8.0, 9.0, and
    9.1 installed and set up identically to this guide for each version. Stick with
    8.0 for now to get that working. I set up the other versions to prepare for the
    possibility of TensorFlow GPU supporting other CUDA versions.
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: CUDA有不同的版本。你需要CUDA版本8.0。我安装了8.0、9.0和9.1，并且为每个版本都按照本指南进行了设置。现在坚持使用8.0以使其工作。我设置了其他版本以备TensorFlow
    GPU支持其他CUDA版本的可能性。
- en: 'Here are the steps to download and install CUDA:'
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是从下载和安装CUDA的步骤：
- en: Go to [CUDA Toolkit downloads](https://developer.nvidia.com/cuda-downloads).
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 前往[CUDA Toolkit下载](https://developer.nvidia.com/cuda-downloads)。
- en: After CUDA downloads, run the downloaded file and install it with Express Settings.
    This might take a while and flicker the screen (because of the graphics card).
  id: totrans-395
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在CUDA下载后，运行下载的文件，并使用Express Settings安装它。这可能需要一段时间，并且屏幕可能会闪烁（因为显卡）。
- en: 'Verify that you have the following path on your system:'
  id: totrans-396
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 验证你的系统上是否有以下路径：
- en: '[PRE71]'
  id: totrans-397
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE71]'
- en: 'OS: Windows'
  id: totrans-398
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 操作系统：Windows
- en: 'Architecture: x86_64'
  id: totrans-399
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 架构：x86_64
- en: 'Version: 10'
  id: totrans-400
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 版本：10
- en: Scroll down to Legacy Releases.
  id: totrans-401
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
