- en: Keras Overview
  id: totrans-179
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Keras 概述
- en: This section introduces a front-end wrapper to a deep learning framework known
    as Keras. Then we will work along with how we implement Keras using a Jupyter
    Notebook and creating chatbots with it.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 本节介绍了一个名为 Keras 的深度学习框架的前端包装器。然后我们将一起探讨如何使用 Jupyter Notebook 实现 Keras 并用它创建聊天机器人。
- en: Keras is front-end wrapper that can be used with lots of deep learning frameworks
    at the back end.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: Keras 是一个前端包装器，可以与许多后端深度学习框架一起使用。
- en: 'Keras has already been built up neural network function that you can use to
    get the neural networks easily and fast. It maintains the following:'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: Keras 已经构建了神经网络函数，你可以用它轻松快速地获取神经网络。它维护以下内容：
- en: Modularity
  id: totrans-183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模块化
- en: Minimalism
  id: totrans-184
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 极简主义
- en: Extensibility
  id: totrans-185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可扩展性
- en: Python nativeness
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Python 本地化
- en: As a basic starting point for Keras, you will run a “Hello World” example. With
    respect to machine learning and deep learning, a Hello World example is different.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 作为 Keras 的基本起点，你将运行一个“Hello World”示例。与机器学习和深度学习相比，“Hello World”示例有所不同。
