- en: The feature space is incredibly useful in a modeling concept because we can
    think of models as finding spatial relationships between points in space. For
    instance, certain binary classification models that attach either a “0” or “1”
    label to each data point can be thought of as conceptually drawing a hyperplane
    to separate points in space (Figure [1-25](#Fig25)). (Learn more about these types
    of models in the “Algorithms” section of this chapter.)
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig25_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A three-dimensional rectangular plane plotted with 5 points.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-25
  prefs: []
  type: TYPE_NORMAL
- en: Example hyperplane separation within the feature space containing the data in
    Table [1-1](#Tab1)
  prefs: []
  type: TYPE_NORMAL
- en: With the feature space concept, we can understand how the model behaves generally
    with any input, rather than being restricted to the data points available.
  prefs: []
  type: TYPE_NORMAL
- en: Feature spaces in low dimensionality are relatively tame to model and understand.
    However, the mathematics of high-dimensional spaces becomes bizarre very quickly,
    often contradicting our intuition – well-honed to the low dimensions of our existence
    but much less adept at understanding the dynamics of higher dimensions. To demonstrate
    this, let us consider a simpler variation on a common but quite mathematically
    inclined illustration of bizarre high-dimensional behavior by exploring how the
    volume of a hypercube changes with dimensionality.
  prefs: []
  type: TYPE_NORMAL
- en: A hypercube is a generalization of a three-dimensional cube to all dimensions.
    A two-dimensional hypercube is a square, and a one-dimensional hypercube is a
    line segment. We can define a hypercube with one corner at the origin and side
    length *l* as consisting of the entire set of *n-*dimensional points of form (*x*[1],
    *x*[2], ..., *x*[*n*]) that satisfy 0 ≤ *x*[1] ≤ *l*, 0 ≤ *x*[2] ≤ *l*, ..., 0 ≤ *x*[*n*] ≤ *l*.
    That is, the point is constrained within a certain range for each dimension (the
    length of the range being the same), independent of all other dimensions. Working
    with hypercubes makes for simpler mathematics, compared with other geometric generalizations
    like hyperspheres, which are defined by interactions between axes/dimensions.
  prefs: []
  type: TYPE_NORMAL
- en: We can draw a “smaller” hypercube within the original hypercube such that the
    side length of the smaller hypercube is 90% that of the original. We can sample
    points with uniform randomness throughout the space of the original hypercube
    and count how many fall in the inner hypercube to obtain an approximation for
    the volume. Examples of the smaller and larger hypercubes are shown in Figure
    [1-26](#Fig26) for first, second, and third dimensions.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig26_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Three scatterplots display two colored points for inner and outer hypercubes.
    The plots are along a horizontal line, on the left; across a two-dimensional plane,
    on the middle; and across a three-dimensional plane, on the right.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-26
  prefs: []
  type: TYPE_NORMAL
- en: Inner and outer hypercubes, visualized in one-, two-, and three-dimensional
    feature spaces
  prefs: []
  type: TYPE_NORMAL
- en: To produce the visualizations, we will need the NumPy and matplotlib libraries,
    which can be imported via import `numpy as np` and `import matplotlib.pyplot as
    plt`, respectively. This code will become the basis upon which we generalize to
    hypercubes in higher dimensions (Listings [1-8](#PC8), [1-9](#PC9), [1-10](#PC10)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: We want to track the percentage of “outside points” (i.e., sampled points that
    fall *outside* the smaller hypercube) out of the total points as the dimensionality
    of the space increases or the difference in volumes between the smaller and larger
    hypercubes (Figure [1-27](#Fig27)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig27_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A graph plots the percentage of outside points to total points against the dimensionality
    of the hypercube. It displays a curve that rises and extends horizontally.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-27
  prefs: []
  type: TYPE_NORMAL
- en: Outside-points-to-total-points ratio, plotted against the dimensionality of
    the hypercube used in the ratio calculation. Jaggedness or noise is due to randomness
    in sampling
  prefs: []
  type: TYPE_NORMAL
- en: 'At low dimensionality, the ratio seems reasonable and confirms our intuition:
    0.01 in one dimension, 0.01 in two dimensions, 0.04 in three dimensions, 0.05
    in five dimensions. The inside hypercube has a side length that is 90% that of
    the outer hypercube – it seems more than reasonable to expect the large majority
    of points to fall within the inner hypercube and thus for a low outside-points-to-total-points
    ratio.'
  prefs: []
  type: TYPE_NORMAL
- en: However, the ratio for a 200-dimensional hypercube is about 0.85, and at 400
    dimensions it is practically 1\. This means that in a 400-dimensional hypercube,
    *essentially every single sampled point falls outside an inner hypercube defined
    with 90%-long of a side length of that of the outer hypercube.*
  prefs: []
  type: TYPE_NORMAL
- en: A similar result is obtained with hyperspheres. A common interpretation is that
    practically all of a very high-dimensional orange’s mass is in the peel, not the
    pulp!
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: You may be wondering we sample points and count how many land “outside” the
    inner hypercube rather than using simple mathematical volume formulas to determine
    the proportion. While the latter is one approach, sampling allows us to generalize
    findings to more complex shapes, in which defining the *boundary* of the shape
    is simple but evaluating the *volume* is much more difficult – like hyperspheres.
  prefs: []
  type: TYPE_NORMAL
- en: There are many ways to make sense of oddities and unintuitive behavior in high-dimensional
    space. For one, the math for this particular example of hypercubes supports the
    observations. Given dimensionality of the hypercube *d*, outer hypercube side
    length *s*, and the proportionality constant *p* representing the ratio of the
    inner hypercube side length to the outer hypercube side length, we can calculate
    the proportion of volumes as
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \textrm{Volume}\ \textrm{Proportion}=\frac{\textrm{inner}\ \textrm{volume}}{\textrm{outer}\
    \textrm{volume}}=\frac{{\left(p\cdotp s\right)}^d}{s^d}={p}^d $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equc.png)'
  prefs: []
  type: TYPE_IMG
- en: Given that 0 < *p* < 1, we have that ![$$ \underset{d\to \infty }{\lim }{p}^d=0
    $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_IEq5.png) – any
    fractional value between 0 and 1 that is repeatedly exponentiated will inevitably
    decrease toward zero.
  prefs: []
  type: TYPE_NORMAL
- en: A similar understanding can be revealed by working through the implementation
    for generating the curve (Listing [1-11](#PC11)). At each point, we loop through
    each dimension of that point and randomly generate a value for that dimension.
    If that randomly generated value fulfills the condition that it must fall within
    a certain range, it “passes” for that dimension, and we move on to evaluating
    the next dimension. If it does not “pass” (i.e., it falls outside the “inside”
    hypercube side length), we mark the point as being an “outside” point and evaluate
    the next point.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: As the dimensionality of sampled points increases, the condition for a point
    qualifying as an “outside” point gets evaluated more times. This is equivalent
    to exponentiating a value *p* between 0 and 1 repeatedly. Thus, more uniformly
    sampled points satisfy the “outside” point qualifications and thus are distributed
    near the “outsides” in higher-dimensional spaces. When we define surfaces in high-dimensional
    spaces, we must take into account this warping effect. The “peel” of the high-dimensional
    orange covers becomes so large in high dimensions that it outranks the “pulp”
    in volumes.
  prefs: []
  type: TYPE_NORMAL
- en: This phenomenon, along with other mathematical and empirical observations on
    high-dimensional spaces, is known collectively as the “Curse of Dimensionality.”
    Simply put, the density/distribution of points in high-dimensional spaces is much
    different from that of low-dimensional spaces. This has important implications
    for how distance is measured.
  prefs: []
  type: TYPE_NORMAL
- en: Euclidean distance, or the L2 norm, between two points (*a*[1], *a*[2], ...,
    *a*[*n*]) and (*b*[1], *b*[2], ..., *b*[*n*]) is defined as![$$ \sqrt{{\left({a}_1-{b}_1\right)}^2+{\left({a}_2-{b}_2\right)}^2+\dots
    +{\left({a}_n-{b}_n\right)}^2} $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_IEq6.png).
    It is our most “intuitive” or native sense of the distance between twopoints.
    However, in high-dimensional spaces, Euclidean distance becomes so diluted and
    “blurry” that it ceases to become useful.
  prefs: []
  type: TYPE_NORMAL
- en: 'Consider a unit hypercube with *n* dimensions. We will observe how the difference
    between the *second longest distance and the longest* distance between two corners
    of the hypercube changes as *n* → ∞ (Listing [1-12](#PC12), Figure [1-28](#Fig28)).
    Beginning with the origin point (0, 0, ..., 0), the farthest point can be found
    by “flipping” all the dimensions from 0 to 1: (1, 1, ..., 1). The second farthest
    point can be found by arbitrarily “flipping” all the dimensions from 0 to 1 except
    one: (0, 1, ..., 1). The distance from the origin to the farthest pointis ![$$
    \sqrt{\underset{n}{\underbrace{{\left(0-1\right)}^2+{\left(0-1\right)}^2+\dots
    +{\left(0-1\right)}^2}}}=\sqrt{n} $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_IEq7.png),
    whereas the distance from the origin to the closest point is![$$ \sqrt{{\left(0-0\right)}^2+\underset{n-1}{\underbrace{{\left(0-1\right)}^2+{\left(0-1\right)}^2+\dots
    +{\left(0-1\right)}^2}}} $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_IEq8.png)
    ![$$ =\sqrt{n-1} $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_IEq9.png).
    The difference between the two distances is ![$$ \sqrt{n}-\sqrt{n-1} $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_IEq10.png).'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig28_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph plots distance versus dimensionality. It displays a curve that
    starts at (3, 1.0) and dips steeply and moves to the right, and extends almost
    horizontally. Values are approximated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-28
  prefs: []
  type: TYPE_NORMAL
- en: Difference between the distance between the origin and the farthest point on
    the hypercube and the distance between the origin and the second farthest point
    on the hypercube, across dimensionality n
  prefs: []
  type: TYPE_NORMAL
- en: We can find ![$$ \underset{n\to \infty }{\lim}\sqrt{n}-\sqrt{n-1}=\underset{n\to
    \infty }{\lim}\frac{n-\left(n-1\right)}{\sqrt{n}+\sqrt{n-1}}=\underset{n\to \infty
    }{\lim}\frac{1}{\sqrt{n}+\sqrt{n-1}}\to \frac{1}{\infty}\to 0 $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_IEq11.png).
    Thus, as the dimensionalityof the hypercube increases, the two neighboring points
    on the farthest and second farthest corners of the hypercube become essentially
    the same distance from the origin. In fact, the distances between the origin and
    *all other corners* approach the same value in higher dimensions, as the generalization
    ![$$ \underset{n\to \infty }{\lim}\sqrt{n}-\sqrt{n-k}=0 $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_IEq12.png)
    is true in our context (*k* < *n*, representing the distance between the origin
    and the *k* + 1th farthest corner). This has the effect of polarizing and warping
    the distribution of distance in traditionally intuitively defined geometric shapes.
  prefs: []
  type: TYPE_NORMAL
- en: While Euclidean is our most intuitive sense of geometric distance, we can generalize
    it to differentnorms (Table [1-2](#Tab2), Listing [1-13](#PC13), Figure [1-29](#Fig29)).
    The *k*th norm distance is ![$$ \sqrt[k]{\sum \limits_{i=1}^n{\left|{a}_i-{b}_i\right|}^k}
    $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_IEq13.png). *Manhattan
    distance*uses the L1 norm (*k* = 1) and behaves as a sum of the absolute differences
    in each dimension. Its name comes from the grid-like layout of Manhattan, New
    York – we measure distance strictly along paths parallel to the dimensions, just
    like navigating the blocks of a bustling metropolis. *Chebyshev distance*, on
    the other extreme, uses the L-infinity norm (*k* = ∞), which returns only the
    longest distance of any dimension, since raising the largest difference term to
    the “infinity power” will “outweigh” all other terms. Chebyshev distance is generally
    used in contexts in which computing distances of other norms is too costly (i.e.,
    only very high-dimensional spaces).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig29_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph plots the L n distance between (0, 0) and (2, 1) against the distance
    norm. It displays a curve that starts at (1.4, 5.8), dips steeply, and runs horizontally.
    Values are estimated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-29
  prefs: []
  type: TYPE_NORMAL
- en: Distance between (0, 0) and (2, 1) calculated with norm n
  prefs: []
  type: TYPE_NORMAL
- en: Table 1-2
  prefs: []
  type: TYPE_NORMAL
- en: Sampled values for the distance between points (0,0) and (2,1) in different
    norms
  prefs: []
  type: TYPE_NORMAL
- en: '| Norm | Distance Between (0, 0) and (2, 1) |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| ![$$ \frac{1}{2} $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_IEq14.png)
    | 5.83 |'
  prefs: []
  type: TYPE_TB
- en: '| 1 (Manhattan) | 3 |'
  prefs: []
  type: TYPE_TB
- en: '| ![$$ \frac{3}{2} $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_IEq15.png)
    | 2.45 |'
  prefs: []
  type: TYPE_TB
- en: '| 2 (Euclidean) | 2.24 |'
  prefs: []
  type: TYPE_TB
- en: '| 3 | 2.08 |'
  prefs: []
  type: TYPE_TB
- en: '| 4 | 2.03 |'
  prefs: []
  type: TYPE_TB
- en: '| 5 | 2.01 |'
  prefs: []
  type: TYPE_TB
- en: '| 10 | 2.0002 |'
  prefs: []
  type: TYPE_TB
- en: '| ∞ (Chebyshev) | 2 |'
  prefs: []
  type: TYPE_TB
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: Norms other than L2 become useful in high-dimensional spaces since they can
    better “model” or “work with” the nature of distance in these environments. As
    you’ll see in the later discussion of algorithms, many machine learning models
    require a defined definition of “distance” – which should not necessarily be Euclidean
    in the high-dimensional spaces they often operate in (see “Algorithms” ➤ “K-Nearest
    Neighbors”).
  prefs: []
  type: TYPE_NORMAL
- en: The Curse of Dimensionality is a powerful theoretical tool that will be especially
    relevant when we think about how neural networks – which are indisputably the
    highest-dimensional machine learning algorithms to be in popular use – generalize
    and learn.
  prefs: []
  type: TYPE_NORMAL
- en: Optimization and Gradient Descent
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Supervised machine learning models (i.e., models that predict an output given
    an input) “learn” by *optimizing* their *parameters*. Every algorithm has a set
    of parameters that determine how it works with, or “interprets,” the inputs to
    produce an output. For instance, the parameters of a Simple Linear Regression
    model *f*(*x*[1], *x*[2], *x*[3]) = *β*[0] + *β*[1]*x*[1] + *β*[2]*x*[2] + *β*[3]*x*[3]
    are {*β*[0], *β*[1], *β*[2], *β*[3]}. The specific values of each of the parameters
    in this very rudimentary machine learning model determine how heavy a weight each
    of the inputs {*x*[1], *x*[2], *x*[3]} has on the final output.
  prefs: []
  type: TYPE_NORMAL
- en: In order to find the “best” set of parameters, we first need to define what
    “best” means. A *loss function* takes in two inputs – the predicted output (from
    the model) and the true output (the ideal expectation, the ground truth) – and
    returns a number indicating how “good” the model’s performance is. (More complex
    loss functions can consider more than these two primary inputs.) Since “loss”
    is roughly equivalent with “error,” smaller is better. We’ll further solidify
    our understanding of loss functions in the following “Metrics and Evaluation”
    section.
  prefs: []
  type: TYPE_NORMAL
- en: 'When optimizing, models generally operate by the following sequence of steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Parameters begin initialized with random values. Depending on what *initialization
    schema/strategy* is used, parameters can be all set to zero, randomly pulled from
    a normal distribution, or initialized via some other process. Sometimes statistics
    or domain knowledge, for instance, can provide initialization values.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The model’s loss is evaluated via the loss function.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Depending on how poorly the model performs (as indicated via the loss), the
    *optimization algorithm* makes changes to the parameters.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Steps 2 and 3 are repeated several times (ranging from about a dozen iterations
    for simple problems to millions of loops for more complex ones) until a stopping
    condition is met. This condition can be counter-based (a certain quantity of iterations
    has been met), time-based (*x* hours have elapsed since the beginning of training),
    or performance-based (the model has obtained a certain satisfactory validation
    score).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Conceptually, we can understand this process of beginning from a bad “guess”
    and iteratively improving the parameter set in response to feedback given by the
    loss function via the *loss landscape*. The loss landscape is an *n*+1-dimensional
    space, in which *n* is the number of parameters in the model. The landscape associates
    each possible combination of parameter values a model can take on (the *n* dimensions)
    with the loss a model with that set of parameters would incur (the additional
    dimension).
  prefs: []
  type: TYPE_NORMAL
- en: For instance, the loss landscape visualized in Figure [1-30](#Fig30) shows that
    a parameter value of 4 in the hypothetical one-parameter model it represents would
    incur a loss slightly less than 2 (units don’t necessarily matter here; what is
    important is comparing higher/lower losses). It also demonstrates that the optimal
    parameter value for this model is around –1.5, because it minimizes the loss (this
    location is marked with an “X”).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig30_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph plots loss against parameter value and depicts a curve that oscillates
    irregularly. X is marked on the curve at the point (negative 1.5, 0.25). Values
    are estimated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-30
  prefs: []
  type: TYPE_NORMAL
- en: Example loss landscape with global minimum (ideal solution) marked
  prefs: []
  type: TYPE_NORMAL
- en: During optimization, we can think of the model as “traveling through” the loss
    landscape, seeking to find the place of lowest elevation (Figure [1-31](#Fig31)).
    Every time it evaluates its error via the loss function (step 2), the model is
    gauging how “high” in the landscape it is. Every time it makes an update to its
    parameters (step 3), it is changing its position in the landscape with the goal
    of eventually ending up in the *global* *minimum*, or the point in the loss landscape
    with the lowest loss.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig31_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A line graph plots loss against parameter value. It has a curve that oscillates
    unevenly and arrows along it that lead to the point X at (negative 1.5, 0.25).
    Values are approximated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-31
  prefs: []
  type: TYPE_NORMAL
- en: Example descent from an initial parameter value of around 5.5 to the ideal solution
    of a parameter value around –1.5
  prefs: []
  type: TYPE_NORMAL
- en: In deep learning, the code and math that determines the update strategy (i.e.,
    how the model changes its position within the landscape) is known as the *optimizer*.
    Multiple different types of optimizers exist, with different strengths and weaknesses.
  prefs: []
  type: TYPE_NORMAL
- en: The most popular framework for optimization in deep learning is *gradient descent*.
    The fundamental idea of gradient descent is to use the *gradient*, or the derivative,
    of the function we’re trying to minimize in order to determine which direction
    to move in. If the derivative at the current location is *positive*, then that
    means that moving forward will increase the cost function, whereas moving backward
    will decrease the cost function. On the other hand, if the derivative is negative,
    then moving forward will decrease the cost function, whereas moving backward will
    increase it. Since the goal is to decrease the cost function overall, we want
    to move in the direction opposite to the sign of the derivative. Moreover, we
    want to take a bigger step if the gradient at some location is larger in magnitude
    and a smaller step if the gradient is smaller, such that we can more efficiently
    arrive at a solution and avoid overshooting solutions (since the derivative nears
    zero at local minima).
  prefs: []
  type: TYPE_NORMAL
- en: 'We can mathematically represent this idea as follows: at each step instance,
    we update the current position *x* by −*α* · *c*^′(*x*), or the negative derivative
    of the cost function *c*(*x*) multiplied by a *learning rate parameter α*. *α*
    is a positive constant that determines how large the step at each instance is.'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s consider minimizing the function ![$$ c(x)=\sin x+\frac{x^2}{10}+1 $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_IEq16.png).
    The derivative *c*^′(*x*) is ![$$ \cos x+\frac{2x}{10} $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_IEq17.png).
    After a few iterations, the position *converges* (i.e., reaches a point at which
    its position does not change significantly anymore) very close to the true minimum
    of around *x* =  − 1.037 (Listing [1-14](#PC14), Figure [1-32](#Fig32), Figure
    [1-33](#Fig33), Figure [1-34](#Fig34)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig34_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph plots loss against parameter value. It depicts a curve that oscillates
    unevenly with arrows from points (6, 4.5) to (4, 1.8). Point X is marked at (negative
    1.5, 0.25) on the curve.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-34
  prefs: []
  type: TYPE_NORMAL
- en: Gradient descent decrease of the provided loss landscape from an initial parameter
    value of 6
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig33_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A line graph plots loss against parameter value and depicts point X on a curve
    that oscillates unevenly with arrows from points (2.2, 2.5) to (3.5, 1.75). Values
    are estimated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-33
  prefs: []
  type: TYPE_NORMAL
- en: Gradient descent decrease of the provided loss landscape from an initial parameter
    value of around 2
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig32_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph plots loss against parameter value. It displays a curve that dips,
    increases, dips, and then increases. A sequence of arrows from a point on the
    top left part leads along the curve to point X.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-32
  prefs: []
  type: TYPE_NORMAL
- en: Gradient descent decrease of the provided loss landscape from an initial parameter
    value of –4\. We do not have access to the complete cost function (we wouldn’t
    need to run gradient descent at all if that were the case!) and thus run the risk
    of poor initialization
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: There are many mechanisms, ranging from simple to incredibly complex, to address
    the problems of this simple gradient descent algorithm. We’ll explore these more
    in later chapters on neural networks when it becomes more relevant.
  prefs: []
  type: TYPE_NORMAL
- en: It should also be noted that while for the purposes of visualization in these
    examples the loss landscape is two-dimensional (i.e., a relationship between one
    parameter and the loss), it is almost always higher in dimensionality and thus
    more complex. Since successful machine learning models have at least multiple
    parameters (in nontrivial problems), the loss landscape becomes subject to the
    Curse of Dimensionality.^([1](#Fn1))
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s explore another demonstration of gradient descent for the purpose of
    modeling. We have a sequence of numbers `[0, 2, 5, 6, 7, 11]`, in which each number
    is associated with a timestep: `[0, 1, 2, 3, 4, 5]`. Since the sequence seems
    to be linearly spaced with respect to the timestep, we can construct a simple
    approximating model that begins from the prediction 0 at time 0 and simply adds
    some constant *β* at each following timestep. For instance, if *β* = 3, the generated
    sequence is `[0, 3, 6, 9, ...]`. In other words, we are constructing a linear
    model with *y* = *βx* with no *y*-intercept.'
  prefs: []
  type: TYPE_NORMAL
- en: The objective is to minimize the loss function. In this case, we will use the
    Mean Squared Error (MSE; see the “Metrics and Evaluation” section in this chapter
    for a more detailed introduction), which is defined as the difference between
    the *prediction* and the *true label* squared. Thus, *c*(params) = (*y*[true] − prediction(params))²,
    or *c*(*β*) = (*βx* − *y*)². Differentiating with respect to *β* yields *c*^′(*β*) = 2(*βx* − *y*) · *x*.
    Since in this case *x* and *y* are arrays, we’ll need to take the mean of all
    the gradients across each of the samples in the sequence and update the parameter
    *β* from this mean.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s define our *x* and *y* datasets (Listing [1-15](#PC15)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: We’ll use two helpful functions, predict and gradient, that, respectively, return
    the prediction given the beta parameter and the input set and the mean gradient
    given the beta parameter, the input set, and the ground-truth set (Listing [1-16](#PC16)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: Then, we’ll iteratively optimize the beta parameter with gradient descent (Listing
    [1-17](#PC17), Figures [1-35](#Fig35) and [1-36](#Fig36)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig36_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A graph depicts six points that almost lie on a solid line. Five more lines
    intersect each other at a point (0, 0) with lesser transparency from top to bottom.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-36
  prefs: []
  type: TYPE_NORMAL
- en: Gradient descent optimization of a Simple Linear Regression over time. Sampled
    lines become less transparent further in the optimization process
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig35_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph plots the value of beta against iteration and depicts a curve that
    increases gradually and extends horizontally after the point (40, 1.75). Values
    are estimated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-35
  prefs: []
  type: TYPE_NORMAL
- en: Value of the optimized beta parameter across each iteration via gradient descent
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: The beta parameter converges very quickly to around 2.05, which models the sequence
    quite nicely.
  prefs: []
  type: TYPE_NORMAL
- en: Gradient descent is a powerful idea that underlies many modern machine learning
    applications, from the simplest statistical model to the most advanced neural
    network system.
  prefs: []
  type: TYPE_NORMAL
- en: Metrics and Evaluation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In general terms, metrics are tools to set standards and evaluate the performance
    of models. In the field of machine learning and data science, obtaining a functional
    model is far from enough. We need to develop methods and assessment metrics to
    determine how well models perform on tasks that are given. Metrics used in machine
    learning are formulas and equations that provide specific quantitative measurements
    as to how well the developed methods perform on the data provided. Evaluation
    refers to the process of distinguishing between the better and the worse models
    by comparing metrics.
  prefs: []
  type: TYPE_NORMAL
- en: 'As introduced in the previous section, there are two general categories of
    problems that generally describe most datasets: regression and classification.
    Since for each type of problem the predictions produced by models vary greatly,
    there’s a clear distinction between classification metrics and regression metrics.
    Regression metrics evaluate continuous values, while classification deals with
    discrete ones. However, both types of evaluation methods require two types of
    inputs: the ground-truth value (the desired correct prediction) and the predicted
    value that the model outputs.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Similar to metrics, there are loss functions. Loss functions accomplish the
    same goals as those of metrics: they measure the performance or, in some cases,
    the error for certain model predictions. Although loss functions can be used as
    metrics, when we refer to loss functions, it usually represents a differentiable
    function that can be used to train gradient-based models. As mentioned previously,
    gradient descent allows the model to converge to a local optimum by exploiting
    the differentiability of a loss function. The goal of a loss function is to provide
    an informative formula that can describe a model’s error that can be utilized
    by gradient descent. They are generally optimal for gradient descent but not necessarily
    wholly intuitive from our perspective. On the other hand, metrics prioritize an
    intuitive explanation of how effective the model performed on the given task instead
    of designing a formula targeted specifically to the optimization of gradient descent.'
  prefs: []
  type: TYPE_NORMAL
- en: As we will see later on in the section, some metrics simply cannot act as loss
    functions due to their undifferentiability. While sometimes loss functions are
    easily interpretable on a human scale and some metrics can be considered loss
    functions due to their differentiability, loss functions and metrics are generally
    seen as different tools with somewhat similar functionality.
  prefs: []
  type: TYPE_NORMAL
- en: Mean Absolute Error
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'One of the most common regression metrics is the Mean Absolute Error (MAE).
    In simple terms, it calculates the difference between the ground-truth labels
    and the predictions of the model, averaged across all predictions:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \textrm{Mean}\ \textrm{Absolute}\ \textrm{Error}\ (MAE)=\frac{\sum \limits_{i=1}^n\mid
    {y}_i-{\hat{y}}_i\mid }{n} $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equd.png)'
  prefs: []
  type: TYPE_IMG
- en: For example, imagine a class of 50 students taking an exam that is scored out
    of 100 points. The teacher makes assumptions about each student’s expected score
    based on their classwork in the past. After grading the exams, the teacher realizes
    that their predictions aren’t exactly correct. They want to know how much they’re
    off from the ground-truth values, or the actual scores that the students received.
    Guided by intuition, they simply calculate the difference in scores between the
    prediction and the students’ results. The teacher finds it helpful to see how
    off they were for each student, but they also want a summative, aggregate-level
    idea of how generally wrong the predictions were. They do this by taking the average
    of each of the errors (Figure [1-37](#Fig37)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig37_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'A table consists of 6 rows and 3 columns with student names, predicted scores,
    and actual scores as column headers, which points to another table that depicts
    differences and abs differences and M A E: 4.4.'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-37
  prefs: []
  type: TYPE_NORMAL
- en: Example of MAE in terms of student test scores
  prefs: []
  type: TYPE_NORMAL
- en: Although it’s helpful at times to see by how much you are off for every prediction,
    the result is more interpretable if it’s represented in one value, by taking the
    average of the differences. This is the Mean Absolute Error.
  prefs: []
  type: TYPE_NORMAL
- en: This method is straightforward and easily understood telling us the average
    difference between the labels and model predictions. However, it can raise some
    concerns when dealing with certain types of predictions/data as we will discuss
    later in the section.
  prefs: []
  type: TYPE_NORMAL
- en: While the Python library scikit-learn provides an easily useable implementation,
    it’s always crucial to understand the nuts and bolts of each as you can only utilize
    something fully when you intuitively grasp the process of the algorithm/formula.
    Thus, for each metric introduced in the following, both the scikit-learn implementation
    and a full walk-through of implementation from scratch only using the NumPy library
    will be provided.
  prefs: []
  type: TYPE_NORMAL
- en: Before writing any specific code, we will briefly overview NumPy arrays. Simply
    put, NumPy arrays are Python lists that operate significantly faster as the foundation
    of the NumPy library is written in the programming language `C`. One foremost
    use for NumPy arrays is to perform Linear Algebra operations, framing nested one-dimensional
    lists as structured matrices. When we define the function, we assume that the
    inputs, model predictions, and ground-truth labels are one-dimensional NumPy arrays
    with their shape being the number of entries in the data. For each ground-truth
    label, there must exist a prediction.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: We start by defining the function and its parameters, `y_true` and `y_pred`,
    representing the ground-truth labels and model predictions, respectively. Following
    up on the definition, we write an `assert` statement to ensure the shape of both
    inputs is identical since mistakes can happen when preprocessing data and/or retrieving
    model predictions (Listing [1-18](#PC18)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: When understanding these nested return statements, it’s extremely helpful to
    start from the inside and work our way out. Referring back to the equation of
    MAE, the first step is to calculate each element’s difference between the ground-truth
    labels and model prediction, which is reflected in the code by y_pred-y_true.
    Then, for each item in the resulting array, we take the absolute value of the
    result, represented by np.absolute(y_true-y_pred). Finally, the average of the
    output is calculated by first taking the sum across all elements, np.sum, and
    then dividing by the length of the array len(y_pred), which is the number of entries
    in the data (Listing [1-19](#PC19)). Note we imported NumPy as np at the top;
    thus when referring to np, we are calling functions from the NumPy library.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: As mentioned previously, the Python library sklearn provides a convenient one-liner
    function for MAE, which can be used the same way as our implementation from scratch
    (Listing [1-20](#PC20)).
  prefs: []
  type: TYPE_NORMAL
- en: Mean Squared Error (MSE)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The Mean Absolute Error may be simple, but there are a few drawbacks. One major
    issue regarding MAE is that it does not punish outlier predictions. Consider two
    samples *A*[1] and *A*[2] that the model is 1% and 6% off on (absolute error divided
    by total possible domain value). Using the Mean Absolute Error, *A*[2] is weighted
    5% worse than *A*[1]. Now, consider two additional samples *B*[1] and *B*[2] that
    the model is 50% and 55% off on. Using the Mean Absolute Error, *B*[2] is weighted
    5% worse than *B*[1]. We should ask ourselves: Is a model degradation from 1%
    to 6% error the same as a model degradation from 50% to 55% error? A 50–55% error
    change is a lot worse than a 1–6% error change since in the latter case the model
    still performs reasonably well.'
  prefs: []
  type: TYPE_NORMAL
- en: 'We can use the Mean Squared Error to disproportionately punish larger mistakes:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \textrm{Mean}\ \textrm{Squared}\ \textrm{Error}\ (MSE)=\frac{\sum \limits_{i=1}^n{\left({\hat{y}}_i-{y}_i\right)}^2}{n}
    $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Eque.png)'
  prefs: []
  type: TYPE_IMG
- en: As the name suggests, the Mean Squared Error raises the difference between model
    predictions and the ground-truth label to the second power instead of taking the
    absolute value.
  prefs: []
  type: TYPE_NORMAL
- en: 'To further demonstrate, continuing with the student test score example from
    earlier, the teacher predicts a score of 58 instead of 83 for the student Cameron.
    Using the formula for MSE, we obtain 107.8 (Figure [1-38](#Fig38)). However, we
    do not have an intuition of how exactly the model is incorrect. Since we squared
    the result instead of taking the absolute value, the score we obtain doesn’t scale
    to the range of test scores as an average error of 107.8 is impossible for a test
    that’s scored between 0 and 100\. To counter such an issue, we can take the square
    root of the result to “reverse” the operation of raising to the second power,
    putting the error into contextual scale while still emphasizing any outlier predictions.
    This metric is the Root Mean Squared Error (RMSE):'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \textrm{Root}\ \textrm{Mean}\ \textrm{Squared}\ \textrm{Error}\ \left(\textrm{RMSE}\right)=\sqrt{\frac{\sum
    \limits_{\textrm{i}=1}^{\textrm{n}}{\left({y}_i-{\hat{y}}_i\right)}^2}{n}} $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equf.png)'
  prefs: []
  type: TYPE_IMG
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig38_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'A table has 6 rows and 3 columns with column headers, student names, predicted
    scores, and actual scores, which points to a table with differences and squared
    differences that leads to M S E: 107.8.'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-38
  prefs: []
  type: TYPE_NORMAL
- en: Example of MSE
  prefs: []
  type: TYPE_NORMAL
- en: Using the preceding equation, we obtain a 10.38 RMSE for the student test score
    example. On the other hand, if we use MAE, the resulting score is 7.8\. Without
    looking at any predictions, RMSE gives us more information about the extremely
    incorrect prediction.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: The implementations of MSE and RMSE are extremely like that of MAE. As we see
    in the function, the difference between the ground-truth labels and model prediction
    is raised to the second power using the double asterisk symbol. Finally, the average
    is taken by summing all the elements in the array and then dividing by the total
    length, or the number of elements in the array, using `np.sum` and `/len(y_pred)`.
    To obtain the value for RMSE, we simply need to square root the result from MSE
    as shown previously; we raise the output from MSE to the ½ power or take its square
    root (Listing [1-21](#PC21)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: Scikit-learn only provides an implementation for MSE. For RMSE, we simply square
    root the result like we did previously (Listing [1-22](#PC22)).
  prefs: []
  type: TYPE_NORMAL
- en: Although there are other regression metrics, MAE, MSE, and RMSE are some of
    the most important ones. Other regression metrics such as the Tweedie Deviance
    or the Coefficient of Determination revolve around ideas similar to the metrics
    mentioned previously.
  prefs: []
  type: TYPE_NORMAL
- en: Confusion Matrix
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Like regression metrics based on the concept of MAE, most classification metrics
    rely on the idea of a Confusion Matrix, which describes how much error is made
    and what type of error with a convenient visualization.
  prefs: []
  type: TYPE_NORMAL
- en: 'A Confusion Matrix has four components that describe model predictions compared
    against the ground-truth labels; they are true positives, false positives, true
    negatives, and false negatives. Let’s break down this terminology: the first word
    indicates whether the model prediction was correct or not (“true” if correct,
    “false” if not); the second indicates the ground-truth value (“positive” for the
    label 1 and “negative” for the label 0).'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s better understand these concepts with real-life examples. Say that a doctor
    is diagnosing possible cancerous patients based on their screening results. If
    the doctor deduces that an actual cancerous patient does in fact have cancer,
    it’s an example of a true positive. When the model, or in this case the doctor,
    predicts the positive class of being cancerous and the actual ground-truth label
    of whether the patient has cancer or not ends up positive too, it’s called a true
    positive. However, the doctor is not accurate every single time. When the doctor
    predicts the patient is not cancerous while the patient in fact has cancer, it’s
    an example of a false negative. When the doctor concludes that a patient is cancerous
    but in truth the patient is healthy, it’s an example of a false positive. If a
    patient is healthy and the doctor predicts healthy too, it’s an example of a true
    negative.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s summarize these concepts into numeric language:'
  prefs: []
  type: TYPE_NORMAL
- en: When the model prediction is 1 and the ground truth is 1, it’s a true positive.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When the model prediction is 1 and the ground truth is 0, it’s a false positive.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When the model prediction is 0 and the ground truth is 0, it’s a true negative.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When the model prediction is 0 and the ground truth is 1, it’s a false negative.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: After we’ve identified all the cases of this within our model prediction against
    the ground-truth labels, we can conveniently organize these values into a matrix
    form, thus the name Confusion Matrix (Figure [1-39](#Fig39)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig39_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A 3 by 3 matrix from 10 total samples displays ground truth positive and negative
    as column headers and predicted positive and negative as row headers.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-39
  prefs: []
  type: TYPE_NORMAL
- en: Example of Confusion Matrix
  prefs: []
  type: TYPE_NORMAL
- en: Accuracy
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'One of the most straightforward ways to evaluate the performance of a classification
    model is accuracy. Accuracy is simply the percentage of values that the model
    predicted correctly. In more technical terms, it’s the number of true positives
    plus the number of true negatives divided by the number of all the prediction
    values:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \textrm{Accuracy}=\frac{TN+ TP}{TP+ FP+ TN+ FN} $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equg.png)'
  prefs: []
  type: TYPE_IMG
- en: Accuracy may be convenient and intuitive, but it does come with a cost. Imagine
    if there are 100 samples, where 90 of them belong to the positive class and the
    other 10 belong to the negative class. Without having any other information about
    the data, if the model predicts the positive class for all samples, it will receive
    an accuracy of 0.9, or 90% correct. Consider a well-developed model in which for
    the 90 positive samples, it predicted 81 samples correctly; on the other hand,
    for the 10 negative classes, the model predicted 9 samples correctly. Clearly,
    the second model has a better understanding of the data instead of blindly guessing
    as seen in the first model, but they all receive the same accuracy score of 0.9\.
    When the data contains significantly more samples of one class than the other,
    it’s referred to as imbalanced data. Thus, accuracy is not a reflective metric
    when dealing with imbalanced data.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: 'The NumPy implementation of accuracy is straightforward: `y_true == y_pred`
    returns an array of Booleans indicating if elements of the arrays match. Boolean
    values in Python can be interpreted as integers; thus, we calculate the average
    across all elements in the array since technically each Boolean represents the
    accuracy of that element (Listing [1-23](#PC23)).'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: Again, sklearn provides a simple function for accuracy; it can be used the same
    way we used our own accuracy score implemented from scratch by inputting model
    predictions and the ground-truth labels (Listing [1-24](#PC24)).
  prefs: []
  type: TYPE_NORMAL
- en: Precision
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'On the contrary, precision considers the issue of class imbalance in data.
    Precision calculates the accuracy only within all predicted positive classes,
    or the number of true positives divided by the sum of true positives and false
    positives. This will punish models that perform poorly on the positive class in
    an imbalanced dataset with a large number of negative values:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \textrm{Precision}=\frac{TP}{TP+ FP} $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equh.png)'
  prefs: []
  type: TYPE_IMG
- en: Precision gives a sense of how accurate the model is for the positive class
    while addressing the issue of accuracy on class imbalance. The precision score
    is extremely useful as a metric as in many real-life datasets such as disease
    diagnosing, negative samples overwhelm the number of positive samples and precision
    would produce meaningful intuition of how accurate the model may be when predicting
    the rare positive class.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
- en: Going from the equation of precision, we first find the number of true positive
    values. Recall from earlier true positive is when the model predicts correctly
    for the positive class; in code, `(y_pred == 1) & (y_true == 1)` returns elements
    where both `y_true and y_pred` are equal. Then to find the number of true positives,
    we simply sum the array using `sum()` and then divide by all the predicted positive
    values, which we can obtain by summing the prediction array as all the negative
    prediction is represented with 0s and will not contribute to the sum (Listing
    [1-25](#PC25)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE25]'
  prefs: []
  type: TYPE_PRE
- en: In sklearn, we can import the `precision score` function from `sklearn.metrics`
    and use it the same way as our own implementation (Listing [1-26](#PC26)).
  prefs: []
  type: TYPE_NORMAL
- en: Recall
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Recall score, or the true positive rate, is slightly different from precision
    as instead of calculating the accuracy of when the model predicts positive, it
    returns the accuracy of the positive class as a whole. Recall cleverly solves
    the problem of accuracy by only calculating the correctness in the positive class
    or the percentage of true positives across all positive labels. The recall metric
    is useful when we only care about our model predicting the positive class accurately.
    For example, when diagnosing cancer and most diseases, avoiding having false negatives
    is much more crucial than avoiding having false positives when resources are limited
    to develop a perfect model. In cases like such, we would be optimizing for a higher
    recall as we want the model to be as accurate as possible, especially in predicting
    the positive class:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \textrm{Recall}=\frac{TP}{TP+ FN} $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equi.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The implementation in NumPy is extremely similar to that of precision with
    only a minor change: instead of `y_pred.sum()`, we have `y_true.sum()` as now
    we are finding all the ground-truth positive values (Listing [1-27](#PC27)).'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE26]'
  prefs: []
  type: TYPE_PRE
- en: In sklearn, calling the `recall_score` function from `sklearn.metrics` will
    accomplish what we’ve just implemented (Listing [1-27](#PC27)).
  prefs: []
  type: TYPE_NORMAL
- en: F1 Score
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The intuition behind the F1 score is creating a universal metric that measures
    the correctness of the positive class while having both the advantages of precision
    and recall. Thus, the F1 score is the harmonic mean between precision and recall.
    Note we used harmonic mean here since precision and recall are expressed as percentages/rates:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \textrm{F}1\ \textrm{Score}=2\bullet \frac{\textrm{precision}\bullet \textrm{recall}}{\textrm{precision}+\textrm{recall}}=\frac{TP}{TP+\frac{1}{2}\left(
    FP+ FN\right)} $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equj.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The F1 score typically gives a better sense of how correctly the positive class
    is classified compared with precision and recall. The F1 score can be generalized
    into the F-beta score where beta represents the amount of weight or attention
    on precision and recall. When beta equals 1, it’s equivalent to the F1 score:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \textrm{F}-\textrm{Beta}\ \textrm{Score}=\left(1+{\beta}^2\right)\bullet
    \frac{\textrm{precision}\bullet \textrm{recall}}{\left({\beta}^2\bullet \textrm{precision}\right)+\textrm{recall}}
    $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equk.png)'
  prefs: []
  type: TYPE_IMG
- en: Setting beta lower than 1 gives more weight to precision, meaning that the precision
    score will be valued more during the harmonic average. On the other hand, setting
    beta to a value greater than 1 emphasizes the recall score. This gives more flexibility
    to the combination of precision and recall scores as the amount of attention can
    be adjusted based on the situation.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE27]'
  prefs: []
  type: TYPE_PRE
- en: 'Here, we implement the F1 score as most of the time the F1 score is used instead
    of other F-beta variations. However, this can be easily expanded into the F-beta
    score. Following the formula for harmonic mean, we can divide the number of observations,
    2, by the sum of the reciprocals of each observation, 1 over precision and 1 over
    recall. Note that the formula and the implementation are different from this formula
    since we simplified the expression so that it’s represented in one fraction. We
    can utilize the precision and recall functions that were implemented previously:
    in the numerator, the product of precision and recall is multiplied by 2, while
    in the denominator they’re summed, and dividing them calculates the harmonic mean
    between the two (Listing [1-28](#PC28)).'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE28]'
  prefs: []
  type: TYPE_PRE
- en: In sklearn, we can use the `f1_score` function to achieve the same results (Listing
    [1-29](#PC29)).
  prefs: []
  type: TYPE_NORMAL
- en: Area Under the Receiver Operating Characteristics Curve (ROC-AUC)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Although the F1 score accounts for both the advantages of precision and recall,
    it only measures the positive class. Another major issue of the F1 score along
    with precision and recall is that we’re inputting binary values for evaluation.
    Those binary values are determined by a threshold, converting probabilities to
    binary targets usually during model predictions. In most cases, 0.5 is chosen
    as the threshold for converting probabilities to binary targets. This not only
    might not be the optimal threshold, but it also decreases the amount of information
    that we receive from the output as probabilities also show how confident the model
    is in its prediction. The Receiver Operating Characteristics (ROC) curve solves
    these issues cleverly: it plots the true positive rate against the false positive
    rate for various thresholds:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \textrm{True}\ \textrm{Positive}\ \textrm{Rate}\ (TPR)/\textrm{Recall}=\frac{TP}{TP+
    FN}, $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equl.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ \textrm{False}\ \textrm{Positive}\ \textrm{Rate}\ (FPR)=\frac{FP}{TN+
    FP} $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equm.png)'
  prefs: []
  type: TYPE_IMG
- en: The true positive rate, or recall, gives us how many predictions are correct
    among all predicted positive labels, or the probability that the model will be
    correct when the prediction is positive. The false positive rate calculates the
    number of false negatives within the negative prediction. In sense, it gives a
    probability that the model will be incorrect when the prediction is negative.
    The ROC curve visualizes the values of both measurements on different thresholds,
    generating a plot where we can see what threshold gives the best values for true
    positive rate/false positive rate (Figure [1-40](#Fig40)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig40_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A line graph of receiver operating characteristic plots true versus false positive
    rate and depicts a step curve for A U C equals 0.67, and a diagonal dashed line
    that starts from the origin.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-40
  prefs: []
  type: TYPE_NORMAL
- en: An example of a ROC curve with its area = 0.67
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, calculating the area under the curve (AUC) provides a measurement
    of how well the model distinguishes between classes. An area of 1 indicates a
    perfect distinction between classes, thus producing correct predictions. An area
    of 0 indicates complete opposite predictions, meaning that all predictions are
    reversed between 1 and 0 (labels – 1). An area of 0.5 represents complete random
    prediction where the model cannot distinguish between classes at all (Figure [1-41](#Fig41)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig41_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Three graphs for random guess, perfect predictions, and completely opposite
    predictions on the left, middle, and right, respectively. All graphs plot for
    true versus false positive rate. Each graph displays a line for R O C curves with
    areas 0.50, 1.00, and 0.00 respectively.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-41
  prefs: []
  type: TYPE_NORMAL
- en: Three extreme cases of a ROC curve
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE29]'
  prefs: []
  type: TYPE_PRE
- en: The implementation of ROC-AUC is slightly complicated as we first need to plot
    the ROC curve and then calculate the area under it. The preceding function simply
    calculates the true positive rate and the false positive rate by first retrieving
    arrays of true positives, false positives, true negatives, and false negatives
    and then calculating TPR and FPR, returning them as separate arrays (Listing [1-30](#PC30)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE30]'
  prefs: []
  type: TYPE_PRE
- en: In order to plot the ROC curve, we need the TPR and the FPR for various thresholds.
    In the preceding function, we choose 100 equally spaced thresholds from 0 to 1\.
    For each threshold we choose, the function calculates the TPR and the FPR for
    that particular threshold based on predicted probabilities provided by some model.
    Then each value is added to a separate list. Finally, both lists containing TPR
    and FPR for the amount of threshold specified are returned (Listing [1-31](#PC31)).
  prefs: []
  type: TYPE_NORMAL
- en: Using the points returned from our preceding function, we can plot the ROC curve
    with the x-axis being FPR and the y-axis being TPR. It’s difficult to calculate
    the area under the curve directly using integrals since we don’t have an exact
    function that would be able to represent the curve plotted every time with different
    values of TPR and FPR. However, we can estimate the area by slicing rectangular
    sections under the graph and then summing the area of those rectangles. As we
    slice more and more rectangles, with each rectangle becoming thinner and thinner,
    the sum of their area tends to be closer to the exact area under the graph (Figure
    [1-42](#Fig42)). This method of estimating the area under graphs is known as a
    Riemann sum.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig42_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A graph of the R O C curve plots for true against false positive rate and depicts
    a step curve with solid dots on the top left edges connected and sliced vertically.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-42
  prefs: []
  type: TYPE_NORMAL
- en: Example of area under the curve calculation
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE31]'
  prefs: []
  type: TYPE_PRE
- en: For calculating the area, we can imagine the gap between two points as the width
    of a rectangle while letting the height be the point to the bottom of the graph.
    Although there will be a tiny gap between the top of the rectangle and the line
    drawn by the graph, this gap will become negligible as the number of points, or
    rectangles, increases. In the preceding function, after we obtain lists of TPR
    and FPR containing different values for different thresholds, each value within
    the list is looped through, and the respective rectangular area is calculated
    (Listing [1-32](#PC32)). The resulting ROC-AUC score tends to approach that of
    the sklearn implementation when the number of thresholds is greater than 10,000.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE32]'
  prefs: []
  type: TYPE_PRE
- en: The sklearn implementation is as simple as calling the function `roc_auc_score`,
    inputting model predictions and ground-truth labels (Listing [1-33](#PC33)).
  prefs: []
  type: TYPE_NORMAL
- en: Algorithms
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before diving into any deep learning–related topics, it’s crucially important
    to understand classical machine learning algorithms, many of which are competitors
    to deep learning models. Some of these classical machine learning algorithms have
    existed for as long as 70 years, and when used correctly, their performance is
    considerably high with surprisingly fast computational time compared with various
    deep learning methods.
  prefs: []
  type: TYPE_NORMAL
- en: To this day, classical machine learning algorithms still play a significant
    role in modern industries and machine learning–related contests. Not only do these
    algorithms train faster than deep learning approaches but powerful methods like
    Gradient Boosting can also outperform standard deep learning methods on tabular
    data. Moreover, models such as XGBoost (Extreme Gradient Boosting) and LightGBM
    (Light Gradient Boosting Machines) are still the most popular generic choice for
    benchmarking tabular datasets. Many advances in classical machine learning set
    the foundation for modern deep learning techniques. The neural network – the basis
    of deep learning – relies upon the conceptual and mathematical foundation of Linear
    Regression and gradient descent. Thus, it’s critical to understand and implement
    these methods before moving on to deep learning. In this section, you will be
    introduced to six popular and important classical machine learning algorithms,
    including K-Nearest Neighbors (KNN), Linear and Logistic regressions, Decision
    Trees, Random Forests, and Gradient Boosting.
  prefs: []
  type: TYPE_NORMAL
- en: K-Nearest Neighbors
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'K-Nearest Neighbors, or KNN, is one of the simplest and the most intuitive
    classical machine learning algorithms. KNN was first proposed by Evelyn Fix and
    Joseph Lawson Hodges Jr. during a technical analysis produced for USAF in 1951\.
    It was unique at its time as the method proposed is nonparametric: the algorithm
    does not make any assumptions about the statistical properties of the data. Although
    the paper wasn’t ever published due to the confidential nature of the work, it
    laid out the groundwork for the first-ever nonparametric classification method,
    K-Nearest Neighbors. The beauty of KNN lies in its simplicity, and unlike most
    other algorithms, KNN does not contain a training phase. Additional data can be
    incorporated seamlessly as the algorithm is memory-based, easily adapting to any
    new data. Over seven decades later, KNN still stands as a popular classification
    algorithm, and innovations are still constantly being proposed surrounding it.'
  prefs: []
  type: TYPE_NORMAL
- en: K-Nearest Neighbors is merely an algorithm concept. Although it was originally
    proposed for classification tasks, it can also be adapted to regression tasks.
    One major downfall to KNN is its speed. The time it takes for inference grows
    significantly as the number of samples increases. The Curse of Dimensionality,
    as introduced earlier, also weighs down the performance of KNN; as the amount
    of data features increases, the algorithm struggles to predict samples correctly.
    However, due to KNN’s easy implementation, the convenience of only having one
    single hyperparameter, and interoperability, it’s one of the best algorithms to
    quickly pick up and perform fast predictions on relatively small-sized data.
  prefs: []
  type: TYPE_NORMAL
- en: Theory and Intuition
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The main intuition behind KNN is to group unlabeled data points with existing,
    labeled data points and classify data based on their distance to the labeled data
    points. As unlabeled data points are inputted, the distance between them and other
    training data points is calculated. Then the closest data point’s label becomes
    the model prediction for the new data point. We can visualize this with a simple
    two-dimensional example (Figure [1-43](#Fig43)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig43_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Two sets of data points in different shades that tend to rise from left to right
    and a new data point close to the upper set of data points.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-43
  prefs: []
  type: TYPE_NORMAL
- en: Visualization of intuition on KNN
  prefs: []
  type: TYPE_NORMAL
- en: Assuming that the labeled dataset has two features that are on the same scale,
    we graph each data point according to its features, with one being on the x-axis
    and the other on the y-axis. Here, different labels are distinguished with different
    colors. When a new, unlabeled data point is inputted, we first graph the data
    point according to its features. Then we calculate the distance from the new data
    point to each and every other labeled data point. Once we obtain a list of distances
    associated with each point in the dataset, the list is sorted ascendingly, and
    the first *K* elements are picked. *K* is a hypermeter that can be adjusted to
    improve performance. The selection of K will be discussed later. Finally, we perform
    a majority voting on the labels of the points to determine the final prediction.
    KNN takes advantage of the fact that data points with the same label most likely
    contain similar values of its features. This idea can be further extended into
    higher dimensions or data with more than two features.
  prefs: []
  type: TYPE_NORMAL
- en: 'Before diving into the implementation of KNN, let’s step back and discuss the
    distance functions, which can be used in the algorithm. A base equation for many
    distance formulas is Minkowski distance, as shown in the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ D\left(x,y\right)={\left(\sum \limits_{i=1}^n{\left|{x}_i-{y}_i\right|}^p\right)}^{\frac{1}{p}}
    $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equn.png)'
  prefs: []
  type: TYPE_IMG
- en: For vectors *x* and *y*, *n* represents the dimension of the vectors with values
    (*x*[1], *x*[2], *x*[3], ..., *x*[*n*]) and (*y*[1], *y*[2], *y*[3], ..., *y*[*n*]) where
    each value is a feature of each sample. The absolute difference between each value
    in the two vectors is raised to the *p*^(*th*) power. Then these differences between
    values are summed and taken to the *p*^(*th*) root. For different values of *p*,
    the function results in different forms of distance calculations. When *p* = 1,
    the function is known as Manhattan distance; when *p* = 2, the function becomes
    Euclidian distance; as *p* → ∞, the function becomes Chebyshev distance. For the
    result to reflect traditional understandings of distance, *p* should be larger
    than or equal to 1.
  prefs: []
  type: TYPE_NORMAL
- en: As mentioned in the previous section, Manhattan distance is inspired by the
    shape of streets in Manhattan, New York, where each street forms right-angled
    paths from one point to another. Manhattan distance between two points can be
    interpreted as the distance of the shortest right-angled path on an n-dimensional
    grid where the two points are plotted (Figure [1-44](#Fig44)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig44_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A grid displays a red right-angled path connecting two points and a green path
    made up of smaller right angles connecting the same.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-44
  prefs: []
  type: TYPE_NORMAL
- en: 2D Manhattan distance. Both the red line and the green line demonstrate Manhattan
    distance with the same distance values
  prefs: []
  type: TYPE_NORMAL
- en: 'The formula for Manhattan distance is Minkowski distance where *p* = 1, or
    the sum of the absolute difference of each value between two vectors. Manhattan
    distance usually describes paths that could be realistically taken within the
    values described in the features. It is preferred over the more popular Euclidian
    distance used by KNN in the case of binary/discrete features. However, note that
    Manhattan distance becomes less understandable when it’s calculated in higher
    dimensions, and the resulting distance value increases significantly as the dimension
    of space increases:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ D\left(x,y\right)=\sum \limits_{i=1}^n\left|{x}_i-{y}_i\right| $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equo.png)'
  prefs: []
  type: TYPE_IMG
- en: Euclidian distance is the shortest path between two points in an n-dimensional
    space; it’s the most common distance formula used in KNN. Euclidian distance is
    simply an extension of the Pythagorean Theorem in higher dimensions (Figure [1-45](#Fig45)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig45_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A grid displays a straight line that connects two points which are at the bottom
    left and top right.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-45
  prefs: []
  type: TYPE_NORMAL
- en: 2D Euclidian distance
  prefs: []
  type: TYPE_NORMAL
- en: 'The formula for Euclidian distance results when *p* = 2 in Minkowski distance.
    It can also be seen as the Pythagorean Theorem for finding the hypotenuse in higher
    dimensions. One major disadvantage of Euclidian distance is the Curse of Dimensionality
    as described in previous sections: when the dimension of data increases, the less
    meaningful Euclidian distance becomes:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ D\left(x,y\right)=\sqrt{\sum \limits_{i=1}^n{\left|{x}_i-{y}_i\right|}^2}
    $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equp.png)'
  prefs: []
  type: TYPE_IMG
- en: 'As we increase the value of *p* in Minkowski distance, approaching infinity,
    we obtain![$$ \underset{p\to \infty }{\lim }{\left(\sum \limits_{i=1}^n{\left|{x}_i-{y}_i\right|}^p\right)}^{\frac{1}{p}}=\underset{i}{\max}\left(\left|{x}_i-{y}_i\right|\right),
    $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_IEq18.png) which
    becomes Chebyshev distance. As introduced in previoussections, Chebyshev is the
    maxim distance between two points on a single axis. Chebyshev distance in two
    dimensions can also be understood as the number of moves required for the King
    chess piece to move from one point to another:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ D\left(x,y\right)=\underset{i}{\max}\left(\left|{x}_i-{y}_i\right|\right)
    $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equq.png)'
  prefs: []
  type: TYPE_IMG
- en: The usage of Chebyshev distance in KNN is rare, as most of the time it is outperformed
    by other distance functions in various scenarios. In KNN, Chebyshev distance calculates
    the greatest difference in value across all features between two data points.
    It raises a crucial issue as two data points could be very similar in every feature
    except one, thus belonging to the same class but significantly apart on the other
    feature; based on that single feature, Chebyshev distance will output a large
    value, which would lead to potentially incorrect prediction by the model.
  prefs: []
  type: TYPE_NORMAL
- en: 'When choosing KNN, there are some key points to consider. First, all features
    must be on the same scale. More specifically, during the computation of distances
    between points, a certain value of distance in one feature must mean the same
    for all other features. It is recommended to normalize or standardize data before
    applying KNN. Normalization refers to the process of changing the values of features
    to lie within a common scale. Standardization is the process of scaling features,
    accomplishing two things: changing the mean of the data to a value of 0 and ensuring
    the resulting distribution has a unit standard deviation. Depending on the data,
    standardization can be used to ensure a Gaussian distribution, while normalization
    can restrict data to a certain range, reducing the influence of outliers. For
    the size of the dataset, both the number of features and the number of samples
    are best kept low due to the Curse of Dimensionality and computational speed,
    respectively.'
  prefs: []
  type: TYPE_NORMAL
- en: Implementation and Usage
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Implementing KNN from scratch using NumPy involves two major components, calculating
    distances and choosing the first K “neighbors” along with making predictions by
    majority voting. Before writing down any code, it’s always a good practice to
    list out the flow of steps in the algorithm as shown in the following for KNN:'
  prefs: []
  type: TYPE_NORMAL
- en: Retrieve train data or labeled samples; retrieve test data or unlabeled samples.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Calculate distance using the chosen distance function between the test data
    point and every train data point.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Sort the resulting distances from closest to furthest away from the test data
    point and select the first K values.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Perform majority voting to determine the final prediction.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Repeat for all test data points.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We can assume that both train and test data are inputted in a NumPy array with
    shape `(num_samples, num_features),` while the labels for training data are NumPy
    arrays with shape `(num_samples, 1)`. Following the preceding steps, we can define
    a function that calculates the distance between one single test data sample and
    every train data sample.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE33]'
  prefs: []
  type: TYPE_PRE
- en: In the preceding function, we are taking the whole training data array and a
    single test sample as input. We then iterate through each row of the training
    data, apply a predefined distance function that we refer to as “`distance_function`”
    with inputs `x` and `y` for now, and append the resulting value to a list for
    later. Once we loop through the entirety of the training data, we simply return
    the list containing all the values produced by the distance function. Now, we
    have accomplished the first major component of KNN as mentioned previously; for
    the second part, we’ll define another function that sorts the list, selects the
    first K elements, and performs majority voting for determining prediction (Listing
    [1-34](#PC34)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE34]'
  prefs: []
  type: TYPE_PRE
- en: Combining the two major components in KNN, the preceding function performs on
    a single test data sample. We first organize the distance value, which is produced
    by `calculate_distance,` into a Pandas series with the index being the index of
    `y_train` using `list(range(len(y_train)))`. We then sort the list ascendingly
    and select the first K-Nearest “Neighbor” while preserving the indices assigned
    earlier. For each distance value, we find its respective label by indexing `y_train`
    using the index in the sorted series. Finally, we use the `Counter` object from
    the Python library `collections` for the majority vote, deciding the final prediction
    for the test data sample and returning it as a single value (Listing [1-35](#PC35)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE35]'
  prefs: []
  type: TYPE_PRE
- en: The preceding function essentially loops through the whole test data array and
    transforms KNN on each single test data point. For each test data point, we first
    retrieve the list of distances using the function `calculate_distance` and then
    make predictions using the function `knn_predict_single`. Afterward, we append
    the single prediction to an array that will store all the predictions from the
    testing data. Finally, we return the array (Listing [1-36](#PC36)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE36]'
  prefs: []
  type: TYPE_PRE
- en: For the distance function, we will implement Minkowski distance with an adjustable
    parameter `p`. However, this distance function can be any other distance function
    with inputs `x` and `y` (Listing [1-37](#PC37)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE37]'
  prefs: []
  type: TYPE_PRE
- en: 'We can test our KNN implementation on the Iris dataset. The dataset aims to
    classify the type of iris flower – Setosa, Versicolour, or Virginica – based on
    the physical features of the flower: Sepal Length, Sepal Width, Petal Length,
    and Petal Width. We can conveniently load the dataset from the library scikit-learn
    and then split it into training and testing sets using the function `train_test_split`.
    We then simply need to call the `knn_pred` function and input the respective parameters
    (Listing [1-38](#PC38)). To evaluate the performance of our model, we can use
    the accuracy score from scikit-learn. With K set to 5, our model performs perfectly
    on the data, reaching an accuracy of 1.0.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE38]'
  prefs: []
  type: TYPE_PRE
- en: 'The library scikit-learn provides an out-of-box implementation for KNN as shown
    previously: simply create the `KNeighborsClassifier` object and call `fit` and
    then `predict` on test data (Listing [1-39](#PC39)). We obtain the same result
    as our own implementation, reaching an accuracy of 1.0 with `n_neighbors`, or
    `k` in our implementation, set to 5.'
  prefs: []
  type: TYPE_NORMAL
- en: Note that there’s no single “method” of finding the best “K” value. Most of
    the time there must be trials and tuning to find the optimal K value that gives
    the best performance. Usually, a common technique taken to search for the best
    K value that performs well both on training data and potential testing data is
    called the elbow method. The elbow method states that when the performance of
    KNN is plotted against different K values, the optimal K value for testing data
    sits at the steepest increase in performance between two K values. Note that usually
    the elbow method is used along with cross-validation and the performance is measured
    against the validation dataset. An example of such a selection method is shown
    in Figure [1-46](#Fig46).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig46_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A line graph plots accuracy against the number of neighbors. It depicts a line
    that rises and extends horizontally. The optimal K point is marked at (4, 98).
    Values are approximated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-46
  prefs: []
  type: TYPE_NORMAL
- en: Elbow method for KNN
  prefs: []
  type: TYPE_NORMAL
- en: In the preceding example on an arbitrary dataset, the optimal K value would
    be 4 as the steepest increase in performance happens between 3 and 4\. This method
    can be used with any metric that measures the performance of predictions whether
    the goal is minimization or maximization.
  prefs: []
  type: TYPE_NORMAL
- en: KNN may be simple and easy to use, but keep in mind its limitations such as
    not being able to scale for larger datasets and high computational time. In later
    sections, algorithms are introduced to handle this problem better than KNN and
    generally perform much better. Although KNN sits as one of the simplest ML algorithms,
    its cons usually outweigh the pros, making it merely a quick and dirty testing
    algorithm for most data scientists.
  prefs: []
  type: TYPE_NORMAL
- en: Linear Regression
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The term *Linear Regression* may be familiar to most as it’s a common technique
    used in statistics to model the relationship between variables. The earliest form
    of regression analysis, Linear Regression using Least Squares, was first published
    by Adrien-Marie Legendre in 1805 and then again by Carl Friedrich Gauss in 1809\.
    Both used them to predict astronomical orbitals, specifically bodies that orbit
    the sun. Later in 1821, Gauss published his continued work on the Least Square
    Theory; however, the term *regression* wasn’t coined until the late nineteenth
    century by Francis Galton. Galton discovered a linear relationship between the
    weights of mother and daughter seeds across generations. To Galton, regression
    was merely a term to describe a biological phenomenon. It was not until Udny Yule
    and Karl Pearson expanded this method to a more general statistics view.
  prefs: []
  type: TYPE_NORMAL
- en: To this day, Linear Regression has evolved with many variations and solving
    methods, but the usefulness of the algorithm has remained the same. Linear Regression
    is not only used in the field of machine learning and data science but also in
    epidemiology, finance, economics, and so on. Practically any situation where a
    relationship between continuous variables is presented, Linear Regression can
    model such relation in one way or another. To generalize, the application of Linear
    Regression falls under the use of predicting or forecasting certain response variables
    based on related explanatory features; Linear Regression can also be used to quantify
    or measure the linear relation between two variables and to identify possible
    redundant or misleading features in a dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Theory and Intuition
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Linear Regression models the relationship between one response, or target variable,
    and one or more features, or explanatory variables that may be correlated to the
    target variable in a linear fashion. Linear Regression with two variables, with
    one feature describing the target, is called Simple Linear Regression. On the
    other hand, Linear Regression that models multiple feature variables against one
    target variable is referred to as Multiple Linear Regression. The goal of Linear
    Regression is to find a function that produces a “line of best fit” that best
    models the relationship between the features and the target variables. There are
    many ways to determine the “line of best fit”; however, the most common and successful
    method is through gradient descent as mentioned earlier in the chapter.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s start with a basic example of Simple Linear Regression with only two
    variables: the explanatory variable, the size of someone’s foot, and the target
    variable, that person’s height (Figure [1-47](#Fig47)). Our goal in this situation
    is to predict someone’s height based on the length of their foot. There are a
    few data samples given; we’re tasked with writing a function that produces a line
    that best models the relationship between the two variables.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig47_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A graph plots height against foot size and depicts points at (14.2, 78), (15.7,
    88), (14, 97), (17, 106), and (21.5, 115). Values are approximated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-47
  prefs: []
  type: TYPE_NORMAL
- en: Example data for predicting height based on foot size
  prefs: []
  type: TYPE_NORMAL
- en: 'After observing the data, we may hypothesize an estimation of a function that
    could possibly model the relationship between the two variables. In a two-dimensional
    graph, the general equation for a line is given in the slope-intercept form:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ y=\beta x+\varepsilon $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equr.png)'
  prefs: []
  type: TYPE_IMG
- en: where *β* is the slope and *ε* is the y-intercept. In the field of machine learning
    and data science, we refer to the slope as the weight and y-intercept as the bias
    of a model. After estimating an equation for a line that may fit the data, say
    *y* = 5*x* + 3, we would want to calculate the performance of our estimation by
    some method. The most common metric used for optimizing Linear Regression is MSE.
    The error is calculated as the difference between the y value of the ground-truth
    data samples (height in our case) and the y value of the line at the ground-truth
    x value (model predictions) squared for every data point and then summed up together.
    This method of error calculation is also known as the sum of the squared residuals.
  prefs: []
  type: TYPE_NORMAL
- en: 'In the preceding figure, the blue line shows the model’s estimation, given
    as a function of the inputs. The green lines in the preceding diagram represent
    the error between each point and the predicted values. Summing each difference
    up, we would obtain our final error. Squaring the value would give us the sum
    of the squared residuals (Figure [1-48](#Fig48)). During the process of gradient
    descent, MSE is referred to as the cost function or the loss function of the model.
    To reiterate, the formula for MSE is shown in the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \textrm{Mean}\ \textrm{Squared}\ \textrm{Error}\ (MSE)=\frac{1}{n}\sum
    \limits_{i=1}^n{\left({\hat{y}}_i-{y}_i\right)}^2 $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equs.png)'
  prefs: []
  type: TYPE_IMG
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig48_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A graph plots height against foot size and depicts a straight line that rises
    from the bottom left to the top right and the straight lines from the five solid
    dots on top touch the straight line.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-48
  prefs: []
  type: TYPE_NORMAL
- en: MSE error calculation between estimation line and data point
  prefs: []
  type: TYPE_NORMAL
- en: Our goal is to minimize this function by finding a more accurate linear function
    that represents our data, which in turn increases the performance of our “model.”
    We could possibly find the line by brute force, adjusting the values of weight
    and bias based on errors; however, this quickly fails when the number of samples
    or features increases. This is where gradient descent comes in. The concept of
    gradient descent is similar to brute force, adjusting the values of weight and
    bias based on the error produced by previous values, but gradient descent does
    so according to formulas in a sophisticated manner.
  prefs: []
  type: TYPE_NORMAL
- en: Imagine if we plot different values of weight and bias against the value of
    the cost function. We would be able to visualize how changes in weight and bias
    would affect the value of the cost function. This visualization would be in a
    three-dimensional space. We can consider a slice through this space (say by fixing
    the bias as zero) and then visualize a simpler two-dimensional case with only
    the weight values as shown in Figure [1-49](#Fig49).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig49_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A line graph plots loss value against weight value and depicts a curve with
    a crest and two troughs, the least of which is labeled lowest loss.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-49
  prefs: []
  type: TYPE_NORMAL
- en: Loss plotted against weight values
  prefs: []
  type: TYPE_NORMAL
- en: The smallest loss sits at the lowest y value of the function, or when the derivative
    of the function is 0\. One might think that setting the derivative of the function
    to 0 would give us the optimal weight value. This would work for a convex function
    like MSE; however, it would not for the example loss function shown previously
    as there are multiple points where the derivative of the function is 0\. As introduced
    earlier, a common technique in machine learning to find the global minima of a
    function is gradient descent. Gradient descent aims to find the global minima
    using the gradient, or its partial derivatives, to take appropriate steps down
    to the global minima. Gradient descent takes careful steps toward the global minima,
    and with the right hyperparameter, it can “boost” itself through local minima
    to reach the desired global minima. Such techniques and parameters will be discussed
    in Chapter [3](525591_1_En_3_Chapter.xhtml). Recall from the section “Optimization
    and Gradient Descent” where a simple example of how gradient descent aims to search
    for the global minima of the function was shown. Linear Regression’s adaptation
    of gradient descent does involve some extra steps since we also have the bias
    to optimize and the derivation of the cost function MSE isn’t very straightforward.
    Note it is not necessary to understand the derivation shown in the following for
    later sections in the book. The same can apply to Logistic Regression’s version
    of gradient descent.
  prefs: []
  type: TYPE_NORMAL
- en: 'As mentioned earlier in the chapter, the algorithm uses the negative gradient
    of the cost function to determine the direction of descent, and the learning rate,
    *α*, contributes to how much of a step will the algorithm take. However, different
    from the equation previously in the chapter, we have a bias term, *ε*. Thus, instead
    of multiplying the derivative of the cost function by *α*, we will multiply it
    with the partial derivative with respect to the weight by *α* where *c* is our
    cost function, MSE. The value that we obtain with the preceding equation will
    be added to the current weight and thus become the new weight for another iteration.
    Note that in MSE, our ![$$ \hat{y} $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_IEq19.png)
    term is model prediction modeled by the line *y* = *βx* + *ε* and it will replace
    ![$$ \hat{y} $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_IEq20.png)
    during differentiation:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ -\alpha \cdotp \frac{\delta }{\delta \beta}c\left(\beta, \varepsilon \right)
    $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equt.png)'
  prefs: []
  type: TYPE_IMG
- en: We will only differentiate the weight and calculate the bias term at the end
    of gradient descent, and during the process of gradient descent, the bias will
    be set to 0\. Let’s differentiate *β* with respect to the cost function *c*.
  prefs: []
  type: TYPE_NORMAL
- en: We have the equation
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ c\left(\beta, \varepsilon \right)=\frac{1}{n}\sum \limits_{i=1}^n{\left(\beta
    {x}_i+\varepsilon -{y}_i\right)}^2 $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equu.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Let’s treat the expression inside brackets as a separate function and differentiate
    as a composite function, where *f*(*β*, *ε*)[*i*] = *βx*[*i*] + *ε* − *y*[*i*]:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ c\left(\beta, \varepsilon \right)=\frac{1}{n}\sum \limits_{i=1}^n{\left(f{\left(\beta,
    \varepsilon \right)}_i\right)}^2 $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equv.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Let’s apply the chain rule:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\delta }{\delta \beta}\ c\left(f{\left(\beta, \varepsilon \right)}_i\right)=\frac{\delta
    }{\delta \beta}\ c\left(\beta, \varepsilon \right)\frac{\delta }{\delta \beta}\
    f{\left(\beta, \varepsilon \right)}_i $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equw.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Let’s compute the derivatives for each function:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\delta }{\delta \beta}\ c\left(\beta, \varepsilon \right)=\frac{2}{n}\sum
    \limits_{i=1}^nf{\left(\beta, \varepsilon \right)}_i $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equx.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ \frac{\delta }{\delta \beta}\ f{\left(\beta, \varepsilon \right)}_i={x}_i
    $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equy.png)'
  prefs: []
  type: TYPE_IMG
- en: Our final answer becomes
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\delta }{\delta \beta}\ c\left(f{\left(\beta, \varepsilon \right)}_i\right)=\frac{\delta
    }{\delta \beta}\ c\left(\beta, \varepsilon \right)\frac{\delta }{\delta \beta}\
    f{\left(\beta, \varepsilon \right)}_i= $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equz.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ \frac{2}{n}\sum \limits_{i=1}^nf{\left(\beta, \varepsilon \right)}_i{x}_i=\frac{2}{n}\sum
    \limits_{i=1}^n\left(\beta {x}_i+\varepsilon -{y}_i\right){x}_i $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equaa.png)'
  prefs: []
  type: TYPE_IMG
- en: We can then plug in this value for ![$$ \frac{\delta }{\delta \beta}c\left(\beta,
    \varepsilon \right) $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_IEq21.png)
    and multiply this with −*α* to update the weight.
  prefs: []
  type: TYPE_NORMAL
- en: 'Finally, instead of differentiating the bias, we can estimate this value by
    setting it to the average difference between our prediction without the bias and
    the ground-truth values after training the weights with gradient descent:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \varepsilon =\frac{1}{n}\sum \limits_{i=1}^n\beta {x}_i-{y}_i $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equab.png)'
  prefs: []
  type: TYPE_IMG
- en: Implementation and Usage
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Continuing with our preceding example dataset along with the formulas presented,
    we can write down the following code (Listing [1-40](#PC40)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE39]'
  prefs: []
  type: TYPE_PRE
- en: Referring back to the equation of gradient descent introduced in the “Optimization
    and Gradient Descent” section and covered earlier in this section, we can then
    write down the following code (Listing [1-41](#PC41)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE40]'
  prefs: []
  type: TYPE_PRE
- en: Finally, we iterate through the gradient descent process, updating the weights
    according to the function. Using our example dataset defined previously, we can
    calculate the cost using MSE to see how much we’re improving with each iteration
    (Listing [1-42](#PC42)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE41]'
  prefs: []
  type: TYPE_PRE
- en: The beta or the weight value can be initialized randomly or set to a certain
    value(s) for producing deterministic results. In this case, we’ve set the weight
    to 1, obtaining a final MSE of around 46\. Plotting our results out as a “line
    of best fit,” we see that our line fits the trend of the data much better than
    our initial guess (Figure [1-50](#Fig50)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig50_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A graph plots height against foot size and depicts solid dots that tend to rise,
    dip, and then increase from left to right.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-50
  prefs: []
  type: TYPE_NORMAL
- en: Line of best fit produced by our own implementation of Linear Regression
  prefs: []
  type: TYPE_NORMAL
- en: The scikit-learn implementation of Linear Regression is simple to use, and due
    to a slight difference in the method used to calculate the weight and bias, scikit-learn’s
    Linear Regression will obtain a slightly better result than that of our own implementation.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE42]'
  prefs: []
  type: TYPE_PRE
- en: Note that we used `reshape(-1, 1)` on `foot_size` because in scikit-learn’s
    implementation when we have a single feature in our case, the data must be in
    the shape `(num_samples, 1),` and `reshape(-1, 1)` does just that (Listing [1-43](#PC43)).
    Calling the `fit` function with features and labels inputted performs the training
    process, and calling `predict` with features inputted outputs the prediction.
  prefs: []
  type: TYPE_NORMAL
- en: Our own implementation is far from perfect. In situations where the loss function
    is convex (such as the MSE loss function), using the Ordinary Least Squares (OLS)
    method may produce slightly better results. Essentially, OLS obtains the optimal
    result in one step by setting the derivative of the cost function to 0\. This
    ensures parameters obtained from the calculation are values at the global minima
    of the loss landscape. Another improvement that could be implemented is that we
    could try to differentiate the bias along with the weight and update it in the
    same manner; it may produce better results.
  prefs: []
  type: TYPE_NORMAL
- en: Other Variations on Simple Linear Regression
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: As mentioned before, Multiple Linear Regression refers to regression with multiple
    features or explanatory variables. Instead of singular values for features, we
    can treat them as vectors with the length being the number of features and the
    entirety of training data being a matrix in the shape of *number of samples* × *number
    of features*. Following, instead of a single weight value, it would be a vector
    with the length being the number of features (it’s viewed as a column matrix in
    order to be dotted with *X*). Thus, our equation for the line, or hyperplane,
    in this case of dimensions greater than 2, should be
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ y= X\beta +\varepsilon $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equac.png)'
  prefs: []
  type: TYPE_IMG
- en: where *X* is the feature matrix and *β* is the vector of weights. Instead of
    differentiating term by term, if we differentiate as a matrix, the final derivative
    we obtain becomes
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\delta }{\delta \beta}\ c\left(\beta, \varepsilon \right)=\frac{2}{n}\left(
    X\beta +\varepsilon -y\right){X}^{-1} $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equad.png)'
  prefs: []
  type: TYPE_IMG
- en: In order to implement Multiple Linear Regression, only a few minor changes need
    to be made in the code written previously.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE43]'
  prefs: []
  type: TYPE_PRE
- en: Observe that all multiplication sign has been changed to `np.dot` to reflect
    the dot product between matrices (Listing [1-44](#PC44)). In the `weight_deriv`
    function, `x.T` transposes the matrix `x`. Similarly, the gradient descent process
    needs to be adjusted if we’re still using the example dataset from earlier as
    we need to reshape the features into the correct shape in vector and matrix form
    (Listing [1-45](#PC45)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE44]'
  prefs: []
  type: TYPE_PRE
- en: When –1 is passed in during `reshape`, it simply means that the other dimension
    is set, and the –1 dimension must satisfy the original shape of the array. The
    function `flatten`, as the name suggests, flattens the array into a single-dimension
    vector. Note that the scikit-learn implementation is automatically compatible
    with Multiple Linear Regression. Nothing needs to be changed except when the number
    of features is more than one, `reshape(-1, 1)` is not needed.
  prefs: []
  type: TYPE_NORMAL
- en: In real-life machine learning applications, there rarely are times when one
    single variable would be able to form a perfect linear relation with the target
    variable. Most of the time it’s tens and hundreds of features, thus making Multiple
    Linear Regression a default for many data scientists.
  prefs: []
  type: TYPE_NORMAL
- en: Other variants of Linear Regression include LASSO (Least Absolute Shrinkage
    and Selection Operator), Ridge, and ElasticNet regressions, which introduce a
    regularization term that will prevent overfitting on train data leading to poor
    performance on testing data.
  prefs: []
  type: TYPE_NORMAL
- en: 'Ridge Regression introduces an L2 regularization term on the MSE cost function:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ c\left(\beta, \varepsilon \right)=\frac{1}{n}{\left\Vert X\beta +\varepsilon
    -y\right\Vert}_2^2+\lambda {\left\Vert \beta \right\Vert}_2^2 $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equae.png)'
  prefs: []
  type: TYPE_IMG
- en: The terms act as a penalty such that if the weight of the model gets too large,
    the value of the cost function will increase depending on the lambda parameter.
    Ridge Regression reduces overfitting by lowering the model complexity.
  prefs: []
  type: TYPE_NORMAL
- en: 'LASSO regression, on the other hand, introduces an L1 regularization term on
    the MSE cost function:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ c\left(\beta, \varepsilon \right)=\frac{1}{n}{\left\Vert X\beta +\varepsilon
    -y\right\Vert}_2^2+\lambda {\left\Vert \beta \right\Vert}_1 $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equaf.png)'
  prefs: []
  type: TYPE_IMG
- en: The L1 regularization can lead to 0 coefficients depending on the value of lambda,
    reducing overfitting while also accomplishing feature selection when certain coefficients
    are 0.
  prefs: []
  type: TYPE_NORMAL
- en: 'ElasticNet Regression uses both L1 and L2 regularizations, accomplishing both
    the goals of LASSO and Ridge regressions, further regularizing the model and preventing
    overfitting:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ c\left(\beta, \varepsilon \right)=\frac{1}{n}{\left\Vert X\beta +\varepsilon
    -y\right\Vert}_2^2+{\lambda}_1{\left\Vert \beta \right\Vert}_1++{\lambda}_2{\left\Vert
    \beta \right\Vert}_2^2 $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equag.png)'
  prefs: []
  type: TYPE_IMG
- en: The scikit-learn implementation of all three regressions can be used the same
    as Linear Regression while specifying the parameter lambda at the initialization
    of the object (Listing [1-46](#PC46)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE45]'
  prefs: []
  type: TYPE_PRE
- en: Finally, one other important variation of Linear Regression is Logistic Regression.
    In simple terms, Logistic Regression changes the cost function of Linear Regression,
    restraining the output between 1 and 0 to produce binary predictions for classification
    tasks. Logistic Regression will be covered more in detail during the next section.
  prefs: []
  type: TYPE_NORMAL
- en: Linear Regression serves as the beginner algorithm for hundreds and thousands
    of data scientists, for a reason. Not only gradient descent is used widely across
    many machine learning algorithms but modeling the trend of the data based on features
    is one of the crucial uses of machine learning to this day with applications in
    forecasting, business, medics, and many more.
  prefs: []
  type: TYPE_NORMAL
- en: Logistic Regression
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The logistic function first appeared in Pierre Francois Verhulst’s publication
    “Correspondance mathmematique et physique” in 1838\. Then later in 1845, a more
    detailed version of the logistic function was published by him. However, the first
    practical application of such a function wasn’t apparent until 1943 when Wilson
    and Worcester used the logistic function in bioassay. In the following years,
    various advances were made toward the function, but the original logistic function
    is used for Logistic Regression. The Logistic Regression model found its use not
    only in areas related to biology but also widely in social science.
  prefs: []
  type: TYPE_NORMAL
- en: 'Among many variants, the general goal of Logistic Regression remains the same:
    classification based on explanatory variables or features provided. It utilizes
    the sample principles of Linear Regression.'
  prefs: []
  type: TYPE_NORMAL
- en: Theory and Intuition
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'The logistic function is a broad term referring to a function with various
    adjustable parameters. However, Logistic Regression only uses one set of parameters,
    turning the function into what’s referred to as a sigmoid function:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ S(x)=\frac{1}{1+{e}^{-x}} $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equah.png)'
  prefs: []
  type: TYPE_IMG
- en: The sigmoid function is known to have an “S”-shaped curve with two horizontal
    asymptotes at *y* = 1 and *y* = 0 as shown in Figure [1-51](#Fig51). In other
    words, any value inputted to the function will be “squished” between 1 and 0.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig51_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A curve graph represents the S curve that intersects the vertical axis with
    the left end lies on the second quadrant and the right end lies on the first quadrant
    and is parallel to the horizontal axis.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-51
  prefs: []
  type: TYPE_NORMAL
- en: Sigmoid function
  prefs: []
  type: TYPE_NORMAL
- en: Although there are other variants of the sigmoid function that restrain the
    output at different values, such as the hyperbolic tangent function in which the
    output values are restrained between –1 and 1, binary classification on Logistic
    Regression uses the sigmoid function.
  prefs: []
  type: TYPE_NORMAL
- en: Logistic Regression operates on the same principles as those of Linear Regression,
    finding an equation that graphs a “line of best fit” of the data. In this case,
    the “line of best fit” will take the shape of the sigmoid function, while the
    labels are binary labels sitting either at *y* = 0 or *y* = 1.
  prefs: []
  type: TYPE_NORMAL
- en: The goal of binary classification is to predict outputs of either 1 (positive)
    or 0 (negative). One example could be to predict whether an animal is a cat based
    on the characteristics of its fur provided as numerical data. Logistic Regression’s
    predictions will be inputted through the sigmoid function and outputted as probabilities
    between 1 and 0, which represents how confident the model believes certain data
    sample belongs to one class (Figure [1-52](#Fig52)). Then the probability can
    be converted to binary outputs by setting a threshold. Usually, the choice is
    0.5; however, the performance of the model can vary if the threshold is not carefully
    selected. See ROC-AUC in the “Metrics and Evaluation” section for more details.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig52_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A line graph with scatterplot plots targets against features. The graph has
    an increasing curve with solid dots that plot horizontally along the vertical
    values 1.0 and 0.0\. Values are approximated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-52
  prefs: []
  type: TYPE_NORMAL
- en: Logistic Regression’s “line of best fit”
  prefs: []
  type: TYPE_NORMAL
- en: Although the process of gradient descent for Logistic Regression is the same
    as that of Linear Regression, the cost function would be different. MSE calculates
    the difference between two values in a regression-like situation. While it may
    be able to learn under classification situations, there are better cost functions
    where it suits the problem.
  prefs: []
  type: TYPE_NORMAL
- en: Recall from the preceding sigmoid function the *x* term will be our prediction
    outputted from the model by the linear function *y* = *Xβ* + *ε*, so the prediction
    function of Logistic Regression becomes
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ y=\frac{1}{1+{e}^{-\left( X\beta +\varepsilon \right)}} $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equai.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The output of this function is probability values ranging from 0 to 1, while
    our labels are discrete binary values. Instead of MSE, our cost function will
    be the log loss or sometimes called the binary cross-entropy (BCE):'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \textrm{Logloss}/ BCE=-\frac{1}{n}\sum \limits_{i=1}^n{y}_i\bullet \log
    \left(\hat{y_i}\right)+\left(1-{y}_i\right)\bullet \log \left(1-\left(\hat{y_i}\right)\right)
    $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equaj.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ \textrm{Where}\ \hat{y_i}=\frac{1}{1+{e}^{-\left({x}_i\beta +\varepsilon
    \right)}} $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equak.png)'
  prefs: []
  type: TYPE_IMG
- en: Note that in the preceding log loss, the *x* variable or the features are single
    values instead of a matrix as written in the sigmoid function. The probability
    represents how likely the prediction is 1; and vice versa, 1 − probability will
    be how likely the prediction will be 0\. Depending on the label, the cost function
    calculates the negative log-likelihood of the model prediction for each sample.
    Then the average of these values is the final cost.
  prefs: []
  type: TYPE_NORMAL
- en: In order to minimize this cost function, we take the exact same approach as
    Linear Regression, by using gradient descent. Different from Linear Regression,
    the bias term cannot be calculated after gradient descent. Thus, we will differentiate
    the weight along with bias and update them the same way. Now that we’re familiar
    with gradient descent, we will dive straight to Multiple Logistic Regression,
    or Logistic Regression where the training data has more than one feature. As a
    reminder, the features, *X*, will be in matrix form with shape number of samples × number
    of features as mentioned in Multiple Linear Regression; the ground-truth values,
    or the labels, will be a vector with the length being the number of samples; the
    weights, or *β*, will be a vector with the length being the number of features;
    finally, we will not be including the summation part of the loss as it’s simply
    taking the average of the result and will not affect the differentiation.
  prefs: []
  type: TYPE_NORMAL
- en: Differentiating the weight first, we have
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ c\left(\beta, \varepsilon \right)=-\left[y\bullet \mathit{\log}\left(\hat{y}\right)+\left(1-y\right)\bullet
    \mathit{\log}\left(1-\left(\hat{y}\right)\right)\right] $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equal.png)'
  prefs: []
  type: TYPE_IMG
- en: where
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \hat{y}=\frac{1}{1+{e}^{-x}} $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equam.png)'
  prefs: []
  type: TYPE_IMG
- en: We’ll refer to this function as *s*(*β*, *ε*) for sigmoid, where *x* = *Xβ* + *ε*.
  prefs: []
  type: TYPE_NORMAL
- en: This we’ll refer to as *p*(*β*, *ε*) for prediction. Using the chain rule, the
    derivative of the cost function becomes
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\delta }{\delta \beta}\ c\left(\beta, \varepsilon \right)=\frac{\delta
    }{\delta s}\ c\left(\beta, \varepsilon \right)\frac{\delta }{\delta p}\ s\left(\beta,
    \varepsilon \right)\frac{\delta }{\delta \beta}\ p\left(\beta, \varepsilon \right)
    $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equan.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Let’s calculate the derivative of each function:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\delta }{\delta s}\ c\left(\beta, \varepsilon \right)=-\left[\frac{y}{s\left(\beta,
    \varepsilon \right)}+\frac{1-y}{1-s\left(\beta, \varepsilon \right)}\right] $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equao.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ \frac{\delta }{\delta p}s\left(\beta, \varepsilon \right)=\frac{e^{-p}}{{\left(1+{e}^{-p}\right)}^2}=\frac{1}{1+{e}^{-p}}\left(1-\frac{1}{1+{e}^{-p}}\right)=s\left(\beta,
    \varepsilon \right)\bullet \left[1-s\left(\beta, \varepsilon \right)\right] $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equap.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ \frac{\delta }{\delta \beta}\ p\left(\beta, \varepsilon \right)=X $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equaq.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Let’s plug the derivatives back in:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\delta }{\delta \beta}\ c\left(\beta, \varepsilon \right)=-\left[\frac{y}{s\left(\beta,
    \varepsilon \right)}+\frac{1-y}{1-s\left(\beta, \varepsilon \right)}\right]\bullet
    s\left(\beta, \varepsilon \right)\bullet \left[1-s\left(\beta, \varepsilon \right)\right]\bullet
    X $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equar.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Here’s our final derivative:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ -\left[s\left(\beta, \varepsilon \right)-y\right]\bullet X=-\left[\frac{1}{1+{e}^{-\left(
    X\beta +\varepsilon \right)}}-y\right]\bullet X $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equas.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Here’s the differentiation of the bias term:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\delta }{\delta \varepsilon}\ c\left(\beta, \varepsilon \right)=\frac{\delta
    }{\delta s}\ c\left(\beta, \varepsilon \right)\frac{\delta }{\delta p}\ s\left(\beta,
    \varepsilon \right)\frac{\delta }{\delta \varepsilon}\ p\left(\beta, \varepsilon
    \right) $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equat.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ \frac{\delta }{\delta s}\ c\left(\beta, \varepsilon \right)=-\left[\frac{y}{s\left(\beta,
    \varepsilon \right)}+\frac{1-y}{1-s\left(\beta, \varepsilon \right)}\right] $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equau.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ \frac{\delta }{\delta p}s\left(\beta, \varepsilon \right)=\frac{e^{-p}}{{\left(1+{e}^{-p}\right)}^2}=\frac{1}{1+{e}^{-p}}\left(1-\frac{1}{1+{e}^{-p}}\right)=s\left(\beta,
    \varepsilon \right)\bullet \left[1-s\left(\beta, \varepsilon \right)\right] $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equav.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ \frac{\delta }{\delta \varepsilon}\ p\left(\beta, \varepsilon \right)=1
    $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equaw.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ \frac{\delta }{\delta \varepsilon}c\left(\beta, \varepsilon \right)=-\left[\frac{y}{s\left(\beta,
    \varepsilon \right)}+\frac{1-y}{1-s\left(\beta, \varepsilon \right)}\right]\bullet
    s\left(\beta, \varepsilon \right)\bullet \left[1-s\left(\beta, \varepsilon \right)\right]\bullet
    1 $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equax.png)'
  prefs: []
  type: TYPE_IMG
- en: The derivative for bias becomes
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ -\left[s\left(\beta, \varepsilon \right)-y\right]\bullet 1=-\left[\frac{1}{1+{e}^{-\left(
    X\beta +\varepsilon \right)}}-y\right] $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equay.png)'
  prefs: []
  type: TYPE_IMG
- en: 'We can update both the weight and bias based on the equation of gradient descent:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \textrm{new}\ \beta =\kern0.5em -\alpha \cdotp \frac{\delta }{\delta \beta}c\left(\beta,
    \varepsilon \right)+\beta $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equaz.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ \textrm{new}\ \varepsilon =\kern0.5em -\alpha \cdotp \frac{\delta }{\delta
    \varepsilon}c\left(\beta, \varepsilon \right)+\varepsilon $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equba.png)'
  prefs: []
  type: TYPE_IMG
- en: Implementation and Usage
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The code structure of Logistic Regression will be very similar to that of Linear
    Regression, only with the cost function and the derivatives modified accordingly
    to the equations shown previously (Listing [1-47](#PC47)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE46]'
  prefs: []
  type: TYPE_PRE
- en: The gradient descent process is very similar to Linear Regression except that
    we update the bias too (Listing [1-48](#PC48)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE47]'
  prefs: []
  type: TYPE_PRE
- en: Combining everything, the implementation for Logistic Regression is shown in
    the following. We can use scikit-learn’s function to create an example dataset
    for classification with a single feature and 20 samples (Listing [1-49](#PC49)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE48]'
  prefs: []
  type: TYPE_PRE
- en: Due to some differences in implementation, scikit-learn’s Logistic Regression
    yields better results than ours. The usage is simply instantiating the object
    and calling fit (Listing [1-50](#PC50)). One thing to note here, in our implementation,
    the `predict` function returns raw probabilities from the sigmoid function, while
    scikit-learn’s `predict` function returns binary labels. To retrieve the probabilities,
    we need to call `predict_proba`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE49]'
  prefs: []
  type: TYPE_PRE
- en: Other Variations on Logistic Regression
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Both the L1 and L2 regularizations can be applied to Logistic Regression and
    perform the same task as regularizing Linear Regression, to prevent overfitting.
    Scikit-learn supports L1, L2, and elastic net regularizations. It uses a parameter
    named C, which controls the inverse regularization strength, or *C* = 1/*λ* where
    *λ* is the hyperparameter in L1 and L2 regularizations. The specific type of regularization
    can be specified with the `penalty` parameter (Listing [1-51](#PC51)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE50]'
  prefs: []
  type: TYPE_PRE
- en: One other important variation is known as Multinomial Logistic Regression. Normally,
    binomial, or the concept of Logistic Regression that we’ve been working with,
    deals with data that contain two classes. However, in Multinomial Logistic Regression,
    labels are given in “multiclass form” where there are more than two classes. To
    illustrate, instead of predicting between cats and dogs, the model might have
    to predict ten different types of animals.
  prefs: []
  type: TYPE_NORMAL
- en: 'The labels in multiclass classification are given in the shape of number of
    samples × number of classes. Following, the weights are in matrices with dimension
    number of features × number of classes. Normally, we would use the sigmoid function
    after plugging the weights and biases into *y* = *Xβ* + *ε*. However, due to the
    nature of multiclass classification, instead of outputting a vector with the length
    being the number of samples, a matrix with the shape number of samples x number
    of classes is produced. Thus, sigmoid would not be appropriate. Instead, the softmax
    function is used. Softmax outputs the prediction matrix in which each class contains
    its own probability and the final class is the class with the highest probability:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \textrm{Softmax}(x)=\frac{e^x}{\sum \limits_{i=1}^n{e}^{x_i}} $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equbb.png)'
  prefs: []
  type: TYPE_IMG
- en: In scikit-learn, Multinomial Logistic Regression is defined with the parameter
    `multi_class=”multinomial”` when instantiating the object (Listing [1-52](#PC52)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE51]'
  prefs: []
  type: TYPE_PRE
- en: Both Linear and Logistic regressions have apparent disadvantages that outweigh
    themselves compared with more complex deep learning methods. Linear Regression
    assumes a linear relationship between features and labels, while Logistic Regression
    assumes features are related to targets by log odds, which sets a major boundary
    to many real-world datasets as most of them cannot be modeled solely with linear
    or logarithmic relationships. Especially with Logistic Regression, linearly separable
    data is rarely found in real-world scenarios. Later, we will look at newer classical
    machine learning algorithms that introduce completely new concepts that address
    some of the disadvantages of regression methods.
  prefs: []
  type: TYPE_NORMAL
- en: Decision Trees
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The concept of Decision Trees appeared in the 1960s in the field of psychology
    for modeling the concept of human learning, visually presenting possible outcomes
    to potential situations that stem from one prompt. It was around that time when
    people discovered the usefulness of Decision Trees in programming and mathematics.
    The first paper that was able to develop a concept of “Decision Tree” mathematically
    was published by William Belson in 1959\. In 1977, various professors from Berkley
    and Stanford developed an algorithm known as Classification and Regression Trees
    (CART), which, true to its name, consisted of Classification and Regression Trees.
    To this day, CART still stands as an important algorithm for data analysis. In
    the field of ML, Decision Tree serves as one of the most popular algorithms for
    real-world data science problems.
  prefs: []
  type: TYPE_NORMAL
- en: Theory and Intuition
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Decision Trees serve as a tool that models the outcomes of observations in
    a visually interpretable format. It consists of nodes and branches, which stem
    from a root. Consider the following example of a series of choices. The first
    question asked “What color is the coin?” is called the root of the tree. Each
    possible outcome to the question is represented under nodes that branch out from
    the root. Imagine flipping a coin. There are two possible outcomes, heads or tail.
    Following the outcome of “Silver” to the question asked, we can continue the splitting
    process by asking another question: “What size is the coin?” For questions that
    are not the root, they’re considered parent nodes. Once we’ve answered all possible
    questions and created every node to their possible outcomes, the final nodes are
    called leaf nodes (Figure [1-53](#Fig53)).'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig53_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A decision tree illustrates the root, branches, parent nodes, and leaf nodes
    involved to identify whether the coin is a penny, a nickel, a quarter, a dollar
    coin, or a dime.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-53
  prefs: []
  type: TYPE_NORMAL
- en: Decision Tree example
  prefs: []
  type: TYPE_NORMAL
- en: In a sense, Decision Trees can store and organize data based on their attributes.
    The ML concept of Decision Trees utilizes this intuition to categorize or classify
    data based on the patterns of their features. By splitting the samples according
    to their associated features, Decision Trees can be trained to learn different
    patterns in the data. Using this method, Decision Trees can handle high-dimensional
    data with ease as their approach differs greatly from KNN and regression methods.
    One of the major advantages of Decision Trees over the regression method is their
    interoperability as seen previously. It would be hard to visualize the gradient
    descent process on high-dimensional data but not for Decision Trees.
  prefs: []
  type: TYPE_NORMAL
- en: 'With features and targets, Decision Trees seek the best “questions” to ask
    in the best order to split the data that resembles those assigned by the targets.
    Take the Titanic dataset for example. It contains features about travelers on
    the Titanic such as their age, sex, cabin, fare, and so on. The aim is to predict
    whether someone survived based on their attributes given. A Decision Tree would
    split the data as follows; the process is demonstrated in Figure [1-54](#Fig54):'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig54_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A decision tree diagram illustrates the steps involved to find whether the male
    traveler survived or not.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-54
  prefs: []
  type: TYPE_NORMAL
- en: An example Decision Tree on the Titanic dataset
  prefs: []
  type: TYPE_NORMAL
- en: Choose a feature that best splits the data.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For that feature, choose a threshold that would best split the data by its labels.
    A threshold for a categorical feature could be true/false, or if the feature contains
    more than one category, it would be converted to numbers representing each class
    and treated as a continuous feature.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For each node that the split produces, repeat the preceding steps until the
    data is perfectly split, meaning that each node contains exactly one class or
    the max split, depth, defined by the user is reached.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Simply stating “choosing the best feature to split the data” isn’t enough.
    Decision Trees utilize metrics that measure the “impurity” of data, which determines
    how well the data is split. If data samples only contain one class, it’s pure;
    on the other hand, if data samples contain half of one class and half of the other
    class, it’s considered impure and anything in between. The two common metrics
    used to determine impurity in Decision Trees are Gini Impurity and Entropy as
    shown in the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \textrm{Gini}\ \textrm{Impurity}=1-\sum \limits_{i=1}^n{p}_i^2 $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equbc.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ \textrm{Entropy}=-\sum \limits_{i=1}^n{p}_i\bullet {\log}_2{p}_i $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equbd.png)'
  prefs: []
  type: TYPE_IMG
- en: In both equations, *p* is the probability of class *i*, or the percentage of
    samples that belong to class *i* in a node after a split. Gini Impurity sits inside
    the interval [0, 0.5], while vales of Entropy sit inside the interval [0, 1].
    However, the difference between the two is minimal as seen in the following. When
    the values of Gini Impurity×2 (to scale with Entropy) and Entropy are plotted
    against the probability of a class, their output varies little as the input ranges
    from 0 to 1 (Figure [1-55](#Fig55)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig55_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A graph plots a solid and a dashed downward open parabola that intersect at
    the origin, point (0.45, 1), and (1, 0). Values are approximated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-55
  prefs: []
  type: TYPE_NORMAL
- en: Gini Impurity compared with Entropy where solid is Gini x 2 and dotted is Entropy
  prefs: []
  type: TYPE_NORMAL
- en: However, computationally Entropy is more complex as it requires the use of logarithms,
    so Gini Impurity is usually the metric used in the Decision Tree to determine
    splits. During the split of each node, we treat the unique values of the feature
    as one threshold, loop through all the thresholds, and calculate its respective
    Gini Impurity. We perform the preceding process for every feature and then determine
    the best Gini Impurity, which we will split the data according to its threshold.
    As mentioned before, the splitting continues until each node is pure or a user-specified
    hyperparameter “depth” is reached.
  prefs: []
  type: TYPE_NORMAL
- en: The depth hyperparameter decides how many “levels” of nodes should there be
    in a Decision Tree. Technically, the deeper a Decision Tree is, the higher the
    performance would be as the splits get more specific. Although increasing the
    depth may improve performance, most of the time it only applies to training data
    as the tree overfits easily with a high amount of depth, leading to worse performance
    on unseen testing data.
  prefs: []
  type: TYPE_NORMAL
- en: Implementation and Usage
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Note here that looping through each specific threshold for each feature and
    computing its Gini Impurity is painfully slow as its time complexity results in
    *O*(*N*²). Instead, we can sort the features and treat each unique value as a
    threshold and then compute the Gini Impurity as a weighted average between the
    left and the right splits while keeping track of the number of samples in each
    class on both sides of the split. As we move on to the next threshold, we can
    decrease/increase the class count on both sides. More details are shown in the
    following in the code (Listing [1-53](#PC53)). In the implementation of Decision
    Tree, we will be defining classes instead of stand-alone functions as it makes
    things a lot easier to work with.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE52]'
  prefs: []
  type: TYPE_PRE
- en: Each time the `find_best_split` function is called, it’s performing a split
    based on the data of the node, using the samples split by the previous step on
    the node a level above the current one. We will then define a node class that
    will keep track of all the data, threshold, and features of the split, and we
    can build a Decision Tree recursively (Listing [1-54](#PC54)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE53]'
  prefs: []
  type: TYPE_PRE
- en: Note that the following methods will be in the DecisionTree class (Listing [1-55](#PC55)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE54]'
  prefs: []
  type: TYPE_PRE
- en: For the prediction method, we will keep going down the tree on the appropriate
    side depending on the split until we reach the leaf node where there’s no left
    or right node left. We simply return majority_class as our prediction (Listing
    [1-56](#PC56)). The predict method will also belong to the DecisionTree class.
    In the _predict method, we perform splits on the data according to trained thresholds,
    while in the predict method, we loop through the whole X dataset to perform prediction
    on every sample.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE55]'
  prefs: []
  type: TYPE_PRE
- en: To use our implemented Decision Tree, we simply need to instantiate the object
    and call fit with our respective datasets and then call predict for inference
    (Listing [1-57](#PC57)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE56]'
  prefs: []
  type: TYPE_PRE
- en: For the scikit-learn implementation (Listing [1-58](#PC58)), the usage is the
    exact same as our own implementation.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE57]'
  prefs: []
  type: TYPE_PRE
- en: The implementation that we wrote earlier does not support multiclass classification.
    However, the scikit-learn implementation supports multiclass natively without
    having to specify any extra parameters. Scikit-learn also provides an implementation
    for Regression Trees that predicts continuous values (Listing [1-59](#PC59)).
    The intuition of Regression Trees is the exact same as Classification Trees other
    than that instead of Gini Impurity, we use MSE to evaluate how good is each split
    while the prediction of each node is determined by the average of the data samples.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE58]'
  prefs: []
  type: TYPE_PRE
- en: Random Forest
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Random Forest is an algorithm that provides some crucial improvements to the
    design of Decision Trees. Simply put, Random Forest is an ensemble of many smaller
    Decision Trees working together. Random Forest uses the simple concept that the
    wisdom of crowds is always better than one strong individual. By using lowly correlated
    small Decision Trees, their ensemble of predictions can outperform any single
    Decision Tree. The technique that Random Forest uses to ensemble smaller Decision
    Trees is called bagging. Bagging, also known as bootstrap aggregation, is randomly
    drawing different subsets, with replacements, from the training data, and the
    final prediction is decided by majority voting.
  prefs: []
  type: TYPE_NORMAL
- en: Random Forest selects subsets of data from the entirety of training data and
    trains Decision Trees on each of the subsets separately and then combines the
    results based on majority voting or averaging for classification or regression,
    respectively (Figure [1-56](#Fig56)). When building Random Forest, it’s important
    to notice that not every feature is selected for building each Decision Tree to
    create diversity while solving the Curse of Dimensionality problem. The ensemble
    of multiple Decision Trees makes Random Forest very stable in terms of performance.
    However, Random Forest does come with downfalls as it’s fairly difficult to interpret
    and is substantially slower than Decision Trees. Due to their speed and interoperability,
    Decision Trees are usually chosen over Random Forest during quick tests on smaller
    sets of data. Random Forest is suitable when interoperability is not needed along
    with a large dataset.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig56_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A partially shaded 5 by 5 table is divided into four 2 by 2 tables that are
    subdivided further with four predictions that lead to the final prediction.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-56
  prefs: []
  type: TYPE_NORMAL
- en: Random Forest concept
  prefs: []
  type: TYPE_NORMAL
- en: 'Broadly, this technique is known as bagging, or *b*ootstrap *ag*gregat*ing*.
    It’s an interesting idea: without adding any new data, knowledge, or unique learning
    algorithms, we can increase a model’s performance simply by injecting randomness
    into the system. We train an ensemble of models, where each one is trained on
    a randomly selected subset of the data; after training, the predictions of this
    ensemble are aggregated to form the final prediction.'
  prefs: []
  type: TYPE_NORMAL
- en: Interestingly, Random Forest reliably performs better than Decision Tree in
    most cases. Even given the commonly used explanation of “diversity” and “many
    thinkers are better than one,” it can be confusing to understand exactly why bagging
    increases performance if it doesn’t actually introduce unique new learning structures.
  prefs: []
  type: TYPE_NORMAL
- en: Decision Tree algorithms are generally high-variance algorithms (recall the
    bias-variance trade-off discussed in the “Fundamental Principles of Modeling”
    section). An unregulated Decision Tree will continue to construct nodes and branches
    to fit noisy data with little effort toward generalizing or identifying broad
    trends. We can intuitively understand the behavior of the Decision Tree as something
    like the very noisy sine wave displayed in Figure [1-57](#Fig57).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig57_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A graph displays an uneven wave that oscillates and forms a wave that evenly
    oscillates and resembles a sine wave.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-57
  prefs: []
  type: TYPE_NORMAL
- en: Visualization of high-variance intuition
  prefs: []
  type: TYPE_NORMAL
- en: Now, we will draw ten “bootstrapped” sine waves. Each bootstrapped sine wave
    (shown as transparent) consists of a randomly sampled 20% of points from the original
    sine wave. Then, we “aggregate” these bootstrapped sine waves together to form
    a “bagged” sine wave, in which each point is informed by averaging nearby values
    from bootstrapped waves. The resulting wave is visibly smoother, resembling a
    more generalized and stable curve than before bootstrap aggregating (Figure [1-58](#Fig58)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig58_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A graph displays an uneven light wave that oscillates across a solid sine wave
    that oscillates evenly.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-58
  prefs: []
  type: TYPE_NORMAL
- en: Visualization of bagging to mitigate variance intuition
  prefs: []
  type: TYPE_NORMAL
- en: Thus, we can understand bagging as *mitigating variance* in a base model by
    introducing a bias effect. Using this, we can also deduce that bagging does not
    generally work well on models that are already high bias; this has indeed been
    empirically observed.
  prefs: []
  type: TYPE_NORMAL
- en: The implementation of Random Forest from scikit-learn is shown in Listing [1-60](#PC60).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE59]'
  prefs: []
  type: TYPE_PRE
- en: Tree methods like Random Forest and Decision Trees brought much diversity into
    the classical machine learning field as they utilize completely different techniques
    while solving many problems in previous algorithms. Tree-based methods are one
    of the fastest high-performing algorithms, and the concept of them is adapted
    into better algorithms including Gradient Boosting and some deep learning algorithms.
    The last chapter of Part 2 is dedicated to deep learning models, which take inspiration
    from tree-based models.
  prefs: []
  type: TYPE_NORMAL
- en: Gradient Boosting
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Gradient Boosting describes a certain technique in modeling with a variety
    of different algorithms that are based upon it. The first successful algorithm
    that utilizes Gradient Boosting is AdaBoost (Adaptive Gradient Boosting) in 1998
    formulated by Leo Breiman. In 1999, Jerome Friedman composed the generalization
    of boosting algorithms emerging at this time, such as AdaBoost, into a single
    method: Gradient Boosting Machines. Quickly, the idea of Gradient Boosting Machines
    became extremely popular and proved to be high performing in many real-life tabular
    datasets. To this day, various Gradient Boosting algorithms such as AdaBoost,
    XGBoost, and LightGBM are the first choice for many data scientists operating
    on large, difficult datasets.'
  prefs: []
  type: TYPE_NORMAL
- en: Theory and Intuition
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Gradient Boosting operates on similar ideas to those of Random Forest, using
    an ensemble of weaker models to build one, strong prediction. What differentiates
    Gradient Boosting from Random Forest is that instead of having individual, uncorrelated
    models, Gradient Boosting constructs models that are based on others’ errors to
    continuously “boost” the performance.
  prefs: []
  type: TYPE_NORMAL
- en: Say you’re picking a team of five people to represent your school, organization,
    or country at a trivia tournament in which the team that can answer the most questions
    about music, history, literature, mathematics, science, etc. wins. What is your
    strategy? You could pick five people who each have broad and overlapping knowledge
    of most topics likely to be covered (a Random Forest–style ensembling approach).
    Perhaps a better approach is to pick a person A who’s really good in one area,
    then pick and train person B on the topics that person A isn’t a specialist in,
    then pick and train person C on the topics that person B isn’t a specialist in,
    and so on. By boosting learners on top of each other, we can build sophisticated
    and adaptive ensembles.
  prefs: []
  type: TYPE_NORMAL
- en: The concept of Gradient Boosting can be adapted to many different machine learning
    models such as Linear Regression, Decision Trees, and even deep learning methods.
    However, the most common use of Gradient Boosting is in conjunction with Decision
    Trees or tree-based methods in general. Although there have emerged various popular
    Gradient Boosting models, their initial and core intuition relies on the same
    algorithm; thus, we will be analyzing the original Gradient Boosting process while
    briefly going over the differences in each specific type of Boosting model.
  prefs: []
  type: TYPE_NORMAL
- en: Gradient Boosting naively adapts to both regression and classification. We can
    start by understanding the regression approach first as demonstrated in Figure
    [1-59](#Fig59).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig59_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: An illustration depicts a table with features and labels that lead to the first
    leaf, and predicts pseudo residuals with labels 39, T hash 1, and T hash 2.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-59
  prefs: []
  type: TYPE_NORMAL
- en: Visualization of Gradient Boosting
  prefs: []
  type: TYPE_NORMAL
- en: Assuming the target variable is continuous, create a leaf with the average of
    the targets, which represents our initial guess of the labels.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Build a Regression Tree based on the errors of the first leaf. More specifically
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Calculate the error between our initial prediction and ground-truth labels for
    every sample, which we refer to as pseudo residuals.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Construct a Regression Tree to predict the pseudo residuals of samples with
    a restricted number of leaves. Replace leaves with more than one label with the
    average of all labels that are in the leaf, which will be the prediction for that
    leaf.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Predict the target variables with a trained Decision Tree as follows:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Start with the initial prediction, which is the average of all labels.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Predict pseudo residuals using the Decision Trees we trained.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Add predictions to the initial guess multiplied by a factor that we refer to
    as the learning rate, which becomes the final prediction.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Calculate new pseudo residuals based on the prediction of the previous model(s).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Construct a new tree to predict the new pseudo residuals, repeating steps 2–4\.
    For step 3, we simply add the new tree’s prediction and multiply by the same learning
    rate along with other trees that were created in previous iterations.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Repeat steps 2–4 until the maximum specified models are reached or the predictions
    start to worsen.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The approach for Gradient Boosting classification is extremely like regression.
    During our first initial “guess,” instead of the average across targets, we compute
    the log odds on the labels. In order to calculate the pseudo residuals, we convert
    the log odds to probability using the sigmoid function:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \textrm{Log}\ \textrm{Odds}=\log \left(\frac{\textrm{number}\ \textrm{of}\
    \textrm{positive}\ \textrm{samples}}{\textrm{number}\ \textrm{of}\ \textrm{negative}\
    \textrm{samples}}\right) $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Eqube.png)'
  prefs: []
  type: TYPE_IMG
- en: 'In binary labels, we treat positive samples as 1 and negative samples as 0\.
    Then, using the probabilities we calculated, we subtract each of them from their
    respective labels to obtain pseudo residuals. Just like regression, we construct
    a tree to predict the pseudo residuals based on the features. Again, with a restricted
    number of leaves, there will be leaves where more than one value is present. Since
    our leaf values are derived from probability while our prediction is in log odds,
    we need to apply transformations to the leaf predictions using a common formula
    as shown in the following. The summation sign represents the sum across all values
    in the same leaf, if any. *P* refers to the previous tree’s, or leaf’s, predicted
    probability:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\sum \textrm{residuals}\ \textrm{in}\ {\textrm{leaf}}_i}{\sum {P}_i\left(1-{P}_i\right)}
    $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equbf.png)'
  prefs: []
  type: TYPE_IMG
- en: After updating the prediction values in every leaf, we essentially perform the
    same procedures as those shown in regression, continuously building trees off
    the previous ones’ errors until a user-specified parameter is reached or our predictions
    stop improving.
  prefs: []
  type: TYPE_NORMAL
- en: The approach described previously is a generalization of many Gradient Boosting–based
    algorithms. In the sections that follow, we’re going to briefly cover some of
    the most popular ones and their respective implementations.
  prefs: []
  type: TYPE_NORMAL
- en: AdaBoost
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Adaptive Gradient Boosting, or AdaBoost, is one of the earliest forms of Gradient
    Boosting. It was published before the generalization of Gradient Boosting Machines
    was proposed. The main idea that drives AdaBoost lies in the fact it uses weighted
    stumps, which combine into the final prediction. A stump is a Decision Tree with
    a root and only two leaves. The process of training an AdaBoost model is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: Assign each sample the same weight, ![$$ \frac{1}{\textrm{number}\ \textrm{of}\
    \textrm{samples}} $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_IEq22.png).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Train a stump, or a Decision Tree, with only one split as mentioned above, predicting
    the targets.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Calculate the amount of error that the trained stump makes. The amount of error
    is defined as the sum of the weights across all incorrectly classified samples.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Calculate the weight of the trained stump, defined as follows:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![$$ \textrm{Weight}=\frac{1}{2}\ \log \left(\frac{1-\textrm{error}}{\textrm{error}}\right)
    $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equbg.png)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: In practice, a small amount of extra error is added to prevent division by 0.
  prefs: []
  type: TYPE_NORMAL
- en: Adjust sample weight on training data accordingly. We increase the sample weights
    of each incorrectly classified sample by original sample weight ∙ *e*^(weight
    of stump). On the other hand, we decrease each correctly classified sample weight
    by original sample weight ∙ *e*^(−weight of stump).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Adjust, or normalize, sample weights to add up to 1\. We divide each sample
    weight by the sum of all sample weights.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Repeat steps 2–6 using weighted Gini Impurity to train stumps until a user-specified
    parameter is reached or model performance stopped increasing.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: When samples are passed through for prediction, the final prediction is determined
    by trees that classified one class, which has a total weight more than the trees
    that classified the other class.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The implementation in scikit-learn is shown in Listing [1-61](#PC61).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE60]'
  prefs: []
  type: TYPE_PRE
- en: If the stumps in AdaBoost are replaced with regression stumps, AdaBoost is capable
    of performing regression tasks too. Implementation for AdaBoost Regressor is shown
    in Listing [1-62](#PC62).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE61]'
  prefs: []
  type: TYPE_PRE
- en: XGBoost
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: XGBoost, short for Extreme Gradient Boosting, was developed in the early 2010s
    as a regularized variation of Gradient Boosting Machines. The development of XGBoost
    began as a research project by Tianqi Chen as part of the Distributed Machine
    Learning Community. It was then later popularized to the Machine Learning and
    Data Science Community during the Higgs Boson Machine Learning competition in
    2014\. Compared with AdaBoost, XGBoost is a lot more optimized for speed and performance
    and closely resembles the original approach of Gradient Boosting Machines.
  prefs: []
  type: TYPE_NORMAL
- en: 'The general steps taken to train an XGBoost are listed as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: Initialize a random prediction. This can be any number regardless of the classification
    of regression; a typical value is 0.5.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Similar to Gradient Boosting, we construct a Decision Tree to predict the pseudo
    residuals.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Start with a single leaf with all the pseudo residuals and calculate a similarity
    score across all residuals using the following formula where *r*[*i*] is the *i*^(*th*)pseudo
    residual and *λ* is a regularization term:'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '![$$ \frac{{\left(\sum \limits_{i=1}^n{r}_i\right)}^2}{n+\lambda } $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equbh.png)'
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_IMG
- en: 'Find the best split similar to that of the Decision Tree. However, the metric
    we use to evaluate the effectiveness of a split differs from the Gini Impurity.
    The split that results in the greatest “gain” is chosen:'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '![$$ \textrm{Gain}=\left(\textrm{Leaf}\ {\textrm{Similarity}}_{\textrm{left}}+\textrm{Leaf}\
    {\textrm{Similarity}}_{\textrm{right}}\right)-\textrm{Root}\ \textrm{Similarity}
    $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equbi.png)'
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_IMG
- en: Continue building the tree until the user-specified parameter is reached.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: A pruning parameter is specified, *γ*, which will remove certain nodes if the
    gain of the split is less than *γ*. This helps with regularization.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Calculate the output of prediction in each leaf by using the following formula:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![$$ \textrm{Prediction}=\frac{\sum \limits_{i=1}^n{r}_i}{n+\lambda } $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equbj.png)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Similar to Gradient Boosting, our final prediction is the initial leaf plus
    some learning rate that we define multiplied by the output of the trees. After
    the first tree is built, its prediction will be used to calculate new residuals
    and build new trees, until a user-specified parameter is satisfied.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Instead of using scikit-learn for implementation, XGBoost has its own library
    that provides functionalities and syntax structure similar to that of scikit-learn
    models (Listing [1-63](#PC63)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE62]'
  prefs: []
  type: TYPE_PRE
- en: LightGBM
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: LightGBM, short for Light Gradient Boosting Machines, is an optimized Gradient
    Boosting algorithm that aims for reduced memory usage and speed while keeping
    the performance high. Developed by Microsoft in 2016, LGBM quickly gained popularity
    due to the advantages stated above along with its capability of handling large-scale
    data with parallel computing on GPUs.
  prefs: []
  type: TYPE_NORMAL
- en: One major difference between LGBM and other similar Gradient Boosting algorithms
    is the fact that Decision Trees grow leaf-wise in LGBM, while in other cases they
    grow level-wise. Leaf-wise growth handles overfitting better than level-wise and
    is much faster when operating on large datasets. Additionally, level-wise growth
    produces many unnecessary leaves and nodes. In contrast, leaf-wise growth only
    expands on nodes with high performance, thus keeping the number of decision nodes
    constant.
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, LGBM samples the datasets using two novel techniques known as Gradient-Based
    One-Side Sampling (GOSS) and Exclusive Feature Bundling (EFB), which reduce the
    size of the dataset without affecting performance.
  prefs: []
  type: TYPE_NORMAL
- en: GOSS samples the dataset aiming for the model to focus on data points where
    there’s a larger error. By the concept of gradient descent, samples with lower
    gradients produce lower training error and vice versa. GOSS selects samples with
    a greater absolute gradient. Note that GOSS also chooses samples that have relatively
    lower gradients as it keeps the distribution of the output data like before GOSS.
  prefs: []
  type: TYPE_NORMAL
- en: The goal of EFB is to eliminate, or more appropriately merge, features. The
    algorithm bundles features that are mutually exclusive, meaning that they could
    never be of the same value simultaneously. The bundled features are then converted
    to a single feature, reducing the size and dimensionality of the dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, LGBM performs binning on continuous features to decrease the number
    of possible splits during Decision Tree building, introducing another major speedup
    to the algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: Microsoft has its own library for implementing LGBM and provides simple and
    scikit-learn-like syntax as shown in Listing [1-64](#PC64).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE63]'
  prefs: []
  type: TYPE_PRE
- en: Summary of Algorithms
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '| **Algorithm Name** | **Description** | **Advantages** | **Disadvantages**
    |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| KNN | Determines final classification based on the values of K-Nearest Neighbors
    | Simple, requires no training phase | Performs poorly with large datasets and
    takes a long time to train and find the optimal K value |'
  prefs: []
  type: TYPE_TB
- en: '| Linear Regression | Finds a linear relationship, aka the line of best fit
    to the given regression dataset | Simple, interpretable | Cannot model complex
    nonlinear relationships |'
  prefs: []
  type: TYPE_TB
- en: '| Logistic Regression | Finds a line of best fit to the given classification
    dataset | Simple, interpretable | Cannot model complex nonlinear relationships
    |'
  prefs: []
  type: TYPE_TB
- en: '| Decision Tree | Splits data based on attributes to produce the result | Immune
    to the Curse of Dimensionality, can model nonlinear relationships | Can overfit
    easily and requires a large amount of hyperparameter tuning |'
  prefs: []
  type: TYPE_TB
- en: '| Random Forest | Ensemble of smaller Decision Trees | Immune to the Curse
    of Dimensionality, can model nonlinear relationships, and generalizes well | Takes
    longer to train and requires a large amount of hyperparameter tuning |'
  prefs: []
  type: TYPE_TB
- en: '| Gradient Boosting | Ensemble of weak learners, each trying to correct the
    errors of the previous one | Immune to the Curse of Dimensionality, can model
    nonlinear relationships, and flexible in terms of modeling | Sensitive to outliers,
    requires a large amount of hyperparameter tuning |'
  prefs: []
  type: TYPE_TB
- en: Thinking Past Classical Machine Learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Throughout this chapter, we’ve taken a comprehensive look at many key classical
    machine learning principles, concepts, and algorithms. These govern many important
    applications of automated learning across vast ranges of disciplines and remain
    an important bedrock for the continually developing vision of self-learning computers.
  prefs: []
  type: TYPE_NORMAL
- en: However, at a certain point, classical machine learning became too limited for
    ambitious new directions and ideas. As more sophisticated forms of data like images
    and text became more abundant, there was a need to effectively model high-dimensional
    *specialized* data forms that classical machine learning could not satisfy.
  prefs: []
  type: TYPE_NORMAL
- en: '*Deep learning* is, on a very general level, the study of *neural networks*.
    Neural networks are more of an idea or governing concept rather than a concrete
    algorithm. (Chapter [3](525591_1_En_3_Chapter.xhtml) is dedicated to exploring
    the technical specifics of how standard feed-forward neural networks operate and
    how you can apply them to tabular data.) Because they are so versatile and manipulatable,
    deep learning has never been short of applications and new research directions
    since computational power and data availability in the late 2000s and early 2010s
    made rapid experimentation possible.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Deep learning powers many important applications, such as the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Object recognition*: A deep learning model can identify the presence of an
    object or multiple objects in an image. This has applications in security (automatically
    detected unwanted entities), self-driving cars and other robotics, biology (recognizing
    very small biological objects), and more.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Image captioning*: Applications like Microsoft Word suggest automatic alternative
    descriptions for images put into a document. To caption an image, a deep learning
    model needs to extract visual information from an image, develop an internal representation
    of what the image “means,” and translate that representation into natural language.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Image colorization*: Prior to the invention of color-capturing cameras, photographs
    of the world were taken in black-and-white. Deep learning can bring these grayscale
    images “back to life” by inferring colors from the image, as well as performing
    similar tasks like restoring damaged images or performing corrections on corrupted
    photos.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Art generation*: Deep learning can, through several different well-documented
    methods, create meaningful computer-generated art with little to no human involvement
    in the creation of each individual artwork.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Protein folding prediction*: Proteins are chains of amino acids that serve
    important biological roles in living organisms. The function of a protein is dependent
    on its shape, which is dictated by how individual amino acids linked in a sequence
    repel or attract each other to form intricate protein folding. Understanding the
    shape of a protein gives biologists a tremendous amount of information about its
    function and how to manipulate it (e.g., to disable a malicious protein or to
    design a protein to disable another malicious biological object). Protein folding
    was an unsolved problem until DeepMind released the AlphaFold model in 2020, which
    obtained extraordinarily high accuracy in predicting the shape of previously unknown
    proteins.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Text generation*: Neural networks can generate text to inform and entertain.
    One application of “speaking models” is in conversational chatbots, like AI-based
    therapy services that provide a natural interface to get counsel and company with
    the advantage of perhaps being more discreet and carefree than talking with a
    real human. These can also be used to help developers with coding by inferring
    the developer’s intent and helping autocomplete code, sometimes several lines
    at a time (see Kite and Github Copilot).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Deep learning is being used to tackle modern, difficult, and incredibly complex
    problems. Correspondingly, deep learning models are often very large. Tens of
    thousands of parameters are standard for image recognition models, and state-of-the-art
    natural language models reach *hundreds* of billions of parameters. In these cases,
    the number of parameters is often almost always much larger than the number of
    samples in the training dataset. The (technically inappropriate but somewhat illustrative)
    analog in much lower-dimensional space is to fit a ten-dimensional polynomial,
    for instance, on two data points.
  prefs: []
  type: TYPE_NORMAL
- en: Despite being so large, these deep learning models obtain extraordinary validation
    performance on benchmark datasets. Moreover, it has been observed that increasing
    the size of a deep learning model almost always increases its validation performance.
    This conflicts with the bias-variance/overfitting-underfitting paradigm in classical
    machine learning, which suggests that continuously increasing the number of parameters
    in a model will lead to overfitting and thus poor generalization. What is happening
    here?
  prefs: []
  type: TYPE_NORMAL
- en: In order to expand the theory to explain or incorporate these observations,
    researchers at OpenAI have proposed the *Deep Double Descent* theory, which suggests
    that the infamous bias-variance U-shaped curve (Figure [1-23](#Fig23)) illustrates
    the relationship between generalization and model complexity only in the *classical
    regime* and that it is only part of a more complete curve. If we continue traveling
    along the *x*-axis far enough, progressively increasing model complexity, we reach
    a point where model performance becomes *better again* (Figure [1-60](#Fig60)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig60_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A graph plots test per train error to ResNet 18 width parameter. It displays
    an interpolation threshold within a rectangular critical regime. The region before
    and after the interpolation threshold is marked as classical and modern regimes,
    respectively. The graph has 2 decreasing curves for test and train.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-60
  prefs: []
  type: TYPE_NORMAL
- en: Deep Double Descent, from the Nakkiran “Deep Double Descent” paper
  prefs: []
  type: TYPE_NORMAL
- en: 'The Deep Double Descent phenomenon is one of many observed patterns indicating
    a fundamental shift between the classical and modern regimes. Given how stark
    the divide is, it may seem inappropriate to cross between the two paradigms. The
    subject of this book itself – deep learning for tabular data – bridges these two:
    deep learning, a study of the modern regime, and tabular data, which has always
    been thought to be modeled “best” by techniques of the classical regime.'
  prefs: []
  type: TYPE_NORMAL
- en: This perspective is widespread largely because it makes sense and because, for
    a significant period of time, it has been empirically validated. Training a neural
    network on tabular data almost never performed as well as an algorithm like Gradient
    Boosting. The primary (arguably post hoc) explanation given is that tabular data
    can simply hold much fewer relationships, both in complexity and quantity, than
    much higher-dimensional image and text data. Neural networks, with their bulky
    and overpowering mass of parameters, instinctively by the bias-variance trade-off
    seem to be overkill and lead to overfitting (i.e., poor generalization).
  prefs: []
  type: TYPE_NORMAL
- en: However, recent developments in deep learning have demonstrated that deep learning
    has promise as an equal or, in some cases, a superior contender to machine learning
    methods in tabular data. The Deep Double Descent phenomenon hints that neural
    networks may not be subject to the same classical machine learning regime paradigms
    and that if we push far enough and in the right direction, we may end up somewhere
    better than we could have ever imagined before.
  prefs: []
  type: TYPE_NORMAL
- en: This book is dedicated to exploring an unlikely marriage between tabular data
    and deep neural networks, with the hope of establishing deep learning as a solid
    contender in the standard data scientist’s toolkit, rather than being reserved
    for specialized deep learning engineers building image, language, and signal applications.
    It is an attempt to merge the modern with the classical – to reunderstand specialized
    developments on the frontier of deep learning with respect to their usefulness
    in application to structured data. You’ll find that working with deep learning
    is, in many ways, more free and less rigid rinse-and-repeat than the standard
    classical machine learning workflow. As the state of data science advances, so
    must the tools we use.
  prefs: []
  type: TYPE_NORMAL
- en: Key Points
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In this chapter, we discussed several key principles, concepts, and algorithms
    of classical machine learning:'
  prefs: []
  type: TYPE_NORMAL
- en: In the context of machine learning, *modeling* is the mostly automated process
    of developing representations of phenomena from data.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A model uses supervised learning when it is trained to associate an input with
    a label. On the other hand, a model uses unsupervised learning when it is trained
    to find associations within the data itself, without any labels.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Regression is when the target is continuous, whereas classification is when
    the target is discretized/binned.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The training set is the data the model is fitted on; the validation set is the
    data the model is evaluated on but does not see during training; the test set
    is the data the model predicts on (with no associated ground-truth labels).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A model that has too high of variance is incredibly sensitive to specific data
    instances it is presented with and adapts/”bends” its general prediction capabilities
    to exactly represent the provided data; this is *overfitting*. On the other hand,
    a model with too high of a bias doesn’t adapt/”bend” its general prediction capabilities
    much toward specific instances of the dataset; this is *underfitting*. In the
    classical machine learning regime, an increase in the number of parameters (“degrees
    of freedom’” is generally associated with increased overfitting behavior; the
    optimal size of a model is somewhere in between underfitting and overfitting.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Curse of Dimensionality describes a suite of phenomena involving distances,
    surfaces, and volumes in high-dimensional space that appears contrary/counter
    to our intuition in low-dimensional spaces.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Gradient descent is an important concept in machine learning optimization, in
    which parameters are updated in the opposite direction of the derivative of the
    loss landscape with respect to the parameters. This moves in a direction that
    minimizes the loss. One weakness of gradient descent is that the final convergence
    result often depends heavily on initialization; this can usually be overcome by
    more advanced mechanisms.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Deep Double Descent phenomenon attempts to explain the success of heavily
    parametrized deep learning models over traditional machine learning models by
    extending the classical bias-variance U-shaped curve into a one-ridge descent,
    with the error decreasing when the model complexity ventures high enough. This
    phenomenon is one of many indicating operating paradigms and principles in deep
    learning are fundamentally different from machine learning.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Modern developments in deep learning suggest promising applications for tabular
    data.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In Chapter [2](525591_1_En_2_Chapter.xhtml), we will cover important tabular
    data storage, manipulation, and extraction methods for successful modeling pipelines.
    These skills will prepare you to handle different forms of data required in topics
    throughout the rest of the book.
  prefs: []
  type: TYPE_NORMAL
