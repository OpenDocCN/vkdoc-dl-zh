- en: 1. Classical Machine Learning Principles and Methods
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: True wisdom is acquired by the person who sees patterns, and comes to understand
    those patterns in their connection to other patterns – and from these interconnected
    patterns, learns the code of life – and from the learning of the code of life,
    becomes a co-creator with God.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: —Hendrith Vanlon Smith Jr., Author and Businessman
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The focus of this book is on *deep learning* for tabular data (don’t worry –
    you got the right book!), but there are many good reasons to first develop a solid
    understanding of classical machine learning as a foundation.
  prefs: []
  type: TYPE_NORMAL
- en: Deep learning rests and builds upon the fundamental principles of machine learning.
    In many cases the axioms and behavior of the modern deep learning regime are different
    and distorted – these distortions and paradigm shifts will be further discussed
    and explored. Nevertheless, a strong knowledge of classical machine learning is
    required to intuit and work with deep learning, in the same way that calculus
    requires a strong understanding of algebra even though it operates under new,
    unfamiliar environments of infinity.
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, understanding classical machine learning is even more important to
    one seeking to apply deep learning for tabular data than one seeking to apply
    deep learning applications to other sorts of data (image, text, signal, etc.)
    because much of classical machine learning *was built for and around tabular data*,
    with later adaptions for other types of data. The core algorithms and principles
    of classical machine learning often assume the presence of certain data characteristics
    and attributes that are often present only in tabular data. To understand the
    modeling of tabular data, one must understand these characteristics and attributes,
    why classical machine learning algorithms can assume and model them, and how they
    can potentially be better modeled with deep learning.
  prefs: []
  type: TYPE_NORMAL
- en: Additionally – despite the tremendous hype around it – deep learning is not
    a universal solution, nor should it be treated as one! In specialized data applications,
    often the only available viable solutions are based on deep learning. For problems
    involving tabular data, however, classical machine learning may provide a better
    solution. Therefore, it’s important to know the theory and implementation of that
    set of classical approaches. Throughout the book, you’ll continue to hone your
    judgment regarding which family of techniques is most applicable to the problems
    you need to solve.
  prefs: []
  type: TYPE_NORMAL
- en: 'This chapter will give a wide overview of classical machine learning principles,
    theory, and implementations. It is organized into four sections: “Fundamental
    Principles of Modeling,” which explores key unifying concepts through intuition,
    math, visualizations, and code experiments; “Metrics and Evaluation,” which provides
    an overview and implementation for commonly used model assessment methods; “Algorithms,”
    which covers the theory and implementation (from scratch and from existing libraries)
    of a wide range of foundational and popular classical machine learning algorithms;
    and “Thinking Past Classical Machine Learning,” which introduces the transition
    into new deep learning territory. The chapter assumes basic working knowledge
    of Python and NumPy but introduces basic usage of the modeling library scikit-learn.
    Please see Chapter [2](525591_1_En_2_Chapter.xhtml) for an in-depth overview of
    concepts and implementation in NumPy, as well as Pandas and TensorFlow Datasets.'
  prefs: []
  type: TYPE_NORMAL
- en: Fundamental Principles of Modeling
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this section, we will explore several fundamental ideas, concepts, and principles
    of modeling, especially in relation to the tabular data regime and context. Even
    if you’re familiar or experienced with these topics, you may find discussion of
    new conceptual approaches or frameworks to solidify and push your understanding.
  prefs: []
  type: TYPE_NORMAL
- en: What Is Modeling?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Thinking generally beyond the field of data science, modeling refers to the
    process of building appropriate and “smaller” approximations or representations
    of “larger” phenomena. For instance, a fashion model’s role is to demonstrate
    key elements and trends of a fashion brand. When a designer chooses what clothes
    a fashion model wears, they cannot have them wear every piece of clothing that
    the fashion brand carries – they must choose the most representative items, the
    ones that best capture the spirit, character, and philosophy of the brand. In
    the humanities and the social sciences (philosophy, sociology, history, psychology,
    political science, etc.), a model (or, similarly, a “theory”) acts as a unifying
    framework that connects ideas and empirical observations. A psychological theory
    for love cannot explain or hold *all* the possible reasons and conditions in which
    love has ever arisen, but it can approximate it by exploring the general contours
    and dynamics of love.
  prefs: []
  type: TYPE_NORMAL
- en: A scientific model, similarly, articulates a concept that has a general influence
    on whatever environment it is derived from. Even though the natural world is noisy
    and scientific models are approximations, models can be used to derive useful
    approximate predictions. The Copernican model of the solar system suggested that
    the sun was at the center of the universe, with Earth and other planets orbiting
    around it in circular paths. This model can be used to understand and predict
    the motions of planets.
  prefs: []
  type: TYPE_NORMAL
- en: 'In chemical kinetics, steady-state approximation is a model to obtain the rate
    law of a multi-step chemical reaction by assuming all state variables are constant;
    the amount of a reactant produced is equal to the amount of that reactant consumed.
    This captures another theme of models: because models generalize, they must make
    certain assumptions.'
  prefs: []
  type: TYPE_NORMAL
- en: Both steady-state approximation and the Copernican model, and all models, don’t
    work *perfectly*, but rather “well enough” in “most” cases.
  prefs: []
  type: TYPE_NORMAL
- en: 'As briefly explored, models are useful in all sorts of domains. In these contexts,
    the “smallness” of models relative to the “largeness” of the phenomena being modeled
    is primarily in representation size. For instance, the Copernican model allows
    us to – under certain assumptions and simplifications – predict the trajectory
    of planets instead of waiting to let the universe (the phenomena being modeled)
    play out and observing the result. Restated, they’re useful because they are easier
    to comprehend. One can manipulate and understand a representation of the phenomenon
    without observing the phenomenon itself. (We don’t want to need to actually observe
    a meteor crashing into Earth to know that a meteor is crashing into Earth – at
    least, we would hope so.) In the context of data science and computer science,
    however, “smallness” has another key attribute: *ease of model creation and deployment*.'
  prefs: []
  type: TYPE_NORMAL
- en: It takes significant time and effort for designers to curate a fashion model’s
    outfit, for psychologists to collect disparate ideas and unify them into a theory
    of the human mind, and for scientists to develop models from empirical data. Rather,
    we would like a way to *autonomously* unify observations into a model to generalize
    an understanding of the phenomena from which the observations are derived. In
    this context, *autonomous* means “without significant human intervention or supervision
    during the creation of the model.” In this book, and in contexts of data science,
    the term *modeling* is usually thus associated with some dimension of automation.
  prefs: []
  type: TYPE_NORMAL
- en: '*Automated* modeling requires a computational/mathematical/symbolic approach
    to “understanding” and generalizing across a set of given observations, as computers
    are the most powerful and scalable instrument of automation known to humanity
    at the writing of this book. Even the most complex-behaving artificial intelligence
    models – often modeling the dynamics of language or vision – are built upon mathematical
    units and computation.'
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, because a computational/mathematical/symbolic approach to automation
    must be taken, the observations themselves must be organized in a *quantitative*
    format. Much of scientific data is quantitative, whereas “data” (perhaps more
    aptly referenced as “ideas”) in the humanities is more often qualitative and textual.
    Does this mean that automated modeling cannot deal with most data in the humanities
    or any data that does not appear quantitatively in raw form? No, it merely means
    that we need another step of converting the data into quantitative form. We’ll
    discuss this more in later subsections.
  prefs: []
  type: TYPE_NORMAL
- en: 'We can give this concept of automated modeling a name: *learning*. In this
    context, learning is the process of automatically developing representations of
    a concept or phenomenon given a set of observations about/derived from it, rather
    than requiring extensive involvement of another being (usually, a human) to piece
    the generalization together “for” them.'
  prefs: []
  type: TYPE_NORMAL
- en: Modes of Learning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'There are two general modes of learning: supervised and unsupervised learning.
    Note that we will explore more complex learning paradigms, especially with deep
    learning, since its unique framework and dynamics allow for greater complexity.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Supervised learning is intuitive: given some set of inputs *x*, the model attempts
    to predict *y*. In the supervised learning regime, we seek to capture how various
    contributing factors (the features) have an effect on changing the output (the
    label). The data must be correspondingly organized: we must have a *feature set*
    (referred to in shorthand as the “*x*”) and a *label set* (referred to in shorthand
    as the “y”). Each “row” or “item” in the feature set is an organization of features
    derived from the same instance of a *thing* (e.g., pixels from the same image,
    behavior statistics from the same user, demographic information from the same
    person) and is associated with a label in the label set (Figure [1-1](#Fig1)).
    The *label* is often also referred to as the “ground truth.”'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig1_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A 5 by 3 table with columns for a, b, and c and a 5 by 1 table headed labels
    lead to a model.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-1
  prefs: []
  type: TYPE_NORMAL
- en: Supervised learning relationship between data and model
  prefs: []
  type: TYPE_NORMAL
- en: To accomplish the task of modeling an output given a set of inputs, the model
    must develop an understanding of how the inputted features interact with and relate
    to each other in producing a certain output. These associations can be simple,
    like a weighted linear sum of relevant features, or more complex, involving multiple
    duplications and concatenations to model the relevancy of the provided features
    with respect to the label (Figure [1-2](#Fig2)). The complexity of the associations
    between the inputs and the outputs depends both on the model and the inherent
    complexity of the dataset/problem being modeled.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig2_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration displays two sets of three circles for a, b, and c in which
    b and c lead to label, and a, b, and c lead to label respectively.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-2
  prefs: []
  type: TYPE_NORMAL
- en: Varying levels of complexity in discovering relationships between features and
    labels
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are some examples of supervised learning, drawn from various domains and
    levels of complexity:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Evaluating diabetes risk*: Provided with a dataset of patient information
    (age, sex, height, medical history, etc.) and the associated labels (if they have
    diabetes/severity or type of diabetes), the model automatically learns relationships
    and can predict a new patient’s probability/severity/type of diabetes.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Forecasting a stock*: Provided with a recent time window of data (e.g., the
    stock price for the last *n* days) and the corresponding label (the stock price
    on the *n*+1-th day), the model can associate certain patterns in a sequence of
    data to predict the next value.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Facial recognition*: Given a few images taken of a person’s face (the features
    being the pixels of the image) and the corresponding label (the person’s identity,
    which can be any sort of personal identifier, like a unique number), the model
    can formulate and recognize identifying characteristics of a face and associate
    it with that person.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: Although in this early-stage introductory context we refer to the algorithms
    performing the learning and prediction all as “models,” the types of models used
    in each context differ widely. The “Algorithms” section of this chapter engages
    in more rigorous exploration of different machine learning algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: Unsupervised learning, on the other hand, is a little bit more abstract. The
    goal of unsupervised learning is to formulate information and trends about a dataset
    without the presence of a label set (Figure [1-3](#Fig3)). Thus, the only input
    to an unsupervised model or system is the feature set, *x*.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig3_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A 5 by 3 table with columns for a, b, and c lead to the model.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-3
  prefs: []
  type: TYPE_NORMAL
- en: Unsupervised learning relationship between data and model
  prefs: []
  type: TYPE_NORMAL
- en: Instead of learning the relationship between features with respect to a label,
    unsupervised algorithms learn interactions between features with respect to the
    feature set itself (Figure [1-4](#Fig4)). This is the essential difference between
    supervised and unsupervised learning. Like supervised learning, these interactions
    can range from simple to complex.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig4_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration displays two sets of three circles for a, b, and c in which
    a and b lead to c, and c leads to a and b, and the link from c to a, respectively.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-4
  prefs: []
  type: TYPE_NORMAL
- en: Varying levels of complexity in discovering relationships in between features
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are some examples of unsupervised learning:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Customer segmentation*: A business has a dataset of their users with features
    describing their behavior. While they don’t have any particular labels/targets
    in mind, they want to identify key segments or *clusters* of their customer base.
    They use an unsupervised *clustering algorithm* to separate their customer base
    into several groups, in which customers in the same group have similar features.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Visualizing high-dimensional features*: When there are only one or two features
    in a dataset, visualizing is trivial. However, the introduction of additional
    dimensions complicates the task of visualization. As new features are added, additional
    dimensions of separation must be added (e.g., color, marker shape, time). At a
    certain dataset dimensionality, it becomes impossible to effectively visualize
    data. *Dimensionality reduction* algorithms find the projection of high-dimensional
    data into a lower-dimensional space (two dimensions for visualization) that maximizes
    the “information” or “structure” of the data. These are defined mathematically
    and do not require the presence of a label feature.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This book will focus primarily on supervised learning, but we will see many
    instances in which unsupervised and supervised learning approaches are combined
    to create systems more powerful than any one of its isolated parts.
  prefs: []
  type: TYPE_NORMAL
- en: 'Quantitative Representations of Data: Regression and Classification'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Earlier, it was discussed that data must be in some sort of *quantitative form*
    to be used by an automated learning model. Some data appears “naturally” or “raw”
    in quantitative form, like age, length measurements, or pixel values in images.
    However, there are many other types of data that we would like to incorporate
    into models but don’t appear in original form as a number. The primary data type
    here is categorical (class-based or label-based data), like animal type (dog,
    cat, turtle) or country (United States, Chile, Japan). Class-based data is characterized
    by a discrete separation of elements with no intrinsic ranking. That is, we cannot
    place “dog” as “higher than” a “cat” in the same way that 5 is higher than 3 (although
    many dog owners may disagree).
  prefs: []
  type: TYPE_NORMAL
- en: 'When there are only two classes present in a feature or label set, it is *binary*.
    We can simply associate one class with the quantitative representation “0” and
    the other class with the quantitative representation “1.” For instance, consider
    a feature in a sample dataset “animal” that contains only two unique values: “dog”
    and “cat.” We may attach the numerical representation “0” to “dog” and the numerical
    representation “1” to “cat” such that the dataset is transformed as follows (Figure
    [1-5](#Fig5)).'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig5_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A 5 by 2 table with columns for animal and age. Dog, cat, dog, and cat point
    to 0, 1, 0, and 1, respectively.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-5
  prefs: []
  type: TYPE_NORMAL
- en: Example quantitative conversion/representation of a categorical feature “animal”
  prefs: []
  type: TYPE_NORMAL
- en: You may want to point out that because 1 is higher than 0, we are placing the
    “cat” label higher than the “dog” label. However, note that when we convert a
    data form into a quantitative representation, the quantitative measurement does
    not always (and often doesn’t) mean the same thing anymore. In this case, the
    new feature should be interpreted as “Is the animal a cat?” rather than still
    as “animal,” in which a 0 represents “no” and a 1 represents “yes.” We also could
    have formed a quantitative representation meaning “Is the animal a dog?” in which
    all “dog” values are replaced with “1” and all “cat” values are replaced with
    “0.” Both approaches hold the same *information* (i.e., the separation between
    animal types) as the original data (Figure [1-6](#Fig6)), but it is represented
    quantitatively and thus becomes readable/compatible with an automated learning
    model.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig6_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Two 5 by 2 tables with columns for cat question mark and age, and dog question
    mark and age display the following values 0, 3; 1, 5; 0, 7; and 1, 6 and 1, 3;
    0, 5; 1, 7; and 0, 6.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-6
  prefs: []
  type: TYPE_NORMAL
- en: Equivalent binary representations of a categorical variable
  prefs: []
  type: TYPE_NORMAL
- en: However, when there are more than two unique values in a feature or label, things
    become more complicated. In Chapter [2](525591_1_En_2_Chapter.xhtml), we will
    more deeply explore effective data representation, manipulation, and transformation
    in the context of modeling tabular data. A challenge we will encounter and explore
    throughout the book is that of converting features of all forms into a more readable
    and informative representation for effective modeling.
  prefs: []
  type: TYPE_NORMAL
- en: Supervised problems can be categorized as *regression* or *classification* problems
    depending on the form of the desired output/label. If the output is continuous
    (e.g., house price), the problem is a regression task. If the output is binned
    (e.g., animal type), the problem is a classification task. For *ordinal outputs*
    – features that are quantized/discrete/binned but are also intrinsically ranked/ordered,
    like grade (A+, A, A–, B+, B, etc.) or education level (elementary, intermediate,
    high, undergraduate, graduate, etc. – the separation between regression and classification
    depends more on the approach you take rather than being inherently attached to
    the problem itself. For instance, if you convert education level into quantitative
    form by attaching it to an ordered integer (elementary to 0, intermediate to 1,
    high to 2, etc.) and the model is to output that ordered integer (e.g., an output
    of “3” means the model predicted “undergraduate” education level), the model is
    performing a regression task because the outputs are placed on a continuous output.
    On the other hand, if you designate each education level as its own class without
    intrinsic rank (see Chapter [2](525591_1_En_2_Chapter.xhtml) ➤ “Data Encoding”
    ➤ “One-Hot Encoding”), the model is performing a classification task.
  prefs: []
  type: TYPE_NORMAL
- en: Many classification algorithms, including neural networks, the main study of
    this book, output a probability that an input sample falls into a certain class
    rather than automatically assigning a label to an input. For instance, a model
    may return a 0.782 probability an image of an ape belongs to the class “ape,”
    a 0.236 probability it belongs to the class “gibbon,” and lower probabilities
    for all other possible classes. We then interpret the class with the highest probability
    as the designated label; in this case, the model correctly decides on the label
    “ape.” Although the output is technically continuous in that it is almost always
    not an integer 0 or 1 in practice, the *ideal* behavior/the expected labels are;
    thus, the task is classification rather than regression.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding whether your problem and approach perform a classification or
    a regression task is a fundamental skill in building functioning modeling systems.
  prefs: []
  type: TYPE_NORMAL
- en: 'The Machine Learning Data Cycle: Training, Validation, and Test Sets'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Once we fit our model to the dataset, we want to evaluate how well it performs
    so we can determine appropriate next steps. If the model performs very poorly,
    more experimentation is needed before it is deployed. If it performs reasonably
    well given the domain, it may be deployed in an application. If it performs *too*
    well (i.e., perfect performance), the results may be too good to be true and require
    additional investigation. Failing to evaluate a model’s true performance can lead
    to headaches later at best and can be dangerous at worst. Consider, for instance,
    the impact of a medical model deployed to give diagnoses to real people that incorrectly
    appears to perfectly model the data.
  prefs: []
  type: TYPE_NORMAL
- en: The purpose of modeling, as discussed previously, is to represent a *phenomenon*
    or concept. However, because we can only access these phenomena and concepts through
    observations and data, we must approximate *modeling the phenomenon* by instead
    *modeling data derived from the phenomenon*. Restated, since we can’t directly
    model the phenomenon, we must understand the phenomenon through the information
    we record from it. Thus, we need to ensure that the approximation and the end
    goal are aligned with one another.
  prefs: []
  type: TYPE_NORMAL
- en: Consider a child learning addition. Their teacher gives them a lesson and six
    flash cards to practice (Figure [1-7](#Fig7)) and tells them that there will be
    a quiz the next day to assess the child’s mastery of addition.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig7_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Six flash cards display the sum of 1 and 1, 1 and 2, 1 and 3, 2 and 2, 2 and
    3, and 1 and 4 as 2, 3, 4, 4, 5, and 5 respectively.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-7
  prefs: []
  type: TYPE_NORMAL
- en: Example “training dataset” of flash cards. The feature (input) is the addition
    prompt (e.g., “1+1,” “1+2”); the label (desired output) is the sum (e.g., “2,”
    “3”)
  prefs: []
  type: TYPE_NORMAL
- en: The teacher could use the same questions on the flash cards given to the students
    on the quiz (Quiz 1), or they could write a set of different problems that weren’t
    given explicitly to the students, but were of the same difficulty and concept
    (Quiz 2) (Figure [1-8](#Fig8)). Which one would more truly assess the students’
    knowledge?
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig8_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Two quizzes represent six flash cards each. The sums of both quiz sets are unknown.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-8
  prefs: []
  type: TYPE_NORMAL
- en: 'Two possible quizzes: equal to the training dataset (left) or slightly different
    examples representing the same concept'
  prefs: []
  type: TYPE_NORMAL
- en: 'If the teacher gave Quiz 1, a student could score perfectly by simply memorizing
    six associations between a prompt “x + y” and the answer “z.” This demonstrates
    *approximation-goal misalignment*: the *goal* of the quiz was to assess the students’
    mastery of the concept of addition, but the *approximation* instead assessed whether
    the students were able to memorize six arbitrary associations.'
  prefs: []
  type: TYPE_NORMAL
- en: 'On the other hand, a student who merely memorized the six associations given
    to them on the flash cards would perform poorly on Quiz 2, because they are presented
    with questions that are different in explicit form, despite being very similar
    in concept. Quiz 2 demonstrates *approximation-goal alignment*: students can score
    well on the quiz only if they understand the concept of addition.'
  prefs: []
  type: TYPE_NORMAL
- en: The differentiating factor between Quiz 1 and Quiz 2 is that the problems from
    Quiz 2 were not presented to the students for studying. This separation of information
    allows the teacher to more genuinely evaluate the students’ learning. Thus, in
    machine learning, we always want to separate the data the model is trained on
    from the data the model is evaluated/tested on.
  prefs: []
  type: TYPE_NORMAL
- en: See the “Bias-Variance Trade-Off” subsection of this chapter for more rigorous
    exploration on these concepts of “memorization” and “genuine learning.”
  prefs: []
  type: TYPE_NORMAL
- en: 'In (supervised/prediction) machine learning problems, we are often presented
    with the following data setup (Figure [1-9](#Fig9)): a dataset with labels (i.e.,
    a feature set and a label set, associated with one another) and an unlabeled dataset.
    The latter generally consists of residue data in which features are available
    but labels have not been attached yet, intentionally or for other purposes.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig9_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A 6 by 3 table with columns for a, b, and c and a 6 by 1 table with a column
    for the label on the left. A 4 by 3 table with columns for a, b, and c on the
    right.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-9
  prefs: []
  type: TYPE_NORMAL
- en: Data type hierarchy
  prefs: []
  type: TYPE_NORMAL
- en: The dataset that the model is exposed to when it is learning (‘studying’) is
    the *training set*. The *validation set* is the dataset the model is evaluated
    on, consisting of the set of data for which there are labels associated with features
    but that have not been shown to the model. The validation set is used to tune
    the model at the structural level – for instance, what type of algorithm is used
    or how complex the algorithm should be.
  prefs: []
  type: TYPE_NORMAL
- en: 'The *test set* is controversial, and there are two dominant definitions. One
    is as such: the *test set* is the dataset that the model is applied to in order
    to obtain predictions; the test set contains features but is not linked with any
    labels – since the objective is to obtain the labels via model prediction. The
    other interpretation is that the test set is used to form an “objective evaluation”
    of the model, since it is not used to inform the development of the model in any
    way – either through training or through structural tuning.'
  prefs: []
  type: TYPE_NORMAL
- en: For instance, consider a machine learning model for an ecommerce platform that
    predicts whether a customer will purchase a particular product or not (Figure
    [1-10](#Fig10)). The platform has a database of all their previous customers’
    information (the features) and whether they purchased the product or not (the
    label) that can be fed into a predictive machine learning model. The ecommerce
    platform also has data on site visitors who have not purchased anything yet; the
    platform wants to determine which visitors have a high probability of purchasing
    a particular product in order to tailor a marketing campaign toward their particular
    preferences (test set).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig10_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A 6 by 3 table with columns for age, region, and visits per week, and a 6 by
    1 table with a column for the label under customer data. A 4 by 3 table with columns
    for age, region, and visits per week under visitor data.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-10
  prefs: []
  type: TYPE_NORMAL
- en: Example dataset hierarchy of ecommerce data
  prefs: []
  type: TYPE_NORMAL
- en: The ecommerce platform randomly splits the customer data into a *train dataset*
    and a *validation dataset* (in this example, with a 0.6 “train split,” meaning
    that 60% of the original dataset with labels is placed in the training set). They
    train the model on the training set and evaluate it on the validation data to
    obtain an honest report of its performance (Figure [1-11](#Fig11)). If they’re
    not satisfied with the model’s validation performance, they can tweak the modeling
    system.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig11_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flow diagram depicts the following. Customer data that consists of two tables
    leads to train set and validation set that consists of two tables that leads to
    Model evaluation.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-11
  prefs: []
  type: TYPE_NORMAL
- en: Separation of a complete dataset into training and validation datasets
  prefs: []
  type: TYPE_NORMAL
- en: When the model obtains satisfactory validation performance, the platform deploys
    the model on visitor data to identify promising customers (Figure [1-12](#Fig12)).
    The platform launches customized marketing campaigns to those the model identified
    as having a high probability of purchasing the product, based on previous customer
    data.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig12_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flow diagram exhibits the following. Visitor data depicts a table with data
    for age, region, and visits per week that leads to predictions table with data
    for prediction label via a model.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-12
  prefs: []
  type: TYPE_NORMAL
- en: Demonstration of how the training dataset is used in relation to the model
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: You’ll often see the validation set referred to as the “test set” from other
    resources. Others might use “validation” and “test” synonymously. This book uses
    “train,” “validation,” and “test” to refer to three separate types of data defined
    by the presence of an associated label and the use case. It is useful to use this
    naming method because it provides a meaningful system to reference the primary
    components of the modern data pipeline – training, evaluation, and deployment.
  prefs: []
  type: TYPE_NORMAL
- en: In Python, one of the fastest and most commonly used methods to separate data
    into training and validation is with the scikit-learn library. Let’s begin by
    creating a Pandas DataFrame with dummy data (Listing [1-1](#PC1), Figure [1-13](#Fig13)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig13_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A 6 by 5 data table with columns for age, region, visits per week, and label
    and rows for 0, 1, 2, 3, and 4.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-13
  prefs: []
  type: TYPE_NORMAL
- en: Example complete dataset in DataFrame form
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Now, we can separate the data into *features* (referred to in shorthand as *X/x*,
    or the “independent variables” to the model) and *labels* (the *y*, or the dependent
    variable(s)) (Listing [1-2](#PC2)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'The `sklearn.model_selection.train_test_split` function (notice that scikit-learn
    uses “test set” to refer to the validation set) takes in three important parameters:
    the feature set, the label set, and the size of the training set (Listing [1-3](#PC3)).
    It returns four sets of data – the training feature set (Figure [1-14](#Fig14)),
    the validation feature set (Figure [1-15](#Fig15)), the training label set (Figure
    [1-16](#Fig16)), and the validation label set (Figure [1-17](#Fig17)).'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig17_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'A validation label set displays 2 and 0, 0 and 1, and name: label, d type:
    int 64 in lines 1 to 3, respectively.'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-17
  prefs: []
  type: TYPE_NORMAL
- en: Example `y_val` result
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig16_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'A training label set displays 3 and 1, 1 and 1, 4 and 0, and name: label, d
    type: int 64 in lines 1 to 4 respectively.'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-16
  prefs: []
  type: TYPE_NORMAL
- en: Example `y_train` result
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig15_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A 3 by 4 data table with columns for age, region, and visits per week, and rows
    for 2 and 0\. Row 2 to 3 read, 22, MEX, 5; and 32, U S, 2, respectively.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-15
  prefs: []
  type: TYPE_NORMAL
- en: Example `X_val` result
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig14_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A 4 by 4 data table with columns for age, region, and visits per week and rows
    for 3, 1, and 4\. Row 2 to 4 read, 48, U K, 10; 18, CAN, 8; and 43, U S, 1, respectively.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-14
  prefs: []
  type: TYPE_NORMAL
- en: Example `X_train` result
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Notice that scikit-learn randomizes the order and split of the dataset to ensure
    the training and validation sets contain similar “topics” or “types of data.”
    If the original dataset is already randomized, randomization doesn’t hurt; if
    the original dataset is ordered (which is often the case – for instance, ordered
    alphabetically or by date), the training set likely is not optimally representative
    of the data in the validation set. Randomization can only help.
  prefs: []
  type: TYPE_NORMAL
- en: The `train_test_split` function accepts standard Python data forms, including
    native Python lists and NumPy arrays – as long as they are ordered in a sequential
    list format where each item is a data instance. Note that the feature and label
    datasets must be the same length, since they need to correspond with one another.
  prefs: []
  type: TYPE_NORMAL
- en: You can also implement train-validation-split “manually” with NumPy. Consider
    the following dataset in which the feature is a single integer and the label is
    0 or 1, corresponding to even (0) or odd (1) (Listing [1-4](#PC4)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: If seeing simple pattern-based data being typed out manually makes you cringe,
    one can also express the data with logical structures as such (Listing [1-5](#PC5)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'We’ll use the following process to randomly split the dataset (Listing [1-6](#PC6)):'
  prefs: []
  type: TYPE_NORMAL
- en: Zip the feature and label datasets together. In Python, the zipping operation
    pairs together elements of the same index from different lists. For instance,
    zipping the list [1, 2, 3] and [4, 5, 6] yields [(1, 4), (2, 5), (3, 6)]. The
    purpose of zipping is to associate the individual features and labels together
    so they do not become “unlinked” during shuffling.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Shuffle the feature-label pairs (pairing having been accomplished by the zipping
    operation).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Unzip the feature-label pairs.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Obtain the “split index.” This is the index at which all previous elements will
    be part of the training set and all following elements will be part of the validation
    set. The index is calculated as the ceiling of the length of the train size (a
    fraction, like 0.8 for 80%) multiplied by the dataset size. One is subtracted
    from this quantity to account for zero-indexing.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Use the “split index” to index *x* train, *x* validation, *y* train, and *y*
    validation sets.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Note that it is convention for the train set size to be larger than the validation
    set size, such that the model has access to most of the dataset when it is trained.
  prefs: []
  type: TYPE_NORMAL
- en: A very important source of potential error that is often committed during the
    train-validation split stage but is only noticed after the model has been trained
    is *data leakage*. Data leakage occurs when part of the training data is represented
    in the validation data or vice versa. This undermines a desired complete separation
    between training and validation sets, which leads to dishonest metric results.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, consider an instance in which you’re working with multiple stages
    of training. This can be the case with large models (e.g., heavy neural networks)
    that require a long time to train and therefore need to be trained in several
    sessions or if a trained model is being passed around team members for fine-tuning
    and inspection. At each session, the data is randomly split into training and
    validation sets, and the model continues to be fine-tuned on that data. After
    several sessions, the validation performance of the model is evaluated, and shockingly,
    it is perfect!
  prefs: []
  type: TYPE_NORMAL
- en: You pump your fist in the air and high-five your teammates. However, your enthusiasm
    is sadly misguided – you have been the victim of data leakage. Because the training-validation
    split operation was rerun each session and the operation is random, the training
    and validation sets were different each time (Figure [1-18](#Fig18)). This means
    that across all sessions, the model was able to see almost all the dataset. Scoring
    a high validation performance is thus trivial, reduced only to a task of memorization
    rather than the much more difficult and important one of generalization and “true
    learning.”
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig18_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration depicts train validation splits 1 to 3 that lead to model versions
    1 to 3, on the above. Below is a part of the data the model sees.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-18
  prefs: []
  type: TYPE_NORMAL
- en: Data leakage problems occurring from repeated train-validation split
  prefs: []
  type: TYPE_NORMAL
- en: Differences in training-validation set splitting across multiple sessions can
    also lead to discrepancies in metric outcomes. A model fitted from scratch on
    one set of training data may perform slightly different than the same model type
    fitted from scratch on another set of training data, even though the formation
    of the training data is randomized. This slight difference can introduce errors
    when comparing model results.
  prefs: []
  type: TYPE_NORMAL
- en: In order to avoid these sorts of problems, we use *random seeding*. By setting
    a seed in the program, any random processes yield the same result every time they
    are run. To use random seeding, pass `random_state=101` (or some other value)
    into scikit-learn’s `train_test_split`, or use `np.random.seed(101)` in addition
    to other `numpy.random` functions that may accept random seeding arguments (see
    NumPy documentation) at the start of your program for custom implementations.
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, for small datasets, randomized train-validation split may not
    reflect model performance to the desired precision. When the number of samples
    is small, the selected validation examples may not be represented accurately in
    the training set (i.e., represented “too well” or “not well enough”), leading
    to biased model performance metrics.
  prefs: []
  type: TYPE_NORMAL
- en: In order to address this, one can use *k*-fold evaluation (Figure [1-19](#Fig19)).
    In this evaluation schema, the dataset is randomly split into *k* folds (equally
    sized sets). For each of the *k* folds, we train a model from scratch on the other
    *k* – 1 folds and evaluate it on that fold. Then, we average (or aggregate through
    some other method) the validation performance for each of the *k*-folds.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig19_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration depicts the K-fold evaluation when k equals 1 to 4\. The location
    of the validation set moves from left to right as k increases, and the remaining
    part indicates the training set.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-19
  prefs: []
  type: TYPE_NORMAL
- en: K-fold evaluation
  prefs: []
  type: TYPE_NORMAL
- en: This method allows us to obtain model validation performance on the “entire”
    dataset. However, note that it may be expensive to train *k* models – an alternative
    is simply to randomly split into training and validation sets without a random
    seed a given number of times without regard for which specific parts of data are
    allocated into either set.
  prefs: []
  type: TYPE_NORMAL
- en: This approach is also known as k-fold cross-validation, because it allows us
    to validate our model across the entire dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Sci-kit learn offers the sklearn.model_selection.KFold object, which assists
    in implementing *k*-fold cross-validation by returning the appropriate indices
    for training and validation sets at each fold (Listing [1-7](#PC7)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: There is a balance in choosing the value of *k* and the train-validation split
    size generally – we want enough data to properly train the model, but also enough
    set aside in the validation set to properly evaluate the model. In the section
    “Metrics and Evaluation,” you’ll learn further about different metrics and evaluation
    methods. The point is evaluation is far from an objective operation; there is
    no “true performance” of the model. Like most methods in machine learning, we
    need to make different choices to understand our model as holistically as possible
    given operating circumstances. Any number that you are given as an indicator is
    showing only one side of a multisided, complex model!
  prefs: []
  type: TYPE_NORMAL
- en: Bias-Variance Trade-Off
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Consider the following set of five points (Figure [1-20](#Fig20)): how would
    you draw a smooth curve to model the dataset?'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig20_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Five points display a trend that rises, dips, and rises steeply.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-20
  prefs: []
  type: TYPE_NORMAL
- en: Example set of data points
  prefs: []
  type: TYPE_NORMAL
- en: There are many possible approaches one could take (Figure [1-21](#Fig21)). The
    simplest approach may be just to draw a straight line in the general direction
    of the set – in the “middle” of the points. Another approach would be to connect
    the points with a slight curve such that there are no sudden changes in the derivative
    than are necessary (i.e., the second derivative remains near zero). A more complex
    one would be to connect the points, but draw large, extravagant peaks and valleys
    in between each.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig21_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A solid curve with 5 points that rises, dips and rises steeply. An oscillating
    curve and a dashed line indicate the trend.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-21
  prefs: []
  type: TYPE_NORMAL
- en: Possible curves to fit the data points presented in Figure [1-20](#Fig20)
  prefs: []
  type: TYPE_NORMAL
- en: Which one best models the given dataset? In this case, most people would agree
    on the basis of intuition that the second choice (visualized in a continuous green
    line in Figure [1-21](#Fig21)) is the most “natural” model. The second curve models
    the *given* *training data* well (i.e., it passes through each point), but its
    “predictions” for other intermediate locations also seem reasonable. The first
    curve seems too generally inaccurate, whereas the second passes through all the
    training data but deviates too much at intermediate values.
  prefs: []
  type: TYPE_NORMAL
- en: It would be helpful to formalize this intuition. In modeling contexts, we work
    with harder problems than connecting dots and must construct mathematical/computational
    models rather than drawing curves. The *bias-variance trade-off* can help us compare
    the behavior of different models in modeling data.
  prefs: []
  type: TYPE_NORMAL
- en: '*Bias* is a model’s ability to identify general trends and ideas in the dataset,
    whereas *variance* is the ability to model data with high precision. Since we
    think of bias and variance in terms of error, a lower bias or variance is better.
    The bias-variance relationship is often visualized as a set of dart throws on
    a bull’s-eye (Figure [1-22](#Fig22)). The ideal set of throws is a cluster of
    hits all around the center ring, which is *low bias* (the general “center” of
    the throws is not shifted off/biased) and *low variance* (the collection of hits
    are clustered together rather than far out, indicating consistently good performance).'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig22_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration depicts 4 concentric circles in two rows headed high and low
    bias for rows and high and low variance for columns. The dart throws are around
    and away from the center for high bias, and for low bias, dart throws are across
    and within the center.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-22
  prefs: []
  type: TYPE_NORMAL
- en: Variance/bias trade-off bull’s-eye representation. The ideal model is one that
    is both low in variance and bias error, in which all the dart throws are concentrated
    in the ideal central target ring
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, a high-bias low-variance set of throws is highly concentrated
    in a very region far from the desired central ring, and a low-bias high-variance
    set of throws is centered around the desired ring but very disparate. A high-bias
    high-variance set of throws is both improperly centered and very spread out.
  prefs: []
  type: TYPE_NORMAL
- en: 'Given a point estimator ![$$ \hat{\theta} $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_IEq1.png)
    (in simple terms, an estimator for the value of an unknown parameter of a population)
    of a parameter *θ*, the bias can be defined as the difference between the expected
    value of the parameter and the true value:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \textrm{Bias}=E\left[\hat{\theta}\right]-\theta $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equa.png)'
  prefs: []
  type: TYPE_IMG
- en: If the expected value of the parameter is equal to the true value (![$$ E\left[\hat{\theta}\right]=\theta
    $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_IEq2.png)), the
    bias error term is 0 (and thus perfect). We can interpret the model as being “unbiased”
    – the true value of the parameter reflects the value it “should” take on.
  prefs: []
  type: TYPE_NORMAL
- en: 'Variance is defined as the expected value of the difference between the expected
    estimated parameter value and the true parameter value, squared:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \textrm{Variance}=E\left[{\left(E\left[\hat{\theta}\right]-\hat{\theta}\right)}^2\right]
    $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_Equb.png)'
  prefs: []
  type: TYPE_IMG
- en: If the parameter value difference fluctuates wildly, the variance will be high.
    On the other hand, if the difference is more consistent, the variance will be
    low.
  prefs: []
  type: TYPE_NORMAL
- en: 'Given these definitions, we can show that the Mean Squared Error (MSE) ![$$
    {\left(y-\hat{y}\right)}^2 $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_IEq3.png)
    (where *y* is the true value and ![$$ \hat{y} $$](../images/525591_1_En_1_Chapter/525591_1_En_1_Chapter_TeX_IEq4.png)
    is the predicted value) can be *decomposed* as a relationship between the bias
    and variance error terms: MSE = Bias² + Variance. (The mathematical proof can
    be easily accessed but is beyond the scope of this book.) The *bias-variance*
    *decomposition* tells us that we can understand the error of a model as a relationship
    between bias and variance errors.'
  prefs: []
  type: TYPE_NORMAL
- en: The bias-variance relationship lends itself to the concept of *underfitting*
    vs. *overfitting*. A model *underfits* when its bias is too high, while its variance
    is too low; the model doesn’t adapt/bend too much at all toward specific data
    instances of the dataset and thus poorly models the training dataset. On the other
    hand, a model *overfits* when its bias is too low and the variance is too high;
    the model is incredibly sensitive to the specific data instances it is presented
    with, passing through every point.
  prefs: []
  type: TYPE_NORMAL
- en: Models that overfit perform exceedingly well on the training set but very poorly
    on the validation dataset, since they “memorize” the training dataset without
    generalizing.
  prefs: []
  type: TYPE_NORMAL
- en: Generally, as model complexity increases (can be measured roughly as number
    of parameters – although other factors are important), bias error decreases, and
    variance error increases. This is because the increased number of parameters allows
    the model greater “movement” or “freedom” to fit to the specifics of the given
    training dataset. (Thus, higher-degree polynomials with a larger number of coefficients
    are generally associated with higher-variance overfitting behavior, and lower-degree
    polynomials with a smaller number of coefficients are generally associated with
    higher-bias underfitting behavior.)
  prefs: []
  type: TYPE_NORMAL
- en: The ideal model for a problem is one that minimizes the overall error by balancing
    the bias and variance errors (Figure [1-23](#Fig23)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig23_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A graph plots error against model complexity and curves that rise, dip, and
    open upward from left to right that intersect a vertical line at optimal complexity.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-23
  prefs: []
  type: TYPE_NORMAL
- en: Bias/variance trade-off curve representation. As bias decreases, variance increases,
    and vice versa. The sum of bias-squared and variance is the total model error.
    The best model is the one that manages to balance this trade-off
  prefs: []
  type: TYPE_NORMAL
- en: Feature Space and the Curse of Dimensionality
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As we discuss more mathematically involved concepts and representations of modeling,
    it becomes useful to think of a dataset not only as a collection of rows organized
    across a set of columns but also as a collection of points situated in the *feature
    space*.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, the following dataset (Table [1-1](#Tab1)) can be situated in
    three-dimensional space (Figure [1-24](#Fig24)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_1_Chapter/525591_1_En_1_Fig24_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A three dimensional plane displays points (0, 4, 1), (3, 3, 1), (9, 1, 2), (8,
    9, 6), and (5, 8, 9). Values are estimated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-24
  prefs: []
  type: TYPE_NORMAL
- en: Feature space representation of the data in Table [1-1](#Tab1)
  prefs: []
  type: TYPE_NORMAL
- en: Table 1-1
  prefs: []
  type: TYPE_NORMAL
- en: An example dataset with three features corresponding to three dimensions
  prefs: []
  type: TYPE_NORMAL
- en: '| ***x*** | *y* | *Z* |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| 0 | 3 | 1 |'
  prefs: []
  type: TYPE_TB
- en: '| 3 | 2 | 1 |'
  prefs: []
  type: TYPE_TB
- en: '| 9 | 1 | 2 |'
  prefs: []
