- en: Load CIFAR-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s use the DatasetBuilder method tfds.builder to manipulate another dataset
    and show some examples. The **CIFAR-10** dataset consists of 60,000 32 `×` 32
    color images in ten classes, with 6000 images per class. There are 50,000 training
    images and 10,000 test images.
  prefs: []
  type: TYPE_NORMAL
- en: The ten classes are
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE47]'
  prefs: []
  type: TYPE_PRE
- en: The classes are completely mutually exclusive. There is no overlap between automobiles
    and trucks. Class *automobile* includes sedans, SUVs, and other items of that
    sort. Class *truck* includes only big trucks. Neither includes pickup trucks.
  prefs: []
  type: TYPE_NORMAL
- en: The dataset is divided into five training batches and one test batch, each with
    10,000 images. The test batch contains exactly 1,000 randomly selected images
    from each class. Training batches contain the remaining images in random order,
    but some training batches may contain more images from one class than another.
    Between them, training batches contain exactly 5,000 images from each class. Since
    CIFAR-10 is preprocessed with batches, we can use this information to better batch
    data for the training model.
  prefs: []
  type: TYPE_NORMAL
- en: Listing [3-5](#PC49) loads and processes the dataset for TensorFlow consumption.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE48]'
  prefs: []
  type: TYPE_PRE
- en: 'Inspect the train set:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE49]'
  prefs: []
  type: TYPE_PRE
- en: We see that image tensors have shape (32, 32, 3). And label tensors have shape
    (). So each image is represented by 32 `×` 32 pixels. The *3* value means that
    images are in color. Image tensors are datatype tf.uint8\. Each label is a scalar
    value. Label tensors are datatype tf.int64.
  prefs: []
  type: TYPE_NORMAL
- en: TensorFlow leverages the RGB color model to produce color images. The **RGB
    color model** is an additive color model where red, green, and blue lights are
    added together in various ways to reproduce a broad array of colors. The name
    of the model comes from the initials of the three additive primary colors, namely,
    red, green, and blue.
  prefs: []
  type: TYPE_NORMAL
