- en: '[PRE25]'
  prefs: []
  type: TYPE_PRE
- en: Listing [3-2](#PC27) plots accuracy and loss for the model.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE26]'
  prefs: []
  type: TYPE_PRE
- en: The visualization shows that our model fits data pretty well because train and
