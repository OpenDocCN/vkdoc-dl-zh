- en: 1. AI and Bot Basics
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 1. AI和机器人基础
- en: This chapter covers the basics of bots, how they work, and their interactions
    with users. We will also touch on what exactly artificial intelligence (AI) is
    before moving on to discuss further details of chatbots and why they are necessary.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 本章涵盖了机器人的基础知识、它们的工作原理以及与用户的交互。在讨论聊天机器人的更详细信息以及为什么它们是必要的之前，我们还将探讨人工智能（AI）究竟是什么。
- en: Additionally, this chapter explains the connections between AI and its subsets
    of machine learning and deep learning. Finally, we will study the structure of
    AI and bots and cover available bot frameworks.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，本章还解释了人工智能及其子集机器学习和深度学习之间的联系。最后，我们将研究人工智能和机器人的结构，并涵盖可用的机器人框架。
- en: Artificial Intelligence
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能
- en: '*Artificial intelligence* , or *AI*, is a buzzword nowadays. It is a branch
    of computer science gaining immense popularity. The goal of AI is to create computer
    systems that are independent and function intelligently.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '*人工智能*，或称*AI*，如今是一个热门词汇。它是计算机科学的一个分支，正获得巨大的普及。人工智能的目标是创建独立且智能运作的计算机系统。'
- en: AI is easiest to understand when we describe it in terms of characteristics
    or capabilities of human beings. Let’s explore how AI works with human beings
    or models human behavior.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们用人类的特征或能力来描述人工智能时，最容易理解人工智能。让我们探索人工智能是如何与人类或模拟人类行为的。
- en: Human beings connect with other human beings through language. In the field
    of AI, we call that language exchange *speech recognition* . Because speech recognition
    is more statistically based, we call this type of learning *statistical learning*
    .
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 人类通过语言与其他人类交流。在人工智能领域，我们称这种语言交流为*语音识别*。由于语音识别更基于统计，我们称这种学习为*统计学习*。
- en: Humans can read and write text. In AI, this communication process is called
    *natural language processing* (*NLP*) .
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 人类能够阅读和书写文本。在人工智能中，这种交流过程被称为*自然语言处理*（*NLP*）。
- en: Humans also can see through their eyes and process what they see. This kind
    of perception, when converted into the medium of AI, is known as *computer vision*
    . Computer vision falls under a category of computer science that deals with *symbolic
    learning*.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 人类也能够通过眼睛看世界并处理他们所见。这种感知，当转化为人工智能的媒介时，被称为*计算机视觉*。计算机视觉属于处理*符号学习*的计算机科学范畴。
- en: When humans look at the world around them, they create pictures through their
    eyes. In AI terminology, this is known as *image processing* .
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 当人类观察他们周围的世界时，他们通过眼睛创造图像。在人工智能术语中，这被称为*图像处理*。
- en: Humans can recognize their environment and move around it freely and in any
    manner. When we replicate these kinds of actions in AI, we enable *robotics* .
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 人类能够识别他们的环境并在其中自由移动。当我们试图在人工智能中复制这些行为时，我们使*机器人学*成为可能。
- en: 'Humans have the ability to group patterns of like objects. In terms of AI,
    we call this *pattern recognition* . Machines are better at pattern recognition
    than humans because machines can use more data. Machines interpret the data as
    follows:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 人类有将类似对象模式分组的能力。在人工智能术语中，我们称这为*模式识别*。机器在模式识别方面比人类更擅长，因为机器可以使用更多的数据。机器将数据解释如下：
- en: The dataset is fed into the machine.
  id: totrans-12
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数据集被输入到机器中。
- en: The machine processes the dataset.
  id: totrans-13
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 机器处理数据集。
- en: The machine splits the dataset into training and testing data.
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 机器将数据集分为训练数据和测试数据。
- en: The machine process the training dataset to create a model by using machine-learning
    algorithms.
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 机器通过使用机器学习算法处理训练数据集来创建模型。
- en: The machine compares the model with the testing data.
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 机器将模型与测试数据进行比较。
- en: The machine joins the training and testing data, evaluates, and finally visualizes
    the data.
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 机器将训练数据和测试数据合并，评估，并最终可视化数据。
- en: Figure [1-1](#Fig1) illustrates this process .
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 图[1-1](#Fig1)展示了这一过程。
- en: '![../images/457478_1_En_1_Chapter/457478_1_En_1_Fig1_HTML.png](../images/457478_1_En_1_Chapter/457478_1_En_1_Fig1_HTML.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_1_Chapter/457478_1_En_1_Fig1_HTML.png](../images/457478_1_En_1_Chapter/457478_1_En_1_Fig1_HTML.png)'
- en: Figure 1-1
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-1
- en: Machine-learning flow
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习流程
- en: Machines can deal with excessive amounts of data in datasets. As the machines
    try to interpret and learn from the data, without being programmed to do so, we
    call that process *machine learning* (*ML*) .
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 机器能够处理数据集中的大量数据。当机器试图从数据中解释和学习，而不需要被编程这样做时，我们称这个过程为*机器学习*（*ML*）。
- en: In the human brain, a network of neurons works on making decisions by actively
    working together. When the same situation is applied artificially, artificial
    neurons (These neurons are the basis of neural network) try to work similarly
    to biological neurons, and this behavior is called *cognitive computing* . When
    communication happens within neurons and they convey information and create a
    network on its own, we call it *neural networks* . When the network becomes too
    complex to understand, with complex datasets and many hidden layers involved,
    machines are performing *deep learning* (*DL*) .
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在人脑中，一组神经元通过积极协作来做出决策。当人工应用相同的情况时，人工神经元（这些神经元是神经网络的基础）试图以类似生物神经元的方式工作，这种行为被称为
    *认知计算*。当神经元之间发生通信并自行构建网络以传递信息和创建网络时，我们称之为 *神经网络*。当网络变得过于复杂而难以理解，涉及复杂的数据集和许多隐藏层时，机器正在进行
    *深度学习*（*DL*）。
- en: When machines scan an image from left to right or from top to bottom, those
    machines form a *convolutional neural network* .
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 当机器从左到右或从上到下扫描图像时，这些机器形成了一个 *卷积神经网络*。
- en: Humans generally remember what they did yesterday or, for example, what we had
    for dinner yesterday. Machines that can understand the same sequential concepts
    form *recurrent neural networks* .
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 人类通常能记住昨天做了什么，比如，昨天我们吃了什么。能够理解相同顺序概念的人工智能机器形成了 *循环神经网络*。
- en: Figure [1-2](#Fig2) shows that AI works in two ways. One is a symbolic-based
    approach, and the other is a data-based approach . Symbolic-based learning uses
    image recognition; generally, this technique is used for robotics. When we are
    dealing with huge datasets, we use the data-based approach, also called the machine-learning
    approach.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [1-2](#Fig2) 显示了人工智能以两种方式工作。一种是基于符号的方法，另一种是基于数据的方法。基于符号的学习使用图像识别；通常，这项技术用于机器人。当我们处理大量数据集时，我们使用基于数据的方法，也称为机器学习方法。
- en: '![../images/457478_1_En_1_Chapter/457478_1_En_1_Fig2_HTML.jpg](../images/457478_1_En_1_Chapter/457478_1_En_1_Fig2_HTML.jpg)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_1_Chapter/457478_1_En_1_Fig2_HTML.jpg](../images/457478_1_En_1_Chapter/457478_1_En_1_Fig2_HTML.jpg)'
- en: Figure 1-2
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-2
- en: Two main approaches in the way AI works
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能工作方式中的两种主要方法
- en: When we use the data-based approach, generally we are dealing with a lot of
    data that we need to learn from. Subsequently, machines will be able to predict
    better from early stages as they are now lots of data to work using this data-based
    approach.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们使用基于数据的方法时，通常我们处理的是大量需要从中学习的数据。随后，机器将能够从早期阶段开始就做出更好的预测，因为现在有大量数据可以使用这种基于数据的方法。
- en: Let’s look at an example of how machines work with data. We have sales and advertisement
    data , and use linear regression to identify the relationship between them. Linear
    Regression deals with numerical values for a solution. We are trying get the Linear
    regression curve that fits the straight line equation that is y = mx + C, where
    m is the slope of the gradient C is the constant x is the dependent variable and
    y is the independent variable. First, let’s look at the data points in Figure
    [1-3](#Fig3).
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看机器如何处理数据的例子。我们有销售和广告数据，并使用线性回归来识别它们之间的关系。线性回归处理用于解决方案的数值。我们试图得到一个线性回归曲线，该曲线适合直线方程
    y = mx + C，其中 m 是梯度的斜率，C 是常数，x 是因变量，y 是自变量。首先，让我们看看图 [1-3](#Fig3) 中的数据点。
- en: '![../images/457478_1_En_1_Chapter/457478_1_En_1_Fig3_HTML.jpg](../images/457478_1_En_1_Chapter/457478_1_En_1_Fig3_HTML.jpg)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_1_Chapter/457478_1_En_1_Fig3_HTML.jpg](../images/457478_1_En_1_Chapter/457478_1_En_1_Fig3_HTML.jpg)'
- en: Figure 1-3
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-3
- en: Data points indicating sales vs. advertisement data
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 表示销售与广告数据的数据点
- en: Figure [1-4](#Fig4) shows some patterns, and now we can apply machine learning
    (ML) to it. After the machine learns the patterns, it can make predictions based
    on what it has learned.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [1-4](#Fig4) 展示了一些模式，现在我们可以将其应用于机器学习（ML）。在机器学习到这些模式后，它可以根据所学内容进行预测。
- en: '![../images/457478_1_En_1_Chapter/457478_1_En_1_Fig4_HTML.jpg](../images/457478_1_En_1_Chapter/457478_1_En_1_Fig4_HTML.jpg)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_1_Chapter/457478_1_En_1_Fig4_HTML.jpg](../images/457478_1_En_1_Chapter/457478_1_En_1_Fig4_HTML.jpg)'
- en: Figure 1-4
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-4
- en: The curve shows a pattern. The curve generated from sales increase pattern with
    respect to advertisements.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 曲线显示了模式。曲线是根据广告增加模式相对于销售生成的。
- en: Whereas one, two, or three dimensions (The dimensional data are the data generated
    from information gathered) are easy for humans to learn, machines can learn in
    many dimensions. The high dimensional data has large amount of information example
    would be that for a famous personality we check for where they were born, how
    they came to limelight, their career all have some data but some valuable insights
    are required to get the best information so machine learning on high dimensions
    help the data readable and faster to access.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 而对于一维、二维或三维（维度数据是从收集到的信息中生成数据）来说，对人类来说很容易学习，机器可以在多个维度上学习。高维数据包含大量信息，例如，对于一个著名人物，我们检查他们出生的地方，他们如何成为公众人物，他们的职业生涯都有一些数据，但需要一些有价值的见解来获取最佳信息，因此高维度的机器学习有助于数据的可读性和快速访问。
- en: Figure [1-5](#Fig5) shows how data is available in a high-dimensional space
    and the magnitude of the data associated with it. Machines learn from this high-dimensional
    data space fast and efficiently.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [1-5](#Fig5) 展示了数据在高维空间中的可用性以及与之相关的数据量的大小。机器从这种高维数据空间中快速有效地学习。
- en: '![../images/457478_1_En_1_Chapter/457478_1_En_1_Fig5_HTML.png](../images/457478_1_En_1_Chapter/457478_1_En_1_Fig5_HTML.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_1_Chapter/457478_1_En_1_Fig5_HTML.png](../images/457478_1_En_1_Chapter/457478_1_En_1_Fig5_HTML.png)'
- en: Figure 1-5
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-5
- en: High-dimensional space
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 高维空间
- en: 'A machine can look at large amount of data within the dataset, which we call
    high-dimensional data, and determine patterns. After the machine learns these
    patterns, this valuable information gives useful insights leading to a lot of
    research, and again leading to faster-evolving AI. Machine uses the patterns to
    do two things:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 机器可以在数据集内查看大量数据，我们称之为高维数据，并确定模式。在机器学习这些模式后，这些有价值的信息提供了有用的见解，导致大量研究，再次导致AI的快速发展。机器使用这些模式做两件事：
- en: Classification
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分类
- en: Prediction
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预测
- en: Classification
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 分类
- en: When we work with different kinds of datasets, we generally divide the datasets
    into observation types. We utilize the training data so that we can apply different
    machine-learning algorithms to it. When using Classification if we are trying
    to classify mail coming into our account as legitimate or spam we associate two
    levels either it will get inside the mail box or will be inside spam. We associate
    labels for it which determines the spam filtering process through classification.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们处理不同类型的数据集时，我们通常将数据集划分为观察类型。我们利用训练数据，以便可以将其应用于不同的机器学习算法。当使用分类时，如果我们试图将进入我们账户的邮件分类为合法邮件或垃圾邮件，我们将将其关联到两个级别，要么它将进入邮箱，要么它将进入垃圾邮件。我们为它关联标签，这决定了通过分类的垃圾邮件过滤过程。
- en: Prediction
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 预测
- en: 'When we are working toward future readiness of a particular dataset, we generally
    run predictions by using the available dataset. The model we create after applying
    machine-learning techniques is a benchmark so that we can predict future outcomes
    based on this model. Machines generally learn in two ways:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们致力于特定数据集的未来准备时，我们通常使用可用的数据集进行预测。我们创建的模型在应用机器学习技术后是一个基准，这样我们就可以根据这个模型预测未来的结果。机器通常以两种方式学习：
- en: Supervised learning
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 监督学习
- en: Unsupervised learning
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无监督学习
- en: Supervised Learning
  id: totrans-53
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 监督学习
- en: '*Supervised learning* is generally based on available ground truth (we are
    sharing every resource for the data points such as inputs, outputs, and any other
    available information). Therefore, we are providing the machine or program with
    input and output. The machine goes through the available information and finally
    predicts. Regression is an example of supervised learning. Let us suppose we want
    to predict a price of a property in an area the model we created applying regression
    and the slope formula that is y = mx + C we can get a result that is far off from
    the actual property price the difference is the error in order to get the model
    more accurate and close to the result we will tweak the slope values to get the
    proper value.'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '*监督学习*通常基于可用的真实标签（我们共享数据点（如输入、输出和任何其他可用信息）的每个资源）。因此，我们向机器或程序提供输入和输出。机器通过可用的信息进行学习，并最终进行预测。回归是监督学习的一个例子。让我们假设我们想要预测一个地区的房产价格，我们创建的模型应用了回归和斜率公式
    y = mx + C，我们可以得到一个与实际房产价格相差很大的结果，这个差异就是误差。为了使模型更准确，更接近结果，我们将调整斜率值以获得正确的值。'
- en: Unsupervised Learning
  id: totrans-55
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 无监督学习
- en: Depending on the scenario, the dataset we’re working with may not have any prior
    information available. We might be dealing with datasets that are not labeled
    or classified. In this case, we use *unsupervised learning*.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 根据场景的不同，我们正在处理的数据集可能没有任何先前的信息可用。我们可能正在处理未标记或未分类的数据集。在这种情况下，我们使用*无监督学习*。
- en: '*Clustering* is an example of unsupervised learning.'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '*聚类*是无监督学习的一个例子。'
- en: There is a different way to deal with environments, and we call this branch
    of machine learning *reinforcement learning* . In reinforcement learning, we give
    a machine a goal and ask it to learn it from trial-and-error.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 处理环境有不同的方式，我们称这个机器学习的分支为*强化学习*。在强化学习中，我们给机器一个目标，并要求它通过试错来学习它。
- en: 'Machines learn in the three ways, shown in Figure [1-6](#Fig6): supervised
    , unsupervised , and reinforcement learning .'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习有三种方式，如图[1-6](#Fig6)所示：监督学习、无监督学习和强化学习。
- en: '![../images/457478_1_En_1_Chapter/457478_1_En_1_Fig6_HTML.png](../images/457478_1_En_1_Chapter/457478_1_En_1_Fig6_HTML.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_1_Chapter/457478_1_En_1_Fig6_HTML.png](../images/457478_1_En_1_Chapter/457478_1_En_1_Fig6_HTML.png)'
- en: Figure 1-6
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-6
- en: '*Machines learn in three ways*'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '*机器学习的三种方式*'
- en: Interconnection Between AI, ML, and DL
  id: totrans-63
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI、ML和DL之间的相互联系
- en: AI, ML, and DL, depicted in Figure [1-7](#Fig7), are separate terms. However,
    they do have interconnections, described next.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: AI、ML和DL，如图[1-7](#Fig7)所示，是不同的术语。然而，它们确实有相互联系，下面将进行描述。
- en: '![../images/457478_1_En_1_Chapter/457478_1_En_1_Fig7_HTML.jpg](../images/457478_1_En_1_Chapter/457478_1_En_1_Fig7_HTML.jpg)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_1_Chapter/457478_1_En_1_Fig7_HTML.jpg](../images/457478_1_En_1_Chapter/457478_1_En_1_Fig7_HTML.jpg)'
- en: Figure 1-7
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-7
- en: AI, ML, and DL
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: AI、ML和DL
- en: '*AI* refers to a broad category of computing in which a system is capable enough
    to learn directly from data. This is possible because of a lot of interactions,
    analysis, structuring, and visual representations of data using data analytics.
    This is applied by sets of rules defined by human intervention or increasingly
    by the subset of AI that is also known as machine learning.'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '*人工智能*指的是一种广泛的计算类别，其中系统足够强大，可以直接从数据中学习。这是由于大量交互、分析、数据结构和数据可视化使用数据分析实现的。这是通过人类干预定义的规则集或越来越多地通过也称为机器学习的AI子集实现的。'
- en: With the advancement of ML, many things underwent changes, including processing
    the data and the way information is used. Data needs some form of automation to
    evaluated faster without the need for human intervention. ML deals with large
    data sets too.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 随着机器学习的进步，许多事物都发生了变化，包括数据处理和信息使用的方式。数据需要某种形式的自动化，以便在没有人类干预的情况下更快地评估。机器学习也处理大量数据集。
- en: When we use a lot of data for our work, we reach a computational tipping point,
    which is when lots of data is gathered together and size is really huge to work
    with as depicted in Figure [1-8](#Fig8). This can result in new implementation
    methods in data analytics.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们为我们的工作使用大量数据时，我们会达到一个计算临界点，这是指大量数据被聚集在一起，规模非常大，如图[1-8](#Fig8)所示。这可能导致数据分析中的新实现方法。
- en: '![../images/457478_1_En_1_Chapter/457478_1_En_1_Fig8_HTML.jpg](../images/457478_1_En_1_Chapter/457478_1_En_1_Fig8_HTML.jpg)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_1_Chapter/457478_1_En_1_Fig8_HTML.jpg](../images/457478_1_En_1_Chapter/457478_1_En_1_Fig8_HTML.jpg)'
- en: Figure 1-8
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-8
- en: Reaching the computational tipping point
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 达到计算临界点
- en: A subset of ML known as deep learning (DL) was one result of reaching this tipping
    point. Figure [1-9](#Fig9) illustrates the relationship between AI, ML, and DL.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习（DL）是达到这个临界点的一个结果，它是机器学习的一个子集。图[1-9](#Fig9)说明了AI、ML和DL之间的关系。
- en: '![../images/457478_1_En_1_Chapter/457478_1_En_1_Fig9_HTML.jpg](../images/457478_1_En_1_Chapter/457478_1_En_1_Fig9_HTML.jpg)'
  id: totrans-75
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_1_Chapter/457478_1_En_1_Fig9_HTML.jpg](../images/457478_1_En_1_Chapter/457478_1_En_1_Fig9_HTML.jpg)'
- en: Figure 1-9
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-9
- en: The evolution from artificial intelligence to deep learning
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 从人工智能到深度学习的演变
- en: A neural network , illustrated in Figure [1-10](#Fig10), is another concept
    we will discuss in this book that has become popular. When analysing an image
    the first thing computer does is to break the image in RGB scale now we have different
    levels of abstractions for the layers. We need to access the layer in different
    way. So a neural network is generated and as we see if the level of abstraction
    goes beyond 3 it directly falls under Deep Learning and neural network is a part
    of it.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络，如图[1-10](#Fig10)所示，是我们将在本书中讨论的另一个概念，它已经变得流行。在分析图像时，计算机首先会将图像分解成RGB尺度，现在我们有了不同层次的抽象层。我们需要以不同的方式访问层。因此，生成了一个神经网络，正如我们所看到的，如果抽象层次超过3，它就直接属于深度学习，而神经网络是其中的一部分。
- en: '![../images/457478_1_En_1_Chapter/457478_1_En_1_Fig10_HTML.jpg](../images/457478_1_En_1_Chapter/457478_1_En_1_Fig10_HTML.jpg)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_1_Chapter/457478_1_En_1_Fig10_HTML.jpg](../images/457478_1_En_1_Chapter/457478_1_En_1_Fig10_HTML.jpg)'
- en: Figure 1-10
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-10
- en: Neural network
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络
- en: The neural network made sense of different connected neuron networks and produced
    outputs that brought groundbreaking results. This resulted in the progressive
    growth of AI in a broader sense for capabilities such as image, speech, and natural
    language recognition. This produced significant and positive impacts in our daily
    lives. The evolution of deep learning signifies that AI is not static and will
    grow and adapt accordingly as different techniques arise. One good example would
    be that we travel to a different place we don’t know the language the capabilities
    of AI can take an image or the information that is there using the webcam and
    can convert it into easy english language.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络理解了不同的连接神经元网络，并产生了带来突破性成果的输出。这导致了AI在更广泛意义上的能力，如图像、语音和自然语言识别的渐进式增长。这在我们日常生活中产生了重大和积极的影响。深度学习的演变表明，AI不是静态的，它将随着不同技术的出现而增长和适应。一个很好的例子是我们去了一个我们不知道语言的地方，AI的能力可以捕捉到或转换成易于理解的英语语言的信息，使用网络摄像头。
- en: Chatbots
  id: totrans-83
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 聊天机器人
- en: Chatbots they have come a long way. From being static to more on interaction.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 聊天机器人已经走了很长的路。从静态转向更多互动。
- en: In today’s world, we have to hide service layers within plain conversational
    techniques. We don’t want to show whats happening underneath so we wrap the service
    layer and hide the logic so that we are not able to show the entire process of
    communication as many people want their technique to be secretive.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 在当今世界，我们必须将服务层隐藏在普通的对话技术中。我们不希望展示下面发生的事情，所以我们包装服务层并隐藏逻辑，这样我们就不能展示整个通信过程，因为许多人希望他们的技术是保密的。
- en: For the best chatbots, we need to underline one thing. If a human being analyzes
    both a bot and a human conversation and is unable to tell the difference between
    the two, we say it passes the *Turing test* . However, until now, no bot has been
    able to achieve this feat.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 对于最好的聊天机器人，我们需要强调一点。如果一个人分析了一个机器人和人类的对话，却无法区分两者，我们说它通过了 *图灵测试*。然而，到目前为止，还没有任何机器人能够实现这一壮举。
- en: Traditionally speaking, chatbots have used what we call a *retrieval-based model*
    . In this model, a programmer's code provides predefined responses, and chatbots
    learn in a heuristic way to pick the appropriate response.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 传统上讲，聊天机器人使用了我们所说的 *基于检索的模型*。在这个模型中，程序员的代码提供了预定义的响应，聊天机器人以启发式的方式学习选择适当的响应。
- en: The first chatbots ever created used rule-based expression matching. Now the
    approach has moved to using ML as a classifier for better responses. We can take
    as an example Facebook’s API, for which we can hard-code responses and then classify
    words with intent. Then if we ask or phrase a query as, “What day is today?” or
    “Today is what day?” Chatbot understands both.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 最初创建的聊天机器人使用了基于规则的匹配表达式。现在这种方法已经转向使用机器学习作为分类器以获得更好的响应。我们可以以Facebook的API为例，我们可以硬编码响应，然后根据意图对单词进行分类。然后如果我们问或表达一个查询，比如，“今天是什么日子？”或者“今天是星期几？”聊天机器人都能理解。
- en: Generative Chatbot Model
  id: totrans-89
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 生成式聊天机器人模型
- en: A *generative chatbot model* relies on predefined responses, and whatever we
    do, we should write them from scratch. When we are working with chatbots, we first
    have to see whether we are working on a closed domain or an open domain.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 一种 *生成式聊天机器人模型* 依赖于预定义的响应，无论我们做什么，我们都应该从头开始编写它们。当我们与聊天机器人一起工作时，我们首先必须看看我们是在一个封闭领域还是在一个开放领域工作。
- en: Open Domain
  id: totrans-91
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 开放领域
- en: In an *open domain*, a conversation can go anywhere. There are infinite things
    to talk about.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个 *开放领域* 中，对话可以走向任何地方。有无限多的事情可以谈论。
- en: Closed Domain
  id: totrans-93
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 封闭领域
- en: 'In a *closed domain*, a conversation focuses on a single subject or topic.
    The chatbots evolve based on the kind of conversation we want: long or short.
    Short conversations are easier to use.'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个*封闭领域*中，对话集中于单一主题或话题。聊天机器人根据我们想要的对话类型（长或短）进行演变。短对话更容易使用。
- en: How Do Chatbots Work?
  id: totrans-95
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 聊天机器人是如何工作的？
- en: 'The best way to learn how chatbots work is to first understand the brain of
    bot. We call this a *digital brain* , and it consists of three main parts:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 了解聊天机器人工作最佳的方式是首先了解机器人的大脑。我们称之为*数字大脑*，它由三个主要部分组成：
- en: 'Knowledge source: Where we need to find out which informations needs to provided
    to the bot so the conversation starts and for Q and A'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 知识来源：我们需要找出哪些信息需要提供给机器人，以便开始对话以及问答
- en: 'Stock phrases: Its something where we can handle general phrases of conversation
    which is used more often'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 常用短语：这是我们可以处理常用对话短语的地方，这些短语使用得更频繁
- en: 'Conversational memory: When we are doing a conversation we have to remember
    the flow what has happened so conversational memory is required'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对话式记忆：当我们进行对话时，我们必须记住已经发生的过程，因此需要对话式记忆
- en: When we start communicating with a bot, we may send a message (for example,
    “hello”), and the bot starts working—or more accurately, analyzing the message.
    The bot’s activity is known as *parsing*. Next the bot will look for keywords
    in order to reply to the message.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们开始与机器人沟通时，我们可能会发送一条消息（例如，“你好”），然后机器人开始工作——更准确地说，分析消息。机器人的活动被称为*解析*。接下来，机器人将寻找关键词以回复消息。
- en: Then the brain of the bot will use its three main parts to analyze the message
    and then construct its reply. Figure [1-11](#Fig11) shows the structure of the
    bot’s digital brain .
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，机器人的大脑将使用其三个主要部分来分析消息，然后构建其回复。图 [1-11](#Fig11) 展示了机器人数字大脑的结构。
- en: '![../images/457478_1_En_1_Chapter/457478_1_En_1_Fig11_HTML.png](../images/457478_1_En_1_Chapter/457478_1_En_1_Fig11_HTML.png)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_1_Chapter/457478_1_En_1_Fig11_HTML.png](../images/457478_1_En_1_Chapter/457478_1_En_1_Fig11_HTML.png)'
- en: Figure 1-11
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-11
- en: The bot’s digital brain
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 机器人的数字大脑
- en: Figure [1-12](#Fig12) shows how the response is generated from the digital brain.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [1-12](#Fig12) 展示了响应是如何从数字大脑中生成的。
- en: '![../images/457478_1_En_1_Chapter/457478_1_En_1_Fig12_HTML.png](../images/457478_1_En_1_Chapter/457478_1_En_1_Fig12_HTML.png)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_1_Chapter/457478_1_En_1_Fig12_HTML.png](../images/457478_1_En_1_Chapter/457478_1_En_1_Fig12_HTML.png)'
- en: Figure 1-12
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-12
- en: The response being generated by the bot
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 机器人生成的响应
- en: Rise of the Chatbots—Conversational Commerce
  id: totrans-109
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 聊天机器人的兴起——对话式商业
- en: Conversational commerce uses chats, messaging, or some kind of natural language
    as its interface. *Conversational* means it uses some kind of voice or text medium
    to transfer data and understand how people communicate. What we are doing with
    chats and messaging is using this particular medium to easily interact with each
    other. To make our jobs easier to answer simple queries for our business we feed
    the bot with common questions and answers so that we can save time before they
    go to the customer care if required.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 对话式商业使用聊天、消息或某种自然语言作为其界面。*对话式*意味着它使用某种声音或文本媒介来传输数据并理解人们的交流方式。我们通过聊天和消息使用这种特定的媒介来轻松地相互交流。为了使我们的工作更轻松，我们向机器人提供常见的问题和答案，这样我们就可以在需要时节省时间，避免他们去客户服务。
- en: 'The advent of conversational commerce allows users to talk to companies and
    have companies also talk back in an easy manner. This can happen in three ways:'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 对话式商业的出现使用户能够以简单的方式与公司交谈，并且公司也能以简单的方式回应。这可以通过三种方式发生：
- en: 'Bidirectional: That is the communication flow is faster and seamless within
    the bot'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 双向：这意味着在机器人内部的通信流程更快且无缝
- en: 'Asynchronous: Allowing the messaging to be controlled at timely mannere and
    not within specified time intervals'
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 异步：允许在及时的方式下控制消息，而不是在指定的时间间隔内
- en: 'In real time: The communication response is to make it realtime'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实时：通信响应是为了使其实时
- en: The Role of Chatbots
  id: totrans-115
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 聊天机器人的角色
- en: In conversational commerce, chatbots are the computer programs used to simulate
    a conversation with a human. They use a text-based approach.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 在对话式商业中，聊天机器人是用于模拟与人类对话的计算机程序。它们使用基于文本的方法。
- en: 'Chatbots work on the following:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 聊天机器人工作在以下方面：
- en: Basic operations
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基本操作
- en: Basic things answering the general queries with ease
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基本事物：轻松回答一般查询
- en: Basic questions
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基本问题
- en: The Role of Humans
  id: totrans-121
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 人类的作用
- en: Conversational commerce is powered by humans. The UI developed is powered by
    humans. The structure (also called an *interface*) is designed by humans and is
    where the communication occurs.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 对话式商业由人类驱动。开发出的用户界面由人类驱动。结构（也称为*界面*）由人类设计，并且在这里发生交流。
- en: When a conversations increases in complexity, it is handed over for human operators
    to resolve.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 当对话变得复杂时，将由人工操作员来处理解决。
- en: Growth of Chat Apps
  id: totrans-124
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 聊天应用的增长
- en: 'The chatbot’s popularity comes from the growing use of messaging applications
    such as Facebook Messenger, WhatsApp, and Telegram. These chat apps are now trending
    and surpassing social applications. The Facebook Messenger platform is a good
    example of an application that has surpassed all social apps because of the following:'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 聊天机器人的流行源于消息应用（如Facebook Messenger、WhatsApp和Telegram）的日益普及。这些聊天应用现在很流行，并超越了社交应用。Facebook
    Messenger平台是一个很好的例子，因为它超越了所有社交应用：
- en: A unified and a free flowing UI
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 统一且流畅的用户界面
- en: Great experience
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 优秀的体验
- en: Very dynamic as many people use them
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 非常动态，因为很多人使用它们
- en: Chatbot allows us to work on business criteria by having direct conversations
    with a company.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 聊天机器人允许我们通过与公司直接对话来处理业务标准。
- en: The following sections provide some chatbot examples.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 以下部分提供了一些聊天机器人的示例。
- en: Poncho
  id: totrans-131
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: Poncho
- en: Poncho is a weather activity bot whose logo is cat. The cat handles all the
    conversations for you and shares the weather in a simple and collaborative way.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: Poncho是一个以猫为标志的天气活动机器人。猫处理所有的对话，并以简单和协作的方式分享天气。
- en: CNN Bot
  id: totrans-133
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: CNN机器人
- en: This is a news bot providing news options. We can ask specific questions to
    the bot with keywords such as “Space.” It will then give us information about
    space news. The CNN bot also learns from our daily activity and predicts accordingly,
    with news options available based on the type of searches we do.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个提供新闻选项的新闻机器人。我们可以用“太空”等关键词向机器人提出具体问题。然后它会给我们提供关于太空新闻的信息。CNN机器人也会从我们的日常活动中学习，并据此预测，基于我们进行的搜索类型提供新闻选项。
- en: Spider Bots
  id: totrans-135
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 爬虫机器人
- en: Another common bot type is the web spider bot . These bots gather information
    from the web in order to discover details that can be harvested and stored. We
    can use these bots to capture e-mail information from a page and move to the next
    page. This process is known as *scraping*. Search engines like Google use spiders
    to increase the speed of their searches.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种常见的机器人类型是网络爬虫机器人。这些机器人从网络中收集信息，以发现可以收集和存储的详细信息。我们可以使用这些机器人从网页上捕获电子邮件信息，并跳转到下一页。这个过程被称为*抓取*。搜索引擎如谷歌使用爬虫来提高搜索速度。
- en: Twitter Bots
  id: totrans-137
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: Twitter机器人
- en: There are bots present on Twitter that analyze tweets. They work on finding
    specific topics, intending to do retweets based on those topics.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: Twitter上存在一些分析推文的机器人。它们专注于寻找特定主题，意图基于这些主题进行转发。
- en: Botnets
  id: totrans-139
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 机器人网络
- en: When a coordinated unit of bots works together in tandem, we call that a *botnet*.
    Botnets can be requested go to the same web page at once and make web sites crash.
    This is also known as a distributed denial-of-service (DDoS) attack when botnets
    are distributed.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 当一组协调的机器人协同工作时，我们称之为*机器人网络*。机器人网络可以同时请求访问同一网页并使网站崩溃。当机器人网络分布时，这也被称为分布式拒绝服务（DDoS）攻击。
- en: Reinforcement Learning Bot
  id: totrans-141
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 强化学习机器人
- en: Reinforcement learning bots use a reinforcement learning approach. Reinforcement
    learning is based on trial-and-error. Reinforcement learning is also based on
    environments (It can be a 3d space, A game based scenario etc) and worlds, hence
    why we should not work on modeling the world. Instead we should work on modeling
    the mind that means the best possible step that needs to taken should be given
    to the machine such that it works within its limits.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习机器人使用强化学习方法。强化学习基于试错。强化学习还基于环境（可以是3D空间，基于游戏的场景等）和世界，因此我们不应该致力于建模世界。相反，我们应该致力于建模思维，这意味着应该给机器提供最佳可能的步骤，使其在其限制内工作。
- en: DeepMind (Its a Google funded startup that works towards finding reinforcement
    learning solutions to practice) worked toward finding a solution that is now popular
    and works toward formulation of artificial general intelligence.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: DeepMind（这是一个由谷歌资助的初创公司，致力于寻找强化学习解决方案以进行实践）致力于寻找现在流行的解决方案，并致力于人工智能通用性的制定。
- en: 'DeepMind’s algorithm works toward solving solutions, such as playing Atari
    games with one unified approach, is known as Deep Q-Learning. It takes two inputs:
    the raw pixels of the game and the game score. Based on those two, it has to reach
    its objective to maximize the score. First it uses deep convolutional neural networks
    to interpret the pixels. Deep convolutional neural networks extract features and
    the bot learns as hidden layers get incredibly abstract.'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: DeepMind 的算法旨在解决解决方案，例如使用统一方法玩 Atari 游戏，被称为深度 Q 学习。它需要两个输入：游戏的原始像素和游戏得分。基于这两个输入，它必须达到其目标以最大化得分。首先，它使用深度卷积神经网络来解释像素。深度卷积神经网络提取特征，随着隐藏层变得极其抽象，机器人通过这些隐藏层进行学习。
- en: The Structure of a Bot
  id: totrans-145
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 机器人的结构
- en: This section describes what a bot structure looks like and how conversations
    flows.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 本节描述了机器人结构的外观以及对话是如何流动的。
- en: Figure [1-13](#Fig13) describes how the structure of the bot’s programming is
    formed.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [1-13](#Fig13) 描述了机器人编程结构是如何形成的。
- en: '![../images/457478_1_En_1_Chapter/457478_1_En_1_Fig13_HTML.png](../images/457478_1_En_1_Chapter/457478_1_En_1_Fig13_HTML.png)'
  id: totrans-148
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_1_Chapter/457478_1_En_1_Fig13_HTML.png](../images/457478_1_En_1_Chapter/457478_1_En_1_Fig13_HTML.png)'
- en: Figure 1-13
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-13
- en: The structure of the bot
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 机器人的结构
- en: We first start with texting with some questions, then we move to the place/template
    where we start developing or coding the logic of the bot here the response flow
    is generated. Next, we describe the intent that forms the basis of the bot’s communication,
    in order to provide a textual response and making the chatbot interactive.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先从发送一些问题开始进行文本交流，然后转到开始开发或编写机器人逻辑的地方/模板，在这里生成响应流程。接下来，我们描述构成机器人交流基础的意图，以便提供文本响应并使聊天机器人交互。
- en: We use entities to break the piece of information that is message flow to better
    understand what is happening for our usage to communicate. Finally, we create
    a workflow for the bot to get organized. This flow which allows the entire process
    to work efficiently it is either called a *dialog flow* or *form flow* .
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用实体来分解信息流中的信息片段，以便更好地理解我们使用的情况。最后，我们为机器人创建一个工作流程以实现组织。这个允许整个流程高效运行的流程，被称为*对话流程*或*表单流程*。
- en: Let’s talk about the structure of bot in detail now. We generally want to see
    an efficient text response platform. For bots to work in a specific manner, we
    need a specific software development kit or interface where we start preparing
    the logic. The logic can be embedded within an IDE or it can be completely cloud
    based, as in IBM’s Watson.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来详细讨论机器人的结构。我们通常希望看到一个高效的文本响应平台。为了让机器人在特定方式下工作，我们需要一个特定的软件开发工具包或接口，我们从那里开始准备逻辑。逻辑可以嵌入在
    IDE 中，也可以完全基于云，如 IBM 的 Watson。
- en: We need to have a template, or place, where we start our development. Of course,
    it’s easier to start with a template because the basis is already formed.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要一个模板或地方开始我们的开发。当然，从模板开始更容易，因为基础已经形成。
- en: Now we need to find specific ways to deal with a type of communication. For
    this, we use intent. Intent is generally the basis for the training of our bot.
    For example, if we have an intent for the bot to offer greetings, the ways for
    the bot to start with that intent might be “Hi,” “Hello,” “Hey there,” and so
    forth. We have to provide specific text for understanding the logic of the intent.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们需要找到处理某种沟通的具体方法。为此，我们使用意图。意图通常是训练我们机器人的基础。例如，如果我们有一个让机器人提供问候的意图，机器人开始这个意图的方式可能是“嗨”，“你好”，“嘿，那里”，等等。我们必须提供特定的文本来理解意图的逻辑。
- en: Now we move to something called *entities* . When a user has a text conversation
    with a bot, the bot uses intent to choose the response or to make intelligent
    decisions to get the conversation flow going.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们转向所谓的*实体*。当用户与机器人进行文本对话时，机器人使用意图来选择响应或做出智能决策以推动对话流程。
- en: Dialog Flow or Form Flow
  id: totrans-157
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 对话流程或表单流程
- en: This dialog flow, or form flow, s the process by which we structure the intents
    and entities to work together for a specific goal for the bot. We declare all
    the functionalities that will be performed by the bot. Now we are done with the
    logic, and this is how the bot is organized.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 这种对话流程或表单流程是我们将意图和实体结构化以共同实现特定目标的过程，为机器人声明所有将执行的功能。现在我们已经完成了逻辑，这就是机器人组织的方式。
- en: Bot Frameworks
  id: totrans-159
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 机器人框架
- en: 'The technology giants have all come up with different bot frameworks to get
    started with bot development. Here are the major bot frameworks:'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 技术巨头们都已经提出了不同的机器人框架，以开始机器人开发。以下是主要的机器人框架：
- en: Microsoft has the Bot Framework.
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 微软有Bot Framework。
- en: Google has Wit.ai and Dialogflow.
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 谷歌有Wit.ai和Dialogflow。
- en: IBM has Watson.
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: IBM有Watson。
- en: Amazon Web Services (AWS) has its own bot framework powered by AWS Lambda.
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 亚马逊网络服务（AWS）拥有自己的由AWS Lambda驱动的机器人框架。
- en: We can develop a chatbot by using TensorFlow.
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们可以使用TensorFlow来开发聊天机器人。
- en: We can also use FlockOS to develop chatbots.
  id: totrans-166
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们还可以使用FlockOS来开发聊天机器人。
- en: Chatbots are gaining in popularity. That’s why every big company is trying to
    create a framework where bot development can occur.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 聊天机器人的受欢迎程度正在上升。这就是为什么每个大公司都在尝试创建一个框架，以便进行机器人开发。
- en: As we gather information with the flow of bots, we use a programming language
    to structure the bot and redirect it accordingly.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们通过机器人流程收集信息，我们使用编程语言来构建机器人的结构，并相应地引导它。
- en: We are seeing the rise of chatbots as the evolving bot frameworks are becoming
    readily available to use.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 我们看到随着机器人框架的不断发展，聊天机器人正在兴起，并且这些框架正变得易于使用。
- en: Conclusion
  id: totrans-170
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: This chapter presented the basics of bot frameworks and described the process
    of developing bots. We also covered artificial intelligence with descriptions
    of machine learning as well as deep learning. We have shown how conversational
    commerce works and discussed the digital brain in terms of chatbots. Finally,
    we touched on the structure of bots and ended with the frameworks available for
    bot development. In the next chapter, we can begin bot development.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 本章介绍了机器人框架的基础知识，并描述了开发机器人的过程。我们还涵盖了人工智能，包括机器学习和深度学习的描述。我们展示了对话式商业是如何运作的，并从聊天机器人的角度讨论了数字大脑。最后，我们简要介绍了机器人的结构，并以可用于机器人开发的框架结束。在下一章中，我们可以开始机器人开发。
