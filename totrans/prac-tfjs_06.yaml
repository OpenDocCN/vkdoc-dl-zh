- en: 6. Identifying toxic text from a Google Chrome Extension
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 6. 从 Google Chrome 扩展程序中识别有毒文本
- en: '**Online toxicity** is an unfortunate, challenging, and unwanted reality of
    the Internet. Take a stroll down any online comment section, Twitter thread, or
    multiplayer game, and you will find a piece of obscene and offensive text that
    will make you say “wow.” In those circumstances, there is not much we can do,
    except for clicking the “report” button and hoping that someone or some magic
    entity identifies and removes the comment. This chapter addresses this issue.
    Here, we will build a tool capable of detecting and **classifying toxic content**.'
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: '**在线毒性** 是互联网上不幸、具有挑战性和不受欢迎的现实。在任何在线评论区、Twitter 线程或多人游戏中漫步，你都会发现一些令人震惊和冒犯性的文本，这会让你说“哇。”在这种情况下，我们几乎无能为力，只能点击“举报”按钮，并希望有人或某个神奇实体识别并删除该评论。本章将解决这个问题。在这里，我们将构建一个能够检测和
    **分类有毒内容** 的工具。'
- en: Our next exercise involves using TensorFlow.js’ pre-trained toxicity classifier
    to detect the type of toxicity, for example, insult or obscenity, present in a
    piece of text, making this the first chapter that features text data. The product
    you will develop is a **Google Chrome Extension** to identify toxic content from
    a selected text. Figure [6-1](#Fig1) is a screenshot of the widget. There, under
    the “selected text” header, is the obviously toxic text “you are a disgusting
    person,” and below, a table containing the seven different categories of toxicity
    and a label pointing out whether the line falls into that class. In this case,
    the selected text is classified as an “insult” and “toxic.”
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我们接下来的练习涉及使用 TensorFlow.js 的预训练毒性分类器来检测文本中存在的毒性类型，例如侮辱或淫秽，这使得本章成为第一个介绍文本数据的章节。你将开发的产品是一个
    **Google Chrome 扩展程序**，用于从所选文本中识别有毒内容。图 [6-1](#Fig1) 是该小部件的截图。在那里，“所选文本”标题下是明显有毒的文本“你是个令人厌恶的人”，下面是一个包含七个不同类别毒性和一个指出该行是否属于该类别的标签的表格。在这种情况下，所选文本被分类为“侮辱”和“有毒”。
- en: '![../images/494424_1_En_6_Chapter/494424_1_En_6_Fig1_HTML.jpg](../images/494424_1_En_6_Chapter/494424_1_En_6_Fig1_HTML.jpg)'
  id: totrans-3
  prefs: []
  type: TYPE_IMG
  zh: '![../images/494424_1_En_6_Chapter/494424_1_En_6_Fig1_HTML.jpg](../images/494424_1_En_6_Chapter/494424_1_En_6_Fig1_HTML.jpg)'
- en: Figure 6-1
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-1
- en: A screenshot of the extension
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 扩展程序的截图
- en: Understanding the toxicity detector
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解毒性检测器
- en: The toxicity detector model, let’s call it **ToxDet** , is a pre-trained model
    for detecting six subtypes of toxicity content among a piece of (English) text
    or a series of them. Its six kinds of toxicity—*identity attack*, *insult*, *obscene*,
    *severe toxicity*, *sexually explicit*, *threat*, plus an *overall toxicity* label—cover
    a significant range or “levels” of vulgarity you would find in an online setting.
    For example, consider the class “identity attack,” which describes “a negative,
    discriminatory or hateful comment about a person or group of people” (Conversation
    AI, 2018), or the “threatening” label which identifies text intended to cause
    harm against an entity or group.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 毒性检测器模型，让我们称其为 **ToxDet**，是一个预训练模型，用于检测一段（英语）文本或一系列文本中的六种毒性子类型。其六种毒性包括——*身份攻击*、*侮辱*、*淫秽*、*严重毒性*、*色情暴露*、*威胁*，以及一个
    *总体毒性* 标签——涵盖了在线环境中你会遇到的大量粗俗或“级别”。例如，考虑“身份攻击”这一类别，它描述了“关于个人或群体的负面、歧视性或仇恨性评论”（Conversation
    AI，2018），或者“威胁”标签，它识别旨在对实体或群体造成伤害的文本。
- en: ToxDet is trained on top of another model, known as the **Universal Sentence
    Encoder** (Cer et al., 2018), or USE, a network that encodes or transforms text
    into a 512-dimensional embedding. Put differently, USE converts text to an array
    of 512 floats. To illustrate this, see the following example featuring the TensorFlow.js
    implementation of USE:^([1](#Fn1))
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: ToxDet 是在另一个名为 **Universal Sentence Encoder** (Cer et al., 2018) 或 USE 的模型之上进行训练的，USE
    是一个将文本编码或转换为 512 维嵌入的网络。换句话说，USE 将文本转换为 512 个浮点数的数组。为了说明这一点，请参见以下使用 TensorFlow.js
    实现USE的示例：^([1](#Fn1))
- en: '[PRE0]'
  id: totrans-9
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: This example encodes the phrase “we like tensorflow.js” (of course we do) into
    a tensor of shape [1,512] with values [[-0.0569201, -0.0590669, -0.0376535, ...,
    -0.0493428, 0.0461595, -0.0551419],].
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 此示例将短语“我们喜欢 tensorflow.js”（当然我们喜欢）编码为形状为 [1,512] 的张量，其值为 [[-0.0569201, -0.0590669,
    -0.0376535, ..., -0.0493428, 0.0461595, -0.0551419],]。
- en: So, how do we go from a model like USE to a toxicity detector? With **transfer
    learning** . Transfer learning (a technique we will explore in Chapter [8](494424_1_En_8_Chapter.xhtml))
    is the machine learning task of reusing a model originally trained for one problem
    as a starting point of a second model. Here, the knowledge of USE serves as the
    base of the toxicity detector. After transferring the knowledge, the resulting
    new model is further trained with the intended dataset so it can serve its purpose,
    which is predicting different toxicity categories.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们如何将像USE这样的模型转变为毒性检测器？通过**迁移学习**。迁移学习（我们将在第[8](494424_1_En_8_Chapter.xhtml)章中探讨的技术）是将最初为一个问题训练的模型作为第二个模型的起点重新使用的机器学习任务。在这里，USE的知识作为毒性检测器的基石。在迁移知识后，新的模型将使用目标数据集进一步训练，以便它能发挥其作用，即预测不同的毒性类别。
- en: About the data
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关于数据
- en: ToxDet training dataset (Borkan et al., 2019) is a comments corpus from the
    defunct commenting plugin, *Civil Comments*. This tool featured a comment submission
    method where, in order to publish a comment, each user first has to review and
    rate other comments so that others could also rate theirs. The dataset has around
    2 million of these rated comments. Its target variable, “target,” is a value from
    0 to 1 that rates the overall toxicity of the text. Besides having one label,
    each comment is also ranked in terms of the six subtypes presented earlier. For
    example, the comment “haha you guys are a bunch of losers” has a target value
    or toxicity of 0.89, “severe_toxicity” 0.02, “identity_attack” 0.02, and “insult”
    0.87.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: ToxDet的训练数据集（Borkan等人，2019年）来自已停用的评论插件*Civil Comments*的评论语料库。这个工具具有一种评论提交方法，即为了发布评论，每个用户首先必须审查和评分其他评论，以便其他人也能对其评分。该数据集大约有200万条这样的评分评论。其目标变量“target”是一个从0到1的值，用于评估文本的整体毒性。除了有一个标签外，每条评论还被按照前面提到的六个子类型进行排名。例如，评论“haha
    you guys are a bunch of losers”的目标值或毒性为0.89，“severe_toxicity”为0.02，“identity_attack”为0.02，“insult”为0.87。
- en: Because of the generic nature of the data, ToxDet is more suitable for applications
    of the general domain. Therefore, it might not perform satisfactorily in highly
    specific use cases or situations when the input data varies significantly from
    the training set.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 由于数据具有通用性，ToxDet更适合通用领域的应用。因此，它可能在高度特定的用例或输入数据与训练集显著不同的情境中表现不佳。
- en: Building the extension
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建扩展
- en: By this point, the solutions we have developed involve a web app (or game) where
    the user interfaces with the model from the browser’s window. But a browser is
    more than just a window. It is also an environment capable of executing small
    built-in applications that customize the browsing experience and extend its functionalities.
    One example is the Chrome Extensions, and now you will make one.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们开发的解决方案涉及一个网络应用程序（或游戏），其中用户通过浏览器的窗口与模型交互。但浏览器不仅仅是窗口。它还是一个能够执行小型内置应用程序的环境，这些应用程序可以定制浏览体验并扩展其功能。一个例子是Chrome扩展程序，现在你将创建一个。
- en: The extension is about identifying the subtypes of toxicity present in a selected
    text using the toxicity model. Using it is very simple. First, the user has to
    select any text from a web page. With the text selected, it has to click the app’s
    icon to open a small pop-up displaying a table with the predictions (as seen in
    Figure [6-1](#Fig1)). Regarding the implementation, since we will not do any sort
    of visualization, data processing, training, or even building of a complete UI,
    the work reduces to loading the model, predicting, and displaying the results.
    Here we go!
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 该扩展旨在使用毒性模型识别所选文本中存在的毒性子类型。使用它非常简单。首先，用户必须从网页中选择任何文本。文本被选中后，必须点击应用程序的图标以打开一个小弹出窗口，显示预测结果表格（如图[6-1](#Fig1)所示）。关于实现方面，由于我们不会进行任何类型的可视化、数据处理、训练甚至构建完整的用户界面，工作就简化为加载模型、预测和显示结果。现在我们开始吧！
- en: Creating the HTML and app’s manifest
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建HTML和应用程序清单
- en: 'We will start this tutorial a bit differently than the others. Instead of creating
    an *index.html* file , create one named *manifest.json* , a file used to configure
    the extension. Also, do not worry about the web server; you will not need it.
    Inside the manifest, set some necessary information such as the name of the extension,
    version, description, and other more specific attributes:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将开始这个教程的方式与其他教程略有不同。不是创建一个*index.html*文件，而是创建一个名为*manifest.json*的文件，这是一个用于配置扩展的文件。同时，不要担心Web服务器；你将不需要它。在清单中，设置一些必要的信息，例如扩展的名称、版本、描述和其他更具体的属性：
- en: '[PRE1]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The `permissions` attribute defines the intent of the app. For instance, this
    extension requires the `activeTab` permission, one that grants access to the active
    tab when the user uses the plugin. Another attribute we need is `browser_action`,
    used to put icons in the extension’s toolbar. Inside it, add a field `default_popup`
    and set its value to `src/popup.html` to open this file after clicking the icon.
    Two other attributes we use are `manifest_version` to specify the format of the
    manifest file and `content_security_policy` to allow the app to access [`https://cdn.jsdelivr.net`](https://cdn.jsdelivr.net)*,*
    the CDN from where we have been getting TensorFlow.js. This rule enforces security
    by ensuring that no other sites can be accessed.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '`permissions` 属性定义了应用的目的。例如，此扩展需要 `activeTab` 权限，它允许在用户使用插件时访问活动标签页。我们还需要另一个属性
    `browser_action`，用于在扩展的工具栏中放置图标。在其内部，添加一个字段 `default_popup` 并将其值设置为 `src/popup.html`
    以在点击图标后打开此文件。我们使用的另外两个属性是 `manifest_version`，用于指定清单文件的格式，以及 `content_security_policy`，允许应用访问
    `[https://cdn.jsdelivr.net](https://cdn.jsdelivr.net)`，这是我们获取 TensorFlow.js 的
    CDN。此规则通过确保无法访问其他网站来强制执行安全性。'
- en: 'The second file you will need is *popup.html* , the extension interface. In
    the project’s root directory, make an *src/* directory, and within it, create
    the *popup.html* file. Next, go to the file. There, open a `<head>` tag and import
    both TensorFlow.js and the toxicity model, and describe the style of the table.
    Then, in the body, add several headers, a paragraph with `id` attribute `input`
    to display the selected text, and a table with `id predictions-table`. After closing
    the `<body>` tag, import the extension’s main script file, named *popup.js*. And
    since we are mentioning it, please create the file inside *src/*:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 你还需要第二个文件，即 *popup.html*，这是扩展的界面。在项目的根目录中，创建一个 *src/* 目录，并在其中创建 *popup.html*
    文件。接下来，打开该文件。在那里，打开一个 `<head>` 标签并导入 TensorFlow.js 和毒性模型，并描述表格的样式。然后，在 `<body>`
    中添加几个标题，一个带有 `id` 属性 `input` 的段落以显示选中的文本，以及一个带有 `id predictions-table` 的表格。在关闭
    `<body>` 标签后，导入扩展的主要脚本文件，命名为 *popup.js*。既然提到了它，请创建该文件在 *src/* 目录内：
- en: '[PRE2]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: The extension script
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 扩展脚本
- en: 'It will surprise you how small *popup.js* is:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 你会被 *popup.js* 的体积之小而感到惊讶：
- en: '[PRE3]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: The first line sets the prediction threshold, followed by an async function
    called `init()` . Inside it, we will load the model using `toxicity.load()` with
    the parameter `threshold`. Afterward comes `chrome.tabs.executeScript()`, a function
    from the Chrome Extensions API used to insert and run JavaScript code from the
    specified tab. Since we are not specifying the tab (in the function’s first optional
    argument), it defaults to the current tab. A second parameter is an object whose
    attribute `code` is the code you wish to run, which here is `window.getSelection().toString()`
    to get the selected text. Last, the third parameter is a callback called after
    the given code is executed; in the callback, we will predict.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 第一行设置预测阈值，然后是一个名为 `init()` 的异步函数。在其内部，我们将使用 `toxicity.load()` 函数并带有 `threshold`
    参数来加载模型。之后是 `chrome.tabs.executeScript()`，这是 Chrome 扩展 API 中的一个函数，用于从指定的标签页插入和运行
    JavaScript 代码。由于我们没有指定标签页（在函数的第一个可选参数中），它默认为当前标签页。第二个参数是一个对象，其属性 `code` 是你希望运行的代码，这里为
    `window.getSelection().toString()` 以获取选中的文本。最后，第三个参数是在给定代码执行后调用的回调；在回调中，我们将进行预测。
- en: The callback function uses as an argument what the `window.getSelection().toString()`
    returns—in this case, the selected text, here called `selection`. In the function’s
    body, get the text from selection’s first index, and display it on the app’s *input*
    paragraph. Following it, get the table. Now comes the exciting part, and that
    is predicting using `model.classify()`.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 回调函数使用 `window.getSelection().toString()` 返回的内容作为参数——在这种情况下，选中的文本，这里称为 `selection`。在函数体中，从选择的第一个索引获取文本，并在应用上的
    *input* 段落中显示它。接着获取表格。现在是最激动人心的部分，即使用 `model.classify()` 进行预测。
- en: ToxDet’s prediction output is a list of seven objects, where each one represents
    the toxicity categories. Each of these objects has an attribute `label` (the toxicity
    subtype) and `results`, an array whose values are an object containing the list
    of `probabilities` and a boolean `match`. These probabilities are the likelihood
    of the text not containing and containing the indicated toxicity target. If the
    probability of the subtype not appearing is greater than `threshold`, `match`
    is `false`. Contrarily, if the probability of being present is above `threshold`,
    `match` is `true`. Otherwise, if none of the scores pass `threshold`, match is
    `null`. In Figure [6-2](#Fig2), you can see an example.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: ToxDet的预测输出是一个包含七个对象的列表，其中每个对象代表毒性类别。这些对象中每个都有一个属性`label`（毒性子类型）和`results`，一个数组，其值是一个包含`probabilities`列表和布尔值`match`的对象。这些概率是文本不包含和包含指示的毒性目标的可能性。如果子类型不出现的概率大于`threshold`，则`match`为`false`。相反，如果存在的概率高于`threshold`，则`match`为`true`。否则，如果没有任何分数通过`threshold`，则`match`为`null`。在图[6-2](#Fig2)中，你可以看到一个例子。
- en: '![../images/494424_1_En_6_Chapter/494424_1_En_6_Fig2_HTML.jpg](../images/494424_1_En_6_Chapter/494424_1_En_6_Fig2_HTML.jpg)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![../images/494424_1_En_6_Chapter/494424_1_En_6_Fig2_HTML.jpg](../images/494424_1_En_6_Chapter/494424_1_En_6_Fig2_HTML.jpg)'
- en: Figure 6-2
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-2
- en: An example of a prediction
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 预测的一个例子
- en: To display the values on the table, iterate over the predictions while appending
    the label and outcome (if neither probability exceeds the threshold, write a dash).
    And that’s the function! Before moving on, do not forget to call `init()` from
    the bottom of the script.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 要在表格上显示值，在遍历预测的同时附加标签和结果（如果概率均不超过阈值，则写一个破折号）。这就是函数！在继续之前，不要忘记从脚本的底部调用`init()`。
- en: Deploying and testing the app
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 部署和测试应用程序
- en: So, how do we deploy this? Easier than it sounds! In Google Chrome, type *chrome://extensions*
    in the address bar to access the *Extensions Management* page.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们如何部署这个？比听起来容易！在Google Chrome中，在地址栏中输入*chrome://extensions*以访问*扩展管理*页面。
- en: 'On the right side of the screen, use the toggle to enable the “Developer mode.”
    Once activated, click the “LOAD UNPACKED” button (Figure [6-3](#Fig3)) and select
    the extension directory to load the application. Make sure the project’s directory
    follows the following structure:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在屏幕的右侧，使用切换按钮启用“开发者模式”。一旦激活，点击“加载未打包”按钮（图[6-3](#Fig3)）并选择扩展目录以加载应用程序。确保项目目录遵循以下结构：
- en: '![../images/494424_1_En_6_Chapter/494424_1_En_6_Fig3_HTML.jpg](../images/494424_1_En_6_Chapter/494424_1_En_6_Fig3_HTML.jpg)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![../images/494424_1_En_6_Chapter/494424_1_En_6_Fig3_HTML.jpg](../images/494424_1_En_6_Chapter/494424_1_En_6_Fig3_HTML.jpg)'
- en: Figure 6-3
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-3
- en: How to activate the “Developer mode”
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 如何激活“开发者模式”
- en: '[PRE4]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: After successfully loading the project, you will find the application “T” icon
    in the extension’s toolbar (next to the address bar). If you click it now, the
    pop-up will show up, but nothing will happen because you have not selected any
    text. So, select a random line (an obscene one would be appropriate), click the
    icon, and be amazed by the magic of the model; note that it takes a few seconds
    to download the model. Table [6-1](#Tab1) presents some examples of offensive
    text and their toxicity subtypes.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在成功加载项目后，你将在扩展工具栏中找到应用程序的“T”图标（在地址栏旁边）。如果你现在点击它，将会弹出，但不会发生任何事情，因为你没有选择任何文本。所以，选择一行随机文本（下流的那一行可能更合适），点击图标，并惊叹于模型的魔力；请注意，下载模型需要几秒钟。表[6-1](#Tab1)展示了一些攻击性文本及其毒性子类型。
