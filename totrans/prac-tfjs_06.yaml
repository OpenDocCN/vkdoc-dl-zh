- en: Recap
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 概括
- en: Besides being a window to the Internet, a web browser is a platform capable
    of executing small applications that enrich and extend our online journeys. One
    example is the Google Chrome Extensions, and in this chapter, we have built one.
    The extension in question uses TensorFlow.js’ pre-trained toxicity classifier
    to identify whether a piece of text has toxic content. With this example, we had
    the opportunity of applying TensorFlow.js in an environment other than a web application,
    something that we will keep exploring in Chapter [8](494424_1_En_8_Chapter.xhtml),
    where we will serve a model using Node.js.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 除了是通往互联网的窗口外，网络浏览器还是一个能够执行小型应用的平台，这些应用可以丰富和扩展我们的在线之旅。一个例子是 Google Chrome 扩展程序，在这一章中，我们已经构建了一个。所讨论的扩展程序使用
    TensorFlow.js 的预训练毒性分类器来识别文本是否包含毒性内容。通过这个例子，我们有机会将 TensorFlow.js 应用于除网络应用以外的环境，这一点我们将在第
    [8](494424_1_En_8_Chapter.xhtml) 章中继续探索，在那里我们将使用 Node.js 提供模型服务。
- en: Needless to say, let’s make the Internet a clean place! Now you have the right
    tools to get started.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 不言而喻，让我们让互联网成为一个干净的地方！现在你有了开始所需的正确工具。
- en: Exercises
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 练习
- en: Create a web application where the user inputs the text. To make it even more
    interesting, classify more than one line during the same call using a list of
    strings, for example, `model.classify(['lol u silly', 'this is a bad comment'])`.
  id: totrans-53
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建一个网络应用，用户可以输入文本。为了使其更有趣，可以在同一调用中使用字符串列表对多行进行分类，例如，`model.classify(['lol u
    silly', 'this is a bad comment'])`。
- en: After learning about Node.js in Chapter [8](494424_1_En_8_Chapter.xhtml), create
    a web service that exposes the model. Add an endpoint “predict” that takes as
    input a string and returns the predictions.
  id: totrans-54
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在第 [8](494424_1_En_8_Chapter.xhtml) 章学习了 Node.js 之后，创建一个暴露模型的网络服务。添加一个名为“predict”的端点，它接受一个字符串作为输入并返回预测结果。
- en: Try the Universal Sentence Encoder presented earlier in the chapter. You could
    start with a simple application that embeds a given text.
  id: totrans-55
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 尝试本章前面介绍的通用句子编码器。你可以从一个简单的应用开始，该应用嵌入给定的文本。
- en: Use the USE’s embeddings to create a dataset of two arbitrary classes of your
    choice, for example, “sentences about pizza” and “sentences about trees.” Then,
    build a classifier to classify these embeddings.
  id: totrans-56
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用 USE 的嵌入创建两个任意类别的数据集，例如，“关于披萨的句子”和“关于树木的句子”。然后，构建一个分类器来对这些嵌入进行分类。
