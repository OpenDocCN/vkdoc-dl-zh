- en: '**8.6**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Training and Testing**'
  prefs: []
  type: TYPE_NORMAL
- en: '**8.6.1 Problem**'
  prefs: []
  type: TYPE_NORMAL
- en: We want to build a deep learning system to complete sentences. The idea is that
    the full database of correct and incorrect sentences provides enough information
    for the neural net to determine which word is the correct word for the sentence.
  prefs: []
  type: TYPE_NORMAL
- en: '**8.6.2 Solution**'
  prefs: []
  type: TYPE_NORMAL
- en: Write a MATLAB script to implement an LSTM to classify the sentences as correct
    or incorrect.
  prefs: []
  type: TYPE_NORMAL
- en: The LSTM will be trained with complete sentences. No information about the words,
    such as whether a word is noun, verb, or adjective, nor of any grammatical structure
    will be used.
  prefs: []
  type: TYPE_NORMAL
