  type: TYPE_NORMAL
- en: The default data structure is defined in the subfunction, DefaultDataStructure.
    The data structure includes both constant parameters and control inputs.
  prefs: []
  type: TYPE_NORMAL
- en: '50'
  prefs: []
  type: TYPE_NORMAL
