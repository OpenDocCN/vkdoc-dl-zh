  type: TYPE_NORMAL
- en: COMPLETING SENTENCES
  prefs: []
  type: TYPE_NORMAL
- en: This network works better than the previous one, despite overfitting. It thinks
    some sentences are correct and gets that right 12.5% of the time. This may indicate
    that we do not have enough data for the neural network to form a grammar. The
    poor performance also helps to show that NLP is a tough problem with many facets
    of research. You would expect to do better if you tried to take advantage of the
    grammatical structure of sentences, classifying words into different types, etc.
  prefs: []
  type: TYPE_NORMAL
- en: We’ve shown that we can get a neural network to be somewhat successful in sentence
    completion. The problem the training faces is that it can be 80% successful by
    saying there are no correct fits. This simple approach might work better if we
    had a larger database of sentences.
  prefs: []
  type: TYPE_NORMAL
- en: We didn’t use all of the sentences that are available with the book so you can
    try expanding the set. With enough examples, the network might begin to learn
    the grammar. It would also be interesting to try this with different languages.
  prefs: []
