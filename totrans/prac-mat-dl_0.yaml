- en: CHAPTER 8
  prefs: []
  type: TYPE_NORMAL
- en: COMPLETING SENTENCES
  prefs: []
  type: TYPE_NORMAL
- en: '**8.3**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Creating a Numeric Dictionary**'
  prefs: []
  type: TYPE_NORMAL
- en: '**8.3.1 Problem**'
  prefs: []
  type: TYPE_NORMAL
- en: We want to create a numeric dictionary to speed neural net training. This eliminates
    the need for string matching during the training process. Expressing a sentence
    as a numeric sequence as opposed to a sequence of character arrays (words) essentially
    gives us a more efficient way to represent the sentence. This will become useful
    later when we perform machine learning over a database of sentences to learn valid
    and invalid sequences.
  prefs: []
  type: TYPE_NORMAL
- en: '**8.3.2 Solution**'
  prefs: []
  type: TYPE_NORMAL
- en: Write a MATLAB function to search through text and find unique words.
  prefs: []
  type: TYPE_NORMAL
- en: '**8.3.3 How It Works**'
  prefs: []
  type: TYPE_NORMAL
- en: The function removes punctuation using erase in the following lines of code.
  prefs: []
  type: TYPE_NORMAL
- en: '***DistinctWords.m***'
  prefs: []
  type: TYPE_NORMAL
- en: '16'
  prefs: []
  type: TYPE_NORMAL
- en: '**function** [d,n] = DistinctWords( w )'
  prefs: []
  type: TYPE_NORMAL
- en: '17'
  prefs: []
  type: TYPE_NORMAL
- en: '18'
  prefs: []
  type: TYPE_NORMAL
- en: '% Demo'
  prefs: []
  type: TYPE_NORMAL
- en: '19'
  prefs: []
  type: TYPE_NORMAL
- en: '**if**( **nargin** < 1 )'
  prefs: []
  type: TYPE_NORMAL
- en: '20'
  prefs: []
  type: TYPE_NORMAL
- en: Demo;
  prefs: []
  type: TYPE_NORMAL
- en: '21'
  prefs: []
  type: TYPE_NORMAL
- en: '**return**'
  prefs: []
  type: TYPE_NORMAL
- en: '22'
  prefs: []
  type: TYPE_NORMAL
- en: '**end**'
  prefs: []
  type: TYPE_NORMAL
- en: '23'
  prefs: []
  type: TYPE_NORMAL
- en: '24'
  prefs: []
  type: TYPE_NORMAL
- en: '% Remove punctuation'
  prefs: []
  type: TYPE_NORMAL
- en: '25'
  prefs: []
  type: TYPE_NORMAL
- en: w = erase(w,';');
  prefs: []
  type: TYPE_NORMAL
- en: '26'
  prefs: []
  type: TYPE_NORMAL
- en: w = erase(w,',');
  prefs: []
  type: TYPE_NORMAL
- en: '27'
  prefs: []
  type: TYPE_NORMAL
- en: w = erase(w,'.');
  prefs: []
  type: TYPE_NORMAL
- en: It then uses split to break up the string and finds unique strings using unique.
  prefs: []
  type: TYPE_NORMAL
- en: '29'
  prefs: []
  type: TYPE_NORMAL
- en: '% Find unique words'
  prefs: []
  type: TYPE_NORMAL
- en: '30'
  prefs: []
  type: TYPE_NORMAL
- en: s = split(w)';
  prefs: []
  type: TYPE_NORMAL
- en: '31'
  prefs: []
  type: TYPE_NORMAL
- en: d = unique(s);
  prefs: []
  type: TYPE_NORMAL
- en: '32'
  prefs: []
  type: TYPE_NORMAL
- en: '33'
  prefs: []
  type: TYPE_NORMAL
- en: '**if**( **nargout** > 1 )'
  prefs: []
  type: TYPE_NORMAL
- en: '34'
  prefs: []
  type: TYPE_NORMAL
- en: '% find the numbers for the words'
  prefs: []
  type: TYPE_NORMAL
- en: '35'
  prefs: []
  type: TYPE_NORMAL
- en: n = **zeros**(1, **length**(s));
  prefs: []
  type: TYPE_NORMAL
- en: '36'
  prefs: []
  type: TYPE_NORMAL
- en: '**for** k = 1:**length**(s)'
  prefs: []
  type: TYPE_NORMAL
- en: '37'
  prefs: []
  type: TYPE_NORMAL
- en: '**for** j = 1:**length**(d)'
  prefs: []
  type: TYPE_NORMAL
- en: '38'
  prefs: []
  type: TYPE_NORMAL
- en: '**if**( d(j) == s(k) )'
  prefs: []
  type: TYPE_NORMAL
- en: '39'
  prefs: []
  type: TYPE_NORMAL
- en: n(k) = j;
  prefs: []
  type: TYPE_NORMAL
- en: '40'
  prefs: []
  type: TYPE_NORMAL
- en: '**break**;'
  prefs: []
  type: TYPE_NORMAL
- en: '41'
  prefs: []
  type: TYPE_NORMAL
- en: '**end**'
  prefs: []
  type: TYPE_NORMAL
- en: '42'
  prefs: []
  type: TYPE_NORMAL
- en: '**end**'
  prefs: []
  type: TYPE_NORMAL
- en: '43'
  prefs: []
  type: TYPE_NORMAL
- en: '**end**'
  prefs: []
  type: TYPE_NORMAL
- en: '44'
  prefs: []
  type: TYPE_NORMAL
- en: '**end**'
  prefs: []
  type: TYPE_NORMAL
