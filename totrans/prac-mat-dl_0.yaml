- en: The next part does the simulation. It breaks the loop if the aircraft altitude
    is less than zero, that is, it crashes. We call RHSPointMassAircraft once to get
    the lift and drag value for plotting. It is then called by RungeKutta to do the
    numerical integration. @ denotes a pointer to the function.
  prefs: []
  type: TYPE_NORMAL
- en: '21'
  prefs: []
  type: TYPE_NORMAL
- en: '%% Simulation'
  prefs: []
  type: TYPE_NORMAL
- en: '22'
  prefs: []
  type: TYPE_NORMAL
- en: xPlot = **zeros**(**length**(x)+5,n);
