- en: As you can see in Figure [9.3,](#p194) the radius of the turn is 15 km as expected.
    The drag and lift remain constant. In practice, we would have a velocity and flight
    path angle control system to handle disturbances or parameter variations. For
    our deep learning example, we just use the ideal dynamics. Figure [9.4](#p195)
    shows the simulation outputs.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [9.3](#p194) will provide a nice trajectory for our deep learning examples.
    You can change the aircraft simulation to produce other trajectories.
