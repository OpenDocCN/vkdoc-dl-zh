- en: '**CHAPTER 9**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Terrain-Based Navigation**'
  prefs: []
  type: TYPE_NORMAL
- en: '**9.1**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Introduction**'
  prefs: []
  type: TYPE_NORMAL
- en: Before the widespread availability of GPS, Loran, and other electronic navigation
    aids, pilots used visual cues from terrain to navigate. Now everyone uses GPS.
    We want to return to the good old days of terrain-based navigation. We will design
    a system that will be able to match terrain with a database. It will then use
    that information to determine where it is flying.
  prefs: []
  type: TYPE_NORMAL
- en: '**9.2**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Modeling Our Aircraft**'
  prefs: []
  type: TYPE_NORMAL
- en: '**9.2.1 Problem**'
  prefs: []
  type: TYPE_NORMAL
- en: We want a three-dimensional aircraft model that can change direction.
  prefs: []
  type: TYPE_NORMAL
- en: '**9.2.2 Solution**'
  prefs: []
  type: TYPE_NORMAL
- en: Write the equations of motion for three-dimensional flight.
  prefs: []
  type: TYPE_NORMAL
- en: '**9.2.3 How It Works**'
  prefs: []
  type: TYPE_NORMAL
- en: The motion of a point mass through three-dimensional space has three degrees
    of freedom.
  prefs: []
  type: TYPE_NORMAL
- en: Our aircraft model is therefore given three degrees of spatial freedom. The
    velocity vector is expressed as a wind-relative magnitude ( *V* ) with directional
    components for heading ( *ψ*) and flight path angle ( *γ*). The position is a
    direct integral of the velocity and is expressed in *y* =
  prefs: []
  type: TYPE_NORMAL
- en: North, *x* = East, *h* = Vertical coordinates. In addition, the engine thrust
    is modeled as a first-order system where the time constant can be changed to approximate
    the engine response times of different aircraft.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [9.1](#p188) shows a diagram of the velocity vector in the North-East-Up
    coordinate system.
  prefs: []
  type: TYPE_NORMAL
- en: The time derivatives are taken in this frame. This is not a purely inertial
    coordinate system, because it is rotating with the Earth. However, the rate of
    rotation of the Earth is sufficiently small compared to the aircraft turning rates
    so that it can be safely neglected.
  prefs: []
  type: TYPE_NORMAL
