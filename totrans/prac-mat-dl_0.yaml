- en: '**9.5**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Building the Camera Model**'
  prefs: []
  type: TYPE_NORMAL
- en: '**9.5.1 Problem**'
  prefs: []
  type: TYPE_NORMAL
- en: We want to build a camera model for our deep learning system. We want a model
    that emulates the function of a drone-mounted camera. Ultimately, we will use
    this camera model as part of a terrain-based navigation system, and we’ll apply
    deep learning techniques to do terrain navigation.
  prefs: []
  type: TYPE_NORMAL
- en: '**9.5.2 Solution**'
  prefs: []
  type: TYPE_NORMAL
- en: We will model a pinhole camera and create a high-altitude aircraft. A pinhole
    camera is a lowest-order approximation to a real optical system. We’ll then build
    the simulation and demonstrate the camera.
  prefs: []
  type: TYPE_NORMAL
- en: '188'
  prefs: []
  type: TYPE_NORMAL
- en: '![](index-203_1.png)'
  prefs: []
  type: TYPE_IMG
- en: '![](index-203_2.png)'
  prefs: []
  type: TYPE_IMG
- en: '![](index-203_3.png)'
  prefs: []
  type: TYPE_IMG
- en: '![](index-203_4.png)'
  prefs: []
  type: TYPE_IMG
- en: '![](index-203_5.png)'
  prefs: []
  type: TYPE_IMG
- en: CHAPTER 9
  prefs: []
  type: TYPE_NORMAL
- en: TERRAIN-BASED NAVIGATION
  prefs: []
  type: TYPE_NORMAL
- en: '**9.5.3 How It Works**'
  prefs: []
  type: TYPE_NORMAL
- en: We’ve already created an aircraft simulation in Recipe [9.2\.](#p187) The addition
    will be the terrain model and the camera model. A pinhole camera is shown in Figure
    [9.8\.](#p203) A pinhole camera has an infinite depth of field, and the images
    are rectilinear.
  prefs: []
  type: TYPE_NORMAL
- en: A point *P* ( *x, y, z*) is mapped to the imaging plane by the relationships
    *f x*
  prefs: []
  type: TYPE_NORMAL
- en: '*u* = *h*'
  prefs: []
  type: TYPE_NORMAL
- en: (9.15)
  prefs: []
  type: TYPE_NORMAL
- en: '*f y*'
  prefs: []
  type: TYPE_NORMAL
- en: '*v* = *h*'
  prefs: []
  type: TYPE_NORMAL
- en: (9.16)
  prefs: []
  type: TYPE_NORMAL
- en: where *u* and *v* are coordinates in the focal plane, *f* is the focal length,
    and *h* is the distance from the pinhole to the point along the axis normal to
    the focal plane. This assumes that the *z*-axis of the coordinate frame *x, y,
    z* is aligned with the boresight of the camera. The angle that is seen by the
    imaging chip is
  prefs: []
  type: TYPE_NORMAL
- en: '*w*'
  prefs: []
  type: TYPE_NORMAL
- en: '*θ* = tan *−* 1 2 *f*'
  prefs: []
  type: TYPE_NORMAL
- en: (9.17)
  prefs: []
  type: TYPE_NORMAL
- en: where *f* is the focal length. The shorter the focal length, the larger the
    image. The pinhole camera does not have any depth of field, but that is unimportant
    for this far-field imaging problem.
  prefs: []
  type: TYPE_NORMAL
- en: The field of view of a pinhole camera is limited only by the sensing element.
    Most cameras have lenses, and the images are not perfect across the imaging array.
    This presents practical problems that need to be solved in real machine vision
    systems.
  prefs: []
  type: TYPE_NORMAL
- en: We want our camera to see 16 pixels by 16 pixels from the terrain image in Figure
    [9.7](#p202). We will assume a flight altitude of 10 km. Figure [9.9](#p204) gives
    the dimensions.
  prefs: []
  type: TYPE_NORMAL
- en: We are not simulating a particular camera. Instead, our camera model is producing
    16 by 16 pixel maps given an input of a position. The output is a data structure
    with the *x* and *y* **Figure 9.8:** *Pinhole camera.*
  prefs: []
  type: TYPE_NORMAL
