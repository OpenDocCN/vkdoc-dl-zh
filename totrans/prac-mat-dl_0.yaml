- en: The remainder produces three plots. The first plot is the states that are numerically
    integrated.
  prefs: []
  type: TYPE_NORMAL
- en: The next gives the controls, lift, and drag. The final plot shows the planar
    trajectory. We do unit conversions since degrees and kilometers are a bit clearer.
