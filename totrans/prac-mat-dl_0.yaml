  prefs: []
  type: TYPE_NORMAL
- en: where *v* is the true airspeed, *T* is the thrust, *L* is the lift, *g* is the
    acceleration of gravity, *γ* is the air-relative flight path angle, *ψ* is the
    air-relative heading (measured clockwise from North), *φ*
  prefs: []
  type: TYPE_NORMAL
- en: is the bank angle, *x* and *y* are the East and North positions, respectively,
    and *h* is the altitude.
  prefs: []
  type: TYPE_NORMAL
- en: The mass is the total of dry mass and fuel mass. The terms *{fv, fγ, fψ}* represent
    additional forces due to modeling uncertainty, and the terms *{Wx, Wy, Wh}* are
    wind speed components.
  prefs: []
  type: TYPE_NORMAL
- en: If the vertical wind speed is zero, then *γ* = 0 produces level flight. *α*,
    *φ*, and *T* are the controls.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [9.2](#p189) shows the longitudinal symbols for the aircraft. *γ* is
    the angle between the velocity vector and local horizontal. *α* is the angle of
    attack which is between the nose of the aircraft and the velocity vector. The
    wings may be oriented, or have airfoils, that give lift at zero angles of attack.
    Drag is opposite velocity and lift is perpendicular to drag. Lift must balance
    gravity and any downward component of drag; otherwise, the aircraft will descend.
  prefs: []
  type: TYPE_NORMAL
- en: We are using a very simple aerodynamic model. The lift coefficient is defined
    as *cL* = *cL α*
  prefs: []
  type: TYPE_NORMAL
- en: '*α*'
  prefs: []
  type: TYPE_NORMAL
- en: (9.8)
  prefs: []
  type: TYPE_NORMAL
- en: The lift coefficient is a nonlinear function of the angle of attack. It has
    a maximum angle of attack above which the wing stalls and all lift is lost. For
    a flat plate, *cL* = 2 *π*
  prefs: []
  type: TYPE_NORMAL
- en: '*α*'
  prefs: []
  type: TYPE_NORMAL
- en: . The drag
  prefs: []
  type: TYPE_NORMAL
- en: coefficient is
  prefs: []
  type: TYPE_NORMAL
- en: '*c* 2'
  prefs: []
  type: TYPE_NORMAL
- en: '*c*'
  prefs: []
  type: TYPE_NORMAL
- en: '*L*'
  prefs: []
  type: TYPE_NORMAL
- en: '*D* = *cD* +'
  prefs: []
  type: TYPE_NORMAL
- en: '0'
  prefs: []
  type: TYPE_NORMAL
- en: '*πAR*'
  prefs: []
  type: TYPE_NORMAL
- en: (9.9)
  prefs: []
  type: TYPE_NORMAL
- en: where *AR* is the aspect ratio and is the Oswald efficiency factor which is
    typically from 0.8
  prefs: []
  type: TYPE_NORMAL
- en: to 0.95\. The efficiency factor is how efficiently lift is coupled to drag.
    If it is less than one, it means that the lift produces more lift-induced drag
    than the ideal. The aspect ratio is the ratio of the wingspan (from the point
    nearest the fuselage to the tip) and the chord (the length from the front to the
    back of the wing).
  prefs: []
  type: TYPE_NORMAL
