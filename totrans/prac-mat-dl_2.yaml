- en: You may be wondering why we have not computed the validation loss for our model.
    There is nothing wrong with doing this; however, by comparing the true output
    and the generated output in Figure [14.6](#p293), we can clearly see that the
    model is not overfitting to the training set.
  prefs: []
  type: TYPE_NORMAL
