- en: CHAPTER 12
  prefs: []
  type: TYPE_NORMAL
- en: ORBIT DETERMINATION
  prefs: []
  type: TYPE_NORMAL
- en: '***RHSOrbit.m***'
  prefs: []
  type: TYPE_NORMAL
- en: '16'
  prefs: []
  type: TYPE_NORMAL
- en: '**function** xDot = RHSOrbit(˜,x,d)'
  prefs: []
  type: TYPE_NORMAL
- en: '17'
  prefs: []
  type: TYPE_NORMAL
- en: '18'
  prefs: []
  type: TYPE_NORMAL
- en: r
  prefs: []
  type: TYPE_NORMAL
- en: = x(1:2);
  prefs: []
  type: TYPE_NORMAL
- en: '19'
  prefs: []
  type: TYPE_NORMAL
- en: v
  prefs: []
  type: TYPE_NORMAL
- en: = x(3:4);
  prefs: []
  type: TYPE_NORMAL
- en: '20'
  prefs: []
  type: TYPE_NORMAL
- en: xDot
  prefs: []
  type: TYPE_NORMAL
- en: = [v;-d.mu*r/(r'*r)ˆ1.5 + d.a];
  prefs: []
  type: TYPE_NORMAL
- en: We will create a script that simulates multiple orbits. The simulation will
    use RHSOrbit.
  prefs: []
  type: TYPE_NORMAL
- en: The first part of the orbit generation script sets up the random orbital elements.
  prefs: []
  type: TYPE_NORMAL
- en: '***Orbits.m***'
  prefs: []
  type: TYPE_NORMAL
- en: '1'
  prefs: []
  type: TYPE_NORMAL
- en: '%% Generate Orbits for angles-only element estimation'
  prefs: []
  type: TYPE_NORMAL
- en: '2'
  prefs: []
  type: TYPE_NORMAL
- en: '% Saves a mat-file called OrbitData.'
  prefs: []
  type: TYPE_NORMAL
- en: '5'
  prefs: []
  type: TYPE_NORMAL
- en: '6'
  prefs: []
  type: TYPE_NORMAL
- en: nEl
  prefs: []
  type: TYPE_NORMAL
- en: = 500;
  prefs: []
  type: TYPE_NORMAL
- en: '% Number of sets of data'
  prefs: []
  type: TYPE_NORMAL
- en: '7'
  prefs: []
  type: TYPE_NORMAL
- en: d
  prefs: []
  type: TYPE_NORMAL
- en: = struct;
  prefs: []
  type: TYPE_NORMAL
- en: '% Initialize'
  prefs: []
  type: TYPE_NORMAL
- en: '8'
  prefs: []
  type: TYPE_NORMAL
- en: d.mu
  prefs: []
  type: TYPE_NORMAL
- en: = 3.98600436e5; % Gravitational parameter, kmˆ3/sˆ2
  prefs: []
  type: TYPE_NORMAL
- en: '9'
  prefs: []
  type: TYPE_NORMAL
- en: d.a
  prefs: []
  type: TYPE_NORMAL
- en: = [0;0];
  prefs: []
  type: TYPE_NORMAL
- en: '% Perturbing acceleration'
  prefs: []
  type: TYPE_NORMAL
- en: '10'
  prefs: []
  type: TYPE_NORMAL
- en: '11'
  prefs: []
  type: TYPE_NORMAL
- en: '% Random elements'
  prefs: []
  type: TYPE_NORMAL
- en: '12'
  prefs: []
  type: TYPE_NORMAL
- en: e
  prefs: []
  type: TYPE_NORMAL
- en: = 0.6***rand**(1,nEl);
  prefs: []
  type: TYPE_NORMAL
- en: '% Eccentricity'
  prefs: []
  type: TYPE_NORMAL
- en: '13'
  prefs: []
  type: TYPE_NORMAL
- en: a
  prefs: []
  type: TYPE_NORMAL
- en: = 8000 + 1000***randn**(1,nEl); % Semi-major axis
  prefs: []
  type: TYPE_NORMAL
- en: '14'
  prefs: []
  type: TYPE_NORMAL
- en: M
  prefs: []
  type: TYPE_NORMAL
- en: = 0.25***pi*****rand**(1,nEl);
  prefs: []
  type: TYPE_NORMAL
- en: '% Mean anomaly'
  prefs: []
  type: TYPE_NORMAL
- en: The next section runs the simulations and saves the angles. Each simulation
    has 2000 steps, and each step is two seconds. We are only using one in ten points
    for the orbit determination.
  prefs: []
  type: TYPE_NORMAL
- en: We save the orbital elements for testing the neural network. We are not applying
    any external acceleration. We could have used Kepler propagation, but by simulating
    the orbit, we have the option of studying how well the neural network performs
    with disturbances.
  prefs: []
  type: TYPE_NORMAL
- en: '16'
  prefs: []
  type: TYPE_NORMAL
- en: '% Set up the simulation'
  prefs: []
  type: TYPE_NORMAL
- en: '17'
  prefs: []
  type: TYPE_NORMAL
- en: nSim
  prefs: []
  type: TYPE_NORMAL
- en: = 2000; % Number of simulation steps
  prefs: []
  type: TYPE_NORMAL
- en: '18'
  prefs: []
  type: TYPE_NORMAL
- en: dT
  prefs: []
  type: TYPE_NORMAL
- en: = 2; % Time step
  prefs: []
  type: TYPE_NORMAL
- en: '19'
  prefs: []
  type: TYPE_NORMAL
- en: '20'
  prefs: []
  type: TYPE_NORMAL
- en: '% Only use some of the sim steps'
  prefs: []
  type: TYPE_NORMAL
- en: '21'
  prefs: []
  type: TYPE_NORMAL
- en: jUse
  prefs: []
  type: TYPE_NORMAL
- en: = 1:10:nSim;
  prefs: []
  type: TYPE_NORMAL
- en: '22'
  prefs: []
  type: TYPE_NORMAL
- en: '23'
  prefs: []
  type: TYPE_NORMAL
- en: '% Data for Deep Learning'
  prefs: []
  type: TYPE_NORMAL
- en: '24'
  prefs: []
  type: TYPE_NORMAL
- en: data
  prefs: []
  type: TYPE_NORMAL
- en: = **cell**(nEl,1);
  prefs: []
  type: TYPE_NORMAL
- en: '25'
  prefs: []
  type: TYPE_NORMAL
- en: '26'
  prefs: []
  type: TYPE_NORMAL
- en: '%% Simulate each of the orbits'
  prefs: []
  type: TYPE_NORMAL
- en: '27'
  prefs: []
  type: TYPE_NORMAL
- en: x
  prefs: []
  type: TYPE_NORMAL
- en: = **zeros**(4,nSim);
  prefs: []
  type: TYPE_NORMAL
- en: '28'
  prefs: []
  type: TYPE_NORMAL
- en: t
  prefs: []
  type: TYPE_NORMAL
- en: = (0:(nSim-1))*dT;
  prefs: []
  type: TYPE_NORMAL
- en: '29'
  prefs: []
  type: TYPE_NORMAL
- en: el(nEl) = struct('a',7000,'e',0); % initialize struct array
  prefs: []
  type: TYPE_NORMAL
- en: '30'
  prefs: []
  type: TYPE_NORMAL
- en: '31'
  prefs: []
  type: TYPE_NORMAL
- en: '**for** k = 1:nEl'
  prefs: []
  type: TYPE_NORMAL
- en: '32'
  prefs: []
  type: TYPE_NORMAL
- en: '[r,v] = El2RV([a(k) 0 0 0 e(k) M(k)]);'
  prefs: []
  type: TYPE_NORMAL
- en: '33'
  prefs: []
  type: TYPE_NORMAL
- en: x
  prefs: []
  type: TYPE_NORMAL
- en: = [r(1:2);v(1:2)];
  prefs: []
  type: TYPE_NORMAL
- en: '34'
  prefs: []
  type: TYPE_NORMAL
- en: xP
  prefs: []
  type: TYPE_NORMAL
- en: = **zeros**(4,nSim);
  prefs: []
  type: TYPE_NORMAL
