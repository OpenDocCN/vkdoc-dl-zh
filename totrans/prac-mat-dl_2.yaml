- en: '**CHAPTER 14**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Generative Modeling of Music**'
  prefs: []
  type: TYPE_NORMAL
- en: '**14.1**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Introduction**'
  prefs: []
  type: TYPE_NORMAL
- en: Generative machine learning (ML) models are a class of models that allow you
    to create new data by modeling the data generating distribution. For example,
    a generative model trained on images of human faces would learn what features
    constitute a realistic human face and how to combine them to generate novel human
    face images. For a fun demonstration of the power of ML-based human face generation,
    check out [44].
  prefs: []
  type: TYPE_NORMAL
- en: This is in contrast to a discriminative model that learns an association between
    a set of labels and the training inputs. Staying with our face example, a discriminative
    model might predict the age of a person given an image of their face. In this
    case, the input is the image of the face, and the label is the numerical age.
    Labels can also be used in generative models, as we shall highlight shortly in
    Section [14.2\.](#p279)
  prefs: []
  type: TYPE_NORMAL
- en: Generative models are used in a wide variety of applications from drug design
    to language models for better chatbots and autocomplete features. Generative models
    are also used in data augmentation to train better discriminative models, especially
    in situations where training data is difficult or expensive to obtain. Finally,
    generative models are widely used by artists and composers to inspire or augment
    their work. In this chapter, we will investigate generative modeling through this
    artistic lens by implementing a simple generative model of Bach chorales.
  prefs: []
  type: TYPE_NORMAL
- en: '**14.2**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Generative Modeling Description**'
  prefs: []
  type: TYPE_NORMAL
- en: We would like to preface these next few sections by stating that what follows
    is not meant to be mathematically rigorous, even if it uses mathematical terms.
    Instead, we hope to capture the intuition of generative models. Let us start by
    assuming that our dataset *{x* 1 *, x* 2 *, . . . , xN }*
  prefs: []
  type: TYPE_NORMAL
- en: comes from a probability distribution P(X), where X is a random variable. If
    we had access to this distribution, we could obtain an example *xi* by sampling
    from the distribution ( *xi ∼* P(X)).
  prefs: []
  type: TYPE_NORMAL
- en: In general, we do not know this data generating distribution.
  prefs: []
  type: TYPE_NORMAL
- en: In generative modeling, our aim is to approximate this distribution so that
    we can sample from our approximation and generate new, similar data. In contrast,
    in discriminative modeling, we try to learn a mapping from the items in the dataset
    to a set of labels Y = *{y* 1 *, . . . , yM }*.
  prefs: []
  type: TYPE_NORMAL
- en: © Michael Paluszek, Stephanie Thomas, Eric Ham 2022
  prefs: []
  type: TYPE_NORMAL
- en: '269'
  prefs: []
  type: TYPE_NORMAL
- en: M. Paluszek et al., *Practical MATLAB Deep Learning*,
  prefs: []
  type: TYPE_NORMAL
- en: '[https://doi.org/10.1007/978-1-4842-7912-0 14](-149 4985 a -149 4985 a)'
  prefs: []
  type: TYPE_NORMAL
- en: '![](index-280_1.png)'
  prefs: []
  type: TYPE_IMG
- en: '![](index-280_2.png)'
  prefs: []
  type: TYPE_IMG
- en: '![](index-280_3.png)'
  prefs: []
  type: TYPE_IMG
- en: '![](index-280_4.png)'
  prefs: []
  type: TYPE_IMG
- en: CHAPTER 14
  prefs: []
  type: TYPE_NORMAL
- en: GENERATIVE MODELING OF MUSIC
  prefs: []
  type: TYPE_NORMAL
- en: In many instances of the generative modeling problem, we are not concerned with
    labeled datasets. For example, if our aim was to model the distribution that generates
    faces, we do not explicitly care about features like the age or emotion of the
    person in a training example.
  prefs: []
  type: TYPE_NORMAL
- en: However, in some cases, we might want to train a model that can generate faces
    that satisfy certain conditions. For example, say we want to be able to tell the
    model to generate a face that corresponds to someone under the age of 30 or a
    face that corresponds to someone with an age greater than or equal to 30\. We
    could define X = *{* human faces of varying ages *}* and Y = *{* 1 if age *<*
    30, 0 if age *>* = 30 *}*. We would then task our generative model with learning
    the joint distribution P(X, Y).
  prefs: []
  type: TYPE_NORMAL
- en: '**14.3**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Problem: Music Generation**'
  prefs: []
  type: TYPE_NORMAL
- en: The example that we will use to illustrate generative deep learning is music
    generation. We can think of music as a time series, where at each time point a
    group of musical features, like pitch and volume, take fixed values from the corresponding
    sets that contain their possible values. To create a generative model of this,
    we need to model the distribution that generates this type of data. One way to
    approach this is to suppose the data is being generated in a sequence, where at
    time step *t*, the probability for a particular combination of musical features
    [ *F1 , . . . , Fp*]
  prefs: []
  type: TYPE_NORMAL
- en: taking values [ *f1 , . . . , fp*] is equal to *P*( *F1* = *f1 , . . . , Fp*
    = *fp|xt , xt−1 , . . . xt−n*), where each *xi* is a group of feature values for
    the *ith* time step and *n* is the number of previous inputs to be considered
    by the model when making a prediction. Note that for some models like temporal
    convolutional networks (TCNs) and transformers (both described in more detail
    in Section [14.6),](#p293) *n ∈ {* 1 *, . . . , context length}*, where *context
    length* is a fixed scalar value, whereas in recurrent architectures, implicitly,
    *n ∈ {* 1 *, . . . , ∞}*. We say implicit here because recurrent models typically
    only take one time step as input at a time; however, they keep track of previous
    inputs through their hidden states. In other words, the prediction at time step
    *t* depends on these past inputs implicitly, unlike in TCNs and transformers.
  prefs: []
  type: TYPE_NORMAL
- en: From here on, we will refer to *xi* as a musical “event” and will note that
    a musical event is a set of musical feature values just like the model output.
    We can therefore rewrite the model output as an *xi*, and combine it with the
    previous probability formulation to form the probability distribution over possible
    subsequent musical events, *P*( *xt*+ *1 |xt , xt−1 , . . . xt−n*).
  prefs: []
  type: TYPE_NORMAL
- en: This distribution tells us that the probability of a particular musical event
    occurring depends only on the events that precede it. This is a common formulation
    used in time series modeling as information about events that have not yet occurred
    is often difficult to come by in practice, and past information is often sufficient
    for accurate prediction. For example, if you were to train a model to predict
    tomorrow’s weather, using the weather of today and the past week would likely
    give you a good estimate, and acquiring information on the weather for the day
    after tomorrow would be impossible.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have established that our data is generated sequentially according
    to the distribution *P*( *xt*+ *1 |xt , xt−1 , . . . xt−n*), we need only to train
    a model that takes *xt, xt−* 1 *, . . . xt−n* as input and outputs *P* ( *xt*+1)
    to build a generative model of this data.
  prefs: []
  type: TYPE_NORMAL
- en: '270'
  prefs: []
  type: TYPE_NORMAL
- en: '![](index-281_1.png)'
  prefs: []
  type: TYPE_IMG
- en: '![](index-281_2.png)'
  prefs: []
  type: TYPE_IMG
- en: '![](index-281_3.jpg)'
  prefs: []
  type: TYPE_IMG
- en: CHAPTER 14
  prefs: []
  type: TYPE_NORMAL
- en: GENERATIVE MODELING OF MUSIC
  prefs: []
  type: TYPE_NORMAL
- en: '**Figure 14.1:** *Here is an illustration of the training and testing regimes
    for a recurrent neural network* *in our time series modeling problem formulation.
    On the left, we have an input [xt* 1 *, xt* 2 *,xt* 3 *], which we* *pass in one
    at a time. You can imagine that there is a* + *between each t and the subsequent
    number (e.g.,* *read t* 1 *as t* + 1 *), but we have omitted these for a cleaner
    figure. At each time step ti, the model makes* *a prediction pt*( *i*+1) *and
    updates its hidden state (the horizontal arrows). Upon moving to the next time*
    *step during training, the true value that the model was trying to predict is
    given to the model as input* *(xt* 2 *, followed by xt* 3 *in this case). In testing,
    on the right, however, the model uses its own predictions* *as inputs after being
    given xt* 1 *. This is the “generative” mode of the model, in which it can continue*
    *predicting indefinitely.*'
  prefs: []
  type: TYPE_NORMAL
- en: One benefit of these kinds of models is that training them is straightforward.
    In the typical case, where your goal is just to predict the next time step, your
    training inputs would be a set of sequences, and your outputs would be these same
    sequences shifted forward by one. This means that the true output at time *t*
    would be *xt*+1, and at *t* + 1 the true output would be *xt*+2, and so on. In
    fact, this is exactly how you would format your data if you were to use a TCN
    or a transformer as your model. In the case of recurrent architectures like the
    LSTM, the model only receives one time step at a time, but still “implicitly”
    utilizes previous inputs as discussed earlier. For these architectures, the output
    would also be the input shifted forward by one.
  prefs: []
  type: TYPE_NORMAL
- en: A second advantage is that this formulation allows unlimited generation. In
    “testing,” you provide the model with an input, either a musical sequence or some
    form of “start” token, and the model makes predictions using this input until
    it reaches the input’s end. At this point, the model takes its own predictions
    as subsequent inputs. As each prediction generates a new input, the model can
    continue to generate indefinitely. This is visualized in Figure [14.1](#p281).
  prefs: []
  type: TYPE_NORMAL
- en: '**14.4**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Solution**'
  prefs: []
  type: TYPE_NORMAL
- en: We start by simplifying the problem. Music is a very complex domain, with each
    note carrying a complex set of features including pitch, volume, timbre, onset,
    duration, and so on. All of these features are captured in raw audio recordings
    of music. Unfortunately, raw audio can also include extraneous information like
    nonmusical sounds and noise from a variety of sources. In general, this means
    that models trained on raw audio require much more data and computational resources
    to help them learn to distinguish between relevant and irrelevant information
    in a 271
  prefs: []
  type: TYPE_NORMAL
- en: '![](index-282_1.png)'
  prefs: []
  type: TYPE_IMG
- en: '![](index-282_2.png)'
  prefs: []
  type: TYPE_IMG
- en: CHAPTER 14
  prefs: []
  type: TYPE_NORMAL
- en: GENERATIVE MODELING OF MUSIC
  prefs: []
  type: TYPE_NORMAL
- en: reasonable timeframe. There are approaches to train models with raw audio to
    generate music, which we will discuss later in Section [14.6](#p293), but due
    to the challenges associated with using it, we opt to use MIDI data instead. MIDI
    is a data format intended for electronic music notation and can be used by a variety
    of music applications like GarageBand. Our MIDI dataset consists of 100 Bach chorales
    derived from [10]. Each chorale originally had four voices, but only the soprano
    voice is used here. MIDI data keeps track of a number of musical variables, but
    for simplicity, we will focus on predicting note pitch and duration. The collection
    of these variables therefore constitutes our previously defined musical “event.”
  prefs: []
  type: TYPE_NORMAL
- en: A prediction of note onset is also possible, but for simplicity, each generated
    note will be treated as if it were played immediately after the end of the preceding
    note. We leave it as an exercise to the reader to additionally predict onset to
    allow for overlapping notes and spaces where no note is played (rests).
  prefs: []
  type: TYPE_NORMAL
- en: For the deep learning (DL) model, we chose a Long Short-Term Memory (LSTM) network
    with fully connected hidden and output layers. A diagram of an LSTM cell can be
    seen in Figure [14.2\.](#p283) We chose an LSTM as it is a sequence model and
    is therefore suited to our formulation of this problem as a time series modeling
    task. The LSTM is also a well-studied model and is already implemented as a layer
    in MATLAB, making it more straightforward to implement than other sequence models.
    Finally, the LSTM has the ability to choose what aspects of its input to remember
    and what to forget, which in theory allows it to keep track of long-range musical
    features from chord progressions to melodies.
  prefs: []
  type: TYPE_NORMAL
- en: Like a vanilla RNN, which can also be seen in Figure [14.2](#p283), the LSTM
    has a hidden state, which allows it to propagate information forward for future
    computation. However, as RNNs struggle with handling tasks where temporally distant
    information must be recalled, the LSTM
  prefs: []
  type: TYPE_NORMAL
- en: augments this short-term memory with the long-term memory of a cell state. The
    cell state is generated by combining current information from the input with past
    information from the model’s previous hidden and cell states. Including the model’s
    input in the cell state computation allows the model to store information from
    its inputs, while including the previous states allows past information to be
    propagated forward. In other words, an LSTM could, in theory, recall its first
    input, regardless of how many inputs it has seen since.
  prefs: []
  type: TYPE_NORMAL
- en: The main factor that differentiates the cell state from the RNN’s hidden state
    is the LSTM’s use of “gates” to determine what information is passed forward to
    compute the next cell state.
  prefs: []
  type: TYPE_NORMAL
- en: The actual gating is carried out by multiplying the gate’s input with a set
    of weights and out-putting the result. For example, in the “Forget” gate, values
    in the past cell state that the gate decides to transmit are multiplied by weights
    that are close to one, whereas values that it decides to forget are multiplied
    by weights that are close to zero. These weights are generated by multiplying
    what we call a “gate keeper” vector with the gate’s weight matrix and passing
    this output through an activation function that maps it to a value within a particular
    range. One of the most common choices for this activation function, and the one
    used in the “Forget” gate, is the sigmoid, which will map the output to a value
    between zero and one. In the case of the
  prefs: []
  type: TYPE_NORMAL
- en: “Forget” gate, the gate keeper is the concatenation of the input with the past
    hidden state. The gate’s weight matrix is learned during model training.
  prefs: []
  type: TYPE_NORMAL
- en: '272'
  prefs: []
  type: TYPE_NORMAL
- en: '![](index-283_1.png)'
