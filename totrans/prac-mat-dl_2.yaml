  prefs: []
  type: TYPE_NORMAL
- en: '10'
  prefs: []
  type: TYPE_NORMAL
- en: nTrain
  prefs: []
  type: TYPE_NORMAL
- en: = **floor**(0.9*n);
  prefs: []
  type: TYPE_NORMAL
- en: '11'
  prefs: []
  type: TYPE_NORMAL
- en: '12'
  prefs: []
  type: TYPE_NORMAL
- en: '%% Set up the training and test sets'
  prefs: []
  type: TYPE_NORMAL
- en: '13'
  prefs: []
  type: TYPE_NORMAL
- en: kTrain
  prefs: []
  type: TYPE_NORMAL
- en: = **randperm**(n,nTrain);
  prefs: []
  type: TYPE_NORMAL
- en: '14'
  prefs: []
  type: TYPE_NORMAL
- en: aMean
  prefs: []
  type: TYPE_NORMAL
- en: = **mean**([s.el(:).a]);
  prefs: []
  type: TYPE_NORMAL
- en: '15'
  prefs: []
  type: TYPE_NORMAL
- en: xTrain
  prefs: []
  type: TYPE_NORMAL
- en: = s.data(kTrain);
  prefs: []
  type: TYPE_NORMAL
- en: '16'
  prefs: []
  type: TYPE_NORMAL
- en: nTest
  prefs: []
  type: TYPE_NORMAL
- en: = n-nTrain;
  prefs: []
  type: TYPE_NORMAL
- en: '17'
  prefs: []
  type: TYPE_NORMAL
- en: '18'
  prefs: []
  type: TYPE_NORMAL
- en: elTrain
  prefs: []
  type: TYPE_NORMAL
- en: = s.el(kTrain);
  prefs: []
  type: TYPE_NORMAL
- en: '19'
  prefs: []
  type: TYPE_NORMAL
- en: yTrain
  prefs: []
  type: TYPE_NORMAL
- en: = [elTrain.a;elTrain.e]';
  prefs: []
  type: TYPE_NORMAL
- en: '20'
  prefs: []
  type: TYPE_NORMAL
- en: yTrain(:,1) = yTrain(:,1)/aMean;
  prefs: []
  type: TYPE_NORMAL
- en: '21'
  prefs: []
  type: TYPE_NORMAL
- en: kTest
  prefs: []
  type: TYPE_NORMAL
