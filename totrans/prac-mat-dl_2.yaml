  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '%% 生成仅角度元素估计的轨道'
- en: '2'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '2'
- en: '% Saves a mat-file called OrbitData.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '% 保存名为OrbitData的mat文件。'
- en: '5'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '5'
- en: '6'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '6'
