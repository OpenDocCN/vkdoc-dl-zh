- en: CHAPTER 13
  id: totrans-1090
  prefs: []
  type: TYPE_NORMAL
  zh: 第13章
- en: EARTH SENSORS
  id: totrans-1091
  prefs: []
  type: TYPE_NORMAL
  zh: 地球传感器
- en: '**13.2**'
  id: totrans-1092
  prefs: []
  type: TYPE_NORMAL
  zh: '**13.2**'
- en: '**Linear Output Earth Sensor**'
  id: totrans-1093
  prefs: []
  type: TYPE_NORMAL
  zh: '**线性输出地球传感器**'
- en: '**13.2.1 Problem**'
  id: totrans-1094
  prefs: []
  type: TYPE_NORMAL
  zh: '**13.2.1 问题**'
- en: We want to model the output of a linear output, multi-element Earth sensor.
    The sensor has multiple thermal sensors that produce an output based on their
    temperature. The maximum value is when the sensor only sees the Earth. The minimum
    value is when the sensor sees space.
  id: totrans-1095
  prefs: []
  type: TYPE_NORMAL
  zh: 我们想要模拟一个线性输出、多元素地球传感器的输出。该传感器有多个热传感器，根据它们的温度产生输出。最大值是当传感器只看到地球时。最小值是当传感器看到太空时。
- en: '**13.2.2 Solution**'
  id: totrans-1096
  prefs: []
  type: TYPE_NORMAL
  zh: '**13.2.2 解决方案**'
- en: Use MATLAB’s polyshape and intersect functions to model the elements.
  id: totrans-1097
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 MATLAB 的 polyshape 和 intersect 函数来模拟元素。
- en: '**13.2.3 How It Works**'
  id: totrans-1098
  prefs: []
  type: TYPE_NORMAL
  zh: '**13.2.3 它是如何工作的**'
- en: The function we create is StaticEarthSensor. If there are no inputs, the first
    part of the function either runs a built-in demo or returns the default data structure.
    It runs the demo if no outputs are requested.
  id: totrans-1099
  prefs: []
  type: TYPE_NORMAL
  zh: 我们创建的函数是 StaticEarthSensor。如果没有输入，函数的前一部分要么运行内置的示例，要么返回默认的数据结构。如果没有请求输出，它会运行示例。
