- en: CHAPTER 14
  id: totrans-3330
  prefs: []
  type: TYPE_NORMAL
  zh: 第 14 章
- en: GENERATIVE MODELING OF MUSIC
  id: totrans-3331
  prefs: []
  type: TYPE_NORMAL
  zh: 音乐的生成建模
- en: '***Data preprocessing functions***'
  id: totrans-3332
  prefs: []
  type: TYPE_NORMAL
  zh: '***数据预处理函数***'
- en: '160'
  id: totrans-3333
  prefs: []
  type: TYPE_NORMAL
  zh: '160'
- en: '% converts each sequence to input (x) and output (y) for our next step 161'
  id: totrans-3334
  prefs: []
  type: TYPE_NORMAL
  zh: '% 将每个序列转换为输入（x）和输出（y）以供下一步使用 161'
- en: '% prediction objective. output is input shifted forward by 1\.'
  id: totrans-3335
  prefs: []
  type: TYPE_NORMAL
  zh: '% 预测目标。输出是输入向前移动 1。'
- en: '162'
  id: totrans-3336
  prefs: []
  type: TYPE_NORMAL
  zh: '162'
- en: '**function** [x, y]= get_xy(seqs)'
  id: totrans-3337
  prefs: []
  type: TYPE_NORMAL
  zh: '**function** [x, y]= get_xy(序列)'
- en: '163'
  id: totrans-3338
  prefs: []
  type: TYPE_NORMAL
  zh: '163'
- en: x = **cell**(**length**(seqs),1);
  id: totrans-3339
  prefs: []
  type: TYPE_NORMAL
  zh: x = **cell**(**length**(seqs),1);
- en: '164'
  id: totrans-3340
  prefs: []
  type: TYPE_NORMAL
  zh: '164'
- en: y = **cell**(**length**(seqs),1);
  id: totrans-3341
  prefs: []
  type: TYPE_NORMAL
  zh: y = **cell**(**length**(seqs),1);
- en: '165'
  id: totrans-3342
  prefs: []
  type: TYPE_NORMAL
  zh: '165'
- en: '**for** i = 1:**length**(seqs)'
  id: totrans-3343
  prefs: []
  type: TYPE_NORMAL
  zh: '**for** i = 1:**length**(seqs)'
- en: '166'
  id: totrans-3344
  prefs: []
  type: TYPE_NORMAL
  zh: '166'
- en: x{i} = seqs{i}(1:**end**-1,:);
  id: totrans-3345
  prefs: []
  type: TYPE_NORMAL
  zh: x{i} = 序列{i}(1:**end**-1,:);
- en: '167'
  id: totrans-3346
  prefs: []
  type: TYPE_NORMAL
  zh: '167'
- en: y{i} = seqs{i}(2:**end**,:);
  id: totrans-3347
  prefs: []
  type: TYPE_NORMAL
  zh: y{i} = seqs{i}(2:**end**,:);
- en: '168'
  id: totrans-3348
  prefs: []
  type: TYPE_NORMAL
  zh: '168'
- en: '**end**'
  id: totrans-3349
  prefs: []
  type: TYPE_NORMAL
  zh: '**end**'
- en: '169'
  id: totrans-3350
  prefs: []
  type: TYPE_NORMAL
  zh: '169'
- en: x = cellfun(@transpose,x,'UniformOutput',false);
  id: totrans-3351
  prefs: []
  type: TYPE_NORMAL
  zh: x = cellfun(@transpose,x,'UniformOutput',false);
- en: '170'
  id: totrans-3352
  prefs: []
  type: TYPE_NORMAL
  zh: '170'
- en: y = cellfun(@transpose,y,'UniformOutput',false);
  id: totrans-3353
  prefs: []
  type: TYPE_NORMAL
  zh: y = cellfun(@transpose,y,'UniformOutput',false);
- en: '171'
  id: totrans-3354
  prefs: []
  type: TYPE_NORMAL
  zh: '171'
- en: '**end**'
  id: totrans-3355
  prefs: []
  type: TYPE_NORMAL
  zh: '**end**'
- en: '172'
  id: totrans-3356
  prefs: []
  type: TYPE_NORMAL
  zh: '172'
- en: '173'
  id: totrans-3357
  prefs: []
  type: TYPE_NORMAL
  zh: '173'
- en: '% creates a label for a given pitch and duration combination'
  id: totrans-3358
  prefs: []
  type: TYPE_NORMAL
  zh: '% 为给定的音高和持续时间组合创建标签'
- en: '174'
  id: totrans-3359
  prefs: []
  type: TYPE_NORMAL
  zh: '174'
- en: '% i = pitch index --> i = 1:length(pitch_labels)'
  id: totrans-3360
  prefs: []
  type: TYPE_NORMAL
  zh: '% i = 音高索引 --> i = 1:length(pitch_labels)'
- en: '175'
  id: totrans-3361
  prefs: []
  type: TYPE_NORMAL
  zh: '175'
- en: '% j = duration index --> j = 1:length(dur_labels)'
  id: totrans-3362
  prefs: []
  type: TYPE_NORMAL
  zh: '% j = 持续时间索引 --> j = 1:length(dur_labels)'
- en: '176'
  id: totrans-3363
  prefs: []
  type: TYPE_NORMAL
  zh: '176'
- en: '% dl = number of possible durations = length(dur_labels)'
  id: totrans-3364
  prefs: []
  type: TYPE_NORMAL
  zh: '% dl = 可能的持续时间数量 = length(dur_labels)'
- en: '177'
  id: totrans-3365
  prefs: []
  type: TYPE_NORMAL
  zh: '177'
- en: '% label for i,j combination = (i-1)*length(dur_labels) + j'
  id: totrans-3366
  prefs: []
  type: TYPE_NORMAL
  zh: '% i,j 组合的标签 = (i-1)*length(dur_labels) + j'
- en: '178'
  id: totrans-3367
  prefs: []
  type: TYPE_NORMAL
  zh: '178'
- en: '**function** label = encode_pd(i,j, dl)'
  id: totrans-3368
  prefs: []
  type: TYPE_NORMAL
  zh: '**function** 标签 = encode_pd(i,j, dl)'
- en: '179'
  id: totrans-3369
  prefs: []
  type: TYPE_NORMAL
  zh: '179'
- en: label = (i-1)*dl + j;
  id: totrans-3370
  prefs: []
  type: TYPE_NORMAL
  zh: 标签 = (i-1)*dl + j;
- en: '180'
  id: totrans-3371
  prefs: []
  type: TYPE_NORMAL
  zh: '180'
- en: '**end**'
  id: totrans-3372
  prefs: []
  type: TYPE_NORMAL
  zh: '**end**'
- en: '181'
  id: totrans-3373
  prefs: []
  type: TYPE_NORMAL
  zh: '181'
- en: '182'
  id: totrans-3374
  prefs: []
  type: TYPE_NORMAL
  zh: '182'
- en: '% reverses encode_pd to get pitch and duration from the label'
  id: totrans-3375
  prefs: []
  type: TYPE_NORMAL
  zh: '% 反转 encode_pd 以从标签获取音高和持续时间'
- en: '183'
  id: totrans-3376
  prefs: []
  type: TYPE_NORMAL
  zh: '183'
- en: '% note that label is a vector here (from the model output)'
  id: totrans-3377
  prefs: []
  type: TYPE_NORMAL
  zh: '% 注意，这里的标签是一个向量（来自模型输出）'
- en: '184'
  id: totrans-3378
  prefs: []
  type: TYPE_NORMAL
  zh: '184'
- en: '% pitches = possible pitches'
  id: totrans-3379
  prefs: []
  type: TYPE_NORMAL
  zh: '% 音高 = 可能的音高'
- en: '185'
  id: totrans-3380
  prefs: []
  type: TYPE_NORMAL
  zh: '185'
- en: '% durations = possible durations'
  id: totrans-3381
  prefs: []
  type: TYPE_NORMAL
  zh: '% 持续时间 = 可能的持续时间'
- en: '186'
  id: totrans-3382
  prefs: []
  type: TYPE_NORMAL
  zh: '186'
- en: '**function** [pitch,duration] = decode_label(label, pitches, durations) 187'
  id: totrans-3383
  prefs: []
  type: TYPE_NORMAL
  zh: '**function** [音高, 持续时间] = decode_label(标签, 音高, 持续时间) 187'
- en: dl = **length**(durations);
  id: totrans-3384
  prefs: []
  type: TYPE_NORMAL
  zh: dl = **length**(持续时间);
- en: '188'
  id: totrans-3385
  prefs: []
  type: TYPE_NORMAL
  zh: '188'
- en: j = mod(label, dl);
  id: totrans-3386
  prefs: []
  type: TYPE_NORMAL
  zh: j = mod(标签, dl);
- en: '189'
  id: totrans-3387
  prefs: []
  type: TYPE_NORMAL
  zh: '189'
- en: '% if j = dl, label = i*dl, so label%dl = 0\.'
  id: totrans-3388
  prefs: []
  type: TYPE_NORMAL
  zh: '% 如果 j = dl，则标签 = i*dl，因此标签%dl = 0。'
- en: '190'
  id: totrans-3389
  prefs: []
  type: TYPE_NORMAL
  zh: '190'
- en: '% For our math to work out, we want j = dl in this case, not 0\.'
  id: totrans-3390
  prefs: []
  type: TYPE_NORMAL
  zh: '% 为了我们的数学运算，我们希望在这种情况下 j = dl，而不是 0。'
- en: '191'
  id: totrans-3391
  prefs: []
  type: TYPE_NORMAL
  zh: '191'
- en: '% so set all entries p where the j(p) = 0 to dl.'
  id: totrans-3392
  prefs: []
  type: TYPE_NORMAL
  zh: '% 因此将所有 j(p) = 0 的条目设置为 dl。'
- en: '192'
  id: totrans-3393
  prefs: []
  type: TYPE_NORMAL
  zh: '192'
- en: '% since matlab indexing starts at 1, we don''t have to worry about 193'
  id: totrans-3394
  prefs: []
  type: TYPE_NORMAL
  zh: '% 由于 MATLAB 索引从 1 开始，我们不必担心 193'
- en: '% a case where j actually equals 0\.'
  id: totrans-3395
  prefs: []
  type: TYPE_NORMAL
  zh: '% j 实际上等于 0 的情况。'
- en: '194'
  id: totrans-3396
  prefs: []
  type: TYPE_NORMAL
  zh: '194'
- en: j(**find**(j == 0)) = dl;
  id: totrans-3397
  prefs: []
  type: TYPE_NORMAL
  zh: j(find(j == 0)) = dl;
- en: '195'
  id: totrans-3398
  prefs: []
  type: TYPE_NORMAL
  zh: '195'
- en: i = (label - j + dl)/dl;
  id: totrans-3399
  prefs: []
  type: TYPE_NORMAL
  zh: i = (标签 - j + dl)/dl;
- en: '196'
  id: totrans-3400
  prefs: []
  type: TYPE_NORMAL
  zh: '196'
- en: pitch = pitches(i);
  id: totrans-3401
  prefs: []
  type: TYPE_NORMAL
  zh: 音高 = 音高(i);
- en: '197'
  id: totrans-3402
  prefs: []
  type: TYPE_NORMAL
  zh: '197'
- en: duration = durations(j);
  id: totrans-3403
  prefs: []
  type: TYPE_NORMAL
  zh: 持续时间 = 持续时间(j);
- en: '198'
  id: totrans-3404
  prefs: []
  type: TYPE_NORMAL
  zh: '198'
- en: '**end**'
  id: totrans-3405
  prefs: []
  type: TYPE_NORMAL
  zh: '**end**'
- en: '***Function for saving generated music to be later visualized or played in
    an application like Apple’s***'
  id: totrans-3406
  prefs: []
  type: TYPE_NORMAL
  zh: '***用于将生成的音乐保存以供以后在类似 Apple 的应用程序中可视化或播放的函数***'
- en: '***GarageBand***'
  id: totrans-3407
  prefs: []
  type: TYPE_NORMAL
  zh: '***GarageBand***'
- en: '200'
  id: totrans-3408
  prefs: []
  type: TYPE_NORMAL
  zh: '200'
- en: '% converts generated output to nmat and saves as midi'
  id: totrans-3409
  prefs: []
  type: TYPE_NORMAL
  zh: '% 将生成的输出转换为 nmat 并保存为 midi'
- en: '201'
  id: totrans-3410
  prefs: []
  type: TYPE_NORMAL
  zh: '201'
- en: '% uses nmat functionality from MIDI Toolbox:'
  id: totrans-3411
  prefs: []
  type: TYPE_NORMAL
  zh: '% 使用 MIDI Toolbox 的 nmat 功能：'
- en: '202'
  id: totrans-3412
  prefs: []
  type: TYPE_NORMAL
  zh: '202'
- en: '% https://www.jyu.fi/hytk/fi/laitokset/mutku/en/research/materials/'
  id: totrans-3413
  prefs: []
  type: TYPE_NORMAL
  zh: '% https://www.jyu.fi/hytk/fi/laitokset/mutku/en/research/materials/'
- en: miditoolbox
  id: totrans-3414
  prefs: []
  type: TYPE_NORMAL
  zh: miditoolbox
- en: '203'
  id: totrans-3415
  prefs: []
  type: TYPE_NORMAL
  zh: '203'
- en: '%[:, st(b) dur(b) channel pitch velocity st(s) dur(s)] <-- MIDI Toolbox nmat
    format'
  id: totrans-3416
  prefs: []
  type: TYPE_NORMAL
  zh: '%[:, st(b) dur(b) channel pitch velocity st(s) dur(s)] <-- MIDI Toolbox nmat
    格式'
