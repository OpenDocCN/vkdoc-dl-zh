- en: CHAPTER 14
  prefs: []
  type: TYPE_NORMAL
- en: GENERATIVE MODELING OF MUSIC
  prefs: []
  type: TYPE_NORMAL
- en: '204'
  prefs: []
  type: TYPE_NORMAL
- en: '% b: beats, s: seconds'
  prefs: []
  type: TYPE_NORMAL
- en: '205'
  prefs: []
  type: TYPE_NORMAL
- en: '% pitches and durs (durations) generated by our model'
  prefs: []
  type: TYPE_NORMAL
- en: '206'
  prefs: []
  type: TYPE_NORMAL
- en: '% name: output file name'
  prefs: []
  type: TYPE_NORMAL
- en: '207'
  prefs: []
  type: TYPE_NORMAL
- en: '**function** save_as_midi(pitches, durs, name)'
  prefs: []
  type: TYPE_NORMAL
- en: '208'
  prefs: []
  type: TYPE_NORMAL
- en: out_s = **length**(pitches);
  prefs: []
  type: TYPE_NORMAL
- en: '209'
  prefs: []
  type: TYPE_NORMAL
- en: nmat = **zeros**(out_s, 7);
  prefs: []
  type: TYPE_NORMAL
- en: '210'
  prefs: []
  type: TYPE_NORMAL
- en: nmat(:,2) = durs; % duration
  prefs: []
  type: TYPE_NORMAL
- en: '211'
  prefs: []
  type: TYPE_NORMAL
- en: nmat(:, 4) = pitches; % pitch
  prefs: []
  type: TYPE_NORMAL
- en: '212'
  prefs: []
  type: TYPE_NORMAL
- en: '213'
  prefs: []
  type: TYPE_NORMAL
- en: onsets = **zeros**(out_s,1);
  prefs: []
  type: TYPE_NORMAL
- en: '214'
  prefs: []
  type: TYPE_NORMAL
- en: onsets(1) = 0; % onsets start at 0 in nmat format
  prefs: []
  type: TYPE_NORMAL
- en: '215'
  prefs: []
  type: TYPE_NORMAL
- en: '**for** i = 1:out_s-1'
  prefs: []
  type: TYPE_NORMAL
- en: '216'
  prefs: []
  type: TYPE_NORMAL
- en: '% get current onset by adding previous duration to previous'
  prefs: []
  type: TYPE_NORMAL
- en: onset
  prefs: []
  type: TYPE_NORMAL
- en: '217'
  prefs: []
  type: TYPE_NORMAL
- en: onsets(i+1) = onsets(i) + durs(i);
  prefs: []
  type: TYPE_NORMAL
- en: '218'
  prefs: []
  type: TYPE_NORMAL
- en: '**end**'
  prefs: []
  type: TYPE_NORMAL
- en: '219'
  prefs: []
  type: TYPE_NORMAL
- en: nmat(:,1) = onsets; % onsets
  prefs: []
  type: TYPE_NORMAL
- en: '220'
  prefs: []
  type: TYPE_NORMAL
- en: '% channel range: 1-16, choice is arbitrary here with one channel 221'
  prefs: []
  type: TYPE_NORMAL
- en: nmat(:,3) = **ones**(out_s,1);
  prefs: []
  type: TYPE_NORMAL
- en: '222'
  prefs: []
  type: TYPE_NORMAL
- en: velocity = 50; %
  prefs: []
  type: TYPE_NORMAL
- en: 1-127
  prefs: []
  type: TYPE_NORMAL
- en: '223'
  prefs: []
  type: TYPE_NORMAL
- en: '% velocity (volume), choice is somewhat arbitrary here'
  prefs: []
  type: TYPE_NORMAL
- en: '224'
  prefs: []
  type: TYPE_NORMAL
- en: nmat(:,5) = velocity***ones**(out_s,1);
  prefs: []
  type: TYPE_NORMAL
- en: '225'
  prefs: []
  type: TYPE_NORMAL
- en: '% these determine tempo'
  prefs: []
  type: TYPE_NORMAL
- en: '226'
  prefs: []
  type: TYPE_NORMAL
- en: t_ratio = 15;
  prefs: []
  type: TYPE_NORMAL
- en: '227'
  prefs: []
  type: TYPE_NORMAL
- en: nmat(:,6) = nmat(:,1)/t_ratio; % start time (s)
  prefs: []
  type: TYPE_NORMAL
- en: '228'
  prefs: []
  type: TYPE_NORMAL
- en: nmat(:,7) = nmat(:,2)/t_ratio; % duration (s)
  prefs: []
  type: TYPE_NORMAL
- en: '229'
  prefs: []
  type: TYPE_NORMAL
- en: writemidi(nmat, strcat(name,'.midi'));
  prefs: []
  type: TYPE_NORMAL
- en: '230'
  prefs: []
  type: TYPE_NORMAL
- en: '**end**'
  prefs: []
  type: TYPE_NORMAL
- en: The outputs can be played in any MIDI-compatible application. Figure [14.4](#p291)
    shows the visualization of one model output in GarageBand.
  prefs: []
  type: TYPE_NORMAL
- en: Here, we will briefly discuss the results we achieved with this model so that
    the reader will be better equipped to replicate them. You can see our loss and
    accuracy curves in Figure [14.5\.](#p292)
  prefs: []
  type: TYPE_NORMAL
- en: We note that the model appears to learn most of what it needs within the first
    50 or so epochs.
  prefs: []
  type: TYPE_NORMAL
- en: '**Figure 14.4:** *The model-generated MIDI file new test25 simple samp class
    in plus gen.midi in the* *GarageBand application.*'
  prefs: []
  type: TYPE_NORMAL
- en: '281'
  prefs: []
  type: TYPE_NORMAL
