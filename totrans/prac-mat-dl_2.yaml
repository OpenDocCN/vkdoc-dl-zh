- en: '**13.3**'
  id: totrans-1447
  prefs: []
  type: TYPE_NORMAL
  zh: '**13.3**'
- en: '**Segmented Earth Sensor**'
  id: totrans-1448
  prefs: []
  type: TYPE_NORMAL
  zh: '**Segmented Earth Sensor**'
- en: '**13.3.1 Problem**'
  id: totrans-1449
  prefs: []
  type: TYPE_NORMAL
  zh: '**13.3.1 Problem**'
- en: We want to model the output of a segmented multi-element Earth sensor. As seen
    in Figure [13.4,](#p268)
  id: totrans-1450
  prefs: []
  type: TYPE_NORMAL
  zh: 我们想要模拟分段多元素地球传感器的输出。如图 [13.4](#p268) 所示，
- en: this means that each edge-measuring sensing element is an array instead of a
    single sensor as in the previous recipe; this allows the edge of the Earth to
    be localized along with the array.
  id: totrans-1451
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着每个边缘测量传感元件是一个数组，而不是像之前食谱中那样是一个单独的传感器；这允许地球的边缘与数组一起定位。
- en: '**13.3.2 Solution**'
  id: totrans-1452
  prefs: []
  type: TYPE_NORMAL
  zh: '**13.3.2 Solution**'
- en: Use MATLAB’s polyshape and intersect functions to model the elements.
  id: totrans-1453
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 MATLAB 的 polyshape 和 intersect 函数来模拟元素。
- en: '**13.3.3 How It Works**'
  id: totrans-1454
  prefs: []
  type: TYPE_NORMAL
  zh: '**13.3.3 How It Works**'
- en: The function used for the multi-element sensor, SegmentedEarthSensor, is very
    similar to the linear sensor model. We’ll still describe all of the code. The
    first part of the function either runs a built-in demo or returns the default
    data structure.
  id: totrans-1455
  prefs: []
  type: TYPE_NORMAL
  zh: 用于多元素传感器的函数，SegmentedEarthSensor，与线性传感器模型非常相似。我们仍然会描述所有的代码。函数的前一部分要么运行一个内置的演示，要么返回默认的数据结构。
