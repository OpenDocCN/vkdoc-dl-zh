- en: CHAPTER 14
  prefs: []
  type: TYPE_NORMAL
- en: GENERATIVE MODELING OF MUSIC
  prefs: []
  type: TYPE_NORMAL
- en: '**Figure 14.2:** *LSTM and other recurrent architectures. Here, we show diagrams
    of RNN, LSTM, and* *GRU cells. Gates are visualized in green. For consistency,
    the gate inputs line up with the gate outputs,* *whereas the gate keepers are
    perpendicular to the gate inputs. The GRU update gate is a notable* *exception.
    In this case, the factor generated by the gate, zt, is applied to hg,t−* 1 *,
    a combination of the* *input and the output of the reset gate (a gated version
    of the previous hidden state), and (1-zt) is applied* *to the previous hidden
    state (ht−* 1 *). The application of these factors is through the Hadamard product,*
    *as seen in the figure. Effectively, both hg,t−* 1 *and ht−* 1 *are being “gated,”
    which leads to the difference* *in the diagram. As an aside, note that zt linearly
    parameterizes the degree to which the past hidden state* *or the past hidden state/new
    input combination is represented in the output. If zt* = 0 *, ot* = *ht−* 1 *,
    if* *zt* = 1 *, ot* = *hg,t−* 1 *, and if* 0 *< zt <* 1 *, ot is a linear combination
    of these values. Also note that for* *both the LSTM and GRU, the next hidden state
    is also the output. Finally, note that we grouped model* *components into gates
    in such a way as to minimize the complexity of our diagrams and omitted bias*
    *vectors and some weight matrices for a similar effect. Some accuracy has therefore
    been sacrificed to* *help foster an intuitive understanding of the models. This
    figure was inspired by a figure in [25] and* *benefited from the information in
    [30].*'
  prefs: []
  type: TYPE_NORMAL
- en: Figure [14.3](#p284) illustrates a general gating mechanism as seen in LSTMs.
    This gating mechanism improves the performance of LSTMs on tasks that require
    recollection of specific past information and make them less susceptible to the
    vanishing gradient problem of vanilla recurrent neural networks (RNNs), where
    the products of gradients become so small that the output neurons lose the ability
    to update their weights. Note that although in theory, an LSTM seems quite powerful,
    in practice, the model only “remembers” what it is trained to remember. If the
    model is not shown the utility of recalling past inputs, it will not do so. Common
    methods of highlighting this utility are constructing a training set where success
    is only possible if long-term trends are attended to, or by penalizing the model
    for not doing so in the loss function. For the sake of this tutorial, the internal
    workings of the LSTM are not that important, and we encourage the reader to read
    about LSTMs and other RNNs if their inner workings and theoretical guarantees
    are of interest.
  prefs: []
  type: TYPE_NORMAL
- en: '273'
  prefs: []
  type: TYPE_NORMAL
- en: '![](index-284_1.png)'
  prefs: []
  type: TYPE_IMG
- en: '![](index-284_2.png)'
  prefs: []
  type: TYPE_IMG
- en: CHAPTER 14
  prefs: []
  type: TYPE_NORMAL
- en: GENERATIVE MODELING OF MUSIC
  prefs: []
  type: TYPE_NORMAL
- en: '**Figure 14.3:** *LSTM gating intuition with a sigmoid activation. Here, we
    see a three-dimensional input* *to the left and the weight matrix and gate keeper
    at the bottom. The product of the weight matrix and* *gate keeper produce a value
    for each input (the colored dots), which when passed through the sigmoid* *activation
    function, generate weights between zero and one. Note that by using the sigmoid
    activation* *(as opposed to the softmax, for example), these factors need not
    add up to one. This means that whether* *or not the gate transmits or blocks one
    component of the input is not constrained by the decision made for* *another component
    of the input. Finally, these factors are used to scale the input to produce the
    output of* *the gate. As one specific example of an LSTM gate, take the “Forget
    gate” as seen in Figure [14.2](#p283)* *. In the* *forget gate, the input is the
    previous cell state, and the gate keeper is the concatenation of the previous*
    *hidden state with the current input. Intuitively, this means that we use the
    most current information from* *the input, with short-term memory of past states
    and inputs, to determine which aspects of the cell state* *should be passed forward
    and which aspects should be forgotten.*'
  prefs: []
  type: TYPE_NORMAL
- en: '**14.5**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Implementation**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Before diving into the implementation of our solution to this problem, we note
    that this chapter requires some additional toolboxes:'
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Statistics and Machine Learning Toolbox by MathWorks
  prefs: []
  type: TYPE_NORMAL
- en: 2\. MIDI Toolbox [43]
  prefs: []
  type: TYPE_NORMAL
- en: Once we have those toolboxes downloaded, we are ready to start coding. As was
    noted previously, MATLAB already implements an LSTM with its lstmLayer. In order
    to utilize this layer, the model must be built with a sequential input layer.
    This model formulation allows you to pass sequences of inputs to the model and
    have it process them in the proper temporal order.
  prefs: []
  type: TYPE_NORMAL
- en: With a batch size of one, there is no need to pad the inputs; however, should
    you wish to have the model observe more sequences before an update, padding or
    cropping will be required as MATLAB requires that all sequences in a single batch
    be the same length.
  prefs: []
  type: TYPE_NORMAL
- en: '274'
  prefs: []
  type: TYPE_NORMAL
- en: '![](index-285_1.png)'
  prefs: []
  type: TYPE_IMG
- en: '![](index-285_2.png)'
  prefs: []
  type: TYPE_IMG
- en: CHAPTER 14
  prefs: []
  type: TYPE_NORMAL
- en: GENERATIVE MODELING OF MUSIC
  prefs: []
  type: TYPE_NORMAL
- en: Another implementation detail is whether to formulate the problem as classification
    or regression. In a regression formulation, the fully connected layer at the output
    would have two outputs, one for duration and one for pitch. The outputs would
    be continuous, allowing the model to generalize to unseen pitches and note durations.
    One major problem with using regression for generative modeling is that you lose
    the ability to manually alter the way you sample from your model’s output distribution.
    As we shall see at the end of this section and the beginning of Section [14.6](#p293),
    some sampling procedures perform much better than others, and having this degree
    of freedom in choosing the way you sample gives you the ability to greatly improve
    the quality of the music your model generates. For this reason, we choose to formulate
    our problem as classification.
  prefs: []
  type: TYPE_NORMAL
- en: In classification, the output space is divided into a set of classes that the
    model has to assign probabilities to. A possible formulation of such a problem
    would be a multi-output model where one output corresponds to pitch and the other
    corresponds to duration. This would allow shared processing of the model input,
    but separate pitch-specific and duration-specific processing before the model
    output. This mode of operation is more difficult to implement in MATLAB as it
    requires a custom training loop. Our chosen approach is to instead have the model
    predict the joint distribution over pitch and duration as it allows the model
    to predict a single vector output. We will label this model as the “single-output”
    model to contrast it with the “multi-output” model we defined before. We discuss
    both methods here to highlight their differences.
  prefs: []
  type: TYPE_NORMAL
- en: The principal difference between these two models is how they model the distribution
    of music. As stated in the introduction to generative modeling, our goal here
    is to model the distribution that generates the data. In this case, this is the
    distribution that generates the soprano voice of Bach chorales. Directly modeling
    the distribution allows us to sample from it to generate new examples. In the
    multi-output model, the model generates a distribution over pitches and a distribution
    over durations, which we would sample separately. In the single-output model,
    we sample from the joint distribution over pitch and duration.
  prefs: []
  type: TYPE_NORMAL
- en: The joint distribution inherently contains more information than the marginal
    distributions, which are modeled by the multi-output model, except in the case
    that the distributions are independent. There is likely some dependence between
    pitch and duration, though we are not convinced that the dependence is significant
    enough to choose the single-output model over the multi-output model for this
    reason.
  prefs: []
  type: TYPE_NORMAL
- en: However, a multi-output model has a significant benefit, which is that the size
    of the output space is much smaller, and separate processing can be applied to
    each output. This characteristic becomes much more important as we increase the
    number of outputs. In our simplified dataset, there are 8 possible durations and
    20 possible pitches, making the output space of size 160\. If there were a third
    variable, say of size 10, we would now have an output of size 1600\. Larger output
    spaces in classification problems invariably lead to many low probability outputs
    and, thus, small gradients. This can contribute to the vanishing gradient problem
    and can make learning hard without a large dataset and an abundance of computational
    resources.
  prefs: []
  type: TYPE_NORMAL
- en: To contrast, in this scenario, the multi-output model would have an output of
    size 20 + 8 +
  prefs: []
  type: TYPE_NORMAL
- en: 10 = 38, which is much more manageable. However, as mentioned previously, we
    implement 275
  prefs: []
  type: TYPE_NORMAL
