- en: '142'
  id: totrans-3245
  prefs: []
  type: TYPE_NORMAL
  zh: '142'
- en: last_pred = randsample(**length**(last_preds),1,true,last_preds
  id: totrans-3246
  prefs: []
  type: TYPE_NORMAL
