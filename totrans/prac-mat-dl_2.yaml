- en: EARTH SENSORS
  prefs: []
  type: TYPE_NORMAL
- en: The function has a default data structure to help the user. It is for an eight-element
    sensor.
  prefs: []
  type: TYPE_NORMAL
- en: '***StaticEarthSensor.m***'
  prefs: []
  type: TYPE_NORMAL
