- en: CHAPTER 14
  id: totrans-3522
  prefs: []
  type: TYPE_NORMAL
  zh: 第14章
- en: GENERATIVE MODELING OF MUSIC
  id: totrans-3523
  prefs: []
  type: TYPE_NORMAL
  zh: 音乐生成模型
- en: We also note that the average accuracy value appears to approach 20% by the
    end of training, which is much greater than chance (1/160 = .625%).
  id: totrans-3524
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还注意到，平均准确度值似乎在训练结束时接近20%，这比随机概率（1/160 = .625%）大得多。
- en: Once the trained model is generated, there are several ways to use it to produce
    music. Two of these are contained in our generate function. The first is greedy
    sampling, in which we take the (pitch, duration) combination with the highest
    probability (as assigned by the model) as the next musical event. In the second,
    we sample from the distribution produced by the model.
  id: totrans-3525
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦生成训练好的模型，就有几种方法可以使用它来生成音乐。其中两种包含在我们的生成函数中。第一种是贪婪采样，其中我们选择模型分配的最高概率的（音高，持续时间）组合作为下一个音乐事件。第二种是从模型产生的分布中进行采样。
- en: This means that we take the event corresponding to index *i* in the output vector
    with probability *P* ( *i*), as assigned by the model. As you can see in Figure
    [14.6,](#p293) the latter method produces superior results. In our generate function,
    we first provide the model with part of a training example to get it started before
    switching to feeding it its own predictions as inputs. This gives the model an
    opportunity to construct hidden and cell states based on the higher-level features
    of the piece, like mood or style. If we had trained on composers other than Bach,
    another high-level feature would be the composer. By providing a short sample
    of a piece as a seed, we encourage the model to generate music that fits the style,
    mood, and so on of its seed. In Section [14.6,](#p293) we discuss probing the
    feature space of variational autoencoders to control what the model generates,
    and this is one way to achieve a similar effect with LSTMs.
  id: totrans-3526
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着我们以概率 *P* ( *i*)，由模型分配，选择输出向量中与索引 *i* 对应的事件。正如你在图 [14.6](#p293) 中可以看到的那样，后一种方法产生了更好的结果。在我们的生成函数中，我们首先向模型提供部分训练示例以启动它，然后再切换到用其自己的预测作为输入。这给了模型一个机会，根据作品的高级特征，如情绪或风格，构建隐藏和细胞状态。如果我们训练的是除了巴赫以外的作曲家，另一个高级特征将是作曲家。通过提供作品的短样本作为种子，我们鼓励模型生成符合其种子风格、情绪等的音乐。在第
    [14.6](#p293) 节中，我们讨论了通过探查变分自编码器的特征空间来控制模型生成的内容，这是用 LSTM 实现类似效果的一种方法。
- en: '**Figure 14.5:** *Model training curves. Accuracy quickly jumps from around
    0% to around 10% within* *the first epoch. By epoch 15, the accuracy is up to
    around 20% and then hovers around there for the* *remainder of training. This
    indicates training could likely have been stopped much sooner without* *sacrificing
    model performance. Also note that the x-axis of these plots is in “iterations,”
    but as can be* *seen on the right of the figure, there are 100 iterations per
    epoch here. The epoch markers can also be* *seen above the iterations in steps
    of 100\.*'
  id: totrans-3527
  prefs: []
  type: TYPE_NORMAL
  zh: '**图14.5：** *模型训练曲线。准确率在第一个时期内迅速从大约 0% 上升到大约 10%。到第 15 个时期，准确率达到了大约 20%，然后在训练的剩余时间里保持在这个水平。这表明训练可能可以提前停止，而不会牺牲模型性能。还请注意，这些图的
    x 轴是“迭代”，但如图中右侧所示，每个时期有 100 次迭代。时期标记也可以在迭代上方以 100 的倍数看到。*'
