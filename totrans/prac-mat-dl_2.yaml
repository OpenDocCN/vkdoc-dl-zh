- en: chorale_labels = **zeros**(**ls**,1);
  id: totrans-2938
  prefs: []
  type: TYPE_NORMAL
  zh: chorale_labels = **zeros**(**ls**,1);
- en: '37'
  id: totrans-2939
  prefs: []
  type: TYPE_NORMAL
  zh: '37'
- en: '**for** j = 1:**ls**'
  id: totrans-2940
  prefs: []
  type: TYPE_NORMAL
  zh: '**for** j = 1:**ls**'
- en: '38'
  id: totrans-2941
  prefs: []
  type: TYPE_NORMAL
  zh: '38'
- en: '**pi** = **find**(pitch_labels == seq(j,1));'
  id: totrans-2942
  prefs: []
  type: TYPE_NORMAL
  zh: '**pi** = **find**(pitch_labels == seq(j,1));'
- en: '39'
  id: totrans-2943
  prefs: []
  type: TYPE_NORMAL
  zh: '39'
- en: di = **find**(dur_labels == seq(j, 2));
  id: totrans-2944
  prefs: []
  type: TYPE_NORMAL
  zh: di = **find**(dur_labels == seq(j, 2));
- en: '40'
  id: totrans-2945
  prefs: []
  type: TYPE_NORMAL
  zh: '40'
- en: chorale_labels(j,1) = encode_pd(**pi**, di, dl);
  id: totrans-2946
  prefs: []
  type: TYPE_NORMAL
  zh: chorale_labels(j,1) = encode_pd(**pi**, di, dl);
- en: '41'
  id: totrans-2947
  prefs: []
  type: TYPE_NORMAL
  zh: '41'
