  id: totrans-3232
  prefs: []
  type: TYPE_NORMAL
  zh: '136'
- en: '% In greedy mode, you take the highest probability event'
  id: totrans-3233
  prefs: []
  type: TYPE_NORMAL
  zh: '% 在贪婪模式下，你选择概率最高的事件'
- en: '137'
  id: totrans-3234
  prefs: []
  type: TYPE_NORMAL
  zh: '137'
- en: '**if strcmp**(samp_mode, ''greedy'')'
  id: totrans-3235
  prefs: []
  type: TYPE_NORMAL
