  prefs: []
  type: TYPE_NORMAL
- en: '**12.3**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Training and Testing**'
  prefs: []
  type: TYPE_NORMAL
- en: '**12.3.1 Problem**'
  prefs: []
  type: TYPE_NORMAL
- en: We want to build a deep learning system to compute the eccentricity and semi-major
    axis for an orbit from angle measurements. The argument of perigee will be assumed
    to be zero.
  prefs: []
  type: TYPE_NORMAL
- en: '**12.3.2 Solution**'
  prefs: []
  type: TYPE_NORMAL
- en: The orbit history is a time series of angles. We will take angles at uniform
    time intervals. We will use fitnet to fit the data, which creates a function-fitting
    neural network with a specified hidden layer size and training function.
  prefs: []
  type: TYPE_NORMAL
- en: '**12.3.3 How It Works**'
  prefs: []
  type: TYPE_NORMAL
- en: We load in the data from the mat-file and separate it into training and testing
    sets.
  prefs: []
  type: TYPE_NORMAL
- en: '***OrbitNeuralNet.m***'
  prefs: []
  type: TYPE_NORMAL
- en: '1'
  prefs: []
  type: TYPE_NORMAL
- en: '%% Train and test the Orbit Neural Net'
