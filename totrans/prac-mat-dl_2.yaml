- en: CHAPTER 14
  id: totrans-3458
  prefs: []
  type: TYPE_NORMAL
  zh: 第14章
- en: GENERATIVE MODELING OF MUSIC
  id: totrans-3459
  prefs: []
  type: TYPE_NORMAL
  zh: 音乐生成模型
- en: '204'
  id: totrans-3460
  prefs: []
  type: TYPE_NORMAL
  zh: '204'
- en: '% b: beats, s: seconds'
  id: totrans-3461
  prefs: []
  type: TYPE_NORMAL
  zh: '% b：节拍，s：秒'
- en: '205'
  id: totrans-3462
  prefs: []
  type: TYPE_NORMAL
  zh: '205'
- en: '% pitches and durs (durations) generated by our model'
  id: totrans-3463
  prefs: []
  type: TYPE_NORMAL
  zh: '% 我们模型生成的音高和持续时间'
- en: '206'
  id: totrans-3464
  prefs: []
  type: TYPE_NORMAL
  zh: '206'
- en: '% name: output file name'
  id: totrans-3465
  prefs: []
  type: TYPE_NORMAL
  zh: '% 名称：输出文件名'
- en: '207'
  id: totrans-3466
  prefs: []
  type: TYPE_NORMAL
  zh: '207'
- en: '**function** save_as_midi(pitches, durs, name)'
  id: totrans-3467
  prefs: []
  type: TYPE_NORMAL
  zh: '**函数** save_as_midi(pitches, durs, name)'
- en: '208'
  id: totrans-3468
  prefs: []
  type: TYPE_NORMAL
  zh: '208'
- en: out_s = **length**(pitches);
  id: totrans-3469
  prefs: []
  type: TYPE_NORMAL
  zh: out_s = **length**(pitches);
- en: '209'
  id: totrans-3470
  prefs: []
  type: TYPE_NORMAL
  zh: '209'
- en: nmat = **zeros**(out_s, 7);
  id: totrans-3471
  prefs: []
  type: TYPE_NORMAL
  zh: nmat = **zeros**(out_s, 7);
- en: '210'
  id: totrans-3472
  prefs: []
  type: TYPE_NORMAL
  zh: '210'
- en: nmat(:,2) = durs; % duration
  id: totrans-3473
  prefs: []
  type: TYPE_NORMAL
  zh: nmat(:,2) = durs; % 持续时间
- en: '211'
  id: totrans-3474
  prefs: []
  type: TYPE_NORMAL
  zh: '211'
- en: nmat(:, 4) = pitches; % pitch
  id: totrans-3475
  prefs: []
  type: TYPE_NORMAL
  zh: nmat(:, 4) = pitches; % 音高
- en: '212'
  id: totrans-3476
  prefs: []
  type: TYPE_NORMAL
  zh: '212'
- en: '213'
  id: totrans-3477
  prefs: []
  type: TYPE_NORMAL
  zh: '213'
- en: onsets = **zeros**(out_s,1);
  id: totrans-3478
  prefs: []
  type: TYPE_NORMAL
  zh: onsets = **zeros**(out_s,1);
- en: '214'
  id: totrans-3479
  prefs: []
  type: TYPE_NORMAL
  zh: '214'
- en: onsets(1) = 0; % onsets start at 0 in nmat format
  id: totrans-3480
  prefs: []
  type: TYPE_NORMAL
  zh: onsets(1) = 0; % 在nmat格式中，起始时间为0
- en: '215'
  id: totrans-3481
  prefs: []
  type: TYPE_NORMAL
  zh: '215'
- en: '**for** i = 1:out_s-1'
  id: totrans-3482
  prefs: []
  type: TYPE_NORMAL
  zh: '**for** i = 1:out_s-1'
- en: '216'
  id: totrans-3483
  prefs: []
  type: TYPE_NORMAL
  zh: '216'
- en: '% get current onset by adding previous duration to previous'
  id: totrans-3484
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将前一个持续时间加到前一个上，获取当前起始时间。
- en: onset
  id: totrans-3485
  prefs: []
  type: TYPE_NORMAL
  zh: 起始时间
- en: '217'
  id: totrans-3486
  prefs: []
  type: TYPE_NORMAL
  zh: '217'
- en: onsets(i+1) = onsets(i) + durs(i);
  id: totrans-3487
  prefs: []
  type: TYPE_NORMAL
  zh: onsets(i+1) = onsets(i) + durs(i);
- en: '218'
  id: totrans-3488
  prefs: []
  type: TYPE_NORMAL
  zh: '218'
- en: '**end**'
  id: totrans-3489
  prefs: []
  type: TYPE_NORMAL
  zh: '**end**'
- en: '219'
  id: totrans-3490
  prefs: []
  type: TYPE_NORMAL
  zh: '219'
- en: nmat(:,1) = onsets; % onsets
  id: totrans-3491
  prefs: []
  type: TYPE_NORMAL
  zh: nmat(:,1) = onsets; % 起始时间
- en: '220'
  id: totrans-3492
  prefs: []
  type: TYPE_NORMAL
  zh: '220'
- en: '% channel range: 1-16, choice is arbitrary here with one channel 221'
  id: totrans-3493
  prefs: []
  type: TYPE_NORMAL
  zh: '% 通道范围：1-16，这里的选择是随意的，有一个通道221'
- en: nmat(:,3) = **ones**(out_s,1);
  id: totrans-3494
  prefs: []
  type: TYPE_NORMAL
  zh: nmat(:,3) = **ones**(out_s,1);
- en: '222'
  id: totrans-3495
  prefs: []
  type: TYPE_NORMAL
  zh: '222'
- en: velocity = 50; %
  id: totrans-3496
  prefs: []
  type: TYPE_NORMAL
  zh: velocity = 50; %
- en: 1-127
  id: totrans-3497
  prefs: []
  type: TYPE_NORMAL
  zh: 1-127
- en: '223'
  id: totrans-3498
  prefs: []
  type: TYPE_NORMAL
  zh: '223'
- en: '% velocity (volume), choice is somewhat arbitrary here'
  id: totrans-3499
  prefs: []
  type: TYPE_NORMAL
  zh: '% 速度（音量），这里的选择有些随意'
- en: '224'
  id: totrans-3500
  prefs: []
  type: TYPE_NORMAL
  zh: '224'
- en: nmat(:,5) = velocity***ones**(out_s,1);
  id: totrans-3501
  prefs: []
  type: TYPE_NORMAL
  zh: nmat(:,5) = velocity**ones**(out_s,1);
- en: '225'
  id: totrans-3502
  prefs: []
  type: TYPE_NORMAL
  zh: '225'
- en: '% these determine tempo'
  id: totrans-3503
  prefs: []
  type: TYPE_NORMAL
  zh: '% 这些决定了节奏'
- en: '226'
  id: totrans-3504
  prefs: []
  type: TYPE_NORMAL
  zh: '226'
- en: t_ratio = 15;
  id: totrans-3505
  prefs: []
  type: TYPE_NORMAL
  zh: t_ratio = 15;
- en: '227'
  id: totrans-3506
  prefs: []
  type: TYPE_NORMAL
  zh: '227'
- en: nmat(:,6) = nmat(:,1)/t_ratio; % start time (s)
  id: totrans-3507
  prefs: []
  type: TYPE_NORMAL
  zh: nmat(:,6) = nmat(:,1)/t_ratio; % 开始时间（秒）
- en: '228'
  id: totrans-3508
  prefs: []
  type: TYPE_NORMAL
  zh: '228'
- en: nmat(:,7) = nmat(:,2)/t_ratio; % duration (s)
  id: totrans-3509
  prefs: []
  type: TYPE_NORMAL
  zh: nmat(:,7) = nmat(:,2)/t_ratio; % 持续时间（秒）
- en: '229'
  id: totrans-3510
  prefs: []
  type: TYPE_NORMAL
  zh: '229'
- en: writemidi(nmat, strcat(name,'.midi'));
  id: totrans-3511
  prefs: []
  type: TYPE_NORMAL
  zh: writemidi(nmat, strcat(name,'.midi'));
- en: '230'
  id: totrans-3512
  prefs: []
  type: TYPE_NORMAL
  zh: '230'
- en: '**end**'
  id: totrans-3513
  prefs: []
  type: TYPE_NORMAL
  zh: '**end**'
- en: The outputs can be played in any MIDI-compatible application. Figure [14.4](#p291)
    shows the visualization of one model output in GarageBand.
  id: totrans-3514
  prefs: []
  type: TYPE_NORMAL
  zh: 输出可以在任何兼容MIDI的应用程序中播放。图[14.4](#p291)显示了在GarageBand中一个模型输出的可视化。
- en: Here, we will briefly discuss the results we achieved with this model so that
    the reader will be better equipped to replicate them. You can see our loss and
    accuracy curves in Figure [14.5\.](#p292)
  id: totrans-3515
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们将简要讨论我们使用此模型所取得的结果，以便读者能够更好地复制它们。您可以在图[14.5\.](#p292)中看到我们的损失和准确度曲线。
- en: We note that the model appears to learn most of what it needs within the first
    50 or so epochs.
  id: totrans-3516
  prefs: []
  type: TYPE_NORMAL
  zh: 我们注意到，模型似乎在前50个或更多的时期内就学会了它所需的大部分内容。
- en: '**Figure 14.4:** *The model-generated MIDI file new test25 simple samp class
    in plus gen.midi in the* *GarageBand application.*'
  id: totrans-3517
  prefs: []
  type: TYPE_NORMAL
  zh: '**图14.4：** *在GarageBand应用程序中，模型生成的MIDI文件名为new test25 simple samp class in plus
    gen.midi。*'
- en: '281'
  id: totrans-3518
  prefs: []
  type: TYPE_NORMAL
  zh: '281'
- en: '![](index-292_1.png)'
  id: totrans-3519
  prefs: []
  type: TYPE_IMG
  zh: '![](index-292_1.png)'
- en: '![](index-292_2.png)'
  id: totrans-3520
  prefs: []
  type: TYPE_IMG
