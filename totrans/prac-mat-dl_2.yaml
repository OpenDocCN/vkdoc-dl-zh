- en: = x(1:2);
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: = x(1:2);
- en: '19'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '19'
- en: v
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: v
- en: = x(3:4);
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: = x(3:4);
- en: '20'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '20'
- en: xDot
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: xDot
- en: = [v;-d.mu*r/(r'*r)ˆ1.5 + d.a];
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: = [v;-d.mu*r/(r'*r)ˆ1.5 + d.a];
- en: We will create a script that simulates multiple orbits. The simulation will
    use RHSOrbit.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将创建一个脚本，模拟多个轨道。模拟将使用RHSOrbit。
- en: The first part of the orbit generation script sets up the random orbital elements.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 轨道生成脚本的第一个部分设置随机轨道元素。
- en: '***Orbits.m***'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '***Orbits.m***'
- en: '1'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '1'
