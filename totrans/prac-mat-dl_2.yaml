- en: '**Figure 13.6:** *Results for the Earth sensor.*'
  id: totrans-2297
  prefs: []
  type: TYPE_NORMAL
  zh: '**图 13.6：** *地球传感器的结果。*'
- en: for all combinations of roll and pitch angles. The pitch measurement is very
    clean for all the sets. Roll degrades at high roll angles but shows errors even
    at low roll angles depending on the value of pitch.
  id: totrans-2298
  prefs: []
  type: TYPE_NORMAL
  zh: 对于所有滚转和俯仰角度的组合。俯仰测量对于所有集合都非常干净。滚转在高滚转角度时退化，但在低滚转角度时也会根据俯仰的值显示错误。
