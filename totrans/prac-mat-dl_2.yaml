- en: '**13.4**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Linear Output Sensor Neural Network**'
  prefs: []
  type: TYPE_NORMAL
- en: '**13.4.1 Problem**'
  prefs: []
  type: TYPE_NORMAL
- en: We want a model that can convert linear sensor outputs from multiple detectors
    to roll and pitch measurements. The sensors are the radiation detectors that see
    the edge of the Earth.
  prefs: []
  type: TYPE_NORMAL
- en: '**13.4.2 Solution**'
  prefs: []
  type: TYPE_NORMAL
- en: Use a feedforward neural network.
  prefs: []
  type: TYPE_NORMAL
- en: '**13.4.3 How It Works**'
  prefs: []
  type: TYPE_NORMAL
- en: The first part of the script, NNEarthSensor.m, generates the training data.
    It calls ISS
  prefs: []
  type: TYPE_NORMAL
- en: Orbit to get the Keplerian orbital elements for the International Space Station
    (ISS). It then gets the default data structure from StaticEarthSensor. The script
    then converts orbital elements into position and velocity vectors using RVOrbGen
    and computes the quaternion from the Earth-Centered Inertial Frame (ECI) to the
    Local Vertical Local Horizontal (LVLH) which is the normal Earth-pointing attitude.
  prefs: []
  type: TYPE_NORMAL
