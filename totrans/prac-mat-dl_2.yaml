  zh: 函数体将地球的位置转换到传感器的焦平面。
- en: It assumes a pinhole camera. The code takes an input attitude quaternion and
    converts it into locations of the sensor elements. If a segment is illuminated
    at all, it returns a one for that element. Otherwise, it returns zero.
  id: totrans-1523
  prefs: []
  type: TYPE_NORMAL
  zh: 它假设了一个针孔相机。代码接受一个输入姿态四元数并将其转换为传感器元件的位置。如果某个部分被照亮，则返回该元件的一个值。否则，返回零。
