    neurons and helps prevent overfitting. Overfitting is when the results correspond
    too closely to a particular set of data. This makes it hard for the trained network
    to identify patterns in new data. The first BiLSTM layer produces a sequence as
    its output. The second BiLSTM layer’s
  id: totrans-959
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用两个BiLSTM层，层间有20%的dropout。dropout移除神经元，有助于防止过拟合。过拟合是指结果与特定数据集过于接近。这使得训练好的网络难以在新数据中识别模式。第一个BiLSTM层产生一个序列作为其输出。第二个BiLSTM层的
- en: ’OutputMode’ is set to ’last’. The numClasses is 2 because we are estimating
    two parameters. The fully connected layer connects the two BiLSTM outputs to the
    two parameters we want to identify in the regression layer. The training window
    is shown in Figure [12.8\.](#p260) We **Figure 12.8:** *Training window.*
