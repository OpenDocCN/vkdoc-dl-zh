  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: nEl
- en: = 500;
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: = 500;
- en: '% Number of sets of data'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '% 数据集数量'
- en: '7'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '7'
- en: d
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: d
