- en: CHAPTER 12
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 章节十二
- en: ORBIT DETERMINATION
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: ORBIT DETERMINATION
- en: 'The neural network will use sequences of angles and their related times as
    the input. The output will be the two orbital elements: semi-major axis and eccentricity.
    In general, if we know the position and velocity at a point in the orbit, we can
    always compute the orbital elements.'
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络将使用角度序列及其相关时间作为输入。输出将是两个轨道元素：半长轴和偏心率。一般来说，如果我们知道轨道上某点的位置和速度，我们总能计算出轨道元素。
- en: This is done in the function El2RV. The neural network, in effect, will infer
    position and velocity just from the angles.
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: 这是在El2RV函数中完成的。实际上，神经网络将仅从角度推断位置和速度。
- en: We train the network using fitnet and later in the script compare that to cascadeforw
    ardnet and feedforwardnet. Note that we normalized the semi-major axis so that
    the magnitude is in the same order as the eccentricity. This improves the fitting.
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用fitnet训练网络，并在脚本中将其与cascadeforw ardnet和feedforwardnet进行比较。请注意，我们归一化了半长轴，使其大小与偏心率相同。这提高了拟合效果。
