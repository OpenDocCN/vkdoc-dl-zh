  zh: 地球传感器
- en: '**Figure 13.7:** *Training window for the segmented sensor.*'
  id: totrans-2534
  prefs: []
  type: TYPE_NORMAL
  zh: '**图13.7：** *分段传感器的训练窗口。*'
- en: Figure [13.8](#p278) gives the results for the segmented sensor. The sensor
    is less accurate than the linear sensor given in the previous example. For the
    linear sensor, each of the four elements has infinite resolution. In this sensor,
    each aggregate element only has ten elements to represent the edge of the Earth.
    Therefore, it only knows its orientation to the angular resolution of one segment.
    Both pitch and roll show errors over the entire range of angles. Still, the sensor
    is good to within about a degree.
  id: totrans-2535
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [13.8](#p278) 展示了分割传感器的结果。该传感器的精度低于前一个示例中给出的线性传感器。对于线性传感器，四个元素中的每一个都具有无限分辨率。在这个传感器中，每个聚合元素只有十个元素来表示地球的边缘。因此，它只知道其相对于一个段的角度分辨率的方向。俯仰和偏航在整个角度范围内都显示有误差。尽管如此，该传感器的精度仍然在约一度以内。
