- en: CHAPTER 14
  id: totrans-3190
  prefs: []
  type: TYPE_NORMAL
  zh: 第14章
- en: GENERATIVE MODELING OF MUSIC
  id: totrans-3191
  prefs: []
  type: TYPE_NORMAL
  zh: 音乐的生成建模
- en: '117'
  id: totrans-3192
  prefs: []
  type: TYPE_NORMAL
  zh: '117'
- en: test1 = test_seq;
  id: totrans-3193
  prefs: []
  type: TYPE_NORMAL
  zh: test1 = test_seq;
- en: '118'
  id: totrans-3194
  prefs: []
  type: TYPE_NORMAL
  zh: '118'
- en: '% seed size'
  id: totrans-3195
  prefs: []
  type: TYPE_NORMAL
  zh: '% 种子大小'
- en: '119'
  id: totrans-3196
  prefs: []
  type: TYPE_NORMAL
  zh: '119'
- en: hs = **ceil**(**length**(test1)/2);
  id: totrans-3197
  prefs: []
  type: TYPE_NORMAL
  zh: hs = **ceil**(**length**(test1)/2);
- en: '120'
  id: totrans-3198
  prefs: []
  type: TYPE_NORMAL
  zh: '120'
- en: '% set amount you want to generate'
  id: totrans-3199
  prefs: []
  type: TYPE_NORMAL
  zh: '% 设置要生成的数量'
- en: '121'
  id: totrans-3200
  prefs: []
  type: TYPE_NORMAL
  zh: '121'
- en: num_test = gen_amt*hs;
  id: totrans-3201
  prefs: []
  type: TYPE_NORMAL
  zh: num_test = gen_amt*hs;
- en: '122'
  id: totrans-3202
  prefs: []
  type: TYPE_NORMAL
  zh: '122'
- en: '**for** i = 1:num_test'
  id: totrans-3203
  prefs: []
  type: TYPE_NORMAL
  zh: '**for** i = 1:num_test'
- en: '123'
  id: totrans-3204
  prefs: []
  type: TYPE_NORMAL
  zh: '123'
- en: '**if** i == 1'
  id: totrans-3205
  prefs: []
  type: TYPE_NORMAL
  zh: '**if** i == 1'
- en: '124'
  id: totrans-3206
  prefs: []
  type: TYPE_NORMAL
  zh: '124'
- en: '% use first half of song for the first prediction'
  id: totrans-3207
  prefs: []
  type: TYPE_NORMAL
  zh: '% 使用歌曲的前半部分进行第一次预测'
- en: '125'
  id: totrans-3208
  prefs: []
  type: TYPE_NORMAL
  zh: '125'
- en: history = test1(:,1:hs);
  id: totrans-3209
  prefs: []
  type: TYPE_NORMAL
  zh: history = test1(:,1:hs);
- en: '126'
  id: totrans-3210
  prefs: []
  type: TYPE_NORMAL
  zh: '126'
- en: '% to see what happens if only first event of seed provided'
  id: totrans-3211
  prefs: []
  type: TYPE_NORMAL
  zh: '% 查看如果只提供种子事件的第一事件会发生什么'
- en: '127'
  id: totrans-3212
  prefs: []
  type: TYPE_NORMAL
  zh: '127'
- en: '%history = test1(:,1);'
  id: totrans-3213
  prefs: []
  type: TYPE_NORMAL
  zh: '% history = test1(:,1);'
