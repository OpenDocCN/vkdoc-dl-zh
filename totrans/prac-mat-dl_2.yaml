- en: CHAPTER 12
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 第12章
- en: ORBIT DETERMINATION
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 轨道确定
- en: '**12.3**'
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: '**12.3**'
- en: '**Training and Testing**'
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: '**训练和测试**'
- en: '**12.3.1 Problem**'
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: '**12.3.1 问题**'
- en: We want to build a deep learning system to compute the eccentricity and semi-major
    axis for an orbit from angle measurements. The argument of perigee will be assumed
    to be zero.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望构建一个深度学习系统，从角度测量中计算轨道的偏心率和半长轴。近地点的经度将被假定为零。
- en: '**12.3.2 Solution**'
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: '**12.3.2 解决方案**'
- en: The orbit history is a time series of angles. We will take angles at uniform
    time intervals. We will use fitnet to fit the data, which creates a function-fitting
    neural network with a specified hidden layer size and training function.
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 轨道历史是一系列角度的时间序列。我们将以均匀的时间间隔取角度。我们将使用fitnet来拟合数据，这会创建一个具有指定隐藏层大小和训练函数的函数拟合神经网络。
- en: '**12.3.3 How It Works**'
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: '**12.3.3 它是如何工作的**'
- en: We load in the data from the mat-file and separate it into training and testing
    sets.
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从mat文件中加载数据并将其分为训练集和测试集。
- en: '***OrbitNeuralNet.m***'
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: '***OrbitNeuralNet.m***'
- en: '1'
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: '1'
- en: '%% Train and test the Orbit Neural Net'
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: '%% 训练和测试轨道神经网络'
- en: '4'
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: '4'
- en: '5'
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: '5'
- en: s
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: s
- en: = **load**('OrbitData');
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: = **加载**('OrbitData');
- en: '6'
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: '6'
- en: n
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: n
- en: = **length**(s.data);
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: = **长度***(s.data);
- en: '7'
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: '7'
- en: nTrain
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: nTrain
- en: = **floor**(0.9*n);
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: = **向下取整***(0.9*n);
- en: '8'
  id: totrans-308
  prefs: []
