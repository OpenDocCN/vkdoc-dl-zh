  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '9'
- en: d.a
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: d.a
- en: = [0;0];
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: = [0;0];
- en: '% Perturbing acceleration'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: '% 扰动加速度'
- en: '10'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: '10'
- en: '11'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: '11'
- en: '% Random elements'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: '% 随机元素'
- en: '12'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: '12'
- en: e
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: e
- en: = 0.6***rand**(1,nEl);
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: = 0.6***rand**(1,nEl);
- en: '% Eccentricity'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: '% 偏心率'
- en: '13'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: '13'
- en: a
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: a
- en: = 8000 + 1000***randn**(1,nEl); % Semi-major axis
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: = 8000 + 1000***randn**(1,nEl); % 半长轴
- en: '14'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: '14'
- en: M
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: M
- en: = 0.25***pi*****rand**(1,nEl);
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: = 0.25***pi*****rand**(1,nEl);
- en: '% Mean anomaly'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: '% 平均经度'
- en: The next section runs the simulations and saves the angles. Each simulation
    has 2000 steps, and each step is two seconds. We are only using one in ten points
    for the orbit determination.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个部分运行模拟并保存角度。每个模拟有2000步，每步两秒。我们只使用每十个点中的一个来进行轨道确定。
- en: We save the orbital elements for testing the neural network. We are not applying
    any external acceleration. We could have used Kepler propagation, but by simulating
    the orbit, we have the option of studying how well the neural network performs
    with disturbances.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 我们保存轨道元素以测试神经网络。我们没有应用任何外部加速度。我们本可以使用开普勒传播，但通过模拟轨道，我们有研究神经网络在扰动下表现如何的选项。
- en: '16'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: '16'
- en: '% Set up the simulation'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: '% 设置模拟'
