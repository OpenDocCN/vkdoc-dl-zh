  type: TYPE_NORMAL
- en: GENERATIVE MODELING OF MUSIC
  prefs: []
  type: TYPE_NORMAL
- en: '***Data preprocessing functions***'
  prefs: []
  type: TYPE_NORMAL
- en: '160'
  prefs: []
  type: TYPE_NORMAL
- en: '% converts each sequence to input (x) and output (y) for our next step 161'
  prefs: []
  type: TYPE_NORMAL
- en: '% prediction objective. output is input shifted forward by 1\.'
  prefs: []
  type: TYPE_NORMAL
- en: '162'
  prefs: []
  type: TYPE_NORMAL
- en: '**function** [x, y]= get_xy(seqs)'
  prefs: []
  type: TYPE_NORMAL
- en: '163'
  prefs: []
  type: TYPE_NORMAL
- en: x = **cell**(**length**(seqs),1);
  prefs: []
  type: TYPE_NORMAL
- en: '164'
  prefs: []
  type: TYPE_NORMAL
- en: y = **cell**(**length**(seqs),1);
  prefs: []
  type: TYPE_NORMAL
- en: '165'
  prefs: []
  type: TYPE_NORMAL
- en: '**for** i = 1:**length**(seqs)'
  prefs: []
  type: TYPE_NORMAL
- en: '166'
  prefs: []
  type: TYPE_NORMAL
- en: x{i} = seqs{i}(1:**end**-1,:);
  prefs: []
  type: TYPE_NORMAL
- en: '167'
  prefs: []
  type: TYPE_NORMAL
- en: y{i} = seqs{i}(2:**end**,:);
  prefs: []
  type: TYPE_NORMAL
- en: '168'
  prefs: []
  type: TYPE_NORMAL
- en: '**end**'
  prefs: []
  type: TYPE_NORMAL
- en: '169'
  prefs: []
  type: TYPE_NORMAL
- en: x = cellfun(@transpose,x,'UniformOutput',false);
  prefs: []
  type: TYPE_NORMAL
- en: '170'
  prefs: []
  type: TYPE_NORMAL
- en: y = cellfun(@transpose,y,'UniformOutput',false);
  prefs: []
  type: TYPE_NORMAL
- en: '171'
  prefs: []
  type: TYPE_NORMAL
- en: '**end**'
  prefs: []
  type: TYPE_NORMAL
- en: '172'
  prefs: []
  type: TYPE_NORMAL
- en: '173'
  prefs: []
  type: TYPE_NORMAL
- en: '% creates a label for a given pitch and duration combination'
  prefs: []
  type: TYPE_NORMAL
- en: '174'
  prefs: []
  type: TYPE_NORMAL
- en: '% i = pitch index --> i = 1:length(pitch_labels)'
  prefs: []
  type: TYPE_NORMAL
- en: '175'
  prefs: []
  type: TYPE_NORMAL
- en: '% j = duration index --> j = 1:length(dur_labels)'
  prefs: []
  type: TYPE_NORMAL
- en: '176'
  prefs: []
  type: TYPE_NORMAL
- en: '% dl = number of possible durations = length(dur_labels)'
  prefs: []
  type: TYPE_NORMAL
- en: '177'
  prefs: []
  type: TYPE_NORMAL
- en: '% label for i,j combination = (i-1)*length(dur_labels) + j'
  prefs: []
  type: TYPE_NORMAL
- en: '178'
  prefs: []
  type: TYPE_NORMAL
- en: '**function** label = encode_pd(i,j, dl)'
  prefs: []
  type: TYPE_NORMAL
- en: '179'
  prefs: []
  type: TYPE_NORMAL
- en: label = (i-1)*dl + j;
  prefs: []
  type: TYPE_NORMAL
- en: '180'
  prefs: []
  type: TYPE_NORMAL
- en: '**end**'
  prefs: []
  type: TYPE_NORMAL
- en: '181'
  prefs: []
  type: TYPE_NORMAL
- en: '182'
  prefs: []
  type: TYPE_NORMAL
- en: '% reverses encode_pd to get pitch and duration from the label'
  prefs: []
  type: TYPE_NORMAL
- en: '183'
  prefs: []
  type: TYPE_NORMAL
- en: '% note that label is a vector here (from the model output)'
  prefs: []
  type: TYPE_NORMAL
- en: '184'
  prefs: []
  type: TYPE_NORMAL
- en: '% pitches = possible pitches'
  prefs: []
  type: TYPE_NORMAL
- en: '185'
  prefs: []
  type: TYPE_NORMAL
- en: '% durations = possible durations'
  prefs: []
  type: TYPE_NORMAL
- en: '186'
  prefs: []
  type: TYPE_NORMAL
- en: '**function** [pitch,duration] = decode_label(label, pitches, durations) 187'
  prefs: []
  type: TYPE_NORMAL
- en: dl = **length**(durations);
  prefs: []
  type: TYPE_NORMAL
- en: '188'
  prefs: []
  type: TYPE_NORMAL
- en: j = mod(label, dl);
  prefs: []
  type: TYPE_NORMAL
- en: '189'
  prefs: []
  type: TYPE_NORMAL
- en: '% if j = dl, label = i*dl, so label%dl = 0\.'
  prefs: []
  type: TYPE_NORMAL
- en: '190'
  prefs: []
  type: TYPE_NORMAL
- en: '% For our math to work out, we want j = dl in this case, not 0\.'
  prefs: []
  type: TYPE_NORMAL
- en: '191'
  prefs: []
  type: TYPE_NORMAL
- en: '% so set all entries p where the j(p) = 0 to dl.'
  prefs: []
  type: TYPE_NORMAL
- en: '192'
  prefs: []
  type: TYPE_NORMAL
- en: '% since matlab indexing starts at 1, we don''t have to worry about 193'
  prefs: []
  type: TYPE_NORMAL
- en: '% a case where j actually equals 0\.'
  prefs: []
  type: TYPE_NORMAL
- en: '194'
  prefs: []
  type: TYPE_NORMAL
- en: j(**find**(j == 0)) = dl;
  prefs: []
  type: TYPE_NORMAL
- en: '195'
  prefs: []
  type: TYPE_NORMAL
- en: i = (label - j + dl)/dl;
  prefs: []
  type: TYPE_NORMAL
- en: '196'
  prefs: []
  type: TYPE_NORMAL
- en: pitch = pitches(i);
  prefs: []
  type: TYPE_NORMAL
- en: '197'
  prefs: []
  type: TYPE_NORMAL
- en: duration = durations(j);
  prefs: []
  type: TYPE_NORMAL
- en: '198'
  prefs: []
  type: TYPE_NORMAL
- en: '**end**'
  prefs: []
  type: TYPE_NORMAL
- en: '***Function for saving generated music to be later visualized or played in
    an application like Apple’s***'
