  prefs: []
  type: TYPE_NORMAL
- en: This particular set of layers is to show you how to build a neural network.
    It is by no means the “best” architecture for this problem. We did try a single
    LSTM layer but found that a single BiLSTM layer worked better.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [12.9](#p261) shows the test results. The results are not quite as good
    as the feedforward nets given earlier. We’ve only used two layers. From Chapter
    11, you see that networks deployed in real applications can have dozens if not
    hundreds of layers. The difference is due to the smaller number of neurons in
    the LSTM. You can experiment with this network to improve the results.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we have compared two approaches to solving the orbit determination
    problem. Using the MATLAB feedforward network worked a bit better than the LSTM
    network that we implemented. We fixed the argument of perigee to make the problem
    easier. The next step would be to try and find the full set of orbital elements
    and then try to design a system that works from a fixed point on the Earth. In
    the latter case, we would need to account for the rotation of the Earth. Another
    improvement would be to take the measurements at different time steps. For an
    elliptical orbit, taking many measurements at perigee is more productive than
    at apogee because the spacecraft is moving faster. One could write a preprocessor
    to select inputs to our neural network based on the angular change with respect
    to time. Orbit determination systems, using algorithmic approaches, can also compute
    errors in the observer’s location. You could also try other measurements, such
    as range and range rate. These measurements are used for deep space and geosynchronous
    spacecraft.
