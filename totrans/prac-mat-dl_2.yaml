- en: '**CHAPTER 13**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Earth Sensors**'
  prefs: []
  type: TYPE_NORMAL
- en: '**13.1**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Introduction**'
  prefs: []
  type: TYPE_NORMAL
- en: Earth sensors were some of the earliest spacecraft sensors. Many early satellites
    were for communications or Earth observations, so the most important thing was
    to point the satellite at the Earth, that is, to null the roll and pitch errors.
    In many cases, the yaw error was not important or could be controlled through
    the momentum of the satellite. Earth sensors were either static, without moving
    parts, or scanning. Scanning was done by rotating the satellite, rotating a mirror
    with a motor, or rotating a mirror with a torsion bar. Most sensors operated in
    the infrared wavelengths because the radiation at those wavelengths was more uniform
    than that in the visible bands and is unaffected by eclipses. Many CubeSats use
    static Earth sensors because they are simple, compact, and inexpensive. A wide
    variety of models are available.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter will look at how neural networks can be used to generate roll and
    pitch angles from any static Earth sensor. Figure [13.1](#p263) shows the attitude
    (also known as orientation) geometry for small angles from ideal Earth pointing.
    Roll is about the x-axis and pitch is about the y-axis.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [13.2](#p263) shows how a static Earth sensor operates. The image on
    the left shows the Earth sensor elements, represented by the circles centered
    on the edge of the Earth. The roll and pitch angles are zero. Each element sees
    part of the Earth and part of space so they all produce the same signal. The picture
    on the right shows the sensor with a roll and pitch angle. Some elements see just
    space, some see just the Earth, and some both the Earth and space, but their output
    will be different from the zero angle cases. By comparing the outputs of the sensors,
    we get a measurement of roll and pitch. The sensors see light in the CO2 band,
    around 14 microns wavelength, so the Earth looks uniform. The elements produce
    a voltage proportional to their temperature.
  prefs: []
  type: TYPE_NORMAL
- en: Static Earth sensors from the 1960s had built-in logic to go from sensor outputs
    to roll and pitch. Given the hardware limitations, the algorithms were quite simple.
    We will develop a neural net that can do this job.
  prefs: []
  type: TYPE_NORMAL
