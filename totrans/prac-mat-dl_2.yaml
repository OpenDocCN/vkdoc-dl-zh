- en: '138'
  id: totrans-3236
  prefs: []
  type: TYPE_NORMAL
  zh: '138'
- en: '[max_v, idx] = **max**(last_preds); % greedy'
  id: totrans-3237
  prefs: []
  type: TYPE_NORMAL
  zh: '[max_v, idx] = **max**(last_preds); % 贪婪'
- en: '139'
  id: totrans-3238
  prefs: []
  type: TYPE_NORMAL
  zh: '139'
- en: last_pred = idx;
  id: totrans-3239
  prefs: []
