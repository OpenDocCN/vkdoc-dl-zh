  id: totrans-3214
  prefs: []
  type: TYPE_NORMAL
  zh: '128'
- en: '**else**'
  id: totrans-3215
  prefs: []
  type: TYPE_NORMAL
  zh: '**else**'
- en: '129'
  id: totrans-3216
  prefs: []
  type: TYPE_NORMAL
  zh: '129'
- en: '% concatenate past history with last prediction to continue'
  id: totrans-3217
  prefs: []
  type: TYPE_NORMAL
  zh: '% 将过去的历史与最后一次预测连接以继续'
- en: '130'
  id: totrans-3218
  prefs: []
  type: TYPE_NORMAL
  zh: '130'
- en: '% generating'
  id: totrans-3219
  prefs: []
  type: TYPE_NORMAL
  zh: '% 生成'
- en: '131'
  id: totrans-3220
  prefs: []
  type: TYPE_NORMAL
  zh: '131'
- en: history = [history, last_pred];
  id: totrans-3221
  prefs: []
  type: TYPE_NORMAL
