- en: GENERATIVE MODELING OF MUSIC
  id: totrans-2720
  prefs: []
  type: TYPE_NORMAL
  zh: 音乐生成建模
- en: '**Figure 14.1:** *Here is an illustration of the training and testing regimes
    for a recurrent neural network* *in our time series modeling problem formulation.
    On the left, we have an input [xt* 1 *, xt* 2 *,xt* 3 *], which we* *pass in one
    at a time. You can imagine that there is a* + *between each t and the subsequent
    number (e.g.,* *read t* 1 *as t* + 1 *), but we have omitted these for a cleaner
    figure. At each time step ti, the model makes* *a prediction pt*( *i*+1) *and
    updates its hidden state (the horizontal arrows). Upon moving to the next time*
    *step during training, the true value that the model was trying to predict is
    given to the model as input* *(xt* 2 *, followed by xt* 3 *in this case). In testing,
    on the right, however, the model uses its own predictions* *as inputs after being
    given xt* 1 *. This is the “generative” mode of the model, in which it can continue*
    *predicting indefinitely.*'
  id: totrans-2721
  prefs: []
  type: TYPE_NORMAL
  zh: '**图 14.1：** *这是对我们时间序列建模问题公式中循环神经网络训练和测试阶段的说明。在左侧，我们有一个输入 [xt* 1 *, xt* 2 *,xt*
    3 *]，我们一次传递一个。你可以想象在每个 t 和后续数字之间有一个 +，例如，*读 t* 1 *为 t* + 1 *），但我们省略了这些以使图更清晰。在每个时间步
    ti，模型做出* *a prediction pt*( *i*+1) *并更新其隐藏状态（水平箭头）。在训练过程中移动到下一个时间步时，模型试图预测的真实值作为输入提供给模型（在这种情况下，xt*
    2 *，然后是 xt* 3 *）。然而，在测试中，在右侧，模型在给出 xt* 1 *后使用自己的预测作为输入。这是模型的“生成”模式，其中它可以无限地* *预测*。'
- en: One benefit of these kinds of models is that training them is straightforward.
    In the typical case, where your goal is just to predict the next time step, your
    training inputs would be a set of sequences, and your outputs would be these same
    sequences shifted forward by one. This means that the true output at time *t*
    would be *xt*+1, and at *t* + 1 the true output would be *xt*+2, and so on. In
    fact, this is exactly how you would format your data if you were to use a TCN
    or a transformer as your model. In the case of recurrent architectures like the
    LSTM, the model only receives one time step at a time, but still “implicitly”
    utilizes previous inputs as discussed earlier. For these architectures, the output
    would also be the input shifted forward by one.
  id: totrans-2722
  prefs: []
  type: TYPE_NORMAL
  zh: 这些模型的一个好处是训练它们很简单。在典型情况下，如果你的目标只是预测下一个时间步，你的训练输入将是一组序列，你的输出将是这些相同的序列向前移动一个。这意味着在时间
    *t* 的真实输出将是 *xt*+1，在 *t* + 1 的真实输出将是 *xt*+2，依此类推。实际上，这正是如果你使用 TCN 或 transformer
    作为模型时如何格式化你的数据。在 LSTM 等循环架构的情况下，模型一次只接收一个时间步，但仍然“隐式”地利用前面讨论过的先前输入。对于这些架构，输出也将是向前移动一个的输入。
- en: A second advantage is that this formulation allows unlimited generation. In
    “testing,” you provide the model with an input, either a musical sequence or some
    form of “start” token, and the model makes predictions using this input until
    it reaches the input’s end. At this point, the model takes its own predictions
    as subsequent inputs. As each prediction generates a new input, the model can
    continue to generate indefinitely. This is visualized in Figure [14.1](#p281).
  id: totrans-2723
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个优点是这种公式允许无限生成。在“测试”中，你向模型提供一个输入，无论是音乐序列还是某种形式的“开始”标记，然后模型使用这个输入进行预测，直到达到输入的末尾。在这个时候，模型将它的预测作为后续输入。随着每个预测生成一个新的输入，模型可以无限地继续生成。这如图
    [14.1](#p281) 所示。
- en: '**14.4**'
  id: totrans-2724
  prefs: []
  type: TYPE_NORMAL
  zh: '**14.4**'
- en: '**Solution**'
  id: totrans-2725
  prefs: []
  type: TYPE_NORMAL
  zh: '**解决方案**'
- en: We start by simplifying the problem. Music is a very complex domain, with each
    note carrying a complex set of features including pitch, volume, timbre, onset,
    duration, and so on. All of these features are captured in raw audio recordings
    of music. Unfortunately, raw audio can also include extraneous information like
    nonmusical sounds and noise from a variety of sources. In general, this means
    that models trained on raw audio require much more data and computational resources
    to help them learn to distinguish between relevant and irrelevant information
    in a 271
  id: totrans-2726
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先简化问题。音乐是一个非常复杂的领域，每个音符都携带着一组复杂的特征，包括音高、音量、音色、起始、持续时间等等。所有这些特征都包含在音乐的原始音频录音中。不幸的是，原始音频也可能包含来自各种来源的非音乐声音和噪音等无关信息。一般来说，这意味着在原始音频上训练的模型需要更多的数据和计算资源来帮助它们学会区分相关信息和无关信息。在
    271
- en: '![](index-282_1.png)'
  id: totrans-2727
  prefs: []
  type: TYPE_IMG
  zh: '![图片](index-282_1.png)'
- en: '![](index-282_2.png)'
  id: totrans-2728
  prefs: []
  type: TYPE_IMG
  zh: '![图片](index-282_2.png)'
- en: CHAPTER 14
  id: totrans-2729
  prefs: []
  type: TYPE_NORMAL
  zh: '**第 14 章**'
- en: GENERATIVE MODELING OF MUSIC
  id: totrans-2730
  prefs: []
  type: TYPE_NORMAL
  zh: 音乐的生成建模
- en: reasonable timeframe. There are approaches to train models with raw audio to
    generate music, which we will discuss later in Section [14.6](#p293), but due
    to the challenges associated with using it, we opt to use MIDI data instead. MIDI
    is a data format intended for electronic music notation and can be used by a variety
    of music applications like GarageBand. Our MIDI dataset consists of 100 Bach chorales
    derived from [10]. Each chorale originally had four voices, but only the soprano
    voice is used here. MIDI data keeps track of a number of musical variables, but
    for simplicity, we will focus on predicting note pitch and duration. The collection
    of these variables therefore constitutes our previously defined musical “event.”
  id: totrans-2731
  prefs: []
  type: TYPE_NORMAL
  zh: 合理的时间范围。有使用原始音频训练模型以生成音乐的方法，我们将在第 [14.6](#p293) 节中稍后讨论，但由于使用它所面临的挑战，我们选择使用 MIDI
    数据。MIDI 是一种旨在用于电子音乐记谱的数据格式，可以被各种音乐应用程序如 GarageBand 使用。我们的 MIDI 数据集由 100 首巴赫合唱曲组成，这些合唱曲来源于
    [10]。每首合唱曲原本有四个声部，但这里只使用了女高音声部。MIDI 数据记录了许多音乐变量，但为了简单起见，我们将专注于预测音符音高和持续时间。这些变量的集合因此构成了我们之前定义的音乐“事件”。
- en: A prediction of note onset is also possible, but for simplicity, each generated
    note will be treated as if it were played immediately after the end of the preceding
    note. We leave it as an exercise to the reader to additionally predict onset to
    allow for overlapping notes and spaces where no note is played (rests).
  id: totrans-2732
  prefs: []
  type: TYPE_NORMAL
  zh: 也可以预测音符的开始，但为了简单起见，每个生成的音符将被视为在先前的音符结束后立即演奏。我们将预测开始作为读者的练习，以允许重叠的音符和没有音符演奏的空间（休止符）。
- en: For the deep learning (DL) model, we chose a Long Short-Term Memory (LSTM) network
    with fully connected hidden and output layers. A diagram of an LSTM cell can be
    seen in Figure [14.2\.](#p283) We chose an LSTM as it is a sequence model and
    is therefore suited to our formulation of this problem as a time series modeling
    task. The LSTM is also a well-studied model and is already implemented as a layer
    in MATLAB, making it more straightforward to implement than other sequence models.
    Finally, the LSTM has the ability to choose what aspects of its input to remember
    and what to forget, which in theory allows it to keep track of long-range musical
    features from chord progressions to melodies.
  id: totrans-2733
  prefs: []
  type: TYPE_NORMAL
  zh: 对于深度学习 (DL) 模型，我们选择了一个具有全连接隐藏和输出层的长短期记忆 (LSTM) 网络。LSTM 细胞的图示可以在图 [14.2\.](#p283)
    中看到。我们选择 LSTM 是因为它是一个序列模型，因此适合我们将此问题作为时间序列建模任务的形式化。LSTM 也是一个经过充分研究的模型，并且已经作为 MATLAB
    中的一个层实现，这使得它比其他序列模型更容易实现。最后，LSTM 有能力选择记住其输入的哪些方面以及忘记哪些方面，在理论上允许它跟踪从和弦进行到旋律的长期音乐特征。
- en: Like a vanilla RNN, which can also be seen in Figure [14.2](#p283), the LSTM
    has a hidden state, which allows it to propagate information forward for future
    computation. However, as RNNs struggle with handling tasks where temporally distant
    information must be recalled, the LSTM
  id: totrans-2734
  prefs: []
  type: TYPE_NORMAL
  zh: 与 vanilla RNN 类似，这也可以在图 [14.2](#p283) 中看到，LSTM 有一个隐藏状态，这使得它能够为未来的计算传播信息。然而，由于
    RNN 在处理需要回忆时间上遥远信息的任务时存在困难，LSTM
- en: augments this short-term memory with the long-term memory of a cell state. The
    cell state is generated by combining current information from the input with past
    information from the model’s previous hidden and cell states. Including the model’s
    input in the cell state computation allows the model to store information from
    its inputs, while including the previous states allows past information to be
    propagated forward. In other words, an LSTM could, in theory, recall its first
    input, regardless of how many inputs it has seen since.
  id: totrans-2735
  prefs: []
  type: TYPE_NORMAL
  zh: 通过细胞状态的长期记忆来增强这种短期记忆。细胞状态是通过将输入的当前信息与模型先前隐藏和细胞状态中的过去信息相结合而生成的。将模型的输入包含在细胞状态的计算中允许模型存储其输入的信息，而包含先前状态则允许过去信息向前传播。换句话说，LSTM
    在理论上可以回忆其第一个输入，无论它已经看到了多少输入。
- en: The main factor that differentiates the cell state from the RNN’s hidden state
    is the LSTM’s use of “gates” to determine what information is passed forward to
    compute the next cell state.
  id: totrans-2736
  prefs: []
  type: TYPE_NORMAL
  zh: 区分细胞状态和 RNN 隐藏状态的主要因素是 LSTM 使用“门”来确定传递给计算下一个细胞状态的信息。
- en: The actual gating is carried out by multiplying the gate’s input with a set
    of weights and out-putting the result. For example, in the “Forget” gate, values
    in the past cell state that the gate decides to transmit are multiplied by weights
    that are close to one, whereas values that it decides to forget are multiplied
    by weights that are close to zero. These weights are generated by multiplying
    what we call a “gate keeper” vector with the gate’s weight matrix and passing
    this output through an activation function that maps it to a value within a particular
    range. One of the most common choices for this activation function, and the one
    used in the “Forget” gate, is the sigmoid, which will map the output to a value
    between zero and one. In the case of the
  id: totrans-2737
  prefs: []
  type: TYPE_NORMAL
  zh: 实际的闸控是通过将闸门的输入与一组权重相乘并输出结果来实现的。例如，在“忘记”闸门中，闸门决定传输的过去细胞状态中的值会乘以接近一的权重，而决定忘记的值会乘以接近零的权重。这些权重是通过将我们称之为“闸门守护者”的向量与闸门的权重矩阵相乘并传递通过一个将输出映射到特定范围内的值的激活函数来生成的。这个激活函数最常见的选择，也是“忘记”闸门中使用的，是Sigmoid函数，它将输出映射到零和一之间的值。在这种情况下，
- en: “Forget” gate, the gate keeper is the concatenation of the input with the past
    hidden state. The gate’s weight matrix is learned during model training.
  id: totrans-2738
  prefs: []
  type: TYPE_NORMAL
  zh: “忘记”闸门中，闸门守护者是输入与过去隐藏状态的连接。闸门的权重矩阵是在模型训练期间学习的。
- en: '272'
  id: totrans-2739
  prefs: []
  type: TYPE_NORMAL
  zh: '272'
