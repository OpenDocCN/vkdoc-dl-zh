- en: CHAPTER 12
  id: totrans-714
  prefs: []
  type: TYPE_NORMAL
  zh: '**第12章**'
- en: ORBIT DETERMINATION
  id: totrans-715
  prefs: []
  type: TYPE_NORMAL
  zh: 轨道确定
- en: Both the feedforward network and cascade-forward network produce negative eccentricities
    when the true eccentricities are near zero.
  id: totrans-716
  prefs: []
  type: TYPE_NORMAL
  zh: 当真实偏心率接近零时，前馈网络和级联前馈网络都会产生负偏心率。
- en: '**12.4**'
  id: totrans-717
  prefs: []
  type: TYPE_NORMAL
  zh: '**12.4**'
- en: '**Implementing an LSTM**'
  id: totrans-718
  prefs: []
  type: TYPE_NORMAL
  zh: '**实现LSTM**'
- en: '**12.4.1 Problem**'
  id: totrans-719
  prefs: []
  type: TYPE_NORMAL
  zh: '**12.4.1 问题**'
- en: We want to build a Long Short-Term Memory neural net (LSTM) to estimate the
    orbital elements. LSTMs have been demonstrated in previous chapters. An LSTM can
    learn from sequences of measurements, which should be advantageous in orbit determination.
    They are an alternative to the functions shown earlier.
  id: totrans-720
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望构建一个长短期记忆神经网络（LSTM）来估计轨道元素。LSTM在之前的章节中已经演示过。LSTM可以从测量序列中学习，这应该有利于轨道确定。它们是之前显示的函数的替代方案。
- en: '**12.4.2 Solution**'
  id: totrans-721
  prefs: []
  type: TYPE_NORMAL
  zh: '**12.4.2 解决方案**'
- en: The orbit history is a time series of angles. We will use a bidirectional LSTM
    to fit the data. We will take angles at uniform time intervals.
  id: totrans-722
  prefs: []
  type: TYPE_NORMAL
  zh: 轨道历史是角度的时间序列。我们将使用双向LSTM来拟合数据。我们将以均匀的时间间隔取角度。
- en: '**12.4.3 How It Works**'
  id: totrans-723
  prefs: []
  type: TYPE_NORMAL
  zh: '**12.4.3 如何工作**'
- en: The script is OrbitLSTM.m. We load in the data from the mat-file and separate
    it into training and testing sets. The data format is different from the feedforward
    networks. xTrain is a cell array, but yTrain is a matrix with a row for each cell
    array in xTrain.
  id: totrans-724
  prefs: []
  type: TYPE_NORMAL
  zh: 脚本是OrbitLSTM.m。我们从mat文件中加载数据，并将其分为训练集和测试集。数据格式与前馈网络不同。xTrain是一个单元数组，但yTrain是一个矩阵，其中每一行对应于xTrain中的每个单元数组。
