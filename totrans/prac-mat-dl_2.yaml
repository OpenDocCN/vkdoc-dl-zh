- en: '***RHSOrbit.m***'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '***RHSOrbit.m***'
- en: '16'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '16'
- en: '**function** xDot = RHSOrbit(˜,x,d)'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '**函数** xDot = RHSOrbit(˜,x,d)'
- en: '17'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '17'
- en: '18'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
