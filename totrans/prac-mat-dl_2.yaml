- en: The code transforms the Earth’s location into the focal plane of the sensor.
    It assumes a pinhole camera. The code takes an input attitude quaternion and converts
    it into locations of the sensor elements. A quaternion is a four-element set that
    defines the orientation of one frame of reference with respect to another frame
    of reference. Quaternions are just one way of representing orientation. Three-by-three
    (3 *×* 3) rotation matrices and Euler angles are other ways to represent attitude.
    Chapter 7 gives additional information on quaternions.
  prefs: []
