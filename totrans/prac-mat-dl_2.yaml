- en: CHAPTER 14
  id: totrans-2808
  prefs: []
  type: TYPE_NORMAL
  zh: 第14章
- en: GENERATIVE MODELING OF MUSIC
  id: totrans-2809
  prefs: []
  type: TYPE_NORMAL
  zh: 音乐的生成建模
- en: the single-output model here as it is still effective in our simplified problem
    and is easier to implement in MATLAB.
  id: totrans-2810
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里作为单输出模型，因为它在我们的简化问题中仍然有效，并且在MATLAB中更容易实现。
- en: Finally, we would like to note that the output size is inherently arbitrary.
    Duration and pitch are both actually continuous variables that we have discretized
    in order to format our problem as classification. It should be noted that these
    assumptions are not unreasonable when handling classical music. In classical music,
    there is a fixed set of pitches that can be realized (A, Bb, C,
  id: totrans-2811
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们想指出，输出大小是固有的任意性。时长和音高实际上都是连续变量，我们为了将问题格式化为分类而将其离散化。应注意的是，当处理古典音乐时，这些假设是合理的。在古典音乐中，有一组可以实现的固定音高（A，Bb，C，等等）。
- en: . . . ), and durations generally correspond to a fixed set = *{* 16 *th,* 8
    *th, quarter . . .}*. There are of course exceptions to these rules, and we leave
    the construction of a model that accounts for these exceptions as an exercise
    to the reader. We further restrict the possible pitches and durations to those
    found in the training set. However, we do not restrict the possible *combinations*
    of pitches and durations to those in the training set, as can be seen in line
    53 of the code.
  id: totrans-2812
  prefs: []
  type: TYPE_NORMAL
  zh: . . . ，并且时长通常对应于固定的集合 = *{* 16 *th,* 8 *th, quarter . . .*}。当然，这些规则有例外，我们将构建一个考虑这些例外的模型的任务留给读者。我们进一步限制可能的音高和时长为训练集中找到的音高和时长。然而，我们并不限制音高和时长的可能
    *组合* 为训练集中的组合，如代码第53行所示。
- en: The code that follows comes from Music LSTM.m. It constructs and trains the
    single-output LSTM for music generation. It then generates music using training
    set examples as starting seeds.
  id: totrans-2813
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的代码来自Music LSTM.m。它构建并训练用于音乐生成的单输出LSTM。然后使用训练集示例作为起始种子生成音乐。
