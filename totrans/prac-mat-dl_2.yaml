  type: TYPE_NORMAL
- en: EARTH SENSORS
  prefs: []
  type: TYPE_NORMAL
- en: The remaining code creates the training data by inputting different roll and
    pitch angles and saving the resulting sensor element values in y. The second part
    trains the feedforward neural network. You first create the neural network data
    structure. You then configure it by passing it the inputs and outputs. train trains
    the network. sim simulates the neural network. The variable net is updated with
    each function call.
  prefs: []
  type: TYPE_NORMAL
- en: '***NNEarthSensor.m***'
  prefs: []
  type: TYPE_NORMAL
- en: '40'
  prefs: []
  type: TYPE_NORMAL
- en: '% Neural net training'
  prefs: []
  type: TYPE_NORMAL
- en: '41'
  prefs: []
  type: TYPE_NORMAL
- en: net = feedforwardnet(20); % Geneate the neural net structure
  prefs: []
  type: TYPE_NORMAL
- en: '42'
  prefs: []
  type: TYPE_NORMAL
- en: net = configure( net, y, x ); % Configure based on inputs and outputs 43
  prefs: []
  type: TYPE_NORMAL
- en: '44'
  prefs: []
  type: TYPE_NORMAL
- en: net.layers{1}.transferFcn = 'poslin'; % Set as purelin
  prefs: []
  type: TYPE_NORMAL
- en: '45'
  prefs: []
  type: TYPE_NORMAL
- en: net.name
  prefs: []
  type: TYPE_NORMAL
- en: = 'Earth Sensor';
  prefs: []
  type: TYPE_NORMAL
- en: '46'
  prefs: []
  type: TYPE_NORMAL
- en: net
  prefs: []
  type: TYPE_NORMAL
- en: = train(net,y,x); % Train the network
  prefs: []
  type: TYPE_NORMAL
- en: '47'
  prefs: []
  type: TYPE_NORMAL
- en: c
  prefs: []
  type: TYPE_NORMAL
- en: = sim(net,y); % Simulate the neural network
  prefs: []
  type: TYPE_NORMAL
- en: The next few lines plot the inputs and simulation outputs.
  prefs: []
  type: TYPE_NORMAL
