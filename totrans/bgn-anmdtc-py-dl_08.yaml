- en: Once the model is trained, you can predict a test dataset that is split into
    subsequences of the same length (`time_steps`) as the training datasets. Once
    this is done, you can then compute the root mean square error (RMSE).
  prefs: []
  type: TYPE_NORMAL
- en: Figure [8-32](#Fig37) shows the code to predict on the testing dataset.
