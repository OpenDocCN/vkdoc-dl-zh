- en: 'As shown above, you used an LSTM layer. Let’s look at the details of the LSTM
    layer function with all the possible parameters (source: [https://​www.​tensorflow.​org/​api_​docs/​python/​tf/​keras/​layers/​LSTM](https://www.tensorflow.org/api_docs/python/tf/keras/layers/LSTM)):'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'The following is a summary of the arguments:'
  prefs: []
  type: TYPE_NORMAL
- en: '`units`: Positive integer, dimensionality of the output space.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`activation`: Activation function to use. Default: hyperbolic tangent (`tanh`).
    If you pass `None`, no activation is applied (i.e., “linear” activation: `a(x)
    = x`).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`recurrent_activation`: Activation function to use for the recurrent step.
    Default: sigmoid (`sigmoid`). If you pass `None`, no activation is applied (i.e.,
    “linear” activation: `a(x) = x`).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`use_bias`: Boolean (default `True`), whether the layer uses a bias vector.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`kernel_initializer`: Initializer for the `kernel` weights matrix, used for
    the linear transformation of the inputs. Default: `glorot_uniform`.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`recurrent_initializer`: Initializer for the `recurrent_kernel` weights matrix,
    used for the linear transformation of the recurrent state. Default: `orthogonal`.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`bias_initializer`: Initializer for the bias vector. Default: `zeros`.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`unit_forget_bias`: Boolean (default `True`). If `True`, add `1` to the bias
    of the forget gate at initialization. Setting it to `True` also forces `bias_initializer="zeros"`.
    This is recommended in Jozefowicz et al.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`kernel_regularizer`: Regularizer function applied to the `kernel` weights
    matrix. Default: `None`.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`recurrent_regularizer`: Regularizer function applied to the `recurrent_kernel`
    weights matrix. Default: `None`.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`bias_regularizer`: Regularizer function applied to the bias vector. Default:
    `None`.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`activity_regularizer`: Regularizer function applied to the output of the layer
    (its “activation”). Default: `None`.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`kernel_constraint`: Constraint function applied to the `kernel` weights matrix.
    Default: `None`.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`recurrent_constraint`: Constraint function applied to the `recurrent_kernel`
    weights matrix. Default: `None`.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`bias_constraint`: Constraint function applied to the bias vector. Default:
    `None`.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`dropout`: Float between `0` and `1`. Fraction of the units to drop for the
    linear transformation of the inputs. Default: `0`.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`recurrent_dropout`: Float between `0` and `1`. Fraction of the units to drop
    for the linear transformation of the recurrent state. Default: `0`.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`return_sequences`: Boolean. Whether to return the last output in the output
    sequence, or the full sequence. Default: `False`.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`return_state`: Boolean. Whether to return the last state in addition to the
    output. Default: `False`.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`go_backwards`: Boolean (default `False`). If `True`, process the input sequence
    backwards and return the reversed sequence.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`stateful`: Boolean (default `False`). If `True`, the last state for each sample
    at index i in a batch will be used as initial state for the sample of index i
    in the following batch.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`time_major`: The shape format of the `inputs` and `outputs` tensors. If `True`,
    the inputs and outputs will be in shape `[timesteps, batch, feature]`, whereas
    in the `False` case, it will be `[batch, timesteps, feature]`. Using `time_major
    = True` is a bit more efficient because it avoids transposes at the beginning
    and end of the RNN calculation. However, most TensorFlow data is batch-major,
    so by default this function accepts input and emits output in batch-major form.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`unroll`: Boolean (default `False`). If `True`, the network will be unrolled,
    else a symbolic loop will be used. Unrolling can speed-up an RNN, although it
    tends to be more memory-intensive. Unrolling is only suitable for short sequences.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Note that the LSTM call in the code shown in Figure [8-24a](#Fig27) includes
    a parameter `time_steps = 16`. This is the number of steps in the sequence that
    is used in training LSTM. Here, 16 means 8 hours because the data points are 30
    minutes apart. If it were 48, that would be 24 hours. You can try changing this
    to 64 or 128 and see what happens to the output.
  prefs: []
  type: TYPE_NORMAL
- en: 'Figure [8-25](#Fig29) shows the code to split the sequence into a tumbling
    window of subsequences of length 15, with the 16^(th) point serving as the ground
    truth prediction. Note the output shapes: there are 10,305 contiguous 16-length
    windows, and 10,305 corresponding y_actual values that are the 16^(th) element
    of the aforementioned windows. For each window, the first 15 values are taken
    as the x points, with the last 16^(th) value taken as the y point.'
  prefs: []
  type: TYPE_NORMAL
