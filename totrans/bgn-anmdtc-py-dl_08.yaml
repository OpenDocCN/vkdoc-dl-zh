- en: 8. Long Short-Term Memory Models
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, you will learn about recurrent neural networks (RNNs) and long
    short-term memory (LSTM) models. You will also learn how LSTMs work, how they
    can be used to detect anomalies, and how you can implement anomaly detection using
    LSTM. You will work through several datasets depicting time Series of different
    types of data, such as CPU utilization, taxi demand, etc., to illustrate how to
    detect anomalies. This chapter introduces you to many concepts using LSTM so as
    to enable you to explore further using the Jupyter notebooks provided as part
    of the book material.
  prefs: []
  type: TYPE_NORMAL
