  type: TYPE_NORMAL
- en: In all of the examples presented in this section, we use the same notebook but
    switch which dataset we load by using the “i=0” parameter. All hyperparameters
    are kept the same, though you are free to experiment. For each dataset, we will
    build an LSTM model and check whether or not there are anomalies.
