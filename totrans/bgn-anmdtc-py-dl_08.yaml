- en: There are 10,320 data points in the sequence, and your goal is to find anomalies.
    This means you are trying to find out when data points are abnormal. If you can
    predict a data point at time T based on the historical data until T-1, then you
    have a way of looking at an expected value compared to an actual value to see
    if you are within the expected range of values for time T. If you predicted that
    y_pred number of taxis are in demand on January 1, 2015, then you can compare
    this y_pred with the actual y_actual. The difference between y_pred and y_actual
    gives the error, and when you get the errors of all the points in the sequence,
    you end up with a distribution of just errors.
  prefs: []
  type: TYPE_NORMAL
- en: To accomplish this, you will use a sequential model using Keras. The model consists
    of two LSTM layers, with the final LSTM layer being the output layer. The first
    LSTM layer takes as input the time-series data and learns how to learn the values
    with respect to time. The final LSTM layer is the output layer and will take as
    input the previous LSTM layer’s output and transform it into a single prediction
    for the next time step. Then, you apply a sigmoid activation on this LSTM layer
    so that the final output is between 0 and 1.
  prefs: []
  type: TYPE_NORMAL
- en: You also use the Adam optimizer and the mean absolute error as the loss function.
    Figure [8-24a](#Fig27) shows the code to build an LSTM model.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_8_Chapter/483137_2_En_8_Fig27_HTML.png)'
  prefs: []
  type: TYPE_IMG
