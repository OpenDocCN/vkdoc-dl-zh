- en: 12. Noetic ROS Further Examined and Explained
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: We will now further explore the realms of the Robot Operating System (ROS) ecosystem
    to closely examine the capabilities available in Noetic ROS. This chapter covers
    ROS features, utilities, facilities, and tools more deeply and supplements Chapters
    [3](494112_1_En_3_Chapter.xhtml) and [4](494112_1_En_4_Chapter.xhtml).
  prefs: []
  type: TYPE_NORMAL
- en: Objectives
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The following objectives will be covered about ROS:'
  prefs: []
  type: TYPE_NORMAL
- en: Understand the rationale, philosophy, and purpose of ROS.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Explore ROS facilities, such as graphs, `roscore`, `catkin_make`, packages,
    `rosrun`, `roslaunch`, and workspaces.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Explore ROS topics, services, and actions.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Compare and contrast ROS1 and ROS2 for the Raspberry Pi 4.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Debug faulty ROS programs with `rqt_console`.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: ROS Philosophy
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The fundamental idea behind Noetic ROS is to allow people to create robotic
    applications without reinventing the wheel. This capability involves sharing codes,
    algorithms, libraries, and ideas to efficiently create more complex robotic applications.
    There are well over 2,000 hardware and software applications for ROS. These include
    drivers to receive data from sensors such as LiDAR and to send commands to the
    rover's actuators. We also have an expanding collection of algorithms that allow
    SLAM, navigation, image-processing, object-detection, path-finding, and neural
    cognitive solutions with ROS. Noetic ROS distributes the computational requirements
    and divides the workload across multiple ROS programs or nodes. However, we must
    be careful with memory constraints and keep the total number of nodes to no more
    than 7\. ROS uses multiple debugging tools to correct distributed workflows following
    any discovered faulty behavior. These tools manage the complexity of running multiple
    ROS node programs. These advantages of ROS allow ROS developers to save money,
    research effort, and, above all, time.
  prefs: []
  type: TYPE_NORMAL
- en: Like the other ROS environments (Kinetic, Indigo, etc.), the Noetic ROS environment
    allows one to use the UNIX philosophy of software development. The UNIX philosophy
    aims to create stable, modular, and reusable software. Another way to state this
    is that it helps to build small programs that do one thing, and do it well. ROS
    does this with ROS node programs, where each node program does one thing, such
    as SLAM or object detection, and does it exceptionally well. The following paragraphs
    describe the many ways in which ROS adapts and exploits the UNIX philosophy for
    software development.
  prefs: []
  type: TYPE_NORMAL
- en: ROS systems consist of small computer programs called nodes that interact with
    each other and exchange messages. These data and command messages establish connections
    between each of the program nodes. There is no need for a central routing service
    to manage these messages, which allows our AI rover ROS application to scale.
    We can incrementally do so by adding SLAM, perception, object vision detection,
    and sense and avoidance as individual nodes. Many development environments such
    as Python Pycharm and GNU toolsets support ROS node development.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: ROS incorporates both open source and proprietary software to allow for even
    greater robotic capabilities and functionalities. Noetic ROS also encourages developers
    to use foreign libraries, such as TensorFlow, that can be used to both send and
    receive messages to other ROS node programs. We can then take the same library
    offline and test it outside an ROS node to determine if it is working correctly.
    Noetic ROS also supports both open source and proprietary software libraries.
    These two types of software can operate with each other by running inside ROS
    nodes.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: ROS Fundamentals
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For this section, we will quickly review the underlying architecture of Noetic
    ROS. ROS allows for multiple different programs to communicate with each other
    via messages. We will now look even closer at the underlying architecture that
    allows this to happen. We will also see how we can incorporate well-tested software
    for ROS. The reuse of software will allow us to address the many challenges the
    AI rover might face.
  prefs: []
  type: TYPE_NORMAL
- en: 'One of the original problems that motivated the creation of ROS was the “fetch
    an item” challenge. This challenge is very similar to the original mission requirements
    of the AI rover to explore the Egyptian catacombs to find and identify artifacts
    within those catacombs. The main difference is that the AI rover will not have
    a manipulator’s arm. However, it will have a camera, laser/ LiDAR sensor, gyroscope,
    and inertial measurement unit (IMU). We could easily add a manipulator arm to
    the AI rover, adding additional complexity to this textbook. However, we will
    provide a supporting website for this textbook that will review end-of-arm tooling
    and manipulator’s arms to safely extract objects found by the AI rover in its
    environment. The task of the rover is to navigate an environment, find an item,
    identify an item, and locate an item’s position. The rover then must return to
    the initial starting point once it locates all items. This fundamental task of
    the AI rover will highlight many particular and peculiar requirements for the
    software application controlling the AI rover. Some of the more detailed requirements
    of the robotic software development for the AI rover are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: A Noetic ROS application must be decomposed into separate sub-systems such as
    navigation, vision, sense and avoid, path-finding, decision analysis, and decision
    execution.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We could also recycle these very same sub-systems to use them in other robotic
    applications, such as military patrols and security.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We should be able to operate the identical sub-systems on different robotic
    hardware platforms with little or no alterations to the underlying source code.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The first component of ROS that we should review is the graph of a ROS node,
    which will allow us to describe concurrently running programs that are sending
    and receiving messages to one another. We will be using graphs to describe the
    interconnections between the ROS programs, described as nodes. The graph allows
    us to manage the complexity of the ROS application. The graphical lines defined
    between these nodes are also where messages will transfer data and commands between
    nodes. Therefore, by using a graph of the ROS application, we can instantly see
    the complexity and features of the entire application. We can also understand
    the functionalities and what nodes are transferring what type of data or commands
    to the other nodes. We can then see that each ROS program is a specific node and
    that it is just one piece of a complicated robotic system.
  prefs: []
  type: TYPE_NORMAL
- en: An ROS graph node represents a self-sustaining Python program that sends or
    receives data or command messages. The same messages connecting these nodes represent
    a graph edge. ROS nodes are typically Portable Operating System Interface (POSIX)
    processes, and the edges are TCP ethernet connections with IP addresses. The separation
    of the Python source code controlling the LiDAR, camera, IMU, gyroscope, and neural
    processing into separate ROS nodes allows the ROS application to be far more resistant
    to failure. Therefore, if a single or multiple ROS nodes were to fail, these failures
    would not cause the entire ROS application to fail. However, we need to examine
    one potential “Achilles’ heel” of any ROS application, and that would be the `roscore`.
    The `roscore` is the primary ROS master node program that allows each ROS node
    to find one another and forms a kind of operating system kernel for ROS.
  prefs: []
  type: TYPE_NORMAL
- en: The `roscore` master node is similar to any OS kernel as it provides information
    services for the ROS nodes to transmit and receive data and command messages to
    and from other ROS nodes. The `roscore` node is critical for any ROS application
    since this master node allows the other nodes to connect correctly. The `roscore`
    master node, during the powering and initialization phase, accepts and documents
    all other ROS nodes’ required message streams. The `roscore` node also adds new
    ROS nodes to the main ROS application. The `roscore` node will form the correct
    message stream between the newly added ROS node and the other needed nodes for
    connection.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: However, we need to be clear that once the `roscore` master node has established
    the connections between the nodes, the `roscore` node does not directly handle
    the exchange of data and commands between the nodes. This prevents data-block
    issues within the ROS application (AI rover). The issue of data block could only
    occur if the `roscore` node itself had to handle the exchange of messages completely.
    Instead, the ROS nodes handle data exchange and command messages between them.
    The `roscore` interaction only occurs once the nodes have established contact.
  prefs: []
  type: TYPE_NORMAL
- en: The `roscore` master node program is the fundamental foundation for *all* ROS
    applications (rover). This foundation allows nodes to find other nodes in an ROS
    application. The `roscore` master node also provides a parameter server, which
    allows the configuration of ROS nodes. The parameter server allows nodes to store
    and retrieve arbitrary data structures, such as the learning rate parameters for
    neural networks. The following vital foundations to consider for any ROS application
    (rover) would be creating the workspace for the ROS application source code to
    reside, the organization of ROS packages, and how the ROS build system with `catkin`
    operates.
  prefs: []
  type: TYPE_NORMAL
- en: Noetic ROS Catkin
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The ROS build system, or the `catkin` system, is a set of tools that ROS uses
    to generate executable programs and libraries for our ROS application (AI rover).
    The libraries that we will use include TensorFlow or Keras libraries. These libraries
    develop deep neural network routines for the AI rover. Since we are using primarily
    only Python as the development language for the AI rover, we will not need to
    know the compilation process for `catkin` as we would if we were using a compiled
    programming language such as C/C++. However, for additional information regarding
    the `catkin` ROS build in a C/C++ system, please refer to [`http://wiki.ros.org/catkin?distro-noetic`](http://wiki.ros.org/catkin%253Fdistro-noetic).
  prefs: []
  type: TYPE_NORMAL
- en: The `catkin` ROS build environment uses a suite of toolsets, `CMake` macros,
    and Python programs to enhance the Unix `CMake` workflow to create unique ROS
    applications. `CMake` produces two crucial files, `CMakeLists.txt` and `package.xml`,
    with specific information needed for ROS to work correctly. We will quickly review
    the tools needed to modify and append information to these two files for a successful
    ROS creation.
  prefs: []
  type: TYPE_NORMAL
- en: Noetic ROS Workspace
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We must now further test the `catkin` workspace `catkin_ws` created in Chapter
    [3](494112_1_En_3_Chapter.xhtml). We can create multiple workspaces. For example,
    in Chapter [6](494112_1_En_6_Chapter.xhtml), we were able to partition the Python
    and launch source code into separate controller and simulation workspaces. However,
    we can only develop and test source code within a single workspace at any one
    time.
  prefs: []
  type: TYPE_NORMAL
- en: We must check again to determine if our system-wide ROS setup script `STARTrosconfig.sh`
    file is still working from Chapter [3](494112_1_En_3_Chapter.xhtml). We need to
    consistently execute this script before making or compiling any workspace directory,
    as shown in Figure [12-1](#Fig1). For more information about creating the setup
    script, please refer to Chapter [3](494112_1_En_3_Chapter.xhtml).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/494112_1_En_12_Chapter/494112_1_En_12_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A screenshot of script used for compilation of any workspace directory. It has
    2 lines.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 12-1
  prefs: []
  type: TYPE_NORMAL
- en: STARTrosconfig.sh from Chapter [3](494112_1_En_3_Chapter.xhtml)
  prefs: []
  type: TYPE_NORMAL
- en: We must be sure that we can also develop and initialize the `catkin` workspace,
    seen in the orange box. We then enter the commands seen in Figure [12-2](#Fig2).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/494112_1_En_12_Chapter/494112_1_En_12_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A screenshot of catkin workspace initiation. Top four lines of commands are
    highlighted through a rectangular box.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 12-2
  prefs: []
  type: TYPE_NORMAL
- en: Initializing the catkin workspace
  prefs: []
  type: TYPE_NORMAL
- en: The `catkin_ws` initializes once both the workspace directory and the source
    code (`/src`) directory are created. Again, this source code directory is where
    the ROS application (rover) source code will reside. The `catkin_ws/src` directory
    then requires the `catkin_init_workspace` command. This ROS command will generate
    the `CMakeLists.txt` file in the `/src` directory, as shown in Figure [12-2](#Fig2).
    The generated `CMakeLists.txt` file also contains a set of directives and instructions
    describing the ROS project’s (rover) source files and targets (executables, libraries,
    or both). When you [create a new project](https://www.jetbrains.com/help/clion/creating-new-project-from-scratch.html)
    or workspace, the `catkin_init_workspace` command automatically generates the
    `CMakeLists.txt` file and places it in the project root directory `(~/catkin_ws/src)`.
    You can point the Gedit editor to the `CMakeLists.txt` file and choose “Open as
    Project.”
  prefs: []
  type: TYPE_NORMAL
- en: We will generate the `(/build)` and `(/devel)` directories to allow the `catkin`
    system to save libraries and executable programs developed with the C/C++ programming
    language. However, since we will be using the Python programming language, we
    will only be using the (/build) directory occasionally. To generate the `(/build)`
    and `(/devel)` directories, we must now enter the commands found in the orange
    box in Figure [12-3](#Fig3).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/494112_1_En_12_Chapter/494112_1_En_12_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A screenshot highlights commands that are used in generation of build, and develop
    directories for Python programming language.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 12-3
  prefs: []
  type: TYPE_NORMAL
- en: Catkin_make command
  prefs: []
  type: TYPE_NORMAL
- en: Noetic ROS Packages
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The organization of the ROS software for the rover is done in packages. All
    Noetic ROS packages will reside in a workspace’s `/src` directory, including a
    `CMakeList.txt` file and a `packages.xml` file. Both files discuss how `catkin_ws`
    should interact with any ROS package to create the foundation for ROS applications.
    These same packages also contain code, data, and documentation. To create an ROS
    package, one would need to use the following commands:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'All packages must reside in the `/src directory` to keep source code files
    efficiently organized. We have already invoked the `catkin_create_pkg` to create
    the `ai_rover` package. However, every ROS package is also highly dependent on
    ROS package dependencies, such as `rospy`. There are many other examples of ROS
    dependencies, such as `NumPy`, `TensorFlow`, and `OpenCV`. Also, if the main ROS
    dependency `(rospy)` requires other libraries as additional dependencies `(OpenCV),`
    you can list them in the following manner in the command terminal:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: The `catkin_create_pkg` command creates a directory with the same name `(ai_rover)`,
    `package.xml` and `CMakesLists.txt` files, and a `/src` directory for our future
    AI rover Python script files. Later in this chapter, we will go over the metadata
    (or data concerning data) found in the `packages.xml` and `CMakesList.txt` files.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have created a ROS package, we can place the Python nodes (neural
    networks, vision processing, and sense-and-avoid capabilities) into the ROS packages’
    `/src` directory. We will also conveniently develop future launch, world, and
    robot `URDF` description files to be organized into their own unique and separate
    directories. Now that we have a `/src` directory for our Python script nodes to
    reside in, we must review the terminal ROS commands necessary to execute these
    Python nodes to control our AI rover.
  prefs: []
  type: TYPE_NORMAL
- en: Noetic ROS rosrun
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The entire infrastructure of ROS is dependent on the creation of the packages
    that we just reviewed in the previous section. A ROS package is a collection of
    Python source code, launch files, world models, and robotic description files
    built and distributed together. This allows us to develop concurrent processing
    systems for ROS, since each package could hold multiple different compiled Python
    script routines that could be executed in parallel. Each compiled Python script
    file goes into an ROS node. Therefore, we could start and manage any number of
    different ROS nodes simultaneously to create the intelligence of our AI rover.
  prefs: []
  type: TYPE_NORMAL
- en: If we were to revisit Chapter [3](494112_1_En_3_Chapter.xhtml), we would see
    the example of the “talker” and “listener” ROS testing nodes, first used in Chapter
    [3](494112_1_En_3_Chapter.xhtml) to test whether the installation of Noetic ROS
    was successful. Both of these ROS nodes were attached to the `rospy_tutorials`
    package. The one issue with packages is finding or locating their directories.
    We use the ROS command utility `rosrun` to find any needed directories.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: For more information regarding the “talker” and “listener” examples, please
    refer to Chapter [3](494112_1_En_3_Chapter.xhtml).
  prefs: []
  type: TYPE_NORMAL
- en: Once we have initiated the “talker” node to send messages to the “listener”
    node, we can use the ROS query terminal command-line tools to determine the current
    status of the ROS system (AI rover). One of the primary and most potent ROS query
    command-line tools is `rostopic`. The `rostopic` command prints out the current
    list of active topics to the console, which is critical information for determining
    if our ROS system is working. If we were to leave the three terminal windows of
    the `roscore`, the “talker,” and the “listener” nodes open and running, we could
    then open a fourth terminal window and enter the following command of `rqt_graph`.
    Once we enter this command, we should see the following display (Figure [12-4](#Fig4)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/494112_1_En_12_Chapter/494112_1_En_12_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A screenshot of a an R O S application labelled r q t underscore graph underscore
    R O S graph r q t. Screen is divided in two parts. Part 1 has 3 panels to edit
    node graph. Part 2 displays connection between talker, chatter, and listener.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 12-4
  prefs: []
  type: TYPE_NORMAL
- en: RQT GRAPH tool diagram
  prefs: []
  type: TYPE_NORMAL
- en: Once you see the display in Figure [12-4](#Fig4), it would be wise to first
    click on the auto-regenerate icon in the top-left corner of the orange-colored
    box. We do this to have the most recent version of any messages passed in our
    current ROS system. We also click on the auto-regenerate icon every time a ROS
    node is removed or added to the ROS application. The auto-refresh icon is shown
    in Figure [12-5](#Fig5). Once we click on the auto- regenerate icon, we should
    see that the graph in the blue-colored box is the latest and currently active
    ROS application. These tools will help us develop, test, and deploy ROS1 and future
    ROS2 applications onto the Raspberry Pi 4\. The Raspberry Pi 4 will serve as the
    “brains” of our brave rover.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/494112_1_En_12_Chapter/494112_1_En_12_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: An icon of auto regeneration.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 12-5
  prefs: []
  type: TYPE_NORMAL
- en: Auto-regenerate icon
  prefs: []
  type: TYPE_NORMAL
- en: Building the Rover’s Brains
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We have come to the end of this textbook. We must now install the Raspbian operating
    system or Ubuntu 20.04 LTS for the Raspberry Pi 4\. These operating systems support
    ROS1 Noetic. In the case of ROS2 or Foxy, we only install the 20.04 Ubuntu server.
    As part of installing ROS1 or ROS2, we must be able to connect to the Raspberry
    Pi 4 through our development laptop or desktop computer to control and monitor
    the rover as it conducts its mission with a pre-loaded Raspberry Pi 4 onboard.
    But first, we must review how ROS1 and ROS2 differ to know which ROS version to
    load for a specific rover mission. ROS1 Noetic might be better if the rover mission
    is not mission critical. ROS2 Foxy might be required if the software development
    is lengthy or complicated (involving swarm intelligence between multiple rovers)
    and requires object-oriented programming.
  prefs: []
  type: TYPE_NORMAL
- en: ROS1 Versus ROS2
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You may be asking how ROS1 and ROS2 differ? What is ROS2, and what advantages
    does it provide our intrepid rover?
  prefs: []
  type: TYPE_NORMAL
- en: This section will give you a practical overview of what has changed and what
    is new. We will focus on the main differences between ROS1 and ROS2\. We’ll try
    to be brief.
  prefs: []
  type: TYPE_NORMAL
- en: 'We will only use the term *ROS* when talking about ROS—aka Robot Operating
    System—in general: ecosystem, community, etc. However, we will use *ROS1* and
    *ROS2* when discussing the specific ROS versions for this chapter section.'
  prefs: []
  type: TYPE_NORMAL
- en: Since 2007, the ROS1 development team has used their years of experience and
    lessons learned to determine what features to add and improvements to make. Unfortunately,
    adding all those modifications into ROS1 would have caused instabilities in ROS1
    Noetic. So, ROS2 was developed from scratch and is a completely new ROS. This
    new variant of ROS incorporates the lessons learned with ROS1\. ROS1 areas for
    improvement include safety and security. ROS needs to address these areas before
    ROS enters industrial applications.
  prefs: []
  type: TYPE_NORMAL
- en: Rover ROS1 or ROS2?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There are three main areas that separate ROS1 Noetic and ROS2 Foxy; let’s closely
    review them. We should first consider that ROS1 Noetic for the rover is the last
    ROS1 variant, and support will end in May 2025\. The ROS Noetic version provides
    support for the Python3 language. Noetic ROS has a substantial base of developed
    libraries for sensors such as LiDAR that will take some time to be ported to ROS2
    Foxy. Meanwhile, ROS2 Foxy support will only last for a year since a new version
    of ROS2 will be available each year. ROS2 is now stable, so we can develop the
    rover missions. The first difference between ROS1 Noetic and ROS2 Foxy involves
    the ROS nodes.
  prefs: []
  type: TYPE_NORMAL
- en: ROS1 Nodelets or ROS2 Components
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: For simplicity, we will not review the use of C/C++ programming development
    for ROS nodes. We will only concentrate on the details of the Python language
    for this and other Chapter [12](494112_1_En_12_Chapter.xhtml) sections. For further
    details on the C++ programming of ROS applications, please refer to the `ROS.org`
    website.
  prefs: []
  type: TYPE_NORMAL
- en: Consider using ROS callback functions in class nodes are used as the foundation
    of ROS1 nodes. As such, the development of ROS1 nodes is unstructured. However,
    in ROS2, structured development is made possible using a class template for the
    node object. ROS2 inherits its functionalities from the base class of the node.
    ROS2, using a good object-oriented programming (OOP) and modular approach to node
    creation, will help the creators of these nodes with potentially complicated node
    interactions. ROS2 is far more compatible with OOP development. ROS2 also allows
    you to convert groups of nodes into components. Node components can also be represented
    as UML diagrams, which further enhances the modular design in ROS.
  prefs: []
  type: TYPE_NORMAL
- en: A ROS1 node is also an executable. There are also ROS1 nodelets, which launch
    multiple nodes in the same executable with a single launch file—perfect for limited
    hardware resources or sending messages between nodes. In ROS2, these software
    entities are now called components. A component is simply a slightly modified
    node class from OOP. With ROS2, you can now handle multiple nodes from the same
    executable using components.
  prefs: []
  type: TYPE_NORMAL
- en: ROS2 components allow us to create efficient ROS2 applications. Python scripts
    allow for starting components from a launch file, the terminal, or another executable.
    There also exists programmable intra-process communication to remove any required
    ROS2 communication overhead.
  prefs: []
  type: TYPE_NORMAL
- en: ROS1 and ROS2 LaunchFiles
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: ROS1 and ROS2 LaunchFiles allow you to start all your nodes from one file. You
    can start a standard node, a nodelet, or a component—LaunchFiles, developed in
    ROS1, are programmed with XML.
  prefs: []
  type: TYPE_NORMAL
- en: In ROS2, Python is now used to write LaunchFiles. Python allows you to start
    one or more nodes. Python also allows LaunchFiles to be more adaptable to changing
    robotics needs, such as changing sensors to the rover or even replacing the rover
    design with an alternative design.
  prefs: []
  type: TYPE_NORMAL
- en: ROS2 LaunchFiles can be programmed with both XML and Python if you want to.
    But using Python allows more modularity and has become the standard ROS2 procedure
    for developing and initiating LaunchFiles. The following links describe how one
    develops LaunchFiles for ROS1 ([`http://wiki.ros.org/roslaunch`](http://wiki.ros.org/roslaunch))
    and ROS2 ([`https://roboticsbackend.com/ros2-launch-file-example/`](https://roboticsbackend.com/ros2-launch-file-example/)).
  prefs: []
  type: TYPE_NORMAL
- en: ROS1 and ROS2 Communications
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The first significant difference between ROS1 and ROS2 is that there is no ROS
    master node in ROS2\. In the past, ROS1 required starting the ROS master node
    first before any ROS application started. The ROS1 master node also acted as a
    controller for the message topics between ROS1 nodes. However, in ROS2, there
    is no longer any ROS master node. This lack of a master node allows for actual
    asynchronous distributed behavior in that each node can interact with other nodes.
    Each node in ROS2 is independent and not dependent on a global master.
  prefs: []
  type: TYPE_NORMAL
- en: ROS1 and ROS2 Services
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: In ROS1, services are only synchronous. That means that the ROS master node
    must respond to the responding ROS node promptly, or fail to do so. However, in
    ROS2, all services are asynchronous. You can add a callback function that will
    only respond once the responding node or service responds when you call a service.
    This feature prevents the resource starvation problems and queueing issues found
    in ROS1 applications. Also, ROS2 services can become synchronous.
  prefs: []
  type: TYPE_NORMAL
- en: ROS1 and ROS2 Actions
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: In ROS1, actions were never in the master node core functionalities. As a result,
    actions were integrated into ROS1 on top of ROS1 topics. This solution handled
    the issue that services were not asynchronous and did not have a feedback or cancelation
    mechanism. In ROS2, actions are now part of the ROS2 core. The Python API in ROS2
    is nearly identical to the Python API in ROS1, so there are no issues with legacy
    code.
  prefs: []
  type: TYPE_NORMAL
- en: Underneath both ROS1 and ROS2, actions still use topics for feedback and goal
    status and (asynchronous) services to set a goal, cancel a goal, and request a
    result. ROS2 actions now have a command-line tool! You can now send an action
    goal to a server directly from the terminal as you do with a service.
  prefs: []
  type: TYPE_NORMAL
- en: ROS1 and ROS2 Packages
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The build system in ROS1 is `catkin`. You use `catkin_make` or `catkin build`
    to create ROS1 packages. In ROS2, `catkin` no longer exists. Ament is the new
    building system, and on top of that, you get the colcon command-line tool. Use
    the `colcon build` command in your ROS2 workspace to compile packages quickly.
  prefs: []
  type: TYPE_NORMAL
- en: ROS1 and ROS2 Command-Line Tools
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Most of the ROS1 and ROS2 command-line tools are nearly identical. In ROS1,
    the `rostopic list` command lists all topics, and in ROS2, [`ros2 topic`](https://roboticsbackend.com/ros2-topic-cmd-line-tool-debug-ros2-topics-from-the-terminal/)`list`
    produces the same result. In most cases, you need to remember to write `ros2`
    followed by the name of the tool you want to use in ROS2, as you would do in ROS1.
  prefs: []
  type: TYPE_NORMAL
- en: ROS1 and ROS2 OS Support
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: ROS2 is far more accessible to robotic platforms not based on Ubuntu. ROS1 only
    supports the Ubuntu Linux operating system (20.04 for Noetic ROS1). However, ROS2
    now supports Ubuntu, macOS, and Windows 10\. All of these can now operate with
    each other. With ROS2, the rover could be based on the Raspberry Pi 4 and Ubuntu.
    We could then have the ground control station use only Windows.
  prefs: []
  type: TYPE_NORMAL
- en: ROS1 (ros1_bridge) Link with ROS2
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Working with a legacy ROS1 code base and needing to develop new features with
    ROS2 can be achieved with the ROS2 package named `ros1_bridge`. This creation
    provides communication between ROS1 and ROS2 applications, making, as its name
    suggests, a bridge between ROS1 and ROS2\. This ROS2 package will be essential
    as the May 2025 end-of-life service is reached for ROS1 Noetic. Therefore, please
    start porting your ROS1 applications now to ROS2 systems. Please refer to the
    following hyperlinks for more information: [`https://github.com/ros2/ros1_bridge`](https://github.com/ros2/ros1_bridge)
    and [`https://index.ros.org/p/ros1_bridge/`](https://index.ros.org/p/ros1_bridge/).'
  prefs: []
  type: TYPE_NORMAL
- en: ROS1, Ubuntu, Raspbian, and the Raspberry Pi 4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'There are three major operating systems on the Raspberry Pi 4 supporting the
    ROS1 Noetic system. These are the Raspbian and the Ubuntu 20.04 desktop and server
    operating systems. There is some need to note that the best way to determine that
    all of your applications work is to use an **8 GB ram version of the** **Raspberry
    Pi 4** and use only the Ubuntu 20.04 desktop or the stripped-down Ubuntu server
    operating system. You want to be sure that all of your applications and their
    libraries are fully available, as you would expect had you developed your ROS1
    Noetic application on a standard Ubuntu Linux system on a PC laptop or desktop.
    The following is a list of references that will aid you in installing ROS1, Ubuntu,
    or Raspbian OS on the 8 GB Raspberry Pi 4:'
  prefs: []
  type: TYPE_NORMAL
- en: '[`https://roboticsbackend.com/install-ubuntu-on-raspberry-pi-without-monitor/`](https://roboticsbackend.com/install-ubuntu-on-raspberry-pi-without-monitor/)'
  prefs: []
  type: TYPE_NORMAL
- en: '[`https://learn.sparkfun.com/tutorials/how-to-use-remote-desktop-on-the-raspberry-pi-with-vnc/all`](https://learn.sparkfun.com/tutorials/how-to-use-remote-desktop-on-the-raspberry-pi-with-vnc/all)'
  prefs: []
  type: TYPE_NORMAL
- en: '[`https://ramith.fyi/setting-up-raspberry-pi-4-with-ubuntu-20-04-ros-intel-realsense/`](https://ramith.fyi/setting-up-raspberry-pi-4-with-ubuntu-20-04-ros-intel-realsense/)'
  prefs: []
  type: TYPE_NORMAL
- en: ROS2, Ubuntu, and Raspberry Pi 4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Only two operating systems on the Raspberry Pi 4 support the ROS2 system. These
    are the Ubuntu 20.04 desktop and server operating systems. Note that the best
    way to determine that all of your applications work correctly is to use an **8GB
    ram version of the Raspberry Pi 4** and use only the Ubuntu 20.04 server to maximize
    memory usage on the Raspberry 4 system. The following is a list of references
    that reveal the proper way to install ROS2 on the Raspberry Pi 4 module:'
  prefs: []
  type: TYPE_NORMAL
- en: '[`https://singleboardblog.com/install-ros2-on-raspberry-pi/`](https://singleboardblog.com/install-ros2-on-raspberry-pi/)'
  prefs: []
  type: TYPE_NORMAL
- en: '[`https://ubuntu.com/blog/ubuntu-20-04-lts-is-certified-for-the-raspberry-pi`](https://ubuntu.com/blog/ubuntu-20-04-lts-is-certified-for-the-raspberry-pi)'
  prefs: []
  type: TYPE_NORMAL
- en: '[`https://docs.ros.org/en/foxy/How-To-Guides/Installing-on-Raspberry-Pi.html`](https://docs.ros.org/en/foxy/How-To-Guides/Installing-on-Raspberry-Pi.html)'
  prefs: []
  type: TYPE_NORMAL
- en: '[`https://medium.com/swlh/raspberry-pi-ros-2-camera-eef8f8b94304`](https://medium.com/swlh/raspberry-pi-ros-2-camera-eef8f8b94304)'
  prefs: []
  type: TYPE_NORMAL
- en: ROS1, ROS2, Raspberry Pi 4, and Rover
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The fundamental idea of using the ROS environment is that once you have debugged
    your application on a standard Ubuntu (ROS1) or Ubuntu, Windows, or macOS (ROS2)
    OS, you should be able to transition your designs to an actual rover. Whichever
    version of ROS you decide to use (ROS1 or ROS2), and the supporting operating
    system, will allow you to create the brains of the rover. However, before we connect
    the Raspberry Pi 4 to the rover, we need to be confident that we can wirelessly
    connect our laptop computer to the Raspberry Pi 4 using a wireless connection
    via SSH connection. This step will be critical if we are to use the Rviz environment
    on the Ubuntu laptop or desktop to connect to the Raspberry Pi 4, acting as the
    central processor of the rover. The following is a list of references on the internet:'
  prefs: []
  type: TYPE_NORMAL
- en: '[`https://roboticsbackend.com/install-ubuntu-on-raspberry-pi-without-monitor/`](https://roboticsbackend.com/install-ubuntu-on-raspberry-pi-without-monitor/)'
  prefs: []
  type: TYPE_NORMAL
- en: '[`https://medium.com/@nikosmouroutis/how-to-setup-your-raspberry-pi-and-connect-to-it-through-ssh-and-your-local-wifi-ac53d3839be9`](https://medium.com/%2540nikosmouroutis/how-to-setup-your-raspberry-pi-and-connect-to-it-through-ssh-and-your-local-wifi-ac53d3839be9)'
  prefs: []
  type: TYPE_NORMAL
- en: '[`https://medium.com/swlh/raspberry-pi-ros-2-camera-eef8f8b94304`](https://medium.com/swlh/raspberry-pi-ros-2-camera-eef8f8b94304)'
  prefs: []
  type: TYPE_NORMAL
- en: '[`https://www.hackster.io/techmirtz/connect-raspberry-pi-to-your-laptop-screen-and-keyboard-a8a2a7`](https://www.hackster.io/techmirtz/connect-raspberry-pi-to-your-laptop-screen-and-keyboard-a8a2a7)'
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We have now reviewed the basic concepts to allow one to port a ROS1 system with
    a cognitive deep learning system to a rover platform. The Raspberry Pi 4 module
    will help us explore any environment (Egyptian catacombs) with genuine autonomy.
  prefs: []
  type: TYPE_NORMAL
