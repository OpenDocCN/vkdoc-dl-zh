- en: 5. Making a game with PoseNet, a pose estimator model
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Time for a fun application! Are you ready to pose? I hope so, because in this
    exercise your movements are the test dataset.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, you will implement a game that features the model known as
    **PoseNet**. PoseNet is a neural network capable of doing real-time human pose
    estimation in images and videos. In this context, estimating a pose refers to
    the task of identifying where a person’s body joints and other parts appear in
    a frame. For example, Figure [5-1](#Fig1) is a screenshot from the app, and on
    the canvas located at the center, you can see a skeleton overlay showing the parts
    of the body identified by the algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/494424_1_En_5_Chapter/494424_1_En_5_Fig1_HTML.jpg](../images/494424_1_En_5_Chapter/494424_1_En_5_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-1
  prefs: []
  type: TYPE_NORMAL
- en: A screenshot of the game. I’m not very good at it
  prefs: []
  type: TYPE_NORMAL
- en: With PoseNet, we will introduce the book’s first pre-trained and built-in model.
    So, since we do not have to train it, our work reduces to understanding the algorithm’s
    output and building the game around it.
  prefs: []
  type: TYPE_NORMAL
- en: The application you will create is a game where the user has to show to PoseNet,
    through the device’s webcam, a series of body parts before time runs out. If PoseNet
    identifies the part, the user gets one point. Otherwise, it gets a strike.
  prefs: []
  type: TYPE_NORMAL
- en: What is PoseNet?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: PoseNet is a convolutional neural network model for estimating human poses.
    These poses are made from a group of 17 different and predefined body parts, known
    as **keypoints**. These are both eyes, ears, shoulders, elbows, wrists, hips,
    knees, ankles, and the nose.
  prefs: []
  type: TYPE_NORMAL
- en: 'The model has two methods of decoding the poses: *single-person pose estimator*
    and *multiple-person pose estimator*. The single pose estimator is faster and
    requires fewer resources. But its disadvantage is that if multiple subjects are
    present in the frame, the model might estimate the pose from all of them. For
    example, in the case of having two people in the video, the algorithm might detect
    the left eye from subject A and the right eye from subject B. The multiple poses
    estimator handles this problem. This method can recognize if the poses come from
    different bodies, at the cost of being slower than the single pose estimator (Oved,
    2018). For this game, we will use the single pose detector.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Estimating a pose with PoseNet involves two key steps: computing **heatmaps**
    and **offset vectors**. The heatmaps are three-dimensional tensors of size RESOLUTION
    x RESOLUTION x 17 (the algorithm automatically squares the image), where the number
    17 represents the keypoints. Each of the heatmaps’ values is the confidence or
    probability that the corresponding keypoint is present at that location. Figure
    [5-2](#Fig2) presents a simplified example of the “right knee” keypoint heatmap.'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/494424_1_En_5_Chapter/494424_1_En_5_Fig2_HTML.jpg](../images/494424_1_En_5_Chapter/494424_1_En_5_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-2
  prefs: []
  type: TYPE_NORMAL
- en: A “right knee” heatmap
  prefs: []
  type: TYPE_NORMAL
- en: In the second step, PoseNet calculates a set of offset vectors that measure
    the distance between the pixel and the keypoint location, producing, and I quote
    one of the papers behind the model, “a more precise estimating of the corresponding
    keypoint location” (Papandreou et al., 2017). After creating these tensors, the
    network aggregates them to produce highly localized activation maps that pinpoint
    the position of the keypoints (Figure [5-3](#Fig3)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/494424_1_En_5_Chapter/494424_1_En_5_Fig3_HTML.jpg](../images/494424_1_En_5_Chapter/494424_1_En_5_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-3
  prefs: []
  type: TYPE_NORMAL
- en: The “right knee” offset vectors
  prefs: []
  type: TYPE_NORMAL
- en: 'PoseNet comes in two flavors: the **MobileNet** and **ResNet** variants. The
    one we will use is the MobileNet-based variant. MobileNet (Howard et al., 2017)
    is a CNN architecture that sacrifices accuracy in favor of speed and size, making
    it ideal for a time-sensitive use case like a game. We will revisit and learn
    more about MobileNet in Chapter [8](494424_1_En_8_Chapter.xhtml). The second variation
    is based on ResNet (He et al., 2015), a more accurate albeit slower and larger
    architecture.'
  prefs: []
  type: TYPE_NORMAL
- en: The COCO dataset
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The PoseNet model was trained on the **Common Objects in Context** or COCO keypoints
    (Lin et al., 2014) dataset. This dataset, created for the COCO Keypoint Detection
    Task competition, has more than 200,000 images with over 250,000 instances of
    people performing everyday tasks in uncontrolled conditions.
  prefs: []
  type: TYPE_NORMAL
- en: Building the game
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The game you are about to create is a movement game where the user has to perform
    the pose presented on screen. For example, if the game says “leftHip,” display
    your left hip on the webcam (please be careful). But you have to be fast and strike
    the pose in the allocated time. Otherwise, you will get a strike, and like every
    classic video game, you only have three. On the other hand, if you are doing great
    and dominating those poses like a dancer, the game gets harder. And harder means
    having less time to pose and triggering the “inverse” mode, a game mode where
    the user gets a strike if the prompted keypoint is present in the frame. So, if
    you see “~nose” on the screen, hide the nose from the camera.
  prefs: []
  type: TYPE_NORMAL
- en: Since we are using a pre-trained model and making a game, this exercise will
    differ from the others. You will start by setting up the camera, followed by loading
    and integrating the model and writing the gameplay loop. Unlike the earlier examples,
    there’s no data pre-processing, training, and visualization tasks involved.
  prefs: []
  type: TYPE_NORMAL
- en: Structuring the UI
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The game UI is very simple (Figure [5-1](#Fig1)). It has a canvas presenting
    the webcam video with the keypoints and “skeleton” placed on top of the feed.
    Above the video is a button to start the game and another one to stop it. Under
    them are the game’s score and strikes. On the sides of the canvas are the keypoint
    to pose and the timer. At the bottom is a label that notifies if the pose is correct
    or wrong.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now to code it. As usual, create a new directory in your location of choice,
    and start a web server at the same place. Next, open the code editor and create
    a file named *index.html* and *style.css*. At the top of the file, use a `<head>`
    tag to import TensorFlow.js, PoseNet, and the CSS file:'
  prefs: []
  type: TYPE_NORMAL
- en: 'After `<head>`, add the `<body>` tag. Inside this node, write a title for the
    app and a `<div>` with `id` attribute `game-container` for the game UI. As stated
    earlier, the game UI has a set of buttons that you will create programmatically
    inside a `<div>` with `id` attribute `buttons-menu`. Below it, define another
    `<div>` used to display the game’s score and strikes:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Under the last `<div>`, create another one. This one has the “pose to match”
    string, the timer, the `<video>` tag used to retrieve the webcam feed, and the
    canvas that displays the video and the keypoints:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: After the `<div>`, add two `<scripts>` to load *index.js* and *draw.js*, a script
    with functions that draw the keypoints and skeleton over the canvas. The *draw.js*
    script (which I slightly changed) comes from the PoseNet example in the official
    TensorFlow.js repository:^([1](#Fn1))
  prefs: []
  type: TYPE_NORMAL
- en: 'To end this section, copy the following CSS code (for centering and positioning
    the elements) in *style.css*:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Setting up the camera
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Create the *index.js* file. On the first line, add the variable `SIZE` (the
    size of the canvas width and height) and set its value to 500\. Following this,
    create the new function `setupCamera()`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: The first lines of `setupCamera()` get the video element and set its size. It
    uses `MediaDevices.getUserMedia``()` ^([2](#Fn2)) to produce a Promise whose intended
    value is a `MediaStream` (the video). We will get the value using a `then` statement.
    In it, use a callback to set the webcam stream to the video element. This method
    triggers the pop-up that requests permission to access the video (accept!).
  prefs: []
  type: TYPE_NORMAL
- en: 'There is a second function you will need, `loadVideo()`. The function calls
    `setupCamera()` and uses its method `play()` to play the video:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Now, let’s draw and present the video on the canvas. So, create a new function,
    `detect()`, that takes the `video` as an argument. In the function, get the canvas
    element and its context and set the size. Within the function, add a second one
    (yes, inside), and name it `getPose()`. Later, you will add here the code responsible
    for performing the predictions. For now, let’s focus on drawing the video on the
    canvas.
  prefs: []
  type: TYPE_NORMAL
- en: Instead of drawing the video feed as it is, we will use `ctx.scale()` and `ctx.translate()`
    to flip it, so it looks more natural to us. After preparing the context, use `requestAnimationFrame()`
    , a JavaScript function that, in this circumstance, is used to produce the next
    frame of the video. Now, close `getPose()`, and call it from the next line (while
    still in `detect()`).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'Before moving on to the exciting part of the game, take a small pause to check
    that everything is running as expected. So, create an `init()` function , and
    call `loadVideo()`, and `detect()` from it. Next, call `init()`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: With the web server running, go to the browser and start the app. Right away,
    a pop-up shows up, asking for permission to access the camera. After accepting,
    the webcam feed will appear in the middle of the app.
  prefs: []
  type: TYPE_NORMAL
- en: Loading and testing the model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The app is running, and you can see yourself on the canvas. Good. So, as the
    next step, you will load the model and do a quick test to check out how it works
    and to understand better the prediction object it returns.
  prefs: []
  type: TYPE_NORMAL
- en: 'Back at the code editor, create a new file and name it *draw.js*. This file
    hosts the functions that draw the PoseNet keypoints and the skeleton on the canvas.
    Before getting to the functions, declare a variable `COLOR` and set it to “red”
    (or any other color) to paint every line and dot with red. Then create a function
    that draws the points; call it `drawPoint()` :'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: You might realize that some context methods are those we saw in Chapter [5](494424_1_En_5_Chapter.xhtml).
    The only exception is `ctx.arc()`, one that draws circles.
  prefs: []
  type: TYPE_NORMAL
- en: 'After `drawPoint()`, create `drawSegment()`, a function that draws the lines
    between keypoints:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: 'Next comes `drawSkeleton()` alongside its helper function `toTuple()`. `drawSkeleton()`
    uses PoseNet’s `getAdjacentKeyPoints()` method to get the points near the keypoints
    and `drawSegment()` to draw the lines:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: 'Last, you will need `drawKeypoints()` to draw the keypoints. Note that this
    function and `drawSkeleton()` check if the confidence of the detected keypoints
    is above a certain threshold. If not, the method will not return the prediction:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: 'With the drawing functions defined, we have what we need to predict the keypoints
    and show them. So, head back to *index.js* and import *draw.js*:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: 'Now go to `init()`. Right after the line where you called `loadVideo()`, use
    the following to load the model (make sure you declare `model`):'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: PoseNet’s `load()` method takes as an argument a configuration object that tunes
    several aspects of the model. The most important one is `architecture`, and here
    you specify whether you want to use MobileNet or ResNet. A second attribute, `outputStride`,
    sets the output resolution. The smaller the value is, the largest the output,
    resulting in a more accurate prediction at the cost of speed—the possible values
    are 8, 16, or 32\. Next is the resolution of the input image (`inputResolution`)
    and the `multiplier`, an attribute only used by the MobileNet variant to control
    the depth of the convolutional layers. Again, there is a trade-off here. The larger
    the value, the larger the size of the layers, meaning more accuracy, but at the
    cost of speed—the possible values are 0.50, 0.75, 1.0, or 1.01\. That is for the
    model! Now return to `getPose()`.
  prefs: []
  type: TYPE_NORMAL
- en: 'At the very beginning of `getPose()` (before the lines you previously wrote),
    call `model.estimateSinglePose()` (remember that we are using the single pose
    estimator) with arguments `video` and a configuration object that has `flipHorizontal`
    set to `true`. This attribute mirrors the pose horizontally. Then declare the
    variable `lastPose` at the top of the file. This variable keeps the last pose
    inferred by the model, which is the pose the game uses to assess if the user performed
    what the game instructed. Also, create a const `MIN_CONFIDENCE` and set it to
    0.3:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: 'Again, back to `getPose()`, set to `lastPose` the returned value from `estimateSinglePose()`.
    Then, after all the methods involving `ctx`, but before `requestAnimationFrame()`,
    call `drawKeypoints()` and `drawSkeleton`. `getPose()` should now look like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: Just in case, make sure that `getPose()` is within the `detect()` function .
  prefs: []
  type: TYPE_NORMAL
- en: Now return to the app and reload it. As before, you should see the webcam feed
    in the center of the page, but now it has the keypoints and skeleton detected
    by PoseNet. Move around a bit so you can get the feel of the detections. If the
    stream seems slow, tweak the parameter `outputStride`. Conversely, if the image
    shows no lag at all, try a smaller value to increase the model’s accuracy.
  prefs: []
  type: TYPE_NORMAL
- en: 'Before proceeding with the next and final part of the tutorial, let’s quickly
    review the model’s output. A PoseNet prediction (Figure [5-4](#Fig4)) is an object
    `pose` made of two attributes: `score` and `keypoints`. The second one, `keypoints`,
    corresponds to an array of length 17, where each element is one of the keypoints.
    These elements contain an object with the keypoint confidence score, the name
    of the part, and its location. The first attribute of the prediction, `score`,
    is the mean of the keypoints’ confidences.'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/494424_1_En_5_Chapter/494424_1_En_5_Fig4_HTML.jpg](../images/494424_1_En_5_Chapter/494424_1_En_5_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-4
  prefs: []
  type: TYPE_NORMAL
- en: A PoseNet prediction object
  prefs: []
  type: TYPE_NORMAL
- en: Creating the gameplay loop
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Take off your machine learning developer hat and put on the video game developer
    one because, in this part of the exercise, you will build the gameplay loop. As
    mentioned in the introduction, the game’s goal is making you do a random pose
    before the time runs out. To make the game harder and more enjoyable, after reaching
    a specific score, the time to pose decreases, and the “inverse” mode activates.
    While in this mode, the user may have to hide, not show, the instructed keypoint.
    Let’s go.
  prefs: []
  type: TYPE_NORMAL
- en: 'Back at the global variables section, declare the following ones:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: 'Then create a function named `initGame()`. Here, you will initialize the `score`
    and `strike` variables, get the game’s first pose using `nextPose()` (defined
    soon), and display the pose to do on the game interface:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: 'Next, define another function, `nextPose()` , which returns two values (in
    a list): a random keypoint from `keypointsList` and a flag to specify whether
    this round applies the inverse rule if the mode is active. Note that if the inverse
    mode is on, there is only a 33% chance of applying its effect:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: 'The next function is `verifyPose()`. As the name indicates, this one checks
    if the performed pose is correct. It iterates over the keypoints of `lastPose`
    while checking if the confidence of the instructed keypoint is greater than the
    threshold. If `true`, the function returns `true`. On the contrary, if the user
    shows the keypoint while inverse mode is on, then `verifyPose()` returns `false`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: 'Then comes `adjustRules()`. This function changes the game mode according to
    the current score. With the default values, if the game score is 3, `timeToPose`
    changes to 2, meaning that the user now has two seconds to pose. Likewise, if
    the score is 5, the inverse mode gets activated:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: 'Next is `updateState()`, responsible for increasing the user’s score (if `result`
    is true) and the strikes (if `result` is false) and culminating the game if the
    user’s strikes reach `MAX_STRIKES`. If this happens, the game resets. Moreover,
    `updateState()` presents on screen the outcome of the round:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: 'Now comes the important function, `initGameLoop()` :'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: The function starts by setting `timeToPose` to `timeLeft`, followed by calling
    `initGame()`. Then comes `setInterval()`, a JavaScript function that executes
    a callback function at specified intervals (expressed in milliseconds)—ours executes
    every second. Let me explain why. An obvious alternative would be calling the
    function every `timeToPose` seconds since that is the allocated time. But we want
    to present a timer on the screen so that the user can see the remaining seconds.
    Hence, the UI needs to update every second.
  prefs: []
  type: TYPE_NORMAL
- en: The callback first checks if `timeLeft` (to pose) is less than zero. If it is,
    it resets the timer, calls `verifyPose()`, and updates the game state according
    to the pose outcome. Then, it calls `nextPose()` to compute the next round’s pose
    and presents the keypoint name on the UI. Then, it updates the UI to reflect the
    current value of `timeLeft`, followed by subtracting one from the variable.
  prefs: []
  type: TYPE_NORMAL
- en: 'Similar to how we initialized the game, we need the means to reset it. The
    following function, `resetGame()`, takes care of that. It clears out the text
    fields and stops the interval:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: 'To end the exercise, we need to create the two buttons that start and stop
    the game; “Start” calls `initGameLoop()` and “Stop,” `resetGame()`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: 'Finally, return to `init()` and call `prepareButtons()` between `posenet.load()`
    and `detect()`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
- en: Testing the game
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Time to play! If you go to the app, you will see the two buttons, “start” and
    “stop.” Click “start.” But hurry! Remember, you only have five seconds to present
    the keypoint. After five correct poses, the time countdown will start at 2 seconds,
    followed by activating the “inverse” mode once the score reaches 5.
  prefs: []
  type: TYPE_NORMAL
- en: Enjoy the game! If you manage to get a high score, let me know. I would like
    to see it. :)
  prefs: []
  type: TYPE_NORMAL
- en: Recap
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Well, that was entertaining. What did you think? In this chapter, we presented
    an example of a game that involves a machine learning model as part of its gameplay.
    Our game, titled *Pose for the Net*, is a movement game where the goal is to match
    the pose presented by it. The model, PoseNet, is a pose estimator and one of the
    many pre-trained models TensorFlow.js has to offer. Being a pre-trained model
    meant that we did not have to go through the process of training it or defining
    it. None of that. The only thing we needed was one line of code to integrate it
    into our app.
  prefs: []
  type: TYPE_NORMAL
- en: Exercises
  prefs: []
  type: TYPE_NORMAL
- en: Extend the app so that it supports the multiple poses estimator and two players
    using the method `estimateMultiplePoses()`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Replace the model with ResNet.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Tweak the parameters and compare the trade-off between speed and accuracy.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Fit a k-means model to cluster the coordinates of the keypoints.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: PoseNet is a versatile model that fits many use cases. So, now it is your turn
    to build something new. If you need ideas, you could start with tracking keypoint
    or using a combination of them to track more complicated poses like a sitting
    or a sleeping position.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
