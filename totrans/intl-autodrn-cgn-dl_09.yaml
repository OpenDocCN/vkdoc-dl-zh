- en: 9. Reinforced Learning
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In the previous chapter, our rover needed the ability to extract information
    from images and recognize objects by their patterns and features. This chapter
    will outline a novel framework of autonomous aviation with the application of
    artificial intelligence in the form of a reinforcement learning agent. This agent
    learns flying skills by observing a pilot’s psychological reaction and flight
    path in a flight simulator. The framework consists of a gaming module that works
    as a flight simulator, a computer vision system that detects the pilot’s gestures,
    a flight dynamics analyzer for verifying the safety limits of the state space
    variables (the performance of the aircraft) during a simulated flight, and a module
    to calculate the Q-function and the learned policy.
  prefs: []
  type: TYPE_NORMAL
- en: REL Primer
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'This chapter is diverse in that reinforcement learning (REL) is not supervised
    or unsupervised learning. There exists an agent that can observe the environment,
    select and perform an action/s, and get rewards in return (or penalties in the
    form of negative rewards). Then it must learn by itself based on what may or may
    not be initially given to it. This is referred to as the best strategy, called
    a policy, to get the most reward over time (if not given to it, it makes a strategy,
    or it makes the one it is given better). A policy defines what action the agent
    should choose when it is in a given situation. For example, many robots implement
    REL algorithms to learn how to walk. DeepMind’s AlphaGo program is a good example
    of reinforcement learning: in May 2017 it beat the world champion Ke Jie at the
    game of Go. It learned its winning policy by analyzing millions of games, and
    then playing many games against itself. The vast majority of available data is
    actually unlabeled: we have the input features X, but we do not have the labels
    Y. There is huge potential in reinforcement learning, as we have only barely scratched
    the service.'
  prefs: []
  type: TYPE_NORMAL
- en: The central concept of REL is the notion of an intangible action based on a
    policy. Next is the agent’s directly affecting the environment, the basic actions
    of RL; as the agent learns, the internal state of the agent is modified in order
    to build upon policy.
  prefs: []
  type: TYPE_NORMAL
- en: Semi-Markov decision processes (SMDPs) have potential benefits in REL. When
    a complex task is created, the Q value for the overall task can be formed by combining
    the Q values of the simpler tasks. This is a way of solving the problem of finding
    the optimal decision thresholds by casting it as a stochastic optimal control
    problem by choosing actions in each state in the corresponding SMDP such that
    the average reward rate is maximized.
  prefs: []
  type: TYPE_NORMAL
- en: A basic observation is that actions take time to complete. When an agent selects
    a basic action, the result of that action can be observed in the next time step
    (as defined by the MDPs). But actions are not completed in a single time step,
    as there is some time interval that elapses while the policy is executing the
    underlying basic actions, and only at the end of that delay period can the results
    of that action be observed.
  prefs: []
  type: TYPE_NORMAL
- en: 'SMDPs extend the basic MDP framework by adding time into the various components,
    thus allowing them to capture this style of decision problem. SMDPs extend the
    MDP framework in three ways, as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: 'First, the transition function, *P*, must incorporate time. This is expressed
    as *P* : *S x A x ǁ x S → ℝ*, where *P(s; a; t; s’)* indicates the probability
    of arriving in state *s’*, *t* time steps after choosing action *a* in state *s*.
    This is a discrete time SMDP, as time is expressed as a number of time steps.
    Continuous time SMDPs also exist, where *P* : *S x A x ǁ x S → ℝ*, but in general
    we will describe things here in the simpler discrete time case.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Next, the reward for an action *a* is no longer a single value given when the
    action is chosen, but instead represents the total reward accumulated from when
    the action is chosen to when the next state is reached. In terms of sub-tasks,
    that means that a chosen sub-policy could execute several actions, some or all
    of which receive some reward, and the total reward for choosing that sub-policy
    is the sum of those rewards.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The final change is in the discounting factor, ***γ***. This is now applied
    across the time delay, so that states that are not reached for a long time are
    discounted more than states that are reached quickly.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To illustrate all this, we’ll present an example case study using an REL.
  prefs: []
  type: TYPE_NORMAL
- en: 'REL in Aviation Case Study: unmanned or manned, with an injection of AI. In
    this example (Krishnamurthy, Harbour, & Clark 2019), the pilot and the REL agent
    learn flying skills simultaneously, forming a symbiotic relationship. The episodes
    for training the reinforcement learning agent can be simulated by a pilot flying
    in a simulator, or unmanned using a game on a computer. In a typical episode,
    the reinforcement learning agent provides a sequence of actions for the pilot
    to follow.'
  prefs: []
  type: TYPE_NORMAL
- en: These instructions produce one of the two types of state, either success or
    failure. The agent observes the psychological reaction of the pilot as well as
    the flight environment and receives a positive or a negative reward. The trained
    REL agent represents a novel form of AI that guides the pilot for various phases
    of flight.
  prefs: []
  type: TYPE_NORMAL
- en: Human error is causal to most aircraft accidents; consequently, technologies
    have emerged to issue warnings when the aircraft’s travel trajectory is irregular.
    For example, detecting the aircraft’s behavior is one way to measure the safety
    of the aircraft.
  prefs: []
  type: TYPE_NORMAL
- en: Continuous monitoring and analysis of flight operations is another approach
    to detect hazardous behavior from a pre-defined list. Li et al. (2016) have reported
    data-mining methods such as cluster analysis of digital flight data using Gaussian
    mixture models (GMMs) that are employed by safety analysts to identify unusual
    data patterns or anomalies and latent risks in daily operations. With the advent
    of artificial intelligence (AI), human-autonomy teaming can be an efficient way
    to minimize human error and further increase aviation safety records.
  prefs: []
  type: TYPE_NORMAL
- en: Zhao et al. (2018) have used reinforcement learning (REL) as an adaptive online
    learning model to identify common patterns in flight data and to update the clusters
    for GMM using a recursive expectation-maximization algorithm. The resurgence of
    interest in artificial intelligence has attracted applications in aviation systems,
    in particular, air-traffic management (ATM), air traffic flow management (ATFM),
    and unmanned aerial systems traffic management (UTM).
  prefs: []
  type: TYPE_NORMAL
- en: Kistan et al. (2018) have explored a cognitive human-machine interface (HMI),
    configured via machine learning, and examined the requirements. They postulated
    that increased automation and autonomy through AI will lead to certification requirements
    and discussed how ground-based ATM systems can be accommodated by the existing
    certification framework for aviation systems. The recent developments in AI open
    up possibilities in autonomous aviation for introducing a high level of safety
    by replacing a pilot’s actions with robotic functions, and further research on
    how AI can be incorporated into autonomous aviation is highly desirable.
  prefs: []
  type: TYPE_NORMAL
- en: Pilot-modeling technologies have played a crucial role in manned aviation, and
    control models of human pilot behavior have been developed. Control models are
    used to analyze the characteristics of the pilot–aircraft system for guidance
    in the flight-control system. Anthropomorphic models of human operators, which
    cover the central nervous system, neuromuscular system, visual system, and the
    vestibular system, can represent a pilot’s behavior.
  prefs: []
  type: TYPE_NORMAL
- en: Recently, Xu et al. (2017) have reviewed control models of human pilot behavior.
    These models reflect the dynamics of a human sensory and control effector that
    acts in response to a stimulus. AI in the form of computer vision can be coupled
    with these models to detect non-linear characteristics of human pilot behavior
    for training the REL agent.
  prefs: []
  type: TYPE_NORMAL
- en: Simulators for Emotion Recognition
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Flight simulators are routinely used both for training pilots and for evaluating
    war fighters’ preparedness for missions. Flight simulators have also been used
    in research studies on the relationship between emotional intelligence and simulated
    flight performance to understand how emotional factors affect flight-training
    performance. Pour et al. (2018) have used a human-robot facial expression reciprocal
    interaction platform to study the social interaction abilities of children with
    autism.
  prefs: []
  type: TYPE_NORMAL
- en: Reinforcement Deep Learning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Reinforcement learning is a type of semi-supervised learning inspired by the
    way animals learn, by way of being punished when things or the process or the
    choice made is incorrect or ends badly or being rewarded when things or the process
    or the choice made is correct or ends well. It relies on the definition of state
    space, actions for transitions between states, and an associated reward structure
    in a Markov decision process. In some of the simple forms of REL, one learns an
    optimal policy by evaluating the value functions V(*s*) or Q(*s,a*)-learning,
    where *s* is the current state and *a* is the action taken in state *(s)*, or
    temporal differences from episodes, which are example attempts by agents to reach
    the goal. In a game setting, the episodes can be either successful or unsuccessful
    attempts. The game-like situations are realized in many daily-life examples, including
    pilot attempts to fly an aircraft. The optimal policy is used to select action
    sequences to transition between states and to achieve the final goal while maximizing
    the long-term rewards.
  prefs: []
  type: TYPE_NORMAL
- en: Computer Vision System
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'It is also possible to design a computer vision system to capture the psychological
    reaction of a pilot undergoing training in a simulator. This helps ascertain the
    pilot’s reaction on a flight path following the pilot’s operational action. To
    train the REL agent, we design a flight simulator framework, which is like a game
    for the pilot to play using his or her actions, *a*, and expressing his or her
    gestures, which are representative of his or her actions in the simulator. We
    represent the gesture, *g*, as a two-state variable, with values *happy* (☺) or
    *unhappy* (☹). The state space of the flight simulator, *s*, consists of five
    variables: altitude, *A*, speed, *S*, heading, *H*, turn, *U*, and roll, *R*.
    Table [9-1](#Tab1) lists the range of these five action variables.'
  prefs: []
  type: TYPE_NORMAL
- en: Table 9-1
  prefs: []
  type: TYPE_NORMAL
- en: The Five Variables That Define the State s and Their Ranges
  prefs: []
  type: TYPE_NORMAL
- en: '| State Variable | Minimum | Maximum |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Altitude, A | 0 ft | 35,0000 ft |'
  prefs: []
  type: TYPE_TB
- en: '| Speed, S | 0 mph | 550 mph |'
  prefs: []
  type: TYPE_TB
- en: '| Heading, H | 0° | 360° |'
  prefs: []
  type: TYPE_TB
- en: '| Turn, U | 0° | 360° |'
  prefs: []
  type: TYPE_TB
- en: '| Roll, R | 0° | 360° |'
  prefs: []
  type: TYPE_TB
- en: Flight-Path Analysis
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A reliable flight-path analysis can be obtained by real-time computation of
    the gradients of state space variables, namely altitude gradient dA/dt, speed
    gradient dS/dt, heading gradient dH/dt, turn gradient dU/dt, and roll gradient
    dR/dt. A rule-based model compares the gradients with a predefined range to determine
    if the maneuver is safe or risky and calculate a dynamic reward. Table [9-2](#Tab2)
    shows the gradients and the initial guess values of their ranges. The minimum
    and maximum of the range can be set as tunable parameters so that a more practical
    set of values is achieved iteratively. These ranges will be used in a rule model
    to dynamically determine the reward for the flight maneuvers.
  prefs: []
  type: TYPE_NORMAL
- en: Table 9-2
  prefs: []
  type: TYPE_NORMAL
- en: Ranges of Gradients of the State Variables That Define the Safe Operational
    Zone
  prefs: []
  type: TYPE_NORMAL
- en: '| Gradient of State Variable | Minimum | Maximum |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Altitude gradient, dA/dt | 0 ft | 1,000 ft |'
  prefs: []
  type: TYPE_TB
- en: '| Speed gradient, dS/dt | 0 mph | 20 mph |'
  prefs: []
  type: TYPE_TB
- en: '| Heading gradient, dH/dt | 0° | 3° |'
  prefs: []
  type: TYPE_TB
- en: '| Turn gradient, dU/dt | 0° | 3° |'
  prefs: []
  type: TYPE_TB
- en: '| Roll gradient, dR/dt | 0° | 2° |'
  prefs: []
  type: TYPE_TB
- en: Pilot’s Gesture Assignment
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A computer vision system can consist of a digital video camera, a neural processing
    unit such as Myriad 2, and a single board computer to read the pilot’s gestures.
    The computer vision system can be trained using a face-detection machine learning
    algorithm for real-time monitoring of the “happy” or “unhappy” facial expression
    of the pilot. The agents who play the game of flying the plane in the simulator
    are particularly advised to show a happy gesture (☺) when their actions result
    in a safe operation and an unhappy gesture (☹) when their actions result in a
    risky, unsafe, or catastrophic operation. The computer vision system can be as
    simple as a Google AIY kit, which operates with a TensorFlow machine learning
    model to detect a smile.
  prefs: []
  type: TYPE_NORMAL
- en: 'Reinforcement Learning Agent: Learning from Pilot’s Actions'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We first consider a human-in-the-loop approach to develop an REL agent that
    can use artificial intelligence to determine a human pilot’s gesture and calculate
    rewards. This type of reinforcement learning agent is trained with episodes that
    are generated when a pilot is flying an aircraft in a simulator; i.e., on a computer.
    In a typical episode, the REL agent provides a sequence of actions for the pilot
    to follow. These instructions produce one of two results, either success or failure.
    The agent observes the psychological reaction of the pilot as well the flight
    environment and receives a positive or negative reward. The agent receives a +1
    reward when the pilot’s gesture is “happy” and a -1 reward when the pilot’s gesture
    is “unhappy.” For example, the same set of episodes can be trained with different
    reward structures to find out an optimal set for safe operations. The training
    process is repeated until convergence of the learning process is achieved. After
    training the agent using a sufficiently large number of episodes, the knowledge
    acquired by the REL agent is expected to represent a novel form of AI that directs
    the pilot with accurate instructions for various phases of flight. Figure [9-1](#Fig1)
    shows a learning framework of an REL agent and its interactions with the flight
    simulator and the computer vision system that detects the pilot’s gesture for
    receiving rewards to update the *Q*(*s,a*) function, where *s* is the current
    state and *a* is the action, and the policy is *π*(*s,a*).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/494112_1_En_9_Chapter/494112_1_En_9_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A flowchart of R E L has the components in 2 columns. Flight simulator dynamics
    and pilot actions on the left and right, respectively, have a double-headed arrow
    between them. Pilot actions point to is the pilot happy? No, reward equals minus
    1\. Yes, reward equals plus 1 in the left column. Reward points to R L agent,
    Q; s, a, pi of s, a below it.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 9-1
  prefs: []
  type: TYPE_NORMAL
- en: A framework for the reinforcement learning (REL) agent and its interactions
    with its environment, consisting of the flight simulator and the pilot’s gesture-recognition
    system
  prefs: []
  type: TYPE_NORMAL
- en: Flight Simulator Game Framework
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Figure [9-2](#Fig2) shows a game framework in a flight simulator for generating
    the states, actions, rewards, *Q* function, and policy. The flight simulator game
    framework has an additional local reward and a long-term reward compared to the
    reward structure of the REL agent. The game REL agent in the flight simulator
    game framework receives as additional reward of -1 for each instance of a state
    variable’s gradient falling outside the safe range. An optional long-term reward
    of +2 is also awarded to the game REL agent when the total time taken to reach
    the destination is below a preset value. The REL agent will receive a reward of
    +1 when all of the state variable’s derivatives are within the safe range. The
    choice of rewards is arbitrary and can evolve to a more realistic one based on
    various episodes. A game simulator module initiates the game by extracting actions,
    using the current policy to simulate the flight dynamics. Then, two other modules
    evaluate the flight dynamics and the gesture of the pilot to identify the rewards.
    Then, the *Q*(*s,a*) function is calculated and updated for each state–action
    pair and the associated reward. The policy *π*(*s,a*) is then recalculated from
    the *Q*(*s,a*) values and updated.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/494112_1_En_9_Chapter/494112_1_En_9_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'A flowchart of a flight simulator game has the following steps. Initial state:
    s. Action: a, next state: s prime. Simulate dynamics. Evaluate dynamics. Identity
    reward. Game R L agent with the components calculate Q of s, a, and update policy,
    pi of s, a. Game R L agent points to policy: pi of s, a that points to initial
    state and next state.'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 9-2
  prefs: []
  type: TYPE_NORMAL
- en: The game framework for flight simulator as a game for obtaining the states,
    actions, rewards, Q function, and policy
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter presented a novel theme of aviation with the injection of AI in
    the form of an REL agent that learns flying skills by observing the pilot’s psychological
    reaction and flight path in a simulator. A unique feature of this AI framework
    is that the pilot and the REL agent learn flying skills simultaneously, forming
    a symbiotic relationship.
  prefs: []
  type: TYPE_NORMAL
- en: In this context, identifying suitable methods for detecting pilot behavior is
    key to developing an AI based on reinforcement learning. With sufficient training
    within the proposed framework, the REL agent is expected to learn to fly the aircraft
    as well as to guide the pilot for safe aviation.
  prefs: []
  type: TYPE_NORMAL
