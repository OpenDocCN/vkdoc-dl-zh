  zh: 温度为0时，生成的文本纠正了上一版中发现的多数错误。例如，它看起来像是一个完整的句子，以大写字母开头，甚至还有意义。但是，它更好吗？在某种意义上，是的。然而，在我看来，它并不像其他的那样令人惊讶。对于其他例子，请参阅表[9-1](#Tab1)。我建议尝试相同的种子来发现你的结果与我的有何不同。最后，如果你想得到更短或更长的文本，请更改长度属性。享受吧！
