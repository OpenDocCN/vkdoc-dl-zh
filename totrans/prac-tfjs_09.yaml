- en: 'Test case #2'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: '测试案例 #2'
- en: '![../images/494424_1_En_9_Chapter/494424_1_En_9_Fig10_HTML.jpg](../images/494424_1_En_9_Chapter/494424_1_En_9_Fig10_HTML.jpg)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
  zh: '![../images/494424_1_En_9_Chapter/494424_1_En_9_Fig10_HTML.jpg](../images/494424_1_En_9_Chapter/494424_1_En_9_Fig10_HTML.jpg)'
- en: Figure 9-10
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-10
- en: Loss value during training
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 训练过程中的损失值
- en: Way better than the last model. In all figures, the predicted forecast is very
    close to the actual one. If you look at the y-axis, you will see that the difference
    between the values is less than 0.01—a very accurate prediction.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 比上一个模型好得多。在所有图表中，预测的预报值与实际值非常接近。如果你看y轴，你会看到数值之间的差异小于0.01——这是一个非常准确的预测。
- en: Generating text using a pre-trained LSTM with ml5.js
  id: totrans-129
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用ml5.js预训练的LSTM生成文本
- en: A task where recurrent neural networks are great and shine at is text generation.
    If you look online or in the literature for RNNs’ generative examples, you will
    be surprised by the number of unique, funny, and original applications people
    have developed. Some create lyrics, other musical chords, movie scripts, source
    code, and text that mirrors the writing style of classic authors of old, as we
    will do in this exercise.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 循环神经网络在文本生成任务上表现出色。如果你在网上或文献中查找 RNN 的生成示例，你会惊讶于人们开发出的独特、有趣和原创的应用数量。有些人创作歌词，其他人创作音乐和弦，电影剧本，源代码，以及模仿古典作家写作风格的文本，就像我们在这次练习中要做的那样。
- en: Training these networks is not trivial. Behind them are an extensive architecture,
    an even larger training set, and a considerable amount of computational resources
    poured into it. As a result, we will skip the training on this one, not only because
    of the length or its complexity but also to have the chance of using a “battle-tested”
    model able to generate coherent text.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 训练这些网络并不简单。它们背后是一个庞大的架构，一个更大的训练集，以及大量的计算资源投入其中。因此，我们将跳过这次训练，不仅因为其长度或复杂性，还为了有机会使用一个“经过实战检验”的模型，能够生成连贯的文本。
- en: The model we will use is a pre-trained one provided by the ml5.js library. On
    its models’ repository,^([1](#Fn1)) you can find several LSTM models trained on
    corpora containing the works of writers like *Shakespeare* and *Hemingway*. For
    this example, I will use the Shakespeare model. However, you can choose another
    one. The app itself is our simplest yet. Its purpose? Generating. The interface
    (Figure [9-14](#Fig14)) consists of one text field used to write the model “seed,”
    an initial piece of text from which the model generates its text. Also, there
    is an input slider that sets the prediction **temperature** , a value between
    0 and 1 that controls the generated text “randomness.” A low-temperature prediction
    gives a more “conservative” or confident output, while a high temperature produces
    more “creative” content (Karpathy, 2015).
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用的是 ml5.js 库提供的预训练模型。在其模型库中，^([1](#Fn1)) 你可以找到几个在包含莎士比亚和海明威等作家作品的语料库上训练的
    LSTM 模型。在这个例子中，我将使用莎士比亚模型。然而，你也可以选择另一个。这个应用程序本身是最简单的。它的目的是生成。界面（图 [9-14](#Fig14)）由一个用于写入模型“种子”的文本字段组成，这是一个初始文本片段，模型从中生成文本。还有一个输入滑块，用于设置预测
    **温度**，这是一个介于 0 和 1 之间的值，用于控制生成文本的“随机性”。低温预测会产生更“保守”或自信的输出，而高温则会产生更多“创意”的内容（Karpathy，2015）。
- en: '![../images/494424_1_En_9_Chapter/494424_1_En_9_Fig14_HTML.jpg](../images/494424_1_En_9_Chapter/494424_1_En_9_Fig14_HTML.jpg)'
  id: totrans-133
  prefs: []
  type: TYPE_IMG
  zh: '![../images/494424_1_En_9_Chapter/494424_1_En_9_Fig14_HTML.jpg](../images/494424_1_En_9_Chapter/494424_1_En_9_Fig14_HTML.jpg)'
- en: Figure 9-14
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-14
- en: A screenshot of the app. The box on top is the seed input, and the text below,
    the generated text
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 应用程序的截图。顶部的框是种子输入，下面的文本是生成的文本
- en: Developing the app
  id: totrans-136
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 开发应用程序
- en: 'Start by cloning the ml5.js models’ repository, available here: [`https://github.com/ml5js/ml5-data-and-models`](https://github.com/ml5js/ml5-data-and-models).
    While it clones, create a directory named *ml5js-text-generation*. When the download
    finishes, go to the *models/lstm/* directory and copy the “shakespeare” directory
    to your working directory. Then create the *index.html* and *index.js* files.'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，从这里克隆 ml5.js 模型库的仓库：[ml5.js 模型库](https://github.com/ml5js/ml5-data-and-models)。在克隆的同时，创建一个名为
    *ml5js-text-generation* 的目录。下载完成后，前往 *models/lstm/* 目录，并将“shakespeare”目录复制到你的工作目录。然后创建
    *index.html* 和 *index.js* 文件。
- en: 'Since the app code is minimal, I will present its entirety in this section,
    starting with *index.html*:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 由于应用程序代码非常简洁，我将在此节中展示其全部内容，从 *index.html* 开始：
- en: '[PRE17]'
  id: totrans-139
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: 'The HTML’s body has five main elements: a range for setting the temperature,
    a `<p>` for displaying it, a `<textarea>` for defining the seed, a button to predict,
    and another `<p>` to display the generated text. That’s the complete file—you
    may close it and open *index.js*.'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: HTML 的主体包含五个主要元素：一个用于设置温度的滑块，一个 `<p>` 元素用于显示它，一个 `<textarea>` 用于定义种子，一个预测按钮，以及另一个
    `<p>` 元素用于显示生成的文本。这就是完整的文件——你可以关闭它并打开 *index.js*。
- en: 'In the first lines of *index.js*, declare a variable `model` and `temperature`:'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 在 *index.js* 的前几行中，声明一个变量 `model` 和 `temperature`：
- en: '[PRE18]'
  id: totrans-142
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: 'After them, create the function `processInput()`. In the function, use `getElementById()`
    to get the “predict” button and the output `<p>` element. To the button, assign
    a click event listener that gets the seed from the text area and uses it as one
    attribute of `model.generate()`, the method that generates this text. Besides
    the seed, use the `temperature` attribute and `length` to set the temperature
    and the desired length of the generated sequence. This example uses a length of
    100, but you may adjust it to your liking. `model.generate()` has an optional
    callback that executes when the model generates the sequence. Use it to assign
    the generated content to the `<textarea>` element:'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，创建`processInput()`函数。在函数中，使用`getElementById()`获取“预测”按钮和输出`<p>`元素。为此按钮分配一个点击事件监听器，从文本区域获取种子并将其用作`model.generate()`方法的一个属性，该方法生成此文本。除了种子外，使用`temperature`属性和`length`设置温度和所需序列的长度。本例使用长度为100，但你可以根据自己的喜好进行调整。`model.generate()`有一个可选的回调，在模型生成序列时执行。使用它将生成的内容分配给`<textarea>`元素：
- en: '[PRE19]'
  id: totrans-144
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: 'To get the slider’s value, use the same `updateSliders()` function from Chapter
    [7](494424_1_En_7_Chapter.xhtml). In its callback, update the `temperature` value:'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 要获取滑块的值，使用第[7](494424_1_En_7_Chapter.xhtml)章中的相同`updateSliders()`函数。在其回调中，更新`temperature`值：
- en: '[PRE20]'
  id: totrans-146
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: 'Last comes the `init()` function . Here, call `ml5.charRNN()` and use as its
    argument the path to the model and a callback that prints “Model loaded” once
    it loads. After this line, call `updateSlider()` and `processInput()`:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 最后是`init()`函数。在这里，调用`ml5.charRNN()`并将其路径和加载后打印“模型已加载”的回调函数作为其参数。在这行之后，调用`updateSlider()`和`processInput()`：
