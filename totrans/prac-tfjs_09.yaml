  zh: 我对经典英国文学了解不多，但我会说它听起来非常经典和戏剧性（至少是我能从文本中辨认出的词语）。但是，总的来说，它并不是一篇优秀的文本。它缺乏连贯性、结构和正确的语法。诚然，这是一句有趣且独特的阅读语句。但是，如果我们把温度降低到0呢？看看你自己吧：
