- en: '![../images/494424_1_En_9_Chapter/494424_1_En_9_Fig11_HTML.jpg](../images/494424_1_En_9_Chapter/494424_1_En_9_Fig11_HTML.jpg)'
  id: totrans-122
  prefs: []
  type: TYPE_IMG
  zh: '![../images/494424_1_En_9_Chapter/494424_1_En_9_Fig11_HTML.jpg](../images/494424_1_En_9_Chapter/494424_1_En_9_Fig11_HTML.jpg)'
- en: Figure 9-11
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
