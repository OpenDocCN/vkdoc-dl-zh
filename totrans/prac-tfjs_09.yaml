- en: 9. Time series forecasting and text generation with recurrent neural networks
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 9. 使用循环神经网络进行时间序列预测和文本生成
- en: Think of your morning routine. You wake up, grab your phone, and check your
    messages, emails, and others. Minutes after, you go to the bathroom, take a shower,
    and brush your teeth (maybe while showering?). After those blissful minutes under
    the water, you get breakfast, probably a coffee, and get ready to seize the day.
    Those are the basics. Now, look back at this list and tell me, does it resemble
    a **sequence**? It sure looks like one. If so, would it be possible to predict
    the next step(s) using past actions as the predictors? With the right model, yes.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 想想你的早晨例行程序。你醒来，拿起手机，查看消息、电子邮件和其他内容。几分钟之后，你去洗手间，洗澡，刷牙（也许在洗澡时？）。在那段美好的水下时光之后，你吃早餐，可能是一杯咖啡，然后准备迎接新的一天。这些都是基础。现在，回顾这个列表，告诉我，它看起来像是一个**序列**吗？确实看起来像。如果是这样，能否使用过去的行为作为预测因素来预测下一步或几步呢？有了正确的模型，是的。
- en: A machine learning architecture capable of predicting or anticipating the future
    is the **recurrent neural network** (RNN). These networks take as input a sequence
    of arbitrary length and try to predict the next action. Generally speaking, RNNs
    can predict many steps in the future, allowing us to know not just what comes
    after current timestep *t* but also what follows *t*, a feature that serves to
    do forecasting and to generate sequences. This latest point makes RNN an excellent
    architecture for natural language processing applications. As we will soon see,
    RNNs can memorize order, making them suitable at identifying parts of a sentence,
    translation, and even generating creative content. For example, if you feed an
    RNN with a dataset made of lyrics of your favorite artist, it could learn how
    to create songs that follow the same pattern or style as the input data. Other
    RNN applications include identifying spam users using a sequence of events (Jugel
    et al., 2019), traffic forecasting (Zhao et al., 2017), and analyzing time series
    data, as we will do here.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 能够预测或预测未来的机器学习架构是**循环神经网络**（RNN）。这些网络以任意长度的序列作为输入，并试图预测下一个动作。一般来说，RNNs 可以预测未来的多个步骤，使我们不仅知道当前时间步
    *t* 之后会发生什么，还能知道 *t* 之后会发生什么，这一特性有助于进行预测和生成序列。这一点使得 RNN 成为自然语言处理应用的优秀架构。正如我们很快就会看到的，RNNs
    可以记住顺序，这使得它们适合于识别句子的部分、翻译，甚至生成创意内容。例如，如果你用一个由你最喜欢的艺术家的歌词组成的语料库来喂一个 RNN，它就可以学会如何创建与输入数据具有相同模式或风格的歌曲。其他
    RNN 应用包括使用事件序列识别垃圾邮件用户（Jugel 等人，2019 年）、交通预测（赵等人，2017 年）以及分析时间序列数据，正如我们将在这里所做的那样。
- en: In the first part of this chapter, we will go through the steps of creating
    and training two recurrent neural networks to do **time series forecasting** using
    the steps dataset introduced earlier in the book. The first RNN forecasts a single
    point in the future, while the second forecasts multiple steps. Then, we will
    create a second app that loads an ml5.js’ RNN trained on a corpus of Shakespeare’s
    works to **generate** “Shakespeare-like” texts.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章的第一部分，我们将通过创建和训练两个循环神经网络来介绍使用本书前面介绍的时间序列数据集进行**时间序列预测**的步骤。第一个 RNN 预测未来的一个点，而第二个
    RNN 预测多个步骤。然后，我们将创建第二个应用程序，该应用程序加载一个在莎士比亚作品语料库上训练的 ml5.js RNN，以**生成**“莎士比亚风格”的文本。
- en: Understanding RNN and LSTM
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解 RNN 和 LSTM
- en: To understand the idea behind a sentence, you, the reader, must have understood
    the words that came before. Do you agree?
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 要理解一个句子的含义，你必须，作为读者，理解之前的单词。你同意吗？
- en: As we read, we inadvertently connect the meaning of the current word with the
    past ones to comprehend what the complete text says. In other words, the data
    we just read does not vanish from our heads—we preserve it. Recurrent neural networks
    do this too. Unlike other artificial neural networks, RNNs have the capability
    of persisting information inside them.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在阅读时，我们不自觉地会将当前单词的意义与之前的单词联系起来，以理解整个文本的含义。换句话说，我们刚刚阅读的数据并没有从我们的脑海中消失——我们保留了它。循环神经网络也这样做。与其他人工神经网络不同，RNNs
    有能力在其内部持续信息。
- en: 'The networks we have used so far share the characteristic that the activations
    (tensors) flow in one direction: forward. For instance, in an epoch of a CNN training,
    the data flows from a convolutional layer to a max pooling layer. RNNs are not
    like this. Their basic unit, a recurrent neuron, has an input that connects back
    to the neuron, creating a loop in which the neuron sends outputs back to itself.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我们迄今为止使用的网络具有这样一个特征：激活（张量）单向流动：正向。例如，在一个CNN训练的epoch中，数据从卷积层流向最大池化层。RNN不是这样的。它们的基本单元，一个循环神经元，有一个连接回神经元的输入，创建了一个循环，其中神经元将输出发送回自己。
- en: Figure [9-1](#Fig1) presents an example of a simple recurrent neuron, where
    *x* is the input and *y* the output. At each timestep *t* of the training, the
    node receives an input *X*^(*t*) (the sequence) and the output from the previous
    time step *t* − 1 (see the loop?) to produce a new output *y*^(*t*). As a result,
    because of this iterative behavior, the neuron outputs become a function of the
    past ones. So, we could say that this function has an internal state (or memory)
    denoted by *h* and mathematically defined as *h*^(*t*) = *f*(*h*^((*t* − 1)),
    *x*^(*t*)).
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [9-1](#Fig1) 展示了一个简单的循环神经元的例子，其中 *x* 是输入，*y* 是输出。在训练的每个时间步 *t*，节点接收一个输入 *X*^(*t*)（序列）和前一个时间步
    *t* − 1 的输出（看那个循环吗？）以产生一个新的输出 *y*^(*t*)。因此，由于这种迭代行为，神经元的输出变成了过去输出的函数。所以，我们可以这样说，这个函数有一个内部状态（或记忆），用
    *h* 表示，并在数学上定义为 *h*^(*t*) = *f*(*h*^((*t* − 1)), *x*^(*t*)).
- en: '![../images/494424_1_En_9_Chapter/494424_1_En_9_Fig1_HTML.jpg](../images/494424_1_En_9_Chapter/494424_1_En_9_Fig1_HTML.jpg)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
  zh: '![../images/494424_1_En_9_Chapter/494424_1_En_9_Fig1_HTML.jpg](../images/494424_1_En_9_Chapter/494424_1_En_9_Fig1_HTML.jpg)'
- en: Figure 9-1
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-1
- en: A recurrent neuron
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 循环神经元
- en: Pop quiz time. Let me ask, do you remember the first sentence of this section?
    (Please say no because otherwise the example will not work). Right? I do not remember
    it either. It’s been quite some time since we read it, and thus we forgot about
    it. Recurrent neural networks also experience this problem. The longer the sequence
    is, the harder it is for the network to remember what came first. Simply said,
    it becomes harder to keep “long-term dependencies” (Bengio et al., 1994).
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 快速问答时间。让我问一下，你还记得本节的第一句话吗？（请说“不记得”，否则示例将无法工作）。对吧？我也不记得了。自从我们阅读它以来已经有一段时间了，所以我们忘记了它。循环神经网络也遇到这个问题。序列越长，网络记住最初发生的事情就越困难。简单来说，保持“长期依赖性”（Bengio
    et al., 1994）就变得更加困难。
- en: To address this drawback, in 1997, *Sepp Hochreiter* and *Jürgen Schmidhuber*
    introduced an RNN architecture named “Long Short-Term Memory” or LSTM (Hochreiter
    & Schmidhuber, 1997). The details of the algorithm are well beyond the scope of
    the book. However, to get an idea, let’s briefly review its principal feature.
    Simply said, an LSTM is a cell (we can also call it node) that remembers by keeping
    data within it. To regulate what information it preserves, that is, what is added
    and what is removed, it uses three units known as **gates**.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个缺点，1997年，*Sepp Hochreiter* 和 *Jürgen Schmidhuber* 引入了一种名为“长短期记忆”或LSTM的RNN架构（Hochreiter
    & Schmidhuber, 1997）。算法的细节远远超出了本书的范围。然而，为了获得一个概念，让我们简要回顾其主要特征。简单来说，LSTM是一个细胞（我们也可以称之为节点），通过在其中保持数据来记住。为了调节它保留的信息，即添加和删除什么，它使用三个称为**门**的单元。
- en: 'An LSTM cell has three gates: the *forget*, *input*, and *output* gates. The
    forget gate decides what information gets discarded from the cell. Conversely,
    the input gate controls what data enters the cell, and the output gate decides
    whether the value in the cell is to be used when calculating the unit’s output.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: LSTM单元有三个门：*遗忘*门、*输入*门和*输出*门。遗忘门决定从细胞中丢弃哪些信息。相反，输入门控制什么数据进入细胞，输出门决定当计算单元的输出时是否使用细胞中的值。
- en: For a complete explanation of LSTM and RNN, refer to the book *Deep Learning*
    by Goodfellow et al.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 对于LSTM和RNN的完整解释，请参阅Goodfellow等人所著的《深度学习》一书。
- en: About the data
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关于数据
- en: The forecasting app uses a modified version of the steps’ dataset used in Chapter
    [1](494424_1_En_1_Chapter.xhtml). This dataset contains the (normalized) number
    of steps I took from July 9, 2019, to July 31, 2019, grouped in 15-minute intervals.
    Its shape is [933, 61], where the first 60 columns are the steps taken at an arbitrary
    timestep *t*, all the way to timestep *t* + 59, and each row is a sequence. So,
    we have a sequence of 60 values. The last column is the target value we want to
    forecast in the first RNN. For the second RNN, we will use a different shape.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 预测应用程序使用的是第 [1](494424_1_En_1_Chapter.xhtml) 章中使用的步数数据集的修改版。这个数据集包含了我从 2019
    年 7 月 9 日到 2019 年 7 月 31 日期间的（归一化）步数，按 15 分钟间隔分组。其形状是 [933, 61]，其中前 60 列是在任意时间步长
    *t* 所走的步数，一直到最后一个时间步长 *t* + 59，每一行是一个序列。因此，我们有一个包含 60 个值的序列。最后一列是我们想要在第一个 RNN
    中预测的目标值。对于第二个 RNN，我们将使用不同的形状。
- en: For context, Figure [9-2](#Fig2) illustrates the original dataset. On the x-axis
    is the timestep *t*, and on the y-axis, the footsteps taken in that interval.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 为了便于理解，图 [9-2](#Fig2) 展示了原始数据集。x 轴是时间步长 *t*，y 轴是那个时间间隔内所走的步数。
- en: '![../images/494424_1_En_9_Chapter/494424_1_En_9_Fig2_HTML.jpg](../images/494424_1_En_9_Chapter/494424_1_En_9_Fig2_HTML.jpg)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![../images/494424_1_En_9_Chapter/494424_1_En_9_Fig2_HTML.jpg](../images/494424_1_En_9_Chapter/494424_1_En_9_Fig2_HTML.jpg)'
- en: Figure 9-2
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-2
- en: The dataset
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集
- en: Building RNNs for time series forecasting
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建用于时间序列预测的 RNN
- en: The chapter’s first application is a web app that trains an LSTM to forecast
    the time step *t* + 1 of a sequence. This application, and the code, follows a
    similar structure to those done in the first chapters of the book. It loads the
    data, constructs the model, trains it, and visualizes the training stage using
    tfjs-vis. To test the model, we will use a separate test dataset made of eight
    testing cases. The testing involves visualizing the sample sequences, their predicted
    value, and actual value. To create this plot, you will use Plotly.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的第一个应用是一个训练 LSTM 来预测序列时间步长 *t* + 1 的 web 应用程序。这个应用程序和代码的结构与书中第一章节中完成的结构相似。它加载数据，构建模型，训练它，并使用
    tfjs-vis 可视化训练阶段。为了测试模型，我们将使用一个包含八个测试用例的单独测试数据集。测试涉及可视化样本序列、预测值和实际值。为了创建此图，你将使用
    Plotly。
- en: Ready? Let’s go. We will start by creating a directory, and inside it, create
    a second one named “time-series.” Then create the *index.html*, *index.js*, and
    *style.css* files.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 准备好了吗？让我们开始吧。我们首先创建一个目录，然后在其中创建一个名为“time-series”的第二个目录。接着创建 *index.html*、*index.js*
    和 *style.css* 文件。
- en: Preparing the app’s interface
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 准备应用程序的界面
- en: Figure [9-3](#Fig3) presents a screenshot of the app.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [9-3](#Fig3) 展示了应用程序的屏幕截图。
- en: '![../images/494424_1_En_9_Chapter/494424_1_En_9_Fig3_HTML.jpg](../images/494424_1_En_9_Chapter/494424_1_En_9_Fig3_HTML.jpg)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![../images/494424_1_En_9_Chapter/494424_1_En_9_Fig3_HTML.jpg](../images/494424_1_En_9_Chapter/494424_1_En_9_Fig3_HTML.jpg)'
- en: Figure 9-3
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-3
- en: The app. On the top part are the training visualizations and at the lower part,
    the test cases
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 应用程序。在顶部是训练可视化，在底部是测试用例。
- en: 'It has a button that starts the training, a canvas holding the tfjs-vis plots
    (no visor this time), the test case buttons, and the Plotly visualization presenting
    the data. The following is the complete HTML:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 它有一个启动训练的按钮，一个包含 tfjs-vis 图表的 canvas（这次没有 visor），测试用例按钮，以及展示数据的 Plotly 可视化。以下是完全的
    HTML：
- en: '[PRE0]'
  id: totrans-31
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: First, we have the `<head>` node loading the required packages. Following it
    is the body, made up of one large `<div>` with three `<h2>` headers, the “Train!”
    button, the canvas for the tfjs-vis graphs, and the divisions for the test buttons
    and the Plotly plot. At the bottom is the script tag that loads the *index.js*
    script. Copy this code into *index.html*.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们有加载所需包的 `<head>` 节点。接着是主体部分，由一个包含三个 `<h2>` 标题、一个“Train!”按钮、tfjs-vis 图表的
    canvas 以及测试按钮和 Plotly 图表的 divisions 的大型 `<div>` 组成。底部是加载 *index.js* 脚本的 script
    标签。将此代码复制到 *index.html* 中。
- en: 'In the styling department, add the following CSS into *style.css*:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在样式方面，将以下 CSS 添加到 *style.css* 中：
- en: '[PRE1]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: If you wish to see how it looks, start a local server using *http-server* on
    the project’s directory and access the address provided. Once done, close *index.html*
    and prepare yourself to transform the dataset.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想看看它的样子，请在项目的目录下使用 *http-server* 启动本地服务器，并访问提供的地址。完成后，关闭 *index.html* 并准备好转换数据集。
- en: Transforming the dataset
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 转换数据集
- en: Even though the dataset is already pre-processed, you need to do further work
    on it to transform it into a format compatible with the LSTM. As before, we will
    use the function `tf.data.csv()` to load the CSV dataset as a `tf.data.Dataset`
    object. But RNNs do not use this format. They require a tensor of rank 3 with
    shape (`batch_size`, `timesteps`, `input_dim`), where `batch_size` is the number
    of examples, `timesteps` the length of the sequence, and `input_dim` the number
    of features. In our case, with the dataset we have at hand, the batch size should
    be 933 (but let’s use 900 since it is a nice round number), `timesteps` 60, and
    `input_dim` 1, because we are only using one sequence feature (the number of steps).
    In conclusion, the shape of the input tensor should be [900, 60, 1]. How do we
    do this in code? Open *index.js* and follow me.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管数据集已经预处理过，但你还需要进一步处理它，以便将其转换为与LSTM兼容的格式。和之前一样，我们将使用`tf.data.csv()`函数将CSV数据集加载为`tf.data.Dataset`对象。但是RNN不使用这种格式。它们需要一个形状为（`batch_size`，`timesteps`，`input_dim`）的3阶张量，其中`batch_size`是示例数量，`timesteps`是序列长度，`input_dim`是特征数量。在我们的情况下，使用我们手头的数据集，批大小应该是933（但让我们使用900，因为它是一个很好的整数），`timesteps`
    60，`input_dim` 1，因为我们只使用一个序列特征（步数）。总之，输入张量的形状应该是[900, 60, 1]。我们如何在代码中做到这一点？打开*index.js*并跟我来。
- en: 'Start by defining the following variables at the top of the file:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，在文件顶部定义以下变量：
- en: '[PRE2]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: The first two are the paths to the training and test dataset. You can either
    use the remote version of the datasets or the version located in the book’s repository
    (directory *9/time-series/data/*). Then come `TIMESTEPS`, the datasets’ sizes,
    and the model.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 前两个是训练集和测试集的路径。你可以使用数据集的远程版本或者位于书籍仓库（目录*9/time-series/data/*）中的版本。然后是`TIMESTEPS`，数据集的大小和模型。
- en: 'Next, create a function that loads both the training and test datasets:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，创建一个函数来加载训练集和测试集：
- en: '[PRE3]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Followed by a second one responsible for preparing the dataset:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 然后是第二个负责准备数据集的函数：
- en: '[PRE4]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '`prepareDataset()` has two parameters, `dataset` (a `tf.data.Dataset` object)
    and `size`, the length of the dataset. It starts with calls to `tf.buffer()` to
    create two `TensorBuffers`—a mutable object that you can insert values to before
    converting it to a tensor—that you will use to assign the sequence data to `sequences`
    (a rank 3 tensor) and the target values (what we want to predict) to `targets`
    (a rank 2 value). The function uses two loops to set the values in the buffers.
    The inner loop which iterates over each element of a single sequence (one row)
    sets these values to the sequence buffer, while the other one sets the target
    value. This method `set()` sets a value at a given location. In both cases, the
    last argument of `set()` is 0 because the last dimension of the buffer is of size
    1\. `prepareDataset()` returns an object where the key `xs` is the sequence tensor
    and `ys` the targets. And just like that, the LSTM is ready to accept the data!'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '`prepareDataset()`有两个参数，`dataset`（一个`tf.data.Dataset`对象）和`size`，数据集的长度。它首先调用`tf.buffer()`来创建两个`TensorBuffers`——一个可变对象，你可以在将其转换为张量之前向其中插入值——你将使用它们将序列数据分配给`sequences`（一个3阶张量）和目标值（我们想要预测的值）分配给`targets`（一个2阶值）。该函数使用两个循环来设置缓冲区中的值。内循环遍历单个序列（一行）的每个元素，将这些值设置到序列缓冲区中，而外循环设置目标值。这个`set()`方法在给定位置设置一个值。在这两种情况下，`set()`的最后一个参数是0，因为缓冲区的最后一个维度的大小是1。`prepareDataset()`返回一个对象，其中键`xs`是序列张量，`ys`是目标。就这样，LSTM已经准备好接受数据了！'
- en: 'Before proceeding to the next section, let’s run the app and verify that it
    works. So, under `prepareDataset()`, create an `init()` function and call `loadData()`
    and `prepareDataset()` twice to prepare the training and test datasets. To double-check
    their shapes, use `console.log(train.xs.shape), console.log(set.xs.shape).` Their
    respective values should be [900, 60, 1] and [8, 60, 1]:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 在进入下一节之前，让我们运行一下这个应用并验证它是否正常工作。因此，在`prepareDataset()`下创建一个`init()`函数，并调用`loadData()`和`prepareDataset()`两次来准备训练集和测试集。为了双重检查它们的形状，使用`console.log(train.xs.shape),
    console.log(set.xs.shape).`它们各自的值应该是[900, 60, 1]和[8, 60, 1]：
- en: '[PRE5]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Back at the browser, hit the refresh button to reload the app. Open the developer
    console and verify that the shape is the same as the one earlier.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 回到浏览器，点击刷新按钮重新加载应用。打开开发者控制台并验证形状是否与之前相同。
- en: Designing the model and training it
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 设计模型并进行训练
- en: 'Time for the fun part (I know I keep saying that): creating the model. This
    forecasting model is a small recurrent neural network of one LSTM layer of 32
    cells and a dense layer of one unit:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 到了有趣的部分（我知道我一直在说这个）：创建模型。这个预测模型是一个包含 32 个单元的单层 LSTM 循环神经网络和一个单元的密集层：
- en: '[PRE6]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: The preceding example is `defineModel()` , responsible for constructing and
    compiling the model. The initial line creates an instance of a Sequential model.
    Next are the layers, starting with the LSTM. Since it is the model’s initial layer,
    it specifies the `inputShape`, whose value is the shape of the training dataset’s
    last two dimensions. A second hyperparameter we need to define is `units`, which
    refers to the LSTM cells. The last attribute of the layer is `returnSequences`,
    a property of the RNN-related layers. This attribute specifies whether to return
    the last output of the sequence or the entire sequence. By default, its value
    is `false`, but for demonstration, let’s explicitly define it.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 前面的例子是 `defineModel()`，负责构建和编译模型。第一行创建了一个 Sequential 模型的实例。接下来是层，从 LSTM 开始。由于它是模型的初始层，因此指定了
    `inputShape`，其值是训练数据集最后两个维度的形状。我们需要定义的第二个超参数是 `units`，它指的是 LSTM 单元。层的最后一个属性是 `returnSequences`，这是与
    RNN 相关层的属性。此属性指定是否返回序列的最后一个输出或整个序列。默认情况下，其值为 `false`，但为了演示，让我们明确地定义它。
- en: Then, we compile. On this occasion, use the mean squared error loss function
    since the target output is a continuous variable. As for the optimizer, use Adam.
    Model finished!
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们进行编译。在这种情况下，使用均方误差损失函数，因为目标输出是一个连续变量。至于优化器，使用 Adam。模型完成！
- en: 'On to the training. Under the previous function, create a new one named `trainModel()`
    with one parameter `trainingSet`. In the function, use `getElementById()` to get
    the canvas element that holds the tfjs-vis visualizations. After, call `model.fit()`
    using `trainingSet.xs` and `trainingSet.ys` as the first two arguments and a configuration
    object using the following attributes:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来是训练部分。在之前的函数下，创建一个新的函数名为 `trainModel()`，它有一个参数 `trainingSet`。在函数中，使用 `getElementById()`
    获取包含 tfjs-vis 可视化的 canvas 元素。之后，使用 `trainingSet.xs` 和 `trainingSet.ys` 作为前两个参数，并使用以下属性配置对象调用
    `model.fit()`：
- en: batchSize = 64.
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`batchSize` = 64。'
- en: epochs = 25.
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`epochs` = 25。'
- en: validationSplit = 0.1 to use 10% of the data to validate the training.
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`validationSplit` = 0.1，使用 10% 的数据来验证训练。'
- en: As for the callbacks, use tfvis.show.fitCallbacks() to visualize the loss and
    validation loss values onEpochEnd and onBatchEnd.
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 至于回调函数，使用 `tfvis.show.fitCallbacks()` 在 `onEpochEnd` 和 `onBatchEnd` 时可视化损失和验证损失值。
- en: '[PRE7]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Predicting and testing the model
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 预测和测试模型
- en: By this point, you have loaded the data and created the model. So, the only
    missing step is implementing the testing functionality to assess its performance
    empirically. To test it, we will use a small dataset made of eight observations
    that do not appear in the training set. As displayed in Figure [9-3](#Fig3), the
    testing part of the application involves using one of eight buttons (one per testing
    case) to visualize the sequence and its predicted and actual values. With this
    approach, the user can visually assess how far the predictions are from the real
    value.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，你已经加载数据并创建了模型。所以，唯一缺少的步骤是实现测试功能以经验性地评估其性能。为了测试它，我们将使用一个包含八个观测值的小数据集，这些观测值不在训练集中。如图
    [9-3](#Fig3) 所示，应用程序的测试部分涉及使用八个按钮中的一个（每个测试案例一个）来可视化序列及其预测值和实际值。通过这种方法，用户可以直观地评估预测值与真实值之间的差距。
- en: Developing this feature involves three different components, one for predicting,
    another for plotting the predictions, and another one for creating the buttons.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 开发这个功能涉及三个不同的组件，一个用于预测，另一个用于绘制预测结果，还有一个用于创建按钮。
- en: 'The first, `predict()` , is a function that uses `model.predict()` and returns
    its value. Instead of predicting each case individually, use the entire test dataset
    to obtain the eight predictions:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个，`predict()`，是一个使用 `model.predict()` 并返回其值的函数。而不是逐个预测每个案例，使用整个测试数据集来获得八个预测：
- en: '[PRE8]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'The second function, named `plotPrediction()`, plots the predictions. It has
    three parameters, the test case’s number, the test dataset, and the predictions
    array:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个函数，名为 `plotPrediction()`，用于绘制预测结果。它有三个参数，测试案例的编号、测试数据集和预测数组：
- en: '[PRE9]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: The first line of the function converts the values part of the test data (`xs`)
    to a nested array where each element is a test case. This test case array is also
    a nested one where each of the elements is another array. So, we need `flat()`
    to flatten it. After that, the same “range-like” function (defined after `plotPrediction()`)
    we used in Chapter [2](494424_1_En_2_Chapter.xhtml) generates an array of values
    from 0 to 59 (the sequence length). Then comes the Plotly visualization.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 函数的第一行将测试数据（`xs`）的值部分转换为嵌套数组，其中每个元素都是一个测试用例。这个测试用例数组也是一个嵌套数组，其中每个元素又是另一个数组。因此，我们需要
    `flat()` 来将其展平。之后，与第 [2](494424_1_En_2_Chapter.xhtml) 章中使用的相同“range-like”函数（在
    `plotPrediction()` 之后定义）生成从 0 到 59（序列长度）的值数组。然后是 Plotly 可视化。
- en: For this visualization, you need three Plotly traces, one for the sequence,
    the predicted value, and the true value. But we also want the traces to look different.
    Therefore, we will specify their style. For instance, the sequence is represented
    with a line, and the other values with markers; feel free to customize it to your
    liking. After defining the traces, append them to the same array. Then call `Plotly.newPlot()`
    with the argument `'plot'` (the id of the `<div>`) and the `traces` array.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个可视化，你需要三个 Plotly 跟踪，一个用于序列，一个用于预测值，一个用于真实值。但我们还希望跟踪看起来不同。因此，我们将指定它们的样式。例如，序列用线表示，其他值用标记表示；请随意根据您的喜好进行自定义。定义跟踪后，将它们追加到同一个数组中。然后使用
    `'plot'`（`<div>` 的 id）和 `traces` 数组调用 `Plotly.newPlot()`。
- en: 'Last, use the same `createButton()` from the earlier chapters to create the
    buttons:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，使用前面章节中提到的相同 `createButton()` 函数来创建按钮：
- en: '[PRE10]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: To put it all together, return to the `init()` function . There, use `range()`
    to create an array and iterate over it to create the eight buttons and their callback
    function that plot the prediction once clicked (which by default are disabled).
    Following this, use once again `getElementById()` to get the button that starts
    the training. Assign to it a “click” event listener that calls `defineModel()`,
    `trainModel()`, and `predict()`.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 将所有这些放在一起，返回到 `init()` 函数。在那里，使用 `range()` 创建一个数组并遍历它以创建八个按钮及其回调函数，这些函数在点击时绘制预测（默认情况下是禁用的）。随后，再次使用
    `getElementById()` 获取启动训练的按钮。给它分配一个“click”事件监听器，该监听器调用 `defineModel()`、`trainModel()`
    和 `predict()`。
- en: '[PRE11]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Replace the old `init()` function with this one.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 将旧的 `init()` 函数替换为这个版本。
- en: Running the app
  id: totrans-74
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 运行应用
- en: Let’s forecast. If the local web server is not up, please start it. Then launch
    the application and click “Train!” to start the training. Below the button, you
    will see two graphs displaying the *onBatchEnd* loss and the *onEpochEnd* training
    and validation loss.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始预测。如果本地网络服务器没有启动，请先启动它。然后启动应用程序并点击“训练！”以开始训练。在按钮下方，您将看到两个图表，分别显示 *onBatchEnd*
    损失和 *onEpochEnd* 训练和验证损失。
- en: The average loss value (calculated after 10 tries) was around 0.02, and the
    average training time 3 minutes long (on a MacBook Pro 2018). With the training
    done, the eight testing buttons should be activated. Three of the test cases (1,
    2, and 4) have an actual value of 0, so the predictions should at least be close
    to 0\. In my tests, the outcomes of cases 3 (Figure [9-4](#Fig4)), 6 (Figure [9-5](#Fig5)),
    and 7 were very accurate, while case 8 showed the most inaccurate result (the
    actual value is 0.90, and the predicted is 0.51).
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 平均损失值（经过 10 次尝试后计算得出）约为 0.02，平均训练时间为 3 分钟（在 MacBook Pro 2018 上）。训练完成后，八个测试按钮应该被激活。三个测试用例（1、2
    和 4）的实际值为 0，因此预测值至少应该接近 0。在我的测试中，案例 3（图 [9-4](#Fig4)）、6（图 [9-5](#Fig5)）和 7 的结果非常准确，而案例
    8 显示的结果最不准确（实际值为 0.90，预测值为 0.51）。
- en: '![../images/494424_1_En_9_Chapter/494424_1_En_9_Fig5_HTML.jpg](../images/494424_1_En_9_Chapter/494424_1_En_9_Fig5_HTML.jpg)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
  zh: '![../images/494424_1_En_9_Chapter/494424_1_En_9_Fig5_HTML.jpg](../images/494424_1_En_9_Chapter/494424_1_En_9_Fig5_HTML.jpg)'
- en: Figure 9-5
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-5
- en: 'Test case #6'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '测试用例 #6'
- en: '![../images/494424_1_En_9_Chapter/494424_1_En_9_Fig4_HTML.jpg](../images/494424_1_En_9_Chapter/494424_1_En_9_Fig4_HTML.jpg)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![../images/494424_1_En_9_Chapter/494424_1_En_9_Fig4_HTML.jpg](../images/494424_1_En_9_Chapter/494424_1_En_9_Fig4_HTML.jpg)'
- en: Figure 9-4
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-4
- en: 'Test case #3'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: '测试用例 #3'
- en: Multiple timestep forecasting
  id: totrans-83
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 多步预测
- en: But wait a second? What about predicting a timestep *t* + 2? Is it possible?
    Yes, it is. Forecasting only one step in the future is limiting and, honestly,
    not that insightful. For example, you want a weather report that predicts the
    complete trajectory of the hurricane and not just its position in the next minute.
    Therefore, we will extend our forecasting model to predict the next *N* future
    steps of the time series.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 但等等？预测时间步 *t* + 2 呢？可能吗？是的，可以。只预测未来一步是有限的，而且说实话，并不那么有洞察力。例如，你想要一个天气预报，它预测飓风的完整轨迹，而不仅仅是下一分钟的位置。因此，我们将扩展我们的预测模型以预测时间序列的下一个
    *N* 个未来步骤。
- en: 'Extending the app implies two things: reshaping the data and, of course, updating
    the model’s architecture. As it is right now, our training dataset’s shape is
    [900, 60] and uses as target one of shape [900, 1]. But we want to expand the
    target data to predict *N* values instead of 1\. To do so, we will vertically
    slice the training dataset to create a new one of size [900, 60 - *N*] and a target
    tensor with shape [900, *N*]. For this example, we will set *N*, now called `FUTURE_TIMESTEPS`,
    to 5 to predict the next five steps. Let’s start by creating the data (you can
    add the following code snippets in the same file):'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 扩展应用程序意味着两件事：重塑数据和当然，更新模型的架构。就目前而言，我们的训练数据集的形状是 [900, 60]，并使用一个形状为 [900, 1]
    的目标。但我们要将目标数据扩展到预测 *N* 个值而不是 1。为此，我们将垂直切割训练数据集以创建一个新的数据集，其大小为 [900, 60 - *N*]，以及一个形状为
    [900, *N*] 的目标张量。在这个例子中，我们将 *N*，现在称为 `FUTURE_TIMESTEPS`，设置为 5 以预测接下来的五个步骤。让我们先创建数据（你可以在同一个文件中添加以下代码片段）：
- en: '[PRE12]'
  id: totrans-86
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'The function `prepareMultiDataset()` takes the training and test data and slices
    them to create four: the new training and testing set and their labels. `yTrain`
    requires `tf.squeeze()` to remove the last dimension ([900, `FUTURE_TIMESTEPS`,
    1] →[900, `FUTURE_TIMESTEPS`]).'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 函数 `prepareMultiDataset()` 接收训练和测试数据，并将它们切割成四个：新的训练和测试集及其标签。`yTrain` 需要 `tf.squeeze()`
    来移除最后一个维度 ([900, `FUTURE_TIMESTEPS`, 1] → [900, `FUTURE_TIMESTEPS`])。
- en: 'Then comes the model training and designing function. Since our problem is
    not as simple as the previous one, let’s add an extra LSTM layer to the model
    and set the `returnSequences` attribute of the first layer to `true`. Unlike last
    time, we will call `model.fit()` from this function:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 然后是模型训练和设计功能。由于我们的问题不像之前那么简单，让我们在模型中添加一个额外的 LSTM 层，并将第一层的 `returnSequences`
    属性设置为 `true`。与上次不同，我们将从这个函数中调用 `model.fit()`：
- en: '[PRE13]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'We also need the function to perform the predictions. On this occasion, we
    will use `tf.Tensor.arraySync()` —a method that converts a tensor to a nested
    array—instead of `tf.Tensor.dataSync()`, because the returned prediction tensor
    has the shape [8,5]:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还需要一个执行预测的函数。在这种情况下，我们将使用 `tf.Tensor.arraySync()` ——一个将张量转换为嵌套数组的方法——而不是 `tf.Tensor.dataSync()`，因为返回的预测张量具有形状
    [8,5]：
- en: '[PRE14]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'Next is the drawing function. Because now the app produces a predicted sequence
    and not a single point, we need to change the traces to draw lines instead of
    points:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来是绘图功能。因为现在应用程序生成的是一个预测序列而不是单个点，我们需要将轨迹改为绘制线条而不是点：
- en: '[PRE15]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 'Last is the new *init* function, now named `initMultiModel()`, followed by
    a call to it (make sure you comment out the previous call to “normal” `init()`):'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 最后是新的 *init* 函数，现在命名为 `initMultiModel()`，然后调用它（确保注释掉对“正常”的 `init()` 的上一个调用）：
- en: '[PRE16]'
  id: totrans-95
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Now refresh the app and start the training. This time, because we have a larger
    model, the training is longer. Besides this, you will note that the loss value
    barely changes (Figure [9-6](#Fig6)); there is not a sudden drop like the one
    before. It starts around 0.035 and converges at 0.025—not a significant change.
    This behavior implies that there might be some problems with the model. Let’s
    see some test cases.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 现在刷新应用程序并开始训练。这次，因为我们有一个更大的模型，所以训练时间更长。此外，你将注意到损失值几乎没有变化（图 [9-6](#Fig6)）；没有像之前那样的突然下降。它从
    0.035 开始，收敛到 0.025——没有显著变化。这种行为表明模型可能存在一些问题。让我们看看一些测试案例。
- en: '![../images/494424_1_En_9_Chapter/494424_1_En_9_Fig6_HTML.jpg](../images/494424_1_En_9_Chapter/494424_1_En_9_Fig6_HTML.jpg)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
  zh: '![../images/494424_1_En_9_Chapter/494424_1_En_9_Fig6_HTML.jpg](../images/494424_1_En_9_Chapter/494424_1_En_9_Fig6_HTML.jpg)'
- en: Figure 9-6
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-6
- en: The training's loss value
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 训练的损失值
- en: 'Figure [9-7](#Fig7) shows test case #3\. The solid line is the test data, the
    dashed line the actual value, and the dashed-dotted line the predicted one. Here,
    the prediction does not fit the actual data that well, but in overall, it follows
    the same pattern.'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: '图 [9-7](#Fig7) 显示了测试案例 #3。实线是测试数据，虚线是实际值，虚点线是预测值。在这里，预测值与实际数据不太吻合，但总体上遵循相同的模式。'
- en: '![../images/494424_1_En_9_Chapter/494424_1_En_9_Fig7_HTML.jpg](../images/494424_1_En_9_Chapter/494424_1_En_9_Fig7_HTML.jpg)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![../images/494424_1_En_9_Chapter/494424_1_En_9_Fig7_HTML.jpg](../images/494424_1_En_9_Chapter/494424_1_En_9_Fig7_HTML.jpg)'
- en: Figure 9-7
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-7
- en: 'Multimodel''s test case #3'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: '多模型测试案例 #3'
- en: 'But now it gets worse. Next is test case #6 (Figure [9-8](#Fig8)), and its
    forecast resembles a *smoothed* form of the actual value—not a great outcome,
    but not an awful one.'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: '但现在情况变得更糟了。接下来是测试案例 #6（图 [9-8](#Fig8)），其预测值类似于实际值的*平滑*形式——不是很好的结果，但也不是糟糕的结果。'
- en: 'Last, we have test case #8 (Figure [9-9](#Fig9)), the worse of them. In this
    example, the forecasted line trends downward, while the real value increases.'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: '最后，我们有测试案例 #8（图 [9-9](#Fig9)），这是其中最糟糕的一个。在这个例子中，预测的线条趋势向下，而实际值在增加。'
- en: '![../images/494424_1_En_9_Chapter/494424_1_En_9_Fig9_HTML.jpg](../images/494424_1_En_9_Chapter/494424_1_En_9_Fig9_HTML.jpg)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
  zh: '![../images/494424_1_En_9_Chapter/494424_1_En_9_Fig9_HTML.jpg](../images/494424_1_En_9_Chapter/494424_1_En_9_Fig9_HTML.jpg)'
- en: Figure 9-9
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-9
- en: 'Multimodel''s test case #8'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: '多模型测试案例 #8'
- en: '![../images/494424_1_En_9_Chapter/494424_1_En_9_Fig8_HTML.jpg](../images/494424_1_En_9_Chapter/494424_1_En_9_Fig8_HTML.jpg)'
  id: totrans-109
  prefs: []
  type: TYPE_IMG
  zh: '![../images/494424_1_En_9_Chapter/494424_1_En_9_Fig8_HTML.jpg](../images/494424_1_En_9_Chapter/494424_1_En_9_Fig8_HTML.jpg)'
- en: Figure 9-8
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-8
- en: 'Multimodel''s test case #6'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: '多模型测试案例 #6'
- en: From these examples, we could conclude that the model is not as good as the
    first one—or at least not at predicting that far in the future. You might have
    noticed that in most of the examples, the first three predicted points were similar
    to the actual one, a sign that the model might be good at predicting the near
    future, but not a far one. One of the exercises invites you to try distinct `FUTURE_TIMESTEPS`.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 从这些例子中，我们可以得出结论，该模型不如第一个模型好——或者至少在预测未来方面不是那么好。你可能已经注意到，在大多数例子中，前三个预测点与实际值相似，这是模型可能在预测近期未来方面表现良好的一个迹象，但不是在预测远期。其中一项练习邀请你尝试不同的
    `FUTURE_TIMESTEPS`。
- en: 'It is sad to admit this, but sometimes a model does not work. The reasons could
    be many: not enough data, not the correct data, poor choice of a model, suboptimal
    hyperparameters, or a not suitable architecture. In this case, the dataset is
    very volatile and has many fluctuations, which might affect the training. Use
    this as a takeaway and a reminder that with all advances behind machine learning,
    it is not (yet) a perfect science.'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 承认这一点很令人难过，但有时模型不起作用。原因可能很多：数据不足，数据不正确，模型选择不当，超参数选择不佳，或者架构不适合。在这种情况下，数据集非常波动，有很多波动，这可能会影响训练。将此作为经验教训和提醒，尽管机器学习背后有所有这些进步，但它（目前）还不是一门完美的科学。
- en: But I refuse to end this section in such a low note. To experience a good multistep
    model, I will introduce a modified version of Jena weather dataset (Max Planck
    Institute for Biogeochemistry, n.d.). This dataset—typically used to showcase
    time series—contains weather information from the city of Jena, Germany, from
    the year 2009 to 2016\. We will use the data to forecast the temperature. The
    dataset has the same structure as the previous one, so we do not need to modify
    the functionality of the program. But we need some small changes. To start with,
    we have to change the URLs of the training and test datasets to [`https://raw.githubusercontent.com/Apress/Practical-TensorFlow.js/master/9/time-series/multiple-steps-jena/data/sequences.csv`](https://raw.githubusercontent.com/Apress/Practical-TensorFlow.js/master/9/time-series/multiple-steps-jena/data/sequences.csv)
    and [`https://raw.githubusercontent.com/Apress/Practical-TensorFlow.js/master/9/time-series/multiple-steps-jena/data/test.csv`](https://raw.githubusercontent.com/Apress/Practical-TensorFlow.js/master/9/time-series/multiple-steps-jena/data/test.csv).
    Alternatively, I would recommend getting the dataset from the repository because
    of its large size. You can find it at *9/time-series/multiple-steps-jena/data/*.
    Also, since the dataset is significantly larger, change `TRAINING_DATASET_SIZE`
    to 65000 and `FUTURE_TIMESTEPS` to 40, `batchSize` to 512, and `epochs` to 3\.
    Then, launch the app and train as usual. But beware! A larger dataset implies
    having to wait longer to load the data and to train the model.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 但是我拒绝以这样的低潮结束这一节。为了体验一个好的多步模型，我将介绍Jena天气数据集（马克斯·普朗克生物地球化学研究所，n.d.）的一个修改版本。这个数据集——通常用于展示时间序列——包含了从2009年到2016年德国耶拿市的天气信息。我们将使用这些数据来预测温度。该数据集的结构与之前的相同，因此我们不需要修改程序的功能。但是我们需要做一些小的改动。首先，我们必须将训练集和测试集的URL更改为[`https://raw.githubusercontent.com/Apress/Practical-TensorFlow.js/master/9/time-series/multiple-steps-jena/data/sequences.csv`](https://raw.githubusercontent.com/Apress/Practical-TensorFlow.js/master/9/time-series/multiple-steps-jena/data/sequences.csv)和[`https://raw.githubusercontent.com/Apress/Practical-TensorFlow.js/master/9/time-series/multiple-steps-jena/data/test.csv`](https://raw.githubusercontent.com/Apress/Practical-TensorFlow.js/master/9/time-series/multiple-steps-jena/data/test.csv)。或者，由于数据集很大，我建议从存储库中获取数据集。你可以在
    *9/time-series/multiple-steps-jena/data/* 找到它。此外，由于数据集显著更大，将 `TRAINING_DATASET_SIZE`
    更改为65000，将 `FUTURE_TIMESTEPS` 更改为40，将 `batchSize` 更改为512，将 `epochs` 更改为3。然后，启动应用程序并像往常一样进行训练。但要注意！更大的数据集意味着需要更长的时间来加载数据和训练模型。
- en: Figure [9-10](#Fig10) presents the loss values after training the model for
    five epochs. The top chart, *onBatchEnd* shows that after just 50 batches, the
    loss drops to almost zero, while the second one, *onEpochEnd*, reveals that two
    epochs are enough. To see how the model performs, see Figures [9-11](#Fig11),
    [9-12](#Fig12), and [9-13](#Fig13).
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [9-10](#Fig10) 展示了模型训练五个周期后的损失值。顶部图表 *onBatchEnd* 显示，仅仅经过50个批次，损失就下降到几乎为零，而第二个图表
    *onEpochEnd* 则表明两个周期就足够了。要查看模型的性能，请参阅图 [9-11](#Fig11)、[9-12](#Fig12) 和 [9-13](#Fig13)。
- en: '![../images/494424_1_En_9_Chapter/494424_1_En_9_Fig13_HTML.jpg](../images/494424_1_En_9_Chapter/494424_1_En_9_Fig13_HTML.jpg)'
  id: totrans-116
  prefs: []
  type: TYPE_IMG
  zh: '![../images/494424_1_En_9_Chapter/494424_1_En_9_Fig13_HTML.jpg](../images/494424_1_En_9_Chapter/494424_1_En_9_Fig13_HTML.jpg)'
- en: Figure 9-13
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-13
- en: 'Test case #5'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: '测试案例 #5'
- en: '![../images/494424_1_En_9_Chapter/494424_1_En_9_Fig12_HTML.jpg](../images/494424_1_En_9_Chapter/494424_1_En_9_Fig12_HTML.jpg)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
  zh: '![../images/494424_1_En_9_Chapter/494424_1_En_9_Fig12_HTML.jpg](../images/494424_1_En_9_Chapter/494424_1_En_9_Fig12_HTML.jpg)'
- en: Figure 9-12
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
