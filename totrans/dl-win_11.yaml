- en: 11. Introduction to Generative Adversarial Networks
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Can an AI be creative—can it learn to create art, for example? The traditional
    answer was no. But lately we are not so sure. Recently, thanks to deep learning,
    the definition of creativity has been become blurred.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
- en: The Story of the Artist and the Art Critic
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let us look at a story.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: There once was a novice artist, who was learning to create artwork by taking
    inspiration from existing art pieces.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: The artist created a piece of art and showed it to an art critic.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: The critic analyzed the artwork and declared it not good enough. But, being
    conscientious, the critic also provide feedback to the artist on why it was not
    considered to be good enough.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: The artist absorbed this feedback and attempted again to create another piece
    of art with changes based on the feedback, and showed it to the critic.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: This happened over several cycles.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: Every time the critic criticized the artwork, the artist gained experience about
    how to improve it.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: Likewise, every time the artist generated a new artwork, the critic gained experience
    in how to evaluate it.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: After many such iterations, the artist created an artwork that could be considered
    a masterpiece.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: Because of the critic, the artist became a master.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: What if we can do the same to an AI?
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: That is the idea behind generative adversarial networks.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: Generative Adversarial Networks
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A generative adversarial network (GAN) is a machine learning model where two
    neural networks contest with each other to generate new data with the same characteristics
    of a given training set.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: '**Generative:** the model generates new data, as opposed to picking the output
    from a given set.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Adversarial:** the two networks are adversaries of each other.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Network:** the model is based on neural networks.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Like our story, generative adversarial networks also consists of two elements:
    a *generator* (the artist) and a *discriminator* (the art critic). The generator
    is trying to learn to create items that looks “real,” while the discriminator
    is trying to distinguish the generated items from real ones (Figure [11-1](#Fig1)).'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_11_Chapter/502073_1_En_11_Fig1_HTML.png](../images/502073_1_En_11_Chapter/502073_1_En_11_Fig1_HTML.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
- en: Figure 11-1
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: The typical workflow of a GAN
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: The items generated can be images, text, videos, sounds, or anything.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: In such a system, the generator and the discriminator need to be trained together,
    as in the artist and the art critic in our story who got experienced together.
    When we are training such a system, the generator will progressively become better
    at generating items that look real, and the discriminator will become better at
    telling them apart from the real ones. After many iterations of training like
    this, there will come a point where the discriminator may no longer be able to
    tell the generated items from the real ones (Figure [11-2](#Fig2)).
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_11_Chapter/502073_1_En_11_Fig2_HTML.png](../images/502073_1_En_11_Chapter/502073_1_En_11_Fig2_HTML.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
- en: Figure 11-2
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: Training of a GAN
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: To simplify the explanation, let us take a GAN than generates images. The generator
    takes a random noise vector as input, while the discriminator takes a training
    set of real images belonging to the class of images that we would like to generate.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: Generating Handwritten Digits with DCGAN
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A DCGAN (deep convolutional generative adversarial network ) is one of the simplest
    GAN implementations. In it we use convolutional layers in the generator and the
    discriminator, which makes DCGAN models work great with images.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: We will use the MNIST dataset as the input. Our target would be to generate
    images that are indistinguishable from human handwritten digits.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: Our workflow would look like the following (Figure [11-3](#Fig3)).
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_11_Chapter/502073_1_En_11_Fig3_HTML.png](../images/502073_1_En_11_Chapter/502073_1_En_11_Fig3_HTML.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
- en: Figure 11-3
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: DCGAN for handwritten digit generation
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: We will start with a new code file, which we will name DCGAN_Digits.py.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: 'We start our code by importing the necessary packages:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'We then load our dataset and normalize it:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The MNIST pixel values are in the 0–255 range. Here we normalize it to -1–1
    range.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: 'Then we define the batch sizes, then shuffle and chunk the dataset for training:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Next, we need to define the generator and discriminator models.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: The Generator
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Our generator model takes in a seed of random noise and outputs a 28x28x1 image.
    The model would look like this (Figure [11-4](#Fig4)):'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_11_Chapter/502073_1_En_11_Fig4_HTML.png](../images/502073_1_En_11_Chapter/502073_1_En_11_Fig4_HTML.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
- en: Figure 11-4
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: The generator model
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: The model uses `Conv2DTranspose` layers to upsample the input at each layer.
    `LeakyReLU` is used as the regularization, as it allows small amounts of negative
    values to go through, as opposed to ReLU, which removes all negatives.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: 'We will define a new function `make_generator_model()` for the generator model:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'We can now use this function to create a model instance and generate an initial
    image:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: As the generator model is still untrained, the output will look like noise (Figure
    [11-5](#Fig5)).
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_11_Chapter/502073_1_En_11_Fig5_HTML.jpg](../images/502073_1_En_11_Chapter/502073_1_En_11_Fig5_HTML.jpg)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
- en: Figure 11-5
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: Output from the untrained generator
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: The Discriminator
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The discriminator is a simple deep learning image classifier (based on a familiar
    convolutional neural network). It will take a 28x28x1 image as input and classify
    them as real or fake. The discriminator model would look like this (Figure [11-6](#Fig6)):'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_11_Chapter/502073_1_En_11_Fig6_HTML.png](../images/502073_1_En_11_Chapter/502073_1_En_11_Fig6_HTML.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
- en: Figure 11-6
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: The discriminator model
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: 'We will define the make_discriminator_model() function for the discriminator
    model. It uses our familiar Conv2D layers:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'We can then use this function to create a discriminator instance and pass the
    image we generated earlier:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们可以使用这个函数创建一个判别器实例，并将我们之前生成的图像传递给它：
- en: '[PRE6]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'As the discriminator model is still untrained, this will output something like
    the following:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 由于判别器模型尚未训练，这将输出如下：
- en: '[PRE7]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Once trained, the discriminator will output 1 for real images and 0 for fake.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦训练完成，判别器将对真实图像输出1，对伪造图像输出0。
- en: The Feedback
  id: totrans-72
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 反馈
- en: 'Like our story of the artist and the art critic, in order to improve, our generator
    and discriminator need feedback. Here we are defining the loss values for both
    the generator and the discriminator, which we will later use to calculate the
    gradients that will update each of them when training:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 就像我们的艺术家和艺术评论家的故事一样，为了提高，我们的生成器和判别器需要反馈。在这里，我们定义生成器和判别器的损失值，我们将在以后使用这些值来计算梯度，这些梯度将在训练时更新每个模型：
- en: '[PRE8]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: The discriminator’s loss is defined by how well it can distinguish between real
    images and generated ones. So we take in the predictions from the discriminator
    for real images (the array of `real_output`) and for the fake images (the array
    of `fake_output`), and compare them against the expected outputs. Once properly
    trained, the discriminator should yield 1s for the real images, while yielding
    0s for the generated or fake images. Therefore, we get the difference between
    the outputs for the real images with an array of 1s, and the difference between
    the outputs for fake images with an array of 0s.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 判别器的损失由其区分真实图像和生成图像的能力定义。因此，我们接收判别器对真实图像（`real_output`数组）和伪造图像（`fake_output`数组）的预测，并将它们与预期的输出进行比较。一旦适当训练，判别器应该对真实图像输出1，而对生成或伪造图像输出0。因此，我们得到真实图像输出与1数组的差异，以及伪造图像输出与0数组的差异。
- en: Similarly, we expect the generator, once properly trained, to generate images
    that yields 1s from the discriminator. Like before, we compare the outputs from
    the generated or fake images to an array of 1s to determine the loss for the generator.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 同样地，我们期望一旦生成器经过适当训练，就能生成从判别器得到1的图像。就像之前一样，我们将生成的或伪造的图像的输出与1的数组进行比较，以确定生成器的损失。
- en: We also define two separate Adam optimizers for the generator and the discriminator,
    as the two models need to be trained separately while simultaneously.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还为生成器和判别器定义了两个独立的Adam优化器，因为这两个模型需要分别同时训练。
- en: 'Since training of GANs can take a long time, we configure model checkpoints
    to be saved periodically, which would help to recover if the training gets disrupted.
    Make sure to create a directory named training_checkpoints in the directory where
    your code file is:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 由于GAN的训练可能需要很长时间，我们配置模型检查点定期保存，这样如果训练中断，就可以恢复。请确保在包含你的代码文件的目录中创建一个名为training_checkpoints的目录：
- en: '[PRE9]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: The Training
  id: totrans-80
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 训练
- en: 'Next, we define the training parameters and the random seed for the training:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们定义训练参数和训练的随机种子：
- en: '[PRE10]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: We will reuse the same seed throughout the training epochs to better visualize
    how each generated sample improves over the epochs (as the same seed results in
    same digits to be generated).
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在整个训练周期中重复使用相同的种子，以便更好地可视化每个生成的样本如何在周期中改进（因为相同的种子会导致生成相同的数字）。
- en: 'We then define the function for the training step:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们定义训练步骤的函数：
- en: '[PRE11]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: In each training step we pass a random noise vector to the generator, which
    generates a set of images using it as the input. These generated images, as well
    as a set of real images, are then passed through the discriminator to get their
    outputs. These outputs are the predictions/classifications from the discriminator
    as to whether it thinks they are real or fake. Using the loss functions we defined
    earlier, the loss values are calculated for the generator and discriminator and
    the gradients of the loss values are used to update them. Think of it as the “feedback”
    that nudges them to train in the correct direction.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 在每个训练步骤中，我们向生成器传递一个随机噪声向量，它使用这个向量作为输入生成一系列图像。然后，这些生成的图像以及一组真实图像被传递给判别器以获取它们的输出。这些输出是判别器的预测/分类，即它认为它们是真实还是伪造。使用我们之前定义的损失函数，计算生成器和判别器的损失值，并使用损失值的梯度来更新它们。把它想象成推动它们朝正确方向训练的“反馈”。
- en: 'Next is the function for the main training loop:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来是主训练循环的函数：
- en: '[PRE12]'
  id: totrans-88
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Here, we are basically running through each of the training batches through
    number of epochs we defined. And at the end of each training epoch, we use the
    seed we defined earlier to generate a set of samples and save those images files.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: 'The function is defined as follows, which is mainly postprocessing of the generated
    images. Make sure to create a directory named output in the directory where your
    code file is located:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'Once all the training utility functions are defined, we call the main training
    function:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'At the end of the training we do some cleanup steps, and then combine all the
    generated output images into an animated GIF file:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  id: totrans-95
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: Running the Training
  id: totrans-96
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'With our DCGAN model ready, we can start the training by running:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: The script will display the time taken for each epoch in the console, as well
    as the results from each epoch in an OpenCV window (Figure [11-7](#Fig7)).
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_11_Chapter/502073_1_En_11_Fig7_HTML.jpg](../images/502073_1_En_11_Chapter/502073_1_En_11_Fig7_HTML.jpg)'
  id: totrans-100
  prefs: []
  type: TYPE_IMG
- en: Figure 11-7
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: Training running for DCGAN digit generation
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
- en: When running on GPU on an RTX2070 the training took about 2 hours for 1,000
    epochs (Figure [11-8](#Fig8)).
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_11_Chapter/502073_1_En_11_Fig8_HTML.jpg](../images/502073_1_En_11_Chapter/502073_1_En_11_Fig8_HTML.jpg)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
- en: Figure 11-8
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: DCGAN training completed
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
- en: Note
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: Training of GANs can take a long time. Our DCGAN model may take hours to train
    based on the processing power of the machine being run, as well as whether you
    are running the model on CPU or GPU. Typically, it may take 7 to 10 seconds per
    epoch to run on a GPU. Running GAN training on CPU may not be practical due to
    the time it might take to complete the training.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: If you are unsure, run the training for a smaller number of epochs first to
    get an idea of how long it might take.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
- en: Tip
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
- en: If the training seems to get stuck after the initial noise image is displayed,
    you can try commenting out the lines 53 to 55\. This can happen because our GAN
    training can take large amounts of system resources and may occasionally exhaust
    the resources of the machine when attempting to visualize the results. Similarly,
    you can set the display parameter to False on line 141.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
- en: You can use Kaggle notebooks^([1](#Fn1)) to run your code if you are having
    issues running in your local machine. Kaggle provides free access to NVIDIA TESLA
    P100 GPUs in their notebooks/kernels,^([2](#Fn2)) which can greatly accelerate
    training complex models such as GANs.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
- en: At the start of the training, the results would look like random noise (Figure
    [11-9](#Fig9)).
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_11_Chapter/502073_1_En_11_Fig9_HTML.jpg](../images/502073_1_En_11_Chapter/502073_1_En_11_Fig9_HTML.jpg)'
  id: totrans-114
  prefs: []
  type: TYPE_IMG
- en: Figure 11-9
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
- en: Images generated at epoch 1
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
- en: After 100 epochs the distinct shapes of digits are starting to show (Figure
    [11-10](#Fig10)).
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_11_Chapter/502073_1_En_11_Fig10_HTML.jpg](../images/502073_1_En_11_Chapter/502073_1_En_11_Fig10_HTML.jpg)'
  id: totrans-118
  prefs: []
  type: TYPE_IMG
- en: Figure 11-10
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
- en: Images generated at epoch 100
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
- en: After 200 epochs, the shapes are a bit more refined (Figure [11-11](#Fig11)).
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_11_Chapter/502073_1_En_11_Fig11_HTML.jpg](../images/502073_1_En_11_Chapter/502073_1_En_11_Fig11_HTML.jpg)'
  id: totrans-122
  prefs: []
  type: TYPE_IMG
- en: Figure 11-11
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
- en: Images generated at epoch 200
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
- en: After 1,000 epochs, the images are almost indistinguishable from human handwritten
    digits (Figure [11-12](#Fig12)).
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_11_Chapter/502073_1_En_11_Fig12_HTML.jpg](../images/502073_1_En_11_Chapter/502073_1_En_11_Fig12_HTML.jpg)'
  id: totrans-126
  prefs: []
  type: TYPE_IMG
- en: Figure 11-12
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
- en: Images generated at epoch 1,000
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
- en: You can also view the generated dcgan.gif file for the amination of how the
    generated results improved over the training.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
- en: Can We Generate Something More Complex?
  id: totrans-130
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We have now seen how our DCGAN model can generate handwritten digits that are
    nearly indistinguishable from ones drawn by humans. But can GANs generate something
    more complex?
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
- en: 'To find out, let us try to apply what we learned from our DCGAN_Digits model
    on to something much more complex: generating images of human faces.'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
- en: For that, we will need a large dataset with images of human faces to train our
    discriminator model. We will use the CelebFaces Attributes (CelebA) dataset from
    Kaggle for that purpose (Figure [11-13](#Fig13)).
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_11_Chapter/502073_1_En_11_Fig13_HTML.jpg](../images/502073_1_En_11_Chapter/502073_1_En_11_Fig13_HTML.jpg)'
  id: totrans-134
  prefs: []
  type: TYPE_IMG
- en: Figure 11-13
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
- en: CelebFaces attributes (CelebA) dataset from Kaggle
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
- en: 'The CelebA dataset is about 1.4GB is size.^([3](#Fn3)) Once downloaded, extract
    the zip file and rename the top-level directory to celeba-dataset. You should
    end up with the following folder structure (Figure [11-14](#Fig14)):'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_11_Chapter/502073_1_En_11_Fig14_HTML.jpg](../images/502073_1_En_11_Chapter/502073_1_En_11_Fig14_HTML.jpg)'
  id: totrans-138
  prefs: []
  type: TYPE_IMG
- en: Figure 11-14
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
- en: Folder structure of the uncompressed CelebA dataset
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
- en: With the dataset ready, let us start a new code file for our face generator,
    which we will name DCGAN_Faces.py. Like before, remember to create the training_checkpoints
    and output directories where your code file is located.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
- en: 'We will start by importing the necessary packages:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  id: totrans-143
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: 'We will then define a helper function to load each face image and crop only
    the face part of it. As the images in the CelebA dataset is already aligned, we
    can use hard-coded values to crop the faces:'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  id: totrans-145
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: 'We then load our dataset image paths, and define the batch parameters:'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  id: totrans-147
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: 'We then define our generator model:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  id: totrans-149
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: This uses the same concepts as the generator in our DCGAN_Digits model. But
    we are using a deeper model here, as our data is more complex.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
- en: 'The image generated from the untrained generator will look something like this
    (Figure [11-15](#Fig15)):'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_11_Chapter/502073_1_En_11_Fig15_HTML.jpg](../images/502073_1_En_11_Chapter/502073_1_En_11_Fig15_HTML.jpg)'
  id: totrans-152
  prefs: []
  type: TYPE_IMG
- en: Figure 11-15
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
- en: Output from the untrained generator
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
- en: 'We then define our discriminator model, a little deeper than our DCGAN_Digits
    model:'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  id: totrans-156
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: 'The loss functions, checkpoints, and training parameters are exactly as we
    used before:'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  id: totrans-158
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: 'In the train step function, we use the helper function load_image to preprocess
    our images. The rest of the steps are same as before:'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  id: totrans-160
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: 'Finally, the functions for the main training loop, saving the generated images,
    and generating the animation all use the same steps as we used in our DCGAN_Digits
    model:'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  id: totrans-162
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: So, how well does our face generator perform?
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
- en: At the start of the training, the generator produces pure black images (Figure
    [11-16](#Fig16)).
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_11_Chapter/502073_1_En_11_Fig16_HTML.jpg](../images/502073_1_En_11_Chapter/502073_1_En_11_Fig16_HTML.jpg)'
  id: totrans-165
  prefs: []
  type: TYPE_IMG
- en: Figure 11-16
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
- en: Images generated at epoch 1
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
- en: After 100 epochs, some shapes are starting to appear in the output (Figure [11-17](#Fig17)).
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_11_Chapter/502073_1_En_11_Fig17_HTML.jpg](../images/502073_1_En_11_Chapter/502073_1_En_11_Fig17_HTML.jpg)'
  id: totrans-169
  prefs: []
  type: TYPE_IMG
- en: Figure 11-17
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
- en: Images generated at epoch 100
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
- en: After 1,000 epochs, some facial feature–like shapes are being generated (Figure
    [11-18](#Fig18)).
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_11_Chapter/502073_1_En_11_Fig18_HTML.jpg](../images/502073_1_En_11_Chapter/502073_1_En_11_Fig18_HTML.jpg)'
  id: totrans-173
  prefs: []
  type: TYPE_IMG
- en: Figure 11-18
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
- en: Images generated at epoch 1,000
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
- en: While not life-like, it is quite remarkable that our generator was able to learn
    to generate features that we can associate with human faces.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
- en: To improve our model further, you can try training for a longer number of epochs.
    Or try combinations of deeper models for the generator and the discriminator.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
- en: However, keep in mind that training this model for 1,000 epochs took over seven
    hours on a GPU. You should plan ahead when attempting to push further.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
- en: What Else Can GANs Do?
  id: totrans-179
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As we discussed earlier, DCGAN is one of the simplest implementations of GANs.
    And here we have only scratched the surface of what GANs can do.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
- en: 'Generative adversarial networks are one of the latest research areas within
    deep learning and AI. It is also one of the areas that is most actively developed
    in the past few years. Many innovative GAN architectures have recently been proposed
    and implemented, with more and more innovation happening in that area daily. Following
    are just a few of notable GAN architectures:'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
- en: '**CycleGAN (Cycle-Consistent GANs):** able to learn to transform between images
    of different styles, without needing to have paired image data for training.'
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**StyleGAN (style-based GANs):** able to generate high resolution images, by
    having a stacked model where the lower layers generate lower-resolution images
    that are progressively enhanced by the higher layers of the model.'
  id: totrans-183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**cGAN (conditional GANs):** able to utilize additional available information
    (e.g., labels for images) to learn rather than relying on just the raw image data.'
  id: totrans-184
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**lsGAN (least-squares GANs):** uses the least-squares loss function for the
    discriminator instead of the traditional cross-entropy loss function, resulting
    in higher-quality images.'
  id: totrans-185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**DiscoGAN (discover cross-domain relations with GANs):** able to learn cross-domain
    relationships between related sets of images in an unsupervised manner.'
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With these, and many more novel architectures, GANs have been able to produce
    some groundbreaking results.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
- en: A project from NVIDIA named “This Person Does Not Exist”^([4](#Fn4)) is able
    to use a StyleGAN to generate photo-realistic images of human faces (Figure [11-19](#Fig19)).
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_11_Chapter/502073_1_En_11_Fig19_HTML.jpg](../images/502073_1_En_11_Chapter/502073_1_En_11_Fig19_HTML.jpg)'
  id: totrans-189
  prefs: []
  type: TYPE_IMG
- en: Figure 11-19
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
- en: Some samples from “This Person Does Not Exist” by NVIDIA
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
- en: The GauGAN project,^([5](#Fn5)) also by NVIDIA, can convert rough sketches into
    photo-realistic images (Figure [11-20](#Fig20)).
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_11_Chapter/502073_1_En_11_Fig20_HTML.jpg](../images/502073_1_En_11_Chapter/502073_1_En_11_Fig20_HTML.jpg)'
  id: totrans-193
  prefs: []
  type: TYPE_IMG
- en: Figure 11-20
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
- en: NVIDIA GauGAN in action
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
- en: GANs are not just for image generation. The OpenAI Jukebox project^([6](#Fn6))
    can generate music as well as singing using GAN models (Figure [11-21](#Fig21)).
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_11_Chapter/502073_1_En_11_Fig21_HTML.jpg](../images/502073_1_En_11_Chapter/502073_1_En_11_Fig21_HTML.jpg)'
  id: totrans-197
  prefs: []
  type: TYPE_IMG
- en: Figure 11-21
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
- en: The OpenAI Jukebox Project
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
- en: With the rapid advancement of GANs, there may come a day when human creativity
    will be challenged.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
