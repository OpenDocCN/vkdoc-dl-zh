  type: TYPE_PRE
- en: Since we have identified the problem and prepared the dataset, we can begin
    to determine the machine learning methods that our model will consist of.
  prefs: []
  type: TYPE_NORMAL
- en: Operators
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Now let’s define the functions that will make up the functional pipeline. We
    will call them Operators in the machine learning context. Machine learning operators
    for a classification problem can be separated into three types:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Selectors**: Choose the most significant features (columns) from the dataset,
    removing dependent features. Usually reduces the input size. The selected features
    remain unchanged.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Transformers**: Convert input according to some mathematical function without
    changing the input size.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Classifiers**: Solve the classification problem itself.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Figure [3-39](#Fig39) shows a machine learning pipeline: selector, transformer,
    and classifier.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig39_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-39
  prefs: []
  type: TYPE_NORMAL
- en: 'Machine learning operators: selector, transformer, and classifier'
  prefs: []
  type: TYPE_NORMAL
- en: Each operator has its own parameters, such as `max_depth` in the `DecisionTreeClassifier`.
    Listing [3-18](#PC67) creates an operator space that will be used for the AutoML
    pipeline.
  prefs: []
  type: TYPE_NORMAL
- en: '(Full code is provided in the corresponding file: *ch3/ml_pipeline/operator.py*.)'
  prefs: []
  type: TYPE_NORMAL
- en: 'Each operator is an object that has a name, implementation, and parameters:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE65]'
  prefs: []
  type: TYPE_PRE
- en: 'Next, we define the operator space:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE66]'
  prefs: []
  type: TYPE_PRE
- en: 'Selector list:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE67]'
  prefs: []
  type: TYPE_PRE
- en: (For full selector list, please refer to the source code.)
  prefs: []
  type: TYPE_NORMAL
- en: 'Transformer list:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE68]'
  prefs: []
  type: TYPE_PRE
- en: (For full transformer list, please refer to the source code.)
  prefs: []
  type: TYPE_NORMAL
- en: 'Classifier list:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE69]'
  prefs: []
  type: TYPE_PRE
- en: (For full classifier list, please refer to the source code.)
  prefs: []
  type: TYPE_NORMAL
- en: 'Finally, we add an additional auxiliary method `get_operator_by_name`, which
    returns the operator by its name:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE70]'
  prefs: []
  type: TYPE_PRE
- en: Search Space
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s define search space for the classifier. We assume that the classifier’s
    operator pipeline will have
  prefs: []
  type: TYPE_NORMAL
- en: '**Selectors**: From 0 to 1 (selector is advised but not required)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Transformers**: From 0 to 3 (selector is advised but not required)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Classifier**: 1 (is required)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Therefore, a pipeline can have from one to five operators. Please take a look
    at Figure [3-40](#Fig40).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_3_Chapter/526245_1_En_3_Fig40_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-40
  prefs: []
  type: TYPE_NORMAL
- en: Pipeline cells
  prefs: []
  type: TYPE_NORMAL
- en: 'The pipeline has five cells. Each cell can be filled with some value from the
    corresponding operator space. The cell can be empty if `none` value is selected.
    For example, the following pipeline might be selected: `Selector3` → `none` →
    `Transformer1` → `none` → `Classifier2`, which is equal to `Selector3` → `Transformer1`
    → `Classifier2`. This search space definition is huge and challenging to construct
    manually, so we will add a special class in Listing [3-19](#PC73) that will create
    an operator search space definition according to the NNI specification.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE71]'
  prefs: []
  type: TYPE_PRE
- en: Each cell has an operator type that can be filled by `selector`, `transformer`,
    and `classifier`. The `operator_search_space` method creates a search space for
    each cell type.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE72]'
  prefs: []
  type: TYPE_PRE
- en: 'Next, we define a method `build` that constructs a search space of all cells
    according to the NNI specification:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE73]'
  prefs: []
  type: TYPE_PRE
- en: 'Even though the search space definition is quite large, we can print it out:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE74]'
  prefs: []
  type: TYPE_PRE
- en: We will use dynamic search space construction to launch the experiment in embedded
    mode, although this technique can also be applied to build a static JSON file.
  prefs: []
  type: TYPE_NORMAL
- en: Model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: So, what do we have by now? We have an operator space and a search space. Let’s
    now implement a model that converts the pipeline configuration into a real machine
    learning classifier. Listing [3-20](#PC77) introduces `MlPipelineClassifier`.
  prefs: []
