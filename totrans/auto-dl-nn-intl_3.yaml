- en: 'Model training method:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE77]'
  prefs: []
  type: TYPE_PRE
- en: 'Computing the accuracy:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE78]'
  prefs: []
  type: TYPE_PRE
- en: 'Since the model is ready, let’s try to initialize it using the sample pipeline
    parameter and apply it to the classification problem:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE79]'
  prefs: []
  type: TYPE_PRE
- en: The model demonstrates **64%** accuracy. This is definitely not the result we
    expect, so let’s use the HPO techniques to construct a better-performance model.
  prefs: []
  type: TYPE_NORMAL
- en: Tuner
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Now everything is ready to start the experiment. But I would like to focus
    on the search space that we use. The trial parameter is a sequence of operators,
    which may contain empty operators, that is, `S3(p3)` → `none` → `T1(p1)` → `none`
    → `C2(p2)`. But at the same time, the following parameter exists too: `S3(p3)`
    → `none` → `none` → `T1(p1)` → `C2(p2)`. They are different parameters in the
    search space but generate the same classifier model:'
  prefs: []
  type: TYPE_NORMAL
- en: '`S3(p3)` → `none` → `T1(p1)` → `none` → `C2(p2)`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`S3(p3)` → `none` → `none` → `T1(p1)` → `C2(p2)`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`S3(p3)` → `T1(p1)` → `C2(p2).`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Keep in mind that the same two identical operators with different parameters
    are not equal, that is, `SelectFwe(alpha=0)` is not equal to `SelectFwe(alpha=0.05)`.
    Let’s customize Tuner by forbidding it to create parameters that will generate
    equivalent models concerning the parameters already tried, that is, if we already
    tried parameter `P`[`1`] = `SelectPercentile(percentile = 2)` → `none` → `Normalizer(norm='l1')`
    → `none` → `DecisionTreeClassifier(max_depth=8)`, then parameter `P`[`2`] = `SelectPercentile(percentile
    = 2)` → `none` → `none` → `Normalizer(norm='l1')` → `DecisionTreeClassifier(max_depth=8)`
    will not be passed to Experiment, because the model generated by `P`[`2`] equals
    to the model generated by `P`[`1`]. Let’s create `EvolutionShrinkTuner`, which
    inherits `EvolutionTuner` and tracks all executed pipelines forbidding passing
    the equal ones to the Experiment. We can see `EvolutionShrinkTuner` implementation
    in Listing [3-21](#PC82).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE80]'
  prefs: []
  type: TYPE_PRE
- en: 'We define registry property that will track all created pipelines:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE81]'
  prefs: []
  type: TYPE_PRE
- en: If the `super().generate_parameters` method of the parent `EvolutionTuner` object
    returns a parameter that has already been tried, then the `super().generate_parameters`
    method is called again until a unique parameter is generated. Because `EvolutionTuner`
    has random behavior, `super().generate_parameters` can be expected to return different
    parameters on subsequent calls.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE82]'
  prefs: []
  type: TYPE_PRE
- en: 'The following `is_valid` method converts the parameter to the canonical form
    by removing `none` operators and checks if it has already been tried: if it has,
    then returns `False`; if not, then saves it and returns `True`.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE83]'
  prefs: []
  type: TYPE_PRE
- en: This simple technique introduces the concept of equivalence between the elements
    of the search space and can significantly shrink the search space.
  prefs: []
  type: TYPE_NORMAL
- en: Experiment
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
