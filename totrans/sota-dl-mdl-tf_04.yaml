- en: We created a function to hold the model for this experiment. We do this to show
    you how this can be done with a function.
  prefs: []
  type: TYPE_NORMAL
- en: The model begins with four Conv2D layers and four associated MaxPooling2D layers.
    A *Conv2D* layer computes a 2D convolution given input and 4D filter tensors.
    In our case, dimensions of tensors are (200, 150, 150, 3). Input tensors are batches
    of 200 150 × 150 color images. A *MaxPooling2D* layer performs a max pooling operation
    for 2D spatial data. So each max pooling operation reduces the dimensionality
    of the 2D spatial data it receives from each Conv2D layer. We use a pooling size
    of 2 × 2 because we experienced good performance with this size.
  prefs: []
  type: TYPE_NORMAL
- en: '*Convolutional layers* apply filters to the original image or to other feature
    maps. The most important parameters are number and size of the kernels. *Pooling
    layers* perform max pooling or average pooling to reduce the dimensionality of
    the network. We use a pooling layer after each convolutional layer to reduce the
    dimensionality produced by the convolutional layer. Max pooling takes the maximum
    value in a filter region, while average pooling takes the average value in a filter
    region.'
  prefs: []
  type: TYPE_NORMAL
- en: The first Conv2D layer accepts the number of kernels, kernel size, input shape,
    strides, and regularization. We use a kernel size of 3 × 3 because we experienced
    good performance with this size. We added l1 and l2 regularization to reduce overfitting.
    A *kernel* is a filter used to extract features from images. Specifically, a kernel
    is a matrix that moves over the input data, performs the dot product with the
    subregion of input data, and gets the output as the matrix of dot products (or
    feature maps). A *feature map* captures the result of applying the filters (or
    kernels) to an input image.
  prefs: []
  type: TYPE_NORMAL
- en: The reason for visualizing a feature map for a specific input image is to try
    to gain some understanding of what features our CNN detects. We apply several
    convolutional layers to the data because we hope that each layer produces feature
    maps that help us detect clearer and clearer features.
  prefs: []
  type: TYPE_NORMAL
- en: The remaining Conv2D layers increase the kernel size to improve model performance.
    After each Conv2D layer is a MaxPooling2D to reduce the dimensionality contributed
    by convolution. Each Conv2D layer uses Rectified Linear Unit (ReLU) activation,
    which combats the vanishing gradient problem occurring with sigmoid distributions.
  prefs: []
  type: TYPE_NORMAL
- en: A Flatten layer prepares output from the convolutional layers for the Dense
    layers. Dense layers require a single long-feature vector as input. Two fully
    connected Dense layers are included for classification of the output.
  prefs: []
  type: TYPE_NORMAL
