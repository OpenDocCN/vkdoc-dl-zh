- en: We include data augmentation to improve learning. We chose the augmentations
    based on experimentation. We separate different augmentations into separate functions
    for flexibility. We conduct the experiment with all of the augmentations, but
    you can use one or more of the functions to conduct a new experiment. You can
    even skip the augmentation step to see how well the model learns with un-augmented
    training data.
  prefs: []
  type: TYPE_NORMAL
- en: Augmentation is an art. We haven’t found any applied deep learning research
    on how to systematically augment a given dataset. Deep learning algorithms have
    been around for many years, but application of them is much more recent. A big
    reason is that computing power was not even close to what it is now. And it is
    much cheaper! Another reason is that TensorFlow has only been available as an
    open source product for a few years.
