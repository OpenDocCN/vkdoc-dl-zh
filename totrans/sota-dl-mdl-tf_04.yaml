- en: '[PRE104]'
  id: totrans-356
  prefs: []
  type: TYPE_PRE
  zh: '[PRE104]'
- en: The first number 10757 is the current process identifier (pid) for TensorFlow.
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个数字 10757 是 TensorFlow 的当前进程标识符（pid）。
- en: 'Kill the process using the pid:'
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 pid 杀死进程：
- en: '[PRE105]'
  id: totrans-359
  prefs: []
  type: TYPE_PRE
  zh: '[PRE105]'
- en: Note
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: The pid changes each time TensorBoard is activated.
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 每次激活 TensorBoard 时，进程 ID（pid）都会改变。
