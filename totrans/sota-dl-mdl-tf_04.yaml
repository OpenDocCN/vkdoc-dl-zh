- en: An Experiment with rock_paper_scissors
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Although we just worked through an experiment with a large and complex dataset,
    we believe that practicing deep learning with multiple datasets is critically
    important to becoming a competent practitioner. During our seminars, we find that
    participants learn much faster when they can apply what they have learned to another
    context. In this case, it is a new dataset. The experiment is conducted on the
    rock_paper_scissors dataset, which contains 2,892 images of hands playing the
    rock-paper-scissors game.
