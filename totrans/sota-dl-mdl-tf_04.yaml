- en: The zoom function generates crop settings ranging from 1% to 20%. It then creates
    bounding boxes to hold the cropped images. Returned cropped images are resized
    to keep the size uniform for training. Cropping is only performed 50% of the time.
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 缩放函数生成从1%到20%的裁剪设置。然后创建边界框来容纳裁剪的图像。返回的裁剪图像被调整大小以保持训练时大小一致。裁剪只进行50%的时间。
- en: 'Create an augment function:'
  id: totrans-309
