- en: Predictions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To complete the experiment, let’s see how well the model predicts from the test
    set. We can make predictions on the entire test dataset or on a batch from the
    dataset.
  prefs: []
  type: TYPE_NORMAL
- en: 'Begin by making predictions on the entire test dataset and displaying the prediction
    array for the first example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE53]'
  prefs: []
  type: TYPE_PRE
- en: Predict on *test_batches* because it has never been seen by the model. The *predict()*
    method returns NumPy arrays of predictions. For classification experiments, each
    element in a prediction array represents a class label. Since we have two classes
    in our experiment (cats and dogs), each prediction array contains two elements.
    The cat prediction is the first value and the dog prediction is the second value
    in the array. Each value is the probability of the prediction. The magnitude of
    the probability represents the likelihood that the element is the predicted class.
    So the higher probability between the two elements in the prediction array represents
    the prediction. For example, a prediction array of [0.33, 0.778] means that the
    prediction is a dog since it has the higher probability.
  prefs: []
  type: TYPE_NORMAL
- en: 'Return the prediction for the first example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE54]'
  prefs: []
  type: TYPE_PRE
- en: The *tf.math.argmax()* API returns the index with the largest value across axes
    of a tensor. Simply, it returns the index in the prediction array with the highest
    value.
