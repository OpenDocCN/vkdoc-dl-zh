  prefs: []
  type: TYPE_NORMAL
  zh: 启动 TensorBoard：
- en: '[PRE102]'
  id: totrans-350
  prefs: []
  type: TYPE_PRE
  zh: '[PRE102]'
- en: Again, we show you how to use TensorBoard within the context of an experiment
    to speed your learning. We don’t use TensorBoard that often because we can see
    model performance with just a few lines of code as we have done previously. But
    we believe it is a good idea to expose you to the product. You may prefer it over
    the way we visualize learning performance.
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，我们向您展示如何在实验的上下文中使用 TensorBoard 来加速您的学习。我们并不经常使用 TensorBoard，因为我们只需几行代码就能看到模型性能，就像我们之前所做的那样。但我们认为让您了解这个产品是个好主意。您可能更喜欢我们可视化学习性能的方式。
- en: Close TensorBoard Server
  id: totrans-352
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 关闭 TensorBoard 服务器
- en: 'Use the Global Regular Expression Print (grep) command to get the running TensorBoard
    process details:'
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 使用全局正则表达式打印（grep）命令来获取正在运行的 TensorBoard 进程详细信息：
- en: '[PRE103]'
  id: totrans-354
  prefs: []
  type: TYPE_PRE
  zh: '[PRE103]'
- en: 'Output looks something like this:'
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
