- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: Although the learning models we apply may appear complex to the novice deep
    learning aficionado, they are really very simple. As you gain experience with
    learning models, you will gain the confidence to build more complex ones or migrate
    to transfer learning models. We cover transfer learning models in this book.
