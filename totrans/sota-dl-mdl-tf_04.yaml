- en: '[PRE93]'
  id: totrans-329
  prefs: []
  type: TYPE_PRE
  zh: '[PRE93]'
- en: 'Inspect the model:'
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 检查模型：
- en: '[PRE94]'
  id: totrans-331
  prefs: []
  type: TYPE_PRE
  zh: '[PRE94]'
- en: We introduce another utility to inspect the model as an alternative. We try
    to expose you to as many options as possible. But we don’t want to overwhelm.
    So we sprinkle in something new within the context of an experiment. We have found
    that learning a complex software like TensorFlow is much faster done within some
    context.
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 我们介绍另一个工具来检查模型，作为替代方案。我们试图向您展示尽可能多的选项。但我们不想让您感到不知所措。所以我们在实验的上下文中加入一些新内容。我们发现，在某个上下文中学习像
    TensorFlow 这样复杂的软件要快得多。
- en: Compile and Train
