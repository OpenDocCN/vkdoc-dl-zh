  type: TYPE_NORMAL
  zh: 可视化性能
- en: Create a function as shown in Listing [4-18](#PC101).
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个如列表 [4-18](#PC101) 所示的函数。
