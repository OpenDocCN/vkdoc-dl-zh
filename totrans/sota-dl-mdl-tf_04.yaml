- en: 4. Deep Learning with TensorFlow Datasets
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 4. 使用TensorFlow数据集进行深度学习
- en: In the previous chapter, we demonstrated how to work with TFDS objects. In this
    chapter, we work through two end-to-end deep learning experiments with large and
    complex TFDS objects. The Fashion-MNIST and beans datasets are small with simple
    images.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一章中，我们展示了如何处理TFDS对象。在本章中，我们将通过两个端到端深度学习实验来处理大型和复杂的TFDS对象。Fashion-MNIST和豆类数据集具有简单的图像。
- en: The first experiment works with a large dataset containing complex images of
    cats and dogs. The second one works with a dataset containing complex images of
    human hands. The human hands dataset is not as large as the one in the first experiment.
    Both experiments include data augmentation to enhance performance. The goal is
    to help you work through end-to-end learning experiments with larger and more
    complex datasets.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个实验使用包含猫和狗复杂图像的大型数据集。第二个实验使用包含人类手部复杂图像的数据集。人类手部数据集的大小不如第一个实验中的数据集大。两个实验都包括数据增强以提高性能。目标是帮助你完成更大和更复杂的端到端学习实验。
- en: 'Notebooks for chapters are located at the following URL:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 各章节的笔记本位于以下URL：
- en: '[`https://github.com/paperd/deep-learning-models`](https://github.com/paperd/tensorflow)'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://github.com/paperd/deep-learning-models](https://github.com/paperd/tensorflow)'
- en: An Experiment with cats_vs_dogs
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 进行cats_vs_dogs实验
- en: We demonstrate an end-to-end example with the *cats_vs_dogs* dataset. The dataset
    contains 23,262 examples of large images of cats and dogs. The goal of this experiment
    is to provide you experience training a large and complex TFDS. We encourage you
    to work through many datasets to gain more experience with deep learning. Data
    is the key! Working with various datasets provides different experiences because
    each dataset is unique.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用*cats_vs_dogs*数据集演示了一个端到端的示例。该数据集包含23,262个猫和狗的大图像示例。本实验的目的是为你提供训练大型和复杂TFDS的经验。我们鼓励你处理多个数据集，以获得更多深度学习的经验。数据是关键！与各种数据集一起工作可以提供不同的体验，因为每个数据集都是独特的。
- en: Note
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Working with large image files requires a lot of RAM. So you may need to invest
    in more memory or subscribe to Google’s Colab Pro service if your computer crashes.
    On our PC, we have had RAM crashes with this dataset on occasion. But since we
    upgraded to Colab Pro, we haven’t had any issues.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 处理大型图像文件需要大量的RAM。因此，你可能需要投资更多内存或订阅Google的Colab Pro服务，以防你的电脑崩溃。在我们的PC上，我们偶尔会遇到这个数据集导致RAM崩溃的情况。但自从我们升级到Colab
    Pro以来，我们没有遇到过任何问题。
- en: Import the TensorFlow Library
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 导入TensorFlow库
- en: 'Import the library and alias it as **tf**:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 导入库并将其别名为**tf**：
- en: '[PRE0]'
  id: totrans-11
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Aliasing the TensorFlow library as tf is common practice.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 将TensorFlow库别名为tf是常见做法。
- en: GPU Hardware Accelerator
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: GPU硬件加速器
- en: 'As a convenience, we provide the steps to enable the GPU in a Colab notebook:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 为了方便起见，我们提供了在Colab笔记本中启用GPU的步骤：
- en: Click *Runtime* in the top-left menu.
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击左上角的*运行*菜单。
- en: Click *Change runtime type* from the drop-down menu.
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从下拉菜单中选择*更改运行时类型*。
- en: Choose *GPU* from the *Hardware accelerator* drop-down menu.
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从*硬件加速器*下拉菜单中选择*GPU*。
- en: Click *Save*.
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击*保存*。
- en: 'Verify that the GPU is active:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 验证GPU是否激活：
- en: '[PRE1]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: If ‘/device:GPU:0’ is displayed, the GPU is active. If ‘..’ is displayed, the
    regular CPU is active.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 如果显示“/device:GPU:0”，则GPU已激活。如果显示“..”，则常规CPU已激活。
- en: Note
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: If you get the error **NAME ‘TF’ IS NOT DEFINED**, re-execute the code to import
    the TensorFlow library!
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你遇到错误**“名称‘TF’未定义”**，请重新执行代码以导入TensorFlow库！
- en: Begin the Experiment
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 开始实验
- en: When working with a new dataset, it is a good idea to explore its metadata.
    We can then make an informed decision on how to split it.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 当处理新的数据集时，探索其元数据是一个好主意。然后我们可以做出明智的决定来分割它。
- en: Load the TFDS Object
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 加载TFDS对象
- en: 'Load the dataset with simple parameters to get its metadata:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 使用简单的参数加载数据集以获取其元数据：
- en: '[PRE2]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: It takes a bit longer to load the dataset because it contains over 20,000 large
    images. But once the dataset is loaded into memory, reloading the dataset is very
    fast. Corrupted images are automatically skipped.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 由于数据集包含超过20,000张大型图像，因此加载数据集需要更长的时间。但一旦数据集被加载到内存中，重新加载数据集就非常快。损坏的图像会自动跳过。
- en: Metadata
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 元数据
- en: 'Display the contents of the info object:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 显示info对象的内容：
- en: '[PRE3]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: A lot of information is contained in this object. But we only need to access
    a few pieces of information from it. Although you may not need a lot of the information
    contained in the object, it doesn’t hurt to display it and read through what is
    available.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 这个对象包含了很多信息。但我们只需要从中访问其中的一些信息。尽管您可能不需要对象中包含的大量信息，但显示它并阅读可用的信息并无害处。
- en: 'Get class labels and number of classes:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 获取类别标签和类别数量：
- en: '[PRE4]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: From the metadata, we see that the dataset is *not* presplit. So we must split
    the data ourselves. We chose to split 80% for the training set, 10% for the validation
    set, and 10% for the test set. You can choose different splits if you wish.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 从元数据中，我们看到数据集**没有**预先分割。因此，我们必须自己分割数据。我们选择将80%的数据分割为训练集，10%的数据分割为验证集，10%的数据分割为测试集。如果您愿意，可以选择不同的分割比例。
- en: 'Display split information:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 显示分割信息：
- en: '[PRE5]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Using our split scheme (80:10:10), we should have 18,610 examples for training,
    2,326 examples for validation, and 2,326 examples for testing. The motivation
    for separating data into training, validation, and test splits is to learn from
    the training data, tune from the validation data, and generalize from the test
    data.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 使用我们的分割方案（80:10:10），我们应该有18,610个训练示例，2,326个验证示例和2,326个测试示例。将数据分割成训练、验证和测试集的动机是从训练数据中学习，从验证数据中调整，从测试数据中泛化。
- en: Note
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: We are not actually splitting the data in this section. We are just showing
    you how many examples will be in each split with our split scheme.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在本节中实际上并没有分割数据。我们只是用我们的分割方案向您展示每个分割中会有多少个示例。
- en: Although it is common to see data separated into just training and test splits,
    it is advantageous to add one more split to hold aside some data that the model
    has never touched. With three splits, training data is for learning, validation
    data is for tweaking and tuning, and test data is for evaluating for generalizability.
    With just a training and test split, we must tune and generalize from the test
    set. Since the model touches the test set, it is not entirely new data!
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然将数据仅分割为训练集和测试集是很常见的，但添加一个额外的分割来保留模型从未接触过的数据是有利的。有了三个分割，训练数据用于学习，验证数据用于调整和微调，测试数据用于评估泛化能力。只有训练集和测试集时，我们必须从测试集进行调整和泛化。由于模型接触了测试集，它并不是完全的新数据！
- en: 'Verify split percentages:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 验证分割百分比：
- en: '[PRE6]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Since the dataset contains 23,262 images, we verify the number of images in
    each set by dividing by that number.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 由于数据集包含23,262张图像，我们通过除以该数字来验证每个集合中的图像数量。
- en: Split the Data
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 分割数据
- en: 'We can load data into one container and manually perform the desired splits.
    Or we can just include split information in the split parameter as so:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将数据加载到一个容器中，并手动执行所需的分割。或者，我们可以在分割参数中包含分割信息，如下所示：
- en: '[PRE7]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The code loads 80% of the data into the training set, 10% of the data into the
    validation set, and 10% of the data into the test set in a single step. Previously,
    we demonstrated how to load the training and test sets in one step.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 代码在单步中将80%的数据加载到训练集中，10%的数据加载到验证集中，10%的数据加载到测试集中。之前，我们演示了如何单步加载训练集和测试集。
- en: 'Manually verify the number of examples in each split:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 手动验证每个分割中的示例数量：
- en: '[PRE8]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: The list operation takes some time because each tensor example is processed
    into a list. So we **don’t** recommend performing this operation for REALLY large
    datasets!
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 列表操作需要一些时间，因为每个张量示例都需要被处理成列表。所以我们**不**推荐对非常大的数据集执行此操作！
- en: Visualize
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可视化
- en: Let’s visualize some examples in the training set to see what the images and
    labels look like. We can visualize three ways.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们可视化训练集中的某些示例，看看图像和标签的外观。我们可以以三种方式可视化。
- en: 'Display examples with show_examples:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 使用show_examples显示示例：
- en: '[PRE9]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'Display examples as a dataframe:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 以数据框的形式显示示例：
- en: '[PRE10]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'For maximum control, manually display examples. Begin by taking some examples:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 为了获得最大控制，手动显示示例。首先，取一些示例：
- en: '[PRE11]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Continue by visualizing examples as shown in Listing [4-1](#PC13).
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 然后按照列表[4-1](#PC13)所示可视化示例：
- en: '[PRE12]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Now, we have an idea of what examples look like in the dataset.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们已经了解了数据集中示例的外观。
- en: Inspect Examples
  id: totrans-64
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 检查示例
- en: Take some examples and convert them to NumPy arrays as shown in Listing [4-2](#PC14).
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 按照列表[4-2](#PC14)所示取一些示例并将它们转换为NumPy数组：
- en: '[PRE13]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: It is easier to work with NumPy arrays when visualizing examples.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 在可视化示例时，使用NumPy数组更容易。
- en: Visualize as shown in Listing [4-3](#PC15).
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表[4-3](#PC15)所示可视化：
- en: '[PRE14]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Reformat Images
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 重新格式化图像
- en: 'Create a function to resize and scale images:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个调整和缩放图像的函数：
- en: '[PRE15]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: It is faster to train a model with smaller images. So resize images to 150 ×
    150 pixels. Scale images to improve training performance.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 使用较小的图像训练模型速度更快。因此，将图像调整大小为150 × 150像素。调整图像大小以提高训练性能。
- en: Note
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: When resizing images to a smaller size, some information is lost. But the tf.image.resize
    does a good job of preserving as much information as possible. We resize images
    to 150 × 150 to preserve most of the information while increasing learning speed.
    Experiment with different sizes to see the impact on performance.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 当将图像调整到更小的尺寸时，会丢失一些信息。但tf.image.resize很好地保留了尽可能多的信息。我们将图像调整到150 × 150以保留大部分信息，同时提高学习速度。尝试不同的尺寸以查看对性能的影响。
- en: The function is used in the next section to facilitate building the input pipeline.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 函数在下一节中用于简化输入管道的构建。
- en: Build the Input Pipeline
  id: totrans-77
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建输入管道
- en: The input pipeline is built by preparing the training, validation, and test
    sets for the learning model.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 通过准备学习模型的训练、验证和测试集来构建输入管道。
- en: 'Set batch and shuffle parameters:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 设置批量和打乱参数：
- en: '[PRE16]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Tip
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士
- en: Experiment with batch and shuffle sizes to see how learning performance is impacted.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试不同的批量和打乱大小，以查看对学习性能的影响。
- en: 'Transform data for optimum performance:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 转换数据以实现最佳性能：
- en: '[PRE17]'
  id: totrans-84
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: By batching, training time is reduced. By shuffling, accuracy is usually increased.
    Caching helps better manage memory, and prefetching should reduce training time.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 通过批处理，可以减少训练时间。通过打乱，通常可以提高准确性。缓存有助于更好地管理内存，而预取应该减少训练时间。
- en: 'Inspect tensors:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 检查张量：
- en: '[PRE18]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Visualize and Inspect Examples from a Batch
  id: totrans-88
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可视化和检查批次中的示例
- en: 'Take the first training batch:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 取第一个训练批次：
- en: '[PRE19]'
  id: totrans-90
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: 'Inspect the first example from the batch:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 检查批次中的第一个示例：
- en: '[PRE20]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: The example contains a 150 × 150 × 3 image of either a “dog” or a “cat.” We
    can’t know which because of randomization effects.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 示例包含一个150 × 150 × 3的“狗”或“猫”图像。由于随机化效应，我们无法知道是哪一种。
- en: 'Extract four examples into lists:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 将四个示例提取到列表中：
- en: '[PRE21]'
  id: totrans-95
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: Squeeze out the *1* dimension because the *imshow()* function expects a 2D matrix.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 挤压掉*1*维，因为*imshow()*函数期望一个2D矩阵。
- en: Visualize images as shown in Listing [4-4](#PC23).
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表[4-4](#PC23)所示可视化图像。
- en: '[PRE22]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: Build the Model
  id: totrans-99
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建模型
- en: 'Get input shape:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 获取输入形状：
- en: '[PRE23]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: 'Import libraries:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 导入库：
- en: '[PRE24]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: 'Clear and seed:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 清除和设置随机种子：
- en: '[PRE25]'
  id: totrans-105
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: Create a function to build the model as shown in Listing [4-5](#PC27).
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数来构建如列表[4-5](#PC27)所示的模型。
- en: '[PRE26]'
  id: totrans-107
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: We created a function to hold the model for this experiment. We do this to show
    you how this can be done with a function.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 我们创建了一个函数来保存这个实验中的模型。我们这样做是为了向您展示如何使用函数来完成这项工作。
- en: The model begins with four Conv2D layers and four associated MaxPooling2D layers.
    A *Conv2D* layer computes a 2D convolution given input and 4D filter tensors.
    In our case, dimensions of tensors are (200, 150, 150, 3). Input tensors are batches
    of 200 150 × 150 color images. A *MaxPooling2D* layer performs a max pooling operation
    for 2D spatial data. So each max pooling operation reduces the dimensionality
    of the 2D spatial data it receives from each Conv2D layer. We use a pooling size
    of 2 × 2 because we experienced good performance with this size.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 模型开始于四个Conv2D层和四个相关的MaxPooling2D层。一个*Conv2D*层根据输入和4D滤波器张量计算2D卷积。在我们的情况下，张量的维度是(200,
    150, 150, 3)。输入张量是200个150 × 150彩色图像的批次。一个*MaxPooling2D*层对2D空间数据进行最大池化操作。因此，每个最大池化操作都会减少从每个Conv2D层接收到的2D空间数据的维度。我们使用2
    × 2的池化大小，因为我们发现这个大小有很好的性能。
- en: '*Convolutional layers* apply filters to the original image or to other feature
    maps. The most important parameters are number and size of the kernels. *Pooling
    layers* perform max pooling or average pooling to reduce the dimensionality of
    the network. We use a pooling layer after each convolutional layer to reduce the
    dimensionality produced by the convolutional layer. Max pooling takes the maximum
    value in a filter region, while average pooling takes the average value in a filter
    region.'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: '*卷积层*将滤波器应用于原始图像或其他特征图。最重要的参数是核的数量和大小。*池化层*执行最大池化或平均池化以减少网络的维度。我们在每个卷积层之后使用池化层来减少卷积层产生的维度。最大池化取滤波器区域内的最大值，而平均池化取滤波器区域内的平均值。'
- en: The first Conv2D layer accepts the number of kernels, kernel size, input shape,
    strides, and regularization. We use a kernel size of 3 × 3 because we experienced
    good performance with this size. We added l1 and l2 regularization to reduce overfitting.
    A *kernel* is a filter used to extract features from images. Specifically, a kernel
    is a matrix that moves over the input data, performs the dot product with the
    subregion of input data, and gets the output as the matrix of dot products (or
    feature maps). A *feature map* captures the result of applying the filters (or
    kernels) to an input image.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个 Conv2D 层接受核的数量、核大小、输入形状、步长和正则化。我们使用 3 × 3 的核大小，因为我们发现这个尺寸的性能很好。我们添加了 l1
    和 l2 正则化来减少过拟合。*核* 是一个用于从图像中提取特征的过滤器。具体来说，核是一个在输入数据上移动的矩阵，它与输入数据的子区域执行点积，并将输出作为点积矩阵（或特征图）。*特征图*
    捕获将过滤器（或核）应用于输入图像的结果。
- en: The reason for visualizing a feature map for a specific input image is to try
    to gain some understanding of what features our CNN detects. We apply several
    convolutional layers to the data because we hope that each layer produces feature
    maps that help us detect clearer and clearer features.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化特定输入图像的特征图的原因是试图了解我们的 CNN 检测到的特征。我们应用几个卷积层到数据上，因为我们希望每一层产生的特征图能帮助我们检测更清晰的特征。
- en: The remaining Conv2D layers increase the kernel size to improve model performance.
    After each Conv2D layer is a MaxPooling2D to reduce the dimensionality contributed
    by convolution. Each Conv2D layer uses Rectified Linear Unit (ReLU) activation,
    which combats the vanishing gradient problem occurring with sigmoid distributions.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 剩余的 Conv2D 层增加核大小以提高模型性能。在每个 Conv2D 层之后是一个 MaxPooling2D，以减少卷积贡献的维度。每个 Conv2D
    层使用修正线性单元（ReLU）激活，这有助于解决与 sigmoid 分布相关的梯度消失问题。
- en: A Flatten layer prepares output from the convolutional layers for the Dense
    layers. Dense layers require a single long-feature vector as input. Two fully
    connected Dense layers are included for classification of the output.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: Flatten 层为卷积层的输出准备输入到 Dense 层。Dense 层需要一个单个长特征向量作为输入。包括两个完全连接的 Dense 层用于输出分类。
- en: 'Create the model:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 创建模型：
- en: '[PRE27]'
  id: totrans-116
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: 'Inspect the model:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 检查模型：
- en: '[PRE28]'
  id: totrans-118
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: For a great resource on applying regularization to a learning model, peruse
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 关于将正则化应用于学习模型的优秀资源，请参阅
- en: '[`www.machinecurve.com/index.php/2020/01/23/how-to-use-l1-l2-and-elastic-net-regularization-with-keras/`](http://www.machinecurve.com/index.php/2020/01/23/how-to-use-l1-l2-and-elastic-net-regularization-with-keras/)'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: '[如何使用 Keras 中的 L1、L2 和弹性网正则化](http://www.machinecurve.com/index.php/2020/01/23/how-to-use-l1-l2-and-elastic-net-regularization-with-keras/)'
- en: Compile and Train the Model
  id: totrans-121
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编译和训练模型
- en: 'Compile :'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 编译：
- en: '[PRE29]'
  id: totrans-123
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: Since the model outputs logits, set *from_logits=True*. The model outputs logits
    because we used the sigmoid activation function in the output layer of the model.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 由于模型输出 logits，设置 *from_logits=True*。模型输出 logits 是因为我们使用了模型输出层的 sigmoid 激活函数。
- en: 'Train:'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 训练：
- en: '[PRE30]'
  id: totrans-126
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: The model learns from the training set and validates with the validation set.
    The model never touches the test set.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 模型从训练集学习，并在验证集上进行验证。模型从未接触过测试集。
- en: Evaluate the Model for Generalizability
  id: totrans-128
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 评估模型的泛化性
- en: 'Use the evaluate method with the test batch:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 使用测试批次执行 evaluate 方法：
- en: '[PRE31]'
  id: totrans-130
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: The *evaluate()* method returns the loss and accuracy values. We use *test_batches*
    to evaluate for generalizability because the model has never seen this dataset.
    **Generalization** is a learning model’s ability to adapt properly to new, previously
    unseen data, drawn from the same distribution as the one used to create the model.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: '*evaluate()* 方法返回损失和准确度值。我们使用 *test_batches* 来评估泛化性，因为模型从未见过这个数据集。**泛化**是学习模型适应新数据的能力，这些新数据来自与创建模型相同的分布。'
- en: Visualize Performance
  id: totrans-132
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可视化性能
- en: Create a visualization function as shown in Listing [4-6](#PC33).
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个如图 [4-6](#PC33) 所示的可视化函数。
- en: '[PRE32]'
  id: totrans-134
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: 'Invoke the function:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 调用函数：
- en: '[PRE33]'
  id: totrans-136
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: The model is overfitting because the test accuracy is not that closely aligned
    with the training accuracy.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 模型过拟合，因为测试准确度并没有与训练准确度非常接近。
- en: Augmentation with Preprocessing Layers
  id: totrans-138
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 预处理层增强
- en: To mitigate overfitting and improve model performance, we experiment with data
    augmentation. Apply random horizontal flips, random rotation, and random zoom
    as shown in Listing [4-7](#PC35).
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 为了减轻过拟合并提高模型性能，我们尝试数据增强。应用随机水平翻转、随机旋转和随机缩放，如图 [4-7](#PC35) 所示。
- en: '[PRE34]'
  id: totrans-140
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: We chose to use these layers based on trial and error experimentation. Feel
    free to experiment with other layers.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 我们选择使用这些层是基于试错实验。请随意尝试其他层。
- en: Note
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: This transformation operation is experimental, which means that it may change
    in the future.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 这种转换操作是实验性的，这意味着它可能在将来发生变化。
- en: Display an augmented image as shown in Listing [4-8](#PC36).
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表[4-8](#PC36)所示显示增强图像。
- en: '[PRE35]'
  id: totrans-145
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: The visualization shows data augmentation applied to the same image several
    times. Change the index from 0 (in *augmented_images[0]*) to between 1 and 199
    (batch size 200) to see different images in the *plt.imshow* code statement.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化显示了多次应用于同一图像的数据增强。将索引从0（在*augmented_images[0]*中）更改为1到199（批大小200），以在*plt.imshow*代码语句中查看不同的图像。
- en: Build the Model
  id: totrans-147
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建模型
- en: Build the model by clearing previous sessions, generating a seed, and creating
    the model for the experiment.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 通过清除之前的会话、生成一个种子并创建实验模型来构建模型。
- en: 'Clear and seed:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 清除和设置种子：
- en: '[PRE36]'
  id: totrans-150
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: Create the model as shown in Listing [4-9](#PC38).
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表[4-9](#PC38)所示创建模型。
- en: '[PRE37]'
  id: totrans-152
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: Notice that the first layer is the augmentation that we created! So the model
    gets the augmentations from the first layer and continues like other convolutional
    models from that point forward.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，第一层是我们创建的增强！因此，模型从第一层获取增强，并从该点开始像其他卷积模型一样继续。
- en: Compile and Train the Model
  id: totrans-154
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编译和训练模型
- en: 'Compile :'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 编译：
- en: '[PRE38]'
  id: totrans-156
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: 'Train:'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 训练：
- en: '[PRE39]'
  id: totrans-158
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: Evaluate the Model for Generalizability
  id: totrans-159
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 评估模型的泛化能力
- en: 'Evaluate :'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 评估：
- en: '[PRE40]'
  id: totrans-161
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: Data augmentation doesn’t guarantee better performance. It is only a technique
    that can be applied for that purpose. In addition, we run this model for only
    ten epochs. So it may take more epochs to see better performance.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 数据增强不能保证更好的性能。它只是一种可以应用于此目的的技术。此外，我们只运行了这个模型十轮。因此，可能需要更多轮次才能看到更好的性能。
- en: Visualize Performance
  id: totrans-163
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可视化性能
- en: 'Visualize training performance:'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化训练性能：
- en: '[PRE41]'
  id: totrans-165
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: Overfitting has been somewhat mitigated. Try running the experiment for more
    epochs to see what happens.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 过度拟合已经有所缓解。尝试运行更多轮次的实验以查看会发生什么。
- en: Apply Data Augmentation on Images
  id: totrans-167
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在图像上应用数据增强
- en: Apply data augmentation by performing transformations directly on images .
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 通过直接对图像执行转换来应用数据增强。
- en: Create functions to augment images as shown in Listing [4-10](#PC43).
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 创建函数以增强图像，如列表[4-10](#PC43)所示。
- en: '[PRE42]'
  id: totrans-170
  prefs: []
  type: TYPE_PRE
  zh: '[PRE42]'
- en: The *random_crop* function randomly crops images. The *preprocess* function
    calls random_crop, randomly flips images left to right, and resizes them. The
    *tf.keras.applications.xception.preprocess_input* utility preprocesses a tensor
    (or NumPy array) by encoding a batch of images. Through research and experimentation,
    we found that these augmentations increase performance and mitigate overfitting.
    Experiment with different augmentations and see what happens.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: '*random_crop*函数随机裁剪图像。*preprocess*函数调用random_crop，随机左右翻转图像，并调整大小。*tf.keras.applications.xception.preprocess_input*实用工具通过编码一批图像来预处理张量（或NumPy数组）。通过研究和实验，我们发现这些增强提高了性能并缓解了过度拟合。尝试不同的增强并查看会发生什么。'
- en: Build the Input Pipeline
  id: totrans-172
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建输入管道
- en: 'Import the *partial* package:'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 导入*partial*包：
- en: '[PRE43]'
  id: totrans-174
  prefs: []
  type: TYPE_PRE
  zh: '[PRE43]'
- en: The partial package allows us to create partial functions. Partial functions
    allow us to fix a certain number of arguments of a function and generate a new
    function.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: partial包允许我们创建部分函数。部分函数允许我们固定函数的一定数量的参数并生成一个新的函数。
- en: 'Set batch and shuffle size parameters:'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 设置批量和洗牌大小参数：
- en: '[PRE44]'
  id: totrans-177
  prefs: []
  type: TYPE_PRE
  zh: '[PRE44]'
- en: Tip
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士
- en: Experiment with batch and shuffle sizes to see how learning performance is impacted.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试不同的批量和洗牌大小，以查看学习性能如何受到影响。
- en: 'Build the pipeline:'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 构建管道：
- en: '[PRE45]'
  id: totrans-181
  prefs: []
  type: TYPE_PRE
  zh: '[PRE45]'
- en: Setting partial on the preprocess function fixes its arguments so we can apply
    transformations to images *only from the training set*! We don’t need to augment
    the other datasets because the model only learns from the training set.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 在预处理函数上设置部分参数可以固定其参数，这样我们就可以仅对训练集中的图像应用转换！我们不需要增强其他数据集，因为模型只从训练集中学习。
- en: Display an Augmented Image
  id: totrans-183
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 显示增强图像
- en: Here’s what the augmentations do to an image as shown in Listing [4-11](#PC47).
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表[4-11](#PC47)所示，这是增强对图像的影响。
- en: '[PRE46]'
  id: totrans-185
  prefs: []
  type: TYPE_PRE
  zh: '[PRE46]'
- en: We display augmentations on the first image from the batch. Experiment with
    the index number to see augmentations of any of the 200 images from the batch.
    Be sure to choose an index between 0 and 199 because the batch size is 200!
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 我们显示批次的第一个图像上的增强。尝试不同的索引号以查看批次中的任何200个图像的增强。请确保选择介于0和199之间的索引，因为批大小是200！
- en: Build the Model
  id: totrans-187
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建模型
- en: 'Clear and seed:'
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 清除和设置种子：
- en: '[PRE47]'
  id: totrans-189
  prefs: []
  type: TYPE_PRE
  zh: '[PRE47]'
- en: 'Create the model:'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 创建模型：
- en: '[PRE48]'
  id: totrans-191
  prefs: []
  type: TYPE_PRE
  zh: '[PRE48]'
- en: Compile and Train the Model
  id: totrans-192
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编译和训练模型
- en: 'Compile :'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 编译：
- en: '[PRE49]'
  id: totrans-194
  prefs: []
  type: TYPE_PRE
  zh: '[PRE49]'
- en: 'Train:'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 训练：
- en: '[PRE50]'
  id: totrans-196
  prefs: []
  type: TYPE_PRE
  zh: '[PRE50]'
- en: We only train for a few epochs because training time is substantially increased
    with the augmentations that we applied to images. Experiment with the number of
    epochs to see what happens.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 我们只训练了几个轮次，因为应用到的图像增强增加了训练时间。尝试不同的轮次数量，看看会发生什么。
- en: Evaluate the Model for Generalizability
  id: totrans-198
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 评估模型的泛化能力
- en: 'Evaluate :'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 评估：
- en: '[PRE51]'
  id: totrans-200
  prefs: []
  type: TYPE_PRE
  zh: '[PRE51]'
- en: We use the test set because it has never been seen by the model.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用测试集，因为它从未被模型看到。
- en: Note
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: The accuracy may seem to be less, but it actually isn’t. The reason is that
    we may need to run the model for many more epochs. This is why we encourage you
    to experiment with the number of epochs.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 准确率可能看起来较低，但实际上并非如此。原因是我们可能需要运行模型更多的轮次。这就是为什么我们鼓励你尝试不同的轮次数量。
- en: Visualize Performance
  id: totrans-204
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可视化性能
- en: 'Visualize training performance:'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化训练性能：
- en: '[PRE52]'
  id: totrans-206
  prefs: []
  type: TYPE_PRE
  zh: '[PRE52]'
- en: Validation accuracy trajectory is much better! That is, the training and test
    values are more closely aligned.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 验证准确率轨迹要好得多！也就是说，训练和测试值更接近。
- en: Predictions
  id: totrans-208
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 预测
- en: To complete the experiment, let’s see how well the model predicts from the test
    set. We can make predictions on the entire test dataset or on a batch from the
    dataset.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 为了完成实验，让我们看看模型从测试集预测的效果如何。我们可以在整个测试数据集或数据集的一个批次上进行预测。
- en: 'Begin by making predictions on the entire test dataset and displaying the prediction
    array for the first example:'
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 首先对整个测试数据集进行预测，并显示第一个示例的预测数组：
- en: '[PRE53]'
  id: totrans-211
  prefs: []
  type: TYPE_PRE
  zh: '[PRE53]'
- en: Predict on *test_batches* because it has never been seen by the model. The *predict()*
    method returns NumPy arrays of predictions. For classification experiments, each
    element in a prediction array represents a class label. Since we have two classes
    in our experiment (cats and dogs), each prediction array contains two elements.
    The cat prediction is the first value and the dog prediction is the second value
    in the array. Each value is the probability of the prediction. The magnitude of
    the probability represents the likelihood that the element is the predicted class.
    So the higher probability between the two elements in the prediction array represents
    the prediction. For example, a prediction array of [0.33, 0.778] means that the
    prediction is a dog since it has the higher probability.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 在 *test_batches* 上进行预测，因为它从未被模型看到。*predict()* 方法返回预测的 NumPy 数组。对于分类实验，预测数组中的每个元素代表一个类别标签。由于我们的实验中有两个类别（猫和狗），每个预测数组包含两个元素。猫的预测是数组中的第一个值，狗的预测是第二个值。每个值是预测的概率。概率的大小表示元素是预测类别的可能性。因此，预测数组中两个元素之间较高的概率代表预测。例如，预测数组
    [0.33, 0.778] 表示预测是一只狗，因为它有更高的概率。
- en: 'Return the prediction for the first example:'
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 返回第一个示例的预测：
- en: '[PRE54]'
  id: totrans-214
  prefs: []
  type: TYPE_PRE
  zh: '[PRE54]'
- en: The *tf.math.argmax()* API returns the index with the largest value across axes
    of a tensor. Simply, it returns the index in the prediction array with the highest
    value.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: '*tf.math.argmax()* API 返回张量轴上的最大值的索引。简单来说，它返回预测数组中值最高的索引。'
- en: 'We can also make predictions on a single batch:'
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 我们也可以对单个批次进行预测：
- en: '[PRE55]'
  id: totrans-217
  prefs: []
  type: TYPE_PRE
  zh: '[PRE55]'
- en: Take the first batch and make predictions on it.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 对第一个批次取第一个批次并对其进行预测。
- en: 'Get the prediction for the first example in the batch:'
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 获取批次中的第一个示例的预测：
- en: '[PRE56]'
  id: totrans-220
  prefs: []
  type: TYPE_PRE
  zh: '[PRE56]'
- en: 'Get the first actual label:'
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 获取第一个实际标签：
- en: '[PRE57]'
  id: totrans-222
  prefs: []
  type: TYPE_PRE
  zh: '[PRE57]'
- en: Grab actual images and labels from the first batch. Display the first actual
    image shape and its corresponding label. If the prediction matches the actual
    label, the prediction is correct!
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 从第一个批次获取实际的图像和标签。显示第一个实际图像的形状及其对应的标签。如果预测与实际标签匹配，则预测正确！
- en: Manually check prediction accuracy as shown in Listing [4-12](#PC59).
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表 [4-12](#PC59) 所示，手动检查预测准确度。
- en: '[PRE58]'
  id: totrans-225
  prefs: []
  type: TYPE_PRE
  zh: '[PRE58]'
- en: The code computes the prediction accuracy of the test data and displays it as
    a percentage.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 代码计算测试数据的预测准确率，并以百分比的形式显示。
- en: Visualize Predictions
  id: totrans-227
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可视化预测
- en: 'Grab the first batch of images and labels from the test set:'
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 从测试集中获取第一个批次的图像和标签：
- en: '[PRE59]'
  id: totrans-229
  prefs: []
  type: TYPE_PRE
  zh: '[PRE59]'
- en: Each batch contains 200 150 × 150 color images.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 每个批次包含 200 张 150 × 150 的彩色图像。
- en: 'Inspect the first image from the first batch:'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 检查第一批次的第一张图像：
- en: '[PRE60]'
  id: totrans-232
  prefs: []
  type: TYPE_PRE
  zh: '[PRE60]'
- en: 'Visualize the image:'
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化图像：
- en: '[PRE61]'
  id: totrans-234
  prefs: []
  type: TYPE_PRE
  zh: '[PRE61]'
- en: We use the *tf.keras.applications.xception.preprocess_input* utility to preprocess
    images (see the preprocessing function in Listing [4-10](#PC43)). The utility
    instantiates the Xception architecture for optimum performance. However, it doesn’t
    scale images. So we must transform image pixels to between 0 and 1 to display
    them appropriately.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用 `tf.keras.applications.xception.preprocess_input` 工具来预处理图像（参见列表 [4-10](#PC43)
    中的预处理函数）。该工具实例化 Xception 架构以实现最佳性能。然而，它不会缩放图像。因此，我们必须将图像像素转换为介于 0 和 1 之间，以便适当地显示。
- en: 'Process some examples:'
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 处理一些示例：
- en: '[PRE62]'
  id: totrans-237
  prefs: []
  type: TYPE_PRE
  zh: '[PRE62]'
- en: Create a function to display a set of images and labels. The function determines
    if a prediction is correct or incorrect. Titles for correct predictions are displayed
    normally, but titles for incorrect predictions are displayed in red text.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数来显示一组图像和标签。该函数确定预测是正确还是错误。正确预测的标题会正常显示，但错误预测的标题会以红色文本显示。
- en: Create the function as shown in Listing [4-13](#PC64).
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 创建如列表 [4-13](#PC64) 所示的函数。
- en: '[PRE63]'
  id: totrans-240
  prefs: []
  type: TYPE_PRE
  zh: '[PRE63]'
- en: 'Invoke the function:'
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 调用函数：
- en: '[PRE64]'
  id: totrans-242
  prefs: []
  type: TYPE_PRE
  zh: '[PRE64]'
- en: Images are displayed with titles. Each title shows the actual label with the
    prediction in parentheses. If the prediction was incorrect, the title is shown
    in red.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 图像带有标题显示。每个标题显示实际标签和括号中的预测。如果预测错误，标题将以红色显示。
- en: Note
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 备注
- en: Although the learning models we apply may appear complex to the novice deep
    learning aficionado, they are really very simple. As you gain experience with
    learning models, you will gain the confidence to build more complex ones or migrate
    to transfer learning models. We cover transfer learning models in this book.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管我们应用的机器学习模型可能对初学者来说看起来很复杂，但它们实际上非常简单。随着你对学习模型的经验积累，你将获得构建更复杂模型或迁移到迁移学习模型的信心。我们在本书中介绍了迁移学习模型。
- en: An Experiment with rock_paper_scissors
  id: totrans-246
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一个关于 rock_paper_scissors 的实验
- en: Although we just worked through an experiment with a large and complex dataset,
    we believe that practicing deep learning with multiple datasets is critically
    important to becoming a competent practitioner. During our seminars, we find that
    participants learn much faster when they can apply what they have learned to another
    context. In this case, it is a new dataset. The experiment is conducted on the
    rock_paper_scissors dataset, which contains 2,892 images of hands playing the
    rock-paper-scissors game.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管我们刚刚完成了一个大型且复杂数据集的实验，但我们相信，使用多个数据集进行深度学习对于成为一名合格的从业者至关重要。在我们的研讨会上，我们发现当参与者能够将所学知识应用于另一个情境时，他们的学习速度会更快。在这种情况下，是一个新的数据集。实验是在
    rock_paper_scissors 数据集上进行的，该数据集包含 2,892 张玩剪刀石头布游戏的图片。
- en: Configure TensorBoard
  id: totrans-248
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 配置 TensorBoard
- en: '**TensorBoard** is a tool that provides measurements and visualizations during
    the machine learning workflow. It tracks metrics such as loss, accuracy, model
    graph visualization, and embedding projections to a lower-dimensional space. We
    expose you to TensorBoard for this experiment to provide access to another visualization
    tool.'
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: '**TensorBoard** 是一个在机器学习工作流程中提供测量和可视化的工具。它跟踪损失、准确度、模型图可视化以及将嵌入投影到低维空间等指标。我们在这个实验中介绍
    TensorBoard，以便提供访问另一个可视化工具的机会。'
- en: For a nice tutorial, peruse
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一个很好的教程，请参阅
- en: '[`www.tensorflow.org/tensorboard/get_started`](http://www.tensorflow.org/tensorboard/get_started)'
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: '[TensorBoard 入门教程](http://www.tensorflow.org/tensorboard/get_started)'
- en: 'Load the TensorBoard notebook extension:'
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 加载 TensorBoard 笔记本扩展：
- en: '[PRE65]'
  id: totrans-253
  prefs: []
  type: TYPE_PRE
  zh: '[PRE65]'
- en: 'Import the requisite library that we use in the experiment:'
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 导入我们在实验中使用的必需库：
- en: '[PRE66]'
  id: totrans-255
  prefs: []
  type: TYPE_PRE
  zh: '[PRE66]'
- en: 'Clear logs from previous runs:'
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 清除之前运行的日志：
- en: '[PRE67]'
  id: totrans-257
  prefs: []
  type: TYPE_PRE
  zh: '[PRE67]'
- en: Load Data
  id: totrans-258
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 加载数据
- en: 'Load the train and test sets:'
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 加载训练和测试集：
- en: '[PRE68]'
  id: totrans-260
  prefs: []
  type: TYPE_PRE
  zh: '[PRE68]'
- en: Inspect the Data
  id: totrans-261
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 检查数据
- en: We believe it is a good idea to explore a new dataset to get an idea of its
    configuration. So we get the metadata object, visualize some examples, and get
    the number of training and test examples, example shapes, and label names. We
    need to know all of this information to conduct the experiment.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 我们认为探索一个新的数据集以了解其配置是一个好主意。因此，我们获取元数据对象，可视化一些示例，并获取训练和测试示例的数量、示例形状和标签名称。我们需要了解所有这些信息才能进行实验。
- en: 'Get metadata:'
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 获取元数据：
- en: '[PRE69]'
  id: totrans-264
  prefs: []
  type: TYPE_PRE
  zh: '[PRE69]'
- en: 'Visualize:'
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化：
- en: '[PRE70]'
  id: totrans-266
  prefs: []
  type: TYPE_PRE
  zh: '[PRE70]'
- en: 'Get examples and number of labels:'
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 获取示例和标签数量：
- en: '[PRE71]'
  id: totrans-268
  prefs: []
  type: TYPE_PRE
  zh: '[PRE71]'
- en: 'Get shapes:'
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 获取形状：
- en: '[PRE72]'
  id: totrans-270
  prefs: []
  type: TYPE_PRE
  zh: '[PRE72]'
- en: 'Get label names:'
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 获取标签名称：
- en: '[PRE73]'
  id: totrans-272
  prefs: []
  type: TYPE_PRE
  zh: '[PRE73]'
- en: 'Inspect image shape:'
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 检查图像形状：
- en: '[PRE74]'
  id: totrans-274
  prefs: []
  type: TYPE_PRE
  zh: '[PRE74]'
- en: Preprocess the Data
  id: totrans-275
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 预处理数据
- en: The next step is to preprocess the data for consumption by the learning model.
    We begin by getting a value for half the size of the current image. We use this
    later to reshape images. We chose this size to reduce training time. By choosing
    this size, we found that the model still performed well. We encourage you to experiment
    with different image sizes, to see how learning is impacted. We also scale and
    resize images. Remember that learning models work better with smaller pixel sizes.
    Scaling is the best way to reduce image size without adversely impacting learning.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是为学习模型预处理数据。我们首先获取当前图像大小的一半值。我们稍后会使用这个值来调整图像大小。我们选择这个大小是为了减少训练时间。通过选择这个大小，我们发现模型仍然表现良好。我们鼓励你尝试不同的图像大小，看看学习效果如何。我们还对图像进行缩放和调整大小。记住，学习模型在较小的像素尺寸上表现更好。缩放是减少图像大小而不影响学习效果的最佳方式。
- en: 'Create a shape that halves image size:'
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个减半图像大小的形状：
- en: '[PRE75]'
  id: totrans-278
  prefs: []
  type: TYPE_PRE
  zh: '[PRE75]'
- en: 'Create a preprocessing function:'
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个预处理函数：
- en: '[PRE76]'
  id: totrans-280
  prefs: []
  type: TYPE_PRE
  zh: '[PRE76]'
- en: 'Preprocess train and test sets:'
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 预处理训练和测试集：
- en: '[PRE77]'
  id: totrans-282
  prefs: []
  type: TYPE_PRE
  zh: '[PRE77]'
- en: 'Explore an example:'
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 探索一个示例：
- en: '[PRE78]'
  id: totrans-284
  prefs: []
  type: TYPE_PRE
  zh: '[PRE78]'
- en: We always explore at least one example after it is preprocessed to see how it
    looks.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 我们总是在预处理后至少探索一个示例，看看它的样子。
- en: Visualize Processed Data
  id: totrans-286
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可视化处理后的数据
- en: Create a visualization function as shown in Listing [4-14](#PC80).
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个如列表[4-14](#PC80)所示的可视化函数。
- en: '[PRE79]'
  id: totrans-288
  prefs: []
  type: TYPE_PRE
  zh: '[PRE79]'
- en: 'Invoke the function:'
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 调用函数：
- en: '[PRE80]'
  id: totrans-290
  prefs: []
  type: TYPE_PRE
  zh: '[PRE80]'
- en: Augment Training Data
  id: totrans-291
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 增强训练数据
- en: We include data augmentation to improve learning. We chose the augmentations
    based on experimentation. We separate different augmentations into separate functions
    for flexibility. We conduct the experiment with all of the augmentations, but
    you can use one or more of the functions to conduct a new experiment. You can
    even skip the augmentation step to see how well the model learns with un-augmented
    training data.
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 我们包括数据增强来提高学习效果。我们根据实验选择了增强方法。我们将不同的增强方法分别放入单独的函数中，以增加灵活性。我们使用所有增强方法进行实验，但你也可以使用一个或多个函数进行新的实验。你甚至可以跳过增强步骤，看看模型在没有增强的训练数据上的学习效果如何。
- en: Augmentation is an art. We haven’t found any applied deep learning research
    on how to systematically augment a given dataset. Deep learning algorithms have
    been around for many years, but application of them is much more recent. A big
    reason is that computing power was not even close to what it is now. And it is
    much cheaper! Another reason is that TensorFlow has only been available as an
    open source product for a few years.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 增强是一种艺术。我们还没有找到任何关于如何系统地增强给定数据集的深度学习应用研究。深度学习算法已经存在很多年了，但它们的实际应用却相对较晚。一个重要原因是计算能力远远达不到现在的水平。而且现在它变得更便宜了！另一个原因是TensorFlow作为开源产品只有几年时间。
- en: Create Data Augmentation Functions
  id: totrans-294
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 创建数据增强函数
- en: We now create functions to flip, color, rotate, invert, and zoom images.
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们创建函数来翻转、着色、旋转、反转和缩放图像。
