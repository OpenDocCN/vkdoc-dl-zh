- en: 4. Deep Learning with TensorFlow Datasets
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In the previous chapter, we demonstrated how to work with TFDS objects. In this
    chapter, we work through two end-to-end deep learning experiments with large and
    complex TFDS objects. The Fashion-MNIST and beans datasets are small with simple
    images.
  prefs: []
  type: TYPE_NORMAL
- en: The first experiment works with a large dataset containing complex images of
    cats and dogs. The second one works with a dataset containing complex images of
    human hands. The human hands dataset is not as large as the one in the first experiment.
    Both experiments include data augmentation to enhance performance. The goal is
    to help you work through end-to-end learning experiments with larger and more
    complex datasets.
  prefs: []
  type: TYPE_NORMAL
- en: 'Notebooks for chapters are located at the following URL:'
  prefs: []
  type: TYPE_NORMAL
- en: '[`https://github.com/paperd/deep-learning-models`](https://github.com/paperd/tensorflow)'
  prefs: []
  type: TYPE_NORMAL
- en: An Experiment with cats_vs_dogs
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We demonstrate an end-to-end example with the *cats_vs_dogs* dataset. The dataset
    contains 23,262 examples of large images of cats and dogs. The goal of this experiment
    is to provide you experience training a large and complex TFDS. We encourage you
    to work through many datasets to gain more experience with deep learning. Data
    is the key! Working with various datasets provides different experiences because
    each dataset is unique.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: Working with large image files requires a lot of RAM. So you may need to invest
    in more memory or subscribe to Google’s Colab Pro service if your computer crashes.
    On our PC, we have had RAM crashes with this dataset on occasion. But since we
    upgraded to Colab Pro, we haven’t had any issues.
  prefs: []
  type: TYPE_NORMAL
