- en: From the metadata, we see that the dataset is *not* presplit. So we must split
    the data ourselves. We chose to split 80% for the training set, 10% for the validation
    set, and 10% for the test set. You can choose different splits if you wish.
  prefs: []
  type: TYPE_NORMAL
- en: 'Display split information:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Using our split scheme (80:10:10), we should have 18,610 examples for training,
    2,326 examples for validation, and 2,326 examples for testing. The motivation
    for separating data into training, validation, and test splits is to learn from
    the training data, tune from the validation data, and generalize from the test
    data.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: We are not actually splitting the data in this section. We are just showing
    you how many examples will be in each split with our split scheme.
  prefs: []
  type: TYPE_NORMAL
- en: Although it is common to see data separated into just training and test splits,
    it is advantageous to add one more split to hold aside some data that the model
    has never touched. With three splits, training data is for learning, validation
    data is for tweaking and tuning, and test data is for evaluating for generalizability.
    With just a training and test split, we must tune and generalize from the test
    set. Since the model touches the test set, it is not entirely new data!
  prefs: []
  type: TYPE_NORMAL
