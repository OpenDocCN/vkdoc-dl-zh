  prefs: []
  type: TYPE_NORMAL
- en: 1.2 Convolutional Neural Networks (CNNs)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Image data is inherently structured as a two-dimensional grid of pixels, with
    each pixel representing one or more numerical values depending on whether the
    image is monochromatic or colored. Traditional approaches often disregard this
    spatial structure by flattening images into one-dimensional vectors before feeding
    them into fully connected multilayer perceptrons (MLPs). However, this method
    overlooks crucial spatial relationships between pixels, limiting the model’s ability
    to learn meaningful patterns efficiently.
  prefs: []
  type: TYPE_NORMAL
- en: To address this limitation, convolutional neural networks (CNNs) were introduced
    by LeCun in 1995\. CNNs are specifically designed to exploit the spatial locality
    of image data, significantly improving performance in computer vision tasks. Their
    success was notably demonstrated on the ImageNet dataset where CNNs outperformed
    traditional architectures. The effectiveness of CNNs arises from their ability
    to learn hierarchical feature representations while maintaining computational
    efficiency, benefiting from both biological inspiration and mathematical principles
    such as group theory.
  prefs: []
  type: TYPE_NORMAL
- en: Beyond image processing, CNNs have found applications in diverse fields, including
    audio processing, natural language processing, and time series analysis. Additionally,
    adaptations of CNNs have been employed in graph-structured data and recommender
    systems.
  prefs: []
  type: TYPE_NORMAL
- en: 1.2.1 Evolving from Dense Layers to Convolutional Networks
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Traditional models, such as multilayer perceptrons (MLPs), are well-suited for
    tabular data, where information is structured in rows (instances) and columns
    (features). In such cases, we may expect complex interactions between features,
    but we do not assume any inherent structure in their relationships. However, when
    working with high-dimensional perceptual data, such as images, fully connected
    networks become impractical due to their enormous parameter requirements.
  prefs: []
  type: TYPE_NORMAL
- en: Consider an image classification task, such as distinguishing between cats and
    dogs. If we use one-megapixel images, each input would have one million features.
    Even after reducing this to a hidden layer of 1000 neurons, a fully connected
    network would still require an overwhelming number of parameters, making training
    computationally prohibitive. While reducing the image resolution to 100,000 pixels
    may help, a fully connected architecture would still demand billions of parameters,
    requiring an unrealistically large dataset for effective training.
  prefs: []
  type: TYPE_NORMAL
- en: Despite these challenges, both humans and modern machine learning systems can
    accurately differentiate between cats and dogs. This is because images contain
    inherent spatial structures that can be leveraged instead of treating each pixel
    as an independent feature. Convolutional neural networks (CNNs) address this challenge
    by efficiently capturing spatial hierarchies and local patterns in images. By
    leveraging known properties of natural image structures, CNNs significantly reduce
    computational complexity, improve generalization, and enhance learning efficiency,
    making them a powerful alternative to fully connected architectures for image-based
    tasks.
  prefs: []
  type: TYPE_NORMAL
- en: 1.2.2 Introducing Spatial Structure in MLPs
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In the context of neural networks, a multilayer perceptron (MLP) can be employed
    to process two-dimensional image data, where both the input and hidden representations
    are structured as matrices. Computationally, these representations are treated
    as two-dimensional tensors, preserving their spatial relationships. This framework
    underscores the importance of maintaining spatial integrity across network layers.
  prefs: []
  type: TYPE_NORMAL
- en: Let $$$ x_{i,j} $$$ and $$$ h_{i,j} $$$ denote the pixel values at position
    $$$ (i,j) $$$ in the input image and the hidden representation, respectively.
    In traditional MLPs, each hidden unit is connected to all input pixels through
    a weight matrix. However, to better capture spatial dependencies, we transition
    to a fourth-order weight tensor $$$ W $$$. By introducing a bias term $$$ b $$$,
    the transformation is formally expressed as $$$\displaystyle \begin{aligned} h_{i,j}
    = \sum_{k,l} W_{i-k, j-l} x_{k,l} + b. \end{aligned} $$$ (1.1)
  prefs: []
  type: TYPE_NORMAL
- en: This modification from weight matrices to fourth-order tensors is primarily
    a reindexing of coefficients, where the weights are now represented as $$$ W_{i-k,
    j-l} $$$. The indices $$$ k $$$ and $$$ l $$$ span both positive and negative
    offsets across the entire image. As a result, the value of each hidden unit is
    obtained by summing over neighboring pixels in $$$ x $$$, centered around $$$
    (i,j) $$$, and weighted by $$$ W $$$.
  prefs: []
  type: TYPE_NORMAL
- en: However, this parameterization presents a substantial challenge. For instance,
    mapping a $$$ 1000 \times 1000 $$$ image (1 megapixel) to a hidden representation
    of the same size would necessitate an enormous number of parameters, far surpassing
    modern computational capabilities. This computational burden motivates the need
    for more efficient architectures, such as convolutional neural networks (CNNs),
    which leverage spatial structure while significantly reducing the number of learnable
    parameters.
  prefs: []
  type: TYPE_NORMAL
- en: 1.2.3 Translation Invariance
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'To incorporate translation invariance, we apply the principle that shifting
    the input $$$ x $$$ should result in an equivalent shift in the hidden representation
    $$$ h $$$. This condition is satisfied only if the weight tensor $$$ W $$$ and
    the bias term $$$ b $$$ are independent of the absolute location $$$ (i,j) $$$.
    Thus, we redefine them as $$$ W_{k,l} $$$ and a constant bias $$$ b $$$, leading
    to a simplified expression for $$$ h_{i,j} $$$: $$$\displaystyle \begin{aligned}
    h_{i,j} = \sum_{k,l} W_{k,l} x_{i-k, j-l} + b. \end{aligned} $$$ (1.2)'
  prefs: []
  type: TYPE_NORMAL
- en: This formulation represents a convolution operation. Here, each pixel in $$$
    x $$$, located within the neighborhood of $$$ (i,j) $$$, is weighted by the corresponding
    coefficients in $$$ W $$$ to compute $$$ h_{i,j} $$$. Unlike the fully connected
    case, where the number of parameters depends on the image size, this convolutional
    approach significantly reduces the number of parameters to $$$ k \times l $$$,
    making the model more computationally efficient.
  prefs: []
  type: TYPE_NORMAL
- en: The introduction of this weight-sharing strategy led to the development of early
    convolutional architectures, such as time-delay neural networks (TDNNs), which
    leveraged this concept for improved learning efficiency and robustness in pattern
    recognition tasks.
  prefs: []
  type: TYPE_NORMAL
- en: 1.2.4 Locality
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Next, we consider the second key principle: locality. As discussed earlier,
    meaningful information for determining the value at location $$$ (i,j) $$$ should
    primarily come from its immediate surroundings. This assumption implies that beyond
    a certain range $$$ k $$$ or $$$ l $$$, the weights $$$ W_{k,l} $$$ should be
    set to zero. Consequently, we can rewrite the convolution operation as $$$\displaystyle
    \begin{aligned} {} h_{i,j} = \sum_{|k| \leq K, |l| \leq L} W_{k,l} x_{i-k, j-l}
    + b. \end{aligned} $$$ (1.3)'
  prefs: []
  type: TYPE_NORMAL
- en: This modification drastically reduces the number of parameters from $$$ m^2
    $$$ to $$$ (2K+1)(2L+1) $$$, where $$$ K $$$ and $$$ L $$$ are typically much
    smaller than $$$ m $$$. As a result, we achieve an enormous reduction in the number
    of learnable parameters—often by four orders of magnitude. This refined structure
    is the essence of a convolutional layer, a core component of convolutional neural
    networks (CNNs). Within the deep learning community, the weight matrix $$$ W $$$
    is commonly referred to as a convolution kernel, a filter, or simply the learnable
    parameters of the layer.
  prefs: []
  type: TYPE_NORMAL
- en: 'Previously, constructing a single fully connected layer for an image-processing
    network required billions of parameters. With convolutional layers, we now need
    only a few hundred, all while preserving the input and hidden representation dimensions.
    However, this reduction in complexity comes with a trade-off: the learned features
    become translation invariant, and each layer can only capture local information.
    Most of the machine learning models rely on inductive biases, when these align
    with real-world parameters.'
  prefs: []
  type: TYPE_NORMAL
- en: 1.2.5 Convolutions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let us briefly revisit the mathematical definition of convolution. In mathematical
    analysis, the convolution of two functions $$$ f $$$ and $$$ g $$$ is defined
    as $$$\displaystyle \begin{aligned} (f * g)(t) = \int_{-\infty}^{\infty} f(\tau)
    g(t - \tau) d\tau. \end{aligned} $$$ (1.4)
  prefs: []
  type: TYPE_NORMAL
- en: This operation measures the overlap between $$$ f $$$ and $$$ g $$$ when one
    function is flipped and shifted by $$$ t $$$. When working with discrete functions,
    the integral transforms into a summation. Specifically, for square-summable infinite-dimensional
    vectors indexed by $$$ i $$$, the discrete convolution is given by $$$\displaystyle
    \begin{aligned} (f * g)_i = \sum_{j} f_j g_{i-j}. \end{aligned} $$$ (1.5)
  prefs: []
  type: TYPE_NORMAL
- en: For two-dimensional tensors, this summation extends to indices $$$ k $$$ and
    $$$ l $$$, resulting in $$$\displaystyle \begin{aligned} {} h_{i,j} = \sum_{k,l}
    W_{k,l} x_{i-k, j-l}. \end{aligned} $$$ (1.6)
  prefs: []
  type: TYPE_NORMAL
- en: 'This formulation closely resembles Equation ([1.3](#Equ3)), with a key difference:
    instead of using $$$ x_{i-k, j-l} $$$, we use the difference operation. However,
    this distinction is largely notational, as we can always adjust the formulation
    to match Equations ([1.3](#Equ3)) and ([1.6](#Equ6)). Notably, our original definition
    in Equation ([1.3](#Equ3)) more accurately describes a cross-correlation rather
    than a convolution. This distinction will be further explored in the following
    section.'
  prefs: []
  type: TYPE_NORMAL
- en: This Python script compares how a fully connected neural network (FCNN) and
    a convolutional neural network (CNN) process a grayscale image. It begins by generating
    a random 10 $$$\times $$$ 10 image using NumPy, where pixel values range between
    0 and 1\. The image is then converted into a PyTorch tensor and reshaped to include
    batch and channel dimensions, making it suitable for deep learning models.
  prefs: []
  type: TYPE_NORMAL
- en: The FCNN model consists of a single fully connected (nn.Linear) layer that flattens
    the image into a 1D vector before applying transformations. This approach ignores
    the spatial relationships between pixels, treating each pixel independently. In
    contrast, the CNN model uses a 3 $$$\times $$$ 3 convolutional layer (nn.Conv2d)
    with padding, allowing it to capture local patterns and retain the spatial structure
    of the image.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, the script visualizes the original image alongside the outputs of both
    models. The FCNN output appears scattered, as it does not maintain spatial structure,
    whereas the CNN output preserves spatial coherence, highlighting its ability to
    extract meaningful image features. This comparison underscores why CNNs are preferred
    for image-related tasks, as they effectively utilize local pixel dependencies,
    unlike FCNNs as shown in Figure [1.8](#Fig8).
  prefs: []
  type: TYPE_NORMAL
- en: '![Three-panel heatmap figure comparing different image processing outputs.
    The first panel shows the "Original Image" with a grid of varying grayscale values.
    The second panel, labeled "Fully Connected Output," displays a similar grid with
    altered grayscale patterns. The third panel, "Convolutional Output," presents
    another variation in grayscale distribution. Each panel is a 10x10 grid with axes
    labeled from 0 to 9.](../images/641715_1_En_1_Chapter/641715_1_En_1_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Fig. 1.8
  prefs: []
  type: TYPE_NORMAL
- en: Three grayscale images are displayed side by side. The first image is labeled
    “Original Image” and shows a 10 $$$\times $$$ 10 grid of varying shades of gray.
    The second image, labeled “Fully Connected Output,” presents a similar 10 $$$\times
    $$$ 10 grid with slightly altered gray patterns. The third image, “Convolutional
    Output,” also features a 10 $$$\times $$$ 10 grid with distinct gray variations.
    Each image has axes labeled from 0 to 9 on both the x and y axes
  prefs: []
  type: TYPE_NORMAL
- en: '![Code screenshot showing Python imports and definitions for a neural network
    using PyTorch. It includes imports for numpy, matplotlib, and torch libraries.
    A random 10x10 grayscale image is generated and converted to a tensor. A fully
    connected neural network class is defined, with methods for initialization and
    forward propagation. Comments explain each step.](../images/641715_1_En_1_Chapter/641715_1_En_1_Figaaf_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: '![Screenshot of Python code for a neural network model. The code defines a
    convolutional layer using `nn.Conv2d` with a 3x3 filter. It instantiates two models:
    a fully connected neural network and a convolutional neural network. An image
    tensor is processed through both models, and the results are plotted using Matplotlib.
    Three subplots display the original image, the output from the fully connected
    model, and the output from the convolutional model, each with a grayscale colormap
    and corresponding titles.](../images/641715_1_En_1_Chapter/641715_1_En_1_Figaag_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 1.3 Recurrent Neural Networks (RNNs)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Recurrent neural networks (RNNs) are a class of neural networks specifically
    designed for sequential data processing. Unlike traditional feedforward networks,
    RNNs introduce a memory mechanism that allows information to persist across time
    steps, making them effective for tasks like speech recognition, time series forecasting,
    and natural language processing. Figure [1.9](#Fig9) illustrates how information
    flows through time by showing hidden states, inputs, and outputs at multiple time
    steps. It highlights sequential dependencies and the recurrent connections that
    define an RNN’s structure.
  prefs: []
  type: TYPE_NORMAL
- en: '![Diagram titled "Unrolled RNN Representation" showing a sequence of nodes
    connected by arrows. The nodes are labeled as follows: input nodes x_0 to x_4
    at the top, hidden states h_0 to h_4 in the middle, and output nodes v_0 to v_4
    at the bottom. Arrows indicate the flow of information from inputs to hidden states,
    and from hidden states to outputs, illustrating the process of a Recurrent Neural
    Network (RNN) over time steps.](../images/641715_1_En_1_Chapter/641715_1_En_1_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Fig. 1.9
  prefs: []
  type: TYPE_NORMAL
- en: A figure of a neural network with three layers. The input layer consists of
    nodes labeled X0_0 to X2_2\. The hidden layer has nodes labeled H0_0 to H2_3,
    connected by arrows indicating data flow. The output layer contains nodes Y_0
    and Y_1\. Blue arrows represent connections within layers, red arrows show connections
    between hidden nodes, and green arrows indicate connections to the output layer
  prefs: []
  type: TYPE_NORMAL
- en: 1.4 Mathematical Representation of RNNs
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A standard RNN processes sequential input $$$ x_t $$$ at each time step $$$
    t $$$ and maintains a hidden state $$$ h_t $$$ that captures past information.
    The update equation for the hidden state is given by $$$\displaystyle \begin{aligned}
    h_t = f(W_h h_{t-1} + W_x x_t + b) \end{aligned} $$$ (1.7) where
  prefs: []
  type: TYPE_NORMAL
- en: $$$ h_t $$$ is the hidden state at time step $$$ t $$$, containing information
    from previous inputs.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: $$$ h_{t-1} $$$ is the hidden state from the previous time step.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: $$$ x_t $$$ is the input at time step $$$ t $$$.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: $$$ W_h $$$ and $$$ W_x $$$ are weight matrices.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: $$$ b $$$ is a bias term.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: $$$ f $$$ is an activation function (commonly tanh or ReLU).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The output at each time step is computed as $$$\displaystyle \begin{aligned}
    y_t = W_y h_t + b_y \end{aligned} $$$ (1.8) where $$$ W_y $$$ is a weight matrix
    mapping the hidden state to the output and $$$ b_y $$$ is the output bias. Typical
    RNN architecture is presented in Figure [1.10](#Fig10).
  prefs: []
  type: TYPE_NORMAL
- en: '![Diagram of a neural network flow chart with three layers. The input layer
    consists of nodes labeled X0, X1, and X2, each with three sub-nodes. These connect
    to the hidden layers, labeled H0, H1, and H2, each also with three sub-nodes.
    Arrows indicate connections between nodes, with blue arrows for input to hidden
    layers and red arrows within hidden layers. The output layer has nodes labeled
    Y0 and Y1, connected to the hidden layer by green arrows.](../images/641715_1_En_1_Chapter/641715_1_En_1_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Fig. 1.10
  prefs: []
  type: TYPE_NORMAL
- en: A figure titled “Unrolled RNN Representation” showing a sequence of nodes representing
    an unrolled Recurrent Neural Network. The nodes are labeled with inputs $$$x_0$$$
    to $$$x_4$$$, hidden states $$$h_0$$$ to $$$h_4$$$, and outputs $$$y_0$$$ to $$$y_4$$$.
    Arrows indicate the flow of data from inputs through hidden states to outputs,
    illustrating the temporal sequence processing of the RNN. Each node and label
    is color-coded for clarity
  prefs: []
  type: TYPE_NORMAL
- en: 1.5 Unrolling an RNN
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: RNNs process input sequences over multiple time steps, which can be visualized
    by unfolding them. For an input sequence $$$ x_1, x_2, x_3, \dots , x_T $$$, the
    network can be expressed as $$$\displaystyle \begin{aligned} h_1 = f(W_h h_0 +
    W_x x_1 + b) \end{aligned} $$$ (1.9) $$$\displaystyle \begin{aligned} h_2 = f(W_h
    h_1 + W_x x_2 + b) \end{aligned} $$$ (1.10) $$$\displaystyle \begin{aligned} \vdots
    \end{aligned} $$$ (1.11) $$$\displaystyle \begin{aligned} h_T = f(W_h h_{T-1}
    + W_x x_T + b) \end{aligned} $$$ (1.12) where $$$ h_0 $$$ is typically initialized
    as a zero vector.
  prefs: []
  type: TYPE_NORMAL
- en: 1.6 Challenges in RNNs
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 1.6.1 Vanishing and Exploding Gradients
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: During backpropagation through time (BPTT), gradients of long sequences tend
    to either vanish (become very small) or explode (become excessively large). The
    vanishing gradient problem makes it difficult for the network to learn dependencies
    from distant past inputs. This issue is mathematically represented as $$$\displaystyle
    \begin{aligned} \frac{\partial L}{\partial W_h} = \sum_{t=1}^{T} \left( \frac{\partial
    L}{\partial h_t} \prod_{k=t}^{1} W_h f'(h_k) \right) \end{aligned} $$$ (1.13)
  prefs: []
  type: TYPE_NORMAL
- en: If $$$ W_h $$$ has eigenvalues smaller than 1, gradients shrink exponentially,
    leading to vanishing gradients.
  prefs: []
  type: TYPE_NORMAL
- en: 1.6.2 Long Short-Term Memory (LSTM)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: LSTMs introduce a memory cell $$$ C_t $$$ and gating mechanisms to regulate
    the flow of information. The key equations are $$$\displaystyle \begin{aligned}
    f_t = \sigma(W_f x_t + U_f h_{t-1} + b_f) \end{aligned} $$$ (1.14) $$$\displaystyle
    \begin{aligned} i_t = \sigma(W_i x_t + U_i h_{t-1} + b_i) \end{aligned} $$$ (1.15)
    $$$\displaystyle \begin{aligned} \tilde{C}_t = \tanh(W_c x_t + U_c h_{t-1} + b_c)
    \end{aligned} $$$ (1.16) $$$\displaystyle \begin{aligned} C_t = f_t C_{t-1} +
    i_t \tilde{C}_t \end{aligned} $$$ (1.17) $$$\displaystyle \begin{aligned} o_t
    = \sigma(W_o x_t + U_o h_{t-1} + b_o) \end{aligned} $$$ (1.18) $$$\displaystyle
    \begin{aligned} h_t = o_t \tanh(C_t) \end{aligned} $$$ (1.19) where $$$ f_t $$$,
    $$$ i_t $$$, and $$$ o_t $$$ are the forget, input, and output gates, respectively.
  prefs: []
  type: TYPE_NORMAL
- en: 1.7 Applications of RNNs
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Natural Language Processing (NLP):** Machine translation, text generation,
    and sentiment analysis'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Speech Recognition:** Converting spoken words into text'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Time Series Prediction:** Stock market forecasting and weather prediction'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Video Analysis:** Action recognition and gesture detection'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 1.8 GPU Acceleration in Deep Learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 1.8.1 Introduction to GPU Acceleration
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: GPU acceleration refers to the use of a graphics processing unit (GPU) to perform
    computation more efficiently than is possible with a traditional central processing
    unit (CPU). GPUs are designed to handle parallel tasks that require high levels
    of mathematical computation, making them ideal for fields such as deep learning,
    scientific simulations, and data analysis.
  prefs: []
  type: TYPE_NORMAL
- en: 1.8.2 Types of GPU Acceleration
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 1.8.2.1 General-Purpose GPU (GPGPU)
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Initially designed for rendering graphics, GPGPUs have evolved to handle a variety
    of nongraphical tasks. They leverage the parallel processing capabilities of GPUs
    for general-purpose computation. This evolution has been driven by the increasing
    demand for high-performance computing across various fields such as artificial
    intelligence, scientific simulations, and financial modeling.
  prefs: []
  type: TYPE_NORMAL
- en: GPGPUs differ from traditional CPUs in their architecture. While CPUs are optimized
    for sequential task execution, GPGPUs excel at handling thousands of parallel
    threads simultaneously. This parallelism is particularly beneficial for workloads
    that involve large-scale matrix operations, image processing, and deep learning
    algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: A major breakthrough in GPGPU computing came with the introduction of programming
    frameworks such as NVIDIA’s CUDA and OpenCL. These frameworks allow developers
    to harness GPU power for a wide range of applications beyond graphics processing.
    By writing specialized code, programmers can offload computationally intensive
    tasks to the GPU, significantly speeding up execution times compared to CPU-based
    approaches.
  prefs: []
  type: TYPE_NORMAL
- en: Industries ranging from healthcare to finance have embraced GPGPUs to accelerate
    data processing and analysis. For example, in medical imaging, GPGPUs enable real-time
    rendering of complex scans, enhancing diagnostic capabilities. In finance, they
    are used for high-frequency trading algorithms that require rapid data processing
    and decision-making.
  prefs: []
  type: TYPE_NORMAL
- en: Despite their advantages, GPGPUs also come with challenges. Efficient utilization
    requires knowledge of parallel programming, and not all applications can be easily
    adapted to benefit from GPU acceleration. Additionally, power consumption and
    heat dissipation remain concerns for large-scale deployments.
  prefs: []
  type: TYPE_NORMAL
- en: '![Diagram of General-Purpose GPU (GPGPU) Architecture. At the top is a large
    block labeled "Global Memory." Below it, three smaller blocks labeled "SM 1,"
    "SM 2," and "SM 3" represent streaming multiprocessors, each containing a "Shared
    Mem" section. Under each SM block are four smaller blocks labeled "C1," "C2,"
    "C3," and "C4," representing execution units. A "Memory Bus" connects the SM blocks
    to the Global Memory.](../images/641715_1_En_1_Chapter/641715_1_En_1_Fig11_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Fig. 1.11
  prefs: []
  type: TYPE_NORMAL
- en: Diagram of general-purpose GPU (GPGPU) architecture. At the top is a large rectangle
    labeled “Global Memory.” Below it, three smaller sections labeled “SM 1,” “SM
    2,” and “SM 3” represent streaming multiprocessors, each containing a “Shared
    Mem” block. Under each SM, there are four red blocks labeled “C1,” “C2,” “C3,”
    and “C4,” representing execution units. A “Memory Bus” connects the global memory
    to the SMs
  prefs: []
  type: TYPE_NORMAL
- en: 1.8.2.2 General-Purpose GPU (GPGPU)
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Initially designed for rendering graphics, GPGPUs have evolved to handle a variety
    of nongraphical tasks. Figure [1.11](#Fig11) gives the architecture of GPGPU.
    They leverage the parallel processing capabilities of GPUs for general-purpose
    computation. This evolution has been driven by the increasing demand for high-performance
    computing across various fields such as artificial intelligence, scientific simulations,
    and financial modeling.
  prefs: []
  type: TYPE_NORMAL
- en: GPGPUs differ from traditional CPUs in their architecture. While CPUs are optimized
    for sequential task execution, GPGPUs excel at handling thousands of parallel
    threads simultaneously. This parallelism is particularly beneficial for workloads
    that involve large-scale matrix operations, image processing, and deep learning
    algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: A major breakthrough in GPGPU computing came with the introduction of programming
    frameworks such as NVIDIA’s CUDA and OpenCL. These frameworks allow developers
    to harness GPU power for a wide range of applications beyond graphics processing.
    By writing specialized code, programmers can offload computationally intensive
    tasks to the GPU, significantly speeding up execution times compared to CPU-based
    approaches.
  prefs: []
  type: TYPE_NORMAL
- en: Industries ranging from healthcare to finance have embraced GPGPUs to accelerate
    data processing and analysis. For example, in medical imaging, GPGPUs enable real-time
    rendering of complex scans, enhancing diagnostic capabilities. In finance, they
    are used for high-frequency trading algorithms that require rapid data processing
    and decision-making.
  prefs: []
  type: TYPE_NORMAL
- en: Despite their advantages, GPGPUs also come with challenges. Efficient utilization
    requires knowledge of parallel programming, and not all applications can be easily
    adapted to benefit from GPU acceleration. Additionally, power consumption and
    heat dissipation remain concerns for large-scale deployments.
  prefs: []
  type: TYPE_NORMAL
- en: In conclusion, general-purpose GPUs have revolutionized computing by extending
    the capabilities of traditional GPUs to nongraphical domains. Their ability to
    handle massive parallel workloads makes them indispensable in modern high-performance
    computing environments, driving innovation across multiple industries.
  prefs: []
  type: TYPE_NORMAL
- en: 1.8.2.3 Dedicated GPUs
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '**Dedicated GPUs**, as shown in Figure [1.11](#Fig11), are standalone hardware
    components with their own memory and processing power, providing significantly
    higher performance, especially for complex computations such as deep learning
    training. These GPUs are commonly used in gaming, professional rendering, and
    scientific computing. Their dedicated VRAM allows them to process large datasets
    efficiently, avoiding bottlenecks associated with shared memory in integrated
    solutions (Figure [1.12](#Fig12)).'
  prefs: []
  type: TYPE_NORMAL
- en: One of the key advantages of dedicated GPUs is their ability to handle intensive
    workloads such as AI model training, video editing, and real-time 3D rendering.
    These GPUs come with advanced features like ray tracing, tensor cores for deep
    learning, and high memory bandwidth, making them essential for high-performance
    applications.
  prefs: []
  type: TYPE_NORMAL
- en: '![Diagram illustrating the architecture of a dedicated GPU (dGPU). At the top,
    "Dedicated VRAM (GPU Memory)" is shown, connected to a "Memory Bus." Below, three
    blocks labeled "SM 1," "SM 2," and "SM 3" represent streaming multiprocessors,
    each containing "Shared Mem" and four execution units labeled "C1" to "C4." The
    bottom section indicates a "PCIe Interface (Data Transfer)." The diagram highlights
    the relationship between memory, processing units, and data transfer pathways.](../images/641715_1_En_1_Chapter/641715_1_En_1_Fig12_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Fig. 1.12
  prefs: []
  type: TYPE_NORMAL
- en: A figure of dedicated GPU architecture. At the top is “Dedicated VRAM (GPU Memory)”
    connected via a “Memory Bus.” Below are three blocks labeled SM 1, SM 2, and SM
    3, each containing “Shared Mem” and four cores labeled C1, C2, C3, and C4\. These
    represent execution units. At the bottom is the “PCIe Interface (Data Transfer)”
    for communication
  prefs: []
  type: TYPE_NORMAL
- en: However, dedicated GPUs consume more power and generate more heat compared to
    integrated GPUs. This necessitates robust cooling solutions, making them more
    suitable for desktops and high-end laptops rather than ultra-portable devices.
  prefs: []
  type: TYPE_NORMAL
- en: 1.8.2.4 Integrated GPUs
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Integrated GPUs are built into the same chip as the CPU, sharing memory and
    resources, which limits their performance but offers a cost-effective option for
    less demanding applications. These GPUs are typically found in laptops, ultrabooks,
    and budget desktops, where power efficiency and space constraints take priority
    over raw performance. Integrated GPUs are well-suited for everyday computing tasks
    such as web browsing, media playback, and office applications. Additionally, modern
    integrated GPUs have improved significantly, enabling casual gaming and basic
    content creation. However, for tasks requiring high graphical performance, such
    as 3D rendering and deep learning, dedicated GPUs remain the preferred choice
    (Figure [1.13](#Fig13)).
  prefs: []
  type: TYPE_NORMAL
- en: '![Diagram illustrating the architecture of an Integrated GPU (iGPU). At the
    top, "Shared System Memory (RAM)" is connected via a "Memory Bus" to the "Integrated
    GPU (iGPU)" which contains four Execution Units (EU 1 to EU 4) and a "Shared Cache."
    Below the iGPU is the "CPU," and at the bottom, "Compute Units (CPU + iGPU)" are
    linked to a "PCIe Interface" for external GPU and storage connections. The diagram
    highlights the memory hierarchy and data flow within the system.](../images/641715_1_En_1_Chapter/641715_1_En_1_Fig13_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Fig. 1.13
  prefs: []
  type: TYPE_NORMAL
- en: A figure illustrating the architecture of an integrated GPU (iGPU). At the top
    is the Shared System Memory (RAM), followed by the Memory Bus. Below is the Memory
    Hierarchy, which includes the Integrated GPU containing four Execution Units (EU
    1 to EU 4) and a Shared Cache. The CPU is positioned beneath the iGPU. At the
    bottom, the Compute Units (CPU + iGPU) connect to the PCIe Interface, used for
    external GPU and storage
  prefs: []
  type: TYPE_NORMAL
- en: 1.9 Training a Deep Learning Model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Deep learning has revolutionized many areas of machine learning, and one of
    its most fundamental applications is image classification. A typical introductory
    problem in deep learning is classifying handwritten digits from the MNIST dataset—a
    benchmark dataset widely used for training and testing image recognition models.
    This dataset consists of 60,000 training images and 10,000 test images of handwritten
    digits (0–9), each representing a $$$28 * 28$$$ grayscale image. The goal is to
    develop a neural network model that can accurately recognize and classify these
    digits, mimicking how humans interpret handwritten numbers.
  prefs: []
  type: TYPE_NORMAL
- en: 1.9.1 Image Classification Problem
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Traditional programming relies on explicitly defining rules and conditions
    for a program to follow in order to produce the correct output. This approach
    works well for many structured problems where rules can be clearly stated. However,
    image classification presents a unique challenge: it requires a program to correctly
    identify and categorize images it has never seen before. Given the vast variations
    in images—differences in lighting, orientation, handwriting styles, and distortions—it
    is nearly impossible for a programmer to manually define a comprehensive set of
    rules that would work for all possible cases. As a result, traditional programming
    techniques struggle with image classification tasks.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Traditional programming relies on explicitly defining rules and conditions
    for a program to follow to produce the correct output. This approach works well
    for many structured problems where rules can be clearly stated. However, image
    classification presents a unique challenge: it requires a program to correctly
    identify and categorize images it has never seen before.'
  prefs: []
  type: TYPE_NORMAL
- en: Due to the immense variability in images, such as differences in lighting, orientation,
    handwriting styles, and distortions, it is virtually impossible for a programmer
    to manually establish a complete set of rules that account for every scenario.
    Consequently, traditional programming methods prove inadequate for handling image
    classification tasks effectively.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [1.14](#Fig14) gives the details about MNIST dataset under consideration.
  prefs: []
  type: TYPE_NORMAL
- en: 1.9.2 Exploring the MNIST Data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Exploring the MNIST dataset involves understanding its structure, which includes
    70,000 grayscale images of handwritten digits. It is split into 60,000 training
    images and 10,000 validation images. Each image is 28 by 28 pixels, represented
    as numerical arrays. This dataset is widely used for benchmarking deep learning
    models.
  prefs: []
  type: TYPE_NORMAL
- en: '![A grid of 25 images showing handwritten digits from 0 to 9, each labeled
    with its corresponding number. The digits are white on a black background, with
    labels above each image indicating the digit it represents. The arrangement is
    in a 5x5 format.](../images/641715_1_En_1_Chapter/641715_1_En_1_Fig14_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Fig. 1.14
  prefs: []
  type: TYPE_NORMAL
- en: 'A grid of 25 images displaying handwritten digits from 0 to 9, each labeled
    with its corresponding number. The digits are white on a black background, showcasing
    various handwriting styles. The labels above each image indicate the digit it
    represents, such as “Label: 5” for the first image, “Label: 0” for the second,
    and so on, highlighting the diversity in handwritten numeral representation'
  prefs: []
  type: TYPE_NORMAL
- en: 1.9.3 Data Engineering and Dataset Splits
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The process of organizing and preparing data for deep learning is known as data
    engineering. Understanding the distinction between training and validation data
    is crucial for building robust models, and further insights can be gained from
    experts like Jason Brownlee, who explores these concepts in depth. This section
    introduces TorchVision, a powerful library for handling standard datasets like
    MNIST. It simplifies data loading and preprocessing for deep learning applications.
    The MNIST dataset, consisting of 70,000 grayscale images of handwritten digits,
    is automatically partitioned into 60,000 training images and 10,000 testing images.
    For model evaluation, the test set is repurposed as a validation set. Understanding
    data partitioning into train, validation, and test sets is essential for building
    reliable deep learning models.
  prefs: []
  type: TYPE_NORMAL
- en: 1.9.4 Tensors
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A tensor is an n-dimensional array that generalizes vectors (1D arrays) and
    matrices (2D arrays). Tensors are fundamental to deep learning, as modern neural
    networks are designed to process them efficiently. A 3D tensor can represent pixel
    data, where dimensions correspond to width, height, and color channels (RGB).
    GPUs are highly efficient at processing tensors due to their similarity to matrix
    computations in graphics processing. To use images in deep learning, they must
    be converted into tensors. TorchVision provides the ToTensor function, which transforms
    PIL images into tensor representations for neural networks.
  prefs: []
  type: TYPE_NORMAL
- en: 1.9.5 Transforms
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Transforms in TorchVision are functions used to modify datasets before training.
    The Compose function is utilized to apply multiple transformations sequentially.
    Here, we define trans using transforms.ToTensor(), which converts images into
    tensors. Instead of manually transforming individual images, we assign trans to
    the dataset’s transform attribute:'
  prefs: []
  type: TYPE_NORMAL
- en: This ensures that every image in the dataset is automatically converted into
    a tensor when accessed.
  prefs: []
  type: TYPE_NORMAL
- en: 1.9.5.1 DataLoaders
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: A **DataLoader** defines how data is fed into a deep learning model. Instead
    of passing the entire dataset at once (which is computationally expensive), mini-batches
    of data are used. For instance, with a batch size of **32**, the model processes
    32 images at a time.
  prefs: []
  type: TYPE_NORMAL
- en: '**Training Data**: Uses **shuffling** to randomize data selection, preventing
    bias'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Validation Data**: Does not require shuffling, as the model is not learning
    during validation'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Choosing an optimal batch size (e.g., **32 or 64**) balances efficiency and
    performance, reducing memory constraints while ensuring effective training.
  prefs: []
  type: TYPE_NORMAL
- en: 1.9.6 Creating the Model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 1.9.6.1 The Hidden Layer
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'A hidden layer enhances learning by adding more neurons to process intermediate
    representations. Similar to the input layer, the hidden layer’s `nn.Linear` function
    requires knowledge of the input shape. Since each neuron in the previous layer
    computes one value, the number of inputs to the hidden layer equals the number
    of neurons in the preceding layer. The model is structured as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 1.9.6.2 The Output Layer
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The output layer consists of **10 neurons**, corresponding to the 10 possible
    digit classes in MNIST. The model assigns higher values to neurons representing
    the predicted class. Unlike the previous layers, the output layer does not use
    the ReLU activation function; instead, a loss function will be applied in the
    next step.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: This architecture enables effective classification by leveraging multiple layers
    to extract and refine meaningful features from the input images.
  prefs: []
  type: TYPE_NORMAL
- en: 1.9.7 Compiling the Model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'To optimize the neural network, we use the Adam optimizer, which adjusts the
    learning rate dynamically to improve convergence. The model parameters are passed
    into the optimizer as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 1.9.8 Calculating Accuracy
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: While the loss function helps in training the model, its numerical values can
    be difficult to interpret. Therefore, accuracy is often used as an additional
    metric to evaluate model performance.
  prefs: []
  type: TYPE_NORMAL
- en: To compute accuracy, we compare the number of correctly classified images to
    the total number of predictions. Since the dataset is processed in batches, accuracy
    is calculated per batch and accumulated to determine the overall performance.
  prefs: []
  type: TYPE_NORMAL
- en: 'The total number of predictions is equal to the dataset size, denoted as $$$
    N $$$, where $$$ n $$$ represents the batch size:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: We then define a function to calculate accuracy for each batch. By summing the
    accuracy across all batches, we obtain the total accuracy of the model.
  prefs: []
  type: TYPE_NORMAL
- en: 1.9.9 The Train Function
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We define a training loop for a specified number of epochs. During each epoch,
    the model is trained on the dataset and validated on a separate validation set.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'The training and validation losses, along with their respective accuracies,
    are displayed after each epoch:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'With an accuracy close to 100%, we verify the model’s performance by making
    a prediction on an original sample:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: The model outputs ten values, each representing a confidence score for one of
    the ten digits. These values correspond to the index positions, where the highest
    value represents the predicted class.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'To extract the predicted class, we use the `argmax` function:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: 'Finally, we compare the model’s prediction with the actual label:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: The model performed exceptionally well, achieving near 100% accuracy in both
    training and validation. This confirms its ability to classify handwritten digits
    accurately. The next step is inference, where the trained model is used to classify
    new, unseen images. MNIST has historical significance in computer vision and remains
    a valuable benchmark for evaluating machine learning models. If a model struggles
    with MNIST, it is unlikely to succeed on more complex datasets. This highlights
    MNIST’s importance not only as a learning tool but also as a debugging resource
    for modern deep-learning architectures.
  prefs: []
  type: TYPE_NORMAL
- en: 1.10 Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter introduces the foundational concepts of deep learning and its synergy
    with GPU acceleration. It begins with an overview of deep learning architectures,
    including deep neural networks and their mathematical underpinnings. Linear regression
    is presented as a basic neural model, setting the stage for more complex architectures.
    The chapter then explores convolutional neural networks (CNNs), emphasizing spatial
    structure, translation invariance, and locality. Recurrent neural networks (RNNs)
    are discussed next, along with their mathematical representation and challenges
    like vanishing gradients, which are addressed using LSTM units. Applications of
    RNNs in sequence modeling are highlighted. The chapter transitions into GPU acceleration,
    explaining its types and importance in speeding up deep learning computations.
    It covers setting up GPU environments and frameworks like TensorFlow. Finally,
    the chapter walks through the process of training a deep learning model using
    the MNIST dataset, including data preprocessing, model creation, compilation,
    and evaluation.
  prefs: []
  type: TYPE_NORMAL
