  zh: 一个具有三层神经网络的图示。输入层由标记为 X0_0 到 X2_2 的节点组成。隐藏层有标记为 H0_0 到 H2_3 的节点，通过表示数据流的箭头连接。输出层包含节点
    Y_0 和 Y_1。蓝色箭头表示层内的连接，红色箭头显示隐藏节点之间的连接，绿色箭头表示到输出层的连接
- en: 1.4 Mathematical Representation of RNNs
  id: totrans-100
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1.4 RNNs 的数学表示
- en: A standard RNN processes sequential input $$$ x_t $$$ at each time step $$$
    t $$$ and maintains a hidden state $$$ h_t $$$ that captures past information.
    The update equation for the hidden state is given by $$$\displaystyle \begin{aligned}
    h_t = f(W_h h_{t-1} + W_x x_t + b) \end{aligned} $$$ (1.7) where
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 标准的 RNN 在每个时间步 $$$ t $$$ 处理序列输入 $$$ x_t $$$, 并维护一个捕获过去信息的隐藏状态 $$$ h_t $$$. 隐藏状态的更新方程由以下公式给出：$$$\displaystyle
    \begin{aligned} h_t = f(W_h h_{t-1} + W_x x_t + b) \end{aligned} $$$(1.7) 其中
- en: $$$ h_t $$$ is the hidden state at time step $$$ t $$$, containing information
    from previous inputs.
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: $$$ h_t $$$ 是时间步 $$$ t $$$ 的隐藏状态，包含先前输入的信息。
- en: $$$ h_{t-1} $$$ is the hidden state from the previous time step.
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: $$$ x_t $$$ is the input at time step $$$ t $$$.
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: $$$ W_h $$$ and $$$ W_x $$$ are weight matrices.
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: $$$ b $$$ is a bias term.
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: $$$ f $$$ is an activation function (commonly tanh or ReLU).
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The output at each time step is computed as $$$\displaystyle \begin{aligned}
    y_t = W_y h_t + b_y \end{aligned} $$$ (1.8) where $$$ W_y $$$ is a weight matrix
    mapping the hidden state to the output and $$$ b_y $$$ is the output bias. Typical
    RNN architecture is presented in Figure [1.10](#Fig10).
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: '![Diagram of a neural network flow chart with three layers. The input layer
    consists of nodes labeled X0, X1, and X2, each with three sub-nodes. These connect
    to the hidden layers, labeled H0, H1, and H2, each also with three sub-nodes.
    Arrows indicate connections between nodes, with blue arrows for input to hidden
    layers and red arrows within hidden layers. The output layer has nodes labeled
    Y0 and Y1, connected to the hidden layer by green arrows.](../images/641715_1_En_1_Chapter/641715_1_En_1_Fig10_HTML.jpg)'
  id: totrans-109
  prefs: []
  type: TYPE_IMG
- en: Fig. 1.10
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
- en: A figure titled “Unrolled RNN Representation” showing a sequence of nodes representing
    an unrolled Recurrent Neural Network. The nodes are labeled with inputs $$$x_0$$$
    to $$$x_4$$$, hidden states $$$h_0$$$ to $$$h_4$$$, and outputs $$$y_0$$$ to $$$y_4$$$.
    Arrows indicate the flow of data from inputs through hidden states to outputs,
    illustrating the temporal sequence processing of the RNN. Each node and label
    is color-coded for clarity
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
- en: 1.5 Unrolling an RNN
  id: totrans-112
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: RNNs process input sequences over multiple time steps, which can be visualized
    by unfolding them. For an input sequence $$$ x_1, x_2, x_3, \dots , x_T $$$, the
    network can be expressed as $$$\displaystyle \begin{aligned} h_1 = f(W_h h_0 +
    W_x x_1 + b) \end{aligned} $$$ (1.9) $$$\displaystyle \begin{aligned} h_2 = f(W_h
    h_1 + W_x x_2 + b) \end{aligned} $$$ (1.10) $$$\displaystyle \begin{aligned} \vdots
    \end{aligned} $$$ (1.11) $$$\displaystyle \begin{aligned} h_T = f(W_h h_{T-1}
    + W_x x_T + b) \end{aligned} $$$ (1.12) where $$$ h_0 $$$ is typically initialized
    as a zero vector.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
- en: 1.6 Challenges in RNNs
  id: totrans-114
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 1.6.1 Vanishing and Exploding Gradients
  id: totrans-115
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: During backpropagation through time (BPTT), gradients of long sequences tend
    to either vanish (become very small) or explode (become excessively large). The
    vanishing gradient problem makes it difficult for the network to learn dependencies
    from distant past inputs. This issue is mathematically represented as $$$\displaystyle
    \begin{aligned} \frac{\partial L}{\partial W_h} = \sum_{t=1}^{T} \left( \frac{\partial
    L}{\partial h_t} \prod_{k=t}^{1} W_h f'(h_k) \right) \end{aligned} $$$ (1.13)
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
- en: If $$$ W_h $$$ has eigenvalues smaller than 1, gradients shrink exponentially,
    leading to vanishing gradients.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
- en: 1.6.2 Long Short-Term Memory (LSTM)
  id: totrans-118
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: LSTMs introduce a memory cell $$$ C_t $$$ and gating mechanisms to regulate
    the flow of information. The key equations are $$$\displaystyle \begin{aligned}
    f_t = \sigma(W_f x_t + U_f h_{t-1} + b_f) \end{aligned} $$$ (1.14) $$$\displaystyle
    \begin{aligned} i_t = \sigma(W_i x_t + U_i h_{t-1} + b_i) \end{aligned} $$$ (1.15)
    $$$\displaystyle \begin{aligned} \tilde{C}_t = \tanh(W_c x_t + U_c h_{t-1} + b_c)
    \end{aligned} $$$ (1.16) $$$\displaystyle \begin{aligned} C_t = f_t C_{t-1} +
    i_t \tilde{C}_t \end{aligned} $$$ (1.17) $$$\displaystyle \begin{aligned} o_t
    = \sigma(W_o x_t + U_o h_{t-1} + b_o) \end{aligned} $$$ (1.18) $$$\displaystyle
    \begin{aligned} h_t = o_t \tanh(C_t) \end{aligned} $$$ (1.19) where $$$ f_t $$$,
    $$$ i_t $$$, and $$$ o_t $$$ are the forget, input, and output gates, respectively.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: LSTM通过引入记忆单元 \( C_t \) 和门控机制来调节信息的流动。关键方程如下：
