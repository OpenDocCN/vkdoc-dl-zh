    block labeled "Global Memory." Below it, three smaller blocks labeled "SM 1,"
    "SM 2," and "SM 3" represent streaming multiprocessors, each containing a "Shared
    Mem" section. Under each SM block are four smaller blocks labeled "C1," "C2,"
    "C3," and "C4," representing execution units. A "Memory Bus" connects the SM blocks
    to the Global Memory.](../images/641715_1_En_1_Chapter/641715_1_En_1_Fig11_HTML.jpg)'
