  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 图1.7
- en: A line graph showing the decrease in loss over 500 epochs. The vertical axis
    represents loss, ranging from 0 to 140, while the horizontal axis represents epochs
    from 0 to 500\. The green line starts high at the beginning and sharply declines,
    leveling off near zero as epochs increase, indicating model convergence
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 一条折线图显示了在500个epoch中损失的下降。垂直轴表示损失，范围从0到140，而水平轴表示epoch从0到500。绿色线条在开始时较高，然后急剧下降，随着epoch的增加逐渐平缓至零，表明模型收敛。
- en: '![Scatter plot showing training data as blue dots and a learned model as a
    red line. The x-axis is labeled "X" ranging from 0 to 2, and the y-axis is labeled
