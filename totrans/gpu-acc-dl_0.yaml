- en: 1.8.2.2 General-Purpose GPU (GPGPU)
  id: totrans-138
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1.8.2.2 通用型 GPU (GPGPU)
- en: Initially designed for rendering graphics, GPGPUs have evolved to handle a variety
    of nongraphical tasks. Figure [1.11](#Fig11) gives the architecture of GPGPU.
    They leverage the parallel processing capabilities of GPUs for general-purpose
    computation. This evolution has been driven by the increasing demand for high-performance
    computing across various fields such as artificial intelligence, scientific simulations,
    and financial modeling.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 最初设计用于渲染图形，GPGPU 已发展到处理各种非图形任务。图 [1.11](#Fig11) 展示了 GPGPU 的架构。它们利用 GPU 的并行处理能力进行通用计算。这种演变是由人工智能、科学模拟和金融建模等领域对高性能计算需求的增加所驱动的。
- en: GPGPUs differ from traditional CPUs in their architecture. While CPUs are optimized
    for sequential task execution, GPGPUs excel at handling thousands of parallel
    threads simultaneously. This parallelism is particularly beneficial for workloads
    that involve large-scale matrix operations, image processing, and deep learning
    algorithms.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: GPGPU 与传统 CPU 在架构上有所不同。虽然 CPU 优化于顺序任务执行，但 GPGPU 在处理数千个并行线程方面表现出色。这种并行性对于涉及大规模矩阵运算、图像处理和深度学习算法的工作负载特别有益。
- en: A major breakthrough in GPGPU computing came with the introduction of programming
    frameworks such as NVIDIA’s CUDA and OpenCL. These frameworks allow developers
    to harness GPU power for a wide range of applications beyond graphics processing.
    By writing specialized code, programmers can offload computationally intensive
    tasks to the GPU, significantly speeding up execution times compared to CPU-based
    approaches.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: GPGPU 计算的一个重大突破是编程框架的引入，如 NVIDIA 的 CUDA 和 OpenCL。这些框架允许开发者利用 GPU 力量进行图形处理以外的广泛应用。通过编写专用代码，程序员可以将计算密集型任务卸载到
    GPU，与基于 CPU 的方法相比，显著缩短执行时间。
- en: Industries ranging from healthcare to finance have embraced GPGPUs to accelerate
    data processing and analysis. For example, in medical imaging, GPGPUs enable real-time
    rendering of complex scans, enhancing diagnostic capabilities. In finance, they
    are used for high-frequency trading algorithms that require rapid data processing
    and decision-making.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 从医疗保健到金融等各个行业都采用了 GPGPU 来加速数据处理和分析。例如，在医学成像中，GPGPU 使复杂扫描的实时渲染成为可能，增强了诊断能力。在金融领域，它们用于需要快速数据处理和决策的高频交易算法。
- en: Despite their advantages, GPGPUs also come with challenges. Efficient utilization
    requires knowledge of parallel programming, and not all applications can be easily
    adapted to benefit from GPU acceleration. Additionally, power consumption and
    heat dissipation remain concerns for large-scale deployments.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管具有优势，GPGPU 也存在挑战。有效利用需要了解并行编程，并且并非所有应用程序都能轻松适应以从 GPU 加速中受益。此外，功耗和散热仍然是大规模部署的关注点。
- en: In conclusion, general-purpose GPUs have revolutionized computing by extending
    the capabilities of traditional GPUs to nongraphical domains. Their ability to
    handle massive parallel workloads makes them indispensable in modern high-performance
    computing environments, driving innovation across multiple industries.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，通用 GPU 通过扩展传统 GPU 在非图形领域的功能，彻底改变了计算。它们处理大规模并行工作负载的能力使它们在现代高性能计算环境中变得不可或缺，推动多个行业的创新。
- en: 1.8.2.3 Dedicated GPUs
  id: totrans-145
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1.8.2.3 专用 GPU
- en: '**Dedicated GPUs**, as shown in Figure [1.11](#Fig11), are standalone hardware
    components with their own memory and processing power, providing significantly
    higher performance, especially for complex computations such as deep learning
    training. These GPUs are commonly used in gaming, professional rendering, and
    scientific computing. Their dedicated VRAM allows them to process large datasets
    efficiently, avoiding bottlenecks associated with shared memory in integrated
    solutions (Figure [1.12](#Fig12)).'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: '**专用 GPU**，如图 [1.11](#Fig11) 所示，是具有自身内存和处理能力的独立硬件组件，提供显著更高的性能，尤其是在深度学习训练等复杂计算方面。这些
    GPU 通常用于游戏、专业渲染和科学计算。它们专用的 VRAM 使其能够高效地处理大量数据集，避免与集成解决方案中共享内存相关的瓶颈（图 [1.12](#Fig12)）。'
- en: One of the key advantages of dedicated GPUs is their ability to handle intensive
    workloads such as AI model training, video editing, and real-time 3D rendering.
    These GPUs come with advanced features like ray tracing, tensor cores for deep
    learning, and high memory bandwidth, making them essential for high-performance
    applications.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 专用 GPU 的一个关键优势是它们能够处理如 AI 模型训练、视频编辑和实时 3D 渲染等密集型工作负载。这些 GPU 拥有高级功能，如光线追踪、用于深度学习的张量核心和高内存带宽，对于高性能应用至关重要。
- en: '![Diagram illustrating the architecture of a dedicated GPU (dGPU). At the top,
    "Dedicated VRAM (GPU Memory)" is shown, connected to a "Memory Bus." Below, three
    blocks labeled "SM 1," "SM 2," and "SM 3" represent streaming multiprocessors,
    each containing "Shared Mem" and four execution units labeled "C1" to "C4." The
    bottom section indicates a "PCIe Interface (Data Transfer)." The diagram highlights
    the relationship between memory, processing units, and data transfer pathways.](../images/641715_1_En_1_Chapter/641715_1_En_1_Fig12_HTML.jpg)'
  id: totrans-148
  prefs: []
  type: TYPE_IMG
  zh: '![展示专用 GPU（dGPU）架构的示意图。顶部显示“专用 VRAM（GPU 内存）”，连接到“内存总线”。下面是三个标记为“SM 1”、“SM 2”和“SM
    3”的块，代表流式多处理器，每个块包含“共享内存”和四个标记为“C1”至“C4”的执行单元。底部部分表示“PCIe 接口（数据传输）”。该图突出了内存、处理单元和数据传输路径之间的关系。](../images/641715_1_En_1_Chapter/641715_1_En_1_Fig12_HTML.jpg)'
- en: Fig. 1.12
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.12
- en: A figure of dedicated GPU architecture. At the top is “Dedicated VRAM (GPU Memory)”
    connected via a “Memory Bus.” Below are three blocks labeled SM 1, SM 2, and SM
    3, each containing “Shared Mem” and four cores labeled C1, C2, C3, and C4\. These
    represent execution units. At the bottom is the “PCIe Interface (Data Transfer)”
    for communication
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 专用 GPU 架构图。顶部是“专用 VRAM（GPU 内存）”，通过“内存总线”连接。下面是三个标记为 SM 1、SM 2 和 SM 3 的块，每个块包含“共享内存”和四个标记为
    C1、C2、C3 和 C4 的核心。这些代表执行单元。底部是“PCIe 接口（数据传输）”用于通信
- en: However, dedicated GPUs consume more power and generate more heat compared to
    integrated GPUs. This necessitates robust cooling solutions, making them more
    suitable for desktops and high-end laptops rather than ultra-portable devices.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，与集成 GPU 相比，专用 GPU 消耗更多电力并产生更多热量。这需要强大的冷却解决方案，使它们更适合桌面和高端笔记本电脑，而不是超便携设备。
- en: 1.8.2.4 Integrated GPUs
  id: totrans-152
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1.8.2.4 集成 GPU
- en: Integrated GPUs are built into the same chip as the CPU, sharing memory and
    resources, which limits their performance but offers a cost-effective option for
    less demanding applications. These GPUs are typically found in laptops, ultrabooks,
    and budget desktops, where power efficiency and space constraints take priority
    over raw performance. Integrated GPUs are well-suited for everyday computing tasks
    such as web browsing, media playback, and office applications. Additionally, modern
    integrated GPUs have improved significantly, enabling casual gaming and basic
    content creation. However, for tasks requiring high graphical performance, such
    as 3D rendering and deep learning, dedicated GPUs remain the preferred choice
    (Figure [1.13](#Fig13)).
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 集成显卡与CPU集成在同一芯片上，共享内存和资源，这限制了它们的性能，但为对性能要求不高的应用提供了一个经济实惠的选项。这些显卡通常出现在笔记本电脑、超极本和预算型台式机中，在这些设备中，电源效率和空间限制比原始性能更为重要。集成显卡非常适合日常计算任务，如网页浏览、媒体播放和办公应用。此外，现代集成显卡已经得到了显著提升，使得休闲游戏和基本内容创作成为可能。然而，对于需要高图形性能的任务，如3D渲染和深度学习，专用显卡仍然是首选选择（图[1.13](#Fig13)）。
- en: '![Diagram illustrating the architecture of an Integrated GPU (iGPU). At the
    top, "Shared System Memory (RAM)" is connected via a "Memory Bus" to the "Integrated
    GPU (iGPU)" which contains four Execution Units (EU 1 to EU 4) and a "Shared Cache."
    Below the iGPU is the "CPU," and at the bottom, "Compute Units (CPU + iGPU)" are
    linked to a "PCIe Interface" for external GPU and storage connections. The diagram
    highlights the memory hierarchy and data flow within the system.](../images/641715_1_En_1_Chapter/641715_1_En_1_Fig13_HTML.jpg)'
  id: totrans-154
  prefs: []
  type: TYPE_IMG
  zh: '![展示集成显卡（iGPU）架构的图。顶部，“共享系统内存（RAM）”通过“内存总线”连接到“集成显卡（iGPU）”，其中包含四个执行单元（EU 1
    到 EU 4）和“共享缓存”。iGPU下方是“CPU”，底部，“计算单元（CPU + iGPU）”连接到用于外部显卡和存储连接的“PCIe接口”。该图突出了系统中的内存层次结构和数据流。](../images/641715_1_En_1_Chapter/641715_1_En_1_Fig13_HTML.jpg)'
- en: Fig. 1.13
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 图1.13
- en: A figure illustrating the architecture of an integrated GPU (iGPU). At the top
    is the Shared System Memory (RAM), followed by the Memory Bus. Below is the Memory
    Hierarchy, which includes the Integrated GPU containing four Execution Units (EU
    1 to EU 4) and a Shared Cache. The CPU is positioned beneath the iGPU. At the
    bottom, the Compute Units (CPU + iGPU) connect to the PCIe Interface, used for
    external GPU and storage
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 一张展示集成显卡（iGPU）架构的图。顶部是共享系统内存（RAM），随后是内存总线。下面是内存层次结构，包括包含四个执行单元（EU 1 到 EU 4）和共享缓存的集成显卡。CPU位于iGPU下方。底部，计算单元（CPU
    + iGPU）连接到PCIe接口，用于外部显卡和存储连接。
- en: 1.9 Training a Deep Learning Model
  id: totrans-157
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1.9 训练深度学习模型
- en: Deep learning has revolutionized many areas of machine learning, and one of
    its most fundamental applications is image classification. A typical introductory
    problem in deep learning is classifying handwritten digits from the MNIST dataset—a
    benchmark dataset widely used for training and testing image recognition models.
    This dataset consists of 60,000 training images and 10,000 test images of handwritten
    digits (0–9), each representing a $$$28 * 28$$$ grayscale image. The goal is to
    develop a neural network model that can accurately recognize and classify these
    digits, mimicking how humans interpret handwritten numbers.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习已经彻底改变了机器学习的许多领域，其最基本的应用之一是图像分类。深度学习的一个典型入门问题是分类MNIST数据集中的手写数字——这是一个广泛用于训练和测试图像识别模型的基准数据集。该数据集包含60,000张训练图像和10,000张测试图像的手写数字（0–9），每个代表一个28
    * 28灰度图像。目标是开发一个神经网络模型，能够准确识别和分类这些数字，模仿人类解读手写数字的方式。
- en: 1.9.1 Image Classification Problem
  id: totrans-159
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.9.1 图像分类问题
- en: 'Traditional programming relies on explicitly defining rules and conditions
    for a program to follow in order to produce the correct output. This approach
    works well for many structured problems where rules can be clearly stated. However,
    image classification presents a unique challenge: it requires a program to correctly
    identify and categorize images it has never seen before. Given the vast variations
    in images—differences in lighting, orientation, handwriting styles, and distortions—it
    is nearly impossible for a programmer to manually define a comprehensive set of
    rules that would work for all possible cases. As a result, traditional programming
    techniques struggle with image classification tasks.'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 传统编程依赖于明确定义程序遵循的规则和条件，以产生正确的输出。这种方法对于许多规则可以明确陈述的结构化问题效果良好。然而，图像分类提出了独特的挑战：它要求程序能够正确识别和分类它以前从未见过的图像。鉴于图像的巨大变化——如光照、方向、书写风格和扭曲的差异——程序员几乎不可能手动定义一套全面的规则，以适用于所有可能的情况。因此，传统编程技术在处理图像分类任务时遇到了困难。
- en: 'Traditional programming relies on explicitly defining rules and conditions
    for a program to follow to produce the correct output. This approach works well
    for many structured problems where rules can be clearly stated. However, image
    classification presents a unique challenge: it requires a program to correctly
    identify and categorize images it has never seen before.'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 传统编程依赖于明确定义程序遵循的规则和条件，以产生正确的输出。这种方法对于许多规则可以明确陈述的结构化问题效果良好。然而，图像分类提出了独特的挑战：它要求程序能够正确识别和分类它以前从未见过的图像。
- en: Due to the immense variability in images, such as differences in lighting, orientation,
    handwriting styles, and distortions, it is virtually impossible for a programmer
    to manually establish a complete set of rules that account for every scenario.
    Consequently, traditional programming methods prove inadequate for handling image
    classification tasks effectively.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 由于图像的巨大可变性，如光照、方向、书写风格和扭曲的差异，程序员几乎不可能手动建立一套完整的规则，以涵盖每种情况。因此，传统编程方法在有效处理图像分类任务方面显得不足。
- en: Figure [1.14](#Fig14) gives the details about MNIST dataset under consideration.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 图[1.14](#Fig14)提供了关于考虑中的MNIST数据集的详细信息。
- en: 1.9.2 Exploring the MNIST Data
  id: totrans-164
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.9.2 探索MNIST数据
- en: Exploring the MNIST dataset involves understanding its structure, which includes
    70,000 grayscale images of handwritten digits. It is split into 60,000 training
    images and 10,000 validation images. Each image is 28 by 28 pixels, represented
    as numerical arrays. This dataset is widely used for benchmarking deep learning
    models.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 探索MNIST数据集涉及理解其结构，该结构包括70,000个手写数字的灰度图像。这些图像分为60,000个训练图像和10,000个验证图像。每个图像为28x28像素，表示为数值数组。这个数据集被广泛用于基准测试深度学习模型。
- en: '![A grid of 25 images showing handwritten digits from 0 to 9, each labeled
    with its corresponding number. The digits are white on a black background, with
    labels above each image indicating the digit it represents. The arrangement is
    in a 5x5 format.](../images/641715_1_En_1_Chapter/641715_1_En_1_Fig14_HTML.jpg)'
  id: totrans-166
  prefs: []
  type: TYPE_IMG
  zh: '![一张25个图像的网格，展示了从0到9的手写数字，每个数字都标有相应的编号。数字在黑色背景上呈现白色，每个图像上方都有标签，指示它所代表的数字。排列格式为5x5。](../images/641715_1_En_1_Chapter/641715_1_En_1_Fig14_HTML.jpg)'
- en: Fig. 1.14
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 图1.14
- en: 'A grid of 25 images displaying handwritten digits from 0 to 9, each labeled
    with its corresponding number. The digits are white on a black background, showcasing
    various handwriting styles. The labels above each image indicate the digit it
    represents, such as “Label: 5” for the first image, “Label: 0” for the second,
    and so on, highlighting the diversity in handwritten numeral representation'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 一张25个图像的网格，展示了从0到9的手写数字，每个数字都标有相应的编号。数字在黑色背景上呈现白色，展示了各种书写风格。每个图像上方的标签指示它所代表的数字，例如第一张图像的“标签：5”，第二张图像的“标签：0”，以此类推，突出了手写数字表示的多样性。
- en: 1.9.3 Data Engineering and Dataset Splits
  id: totrans-169
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.9.3 数据工程和数据集拆分
- en: The process of organizing and preparing data for deep learning is known as data
    engineering. Understanding the distinction between training and validation data
    is crucial for building robust models, and further insights can be gained from
    experts like Jason Brownlee, who explores these concepts in depth. This section
    introduces TorchVision, a powerful library for handling standard datasets like
    MNIST. It simplifies data loading and preprocessing for deep learning applications.
    The MNIST dataset, consisting of 70,000 grayscale images of handwritten digits,
    is automatically partitioned into 60,000 training images and 10,000 testing images.
    For model evaluation, the test set is repurposed as a validation set. Understanding
    data partitioning into train, validation, and test sets is essential for building
    reliable deep learning models.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 组织和准备数据以供深度学习使用的过程称为数据工程。理解训练数据和验证数据之间的区别对于构建鲁棒模型至关重要，并且可以从像Jason Brownlee这样的专家那里获得更多见解，他深入探讨了这些概念。本节介绍了TorchVision，这是一个强大的库，用于处理标准数据集，如MNIST。它简化了深度学习应用中的数据加载和预处理。MNIST数据集包含70,000张手写数字的灰度图像，自动分为60,000张训练图像和10,000张测试图像。为了模型评估，测试集被重新用作验证集。理解将数据划分为训练、验证和测试集对于构建可靠的深度学习模型至关重要。
- en: 1.9.4 Tensors
  id: totrans-171
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.9.4 张量
- en: A tensor is an n-dimensional array that generalizes vectors (1D arrays) and
    matrices (2D arrays). Tensors are fundamental to deep learning, as modern neural
    networks are designed to process them efficiently. A 3D tensor can represent pixel
    data, where dimensions correspond to width, height, and color channels (RGB).
    GPUs are highly efficient at processing tensors due to their similarity to matrix
    computations in graphics processing. To use images in deep learning, they must
    be converted into tensors. TorchVision provides the ToTensor function, which transforms
    PIL images into tensor representations for neural networks.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 张量是一个n维数组，它推广了向量（1D数组）和矩阵（2D数组）。张量是深度学习的基础，因为现代神经网络被设计成高效地处理它们。一个3D张量可以表示像素数据，其中维度对应于宽度、高度和颜色通道（RGB）。由于与图形处理中的矩阵计算相似，GPU在处理张量方面非常高效。为了在深度学习中使用图像，它们必须被转换为张量。TorchVision提供了ToTensor函数，该函数将PIL图像转换为神经网络使用的张量表示。
- en: 1.9.5 Transforms
  id: totrans-173
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.9.5 转换
- en: 'Transforms in TorchVision are functions used to modify datasets before training.
    The Compose function is utilized to apply multiple transformations sequentially.
    Here, we define trans using transforms.ToTensor(), which converts images into
    tensors. Instead of manually transforming individual images, we assign trans to
    the dataset’s transform attribute:'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: TorchVision中的转换是用于在训练之前修改数据集的函数。Compose函数被用来按顺序应用多个转换。在这里，我们定义trans使用transforms.ToTensor()，它将图像转换为张量。而不是手动转换单个图像，我们将trans分配给数据集的transform属性：
- en: This ensures that every image in the dataset is automatically converted into
    a tensor when accessed.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 这样确保了当访问数据集时，每个图像都会自动转换为张量。
- en: 1.9.5.1 DataLoaders
  id: totrans-176
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1.9.5.1 DataLoader
- en: A **DataLoader** defines how data is fed into a deep learning model. Instead
    of passing the entire dataset at once (which is computationally expensive), mini-batches
    of data are used. For instance, with a batch size of **32**, the model processes
    32 images at a time.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: '**DataLoader**定义了数据如何输入深度学习模型。而不是一次性传递整个数据集（这计算成本高昂），使用数据的小批量。例如，批大小为**32**时，模型一次处理32张图像。'
- en: '**Training Data**: Uses **shuffling** to randomize data selection, preventing
    bias'
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**训练数据**：使用**打乱**来随机化数据选择，防止偏差'
- en: '**Validation Data**: Does not require shuffling, as the model is not learning
    during validation'
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**验证数据**：不需要打乱顺序，因为在验证过程中模型没有学习'
- en: Choosing an optimal batch size (e.g., **32 or 64**) balances efficiency and
    performance, reducing memory constraints while ensuring effective training.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 选择一个最优的批大小（例如，**32或64**）可以在效率和性能之间取得平衡，减少内存限制同时确保有效的训练。
- en: 1.9.6 Creating the Model
  id: totrans-181
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.9.6 创建模型
- en: 1.9.6.1 The Hidden Layer
  id: totrans-182
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1.9.6.1 隐藏层
- en: 'A hidden layer enhances learning by adding more neurons to process intermediate
    representations. Similar to the input layer, the hidden layer’s `nn.Linear` function
    requires knowledge of the input shape. Since each neuron in the previous layer
    computes one value, the number of inputs to the hidden layer equals the number
    of neurons in the preceding layer. The model is structured as follows:'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 隐藏层通过添加更多神经元来处理中间表示，从而增强学习效果。与输入层类似，隐藏层的`nn.Linear`函数需要了解输入的形状。由于前一层的每个神经元计算一个值，因此隐藏层的输入数量等于前一层的神经元数量。模型的结构如下：
- en: '[PRE0]'
  id: totrans-184
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 1.9.6.2 The Output Layer
  id: totrans-185
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1.9.6.2 输出层
- en: The output layer consists of **10 neurons**, corresponding to the 10 possible
    digit classes in MNIST. The model assigns higher values to neurons representing
    the predicted class. Unlike the previous layers, the output layer does not use
    the ReLU activation function; instead, a loss function will be applied in the
    next step.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 输出层由**10个神经元**组成，对应MNIST中的10个可能的数字类别。模型为表示预测类别的神经元分配更高的值。与之前的层不同，输出层不使用ReLU激活函数；相反，在下一步将应用损失函数。
- en: '[PRE1]'
  id: totrans-187
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: This architecture enables effective classification by leveraging multiple layers
    to extract and refine meaningful features from the input images.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 这种架构通过利用多层来提取和细化输入图像中的有意义特征，从而实现有效的分类。
- en: 1.9.7 Compiling the Model
  id: totrans-189
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.9.7 编译模型
- en: 'To optimize the neural network, we use the Adam optimizer, which adjusts the
    learning rate dynamically to improve convergence. The model parameters are passed
    into the optimizer as follows:'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 为了优化神经网络，我们使用Adam优化器，该优化器动态调整学习率以改善收敛。模型参数如下传递给优化器：
- en: '[PRE2]'
  id: totrans-191
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 1.9.8 Calculating Accuracy
  id: totrans-192
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.9.8 计算准确率
- en: While the loss function helps in training the model, its numerical values can
    be difficult to interpret. Therefore, accuracy is often used as an additional
    metric to evaluate model performance.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然损失函数有助于训练模型，但其数值可能难以解释。因此，准确率经常被用作评估模型性能的附加指标。
- en: To compute accuracy, we compare the number of correctly classified images to
    the total number of predictions. Since the dataset is processed in batches, accuracy
    is calculated per batch and accumulated to determine the overall performance.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 为了计算准确率，我们比较正确分类的图像数量与总预测数量的比例。由于数据集是分批处理的，因此准确率是按批计算的，并累积以确定整体性能。
- en: 'The total number of predictions is equal to the dataset size, denoted as $$$
    N $$$, where $$$ n $$$ represents the batch size:'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 总预测数量等于数据集大小，用符号$$ N $$表示，其中$$ n $$代表批大小：
- en: '[PRE3]'
  id: totrans-196
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: We then define a function to calculate accuracy for each batch. By summing the
    accuracy across all batches, we obtain the total accuracy of the model.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们定义一个函数来计算每个批次的准确率。通过将所有批次的准确率相加，我们获得模型的总体准确率。
- en: 1.9.9 The Train Function
  id: totrans-198
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.9.9 训练函数
- en: We define a training loop for a specified number of epochs. During each epoch,
    the model is trained on the dataset and validated on a separate validation set.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 我们为指定数量的epoch定义一个训练循环。在每个epoch中，模型在数据集上训练，并在单独的验证集上验证。
- en: '[PRE4]'
  id: totrans-200
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'The training and validation losses, along with their respective accuracies,
    are displayed after each epoch:'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 在每个epoch之后，显示训练和验证的损失以及相应的准确率：
- en: '[PRE5]'
  id: totrans-202
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'With an accuracy close to 100%, we verify the model’s performance by making
    a prediction on an original sample:'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 准确率接近100%时，我们通过在原始样本上做出预测来验证模型性能：
- en: '[PRE6]'
  id: totrans-204
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: The model outputs ten values, each representing a confidence score for one of
    the ten digits. These values correspond to the index positions, where the highest
    value represents the predicted class.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 模型输出十个值，每个值代表十个数字中的一个的置信度分数。这些值对应于索引位置，其中最高值表示预测类别。
- en: '[PRE7]'
  id: totrans-206
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'To extract the predicted class, we use the `argmax` function:'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 为了提取预测类别，我们使用`argmax`函数：
- en: '[PRE8]'
  id: totrans-208
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'Finally, we compare the model’s prediction with the actual label:'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们将模型的预测与实际标签进行比较：
- en: '[PRE9]'
  id: totrans-210
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: The model performed exceptionally well, achieving near 100% accuracy in both
    training and validation. This confirms its ability to classify handwritten digits
    accurately. The next step is inference, where the trained model is used to classify
    new, unseen images. MNIST has historical significance in computer vision and remains
    a valuable benchmark for evaluating machine learning models. If a model struggles
    with MNIST, it is unlikely to succeed on more complex datasets. This highlights
    MNIST’s importance not only as a learning tool but also as a debugging resource
    for modern deep-learning architectures.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 该模型表现异常出色，在训练和验证阶段都达到了近100%的准确率。这证实了其准确分类手写数字的能力。下一步是推理阶段，其中训练好的模型被用来分类新的、未见过的图像。MNIST在计算机视觉领域具有历史意义，并且仍然是评估机器学习模型的有价值基准。如果一个模型在MNIST上表现不佳，那么它在更复杂的数据集上成功的可能性也不大。这突出了MNIST不仅作为学习工具的重要性，而且作为现代深度学习架构的调试资源的价值。
- en: 1.10 Summary
  id: totrans-212
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1.10 概述
- en: This chapter introduces the foundational concepts of deep learning and its synergy
    with GPU acceleration. It begins with an overview of deep learning architectures,
    including deep neural networks and their mathematical underpinnings. Linear regression
    is presented as a basic neural model, setting the stage for more complex architectures.
    The chapter then explores convolutional neural networks (CNNs), emphasizing spatial
    structure, translation invariance, and locality. Recurrent neural networks (RNNs)
    are discussed next, along with their mathematical representation and challenges
    like vanishing gradients, which are addressed using LSTM units. Applications of
    RNNs in sequence modeling are highlighted. The chapter transitions into GPU acceleration,
    explaining its types and importance in speeding up deep learning computations.
    It covers setting up GPU environments and frameworks like TensorFlow. Finally,
    the chapter walks through the process of training a deep learning model using
    the MNIST dataset, including data preprocessing, model creation, compilation,
    and evaluation.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 本章介绍了深度学习的基础概念及其与GPU加速的结合。它从对深度学习架构的概述开始，包括深度神经网络及其数学基础。线性回归被作为一个基本的神经网络模型提出，为更复杂的架构奠定了基础。然后章节探讨了卷积神经网络（CNN），强调了空间结构、平移不变性和局部性。接下来讨论了循环神经网络（RNN），包括它们的数学表示和诸如梯度消失等挑战，这些问题通过LSTM单元得到解决。RNN在序列建模中的应用被突出显示。章节接着转向GPU加速，解释了其类型和在加快深度学习计算中的重要性。它涵盖了设置GPU环境和框架如TensorFlow的过程。最后，章节通过使用MNIST数据集训练深度学习模型的过程进行说明，包括数据预处理、模型创建、编译和评估。
- en: Exercise
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 练习
- en: Define deep learning and explain its significance in modern artificial intelligence
    applications.
  id: totrans-215
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义深度学习并解释其在现代人工智能应用中的重要性。
- en: Describe the architecture of a deep neural network. How does it differ from
    traditional machine learning models?
  id: totrans-216
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 描述深度神经网络的架构。它与传统的机器学习模型有何不同？
- en: Explain how linear regression can be interpreted as a single-layer neural network.
    Provide mathematical justification.
  id: totrans-217
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解释如何将线性回归解释为单层神经网络。提供数学证明。
- en: Discuss the evolution from dense layers to convolutional neural networks (CNNs).
    What advantages do CNNs offer?
  id: totrans-218
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论从密集层到卷积神经网络（CNN）的演变。CNN提供了哪些优势？
- en: Explain the concepts of spatial structure, translation invariance, and locality
    in CNNs. How do these properties improve model performance?
  id: totrans-219
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解释CNN中的空间结构、平移不变性和局部性的概念。这些属性如何提高模型性能？
- en: Describe the architecture and functioning of recurrent neural networks (RNNs).
    What are their key applications?
  id: totrans-220
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 描述循环神经网络（RNN）的架构和功能。它们的关键应用是什么？
- en: What are the challenges faced in training RNNs? Explain how LSTM units help
    overcome these challenges.
  id: totrans-221
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 训练RNN时面临哪些挑战？解释LSTM单元如何帮助克服这些挑战。
- en: Discuss the role of GPU acceleration in deep learning. Why is GPU preferred
    over CPU for training deep models?
  id: totrans-222
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论GPU加速在深度学习中的作用。为什么在训练深度模型时GPU比CPU更受欢迎？
- en: Explain the different types of GPU acceleration techniques used in deep learning
    frameworks.
  id: totrans-223
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解释在深度学习框架中使用的不同类型的GPU加速技术。
- en: Outline the steps involved in training a deep learning model using the MNIST
    dataset. Include data preprocessing, model creation, and evaluation.
  id: totrans-224
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 概述使用MNIST数据集训练深度学习模型的步骤。包括数据预处理、模型创建和评估。
