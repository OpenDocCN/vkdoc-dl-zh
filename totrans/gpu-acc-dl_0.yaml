    SM 块下方有四个标注为“C1”、“C2”、“C3”和“C4”的小块，代表执行单元。一个“内存总线”连接 SM 块和全局内存。](../images/641715_1_En_1_Chapter/641715_1_En_1_Fig11_HTML.jpg)'
