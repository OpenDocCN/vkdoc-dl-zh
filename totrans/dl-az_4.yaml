- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: Hyperparameter Tuning and Distributed Training
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Hyperparameter tuning in Batch AI is not yet as simple as it is in Batch Shipyard.
    There is no notion of task factories, so it requires that we create a number of
    jobs where we pass different parameters to our model. In our jobs example, therefore,
    the JSON file would be very similar between our jobs, the only difference being
    the command, and specifically the arguments we pass to the script. The process
    of hyperparameter tuning can be made easier by using the Batch AI Python SDK rather
    than the CLI. Have a look at [`http://bit.ly/baitsdk`](http://bit.ly/baitsdk)
    for further details on the Python SDK.
  prefs: []
  type: TYPE_NORMAL
- en: Distributed training is slightly easier in Batch AI than Batch Shipyard for
    frameworks supported by Batch AI because Batch AI takes care of configuring the
    necessary internode communication layer such as MPI. At the time of writing, the
    frameworks supported are Chainer, CNTK, TensorFlow, PyTorch, and Caffe2\. For
    frameworks that are not supported, it is up to the user to supply the appropriate
    configuration and will be the same as Batch Shipyard. For examples on how to do
    this, see [`http://bit.ly/bairecipes`](http://bit.ly/bairecipes) .
  prefs: []
  type: TYPE_NORMAL
- en: Variation of Batch AI with Python SDK
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: In the earlier example, we illustrated using Batch AI with the Azure CLI, which
    is the easiest way to get started. Batch AI can also be used through a Python
    SDK. The demo example described in this section can be reproduced following the
    instructions given at [`http://bit.ly/deepbait`](http://bit.ly/deepbait) . In
    this example, rather than showcasing an example of hyperparameter tuning or distributed
    training for which there are already examples, nine different deep learning frameworks
    are used to train a simple CNN on the CIFAR10 data set. In practice, being able
    to quickly utilize different frameworks can be very useful because state-of-the-art
    implementations of certain models might only be available in one or a small number
    of frameworks. Often, though, one would select a single framework and use that
    framework to do hyperparameter tuning or distributed training as described in
    this chapter. However, this example also serves the pedagogical purpose of showcasing
    the flexibility of the Batch AI service as well as different ways one might interact
    with the service.
  prefs: []
  type: TYPE_NORMAL
- en: In this example, the project was developed and tested on an Azure Ubuntu DLVM.
    Anaconda Project is used in this case to create the environment and install dependencies,
    download the data, and allow the user to interact with the project in a straightforward
    manner to reproduce the demo, such as asking through a command-line prompt for
    the Azure subscription identifier and name of the resource group in which the
    Batch AI cluster should be created. The project also comes with makefiles to help
    with local testing and debugging to allow one to more easily modify the project.
  prefs: []
  type: TYPE_NORMAL
- en: This example also differs from the earlier Batch AI example in the use of Jupyter
    Notebooks, which are sent directly to the Batch AI cluster rather than Python
    scripts, as illustrated in Figure [9-8](#Fig8). Using Jupyter Notebooks directly,
    the code can be processed and output stored directly within the notebooks. This
    is useful for data scientists already developing within Jupyter Notebooks who
    would like to showcase results through them (e.g., visualizations created during
    or after processing). In this case, nine different Jupyter notebooks are created
    (one for each of the deep learning frameworks), along with associated Docker containers
    within which the notebooks are run using Batch AI.
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_9_Fig8_HTML.jpg](A463582_1_En_9_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-8
  prefs: []
  type: TYPE_NORMAL
- en: Rather than having to run Jupyter Notebooks in sequence to test different options,
    they can be executed in parallel using Batch AI
  prefs: []
  type: TYPE_NORMAL
- en: Each of the notebooks was written to have parameters that can be modified when
    they are run on the Batch AI cluster. In the example project for illustrative
    purposes, the number of epochs that are run are modified from the original file
    when they are run on Batch AI. Specifically, the original notebooks that are sent
    to the cluster have the following parameters in Listing [9-18](#PC18) at the top
    of the notebook as examples.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: 'In the job submission, the Batch AI cluster is told in this case to modify
    the number of epochs to run (as just one example of a parameter change), and the
    notebook is modified and run with a different number of epochs. At the end of
    the run, the notebook contains a cell with all of the parameters it was run with,
    as well as the output from each cell running stored within the notebook itself.
    This makes it easy to look through the results: All of the important information
    is stored right within the notebook.'
  prefs: []
  type: TYPE_NORMAL
- en: The steps followed to use nine different deep learning frameworks to run a simple
    CNN are as follows, illustrated in Figure [9-9](#Fig9).
  prefs: []
  type: TYPE_NORMAL
- en: Create Jupyter notebooks to run on Batch AI and transfer them to file storage.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Write the data to file storage.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Create the Docker containers for each deep learning framework and transfer them
    to a container registry.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Create a Batch AI Pool.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Each job will pull in the appropriate container and notebook, and load data
    from the fileshare.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Once the job is completed the executed notebook will be written to the fileshare.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: These steps are very similar to those described before in using Batch AI with
    the CLI, only with Jupyter Notebooks. Besides the parallel processing ability
    that allows for a reduction in the experimentation time enabled through Batch
    AI, this scenario also illustrates the power of cloud computing in that many machines
    can be spun up on demand, used for the processing they are needed for, and then
    the cluster can be shut down. This provides the data scientist more flexibility
    at a large reduction in cost, with no special hardware to procure or systems to
    manage.
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_9_Fig9_HTML.jpg](A463582_1_En_9_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-9
  prefs: []
  type: TYPE_NORMAL
- en: Steps required to run a simple CNN using nine different deep learning frameworks
    for illustration purposes of the flexibility of Batch AI, with code processed
    and output stored within Jupyter Notebooks.
  prefs: []
  type: TYPE_NORMAL
- en: A number of helper functions are included to make interaction with the Batch
    AI cluster easy, such as the `setup_cluster( )` function shown in Figure [9-10](#Fig10)
    and `print_jobs_summary( )` as shown in Figure [9-11](#Fig11).
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_9_Fig11_HTML.jpg](A463582_1_En_9_Fig11_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-11
  prefs: []
  type: TYPE_NORMAL
- en: The `ExploringBatchAI.ipynb` file is used to submit the jobs to Batch AI
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_9_Fig10_HTML.jpg](A463582_1_En_9_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-10
  prefs: []
  type: TYPE_NORMAL
- en: After the Anaconda Project is set up on a DLVM, the example is run through a
    Jupyter notebook that contains helper functions to interact with the cluster
  prefs: []
  type: TYPE_NORMAL
- en: Azure Machine Learning Services
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This chapter focused mainly on the computing environments and setup of running
    AI jobs, which can be done with DLVM, Batch Shipyard, Batch AI, and DLWorkspace
    as four main examples. Azure Machine Learning services, which were introduced
    in more depth in Chapter [4](A463582_1_En_4_Chapter.html), are a set of services
    that enable building, deploying, and managing AI models in an end-to-end fashion.
    Azure Machine Learning manages the data science life cycle, such as providing
    capabilities for model versioning and run history (see [`http://bit.ly/amllogging`](http://bit.ly/amllogging)
    ), tracking models in production, and helping AI developers develop faster. Azure
    Machine Learning services also aim to ease the deployment process, for example
    running Docker containers with AI models within a Kubernetes cluster with Azure
    Kubernetes Services to enable scalable real-time predictions or to run on an edge
    device using Azure IoT (see Figure [9-12](#Fig12)).
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_9_Fig12_HTML.jpg](A463582_1_En_9_Fig12_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-12
  prefs: []
  type: TYPE_NORMAL
- en: 'Azure Machine Learning is an open source compatible, end-to-end data science
    platform. Source: [`http://bit.ly/AMLservices`](http://bit.ly/AMLservices) `.`'
  prefs: []
  type: TYPE_NORMAL
- en: Some of the services mentioned in this chapter, such as the DLVM and Batch AI,
    can be set up as the computing context within an Azure Machine Learning project.
    As of this writing, Azure Machine Learning services works with Python and is available
    in several Azure regions. In addition, there are AI extensions for Visual Studio
    and Visual Studio Code that allow interacting with the Azure Machine Learning
    platform (see [`http://bit.ly/aivisstdio`](http://bit.ly/aivisstdio) ). As the
    service is updating frequently, we focused on the core computing environments
    in this chapter and suggest reading the current documentation on Azure Machine
    Learning services available at [`http://bit.ly/AMLservices`](http://bit.ly/AMLservices)
    .
  prefs: []
  type: TYPE_NORMAL
- en: Other Options for AI Training on Azure
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There are numerous other options for AI training on Azure that we do not describe
    in depth, but some of which we mention briefly here. The first example builds
    on Apache Spark , which is a popular general-purpose engine for big data processing.
    There are several offerings of Apache Spark on Azure such as Azure Databricks
    and Azure HDInsight. One popular option for training AI models with Spark is through
    the use of the MMLSpark library by Microsoft, which provides a number of deep
    learning and data science tools, available as open source on Github at [`http://bit.ly/mmlSpark`](http://bit.ly/mmlspark)
    . MMLSpark integrates Spark ML pipelines with the deep learning framework CNTK
    as well as OpenCV. This is especially useful if the data for an AI solution already
    reside in SPARK. MMLSpark can be used to train deep learning models on GPU nodes
    and can thus be used on a DLVM attached to the HDInsight Spark cluster as described
    at [`http://bit.ly/MMLSparkGPU`](http://bit.ly/MMLsparkGPU) .
  prefs: []
  type: TYPE_NORMAL
- en: Another alternative to attaching a GPU VM to a Spark cluster is utilizing transfer
    learning to apply a pretrained model using MMLSpark in a parallel fashion on a
    Spark cluster and then train a classifier using one of the many ML packages in
    Spark. This was used for snow leopard conservation to predict images containing
    snow leopards and assist conservation efforts as described in a blog post by Hamilton,
    Sengupta, and Astala (2017).
  prefs: []
  type: TYPE_NORMAL
- en: AI training can also be scaled out through the use of a cluster of Docker containers
    such as through the use of Kubernetes. Although we have seen the use of Kubernetes
    clusters mainly for the deployment and hosting of AI models to date, it is also
    possible to use them for large-scale training. Zhang and Buchwalter (2017) described
    how they used Azure Container Services Engine (ACS-engine) that generates Azure
    Resource Manager templates that are needed to deploy the cluster with everything
    configured. In their case working alongside the startup Litbit, a Kubernetes cluster
    was used to scale different types of VM pools (CPU, GPUs) up and down based on
    the demand of the given workload. Tok (2017) gave an overview of using CNTK with
    Kubernetes through ACS-engine along with a detailed walkthrough of how to set
    up the cluster, for both training and deploying deep learning models at scale.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter presented various options you can use to train your AI model. If
    you simply want to experiment, then the DLVM is probably the best choice because
    it is the quickest and easiest to set up. If you are looking to run hyperparameter
    tuning, distributed training, or model training as part of an automated pipeline,
    then Batch AI or Batch Shipyard will be the best tools for the job. DLWorkspace
    is also a good choice for large-scale experimentation, but today we would mostly
    recommend it only if the other two options are not suitable. The cluster-based
    method of training might seem daunting at first, but it quickly confers benefits.
    Batch AI is the easiest to use and set up and Batch Shipyard is the most feature
    rich. We have only scratched the surface of what is possible with these powerful
    tools. For detailed documentation, check out [`http://bit.ly/azbai`](http://bit.ly/azbai)
    , [`http://bit.ly/azshipyard`](http://bit.ly/azshipyard) , and [`http://bit.ly/azdlwork`](http://bit.ly/azdlwork)
    . In the next chapter, we give an overview of different options for deploying
    trained deep learning models so they can be used within AI applications.
  prefs: []
  type: TYPE_NORMAL
- en: Footnotes[1](#Fn1_source)
  prefs: []
  type: TYPE_NORMAL
- en: Order and numbers are based on single precision FLOPS; cards with two chips
    are treated as individual GPUs.
  prefs: []
  type: TYPE_NORMAL
- en: '[2](#Fn2_source)'
  prefs: []
  type: TYPE_NORMAL
- en: All the steps are detailed in the notebook Chapter_09_01.ipynb which can be
    found in the Chapter_09 folder [http://​bit.​ly/​CH09Notebooks](http://bit.ly/CH09Notebooks).
  prefs: []
  type: TYPE_NORMAL
- en: 10. Operationalizing AI Models
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The previous chapter covered what constitutes an AI model, the different types
    of models we can create, and how to train and build these models. An AI model
    does not become useful until it is deployed somewhere and consumed by the end
    user. This chapter describes the various options available on Azure to deploy
    your models. We provide general guidelines on what to use and when, but this is
    by no means an exhaustive guide to the Azure platform. In the following sections
    we discuss the metrics over which we compare the various deployment platforms.
    Then we discuss the platforms we have found to be suitable for deploying ML models
    and highlight their pros and cons. We also present simple use cases and architectures
    for each of them so that you get an idea of how they would fit into a larger solution.
    We also provide a step-by-step tutorial for deployment of a CNN to Azure Kubernetes
    Services (AKS) with GPU nodes as a hands-on guide for one recommended option for
    building a real-time request–response AI system.
  prefs: []
  type: TYPE_NORMAL
- en: Operationalization Platforms
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A common dichotomy when looking at operationalization of a model is whether
    the scoring requests will be batch or real time. An example of a batch workload
    is when we have large number of records given to us infrequently such as every
    24 hours, that need to be scored. These records could be images or other types
    of data. A real-time workload is when the service must always be up and receives
    a small number of records to score relatively frequently. An example might be
    a phone app that sends a picture to determine what type of animal is in the picture.
    The examples provided fit quite nicely into their respective classifications,
    but in reality things are often a lot less discrete. For example, we might have
    a real-time workload that requires massive amounts of computing or other constraints
    on our solution that break key architecture assumptions. That is why it is often
    better to think about these solutions belonging to a continuum where each solution
    can be partially stretched beyond what it is ideally suited for.
  prefs: []
  type: TYPE_NORMAL
- en: 'A key consideration when deploying models is dependency and environment management.
    This is not a problem unique to AI models: It is common for all types of deployed
    applications, but it becomes especially acute for AI applications due to their
    often complicated dependencies and hardware requirements. For this reason, services
    that use Docker containers are often preferred because this makes it easy to keep
    the same environment for development and test as well as ensure that all dependencies
    are satisfied. If you are new to Docker, we recommend the basic overview at [`http://bit.ly/DockerDS`](http://bit.ly/DockerDS)
    .'
  prefs: []
  type: TYPE_NORMAL
- en: As we mentioned earlier , AI models also have hardware requirements; these are
    often less demanding than the training environments but depending on the scenario
    might still require a reasonable amount of computing resources. That is why another
    consideration for the deployment options is the hardware available on the platform
    and specifically the availability of GPUs. Without the GPUs the throughput could
    be quite limited, meaning that the service will either have to deal with slow
    responses or have to scale out the compute.
  prefs: []
  type: TYPE_NORMAL
- en: DLVM
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The simplest way to operationalize something is to use the same platform that
    we recommend for experimentation: a VM, and specifically a data science or DLVM.
    You will already have the dependencies installed and you know that your code will
    run on the platform. On top of that by using a VM you have the greatest amount
    of flexibility as far as the hardware configuration is concerned even access to
    GPUs. This kind of operationalization is only recommended for proof of concepts
    and pilot workloads because there is no management infrastructure and no way to
    scale out or distribute the load. With VMs it is also possible to use Docker containers,
    which would be the recommended way to deploy things as this will make it easier
    to move to different VMs, but also move to other more suitable platforms that
    use Docker containers.'
  prefs: []
  type: TYPE_NORMAL
- en: Azure Container Instances
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Another simple platform to use for operationalization is Azure Container Instances
    (ACI). ACI is the simplest and fastest way to run a container on Azure; you do
    not have to know anything about orchestrators such as Kubernetes or provision
    and manage VMs. It is well suited for hosting simple apps and task automation.
    It just takes one command to deploy your prebuilt container (see Listing [10-1](#PC1)).
    For further details on deploying using ACI, go to [`http://bit.ly/ACIstart`](http://bit.ly/ACIstart)
    .
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: Although you can specify the CPU and memory requirements of your application,
    at the time of writing GPUs were not available for ACI; thus, for workloads requiring
    GPU, ACI is not an option. The suggested use for ACI would be for short-lived
    applications that are either triggered or stood up for short periods of time.
    A typical model deployment scenario using ACI would be to deploy a simple Flask
    application as a short-lived demo, such as a simple image classification model
    where there are not any latency or bandwidth requirements. In Figure [10-1](#Fig1)
    we can see an example scenario. In this scenario the user develops a model and
    Flask application on a DSVM , and then packages it up into a container that the
    user can also test on the DSVM before upload to an Azure Container Registry. They
    then call for the model to be pulled out of our container registry and finally
    have it deployed on an ACI. With the deployed model they can simply call the endpoint
    with an image and the classification will be returned back to them.
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_10_Fig1_HTML.jpg](A463582_1_En_10_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10-1
  prefs: []
  type: TYPE_NORMAL
- en: ACI scenario. (1) Develop on DSVM; (2) Push container to container registry;
    (3) Deploy to ACI; and (4) Send images to deployed model to be scored.
  prefs: []
  type: TYPE_NORMAL
- en: Azure Web Apps
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Azure Web Apps is another quick and easy way of deploying models. They can either
    be standard Web Apps that are Windows based or Linux Web Apps. Both support a
    number of programming languages and Linux Web Apps support Docker containers.
    The use case for Azure Web Apps is the same as ACI. They can be a little harder
    to set up and configure, but they are also cheaper for longer running deployments.
    The web apps also offer nice features such as deploying from a git repository
    as well as a CLI to install packages. For further information on web apps, see
    [`http://bit.ly/AzureWebApps`](http://bit.ly/AzureWebApps) .
  prefs: []
  type: TYPE_NORMAL
- en: Azure Kubernetes Services
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: AKS is a managed Kubernetes cluster configuration. It is like a standard Kubernetes
    cluster except that the management of the master nodes is handled by Azure. This
    translates to reduced overhead and cost because you only have to pay for the compute
    of the agent nodes. It uses Kubernetes, which is a popular open source Docker
    orchestrator, so it is easy to navigate for those familiar with Kubernetes and
    because it is an open source project there is lots of information from which to
    draw.
  prefs: []
  type: TYPE_NORMAL
- en: AKS recently enabled deployment to GPU VMs, opening the possibility to run GPU
    AI models on it. In fact, AKS is our recommended way to deploy real-time workloads.
    A typical scenario for AKS would be where we need to set up a real-time service
    that needs to scale with demand and also be fault tolerant. Because we can use
    any size (SKU) of VM including GPUs this is the ideal solution for demanding applications.
    The setup and management is considerably more involved than what was shown for
    the ACI. An example of how to deploy things on an orchestrated container cluster
    can be found at [`http://bit.ly/ACSTutorial`](http://bit.ly/ACSTutorial) . This
    uses the older Azure Container Services service, so some of the commands will
    differ.
  prefs: []
  type: TYPE_NORMAL
- en: The scenario is very similar to the one explained for ACI deployment except
    that we also have a load balancer so that when a request is made the load can
    be distributed appropriately between the deployed pods (see Figure [10-2](#Fig2)).
    The creation of the container is omitted from the diagram but would be identical
    to what is shown in Figure [10-1](#Fig1). Using AKS we can also set up autoscaling
    rules so that the number of pods and nodes in our cluster can change based on
    demand.
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_10_Fig2_HTML.jpg](A463582_1_En_10_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10-2
  prefs: []
  type: TYPE_NORMAL
- en: 'AKS scenario : (1) Develop on DSVM, (2) Push container to container registry,
    (3) Deploy to AKS, and (4) Send images to service, which get balanced across the
    pods using load balancer.'
  prefs: []
  type: TYPE_NORMAL
- en: 'To deploy an AI model on AKS you need the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Your model and an API to call it.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The Flask web application that will handle the requests.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: A Docker container that contains the model, Flask application, and necessary
    dependencies.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Once you have these you can create the cluster with the command shown in Listing
    [10-2](#PC2). The command will create a cluster called `myGPUCluster` with one
    node that is an NC6 VM. An NC6 VM has a single K80 GPU that will speed up the
    inference of our deep learning model considerably compared to CPU. As an example,
    a single NC6 can handle a throughput of 20 images per second using a ResNet-152
    model implemented in TensorFlow. In contrast, a single DS15 with 20 CPU cores
    can handle a throughput of around 7 images per second. The GPU-based configuration
    therefore provides nearly three times the throughput at around half the price.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: Once we have the cluster up and running we need to create a manifest file that
    specifies what we want to deploy and how. The manifest file we are using for this
    example can be found at [`http://bit.ly/AIManifest`](http://bit.ly/AIManifest)
    . In the manifest file we specify that we want to create a service based on our
    container, that it requires a GPU, and that we want a load balancer on port 80\.
    We deploy our pod with the command shown in Listing [10-3](#PC3).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: After around five minutes, our pod should be ready and we can get the IP of
    our service with the command shown in Listing [10-4](#PC4) with the output shown
    in Listing [10-5](#PC5).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: The IP of our service is under `EXTERNAL-IP`. We can then send our requests
    to that service and get the response back. We have created a step-by-step tutorial
    on how to deploy a CNN based on ResNet-152 written in TensorFlow or Keras with
    a TensorFlow back end and you can find it at [`http://bit.ly/AKSAITutorial`](http://bit.ly/AKSAITutorial)
    .
  prefs: []
  type: TYPE_NORMAL
- en: Azure Service Fabric
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Azure Service Fabric (ASF) is a cluster management and orchestration service
    similar to Kubernetes. ASF has been used internally by Microsoft for many services,
    including Azure SQL Database, Azure Cosmos DB, and many core Azure services. The
    draw of ASF is that it is simpler to use than Kubernetes because one can deploy
    an application simply knowing Docker and does not need to understand a completely
    new orchestration service. Theoretically it should be possible to run ASF on GPUs,
    but there are currently no concrete examples of doing so. The use case for service
    fabric would be identical to the one for AKS with the only caveat that GPU-dependent
    workloads have been proven on AKS but not ASF (see Figure [10-3](#Fig3)).
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_10_Fig3_HTML.jpg](A463582_1_En_10_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10-3
  prefs: []
  type: TYPE_NORMAL
- en: 'Service Fabric scenario : (1) Develop on DSVM, (2) Push container to container
    registry, (3) Deploy container to Service Fabric, and (4) Send images to the service
    to be scored.'
  prefs: []
  type: TYPE_NORMAL
- en: Batch AI
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In Chapter [9](A463582_1_En_9_Chapter.html), we discussed Batch AI, and all
    the benefits we mentioned previously in terms of flexibility of compute and scalability
    transfer to operationalization as well. Batch AI is most suited to massively parallel
    batch scenarios where the cluster can be quickly spun up, the job executed in
    parallel, and then spun down. Because Batch AI itself does not cost anything,
    you only need to pay for the compute you use, making it an extremely efficient
    solution. A scenario for using Batch AI is shown in Figure [10-4](#Fig4). We assume
    you have already trained the model and have wrapped it in an appropriate API and
    Docker container and pushed it all to an ACR. The user uploads one or more videos
    to be processed by our deep learning model. An Azure function receives the notification
    that data have been uploaded to a blob and spins up the Batch AI cluster. Meanwhile,
    another Azure function reads the videos and queues them up in an Azure Service
    Bus. As the cluster comes online it pulls in the appropriate container and spins
    it up. The application in the container subscribes to the appropriate topic and
    sees what jobs are available. Each VM now will independently pull a message from
    the service bus and based on the message will pull the appropriate video from
    blob storage, process it, and push it back. Once all the jobs are done, the Azure
    function will destroy the cluster.
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_10_Fig4_HTML.jpg](A463582_1_En_10_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10-4
  prefs: []
  type: TYPE_NORMAL
- en: 'Batch AI scenario: (1) Push videos to storage. (2) The storage triggers Azure
    function to create a cluster. (3) Azure function starts queuing up the videos
    found in storage to a service bus. (4) Batch AI cluster spins up. (5) Cluster
    pulls appropriate image from container registry. (6) The job running on each VM
    pulls a single message from the service bus and based on the image pulls the appropriate
    video from storage. (7) Once the video is processed, the results are written back
    to storage.'
  prefs: []
  type: TYPE_NORMAL
- en: Batch Shipyard is very similar to Batch AI and might offer features that have
    not made it into Batch AI yet. Batch Shipyard can more or less be brought in as
    a drop-in replacement for Batch AI in the preceding scenario.
  prefs: []
  type: TYPE_NORMAL
- en: AZTK
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Spark is the most popular framework for massively data parallel and High Performance
    Computing (HPC) workloads. The Azure Distributed Data Engineering Toolkit (AZTK)
    is a Python CLI application for provisioning on-demand Spark clusters in Azure.
    It is a convenient and cheap way to get up and running with a Spark cluster. AZTK
    is able to provision a cluster in 5 to 10 minutes and it is able to make use of
    dedicated and low-priority VMs, making it very cost-efficient.
  prefs: []
  type: TYPE_NORMAL
- en: AZTK is suited to scenarios where lots of the components are dependent on Spark
    and the requirement is for ephemeral clusters. AZTK uses Docker containers, meaning
    it can be quite easy to manage dependencies and ensure that your production environment
    matches your deployment environment. AZTK can also use GPUs, making it great for
    solutions that require the data parallelization that Spark offers in combination
    of the computation power of GPUs. The AZTK version of the scenario shown in Figure
    [10-4](#Fig4) can be seen in Figure [10-5](#Fig5). In the AZTK scenario we have
    no need for the Azure Subscription service because we can distribute things using
    Spark’s built-in parallelization. For AZTK we are also using an ACI rather than
    calling it from the Azure Function because AZTK is written in Python and Python
    support on Azure Functions was experimental at the time of writing.
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_10_Fig5_HTML.jpg](A463582_1_En_10_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10-5
  prefs: []
  type: TYPE_NORMAL
- en: 'AZTK scenario : (1) Push videos to storage. (2) The storage triggers Azure
    Function. (3) Azure Function calls ACI that have AZTK installed and spins up an
    AZTK cluster. (4) The PySpark job starts and begins pulling data from storage
    and processing it. (5) As the processing of each video is completed the results
    are written back to storage.'
  prefs: []
  type: TYPE_NORMAL
- en: HDInsight and Databricks
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: HDInsight (HDI) is a Spark offering from Microsoft. It tends to be a little
    more expensive than AZTK for on-demand processing and cannot use GPUs. Azure Databricks
    is another Spark-based platform on Azure, a generally available “first party”
    Microsoft service. It has a simple single-click start and integrates with Azure
    services such as Azure Active Directory. Databricks provides an interactive and
    collaborative notebook experience, as well as monitoring and security tools in
    the optimized Spark platform.
  prefs: []
  type: TYPE_NORMAL
- en: On-demand Spark clusters can be created using Azure Functions as in the AZTK
    and Batch AI scenarios, but because of its tighter integration with Azure, on-demand
    clusters for either Databricks or HDI can be created using Azure Data Factory
    (see [`http://bit.ly/ADFCreateHDI`](http://bit.ly/ADFCreateHDI) and [`http://bit.ly/DBwithADF`](http://bit.ly/DBwithADF)
    ). HDI and Databricks unfortunately do not use Docker containers so dependency
    management is a little trickier. Because of the tighter integration, the pipeline
    using HDI and Databricks will be a little simpler but less flexible due to the
    constraints of Azure Data Factory (see Figure [10-6](#Fig6)).
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_10_Fig6_HTML.jpg](A463582_1_En_10_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10-6
  prefs: []
  type: TYPE_NORMAL
- en: 'Example Databricks or HDInsight scenario: (1) Push videos to storage. (2) ADF
    reads the data from storage. (3) It calls HDInsight or Databricks to process the
    data. (4-5) The data are then streamed back and stored.'
  prefs: []
  type: TYPE_NORMAL
- en: See example deep learning notebooks for Azure Databricks available at [`http://bit.ly/DB_DL`](http://bit.ly/DB_DL)
    .
  prefs: []
  type: TYPE_NORMAL
- en: SQL Server
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To perform computig close to where the data are, SQL Server is a great option
    for deployment when data are already stored in SQL. The ideal scenario for such
    a deployment would be that SQL Server is already being used or the scenario would
    benefit from having the model execute as close to the data as possible. The data
    proximity requirement is usually the result of two things, data gravity and data
    sensitivity. Data gravity refers to the fact that large volumes of data cause
    a “gravitational pull” on the computation due to the costs of moving the data
    around. Data sensitivity refers to privacy and security concerns when having data
    cross different systems and the possibility of data being left behind or the security
    weakened due to the multiple data transfers. SQL Server is very flexible, as it
    can be installed on Windows and Linux and can be deployed on VMs with GPU to accelerate
    deep learning scenarios (see [`http://bit.ly/SQLServerDeepL`](http://bit.ly/SQLServerDeepL)
    ). Both Python and R integration are available for SQL Server so data scientists
    can use whatever language they are most comfortable with. More examples on deploying
    models on SQL Server can be found at [`http://bit.ly/SQLML`](http://bit.ly/SQLML)
    .
  prefs: []
  type: TYPE_NORMAL
- en: Operationalization Overview
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We have presented a number of operationalization platforms and it can be hard
    to choose among them. As we mentioned earlier it is good to think about these
    services belonging on a continuum that ranges from strictly batch to real time,
    with services like Batch AI and AZTK belonging to the batch end of the spectrum
    and services like AKS and ASF belonging to the real-time end of the spectrum.
    In Figure [10-7](#Fig7) you can see a visual representation of this continuum:
    On the left are the more batch-like platforms and on the right the more real-time
    platforms. Figure [10-7](#Fig7) does not imply that the leftmost or rightmost
    options are the recommended approaches for batch and real-time processing, respectively,
    only that these platforms are most appropriate for that type of processing.'
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_10_Fig7_HTML.jpg](A463582_1_En_10_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10-7
  prefs: []
  type: TYPE_NORMAL
- en: Batch to real-time continuum
  prefs: []
  type: TYPE_NORMAL
- en: Figure [10-7](#Fig7) is just a general guideline, as it is possible to use these
    options in many ways. For example, even though Spark on HDI or Azure Databricks
    are typically associated with batch workloads, there are options for creating
    real-time workloads, enabled, for example, through MMLSpark Serving as described
    at [`http://bit.ly/MMLSparkStreaming`](http://bit.ly/MMLSparkStreaming) .
  prefs: []
  type: TYPE_NORMAL
- en: 'You will have also gleaned from the sections on each of the services that each
    have strengths and weaknesses. In Figure [10-8](#Fig8) you can see a visual representation
    of the attributes of each of the services. The services are listed on the left
    side of the heatmap and the metrics along the top. Each service receives a rating
    indicated by the color of the box that is based on the color bar on right side
    of the heatmap. We compare the service across five metrics: speed, scalability,
    data proximity, debug environment, and ease of deployment.'
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_10_Fig8_HTML.jpg](A463582_1_En_10_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10-8
  prefs: []
  type: TYPE_NORMAL
- en: Heatmap of deployment services
  prefs: []
  type: TYPE_NORMAL
- en: Speed refers to the hardware available to each of the services; for AI models
    this mainly revolves around whether GPUs are available for it or not. Scalability
    refers to whether the service can be easily scaled up and out. Data proximity
    refers to how close the compute is to the data; this is mainly a consideration
    when we don’t want to move the data due to either volume or security reasons.
    Debug environment refers to how easy it is to develop for the platform; the main
    consideration across this axis is whether the service uses Docker containers or
    not. Finally, ease of deployment refers to how easy it is to deploy the model
    and whether there is a steep learning curve to get things working.
  prefs: []
  type: TYPE_NORMAL
- en: Although there are many nuances and reasons to deviate from this recommendation,
    for real-time processing of deep learning models, we recommend AKS using GPU nodes.
    As mentioned earlier, we have created a step-by-step tutorial on how to deploy
    a CNN based on ResNet-152 written in TensorFlow or Keras with a TensorFlow back
    end, and you can find it at [`http://bit.ly/AKSAITutorial`](http://bit.ly/AKSAITutorial)
    . For batch processing of deep learning models, at the time of this writing we
    recommend using Batch AI. An example using TensorFlow can be found at [`http://bit.ly/BatchAIEx`](http://bit.ly/BatchAIEx)
    .
  prefs: []
  type: TYPE_NORMAL
- en: We focused primarily here on operationalizing deep learning models on Azure.
    Deep learning models can also be trained on the cloud and then operationalized
    in different environments, such as IoT edge as discussed in the next section,
    as well as natively on Windows devices through ONNX as described at [`http://bit.ly/WindowsONNX`](http://bit.ly/WindowsONNX)
    .
  prefs: []
  type: TYPE_NORMAL
- en: Azure Machine Learning Services
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The preceding example to deploy an AI model to AKS can be a little daunting,
    especially to those not familiar with Docker. To this end, AML offers options
    that make operationalization of AI models easier: You simply supply the model
    file, your dependencies in a YAML file, and finally the model driver file, and
    it will create the appropriate Docker container and deploy it to AKS (see [`http://bit.ly/amldeploy`](http://bit.ly/amldeploy)
    ). It offers easy and convenient ways to test your deployment locally as well
    as scale the service as needed. See the blog post by Zhu, Iordanescu, and Karmanov
    (2018) as an example of using Azure Machine Learning to deploy a deep learning
    model for detecting diseases from chest x-ray images. Azure Machine Learning also
    assists in the deployment of deep learning models to IoT edge devices as described
    at [`http://bit.ly/DLtoIOT`](http://bit.ly/DLtoIOT) .'
  prefs: []
  type: TYPE_NORMAL
- en: In previous chapters we mentioned the usefulness of transfer learning and in
    this chapter we also highlighted the benefits of using GPUs for inference. AML
    services now offers the ability to use a pretrained ResNet 50 model on FPGAs for
    inference. FPGAs offer a considerable speed increase over CPUs and GPUs at a very
    low cost. Benchmarking showed that a single FPGA could score around 500 images
    per second and cost less than 0.2 cents to score 10,000 images. To use this service
    simply follow the instructions given at [`http://bit.ly/msfpga`](http://bit.ly/msfpga)
    . It has a number of Jupyter Notebooks that go through how to train your model
    based on the features, but also how to deploy and test the model.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter covered a number of operationalization options offered on Azure.
    It went through the options of deploying models using simple managed services
    such as ACI and Azure Web Apps to more complicated setups with GPU support such
    as AKS and Batch AI. We also covered both request–response scenarios as well as
    batch scenarios. We gave a comparative overview of what we believe the strengths
    and weaknesses of each of the services offered are. With this guidance you should
    be able to choose the most appropriate option for your scenario and deploy your
    model to make your model available within a production AI solution.
  prefs: []
  type: TYPE_NORMAL
