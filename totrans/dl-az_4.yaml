- en: Part IV
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第四部分
- en: AI Architectures and Best Practices
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: AI 架构和最佳实践
- en: 9. Training AI Models
  id: totrans-2
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 9. 训练 AI 模型
- en: Training AI models is usually more demanding than training standard ML models
    because they are processing intensive and often the data sets involved are larger.
    That is why if you are serious about deep learning you have to have access to
    GPUs. In Azure there are a number of ways you can make use of GPUs, on single
    VMs or in orchestrated clusters of them. In this chapter, we summarize several
    of the most common methods available as well as the pros and cons of each. Then
    we expand on the code we wrote in Chapter [6](A463582_1_En_6_Chapter.html), which
    used a VGG-like CNN to tackle the CIFAR10 data set using the DLVM as the computing
    environment. In this chapter, we extend to other training options such as Batch
    AI and Batch Shipyard, which can both be useful for scaling up or scaling out
    training. We finish by highlighting briefly some of the other methods of training
    AI models on Azure that are not as common but might be useful depending on the
    problem at hand.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 训练 AI 模型通常比训练标准 ML 模型要求更高，因为它们处理密集且涉及的数据集通常更大。这就是为什么如果你对深度学习认真，你必须能够访问 GPU。在
    Azure 中，有几种方法可以让你使用 GPU，无论是在单个虚拟机上还是在它们的编排集群中。在本章中，我们总结了最常见的一些方法以及每种方法的优缺点。然后我们扩展了在第
    [6](A463582_1_En_6_Chapter.html) 章中编写的代码，该代码使用类似 VGG 的 CNN 来处理 CIFAR10 数据集，并使用
    DLVM 作为计算环境。在本章中，我们扩展到其他训练选项，如批处理 AI 和批处理船坞，这两种方法都可以用于扩展或扩展训练。最后，我们简要介绍了 Azure
    上训练 AI 模型的其他一些方法，这些方法可能不如常见，但根据问题的不同可能很有用。
- en: Training Options
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 训练选项
- en: Azure has a vast number of options for training AI models. We will limit ourselves
    here to the select few that we feel fulfill the requirements of most workload
    types. The four ways that we discuss to train AI models are DLVM, Batch AI, Batch
    Shipyard, and DL Workspace. There is no best way to train an AI model; each method
    has its benefits and drawbacks and some will be more suited to certain solutions
    than others. The training of a deep learning model can take place on a single
    GPU machine or distributed across a number of GPU machines. The most common scenario
    is to use a single GPU machine per model, as training the model in a distributed
    fashion needs additional considerations that can be quite tricky to get right
    but might be necessitated by factors such as the model being too big to fit onto
    a single GPU machine or wanting to reduce training time.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: Azure 提供了大量的选项用于训练 AI 模型。在这里，我们将仅限于介绍我们认为能满足大多数工作负载类型需求的少数几种。我们讨论的四种训练 AI 模型的方法分别是
    DLVM、批处理 AI、批处理船坞和 DL 工作空间。没有一种训练 AI 模型的最佳方式；每种方法都有其优点和缺点，并且某些方法可能比其他方法更适合某些解决方案。深度学习模型的训练可以在单个
    GPU 机器上进行，也可以分布到多个 GPU 机器上。最常见的情况是每个模型使用单个 GPU 机器，因为以分布式方式训练模型需要额外的考虑，这可能会相当棘手，但可能由模型太大而无法适应单个
    GPU 机器或希望减少训练时间等因素所必需。
- en: In this chapter, we do not mention the data processing that is often needed
    before training an AI model. For example, the raw data will often have to be processed
    to be readable by a deep learning model, the labels on which the ML algorithm
    should learn might be stored in a database, or the raw data might come from many
    sources. There are many tools and options available within the Microsoft AI Platform
    for this type of work, such as Azure SQL Data Warehouse and CosmosDB for storing
    different types of data, and Azure Data Factory for data movement, which are outside
    the scope of this chapter. We assume for purposes here that the data are available
    in a format that is ready to be trained by an AI model.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们没有提及在训练 AI 模型之前通常需要的数据处理。例如，原始数据通常需要经过处理才能被深度学习模型读取，ML 算法应该学习的标签可能存储在数据库中，或者原始数据可能来自许多来源。在
    Microsoft AI 平台中提供了许多工具和选项来完成此类工作，例如 Azure SQL 数据仓库和 CosmosDB 用于存储不同类型的数据，以及 Azure
    数据工厂用于数据移动，这些内容超出了本章的范围。我们假设在此目的下，数据是以 AI 模型可以训练的格式提供的。
- en: Distributed Training
  id: totrans-7
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 分布式训练
- en: Distributed training is used when the whole data set cannot be stored on a single
    machine or the model cannot fit on a single GPU, but most often it is used to
    achieve faster training. The two main types of distributed training are data parallelism
    or model parallelism.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 分布式训练用于整个数据集无法存储在单个机器上或模型无法适应单个 GPU 的情况，但最常见的是用于实现更快的训练。分布式训练的两种主要类型是数据并行或模型并行。
- en: With data parallelism, the same model will be replicated across many GPUs and
    will receive different batches of training data. The gradients are then aggregated
    and then the updates distributed back to the models. In this scenario the communication
    overhead can be quite substantial so an active area of exploration is how to make
    this process more efficient by exploring asynchronous updates (Calauzènes & Roux,
    2017; Dean et al., 2012; Recht, Re, Wright, & Niu, 2011) or reducing the overhead
    by compressing or quantizing the weight updates (Lin, Han, Mao, Wang, & Dally,
    2017; Recht et al., 2011).
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据并行性中，相同的模型将在许多GPU之间复制，并将接收不同的训练数据批次。然后汇总梯度，并将更新分发给模型。在这种情况下，通信开销可能相当大，因此一个活跃的研究领域是如何通过探索异步更新（Calauzènes
    & Roux, 2017；Dean et al., 2012；Recht, Re, Wright, & Niu, 2011）或通过压缩或量化权重更新（Lin,
    Han, Mao, Wang, & Dally, 2017；Recht et al., 2011）来提高此过程的效率。
- en: With model parallelism the model is split over multiple GPUs. An example of
    this might be different layers placed on different GPUs and the forward and backward
    passes over the model involve network communication across the nodes. This is
    a far less common scenario and is only necessary if the model cannot fit on a
    single GPU.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 使用模型并行性，模型将在多个GPU之间分割。这种情况的一个例子可能是将不同的层放置在不同的GPU上，并且模型的前向和反向传播涉及节点间的网络通信。这是一个远比常见的情况，并且只有在模型无法适应单个GPU时才是必要的。
- en: In these scenarios it is assumed that there is only one GPU per VM, often referred
    to as multinode multi-GPU, but in fact Azure has configurations where there can
    be up to four GPUs on a single VM. All of the scenarios just explained can be
    executed on a single-node multi-GPU scenario except the scenario where the data
    are too large to fit on a single VM. Communication overhead is usually less of
    a concern in this scenario because it takes place on a single node and can perform
    even better if the deep learning framework uses Nvidia’s NCCL multi-GPU library
    ( [`http://bit.ly/nvidianccl`](http://bit.ly/nvidianccl) ).
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些场景中，假设每个虚拟机只有一个GPU，通常称为多节点多GPU，但实际上Azure有配置，单个虚拟机上可以有高达四个GPU。除了数据太大无法适应单个虚拟机的场景外，所有已解释的场景都可以在单节点多GPU场景下执行。在这种情况下，通信开销通常不是一个大问题，因为它发生在单个节点上，如果深度学习框架使用Nvidia的NCCL多GPU库（[`http://bit.ly/nvidianccl`](http://bit.ly/nvidianccl)），则可以表现得更好。
- en: Deep Learning Virtual Machine
  id: totrans-12
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 深度学习虚拟机
- en: The DLVM is a single VM that comes in a number of different configurations,
    some of which have GPUs, and is a specially configured variant of the DSVM. The
    VM types that have GPUs at the moment are NC, NV, ND, NCv2, and NCv3, with the
    cheapest being the NC series. These have the corresponding GPUs installed with
    NVIDIA Tesla K80, M60, P40, P100, and finally V100\. They are loosely ordered
    from the least powerful to the most powerful, with a single K80 providing around
    4.4 teraflops and a single V100 offering around 14 teraflops.[¹](#Fn1)
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: DLVM是一个具有多种配置的单个虚拟机，其中一些配置包含GPU，并且是DSVM的特殊配置版本。目前具有GPU的虚拟机类型有NC、NV、ND、NCv2和NCv3，其中最便宜的是NC系列。这些虚拟机安装了相应的GPU，包括NVIDIA
    Tesla K80、M60、P40、P100，最后是V100。它们从最不强大到最强大依次排列，单个K80提供大约4.4万亿次浮点运算，单个V100提供大约14万亿次浮点运算。[¹](#Fn1)
- en: Note
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Even the least powerful GPU (K80) provides significant reductions in training
    time compared to training AI models on CPUs.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 即使是最不强大的GPU（K80）与在CPU上训练AI模型相比，也能显著减少训练时间。
- en: 'Each VM series can come in three configurations: one GPU, two GPUs, or four
    GPUs. See the current documentation on all VMs available on Azure at [`http://bit.ly/AzureVMs`](http://bit.ly/AzureVMs)
    and the DSVM at [`http://bit.ly/AzureDSVM`](http://bit.ly/AzureDSVM) .'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 每个虚拟机系列都可以提供三种配置：一个GPU、两个GPU或四个GPU。请参阅Azure上所有虚拟机的当前文档，了解有关VM的详细信息，请访问[`http://bit.ly/AzureVMs`](http://bit.ly/AzureVMs)，以及DSVM的详细信息，请访问[`http://bit.ly/AzureDSVM`](http://bit.ly/AzureDSVM)。
- en: By using the DLVM, we can jump straight into tackling our data science problems
    because all the libraries come preinstalled in a premade Anaconda environment,
    as illustrated in Figure [9-1](#Fig1). The DLVM is a great option for experimentation
    but if you want to do large-scale model/data parallel training or simply explore
    various hyperparameters in parallel, one of the latter options will be better.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用DLVM，我们可以直接进入解决我们的数据科学问题，因为所有库都预安装在预先制作的Anaconda环境中，如图[9-1](#Fig1)所示。DLVM是实验的绝佳选择，但如果您想进行大规模模型/数据并行训练或简单地并行探索各种超参数，后一种选项会更好。
- en: '![A463582_1_En_9_Fig1_HTML.jpg](A463582_1_En_9_Fig1_HTML.jpg)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![A463582_1_En_9_Fig1_HTML.jpg](A463582_1_En_9_Fig1_HTML.jpg)'
- en: Figure 9-1
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-1
- en: The Data Science Virtual Machine is a preconfigured environment in the cloud
    for data science and AI modeling, development, and deployment. The Deep Learning
    Virtual Machine is a special configuration for deep learning workloads
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学虚拟机是云中为数据科学和人工智能建模、开发和部署预配置的环境。深度学习虚拟机是针对深度学习工作负载的特殊配置
- en: Batch Shipyard
  id: totrans-21
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Batch Shipyard
- en: Batch Shipyard is a general-purpose tool for running container-based batch processing
    and High Performance Computing (HPC) workloads. By building on top of Azure Batch,
    Batch Shipyard is able to benefit from its features, such as handling the complexities
    surrounding large-scale parallel and HPC applications in the cloud, managing aspects
    such as the VM deployment and management, job scheduling, and autoscaling requirements.
    There is no extra cost to use Azure Batch when running jobs on Azure; it is a
    free, value-added service where costs are only incurred for the computing resources
    consumed and related datacenter movement and storage costs.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: Batch Shipyard 是一个通用的工具，用于运行基于容器的批量处理和高性能计算（HPC）工作负载。通过在 Azure Batch 的基础上构建，Batch
    Shipyard 能够利用其功能，例如处理云中大规模并行和 HPC 应用程序周围的复杂性，管理诸如虚拟机部署和管理、作业调度以及自动扩展需求等方面。在 Azure
    上运行作业时，使用 Azure Batch 没有额外成本；这是一个免费的价值增值服务，其中成本仅限于消耗的计算资源和相关的数据中心移动和存储成本。
- en: Batch Shipyard uses Docker containers, which makes it easy to manage the complex
    dependencies that come with AI workloads. Batch Shipyard is available as a CLI
    that can be run locally or in the cloud using the Azure Cloud Shell. The orchestration
    is managed through easy-to-understand configuration files, which makes it easy
    to reuse scripts. It already contains a large number of examples for some of the
    most popular deep learning frameworks (see [`http://bit.ly/shipyard24c3`](http://bit.ly/shipyard24c3)
    ).
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: Batch Shipyard 使用 Docker 容器，这使得它易于管理伴随人工智能工作负载而来的复杂依赖关系。Batch Shipyard 作为 CLI
    可在本地或使用 Azure Cloud Shell 在云中运行。编排通过易于理解的配置文件进行管理，这使得重用脚本变得容易。它已经包含了一些最受欢迎的深度学习框架的大量示例（见[http://bit.ly/shipyard24c3](http://bit.ly/shipyard24c3)）。
- en: 'The following are some of the pros of using Batch Shipyard:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些使用 Batch Shipyard 的优点：
- en: It is tied to Azure Batch infrastructure so it is well supported.
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它与 Azure Batch 基础设施相关联，因此得到了良好的支持。
- en: It is easy to use from the CLI and also available in the cloud shell.
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它可以通过 CLI 使用，也适用于云壳。
- en: It supports many different types of VMs, including GPUs.
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它支持许多不同类型的虚拟机，包括 GPU。
- en: It supports low-priority nodes, which makes it very efficient.
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它支持低优先级节点，这使得它非常高效。
- en: It has factory methods to support easy hyperparameter tuning.
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它具有工厂方法来支持简单的超参数调整。
- en: 'Among the disadvantages of using Batch Shipyard are the following:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 Batch Shipyard 的缺点包括以下：
- en: It is tied to Batch infrastructure, so there is no support for its own clusters.
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它与 Batch 基础设施相关联，因此没有对其自己的集群的支持。
- en: There is no REST API or web front end, only the CLI.
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 没有REST API或Web前端，只有CLI。
- en: Batch AI
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Batch AI
- en: 'Batch AI is very similar to Batch Shipyard, as it runs on Azure Batch and allows
    you to run various AI workloads. The core differences between Batch Shipyard and
    Batch AI are the following:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: Batch AI 与 Batch Shipyard 非常相似，因为它在 Azure Batch 上运行，并允许你运行各种人工智能工作负载。Batch Shipyard
    和 Batch AI 之间的核心差异如下：
- en: It is a managed service. This means that with Batch Shipyard the CLI is calling
    out to Azure Batch and setting everything up. With Batch AI there is a service
    in the cloud that we call to use the CLI, REST API, or SDK, and it orchestrates
    everything. In practice, this means is there is a far richer way to interact with
    Batch AI and it is easier to orchestrate as part of a pipeline.
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它是一个托管服务。这意味着使用 Batch Shipyard 时，CLI 正在调用 Azure Batch 并设置一切。使用 Batch AI 时，有一个云中的服务，我们称之为使用
    CLI、REST API 或 SDK，并编排一切。在实践中，这意味着有更丰富的与 Batch AI 交互的方式，并且作为管道的一部分更容易编排。
- en: Batch AI can execute on a DSVM or DLVM, giving it the ability to run things
    without containers. This makes it very easy to get started if you do not want
    to deal with the complexities of containers.
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Batch AI 可以在 DSVM 或 DLVM 上执行，这使得它能够在不处理容器复杂性的情况下运行。如果你不想处理容器的复杂性，这将非常容易上手。
- en: Batch AI provides specialized support for running distributed training on a
    number of deep learning frameworks such as PyTorch, TensorFlow, and so on. In
    practice, this means that some of the complexities such as setting up Message
    Passing Interface (MPI) are automatically configured by Batch AI.
  id: totrans-37
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Batch AI为在PyTorch、TensorFlow等众多深度学习框架上运行分布式训练提供了专门的支持。在实践中，这意味着一些复杂性，如设置消息传递接口（MPI），将由Batch
    AI自动配置。
- en: 'These are some of the pros of Batch AI:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是Batch AI的一些优点：
- en: It is a managed service.
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它是一个托管服务。
- en: It has multiple ways to interact with the CLI, SDK, and REST APIs.
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它有多种方式与CLI、SDK和REST API交互。
- en: It is tied to Azure Batch infrastructure so it is well supported.
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它绑定到Azure Batch基础设施，因此得到了很好的支持。
- en: It supports many different types of VM including GPUs.
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它支持许多不同类型的虚拟机，包括GPU。
- en: It supports low-priority nodes that are very cost-efficient.
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它支持低优先级的节点，这些节点非常经济高效。
- en: It can support DSVM and DLVM as computing targets.
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它可以支持DSVM和DLVM作为计算目标。
- en: 'The following are some of the disadvantages of using Batch AI:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些使用Batch AI的缺点：
- en: It does not have feature parity with Batch Shipyard. Batch Shipyard offers some
    nice methods for hyperparameter search that have not yet made their way to Batch
    AI.
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它与Batch Shipyard没有功能对等性。Batch Shipyard提供了一些用于超参数搜索的不错的方法，但这些方法尚未被引入Batch AI。
- en: It is still in previews and not available in all regions.
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它目前处于预览阶段，并非所有地区都可用。
- en: Deep Learning Workspace
  id: totrans-48
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 深度学习工作区
- en: Deep Learning Workspace (DLWorkspace) is an open source project from Microsoft
    that allows AI scientists to spin up clusters, either locally or in the cloud,
    in a turn-key fashion. DLWorkspace uses Kubernetes to manage the jobs across the
    various nodes. Kubernetes is a popular open source container orchestrator and
    we will talk more about it in Chapter [10](A463582_1_En_10_Chapter.html). DLWorkspace
    provides a web user interface (UI) and a REST API from which one can submit, monitor,
    and manage jobs. This is quite different from Batch AI and Batch Shipyard, as
    it does not rely on the Batch infrastructure to manage things, nor is it tied
    to the Azure infrastructure. This does mean it requires more management by the
    end user than the other two options, but it offers the greatest amount of flexibility.
    It is also less mature than the other two options.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习工作区（Deep Learning Workspace，DLWorkspace）是微软的一个开源项目，允许AI科学家以即插即用的方式启动集群，无论是本地还是云中。DLWorkspace使用Kubernetes来管理跨各个节点的作业。Kubernetes是一个流行的开源容器编排器，我们将在第[10](A463582_1_En_10_Chapter.html)章中详细介绍它。DLWorkspace提供了一个Web用户界面（UI）和REST
    API，用户可以通过这些接口提交、监控和管理作业。这与Batch AI和Batch Shipyard有很大不同，因为它不依赖于Batch基础设施来管理事物，也不绑定到Azure基础设施。这也意味着它比其他两种选项需要更多的用户管理，但它提供了最大的灵活性。它也比其他两种选项成熟度低。
- en: 'The following are some of the advantages of DLWorkspace :'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些DLWorkspace的优势：
- en: It is not tied to a particular infrastructure, so it can run on local clusters
    and in the cloud.
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它不依赖于特定的基础设施，因此可以在本地集群和云中运行。
- en: It uses Kubernetes, a well-known container orchestrator.
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它使用知名的容器编排器Kubernetes。
- en: 'Some of the disadvantages of DLWorkspace are as follows:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: DLWorkspace的一些缺点如下：
- en: It requires more setup than Batch Shipyard or Batch AI.
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它需要比Batch Shipyard或Batch AI更多的设置。
- en: It is harder to integrate into a pipeline.
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它更难集成到管道中。
- en: It is still under heavy development.
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它仍在积极开发中。
- en: Examples to Follow Along
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 沿用示例
- en: In many of the previous chapters we have demonstrated how to train a deep learning
    model on a GPU-enabled DLVM, so we do not go over that here. In the sections that
    immediately follow, we will be making use of the code we wrote in Chapter [6](A463582_1_En_6_Chapter.html),
    which used a VGG-like CNN to tackle the CIFAR10 data set, to expand to use Batch
    Shipyard and Batch AI. If you do not remember what we did there, it would be prudent
    to go back and refresh your memory.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 在许多前面的章节中，我们已经展示了如何在具有GPU的DLVM上训练深度学习模型，因此在这里不再赘述。在接下来的章节中，我们将使用我们在第[6](A463582_1_En_6_Chapter.html)章中编写的代码，该代码使用类似VGG的CNN来解决CIFAR10数据集，扩展到使用Batch
    Shipyard和Batch AI。如果您不记得我们当时做了什么，最好回去复习一下。
- en: Training DNN on Batch Shipyard
  id: totrans-59
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在Batch Shipyard上训练DNN
- en: In this section we go over general steps of how to train a CNN on Batch Shipyard.
    The steps that we follow to execute our AI script are detailed in the notebook
    `Chapter_09_01.ipynb`[²](#Fn2) and shown in Figure [9-2](#Fig2).
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将介绍如何在Batch Shipyard上训练CNN的一般步骤。我们执行AI脚本所遵循的步骤在笔记本`Chapter_09_01.ipynb`[²](#Fn2)中详细说明，并在图[9-2](#Fig2)中展示。
- en: '![A463582_1_En_9_Fig2_HTML.jpg](A463582_1_En_9_Fig2_HTML.jpg)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![A463582_1_En_9_Fig2_HTML.jpg](A463582_1_En_9_Fig2_HTML.jpg)'
- en: Figure 9-2
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-2
- en: The steps involved in running things on Batch Shipyard. (1) Create the necessary
    Azure resources, configuration files, and scripts. (2) Call pool create, which
    will start the process of creating our cluster. At the same time this will pull
    the script we created into the fileshare. It will also pull the Docker image and
    make it available to the nodes in the pool. (3) Tell Batch Shipyard to execute
    the job and detail the output. Once it is all done we will delete the job, cluster,
    and Azure resources.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Batch Shipyard 上运行所需步骤。（1）创建必要的 Azure 资源、配置文件和脚本。（2）调用 pool create，这将启动创建我们集群的过程。同时，这将把我们所创建的脚本拉入文件共享中。它还将拉取
    Docker 镜像，使其可供池中的节点使用。（3）告诉 Batch Shipyard 执行作业并详细说明输出。一旦所有操作完成，我们将删除作业、集群和 Azure
    资源。
- en: As you can see from the steps in Figure [9-2](#Fig2), there are a number of
    prerequisites required for training your model on Batch Shipyard. The script that
    will train your model.
  id: totrans-64
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如您从图 [9-2](#Fig2) 中的步骤中可以看到，在 Batch Shipyard 上训练您的模型需要满足一些先决条件。将训练您模型的脚本。
- en: The Docker container that contains all the dependencies for the script such
    as the deep learning framework, and so on.
  id: totrans-65
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 包含脚本所需所有依赖项的 Docker 容器，例如深度学习框架等。
- en: An Azure storage account and Azure Batch account.
  id: totrans-66
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Azure 存储账户和 Azure Batch 账户。
- en: Batch Shipyard configuration files. These can be either YAML or JSON files that
    will hold all the necessary information to define what we want Batch Shipyard
    to do for us .
  id: totrans-67
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Batch Shipyard 配置文件。这些可以是 YAML 或 JSON 文件，将包含定义我们想要 Batch Shipyard 为我们做什么的所有必要信息。
- en: Our model script will be very similar to what we wrote in the `Chapter_06_03.ipynb`
    notebook, except it will be a Python file rather than a Jupyter notebook and we
    will add the ability to pass arguments to it. The reason for doing this is to
    simplify the execution and so that we can see how the model performs with different
    hyperparameter configurations. This is usually referred to as hyperparameter search
    and it is an important step in creating AI models. The script will download the
    CIFAR10 data, create and train our model, and finally evaluate it on the test
    data set.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的模型脚本将与我们在 `Chapter_06_03.ipynb` 笔记本中写的非常相似，但它将是一个 Python 文件而不是 Jupyter 笔记本，并且我们将添加传递参数给它的能力。这样做的原因是为了简化执行过程，并且我们可以看到模型在不同超参数配置下的表现。这通常被称为超参数搜索，它是创建
    AI 模型的重要步骤。该脚本将下载 CIFAR10 数据，创建和训练我们的模型，并在测试数据集上对其进行评估。
- en: With the script prepared, we need to either create our own Docker image or reference
    a prebuilt one. Many of the most popular deep learning frameworks either provide
    you with a Docker image or at the very least a Dockerfile you can use to create
    your image. For people who have not used Docker before, this can be quite daunting.
    Thankfully there are a number of guides online and the Docker documentation is
    very good (see [`http://bit.ly/dockerstarted`](http://bit.ly/dockerstarted) `)`.
    Here we simply use the Docker image we created for this book.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 在脚本准备就绪后，我们需要创建自己的 Docker 镜像或引用预构建的一个。许多最受欢迎的深度学习框架要么提供 Docker 镜像，至少也提供 Dockerfile，您可以使用它来创建镜像。对于以前没有使用过
    Docker 的人来说，这可能相当令人畏惧。幸运的是，网上有许多指南，Docker 文档也非常好（见[http://bit.ly/dockerstarted](http://bit.ly/dockerstarted)）。在这里，我们只是使用为这本书创建的
    Docker 镜像。
- en: 'We will assume that you have created the Azure storage and Batch account. The
    steps for doing this are outlined in the “Create Azure Resources” section of the
    accompanying notebook. For Batch Shipyard there are four configuration files:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 我们假设您已经创建了 Azure 存储和 Batch 账户。创建这些账户的步骤在附带的笔记本的“创建 Azure 资源”部分中概述。对于 Batch Shipyard，有四个配置文件：
- en: '`credentials.yaml`: Here we put the credentials for all the resources we use.
    In our case it is simply the storage account and Batch account.'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`credentials.yaml`：在这里，我们放置我们使用的所有资源的凭证。在我们的例子中，它只是存储账户和 Batch 账户。'
- en: '`config.yaml`: Specifies the configuration for Batch Shipyard. Here we will
    simply specify which storage account to use as well as the location of the image
    we want to use.'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`config.yaml`：指定 Batch Shipyard 的配置。在这里，我们将简单地指定要使用的存储账户以及我们想要使用的镜像的位置。'
- en: '`pool.yaml`: This configuration file defines the properties of our pool, in
    essence the number of VMs we want to allocate and the types of VMs we wish to
    allocate.'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`pool.yaml`：此配置文件定义了我们的池属性，本质上是我们想要分配的虚拟机数量和我们希望分配的虚拟机类型。'
- en: '`jobs.yaml`: In this configuration file we specify the jobs we wish to execute.
    We can specify one or more jobs and each job can have one or more tasks. How you
    split things up will be dependent on the tasks you want to run and how much they
    share in common. In this file we generally specify what Docker image to use, where
    to ingress the data from, and what commands to execute. For more details see [`http://bit.ly/shipyardjobs`](http://bit.ly/shipyardjobs)
    .'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`jobs.yaml`: 在此配置文件中，我们指定要执行的任务。我们可以指定一个或多个任务，每个任务可以有一个或多个任务。如何划分将取决于您要运行的任务以及它们有多少共同之处。在此文件中，我们通常指定要使用哪个Docker镜像，从哪里导入数据，以及要执行哪些命令。更多详情请参阅[http://bit.ly/shipyardjobs](http://bit.ly/shipyardjobs)。'
- en: From here on in we will be assuming you are running things from a Linux terminal
    or a Jupyter notebook running on Linux. Now that we have defined our configuration
    files and our script, we need to create our cluster, which we do in Listing [9-1](#PC1).
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 从现在起，我们将假设您正在Linux终端或运行在Linux上的Jupyter笔记本中运行这些操作。现在我们已经定义了我们的配置文件和脚本，我们需要创建我们的集群，这将在列表[9-1](#PC1)中完成。
- en: '[PRE0]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: This command tells Batch Shipyard to create the pool as specified in our `pool.yaml`
    file located in the `config` directory. This will start the VMs and ingress any
    files we specified in the configuration files, which in our case is just our model
    script. Provisioning the pool can take from 5 to 15 minutes depending on the number
    of VMs specified. The number of VMs you can create is dependent on the quota on
    your Batch account. If you require more VMs for your Batch account, you can simply
    request a quota increase through the Azure portal ( [`http://bit.ly/azbatchquota`](http://bit.ly/azbatchquota)
    `)`.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 此命令告诉Batch Shipyard根据我们位于`config`目录中的`pool.yaml`文件中指定的配置创建池。这将启动虚拟机并导入我们在配置文件中指定的任何文件，在我们的例子中只是我们的模型脚本。配置池可能需要5到15分钟，具体取决于指定的虚拟机数量。您能创建的虚拟机数量取决于您的批量账户配额。如果您需要为您的批量账户更多的虚拟机，您可以通过Azure门户简单请求配额增加（[http://bit.ly/azbatchquota](http://bit.ly/azbatchquota)）。
- en: After the pool has been created, we simply add the jobs. Here in Listing [9-2](#PC2)
    we submit the job but also interactively tail the output of the task.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 在创建好池之后，我们只需添加任务。在此列表[9-2](#PC2)中，我们提交了任务，并且还交互式地跟踪了任务的输出。
- en: '[PRE1]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: If everything goes well you should start seeing the output being streamed to
    your notebook or terminal. The script will first download the CIFAR data, train
    the model, and evaluate it. You can also view the state of your cluster and job
    by visiting the Azure portal, where you should see something similar to Figure
    [9-3](#Fig3).
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 如果一切顺利，您应该开始看到输出被流式传输到您的笔记本或终端。脚本将首先下载CIFAR数据，训练模型，并评估它。您还可以通过访问Azure门户查看您的集群和作业的状态，在那里您应该看到类似于图[9-3](#Fig3)的内容。
- en: '![A463582_1_En_9_Fig3_HTML.jpg](A463582_1_En_9_Fig3_HTML.jpg)'
  id: totrans-81
  prefs: []
  type: TYPE_IMG
  zh: '![A463582_1_En_9_Fig3_HTML.jpg](A463582_1_En_9_Fig3_HTML.jpg)'
- en: Figure 9-3
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-3
- en: Batch dashboard in Azure portal
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: Azure门户中的批量仪表板
- en: By running Listing [9-3](#PC3), we stream the output of `stderr.txt`. This can
    be useful to review errors and debug our scripts.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 通过运行列表[9-3](#PC3)，我们流式传输`stderr.txt`的输出。这可以用来审查错误和调试我们的脚本。
- en: '[PRE2]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Once you are done with your job, it is best to delete it so it does not count
    against your active job quota, as we do in Listing [9-4](#PC4).
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦您完成了您的任务，最好删除它，以免它计入您的活动作业配额，正如我们在列表[9-4](#PC4)中所做的那样。
- en: '[PRE3]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Finally, delete your pool with the code shown in Listing [9-5](#PC5) so you
    do not incur charges for the VM while not in use.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，使用列表[9-5](#PC5)中显示的代码删除您的池，这样您在未使用时就不会产生虚拟机费用。
- en: '[PRE4]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: This seems like a lot of overhead for executing a single task, but when you
    need to execute a large number of tasks the initial overhead is tiny compared
    to the time saved.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 这似乎为执行单个任务带来了很多开销，但当您需要执行大量任务时，初始开销与节省的时间相比微不足道。
- en: Hyperparameter Tuning
  id: totrans-91
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 超参数调整
- en: Training an AI model or even any type of ML model requires tuning of various
    hyperparameters that constrain the behavior of our model. Doing so sequentially
    is laborious and time consuming. By running these experiments in parallel we can
    save a lot of time and find optimal configurations quicker. One of the key benefits
    of the cloud and the types of service such as Batch Shipyard and Batch AI is the
    ability to scale out our computing as needed. This means that we can explore large
    numbers of configurations and only pay for the computing we need, greatly accelerating
    the data science process.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 训练一个AI模型，甚至任何类型的机器学习模型，都需要调整各种超参数，这些超参数限制了我们的模型行为。按顺序进行这种调整既费时又费力。通过并行运行这些实验，我们可以节省大量时间，并更快地找到最佳配置。云服务和类似Batch
    Shipyard和Batch AI这样的服务的关键优势之一是能够根据需要扩展我们的计算能力。这意味着我们可以探索大量配置，并且只需为所需的计算付费，从而极大地加速数据科学过程。
- en: As mentioned earlier , Batch Shipyard offers a convenient way for generating
    hyperparameter tasks called Task Factories. With Task Factories we can generate
    task parameters in a number of ways such as from random distributions, uniform,
    gamma, beta, exponential, Gaussian, and so on.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，Batch Shipyard提供了一种方便的方式来生成超参数任务，称为任务工厂。使用任务工厂，我们可以以多种方式生成任务参数，例如从随机分布、均匀分布、伽马分布、贝塔分布、指数分布、高斯分布等。
- en: We would define our task factory in the `jobs.yaml` file. Let us imagine we
    wanted to parameterize our VGG architecture and explore the effects of learning
    rate on our model. We can achieve this with the task factory specification in
    Listing [9-6](#PC6).
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在`jobs.yaml`文件中定义我们的任务工厂。让我们假设我们想要参数化我们的VGG架构并探索学习率对我们模型的影响。我们可以通过任务工厂规范（见列表[9-6](#PC6)）来实现这一点。
- en: '[PRE5]'
  id: totrans-95
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: This block of YAML will instruct Batch Shipyard to sample 10 values randomly
    from a uniform distribution of 0.001 to 0.1 and run the `model.py` script.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 这段YAML代码将指导Batch Shipyard从0.001到0.1的均匀分布中随机采样10个值，并运行`model.py`脚本。
- en: Task factories are not limited to generating values from distributions; they
    can also generate tasks based on custom generators for more complex hyperparameter
    regimes. For more details on task factories, please check out [`http://bit.ly/shipyardtfactory`](http://bit.ly/shipyardtfactory)
    .
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 任务工厂不仅限于从分布中生成值；它们还可以根据自定义生成器生成任务，以适应更复杂的超参数环境。有关任务工厂的更多详细信息，请参阅[http://bit.ly/shipyardtfactory](http://bit.ly/shipyardtfactory)。
- en: Distributed Training
  id: totrans-98
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 分布式训练
- en: In the multinode, multi-GPU training scenario, Batch Shipyard handles the setting
    up of the cluster and distribution of the jobs but does not handle the communication
    between the nodes. This has to be handled by the deep learning frameworks themselves.
    Different frameworks use different protocols to pass information between them
    such as MPI (CNTK, Horovod) or gRPC (TensorFlow). It is important that the appropriate
    ports are opened and the appropriate processes are started, and this can differ
    between deep learning frameworks. In Batch Shipyard, such tasks are called multi-instance
    tasks and need to be specified as such in the jobs configuration file. An example
    configuration file can be seen in Listing [9-7](#PC7).
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 在多节点、多GPU训练场景中，Batch Shipyard负责设置集群和分配工作，但不处理节点之间的通信。这必须由深度学习框架本身来处理。不同的框架使用不同的协议在它们之间传递信息，例如MPI（CNTK、Horovod）或gRPC（TensorFlow）。确保打开适当的端口并启动适当的进程非常重要，这在不同深度学习框架之间可能有所不同。在Batch
    Shipyard中，这类任务被称为多实例任务，需要在工作配置文件中指定为这样的任务。一个示例配置文件可以在列表[9-7](#PC7)中看到。
- en: '[PRE6]'
  id: totrans-100
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: For a detailed walkthrough on how to perform data parallel training in Batch
    Shipyard, take a look at [`http://bit.ly/shipyarddist`](http://bit.ly/shipyarddist)
    .
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 要详细了解如何在Batch Shipyard中执行数据并行训练，请参阅[http://bit.ly/shipyarddist](http://bit.ly/shipyarddist)。
- en: Training CNNs on Batch AI
  id: totrans-102
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 在Batch AI上训练CNN
- en: Batch AI is in many ways very similar to Batch Shipyard (see Figure [9-4](#Fig4)).
    It offers a Python SDK as well as a CLI. In our example, we outline how to use
    the CLI because it is slightly easier than the SDK. All of the steps mentioned
    here are in the accompanying notebook, which you can use to run the example for
    yourself (`Chapter_09_02.ipynb`).
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 在许多方面，Batch AI与Batch Shipyard非常相似（见图[9-4]）。它提供Python SDK以及CLI。在我们的示例中，我们概述了如何使用CLI，因为它比SDK稍微容易一些。这里提到的所有步骤都在配套的笔记本中，您可以使用它来运行示例（`Chapter_09_02.ipynb`）。
- en: '![A463582_1_En_9_Fig4_HTML.jpg](A463582_1_En_9_Fig4_HTML.jpg)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
  zh: '![A463582_1_En_9_Fig4_HTML.jpg](A463582_1_En_9_Fig4_HTML.jpg)'
- en: Figure 9-4
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-4
- en: 'Batch AI training steps: (1) Create the necessary Zzure resources, job configuration
    files, and scripts, and upload scripts to fileshare. (2) Call cluster create,
    which will start the process of creating our cluster. It will also pull the Docker
    image and make it available to the nodes in the pool and mount the fileshare.
    (3) Run the command specified in the job configuration. Call job stream-file to
    tail the output from the job. Once training is done delete the job, cluster, and
    Azure resources.'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: Batch AI训练步骤：(1) 创建必要的Zzure资源、作业配置文件和脚本，并将脚本上传到文件共享。(2) 调用集群创建，这将启动创建我们集群的过程。它还将拉取Docker镜像并将其提供给池中的节点，并挂载文件共享。(3)
    运行作业配置中指定的命令。调用作业流文件以跟踪作业的输出。一旦训练完成，删除作业、集群和Azure资源。
- en: Batch AI uses the Azure CLI, which we installed earlier. To register for Batch
    AI run the code shown in Listing [9-8](#PC8).
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: Batch AI使用我们之前安装的Azure CLI。要注册Batch AI，请运行列表[9-8](#PC8)中显示的代码。
- en: '[PRE7]'
  id: totrans-108
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: At the time of writing, Batch AI was only available in the East US region, so
    that is where we will be creating all our resources. We are going to assume that
    you have already created a storage account and a fileshare, and have uploaded
    the script to the fileshare. These steps are in the accompanying notebook (`Chapter_09_02.ipynb`)
    under the sections “Create Azure Resources” and “Define Our Model.” To create
    our cluster, we run the code in Listing [9-9](#PC9).
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 在撰写本文时，Batch AI仅在东US区域可用，因此我们将在那里创建所有资源。我们假设您已经创建了一个存储账户和一个文件共享，并将脚本上传到了文件共享。这些步骤在附带的笔记本（`Chapter_09_02.ipynb`）中的“创建Azure资源”和“定义我们的模型”部分。要创建我们的集群，我们运行列表[9-9](#PC9)中的代码。
- en: '[PRE8]'
  id: totrans-110
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: All the values prefixed by `my` should be defined by you and wherever they are
    intended to should match the Azure resources you already created. In the preceding
    command, we used the [`az batchai cluster create`](https://docs.microsoft.com/en-us/cli/azure/batchai/cluster#az_batchai_cluster_create)
    command to create a Batch AI cluster called `my_cluster` consisting of a single
    GPU VM node. In this example, the VM runs the default Ubuntu LTS image. If you
    wish to use the DSVM as the execution target, simply specify `image UbuntuDSVM`
    instead. The VM specified is an NC6, which has one NVIDIA K80 GPU. We also tell
    it to mount the fileshare at a folder named `azurefileshare`. The full path of
    this folder on the GPU compute node is `$AZ_BATCHAI_MOUNT_ROOT/azurefileshare.
    AZ_BATCHAI_MOUNT_ROOT` is an environment variable that is set by Batch AI. Make
    sure that the storage account and fileshare information match what you created;
    otherwise the share will fail to mount and your nodes will become unusable.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 所有以`my`开头的前缀值都应该由您定义，并且它们应该与您已经创建的Azure资源相匹配。在前面的命令中，我们使用了`az batchai cluster
    create`([`az batchai cluster create`](https://docs.microsoft.com/en-us/cli/azure/batchai/cluster#az_batchai_cluster_create))命令来创建一个名为`my_cluster`的Batch
    AI集群，该集群由一个GPU VM节点组成。在这个例子中，虚拟机运行的是默认的Ubuntu LTS镜像。如果您希望使用DSVM作为执行目标，只需指定`image
    UbuntuDSVM`即可。指定的虚拟机是NC6，它配备了一个NVIDIA K80 GPU。我们还告诉它将文件共享挂载到一个名为`azurefileshare`的文件夹中。这个文件夹在GPU计算节点上的完整路径是`$AZ_BATCHAI_MOUNT_ROOT/azurefileshare`。`AZ_BATCHAI_MOUNT_ROOT`是一个由Batch
    AI设置的环境变量。请确保存储账户和文件共享信息与您创建的信息相匹配；否则，共享将无法挂载，您的节点将无法使用。
- en: Creating the pool will take a similar amount of time as Batch Shipyard, around
    5 to 15 minutes. To check the status of the cluster, simply run the code shown
    in Listing [9-10](#PC10).
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 创建池需要的时间与批量船坞相似，大约需要5到15分钟。要检查集群的状态，只需运行列表[9-10](#PC10)中显示的代码。
- en: '[PRE9]'
  id: totrans-113
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: To submit a job we have to create a configuration file in a similar way we did
    for Batch Shipyard. For our purposes the configuration file looks like the code
    in Listing [9-11](#PC11).
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 要提交作业，我们必须以与批量船坞类似的方式创建一个配置文件。对于我们来说，配置文件看起来像列表[9-11](#PC11)中的代码。
- en: '[PRE10]'
  id: totrans-115
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: For more examples , take a look at [`http://bit.ly/baistart`](http://bit.ly/baistart)
    . In the jobs configuration we define our `inputDirectories`, what container we
    want to use and the commands to execute. In the jobs definition you will notice
    that under `inputDirectories` we defined an input directory with the id script.
    This location gets mapped by Batch AI to the environment variable `AZ_BATCHAI_INPUT_SCRIPT`,
    which we refer to in the `commandLine` variable. Once we have created the job
    JSON file we execute the job by running the code in Listing [9-12](#PC12).
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 更多示例，请查看[http://bit.ly/baistart](http://bit.ly/baistart)。在作业配置中，我们定义了 `inputDirectories`、我们想要使用的容器以及要执行的命令。在作业定义中，您会注意到在
    `inputDirectories` 下，我们定义了一个带有 id 脚本的输入目录。此位置由 Batch AI 映射到环境变量 `AZ_BATCHAI_INPUT_SCRIPT`，我们在
    `commandLine` 变量中引用它。一旦我们创建了作业 JSON 文件，我们通过运行列表 [9-12](#PC12) 中的代码来执行作业。
- en: '[PRE11]'
  id: totrans-117
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: We can monitor the job by running the code in Listing [9-13](#PC13).
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过运行列表 [9-13](#PC13) 中的代码来监控作业。
- en: '[PRE12]'
  id: totrans-119
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: If you go to the Azure portal and click on the cluster you should see something
    similar to the image in Figure [9-5](#Fig5). The portal also provides other diagnostics
    such as the state of each job and the number of jobs in the resource group (see
    Figure [9-6](#Fig6) and Figure [9-7](#Fig7)). This is very convenient for long
    running jobs when you simply want to check on the state of things from any browser.
    The information you get from the portal with Batch AI is richer than what you
    get with Batch Shipyard.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您转到 Azure 门户并点击集群，您应该会看到类似于图 [9-5](#Fig5) 中的图像。门户还提供了其他诊断信息，例如每个作业的状态和资源组中的作业数量（见图
    [9-6](#Fig6) 和图 [9-7](#Fig7)）。这对于长时间运行的作业来说非常方便，当您只想从任何浏览器检查事物状态时。从门户中获取的 Batch
    AI 信息比从 Batch Shipyard 获取的更丰富。
- en: '![A463582_1_En_9_Fig7_HTML.jpg](A463582_1_En_9_Fig7_HTML.jpg)'
  id: totrans-121
  prefs: []
  type: TYPE_IMG
  zh: '![A463582_1_En_9_Fig7_HTML.jpg](A463582_1_En_9_Fig7_HTML.jpg)'
- en: Figure 9-7
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-7
- en: Information displayed in the portal for our resource group. Note that our cluster
    is called `gpupool` and the job `keras-training-job`; these are the names used
    in the example in the accompanying notebook.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 门户中显示的我们的资源组信息。请注意，我们的集群名为 `gpupool`，作业名为 `keras-training-job`；这些是在配套笔记本中的示例中使用的名称。
- en: '![A463582_1_En_9_Fig6_HTML.jpg](A463582_1_En_9_Fig6_HTML.jpg)'
  id: totrans-124
  prefs: []
  type: TYPE_IMG
  zh: '![A463582_1_En_9_Fig6_HTML.jpg](A463582_1_En_9_Fig6_HTML.jpg)'
- en: Figure 9-6
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-6
- en: Job dashboard for Batch AI
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: Batch AI 作业仪表板
- en: '![A463582_1_En_9_Fig5_HTML.jpg](A463582_1_En_9_Fig5_HTML.jpg)'
  id: totrans-127
  prefs: []
  type: TYPE_IMG
  zh: '![A463582_1_En_9_Fig5_HTML.jpg](A463582_1_En_9_Fig5_HTML.jpg)'
- en: Figure 9-5
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-5
- en: Batch AI cluster dashboard in the Azure portal
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: Azure 门户中的 Batch AI 集群仪表板
- en: To tail the output of `stdout` in the same way we did for Batch Shipyard, we
    simply run the code in Listing [9-14](#PC14).
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 要以与我们在 Batch Shipyard 中相同的方式跟踪 `stdout` 的输出，我们只需运行列表 [9-14](#PC14) 中的代码。
- en: '[PRE13]'
  id: totrans-131
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Once the job is completed, to delete the job we run the code in Listing [9-15](#PC15).
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 作业完成后，要删除作业，我们运行列表 [9-15](#PC15) 中的代码。
- en: '[PRE14]'
  id: totrans-133
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Now we delete the cluster with the code in Listing [9-16](#PC16) so that we
    stop incurring any charges for computing.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们通过运行列表 [9-16](#PC16) 中的代码来删除集群，这样我们就不会继续产生计算费用。
- en: '[PRE15]'
  id: totrans-135
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: Then finally if we don’t want to keep the storage account and the other resources
    we created we can clear it all up by executing the code in Listing [9-17](#PC17).
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，如果我们不想保留我们创建的存储帐户和其他资源，我们可以通过执行列表 [9-17](#PC17) 中的代码来清除所有内容。
- en: '[PRE16]'
  id: totrans-137
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Hyperparameter Tuning and Distributed Training
  id: totrans-138
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: Hyperparameter Tuning and Distributed Training
- en: Hyperparameter tuning in Batch AI is not yet as simple as it is in Batch Shipyard.
    There is no notion of task factories, so it requires that we create a number of
    jobs where we pass different parameters to our model. In our jobs example, therefore,
    the JSON file would be very similar between our jobs, the only difference being
    the command, and specifically the arguments we pass to the script. The process
    of hyperparameter tuning can be made easier by using the Batch AI Python SDK rather
    than the CLI. Have a look at [`http://bit.ly/baitsdk`](http://bit.ly/baitsdk)
    for further details on the Python SDK.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Batch AI 中进行超参数调整不如在 Batch Shipyard 中简单。没有任务工厂的概念，因此我们需要创建多个作业，向我们的模型传递不同的参数。因此，在我们的作业示例中，JSON
    文件在作业之间非常相似，唯一的区别是命令，特别是我们传递给脚本的参数。使用 Batch AI Python SDK 而不是 CLI 可以使超参数调整过程变得更简单。有关
    Python SDK 的更多详细信息，请查看[http://bit.ly/baitsdk](http://bit.ly/baitsdk)。
- en: Distributed training is slightly easier in Batch AI than Batch Shipyard for
    frameworks supported by Batch AI because Batch AI takes care of configuring the
    necessary internode communication layer such as MPI. At the time of writing, the
    frameworks supported are Chainer, CNTK, TensorFlow, PyTorch, and Caffe2\. For
    frameworks that are not supported, it is up to the user to supply the appropriate
    configuration and will be the same as Batch Shipyard. For examples on how to do
    this, see [`http://bit.ly/bairecipes`](http://bit.ly/bairecipes) .
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 对于批处理AI支持的框架来说，在批处理AI中进行分布式训练比在批处理船坞中要稍微容易一些，因为批处理AI负责配置必要的节点间通信层，如MPI。在撰写本文时，支持的框架包括Chainer、CNTK、TensorFlow、PyTorch和Caffe2。对于不受支持的框架，用户需要提供适当的配置，将与批处理船坞相同。有关如何操作的示例，请参阅[`http://bit.ly/bairecipes`](http://bit.ly/bairecipes)。
- en: Variation of Batch AI with Python SDK
  id: totrans-141
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 使用Python SDK的批处理AI变体
- en: In the earlier example, we illustrated using Batch AI with the Azure CLI, which
    is the easiest way to get started. Batch AI can also be used through a Python
    SDK. The demo example described in this section can be reproduced following the
    instructions given at [`http://bit.ly/deepbait`](http://bit.ly/deepbait) . In
    this example, rather than showcasing an example of hyperparameter tuning or distributed
    training for which there are already examples, nine different deep learning frameworks
    are used to train a simple CNN on the CIFAR10 data set. In practice, being able
    to quickly utilize different frameworks can be very useful because state-of-the-art
    implementations of certain models might only be available in one or a small number
    of frameworks. Often, though, one would select a single framework and use that
    framework to do hyperparameter tuning or distributed training as described in
    this chapter. However, this example also serves the pedagogical purpose of showcasing
    the flexibility of the Batch AI service as well as different ways one might interact
    with the service.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 在早期的例子中，我们展示了使用Azure CLI与批处理AI结合使用，这是开始使用批处理AI的最简单方法。批处理AI也可以通过Python SDK使用。本节中描述的演示示例可以按照在[`http://bit.ly/deepbait`](http://bit.ly/deepbait)给出的说明进行重现。在这个例子中，我们不是展示超参数调整或分布式训练的示例，而是使用九个不同的深度学习框架在CIFAR10数据集上训练一个简单的CNN。在实际应用中，能够快速利用不同的框架可能非常有用，因为某些模型的最先进实现可能只存在于一个或少数几个框架中。然而，通常人们会选择一个单一的框架，并使用该框架进行本章所述的超参数调整或分布式训练。然而，这个例子也具有教学目的，展示了批处理AI服务的灵活性以及与该服务交互的不同方式。
- en: In this example, the project was developed and tested on an Azure Ubuntu DLVM.
    Anaconda Project is used in this case to create the environment and install dependencies,
    download the data, and allow the user to interact with the project in a straightforward
    manner to reproduce the demo, such as asking through a command-line prompt for
    the Azure subscription identifier and name of the resource group in which the
    Batch AI cluster should be created. The project also comes with makefiles to help
    with local testing and debugging to allow one to more easily modify the project.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，项目是在Azure Ubuntu DLVM上开发和测试的。在这种情况下使用Anaconda项目来创建环境、安装依赖项、下载数据，并允许用户以简单的方式与项目交互，以重现演示，例如通过命令行提示符请求Azure订阅标识符和应创建批处理AI集群的资源组名称。该项目还附带makefiles，以帮助进行本地测试和调试，从而更容易修改项目。
- en: This example also differs from the earlier Batch AI example in the use of Jupyter
    Notebooks, which are sent directly to the Batch AI cluster rather than Python
    scripts, as illustrated in Figure [9-8](#Fig8). Using Jupyter Notebooks directly,
    the code can be processed and output stored directly within the notebooks. This
    is useful for data scientists already developing within Jupyter Notebooks who
    would like to showcase results through them (e.g., visualizations created during
    or after processing). In this case, nine different Jupyter notebooks are created
    (one for each of the deep learning frameworks), along with associated Docker containers
    within which the notebooks are run using Batch AI.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 这个例子也与早期的批处理AI示例在Jupyter Notebooks的使用上有所不同，如图[9-8](#Fig8)所示，Jupyter Notebooks是直接发送到批处理AI集群，而不是Python脚本。直接使用Jupyter
    Notebooks，代码可以在笔记本内直接处理和存储输出。这对于已经在Jupyter Notebooks中开发的数据科学家来说很有用，他们希望通过这些笔记本展示结果（例如，在处理过程中或之后创建的可视化）。在这种情况下，创建了九个不同的Jupyter笔记本（每个深度学习框架一个），以及相关的Docker容器，笔记本在这些容器中使用批处理AI运行。
- en: '![A463582_1_En_9_Fig8_HTML.jpg](A463582_1_En_9_Fig8_HTML.jpg)'
  id: totrans-145
  prefs: []
  type: TYPE_IMG
  zh: '![A463582_1_En_9_Fig8_HTML.jpg](A463582_1_En_9_Fig8_HTML.jpg)'
- en: Figure 9-8
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-8
- en: Rather than having to run Jupyter Notebooks in sequence to test different options,
    they can be executed in parallel using Batch AI
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是必须按顺序运行 Jupyter Notebooks 来测试不同的选项，它们可以使用 Batch AI 并行执行。
- en: Each of the notebooks was written to have parameters that can be modified when
    they are run on the Batch AI cluster. In the example project for illustrative
    purposes, the number of epochs that are run are modified from the original file
    when they are run on Batch AI. Specifically, the original notebooks that are sent
    to the cluster have the following parameters in Listing [9-18](#PC18) at the top
    of the notebook as examples.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 每个笔记本都编写了可以在 Batch AI 集群上运行时修改的参数。在示例项目中，为了说明目的，运行时修改了原始文件中的 epoch 数量。具体来说，发送到集群的原始笔记本在笔记本顶部有如下参数作为示例，列于
    [9-18](#PC18)。
- en: '[PRE17]'
  id: totrans-149
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: 'In the job submission, the Batch AI cluster is told in this case to modify
    the number of epochs to run (as just one example of a parameter change), and the
    notebook is modified and run with a different number of epochs. At the end of
    the run, the notebook contains a cell with all of the parameters it was run with,
    as well as the output from each cell running stored within the notebook itself.
    This makes it easy to look through the results: All of the important information
    is stored right within the notebook.'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 在作业提交中，Batch AI 集群被指示在这个例子中修改要运行的 epoch 数量（作为参数更改的一个示例），笔记本被修改并使用不同的 epoch 数量运行。运行结束后，笔记本包含一个包含所有运行参数的单元格，以及笔记本本身存储的每个单元格的输出。这使得查看结果变得容易：所有重要信息都存储在笔记本中。
- en: The steps followed to use nine different deep learning frameworks to run a simple
    CNN are as follows, illustrated in Figure [9-9](#Fig9).
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 使用九种不同的深度学习框架运行简单 CNN 所遵循的步骤如下，如图 [9-9](#Fig9) 所示。
- en: Create Jupyter notebooks to run on Batch AI and transfer them to file storage.
  id: totrans-152
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建在 Batch AI 上运行的 Jupyter notebooks 并将其传输到文件存储。
- en: Write the data to file storage.
  id: totrans-153
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将数据写入文件存储。
- en: Create the Docker containers for each deep learning framework and transfer them
    to a container registry.
  id: totrans-154
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为每个深度学习框架创建 Docker 容器并将它们传输到容器注册库。
- en: Create a Batch AI Pool.
  id: totrans-155
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建一个 Batch AI 集群。
- en: Each job will pull in the appropriate container and notebook, and load data
    from the fileshare.
  id: totrans-156
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 每个作业都会拉取适当的容器和笔记本，并从文件共享加载数据。
- en: Once the job is completed the executed notebook will be written to the fileshare.
  id: totrans-157
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 作业完成后，执行笔记本将被写入文件共享。
- en: These steps are very similar to those described before in using Batch AI with
    the CLI, only with Jupyter Notebooks. Besides the parallel processing ability
    that allows for a reduction in the experimentation time enabled through Batch
    AI, this scenario also illustrates the power of cloud computing in that many machines
    can be spun up on demand, used for the processing they are needed for, and then
    the cluster can be shut down. This provides the data scientist more flexibility
    at a large reduction in cost, with no special hardware to procure or systems to
    manage.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 这些步骤与之前在 CLI 中使用 Batch AI 描述的步骤非常相似，只是这次是在 Jupyter Notebooks 中使用。除了通过 Batch
    AI 实现的并行处理能力，可以减少实验时间外，这个场景还展示了云计算的强大之处，即可以根据需求启动多台机器，用于所需的处理，然后关闭集群。这为数据科学家提供了更大的灵活性，同时大幅降低了成本，无需采购特殊硬件或管理系统。
- en: '![A463582_1_En_9_Fig9_HTML.jpg](A463582_1_En_9_Fig9_HTML.jpg)'
  id: totrans-159
  prefs: []
  type: TYPE_IMG
  zh: '![A463582_1_En_9_Fig9_HTML.jpg](A463582_1_En_9_Fig9_HTML.jpg)'
