- en: Part IIIIntroducing Machine Learning
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 13. What Is Machine Learning?
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Machine learning as a field grew out of the need to get computers to solve problems
    that are difficult to program as a sequence of instructions. Take, for example,
    that we want a computer to perform the task of recognizing faces in an image.
    One will realize that it is incredibly complicated, if not impossible to develop
    a precise instruction set that will satisfactorily perform this task. However,
    by drawing from the observation that humans improve on performing complex functions
    from past experiences, we can then attempt to develop algorithms and methods that
    enable the computer to establish a system for solving complex tasks based off
    prior experiences without being explicitly programmed. The set of methods and
    algorithms for discovering patterns in data is what is known as machine learning.
  prefs: []
  type: TYPE_NORMAL
- en: Two classical definitions of machine learning are that of Arthur Samuel in 1956
    who described machine learning as “the ability for computers to learn without
    being explicitly programmed” and Tom Mitchell in 1997 who defined machine learning
    as "the process of teaching a computer to perform a particular task by improving
    its measure of performance with experience.”
  prefs: []
  type: TYPE_NORMAL
- en: Machine learning is an interdisciplinary field of study that brings together
    techniques from the fields of computer science, statistics, mathematics, and the
    cognitive sciences which include biology, psychology, and linguistics, to mention
    just a few. While the idea of learning from data has been around the academic
    community for several decades, its entry into the mainstream technology industry
    began in the early 2000s. This growth coincided with the rise of humongous data
    as a result of the web explosion as people started sharing data over the Internet.
  prefs: []
  type: TYPE_NORMAL
- en: The Role of Data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Data is at the core of machine learning. It is central to the current evolution
    and further advancement of this field. Just as it is for humans, it is the same
    way for machines. Learning is not possible without data.
  prefs: []
  type: TYPE_NORMAL
- en: Humans learn how to perform tasks by collecting information from the Environment.
    This information is the data the brain uses to construct patterns and gain an
    understanding of the Environment. For a human being, data is captured through
    the sense organs. For example, the eyes capture visual data, the ears capture
    auditory data, the skin receives tactile data, while the nose and tongue detect
    olfactory and taste data, respectively.
  prefs: []
  type: TYPE_NORMAL
- en: As with humans, this same process of learning from data is replicated with machines.
    Let’s take, for example, the task of identifying spam emails. In this example,
    the computer is provided email examples as data. It then uses an algorithm to
    learn to distinguish spam emails from regular emails.
  prefs: []
  type: TYPE_NORMAL
- en: The Cost of Data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Data is expensive to collect, and high-quality data is even more costly to capture
    due to the associated costs in storing and cleaning the data. Over the years,
    the paucity of data had limited the performance of machine learning methods. However,
    in the early 1990s, the Internet was born, and by the dawn of the century, it
    became a super highway for data distribution. As a result, large and diverse data
    became readily available for the research and development of machine learning
    products across various domains.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we covered the definition and history of machine learning and
    the importance of data. Next, we will take it further by discussing the principles
    of machine learning in Chapter [14](463852_1_En_14_Chapter.xhtml).
  prefs: []
  type: TYPE_NORMAL
- en: 14. Principles of Learning
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Machine learning is, for the most part, sub-divided into three components based
    on the approach to the learning problem. The three predominant categories of learning
    are the supervised, unsupervised, and reinforcement learning schemes. In this
    chapter, we will go over supervised learning schemes in detail and also touch
    upon unsupervised and reinforcement learning schemes to a lesser extent.
  prefs: []
  type: TYPE_NORMAL
- en: The focus on supervised learning is for a variety of reasons. Firstly, they
    are the predominant techniques used for building machine learning products in
    industry; secondly, as you will soon learn, they are easy to ground truth and
    assess their performances before being deployed as part of a large-scale production
    pipeline. Let’s examine each of the three schemes.
  prefs: []
  type: TYPE_NORMAL
- en: Supervised Learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To easily understand the concept of supervised learning, let’s revisit the problem
    of identifying spam emails from a set of emails. We will use this example to understand
    key concepts that are central to the definition and the framing of a supervised
    learning problem, and they are
  prefs: []
  type: TYPE_NORMAL
- en: Features
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Samples
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Targets
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For this contrived example, let’s assume that we have a dictionary of the top
    4 words in the set of emails and we record the frequency of occurrence for each
    email sample. This information is represented in a tabular format, where each
    feature is a column and the rows are email samples. This tabular representation
    is called a dataset. Figure [14-1](#Fig1) illustrates this depiction.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_14_Chapter/463852_1_En_14_Fig1_HTML.jpg](../images/463852_1_En_14_Chapter/463852_1_En_14_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 14-1
  prefs: []
  type: TYPE_NORMAL
- en: Dataset representation
  prefs: []
  type: TYPE_NORMAL
- en: The fundamental concept behind supervised machine learning is that each sample
    is associated with a target variable, and the goal is to teach the computer to
    learn the patterns from the dataset features that results in a target as a prediction
    outcome. The columns of a dataset in machine learning are referred to as features;
    other names you may find commonly used are **variables** or **attributes** of
    the dataset, but in this book, we will use the term features to describe the measurement
    units of a data sample. Moreover, the samples of a dataset are also referred to
    as rows, data points, or observations, but we will use the term samples throughout
    this book.
  prefs: []
  type: TYPE_NORMAL
- en: Hence, in supervised learning, a set of features are used to build a learning
    model that will predict the outcome of a target variable as shown in Figure [14-1](#Fig1).
  prefs: []
  type: TYPE_NORMAL
- en: Next, we will cover important modeling considerations for building supervised
    learning models.
  prefs: []
  type: TYPE_NORMAL
- en: Regression vs. Classification
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In supervised learning, we typically have two types of modeling task, and they
    are **regression** and **classification**.
  prefs: []
  type: TYPE_NORMAL
- en: Regression
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The supervised learning problem is a regression task when the values of the
    target variable are real-valued numbers.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s take, for example, that we are given a housing dataset and are asked to
    build a model that can predict the price of a house. The dataset, for example,
    has features such as the price of the house, the number of bedrooms, the number
    of bathrooms, and the total square feet. Let’s illustrate how this dataset will
    look like with a contrived example in Figure [14-2](#Fig2).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_14_Chapter/463852_1_En_14_Fig2_HTML.jpg](../images/463852_1_En_14_Chapter/463852_1_En_14_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 14-2
  prefs: []
  type: TYPE_NORMAL
- en: 'Regression problem: housing dataset'
  prefs: []
  type: TYPE_NORMAL
- en: From the learning problem, the features of the dataset are the number of bedrooms,
    the number of bathrooms, and the square foot of the floor area, while the target
    feature is the price of the house. The use case presented in Figure [14-3](#Fig3)
    is framed as a **regression task** because the target feature is a **real-valued
    number**.
  prefs: []
  type: TYPE_NORMAL
- en: Classification
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: In a classification task, the target feature is a label denoting some sort of
    class membership. These labels are also called categorical variables, because
    they represent labels that belong to two or more categories. Also, no natural
    ordering exists between the categories or labels.
  prefs: []
  type: TYPE_NORMAL
- en: As an example, suppose we are given a dataset containing the heart disease diagnosis
    of patients, and we are asked to build a model to predict if a patient has a heart
    disease or not. Like the previous example, let’s assume the dataset has features
    blood pressure, cholesterol level, heart rate, and heart disease diagnosis. A
    contrived illustration of this example is shown in Figure [14-3](#Fig3).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_14_Chapter/463852_1_En_14_Fig3_HTML.jpg](../images/463852_1_En_14_Chapter/463852_1_En_14_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 14-3
  prefs: []
  type: TYPE_NORMAL
- en: 'Classification task: heart disease dataset'
  prefs: []
  type: TYPE_NORMAL
- en: From the table in Figure [14-3](#Fig3), the **target variable denotes a class
    membership of heart disease or no heart disease**; hence, the target is categorical
    and can be termed as a **classification problem**.
  prefs: []
  type: TYPE_NORMAL
- en: How Do We Know that Learning Has Occurred?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This question is vital to determine if the learning algorithm can learn a useful
    pattern between the input features and the targets. Let’s create a scenario that
    will give us better insights into appraising the question of determining when
    learning has occurred.
  prefs: []
  type: TYPE_NORMAL
- en: Assume a teacher takes a physics class for 3 months, and at the end of each
    session, the teacher administers a test to ascertain if the student has learned
    anything.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s consider two different scenarios the teacher might use in evaluating
    the students:'
  prefs: []
  type: TYPE_NORMAL
- en: The teacher evaluates the student with the exact word-for-word questions that
    were used as sample problems while teaching.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The teacher evaluates the student with an entirely different but similar set
    of sample problems that are based on the principles taught in class.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In which of these subplots can the teacher ascertain that the student has learned?
    To figure this out, we must consider the two norms of learning:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Memorization: In the first subplot, it will be incorrect for the teacher to
    form a basis for learning because the student has seen and most likely memorized
    the examples during the class sessions. Memorization is when the exact snapshot
    of a sample is stored for future recollection. Therefore, it is inaccurate to
    use samples used in training to carry out learning evaluation. In machine learning,
    this is known as *data snooping*.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Generalization: In the second subplot, the teacher can be confident that the
    assessment serves as an accurate test to evaluate if the student has learned from
    the session. The ability to use the principles learned to solve previously unseen
    samples is known as *generalization*.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Hence, we can conclude that learning is the ability to generalize to previously
    unseen samples.
  prefs: []
  type: TYPE_NORMAL
- en: Training, Test, and Validation Datasets
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The goal of supervised machine learning is to be able to predict or classify
    the targets on unseen examples correctly. We can misjudge the performance of our
    learning models if we evaluate the model performance with the same samples used
    to train the model as explained previously.
  prefs: []
  type: TYPE_NORMAL
- en: To properly evaluate the performance of a learning algorithm, we need to set
    aside some data for testing purposes. This held-out data is called a **test set**
    .
  prefs: []
  type: TYPE_NORMAL
- en: Another situation arises when we have trained the model on a dataset, and we
    now need to improve the performance of the model by adjusting some of the learning
    algorithm’s parameters.
  prefs: []
  type: TYPE_NORMAL
- en: We cannot use the test set for model tuning because if we do that, the model’s
    parameters are trained with the test dataset rendering it unusable as an unseen
    held-out sample for model evaluation. Hence, it is typical to divide the entire
    dataset into
  prefs: []
  type: TYPE_NORMAL
- en: The training set (to train the model)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The validation set (to tune the model)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The test set (to evaluate the effectiveness of the model)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A common and straightforward strategy is to split 60% of the dataset for training,
    20% for validation, and the final 20% for testing. This strategy is popularly
    known as the 60/20/20 rule. We will discuss more sophisticated methods for resampling
    (i.e., using subsets of available data) for machine learning later in this chapter.
    See Figure [14-4](#Fig4).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_14_Chapter/463852_1_En_14_Fig4_HTML.jpg](../images/463852_1_En_14_Chapter/463852_1_En_14_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 14-4
  prefs: []
  type: TYPE_NORMAL
- en: Training, test, and validation set
  prefs: []
  type: TYPE_NORMAL
- en: Bias vs. Variance Trade-Off
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The concept of bias vs. variance is central to machine learning and is critical
    to understanding how the model is performing, as well as in suggesting the direction
    in which to improve the model.
  prefs: []
  type: TYPE_NORMAL
- en: A model is said to have high **bias** when it oversimplifies the learning problem
    or when the model fails to accurately capture the complex relationships that exist
    between the input features of the dataset. High bias makes the model unable to
    generalize to new examples.
  prefs: []
  type: TYPE_NORMAL
- en: '**High variance** , on the other hand, is when the model learns too closely
    the intricate patterns of the dataset input features, and in the process, it *learns
    the irreducible noise of the dataset samples*. When the learning algorithm learns
    very closely the patterns of the training samples, including the noise, it will
    fail to generalize when exposed to previously unseen data.'
  prefs: []
  type: TYPE_NORMAL
- en: Hence, we observe that there is a need to strike the right balance between bias
    and variance, and often it is down to the skill of the model builder to discover
    this middle ground. However, there exists practical rules of thumb for finding
    the right trade-off between bias and variance.
  prefs: []
  type: TYPE_NORMAL
- en: How Do We Recognize the Presence of Bias or Variance in the Results?
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: High bias is observed when the model performs poorly on the trained data. Of
    course, it will also perform poorly (or even worse) on the test data with high
    prediction errors. When high bias occurs, it can be said that the model has underfit
    the data. High variance is observed when the trained model learns the training
    data very well but performs poorly on unseen (test) data. In the event of high
    variance, we can say that the model has overfit the dataset.
  prefs: []
  type: TYPE_NORMAL
- en: The graph in Figure [14-5](#Fig5) illustrates the effect of bias and variance
    on the quality/performance of a machine learning model. In Figure [14-6](#Fig6),
    the reader will observe that there is a sweet spot somewhere in the middle where
    the model has good performances on both the training and the test datasets.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_14_Chapter/463852_1_En_14_Fig5_HTML.jpg](../images/463852_1_En_14_Chapter/463852_1_En_14_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 14-5
  prefs: []
  type: TYPE_NORMAL
- en: Bias and variance
  prefs: []
  type: TYPE_NORMAL
- en: To recap, our goal is to have a model that strikes a balance between high bias
    and high variance. Figure [14-6](#Fig6) provides further illustration on the effects
    of models with high bias and variance on a dataset. As seen in the image to the
    left of Figure [14-6](#Fig6), we want to have a model that can generalize to previously
    unseen example, such a model should have good prediction accuracy.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_14_Chapter/463852_1_En_14_Fig6_HTML.png](../images/463852_1_En_14_Chapter/463852_1_En_14_Fig6_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 14-6
  prefs: []
  type: TYPE_NORMAL
- en: '***Left:*** Good fit. ***Center:*** Underfit (high bias). ***Right:*** Overfit
    (high variance)'
  prefs: []
  type: TYPE_NORMAL
- en: Evaluating Model Quality
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Evaluation metrics give us a way to quantitatively evaluate how well our model
    is performing. The model’s performance on the training data is evaluated to get
    the training set accuracy, while its performance on the test data is evaluated
    to get the test data accuracy when the model predicts the targets of previously
    unseen examples. Evaluation on test data helps us to know the true performance
    measure of our model.
  prefs: []
  type: TYPE_NORMAL
- en: The learning problem determines the type of evaluation metric to use. As an
    example, for regression prediction problems, it is common to use the root mean
    squared error (RMSE) to evaluate the magnitude of the error made by the model.
    For classification problems, one of the common evaluation metrics is to use a
    confusion matrix to get a picture of how many samples are correctly classified
    or misclassified. From the confusion matrix, it is possible to derive other useful
    metrics for evaluating classification problems such as accuracy, precision, and
    recall.
  prefs: []
  type: TYPE_NORMAL
- en: 'The following are the evaluation metrics for machine learning that we will
    consider in this text:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Classification**'
  prefs: []
  type: TYPE_NORMAL
- en: Confusion matrix
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Area under ROC curve (AUC-ROC)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Regression**'
  prefs: []
  type: TYPE_NORMAL
- en: Root mean squared error (RMSE)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: R-squared (*R*²)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s go through each.
  prefs: []
  type: TYPE_NORMAL
- en: Classification Evaluation Metrics
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: In this section, we’ll briefly explain performance metrics for classification
    machine learning tasks.
  prefs: []
  type: TYPE_NORMAL
- en: Confusion Matrix
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: The confusion matrix is a popular evaluation metric for gleaning insights into
    the performance of a classification supervised machine learning model. It is represented
    as a table with grid-like cells. In the case of a two-class classification problem,
    the columns of the grid are the actual positive and negative class values of the
    target feature, while the rows are the predicted positive and negative class values
    of the targets. This is illustrated in Figure [14-7](#Fig7).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_14_Chapter/463852_1_En_14_Fig7_HTML.jpg](../images/463852_1_En_14_Chapter/463852_1_En_14_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 14-7
  prefs: []
  type: TYPE_NORMAL
- en: Confusion matrix
  prefs: []
  type: TYPE_NORMAL
- en: 'There are four primary values that can be gotten directly from examining the
    confusion matrix, and they are the ***true positive***, the ***false positive***,
    the ***true negative***, and the ***false negative*** *values*. Let’s examine
    each of them briefly:'
  prefs: []
  type: TYPE_NORMAL
- en: 'True positive: True positive is the number of samples predicted to be positive
    (or true) when the actual class is positive.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'False positive: False positive is the number of samples predicted as positive
    (or true) when the actual class is negative.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'True negative: True negative is the number of samples predicted to be negative
    (or false) and the actual class is negative.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'False negative: False negative is the number of samples predicted to be negative
    (or false) when the actual class is positive.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'From the four primary values, we have three other measures that provide more
    information on the performance of our model. These are accuracy, the positive
    predictive value (or precision), and sensitivity (or recall). Let’s explain them
    briefly:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Accuracy: Accuracy is the fraction of correct predictions made by the learning
    algorithm. It is represented as the ratio of the sum of true positive, *TP*, and
    true negative, *TN*, to the total population.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![$$ accuracy=\frac{TP+ TN}{TP+ FP+ FN+ TN} $$](../images/463852_1_En_14_Chapter/463852_1_En_14_Chapter_TeX_Equa.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Precision or positive predictive value: Precision is the ratio of true positive,
    *TP*, to the sum of true positive, *TP*, and false positive, *FP*. In other words,
    precision measures the fraction of results that are correctly predicted as positive
    over all the results that the algorithm predicts as positive. The sum *TP* + *FP*
    is also called the predicted positive condition.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![$$ precision=\frac{TP}{TP+ FP} $$](../images/463852_1_En_14_Chapter/463852_1_En_14_Chapter_TeX_Equb.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Recall or sensitivity: Recall is the ratio of true positive, *TP*, to the sum
    of true positive, *TP*, and false negative, *FN*. In other words, recall retrieves
    the fraction of results that are correctly predicted as positive over all the
    results that are positive. The sum *TP* + *FN* is also known as condition positive.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![$$ recall=\frac{TP}{TP+ FN} $$](../images/463852_1_En_14_Chapter/463852_1_En_14_Chapter_TeX_Equc.png)'
  prefs: []
  type: TYPE_IMG
- en: To put this concept together, let’s revisit the example heart disease dataset.
    Suppose we are to predict if a patient will be diagnosed with a heart disease
    or not, assume we have 50 samples in the dataset, of which 20 are diagnosed with
    heart disease and the remaining 30 are not. Of the 30 samples that do not have
    a disease diagnosis, the learning algorithm rightly identifies 25, while of the
    20 samples that have a disease diagnosis, the learning algorithm correctly identifies
    15.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s represent this information in a confusion matrix (see Figure [14-8](#Fig8))
    and calculate the necessary statistical measures to evaluate the algorithm performance.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_14_Chapter/463852_1_En_14_Fig8_HTML.jpg](../images/463852_1_En_14_Chapter/463852_1_En_14_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 14-8
  prefs: []
  type: TYPE_NORMAL
- en: Confusion matrix example
  prefs: []
  type: TYPE_NORMAL
- en: From the data in Figure [14-8](#Fig8), we can calculate the ***accuracy***,
    ***precision***, and ***recall***.
  prefs: []
  type: TYPE_NORMAL
- en: Accuracy =
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![$$ \frac{15+25}{15+5+5+25}=\frac{40}{50}=\frac{4}{5} $$](../images/463852_1_En_14_Chapter/463852_1_En_14_Chapter_TeX_Equd.png)'
  prefs: []
  type: TYPE_IMG
- en: Precision =
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![$$ \frac{15}{15+5}=\frac{3}{4} $$](../images/463852_1_En_14_Chapter/463852_1_En_14_Chapter_TeX_Eque.png)'
  prefs: []
  type: TYPE_IMG
- en: Recall =
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![$$ \frac{15}{15+5}=\frac{3}{4} $$](../images/463852_1_En_14_Chapter/463852_1_En_14_Chapter_TeX_Equf.png)'
  prefs: []
  type: TYPE_IMG
- en: Hence, our algorithm is 80% accurate, with a precision of 75% and a recall of
    75%.
  prefs: []
  type: TYPE_NORMAL
- en: Area Under the Receiver Operating Curve (AUC-ROC)
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: The area under the receiver operating characteristic (ROC) curve, also known
    as the AUC-ROC for short, is another widely used metric for evaluating classification
    machine learning problems. A significant feature of the AUC-ROC metric is that
    it can be a good metric for evaluating datasets with imbalanced classes.
  prefs: []
  type: TYPE_NORMAL
- en: An imbalanced class is when one of the outcome targets has far more samples
    than another target. A typical example of this can be seen in a fraud identification
    dataset where the samples of no fraud will be vastly more than the samples with
    fraud.
  prefs: []
  type: TYPE_NORMAL
- en: To better understand AUC-ROC, let us derive two (2) relevant formulas from our
    confusion matrix, and they are the ***True negative rate (TNR)*** (also known
    as ***specificity***) and the ***False positive rate*** (also known as ***fall-out***).
  prefs: []
  type: TYPE_NORMAL
- en: Specificity is the fraction of results that are ***correctly predicted as negative***
    over all the results that are negative, whereas fall-out is the fraction of results
    that are ***wrongly predicted as positive*** over all the results that are negative.
    Fall-out is also represented as (1 – specificity).
  prefs: []
  type: TYPE_NORMAL
- en: This is further illustrated in Figure [14-9](#Fig9).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_14_Chapter/463852_1_En_14_Fig9_HTML.jpg](../images/463852_1_En_14_Chapter/463852_1_En_14_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 14-9
  prefs: []
  type: TYPE_NORMAL
- en: Specificity and fall-out
  prefs: []
  type: TYPE_NORMAL
- en: The ROC Space
  prefs:
  - PREF_H6
  type: TYPE_NORMAL
- en: The ROC or receiver operating characteristic space is a 2-D graph that ***plots***
    the cumulative probability distribution of the sensitivity (i.e., the probability
    distribution of making the correct prediction) on the y axis and the cumulative
    probability distribution of the fall-out (i.e., the probability distribution of
    a false alarm) on the *x* axis.
  prefs: []
  type: TYPE_NORMAL
- en: A few notable details about the ROC space is that
  prefs: []
  type: TYPE_NORMAL
- en: The area of the square space is 1 because the *x* and *y* axes range from 0
    to 1, respectively.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The diagonal line drawn from point (*x* = 0, *y* = 0) to (*x* = 1, *y* = 1)
    represented pure chance or a random guess. It is also known as the line of no
    discrimination.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These expressions are further illustrated in Figure [14-10](#Fig10).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_14_Chapter/463852_1_En_14_Fig10_HTML.jpg](../images/463852_1_En_14_Chapter/463852_1_En_14_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 14-10
  prefs: []
  type: TYPE_NORMAL
- en: Receiver operating characteristic (ROC) space
  prefs: []
  type: TYPE_NORMAL
- en: The AUC-ROC Space
  prefs:
  - PREF_H6
  type: TYPE_NORMAL
- en: 'The ROC plot as shown in Figure [14-10](#Fig10) looks like a curve. So, the
    area under the curve, also known as AUC, is the area underneath the ROC curve.
    AUC provides a single floating-point number that describes the model’s performance,
    and it is interpreted as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: An AUC value below 0.5 indicates that the model’s prediction is worse than a
    random guess of the targets.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: An AUC value closer to 1 signifies a model that is performing very well by generalizing
    to new examples on the test dataset.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A ROC curve that is closer to the top-left part of the ROC space (i.e., closer
    to the value 1) indicates that the model has a good classification accuracy.
  prefs: []
  type: TYPE_NORMAL
- en: The AUC-ROC curve is illustrated in Figure [14-11](#Fig11).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_14_Chapter/463852_1_En_14_Fig11_HTML.jpg](../images/463852_1_En_14_Chapter/463852_1_En_14_Fig11_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 14-11
  prefs: []
  type: TYPE_NORMAL
- en: AUC-ROC curve
  prefs: []
  type: TYPE_NORMAL
- en: Regression Evaluation Metrics
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: In this section, we’ll go through some of the metrics for evaluating regression
    machine learning tasks.
  prefs: []
  type: TYPE_NORMAL
- en: Root Mean Squared Error (RMSE)
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: 'Root mean squared error also known as RMSE for short is an important evaluation
    metric in supervised machine learning for regression problems. RMSE computes the
    error difference between the original value of the target feature and the value
    predicted by the learning algorithm. RMSE is formally represented by the following
    formula:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ RMSE=\sqrt{\frac{\sum_{i=1}^n{\left({y}_i-{\hat{y}}_i\right)}^2}{n}} $$](../images/463852_1_En_14_Chapter/463852_1_En_14_Chapter_TeX_Equg.png)'
  prefs: []
  type: TYPE_IMG
- en: where
  prefs: []
  type: TYPE_NORMAL
- en: '*n* is the number of samples in the dataset'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*y*[*i*] is the actual value of the target feature'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![$$ \hat{y_i} $$](../images/463852_1_En_14_Chapter/463852_1_En_14_Chapter_TeX_IEq1.png)
    is the target value predicted by the learning algorithm'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Further notes on RMSE:'
  prefs: []
  type: TYPE_NORMAL
- en: Squaring the difference between the actual value and predicted value of the
    labels ![$$ {\left({y}_i-{\hat{y}}_i\right)}^2 $$](../images/463852_1_En_14_Chapter/463852_1_En_14_Chapter_TeX_IEq2.png)
    gives the positive deviation (i.e., the magnitude) between the two numbers.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Dividing by *n* gives the average of the sum of magnitudes. The square root
    ***returns the results in the same unit of measurement*** as the target feature.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: An Example of Evaluation with RMSE
  prefs:
  - PREF_H6
  type: TYPE_NORMAL
- en: Assume we want to predict the price of houses (in thousands of Naira^([1](#Fn1))),
    and we have the following dataset (see Figure [14-12](#Fig12)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_14_Chapter/463852_1_En_14_Fig12_HTML.jpg](../images/463852_1_En_14_Chapter/463852_1_En_14_Fig12_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 14-12
  prefs: []
  type: TYPE_NORMAL
- en: RMSE illustration
  prefs: []
  type: TYPE_NORMAL
- en: 'From the formula given, we calculate the RMSE as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ RMSE=\sqrt{\frac{{\left(18.3-17.4\right)}^2+{\left(15.2-16.3\right)}^2+\dots
    +{\left(24.7-25.4\right)}^2}{3}}\kern0.5em =\sqrt{\frac{(0.9)^2+{\left(-1.1\right)}^2+\dots
    +{\left(-0.7\right)}^2}{3}}\kern0.5em =\sqrt{\frac{0.81+1.21+\dots +0.49}{3}}\kern0.5em
    =\sqrt{\frac{2.51}{3}}=\sqrt{0.83666666666}=\sqrt{MSE}=0.91469484893 $$](../images/463852_1_En_14_Chapter/463852_1_En_14_Chapter_TeX_Equh.png)'
  prefs: []
  type: TYPE_IMG
- en: The closer the RMSE is to 0, the better the performance of the model. Again,
    we are most interested in knowing the RMSE on the test data, as this gives us
    an accurate picture of the performance of our model. In this example, the error
    difference between the actual price and predicted price of houses made by our
    learning model is approximately NGN 910 (i.e., 0.91 ∗ 1000).
  prefs: []
  type: TYPE_NORMAL
- en: Hence, we can calculate the percentage error as
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \% error=\frac{error\ difference}{mean\ of\ the\ actual\ prices,\underset{\_}{y}}\kern0.5em
    =\frac{0.91}{19.4}=0.04690721649=\left(0.04690721649\ast 100\right)\approx 4\%
    $$](../images/463852_1_En_14_Chapter/463852_1_En_14_Chapter_TeX_Equi.png)'
  prefs: []
  type: TYPE_IMG
- en: R-squared (***R***^(**2**))
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: R-squared , written as *R*², is another regression error metric that gives us
    a different perspective into the performance of a learned model. *R*² is also
    known as the ***coefficient of determination*** . The goal of *R*² is to tell
    us how much of the variance or the variability in the target feature, *y*, is
    explained or is captured by the model.
  prefs: []
  type: TYPE_NORMAL
- en: Recall that a model has high variance when it has learned closely the underlying
    structure of the targets in the dataset. ***Of course, we are mostly concerned
    with the*** *R*² ***metric on test data***. We typically want the *R*² value on
    test data to be high. It shows that our model generalizes well to new examples.
  prefs: []
  type: TYPE_NORMAL
- en: Interpretation of ***R***^(**2**)
  prefs:
  - PREF_H6
  type: TYPE_NORMAL
- en: '*R*² outputs a value between 0 and 1\. Values close to 0 show that variability
    in the responses are not properly captured by the model, while values close to
    1 indicate that the model explains the variability in the observed values. *R*²
    is calculated using the equation'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {R}^2=1-\frac{RSS}{TSS} $$](../images/463852_1_En_14_Chapter/463852_1_En_14_Chapter_TeX_Equj.png)'
  prefs: []
  type: TYPE_IMG
- en: where
  prefs: []
  type: TYPE_NORMAL
- en: '*RSS* (i.e., the residual sum of squares) captures the error difference (or
    the variability) between the actual values and the values predicted by the learning
    algorithm. The formula is'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![$$ RSS={\sum}_{i=1}^n{\left({y}_i-{\hat{y}}_i\right)}^2 $$](../images/463852_1_En_14_Chapter/463852_1_En_14_Chapter_TeX_Equk.png)'
  prefs: []
  type: TYPE_IMG
- en: '*TSS* (i.e., the total sum of squares), on the other hand, calculates the variability
    in the response variable, *y*. So, for each observation in the dataset, we find
    the squared difference from the mean of all observation, ![$$ \underset{\_}{y}
    $$](../images/463852_1_En_14_Chapter/463852_1_En_14_Chapter_TeX_IEq3.png). The
    formula is'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![$$ TSS={\sum}_{i=1}^n{\left({y}_i-{\underset{\_}{y}}_i\right)}^2 $$](../images/463852_1_En_14_Chapter/463852_1_En_14_Chapter_TeX_Equl.png)'
  prefs: []
  type: TYPE_IMG
- en: Hence, ![$$ \frac{RSS}{TSS} $$](../images/463852_1_En_14_Chapter/463852_1_En_14_Chapter_TeX_IEq4.png)
    gives us a ratio of how much of the variability in the response variable *y* ***is
    not explained*** by the model.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: So, when we say ![$$ 1-\frac{RSS}{TSS} $$](../images/463852_1_En_14_Chapter/463852_1_En_14_Chapter_TeX_IEq5.png),
    we reverse the definition to tell us the ratio of the variability in the response
    variable explained by the model.
  prefs: []
  type: TYPE_NORMAL
- en: An Example of Evaluating the Model Performance with R²
  prefs:
  - PREF_H6
  type: TYPE_NORMAL
- en: 'Using the dataset illustrated in Figure [14-12](#Fig12) and from the formula
    given earlier, we will calculate *R*² as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ RSS={\sum}_{i=1}^n{\left({y}_i-{\hat{y}}_i\right)}^2=\left[{\left(18.3-17.4\right)}^2+{\left(15.2-16.3\right)}^2+\dots
    +{\left(24.7-25.4\right)}^2\right]\kern0.5em =\left[{(0.9)}^2+{\left(-1.1\right)}^2+\dots
    +{\left(-0.7\right)}^2\right]=\left[0.81+1.21+\dots +0.49\right]\kern0.5em =2.51
    $$](../images/463852_1_En_14_Chapter/463852_1_En_14_Chapter_TeX_Equm.png)'
  prefs: []
  type: TYPE_IMG
- en: while for *TSS*, we have that the mean of the response variable price, ![$$
    \underset{\_}{y} $$](../images/463852_1_En_14_Chapter/463852_1_En_14_Chapter_TeX_IEq6.png),
    is
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{18.3+15.2+24.7}{3}=19.4 $$](../images/463852_1_En_14_Chapter/463852_1_En_14_Chapter_TeX_Equn.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ TSS={\sum}_{i=1}^n{\left({y}_i-{\underset{\_}{y}}_i\right)}^2=\left[{\left(18.3-19.4\right)}^2+{\left(15.2-19.4\right)}^2+\dots
    +{\left(24.7-19.4\right)}^2\right]\kern0.5em =\left[{\left(-1.1\right)}^2+{\left(-4.2\right)}^2+\dots
    +{(5.3)}^2\right]=\left[1.21+17.64+\dots +28.09\right]\kern0.5em =46.94 $$](../images/463852_1_En_14_Chapter/463852_1_En_14_Chapter_TeX_Equo.png)'
  prefs: []
  type: TYPE_IMG
- en: Finally,
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {R}^2=1-\frac{RSS}{TSS}\kern0.5em =1-\frac{2.51}{46.94}\kern0.5em =1-(0.05347251811)\kern0.5em
    =0.94652748189 $$](../images/463852_1_En_14_Chapter/463852_1_En_14_Chapter_TeX_Equp.png)'
  prefs: []
  type: TYPE_IMG
- en: The result shows that the model does a good job in capturing the variability
    in the target feature. ***Of course, we want to have such good performances on
    the test dataset***.
  prefs: []
  type: TYPE_NORMAL
- en: Resampling Techniques
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This section describes another vital concept for evaluating the performance
    of supervised learning methods. Resampling methods are a set of techniques that
    involve selecting a subset of the available dataset, training on that data subset,
    and then using the remainder of the data to evaluate the trained model.
  prefs: []
  type: TYPE_NORMAL
- en: This process involves creating subsets of the available data into a training
    set and a validation set. The training set is used to train the model, while the
    validation set will evaluate the performance of the learned model on unseen data.
    Typically, this process will be carried out repeatedly to get an approximate measure
    of the training and test errors.
  prefs: []
  type: TYPE_NORMAL
- en: We will examine three techniques for data resampling and also give some examples
    of when to use a particular technique. The techniques we’ll examine are
  prefs: []
  type: TYPE_NORMAL
- en: The validation set technique (or train-test split)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The leave-one-out cross-validation (LOOCV) technique
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The *k*-fold cross-validation technique
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Validation Set
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The validation set is the simplest approach for data resampling, and it involves
    randomly dividing the dataset into two parts; these are the training set and the
    validation set. The division can be into two equal sets if you have a big enough
    dataset, or it could be a 60/40 or 70/30 split.
  prefs: []
  type: TYPE_NORMAL
- en: 'After splitting, the model is trained on the training set, and its performance
    is evaluated on the validation set. This process is summarized in the list as
    follows:'
  prefs: []
  type: TYPE_NORMAL
- en: Randomly split the dataset into
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Training set
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Validation set
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Train the model on the training set.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Evaluate the model performance on the validation set using the appropriate error
    metric for a regression or classification problem.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: No. 1 to No. 3 can be repeated.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Report the error metric to get the ensemble training and validation set error
    distribution.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: A sample validation set is shown in Figure [14-13](#Fig13).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_14_Chapter/463852_1_En_14_Fig13_HTML.jpg](../images/463852_1_En_14_Chapter/463852_1_En_14_Fig13_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 14-13
  prefs: []
  type: TYPE_NORMAL
- en: Validation set
  prefs: []
  type: TYPE_NORMAL
- en: Leave-One-Out Cross-Validation (LOOCV)
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The leave-one-out cross-validation approach (commonly referred to as LOOCV)
    involves dividing the dataset into a training set and a test set. But unlike the
    validation approach, LOOCV assigns just one example to the test set, and trains
    the model on the remainder of the dataset. This process is repeated until all
    the examples in the dataset have been used for evaluating the model.
  prefs: []
  type: TYPE_NORMAL
- en: Assuming we have ten examples in a dataset (let *n* be used to denote the size
    of the dataset) to build a learning model. We will train the model using *n* − 1
    examples and evaluate the model on just the single remaining example, hence the
    name leave-one-out. This process is repeated *n* times for all the examples in
    the dataset. At the end of the *n* iterations, we will report the average error
    estimate.
  prefs: []
  type: TYPE_NORMAL
- en: A sample LOOCV is shown in Figure [14-14](#Fig14).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_14_Chapter/463852_1_En_14_Fig14_HTML.jpg](../images/463852_1_En_14_Chapter/463852_1_En_14_Fig14_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 14-14
  prefs: []
  type: TYPE_NORMAL
- en: LOOCV
  prefs: []
  type: TYPE_NORMAL
- en: The main drawback to using LOOCV is that it is *computationally expensive*.
    The word *computationally expensive* is when a process takes a lot of computing
    time and memory to complete its execution.
  prefs: []
  type: TYPE_NORMAL
- en: '***k***-Fold Cross-Validation'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '*k*-Fold cross-validation mitigates the computational cost of LOOCV while maintaining
    its benefits in terms of giving an unbiased estimate of the performance of the
    learned model when evaluated on validation data.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s use the following recipe to explain the idea behind *k*-fold CV:'
  prefs: []
  type: TYPE_NORMAL
- en: Divide the dataset into *k* parts or folds. Assume we have a dataset with 20
    records; we’ll divide the dataset into four parts. See Figure [14-15](#Fig15).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_14_Chapter/463852_1_En_14_Fig15_HTML.jpg](../images/463852_1_En_14_Chapter/463852_1_En_14_Fig15_HTML.jpg)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 14-15
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Divide your dataset into *k* parts or folds
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Hold out one of the four splits as a test set, and train the model on the remaining
    splits. Repeat this until all the splits have been held out for testing. See Figure
    [14-16](#Fig16).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_14_Chapter/463852_1_En_14_Fig16_HTML.jpg](../images/463852_1_En_14_Chapter/463852_1_En_14_Fig16_HTML.jpg)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 14-16
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Train the model using *k* − 1 example sets or splits
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Report the ensemble error metric.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Note
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: From this explanation, we can see that LOOCV is a special case where *k* = *n*.
  prefs: []
  type: TYPE_NORMAL
- en: Improving Model Performance
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To improve the performance of the model, a few of the techniques to consider
    are
  prefs: []
  type: TYPE_NORMAL
- en: Systematic feature engineering
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Using ensemble learning methods (we’ll discuss more on this in a later chapter)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Hyper-parameter tuning of the algorithm
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Feature Engineering
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: In model building, a significant portion of time is spent on feature engineering.
    Feature engineering is the practice of systematically going through each feature
    in the dataset and investigating its relevance to the targets.
  prefs: []
  type: TYPE_NORMAL
- en: Through feature engineering, we can cleverly introduce new features by combining
    one or more existing features, and this can impact the prediction accuracy of
    the model. Feature engineering can sometimes be the difference between a decent
    learning model and a competition-winning model.
  prefs: []
  type: TYPE_NORMAL
- en: Ensemble Methods
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Ensemble methods combine the output of weaker models to produce a better performing
    model. Two major classes of ensemble learning algorithms are
  prefs: []
  type: TYPE_NORMAL
- en: Boosting
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Bagging
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In practice, ensemble methods such as Random forests are known to do very well
    in various machine learning problems and are the algorithms of choice for machine
    learning competitions.
  prefs: []
  type: TYPE_NORMAL
- en: Hyper-parameter Tuning
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: When modeling with a learning algorithm, we can adjust certain configurations
    of the algorithm. These configurations are called hyper-parameters. Hyper-parameters
    are tuned to get the best settings of the algorithms that will optimize the performance
    of the model. One strategy is to use a grid search to adjust the hyper-parameters
    when fine-tuning the model.
  prefs: []
  type: TYPE_NORMAL
- en: Unsupervised Learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In unsupervised learning, the goal is to build a model that captures the underlying
    distribution of the dataset. The dataset has no given targets for the input features
    (see Figure [14-17](#Fig17)). So, it is not possible to learn a function that
    maps a relationship between the input features and the targets as we do in supervised
    learning.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_14_Chapter/463852_1_En_14_Fig17_HTML.jpg](../images/463852_1_En_14_Chapter/463852_1_En_14_Fig17_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 14-17
  prefs: []
  type: TYPE_NORMAL
- en: Unsupervised dataset
  prefs: []
  type: TYPE_NORMAL
- en: Rather, unsupervised learning algorithms attempt to determine the unknown structure
    of the dataset by grouping similar samples together.
  prefs: []
  type: TYPE_NORMAL
- en: Assume we have a dataset of patients with heart diseases; using unsupervised
    machine learning algorithms, we can find some hidden sub-groups of patients to
    help understand more about the disease patterns. This is known as *clustering*.
  prefs: []
  type: TYPE_NORMAL
- en: Also, we can use algorithms like *principal component analysis* (*PCA*) to compress
    a large number of features into principal components (that summarizes all the
    other features) for easy visualization. We will talk more about clustering and
    principal component analysis in later chapters.
  prefs: []
  type: TYPE_NORMAL
- en: Reinforcement Learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Reinforcement learning presents an approach to learning that is quite different
    from what we have seen so far in supervised and unsupervised machine learning
    techniques. In reinforcement learning, an agent interacts with an environment
    in a feedback configuration and updates its strategy for choosing an action based
    on the responses it gets from the environment. An illustration of this scenario
    is shown in Figure [14-18](#Fig18).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_14_Chapter/463852_1_En_14_Fig18_HTML.jpg](../images/463852_1_En_14_Chapter/463852_1_En_14_Fig18_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 14-18
  prefs: []
  type: TYPE_NORMAL
- en: Reinforcement learning model
  prefs: []
  type: TYPE_NORMAL
- en: This book will not cover reinforcement learning techniques as it presents a
    different approach to the problem of learning from random environments that is
    distinct from the approach used in supervised and unsupervised learning problems.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we covered the three main components of machine learning, which
    are supervised, unsupervised, and reinforcement learning. The chapter largely
    focused on the principles for performing supervised machine learning such as framing
    a problem as a regression or classification task; splitting the dataset into training,
    test, and validation sets; understanding the bias/variance trade-off and consequently
    issues of overfitting and underfitting; and the evaluation metrics for assessing
    the performance of a learning model.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we will briefly look at the differences between batch and
    online learning.
  prefs: []
  type: TYPE_NORMAL
- en: 15. Batch vs. Online Learning
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Data is a vital component for building learning models. There are two design
    choices for how data is used in the modeling pipeline. The first is to build your
    learning model with data at rest (batch learning), and the other is when the data
    is flowing in streams into the learning algorithm (online learning). This flow
    can be as individual sample points in your dataset, or it can be in small batch
    sizes. Let’s briefly discuss these concepts.
  prefs: []
  type: TYPE_NORMAL
- en: Batch Learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In batch learning the machine learning model is trained using the entire dataset
    that is available at a certain point in time. Once we have a model that performs
    well on the test set, the model is shipped for production and thus learning ends.
    This process is also called *offline learning* . If in the process of time, new
    data becomes available, and there is need to update the model based on the new
    data, the model is trained from scratch all over again using both the previous
    data samples and the new data samples.
  prefs: []
  type: TYPE_NORMAL
- en: This pipeline is further illustrated in Figure [15-1](#Fig1).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_15_Chapter/463852_1_En_15_Fig1_HTML.jpg](../images/463852_1_En_15_Chapter/463852_1_En_15_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 15-1
  prefs: []
  type: TYPE_NORMAL
- en: Batch learning
  prefs: []
  type: TYPE_NORMAL
- en: In a situation where there is a need to train the model with data that is generated
    continuously from the source, batch learning becomes inappropriate to deal with
    that situation. In such a circumstance, we want to be able to update our learning
    model on the go, based on the new data samples that are available.
  prefs: []
  type: TYPE_NORMAL
- en: Online Learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In online learning, data *streams* (either individually or in mini-batches)
    into the learning algorithm and updates the model. Online learning is ideal in
    situations where data is generated continuously in time, and we need to use real-time
    data samples to build a prediction model. A typical example of this case is in
    stock market prediction.
  prefs: []
  type: TYPE_NORMAL
- en: Online learning is illustrated in Figure [15-2](#Fig2).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_15_Chapter/463852_1_En_15_Fig2_HTML.jpg](../images/463852_1_En_15_Chapter/463852_1_En_15_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 15-2
  prefs: []
  type: TYPE_NORMAL
- en: Online learning
  prefs: []
  type: TYPE_NORMAL
- en: This brief chapter explained the contrast between batch learning and online
    learning. In the next chapter, we will focus our attention on a vital optimization
    algorithm for machine learning, gradient descent.
  prefs: []
  type: TYPE_NORMAL
- en: '16. Optimization for Machine Learning: Gradient Descent'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Gradient descent is an optimization algorithm that is used to minimize the cost
    function of a machine learning algorithm. Gradient descent is called an iterative
    optimization algorithm because, in a stepwise looping fashion, it tries to find
    an approximate solution by basing the next step off its present step until a terminating
    condition is reached that ends the loop.
  prefs: []
  type: TYPE_NORMAL
- en: Take the following convex function in Figure [16-1](#Fig1) as a visual of gradient
    descent finding the minimum point of a function space.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_16_Chapter/463852_1_En_16_Fig1_HTML.jpg](../images/463852_1_En_16_Chapter/463852_1_En_16_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 16-1
  prefs: []
  type: TYPE_NORMAL
- en: Contour figure – gradient descent
  prefs: []
  type: TYPE_NORMAL
- en: The image in Figure [16-1](#Fig1) is an example of a function space. This type
    of function is known as a ***convex or a bowl-shaped function*** . The role of
    gradient descent in the function space is to find the set of values for the parameters
    of the function that minimizes the cost of the function and brings it to the global
    minimum. The global minimum is the lowest point of the function space.
  prefs: []
  type: TYPE_NORMAL
- en: For example, the mean squared error cost function for linear regression is nicely
    convex, so gradient descent is almost guaranteed to find the global minimum. However,
    this is not always the case for other types of non-convex function spaces. Remember,
    gradient descent is a global optimizer for minimizing any function space.
  prefs: []
  type: TYPE_NORMAL
- en: Some functions may have more than one minimum region; these regions are called
    local minima. The lowest region of the function space is called the global minimum.
  prefs: []
  type: TYPE_NORMAL
- en: The Learning Rate of Gradient Descent Algorithm
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Learning rate is a hyper-parameter that controls how big a step the gradient
    descent algorithm takes when tracing its path in the direction of steepest descent
    in the function space.
  prefs: []
  type: TYPE_NORMAL
- en: If the learning rate is too large, the algorithm takes a large step as it goes
    downhill. In doing so, gradient descent runs faster, but it has a high propensity
    of missing the global minimum. An overly small learning rate makes the algorithm
    slow to converge (i.e., to reach the global minimum), but it is more likely to
    converge to the global minimum steadily. Empirically, examples of good learning
    rates are values in the range of 0.001, 0.01, and 0.1\. In Figure [16-2](#Fig2),
    with a good learning rate, the cost function *C*(*θ*) should decrease after every
    iteration.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_16_Chapter/463852_1_En_16_Fig2_HTML.jpg](../images/463852_1_En_16_Chapter/463852_1_En_16_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 16-2
  prefs: []
  type: TYPE_NORMAL
- en: Learning rates. **Left:** Good learning rate. **Right:** Bad learning rate.
  prefs: []
  type: TYPE_NORMAL
- en: Classes of Gradient Descent Algorithm
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The three types of gradient descent algorithms are
  prefs: []
  type: TYPE_NORMAL
- en: Batch gradient descent
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Mini-batch gradient descent
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Stochastic gradient descent
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The ***batch gradient descent*** algorithm uses the entire training data in
    computing each step of the gradient in the direction of steepest descent. Batch
    gradient descent is most likely to converge to the global minimum. However, the
    disadvantage of this method is that, for massive datasets, the optimization process
    can be prolonged.
  prefs: []
  type: TYPE_NORMAL
- en: In ***stochastic gradient descent (SGD)*** , the algorithm quickly learns the
    direction of steepest descent using a single example of the training set at each
    time step. While this method has the distinct advantage of being fast, it may
    never converge to the global minimum. However, it approximates the global minimum
    closely enough. In practice, SGD is enhanced by gradually reducing the learning
    rate over time as the algorithm converges. In doing this, we can take advantage
    of large step sizes to go downhill more quickly and then slow down so as not to
    miss the global minimum. Due to its speed when dealing with humongous datasets,
    SGD is often preferred to batch gradient descent.
  prefs: []
  type: TYPE_NORMAL
- en: '***Mini-batch gradient descent*** on the other hand randomly splits the dataset
    into manageable chunks called mini-batches. It operates on a mini-batch in each
    time step to learn the direction of steepest descent of the function. This method
    is a compromise between stochastic and batch gradient descent. Just like SGD,
    mini-batch gradient descent does not converge to the global minimum. However,
    it is more robust in avoiding local minimum. The advantage of mini-batch gradient
    descent over stochastic gradient descent is that it is more computational efficient
    by taking advantage of matrix vectorization under the hood to efficiently compute
    the algorithm updates.'
  prefs: []
  type: TYPE_NORMAL
- en: Optimizing Gradient Descent with Feature Scaling
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This process involves making sure that the features in the dataset are all on
    the same scale. Typically all real-valued features in the dataset should lie between
    −1 ≤ *x*[*i*] ≤ 1 or a range around that region. Any range too large or arbitrarily
    too small can generate a contour plot that is too narrow and hence will take a
    longer time for gradient descent to converge to the optimal solution. The plot
    in Figure [16-3](#Fig3) is called a contour plot. Contour plots are used to represent
    3-D surfaces on a 2-D plane. The smaller circles represent the lowest point (or
    the global optimum) of the convex function.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_16_Chapter/463852_1_En_16_Fig3_HTML.jpg](../images/463852_1_En_16_Chapter/463852_1_En_16_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 16-3
  prefs: []
  type: TYPE_NORMAL
- en: Feature scaling – contour plots. **Left:** without feature scaling. **Right:**
    with feature scaling
  prefs: []
  type: TYPE_NORMAL
- en: A popular technique for feature scaling is called mean normalization. In mean
    normalization, for each feature, the mean of the feature is subtracted from each
    record and divided by the feature’s range (i.e., the difference between the maximum
    and minimum elements in the feature). Alternatively, it can be divided by the
    standard deviation of the features. Feature scaling is formally written as
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {x}_i=\frac{x_i-{\mu}_i}{\mathit{\max}-\mathit{\min}} divided\ by\ range\kern0.75em
    {x}_i=\frac{x_i-{\mu}_i}{\sigma } divided\ by\ standard\ deviation $$](../images/463852_1_En_16_Chapter/463852_1_En_16_Chapter_TeX_Equa.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure [16-4](#Fig4) is an example of a dataset with feature scaling.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_16_Chapter/463852_1_En_16_Fig4_HTML.jpg](../images/463852_1_En_16_Chapter/463852_1_En_16_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 16-4
  prefs: []
  type: TYPE_NORMAL
- en: Feature scaling example
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we discussed gradient descent, an important algorithm for optimizing
    machine learning models. In the next chapter, we will introduce a suite of supervised
    and unsupervised machine learning algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: 17. Learning Algorithms
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this section, we introduce a variety of supervised and unsupervised machine
    learning algorithms. The algorithms presented here provide a foundation for understanding
    other machine learning methods (e.g., linear and logistic regression), and others
    like Random forests and Extreme Stochastic Gradient Boosting (XGBoost) are widely
    used in applied machine learning.
  prefs: []
  type: TYPE_NORMAL
- en: We will survey the various learning algorithms from a conceptual level. In general,
    the discussion will cut across
  prefs: []
  type: TYPE_NORMAL
- en: What a particular algorithm is all about and how it works.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How we interpret the results of the learning algorithm.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What various ways it can be optimized to improve performance in certain circumstances.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Classes of Supervised Algorithms
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Supervised machine learning algorithms are broadly classified into
  prefs: []
  type: TYPE_NORMAL
- en: Linear
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Non-linear
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ensemble methods
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Let’s briefly go through them:'
  prefs: []
  type: TYPE_NORMAL
- en: '***Linear methods*** are also known as ***parametric methods*** or algorithms.
    Linear methods assume that the underlying structure of the data is linear, put
    in another form, that there exists a linear interaction between the features of
    the dataset. Examples of linear algorithms are'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Linear regression
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Logistic regression
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Support vector machines
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '***Non-linear methods*** (also known as ***non-parametric methods***) do not
    assume any parametric or structural form of the dataset. Instead, they attempt
    to learn the internal relationships or representation between the features of
    the dataset. Examples of non-linear algorithms are'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: K-nearest neighbors
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Classification and regression trees (they form the foundation for ensemble methods
    such as boosting and bagging)
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Support vector machines
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Neural networks
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '***Ensemble methods*** combine the output of multiple algorithms to build a
    better model estimator that generalizes to unseen examples. Two major classes
    of ensemble methods are'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Boosting (stochastic gradient boosting)
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Bagging (Random forests)
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: As we can see from the preceding list, some algorithms can function as both
    a linear and non-linear model. An example is support vector machine (SVM) which
    applies the so-called kernel trick to use it as a non-linear classification algorithm
    (more on this later).
  prefs: []
  type: TYPE_NORMAL
- en: Supervised machine learning algorithms can also be grouped as regression or
    classification algorithms. As we saw in Chapter [14](463852_1_En_14_Chapter.xhtml)
    on regression vs. classification, regression is when the target variable is real-valued
    and classification is when the target variable is class labels.
  prefs: []
  type: TYPE_NORMAL
- en: Unsupervised Algorithms
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Examples of unsupervised learning include
  prefs: []
  type: TYPE_NORMAL
- en: Clustering
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Principal component analysis
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the later chapters, we will survey the preceding unsupervised learning algorithms
    for learning from non-labeled datasets. Clustering is an algorithm for grouping
    homogeneous samples into partitions called clusters. Principal component analysis
    is a method for finding low-dimensional feature sub-spaces that capture as much
    information as possible from the original higher-dimensional features of the dataset.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter provides an overview of the machine learning algorithms that we’ll
    discuss together with code examples in Part 4 of this book.
  prefs: []
  type: TYPE_NORMAL
