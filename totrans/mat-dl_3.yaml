- en: 3. Training of Multi-Layer Neural Network
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 3. 多层神经网络的训练
- en: In an effort to overcome the practical limitations of the single-layer, the
    neural network evolved into a multi-layer architecture. However, it has taken
    approximately 30 years to just add on the hidden layer to the single-layer neural
    network. It’s not easy to understand why this took so long, but the problem involved
    the learning rule. As the training process is the only method for the neural network
    to store information, untrainable neural networks are useless. A proper learning
    rule for the multi-layer neural network took quite some time to develop.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 为了克服单层神经网络的实际局限性，神经网络演变成了多层架构。然而，仅仅在单层神经网络上添加隐藏层就花了大约30年的时间。很难理解为什么花了这么长时间，但问题涉及学习规则。因为训练过程是神经网络存储信息的唯一方法，无法训练的神经网络是无用的。为多层神经网络开发适当的学习规则花费了相当长的时间。
- en: The previously introduced delta rule is ineffective for training of the multi-layer
    neural network. This is because the error, the essential element for applying
    the delta rule for training, is not defined in the hidden layers. The error of
    the output node is defined as the difference between the correct output and the
    output of the neural network. However, the training data does not provide correct
    outputs for the hidden layer nodes, and hence the error cannot be calculated using
    the same approach for the output nodes. Then, what? Isn’t the real problem how
    to define the error at the hidden nodes? You got it. You just formulated the back-propagation
    algorithm, the representative learning rule of the multi-layer neural network.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 之前介绍的delta规则对于多层神经网络的训练是无效的。这是因为，应用delta规则进行训练的基本元素——误差，在隐藏层中未定义。输出节点的误差定义为正确输出与神经网络输出的差异。然而，训练数据并不为隐藏层节点提供正确的输出，因此无法使用与输出节点相同的方法来计算误差。那么，真正的难题不在于如何定义隐藏节点的误差吗？你明白了。你刚刚提出了反向传播算法，这是多层神经网络的代表性学习规则。
- en: In 1986, the introduction of the back-propagation algorithm finally solved the
    training problem of the multi-layer neural network.[¹](#Fn1) The significance
    of the back-propagation algorithm was that it provided a systematic method to
    determine the error of the hidden nodes. Once the hidden layer errors are determined,
    the delta rule is applied to adjust the weights. See Figure [3-1](#Fig1).
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 1986年，反向传播算法的引入最终解决了多层神经网络的训练问题。[¹](#Fn1)反向传播算法的重要性在于它提供了一种系统的方法来确定隐藏层的误差。一旦确定了隐藏层误差，就应用delta规则来调整权重。见图[3-1](#Fig1)。
- en: '![A448947_1_En_3_Fig1_HTML.gif](A448947_1_En_3_Fig1_HTML.gif)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_3_Fig1_HTML.gif](A448947_1_En_3_Fig1_HTML.gif)'
- en: Figure 3-1.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-1。
- en: Illustration of back-propagation
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 反向传播的示意图
- en: The input data of the neural network travels through the input layer, hidden
    layer, and output layer. In contrast, in the back-propagation algorithm, the output
    error starts from the output layer and moves backward until it reaches the right
    next hidden layer to the input layer. This process is called back-propagation
    , as it resembles an output error propagating backward. Even in back-propagation,
    the signal still flows through the connecting lines and the weights are multiplied.
    The only difference is that the input and output signals flow in opposite directions.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络的输入数据通过输入层、隐藏层和输出层。相比之下，在反向传播算法中，输出误差从输出层开始，向后移动直到达到正确的下一个隐藏层到输入层。这个过程被称为反向传播，因为它类似于输出误差向后传播。即使在反向传播中，信号仍然通过连接线和权重相乘。唯一的区别是输入和输出信号流动的方向相反。
- en: Back-Propagation Algorithm
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 反向传播算法
- en: This section explains the back-propagation algorithm using an example of the
    simple multi-layer neural network . Consider a neural network that consists of
    two nodes for both the input and output and a hidden layer, which has two nodes
    as well. We will omit the bias for convenience. The example neural network is
    shown in Figure [3-2](#Fig2), where the superscript describes the layer indicator.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 本节通过简单多层神经网络的例子解释了反向传播算法。考虑一个由输入和输出层各两个节点以及一个同样有两个节点的隐藏层组成的神经网络。为了方便，我们将省略偏差。示例神经网络如图[3-2](#Fig2)所示，其中上标描述了层指示符。
- en: '![A448947_1_En_3_Fig2_HTML.gif](A448947_1_En_3_Fig2_HTML.gif)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_3_Fig2_HTML.gif](A448947_1_En_3_Fig2_HTML.gif)'
- en: Figure 3-2.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-2。
- en: Neural network that consists of two nodes for the input and output and a hidden
    layer, which has two nodes
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 由两个输入和输出节点以及一个包含两个节点的隐藏层组成的神经网络
- en: 'In order to obtain the output error, we first need the neural network’s output
    from the input data. Let’s try. As the example network has a single hidden layer,
    we need two input data manipulations before the output calculation is processed.
    First, the weighted sum of the hidden node is calculated as:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 为了获得输出误差，我们首先需要从输入数据中获得神经网络的输出。让我们试试。由于示例网络只有一个隐藏层，我们在输出计算之前需要进行两次输入数据处理。首先，计算隐藏节点的加权求和：
- en: '![$$ \begin{array}{c}\left[\kern0.1em \begin{array}{c}\hfill {v}_1^{(1)}\hfill
    \\ {}\hfill {v}_2^{(1)}\hfill \end{array}\kern0.1em \right]\kern0.62em =\kern0.62em
    \left[\kern0.1em \begin{array}{cc}\hfill {w}_{11}^{(1)}\hfill & \hfill {w}_{12}^{(1)}\hfill
    \\ {}\hfill {w}_{21}^{(1)}\hfill & \hfill {w}_{22}^{(1)}\hfill \end{array}\kern0.1em
    \right]\left[\kern0.1em \begin{array}{c}\hfill {x}_1\hfill \\ {}\hfill {x}_2\hfill
    \end{array}\kern0.1em \right]\\ {}\triangleq \kern0.62em {W}_1\kern0.1em x\end{array}
    $$](A448947_1_En_3_Chapter_Equ1.gif)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \begin{array}{c}\left[\kern0.1em \begin{array}{c}\hfill {v}_1^{(1)}\hfill
    \\ {}\hfill {v}_2^{(1)}\hfill \end{array}\kern0.1em \right]\kern0.62em =\kern0.62em
    \left[\kern0.1em \begin{array}{cc}\hfill {w}_{11}^{(1)}\hfill & \hfill {w}_{12}^{(1)}\hfill
    \\ {}\hfill {w}_{21}^{(1)}\hfill & \hfill {w}_{22}^{(1)}\hfill \end{array}\kern0.1em
    \right]\left[\kern0.1em \begin{array}{c}\hfill {x}_1\hfill \\ {}\hfill {x}_2\hfill
    \end{array}\kern0.1em \right]\\ {}\triangleq \kern0.62em {W}_1\kern0.1em x\end{array}
    $$](A448947_1_En_3_Chapter_Equ1.gif)'
- en: (Equation 3.1)
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: （方程式 3.1）
- en: When we put this weighted sum , Equation 3.1, into the activation function,
    we obtain the output from the hidden nodes .
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们将这个加权求和（方程式 3.1）放入激活函数中时，我们获得隐藏节点的输出。
- en: '![$$ \left[\;\begin{array}{c}\hfill {y}_1^{(1)}\hfill \\ {}\hfill {y}_2^{(1)}\hfill
    \end{array}\;\right]\kern0.62em =\kern0.62em \left[\;\begin{array}{c}\hfill \varphi
    \left({v}_1^{(1)}\right)\hfill \\ {}\hfill \varphi \left({v}_2^{(1)}\right)\hfill
    \end{array}\;\right] $$](A448947_1_En_3_Chapter_Equa.gif)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \left[\;\begin{array}{c}\hfill {y}_1^{(1)}\hfill \\ {}\hfill {y}_2^{(1)}\hfill
    \end{array}\;\right]\kern0.62em =\kern0.62em \left[\;\begin{array}{c}\hfill \varphi
    \left({v}_1^{(1)}\right)\hfill \\ {}\hfill \varphi \left({v}_2^{(1)}\right)\hfill
    \end{array}\;\right] $$](A448947_1_En_3_Chapter_Equa.gif)'
- en: 'where y [1]^((1)) and y [2]^((1)) are outputs from the corresponding hidden
    nodes. In a similar manner, the weighted sum of the output nodes is calculated
    as:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 y [1]^((1)) 和 y [2]^((1)) 是相应隐藏节点的输出。以类似的方式，计算输出节点的加权求和：
- en: '![$$ \begin{array}{c}\left[\;\begin{array}{c}\hfill {v}_1\hfill \\ {}\hfill
    {v}_2\hfill \end{array}\kern0.1em \right]\kern0.62em =\kern0.62em \left[\;\begin{array}{cc}\hfill
    {w}_{11}^{(2)}\hfill & \hfill {w}_{12}^{(2)}\hfill \\ {}\hfill {w}_{21}^{(2)}\hfill
    & \hfill {w}_{22}^{(2)}\hfill \end{array}\;\right]\left[\;\begin{array}{c}\hfill
    {y}_1^{(1)}\hfill \\ {}\hfill {y}_2^{(1)}\hfill \end{array}\kern0.1em \right]\\
    {}\triangleq \kern0.62em {W}_2\kern0.2em {y}^{(1)}\end{array} $$](A448947_1_En_3_Chapter_Equ2.gif)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \begin{array}{c}\left[\;\begin{array}{c}\hfill {v}_1\hfill \\ {}\hfill
    {v}_2\hfill \end{array}\kern0.1em \right]\kern0.62em =\kern0.62em \left[\;\begin{array}{cc}\hfill
    {w}_{11}^{(2)}\hfill & \hfill {w}_{12}^{(2)}\hfill \\ {}\hfill {w}_{21}^{(2)}\hfill
    & \hfill {w}_{22}^{(2)}\hfill \end{array}\;\right]\left[\;\begin{array}{c}\hfill
    {y}_1^{(1)}\hfill \\ {}\hfill {y}_2^{(1)}\hfill \end{array}\kern0.1em \right]\\
    {}\triangleq \kern0.62em {W}_2\kern0.2em {y}^{(1)}\end{array} $$](A448947_1_En_3_Chapter_Equ2.gif)'
- en: (Equation 3.2)
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: （方程式 3.2）
- en: As we put this weighted sum into the activation function, the neural network
    yields the output.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们将这个加权求和放入激活函数中时，神经网络就会产生输出。
- en: '![$$ \left[\;\begin{array}{c}\hfill {y}_1\hfill \\ {}\hfill {y}_2\hfill \end{array}\kern0.1em
    \right]\kern0.62em =\kern0.62em \left[\;\begin{array}{c}\hfill \varphi \left({v}_1\right)\hfill
    \\ {}\hfill \varphi \left({v}_2\right)\hfill \end{array}\kern0.1em \right] $$](A448947_1_En_3_Chapter_Equb.gif)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \left[\;\begin{array}{c}\hfill {y}_1\hfill \\ {}\hfill {y}_2\hfill \end{array}\kern0.1em
    \right]\kern0.62em =\kern0.62em \left[\;\begin{array}{c}\hfill \varphi \left({v}_1\right)\hfill
    \\ {}\hfill \varphi \left({v}_2\right)\hfill \end{array}\kern0.1em \right] $$](A448947_1_En_3_Chapter_Equb.gif)'
- en: Now, we will train the neural network using the back-propagation algorithm.
    The first thing to calculate is delta , δ, of each node. You may ask, “Is this
    delta the one from the delta rule?” It is! In order to avoid confusion, the diagram
    in Figure [3-3](#Fig3) has been redrawn with the unnecessary connections dimmed
    out.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们将使用反向传播算法来训练神经网络。首先需要计算每个节点的 delta（δ）。你可能问：“这是否是 delta 规则中的 delta？”是的！为了避免混淆，图
    [3-3](#Fig3) 中的图已经被重新绘制，不必要的连接已被淡化。
- en: '![A448947_1_En_3_Fig3_HTML.gif](A448947_1_En_3_Fig3_HTML.gif)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_3_Fig3_HTML.gif](A448947_1_En_3_Fig3_HTML.gif)'
- en: Figure 3-3.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-3.
- en: Train the neural network using the back-propagation algorithm
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 使用反向传播算法训练神经网络
- en: 'In the back-propagation algorithm , the delta of the output node is defined
    identically to the delta rule of the “Generalized Delta Rule” section in Chapter
    [2](A448947_1_En_2_Chapter.html), as follows:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在反向传播算法中，输出节点的delta被定义为与第[2](A448947_1_En_2_Chapter.html)章“广义delta规则”部分中的delta规则相同，如下所示：
- en: '![$$ \begin{array}{c}{e}_1\kern0.62em =\kern0.62em {d}_1\kern0.5em -\kern0.5em
    {y}_1\\ {}{\delta}_1\kern0.62em =\kern0.62em {\varphi}^{\prime}\left({v}_1\right)\;{e}_1\\
    {}\\ {}{e}_2\kern0.62em =\kern0.62em {d}_2\kern0.5em -\kern0.5em {y}_2\\ {}{\delta}_2\kern0.62em
    =\kern0.62em {\varphi}^{\prime}\left({v}_2\right)\;{e}_2\end{array} $$](A448947_1_En_3_Chapter_Equ3.gif)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![公式](A448947_1_En_3_Chapter_Equ3.gif)'
- en: (Equation 3.3) where ![$$ {\varphi}^{\prime}\left(\cdot \right) $$](A448947_1_En_3_Chapter_IEq1.gif)
    is the derivative of the activation function of the output node, y [ i ] is the
    output from the output node, d [ i ] is the correct output from the training data,
    and v [ i ] is the weighted sum of the corresponding node.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: （方程3.3）其中![导数](A448947_1_En_3_Chapter_IEq1.gif)是输出节点激活函数的导数，y[i]是输出节点的输出，d[i]是训练数据的正确输出，v[i]是对应节点的加权求和。
- en: Since we have the delta for every output node, let’s proceed leftward to the
    hidden nodes and calculate the delta (Figure [3-4](#Fig4)). Again, unnecessary
    connections are dimmed out for convenience.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们有了每个输出节点的delta，让我们从隐藏节点向左进行并计算delta（图[3-4](#Fig4)）。再次，为了方便，不必要的连接被暗淡处理。
- en: '![A448947_1_En_3_Fig4_HTML.gif](A448947_1_En_3_Fig4_HTML.gif)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![图](A448947_1_En_3_Fig4_HTML.gif)'
- en: Figure 3-4.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-4。
- en: Proceed leftward to the hidden nodes and calculate the delta
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 从隐藏节点向左进行，并计算delta
- en: 'As addressed at the beginning of the chapter, the issue of the hidden node
    is how to define the error. In the back-propagation algorithm, the error of the
    node is defined as the weighted sum of the back-propagated deltas from the layer
    on the immediate right (in this case, the output layer). Once the error is obtained,
    the calculation of the delta from the node is the same as that of Equation 3.3\.
    This process can be expressed as follows:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 如本章开头所述，隐藏节点的问题是如何定义误差。在反向传播算法中，节点的误差被定义为从紧邻的层（在这种情况下，输出层）反向传播的delta的加权和。一旦获得误差，从节点计算delta的计算与方程3.3相同。这个过程可以表示如下：
- en: '![$$ \begin{array}{c}{e}_1^{(1)}\kern0.62em =\kern0.62em {w}_{11}^{(2)}\kern0.1em
    {\delta}_1\kern0.5em +\kern0.5em {w}_{21}^{(2)}\kern0.1em {\delta}_2\\ {}{\delta}_1^{(1)}\kern0.62em
    =\kern0.62em {\varphi}^{\prime}\left({v}_1^{(1)}\right)\;{e}_1^{(1)}\\ {}\\ {}{e}_2^{(1)}\kern0.62em
    =\kern0.62em {w}_{12}^{(2)}\kern0.1em {\delta}_1\kern0.5em +\kern0.5em {w}_{22}^{(2)}\kern0.1em
    {\delta}_2\\ {}{\delta}_2^{(1)}\kern0.62em =\kern0.62em {\varphi}^{\prime}\left({v}_2^{(1)}\right)\;{e}_2^{(1)}\end{array}
    $$](A448947_1_En_3_Chapter_Equ4.gif)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![公式](A448947_1_En_3_Chapter_Equ4.gif)'
- en: (Equation 3.4) where and are the weight sums of the forward signals at the respective
    nodes . It is noticeable from this equation that the forward and backward processes
    are identically applied to the hidden nodes as well as the output nodes. This
    implies that the output and hidden nodes experience the same backward process.
    The only difference is the error calculation (Figure [3-5](#Fig5)).
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: （方程3.4）其中和是相应节点的前向信号的权重和。从这个方程中可以看出，前向和反向过程同样应用于隐藏节点和输出节点。这表明输出节点和隐藏节点经历了相同的反向过程。唯一的区别是误差计算（图[3-5](#Fig5)）。
- en: '![A448947_1_En_3_Fig5_HTML.gif](A448947_1_En_3_Fig5_HTML.gif)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![图](A448947_1_En_3_Fig5_HTML.gif)'
- en: Figure 3-5.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-5。
- en: The error calculation is the only difference
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 误差计算是唯一的区别
- en: In summary, the error of the hidden node is calculated as the backward weighted
    sum of the delta, and the delta of the node is the product of the error and the
    derivative of the activation function. This process begins at the output layer
    and repeats for all hidden layers. This pretty much explains what the back-propagation
    algorithm is about.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，隐藏节点的误差是通过delta的反向加权求和来计算的，而节点的delta是误差和激活函数导数的乘积。这个过程从输出层开始，并重复应用于所有隐藏层。这基本上解释了反向传播算法的内容。
- en: 'The two error calculation formulas of Equation 3.4 are combined in a matrix
    equation as follows:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 公式 3.4 的两个误差计算公式被合并成一个矩阵方程，如下所示：
- en: '![$$ \left[\kern0.2em \begin{array}{c}\hfill {e}_1^{(1)}\hfill \\ {}\hfill
    {e}_2^{(1)}\hfill \end{array}\kern0.1em \right]\kern0.62em =\kern0.62em \left[\kern0.22em
    \begin{array}{cc}\hfill {w}_{11}^{(2)}\hfill & \hfill {w}_{21}^{(2)}\hfill \\
    {}\hfill {w}_{12}^{(2)}\hfill & \hfill {w}_{22}^{(2)}\hfill \end{array}\kern0.2em
    \right]\left[\kern0.22em \begin{array}{c}\hfill {\delta}_1\hfill \\ {}\hfill {\delta}_2\hfill
    \end{array}\kern0.2em \right] $$](A448947_1_En_3_Chapter_Equ5.gif)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![矩阵运算公式](A448947_1_En_3_Chapter_Equ5.gif)'
- en: (Equation 3.5)
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: (公式 3.5)
- en: 'Compare this equation with the neural network output of Equation 3.2\. The
    matrix of Equation 3.5 is the result of transpose of the weight matrix, W, of
    Equation 3.2.[²](#Fn2) Therefore, Equation 3.5 can be rewritten as:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 将这个方程与公式 3.2 的神经网络输出进行比较。公式 3.5 的矩阵是公式 3.2 中权重矩阵 W 的转置结果。[²](#Fn2) 因此，公式 3.5
    可以重写为：
- en: '![$$ \left[\kern0.1em \begin{array}{c}\hfill {e}_1^{(1)}\hfill \\ {}\hfill
    {e}_2^{(1)}\hfill \end{array}\kern0.1em \right]\kern0.62em =\kern0.62em {W}_2^T\left[\kern0.1em
    \begin{array}{c}\hfill {\delta}_1\hfill \\ {}\hfill {\delta}_2\hfill \end{array}\kern0.1em
    \right] $$](A448947_1_En_3_Chapter_Equ6.gif)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![矩阵运算公式](A448947_1_En_3_Chapter_Equ6.gif)'
- en: (Equation 3.6)
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: (公式 3.6)
- en: This equation indicates that we can obtain the error as the product of the transposed
    weight matrix and delta vector. This very useful attribute allows an easier implementation
    of the algorithm .
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这个公式表明，我们可以通过转置权重矩阵和delta向量的乘积来获得误差。这个非常有用的属性使得算法的实现更加容易。
- en: If we have additional hidden layers , we will just repeat the same backward
    process for each hidden layer and calculate all the deltas. Once all the deltas
    have been calculated, we will be ready to train the neural network. Just use the
    following equation to adjust the weights of the respective layers.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们还有额外的隐藏层，我们只需对每个隐藏层重复相同的反向过程，并计算所有delta。一旦所有delta都被计算出来，我们就可以准备训练神经网络了。只需使用以下方程来调整各层的权重。
- en: '![$$ \begin{array}{c}\triangle {w}_{i j}\kern0.62em =\kern0.62em \alpha \kern0.1em
    {\delta}_i{x}_j\\ {}{w}_{i j}\kern0.62em \leftarrow \kern0.62em {w}_{i j}\kern0.5em
    +\kern0.5em \triangle {w}_{i j}\end{array} $$](A448947_1_En_3_Chapter_Equ7.gif)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![权重调整公式](A448947_1_En_3_Chapter_Equ7.gif)'
- en: (Equation 3.7) where x [j] is the input signal for the corresponding weight.
    For convenience, we omit the layer indicator from this equation. What do you see
    now? Isn’t this equation the same as that of the delta rule of the previous section?
    Yes, they are the same. The mere difference is the deltas of the hidden nodes,
    which are obtained from the backward calculation using the output error of the
    neural network.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: (公式 3.7) 其中 x [j] 是对应权重的输入信号。为了方便，我们从这个公式中省略了层指示符。你现在看到了什么？这个公式不是和上一节中delta规则的公式一样吗？是的，它们是相同的。唯一的区别是隐藏节点的delta，它是通过使用神经网络的输出误差进行反向计算得到的。
- en: We will proceed a bit further and derive the equation to adjust the weight using
    Equation 3.7\. Consider the weight for example.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将进一步推导出使用公式 3.7 调整权重的方程。以权重为例。
- en: 'The weight of Figure [3-6](#Fig6) can be adjusted using Equation 3.7 as:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [3-6](#Fig6) 中的权重可以使用公式 3.7 来调整：
- en: '![$$ {w}_{21}^{(2)}\kern0.62em \leftarrow \kern0.62em {w}_{21}^{(2)}\kern0.5em
    +\kern0.5em \alpha \kern0.1em {\delta}_2\kern0.1em {y}_1^{(1)} $$](A448947_1_En_3_Chapter_Equc.gif)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {w}_{21}^{(2)}\kern0.62em \leftarrow \kern0.62em {w}_{21}^{(2)}\kern0.5em
    +\kern0.5em \alpha \kern0.1em {\delta}_2\kern0.1em {y}_1^{(1)} $$](A448947_1_En_3_Chapter_Equc.gif)'
- en: where y [1]^((1)) is the output of the first hidden node . Here is another example.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 y [1]^((1)) 是第一个隐藏节点的输出。这里还有一个例子。
- en: '![A448947_1_En_3_Fig6_HTML.gif](A448947_1_En_3_Fig6_HTML.gif)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_3_Fig6_HTML.gif](A448947_1_En_3_Fig6_HTML.gif)'
- en: Figure 3-6.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-6。
- en: Derive the equation to adjust the weight
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 推导调整权重的方程
- en: 'The weight w [11]^((1)) of Figure [3-7](#Fig7) is adjusted using Equation 3.7
    as:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 图[3-7](#Fig7)中的权重 w [11]^((1)) 使用方程3.7进行调整：
- en: '![$$ {w}_{11}^{(1)}\kern0.62em \leftarrow \kern0.62em {w}_{11}^{(1)}\kern0.5em
    +\kern0.5em \alpha {\delta}_1^{(1)}\kern0.1em {x}_1 $$](A448947_1_En_3_Chapter_Equd.gif)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {w}_{11}^{(1)}\kern0.62em \leftarrow \kern0.62em {w}_{11}^{(1)}\kern0.5em
    +\kern0.5em \alpha {\delta}_1^{(1)}\kern0.1em {x}_1 $$](A448947_1_En_3_Chapter_Equd.gif)'
- en: where x [1] is the output of the first input node, i.e., the first input of
    the neural network.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 x [1] 是第一个输入节点的输出，即神经网络的第一个输入。
- en: '![A448947_1_En_3_Fig7_HTML.gif](A448947_1_En_3_Fig7_HTML.gif)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_3_Fig7_HTML.gif](A448947_1_En_3_Fig7_HTML.gif)'
- en: Figure 3-7.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-7。
- en: Derive the equation to adjust the weight , again
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 再次推导调整权重的方程
- en: Let’s organize the process to train the neural network using the back-propagation
    algorithm.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们组织使用反向传播算法训练神经网络的流程。
- en: Initialize the weights with adequate values.
  id: totrans-65
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用适当的值初始化权重。
- en: Enter the input from the training data `{ input, correct output }` and obtain
    the neural network’s output. Calculate the error of the output to the correct
    output and the delta, δ, of the output nodes.
  id: totrans-66
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输入训练数据 `{ input, correct output }` 并获得神经网络的输出。计算输出与正确输出之间的误差以及输出节点的delta，δ。
- en: '![$$ \begin{array}{c} e\kern0.62em =\kern1em d\kern0.5em -\kern0.5em y\\ {}\delta
    \kern0.62em =\kern0.62em {\varphi}^{\prime }(v)\; e\end{array} $$](A448947_1_En_3_Chapter_Eque.gif)'
  id: totrans-67
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![$$ \begin{array}{c} e\kern0.62em =\kern1em d\kern0.5em -\kern0.5em y\\ {}\delta
    \kern0.62em =\kern0.62em {\varphi}^{\prime }(v)\; e\end{array} $$](A448947_1_En_3_Chapter_Eque.gif)'
- en: Propagate the output node delta, δ, backward, and calculate the deltas of the
    immediate next (left) nodes.
  id: totrans-68
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将输出节点的delta，δ，向后传播，并计算紧邻的（左侧）节点的delta。
- en: '![$$ \begin{array}{c}{e}^{(k)}\kern0.62em =\kern0.62em {W}^T\delta \\ {}{\delta}^{(k)}\kern0.62em
    =\kern0.62em {\varphi}^{\prime}\left({v}^{(k)}\right)\;{e}^{(k)}\end{array} $$](A448947_1_En_3_Chapter_Equf.gif)'
  id: totrans-69
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![$$ \begin{array}{c}{e}^{(k)}\kern0.62em =\kern0.62em {W}^T\delta \\ {}{\delta}^{(k)}\kern0.62em
    =\kern0.62em {\varphi}^{\prime}\left({v}^{(k)}\right)\;{e}^{(k)}\end{array} $$](A448947_1_En_3_Chapter_Equf.gif)'
- en: Repeat Step 3 until it reaches the hidden layer that is on the immediate right
    of the input layer.
  id: totrans-70
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重复步骤3，直到达到输入层右侧的紧邻隐藏层。
- en: Adjust the weights according to the following learning rule .
  id: totrans-71
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 根据以下学习规则调整权重。
- en: '![$$ \begin{array}{c}\triangle {w}_{i j}\kern0.62em =\kern0.62em \alpha \kern0.1em
    {\delta}_i{x}_j\\ {}{w}_{i j}\kern0.62em \leftarrow \kern0.62em {w}_{i j}\kern0.5em
    +\kern0.5em \triangle {w}_{i j}\end{array} $$](A448947_1_En_3_Chapter_Equg.gif)'
  id: totrans-72
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![$$ \begin{array}{c}\triangle {w}_{i j}\kern0.62em =\kern0.62em \alpha \kern0.1em
    {\delta}_i{x}_j\\ {}{w}_{i j}\kern0.62em \leftarrow \kern0.62em {w}_{i j}\kern0.5em
    +\kern0.5em \triangle {w}_{i j}\end{array} $$](A448947_1_En_3_Chapter_Equg.gif)'
- en: Repeat Steps 2-5 for every training data point.
  id: totrans-73
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对每个训练数据点重复步骤2-5。
- en: Repeat Steps 2-6 until the neural network is properly trained.
  id: totrans-74
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重复步骤2-6，直到神经网络得到适当的训练。
- en: Other than Steps 3 and 4, in which the output delta propagates backward to obtain
    the hidden node delta, this process is basically the same as that of the delta
    rule, which was previously discussed. Although this example has only one hidden
    layer, the back-propagation algorithm is applicable for training many hidden layers.
    Just repeat Step 3 of the previous algorithm for each hidden layer.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 除了步骤3和4，其中输出delta向后传播以获得隐藏节点的delta之外，这个过程基本上与之前讨论的delta规则相同。尽管这个例子只有一个隐藏层，但反向传播算法适用于训练多个隐藏层。只需重复前一个算法的步骤3即可为每个隐藏层。
- en: 'Example: Back-Propagation'
  id: totrans-76
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例：反向传播
- en: In this section, we implement the back-propagation algorithm. The training data
    contains four elements as shown in the following table. Of course, as this is
    about supervised learning, the data includes input and correct output pairs. The
    bolded rightmost number of the data is the correct output. As you may have noticed,
    this data is the same one that we used in Chapter [2](A448947_1_En_2_Chapter.html)
    for the training of the single-layer neural network; the one that the single-layer
    neural network had failed to learn.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们实现反向传播算法。训练数据包含以下表格所示的四个元素。当然，由于这是关于监督学习，数据包括输入和正确输出对。数据中加粗的最右边的数字是正确输出。如您所注意到的，这些数据与我们在第
    [2](A448947_1_En_2_Chapter.html) 章节中用于训练单层神经网络的相同；单层神经网络未能学会的那个。
- en: '![A448947_1_En_3_Figa_HTML.gif](A448947_1_En_3_Figa_HTML.gif)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_3_Figa_HTML.gif](A448947_1_En_3_Figa_HTML.gif)'
- en: Ignoring the third value, the Z-axis, of the input, this dataset actually provides
    the XOR logic operations. Therefore, if we train the neural network with this
    dataset, we would get the XOR operation model.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 忽略输入的第三个值，即 Z 轴，这个数据集实际上提供了 XOR 逻辑运算。因此，如果我们用这个数据集训练神经网络，我们就会得到 XOR 运算模型。
- en: Consider a neural network that consists of three input nodes and a single output
    node, as shown in Figure [3-8](#Fig8). It has one hidden layer of four nodes.
    The sigmoid function is used as the activation function for the hidden nodes and
    the output node.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑一个由三个输入节点和一个输出节点组成的神经网络，如图 [3-8](#Fig8) 所示。它有一个包含四个节点的隐藏层。sigmoid 函数被用作隐藏节点和输出节点的激活函数。
- en: '![A448947_1_En_3_Fig8_HTML.gif](A448947_1_En_3_Fig8_HTML.gif)'
  id: totrans-81
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_3_Fig8_HTML.gif](A448947_1_En_3_Fig8_HTML.gif)'
- en: Figure 3-8.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-8。
- en: Neural network that consists of three input nodes and a single output node
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 由三个输入节点和一个输出节点组成的神经网络
- en: 'This section employs SGD for the implementation of the back-propagation algorithm.
    Of course, the batch method will work as well. What we have to do is use the average
    of the weight updates, as shown in the example in the “Example: Delta Rule” section
    of Chapter [2](A448947_1_En_2_Chapter.html). Since the primary objective of this
    section is to understand the back-propagation algorithm, we will stick to a simpler
    and more intuitive method: the SGD.'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 本节使用 SGD 实现反向传播算法。当然，批量方法也可以工作。我们必须做的是使用权重更新的平均值，如第 [2](A448947_1_En_2_Chapter.html)
    章节中“示例：delta 规则”部分的例子所示。由于本节的主要目标是理解反向传播算法，我们将坚持使用更简单、更直观的方法：SGD。
- en: XOR Problem
  id: totrans-85
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: XOR 问题
- en: The function `BackpropXOR`, which implements the back-propagation algorithm
    using the SGD method, takes the network’s weights and training data and returns
    the adjusted weights.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 函数 `BackpropXOR`，使用 SGD 方法实现反向传播算法，接收网络的权重和训练数据，并返回调整后的权重。
- en: '[PRE0]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: where `W1` and `W2` carries the weight matrix of the respective layer. `W1`
    is the weight matrix between the input layer and hidden layer and `W2` is the
    weight matrix between the hidden layer and output layer. `X` and `D` are the input
    and correct output of the training data, respectively. The following listing shows
    the `BackpropXOR.m` file, which implements the `BackpropXOR` function .
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 `W1` 和 `W2` 分别携带各自层的权重矩阵。`W1` 是输入层和隐藏层之间的权重矩阵，`W2` 是隐藏层和输出层之间的权重矩阵。`X` 和
    `D` 分别是训练数据的输入和正确输出。以下列表展示了 `BackpropXOR.m` 文件，该文件实现了 `BackpropXOR` 函数。
- en: '[PRE1]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'The code takes point from the training dataset, calculates the weight update,
    `dW`, using the delta rule, and adjusts the weights. So far, the process is almost
    identical to that of the example code of Chapter [2](A448947_1_En_2_Chapter.html).
    The slight differences are the two calls of the function `Sigmoid` for the output
    calculation and the addition of the delta (`delta1`) calculation using the back-propagation
    of the output delta as follows:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 代码从训练数据集中获取点，使用 delta 规则计算权重更新 `dW`，并调整权重。到目前为止，这个过程几乎与第 [2](A448947_1_En_2_Chapter.html)
    章节示例代码中的过程相同。略有不同的是，输出计算时对函数 `Sigmoid` 的两次调用，以及使用输出 delta 的反向传播添加 delta (`delta1`)
    计算如下：
- en: '[PRE2]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: where the calculation of the error, `e1`, is the implementation of Equation
    3.6\. As this involves the back-propagation of the delta, we use the transpose
    matrix, `W2'`. The delta (`delta1`) calculation has an element-wise product operator,
    `.*`, because the variables are vectors. The element-wise operator of MATLAB has
    a dot (period) in front of the normal operator and performs an operation on each
    element of the vector. This operator enables simultaneous calculations of deltas
    from many nodes.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 其中，误差计算`e1`是方程3.6的实现。由于这涉及到delta的反向传播，我们使用转置矩阵`W2'`。delta（`delta1`）计算有一个元素级乘法运算符`.*`，因为变量是向量。MATLAB的元素级运算符在正常运算符前有一个点（圆点），并对向量的每个元素执行操作。此运算符使得可以从许多节点同时计算delta。
- en: The function `Sigmoid`, which the `BackpropXOR` code calls, also replaced the
    division with the element-wise division `./` to account for the vector.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: '`BackpropXOR`代码调用的`Sigmoid`函数，也将除法替换为元素级除法`./`以处理向量。'
- en: '[PRE3]'
  id: totrans-94
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'The modified `Sigmoid` function can operate using vectors as shown by the following
    example:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 修改后的`Sigmoid`函数可以像以下示例所示使用向量。
- en: '[PRE4]'
  id: totrans-96
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: The program listing that follows shows the `TestBackpropXOR.m` file, which tests
    the function `BackpropXOR`. This program calls in the `BackpropXOR` function and
    trains the neural network 10,000 times. The input is given to the trained network,
    and its output is shown on the screen. The training performance can be verified
    as we compare the output to the correct outputs of the training data. Further
    details are omitted, as the program is almost identical to that of Chapter [2](A448947_1_En_2_Chapter.html).
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的程序列表显示了`TestBackpropXOR.m`文件，该文件用于测试`BackpropXOR`函数。此程序调用`BackpropXOR`函数，并对神经网络进行10,000次训练。输入被提供给训练好的网络，其输出显示在屏幕上。我们可以通过将输出与训练数据的正确输出进行比较来验证训练性能。进一步的细节被省略，因为程序几乎与第[2](A448947_1_En_2_Chapter.html)章中的程序相同。
- en: '[PRE5]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Execute the code , and find the following values on the screen. These values
    are very close to the correct output, `D`, indicating that the neural network
    has been properly trained. Now we have confirmed that the multi-layer neural network
    solves the XOR problem , which the single-layer network had failed to model properly.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 执行代码，并在屏幕上找到以下值。这些值非常接近正确输出`D`，表明神经网络已经得到了适当的训练。现在我们已经确认多层神经网络解决了XOR问题，这是单层网络未能正确建模的问题。
- en: '![$$ \left[\kern0.1em \begin{array}{c}\hfill 0.0060\hfill \\ {}\hfill 0.9888\hfill
    \\ {}\hfill 0.9891\hfill \\ {}\hfill 0.0134\hfill \end{array}\kern0.1em \right]\kern2em
    \iff \kern2em D\kern0.5em =\kern0.5em \left[\;\begin{array}{c}\hfill 0\hfill \\
    {}\hfill 1\hfill \\ {}\hfill 1\hfill \\ {}\hfill 0\hfill \end{array}\;\right]
    $$](A448947_1_En_3_Chapter_Equh.gif)'
  id: totrans-100
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \left[\kern0.1em \begin{array}{c}\hfill 0.0060\hfill \\ {}\hfill 0.9888\hfill
    \\ {}\hfill 0.9891\hfill \\ {}\hfill 0.0134\hfill \end{array}\kern0.1em \right]\kern2em
    \iff \kern2em D\kern0.5em =\kern0.5em \left[\;\begin{array}{c}\hfill 0\hfill \\
    {}\hfill 1\hfill \\ {}\hfill 1\hfill \\ {}\hfill 0\hfill \end{array}\;\right]
    $$](A448947_1_En_3_Chapter_Equh.gif)'
- en: Momentum
  id: totrans-101
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 动量
- en: This section explores the variations of the weight adjustment. So far, the weight
    adjustment has relied on the simplest forms of Equations 2.7 and 3.7\. However,
    there are various weight adjustment forms available.[³](#Fn3) The benefits of
    using the advanced weight adjustment formulas include higher stability and faster
    speeds in the training process of the neural network. These characteristics are
    especially favorable for Deep Learning as it is hard to train. This section only
    covers the formulas that contain momentum, which have been used for a long time.
    If necessary, you may want to study this further with the link shown in the footnote.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 本节探讨了权重调整的变体。到目前为止，权重调整依赖于方程2.7和3.7的最简单形式。然而，有各种权重调整形式可供选择。[³](#Fn3)使用高级权重调整公式的优点包括神经网络训练过程中的更高稳定性和更快速度。这些特性对于深度学习特别有利，因为深度学习很难训练。本节仅涵盖包含动量的公式，这些公式已经被使用了很长时间。如果需要，你可以通过脚注中显示的链接进一步研究。
- en: The momentum, m, is a term that is added to the delta rule for adjusting the
    weight. The use of the momentum term drives the weight adjustment to a certain
    direction to some extent, rather than producing an immediate change. It acts similarly
    to physical momentum, which impedes the reaction of the body to the external forces.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 动量，m，是一个用于调整权重的规则中的术语。动量项的使用在一定程度上将权重调整驱动到某个方向，而不是产生即时变化。它类似于物理动量，阻碍了身体对外部力的反应。
- en: '![$$ \begin{array}{c}\triangle w\kern1em =\kern1.12em \alpha \delta x\\ {}
    m\kern1em =\kern1em \triangle w\kern0.5em +\kern0.5em \beta {m}^{-}\\ {} w\kern1em
    =\kern1.12em w\kern0.5em +\kern0.5em m\\ {}{m}^{-}\kern1em =\kern1em m\end{array}
    $$](A448947_1_En_3_Chapter_Equ8.gif)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \begin{array}{c}\triangle w\kern1em =\kern1.12em \alpha \delta x\\ {}
    m\kern1em =\kern1em \triangle w\kern0.5em +\kern0.5em \beta {m}^{-}\\ {} w\kern1em
    =\kern1.12em w\kern0.5em +\kern0.5em m\\ {}{m}^{-}\kern1em =\kern1em m\end{array}
    $$](A448947_1_En_3_Chapter_Equ8.gif)'
- en: '(Equation 3.8) where ![$$ {m}^{-} $$](A448947_1_En_3_Chapter_IEq2.gif) is the
    previous momentum and β is a positive constant that is less than 1\. Let’s briefly
    see why we modify the weight adjustment formula in this manner. The following
    steps show how the momentum changes over time:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: （公式3.8）其中![$$ {m}^{-} $$](A448947_1_En_3_Chapter_IEq2.gif)是先前的动量，β是一个小于1的正常数。让我们简要地看看为什么我们以这种方式修改权重调整公式。以下步骤展示了动量随时间的变化：
- en: '![$$ \begin{array}{c} m(0)\kern0.62em =\kern0.62em 0\\ {} m(1)\kern0.62em =\kern0.62em
    \triangle w(1)+\beta m(0)\kern0.62em =\kern0.62em \triangle w(1)\\ {} m(2)\kern0.62em
    =\kern0.62em \triangle w(2)+\beta m(1)\kern0.62em =\kern0.62em \triangle w(2)+\beta
    \triangle w(1)\\ {} m(3)\kern0.62em =\kern0.62em \triangle w(3)+\beta m(2)\kern0.62em
    =\kern0.62em \triangle w(3)+\beta \left\{\triangle w(2)+\beta \triangle w(1)\right\}\kern0.62em
    =\kern0.62em \triangle w(3)+\beta \triangle w(2)+{\beta}^2\triangle w(1)\\ {}\vdots
    \end{array} $$](A448947_1_En_3_Chapter_Equi.gif)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \begin{array}{c} m(0)\kern0.62em =\kern0.62em 0\\ {} m(1)\kern0.62em =\kern0.62em
    \triangle w(1)+\beta m(0)\kern0.62em =\kern0.62em \triangle w(1)\\ {} m(2)\kern0.62em
    =\kern0.62em \triangle w(2)+\beta m(1)\kern0.62em =\kern0.62em \triangle w(2)+\beta
    \triangle w(1)\\ {} m(3)\kern0.62em =\kern0.62em \triangle w(3)+\beta m(2)\kern0.62em
    =\kern0.62em \triangle w(3)+\beta \left\{\triangle w(2)+\beta \triangle w(1)\right\}\kern0.62em
    =\kern0.62em \triangle w(3)+\beta \triangle w(2)+{\beta}^2\triangle w(1)\\ {}\vdots
    \end{array} $$](A448947_1_En_3_Chapter_Equi.gif)'
- en: It is noticeable from these steps that the previous weight update, i.e. ∆w(1),
    ∆w(2), ∆w(3), etc., is added to each momentum over the process. Since β is less
    than 1, the older weight update exerts a lesser influence on the momentum. Although
    the influence diminishes over time, the old weight updates remain in the momentum.
    Therefore, the weight is not solely affected by a particular weight update value.
    Therefore, the learning stability improves. In addition, the momentum grows more
    and more with weight updates. As a result, the weight update becomes greater and
    greater as well. Therefore, the learning rate increases.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 从这些步骤中可以看出，先前的权重更新，即∆w(1)，∆w(2)，∆w(3)等，被添加到每个动量过程中。由于β小于1，旧的权重更新对动量的影响较小。尽管影响随时间减弱，但旧的权重更新仍然存在于动量中。因此，权重不仅仅受特定权重更新值的影响。因此，学习稳定性得到提高。此外，动量随着权重更新而越来越大。因此，权重更新变得越来越大。因此，学习率增加。
- en: The following listing shows the `BackpropMmt.m` file, which implements the back-propagation
    algorithm with the momentum. The `BackpropMmt` function operates in the same manner
    as that of the previous example; it takes the weights and training data and returns
    the adjusted weights. This listing employs the same variables as defined in the
    `BackpropXOR` function.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的列表展示了`BackpropMmt.m`文件，该文件实现了带有动量的反向传播算法。`BackpropMmt`函数与上一个示例中的操作方式相同；它接受权重和训练数据，并返回调整后的权重。此列表使用与`BackpropXOR`函数中定义的相同变量。
- en: '[PRE6]'
  id: totrans-109
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'The code initializes the momentums, `mmt1` and `mmt2`, as zeros when it starts
    the learning process. The weight adjustment formula is modified to reflect the
    momentum as:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 代码在开始学习过程时将动量`mmt1`和`mmt2`初始化为零。权重调整公式被修改以反映动量如下：
- en: '[PRE7]'
  id: totrans-111
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The following program listing shows the `TestBackpropMmt.m` file, which tests
    the function `BackpropMmt`. This program calls the `BackpropMmt` function and
    trains the neural network 10,000 times. The training data is fed to the neural
    network and the output is shown on the screen. The performance of the training
    is verified by comparing the output to the correct output of the training data.
    As this code is almost identical to that of the previous example, further explanation
    is omitted.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的程序列表展示了`TestBackpropMmt.m`文件，该文件测试`BackpropMmt`函数。此程序调用`BackpropMmt`函数并训练神经网络10,000次。训练数据被输入到神经网络中，输出显示在屏幕上。通过将输出与训练数据的正确输出进行比较来验证训练的性能。由于此代码几乎与上一个示例相同，因此省略了进一步的解释。
- en: '[PRE8]'
  id: totrans-113
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Cost Function and Learning Rule
  id: totrans-114
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 成本函数和学习规则
- en: This section briefly explains what the cost function [⁴](#Fn4) is and how it
    affects the learning rule of the neural network. The cost function is a rather
    mathematical concept that is associated with the optimization theory. You don’t
    have to know it. However, it is good to know if you want to better understand
    the learning rule of the neural network. It is not a difficult concept to follow.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 本节简要解释了成本函数[⁴](#Fn4)是什么以及它如何影响神经网络的学习规则。成本函数是一个相当数学的概念，与优化理论相关联。你不必了解它。然而，如果你想要更好地理解神经网络的学习规则，了解它是很有帮助的。这是一个不难理解的概念。
- en: The cost function is related to supervised learning of the neural network. Chapter
    [2](A448947_1_En_2_Chapter.html) addressed that supervised learning of the neural
    network is a process of adjusting the weights to reduce the error of the training
    data. In this context, the measure of the neural network’s error is the cost function.
    The greater the error of the neural network, the higher the value of the cost
    function is. There are two primary types of cost functions for the neural network’s
    supervised learning.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 成本函数与神经网络的监督学习相关。第[2](A448947_1_En_2_Chapter.html)章讨论了神经网络的监督学习是一个调整权重以减少训练数据误差的过程。在这种情况下，神经网络误差的度量是成本函数。神经网络的误差越大，成本函数的值就越高。对于神经网络的监督学习，有两种主要的成本函数类型。
- en: '![$$ J\kern1em =\kern1em {\displaystyle \sum_{i=1}^M\frac{1}{2}\kern0.5em {\left({d}_i\kern0.5em
    -\kern0.5em {y}_i\right)}^2} $$](A448947_1_En_3_Chapter_Equ9.gif)'
  id: totrans-117
  prefs: []
  type: TYPE_IMG
  zh: '![$$ J\kern1em =\kern1em {\displaystyle \sum_{i=1}^M\frac{1}{2}\kern0.5em {\left({d}_i\kern0.5em
    -\kern0.5em {y}_i\right)}^2} $$](A448947_1_En_3_Chapter_Equ9.gif)'
- en: (Equation 3.9)
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: （方程3.9）
- en: '![$$ J\kern1em =\kern1em {\displaystyle \sum_{i=1}^M\left\{-{d}_i \ln \left({y}_i\right)\kern0.5em
    -\kern0.5em \left(1-{d}_i\right) \ln \left(1-{y}_i\right)\right\}} $$](A448947_1_En_3_Chapter_Equ10.gif)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
  zh: '![$$ J\kern1em =\kern1em {\displaystyle \sum_{i=1}^M\left\{-{d}_i \ln \left({y}_i\right)\kern0.5em
    -\kern0.5em \left(1-{d}_i\right) \ln \left(1-{y}_i\right)\right\}} $$](A448947_1_En_3_Chapter_Equ10.gif)'
- en: (Equation 3.10) where y [i] is the output from the output node , d [i] is the
    correct output from the training data, and M is the number of output nodes.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: （方程3.10）其中y[i]是输出节点的输出，d[i]是训练数据的正确输出，M是输出节点的数量。
- en: First, consider the sum of squared error shown in Equation 3.9\. This cost function
    is the square of the difference between the neural network’s output, y, and the
    correct output, d. If the output and correct output are the same, the error becomes
    zero. In contrast, a greater difference between the two values leads to a larger
    error. This is illustrated in Figure [3-9](#Fig9).
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，考虑方程3.9中显示的平方误差和。这个成本函数是神经网络输出y与正确输出d之间差异的平方。如果输出和正确输出相同，误差变为零。相反，两个值之间的差异越大，误差就越大。这如图[3-9](#Fig9)所示。
- en: '![A448947_1_En_3_Fig9_HTML.gif](A448947_1_En_3_Fig9_HTML.gif)'
  id: totrans-122
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_3_Fig9_HTML.gif](A448947_1_En_3_Fig9_HTML.gif)'
- en: Figure 3-9.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-9。
- en: The greater the difference between the output and the correct output, the larger
    the error
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 输出与正确输出之间的差异越大，误差就越大
- en: It is clearly noticeable that the cost function value is proportional to the
    error. This relationship is so intuitive that no further explanation is necessary.
    Most early studies of the neural network employed this cost function to derive
    learning rules . Not only was the delta rule of the previous chapter derived from
    this function, but the back-propagation algorithm was as well. Regression problems
    still use this cost function.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 成本函数的值明显与误差成正比。这种关系如此直观，以至于无需进一步解释。大多数早期的神经网络研究都使用这个成本函数来推导学习规则。不仅上一章的delta规则是从这个函数推导出来的，反向传播算法也是如此。回归问题仍然使用这个成本函数。
- en: Now, consider the cost function of Equation 3.10\. The following formula, which
    is inside the curly braces, is called the cross entropy function .
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，考虑方程3.10的成本函数。括号内的以下公式被称为交叉熵函数。
- en: '![$$ E\kern1em =\kern1em - d \ln (y)\kern0.5em -\kern0.5em \left(1- d\right)
    \ln \left(1- y\right) $$](A448947_1_En_3_Chapter_Equj.gif)'
  id: totrans-127
  prefs: []
  type: TYPE_IMG
  zh: '![$$ E\kern1em =\kern1em - d \ln (y)\kern0.5em -\kern0.5em \left(1- d\right)
    \ln \left(1- y\right) $$](A448947_1_En_3_Chapter_Equj.gif)'
- en: 'It may be difficult to intuitively capture the cross entropy function’s relationship
    to the error. This is because the equation is contracted for simpler expression.
    Equation 3.10 is the concatenation of the following two equations:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 直观地捕捉交叉熵函数与误差之间的关系可能很困难。这是因为方程被简化以表达得更简单。方程3.10是以下两个方程的连接：
- en: '![$$ E\kern0.62em =\kern0.62em \left\{\begin{array}{c}\hfill - \ln (y)\kern2.5em
    d\kern0.5em =\kern0.5em 1\hfill \\ {}\hfill - \ln \left(1- y\right)\kern1.5em
    d\kern0.5em =\kern0.5em 0\hfill \end{array}\right. $$](A448947_1_En_3_Chapter_Equk.gif)'
  id: totrans-129
  prefs: []
  type: TYPE_IMG
  zh: '![$$ E\kern0.62em =\kern0.62em \left\{\begin{array}{c}\hfill - \ln (y)\kern2.5em
    d\kern0.5em =\kern0.5em 1\hfill \\ {}\hfill - \ln \left(1- y\right)\kern1.5em
    d\kern0.5em =\kern0.5em 0\hfill \end{array}\right. $$](A448947_1_En_3_Chapter_Equk.gif)'
- en: Due to the definition of a logarithm, the output, y, should be within 0 and
    1\. Therefore, the cross entropy cost function often teams up with sigmoid and
    softmax activation functions in the neural network.[⁵](#Fn5) Now we will see how
    this function is related to the error. Recall that cost functions should be proportional
    to the output error. What about this one?
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 由于对数函数的定义，输出 y 应在 0 和 1 之间。因此，交叉熵代价函数通常与 sigmoid 和 softmax 激活函数一起在神经网络中使用。[⁵](#Fn5)
    现在我们将看到这个函数与误差的关系。回想一下，代价函数应该与输出误差成正比。那么这个呢？
- en: Figure [3-10](#Fig10) shows the cross entropy function at ![$$ d\kern0.5em =\kern0.5em
    1 $$](A448947_1_En_3_Chapter_IEq3.gif).
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [3-10](#Fig10) 展示了 d = 1 时的交叉熵函数。
- en: '![A448947_1_En_3_Fig10_HTML.gif](A448947_1_En_3_Fig10_HTML.gif)'
  id: totrans-132
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_3_Fig10_HTML.gif](A448947_1_En_3_Fig10_HTML.gif)'
- en: Figure 3-10.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-10。
- en: The cross entropy function at d = 1
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: d = 1 时的交叉熵函数
- en: When the output y is 1, i.e., the error (![$$ d- y $$](A448947_1_En_3_Chapter_IEq4.gif))
    is 0, the cost function value is 0 as well. In contrast, when the output y approaches
    0, i.e., the error grows, the cost function value soars. Therefore, this cost
    function is proportional to the error.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 当输出 y 为 1，即误差 (![$$ d- y $$](A448947_1_En_3_Chapter_IEq4.gif)) 为 0 时，代价函数的值也为
    0。相反，当输出 y 接近 0，即误差增加时，代价函数的值急剧上升。因此，这个代价函数与误差成正比。
- en: Figure [3-11](#Fig11) shows the cost function at ![$$ d\kern0.5em =\kern0.5em
    0 $$](A448947_1_En_3_Chapter_IEq5.gif). If the output y is 0, the error is 0,
    the cost function yields 0\. When the output approaches 1, i.e., the error grows,
    the function value soars. Therefore, this cost function in this case is proportional
    to the error as well. These cases confirm that the cost function of Equation 3.10
    is proportional to the output error of the neural network.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [3-11](#Fig11) 展示了 d = 0 时的代价函数。如果输出 y 为 0，误差为 0，代价函数的值为 0。当输出接近 1，即误差增加时，函数值急剧上升。因此，在这种情况下，这个代价函数也与误差成正比。这些情况证实了方程
    3.10 的代价函数与神经网络的输出误差成正比。
- en: '![A448947_1_En_3_Fig11_HTML.gif](A448947_1_En_3_Fig11_HTML.gif)'
  id: totrans-137
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_3_Fig11_HTML.gif](A448947_1_En_3_Fig11_HTML.gif)'
- en: Figure 3-11.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-11。
- en: The cross entropy function at d = 0
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: d = 0 时的交叉熵函数
- en: The primary difference of the cross entropy function from the quadratic function
    of Equation 3.9 is its geometric increase. In other words, the cross entropy function
    is much more sensitive to the error. For this reason, the learning rules derived
    from the cross entropy function are generally known to yield better performance.
    It is recommended that you use the cross entropy-driven learning rules except
    for inevitable cases such as the regression.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 交叉熵函数与方程 3.9 的二次函数的主要区别是其几何增长。换句话说，交叉熵函数对误差的敏感性要高得多。因此，从交叉熵函数推导出的学习规则通常被认为能产生更好的性能。建议在不可避免的情况下（如回归）之外，使用交叉熵驱动的学习规则。
- en: We had a long introduction to the cost function because the selection of the
    cost function affects the learning rule, i.e., the formula of the back-propagation
    algorithm. Specifically, the calculation of the delta at the output node changes
    slightly. The following steps detail the procedure in training the neural network
    with the sigmoid activation function at the output node using the cross entropy-driven
    back-propagation algorithm .
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 我们对代价函数进行了长篇介绍，因为代价函数的选择会影响学习规则，即反向传播算法的公式。具体来说，输出节点的 delta 计算略有变化。以下步骤详细说明了使用交叉熵驱动的反向传播算法在输出节点使用
    sigmoid 激活函数训练神经网络的过程。
- en: Initialize the neural network’s weights with adequate values.
  id: totrans-142
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用适当的值初始化神经网络的权重。
- en: Enter the input of the training data `{ input, correct output }` to the neural
    network and obtain the output. Compare this output to the correct output, calculate
    the error, and calculate the delta, δ, of the output nodes.
  id: totrans-143
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将训练数据的输入 `{ input, correct output }` 输入神经网络，并获取输出。将此输出与正确输出进行比较，计算误差，并计算输出节点的
    delta，δ。
- en: '![$$ \begin{array}{c} e\kern0.62em =\kern1em d\kern0.5em -\kern0.5em y\\ {}\delta
    \kern0.62em =\kern0.62em e\end{array} $$](A448947_1_En_3_Chapter_Equl.gif)'
  id: totrans-144
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![e = d - y   δ = e](A448947_1_En_3_Chapter_Equl.gif)'
- en: Propagate the delta of the output node backward and calculate the delta of the
    subsequent hidden nodes.
  id: totrans-145
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将输出节点的 delta 向后传播，并计算后续隐藏节点的 delta。
- en: '![$$ \begin{array}{c}{e}^{(k)}\kern0.62em =\kern0.62em {W}^T\delta \\ {}{\delta}^{(k)}\kern0.62em
    =\kern0.62em {\varphi}^{\prime}\left({v}^{(k)}\right)\;{e}^{(k)}\end{array} $$](A448947_1_En_3_Chapter_Equm.gif)'
  id: totrans-146
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![e^(k) = W^Tδ   δ^(k) = φ''(v^(k)) * e^(k)](A448947_1_En_3_Chapter_Equm.gif)'
- en: Repeat Step 3 until it reaches the hidden layer that is next to the input layer.
  id: totrans-147
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重复步骤 3，直到达到紧邻输入层的隐藏层。
- en: 'Adjust the neural network’s weights using the following learning rule:'
  id: totrans-148
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用以下学习规则调整神经网络的权重：
- en: '![$$ \begin{array}{c}\triangle {w}_{i j}\kern0.62em =\kern0.62em \alpha \kern0.1em
    {\delta}_i{x}_j\\ {}{w}_{i j}\kern0.62em \leftarrow \kern0.62em {w}_{i j}\kern0.5em
    +\kern0.5em \triangle {w}_{i j}\end{array} $$](A448947_1_En_3_Chapter_Equn.gif)'
  id: totrans-149
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![Δwij = α * δi * xj   wij <- wij + Δwij](A448947_1_En_3_Chapter_Equn.gif)'
- en: Repeat Steps 2-5 for every training data point.
  id: totrans-150
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对每个训练数据点重复步骤 2-5。
- en: Repeat Steps 2-6 until the network has been adequately trained.
  id: totrans-151
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重复步骤 2-6，直到网络得到充分训练。
- en: 'Did you notice the difference between this process and that of the “Back-Propagation
    Algorithm” section? It is the delta, δ, in Step 2\. It has been changed as follows:'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 你注意到这个过程与“反向传播算法”部分之间的差异了吗？它是步骤 2 中的 delta，δ，已经被修改如下：
- en: '![$$ \delta \kern0.62em =\kern0.62em {\varphi}^{\prime }(v) e\kern1em \to \kern1em
    \delta \kern0.62em =\kern0.62em e $$](A448947_1_En_3_Chapter_Equo.gif)'
  id: totrans-153
  prefs: []
  type: TYPE_IMG
  zh: '![δ = φ''(v) * e  ->  δ = e](A448947_1_En_3_Chapter_Equo.gif)'
- en: Everything else remains the same. On the outside, the difference seems insignificant.
    However, it contains the huge topic of the cost function based on the optimization
    theory. Most of the neural network training approaches of Deep Learning employ
    the cross entropy-driven learning rules. This is due to their superior learning
    rate and performance.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 其他一切保持不变。从外表上看，差异似乎微不足道。然而，它包含了基于优化理论的成本函数的巨大主题。大多数深度学习的神经网络训练方法都采用交叉熵驱动的学习规则。这是由于它们优越的学习速率和性能。
- en: Figure [3-12](#Fig12) depicts what this section has explained so far. The key
    is the fact that the output and hidden layers employ the different formulas of
    the delta calculation when the learning rule is based on the cross entropy and
    the sigmoid function .
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [3-12](#Fig12) 展示了本节到目前为止所解释的内容。关键是，当学习规则基于交叉熵和 sigmoid 函数时，输出层和隐藏层使用不同的 delta
    计算公式。
- en: '![A448947_1_En_3_Fig12_HTML.gif](A448947_1_En_3_Fig12_HTML.gif)'
  id: totrans-156
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_3_Fig12_HTML.gif](A448947_1_En_3_Fig12_HTML.gif)'
- en: Figure 3-12.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-12。
- en: the output and hidden layers employ the different formulas of the delta calculation
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 输出层和隐藏层使用不同的 delta 计算公式。
- en: While we are at it, we will address just one more thing about the cost function.
    You saw in Chapter [1](A448947_1_En_1_Chapter.html) that overfitting is a challenging
    problem that every technique of Machine Learning faces. You also saw that one
    of the primary approaches used to overcome overfitting is making the model as
    simple as possible using regularization. In a mathematical sense, the essence
    of regularization is adding the sum of the weights to the cost function, as shown
    here. Of course, applying the following new cost function leads to a different
    learning rule formula.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 在此过程中，我们还将讨论关于成本函数的另一个问题。你在第 [1](A448947_1_En_1_Chapter.html) 章节中看到，过拟合是机器学习面临的一个挑战性问题。你也看到了，克服过拟合的主要方法之一是使用正则化使模型尽可能简单。从数学的角度来看，正则化的本质是将权重的和添加到成本函数中，如此处所示。当然，应用以下新的成本函数会导致不同的学习规则公式。
- en: '![$$ J\kern1em =\kern1em \frac{1}{2}\kern0.5em {\displaystyle \sum_{i=1}^M{\left({d}_i\kern0.5em
    -\kern0.5em {y}_i\right)}^2}\kern0.5em +\kern0.5em \lambda \frac{1}{2}{\left\Vert
    w\right\Vert}^2 $$](A448947_1_En_3_Chapter_Equp.gif)'
  id: totrans-160
  prefs: []
  type: TYPE_IMG
  zh: '![J = 1/2 * Σ(i=1 to M) (di - yi)^2 + λ/2 * ||w||^2](A448947_1_En_3_Chapter_Equp.gif)'
- en: '![$$ J\kern1em =\kern1em {\displaystyle \sum_{i=1}^M\left\{-{d}_i \ln \left({y}_i\right)\kern0.5em
    -\kern0.5em \left(1-{d}_i\right) \ln \left(1-{y}_i\right)\right\}}\kern0.5em +\kern0.5em
    \lambda \frac{1}{2}{\left\Vert w\right\Vert}^2 $$](A448947_1_En_3_Chapter_Equq.gif)'
  id: totrans-161
  prefs: []
  type: TYPE_IMG
  zh: '![$$ J\kern1em =\kern1em {\displaystyle \sum_{i=1}^M\left\{-{d}_i \ln \left({y}_i\right)\kern0.5em
    -\kern0.5em \left(1-{d}_i\right) \ln \left(1-{y}_i\right)\right\}}\kern0.5em +\kern0.5em
    \lambda \frac{1}{2}{\left\Vert w\right\Vert}^2 $$](A448947_1_En_3_Chapter_Equq.gif)'
- en: where λ is the coefficient that determines how much of the connection weight
    is reflected on the cost function.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 λ 是系数，它决定了连接权重中有多少会反映在损失函数上。
- en: This cost function maintains a large value when one of the output errors and
    the weight remain large. Therefore, solely making the output error zero will not
    suffice in reducing the cost function. In order to drop the value of the cost
    function, both the error and weight should be controlled to be as small as possible.
    However, if a weight becomes small enough, the associated nodes will be practically
    disconnected. As a result, unnecessary connections are eliminated, and the neural
    network becomes simpler. For this reason, overfitting of the neural network can
    be improved by adding the sum of weights to the cost function, thereby reducing
    it.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 当输出误差和权重中有一个保持较大值时，这个损失函数会保持一个较大的值。因此，仅仅将输出误差降到零并不能充分减少损失函数。为了降低损失函数的值，误差和权重都应该被控制在尽可能小。然而，如果一个权重变得足够小，相关的节点实际上会被断开连接。结果，不必要的连接被消除，神经网络变得更加简单。因此，通过将权重之和添加到损失函数中，可以改善神经网络的过拟合问题，从而减少它。
- en: In summary, the learning rule of the neural network’s supervised learning is
    derived from the cost function. The performance of the learning rule and the neural
    network varies depending on the selection of the cost function. The cross entropy
    function has been attracting recent attention for the cost function. The regularization
    process that is used to deal with overfitting is implemented as a variation of
    the cost function .
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，神经网络的监督学习的学习规则是从损失函数中导出的。学习规则和神经网络的性能取决于损失函数的选择。交叉熵函数最近受到了关注，用作损失函数。用于处理过拟合的正则化过程被实现为损失函数的一种变化。
- en: 'Example: Cross Entropy Function'
  id: totrans-165
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例：交叉熵函数
- en: This section revisits the back-propagation example. But this time, the learning
    rule derived from the cross entropy function is used. Consider the training of
    the neural network that consists of a hidden layer with four nodes, three input
    nodes, and a single output node. The sigmoid function is employed for the activation
    function of the hidden nodes and output node.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 本节回顾了反向传播的示例。但这次，使用交叉熵函数导出的学习规则。考虑由一个包含四个节点、三个输入节点和一个输出节点的隐藏层组成的神经网络训练。sigmoid
    函数被用于隐藏节点和输出节点的激活函数。
- en: '![A448947_1_En_3_Fig13_HTML.gif](A448947_1_En_3_Fig13_HTML.gif)'
  id: totrans-167
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_3_Fig13_HTML.gif](A448947_1_En_3_Fig13_HTML.gif)'
- en: Figure 3-13.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-13。
- en: Neural network with a hidden layer with four nodes, three input nodes, and a
    single output node
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 具有四个节点、三个输入节点和一个输出节点的隐藏层的神经网络
- en: The training data contains the same four elements as shown in the following
    table. When we ignore the third numbers of the input data, this training dataset
    presents a XOR logic operation. The bolded rightmost number of each element is
    the correct output .
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 训练数据包含以下表格中显示的相同四个元素。当我们忽略输入数据的第三个数字时，这个训练数据集呈现了一个 XOR 逻辑运算。每个元素加粗的最右边的数字是正确的输出。
- en: '![A448947_1_En_3_Figb_HTML.gif](A448947_1_En_3_Figb_HTML.gif)'
  id: totrans-171
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_3_Figb_HTML.gif](A448947_1_En_3_Figb_HTML.gif)'
- en: Cross Entropy Function
  id: totrans-172
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 交叉熵函数
- en: The `BackpropCE` function trains the XOR data using the cross entropy function
    . It takes the neural network’s weights and training data and returns the adjusted
    weights.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: '`BackpropCE` 函数使用交叉熵函数训练 XOR 数据。它接受神经网络的权重和训练数据，并返回调整后的权重。'
- en: '[PRE9]'
  id: totrans-174
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: where `W1` and `W2` are the weight matrices for the input-hidden layers and
    hidden-output layers, respectively. In addition, `X` and `D` are the input and
    correct output matrices of the data, respectively. The following listing shows
    the `BackpropCE.m` file, which implements the `BackpropCE` function.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 `W1` 和 `W2` 分别是输入-隐藏层和隐藏-输出层的权重矩阵。此外，`X` 和 `D` 分别是数据的输入和正确输出矩阵。以下列表显示了 `BackpropCE.m`
    文件，它实现了 `BackpropCE` 函数。
- en: '[PRE10]'
  id: totrans-176
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'This code pulls out the training data, calculates the weight updates (`dW1`
    and `dW2`) using the delta rule, and adjusts the neural network’s weights using
    these values. So far, the process is almost identical to that of the previous
    example. The difference arises when we calculate the delta of the output node
    as:'
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 此代码提取训练数据，使用delta规则计算权重更新（`dW1`和`dW2`），并使用这些值调整神经网络的权重。到目前为止，这个过程几乎与之前的示例相同。区别在于我们计算输出节点的delta时：
- en: '[PRE11]'
  id: totrans-178
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Unlike the previous example code, the derivative of the sigmoid function no
    longer exists. This is because, for the learning rule of the cross entropy function,
    if the activation function of the output node is the sigmoid, the delta equals
    the output error. Of course, the hidden nodes follow the same process that is
    used by the previous back-propagation algorithm.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 与之前的示例代码不同，sigmoid函数的导数不再存在。这是因为，对于交叉熵函数的学习规则，如果输出节点的激活函数是sigmoid，delta等于输出误差。当然，隐藏节点遵循与之前反向传播算法相同的流程。
- en: '[PRE12]'
  id: totrans-180
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: The following program listing shows the `TestBackpropCE.m` file, which tests
    the `BackpropCE` function. This program calls the `BackpropCE` function and trains
    the neural network 10,000 times. The trained neural network yields the output
    for the training data input, and the result is displayed on the screen. We verify
    the proper training of the neural network by comparing the output to the correct
    output. Further explanation is omitted, as the code is almost identical to that
    from before.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 以下程序列表显示了测试`BackpropCE`函数的`TestBackpropCE.m`文件。此程序调用`BackpropCE`函数并训练神经网络10,000次。训练好的神经网络为训练数据输入提供输出，并将结果显示在屏幕上。我们通过比较输出与正确输出来验证神经网络的正确训练。进一步的解释被省略，因为代码几乎与之前相同。
- en: '[PRE13]'
  id: totrans-182
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Executing this code produces the values shown here. The output is very close
    to the correct output, `D`. This proves that the neural network has been trained
    successfully.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 执行此代码会产生此处显示的值。输出非常接近正确输出`D`。这证明了神经网络已经成功训练。
- en: '![$$ \left[\kern0.1em \begin{array}{c}\hfill 0.00003\hfill \\ {}\hfill 0.9999\hfill
    \\ {}\hfill 0.9998\hfill \\ {}\hfill 0.00036\hfill \end{array}\kern0.1em \right]\kern2em
    \iff \kern2em D\kern0.5em =\kern0.5em \left[\;\begin{array}{c}\hfill 0\hfill \\
    {}\hfill 1\hfill \\ {}\hfill 1\hfill \\ {}\hfill 0\hfill \end{array}\;\right]
    $$](A448947_1_En_3_Chapter_Equr.gif)'
  id: totrans-184
  prefs: []
  type: TYPE_IMG
  zh: '![公式](A448947_1_En_3_Chapter_Equr.gif)'
- en: Comparison of Cost Functions
  id: totrans-185
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 成本函数比较
- en: The only difference between the `BackpropCE` function from the previous section
    and the `BackpropXOR` function from the “XOR Problem” section is the calculation
    of the output node delta. We will examine how this insignificant difference affects
    the learning performance. The following listing shows the `CEvsSSE.m` file that
    compares the mean errors of the two functions. The architecture of this file is
    almost identical to that of the `SGDvsBatch.m` file in the “Comparison of the
    SGD and the Batch” section in Chapter [2](A448947_1_En_2_Chapter.html).
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 与上一节中的`BackpropCE`函数和“XOR问题”节中的`BackpropXOR`函数之间的唯一区别是输出节点delta的计算。我们将研究这个微小的差异是如何影响学习性能的。以下列表显示了比较两个函数平均误差的`CEvsSSE.m`文件。该文件的架构几乎与第[2](A448947_1_En_2_Chapter.html)章中“SGD与批处理比较”节中的`SGDvsBatch.m`文件相同。
- en: '[PRE14]'
  id: totrans-187
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: This program calls the `BackpropCE` and the `BackpropXOR` functions and trains
    the neural networks 1,000 times each. The squared sum of the output error (`es1`
    and `es2`) is calculated at every epoch for each neural network, and their average
    (E1 and E2) is calculated. `W11`, `W12`, `W21`, and `W22` are the weight matrices
    of respective neural networks. Once the 1,000 trainings have been completed, the
    mean errors are compared over the epoch on the graph. As Figure [3-14](#Fig14)
    shows, the cross entropy-driven training reduces the training error at a much
    faster rate. In other words, the cross entropy-driven learning rule yields a faster
    learning process. This is the reason that most cost functions for Deep Learning
    employ the cross entropy function.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 此程序调用`BackpropCE`和`BackpropXOR`函数，并对神经网络进行1,000次训练。每个神经网络的输出误差的平方和（`es1`和`es2`）在每个epoch时都会计算，并计算它们的平均值（E1和E2）。`W11`、`W12`、`W21`和`W22`是相应神经网络的权重矩阵。一旦完成1,000次训练，就会在图上比较每个epoch上的平均误差。如图[3-14](#Fig14)所示，交叉熵驱动的训练以更快的速度减少了训练误差。换句话说，交叉熵驱动的学习规则产生了一个更快的学习过程。这就是为什么大多数深度学习的成本函数都采用交叉熵函数的原因。
- en: '![A448947_1_En_3_Fig14_HTML.gif](A448947_1_En_3_Fig14_HTML.gif)'
  id: totrans-189
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_3_Fig14_HTML.gif](A448947_1_En_3_Fig14_HTML.gif)'
- en: Figure 3-14.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-14。
- en: Cross entropy-driven training reduces training error at a much faster rate
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 交叉熵驱动的训练以更快的速度减少训练误差
- en: This completes the contents for the back-propagation algorithm. If you had a
    hard time catching on, don’t be discouraged. Actually, understanding the back-propagation
    algorithms is not a vital factor when studying and developing Deep Learning. As
    most of the Deep Learning libraries already include the algorithms; we can just
    use them. Cheer up! Deep Learning is just one chapter away.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 这就完成了反向传播算法的内容。如果你觉得难以理解，不要气馁。实际上，在研究和开发深度学习时，理解反向传播算法并不是一个关键因素。因为大多数深度学习库已经包含了这些算法；我们只需使用它们即可。振作起来！深度学习只是差一章而已。
- en: Summary
  id: totrans-193
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: 'This chapter covered the following concepts:'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 本章涵盖了以下概念：
- en: The multi-layer neural network cannot be trained using the delta rule; it should
    be trained using the back-propagation algorithm, which is also employed as the
    learning rule of Deep Learning.
  id: totrans-195
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 多层神经网络不能使用delta规则进行训练；它应该使用反向传播算法进行训练，该算法也被用作深度学习的学习规则。
- en: The back-propagation algorithm defines the hidden layer error as it propagates
    the output error backward from the output layer. Once the hidden layer error is
    obtained, the weights of every layer are adjusted using the delta rule. The importance
    of the back-propagation algorithm is that it provides a systematic method to define
    the error of the hidden node.
  id: totrans-196
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 反向传播算法在传播输出误差从输出层反向传播时定义隐藏层误差。一旦获得隐藏层误差，就使用delta规则调整每一层的权重。反向传播算法的重要性在于它提供了一种系统的方法来定义隐藏节点的误差。
- en: The single-layer neural network is applicable only to linearly separable problems,
    and most practical problems are linearly inseparable.
  id: totrans-197
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 单层神经网络仅适用于线性可分问题，而大多数实际问题都是线性不可分的。
- en: The multi-layer neural network is capable of modeling the linearly inseparable
    problems.
  id: totrans-198
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 多层神经网络能够模拟线性不可分的问题。
- en: Many types of weight adjustments are available in the back-propagation algorithm.
    The development of various weight adjustment approaches is due to the pursuit
    of a more stable and faster learning of the network. These characteristics are
    particularly beneficial for hard-to-learn Deep Learning.
  id: totrans-199
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在反向传播算法中，有多种类型的权重调整方法可用。各种权重调整方法的发展是为了追求网络学习更加稳定和快速。这些特性对于难以学习的深度学习尤其有益。
- en: The cost function addresses the output error of the neural network and is proportional
    to the error. Cross entropy has been widely used in recent applications. In most
    cases, the cross entropy-driven learning rules are known to yield better performance.
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 成本函数处理神经网络的输出误差，并且与误差成正比。交叉熵在最近的应用中已被广泛使用。在大多数情况下，交叉熵驱动的学习规则已知能产生更好的性能。
- en: The learning rule of the neural network varies depending on the cost function
    and activation function. Specifically, the delta calculation of the output node
    is changed.
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 神经网络的学习规则根据成本函数和激活函数的不同而变化。具体来说，输出节点的delta计算会发生变化。
- en: The regularization, which is one of the approaches used to overcome overfitting,
    is also implemented as an addition of the weight term to the cost function.
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 正则化，作为克服过拟合的方法之一，也被实现为将权重项添加到损失函数中。
