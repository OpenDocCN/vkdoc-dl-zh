  type: TYPE_NORMAL
  zh: 脚注[1](#Fn1_source)
- en: “Learning representations by back-propagating errors,” David E. Rumelhart, Geoffrey
    E. Hinton, Ronald J. Williams, Nature, October 1986.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: “通过反向传播错误学习表示”，David E. Rumelhart, Geoffrey E. Hinton, Ronald J. Williams, 自然，1986年10月。
