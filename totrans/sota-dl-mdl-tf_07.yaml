- en: 7. Advanced Transfer Learning
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: We introduce advanced transfer learning with code examples based on several
    transfer learning architectures. The code examples train learning models with
    these architectures.
  prefs: []
  type: TYPE_NORMAL
- en: 'Notebooks for chapters are located at the following URL:'
  prefs: []
  type: TYPE_NORMAL
- en: '[`https://github.com/paperd/deep-learning-models`](https://github.com/paperd/deep-learning-models)'
  prefs: []
  type: TYPE_NORMAL
- en: Transfer Learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Transfer learning is based on the idea that the feature a network learns for
    a problem can be reused for a variety of other tasks. In ML and pattern recognition,
    a **feature** is an individual measurable property or characteristic of a phenomenon
    being observed. So effective learning algorithms are able to glean informative,
    discriminating, and independent features from data.
  prefs: []
  type: TYPE_NORMAL
- en: Transfer learning models are amazing because they can reuse the features they’ve
    learned on new data! Leveraging transfer learning saves the time it takes to create
    a new model, test it, and tweak it until it provides the desired results. Also,
    transfer learning models are created by experienced data scientists who have spent
    years tweaking and perfecting available transfer learning models.
  prefs: []
  type: TYPE_NORMAL
- en: Transfer learning models can boost accuracy without taking much time to converge
    when compared to a model trained from scratch. But this doesn’t mean that a pre-trained
    model is clearly better than one created from scratch. A ML model reaches convergence
    when it achieves a state during training where loss settles to within an error
    range around the final value. So a model converges when additional training doesn’t
    improve the model.
  prefs: []
  type: TYPE_NORMAL
- en: In a recent conversation with a practicing data scientist, he informed us that
    he creates some of his own models from scratch. On a current project, he is using
    an existing (pre-trained) model. For other projects, he builds his own models.
    It just depends on the task. He also let us know that he is not as concerned with
    speed as he is with convergence. Keep in mind that this person has a PhD in data
    science with many years of industry experience.
  prefs: []
  type: TYPE_NORMAL
- en: If a pre-trained neural network is effective, the features it learns can be
    used for other tasks. When humans learn how to perform a new task, we seldom start
    from scratch. We carry over all that we have learned in our lifetime to quickly
    learn new stuff. We can often learn from a single training example. But other
    times it actually hinders our development. Of course, babies don’t learn this
    way because they don’t have the same level of prior knowledge.
  prefs: []
  type: TYPE_NORMAL
- en: We demonstrated in the previous chapter that transfer learning can be used on
    datasets that it has never seen. In this chapter, we present a newer pre-trained
    model to show how it works with different datasets. We also show you how to directly
    implement transfer learning without using the TensorFlow Hub library. Implementing
    transfer learning directly provides more flexibility as we demonstrate with our
    experiments.
  prefs: []
  type: TYPE_NORMAL
- en: We present four transfer learning experiments. We begin with the beans experiment.
    We continue with the Stanford Dogs, flowers, and rock-paper-scissors experiments.
    We strongly believe that practice makes perfect. Code tends to be similar for
    each experiment, but each dataset is treated differently.
  prefs: []
  type: TYPE_NORMAL
- en: With all of our experiments, we set up the Colab ecosystem. So begin by importing
    the main TensorFlow library and instantiating the GPU.
  prefs: []
  type: TYPE_NORMAL
