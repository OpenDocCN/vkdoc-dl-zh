- en: Rock-Paper-Scissors Experiment
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The final experiment is with the *rock_paper_scissors* dataset. The dataset
    is adapted from the rock-paper-scissors game. The data contains images of hands
    playing the rock-paper-scissors game.
  prefs: []
  type: TYPE_NORMAL
- en: Rock-paper-scissors is a hand game usually played between two people where each
    player simultaneously forms one of three shapes with an outstretched hand. The
    possible shapes are rock, paper, and scissors. The rules are simple. Rock beats
    scissors. Paper beats rock. Scissors beat paper. Metaphorically rock smashes scissors,
    paper covers rock, and scissors cut paper.
  prefs: []
  type: TYPE_NORMAL
