- en: 7. Advanced Transfer Learning
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 7. 高级转移学习
- en: We introduce advanced transfer learning with code examples based on several
    transfer learning architectures. The code examples train learning models with
    these architectures.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过基于几个转移学习架构的代码示例介绍了高级转移学习。这些代码示例使用这些架构训练学习模型。
- en: 'Notebooks for chapters are located at the following URL:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 章节的笔记本位于以下URL：
- en: '[`https://github.com/paperd/deep-learning-models`](https://github.com/paperd/deep-learning-models)'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://github.com/paperd/deep-learning-models](https://github.com/paperd/deep-learning-models)'
- en: Transfer Learning
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 转移学习
- en: Transfer learning is based on the idea that the feature a network learns for
    a problem can be reused for a variety of other tasks. In ML and pattern recognition,
    a **feature** is an individual measurable property or characteristic of a phenomenon
    being observed. So effective learning algorithms are able to glean informative,
    discriminating, and independent features from data.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 转移学习基于这样一个理念：网络为某个问题学习到的特征可以用于各种其他任务。在机器学习和模式识别中，**特征**是指被观察现象的个别可测量的属性或特征。因此，有效的学习算法能够从数据中提取出信息丰富、具有区分性和独立性的特征。
- en: Transfer learning models are amazing because they can reuse the features they’ve
    learned on new data! Leveraging transfer learning saves the time it takes to create
    a new model, test it, and tweak it until it provides the desired results. Also,
    transfer learning models are created by experienced data scientists who have spent
    years tweaking and perfecting available transfer learning models.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 转移学习模型非常神奇，因为它们可以在新数据上重用它们所学习的特征！利用转移学习可以节省创建新模型、测试它以及调整它直到它提供所需结果所需的时间。此外，转移学习模型是由经验丰富的数据科学家创建的，他们花费了多年时间调整和优化可用的转移学习模型。
- en: Transfer learning models can boost accuracy without taking much time to converge
    when compared to a model trained from scratch. But this doesn’t mean that a pre-trained
    model is clearly better than one created from scratch. A ML model reaches convergence
    when it achieves a state during training where loss settles to within an error
    range around the final value. So a model converges when additional training doesn’t
    improve the model.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 与从头开始训练的模型相比，转移学习模型可以在不花费太多时间收敛的情况下提高准确性。但这并不意味着预训练模型明显优于从头创建的模型。当机器学习模型在训练过程中达到一个状态，损失在最终值周围的误差范围内稳定时，它就达到了收敛。因此，当额外的训练不再提高模型时，模型就收敛了。
- en: In a recent conversation with a practicing data scientist, he informed us that
    he creates some of his own models from scratch. On a current project, he is using
    an existing (pre-trained) model. For other projects, he builds his own models.
    It just depends on the task. He also let us know that he is not as concerned with
    speed as he is with convergence. Keep in mind that this person has a PhD in data
    science with many years of industry experience.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在与一位实践中的数据科学家最近的一次交谈中，他告诉我们，他从头开始创建了一些自己的模型。在当前的项目中，他正在使用一个现有的（预训练的）模型。对于其他项目，他则构建自己的模型。这完全取决于任务。他还让我们知道，他更关心收敛性而不是速度。请记住，这个人拥有数据科学博士学位，并在业界拥有多年的经验。
- en: If a pre-trained neural network is effective, the features it learns can be
    used for other tasks. When humans learn how to perform a new task, we seldom start
    from scratch. We carry over all that we have learned in our lifetime to quickly
    learn new stuff. We can often learn from a single training example. But other
    times it actually hinders our development. Of course, babies don’t learn this
    way because they don’t have the same level of prior knowledge.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 如果一个预训练的神经网络有效，它所学习的特征可以用于其他任务。当人类学习如何执行一项新任务时，我们很少从头开始。我们将我们一生中所学的一切都转移到快速学习新事物上。我们通常可以从单个训练示例中学习。但有时这实际上阻碍了我们的发展。当然，婴儿不会以这种方式学习，因为他们没有相同水平的前置知识。
- en: We demonstrated in the previous chapter that transfer learning can be used on
    datasets that it has never seen. In this chapter, we present a newer pre-trained
    model to show how it works with different datasets. We also show you how to directly
    implement transfer learning without using the TensorFlow Hub library. Implementing
    transfer learning directly provides more flexibility as we demonstrate with our
    experiments.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在前一章中，我们展示了转移学习可以用于它从未见过的数据集。在这一章中，我们介绍了一个新的预训练模型，以展示它是如何与不同的数据集一起工作的。我们还向您展示了如何直接实现转移学习，而不使用TensorFlow
    Hub库。直接实现转移学习提供了更多的灵活性，正如我们在实验中所展示的那样。
- en: We present four transfer learning experiments. We begin with the beans experiment.
    We continue with the Stanford Dogs, flowers, and rock-paper-scissors experiments.
    We strongly believe that practice makes perfect. Code tends to be similar for
    each experiment, but each dataset is treated differently.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我们展示了四个迁移学习实验。我们首先进行豆子实验。然后继续进行斯坦福狗、花朵和剪刀石头布实验。我们坚信熟能生巧。每个实验的代码通常相似，但每个数据集的处理方式都不同。
- en: With all of our experiments, we set up the Colab ecosystem. So begin by importing
    the main TensorFlow library and instantiating the GPU.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们所有的实验中，我们搭建了 Colab 生态系统。因此，首先导入主要的 TensorFlow 库并实例化 GPU。
- en: Import the TensorFlow Library
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 导入 TensorFlow 库
- en: 'Import the library and alias it as **tf**:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 导入库并将其别名设置为 **tf**：
- en: '[PRE0]'
  id: totrans-15
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Aliasing the TensorFlow library as tf is common practice.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 将 TensorFlow 库别名设置为 tf 是常见的做法。
- en: GPU Hardware Accelerator
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: GPU 硬件加速器
- en: 'As a convenience, we provide the steps to enable the GPU in a Colab notebook:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 为了方便，我们提供了在 Colab 笔记本中启用 GPU 的步骤：
- en: Click *Runtime* in the top-left menu.
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击左上角的菜单中的 *运行*。
- en: Click *Change runtime type* from the drop-down menu.
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从下拉菜单中点击 *更改运行时类型*。
- en: Choose *GPU* from the *Hardware accelerator* drop-down menu.
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从“硬件加速器”下拉菜单中选择 *GPU*。
- en: Click *Save*.
  id: totrans-22
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 *保存*。
- en: 'Verify that the GPU is active:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 验证 GPU 是否已激活：
- en: '[PRE1]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: If ‘/device:GPU:0’ is displayed, the GPU is active. If ‘..’ is displayed, the
    regular CPU is active.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 如果显示 “/device:GPU:0”，则 GPU 已激活。如果显示 “..”，则常规 CPU 已激活。
- en: Note
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 备注
- en: If you get the error **NAME** **‘****TF****’** **IS NOT DEFINED**, re-execute
    the code to import the TensorFlow library!
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你得到错误 **NAME** **‘****TF****’** **IS NOT DEFINED**，重新执行导入 TensorFlow 库的代码！
- en: Beans Experiment
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 豆子实验
- en: '*Beans* is a TensorFlow dataset (TFDS) of bean plant images taken in the field
    with smartphone cameras. It consists of three classes (bean_rust, angular_leaf_spot,
    healthy). Two of the three classes are *angular leaf spot* and *bean rust*, which
    are diseases that can befell bean plants. The third class is *healthy*. So a bean
    plant in this dataset is either healthy or afflicted with one of the two diseases.
    Data was annotated by experts from the National Crops Resources Research Institute
    (NaCRRI) in Uganda and collected by the Makerere AI research lab.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '*豆子* 是使用智能手机相机在田间拍摄的豆子植物图像的 TensorFlow 数据集 (TFDS)。它由三个类别组成（bean_rust、angular_leaf_spot、healthy）。其中两个类别是
    *angular leaf spot* 和 *bean rust*，这两种都是可能影响豆子植物的疾病。第三个类别是 *healthy*。因此，在这个数据集中，豆子植物要么是健康的，要么患有这两种疾病中的一种。数据由乌干达国家作物资源研究学院
    (NaCRRI) 的专家标注，并由 Makerere AI 研究实验室收集。'
- en: We train on beans data with two pre-trained models. One of the models is new
    to you, and the other is Inception that was demonstrated in the previous chapter.
    We show both for contrast. Even if one works better than the other on this dataset,
    there is no guarantee that it will do so on another! But using pre-trained models
    is pretty straightforward once you get used to working with them. So trying different
    ones is probably a good strategy.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用两个预训练模型在豆子数据上训练。其中一个模型对你来说是新的，另一个是之前章节中演示的 Inception 模型。我们展示两者以供对比。即使其中一个模型在这个数据集上比另一个表现更好，也不能保证它在另一个数据集上也会有同样的表现！但一旦你习惯了与预训练模型一起工作，使用它们就相当直接了。所以尝试不同的模型可能是一个不错的策略。
- en: Load Beans
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 加载豆子
- en: 'Load beans as a TFDS from the Google Cloud Service (GCS):'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 从 Google Cloud 服务 (GCS) 加载豆子作为 TFDS：
- en: '[PRE2]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Although not required, we recommend loading a TFDS from GCS.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然不是必需的，但我们建议从 GCS 加载 TFDS。
- en: Explore the Data
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 探索数据
- en: 'Display the metadata:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 显示元数据：
- en: '[PRE3]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'For simplicity, assign the splits to variables:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 为了简单起见，将分割分配给变量：
- en: '[PRE4]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: From the metadata, we know that training data has 1,034 examples, validation
    data has 133 examples, and test data has 128 examples.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 从元数据中，我们知道训练数据有 1,034 个示例，验证数据有 133 个示例，测试数据有 128 个示例。
- en: 'Get labels and number of classes:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 获取标签和类别数量：
- en: '[PRE5]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'Check image sizes:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 检查图像大小：
- en: '[PRE6]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: From the sample, it appears that all images are 500 × 500 × 3.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 从样本中可以看出，所有图像都是 500 × 500 × 3。
- en: Visualize
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可视化
- en: 'Visualize with *show_examples*:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 *show_examples* 进行可视化：
- en: '[PRE7]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Reformat Images
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 重新格式化图像
- en: 'Resize and process images for the Xception model:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 调整并处理图像以适应 Xception 模型：
- en: '[PRE8]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: We resize images to 224 × 224, which is the expected size of Xception images.
    We preprocess resized images with the Xception preprocessing API and return the
    final image and label. The function is used in the next section.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将图像调整大小为 224 × 224，这是 Xception 图像的预期大小。我们使用 Xception 预处理 API 预处理调整大小的图像，并返回最终图像和标签。该函数将在下一节中使用。
- en: Build the Input Pipeline
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建输入管道
- en: 'Transform training, validation, and test data to TensorFlow consumable objects:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 将训练、验证和测试数据转换为TensorFlow可消费对象：
- en: '[PRE9]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Visualize as shown in Listing [7-1](#PC11).
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表[7-1](#PC11)所示进行可视化。
- en: '[PRE10]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: We provide different visualization code for the task at hand. Feel free to create
    your own visualization code to gain experience with Python data science tasks.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 我们为当前任务提供不同的可视化代码。您可以自由创建自己的可视化代码，以获得Python数据科学任务的实践经验。
- en: Model with Xception
  id: totrans-59
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用Xception模型
- en: We introduce the Xception pre-trained model to broaden your experience. Also,
    Xception is the most recent one introduced to the public.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 我们引入Xception预训练模型以拓宽您的经验。此外，Xception是最近公开的最新模型。
- en: Xception is one of six state-of-the-art image classifiers pre-trained on the
    ImageNet dataset. The other five are MobileNet, VGG16, VGG19, ResNet50, and Inception-v3\.
    Xception slightly outperforms Inception-v3 on the ImageNet dataset and vastly
    outperforms it on a larger image classification dataset with 17,000 classes (or
    more). Most importantly, it has the same number of model parameters as Inception
    implying a greater computational efficiency. VGG16 and VGG19 have smaller convolution
    layers but take much longer to train than Xception. ResNet model size is comparable,
    but Xception trains faster and produces better training results.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: Xception是六个在ImageNet数据集上预训练的最先进图像分类器之一。其他五个是MobileNet、VGG16、VGG19、ResNet50和Inception-v3。Xception在ImageNet数据集上略优于Inception-v3，在包含17,000个类别（或更多）的更大图像分类数据集上则远远优于它。最重要的是，它与Inception具有相同数量的模型参数，这意味着更高的计算效率。VGG16和VGG19具有较小的卷积层，但训练时间比Xception长得多。ResNet模型大小相当，但Xception训练更快，并产生更好的训练结果。
- en: The Xception model was proposed by Francois Chollet in 2017\. *Xception* is
    an extension of the Inception architecture that replaces the standard Inception
    modules with depthwise Separable Convolutions. Xception is pre-trained on ImageNet.
    Xception often outperforms VGGNet, ResNet, and Inception-v3 models. As a side
    note, Chollet is also the author of Keras.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: Xception模型由Francois Chollet于2017年提出。*Xception*是Inception架构的扩展，它用深度可分离卷积替换了标准的Inception模块。Xception在ImageNet上进行了预训练。Xception通常优于VGGNet、ResNet和Inception-v3模型。作为旁注，Chollet也是Keras的作者。
- en: Create a Model
  id: totrans-63
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 创建模型
- en: 'Clear and seed:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 清除并设置随机种子：
- en: '[PRE11]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'Create a base model with Xception:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个带有Xception的基础模型：
- en: '[PRE12]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Exclude the top layer of the network by setting *include_top=False*. So the
    global average pooling layer and the Dense output layer are excluded from Xception,
    which means that we must include both layers in the classification head.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 通过设置 *include_top=False* 排除网络的顶层。这意味着全局平均池化层和Dense输出层将不被包含在Xception中，因此我们必须在分类头中包含这两个层。
- en: We exclude the top layer to train faster. However, training with all layers
    may increase learning. We show you how to do this later in the chapter.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 我们排除了顶层以加快训练速度。然而，使用所有层进行训练可能会增加学习。我们将在本章后面向您展示如何做到这一点。
- en: 'Explore base model layers:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 探索基础模型层：
- en: '[PRE13]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: The tf.keras.utils.plot_model API provides a detailed graphical description
    of the Xception model.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: tf.keras.utils.plot_model API提供了Xception模型的详细图形描述。
- en: 'Get the number of layers:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 获取层数：
- en: '[PRE14]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Xception has 132 layers.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: Xception有132层。
- en: 'Import libraries:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 导入库：
- en: '[PRE15]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 'Build the final model (classification head):'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 构建最终模型（分类头）：
- en: '[PRE16]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: We excluded the top layer of the pre-trained network, which has a global average
    pooling layer and a Dense output layer. So we must add our own global average
    pooling layer and a Dense output layer with three classes and softmax activation.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 我们排除了预训练网络中的顶层，该层包含全局平均池化层和Dense输出层。因此，我们必须添加我们自己的全局平均池化层和一个具有三个类别和softmax激活的Dense输出层。
