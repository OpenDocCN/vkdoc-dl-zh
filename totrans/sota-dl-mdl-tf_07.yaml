- en: Let’s see how Inception compares to Xception. We show in this section how easy
    it is to interchange pre-trained models.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看Inception与Xception的比较。在本节中，我们展示了如何轻松地交换预训练模型。
- en: '*Inception-v3* is a pre-trained convolutional neural network model that is
    48 layers deep. It is a version of the network already trained on more than a
    million images from the ImageNet database. The pre-trained network can classify
    images into 1000 object categories such as keyboard, mouse, pencil, and many animals.'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: '*Inception-v3*是一个预训练的卷积神经网络模型，深度为48层。它是已经在ImageNet数据库中超过一百万张图像上训练过的网络的版本。预训练的网络可以将图像分类到1000个对象类别中，如键盘、鼠标、铅笔和许多动物。'
