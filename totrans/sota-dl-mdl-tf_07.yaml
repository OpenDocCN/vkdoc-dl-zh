  type: TYPE_NORMAL
  zh: 让我们处理一个存储为 TFRecords 的数据集。我们坚信，使用各种数据集进行实践有助于学习。
- en: Since we worked with flowers in earlier chapters, we won’t describe the dataset
    in this section. We load flowers as TFRecords and use a pre-trained model for
    learning.
  id: totrans-226
