- en: '[PRE76]'
  id: totrans-258
  prefs: []
  type: TYPE_PRE
  zh: '[PRE76]'
- en: We use the Xception pre-trained model. We drop the ImageNet-specific top layers
    with *include_top=false* and a max pooling and a softmax layer to predict the
    five flower classes. Notice that we also unfreeze all of the top layers! Don’t
    try unfreezing all layers up front with larger datasets!
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用 Xception 预训练模型。我们移除了 ImageNet 特定的顶层，设置 *include_top=false*，并添加一个最大池化和一个
    softmax 层来预测五种花朵类别。请注意，我们还解冻了所有顶层！不要一开始就尝试使用更大的数据集解冻所有层！
- en: Compile and Train
  id: totrans-260
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编译和训练
- en: 'Compile :'
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 编译：
- en: '[PRE77]'
  id: totrans-262
  prefs: []
  type: TYPE_PRE
  zh: '[PRE77]'
- en: The initial learning rate is often the single most important hyperparameter.
    If one can tune only one hyperparameter, the learning rate is the one worth tuning.
    Conveniently, we can use the *Adam* optimizer to automatically tune the learning
    rate! But we still must set the initial learning rate.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 初始学习率通常是单个最重要的超参数。如果只能调整一个超参数，那么学习率就是值得调整的。方便的是，我们可以使用 *Adam* 优化器来自动调整学习率！但我们仍然必须设置初始学习率。
- en: We set a very low learning rate so that the model (hopefully) learns a more
    optimal or even a globally optimal set of weights. But training takes significantly
    longer. We set the learning rate to a low value to ensure that gradient descent
    does not increase training error. Initially, we want to allow the neural network
    to randomly adjust its weights. Lower learning rates increase randomization. Higher
    learning rates decrease randomization.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 我们设置了一个非常低的学习率，以便模型（希望）学习到一个更优甚至全局最优的权重集。但训练时间会显著增加。我们将学习率设置得很低，以确保梯度下降不会增加训练错误。最初，我们希望允许神经网络随机调整其权重。较低的学习率增加了随机性。较高的学习率减少了随机性。
