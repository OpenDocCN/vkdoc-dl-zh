  type: TYPE_PRE
- en: Since we are training many more images and many more classes, training time
    is much longer. So be patient. Don’t be concerned if your computer crashes. It
    is not an error. More RAM is needed. We use Colab Pro and don’t seem to have an
    issue.
  prefs: []
  type: TYPE_NORMAL
- en: Tip
  prefs: []
  type: TYPE_NORMAL
- en: You may want to spend a few dollars a month to migrate to Colab Pro if you want
    to model real-world data.
  prefs: []
  type: TYPE_NORMAL
- en: 'Visualize:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE59]'
  prefs: []
  type: TYPE_PRE
- en: Visualize the top five predictions as shown in Listing [7-9](#PC61).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE60]'
  prefs: []
  type: TYPE_PRE
- en: Not bad! We get over 80% accuracy for breed detection. If we look at the top
    five predictions, the chance of guessing the correct breed jumps to over 97%!
    Since the dataset is large and complex, we show that using pre-trained models
    can have real-world use cases. Also it is amazing that we can build such a powerful
    model in just a few lines of code!
  prefs: []
  type: TYPE_NORMAL
- en: Model Trained Data with Unfrozen Layers
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Unfreeze all the layers and continue training as shown in Listing [7-10](#PC62).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE61]'
  prefs: []
  type: TYPE_PRE
- en: We use a *much lower learning rate* to avoid damaging the pre-trained weights.
    We only run for three epochs because training time is so long.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: Set learning rates much lower for real-world use cases like we did with Stanford
    Dogs.
  prefs: []
  type: TYPE_NORMAL
- en: 'Visualize:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE62]'
  prefs: []
  type: TYPE_PRE
