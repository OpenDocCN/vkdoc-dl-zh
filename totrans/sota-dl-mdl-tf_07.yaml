- en: We set a very aggressive learning rate, but still got respectable performance.
    Experiment with learning rates to see if you can increase performance.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 我们设置了一个非常激进的学习率，但仍然获得了可尊敬的性能。尝试不同的学习率以查看是否可以提高性能。
- en: Note
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 备注
- en: Setting learning rate to a high value generally enables a model to learn faster.
    However, the cost can be a suboptimal final set of weights. Setting learning rate
    to a low value may allow a model to learn a more optimal or even globally optimal
    set of weights, but may take significantly longer to train.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 将学习率设置得较高通常可以使模型更快地学习。然而，代价可能是一个次优的最终权重集。将学习率设置得较低可能允许模型学习到一个更优甚至全局最优的权重集，但可能需要更长的时间来训练。
- en: Model Trained Data with Unfrozen Layers
  id: totrans-102
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 使用未冻结层的训练数据模型
- en: Validation accuracy is pretty good, but doesn’t get better. So the top layers
    are pretty well trained. That is, accuracy reaches a plateau.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 验证准确率相当不错，但没有进一步提高。所以顶层训练得相当好。也就是说，准确率达到了平台期。
- en: Now we are ready unfreeze all the layers and continue training as shown in Listing [7-3](#PC24).
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们准备解冻所有层并继续训练，如列表[7-3](#PC24)所示。
- en: '[PRE23]'
  id: totrans-105
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: Intially, a good strategy is to train with top layers frozen for speed. Setting
    a high learning rate improves training speed even more. Once validation accuracy
    plateaus, we know that the top layers are trained. We can then continue training
    by unfreezing the top layers and setting a lower learning rate. We use a *lower
    learning rate* to avoid damaging the pre-trained weights.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 初始时，一个好的策略是冻结顶层以加快训练速度。设置高学习率可以进一步提高训练速度。一旦验证准确率停滞不前，我们就知道顶层已经训练好了。然后我们可以通过解冻顶层并设置较低的学习率来继续训练。我们使用*较低的学习率*以避免损坏预训练的权重。
- en: We still train on the same model until we clear the model sessions. This is
    why we clear model sessions before we train a new model.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 我们仍然在同一个模型上进行训练，直到我们清除模型会话。这就是为什么我们在训练新模型之前清除模型会话的原因。
