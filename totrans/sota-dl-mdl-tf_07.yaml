- en: Beans Experiment
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '*Beans* is a TensorFlow dataset (TFDS) of bean plant images taken in the field
    with smartphone cameras. It consists of three classes (bean_rust, angular_leaf_spot,
    healthy). Two of the three classes are *angular leaf spot* and *bean rust*, which
    are diseases that can befell bean plants. The third class is *healthy*. So a bean
    plant in this dataset is either healthy or afflicted with one of the two diseases.
    Data was annotated by experts from the National Crops Resources Research Institute
    (NaCRRI) in Uganda and collected by the Makerere AI research lab.'
  prefs: []
  type: TYPE_NORMAL
- en: We train on beans data with two pre-trained models. One of the models is new
    to you, and the other is Inception that was demonstrated in the previous chapter.
    We show both for contrast. Even if one works better than the other on this dataset,
    there is no guarantee that it will do so on another! But using pre-trained models
    is pretty straightforward once you get used to working with them. So trying different
    ones is probably a good strategy.
  prefs: []
  type: TYPE_NORMAL
