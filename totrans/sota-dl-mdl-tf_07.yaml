- en: Model Trained Data with Unfrozen Layers
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Validation accuracy is pretty good, but doesn’t get better. So the top layers
    are pretty well trained. That is, accuracy reaches a plateau.
  prefs: []
  type: TYPE_NORMAL
- en: Now we are ready unfreeze all the layers and continue training as shown in Listing [7-3](#PC24).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: Intially, a good strategy is to train with top layers frozen for speed. Setting
    a high learning rate improves training speed even more. Once validation accuracy
    plateaus, we know that the top layers are trained. We can then continue training
    by unfreezing the top layers and setting a lower learning rate. We use a *lower
    learning rate* to avoid damaging the pre-trained weights.
  prefs: []
  type: TYPE_NORMAL
- en: We still train on the same model until we clear the model sessions. This is
    why we clear model sessions before we train a new model.
