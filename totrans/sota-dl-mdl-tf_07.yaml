  type: TYPE_NORMAL
  zh: 备注
- en: Adaptive gradient descent algorithms including Adagrad, Adadelta, RMSprop, and
    Adam provide an alternative to the classical SGD algorithm. Adaptive algorithms
    provide a heuristic approach that automatically tunes hyperparameters, which avoids
    the expensive work inherent in tuning hyperparameters for a learning rate schedule
    manually.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 自适应梯度下降算法包括Adagrad、Adadelta、RMSprop和Adam，为经典的SGD算法提供了一种替代方案。自适应算法提供了一种启发式方法，可以自动调整超参数，从而避免了手动调整学习率调度超参数时的昂贵工作。
