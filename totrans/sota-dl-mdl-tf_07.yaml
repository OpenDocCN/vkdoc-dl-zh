  id: totrans-209
  prefs: []
  type: TYPE_PRE
  zh: '[PRE59]'
- en: Visualize the top five predictions as shown in Listing [7-9](#PC61).
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化前五个预测结果，如列表 [7-9](#PC61) 所示。
- en: '[PRE60]'
  id: totrans-211
  prefs: []
  type: TYPE_PRE
  zh: '[PRE60]'
- en: Not bad! We get over 80% accuracy for breed detection. If we look at the top
    five predictions, the chance of guessing the correct breed jumps to over 97%!
    Since the dataset is large and complex, we show that using pre-trained models
    can have real-world use cases. Also it is amazing that we can build such a powerful
    model in just a few lines of code!
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 还不错！我们在品种检测中获得了超过 80% 的准确率。如果我们查看前五个预测，猜测正确品种的机会跃升至超过 97%！由于数据集庞大且复杂，我们展示了使用预训练模型可以具有实际应用场景。而且令人惊讶的是，我们只需几行代码就能构建如此强大的模型！
- en: Model Trained Data with Unfrozen Layers
  id: totrans-213
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用未冻结的层训练模型
- en: Unfreeze all the layers and continue training as shown in Listing [7-10](#PC62).
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 解冻所有层并继续训练，如列表 [7-10](#PC62) 所示。
- en: '[PRE61]'
  id: totrans-215
  prefs: []
  type: TYPE_PRE
  zh: '[PRE61]'
- en: We use a *much lower learning rate* to avoid damaging the pre-trained weights.
    We only run for three epochs because training time is so long.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用一个*较低的学习率*来避免损坏预训练的权重。我们只运行三个周期，因为训练时间非常长。
- en: Note
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Set learning rates much lower for real-world use cases like we did with Stanford
    Dogs.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 对于像斯坦福狗那样的现实世界用例，设置非常低的学习率。
