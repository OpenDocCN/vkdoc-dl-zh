- en: Stanford Dogs Experiment
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We have demonstrated large dataset experiments, but none of them contained a
    lot of class labels. The *Stanford Dogs* dataset contains images of 120 breeds
    of dogs from around the world. The dataset is built with images and annotation
    from ImageNet for the task of fine-grained image categorization. Stanford Dogs
    contains 20,580 images split into 12,000 training images and 8,580 testing images.
    Class labels and bounding box annotations are provided for all 12,000 images.
  prefs: []
  type: TYPE_NORMAL
- en: Model Stanford Dogs with MobileNet
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '*MobileNets* are small, low-latency, low-power models parameterized to meet
    the resource constraints of a variety of use cases. Pre-trained models are considered
    low-power models because they consume low amounts of computer resources. The reason
    is that they have already been trained. Initial training does consume a lot of
    computer resources. But once trained, they consume a very low amount of computer
    resources. They can be built upon for classification, detection, embedding, and
    segmentation similar to the operations of other popular large-scale models like
    Inception.'
  prefs: []
  type: TYPE_NORMAL
- en: The *MobileNet-v2* model was developed at Google. It is pre-trained on the ImageNet
    dataset, which is a large dataset consisting of 1.4 million images and 1,000 classes.
    *ImageNet* is a research training dataset with a wide variety of categories like
    jackfruit and syringe. Its base knowledge helps us classify dogs from our specific
    dataset.
  prefs: []
  type: TYPE_NORMAL
