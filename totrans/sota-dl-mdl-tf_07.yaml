- en: Model with Xception
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We introduce the Xception pre-trained model to broaden your experience. Also,
    Xception is the most recent one introduced to the public.
  prefs: []
  type: TYPE_NORMAL
- en: Xception is one of six state-of-the-art image classifiers pre-trained on the
    ImageNet dataset. The other five are MobileNet, VGG16, VGG19, ResNet50, and Inception-v3\.
    Xception slightly outperforms Inception-v3 on the ImageNet dataset and vastly
    outperforms it on a larger image classification dataset with 17,000 classes (or
    more). Most importantly, it has the same number of model parameters as Inception
    implying a greater computational efficiency. VGG16 and VGG19 have smaller convolution
    layers but take much longer to train than Xception. ResNet model size is comparable,
    but Xception trains faster and produces better training results.
  prefs: []
  type: TYPE_NORMAL
- en: The Xception model was proposed by Francois Chollet in 2017\. *Xception* is
    an extension of the Inception architecture that replaces the standard Inception
    modules with depthwise Separable Convolutions. Xception is pre-trained on ImageNet.
    Xception often outperforms VGGNet, ResNet, and Inception-v3 models. As a side
    note, Chollet is also the author of Keras.
  prefs: []
  type: TYPE_NORMAL
