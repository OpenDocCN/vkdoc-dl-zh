- en: Since we are training many more images and many more classes, training time
    is much longer. So be patient. Don’t be concerned if your computer crashes. It
    is not an error. More RAM is needed. We use Colab Pro and don’t seem to have an
    issue.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们训练了更多的图像和更多的类别，因此训练时间要长得多。所以请耐心等待。如果你的电脑崩溃，请不要担心，这不是错误。需要更多的 RAM。我们使用 Colab
    Pro，并且似乎没有问题。
- en: Tip
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士
- en: You may want to spend a few dollars a month to migrate to Colab Pro if you want
    to model real-world data.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要对现实世界数据进行建模，你可能愿意每月花费几美元迁移到 Colab Pro。
- en: 'Visualize:'
