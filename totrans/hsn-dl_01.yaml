- en: Conclusion
  id: totrans-283
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: This chapter introduces Machine Learning and discusses its evolution and types.
    The chapter also hovers the feature extraction and feature selection methods.
    It then discusses a detailed pipeline that allows for a thorough exploration of
    the impact of different feature extraction variants, feature selection, and classification
    algorithms on the task of handwritten digit classification (case study in the
    previous section). The results obtained from the various combinations of these
    techniques will provide insights into the effectiveness of the proposed pipeline
    and aid in selecting the most suitable approach for this specific problem. Now
    that you know that it is difficult to select the best feature extraction and selection
    method for your problem and that a lot of effort is required to handle the bias
    and variance, let us move to Deep Learning. The next chapter introduces Deep Learning.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 本章介绍了机器学习及其演变和类型。本章还简要介绍了特征提取和特征选择方法。然后讨论了一个详细的流程，该流程允许彻底探索不同特征提取变体、特征选择和分类算法对手写数字分类任务（前节中的案例研究）的影响。这些技术各种组合的结果将提供对所提出流程有效性的见解，并有助于选择最适合此特定问题的方法。既然你知道选择最佳特征提取和选择方法对您的问题来说很困难，并且处理偏差和方差需要大量努力，那么让我们转向深度学习。下一章将介绍深度学习。
