- en: 1. Revisiting Machine Learning
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Imagine being transported back to the late 1990s in the United States, where
    the authorities discover your expertise in Machine Learning (ML). They reach out
    to seek your assistance in the automation of a time-consuming task: reading pin
    code on letters. Supposedly there are 500 such employees in various post offices
    across the country, and each employee was being paid a sum of $2000 per month
    to perform this task. This accumulates to a monthly expenditure of $1000000, resulting
    in an annual cost of $12 million, or a staggering $60 million nationwide, over
    the next five years.'
  prefs: []
  type: TYPE_NORMAL
- en: To assist the government in saving valuable exchequer funds, you are tasked
    with designing a program that can efficiently read and interpret pin codes on
    the letters. This solution will not only help in cost savings but also will greatly
    augment accuracy and accelerate the process. Can you think of an algorithm to
    accomplish this task?
  prefs: []
  type: TYPE_NORMAL
- en: It turns out that it is not very easy to write such an algorithm. Let’s see
    why! To understand the problem, let us start with an algorithm that recognizes
    “1” in a 28-pixel `×` 28-pixel image. Ideally, the pixels around the central vertical
    may be considered for identifying if the image contains “1.” However, the number
    is handwritten, and therefore it can be written in many ways, in terms of scale,
    orientation, style, etc. Figure [1-1](#Fig1) shows some pictures of handwritten
    “1”s obtained from the popular MNIST dataset containing images of handwritten
    digits. If recognizing “1” is difficult, then imagine recognizing all the digits
    and alphabets and processing these, in general.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_1_Chapter/611710_1_En_1_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-1
  prefs: []
  type: TYPE_NORMAL
- en: Some pictures of “1”s obtained from the MNIST dataset
  prefs: []
  type: TYPE_NORMAL
- en: 'Recognizing handwritten digits is an easy task for human beings, but it is
    difficult to come out with a set of rules or algorithms that recognizes the digit
    in a given picture. So we need some system that can imitate human beings to accomplish
    this task. Here Machine Learning (ML) can help us. Informally ML can be defined
    as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Machine Learning* is a subset of Artificial Intelligence, which may be considered
    as the ability of machines to imitate humans. [[1](#CR1)]'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The formal definition of ML is discussed in the following sections. ML helps
    us accomplish tasks like disease classification, prediction and forecasting, object
    recognition, sentiment classification, etc.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter briefly introduces Machine Learning and discusses its types, the
    pipeline and its components, its applications, and the bias–variance trade-offs.
    This chapter also presents **MNIST dataset** **classification** using a conventional
    Machine Learning pipeline employing feature extraction, feature selection, classification,
    and analysis of the results. The chapter also includes the Python implementations
    of some of the most important feature extraction and selection techniques. Feature
    extractions from various modalities like images, sound, and text are briefly discussed
    in this chapter. In addition to the above, the chapter hovers over an important
    dimension reduction methodology called Principal Component Analysis (PCA). The
    chapter ends with a case study, namely, the **classification of the MNIST dataset
    using a conventional Machine Learning pipeline**. The case study uses an important
    feature extraction technique, Local Binary Pattern (LBP), selects the important
    features using a filter method, and uses Support Vector Machine (SVM) to classify
    the data. The reader new to this domain may not be versed with some of the terms
    used in this section. For such readers, the following sections will be helpful.
    However, those familiar with these concepts may skip this chapter and move to
    the next one.
  prefs: []
  type: TYPE_NORMAL
- en: 'Machine Learning: Brief History, Definition, and Applications'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Since time immemorial, humans have been trying to develop machines that are
    intellectually as good as human beings. The desire of machines to learn as humans
    do and get better at a task with experience helped us reach the present age of
    splendid technological advancement. This betterment should be measurable. The
    development of Checkers Program by Samuel, at IBM, in the 1950s can be considered
    as one of the initial steps toward this goal. The 1960s saw progress in the field
    of pattern recognition, particularly after the works of Rosenblatt on perceptron
    followed by that of Minsky and Papert describing the limitations of perceptron.
    The 1970s saw the development of expert systems and symbolic natural language
    processing. The following decade witnessed advancements in Decision Trees and
    the development of Multi-layer Perceptron (MLP). Some of the most important learning
    methodologies like Support Vector Machines, Reinforcement Learning, and ensemble
    models were developed in the 1990s. The desire of the scientific community to
    develop machines that could beat humans in some cognitive tasks got a boost with
    the development of Deep Blue, at IBM, which defeated the then-chess champion Garry
    Kasparov. The work toward designing the self-driven cars, initially using the
    above methodologies, has come a long way since. Figure [1-2](#Fig2) depicts the
    major milestones in the journey of Machine Learning till 1999.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_1_Chapter/611710_1_En_1_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-2
  prefs: []
  type: TYPE_NORMAL
- en: Machine Learning before 2000
  prefs: []
  type: TYPE_NORMAL
- en: Machine Learning (ML) is a subset of Artificial Intelligence (AI). ML algorithms
    are trained and tested using datasets and help us do tasks, which humans do better.
    The dataset may or may not be labeled. AI, on the other hand, strives to develop
    machines with “human like cognitive abilities” [[2](#CR2)]. To understand the
    concept, let us take an example. Suppose you need to develop a system that takes
    an image as an input and classifies it as “cat” or “not cat.” The input images
    are of size 100 × 100, and the output is a binary number having a value 0 (not
    cat) or 1 (cat). You somehow develop this system and take 1000 new images, out
    of which the system correctly identifies 673 images. The percentage of unseen
    images correctly classified (accuracy) is hence 67.3\. You ask one of your friends,
    who happens to be a Machine Learning engineer, to help you improve the system.
    They modify the system, after which the system correctly classifies 721 images,
    thus improving the accuracy by 4.8%. Moreover, as the system is trained with more
    images, the accuracy increases. Considering the percentage of unseen samples correctly
    identified, that is, accuracy, as the performance measure, the performance, P,
    of the system improves with experience, E (in this case, data), on the given task,
    T (classification). This system is therefore learning. Formally, Machine Learning
    can be defined as
  prefs: []
  type: TYPE_NORMAL
- en: A system is said to learn when the performance ***P*** improves with Experience
    ***E***, on task ***T***. [[3](#CR3)]
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'ML is currently being used in various domains, from product recommendation
    to stock market prediction, to disease detection, etc. Some of the interesting
    applications of Machine Learning are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Recommendation Systems: Harry had an account on Amazon and started buying his
    favorite stuff after he received his first salary. He was fond of books, stationary,
    and music. So he bought books like *The Fault in Our Stars*, fancy notebooks,
    and a percussion instrument from the platform. He bought similar stuff the next
    month also. When he visited the platform again, the recommendation section displayed
    some books by John Green and others, some musical instruments, notebooks, and
    sound bars. Can you guess why books by John Green and sound bars were shown in
    the recommendation section? This is because the platform learns using Machine
    Learning, leveraging user data and ratings. It also uses natural language processing,
    discussed later in this book. Now visit your YouTube and that of your friend.
    Just think of the reasons if you find the recommendations for the two different.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Google Maps: Assume you need to go for an interview to a company located at
    Gurugram, a city located in the vicinity of New Delhi, the capital of India. You
    are currently living in Delhi and have never been to that company. You decide
    to ride a car to reach your destination and find the best route using an app called
    Google Maps. Wait! How does this app know the best route from your location to
    the destination? Also, the app claims that some routes are better than others,
    in terms of congestion, distance, or some other criteria. This app uses Machine
    Learning to find the optimal path from source to destination. It gets the traffic
    data from “Waze,” an app that Google bought in 2013\. If you are using this app
    since long, you must have observed that its performance has significantly improved.
    The credit for this also goes to Machine Learning. Well, your turning on location
    does help Google Maps also.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Other examples of applications of Machine Learning include
  prefs: []
  type: TYPE_NORMAL
- en: Disease detection and prediction
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Amazon Alexa
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Self-driving vehicles
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sentiment Analysis
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Customer churning
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Each of the above is discussed in detail in the following chapters. Now, you
    got an idea that Machine Learning is used everywhere: right from the face recognition
    on your handheld devices to the recommendations in Netflix. Let’s move to the
    types of learning.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Types of Machine Learning: Task (T)'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Machine Learning can be classified as supervised, unsupervised, semi-supervised,
    or reinforcement. In supervised learning, the system is trained using the samples
    and corresponding labels. During testing, it is given the input, and it generates
    the predicted output. The learning algorithm tries to learn the parameters of
    the model to decrease the gap between the predicted label and the correct label.
    Supervised learning can further be classified as classification and regression.
    In classification, the labels corresponding to samples are discrete, whereas in
    the case of regression, they are continuous.
  prefs: []
  type: TYPE_NORMAL
- en: In unsupervised learning, the system is provided with the features, and no label
    is associated with the samples. These algorithms unveil the patterns in the given
    data. The examples of such learning include finding trends on social media, the
    association between the products, etc.
  prefs: []
  type: TYPE_NORMAL
- en: '**Supervised Learning**'
  prefs: []
  type: TYPE_NORMAL
- en: “In supervised learning, we are provided with some input/output samples (X,
    y). The algorithm aims to find a function y = f(X), that relate the feature vector
    with the label. This function f is learnt and evaluated on some unseen data” [[4](#CR4)].
  prefs: []
  type: TYPE_NORMAL
- en: '**Unsupervised Learning**'
  prefs: []
  type: TYPE_NORMAL
- en: “In unsupervised learning, we are given only samples X of the data, and we compute
    a function f such that y = f(X) is ***simpler***” [[5](#CR5)]. Clustering is a
    type of unsupervised learning.
  prefs: []
  type: TYPE_NORMAL
- en: '**Semi-supervised Learning**'
  prefs: []
  type: TYPE_NORMAL
- en: “Semi-supervised learning (SSL) is halfway between supervised and unsupervised
    learning. In addition to unlabelled data, the algorithm is provided with the labels
    of some of the samples, not all” [[5](#CR5)].
  prefs: []
  type: TYPE_NORMAL
- en: '**Reinforcement Learning**'
  prefs: []
  type: TYPE_NORMAL
- en: “In Reinforcement learning, the system acts on the environment, and it gets
    some feedback. Based on this feedback the system alters its actions”. Reinforcement
    Learning is often used in automated drones.
  prefs: []
  type: TYPE_NORMAL
- en: The next element in the definition of Machine Learning is performance, P. Let
    us now understand some of the common performance measures.
  prefs: []
  type: TYPE_NORMAL
- en: Performance (P)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Consider a classification problem having two classes: Positive (P) and Negative
    (N). To classify this dataset, you design a system which predicts Positive or
    Negative for an unknown sample. The predictions can be True Positive (TP), True
    Negative (TN), False Positive (FP), or False Negative (FN). The classification
    results can be represented in a confusion matrix, as shown in Figure [1-3](#Fig3).'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_1_Chapter/611710_1_En_1_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-3
  prefs: []
  type: TYPE_NORMAL
- en: The confusion matrix of a binary classification problem
  prefs: []
  type: TYPE_NORMAL
- en: 'True Positive (TP): The model correctly predicts a positive instance.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'True Negative (TN): The model correctly predicts a negative instance.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'False Positive (FP): The model incorrectly predicts that an instance is positive,
    when it is actually negative. This is referred as Type I error.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'False Negative (FN): The model incorrectly predicts that an instance is negative,
    when it is actually positive. This is referred as Type II error.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These four cases help evaluate the performance of the developed model. Important
    metrics like accuracy, specificity, recall, precision, and F1 score can be derived
    from these cases to offer a broad assessment of the model's effectiveness in distinguishing
    between the two classes. Note that the model should have minimum possible false
    positives and false negatives, while true positives and true negatives should
    be as high as possible. Table [1-1](#Tab1) shows the various performance measures
    for a two-class problem and their brief description.
  prefs: []
  type: TYPE_NORMAL
- en: Table 1-1
  prefs: []
  type: TYPE_NORMAL
- en: Classification Metrics
  prefs: []
  type: TYPE_NORMAL
- en: '| Performance Measure | Formula | Description | Keras Implementation | sklearn
    Implementation |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Accuracy | ![$$ \frac{TP+ TN}{TP+ TN+ FN+ FP} $$](../images/611710_1_En_1_Chapter/611710_1_En_1_Chapter_TeX_IEq1.png)
    | Total number of test cases correctly classified. | tf.keras.metrics.Accuracy¹
    | sklearn.metrics.accuracy_score |'
  prefs: []
  type: TYPE_TB
- en: '| Specificity(False Positive Rate) | ![$$ \frac{TN}{TN+ FP} $$](../images/611710_1_En_1_Chapter/611710_1_En_1_Chapter_TeX_IEq2.png)
    | Total number of negative test cases correctly classified_. |   |   |'
  prefs: []
  type: TYPE_TB
- en: '| Sensitivity/ recall(True Positive Rate) | ![$$ \frac{TP}{TP+ FN} $$](../images/611710_1_En_1_Chapter/611710_1_En_1_Chapter_TeX_IEq3.png)
    | Total number of positive test cases correctly classified. | tf.keras.metrics.Recal1^l
    | [sklearn.​metrics](https://scikit-learn.org/stable/modules/classes.html#module-sklearn.metrics).recall_score
    |'
  prefs: []
  type: TYPE_TB
- en: '| Precision | ![$$ \frac{TP}{TP+ FP} $$](../images/611710_1_En_1_Chapter/611710_1_En_1_Chapter_TeX_IEq4.png)
    | Goodness of positive predictions. | tf.keras.metrics.Precision¹ | precision_score²
    |'
  prefs: []
  type: TYPE_TB
- en: '| F-score | (2 × *Recall* × *Precision*)/(*Recall* + *Precision*) | It is used
    for unbalanced class problems, where accuracy may be misleading. | tf.keras.metrics.F1Score¹
    | f1_score³ |'
  prefs: []
  type: TYPE_TB
- en: 'In order to use the functions stated in the table, you need to import the following
    (refer to the superscript of the functions in the table):'
  prefs: []
  type: TYPE_NORMAL
- en: import tensorflow as tf
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[sklearn.​metrics](https://scikit-learn.org/stable/modules/classes.html#module-sklearn.metrics).precision_score'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: fromsklearn.metricsimport f1_score
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For a multiclass problem, the above matrix can be extended as required. For
    example, for a three-class classification problem, the matrix shown in Figure
    [1-4](#Fig4) explains the performance of the classifier, not just in terms of
    correct classifications, but also how many test samples are classified as other
    classes. The diagonal of this matrix depicts the test cases correctly classified
    by the algorithm. In ***sklearn*** it is implemented as *sklearn.metrics.****confusion_matrix***.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_1_Chapter/611710_1_En_1_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-4
  prefs: []
  type: TYPE_NORMAL
- en: Confusion matrix
  prefs: []
  type: TYPE_NORMAL
- en: In the case of a multiclass problem, the class-wise precision and recall can
    be calculated. The precision and the recall of the model can be perceived as the
    average precision and average recall of each class. The usage of the above metrics
    is shown in the examples and illustrations that follow.
  prefs: []
  type: TYPE_NORMAL
- en: The plot of specificity and sensitivity is referred to as the Receiver Operating
    Curve (ROC) by varying the threshold. The area under this curve is called AUC
    or Area under the Receiving Curve (Figure [1-5](#Fig5)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_1_Chapter/611710_1_En_1_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-5
  prefs: []
  type: TYPE_NORMAL
- en: An example of ROC-AUC curve
  prefs: []
  type: TYPE_NORMAL
- en: The metrics for evaluating the performance of regression are shown in Table
    [1-2](#Tab2).
  prefs: []
  type: TYPE_NORMAL
- en: Table 1-2
  prefs: []
  type: TYPE_NORMAL
- en: Regression Metrics
  prefs: []
  type: TYPE_NORMAL
- en: '| Performance Measure | Formula | sklearn Implementation | Keras Implementation
    |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Mean Squared Error | ![$$ \frac{1}{N}{\sum}_{i=1}^N{\left({y}_i-\hat{y}\right)}^2
    $$](../images/611710_1_En_1_Chapter/611710_1_En_1_Chapter_TeX_IEq5.png) | sklearn.metrics.mean_squared_error
    | tf.keras.metrics.MeanSquaredError |'
  prefs: []
  type: TYPE_TB
- en: '| Root Mean Squared Error | ![$$ \sqrt{\frac{1}{N}{\sum}_{i=1}^N{\left({y}_i-\hat{y}\right)}^2}
    $$](../images/611710_1_En_1_Chapter/611710_1_En_1_Chapter_TeX_IEq6.png) | sklearn.metrics.mean_squared_errorsquared
    = False, returns RMSE | tf.keras.metrics.RootMeanSquaredError |'
  prefs: []
  type: TYPE_TB
- en: '| Mean Absolute Error | ![$$ \frac{1}{N}{\sum}_{i=1}^N\left&#124;{y}_i-\hat{y}\right&#124;
    $$](../images/611710_1_En_1_Chapter/611710_1_En_1_Chapter_TeX_IEq7.png) | sklearn.metrics.median_absolute_error
    | tf.keras.metrics.MeanAbsoluteError |'
  prefs: []
  type: TYPE_TB
- en: '| R-Squared | ![$$ 1-\frac{\frac{1}{N}{\sum}_{i=1}^N{\left({y}_i-\hat{y}\right)}^2}{\frac{1}{N}{\sum}_{i=1}^N{\left({y}_i-\underset{\_}{y}\right)}^2}
    $$](../images/611710_1_En_1_Chapter/611710_1_En_1_Chapter_TeX_IEq8.png) | sklearn.metrics.r2_score
    | tf.keras.metrics.R2Score |'
  prefs: []
  type: TYPE_TB
- en: Each of the above is explained in the following chapters, as and when they are
    used. Now, let us now move to the elements of a conventional Machine Learning
    pipeline.
  prefs: []
  type: TYPE_NORMAL
- en: Conventional Machine Learning Pipeline
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The conventional Machine Learning pipeline includes the complete process of
    developing a Machine Learning model. This includes steps from data collection
    to model deployment. The major steps in the Machine Learning pipeline include
  prefs: []
  type: TYPE_NORMAL
- en: 'Problem Definition: The problem at hand needs to be clearly defined and classified
    as a supervised learning, unsupervised learning, or Reinforcement Learning problem.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Data Collection and Preprocessing: The protocol of collecting data is then
    decided. The data is then collected, and preprocessing including handling missing
    values, outlier analysis, and other processes aimed at addressing the inconsistencies
    in the data are carried out.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Exploratory Data Analysis (EDA): This step is essential to analyze the given
    data and access the characteristics of the data.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Feature Engineering: This step includes selecting relevant features from the
    existing features, transforming existing features, or creating new features to
    improve the performance of the model.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Data Splitting: The data is then divided into the train set, validation set,
    and test set. The train set is used to train the model, the validation set is
    used to find the values of the hyperparameters, and the model is evaluated using
    the test set.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Choosing a Model: This is followed by choosing the learning algorithm like
    Support Vector Machine, Decision Tree, etc.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Model Training: The model is then trained on the training set. The validation
    set is used to adjust the hyperparameters of the so-formed model. In order to
    do this, grid search, random search, or other optimization methods are used.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Model Evaluation: The performance of the model is then evaluated using the
    test set. Metrics uses to do this have already been discussed.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Analysis: The model''s decisions are then interpreted based on the application.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Model deployment, monitoring, and maintenance follow. Based on the feedback
    of the deployed model and the insights, each step may be refined multiple times.
    Figure [1-6](#Fig6) summarizes the discussion.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_1_Chapter/611710_1_En_1_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-6
  prefs: []
  type: TYPE_NORMAL
- en: Conventional Machine Learning pipeline
  prefs: []
  type: TYPE_NORMAL
- en: Let’s now have a look at one of the tasks, namely, regression, and understand
    how we actually learn the parameters of a model in a type of regression called
    linear regression.
  prefs: []
  type: TYPE_NORMAL
- en: Regression
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Regression is a type of supervised learning where we are given (*X*, *y*), where
    *XϵR*^(*d*) and *yϵR*. That is, the labels are continuous. Regression aims to
    develop a model that predicts *y* (*y* _ *pred*) for an unseen *X*, when the model
    has been trained on the training data.
  prefs: []
  type: TYPE_NORMAL
- en: The parameters of the model are learned by minimizing the squared difference
    between *y* _ *pred* and *y* _ *test*. That is to minimize *loss* = (*y*[*pred*] − *y*[*test*])²
    or ![$$ s=\frac{1}{2}{\left({y}_{pred}-{y}_{test}\right)}^2 $$](../images/611710_1_En_1_Chapter/611710_1_En_1_Chapter_TeX_IEq9.png)
    , where ½ is inserted just for the sake of mathematical convenience.
  prefs: []
  type: TYPE_NORMAL
- en: This loss can be minimized by finding the gradient with respect to the parameter
    and incrementally moving in the opposite direction.
  prefs: []
  type: TYPE_NORMAL
- en: In the case of linear regression, the label *y* can be considered as the linear
    combination of ![$$ {X}_m^i $$](../images/611710_1_En_1_Chapter/611710_1_En_1_Chapter_TeX_IEq10.png)
    for a sample *X*[*m*]. That is,
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ y\_ pred={\sum}_{i=1}^d{w}_i{X}_m^i $$](../images/611710_1_En_1_Chapter/611710_1_En_1_Chapter_TeX_Equa.png)'
  prefs: []
  type: TYPE_IMG
- en: The values of *w*[*i*]s can be calculated using the concept explained above.
    That is,
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ loss=\frac{1}{2}{\left({y}_{pred}-{y}_{test}\right)}^2 $$](../images/611710_1_En_1_Chapter/611710_1_En_1_Chapter_TeX_Equb.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ loss=\frac{1}{2}{\left({\sum}_{i=1}^d{w}_i{X}_m^i-{y}_{test}\right)}^2
    $$](../images/611710_1_En_1_Chapter/611710_1_En_1_Chapter_TeX_IEq11.png)'
  prefs:
  - PREF_UL
  type: TYPE_IMG
- en: '![$$ \partial loss/\left(\partial {w}_i\right)=\partial /\left(\partial {w}_i\right)\left(\frac{1}{2}{\left({\sum}_{i=1}^d{w}_i{X}_m^i-{y}_{test}\right)}^2\right)
    $$](../images/611710_1_En_1_Chapter/611710_1_En_1_Chapter_TeX_IEq12.png)'
  prefs:
  - PREF_UL
  type: TYPE_IMG
- en: '![$$ \partial loss/\left(\partial {w}_i\right)=\left({y}_{pred}-{y}_{test}\right){X}_m^i
    $$](../images/611710_1_En_1_Chapter/611710_1_En_1_Chapter_TeX_IEq13.png)'
  prefs:
  - PREF_UL
  type: TYPE_IMG
- en: '![$$ -\partial loss/\left(\partial {w}_i\right)=-\left({y}_{pred}-{y}_{test}\right){X}_m^i
    $$](../images/611710_1_En_1_Chapter/611710_1_En_1_Chapter_TeX_IEq14.png)'
  prefs:
  - PREF_UL
  type: TYPE_IMG
- en: 'Therefore, after each iteration, the weights are changed as per the following
    formula:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {w}_i={w}_i-\alpha \left({y}_{pred}-{y}_{test}\right){X}_m^i $$](../images/611710_1_En_1_Chapter/611710_1_En_1_Chapter_TeX_Equc.png)'
  prefs: []
  type: TYPE_IMG
- en: where *α* is the learning rate.
  prefs: []
  type: TYPE_NORMAL
- en: In general,
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ W=W-\alpha \left({y}_{pred}-{y}_{test}\right){X}_x $$](../images/611710_1_En_1_Chapter/611710_1_En_1_Chapter_TeX_Equd.png)'
  prefs: []
  type: TYPE_IMG
- en: The value of *α* determines the step size at each iteration. If the value of
    this parameter is small, it will take a longer time to reach the optimal solution,
    whereas if it is large, we may skip the optimal solution. The web resources include
    the code of linear regression and its application to the popular Boston Housing
    price dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Note that at times it becomes important to extract features from a given dataset,
    or reduce the number of features, or transform the features to another space.
    Feature selection and feature extraction are two of the most important components
    of a ML pipeline. Let us have a brief overview of both of them.
  prefs: []
  type: TYPE_NORMAL
- en: Feature Selection
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Feature selection aims to select a subset of features from among the given features
    with the aim of minimizing the classification error. That is, for a given *X* = {*X*¹,
    *X*², …, *X*^(*n*)}, a subset *X* = {*X*¹, *X*², …, *X*^(*d*)}, *d* ≤ *n*, of
    the most representative features is to be selected with the aim of minimizing
    the memory requirements and the computation time of the model. Feature selection
    is needed because some of the features do not contribute to enhancing the performance
    of the model and some may negatively affect the performance of the model.
  prefs: []
  type: TYPE_NORMAL
- en: The readers may note that feature selection is not the same as dimensionality
    reduction wherein new features may be computed and the original data and units
    are generally lost. In contrast, in feature selection, only a small amount of
    features are selected, and original data is preserved. This may also be considered
    as an optimization problem, wherein a subset of features is selected with the
    objective of optimizing the objective function.
  prefs: []
  type: TYPE_NORMAL
- en: Feature selection may use search strategies or evaluation strategies. Heuristic
    search algorithms like genetic algorithms are often used in selecting the optimal
    subset of features. The evaluation strategies include filter and wrapper methods
    (Figure [1-7](#Fig7)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_1_Chapter/611710_1_En_1_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-7
  prefs: []
  type: TYPE_NORMAL
- en: Feature selection method
  prefs: []
  type: TYPE_NORMAL
- en: Filter Method
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In filter methods the selection of features is independent of the learning algorithm.
    This may be done with the help of the information content. For example, a feature
    selection method called Fisher Discriminant Ratio (FDR), generally used for a
    two-class problem, gives more importance to a feature in which the distance between
    the centers of the clusters of those two classes is more, whereas the variance
    of those two clusters is less, that is, for a feature *X*[*i*] having two subsets
    *X*[1]and *X*[2] representing the data of the two classes.
  prefs: []
  type: TYPE_NORMAL
- en: (*m*[1] − *m*[2])² is more
  prefs: []
  type: TYPE_NORMAL
- en: whereas
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \left({s}_1^2+{s}_2^2\right) $$](../images/611710_1_En_1_Chapter/611710_1_En_1_Chapter_TeX_IEq15.png)
    is less'
  prefs: []
  type: TYPE_NORMAL
- en: where *m*[1] is the mean of *X*[1], *m*[2] is the mean of *X*[2], *s*[1] is
    the standard deviation of *X*[1], and *s*[2] is the standard deviation of *X*[2].
    The formula for calculating the FDR of a feature is
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ FDR=\frac{{\left({m}_1-{m}_2\right)}^2}{s_1^2+{s}_2^2} $$](../images/611710_1_En_1_Chapter/611710_1_En_1_Chapter_TeX_Eque.png)'
  prefs: []
  type: TYPE_IMG
- en: This method can be used in Forward Feature Selection (FFS). In FFS, the FDR
    of each feature is calculated, and the features are ordered in descending order
    of their FDR values. This is followed by taking the first feature (from the so-ordered
    dataset) and evaluating the performance in the first iteration. In the second
    iteration two features are taken and so on. The performance of the model in each
    iteration is noted, and the minimum number of features that result in optimal
    performance is selected.
  prefs: []
  type: TYPE_NORMAL
- en: The following code shows the arrangement of features in order of their FDR scores
    for the popular IRIS dataset, followed by the application of Forward Feature Selection.
  prefs: []
  type: TYPE_NORMAL
- en: '**Code**:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Note that, in the IRIS dataset, the most important feature (as selected by FDR)
    can easily classify the two classes as shown in the scatter plot in Figure [1-8](#Fig8).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_1_Chapter/611710_1_En_1_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-8
  prefs: []
  type: TYPE_NORMAL
- en: Scatter plot of the two classes in the most important feature selected by FDR
  prefs: []
  type: TYPE_NORMAL
- en: Wrapper Method
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In wrapper methods we order the features in terms of their performance viz-a-viz
    the classifier. For example, a popular wrapper method called Recursive Feature
    Elimination (RFE) uses the following strategy:'
  prefs: []
  type: TYPE_NORMAL
- en: First of all, we take all the features and find the performance with respect
    to the given classifier.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Then we eliminate one feature at a time and note the performances in all the
    cases.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The feature whose removal improves the performance is then eliminated.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This process is repeated with the so-obtained subset of features, till no further
    optimization is possible.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The following code shows the application of RFE on the wine dataset:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '**Output:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Filter vs. Wrapper Methods
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The filter methods are generally faster and make use of the intrinsic property
    of the data, though they have a disadvantage: generally they end up selecting
    a larger subset of features. The wrapper methods, on the other hand, generally
    lead to better accuracy and avoid overfitting. However, these methods are much
    slower and are highly sensitive to the selection of a classifier.'
  prefs: []
  type: TYPE_NORMAL
- en: Note that feature selection is an exhaustive topic in which there are many more
    methods like sequential forward selection, sequential backward selection, bidirectional
    search, and so on. It is difficult to find the most appropriate feature selection
    method for your task and dataset. Here Deep Learning comes handy as it almost
    eliminates the need of feature selection.
  prefs: []
  type: TYPE_NORMAL
- en: Feature Extraction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A classification system generally extracts features from the given data before
    applying classification to it. Feature extraction is needed as more representative,
    compact representation of the input data is needed to design an effective and
    efficient system. This section briefly discusses various feature extraction methods
    particularly used in image analysis. The methods in this section find application
    in robot vision, medical imaging, character recognition, etc. The feature extraction
    methods used for text data are discussed in Chapter [3](611710_1_En_3_Chapter.xhtml)
    of this book, and those used for sound data are discussed in the Appendix G. As
    per *Pattern Recognition* by Theodoridis and Koutroumbas (Elsevier, 2006)
  prefs: []
  type: TYPE_NORMAL
- en: Feature Extraction
  prefs: []
  type: TYPE_NORMAL
- en: “The goal of feature extraction in images is to generate a feature vector which
    is generally fed into a classifier and helps it to classify images in one of the
    possible classes.”
  prefs: []
  type: TYPE_NORMAL
- en: Feature extraction is not only used in classification but also in segmentation
    and to reduce redundant information. In addition to the above, raw images generally
    contain a lot of pixels, and all these pixels cannot be taken as the features
    of a given image. For example, for a 1024 × 1024 image, the number of pixels is
    1 million. If all these pixels are taken as features, then the system will have
    to learn 1 million parameters that will require a large amount of training data
    and computation data and a huge amount of memory. If somehow the same image can
    be represented as a vector containing 256 values, then the system will become
    much more efficient and effective. As a matter of fact, using the pixels of a
    raw image as features will lead to the curse of dimensionality. As per Bellman
    (*Adaptive Control Processes*, Princeton University Press, Princeton, NJ, 1961),
    the curse of dimensionality can be defined as
  prefs: []
  type: TYPE_NORMAL
- en: Curse of Dimensionality
  prefs: []
  type: TYPE_NORMAL
- en: “The number of samples required to estimate an arbitrary function with the given
    accuracy grows exponentially with respect to the number of input variables (Dimensionality
    of the function).”
  prefs: []
  type: TYPE_NORMAL
- en: So reducing the number of features helps us handle the curse of dimensionality.
    For images many types of features can be extracted. These include
  prefs: []
  type: TYPE_NORMAL
- en: Histogram features
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Gray-level features
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Shape features
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Color features
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Histogram features, also referred to as texture features, generally include
    either first-order statistics or second-order statistics of the image. The first-order
    statistics contain information related to the gray-level distribution, whereas
    the second-order statistics include information related to the relative distribution
    of gray levels. Examples of second-order gray-level features include co-occurrence
    matrix.
  prefs: []
  type: TYPE_NORMAL
- en: Gray-Level Co-occurrence Matrix
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In Gray-Level Co-occurrence Matrix (GLCM), the co-occurrence matrix of gray
    levels is calculated. This is followed by evaluation of the direction of orientation
    with the step size of 45 degree. For each direction we calculate six metrices,
    namely, Contrast, Dissimilarity, Homogeneity, ASM, Energy, and Correlation. Out
    of these ASM might be dropped, as Energy is directly related to ASM. These five
    parameters are calculated for each of the four angles (0, 45, 90, 135), thus creating
    20 features. The function of ***sklearn*** that helps us extract the GLCM features
    is **graycomatrix**. The following code finds four GLCM features of an image called
    gray_image.
  prefs: []
  type: TYPE_NORMAL
- en: '**Code**:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Another example of histogram features is Gray-Level Run Length Matrix (GLRL).
  prefs: []
  type: TYPE_NORMAL
- en: Local Binary Pattern
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: LBP evaluates the weighted average of each pixel followed by the formation of
    a histogram of the pixel intensities of the so-formed image. It has many variants,
    the most popular of which are default, ror, nri_uniform, and uniform. The case
    study given in this chapter describes this feature extraction method in detail.
    Note that the radius from the central pixel and the number of neighbors are the
    two most important parameters of this method. Figure [1-10](#Fig10) shows the
    application of LBP on the image shown in Figure [1-9](#Fig9). The LBP is applied
    with radii 1 and 2 and the numbers of neighbors 4 and 8 and the methods default,
    ror, nri_uniform, and uniform.
  prefs: []
  type: TYPE_NORMAL
- en: '**Code**:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: In the same way, the LBP of the given image with parameters r = 2 and neighborhood
    = 8 can be found using various versions of LBP.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_1_Chapter/611710_1_En_1_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-10
  prefs: []
  type: TYPE_NORMAL
- en: 'Output: LBP variants with P = 4, 8 and R = 1, 2'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_1_Chapter/611710_1_En_1_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-9
  prefs: []
  type: TYPE_NORMAL
- en: Original image
  prefs: []
  type: TYPE_NORMAL
- en: Let us now move to another feature extraction technique called Histogram of
    Oriented Gradients.
  prefs: []
  type: TYPE_NORMAL
- en: Histogram of Oriented Gradients
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In Histogram of Oriented Gradients, we generally take a block and slide the
    block over the whole image. For each patch, we find the gradient of that block.
    These two values can be found using the following formula:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ H=I\left(i,j+1\right)-I\left(i,j-1\right) $$](../images/611710_1_En_1_Chapter/611710_1_En_1_Chapter_TeX_Equf.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ V=I\left(i+1,j\right)-I\left(i-1,j\right) $$](../images/611710_1_En_1_Chapter/611710_1_En_1_Chapter_TeX_Equg.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ Magnitude=\sqrt{\left({H}^2+{V}^2\right)} $$](../images/611710_1_En_1_Chapter/611710_1_En_1_Chapter_TeX_Equh.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ Theta=\left(\frac{V}{H}\right) $$](../images/611710_1_En_1_Chapter/611710_1_En_1_Chapter_TeX_Equi.png)'
  prefs: []
  type: TYPE_IMG
- en: This is followed by the creation of a histogram of various gradients. The feature
    vector so obtained can effectively represent the image in terms of oriented gradients.
  prefs: []
  type: TYPE_NORMAL
- en: There are many more feature extraction methods, and only some of them have been
    discussed in this chapter. It is difficult to find the most appropriate feature
    extraction method that works for the task at hand. Deep Learning comes to the
    rescue here, as it effectively eliminates the need of feature extraction.
  prefs: []
  type: TYPE_NORMAL
- en: Let us now have a look at an important feature transformation method called
    Principal Component Analysis.
  prefs: []
  type: TYPE_NORMAL
- en: Principal Component Analysis
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Assume that you have two-dimensional data and need to find out the direction
    in which the variance of the data is maximum. Assume initially the data is represented
    in an *X* − *Y* coordinate system and this direction turns out to be *M*. Now
    the direction that is perpendicular to *M*, say *N*, along with *M* forms the
    new axis system in which the original data can be transformed and is most probably
    not correlated.
  prefs: []
  type: TYPE_NORMAL
- en: 'Principal Component Analysis finds the set of new axes referred to as Principal
    Directions in which the variation of the data is maximum. This can also be used
    to reduce the dimensionality of the data. These principal components can be found
    by finding the eigenvalues and the corresponding vectors from the data covariance
    matrix. The data covariance matrix can be found by using the following formula:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \varSigma ={\left(X-\underset{\_}{X}\right)}^T\times \left(X-\underset{\_}{X}\right)
    $$](../images/611710_1_En_1_Chapter/611710_1_En_1_Chapter_TeX_Equj.png)'
  prefs: []
  type: TYPE_IMG
- en: To find the principal component for X
  prefs: []
  type: TYPE_NORMAL
- en: Find the eigenvalues and corresponding eigen data vectors of the covariance
    matrix *Σ*.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Arrange the eigenvalues in the decreasing order and do the corresponding vectors.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The so-arranged eigen vectors are then stacked as *eigen* _ *vectors*. Note
    that you can take the requisite number of eigen vectors.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Now find
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {X}_{transformed}=X\times eigen\_ vectors $$](../images/611710_1_En_1_Chapter/611710_1_En_1_Chapter_TeX_Equk.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The shapes of the matrices formed in this process are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '| Matrix | Shape |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| *X* | *n* × *m* |'
  prefs: []
  type: TYPE_TB
- en: '| ![$$ \left(X-\underset{\_}{X}\right) $$](../images/611710_1_En_1_Chapter/611710_1_En_1_Chapter_TeX_IEq16.png)
    | *n* × *m* |'
  prefs: []
  type: TYPE_TB
- en: '| *Σ* | *m* × *m* |'
  prefs: []
  type: TYPE_TB
- en: '| *X*[*transformed*] | *n* × *m* |'
  prefs: []
  type: TYPE_TB
- en: The following code implements PCA. Note that the image has been reconstructed
    using just one principal component, 10 components and 80 components. The output
    is shown in Figure [1-11](#Fig11).
  prefs: []
  type: TYPE_NORMAL
- en: '**Code:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: The output is shown in Figure [1-11](#Fig11).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_1_Chapter/611710_1_En_1_Fig11_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-11
  prefs: []
  type: TYPE_NORMAL
- en: Output of the above PCA code
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, let us move to one of the most important topics in Machine Learning: the
    bias–variance trade-off.'
  prefs: []
  type: TYPE_NORMAL
- en: Bias–Variance Trade-off
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This is perhaps one of the most important topics in Machine Learning. So far
    we have seen how to reduce the error on the training set using gradient descent.
    That is, what should be the parameters of the model so as to have minimum training
    error? However, what matters is the test error, or how well a classifier (or regression
    algorithm) performs on the test set, that is, how well can it generalize. Let
    us try to understand the decomposition of this error. Assume that you have a dataset
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ D=\left\{\left({x}_1,{y}_1\right),\dots, \left({x}_n,{y}_n\right)\right\}
    $$](../images/611710_1_En_1_Chapter/611710_1_En_1_Chapter_TeX_Equl.png)'
  prefs: []
  type: TYPE_IMG
- en: drawn from a distribution *ζ*(*x*, *y*), where *yϵR* (regression setting). Here,
    *ζ*(*x*, *y*) is the probability distribution from which *n* independent samples
    have been drawn to create D. Note that *ζ*(*x*, *y*) = *ζ*(*y*/*x*)*ζ*(*x*) and
    ![$$ \underset{\_}{y}(x) $$](../images/611710_1_En_1_Chapter/611710_1_En_1_Chapter_TeX_IEq17.png)
    is the predicted value of the label *y*.
  prefs: []
  type: TYPE_NORMAL
- en: We train the ML algorithm *M* with the training dataset and come up with the
    hypothesis h on dataset D
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {h}_D=M(D) $$](../images/611710_1_En_1_Chapter/611710_1_En_1_Chapter_TeX_Equm.png)'
  prefs: []
  type: TYPE_IMG
- en: The expected test error in this case will be
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ E=\left[{\left({h}_D(x)-y\right)}^2\right] $$](../images/611710_1_En_1_Chapter/611710_1_En_1_Chapter_TeX_Equn.png)'
  prefs: []
  type: TYPE_IMG
- en: Based on this error, we find if the model performs well or not.
  prefs: []
  type: TYPE_NORMAL
- en: Overfitting and Underfitting
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The Machine Learning model should give a good performance with both the train
    and the test set. If the model does not perform well with the train set, you can
    opt for options like having more data hyperparameter tuning or selecting a different
    learning algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: Overfitting is a condition wherein the model performs well on the train set
    but poorly on the test set. A complex model generally overfits. In case of overfitting
    one may opt for the following options.
  prefs: []
  type: TYPE_NORMAL
- en: Bias and Variance
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The average prediction of a good Machine Learning model should be as close
    as the ground truth as possible. This difference is referred to as bias. This
    can be perceived as the ability of the underlying model to predict values. The
    formal definition of bias is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Bias=E\left[{f}^{\prime }(x)-f(x)\right], $$](../images/611710_1_En_1_Chapter/611710_1_En_1_Chapter_TeX_Equo.png)'
  prefs: []
  type: TYPE_IMG
- en: where *f*^′(*x*) is the average predicted value of the model and *f*(*x*) is
    the underlying function. High bias indicates the inability of the model to fit
    the training data. One of the reasons of this may be an oversimplified model.
    High bias leads to more error rate both with the train and the test set.
  prefs: []
  type: TYPE_NORMAL
- en: 'The variance of a model signifies its ability to adjust to a given dataset.
    This variability is referred to as variance. The formal definition of variance
    is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Variance=E{\left[{f}^{\prime }(x)-f(x)\right]}^2, $$](../images/611710_1_En_1_Chapter/611710_1_En_1_Chapter_TeX_Equp.png)'
  prefs: []
  type: TYPE_IMG
- en: High variance may be due to the model being too complex. An overcomplex model
    may lead to low error with the train set but a high error with the test set.
  prefs: []
  type: TYPE_NORMAL
- en: Ideally, one should plot a graph of the variation of bias and variance with
    the iterations. Note that the bias should decrease with the iterations, whereas
    the variance may increase after a point. The aim is to look for a point where
    both these curves meet.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [1-12](#Fig12) shows the four possibilities vis-à-vis the bias and variance.
    Figure [1-12](#Fig12) (a) shows the case with low bias and low variance (ideal).
    In this case both the training and the test performance are the same. Figure [1-12](#Fig12)
    (b) shows the case of low bias and high variance wherein the performance of the
    model with the train set is fair, but with the test set may be poor. In the case
    of high bias and low variance (Figure [1-12(c)](#Fig12)), the train performance
    may not be good, but the difference between the performance of the model for the
    train and the test set may not be huge.
  prefs: []
  type: TYPE_NORMAL
- en: It may be noted that bias and variance and underfitting and overfitting are
    closely related, as discussed.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_1_Chapter/611710_1_En_1_Fig12_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-12
  prefs: []
  type: TYPE_NORMAL
- en: Bias`–`variance
  prefs: []
  type: TYPE_NORMAL
- en: The concept has been discussed in detail in the Chapter [5](611710_1_En_5_Chapter.xhtml)
    on hyperparameter tuning. As a matter of fact, handling the bias and the variance
    forms an essential part of the development of any successful ML or Deep Learning
    model.
  prefs: []
  type: TYPE_NORMAL
- en: 'Application: Classification of Handwritten Digits Using a Conventional Machine
    Learning Pipeline'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'As discussed in the previous sections, the Machine Learning pipeline consists
    of preprocessing, feature extraction, feature selection, learning, and post–processing.
    This section explores the classification of the MNIST dataset and applies various
    feature selection and extraction methods and compares the results using three
    different types of classifiers: K-Nearest Neighbors (KNN), Neural Networks, and
    Support Vector Machine (SVM). KNN and SVM have already been discussed; Chapter
    [3](611710_1_En_3_Chapter.xhtml) discusses NN in detail.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Dataset**'
  prefs: []
  type: TYPE_NORMAL
- en: The MNIST dataset is a widely used dataset, consisting of 70,000 images of handwritten
    digits from 0 to 9, each of size 28 `×` 28 pixels. The training set consists of
    60,000 images, and the test set contains 10,000 images.
  prefs: []
  type: TYPE_NORMAL
- en: '**Data Preprocessing**'
  prefs: []
  type: TYPE_NORMAL
- en: The dataset consists of grayscale images of size 28 `×` 28 pixels, having pixel
    values between 0 and 255\. The LBP replaces each pixel of the given image by the
    weighted average of its neighbors. For example, in the following 10 `×` 10 image,
    the central pixel is taken as reference, and its eight neighbors are considered.
    The cells having pixel value greater than the reference are then replaced by 1,
    and those having less than the reference are replaced by 0\. The binary number
    so formed by traversing the neighbors is then converted into a decimal number,
    and then the reference pixel is replaced by this value (Figure [1-13](#Fig13)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_1_Chapter/611710_1_En_1_Fig13_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-13
  prefs: []
  type: TYPE_NORMAL
- en: Computing LBP
  prefs: []
  type: TYPE_NORMAL
- en: The process is repeated for all the pixels in the given image. The application
    of LBP on an image results in the formation of a new image having edges. Figure
    [1-14](#Fig14) (b) shows the resultant image, when LBP is applied on the image
    shown in Figure [1-14](#Fig14) (a).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_1_Chapter/611710_1_En_1_Fig14_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-14
  prefs: []
  type: TYPE_NORMAL
- en: Application of LBP on an image
  prefs: []
  type: TYPE_NORMAL
- en: 'The frequency of each pixel in the image so formed is then determined. This
    feature extraction method (referred to as FE1 in this section) has three variants:
    default, rotation-invariant, and uniform rotation-variant. LBP is applied to each
    image, and the resulting features are concatenated vertically to create the feature
    matrix “X.” Simultaneously, the corresponding labels are stored in a variable
    “y.” The dataset is then split into training and testing sets in a 90:10 ratio.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Feature Extraction Variants**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Default LBP Variant: This variant captures the local texture patterns of each
    digit in its original form.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Rotation-Invariant LBP Variant: This variant ensures that the extracted features
    remain consistent even if the digits undergo rotational transformations.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Uniform Rotation-Variant LBP Variant: This variant focuses on uniform patterns,
    providing a more robust representation of digit textures.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Feature Selection**'
  prefs: []
  type: TYPE_NORMAL
- en: To enhance model performance and reduce dimensionality, feature selection is
    performed using the F1 method. This step aims to retain the most informative features
    while eliminating redundant or irrelevant ones.
  prefs: []
  type: TYPE_NORMAL
- en: '**Classification Algorithms**'
  prefs: []
  type: TYPE_NORMAL
- en: Three classification algorithms (On the three variants of LBP) denoted as C1,
    C2, and C3 are employed to predict the digit labels based on the extracted and
    selected features.
  prefs: []
  type: TYPE_NORMAL
- en: '**Performance Evaluation**'
  prefs: []
  type: TYPE_NORMAL
- en: Performance evaluation is conducted using the F-measure metric, considering
    both macro- and micro-average values.
  prefs: []
  type: TYPE_NORMAL
- en: '**Code**:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: '**Results**: The model is implemented and the results are observed. The reader
    is expected to run the above code and observe the performance measures in the
