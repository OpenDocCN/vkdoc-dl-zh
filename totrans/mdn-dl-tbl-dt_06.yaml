- en: The authors provide a software package to use IGTD. It can be loaded from the
    `IGTD_Functions.py` file in the paper repository (Listing [4-66](#PC67)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE66]'
  prefs: []
  type: TYPE_PRE
- en: We need to scale the dataset such that it resides within a constant scale and
    demonstrates homogeneity across features (Listing [4-67](#PC68)). Only homogenous-domain
    features make sense in the context of a transformation to images.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE67]'
  prefs: []
  type: TYPE_PRE
- en: To generate the images, specify the number of rows and columns in the generated
    images (their product being the number of features), the width of sample images
    generated (just samples and informative plots; the actual data can be collected
    in raw form), the maximum number of steps before IGTD algorithm termination, the
    number of validation steps to run through to determine convergence, the distance
    method used to determine the similarity/distance between features, the distance
    method used to compute distance between pixels, the metric used to determine error
    between *Q* and *R* (squared or absolute), and the directory to store the data
    results in.
  prefs: []
  type: TYPE_NORMAL
- en: Listing [4-68](#PC69) demonstrates such a configuration, generating 8-by-10-pixel
    images from the 80-feature dataset with Pearson’s Correlation Coefficient used
    to calculate feature distance and Euclidean distance to calculate pairwise pixel
    differences.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE68]'
  prefs: []
  type: TYPE_PRE
- en: After running the `table_to_image` function – which takes a few minutes, depending
    on the size of the dataset – the results are stored in the provided results directory.
  prefs: []
  type: TYPE_NORMAL
- en: In our sample run on the Mice Protein Expression dataset, the original feature
    similarity matrix *R* looks as follows in Figure [4-94](#Fig94). Note that there
    is no similarity with the pattern of *Q* in Figure [4-86](#Fig86).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig94_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A disorderly R matrix with values of 0 to 70 on the x and y axes.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-94
  prefs: []
  type: TYPE_NORMAL
- en: The *R* matrix before sorting
  prefs: []
  type: TYPE_NORMAL
- en: After the features are sorted with the IGTD algorithm, *R* (Figure [4-95](#Fig95))
    mimics the mosaic-like pixel distance grid, with “cells” (recall – caused by end-to-end
    row concatenation) overlayed on an overall gradient with larger distances toward
    the bottom left and top right and shorter distances toward the major diagonal.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig95_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An organized R matrix with values of 0 to 70 on x and y axes.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-95
  prefs: []
  type: TYPE_NORMAL
- en: The *R* matrix after sorting
  prefs: []
  type: TYPE_NORMAL
- en: Figure [4-96](#Fig96) visualizes two samples generated using the IGTD algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig96_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Two images with scales of 0 to 8 on the x-axis and 0 to 7 on the y-axis have
