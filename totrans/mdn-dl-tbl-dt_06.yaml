- en: Table [4-5](#Tab5) reports performance of IGTD with a CNN compared with other
    models and tabular-to-image generation methods on two genomics datasets, the Cancer
    Therapeutics Response Portal (CTRP) and Genomics of Drug Sensitivity in Cancer
    (GDSC).
  prefs: []
  type: TYPE_NORMAL
- en: Table 4-5
  prefs: []
  type: TYPE_NORMAL
- en: Performance of IGTD against other methods on two datasets. From Zhu et al
  prefs: []
  type: TYPE_NORMAL
- en: '| -![](../images/525591_1_En_4_Chapter/525591_1_En_4_Figa_HTML.gif)A table
    lists the details of prediction model, data representation, R squared, and P-value
