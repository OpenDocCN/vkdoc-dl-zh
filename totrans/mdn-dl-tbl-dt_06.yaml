- en: The Pooling Operation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Convolutions are incredibly helpful – they allow neural networks to extract
    features from images in a systematic, low-parameter, and effective manner. However,
    they’re relatively insignificant with respect to changing the shape of the image.
    We might refer to this as the “information compression factor” – the convolution
    doesn’t do much “squeezing.” As explored before, performing a convolution with
    kernel size *n* on an image of shape (*a, a*) produces an output of shape (*a
    – n + 1, a – n + 1*) – this is quite marginal for standard single-digit sizes
    of *n*.
  prefs: []
  type: TYPE_NORMAL
- en: Because of the convolution’s relatively low information compression factor,
    the fully connected component after the flattening layer has to process a very
    large number of parameters. The number of parameters was forgivable for a small-resolution
    dataset like MNIST, but is unfeasible for larger (and more practical) datasets
    and applications.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s use the same architecture as in the previous section and explore how the
    number of parameters (which can be accessed via `model.count_params()`) scales
    for a wide range of image sizes (Listing [4-30](#PC30), Figure [4-28](#Fig28)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig28_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph for gradual increase of parameters from 0.0 to 3.3, with an increase
    in image size of one spatial dimension from 0 to 800.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-28
  prefs: []
  type: TYPE_NORMAL
- en: Demonstrating the parametrization scaling of a convolutional neural network
    as the image input dimension increases
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE29]'
  prefs: []
  type: TYPE_PRE
- en: The parameter count scales much better than a fully connected network, but still
    is quite poor. A 300-by-300 image input requires almost 50,000,000 parameters;
    a 600-by-600 image input requires almost 175,000,000 parameters; an 800-by-800
    image input requires over 800,000,000 parameters.
  prefs: []
  type: TYPE_NORMAL
- en: We need a way to address this problem. You’ll notice that the main source of
    parameters is in the fully connected component after flattening, because convolutions
    don’t reduce the feature map representation size sufficiently quickly. We can
    simplify the problem of building a network with a feasible number of parameters
    as a problem of building a network that efficiently reduces the feature map size.
  prefs: []
  type: TYPE_NORMAL
- en: How can we address this? A convolution is the only current operation we have
    in our toolbelt to reduce the dimensionality of an image with a feasible number
    of parameters. Let’s build an architecture-defining program that just keeps on
    stacking convolutional layers until the feature maps collectively contain 2048
    elements or less (Listing [4-31](#PC31), Figure [4-29](#Fig29)). We keep track
    of one spatial dimension of the feature map size (we only need to keep track of
    one rather than both because we assume feature maps are square) and calculate
    the representation size as *s*² ⋅ 16, where *s* is the feature map size and 16
    is derived from the number of feature maps.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig29_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph for steady increase of parameters from 0.2 to 0.95, with an increase
    in image size of one spatial dimension from 0 to 800.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-29
  prefs: []
  type: TYPE_NORMAL
- en: Demonstrating the parametrization scaling of a specialized “self-extending”
    convolutional neural network design as the image input dimension increases
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE30]'
  prefs: []
  type: TYPE_PRE
- en: 'This technique scales better: it is linear rather than exponential, resulting
    in parameter counts two orders of magnitude less than the previous convolutional
    neural network design.'
  prefs: []
  type: TYPE_NORMAL
- en: 'However, we run into another problem: as the image size increases, the *length*
    of the network increases significantly as well. Look at the length of the architecture
    just for a 75-by-75 image input, for instance (Figure [4-30](#Fig30)).'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig30_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A lengthy flowchart of None comma values in the input and output of input layer,
    dense, conv 2 d, flatten, and so on.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-30
  prefs: []
  type: TYPE_NORMAL
- en: The (very long) generated architecture just for a 75-by-75-pixel input image
    using the “self-extending” convolutional neural network design
  prefs: []
  type: TYPE_NORMAL
- en: While this is a *valid* and *feasible* neural network, it’s not a good design.
    Having so many layers stacked together like this causes problems for signal propagation
    throughout the network and – most importantly – isn’t necessary nor effective.
    It’s the most manual, brute-force approach.
  prefs: []
  type: TYPE_NORMAL
- en: We can replace the return in previous code plotting the scaling of parameter
    counts by image size instead with the number of parameters (given by `len(model.layers)`)
    to view how the layer count by this method scales with the image size (Figure
    [4-31](#Fig31)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig31_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph of linear increase of layers from 0 to 400, with an increase in
    image size of one spatial dimension from 0 to 800.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-31
  prefs: []
  type: TYPE_NORMAL
- en: The layer requirement scaling of the “self-extending” convolutional neural network
    architecture design as the image dimension increases
  prefs: []
  type: TYPE_NORMAL
- en: 'In order to reduce the dimensionality of the image more effectively (and correspondingly
    improve parameter count scaling), we need to use a more efficient mechanism: pooling.
    To apply pooling to a matrix *i* with size (*a*, *b*), we divide *i* into non-overlapping
    blocks of shape (*a*, *b*), aggregate all values in each block, and fill in the
    aggregated values into a pooled matrix *j* corresponding to the locations of those
    blocks. For instance, consider pooling on the following matrix with a pooling
    shape of (2, 2):'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ i=\left[\ 1\kern0.5em 2\kern0.5em 5\kern0.5em 6\kern0.75em 3\kern0.5em
    4\kern0.5em 7\kern0.5em 8\kern0.5em 9\ 10\ 13\ 14\kern0.5em 11\ 12\ 15\ 16\kern0.5em
    \right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equs.png)'
  prefs: []
  type: TYPE_IMG
- en: There are four non-overlapping blocks of shape (2, 2) in *i*. The pooled matrix
    *j* has shape ![$$ \left(\frac{4}{2},\frac{4}{2}\right)=\left(2,2\right) $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_IEq2.png).
    Generally, for a matrix of shape (*m*, *n*) and a pooling size of (*a*, *b*),
    the resulting pooled matrix has shape ![$$ \left(\frac{m}{a},\frac{n}{b}\right)
    $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_IEq3.png).
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ j=\left[????\right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equt.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Let’s fill in the upper-left corner of *j*. Because we are using pooling with
    shape (2, 2), this corresponds to the following bolded subregion of *i*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ i=\left[\ 1\kern0.5em 2\kern0.5em 5\kern0.5em 6\kern0.75em 3\kern0.5em
    4\kern0.5em 7\kern0.5em 8\kern0.5em 9\ 10\ 13\ 14\kern0.5em 11\ 12\ 15\ 16\kern0.5em
    \right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equu.png)'
  prefs: []
  type: TYPE_IMG
- en: 'To keep things simple, we will employ max pooling instead of average pooling.
    The maximum value in the bolded subregion is 6\. We can fill this into the corresponding
    element slot in *j*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ j=\left[6???\right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equv.png)'
  prefs: []
  type: TYPE_IMG
- en: 'We can fill in the remaining elements in a similar fashion:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ j=\left[6\ 8\ 14\ 16\ \right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equw.png)'
  prefs: []
  type: TYPE_IMG
- en: Similarly to convolutions, the resulting pooled matrix reflects the “gist” or
    “main ideas” from the raw matrix. However, there is a key difference between convolutions
    and pooling that can only be realized with a higher-dimensional matrix.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s return to the previous “image” we created in Listing [4-10](#PC10), a
    plus sign on top of a gradient background (Figure [4-32](#Fig32)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig32_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A heatmap of 0 to 9 on the x and y axes and 0 to 1 in vertical grayscale has
    a white plus sign of value 1 on a gradient background of values less than 1.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-32
  prefs: []
  type: TYPE_NORMAL
- en: Revisiting the synthetic figure created in Listing [4-10](#PC10)
  prefs: []
  type: TYPE_NORMAL
- en: We can use `skimage.measure`’s `block_reduce` function to simulate pooling on
    an image. The function takes in an array representing the input, the pooling shape,
    and the function to apply to all elements in each pooling subregion.
  prefs: []
  type: TYPE_NORMAL
- en: Listing [4-32](#PC32) produces Figure [4-33](#Fig33), showing the result of
    pooling the matrix shown in Figure [4-32](#Fig32) with average pooling.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig33_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A pooled heatmap of 0 to 4 on the x and y axes and 0 to 1 in vertical grayscale
    has a white plus sign of value 1 on a gradient background of values less than
    1.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-33
  prefs: []
  type: TYPE_NORMAL
- en: The result of applying 2 × 2 mean pooling on Figure [4-32](#Fig32)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE31]'
  prefs: []
  type: TYPE_PRE
- en: Listing [4-33](#PC33) and Figure [4-34](#Fig34) show the effect of pooling using
    max pooling.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig34_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A pooled heatmap of 0 to 4 on the x and y axes and 0 to 1 in vertical grayscale
    has a white plus sign of value 1 on a gradient background of values less than
    1.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-34
  prefs: []
  type: TYPE_NORMAL
- en: The result of applying 2 × 2 max pooling on Figure [4-32](#Fig32)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE32]'
  prefs: []
  type: TYPE_PRE
- en: The results of average and max pooling look more or less identical. In this
    case, it is because the plus in the middle is cleanly arranged into blocks of
    2 that will yield a pooled result of 1 regardless of the aggregating function
    used.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s perform another round of pooling on the image to see the effect that
    multiple pooling operations have on a matrix. Note that the shape of this current
    matrix is (5, 5), but the pooling size is (2, 2): our previousformula describing
    the effect of pooling on shape would suggest that the resulting array has a fractionalshape
    of ![$$ \left(\frac{5}{2},\frac{5}{2}\right) $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_IEq4.png),
    which is clearly inaccurate. To deal with array sizes that don’t cleanly divide
    by the poolingsize, pooling layers automatically use a padding function that pads
    the array with a “default value” (usually 0 or some sort of average) until it
    is a valid size.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Consider the following matrix with shape (3, 3) when we desire to apply pooling
    with shape (2, 2):'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ bad\  matrix=\left[1\ 1\ 1\ 1\ 1\ 1\ 1\ 1\ 1\ \right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equx.png)'
  prefs: []
  type: TYPE_IMG
- en: 'We can pad the matrix as such:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ valid\ matrix=\left[1\ 1\ 1\ 1\kern0.5em 1\ 0\ 1\ 0\kern0.5em 1\ 1\ 0\
    0\kern0.5em 1\ 0\ 0\ 0\kern0.5em \right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equy.png)'
  prefs: []
  type: TYPE_IMG
- en: If we apply max pooling, the zero padding is more or less irrelevant because
    it is always the smallest value in the region. The padding approach is sort of
    a cheat trick to have fractionally sized pooling regions (if max pooling is used)
    because there is no possibility that all outputs are less than zero (unless the
    network is behaving very oddly or is using a bizarre activation function). The
    three relevant pooling regions in the previous example are
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \left[1\ 1\ 1\ 1\kern0.5em ----\kern0.5em ----\kern0.5em ----\kern0.5em
    \right],\left[----\kern0.5em 1-1-\kern0.5em ----\kern0.5em ----\kern0.5em \right],\left[----\kern0.5em
    ----\kern0.5em 1\ 1--\kern0.5em ----\kern0.5em \right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equz.png)'
  prefs: []
  type: TYPE_IMG
- en: Let’s apply pooling again, using both mean (Listing [4-34](#PC34), Figure [4-35](#Fig35))
    and max pooling (Listing [4-35](#PC35), Figure [4-36](#Fig36)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig35_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A pooled heatmap of 0 to 2 on the x and y axes and 0 to 1 vertical grayscale
    has a white cell in the middle with a value of 0.86 on a gradient background of
    lower values.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-35
  prefs: []
  type: TYPE_NORMAL
- en: The result of applying 2 × 2 mean pooling twice on Figure [4-32](#Fig32)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE33]'
  prefs: []
  type: TYPE_PRE
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig36_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A pooled heatmap of 0 to 2 on the x and y axes and 0 to 1 in the vertical grayscale
    has 3 white cells of value 1 on a gradient background of lower values.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-36
  prefs: []
  type: TYPE_NORMAL
- en: The result of applying 2 × 2 max pooling on Figure [4-32](#Fig32)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE34]'
  prefs: []
  type: TYPE_PRE
- en: Here, the difference between average and max pooling becomes clearer. We see
    that the strongest signal is the only signal propagated to the next component
    of the network in max pooling, whereas average pooling considers all signals.
    Generally, max pooling is more commonly used because it allows the neural network
    to easily form if/else-style switch points instead of manipulating a comparatively
    complex averaging game to propagate important signals to the next component of
    the network.
  prefs: []
  type: TYPE_NORMAL
- en: Convolutions perform an *extractive role* in a neural network, whereas pooling
    serves an *aggregative role*. Note that while the neural network needs to learn
    and optimize the parameter values for the kernels in convolutional layers, pooling
    layers operate without any trainable parameters. Pooling significantly reduces
    the representation size of a set of feature maps, which allows us to build more
    efficient and sustainable neural network architectures.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s construct an example neural network architecture, improving upon our previous
    network design employing only convolutional layers (Listing [4-36](#PC36)). We’ll
    use the same architecture, but insert just one max pooling layer in between the
    second and third convolutional layers.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE35]'
  prefs: []
  type: TYPE_PRE
- en: Let’s compare the effect of pooling on neural network parametrization across
    different image sizes to see how its benefits scale (Listing [4-37](#PC37)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE36]'
  prefs: []
  type: TYPE_PRE
- en: Now, let’s plot out the difference (Listing [4-38](#PC38), Figure [4-37](#Fig37)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig37_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph of layers versus image size in one spatial dimension depicts an
    increase from 0 to 3.3 for no pooling and from 0 to 0.8 for yes pooling.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-37
  prefs: []
  type: TYPE_NORMAL
- en: Comparing the parametrization scaling of a convolutional neural network with
    and without pooling layers
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE37]'
  prefs: []
  type: TYPE_PRE
- en: Note that while the addition of the pooling layer doesn’t add any parameters,
    it forces a decrease in representation size that has downstream effects, since
    *every layer* after pooling works with a smaller layer.
  prefs: []
  type: TYPE_NORMAL
- en: In fact, we can observe even larger improvements in parametrization by stacking
    even more pooling layers upon each other.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: 'We usually use `padding = ''same''` for convolutions, which automatically calculates
    and applies the padding needed to retain the same image shape as the input, because
    the effect of pooling is trivial and in fact may help detection of edge features.
    Moreover, in many cases, we don’t want to mix un-padded convolutions and pooling
    layers for shape management convenience: we might have a nicely sized image (e.g.,
    256-by-256 pixels), which we only want to cut down by divisible factors (e.g.,
    2-by-2 max pooling operations).'
  prefs: []
  type: TYPE_NORMAL
- en: Many deep learning figures are not fans of the pooling mechanism. Despite its
    assistance in parametrization scaling, it itself is unparametrized (unlearnable)
    and therefore can be interpreted as a messy, brute-force way to cut down information
    size. Opponents of pooling often argue instead for the usage of *strides* in convolutions,
    which we will discuss later. Strides can accomplish the same feature map size
    reduction effect that pooling does.
  prefs: []
  type: TYPE_NORMAL
- en: We’ve seen that pooling layers can help significantly reduce the size of learned
    feature maps – but pooling can help us out again, in a different form.
  prefs: []
  type: TYPE_NORMAL
- en: Note that the flattening layer, despite being intuitive and retaining all information,
    is a bottleneck for feasibility in parametrization. “Small” data packed neatly
    across three spatial dimensions can become very large when flattened out into
    one spatial dimension. Using pooling, we can derive a more efficient mechanism
    to collapse a set of feature maps into a vector. It comes from the simple realization
    that applying a pooling kernel with a size equal to the feature maps it is applied
    on yields a singular aggregative value. For instance, a set of feature maps with
    shape (5, 5, 32) (i.e., has 32 “versions” of a 5-by-5 feature representation)
    passed through pooling with size (5, 5) will yield one value for each of the outputs,
    or aggregated data with shape (32).
  prefs: []
  type: TYPE_NORMAL
- en: 'The name given to this special case of pooling in which the pooling shape is
    equal to the shape of the incoming feature maps is *global pooling*. Like standard
    pooling, it comes in two common flavors: global average pooling and global max
    pooling. Global average pooling averages all values in each feature map, whereas
    global max pooling finds the maximum of all values in each feature map. Whereas
    max pooling is generally preferred over average pooling in the extractive component
    of a neural network, *global average pooling is generally preferred over global
    max pooling* to perform collapsing from three to one spatial dimension. Global
    max pooling is a sharply reductive operation in that only one of the *n*² elements
    in a *n* × *n* feature map “counts”; that is, very little of the learned signals
    are propagated to the next part of the network with max pooling. On the other
    hand, in global average pooling, all *n*² elements “have a say” in determining
    the output signal. Because global pooling performs the crucial switch-off between
    the extractive (convolutional) and the interpretative (fully connected) component
    of the network, we generally do not want to introduce any new signal bottlenecks.'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s demonstrate how replacing flattening with global max pooling can further
    help us improve how the parametrization scales with input size. Listing [4-39](#PC39)
    demonstrates a function we might build to calculate the parameter count for a
    convolutional neural network using both convolutions and global pooling, and the
    parametrization scaling of this model compared with the previous two (no pooling
    or yes pooling but no global pooling) is shown in Figure [4-38](#Fig38).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig38_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: The line graph of parameters versus image size of one spatial dimension depicts
    an increase from 0 to 3.3 for no pooling, 0 to 0.8 for pooling, and 0 to 0 for
    pooling and global pooling.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-38
  prefs: []
  type: TYPE_NORMAL
- en: Comparing the parametrization scaling of a convolutional neural network without
    pooling layers, with pooling but without global pooling, and with pooling and
    global pooling
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE38]'
  prefs: []
  type: TYPE_PRE
- en: The difference is incredibly significant. The parametrization of a convolutional
    neural network with both pooling and global pooling appears functionally flat.
    Upon obtaining a closer look by only comparing CNN designs with pooling but variable
    global pooling (Figure [4-39](#Fig39)), we observe that the parametrization scaling
    of a model with pooling and global pooling really is flat. If you observe the
    raw values, you’ll find that for this particular model, the number of parameters
    is always 4242 – we’ve achieved *constant parameter scaling*, which is the best
    sort of scaling one can obtain (since it usually doesn’t make sense for the number
    of parameters to decrease as input complexity increases).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig39_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: The line graph of parameters versus image size of one spatial dimension depicts
    an increase from 0 to 8 for pooling, and 0 to 0 for pooling and global pooling.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-39
  prefs: []
  type: TYPE_NORMAL
- en: “Zooming in” on Figure [4-38](#Fig38) with a focus only on the parametrization
    scaling of a convolutional neural network with pooling but without global pooling
    and one with pooling and global pooling
  prefs: []
  type: TYPE_NORMAL
- en: It’s worth thinking how the global pooling mechanism allows us to obtain constant
    parameter scaling. The convolutions themselves have constant parametrization,
    because they simply learn the values for a convolutional kernel of a certain size
    regardless of the input size. Recall that convolutions are a good choice for neural
    networks that process images because they have an inherently scalable sliding-window/kernel
    design. However, it is the crucial switch-off from feature map to vector (i.e.,
    between the extractive/convolutional and interpretative/fully connected components)
    that has a variable number of parameters. If the last layer in the convolutional
    component outputs *k* feature maps of shape (*a*, *b*) and the first layer of
    the fully connected component contains *d* nodes, then the number of parameters
    using the flattening layer is (*k* ⋅ *a* ⋅ *b*) × *d*. While *k* and *d* are constant
    in that in our experiment they are the same regardless of input size, note that
    the values of *a* and *b* are variable. Thus, as the input size grows, we expect
    the parameter scaling to grow roughly quadratically using the flattening layer.
  prefs: []
  type: TYPE_NORMAL
- en: However, if we use max pooling, the *k* feature maps of shape (*a*, *b*) are
    pooled into a vector of shape *k*. The number of parameters required is *k* ⋅ *d*,
    which both consist of constants! Thus, regardless of the size of the input, a
    convolutional neural network employing both pooling and max pooling will always
    have a constant number of parameters (assuming the architecture stays constant).
    Note that this does not necessarily mean that the model will still perform as
    well as we scale the input complexity up; an inherently more complex task likely
    requires more parameters to represent and model it, which may require modifications
    to the architecture (e.g., more layers, a large number of nodes/filters in each
    layer, etc.).
  prefs: []
  type: TYPE_NORMAL
- en: 'One can think of flattening and global pooling as complementary methods: where
    one lacks, the other provides. When using flattening, we gain retention of all
    information at the cost of losing recognition of feature map separation (it does
    not matter which feature map any value is part of; all values are indiscriminately
    placed side-by-side on the same vector). When using global pooling, we gain recognition
    of feature map separation at the cost of losing information. Generally, larger
    convolutional neural networks favor global pooling, whereas smaller ones favor
    flattening. Large CNNs produce large output feature maps that, if flattened, would
    be unscalable to work with. Global pooling is generally a sufficient mechanism
    to capture the “main ideas” of the extracted features. Small CNNs, on the other
    hand, generally produce smaller feature maps in which each element holds a higher
    proportion of information. Using flattening over global pooling can help explicitly
    preserve the raw extracted features and is generally feasible. In most “standard”
    modeling problems, however, sufficiently sized neural networks should obtain roughly
    similar performance using either flattening or global pooling (albeit under different
    training conditions and requirements).'
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have the two key building blocks of convolutional neural networks
    under our belt, let’s implement a slightly modified *AlexNet architecture* layer-by-layer
    in Keras. AlexNet was an instrumental model in computer vision. Released in 2012
    by Alex Krizhevsky in collaboration with Ilya Sutskever and Geoffrey Hinton in
    the paper “ImageNet classification with deep convolutional neural networks,”^([1](#Fn1))
    AlexNet set the foundation for rapid research development in convolutional neural
    network architectures in the following years. As of the writing of this book,
    the paper has been cited over 80,000 times.
  prefs: []
  type: TYPE_NORMAL
- en: AlexNet follows a relatively simple architecture (Figure [4-40](#Fig40)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig40_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The flowchart of : (224, 224, 3) image input; number of pads, strides, and
    kernels for different conv and max pooling; 4096 node Dense; 1000 node Dense Output.'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-40
  prefs: []
  type: TYPE_NORMAL
- en: Visual representation of the AlexNet architecture
  prefs: []
  type: TYPE_NORMAL
- en: 'Note that this architecture utilizes *strides*. Strides specify the number
    of elements to “jump over” every time a kernel is shifted during convolution or
    pooling. Convolutions are usually introduced with stride 1, but applying a convolution
    with stride 2 to a sample (5, 5) matrix affects the relevant bolded subsections:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \left[1\ 1\ 1\ 1\ 1\ 1\ 1\ 1\ 1\kern0.5em 1\ 1\ 1\ 1\ 1\ 1\kern0.5em 1\
    1\ 1\ 1\ 1\ 1\kern0.5em 1\ 1\ 1\ 1\kern0.5em \right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equaa.png)'
  prefs: []
  type: TYPE_IMG
- en: Strides are a useful tool to give feature extraction layers more “leeway” by
    allocating regions in the feature maps that are not propagated into the remainder
    of the network. Note that while strides do not decrease the number of parameters
    in the individual convolutional layer they are applied to, they do decrease the
    size of the output feature maps, which has downstream parametrization implications
    (i.e., that the rest of the network uses fewer parameters). Strides are another
    important method to reduce parametrization for image processing neural networks.
  prefs: []
  type: TYPE_NORMAL
- en: The code to build the layers of AlexNet is fairly straightforward (Listing [4-40](#PC40)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE39]'
  prefs: []
  type: TYPE_PRE
- en: 'Plotting the model confirms our desired architecture (Figure [4-41](#Fig41)).
    Note something interesting – the specific kernel shape and arrangement of pooling
    and convolutional layers are designed such that the last layer in the extractive/convolutional
    component outputs feature maps of shape (1, 1, 256): meaning that each of the
    256 feature maps has been compressed into only one value! In this unique case,
    note that flattening and global pooling are functionally no different.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig41_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flowchart of None comma values in the input and output of input layer, conv
    2 d, max pooling 2 d, flatten, and dense.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-41
  prefs: []
  type: TYPE_NORMAL
- en: Keras-style visual representation of the AlexNet architecture after implementation
  prefs: []
  type: TYPE_NORMAL
- en: The AlexNet model, we can observe, uses a carefully hand-crafted flow of information.
    When we build convolutional neural networks (and neural networks generally), we
    want to carefully monitor how the *representation* size changes across each the
    length of the network. The representation size is simply the total number of elements
    a layer holds; a fully connected layer with *n* nodes has a representation size
    of *n* elements, and a convolutional layer that outputs feature maps with shape
    (*a*, *b*, *c*) has a representation size of *a* ⋅ *b* ⋅ *c*. Suppose the change
    in representation size drastically decreases at any point in the architecture
    (i.e., a bottleneck). In that case, the network is forced to compress a large
    quantity of information into a small amount of space. On the other hand, if the
    change in representation size drastically increases at any point in the architecture
    (i.e., *inflation*), then the network is forced to expand a small quantity of
    information into a large amount of space. Depending on the “inherent complexity”
    of the data, bottlenecks could be restrictive, and inflation could lead to redundant
    computation.
  prefs: []
  type: TYPE_NORMAL
- en: Analyzing the design of successful convolutional neural network architectures
    gives us tremendous insight into how convolutions and pooling layers operate.
    In the next section, we’ll continue an analysis of other more modern architectures.
  prefs: []
  type: TYPE_NORMAL
- en: Base CNN Architectures
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: All content discussed before this section has focused on the low-level building
    blocks of convolutional neural networks. However, very few people build their
    own convolutional neural network architectures “by hand” by arranging together
    layers for now-standard problems like image classification. Instead, researchers
    have discovered a set of effective general architectures that can serve as the
    *base* of a convolutional neural network, upon which minor customizations can
    be made to “specialize” the base model for your desired task. In this section,
    we’ll discuss three key base CNN architectures and demonstrate how to instantiate
    and use them for quick custom modeling.
  prefs: []
  type: TYPE_NORMAL
- en: ResNet
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: As suggested by its name, the ResNet architecture features residual connections
    as a primary element of its topological design.
  prefs: []
  type: TYPE_NORMAL
- en: Residual connections are the “first step” toward architectural nonlinearity
    – these are simple connections placed between nonadjacent layers. They’re often
    presented as “skipping” over a layer or multiple layers, which is why they are
    also often referred to as “skip connections” (Figure [4-42](#Fig42)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig42_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flowchart of input, layer 1, layer 2, layer 3, and output. Layer 1 may directly
    lead to layer 3.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-42
  prefs: []
  type: TYPE_NORMAL
- en: Residual connection
  prefs: []
  type: TYPE_NORMAL
- en: Note that in implementation the connections are first merged through a method
    like adding or concatenation. The merged components are then passed into the next
    layer (Figure [4-43](#Fig43)). This is the implicit assumption of all residual
    connection diagrams that do not explicitly demonstrate merging.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig43_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flowchart of input; layer 1; layer 2; merging layer; layer 3; and output.
    Layer 1 may directly lead to layer merging.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-43
  prefs: []
  type: TYPE_NORMAL
- en: Technically correct residual connection with merge layer
  prefs: []
  type: TYPE_NORMAL
- en: Adding residual connections decreases *degradation* of the input signal, in
    which the original input gets saturated or lost in a long heap of network layers.
    Residual connections enable greater flow of information, which allows the network
    to reason more nonlinearly by combining information from different stages or areas
    of reasoning.
  prefs: []
  type: TYPE_NORMAL
- en: “ResNet-style” residual connection desgins employ a series of short residual
    connections that are repeated routinely throughout the network (Figure [4-44](#Fig44)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig44_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Flowchart reads: Input; layer 1; layer 2; layer 3; layer 4; layer 5; layer
    6; layer 7; layer 8; layer 9; output. Layer 1 may directly lead to subsequent
    odd-numbered layers.'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-44
  prefs: []
  type: TYPE_NORMAL
- en: ResNet-style residual connection design
  prefs: []
  type: TYPE_NORMAL
- en: The ResNet architecture, originally introduced by Kaiming He, Xiangyu Zhang,
    Shaoqing Ren, and Jian Sun at Microsoft Research in the 2015 paper “Deep Residual
    Learning for Image Recognition,”^([2](#Fn2)) comprises 34 layers with residual
    connections that skip over every two layers. Figure [4-45](#Fig45) compares ResNet
    with a plain “equivalent” architecture and the more classic VGG-19 architecture.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig45_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Three flowcharts for V G G 19, 34-layer plain, 34-layer residual depict the
    steps of image processing with output size of 224, 112, 56, 28, 14, 7, and 1.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-45
  prefs: []
  type: TYPE_NORMAL
- en: The ResNet architecture (right), compared with a “plain” architectural equivalent
    (i.e., without residual connections, middle) and the VGG-19 architecture
  prefs: []
  type: TYPE_NORMAL
- en: Note that there are other architectural interpretations of what a residual connection
    is. Rather than relying upon a linear backbone, you can interpret a residual connection
    as splitting the layer before it into two branches, which each process the previous
    layer in their own unique ways. One branch (layer 1 to layer 2 to layer 3 in the
    following diagram) processes the output of the previous layer with a specialized
    function, whereas the other branch (layer 1 to identity to layer 3) processes
    the output of the layer with the identity function – that is, it simply allows
    the output of the previous layer to pass through, the “simplest” form of processing
    (Figure [4-46](#Fig46)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig46_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Flowchart-1 reads: Input; layer 1; layer 2; layer 3; and output. Flowchart-2
    reads: Input; layer 1; layer 2 and identity; layer 3; and output.'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-46
  prefs: []
  type: TYPE_NORMAL
- en: Alternative interpretation of a residual connection as a branching operation
  prefs: []
  type: TYPE_NORMAL
- en: This method of conceptually understanding residual connections allows you to
    categorize them as a subclass of general nonlinear architectures, which can be
    understood as a series of branching structures.
  prefs: []
  type: TYPE_NORMAL
- en: 'Residual connections are often presented as a solution for the *vanishing gradient
    problem* (Figure [4-47](#Fig47)): in order to access some layer, we need to travel
    through several other layers first, diluting the information signal. In the vanishing
    gradient problem, the backpropagation signal within very deep neural networks
    used to update the weights gets progressively weaker such that the front layers
    are barely utilized at all. (Note that in many cases using ReLU activations instead
    of bounded functions like sigmoid can address this problem – but residual connections
    are another method.)'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig47_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flowchart of a series of 5 white circles, 3 very pale blue circles, 3 pale
    blue circles, 3 light blue circles, and 1 dark blue circle.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-47
  prefs: []
  type: TYPE_NORMAL
- en: 'Visualization of the vanishing gradient problem: when the network becomes too
    long, information signals during backpropagation “die out” or “vanish”'
  prefs: []
  type: TYPE_NORMAL
- en: With residual connections, however, the backpropagation signal travels through
    fewer average layers to reach some particular layer’s weights for updating. This
    enables a stronger backpropagation signal that is better able to make use of the
    entire model architecture.
  prefs: []
  type: TYPE_NORMAL
- en: Residual connections can also be thought of as a “fail-safe” for poor-performing
    layers. If we add a residual connection from layer A to layer C (assuming layer
    A is connected to layer B, which is connected to layer C), the network can “choose”
    to disregard layer B by learning near-zero weights for connections from A to B
    and from B to C while information is channeled directly from layers A to C via
    a residual connection. In practice, however, residual connections act more as
    an additional representation of the data for consideration than as fail-safe mechanisms.
  prefs: []
  type: TYPE_NORMAL
- en: 'The ResNet architecture is implemented in several flavors in Keras: ResNet50,
    ResNet101, and ResNet152 (each with two versions). The number attached to each
    ResNet architecture is a rough indicator of how many layers deep the network is
    (although if you count, you won’t get an exact number because of certain technicalities).
    ResNet50 is the smallest offered version of ResNet, and ResNet 152 is the deepest.'
  prefs: []
  type: TYPE_NORMAL
- en: You can instantiate and train a ResNet model simply by calling the model object
    and specifying the input shape and number of classes (Listing [4-41](#PC41)).
    Most model architectures in Keras come with pretrained weights on the ImageNet
    dataset, but the number of output classes must be 1000 because the ImageNet dataset
    contains 1000 output classes.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE40]'
  prefs: []
  type: TYPE_PRE
- en: You can also treat any model (including ResNets, other Keras application models,
    and your own sequential or functional models) as a submodel or component of a
    larger overarching model. For instance, consider a hypothetical architecture in
    which an input is independently passed through a ResNet50 and a ResNet121 architecture
    and then joined and processed into an output implemented in Listing [4-42](#PC42)
    (visualized in Figure [4-48](#Fig48)). We begin by instantiating the ResNet50
    and ResNet121 models and then use the `result = model(inp_layer)` syntax.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig48_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Flowchart of None comma value in input-output of input 1 colon InputLayer, resnet
    50 and 152 colon functional, concatenate colon concatenate, dense colon Dense.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-48
  prefs: []
  type: TYPE_NORMAL
- en: Keras visualization of the architecture produced in Listing [4-42](#PC42)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE41]'
  prefs: []
  type: TYPE_PRE
- en: We’ll see an example usage of this model compartmentalization in the “Multimodal
    Image and Tabular Models” section.
  prefs: []
  type: TYPE_NORMAL
- en: 'Another architecture, DenseNet, introduced by Gao Huang, Zhuang Liu, and Killian
    Q. Weinberger in the 2016 paper “Densely Connected Convolutional Networks,”^([3](#Fn3))
    uses residual connections in a more extreme or “dense” fashion. DenseNet architectures
    feature uniformly spaced “anchor points”; residual connections are placed between
    every set of anchor points (Figure [4-49](#Fig49)). Like ResNet, DenseNet comes
    implemented in Keras with multiple flavors: DenseNet121, DenseNet169, and DenseNet201\.
    All these models are housed under `keras.applications.DenseNetx`.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig49_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Flowchart reads: Input; layer 1; layer 2; layer 3; layer 4; layer 5; layer
    6; layer 7; layer 8; layer 9; output. The layers lead to subsequent layers.'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-49
  prefs: []
  type: TYPE_NORMAL
- en: Example of DenseNet-style residual connections in which every layer has an anchor
    point
  prefs: []
  type: TYPE_NORMAL
- en: Inception v3
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Christian Szegedy, Vincent Vanhoucke, Sergey Ioffe, Jonathon Shlens, and Zbigniew
    Wojna introduced the Inception v3 architecture, an improved member of the Inception
    family of models that has become a pillar of image recognition, in their 2015
    paper “Rethinking the Inception Architecture for Computer Vision.”^([4](#Fn4))
    In many ways, the Inception v3 architecture laid out the key principles of convolutional
    neural network design for the following years to come. The aspect most relevant
    for this context is its cell-based design.
  prefs: []
  type: TYPE_NORMAL
- en: The Inception v3 model attempted to improve upon the designs of the previous
    Inception v2 and original Inception models. The original Inception model employed
    a series of repeated cells (referred to in the paper as “modules”) that followed
    a multi-branch nonlinear architecture (Figure [4-50](#Fig50)). Four branches stem
    from the input to the output of the module; two branches consist of a 1 × 1 convolution
    followed by a larger convolution, one branch is defined as a pooling operation
    followed by a 1 × 1 convolution, and another is just a 1 × 1 convolution. Padding
    is provided on all operations in these modules such that the size of the filters
    is kept the same such that the results of the parallel branch representations
    can be concatenated depth-wise back together.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig50_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Flowchart-1 reads: Base; network of 1 by 1, 3 by 3, 5 by 5, and pool; filter
    concat. Flowchart-2 reads: Base; network of 1 by 1, 3 by 3, and pool; filter concat.'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-50
  prefs: []
  type: TYPE_NORMAL
- en: 'Left: Original Inception cell. Right: One of the Inception v3 cell architectures.
    From Szegedy et al.'
  prefs: []
  type: TYPE_NORMAL
- en: 'A key architectural change in the Inception v3 module designs is the *factorization*
    of large filter sizes like 5 × 5 into a combination of smaller filter sizes. For
    instance, the shape effect of a 5 × 5 filter can be “factored” into a series of
    two 3 × 3 filters; a 5 × 5 filter applied on a feature map (with no padding) yields
    the same output shape as two 3 × 3 filters: `(w-4, h-4, d)`. Similarly, a 7 ×
    7 filter can be “factored” into three 3 × 3 filters. Szegedy et al. note that
    this factorization promotes faster learning while causing no hindrance to representative
    power. This module will be termed the *symmetric factorization module*, although
    in implementation within the context of the Inception v3 architecture, it is referred
    to as *Module A*.'
  prefs: []
  type: TYPE_NORMAL
- en: In fact, even 3 × 3 and 2 × 2 filters can be factorized into sequences of convolutions
    with smaller filter sizes. An *n*-by-*n* convolution can be represented as a 1-by-*n*
    convolution followed by an *n*-by-1 convolution (or vice versa). Convolutions
    with kernel heights and widths that are different lengths are known as *asymmetric
    convolutions* and can be valuable fine-grained feature detectors (Figure [4-51](#Fig51)).
    In the Inception v3 module architecture, *n* was chosen to be 7\. This module
    will be termed the *asymmetric factorization module* (also known as *Module B*).
    Szegedy et al. find that this module performs poorly on early layers but works
    well on medium-sized feature maps. Correspondingly, it is placed after symmetric
    factorization modules in the Inception v3 cell stack.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig51_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flowchart of Base; network of 1 by 1, 1 by n, n by 1, and pool; filter concat.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-51
  prefs: []
  type: TYPE_NORMAL
- en: Factorizing n-by-n filters as operations of smaller filters. From Szegedy et
    al.
  prefs: []
  type: TYPE_NORMAL
- en: For extremely *coarse* (i.e., small-sized) inputs, a different module with *expanded
    filter bank outputs* is used. This model architecture assists in highly specialized
    processing by using a tree-like topology – the two left branches in the symmetric
    factorization module are further “split” into “child nodes,” which are concatenated
    along with the outputs of the other branches at the end of the filter (Figure
    [4-52](#Fig52)). This type of module is placed at the end of the Inception v3
    architecture to handle feature maps when they have become spatially small. This
    module will be termed the *expanded filter bank module* (or *Module C*).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig52_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flowchart of Base; network of 1 by 1, 3 by 3, 1 by 3, 3 by 1, and pool; filter
    concat.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-52
  prefs: []
  type: TYPE_NORMAL
- en: Factorizing n-by-n filters as operations of smaller filters. From Szegedy et
    al.
  prefs: []
  type: TYPE_NORMAL
- en: Another reduction-style Inception module is designed to efficiently reduce the
    size of the filters (Figure [4-53](#Fig53)). The reduction-style module uses three
    parallel branches; two use convolutions with a stride of 2, and the other uses
    a pooling operation. These three branches produce the same output shapes, which
    can be concatenated depth-wise. Note that Inception modules are designed such
    that a decrease in size is correspondingly counteracted with an increase in the
    number of filters.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig53_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Flowchart-1 reads: Base; network of 1 by 1, 3 by 3 stride 1 and 2, and pool
    stride 2; filter concat. Flowchart-2 reads: 35 by 35 by 320; conv pool 17 by 17
    by 320; concat 17 by 17 by 640.'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-53
  prefs: []
  type: TYPE_NORMAL
- en: Design of an Inception v3 reduction cell. From Szegedy et al.
  prefs: []
  type: TYPE_NORMAL
- en: 'The Inception v3 architecture is formed by stacking these module types in a
    linear fashion, ordered such that each module is placed in a location where it
    will receive a feature map input shape that it succeeds in processing. The following
    sequence of modules is used:'
  prefs: []
  type: TYPE_NORMAL
- en: A series of convolutional and pooling layers to perform initial feature extraction
    (these are not part of any module)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Three repeats of the symmetric convolution module/Module A
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Reduction module
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Four repeats of the asymmetric convolution module/Module B
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Reduction module
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Two repeats of the expanded filter bank module/Module C
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Pooling, dense layer, and softmax output
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Another often unnoticed but important feature of the Inception family of architectures
    is the 1 × 1 convolution, which is present in every Inception cell design – often
    as the most frequently occurring element in the cell architecture. In terms of
    model performance, 1 × 1 convolutions serve a key purpose in the Inception architecture:
    computing cheap filter reductions before expensive, larger kernels are applied
    to feature map representations. For instance, suppose at some location in the
    architecture 256 filters are passed into a 1 × 1 convolutional layer; the 1 ×
    1 convolutional layer can reduce the number of filters to 64 or even 16 by learning
    the optional combination of values for each pixel from all 256 filters. Because
    the 1 × 1 kernel does not incorporate any spatial information (i.e., it doesn’t
    consider pixels next to one another), it is cheap to compute. Moreover, it isolates
    the most important features for the following larger (and thus more expensive)
    convolution operations that incorporate spatial information.'
  prefs: []
  type: TYPE_NORMAL
- en: The Inception v3 architecture performed very well in that the 2015 ILSVRC (ImageNet
    competition) and has become a staple in image recognition architectures (Tables
    [4-1](#Tab1) and [4-2](#Tab2)).
  prefs: []
  type: TYPE_NORMAL
- en: Table 4-2
  prefs: []
  type: TYPE_NORMAL
- en: Performance of an ensemble of Inception v3 architectures compared against ensembles
    of other architecture models. From Szegedy et al.
  prefs: []
  type: TYPE_NORMAL
