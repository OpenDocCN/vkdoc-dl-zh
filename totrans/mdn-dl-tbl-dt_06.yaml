  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| VGGNet | 2 | 23.7% | 6.8% |'
  prefs: []
  type: TYPE_TB
- en: '| GoogLeNet | 7 | - | 6.67% |'
  prefs: []
