- en: 4. Applying Convolutional Structures to Tabular Data
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: There are things known and there are things unknown, and in between are the
    doors of perception.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: —Aldous Huxley, Writer and Philosopher
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In the previous chapter, you explored the application of standard feed-forward/artificial
    neural network models to tabular data. In this chapter, we will take a significant
    jump from the well-documented and “traditional” into the new and comparatively
    uncharted by exploring the application of *convolutional structures* to tabular
    data. While having been traditionally applied to image data, convolutional layers
    and convolutional neural networks can offer a unique perspective to tabular data
    that classical machine learning algorithms lack and artificial neural networks
    cannot reliably substitute for.
  prefs: []
  type: TYPE_NORMAL
- en: 'This chapter will begin with an overview of convolutional neural network theory,
    exploring the intuition and theory behind key convolution and pooling operations,
    how convolutional and pooling layers are organized among other layers into convolutional
    neural networks (CNNs), and a brief survey of accessible and successful CNN model
    architectures. The goal of this first half is to set the theoretical and practical
    foundation for CNN models in the “natural” image context. The second half demonstrates
    their applications to tabular data: First, you’ll learn about multimodal network
    design – building models that incorporate both images *and* tabular data to produce
    a decision, using convolutional layers to process image inputs and feed-forward
    layers to process tabular inputs. Afterward, the chapter will demonstrate techniques
    to apply both one-dimensional and two-dimensional convolutions directly and indirectly
    to tabular data.'
  prefs: []
  type: TYPE_NORMAL
- en: Convolutional Neural Network Theory
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this section, we’ll understand the justification for the existence of convolutions,
    how convolution operations work, and how pooling operations work. You’ll put this
    knowledge together and implement convolutional neural networks for standard image
    classification tasks.
  prefs: []
  type: TYPE_NORMAL
- en: Why Do We Need Convolutions?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s imagine that convolutional layers have not been invented and all we have
    available to us as neural network “building blocks” are fully connected layers.
    We would like to build a neural network that is able to work with images. As an
    example task, let us consider the famous MNIST digits dataset, which contains
    several dozen thousand 28-by-28-pixel grayscale images of handwritten digits from
    0 to 9.
  prefs: []
  type: TYPE_NORMAL
- en: MNIST is a relatively small dataset that can be easily loaded through the Keras
    datasets submodule (Listing [4-1](#PC1)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Let’s visualize 25 digits from the dataset (Listing [4-2](#PC2), Figure [4-1](#Fig1)).
    We’ll use a seaborn `heatmap(array)` instead of the more standard `plt.imshow(img)`
    to explicitly show the pixel values.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 25 heatmaps have 0 to 26 on the x and y axes and 0 to 250 vertical grayscales.
    Each heatmap has an image of a handwritten digit from 0 to 9.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-1
  prefs: []
  type: TYPE_NORMAL
- en: Sample items from the MNIST dataset, shown as heatmaps
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Each 28-by-28-pixel image contains 784 values. We need to flatten `x_train`
    and `x_val`, which have shapes (60000, 28, 28) and (10000, 28, 28), respectively,
    in order to make them acceptable to a standard fully connected neural network.
    The desired shapes are (60000, 784) and (10000, 784). We can do this by reshaping
    the arrays (Listing [4-3](#PC3)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: It’s good practice to directly reference variable attributes of the dataset
    rather than hard-coding the value of those attributes. If someone who had 60,001
    elements in their dataset wanted to use your code, they would get an error. A
    more robust reshaping method that works with a variable dataset and image size
    is shown in Listing [4-4](#PC4). Note that setting –1 as an axis dimension value
    is equivalent to requesting NumPy to infer the remaining dimension. (If you are
    unfamiliar with this, please see the Appendix.)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'Let’s build a feed-forward neural network (Figure [4-2](#Fig2)) using the simple
    sequential model with the following logic: we begin with an input layer with 784
    nodes; each dense layer contains half of the nodes as the one before it; we stop
    adding layers when the number of neurons is 10 or less (Listing [4-5](#PC5)).'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig2_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Flowchart of None comma value in input and output of input underscore 1 colon
    Input Layer, dense colon Dense, dense underscore 1 to 6 colon Dense.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-2
  prefs: []
  type: TYPE_NORMAL
- en: Result of calling keras.utils.plot_model on the model architecture constructed
    in Listing [4-5](#PC5)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Calling `model.summary()` prints out information about the model architecture
    and parameters (Listing [4-6](#PC6)). We see that the first layer learns the mapping
    between a 784-dimensional vector and a 392-dimensional vector, requiring 784 ⋅ 392 = 307,720
    parameters. The second layer learns the mapping between a 392-dimensional vector
    and a 196-dimensional vector, requiring 392 ⋅ 196 = 77,028 parameters. In total,
    across six layers, the model architecture requires 410.5k parameters.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: We can train the model with standard meta-parameters (Listing [4-7](#PC7), Figure
    [4-3](#Fig3)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig3_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A double-line graph for model performance plots cross-entropy versus epoch.
    Training loss ranges from 0.62 to 0.03\. The validation loss is from 0.26 to 0.12.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-3
  prefs: []
  type: TYPE_NORMAL
- en: Model training and validation performance modeling the MNIST dataset over 20
    epochs
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Our model obtains nearly 0.975 validation accuracy – pretty good performance.
  prefs: []
  type: TYPE_NORMAL
- en: However, blurry 28-by-28 grayscale images of handwritten digits aren’t representative
    of the images used in today’s age of high-resolution images. Let’s suppose that
    a “modern” MNIST dataset consists of 200-by-200-pixel images of handwritten digits
    and we want to scale our model to adapt to this image size. (You can make changes
    to the dataset using `cv2.resize(img, (200, 200))` and sharpening filters to address
    digit blurriness if desired. We’ll just assume that such a dataset exists to analyze
    how the parametrization scales.)
  prefs: []
  type: TYPE_NORMAL
- en: For reference, Figure [4-4](#Fig4) is 1000-by-750 pixels in original picture
    resolution. 200-by-200 pixels is a comparatively small image size to today’s image
    resolution standards.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig4_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A high-resolution photo of a lens ball placed on beach sand during sunset.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-4
  prefs: []
  type: TYPE_NORMAL
- en: Sample 1000-by-750-pixel-resolution image, by Error 420 from Unsplash
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s build an architecture to process this sort of image, using the same logic
    as before: each layer should have half as many nodes as the layer before it, and
    we stop and add the final ten-class output when the number of nodes drops below
    20 (Listing [4-8](#PC8)).'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'Let’s look at how many parameters are involved here: *more than one trillion
    parameters*, an almost 2.5k-fold increase in parameter count for about a sevenfold
    increase in image resolution dimension (compared with the previous network built
    for 28-by-28-pixel images) (Listing [4-9](#PC9)). The model size here resembles
    the parametrization of massive modern natural language processing applications
    that translate languages and generate text (you’ll read about these in the next
    two chapters) – a far cry from the intended application for simple image recognition.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: The problem with using dense, feed-forward neural network architectures on image
    data, as one can tell from this experiment, is that they do not scale feasibly
    with image size. The difference between a 300-by-300 image and a 350-by-350 image
    isn’t very significant to the human eye (Figure [4-5](#Fig5)), but to a neural
    network, the input space of the 350-by-350 image contains 32,500 more dimensions
    than that of the 300-by-300 image. This increase is compounded in each subsequent
    layer.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig5_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Low-angle photos of steel trusses taken in two different resolutions.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-5
  prefs: []
  type: TYPE_NORMAL
- en: Two sample images, one 300 × 300 and the other 350 × 350 (in an undisclosed
    order). The visual difference is negligible to humans, but the representation
    difference is massive for neural network architectures. Image from Unsplash and
    modified
  prefs: []
  type: TYPE_NORMAL
- en: 'In this case, we didn’t even consider color. If you considered the color channel
    and set `curr_nodes = 200 * 200 * 3` into the neural network architecture construction
    logic outlined in Listing [4-8](#PC8) (or otherwise increase the resolution of
    the image), you might even run into an error: `“Allocator ran out of memory trying
    to allocate [storage size].”` The architecture is so large that Keras physically
    cannot allocate enough space in memory to store all the parameters!'
  prefs: []
  type: TYPE_NORMAL
- en: We need a feasible way to scale neural network architectures to handle images
    that reflect, to some extent, how vision should work. The number of additional
    parameters or space needed to model a slightly higher-resolution image should
    not be significant, because having a slightly more high-resolution image doesn’t
    affect the actual content meaning/semantics in the image.
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, philosophically speaking, we cannot treat each individual pixel as
    always representing the same concept – the same pixel location on two pictures
    of dogs, for example, might represent two entirely different values and meanings
    even though the aggregated pixels contribute to the same label (Figure [4-6](#Fig6)).
    Images should be processed in a way that is somehow consistent across the image
    yet capable of capturing deep and useful information. Using a standard ANN does
    not guarantee any of this consistency.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig6_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Photos of a dog playing at the beach with two different pixels.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-6
  prefs: []
  type: TYPE_NORMAL
- en: Two images representing the same semantic information but with very different
    pixel values. Note that a pixel coordinate could be part of the dog in one image
    but part of the ocean or sky in another image. A neural network processing image
    data must be invariant to these transformations that change the pixel values but
    not the semantic content of the image. Image by Oscar Sutton from Unsplash
  prefs: []
  type: TYPE_NORMAL
- en: The Convolution Operation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The convolutional layer changed the game in image recognition and general deep
    learning image tasks and applications. It addresses all the concerns previously
    described well and is still the foundation of almost all deep learning computer
    vision models – despite having been in use for several decades (a relatively long
    time in the context of deep learning history).
  prefs: []
  type: TYPE_NORMAL
- en: The concept of a convolution itself for image processing has been known for
    quite a long time. Given a special filter describing how certain pixels are to
    be modified in relationship to surrounding pixels, we can apply the filter to
    an image to obtain a modified image. We can design kernels that force pixels into
    certain relationships with others, creating effects like blurring, sharpening,
    or amplifying edges (sharp changes) of an image.
  prefs: []
  type: TYPE_NORMAL
- en: 'Consider a hypothetical 3-by-3 kernel *k*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ k=\left[0\ 0.5\ 0\ 0.5\ 1\ 0.5\ 0\ 0.5\ 0\ \right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equa.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Let’s construct a sample 4-by-4 matrix *I* to apply the kernel to:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ i=\left[\ 1\kern0.5em 2\kern0.5em 5\kern0.5em 6\kern0.75em 3\kern0.5em
    4\kern0.5em 7\kern0.5em 8\kern0.5em 9\ 10\ 13\ 14\kern0.5em 11\ 12\ 15\ 16\kern0.5em
    \right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equb.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Lastly, let *R* be the result of the convolution. As we’ll see, it has shape
    (2, 2):'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ R=\left[????\right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equc.png)'
  prefs: []
  type: TYPE_IMG
- en: 'We will begin by filling in the upper-left element of *R*. This corresponds
    to the upper-left 3-by-3 window in *I* (bolded):'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \left[\ 1\kern0.5em 2\kern0.5em 5\kern0.5em 6\kern0.75em 3\kern0.5em 4\kern0.5em
    7\kern0.5em 8\kern0.5em 9\ 10\ 13\ 14\kern0.5em 11\ 12\ 15\ 16\kern0.5em \right]
    $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equd.png)'
  prefs: []
  type: TYPE_IMG
- en: 'We perform an element-wise multiplication between each element of the kernel
    *k* and each element in the relevant 3-by-3 window in *I*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \left[0\cdot 1\ 0.5\cdot 2\ 0\cdot 3\ 0.5\cdot 5\ 1\cdot 6\ 0.5\cdot 7\
    0\cdot 9\ 0.5\cdot 10\ 0\cdot 11\ \right]=\left[0\ 1\ 0\ 2.5\ 6\ 3.5\ 0\ 5\ 0\
    \right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Eque.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The final result is the sum of the elements in the resulting product matrix:
    0 + 1 + 0 + 2.5 + 6 + 3.5 + 0 + 5 + 0 = 18\. The first value of *R* has been derived:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ R=\left[18???\right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equf.png)'
  prefs: []
  type: TYPE_IMG
- en: We can apply a similar operation to obtain the value for the top-right value
    of *R*. The relevant subregion of *I* is (bolded)
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \left[\ 1\kern0.5em 2\kern0.5em 5\kern0.5em 6\kern0.75em 3\kern0.5em 4\kern0.5em
    7\kern0.5em 8\kern0.5em 9\ 10\ 13\ 14\kern0.5em 11\ 12\ 15\ 16\kern0.5em \right]
    $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equg.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The calculation can be performed as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \left[0\cdot 2\ 0.5\cdot 3\ 0\cdot 4\ 0.5\cdot 6\ 1\cdot 7\ 0.5\cdot 8\
    0\cdot 10\ 0.5\cdot 11\ 0\cdot 12\ \right]=\left[0\ 1.5\ 0\ 3\ 7\ 4\ 0\ 5.5\ 0\
    \right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equh.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ \to 0+1.5+0+3+7+4+0+5.5+0=21 $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equi.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ R=\left[18\ 21??\right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equj.png)'
  prefs: []
  type: TYPE_IMG
- en: If you calculate through the other two values of *R*, you should get the matrix
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ R=\left[18\ 21\ 30\ 33\ \right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equk.png)'
  prefs: []
  type: TYPE_IMG
- en: Thus, given an original matrix of shape *a* × *b* and a kernel of shape *x* × *y*
    (convolutions can be performed on non-square matrices and with non-square kernels!),
    the resulting convolved matrix has shape (*a* − *x* + 1, *b* − *y* + 1). Each
    value represents the number of “slots” the kernel can occupy across that spatial
    dimension.
  prefs: []
  type: TYPE_NORMAL
- en: Alright, exactly what does this convolved result mean? In order to interpret
    the result of a convolution, we need to first understand the design of the kernel.
    This particular kernel weights the value in the middle the highest, with decaying
    influence further from the center. We can therefore expect the kernel slightly
    “averages” values near each pixel; the resulting convolved feature reflects the
    *general*/”averaged” nature of elements in the original matrix.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, we see that the order of elements follows *A* < *B* < *C* < *D*
    where
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ R=\left[A\ B\ C\ D\ \right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equl.png)'
  prefs: []
  type: TYPE_IMG
- en: This reflects the general organization of elements across the original matrix
    *I*. We can also observe that *B* − *A* = *D* − *C*, which reflects the property
    that items in the bottom-right region of the original matrix *I* are roughly the
    same distance from items in the bottom-left region as items in the top right are
    from those in the top left.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see a slightly more complex example using a 10-by-10 image (Listing [4-10](#PC10),
    Figure [4-7](#Fig7)). This image will feature a plus sign consisting of “1”s on
    a background gradient.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig7_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A heatmap of 0 to 9 on the x and y axes and 0 to 1 in vertical grayscale has
    a white plus sign of value 1 on a gradient background of values less than 1.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-7
  prefs: []
  type: TYPE_NORMAL
- en: Heatmap representation of a custom “image” – a plus sign overlayed against a
    gradient background
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: We can use `cv2`’s `filter2D` function to apply kernels to an image. Because
    `cv2.filter2D` is adapted for images, `cv2` incorporates *padding* on the side
    such that the convolved image has the same shape as the original image. This entails
    adding buffer values (most commonly, 0) to the side of the matrix and applying
    a convolution to the padded matrix. Let’s write a function that takes in a kernel,
    applies it to a matrix, and displays the matrix as a heatmap (Listing [4-11](#PC11)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: 'The *identity kernel* is defined as a 1 in the center of the matrix and 0s
    everywhere else (Listing [4-12](#PC12), Figure [4-8](#Fig8)). Each pixel in the
    convolved matrix is directly impacted by only one pixel in the previous original
    matrix, yielding a convolved matrix identical to the original:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ identity\ kernel=\left[0\ 0\ 0\ 0\ 1\ 0\ 0\ 0\ 0\ \right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equm.png)'
  prefs: []
  type: TYPE_IMG
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig8_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A heatmap of 0 to 9 on the x and y axes and 0 to 1 in vertical grayscale has
    a white plus sign of value 1 on a gradient background of values less than 1.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-8
  prefs: []
  type: TYPE_NORMAL
- en: Result of applying a convolution with the identity kernel to the “image” in
    Figure [4-7](#Fig7) (Note that there is no difference.)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: 'To apply a blurring effect to an image, we can define a kernel that weights
    all neighboring pixels identically (Listing [4-13](#PC13), Figure [4-9](#Fig9)):'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ 3\times 3\  uniform\ blurring\ kernel=\left[1\ 1\ 1\ 1\ 1\ 1\ 1\ 1\ 1\
    \right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equn.png)'
  prefs: []
  type: TYPE_IMG
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig9_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A blurred heatmap of 0 to 9 on the x and y axes and 0 to 8 in vertical grayscale
    has a white plus sign for high values on a gradient background of low values.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-9
  prefs: []
  type: TYPE_NORMAL
- en: Result of applying a convolution with the 3-by-3 uniform blurring kernel to
    the “image” in Figure [4-7](#Fig7)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: '`cv2` applies *padding* (adding additional zeros) around the outside of the
    image before a convolution is applied such that the resulting matrix has the same
    size. We will further discuss padding in the context of convolutions later.'
  prefs: []
  type: TYPE_NORMAL
- en: 'We can adjust the intensity and range of blurring by changing the size of the
    kernel, which impacts how many neighboring pixels are considered when calculating
    a pixel in the convolved image. Consider the result of a 2-by-2 blurring kernel
    (Listing [4-14](#PC14), Figure [4-10](#Fig10)):'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ 2\times 2\  uniform\ blurring\ kernel=\left[1\ 1\ 1\ 1\ \right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equo.png)'
  prefs: []
  type: TYPE_IMG
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig10_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A blurred heatmap of 0 to 9 on the x and y axes and 0 to 4 in vertical grayscale
    has a white plus sign of value 4 on a gradient background of values less than
    4.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-10
  prefs: []
  type: TYPE_NORMAL
- en: Result of applying a convolution with the 2-by-2 uniform blurring kernel to
    the “image” in Figure [4-7](#Fig7)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: 'With an 8-by-8 blurring kernel, the plus sign in the middle becomes completely
    integrated with the background and is unnoticeable (Listing [4-15](#PC15), Figure
    [4-11](#Fig11)):'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ 8\times 8\  uniform\ blurring\ kernel=\left[1\ 1\ 1\ 1\kern0.5em 1\ 1\
    1\ 1\kern0.5em 1\ 1\ 1\ 1\kern0.5em 1\ 1\ 1\ 1\kern0.75em 1\ 1\ 1\ 1\kern0.5em
    1\ 1\ 1\ 1\kern0.5em 1\ 1\ 1\ 1\kern0.5em 1\ 1\ 1\ 1\kern0.75em 1\ 1\ 1\ 1\kern0.5em
    1\ 1\ 1\ 1\kern0.5em 1\ 1\ 1\ 1\kern0.5em 1\ 1\ 1\ 1\kern0.75em 1\ 1\ 1\ 1\kern0.5em
    1\ 1\ 1\ 1\kern0.5em 1\ 1\ 1\ 1\kern0.5em 1\ 1\ 1\ 1\kern0.75em \right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equp.png)'
  prefs: []
  type: TYPE_IMG
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig11_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A blurred heatmap of 0 to 9 on the x and y axes and 0 to 40 in vertical grayscale
    has cells with low values on top and left and high values on bottom and right.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-11
  prefs: []
  type: TYPE_NORMAL
- en: Result of applying a convolution with the 8-by-8 uniform blurring kernel to
    the “image” in Figure [4-7](#Fig7)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: 'Another operation is the sharpening effect, which makes edges and values contrast
    more sharply with one another (Listing [4-16](#PC16), Figure [4-12](#Fig12)).
    The kernel weights the center pixel very highly and the surrounding neighbors
    lowly; this has the effect of increasing the difference between adjacent pixels
    in the convolved feature:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ sharpening\ kernel=\left[0-1\ 0-1\ 5-1\ 0-1\ 0\ \right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equq.png)'
  prefs: []
  type: TYPE_IMG
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig12_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A heatmap of 0 to 9 on x and y axes and negative 2 to 3 vertical grayscale has
    a white plus sign of high values on a gradient background of low values.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-12
  prefs: []
  type: TYPE_NORMAL
- en: Result of applying a convolution with the 3-by-3 sharpening kernel to the “image”
    in Figure [4-7](#Fig7)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: There are many other kernels that can accomplish a wide variety of effects on
    image matrices. It’s a good exercise to play around with your own custom kernels
    and view the resulting convolved image.
  prefs: []
  type: TYPE_NORMAL
- en: Consider the following ***pixel-by-pixel*** image of a dog, derived as such
    (Listing [4-17](#PC17), Figure [4-13](#Fig13)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig13_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A black-and-white photo of a dog playing at the beach.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-13
  prefs: []
  type: TYPE_NORMAL
- en: Sample image of a dog
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: Let’s modify our `applyKernel` function to display the convolved matrix as an
    image rather than as a heatmap (Listing [4-18](#PC18)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: Applying a 3-by-3 blurring kernel discussed before results in the following
    image (Listing [4-19](#PC19), Figure [4-14](#Fig14)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig14_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A black-and-white, unclear image of a dog.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-14
  prefs: []
  type: TYPE_NORMAL
- en: Result of incorrectly applying a convolution with a 3-by-3 uniform blurring
    kernel to the sample dog image in Figure [4-13](#Fig13)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: That’s odd! What happened here?
  prefs: []
  type: TYPE_NORMAL
- en: Let’s plot the distribution of pixel values across the image (Listing [4-20](#PC20),
    Figure [4-15](#Fig15)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig15_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A bar graph of counts from 0 to 140,000 versus pixel values from 0 to 255\.
    A single bar of count 140,000 is at 255.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-15
  prefs: []
  type: TYPE_NORMAL
- en: Distribution of pixel values after incorrectly applying a convolution with a
    3-by-3 uniform blurring kernel to the sample dog image in Figure [4-13](#Fig13)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: It seems that almost all the values in the image have been pushed up to 255\.
    This is because convolving the feature has the effect of changing the domain of
    possible values. If all nine values in a convolution region have value 255, then
    the convolved result is 255 ⋅ 9 = 2295 – which is way out of the valid domain
    for unsigned int-8 image pixel values. In these cases, `cv2.filter2D` caps the
    maximum value as 255\. In fact, the convolved result for any region with average
    value larger than 255/9 will be capped at 255.
  prefs: []
  type: TYPE_NORMAL
- en: Thus, we need to modify the kernel such that the domain of values in the convolved
    result does not extend beyond the original domain. We can solve this problem by
    defining the blur kernel as
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ 3\times 3\  uniform\ blurring\ kernel=\left[1/9\ 1/9\ 1/9\ 1/9\ 1/9\ 1/9\
    1/9\ 1/9\ 1/9\ \right] $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_Equr.png)'
  prefs: []
  type: TYPE_IMG
- en: Let *M* represent the maximum pixel value (in this context it is 255). The maximum
    result of applying this kernel across even a region in which all pixels are populated
    with *M*s is ![$$ 9\cdot \left(\frac{1}{9}\cdot M\right)=M $$](../images/525591_1_En_4_Chapter/525591_1_En_4_Chapter_TeX_IEq1.png).
    Thus, we preserve the scale of pixel values.
  prefs: []
  type: TYPE_NORMAL
- en: After applying this modified kernel, we see that the resulting convolved distribution
    is very similar to that of the original distribution and remains within a valid
    range (Figures [4-16](#Fig16) and [4-17](#Fig17)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig17_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A bar graph of count from 0 to 5,000 versus pixel values from 0 to 248\. Count
    is under 1000 from 0 to 220, and from 1000 to 5000 from 220 to 248.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-17
  prefs: []
  type: TYPE_NORMAL
- en: Distribution of pixel values after correctly applying a convolution with a 3-by-3
    uniform blurring kernel to the sample dog image in Figure [4-13](#Fig13)
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig16_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A bar graph of count from 0 to 5,000 versus pixel values from 0 to 248\. Count
    is under 1000 from 0 to 220, and from 1000 to 5000 from 220 to 248.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-16
  prefs: []
  type: TYPE_NORMAL
- en: Original distribution of pixel values from the sample dog image in Figure [4-13](#Fig13)
  prefs: []
  type: TYPE_NORMAL
- en: The resulting image is slightly blurred and displays properly, as desired (Figure
    [4-18](#Fig18)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig18_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A slightly blurred, black-and-white photo of a dog playing at the beach.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-18
  prefs: []
  type: TYPE_NORMAL
- en: Result of correctly applying a convolution with a 3-by-3 uniform blurring kernel
    to the sample dog image in Figure [4-13](#Fig13)
  prefs: []
  type: TYPE_NORMAL
- en: Applying an 8-by-8 blurring kernel, defined as an 8 × 8 matrix filled with the
    value 1/64, yields an even more blurred image (Figure [4-19](#Fig19)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig19_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A considerably blurred, black-and-white photo of a dog playing at the beach.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-19
  prefs: []
  type: TYPE_NORMAL
- en: Result of correctly applying a convolution with an 8-by-8 uniform blurring kernel
    to the sample dog image in Figure [4-13](#Fig13)
  prefs: []
  type: TYPE_NORMAL
- en: Similarly, applying the sharpening kernel has the following effect (Figure [4-20](#Fig20)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig20_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A sharpened, black-and-white photo of a dog playing at the beach.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-20
  prefs: []
  type: TYPE_NORMAL
- en: Result of correctly applying a convolution with a 3-by-3 sharpening kernel to
    the sample dog image in Figure [4-13](#Fig13)
  prefs: []
  type: TYPE_NORMAL
- en: Convolutions can be constructed to extract meaningful features from images and
    matrices. For instance, it may be helpful to blur an image in order to minimize
    the distance between adjacent pixels to minimize variance in the image and perform
    general, broad analyses of the image minimally affected by noisy variation. Alternatively,
    sharpening may assist with amplification of important features and edges that
    act as landmarks and features for the content of the image.
  prefs: []
  type: TYPE_NORMAL
- en: The fundamental idea of a *convolutional neural network* (CNN) is similar to
    that of a standard feed-forward fully connected neural network introduced previously
    in Chapter [3](525591_1_En_3_Chapter.xhtml). Standard artificial neural networks
    can demonstrate sophisticated behavior by arranging large quantities of a simple
    extractive unit – the perceptron. By providing the architecture/arrangement of
    parameters, the network can learn the optimal values to extract desirable information
    to perform the intended task. Similarly, CNNs can model image data quite well
    by stacking convolution operations upon each other; the neural network learns
    the values of each of the kernels in the convolutions to extract the optimal features
    from the image. Optimization is still performed via gradient descent.
  prefs: []
  type: TYPE_NORMAL
- en: 'A *convolutional layer* is a collection of convolutions, like a fully connected
    layer is a collection of perceptrons. There are a few important attributes of
    a convolutional layer that define its specific implementation:'
  prefs: []
  type: TYPE_NORMAL
- en: '*The number of filters, n*: This is the number of “convolution operations”
    that exist in the layer. The network will learn *n* different kernels for this
    layer.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*The kernel shape* (*a, b*): This defines how large the learned kernel will
    be.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Input or valid padding*: This determines whether padding is used or not. If
    input padding is used, then any incoming matrices will be padded such that the
    resulting convolved matrices have the same shape as the incoming matrices before
    padding. Otherwise, no padding will be applied, and the convolved matrix will
    have shape (*x* – *a* + 1, *y* – *b* + 1), where (*x*, *y*) is the shape of the
    original matrix.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A layer must learn one filter per connection between each feature map in the
    previous layer and each feature map in the current layer. For instance, if layer
    A produces 8 feature maps (because it has 8 filters) and layer B produces 16 feature
    maps (because it has 16 filters), layer B learns 8 × 16 = 128 filters. If all
    the filters are 3-by-3 matrices, then layer B uses 128 × (3 × 3) = 1152 parameters.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s start building a simple convolutional neural network using the sequential
    syntax for simplicity. (We’ll use the functional API in more complex situations
    when using the sequential API becomes difficult or impossible.) We will build
    a convolutional neural network that processes 28-by-28 images from the MNIST dataset
    and classifies them into one of ten digits.
  prefs: []
  type: TYPE_NORMAL
- en: 'We begin with an input layer (Listing [4-21](#PC21)). All image data must have
    three specified spatial dimensions: width, height, and depth. Grayscale images
    have a depth of 1, whereas color images generally have a depth of 3 (where depth-wise
    layers correspond to red, green, and blue). In this case, our input data has shape
    (28, 28, 1).'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: After the input, we should add convolutional layers to process the image (Listing
    [4-22](#PC22)). In Keras, convolutional layers can be instantiated via `keras.layers.Conv2D(num_filters,
    kernel_size = (a, b), activation = 'activation_name', padding = 'padding_type')`.
    The default activation is linear (i.e., *y* = *x*, applies no nonlinearity to
    the data), and the default padding type is valid.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: 'It’s worth understanding how each layer changes the shape of the input:'
  prefs: []
  type: TYPE_NORMAL
- en: The original input layer takes in data of shape (28, 28, 1).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The first convolutional layer uses 8 filters and applies a 5-by-5 kernel, yielding
    an output of shape (24, 24, 8).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The second convolutional layer uses 8 filters and applies a 3-by-3 kernel, yielding
    an output of shape (22, 22, 8).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The third convolutional layer uses 16 filters and applies a 5-by-5 kernel, yielding
    an output of shape (20, 20, 16).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The fourth convolutional layer uses 16 filters and applies a 1-by-1 kernel,
    yielding an output of shape (19, 19, 16).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: To confirm this, we can plot the model to understand how each layer transforms
    the shape of incoming data with `keras.utils.plot_model(model, show_shapes=True)`
    (Figure [4-21](#Fig21)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig21_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Flowchart of architecture model for the listings 4 - 21 and 4 -22.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-21
  prefs: []
  type: TYPE_NORMAL
- en: Visual representation of the model architecture defined in Listings [4-21](#PC21)
    and [4-22](#PC22)
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, we can see that the convolutions require very few parameters (Listing
    [4-23](#PC23)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: However, our model isn’t done! The objective of the classification task is to
    map an input image of shape (28, 28, 1) to an output vector of length 10\. No
    matter how many convolutional layers we add, we’re always going to have data arranged
    along three spatial dimensions. We need a method to force the data from three
    spatial dimensions to just one.
  prefs: []
  type: TYPE_NORMAL
- en: 'Flattening might be the most obvious method to map data with three spatial
    dimensions to one: we simply unpack individual elements in the higher-dimensional
    arrangement and lay them out along a one-dimensional axis. This is similar to
    standard reshaping operations, like `arr.reshape` in NumPy: all values are retained,
    just arranged in a different format.'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s add a flattening layer, followed by a series of fully connected layers
    that eventually map to the desired ten-class output (Listing [4-24](#PC24)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: Now, the network architecture properly maps the input to the desired output
    shape (Figure [4-22](#Fig22)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig22_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Flowchart has None, values in input and output of input 1 colon InputLayer,
    conv2d 1 to 3 colon Conv2D, flatten colon Flatten, dense 1 to 2 colon Dense.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-22
  prefs: []
  type: TYPE_NORMAL
- en: Visual representation of the model architecture defined in Listings [4-21](#PC21),
    [4-22](#PC22), and [4-24](#PC24)
  prefs: []
  type: TYPE_NORMAL
- en: Our finalized network has a few hundred thousand parameters, about half the
    number of parameters in our previous network architecture design using only fully
    connected layers.
  prefs: []
  type: TYPE_NORMAL
- en: When we scale the image size to 200-by-200 while using the same architecture,
    the number of model parameters used is 18,682,002 – compare this with the 1,066,706,102
    parameters used in the previously discussed hypothetical 200-by-200 image fully-connected
    network.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: The parameter count for the convolutional neural network, you’ll probably notice,
    isn’t great. The parameter count especially balloons at the flattening layer.
    We’ll explore another family of layers used in convolutional neural networks,
    *pooling layers*, which help us address this problem and further improve the parameter
    scaling of a convolutional neural network.
  prefs: []
  type: TYPE_NORMAL
- en: For convenience of reference, the part of the convolutional neural network before
    conversion from three spatial dimensions to one spatial dimension is generally
    called the “convolutional component” and the part afterward the “fully connected
    component.” Another name is the “bottom” and “top,” respectively – which can be
    confusing because the last part of the model (the fully connected component) is
    referred to as the “top.”
  prefs: []
  type: TYPE_NORMAL
- en: The convolutional component can be thought of as serving an *extractive* role
    by identifying and amplifying the most relevant/important qualities of the input.
    In contrast, the fully connected component performs an *aggregative*/*compiling*/*interpretive*
    role by processing all the extracted features and interpreting how they relate
    to the output.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, the convolutional component of our example network built for MNIST
    data might detect and amplify corners, like the top-left part of a “5” or the
    left and top part of a “4.” The fully connected component might be able to aggregate
    the various detected corner properties and interpret them as support for belonging
    to a certain class. If there are many sharp corners, the image could be a “4”
    or “5.” If there are a low number of sharp corners, the image could be “1,” “2,”
    “3,” or “7.” If there are no sharp corners, the image could be a “0,” “6,” “8,”
    or “9.” Combining this information with other extracted features allows the fully
    connected component to pin down exactly which digit the image is.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s compile and train the model, using familiar syntax (Listing [4-25](#PC25)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
- en: The model very quickly obtains good training and validation performance (Listing
    [4-26](#PC26), Figure [4-23](#Fig23)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig23_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Two line graphs plot loss and accuracy versus epoch. Train and validation show
    drastic and slight decrease for loss and similar increase for accuracy.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-23
  prefs: []
  type: TYPE_NORMAL
- en: Loss and accuracy history of the previously defined convolutional neural network
    architecture as it trains on the MNIST dataset for 20 epochs
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE25]'
  prefs: []
  type: TYPE_PRE
- en: To gain a better idea of what the convolutional neural network is really doing
    in terms of spatially extracting features, let us pass an input image through
    only the *first convolutional layer* of the trained network. This allows us to
    visually identify what types of transformations the network has learned as being
    optimal for classification.
  prefs: []
  type: TYPE_NORMAL
- en: In order to “peek” into the input-output flow of a layer within the network,
    we can create a new model constructed from the same layer objects as in the original
    network. This allows us to isolate the weights within that specific layer (Listing
    [4-27](#PC27)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE26]'
  prefs: []
  type: TYPE_PRE
- en: We can use `peek.predict` to get the result after passing in a sample input.
    Recall that the first layer maps the input of shape (28, 28, 1) to an output of
    shape (24, 24, 8) – meaning that the first layer outputs 8 feature maps of shape
    (24, 24). We can visualize a sample input and a sample of the feature map outputs
    from the first layer (Listing [4-28](#PC28), Figure [4-24](#Fig24)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig24_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An 8 by 8 set of 64 images has a handwritten digit from 0 to 9 in each cell.
    The degree of blurring increases from left to right.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-24
  prefs: []
  type: TYPE_NORMAL
- en: Representing the effect of the learned first-layer convolution kernels (all
    columns except the left one) on an input image (left column)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE27]'
  prefs: []
  type: TYPE_PRE
- en: 'The left column contains the original input image to the layer; each of the
    images to the right displays one feature map output. You can begin to observe
    various transformations performed just by the first layer: inversion, shifting,
    edge detection, corner detection, and line detection, to name a few.'
  prefs: []
  type: TYPE_NORMAL
- en: We can modify the `peek` model to include the second layer and view the feature
    maps obtained by passing an input through both the first and second layers (Listing
    [4-29](#PC29), Figure [4-25](#Fig25)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig25_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An 8 by 8 set of 64 images has a handwritten digit from 0 to 9 in each cell.
    The degree of blurring increases from left to right.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-25
  prefs: []
  type: TYPE_NORMAL
- en: Representing the effect of the learned first- and second-layer convolution kernels
    (all columns except the left one) on an input image (left column)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE28]'
  prefs: []
  type: TYPE_PRE
- en: 'The second layer is able to capture more specific components of each digit.
    If you look closely, you can see that each feature map “looks for” increasingly
    specialized features. The first displayed feature map (second column from the
    left in Figure [4-26](#Fig26)), for instance, appears to “look for” horizontal
    lines in digits: there are three horizontal lines for the digit 3, two for the
    digit 2, two for the digit 5, etc. The outputs of the third layer become more
    difficult to interpret due to increasing distance from the input.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig26_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An 8 by 8 set of 64 images has a handwritten digit from 0 to 9 in each cell.
    The degree of blurring increases from left to right.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-26
  prefs: []
  type: TYPE_NORMAL
- en: Representing the effect of the learned first-, second-, and third-layer convolution
    kernels (all columns except the left one) on an input image (left column)
  prefs: []
  type: TYPE_NORMAL
- en: The fourth layer is the last convolutional layer before the outputs are flattened
    and passed into the fully connected component (Figure [4-27](#Fig27)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_4_Chapter/525591_1_En_4_Fig27_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An 8 by 8 set of 64 images has a handwritten digit from 0 to 9 in each cell.
    The degree of blurring increases from left to right.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-27
  prefs: []
