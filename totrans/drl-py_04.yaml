- en: n-Step Returns
  id: totrans-330
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This section unifies the MC and TD approaches. MC methods sample the return
    from a state until the end of the episode, and they do not bootstrap. Accordingly,
    MC methods cannot be applied for continuing tasks. TD, on the other hand, uses
    one-step return to estimate the value of the remaining rewards. TD methods take
    a short view of the trajectory and bootstrap right after one step.
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
- en: These methods are two extremes, and there are many situations when a middle-of-the-road
    approach could produce better results. The idea in *n-step* is to use the rewards
    from the next *n* steps and then bootstrap from *n* + 1 step to estimate the value
    of the remaining rewards. Figure [4-22](#Fig22) shows the backup diagrams for
    various values of *n*. On one extreme is one-step, which is the *TD*(0) method
    that you just saw in the context of SARSA, Q-learning, and other related approaches.
    At the other extreme is the ∞-step TD, which is nothing but an MC method. The
    broad idea is to see that the TD and MC methods are two extremes of the same continuum.
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_4_Chapter/502835_2_En_4_Fig22_HTML.jpg)'
  id: totrans-333
  prefs: []
  type: TYPE_IMG
- en: A diagram represents the comparison of backup methods in reinforcement learning
    such as 1-step T D 0, 2-step, n-step, and infinite Monte Carlo. Each column represents
    a sequence of nodes connected by arrows, with the number of steps increasing from
    left to right.
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-22
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
- en: Backup diagrams of n-step methods with TD(0) and MC at two extremes, *n* = 1
    and *n* = ∞ (end of episode)
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
- en: 'The approach of n-step can be used in an on-policy setting. You can have n-step
    SARSA and n-step expected SARSA, and these are natural extensions of what you
    have learned so far. However, using an n-step approach in off-policy learning
    would require you to factor one more concept—the relative difference of observing
    a specific n-step transition across states under behavior policy versus that under
    target-policy. To use the data from behavior policy *b*(*a*| *s*) for optimizing
    target policy π(*a*| *s*), you need to multiply the n-step returns observed under
    the behavior policy with a ratio called *importance sampling ratio,* which was
    derived earlier in this chapter in Equation [4-4](#Equ4). The same is reproduced
    here:'
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\uprho}_{t:T-1}=\frac{\Pr_{\uppi}\left\{\mathrm{trajectory}\right\}}{\Pr_b\left\{\mathrm{trajectory}\right\}}={\prod}_{k=t}^{T-1}\frac{\uppi
    \left({A}_k|{S}_k\right)}{b\left({A}_k|{S}_k\right)} $$](../images/502835_2_En_4_Chapter/502835_2_En_4_Chapter_TeX_Equy.png)'
  id: totrans-338
  prefs: []
  type: TYPE_IMG
- en: The importance sampling ratio ensures that the return of a trajectory observed
    under the behavior policy is adjusted up or down based on the relative chance
    of observing a trajectory under the target policy versus the chance of observing
    the same trajectory under the behavior policy.
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
- en: Nothing comes for free, which is the case with importance sampling. The importance
    sampling ratio can cause wide variance. Plus, these are not computationally efficient.
    There are many advanced techniques like *discount-aware importance sampling* and
    *per-decision importance sampling* that I talked about in the earlier section
    on importance sampling. These approaches look at the importance sampling and rewards
    in various ways to reduce the variance and make these algorithms efficient.
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
- en: I will not be going into the details of implementing these algorithms in this
    book. The key focus was to introduce these at a conceptual level and make you
    aware of the advanced techniques.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
- en: Eligibility Traces and TD(λ)
  id: totrans-342
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Eligibility traces unify the MC and TD methods in an algorithmically efficient
    way. TD methods, when combined with eligibility trace, produce *TD*(λ) where λ = 0,
    making it equivalent to the one-step *TD* that you have studied so far. That’s
    the reason that one-step TD is also known as TD(0). The value of λ = 1 makes it
    similar to the regular ∞-step TD or in other words an MC method. Eligibility trace
    makes it possible to apply MC methods to non-episodic tasks as well. I will cover
    only high-level concepts of eligibility trace and *TD*(*λ*).
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
- en: In the previous section, you looked at n-step returns with *n* = 1 taking you
    to the regular TD method and *n* = ∞ taking you to MC. I also touched upon the
    fact that neither extreme is good. MC or TD(0) has its own advantages and disadvantages.
    An algorithm performs best with some intermediate value of n. n-step offered a
    view on how to unify TD and MC. What eligibility offers is an efficient way to
    combine them without keeping track of the n-step transitions at each step. Until
    now you have looked at an approach of updating a state value based on the next
    *n* transitions in the future. This is called the *forward view*. However, you
    could also look backward—that is, at each time step *t*, and see the impact that
    the reward at time step *t* would have on the preceding *n* states in past. This
    is known as *backward view* and forms the core of *TD*(*λ*). The approach allows
    an efficient implementation of integrating n-step returns in TD learning.
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
- en: 'Look back at Figure [4-22](#Fig22). What if instead of choosing different values
    of *n*, you combined all the n-step returns with some weight? This is known as
    *λ*-return, and the equation is as follows:'
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {G}_t^{\lambda }=\left(1-\lambda \right){\sum}_{n=1}^{T-t-1}{\lambda}^{n-1}{G}_{t:t+n}+{\lambda}^{T-t-1}{G}_t
    $$](../images/502835_2_En_4_Chapter/502835_2_En_4_Chapter_TeX_Equ12.png)'
  id: totrans-346
  prefs: []
  type: TYPE_IMG
- en: (4-12)
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
- en: 'Here, *G*[*t* : *t* + *n*] is the n-step return, which uses the bootstrapped
    value of the remaining steps at the end of the *n*^(*th*) step. It is defined
    as follows:'
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {G}_{t:t+n}={R}_{t+1}+\gamma {R}_{t+2}+\dots +{\gamma}^{n-1}{R}_{t+n}+{\gamma}^nV\left({S}_{t+n}\right)
    $$](../images/502835_2_En_4_Chapter/502835_2_En_4_Chapter_TeX_Equ13.png)'
  id: totrans-349
  prefs: []
  type: TYPE_IMG
- en: (4-13)
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
- en: 'If you put λ = 0 in Equation [4-12](#Equ12), you get the following:'
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {G}_t^0={G}_{t:t+1}={R}_{t+1}+\gamma V\left({S}_{t+1}\right) $$](../images/502835_2_En_4_Chapter/502835_2_En_4_Chapter_TeX_Equz.png)'
  id: totrans-352
  prefs: []
  type: TYPE_IMG
- en: The previous expression is similar to the target value for state-action updates
    of TD(0) in Equation [4-6](#Equ6).
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
- en: 'On other hand, putting λ = 1 in Equation [4-12](#Equ12) makes ![$$ {G}_t^{\uplambda}={G}_t^0
    $$](../images/502835_2_En_4_Chapter/502835_2_En_4_Chapter_TeX_IEq8.png) mimic
    MC and return *G*[*t*] as follows:'
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {G}_t^1={G}_t={R}_{t+1}+\gamma {R}_{t+2}+\dots +{\gamma}^{T-t-1}{R}_T
    $$](../images/502835_2_En_4_Chapter/502835_2_En_4_Chapter_TeX_Equaa.png)'
  id: totrans-355
  prefs: []
  type: TYPE_IMG
- en: The *TD*(*λ*) algorithm uses the previous λ-return with a trace vector, known
    as *eligibility trace,* to have an efficient online TD method using the “backward”
    view. Eligibility trace keeps a record of how far in the past a state was observed
    and by how much would that state’s estimate be impacted by the current return
    observed.
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
- en: 'I will stop here with the basic introduction of λ-returns, eligibility trace,
    and *TD*(*λ*). For a detailed review of the mathematical derivations as well as
    the various algorithms based on them, refer to the book *Reinforcement Learning:
    An Introduction* by Barto and Sutton, Second Edition.^([5](#Fn5))'
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
- en: Relationships Between DP, MC, and TD
  id: totrans-358
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: At the beginning of the chapter, you learned about how the DP, MC, and TD methods
    compare. I introduced the MC methods followed by the TD methods, and then I used
    n-step and TD(*λ*) to combine MC and TD as two extremes of the sample-based model-free
    learning.
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
- en: To conclude the chapter, Table [4-1](#Tab1) summarizes the comparison of the
    DP and TD methods.
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
- en: Table 4-1
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
- en: Comparison of DP and TD Methods in the Context of Bellman Equations
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
- en: '|   | Full Backup (DP) | Sample Backup (TD) |'
  id: totrans-363
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  id: totrans-364
  prefs: []
  type: TYPE_TB
- en: '| Bellman expectation equation for *v*[*π*](*s*) | Iterative policy evaluation
    | TD prediction |'
  id: totrans-365
  prefs: []
  type: TYPE_TB
- en: '| Bellman expectation equation for *q*[*π*](*s*, *a*) | Q-policy iteration
    | SARSA |'
  id: totrans-366
  prefs: []
  type: TYPE_TB
- en: '| Bellman optimality equation for *q*[*π*](*s*, *a*) | Q-value iteration |
    Q-learning |'
  id: totrans-367
  prefs: []
  type: TYPE_TB
- en: Summary
  id: totrans-368
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter looked at the model-free approach to reinforcement learning. It
    started by estimating the state value using the Monte Carlo approach. It explained
    the “first visit” and “every visit” approaches. It then looked at the bias and
    variance tradeoff in general and specifically in the context of the MC approaches.
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
- en: With the foundation of MC estimation in place, the chapter looked at MC control
    methods connecting it with the GPI framework for policy improvement that was introduced
    in Chapter [3](502835_2_En_3_Chapter.xhtml). You saw how GPI could be applied
    by swapping the estimation step of the approach from DP-based to an MC-based approach.
    The chapter looked in detail at the exploration-exploitation dilemma that needs
    to be balanced, especially in the model-free world where the transition probabilities
    are not known.
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 在 MC 估计的基础上，本章探讨了 MC 控制方法，将其与第 [3](502835_2_En_3_Chapter.xhtml) 章中引入的 GPI 框架相结合，以改进策略。你看到了如何通过将方法中的估计步骤从基于
    DP 的方法更改为基于 MC 的方法来应用 GPI。本章详细探讨了需要平衡的探索-利用困境，特别是在无模型世界中，过渡概率是未知的。
- en: I then briefly talked about the off-policy approach in the context of the MC
    methods. And in this context, you learned about importance sampling where the
    policy to collect samples is called behavior policy and the policy being optimized
    is the target policy. Importance sampling allows the return from one only to be
    cast in the context of another policy.
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我简要介绍了 MC 方法中的离策略方法。在这种情况下，你学习了重要性采样，其中收集样本的策略被称为行为策略，而正在优化的策略是目标策略。重要性采样允许将一个策略的回报仅放在另一个策略的背景下进行评估。
- en: TD was the next approach the chapter investigated with respect to model-free
    learning. It started off by establishing the basics of TD learning, starting with
    TD-based value estimation. This was followed by a deep dive into SARSA, an on-policy
    TD control method. The chapter then investigated Q-learning, a powerful off-policy
    TD learning approach, and some of its variants like expected SARSA.
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: TD 是本章在无模型学习方面探讨的下一个方法。它从建立 TD 学习的基础开始，首先是基于 TD 的价值估计。随后深入探讨了 SARSA，这是一种基于策略的
    TD 控制方法。接着，本章研究了 Q-learning，这是一种强大的离策略 TD 学习方法，以及它的一些变体，如期望 SARSA。
- en: In the context of TD learning, I also introduced the concept of state approximation
    to convert continuous state spaces into approximate discrete state values. The
    concept of state approximation will form the bulk of the next chapter and will
    allow you to combine deep learning with reinforcement learning.
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 在 TD 学习的背景下，我还介绍了状态近似的概念，将连续状态空间转换为近似的离散状态值。状态近似的概念将成为下一章的主要内容，并允许你将深度学习与强化学习相结合。
- en: Before concluding the chapter, you finally looked at n-step returns, eligibility
    traces, and TD(*λ*) as ways to combine TD and MC into a single framework.
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 在结束本章之前，你最终探讨了 n 步回报、资格痕迹和 TD(*λ*)作为将 TD 和 MC 结合到单一框架中的方法。
