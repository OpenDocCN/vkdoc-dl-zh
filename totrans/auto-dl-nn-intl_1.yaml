- en: Search Space, Tuner, and Trial
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s take a quick look at one core NNI concept. When we optimize a model, we
    select a particular set of parameters that determine the operation of our model.
    **Search space** defines this set of parameters. Search space is a key concept
    in automatic machine learning. The search space contains all possible parameters
    and architectures that are hypothetically acceptable for the optimized model.
  prefs: []
  type: TYPE_NORMAL
- en: Although the search space contains a finite number of parameters, nevertheless
    in most cases, it is practically impossible to test all parameters from the search
    space. The search space is too large. Therefore, a special component called **Tuner**
    is applied in selecting the most appropriate and promising parameters for testing.
    Tuner estimates the results and selects new parameters to check their suitability
    for model optimization.
  prefs: []
  type: TYPE_NORMAL
- en: Tuner selects a parameter in the search space and transfers it to **Trial**.
    Trial is a Python script that tests the model with parameters passed by Tuner
    and returns a metric that estimates the model’s performance.
  prefs: []
  type: TYPE_NORMAL
- en: This search process can be depicted as shown in Figure [1-10](#Fig10).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_1_Chapter/526245_1_En_1_Fig10_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-10
  prefs: []
  type: TYPE_NORMAL
- en: Search space, Tuner, and Trial
  prefs: []
  type: TYPE_NORMAL
- en: After a certain number of trials, we have a sufficient number of results that
    estimate the suitability of each parameter for an optimized model.
  prefs: []
  type: TYPE_NORMAL
- en: Black-Box Function Optimization
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s examine how NNI works by optimizing a black-box function. A black-box
    function is a function that takes input parameters and returns a value, but we
    have no idea what is going on under the function’s hood. Sometimes, we know how
    a black-box function acts and, in some cases, even know its formula. But the nature
    of this function is so complicated that the analytical study is too challenging.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_1_Chapter/526245_1_En_1_Fig11_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-11
  prefs: []
  type: TYPE_NORMAL
- en: Black-box function
  prefs: []
  type: TYPE_NORMAL
- en: When we say that we need to optimize the black-box function, it means that we
    need to find such input parameters for which the black-box function outputs the
    highest value. Let’s say that we have a black-box function, which is defined by
    the code in Listing [1-2](#PC11).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: 'Of course, the optimization problem for the function presented in Listing [1-2](#PC11)
    can be solved analytically, but let’s pretend that we do not know how the function
    acts inside the black box. All we know is that the black-box function returns
    real value and receives the following input parameters:'
  prefs: []
  type: TYPE_NORMAL
- en: '`x` positive integer from 1 to 100'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`y` positive integer from 1 to 10'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`z` float from 1 to 10 000'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s start solving our problem by defining a search space. Search space is
    defined in JSON format using special directives. We will define the search space
    using the following JSON file.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: '`quniform` directive creates a value list from `a` to `b` with step `s`. So
    the search space defined in Listing [1-3](#PC12) can be presented the following
    way:'
  prefs: []
  type: TYPE_NORMAL
- en: '`x` in [1, 2, 3, …, 99, 100]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`y` in [1, 2, 3, …, 9, 10]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`z` in [1, 1.01, 1.02, …, 9 999.99, 10 000]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: We’ll explore how to define search space in more detail in the next chapter.
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s move on to the trial definition.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: Trial receives parameter from NNI using `nni.get_next_parameter` function and
    returns the metric using `nni.report_final_result`. Trial takes NNI parameters,
    passes them to the black-box function, and returns the result. Listing [1-4](#PC13)
    has to be run by the NNI server, so you will get an error if you try to run it.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: We’ll explore how to define trial in more detail in the next chapter.
  prefs: []
  type: TYPE_NORMAL
- en: And the last thing left for us to do is to define the configuration of our experiment,
    which will look for the best input parameters for the black-box function.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: 'The experiment that we have defined in Listing [1-5](#PC14) has the following
    properties:'
  prefs: []
  type: TYPE_NORMAL
- en: Four-thread pool for trial execution.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The maximum number of trials is 1000.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Search space is defined in `search_space.json`.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Trial is executed by running `python3 trial.py`.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: NNI will use a Tuner based on genetic algorithms.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: We’ll explore how to define experiment configuration in more detail in the next
    chapter.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now everything is ready to find the input parameters that maximize the black-box
    function. Let’s run NNI:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: 'And you can monitor the experiment process in the web panel: [`http://127.0.0.1:8080`](http://127.0.0.1:8080).'
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: Typically, testing a deep learning model architecture takes about a few minutes,
    and the NNI is optimized for longer trials. Therefore, the NNI is not well suited
    for high-speed tests, and executing the value of the black-box function can take
    more time than expected. This is due to the data exchange mechanism between the
    main NNI process and its sub-processes. If you want to shorten the experiment
    execution time, change the `maxTrialNumber` parameter to `100` in ch1/bbf/config.yml.
  prefs: []
  type: TYPE_NORMAL
- en: 'After completing the experiment, you can observe the parameter that returned
    the best metric on the NNI overview page: [`http://127.0.0.1:8080/oview`](http://127.0.0.1:8080/oview).'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_1_Chapter/526245_1_En_1_Fig12_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-12
  prefs: []
  type: TYPE_NORMAL
- en: NNI best trial for black-box function optimization
  prefs: []
  type: TYPE_NORMAL
- en: We see that parameter (`x=49, y=2, z=7024.61`) is the best result of the experiment.
    The function for this parameter returns `48.02`, which is the maximum of all trials.
    Of course, we could have obtained the same result more simply, but now, we are
    introducing the basic capabilities of NNI. In the next chapters, we will see the
    full strength of this tool.
  prefs: []
  type: TYPE_NORMAL
- en: Web User Interface
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Even though NNI allows you to save trial results and later analyze them, NNI
    provides a convenient web user interface for experiment monitoring and analyzing
    its results. Let’s explore the main features of this web panel.
  prefs: []
  type: TYPE_NORMAL
- en: Overview Page
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The overview page [`http://127.0.0.1:8080/oview`](http://127.0.0.1:8080/oview)
    contains summary information about a running experiment.
  prefs: []
  type: TYPE_NORMAL
- en: The upper left panel contains information about the experiment state (Figure
    [1-13](#Fig13)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_1_Chapter/526245_1_En_1_Fig13_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-13
  prefs: []
  type: TYPE_NORMAL
- en: Experiment state panel
  prefs: []
  type: TYPE_NORMAL
- en: The lower left panel shows the number of trials performed and the running time.
    The maximum number of trials and the maximum time can be edited on the fly (Figure
    [1-14](#Fig14)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_1_Chapter/526245_1_En_1_Fig14_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-14
  prefs: []
  type: TYPE_NORMAL
- en: Trial numbers panel
  prefs: []
  type: TYPE_NORMAL
- en: The right panel on the overview page contains a summary of the top trials (Figure
    [1-15](#Fig15)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_1_Chapter/526245_1_En_1_Fig15_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-15
  prefs: []
  type: TYPE_NORMAL
- en: Top trials panel
  prefs: []
  type: TYPE_NORMAL
- en: If you just want to run an experiment and get the best test result, then you
    can only deal with the overview page. But for a more detailed analysis of the
    experiment execution, you will need the trials details page.
  prefs: []
  type: TYPE_NORMAL
- en: Trials Details Page
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The trials details page [`http://127.0.0.1:8080/detail`](http://127.0.0.1:8080/detail)
    contains a handy visualization of the trials performed. The metric panel contains
    a history of trials and their metrics. This panel becomes very useful if you toggle
    the optimization curve. Then you can observe the tuner search progress (Figure
    [1-16](#Fig16)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_1_Chapter/526245_1_En_1_Fig16_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-16
  prefs: []
  type: TYPE_NORMAL
- en: Metric panel
  prefs: []
  type: TYPE_NORMAL
- en: The hyperparameter panel contains one of the most valuable visualizations. It
    displays the relationship between the input parameters and the test metric (Figure
    [1-17](#Fig17)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_1_Chapter/526245_1_En_1_Fig17_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-17
  prefs: []
  type: TYPE_NORMAL
- en: Hyperparameter panel
  prefs: []
  type: TYPE_NORMAL
- en: This panel allows hyperparameter data mining to help you better understand the
    nature of the investigated black-box function. We will stay on this moment for
    a while. Select the top 5% trials on the hyperparameter panel (Figure [1-18](#Fig18)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_1_Chapter/526245_1_En_1_Fig18_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-18
  prefs: []
  type: TYPE_NORMAL
- en: Hyper-parameter panel. Top 5%
  prefs: []
  type: TYPE_NORMAL
- en: 'And we can get a lot of insights from Figure [1-18](#Fig18). For all top 5%
    trials, the following is true:'
  prefs: []
  type: TYPE_NORMAL
- en: '`x` is an integer less than `51`, that is, `50, 49, 48`.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`y` is even.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`z` probably does not significantly affect the black-box function return value,
    or further research may be needed.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Based on the information we obtained here, we can perform our own simplified
    search that finds the best parameter close to `48.02`, which was found during
    the NNI experiment. Let’s examine Listing [1-6](#PC16).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: Listing [1-6](#PC16) returns `(x = 50, y = 2, z = 4756.58) -> 47.96`, which
    is pretty close to the best value of `48.02` we found in our NNI experiment. The
    next chapters will demonstrate that examining the hyperparameter panel allows
    you to comprehend many key concepts of an effective deep learning model.
  prefs: []
  type: TYPE_NORMAL
- en: At the bottom of the page is the Trial list panel, which lists all trials. You
    can observe each trial’s parameters, logs, and metrics, as shown in Figure [1-19](#Fig19).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_1_Chapter/526245_1_En_1_Fig19_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-19
  prefs: []
  type: TYPE_NORMAL
- en: Trial list panel
  prefs: []
  type: TYPE_NORMAL
- en: An experiment is usually a rather lengthy process that can take days or even
    weeks. Sometimes, there may be interesting hypotheses to test. For example, it
    may be necessary to run a trial with specific parameters manually. And if you
    don’t want to wait until the end of the experiment, then you can add a custom
    trial to the queue by clicking the “Copy” button in the list of challenges. You
    can enter your trial parameters in the pop-up window and submit a trial. Figure
    [1-20](#Fig20) demonstrates how you can submit a custom trial.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_1_Chapter/526245_1_En_1_Fig20_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-20
  prefs: []
  type: TYPE_NORMAL
- en: Customized trial
  prefs: []
  type: TYPE_NORMAL
- en: NNI offers a web panel for experiments that simplifies administration and monitoring
    tasks. We will get back to it more than once in the next chapters.
  prefs: []
  type: TYPE_NORMAL
- en: NNI Command Line
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In addition to the web panel, you can use the command-line interface to manage
    the NNI and monitor its experiments. NNI has the following working directory:
    `~/nni-experiments`, where all data about experiments is stored.'
  prefs: []
  type: TYPE_NORMAL
- en: '`nnictl create --config <path_to_config>`: Starts an experiment and returns
    `<experiment_id>`. During execution, all information about the running experiment
    is saved in `~/nni-experiments/<experiment_id>`.'
  prefs: []
  type: TYPE_NORMAL
- en: '`nnictl stop`: Stops running experiment.'
  prefs: []
  type: TYPE_NORMAL
- en: '`nnictl experiment list --all`: Returns a list of all created experiments.'
  prefs: []
  type: TYPE_NORMAL
- en: '`nnictl resume <experiment_id>`: Resumes a stopped experiment. This command
    is also useful when you want to analyze the results of an already completed experiment.'
  prefs: []
  type: TYPE_NORMAL
- en: '`nnictl view <experiment_id>`: Outputs information about experiment.'
  prefs: []
  type: TYPE_NORMAL
- en: '`nnictl top`: Outputs best trials.'
  prefs: []
  type: TYPE_NORMAL
- en: For more information about NNI command-line tool, please refer to
  prefs: []
  type: TYPE_NORMAL
- en: '`nnictl --help`'
  prefs: []
  type: TYPE_NORMAL
- en: NNI Experiment Configuration
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As we saw earlier, the execution of the experiment is configured through a YAML
    file (`ch1/bbf/config.yml`). NNI allows you to configure the experiment execution
    flexibly. Table [1-2](#Tab2) lists the main configuration parameters.
  prefs: []
  type: TYPE_NORMAL
- en: Table 1-2
  prefs: []
  type: TYPE_NORMAL
- en: NNI experiment configuration settings
  prefs: []
  type: TYPE_NORMAL
- en: '| Field | Type | Description |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| `experimentName` | `str`Optional | Name of the experiment |'
  prefs: []
  type: TYPE_TB
- en: '| `searchSpaceFile` | `str`Optional | Path to the JSON file containing search
    space definition |'
  prefs: []
  type: TYPE_TB
- en: '| `searchSpace` | `YAML`Optional | Field for inline search space definitionFor
    example, search space defined in `ch1/bbf/search_space.json` can be set in `searchSpace`
    field:`searchSpace:``x:``_type: quniform``_value: [1, 100, 1]``y:``_type: quniform``_value:
    [1, 10, 1]``z:``_type: quniform``_value: [1, 10000, 0.01]` |'
  prefs: []
  type: TYPE_TB
- en: '| `trialCommand` | `str`Required | Command to execute trial. Use `python3`
    on Linux and macOS, and use `python` on Windows |'
  prefs: []
  type: TYPE_TB
- en: '| `trialCodeDirectory` | `str`OptionalDefault: `"."` | Path to trial directory
    |'
  prefs: []
  type: TYPE_TB
- en: '| `trialConcurrency` | `int` | `Number of trials to run concurrently` |'
  prefs: []
  type: TYPE_TB
- en: '| `maxExperimentDuration` | `str`Optional | Limits the experiment duration.
    Experiment duration is not limited by defaultFormat: `number + s&#124;m&#124;h&#124;d`Example:`maxExperimentDuration:
    5h` |'
  prefs: []
  type: TYPE_TB
- en: '| `maxTrialNumber` | `int`Optional | Limits the number of trials. Number of
    trials is not limited by default |'
  prefs: []
  type: TYPE_TB
- en: '| `maxTrialDuration` | `str`Optional | Limits the trial duration. Trial duration
    is not limited by default.Format: `number + s&#124;m&#124;h&#124;d`Example:`maxTrialDuration:
    30m` |'
  prefs: []
  type: TYPE_TB
- en: '| `debug` | `bool`OptionalDefault: `False` | Enables debug mode |'
  prefs: []
  type: TYPE_TB
- en: '| `tuner` | `YAML`Optional | Specifies the hyperparameter tuner. Details in
    *Chapter* [*3*](526245_1_En_3_Chapter.xhtml) |'
  prefs: []
  type: TYPE_TB
- en: '| `assessor` | `YAML`Optional | Specifies the assessor. Details in *Chapter*
    [*3*](526245_1_En_3_Chapter.xhtml) |'
  prefs: []
  type: TYPE_TB
- en: '| `advisor` | `YAML`Optional | Specifies the advisor. Details in *Chapter*
    [*3*](526245_1_En_3_Chapter.xhtml) |'
  prefs: []
  type: TYPE_TB
- en: '| `trainingService` | `YAML`Optional | Specifies the training service. Details
    in *Chapter* [*7*](526245_1_En_7_Chapter.xhtml) |'
  prefs: []
  type: TYPE_TB
- en: '| `sharedStorage` | `YAML`Optional | Specifies the shared storage. Details
    in *Chapter* [*7*](526245_1_En_7_Chapter.xhtml) |'
  prefs: []
  type: TYPE_TB
- en: 'For more details, please refer to the official documentation: [`https://nni.readthedocs.io/en/v2.7/reference/experiment_config.html`](https://nni.readthedocs.io/en/v2.7/reference/experiment_config.html).'
  prefs: []
  type: TYPE_NORMAL
- en: Embedded NNI
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Even though the capabilities of the NNI server are quite broad, the NNI can
    run in embedded mode. It is more convenient to run NNI in Python embedded mode
    in some cases. This need may arise when it is necessary to dynamically create
    experiments and have more control over the experiment execution. We will use NNI
    in embedded mode in some examples in the next chapters.
  prefs: []
  type: TYPE_NORMAL
- en: Listing [1-7](#PC17) shows an example of the execution of an experiment in embedded
    mode to optimize the black-box function we examined earlier.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: Listing [1-7](#PC17) contains an event loop that allows you to track the progress
    of your experiment automatically. Therefore, you can programmatically design experiments
    and get the best solutions for a problem.
  prefs: []
  type: TYPE_NORMAL
- en: Troubleshooting
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you experience any problems or errors launching and using NNI, you can follow
    this mini-guide to determine the issue.
  prefs: []
  type: TYPE_NORMAL
- en: '**NNI is not starting**. In this case, you’ll see the error output message
    after running `nnictl start` command, and this error message can help you fix
    the problem.'
  prefs: []
  type: TYPE_NORMAL
- en: '**NNI is starting, but you see an ERROR badge** in the overview web panel,
    as shown in Figure [1-21](#Fig21).'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_1_Chapter/526245_1_En_1_Fig21_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-21
  prefs: []
  type: TYPE_NORMAL
- en: NNI. Error badge
  prefs: []
  type: TYPE_NORMAL
- en: In this case, please check error log file in ~/nni-experiments/<experiment_id>/log/nnictl_stderr.log.
  prefs: []
  type: TYPE_NORMAL
- en: '**NNI is starting. Experiment is RUNNING, but Trials have FAILED status**,
    as shown in Figure [1-22](#Fig22).'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_1_Chapter/526245_1_En_1_Fig22_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-22
  prefs: []
  type: TYPE_NORMAL
- en: NNI. Failed Trials
  prefs: []
  type: TYPE_NORMAL
- en: In this case, check Trial logs in Trial jobs panel, as shown in Figure [1-23](#Fig23).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_1_Chapter/526245_1_En_1_Fig23_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-23
  prefs: []
  type: TYPE_NORMAL
- en: NNI. Trial logs
  prefs: []
  type: TYPE_NORMAL
- en: This mini-guide may make it easier to find and fix the NNI problem.
  prefs: []
  type: TYPE_NORMAL
- en: TensorFlow and PyTorch
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This book will apply AutoDL techniques to models implemented with **TensorFlow**
    or **PyTorch**. This book assumes that the reader has experience with one of these
    frameworks. Each chapter will provide examples of applying NNI to a model implemented
    in TensorFlow or PyTorch. Examples implemented on PyTorch or TensorFlow will not
    duplicate each other but will be close to each other. Therefore, if you are only
    a PyTorch user, you will not lose anything if you do not dive into the examples
    with TensorFlow models.
  prefs: []
  type: TYPE_NORMAL
- en: 'This book will use the following framework versions:'
  prefs: []
  type: TYPE_NORMAL
- en: '**TensorFlow**:     2.7.0'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**PyTorch**:      1.9.0'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**PyTorch Lightning**: 1.4.2'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Scikit-learn**:    0.24.1'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In any case, I recommend you to go through all examples because their concepts
    can be easily ported to your favorite deep learning framework.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this chapter, we have explored the NNI basic features. NNI is a very powerful
    toolkit for solving various AutoML tasks. And at the beginning of this chapter,
    we separately investigated the demand to apply AutoML techniques in practice.
    In the next chapter, we will begin exploring the application of the classic Hyperparameter
    Optimization (**HPO**) approach. We will study how HPO techniques can optimize
    existing architectures and create a new model design.
  prefs: []
  type: TYPE_NORMAL
