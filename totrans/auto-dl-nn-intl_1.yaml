- en: 1. Introduction to Neural Network Intelligence
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: There was a great burst of deep learning industry in the past few years. Deep
    learning approaches have achieved outstanding results in computer vision, natural
    language processing, robotics, time series forecasting, and optimal control theory.
    However, there is no “silver bullet model” to solve all kinds of problems. Each
    problem and dataset needs a specific model architecture to achieve suitable performance.
    Machine learning models, especially deep learning models, have a lot of tunable
    parameters that can drastically affect the model performance. Those are model
    design, training method, model configuration hyperparameters, etc. The model optimization
    process is performed for each application and even each dataset. Data scientists
    and machine learning experts often spend a lot of time performing manual model
    optimization. This activity can be frustrating because it takes too much time
    and is usually based on an expert’s experience and quasi-random search.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
- en: However, recent results in automated machine learning and deep learning meta-optimization
    make it possible to automate the optimizing process for a specific task. It is
    also possible to create brand new model architecture from scratch without having
    any experience solving similar problems in the past. The Neural Network Intelligence
    (**NNI**) toolkit provides the latest state-of-the-art techniques to solve the
    most challenging automated deep learning problems. We’ll start exploring the basic
    NNI features in this chapter.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: What Is Automated Deep Learning?
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Before we dive into NNI techniques, let’s talk about automated deep learning,
    examine its use cases, and why you need it. Modern machine learning models can
    contain enormous complexity in their design. Architecture can have thousands of
    adjustable parameters and connections between different neural layers. It is computationally
    impossible to test each architecture hyperparameter combination to select the
    best one. However, modern graphics processing units can already significantly
    speed up the training of machine and especially deep learning models, which means
    that many machine learning processes can be automated. Therefore, a new domain
    in machine learning has appeared called automated machine learning (**AutoML**).
    AutoML deals with tasks that automate optimal machine learning model production.
    The area of AutoML is very young and is growing rapidly. Machine learning can
    be divided into shallow learning and deep learning. Shallow learning contains
    classical methods: random forest, support vector machine, k-nearest neighbors,
    etc. In comparison, deep learning studies the construction of neural networks
    based on convolution layers, linear layers, pooling, splitting and joining connections,
    etc. Shallow learning and deep learning contain similar automated machine learning
    techniques, but their application differs significantly. Therefore, we can highlight
    a separate area of AutoML, which deals only with deep learning – this area is
    called automated deep learning (**AutoDL**). There are four main sections for
    automated deep learning:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: Hyperparameter Optimization (**HPO**)
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Neural Architecture Search (**NAS**)
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Feature Engineering
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Model Compression
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_1_Chapter/526245_1_En_1_Fig1_HTML.png)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
- en: Figure 1-1
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: AutoDL sections
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: Let’s move on and discuss what exactly we need AutoDL for.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: No Free Lunch Theorem
  id: totrans-13
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: And I want to start with the following fundamental statement, called the No
    Free Lunch (**NFL**) theorem. No Free Lunch theorem states that
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: '*Any two optimization algorithms are equivalent*'
  id: totrans-15
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*when their performance is averaged across all possible problems.*'
  id: totrans-16
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: —David Wolpert
  id: totrans-18
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Let’s elaborate NFL theorem to more functional language. Say we have a set
    of datasets: ***D***[***1***], ***D***[***2***], ***D***[***3***], ..., and the
    estimated performance of random search algorithm ***R*** on each dataset ***D***[***i***]
    equals to *r*:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: E(***R***; ***D***[***i***]) = *r*, for any *I*(1)
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: 'Then for any search algorithm ***A*** and any dataset ***D***[***i***] with
    estimation *r + q*, there is a dataset ***D***[***j***] with estimation *r - q*:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: E(**A**; **D**[**i**]) = *r* + *q*, E(**A**; **D**[**j**]) = *r* – *q*(2)
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: Statement 2 says that if algorithm ***A*** is better than random algorithm ***R***
    for dataset ***D***[***i***], then there is dataset ***D***[***j***] for which
    algorithm ***A*** will be worse than random algorithm ***R*** and E(***A***; ***D***[***i***]*)
    +* E*(****A****;* ***D***[***j***]*) = E(****R****;* ***D***[***i***]*) + E(****R****;*
    ***D***[***j***]*)*. This fact makes all algorithms equivalent if we consider
    them separately from a specific dataset and task. For example, let’s say we have
    an algorithm ***A*** for predicting the color of the next box by previous ones
    with rules listed in Table [1-1](#Tab1).
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: Table 1-1
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: Box prediction algorithm
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: '| Rule | Previous Box | Current Box | Prediction |'
  id: totrans-26
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- |'
  id: totrans-27
  prefs: []
  type: TYPE_TB
- en: '| 1 | Black | Black | White |'
  id: totrans-28
  prefs: []
  type: TYPE_TB
- en: '| 2 | Black | White | White |'
  id: totrans-29
  prefs: []
  type: TYPE_TB
- en: '| 3 | White | Black | Black |'
  id: totrans-30
  prefs: []
  type: TYPE_TB
- en: '| 4 | White | White | Black |'
  id: totrans-31
  prefs: []
  type: TYPE_TB
- en: And the prediction algorithm **A** works with 100% accuracy for dataset **D**[1],
    in which two black boxes follow two white boxes and two white boxes follow two
    black boxes, as shown in Figure [1-2](#Fig2).
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_1_Chapter/526245_1_En_1_Fig2_HTML.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
- en: Figure 1-2
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: 'Performance of prediction algorithm **A** on dataset **D**[**1**]: 100% accuracy'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: But let’s examine how algorithm **A** works on dataset **D**[**2**], in which
    white and black boxes alternate one after another one by one, as shown in Figure
    [1-3](#Fig3).
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_1_Chapter/526245_1_En_1_Fig3_HTML.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
- en: Figure 1-3
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: 'Performance of prediction algorithm **A** on dataset **D**[**2**]: 0% accuracy'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: Figure [1-3](#Fig3) demonstrates that algorithm **A** has 0% accuracy on dataset
    **D**[**2**]. This example illustrates that “there is no optimal algorithm for
    all datasets” and “there is no optimal solution for all cases.” And how does NFL
    theorem influence deep learning? Each deep learning model and each dataset generates
    a loss function that should be minimized. If we have two deep learning models,
    **M**[**1**] and **M**[**2**], then this means that they show good results only
    for certain types of problems and certain types of datasets. You cannot expect
    the same deep learning model to perform similarly on a different dataset, much
    less for a different kind of problem. So if you apply model **M**[**1**] and model
    **M**[**2**] to problem **P**[**1**] on dataset **D**[**1**], you can expect that
    model **M**[**1**] will show good performance in this case, and model **M**[**2**]
    will demonstrate poor performance. Figure [1-4](#Fig4) illustrates this point.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_1_Chapter/526245_1_En_1_Fig4_HTML.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
- en: Figure 1-4
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: Performance of model M[1] and M[2] on dataset D[1] for problem P[1]
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: But we can get the opposite results if the models are applied to a different
    problem and a different dataset as shown in Figure [1-5](#Fig5).
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_1_Chapter/526245_1_En_1_Fig5_HTML.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
- en: Figure 1-5
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: Performance of model M[1] and M[2] on dataset D[2] for problem P[2]
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: So, the NFL theorem tells us that we cannot expect a model to perform equally
    well for different cases. The slightest modification in the problem statement
    or changes in the dataset require additional model optimization for the updates.
    This fact makes the AutoDL irreplaceable in preparing an effective production-ready
    solution. It is also worth mentioning that the set of realistic datasets is much
    smaller than the set of all possible datasets, which makes it possible to determine
    a class of most suitable algorithms for solving specific problems. Nevertheless,
    the NFL theorem remains true since selecting the best algorithm for all types
    of problems is impossible.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: Injecting New Deep Learning Techniques into Existing Model
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Suppose we have a deep learning model that performs well and shows satisfactory
    results. Later, a new deep learning technique appeared that could significantly
    improve the performance of our model. It could be a special deep learning layer,
    block, cell, or a new activation function. But we do not know how exactly to inject
    that technique into the model architecture. This can be accomplished with AutoDL,
    which will make optimal use of the new technique in the current deep learning
    model design. Figure [1-6](#Fig6) illustrates this approach.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_1_Chapter/526245_1_En_1_Fig6_HTML.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
- en: Figure 1-6
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: Injecting new deep learning technique
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: This approach will help update the model with the latest advances in deep learning,
    enhancing the model’s performance.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: Adjusting Model to a New Dataset
  id: totrans-55
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s say we have a model that solves the problem of energy consumption prediction
    in New York. The model has been trained on the historical dataset and works well.
    We have decided to port this model for energy consumption prediction in Berlin.
    We expect this model to perform for Berlin as well as it performed for New York.
    But people in another country may have a little bit different habits and behaviors
    that affect the original model’s ability to capture patterns correctly. Therefore,
    it would be good to customize the original model for the new Berlin historical
    dataset. Figure [1-7](#Fig7) demonstrates how the existing model could be adapted
    to a new dataset, updating some of its hyperparameters like convolution layer
    filters, linear layer features, etc.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_1_Chapter/526245_1_En_1_Fig7_HTML.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
- en: Figure 1-7
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: Adapting model to new dataset
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: Using AutoDL techniques, you can adapt the model to other datasets.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: Creating a New Model from Scratch
  id: totrans-61
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: And this is the most exciting part. Let’s say we have a task, and there is no
    idea about the architecture of a neural network that could cope with it. We can
    borrow some ideas from other tasks, do manual investigations, study the statistical
    properties of the dataset, etc. But at the moment, there are Neural Architecture
    Search (**NAS**) methods that allow you to build a production-ready neural network
    from scratch, as shown in Figure [1-8](#Fig8).
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_1_Chapter/526245_1_En_1_Fig8_HTML.png)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
- en: Figure 1-8
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: Neural Architecture Search
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: And I find this to be a fantastic direction for further research and practical
    applications. Humanity has developed deep learning models and their training based
    on error backpropagation. Neural networks of a particular architecture can reveal
    the most complex dependencies and patterns. So why not take the next step and
    develop neural network design algorithms that will create the optimal neural network
    architecture for a specific task.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: Reinventing the Wheel
  id: totrans-67
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Many machine learning experts spend a lot of time developing existing methods
    to solve the problems described earlier. Automated machine learning techniques
    can save weeks or even months of development. Of course, automated deep learning
    cannot substitute for deep learning engineers, and human experience and intuition
    is the main driver in all inventions nowadays. But anyway, AutoDL can significantly
    decrease the amount of custom work needed. Automated deep learning should become
    a must-have tool for solving practical problems that can save significant time.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: Working with Source Code
  id: totrans-69
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'This book demonstrates many practical examples, accompanied by source code
    that can be downloaded from the following GitHub repository. This book has many
    practical examples and code listings. The chapter’s source code listings accompany
    each chapter in this book. You can download the source code from the following
    GitHub repository: [`https://github.com/Apress/automated-deep-learning-using-neural-network-intelligence`](https://github.com/Apress/automated-deep-learning-using-neural-network-intelligence).
    Most of the listings in the book are presented in source code. All commands in
    the book are run relative to the root of the source code folder.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: Neural Network Intelligence Installation
  id: totrans-71
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Neural Network Intelligence (**NNI**) is a powerful toolkit to help users solve
    AutoML. NNI manages search processes, visualizes results, and distributes AutoML
    jobs to different machine learning platforms.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
