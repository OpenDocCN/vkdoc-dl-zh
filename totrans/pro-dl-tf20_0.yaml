- en: Introduction
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 引言
- en: '*Pro Deep Learning with TensorFlow 2.0* is a practical and mathematical guide
    to deep learning using TensorFlow. Deep learning is a branch of machine learning
    where you model the world in terms of a hierarchy of concepts. This pattern of
    learning is similar to the way a human brain learns, and it allows computers to
    model complex concepts that often go unnoticed in other traditional methods of
    modeling. Hence, in the modern computing paradigm, deep learning plays a vital
    role in modeling complex real-world problems, especially by leveraging the massive
    amount of unstructured data available today.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 《*使用TensorFlow 2.0进行深度学习专业指南*》是一本实用且数学化的深度学习指南，使用TensorFlow进行深度学习。深度学习是机器学习的一个分支，其中你以概念层次结构的形式来建模世界。这种学习模式类似于人类大脑的学习方式，它允许计算机建模复杂的概念，这些概念在其他传统的建模方法中往往被忽视。因此，在现代计算范式下，深度学习在建模复杂的现实世界问题中起着至关重要的作用，尤其是在利用今天可用的海量非结构化数据方面。
- en: Because of the complexities involved in a deep-learning model, many times it
    is treated as a black box by people using it. However, to derive the maximum benefit
    from this branch of machine learning, one needs to uncover the hidden mystery
    by looking at the science and mathematics associated with it. In this book, great
    care has been taken to explain the concepts and techniques associated with deep
    learning from a mathematical as well as a scientific viewpoint. Also, the first
    chapter is totally dedicated toward building the mathematical base required to
    comprehend deep-learning concepts with ease. TensorFlow has been chosen as the
    deep-learning package because of its flexibility for research purposes and its
    ease of use. Another reason for choosing TensorFlow is its capability to load
    models with ease in a live production environment using its serving capabilities.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 由于深度学习模型涉及到的复杂性，很多时候使用它的人将其视为一个黑盒。然而，为了从这一机器学习分支中获得最大利益，需要通过观察与之相关的科学和数学来揭示隐藏的奥秘。在这本书中，我们非常注重从数学和科学的角度解释与深度学习相关的概念和技术。此外，第一章完全致力于构建轻松理解深度学习概念的数学基础。选择TensorFlow作为深度学习包的原因是它用于研究目的的灵活性以及其易用性。选择TensorFlow的另一个原因是它能够利用其服务功能轻松地在实时生产环境中加载模型。
- en: In summary, *Pro Deep Learning with TensorFlow 2.0* provides practical, hands-on
    expertise so you can learn deep learning from scratch and deploy meaningful deep-learning
    solutions. This book will allow you to get up to speed quickly using TensorFlow
    and to optimize different deep-learning architectures. All the practical aspects
    of deep learning that are relevant in any industry are emphasized in this book.
    You will be able to use the prototypes demonstrated to build new deep-learning
    applications. The code presented in the book is available in the form of iPython
    notebooks and scripts that allow you to try out examples and extend them in interesting
    ways. You will be equipped with the mathematical foundation and scientific knowledge
    to pursue research in this field and give back to the community.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，*使用TensorFlow 2.0深度学习专业指南*提供了实用的、动手的专家知识，让你可以从零开始学习深度学习并部署有意义的深度学习解决方案。本书将帮助你快速掌握TensorFlow，并优化不同的深度学习架构。本书强调了与任何行业相关的所有深度学习的实用方面。你将能够使用书中展示的原型来构建新的深度学习应用。书中提供的代码以iPython笔记本和脚本的形式提供，允许你尝试示例并以有趣的方式扩展它们。你将具备进行该领域研究并回馈社区的数学基础和科学知识。
- en: Who This Book Is For
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 适用于谁
- en: This book is for data scientists and machine-learning professionals looking
    at deep-learning solutions to solve complex business problems.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 本书面向寻求深度学习解决方案以解决复杂商业问题的数据科学家和机器学习专业人士。
- en: This book is for software developers working on deep-learning solutions through
    TensorFlow.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 本书面向通过TensorFlow开发深度学习解决方案的软件开发人员。
- en: This book is for graduate students and open source enthusiasts with a constant
    desire to learn.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 本书面向有持续学习愿望的硕士学生和开源爱好者。
- en: What You’ll Learn
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 你将学到什么
- en: 'The chapters covered in this book are as follows:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 本书涵盖的章节如下：
- en: 'Chapter [1](448418_2_En_1_Chapter.xhtml)—Mathematical Foundations: In this
    chapter, all the relevant mathematical concepts from linear algebra, probability,
    calculus, optimization, and machine-learning formulation are discussed in detail
    to lay the mathematical foundation required for deep learning. The various concepts
    are explained with a focus on their use in the fields of machine learning and
    deep learning.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 第 [1](448418_2_En_1_Chapter.xhtml) 章——数学基础：本章详细讨论了线性代数、概率、微积分、优化和机器学习公式中所有相关的数学概念，为深度学习奠定数学基础。各种概念的解释侧重于它们在机器学习和深度学习领域的应用。
- en: 'Chapter [2](448418_2_En_2_Chapter.xhtml)—Introduction to Deep-Learning Concepts
    and TensorFlow: This chapter introduces the world of deep learning and discusses
    its evolution over the years. The key building blocks of neural networks, along
    with several methods of learning, such as the Perceptron learning rule and backpropagation
    methods, are discussed in detail. Also, this chapter introduces the paradigm of
    TensorFlow coding so that readers are accustomed to the basic syntax before moving
    on to more involved implementations in TensorFlow.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 第 [2](448418_2_En_2_Chapter.xhtml) 章——深度学习概念和TensorFlow简介：本章介绍了深度学习的世界，并讨论了其多年的发展历程。详细讨论了神经网络的关键构建块，以及几种学习方法，如感知器学习规则和反向传播方法。此外，本章还介绍了TensorFlow编码范式，以便读者在进入TensorFlow的更复杂实现之前熟悉基本语法。
- en: 'Chapter [3](448418_2_En_3_Chapter.xhtml)—Convolutional Neural Networks: This
    chapter deals with convolutional neural networks used for image processing. Image
    processing is a computer vision issue that has seen a huge boost in performance
    in the areas of object recognition and detection, object classification, localization,
    and segmentation using convolutional neural networks. The chapter starts by illustrating
    the operation of convolution in detail and then moves on to the working principles
    of a convolutional neural network. Much emphasis is given to the building blocks
    of a convolutional neural network to give the reader the tools needed to experiment
    and extend their networks in interesting ways. Further, backpropagation through
    convolutional and pooling layers is discussed in detail so that the reader has
    a holistic view of the training process of convolutional networks. Also covered
    in this chapter are the properties of equivariance and translation invariance,
    which are central to the success of convolutional neural networks.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 第[3](448418_2_En_3_Chapter.xhtml)章——卷积神经网络：本章讨论了用于图像处理的卷积神经网络。图像处理是计算机视觉问题，在物体识别和检测、物体分类、定位和分割等领域，由于卷积神经网络的使用，性能得到了巨大的提升。本章首先详细说明了卷积的操作，然后转向卷积神经网络的原理。本章对卷积神经网络的构建块给予了很大重视，为读者提供了实验和以有趣方式扩展其网络的工具。此外，本章还详细讨论了通过卷积和池化层的反向传播，以便读者对卷积网络的训练过程有一个全面的了解。本章还涵盖了等变性属性和平移不变性，这些是卷积神经网络成功的关键。
- en: 'Chapter [4](448418_2_En_4_Chapter.xhtml)—Natural Language Processing: This
    chapter deals with natural language processing using deep learning. It starts
    with different vector space models for text processing; word-to-vector embedding
    models, such as the continuous bag of words method and Skip-grams; and then moves
    to much more advanced topics that involve recurrent neural networks (RNNs), LSTM,
    bidirectional RNN, and GRU. Language modeling as well as neural machine translation
    is covered in detail in this chapter to help the reader utilize these networks
    in real-world problems involving the same. Also, the mechanism of backpropagation
    in cases of RNNs and LSTM as well vanishing-gradient problems are discussed in
    much detail. This chapter also puts emphasis on the attention mechanism and how
    it fits into the powerful transformer architecture that has changed the world
    of natural language processing.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 第[4](448418_2_En_4_Chapter.xhtml)章——自然语言处理：本章讨论了使用深度学习进行自然语言处理。它从用于文本处理的不同的向量空间模型开始；如连续词袋模型和Skip-grams这样的词到向量嵌入模型；然后转向更高级的主题，包括循环神经网络（RNNs）、LSTM、双向RNN和GRU。本章详细介绍了语言模型以及神经机器翻译，以帮助读者在实际涉及相同问题的现实世界问题中利用这些网络。此外，本章还详细讨论了RNN和LSTM中的反向传播机制以及梯度消失问题。本章还强调了注意力机制以及它是如何融入改变自然语言处理世界的强大Transformer架构的。
- en: 'Chapter [5](448418_2_En_5_Chapter.xhtml)—Unsupervised Learning with Restricted
    Boltzmann Machines and Autoencoders: In this chapter, you will learn about unsupervised
    methods in deep learning that use restricted Boltzmann machines (RBMs) and autoencoders.
    Also, the chapter will touch upon Bayesian inference and Markov chain Monte Carlo
    (MCMC) methods, such as the Metropolis algorithm and Gibbs sampling, since the
    RBM training process requires some knowledge of sampling. Further, this chapter
    introduces the concepts of contrastive divergence in the context of a customized
    version of Gibbs sampling for enabling practical training of RBMs. We will further
    discuss how RBMs can be used for collaborative filtering in recommender systems
    as well as their use in unsupervised pretraining of deep-belief networks (DBNs).'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 第[5](448418_2_En_5_Chapter.xhtml)章——使用受限玻尔兹曼机和自编码器的无监督学习：在本章中，你将了解深度学习中使用的受限玻尔兹曼机（RBMs）和自编码器的无监督方法。此外，本章还将涉及贝叶斯推理和马尔可夫链蒙特卡洛（MCMC）方法，如Metropolis算法和Gibbs抽样，因为RBM的训练过程需要一些抽样的知识。进一步地，本章介绍了对比散度概念，这是在Gibbs抽样的定制版本中，为了实现RBM的实际训练而引入的。我们还将进一步讨论RBMs如何在推荐系统中的协同过滤以及它们在深度信念网络（DBNs）的无监督预训练中的应用。
- en: In the second part of the chapter, various kinds of autoencoders are covered,
    such as sparse encoders, denoising autoencoders, variational autoencoders, and
    so forth. Also, the reader will learn about how internal features learned from
    the autoencoders can be utilized for dimensionality reduction as well as for supervised
    learning. Finally, the chapter ends with a little brief on data preprocessing
    techniques, such as PCA whitening and ZCA whitening.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章的第二部分，涵盖了各种类型的自编码器，例如稀疏编码器、去噪自编码器、变分自编码器等等。此外，读者还将了解从自编码器中学习到的内部特征如何被用于降维以及监督学习。最后，本章简要介绍了数据预处理技术，如PCA白化法和ZCA白化法。
- en: 'Chapter [6](448418_2_En_6_Chapter.xhtml)—Advanced Neural Networks: In this
    chapter, the reader will learn about some of the advanced neural networks, such
    as fully convolutional neural networks, R-CNN, Fast R-CNN, Faster, U-Net, and
    so forth, that deal with semantic segmentation of images, object detection, and
    localization. This chapter also introduces the readers to traditional image segmentation
    methods so that they can combine the best of both worlds as appropriate. In the
    second half of the chapter, the reader will learn about the generative adversarial
    network (GAN), a new schema of generative model used for producing synthetic data
    like the data produced by a given distribution. GAN has usages and potential in
    several fields, such as in image generation, image inpainting, abstract reasoning,
    semantic segmentation, video generation, style transfer from one domain to another,
    and text-to-image generation applications, among others. In addition to standard
    GAN, the book introduces the theoretical concepts as well as the practical deployment
    intricacies associated with cycle consistency GAN that is used for domain translational
    problems.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 第[6](448418_2_En_6_Chapter.xhtml)章——高级神经网络：在本章中，读者将了解一些高级神经网络，例如全卷积神经网络、R-CNN、Fast
    R-CNN、Faster R-CNN、U-Net等等，它们用于处理图像的语义分割、目标检测和定位。本章还向读者介绍了传统的图像分割方法，以便他们可以根据需要结合两者的优点。在章节的后半部分，读者将了解生成对抗网络（GAN），这是一种用于生成合成数据的新架构，如给定分布产生的数据。GAN在多个领域有用途和潜力，例如图像生成、图像修复、抽象推理、语义分割、视频生成、从一个领域到另一个领域的风格迁移以及文本到图像生成应用等。除了标准的GAN之外，本书还介绍了与循环一致性GAN相关的理论概念以及其实际部署的复杂性，循环一致性GAN用于领域迁移问题。
- en: 'To summarize, the key learnings the reader can expect from this book are as
    follows:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，读者可以从本书中期待以下关键学习成果：
- en: Understand full-stack deep learning using TensorFlow and gain a solid mathematical
    foundation for deep learning.
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用TensorFlow了解全栈深度学习，并掌握深度学习的坚实数学基础。
- en: Deploy complex deep-learning solutions in production using TensorFlow.
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用TensorFlow在生产环境中部署复杂的深度学习解决方案。
- en: Carry out research on deep learning and perform experiments using TensorFlow.
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用TensorFlow进行深度学习研究并执行实验。
