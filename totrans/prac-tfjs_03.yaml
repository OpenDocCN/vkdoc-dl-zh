- en: 3. Doing k-means with ml5.js
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 3. 使用 ml5.js 进行 k-means
- en: In the last chapter, we explored the basic blocks of TensorFlow.js to design,
    implement, and build a logistic regression and a linear regression model. These
    two models are examples of supervised learning, algorithms that use datasets made
    of features and labels to learn a function that maps these features to the labels.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一章中，我们探讨了 TensorFlow.js 的基本模块，以设计、实现和构建逻辑回归和线性回归模型。这两个模型是监督学习的例子，这些算法使用由特征和标签组成的数据集来学习一个将这些特征映射到标签的函数。
- en: For our next exercise, we will leave behind the topic of supervised learning
    and introduce its counterpart, **unsupervised learning**, and its quintessential
    algorithm, **k-means**.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的下一个练习中，我们将放下监督学习的话题，引入其对立面，即 **无监督学习**，以及其典范算法，**k-means**。
- en: Here, you will write a web app that trains a k-means model with an arbitrary
    dataset and visualize its different outcomes using the visualization library **Plotly**
    . Contrary to the previous two problems where you implemented the algorithms using
    the Layers API, in this one, you will use an external library named **ml5.js**.
    This library is a higher-level abstraction of TensorFlow.js that provides a simple
    interface to access several prebuilt and ready-to-use models. This exercise is
    inspired by the k-means example featured in the ml5.js GitHub page.^([1](#Fn1))
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，你将编写一个网络应用程序，使用任意数据集训练 k-means 模型，并使用可视化库 **Plotly** 可视化其不同的结果。与之前两个问题中你使用
    Layers API 实现算法不同，在这个问题中，你将使用一个名为 **ml5.js** 的外部库。这个库是 TensorFlow.js 的高级抽象，提供了一个简单的接口来访问几个预构建和现成的模型。这个练习灵感来源于
    ml5.js GitHub 页面上展示的 k-means 示例.^([1](#Fn1))
- en: Understanding k-means
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解 k-means
- en: In a supervised learning setting, we are the teachers. Through the use of labels,
    we supervise the learning by telling the model “this is an apple,” “this is spam,”
    or “2000 steps equal 2 kilometers.” But not in unsupervised learning—here, there
    are no labels or classes. Instead, since there is no outcome, the model’s goal
    is to discover **associations** and **patterns** from the dataset’s set of features.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在监督学习环境中，我们是老师。通过使用标签，我们通过告诉模型“这是一个苹果”，“这是一封垃圾邮件”，或者“2000 步等于 2 公里”来监督学习。但在无监督学习中则不然——在这里，没有标签或类别。由于没有结果，模型的目标是从数据集的特征集中发现
    **关联** 和 **模式**。
- en: The most canonical application of unsupervised learning is **clustering** (Murphy,
    2013). This technique aims to partition a dataset into groups in such a way that
    similar data points are assigned to the same cluster while keeping those who are
    dissimilar in others. In a more mathematical language, this translates to minimizing
    the *intra-cluster distances* (also known as the pairwise dissimilarities) while
    maximizing the *inter-cluster distances* of the dissimilar points.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 无监督学习最经典的应用是 **聚类**（Murphy，2013 年）。这种技术旨在以这种方式将数据集划分为组，使得相似的数据点被分配到同一个簇中，同时保持那些不相似的数据点在其他簇中。用更数学的语言来说，这相当于在最大化不相似点的
    *簇间距离* 的同时，最小化 *簇内距离*（也称为成对不相似度）。
- en: 'A prime example of a clustering algorithm is k-means, one that groups data
    observations by dividing an unlabeled dataset into *k* clusters. k-means works
    by iteratively moving the center of the *k* clusters to minimize the total inter-cluster
    distance (Gareth et al., 2013). The algorithm does this in one initial step and
    two iterative steps that run until convergence:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: k-means 聚类算法的一个典型例子，它通过将未标记的数据集划分为 *k* 个簇来对数据观测值进行分组。k-means 通过迭代地将 *k* 个簇的中心移动到最小化总簇间距离（Gareth
    等人，2013 年）来工作。该算法通过一个初始步骤和两个迭代步骤来完成，直到收敛：
- en: 'The initial step, 0: Randomly select an initial set of *k* centers, known as
    centroids from among the data points.'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 初始步骤，0：从数据点中随机选择一个初始的 *k* 个中心，称为质心。
- en: 'Assignment step, 1: Assign each data point to its nearest center using the
    Euclidean distance as the dissimilarity criteria.'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分配步骤，1：使用欧几里得距离作为不相似度标准，将每个数据点分配到其最近中心。
- en: 'Update step, 2: For each centroid, calculate the mean of all points assigned
    to it. After that, the centroids move to the new mean value.'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更新步骤，2：对于每个质心，计算分配给它所有点的平均值。之后，质心移动到新的平均值。
- en: About ml5.js
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关于 ml5.js
- en: The ml5.js library is a high-level interface of TensorFlow.js that enables us
    to quickly train algorithms like k-means and use pre-trained and ready-to-use
    models in just a few lines of code. According to its documentation, ml5.js aims
    to democratize the use of machine learning on the Web and make it approachable
    to a wide range of users, regardless of their technical background. Because of
    its simplicity and accessibility, ml5.js is a valuable tool for building prototypes.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: ml5.js库是TensorFlow.js的高级接口，它使我们能够快速训练像k-means这样的算法，并且只需几行代码就能使用预训练和现成的模型。根据其文档，ml5.js旨在使Web上的机器学习民主化，并使其对具有各种技术背景的广泛用户都易于接近。由于其简单性和易用性，ml5.js是构建原型的一个宝贵工具。
- en: 'Now you might ask: if it is so simple and friendly, why can’t we use it all
    the time? Fair question. One answer is that being a high-level library blocks
    us from accessing all the vast functionalities and API that TensorFlow.js provides,
    which is, in my opinion, what makes it a rich framework.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你可能会问：如果它如此简单友好，为什么我们不能一直使用它呢？这是一个合理的问题。一个答案是，作为一个高级库，它阻止了我们访问TensorFlow.js提供的所有广泛的功能和API，在我看来，这正是使其成为一个丰富框架的原因。
- en: About the data
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关于数据
- en: This exercise features a synthetic dataset (it’s the last one, I promise!).
    It has 100 observations, two features, and three classes that are not explicitly
    labeled, but that we will discover once we train the model. After all, that’s
    the point of unsupervised learning.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 这个练习包含一个合成数据集（这是最后一个，我保证！）它有100个观测值，两个特征和三个未明确标记的类别，但一旦我们训练模型，我们就会发现它们。毕竟，这就是无监督学习的目的。
- en: Building the app
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建应用
- en: 'The application you will build here looks and feels similar to the ones you
    created in the previous chapter. Therefore, to avoid repeating and reading things
    we have already discussed, this tutorial will be more streamlined and less verbose
    than the last ones. This adjustment is also in part because we do not have to
    pre-process the data or define the model. Nonetheless, the methodology is still
    the same: download data, fit model, and visualize.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 你在这里将要构建的应用看起来和感觉上与上一章中创建的应用相似。因此，为了避免重复阅读我们已经讨论过的事情，这个教程将比之前的更简洁、更简洁。这种调整部分原因是因为我们不需要预处理数据或定义模型。尽管如此，方法论仍然是相同的：下载数据，拟合模型，并可视化。
- en: Setting up the workspace and the app’s HTML
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 设置工作空间和应用的HTML
- en: Let’s start. As before, create a directory in your preferred location, and launch
    a web server using the tool *http-server*. To start the server, go to the terminal
    and execute `http-server` in the app’s directory; by default, the server runs
    on port 8080\. Next, go to the code editor and create the *index.html* file. In
    this file, you will design the app’s interface and load the required libraries.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始吧。和之前一样，在你的首选位置创建一个目录，并使用工具 *http-server* 启动一个网络服务器。要启动服务器，请转到终端并在应用目录中执行
    `http-server`；默认情况下，服务器运行在端口8080上。接下来，转到代码编辑器并创建 *index.html* 文件。在这个文件中，你将设计应用界面并加载所需的库。
- en: 'At the top of the file, add the necessary `<html>`, `<head>`, and `<body>`
    tags, and inside `<head>`, add two script tags to load ml5.js and Plotly. Note
    that we are not importing TensorFlow.js because ml5.js already does it:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在文件顶部，添加必要的 `<html>`、`<head>` 和 `<body>` 标签，并在 `<head>` 内部添加两个脚本标签以加载ml5.js和Plotly。请注意，我们并没有导入TensorFlow.js，因为ml5.js已经完成了这项工作：
- en: 'Inside the `<body>` element, create a `<div>`, and inside it, create an input
    of type *range*—`<input type="range">`—(not of type number, like we did before)
    and set its `min` and `max` attributes to 1 and 4, respectively, and the `id`
    to `k-range`. This element is a slider control for entering a number that is between
    the `min` and `max` values. You will use it to enter the desired number of clusters
    *k*. Then, below the input, add a `<p>` to display the input’s value. The `<div>`
    should look like this:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 在 `<body>` 元素内部，创建一个 `<div>`，并在其中创建一个类型为 *range* 的输入——`<input type="range">`——（不是像之前那样类型为number）并设置其
    `min` 和 `max` 属性分别为1和4，`id` 设置为 `k-range`。这个元素是一个滑动控件，用于输入介于 `min` 和 `max` 值之间的数字。你将使用它来输入所需的聚类数
    *k*。然后，在输入下方添加一个 `<p>` 来显示输入的值。这个 `<div>` 应该看起来像这样：
- en: '[PRE0]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Next, you have to implement a way to get the slider’s value and update the
    paragraph’s text so that it displays the selected *k*. To achieve this, we will
    use a script tag in the HTML to write JavaScript code. This script uses `getElementById()`
    to get the slider and paragraph and sets the paragraph’s `innerHTML` property,
    aka the text, to the value assigned in the slider. However, this instruction runs
    only once. To make sure that the paragraph always shows the current *k*, you need
    an `oninput` event that executes a function every time the slider’s value changes
    (something similar to the click listener from before). In this new function, you
    will change the paragraph’s text to the slider’s value:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，您必须实现一种方法来获取滑块的价值并更新段落的文本，以便显示所选的 *k*。为了实现这一点，我们将在 HTML 中使用脚本标签来编写 JavaScript
    代码。此脚本使用 `getElementById()` 获取滑块和段落，并将段落的 `innerHTML` 属性（即文本）设置为滑块中分配的值。然而，此指令只运行一次。为了确保段落始终显示当前的
    *k*，您需要一个 `oninput` 事件，每次滑块的值改变时执行一个函数（类似于之前的点击监听器）。在这个新函数中，您将更改段落的文本为滑块的值：
- en: '[PRE1]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: After closing the script tag, add an additional `<div>` with `id` set to `button`.
    Here, the program creates the button that starts the training.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在关闭脚本标签后，添加一个额外的 `<div>`，其 `id` 设置为 `button`。在这里，程序创建了一个启动训练的按钮。
- en: 'Last, we need another `<div>` that will contain the Plotly visualization canvas
    (note that with tfjs-vis we didn’t need any) and a script tag to start *index.js*.
    The complete *index.html* file should look like this:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们需要另一个 `<div>`，它将包含 Plotly 可视化画布（注意，使用 tfjs-vis 我们甚至不需要它）和一个脚本标签来启动 *index.js*。完整的
    *index.html* 文件应该看起来像这样：
- en: '[PRE2]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: You may close *index.html* and create a new *index.js* file.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以关闭 *index.html* 并创建一个新的 *index.js* 文件。
- en: Training
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 训练
- en: The training function that fits an ml5.js k-means model is so simple and short
    that it makes the others look like the most complicated thing ever (well, they
    kind of are). It involves two statements. The first is an `options` object for
    configuring the model’s number of clusters (`k`) and the max number of iterations
    (`maxIter`). Then, there’s the call to the `kmeans` function.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 适配 ml5.js k-means 模型的训练函数非常简单且简短，以至于让其他函数看起来像是史上最复杂的事情（嗯，它们确实有点复杂）。它涉及两个语句。第一个是一个
    `options` 对象，用于配置模型的聚类数量（`k`）和最大迭代次数（`maxIter`）。然后，是调用 `kmeans` 函数。
- en: The function’s first parameter is the URL or local path to the dataset (see
    that we didn’t even have to read the dataset manually?). The second one is the
    `options` object, and the third one a callback function that is called once the
    algorithm finishes. In the next segment of the tutorial, you will create a callback
    function that visualizes the clusters once the training ends. For now, let’s simply
    write one that prints “Done.” Also, note that the `options` object is an optional
    parameter. If none is used, the model uses the default values of `k=3` and `maxIter=5`.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 函数的第一个参数是数据集的 URL 或本地路径（注意，我们甚至不需要手动读取数据集？）。第二个参数是 `options` 对象，第三个参数是一个回调函数，当算法完成后会被调用。在教程的下一段中，您将创建一个回调函数，在训练结束后可视化聚类。现在，让我们简单地写一个打印“完成。”的函数。此外，请注意，`options`
    对象是一个可选参数。如果没有使用，模型将使用默认值 `k=3` 和 `maxIter=5`。
- en: 'In the following, you will find the complete training function, named `execute`,
    and the variables `model` and `csvUrl`. If you prefer using a local version of
    the dataset, you can find a copy in the repository:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在以下内容中，您将找到完整的训练函数，名为 `execute`，以及变量 `model` 和 `csvUrl`。如果您更喜欢使用数据集的本地版本，您可以在仓库中找到一个副本：
- en: '[PRE3]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'As we did earlier, we will implement a function named `createClusterButton()`
    to create the button that initializes the training. Once clicked, the button triggers
    an event that reads the slider’s value and uses it as an argument for `execute()`:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们之前所做的那样，我们将实现一个名为 `createClusterButton()` 的函数来创建初始化训练的按钮。一旦点击，按钮将触发一个事件，读取滑块的值并将其用作
    `execute()` 的参数：
- en: '[PRE4]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'Last, create an init() function and call createClusterButton() from it. Afterward,
    call init():'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，创建一个 `init()` 函数，并从其中调用 `createClusterButton()`。之后，调用 `init()`：
- en: '[PRE5]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: To run the system, start the local web server, and go to localhost:8080\. There,
    you will see the slider, followed by its current value. Next, select the desired
    number of clusters *k* and click the “train” button. Nothing will happen or, well,
    at least nothing we can see (except the output from the callback function). In
    the next section, we’ll turn this around and visualize the data along with the
    clustering outcome.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: Visualizing the clusters
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: So far, we have been using tfjs-vis to visualize the datasets. But for this
    exercise’s visualization, we will take a step away from tfjs-vis and introduce
    **Plotly** , a high-level JavaScript library for visualization, to plot the clustering.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: 'The chart you will produce here is a scatter plot of the clustered dataset
    with each cluster represented with a predefined color and shape. The function
    that generates the plot, which we will call `visualizeResult()`, will be the model’s
    callback function that is executed when the training ends. But before getting
    there, declare the following variables at the top of *index.js*:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'These maps are to differentiate the clusters on the plot. For example, the
    data points from cluster one are shown as black circles and those from cluster
    two as green squares. Next, we will do the function `visualizeResult()`:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: To create a simple Plotly graph, you need to create *traces*, the term the library
    uses to refer to a collection of data. For this visualization, we have only one
    trace for drawing the clusters. At the beginning of the function, we iterate over
    `model.dataset`, an array of objects that contains the original dataset, plus
    an additional property named `centroid`, which indicates the data point’s cluster.
    In each iteration, we push these values to different arrays while also mapping
    the cluster number to its respective color and shape. After the loop, define the
    trace and call `Plotly.newPlot()` with the argument `'plot'` (the ID of the `<div>`)
    and the `trace` array.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: 'That’s the complete `visualizeResult()` function. Before closing the code editor
    and calling it a day, return to the `kmeans()` function, and replace the callback
    function with `visualizeResult`:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Testing the model
  id: totrans-48
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now it is time to test the model. So, head to the browser, run the app, and
    train. While at it, try all the different k’s.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: If *k* is 1 (Figure [3-1](#Fig1)), you will notice that all the points have
    the same color and shape because they belong to the same cluster. In other words,
    according to the algorithm, every observation belongs to the same class.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/494424_1_En_3_Chapter/494424_1_En_3_Fig1_HTML.jpg](../images/494424_1_En_3_Chapter/494424_1_En_3_Fig1_HTML.jpg)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
- en: Figure 3-1
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: Clustering using k=1\. Note how all the data points are clustered under the
    same cluster
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: However, we know this is not true because the dataset has three classes. Nevertheless,
    this trade-off between a small and large *k* is one of the main attributes of
    k-means. If chosen wrong, it might yield poor results. Yet, the flexibility of
    being able to control this value is also one of the key features, and we could
    also say advantages (or disadvantages, depending on your perspective) of the algorithm.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们知道这并不正确，因为数据集有三个类别。尽管如此，这种小k和大k之间的权衡是k-means的主要属性之一。如果选择不当，可能会得到较差的结果。然而，能够控制这个值的灵活性也是算法的关键特性之一，我们也可以说这是优势（或劣势，取决于你的观点）。
- en: Regarding the other values of *k*, if it is 2, you will most likely have two
    blobs under the same cluster and the remaining one as another. If it equals 3,
    you might obtain a “perfect” cluster (what is perfect in unsupervised learning,
    anyway?) where each blob is its own cluster, and if *k* is 4, you will see one
    blob containing two classes (Figure [3-2](#Fig2)).
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 关于其他k的值，如果它是2，你很可能会在同一个聚类下有两个数据块，剩下的一个作为另一个。如果等于3，你可能会得到一个“完美”的聚类（在无监督学习中，什么是完美的呢？），其中每个数据块都是自己的聚类，如果k是4，你将看到包含两个类别的数据块（图[3-2](#Fig2)）。
- en: '![../images/494424_1_En_3_Chapter/494424_1_En_3_Fig2_HTML.jpg](../images/494424_1_En_3_Chapter/494424_1_En_3_Fig2_HTML.jpg)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![../images/494424_1_En_3_Chapter/494424_1_En_3_Fig2_HTML.jpg](../images/494424_1_En_3_Chapter/494424_1_En_3_Fig2_HTML.jpg)'
- en: Figure 3-2
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-2
- en: Clustering using k=4\. The data blob on the lower-right corner is split between
    two clusters
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 使用k=4进行聚类。数据块在右下角被分为两个聚类。
- en: Recap
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 回顾
- en: In this exercise, we used the ml5.js library to fit a k-means. Compared to the
    previous examples, we saw how this library simplifies by order of magnitudes the
    procedure of creating and training a model. For example, we did not have to load
    the dataset, prepare the data, or define the model. Easy, right? However, as perfect
    as it seems, we need to understand that using such a library means losing some
    features that TensorFlow.js provides. Additional to the cluster, we introduced
    a visualization library, Plotly, to visualize them.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个练习中，我们使用了ml5.js库来拟合k-means聚类。与之前的示例相比，我们看到了这个库如何通过数量级简化创建和训练模型的过程。例如，我们不需要加载数据集、准备数据或定义模型。简单，对吧？然而，尽管看起来很完美，我们需要理解使用这样的库意味着会失去TensorFlow.js提供的一些功能。除了聚类之外，我们还引入了一个可视化库Plotly来可视化它们。
- en: Exercises
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 练习
- en: What is unsupervised learning? How does it differ from supervised learning?
  id: totrans-62
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 什么是无监督学习？它与监督学习有何不同？
- en: Name two cons and pros of ml5.js.
  id: totrans-63
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 列举ml5.js的两个优点和两个缺点。
- en: Add a slider or any input element to select the maximum number of iterations
    from the app.
  id: totrans-64
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在应用中添加一个滑块或任何输入元素来选择最大迭代次数。
- en: Fit the model using the dataset from the logistic regression and check how the
    classes found by the algorithm differ from the real ones.
  id: totrans-65
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用逻辑回归的数据集来拟合模型，并检查算法找到的类别与真实类别有何不同。
- en: 'Implement the k-means algorithm from scratch. For some inspiration, refer to
    the ml5.js implementation found here: [`https://github.com/ml5js/ml5-library/tree/development/src/KMeans`](https://github.com/ml5js/ml5-library/tree/development/src/KMeans).'
  id: totrans-66
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从头实现k-means算法。为了获得一些灵感，请参考这里找到的ml5.js实现：[`https://github.com/ml5js/ml5-library/tree/development/src/KMeans`](https://github.com/ml5js/ml5-library/tree/development/src/KMeans)。
- en: Add a third dimension to the dataset, cluster it, and visualize it with Plotly.
  id: totrans-67
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 向数据集添加一个第三维度，对其进行聚类，并使用Plotly进行可视化。
