  prefs: []
  type: TYPE_NORMAL
- en: IMAGE CLASSIFICATION
  prefs: []
  type: TYPE_NORMAL
- en: '**11.3**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Using GoogLeNet**'
  prefs: []
  type: TYPE_NORMAL
- en: '**11.3.1 Problem**'
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s compare these results to GoogLeNet. GoogLeNet is a pretrained model
    that has also been trained on a subset of the ImageNet database which is used
    in the ImageNet Large-Scale Visual Recognition Challenge (ILSVRC). The model is
    trained on more than a million images, has 144 layers (a lot more than the AlexNet),
    and can classify images into 1000 object categories.
  prefs: []
  type: TYPE_NORMAL
- en: '**11.3.2 Solution**'
  prefs: []
  type: TYPE_NORMAL
- en: Install GoogLeNet from the Add-On Explorer (try running it from the command
    line to get an install link). Load some images and test using classify.
  prefs: []
  type: TYPE_NORMAL
- en: '**11.3.3 How It Works**'
  prefs: []
  type: TYPE_NORMAL
- en: First, we load the pretrained network as in the previous recipe.
  prefs: []
  type: TYPE_NORMAL
- en: '***GoogleNetTest.m***'
  prefs: []
  type: TYPE_NORMAL
- en: '10'
  prefs: []
  type: TYPE_NORMAL
- en: '%% Load the pretrained network'
  prefs: []
  type: TYPE_NORMAL
- en: '11'
  prefs: []
  type: TYPE_NORMAL
- en: net = googlenet;
  prefs: []
  type: TYPE_NORMAL
- en: '12'
  prefs: []
  type: TYPE_NORMAL
- en: net
  prefs: []
  type: TYPE_NORMAL
- en: '% display the 144 layer network'
  prefs: []
  type: TYPE_NORMAL
- en: The net display is shown as follows. It is a different type than AlexNet, a
    DAGNetwork.
  prefs: []
  type: TYPE_NORMAL
- en: This network has its layers arranged as a directed acyclic graph; layers have
    inputs from and outputs to multiple layers.
  prefs: []
  type: TYPE_NORMAL
- en: net =
  prefs: []
  type: TYPE_NORMAL
- en: 'DAGNetwork with properties:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Layers: [144x1 nnet.cnn.layer.Layer]'
  prefs: []
  type: TYPE_NORMAL
- en: 'Connections: [170x2 table]'
  prefs: []
  type: TYPE_NORMAL
- en: Next, we test it on the image of peppers.
  prefs: []
  type: TYPE_NORMAL
- en: '***GoogleNetTest.m***'
  prefs: []
  type: TYPE_NORMAL
- en: '14'
  prefs: []
  type: TYPE_NORMAL
- en: '%% The pepper'
  prefs: []
  type: TYPE_NORMAL
- en: '15'
  prefs: []
  type: TYPE_NORMAL
- en: '% Read the image to classify'
  prefs: []
  type: TYPE_NORMAL
- en: '16'
  prefs: []
  type: TYPE_NORMAL
- en: I = imread('peppers.png');
  prefs: []
  type: TYPE_NORMAL
- en: '17'
  prefs: []
  type: TYPE_NORMAL
- en: sz = net.Layers(1).InputSize;
  prefs: []
  type: TYPE_NORMAL
- en: '18'
  prefs: []
  type: TYPE_NORMAL
- en: I = I(1:sz(1),1:sz(2),1:sz(3));
  prefs: []
  type: TYPE_NORMAL
- en: '19'
  prefs: []
