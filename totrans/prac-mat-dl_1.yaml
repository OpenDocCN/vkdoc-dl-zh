  type: TYPE_NORMAL
- en: '**9.8.1 Problem**'
  prefs: []
  type: TYPE_NORMAL
- en: We want to create and test a convolutional neural network. The neural net will
    be trained to associate images with an *x* and *y* location.
  prefs: []
  type: TYPE_NORMAL
- en: '**9.8.2 Solution**'
  prefs: []
  type: TYPE_NORMAL
- en: We create and test a convolutional neural network in TerrainNeuralNet.m. This
    will be trained on the images created earlier and will be able to return the *x*
    and *y* coordinates.
  prefs: []
  type: TYPE_NORMAL
- en: Convolutional neural networks are widely used for image identification.
  prefs: []
  type: TYPE_NORMAL
- en: '**9.8.3 How It Works**'
  prefs: []
  type: TYPE_NORMAL
- en: This example is much like the one in Chapter 3\. The difference is that each
    image is a separate category. This is like face identification where each category
    is a different person.
  prefs: []
  type: TYPE_NORMAL
