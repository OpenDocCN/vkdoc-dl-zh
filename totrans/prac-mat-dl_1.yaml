    app. We’ve already done that, and it is saved as TerrainClose64.jpg. The following
    script reads in the image and generates training images by displacing the index
    one pixel at a time. We save the images in the folder TerrainImages. We also create
    labels. Each image is a different label. For each terrain snippet, we create nN
    copies with noise. Thus, there will be nN images with the label l. We add noise
    with the code
  prefs: []
