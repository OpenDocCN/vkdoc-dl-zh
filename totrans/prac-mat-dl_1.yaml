- en: (12.16)
  prefs: []
  type: TYPE_NORMAL
- en: For the purposes of creating the neural net, we will look at orbits with the
    inclination, *i* = 0, and the ascending node, Ω = 0\. The transformation matrix
    reduces to a rotation about *z*.
  prefs: []
  type: TYPE_NORMAL
- en: ⎡
