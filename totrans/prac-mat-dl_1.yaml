- en: STOCK PREDICTION
  prefs: []
  type: TYPE_NORMAL
- en: '*S* is the stock price. *W* ( *t*) is a Brownian, random walk, process. *t*
    is the time, and *dt* is the time differential. *r* is the drift, and *σ* is the
    volatility of the stock market. Both range from zero to one. It could also be
    written in differential equation form as'
  prefs: []
  type: TYPE_NORMAL
- en: '*dS* ='
  prefs: []
  type: TYPE_NORMAL
- en: '*dW* ( *t*)'
  prefs: []
  type: TYPE_NORMAL
- en: '*r* + *σ*'
  prefs: []
  type: TYPE_NORMAL
- en: '*S*'
  prefs: []
  type: TYPE_NORMAL
- en: (10.2)
  prefs: []
  type: TYPE_NORMAL
- en: '*dt*'
  prefs: []
  type: TYPE_NORMAL
- en: '*dt*'
  prefs: []
  type: TYPE_NORMAL
- en: The solution is
  prefs: []
  type: TYPE_NORMAL
- en: '*S*( *t*) = *S*(0) *e*[( *r−* 12 *σ* 2) *t*+ *σW* ( *t*)]'
  prefs: []
  type: TYPE_NORMAL
- en: (10.3)
  prefs: []
  type: TYPE_NORMAL
- en: The following shows the code used to generate the stock trends. We use cumsum
    to sum the random numbers for the random walk. We use a Gaussian or normal distribution
    produced by randn to create the random numbers. The function can create multiple
    stocks.
  prefs: []
  type: TYPE_NORMAL
- en: '***StockPrice.m***'
  prefs: []
  type: TYPE_NORMAL
- en: '27'
  prefs: []
  type: TYPE_NORMAL
- en: '**function** [s, t] = StockPrice( s0, r, sigma, tEnd, nInt ) 28'
  prefs: []
  type: TYPE_NORMAL
- en: '29'
  prefs: []
  type: TYPE_NORMAL
- en: '**if**( **nargin** < 1 )'
  prefs: []
  type: TYPE_NORMAL
- en: '30'
  prefs: []
  type: TYPE_NORMAL
- en: Demo
  prefs: []
  type: TYPE_NORMAL
- en: '31'
  prefs: []
  type: TYPE_NORMAL
- en: '**return**'
  prefs: []
  type: TYPE_NORMAL
- en: '32'
  prefs: []
  type: TYPE_NORMAL
- en: '**end**'
  prefs: []
  type: TYPE_NORMAL
- en: '33'
  prefs: []
  type: TYPE_NORMAL
- en: '34'
  prefs: []
  type: TYPE_NORMAL
- en: delta
  prefs: []
  type: TYPE_NORMAL
- en: = tEnd/nInt;
  prefs: []
  type: TYPE_NORMAL
- en: '35'
  prefs: []
  type: TYPE_NORMAL
- en: sDelta
  prefs: []
  type: TYPE_NORMAL
- en: = **sqrt**(delta);
  prefs: []
  type: TYPE_NORMAL
- en: '36'
  prefs: []
  type: TYPE_NORMAL
- en: t
  prefs: []
  type: TYPE_NORMAL
- en: = **linspace**(0,tEnd,nInt+1);
  prefs: []
  type: TYPE_NORMAL
- en: '37'
  prefs: []
  type: TYPE_NORMAL
- en: m
  prefs: []
  type: TYPE_NORMAL
- en: = **length**(s0);
  prefs: []
  type: TYPE_NORMAL
- en: '38'
  prefs: []
  type: TYPE_NORMAL
- en: w
  prefs: []
  type: TYPE_NORMAL
- en: = [**zeros**(m,1) **cumsum**(sDelta.***randn**(m,nInt))]; 39
  prefs: []
  type: TYPE_NORMAL
- en: s
  prefs: []
  type: TYPE_NORMAL
- en: = **zeros**(1,nInt+1);
  prefs: []
  type: TYPE_NORMAL
- en: '40'
  prefs: []
  type: TYPE_NORMAL
- en: f
  prefs: []
  type: TYPE_NORMAL
- en: = r - 0.5*sigma.ˆ2;
  prefs: []
  type: TYPE_NORMAL
- en: '41'
  prefs: []
  type: TYPE_NORMAL
- en: '**for** k = 1:m'
  prefs: []
  type: TYPE_NORMAL
- en: '42'
  prefs: []
  type: TYPE_NORMAL
- en: s(k,:) = s0(k)***exp**(f(k)*t + sigma(k)*w(k,:));
  prefs: []
  type: TYPE_NORMAL
- en: '43'
  prefs: []
  type: TYPE_NORMAL
- en: '**end**'
  prefs: []
  type: TYPE_NORMAL
- en: The demo is based on the Wilshire 5000 statistics. It is an index of all US
    stocks. If you run it, you will get different values since the input is random.
  prefs: []
  type: TYPE_NORMAL
