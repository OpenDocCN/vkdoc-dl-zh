- en: rng('default')
  prefs: []
  type: TYPE_NORMAL
- en: '8'
  prefs: []
  type: TYPE_NORMAL
- en: '9'
  prefs: []
  type: TYPE_NORMAL
- en: layerSet = 'two lstm'; % 'lstm' 'bilstm' and 'two lstm' are available 10
  prefs: []
