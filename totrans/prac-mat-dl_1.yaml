- en: '**CHAPTER 10**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Stock Prediction**'
  prefs: []
  type: TYPE_NORMAL
- en: '**10.1**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Introduction**'
  prefs: []
  type: TYPE_NORMAL
- en: The goal of a stock prediction algorithm is to recommend a portfolio of stocks
    that will maximize an investor’s return. The investor has a finite amount of money
    and wants to create a portfolio to maximize her or his return on investment. The
    neural network in this chapter will predict the behavior of a portfolio of stocks
    given its history. This could then be used to select a portfolio of stocks with
    some idea of the future performance. The stock market model used in this chapter
    is based on Geometric Brownian Motion. Given that, we could do statistical analysis
    that would allow us to pick stocks. We’ll show that a neural net, which does not
    have any knowledge of the model, can do as well in modeling the stocks.
  prefs: []
  type: TYPE_NORMAL
- en: '**10.2**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Generating a Stock Market**'
  prefs: []
  type: TYPE_NORMAL
- en: '**10.2.1 Problem**'
  prefs: []
  type: TYPE_NORMAL
- en: We want to create an artificial stock market that replicates real stocks.
  prefs: []
  type: TYPE_NORMAL
- en: '**10.2.2 Solution**'
  prefs: []
  type: TYPE_NORMAL
- en: Implement Geometric Brownian Motion. This was invented by Paul Samuelson, Nobel
    Laure-ate [36].
  prefs: []
  type: TYPE_NORMAL
- en: '**10.2.3 How It Works**'
  prefs: []
  type: TYPE_NORMAL
- en: Paul Samuelson [11] created a stock model based on Geometric Brownian Motion.
    This approach produces realistic numbers and will not go negative. This is effectively
    a random walk in log space. The stochastic differential equation is
  prefs: []
  type: TYPE_NORMAL
- en: '*dS*( *t*) = *rSdt* + *σSdW* ( *t*) (10.1)'
  prefs: []
