  type: TYPE_NORMAL
- en: where *ra* is the apoapsis (apogee for the Earth) radius, or point furthest
    from the central planet, and *rp* is the periapsis radius (perigee for the Earth),
    or closest point to the planet. The eccentricity, *e*, of the orbit is
  prefs: []
  type: TYPE_NORMAL
- en: '*r*'
  prefs: []
  type: TYPE_NORMAL
- en: '*e* = *a − rp*'
  prefs: []
  type: TYPE_NORMAL
- en: '*r*'
  prefs: []
  type: TYPE_NORMAL
- en: (12.2)
  prefs: []
  type: TYPE_NORMAL
- en: '*a* + *rp*'
  prefs: []
  type: TYPE_NORMAL
- en: When *ra* = *rp*, the orbit is circular and *e* = 0\. This formula is not meaningful
    for parabolic or hyperbolic orbits. Figure [12.2](#p248) shows three angular measurements,
    *M* mean anomaly, *E*
  prefs: []
  type: TYPE_NORMAL
- en: 'eccentric anomaly, and *ν* true anomaly. All are measured from periapsis. The
    mean anomaly is related to the mean orbit rate *n* through a simple function of
    time: *M* = *M* 0 + *n*( *t − t* 0)'
  prefs: []
  type: TYPE_NORMAL
- en: (12.3)
  prefs: []
  type: TYPE_NORMAL
- en: 'The eccentric anomaly is the angle to the current position as projected onto
    the ellipse’s cir-cumscribing circle, drawn in blue. It is related to the mean
    anomaly by Kepler’s equation: *M* = *E − e* sin *E*'
  prefs: []
  type: TYPE_NORMAL
- en: (12.4)
  prefs: []
  type: TYPE_NORMAL
- en: 'This equation needs to be solved numerically in general, but for small values
    of *e*, *e <* 0 *.* 1, this approximation can be used:'
  prefs: []
  type: TYPE_NORMAL
- en: '1'
  prefs: []
  type: TYPE_NORMAL
- en: '*E ≈ M* + *e* sin *M* + *e* 2 sin 2 *M*'
  prefs: []
  type: TYPE_NORMAL
- en: '2'
  prefs: []
  type: TYPE_NORMAL
- en: (12.5)
  prefs: []
  type: TYPE_NORMAL
- en: This is because apoapsis is not well defined for very small *e*. Higher-order
    formulas can also be found. The true anomaly is related to the eccentric anomaly
    through the equation
  prefs: []
  type: TYPE_NORMAL
- en: '*ν*'
  prefs: []
  type: TYPE_NORMAL
- en: 1 + *e*
  prefs: []
  type: TYPE_NORMAL
- en: '*E*'
  prefs: []
  type: TYPE_NORMAL
- en: tan =
  prefs: []
  type: TYPE_NORMAL
- en: tan
  prefs: []
  type: TYPE_NORMAL
- en: '2'
  prefs: []
  type: TYPE_NORMAL
- en: 1 *− e*
  prefs: []
  type: TYPE_NORMAL
- en: '2'
  prefs: []
  type: TYPE_NORMAL
- en: (12.6)
  prefs: []
  type: TYPE_NORMAL
- en: Finally, the orbit radius is
  prefs: []
  type: TYPE_NORMAL
- en: '*a*(1 *− e*)(1 + *e*)'
  prefs: []
  type: TYPE_NORMAL
- en: '*r* ='
  prefs: []
  type: TYPE_NORMAL
- en: 1 + *e* cos *ν*
  prefs: []
  type: TYPE_NORMAL
- en: (12.7)
  prefs: []
  type: TYPE_NORMAL
- en: If *e >* 1 in this equation, *r* will go to *∞*, as is expected for parabolic
    or hyperbolic orbits.
  prefs: []
  type: TYPE_NORMAL
- en: Seven parameters are necessary to define an orbit of a spacecraft about a spherically
    sym-metric body. One is the gravitational parameter, generally denoted by the
    symbol *μ*. The gravitational parameter is
  prefs: []
  type: TYPE_NORMAL
- en: '*μ* = *G*( *m* 1 + *m* 2)'
  prefs: []
  type: TYPE_NORMAL
- en: (12.8)
  prefs: []
  type: TYPE_NORMAL
- en: where *m* 1 is the mass central body and *m* 2 is the mass of the orbiting body.
    *G* is the gravitational constant with units of m3/kg/s2\. For the Earth, *G*
    = 6 *.* 6774 *×* 10 *−* 11 m3/kg/s2\. *μ* for the Earth is 3.98600436 *×* 108
    m3/s2\. There are many ways of representing the other six elements. The two most
    popular sets are position and velocity ( *r* and *v*) vectors and Keplerian orbital
    elements.
  prefs: []
  type: TYPE_NORMAL
