    A conic section is a curve that fits on a cone, as shown in Figure [12.1\.](#p247)
    Two conics, a circle, and an ellipse are drawn. Hyperbolas and parabolas are also
    conic sections, but we will only look at elliptical orbits in this chapter.
  prefs: []
