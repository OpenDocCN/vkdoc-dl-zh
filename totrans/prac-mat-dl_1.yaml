- en: '**Figure 9.18:** *The aircraft path, blue, and the identified terrain segments,
    red.*'
  prefs: []
  type: TYPE_NORMAL
- en: This chapter showed how a neural network can be used to identify terrain for
    aircraft navigation. We simplified things by flying at a constant altitude, using
    a pinhole camera model with fixed image orientation, and ignoring clouds and other
    complications. We used a convolutional neural network to train the neural net
    with good results. As noted, higher-resolution images and a Kalman filter would
    produce a smoother trajectory.
  prefs: []
  type: TYPE_NORMAL
