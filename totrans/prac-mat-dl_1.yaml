- en: learning does. Remember, this is a simple model of stock prices. Both *σ* and
    *r* could also be functions of time or random variables by themselves. Of course,
    there are other stock models too! The idea here is that deep learning creates
    its internal model without a need to be told about the model underlying the observed
    data.
