- en: '37'
  prefs: []
  type: TYPE_NORMAL
- en: kPos = **find**(scorePeppers>0.01);
  prefs: []
  type: TYPE_NORMAL
- en: '38'
  prefs: []
  type: TYPE_NORMAL
- en: '[vals,kSort] = **sort**(scorePeppers(kPos),''descend'');'
  prefs: []
  type: TYPE_NORMAL
