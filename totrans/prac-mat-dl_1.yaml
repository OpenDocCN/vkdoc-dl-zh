- en: '**CHAPTER 12**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Orbit Determination**'
  prefs: []
  type: TYPE_NORMAL
- en: '**12.1**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Introduction**'
  prefs: []
  type: TYPE_NORMAL
- en: Determining orbits from measurements has been done for hundreds of years. The
    general approach is to take a series of measurements of the object from the ground
    at different times.
  prefs: []
  type: TYPE_NORMAL
- en: Possible measurements are range and range rate from the observation point or
    angles of the object from the measurement point. Given the location from where
    the measurements are taken on the Earth and this set of data, one can reconstruct
    the orbit. Ideal orbits, which assume that the Earth’s gravity is represented
    by a point mass at the center of the Earth, are conic sections.
  prefs: []
  type: TYPE_NORMAL
- en: Those that stay near the Earth are ellipses. These can be defined as a set of
    orbital elements.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we will design a neural network to find the values for two
    of the elements. Our model will be simpler than that which astronomers must use.
    We will assume that all of our orbits are in the Earth’s equatorial plane and
    that the observer is at the center of the Earth.
  prefs: []
  type: TYPE_NORMAL
- en: The purpose of this chapter is to show that a neural net can do orbit determination.
    For comparison with traditional methods, see the classic textbook from 1965 by
    Escobal [12].
  prefs: []
  type: TYPE_NORMAL
- en: '**12.2**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Generating the Orbits**'
  prefs: []
  type: TYPE_NORMAL
- en: '**12.2.1 Problem**'
  prefs: []
  type: TYPE_NORMAL
- en: We want to create a set of orbits for testing and training a neural net.
  prefs: []
  type: TYPE_NORMAL
- en: '**12.2.2 Solution**'
  prefs: []
  type: TYPE_NORMAL
- en: Implement a random orbit generator using Keplerian propagation of elements.
  prefs: []
  type: TYPE_NORMAL
- en: '**12.2.3 How It Works**'
  prefs: []
  type: TYPE_NORMAL
- en: An orbit involves at least two bodies, for example, a planet and a spacecraft.
    In the ideal two-body case, the two bodies rotate about the common center of mass,
    known as the barycenter.
  prefs: []
  type: TYPE_NORMAL
- en: For all practical spacecraft cases, the spacecraft mass itself is negligible,
    and this means that the
