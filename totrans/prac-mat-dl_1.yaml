- en: '**10.3.2 Solution**'
  prefs: []
  type: TYPE_NORMAL
- en: Use the stock price function to create 100 stocks with randomly chosen parameters.
  prefs: []
  type: TYPE_NORMAL
- en: '**10.3.3 How It Works**'
  prefs: []
  type: TYPE_NORMAL
- en: We write a function that randomly picks stock starting prices, volatility, and
    drift. It also creates random three-letter stock names. We use a half-normal distribution
    for the stock prices. This code generates the random market. We limit the drift
    to between 0 and 0.5\. This creates more stocks (for small markets) that go down.
  prefs: []
  type: TYPE_NORMAL
- en: '***StockMarket.m***'
  prefs: []
  type: TYPE_NORMAL
