- en: The stock price is shown in Figure [10.5\.](#p229) We divide the outputs into
    training and testing data, using the first 80% of the data for training. We normalize
    the data which can produce better results when data has a large range. For simplicity
    in this example, we use the same data for validation and testing, although in
    a production system these should be different.
  prefs: []
  type: TYPE_NORMAL
- en: '***StockMarketNeuralNet.m***'
  prefs: []
  type: TYPE_NORMAL
- en: '20'
  prefs: []
  type: TYPE_NORMAL
- en: '%% Divide into training and testing data'
  prefs: []
  type: TYPE_NORMAL
- en: '21'
  prefs: []
  type: TYPE_NORMAL
- en: n
  prefs: []
  type: TYPE_NORMAL
- en: = **length**(s);
  prefs: []
  type: TYPE_NORMAL
- en: '22'
  prefs: []
  type: TYPE_NORMAL
- en: nTrain
  prefs: []
  type: TYPE_NORMAL
- en: = **floor**(0.8*n);
  prefs: []
  type: TYPE_NORMAL
- en: '23'
  prefs: []
  type: TYPE_NORMAL
- en: sTrain
  prefs: []
  type: TYPE_NORMAL
- en: = s(1:nTrain);
  prefs: []
  type: TYPE_NORMAL
- en: '24'
  prefs: []
  type: TYPE_NORMAL
- en: sTest
  prefs: []
  type: TYPE_NORMAL
- en: = s(nTrain+1:n);
  prefs: []
  type: TYPE_NORMAL
- en: '25'
  prefs: []
  type: TYPE_NORMAL
- en: sVal
  prefs: []
  type: TYPE_NORMAL
- en: = sTest;
  prefs: []
  type: TYPE_NORMAL
- en: '26'
  prefs: []
  type: TYPE_NORMAL
- en: '27'
  prefs: []
  type: TYPE_NORMAL
- en: '% Normalize the training data'
  prefs: []
  type: TYPE_NORMAL
- en: '28'
  prefs: []
  type: TYPE_NORMAL
- en: mu
  prefs: []
  type: TYPE_NORMAL
- en: = **mean**(sTrain);
  prefs: []
  type: TYPE_NORMAL
- en: '29'
  prefs: []
  type: TYPE_NORMAL
- en: sigma
  prefs: []
  type: TYPE_NORMAL
- en: = **std**(sTrain);
  prefs: []
  type: TYPE_NORMAL
- en: '30'
  prefs: []
  type: TYPE_NORMAL
- en: '31'
  prefs: []
  type: TYPE_NORMAL
- en: sTrainNorm
  prefs: []
  type: TYPE_NORMAL
- en: = (sTrain-mu)/sigma; % normalize the data to zero mean
  prefs: []
  type: TYPE_NORMAL
- en: '32'
  prefs: []
  type: TYPE_NORMAL
- en: '33'
  prefs: []
  type: TYPE_NORMAL
- en: '% Normalize the test data'
  prefs: []
  type: TYPE_NORMAL
- en: '34'
  prefs: []
  type: TYPE_NORMAL
- en: sTestNorm
  prefs: []
  type: TYPE_NORMAL
- en: = (sTest - mu) / sigma;
  prefs: []
  type: TYPE_NORMAL
- en: '35'
  prefs: []
  type: TYPE_NORMAL
- en: sTest
  prefs: []
  type: TYPE_NORMAL
- en: = sTestNorm(1:**end**-1);
  prefs: []
  type: TYPE_NORMAL
- en: The next part of the script sets up and trains the network. We use the “Adam”
    method
  prefs: []
  type: TYPE_NORMAL
- en: '[20]. Adam is a first-order gradient-based optimization of stochastic objective
    functions. It is computationally efficient and works well with problems with noisy
    or sparse gradients. See the reference for more details. We have a four-layer
    network including an LSTM layer.'
