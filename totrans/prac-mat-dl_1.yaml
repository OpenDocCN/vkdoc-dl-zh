  type: TYPE_NORMAL
- en: 1\. sequenceInputLayer(inputSize) defines a sequence input layer. inputSize
    is the size of the input sequence at each time step. In our problem, the sequence
    is just the last value in the time sequence, so inputSize is 1\. You could have
    longer sequences.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. lstmLayer(numHiddenUnits) creates a Long Short-Term Memory layer. numHiddenUnits
    is the number of hidden units in the layer. The number of hidden units is the
    number of neurons in the layer.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. fullyConnectedLayer(outputSize) creates a fully connected layer with specified
    output size.
  prefs: []
  type: TYPE_NORMAL
- en: 4\. regressionLayer creates a regression output layer for a neural network.
    Regression is data fitting.
  prefs: []
  type: TYPE_NORMAL
- en: 'The learning rate starts at 0.005\. It is decreased by a factor of 0.2 every
    125 epochs in a piecewise manner using these options:'
  prefs: []
  type: TYPE_NORMAL
- en: '''InitialLearnRate'',0.005, ...'
  prefs: []
  type: TYPE_NORMAL
- en: '''LearnRateSchedule'',''piecewise'', ...'
  prefs: []
  type: TYPE_NORMAL
- en: '''LearnRateDropPeriod'',125, ...'
  prefs: []
  type: TYPE_NORMAL
- en: '''LearnRateDropFactor'',0.2, ...'
  prefs: []
  type: TYPE_NORMAL
- en: We let “patience” be inf. This means the learning will continue to the last
    epoch even if no progress is made. The training window is shown in Figure [10.7\.](#p233)
    The top plot shows the root-mean-squared error (RMSE) calculated from the data
    and the bottom plot the loss. We are also using the test data for validation.
    Note that the validation data needs to be normalized with its own mean and standard
    deviation.
  prefs: []
  type: TYPE_NORMAL
- en: The final part tests the network using predictAndUpdateState. We need to unnormalize
    the output for plotting.
  prefs: []
  type: TYPE_NORMAL
