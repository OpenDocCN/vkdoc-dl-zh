  type: TYPE_NORMAL
- en: There are many layers in this convolutional network. ReLU and softmax are the
    activation functions. In the first layer, “zero center” normalization is used.
    This means the images are normalized to have a mean of zero and a standard deviation
    of one. Two layers are new, Cross Channel Normalization and Grouped Convolution.
    Filter groups, also known as grouped convolution, were introduced with AlexNet
    in 2012\. You can think of the output of each filter as a channel and filter groups
    as groups of the channels. Filter groups allowed more efficient paralleliza-tion
    across GPUs. They also improved performance. Cross Channel Normalization normalizes
    across channels, instead of one channel at a time. We’ve discussed convolution
    in Chapter 3\.
  prefs: []
  type: TYPE_NORMAL
- en: The weights in each filter are determined during training. Dropout is a layer
    that ignores nodes, randomly, when training the weights. This prevents interdependencies
    between nodes.
  prefs: []
  type: TYPE_NORMAL
- en: For our first example, we load an image that comes with MATLAB of a set of peppers.
    This image is larger than the input size of the network, so we use the top-left
    corner of the image.
  prefs: []
  type: TYPE_NORMAL
