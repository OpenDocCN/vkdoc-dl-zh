- en: '**Figure 9.11:** *Trajectory plot.*'
  prefs: []
  type: TYPE_NORMAL
- en: The demo draws a circle over our terrain image. This is shown in Figure [9.11](#p208).
  prefs: []
  type: TYPE_NORMAL
- en: '36'
  prefs: []
  type: TYPE_NORMAL
- en: '%% PlotXYTrajectory>Demo'
  prefs: []
  type: TYPE_NORMAL
- en: '37'
  prefs: []
  type: TYPE_NORMAL
- en: '**function** Demo'
  prefs: []
  type: TYPE_NORMAL
- en: '38'
  prefs: []
  type: TYPE_NORMAL
- en: '39'
  prefs: []
  type: TYPE_NORMAL
- en: i = imread('TerrainClose.jpg');
  prefs: []
  type: TYPE_NORMAL
- en: '40'
  prefs: []
  type: TYPE_NORMAL
- en: a = **linspace**(0,2***pi**);
  prefs: []
  type: TYPE_NORMAL
- en: '41'
  prefs: []
  type: TYPE_NORMAL
- en: x = [30***cos**(a);35***cos**(a)];
  prefs: []
  type: TYPE_NORMAL
- en: '42'
  prefs: []
  type: TYPE_NORMAL
- en: y = [30***sin**(a);35***sin**(a)];
  prefs: []
  type: TYPE_NORMAL
- en: '43'
  prefs: []
  type: TYPE_NORMAL
- en: PlotXYTrajectory( x, y, i, 111, 'Trajectory' )
  prefs: []
  type: TYPE_NORMAL
- en: While the deep learning system will analyze all of the pixels in the image,
    it is interesting to see how the mean values of the pixel colors vary across an
    image. This is shown in Figure [9.12\.](#p209)
  prefs: []
  type: TYPE_NORMAL
- en: The *x*-axis is the image number, going by rows of constant y. As can be seen,
    there is considerable variation even in nearby images. This indicates that there
    is sufficient information in each image for our deep learning system to be able
    to find locations. It also shows that it might be possible just to use mean values
    to identify the location. Remember that each image varies from the previous by
    only 16 pixels.
  prefs: []
  type: TYPE_NORMAL
