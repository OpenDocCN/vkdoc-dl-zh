- en: 9. Autoencoders
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 9. 自动编码器
- en: In this chapter, we look at autoencoders. This chapter is a theoretical one,
    covering the mathematics and the fundamental concepts of autoencoders. We discuss
    what they are, what their limitations are, the typical use cases, and then look
    at some examples. We start with a general introduction to autoencoders, and we
    discuss the role of the activation function in the output layer and the loss function.
    We then discuss what the reconstruction error is. Finally, we look at typical
    applications, such as dimensionality reduction, classification, denoising, and
    anomaly detection.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将探讨自动编码器。本章是一个理论性的章节，涵盖了自动编码器的数学和基本概念。我们讨论了它们是什么，它们的局限性是什么，典型的用例，然后查看一些示例。我们从一个关于自动编码器的一般介绍开始，并讨论输出层中的激活函数和损失函数的作用。然后我们讨论重建误差是什么。最后，我们查看典型的应用，例如降维、分类、去噪和异常检测。
- en: Introduction
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 引言
- en: As you have seen in many of the previous chapters, neural networks are typically
    used in a supervised setting. Meaning that for each training observation ***x***[*i*],
    we have one label or expected value, ***y***[*i*]. During training, the neural
    network model will learn the relationship between the input data and the expected
    labels. Now suppose we have only unlabeled observations, meaning we only have
    our training dataset *S*[*T*], made of the *M* observations ***x***[*i*] with
    *i* = 1, …, *M*
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你在许多前几章中看到的，神经网络通常在监督设置中使用。这意味着对于每个训练观察值 ***x***[*i*]，我们有一个标签或期望值，***y***[*i*]。在训练过程中，神经网络模型将学习输入数据和期望标签之间的关系。现在假设我们只有未标记的观察值，这意味着我们只有我们的训练数据集
    *S*[*T*]，由 *M* 个观察值 ***x***[*i*] 组成，其中 *i* = 1, …, *M*
- en: '![$$ {S}_T=\left\{{\boldsymbol{x}}_i\ |\ i=1,\dots, M\right\}\#(9.1) $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_Equa.png)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {S}_T=\left\{{\boldsymbol{x}}_i\ |\ i=1,\dots, M\right\}\#(9.1) $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_Equa.png)'
- en: (9.1)
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: (9.1)
- en: Where in general ***x***[*i*] ∈ ℝ^(*n*) with *n* ∈ ℕ. Autoencoders were introduced^([1](#Fn1))
    by Rumelhart, Hinton, and Williams in 1986 with the goal of “learning to reconstruct
    the input observations ***x***[*i*] with the lowest error possible”.^([2](#Fn2))
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 一般情况下 ***x***[*i*] ∈ ℝ^(*n*) with *n* ∈ ℕ。自动编码器是由 Rumelhart、Hinton 和 Williams
    在 1986 年引入的^([1](#Fn1))，目的是“以尽可能低的误差学习重建输入观察值 ***x***[*i*]”。^([2](#Fn2))
- en: Why would you want to learn to reconstruct the input observations? If you have
    problems imagining what that means, think of having a dataset made of images.
    An autoencoder is an algorithm that can give as output an image that is as similar
    as possible to the input one. You may be confused, as there is no apparent reason
    to do this. To better understand why autoencoders are useful, we need a more informative
    (although not fully unambiguous) definition.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么你想学习重建输入观察值？如果你难以想象这意味着什么，想想由图像组成的数据库。自动编码器是一种算法，可以输出与输入图像尽可能相似的画面。你可能感到困惑，因为没有明显的理由去做这件事。为了更好地理解自动编码器的有用性，我们需要一个更信息化的（尽管不是完全无歧义的）定义。
- en: An autoencoder is a type of algorithm with the primary purpose of learning an
    “informative” representation of the data that can be used for different applications^([3](#Fn3))
    by learning to reconstruct a set of input observations well enough.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 自动编码器是一种算法，其主要目的是通过学习足够好地重建一组输入观察值的方式来学习数据的“信息性”表示，以便用于不同的应用^([3](#Fn3))。
- en: To better understand autoencoders, we need to refer to their typical architecture,
    visualized in Figure [9-1](#Fig1). The autoencoders’ main components are an encoder,
    a latent feature representation, and a decoder. The encoder and decoder are simply
    functions, while the *latent feature representation* typically means a tensor
    of real numbers (more on that later). Generally speaking, we want the autoencoder
    to reconstruct the input well enough. Still, at the same time, it should create
    a latent representation (the output of the encoder part in Figure [9-1](#Fig1))
    that is useful and meaningful.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更好地理解自动编码器，我们需要参考它们的典型架构，如图 [9-1](#Fig1) 所示。自动编码器的主要组件包括一个编码器、一个潜在特征表示和一个解码器。编码器和解码器仅仅是函数，而*潜在特征表示*通常意味着一个实数张量（关于这一点稍后会有更多介绍）。一般来说，我们希望自动编码器能够很好地重建输入。同时，它应该创建一个有用的和有意义的潜在表示（如图
    [9-1](#Fig1) 中编码器部分的输出）。
- en: For example, latent features on handwritten digits^([4](#Fn4)) could be the
    number of lines required to write each number or the angle of each line and how
    they connect. Learning how to write numbers certainly does not require learning
    the gray values of each pixel in the input image. We humans do not learn to write
    by filling in pixels with gray values. While learning, we extract the essential
    information that will allow us to solve a problem (writing digits, for example).
    This latent representation (*how* to write each number) can then be very useful
    for various tasks (for instance, feature extraction that can be then used for
    classification or clustering) or simply for understanding the essential features
    of a dataset.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，手写数字上的潜在特征^([4](#Fn4))可能是写每个数字所需的线条数量或每条线的角度以及它们如何连接。学习如何写数字当然不需要学习输入图像中每个像素的灰度值。我们人类不是通过填充像素的灰度值来学习写字的。在学习过程中，我们提取出将允许我们解决问题（例如写数字）的基本信息。这种潜在表示（*如何*写每个数字）对于各种任务（例如，可以用于分类或聚类的特征提取）或简单地理解数据集的基本特征非常有用。
- en: '![](../images/463356_2_En_9_Chapter/463356_2_En_9_Fig1_HTML.jpg)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![image](../images/463356_2_En_9_Chapter/463356_2_En_9_Fig1_HTML.jpg)'
- en: Figure 9-1
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-1
- en: The general structure of an autoencoder
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 自动编码器的一般结构
- en: In most typical architectures, the encoder and the decoder are neural networks^([5](#Fn5))
    (that is the case we will discuss at length in this chapter) since they can be
    easily trained with existing software libraries such as TensorFlow or PyTorch
    with backpropagation.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在大多数典型架构中，编码器和解码器都是神经网络^([5](#Fn5))（这是我们将在本章详细讨论的情况），因为它们可以用现有的软件库（如 TensorFlow
    或 PyTorch）通过反向传播轻松训练。
- en: In general, the encoder can be written as a function *g* that will depend on
    some parameters
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，编码器可以表示为一个依赖于某些参数的函数 *g*。
- en: '![$$ {\boldsymbol{h}}_i=g\left({\boldsymbol{x}}_i\right) $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_Equb.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![h_i=g(x_i)](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_Equb.png)'
- en: Where ***h***[*i*] ∈ ℝ^(*q*) (the latent feature representation) is the output
    of the encoder block in Figure [9-1](#Fig1), when we evaluate it on the input
    ***x***[*i*]. Note that we will have *g* : ℝ^(*n*) → ℝ^(*q*).
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '其中 ***h***[*i*] ∈ ℝ^(*q*)（潜在特征表示）是图 [9-1](#Fig1) 中编码器块在评估输入 ***x***[*i*] 时的输出。请注意，我们将有
    *g* : ℝ^(*n*) → ℝ^(*q*)。'
- en: The decoder (and the output of the network that we indicate with ![$$ {\overset{\sim
    }{\boldsymbol{x}}}_i $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq1.png))
    can be written then as a second generic function *f* of the latent features
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 解码器（以及我们用 ![x̃i](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq1.png)
    表示的网络输出）可以表示为潜在特征的第二个通用函数 *f*。
- en: '![$$ {\overset{\sim }{\boldsymbol{x}}}_i=f\left({\boldsymbol{h}}_i\right)=f\left(g\left({\boldsymbol{x}}_i\right)\right).
    $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_Equc.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![x̃i=f(h_i)=f(g(x_i)).](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_Equc.png)'
- en: Where ![$$ {\overset{\sim }{\boldsymbol{x}}}_i\boldsymbol{\in}{\mathbb{R}}^n
    $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq2.png). Training
    an autoencoder simply means finding the functions *g*(·) and *f*(·) that satisfy
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 ![x̃i∈ℝ^n](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq2.png)。训练自动编码器简单地说就是找到满足以下条件的函数
    *g*(·) 和 *f*(·)。
- en: '![$$ \arg {\min}_{f,g}&lt;\left[\Delta \Big({\boldsymbol{x}}_i,f\left(g\left({\boldsymbol{x}}_i\right)\right)\right]&gt;
    $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_Equd.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![arg min_f,g<Δ[({x}_i,f(g({x}_i)))]](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_Equd.png)'
- en: 'Where Δ indicates a measure of how the input and output of the autoencoder
    differ (basically our loss function will penalize the difference between the input
    and output) and < · > indicates the average over all observations. Depending on
    how you design the autoencoder, it may be possible to find *f* and *g* so that
    the autoencoder learns to reconstruct the output perfectly, thus learning the
    identity function. This is not very useful, as we discussed at the beginning of
    the chapter, and to avoid this possibility, two main strategies can be used: creating
    a bottleneck and adding regularization in some form.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 Δ 表示自编码器的输入和输出之间的差异程度（基本上我们的损失函数将惩罚输入和输出之间的差异）并且 < · > 表示对所有观察值的平均。根据你如何设计自编码器，可能找到
    *f* 和 *g* 使得自编码器能够完美地重建输出，从而学习到恒等函数。这并不很有用，正如我们在本章开头所讨论的，为了避免这种情况，可以使用两种主要策略：创建瓶颈和以某种形式添加正则化。
- en: Note
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: We want the autoencoder to reconstruct the input well enough. Still, at the
    same time, it should create a latent representation (the output of the encoder)
    that is useful and meaningful.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望自编码器能够很好地重建输入。同时，它应该创建一个有用的潜在表示（编码器的输出），并且是有意义的。
- en: Adding a “bottleneck,” (more on that later) is achieved by making the latent
    feature’s dimensionality lower (often much lower) than the input’s. That is the
    case that we look at in detail in this chapter. But before looking at this case,
    let’s briefly discuss regularization.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 添加一个“瓶颈”（关于这一点稍后会有更多讨论）是通过使潜在特征的维度低于输入的维度来实现的（通常要低得多）。这就是我们在本章中详细探讨的情况。但在探讨这个情况之前，让我们简要地讨论一下正则化。
- en: Regularization in Autoencoders
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 自编码器中的正则化
- en: 'We will not discuss regularization at length in this chapter, but we should
    at least mention it. This means enforcing sparsity in the latent feature output.
    The simplest way of achieving this is to add a *ℓ*[1] or *ℓ*[2] regularization
    term to the loss function. That will look like this for the *ℓ*[2] regularization
    term:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在本章中不会详细讨论正则化，但我们至少应该提到它。这意味着强制潜在特征输出稀疏。实现这一点的最简单方法是在损失函数中添加一个 *ℓ*[1] 或 *ℓ*[2]
    正则化项。对于 *ℓ*[2] 正则化项，它看起来是这样的：
- en: '![$$ \arg {\min}_{f,g}\left(\mathbbm{E}\left[\Delta \Big({\boldsymbol{x}}_i,g\left(f\left({\boldsymbol{x}}_i\right)\right)\right]+\lambda
    \sum \limits_i{\theta}_i^2\right) $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_Eque.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \arg {\min}_{f,g}\left(\mathbbm{E}\left[\Delta \Big({\boldsymbol{x}}_i,g\left(f\left({\boldsymbol{x}}_i\right)\right)\right]+\lambda
    \sum \limits_i{\theta}_i^2\right) $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_Eque.png)'
- en: 'In the formula, the *θ*[*i*] are the parameters in the functions *f*(·) and
    *g*(·) (you can imagine that in the case where the functions are neural networks,
    the parameters will be the weights). This is typically easy to implement, because
    the derivative with respect to the parameters is easy to calculate. Another trick
    that is worth mentioning is to tie the weights of the encoder to the weights of
    the decoder^([6](#Fn6)) (in other words, make them equal). Those techniques, and
    a few others that go beyond the scope of this book, have fundamentally the same
    effect: to add sparsity to the latent feature representation.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在公式中，*θ*[*i*] 是函数 *f*(·) 和 *g*(·) 中的参数（你可以想象，在函数是神经网络的情况下，参数将是权重）。这通常很容易实现，因为相对于参数的导数很容易计算。另一个值得提到的技巧是将编码器的权重与解码器的权重^([6](#Fn6))
    相关联（换句话说，使它们相等）。这些技术，以及一些超出本书范围的其它技术，具有根本相同的效果：向潜在特征表示中添加稀疏性。
- en: 'We turn now to a specific type of autoencoders: those that build *f* and *g*
    with feed-forward networks that use a bottleneck. The reason for this choice is
    that they are very easy to implement and are very effective.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在转向一种特定的自编码器类型：那些使用具有瓶颈的前馈网络来构建 *f* 和 *g* 的自编码器。选择这种方案的原因是它们非常容易实现，并且非常有效。
- en: Feed-Forward Autoencoders
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 前馈自编码器
- en: A Feed-Forward Autoencoder (FFA) is a neural network made of dense layers^([7](#Fn7))
    with a specific architecture, as shown in Figure [9-2](#Fig2).
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 前馈自编码器（FFA）是一种具有特定架构的神经网络，由密集层^([7](#Fn7)) 组成，如图 [9-2](#Fig2) 所示。
- en: '![](../images/463356_2_En_9_Chapter/463356_2_En_9_Fig2_HTML.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/463356_2_En_9_Chapter/463356_2_En_9_Fig2_HTML.png)'
- en: Figure 9-2
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-2
- en: A typical architecture of a Feed-Forward Autoencoder. The number of neurons
    in the layers at first goes down as we move through the network, until it reaches
    the middle and then starts to grow again, until the last layer has the same number
    of neurons as the input dimensions
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 前馈自动编码器的典型架构。随着我们通过网络移动，层的神经元数量最初会减少，直到达到中间层然后再次开始增加，直到最后一层具有与输入维度相同的神经元数量
- en: A typical FFA architecture (although it’s not mandatory) has an odd number of
    layers and is symmetrical with respect to the middle layer. Typically, the first
    layer has a number of neurons *n*[1] = *n* (the size of the input observation
    ***x***[***i***]). As we move toward the center of the network, the number of
    neurons in each layer drops in some measure. The middle layer (remember we have
    an odd number of layers) usually has the smallest number of neurons. The fact
    that the number of neurons in this layer is smaller than the size of the input
    is the *bottleneck* mentioned earlier.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 典型的 FFA 架构（尽管不是强制性的）具有奇数个层，并且相对于中间层是对称的。通常，第一层具有的神经元数量 *n*[1] = *n*（输入观察 ***x***[***i***]
    的大小）。当我们向网络的中心移动时，每层的神经元数量在某种程度上会减少。中间层（记住我们有一个奇数个层）通常具有最少的神经元数量。这个层中神经元数量小于输入大小的事实是前面提到的
    *瓶颈*。
- en: 'In almost all practical applications, the layers after the middle one are a
    mirrored version of the layers before the middle one. For example, an autoencoder
    with three layers could have the following numbers of neurons: *n*[1] = 10, *n*[2] = 5
    and then *n*[3] = *n*[1] = 10 (supposing we are working on a problem where the
    input dimension is *n* = 10). All the layers, up to and including the middle one,
    make what is called the *encoder*, and all the layers from and including the middle
    one (up to the output) make what is called the ***decoder*** , as you can see
    in Figure [9-2](#Fig2). If the FFA training is successful, the result will be
    a good approximation of the input, in other words ![$$ {\overset{\sim }{\boldsymbol{x}}}_i\approx
    {\boldsymbol{x}}_i $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq3.png).
    What is essential to notice is that the decoder can reconstruct the input by using
    only a much smaller number (*q*) of features than the input observations initially
    have (*n*). The output of the middle layer ***h***[***i***] is also called a *learned
    representation* of the input observation ***x***[*i*].'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在几乎所有实际应用中，中间层之后的层是中间层之前层的镜像版本。例如，一个具有三层自动编码器可能具有以下神经元数量：*n*[1] = 10, *n*[2]
    = 5，然后 *n*[3] = *n*[1] = 10（假设我们在处理一个输入维度为 *n* = 10 的问题）。所有这些层，包括中间层，构成了所谓的 *编码器*，而从中间层开始（包括输出层）的所有层构成了所谓的
    ***解码器***，如图 [9-2](#Fig2) 所示。如果 FFA 训练成功，结果将是对输入的良好近似，换句话说 ![$$ {\overset{\sim
    }{\boldsymbol{x}}}_i\approx {\boldsymbol{x}}_i $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq3.png)。重要的是要注意，解码器可以使用比初始观察到的输入特征数量（*n*）少得多的特征数量（*q*）来重建输入。中间层的输出
    ***h***[***i***] 也被称为输入观察 ***x***[*i*] 的 *学习表示*。
- en: Note
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: The *encoder* can reduce the number of dimensions of the input observation (*n*)
    and create a learned representation (***h***[***i***]) of the input that has a
    smaller dimension *q* < *n*. This learned representation is enough for the decoder
    to reconstruct the input accurately (if the autoencoder training was successful
    as intended).
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '*编码器* 可以减少输入观察的维度 (*n*) 并创建一个较小的维度 *q* < *n* 的输入学习表示（***h***[***i***]）。这个学习表示足以让解码器准确地重建输入（如果自动编码器训练按预期成功）。'
- en: Activation Function of the Output Layer
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 输出层的激活函数
- en: In autoencoders based on neural networks, the output layer’s activation function
    plays a particularly important role. The most used functions are ReLU and sigmoid.
    Let’s look at both and see some tips on when to use which as well as why you should
    choose one instead of the other.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在基于神经网络的自动编码器中，输出层的激活函数起着特别重要的作用。最常用的函数是 ReLU 和 sigmoid。让我们看看这两个函数，并了解何时使用哪一个以及为什么应该选择一个而不是另一个。
- en: ReLU
  id: totrans-42
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: ReLU
- en: The *ReLU* activation function can assume all values in the range [0, ∞]. As
    a reminder, its formula is
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '*ReLU* 激活函数可以取 [0, ∞] 范围内的所有值。作为提醒，其公式是'
- en: '![$$ ReLU(x)=\max \left(0,x\right). $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_Equf.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![ReLU(x)=max(0,x)](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_Equf.png)'
- en: It’s a good choice when the input observations ***x***[*i*] assume a wide range
    of positive values.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 当输入观察 ***x***[*i*] 假设一个广泛的正值范围时，这是一个好的选择。
- en: If the input ***x***[*i*] can assume negative values, the ReLU is a terrible
    choice, and the identity function is a much better choice.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 如果输入 ***x***[*i*] 可以取负值，ReLU 激活函数是一个糟糕的选择，而恒等函数则是一个更好的选择。
- en: Note
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: The ReLU activation function for the output layer is well suited for cases when
    the input observations ***x***[*i*] assume a wide range of positive, real values.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 对于输出层，ReLU 激活函数非常适合输入观测值 ***x***[*i*] 假设了广泛的正实数值范围的情况。
- en: Sigmoid
  id: totrans-49
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: Sigmoid
- en: The sigmoid function *σ* can assume all values in the range ]0, 1[. As a reminder,
    its formula is
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: Sigmoid 函数 *σ* 可以取 ]0, 1[ 范围内的所有值。作为提醒，它的公式是
- en: '![$$ \sigma (x)=\frac{1}{1+{e}^{-x}}. $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_Equg.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \sigma (x)=\frac{1}{1+{e}^{-x}}. $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_Equg.png)'
- en: This activation function can only be used if the input observations ***x***[*i*]
    are all in the range ]0, 1[ or if you have normalized them to be in that range.
    Consider as an example the MNIST dataset. Each value of the input observation
    ***x***[*i*] (one image) represents the gray values of the pixels that can assume
    any value from 0 to 255\. Normalizing the data by dividing the pixel values by
    255 would make each observation (each image) have only pixel values between 0
    and 1\. In this case, the sigmoid would be a good choice for the output layer’s
    activation function.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 这个激活函数只能在输入观测值 ***x***[*i*] 都在 ]0, 1[ 范围内，或者如果你已经将它们归一化到这个范围内时使用。以 MNIST 数据集为例。输入观测值
    ***x***[*i*]（一个图像）的每个值代表像素的灰度值，这些像素可以取从 0 到 255 的任何值。通过将像素值除以 255 归一化数据，会使每个观测值（每个图像）只有像素值在
    0 到 1 之间。在这种情况下，Sigmoid 将是输出层激活函数的一个很好的选择。
- en: Note
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: The sigmoid activation function for the output layer is a good choice in all
    cases where the input observations assume only values between 0 and 1 or if you
    have normalized them to assume values in the range ]0, 1[.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 对于输出层，使用 Sigmoid 激活函数在所有情况下都是一个好的选择，其中输入观测值只取 0 到 1 之间的值，或者如果你已经将它们归一化，使其取值在
    ]0, 1[ 范围内。
- en: The Loss Function
  id: totrans-55
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 损失函数
- en: As with any neural network model, we need to minimize a loss function. This
    loss functions should measure the difference between the input ***x***[*i*] and
    output ![$$ {\overset{\sim }{\boldsymbol{x}}}_i $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq4.png).
    If you remember the explanations at the beginning, you will realize that this
    loss function will be
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 与任何神经网络模型一样，我们需要最小化损失函数。这个损失函数应该衡量输入 ***x***[*i*] 和输出 ![$$ {\overset{\sim }{\boldsymbol{x}}}_i
    $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq4.png) 之间的差异。如果你还记得开头的解释，你会意识到这个损失函数将是
- en: '![$$ \mathbbm{E}\left[\Delta \Big({\boldsymbol{x}}_i,g\left(f\left({\boldsymbol{x}}_i\right)\right)\right].
    $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_Equh.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \mathbbm{E}\left[\Delta \Big({\boldsymbol{x}}_i,g\left(f\left({\boldsymbol{x}}_i\right)\right)\right].
    $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_Equh.png)'
- en: 'Where for FFAs, *g*, and *f* will be the functions that are obtained with dense
    layers, as discussed in the previous sections. Remember that an autoencoder is
    trying to learn an approximation of the identity function; therefore, you want
    to find the weights in the network that give you the smallest difference according
    to some metric (Δ(·)) between ***x***[*i*] and ![$$ {\overset{\sim }{\boldsymbol{x}}}_i
    $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq5.png). Two loss
    functions are widely used for autoencoders: Mean Squared Error (MSE) and Binary
    Cross-Entropy (BCE). Let’s look more in-depth at both since they can only be used
    when specific requirements are met.'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 对于全连接神经网络（FFAs），*g* 和 *f* 将是前几节讨论中获得的密集层函数。记住，自动编码器试图学习恒等函数的近似；因此，你希望找到网络中的权重，使得根据某些度量（Δ(·)）在
    ***x***[*i*] 和 ![$$ {\overset{\sim }{\boldsymbol{x}}}_i $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq5.png)
    之间的差异最小。自动编码器广泛使用的两个损失函数是均方误差（MSE）和二元交叉熵（BCE）。让我们更深入地了解这两个函数，因为它们只能在满足特定要求时使用。
- en: Mean Square Error
  id: totrans-59
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 均方误差
- en: 'Since an autoencoder is trying to solve a regression problem, the most common
    choice for the loss function is the Mean Square Error (MSE):'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 由于自动编码器试图解决回归问题，最常用的损失函数是均方误差（MSE）：
- en: '![$$ {L}_{MSE}= MSE=\frac{1}{M}\sum \limits_{i=1}^M{\left|{\boldsymbol{x}}_i-{\overset{\sim
    }{\boldsymbol{x}}}_i\right|}^2 $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_Equi.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {L}_{MSE}= MSE=\frac{1}{M}\sum \limits_{i=1}^M{\left|{\boldsymbol{x}}_i-{\overset{\sim
    }{\boldsymbol{x}}}_i\right|}^2 $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_Equi.png)'
- en: The symbol ∣ · ∣ indicates the norm of a vector,^([8](#Fn8)) and *M* is the
    number of the observations in the training dataset. It can be used in almost all
    cases, independently of how you choose your output layer activation function or
    how you normalize the input data.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 符号 ∣ · ∣ 表示向量的范数^([8](#Fn8))，而 *M* 是训练数据集中观测值的数量。它几乎可以用在所有情况下，独立于你如何选择输出层激活函数或如何归一化输入数据。
- en: It is easy to show that the minimum of *L*[*MSE*] is found for ![$$ {\overset{\sim
    }{\boldsymbol{x}}}_i={\boldsymbol{x}}_i $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq6.png).
    To prove it, let’s calculate the derivative of *L*[*MSE*] with respect to a specific
    observation, *j*. Remember that the minimum is found when this condition
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 很容易证明 *L*[*MSE*] 的最小值是在 ![$$ {\overset{\sim }{\boldsymbol{x}}}_i={\boldsymbol{x}}_i
    $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq6.png) 时找到的。为了证明这一点，让我们计算
    *L*[*MSE*] 关于特定观测值 *j* 的导数。记住，当这个条件
- en: '![](../images/463356_2_En_9_Chapter/463356_2_En_9_Figa_HTML.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/463356_2_En_9_Chapter/463356_2_En_9_Figa_HTML.png)'
- en: is met for all *i* = 1, …, *M*. To simplify the calculations, let’s assume that
    the inputs are one dimensional^([9](#Fn9)) and let’s indicate them with *x*[*i*].
    We can write
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 是满足的。为了简化计算，让我们假设输入是一维的^([9](#Fn9))，并用 *x*[*i*] 来表示它们。我们可以写出
- en: '![](../images/463356_2_En_9_Chapter/463356_2_En_9_Figb_HTML.png)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/463356_2_En_9_Chapter/463356_2_En_9_Figb_HTML.png)'
- en: Equation (9.2) is satisfied when ![$$ {x}_j=\tilde{x}_{j} $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq7.png)
    as can be easily seen, as we wanted to prove. To be precise, we also need to show
    that
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 当 ![$$ {x}_j=\tilde{x}_{j} $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq7.png)
    时，方程 (9.2) 成立，这很容易看出，正如我们想要证明的那样。为了更精确，我们还需要证明对于所有 *i* = 1, …, *M*，条件
- en: '![$$ \frac{\partial^2{L}_{MSE}}{\partial \tilde{x}_{j}^2}&gt;0 $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_Equl.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \frac{\partial^2{L}_{MSE}}{\partial \tilde{x}_{j}^2}&gt;0 $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_Equl.png)'
- en: This is easily proved as we have
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 这很容易证明，因为我们有
- en: '![$$ \frac{\partial^2{L}_{MSE}}{\partial \tilde{x}_{j}^2}=\frac{2}{M} $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_Equm.png)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \frac{\partial^2{L}_{MSE}}{\partial \tilde{x}_{j}^2}=\frac{2}{M} $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_Equm.png)'
- en: This is greater than zero, therefore confirming our assumption that for ![$$
    {x}_j=\tilde{x}_{j} $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq8.png)
    we indeed have a minimum.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 这大于零，因此证实了我们的假设，即对于 ![$$ {x}_j=\tilde{x}_{j} $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq8.png)
    我们确实有一个最小值。
- en: Binary Cross-Entropy
  id: totrans-72
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 二进制交叉熵
- en: If the activation function of the output layer of the FFA is a sigmoid function,
    thus limiting neuron outputs to be between 0 and 1, and the input features are
    normalized to be between 0 and 1, we can use the binary cross-entropy as a loss
    function, indicated here with *L*[*CE*]. Note that this loss function is typically
    used in classification problems, but it works beautifully for autoencoders. The
    formula for it is
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 如果 FFA 输出层的激活函数是 sigmoid 函数，从而限制神经元输出在 0 和 1 之间，并且输入特征被归一化到 0 和 1 之间，我们可以使用二进制交叉熵作为损失函数，这里用
    *L*[*CE*] 表示。请注意，这个损失函数通常用于分类问题，但它对于自编码器工作得非常好。它的公式是
- en: '![](../images/463356_2_En_9_Chapter/463356_2_En_9_Figc_HTML.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/463356_2_En_9_Chapter/463356_2_En_9_Figc_HTML.png)'
- en: Where *x*[*j*, *i*] is the *j*^(*th*) component of the *i*^(*th*) observation.
    The sum is over the entire set of observations and over all the components of
    the vectors. Can we prove that minimizing this loss function is equivalent to
    reconstructing the input as well as possible? Let’s calculate where *L*[*CE*]
    has a minimum with respect to ![$$ {\overset{\sim }{\boldsymbol{x}}}_i $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq9.png).
    In other words, we need to find out which values should ![$$ {\overset{\sim }{\boldsymbol{x}}}_i
    $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq10.png) assume
    to minimize *L*[*CE*]. As we have done for the MSE, to make the calculations easier,
    let’s consider the simplified case where ***x***[*i*] and ![$$ {\overset{\sim
    }{\boldsymbol{x}}}_i $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq11.png)
    are one-dimensional and let’s indicate them with *x*[*i*] and ![$$ \tilde{x}_{i}
    $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq12.png).
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *x*[*j*, *i*] 是 *i*^(*th*) 次观察的 *j*^(*th*) 个分量。求和是整个观察集以及向量的所有分量。我们能否证明最小化这个损失函数等同于尽可能重建输入？让我们计算
    *L*[*CE*] 关于 ![$$ {\overset{\sim }{\boldsymbol{x}}}_i $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq9.png)
    的最小值。换句话说，我们需要找出 ![$$ {\overset{\sim }{\boldsymbol{x}}}_i $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq10.png)
    应该取哪些值以最小化 *L*[*CE*]。正如我们对 MSE 所做的那样，为了使计算更简单，让我们考虑 ***x***[*i*] 和 ![$$ {\overset{\sim
    }{\boldsymbol{x}}}_i $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq11.png)
    是一维的情况，并用 *x*[*i*] 和 ![$$ \tilde{x}_{i} $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq12.png)
    来表示它们。
- en: To find the minimum of a function, as you should know from calculus, we need
    the first derivative of *L*[*CE*]. In particular, we need to solve the set of
    M equations
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 要找到函数的最小值，正如你应该从微积分中知道的，我们需要 *L*[*CE*] 的一阶导数。特别是，我们需要解 M 个方程组
- en: '![](../images/463356_2_En_9_Chapter/463356_2_En_9_Figd_HTML.png)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter/463356_2_En_9_Figd_HTML.png)'
- en: In this case, it is easy to show that the binary cross-entropy *L*[*CE*] is
    minimized when ![$$ {x}_i=\tilde{x}_{i} $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq13.png)
    for *i* = 1, …, *M*. Note that strictly speaking, this is true only when *x*[*i*] is
    different than 0 or 1 since ![$$ \tilde{x}_{i} $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq14.png)
    can be neither 0 nor 1.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，很容易证明当 ![$$ {x}_i=\tilde{x}_{i} $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq13.png)
    对于 *i* = 1, …, *M* 时，二元交叉熵 *L*[*CE*] 达到最小。请注意，严格来说，这只有在 *x*[*i*] 不同于 0 或 1 时才成立，因为
    ![$$ \tilde{x}_{i} $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq14.png)
    既不能是 0 也不能是 1。
- en: To find when the *L*[*CE*] is minimized, we can derive *L*[*CE*] with respect
    to a specific input ![$$ \tilde{x}_{j} $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq15.png)
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 要找到 *L*[*CE*] 最小化时的时间，我们可以对特定输入 ![$$ \tilde{x}_{j} $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq15.png)
    对 *L*[*CE*] 求导
- en: '![](../images/463356_2_En_9_Chapter/463356_2_En_9_Fige_HTML.png)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter/463356_2_En_9_Fige_HTML.png)'
- en: Now remember that we need to satisfy the condition
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 现在请记住，我们需要满足以下条件
- en: '![](../images/463356_2_En_9_Chapter/463356_2_En_9_Figf_HTML.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter/463356_2_En_9_Figf_HTML.png)'
- en: That can happen only if ![$$ {x}_j=\tilde{x}_{j} $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq16.png),
    as can be seen in Equation ([9.3](#Par2661125)). To make sure that this is a minimum,
    we need to evaluate the second derivative. Since the point for which the first
    derivative is zero is a minimum only if
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 这只会在 ![$$ {x}_j=\tilde{x}_{j} $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq16.png)
    的情况下发生，正如方程 ([9.3](#Par2661125)) 所示。为了确保这是一个最小值，我们需要评估二阶导数。由于一阶导数为零的点只有在
- en: '![$$ \frac{\partial^2{L}_{CE}}{\partial \tilde{x}_{j}^2}&gt;0 $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_Equr.png)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \frac{\partial^2{L}_{CE}}{\partial \tilde{x}_{j}^2}&gt;0 $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_Equr.png)'
- en: We can calculate the second derivative at the minimum point ![$$ {x}_j=\tilde{x}_{j}
    $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq17.png)easily
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以轻松地计算在最小点 ![$$ {x}_j=\tilde{x}_{j} $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq17.png)
    的二阶导数
- en: '![](../images/463356_2_En_9_Chapter/463356_2_En_9_Figg_HTML.png)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter/463356_2_En_9_Figg_HTML.png)'
- en: Now remember that ![$$ \tilde{x}_{j}\in \left]0,1\right[ $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq18.png).
    We can immediately see that the denominator of the previous formula is greater
    than zero. The nominator is also clearly greater than zero since ![$$ 1-\tilde{x}_{i}&gt;0
    $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq19.png). Dividing
    two positive numbers gives a positive number, thus we have just proved that
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 现在请记住 ![x̃j属于[0,1]](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq18.png)。我们可以立即看出，前面公式的分母大于零。分子也显然大于零，因为
    ![1-x̃i>0](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq19.png)。两个正数相除得到一个正数，因此我们刚刚证明了
- en: '![$$ \frac{\partial^2{L}_{CE}}{\partial \tilde{x}_{i}^2}&gt;0 $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_Equt.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![∂²LCE/∂x̃i²>0](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_Equt.png)'
- en: The minimum of the cost function is reached when the output is exactly equal
    to the inputs, as we wanted to prove .
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 当输出与输入完全相等时，成本函数达到最小值，正如我们想要证明的那样。
- en: Note
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: An essential prerequisite of using the binary cross-entropy loss function is
    that the inputs *must* be normalized between 0 and 1 and the activation function
    for the last layer must be a *sigmoid* or *softmax* function.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 使用二元交叉熵损失函数的一个基本前提是输入*必须*在0到1之间归一化，并且最后一层的激活函数必须是*sigmoid*或*softmax*函数。
- en: The Reconstruction Error
  id: totrans-92
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 重建误差
- en: The reconstruction error (RE) is a metric that gives you an indication of how
    accurately (or poorly) the autoencoder was able to reconstruct the input observation
    ***x***[*i*]. The most typical RE used is the MSE
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 重建误差（RE）是一个指标，它告诉你自编码器能够多准确地（或不好地）重建输入观察值 ***x***[*i*]。最典型的RE是均方误差（MSE）。
- en: '![$$ RE\equiv MSE=\frac{1}{M}\sum \limits_{i=1}^M{\left|{\boldsymbol{x}}_i-{\overset{\sim
    }{\boldsymbol{x}}}_i\right|}^2\#(9.3) $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_Equu.png)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![RE=均方误差=1/M∑i=1M|xi-˜xi|²](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_Equu.png)'
- en: (9.4)
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: (9.4)
- en: That can be easily calculated. The RE is used often when doing anomaly detection
    with autoencoders, as we explain later. There is an easy explanation of the reconstruction
    error. When the RE is significant, the autoencoder could not reconstruct the input
    well, while when it is small, the reconstruction was successful. Figure [9-3](#Fig3)
    shows an example of big and small reconstruction errors when an autoencoder tries
    to reconstruct an image.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 这可以很容易地计算。在用自编码器进行异常检测时，经常使用RE，正如我们后面解释的那样。重建误差有一个简单的解释。当RE很大时，自编码器无法很好地重建输入，而当它很小时，重建是成功的。图[9-3](#Fig3)展示了当自编码器尝试重建图像时，大和小重建误差的例子。
- en: '![](../images/463356_2_En_9_Chapter/463356_2_En_9_Fig3_HTML.jpg)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/463356_2_En_9_Chapter/463356_2_En_9_Fig3_HTML.jpg)'
- en: Figure 9-3
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-3
- en: An example of big and small reconstruction errors when an autoencoder tries
    to reconstruct an image
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 当自编码器尝试重建图像时，大和小重建误差的例子
- en: 'Example: Reconstructing Handwritten Digits'
  id: totrans-100
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例：重建手写数字
- en: Let’s now see how an autoencoder performs with a real example , using the MNIST
    dataset. This dataset^([10](#Fn10)) contains 70,000 handwritten digits from 0
    to 9\. Each image is 28 × 28 pixels with only gray values, which means that we
    have 784 features (the pixel gray values) as inputs. Let’s start with an autoencoder
    with three layers and with the numbers of neurons in each layer equal to (784,16,784).
    Note that the first and last layers *must* have a dimension equal to the input
    dimensions. For this example, we used the Adam optimizer^([11](#Fn11)) as a loss
    function the cross-entropy^([12](#Fn12)) and we trained the model for 30 epochs
    with a batch size of 256\. Figure [9-4](#Fig4) shows two lines of images of digits.
    The line at the top contains ten random images from the original dataset, while
    the ones at the bottom are the reconstructed images with the autoencoder.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过一个真实示例来看看自编码器的表现，使用MNIST数据集。这个数据集^([10](#Fn10))包含从0到9的70000个手写数字。每个图像是28×28像素，只有灰度值，这意味着我们输入有784个特征（像素灰度值）。让我们从一个具有三层且每层神经元数量分别为(784,16,784)的自编码器开始。请注意，第一层和最后一层*必须*与输入维度相等。在这个例子中，我们使用了Adam优化器^([11](#Fn11))作为损失函数的交叉熵^([12](#Fn12))，并且以256个批次的规模训练了模型30个epoch。图[9-4](#Fig4)显示了数字的两行图像。顶部的行包含原始数据集中十张随机图像，而底部的图像是自编码器重建的图像。
- en: '![](../images/463356_2_En_9_Chapter/463356_2_En_9_Fig4_HTML.jpg)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/463356_2_En_9_Chapter/463356_2_En_9_Fig4_HTML.jpg)'
- en: Figure 9-4
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-4
- en: In the top line, you can see the original digits from the MNIST dataset. In
    contrast, the bottom line contains the digits reconstructed by the autoencoder
    with the number of neurons equal to (784, 16, 784)
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 在最上面一行，你可以看到 MNIST 数据集中的原始数字。相比之下，下面一行包含由具有（784, 16, 784）神经元数量的自动编码器重建的数字。
- en: It is impressive that, to reconstruct an image with 784 pixels, ten classes,
    and 70,000 images, only 16 features are needed. The result, although not perfect,
    allows us to understand almost entirely which digit was used as input. Increasing
    the middle layer’s size to 64 (and leaving all other parameters the same) gets
    a much better result, as you can see in Figure [9-5](#Fig5).
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 令人印象深刻的是，为了重建一个具有 784 像素、十个类别和 70,000 张图像的图像，只需要 16 个特征。虽然结果并不完美，但它使我们几乎完全理解了作为输入使用的数字。将中间层的大小增加到
    64（并保持所有其他参数不变）可以得到更好的结果，如图 [9-5](#Fig5) 所示。
- en: '![](../images/463356_2_En_9_Chapter/463356_2_En_9_Fig5_HTML.jpg)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/463356_2_En_9_Chapter/463356_2_En_9_Fig5_HTML.jpg)'
- en: Figure 9-5
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-5
- en: In the top line you can see the original digits from the MNIST dataset. The
    bottom line shows the digits reconstructed by the autoencoder with the number
    of neurons equal to (784, 64, 784)
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 在最上面一行，你可以看到 MNIST 数据集中的原始数字。下面一行显示了由具有（784, 64, 784）神经元数量的自动编码器重建的数字。
- en: This tells us that the relevant information on how to write digits is contained
    in a much lower number of features than 784.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 这告诉我们，关于如何书写数字的相关信息包含在比 784 更少的特征中。
- en: Note
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: An autoencoder with a middle layer smaller than the input dimensions (a bottleneck)
    can be used to extract the essential features of an input dataset. This creates
    a learned representation of the inputs given by the function *g*(***x***[*i*]).
    Effectively an FFA can be used to perform *dimensionality reduction*.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 一个中间层小于输入维度的自动编码器（瓶颈）可以用来提取输入数据集的基本特征。这通过函数 *g*(***x***[*i*]) 给出了输入的学习表示。实际上，一个前馈神经网络（FFA）可以被用来执行
    *降维*。
- en: The FFA will not recreate the input digits well if the number of neurons in
    the middle layer is reduced too much (if the bottleneck is too extreme). Figure
    [9-6](#Fig6) shows the reconstruction of the same digits with an autoencoder with
    only eight neurons in the middle layer. With only eight neurons in the middle
    layer, you can see that some reconstructed digits are wrong. As you can see in
    Figure [9-6](#Fig6), the 4 is reconstructed as a 9 and the 2 is reconstructed
    to something that resembles a 3.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 如果中间层的神经元数量减少太多（如果瓶颈太极端），FFA 将无法很好地重建输入数字。图 [9-6](#Fig6) 展示了使用只有八个中间层神经元的自动编码器重建相同数字的情况。你可以看到，只有八个中间层神经元时，一些重建的数字是错误的。如图
    [9-6](#Fig6) 所示，数字 4 被重建为 9，数字 2 被重建为类似于 3 的形状。
- en: '![](../images/463356_2_En_9_Chapter/463356_2_En_9_Fig6_HTML.jpg)'
  id: totrans-113
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/463356_2_En_9_Chapter/463356_2_En_9_Fig6_HTML.jpg)'
- en: Figure 9-6
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-6
- en: In the top line you can see the original digits from the MNIST dataset. In contrast,
    the bottom line contains the digits reconstructed by the autoencoder with the
    number of neurons equal to (784, 8, 784)
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 在最上面一行，你可以看到 MNIST 数据集中的原始数字。相比之下，下面一行包含由具有（784, 8, 784）神经元数量的自动编码器重建的数字。
- en: In Figure [9-7](#Fig7), you can compare the reconstructed digits by all the
    FFAs we have discussed.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 在图 [9-7](#Fig7) 中，你可以比较我们讨论过的所有 FFAs 的重建数字。
- en: '![](../images/463356_2_En_9_Chapter/463356_2_En_9_Fig7_HTML.jpg)'
  id: totrans-117
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/463356_2_En_9_Chapter/463356_2_En_9_Fig7_HTML.jpg)'
- en: Figure 9-7
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-7
- en: In the top line, you can see the original digits from the MNIST dataset. The
    second line of digits contains the digits reconstructed by the FFA (784,8,784).
    The third line is by the FFA (784,16,784), and the last line is by the FFA (784,64,784)
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 在最上面一行，你可以看到 MNIST 数据集中的原始数字。第二行数字包含由（784,8,784）的 FFA 重建的数字。第三行是由（784,16,784）的
    FFA 重建的，最后一行是由（784,64,784）的 FFA 重建的。
- en: From Figure [9-7](#Fig7) you can see how, by increasing the middle layer’s size,
    the reconstruction gets better and better, as we expected.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 从图 [9-7](#Fig7) 中你可以看到，通过增加中间层的大小，重建效果越来越好，正如我们所预期的。
- en: For these examples, we used the binary cross-entropy as a loss function. But
    the MSE would have worked also, and results can be seen in Figure [9-8](#Fig8).
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这些示例，我们使用了二元交叉熵作为损失函数。但均方误差（MSE）也可以工作，结果可以在图 [9-8](#Fig8) 中看到。
- en: '![](../images/463356_2_En_9_Chapter/463356_2_En_9_Fig8_HTML.jpg)'
  id: totrans-122
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/463356_2_En_9_Chapter/463356_2_En_9_Fig8_HTML.jpg)'
- en: Figure 9-8
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-8
- en: In the top line, you can see ten random original digits from the MNIST dataset.
    The second line of digits contains the digits reconstructed with an FFA with 16
    neurons in the middle layer and the binary cross-entropy as the loss function.
    The last line contains images reconstructed with the MSE as a loss function
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 在最上面一行，您可以看到来自MNIST数据集的十个随机原始数字。第二行数字包含使用具有中间层16个神经元的FFA和二元交叉熵作为损失函数重建的数字。最后一行包含使用均方误差作为损失函数重建的图像。
- en: Autoencoder Applications
  id: totrans-125
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自动编码器应用
- en: Dimensionality Reduction
  id: totrans-126
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 维度约简
- en: As mentioned in this chapter , using the bottleneck method, the latent features
    will have a dimension *q* that is smaller than the dimensions of the input observations
    *n*. The *encoder* part (once trained) does natural (by design) dimension reduction,
    thereby producing *q* real numbers. You can use the latent features for various
    tasks, such as classification (as you will see in the next section) or clustering.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 如本章所述，使用瓶颈方法，潜在特征将具有一个维度 *q*，该维度小于输入观测值 *n* 的维度。*编码器*部分（一旦训练完成）会自然地进行（按设计）降维，从而产生
    *q* 个实数。您可以使用潜在特征来完成各种任务，例如分类（您将在下一节中看到）或聚类。
- en: 'We would like to point out some of the advantages of dimensionality reduction
    with an autoencoder compared to a more classical PCA approach. The autoencoder
    has one main benefit from a computational point of view: it can deal with a very
    large amount of data efficiently since its training can be done with mini-batches,
    while PCA, one of the most used dimensionality reduction algorithms, needs to
    do its calculations using the entire dataset. PCA is an algorithm that projects
    a dataset on the eigenvectors of its covariance matrix,^([13](#Fn13)) thus providing
    a linear transformation of the features Autoencoders are more flexible and consider
    non-linear transformations of the features. The default PCA method uses ![$$ \mathcal{O}\left({d}^2\right)
    $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq20.png) space
    for data in *ℝ*^(*d*). This is, in many cases, not computationally feasible, and
    the algorithm does not scale up with increasing dataset size. This may seem irrelevant,
    but in many practical applications, the amount of data and the number of features
    is so big that PCA is not a practical solution from a computational point of view.'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 我们想指出使用自动编码器进行维度约简与更传统的PCA方法相比的一些优点。从计算角度来看，自动编码器的主要优点是：它可以高效地处理大量数据，因为其训练可以使用小批量进行，而PCA（最常用的维度约简算法之一）需要使用整个数据集进行计算。PCA是一种将数据集投影到其协方差矩阵特征向量上的算法，^([13](#Fn13))从而提供特征的线性变换。自动编码器更加灵活，并考虑特征的非线性变换。默认的PCA方法使用
    ![$$ \mathcal{O}\left({d}^2\right) $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_IEq20.png)
    空间来处理 *ℝ*^(*d*) 中的数据。在许多情况下，这从计算角度来看是不可行的，并且算法不会随着数据集大小的增加而扩展。这看起来可能无关紧要，但在许多实际应用中，数据量和特征数量如此之大，以至于从计算角度来看PCA不是一个实用的解决方案。
- en: Note
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: 'The use of an autoencoder for dimensionality reduction has one main advantage
    from a computational point of view: it can deal with a very large amount of data
    efficiently since its training can be done with mini-batches.'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 从计算角度来看，使用自动编码器进行维度约简的主要优点是：它可以高效地处理大量数据，因为其训练可以使用小批量进行。
- en: Equivalence with PCA
  id: totrans-131
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 与主成分分析（PCA）的等价性
- en: 'This is not well known, but still worth mentioning. An FFA is equivalent to
    a PCA if the following conditions are met:'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能不是广为人知的事实，但仍值得提及。如果满足以下条件，FFA与PCA等价：
- en: You use a linear function for the encoder *g*(·)
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您使用线性函数作为编码器 *g*(·)
- en: You use a linear function for the decoder *f*(·)
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您使用线性函数作为解码器 *f*(·)
- en: You use the MSE for the loss function
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您使用均方误差（MSE）作为损失函数
- en: You normalize the inputs to
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您将输入归一化到
- en: '![$$ {\hat{x}}_{i,j}=\frac{1}{\sqrt{M}}\left({x}_{i,j}-\frac{1}{M}\sum \limits_{k=1}^M{x}_{k,j}\right)
    $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_Equv.png)'
  id: totrans-137
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![$$ {\hat{x}}_{i,j}=\frac{1}{\sqrt{M}}\left({x}_{i,j}-\frac{1}{M}\sum \limits_{k=1}^M{x}_{k,j}\right)
    $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_Equv.png)'
- en: The proof is long and can found in the notes by M.M. Kahpra for the course CS7015
    (Indian Institute of Technology Madras) at [`http://toe.lt/1a`](http://toe.lt/1a).
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 证明过程较长，可以在M.M. Kahpra为印度理工学院马德拉斯分校CS7015课程准备的笔记中找到，链接为[`http://toe.lt/1a`](http://toe.lt/1a)。
- en: Classification
  id: totrans-139
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 分类
- en: Classification with Latent Features
  id: totrans-140
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 基于潜在特征的分类
- en: Let’s now suppose that we want to classify our input images of the MNIST dataset.
    We can simply use all the features, in our case, the 784 pixel values of the images.
    We can use an algorithm, such as kNN, for illustrative purposes. Doing this with
    seven nearest neighbors on the training MNIST dataset (with 60,000 images) will
    take around 16.6 minutes^([14](#Fn14)) (1000 sec) and gets you an accuracy on
    the test dataset of 10,000 images of 96.4%. However, what happens if we use this
    algorithm not with the original dataset, but with the latent features *g*(***x***[*i*])?
    For example, say we consider an FFA with eight neurons in the middle layer and
    again train a kNN algorithm on the latent features *g*(***x***[*i*]) ∈ *ℝ*⁸. In
    that case, we get an accuracy of 89% in 1.1 sec. We get a gain of a factor of
    1,000 in running time, for a loss of 7.4% in accuracy.^([15](#Fn15)) See Table
    [9-1](#Tab1).
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 现在假设我们想要对 MNIST 数据集的输入图像进行分类。我们可以简单地使用所有特征，在我们的例子中，是图像的 784 个像素值。为了说明，我们可以使用一个算法，比如
    kNN。在训练 MNIST 数据集（包含 60,000 张图像）上使用七个最近邻将花费大约 16.6 分钟^([14](#Fn14))（1000 秒）并在测试数据集的
    10,000 张图像上获得 96.4% 的准确率。然而，如果我们使用这个算法不是在原始数据集上，而是在潜在特征 *g*(***x***[*i*]) 上，会发生什么呢？例如，假设我们考虑中间层有八个神经元的
    FFA，并在潜在特征 *g*(***x***[*i*]) ∈ *ℝ*⁸ 上再次训练 kNN 算法。在这种情况下，我们得到 89% 的准确率，耗时 1.1 秒。我们获得了运行时间因子
    1,000 的提升，但准确率下降了 7.4%。^([15](#Fn15)) 见表 [9-1](#Tab1)。
- en: Table 9-1
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 表 9-1
- en: The Different Accuracies and Running Times When Applying the kNN Algorithm to
    the Original 784 Features or the Eight Latent Features for the MNIST Dataset
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 当将 kNN 算法应用于 MNIST 数据集的原始 784 个特征或八个潜在特征时的不同准确率和运行时间
- en: '| Input Data | Accuracy | Running Time |'
  id: totrans-144
  prefs: []
  type: TYPE_TB
  zh: '| 输入数据 | 准确率 | 运行时间 |'
- en: '| --- | --- | --- |'
  id: totrans-145
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| Original data***x***[*i*] ∈ *ℝ*^(784) | 96.4% | 1000 sec. ≈16.6 min. |'
  id: totrans-146
  prefs: []
  type: TYPE_TB
  zh: '| 原始数据***x***[*i*] ∈ *ℝ*^(784) | 96.4% | 1000 秒 ≈ 16.6 分钟 |'
- en: '| Latent Features g(***x***[*i*]) ∈ *ℝ*⁸ | 89% | 1.1 sec. |'
  id: totrans-147
  prefs: []
  type: TYPE_TB
  zh: '| 潜在特征 g(***x***[*i*]) ∈ *ℝ*⁸ | 89% | 1.1 秒 |'
- en: Using eight features allows us to get very good accuracy in just one second.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 使用八个特征使我们能够在仅一秒钟内获得非常好的准确率。
- en: We can do the same analysis with another dataset, the Fashion MNIST^([16](#Fn16))
    dataset (a dataset from Zalando very similar to the MNIST one, only with clothing
    images instead of handwritten digits) for illustrative purposes. The dataset has,
    as the MNIST one, 60,000 training images and 10,000 test ones. Table [9-2](#Tab2)
    shows a summary of the results of applying kNN to the testing portion of this
    dataset.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以用另一个数据集，即 Fashion MNIST^([16](#Fn16)) 数据集（来自 Zalando 的一个与 MNIST 非常相似的数据集，只是包含服装图像而不是手写数字）来进行同样的分析。该数据集与
    MNIST 一样，有 60,000 张训练图像和 10,000 张测试图像。表 [9-2](#Tab2) 展示了将 kNN 应用于该数据集测试部分的总结结果。
- en: Table 9-2
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 表 9-2
- en: The Difference in Accuracy and Running Time When Applying the kNN Algorithm
    to the Original 784 Features with an FFA with Eight Neurons and with an FFA with
    16 Neurons for the Fashion MNIST Dataset
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Fashion MNIST 数据集上应用 kNN 算法对原始 784 个特征与使用八个神经元和 16 个神经元的 FFA 的准确率和运行时间差异
- en: '| Input Data | Accuracy | Running Time |'
  id: totrans-152
  prefs: []
  type: TYPE_TB
  zh: '| 输入数据 | 准确率 | 运行时间 |'
- en: '| --- | --- | --- |'
  id: totrans-153
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| Original data ***x***[*i*] ∈ *ℝ*^(784) | 85.4% | 1040 sec. ≈16.6 min. |'
  id: totrans-154
  prefs: []
  type: TYPE_TB
  zh: '| 原始数据 ***x***[*i*] ∈ *ℝ*^(784) | 85.4% | 1040 秒 ≈ 16.6 分钟 |'
- en: '| Latent Features *enc*(***x***[*i*]) ∈ *ℝ*⁸ | 79.9% | 1.2 sec. |'
  id: totrans-155
  prefs: []
  type: TYPE_TB
  zh: '| 潜在特征 *enc*(***x***[*i*]) ∈ *ℝ*⁸ | 79.9% | 1.2 秒 |'
- en: '| Latent Features *enc*(***x***[*i*]) ∈ *ℝ*^(16) | 83.6% | 3.0 sec. |'
  id: totrans-156
  prefs: []
  type: TYPE_TB
  zh: '| 潜在特征 *enc*(***x***[*i*]) ∈ *ℝ*^(16) | 83.6% | 3.0 秒 |'
- en: It is exciting to note that with an FFA with 16 neurons in the middle layer,
    we reach an accuracy of 83.6% in just three sec. When applying a kNN algorithm
    to the original features (784), we get an accuracy only 1.8% higher but with a
    running time of around 330 times longer.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 值得注意的是，使用中间层有 16 个神经元的 FFA，我们只需三秒钟就达到了 83.6% 的准确率。当将 kNN 算法应用于原始特征（784）时，我们只能获得
    1.8% 更高的准确率，但运行时间大约是 330 倍更长。
- en: Note
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 备注
- en: Using autoencoders and doing classification with the latent features is a good
    way to reduce the training time by several orders of magnitude while incurring
    a minor drop in accuracy.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 使用自动编码器和用潜在特征进行分类是减少训练时间几个数量级的好方法，同时准确率略有下降。
- en: 'The Curse of Dimensionality: A Small Detour'
  id: totrans-160
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 维度诅咒：一个小插曲
- en: 'Is there any other reason that you would want to do dimensionality reduction
    before doing the classification? Reducing running time is one reason, but another
    important one plays a significant role when the input dimension is very large,
    i.e., the datasets that have a very large number of features: the curse of dimensionality.
    To understand why, we need to take a quick detour to look at the problem of high
    dimensionality classification and discuss the *curse of dimensionality* . Let’s
    consider the unit cube [0, 1]^(*d*) with *d* being an integer and *m* points in
    it distributed randomly. How big should the length *l* of the smallest hyper-cube
    be to contain at least one point? We can easily calculate it as follows'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 在进行分类之前，你有什么其他原因想要进行降维吗？减少运行时间是其中一个原因，但另一个重要的原因在输入维度非常大时扮演着重要角色，即具有非常大量特征的数集：维度灾难。为了理解这一点，我们需要快速绕道看看高维分类问题，并讨论
    *维度灾难*。让我们考虑一个单位立方体 [0, 1]^(*d*)，其中 *d* 是一个整数，并且有 *m* 个点在其中随机分布。最小的超立方体的长度 *l*
    应该有多大才能包含至少一个点？我们可以很容易地计算出如下
- en: '![$$ {l}^d\approx \frac{1}{m}\to l\approx {\left(\frac{1}{m}\right)}^{1/d}
    $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_Equw.png)'
  id: totrans-162
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_Equw.png)'
- en: We can easily calculate this value of *l* for various values of *d*. Let’s suppose
    that we consider *m* = 1000 and summarize the results in Table [9-3](#Tab3).
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以轻松计算出 *l* 的这个值，对于各种 *d* 的值。假设我们考虑 *m* = 1000，并将结果总结在表 [9-3](#Tab3) 中。
- en: Table 9-3
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 表 9-3
- en: The Length *l* of the Smallest Hyper-Cube to Contain at Least One Point from
    a Population of Randomly Distributed *m* Points
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 包含来自随机分布的 *m* 个点的最小超立方体的长度 *l*
- en: '| d | l |'
  id: totrans-166
  prefs: []
  type: TYPE_TB
  zh: '| d | l |'
- en: '| --- | --- |'
  id: totrans-167
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| 2 | 0.003 |'
  id: totrans-168
  prefs: []
  type: TYPE_TB
  zh: '| 2 | 0.003 |'
- en: '| 10 | 0.50 |'
  id: totrans-169
  prefs: []
  type: TYPE_TB
  zh: '| 10 | 0.50 |'
- en: '| 100 | 0.93 |'
  id: totrans-170
  prefs: []
  type: TYPE_TB
  zh: '| 100 | 0.93 |'
- en: '| 1000 | 0.99 |'
  id: totrans-171
  prefs: []
  type: TYPE_TB
  zh: '| 1000 | 0.99 |'
- en: Furthermore, as you can see, the data becomes so sparse in high dimensions that
    you need to consider the entire hyper-cube to capture one single observation.
    When the data becomes so sparse, the number of observations you need in order
    to train an algorithm properly becomes much bigger than the size of existing datasets.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，正如你所见，在高维中数据变得非常稀疏，以至于你需要考虑整个超立方体来捕捉一个单独的观察。当数据变得如此稀疏时，你需要用于训练算法的观察数量将远远大于现有数据集的大小。
- en: We could look at this differently. Let’s consider a small hyper-cube of side
    *l* = 1/10\. How many observations will we find on average in this small portion
    of the hyper-cube? This is easy to calculate and is given by
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以换一个角度来看这个问题。让我们考虑一个边长为 *l* = 1/10 的小超立方体。在这个超立方体的小部分中，我们平均能找到多少个观察数据？这是很容易计算的，如下所示
- en: '![$$ \frac{m}{10^d} $$](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_Equx.png)'
  id: totrans-174
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/463356_2_En_9_Chapter/463356_2_En_9_Chapter_TeX_Equx.png)'
- en: You can see that this number is very small for high values of *d*. For example,
    if we consider *d* = 100 it’s easy to see that we would need more observations
    than atoms in the universe^([17](#Fn17)) to find at least one observation in that
    small portion of the hyper-cube.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以看到，对于高值的 *d*，这个数字非常小。例如，如果我们考虑 *d* = 100，很容易看出我们需要比宇宙中的原子数量还要多的观察数据，才能在这个超立方体的小部分中找到至少一个观察数据。
- en: Note
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Performing dimensionality reduction is a viable method for reducing running
    time dramatically while incurring a small drop in accuracy. In high-dimensionality
    datasets, this becomes fundamental due to the curse of dimensionality.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 执行降维是一种在运行时间显著减少的同时，只造成精度小幅下降的有效方法。在高维数据集中，这成为了解决维度灾难的基本方法。
- en: Anomaly Detection
  id: totrans-178
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 异常检测
- en: Autoencoders are often used to perform anomaly detection on different datasets.
    The best way to understand how anomaly detection works with autoencoders is to
    look at it with a practical example. Let’s consider an autoencoder with only three
    layers with 784 neurons in the first, 64 in the latent feature generation layer,
    and 784 neurons in the output layers. We will train it with the MNIST dataset
    and in particular with the 60,000 training portion of it, as we did in the previous
    sections of this chapter. Now let’s consider the Fashion MNIST dataset. Let’s
    choose an image of a shoe (see Figure [9-9](#Fig9)) from this dataset.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 自编码器通常用于在不同数据集上执行异常检测。要理解自编码器如何进行异常检测的最佳方式是查看一个实际例子。让我们考虑一个只有三层，第一层有784个神经元，潜在特征生成层有64个神经元，输出层有784个神经元的自编码器。我们将使用MNIST数据集来训练它，特别是使用之前章节中提到的60,000个训练样本。现在让我们考虑Fashion
    MNIST数据集。让我们从这个数据集中选择一张鞋子的图片（见图[9-9](#Fig9)）。
- en: '![](../images/463356_2_En_9_Chapter/463356_2_En_9_Fig9_HTML.jpg)'
  id: totrans-180
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/463356_2_En_9_Chapter/463356_2_En_9_Fig9_HTML.jpg)'
- en: Figure 9-9
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-9
- en: A random image from the Zalando MNIST dataset.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: Zalando MNIST数据集的一个随机图像。
- en: Let’s add it to the testing portion of the MNIST dataset. The original testing
    portion of MNIST has 10,000 images. With the shoe, we will have 10,001 images.
    How can we use an autoencoder to find the shoe automatically in those 10,001 images?
    Note that the shoe is an “outlier,” it’s an “anomaly” since it is an entirely
    different image class than handwritten digits. To do that, we will take the autoencoder
    we trained with the 60,000 MNIST images and calculate the reconstruction error
    for the 10,001 test images.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们将它添加到MNIST数据集的测试部分。MNIST原始测试部分有10,000个图像。加上鞋子，我们将有10,001个图像。我们如何使用自编码器在这10,001个图像中自动找到鞋子？请注意，鞋子是一个“异常值”，它是一个“异常”，因为它与手写数字完全不同的图像类别。为了做到这一点，我们将使用60,000个MNIST手写图像训练的自编码器，并计算10,001个测试图像的重建误差。
- en: 'The main idea is that, since the autoencoder has only seen handwritten digits
    images, it will not be able to reconstruct the shoe image. Therefore we expect
    this image to have the biggest reconstruction error. We can see if that is the
    case by taking the top two reconstruction errors. For this example, we used the
    MSE for the reconstruction error. You can check out the code at [`https://adl.toelt.ai`](https://adl.toelt.ai).
    The shoe has the highest reconstruction error: 0.062\. The autoencoder cannot
    reconstruct the image, as shown in Figure [9-10](#Fig10).'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 主要思想是，由于自编码器只看到手写数字图像，它将无法重建鞋子的图像。因此，我们预计这张图像将具有最大的重建误差。我们可以通过查看前两个重建误差来验证这一点。对于这个例子，我们使用了均方误差（MSE）作为重建误差。您可以在[`https://adl.toelt.ai`](https://adl.toelt.ai)查看代码。鞋子具有最高的重建误差：0.062。如图[9-10](#Fig10)所示，自编码器无法重建图像。
- en: '![](../images/463356_2_En_9_Chapter/463356_2_En_9_Fig10_HTML.jpg)'
  id: totrans-185
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/463356_2_En_9_Chapter/463356_2_En_9_Fig10_HTML.jpg)'
- en: Figure 9-10
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-10
- en: The shoe and the autoencoder's reconstruction trained on the 60,000 handwritten
    images of the MNIST dataset. This image has the biggest RE in the entire 10,001
    test dataset we built, with a value of 0.062
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 鞋子和在MNIST数据集的60,000个手写图像上训练的自编码器的重建。这张图像在我们构建的整个10,001个测试数据集中具有最大的RE，其值为0.062。
- en: 'The second biggest RE is slightly less than one third of that of the shoe:
    0.022\. This indicates that the autoencoder is doing a good job understanding
    how to reconstruct handwritten digits. You can see the image with the second biggest
    RE in Figure [9-11](#Fig11). This image could also be classified as an outlier,
    as it’s not completely clear if it is a 4 or an incomplete 9.'
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 第二大的RE（重建误差）略小于鞋子的三分之一：0.022。这表明自编码器在理解如何重建手写数字方面做得很好。您可以在图[9-11](#Fig11)中看到具有第二大的RE的图像。这张图像也可以被分类为异常值，因为它不完全清楚是4还是不完整的9。
- en: '![](../images/463356_2_En_9_Chapter/463356_2_En_9_Fig11_HTML.jpg)'
  id: totrans-189
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/463356_2_En_9_Chapter/463356_2_En_9_Fig11_HTML.jpg)'
- en: Figure 9-11
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-11
- en: 'The image with the second biggest RE in the 10,001 test dataset: 0.022'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 10,001个测试数据集中第二大的RE的图像：0.022
- en: The readers with the most experience may have noticed that we trained our autoencoders
    on a dataset without any outliers and applied it to a second dataset with outliers.
    This is not always possible, as very often the outliers are not known and are
    lost in a big dataset. In general, you want to find outliers in a single big dataset
    without any information on how many there are or how they look. Generally speaking,
    anomaly detection can be done following these main steps.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 最有经验的读者可能已经注意到，我们在没有异常值的数据集上训练了自动编码器，并将其应用于有异常值的第二个数据集。这并不总是可能的，因为异常值往往不知道，并且在大数据集中丢失。一般来说，你希望在没有任何关于异常值数量或外观信息的情况下，在一个大数据集中找到异常值。一般来说，异常检测可以按照以下主要步骤进行。
- en: Train an autoencoder on the entire dataset (or if possible, on a portion of
    the dataset known not to have an outlier).
  id: totrans-193
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在整个数据集（或如果可能，在已知没有异常值的数据集部分）上训练自动编码器。
- en: For each observation (or input) of the portion of the dataset known to have
    the wanted outliers, calculate the RE.
  id: totrans-194
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于已知包含所需异常值的数据集部分的每个观测值（或输入），计算RE。
- en: Sort the observations by the RE.
  id: totrans-195
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 按照RE（相对误差）对观测值进行排序。
- en: Classify the observations with the highest RE as outliers. The number of observations
    that classify as outliers will depend on the problem at hand and requires an analysis
    of the results (and usually a lot of knowledge of the data and the problem).
  id: totrans-196
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将RE值最高的观测值分类为异常值。被分类为异常值的观测值数量将取决于具体问题，并需要对结果进行分析（通常需要大量关于数据和问题的知识）。
- en: 'Note that if you train the autoencoder on the entire dataset, there is an essential
    assumption: the outliers are a negligible part of the dataset and their presence
    will not influence how the autoencoder learns to reconstruct the observations.
    This is one of the reasons that regularization is so essential. If the autoencoders
    could learn the identity function, anomaly detection could not be done.'
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，如果你在全部数据集上训练自动编码器，有一个基本假设：异常值是数据集的一个可忽略部分，它们的出现不会影响自动编码器学习重建观测值的方式。这是正则化之所以至关重要的原因之一。如果自动编码器能够学习恒等函数，则无法进行异常检测。
- en: A classic example of anomaly detection is finding fraudulent credit card transactions
    (the outliers). This case usually presents around 0.1% fraudulent transactions
    and therefore this would be a case that would allow us to train the autoencoder
    on the entire dataset. Another is fault detection in an industrial environment.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 异常检测的一个经典例子是寻找欺诈信用卡交易（异常值）。这种情况通常呈现大约0.1%的欺诈交易，因此这将是一个允许我们在整个数据集上训练自动编码器的案例。另一个例子是在工业环境中的故障检测。
- en: Note
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: 'If you train the autoencoder on the entire dataset at disposal, there is an
    essential assumption: the outliers are a negligible part of the dataset and their
    presence will not influence how the autoencoder learns to reconstruct the observations.'
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你将自动编码器训练在可用的整个数据集上，有一个基本假设：异常值是数据集的一个可忽略部分，它们的出现不会影响自动编码器学习重建观测值的方式。
- en: 'Model Stability: A Short Note'
  id: totrans-201
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 模型稳定性：简短说明
- en: Note that doing anomaly detection as described in the previous section seems
    easy, but those methods are prone to overfitting and often give inconsistent results.
    This means that training an autoencoder with a different architecture may well
    give different REs and therefore other outliers. There are several ways of solving
    this problem, but one of the simplest ways of dealing with instability of results
    is to train different models and then take the average of the REs. Another often
    used technique involves taking the maximum of the REs evaluated from several models.
    This kind of approaches are called ensemble methods but go beyond the scope of
    this book.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，按照前述章节所述的方法进行异常检测看似简单，但这些方法容易过拟合，并且经常给出不一致的结果。这意味着使用不同架构训练自动编码器可能会得到不同的RE值，因此可能会有其他异常值。有几种方法可以解决这个问题，但处理结果不稳定性的最简单方法之一是训练不同的模型，然后取RE值的平均值。另一种常用的技术是取几个模型评估的RE值的最大值。这类方法被称为集成方法，但超出了本书的范围。
- en: Note
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Anomaly detection done with autoencoders is prone to problems related to overfitting
    and unstable results. It is essential to be aware of these problems and check
    the results coming from different models to interpret the results correctly.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 使用自动编码器进行的异常检测容易受到过拟合和结果不稳定的问题。了解这些问题并检查来自不同模型的结果，以正确解释结果至关重要。
- en: Note that this section serves to give you some pointers and is not meant to
    be an exhaustive overview on how to solve this problem.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，本节旨在为您提供一些指导，而不是全面概述如何解决这个问题。
- en: Like autoencoders ensembles,^([18](#Fn18)) more advanced techniques are also
    used to deal with problems of instable results coming, for example, from small
    datasets.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 类似于自编码器集成^([18](#Fn18))，也使用更高级的技术来处理不稳定的结果问题，例如来自小数据集的问题。
- en: Denoising Autoencoders
  id: totrans-207
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 去噪自编码器
- en: Denoising autoencoders ^([19](#Fn19)) are developed to auto-correct errors (noise)
    in the input observations. As an example, imagine the handwritten digits we considered
    before where we added some noise (for example, Gaussian noise) in the form of
    randomly changing the gray values of the pixels. In this case, the autoencoders
    should learn to reconstruct the image without the added noise. As a concrete example,
    consider the MNIST dataset. We can add to each pixel a random value generated
    by a normal distribution scaled by a factor (you can check out the code at [`https://adl.toelt.ai`](https://adl.toelt.ai)).
    We can train an autoencoder using the noisy images as the input and the original
    images as the output. The model should learn to remove the noise, since it is
    random in nature and has no relationship to the images.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 去噪自编码器^([19](#Fn19))是为了自动纠正输入观测中的错误（噪声）而开发的。例如，想象一下我们之前考虑的手写数字，我们在像素的灰度值上添加了一些噪声（例如，高斯噪声）。在这种情况下，自编码器应该学会重建图像，而不添加噪声。作为一个具体的例子，考虑MNIST数据集。我们可以在每个像素上添加一个由正态分布生成的随机值，该值乘以一个因子（你可以在[`https://adl.toelt.ai`](https://adl.toelt.ai)查看代码）。我们可以使用带噪声的图像作为输入，原始图像作为输出来训练一个自编码器。该模型应该学会去除噪声，因为它是随机的，并且与图像没有关系。
- en: Figure [9-12](#Fig12) shows the results. In the left column, you see the noisy
    images; in the middle, the original ones; and on the right are the de-noised images.
    It is quite impressive how well it works. Figure [9-12](#Fig12) was generated
    by training an FFA autoencoder with three layers and 32 neurons in the middle
    layer.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 图[9-12](#Fig12)显示了结果。在左侧列中，你可以看到带噪声的图像；在中间，是原始图像；在右侧是去噪图像。它的工作效果非常好，令人印象深刻。图[9-12](#Fig12)是通过训练具有三层和中间层32个神经元的FFA自编码器生成的。
- en: '![](../images/463356_2_En_9_Chapter/463356_2_En_9_Fig12_HTML.jpg)'
  id: totrans-210
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/463356_2_En_9_Chapter/463356_2_En_9_Fig12_HTML.jpg)'
- en: Figure 9-12
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-12
- en: The results of denoising an FFA autoencoder with three layers and 32 neurons
    in the middle layer . The noise was generated by adding a real number between
    0 and 1 taken from a normal distribution. For details, see the code at [https://​adl.​toelt.​ai](https://adl.toelt.ai)
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 使用三层和中间层32个神经元去噪FFA自编码器的结果。噪声是通过添加从正态分布中取出的介于0和1之间的实数生成的。有关详细信息，请参阅[https://adl.toelt.ai](https://adl.toelt.ai)中的代码。
- en: 'Beyond FFA: Autoencoders with Convolutional Layers'
  id: totrans-213
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 超越FFA：具有卷积层的自编码器
- en: This chapter has described autoencoders with a feed-forward architecture. But
    autoencoders with convolutional layers works as well, and are often much more
    efficient (especially when dealing with images). For example, in Figure [9-13](#Fig13),
    you can see a comparison of the results of an FAA (with architecture 784,32,784)
    and of a Convolutional Autoencoder (CA) with architecture (28x28), (26x26x64),
    (24x24,32), (26x26x64), (28x28). Keep in mind the layers are convolutions, so
    the first two numbers indicate the tensor dimensions and the third indicates the
    number of kernels, which in this example had a size of 3x3\. The two autoencoders
    have been trained with the same parameters (epochs, mini-batch size, etc.). You
    can see how a CA gives better results than an FAA, since we are dealing with images.
    To be fair, note that the feature generating layer is only marginally smaller
    than the input layer in this example. The purpose of this example is to show you
    that convolutional autoencoders are a viable solution because they work very well
    in many practical applications.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 本章已描述了具有前馈架构的自编码器。但是，具有卷积层的自编码器同样有效，并且通常效率更高（尤其是在处理图像时）。例如，在图[9-13](#Fig13)中，你可以看到具有架构784,32,784的FAA（前馈自编码器）和具有架构(28x28),
    (26x26x64), (24x24,32), (26x26x64), (28x28)的卷积自编码器（CA）的结果比较。请注意，层是卷积层，所以前两个数字表示张量维度，第三个表示核的数量，在这个例子中大小为3x3。这两个自编码器使用相同的参数（周期数、小批量大小等）进行训练。你可以看到CA由于我们处理的是图像，所以给出了比FAA更好的结果。为了公平起见，请注意，在这个例子中，特征生成层仅略小于输入层。这个例子的目的是向您展示卷积自编码器是一个可行的解决方案，因为它们在许多实际应用中工作得非常好。
- en: '![](../images/463356_2_En_9_Chapter/463356_2_En_9_Fig13_HTML.jpg)'
  id: totrans-215
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/463356_2_En_9_Chapter/463356_2_En_9_Fig13_HTML.jpg)'
- en: Figure 9-13
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-13
- en: A comparison of the results of an FAA (with architecture 784,32,784) and of
    a Convolutional Autoencoder (CA) with architecture (28x28), (26x26x64), (24x24,32),
    (26x26x64), (28x28)
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 784,32,784架构的FAA（自动编码器）和具有架构(28x28), (26x26x64), (24x24,32), (26x26x64), (28x28)的卷积自动编码器（CA）的结果比较
- en: 'Another important aspect is that the feature-generating layer can be a convolutional
    layer but can also be a dense one. There is no fixed rule and testing is required
    to find the best architecture for your problem. It also depends on how you want
    to model your latent features: as a tensor (multi-dimensional array) or as a one-dimensional
    array of real numbers.'
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个重要的方面是，特征生成层可以是卷积层，也可以是密集层。没有固定的规则，需要测试以找到最适合你问题的架构。它还取决于你如何想要建模你的潜在特征：作为一个张量（多维数组）或作为一个实数的一维数组。
- en: Implementation in Keras
  id: totrans-219
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Keras实现
- en: 'Now let’s briefly look at how we can implement autoencoders in Keras. It is
    quite easy so don’t worry. You will find many examples on the online version of
    the book at [`https://adl.toelt.ai`](https://adl.toelt.ai). The easiest way of
    implementing an autoencoder is to use the Keras Functional APIs. As an example,
    we will consider as input the MNIST dataset, in other words the input shape of
    the network will be `(784,)` (remember that the MNIST images are 28x28 pixels,
    and therefore when flattened are vectors with 784 values). The network will consists
    of two parts: the encoder and the decoder (check out Figure [9-2](#Fig2) if you
    don’t remember exactly which part does what). Let’s look at the code and then
    discuss it.'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们简要地看看如何在Keras中实现自动编码器。这相当简单，所以不要担心。你可以在书的在线版本中找到许多示例，网址为[`https://adl.toelt.ai`](https://adl.toelt.ai)。实现自动编码器最简单的方法是使用Keras功能API。作为一个例子，我们将以MNIST数据集作为输入，换句话说，网络的输入形状将是`(784,)`（记住MNIST图像是28x28像素，因此当展平时是具有784个值的向量）。网络将包含两个部分：编码器和解码器（如果你不记得确切的部分是做什么的，可以查看图[9-2](#Fig2)）。让我们看看代码，然后讨论它。
- en: '[PRE0]'
  id: totrans-221
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'This is the smallest autoencoder that you can create (at least in terms of
    the number of layers). It has the input layer (784 input values), the latent feature
    layer (you decide on its dimension by giving the `feature_layer_dim` parameter
    to the function), and then the output layer that must have of course the same
    dimension as the input layer (784). If you want to make the network larger you
    can of course add as many layers as you want. But the two most important characteristics
    are that the input and output layer must have the same dimensions and that the
    latent feature layer should have a smaller dimension than the input/output layer.
    Once you define this function, you can use it easily to get three models: the
    autoencoders, an encoder, and a decoder.'
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你能创建的最小自动编码器（至少在层数方面）。它包含输入层（784个输入值），潜在特征层（你通过将`feature_layer_dim`参数传递给函数来决定其维度），然后是输出层，当然输出层的维度必须与输入层相同（784）。如果你想使网络更大，当然可以添加任意多的层。但最重要的两个特性是输入层和输出层必须具有相同的维度，并且潜在特征层的维度应该比输入/输出层小。一旦定义了这个函数，你就可以轻松地使用它来获取三个模型：自动编码器、编码器和解码器。
- en: '[PRE1]'
  id: totrans-223
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: You can train the autoencoder exactly as you do with Keras with any other neural
    networks by using the `.fit()` call.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以使用`.fit()`调用，就像用Keras训练其他任何神经网络一样来训练自动编码器。
- en: '[PRE2]'
  id: totrans-225
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Where you can imagine that `mnist_x_train` and `mnist_x_test` are two datasets
    composed of several flattened MNIST handwritten digits. It is important to note
    that we have given the dataset `mnist_x_train` as input to the network for the
    images and for the output. In other words, there are no labels here. The labels
    are the dataset itself, since we want the output to be as close to the input as
    possible (remember the previous sections?).
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，你可以想象`mnist_x_train`和`mnist_x_test`是两个由多个展平的MNIST手写数字组成的数据集。重要的是要注意，我们已经将数据集`mnist_x_train`作为网络的输入和输出。换句话说，这里没有标签。标签是数据集本身，因为我们希望输出尽可能接近输入（还记得前面的章节吗？）。
- en: You can easily encode images, or in other words get the latent features of a
    certain set of inputs by calling `predict()`
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以轻松地对图像进行编码，或者说获取一组输入的潜在特征，通过调用`predict()`
- en: '[PRE3]'
  id: totrans-228
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Where `mnist_x_test` is a hypothetical dataset that you want to encode. You
    can use those `encoded_imgs` values to do anything you need, for example perform
    classification or regression. By invoking `encoder.predict`, you basically have
    performed dimensionality reduction on the input dataset, as we discussed in the
    previous sections of the chapter. The decoding can be done just as easily
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 其中`mnist_x_test`是你想要编码的假设数据集。你可以使用这些`encoded_imgs`值来做你需要的事情，例如执行分类或回归。通过调用`encoder.predict`，你基本上已经对输入数据集进行了降维，正如我们在本章前面的部分所讨论的。解码也可以同样容易地完成
- en: '[PRE4]'
  id: totrans-230
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: At [`https://adl.toelt.ai`](https://adl.toelt.ai) you will find examples of
    autoencoders, anomaly detection with autoencoders, and denoising with autoencoders,
    as described in this chapter.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 在[《https://adl.toelt.ai》](https://adl.toelt.ai)你可以找到本章描述的自编码器示例、使用自编码器的异常检测和去噪示例。
- en: Exercises
  id: totrans-232
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 练习
- en: Exercise 1
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 练习 1
- en: List the most useful tasks you can use an autoencoder for. Can you think of
    an application in your field of work?
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 列出你可以使用自编码器完成的最有用的任务。你能想到在你的工作领域中的应用吗？
- en: Exercise 2
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 练习 2
- en: Can you explain briefly what a sparse autoencoder is? How is it similar to an
    autoencoder with a bottleneck?
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 你能简要解释一下稀疏自编码器是什么吗？它与瓶颈自编码器有何相似之处？
- en: Exercise 3
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 练习 3
- en: How do you measure the performance of an autoencoder (which metric do you use)?
    List the most commonly used metrics that you can use. Can you think of any additional
    metric, in addition to those discussed in this chapter, that could be used?
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 你如何衡量自编码器的性能（你使用哪些指标）？列出你可以使用的最常用指标。你能想到除了本章讨论的指标之外的任何其他指标吗？
- en: Exercise 4
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 练习 4
- en: Describe how anomaly detection works with autoencoders.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 描述如何使用自编码器进行异常检测。
