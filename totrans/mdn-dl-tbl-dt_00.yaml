- en: Acknowledgments
  prefs: []
  type: TYPE_NORMAL
- en: This book would not have been possible without the professional help and support
    of so many. We want to express our greatest gratitude to Mark Powers, the awesome
    coordinating editor powering the logistics of the book’s development, and all
    the other amazing staff at Apress whose tireless work allowed us to focus on writing
    the best book we could. We also would like to thank Bharath Kumar Bolla, our technical
    reviewer, as well as Kalamendu Das, Andrew Steckley, Santi Adavani, and Aditya
    Battacharya for serving as our third through seventh pair of eyes. Last but not
    least, we are honored to have had Tomas Pfister and Alok Sharma each contribute
    a foreword.
  prefs: []
  type: TYPE_NORMAL
- en: Many have also supported us in our personal lives – we greatly appreciate our
    friends and family for their unwavering support and motivation. Although these
    incredible individuals might not be as involved in the technical aspect as those
    mentioned previously (we have fielded the question “So exactly what is your book
    about?” at the dinner table many a time), we would not have been able to accomplish
    what we set out to do – in this book and in life – without their presence.
  prefs: []
