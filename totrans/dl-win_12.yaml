- en: 12. Basics of Reinforcement Learning
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In Chapter [1](502073_1_En_1_Chapter.xhtml), we briefly touched upon the concept
    of reinforcement learning. As we discussed there, reinforcement learning is one
    of the methods in which machine learning models are trained.
  prefs: []
  type: TYPE_NORMAL
- en: Reinforcement learning is the main concept behind game AI programming and models
    like AlphaZero and OpenAI Five (see Appendix 1), as well as applications in the
    robotics field.
  prefs: []
  type: TYPE_NORMAL
- en: In reinforcement learning, the AI system—typically referred to as the *agent*—is
    introduced to an environment and is given a goal to achieve. The agent is also
    given a set of possible actions that can be taken to change the state of the environment.
    The task of the agent is to use those actions to achieve the desired goal state.
    The agent is allowed to make any of those possible actions. Based on how appropriate
    that action is toward achieving the desired goal, the agent will be given a reward
    or a penalty. By learning to maximize the reward or minimize the penalty, the
    agent will eventually learn the steps needed to achieve the goal (Figure [12-1](#Fig1)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_12_Chapter/502073_1_En_12_Fig1_HTML.png](../images/502073_1_En_12_Chapter/502073_1_En_12_Fig1_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12-1
  prefs: []
  type: TYPE_NORMAL
- en: The workflow of a reinforcement learning system
  prefs: []
  type: TYPE_NORMAL
- en: Because the agent is not given a full set of labeled data to train on, as well
    as given some feedback on the actions, reinforcement learning falls in between
    supervised and unsupervised learning.
  prefs: []
  type: TYPE_NORMAL
- en: If we are to experiment with reinforcement learning, we need a framework that
    can define an environment, a goal to achieve, actions, and a reward mechanism
    for the actions.
  prefs: []
  type: TYPE_NORMAL
- en: 'Luckily, there is a framework developed just for that: OpenAI Gym.'
  prefs: []
  type: TYPE_NORMAL
- en: What is OpenAI Gym?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: OpenAI Gym is an open-source framework developed by OpenAI, to provide tools
    to train reinforcement learning algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI provides a set of built-in environments with classic reinforcement learning
    problems with their defined actions, states, and reward mechanisms (Figure [12-2](#Fig2)).
    Gym also allows you to add third-party or custom environments as well.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_12_Chapter/502073_1_En_12_Fig2_HTML.png](../images/502073_1_En_12_Chapter/502073_1_En_12_Fig2_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12-2
  prefs: []
  type: TYPE_NORMAL
- en: Some available environments in OpenAI Gym
  prefs: []
  type: TYPE_NORMAL
- en: For the built-in environments, Gym also provides rendering/visualization of
    the environment, actions, and outcomes (Figure [12-3](#Fig3)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_12_Chapter/502073_1_En_12_Fig3_HTML.jpg](../images/502073_1_En_12_Chapter/502073_1_En_12_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12-3
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI rendering the MountainCar problem
  prefs: []
  type: TYPE_NORMAL
- en: While providing the environments, OpenAI Gym does not limit you to use any framework
    for the actual training of your reinforcement learning model. Therefore, you can
    use TensorFlow/Keras, or any other machine learning framework you are familiar
    with, to train out models with it.
  prefs: []
  type: TYPE_NORMAL
- en: Setting up OpenAI Gym
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: OpenAI Gym is available as a PIP package. Although originally OpenAI Gym was
    only meant to support Linux and Mac OS, the Windows support is now better. Most
    built-in Gym environments now work on Windows.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: Some advanced environments, such as the MuJoCo (**Mu**lti-**Jo**int dynamics
    with **Co**ntact) environments, require extremely specific dependency setups as
    well as proprietary licenses to use. So we will skip them here.
  prefs: []
  type: TYPE_NORMAL
- en: 'We will first install the minimal package using pip (Figure [12-4](#Fig4)):'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_12_Chapter/502073_1_En_12_Fig4_HTML.jpg](../images/502073_1_En_12_Chapter/502073_1_En_12_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12-4
  prefs: []
  type: TYPE_NORMAL
- en: Installing the minimal package of Gym
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: This will give you access to the Algorithms, Toy Text, and Classic Control environments.^([1](#Fn1))
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, we can install the Atari environments by running (Figure [12-5](#Fig5)):'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_12_Chapter/502073_1_En_12_Fig5_HTML.jpg](../images/502073_1_En_12_Chapter/502073_1_En_12_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12-5
  prefs: []
  type: TYPE_NORMAL
- en: Installing the Atari environments
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Finally, let us get the Box2D environments installed.
  prefs: []
  type: TYPE_NORMAL
- en: 'To get Box2D working, we need to have the Swig binaries installed. We can install
    it using conda (Figure [12-6](#Fig6)):'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_12_Chapter/502073_1_En_12_Fig6_HTML.jpg](../images/502073_1_En_12_Chapter/502073_1_En_12_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12-6
  prefs: []
  type: TYPE_NORMAL
- en: Installing the swig binaries using Conda
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'This allows us to install the Box2D environments (Figure [12-7](#Fig7)):'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_12_Chapter/502073_1_En_12_Fig7_HTML.jpg](../images/502073_1_En_12_Chapter/502073_1_En_12_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12-7
  prefs: []
  type: TYPE_NORMAL
- en: Installing the Box2D environments
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: We can now test whether OpenAI Gym is correctly installed by launching one of
    the environments. We will use the CartPole-v1 environment from the Classic Control
    set of environments.
  prefs: []
  type: TYPE_NORMAL
- en: 'We will create a new code file named `CartPole.py`, and add the following code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Here we are initializing the CartPole-v1 environment and running it for 1,000
    steps.
  prefs: []
  type: TYPE_NORMAL
- en: 'The `env.action_space.sample()` function will return a random action from the
    list of permitted actions for that environment. We perform this action by passing
    it to the `env.step()` function , which will return four parameters:'
  prefs: []
  type: TYPE_NORMAL
- en: '**observation:** the current state of the environment'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**reward:** the reward or the penalty for the action'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**done:** whether the simulation has reached a done state; either the goal
    is reached, or the task has failed and need to restart'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**info:** any additional information provided by the environment for debugging
    purposes (the agent should not use this information for training)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Running this code will result in the CartPole-v1 environment being rendered
    and the results from each step being printed in the console (Figure [12-8](#Fig8)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_12_Chapter/502073_1_En_12_Fig8_HTML.jpg](../images/502073_1_En_12_Chapter/502073_1_En_12_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12-8
  prefs: []
  type: TYPE_NORMAL
- en: Testing OpenAI Gym by running the CartPole environment
  prefs: []
  type: TYPE_NORMAL
- en: Solving the CartPole Problem
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let us now take a closer look at the CartPole problem and see how we can build
    a reinforcement learning model to solve it.
  prefs: []
  type: TYPE_NORMAL
- en: In the CartPole problem there is a friction-less track, and on this track there
    is a cart. A pole is attached to this cart in a way that the pole can freely rotate
    around the pivot point where it attaches to the cart. The goal of the CartPole
    problem is to prevent the pole from falling over by changing the velocity of the
    cart (Figure [12-9](#Fig9)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_12_Chapter/502073_1_En_12_Fig9_HTML.jpg](../images/502073_1_En_12_Chapter/502073_1_En_12_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12-9
  prefs: []
  type: TYPE_NORMAL
- en: The elements of the CartPole environment
  prefs: []
  type: TYPE_NORMAL
- en: The only two actions you can take on the environment are either 0 (push the
    cart to the left) or 1 (push the cart to the right).
  prefs: []
  type: TYPE_NORMAL
- en: The simulation will fail if:^([2](#Fn2))
  prefs: []
  type: TYPE_NORMAL
- en: the angle of the pole goes beyond `±`12`°`
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: the position of the cart goes beyond the displayed area (position is more than
    ±2.4)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: the number of steps goes beyond 500.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The observations return an array of four values, which are cart position ( -2.4
    to +2.4), cart velocity (-Infinity to +Infinity), pole angle (-41.8`° to + 41.8°)`,
    and pole velocity at the tip (-Infinity to +Infinity) (Figure [12-10](#Fig10)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_12_Chapter/502073_1_En_12_Fig10_HTML.jpg](../images/502073_1_En_12_Chapter/502073_1_En_12_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12-10
  prefs: []
  type: TYPE_NORMAL
- en: Observations from the CartPole environment
  prefs: []
  type: TYPE_NORMAL
- en: The reward will be +1 for every step (i.e., the longer you can hold the pole
    vertical, the better).
  prefs: []
  type: TYPE_NORMAL
- en: With all these in mind let us start building a model.
  prefs: []
  type: TYPE_NORMAL
- en: 'We will start with a new code file, which we will name `CartPole_Train.py`,
    and import the necessary packages:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'We will then define our training parameters:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: 'Here, we will initially play 20,000 games and shortlist the actions that resulted
    in at least 50 steps in the simulation before failing. We will define a function
    `model_data_preparation()` to iterate through and gather those step data:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'We then build a simple model, and train it by using the step-sequences from
    those successful initial games:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: When trained, the model will be able to predict the next step to be taken, based
    on a sequence of previous steps as input.
  prefs: []
  type: TYPE_NORMAL
- en: 'We then take this trained model and run 100 games on it. If the model was able
    to run the game past 400 steps without failing, we will consider it as a successful
    run:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: At the end of the 100-game run we will print out the success percentage and
    the average scores, and display the histogram of the scores for the 100 games.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: Using env.render( ) significantly slows down the simulation. Therefore, if you
    do not need to visually inspect the simulation, it is better to not call the render
    method.
  prefs: []
  type: TYPE_NORMAL
- en: Running our code, we will be able to see that the trained model is able to achieve
    the goal by keeping the pole straight by applying the appropriate velocity changes
    to the cart (Figure [12-11](#Fig11)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_12_Chapter/502073_1_En_12_Fig11_HTML.jpg](../images/502073_1_En_12_Chapter/502073_1_En_12_Fig11_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12-11
  prefs: []
  type: TYPE_NORMAL
- en: The trained CartPole model
  prefs: []
  type: TYPE_NORMAL
- en: Out of the 100 games, 51% have achieved our success condition of 400 or more
    steps, with an average score of 351.77 (Figure [12-12](#Fig12)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_12_Chapter/502073_1_En_12_Fig12_HTML.jpg](../images/502073_1_En_12_Chapter/502073_1_En_12_Fig12_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12-12
  prefs: []
  type: TYPE_NORMAL
- en: The success rate of our CartPole model
  prefs: []
  type: TYPE_NORMAL
- en: While at first glance this may seem like not such a great result, looking at
    the histogram of scores shows that our model is skewing towards the success criteria
    (Figure [12-13](#Fig13)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_12_Chapter/502073_1_En_12_Fig14_HTML.jpg](../images/502073_1_En_12_Chapter/502073_1_En_12_Fig14_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12-14
  prefs: []
  type: TYPE_NORMAL
- en: Testing the MountainCar environment
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_12_Chapter/502073_1_En_12_Fig13_HTML.jpg](../images/502073_1_En_12_Chapter/502073_1_En_12_Fig13_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12-13
  prefs: []
  type: TYPE_NORMAL
- en: The histogram of scores of our CartPole model
  prefs: []
  type: TYPE_NORMAL
- en: 'Since we used an initial set of games to retrieve the step sequences as the
    training data, it is normal for the models not to achieve higher success rates
    with just one round of training. You can attempt to increase the success rate
    using several different methods:'
  prefs: []
  type: TYPE_NORMAL
- en: increasing the initial game count used to gather the training data
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: adjusting the score requirements of the initial training data
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: adjusting or trying a different model structure
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: usin the outputs from the first round of training as training data to train
    a new model
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: going further by training for multiple rounds.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Solving the MountainCar Problem
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The CartPole problem we just solved is one of the simplest problems in reinforcement
    learning. Let us now step it up a bit and attempt a slightly more complex one:
    the MountainCar problem.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let us create a script to first look at the MountainCar environment:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: This is like what we did for the CartPole environment, the difference being
    that MountainCar-v0 is used as the environment name. This will render the MountainCar
    environment with random actions as we did before (Figure [12-14](#Fig14)).
  prefs: []
  type: TYPE_NORMAL
- en: In the MountainCar problem, you need to push a car up the top of a steep hill
    marked by the flag. The car starts close to the bottom of the valley. There is
    a less steep hill to the left of the environment that you can use to gather enough
    momentum to climb the steeper hill.
  prefs: []
  type: TYPE_NORMAL
- en: The actions you can take are push left (0), push right (2), or not push (1).
    The position of the goal is 0.5 (Figure [12-15](#Fig15)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_12_Chapter/502073_1_En_12_Fig15_HTML.jpg](../images/502073_1_En_12_Chapter/502073_1_En_12_Fig15_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12-15
  prefs: []
  type: TYPE_NORMAL
- en: The elements of the MountainCar environment
  prefs: []
  type: TYPE_NORMAL
- en: The simulation will fail if you take more than 200 steps to reach the goal.^([3](#Fn3))
  prefs: []
  type: TYPE_NORMAL
- en: The observations return an array of 2 values, which are the position of the
    car (-1.2 to +0.6) and the velocity of the car (-0.07 to +0.07).
  prefs: []
  type: TYPE_NORMAL
- en: At the beginning of the simulation the car will be at a random position between
    -0.6 and -0.4, with no initial velocity.
  prefs: []
  type: TYPE_NORMAL
- en: The reward would be -1 for every step (i.e., the fewer the steps taken to reach
    the goal, the better). There will be no penalty for climbing the left hill, as
    it is needed sometimes to achieve the goal.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let us start a new code file, which we will name MountainCar_Train.py, and
    import the necessary packages:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: 'Our training parameters are like those we used for the CartPole problem. But
    here, we are specifying the score requirement as -198\. We will see why in the
    next step:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: As we discussed, the reward value in the MountainCar problem is -1 for every
    step taken. Therefore, the minimum score a MountainCar game can have is -199 (as
    the game will end if 200 steps are reached). To shortlist the acceptable step
    data from the initial games we need a way to determine the games that has progressed
    towards the goal. As the position of the goal is 0.5, and the initial position
    of the car is between -0.6 and -0.4, we chose games that have achieved the position
    -0.2 (which is partway up the large hill) at least once. This makes our score
    requirement -198 or greater.
  prefs: []
  type: TYPE_NORMAL
- en: 'The data preparation function therefore would look like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: 'The model building and training steps are identical to what we did on the CartPole
    problem:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: 'Like before, we run 100 games using the step predictions from the trained model.
    If the game was able to achieve the goal in less than 200 steps, we consider it
    to be successful:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: If we run our model, you can see that once trained it can push the car to the
    desired goal position (Figure [12-16](#Fig16)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_12_Chapter/502073_1_En_12_Fig16_HTML.jpg](../images/502073_1_En_12_Chapter/502073_1_En_12_Fig16_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12-16
  prefs: []
  type: TYPE_NORMAL
- en: MountainCar reaching the goal
  prefs: []
  type: TYPE_NORMAL
- en: The score histogram shows that a significant portion of games reached the goal
    around the 120-step range, a much better score than our target 198 (Figure [12-17](#Fig17)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_12_Chapter/502073_1_En_12_Fig17_HTML.jpg](../images/502073_1_En_12_Chapter/502073_1_En_12_Fig17_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12-17
  prefs: []
  type: TYPE_NORMAL
- en: The histogram of scores of our MountainCar model
  prefs: []
  type: TYPE_NORMAL
- en: We are now achieving a success percentage of 99% (Figure [12-18](#Fig18)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_12_Chapter/502073_1_En_12_Fig18_HTML.jpg](../images/502073_1_En_12_Chapter/502073_1_En_12_Fig18_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12-18
  prefs: []
  type: TYPE_NORMAL
- en: The success rate of our MountainCar model
  prefs: []
  type: TYPE_NORMAL
- en: What Can You Do Next?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We have now explored the basics of how to apply reinforcement learning in two
    environments of OpenAI Gym: CartPole and MountainCar. Although these two are some
    of the simplest problems to solve with reinforcement learning, the concepts that
    we learned to apply here are the same for much more complex problems. The cutting-edge
    models like OpenAI Five (see Appendix 1) were built upon the same concepts.'
  prefs: []
  type: TYPE_NORMAL
- en: There are many other environments available in OpenAI Gym. Once you have gone
    through the Classic Control environments, try out some of the other sets of environments
    we installed, such as Atari (Figure [12-19](#Fig19)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_12_Chapter/502073_1_En_12_Fig19_HTML.jpg](../images/502073_1_En_12_Chapter/502073_1_En_12_Fig19_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12-19
  prefs: []
  type: TYPE_NORMAL
- en: The Atari Assault-v0 Environment
  prefs: []
  type: TYPE_NORMAL
- en: Another option is one of the Box2D environments (Figure [12-20](#Fig20)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_12_Chapter/502073_1_En_12_Fig20_HTML.jpg](../images/502073_1_En_12_Chapter/502073_1_En_12_Fig20_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12-20
  prefs: []
  type: TYPE_NORMAL
- en: The Box2D BipedalWalker-v3 environment
  prefs: []
  type: TYPE_NORMAL
