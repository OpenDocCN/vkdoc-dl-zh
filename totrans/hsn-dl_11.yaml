  id: totrans-167
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用监督学习的自动编码器
- en: Theory
  id: totrans-168
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 理论
- en: What is an autoencoder? How does a multi-layer autoencoder learn?
  id: totrans-169
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 什么是自动编码器？多层自动编码器是如何学习的？
- en: What is a denoising autoencoder? Write an algorithm to remove noise from a set
    of images from a particular distribution using this network.
  id: totrans-170
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 什么是去噪自动编码器？请编写一个算法，使用这个网络从特定分布的一组图像中去除噪声。
- en: What is a variational autoencoder? Write the objective function of VAE and explain
    its importance.
  id: totrans-171
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 什么是变分自动编码器？请写出变分自动编码器（VAE）的目标函数并解释其重要性。
- en: Compare an autoencoder with Principal Component Analysis.
  id: totrans-172
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 比较自动编码器和主成分分析。
- en: Applications
  id: totrans-173
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 应用
- en: Hari wants to develop a monument identification application that can identify
    all the major monuments in Delhi. The idea is that if a tourist clicks the picture
    of a monument using the app, the app should be able to classify the monument and
    show its details. To develop such an app, he gathered 3000 images of each monument
    from the Internet.
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 哈里想开发一个可以识别德里所有主要纪念碑的纪念碑识别应用程序。想法是，如果游客使用该应用程序点击纪念碑的图片，应用程序应该能够分类纪念碑并显示其详细信息。为了开发这样的应用程序，他从互联网上收集了每个纪念碑的3000张图片。
- en: He tried using conventional feature extraction methods but was not very successful.
    Can you help him accomplish the task using autoencoders?
  id: totrans-175
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他尝试使用传统的特征提取方法，但并没有取得很大的成功。你能帮助他使用自动编码器来完成这个任务吗？
- en: Can autoencoders help him denoise some images of the same monuments clicked
    by the phones of his employees? Explain how this can be done.
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自动编码器能帮助他去除他员工用手机拍摄的同一座纪念碑的一些图像的噪声吗？解释一下如何做到这一点。
- en: Finally, he wants to generate photos of new kinds of monuments using the app.
    Can you help him accomplish this task using VAE?
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后，他想使用该应用程序生成新型纪念碑的图片。你能帮助他使用VAE来完成这个任务吗？
