    of autoencoders having multiple layers follows a slightly different procedure
    as compared with a normal dense network. The following code (Listing [11-3](#PC3))
    implements the finding of the latent representation of images using multiple layers.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一节中提到，对于具有多层结构的自编码器，权重的学习过程与正常密集网络相比略有不同。以下代码（列表[11-3](#PC3)）实现了使用多层找到图像的潜在表示。
- en: '[PRE2]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Now that we have seen how to find the embedding of hidden layers in a stacked
    autoencoder, let us move to other variants of autoencoders.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经看到了如何在堆叠自编码器中找到隐藏层的嵌入，让我们转向其他自编码器的变体。
- en: Variants of Autoencoders
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自编码器的变体
- en: This section discusses some other variants of autoencoders such as sparse, denoising,
    and variational autoencoders.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 本节讨论了一些其他自编码器的变体，例如稀疏、去噪和变分自编码器。
- en: Sparse Autoencoder
  id: totrans-97
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 稀疏自编码器
- en: A sparse autoencoder is a special type of autoencoder that incorporates sparsity
    during the training process. In section “Types of Autoencoders,” we introduced
    the over-complete autoencoder in which the hidden layer contains more units than
    the input layer. This results in the activation of only a small number of neurons.
    We can achieve this sparsity by adding an extra term to the hidden layer that
    penalizes the activations. The task can be accomplished using the KL divergence.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 稀疏自编码器是一种特殊的自编码器，它在训练过程中引入了稀疏性。在“自编码器类型”一节中，我们介绍了过完备自编码器，其中隐藏层包含比输入层更多的单元。这导致只有少数神经元被激活。我们可以通过向隐藏层添加一个惩罚激活的额外项来实现这种稀疏性。可以使用KL散度来完成这个任务。
- en: Loss ![$$ J(W)=L\left(X,\hat{X}\right)+\lambda {\sum}_j KL\left(\rho \Big\Vert
    {\hat{\rho}}_j\right) $$](../images/611710_1_En_11_Chapter/611710_1_En_11_Chapter_TeX_IEq7.png)
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 损失 ![$$ J(W)=L\left(X,\hat{X}\right)+\lambda {\sum}_j KL\left(\rho \Big\Vert
    {\hat{\rho}}_j\right) $$](../images/611710_1_En_11_Chapter/611710_1_En_11_Chapter_TeX_IEq7.png)
- en: where![$$ {\sum}_j KL\left(\rho \Big\Vert {\hat{\rho}}_j\right)={\sum}_j\left[\rho
    loglog\ \frac{\rho }{{\hat{\rho}}_j}+1-\rho\ loglog\ \frac{1-\rho }{1-{\hat{\rho}}_j}\
    \right] $$](../images/611710_1_En_11_Chapter/611710_1_En_11_Chapter_TeX_IEq8.png)
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 其中！[$$ {\sum}_j KL\left(\rho \Big\Vert {\hat{\rho}}_j\right)={\sum}_j\left[\rho
    loglog\ \frac{\rho }{{\hat{\rho}}_j}+1-\rho\ loglog\ \frac{1-\rho }{1-{\hat{\rho}}_j}\
    \right] $$](../images/611710_1_En_11_Chapter/611710_1_En_11_Chapter_TeX_IEq8.png)
- en: and ![$$ {\hat{\rho}}_j=\frac{1}{m}{\sum}_{i=1}^m{a}_j^h\left({x}_i\right) $$](../images/611710_1_En_11_Chapter/611710_1_En_11_Chapter_TeX_IEq9.png)
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 以及！[$$ {\hat{\rho}}_j=\frac{1}{m}{\sum}_{i=1}^m{a}_j^h\left({x}_i\right) $$](../images/611710_1_En_11_Chapter/611710_1_En_11_Chapter_TeX_IEq9.png)
- en: Here, ![$$ {a}_j^h= activation\ of\ the\ {j}^{th}\ neuron\ in\ hidden\ layer\
    h. $$](../images/611710_1_En_11_Chapter/611710_1_En_11_Chapter_TeX_IEq10.png)
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 这里，！[$$ {a}_j^h= 隐藏层h中第j个神经元的激活。 $$](../images/611710_1_En_11_Chapter/611710_1_En_11_Chapter_TeX_IEq10.png)
- en: 'Subject to constraint: ![$$ {\hat{\rho}}_j=\rho $$](../images/611710_1_En_11_Chapter/611710_1_En_11_Chapter_TeX_IEq11.png)'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 在约束条件下：！[$$ {\hat{\rho}}_j=\rho $$](../images/611710_1_En_11_Chapter/611710_1_En_11_Chapter_TeX_IEq11.png)
- en: 'The characteristics of sparse autoencoders are as follows:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 稀疏自编码器的特点如下：
- en: Sparse autoencoders implement sparsity during the training process.
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 稀疏自编码器在训练过程中实现稀疏性。
- en: They can learn features even when the hidden layer has more neurons than the
    input layer.
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 即使隐藏层中的神经元比输入层多，它们也能学习特征。
- en: A sparsity constraint in the hidden layer ensures that only a small portion
    of neurons are activated.
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在隐藏层中引入稀疏约束可以确保只有一小部分神经元被激活。
- en: An additional term is included in the loss function to penalize hidden layer
    activations, pushing them toward zero. As stated earlier, this can be implemented
    using L1 regularization or KL divergence.
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在损失函数中增加一个项来惩罚隐藏层激活，推动它们趋向于零。如前所述，这可以通过L1正则化或KL散度来实现。
- en: By enforcing sparsity, the network learns to capture the most significant features.
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过强制稀疏性，网络学会捕捉最重要的特征。
- en: Denoising Autoencoder
  id: totrans-110
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 去噪自编码器
- en: Denoising autoencoders are a special type of autoencoder that can remove noise
    from data. They have an architecture similar to regular autoencoders, consisting
    of an encoder and a decoder. The encoder processes the noised version of input
    data and converts it into a lower-dimensional representation. This compressed
    representation captures the essential, noise-free features of the data. The decoder
    then receives this encoded representation and tries to reconstruct an uncorrupted
    version of the original input. This process augments the ability of a network
    to capture the underlying patterns of the data, thus making it more robust to
    noise and improving the model's performance. Denoising autoencoders are used in
    various applications such as image, signal, and text denoising.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 去噪自编码器是一种特殊的自编码器，能够从数据中去除噪声。它们的架构与常规自编码器类似，包括一个编码器和一个解码器。编码器处理输入数据的噪声版本，并将其转换为低维表示。这种压缩表示捕捉了数据的本质、无噪声特征。然后，解码器接收这种编码表示，并尝试重建原始输入的无损版本。这个过程增强了网络捕捉数据潜在模式的能力，从而使其对噪声更加鲁棒，并提高模型的性能。去噪自编码器被用于各种应用，如图像、信号和文本去噪。
- en: Variational Autoencoder
  id: totrans-112
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 变分自编码器
- en: A variational autoencoder (VAE) is an autoencoder as it is designed to compress
    high-dimensional input data into a smaller representation. Whereas a typical autoencoder
    maps the input data to a latent vector, a VAE on the other hand maps the input
    to the parameters of a probability distribution, namely, (a) the mean and (b)
    the variance. It is particularly effective for image generation.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 变分自编码器（VAE）是一种自编码器，因为它被设计用来将高维输入数据压缩成更小的表示。而典型的自编码器将输入数据映射到潜在向量，而VAE则相反，将输入映射到概率分布的参数，即（a）均值和（b）方差。它在图像生成方面特别有效。
- en: Conclusion
  id: totrans-114
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: This chapter presents a brief introduction to autoencoders. Autoencoding entails
    training a network to replicate its input as its output, thus learning the latent
    representation of the input. This process is important for developing embeddings
    that help in information retrieval. Autoencoders can be viewed as a type of lossy
    compression, wherein the network identifies the essential attributes of the input.
    Depending on the size of the hidden layer, autoencoders can be under-complete,
    with a hidden layer size smaller than the input layer, or over-complete, with
    larger hidden layers. A stacked autoencoder includes multiple hidden layers. Furthermore,
    these networks can be trained to denoise input by using corrupted instances as
    input. The chapter also gives a very brief introduction to a variational autoencoder
    that functions as a generative model that can generate samples from the learned
    latent space.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 本章简要介绍了自动编码器。自动编码涉及训练一个网络来复制其输入作为其输出，从而学习输入的潜在表示。这个过程对于开发有助于信息检索的嵌入非常重要。自动编码器可以被视为一种有损压缩，其中网络识别输入的基本属性。根据隐藏层的大小，自动编码器可以是欠完备的，隐藏层大小小于输入层，或者过完备的，隐藏层更大。堆叠自动编码器包括多个隐藏层。此外，这些网络可以通过使用损坏的实例作为输入来训练，以去噪输入。本章还简要介绍了变分自动编码器，它作为一个生成模型，可以从学习的潜在空间生成样本。
- en: Exercises
  id: totrans-116
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 练习
- en: Multiple-Choice Questions
  id: totrans-117
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 多项选择题
- en: What is the primary purpose of an autoencoder?
  id: totrans-118
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 自动编码器的首要目的是什么？
- en: To classify input data using maximum margin classifier
  id: totrans-119
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用最大边缘分类器对输入数据进行分类
- en: To replicate its input to its output
  id: totrans-120
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将其输入复制到其输出
- en: To predict future data points using sequence modelling
  id: totrans-121
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用序列建模来预测未来的数据点
- en: To cluster similar data points
  id: totrans-122
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为了聚类相似的数据点
- en: How does an autoencoder support information retrieval?
  id: totrans-123
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 自动编码器如何支持信息检索？
- en: By generating new data points
  id: totrans-124
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过生成新的数据点
- en: By learning embeddings
  id: totrans-125
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过学习嵌入
- en: By clustering data
  id: totrans-126
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过聚类数据
- en: By reducing noise in data
  id: totrans-127
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过减少数据中的噪声
- en: What is an autoencoder trained to learn?
  id: totrans-128
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 自动编码器训练来学习的是什么？
- en: The function that maps input to itself
  id: totrans-129
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将输入映射到自身的函数
- en: The difference between input and output
  id: totrans-130
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输入和输出的区别
- en: The classification boundaries
  id: totrans-131
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分类边界
- en: The regression function
  id: totrans-132
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 回归函数
- en: An autoencoder can be thought of as which of the following?
  id: totrans-133
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 自动编码器可以被认为是以下哪种？
- en: Lossless compression of input
  id: totrans-134
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输入的无损压缩
- en: Lossy compression of input
  id: totrans-135
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输入的有损压缩
- en: Generative modeling
  id: totrans-136
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 生成模型
- en: Predictive modeling
  id: totrans-137
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 预测建模
- en: What must an autoencoder identify to reproduce inputs closely?
  id: totrans-138
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 自动编码器必须识别什么才能使输入的复制更接近？
- en: The noise in the data
  id: totrans-139
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数据中的噪声
- en: The important attributes of inputs
  id: totrans-140
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输入的重要属性
- en: The future values of the data
  id: totrans-141
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数据的未来值
- en: The clustering structure
  id: totrans-142
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 聚类结构
- en: What is a characteristic of under-complete autoencoders?
  id: totrans-143
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 欠完备自动编码器的特征是什么？
- en: Hidden layer size larger than input layer size
  id: totrans-144
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 隐藏层大小大于输入层大小
- en: Hidden layer size equal to input layer size
  id: totrans-145
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 隐藏层大小等于输入层大小
- en: Hidden layer size smaller than input layer size
  id: totrans-146
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 隐藏层大小小于输入层大小
- en: No hidden layers
  id: totrans-147
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 没有隐藏层
- en: What defines an over-complete autoencoder?
  id: totrans-148
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 什么是过完备自动编码器？
- en: Much larger hidden layer sizes
  id: totrans-149
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 隐藏层大小远大于输入层
- en: Hidden layer size equal to input layer size
  id: totrans-150
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 隐藏层大小等于输入层大小
- en: Hidden layer size smaller than input layer size
  id: totrans-151
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 隐藏层大小小于输入层大小
- en: No hidden layers
  id: totrans-152
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 没有隐藏层
- en: What is a stacked autoencoder?
  id: totrans-153
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 什么是堆叠自动编码器？
- en: An autoencoder with a single hidden layer
  id: totrans-154
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 单个隐藏层的自动编码器
- en: An autoencoder with multiple hidden layers
  id: totrans-155
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 有多个隐藏层的自动编码器
- en: An autoencoder without hidden layers
  id: totrans-156
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 没有隐藏层的自动编码器
- en: An autoencoder with a large input layer
  id: totrans-157
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输入层大的自动编码器
- en: How can an autoencoder be trained to learn to denoise input?
  id: totrans-158
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如何训练自动编码器来学习去噪输入？
- en: By using only clean data as input
  id: totrans-159
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 只使用干净的数据作为输入
- en: By giving input and a corrupted instance and targeting the uncorrupted instance
  id: totrans-160
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过给出输入和一个损坏的实例，并针对未损坏的实例
- en: By using a larger hidden layer size
  id: totrans-161
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过使用更大的隐藏层大小
- en: By clustering the input data
  id: totrans-162
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过聚类输入数据
- en: What is a variational autoencoder (VAE)?
  id: totrans-163
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 什么是变分自动编码器（VAE）？
- en: An autoencoder without a hidden layer
  id: totrans-164
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 没有隐藏层的自动编码器
- en: An autoencoder that is also a generative model
  id: totrans-165
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 同时也是生成模型的自动编码器
- en: An autoencoder with a larger input layer size
  id: totrans-166
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输入层大小更大的自动编码器
