- en: 11. Autoencoders
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 11. 自编码器
- en: Introduction
  id: totrans-1
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介
- en: An autoencoder may be considered as a network that implements the identity function.
    It takes a data sample as the input and also considers the same sample as the
    output, thus behaving as a self-supervised model. Though the idea of a network
    aiming to replicate its input seems pointless, it may be used for many purposes
    such as
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 自编码器可以被视为实现恒等函数的网络。它以数据样本作为输入，同时也将相同的样本作为输出，因此表现为一个自监督模型。尽管网络旨在复制其输入的想法看似毫无意义，但它可以用于许多目的，例如
- en: Creating embeddings of the input data such as images and audio data
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建输入数据的嵌入，如图像和音频数据
- en: Data compression
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据压缩
- en: Generating new data similar to the input data and so on
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成与输入数据类似的新数据等
- en: This chapter explains the basics of autoencoders and then moves to the implementation
    of a basic autoencoder that replicates the MNIST dataset. This replication requires
    due deliberation and careful selection of hyperparameters, as demonstrated in
    the next program, which accomplishes the same task using the CIFAR-10 dataset.
    We then move to different variants of autoencoders and discuss sparse, denoising,
    and variational autoencoders. The last section concludes.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 本章解释了自编码器的基础知识，然后转向实现一个复制 MNIST 数据集的基本自编码器。这种复制需要仔细的考虑和超参数的谨慎选择，如下一个程序所示，它使用
    CIFAR-10 数据集完成相同的任务。然后我们转向自编码器的不同变体，并讨论稀疏、去噪和变分自编码器。最后一节总结。
- en: Concept and Types
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 概念和类型
- en: Consider a network having many hidden layers between the input and the output
    layer. These layers are arranged in a way that the number of neurons in the second
    layer is the same as the second last layer; the number of neurons in the third
    layer is the same as the number of neurons in the third last layer; and so on.
    Also, assuming that the number of layers in such a network is odd, then the middle
    layer may be used to extract the latent representation of the input and hence
    be considered the most important one.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑一个在输入层和输出层之间有多个隐藏层的网络。这些层以这种方式排列，即第二层的神经元数量与倒数第二层相同；第三层的神经元数量与倒数第三层相同；依此类推。此外，假设此类网络的层数为奇数，则中间层可以用来提取输入的潜在表示，因此被认为是最重要的。
- en: 'The autoencoder consists of two sub-networks: encoder and decoder. The encoder
    converts the input data into a compact representation, and the decoder converts
    this compact representation again to the output, which is the same as the input.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 自编码器由两个子网络组成：编码器和解码器。编码器将输入数据转换为紧凑的表示，解码器再将这种紧凑的表示转换回输出，该输出与输入相同。
- en: The Math
  id: totrans-10
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数学
- en: Consider a network that can act as an identity function but regenerates the
    input via an intermediate layer. That is, if the input is x, then the output of
    the intermediate layer will be
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑一个可以作为恒等函数但通过中间层重新生成输入的网络。也就是说，如果输入是 x，那么中间层的输出将是
- en: '![$$ h=f\left({W}_xX+{b}_x\right) $$](../images/611710_1_En_11_Chapter/611710_1_En_11_Chapter_TeX_Equa.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![$$ h=f\left({W}_xX+{b}_x\right) $$](../images/611710_1_En_11_Chapter/611710_1_En_11_Chapter_TeX_Equa.png)'
- en: 'where f is an activation function and *W*[*x*] and *b*[*x*] are the weights
    and the bias, respectively. The output of the intermediate layer is then multiplied
    by the weight *W*[*h*] and passes through an activation function g to produce
    ![$$ \hat{x} $$](../images/611710_1_En_11_Chapter/611710_1_En_11_Chapter_TeX_IEq1.png):'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 f 是激活函数，*W*[*x*] 和 *b*[*x*] 分别是权重和偏差。然后中间层的输出乘以权重 *W*[*h*]，并通过激活函数 g 传递以产生
    ![$$ \hat{x} $$](../images/611710_1_En_11_Chapter/611710_1_En_11_Chapter_TeX_IEq1.png)：
- en: '![$$ \hat{x}=g\left({W}_hh+{b}_h\right) $$](../images/611710_1_En_11_Chapter/611710_1_En_11_Chapter_TeX_Equb.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \hat{x}=g\left({W}_hh+{b}_h\right) $$](../images/611710_1_En_11_Chapter/611710_1_En_11_Chapter_TeX_Equb.png)'
- en: The aim of the network is to reduce the difference between *x* and ![$$ \hat{x}
    $$](../images/611710_1_En_11_Chapter/611710_1_En_11_Chapter_TeX_IEq2.png), that
    is, to minimize the loss. ![$$ L=\frac{1}{2}{\left(\hat{x}-x\right)}^2 $$](../images/611710_1_En_11_Chapter/611710_1_En_11_Chapter_TeX_IEq3.png),
    in the case if the inputs are real.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 网络的目的是减少 *x* 和 ![$$ \hat{x} $$](../images/611710_1_En_11_Chapter/611710_1_En_11_Chapter_TeX_IEq2.png)
    之间的差异，即最小化损失。![$$ L=\frac{1}{2}{\left(\hat{x}-x\right)}^2 $$](../images/611710_1_En_11_Chapter/611710_1_En_11_Chapter_TeX_IEq3.png)，在输入为实数的情况下。
- en: If the inputs are binary, then the loss is taken as
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 如果输入是二进制，则损失取为
- en: '![$$ L=-{\sum}_i{x}_i loglog\ \hat{x_i}+\left(1-{x}_i\right) loglog\ \left(1-\hat{x_i}\right)
    $$](../images/611710_1_En_11_Chapter/611710_1_En_11_Chapter_TeX_Equc.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![$$ L=-{\sum}_i{x}_i loglog\ \hat{x_i}+\left(1-{x}_i\right) loglog\ \left(1-\hat{x_i}\right)
    $$](../images/611710_1_En_11_Chapter/611710_1_En_11_Chapter_TeX_Equc.png)'
- en: So the network encodes the input *x* to a latent representation *h* and decodes
    *h* back to ![$$ \hat{x} $$](../images/611710_1_En_11_Chapter/611710_1_En_11_Chapter_TeX_IEq4.png)with
    the aim of making ![$$ \hat{x} $$](../images/611710_1_En_11_Chapter/611710_1_En_11_Chapter_TeX_IEq5.png)
    the same as *x*. The model is trained to minimize loss with respect to parameters
    *W*[*x*], *b*[*x*], *W*[*h*], and *b*[*h*].
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，网络将输入 *x* 编码为潜在表示 *h*，并将 *h* 解码回 ![$$ \hat{x} $$](../images/611710_1_En_11_Chapter/611710_1_En_11_Chapter_TeX_IEq4.png)
    以使 ![$$ \hat{x} $$](../images/611710_1_En_11_Chapter/611710_1_En_11_Chapter_TeX_IEq5.png)
    与 *x* 相同。该模型训练以最小化与参数 *W*[*x*]，*b*[*x*]，*W*[*h*]，和 *b*[*h*] 相关的损失。
- en: Types of Autoencoders
  id: totrans-19
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 自编码器类型
- en: 'Autoencoders may be segregated into two types: under-complete and over-complete,
    based on the size of the hidden layer.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 根据隐藏层的大小，自编码器可以分为两种类型：欠完备和过完备。
- en: Under-complete Autoencoder
  id: totrans-21
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 欠完备自编码器
- en: Under-complete autoencoders have the number of units in the hidden layer fewer
    than that in the input layer. An example of such an autoencoder is shown in Figure
    [11-1](#Fig1). After training, if the input *x*[*i*] can be reconstructed exactly
    by the network, it implies that the embedding contains a good enough latent representation
    of the input. This is referred to as lossless embedding.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 欠完备自编码器的隐藏层单元数少于输入层。这种自编码器的例子如图 [11-1](#Fig1) 所示。训练后，如果网络能够精确地重建输入 *x*[*i*]，则意味着嵌入包含了对输入足够好的潜在表示。这被称为无损嵌入。
- en: '![](../images/611710_1_En_11_Chapter/611710_1_En_11_Fig1_HTML.jpg)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/611710_1_En_11_Chapter/611710_1_En_11_Fig1_HTML.jpg)'
- en: Figure 11-1
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-1
- en: Under-complete autoencoder
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 欠完备自编码器
- en: Over-complete Autoencoder
  id: totrans-26
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 过完备自编码器
- en: An over-complete autoencoder has the number of units in the hidden layer of
    the encoder part more than that in the input layer. An example of such a network
    is shown in Figure [11-2](#Fig2). This type of encoder generally performs regularization
    and incorporates sparsity. In over-complete autoencoders, it is possible that
    we simply copy the values of *x* in the first few cells of the hidden layer and
    then use them for reconstruction. The over-complete autoencoder has to ensure
    that this does not happen.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 过完备自编码器的编码部分隐藏层单元数多于输入层。这种网络的例子如图 [11-2](#Fig2) 所示。这类编码器通常执行正则化并引入稀疏性。在过完备自编码器中，我们可能会简单地复制隐藏层前几个单元的
    *x* 值，然后用于重建。过完备自编码器必须确保这种情况不会发生。
- en: '![](../images/611710_1_En_11_Chapter/611710_1_En_11_Fig2_HTML.jpg)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/611710_1_En_11_Chapter/611710_1_En_11_Fig2_HTML.jpg)'
- en: Figure 11-2
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-2
- en: Over-complete autoencoder
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 过完备自编码器
- en: These autoencoders can perform data compression like Principal Component Analysis.
    Let us explore the similarities and differences between the two methods of data
    compression.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这些自编码器可以执行类似于主成分分析（PCA）的数据压缩。让我们探讨这两种数据压缩方法的相似之处和不同之处。
- en: Autoencoder and Principal Component Analysis
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自编码器和主成分分析（PCA）
- en: 'Principal Component Analysis (PCA) transforms the original data having various
    features into a new set of features called principal components. They capture
    the maximum variance in the data within fewer dimensions or features. This is
    particularly useful for dimensionality reduction. We can find the PCA of the given
    data using the following method:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 主成分分析（PCA）将具有各种特征的原数据转换成一组新的特征，称为主成分。它们在较少的维度或特征中捕获数据中的最大方差。这对于降维特别有用。我们可以使用以下方法找到给定数据的
    PCA：
- en: 'For the input data X, we find the mean deviation (![$$ X-\underset{\_}{X} $$](../images/611710_1_En_11_Chapter/611710_1_En_11_Chapter_TeX_IEq6.png)),
    followed by the formation of a scatter matrix by multiplying the mean deviation
    with its transpose:'
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于输入数据 X，我们找到平均偏差 (![$$ X-\underset{\_}{X} $$](../images/611710_1_En_11_Chapter/611710_1_En_11_Chapter_TeX_IEq6.png))，然后通过将平均偏差与其转置相乘来形成散点矩阵：
- en: '![$$ Scatter\ Matrix=\left(X-\underset{\_}{X}\right){\left(X-\underset{\_}{X}\right)}^T
    $$](../images/611710_1_En_11_Chapter/611710_1_En_11_Chapter_TeX_Equd.png)'
  id: totrans-35
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![散点矩阵=\(\left(X-\underset{\_}{X}\right){\left(X-\underset{\_}{X}\right)}^T\)](../images/611710_1_En_11_Chapter/611710_1_En_11_Chapter_TeX_Equd.png)'
- en: The eigenvalues of the scatter matrix so formed are then obtained.
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后获得所形成的散点矩阵的特征值。
- en: The first “d” eigenvalues in decreasing order are then found and corresponding
    vectors are concatenated.
  id: totrans-37
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 按照递减顺序找到第一个“d”特征值，并将相应的向量连接起来。
- en: The transformation matrix so formed is then multiplied with the original matrix
    so as to obtain the transformed features.
  id: totrans-38
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 这样形成的转换矩阵随后与原始矩阵相乘，以获得转换后的特征。
- en: Note that the transformed features are such that the first feature captures
    maximum variance and subsequent features capture the remaining variance. As stated
    earlier, both PCA and autoencoders can be used for dimensionality reduction; however,
    there are notable differences between the two.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，转换后的特征是这样的，第一个特征捕捉最大方差，后续特征捕捉剩余的方差。如前所述，PCA 和自动编码器都可以用于降维；然而，两者之间有明显的区别。
- en: PCA is a linear dimensionality reduction method. As stated earlier, it finds
    the direction in which the variance is maximum. However, such methods do not work
    well for the datasets wherein the relationship between the variables is not linear.
    In addition to the above, the principal components of PCA are easy to interpret.
    An autoencoder, on the other hand, is a nonlinear data reduction technique. This
    makes it powerful as it can even work for datasets in which the relation between
    the variables is nonlinear. However, it is difficult to interpret the latent representations
    created by autoencoders. The computational complexity of autoencoders is more
    as compared with PCA, but they can generate a very good reconstruction of the
    original data.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 主成分分析（PCA）是一种线性降维方法。如前所述，它找到方差最大的方向。然而，这种方法对于变量之间关系非线性的数据集效果不佳。除了上述内容之外，PCA
    的主成分易于解释。另一方面，自动编码器是一种非线性数据降维技术。这使得它非常强大，因为它甚至可以处理变量之间关系非线性的数据集。然而，自动编码器创建的潜在表示难以解释。与
    PCA 相比，自动编码器的计算复杂度更高，但它们可以生成非常优秀的原始数据重建。
- en: Training of an Autoencoder
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自动编码器的训练
- en: In training an autoencoder we take the first hidden layer of the encoder part
    along with the input, which is the same as the output, and create a new network
    as shown in Figure [11-3(a)](#Fig3).
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在训练自动编码器时，我们取编码器部分的第一隐藏层以及输入，输入与输出相同，并创建一个新的网络，如图 [11-3(a)](#Fig3) 所示。
- en: '![](../images/611710_1_En_11_Chapter/611710_1_En_11_Fig3_HTML.jpg)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/611710_1_En_11_Chapter/611710_1_En_11_Fig3_HTML.jpg)'
- en: Figure 11-3
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-3
- en: Learning the weights of the first, second, and third hidden layers
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 学习第一、第二和第三隐藏层的权重
- en: After training this network, we obtain the weights of H[1]. Once the weights
    of H[1] have been obtained, we take H[1] as the input and the output of the new
    network and learn H[2] as shown in Figure [11-3(b)](#Fig3).
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 在训练这个网络之后，我们获得了 H[1] 的权重。一旦获得了 H[1] 的权重，我们将 H[1] 作为新网络的输入和输出，并如图 [11-3(b)](#Fig3)
    所示学习 H[2]。
- en: Likewise, we can learn the weights of H[3] (Figure [11-3(c)](#Fig3)) and so
    on and then construct the whole network (Figure [11-4](#Fig4)).
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，我们可以学习 H[3] 的权重（图 [11-3(c)](#Fig3)）以及如此等等，然后构建整个网络（图 [11-4](#Fig4)）。
- en: '![](../images/611710_1_En_11_Chapter/611710_1_En_11_Fig4_HTML.jpg)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/611710_1_En_11_Chapter/611710_1_En_11_Fig4_HTML.jpg)'
- en: Figure 11-4
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-4
- en: An autoencoder containing three hidden layers
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 包含三个隐藏层的自动编码器
- en: The weights of H[1], H[2], and H[3] are learned separately. Let us now have
    a look at some interesting applications of autoencoders.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: H[1]、H[2] 和 H[3] 的权重是分别学习的。现在让我们看看自动编码器的一些有趣的应用。
- en: Latent Representation Using Autoencoders
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用自动编码器进行潜在表示
- en: Experiment 1
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 实验 1
- en: As stated earlier, an autoencoder can be used to find an effective encoding
    for a given input. We generally use an under-complete autoencoder for this purpose.
    As an example, the following program reconstructs the MNIST dataset using an autoencoder
    in (Listing [11-1](#PC1)). To accomplish the task, we carry out the following
    steps.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，自动编码器可以用来找到一个给定输入的有效编码。我们通常使用欠完备自动编码器来完成这个任务。例如，以下程序使用自动编码器在（列表 [11-1](#PC1)）中重建
    MNIST 数据集。为了完成这个任务，我们执行以下步骤。
- en: '[PRE0]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: The training and validation loss curves are shown in Figure [11-5](#Fig5). Also,
    some of the reconstructed images are shown in Figure [11-6](#Fig6). The corresponding
    test images are shown in Figure [11-7](#Fig7).
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 训练和验证损失曲线如图 [11-5](#Fig5) 所示。同时，一些重建的图像如图 [11-6](#Fig6) 所示。相应的测试图像如图 [11-7](#Fig7)
    所示。
- en: '![](../images/611710_1_En_11_Chapter/611710_1_En_11_Fig7_HTML.jpg)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/611710_1_En_11_Chapter/611710_1_En_11_Fig7_HTML.jpg)'
- en: Figure 11-7
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-7
- en: Original test images
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 原始测试图像
- en: '![](../images/611710_1_En_11_Chapter/611710_1_En_11_Fig6_HTML.jpg)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/611710_1_En_11_Chapter/611710_1_En_11_Fig6_HTML.jpg)'
