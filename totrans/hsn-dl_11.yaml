    namely:'
  prefs: []
  type: TYPE_NORMAL
- en: Airplane
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Automobile
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
