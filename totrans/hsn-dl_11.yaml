- en: Some of the images of this dataset are shown in Figure [11-8](#Fig8).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_11_Chapter/611710_1_En_11_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11-8
  prefs: []
  type: TYPE_NORMAL
- en: Images of the CIFAR-10 dataset
  prefs: []
  type: TYPE_NORMAL
- en: It can be observed that the images are complex. It is slightly difficult to
