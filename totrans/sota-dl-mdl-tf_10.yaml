- en: With just a few epochs, we can see that the generated images begin to represent
    rock, paper, and scissors hands. But the generator and discriminator models we
    built are very simple. To generate realistic images, we need to create a much
    more robust model.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this chapter, we built a GAN with a feedforward network with mediocre generated
    facsimiles. With a DCGAN, generated facsimiles were much more realistic for Fashion-MNIST.
    For rock_paper_scissors, facsimiles weren’t great. We could try training the model
    for more epochs, but this takes a lot of time and may take more memory than your
    computer can handle.
  prefs: []
  type: TYPE_NORMAL
