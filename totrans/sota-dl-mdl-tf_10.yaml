- en: GAN Experiment
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A GAN can generate a high level of realism in the new data instances that it
    creates by pairing a generator that learns to produce the target output with a
    discriminator that learns to distinguish true data from the output of the generator.
    The generator tries to fool the discriminator, and the discriminator tries to
    keep from being fooled.
  prefs: []
  type: TYPE_NORMAL
- en: During training, the generator and discriminator have opposite goals. The discriminator
    tries to distinguish fake images from real ones. The generator tries to produce
    images that look real enough to trick the discriminator.
  prefs: []
  type: TYPE_NORMAL
- en: We begin with a simple feedforward GAN to show you how one can be trained on
    a simple dataset.
  prefs: []
  type: TYPE_NORMAL
