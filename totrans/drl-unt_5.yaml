- en: 5. Deep Reinforcement Learning
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'In the last chapter, we studied the various aspects of the brain-academy architecture
    of the ML Agents Toolkit and understood certain scripts that are very important
    for the agent to make a decision according to a policy. In this chapter, we will
    be looking into the core concepts of deep reinforcement learning (RL) through
    Python and its interaction with the C# scripts of the brain-academy architecture.
    We have had a glimpse of a part of deep RL when we briefly discussed the deep
    Q-learning algorithm using the OpenAI Gym environment (CartPole) and also when
    we were discussing the Baselines library of OpenAI. Through the course of training
    the ML Agents in Tensorflow through external brain, we have also used the proximal
    policy optimization (PPO) algorithm with the default hyperparameters present in
    the trainer_config.yaml file. We will be discussing these algorithms in depth
    along with several other algorithms from the actor critic paradigm. However, to
    fully understand this chapter, we have to understand how to build deep learning
    networks using Tensorflow and the Keras module. We also have to understand the
    basic concepts of deep learning and why it is required in the current context.
    Through this chapter we will also create neural network models for computer vision
    methods, which will be extremely important when we will be studying the GridWorld
    environment. Since we primarily have ray and camera sensors that provide the observation
    space to the agent, in most of the models, we will have two variants of policies:
    multi-layered perceptron (MLP-based networks) and convolution neural networks
    (CNN-2D-based networks). We will also be looking into other simulations and games
    that are created using the ML Agents Toolkit and will also try to train our models
    based on the Baseline implementations by OpenAI. However, let us first understand
    the fundamentals of generic neural network models in deep learning.'
  prefs: []
  type: TYPE_NORMAL
- en: Fundamentals of Neural Networks
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Since we have been training our agents and have also applied certain deep learning
    algorithms, we should understand how a neural network performs. The simplest form
    of a neural network is a perceptron model, which consists of an input layer, certain
    “hidden” layers, and an output layer. The generic requirement of deep learning
    or neural network-based models is to iteratively optimize a cost function, prominently
    referred to as a “loss” function based on certain constraints. In many cases,
    whenever we apply neural networks, it is assumed that the concerned function must
    be a continuously differentiable function, having nonlinearity. This also implies
    that the curve of the function will contain certain trajectories that are called
    “maxima” and “minima.” The former refers to the highest value of the function,
    while the later refers to the lowest one. In generic machine learning (ML), we
    are interested in finding a global minima of the curve with the assumption that
    the corresponding weights or coefficients of the function will be optimal and
    consistent to produce minimum error. However, in RL, we will see that both global
    minima as well as global maxima plays a significant role in policy gradients.
  prefs: []
  type: TYPE_NORMAL
- en: Perceptron Neural Network
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'For simplicity let us take a function where the value y depends on a value
    x in a two-dimensional plane. We will associate weights or coefficients with x
    and also add biases. In the context of Perceptron model, weights are the most
    important aspects, and we will be optimizing these weights iteratively using simple
    MLP networks. If we signify w to be the set of weights and b to be the set of
    biases for our model, we can write:'
  prefs: []
  type: TYPE_NORMAL
- en: y= σ (w.x + b),
  prefs: []
  type: TYPE_NORMAL
- en: 'where σ is a nonlinear function that relies on e (natural log), which is most
    commonly known as a sigmoid function. This nonlinear sigmoid function is represented
    as:'
  prefs: []
  type: TYPE_NORMAL
- en: σ(x)= 1/(1+e^((-x)))
  prefs: []
  type: TYPE_NORMAL
- en: Now, the importance of this particular nonlinear function is that it aids in
    the convergence of the loss function toward the global minima. These nonlinear
    functions are generally referred to as activation functions. The sigmoid function
    generally represents an S-shaped curve. There are several other functions that
    we will explore in our next sections, such as Softmax, Relu, and others. It is
    important to understand that these nonlinear transformations to the weighted function
    assist in the global convergence. We can create this simplified formulation of
    the sigmoid curve using Python through Jupyter Notebooks. We will import the math
    and matplotlib libraries for creating a scaled sigmoid graph. Let us open the
    Sigmoid-Curve.ipynb notebook. We will see that the sigmoid function implements
    the exponential equation of the sigmoid curve by using an array.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: After this we plot the curve using matplotlib and specify a uniform distribution
    of points from -10 to +10 along the x axis with a difference of 0.2 between any
    two points.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Upon running this, we will have a scaled sigmoid curve in our Jupyter Notebook,
    as shown in Figure [5-1](#Fig1), and we have created an activation function. This
    is a very important function when it comes to binary classification in generic
    ML, as we will be exploring briefly.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_5_Chapter/502041_1_En_5_Fig1_HTML.jpg](../images/502041_1_En_5_Chapter/502041_1_En_5_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-1
  prefs: []
  type: TYPE_NORMAL
- en: Sigmoid curve in Jupyter Notebook
  prefs: []
  type: TYPE_NORMAL
- en: 'In general iterative gradient-based learning, there are three fundamental steps:'
  prefs: []
  type: TYPE_NORMAL
- en: forward pass
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: error computation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: backward pass
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Forward pass** **:** This is the first stage in which the value of y is computed
    after multiplying the input vectors (inputs) with the weight vector (weights)
    and adding bias vector(bias), if required. It is to be kept in mind that in ML,
    we will be dealing with tensors, which are matrices effectively for all the input
    and outputs. Hence the letters y, w, and x represent vectors or matrices rather
    than a single valued function. We saw this in the section where the following
    equation was shown:'
  prefs: []
  type: TYPE_NORMAL
- en: y= σ (w.x + b)
  prefs: []
  type: TYPE_NORMAL
- en: '**Error computation** **:** Since we will be running our perceptron neural
    network against a certain “ground truth” data set to be validated as to what extent
    the network is predicting correct outputs based on the input tensors, weight matrices,
    and biases. Here lies an important concept of error computation between each iterative
    learning phase. Effectively the error in each epoch is considered to be the absolute
    difference between the predicted output tensor and the actual output tensor.'
  prefs: []
  type: TYPE_NORMAL
- en: ∆= |y^’-y|,
  prefs: []
  type: TYPE_NORMAL
- en: 'where ∆ is the error term. Now we will be considering an important metric,
    referred to as the mean-squared-error, which is given by the formulation:'
  prefs: []
  type: TYPE_NORMAL
- en: ∆[mse]= 0.5 ( y^’-y)²
  prefs: []
  type: TYPE_NORMAL
- en: This equation, referred to as the loss function or quadratic cost function,
    is extremely important in generic learning because we will be using it in the
    next step to compute the gradients.
  prefs: []
  type: TYPE_NORMAL
- en: '**Backward pass** **:** This is a very important step that deals with the following
    updates.'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_5_Chapter/502041_1_En_5_Fig2_HTML.jpg](../images/502041_1_En_5_Chapter/502041_1_En_5_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-2
  prefs: []
  type: TYPE_NORMAL
- en: Gradient Descent algorithm in BackPropagation
  prefs: []
  type: TYPE_NORMAL
- en: '**Compute gradients:** The mean-squared-error computed in the previous equation
    needs to be partially differentiated to update the weights for the next epoch
    and also to find a proper convergence of the algorithm. This implies that we have
    to differentiate the error in the previous step with respect to the weight matrix.
    Mathematically this can be shown as:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: J= ∂ ∆[mse] /∂w,
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'which effectively implies that we have to partially differentiate the error
    term with respect to the weight matrix by using chain rule of differentiation.
    The chain rule can be stated as :'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: d(xy) = [y(dx) + x(dy)] (dx),
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: where xy is a continuously differentiable function of f(x, y).
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'We have to partially differentiate the function y, with respect to w. In generic
    partial differentiation technique, we have to compute the derivative of the term
    with which the derivative can be computed and keep the rest as constant. For instance,
    if an equation is of form f(x, y)=xy, then if we are required to partially differentiate
    f with respect to x, we would have:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: ∂(f(x, y)) =[y (d(x)/dx) + x(d(y)/dx)]∂x,
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'where d(f(x))/dx represents normal differentiation of a function. By rules
    of calculus, this yields:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: ∂(f(x, y)) = [y]∂x,
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'as differentiation of a constant is computed as 0; hence, the second term vanishes.
    Now since we used a sigmoid curve as our activation, we have the partial derivative
    of the loss function as follows:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: ∂(y) =[ [d(σ(y))/d(y)][d(y)/dw]]∂w,
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'by the laws of chain rule in differentiation. Now the derivative of a sigmoid
    curve is simply given by:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: d(σ(θ)) = θ(1-θ) d(θ),
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'where θ is any polynomial function, which in this case is y. The derivative
    of the second part can be computed by following the chain rule:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: d(y)/dw = w(d(x)/dw) + x(d(w)/dw) + (db/dw)
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Now since this is partial differentiation, we will be removing derivatives
    of constants (d(x)/dw and d(b)/dw), which effectively reduces our final equation,
    which can appear like this:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: ∂(y) = [[y(1-y)] (x)(d(w)/dw)]∂w
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Now we have used the ∆[mse] as the error function, and if we have to compute
    the partial derivative of ∆[mse], then we can write:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: ∂(∆[mse]) = [0.5* 2(d|y^’-y|/dw)]∂w
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Now y^’ is the actual value for validation and y is the predicted value; hence,
    effectively we have to do a partial derivative of y, which has already been computed.
    This entire process is used to find the gradients of the loss function at each
    step of the learning process.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Back propagation** **:** The most important part of the weight update rule
    in generic ML. After we compute the gradients, we then propagate those gradients
    along the way from the output tensors to the input tensors. Since in our case,
    we used a simple sigmoid Perceptron model without any hidden layers, in many complex
    neural networks, we will be having many hidden layers. This implies each and every
    hidden layer will consist of individual perceptron units like the one we used.
    For our case, since there are no hidden layers, we simply update the weight tensor
    using the rule :'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: w= w – α( J),
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: where J= ∂ ∆[mse] /∂[w], α is the learning rate. In this context, this weight
    update rule is associated with the gradient descent algorithm. As mentioned before,
    the major backbone of supervised ML is to optimize a loss function by updating
    the weights and converging to a global minima. Keeping this in mind, it is considered
    in gradient descent that the trajectory of the weight update policy should be
    along the steepest slope of convergence. However in many cases, gradient descent
    may not be useful, as it may overfit the data set. This implies that the policy
    may oscillate along the vicinity of the global minima and never converge, or it
    may be stuck in a local minima. That is where the symbol α comes into the picture.
    The α is termed as the learning rate, which modulates the step size to be taken
    by the policy to reach the global minima. But it has been observed that this does
    not solve the issue of local oscillation of the converging algorithm; hence, there
    have been several developments to optimize the gradient descent algorithm by using
    certain momentum. Throughout the deep learning module, we will be using optimizers
    exhaustively while writing our neural networks for different deep RL algorithms.
    Some of the most prominent optimizers include Adam, Adagrad, and Adadelta, while
    older variations include RMSProp and SGD. These optimizers use momentum coupled
    with stochastic gradient convergence algorithms to modulate the step size. We
    can visualize a simple gradient descent convergence using the Stochastic Gradient
    Descent (SGD) algorithm, as shown in Figure [5-2](#Fig2).
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: This can be visualized by running the Plotting Gradient Descent.ipynb Notebook
    .
  prefs: []
  type: TYPE_NORMAL
- en: Effectively we studied backpropagation using a simple Perceptron model, and
    this completes the introductory part of a fundamental neural network, which includes
    sigmoid activation, error computation, and weight update policy using gradient
    descent algorithm and backpropagation to the input layer. This model can be illustrated
    as shown in Figure [5-3](#Fig3).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_5_Chapter/502041_1_En_5_Fig3_HTML.jpg](../images/502041_1_En_5_Chapter/502041_1_En_5_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-3
  prefs: []
  type: TYPE_NORMAL
- en: Feed-forward perceptron neural network model
  prefs: []
  type: TYPE_NORMAL
- en: In the next section, we will study a comparatively dense network and understand
    the concept of backpropagation for that model. Without loss of generality, all
    the layers involved in a particular neural network are based on certain matrices/tensors
    for computation, and in most of the cases, multiplication is called “dot” operation
    of product between two or more tensors. Since all these partial differentiation
    rules will be applicable to these layers, or rather these tensors, we can think
    that there will be several matrix/tensor computations required. However, the three
    stages of forward pass, error computation, and backward pass remain the same for
    most of the neural network models. We will be looking at MLP dense network and
    convolution network.
  prefs: []
  type: TYPE_NORMAL
- en: Dense Neural Network
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now let us understand the fundamentals of a dense network having hidden layers
    that are perceptron units. This is the most common neural network model that we
    will be using and can be visualized as shown in Figure [5-4](#Fig4).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_5_Chapter/502041_1_En_5_Fig4_HTML.jpg](../images/502041_1_En_5_Chapter/502041_1_En_5_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-4
  prefs: []
  type: TYPE_NORMAL
- en: Dense neural network with hidden layer
  prefs: []
  type: TYPE_NORMAL
- en: The interesting aspect is that the hidden layers consist of perceptron modules
    having different activation functions. These perceptron units of the hidden layer
    are then superimposed to generate a cumulative loss function. In this case, we
    will consider the three stages as mentioned—the forward pass, error computation,
    and the backward pass.
  prefs: []
  type: TYPE_NORMAL
- en: '**Forward pass** **:** In this case, let us assume that the perceptrons in
    the hidden layer have only sigmoid activation. Also the weights and the inputs
    are tensors or matrices. Let us assume that l represents the hidden layer and
    (l-1) represents the input layer. The corresponding weights for the connection
    between the k^(th) neuron in the (l-1)^(th) and the j^(th) neuron in the l^(th)
    layer are denoted by w^l[jk]. Now if we assume a bias tensor in the l^(th) layer
    as b^l and the input tensor from the k^(th) neuron in the previous (l-1)^(th)
    layer as x^(l-1)[k], the forward pass equation or the weighted neuron function
    can be framed as:'
  prefs: []
  type: TYPE_NORMAL
- en: y^l[j] =σ (∑w^l[jk] x^(l-1)[k] + b^l[j])
  prefs: []
  type: TYPE_NORMAL
- en: 'Generally if the activations are different for each Perceptron model, then
    the equation can be modified as:'
  prefs: []
  type: TYPE_NORMAL
- en: y^l[j] =f (∑w^l[jk] x^(l-1)[k] + b^l[j]),
  prefs: []
  type: TYPE_NORMAL
- en: where f is any activation function such as tanh, softmax, and so on. Once we
    have attained the loss function, we have to determine the errors, which is also
    known as the cost function.
  prefs: []
  type: TYPE_NORMAL
- en: '**Error computation** **:** We will consider the mean squared error metric,
    which is also referred to as the quadratic cost or loss function. Correspondingly,
    this can be represented by the equation:'
  prefs: []
  type: TYPE_NORMAL
- en: ∆[mse]= 0.5 ( y^(**’**)-y)²
  prefs: []
  type: TYPE_NORMAL
- en: 'Now in this dense network case, we will have a sampled cost function across
    n training samples. Also the y should be replaced by the new loss function that
    we have explored. Changing these details leads to the similar equation:'
  prefs: []
  type: TYPE_NORMAL
- en: ∆[mse]= (1/2n) ∑(y^(**’**)-y ^l[j])²
  prefs: []
  type: TYPE_NORMAL
- en: 'For one particular training sample, this equation can be simplified as:'
  prefs: []
  type: TYPE_NORMAL
- en: ∆[mse]=C= (1/2) ∑(y^’-y ^l[j])²,
  prefs: []
  type: TYPE_NORMAL
- en: where we denote it by using the symbol C for simplicity.
  prefs: []
  type: TYPE_NORMAL
- en: '**Backward pass** **:** In this case, as mentioned, the most important aspects
    are gradient computation and error backpropagation. In this case we will be using
    partial derivatives to find out gradients like before, with the exception that
    in this case there is a hidden layer.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Backpropagation: This implies that instead of computing a single layer derivative
    with respect to the weights like in simple perceptrons, we have to compute these
    gradients for all the perceptrons in the hidden layer, and then we have to backpropagate
    these gradients to the input layer. First we will be computing the gradient flow
    between the outer layer and the hidden layer.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Output-Hidden Layer Gradient Flow**'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'We will be partially differentiating with respect to the weights w^l[jk] as
    well as the biases b^l[j]. This can be represented as ∂C/∂ w^l[jk] and ∂C/∂ b^l[j],
    respectively. For the sake of simplicity, we will be regarding the bias as constant.
    However, we also have to compute the hidden layer gradients. For computing this
    we have to partially differentiate the cost function in the form shown here:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: ∂C/∂ w^l [j] =[∂C/∂y^l[j] ] [∂ y^l[j]/ ∂ w^l],
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'where the weights w^l [j] represent the weights of the j^(th) neuron in the
    l^(th) layer and is y^l[j] the output tensor for that layer. This implies we have
    to perform differentiation of the sigmoid activation-based output for ∂ y^l[j]/
    ∂ w^l. For simplicity, let us consider the differentiated formula for this layer
    as:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: ∂ y^l[j]=[d(σ(z))/d w^l [j]] ∂ w^l,
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'where z is defined as z = σ (∑w^l[jk] x^(l-1)[k] + b^l[j]) for a particular
    neuron in the hidden layer. If we simplify this equation, we can represent this
    in a reduced form:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: ∆^l[j] = ∂C/∂ w^l [j]=[∂C/∂y^l[j] ] [d(σ(z))/d w^l [j]]
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'This can also be represented as:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: ∆ ^l[j] = [∂C/∂y^l[j] ]σ^(**’**)(z),
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: where σ^(**’**)(z) = [d(σ(z))/d w^l [j]]
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: The next step is the propagation of these gradients through the hidden layer
    to the input layer. This also implies that if we had another hidden layer in between
    the current input and hidden layers, then the gradients would have flowed through
    this layer as well. This implies that as the layers increase, we have to compute
    the partial derivatives repeatedly using the chain rule.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Hidden to Input Layer or Hidden to Internal** **Hidden Layers** **:**'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Because, in our case, we have the hidden layer directly being fed from the
    input layer, gradient propagation step is simple as:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: ∂C/∂ w^l [j] =∑ (w^l[jk] x^(l-1)[k]) σ^(**’**)(z)
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'This is because we have already computed the gradients with respect to the
    weights through the single hidden layer. The only step now remaining is to update
    the weights by subtracting/adding the gradients for a better optimality:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: w^l[jk] = w^l[jk] – α[∂C/∂ w^l [j]],
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'where α is the learning rate. For our dense network consisting of a single
    hidden layer, this pretty much concludes the backpropagation step and the gradient
    updates. It has to be kept in mind that these computations are performed on tensors,
    and generally for computation, Hadamard product is used. Hadamard product of two
    tensor or two matrices is a pairwise multiplication of the elements of the matrices
    present in the same location inside the matrices. In other words, it forms an
    element-wise multiplication of the two tensors (vectors). For instance:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[1 2] סּ'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[4 5] =[1*4 2*5 ]'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: = [4 10]
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Now we will look into the case when the hidden layer feeds from another hidden
    layer, which is the most common architecture in a multi-layered dense network.
    In this case, if we assume that there is another hidden layer, we have to partially
    differentiate that layer as well. Let us consider w^(l-1)[ki], which represents
    the weights for the connection between the i^(th) neuron in the (l-1)^(th) and
    the k^(th) neuron in the l^(th) layer. Now effectively the weighted neuron function
    would be similar to this:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: y^l[j] =σ (∑w^l[jk] (σ (∑w^(l-1)[ki] x^(l-2)[i] + b^l[k]))+ b^l[j])
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: In this case, we replaced the x^(l-1)[k] part of the output layer with the weighted
    neuron function of the previous hidden layer. In this case, we are looking into
    a two-hidden-layer-based model, where the input layer i directs data to the first
    hidden layer k which inturn directs data to the second hidden layer j. Every layer
    has their corresponding biases, and for simplicity we will consider them to be
    nonfunctional constants. That is why the second hidden layer (j^(th) layer) essentially
    takes as input the first weighted neuron hidden layer given by σ (∑w^(l-1)[ki]
    x^(l-2)[i] + b^l[k]), and the first hidden layer is just a sigmoid activated weighted
    hidden layer taking input from the input layer. In this case, if we were to backpropagate
    the gradients, it would be a chain partial derivative rule as follows.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'For the outer-last hidden layer, the gradient can be represented as:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: ∂C/∂ w^l [j] =[∂C/∂y^l[j] ] [∂ y^l[j]/ ∂ w^l]
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'For this layer the weight update rule can be written as discussed earlier:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: w^l[jk] = w^l[jk] – α[∂C/∂ w^l [j]]
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'For the last hidden layer to the second last hidden layer (or the first hidden
    layer in our case):'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: ∂C/∂ w^(l -1)[k] = [∂C/∂y^l[j] ] [∂ y^l[j]/ ∂ w^l] [∂w^l/∂y^(l-1)[k] ] [∂ y^(l-1)[k]/
    ∂ w^(l-1)]
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Now for the weight update in this first hidden layer we just have to compute:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: w^(l-1)[ki] = w^(l-1)[kl] – α[∂C/∂ w^(l-1) [k]]
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Now let us generalize this approach for n-hidden-layer-based dense networks.
    The gradient flow can be generalized as:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: ∂C/∂ w^(net)= [∂C/∂y^(net) ] [∂ y^(net)/ ∂ w^(net)] [∂C/∂y^(net-1) ] [∂ y^(net-1)/
    ∂ w^(net-1)]…
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: ….[∂C/∂y^(net) ] [∂ y¹/ ∂ w¹]
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: This is the generic form of gradient flow through dense networks where the optimization
    functions assist in the global convergence. This forms the backpropagation algorithm,
    which is the heart of deep learning and convergence. This is important, as when
    we design networks for our ML Agents using different RL algorithms such as deep
    Q-network (DQN), actor critic networks, policy gradients, and other off-policy
    algorithms, we will be using the dense MLP neural network library from Keras (Tensorflow).
    To summarize the backpropagation module, the weight update for the outer neuron
    (outer-hidden layer ) is ∂C/∂ w^(net)= [∂C/∂y^(net) ] [∂ y^(net)/ ∂ w^(net)],
    whereas for other neurons (hidden–previous hidden or hidden-input), the update
    rule becomes the chain partial differentiation of the individual weighted functions
    (with activations) with respect to the weights.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: We have understood the dense neural network architecture and also found how
    partial derivatives play an important role in determining the error updates and
    the gradient flow through the network. This is important in the supervised form
    of learning, which learns by minimizing the error at each step. The DQN on CartPole
    that we created in the first chapter is based on minimization of the error on
    the value Function via a multi-layer perceptron neural network (dense network).
    As we would progress more, we would see how value and policy functions interact
    and why policy gradients are very important in deep RL. But before we venture
    into the algorithms, we should be familiar with writing our own dense networks
    using Keras. Let us also explore another neural network model before going to
    the code segment-CNN.
  prefs: []
  type: TYPE_NORMAL
- en: Convolution Neural Network
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This is another variant of neural networks, which are most commonly used for
    image analysis. The CNN consists of applying certain nonlinear functions for spatial
    analysis of pixels in an image. These are termed as features which are extracted
    from the image. These features are then passed as an input through a dense neural
    network model. This is very important because in GridWorld, the PPO algorithm
    uses convolution layers (2D) for image analysis and then instructs the agent to
    make decisions accordingly. In most of the Atari 2D games, these CNN models are
    extremely important to understand the image (pixels) present in particular frame;
    for example, guide an agent to play the game of ping pong (“Pong” in the Gym environment)
    through analyzing the image of the gameplay at a particular frame and then passing
    it through the CNN model.
  prefs: []
  type: TYPE_NORMAL
- en: Now let us consider the architecture of a sample convolution model. It consists
    of a convolution layer, pooling layer, and a dense network layer. Although there
    are several other layers, such as the padding layer/flattening layer, that are
    applied, the fundamental parts remain the same. In this case, the image is passed
    as an input to the network, which is analyzed and passed to the dense network.
    Based on the depth of the input (RGB or grayscale), the channels can be either
    3 or 1, respectively. To illustrate, the convolution model looks like the one
    shown in Figure [5-5](#Fig5).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_5_Chapter/502041_1_En_5_Fig5_HTML.png](../images/502041_1_En_5_Chapter/502041_1_En_5_Fig5_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-5
  prefs: []
  type: TYPE_NORMAL
- en: Convolution neural network model
  prefs: []
  type: TYPE_NORMAL
- en: Depending on the parameters of the input, the CNN can have different dimensions.
  prefs: []
  type: TYPE_NORMAL
- en: '**Convolution 1D:** This is applied when the input is a one-dimensional sequence
    of probabilistic data. Such data is generally in the form of a 1D vector such
    as an array. This kind of model is used in time-series forecasting where the input
    data is a sequence of probability values.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Convolution 2D:** This is the most important dimension for our use-case.
    The input layer consists of image data—pixels (either 3 or 1 channel[s]). In this
    case, the CNN model is applied on static images that do not have temporal attributes.
    Spatial attributes or features are extracted based on the height and width of
    the image. Hence the size of input for 2D convolutions can be five units (height,
    width, and three channels for RGB) or three units (height, width, and one channel
    for grayscale) for RGB or grayscale data, respectively. In our use-case, we will
    be studying this model, as it will analyse the images of each frame of the ML
    Agents environment (Gridworld) in RGB format (five channels) and pass it to dense
    networks.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Convolution 3D** **:** This is used for analyzing video information. Hence,
    along with spatial data, there is an associated temporal component to each pixel
    data. The temporal component defines the changes in the pixels for each frame
    of a video. With the addition of the temporal channel, the effective input size
    (channels) for the convolution 3D model becomes six units (height, width, and
    three channels for RGB; one temporal channel) and four units (height, width, and
    one channel for grayscale; one temporal channel) for RGB and grayscale pixels,
    respectively.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now, let us study the convolution network in terms of its components.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_5_Chapter/502041_1_En_5_Fig6_HTML.png](../images/502041_1_En_5_Chapter/502041_1_En_5_Fig6_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-6
  prefs: []
  type: TYPE_NORMAL
- en: Convolution layer in CNN and convolved image dimensions
  prefs: []
  type: TYPE_NORMAL
- en: 'Convolution layer: This layer is associated with extracting spatial features
    from pixels in an image. It consists of certain filters or kernels that try to
    extract those features by convolving. Convolution is a mathematical operation
    where an image I is passed through a filter (kernel) K of dimensions k[1] x k[2],
    can be represented as:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I*K = ∑^(k1 -1)[m]∑^(k2 -1)[n] I(i-m, j-n)K(m, n) =∑^(k1 -1)[m]∑^(k2 -1)[n]
    I(i+m, j+n)K(-m,-n)
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'This operation is similar to cross-correlation operation with a kernel that
    can change its signs, implying K(m, n)=k(-m,-n). Now if we consider the input
    to be in the form of RGB, then the number of channels will be 5–width, height,
    and three channels for RGB. Hence the dimensions of the image I will be of order
    H x W x C, where H, W, and C represent the height, width, and the color channels.
    For D number of kernels of sizes, we can have the total kernel dimensions as k[1]
    x k[2] x C x D. If we assume bias for D filters as b, then we can frame the convolution
    weighted neuron equation as :'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: (I*K)= ∑^(k1 -1)[m]∑^(k2 -1)[n]∑^C[c=1] K(m, n, c).I(i+m, j+n) + b
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: This is a general convolution equation to extract the features. There are certain
    metrics associated with convolution, which are referred to as hyperparameters.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Depth:** This signifies the depth of the kernel or filters, which also computed
    the different features to extract from the input image. In the dense network at
    the end layer of the CNN model, the depth also signifies the number of hidden
    layers in the dense model.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Stride:** This controls the depth columns around the spatial dimensions (height
    and width). If we specify a stride value of 1, then the kernel will move one pixel
    at a time, which may lead to overlapping of the extracted fields. If a value of
    2 is assigned, then it jumps two pixels at a time. Generally as the stride increases
    to a value more than 3, the spatial dimension of the output decreases. We denote
    the stride using the symbol S.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Padding:** The padding layer or zero padding layer is used to pad the input
    image dimensions spatially (along height and width). This feature enables us to
    control the spatial size of the output volume.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'It is important to mention the relationship between the dimensions of the input
    and the output of a convolution layer. Convolution between the input feature map
    of dimension H X W and weight kernel of dimension k[1] X k[2] produces an output
    feature map of dimensions:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: dim(O) = (H - k1 + 1) x (W - k2 + 1).
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'There is another formulation of the output volume based on the stride S and
    the zero padding P, given by:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: dim(O) = ([(H x W) – (k1 x k2) + 2P]/S) + 1= ([Z-K+2P]/S + 1,
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: where Z represents the input volume and K represents the kernel dimensions.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'This value should be an integer so that the neurons fit perfectly to extract
    the features. For instance if we take an input image of dimensions [11,11,4] (Z
    = 11), and we take a kernel size of value 5 (K = 5), and we use no zero padding
    (P = 0) followed by a stride value of 2 (S = 2), we can get the dimension of the
    output layer as:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: dim(O) = ([11-5 + 2*0]/2)+1 =4
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: This implies the output dimension is of size 4 X 4\. For this case we get an
    integer output as 4, but in many cases, we see that some invalid combinations
    of these values may give fractional results in output dimensions. For instance,
    if Z = 10 with no zero padding(P = 0) and kernel dimension of 3 (K = 3), then
    it would not be possible to have a stride of 2 as, ([Z-K+2P]/S + 1 = ([10-3+0]/2)+1
    = 4.5, which is a fractional value. In this way, the constraints are applied on
    the strides, and in many cases, automatic exceptions are thrown if there are invalid
    combinations of these values. An illustration with input dimension Z = 3 with
    1 zero-padding (P = 1), kernel size of 1(K = 1), and stride of 2, which gives
    an output dimension of ([Z-K+2P]/S + 1 = ([3-1+2*1]/2)+1 = 3 is shown in Figure
    [5-6](#Fig6).
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: There is another interesting fact of this layer, which is called parameter sharing.
    This helps to reduce the dimensions of the input to reduce the computation. This
    is based on the assumption that if one feature is useful to compute at some spatial
    position (x, y), then it should be useful to compute at a different position (x[2],
    y[2]). Let us assume that we have an output of a convolution layer with the dimensions
    [55*55*96] with a depth channel of 96, then we can apply the same weights and
    biases to constrain the neurons in each depth slice, instead of having different
    biases and weights for all the 96 different depth slices. This aids in the backpropagation
    step, because the gradients (which flow through the layers) will be added across
    each individual depth slice and update a single set of weight instead of 96 different
    weights.
  prefs: []
  type: TYPE_NORMAL
- en: '**Pooling layer** **:** This layer is used to reduce the spatial dimensions
    progressively by reducing the parameters and also the computation in the network.
    It is used in between convolution layers as well as at the end of the convolution
    layer. This layer operates on an individual depth slice or depth channel using
    the maximization operation, and hence this is termed MaxPooling. The most generic
    form of max pooling is done with filters of size 2 X 2 applied with a stride of
    2, which downsamples every depth channel by 2 along both the width and the height.
    The output of this layer can be computed as:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: dim(O) = ([Z-K]/S) + 1,
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: where Z represents the height or the width of the image, K is the dimension
    of the kernel, and S is the stride (like earlier). In addition to max pooling,
    there are other metrics of pooling that are applied, one of the most important
    being the L2-Norm pooling. L2–Norm is a Euclidean regularization metric that uses
    squared error function as the regularizing equation. This is also referred to
    as an AveragePooling method.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Flattening layer** **:** This layer is used to compress or flatten the outputs
    of the pooling layer or the convolution layer to produce a sequence of values
    that are essentially the inputs to the dense neural network. As we already studied
    the dense network architecture, this compression is required to produce a sequence
    of inputs that can be used by the input layer of the dense network. For instance,
    after applying a kernel size of [3,3] on a 64 layer depth convolution 2D layer
    on an input image of dimensions [32,32,3], a stride of 2, and zero padding of
    value 1, we get the output shape as:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: ([Z-K+2P]/S + 1= ([32-3 + 1]/2)+1= 16,
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: which implies an output dimension of [16,16,64]. Now if we apply the flatten
    layer on this output sequence, the effective dimension would be 16*16*64 = [16384].
    Thus this layer produces a one-dimensional input sequence that can be fed to the
    dense network. This layer does not affect the batch size.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Dense network** **:** This forms the final part of a traditional CNN model.
    Here the most interesting part is the backpropagation of the convolved, max-pooled,
    weighted neuron model. Before we enter into this layer, let us understand the
    backpropagation in the convolution layer that we mentioned.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Backpropagation in convolution layer** **:** In backpropagation of the convolution
    layer, we also follow the chain rule of partial differentiation to update the
    gradients similar to the dense network. The gradient component for the individual
    weights can be obtained by:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: ∂C/∂w^l[m, n] = ∑^(H-k1)[i]∑^(W-k2)[j] [∂C/∂y^l[m, n]] [∂y^l[m, n] /∂w^l[m,
    n]],
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'where H X W are the input dimensions, and C is the cost function or the quadratic
    loss function. w^l[m, n] refers to the weights of the m^(th) neuron in the l^(th)
    layer. y^l[m, n] represents the sigmoid activated weighted neuron equation of:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: y^l[m, n] = σ( ∑[m]∑ [n] w^l[m, n] x^(l-1)[i+m, j+n] + b^l)
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Since in this case we have an image as an input instead of a 1D array, the
    backpropagation model for the convolution network takes as input the dimensions
    along the different channels of inputs along with the kernel weights and biases.
    The rest of the derivatives are similar to the generic chain rule, which can be
    reframed as:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: ∂C/∂w^l[m, n] =∂/∂w^l[m, n] [σ( ∑[m]∑ [n] w^l[m, n] x^(l-1)[i+m, j+n] + b^l)]
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'We can expand this equation further according to the depth of the convolution
    layer and perform the chain rule of partial differentiation as long as the depth
    channel is not exhausted. In this case, we used the sigmoid activation; however,
    in general convolution 2D networks we use “Relu” or regularized linear unit as
    the activation function. The Relu can be denoted as:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: ReLu(x)= max(0, x)
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Therefore, this activation is a straight line for x greater than 0 and is on
    the negative x axis for x less than 0\. This implies it takes the maximum positive
    values.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Backpropagation in dense network** **:** This is similar to the backpropagation
    and gradient flow in the dense network that we studied. After the flatten layer,
    we get a compressed layer composed of weights, inputs, and biases. Based on the
    type of problem, we can associate different activation functions. For instance,
    in the case of a binary classification problem, we will be using the sigmoid function
    as mentioned in the previous sections. For multiclass classifications, we have
    to use the “softmax” activation function, which was represented in Chapter [1](502041_1_En_1_Chapter.xhtml)
    in the Multi-Armed Bandits section.'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: This completes the architecture of the convolution 2D neural network, which
    we will be creating using the Keras library in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: Deep Learning with Keras and TensorFlow
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We will now create dense and convolution neural networks using the Keras/Tensorflow
    framework. Keras is a high-level API that uses the Tensorflow as its back end
    for creating the neural networks and is very easy to use. In this section we will
    first create a dense MLP neural network, and then we will be creating standard
    convolution neural network models, which are state of the art and are used extensively
    in computer vision.
  prefs: []
  type: TYPE_NORMAL
- en: Dense Neural Network
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We will be creating this using the Keras framework, and we require certain
    libraries for this. We have already installed Tensorflow and Keras in our previous
    chapters, and we will import these in our Notebook. Open “Intro-To-Keras-Sequential.ipynb”
    Jupyter Notebook, and in the first section we will see the following commands:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: In our case, we will be creating the dense network for a binary classification
    problem. A binary classification problem has only two outcomes, and in this case,
    the sigmoid function is used as the activation function. The Keras API has a module
    called as “models,” which contain the different architecture of the models inside
    that framework. The sequential model specifies that the different layers of the
    deep learning model will be placed sequentially one after another, which implies
    the output of a layer will be the input to the next layer, as in the case of a
    dense MLP. The layers module in Keras specifies the different types of layers
    we would want to include in our model; for example, dense specifies a dense MLP
    network with hidden layers, flatten” specifies the flattening layer that we looked
    at in convolution neural networks, Convolution2D for a convolution layer, and
    many more. We will be exploring these layers as the chapter progresses. There
    are different ways of writing code for creating a deep learning network, but there
    are certain restrictions. In the most common cases, we will be using the Keras
    API and will be calling functions such as Dense() to create a dense MLP layer;
    however, there are alternate writing techniques that use the Keras functional
    API from Tensorflow. To create the same dense layer using the second form, we
    will be writing as keras.layers.Dense(). We will be using these notations to represent
    the models in our chapter.
  prefs: []
  type: TYPE_NORMAL
- en: In the next section, we have an “inp_data” method that creates synthetic data
    for running our deep learning model. We initialize a tensor of size [512,512]
    with random values called the data and also create a [512,1] dimension tensor
    as the labeling set that contains the binary outputs, 1 or 0s. All these are assigned
    randomly just for simplicity. In generic supervised learning, we have an initial
    labeling set associated with the data, which is our validation data set. Based
    on the outcomes of the deep learning model for each epoch, the errors are computed
    based on the difference of these outcomes with the validation data sets.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'The next part contains the model building function–“build_model” method. This
    method contains the sequential module from Keras.models as mentioned. Then we
    have the dense network represented by the method “Dense().” There are several
    parameters inside this dense network, including:'
  prefs: []
  type: TYPE_NORMAL
- en: '**units:** This represents the dimensionality of the output space, which in
    our case is binary; hence, we require a 1D container (vector, array) as output.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**input_dim:** This represents the dimensions of the input to the dense network.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**activation:** This represents the activation function, such as sigmoid, softmax,
    relu, elu etc.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**use_bias:** This specifies whether we would want to use bias in our dense
    network.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**bias_initializer:** This signifies the initialized bias tensor in the network.
    There are several initializers, such as zeros, ones, etc.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**kernel_initializer:** This initializes the weight tensor and can have different
    initializers. The most common, which we will be using, is glorot_uniform, which
    is a Xavier initializer. There are variants such as uniform or normal initializers
    as well.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**bias_regularizer:** This signifies the regularization of the bias tensor.
    This is used when we would want to prevent excessive overfitting in deep learning
    and assists in gradient descent by modifying the steps sizes.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**kernel_regularizer:** This is similar to bias regularizer but for the kernel
    weight tensor. There are variants that use the L1 and L2 regularization norm for
    penalizing the learning rate to assist in gradient descent.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**bias_constraints:** The constraints applied to the bias tensor'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**kernel_constraints:**The constraints applied on the kernel weight tensor'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Now we have an overview of the parameters of the Dense method, and we can write
    a single dense neural network model using Keras. The “model.compile” method is
    used for compiling the model and associating the inputs and outputs of the neural
    network. This part contains:'
  prefs: []
  type: TYPE_NORMAL
- en: '**optimizers:** This includes different gradient descent optimizers that assist
    in finding the global minima, such as SGD, RMSProp, Adam, Adagrad, Adadelta, and
    many more.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**loss:** This signifies the entropy loss and can be binary or categorical
    based on our requirements. The binary loss is a logistic (sigmoid) entropy loss
    while the categorical is a softmax entropy loss.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**metrics:** These specify the metrics on which to benchmark the model such
    as accuracy, mean-squared-error(mse), mean-absolute-error(mae) and others.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'We can now create the function as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'The next part contains the “train” method, which calls the models and fits
    the input data for training. The “model.fit” method is used for fitting the input
    data for training in different batches, each batch containing a certain portion
    of the input, which in our case is designated by using the batch size. The parameters
    used here are:'
  prefs: []
  type: TYPE_NORMAL
- en: '**inputs:** the input data to train the model'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**labels:** the labels present in the data for prediction and classification'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**epochs:** the number of epochs we would want to train the model'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**batch_size:** the size of the individual batch of input to be passed to the
    input layer. In our case, we use a value of 64.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**verbose:** This signifies the pattern in which the logs of the training for
    each epoch would be displayed.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'This can be done using the following lines:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: The final part of the segment contains the “main()” method, which calls the
    “inp_data” method to generate randomized tensors as inputs and labels, then calls
    the “build_model” method to create the sequential model, and finally trains the
    model using the “train” method. The “model.summary” method provides a view of
    the architecture of the sequential model.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Now if we train this model we would see the epochs, the accuracy for each step
    of training, the loss, and the associated details. To summarize the model, it
    would appear like Figure [5-7](#Fig7).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_5_Chapter/502041_1_En_5_Fig7_HTML.jpg](../images/502041_1_En_5_Chapter/502041_1_En_5_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-7
  prefs: []
  type: TYPE_NORMAL
- en: Sequential model containing a single dense neural network
  prefs: []
  type: TYPE_NORMAL
- en: 'Now let us visualize this training with the help of a Tensorboard. For this
    we will be using the same model with a different coding format. In this section
    we would see that we replace the “dense()” method with “keras.layers.Dense()”
    and the sequential method with the “keras.models.Sequential()” method. We also
    use the “keras.optimizers.RMSProp()” method, which contains the learning rate
    for the gradient descent. In this case, we are using the Keras API of the Tensorflow
    framework and the “build_model” method looks like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'Now for integrating TensorBoard, we have to specify the logs file, which holds
    the logs of the training data in date–time format. During visualization it fetches
    these logs for representing the metrics of training: loss, accuracy, and so forth.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: The next step is to update the “model.fit” method in the train function. Like
    we saw in previous chapters, we have to add “callbacks” and specify the TensorBoard
    logs file as a callback resource for real-time visualization.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: If we now run the main function, we will see the training and the corresponding
    logs in TensorBoard. A preview is shown in Figure [5-8](#Fig8).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_5_Chapter/502041_1_En_5_Fig8_HTML.jpg](../images/502041_1_En_5_Chapter/502041_1_En_5_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-8
  prefs: []
  type: TYPE_NORMAL
- en: Visualizing dense sequential model in TensorBoard
  prefs: []
  type: TYPE_NORMAL
- en: 'We have created a deep learning model with Keras, and this is the first step
    to create more diverse and complicated models, especially deep RL. Let us try
    to create a simple multi-layered dense sequential model for multi-class classification.
    In the “build_model” method in the next segment, we initialize a sequential model
    using the “keras.models.Sequential” method. Then we create a dense network containing
    256 units of output dimension with an input dimension of 20 units and a “Relu”
    activation unit. We then repeat a new dense layer that takes as input the output
    of the previous dense network. The dropout layer randomly sets the input units
    to 0 with a frequency of rate that prevents overfitting during training. Hence
    this layer is applicable only during training mode, as dropout does not freeze
    weights during training. Then we have dense layers with 64 units and “Relu” activation
    methods. The last layer is another dense layer, with 10 units and softmax activation
    for multi-class classification. The “model.compile” contains Adam optimizer from
    the “keras.optimizers.Adam()” method with a learning rate of 0.0001\. The loss
    in this context is a “categorical_crossentropy” that signifies the softmax loss
    with the metrics as accuracy. The following method is represented as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: When we call “model.summary” method, we can see the sequential networks as shown
    in Figure [5-9](#Fig9).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_5_Chapter/502041_1_En_5_Fig9_HTML.jpg](../images/502041_1_En_5_Chapter/502041_1_En_5_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-9
  prefs: []
  type: TYPE_NORMAL
- en: Sample multi-class classification model with dense networks
  prefs: []
  type: TYPE_NORMAL
- en: Now that we are familiar with dense neural networks, let us explore CNNs in
    Keras.
  prefs: []
  type: TYPE_NORMAL
- en: Convolution Neural Networks
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The CNN is a standard network model for computer vision exclusively for image
    classification, image generation, motion capture, and many other tasks. Before
    we venture into the Keras implementation of this network, we will look into the
    pretrained state-of-the-art models that we mentioned in our previous chapters,
    such as Resnet50, VGG16, and their variants. The first model that we will be looking
    into is the VGG-16 model, the 16 here refers to the number of layers inside the
    neural network.
  prefs: []
  type: TYPE_NORMAL
- en: '**VGG-16 Model** **:** This is a classic model that has sequential architecture.
    The following are the parts of this model:'
  prefs: []
  type: TYPE_NORMAL
- en: 2 convolution-2D layers with 64 depth channels and Kernel (Filter) size 3 x
    3 with padding kept as Same. “Same” padding is given by the ceiling value of the
    division of image width or height with stride—that is, dim(O)=ceil(Z/S)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 1 max pooling layer with 2 x 2 pool size and a stride value of 2
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 2 convolution-2D layers with 128 depth channels and Kernel (Filter) size 3 x
    3 with padding kept as Same
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 1 max pooling layer with 2 x 2 pool size and a stride value of 2
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 3 convolution-2D layers with 256 depth channels and Kernel (Filter) size 3 x
    3 with padding kept as Same
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 1 max pooling layer with 2 x 2 pool size and a stride value of 2
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 3 convolution-2D layers with 512 depth channels and Kernel (Filter) size 3 x
    3 with padding kept as Same
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 1 max pooling layer with 2 x 2 pool size and a stride value of 2
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 3 convolution-2D layers with 512 depth channels and Kernel (Filter) size 3 x
    3 with padding kept as Same
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 1 max pooling layer with 2 x 2 pool size and a stride value of 2
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The activation functions for all the layers are kept as “Relu.” This convolution
    network is extensively used in image classification and provides an output containing
    the following attribute after flattening the data:'
  prefs: []
  type: TYPE_NORMAL
- en: 1 dense neural layer with 4096 units
  prefs: []
  type: TYPE_NORMAL
- en: This can then be passed as input to the dense MLP network with the corresponding
    activation functions—sigmoid for binary classification or softmax for multi-class
    classification. Now let us visualize this model, which is already pretrained and
    built inside the Keras framework. For this, we would import the VGG-16 model already
    built inside the Keras framework inside the keras.applications module.
  prefs: []
  type: TYPE_NORMAL
- en: from keras.applications.vgg16 import VGG16
  prefs: []
  type: TYPE_NORMAL
- en: 'The “build_auto_VGG16_model()” method approaches how to build this model. We
    simply have to load the VGG-16 model and return it as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: By running the “model.summary” method on this model, we can see the architecture
    of this model. Since the trainable parameters are large, a sample view of the
    model is shown in Figure [5-10](#Fig10).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_5_Chapter/502041_1_En_5_Fig10_HTML.jpg](../images/502041_1_En_5_Chapter/502041_1_En_5_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-10
  prefs: []
  type: TYPE_NORMAL
- en: VGG-16 prebuilt model from the Keras framework
  prefs: []
  type: TYPE_NORMAL
- en: If we would like to build our own variant of this model, we have to import certain
    layers from Keras. We will be importing the convolution-2D layer, flatten layer,
    dense layer, MaxPooling layer, and a zero-padding layer, all of which are fundamental
    components in a traditional CNN. We will also be importing the Adam optimizer
    from the Keras.optimizers module and will be using the sequential model.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: We first initialize the sequential model in the “build_sample_VGG_model()” and
    then we initially add a zero-padding 2D layer to add row and column of 0s to the
    input image tensor. The zero-padding layer has the following parameters.
  prefs: []
  type: TYPE_NORMAL
- en: '**padding:** An integer or a tuple of two integer values are provided. If a
    single integer is provided, it implies the same padding is applied to height and
    width, and if a tuple of two integers are provided, it signifies the symmetric
    height pad and symmetric weight pad.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**data_format:** The dimensions of the input image tensor with height, width,
    and the number of channels.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The code for zero-padding 2D with the associated details is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: Then we have the convolution-2D model in Keras, which has the following parameters.
  prefs: []
  type: TYPE_NORMAL
- en: '**filters:** the dimensionality of the output tensor, the number of output
    filters in the convolution'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**kernel_size:** the size of the kernel for convolution to take place; generally
    consists of a list of two integers specifying the height and the width of the
    kernels'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**padding:** refers to the padding of the input tensor; Valid implies no padding,
    whereas Same specifies an equal padding along the height and the width to maintain
    the same output dimensions as the input'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**data_format:** refers to the format of the data depending on the position
    of the channels. If channels_first type is chosen, then the format for this is
    (batch_size, channels, height, width), and if channels_last is chosen, then the
    format of input data is (batch_size, height, width, channels). By default it is
    of “image_data_format” from Keras, but if unspecified it defaults to channels_last.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**dilation_rate:** This is used to specify the rate for dilated convolution
    (not required for our present scenario).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**groups:** An integer that specifies the groups along which the input is split
    along the channel axis. Each group is convolved separately with the filters. The
    output is a concatenation of all the filters along a channel.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**activation:** the activation function to use, which in our case will be “Relu”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**use_bias:** specifies whether we would want to use bias.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**bias_initializer:** This specifies the initialization for the bias, similar
    to the dense network.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**kernel_initializer:** This controls the initialization of the kernel, such
    as glorot_uniform in our case.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**bias_regularizer:** the regularizer for the bias'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**kernel_regularizer:** the regularizer for the kernel weight tensor'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**activity_regularizer:** This is a regularizer for the activation function
    that controls the output of the convolution layer.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**kernel_constraint:** the constraints applied on the kernel'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**bias_constraint:** the constraints applied on the bias.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The convolution-2D layer with the filters, kernel_size, activation and input
    data_format is used in this case:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: Then we have the MaxPooling-2D layer inside this code, which downsamples the
    data by extracting the maximum value over the pooling size. The following are
    its parameters.
  prefs: []
  type: TYPE_NORMAL
- en: '**pool_size:** This signifies the window size over which to compute the maximum.
    If a single value is specified, then the same dimensions are applied for both
    the height and width. If a tuple of two integers are specified, then these correspond
    to the height and the width of the pooling window.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**stride:** This can be either an integer or a tuple of two integers, specifying
    the stride for pooling. When not specified, it defaults to pool_size.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**padding:** This is similar to before, where Valid represents no padding and
    Same represents equal padding.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**data_format:** This decides the format for the data and can be in channels_first
    or channels_last format.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The MaxPooling 2D layer has the following code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: 'The rest of the model uses flatten, dropout, and dense network layers, as mentioned
    before. To build the model, we have to first stack two convolution 2D layers with
    a channel depth of 64 with the input data and then apply a MaxPooling 2D layer
    with stride 2 x 2, as shown here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: 'The next part consists of a pattern of three convolution layers of depth 256
    and 512 on the data with a MaxPooling layer in between three convolution 2D layers.
    The convolution 2D layer of depth 512 is repeated with the MaxPooling layer as
    shown here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: 'The last part contains a flatten layer to make the outputs of the convolved
    input tensor suitable for input to the dense network. The dense network has 4096
    units with “Relu ” and “softmax” activation functions. The dropout layer in between
    is for setting half of the input units as 0 for the training phase. The final
    layer of the VGG model is:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: Then we compile the model using Adam optimizer with cross_entropy loss and accuracy
    as the metric.
  prefs: []
  type: TYPE_NORMAL
- en: '**Resnet-50** **:** This is another benchmark model for image processing and
    is the abbreviation of residual network. Generally in complex sequential convolution
    models, there is a gradual degradation in terms of the accuracy, which gets saturated.
    To avoid this saturated accuracy, residual blocks are incorporated. We consider
    a stacked layer produces an output tensor Y after passing through an input tensor
    X through the function F(X). This is a traditional sequential CNN model structure.
    However, if we were to add a residual network, instead of getting the output F(X),
    the input tensor is added to it making Y = F(X) + X. Now in generic CNN models,
    it is very hard to maintain the accuracy with the increase of depth in the network
    due to degradation. That is where the residual equation: Y = F(X) + X comes into
    the picture. Essentially this implies an identity transform of the input tensor
    to the output tensor. To understand this, we can draw an analogy that if F(X)
    = 0, then we get an identical tensor output (Y), which is the same as X, after
    passing through nonlinear activation units. Figure [5-11](#Fig11) illustrates
    this residual block.'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_5_Chapter/502041_1_En_5_Fig11_HTML.png](../images/502041_1_En_5_Chapter/502041_1_En_5_Fig11_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-11
  prefs: []
  type: TYPE_NORMAL
- en: Residual block diagram in ResNet
  prefs: []
  type: TYPE_NORMAL
- en: 'Residual networks thus preserve the accuracy, even after applying thousands
    of convolution-2D/MaxPooling layers in the model. In the worst case, if the dimensions
    of the input and output tensors do not match, then a padding layer is added, given
    by the equation:'
  prefs: []
  type: TYPE_NORMAL
- en: Y= F(X,{W[i]}) + W[i] X
  prefs: []
  type: TYPE_NORMAL
- en: The Resnet-50 model has five stages with residual and convolution blocks. The
    residual blocks are also called identity blocks. Each convolution block has three
    convolution 2D layers and each identity/residual block has three convolution 2D
    layers. There are more than 23 million trainable parameters in this model.
  prefs: []
  type: TYPE_NORMAL
- en: 'We will use the Resnet-50 model already built in the keras.applications module.
    Then we will load the Resnet-50 model in the build_model function as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: When we summarize the model we will see that the model is being downloaded,
    and then the trainable parameters are presented along with the layers, as shown
    in Figure [5-12](#Fig12).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_5_Chapter/502041_1_En_5_Fig12_HTML.jpg](../images/502041_1_En_5_Chapter/502041_1_En_5_Fig12_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-12
  prefs: []
  type: TYPE_NORMAL
- en: Resnet-50 model from Keras
  prefs: []
  type: TYPE_NORMAL
- en: There are several variants of VGG and Resnet models with different numbers of
    hidden and convolution layers, and there are other state-of-the-art models such
    as AlexNet and GoogleNet.
  prefs: []
  type: TYPE_NORMAL
- en: Building an Image Classifier Model with Resnet-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now that we have understood the fundamentals of neural networks and building
    models in Keras, let us build a image classifier model in a few lines of code
    using the Keras framework and the ResNet-50 Model. Open the Resnet50 Convolution
    Networks.ipynb notebook, and in this case we will be using this model to let the
    machine decide whether the given image is that of a cat or dog. To build this
    binary classification model first, we have to import the libraries from Keras—namely,
    the Resnet-50 model from keras.applications and img, img_to_array module from
    the keras.preprocessing module. These layers help us to decode and preprocess
    the input image to make it usable for the Resnet model. We also require numpy
    for reshaping the image tensor and “matplotlib” for presenting the image on the
    screen.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: In the next stage, we import the data set and unzip it. This contains a large
    database of images of cats and dogs correctly labeled where we can use our supervised
    Resnet model.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: Now let us see the first image of the data set by plotting it using matplotlib
    in dimensions of [244,244].
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: On running this, we will see an image of a Labrador dog on the screen like that
    in Figure [5-13](#Fig13).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_5_Chapter/502041_1_En_5_Fig13_HTML.jpg](../images/502041_1_En_5_Chapter/502041_1_En_5_Fig13_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-13
  prefs: []
  type: TYPE_NORMAL
- en: Image of a dog from data set
  prefs: []
  type: TYPE_NORMAL
- en: 'We will be using this image to verify whether the model can classify it correctly
    as a dog. In the next stage, we have to convert this image into a tensor. This
    is done by converting the image in a numpy array and then expanding it along an
    axis to make it a input tensor:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: In the next step we train that image using the Resnet-50 model, and we will
    get the predictions from the model. Now we would want to predict the most probable
    classification of the given image, which in our case is the dog. This is done
    by using the “decode_predictions” method, which states the predicted value of
    the model predictions, whether it is a dog or cat.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
- en: Now if we run this model, we would instantly see that the Resnet model predicts
    the image to be that of a Labrador_retriever with 56.7% accuracy. We have built
    a binary classification model with Resnet-50 and we can create a multi-class classification
    model as well. The Convolution Network-Classification.ipynb Notebook contains
    a multi-class classification model using a custom convolution-2D neural network
    (implementing a variant of VGG-16) to classify a CIFAR data set. CIFAR is a benchmark
    image classification data set, which is present in the keras.datasets module and
    is extensively used for image analysis and classification. However, the model
    specifications and the implementations are kept for an interested reader, who
    would like to venture into depths of image analysis, processing, classification
    models, and other computer vision models.
  prefs: []
  type: TYPE_NORMAL
- en: These neural network models, both MLP (dense) and convolution, will be extensively
    used in our deep RL algorithms, and now that we have a fair idea of these networks
    we will study them.
  prefs: []
  type: TYPE_NORMAL
- en: Deep Reinforcement Learning Algorithms
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In Chapter [1](502041_1_En_1_Chapter.xhtml) we learned about the contrast as
    well as the relation between value and policy functions in RL. We used Bellman
    functions to update the values and also changed the policies to lead to a better
    value estimate. All of these were based on discrete data. Before we dive into
    the main algorithms, we should have an idea of the different types of algorithmic
    paradigms in deep RL.
  prefs: []
  type: TYPE_NORMAL
- en: On Policy Algorithms
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: These algorithms depend on policy performance and optimization. This family
    of algorithms try to optimize a policy and provide a good performance. In this
    section, we will analyze the traditional RL space by comparing Q-learning (off-policy)
    and SARSA (state, action, reward, state, action; on-policy) algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: 'Traditional RL: Q-Learning and SARSA'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'In this case, the policy function is updated to get an optimal Q-value. In
    the discrete RL scenario where we read about the Bellman equation and the Q-learning
    algorithm, we also mentioned policy functions. Another variant of discrete RL
    that updates the policy function rather than the values is the SARSA algorithm.
    In generic Q-learning, we have the following equation of Q–value update:'
  prefs: []
  type: TYPE_NORMAL
- en: Q(S, A) = Q(S, A) + α [R + ymax[a]Q(S^(**`**), a) – Q(S, A) ]
  prefs: []
  type: TYPE_NORMAL
- en: S=S^(**`,**)
  prefs: []
  type: TYPE_NORMAL
- en: 'where α is the learning rate and y is the discount factor and S, A, and R represent
    the states, actions, and reward space, respectively. Q(S, A) represents the value
    retrieved by taking an action A from state S. In this form of learning, the agent
    chooses an action A from S using the Q-value policy (greedy policy). It then receives
    the R (rewards) and observes the next state S**`**. Thus there is a dependency
    on the older states that is useful for off-policy algorithms. In contrast to Q-learning,
    we have the SARSA algorithm. The update equation for SARSA is given by the equation:'
  prefs: []
  type: TYPE_NORMAL
- en: Q(S, A)= Q(S, A) + α [R + yQ(S^(**`**), A**`**) – Q(S, A) ]
  prefs: []
  type: TYPE_NORMAL
- en: A=A^`
  prefs: []
  type: TYPE_NORMAL
- en: S=S^(**`**)
  prefs: []
  type: TYPE_NORMAL
- en: Although both these equations come from Bellman equation, the fundamental difference
    is that SARSA chooses an action A from a state S based on a Q policy, then it
    observes the R (rewards) and new state (S^(**`**)) and then chooses another action
    A^(**`**) from state S^(**`**) by using the policy derived from Q. update of policy
    makes SARSA an on-policy algorithm in discrete RL space. In SARSA, the agent learns
    optimal policy and behaves using the same policy, such as the Epsilon-Greedy policy.
    In case of SARSA, the update policy is the same as behavioral policy.
  prefs: []
  type: TYPE_NORMAL
- en: 'To see this comparison, we can open the Q-Learning|SARSA-FrozenLake.ipynb Notebook
    to see the contrast in on-off policy techniques in traditional learning algorithms
    in discrete space. Most of the code segment is the same except for the Q and SARSA
    functions. In the “Q_learning” method, we see that the Q-policy tries to apply
    a greedy maximization policy and goes to the next steps based on the computed
    Q-values as mentioned earlier. This is accomplished by the following lines of
    code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE25]'
  prefs: []
  type: TYPE_PRE
- en: The accuracy (reward) steps graph for Q-learning can be observed as shown in
    Figure [5-14](#Fig14).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_5_Chapter/502041_1_En_5_Fig14_HTML.jpg](../images/502041_1_En_5_Chapter/502041_1_En_5_Fig14_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-14
  prefs: []
  type: TYPE_NORMAL
- en: Accuracy steps graph for Q-learning
  prefs: []
  type: TYPE_NORMAL
- en: 'Now in the case of the SARSA algorithm, the “SARSA” method implements the on–policy
    update method that updates the policies:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE26]'
  prefs: []
  type: TYPE_PRE
- en: On running this segment, we can visualize the reward-steps graph and can compare
    the difference between on- and off-policies in discrete space, as shown in Figure
    [5-15](#Fig15).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_5_Chapter/502041_1_En_5_Fig15_HTML.jpg](../images/502041_1_En_5_Chapter/502041_1_En_5_Fig15_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-15
  prefs: []
  type: TYPE_NORMAL
- en: Accuracy steps graph for SARSA
  prefs: []
  type: TYPE_NORMAL
- en: 'Deep RL: Continuous Spaces Deep On-Policy Algorithms'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Now in many complex environments, there can be a continuous distribution of
    values related to a particular policy. Although this set of algorithms can be
    extended to discrete spaces, we will consider continuous distributions. For continuous
    spaces, we have to use deep RL algorithms. In the case of on-policy algorithms
    for optimizing the policy, the most important class of algorithms are called policy
    gradients. The policy gradient method models and optimizes the policy directly.
    Generally we associate a parameterized function π[θ](a|s), which signifies the
    policy and policy gradients try to optimize θ to get a better reward. The reward
    function generally in policy gradients are denoted as:'
  prefs: []
  type: TYPE_NORMAL
- en: J(θ) = ∑[S] d^π(s)V^π(s) = ∑[S] d^π(s)∑[A] π[θ](a|s)Q^π(s, a),
  prefs: []
  type: TYPE_NORMAL
- en: where d^π(s) represents the stationary distribution of Markov chain for π[θ]
    policy, which is an on-policy distribution. This can be generalized as if the
    agent travels along the Markov chain indefinitely the probability of the agent
    ending up at a state becomes unchanged, which is referred to as the stationary
    probability. In this context, we will explore most of the on-policy algorithms
    such as vanilla policy gradient (VPG), advantage actor critic (A2C), PPO, along
    with variants of asynchronous actor critic (A3C) and its variants, which include
    ACER (off policy A3C) and ACKTR. However, most importantly we will be understanding
    the PPO policy since ML Agents use it extensively.
  prefs: []
  type: TYPE_NORMAL
- en: Policy Gradient – REINFORCE
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: 'It can be expected that policy-based deep RL is more useful than value-based
    learning, in continuous spaces. This is due to the infinite number of actions
    that can estimate the values; hence, value-based approaches are too computationally
    intensive. In policy gradient method of on policy training, there is a concept
    of gradient ascent. This implies the policy improvement takes place according
    to the equation:'
  prefs: []
  type: TYPE_NORMAL
- en: Q^π(s^(**`**) |a^(**`**) ) = argmax [A] Q^π(s |a )
  prefs: []
  type: TYPE_NORMAL
- en: To maximize the policy update, we generally require computation of the gradient
    of the policy J(θ), so that we can move θ toward the direction of highest return
    on that policy π[θ.] This is done by using the policy gradient theorem and is
    the backbone of most of the deep RL algorithms present in continuous space.
  prefs: []
  type: TYPE_NORMAL
- en: Policy Gradient Theorem
  prefs:
  - PREF_H6
  type: TYPE_NORMAL
- en: 'Computing the gradient is a difficult problem, as it depends on the action
    selection space as well as the stationary distribution of states, particularly
    policy behavior π[θ]. The latter part is difficult to compute, as it is not possible
    to know the stationary distribution of states in a dynamic environment. We denote
    the gradient of the policy as ∆ [θ] J(θ), where ∆ [θ] represents the grad operator
    on the parameter space θ. The policy gradient theorem provides a reformation of
    the partial derivative of the objective function without involving the derivative
    of the state distribution. The policy gradient can be simplified as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: ∆θ J(θ) = ∆θ ∑S dπ(s)Vπ(s) =∆θ ∑S dπ(s) ∑A πθ(a|s)Qπ(s, a)
  prefs: []
  type: TYPE_NORMAL
- en: α ∑[S] d^π(s)∑[A] ∆[θ] π[θ](a|s)Q^π(s, a),
  prefs: []
  type: TYPE_NORMAL
- en: 'where α represents proportionality. Therefore, instead of computing the derivatives
    on the state space, we are effectively calculating the derivative of the policy
    function. The derivation of this theorem can be done by starting with the state
    value function ∆[θ] V^π(s) and then expanding it to include the policy function
    and the Q^π(s, a) state as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: ∆[θ] V^π(s) = ∆[θ] ( ∑[A] π[θ](a|s)Q^π(s, a) )
  prefs: []
  type: TYPE_NORMAL
- en: = ∑[A] (∆[θ] π[θ](a|s)Q^π(s, a) + π[θ](a|s) ∆[θ] Q^π(s, a) ) By Chain Rule of
    Derivatives
  prefs: []
  type: TYPE_NORMAL
- en: Extending Q with future state values
  prefs: []
  type: TYPE_NORMAL
- en: =∑[A] (∆[θ] π[θ](a|s)Q^π(s, a) + π[θ](a|s) ∆[θ]∑[S, R] P(s**`**, r|s, a) (r+V^π
    (s**`**))
  prefs: []
  type: TYPE_NORMAL
- en: Reward r not function of θ
  prefs: []
  type: TYPE_NORMAL
- en: =∑[A] (∆[θ] π[θ](a|s)Q^π(s, a) + π[θ](a|s) ∑[S, R] P(s**`**, r|s, a) ∆[θ] V^π
    (s**`**)
  prefs: []
  type: TYPE_NORMAL
- en: As P(s**`**, r|s, a) = P(s**`**|s, a)
  prefs: []
  type: TYPE_NORMAL
- en: =∑[A] (∆[θ] π[θ](a|s)Q^π(s, a) + π[θ](a|s) ∑[S, R] P(s**`**|s, a) ∆[θ] V^π (s**`**)
  prefs: []
  type: TYPE_NORMAL
- en: 'Thus we have a recursive formulation of the gradient update policy, as mentioned
    in the following equation:'
  prefs: []
  type: TYPE_NORMAL
- en: ∆[θ] V^π(s) =∑[A] (∆[θ] π[θ](a|s)Q^π(s, a) + π[θ](a|s) ∑[S,R] P(s**`**|s, a)
    ∆[θ] V^π (s**`**)
  prefs: []
  type: TYPE_NORMAL
- en: If we observe closely, we will see that if we extend ∆[θ] V^π() indefinitely,
    it is easy to find out that we can transition to any state from a starting state
    s through the recursive unrolling process and by adding all the visitation probabilities,
    we will get ∆[θ] V^π(s). This can be proved simply by using the π[θ](a|s) ∑[S,
    R] P(s**`**|s, a) ∆[θ] V^π (s**`**) repeatedly to transition into new states s**``,**
    s**[PRE27]
  prefs: []
  type: TYPE_NORMAL
