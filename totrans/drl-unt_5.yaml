- en: And for the sake of training and understanding, we modify the values of certain
    hyperparameters such as gamma, batch_size, learning rate, and hidden units. While
    it is generally recommended to follow the guidelines as mentioned in this section
    for the hyperparameters, it has been observed that a compatible value range of
    256 to 512 as the hidden units with a batch size of 1024 provides a suitable learning
    curve with stable updates and proper convergence. In this case, we will analyze
    the plot in TensorBoard made using different training instances of the Tiny Agent,
    as shown in Figure [5-40](#Fig40).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_5_Chapter/502041_1_En_5_Fig40_HTML.jpg](../images/502041_1_En_5_Chapter/502041_1_En_5_Fig40_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-40
  prefs: []
  type: TYPE_NORMAL
- en: Hyperparameter tuning in Tiny Agent
  prefs: []
  type: TYPE_NORMAL
- en: While we can play with the hyperparameters accordingly and visualize the training
    in Tensorboard, it is important to mention that change in policies from “mlp”
    to “cnn” to other networks (“mlplstm”) also plays a significant role in the training
    process. We can visualize this effect when we train the GridWorld environment
    using both CNN and dense neural networks. In the default hyperparameters for PPO,
    we can change the “use_recurrent” value to True, and then it will become a LSTM
    form of PPO policy training.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We have reached the end of this chapter that revolved around complex and fundamental
    concepts. To summarize:'
  prefs: []
  type: TYPE_NORMAL
- en: We understood the fundamentals of neural network architectures from dense to
    convolution networks. We also learned how to write custom neural network models
    using Keras and Tensorflow.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We explored the different variations of the convolution-2D neural networks and
    its associated components such as activations, relation between kernels, strides,
    padding, and different associated layers such as MaxPooling. We also learned about
    Resnet and VGG-16 as the traditional state-of-the-art model.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We then studied in depth about deep RL algorithms. We understood the two paradigms–on-
    and off-policy learning. In on-policy, we saw the contrast between Q-learning
    and SARSA in the traditional RL space. Then we ventured in depth into the different
    on policy deep RL algorithms.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We studied policy gradients and built corresponding agents using OpenAI Gym
    environments. Then we studied actor critic paradigms of learning, which includes
    advantage actor critic (A2C) and asynchronous advantage actor critic (A3C) and
    built agents using those policies using Baselines as well as using custom code.
    Then we studied actor critic Kronecker factor trust region (ACKTR) and stochastic
    actor critic algorithms.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We learned about the PPO algorithm and its derivation from trust region policy
    optimization (TRPO) including writing custom neural network models and using the
    Baselines. We learned the importance of clipping in PPO to stabilize the training.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: After that, we learned about off-policy algorithms, which exclusively covers
    deep Q-networks (DQN) and its variants such as dueling DQN and double DQN. We
    also analyzed the importance of these algorithms using sampling of past states
    from the buffer. Then we explored off-policy actor critic such as ACER.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Then we studied soft actor critic (SAC), where we introduced entropy regularization
    as a means to stabilize off-policy algorithms.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We briefly learned about one model-free RL algorithm that relies on behavioral
    cloning and general adversarial networks called GAIL and saw how it imitates a
    different policy (such as SAC) by using a generator and a discriminator.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We then created a PPO agent for Puppo that used joint articulation and vectorized
    direction of motion and angular force to move the agent. We then trained it using
    the default parameters for PPO learning and visualized them using TensorBoard.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We then learned about the Python API and its interaction with the Unity environment.
    We also converted the Unity environment to an equivalent Gym environment and trained
    it using Baselines algorithms–DQN and PPO.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Then we learned about some of the most important scripts present in ML Agents
    (the Model Overrider script and Models.py script) and the trainers and optimizers
    Python file inside the PPO policy and understood how Unity internally implements
    the neural networks as well as the PPO policy.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Then we understood LSTM networks in memory-based training and briefly saw the
    importance of this version of RNNs in training ML Agents on certain policies.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the last section of the chapter, we studied extensively about hyperparameters
    optimization in Unity ML Agents. We learned the default and standard values with
    respect to certain hyperparameters that are generic for SAC and PPO. Then we exclusively
    saw some characteristic hyperparameters for PPO. Lastly we trained a Unity environment
    named Tiny Agent (which we will discuss in the next chapter) with different sets
    of hyperparameters and observed it using TensorBoard.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: That conclusively summarizes this entire chapter, which had a lot of core concepts.
    In the next chapter we will be looking into a few complex algorithms, curriculum
    learning, and adversarial agents and will be building a cart game.
  prefs: []
  type: TYPE_NORMAL
