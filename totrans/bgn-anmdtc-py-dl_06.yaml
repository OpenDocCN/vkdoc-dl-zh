- en: If you observe the three classification reports, you can see that the precision
    and recall columns are not good (very low values for row 0 and row 1) for `threshold=1`
    and `threshold=5`. They look better for `threshold=10`. We want as high a precision
    and recall as we can get for both row 0 and row 1\. In fact, `threshold=10` performed
    the best, with better precision and recall than for `threshold=1` or `threshold=5`.
    However, being so simple a model, the performance leaves something to be desired.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你观察三个分类报告，你可以看到对于 `threshold=1` 和 `threshold=5`，精确度和召回率列不好（第 0 行和第 1 行的值非常低）。对于
    `threshold=10`，它们看起来更好。我们希望尽可能高地提高第 0 行和第 1 行的精确度和召回率。实际上，`threshold=10` 的表现最好，比
    `threshold=1` 或 `threshold=5` 的精确度和召回率都要好。然而，作为一个如此简单的模型，其性能还有待提高。
- en: Picking a threshold is a matter of experimentation in this and other models
    and changes as per the data being trained on.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个和其他模型中，选择阈值是一个实验过程，并且根据训练的数据而变化。
