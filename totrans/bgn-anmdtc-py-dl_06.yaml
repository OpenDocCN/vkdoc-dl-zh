  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_6_Chapter/483137_2_En_6_Fig21_HTML.jpg)'
- en: A code reads print left parenthesis classification underscore report left parenthesis
    y underscore test, y underscore label double right parentheses. Includes an output
    with columns of precision, recall, f 1-score, and support for 0, 1, accuracy,
    macro average, and weighted average.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 一段代码读取 print left parenthesis classification underscore report left parenthesis
    y underscore test, y underscore label double right parentheses。包括一个具有精确度、召回率、f
    1 分数和支持的列输出，包括 0、1、准确度、宏平均和加权平均。
- en: Figure 6-21a
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-21a
- en: Code to show the precision and recall
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 显示精确度和召回率的代码
- en: 'Let’s use the code shown in Figure [6-20](#Fig20) to calculate the precision
    and recall for `threshold`=1.0, and `threshold`=5.0\. Figures [6-21b](#Fig22),
    and [6-21c](#Fig23) show the output for the respective thresholds. Note: your
    exact precision recall values may not match what is depicted due to the random
    initialization of the neural network weights. You are welcome to also try `threshold`=15.0.'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们使用图 [6-20](#Fig20) 中显示的代码来计算 `threshold`=1.0 和 `threshold`=5.0 的精确度和召回率。图
    [6-21b](#Fig22) 和 [6-21c](#Fig23) 展示了相应阈值下的输出。注意：由于神经网络权重的随机初始化，您精确的精确度和召回率值可能与图中所示的不符。您也可以尝试
    `threshold`=15.0。
