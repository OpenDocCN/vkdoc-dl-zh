- en: The next step is to calculate the errors, detect anomalies, then plot the anomalies
    and errors. We chose threshold of 10\. Figure [6-20](#Fig20) shows the code to
    measure anomalies based on threshold.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是计算误差，检测异常，然后绘制异常和误差。我们选择了阈值为 10。图 [6-20](#Fig20) 展示了基于阈值测量异常的代码。
- en: '![](../images/483137_2_En_6_Chapter/483137_2_En_6_Fig20_HTML.png)'
