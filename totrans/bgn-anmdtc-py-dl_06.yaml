  prefs: []
  type: TYPE_NORMAL
  zh: 代码包括日志文件名 = variational autoencoder，V A E 模型 = encoder + decoder，构建编码器模型，使用重新参数化技巧将采样输出作为输入，实例化编码器模型，构建和实例化解码器模型，实例化
    V A E 模型，并计算 V A E 损失。
