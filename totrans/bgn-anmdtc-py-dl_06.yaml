- en: Sparse Autoencoders
  id: totrans-194
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In the example of simple autoencoders in the previous section, the representations
    were constrained only by the size of the hidden layer (12). In such a situation,
    what typically happens is that the hidden layer is learning an approximation of
    principal component analysis (PCA). But another way to constrain the representations
    to be compact is to add a sparsity constraint on the activity of the hidden representations,
    so fewer units would fire at a given time. In Keras, this can be done by adding
    an `activity_regularizer` to our `Dense` layer.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
- en: The difference between the simple autoencoders and sparse autoencoders is mostly
    due to the regularization term being added to the loss during training.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
- en: In this section, we will use the same credit card dataset as in the simple autoencoder
    example. We will use the example of credit card data to detect whether a transaction
    is normal/expected or abnormal/anomalous. Shown below is the data being loaded
    into Pandas Dataframe.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
- en: Then, we will collect 20,000 normal records and 400 abnormal records. You can
    pick different ratios, but in general, using more normal data examples than abnormal
    data examples is better, as you want to teach your autoencoder what normal data
    looks like. Too much abnormal data in training will train the autoencoder to learn
    that the anomalies are actually normal, which goes against our goal. Split the
    dataframe into training and testing data (80-20 split). For the code, you can
    find the notebook on GitHub at [`https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%206%20Autoencoders/chapter6_autoencoder.ipynb`](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%206%20Autoencoders/chapter6_autoencoder.ipynb).
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
- en: Simply rerun the steps in the previous section but with the new model definition
    in Figure [6-24](#Fig27).
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
- en: Now it’s time to create a neural network model with just an encoder and a decoder
    layer. We will encode the 29 columns of the input credit card data set into 12
    features using the encoder. The decoder expands the 12 features back into the
    29 features. The key difference compared to the simple autoencoder is the activity
    regularizer to accommodate the sparse autoencoder. Figure [6-24](#Fig27) shows
    the code to create the neural network.
