- en: What Are Autoencoders?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Chapter [5](483137_2_En_5_Chapter.xhtml) introduced the basic functioning of
    neural networks. The basic concept is that a neural network computes a weighted
    calculation of inputs to produce outputs. The inputs are in the input layer, the
    outputs are in the output layer, and there are one or more hidden layers in between
    the input and the output layers. Backpropagation is a technique used to train
    the network while trying to adjust the weights until the error is minimized. Autoencoders
    use this property of a neural network in a special way to accomplish some very
    efficient methods of training networks to learn normal behavior, thus helping
    to detect anomalies when they occur. Figure [6-1](#Fig1) shows a typical neural
    network.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_6_Chapter/483137_2_En_6_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: An architecture of a typical neural network includes 6 input data points in
    the input layer mapped via weights W i j to 4 nodes in the hidden layer, which
    are mapped via weights W j k to 2 nodes in the output layer.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-1
  prefs: []
  type: TYPE_NORMAL
- en: Typical neural network
  prefs: []
  type: TYPE_NORMAL
- en: '**Autoencoders** are neural networks that have the ability to discover low-dimensional
    representations of high-dimensional data and reconstruct the input from the output.
    Autoencoders are made up of two pieces of the neural network: an encoder and a
    decoder. The encoder reduces the dimensionality of a high-dimensional dataset
    to a low-dimensional dataset, whereas the decoder expands the low-dimensional
    data to high-dimensional data. The goal of such a process is to try to reconstruct
    the original input. If the neural network is good, then there is a good chance
    of reconstructing the original input from the encoded data. This inherent principle
    is critical in building an anomaly detection module.'
  prefs: []
  type: TYPE_NORMAL
- en: Note that autoencoders are not very useful if you have training samples containing
    few dimensions/features at each input point. Autoencoders perform well for five
    or more dimensions. If you have just one dimension/feature, you are just doing
    a linear transformation, which is not useful.
  prefs: []
  type: TYPE_NORMAL
- en: 'Autoencoders are incredibly useful in many use cases. The following are some
    popular applications of autoencoders:'
  prefs: []
  type: TYPE_NORMAL
- en: Training deep learning networks
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Compression
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Classification
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Anomaly detection
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Generative models
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The focus of this chapter is the use of autoencoders for anomaly detection.
  prefs: []
  type: TYPE_NORMAL
- en: Simple Autoencoders
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'An autoencoder neural network is actually a pair of two connected subnetworks:
    an encoder and a decoder. An encoder network takes in an input and converts it
    to a smaller, dense representation (also known as latent representation of the
    input), which the decoder network converts back to the original input as much
    as possible. Figure [6-2](#Fig2) shows an example of an autoencoder with encoder
    and decoder subnetworks.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_6_Chapter/483137_2_En_6_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: An architecture of a simple autoencoder includes an encoder, an autoencoder
    of latent or compressed representation, and a decoder.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-2
  prefs: []
  type: TYPE_NORMAL
- en: Depiction of an autoencoder
  prefs: []
  type: TYPE_NORMAL
- en: Autoencoders use a data compression logic where the compression and decompression
    functions that are implemented by neural networks are lossy and are mostly unsupervised
    without much intervention. Figure [6-3](#Fig3) shows an expanded view of an autoencoder
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_6_Chapter/483137_2_En_6_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A network of an autoencoder includes an encoder network with 6 input data points
    in the input layer mapped via weights W i j to 4 nodes in the hidden layer, and
    mapped via weights W j k to 4 nodes in the hidden layer, which map to 6 nodes
    in the output layer of the decoder network.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-3
  prefs: []
  type: TYPE_NORMAL
- en: Expanded view of an autoencoder
  prefs: []
  type: TYPE_NORMAL
- en: The entire network is usually trained as a whole. The loss function is usually
    either the mean-squared error or cross-entropy between the output and the input,
    known as the *reconstruction loss*, which penalizes the network for creating outputs
    different from the input. Because the encoding (which is simply the output of
    the hidden layer in the middle) has far fewer units than the input, the encoder
    must choose to discard information. The encoder learns to preserve as much of
    the relevant information as possible in the limited encoding and intelligently
    discard irrelevant parts. The decoder learns to take the encoding and properly
    reconstruct it into the input. If you are processing an image, then the output
    is an image. If the input is an audio file, the output is an audio file. If the
    input is some feature-engineered dataset, the output is a dataset too. We will
    use a credit card transaction example to illustrate autoencoders in this chapter.
  prefs: []
  type: TYPE_NORMAL
- en: Why even bother learning the presentation of the original input only to reconstruct
    the output as well as possible? The answer is that when you have input with many
    features, generating a compressed representation via the hidden layers of the
    neural network could help in compressing the input of the training sample. So,
    when the neural network goes through all the training data and fine-tunes the
    weights of all the hidden layer nodes, what will happen is that the weights will
    truly represent the kind of input that we typically see it- free of noise or other
    artifacts. As a result, if you try to input some other type of data, such as data
    with some noise, the autoencoder network will be able to detect the noise and
    remove at least some portion of the noise when generating the output. This is
    fantastic because it enables us to potentially remove noise from, for example,
    images of cats and dogs. As a real-world example, security monitoring cameras
    often capture hazy, unclear pictures at night or during adverse weather, resulting
    in noisy images. An autoencoder network can help remove at least some of that
    noise.
  prefs: []
  type: TYPE_NORMAL
- en: The logic behind denoising autoencoders is that by training on clean, normal
    images, it is possible to detect and remove noise from noisy images because this
    noise is not some salient characteristic of the data. For the code, you can find
    the notebook on GitHub at [`https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%206%20Autoencoders/chapter6_autoencoder.ipynb`](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%206%20Autoencoders/chapter6_autoencoder.ipynb).
  prefs: []
  type: TYPE_NORMAL
