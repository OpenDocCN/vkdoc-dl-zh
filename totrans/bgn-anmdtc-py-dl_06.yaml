- en: Variational Autoencoders
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A variational autoencoder is a type of autoencoder with added constraints on
    the encoded representations being learned. More precisely, it is an autoencoder
    that learns a latent variable model for its input data. So instead of letting
    your neural network learn an arbitrary function, you are learning the parameters
    of a probability distribution modeling your data. If you sample points from this
    distribution, you can generate new input data samples. This is the reason why
    variational autoencoders are considered to be generative models.
  prefs: []
  type: TYPE_NORMAL
- en: Essentially, VAEs attempt to make sure that encodings that come from some known
    probability distribution can be decoded to produce reasonable outputs, **even
    if they are not encodings of actual images**.
  prefs: []
  type: TYPE_NORMAL
- en: In many real-world use cases, we have a whole bunch of data that we’re looking
    at (it could be images, audio or text…well, it could be anything), but the underlying
    data that needs to be processed could be lower in dimensions than the actual data.
    Therefore, many of the machine learning models involve some sort of dimensionality
    reduction. One very popular technique is singular value decomposition or principal
    component analysis. Similarly, in deep learning space, variational autoencoders
    do the task of reducing the dimensions.
  prefs: []
  type: TYPE_NORMAL
- en: Before we dive into the mechanics of variational autoencoders, let’s quickly
    recap the normal autoencoders that we’ve already covered in this chapter. Autoencoders
    basically use an encoder layer and a decoder layer, at a minimum. The encoder
    layer reduces the input data features into a latent representation, and the decoder
    layer expands the latent representation to generate the output, with the goal
    being to train the model well enough to reproduce the input as the output. Any
    discrepancy between the input and output could signify some sort of abnormal behavior
    or deviation from what is normal, otherwise known as anomaly detection. In a way,
    the input gets compressed into a smaller representation that has fewer dimensions
    than the input, known as the *bottleneck*, and then the input is reconstructed
    from the bottleneck.
  prefs: []
  type: TYPE_NORMAL
- en: By contrast, with a variational autoencoder, instead of mapping the input to
    a fixed vector, we map the input to a distribution, so the big difference is that
    the bottleneck vector seen in the normal order in quarters is replaced with the
    mean vector and a standard deviation vector by looking at the distributions and
    then taking the sampled latent vector as the actual bottleneck. Clearly this is
    very different from the normal autoencoder, where the input directly yields a
    latent vector.
  prefs: []
  type: TYPE_NORMAL
- en: First, an encoder network turns the input sample `x` into two parameters in
    a latent space, which we will call `z_mean` and `z_log_sigma`. Then, the encoder
    network randomly samples similar points `z` from the latent normal distribution
    that is assumed to generate the data, via `z = z_mean + exp(z_log_sigma) * epsilon`,
    where `epsilon` is a random normal tensor. Finally, a decoder network maps these
    latent space points back to the original input data. Figure [6-58](#Fig66) depicts
    the variational encoder neural network.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_6_Chapter/483137_2_En_6_Fig66_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A variational encoder neural network architecture includes an encoder, a variational
    autoencoder of the mean and standard deviation, sampling, and a decoder.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-58
  prefs: []
  type: TYPE_NORMAL
- en: Depiction of the variational encoder neural network
  prefs: []
  type: TYPE_NORMAL
- en: 'The parameters of the model are trained via two loss functions: a reconstruction
    loss forcing the decoded samples to match the initial inputs (just like in the
    previously covered autoencoders), and the KL divergence between the learned latent
    distribution and the prior distribution, acting as a regularization term. You
    could actually get rid of this latter term entirely, although it does help in
    learning well-formed latent spaces and reducing overfitting to the training data.'
  prefs: []
  type: TYPE_NORMAL
- en: The distribution being learned by this latent space is not too different from
    a Gaussian distribution. However, before we train the variational autoencoder,
    we have to address the issue with sampling. We sample some vector from the latent
    space and pass that into the decoder. However, this breaks the flow of data from
    the input to the output because the sampling process is random and not differentiable,
    so we can’t backpropagate in a straightforward manner like in a usual neural network.
  prefs: []
  type: TYPE_NORMAL
- en: A variational autoencoder is kind of a mix of a neural network and a graphical
    model. The first paper that came up on variational autoencoders tried to create
    a graphical model and then turn the graphical model into a neural network. The
    variational autoencoder is based on variational inference.
  prefs: []
  type: TYPE_NORMAL
- en: In variational inference, assume that there are two different probabilitstic
    distributions p(x) and q(x). We can then use KL divergence to measure the dissimilarity
    between these two distributions. We can then apply this same concept to the variational
    autoencoder. Recall that the sampling step introduces difficulties with conducting
    backpropagation. We will be applying what is called a “reparameterization trick”
    in which we sample from a standard normal distribution, which is a differentiable
    sampling process, and scale it using the learned latent variables. Using this,
    we can compute the KL loss and backpropagate. The mathematics behind this can
    get very complicated, but this is a way to get around the problems that sampling
    might introduce.
  prefs: []
  type: TYPE_NORMAL
- en: The best way to understand the need for variational autoencoders is that in
    general autoencoders, the encoding / bottleneck depends too heavily on the inputs
    without an emphasis on understanding the nature of the data. Variational autoencoders
    are fitting distributions over some latent variables that try to capture the structure
    of the input data along with any uncertainties. This also makes VAEs potentially
    useful in generating new data because they try and model the distribution of the
    data.
  prefs: []
  type: TYPE_NORMAL
- en: For the code, you can find the notebook on GitHub at [`https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%206%20Autoencoders/chapter6_variationalautoencoder.ipynb`](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%206%20Autoencoders/chapter6_variationalautoencoder.ipynb).
  prefs: []
  type: TYPE_NORMAL
