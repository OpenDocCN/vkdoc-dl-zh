- en: '**ReLU**: The Rectified Linear Unit is the most commonly used activation function
    in deep learning models. The function returns 0 if it receives any negative input,
    but for any positive value xx it returns that value. So it can be written as'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**ReLU**：在深度学习模型中，Rectified Linear Unit是最常用的激活函数。如果它接收到任何负输入，则函数返回0，但对于任何正值xx，它返回该值。因此，它可以写成'
- en: f(x) = max(0, x).
  id: totrans-99
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: f(x) = max(0, x).
- en: 'Several other activation functions are available, and you can refer to the
    Keras documentation to look at the options: [`https://keras.io/activations/`](https://keras.io/activations/).'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 可用的激活函数有几个，你可以参考Keras文档查看选项：[`https://keras.io/activations/`](https://keras.io/activations/)。
- en: Now, compile the model using RMSprop as the optimizer and mean-squared error
    for the loss computation. The RMSprop optimizer is similar to the gradient descent
    algorithm with momentum. A metric function is similar to a loss function, except
    that the results from evaluating a metric are not used when training the model.
    You may use as a metric function any of the loss functions listed at [`https://keras.io/losses/`](https://keras.io/losses/).
    Figure [6-10](#Fig10) shows the code to compile the model using mean absolute
    error (MAE) and accuracy as metrics.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，使用 RMSprop 作为优化器以及均方误差进行损失计算来编译模型。RMSprop 优化器与具有动量的梯度下降算法类似。度量函数类似于损失函数，只不过在训练模型时不会使用评估度量函数的结果。你可以使用任何在[https://keras.io/losses/](https://keras.io/losses/)中列出的损失函数作为度量函数。图
    [6-10](#Fig10) 展示了使用平均绝对误差 (MAE) 和准确率作为度量来编译模型的代码。
