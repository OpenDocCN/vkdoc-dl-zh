- en: Denoising Autoencoders
  id: totrans-312
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We can force the autoencoder to learn useful features by adding random noise
    to its inputs and making it recover the original noise-free data. This way the
    autoencoder can’t simply copy the input to its output because the input also contains
    random noise. The autoencoder will remove noise and produce the underlying meaningful
    data. This is called a *denoising autoencoder**.* Figure [6-42](#Fig47) depicts
    a denoising autoencoder.
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_6_Chapter/483137_2_En_6_Fig47_HTML.jpg)'
  id: totrans-314
  prefs: []
  type: TYPE_IMG
- en: A flowchart of a denoising autoencoder includes the original image as the input
    to the encoder, denoising autoencoder, decoder with the output image. The input
    is slightly hazy. Output has sharp contrasts of a dog with a grassy background.
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-42
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
- en: Depiction of denoising autoencoder
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
- en: As a real-world example, security monitoring cameras often capture hazy, unclear
    pictures at night or during adverse weather, resulting in noisy images. An autoencoder
    network can help remove at least some of that noise.
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
- en: The logic behind denoising autoencoders is that by training on clean, normal
    images, it is possible to detect and remove noise from noisy images because this
    noise is not some salient characteristic of the data.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
- en: For the code, you can find the notebook on GitHub at [`https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%206%20Autoencoders/chapter6_denoisingautoencoder.ipynb`](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%206%20Autoencoders/chapter6_denoisingautoencoder.ipynb)
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
