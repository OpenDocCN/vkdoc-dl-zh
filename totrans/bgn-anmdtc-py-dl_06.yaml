- en: Now it’s time to create a simple neural network model with just an encoder layer
    and a decoder layer. We will encode the 29 columns of the input credit card data
    set into 12 features using the encoder. The decoder expands the 12 features back
    into the 29 features. Figure [6-9](#Fig9) shows the code to create the neural
    network.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是时候创建一个简单的神经网络模型，仅包含编码器层和解码器层了。我们将使用编码器将输入信用卡数据集的29列编码成12个特征。解码器将这12个特征扩展回29个特征。图[6-9](#Fig9)展示了创建神经网络的相关代码。
