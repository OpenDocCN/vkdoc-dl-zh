- en: Whenever our inputs are images, it makes sense to use convolutional neural networks
    (convnets or CNNs) as encoders and decoders. In practical settings, autoencoders
    applied to images are always convolutional autoencoders, as they simply perform
    much better.
  prefs: []
  type: TYPE_NORMAL
