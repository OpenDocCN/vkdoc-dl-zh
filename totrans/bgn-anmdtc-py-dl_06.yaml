- en: The biggest difference between standard autoencoders and variational autoencoders
    is that here we do not just take the inputs as is; rather, we take the distribution
    of the input data and then sample the distribution. Figure [6-64](#Fig72) shows
    the code to implement such a sampling strategy.
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: 标准自编码器和变分自编码器之间最大的区别在于，这里我们不仅仅接受输入原样；相反，我们接受输入数据的分布，然后采样分布。图 [6-64](#Fig72)
    展示了实现这种采样策略的代码。
- en: '![](../images/483137_2_En_6_Chapter/483137_2_En_6_Fig72_HTML.png)'
  id: totrans-457
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/483137_2_En_6_Chapter/483137_2_En_6_Fig72_HTML.png)'
- en: A code of sample distributions includes reparameterization trick, reparameterization
    trick by sampling from an isotropic unit Gaussian, arguments, returns, z of tensor
    colon sampled latent vector, and by default random normal has mean = 0 and s t
    d = 1.0.
