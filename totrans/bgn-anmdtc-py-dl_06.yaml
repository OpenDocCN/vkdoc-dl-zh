  id: totrans-227
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 卷积自动编码器
- en: Whenever our inputs are images, it makes sense to use convolutional neural networks
    (convnets or CNNs) as encoders and decoders. In practical settings, autoencoders
    applied to images are always convolutional autoencoders, as they simply perform
    much better.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们的输入是图像时，使用卷积神经网络（convnets 或 CNNs）作为编码器和解码器是有意义的。在实际设置中，应用于图像的自动编码器总是卷积自动编码器，因为它们简单地表现得更好。
- en: Let’s implement an encoder that consists of a stack of `Conv2D` and `MaxPooling2D`
    layers (max pooling being used for spatial downsampling), and a decoder that consists
    of a stack of `Conv2D` and `UpSampling2D` layers.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们实现一个由 `Conv2D` 和 `MaxPooling2D` 层（用于空间下采样）堆叠组成的编码器，以及一个由 `Conv2D` 和 `UpSampling2D`
    层堆叠组成的解码器。
- en: For the code, you can find the notebook on GitHub at [`https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%206%20Autoencoders/chapter6_cnnautoencoder.ipynb`](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%206%20Autoencoders/chapter6_cnnautoencoder.ipynb).
