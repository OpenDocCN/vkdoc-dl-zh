- en: The biggest difference between standard autoencoders and variational autoencoders
    is that here we do not just take the inputs as is; rather, we take the distribution
    of the input data and then sample the distribution. Figure [6-64](#Fig72) shows
    the code to implement such a sampling strategy.
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_6_Chapter/483137_2_En_6_Fig72_HTML.png)'
  id: totrans-457
  prefs: []
  type: TYPE_IMG
- en: A code of sample distributions includes reparameterization trick, reparameterization
    trick by sampling from an isotropic unit Gaussian, arguments, returns, z of tensor
    colon sampled latent vector, and by default random normal has mean = 0 and s t
    d = 1.0.
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-64
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
- en: Code to sample the distributions
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
- en: Now it’s time to create a simple neural network model with an encoder phase
    and a decoder phase. We will encode the 29 columns of the input credit card data
    set into 12 features using the encoder. The encoder uses the special distribution
    sampling logic to generate two parallel layers and then wraps the sampling output
    (Figure [6-64](#Fig72)) as a Layer object.
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
- en: The decoder phase uses this latent vector and reconstructs the input. While
    doing this, it also measures the error of reconstruction in order to minimize
