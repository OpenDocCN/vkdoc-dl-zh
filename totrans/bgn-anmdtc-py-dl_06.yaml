- en: Deep Autoencoders
  id: totrans-212
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 深度自动编码器
- en: Instead of limiting ourselves to a single layer as encoder or decoder, we could
    use a stack of layers. It’s not a good idea to use too many hidden layers (to
    avoid possible overfitting), and how many layers is optimal depends on the use
    case, so you have to experiment to determine the optimal number of layers and
    the compressions.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以不仅仅将编码器或解码器限制在单层，而可以使用层叠的层。使用过多的隐藏层（以避免可能的过拟合）不是一个好主意，而最优的层数取决于具体的应用场景，因此你必须进行实验以确定最优的层数和压缩比。
- en: The only thing that really changes is the number of layers.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 唯一真正改变的是层数的数量。
- en: We will use the example of credit card data to detect whether a transaction
    is normal/expected or abnormal/anomalous. Shown below is the data being loaded
    into Pandas Dataframe.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用信用卡数据的例子来检测交易是否正常/预期或异常/异常。下面是数据被加载到Pandas Dataframe中的情况。
- en: We will collect 20,000 normal records and 400 abnormal records. Again, you can
    pick different ratios, but in general, using more normal data examples than abnormal
    data examples is better, as you want to teach your autoencoder what normal data
    looks like. Too much abnormal data in training will train the autoencoder to learn
    that the anomalies are actually normal, which goes against our goal. Split the
    dataframe into training and testing data (80-20 split). For the code, you can
    find the notebook on GitHub at [`https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%206%20Autoencoders/chapter6_autoencoder.ipynb`](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%206%20Autoencoders/chapter6_autoencoder.ipynb).
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将收集20,000个正常记录和400个异常记录。再次强调，你可以选择不同的比例，但一般来说，使用比异常数据更多的正常数据示例会更好，因为你想教会你的自动编码器正常数据是什么样的。训练数据中过多的异常数据会导致自动编码器学习到异常实际上是正常的，这与我们的目标相悖。将数据框拆分为训练数据和测试数据（80-20拆分）。对于代码，你可以在GitHub上的笔记本中找到它：[`https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%206%20Autoencoders/chapter6_autoencoder.ipynb`](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%206%20Autoencoders/chapter6_autoencoder.ipynb)。
- en: Now it’s time to create a deep neural network model with three layers for encoder
    layers and three layers for decoder layers. We will encode the 29 columns of the
    input credit card data set into 16 features, then 8 features, and then 4 features
    using the encoder. The decoder expands the 4 features back into 8 features, then
    16 features, and then finally into 29 features. Figure [6-26](#Fig29) shows the
    code to create the neural network.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是时候创建一个具有三个编码器层和三个解码器层的深度神经网络模型了。我们将使用编码器将输入信用卡数据集的29列编码为16个特征，然后是8个特征，最后是4个特征。解码器将这4个特征扩展回8个特征，然后是16个特征，最后是29个特征。图[6-26](#Fig29)显示了创建神经网络的代码。
