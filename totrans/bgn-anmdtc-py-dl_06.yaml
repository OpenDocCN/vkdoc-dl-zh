  prefs: []
  type: TYPE_NORMAL
  zh: 基于阈值的异常测量
- en: Let’s delve deeper into the code shown in Figure [6-20](#Fig20), as we will
    use it throughout the chapter when we classify data points as anomalies or normal.
    As you can see, this is based on a special parameter called the threshold. We
    are simply looking at error (difference between actual and predicted) and comparing
    it to the threshold. First calculate the precision and recall for `threshold`=10\.
    Figure [6-21a](#Fig21) shows the code to show the precision and recall.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们深入探讨图 [6-20](#Fig20) 中显示的代码，因为我们将在本章中将数据点分类为异常或正常时使用它。如您所见，这是基于一个称为阈值的特殊参数。我们只是在查看误差（实际值与预测值之间的差异）并将其与阈值进行比较。首先计算
    `threshold`=10 的精确度和召回率。图 [6-21a](#Fig21) 展示了显示精确度和召回率的代码。
- en: '![](../images/483137_2_En_6_Chapter/483137_2_En_6_Fig21_HTML.jpg)'
