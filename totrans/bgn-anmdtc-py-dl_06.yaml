    y label and error = left and right square brackets, if is anomaly colon y label
    dot append at index 1, else y label dot append at index 0, and error dot append
    of, y dist.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 一段代码包括 threshold = 10.00, y pred = autoencoder dot predict (x test), y label
    和 error = left and right square brackets, if is anomaly colon y label dot append
    at index 1, else y label dot append at index 0, 和 error dot append of, y dist.
- en: Figure 6-20
