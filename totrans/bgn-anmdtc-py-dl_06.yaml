- en: Compile the model using Adam as the optimizer and mean-squared error for the
    loss computation. As discussed in Chapter [5](483137_2_En_5_Chapter.xhtml), Adam
    is an optimization algorithm that can be used instead of the classical stochastic
    gradient descent procedure to update network weights iteratively based on training
    data. Figure [6-67](#Fig75) shows the code to compile the model.
