  zh: 我们将收集 20,000 个正常记录和 400 个异常记录。你可以选择不同的比例，但通常使用比异常数据更多的正常数据示例更好，因为你想教会你的自动编码器正常数据看起来是什么样子。训练数据中异常数据过多将训练自动编码器学习异常实际上是正常的，这与我们的目标相悖。图
