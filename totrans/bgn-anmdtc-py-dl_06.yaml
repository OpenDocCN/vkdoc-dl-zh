  id: totrans-227
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Whenever our inputs are images, it makes sense to use convolutional neural networks
    (convnets or CNNs) as encoders and decoders. In practical settings, autoencoders
    applied to images are always convolutional autoencoders, as they simply perform
    much better.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
- en: Let’s implement an encoder that consists of a stack of `Conv2D` and `MaxPooling2D`
    layers (max pooling being used for spatial downsampling), and a decoder that consists
    of a stack of `Conv2D` and `UpSampling2D` layers.
