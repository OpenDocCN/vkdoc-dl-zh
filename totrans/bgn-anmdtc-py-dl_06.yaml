- en: We will collect 20,000 normal records and 400 abnormal records. You can pick
    different ratios, but in general, using more normal data examples than abnormal
    data examples is better, as you want to teach your autoencoder what normal data
    looks like. Too much abnormal data in training will train the autoencoder to learn
    that the anomalies are actually normal, which goes against our goal. Figure [6-7](#Fig7)
    shows sampling the Dataframe choosing a majority of normal data.
