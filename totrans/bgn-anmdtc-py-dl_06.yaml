- en: Now, compile the model using RMSprop as the optimizer and mean-squared error
    for the loss computation. The RMSprop optimizer is similar to the gradient descent
    algorithm with momentum. A metric function is similar to a loss function, except
    that the results from evaluating a metric are not used when training the model.
    You may use as a metric function any of the loss functions listed at [`https://keras.io/losses/`](https://keras.io/losses/).
    Figure [6-10](#Fig10) shows the code to compile the model using mean absolute
    error (MAE) and accuracy as metrics.
