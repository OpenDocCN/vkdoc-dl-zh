- en: Summary
  id: totrans-539
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we discussed various types of autoencoders and how they can
    be used to build anomaly detection engines. We looked at implementing a simple
    autoencoder, a sparse autoencoder, a deep autoencoder, a convolutional autoencoder,
    and a denoising autoencoder. We also explored the variational autoencoder as a
    means to detect anomalies.
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们讨论了各种类型的自编码器以及它们如何被用来构建异常检测引擎。我们研究了实现一个简单的自编码器、一个稀疏自编码器、一个深度自编码器、一个卷积自编码器和去噪自编码器。我们还探讨了变分自编码器作为检测异常的手段。
- en: In Chapter [7](483137_2_En_7_Chapter.xhtml), we will look at another method
    of anomaly detection, using generative adversarial networks.
  id: totrans-541
  prefs: []
  type: TYPE_NORMAL
  zh: 在第[7](483137_2_En_7_Chapter.xhtml)章中，我们将探讨另一种异常检测方法，即使用生成对抗网络。
