- en: 5. Natural Language Processing with TensorFlow 2.0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This chapter focuses on some of the aspects of natural language processing (NLP),
    using TensorFlow 2.0\. NLP is a complex field in itself, and there are multiple
    tools and techniques available in the open source community for users to leverage.
    This chapter is mainly divided into three parts. The first offers a brief introduction
    to NLP and the building blocks of text processing in TensorFlow 2.0\. In the second
    part, we discuss word embeddings and how they can be used to detect the semantic
    meaning of words. In the final part, we will build a deep neural network, to predict
    the sentiment of a user review. We will also plot word embeddings, using the TensorFlow
    Projector, and view them in 3D space.
  prefs: []
  type: TYPE_NORMAL
- en: NLP Overview
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: NLP is a vast field, and we will touch upon some fundamental shifts that have
    occurred over last few decades. NLP research goes back to the 1950s, when people
    started to work on problems related to language translation. It has evolved since
    then, and we are witnessing some groundbreaking work in this area of research.
    If we consider how this evolution has been occurring, we can consult the NLP curve
    chart that has been mentioned in the paper “Jumping NLP Curves” (Cambria and White,
    2014), as shown in Figure [5-1](#Fig1).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_5_Chapter/489297_1_En_5_Fig1_HTML.jpg](../images/489297_1_En_5_Chapter/489297_1_En_5_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-1
  prefs: []
  type: TYPE_NORMAL
- en: NLP curves
  prefs: []
  type: TYPE_NORMAL
- en: We start with the syntactic layer, where the focus is to deconstruct the text
    into smaller pieces. Techniques such as POS (parts of speech) tagging, chunking,
    and lemmatization were carried out to bring the overall text into a more desirable
    form. This is what is known as a “bag-of-words” approach. Slowly and gradually,
    we have moved into what is known as the second layer—semantics curve. In this
    layer, it’s all about extracting the meaning of the text. It uses different techniques
    under the hood to figure out the concept and meaning of the words in the text.
    It helped to evolve from simply using text as symbols to actually using them for
    their meaning and relevance in the overall text. This stage is also known as “bag-of-concepts”
    model. The final and third phase of the NLP curve time line is the pragmatics
    curve, which goes beyond just the meaning of text but, rather, deals with contextual
    information. The ability to decode sarcasm, understand deep aspects of polarity,
    and personality recognition is what it strives for. Researchers are already working
    in this direction to reach this stage. It entails lot of components associated
    with text and computers. In fact, NLP is what falls at the cross section of linguistics
    and computers.
  prefs: []
  type: TYPE_NORMAL
- en: Text data makes up a huge percentage of the total data being generated on a
    global level. Therefore, it provides an incredible platform that can be used in
    many other ways. One of the most impactful use cases in terms of text data has
    been to identify the perception of the people related to a particular brand, based
    on the reviews they write. It has helped businesses to recalibrate their strategies
    to manage their brand value in the market. Supervised learning problems under
    the text category can be broadly identified as
  prefs: []
  type: TYPE_NORMAL
- en: Reviews/text classification
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Text summarization (news, blogs, journals)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Spam detection
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Audience segmentation on social media platforms
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Chatbot
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In this chapter, we are going to focus on the text classification type.
  prefs: []
  type: TYPE_NORMAL
- en: Text Preprocessing
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Text data can either be in structured or unstructured form. Most of the time,
    we have to apply certain cleaning and transformation techniques in order to preprocess
    the text data before we use it. In this section, we are going to see some of those
    techniques to deal with text data, using TensorFlow.
  prefs: []
  type: TYPE_NORMAL
- en: Tokenization
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The first technique to use on text data is known as tokenization. Tokens stand
    for individual words/symbols/numbers present in the text. For example, if we have
    a simple text, and we want to apply tokenization on it, we can simply create a
    tokenization instance and apply it, as shown following.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: The tokenizer collects all the distinct words appearing in the text and assigns
    a label to each one. It also assigns the labels in such a way that initial values
    are assigned to high-frequency tokens. We can validate this if we check the frequency
    of the words appearing in the sample. To view the labels of each token, we can
    call `word_index` on the tokenized text.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Tokenizer does the heavy lifting in the background, by taking care of duplicate/similar
    words, removing punctuation, and converting letters to lower case. For example,
    if tf and tf! appear in the text, tokenization would consider both to be the same
    tokens, by removing the “!” in the background.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: So far, we have seen labels assigned to each of these tokens, but at the end
    of the day, we are dealing with sentences, which are collections of words. Therefore,
    we must combine these individual labels in such a way as to represent entire sentences
    numerically. One of the most fundamental approaches to converting a sequence of
    words into numerical form is simply to apply text to sequence functionality on
    the entire text sentence.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: As we can see, we get three different arrays, representing individual sentences
    in the `sample_edit_text`. Although we are able to achieve our goal, there are
    still some gaps in this representation. One is that each array is of different
    length, which can be a potential problem when using these vectors in any sort
    of machine learning model training. To handle the different lengths of arrays,
    we can make use of something known as padding. This converts vectors of different
    lengths into vectors of the same length, by padding the vectors by a value of
    0 at the beginning or end of a vector.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Now, we are left with three vectors, all of equal length.
  prefs: []
  type: TYPE_NORMAL
- en: Word Embeddings
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We already saw the method to represent a set of words in a sentence in numerical
    form, using labels and the padding technique. There are some simpler and much
    more complicated methods, in addition to representing text in numerical form.
    We can basically divide them into two categories:'
  prefs: []
  type: TYPE_NORMAL
- en: Frequency-based
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Prediction-based
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Frequency-based techniques include vectorizer, tf-idf, and hashing vectorizer,
    whereas prediction-based techniques involve such methods as CBOW (continuous bag-of-words)
    and Skip-Gram model. We will not go into the details of each of these methods,
    as there are enough articles and information related to these approaches available
    on various platforms. The idea of this section is to use word embeddings from
    our input data set and visualize them, using TensorFlow Projector. But before
    we jump into building a model, let’s discuss briefly exactly what embeddings are.
  prefs: []
  type: TYPE_NORMAL
- en: 'Embeddings are, again, numerical representations of text information, but they
    are much more powerful and relevant, compared to other methods. Embeddings are
    nothing but the weights of the hidden layer of a shallow neural network that was
    trained on a certain set of text. We can decide on the size of these embeddings
    as per need (50, 100, or more) as well, but the key thing to remember here is
    that the embedding value can differ for the same text, based on different data
    it’s been trained on. The core advantage that word embedding offers is that it
    captures the semantic meaning of the word, as it uses the idea of distributed
    representations. It predicts these embedding values, based on other words similar
    to that word. Therefore, there’s an extent of dependence or similarity between
    a particular word and other similar words. We are going to see later in the chapter
    how similar words tend to have embeddings that are closer to each other in high-dimensional
    representation. There are some standard off-the-shelf methods available for calculating
    word embeddings, including the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Word2Vec (by Google)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: GloVe (by Stanford)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: fastText (by Facebook)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Text Classification Using TensorFlow
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this section, we are going to build a deep neural network to predict the
    sentiment of a consumer review (positive or negative). The idea of building this
    network is not to focus on its accuracy but, rather, the process of dealing with
    text classification in TensorFlow 2.0 and the visualization of word embeddings.
    The data set that we are going to use for this task is the summary of people’s
    review about the products on the Amazon web site. Instead of an entire review,
    we will use summary information. The data set is available with the code bundle
    for this book. We start by importing the required libraries and reading the data
    set.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: '![../images/489297_1_En_5_Chapter/489297_1_En_5_Figa_HTML.jpg](../images/489297_1_En_5_Chapter/489297_1_En_5_Figa_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: As we can see, there are only two columns in the data frame (Sentiment, Summary),
    and we have positive counts on the higher side, compared to negative summaries
    (80K).
  prefs: []
  type: TYPE_NORMAL
- en: Text Processing
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now we apply a couple of text-cleaning techniques, using a helper function.
    In this helper function, we use a regular expression to remove unwanted symbols,
    characters, and numbers, to set the reviews into a standard format. We apply this
    helper function on the Summary column of the data frame.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: '![../images/489297_1_En_5_Chapter/489297_1_En_5_Figb_HTML.jpg](../images/489297_1_En_5_Chapter/489297_1_En_5_Figb_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: As we can see, the text looks much cleaner now and ready for tokenization. Before
    tokenization, let’s create the input and output columns from the data frame. As
    mentioned earlier, the goal of this exercise is not to achieve a very high accuracy
    but to understand the approach itself. Therefore, we are not going to split the
    data into Train and Test.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: Here, by applying `tokenizer`, we are ensuring that we want to consider a maximum
    10,000-word vocabulary. For unseen words, we use a default token.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_5_Chapter/489297_1_En_5_Figc_HTML.jpg](../images/489297_1_En_5_Chapter/489297_1_En_5_Figc_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: So, we have more than 32,000 unique words in the text. We now apply tokenization
    on entire sequences.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_5_Chapter/489297_1_En_5_Figd_HTML.jpg](../images/489297_1_En_5_Chapter/489297_1_En_5_Figd_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: As we can see, each summary gets converted into a vector, but of different lengths.
    We now apply padding (`post`), to make vectors of equal length (`100`).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_5_Chapter/489297_1_En_5_Fige_HTML.jpg](../images/489297_1_En_5_Chapter/489297_1_En_5_Fige_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: As a result of padding, we end up with a numerical representation (vector length
    of 100) for every summary in the data set. One last thing before we start building
    the model is to convert the target variable `y` from Panda’s series object to
    a NumPy array.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: Deep Learning Model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now we can start building the deep learning model, which is going to be of sequential
    type. We are keeping the embedding size as 50, by declaring the `output_dim` as
    50.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: We now train the model on the input data, by calling the `fit` method. At each
    epoch, we witness loss.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: '![../images/489297_1_En_5_Chapter/489297_1_En_5_Figf_HTML.jpg](../images/489297_1_En_5_Chapter/489297_1_En_5_Figf_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Embeddings
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now that the model is trained, we can extract the embeddings from the model,
    using the `layers` function. Each embedding is a vector of size 50, and we have
    10,000 embeddings, since our total words were set to 10,000.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: In order to visualize the embeddings in the 3D space, we must reverse the key
    value for embeddings and respective words, so as to represent every word via its
    embedding. To do this, we create a helper function.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: In the final part of this exercise, we extract the embeddings value and put
    it into a `.tsv` file, along with another `.tsv` file that captures the words
    of the embedding.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: TensorFlow Projector
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that we have the individual embeddings and metadata for the data set, we
    can use TensorFlow Projector to visualize these embeddings in 3D space. In order
    to view the embeddings, we must first go to [`https://projector.tensorflow.org/`](https://projector.tensorflow.org/),
    as shown in Figure [5-2](#Fig2).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_5_Chapter/489297_1_En_5_Fig2_HTML.jpg](../images/489297_1_En_5_Chapter/489297_1_En_5_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-2
  prefs: []
  type: TYPE_NORMAL
- en: TensorFlow Projector
  prefs: []
  type: TYPE_NORMAL
- en: The next step is to upload the embeddings and metadata `.tsv` files that we
    saved in the last section, using the load option on the page, as shown in Figure
    [5-3](#Fig3).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_5_Chapter/489297_1_En_5_Fig3_HTML.jpg](../images/489297_1_En_5_Chapter/489297_1_En_5_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-3
  prefs: []
  type: TYPE_NORMAL
- en: Embeddings data load
  prefs: []
  type: TYPE_NORMAL
- en: Once loaded, the embeddings will become available in the projector, and we can
    observe the different clusters being formed, based on the values of each embedding,
    as shown in Figure [5-4](#Fig4).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_5_Chapter/489297_1_En_5_Fig4_HTML.jpg](../images/489297_1_En_5_Chapter/489297_1_En_5_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-4
  prefs: []
  type: TYPE_NORMAL
- en: Embeddings visualization
  prefs: []
  type: TYPE_NORMAL
- en: We can also observe that each embedding has a position in the overall context.
    Some are neutral, some are on the positive side, and some on the negative side
    of the center, as shown in Figure [5-5](#Fig5). We will now confirm if positive
    word embeddings are closer to each other in the visualization, and vice versa
    for negative words. Logically, the neutral words should be separate from both
    these clusters.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_5_Chapter/489297_1_En_5_Fig5_HTML.jpg](../images/489297_1_En_5_Chapter/489297_1_En_5_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-5
  prefs: []
  type: TYPE_NORMAL
- en: Positive, negative, and neutral embeddings
  prefs: []
  type: TYPE_NORMAL
- en: For example, if we look at the embedding of the word *like*, we can clearly
    see that similar words, such as *likeable*, *liked*, *likely*, and *likes*, are
    near to the actual like embedding, whereas opposite words, such as *dislike* and
    *disliked*, are at the other end of the group, as shown in Figure [5-6](#Fig6).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_5_Chapter/489297_1_En_5_Fig6_HTML.jpg](../images/489297_1_En_5_Chapter/489297_1_En_5_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-6
  prefs: []
  type: TYPE_NORMAL
- en: Similar embeddings
  prefs: []
  type: TYPE_NORMAL
- en: Let’s consider one more example, to validate whether embeddings have captured
    the semantic meaning of the words. We take “fanta” as the root word with which
    to view the embeddings. We can clearly see that words such as *fantastic*, *fantabulous*,
    etc., are closer to each other, whereas a neutral word like *fantasy* is at the
    center, as shown in Figure [5-7](#Fig7).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_5_Chapter/489297_1_En_5_Fig7_HTML.jpg](../images/489297_1_En_5_Chapter/489297_1_En_5_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-7
  prefs: []
  type: TYPE_NORMAL
- en: Similar embeddings
  prefs: []
  type: TYPE_NORMAL
- en: The final example demonstrates the actual distance separating embeddings from
    one another and which are the nearest embeddings. If we look at the word *worse*
    in the embedding projection, we see that the nearest similar words are *dangerous*,
    *lousy*, *poor*, *blah*, and *wasted*, as shown in Figure [5-8](#Fig8). These
    words also cluster at the negative end of the view.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_5_Chapter/489297_1_En_5_Fig8_HTML.jpg](../images/489297_1_En_5_Chapter/489297_1_En_5_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5-8
  prefs: []
  type: TYPE_NORMAL
- en: Nearest embeddings
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter provided a brief introduction to NLPs and the process of preprocessing
    text, using TensorFlow 2.0\. We built a deep learning model to classify text sentiment
    and visualized the individual embeddings, using TensorFlow Projector.
  prefs: []
  type: TYPE_NORMAL
