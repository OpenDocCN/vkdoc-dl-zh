- en: 4. Natural Language Processing
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 4. 自然语言处理
- en: In the modern age of information and analytics, natural language processing
    (NLP) is one of the most important technologies out there. Making sense of complex
    structures in language and deriving insights and actions from it are crucial from
    an artificial intelligence perspective. In several domains, the importance of
    natural language processing is paramount and ever growing, as digital information
    in the form of language is ubiquitous. Applications of natural language processing
    include language translation, sentiment analysis, web search applications, customer
    service automation, text classification, topic detection from text, language modeling,
    and so forth. Traditional methods of natural language processing relied on the
    bag of word models, the vector space of word model, and on-hand coded knowledge
    bases and ontologies. One of the key areas for natural language processing is
    the syntactic and semantic analysis of language. Syntactic analysis refers to
    how words are grouped and connected in a sentence. The main tasks in syntactic
    analysis are tagging parts of speech, detecting syntactic classes (such as verbs,
    nouns, noun phrases, etc.), and assembling sentences by constructing syntax trees.
    Semantic analysis refers to complex tasks such as finding synonyms, performing
    word-verb disambiguation, and so on. As part of this chapter, we will begin with
    a brief introduction of the traditional natural language processing techniques
    and then move on to deep learning-based methods involving recurrent neural networks,
    attention, and transformers.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 在信息分析和现代时代，自然语言处理 (NLP) 是最重要的技术之一。从人工智能的角度来看，理解语言中的复杂结构并从中得出见解和行动至关重要。在多个领域，自然语言处理的重要性至关重要且不断增长，因为以语言形式存在的数字信息无处不在。自然语言处理的应用包括语言翻译、情感分析、网络搜索应用、客户服务自动化、文本分类、从文本中检测主题、语言建模等。传统的自然语言处理方法依赖于词袋模型、词向量空间模型以及现成的编码知识库和本体。自然语言处理的关键领域之一是语言的句法和语义分析。句法分析指的是单词如何在句子中分组和连接。句法分析的主要任务是对词性进行标记、检测句法类别（如动词、名词、名词短语等），并通过构建句法树来组装句子。语义分析指的是复杂的任务，如寻找同义词、执行词-动词歧义消除等。作为本章的一部分，我们将首先简要介绍传统的自然语言处理技术，然后转向涉及循环神经网络、注意力和转换器的基于深度学习的方法。
- en: Vector Space Model (VSM)
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 向量空间模型 (VSM)
- en: 'In NLP information-retrieval systems, a document is generally represented as
    simply a vector of the count of the words it contains. For retrieving documents
    similar to a specific document, the cosine of the angle or the dot product between
    the document and other documents in the corpus is computed. The cosine of the
    angle between two vectors gives a similarity measure based on the similarity between
    their vector compositions. To illustrate this fact, let us look at two vectors
    *x*, *y* ∈ *R*^(2 × 1) as shown here:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在自然语言处理的信息检索系统中，一个文档通常被表示为包含的单词计数的向量。为了检索与特定文档相似的文档，计算文档与语料库中其他文档之间的角度余弦或点积。两个向量之间角度的余弦给出了基于它们向量组成的相似度度量。为了说明这一点，让我们看看这里所示的两个向量
    *x*，*y* ∈ R^(2 × 1)：
- en: '![$$ {\displaystyle \begin{array}{l}x=\kern0.5em {\left[2\space 3\right]}^T\\
    {}y=\kern0.5em {\left[4\space 6\right]}^T\end{array}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equa.png)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\displaystyle \begin{array}{l}x=\kern0.5em {\left[2\space 3\right]}^T\\
    {}y=\kern0.5em {\left[4\space 6\right]}^T\end{array}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equa.png)'
- en: Although vectors *x* and *y* are different, their cosine similarity is the maximum
    possible, i.e., 1\. This is because the two vectors are identical in their component
    compositions. The ratio of the first component to the second component for both
    vectors is ![$$ \frac{2}{3} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq1.png),
    and hence content-composition-wise, they are treated as being similar. Hence,
    documents with high cosine similarity are generally considered similar in nature.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然向量 *x* 和 *y* 不同，但它们的余弦相似度是最大的，即 1。这是因为这两个向量在它们的组成部分上是相同的。两个向量的第一个分量与第二个分量的比率是
    ![$$ \frac{2}{3} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq1.png)，因此从内容组成上看，它们被视为相似。因此，具有高余弦相似度的文档通常被认为是本质相似的。
- en: 'Let’s say we have two sentences:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们有两个句子：
- en: '![$$ Doc1=\left[ The\; dog\; chased\kern0.17em the\; cat\right] $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equb.png)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
  zh: '![Doc1=\left[ The\; dog\; chased\kern0.17em the\; cat\right] ](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equb.png)'
- en: '![$$ Doc2=\left[\kern0.5em The\kern0.5em cat\kern0.5em was\kern0.17em chased\kern0.17em
    down\kern0.5em by\kern0.5em the\kern0.5em dog\right] $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equc.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![Doc2=\left[\kern0.5em The\kern0.5em cat\kern0.5em was\kern0.17em chased\kern0.17em
    down\kern0.5em by\kern0.5em the\kern0.5em dog\right] ](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equc.png)'
- en: The number of distinct words in the two sentences would be the vector space
    dimension for this problem. The distinct words are *The*, *dog*, *chased*, *the*,
    *cat*, *down*, *by*, and *was*, and hence we can represent each document as an
    eight-dimensional vector of word counts.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个句子中不同单词的数量将是此问题的向量空间维度。不同的单词有 *The*，*dog*，*chased*，*the*，*cat*，*down*，*by*
    和 *was*，因此我们可以将每个文档表示为一个包含单词计数的八维向量。
- en: '![$$ {}^{\hbox{''}} Th{e}^{\prime}\kern0.5em do{g}^{\prime}\kern0.5em chase{d}^{\prime}\kern0.5em
    th{e}^{\prime}\kern0.5em ca{t}^{\prime}\kern0.5em do w{n}^{\prime}\kern0.5em b{y}^{\prime}\kern0.5em
    wa{s}^{\prime } $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equd.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![ {}^{\hbox{''}} Th{e}^{\prime}\kern0.5em do{g}^{\prime}\kern0.5em chase{d}^{\prime}\kern0.5em
    th{e}^{\prime}\kern0.5em ca{t}^{\prime}\kern0.5em do w{n}^{\prime}\kern0.5em b{y}^{\prime}\kern0.5em
    wa{s}^{\prime } ](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equd.png)'
- en: '![$$ Doc1=\left[1\ 1\ 1\ 1\ 1\ 0\ 0\ 0\right] $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Eque.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![Doc1=\left[1\ 1\ 1\ 1\ 1\ 0\ 0\ 0\right] ](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Eque.png)'
- en: '![$$ Doc2=\left[1\ 1\ 1\ 1\ 1\ 1\ 1\ 1\right] $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equf.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![Doc2=\left[1\ 1\ 1\ 1\ 1\ 1\ 1\ 1\right] ](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equf.png)'
- en: 'If we represent *Doc*1 by *v*[1] and *Doc*2 by *v*[2], then the cosine similarity
    can be expressed as follows:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们用 *v*[1] 表示 *Doc*1，用 *v*[2] 表示 *Doc*2，那么余弦相似度可以表示如下：
- en: '![$$ \cos \left({v}_1,{v}_2\right)=\frac{\left({v_1}^T{v}_2\right)}{v_1{v}_2}=\frac{1\times
    1+1\times 1+1\times 1+1\times 1+1\times 1}{\sqrt{5}\sqrt{8}}=\frac{5}{\sqrt{40}}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equg.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![cos \left({v}_1,{v}_2\right)=\frac{\left({v_1}^T{v}_2\right)}{v_1{v}_2}=\frac{1\times
    1+1\times 1+1\times 1+1\times 1+1\times 1}{\sqrt{5}\sqrt{8}}=\frac{5}{\sqrt{40}}
    ](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equg.png)'
- en: where ||*v*[1]|| is the magnitude or the *l* ² norm of the vector *v*[1].
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 其中，||*v*[1]|| 是向量 *v*[1] 的模或 *l*² 范数。
- en: As stated earlier, cosine similarity gives a measure of the similarity based
    on the component composition of each vector. If the components of the document
    vectors are in somewhat similar proportion, the cosine distance would be high.
    It does not take the magnitude of the vector into consideration.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，余弦相似度基于每个向量的分量组成来衡量相似度。如果文档向量的分量在某种程度上比例相似，余弦距离会较高。它不考虑向量的模。
- en: In certain cases, when the documents are of highly varying lengths, the dot
    product between the document vectors is taken instead of the cosine similarity.
    This is done when, along with the content of the document, the size of the document
    is also compared. For instance, we can have a tweet in which the words *global*
    and *economics* might have word counts of 1 and 2, respectively, while a newspaper
    article might have word counts of 50 and 100, respectively, for the same words.
    Assuming the other words in both documents have insignificant counts, the cosine
    similarity between the tweet and the newspaper article would be close to 1\. Since
    the tweet sizes are significantly smaller, the word counts proportion of 1:2 for
    *global* and *economics* does not really compare to the proportion of 1:2 for
    these words in the newspaper article. Hence, it does not really make sense to
    assign such a high similarity measure to these documents for several applications.
    In that case, taking the dot product as a similarity measure rather than the cosine
    similarity helps since it scales up the cosine similarity by the magnitude of
    the word vectors for the two documents. For comparable cosine similarities, documents
    with higher magnitudes would have higher dot product similarity since they have
    enough text to justify their word composition. The word composition for small
    texts might just be by chance and not be the true representation of its intended
    representation. For most applications where the documents are of comparable lengths,
    cosine similarity is a fair enough measure.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在某些情况下，当文档长度高度不同时，取文档向量之间的点积而不是余弦相似度。这是在比较文档内容的同时，也对比文档的大小时进行的。例如，我们可以有一个包含单词
    *global* 和 *economics* 的推文，其中这两个单词的词频分别为 1 和 2，而一篇报纸文章中相同的单词的词频可能分别为 50 和 100。假设两个文档中的其他单词的词频都不重要，推文和报纸文章之间的余弦相似度将接近
    1。由于推文的大小显著较小，*global* 和 *economics* 的词频比例 1:2 并不真正等同于报纸文章中这些单词的 1:2 比例。因此，对于许多应用来说，将如此高的相似度赋予这些文档并没有太多意义。在这种情况下，将点积作为相似度度量而不是余弦相似度是有帮助的，因为它通过两个文档的词向量的大小来放大余弦相似度。对于可比的余弦相似度，具有更高大小的文档会有更高的点积相似度，因为它们有足够的文本来证明它们的词组成。小文本的词组成可能只是偶然，并不真正代表其意图的表达。
- en: '![](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig1_HTML.jpg)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig1_HTML.jpg)'
- en: The representation of the acute angle theta. v 1 and v 2 stand for the angle's
    two sides. The image also displays the cos theta formula.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: acute angle theta 的表示。v1 和 v2 代表角度的两边。图像还显示了 cos theta 公式。
- en: Figure 4-1
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-1
- en: Cosine similarity between two word vectors
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 两个词向量之间的余弦相似度
- en: Figure [4-1](#Fig1) illustrates two vectors *v*[1] and *v*[2] with cosine similarity
    as the cosine of the angle *θ* between them.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [4-1](#Fig1) 展示了两个向量 *v*[1] 和 *v*[2]，它们之间的余弦相似度是它们之间角度 *θ* 的余弦值。
- en: At times, it makes sense to work with the distance counterpart of the cosine
    similarity. The cosine distance is defined as the square of the Euclidean distance
    between the unit vectors in the direction of the original vectors for which the
    distance needs to be computed. For two vectors *v*[1] and *v*[2] at an angle of
    *θ* between them, the cosine distance is given by 2(1 − cos *θ*).
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，使用余弦相似度的距离对应物是有意义的。余弦距离定义为需要计算距离的原向量的单位向量之间的欧几里得距离的平方。对于两个向量 *v*[1] 和 *v*[2]，它们之间的角度为
    *θ*，余弦距离由 2(1 - cos *θ*) 给出。
- en: 'This can be easily deduced by taking the square of the Euclidean distance between
    the unit vectors ![$$ {u}_1=\frac{v_1}{\left\Vert {v}_1\right\Vert } $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq2.png)
    and ![$$ {u}_2=\frac{v_2}{\left\Vert {v}_2\right\Vert } $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq3.png)
    as shown here:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 这可以通过取单位向量 ![$$ {u}_1=\frac{v_1}{\left\Vert {v}_1\right\Vert } $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq2.png)
    和 ![$$ {u}_2=\frac{v_2}{\left\Vert {v}_2\right\Vert } $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq3.png)
    之间的欧几里得距离的平方来轻松推导，如图所示：
- en: '![$$ {\displaystyle \begin{array}{l}{u}_1-{u_2}^2={\left({u}_1-{u}_2\right)}^T\left\Vert({u}_1-{u}_2\right\Vert)\\
    {}\operatorname{} ={u_1}^T{u}_1+{u_2}^T{u}_2-2{u_1}^T{u}_2\\ {}\operatorname{}
    ={\left\Vert u_1 \right\Vert}^2+{\left\Vert u_2 \right\Vert}^2-2\left\Vert {u}_1
    \right\Vert \left\Vert {u}_2 \right\Vert cos\theta \end{array}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equh.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![向量差的平方](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equh.png)'
- en: Now, *u*[1] and *u*[2] being unit vectors, their magnitudes ||*u*[1]|| and ||*u*[2]||,
    respectively, are both equal to 1 and hence
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，由于*u*[1]和*u*[2]是单位向量，它们的模||*u*[1]||和||*u*[2]||分别都等于1，因此
- en: '![$$ {\left\Vert {u}_1\right\Vert}^2+{\left\Vert {u}_2\right\Vert}^2-2\left\Vert
    {u}_1\right\Vert \kern0.5em \left\Vert {u}_2\right\Vert cos\theta =1+1-2 cos\theta
    =2\left(1- cos\theta \right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equi.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![向量长度平方和](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equi.png)'
- en: Generally, when working with document term-frequency vectors, the raw term/word
    counts are not taken and instead are normalized by how frequently the word is
    used in the corpus. For example, the term *the* is a frequently occurring word
    in any corpus, and it is likely that the term has a high count in two documents.
    This high count for *the* is likely to increase the cosine similarity, whereas
    we know that the term is a frequently occurring word in any corpus and should
    contribute very little to document similarity. The count of such words in the
    document term vector is penalized by a factor called *inverse document frequency*.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 通常情况下，在处理文档词频向量时，不会直接使用原始的词/词数，而是通过单词在语料库中的使用频率进行归一化。例如，单词“the”在任何语料库中都是高频出现的，因此它在两份文档中的计数可能很高。这种对“the”的高频计数可能会增加余弦相似度，而我们知道这个单词在任何语料库中都是高频出现的，应该对文档相似性贡献很小。在文档词频向量中，这类单词的计数会通过一个称为“逆文档频率”的因子进行惩罚。
- en: 'For a term word *t* occurring *n* times in a document *d* and occurring in
    *N* documents out of *M* documents in the corpus, the normalized count after applying
    inverse document frequency is as follows:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一个在文档*d*中出现了*n*次的术语词*t*，在语料库中的*M*个文档中出现在*N*个文档中，应用逆文档频率后的归一化计数如下：
- en: '![$$ Normalized\kern0.17em count=\left(\kern0.5em Term\kern0.17em freqency\right)\times
    \left( Inverse\kern0.17em document\kern0.17em frequency\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equj.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![归一化计数](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equj.png)'
- en: '![$$ = nlog\left(\frac{M}{N}\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equk.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![对数函数](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equk.png)'
- en: As we can see, as *N* increases with respect to *M*, the ![$$ \log \left(\frac{M}{N}\right)
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq4.png) component
    diminishes until it’s zero for *M* = *N*. So, if a word is highly popular in the
    corpus, then it would not contribute much to the individual document term vector.
    A word that has high frequency in the document but is less frequent across the
    corpus would contribute more to the document term vector. This normalizing scheme
    is popularly known as *tf* − *idf*, a short-form representation for term-frequency
    inverse document frequency. Generally, for practical purposes, the (*N* + 1) is
    taken as a denominator to avoid zeros that make the *log* function undefined.
    Hence, the inverse document frequency can be rephrased as ![$$ \log \left(\frac{M}{N+1}\right)
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq5.png)
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所见，随着*N*相对于*M*的增加，![对数函数](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq4.png)这一部分会逐渐减小，直到*M*等于*N*时为零。因此，如果一个单词在语料库中非常流行，那么它对单个文档词频向量就不会有太大的贡献。一个在文档中频率高但在整个语料库中频率较低的单词会对文档词频向量有更大的贡献。这种归一化方案通常被称为*tf*−*idf*，它是词频逆文档频率的简写形式。通常，为了实际应用，将(*N* + 1)作为分母以避免使*对数*函数未定义的零值。因此，逆文档频率可以重新表述为![对数函数](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq5.png)
- en: 'Normalizing schemes are even applied to the term-frequency *n* to make it nonlinear.
    A popular such normalizing scheme is BM25 where the document frequency contribution
    is linear for small values of *n* and then the contribution is made to saturate
    as *n* increases. The term frequency is normalized as follows in BM25:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 归一化方案甚至应用于词语频率 *n*，使其非线性。一种流行的归一化方案是 BM25，其中对于小的 *n* 值，文档频率的贡献是线性的，然后随着 *n*
    的增加，贡献趋于饱和。在 BM25 中，词语频率的归一化如下：
- en: '![$$ BM25(n)=\frac{\left(k+1\right)n}{k+n} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equl.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![$$ BM25(n)=\frac{\left(k+1\right)n}{k+n} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equl.png)'
- en: where *k* is a parameter that provides different shapes for different values
    of *k* and one needs to optimize *k* based on the corpus.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *k* 是一个参数，它为不同的 *k* 值提供不同的形状，并且需要根据语料库来优化 *k*。
- en: '![](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig2_HTML.jpg)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig2_HTML.jpg)'
- en: The relationship between term frequency and normalized term frequency is represented
    on the graph. The graph displays a linear plot that is drawn diagonally.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 词语频率与归一化词语频率之间的关系在图中表示。图显示了一个对角线绘制的线性图。
- en: Figure 4-2
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-2
- en: Normalized term frequency vs. term frequency for different methods
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 不同方法的归一化词语频率与词语频率对比
- en: In Figure [4-2](#Fig2), the normalized term frequency for different normalizing
    schemes has been plotted against the term frequency. Square-root transformation
    makes the dependency sublinear, whereas the BM25 plot for *k* = 1.2 is very aggressive
    and the curve saturates beyond a term frequency of 5\. As stated earlier, the
    *k* can be optimized through cross-validation or other methods based on the problem
    needs.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 在图 [4-2](#Fig2) 中，不同归一化方案的归一化词语频率与词语频率进行了对比。平方根变换使得依赖关系变为次线性，而 *k* = 1.2 的 BM25
    图非常激进，曲线在词语频率超过 5 后趋于饱和。如前所述，*k* 可以通过交叉验证或其他基于问题需求的方法进行优化。
- en: Vector Representation of Words
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 单词的向量表示
- en: Just as the documents are expressed as vectors of different word counts, a word
    in a corpus can also be expressed as a vector, with the components being word
    counts in each document.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 正如文档可以用不同单词计数的向量来表示一样，语料库中的一个单词也可以表示为一个向量，其分量是每个文档中的单词计数。
- en: Other ways of expressing words as vectors would be to have the component specific
    to a document set to 1 if the word is present in the document or zero if the word
    does not exist in the document.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 将单词表示为向量的其他方法是将特定于文档集的分量设置为 1，如果单词存在于文档中，或者设置为 0，如果单词不存在于文档中。
- en: '![$$ {\displaystyle \begin{array}{l}\space \space {}^{\hbox{''}} Th{e}^{\prime}\;
    do{g}^{\prime}\; chase{d}^{\prime}\; th{e}^{\prime}\; ca{t}^{\prime}\; do w{n}^{\prime}\;b{y}^{\prime}\;
    wa{s}^{\prime}\\ {} Doc11=\space \left[1\kern0.5em 1\kern0.5em 1\kern0.5em 1\kern0.5em
    1\kern0.5em 0\kern0.5em 0\kern0.5em 0\right]\in {{\mathbb{R}}}^{8\times 1}\\ {}
    Doc12=\space \left[1\kern0.5em 1\kern0.5em 1\kern0.5em 1\kern0.5em 1\kern0.5em
    1\kern0.5em 1\kern0.5em 1\right]\in {{\mathbb{R}}}^{8\times 1}\end{array}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equm.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\displaystyle \begin{array}{l}\space \space {}^{\hbox{''}} Th{e}^{\prime}\;
    do{g}^{\prime}\; chase{d}^{\prime}\; th{e}^{\prime}\; ca{t}^{\prime}\; do w{n}^{\prime}\;b{y}^{\prime}\;
    wa{s}^{\prime}\\ {} Doc11=\space \left[1\kern0.5em 1\kern0.5em 1\kern0.5em 1\kern0.5em
    1\kern0.5em 0\kern0.5em 0\kern0.5em 0\right]\in {{\mathbb{R}}}^{8\times 1}\\ {}
    Doc12=\space \left[1\kern0.5em 1\kern0.5em 1\kern0.5em 1\kern0.5em 1\kern0.5em
    1\kern0.5em 1\kern0.5em 1\right]\in {{\mathbb{R}}}^{8\times 1}\end{array}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equm.png)'
- en: Reusing the same example, the word *The* can be expressed as a two-dimensional
    vector [1 1] ^(*T*) in the corpus of two documents. In a huge corpus of documents,
    the dimensionality of the word vector would be large as well. Like document similarity,
    word similarity can be computed through either cosine similarity or dot product.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 重复使用相同的例子，单词 *The* 可以在两个文档的语料库中表示为二维向量 [1 1] ^(*T*)。在一个巨大的文档语料库中，单词向量的维度也会很大。像文档相似度一样，单词相似度可以通过余弦相似度或点积来计算。
- en: Another way to represent words in a corpus is to one-hot encode them. In that
    case, the dimensionality of each word would be the number of unique words in the
    corpus. Each word would correspond to an index that would be set to 1 for the
    word, and all other remaining entries would be set to 0\. So, each would be extremely
    sparse. Even similar words would have entries set to 1 for different indexes,
    and hence any kind of similarity measure would not work.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 在语料库中表示单词的另一种方式是对它们进行 one-hot 编码。在这种情况下，每个单词的维度将是语料库中唯一单词的数量。每个单词将对应一个索引，该索引将被设置为
    1，用于该单词，而所有其他剩余条目将被设置为 0。因此，每个向量都会非常稀疏。即使相似的单词也会在不同的索引上设置条目为 1，因此任何类型的相似度度量都不会起作用。
- en: To represent word vectors better so that the similarity of the words can be
    captured more meaningfully, and to render less dimensionality to word vectors,
    Word2Vec was introduced.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更好地表示词向量，以便更有意义地捕捉词的相似性，并降低词向量的维度，引入了 Word2Vec。
- en: Word2Vec
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Word2Vec
- en: Word2Vec is an intelligent way of expressing a word as a vector by training
    the word with words in its neighborhood as context. Words that are contextually
    similar the given word would produce high cosine similarity or dot product when
    their Word2Vec representations are considered.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: Word2Vec 是一种通过将单词与其邻近单词作为上下文进行训练，将单词表示为向量的智能方法。与给定单词在上下文中相似的单词，当考虑它们的 Word2Vec
    表示时，会产生高余弦相似度或点积。
- en: Generally, the words in the corpus are trained with respect to the words in
    their neighborhood to derive the set of the Word2Vec representations. The two
    most popular methods of extracting Word2Vec representations are the CBOW (continuous
    bag of words) method and Skip-gram method. The core idea behind CBOW is expressed
    in Figure [4-3](#Fig3).
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，语料库中的单词会根据其邻近的单词进行训练，以推导出 Word2Vec 表示的集合。提取 Word2Vec 表示的最流行的方法是 CBOW（连续词袋）方法和
    Skip-gram 方法。CBOW 的核心思想在图 [4-3](#Fig3) 中表达。
- en: Continuous Bag of Words (CBOW)
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 连续词袋（CBOW）
- en: The CBOW method tries to predict the center word from the context of the neighboring
    words in a specific window length. Let’s look at the following sentence and consider
    a window of 5 as a neighborhood.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: CBOW 方法试图从特定窗口长度的邻近单词的上下文中预测中心词。让我们看看以下句子，并考虑一个窗口长度为 5 的邻域。
- en: '![$$ {}^{``} The\  cat\  jumped\ over\ the\ fence\ and\ crossed\ the\ {road}^{"}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equn.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equn.png)'
- en: In the first instance, we will try to predict the word ***jumped*** from its
    neighborhood ***The cat over the***. In the second instance, as we slide the window
    by one position, we will try to predict the word ***over*** from the neighboring
    words ***cat jumped the fence***. This process would be repeated for the entire
    corpus.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一种情况下，我们将尝试从其邻域 ***The cat over the*** 中预测单词 ***jumped***。在第二种情况下，当我们滑动窗口一个位置时，我们将尝试从邻近单词
    ***cat jumped the fence*** 中预测单词 ***over***。这个过程将在整个语料库中重复进行。
- en: '![](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig3_HTML.jpg)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig3_HTML.jpg)'
- en: The illustration of the continuous bag of word model. Both the input layer and
    the softmax layer are present on the sides of the input and output embedding matrices,
    respectively.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 连续词袋模型（CBOW）的示意图。输入层和 softmax 层分别位于输入和输出嵌入矩阵的两侧。
- en: Figure 4-3
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-3
- en: Continuous bag of word model for word embeddings
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 词嵌入的连续词袋模型
- en: As shown in Figure [4-3](#Fig3), the continuous bag of word model (CBOW) is
    trained on the context words as input and the center word as the output. The words
    in the input layer are expressed as one-hot encoded vectors where the component
    for the specific word is set to 1 and all other components are set to 0\. The
    number of unique words *V* in the corpus determines the dimensionality of these
    one-hot encoded vectors, and hence *x*^((*t*)) ∈ *R*^(*V* × 1). Each one-hot encoded
    vector *x*^((*t*)) is multiplied by the input embedding matrix *WI* ∈ *R*^(*N* × *V*)
    to extract the word-embedding vector *u*^((*k*)) ∈ *R*^(*N* × 1) specific to that
    word. The index *k* in *u*^((*k*)) signifies that *u*^((*k*)) is the word embedded
    for the *kth* word in the vocabulary. The hidden-layer vector *h* is the average
    of the input embedding vectors for all the context words in the window, and hence
    *h* ∈ *R*^(*N* × 1) has the same dimension as that of the word-embedding vectors.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 如图 [4-3](#Fig3) 所示，连续词袋模型（CBOW）是在上下文单词作为输入和中心词作为输出的情况下进行训练的。输入层的单词表示为独热编码向量，其中特定单词的分量设置为
    1，所有其他分量设置为 0。语料库中独特的单词数量 *V* 决定了这些独热编码向量的维度，因此 *x*^((*t*)) ∈ *R*^(*V* × 1)。每个独热编码向量
    *x*^((*t*)) 都与输入嵌入矩阵 *WI* ∈ *R*^(*N* × *V*) 相乘，以提取特定于该单词的词嵌入向量 *u*^((*k*)) ∈ *R*^(*N*
    × 1)。*u*^((*k*)) 中的索引 *k* 表示 *u*^((*k*)) 是词汇表中第 *k* 个单词的嵌入词。隐藏层向量 *h* 是窗口中所有上下文单词的输入嵌入向量的平均值，因此
    *h* ∈ *R*^(*N* × 1) 与词嵌入向量具有相同的维度。
- en: '![$$ h=\frac{1}{l-1}{\sum}_{\begin{array}{c}k=\left(t-2\right)\\ {}k\ne t\end{array}}^{\left(t+2\right)}(WI){x}^{(k)}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equo.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![h=1/(l-1)∑(k=(t-2)~k≠t)^(t+2)(WI)x^(k)](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equo.png)'
- en: where *l* is the length of the window size.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *l* 是窗口大小的长度。
- en: Just for clarity, let’s say we have a six-word vocabulary—i.e., *V* = 6—with
    the words being *cat*, *rat*, *chased*, *garden*, *the*, and *was*.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 为了清晰起见，让我们假设我们有一个包含六个单词的词汇表——即 *V* = 6——单词包括 *cat*，*rat*，*chased*，*garden*，*the*
    和 *was*。
- en: 'Let their one-hot encodings occupy the indexes in order so they can be represented
    as follows:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 让它们的独热编码按照顺序占据索引，以便它们可以表示如下：
- en: '![$$ {x}_{cat}=\left[\begin{array}{c}1\\ {}0\\ {}0\\ {}0\\ {}0\\ {}0\end{array}\right]\kern1em
    {x}_{rat}=\left[\begin{array}{c}0\\ {}1\\ {}0\\ {}0\\ {}0\\ {}0\end{array}\right]{x}_{chased}=\left[\begin{array}{c}0\\
    {}0\\ {}1\\ {}0\\ {}0\\ {}0\end{array}\right]{x}_{garden}=\left[\begin{array}{c}0\\
    {}0\\ {}0\\ {}1\\ {}0\\ {}0\end{array}\right]{x}_{the}=\left[\begin{array}{c}0\\
    {}0\\ {}0\\ {}0\\ {}1\\ {}0\end{array}\right]{x}_{was}=\left[\begin{array}{c}0\\
    {}0\\ {}0\\ {}0\\ {}0\\ {}1\end{array}\right] $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equp.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![x_cat=[1 0 0 0 0 0] x_rat=[0 1 0 0 0 0] x_chased=[0 0 1 0 0 0] x_garden=[0
    0 0 1 0 0] x_the=[0 0 0 0 1 0] x_was=[0 0 0 0 0 1]](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equp.png)'
- en: 'Let the input embedding where the embedding vector for each word is of dimensionality
    5 be expressed as follows:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 让输入嵌入表示为如下，其中每个单词的嵌入向量维度为 5：
- en: '![$$ {\displaystyle \begin{array}{l}\kern2em \space \kern0.36em cat\kern0.5em
    rat\kern0.5em chased\kern0.5em garden\kern0.5em the\kern0.5em was\\ {} WI=\left[\begin{array}{cccccc}0.5&amp;
    0.3&amp; 0.1&amp; 0.01&amp; 0.2&amp; 0.2\\ {}0.7&amp; 0.2&amp; 0.1&amp; 0.02&amp;
    0.3&amp; 0.3\\ {}0.9&amp; 0.7&amp; 0.3&amp; 0.4&amp; 0.4&amp; 0.33\\ {}0.8&amp;
    0.6&amp; 0.3&amp; 0.53&amp; 0.91&amp; 0.4\\ {}0.6&amp; 0.5&amp; 0.2&amp; 0.76&amp;
    0.6&amp; 0.5\end{array}\right]\end{array}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equq.png)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
  zh: '![cat rat chased garden the was WI=[0.5 0.3 0.1 0.01 0.2 0.2'
- en: 'Once we multiply the word-embedding matrix by the one-hot encoded vector for
    a word, we get the word-embedding vector for that word. Hence, by multiplying
    the one-hot vector for *cat* (i.e., *x*[*cat*]) by the input embedding matrix
    *WI*, one would get the first column of the *WI* matrix that corresponds to the
    cat, as shown here:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们将单词嵌入矩阵乘以单词的一个-hot 编码向量，我们就可以得到该单词的单词嵌入向量。因此，通过将 *cat* 的一个-hot 向量（即 *x*[*cat*]）乘以输入嵌入矩阵
    *WI*，我们就可以得到 *WI* 矩阵的第一列，该列对应于猫，如下所示：
- en: '![$$ {\displaystyle \begin{array}{c}\space \left[ WI\right]\left[{x}_{cat}\right]\\
    {}=\left[\begin{array}{cccccc}0.5&amp; 0.3&amp; 0.1&amp; 0.01&amp; 0.2&amp; 0.2\\
    {}0.7&amp; 0.2&amp; 0.1&amp; 0.02&amp; 0.3&amp; 0.3\\ {}0.9&amp; 0.7&amp; 0.3&amp;
    0.4&amp; 0.4&amp; 0.33\\ {}0.8&amp; 0.6&amp; 0.3&amp; 0.53&amp; 0.91&amp; 0.4\\
    {}0.6&amp; 0.5&amp; 0.2&amp; 0.76&amp; 0.6&amp; 0.5\end{array}\right]\left[\begin{array}{c}1\\
    {}0\\ {}0\\ {}0\\ {}0\\ {}0\end{array}\right]=\left[\begin{array}{c}0.5\\ {}0.7\\
    {}0.9\\ {}0.8\\ {}0.6\end{array}\right]\end{array}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equr.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![\[WI\]\[{x}_{cat}\]=\[begin{array}{cccccc}0.5& 0.3& 0.1& 0.01& 0.2& 0.2\\
    {}0.7& 0.2& 0.1& 0.02& 0.3& 0.3\\ {}0.9& 0.7& 0.3& 0.4& 0.4& 0.33\\ {}0.8& 0.6&
    0.3& 0.53& 0.91& 0.4\\ {}0.6& 0.5& 0.2& 0.76& 0.6& 0.5\end{array}\]\[begin{array}{c}1\\
    {}0\\ {}0\\ {}0\\ {}0\\ {}0\end{array}\]=\[begin{array}{c}0.5\\ {}0.7\\ {}0.9\\
    {}0.8\\ {}0.6\end{array}\]](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equr.png)'
- en: '![$$ \left[\begin{array}{c}0.5\\ {}0.7\\ {}0.9\\ {}0.8\\ {}0.6\end{array}\right]
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq6.png) is the
    word-embedding vector for the word *cat*.'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '![\[begin{array}{c}0.5\\ {}0.7\\ {}0.9\\ {}0.8\\ {}0.6\end{array}\]](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq6.png)
    是单词 *cat* 的单词嵌入向量。'
- en: Similarly, all the word-embedding vectors for the input words are extracted,
    and their average is the output of the hidden layer.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，提取所有输入单词的单词嵌入向量，它们的平均值是隐藏层的输出。
- en: The output of the hidden layer *h* is supposed to represent the embedding of
    the target word.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 隐藏层 *h* 的输出应该表示目标单词的嵌入。
- en: All the words in the vocabulary have another set of word embedding housed in
    the output embedding matrix *WO* ∈ *R*^(*V* × *N*). Let the word embeddings in
    *WO* be represented by *v*^((*j*)) ∈ *R*^(*N* × 1), where the index *j* denotes
    the *jth* word in the vocabulary in order as maintained in both the one-hot encoding
    scheme and the input embedding matrix.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 词汇表中的所有单词在输出嵌入矩阵 *WO* ∈ *R*^(*V* × *N*) 中都有一组单词嵌入。*WO* 中的单词嵌入可以用 *v*^((*j*))
    ∈ *R*^(*N* × 1) 表示，其中索引 *j* 表示词汇表中按顺序维护的 *jth* 个单词，无论是在 one-hot 编码方案还是在输入嵌入矩阵中。
- en: '![$$ WO=\left[\begin{array}{c}{v}^{(1)T}\to \\ {}{v}^{(2)T}\to \\ {}.\\ {}{v}^{(j)T}\to
    \\ {}.\\ {}{v}^{(V)T}\to \end{array}\right] $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equs.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![\[WO=\left[\begin{array}{c}{v}^{(1)T}\to \\ {}{v}^{(2)T}\to \\ {.\\ {}{v}^{(j)T}\to
    \\ {.\\ {}{v}^{(V)T}\to \end{array}\right]} \]](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equs.png)'
- en: The dot product of the hidden-layer embedding *h* is computed with each of the
    *v*^((*j*)) by multiplying the matrix *WO* by *h*. The dot product, as we know,
    would give a similarity measure for each of the output word embedding *v*^((*j*)) ∀ *j* ∈ {1,
    2, …., *N*} and the hidden-layer computed embedding *h*. The dot products are
    normalized to probability through a SoftMax, and, based on the target word *w*^((*t*)),
    the categorical cross-entropy loss is computed and backpropagated through gradient
    descent to update the matrices’ weights for both the input and output embedding
    matrices.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 隐藏层嵌入 *h* 与每个 *v*^((*j*)) 的点积是通过将矩阵 *WO* 乘以 *h* 来计算的。众所周知，点积将为每个输出单词嵌入 *v*^((*j*))
    ∀ *j* ∈ {1, 2, …., *N*} 和隐藏层计算的嵌入 *h* 提供相似度度量。点积通过 SoftMax 归一化为概率，并且基于目标单词 *w*^((*t*))，计算并反向传播分类交叉熵损失，以更新输入和输出嵌入矩阵的权重。
- en: 'Input to the SoftMax layer can be expressed as follows:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: SoftMax 层的输入可以表示如下：
- en: '![$$ \left[ WO\right]\left[h\right]=\left[\begin{array}{c}{v}^{(1)T}\to \\
    {}{v}^{(2)T}\to \\ {}.\\ {}{v}^{(j)T}\to \\ {}.\\ {}{v}^{(V)T}\to \end{array}\right]\left[h\right]=\left[{v}^{(1)T}h\;{v}^{(2)T}h\dots
    .\kern1em {v}^{(j)T}h\;{v}^{(V)T}h\right] $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equt.png)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
  zh: '![\[WO\]\[h\]=\[begin{array}{c}{v}^{(1)T}\to \\ {}{v}^{(2)T}\to \\ {.\\ {}{v}^{(j)T}\to
    \\ {.\\ {}{v}^{(V)T}\to \end{array}\right]\[h\]=\[begin{array}{c}{v}^{(1)T}h\;{v}^{(2)T}h\dots
    .\kern1em {v}^{(j)T}h\;{v}^{(V)T}h\right]}](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equt.png)'
- en: 'The SoftMax output probability for the *jth* word of the vocabulary *w*^((*j*))
    given the context words is given by the following:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 在给定上下文单词的情况下，词汇 *w*^((*j*)) 的 *jth* 单词的SoftMax输出概率如下所示：
- en: '![$$ P\left(w={w}^{(j)}/h\right)={p}^{(j)}=\frac{e^{v^{(j)T}h}}{\sum \limits_{k=1}^V{\textrm{e}}^{v^{(k)T}h}}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equu.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equu.png)'
- en: 'If the actual output is represented by a one-hot encoded vector *y* = [ *y*[1]*y*[2]….
    *y*[*j*]. . *y*[*v*]]^(*T*) ∈ *R*^(*V* × 1), where only one of the *y*[*j*] is
    1 (i.e., ![$$ \sum \limits_{j=1}^V{y}_j=1 $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq7.png)
    ), then the loss function for the particular combination of target word and its
    context words can be given by the following:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 如果实际输出由一个one-hot编码的向量 *y* = [ *y*[1]*y*[2]… *y*[*j*]… *y*[*v*]]^(*T*) ∈ *R*^(*V*
    × 1) 表示，其中只有一个 *y*[*j*] 是1（即 ![$$ \sum \limits_{j=1}^V{y}_j=1 $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq7.png)
    ），那么特定目标单词及其上下文的损失函数可以表示如下：
- en: '![$$ C=-\sum \limits_{j=1}^V{y}_j\log \left({p}^{(j)}\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equv.png)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equv.png)'
- en: The different *p*^((*j*))s are dependent on the input and output embeddings,
    which are parameters to the cost function *C*. The cost function can be minimized
    with respect to these embedding parameters through backpropagation gradient-descent
    techniques.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 不同的 *p*^((*j*)) 值取决于输入和输出嵌入，这些是成本函数 *C* 的参数。可以通过反向传播梯度下降技术来最小化这些嵌入参数。
- en: To make this more intuitive, let us say our target variable is `cat`. If the
    hidden-layer vector *h* gives the maximum dot product with the outer matrix word-embedding
    vector for `cat` while the dot product with the other outer word embedding is
    low, then the embedding vectors are more or less correct, and very little error
    or log-loss will be backpropagated to correct the embedding matrices. However,
    let us say the dot product of *h* with `cat` is less and that of the other outer
    embedding vectors is more; the loss of the SoftMax is going to be significantly
    high, and thus more errors/log-loss are going to be backpropagated to reduce the
    error.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使这更直观，让我们假设我们的目标变量是`cat`。如果隐藏层向量 *h* 与`cat`的外部矩阵单词嵌入向量的点积最大，而与其他外部单词嵌入向量的点积较低，那么嵌入向量大致正确，并且很少的错误或对数损失会反向传播以纠正嵌入矩阵。然而，假设
    *h* 与`cat`的点积较小，而与其他外部嵌入向量的点积较大；SoftMax的损失将显著增加，因此将反向传播更多的错误/对数损失以减少错误。
- en: Continuous Bag of Words Implementation in TensorFlow
  id: totrans-83
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: TensorFlow中的连续词袋实现
- en: The continuous bag of words TensorFlow implementation has been illustrated in
    this section. The neighboring words within a distance of two from either side
    are used to predict the middle word. The output layer is a big SoftMax over the
    entire vocabulary. The word-embedding vectors are chosen to be of size 128\. The
    detailed implementation is outlined in Listing [4-1a](#PC1). See also Figure [4-4](#Fig4).
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 本节已展示了连续词袋的TensorFlow实现。使用距离两侧各两个单词的邻近单词来预测中间单词。输出层是对整个词汇表的大SoftMax。单词嵌入向量的大小被选为128。详细的实现概述在列表[4-1a](#PC1)中。另请参阅图[4-4](#Fig4)。
- en: '[PRE0]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: training_corpus = “Deep learning has evolved from artificial neural networks
    which has been there since the 1940s. Neural networks are interconnected networks
    of processing units called artificial neurons that loosely mimic axons in a biological
    brain. In a biological neuron, the dendrites receive input signals from various
    neighboring neurons, typically greater than 1000\. These modified signals are
    then passed on to the cell body or soma of the neuron where these signals are
    summed together and then passed on to the axon of the neuron. If the received
    input signal is more than a specified threshold, the axon will release a signal
    which again will pass on to neighboring dendrites of other neurons. Figure [2-1](448418_2_En_2_Chapter.xhtml#Fig1)
    depicts the structure of a biological neuron for reference. The artificial neuron
    units are inspired from the biological neurons with some modifications as per
    convenience. Much like the dendrites, the input connections to the neuron carry
    the attenuated or amplified input signals from other neighboring neurons. The
    signals are passed onto the neuron where the input signals are summed up, and
    then a decision is taken what to output based on the total input received. For
    instance, for a binary threshold neuron output value of 1 is provided when the
    total input exceeds a predefined threshold; otherwise, the output stays at 0\.
    Several other types of neurons are used in artificial neural network, and their
    implementation only differs with respect to the activation function on the total
    input to produce the neuron output. In Figure [2-2](448418_2_En_2_Chapter.xhtml#Fig2),
    the different biological equivalents are tagged in the artificial neuron for easy
    analogy and interpretation.”
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: training_corpus = “深度学习从20世纪40年代以来的人工神经网络演变而来。神经网络是由称为人工神经元的处理单元组成的互联网络，这些人工神经元松散地模仿生物大脑中的轴突。在生物神经元中，树突从各种相邻神经元接收输入信号，通常大于1000。这些修改后的信号随后传递到神经元的细胞体或胞体，在这些地方，这些信号被相加，然后传递到神经元的轴突。如果接收到的输入信号超过指定的阈值，轴突将释放一个信号，该信号再次传递到其他神经元的相邻树突。图[2-1](448418_2_En_2_Chapter.xhtml#Fig1)展示了生物神经元的结构，供参考。人工神经元单元是从生物神经元中受到启发，并根据便利性进行了一些修改。与树突类似，连接到神经元的输入连接携带来自其他相邻神经元的衰减或放大输入信号。信号传递到神经元，在那里输入信号被相加，然后根据接收到的总输入决定输出什么。例如，对于二元阈值神经元，当总输入超过预定义的阈值时，输出值为1；否则，输出保持在0。在人工神经网络中使用了多种其他类型的神经元，它们的实现仅与产生神经元输出的激活函数有关。在图[2-2](448418_2_En_2_Chapter.xhtml#Fig2)中，人工神经元中的不同生物等效物被标记出来，以便于类比和解释。”
- en: '![](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig4_HTML.jpg)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig4_HTML.jpg)'
- en: The T N S E plot graph displays the plots for various words. The words describing
    the various functionalities are present in the plot.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: T N S E 图形显示各种单词的图表。描述各种功能的单词存在于图表中。
- en: Figure 4-4
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-4
- en: TSNE plot for the word-embedding vectors learned from CBOW
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 从CBOW学习到的词嵌入向量的TSNE图
- en: '[PRE1]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The word embeddings learned have been projected to a 2D plane through the TSNE
    plot. The TSNE plot gives a rough idea of the neighborhood of a given word. We
    can see that the word-embedding vectors learned are reasonable. For instance,
    the words *deep* and *learning* are very close to each other. Similarly, the words
    *biological* and *reference* are also very close to each other.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 通过TSNE图将学习到的单词嵌入投影到二维平面上。TSNE图给出了给定单词邻域的大致概念。我们可以看到，学习到的单词嵌入向量是合理的。例如，单词*deep*和*learning*彼此非常接近。同样，单词*biological*和*reference*也彼此非常接近。
- en: Skip-Gram Model for Word Embedding
  id: totrans-93
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 词嵌入的Skip-Gram模型
- en: 'Skip-gram models work the other way around. Instead of trying to predict the
    current word from the context words, as in continuous bag of words, in Skip-gram
    models, the context words are predicted based on the current word. Generally,
    given a current word, context words are taken in its neighborhood in each window.
    For a given window of five words, there would be four context words that one needs
    to predict based on the current word. Figure [4-5](#Fig5) shows the high-level
    design of a Skip-gram model. Much like continuous bag of words, in the Skip-gram
    model, one needs to learn two sets of word embedding: one for the input words
    and one for the output context words. A Skip-gram model can be seen as a reversed
    continuous bag of word model.'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: Skip-gram模型的工作方式相反。不是像在连续词袋模型中那样试图根据上下文词预测当前词，在Skip-gram模型中，上下文词是基于当前词进行预测的。一般来说，给定一个当前词，上下文词是在每个窗口中其邻域内的词。对于一个包含五个词的给定窗口，需要根据当前词预测四个上下文词。图[4-5](#Fig5)展示了Skip-gram模型的高级设计。与连续词袋模型类似，在Skip-gram模型中，需要学习两套词嵌入：一套用于输入词，另一套用于输出上下文词。Skip-gram模型可以看作是一个反向的连续词袋模型。
- en: '![](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig5_HTML.jpg)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig5_HTML.jpg)'
- en: The illustration of the skip-gram model. The flowchart's four main steps are
    the input layer, input embedding matrix, output embedding matrix, and softmax
    layer.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: Skip-gram模型示意图。流程图的四个主要步骤是输入层、输入嵌入矩阵、输出嵌入矩阵和Softmax层。
- en: Figure 4-5
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-5
- en: Skip-gram model for word embeddings
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 词嵌入的Skip-gram模型
- en: In the CBOW model, the input to the model is a one-hot encoded vector *x*^((*t*)) ∈ ℝ^(*V* × 1)
    for the current word, where *V* is the size of the vocabulary of the corpus. However,
    unlike CBOW, here the input is the current word and not the context words. The
    input *x*^((*t*)), when multiplied by the input word-embedding matrix *WI*, produces
    the word-embedding vector *u*^((*k*)) ∈ ℝ^(*N* × 1) given that *x*^((*t*)) represents
    the *kth* word in the vocabulary list. *N*, as before, represents the word-embedding
    dimensionality. The hidden-layer output *h* is nothing but *u*^((*k*)).
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 在CBOW模型中，模型的输入是当前词的一个one-hot编码向量*x*^((*t*))∈ℝ^(*V* × 1)，其中*V*是语料库词汇的大小。然而，与CBOW不同，这里的输入是当前词而不是上下文词。当*x*^((*t*))乘以输入词嵌入矩阵*WI*时，会产生词嵌入向量*u*^((*k*))∈ℝ^(*N*
    × 1)，其中*x*^((*t*))代表词汇列表中的*k*th个词。*N*，如前所述，代表词嵌入的维度。隐藏层输出*h*仅仅是*u*^((*k*)).
- en: The dot product of the hidden-layer output *h* is computed with every word vector
    *v*^((*j*)) of the outer embedding matrix *WO* ∈ *R*^(*V* × *N*) by computing
    [*WO*][*h*] just as in CBOW. However, instead of one SoftMax output layer, there
    are multiple SoftMax layers based on the number of context words that we are going
    to predict. For example, in Figure [4-5](#Fig5), there are four SoftMax output
    layers corresponding to the four context words. The input to each of these SoftMax
    layers is the same set of dot products in [*WO*][*h*] representing how similar
    the input word is to each word in the vocabulary.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 隐藏层输出*h*与外层嵌入矩阵*WO*∈R^(*V* × *N*)中每个词向量*v*^((*j*))的点积是通过计算[*WO*][*h*]来计算的，就像在CBOW中一样。然而，与一个SoftMax输出层不同，根据我们将要预测的上下文词的数量，存在多个SoftMax层。例如，在图[4-5](#Fig5)中，有四个SoftMax输出层，对应于四个上下文词。每个SoftMax层的输入是[*WO*][*h*]中的相同点积集合，表示输入词与词汇表中每个词的相似程度。
- en: '![$$ \left[ WO\right]\left[h\right]=\left[{v}^{(1)^T}h\kern1em {v}^{(2)^T}h\dots
    {v}^{(j)^T}h..{v}^{(V)^T}h\right] $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equw.png)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \left[ WO\right]\left[h\right]=\left[{v}^{(1)^T}h\kern1em {v}^{(2)^T}h\dots
    {v}^{(j)^T}h..{v}^{(V)^T}h\right] $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equw.png)'
- en: 'Similarly, all the SoftMax layers would receive the same set of probabilities
    corresponding to all the vocabulary words. The probability of the *jth* word *w*^((*j*))
    given the current or the center word *w*^((*k*)) is given by the following:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，所有SoftMax层都会接收到对应于所有词汇词的相同概率集合。给定当前词或中心词*w*^((*k*))，第*j*个词*w*^((*j*))的概率由以下给出：
- en: '![$$ P\left(w={w}^{(j)}/w={w}^{(k)}\right)={p}^{(j)}=\frac{e^{v^{(j)T}h}}{\sum
    \limits_{k=1}^V{\textrm{e}}^{v^{(k)T}h}}=\frac{e^{v^{(j)T}{w}^{(k)}}}{\sum \limits_{k=1}^V{\textrm{e}}^{v^{(k)T}{w}^{(k)}}}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equx.png)'
  id: totrans-103
  prefs: []
  type: TYPE_IMG
  zh: '![$$ P\left(w={w}^{(j)}/w={w}^{(k)}\right)={p}^{(j)}=\frac{e^{v^{(j)T}h}}{\sum
    \limits_{k=1}^V{\textrm{e}}^{v^{(k)T}h}}=\frac{e^{v^{(j)T}{w}^{(k)}}}{\sum \limits_{k=1}^V{\textrm{e}}^{v^{(k)T}{w}^{(k)}}}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equx.png)'
- en: 'If there are four target words, and their one-hot encoded vectors are represented
    by *y*^((*t* − 2)), *y*^((*t* − 1)), *y*^((*t* + 1)), *y*^((*t* + 2)) ∈ *R*^(*V* × 1),
    then the total loss function *C* for the word combination would be the summation
    of all four SoftMax losses as represented here:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 如果有四个目标词，并且它们的独热编码向量分别表示为 *y*^((*t* − 2)), *y*^((*t* − 1)), *y*^((*t* + 1)),
    *y*^((*t* + 2)) ∈ *R*^(*V* × 1)，那么词组合的总损失函数 *C* 将是所有四个 SoftMax 损失的总和，如下所示：
- en: '![$$ C=-{\sum}_{\begin{array}{c}m=t-2\\ {}m\ne t\end{array}}^{t+2}\sum \limits_{j=1}^V{y_j}^{(m)}\log
    \left({p}^{(j)}\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equy.png)'
  id: totrans-105
  prefs: []
  type: TYPE_IMG
  zh: '![C=-∑_{m=t-2}^{t+2}∑_{j=1}^V{y_j}^{(m)}log(p^{(j)})](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equy.png)'
- en: Gradient descent using backpropagation can be used to minimize the cost function
    and derive the input and output embedding matrices’ components.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 使用反向传播的梯度下降可以用来最小化成本函数并推导输入和输出嵌入矩阵的成分。
- en: 'Here are a few salient features about the Skip-gram and CBOW models:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 关于 Skip-gram 和 CBOW 模型的几个显著特点：
- en: For Skip-gram models, the window size is not generally fixed. Given a maximum
    window size, the window size at each current word is randomly chosen so that smaller
    windows are chosen more frequently than larger ones. With Skip-gram, one can generate
    a lot of training samples from a limited amount of text, and infrequent words
    and phrases are also very well represented.
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于 Skip-gram 模型，窗口大小通常不是固定的。给定一个最大窗口大小，每个当前词的窗口大小是随机选择的，使得较小的窗口比较大的窗口更频繁地被选择。使用
    Skip-gram，可以从有限量的文本中生成大量的训练样本，并且不常见词和短语也得到了很好的表示。
- en: CBOW is much faster to train than Skip-gram and has slightly better accuracy
    for frequent words.
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CBOW 的训练速度比 Skip-gram 快得多，并且对于常见词的准确性略高。
- en: Both Skip-gram and CBOW look at local windows for word co-occurrences and then
    try to predict either the context words from the center word (as with Skip-gram)
    or the center word from the context words (as with CBOW). So, basically, we observe
    in Skip-gram that locally within each window the probability of the co-occurrence
    of the context word *w*[*c*] and the current word *w*[*t*], given by *P*(*w*[*c*]/*w*[*t*]),
    is assumed to be proportional to the exponential of the dot product of their word-embedding
    vectors. For example,
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Skip-gram 和 CBOW 都会查看局部窗口中的词共现情况，然后尝试预测中心词的上下文词（如 Skip-gram 所做的那样）或从上下文词预测中心词（如
    CBOW 所做的那样）。因此，基本上，在 Skip-gram 中，我们观察到在每个窗口的局部范围内，上下文词 *w*[*c*] 和当前词 *w*[*t*]
    的共现概率 *P*(*w*[*c*]/*w*[*t*]) 被假定为与它们词嵌入向量的点积的指数成正比。例如，
- en: '![$$ P\left({w}_c/{w}_t\right)\propto {e}^{u^Tv} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equz.png)'
  id: totrans-111
  prefs: []
  type: TYPE_IMG
  zh: '![P(w_c/w_t)≈e^(u^Tv)](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equz.png)'
- en: where *u* and *v* are the input and output word-embedding vectors for the current
    and context words, respectively. Since the co-occurrence is measured locally,
    these models miss utilizing the global co-occurrence statistics for word pairs
    within certain window lengths. Next, we are going to explore a basic method to
    look at the global co-occurrence statistics over a corpus and then use SVD (singular
    value decomposition) to generate word vectors.
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 其中 *u* 和 *v* 分别是当前词和上下文词的输入和输出词嵌入向量。由于共现是在局部测量的，因此这些模型未能利用一定窗口长度内词对的全球共现统计信息。接下来，我们将探讨一种基本方法来查看语料库中的全局共现统计信息，然后使用奇异值分解（SVD）生成词向量。
- en: Skip-Gram Implementation in TensorFlow
  id: totrans-113
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: TensorFlow 中的 Skip-Gram 实现
- en: In this section, we will illustrate the Skip-gram model for learning word-vector
    embeddings with a TensorFlow implementation. The model is trained on a small dataset
    for easy representation. However, the model can be used to train large corpuses
    as desired. As illustrated in the Skip-gram section, the model is trained as a
    classification network. However, we are more interested in the word-embedding
    matrix than in the actual classification of words. The size of the word embeddings
    has been chosen to be 128\. The detailed code is represented in Listing [4-1b](#PC3).
    Once the word-embedding vectors are learned, they are projected via TSNE on a
    two-dimensional surface for visual interpretation.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将使用 TensorFlow 实现来展示学习词向量嵌入的 Skip-gram 模型。该模型在一个小型数据集上训练，以便于表示。然而，该模型可以用于训练所需的大型语料库。如图
    [2-2](448418_2_En_2_Chapter.xhtml#Fig2) 所示，该模型被训练为一个分类网络。然而，我们更感兴趣的是词嵌入矩阵，而不是单词的实际分类。词嵌入的大小被选为128。详细的代码在列表
    [4-1b](#PC3) 中表示。一旦学习到词嵌入向量，它们将通过 TSNE 投影到二维表面上，以便于视觉解释。
- en: '[PRE2]'
  id: totrans-115
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: training_corpus = "Deep Learning has evolved from Artificial Neural Networks
    which has been there since the 1940s. Neural Networks are interconnected networks
    of processing units called artificial neurons, that loosely mimics axons in a
    biological brain. In a biological neuron, the Dendrites receive input signals
    from various neighboring neurons, typically greater than 1000\. These modified
    signals are then passed on to the cell body or soma of the neuron where these
    signals are summed together and then passed on to the Axon of the neuron. If the
    received input signal is more than a specified threshold, the axon will release
    a signal which again will pass on to neighboring dendrites of other neurons. Figure
    [2-1](448418_2_En_2_Chapter.xhtml#Fig1) depicts the structure of a biological
    neuron for reference.The artificial neuron units are inspired from the biological
    neurons with some modifications as per convenience. Much like the dendrites the
    input connections to the neuron carry the attenuated or amplified input signals
    from other neighboring neurons. The signals are passed onto the neuron where the
    input signals are summed up and then a decision is taken what to output based
    on the total input received. For instance, for a binary threshold neuron output
    value of 1 is provided when the total input exceeds a pre-defined threshold, otherwise
    the output stays at 0\. Several other types of neurons are used in artificial
    neural network and their implementation only differs with respect to the activation
    function on the total input to produce the neuron output. In Figure [2-2](448418_2_En_2_Chapter.xhtml#Fig2)
    the different biological equivalents are tagged in the artificial neuron for easy
    analogy and interpretation."
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: training_corpus = "深度学习从20世纪40年代以来的人工神经网络演变而来。神经网络是由称为人工神经元的处理单元组成的互联网络，它们松散地模仿生物大脑中的轴突。在生物神经元中，树突从各种相邻神经元接收输入信号，通常大于1000。然后，这些修改后的信号被传递到神经元的细胞体或
    soma，在这些信号被汇总后，再传递到神经元的轴突。如果接收到的输入信号超过指定的阈值，轴突将释放一个信号，该信号再次传递到其他神经元的相邻树突。图 [2-1](448418_2_En_2_Chapter.xhtml#Fig1)
    展示了生物神经元的结构，供参考。人工神经元单元是从生物神经元中受到启发，并根据方便性进行了一些修改。与树突类似，连接到神经元的输入连接携带来自其他相邻神经元的衰减或放大输入信号。信号被传递到神经元，在那里输入信号被汇总，然后根据接收到的总输入决定输出什么。例如，对于二进制阈值神经元，当总输入超过预定义的阈值时，输出值为1，否则输出保持为0。人工神经网络中使用了多种其他类型的神经元，它们的实现仅与产生神经元输出的激活函数有关。在图
    [2-2](448418_2_En_2_Chapter.xhtml#Fig2) 中，不同的生物等效体被标记在人工神经元上，以便于类比和解释。"
- en: '![](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig6_HTML.jpg)'
  id: totrans-117
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig6_HTML.jpg)'
- en: The graph of the T S N E plot. The graph displays a number of words, including
    neuron, deep, simplified, earning, and many others.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: T S N E 图的图表。图表显示了包括神经元、深度、简化、收益等许多单词。
- en: Figure 4-6
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-6
- en: TSNE plot of word-embedding vectors learned from Skip-gram model
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 从 Skip-gram 模型学习到的词嵌入向量的 TSNE 图
- en: '[PRE3]'
  id: totrans-121
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Much like the word-embedding vectors from the continuous bag of words method,
    the embedding vectors learned from Skip-gram method are reasonable. For instance,
    the words *deep* and *learning* are very close to each other in Skip-grams too,
    as we can see from Figure [4-6](#Fig6). Also, we see other interesting patterns,
    such as the word *attenuated* being very close to the word *signal*.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 与连续词袋模型中的词嵌入向量类似，从Skip-gram方法中学习到的嵌入向量也是合理的。例如，在Skip-grams中，单词*deep*和*learning*彼此之间也非常接近，如图[4-6](#Fig6)所示。此外，我们还看到了其他有趣的模式，例如单词*attenuated*与单词*signal*非常接近。
- en: Global Co-occurrence Statistics-Based Word Vectors
  id: totrans-123
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 基于全局共现统计的词向量
- en: The global co-occurrence methods, where the global counts of co-occurrences
    of words in each window over the whole corpus are collected, can be used to derive
    meaningful word vectors. Initially, we will look at a method that does matrix
    factorization through SVD (singular value decomposition) on the global co-occurrence
    matrix to derive a meaningful lower-dimensional representation of words. Later,
    we will look at the GloVe technique for word-vector representation, which combines
    the best of global co-occurrence statistics and the prediction methods of CBOW
    and/or Skip-gram to represent word vectors.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 全局共现方法，其中收集了整个语料库中每个窗口内单词共现的全局计数，可以用来推导出有意义的词向量。最初，我们将研究一种通过SVD（奇异值分解）对全局共现矩阵进行矩阵分解的方法，以推导出单词的有意义低维表示。稍后，我们将探讨用于词向量表示的GloVe技术，该技术结合了全局共现统计和CBOW以及/或Skip-gram的预测方法的最佳之处。
- en: 'Let us consider a corpus:'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑一个语料库：
- en: '![$$ {\displaystyle \begin{array}{c}{}^{`}I\; like\kern0.17em Machine\kern0.17em
    Learning.{}^{''}\\ {}{}^{`}I\; like\kern0.17em Tensor\;{Flow}^{''}\\ {}{}^{`}I\;
    prefer\;{Python}^{''}.\end{array}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equaa.png)'
  id: totrans-126
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\displaystyle \begin{array}{c}{}^{`}I\; like\kern0.17em Machine\kern0.17em
    Learning.{}^{''}\\ {}{}^{`}I\; like\kern0.17em Tensor\;{Flow}^{''}\\ {}{}^{`}I\;
    prefer\;{Python}^{''}.\end{array}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equaa.png)'
- en: We first collect the global co-occurrence counts for each word combination within
    a window of 1\. While processing the preceding corpus, we will get a co-occurrence
    matrix. Also, we make the co-occurrence matrix symmetric by assuming that whenever
    two words *w*[1] and *w*[2] appear together it would contribute to both probabilities
    *P*(*w*[1]/*w*[2]) and *P*(*w*[2]/*w*[1] ), and hence we increment the count for
    both the count buckets *c*(*w*[1]/*w*[2]) and *c*(*w*[2]/*w*[1]) by 1\. The term
    *c*(*w*[1]/*w*[2]) denotes the co-occurrence of the words *w*[1] and *w*[2], where
    *w*[2] acts as the context and *w*[1] as the word. For word-occurrence pairs,
    the roles can be reversed so that the context can be treated as the word and the
    word as the context. For this precise reason, whenever we encounter a co-occurring
    word pair (*w*[1], *w*[2]), both count buckets *c*(*w*[1]/*w*[2]) and *c*(*w*[2]/*w*[1])
    are incremented.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先收集窗口大小为1的每个单词组合的全局共现计数。在处理前面的语料库时，我们将得到一个共现矩阵。同时，我们通过假设每当两个单词*w*[1]和*w*[2]同时出现时，它们将同时贡献概率*P*(*w*[1]/*w*[2])和*P*(*w*[2]/*w*[1])，因此我们将计数桶*c*(*w*[1]/*w*[2])和*c*(*w*[2]/*w*[1])的计数增加1。术语*c*(*w*[1]/*w*[2])表示单词*w*[1]和*w*[2]的共现，其中*w*[2]作为上下文，*w*[1]作为单词。对于单词出现对，角色可以互换，以便将上下文视为单词，将单词视为上下文。正是出于这个精确的原因，每当遇到共现的单词对(*w*[1],
    *w*[2])时，计数桶*c*(*w*[1]/*w*[2])和*c*(*w*[2]/*w*[1])都会增加。
- en: Coming to the incremental count, we need not always increment by 1 for a co-occurrence
    of two words. If we are looking at a window of *K* for populating the co-occurrence
    matrix, we can define a differential weighting scheme to provide more weight for
    words co-occurring at less distance from the context and penalize them as the
    distance increases. One such weighing scheme would be to increment the co-occurrence
    counter by ![$$ \left(\frac{1}{k}\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq8.png),
    where *k* is the offset between the word and the context. When the word and the
    context are next to each other, then the offset is 1 and the co-occurrence counter
    can be incremented by 1, while when the offset is at maximum for a window of *K*,
    the counter increment is at minimum at ![$$ \left(\frac{1}{k}\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq9.png).
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 在增量计数方面，我们并不总是需要为两个词的共现增加1。如果我们正在查看一个用于填充共现矩阵的*K*窗口，我们可以定义一个差分加权方案，为距离上下文较近的共现词提供更多权重，并随着距离的增加对其进行惩罚。这样一个加权方案可能是通过增加共现计数器来实现的
    ![$$ \left(\frac{1}{k}\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq8.png)，其中*k*是单词和上下文之间的偏移量。当单词和上下文相邻时，偏移量为1，共现计数器可以增加1，而当偏移量在*K*窗口中达到最大时，计数器的增量最小为
    ![$$ \left(\frac{1}{k}\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq9.png)。
- en: 'In the SVD method of generating the word-vector embedding, the assumption is
    that the global co-occurrence count *c*(*w*[*i*]/*w*[*j*]) between a word *w*[*i*]
    and context *w*[*j*] can be expressed as the dot product of the word-vector embeddings
    for the word *w*[*i*] and for the context *w*[*j*]. Generally, two sets of word
    embeddings are considered, one for the words and the other for the contexts. If
    *u*[*i*] ∈ *R*^(*D* × 1) and *v*[*i*] ∈ *R*^(*D* × 1) denote the word vector and
    the context vector for the *ith* word *w*[*i*] in the corpus, respectively, then
    the co-occurrence count can be expressed as follows:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 在生成词向量嵌入的SVD方法中，假设单词*w*[i]和上下文*w*[j]之间的全局共现计数*c*(w*[i]/w*[j])可以表示为单词*w*[i]和上下文*w*[j]的词向量嵌入的点积。通常，考虑两组词嵌入，一组用于单词，另一组用于上下文。如果*u*[i]∈R^(D×1)和*v*[i]∈R^(D×1)分别表示语料库中第*i*个单词*w*[i]的词向量和上下文向量，那么共现计数可以表示如下：
- en: '![$$ c\left({w}_i/{w}_j\right)={u_i}^T{v}_j $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equab.png)'
  id: totrans-130
  prefs: []
  type: TYPE_IMG
  zh: '![c(ωi/ωj) = u^T_i v_j](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equab.png)'
- en: Let’s look at a three-word corpus and represent the co-occurrence matrix *X* ∈ *R*^(3 × 3)
    in terms of the dot products of the words and the context vectors. Further, let
    the words be *w*[*i*], ∀ *i* = {1, 2, 3} and their corresponding word vectors
    and context vectors be *u*[*i*], ∀ *i* = {1, 2, 3} and *v*[*i*], ∀ *i* = {1, 2,
    3}, respectively.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看一个包含三个单词的语料库，并用单词和上下文向量的点积来表示共现矩阵*X*∈R^(3×3)。进一步，让单词为*w*[i]，∀i={1, 2, 3}，它们对应的词向量和上下文向量分别为*u*[i]，∀i={1,
    2, 3}和*v*[i]，∀i={1, 2, 3}，分别。
- en: As we can see, the co-occurrence matrix turns out to be the product of two matrices,
    which are nothing but the word-vector embedding matrices for the words and contexts,
    respectively. The word-vector embedding matrix *W* ∈ *R*^(3 × *D*) and the context-word-embedding
    matrix *C* ∈ *R*^(*D* × 3), where D is the dimension of the word and context embedding
    vectors.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所见，共现矩阵实际上是两个矩阵的乘积，这两个矩阵分别是单词和上下文的词向量嵌入矩阵。词向量嵌入矩阵*W*∈R^(3×D)和上下文词嵌入矩阵*C*∈R^(D×3)，其中D是词和上下文嵌入向量的维度。
- en: Now that we know that the word co-occurrence matrix is a product of the word-vector
    embedding matrix and the context embedding matrix, we can factorize the co-occurrence
    matrix by any applicable matrix factorization technique. Singular value decomposition
    (SVD) is a well-adopted method because it works, even if the matrices are not
    square or symmetric.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 既然我们知道词共现矩阵是词向量嵌入矩阵和上下文嵌入矩阵的乘积，我们可以通过任何适用的矩阵分解技术来分解共现矩阵。奇异值分解（SVD）是一个广泛采用的方法，因为它即使矩阵不是方形或对称的也能工作。
- en: As we know from SVD, any rectangular matrix *X* can be decomposed into three
    matrices *U*, *Σ*, and *V* such that
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们从奇异值分解（SVD）所知，任何矩形矩阵*X*都可以分解为三个矩阵*U*、*Σ*和*V*，使得
- en: '![$$ X=\left[U\right]\left[\varSigma \right]\left[{V}^T\right] $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equac.png)'
  id: totrans-135
  prefs: []
  type: TYPE_IMG
  zh: '![X = [U][Σ][V^T]](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equac.png)'
- en: The matrix *U* is generally chosen as the word-vector embedding matrix *W*,
    while *ΣV*^(*T*) is chosen as the context-vector embedding matrix *C*, but there
    is no such restriction, and whichever works well on the given corpus can be chosen.
    One can very well choose W as *UΣ*^(1/2) and C as *Σ*^(1/2)*V*^(*T*). Generally,
    fewer dimensions in the data based on the significant singular values are chosen
    to reduce the size of *U*, *Σ*, and *V*. If *X* ∈ *R*^(*m* × *n*), then *U* ∈ *R*^(*m* × *m*).
    However, with truncated SVD, we take only a few significant directions along which
    the data has maximum variability and ignore the rest as insignificant or as noise.
    If we chose *D* dimensions, the new word-vector embedding matrix *U* ^′ ∈ *R*^(*m* × *D*),
    where *D* is the dimension of every word-vector embedding.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 矩阵 *U* 通常被选作词向量嵌入矩阵 *W*，而 *ΣV*^(*T*) 被选作上下文向量嵌入矩阵 *C*，但没有任何这样的限制，可以选择在给定语料库上表现良好的任何一种。人们完全可以选择
    W 为 *UΣ*^(1/2) 和 C 为 *Σ*^(1/2)*V*^(*T*)。通常，基于显著奇异值的数据维度较少，以减少 *U*、*Σ* 和 *V* 的大小。如果
    *X* ∈ *R*^(*m* × *n*)，那么 *U* ∈ *R*^(*m* × *m*)。然而，在截断SVD中，我们只取数据最大可变性方向上的几个显著方向，忽略其余的作为不显著或噪声。如果我们选择
    *D* 维度，新的词向量嵌入矩阵 *U* ^′ ∈ *R*^(*m* × *D*)，其中 *D* 是每个词向量嵌入的维度。
- en: The co-occurrence matrix *X* ∈ *R*^(*m* × *n*) is generally obtained in a more
    generalized setting by making a pass through the entire corpus once. However,
    since the corpus might get new documents or contents over time, those new documents
    or contents can be processed incrementally. Figure [4-7](#Fig7) illustrates the
    derivation of the word vectors or word embeddings in a three-step process.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 共现矩阵 *X* ∈ *R*^(*m* × *n*) 通常通过一次遍历整个语料库在更广义的设置中获得。然而，由于语料库可能会随着时间的推移获得新的文档或内容，这些新的文档或内容可以增量处理。图
    [4-7](#Fig7) 通过三个步骤说明了词向量或词嵌入的推导过程。
- en: '![](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig7_HTML.jpg)'
  id: totrans-138
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig7_HTML.jpg)'
- en: The word embedding extraction illustration. The illustration displays S V D,
    truncation, and embeddings.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 单词嵌入提取示意图。该图展示了奇异值分解（SVD）、截断和嵌入。
- en: Figure 4-7
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-7
- en: Extraction of word embeddings through SVD of word co-occurrence matrix
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 通过词共现矩阵的奇异值分解提取词嵌入
- en: In the first step, singular value decomposition (SVD) is performed on the co-occurrence
    matrix *X* ∈ *R*^(*m* × *n*) to produce *U* ∈ *R*^(*m* × *m*), which contains
    the left singular vectors; Σ ∈ *R*^(*m* × *n*), which contains the singular values;
    and *V* ∈ *R*^(*n* × *n*), which contains the right singular vectors.
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在第一步中，对共现矩阵 *X* ∈ *R*^(*m* × *n*) 进行奇异值分解（SVD），以产生 *U* ∈ *R*^(*m* × *m*)，其中包含左奇异向量；Σ
    ∈ *R*^(*m* × *n*)，其中包含奇异值；以及 *V* ∈ *R*^(*n* × *n*)，其中包含右奇异向量。
- en: '![$$ {\left[X\right]}_{m\times n}={\left[U\right]}_{m\times m}{\left[\varSigma
    \right]}_{m\times n}{\left[{V}^T\right]}_{n\times n} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equad.png)'
  id: totrans-143
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\left[X\right]}_{m\times n}={\left[U\right]}_{m\times m}{\left[\varSigma
    \right]}_{m\times n}{\left[{V}^T\right]}_{n\times n} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equad.png)'
- en: If we start with ![$$ U=\left[{u}_1{u}_{2\space}\kern0.5em {u}_3\dots {u}_m\right],\space
    \varSigma =\left[\begin{array}{ccc}{\sigma}_1&amp; \cdots &amp; 0\\ {}\vdots &amp;
    \ddots &amp; \vdots \\ {}0&amp; \cdots &amp; {\sigma}_m\end{array}\right],\space
    {V}^T=\left[\begin{array}{c}\begin{array}{c}{v_1}^T\to \\ {}{v_2}^T\to \\ {}..\end{array}\\
    {}{v_n}^T\to \end{array}\right] $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq10.png)
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果我们从以下矩阵开始！[$$ U=\left[{u}_1{u}_{2\space}\kern0.5em {u}_3\dots {u}_m\right],\space
    \varSigma =\left[\begin{array}{ccc}{\sigma}_1&amp; \cdots &amp; 0\\ {}\vdots &amp;
    \ddots &amp; \vdots \\ {}0&amp; \cdots &amp; {\sigma}_m\end{array}\right],\space
    {V}^T=\left[\begin{array}{c}\begin{array}{c}{v_1}^T\to \\ {}{v_2}^T\to \\ {}..\end{array}\\
    {}{v_n}^T\to \end{array}\right] $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq10.png)
- en: 'after truncation, we would have the following:'
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 截断后，我们将有以下内容：
- en: Generally, for word-to-word co-occurrence matrices, the dimensions *m* and *n*
    should be equal. However, sometimes instead of expressing words by words, words
    are expressed by contexts, and hence for generalization we have taken separate
    *m* and *n*.
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通常，对于词到词的共现矩阵，维度 *m* 和 *n* 应该相等。然而，有时不是用词本身表达词，而是用上下文表达词，因此为了泛化，我们采取了单独的 *m*
    和 *n*。
- en: In the second step, the co-occurrence matrix is approximated by taking only
    *k* significant singular values from *Σ* that explain the maximum variance in
    data and by also choosing the corresponding *k* left singular and right singular
    vectors in *U* and *V*.
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在第二步中，通过只从 *Σ* 中取 *k* 个解释数据最大可变性的显著奇异值，并通过选择 *U* 和 *V* 中的相应 *k* 个左奇异向量和右奇异向量来近似共现矩阵。
- en: '![$$ {U}^{\hbox{''}}=\left[{u}_1{u}_{2\space}\kern0.5em {u}_3\dots {u}_k\right],\space
    {\varSigma}^{\prime }=\left[\begin{array}{ccc}{\sigma}_1&amp; \cdots &amp; 0\\
    {}\vdots &amp; \ddots &amp; \vdots \\ {}0&amp; \cdots &amp; {\sigma}_k\end{array}\right],\kern1em
    V{\hbox{''}}^T=\left[\begin{array}{c}\begin{array}{c}{v_1}^T\to \\ {}{v_2}^T\to
    \\ {}..\end{array}\\ {}{v_k}^T\to \end{array}\right] $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equae.png)'
  id: totrans-148
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equae.png)'
- en: In the third step, *Σ*′ and *V*′^(*T*) are discarded and the matrix *U* ^′ ∈ *R*^(*m* × 1)
    is taken to the word-embedding vector matrix. The word vectors have *k* dense
    dimensions corresponding to the chosen *k* singular values. So, from a sparse
    co-occurrence matrix, we get a dense representation of the word-vector embeddings.
    There would be *m* word embeddings corresponding to each word of the processed
    corpus.
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在第三步中，丢弃*Σ*′和*V*′^(*T*)，并将矩阵*U* ^′ ∈ *R*^(*m* × 1)取到词向量矩阵。词向量有*k*个密集维度，对应于选择的*k*个奇异值。因此，从稀疏的共现矩阵中，我们得到了词向量嵌入的密集表示。会有*m*个词向量对应于处理过的语料库中的每个单词。
- en: Mentioned in Listing [4-1c](#PC5) is the logic for building word vectors from
    a given corpus by factorizing the co-occurrence matrix of different words through
    SVD. Accompanying the listing is the plot of the derived word-vector embeddings
    in Figure [4-8](#Fig8).
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 在列表[4-1c](#PC5)中提到的是通过SVD分解不同单词的共现矩阵来从给定语料库构建词向量的逻辑。列表旁边是图[4-8](#Fig8)中推导出的词向量嵌入的图形。
- en: '![](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig8_HTML.jpg)'
  id: totrans-151
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig8_HTML.jpg)'
- en: The word embedding plot's graph. The words in the graph are like, prefer, learning,
    python, machine, and tenor flow.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 词嵌入图的图形。图中的单词有，喜欢，学习，Python，机器和流。
- en: Figure 4-8
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-8
- en: Word-embedding plot
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 词向量嵌入图
- en: '[PRE4]'
  id: totrans-155
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'We can see a clear pattern in the plot of the word-vector embedding in Figure
    [4-8](#Fig8), even with this small corpus. Here are a few of the findings:'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 即使在这个小语料库中，我们也可以在图[4-8](#Fig8)中看到词向量嵌入的清晰模式。以下是一些发现：
- en: Common words like *I* and *like* are far away from others.
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 常见单词如*I*和*like*与其他单词相距甚远。
- en: '*Machine*, *Learning*, *Python*, and *TensorFlow*, being associated with different
    areas of learning, are clustered close to each other.'
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*机器*，*学习*，*Python*和*TensorFlow*，与不同的学习领域相关联，彼此紧密聚集。'
- en: Next, we move on to global vectors, commonly known as GloVe, for generating
    word-vector embeddings.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将转向全局向量，通常称为GloVe，用于生成词向量嵌入。
- en: GloVe
  id: totrans-160
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: GloVe
- en: 'GloVe is a pretrained, readily available word-embedding vectors library from
    Stanford University. The training method for GloVe is significantly different
    from those for CBOW and Skip-gram. Instead of basing predictions on local-running
    windows for words, GloVe uses global word-to-word co-occurrence statistics from
    a corpus to train the model and derive the GloVe vectors. GloVe stands for *global
    vectors*. Pretrained GloVe word embeddings are available at [`https://nlp.stanford.edu/projects/glove/`](https://nlp.stanford.edu/projects/glove/).
    Jeffrey Pennington, Richard Socher, and Christopher D. Manning are the inventors
    of GloVe vectors, and they have documented GloVe vectors in their paper titled
    “GloVe: Global Vectors for Word Representation.” The paper can be located at [`https://nlp.stanford.edu/pubs/glove.pdf`](https://nlp.stanford.edu/pubs/glove.pdf).'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 'GloVe是斯坦福大学提供的预训练、现成的词向量嵌入库。GloVe的训练方法与CBOW和Skip-gram的方法显著不同。GloVe不是基于单词的局部运行窗口进行预测，而是使用语料库中的全局词到词共现统计来训练模型并推导出GloVe向量。GloVe代表*全局向量*。预训练的GloVe词向量可在[`https://nlp.stanford.edu/projects/glove/`](https://nlp.stanford.edu/projects/glove/)找到。GloVe向量的发明者是Jeffrey
    Pennington，Richard Socher和Christopher D. Manning，他们在论文“GloVe: Global Vectors for
    Word Representation”中记录了GloVe向量。该论文可在[`https://nlp.stanford.edu/pubs/glove.pdf`](https://nlp.stanford.edu/pubs/glove.pdf)找到。'
- en: Like SVD methods, GloVe looks at the global co-occurrence statistics, but the
    relation of the word and context vectors with respect to the co-occurrence count
    is a little different. If there are two words *w*[*i*] and *w*[*j*] and a context
    word *w*[*k*], then the ratio of the probabilities *P*(*w*[*k*]/*w*[*i*]) and
    *P*(*w*[*k*]/*w*[*j*]) provides more information than the probabilities themselves.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 与SVD方法类似，GloVe考虑全局共现统计，但单词和上下文向量与共现计数的关系略有不同。如果有两个单词*w*[*i*]和*w*[*j*]以及一个上下文单词*w*[*k*]，那么概率比*P*(*w*[*k*]/*w*[*i*])和*P*(*w*[*k*]/*w*[*j*])提供了比概率本身更多的信息。
- en: Let’s consider two words, *w*[*i*] = "*garden*" and *w*[*j*] = "*market*", and
    a couple of context words, *w*[*k*] ∈ {"*plants*","*shops*"}. The individual co-occurrence
    probability might be low; however, if we take the ratio of the co-occurrence probabilities,
    for instance,
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑两个单词，*w*[*i*] = "*garden*"和*w*[*j*] = "*market*"，以及一些上下文单词，*w*[*k*] ∈ {"*plants*","*shops*"}.
    单个共现概率可能很低；然而，如果我们取共现概率的比例，例如，
- en: '![$$ \frac{P\left({w}_k={\space}^{"}{plants}^{"}/{w}_i={}^{"}{garden}^{"}\kern0.5em
    \right)}{P\left({w}_k={}^{"}{plants}^{"}/{w}_j={}^{"}{market}^{"}\kern0.5em \right)}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equaf.png)'
  id: totrans-164
  prefs: []
  type: TYPE_IMG
  zh: '![此处插入图片](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equaf.png)'
- en: The preceding ratio is going to be much greater than one indicating that *plants*
    are much more likely to be associated with *garden* than with *market*.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 前面的比例将会远大于一，这表明*plants*与*garden*相比，更有可能与*market*相关联。
- en: 'Similarly, let us consider *w*[*k*] = "*shops*" and look at the ratio of the
    following co-occurrence probability:'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 同样地，让我们考虑*w*[*k*] = "*shops*"，并查看以下共现概率的比例：
- en: '![$$ \frac{P\left({w}_k={}^{"}{shops}^{"}/{w}_i={}^{"}{garden}^{"}\kern0.5em
    \right)}{P\left({w}_k={}^{"}{shops}^{"}/{w}_j={}^{"}{market}^{"}\kern0.5em \right)}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equag.png)'
  id: totrans-167
  prefs: []
  type: TYPE_IMG
  zh: '![此处插入图片](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equag.png)'
- en: In this case, the ratio is going to be very small, signifying that the word
    *shop* is much more likely to be associated with the word *market* than with *garden*.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，这个比例将会非常小，这意味着单词*shop*与单词*market*相比，更有可能与单词*garden*相关联。
- en: Hence, we can see that the ratio of the co-occurrence probabilities provides
    much more discrimination between words. Since we are trying to learn word vectors,
    this discrimination should be encoded by the difference of the word vectors, as
    in a linear vector space that’s the best way to represent the discrimination between
    vectors. Similarly, the most convenient way to represent the similarity between
    vectors in a linear vector space is to consider their dot product, and hence the
    co-occurrence probability would be well represented by some function of the dot
    product between the word and the context vector. Taking all this into consideration
    helps one derive the logic for the GloVe vector derivation on a high level.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们可以看到，共现概率的比例在单词之间提供了更多的区分度。由于我们试图学习单词向量，这种区分度应该通过单词向量的差异来编码，正如在线性向量空间中，这是表示向量之间区分度的最佳方式。同样，在线性向量空间中表示向量之间相似性的最方便方式是考虑它们的点积，因此共现概率可以通过单词和上下文向量之间点积的某个函数很好地表示。考虑到所有这些因素，有助于推导出GloVe向量导出的逻辑。
- en: 'If *u*[*i*],*u*[*j*] are the word-vector embeddings for the words *w*[*i*]
    and *w*[*j*], and *v*[*k*] is the context vector for word *w*[*k*], then the ratio
    of the two co-occurrence probabilities can be expressed as some function of the
    difference of the word vectors (i.e., (*u*[*i*] − *u*[*j*])) and the context vector
    *v*[*k*]. A logical function should work on the dot product of the difference
    of the word vector and the context vector, primarily because it preserves the
    linear structure between the vectors before it is manipulated by the function.
    Had we not taken the dot product, the function could have worked on the vectors
    in a way that would have disrupted the linear structure. Based on the preceding
    explanation, the ratio of the two co-occurrence probabilities can be expressed
    as follows:'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 如果*u*[*i*],*u*[*j*]是单词*w*[*i*]和*w*[*j*]的词向量嵌入，而*v*[*k*]是单词*w*[*k*]的上下文向量，那么两个共现概率的比率可以表示为词向量差异（即(*u*[*i*] − *u*[*j*]）和上下文向量*v*[*k*]的某个函数。一个逻辑函数应该作用于词向量差异和上下文向量之间的点积，主要是因为它在函数操作之前保持了向量之间的线性结构。如果我们没有取点积，函数可能会以破坏线性结构的方式作用于向量。基于前面的解释，两个共现概率的比率可以表示如下：
- en: '![$$ \frac{P\left({w}_k/{w}_i\right)}{P\left({w}_k/{w}_j\right)}=f\left({\left({u}_i-{u}_j\right)}^T{v}_k\kern0.5em
    \right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ1.png)'
  id: totrans-171
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \frac{P\left({w}_k/{w}_i\right)}{P\left({w}_k/{w}_j\right)}=f\left({\left({u}_i-{u}_j\right)}^T{v}_k\kern0.5em
    \right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ1.png)'
- en: (4.1.1)
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: (4.1.1)
- en: In the above expression, *f* is a given function that we seek to find out.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 在上述表达式中，*f*是我们试图找到的给定函数。
- en: 'Also, as discussed, the co-occurrence probability *P*(*w*[*k*]/*w*[*i*]) should
    be encoded by some form of similarity between vectors in a linear vector space,
    and the best operation to do so is to represent the co-occurrence probability
    by some function *g* of the dot product between the word vector *w*[*i*] and context
    vector *w*[*k*], as expressed here:'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，正如所讨论的，共现概率*P*(*w*[*k*]/*w*[*i*])应该通过线性向量空间中向量的某种形式相似性来编码，而完成这一任务的最佳操作是将共现概率表示为词向量*w*[*i*]和上下文向量*w*[*k*]之间点积的某个函数*g*，如下所示：
- en: '![$$ P\left({w}_i|{w}_k\right)=g\left({u}_i^T{v}_k\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ2.png)'
  id: totrans-175
  prefs: []
  type: TYPE_IMG
  zh: '![$$ P\left({w}_i|{w}_k\right)=g\left({u}_i^T{v}_k\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ2.png)'
- en: (4.1.2)
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: (4.1.2)
- en: 'Combining ([4.1.1](#Equ1)) and ([4.1.2](#Equ2)), we have the following:'
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 结合([4.1.1](#Equ1))和([4.1.2](#Equ2))，我们得到以下结果：
- en: '![$$ \frac{g\left({u}_i^T{v}_k\right)}{g\left({u}_j^T{v}_k\right)}=f\left({\left({u}_i-{u}_j\right)}^T{v}_k\right)
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ3.png)'
  id: totrans-178
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \frac{g\left({u}_i^T{v}_k\right)}{g\left({u}_j^T{v}_k\right)}=f\left({\left({u}_i-{u}_j\right)}^T{v}_k\right)
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ3.png)'
- en: (4.1.3)
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: (4.1.3)
- en: Now the task is to determine meaningful functions *f* and *g* for the preceding
    equation to make sense. If we choose *f* and *g* to be the exponential function,
    it enables the ratio of the probabilities to encode the difference of the word
    vectors and at the same time keeps the co-occurrence probability dependent on
    the dot product. The dot product and difference of vectors keep the notion of
    similarity and discrimination of vectors in a linear space. Had the functions
    *f* and *g* been some kind of kernel functions, then the measure of similarity
    and dissimilarity wouldn’t have been restricted to a linear vector space and would
    have made the interpretability of word vectors very difficult.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 现在的任务是确定有意义的函数*f*和*g*，使得前面的方程有意义。如果我们选择*f*和*g*为指数函数，它可以使概率的比值编码词向量之间的差异，同时保持共现概率依赖于点积。向量的点积和差异保持了向量在线性空间中的相似性和区分性。如果*f*和*g*是某种核函数，那么相似性和差异的度量就不会局限于线性向量空间，这将使得词向量的可解释性变得非常困难。
- en: 'Replacing *f* and *g* with the exponential function in ([4.1.3](#Equ3)), we
    get the following:'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 将([4.1.3](#Equ3))中的*f*和*g*替换为指数函数，我们得到以下结果：
- en: '![$$ \frac{e^{\left({u_i}^T{v}_k\right)}}{e^{{u_j}^T{v}_k}}={e}^{{\left({u}_i-{u}_j\right)}^T{v}_k}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equah.png)'
  id: totrans-182
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \frac{e^{\left({u_i}^T{v}_k\right)}}{e^{{u_j}^T{v}_k}}={e}^{{\left({u}_i-{u}_j\right)}^T{v}_k}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equah.png)'
- en: 'which gives us the following:'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 这给我们以下结果：
- en: '![$$ P\left({w}_k/{w}_i\right)={e}^{{u_i}^T{v}_k}=&gt;\log P\left({w}_k/{w}_i\right)={u_i}^T{v}_k
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ4.png)'
  id: totrans-184
  prefs: []
  type: TYPE_IMG
  zh: '![$$ P\left({w}_k/{w}_i\right)={e}^{{u_i}^T{v}_k}=&gt;\log P\left({w}_k/{w}_i\right)={u_i}^T{v}_k
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ4.png)'
- en: (4.1.4)
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: (4.1.4)
- en: Interested readers with some knowledge of group theory in abstract algebra can
    see that the function *f* (*x*) = *e* ^(*x*) has been chosen so as to define a
    group homomorphism between the groups (*R*, +) and (*R* > 0, ×).
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 对抽象代数中的群论有一定了解的读者可以注意到，函数 *f* (*x*) = *e* ^(*x*) 被选择来定义群 (*R*, +) 和 (*R* > 0,
    ×) 之间的群同态。
- en: 'The co-occurrence probability of the word *w*[*i*] and the context word *w*[*k*]
    can be denoted as follows:'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 单词 *w*[*i*] 和上下文单词 *w*[*k*] 的共现概率可以表示如下：
- en: '![$$ P\left({w}_k/{w}_i\right)=\frac{c\left({w}_i,{w}_k\right)}{c\left({w}_i\right)}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ5.png)'
  id: totrans-188
  prefs: []
  type: TYPE_IMG
  zh: '![$$ P\left({w}_k/{w}_i\right)=\frac{c\left({w}_i,{w}_k\right)}{c\left({w}_i\right)}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ5.png)'
- en: (4.1.5)
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: (4.1.5)
- en: 'where *c*(*w*[*i*], *w*[*k*]) denotes the co-occurrence count of word *w*[*i*]
    with the context word *w*[*k*] and *c*(*w*[*i*]) denotes the total occurrences
    of the word *w*[*i*]. The total count of any word can be computed by summing up
    its co-occurrence count with all other words in the corpus, as shown here:'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *c*(*w*[*i*], *w*[*k*]) 表示单词 *w*[*i*] 与上下文单词 *w*[*k*] 的共现计数，而 *c*(*w*[*i*])
    表示单词 *w*[*i*] 的总出现次数。任何单词的总计数可以通过将其与其他所有单词在语料库中的共现计数相加来计算，如下所示：
- en: '![$$ c\left({w}_i\right)=\sum \limits_kc\left({w}_i,{w}_k\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equai.png)'
  id: totrans-191
  prefs: []
  type: TYPE_IMG
  zh: '![$$ c\left({w}_i\right)=\sum \limits_kc\left({w}_i,{w}_k\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equai.png)'
- en: 'Combining ([4.1.4](#Equ4)) and ([4.1.5](#Equ5)), we get the following:'
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 结合 ([4.1.4](#Equ4)) 和 ([4.1.5](#Equ5))，我们得到以下结果：
- en: '![$$ \log \kern0.5em c\left({w}_i,{w}_k\right)-\log c\left({w}_i\right)={u_i}^T{v}_k
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equaj.png)'
  id: totrans-193
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \log \kern0.5em c\left({w}_i,{w}_k\right)-\log c\left({w}_i\right)={u_i}^T{v}_k
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equaj.png)'
- en: 'log *c*(*w*[*i*]) can be expressed as a bias *b*[*i*] for the word *w*[*i*],
    and an additional bias ![$$ {\tilde{b}}_k $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq11.png)
    for the word *w*[*k*] is also introduced to make the equation symmetric. So, the
    final relation can be expressed as follows:'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 对数 *c*(*w*[*i*]) 可以表示为单词 *w*[*i*] 的偏置 *b*[*i*]，并且还引入了一个额外的偏置 ![$$ {\tilde{b}}_k
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq11.png) 用于单词
    *w*[*k*]，以使方程对称。因此，最终的关联关系可以表示如下：
- en: '![$$ \log c\left({w}_i,{w}_k\right)={u}_i^T{v}_k+{\tilde{b}}_k+{b}_i $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equak.png)'
  id: totrans-195
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \log c\left({w}_i,{w}_k\right)={u}_i^T{v}_k+{\tilde{b}}_k+{b}_i $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equak.png)'
- en: Just as we have two sets of word-vector embeddings, similarly we see two sets
    of bias—one for context words given by ![$$ {\tilde{b}}_i $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq12.png)
    and the other for words given by *b*[*i*], where *i* indicates the *ith* word
    of the corpus.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们有两个单词向量嵌入集一样，我们也可以看到两组偏置——一组是由 ![$$ {\tilde{b}}_i $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq12.png)
    给出的上下文单词的偏置，另一组是由 *b*[*i*] 给出的单词的偏置，其中 *i* 表示语料库中的第 *i* 个单词。
- en: 'The final aim is to minimize a sum of the squared error cost function between
    the actual *log c*(*w*[*i*], *w*[*k*]) and the predicted ![$$ {u_i}^T{v}_k+{\tilde{b}}_k+{b}_i
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq13.png) for all
    word-context pairs, as follows:'
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 最终目标是使实际 *log c*(*w*[*i*], *w*[*k*]) 和预测的 ![$$ {u_i}^T{v}_k+{\tilde{b}}_k+{b}_i
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq13.png) 对于所有单词-上下文对之间的平方误差成本函数的总和最小化，如下所示：
- en: '![$$ \textrm{C}\left(\textrm{U},\textrm{V},\tilde{\textrm{B}},B\right)=\sum
    \limits_{i,j=1}^V{\left({u_i}^T{v}_k+{\tilde{b}}_k+{b}_i- logc\left({w}_i,{w}_k\right)\right)}^2
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equal.png)'
  id: totrans-198
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \textrm{C}\left(\textrm{U},\textrm{V},\tilde{\textrm{B}},B\right)=\sum
    \limits_{i,j=1}^V{\left({u_i}^T{v}_k+{\tilde{b}}_k+{b}_i- logc\left({w}_i,{w}_k\right)\right)}^2
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equal.png)'
- en: '*U* and *V* are the set of parameters for the word-vector embeddings and context-vector
    embeddings. Similarly, ![$$ \tilde{\textrm{B}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq14.png)
    and *B* are the parameters for the biases corresponding to the words and the contexts.
    The cost function ![$$ C\left(\textrm{U},\textrm{V},\tilde{\textrm{B}},B\right)
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq15.png) must
    be minimized with respect to these parameters in ![$$ \textrm{U},\textrm{V},\tilde{\textrm{B}},B
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq16.png).'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: '*U* 和 *V* 是词向量嵌入和上下文向量嵌入的参数集。同样，![$$ \tilde{\textrm{B}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq14.png)
    和 *B* 是对应于单词和上下文的偏差参数。成本函数 ![$$ C\left(\textrm{U},\textrm{V},\tilde{\textrm{B}},B\right)
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq15.png) 必须相对于这些参数在
    ![$$ \textrm{U},\textrm{V},\tilde{\textrm{B}},B $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq16.png)
    中最小化。'
- en: 'One issue with this scheme of least square method is that it weights all co-occurrences
    equally in the cost function. This prevents the model from achieving good results
    since the rare co-occurrences carry very little information. One of the ways to
    handle this issue is to assign more weight to co-occurrences that have a higher
    count. The cost function can be modified to have a weight component for each co-occurrence
    pair that is a function of the co-occurrence count. The modified cost function
    can be expressed as follows:'
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 这种最小二乘法方案的一个问题是它在成本函数中对所有共现情况给予相同的权重。这阻止了模型取得好结果，因为罕见的共现携带的信息非常少。处理这个问题的方法之一是为计数较高的共现分配更多的权重。成本函数可以修改为对每个共现对有一个权重组件，该组件是共现计数的函数。修改后的成本函数可以表示如下：
- en: '![$$ \textrm{C}\left(\textrm{U},\textrm{V},\tilde{\textrm{B}},B\right)=\sum
    \limits_{i,j=1}^Vh\left(c\left({w}_i,{w}_k\right)\right){\left({u_i}^T{v}_k+{\tilde{b}}_k+{b}_i-
    logc\left({w}_i,{w}_k\right)\right)}^2 $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equam.png)'
  id: totrans-201
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \textrm{C}\left(\textrm{U},\textrm{V},\tilde{\textrm{B}},B\right)=\sum
    \limits_{i,j=1}^Vh\left(c\left({w}_i,{w}_k\right)\right){\left({u_i}^T{v}_k+{\tilde{b}}_k+{b}_i-
    logc\left({w}_i,{w}_k\right)\right)}^2 $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equam.png)'
- en: where *h* is the newly introduced function.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *h* 是新引入的函数。
- en: 'The function *h*(*x*) (see Figure [4-9](#Fig9)) can be chosen as follows:'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 函数 *h*(*x*)（见图 [4-9](#Fig9)）可以选择如下：
- en: '![$$ h(x)={\left(\frac{x}{x_{\textrm{max}}}\right)}^{\alpha } if\kern0.5em
    x&lt;{x}_{\textrm{max}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equan.png)'
  id: totrans-204
  prefs: []
  type: TYPE_IMG
  zh: '![函数表达式](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equan.png)'
- en: '![$$ =1, elsewhere $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equao.png)'
  id: totrans-205
  prefs: []
  type: TYPE_IMG
  zh: '![等式](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equao.png)'
- en: One can experiment with different values of *α*, which acts as a hyperparameter
    to the model.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 可以尝试不同的 *α* 值，它作为模型的超参数。
- en: '![](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig9_HTML.jpg)'
  id: totrans-207
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig9_HTML.jpg)'
- en: The graph displays the x maximum at the x axis and the g of x at the y axis.
    The plot's center point is connected to the x axis using a straight line.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 图形显示 x 轴上的 x 最大值和 y 轴上的 x 的 g 值。图的中心点通过一条直线连接到 x 轴。
- en: Figure 4-9
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-9
- en: Weightage function for the co-occurrence counts
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 共现计数的权重函数
- en: Word Analogy with Word Vectors
  id: totrans-211
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 基于词向量的词类比
- en: The good thing about word-vector embedding lies in its abilities to linearize
    analogies. We look at some analogies using the pretrained GloVe vectors in Listing
    [4-2a](#PC6), Listing [4-2b](#PC7), and Listing [4-2c](#PC8).
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 词向量嵌入的优点在于其线性化类比的能力。我们查看一些使用预训练的 GloVe 向量在列表 [4-2a](#PC6)，[4-2b](#PC7) 和 [4-2c](#PC8)
    中的类比。
- en: '![](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig10_HTML.jpg)'
  id: totrans-213
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig10_HTML.jpg)'
- en: The two-dimensional vector plot graph. The graph has two arrows that point from
    men to the king and from women to the queen.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 二维向量图。图中有两个箭头，一个从男人指向国王，另一个从女人指向王后。
- en: Figure 4-10
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-10
- en: 2D TSNE vector plot for pretrained GloVe vectors
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 预训练 GloVe 向量的 2D TSNE 向量图
- en: '[PRE5]'
  id: totrans-217
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '[PRE6]'
  id: totrans-218
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '[PRE7]'
  id: totrans-219
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The embedding file glove.6B.300d.txt is available at [`https://nlp.stanford.edu/projects/glove/`](https://nlp.stanford.edu/projects/glove/).
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 嵌入文件 glove.6B.300d.txt 可在 [`https://nlp.stanford.edu/projects/glove/`](https://nlp.stanford.edu/projects/glove/)
    获取。
- en: 'In Listing [4-2a](#PC6), the pretrained GloVe vectors of dimensionality 300
    are loaded and stored in a dictionary. We play around with the GloVe vectors for
    the words *king*, *queen*, *man*, and *woman* to find an analogy. Taking the word
    vectors for *queen*, *man*, and *woman*, a word vector *pseudo_king* is created
    as follows:'
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 在列表[4-2a](#PC6)中，加载并存储了300维度的预训练GloVe向量到字典中。我们围绕单词*king*、*queen*、*man*和*woman*的GloVe向量进行操作，以寻找类比。通过取单词*queen*、*man*和*woman*的词向量，创建了一个名为*pseudo_king*的词向量，如下所示：
- en: '![$$ pseudo\_ king= queen- woman+ man $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equap.png)'
  id: totrans-222
  prefs: []
  type: TYPE_IMG
  zh: '![伪王=王-女性+男性](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equap.png)'
- en: The idea is to see whether the preceding created vector somewhat represents
    the concept of *king* or not. The cosine of the angle between the word vectors
    *pseudo_king* and *king* is high at around 0.67, which is an indication that (*queen* − *woman* + *man*)
    very well represents the concept of *king*.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 这个想法是看看先前创建的向量是否在一定程度上代表了*king*的概念。词向量*pseudo_king*和*king*之间的角度余弦值在约0.67时较高，这表明(*queen* − *woman* + *man*)很好地代表了*king*的概念。
- en: Next, in Listing [4-2c](#PC8), we try to represent an analogy, and for that
    purpose, through TSNE, we represent the GloVe vectors of dimensionality 300 in
    a two-dimensional space. The results have been plotted in Figure [4-10](#Fig10).
    We can see that the word vectors for *king* and *queen* are close to each other
    and clustered together, and the word vectors for *man* and *woman* are clustered
    close to each other as well. Also, we see that the vector differences between
    *king* and *man* and those between *queen* and *woman* are almost parallelly aligned
    and of comparable lengths.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，在列表[4-2c](#PC8)中，我们尝试表示一个类比，为此，通过TSNE，我们将300维度的GloVe向量表示在二维空间中。结果已在图[4-10](#Fig10)中绘制。我们可以看到，*king*和*queen*的词向量彼此靠近并聚集在一起，*man*和*woman*的词向量也聚集在一起。此外，我们还看到，*king*和*man*之间的向量差异以及*queen*和*woman*之间的向量差异几乎平行对齐且长度相当。
- en: Before we move on to recurrent neural networks, one thing I want to mention
    is the importance of word embeddings for recurrent neural networks in the context
    of natural language processing. A recurrent neural network doesn’t understand
    text, and hence each word in the text needs to have some form of number representation.
    Word-embedding vectors are a great choice since words can be represented by multiple
    concepts given by the components of the word-embedding vector. Recurrent neural
    networks can be made to work both ways, either by providing the word-embedding
    vectors as input or by letting the network learn those embedding vectors by itself.
    In the latter case, the word-embedding vectors would be aligned more toward the
    ultimate problems being solved through the recurrent neural network. However,
    at times the recurrent neural network might have a lot of other parameters to
    learn, or the network might have very little data to train on. In such cases,
    having to learn the word-embedding vectors as parameters might lead to overfitting
    or suboptimal results. Using the pretrained word-vector embeddings might be a
    wiser option in such scenarios.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们继续讨论循环神经网络之前，我想提到的是，在自然语言处理背景下，词嵌入对于循环神经网络的重要性。循环神经网络并不理解文本，因此文本中的每个单词都需要某种形式的数字表示。词嵌入向量是一个很好的选择，因为单词可以通过词嵌入向量的组成部分表示多个概念。循环神经网络可以双向工作，要么提供词嵌入向量作为输入，要么让网络自己学习这些嵌入向量。在后一种情况下，词嵌入向量会更倾向于通过循环神经网络解决的最终问题。然而，有时循环神经网络可能有很多其他参数需要学习，或者网络可能只有很少的数据用于训练。在这种情况下，必须学习词嵌入向量作为参数可能会导致过拟合或次优结果。在这种情况下，使用预训练的词向量嵌入可能是一个更明智的选择。
- en: Introduction to Recurrent Neural Networks
  id: totrans-226
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 循环神经网络简介
- en: Recurrent neural networks (RNNs) are designed to utilize and learn from sequential
    information. The RNN architecture is supposed to perform the same task for every
    element of a sequence, and hence the term *recurrent* in its nomenclature. RNNs
    have been of great use in the task of natural language processing because of the
    sequential dependency of words in any language. For example, in the task of predicting
    the next word in a sentence, the prior sequence of words that came before it is
    of paramount importance. Generally, at any time step of a sequence, RNNs compute
    some memory based on its computations thus far, i.e., prior memory and the current
    input. This computed memory is used to make predictions for the current time step
    and is passed on to the next step as an input. The basic architectural principal
    of a recurrent neural network is illustrated in Figure [4-11](#Fig11).
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 循环神经网络 (RNNs) 是为了利用和从序列信息中学习而设计的。RNN 架构应该对序列的每个元素执行相同的任务，因此其命名中的“循环”一词。由于任何语言中单词的序列依赖性，RNNs
    在自然语言处理任务中非常有用。例如，在预测句子中下一个单词的任务中，它之前的序列单词至关重要。通常，在任何序列的时间步中，RNNs 根据其迄今为止的计算计算一些记忆，即先前的记忆和当前输入。这个计算出的记忆用于当前时间步的预测，并将其作为输入传递到下一步。循环神经网络的基本架构原理如图
    [4-11](#Fig11) 所示。
- en: '![](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig11_HTML.jpg)'
  id: totrans-228
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig11_HTML.jpg)'
- en: The illustration demonstrates how the R N N structure unfolds to reveal the
    three steps in sequential order.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 该图展示了 RNN 结构如何按顺序展开以揭示三个步骤。
- en: Figure 4-11
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-11
- en: Folded and unfolded structure of an RNN
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: RNN 的折叠和展开结构
- en: In Figure [4-11](#Fig11), the RNN architecture has been unrolled in time to
    depict the complete sequence. If we wish to process seven-word sequences of sentences,
    then the unfolded RNN architecture would represent a seven-layer feed-forward
    neural network, with the only difference being that the weights at each layer
    are common shared weights. This significantly reduces the number of parameters
    to learn in a recurrent neural network.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 在图 [4-11](#Fig11) 中，RNN 架构在时间上展开以描绘完整的序列。如果我们希望处理七个单词的句子序列，那么展开的 RNN 架构将代表一个七层前馈神经网络，唯一的区别是每一层的权重是共享的。这显著减少了循环神经网络中需要学习的参数数量。
- en: Just to get us familiar with the notations used, *x*[*t*], *h*[*t*], and *o*[*t*]
    represent the input, computed memory or hidden states, and output, respectively,
    at time step *t. W*[*hh*] represents the weight matrix from the memory states
    *h*[*t*] at time *t* to the memory states *h*[*t* + 1] at time (*t* + 1). *W*[*xh*]
    represents the weight matrix from the input *x*[*t*] to the hidden states *h*[*t*],
    whereas *W*[*ho*] represents the weight matrix from the memory states *h*[*t*]
    to *o*[*t*]. The weight matrix *W*[*xh*] acts as some sort of word-vector embedding
    matrix when the inputs are presented in a one-hot encoded form. Alternately, in
    cases of one-hot encoded inputs, one may choose to have a learnable separate embedding
    matrix so that when the one-hot encoded input vector passes through the embeddings
    layer, its desired embedding vector is presented as an output.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 为了让我们熟悉所使用的符号，*x*[*t*]，*h*[*t*]，和 *o*[*t*] 分别代表在时间步 *t* 时的输入、计算出的记忆或隐藏状态和输出。*W*[*hh*]
    代表从时间 *t* 的记忆状态 *h*[*t*] 到时间 (*t* + 1) 的记忆状态 *h*[*t* + 1] 的权重矩阵。*W*[*xh*] 代表从输入
    *x*[*t*] 到隐藏状态 *h*[*t*] 的权重矩阵，而 *W*[*ho*] 代表从记忆状态 *h*[*t*] 到 *o*[*t*] 的权重矩阵。当输入以
    one-hot 编码形式呈现时，权重矩阵 *W*[*xh*] 起着某种词向量嵌入矩阵的作用。或者，在 one-hot 编码输入的情况下，可以选择有一个可学习的独立的嵌入矩阵，这样当
    one-hot 编码的输入向量通过嵌入层时，其期望的嵌入向量作为输出呈现。
- en: 'Now, let us drill down to each component in detail:'
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们详细探讨每个组件：
- en: '*h*[*t*] = *f* (*W*[*hh*]*h*[*t* − 1] + *W*[*xh*] *x*[*t*]), where *f* is a
    chosen nonlinear activation function.'
  id: totrans-235
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*h*[*t*] = *f* (*W*[*hh*]*h*[*t* − 1] + *W*[*xh*] *x*[*t*])，其中 *f* 是选定的非线性激活函数。'
- en: The dimension of (*W*[*hh*]*h*[*t* − 1] + *W*[*xh*] *x*[*t*]) is *n*, i.e.,
    (*W*[*hh*]*h*[*t* − 1] + *W*[*xh*] *x*[*t*]) ∈ ℝ^(*n* × 1).
  id: totrans-236
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: (*W*[*hh*]*h*[*t* − 1] + *W*[*xh*] *x*[*t*]) 的维度是 *n*，即 (*W*[*hh*]*h*[*t* − 1] + *W*[*xh*]
    *x*[*t*]) ∈ ℝ^(*n* × 1)。
- en: The function *f* works element-wise on (*W*[*hh*]*h*[*t* − 1] + *W*[*xh*] *x*[*t*])
    to produce *h*[*t*], and hence (*W*[*hh*]*h*[*t* − 1] + *W*[*xh*] *x*[*t*]) and
    *h*[*t*] have the same dimension.
  id: totrans-237
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 函数 *f* 对 (*W*[*hh*]*h*[*t* − 1] + *W*[*xh*] *x*[*t*]) 进行逐元素操作以产生 *h*[*t*]，因此
    (*W*[*hh*]*h*[*t* − 1] + *W*[*xh*] *x*[*t*]) 和 *h*[*t*] 具有相同的维度。
- en: 'If ![$$ {W}_{hh}{h}_{t-1}+{W}_{xh}\kern0.5em {x}_t=\left[\begin{array}{c}{s}_{1t}\\
    {}{s}_{2t}\\ {}.\\ {}.\\ {}{s}_{nt}\end{array}\right] $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq17.png),
    then the following holds true for *h*[*t*]:'
  id: totrans-238
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果 ![$$ {W}_{hh}{h}_{t-1}+{W}_{xh}\kern0.5em {x}_t=\left[\begin{array}{c}{s}_{1t}\\
    {}{s}_{2t}\\ {}.\\ {}.\\ {}{s}_{nt}\end{array}\right] $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq17.png)，那么对于
    *h*[*t*] 以下成立：
- en: The input *x*[*t*] is a vector representing the input word at step *t*. For
    example, it can be a one-hot encoded vector with the component set to 1 for the
    corresponding word index in the vocabulary. It can also be the word-vector embedding
    from some pretrained repository such as GloVe. In general, we assume *x*[*t*] ∈ *R*^(*D* × 1).
    Also, if we are looking to predict *V* classes, then the output *y*[*t*] ∈ *R*^(*V* × 1).
  id: totrans-239
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入 *x*[*t*] 是表示步骤 *t* 的输入单词的向量。例如，它可以是设置词汇表中相应单词索引为1的一个-hot编码向量。它也可以是从某些预训练库（如GloVe）中的单词向量嵌入。一般来说，我们假设
    *x*[*t*] ∈ R^(*D* × 1)。此外，如果我们想要预测 *V* 个类别，那么输出 *y*[*t*] ∈ R^(*V* × 1)。
- en: The memory or the hidden state vector *h*[*t*] can have any length as per the
    user’s choice. If the number of states chosen is *n*, then *h*[*t*] ∈ *R*^(*n* × 1)
    and the weight matrix *W*[*hh*] ∈ *R*^(*n* × *n*).
  id: totrans-240
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 记忆或隐藏状态向量 *h*[*t*] 可以根据用户的喜好具有任何长度。如果选择的州数是 *n*，那么 *h*[*t*] ∈ R^(*n* × 1) 并且权重矩阵
    *W*[*hh*] ∈ R^(*n* × *n*)。
- en: The weight matrix connecting the input to the memory states *W*[*xh*] ∈ *R*^(*n* × *D*),
    and the weight matrix connecting the memory states to the output *W*[*ho*] ∈ *R*^(*n* × *V*).
  id: totrans-241
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 连接输入到记忆状态的权重矩阵 *W*[*xh*] ∈ R^(*n* × *D*)，以及连接记忆状态到输出的权重矩阵 *W*[*ho*] ∈ R^(*n*
    × *V*)。
- en: 'The memory *h*[*t*] at step *t* is computed as follows:'
  id: totrans-242
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在步骤 *t* 的记忆 *h*[*t*] 的计算如下：
- en: '![$$ {h}_t=\left[\begin{array}{c}f\left({s}_{1t}\right)\\ {}f\left({s}_{2t}\right)\\
    {}.\\ {}.\\ {}f\left({s}_{nt}\right)\end{array}\right] $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equaq.png)'
  id: totrans-243
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {h}_t=\left[\begin{array}{c}f\left({s}_{1t}\right)\\ {}f\left({s}_{2t}\right)\\
    {}.\\ {}.\\ {}f\left({s}_{nt}\right)\end{array}\right] $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equaq.png)'
- en: 'The connections from the memory states to the output are just like the connections
    from a fully connected layer to the output layer. When a multi-class classification
    problem is involved, such as predicting the next word, then the output layer would
    be a huge SoftMax of the number of words in the vocabulary. In such cases, the
    predicted output vector *o*[*t*] ∈ *R*^(*V* × 1) can be expressed as *SoftMax*(*W*[*ho*]*h*[*t*]).
    Just to keep the notations simple, the biases have not been mentioned. In every
    unit, we can add bias to the input before it is acted upon by the different functions.
    So, *o*[*t*] can be represented as follows:'
  id: totrans-244
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从记忆状态到输出的连接就像从全连接层到输出层的连接一样。当涉及到多类分类问题，例如预测下一个单词时，输出层将是一个包含词汇表中单词数量的巨大SoftMax。在这种情况下，预测的输出向量
    *o*[*t*] ∈ R^(*V* × 1) 可以表示为 *SoftMax*(*W*[*ho*]*h*[*t*])。为了保持符号简单，没有提及偏差。在每个单元中，我们可以在它被不同函数作用之前向输入添加偏差。因此，*o*[*t*]
    可以表示如下：
- en: '![$$ {o}_t= SoftMax\left({W}_{ho}{h}_t+{b}_o\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equar.png)'
  id: totrans-245
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {o}_t= SoftMax\left({W}_{ho}{h}_t+{b}_o\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equar.png)'
- en: 'Similarly, bias can be introduced in the memory units, and hence *h*[*t*] can
    be expressed as follows:'
  id: totrans-246
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 同样，可以在记忆单元中引入偏差，因此 *h*[*t*] 可以表示如下：
- en: where *b*[*o*] ∈ *R*^(*n* × 1) is the bias vector for the output units.
  id: totrans-247
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 其中 *b*[*o*] ∈ R^(*n* × 1) 是输出单元的偏差向量。
- en: '![$$ {h}_t=f\left({W}_{hh}{h}_{t-1}+\space {W}_{xh}\kern0.5em {x}_t+{b}_h\right)
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equas.png)'
  id: totrans-248
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {h}_t=f\left({W}_{hh}{h}_{t-1}+\space {W}_{xh}\kern0.5em {x}_t+{b}_h\right)
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equas.png)'
- en: 'For a classification problem predicting the next word for a text sequence of
    *T* time steps, the output at each time step is a big SoftMax of *V* classes,
    where *V* is the size of the vocabulary. So, the corresponding loss at each time
    step is the negative log-loss over all the vocabulary size *V*. The loss at each
    time step can be expressed as follows:'
  id: totrans-249
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于预测文本序列 *T* 个时间步长的下一个单词的分类问题，每个时间步的输出是 *V* 个类别的SoftMax，其中 *V* 是词汇表的大小。因此，每个时间步对应的损失是所有词汇表大小
    *V* 的负对数损失。每个时间步的损失可以表示如下：
- en: where *b*[*h*] ∈ *R*^(*n* × 1) is the bias vector at the memory units.
  id: totrans-250
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 其中 *b*[*h*] ∈ R^(*n* × 1) 是记忆单元的偏差向量。
- en: '![$$ {C}_t=-\sum \limits_{j=1}^V{y}_t^{(j)}\log {\textrm{o}}_t^{(j)} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equat.png)'
  id: totrans-251
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equat.png)'
- en: 'To get the overall loss over all the time steps *T*, all such *C*[*t*] needs
    to be summed up or averaged out. Generally, the average of all *C*[*t*] is more
    convenient for stochastic gradient descent to get a fair comparison when the sequence
    length varies. The overall cost function for all the time steps *T* can thus be
    represented by the following:'
  id: totrans-252
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了得到所有时间步 *T* 的总体损失，需要将所有这样的 *C*[*t*] 相加或平均。通常，所有 *C*[*t*] 的平均值对于随机梯度下降来说更方便，以便在序列长度变化时进行公平的比较。因此，所有时间步
    *T* 的总体成本函数可以表示如下：
- en: '![$$ C=-\sum \limits_{t=1}^T\sum \limits_{j=1}^V{y}_t^{(j)}\log {\textrm{o}}_t^{(j)}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equau.png)'
  id: totrans-253
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equau.png)'
- en: Language Modeling
  id: totrans-254
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 语言模型
- en: 'In language modeling, the probability of a sequence of words is computed through
    the product rule of intersection of events. The probability of a sequence of words
    *w*[1]*w*[2]*w*[3] ….. *w*[*n*] of length *n* is given as follows:'
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 在语言模型中，通过事件的交集乘积规则计算单词序列的概率。长度为 *n* 的单词序列 *w*[1]*w*[2]*w*[3] …… *w*[*n*] 的概率如下给出：
- en: '![$$ {\displaystyle \begin{array}{l}P\left({w}_1{w}_2{w}_3\dots ..{w}_n\right)=P\left({w}_1\right)P\left({w}_2/{w}_1\right)P\left({w}_3/{w}_1{w}_2\right)\dots
    P\left({w}_3/{w}_1{w}_2\right)\dots ..P\left({w}_n/{w}_1{w}_2..{w}_{n-1}\right)\\
    {}\operatorname{}\operatorname{}\kern1em =P\left({w}_1\right)\prod \limits_{k=2}^nP\left({w}_k/{w}_1{w}_2..{w}_{k-1}\right)\end{array}}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equav.png)'
  id: totrans-256
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equav.png)'
- en: 'In traditional approaches, the probability of a word at time step *k* is generally
    not conditioned on the whole sequence of length (*k* − 1) prior to that but rather
    on a small window *L* prior to *t*. Hence, the probability is generally approximated
    as follows:'
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 在传统方法中，时间步 *k* 的单词概率通常不是基于之前的整个长度为 (*k* - 1) 的序列，而是基于 *t* 之前的较小窗口 *L*。因此，概率通常被近似如下：
- en: '![$$ P\left({w}_1{w}_2{w}_3\dots ..{w}_n\right)\cong P\left({w}_1\right)\prod
    \limits_{k=2}^nP\left({w}_k/{w}_{k-L}..{w}_{k-2}{w}_{k-1}\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equaw.png)'
  id: totrans-258
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equaw.png)'
- en: This method of conditioning a state based on *L* recent states is called the
    Markov assumption of chain rule probability. Although it is an approximation,
    it is a necessary one for traditional language models since the words cannot be
    conditioned on a large sequence of words because of memory constraints.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 这种基于 *L* 个最近状态的条件状态的方法被称为链式规则概率的马尔可夫假设。尽管它是一种近似，但对于传统的语言模型来说，由于内存限制，无法对大量单词序列进行条件化，因此这是一个必要的近似。
- en: Language models are generally used for varied tasks related to natural language
    processing, such as sentence completion by predicting the next words, machine
    translation, speech recognition, and others. In machine translation, the words
    from another language might be translated to English but may not be correct syntactically.
    For example, a sentence in the Hindi language has been machine translated to produce
    the English sentence *beautiful very is the sky*. If one computes the probability
    of the machine-translated sequence (P("*beautiful* *very is the sky*")), it would
    be very much less than that of the arranged counterpart, (P("*The sky is very
    beautiful*"). Through language modeling, such comparisons of the probability of
    text sequences can be carried out.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 语言模型通常用于与自然语言处理相关的各种任务，例如通过预测下一个单词进行句子补全、机器翻译、语音识别等。在机器翻译中，另一种语言的单词可能被翻译成英语，但可能不符合语法。例如，一句印地语句子被机器翻译成英语句子
    *beautiful very is the sky*。如果计算机器翻译序列的概率（P("*beautiful* *very is the sky*")），它将远低于排列后的对应概率（P("*The
    sky is very beautiful*")）。通过语言模型，可以执行此类文本序列概率的比较。
- en: Predicting the Next Word in a Sentence Through RNN Versus Traditional Methods
  id: totrans-261
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 通过 RNN 与传统方法预测句子中的下一个单词
- en: 'In traditional language models, the probability of a word appearing next is
    generally conditioned on a window of a specified number of previous words, as
    discussed earlier. To estimate probabilities, different *n*-gram counts are usually
    computed. From bigram and trigram counts, the conditional probabilities can be
    computed as follows:'
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 在传统的语言模型中，下一个词出现的概率通常是在前面指定数量的词语窗口上条件化的，如前所述。为了估计概率，通常计算不同的 *n*-gram 计数。从二元组和三元组计数中，可以计算条件概率如下：
- en: '![$$ P\left(w={w}_2/w={w}_1\right)=\frac{count\left({w}_1,{w}_2\right)}{count\left({w}_1\right)}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equax.png)'
  id: totrans-263
  prefs: []
  type: TYPE_IMG
  zh: '![$$ P\left(w={w}_2/w={w}_1\right)=\frac{count\left({w}_1,{w}_2\right)}{count\left({w}_1\right)}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equax.png)'
- en: '![$$ P\left(w={w}_3/w={w}_1,w={w}_2\right)=\frac{count\left({w}_1,{w}_2,{w}_3\right)}{count\left({w}_1,{w}_2\right)}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equay.png)'
  id: totrans-264
  prefs: []
  type: TYPE_IMG
  zh: '![$$ P\left(w={w}_3/w={w}_1,w={w}_2\right)=\frac{count\left({w}_1,{w}_2,{w}_3\right)}{count\left({w}_1,{w}_2\right)}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equay.png)'
- en: In a similar manner, we can condition the word probabilities on longer sequences
    of words by keeping count of larger *n*-grams. Generally, when a match is not
    found on a higher *n*-gram—let’s say four-gram—then a lower *n*-gram such as a
    three-gram is tried. This method is called back off and gives some performance
    gain over a fixed *n*-gram approach.
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 以类似的方式，我们可以通过保持较大 *n*-gram 的计数来对较长的词语序列进行条件化。通常，如果在较高的 *n*-gram（例如四元组）上没有找到匹配项，则尝试较低
    *n*-gram（例如三元组）。这种方法称为回退，并且相对于固定 *n*-gram 方法提供了一些性能提升。
- en: Since word prediction is conditioned on only a few previous words based on the
    chosen window size, this traditional method of computing probabilities through
    *n*-gram counts doesn’t do as well as those models in which the whole sequence
    of words is taken into consideration for the next-word prediction.
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 由于基于选择的窗口大小，词预测仅依赖于少数前面的词语，因此通过 *n*-gram 计数计算概率的传统方法并不像那些考虑整个词语序列进行下一个词预测的模型那样有效。
- en: In RNNs, the output at each step is conditioned on all previous words, and hence
    RNNs do a better job than the *n*-gram models at language-model tasks. To understand
    this, let’s look at the working principals of a generative recurrent neural network
    while considering a sequence (*x*[1]*x*[2]*x*[3] ….. *x*[*n*]) of length *n*.
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 在 RNN 中，每个步骤的输出都依赖于所有前面的词语，因此 RNN 在语言模型任务上比 *n*-gram 模型做得更好。为了理解这一点，让我们在考虑长度为
    *n* 的序列 (*x*[1]*x*[2]*x*[3] ….. *x*[*n*]) 的生成循环神经网络的工作原理时进行分析。
- en: The RNN updates its hidden state *h*[*t*] recursively as *h*[*t*] = *f* (*h*[*t* − 1],
    *x*[*t*]). The hidden state *h*[*t* − 1] has information accumulated for sequence
    of words (*x*[1]*x*[2]…*x*[*t* − 1]) , and when the new word in the sequence *x*[*t*]
    arrives, the updated sequence information for (*x*[1]*x*[2]*x*[3]…*x*[*t*]) is
    encoded in *h*[*t*] through the recursive update.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: RNN 通过递归地更新其隐藏状态 *h*[*t*] 作为 *h*[*t*] = *f* (*h*[*t* − 1], *x*[*t*])。隐藏状态 *h*[*t* − 1]
    包含了序列中词语 (*x*[1]*x*[2]…*x*[*t* − 1]) 的累积信息，当序列中的新词 *x*[*t*] 到达时，通过递归更新将 (*x*[1]*x*[2]*x*[3]…*x*[*t*])
    的更新序列信息编码在 *h*[*t*] 中。
- en: 'Now, if we must predict the next word based on the word sequence seen so far,
    i.e., (*x*[1]*x*[2]*x*[3]…*x*[*t*]) , the conditional probability distribution
    one needs to look at is as follows:'
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，如果我们必须根据迄今为止看到的词序列来预测下一个词，即 (*x*[1]*x*[2]*x*[3]…*x*[*t*]) ，则需要查看以下条件概率分布：
- en: '![$$ P\left({x}_{n+1}={o}_i/{x}_1{x}_2{x}_3\dots ..{x}_t\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equaz.png)'
  id: totrans-270
  prefs: []
  type: TYPE_IMG
  zh: '![$$ P\left({x}_{n+1}={o}_i/{x}_1{x}_2{x}_3\dots ..{x}_t\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equaz.png)'
- en: where *o*[*i*] represents any generalized word in the vocabulary.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *o*[*i*] 代表词汇表中的任何广义词。
- en: For neural networks, this probability distribution is governed by the computed
    hidden state *h*[*t*] based on the sequence seen so far, i.e., *x*[1]*x*[2]*x*[3]
    ….. *x*[*t*], and the model parameter *V*, which converts the hidden states to
    probabilities corresponding to every word in the vocabulary.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 对于神经网络来说，这个概率分布是由基于迄今为止看到的序列 *x*[1]*x*[2]*x*[3] ….. *x*[*t*] 计算的隐藏状态 *h*[*t*]
    以及模型参数 *V* 来控制的，该参数将隐藏状态转换为对应于词汇表中每个词的概率。
- en: So,
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，
- en: '![$$ P\left({x}_{n+1}={o}_i/{x}_1{x}_2{x}_3\dots ..{x}_t\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equba.png)'
  id: totrans-274
  prefs: []
  type: TYPE_IMG
  zh: '![$$ P\left({x}_{n+1}={o}_i/{x}_1{x}_2{x}_3\dots ..{x}_t\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equba.png)'
- en: =*P*(*x*[*n* + 1] = *o*[*i*]/*h*[*t*]) or *P*(*x*[*n* + 1] = *o*[*i*]/*x*[*t*];
    *h*[*t* − 1])
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: =*P*(*x*[*n* + 1] = *o*[*i*]/*h*[*t*]) 或 *P*(*x*[*n* + 1] = *o*[*i*]/*x*[*t*];
    *h*[*t* − 1])
- en: The vector of probabilities for *P*(*x*[*n* + 1] = *o*[*i*]/*h*[*t*]) corresponding
    to all indices *i* over the vocabulary is given by *Softmax*(*W*[*ho*]*h*[*t*]).
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 对应于词汇表中所有索引 *i* 的 *P*(*x*[*n* + 1] = *o*[*i*]/*h*[*t*]) 的概率向量由 *Softmax*(*W*[*ho*]*h*[*t*])
    给出。
- en: Backpropagation Through Time (BPTT)
  id: totrans-277
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 时间反向传播（BPTT）
- en: Backpropagation for recurrent neural networks is same as that for feed-forward
    neural networks, with the only difference being that the gradient is the sum of
    the gradient with respect to the log-loss at each step.
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 反向传播对于循环神经网络与对于前馈神经网络相同，唯一的区别是梯度是每个步骤对对数损失的梯度的总和。
- en: First, the RNN is unfolded in time, and then the forward step is executed to
    get the internal activations and the final predictions for output. Based on the
    predicted output and the actual output labels, the loss and the corresponding
    error at each time step are computed. The error at each time step is backpropagated
    to update the weights. So, any weight update is proportional to the sum of the
    gradients’ contribution from errors at all the *T* time steps.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，将 RNN 在时间上展开，然后执行前向步骤以获取内部激活和输出最终预测。基于预测输出和实际输出标签，计算每个时间步的损失和相应的误差。每个时间步的误差反向传播以更新权重。因此，任何权重更新都与所有
    *T* 个时间步的误差梯度贡献的总和成正比。
- en: Let’s look at a sequence of length *T* and at the weight updates through BPTT.
    We take the number of memory states as *n* (i.e., *h*[*t*] ∈ *R*^(*n* × 1)) and
    choose the input vector length as *D* (i.e., *x*[*t*] ∈ *R*^(*D* × 1)). At each
    sequence step *t*, we predict the next word from a vocabulary of *V* words through
    a SoftMax function.
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑一个长度为 *T* 的序列以及通过 BPTT 的权重更新。我们将记忆状态的数量设为 *n*（即 *h*[*t*] ∈ *R*^(*n* × 1)），并将输入向量长度设为
    *D*（即 *x*[*t*] ∈ *R*^(*D* × 1)）。在序列的每个步骤 *t*，我们通过 SoftMax 函数从包含 *V* 个单词的词汇表中预测下一个单词。
- en: 'The total cost function for a sequence of length *T* is given as follows:'
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 长度为 *T* 的序列的总成本函数如下所示：
- en: '![$$ C=-\sum \limits_{t=1}^T\sum \limits_{j=1}^V{y}_t^{(j)}\log {\textrm{o}}_t^{(j)}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbb.png)'
  id: totrans-282
  prefs: []
  type: TYPE_IMG
  zh: '![$$ C=-\sum \limits_{t=1}^T\sum \limits_{j=1}^V{y}_t^{(j)}\log {\textrm{o}}_t^{(j)}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbb.png)'
- en: Let’s compute the gradient of the cost function with respect to the weights
    connecting the hidden memory states to the output states layers—i.e., the weights
    belonging to the matrix *W*[*ho*]. The weight *w*[*ij*] denotes the weight connecting
    the hidden state *i* to the output unit *j*.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们计算连接隐藏记忆状态到输出状态层的权重（即属于矩阵 *W*[*ho*] 的权重）的成本函数的梯度。权重 *w*[*ij*] 表示连接隐藏状态 *i*
    到输出单元 *j* 的权重。
- en: The gradient of the cost function *C*[*t*] with respect to *w*[*ij*] can be
    broken down by the chain rule of partial derivatives as the product of the partial
    derivative of the cost function with respect to the output of the *jth* unit (i.e.,
    ![$$ \frac{\partial {C}_t}{\partial {o}_t^{(j)}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq18.png)),
    the partial derivative of the output of the *jth* unit with respect to the net
    input *s*[*t*]^((*j*)) at the *jth* unit (i.e., ![$$ \frac{\partial {o}_t^{(j)}}{\partial
    {s}_t^{(j)}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq19.png)
    ), and finally the partial derivative of the net input to the *jth* unit with
    respect to the concerned weight from the *ith* memory unit to the *jth* hidden
    layer (i.e., ![$$ \frac{\partial {s}_t^{(j)}}{\partial {w}_{ij}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq20.png)).
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 成本函数 *C*[*t*] 关于 *w*[*ij*] 的梯度可以通过偏导数的链式法则分解为成本函数关于 *jth* 单元输出的偏导数（即 ![$$ \frac{\partial
    {C}_t}{\partial {o}_t^{(j)}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq18.png)），*jth*
    单元输出关于第 *j* 单元的净输入 *s*[*t*]^((*j*)) 的偏导数（即 ![$$ \frac{\partial {o}_t^{(j)}}{\partial
    {s}_t^{(j)}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq19.png)），以及最后是第
    *j* 单元的净输入关于从第 *i* 个记忆单元到第 *j* 个隐藏层的相关权重（即 ![$$ \frac{\partial {s}_t^{(j)}}{\partial
    {w}_{ij}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq20.png)）的偏导数。
- en: '![$$ \frac{\partial {C}_t}{\partial {w}_{ij}}=\frac{\partial {C}_t}{\partial
    {o}_t^{(j)}}\frac{\partial {o}_t^{(j)}}{\partial {s}_t^{(j)}}\frac{\partial {s}_t^{(j)}}{\partial
    {w}_{ij}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ6.png)'
  id: totrans-285
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \frac{\partial {C}_t}{\partial {w}_{ij}}=\frac{\partial {C}_t}{\partial
    {o}_t^{(j)}}\frac{\partial {o}_t^{(j)}}{\partial {s}_t^{(j)}}\frac{\partial {s}_t^{(j)}}{\partial
    {w}_{ij}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ6.png)'
- en: (4.2.1)
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: (4.2.1)
- en: '![$$ \frac{\partial {s}_t^{(j)}}{\partial {w}_{ij}}={h}_t^{(i)} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ7.png)'
  id: totrans-287
  prefs: []
  type: TYPE_IMG
  zh: '![对 $s_t^{(j)}$ 关于 $w_{ij}$ 的偏导数为 $h_t^{(i)}$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ7.png)'
- en: (4.2.2)
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: (4.2.2)
- en: Considering the SoftMax over vocabulary *V* and the actual output at time *t*
    as ![$$ {y}_t={\left[{y}_t^{(1)}{y}_t^{(2)}\dots {y}_t^{(V)}\right]}^T $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq21.png),
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑词汇 *V* 上的 SoftMax 和时间 *t* 的实际输出为 ![$$ {y}_t={\left[{y}_t^{(1)}{y}_t^{(2)}\dots
    {y}_t^{(V)}\right]}^T $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq21.png)，
- en: '![$$ \frac{\partial {C}_t}{\partial {o}_t^{(j)}}=-\frac{y_t^{(j)}}{o_t^{(j)}}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ8.png)'
  id: totrans-290
  prefs: []
  type: TYPE_IMG
  zh: '![对 $C_t$ 关于 $o_t^{(j)}$ 的偏导数为 $-\frac{y_t^{(j)}}{o_t^{(j)}}$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ8.png)'
- en: (4.2.3)
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: (4.2.3)
- en: '![$$ \frac{\partial {o}_t^{(j)}}{\partial {s}_t^{(j)}}={o}_t^{(j)}\left(1-{o}_t^{(j)}\right)
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ9.png)'
  id: totrans-292
  prefs: []
  type: TYPE_IMG
  zh: '![对 $o_t^{(j)}$ 关于 $s_t^{(j)}$ 的偏导数为 $o_t^{(j)}\left(1-{o}_t^{(j)}\right)$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ9.png)'
- en: (4.2.4)
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: (4.2.4)
- en: 'Substituting the expressions for individual gradients from ([4.2.2](#Equ7)),
    ([4.2.3](#Equ8)), and ([4.2.4](#Equ9)) into ([4.2.1](#Equ6)), we get the following:'
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 将 ([4.2.2](#Equ7))、([4.2.3](#Equ8)) 和 ([4.2.4](#Equ9)) 中的单个梯度表达式代入 ([4.2.1](#Equ6))，我们得到以下结果：
- en: '![$$ \frac{\partial {C}_t}{\partial {w}_{ij}}=-\frac{y_t^{(j)}}{o_t^{(j)}}{o}_t^{(j)}\left(1-{o}_t^{(j)}\right)=-{y}_t^{(j)}\left(1-{o}_t^{(j)}\right){h}_t^{(i)}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ10.png)'
  id: totrans-295
  prefs: []
  type: TYPE_IMG
  zh: '![对 $C_t$ 关于 $w_{ij}$ 的偏导数为 $-\frac{y_t^{(j)}}{o_t^{(j)}}{o}_t^{(j)}\left(1-{o}_t^{(j)}\right)=-{y}_t^{(j)}\left(1-{o}_t^{(j)}\right)h_t^{(i)}$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ10.png)'
- en: (4.2.5)
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: (4.2.5)
- en: 'To get the expression of the gradient of the total cost function *C* with respect
    to *w*[*ij*], one needs to sum up the gradients at each sequence step. Hence,
    the expression for the gradient ![$$ \frac{\partial C}{\partial {w}_{ij}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq22.png)
    is as follows:'
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 要得到总成本函数 *C* 关于 *w*[*ij*] 的梯度表达式，需要将每个序列步骤的梯度相加。因此，梯度表达式 ![$$ \frac{\partial
    C}{\partial {w}_{ij}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq22.png)
    如下：
- en: '![$$ \frac{\partial C}{\partial {w}_{ij}}=\sum \limits_{t=1}^T\frac{\partial
    {C}_t}{\partial {w}_{ij}}=\sum \limits_{t=1}^T-{y}_t^{(j)}\left(1-{o}_t^{(j)}\right){h}_t^{(i)}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ11.png)'
  id: totrans-298
  prefs: []
  type: TYPE_IMG
  zh: '![对 $C$ 关于 $w_{ij}$ 的偏导数为 $\sum \limits_{t=1}^T\frac{\partial {C}_t}{\partial
    {w}_{ij}}=\sum \limits_{t=1}^T-{y}_t^{(j)}\left(1-{o}_t^{(j)}\right)h_t^{(i)}$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ11.png)'
- en: (4.2.6)
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: (4.2.6)
- en: So, we can see that determining the weights of the connections from the memory
    state to the output layers is pretty much the same as doing so for the fully connected
    layers of feed-forward neural networks, the only difference being that the effect
    of each sequential step is summed up to get the final gradient.
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们可以看到，确定从记忆状态到输出层的连接权重与全连接前馈神经网络的完全连接层相同，唯一的区别在于每个序列步骤的效果被累加以得到最终的梯度。
- en: Now, let’s look at the gradient of the cost function with respect to the weights
    connecting the memory states in one step to the memory states in the next step—i.e.,
    the weights of the matrix *W*[*hh*]. We take the generalized weight *u*[*ki*] ∈ *W*[*hh*],
    where *k* and *i* are indexes of the memory units in consecutive memory units.
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们看看关于连接一个步骤中的记忆状态到下一个步骤中的记忆状态的权重（即矩阵 *W*[*hh*] 的权重）的成本函数的梯度。我们取广义权重 *u*[*ki*]
    ∈ *W*[*hh*]，其中 *k* 和 *i* 是连续记忆单元中记忆单元的索引。
- en: 'This will get a little more involved because of the recurrent nature of the
    memory units’ connections. To appreciate this fact, let’s look at the output of
    the memory unit indexed by *i* at step *t*—i.e., *h*[*t*]^((*i*)):'
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 由于记忆单元连接的循环性质，这会变得稍微复杂一些。为了理解这一点，让我们看看在步骤 *t* 时由 *i* 索引的记忆单元的输出——即 *h*[*t*]^((*i*))：
- en: '![$$ {h}_t^{(i)}=g\left(\sum \limits_{l=1}^N{u}_{li}{h}_{t-1}^{(l)}+\sum \limits_{m=1}^D{v}_{mi}{x}_t^{(m)}+{b}_{hi}\right)
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ12.png)'
  id: totrans-303
  prefs: []
  type: TYPE_IMG
  zh: '![ $h_t^{(i)}=g\left(\sum \limits_{l=1}^N{u}_{li}{h}_{t-1}^{(l)}+\sum \limits_{m=1}^D{v}_{mi}{x}_t^{(m)}+{b}_{hi}\right)$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ12.png)'
- en: (4.2.7)
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: (4.2.7)
- en: 'Now, let’s look at the gradient of the cost function at step *t* with respect
    to the weight *u*[*ki*]:'
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们看看在步骤 *t* 时，关于权重 *u*[*ki*] 的成本函数的梯度：
- en: '![$$ \frac{\partial {C}_t}{\partial {u}_{ki}}=\frac{\partial {C}_t}{\partial
    {h}_t^{(i)}}\frac{\partial {h}_t^{(i)}}{\partial {u}_{ki}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ13.png)'
  id: totrans-306
  prefs: []
  type: TYPE_IMG
  zh: '![对 $C_t$ 关于 $u_{ki}$ 的偏导数为：$$ \frac{\partial {C}_t}{\partial {u}_{ki}}=\frac{\partial
    {C}_t}{\partial {h}_t^{(i)}}\frac{\partial {h}_t^{(i)}}{\partial {u}_{ki}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ13.png)'
- en: (4.2.8)
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: (4.2.8)
- en: 'We are only interested in expressing *h*[*t*]^((*i*)) as a function of *u*[*ki*],
    and hence we rearrange ([4.2.7](#Equ12)) as follows:'
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 我们只对将 *h*[*t*]^((*i*)) 表示为 *u*[*ki*] 的函数感兴趣，因此我们将 ([4.2.7](#Equ12)) 重新排列如下：
- en: '![$$ {\displaystyle \begin{array}{l}{h}_t^{(i)}=g\left({u}_{ki}{h}_{t-1}^{(k)}+{u}_{ii}{h}_{t-1}^{(i)}+{\sum}_{\begin{array}{c}l=1\\
    {}l\ne k,i\end{array}}^N{u}_{li}{h}_{t-1}^{(l)}+\sum \limits_{m=1}^D{v}_{mi}{x}_t^{(m)}\right)\\
    {}\kern1.24em =g\left({u}_{ki}{h}_{t-1}^{(k)}+{u}_{ii}{h}_{t-1}^{(i)}+{c}_t^{(i)}\right)\kern0.5em
    \end{array}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ14.png)'
  id: totrans-309
  prefs: []
  type: TYPE_IMG
  zh: '![表达式如下：$$ {\displaystyle \begin{array}{l}{h}_t^{(i)}=g\left({u}_{ki}{h}_{t-1}^{(k)}+{u}_{ii}{h}_{t-1}^{(i)}+{\sum}_{\begin{array}{c}l=1\\
    {}l\ne k,i\end{array}}^N{u}_{li}{h}_{t-1}^{(l)}+\sum \limits_{m=1}^D{v}_{mi}{x}_t^{(m)}\right)\\
    {}\kern1.24em =g\left({u}_{ki}{h}_{t-1}^{(k)}+{u}_{ii}{h}_{t-1}^{(i)}+{c}_t^{(i)}\right)\kern0.5em
    \end{array}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ14.png)'
- en: (4.2.9)
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: (4.2.9)
- en: where
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 其中
- en: '![$$ {c}_t^{(i)}={\sum}_{\begin{array}{c}l=1\\ {}l\ne k,i\end{array}}^N{u}_{li}{h}_{t-1}^{(l)}+\sum
    \limits_{m=1}^D{v}_{mi}{x}_t^{(m)} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbc.png)'
  id: totrans-312
  prefs: []
  type: TYPE_IMG
  zh: '![表达式如下：$$ {c}_t^{(i)}={\sum}_{\begin{array}{c}l=1\\ {}l\ne k,i\end{array}}^N{u}_{li}{h}_{t-1}^{(l)}+\sum
    \limits_{m=1}^D{v}_{mi}{x}_t^{(m)} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbc.png)'
- en: We have rearranged *h*[*t*]^((*i*)) to be a function that contains the required
    weight *u*[*ki*] and kept ![$$ {h}_{t-1}^{(i)} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq23.png)
    since it can be expressed through recurrence as ![$$ g\left({u}_{ki}{h}_{t-2}^{(k)}+{u}_{ii}{h}_{t-2}^{(i)}+{c}_{t-1}^{(i)}\right).
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq24.png)
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经将 *h*[*t*]^((*i*)) 重新排列为一个包含所需权重 *u*[*ki*] 的函数，并保留了 ![$$ {h}_{t-1}^{(i)}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq23.png)，因为它可以通过递归表示为
    ![$$ g\left({u}_{ki}{h}_{t-2}^{(k)}+{u}_{ii}{h}_{t-2}^{(i)}+{c}_{t-1}^{(i)}\right).
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq24.png)
- en: 'This nature of recurrence at every time step *t* would continue up to the first
    step, and hence one needs to consider the summation effect of all associated gradients
    from *t* = *t* to *t* = 1\. If the gradient of *h*[*t*]^((*i*)) with respect to
    the weight *u*[*ki*] follows the recurrence, and if we take the derivative of
    *h*[*t*]^((*i*)) as expressed in ([4.2.9](#Equ14)) with respect to *u*[*ki*],
    then the following will hold true:'
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 每个时间步长 *t* 的这种递归性质将一直持续到第一步，因此需要考虑从 *t* = *t* 到 *t* = 1 的所有相关梯度的求和效应。如果 *h*[*t*]^((*i*))
    关于权重 *u*[*ki*] 的梯度遵循递归，并且如果我们对 *h*[*t*]^((*i*))（如[4.2.9](#Equ14)所示）关于 *u*[*ki*]
    求导，那么以下将成立：
- en: '![$$ \frac{\partial {h}_t^{(i)}}{\partial {u}_{ki}}=\sum \limits_{t^{\prime
    }=1}^t\frac{\partial {h}_t^{(i)}\overline{\partial}{h}_{t^{\prime}}^{(i)}}{\partial
    {h}_t^{(i)}\partial {u}_{ki}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ15.png)'
  id: totrans-315
  prefs: []
  type: TYPE_IMG
  zh: '![对 $h_t^{(i)}$ 关于 $u_{ki}$ 的偏导数为：$$ \frac{\partial {h}_t^{(i)}}{\partial {u}_{ki}}=\sum
    \limits_{t^{\prime }=1}^t\frac{\partial {h}_t^{(i)}\overline{\partial}{h}_{t^{\prime}}^{(i)}}{\partial
    {h}_t^{(i)}\partial {u}_{ki}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ15.png)'
- en: (4.2.10)
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: (4.2.10)
- en: Please note the bar for the expression ![$$ \frac{\overline{\partial}{h}_{t^{\prime}}^{(i)}}{\partial
    {u}_{ki}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq25.png).
    It denotes the local gradient of *h*[*t*]^((*i*)) with respect to *u*[*ki*], holding
    ![$$ {h}_{t^{\prime }-1}^{(i)} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq26.png)
    constant.
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意表达式 ![$$ \frac{\overline{\partial}{h}_{t^{\prime}}^{(i)}}{\partial {u}_{ki}}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq25.png) 上的横线。它表示
    *h*[*t*]^((*i*)) 关于 *u*[*ki*] 的局部梯度，保持 ![$$ {h}_{t^{\prime }-1}^{(i)} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq26.png)
    不变。
- en: 'Replacing ([4.2.9](#Equ14)) with ([4.2.8](#Equ13)), we get the following:'
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 将 ([4.2.9](#Equ14)) 替换为 ([4.2.8](#Equ13))，我们得到以下结果：
- en: '![$$ \frac{\partial {C}_t}{\partial {u}_{ki}}=\sum \limits_{t^{\prime }=1}^t\frac{\partial
    {C}_t}{\partial {h}_t^{(i)}}\frac{\partial {h}_t^{(i)}}{\partial {h}_{t^{\prime}}^{(i)}}\frac{\overline{\partial}{h}_{t^{\prime}}^{(i)}}{\partial
    {u}_{ki}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ16.png)'
  id: totrans-319
  prefs: []
  type: TYPE_IMG
  zh: '![对 $C_t$ 关于 $u_{ki}$ 的偏导数为：$$ \frac{\partial {C}_t}{\partial {u}_{ki}}=\sum
    \limits_{t^{\prime }=1}^t\frac{\partial {C}_t}{\partial {h}_t^{(i)}}\frac{\partial
    {h}_t^{(i)}}{\partial {h}_{t^{\prime}}^{(i)}}\frac{\overline{\partial}{h}_{t^{\prime}}^{(i)}}{\partial
    {u}_{ki}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ16.png)'
- en: (4.2.11)
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: (4.2.11)
- en: 'Equation ([4.2.11](#Equ16)) gives us the generalized equation of the gradient
    of the cost function at time *t*. Hence, to get the total gradient, we need to
    sum up the gradients with respect to the cost at each time step. Therefore, the
    total gradient can be represented by the following:'
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 方程 ([4.2.11](#Equ16)) 给出了时间 *t* 时成本函数梯度的泛化方程。因此，为了得到总梯度，我们需要将每个时间步的成本梯度相加。因此，总梯度可以表示如下：
- en: '![$$ \frac{\partial C}{\partial {u}_{ki}}=\sum \limits_{t=1}^T\sum \limits_{t^{\prime
    }=1}^t\frac{\partial {C}_t}{\partial {h}_t^{(i)}}\frac{\partial {h}_t^{(i)}}{\partial
    {h}_{t\hbox{''}}^{(i)}}\frac{\overline{\partial}{h}_{t\hbox{''}}^{(i)}}{\partial
    {u}_{ki}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ17.png)'
  id: totrans-322
  prefs: []
  type: TYPE_IMG
  zh: '![梯度公式](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ17.png)'
- en: (4.2.12)
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: (4.2.12)
- en: 'The expression ![$$ \frac{\partial {h}_t^{(i)}}{\partial {h}_{t\hbox{''}}^{(i)}}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq27.png) follows
    a product recurrence and hence can be formulated as follows:'
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 表达式 ![偏导数](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq27.png)
    遵循乘积递归，因此可以表示如下：
- en: '![$$ \frac{\partial {h}_t^{(i)}}{\partial {h}_{t\hbox{''}}^{(i)}}=\prod \limits_{g={t}^{\prime
    }+1}^t\frac{\partial {h}_g^{(i)}}{\partial {h}_{g-1}^{(i)}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ18.png)'
  id: totrans-325
  prefs: []
  type: TYPE_IMG
  zh: '![偏导数公式](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ18.png)'
- en: (4.2.13)
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: (4.2.13)
- en: 'Combining ([4.2.12](#Equ17)) and ([4.2.13](#Equ18)), we get the following:'
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 结合 ([4.2.12](#Equ17)) 和 ([4.2.13](#Equ18))，我们得到以下结果：
- en: '![$$ \frac{\partial C}{\partial {u}_{ki}}=\sum \limits_{t=1}^T\sum \limits_{t^{\prime
    }=1}^t\frac{\partial {C}_t}{\partial {h}_t^{(i)}}\left(\prod \limits_{g={t}^{\prime
    }+1}^t\frac{\partial {h}_g^{(i)}}{\partial {h}_{g-1}^{(i)}}\right)\frac{\overline{\partial}{h}_{t\hbox{''}}^{(i)}}{\partial
    {u}_{ki}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ19.png)'
  id: totrans-328
  prefs: []
  type: TYPE_IMG
  zh: '![梯度公式](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ19.png)'
- en: (4.2.14)
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: (4.2.14)
- en: The computation of the gradient of the cost function *C* for the weights of
    the matrix *W*[*xh*] can be computed in a manner similar to that for the weights
    corresponding to the memory states.
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 对于矩阵 *W*[*xh*] 权重的成本函数 *C* 的梯度计算方法与对应记忆状态的权重类似。
- en: Vanishing- and Exploding-Gradient Problem in RNN
  id: totrans-331
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: RNN 中的消失和爆炸梯度问题
- en: 'The aim of recurrent neural networks (RNNs) is to learn long dependencies so
    that the interrelations between words that are far apart are captured. For example,
    the actual meaning that a sentence is trying to convey may be captured well by
    words that are not near each other. Recurrent neural networks should be able to
    learn those dependencies. However, RNNs suffer from an inherent problem: they
    fail to capture long-distance dependencies between words. This is because the
    gradients in instances of long sequences have a high chance of either going to
    zero or going to infinity very quickly. When the gradients drop to zero very quickly,
    the model is unable to learn the associations or correlations between events that
    are temporally far apart. The equations derived for the gradient of the cost function
    with respect to the weights of the hidden memory layers will help us understand
    why this vanishing-gradient problem might take place.'
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 循环神经网络 (RNN) 的目的是学习长依赖关系，以便捕捉相隔较远的单词之间的关系。例如，一个句子试图传达的实际意义可能很好地由不邻近的单词捕捉到。循环神经网络应该能够学习这些依赖关系。然而，RNN
    存在一个固有的问题：它们无法捕捉单词之间的长距离依赖关系。这是因为长序列实例中的梯度有很大可能性要么迅速降到零，要么迅速升到无穷大。当梯度迅速降到零时，模型无法学习时间上相隔较远的事件之间的关联或相关性。针对与隐藏记忆层权重相关的成本函数梯度的方程将帮助我们理解为什么这个消失梯度问题可能发生。
- en: 'The gradient of the cost function *C*[*t*] at step *t* for a generalized weight
    *u*[*ki*] ∈ *W*[*hh*] is given by the following:'
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 在步骤 *t* 时，对于广义权重 *u*[*ki*] ∈ *W*[*hh*]，成本函数 *C*[*t*] 的梯度如下所示：
- en: '![$$ \frac{\partial {C}_t}{\partial {u}_{ki}}=\space \sum \limits_{t\hbox{''}=1}^t\frac{\partial
    {C}_t}{\partial {h}_t^{(i)}}\frac{\partial {h}_t^{(i)}}{\partial {h}_{t\hbox{''}}^{(i)}}\frac{\partial
    {h}_{t\hbox{''}}^{(i)}}{\partial {u}_{ki}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbd.png)'
  id: totrans-334
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \frac{\partial {C}_t}{\partial {u}_{ki}}=\space \sum \limits_{t\hbox{''}=1}^t\frac{\partial
    {C}_t}{\partial {h}_t^{(i)}}\frac{\partial {h}_t^{(i)}}{\partial {h}_{t\hbox{''}}^{(i)}}\frac{\partial
    {h}_{t\hbox{''}}^{(i)}}{\partial {u}_{ki}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbd.png)'
- en: where the notations comply with their original interpretations as mentioned
    in the “Backpropagation Through Time (BPTT)” section.
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 其中符号的含义与“时间反向传播（BPTT）”部分中提到的原始解释一致。
- en: The components summed to form ![$$ \frac{\partial {C}_t}{\partial {u}_{ki}}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq28.png) are called
    its temporal components. Each of those components measures how the weight *u*[*ki*]
    at step *t*′ influences the loss at step *t*. The component ![$$ \frac{\partial
    {h}_t^{(i)}}{\partial {h}_{t\hbox{'}}^{(i)}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq29.png)
    backpropagates the error at step *t* back to step *t*′.
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 形成公式 ![$$ \frac{\partial {C}_t}{\partial {u}_{ki}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq28.png)
    的各个部分称为其时间分量。这些分量中的每一个都衡量了权重 *u*[*ki*] 在步骤 *t*′ 对步骤 *t* 的损失的影响。分量 ![$$ \frac{\partial
    {h}_t^{(i)}}{\partial {h}_{t\hbox{'}}^{(i)}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq29.png)
    将步骤 *t* 的误差反向传播到步骤 *t*′。
- en: Also,
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，
- en: '![$$ \space \frac{\partial {h}_t^{(i)}}{\partial {h}_{t\hbox{''}}^{(i)}}=\prod
    \limits_{g={t}^{\prime }+1}^t\frac{\partial {h}_g^{(i)}}{\partial {h}_{g-1}^{(i)}}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Eqube.png)'
  id: totrans-338
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \space \frac{\partial {h}_t^{(i)}}{\partial {h}_{t\hbox{''}}^{(i)}}=\prod
    \limits_{g={t}^{\prime }+1}^t\frac{\partial {h}_g^{(i)}}{\partial {h}_{g-1}^{(i)}}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Eqube.png)'
- en: 'Combining the preceding two equations, we get the following:'
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 结合前两个方程，我们得到以下方程：
- en: '![$$ \frac{\partial {C}_t}{\partial {u}_{ki}}=\sum \limits_{t^{\prime }=1}^t\frac{\partial
    {C}_t}{\partial {h}_t^{(i)}}\left(\prod \limits_{g={t}^{\prime }+1}^t\frac{\partial
    {h}_g^{(i)}}{\partial {h}_{g-1}^{(i)}}\right)\frac{\overline{\partial}{h}_t^{(i)}}{\partial
    {h}_{ki}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbf.png)'
  id: totrans-340
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \frac{\partial {C}_t}{\partial {u}_{ki}}=\sum \limits_{t^{\prime }=1}^t\frac{\partial
    {C}_t}{\partial {h}_t^{(i)}}\left(\prod \limits_{g={t}^{\prime }+1}^t\frac{\partial
    {h}_g^{(i)}}{\partial {h}_{g-1}^{(i)}}\right)\frac{\overline{\partial}{h}_t^{(i)}}{\partial
    {h}_{ki}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbf.png)'
- en: Let us take the net input at a memory unit *i* at time step *g* to be *z*[*g*]^((*i*)).
    So, if we take the activation at the memory units to be sigmoid, then
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们将时间步 *g* 的记忆单元 *i* 的净输入视为 *z*[*g*]^((*i*)*)。因此，如果我们假设记忆单元的激活函数是sigmoid函数，那么
- en: '![$$ {h}_g^{(i)}=\sigma \left({z}_g^{(i)}\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbg.png)'
  id: totrans-342
  prefs: []
  type: TYPE_IMG
  zh: '![h_g^(i)=σ(z_g^(i))](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbg.png)'
- en: where *σ* is the sigmoid function.
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *σ* 是sigmoid函数。
- en: Now,
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，
- en: '![$$ \frac{\partial {h}_g^{(i)}}{\partial {h}_{g-1}^{(i)}}={\sigma}^{\hbox{''}}\left({z}_g^{(i)}\right)\frac{\partial
    {z}_g^{(i)}}{\partial {h}_{g-1}^{(i)}}\space ={\sigma}^{\hbox{''}}\left({z}_g^{(i)}\right){u}_{ii}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbh.png)'
  id: totrans-345
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \frac{\partial {h}_g^{(i)}}{\partial {h}_{g-1}^{(i)}}={\sigma}^{\hbox{''}}\left({z}_g^{(i)}\right)\frac{\partial
    {z}_g^{(i)}}{\partial {h}_{g-1}^{(i)}}\space ={\sigma}^{\hbox{''}}\left({z}_g^{(i)}\right){u}_{ii}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbh.png)'
- en: where *σ*′ (*z*[*g*]^((*i*))) denotes the gradient of *σ*(*z*[*g*]^((*i*)))
    with respect to *z*[*g*]^((*i*)).
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *σ*′ (*z*[*g*]^((*i*))) 表示 *σ*(*z*[*g*]^((*i*))) 关于 *z*[*g*]^((*i*)*) 的梯度。
- en: 'If we have a long sequence, i.e., *t* = *t* and *t*^'' = k, then the following
    quantity would have many derivatives of the sigmoid function, as shown here:'
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们有一个长序列，即 *t* = *t* 和 *t*^' = k，那么这个量将会有许多sigmoid函数的导数，如下所示：
- en: '![$$ \frac{\partial {h}_t^{(i)}}{\partial {h}_{\textrm{k}}^{(i)}}=\prod \limits_{g=\textrm{k}+1}^T\frac{\partial
    {h}_g^{(i)}}{\partial {h}_{g-1}^{(i)}}=\frac{\partial {h}_{\textrm{k}+1}^{(i)}}{\partial
    {h}_{\textrm{k}}^{(i)}}\frac{\partial {h}_{\textrm{k}+2}^{(i)}}{\partial {h}_{\textrm{k}+1}^{(i)}}\dots
    \frac{\partial {h}_t^{(i)}}{\partial {h}_{\left(t-1\right)}^{(i)}}={\sigma}^{\prime}\space
    \left({z}_{\textrm{k}+1}^{(i)}\right){u}_{ii}{\sigma}^{\prime}\left({z}_{\textrm{k}+2}^{(i)}\right){u}_{ii}..{\sigma}^{\prime}\left({z}_t^{(i)}\right){u}_{ii}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbi.png)'
  id: totrans-348
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \frac{\partial {h}_t^{(i)}}{\partial {h}_{\textrm{k}}^{(i)}}=\prod \limits_{g=\textrm{k}+1}^T\frac{\partial
    {h}_g^{(i)}}{\partial {h}_{g-1}^{(i)}}=\frac{\partial {h}_{\textrm{k}+1}^{(i)}}{\partial
    {h}_{\textrm{k}}^{(i)}}\frac{\partial {h}_{\textrm{k}+2}^{(i)}}{\partial {h}_{\textrm{k}+1}^{(i)}}\dots
    \frac{\partial {h}_t^{(i)}}{\partial {h}_{\left(t-1\right)}^{(i)}}={\sigma}^{\prime}\space
    \left({z}_{\textrm{k}+1}^{(i)}\right){u}_{ii}{\sigma}^{\prime}\left({z}_{\textrm{k}+2}^{(i)}\right){u}_{ii}..{\sigma}^{\prime}\left({z}_t^{(i)}\right){u}_{ii}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbi.png)'
- en: 'Combining the gradient expressions in product-notation form, this important
    equation can be rewritten as follows:'
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 将乘积表示法中的梯度表达式结合起来，这个重要的方程可以重写如下：
- en: '![$$ \frac{\partial {h}_t^{(i)}}{\partial {h}_{\textrm{k}}^{(i)}}={\left({u}_{ii}\right)}^{t-k}\prod
    \limits_{g=k+1}^t{\sigma}^{\hbox{''}}\left({z}_{\textrm{g}}^{(i)}\right)(1) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbj.png)'
  id: totrans-350
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \frac{\partial {h}_t^{(i)}}{\partial {h}_{\textrm{k}}^{(i)}}={\left({u}_{ii}\right)}^{t-k}\prod
    \limits_{g=k+1}^t{\sigma}^{\hbox{''}}\left({z}_{\textrm{g}}^{(i)}\right)(1) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbj.png)'
- en: Sigmoid functions have good gradients only within a small range of values and
    saturate very quickly. Also, the gradients of sigmoid activation functions are
    less than 1\. So, when the error from a long-distance step at *t* = *T* passes
    to a step at *t* = 1 there would be (*T* − 1) sigmoid activation function gradients
    the error must pass through, and the multiplicative effect of (*T* − 1) gradients
    of values less than 1 may make the gradient component ![$$ \frac{\partial {h}_T^{(i)}}{\partial
    {h}_1^{(i)}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq30.png)
    vanish exponentially fast. As discussed, ![$$ \frac{\partial {h}_T^{(i)}}{\partial
    {h}_1^{(i)}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq31.png)
    backpropagates the error at step *T* = *t* back to step *t* = 1 so that the long-distance
    correlation between the words at steps *t* = 1 and *t* = *T* is learned. However,
    because of the vanishing-gradient problem, ![$$ \frac{\partial {h}_T^{(i)}}{\partial
    {h}_1^{(i)}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq32.png)
    may not receive enough gradient and may be close to zero, and hence it will not
    be possible to learn the correlation or dependencies between the long-distance
    words in a sentence.
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: Sigmoid函数只在很小的值范围内有良好的梯度，并且很快就会饱和。此外，sigmoid激活函数的梯度小于1。因此，当来自*t* = *T*的远距离步骤的错误传递到*t* = 1的步骤时，会有(*T* − 1)个sigmoid激活函数的梯度错误必须通过，(*T* − 1)个小于1的值的梯度乘积效应可能会使梯度分量![$$
    \frac{\partial {h}_T^{(i)}}{\partial {h}_1^{(i)}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq30.png)指数级快速消失。正如讨论的那样，![$$
    \frac{\partial {h}_T^{(i)}}{\partial {h}_1^{(i)}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq31.png)将*t* = *t*的步骤的错误反向传播到*t* = 1的步骤，以便学习步骤*t* = 1和*t* = *T*之间的词语的长期相关性。然而，由于梯度消失问题，![$$
    \frac{\partial {h}_T^{(i)}}{\partial {h}_1^{(i)}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq32.png)可能不会接收到足够的梯度，并且可能接近于零，因此将无法学习句子中长距离词语之间的相关性或依赖关系。
- en: RNNs can suffer from exploding gradients too. We see in the expression for ![$$
    \frac{\partial {h}_T^{(i)}}{\partial {h}_1^{(i)}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq33.png)
    the weight *u*[*ii*] has been repeatedly multiplied (*T* − 1) times. If *u*[*ii*] > 1,
    and for simplicity we assume *u*[*ii*] = 2, then after 50 steps of backpropagation
    from the sequence step T to sequence step (*T* − 50), the gradient would magnify
    approximately 2^(50) times and hence would drive the model training into instability.
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: RNNs也可能遭受梯度爆炸的问题。我们在表达式![$$ \frac{\partial {h}_T^{(i)}}{\partial {h}_1^{(i)}}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq33.png)中看到权重*u*[*ii*]被反复乘了(*T* − 1)次。如果*u*[*ii*] > 1，为了简化，我们假设*u*[*ii*] = 2，那么在从序列步骤T到序列步骤(*T* − 50)的50步反向传播之后，梯度会放大大约2^(50)倍，从而将模型训练驱入不稳定性。
- en: Solution to Vanishing- and Exploding-Gradient Problem in RNNs
  id: totrans-353
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: RNNs中梯度消失和梯度爆炸问题的解决方案
- en: There are several methods adopted by the deep-learning community to combat the
    vanishing-gradient problem. In this section, we will discuss those methods before
    moving on to a variant of RNN called long short-term memory (LSTM) recurrent neural
    networks. LSTMs are much more robust regarding vanishing and exploding gradients.
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习社区采用了多种方法来对抗梯度消失问题。在本节中，我们将在讨论这些方法之后，转向 RNN 的一个变体，称为长短期记忆（LSTM）循环神经网络。LSTMs
    在处理梯度消失和梯度爆炸方面更加稳健。
- en: Gradient Clipping
  id: totrans-355
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 梯度裁剪
- en: 'Exploding gradients can be tackled by a simple technique called gradient clipping.
    If the magnitude of the gradient vector exceeds a specified threshold, then the
    magnitude of the gradient vector is set to the threshold while keeping the direction
    of the gradient vector intact. So, while doing backpropagation on a neural network
    at time *t*, if the gradient of the cost function *C* with respect to the weight
    vector *w* exceeds a threshold *k*, then the gradient *g* used for backpropagation
    is updated as follows:'
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 可以通过一种称为梯度裁剪的简单技术来解决梯度爆炸问题。如果梯度向量的幅度超过指定的阈值，则将梯度向量的幅度设置为阈值，同时保持梯度向量的方向不变。因此，在时间
    *t* 对神经网络进行反向传播时，如果成本函数 *C* 对权重向量 *w* 的梯度超过阈值 *k*，则用于反向传播的梯度 *g* 更新如下：
- en: '***Step 1:*** Update *g* ← ∇*C*(*w* = *w*^((*t*)))'
  id: totrans-357
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***步骤 1:*** 更新 *g* ← ∇*C*(*w* = *w*^((*t*)))'
- en: '***Step 2:*** If *g* > *k*, then update ![$$ g\leftarrow \frac{k}{g}g $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq34.png)'
  id: totrans-358
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***步骤 2:*** 如果 *g* > *k*，则更新 ![$$ g\leftarrow \frac{k}{g}g $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq34.png)'
- en: Smart Initialization of the Memory-to-Memory Weight Connection Matrix and ReLU
    Units
  id: totrans-359
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 智能初始化记忆到记忆权重连接矩阵和 ReLU 单元
- en: 'Instead of randomly initializing the weights in the weight matrix *W*[*hh*],
    initializing it as an identity matrix helps prevent the vanishing-gradient problem.
    One of the main reasons for vanishing-gradient problem is the gradient of the
    hidden unit *i* at time *t* with respect to the hidden unit *i* at time *t* ''
    where *t*^'' < < *t* is given by the following:'
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 在权重矩阵 *W*[*hh*] 中，不是随机初始化权重，而是将其初始化为单位矩阵，这有助于防止梯度消失问题。梯度消失问题的一个主要原因是时间 *t* 的隐藏单元
    *i* 对时间 *t* ' 的隐藏单元 *i* 的梯度，其中 *t*^' < < *t*，如下所示：
- en: '![$$ \frac{\partial {h}_t^{(i)}}{\partial {h}_{t\hbox{''}}^{(i)}}=\prod \limits_{g={t}^{\prime
    }+1}^t\frac{\partial {h}_g^{(i)}}{\partial {h}_{g-1}^{(i)}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbk.png)'
  id: totrans-361
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \frac{\partial {h}_t^{(i)}}{\partial {h}_{t\hbox{''}}^{(i)}}=\prod \limits_{g={t}^{\prime
    }+1}^t\frac{\partial {h}_g^{(i)}}{\partial {h}_{g-1}^{(i)}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbk.png)'
- en: 'In the case of the sigmoid activation function, each of the terms ![$$ \frac{\partial
    {h}_g^{(i)}}{\partial {h}_{g-1}^{(i)}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq35.png)
    can be expanded as follows:'
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Sigmoid 激活函数的情况下，每个项 ![$$ \frac{\partial {h}_g^{(i)}}{\partial {h}_{g-1}^{(i)}}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq35.png) 可以展开如下：
- en: '![$$ \frac{\partial {h}_g^{(i)}}{\partial {h}_{g-1}^{(i)}}={\sigma}^{\hbox{''}}\left({z}_g^{(t)}\right){u}_{ii}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbl.png)'
  id: totrans-363
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \frac{\partial {h}_g^{(i)}}{\partial {h}_{g-1}^{(i)}}={\sigma}^{\hbox{''}}\left({z}_g^{(t)}\right){u}_{ii}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEqubl.png)'
- en: where *σ*(.) denotes the sigmoid function and *z*[*g*]^((*t*)) denotes the net
    input to hidden unit *i* at step *t*. The parameter *u*[*ii*] is the weight connecting
    the *ith* hidden memory state at any sequence step *t* − 1 to the *ith* hidden
    unit memory at sequence step *t*.
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *σ*(.) 表示 Sigmoid 函数，*z*[*g*]^((*t*)) 表示在步骤 *t* 时隐藏单元 *i* 的净输入。参数 *u*[*ii*]
    是连接任何序列步骤 *t* − 1 的 *ith* 隐藏记忆状态和序列步骤 *t* 的 *ith* 隐藏单元记忆的权重。
- en: The greater the distance is between sequence steps *t*' and *t*, the more sigmoid
    derivatives the error would go through in passing from *t* to *t* '. Since the
    sigmoid activation function derivatives are always less than 1 and saturate quickly,
    the chance of the gradient going to zero in cases of long dependencies is high.
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 序列步骤 *t*' 和 *t* 之间的距离越大，错误在从 *t* 到 *t* ' 的传递过程中经历的 Sigmoid 导数就越多。由于 Sigmoid
    激活函数的导数始终小于 1 并且迅速饱和，因此在长依赖情况下梯度变为零的可能性很高。
- en: If, however, we choose ReLU units, then the sigmoid gradients would be replaced
    by ReLU gradients, which have a constant value of 1 for positive net input. This
    would reduce the vanishing-gradient problem since when the gradient is 1, the
    gradients would flow unattenuated. Also, when the weight matrix is chosen to be
    identity, then the weight connection *u*[*ii*] would be 1, and hence the quantity
    ![$$ \frac{\partial {h}_t^{(i)}}{\partial {h}_{t\hbox{'}}^{(i)}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq36.png)
    would be 1 irrespective of the distance between sequence step *t* and sequence
    step *t* '. This means that the error that would be propagated from hidden memory
    state *h*[*t*]^((*i*)) at time *t* to the hidden memory state *h*[*t* ']^((*i*))
    at any prior time step *t*' would be constant irrespective of the distance from
    step *t* to *t*'. This will enable the RNN to learn associated correlations or
    dependencies between the long-distance words in a sentence.
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如果我们选择 ReLU 单元，那么 sigmoid 梯度将被 ReLU 梯度所取代，ReLU 梯度对于正净输入具有恒定的值为 1。这将减少梯度消失问题，因为当梯度为
    1 时，梯度会无衰减地流动。此外，当选择权重矩阵为恒等矩阵时，权重连接 *u*[*ii*] 将为 1，因此量 ![$$ \frac{\partial {h}_t^{(i)}}{\partial
    {h}_{t\hbox{'}}^{(i)}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq36.png)
    将为 1，无论序列步骤 *t* 和序列步骤 *t* ' 之间的距离如何。这意味着从时间 *t* 的隐藏记忆状态 *h*[*t*]^((*i*)) 到任何先前时间步
    *t* ' 的隐藏记忆状态 *h*[*t* ']^((*i*)) 传播的错误将不受从步骤 *t* 到 *t* ' 的距离影响而保持恒定。这将使 RNN 能够学习句子中长距离单词之间的相关或依赖关系。
- en: Long Short-Term Memory (LSTM)
  id: totrans-367
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 长短期记忆 (LSTM)
- en: Long short-term memory recurrent neural networks, popularly known as LSTMs,
    are special versions of RNNs that can learn distant dependencies between words
    in a sentence. Basic RNNs are incapable of learning such correlations between
    distant words, as discussed earlier. The architecture of long short-term memory
    (LSTM) recurrent neural networks is quite a bit different than that of traditional
    RNNs. Represented in Figure [4-12](#Fig12) is a high-level representation of an
    LSTM.
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: 长短期记忆循环神经网络，通常称为 LSTM，是 RNN 的特殊版本，可以学习句子中单词之间的远程依赖关系。基本 RNN 无法学习如前所述的远程单词之间的这种相关性。长短期记忆
    (LSTM) 循环神经网络的结构与传统 RNN 的结构有很大不同。图 [4-12](#Fig12) 展示了 LSTM 的高级表示。
- en: '![](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig12_HTML.jpg)'
  id: totrans-369
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig12_HTML.jpg)'
- en: The representation of the L S T M architecture. In the image, there are three
    cross marks, sigma symbols, and tan h in the two rectangular boxes.
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: LSTM 架构的表示。在图像中，有两个矩形框中有三个交叉标记、sigma 符号和 tan h。
- en: Figure 4-12
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-12
- en: LSTM architecture
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: LSTM 架构
- en: 'The basic building blocks of an LSTM and their functions are as follows:'
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: LSTM 的基本构建块及其功能如下：
- en: 'At sequence step *t*, the input *x*[*t*] and the previous step’s hidden states
    *h*[*t* − 1] decide what information to forget from cell state *C*[*t* − 1] through
    the forget-gate layer. The forget gate looks at *x*[*t*] and *h*[*t* − 1] and
    assigns a number between 0 and 1 for each element in the cell state vector *C*[*t* − 1].
    An output of 0 means totally forget the state, while an output of 1 means keep
    the state completely. The forget-gate output is computed as follows:'
  id: totrans-374
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在序列步骤 *t*，输入 *x*[*t*] 和前一步的隐藏状态 *h*[*t* − 1] 决定了通过遗忘门层从细胞状态 *C*[*t* − 1] 中忘记哪些信息。遗忘门查看
    *x*[*t*] 和 *h*[*t* − 1]，并为细胞状态向量 *C*[*t* − 1] 中的每个元素分配一个介于 0 和 1 之间的数字。输出为 0 表示完全忘记状态，而输出为
    1 表示完全保留状态。遗忘门输出按以下方式计算：
- en: The new element in LSTMs is the introduction of the cell state *C*[*t*], which
    is regulated by three gates. The gates are composed of sigmoid functions so that
    they output values between 0 and 1.
  id: totrans-375
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LSTM 中的新元素是细胞状态 *C*[*t*] 的引入，它由三个门进行调节。这些门由 sigmoid 函数组成，因此它们输出介于 0 和 1 之间的值。
- en: '![$$ {f}_t=\sigma \left(\kern0.5em {W}_f{x}_t+{U}_f{h}_{t-1}\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbm.png)'
  id: totrans-376
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {f}_t=\sigma \left(\kern0.5em {W}_f{x}_t+{U}_f{h}_{t-1}\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbm.png)'
- en: 'Next, the input gate decides which cell units should be updated with new information.
    For this, like the forget-gate output, a value between 0 and 1 is computed for
    each cell state component through the following logic:'
  id: totrans-377
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 接下来，输入门决定哪些细胞单元应该用新信息更新。为此，就像遗忘门输出一样，通过以下逻辑为每个细胞状态组件计算一个介于 0 和 1 之间的值：
- en: '![$$ {i}_t=\sigma \left(\kern0.5em {W}_i{x}_t+{U}_i{h}_{t-1}\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbn.png)'
  id: totrans-378
  prefs: []
  type: TYPE_IMG
  zh: '![ $${i}_t=\sigma \left(\kern0.5em {W}_i{x}_t+{U}_i{h}_{t-1}\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbn.png)'
- en: 'Then, a candidate set of new values is created for the cell state using *x*[*t*]
    and *h*[*t* − 1] as input. The candidate cell state ![$$ \tilde{C}t $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq37.png)
    is computed as follows:'
  id: totrans-379
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然后，使用 *x*[*t*] 和 *h*[*t* − 1] 作为输入，为细胞状态创建一组新的候选值。候选细胞状态 ![$$ \tilde{C}t $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq37.png)
    的计算如下：
- en: '![$$ \tilde{C}t=\tanh \left({W}_c{x}_t+{U}_c{h}_{t-1}\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbo.png)'
  id: totrans-380
  prefs: []
  type: TYPE_IMG
  zh: '![ $${\tilde{C}}_t=\tanh \left({W}_c{x}_t+{U}_c{h}_{t-1}\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbo.png)'
- en: 'The new cell state *C*[*t*] is updated as follows:'
  id: totrans-381
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 新的细胞状态 *C*[*t*] 的更新如下：
- en: '![$$ {C}_t={f_t}^{\ast }{C}_{t-1}+{i_t}^{\ast}\tilde{C}t $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbp.png)'
  id: totrans-382
  prefs: []
  type: TYPE_IMG
  zh: '![ $${C}_t={f_t}^{\ast }{C}_{t-1}+{i_t}^{\ast}\tilde{C}t $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbp.png)'
- en: 'The next job is to determine which cell states to output since the cell state
    contains a lot of information. For this, *x*[*t*] and *h*[*t* − 1] are passed
    through an output gate, which outputs a value between 0 and 1 for each component
    in the cell state vector *C*[*t*]. The output of this gate is computed as follows:'
  id: totrans-383
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 下一个任务是确定要输出哪些细胞状态，因为细胞状态包含大量信息。为此，将 *x*[*t*] 和 *h*[*t* − 1] 通过一个输出门传递，该门为细胞状态向量
    *C*[*t*] 中的每个分量输出一个介于 0 和 1 之间的值。此门的输出计算如下：
- en: '![$$ {o}_t=\sigma \left(\kern0.5em {W}_o{x}_t+{U}_o{h}_{t-1}\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbq.png)'
  id: totrans-384
  prefs: []
  type: TYPE_IMG
  zh: '![ $${o}_t=\sigma \left(\kern0.5em {W}_o{x}_t+{U}_o{h}_{t-1}\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbq.png)'
- en: 'The updated hidden state *h*[*t*] is computed from the cell state *C*[*t*]
    by passing each of its elements through a *tanh* function and then doing an element-wise
    product with the output-gate values:'
  id: totrans-385
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过将细胞状态 *C*[*t*] 的每个元素通过一个 *tanh* 函数传递，然后与输出门值进行逐元素乘积，计算更新的隐藏状态 *h*[*t*]：
- en: '![$$ {h}_t={o_t}^{\ast}\tanh \left({C}_t\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbr.png)'
  id: totrans-386
  prefs: []
  type: TYPE_IMG
  zh: '![ $${h}_t={o_t}^{\ast}\tanh \left({C}_t\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbr.png)'
- en: Please note that the symbol * in the preceding equations denotes element-wise
    multiplication. This is done so that, based on the gate outputs, we can assign
    weights to each element of the vector it is operated on. Also, note that whatever
    gate output values are obtained, they are multiplied as is. The gate outputs are
    not converted to discrete values of 0 and 1\. Continuous values between 0 and
    1 through sigmoid provide smooth gradients for backpropagation.
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，前述方程中的符号 * 表示逐元素乘法。这样做是为了根据门输出，我们可以为操作向量中的每个元素分配权重。此外，请注意，无论获得什么门输出值，它们都按原样相乘。门输出不是转换为
    0 和 1 的离散值。通过 sigmoid 函数提供的 0 到 1 之间的连续值，为反向传播提供平滑的梯度。
- en: The forget gate plays a crucial role in the LSTM; when the forget-gate units
    output zero, then the recurrent gradients become zero and the corresponding old
    cell state units are discarded. This way, the LSTM throws away information that
    it thinks is not going to be useful in the future. Also, when the forget-gate
    units output 1, the error flows through the cell units unattenuated, and the model
    can learn long-distance correlations between temporally distant words. We will
    discuss more about this in the next section.
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 忘记门在 LSTM 中起着至关重要的作用；当忘记门单元输出为零时，则循环梯度变为零，相应的旧细胞状态单元被丢弃。这样，LSTM 丢弃了它认为在将来不会有用的信息。此外，当忘记门单元输出
    1 时，错误无衰减地流经细胞单元，模型可以学习时间上相距较远的词之间的长距离相关性。我们将在下一节中进一步讨论这一点。
- en: Another important feature of the LSTM is the introduction of the output gates.
    The output-gate unit ensures that not all information the cell state *C*[*t*]
    units have is exposed to the rest of the network, and hence only the relevant
    information is revealed in the form of *h*[*t*]. This ensures that the rest of
    the network is not impacted by the unnecessary data while that data in the cell
    state is still held back in the cell state to help drive future decisions.
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: LSTM 的另一个重要特性是引入了输出门。输出门单元确保细胞状态 *C*[*t*] 单元所拥有的所有信息不会暴露给网络的其他部分，因此只有以 *h*[*t*]
    的形式揭示相关信息。这确保了网络的其他部分不会受到不必要数据的影响，而该数据在细胞状态中仍然被保留在细胞状态中，以帮助驱动未来的决策。
- en: LSTM in Reducing Exploding- and Vanishing-Gradient Problems
  id: totrans-390
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: LSTM 在减少梯度爆炸和消失问题中的应用
- en: 'LSTMs don’t suffer much from vanishing- or exploding-gradient problems. The
    main reason for this is the introduction of the forget gate *f*[*t*] and the way
    the current cell state is dependent on it through the following equation:'
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: LSTM不会受到梯度消失或梯度爆炸问题的影响很大。主要原因是在以下方程中引入了遗忘门*f*[*t*]以及当前细胞状态依赖于它的方式：
- en: '![$$ {C}_t={f_t}^{\ast }{C}_{t-1}+{i_t}^{\ast}\tilde{C}t $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbs.png)'
  id: totrans-392
  prefs: []
  type: TYPE_IMG
  zh: '![偏导数公式](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbs.png)'
- en: 'This equation can be broken down on a cell state unit level that has a general
    index *i* as follows:'
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 这个方程可以在具有一般索引*i*的细胞状态单元级别上分解如下：
- en: '![$$ {C_t}^{(i)}={f_t}^{(i)}{C_{t-1}}^{(i)}+{i_t}^{(i)}\tilde{C}{t}^{(i)} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbt.png)'
  id: totrans-394
  prefs: []
  type: TYPE_IMG
  zh: '![偏导数公式](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbt.png)'
- en: It is important to note here that *C*[*t*]^((*i*)) is linearly dependent on
    *C*[*t* − 1]^((*i*)), and hence the activation function is the identity function
    with a gradient of 1.
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 这里需要注意的是，*C*[*t*]^((*i*))与*C*[*t* − 1]^((*i*))是线性相关的，因此激活函数是恒等函数，梯度为1。
- en: 'The notorious component in recurrent neural network backpropagation that may
    lead to vanishing or exploding gradients is the component ![$$ \frac{\partial
    {h}_t^{(i)}}{\partial {h}_{\textrm{k}}^{(i)}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq38.png)
    when (*t* − *k*) is large. This component backpropagates the error at sequence
    step *t* to sequence step *k* so that the model learns long-distance dependencies
    or correlations. The expression for ![$$ \frac{\partial {h}_t^{(i)}}{\partial
    {h}_{\textrm{k}}^{(i)}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq39.png),
    as we have seen in the vanishing- and exploding-gradient section, is given by
    the following:'
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 在循环神经网络反向传播中，可能导致梯度消失或梯度爆炸的著名组件是当(*t* − *k*)较大时的![偏导数公式](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq38.png)组件。这个组件将序列步骤*t*的错误反向传播到序列步骤*k*，从而使模型学习长距离依赖或相关性。![偏导数公式](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq39.png)的表达式，正如我们在梯度消失和梯度爆炸部分所看到的，如下所示：
- en: '![$$ \frac{\partial {h}_t^{(i)}}{\partial {h}_{\textrm{k}}^{(i)}}={\left({u}_{ii}\right)}^{t-k}\prod
    \limits_{g=k+1}^t{\sigma}^{\hbox{''}}\left({z}_{\textrm{g}}^{(i)}\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbu.png)'
  id: totrans-397
  prefs: []
  type: TYPE_IMG
  zh: '![偏导数公式](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbu.png)'
- en: A vanishing-gradient condition will arise when the gradients and/or weights
    are less than 1 since the product of (*t* − *k*) in them would force the overall
    product to near zero. Since sigmoid gradients and tanh gradients are most of the
    time less than 1 and saturate fast where they have near-zero gradients, this problem
    of vanishing gradients would be more severe with those. Similarly, exploding gradients
    can happen when the weight connection *u*[*ii*] between the *ith* hidden to the
    *ith* hidden unit is greater than 1 since the product of (*t* − *k*) in them would
    make the term (*u*[*ii*])^(*t* − *k*) exponentially large.
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: 当梯度或权重小于1时，会出现梯度消失的条件，因为它们中的(*t* − *k*)的乘积会迫使整体乘积接近零。由于sigmoid梯度和tanh梯度大多数时间都小于1，并且它们在接近零的梯度处快速饱和，因此这个问题在sigmoid梯度和tanh梯度中会更加严重。同样，当第*i*个隐藏层到第*i*个隐藏层单元之间的权重连接*u*[*ii*]大于1时，也会发生梯度爆炸，因为它们中的(*t* − *k*)的乘积会使(*u*[*ii*])^(*t* − *k*)的项呈指数级增大。
- en: 'The equivalent of ![$$ \frac{\partial {h}_t^{(i)}}{\partial {h}_{\textrm{k}}^{(i)}}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq40.png) in LSTM
    is the component ![$$ \frac{\partial {C}_t^{(i)}}{\partial {C}_{\textrm{k}}^{(i)}}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq41.png), which
    can also be expressed in the product format as follows:'
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: LSTM中![偏导数公式](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq40.png)的等价部分是![偏导数公式](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq41.png)，它也可以以下面的乘积格式表示：
- en: '![$$ \frac{\partial {C}_t^{(i)}}{\partial {C}_{\textrm{k}}^{(i)}}=\prod \limits_{g={t}^{\prime
    }+1}^t\frac{\partial {C}_g^{(i)}}{\partial {C}_{g-1}^{(i)}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ20.png)'
  id: totrans-400
  prefs: []
  type: TYPE_IMG
  zh: '![偏导数公式](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ20.png)'
- en: (4.3.1)
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: (4.3.1)
- en: 'On taking the partial derivative on both sides of the cell state update equation
    ![$$ {C_t}^{(i)}={f_t}^{(i)}{C_{t-1}}^{(i)}+{i_t}^{(i)}\tilde{C}{t}^{(i)} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq42.png),
    one gets the important expression as follows:'
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: 在对细胞状态更新方程的两侧进行偏导数运算 ![公式](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq42.png)，可以得到以下重要表达式：
- en: '![$$ \frac{\partial {C}_t^{(i)}}{\partial {C}_{t-1}^{(i)}}={f_t}^{(i)} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ21.png)'
  id: totrans-403
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ21.png)'
- en: (4.3.2)
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: (4.3.2)
- en: 'Combining (1) and (2), one gets the following:'
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 结合 (1) 和 (2)，可以得到以下结果：
- en: '![$$ \frac{\partial {C}_t^{(i)}}{\partial {C}_{\textrm{k}}^{(i)}}={\left({f_t}^{(i)}\right)}^{t-k}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ22.png)'
  id: totrans-406
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ22.png)'
- en: (4.3.3)
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: (4.3.3)
- en: Equation ([4.3.3](#Equ22)) says that if the forget-gate value is held near 1,
    LSTM will not suffer from vanishing- or exploding-gradient problems.
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 方程 ([4.3.3](#Equ22)) 表明，如果遗忘门值接近 1，LSTM 不会受到梯度消失或爆炸问题的影响。
- en: MNIST Digit Identification in TensorFlow Using Recurrent Neural Networks
  id: totrans-409
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在 TensorFlow 中使用循环神经网络进行 MNIST 数字识别
- en: We see an implementation of RNN in classifying the images in the MNIST dataset
    through LSTM. The images of MNIST dataset are 28 × 28 in dimension. Each image
    would be treated as having 28 sequence steps, and each sequence step would consist
    of a row in an image. There would not be outputs after each sequence step but
    rather only one output at the end of the 28 steps for each image. The output is
    one of the ten classes corresponding to the ten digits from 0 to 9\. So, the output
    layer would be a SoftMax of ten classes. The hidden cell state of the final sequence
    step *h*[28] would be fed through weights into the output layer. So, only the
    final sequence step would contribute to the cost function; there would be no cost
    function associated with the intermediate sequence steps. If you remember, backpropagation
    was with respect to the cost function *C*[*t*] in each individual sequence step
    *t* when there was output involved at each sequence step, and finally the gradients
    with respect to each of those cost functions were summed together. Here, everything
    else remains the same, and backpropagation would be done only with respect to
    the cost at sequence step 28, *C*[28]. Also, as stated earlier, each row of an
    image would form data at a sequence step *t* and hence would be the input vector
    *x*[*t*]. Finally, we would be processing images in a mini-batch, and thus for
    each image in the batch, a similar processing procedure would be followed, minimizing
    the average cost over the batch. One more important thing to note is that TensorFlow
    demands that there be separate tensors for each step within the mini-batch input
    tensor. The input tensor structure has been depicted in Figure [4-13](#Fig13)
    for ease of understanding.
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 我们看到了在 MNIST 数据集中通过 LSTM 对图像进行分类的 RNN 的实现。MNIST 数据集的图像尺寸为 28×28。每个图像会被视为有 28
    个序列步骤，每个序列步骤由图像中的一行组成。在每个序列步骤后不会有输出，而是在每个图像的 28 个步骤结束时只有一个输出。输出是 0 到 9 这十个数字对应的十个类别之一。因此，输出层将是一个包含十个类别的
    SoftMax。最终序列步骤的隐藏细胞状态 *h*[28] 将通过权重输入到输出层。因此，只有最终的序列步骤会对成本函数做出贡献；中间序列步骤不会有与成本函数相关的成本。如果你记得，当每个序列步骤都有输出时，反向传播是针对每个序列步骤的成本函数
    *C*[*t*] 进行的，并且最终将所有这些成本函数的梯度相加。这里，其他一切都保持不变，反向传播将仅针对序列步骤 28 的成本 *C*[28] 进行。此外，如前所述，图像的每一行将形成序列步骤
    *t* 的数据，因此将是输入向量 *x*[*t*]。最后，我们将以小批量处理图像，因此对于批量中的每个图像，将遵循类似的处理过程，最小化批量的平均成本。还有一个重要的事情需要注意，TensorFlow
    要求在迷你批量输入张量中为每个步骤有单独的张量。为了便于理解，输入张量结构已在图 [4-13](#Fig13) 中表示。
- en: '![](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig13_HTML.jpg)'
  id: totrans-411
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig13_HTML.jpg)'
- en: The illustration of the input tensor shape. Image 1 row 1, image 2 row 2, and
    image 2 row 28 are the labels of the three rows in the image.
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 输入张量形状的示意图。图像 1 行 1，图像 2 行 2，以及图像 2 行 28 是图像中三行的标签。
- en: Figure 4-13
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-13
- en: Input tensor shape for RNN LSTM network in TensorFlow
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow 中 RNN LSTM 网络的输入张量形状
- en: Now that we have some clarity about the problem and approach, we will proceed
    with the implementation in TensorFlow. The detailed code for training the model
    and validating it on the test dataset is illustrated in Listing [4-3](#PC9).
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 既然我们对问题和方法有了清晰的认识，我们将在TensorFlow中进行实现。训练模型并在测试数据集上验证的详细代码在列表[4-3](#PC9)中展示。
- en: '[PRE8]'
  id: totrans-416
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: As we can see from the Listing [4-3](#PC9) output, just by running two epochs,
    an accuracy of 95% is achieved on the test dataset.
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: 从列表[4-3](#PC9)的输出中我们可以看到，仅运行两个epoch，在测试数据集上就达到了95%的准确率。
- en: Next-Word Prediction and Sentence Completion in TensorFlow Using Recurrent Neural
    Networks
  id: totrans-418
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 使用循环神经网络在TensorFlow中进行下一个单词预测和句子补全
- en: We train a model on a small passage from *Alice in Wonderland* to predict the
    next word from the given vocabulary using LSTM. Sequences of three words have
    been taken as input, and the subsequent word has been taken as output for this
    problem. Also, a two-layered LSTM model has been chosen instead of one. The sets
    of inputs and outputs are chosen randomly from the corpus and fed as a mini-batch
    of size 1\. We see the model achieves good accuracy and can learn the passage
    well. Later, once the model is trained, we input a three-word sentence and let
    the model predict the next 28 words. Each time it predicts a new word, it appends
    it to the updated sentence. For predicting the next word, the previous three words
    from the updated sentence are taken as input. The detailed implementation of the
    problem has been outlined in Listing [4-4](#PC10).
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用LSTM在《爱丽丝梦游仙境》的一小段中训练模型，以预测给定词汇表中的下一个单词。我们将三个单词序列作为输入，并将后续单词作为此问题的输出。此外，我们选择了一个双层LSTM模型而不是单层。输入和输出集从语料库中随机选择，并以大小为1的迷你批次形式提供。我们看到模型达到了良好的精度，并且能够很好地学习段落。后来，一旦模型训练完成，我们输入一个三词句子，让模型预测接下来的28个单词。每次它预测一个新单词时，它都会将其附加到更新的句子中。对于预测下一个单词，我们以更新句子中的前三个单词作为输入。问题的详细实现已在列表[4-4](#PC10)中概述。
- en: '[PRE9]'
  id: totrans-420
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: We can see from the output of Listing [4-4](#PC10) that the model is able to
    predict the actual words while training quite nicely. In the sentence-completion
    task, although the prediction did not start off well with the first two predictions,
    it did an excellent job for the rest of the 28 characters. The generated sentence
    is exceptionally rich in grammar and punctuation. The model accuracy can be increased
    by increasing the sequence length and by introducing predictions after every word
    in the sequence. Also, the training corpus was small. Word-prediction and sentence-completion
    quality will be further enhanced if the model is trained on a larger corpus of
    data. Listing [4-5](#PC11) shows the passage from *Alice in Wonderland* that was
    used to train the model.
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: 从列表[4-4](#PC10)的输出中我们可以看到，模型在训练过程中能够很好地预测实际单词。在句子补全任务中，尽管前两个预测没有很好地开始，但在接下来的28个字符中它做得非常出色。生成的句子在语法和标点符号方面非常丰富。通过增加序列长度并在序列中的每个单词之后引入预测，可以提高模型精度。此外，训练语料库很小。如果模型在更大的数据语料库上训练，单词预测和句子补全质量将进一步提高。列表[4-5](#PC11)展示了用于训练模型的《爱丽丝梦游仙境》中的段落。
- en: '[PRE10]'
  id: totrans-422
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Gated Recurrent Unit (GRU)
  id: totrans-423
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 门控循环单元（GRU）
- en: Much like LSTM, the gated recurrent units, popularly known as GRU, have gating
    units that control the flow of information inside. However, unlike LSTM, they
    don’t have separate memory cells. The hidden memory state *h*[*t*] at any time
    step *t* is a linear interpolation between previous hidden memory states *h*[*t* − 1]
    and candidate new hidden state ![$$ {\tilde{h}}_t $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq43.png).
    The architectural diagram of a GRU is presented in Figure [4-14](#Fig14).
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 与LSTM类似，门控循环单元，通常称为GRU，具有控制信息流动的门控单元。然而，与LSTM不同，它们没有单独的记忆单元。任何时间步t的隐藏记忆状态*h*[*t*]是先前隐藏记忆状态*h*[*t* − 1]和候选新隐藏状态![$$
    {\tilde{h}}_t $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq43.png)之间的线性插值。GRU的架构图在图[4-14](#Fig14)中展示。
- en: '![](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig14_HTML.jpg)'
  id: totrans-425
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig14_HTML.jpg)'
- en: The architecture of G R U. It has 5 nodes in it. The lines are represented by
    different subscript values of h, x, r, and Z.
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: G R U的架构。它内部有5个节点。线用h、x、r和Z的不同下标值表示。
- en: Figure 4-14
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-14
- en: GRU architecture
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: GRU架构
- en: 'The following are the high-level details as to how the GRU works:'
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是如何GRU工作的详细高级细节：
- en: 'Based on the hidden memory state *h*[*t* − 1] and current input *x*[*t*], the
    reset gate *r*[*t*] and the update gate *z*[*t*] are computed as follows:'
  id: totrans-430
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于隐藏记忆状态 *h*[*t* − 1] 和当前输入 *x*[*t*]，重置门 *r*[*t*] 和更新门 *z*[*t*] 的计算如下：
- en: '![$$ {r}_t=\sigma \left({W}_r{h}_{t-1}+{U}_r{x}_t\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbv.png)'
  id: totrans-431
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {r}_t=\sigma \left({W}_r{h}_{t-1}+{U}_r{x}_t\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbv.png)'
- en: '![$$ {z}_t=\sigma \left({W}_z{h}_{t-1}+{U}_z{x}_t\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbw.png)'
  id: totrans-432
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {z}_t=\sigma \left({W}_z{h}_{t-1}+{U}_z{x}_t\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbw.png)'
- en: 'The candidate new hidden state![$$ {\tilde{h}}_t $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq44.png)
    is computed as follows:'
  id: totrans-433
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 候选新隐藏状态![$$ {\tilde{h}}_t $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq44.png)
    的计算如下：
- en: The reset gate determines how important *h*[*t* − 1] is in determining the candidate
    new hidden state. The update gate determines how much the new candidate state
    should influence the new hidden state.
  id: totrans-434
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重置门决定了在确定候选新隐藏状态时，*h*[*t* − 1] 的重要性。更新门决定了新候选状态应该对新的隐藏状态产生多大的影响。
- en: '![$$ {\tilde{h}}_t=\tanh \left({r_t}^{\ast }{Uh}_{t-1}+{Wx}_t\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ23.png)'
  id: totrans-435
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\tilde{h}}_t=\tanh \left({r_t}^{\ast }{Uh}_{t-1}+{Wx}_t\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ23.png)'
- en: (4.4.1)
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: (4.4.1)
- en: 'Based on the candidate state and the previous hidden state, the new hidden
    memory state is updated as follows:'
  id: totrans-437
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于候选状态和前一个隐藏状态，新的隐藏记忆状态更新如下：
- en: '![$$ {h}_t={\left(1-{z}_t\right)}^{\ast }{h}_{t-1}+{z_t}^{\ast }{\tilde{h}}_t
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ24.png)'
  id: totrans-438
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {h}_t={\left(1-{z}_t\right)}^{\ast }{h}_{t-1}+{z_t}^{\ast }{\tilde{h}}_t
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ24.png)'
- en: (4.4.2)
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
  zh: (4.4.2)
- en: 'The key point to stress in a GRU is the role of the gating functions, as discussed
    here:'
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: 在GRU中需要强调的关键点是门控函数的作用，如以下所述：
- en: When the reset gate output units from *r*[*t*] are close to zero, the previous
    hidden states for those units are ignored in the computation of the candidate
    new hidden state, as is evident from the equations in ([4.4.1](#Equ23)). This
    allows the model to drop information that would not be useful in the future.
  id: totrans-441
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当重置门输出单元 *r*[*t*] 接近零时，这些单元的前一个隐藏状态在计算候选新隐藏状态时被忽略，正如([4.4.1](#Equ23))中的方程所示。这允许模型丢弃未来可能无用的信息。
- en: 'When the update-gate output units from *z*[*t*] are close to zero, then the
    previous step states for those units are copied over to the current step. As we
    have seen before, the notorious component in recurrent neural network backpropagation
    that may lead to vanishing or exploding gradients is the component ![$$ \frac{\partial
    {h}_t^{(i)}}{\partial {h}_{\textrm{k}}^{(i)}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq45.png),
    which backpropagates the error at sequence step *t* to sequence step *k* so that
    the model learns long-distance dependencies or correlations. The expression for
    ![$$ \frac{\partial {h}_t^{(i)}}{\partial {h}_{\textrm{k}}^{(i)}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq46.png),
    as we saw in the vanishing- and exploding-gradient section, is given by the following:'
  id: totrans-442
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当更新门输出单元 *z*[*t*] 接近零时，则将这些单元的前一步状态复制到当前步骤。正如我们之前所看到的，循环神经网络反向传播中可能导致梯度消失或爆炸的著名组件是
    ![$$ \frac{\partial {h}_t^{(i)}}{\partial {h}_{\textrm{k}}^{(i)}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq45.png)，它将序列步骤
    *t* 的错误反向传播到序列步骤 *k*，从而使模型学习到长距离依赖或相关性。![$$ \frac{\partial {h}_t^{(i)}}{\partial
    {h}_{\textrm{k}}^{(i)}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq46.png)
    的表达式，正如我们在消失和爆炸梯度部分所看到的，如下所示：
- en: '![$$ \frac{\partial {h}_t^{(i)}}{\partial {h}_{\textrm{k}}^{(i)}}={\left({u}_{ii}\right)}^{t-k}\prod
    \limits_{g=k+!}^t{\sigma}^{\hbox{''}}\left({z}_{\textrm{g}}^{(i)}\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbx.png)'
  id: totrans-443
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \frac{\partial {h}_t^{(i)}}{\partial {h}_{\textrm{k}}^{(i)}}={\left({u}_{ii}\right)}^{t-k}\prod
    \limits_{g=k+!}^t{\sigma}^{\hbox{''}}\left({z}_{\textrm{g}}^{(i)}\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbx.png)'
- en: Now, coming back to the GRU, when the update-gate output units in *z*[*t*] are
    close to 0, then from Equation ([4.4.2](#Equ24)),
  id: totrans-444
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 现在，回到GRU，当更新门输出单元 *z*[*t*] 接近0时，根据方程([4.4.2](#Equ24))，
- en: When (*t* − *k*) is large, a vanishing-gradient condition will arise when the
    gradients of the activations in the hidden state units and/or the weights are
    less than 1 since the product of (*t* − *k*) in them would force the overall product
    to near zero. Sigmoid and tanh gradients are often less than 1 and saturate fast
    where they have near-zero gradients, thus making the problem of vanishing gradient
    more severe. Similarly, exploding gradients can happen when the weight connection
    *u*[*ii*] between the *ith* hidden to the *ith* hidden unit is greater than 1
    since the product of (*t* − *k*) in them would make the term (*u*[*ii*])^(*t* − *k*)
    exponentially large for large values of (*t* − *k*).
  id: totrans-445
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当 (*t* − *k*) 很大时，由于隐藏状态激活的梯度或权重小于 1，因此梯度消失条件会出现，因为它们中的 (*t* − *k*) 的乘积会迫使整体乘积接近零。Sigmoid
    和 tanh 梯度通常小于 1，并且当它们有接近零的梯度时迅速饱和，这使得梯度消失问题更加严重。同样，当权重连接 *u*[*ii*] 之间的 *ith* 隐藏单元到
    *ith* 隐藏单元大于 1 时，也会发生梯度爆炸，因为它们中的 (*t* − *k*) 的乘积会使 (*u*[*ii*])^(*t* − *k*) 对于大的
    (*t* − *k*) 值呈指数级增大。
- en: '![$$ {h_t}^{(i)}\approx {h_{t-1}}^{(i)}\kern1em \forall i\in K $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ25.png)'
  id: totrans-446
  prefs: []
  type: TYPE_IMG
  zh: '![近似关系](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equ25.png)'
- en: (4.4.3)
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: (4.4.3)
- en: where *K* is the set of all hidden units for which *z*[*t*]^((*i*)) ≈ 0.
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *K* 是所有满足 *z*[*t*]^((*i*)) ≈ 0 的隐藏单元的集合。
- en: 'On taking the partial derivative of *h*[*t*]^((*i*)) with respect to *h*[*t* − 1]^((*i*))
    in ([4.4.3](#Equ25)), we get the following:'
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: 在对 ([4.4.3](#Equ25)) 中的 *h*[*t*]^((*i*)) 对 *h*[*t* − 1]^((*i*)) 求偏导时，我们得到以下结果：
- en: '![$$ \frac{\partial {h_t}^{(i)}}{\partial {h_{t-1}}^{(i)}}\approx 1 $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equby.png)'
  id: totrans-450
  prefs: []
  type: TYPE_IMG
  zh: '![导数关系](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equby.png)'
- en: 'This will ensure that the notorious term ![$$ \frac{\partial {h}_t^{(i)}\kern0.5em
    }{\partial {h}_{\textrm{k}}^{(i)}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq47.png)
    is also close to 1 since it can be expressed as follows:'
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
  zh: 这将确保臭名昭著的项 ![$$ \frac{\partial {h}_t^{(i)}\kern0.5em }{\partial {h}_{\textrm{k}}^{(i)}}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq47.png) 也接近 1，因为它可以表示如下：
- en: '![$$ \frac{\partial {h}_t^{(i)}}{\partial {h}_{\textrm{k}}^{(i)}}=\prod \limits_{g={t}^{\prime
    }+1}^t\frac{\partial {h}_g^{(i)}}{\partial {h}_{g-1}^{(i)}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbz.png)'
  id: totrans-452
  prefs: []
  type: TYPE_IMG
  zh: '![导数关系](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equbz.png)'
- en: '![$$ =\textrm{1.1.1}\dots .1\kern0.5em \left(t-k\right) times=1 $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equca.png)'
  id: totrans-453
  prefs: []
  type: TYPE_IMG
  zh: '![等式关系](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equca.png)'
- en: This allows the hidden states to be copied over many sequence steps without
    alteration, and hence the chances of a vanishing gradient diminish, and the model
    is able to learn temporally long-distance association or correlation between words.
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得隐藏状态可以在多个序列步骤中复制而不改变，因此消失梯度的可能性减少，模型能够学习到词语之间的时间长距离关联或相关性。
- en: Bidirectional RNN
  id: totrans-455
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 双向 RNN
- en: In a standard recurrent neural network, we make predictions that take the past
    sequence states into account. For example, for predicting the next word in a sequence,
    we take the words that appear before it into consideration. However, for certain
    tasks in natural language processing, such as parts of speech, tagging both past
    words and future words with respect to a given word is crucial in determining
    the given word’s part of speech tag. Also, for parts of speech–tagging applications,
    the whole sentence would be available for tagging, and hence for each given word—barring
    the ones at the start and end of a sentence—its past and future words would be
    present to make use of.
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: 在标准的循环神经网络中，我们做出考虑过去序列状态的预测。例如，在预测序列中的下一个单词时，我们会考虑它之前出现的单词。然而，对于自然语言处理中的某些任务，如词性标注，相对于给定的单词，对过去和未来的单词进行标注对于确定给定单词的词性标签至关重要。此外，对于词性标注应用，整个句子都可用于标注，因此对于每个给定的单词——除了句子的开始和结束处的单词——其过去和未来的单词都存在，以便利用。
- en: Bidirectional RNNs are a special type of RNN that makes use of both the past
    and future states to predict the output label at the current state. A bidirectional
    RNN combines two RNNs, one of which runs forward from left to right and the other
    of which runs backward from right to left. A high-level architecture diagram of
    a bidirectional RNN is depicted in Figure [4-15](#Fig15).
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
  zh: 双向 RNN 是一种特殊的 RNN，它利用过去和未来的状态来预测当前状态下的输出标签。双向 RNN 结合了两个 RNN，其中一个从左到右向前运行，另一个从右到左向后运行。双向
    RNN 的高级架构图如图 [4-15](#Fig15) 所示。
- en: '![](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig15_HTML.jpg)'
  id: totrans-458
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig15_HTML.jpg)'
- en: The image is Bidirectional R N N architectural. The nodes are represented by
    various x and y subscript values.
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: 该图像展示了双向 RNN 架构。节点由各种 x 和 y 下标值表示。
- en: Figure 4-15
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-15
- en: Bidirectional RNN architectural diagram
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
  zh: 双向 RNN 架构图
- en: For a bidirectional RNN, there are two hidden memory states for any sequence
    step *t*. The hidden memory states corresponding to the forward flow of information,
    as in standard RNN, can be represented as ![$$ \overrightarrow{h_t} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq48.png),
    and the ones corresponding to the backward flow of information can be denoted
    by ![$$ \overleftarrow{h_t} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq49.png).
    The output at any sequence step *t* depends on both the memory states ![$$ \overrightarrow{h_t}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq50.png) and ![$$
    \overleftarrow{h_t} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq51.png).
    The following are the governing equations for a bidirectional RNN.
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: 对于双向 RNN，任何序列步骤 *t* 都有两个隐藏记忆状态。对应于信息正向流动的隐藏记忆状态，如标准 RNN，可以表示为 ![向量](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq48.png)，而对应于信息反向流动的可以表示为
    ![向量](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq49.png)。任何序列步骤
    *t* 的输出都依赖于记忆状态 ![向量](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq50.png)
    和 ![向量](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq51.png)。以下为双向
    RNN 的控制方程。
- en: '![$$ \overrightarrow{h_t}=f\left(\overrightarrow{W_{xh}}{\textrm{x}}_t+\overrightarrow{W_{hh}}\overrightarrow{h_{t-1}}+\overrightarrow{b}\right)
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equcb.png)'
  id: totrans-463
  prefs: []
  type: TYPE_IMG
  zh: '![向量](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equcb.png)'
- en: '![$$ \overleftarrow{h_t}=f\left(\overleftarrow{W_{xh}}{\textrm{x}}_t+\overleftarrow{W_{hh}}\overleftarrow{h_{t-1}}+\overleftarrow{b}\right)
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equcc.png)'
  id: totrans-464
  prefs: []
  type: TYPE_IMG
  zh: '![向量](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equcc.png)'
- en: '![$$ {y}_t=g\left(U\left[\overrightarrow{h_t};\overleftarrow{h_t}\right]+c\right)
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equcd.png)'
  id: totrans-465
  prefs: []
  type: TYPE_IMG
  zh: '![向量](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equcd.png)'
- en: The expression ![$$ \left[\overrightarrow{h_t};\overleftarrow{h_t}\right] $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq52.png)
    represents the combined memory state vector at time *t*. It can be obtained by
    concatenating the elements of the two vectors ![$$ \overrightarrow{h_t} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq53.png)
    and ![$$ \overleftarrow{h_t} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq54.png).
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: 表达式 ![向量](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq52.png)
    代表时间 *t* 时的组合记忆状态向量。它可以通过连接两个向量 ![向量](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq53.png)
    和 ![向量](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq54.png) 的元素来获得。
- en: '![$$ \overrightarrow{W_{hh}\kern0.5em } $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq55.png)
    and ![$$ \overrightarrow{W_{hh}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq56.png)
    are the hidden state connection weights for the forward pass and the backward
    pass, respectively. Similarly, ![$$ \overrightarrow{W_{xh}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq57.png)
    and ![$$ \overleftarrow{W_{xh}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq58.png)
    are the inputs to the hidden state weights for the forward and backward passes.
    The biases at the hidden memory state activations for forward and backward passes
    are given by ![$$ \overrightarrow{b} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq59.png)
    and ![$$ \overleftarrow{b\kern0.5em } $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq60.png),
    respectively. The term *U* represents the weight matrix from the combined hidden
    state to the output state, while *c* represents the bias at the output.'
  id: totrans-467
  prefs: []
  type: TYPE_NORMAL
  zh: '![向量 $ \overrightarrow{W_{hh}\kern0.5em } $](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq55.png)
    和 ![向量 $ \overrightarrow{W_{hh}} $](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq56.png)
    分别是正向传递和反向传递的隐藏状态连接权重。同样，![向量 $ \overrightarrow{W_{xh}} $](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq57.png)
    和 ![向量 $ \overleftarrow{W_{xh}} $](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq58.png)
    分别是正向和反向传递的隐藏状态权重输入。正向和反向传递的隐藏记忆状态激活偏差分别由 ![向量 $ \overrightarrow{b} $](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq59.png)
    和 ![向量 $ \overleftarrow{b\kern0.5em } $](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq60.png)
    给出。术语 *U* 表示从组合隐藏状态到输出状态的权重矩阵，而 *c* 表示输出偏差。'
- en: The function *f* is generally the nonlinear activation function chosen at the
    hidden memory states. Chosen activation functions for *f* are generally sigmoid
    and tanh. However, ReLU activations are also being used now because they reduce
    the vanishing- and exploding-gradient problems. The function *g* would depend
    on the classification problem at hand. In cases of multiple classes, a SoftMax
    would be used, whereas for a two-class problem, either a sigmoid or a two-class
    SoftMax could be used.
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: 函数 *f* 通常是在隐藏记忆状态中选择的非线性激活函数。为 *f* 选择的激活函数通常是 sigmoid 和 tanh。然而，现在也正在使用 ReLU
    激活函数，因为它们可以减少梯度消失和爆炸问题。函数 *g* 将取决于手头的分类问题。在多类情况下，将使用 SoftMax，而对于双类问题，可以使用 sigmoid
    或双类 SoftMax。
- en: Neural Machine Translation
  id: totrans-469
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 神经机器翻译
- en: In this section, we will work on building a neural machine translation model
    that translates source language to target language. We will be using a sequence-to-sequence
    architecture with LSTMs as the encoder and the decoder of the neural machine translation
    model. Unlike rule-based machine translation models, the neural machine translation
    model can be trained end to end.
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将致力于构建一个将源语言翻译成目标语言的神经机器翻译模型。我们将使用序列到序列架构，其中 LSTM 作为神经机器翻译模型的编码器和解码器。与基于规则的机器翻译模型不同，神经机器翻译模型可以端到端地进行训练。
- en: Architecture of the Neural Machine Translation Model Using Seq2Seq
  id: totrans-471
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用 Seq2Seq 架构的神经机器翻译模型架构
- en: Illustrated in Figure [4-16](#Fig16) is the high-level architecture of a neural
    machine translation model.
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [4-16](#Fig16) 展示了神经机器翻译模型的高级架构。
- en: The encoder is an LSTM which processes the source language words sequentially
    and at the end of the sentence or paragraph comes up with the final hidden state
    ![$$ {h}_f^{(e)} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq61.png)
    and final cell state ![$$ {c}_f^{(e)} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq62.png)
    vector encodings. These final hidden and cell state vectors are expected to capture
    the entire summary of the source language sequence.
  id: totrans-473
  prefs: []
  type: TYPE_NORMAL
  zh: 编码器是一个 LSTM，它按顺序处理源语言单词，并在句子或段落的末尾得出最终的隐藏状态 ![向量 $ {h}_f^{(e)} $](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq61.png)
    和最终的细胞状态 ![向量 $ {c}_f^{(e)} $](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq62.png)
    向量编码。这些最终的隐藏和细胞状态向量预计将捕捉整个源语言序列的总结。
- en: The decoder in the next step takes the hidden ![$$ {h}_f^{(e)} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq63.png)
    and cell state ![$$ {c}_f^{(e)} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq64.png)
    encodings as the context. This is done by setting the initial hidden ![$$ {h}_0^{(d)}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq65.png) and cell
    state of the decoder ![$$ {c}_{(0)}^{(d)} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq66.png)
    with the final hidden and cell states of the encoder.
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一步中，解码器将隐藏状态 ![$$ {h}_f^{(e)} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq63.png)
    和细胞状态 ![$$ {c}_f^{(e)} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq64.png)
    的编码作为上下文。这是通过将解码器的初始隐藏状态 ![$$ {h}_0^{(d)} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq65.png)
    和细胞状态 ![$$ {c}_{(0)}^{(d)} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq66.png)
    设置为编码器的最终隐藏状态和细胞状态来实现的。
- en: The initial input to the decoder is the start of sequence token <START>. So,
    using the encoder context and the start of sequence token as input, the decoder
    LSTM predicts its first word. The predicted word is sent as input to the next
    step for the prediction of the second word, and the process continues until end
    of sequence word token is predicted.
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
  zh: 解码器的初始输入是序列的开始标记 <START>。因此，使用编码器上下文和序列开始标记作为输入，解码器LSTM预测其第一个词。预测的词被发送到下一步作为预测第二个词的输入，这个过程一直持续到预测出序列结束标记词。
- en: During training, we have the actual inputs from the target language for the
    decoder, and hence we use the same for training instead of the predicted word
    from the earlier stage. The label for the target language at every instance is
    predicted through a SoftMax layer over all the words in the vocabulary of the
    target language.
  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
  zh: 在训练过程中，我们有解码器的目标语言的实际输入，因此我们使用这些输入而不是早期阶段的预测词进行训练。通过在目标语言词汇表的所有词上应用SoftMax层，预测每个实例的目标语言标签。
- en: '![](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig16_HTML.jpg)'
  id: totrans-477
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig16_HTML.jpg)'
- en: Four blocks are displayed in the illustration saying it's a wonderful day in
    the encoder and is decoded by the decoder.
  id: totrans-478
  prefs: []
  type: TYPE_NORMAL
  zh: 图中显示了四个块，表示在编码器中是一个美好的日子，并由解码器进行解码。
- en: Figure 4-16
  id: totrans-479
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-16
- en: Seq2Seq neural machine translation model
  id: totrans-480
  prefs: []
  type: TYPE_NORMAL
  zh: Seq2Seq神经机器翻译模型
- en: Please find the implementation of the Seq2Seq model in *Listing* [*4-6*](#PC12).
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
  zh: 请在 *清单* [*4-6*](#PC12) 中查找Seq2Seq模型的实现。
- en: '[PRE11]'
  id: totrans-482
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Limitation of the Seq2Seq Model for Machine Translation
  id: totrans-483
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Seq2Seq模型在机器翻译中的局限性
- en: One of the limitations of Seq2Seq model for machine translation stems from the
    fact that the entire source language sequence is encoded into final hidden state
    ![$$ {h}_f^{(e)} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq67.png)
    and final cell state ![$$ {c}_f^{(e)} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq68.png)
    of the encoder LSTM. While this works well for short input sequences of length
    up to 15 to 20, the dimension of the hidden and cell state might not be enough
    to store the entire context of longer sequences. In general context from words
    that appear earlier in the source language sequence might not be captured well
    by the encoder as the sequence gets long due to the vanishing-gradient problems
    during training.
  id: totrans-484
  prefs: []
  type: TYPE_NORMAL
  zh: Seq2Seq模型在机器翻译中的一个局限性源于整个源语言序列被编码到编码器LSTM的最终隐藏状态 ![$$ {h}_f^{(e)} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq67.png)
    和最终细胞状态 ![$$ {c}_f^{(e)} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq68.png)
    中。虽然这对于长度为15到20的短输入序列来说效果很好，但隐藏状态和细胞状态的维度可能不足以存储较长序列的整个上下文。一般来说，由于训练过程中的梯度消失问题，随着序列变长，源语言序列中较早出现的词汇的上下文可能不会被编码器很好地捕捉。
- en: This is where attention comes in handy to provide additional context to the
    decoder from the source sequence processing. In attention, the intermediate hidden
    states corresponding to each time step is not thrown away but are used as context
    for predicting the target words at every time step. Attention figures out which
    source language words are related to a target word by making a direct connection
    and hence avoids loss of context from source to target. We discuss about attention
    and its various forms in the next section.
  id: totrans-485
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是注意力机制发挥作用的地方，为解码器提供来自源序列处理的额外上下文。在注意力机制中，对应于每个时间步的中间隐藏状态不会被丢弃，而是用作预测每个时间步的目标词的上下文。注意力通过建立直接连接来确定哪些源语言词汇与目标词相关，从而避免了从源到目标上下文的丢失。我们将在下一节讨论注意力及其各种形式。
- en: Attention
  id: totrans-486
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 注意力
- en: 'Although recurrent neural networks such as LSTMs and GRUs have been the default
    choice in modeling sequential data such as in language modeling and language translation,
    they do come with their set of limitations. Some of the limitations are outlined
    in the following:'
  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管LSTM和GRU等循环神经网络在建模语言模型和语言翻译等序列数据时一直是默认选择，但它们确实存在一些局限性。以下是一些局限性的概述：
- en: Recurrent neural network units cannot take advantage of any sort of parallelism
    because of the inherent sequential nature of processing. Hence processing very
    long sequences using recurrent neural network units can become prohibitory slow.
    In the age of GPUs for parallel processing, this comes as a major setup.
  id: totrans-488
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于循环神经网络单元处理固有的顺序性，它们无法利用任何形式的并行性。因此，使用循环神经网络单元处理非常长的序列可能会变得非常慢。在并行处理时代，这成为一个主要问题。
- en: Recurrent neural networks in application such as machine translation does not
    provide a natural mechanism of alignment between source words and phrases to target
    words and phrases. In such cases, the entire source sequence context passed is
    used for decoding the target sequence. This is limiting in a sense that the entire
    source sequence might be hard to encode in a fixed size hidden state of the encoder.
  id: totrans-489
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在机器翻译等应用中，循环神经网络无法提供源词和短语与目标词和短语之间的自然对齐机制。在这种情况下，整个源序列上下文被用于解码目标序列。这在一定程度上限制了整个源序列可能难以编码在编码器的固定大小隐藏状态中。
- en: Both problems above are addressed by attention which provides a way to capture
    global dependencies between sequence elements within the same sequence (e.g.,
    next-word prediction) or different sequences (e.g., machine translation). Thus,
    attention provides a mechanism of capturing dependencies between sequence elements
    without regard to their distances.
  id: totrans-490
  prefs: []
  type: TYPE_NORMAL
  zh: 上述两个问题都通过注意力机制得到解决，它提供了一种捕捉同一序列（例如，下一词预测）或不同序列（例如，机器翻译）内序列元素之间全局依赖关系的方法。因此，注意力提供了一种捕捉序列元素之间依赖关系的机制，而不考虑它们的距离。
- en: There are primarily two forms of attention—**self-attention** and **cross-attention.**
  id: totrans-491
  prefs: []
  type: TYPE_NORMAL
  zh: 注意力主要有两种形式——**自注意力**和**交叉注意力**。
- en: In the context of sequence of words in a sentence, self-attention would gather
    for each word context from other words in a sentence based on their similarities.
    Generally, these similarities are captured through dot products of the word with
    the other words in the sentence.
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
  zh: 在句子中单词序列的上下文中，自注意力会根据它们的相似性从句子中的其他单词中收集每个单词的上下文。通常，这些相似性是通过单词与句子中其他单词的点积来捕捉的。
- en: Cross-attention tries to capture similarity between elements of two different
    sequences. In the context of Seq2Seq model in machine translation, attention can
    be used to get the relevant context from source language word embeddings by attending
    to the current target language word embedding (mostly has the summarized information
    of all words prior to it through self-attention) for predicting the next word.
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
  zh: 交叉注意力试图捕捉两个不同序列元素之间的相似性。在机器翻译中的Seq2Seq模型上下文中，注意力可以通过关注当前目标语言词嵌入（通常通过自注意力总结了所有之前的单词信息）来获取源语言词嵌入的相关上下文，以预测下一个单词。
- en: Now that we have intuitively defined attention using references to sequences
    of words, let us try to put some mathematical structure of attention.
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经通过引用单词序列直观地定义了注意力，让我们尝试为注意力添加一些数学结构。
- en: There are three key components in the attention—keys (**K**), value (**V**),
    and query (**Q**). Attention can be defined as a mapping from the keys, value,
    and query tuple to an output which is the weighted sum of the values.
  id: totrans-495
  prefs: []
  type: TYPE_NORMAL
  zh: 注意力有三个关键组件——键（**K**）、值（**V**）和查询（**Q**）。注意力可以定义为从键、值和查询元组到输出的映射，该输出是值的加权和。
- en: Scaled Dot Product Attention
  id: totrans-496
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 缩放点积注意力
- en: 'The mapping for scaled dot product attention can be written as follows:'
  id: totrans-497
  prefs: []
  type: TYPE_NORMAL
  zh: 缩放点积注意力的映射可以写成以下形式：
- en: '![$$ Attention\left(K,Q,V\right)= softmax\left(\frac{Q{K}^T}{\sqrt{k}}\right)V
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equce.png)'
  id: totrans-498
  prefs: []
  type: TYPE_IMG
  zh: '![注意力机制公式](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equce.png)'
- en: Here *Q* stands for the vector embeddings of queries, and hence *Q* is a matrix.
    Similarly, *K* stands for the vector embeddings of keys, while *V* stands for
    the vector of values. The dimension *k* of the key embeddings and the query embeddings
    must be the same for the scaled dot product attention to work.
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里 *Q* 代表查询的向量嵌入，因此 *Q* 是一个矩阵。同样，*K* 代表键的向量嵌入，而 *V* 代表值的向量。键嵌入和查询嵌入的维度 *k*
    必须相同，以便缩放点积注意力能够工作。
- en: '![](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig17_HTML.jpg)'
  id: totrans-500
  prefs: []
  type: TYPE_IMG
  zh: '![image](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig17_HTML.jpg)'
- en: The attention mechanism is illustrated. A linear equation is used to describe
    the query, key, and value in the scales dot product attention.
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: 注意力机制被展示出来。在缩放点积注意力中，使用线性方程来描述查询、键和值。
- en: Figure 4-17
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-17
- en: Illustration of attention mechanism
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: 注意力机制的示意图
- en: The very common scaled dot product attention mechanism is illustrated in Figure
    [4-17](#Fig17).
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: 非常常见的缩放点积注意力机制在图 [4-17](#Fig17) 中展示。
- en: 'The keys (*K*), queries (*Q*), and values (*V*) prior to the attention are
    generally conditioned using projection matrices *W*[*K*], *W*[*Q*] and *W*[*V*]
    through linear layers. Their representation post the conditioning can be represented
    as follows:'
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: 在注意力之前，键 (*K*)、查询 (*Q*) 和值 (*V*) 通常通过投影矩阵 *W*[*K*]、*W*[*Q*] 和 *W*[*V*] 通过线性层进行条件化。它们经过条件化后的表示可以表示如下：
- en: '![$$ {Q}_W=Q{W}_Q $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equcf.png)'
  id: totrans-506
  prefs: []
  type: TYPE_IMG
  zh: '![QW=QW_Q](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equcf.png)'
- en: '![$$ {K}_W=K{W}_K $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equcg.png)'
  id: totrans-507
  prefs: []
  type: TYPE_IMG
  zh: '![KW=KW_K](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equcg.png)'
- en: '![$$ {V}_W=V{W}_V $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equch.png)'
  id: totrans-508
  prefs: []
  type: TYPE_IMG
  zh: '![V_W=VW_V](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equch.png)'
- en: Again, coming to the machine translation example of translating the English
    sentence **“It’s a beautiful day”** to the French sentence **“C’est une belle
    journee,”** the queries are each of the words of the French sentence, while the
    keys are each of the words of the English sentence **“It’s a beautiful day.”**
  id: totrans-509
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，回到将英语句子**“It’s a beautiful day”**翻译成法语句子**“C’est une belle journee,”**的机器翻译例子，查询是法语句子中的每个单词，而键是英语句子**“It’s
    a beautiful day.”**中的每个单词。
- en: Through the cross-attention mechanism, we would like to see how we can represent
    query sequence words as a weighted average of the key sequence word representation.
    For NLP applications such as machine translation, the key sequence word representations
    also act as the value representation. We call these representation embeddings
    too.
  id: totrans-510
  prefs: []
  type: TYPE_NORMAL
  zh: 通过交叉注意力机制，我们想看看我们如何将查询序列词表示为键序列词表示的加权平均值。对于机器翻译等NLP应用，键序列词表示也充当值表示。我们称这些表示嵌入为“表示嵌入”。
- en: The ![$$ \frac{softmax\ \left({Q}_W{K}_W^T\right)}{\sqrt{k}} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq69.png)
    captures the similarity of each query sequence words with the key sequence words.
    Hence if the number of query words is *m* and the number of key words is *n* ,
    the dimension of the similarity matrix ![$$ S=\frac{softmax\ \left({Q}_W{K}_W^T\right)}{\sqrt{k}}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq70.png) is *m* × *n*.
  id: totrans-511
  prefs: []
  type: TYPE_NORMAL
  zh: '![softmax(QWK^T)/sqrt(k)](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq69.png)
    捕获了每个查询序列词与键序列词的相似度。因此，如果查询词的数量是 *m*，键词的数量是 *n*，则相似度矩阵 ![S=softmax(QWK^T)/sqrt(k)](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq70.png)
    的维度是 *m* × *n*。'
- en: So, each row of the similarity matrix can be thought of a probability distribution
    of similarity for each query word over the key sequence words.
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，相似度矩阵的每一行可以被视为每个查询词在键序列词上的相似度概率分布。
- en: If we go back to the English to French translation example, the first row of
    this similarity matrix *S* would give the probability distribution of similarity
    of the query word “C’est” with each of English words **“It’s a beautiful day”**
    as shown in the following.
  id: totrans-513
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们回到英语到法语翻译的例子，这个相似度矩阵 *S* 的第一行会给出查询词“C’est”与每个英语单词**“It’s a beautiful day”**的相似度概率分布，如下所示。
- en: '![$$ S\left[0,:\right]=\left[{s}_{\left({C}^{\prime } est,I{t}^{\prime }s\right)}\kern0.5em
    {s}_{\left({}^{"}{C}^{\prime } est,a\right)}\kern0.75em {s}_{\left({}^{"}{C}^{\prime
    } est, beatiful\ \right)}\ {s}_{\left({}^{"}{C}^{\prime } est, day\right)}\right]
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equci.png)'
  id: totrans-514
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equci.png)'
- en: 'The multiplication of the similarity matrix *S* with the value representation
    of the keys *V*[*k*] expresses each query word as a linear sum of the value representations
    or embeddings of the key words. Hence the output *O* of attention can be expressed
    as follows:'
  id: totrans-515
  prefs: []
  type: TYPE_NORMAL
  zh: 相似度矩阵 *S* 与键的值表示 *V*[*k*] 的乘积将每个查询词表示为键词的值表示或嵌入的线性组合。因此，注意力的输出 *O* 可以表示如下：
- en: '![$$ O=S{V}_W=\frac{softmax\ \left({Q}_W{K}_W^T\right)}{\sqrt{k}}\ {V}_W $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equcj.png)'
  id: totrans-516
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equcj.png)'
- en: 'The first row of the output would correspond to **“C_est”** and can be expressed
    as follows:'
  id: totrans-517
  prefs: []
  type: TYPE_NORMAL
  zh: 输出的第一行对应于**“C_est”**，可以表示如下：
- en: '![$$ O\left[0,:\right]=\boldsymbol{Output}\left({C}^{\prime } est\right) $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equck.png)'
  id: totrans-518
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equck.png)'
- en: '![$$ ={s}_{\left({C}^{\prime } est,I{t}^{\prime }s\right)}{V}_w\left(I{t}^{\prime
    }s\right)+{s}_{\left({C}^{\prime } est,a\right)}{V}_w(a)+{s}_{\left({C}^{\prime
    } est, beautiful\right)}{V}_w(beautiful)+{s}_{\left({C}^{\prime } est, day\right)}{V}_w(day)
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equcl.png)'
  id: totrans-519
  prefs: []
  type: TYPE_IMG
  zh: '![$$ ={s}_{\left({C}^{\prime } est,I{t}^{\prime }s\right)}{V}_w\left(I{t}^{\prime
    }s\right)+{s}_{\left({C}^{\prime } est,a\right)}{V}_w(a)+{s}_{\left({C}^{\prime
    } est, beautiful\right)}{V}_w(beautiful)+{s}_{\left({C}^{\prime } est, day\right)}{V}_w(day)
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equcl.png)'
- en: Multihead Attention
  id: totrans-520
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 多头注意力
- en: 'Instead of just a single attention, which can often be limiting, multihead
    attention performs multiple parallel attentions with different projection matrices.
    If there are r parallel attentions each having projection weights ![$$ {W}_Q^{(i)}
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq71.png), ![$$
    {W}_K^{(i)} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq72.png),
    and ![$$ {W}_V^i $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq73.png),
    then the representation from the attention head *i* can be expressed as follows:'
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
  zh: 与仅使用单一注意力相比，这通常会受到限制，多头注意力执行多个并行注意力，每个注意力使用不同的投影矩阵。如果有 r 个并行注意力，每个注意力都有投影权重
    ![$$ {W}_Q^{(i)} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq71.png)，![$$
    {W}_K^{(i)} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq72.png)，和
    ![$$ {W}_V^i $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq73.png)，那么注意力头
    *i* 的表示可以表示如下：
- en: '![$$ head(i)= Attention\left(Q{W}_Q^{(i)},K{W}_K^{(i)},V{W}_V^{(i)}\right)
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equcm.png)'
  id: totrans-522
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equcm.png)'
- en: The output representation from each of the head is concatenated together and
    then projected through one final linear layer *W*[*O*] to give it the output *O*
    its final dimension.
  id: totrans-523
  prefs: []
  type: TYPE_NORMAL
  zh: 每个头的输出表示被连接在一起，然后通过一个最终的线性层 *W*[*O*] 投影，以给出其最终维度 *O*。
- en: '![$$ O= concat\left[ head(0), head(1).. head\left(r-1\right)\right]{W}_O $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equcn.png)'
  id: totrans-524
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equcn.png)'
- en: We reduce the output dimension of each of the attention head by a factor of
    *r* to get the desired output dimension from the multihead attention. So, if we
    want the final dimension to be *l*, we would choose ![$$ {W}_V^{(i)}\in {R}^{n\times
    t} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq74.png) such
    that ![$$ t=\frac{l}{r} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq75.png)
    . This ensures that the output dimension of the query words post the output concatenation
    sums to *l*. Multihead attention in general helps to represent the words in multiple
    different subspaces and thus fosters a richer representation.
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过将每个注意力头的输出维度减少一个因子*r*，从多头注意力中得到所需的输出维度。因此，如果我们希望最终维度为*l*，我们就会选择![$$ {W}_V^{(i)}\in
    {R}^{n\times t} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq74.png)使得![$$
    t=\frac{l}{r} $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_IEq75.png)。这确保了输出拼接后的查询词的维度总和为*l*。多头注意力通常有助于在多个不同的子空间中表示单词，从而促进更丰富的表示。
- en: Transformers
  id: totrans-526
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 变换器
- en: In this section, we will discuss about transformers which was first introduced
    in the paper “Attention Is All You Need” ([`https://arxiv.org/abs/1706.03762?context=cs`](https://arxiv.org/abs/1706.03762%253Fcontext%253Dcs)).
    As is obvious from the paper name, the transformers are based on the attention
    mechanism that we have discussed in some details in the earlier section. Most
    of the sequential problems in deep learning uses an encoder-decoder architecture,
    and the transformer is no different. If we take the neural language translation
    problem Seq2Seq architecture, the input sequence of words *x* = (*x*[1], *x*[2],
    …. *x*[*m*]) are encoded to a sequence of latent representations *z* = (*z*[1],
    *z*[2], …. *z*[*m*]) using a RNN architecture such as LSTM. Using the *z* as the
    context, a decoder RNN then outputs the target sequence (*y*[1], *y*[2], …. *y*[*n*])
    in an autoregressive fashion. Hence for the prediction of the word *y*[*k*], the
    decoder uses the input context *z* as well as the context from the first (k-1)
    predicted words *y*[1], *y*[2]…. , *y*[*k* − 1]. The transformer follows the similar
    principle, but instead of using a RNN to capture the sequential context, the transformer
    instead captures context through attention.
  id: totrans-527
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将讨论首次在论文“Attention Is All You Need”中提出的变换器（[`https://arxiv.org/abs/1706.03762?context=cs`](https://arxiv.org/abs/1706.03762%253Fcontext%253Dcs)）。从论文标题中很明显，变换器基于我们在早期章节中详细讨论过的注意力机制。大多数深度学习中的序列问题都使用编码器-解码器架构，变换器也不例外。如果我们以神经语言翻译问题Seq2Seq架构为例，输入序列的单词*x* = (*x*[1],
    *x*[2], …. *x*[*m*])使用LSTM等RNN架构编码为潜在表示序列*z* = (*z*[1], *z*[2], …. *z*[*m*])。使用*z*作为上下文，解码器RNN以自回归的方式输出目标序列(*y*[1],
    *y*[2], …. *y*[*n*])。因此，对于预测单词*y*[*k*]，解码器使用输入上下文*z*以及来自第一个(k-1)预测单词*y*[1], *y*[2]…,
    *y*[*k* − 1]的上下文。变换器遵循类似的原则，但不是使用RNN来捕获序列上下文，而是通过注意力来捕获上下文。
- en: The transformer architecture is illustrated in Figure [4-18](#Fig18).
  id: totrans-528
  prefs: []
  type: TYPE_NORMAL
  zh: 变换器架构如图[4-18](#Fig18)所示。
- en: '![](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig18_HTML.jpg)'
  id: totrans-529
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/448418_2_En_4_Chapter/448418_2_En_4_Fig18_HTML.jpg)'
- en: The transformer architecture diagram's illustrator. The image mentions two units
    of an encoder with inputs and a decoder with outputs.
  id: totrans-530
  prefs: []
  type: TYPE_NORMAL
  zh: 变换器架构图绘制者。图中提到了编码器的两个单元（带有输入）和解码器的输出单元。
- en: Figure 4-18
  id: totrans-531
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-18
- en: Transformer architectural diagram
  id: totrans-532
  prefs: []
  type: TYPE_NORMAL
  zh: 变换器架构图
- en: 'As we can see from Figure [4-18](#Fig18), the transformer has an encoder and
    decoder module as its main components which we discuss in the following:'
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
  zh: 从图[4-18](#Fig18)中我们可以看出，变换器主要由编码器和解码器模块组成，以下我们将对此进行讨论：
- en: Encoder
  id: totrans-534
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编码器
- en: The encoder has N identical units each of which has a multi-layer self-attention
    sublayer and a feed-forward MLP sublayer. A residual connection like that of ResNet
    is applied to each of the sublayers followed by layer normalization. The keys,
    value, and query are the same for the self-attention layer, and the idea is to
    represent the embedding of each word in the input sequence as weighted combination
    of the embedding of the rest of the words, where the weights are determined through
    self-attention.
  id: totrans-535
  prefs: []
  type: TYPE_NORMAL
  zh: 编码器有N个相同的单元，每个单元都有一个多层自注意力子层和一个前馈MLP子层。每个子层都应用了类似于ResNet的残差连接，随后进行层归一化。自注意力层的键、值和查询是相同的，其想法是将输入序列中每个单词的嵌入表示为其他单词嵌入的加权组合，其中权重通过自注意力确定。
- en: The input to the first of the N encoder units can be pretrained word embeddings
    or embeddings through a learnable embeddings layer plus the positional encodings.
    Through recurrent neural network and convolution, we encode some form of order
    of the sequence. Since attention cannot encode the same, the transformers use
    the positional encodings to provide some notion of the relative or absolute position
    of the words in the sequence. We will discuss more about positional encodings
    in subsequent sections.
  id: totrans-536
  prefs: []
  type: TYPE_NORMAL
  zh: N 个编码器单元的输入可以是预训练词嵌入，或者通过可学习的嵌入层加上位置编码得到的嵌入。通过循环神经网络和卷积，我们编码序列的某种形式的顺序。由于注意力无法编码相同的内容，变压器使用位置编码来提供序列中单词的相对或绝对位置的概念。我们将在后续章节中进一步讨论位置编码。
- en: Decoder
  id: totrans-537
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 解码器
- en: The decoder has the same number of identical units as that of the encoder. Each
    of the units in decoder has three sublayers—the masked self-attention unit, the
    cross-attention unit, and feed-forward MLP unit.
  id: totrans-538
  prefs: []
  type: TYPE_NORMAL
  zh: 解码器具有与编码器相同的相同单元数量。解码器中的每个单元都有三个子层——掩码自注意力单元、交叉注意力单元和前馈 MLP 单元。
- en: For a given word at a location *t* in the output sequence, the masked self-attention
    tries to capture context from all words till the location *t* during training.
    The masked version of the attention prevents the scheme from getting information
    from words post the location *t*. The cross-attention helps extract relevant input
    sequence context at each given output position *t* for the prediction of the *t* + 1
    word of the output sequence. For the cross-attention, the query consists of the
    target sequence word embeddings from the self-attention, while the keys and values
    are the input sequence word embeddings from the encoder. Each of the three sublayers
    has a residual connection followed by layer normalization like that of the encoder.
  id: totrans-539
  prefs: []
  type: TYPE_NORMAL
  zh: 对于输出序列中位置 *t* 的给定单词，掩码自注意力试图在训练期间从位置 *t* 之前的所有单词中捕获上下文。掩码版本的注意力防止方案从位置 *t* 之后的单词中获取信息。交叉注意力有助于在每个给定的输出位置
    *t* 提取相关的输入序列上下文，以预测输出序列的 *t* + 1 单词。对于交叉注意力，查询由自注意力中的目标序列单词嵌入组成，而键和值是编码器中的输入序列单词嵌入。每个子层都有一个残差连接，随后是类似于编码器的层归一化。
- en: The input to the first of the N decoder is either pretrained word embeddings
    of the output sequence or embeddings through a learnable embeddings layer followed
    by positional encoding.
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: N 个解码器的第一个输入是输出序列的预训练词嵌入，或者通过可学习的嵌入层后的位置编码得到的嵌入。
- en: Embeddings from each of the N encoder units cross attend to the corresponding
    decoder unit.
  id: totrans-541
  prefs: []
  type: TYPE_NORMAL
  zh: N 个编码器单元的嵌入相互交叉关注对应的解码器单元。
- en: Positional Encoding
  id: totrans-542
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 位置编码
- en: As discussed earlier, the function of the positional encodings is to provide
    some notion of the relative or absolute position of the words in the sequence
    as we do not have the luxury of recurrent neural network or convolution in an
    attention-based mechanism.
  id: totrans-543
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，位置编码的功能是提供序列中单词的相对或绝对位置的概念，因为我们没有循环神经网络或卷积在基于注意力的机制中的优势。
- en: The positional encodings used in the transformers described in “Attention Is
    All You Need” uses the following functions to encode position.
  id: totrans-544
  prefs: []
  type: TYPE_NORMAL
  zh: 在“Attention Is All You Need”中描述的变压器所使用的位置编码采用了以下函数进行编码。
- en: '![$$ PE\left(p,2i\right)=\sin \left(\frac{p}{10000^{\left(\frac{2i}{dmodel}\right)}}\right)
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equco.png)'
  id: totrans-545
  prefs: []
  type: TYPE_IMG
  zh: '![PE(p,2i)=sin(10000^(2i/dmodel)p/10000^(2i/dmodel))](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equco.png)'
- en: '![$$ PE\left(p,2i+1\right)=\cos \left(\frac{p}{10000^{\left(\frac{2i}{dmodel}\right)}}\right)
    $$](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equcp.png)'
  id: totrans-546
  prefs: []
  type: TYPE_IMG
  zh: '![PE(p,2i+1)=cos(10000^(2i/dmodel)p/10000^(2i/dmodel))](../images/448418_2_En_4_Chapter/448418_2_En_4_Chapter_TeX_Equcp.png)'
- en: In the preceding equations, *p* stands for the position of the word in the sequence,
    and *i* denotes the dimension. So, each dimension of the positional encoding is
    represented as a sinusoidal.
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的方程中，*p* 代表序列中单词的位置，而 *i* 表示维度。因此，每个维度的位置编码都表示为一个正弦波。
- en: Final Output
  id: totrans-548
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 最终输出
- en: The final linear and SoftMax takes in the output of the decoder at the last
    stage and predicts the probability of a given target word at location t based
    on the *t* − 1 output sequence word embeddings as well as the input sequence word
    embeddings.
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: 最终的线性层和 SoftMax 层接收解码器最后阶段的输出，并根据 *t* - 1 输出序列单词嵌入以及输入序列单词嵌入预测位置 t 处给定目标单词的概率。
- en: Now that we have gone through all the relevant concepts of the transformer architecture,
    let us look at the TensorFlow code for each of the functionalities.
  id: totrans-550
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经了解了transformer架构的所有相关概念，让我们来看看每个功能的TensorFlow代码。
- en: We begin with positional encoding in Listing [4-7.1](#PC13). As discussed earlier,
    the positional encoding function should be able to take the position of the element
    in the sequence and the specific dimension of the representation and give out
    the positional encoding accordingly. Even dimensions follow a sin profile, while
    odd dimensions follow a cos profile in the positional encoding scheme.
  id: totrans-551
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从列表[4-7.1](#PC13)中的定位编码开始。如前所述，定位编码函数应该能够根据序列中元素的位置和表示的特定维度来输出定位编码。在定位编码方案中，偶数维度遵循正弦曲线，而奇数维度遵循余弦曲线。
- en: '[PRE12]'
  id: totrans-552
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: When dealing with encoder and decoder in transformer, we assume a fixed size
    sequence length. Hence, it is imperative that we perform masking to mask out entries
    that are beyond the sequence length. This ensures the model does not consider
    padding as input. Similarly for the decoder, it is important to mask out target
    words at timestamp (*t* + 1) and beyond so that the current time step prediction
    at *t* is not influenced by the words that appear after it.
  id: totrans-553
  prefs: []
  type: TYPE_NORMAL
  zh: 在处理transformer中的编码器和解码器时，我们假设一个固定的序列长度。因此，我们必须执行掩码以屏蔽超出序列长度的条目。这确保模型不会将填充视为输入。同样，对于解码器，屏蔽掉时间戳(*t* + 1)及以后的目标词也很重要，这样当前时间步的预测(*t*)就不会受到其后出现的单词的影响。
- en: The logic for padding-specific masking and the look ahead masking is outlined
    in Listing [4-7.2](#PC14).
  id: totrans-554
  prefs: []
  type: TYPE_NORMAL
  zh: 填充特定掩码和前瞻掩码的逻辑在列表[4-7.2](#PC14)中概述。
- en: '[PRE13]'
  id: totrans-555
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Next, we implement the scaled dot product scheme like what has been illustrated
    in “Attention Is All You Need” paper. The same has been implemented in Listing
    [4-7.3](#PC15). Beyond the query, keys, and value inputs associated with attention,
    we take another input mask. Mask helps not to attend to unwanted tokens/words
    in the sequence.
  id: totrans-556
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们实现类似于“Attention Is All You Need”论文中展示的缩放点积方案。同样的实现已在列表[4-7.3](#PC15)中实现。除了与注意力相关的查询、键和值输入之外，我们还接受另一个输入掩码。掩码有助于避免在序列中关注不需要的标记/单词。
- en: '[PRE14]'
  id: totrans-557
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: The multihead attention splits up the input dimension into multiple heads as
    defined by num_heads. It takes as input the embedding dimension given by “dim”
    and “num_heads.” The detailed listing for multi_head_attention is illustrated
    in Listing [4-7.4](#PC16).
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
  zh: 多头注意力将输入维度分割成由num_heads定义的多个头。它以“dim”和“num_heads”给出的嵌入维度作为输入。多头注意力的详细列表在列表[4-7.4](#PC16)中展示。
- en: '[PRE15]'
  id: totrans-559
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: The feed-forward pointwise MLP for both the encoder and decoder can be defined
    as in Listing [4-7.5](#PC17).
  id: totrans-560
  prefs: []
  type: TYPE_NORMAL
  zh: 编码器和解码器的前馈点积MLP可以定义为列表[4-7.5](#PC17)。
- en: '[PRE16]'
  id: totrans-561
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Next, we implement the encoder layer as illustrated in Listing [4-7.6](#PC18).
    As discussed earlier, the encoder layer consists of two major blocks—self-attention
    and pointwise feed-forward network. In general stack of encoder layer forms the
    transformer encoder.
  id: totrans-562
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们实现编码器层，如列表[4-7.6](#PC18)所示。如前所述，编码器层由两个主要块组成——自注意力点和点积前馈网络。一般来说，编码器层的堆叠形成了transformer编码器。
- en: '[PRE17]'
  id: totrans-563
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: The decoder layer while very similar to the encoder layer has an extra block
    pertaining to cross-attention to extract information from the encoder inputs.
    The detailed implementation of the decoder layer is illustrated in the following
    (see Listing [4-7.7](#PC19)).
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
  zh: 解码器层虽然与编码器层非常相似，但有一个额外的块，用于跨注意力以从编码器输入中提取信息。解码器层的详细实现如下（见列表[4-7.7](#PC19)）。
- en: '[PRE18]'
  id: totrans-565
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: The encoder block defined next (see below) in Listing [4-7.8](#PC20) is nothing
    but a stack of encoder layers.
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个定义的编码器块（见下文）在列表[4-7.8](#PC20)中，实际上只是一系列编码器的堆叠。
- en: '[PRE19]'
  id: totrans-567
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Similar to the encoder block next, we illustrate the decoder block in Listing
    [4-7.9](#PC21) (see below). Again, the decoder block is nothing but a stack of
    decoder layers.
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
  zh: 与下一个编码器块类似，我们在列表[4-7.9](#PC21)（见下文）中展示了解码器块。同样，解码器块实际上只是一系列解码器的堆叠。
- en: '[PRE20]'
  id: totrans-569
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: Finally, we put the implemented positional encodings, encoder, decoder, and
    masking routines to form the transformer architecture. See Listing [4-7.10](#PC22)
    for the detailed implementation.
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们将实现的定位编码、编码器、解码器和掩码例程组合起来形成transformer架构。详见列表[4-7.10](#PC22)中的详细实现。
- en: '[PRE21]'
  id: totrans-571
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: Hope the code implementation of the major components of the transformer helps
    the readers better understand the various implementation subtleties associated
    with them. Readers are further advised to apply the transformer solution to different
    domain problems to acquire an in-depth understanding. In general, pretrained version
    of the transformer architectures is readily available in several deep learning
    frameworks and offerings.
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
  zh: 希望代码实现变换器的主要组件有助于读者更好地理解与之相关的各种实现细节。建议读者进一步将变换器解决方案应用于不同的领域问题，以获得深入的理解。一般来说，预训练的变换器架构在多个深度学习框架和产品中都可以轻松获得。
- en: Summary
  id: totrans-573
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: After this chapter, the reader is expected to have gained significant insights
    into the working principles of recurrent neural networks and their variants. Also,
    the reader should be able to implement RNN networks using TensorFlow with relative
    ease. Vanishing- and exploding-gradient problems with RNNs pose a key challenge
    in training them effectively, and thus many powerful versions of RNNs have evolved
    that take care of the problem. LSTM, being a powerful RNN architecture, is widely
    used in the community and has almost replaced the basic RNN. The reader is expected
    to know the uses and advantages of these advanced techniques, such as LSTM, GRU,
    and so forth, so that they can be accordingly implemented based on the problem.
    Pretrained Word2Vec and GloVe word-vector embeddings are used by several RNN,
    LSTM, and other networks so that the input word to the model at each sequence
    step can be represented by its pretrained Word2Vec or GloVe vector instead of
    learning these word-vector embeddings within the recurrent neural network itself.
  id: totrans-574
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章之后，读者应能对循环神经网络及其变体的工作原理有深刻的理解。此外，读者应能够相对容易地使用TensorFlow实现RNN网络。循环神经网络中的梯度消失和梯度爆炸问题在有效训练它们时构成了一个关键挑战，因此已经发展出许多强大的RNN版本来处理这个问题。LSTM作为一种强大的RNN架构，在社区中得到了广泛应用，几乎取代了基本的RNN。读者应了解这些高级技术（如LSTM、GRU等）的用途和优势，以便根据问题相应地实现它们。多个RNN、LSTM和其他网络使用预训练的Word2Vec和GloVe词向量嵌入，以便在每个序列步骤中，模型输入的单词可以由其预训练的Word2Vec或GloVe向量来表示，而不是在循环神经网络内部学习这些词向量嵌入。
- en: In the next chapter, we will take up restricted Boltzmann machines (RBMs), which
    are energy-based neural networks, and various autoencoders as part of unsupervised
    deep learning. Also, we will discuss deep-belief networks, which can be formed
    by stacking several restricted Boltzmann machines and training such networks in
    a greedy manner, and collaborative filtering through RBMs. I look forward to your
    participation in the next chapter.
  id: totrans-575
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将探讨受限玻尔兹曼机（RBMs），这是一种基于能量的神经网络，以及作为无监督深度学习一部分的各种自编码器。此外，我们还将讨论深度信念网络，这些网络可以通过堆叠多个受限玻尔兹曼机并以贪婪的方式进行训练来形成，以及通过RBMs进行的协同过滤。我期待着您在下一章的参与。
