- en: Introduction
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 引言
- en: Machine learning has been instrumental in shaping the scope of technology since
    its inception. ML has played an important role in the development of things such
    as autonomous vehicles and robotics. Deep reinforcement learning is that field
    of learning where agents learn with help of rewards—a thought which has been derived
    from nature. Through this book, the author tries to present the diversity of reinforcement
    learning algorithms in game development as well as in scientific research. Unity,
    the cross-platform engine that is used in a plethora of tasks, from visual effects
    and cinematography to machine learning and high performance graphics, is the primary
    tool that is used in this book. With the power of the Unity ML Agents Toolkit,
    the deep reinforcement learning framework built by Unity, the author tries to
    show the vast possibilities of this learning paradigm.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习自诞生以来就在塑造技术范围方面发挥了重要作用。ML 在自动驾驶汽车和机器人等领域的发展中发挥了重要作用。深度强化学习是这样一个学习领域，其中代理通过奖励来学习——这是一个从自然界中汲取的思想。通过本书，作者试图展示强化学习算法在游戏开发以及科学研究中的多样性。Unity，一个跨平台引擎，被用于各种任务，从视觉效果和电影摄影到机器学习和高性能图形，是本书中使用的首要工具。利用
    Unity ML Agents Toolkit 的力量，Unity 构建的深度强化学习框架，作者试图展示这种学习范式的巨大可能性。
- en: The book starts with an introduction to state-based reinforcement learning,
    from Markov processes to Bellman equations and Q-learning, which sets the ground
    for the successive sections. A plethora of diverse pathfinding algorithms, from
    Dijkstra to sophisticated variants of A* star, have been provided along with simulations
    in Unity. The book also covers how navigation meshes work for automated pathfinding
    in Unity. An introduction to the ML Agents Toolkit, from standard process for
    installation to training an AI agent with deep reinforcement learning algorithm
    (proximal policy operation [PPO]) is provided as a starter. Along the course of
    this book, there is an extensive usage of the Tensorflow framework along with
    OpenAI Gym environments for proper visualizations of complex deep reinforcement
    learning algorithms in terms of simulations, robotics, and autonomous agents.
    Successive sections of the book involve an in-depth study of the variety of on-
    and off-policy algorithms, ranging from discrete SARSA/Q-learning to actor critic
    variants, deep Q-network variants, PPO, and their implementations using the Keras
    Tensorflow framework on Gym. These sections are instrumental in understanding
    how different simulations such as the famous Puppo (Unity Berlin), Tiny agents,
    and other ML Agents samples from Unity are created and built. Sections with detailed
    descriptions about how to build simulations in Unity using the C# software development
    kit for ML Agents and training them using soft actor critic (SAC), PPO, or behavioral
    cloning algorithms such as GAIL are provided.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 本书从基于状态的动作强化学习介绍开始，从马尔可夫过程到贝尔曼方程和Q学习，为后续章节奠定了基础。本书提供了从迪杰斯特拉算法到A*星算法的复杂变体的众多不同路径查找算法，并附带了Unity中的模拟。本书还涵盖了Unity中自动路径查找的导航网格的工作原理。本书还提供了一个ML
    Agents Toolkit的介绍，从标准的安装流程到使用深度强化学习算法（近端策略优化[PPO]）训练AI代理。在本书的整个过程中，广泛使用了Tensorflow框架以及OpenAI
    Gym环境，以正确可视化复杂深度强化学习算法的模拟、机器人和自主代理。本书的后续章节深入研究了各种在线和离线策略算法，从离散的SARSA/Q学习到演员-评论家变体、深度Q网络变体、PPO以及它们在Gym上使用Keras
    Tensorflow框架的实现。这些章节对于理解如何创建和构建不同的模拟，如著名的Puppo（Unity柏林）、Tiny代理和其他Unity ML Agents样本至关重要。本书还提供了关于如何使用C#软件开发套件为ML
    Agents构建模拟以及使用软演员评论家（SAC）、PPO或行为克隆算法（如GAIL）训练它们的详细描述。
- en: The latter part of this book provides an insight into curriculum learning and
    adversarial networks with an analysis of how AI agents are trained in games such
    as FIFA. In all these sections, a detailed description of the variants of neural
    networks—MLP, convolution networks, recurrent networks along with long short-term
    memory and GRU and their implementations and performance are provided. This is
    especially helpful as they are used extensively during building the deep learning
    algorithms. The importance of convolution networks for image sampling in Atari-based
    2D games such as Pong has been provided. The knowledge of computer vision and
    deep reinforcement learning is combined to produce autonomous vehicles and driverless
    cars, which is also provided as an example template (game) for the readers to
    build upon.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 本书的后半部分深入探讨了课程学习和对抗网络，分析了AI代理在FIFA等游戏中的训练方式。在这些章节中，提供了关于神经网络变体——MLP、卷积网络、循环网络以及长短期记忆和GRU及其实现和性能的详细描述。这特别有助于它们在构建深度学习算法时的广泛应用。本书还提供了关于卷积网络在基于Atari的2D游戏（如Pong）中的图像采样的重要性。将计算机视觉和深度强化学习知识相结合，产生了自动驾驶汽车和无人驾驶汽车，这也为读者提供了一个构建的示例模板（游戏）。
- en: Finally, this book also contains an in-depth review of the Obstacle Tower Challenge,
    which was organized by Unity Technologies to challenge state-of-the-art deep reinforcement
    learning algorithms. Sections on certain evolutionary algorithms along with the
    Google Dopamine framework has been provided for understanding the vast field of
    reinforcement learning. Through this book, the author hopes to infuse enthusiasm
    and foster research among the readers in the field of deep reinforcement learning.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，本书还包含了对Unity Technologies组织的障碍塔挑战的深入回顾，该挑战旨在挑战最先进的深度强化学习算法。本书提供了关于某些进化算法以及Google
    Dopamine框架的章节，以帮助理解强化学习这一广阔领域。通过本书，作者希望激发读者在深度强化学习领域的热情并促进研究。
- en: Acknowledgments
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 致谢
- en: The amount of dedication and support that I have received in the making of this
    book has left me amazed. First, I would like to thank my family, Mr. Abhijit Majumder
    and Mrs. Sharbari Majumder, who have been instrumental in supporting me all the
    way. I would also like to extend my heartfelt thanks to the entire Apress Team,
    without whom this would not have been possible. Special thanks to Mrs. Spandana
    Chatterjee, the Acquisition Editor, Mr. Shrikant Vishwakarma, the Coordinating
    Editor, and Laura Berendson, the Development Editor, for their constant support
    and thorough reviews. Ansh Shah, the Technical Reviewer of this book, has also
    played an important role and I extend my thanks to him.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在制作这本书的过程中，我所收到的奉献和支持让我感到惊讶。首先，我要感谢我的家人，阿比吉特·马朱姆德先生和沙巴里·马朱姆德女士，他们一直是我坚实的支持。我还要向整个Apress团队表达我衷心的感谢，没有他们，这一切都不可能实现。特别感谢采购编辑斯班达娜·查特吉女士、协调编辑希里坎特·维什瓦卡尔玛先生和开发编辑劳拉·贝伦松女士，他们给予了我持续的支持和详尽的审阅。这本书的技术审稿人安什·沙，也发挥了重要作用，我对他表示感激。
- en: I would also like to share this space in thanking my mentor, Carl Domingo from
    Unity Technologies, who has been so instrumental in guiding me from the beginning
    of my journey with Unity. The Unity Machine Learning team deserves mention, as
    this book would not have been possible without their constant efforts to make
    the ML Agents platform amazing. I especially thank Dr. Danny Lange, whose sessions
    on machine learning have been instrumental in understanding the framework and
    the concepts.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我还想利用这个机会感谢我的导师，来自Unity Technologies的卡尔·多明戈，他在我Unity之旅的开始就给了我极大的指导。Unity机器学习团队值得特别提及，因为如果没有他们不断努力使ML
    Agents平台变得出色，这本书就不可能完成。我特别感谢丹尼·兰格博士，他的机器学习课程对于理解框架和概念至关重要。
- en: I am grateful to everyone who helped in the entire process to make this book,
    which would help readers understand the beauty of deep reinforcement learning.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我对在整个制作过程中帮助这本书的每一个人都表示感谢，这本书将帮助读者理解深度强化学习的美丽。
