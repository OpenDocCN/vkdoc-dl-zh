- en: 4.¬†Multi-trial Neural Architecture Search
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: And now we come to the most exciting part of this book. As we noted at the end
    of the last chapter, HPO methods are pretty limited for automating the search
    for the optimal deep learning models, but **Neural Architecture Search** (**NAS**)
    dispels these limits. This chapter focuses on NAS, one of the most promising areas
    of automated deep learning. Automatic Neural Architecture Search is increasingly
    important in finding appropriate deep learning models. Recent researches have
    proven the NAS effectiveness and found some models that could beat manually tuned
    ones. NAS is a fairly young discipline in machine learning. It took shape as a
    separate discipline in 2018\. Since then, it has made a significant breakthrough
    in automating neural network architecture construction that solves a specific
    problem. The most manual design of neural networks can be replaced by automated
    architecture search soon, so this area is very up and coming for all data scientists.
    NAS produced many top computer vision architectures. Architectures like NASNet,
    EfficientNet, and MobileNet are the result of automated Neural Architecture Search.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are two types of NAS: ***Multi-trial*** and ***One-shot***. In Multi-trial
    NAS, a model evaluator evaluates each sampled model‚Äôs performance, and an Exploration
    Strategy samples models from defined Model Space, while One-shot NAS tries to
    find optimal neural architecture training and exploring one Supernet derived from
    the Model Space. This chapter is dedicated to Multi-trial NAS.'
  prefs: []
  type: TYPE_NORMAL
- en: 'This chapter is divided into two parts: ***Neural Architecture Search Using
    Retiarii (PyTorch)*** and ***Classic Neural Architecture Search (TensorFlow)***.
    ***Retiarii*** is a deep learning framework that supports the exploratory training
    on a neural network Model Space developed by NNI experts. Retiarii is an advantageous
    approach that allows structuring and planning the NAS. Unfortunately, the NNI
    `2.7` version (which is used in this book) only implements the Retiarii approach
    for the PyTorch framework. And it would be unfair not to pay attention to the
    TensorFlow framework in this chapter, so the classic methods of NAS using NNI
    are considered in the *Classic Neural Architecture Search (TensorFlow)* part.
    In any case, NNI supports TensorFlow for One-shot NAS, which we will explore in
    the next chapter. Therefore, TensorFlow users will be able to take full advantage
    of NAS approaches.'
  prefs: []
  type: TYPE_NORMAL
- en: Neural Architecture As Data Flow Graph
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We will begin this chapter by defining how the NAS perceives the neural network
    architecture. Neural architecture is considered as a Data Flow Graph (DFG). DFG
    is a collection of nodes and connections between them. DFG displays the data transfer
    from one node to another. Each node has its own type and parameters. Figure [4-1](#Fig1)
    demonstrates an example of DFG.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig1_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4-1
  prefs: []
  type: TYPE_NORMAL
- en: Data Flow Graph
  prefs: []
  type: TYPE_NORMAL
- en: 'In Figure [4-1](#Fig1), we see the DFG, which contains different types of nodes
    with parameters. The architecture of each neural network can be represented as
    a Data Flow Graph. Indeed, in Figure [4-1](#Fig1), we can replace the rectangle
    node with a convolution layer with parameters: `padding`, `stride`, `filter_size`,
    etc. Neural Architecture Search Explorers have no idea about the nature of each
    of the DFG nodes. The main task is to construct a DFG from various deep learning
    layers, which forms the architecture of a neural network and solves a specific
    problem in the best way.'
  prefs: []
  type: TYPE_NORMAL
- en: Neural Architecture Search Using Retiarii (PyTorch)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Retiarii is the framework developed by NNI experts, and it is the first framework
    that supports deep learning exploratory training. Exploratory training implies
    that different deep neural networks (DNNs) training results are shared. This approach
    compares training of different models, performs optimization, and stops unpromising
    models with poor intermediate results. Also, Retiarii provides a new interface
    to specify a deep learning Model Space for exploration and an interface to describe
    the Exploration Strategy that decides the order to instantiate and train models
    in, prioritize model training, and stop the training of certain models. Retiarii
    identifies the correlations between the instantiated models and develops a set
    of cross-model optimizations to improve the overall exploratory training process.
    You can read more information about the Retiarii framework in the following article:
    [`www.usenix.org/system/files/osdi20-zhang_quanlu.pdf`](http://www.usenix.org/system/files/osdi20-zhang_quanlu.pdf).'
  prefs: []
  type: TYPE_NORMAL
- en: 'NNI version `2.7` has a PyTorch-only implementation of the Retiarii framework.
    In the next NNI releases, the TensorFlow implementation should be added. Please
    refer to the official documentation to check the actual state: [`https://nni.readthedocs.io/en/v2.7/nas/overview.html`](https://nni.readthedocs.io/en/v2.7/nas/overview.html).'
  prefs: []
  type: TYPE_NORMAL
- en: Introduction to NAS Using Retiarii
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The best way to dive into NAS using Retiarii is to examine a simple example
    of finding the optimal DFG for a particular task. We will not go deep into the
    design of neural networks but will focus on a simple arithmetic problem. Suppose
    we have some chain of operators *F*, which performs the following actions:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'We can enrich the chain *F* with the following statements:'
  prefs: []
