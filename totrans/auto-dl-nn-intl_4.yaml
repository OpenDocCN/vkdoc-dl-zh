  prefs: []
  type: TYPE_NORMAL
- en: Classic Neural Architecture Search (TensorFlow)
  id: totrans-544
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Classic NAS implements the Multi-trial NAS approach. Evaluator takes a model
    from Model Space and evaluates it separately. Last valid documentation regarding
    Classic NAS with NNI can be found here: [`https://nni.readthedocs.io/en/v2.2/nas.html`](https://nni.readthedocs.io/en/v2.2/nas.html).
    NNI currently supports Classic NAS but is deprecating it in favor of the Retiarii
    framework. The procedure of Classic NAS algorithms is similar to hyperparameter
    tuning. Users use `nnictl` to start experiments, and each model runs as a trial.
    The difference is that the search space file is automatically generated from the
    Model Space by running `nnictl ss_gen.`'
  id: totrans-545
  prefs: []
  type: TYPE_NORMAL
- en: The main logical entities of Classic NAS are *Base Model*, *Mutator*, *Search
    Space*, *Trial*, and *Search Strategy*. Let’s study each of them by applying NAS
    algorithm to the classical MNIST problem.
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
- en: Base Model
  id: totrans-547
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Every Neural Architecture Search starts with defining a Base Model. The Base
    Model is a neural network that acts as a starting point for new architectures.
    The Base Model can be very simple or very complex. The researcher chooses the
    model that is most suitable as a baseline.
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
- en: Let’s examine the classic LeNet model for the MNIST problem in Listing [4-13](#PC136).
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE135]'
  id: totrans-550
  prefs: []
  type: TYPE_PRE
  zh: '[PRE135]'
- en: 'Base Model layers:'
  id: totrans-551
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE136]'
  id: totrans-552
  prefs: []
  type: TYPE_PRE
  zh: '[PRE136]'
- en: 'Feed forward:'
  id: totrans-553
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE137]'
  id: totrans-554
  prefs: []
  type: TYPE_PRE
  zh: '[PRE137]'
- en: The model described in Listing [4-13](#PC136) will serve as a piece of clay
    for new architectures.
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
- en: Mutators
  id: totrans-556
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Mutator transforms the Base Model into a new one. A set of mutators allow defining
    a search space for the NAS. Classic NNI NAS provides two mutators: `LayerChoice`
    and `InputChoice`. `LayerChoice` mutator forms the candidate layers for a layer
    placeholder. One of the candidates is tried in the exploration process. `InputChoice`
    tries different connections. It takes several tensors and chooses `n_chosen` tensors
    from them.'
  id: totrans-557
  prefs: []
  type: TYPE_NORMAL
- en: You can learn more about `LayerChoice` and `InputChoice` mutators in the subsection
    “Mutators” under the section “Neural Architecture Search Using Retiarii (PyTorch).”
    We can apply `LayerChoice` and `InputChoice` mutators to the Base Model in the
    following way.
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE138]'
  id: totrans-559
  prefs: []
  type: TYPE_PRE
  zh: '[PRE138]'
- en: 'We try three different convolution layers for the `conv1` placeholder:'
  id: totrans-560
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE139]'
  id: totrans-561
  prefs: []
  type: TYPE_PRE
  zh: '[PRE139]'
- en: 'We try two different pooling layers for the `pool` placeholder:'
  id: totrans-562
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE140]'
  id: totrans-563
  prefs: []
  type: TYPE_PRE
  zh: '[PRE140]'
- en: 'We try three different convolution layers for the `conv2` placeholder:'
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE141]'
  id: totrans-565
  prefs: []
  type: TYPE_PRE
  zh: '[PRE141]'
- en: 'We add skip connection technique:'
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE142]'
  id: totrans-567
  prefs: []
  type: TYPE_PRE
  zh: '[PRE142]'
- en: 'We add two candidates for fc1 placeholder:'
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE143]'
  id: totrans-569
  prefs: []
  type: TYPE_PRE
  zh: '[PRE143]'
- en: Figure [4-24](#Fig24) demonstrates the set of all possible architectures described
    by Listing [4-14](#PC139).
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig24_HTML.png)'
  id: totrans-571
  prefs: []
  type: TYPE_IMG
- en: Figure 4-24
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
- en: Set of all possible architectures
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
- en: We see that each mutator adds variance to the Base Model.
  id: totrans-574
  prefs: []
  type: TYPE_NORMAL
- en: Trial
  id: totrans-575
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'NAS Trial means the same as the Trial in the HPO context. It initializes the
    model, trains it, tests it, and returns model accuracy. There is only one new
    feature: you must use the `get_and_apply_next_architecture` method from `nn.algorithms.nas.tensorflow.classic_nas`
    package to initialize the model. Listing [4-15](#PC145) provides the NAS Trial.'
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
- en: '(Full code is provided in the corresponding file: *ch4/classic/trial.py*.)'
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE144]'
  id: totrans-578
  prefs: []
  type: TYPE_PRE
  zh: '[PRE144]'
- en: Search Space
  id: totrans-579
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'After the Trial script is defined, you should generate the search space JSON
    file manually using the following command:'
  id: totrans-580
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE145]'
  id: totrans-581
  prefs: []
  type: TYPE_PRE
  zh: '[PRE145]'
- en: The preceding command generates the file shown in Listing [4-16](#PC147).
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE146]'
  id: totrans-583
  prefs: []
  type: TYPE_PRE
  zh: '[PRE146]'
- en: As you can see, NNI Classic NAS implementation is pretty close to HPO implementation.
    The search space file is a list of all possible neural architecture choices.
  id: totrans-584
  prefs: []
  type: TYPE_NORMAL
- en: Search Strategy
  id: totrans-585
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Classic NAS supports the following Search Strategies:'
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
- en: '`Random Search`'
  id: totrans-587
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`PPO Tuner:` Reinforcement Learning Tuner based on Proximal Policy Optimization
    algorithm'
  id: totrans-588
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For more information about these tuners, you can refer to the subsection “Exploration
    Strategies” under the section “Neural Architecture Search Using Retiarii (PyTorch).”
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
- en: Experiment
  id: totrans-590
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The last thing left to do is to define the experiment configuration. Experiment
    configuration is defined in Listing [4-17](#PC148).
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE147]'
  id: totrans-592
  prefs: []
  type: TYPE_PRE
  zh: '[PRE147]'
- en: 'And now, we can start the experiment with the following command:'
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE148]'
  id: totrans-594
  prefs: []
  type: TYPE_PRE
  zh: '[PRE148]'
- en: Note
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
- en: Duration ~ 2 hours on Intel Core i7 with CUDA (GeForce GTX 1050)
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
- en: 'Experiment returns the best accuracy **0.9923** on test dataset, with the following
    parameter set:'
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE149]'
  id: totrans-598
  prefs: []
  type: TYPE_PRE
  zh: '[PRE149]'
- en: 'The preceding parameters can be interpreted as the following neural architecture:'
  id: totrans-599
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE150]'
  id: totrans-600
  prefs: []
  type: TYPE_PRE
  zh: '[PRE150]'
- en: The best neural architecture is shown in Figure [4-25](#Fig25).
  id: totrans-601
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig25_HTML.png)'
  id: totrans-602
  prefs: []
  type: TYPE_IMG
- en: Figure 4-25
  id: totrans-603
  prefs: []
  type: TYPE_NORMAL
- en: Best neural architecture
  id: totrans-604
  prefs: []
  type: TYPE_NORMAL
- en: Classic NAS does not differ too much from the HPO approach. Indeed, we could
    build the same experiment with layer and design hyperparameter search. We made
    a close trick in Chapter [2](526245_1_En_2_Chapter.xhtml), in the section “From
    LeNet to AlexNet.” Neural Architecture Search has made great strides lately, and
    Classic NAS cannot support new research ideas. In any case, you can still use
    Classic NAS and get meaningful results by searching for new solutions.
  id: totrans-605
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  id: totrans-606
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Multi-trial Neural Architecture Search using Retiarii and classic approaches
    offers clear and elegant solutions for searching robust neural architectures.
    Many meaningful results could be achieved using Multi-trial NAS. But this approach
    has one very serious drawback. It takes too much time. Indeed, complex models
    and massive datasets need too much time to train, and the Model Space can contain
    millions of model samples. Even the most advanced Exploration Strategy can take
    too much time to converge to some suboptimal neural architecture. But the time
    problem has a solution called One-shot NAS, and we will explore this method in
    the next chapter.
  id: totrans-607
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Retiarii和经典方法的多次试验神经架构搜索提供了搜索鲁棒神经架构的清晰和优雅的解决方案。使用多次试验神经架构搜索可以取得许多有意义的成果。但这种方法有一个非常严重的缺点，那就是它花费的时间太多。确实，复杂的模型和大量的数据集需要太多的时间来训练，而模型空间可能包含数百万个模型样本。即使是最高级的探索策略，也可能需要太多时间才能收敛到某些次优的神经架构。但时间问题有一个解决方案，称为一次性神经架构搜索（One-shot
    NAS），我们将在下一章中探讨这种方法。
