- en: Phew. It was not easy to follow the definition of ResNet Model Space if you
    are not familiar with ResNet yet. Anyway, don’t forget that NAS treats the neural
    network as Data Flow Graph, and it tries to find the optimal combination of nodes
    and connections in the Model Space we constructed in Figure [4-23](#Fig23). Even
    if some deep learning concepts are not familiar to you yet, try to treat the NAS
    as the search for the optimal subgraph in supergraph space.
  id: totrans-522
  prefs: []
  type: TYPE_NORMAL
- en: 'ResNet model evaluator is a classical neural network train–test algorithm.
    You can examine its code here: ch4/retiarii/cifar_10_resnet/eval.py. ResNet NAS
    Experiment script does not differ too much from LeNet NAS, and I don’t provide
    its code in the book. Please refer to the script file: ch4/retiarii/cifar_10_resnet/run_cifar10_resnet_experiment.py.'
  id: totrans-523
  prefs: []
  type: TYPE_NORMAL
- en: 'The experiment can be run as follows:'
  id: totrans-524
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE133]'
  id: totrans-525
  prefs: []
  type: TYPE_PRE
  zh: '[PRE133]'
- en: Note
  id: totrans-526
  prefs: []
  type: TYPE_NORMAL
- en: Duration ~ 60 hours on Intel Core i7 with CUDA (GeForce GTX 1050)
  id: totrans-527
  prefs: []
  type: TYPE_NORMAL
- en: 'The best model shows **0.957** accuracy on test dataset. That is not perfect,
    but a much better result than LeNet NAS produced (**0.84**). The best neural network
    architecture has the following parameters:'
  id: totrans-528
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE134]'
  id: totrans-529
  prefs: []
  type: TYPE_PRE
  zh: '[PRE134]'
- en: 'These parameters mean that the best model has the sequence of five Residual
    Cells: the first cell is not using the skipping connection technique, and the
    others use it. This is a predictable result because usually skipping connection
    technique raises neural network performance.'
  id: totrans-530
  prefs: []
  type: TYPE_NORMAL
- en: In this section, we have achieved a great result! CIFAR-10 is a highly complex
    computer vision problem, and even large, sophisticated neural networks cannot
    reach high accuracy with this dataset. Table [4-2](#Tab2) compares the architecture
    we have constructed in this section with other common architectures.
  id: totrans-531
  prefs: []
  type: TYPE_NORMAL
- en: Table 4-2
  id: totrans-532
  prefs: []
  type: TYPE_NORMAL
- en: Rating of the best architectures for CIFAR-10
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
