- en: '[PRE108]'
  id: totrans-444
  prefs: []
  type: TYPE_PRE
  zh: '[PRE108]'
- en: Also, it is convenient to visualize the architecture using Netron in Trial details
    panel. Figure [4-20](#Fig20) demonstrates the architecture of the best model.
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig20_HTML.jpg)'
