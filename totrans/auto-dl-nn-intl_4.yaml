- en: Retiarii uses import `nni.retiarii.nn.pytorch as nn` for PyTorch. It is very
    important to use layers from this package implementing NAS for PyTorch.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: First, we need to define the Model Space for Exploration. Model Space in the
    NAS context can be considered as search space in the HPO context. Model Space
