  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
- en: '`dim:` Input–output features for linear layer'
  id: totrans-376
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`dropout_rate:` Layer hyperparameter for dropout layer'
  id: totrans-377
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`activation:` Activation function'
  id: totrans-378
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`block_num`: Ordinal number of the block in Fully Connected sequence'
  id: totrans-379
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE80]'
  id: totrans-380
  prefs: []
  type: TYPE_PRE
  zh: '[PRE80]'
- en: 'Initializing linear layer:'
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE81]'
  id: totrans-382
  prefs: []
  type: TYPE_PRE
  zh: '[PRE81]'
- en: 'Declaring dropout and activation layers:'
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE82]'
  id: totrans-384
  prefs: []
  type: TYPE_PRE
  zh: '[PRE82]'
- en: 'Switch choice for two different branches:'
