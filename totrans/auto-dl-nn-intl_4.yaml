  prefs: []
  type: TYPE_NORMAL
- en: '`Linear` → `Dropout` → `Activation`'
  id: totrans-386
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`Linear` → `Activation`'
  id: totrans-387
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE83]'
  id: totrans-388
  prefs: []
  type: TYPE_PRE
  zh: '[PRE83]'
- en: 'Defining `forward` method:'
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE84]'
  id: totrans-390
  prefs: []
  type: TYPE_PRE
  zh: '[PRE84]'
- en: The following method is used in `Repeat` Mutator. It returns an appropriate
    `FullyConnectedBlock` by its ordinal number in the Fully Connected sequence.
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE85]'
  id: totrans-392
  prefs: []
  type: TYPE_PRE
  zh: '[PRE85]'
- en: And now we are ready to build LeNet Model Space.
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
