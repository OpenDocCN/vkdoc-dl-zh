  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
- en: 'And finally, we can construct the ResNet model. ResNet has the following architecture:'
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
- en: Initial convolution layer
  id: totrans-461
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Residual Cell sequence
  id: totrans-462
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Several Fully Connected layers
  id: totrans-463
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The optimal length of a Residual Cell sequence depends on the dataset. And we
    will try to find it in ResNet NAS. Figure [4-23](#Fig23) presents the complete
    Model Space for ResNet NAS.
  id: totrans-464
