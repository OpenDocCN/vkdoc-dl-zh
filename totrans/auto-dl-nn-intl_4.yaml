  type: TYPE_NORMAL
- en: 'Retiarii Evaluator is a function that accepts a model class, initiates a model,
    trains it, tests it, and returns a result to Experiment. Evaluator can be implemented
    using the following pattern:'
  prefs: []
  type: TYPE_NORMAL
