- en: 'The best model shows **0.84** accuracy on test dataset. It is not a bad result,
    but it seems there is still room for improvement. The best model has the following
    parameters:'
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE105]'
  id: totrans-437
  prefs: []
  type: TYPE_PRE
  zh: '[PRE105]'
- en: 'The preceding parameters can be interpreted the following way:'
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
- en: '`"fe_repeat": 2` – means that `Repeat` mutator generates the Feature Extraction
    sequence of two blocks:'
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE106]'
  id: totrans-440
  prefs: []
  type: TYPE_PRE
