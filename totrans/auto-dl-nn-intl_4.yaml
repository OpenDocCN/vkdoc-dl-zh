  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4-3
  prefs: []
