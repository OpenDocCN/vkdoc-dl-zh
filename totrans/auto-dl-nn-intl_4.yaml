- en: Repeat
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '`Repeat` mutator repeats some action a certain number of times. In the NAS
    context, the `Repeat` mutator tries to determine how often to iterate the same
    neural network block. For example, the ResNet neural network architecture implies
    a stack of Residual Blocks. But the optimal number of Residual Blocks may depend
    on the specific task. Figure [4-13](#Fig13) shows part of the ResNet architecture.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig13_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4-13
  prefs: []
  type: TYPE_NORMAL
- en: ResNet architecture
  prefs: []
  type: TYPE_NORMAL
- en: '`Repeat` mutator accepts a function that generates a block by its sequence
    number. Here is the pattern how `Repeat` mutator can be applied:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE45]'
  prefs: []
  type: TYPE_PRE
- en: 'We define a custom model block:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE46]'
  prefs: []
  type: TYPE_PRE
- en: 'Set a builder function that generates a block concerning its ordinal number
    in the stack:'
