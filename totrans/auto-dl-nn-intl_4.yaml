- en: 4. Multi-trial Neural Architecture Search
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: And now we come to the most exciting part of this book. As we noted at the end
    of the last chapter, HPO methods are pretty limited for automating the search
    for the optimal deep learning models, but **Neural Architecture Search** (**NAS**)
    dispels these limits. This chapter focuses on NAS, one of the most promising areas
    of automated deep learning. Automatic Neural Architecture Search is increasingly
    important in finding appropriate deep learning models. Recent researches have
    proven the NAS effectiveness and found some models that could beat manually tuned
    ones. NAS is a fairly young discipline in machine learning. It took shape as a
    separate discipline in 2018\. Since then, it has made a significant breakthrough
    in automating neural network architecture construction that solves a specific
    problem. The most manual design of neural networks can be replaced by automated
    architecture search soon, so this area is very up and coming for all data scientists.
    NAS produced many top computer vision architectures. Architectures like NASNet,
    EfficientNet, and MobileNet are the result of automated Neural Architecture Search.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
- en: 'There are two types of NAS: ***Multi-trial*** and ***One-shot***. In Multi-trial
    NAS, a model evaluator evaluates each sampled model’s performance, and an Exploration
    Strategy samples models from defined Model Space, while One-shot NAS tries to
    find optimal neural architecture training and exploring one Supernet derived from
    the Model Space. This chapter is dedicated to Multi-trial NAS.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: 'This chapter is divided into two parts: ***Neural Architecture Search Using
    Retiarii (PyTorch)*** and ***Classic Neural Architecture Search (TensorFlow)***.
    ***Retiarii*** is a deep learning framework that supports the exploratory training
    on a neural network Model Space developed by NNI experts. Retiarii is an advantageous
    approach that allows structuring and planning the NAS. Unfortunately, the NNI
    `2.7` version (which is used in this book) only implements the Retiarii approach
    for the PyTorch framework. And it would be unfair not to pay attention to the
    TensorFlow framework in this chapter, so the classic methods of NAS using NNI
    are considered in the *Classic Neural Architecture Search (TensorFlow)* part.
    In any case, NNI supports TensorFlow for One-shot NAS, which we will explore in
    the next chapter. Therefore, TensorFlow users will be able to take full advantage
    of NAS approaches.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: Neural Architecture As Data Flow Graph
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We will begin this chapter by defining how the NAS perceives the neural network
    architecture. Neural architecture is considered as a Data Flow Graph (DFG). DFG
    is a collection of nodes and connections between them. DFG displays the data transfer
    from one node to another. Each node has its own type and parameters. Figure [4-1](#Fig1)
    demonstrates an example of DFG.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig1_HTML.png)'
  id: totrans-6
  prefs: []
  type: TYPE_IMG
- en: Figure 4-1
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: Data Flow Graph
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: 'In Figure [4-1](#Fig1), we see the DFG, which contains different types of nodes
    with parameters. The architecture of each neural network can be represented as
    a Data Flow Graph. Indeed, in Figure [4-1](#Fig1), we can replace the rectangle
    node with a convolution layer with parameters: `padding`, `stride`, `filter_size`,
    etc. Neural Architecture Search Explorers have no idea about the nature of each
    of the DFG nodes. The main task is to construct a DFG from various deep learning
    layers, which forms the architecture of a neural network and solves a specific
    problem in the best way.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: Neural Architecture Search Using Retiarii (PyTorch)
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Retiarii is the framework developed by NNI experts, and it is the first framework
    that supports deep learning exploratory training. Exploratory training implies
    that different deep neural networks (DNNs) training results are shared. This approach
    compares training of different models, performs optimization, and stops unpromising
    models with poor intermediate results. Also, Retiarii provides a new interface
    to specify a deep learning Model Space for exploration and an interface to describe
    the Exploration Strategy that decides the order to instantiate and train models
    in, prioritize model training, and stop the training of certain models. Retiarii
    identifies the correlations between the instantiated models and develops a set
    of cross-model optimizations to improve the overall exploratory training process.
    You can read more information about the Retiarii framework in the following article:
    [`www.usenix.org/system/files/osdi20-zhang_quanlu.pdf`](http://www.usenix.org/system/files/osdi20-zhang_quanlu.pdf).'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: 'NNI version `2.7` has a PyTorch-only implementation of the Retiarii framework.
    In the next NNI releases, the TensorFlow implementation should be added. Please
    refer to the official documentation to check the actual state: [`https://nni.readthedocs.io/en/v2.7/nas/overview.html`](https://nni.readthedocs.io/en/v2.7/nas/overview.html).'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: Introduction to NAS Using Retiarii
  id: totrans-13
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The best way to dive into NAS using Retiarii is to examine a simple example
    of finding the optimal DFG for a particular task. We will not go deep into the
    design of neural networks but will focus on a simple arithmetic problem. Suppose
    we have some chain of operators *F*, which performs the following actions:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-15
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'We can enrich the chain *F* with the following statements:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-17
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The Model Space of this problem can be depicted as shown in Figure [4-2](#Fig2).
    We need to find a DFG that maximizes output.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig2_HTML.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
- en: Figure 4-2
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: Data Flow Graph Model Space
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: Of course, this is a trivial task, but it is well suited as an introductory
    example of using the Retiarii framework in NNI. Let’s move on to solving this
    problem. Listing [4-1](#PC3) defines the Model Space.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: 'We import common modules:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Retiarii uses import `nni.retiarii.nn.pytorch as nn` for PyTorch. It is very
    important to use layers from this package implementing NAS for PyTorch.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: First, we need to define the Model Space for Exploration. Model Space in the
    NAS context can be considered as search space in the HPO context. Model Space
    is represented by a class that contains all possible architectures to try. Each
    such class must be annotated with `@model_wrapper`.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'Different variants of the neural network architecture are determined by special
    methods called *Mutators*. Mutators define the rules for different variations
    or mutations of the model. The `LayerChoice` mutator defines different layer choices.
    In the following, `LayerChoice` selects one of three layers: `Tanh`, `Sigmoid`,
    and `ReLU`:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'Another type of mutation is `ValueChoice`. This mutator selects one of the
    values ​​from the list:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'Next, we define the `LayerChoice` mutator again:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'Finally, we chain all operators together, as shown in Figure [4-2](#Fig2):'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'After, we define the `evaluate` method, which returns the model result:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'Evaluating the model:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: This code is used for model architecture visualization. We will get back to
    this technique later.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'Returning the result:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Once we have defined the Model Space and its instance Evaluation, we can move
    on to launching the experiment with the code shown in Listing [4-2](#PC14).
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: 'Importing necessary modules:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'There are seven main steps to launch the Retiarii Experiment:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: 'We set the Model Space:'
  id: totrans-49
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'We define the Evaluator, which evaluates model instance:'
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE14]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'Next, we chose a Search Strategy that explores the Model Space:'
  id: totrans-52
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE15]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 'We initialize the Retiarii Experiment with defined Model Space, Evaluator,
    and Search Strategy:'
  id: totrans-54
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE16]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: 'Setting Experiment configuration:'
  id: totrans-56
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE17]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: 'Launching Experiment:'
  id: totrans-58
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE18]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: 'Returning best results. We can analyze the Experiment’s results in WebUI before
    exit:'
  id: totrans-60
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE19]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: '[PRE20]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: After the experiment is completed, we can analyze the Trial jobs panel examining
    the best results.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig3_HTML.jpg)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
- en: Figure 4-3
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: Trial jobs panel
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: 'As shown in Figure [4-3](#Fig3), the best model returns 16\. And it has the
    following set of parameters:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: The preceding parameters are not self-describing, so we can use the visualization
    function to render DFG render as shown in Figure [4-4](#Fig4).
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig4_HTML.jpg)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
- en: Figure 4-4
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: Visualization panel
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: NNI uses Netron to visualize trial models. Netron is a tiny viewer for neural
    networks, deep learning, and machine learning models. Clicking the `Netron` button,
    you’ll see the screen as shown in Figure [4-5](#Fig5).
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig5_HTML.jpg)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
- en: Figure 4-5
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: Netron model visualization
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: Now we can declare that we have found a solution to the problem of finding a
    model that maximizes the value of the chain of operators *F*. The Data Flow Graph
    of this model is shown in Figure [4-6](#Fig6).
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig6_HTML.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
- en: Figure 4-6
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: Best Data Flow Graph in Model Space
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: The purpose of this example was to demonstrate that the primary goal of a NAS
    approach is to find a DFG that maximizes (or minimizes) a black-box function.
    In the same way HPO methods are searching for parameters that maximize (or minimize)
    the black-box function. After introducing basic NAS techniques, we can dive into
    more details.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: Retiarii Framework
  id: totrans-82
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Retiarii framework is designed to separate the main logical entities of Neural
    Architecture Search. This makes the NAS procedure clear and elegant. Using the
    Retiarii framework, the researcher can only focus on particular aspects of the
    investigation. The main components of the Retiarii framework are
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: Base Model
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Mutator
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Model Space
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Evaluator
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Exploration Strategy
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Base Model* is the primary skeleton of a neural network. Base Model is actually
    a simple deep learning model that solves some problem. Often the Base Model does
    not show good performance. But it has some primary neural architecture and training
    algorithm.'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: '*Mutator* is a possible change that a Base Model can be subjected to. Mutator
    defines the transformation of the Base Model architecture into another one. Usually,
    many mutators are applied to Base Model.'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: '*Model Space* is the set of all possible Base Model mutations. Each mutator
    generates several variants of neural network architectures. Applying all mutators
    to the Base Model defines the Model Space.'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: '*Evaluator* measures the performance of a sample from the Model Space. This
    is a typical algorithm for training and testing a neural network.'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: '*Exploration Strategy* defines the Model Space exploration algorithm. The main
    objective of the Exploration Strategy is to find the best model in the least number
    of trials.'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: All these concepts are pretty familiar to us after studying Hyperparameter Optimization.
    Table [4-1](#Tab1) contains the main logical entities from NAS and HPO. As you
    can see, they mean almost the same thing.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: Table 4-1
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: NAS and HPO logical entities
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
- en: '| NAS | HPO |'
  id: totrans-97
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  id: totrans-98
  prefs: []
  type: TYPE_TB
- en: '| Base Model + Mutator | Search space type |'
  id: totrans-99
  prefs: []
  type: TYPE_TB
- en: '| Model Space | Search space |'
  id: totrans-100
  prefs: []
  type: TYPE_TB
- en: '| Evaluator | Trial |'
  id: totrans-101
  prefs: []
  type: TYPE_TB
- en: '| Exploration Strategy | Tuner |'
  id: totrans-102
  prefs: []
  type: TYPE_TB
- en: Figure [4-7](#Fig7) illustrates the relationship of various components in the
    Retiarii framework.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig7_HTML.png)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
- en: Figure 4-7
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: Retiarii framework
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
- en: Let’s go ahead and look at each of these components in detail.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: Base Model
  id: totrans-108
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The Base Model is a starting point from which all possible architecture modifications
    will be made. For example, the Base Model for NAS of the MNIST problem can be
    presented as it is shown in Listing [4-3](#PC23).
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
- en: 'Importing PyTorch modules:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  id: totrans-111
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: 'You must use the `nni.retiarii.nn.pytorch as nn` module to declare layers in
    a deep learning model:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  id: totrans-113
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: Base Model must be annotated with `nni.retiarii.model_wrapper():`
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  id: totrans-115
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: 'Next, we have the classic LeNet model design for the digit recognition problem:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE25]'
  id: totrans-117
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: 'Frequent mistakes in Base Model design are:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
- en: Missing `@model_wrapper` annotation on Base Model
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using `import torch.nn as nn` instead of `nni.retiarii.nn.pytorch as nn` declaring
    layers
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Mutators
  id: totrans-121
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Base Model is a single model. To create Model Space, we have to add Mutators
    to the Base Model. Each mutator provides a way to change the Base Model. All possible
    mutations applied to the Base Model form the Model Space. NNI provides the following
    mutation operations: `LayerChoice`, `ValueChoice`, `InputChoice`, and `Repeat`.'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
- en: LayerChoice
  id: totrans-123
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '`LayerChoice` mutator forms the candidate layers for a layer placeholder. One
    of these layers is tried in the exploration process. `LayerChoice` mutator is
    applied to the Base Model the following way:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE26]'
  id: totrans-125
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: '`LayerChoice` adds layer variations to the Base Model as shown in Figure [4-8](#Fig8).'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig8_HTML.png)'
  id: totrans-127
  prefs: []
  type: TYPE_IMG
- en: Figure 4-8
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
- en: LayerChoice Mutator
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
- en: '`LayerChoice` is the most straightforward way to mutate the Base Model.'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
- en: ValueChoice
  id: totrans-131
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '`ValueChoice` forms the list of single values to be tried as layer hyperparameters.
    `ValueChoice` can be used as layer hyperparameters only. It cannot be used as
    an arbitrary hyperparameter like `batch_size` or `learning_rate` in the evaluation
    process. `ValueChoice` mutator is applied to the Base Model the following way:'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE27]'
  id: totrans-133
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: '`ValueChoice` can be considered as a layer hyperparameter in the HPO context.'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
- en: InputChoice
  id: totrans-135
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '`InputChoice` tries different connections. It takes several tensors and chooses
    `n_chosen` tensors from them. `InputChoice` mutator is applied to the Base Model
    the following way:'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE28]'
  id: totrans-137
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: '`InputChoice` is designed to find the best data flow branches in neural network
    architecture. Figure [4-9](#Fig9) illustrates this concept.'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig9_HTML.png)'
  id: totrans-139
  prefs: []
  type: TYPE_IMG
- en: Figure 4-9
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
- en: InputChoice Mutator
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
- en: 'If `InputChoice` picks more than one candidate tensors (i.e., `n_chosen` >
    1), then the reduction strategy is applied: `sum`, `mean`, `concat`. This is a
    very useful technique that allows to extract and merge several connections at
    the same time. `InputChoice` for multiple candidates with reduction can be applied
    the following way:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE29]'
  id: totrans-143
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: The preceding code generates the search space shown in Figure [4-10](#Fig10).
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig10_HTML.png)'
  id: totrans-145
  prefs: []
  type: TYPE_IMG
- en: Figure 4-10
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
- en: InputChoice Mutator for multiple candidates
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
- en: '`InputChoice` Mutator for multiple candidates can choose the same tensor several
    times. It happens when other connections do not bring any helpful information
    to neural network performance.'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
- en: 'Also, `InputChoice` allows adding skip connection technique to neural architecture.
    Skip connection is one of the core techniques in modern neural network design.
    It was first introduced in 2015 in “Deep Residual Learning for Image Recognition”
    ([`https://arxiv.org/pdf/1512.03385.pdf`](https://arxiv.org/pdf/1512.03385.pdf)).
    Skip connection can be implemented using the following pattern:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE30]'
  id: totrans-150
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: In the first case, the model will use the skip connection technique, but not
    in the second one. Figure [4-11](#Fig11) demonstrates skip connection mutation.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig11_HTML.png)'
  id: totrans-152
  prefs: []
  type: TYPE_IMG
- en: Figure 4-11
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
- en: InputChoice. Skip connection mutation
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s examine the application of the `InputChoice` mutator using an arithmetic
    DFG as an example. Say we have *x* = 1 and three operator pipelines which consist
    of multiplication operators:'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE31]'
  id: totrans-156
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: 'You need to select two pipelines whose sum is maximum. You can select the same
    pipeline twice. This is a fairly simple task. It is intuitively clear that the
    sum of the last pipeline will give the maximum value. Let’s run the third pipeline:
    1 → 1 × 2 → 2 × 3 → 6 × 4 → 24; thus, the maximum value we can obtain is `48`.'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s obtain the same result using NNI and `InputChoice` Mutator using Listing
    [4-4](#PC33).
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
- en: 'Importing common modules:'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE32]'
  id: totrans-160
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: 'Importing `nni` modules:'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE33]'
  id: totrans-162
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: '`ProdBlock` acts as a multiplier operator. It simply multiplies the tensor
    by some value:'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE34]'
  id: totrans-164
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: 'Next, we define the Model Space:'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE35]'
  id: totrans-166
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: We declare multiplier operators
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE36]'
  id: totrans-168
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: 'and `InputChoice` mutator that will select the best pair of pipelines:'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE37]'
  id: totrans-170
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: '`forward` action executes three different pipelines, and `InputChoice` mutator
    tries only two of them:'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE38]'
  id: totrans-172
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: 'First pipeline: `x` → `(x × 2)`'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE39]'
  id: totrans-174
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: 'Second pipeline: 2: `x` → `(x × 2)` → `(x × 3)`'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE40]'
  id: totrans-176
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: 'Third pipeline: `x` → `(x × 2)` → `(x × 3)` → `(x × 4)`'
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE41]'
  id: totrans-178
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: 'Here is the evaluation function:'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE42]'
  id: totrans-180
  prefs: []
  type: TYPE_PRE
  zh: '[PRE42]'
- en: 'Now we can run the experiment using this script:'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE43]'
  id: totrans-182
  prefs: []
  type: TYPE_PRE
  zh: '[PRE43]'
- en: 'You can analyze the results on the WebUI detail page: [`http://127.0.0.1:8080/detail`](http://127.0.0.1:8080/detail).'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig12_HTML.jpg)'
  id: totrans-184
  prefs: []
  type: TYPE_IMG
- en: Figure 4-12
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
- en: InputChoice Experiment results
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
- en: 'In Figure [4-12](#Fig12), we see 3² = 9 trials. The best trial shows 48 and
    has the following parameters: `{ "model_1_0": 2, "model_1_1": 2 }`, which means
    that the best result is achieved with the last pipelines.'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE44]'
  id: totrans-188
  prefs: []
  type: TYPE_PRE
  zh: '[PRE44]'
- en: Such simple examples help to understand better how mutators act before proceeding
    to a real NAS.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
- en: Repeat
  id: totrans-190
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '`Repeat` mutator repeats some action a certain number of times. In the NAS
    context, the `Repeat` mutator tries to determine how often to iterate the same
    neural network block. For example, the ResNet neural network architecture implies
    a stack of Residual Blocks. But the optimal number of Residual Blocks may depend
    on the specific task. Figure [4-13](#Fig13) shows part of the ResNet architecture.'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig13_HTML.png)'
  id: totrans-192
  prefs: []
  type: TYPE_IMG
- en: Figure 4-13
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
- en: ResNet architecture
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
- en: '`Repeat` mutator accepts a function that generates a block by its sequence
    number. Here is the pattern how `Repeat` mutator can be applied:'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE45]'
  id: totrans-196
  prefs: []
  type: TYPE_PRE
  zh: '[PRE45]'
- en: 'We define a custom model block:'
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE46]'
  id: totrans-198
  prefs: []
  type: TYPE_PRE
  zh: '[PRE46]'
- en: 'Set a builder function that generates a block concerning its ordinal number
    in the stack:'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE47]'
  id: totrans-200
  prefs: []
  type: TYPE_PRE
  zh: '[PRE47]'
- en: 'Defining `Repeat` mutator:'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE48]'
  id: totrans-202
  prefs: []
  type: TYPE_PRE
  zh: '[PRE48]'
- en: 'Evaluating `Repeat` mutator:'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE49]'
  id: totrans-204
  prefs: []
  type: TYPE_PRE
  zh: '[PRE49]'
- en: Therefore, it would be handy to have a tool that iteratively constructs block
    stacks of various lengths. And that’s what the `Repeat` Mutator does. Let’s examine
    the implementation of the `Repeat` mutator for a synthetic arithmetic task, as
    we did for the `InputChoice` mutator. Say we have a sequence of blocks that add
    values ​​to a tensor. And we need to find the optimal length of this sequence.
    Listing [4-5](#PC51) describes the Model Space for this problem.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
- en: '`AddBlock` acts as an addition operator. It simply adds some value to the input
    tensor.'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE50]'
  id: totrans-207
  prefs: []
  type: TYPE_PRE
  zh: '[PRE50]'
- en: 'Builder function that creates `AddBlock` by its ordinal number:'
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE51]'
  id: totrans-209
  prefs: []
  type: TYPE_PRE
  zh: '[PRE51]'
- en: 'Next, we define the Model Space:'
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE52]'
  id: totrans-211
  prefs: []
  type: TYPE_PRE
  zh: '[PRE52]'
- en: '`Repeat` mutator generates block sequences of different lengths (from 1 to
    5):'
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE53]'
  id: totrans-213
  prefs: []
  type: TYPE_PRE
  zh: '[PRE53]'
- en: You can examine the experiment by running
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE54]'
  id: totrans-215
  prefs: []
  type: TYPE_PRE
  zh: '[PRE54]'
- en: 'In fact, the primitive mutators `LayerChoice`, `ValueChoice`, `InputChoice`,
    and `Repeat` allow you to construct a space of any complexity. These mutators
    can be compared to programming language directives:'
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
- en: '*set*: `LayerChoice, ValueChoice`'
  id: totrans-217
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*if*: `InputChoice`'
  id: totrans-218
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*loop*: `Repeat`'
  id: totrans-219
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Later in this chapter, we will examine a Model Space construction for a real
    NAS task using these mutators.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
- en: Labeling
  id: totrans-221
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: All the mutator APIs have an optional argument `label`. Mutators with the same
    `label` will share the same value. A typical example is
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE55]'
  id: totrans-223
  prefs: []
  type: TYPE_PRE
  zh: '[PRE55]'
- en: which is the same as
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE56]'
  id: totrans-225
  prefs: []
  type: TYPE_PRE
  zh: '[PRE56]'
- en: Example
  id: totrans-226
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Listing [4-6](#PC58) demonstrates a trivial example of the Model Space applied
    to the image classification network.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE57]'
  id: totrans-228
  prefs: []
  type: TYPE_PRE
  zh: '[PRE57]'
- en: 'Applying `LayerChoice` mutator:'
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE58]'
  id: totrans-230
  prefs: []
  type: TYPE_PRE
  zh: '[PRE58]'
- en: 'Applying `ValueChoice` mutator as `Dropout` layer hyperparameter value:'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE59]'
  id: totrans-232
  prefs: []
  type: TYPE_PRE
  zh: '[PRE59]'
- en: 'Applying `ValueChoice` mutator as `Linear` hyperparameter value:'
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE60]'
  id: totrans-234
  prefs: []
  type: TYPE_PRE
  zh: '[PRE60]'
- en: Evaluators
  id: totrans-235
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Retiarii Evaluator is a function that accepts a model class, initiates a model,
    trains it, tests it, and returns a result to Experiment. Evaluator can be implemented
    using the following pattern:'
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE61]'
  id: totrans-237
  prefs: []
  type: TYPE_PRE
  zh: '[PRE61]'
- en: Retiarii Evaluator is pretty close to the Trial approach we used in HPO in previous
    chapters.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
- en: Exploration Strategies
  id: totrans-239
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'NNI provides the following exploration strategies for Multi-shot NAS: *Random
    Strategy*, *Grid Search*, *Regularized Evolution*, *TPE Strategy*, and *RL Strategy*.
    We are already familiar with some of them because they implement the same approach
    as corresponding HPO Tuners. But anyway, let’s briefly study each of them.'
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
- en: Random Strategy
  id: totrans-241
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Random Strategy (`nni.retiarii.strategy.Random`) randomly samples new models
    from the Model Space. It is a simple but still effective technique to Explore
    Model Space. Random Search is a good first-time Exploration Strategy, and it can
    give you good clues when you have no idea about the dataset you are dealing with
    and suitable architecture designs. Usually, Random Search is used first, and after
    the Model Space is refined, a more intelligent Exploration Strategy is applied.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
- en: Grid Search
  id: totrans-243
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Grid Search Strategy (`nni.retiarii.strategy.GridSearch`) samples new models
    from Model Space using a Grid Search algorithm.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
- en: Regularized Evolution
  id: totrans-245
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Regularized Evolution Strategy (`nni.retiarii.strategy.RegularizedEvolution`)
    implements Genetic Algorithm Search with mutation operator using Tournament Selection
    method. Regularized Evolution Strategy is close to Evolution Tuner we studied
    in Chapter [3](526245_1_En_3_Chapter.xhtml). Pseudo-code that describes Regularized
    Evolution Algorithm is provided in the following.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
- en: 'Regularized Evolution Strategy has three global hyperparameters:'
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
- en: '`POPULATION_SIZE`: The size of a population that will try to participate in
    evolution search'
  id: totrans-248
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`CANDIDATES_N`: Number of candidates Tournament Selection method will pick
    from the population'
  id: totrans-249
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`GENERATION_N`: Total number of cycles'
  id: totrans-250
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE62]'
  id: totrans-251
  prefs: []
  type: TYPE_PRE
  zh: '[PRE62]'
- en: 'The population is initialized with random individuals (i.e., random neural
    architecture):'
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE63]'
  id: totrans-253
  prefs: []
  type: TYPE_PRE
  zh: '[PRE63]'
- en: 'Algorithm picks `CANDIDATES_N` random individuals from population:'
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE64]'
  id: totrans-255
  prefs: []
  type: TYPE_PRE
  zh: '[PRE64]'
- en: 'From these candidates, the best one is selected (i.e., the individual that
    has the best metric):'
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE65]'
  id: totrans-257
  prefs: []
  type: TYPE_PRE
  zh: '[PRE65]'
- en: 'Random mutation is performed on the best candidate (i.e., algorithm runs several
    Mutators in the original model):'
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE66]'
  id: totrans-259
  prefs: []
  type: TYPE_PRE
  zh: '[PRE66]'
- en: 'Mutant individual is being evaluated:'
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE67]'
  id: totrans-261
  prefs: []
  type: TYPE_PRE
  zh: '[PRE67]'
- en: 'Mutant replaces the worst individual in the population:'
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE68]'
  id: totrans-263
  prefs: []
  type: TYPE_PRE
  zh: '[PRE68]'
- en: Figure [4-14](#Fig14) demonstrates the algorithm of Regularized Evolution Strategy.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig14_HTML.png)'
  id: totrans-265
  prefs: []
  type: TYPE_IMG
- en: Figure 4-14
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
- en: Regularized Evolution Strategy
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
- en: 'The implementation of Regularized Evolution Strategy has the following parameters:'
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
- en: '`optimize_mode:`'
  id: totrans-269
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Type**: `string`'
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
- en: '**Default**: `maximize`'
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
- en: '**Values**: ’`maximize`’ | ’`minimize`’'
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
- en: Sets the evolution direction.
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
- en: '`population_size:`'
  id: totrans-274
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Type**: `int`'
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
- en: '**Default**: `100`'
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
- en: The number of individuals in the population.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
- en: '`cycles:`'
  id: totrans-278
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Type**: `int`'
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
- en: '**Default**: `20000`'
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
- en: The number of generations of the algorithm.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
- en: '`sample_size:`'
  id: totrans-282
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Type**: `int`'
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
- en: '**Default**: `25`'
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
- en: The number of individuals that should participate in each Tournament Selection.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
- en: '`mutation_prob:`'
  id: totrans-286
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Type**: `float`'
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
- en: '**Default**: `0.05`'
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
- en: Probability that mutation occurs in each mutator in the Model Space.
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
- en: 'For more details, please refer to the original paper describing Regularized
    Evolution approach: [`https://arxiv.org/abs/1802.01548`](https://arxiv.org/abs/1802.01548).'
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
- en: TPE Strategy
  id: totrans-291
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: TPE Strategy (`nni.retiarii.strategy.TPEStrategy`) is a Sequential Model-Based
    Optimization approach based on Tree-structured Parzen Estimator. It acts the same
    way as TPE Tuner we studied in Chapter [3](526245_1_En_3_Chapter.xhtml).
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
- en: 'For more details, please refer to the original paper describing the TPE approach:
    [`https://papers.nips.cc/paper/2011/file/86e8f7ab32cfd12577bc2619bc635690-Paper.pdf`](https://papers.nips.cc/paper/2011/file/86e8f7ab32cfd12577bc2619bc635690-Paper.pdf).'
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
- en: RL Strategy
  id: totrans-294
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: RL Strategy (`nni.retiarii.strategy.PolicyBasedRL`) implements the Reinforcement
    Learning approach based on policy-gradient method (Proximal Policy Optimization
    or PPO). RL Strategy implements a special Recurrent Neural Network called Controller.
    Controller generates various model architectures from Model Space. The Controller
    acts as a stochastic policy; hence, it returns the mutation probability for each
    of the Mutators in the Model Space. After each trial, the Controller updates the
    weights of its RNN according to the Proximal Optimization Policy method. This
    approach allows exploring the Model Space by constructing a probability distribution
    for each of the mutators.
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
- en: Figure [4-15](#Fig15) demonstrates RL Strategy in action.
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig15_HTML.png)'
  id: totrans-297
  prefs: []
  type: TYPE_IMG
- en: Figure 4-15
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
- en: Reinforcement Learning (Proximal Policy Optimization) Strategy
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
- en: RL Strategy requires `tianshou` package to be installed. Tianshou is a Reinforcement
    Learning platform based on pure PyTorch.
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE69]'
  id: totrans-301
  prefs: []
  type: TYPE_PRE
  zh: '[PRE69]'
- en: 'The implementation of RL Strategy has the following parameters:'
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
- en: '`max_collect`:'
  id: totrans-303
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Type**: `int`'
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
- en: '**Default**: `100`'
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
- en: How many epochs Exploration Strategy performs.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
- en: '`Trial_per_collect`:'
  id: totrans-307
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Type**: `int`'
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
- en: '**Default**: `20`'
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
- en: How many trials (trajectories) each time collector collects. After each completed
    trajectory, the trainer will sample the batch from the replay buffer and do the
    Controller update.
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
- en: 'For more details, please refer to the original paper describing the Neural
    Architecture Search with Reinforcement Learning: [`https://arxiv.org/pdf/1611.01578.pdf`](https://arxiv.org/pdf/1611.01578.pdf).'
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
- en: Experiment
  id: totrans-312
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
