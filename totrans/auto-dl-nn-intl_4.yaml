  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`activation:` Activation function'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`block_num`: Ordinal number of the block in Feature Extraction sequence'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
