- en: Therefore, it would be handy to have a tool that iteratively constructs block
    stacks of various lengths. And that‚Äôs what the `Repeat` Mutator does. Let‚Äôs examine
    the implementation of the `Repeat` mutator for a synthetic arithmetic task, as
    we did for the `InputChoice` mutator. Say we have a sequence of blocks that add
