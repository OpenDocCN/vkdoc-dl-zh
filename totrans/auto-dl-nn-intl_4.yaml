- en: The Model Space of this problem can be depicted as shown in Figure [4-2](#Fig2).
    We need to find a DFG that maximizes output.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig2_HTML.png)'
