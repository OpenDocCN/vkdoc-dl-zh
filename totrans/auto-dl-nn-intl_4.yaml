  prefs: []
  type: TYPE_IMG
- en: Figure 4-20
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
- en: LeNet NAS Best Model Architecture
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
- en: The research we made in this section can be a good starting point for your own
    NAS solutions. It contains basic techniques used in Multi-trial NAS. Here, we
    used the LeNet model as the Base Model, but you can choose any model and any mutators
    that fit the concrete problem better. But we haven’t achieved a great result in
    the LeNet NAS. In the next section, we’ll try another NAS with a more sophisticated
    approach.
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
- en: CIFAR-10 ResNet NAS
  id: totrans-450
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s try to find another approach to the architecture search that solves the
    CIFAR-10 problem. In 2015, the article “Deep Residual Learning for Image Recognition”
    ([`https://arxiv.org/pdf/1512.03385.pdf`](https://arxiv.org/pdf/1512.03385.pdf))
    was published. This article had a huge impact on deep learning in general. It
    introduced the concept of a residual term, which could degrade the blocks of the
    neural network, which overwhelmed its performance.
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
- en: The basic building block of the ResNet model is the Bottleneck block. Original
    Bottleneck block skips connections inside. But we will add this as an optional
    feature. NAS algorithm will define if it is appropriate to use the skip connection
    technique for the Bottleneck block. So there are two variants of Bottleneck block
    in ResNet NAS *with* and *without* skip connection technique. The architecture
    of the Bottleneck block space can be demonstrated as shown in Figure [4-21](#Fig21).
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig21_HTML.png)'
  id: totrans-453
  prefs: []
  type: TYPE_IMG
- en: Figure 4-21
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
- en: Bottleneck block space
  id: totrans-455
  prefs: []
  type: TYPE_NORMAL
- en: Another component of ResNet is the Residual Cell. Residual Cell consists of
    a sequence of Bottleneck blocks. The optimal length of the Bottleneck sequence
    in Residual Cell depends on the concrete dataset. Figure [4-22](#Fig22) shows
    the Residual Cell space.
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_4_Chapter/526245_1_En_4_Fig22_HTML.png)'
