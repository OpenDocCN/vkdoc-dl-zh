- en: Before building the recommendation model, the required data must be in the proper
    format so that the model can take input. Let’s get the user-to-product interaction
    matrix and product-to-features interaction mappings.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 在构建推荐模型之前，所需数据必须以适当的格式存在，以便模型可以接收输入。让我们获取用户与产品交互矩阵和产品到特征的交互映射。
- en: Start with getting the list of unique users and unique products. Write two functions
    to get the unique lists.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
