- en: '[PRE18]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Now that the data and the ID mappings are in place, to get the user-to-product
    and product-to-features interaction matrix, let’s first create a function that
    returns the interaction matrix.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 现在数据和ID映射已经就绪，为了获取用户与产品以及产品到特征的交互矩阵，我们首先创建一个返回交互矩阵的函数。
