- en: Then let’s generate user_item_interaction_matrix for train and test data using
    the preceding function.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，让我们使用前面的函数生成训练和测试数据的user_item_interaction_matrix。
