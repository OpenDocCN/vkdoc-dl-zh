- en: 6. Hybrid Recommender Systems
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The previous chapters implemented recommendation engines using content-based
    and collaborative-based filtering methods. Each method has its pros and cons.
    Collaborative filtering suffers from cold-start, which means when there is a new
    customer or item in the data, recommendation won’t be possible.
  prefs: []
  type: TYPE_NORMAL
- en: Content-based filtering tends to recommend similar items to that purchased/liked
    before, becoming repetitive. There is no personalization effect in this case.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [6-1](#Fig1) explains hybrid recommendation systems.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537881_1_En_6_Chapter/537881_1_En_6_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: An architecture of hybrid recommendation system. It starts from researcher to
    content-based filtering, hybrid recommendation, and collaborative filtering.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-1
  prefs: []
  type: TYPE_NORMAL
- en: Hybrid recommendation systems
  prefs: []
  type: TYPE_NORMAL
- en: '*Reference:* [`https://www.researchgate.net/profile/Xiangjie-Kong-2/publication/330077673/figure/fig5/AS:710433577107459@1546391972632/A-hybrid-paper-recommendation-system.png`](https://www.researchgate.net/profile/Xiangjie-Kong-2/publication/330077673/figure/fig5/AS:710433577107459%25401546391972632/A-hybrid-paper-recommendation-system.png)'
  prefs: []
  type: TYPE_NORMAL
- en: To tackle some of these cons, introducing hybrid recommendations systems. Hybrid
    recommendation systems use a hybrid model (i.e., combining content-based and collaborative
    filtering methods). It will not only help to overcome the shortcomings of the
    individual models but also increase efficiency and give better recommendations
    in most cases.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter implements a hybrid recommendation engine built to recommend products
    used for an e-commerce company. The LightFM Python package is used for this implementation.
  prefs: []
  type: TYPE_NORMAL
- en: For more information, refer to the LightFM documentation at [`https://making.lyst.com/lightfm/docs/home.html`](https://making.lyst.com/lightfm/docs/home.html).
  prefs: []
  type: TYPE_NORMAL
