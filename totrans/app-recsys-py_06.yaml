  prefs: []
  type: TYPE_NORMAL
  zh: 让我们创建一个函数，从DataFrame中根据三个特征名称获取唯一值的总列表。它获取三个特征的唯一值列表：客户细分、年龄和性别。
- en: '[PRE9]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Call the function for these features.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 为这些特征调用该函数。
- en: '[PRE10]'
  id: totrans-56
