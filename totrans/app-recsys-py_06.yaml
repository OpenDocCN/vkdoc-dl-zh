- en: '[PRE22]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: Model Building
  id: totrans-92
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型构建
- en: The data is in the correct format, so let’s begin the modeling process. This
    chapter uses the LightFM model, which can incorporate user and item metadata to
    form robust hybrid recommendation models.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 数据格式正确，因此让我们开始建模过程。本章使用LightFM模型，该模型可以结合用户和商品元数据来形成稳健的混合推荐模型。
- en: Let’s try multiple models and then choose the one with the best performance.
    These models have different hyperparameters, so this is part of the hyperparameter
    tuning stage of modeling.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尝试多个模型，然后选择表现最好的一个。这些模型有不同的超参数，因此这是建模的超参数调整阶段的一部分。
- en: The loss function used in the model is one of the parameters to tune. The three
    values are warp, logistic, and bpr.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 模型中使用的损失函数是调整参数之一。这三个值是warp、logistic和bpr。
- en: Let’s start the model-building experiment.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始模型构建实验。
- en: Attempt 1 is loss = warp, epochs = 1, and num_threads = 4.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试1的损失函数为warp，迭代次数为1，线程数为4。
- en: '[PRE23]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: The following is the output.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是输出结果。
- en: '[PRE24]'
  id: totrans-100
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: Calculate the area under the curve (AUC) score for validation.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 计算验证的曲线下面积（AUC）分数。
- en: '[PRE25]'
  id: totrans-102
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: The following is the output.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是输出结果。
- en: '[PRE26]'
  id: totrans-104
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: Attempt 2 is loss = logistic, epochs = 1, and num_threads = 4.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试2的损失函数为logistic，迭代次数为1，线程数为4。
- en: '[PRE27]'
