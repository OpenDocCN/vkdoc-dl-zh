- en: '![$$ =\int {p}_{\uptheta}(x)\frac{\nabla_{\uptheta}{p}_{\uptheta}(x)}{p_{\uptheta}(x)}{x}^2
    dx $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equk.png)'
  id: totrans-218
