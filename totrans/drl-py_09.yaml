- en: 9. Combining Policy Gradient and Q-Learning
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 9. 结合政策梯度与Q-Learning
- en: So far in this book, in the context of deep learning combined with reinforcement
    learning, Chapters [6](502835_2_En_6_Chapter.xhtml) and [7](502835_2_En_7_Chapter.xhtml)
    explained deep Q-learning with its variants. You looked at policy gradients in
    Chapter [8](502835_2_En_8_Chapter.xhtml). Neural network training requires multiple
    iterations, and Q-learning, an off-policy approach, enables you to reuse sample
    transitions multiple times, giving you sample efficiency. However, Q-learning
    can be unstable at times. Further, it is an indirect way of learning. Instead
    of learning an optimal policy directly, you first learn q-values and then use
    these action values to learn optimal behavior. Chapter [8](502835_2_En_8_Chapter.xhtml)
    looked at the approach of learning a policy directly, giving you much better improvement
    guarantees. However, all the policy learning algorithms in Chapter [7](502835_2_En_7_Chapter.xhtml)
    were on-policy. You used a policy to interact with the environment and made updates
    to the policy weights to increase the probability of good trajectories/actions
    while reducing the probability of bad ones. After each update the policy is changed,
    making the previous sample rollouts useless. Therefore, you had to discard the
    old ones and collect new trajectory rollouts after each update, making the process
    an on-policy leaning.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，在这本书中，在深度学习与强化学习结合的背景下，第[6](502835_2_En_6_Chapter.xhtml)章和第[7](502835_2_En_7_Chapter.xhtml)章解释了深度Q学习及其变体。在第[8](502835_2_En_8_Chapter.xhtml)章中，你了解了策略梯度。神经网络训练需要多次迭代，而Q学习作为一种离策略方法，使你能够多次重用样本转换，从而提高样本效率。然而，Q学习有时可能不稳定。此外，它是一种间接的学习方式。不是直接学习最优策略，而是首先学习q值，然后使用这些动作值来学习最优行为。第[8](502835_2_En_8_Chapter.xhtml)章探讨了直接学习策略的方法，这为你提供了更好的改进保证。然而，第[7](502835_2_En_7_Chapter.xhtml)章中所有策略学习算法都是基于策略的。你使用策略与环境交互，并对策略权重进行更新，以增加良好轨迹/动作的概率，同时减少不良轨迹/动作的概率。每次更新后，策略都会改变，使得之前的样本回放变得无用。因此，你必须丢弃它们，并在每次更新后收集新的轨迹回放，使得整个过程成为基于策略的学习。
- en: 'This chapter looks at combining the benefits of both approaches—that is, off-policy
    learning while learning the policy directly. I first talk about the tradeoffs
    of Q-learning versus policy gradient methods. After this, you will look at three
    popular approaches of combining Q-learning with policy gradients: deep deterministic
    policy gradients (DDPG), twin delayed DDPG (TD3), and soft actor-critic (SAC).
    I largely follow the notations, approach, and sample code documented in the OpenAI
    Spinning Up library.^([1](#Fn1)) CleanRL^([2](#Fn2)) is another good library to
    explore for code implementations of these.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 本章探讨了结合两种方法的好处——即在直接学习策略的同时进行离策略学习。我首先讨论了Q学习与政策梯度方法的权衡。之后，你将了解三种将Q学习与政策梯度结合的流行方法：深度确定性策略梯度（DDPG）、双延迟DDPG（TD3）和软演员-评论家（SAC）。我主要遵循了OpenAI
    Spinning Up库中记录的符号、方法和示例代码。[1](#Fn1) CleanRL[2](#Fn2) 是另一个探索这些代码实现的优秀库。
- en: Tradeoffs in Policy Gradient and Q-Learning
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 政策梯度与Q-Learning中的权衡
- en: 'Chapter [6](502835_2_En_6_Chapter.xhtml) looked at DQN, the deep learning version
    of Q-learning. In Q-learning, an off-policy method, you collect transitions from
    an exploratory behavior policy and then use these transitions in a batch stochastic
    gradient update to learn the q-values. As you learn the q-values, you improve
    the policy by taking the max over the q-values of all possible actions in a state
    to choose the best action. This was the equation:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 第[6](502835_2_En_6_Chapter.xhtml)章探讨了深度Q网络（DQN），这是Q学习的深度学习版本。在Q学习中，作为一种离策略方法，你从探索性行为策略中收集转换，然后使用这些转换在批量随机梯度更新中学习q值。随着你学习q值，你通过在状态的所有可能动作的q值中取最大值来选择最佳动作，从而改进策略。这是方程：
- en: '![$$ {w}_{t+1}={w}_t+\alpha .\kern0.5em \frac{1}{N}\sum \limits_{i=1}^N\left[{r}_i+\gamma
    .{\mathit{\max}}_{a_i^{\prime }}\overset{\sim }{q}\left({s}_i^{\prime },{a}_i^{\prime
    };{w_t}^{-}\right)-\hat{q}\left({s}_i,{a}_i;{w}_t\right)\right].{\nabla}_{w_t}\
    \hat{q}\left({s}_i,{a}_i;{w}_t\right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ1.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ1.png)'
- en: (9-1)
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: (9-1)
- en: Note the max. By taking max, that is, ![$$ {\mathit{\max}}_{a_i^{\prime }}\overset{\sim
    }{q}\left({s}_i^{\prime },{a}_i^{\prime };{w_t}^{-}\right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq1.png),
    you are defining the TD(0) target value as ![$$ {r}_i+\gamma .{\mathit{\max}}_{a_i^{\prime
    }}\overset{\sim }{q}\left({s}_i^{\prime },{a}_i^{\prime };{w_t}^{-}\right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq2.png),
    which is the maximum value under best action ![$$ {a}_i^{\prime } $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq3.png).
    This forces the current state-action q-value ![$$ \hat{q}\left({s}_i,{a}_i;w\right)
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq4.png) to update
    the weights to reach the higher target. In other words, you are guiding network
    updates to follow the Bellman optimality equation. The learning is off-policy
    because the Bellman optimality equations hold no matter what policy was followed.
    It needs to be satisfied for all the (*s*, *a*, *r*, *s*^’) transitions, no matter
    which policy these were generated from. You can reuse the transitions with the
    replay buffer, which makes this learning very sample-efficient. However, there
    are a few issues that Q-learning suffers from.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 注意最大值。通过取最大值，即![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq1.png)，你定义了TD(0)的目标值![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq2.png)，这是在最佳动作![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq3.png)下的最大值。这迫使当前状态动作q值![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq4.png)更新权重以达到更高的目标。换句话说，你正在引导网络更新遵循Bellman最优方程。学习是离策略的，因为Bellman最优方程无论遵循什么策略都成立。它需要满足所有(*s*,
    *a*, *r*, *s*^’）转换，无论这些转换是从哪个策略生成的。你可以使用重放缓冲区重用这些转换，这使得这种学习非常高效。然而，Q学习存在一些问题。
- en: The first one is about using Q-learning in its current form for continuous actions.
    Look at ![$$ {\mathit{\max}}_{a_i^{\prime }}\overset{\sim }{q}\left({s}_i^{\prime
    },{a}_i^{\prime };{w_t}^{-}\right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq5.png).
    All the examples in Chapters [6](502835_2_En_6_Chapter.xhtml) and [7](502835_2_En_7_Chapter.xhtml)
    had discrete actions. Do you know why? How do you think you will perform *max*
    when the action space is continuous and multidimensional, for example, moving
    multiple joints of a robot together?
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个问题是在当前形式下使用Q学习进行连续动作。看看![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq5.png)。第6章和第7章的所有例子都有离散动作。你知道为什么吗？当动作空间是连续和多维的，例如移动机器人的多个关节时，你认为你会如何执行*max*？
- en: When the actions are discrete, it is easy to take *max*. You input state *s*
    to the model, and you get *Q*(*s*, *a*) for all the possible actions, that is,
    *Q*(*s*, *a*[1]), ⋯*Q*(*s*, *a*[*m*]). With a limited number of discrete actions,
    choosing the *max* is easy. Figure [9-1](#Fig1) shows a sample model.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 当动作是离散时，取*max*很容易。你将状态*s*输入模型，然后得到所有可能动作的*Q*(*s*, *a*)，即*Q*(*s*, *a*[1])，⋯*Q*(*s*,
    *a*[*m*])。对于有限数量的离散动作，选择*max*很容易。图[9-1](#Fig1)显示了一个示例模型。
- en: '![](../images/502835_2_En_9_Chapter/502835_2_En_9_Fig1_HTML.jpg)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_9_Chapter/502835_2_En_9_Fig1_HTML.jpg)'
- en: A block diagram for D Q N learning. S is sent to a W block which gives outputs
    q circumflex of s, a 1, w to q circumflex of s, a m, w.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: DQN学习的框图。S被发送到W块，该块输出q̄s、a1、w到q̄s、a m、w。
- en: Figure 9-1
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-1
- en: Generic model for DQN learning with discrete actions
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: DQN学习的通用模型，具有离散动作
- en: Now imagine the actions being continuous! How would you take the maximum? To
    find ![$$ {\mathit{\max}}_{a_i^{\prime }}\overset{\sim }{q}\left({s}_i^{\prime
    },{a}_i^{\prime };{w_t}^{-}\right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq6.png),
    you will have to run another optimization algorithm, which will find the q-value
    maximizing ![$$ {a}_i^{\prime } $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq7.png).
    And you will have to do for every value of the state *s* in the training samples.
    You can imagine how expensive this process would be—running maximizing action
    search for every transition in the batch as part of policy improvement.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 现在想象一下动作是连续的！你将如何取最大值？为了找到![公式6](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq6.png)，你将不得不运行另一个优化算法，该算法将找到最大化![公式7](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq7.png)的q值。你将不得不对训练样本中每个状态*s*的值都这样做。你可以想象这个过程将有多么昂贵——作为策略改进的一部分，对批处理中的每个转换运行最大化动作搜索。
- en: The second issue is that of learning the wrong objective. You want an optimal
    policy, but you do not do this directly under DQN. You learn the action-value
    functions and then use *max* to find the optimal q-value/optimal action.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个问题是学习错误的目标。你想要一个最优策略，但在DQN中你并不是直接这样做。你学习动作值函数，然后使用*max*来找到最优的q值/最优动作。
- en: The third issue is that DQN is also not stable at times. There are no theoretical
    guarantees, and you are trying to update the weights using the semi-gradient update
    covered in Chapter [5](502835_2_En_5_Chapter.xhtml). You are essentially trying
    to follow the process of supervised learning with changing targets. What you learn
    can impact the new trajectory generation, which in turn can impact your quality
    of learning. All the training progress curves for the average return per episode
    that you saw for DQN in previous chapters did not continually improve. They were
    choppy and required careful adjustment of hyperparameters to ensure that the algorithm
    settled toward a good policy.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 第三个问题是DQN有时也不稳定。没有理论保证，你试图使用第[5](502835_2_En_5_Chapter.xhtml)章中提到的半梯度更新来更新权重。你本质上是在尝试跟随带有变化目标的监督学习过程。你所学的可能会影响新的轨迹生成，反过来又会影响你的学习质量。你之前章节中看到的DQN的平均每集回报训练进度曲线并没有持续改善。它们是断断续续的，需要仔细调整超参数以确保算法趋向于一个好的策略。
- en: Finally, the fourth issue is that DQN learns a deterministic policy. You use
    an exploratory behavior policy to generate samples and add exploration while the
    agent learns a deterministic policy. Experiments, especially in robotics, have
    shown that some amount of stochastic policy is better, as the modeling of the
    world and manipulations one does with joints are not always perfect. You need
    to have some amount of randomness to adjust for imperfect modeling or conversion
    of action values to actual robot joint movements. Also, deterministic policies
    are a limiting case of stochastic policies.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，第四个问题是DQN学习了一个确定性策略。你使用探索行为策略来生成样本，并在代理学习确定性策略的同时添加探索。实验，特别是在机器人领域，已经表明，一定程度的随机策略更好，因为对世界建模以及通过关节进行的操作并不总是完美的。你需要有一定的随机性来调整不完美的建模或动作值到实际机器人关节运动之间的转换。此外，确定性策略是随机策略的极限情况。
- en: Turn your attention now to policy gradient methods. In policy gradient methods,
    you input the state and the output you get is the policy, that is, the probability
    of actions for discrete actions or the parameters of a probability distribution
    in the case of continuous actions. The policy gradients allowed you to learn the
    policies for both discrete and continuous actions. However, learning continuous
    actions is not feasible in DQN. Figure [9-2](#Fig2) shows the model used in policy
    gradients.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 现在将注意力转向策略梯度方法。在策略梯度方法中，你输入状态，得到的输出是策略，即对于离散动作的动作概率，或者在连续动作的情况下，概率分布的参数。策略梯度允许你学习离散和连续动作的策略。然而，在DQN中学习连续动作是不可行的。图[9-2](#Fig2)展示了策略梯度中使用的模型。
- en: '![](../images/502835_2_En_9_Chapter/502835_2_En_9_Fig2_HTML.jpg)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![图9-2](../images/502835_2_En_9_Chapter/502835_2_En_9_Fig2_HTML.jpg)'
- en: 2 block diagrams for policy gradient methods. For discrete actions, s is sent
    to a theta block which gives categorical distribution outputs pi theta of a 1,
    s to pi theta of a m, s. For continuous actions, s is sent to a theta block which
    gives outputs mu theta of s and sigma square theta of s.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 两个策略梯度方法的框图。对于离散动作，s被发送到theta块，该块给出分类分布输出πθ(s)，即从πθ(s)到πθ(s)的m个s。对于连续动作，s被发送到theta块，该块给出输出μθ(s)和σθ²(s)。
- en: Figure 9-2
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-2
- en: Policy networks for policy gradient methods
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 政策梯度方法的政策网络
- en: Chapter [8](502835_2_En_8_Chapter.xhtml) showed discrete actions, but the process
    works out fine for continuous actions, as discussed in that chapter.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 第[8](502835_2_En_8_Chapter.xhtml)章展示了离散动作，但正如该章节所讨论的，这个过程对于连续动作同样适用。
- en: Further, using the policy gradient approach, you directly learn to improve the
    policy instead of the roundabout way of first learning the value functions and
    then using them to find the optimal policy. The vanilla policy gradient did suffer
    from a collapse to a bad region, and you saw approaches like TRPO and PPO controlling
    the step size to improve the guarantee of policy gradients, leading to a better
    policy learning.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，使用策略梯度方法，你直接学习改进策略，而不是首先学习价值函数，然后使用它们来找到最佳策略的迂回方式。原始策略梯度确实存在坍塌到不良区域的问题，你看到了像TRPO和PPO这样的方法，通过控制步长来提高策略梯度的保证，从而改善策略学习。
- en: Policy gradients, unlike DQN, learn a stochastic policy, and thereby exploration
    is built into the policy you are trying to learn. However, the biggest lacuna
    in the policy gradient method was that it is an on-policy approach. Once you use
    the transitions to calculate the gradient update, the model has moved to a new
    policy. The earlier transitions are not relevant anymore in this updated policy
    world. You need to discard the previous transitions after an update and generate
    new trajectory/transitions to train the model on. This makes the policy learning
    very sample inefficient.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 与DQN不同，政策梯度学习的是一个随机策略，因此探索性被内置到你试图学习的策略中。然而，政策梯度方法最大的缺陷是它是一个在线策略方法。一旦你使用转换来计算梯度更新，模型就移动到了一个新的策略。在这个更新的策略世界中，早期的转换不再相关。你需要在更新后丢弃之前的转换，并生成新的轨迹/转换来训练模型。这使得策略学习非常低效。
- en: You did use value learning as part of policy gradients using the actor-critic
    methods in which the policy network was the actor trying to learn the best actions,
    and the value network was the critic informing the policy network of how good
    or bad the actions are. However, even using the actor-critic methods, the learning
    was on-policy. You used the critic to guide the actor. The critic is based on
    the current policy. Therefore, as the policy changes with updates, you need to
    keep discarding all the current sample transitions after each update to the policy
    (and/or value) networks.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 你确实使用了价值学习作为策略梯度的一部分，使用了actor-critic方法，其中策略网络是actor，试图学习最佳动作，而价值网络是critic，向策略网络告知动作的好坏。然而，即使使用了actor-critic方法，学习仍然是基于策略的。你使用了critic来指导actor。critic基于当前策略。因此，随着策略的更新，你需要保留丢弃所有当前样本转换，在每次更新策略（和/或价值）网络后。
- en: Is there a way you could learn the policy directly but somehow leverage Q-learning
    to learn off-policy? And could you this so for the continuous action space? This
    is covered in this chapter. You will learn how to combine Q-learning with policy
    gradients to come up with algorithms that are off-policy and work well for continuous
    actions.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 有没有一种方法可以直接学习策略，同时利用Q学习来学习离线策略？你能否在连续动作空间中做到这一点？这在本章中有所介绍。你将学习如何将Q学习与策略梯度结合，以提出离线策略且适用于连续动作的算法。
- en: General Framework to Combine Policy Gradient with Q-Learning
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将策略梯度与Q学习结合的通用框架
- en: 'This section looks at continuous action policies. There are two networks—one
    for learning the optimal action for a given state, the actor network. Suppose
    the policy network is parameterized by *θ*, and the network learns a policy that
    produces the action *a* = *μ*[*θ*](*s*), which maximizes *Q*(*s*, *a*). In mathematical
    notation:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 本节探讨了连续动作策略。有两个网络——一个用于学习给定状态的最佳动作，即actor网络。假设策略网络由*θ*参数化，该网络学习一个策略，产生动作*a*
    = *μ*[*θ*](*s*)，该动作最大化*Q*(*s*, *a*)。用数学符号表示：
- en: '![$$ \underset{a^{\prime }}{\mathit{\max}}{Q}^{\ast}\left({s}^{\prime },{a}^{\prime}\right)\approx
    {Q}^{\ast}\left({s}^{\prime },{\upmu}_{\uptheta}(s)\right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ2.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \underset{a^{\prime }}{\mathit{\max}}{Q}^{\ast}\left({s}^{\prime },{a}^{\prime}\right)\approx
    {Q}^{\ast}\left({s}^{\prime },{\upmu}_{\uptheta}(s)\right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ2.png)'
- en: (9-2)
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: (9-2)
- en: The second network, the critic network, will also take state *s* as one input
    and the optimal action from the first network, *μ*[*θ*](*s*), as the other input
    to produce the q-value *Q*[ϕ](*s*, μ[θ](*s*)). Figure [9-3](#Fig3) shows the interaction
    of the two networks conceptually.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个网络，即评论家网络，也将状态 *s* 作为输入之一，并将第一个网络的最优动作 *μ*[*θ*](*s*) 作为另一个输入来产生q值 *Q*[ϕ](*s*,
    μ[θ](*s*))。图[9-3](#Fig3)展示了两个网络的概念性交互。
- en: '![](../images/502835_2_En_9_Chapter/502835_2_En_9_Fig3_HTML.jpg)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/502835_2_En_9_Chapter/502835_2_En_9_Fig3_HTML.jpg)'
- en: A block diagram for interactions of two networks. S is sent to N N of theta
    and N N of phi. N N of theta sends a to N N of phi. N N of phi gives Q of s, a.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 两个网络交互的框图。S被发送到θ的N N和φ的N N。θ的N N发送a到φ的N N。φ的N N给出s, a的Q。
- en: Figure 9-3
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-3
- en: Combining the policy and Q-learning. You learn the policy directly as well as
    Q using two networks in which the action output from the first network (actor)
    is fed into the second network (critic), which learns *Q*(*s*, *a*)
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 结合策略和Q学习。你通过两个网络直接学习策略以及Q，其中第一个网络（actor）的动作输出被输入到第二个网络（critic），该网络学习 *Q*(*s*,
    *a*)。
- en: To ensure exploration, take action *a*, which is exploratory. This is similar
    to the approach taken in Q-learning, where you learned a deterministic policy
    but generated transitions from an exploratory *ε*-greedy policy. Similarly, here,
    while you learn **a**, you add a bit of randomness *ϵ*~*N*(0, *σ*²) and use the
    **a** + **ε** action to explore the environment and generate trajectories.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保探索，采取探索性的动作 *a*。这与Q学习中的方法类似，在那里你学习了一个确定性策略，但生成了来自探索性 *ε*-贪婪策略的转换。同样，在这里，虽然你学习**a**，但你添加一点随机性
    *ϵ*~*N*(0, *σ*²)，并使用**a** + **ε**动作来探索环境并生成轨迹。
- en: As with Q-learning, you will use a replay buffer to store the transitions and
    reuse the these during learning. This is one of the big benefits common to all
    the approaches discussed in this chapter. It will make policy learning off-policy
    and hence sample efficient.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 与Q学习类似，你将使用重放缓冲区来存储转换并在学习期间重用这些转换。这是本章讨论的所有方法共有的一个重要好处。这将使策略学习离线，从而提高样本效率。
- en: 'In Q-learning, you had to use a target network that was a copy of the Q-network.
    The reason was to provide some kind of stationery target while learning q-values.
    You can revisit the discussion of target networks in Chapters [5](502835_2_En_5_Chapter.xhtml)
    and [6](502835_2_En_6_Chapter.xhtml). In those approaches, the target network
    weights were updated with the online/agent network weights periodically. Here,
    you will also use a target network. However, the approach for updating the target
    network weights for algorithms in this chapter is that of *polyak averaging* (*exponential
    averaging*), as given by the following equation:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 在Q学习中，你必须使用一个与Q网络相同的Q网络的目标网络。原因是提供某种类型的固定靶点，以便在学习q值时使用。你可以回顾第[5](502835_2_En_5_Chapter.xhtml)章和[6](502835_2_En_6_Chapter.xhtml)章中关于目标网络的讨论。在这些方法中，目标网络权重定期用在线/代理网络权重更新。这里，你也将使用一个目标网络。然而，本章中算法的目标网络权重更新方法为*Polyak平均*（*指数平均*），如下方程所示：
- en: '![$$ {\upphi}_{target}\leftarrow \uprho .{\upphi}_{target}+\left(1-\uprho \right)\upphi
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ3.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\upphi}_{target}\leftarrow \uprho .{\upphi}_{target}+\left(1-\uprho \right)\upphi
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ3.png)'
- en: (9-3)
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: (9-3)
- en: You will also be using a target network for the policy network. It is for the
    same reason as in q-value networks, that is, providing stable targets. With stable
    targets, you can carry out the supervised learning style of gradient descent and
    adjust the weights to the approximate *Q*(*s*, *a*).
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 你还将使用目标网络来处理策略网络。这与q值网络中的原因相同，即提供稳定的靶点。有了稳定的靶点，你可以执行监督学习风格的梯度下降，并调整权重以近似 *Q*(*s*,
    *a*)。
- en: With this background, you are ready to look at the first algorithm—deep deterministic
    policy gradient (DDPG).
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个背景下，你准备好查看第一个算法——深度确定性策略梯度（DDPG）。
- en: Deep Deterministic Policy Gradient
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 深度确定性策略梯度
- en: 'In 2016, in a paper titled “Continuous Control with Deep Reinforcement Learning,”^([3](#Fn3))
    authors from DeepMind introduced the DDPG algorithm. The authors had the following
    points to make about their approach:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 在2016年，在一篇题为“使用深度强化学习的连续控制”的论文中，DeepMind的研究人员介绍了DDPG算法。作者们对其方法有以下几点要说明：
- en: While DQN solves high-dimensional state space, it can only handle discrete and
    low-dimensional action space. DQN cannot be applied to continuous and high-dimensional
    action domains, such as physical control tasks like robots.
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 虽然 DQN 解决了高维状态空间，但它只能处理离散和低维动作空间。DQN 不能应用于连续和高维动作域，例如机器人等物理控制任务。
- en: Discretizing action space is not an option due to the *curse of dimensionality*.
    Assume that you have a robot with seven joints and each joint can move in the
    range (−*k*, *k*). Do a coarse discretization of each joint having three possible
    values {−*k*, 0, *k*}. Even with this coarse discretization, the total combinations
    of discrete actions in all seven dimensions work out to 3⁷ = 2187\. Instead, if
    you decide to divide the discrete range for each joint in ten possible values
    in the range (−*k*, *k*), you get 10⁷ = 10 *million* options. This is the *curse
    of dimensionality,* where the set of possible action combinations grows exponentially
    with each new dimension/joint.
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于**维度诅咒**，对动作空间进行离散化不是一个选择。假设你有一个拥有七个关节的机器人，每个关节可以在范围（−*k*，*k*）内移动。对每个关节进行粗略的离散化，使其有三个可能值{−*k*，0，*k*}。即使在这种粗略的离散化下，所有七个维度中离散动作的总组合数为3⁷
    = 2187。相反，如果你决定将每个关节的离散范围分成十个可能值（在范围（−*k*，*k*）内），你将得到10⁷ = 10 *百万*种选择。这就是**维度诅咒**，其中可能动作组合的集合随着每个新维度/关节的加入而呈指数增长。
- en: 'The DDPG algorithm is as follows:'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: DDPG算法如下：
- en: '*Model free*: You do not know the model. You learn it from the interaction
    of the agent with the environment.'
  id: totrans-49
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**无模型**：你不知道模型。你从代理与环境交互中学习它。'
- en: '*Off-policy*: DDPG, like DQN, uses an exploratory policy to generate transitions
    and learns a deterministic policy.'
  id: totrans-50
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**离线策略**：DDPG，与DQN类似，使用探索策略生成转换，并学习确定性策略。'
- en: '*Continuous and high-dimensional action space*: DDPG works only for a continuous
    action domain and works well with high-dimensional action spaces.'
  id: totrans-51
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**连续和高维动作空间**：DDPG仅适用于连续动作域，并且在高维动作空间中表现良好。'
- en: '*Actor-critic*: This means you have an actor (policy network) and critic, the
    action-value (q-value) network.'
  id: totrans-52
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**演员-评论家**：这意味着你有一个演员（策略网络）和评论家，即动作值（q值）网络。'
- en: '*Replay buffer*: Like DQN, DDPG uses a replay buffer to store transitions and
    uses them to learn. This breaks the temporal dependence/correlation of training
    examples, which could otherwise mess up the learning.'
  id: totrans-53
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**重放缓冲区**：与DQN类似，DDPG使用重放缓冲区来存储转换并使用它们进行学习。这打破了训练样本的时间依赖性/相关性，否则可能会搞乱学习。'
- en: '*Target network*: Like DQN, DDPG uses a target network to provide stable targets
    for the q-value to learn. However, unlike DQN, it does not update the target network
    by copying over the weights of the online/agent/main network periodically. Rather,
    it uses the polyak/exponential average to keep moving the target network a little
    bit after every update to the main network.'
  id: totrans-54
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**目标网络**：与DQN类似，DDPG使用目标网络为q值学习提供稳定的目标。然而，与DQN不同，它不是通过定期复制在线/代理/主网络的权重来更新目标网络。相反，它使用polyak/指数平均，在每次更新主网络后稍微移动目标网络。'
- en: Now turn your attention to the network architecture and losses you calculate.
    First you’ll look at the Q-learning part, and then you will look at the policy
    learning network.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 现在将你的注意力转向网络架构和计算的损失。首先，你会查看Q学习部分，然后你会查看策略学习网络。
- en: Q-Learning in DDPG (Critic)
  id: totrans-56
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: DDPG中的Q-Learning（评论家）
- en: 'In DQN, you calculated a loss that was minimized by gradient descent. The loss
    is given by Equation [6-3](502835_2_En_6_Chapter.xhtml#PC4), reproduced here:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在DQN中，你通过梯度下降计算了一个损失，该损失由方程[6-3](502835_2_En_6_Chapter.xhtml#PC4)给出，此处重述如下：
- en: '![$$ \mathrm{L}=\frac{1}{\mathrm{N}}{\sum}_{i=1}^N{\left[{r}_i+\left(\left(1-
    don{e}_i\right).\gamma .\underset{a^{\prime }}{\max}\hat{q}\left({s}_i^{\prime
    },{a}^{\prime };{w}_t^{-}\right)\right)\hbox{--} \hat{q}\left({s}_i,{a}_i;{w}_t\right)\right]}^2
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ4.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ4.png)'
- en: (9-4)
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: (9-4)
- en: 'Let’s rewrite the equation. Drop subindex **i** and **t** to reduce the clutter
    of notation. Change the summation to expectation to emphasize that what you usually
    want is an expectation, but it is estimated by average over samples under Monte
    Carlo. Eventually in the code you have sums, but they are Monte Carlo estimations
    of some expectation. Also replace ![$$ {w}_t^{-} $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq8.png),
    the target network weights, with ϕ[*targ*]. Similarly, replace the main weights
    *w*[*t*] with ϕ. Further, move the weights from inside the function parameter
    to the sub-indices on the function, that is, *Q*[ϕ](...) ← *Q*(...; ϕ). With all
    these symbol changes, Equation [9-4](#Fig4) now looks like this:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们重新写这个方程。去掉下标 **i** 和 **t** 以减少符号的混乱。将求和改为期望，以强调你通常想要的只是一个期望，但它是通过蒙特卡洛方法下的样本平均来估计的。最终在代码中你会得到求和，但它们是某些期望的蒙特卡洛估计。同时，将![目标网络权重
    $w_t^{-}$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq8.png)替换为
    ϕ[*targ*]。类似地，将主要权重 *w*[*t*] 替换为 ϕ。进一步，将权重从函数参数内部移动到函数的子索引上，即 *Q*[ϕ](...) ← *Q*(...;
    ϕ)。经过这些符号变化后，方程 [9-4](#Fig4) 现在看起来是这样的：
- en: '![$$ L\left(\upphi, D\right)=\underset{\left(s,a,r,{s}^{''},d\right)\sim D}{E}\left[{\left({Q}_{\upphi}\left(s,a\right)-\left(r+\upgamma
    \left(1-d\right)\underset{a^{\prime }}{\mathit{\max}}{Q}_{\upphi_{targ}}\left({s}^{\prime
    },{a}^{\prime}\right)\right)\right)}^2\right] $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ5.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![损失函数公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ5.png)'
- en: (9-5)
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: (9-5)
- en: 'This is still the DQN formulation where you take a max of discrete actions
    in state *s*^’ to get ![$$ \underset{a^{\prime }}{\mathit{\max}}{Q}_{\upphi_{targ}}\left({s}^{\prime
    },{a}^{\prime}\right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq9.png).
    In continuous space, you cannot take *max*, and hence you have another network
    (actor) to take input state *s* and produce the action, which maximizes ![$$ {Q}_{\upphi_{targ}}\left({s}^{\prime
    },{a}^{\prime}\right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq10.png).
    That is, you replace ![$$ \underset{a^{\prime }}{\mathit{\max}}{Q}_{\upphi_{targ}}\left({s}^{\prime
    },{a}^{\prime}\right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq11.png)
    with ![$$ {Q}_{\upphi_{targ et}}\left({s}^{''},{\upmu}_{\uptheta_{targ}}\left({s}^{''}\right)\right)
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq12.png) where
    ![$$ {a}^{\prime }={\mu}_{\theta_{targ}}\left({s}^{''}\right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq13.png)
    is the target policy. The updated loss expression is as follows:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这仍然是 DQN 公式，你在状态 *s*^’ 中取离散动作的最大值以得到 ![目标网络的最大值 $Q_{\upphi_{targ}}(s', a')$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq9.png)。在连续空间中，你不能取最大值，因此你需要另一个网络（actor）来接收输入状态
    *s* 并产生动作，该动作最大化 ![目标网络的最大值 $Q_{\upphi_{targ}}(s', a')$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq10.png)。也就是说，你将
    ![目标网络的最大值 $Q_{\upphi_{targ}}(s', a')$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq11.png)
    替换为 ![目标网络的最大值 $Q_{\upphi_{targ et}}(s', \upmu_{\uptheta_{targ}}(s'))$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq12.png)，其中
    ![动作 $a' = \upmu_{\uptheta_{targ}}(s')$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq13.png)
    是目标策略。更新的损失表达式如下：
- en: '![$$ L\left(\phi, D\right)=\underset{\left(s,a,r,{s}^{''},d\right)\sim D}{E}\left[{\left({Q}_{\phi}\left(s,a\right)-\left(r+\gamma
    \left(1-d\right){Q}_{\phi_{targ et}}\left({s}^{''},{\mu}_{\theta_{targ}}\left({s}^{''}\right)\right)\right)\right)}^2\right]
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ6.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![损失函数公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ6.png)'
- en: (9-6)
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: (9-6)
- en: This is the updated mean squared Bellman error (MSBE) that you will implement
    in code and then do back propagation to minimize the loss function. Note that
    this is only a function of ϕ and so the gradient of *L*(*ϕ*, *D*) is with respect
    to *ϕ*. As discussed earlier, in the code you will replace the expectation with
    the sample average being the MC estimate of the expectation. Next let’s look at
    the policy learning part.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 这是在代码中实现并用于反向传播以最小化损失函数的更新均方误差（MSBE）。请注意，这仅是 ϕ 的函数，因此 *L*(*ϕ*, *D*) 的梯度是相对于
    *ϕ* 的。如前所述，在代码中，你将期望替换为样本平均，作为期望的蒙特卡洛估计。接下来，让我们看看策略学习部分。
- en: Policy Learning in DDPG (Actor)
  id: totrans-67
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: DDPG（Actor）中的策略学习
- en: In the policy learning part, you are trying to learn *a* = *μ*[*θ*](*s*), a
    deterministic policy that gives the action that maximizes *Q*[*ϕ*](*s*, *a*).
    As the action space is continuous and you assume that the *Q* function is differentiable
    with respect to the action, you can just perform gradient ascent with respect
    to the policy parameters to solve.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在策略学习部分，你试图学习 *a* = *μ*[*θ*](*s*)，这是一个确定性策略，它给出最大化 *Q*[*ϕ*](*s*, *a*) 的动作。由于动作空间是连续的，并且你假设
    *Q* 函数相对于动作是可微的，因此你可以仅对策略参数进行梯度上升来解决。
- en: '![$$ \underset{\theta }{\mathit{\max}}\ J\left(\theta, D\right)=\underset{\theta
    }{\mathit{\max}}\underset{s\sim D}{E}\left[{Q}_{\upphi}\left(s,{\upmu}_{\uptheta}(s)\right)\right]
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ7.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \underset{\theta }{\mathit{\max}}\ J\left(\theta, D\right)=\underset{\theta
    }{\mathit{\max}}\underset{s\sim D}{E}\left[{Q}_{\upphi}\left(s,{\upmu}_{\uptheta}(s)\right)\right]
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ7.png)'
- en: (9-7)
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: (9-7)
- en: As the policy is deterministic, the expectation in Equation [9-7](#Equ7) does
    not depend on the policy, which is different than what you saw in stochastic gradients
    in the previous chapter. The expectation operator there depended on policy parameters
    because the policy was stochastic, which in turn impacted the expected q-value.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 由于策略是确定性的，方程 [9-7](#Equ7) 中的期望值不依赖于策略，这与你在上一章中看到的随机梯度不同。那里的期望操作符依赖于策略参数，因为策略是随机的，这反过来又影响了预期的
    q 值。
- en: 'You can take the gradient of *J* about *θ* to get the following:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以对 *J* 关于 *θ* 求梯度，得到以下结果：
- en: '![$$ {\nabla}_{\theta}\;J\left(\theta, D\right)=\underset{s\sim D}{E}\left[{\nabla}_a{Q}_{\phi}\left(s,a\right){\left.\kern0em
    \right|}_{a={\mu}_{\theta }(s)}{\nabla}_{\theta }{\mu}_{\theta }(s)\right] $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ8.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\nabla}_{\theta}\;J\left(\theta, D\right)=\underset{s\sim D}{E}\left[{\nabla}_a{Q}_{\phi}\left(s,a\right){\left.\kern0em
    \right|}_{a={\mu}_{\theta }(s)}{\nabla}_{\theta }{\mu}_{\theta }(s)\right] $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ8.png)'
- en: (9-8)
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: (9-8)
- en: This is straight application of chain rule. Also note that you do not get any
    ∇ *log* (...) terms inside the expectation, as the state *s* over which the expectation
    is being taken is coming from the replay buffer, and it has no dependence on the
    parameter *θ* with respect to which gradient is being taken.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是链式法则的直接应用。此外，请注意，在期望内部没有任何 ∇ *log* (...) 项，因为期望所取的状态 *s* 来自回放缓冲区，并且它对梯度求取的参数
    *θ* 没有依赖性。
- en: Further, in a 2014 paper titled “Deterministic Policy Gradient Algorithms,”^([4](#Fn4))
    the authors showed that Equation [9-8](#Equ8) is the policy gradient; that is,
    the gradient of the policy’s performance. You are advised to read through both
    papers to get a deeper theoretical understanding of the math behind DDPG.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，在 2014 年一篇题为“确定性策略梯度算法”的论文中，作者们表明方程 [9-8](#Equ8) 是策略梯度；即策略性能的梯度。建议你阅读这两篇论文，以获得
    DDPG 数学背后的更深入的理论理解。
- en: As discussed earlier, to aid in exploration, while you learn a deterministic
    policy, you will use a noisy exploratory version of the learned policy to explore
    and generate transitions. You do this by adding a mean zero Gaussian noise to
    the learning policy. Adding noise is a standard process in ML and it acts as a
    regularizer, making sure that the learned policy has good generalization capabilities.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，为了帮助探索，当你学习确定性策略时，你将使用学习策略的噪声探索版本来探索和生成转换。你这样做是通过向学习策略添加均值为零的高斯噪声来实现的。在机器学习中添加噪声是一个标准过程，它充当正则化器，确保学习到的策略具有良好的泛化能力。
- en: Pseudocode and Implementation
  id: totrans-78
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 伪代码和实现
- en: At this point, you are ready to see the complete pseudocode. Refer to Figure
    [9-4](#Fig4) for this.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 到这一点，你就可以看到完整的伪代码了。请参阅图 [9-4](#Fig4)。
- en: '![](../images/502835_2_En_9_Chapter/502835_2_En_9_Fig4_HTML.jpg)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/502835_2_En_9_Chapter/502835_2_En_9_Fig4_HTML.jpg)'
- en: A 14-step pseudocode for deep deterministic policy gradient. Input initial policy
    parameters theta, Q-function parameter phi, and empty relay buffer D is followed
    by set target parameters equal to online parameters, update Q-function and policy,
    and update target networks using poly a k averaging.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 深度确定性策略梯度算法的 14 步伪代码。输入初始策略参数 theta，Q 函数参数 phi，以及空的回放缓冲区 D，然后设置目标参数等于在线参数，更新
    Q 函数和策略，并使用 poly a k 平均法更新目标网络。
- en: Figure 9-4
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-4
- en: Deep deterministic policy gradient algorithm
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 深度确定性策略梯度算法
- en: Gymnasium Environments Used in Code
  id: totrans-84
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 代码中使用的 Gymnasium 环境
- en: 'Turning to the implementation, you will be using two environments in this chapter
    to run the code. The first one is a pendulum swing environment called `Pendulum-v1`.
    Here, the state is a three-dimensional vector giving the angle of the pendulum
    (i.e., its *cos* and *sin* components), with the third dimension being the angular
    velocity (theta-dot): ![$$ \left[\mathit{\cos}\left(\uptheta \right),\mathit{\sin}\left(\uptheta
    \right),\kern0.5em \dot{\theta}\right]. $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq14.png)'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 在实现方面，您将在本章中使用两个环境来运行代码。第一个是一个称为 `Pendulum-v1` 的摆动环境。在这里，状态是一个三维向量，给出摆的角度（即其
    *cos* 和 *sin* 分量），第三维是角速度（theta-dot）：`$$ \left[\mathit{\cos}\left(\uptheta \right),\mathit{\sin}\left(\uptheta
    \right),\kern0.5em \dot{\theta}\right]. $$` ![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq14.png)
- en: The action is a single continuous value in the range of [-2.0, 2.0]—the torque
    being applied to the pendulum. The idea is to balance the pendulum in an upright
    position for as long as possible. See Figure [9-5](#Fig5). You may also refer
    to the documentation inside the Gymnasium library.^([5](#Fn5))
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 动作是一个范围在 [-2.0, 2.0] 的单一连续值——施加到摆上的扭矩。目标是尽可能长时间地将摆平衡在直立位置。见图 [9-5](#Fig5)。您也可以参考
    Gymnasium 库内的文档.^([5](#Fn5))
- en: '![](../images/502835_2_En_9_Chapter/502835_2_En_9_Fig5_HTML.jpg)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_9_Chapter/502835_2_En_9_Fig5_HTML.jpg)'
- en: A graphical representation of a pendulum that swings clockwise. The state shape
    is (3, ) and action shape is (1, ).
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 一个顺时针摆动的摆的图形表示。状态形状是 (3, )，动作形状是 (1, )。
- en: Figure 9-5
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-5
- en: Pendulum environment from the Gymnasium library
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 来自 Gymnasium 库的摆环境
- en: 'You will train the algorithm on another environment—the continuous version
    of Lunar-Lander called `LunarLanderContinuous-v2`. In this environment, you try
    to land the lunar module on the moon between the flags. The state vector is eight-dimensional:
    `[x_pos, y_pos, x_vel, y_vel, lander_angle, lander_angular_vel, left_leg_ground_contact_flag,
    right_leg_ground_contact_flag]`.'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 您将在另一个环境中训练算法——称为 `LunarLanderContinuous-v2` 的月球着陆器的连续版本。在这个环境中，您尝试将月球模块降落在旗帜之间的月球上。状态向量是八维的：`[x_pos,
    y_pos, x_vel, y_vel, lander_angle, lander_angular_vel, left_leg_ground_contact_flag,
    right_leg_ground_contact_flag]`。
- en: 'The action is two-dimensional floats: `[main engine, left-right engines]`.'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 动作是两个二维浮点数：`[主引擎，左右引擎]`。
- en: 'Main engine: Range (-1..0) is for engine off, and range (0,1) is the engine
    throttle from 50% to 100% power. The engine can’t work with less than 50 percent
    power.'
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 主引擎：范围 (-1..0) 是引擎关闭，范围 (0,1) 是从 50% 到 100% 功率的引擎油门。引擎的功率不能低于 50%。
- en: 'Left/Right – lateral boosters: Range (-1.0, -0.5) fires the left booster, range
    (+0.5, +1.0) fires the right booster, and range (-0.5, 0.5) is for both boosters
    off.'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 左/右——侧向助推器：范围 (-1.0, -0.5) 触发左侧助推器，范围 (+0.5, +1.0) 触发右侧助推器，范围 (-0.5, 0.5) 是两个助推器都关闭。
- en: Figure [9-6](#Fig6) shows a snapshot of the environment.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [9-6](#Fig6) 显示了环境的快照。
- en: '![](../images/502835_2_En_9_Chapter/502835_2_En_9_Fig6_HTML.jpg)'
  id: totrans-96
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_9_Chapter/502835_2_En_9_Fig6_HTML.jpg)'
- en: A screenshot of the lunar lander environment video. A lunar lander hovers in
    between 2 flags, above an irregular surface.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 月球着陆器环境视频的截图。月球着陆器在两个旗帜之间悬停，在不规则的地面上方。
- en: Figure 9-6
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-6
- en: Lunar-lander continuous from the Gymnasium library
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 来自 Gymnasium 库的月球着陆器连续模式
- en: Code Listing
  id: totrans-100
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 代码列表
- en: Now turn your attention to the actual code for implementing the DDPG pseudocode
    in Figure [9-4](#Fig4). The code is from the `9.a-ddpg.ipynb` file. This section
    first explains the Q and policy networks, followed by loss calculation and then
    the training loop. Finally, you will learn about the code and test the performance
    of the trained agent.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 现在将注意力转向实现图 [9-4](#Fig4) 中 DDPG 模拟代码的实际代码。代码来自 `9.a-ddpg.ipynb` 文件。本节首先解释 Q
    和策略网络，然后是损失计算，接着是训练循环。最后，您将了解代码并测试训练代理的性能。
- en: Policy Network Actor
  id: totrans-102
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 策略网络演员
- en: First let’s look at the *actor/policy* network. Listing [9-1](#PC1) shows the
    policy network code in PyTorch. You define a simple neural network with two hidden
    layers of size 256, each with ReLU activation. If you look at the `forward` function`,`
    you will notice that the final layer (`self.actor`) is passed through the `tanh`
    activation. `Tanh` is a squashing function; it re-maps the values in (−∞, ∞) to
    a squashed range of (−1, 1). You then multiply this squashed value with the action
    limit (`self.act_limit`) so that the continuous output from `MLPActor` is within
    the valid range of action values that the environment accepts. You create a network
    class by extending the PyTorch `nn.Module` class, which requires you to define
    a `forward` function with input state *s* as input, thus producing the action
    value *a* as the network output.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们看看 *actor/policy* 网络列表 [9-1](#PC1) 展示了 PyTorch 中的策略网络代码。您定义了一个简单的神经网络，包含两个大小为
    256 的隐藏层，每个层都使用 ReLU 激活。如果您查看 `forward` 函数，您会注意到最终层（`self.actor`）通过 `tanh` 激活传递。`Tanh`
    是一个挤压函数；它将（-∞, ∞）中的值重新映射到挤压范围（-1, 1）。然后您将这个挤压值乘以动作限制（`self.act_limit`），这样 `MLPActor`
    的连续输出就位于环境接受的有效动作值范围内。您通过扩展 PyTorch 的 `nn.Module` 类来创建一个网络类，这要求您定义一个 `forward`
    函数，该函数以输入状态 *s* 作为输入，从而产生网络输出动作值 *a*。
- en: '[PRE0]'
  id: totrans-104
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Q-Network Critic Implementation
  id: totrans-105
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: Q-网络批评实现
- en: Next, you look at the Q-network (*critic*). This is also a simple two-layer
    hidden network with ReLU activation and then a final layer with output dimension
    equal to one, the dimensionality of action space for the environment. The final
    layer does not have any activation, enabling the network to produce any value
    as output of the network. This network is outputting the q-value, and that is
    why you need to have a possible range of (−∞, ∞).
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，您查看 Q-网络（*批评者*）。这也是一个简单的两层隐藏网络，使用 ReLU 激活，然后是一个输出维度等于环境的动作空间维度的最终层。最终层没有任何激活，使网络能够产生任何值作为网络的输出。这个网络正在输出
    q 值，这就是为什么需要可能的范围（-∞, ∞）。
- en: Listing [9-2](#PC2) shows the code for the critic network in PyTorch. This is
    pretty similar to the implementation of the actor/policy network, except for the
    minor differences discussed earlier.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 [9-2](#PC2) 展示了 PyTorch 中批评网络代码。这与 actor/policy 网络的实现非常相似，除了前面讨论的细微差异。
- en: '[PRE1]'
  id: totrans-108
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Combined Model-Actor-Critic Implementation
  id: totrans-109
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 结合模型-演员-批评实现
- en: 'Once both the networks are defined, you combine them into a single class that
    allows you to manage the online and target networks in a more modular way. This
    is just for better code organization and nothing more. The class combining the
    two networks is implemented as `MLPActorCritic`. In this class, you also define
    a `get_action` function, which takes the state and a noise scale. It passes the
    state through the policy network to get *μ*[*θ*](*s*), and then it adds a noise
    (zero mean Gaussian noise) to give a noisy action for exploration. This function
    implements Step 4 of the algorithm:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦定义了这两个网络，您将它们组合成一个类，允许您以更模块化的方式管理在线和目标网络。这只是为了更好的代码组织，没有其他原因。结合两个网络的类实现为 `MLPActorCritic`。在这个类中，您还定义了一个
    `get_action` 函数，它接受状态和噪声尺度。它将状态通过策略网络传递以获取 *μ*[*θ*](*s*)，然后添加噪声（零均值高斯噪声）以给出用于探索的噪声动作。此函数实现了算法的第
    4 步：
- en: '![$$ a= clip\left({\upmu}_{\uptheta}(s)+\upalpha \cdotp \upvarepsilon, {a}_{Low},{a}_{High}\right)\mathrm{where}\
    \upvarepsilon \sim N,\mathrm{and}\ \upalpha \kern0.5em \mathrm{is}\ \mathrm{the}\
    \mathrm{scale}\ \mathrm{of}\ \mathrm{noise} $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equa.png)'
  id: totrans-111
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equa.png)'
- en: '`The get_action` method is the one you will be using to get the action from
    a policy instead of directly calling `MLPActor` from Listing [9-1](#PC1). Listing
    [9-3](#PC3) shows the implementation of `MLPActorCritic` in PyTorch.'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: '`The get_action` 方法是您将用于从策略中获取动作而不是直接从列表 [9-1](#PC1) 中的 `MLPActor` 调用获取动作的方法。列表
    [9-3](#PC3) 展示了 `MLPActorCritic` 在 PyTorch 中的实现。'
- en: '[PRE2]'
  id: totrans-113
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Experience Replay
  id: totrans-114
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 经验回放
- en: As with DQN, you will again use experience replay in DDPG to store the prior
    transition. The implementation of experience replay stays the same as that for
    DQN. I am not listing the code for it. Interested readers can review the code
    from the Jupyter notebook called `9.a-ddpg.ipynb`.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 与 DQN 一样，您在 DDPG 中再次使用经验回放来存储先前的转换。经验回放的实施与 DQN 相同。我没有列出代码。感兴趣的读者可以查看名为 `9.a-ddpg.ipynb`
    的 Jupyter 笔记本中的代码。
- en: Q-Loss Implementation
  id: totrans-116
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: Q-Loss实现
- en: This section investigates the Q-loss calculation. You are essentially implementing
    the equations from Steps 11 and 12 of the pseudocode.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 本节探讨了Q损失的计算。你实际上是在实现伪代码的第11步和第12步的方程。
- en: '![$$ y\left(r,{s}^{\prime },d\right)=r+\upgamma \left(1-d\right){Q}_{\upphi_{\mathrm{targ}}}\left({s}^{\prime
    },{\upmu}_{\uptheta_{\mathrm{targ}}}\left({s}^{\prime}\right)\right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equb.png)'
  id: totrans-118
  prefs: []
  type: TYPE_IMG
  zh: '![目标公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equb.png)'
- en: '![$$ {Q}_{\mathrm{loss}}=\frac{1}{\left|B\right|}{\sum}_{\left(s,a,r,{s}^{\prime
    },d\right)\in B}{\left({Q}_{\upphi}\left(s,a\right)-y\left(r,{s}^{\prime },d\right)\right)}^2
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equc.png)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
  zh: '![Q损失公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equc.png)'
- en: Listing [9-4](#PC4) gives the PyTorch implementation. You first convert the
    batch of (*s*, *a*, *r*, *s*^’, *d*) into PyTorch tensors. Next, you calculate
    *Q*[*ϕ*](*s*, *a*) using the batch of (*s*, *a*) and pass it through the *policy*
    network. The code that implements this is `predicted_qvalues = agent.q(states,
    actions).`
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 列表[9-4](#PC4)给出了PyTorch的实现。你首先将(*s*, *a*, *r*, *s*^’， *d*)批处理转换为PyTorch张量。接下来，你使用(*s*,
    *a*)批处理通过策略网络计算*Q*[*ϕ*](*s*, *a*)。实现这一点的代码是`predicted_qvalues = agent.q(states,
    actions)`。
- en: Following this, you calculate the target *y*(*r*, *s*^′, *d*) as per the previous
    expression. You use `torch.no_grad()` for efficiency purposes to disable the gradient
    calculation while computing the target, as you do not want to adjust the target
    network weights using auto-diff from PyTorch. Rather, you adjust the target network
    weights manually using polyak averaging. Stopping the calculation of unwanted
    gradients can speed up the training, and it ensures that you do not have any unintended
    side-effects of a gradient step impacting the weights that you want to keep frozen
    or adjust manually. Finally, you calculate the *Q*[Loss] as per the previous expression.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 接着，你根据前面的表达式计算目标*y*(*r*, *s*^′, *d*)。出于效率考虑，你使用`torch.no_grad()`来禁用计算目标时的梯度计算，因为你不想使用PyTorch的自动微分来调整目标网络权重。相反，你手动使用Polyak平均调整目标网络权重。停止计算不想要的梯度可以加快训练速度，并确保你没有任何意外的副作用影响你想要冻结或手动调整的权重。最后，你根据前面的表达式计算*Q*[损失]。
- en: PyTorch carries out the back propagation to calculate the gradient. You do not
    need to calculate the gradient explicitly in the code.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: PyTorch执行反向传播来计算梯度。你不需要在代码中显式地计算梯度。
- en: '[PRE3]'
  id: totrans-123
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Policy Loss Implementation
  id: totrans-124
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 策略损失实现
- en: Next, you need to calculate the policy loss as per Step 13 of the pseudocode.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，你需要根据伪代码的第13步计算策略损失。
- en: '![$$ {\mathrm{Policy}}_{\mathrm{Loss}}=-\frac{1}{\left|B\right|}{\sum}_{s\in
    B}{Q}_{\phi}\left(s,{\mu}_{\theta }(s)\right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equd.png)'
  id: totrans-126
  prefs: []
  type: TYPE_IMG
  zh: '![策略损失公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equd.png)'
- en: This is a straightforward computation. It is just a three-line code implementation
    in PyTorch. Listing [9-5](#PC5) contains the code in PyTorch. Note the -ve sign
    in the loss. The algorithm needs to do gradient ascent on the policy objective,
    but auto-differentiation libraries like PyTorch and TensorFlow implement gradient
    descent. Multiplying the policy objective by -1.0 makes it a loss, and gradient
    descent on a loss is the same as gradient ascent on a policy objective.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个简单的计算。它只是在PyTorch中实现的三个代码行。列表[9-5](#PC5)包含了PyTorch中的代码。注意损失中的负号。算法需要对策略目标进行梯度上升，但像PyTorch和TensorFlow这样的自动微分库实现的是梯度下降。将策略目标乘以-1.0使其成为损失，对损失进行梯度下降与对策略目标进行梯度上升是相同的。
- en: '[PRE4]'
  id: totrans-128
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: One-Step Update Implementation
  id: totrans-129
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 单步更新实现
- en: Next you define a function called `one_step_update` that gets a batch of (*s*,
    *a*, *r*, *s*^’, *d*) and computes the Q-loss followed by back propagation, and
    then a similar step of policy-loss computation followed by the gradient step.
    It finally carries out an update to the target network weights using polyak averaging.
    Essentially, this step with the previous two functions `compute_q_loss` and `compute_policy_loss,`
    implements Steps 11 to 14 of the pseudocode.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，你定义一个名为`one_step_update`的函数，该函数获取一个包含(*s*, *a*, *r*, *s*^’， *d*)的批次，并计算Q损失，然后进行反向传播，接着是类似的策略损失计算步骤，然后进行梯度步骤。最后，使用Polyak平均法对目标网络权重进行更新。本质上，这一步与之前的两个函数`compute_q_loss`和`compute_policy_loss`一起实现了伪代码的第11步到第14步。
- en: Listing [9-6](#PC6) shows the PyTorch code for `one_step_update`. The first
    step is to calculate the Q-loss and carry out gradient descent on the critic/Q
    network weights. This is followed by computing the policy loss and gradient descent
    on the actor/policy network weights. In certain versions of DDPG, the update to
    policy is delayed as compared to update to Q-network, that is, one update of policy
    is carried out for every “k” updates of the Q network. The logic to control the
    “k” is by using the function input parameter called `update_every``.` This implementation
    uses a value of 1 so that every update of Q is followed by an update of the policy
    as well. Lastly, you update the target network weights using polyak averaging.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 列表[9-6](#PC6)展示了`one_step_update`的PyTorch代码。第一步是计算Q损失，并在评论家/Q网络权重上进行梯度下降。接着计算策略损失，并在演员/策略网络权重上进行梯度下降。在DDPG的某些版本中，策略的更新相对于Q网络的更新是延迟的，也就是说，每进行“k”次Q网络的更新，才进行一次策略的更新。控制“k”的逻辑是通过使用名为`update_every`的函数输入参数来实现的。这种实现使用的是1的值，以确保每次Q的更新之后，策略也会进行更新。最后，使用Polyak平均法更新目标网络权重。
- en: '[PRE5]'
  id: totrans-132
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'DDPG: Main Loop'
  id: totrans-133
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: DDPG：主循环
- en: The final step is the implementation of the DDPG algorithm, which uses the earlier
    `one_step_update` function. It creates the optimizers and initializes the environment.
    It keeps stepping through the environment using the current online policy. It
    also maintains a history of `q_loss`, `policy_loss`, and average return per episode
    so that you can plot the trends of these three key metrics during the progress
    of training.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一步是实现DDPG算法，该算法使用之前的`one_step_update`函数。它创建优化器并初始化环境。它使用当前的在线策略在环境中进行步进。它还维护`q_loss`、`policy_loss`和每集平均回报的历史记录，以便您可以在训练过程中绘制这三个关键指标的趋势。
- en: Initially, for the first `start_steps=10000`, it takes a random action to explore
    the environment, and once enough transitions are collected, it uses the current
    policy with scaled Gaussian noise to selection actions. The transitions are added
    to the `ReplayBuffer`, dropping the earliest one from buffer if the buffer has
    reached full capacity. Once `start_steps` count is reached, it starts gradient
    updates inside the main training loop. This happens using the `one_step_update`
    function defined in Listing [9-6](#PC6). You then run the training loop for a
    total of 20,000 steps, the first 10,000 to collect transitions to fill the replay
    buffer, followed by the next 10,000 steps of gradient updates.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 初始时，对于前`start_steps=10000`步，它采取随机动作来探索环境，一旦收集到足够的转换，它就使用当前策略和缩放高斯噪声来选择动作。转换被添加到`ReplayBuffer`中，如果缓冲区已满，则丢弃最早的转换。一旦`start_steps`计数达到，它开始在主训练循环中进行梯度更新。这是通过在列表[9-6](#PC6)中定义的`one_step_update`函数来实现的。然后你运行训练循环总共20,000步，前10,000步用于收集转换以填充重放缓冲区，接着是接下来的10,000步的梯度更新。
- en: The loop also has code to update the plots of training progress for Q-loss,
    policy-loss, and average return per episode. The update frequency of graphs is
    controlled with the `eval_freq` parameter. The training loop code is shown in
    Listing [9-7](#PC7).
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 循环中还包括用于更新Q损失、策略损失和每集平均回报的进度图的代码。图的更新频率由`eval_freq`参数控制。训练循环的代码在列表[9-7](#PC7)中展示。
- en: '[PRE6]'
  id: totrans-137
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: There are additional utility codes used to record the trained agent videos.
    The rest of the code trains the agent and then records the performance of the
    trained agent. You run the algorithm first for the Pendulum environment. These
    code versions are interesting, but as they are incidental to the objective of
    learning about DDPG, I do not dive into the details of these code implementations.
    However, interested readers may want to check out the relevant library documentation
    and step through the code. Figure [9-7](#Fig7) shows the graph as training progresses.
    If you watch the video of the trained agent in the `9.a-ddpg.ipynb` notebook,
    you will see that the agent quickly learns to balance the pole in an upright position,
    within 10,000 steps of gradient updates.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 有额外的实用代码用于记录训练智能体的视频。其余的代码训练智能体，然后记录训练智能体的性能。你首先为Pendulum环境运行算法。这些代码版本很有趣，但它们与学习DDPG的目标无关，因此我不深入探讨这些代码实现的细节。然而，感兴趣的读者可以查看相关库的文档并逐步查看代码。图[9-7](#Fig7)显示了随着训练进展的图表。如果你观看`9.a-ddpg.ipynb`笔记本中训练智能体的视频，你会看到智能体在10,000次梯度更新内快速学会将杆保持垂直位置。
- en: '![](../images/502835_2_En_9_Chapter/502835_2_En_9_Fig7_HTML.jpg)'
  id: totrans-139
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/502835_2_En_9_Chapter/502835_2_En_9_Fig7_HTML.jpg)'
- en: 3 line graphs for pendulum using D D P G. Left. Mean return per episode has
    a fluctuating line. Center. A fluctuating line for loss of Q decreases logarithmically
    from (0, 95) to (8000, 15). Right. A noisy line for loss of actor decreases from
    (0, 2.5) to (8000, negative 24). Values are estimated.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 使用DDPG的Pendulum的3条线图。左。每集的平均回报线波动。中。Q值损失的波动线以对数方式从(0, 95)减少到(8000, 15)。右。演员损失的波动线从(0,
    2.5)减少到(8000, 负24)。值是估计的。
- en: Figure 9-7
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-7
- en: Training progress for Pendulum using DDPG
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 使用DDPG的Pendulum的训练进度
- en: You can also run the same code train an agent for Lunar-Lander Continuous environment.
    You can refer to the notebook for observing the training graphs and videos.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以运行相同的代码来训练一个针对Lunar-Lander连续环境的智能体。你可以参考笔记本来观察训练图和视频。
- en: Next, you look at twin delayed DDPG, also known as TD3\. It has some other enhancements
    and tricks to address some of the stability and convergence speed issues seen
    in DDPG.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，你将了解双延迟DDPG，也称为TD3。它有一些其他增强和技巧来解决DDPG中看到的一些稳定性和收敛速度问题。
- en: Twin Delayed DDPG
  id: totrans-145
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 双延迟DDPG
- en: 'Twin delayed DDPG (TD3) was proposed in 2018 in a paper titled “Addressing
    Function Approximation Error in Actor-Critic Methods.”^([6](#Fn6)) DDPG suffers
    from the overestimation bias that you saw in Q-learning in Chapter [4](502835_2_En_4_Chapter.xhtml)
    (in the section “Maximization Bias and Double Q-learning”). You saw the approach
    of double DQN in Chapter [7](502835_2_En_7_Chapter.xhtml) to address the bias
    by decoupling the maximizing action and maximum q-value. In the previously mentioned
    paper, the authors show that DDPG also suffers from the same overestimation bias.
    They propose a variant of double Q-learning, which addresses this overestimation
    bias in DDPG. The approach uses the following modifications:'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 双延迟DDPG（TD3）于2018年在一篇题为“Addressing Function Approximation Error in Actor-Critic
    Methods.”的论文中提出。^([6](#Fn6)) DDPG存在你在第四章中看到的Q-learning中的过估计偏差。你看到了在第七章中通过解耦最大化动作和最大q值来处理偏差的双DQN方法。在之前提到的论文中，作者们表明DDPG也存在着相同的过估计偏差。他们提出了一种双Q学习的变体，用以解决DDPG中的过估计偏差。该方法采用了以下修改：
- en: '*Clipped double Q-learning*: TD3 uses two independent Q-functions and takes
    the minimum of the two while forming targets under Bellman equations, that is,
    the targets in Step 11 of the DDPG pseudocode in Figure [9-4](#Fig4). This modification
    is the reason the algorithm is called *twin*.'
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*裁剪双Q学习*：TD3使用两个独立的Q函数，并在形成贝尔曼方程的目标时取两个中的最小值，即图[9-4](#Fig4)中DDPG伪代码的第11步中的目标。这种修改是算法被称为*twin*的原因。'
- en: '*Delayed policy updates*: TD3 updates the policy and target networks less frequently
    as compared to the Q-function updates. The paper recommends one update to the
    policy and target networks for every two updates of the Q function. It means carrying
    out updates in Steps 13 and 14 of the DDPG pseudocode in Figure [9-4](#Fig4) once
    for every two updates of the Q-function in Steps 11 and 12\. This modification
    is the reason to call this algorithm *delayed*.'
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*延迟策略更新*：TD3 相比于 Q 函数更新，更新策略和目标网络的频率较低。论文建议每更新两次 Q 函数，就对策略和目标网络进行一次更新。这意味着在图
    [9-4](#Fig4) 中的 DDPG 伪代码的第 13 和 14 步中，每更新两次 Q 函数就执行一次更新。这种修改是将其称为 *延迟* 算法的原因。'
- en: '*Target policy smoothing*: TD3 adds noise to the target action, making it harder
    for the policy to exploit Q-function estimation errors and control the overestimation
    bias.'
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*目标策略平滑*：TD3 向目标动作添加噪声，这使得策略更难利用 Q 函数估计误差并控制过估计偏差。'
- en: Target-Policy Smoothing
  id: totrans-150
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Target-Policy Smoothing
- en: The action used to calculate the target *y*(*r*, *s*^’, *d*) is based on the
    target networks. In DDPG, you calculated ![$$ {a}^{\prime}\left({s}^{\prime}\right)={\mu}_{\theta_{\mathrm{targ}}}\left({s}^{\prime}\right)
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq15.png) in step
    11 of Figure [9-4](#Fig4). However, in TD3, you carry out the target policy smoothening
    by adding noise to the action. To the deterministic action ![$$ {\mu}_{\theta_{\mathrm{targ}}}\left({s}^{\prime}\right)
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq16.png), you
    add a mean zero Gaussian noise with some clip ranges. The action is then further
    clipped using *tanh* and multiplied with `max_action_range` to make sure that
    action values fit within the range of accepted action values.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 用于计算目标 *y*(*r*, *s*′，*d*) 的动作基于目标网络。在 DDPG 中，你在图 [9-4](#Fig4) 的第 11 步计算了 ![a'^(s')=μ_θ^(targ)(s')](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq15.png)。然而，在
    TD3 中，你通过向动作添加噪声来执行目标策略平滑。对于确定性的动作 ![μ_θ^(targ)(s')](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq16.png)，你添加一个均值为零的高斯噪声，并设置一些剪辑范围。然后，使用
    *tanh* 进一步剪辑动作，并乘以 `max_action_range`，以确保动作值在可接受的动作值范围内。
- en: '![$$ a= clip\left({\mu}_{\theta }(s)+\alpha \cdotp \epsilon, {a}_{Low},{a}_{High}\right)
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ9.png)'
  id: totrans-152
  prefs: []
  type: TYPE_IMG
  zh: '![a=clip(μ_θ(s)+α·ε,a_Low,a_High)](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ9.png)'
- en: (9-9)
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: (9-9)
- en: where *ϵ* ∼ *N*, and *α* is the scale of noise equal to range of action values.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *ϵ* ∼ *N*，且 *α* 是噪声的尺度，等于动作值的范围。
- en: Q-Loss (Critic)
  id: totrans-155
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Q-Loss (Critic)
- en: 'You’ll use two independent Q-functions. The minimum of the two Q functions
    is used in the TD(0) target and this target is then used for the combined Q-loss,
    which is minimized to update the parameters of the two agent Q networks. Expressing
    the target mathematically looks like this:'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 你将使用两个独立的 Q 函数。两个 Q 函数中的最小值用于 TD(0) 目标，然后这个目标用于组合 Q 损失，该损失被最小化以更新两个智能体 Q 网络的参数。用数学表达式表示目标如下：
- en: '![$$ y\left(r,{s}^{\prime },d\right)=r+\gamma \left(1-d\right)\underset{i=1,2}{\min
    }{Q}_{\phi_{\mathrm{targ},i}}\left({s}^{\prime },{a}^{\prime}\left({s}^{\prime}\right)\right)
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ10.png)'
  id: totrans-157
  prefs: []
  type: TYPE_IMG
  zh: '![y(r,s'',d)=r+γ(1-d)min_{i=1,2}Q_{φ_{targ,i}}(s'',a''(s''))](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ10.png)'
- en: (9-10)
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: (9-10)
- en: 'This first uses Equation [9-9](#Equ9) to find the noisy target action *a*^′(*s*^′).
    This in turn is used to calculate the target q-values: the q-value of the first
    and second Q target networks ![$$ {Q}_{\phi_{\mathrm{targ},1}}\left({s}^{\prime
    },{a}^{\prime}\left({s}^{\prime}\right)\right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq17.png)
    and ![$$ {Q}_{\phi_{\mathrm{targ},2}}\left({s}^{\prime },{a}^{\prime}\left({s}^{\prime}\right)\right)
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq18.png)'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 这首先使用方程 [9-9](#Equ9) 来找到噪声目标动作 *a*′(*s*′)。这反过来又用于计算目标 q 值：第一个和第二个 Q 目标网络的 q
    值 ![Q_{φ_{targ,1}}(s',a'(s'))](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq17.png)
    和 ![Q_{φ_{targ,2}}(s',a'(s'))](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq18.png)
- en: 'The common target in Equation [9-10](#Equ10) is used next to find the losses
    for both Q-networks, as shown here:'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 方程 [9-10](#Equ10) 中的公共目标随后用于找到两个 Q 网络的损失，如下所示：
- en: '![$$ {Q}_{Loss,1}=\frac{1}{B}{\sum}_{\left(s,a,r,{s}^{\prime },d\right)\in
    B}{\left({Q}_{\upphi_1}\left(s,a\right)-y\left(r,{s}^{\prime },d\right)\right)}^2
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ11.png)'
  id: totrans-161
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {Q}_{Loss,1}=\frac{1}{B}{\sum}_{\left(s,a,r,{s}^{\prime },d\right)\in
    B}{\left({Q}_{\upphi_1}\left(s,a\right)-y\left(r,{s}^{\prime },d\right)\right)}^2
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ11.png)'
- en: (9-11a)
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: (9-11a)
- en: And,
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 以及，
- en: '![$$ {Q}_{Loss,2}=\frac{1}{B}{\sum}_{\left(s,a,r,{s}^{\prime },d\right)\in
    B}{\left({Q}_{\upphi_2}\left(s,a\right)-y\left(r,{s}^{\prime },d\right)\right)}^2
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ12.png)'
  id: totrans-164
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {Q}_{Loss,2}=\frac{1}{B}{\sum}_{\left(s,a,r,{s}^{\prime },d\right)\in
    B}{\left({Q}_{\upphi_2}\left(s,a\right)-y\left(r,{s}^{\prime },d\right)\right)}^2
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ12.png)'
- en: (9-11b)
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: (9-11b)
- en: The losses are added and then minimized independently to train the ![$$ {Q}_{\phi_1}
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq19.png) and ![$$
    {Q}_{\phi_2} $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq20.png)
    networks (i.e., two online Critic networks).
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 损失被添加后，独立最小化以训练![$$ {Q}_{\phi_1} $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq19.png)
    和 ![$$ {Q}_{\phi_2} $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq20.png)
    网络（即两个在线Critic网络）。
- en: '![$$ {Q}_{Loss}={\sum}_{i=1,2}{Q}_{Loss,i} $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ13.png)'
  id: totrans-167
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {Q}_{Loss}={\sum}_{i=1,2}{Q}_{Loss,i} $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ13.png)'
- en: (9-12)
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: (9-12)
- en: Policy Loss (Actor)
  id: totrans-169
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 政策损失（Actor）
- en: The policy loss calculation remains unchanged, the same as what was used in
    DDPG.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 策略损失的计算保持不变，与DDPG中使用的相同。
- en: '![$$ \mathrm{Polic}{\mathrm{y}}_{\mathrm{Loss}}=-\frac{1}{\mathrm{B}}{\sum}_{\mathrm{s}\in
    B}{\mathrm{Q}}_{\upphi_1}\left(s,{\mu}_{\theta }(s)\right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ14.png)'
  id: totrans-171
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \mathrm{Polic}{\mathrm{y}}_{\mathrm{Loss}}=-\frac{1}{\mathrm{B}}{\sum}_{\mathrm{s}\in
    B}{\mathrm{Q}}_{\upphi_1}\left(s,{\mu}_{\theta }(s)\right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ14.png)'
- en: (9-13)
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: (9-13)
- en: Note that you use only ![$$ {\mathrm{Q}}_{\upphi_1} $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq21.png)
    in the equation. As with DDPG, also note the -ve sign. You need to do gradient
    ascent, but PyTorch does gradient descent. You can convert the ascent to descent
    using a -ve sign.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，您在方程中只使用![$$ {\mathrm{Q}}_{\upphi_1} $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq21.png)。与DDPG类似，也请注意负号。您需要进行梯度上升，但PyTorch执行梯度下降。您可以使用负号将上升转换为下降。
- en: Delayed Update
  id: totrans-174
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 延迟更新
- en: Update the online policy and the agent network weights in a delayed manner—one
    update for every two updates of the online Q networks ![$$ {Q}_{\phi_1} $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq22.png)
    and ![$$ {Q}_{\phi_2} $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq23.png).
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 延迟更新在线策略和代理网络权重——每两次在线Q网络更新进行一次更新！[$$ {Q}_{\phi_1} $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq22.png)
    和 ![$$ {Q}_{\phi_2} $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq23.png)。
- en: Pseudocode and Implementation
  id: totrans-176
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模拟伪代码和实现
- en: At this point, you are ready to see the complete pseudocode. Refer to Figure
    [9-8](#Fig8).
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，您已经准备好查看完整的伪代码。请参阅图[9-8](#Fig8)。
- en: '![](../images/502835_2_En_9_Chapter/502835_2_En_9_Fig8_HTML.jpg)'
  id: totrans-178
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/502835_2_En_9_Chapter/502835_2_En_9_Fig8_HTML.jpg)'
- en: A pseudocode for twin delayed D D P G. Input initial policy parameters theta,
    Q-function parameters phi 1 and 2, and empty relay buffer D is followed by set
    target parameters, compute target actions and action targets, update Q-function
    and policy, and update target networks using poly a k averaging.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 双延迟DDPG的伪代码。输入初始策略参数theta，Q函数参数phi 1和2，以及空的中继缓冲区D，然后设置目标参数，计算目标动作和动作目标，更新Q函数和策略，并使用poly
    a k平均更新目标网络。
- en: Figure 9-8
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-8
- en: Twin delayed DDPG algorithm
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 双延迟DDPG算法
- en: Code Implementation
  id: totrans-182
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 代码实现
- en: Now you walk through the code implementation. As with DDPG, you will run the
    algorithm on Pendulum and Lunar-Lander. Most of the code is similar to that of
    DDPG except for the three modifications covered earlier. Accordingly, I will only
    walk through just the highlights. You can find the complete code for the PyTorch
    version in the `9.b-td3.ipynb` file.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您将遍历代码实现。与DDPG类似，您将在Pendulum和Lunar-Lander上运行该算法。大部分代码与DDPG类似，除了前面提到的三个修改。因此，我只会介绍一些重点。您可以在`9.b-td3.ipynb`文件中找到PyTorch版本的完整代码。
- en: Combined Model-Actor-Critic Implementation
  id: totrans-184
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 模型-Actor-Critic联合实现
- en: You’ll first look at the agent networks. The individual Q-network (critic) `MLPQFunction`
    and policy-network (actor) `MLPActor` are the same as before. However, the agent
    where you combine the actor and critic, that is, `MLPActorCritic`, sees a minor
    change. You now have two Q-networks in line with the “twin” part of TD3\. Listing
    [9-8](#PC8) contains the code for `MLPActorCritic`.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 你首先将查看代理网络。单个 Q 网络（评论家）`MLPQFunction` 和策略网络（演员）`MLPActor` 与之前相同。然而，将演员和评论家结合在一起的网络，即
    `MLPActorCritic`，有一些小的变化。现在你有两个 Q 网络与 TD3 的“双胞胎”部分一致。列表 [9-8](#PC8) 包含了 `MLPActorCritic`
    的代码。
- en: '[PRE7]'
  id: totrans-186
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Q-Loss Implementation
  id: totrans-187
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: Q 损失实现
- en: The replay buffer remains the same. The next change is in the way Q-loss is
    calculated. You implement target policy smoothing and clipped double Q-learning
    as per Equations [9-9](#Equ9) to [9-12](#Equ13). Listing [9-9](#PC9) contains
    the code for `compute_q_loss` in PyTorch. Similar to DDPG, you first convert all
    the inputs from NumPy array to PyTorch tensors, moving these to GPU if required.
    `q1 = agent.q1(states, actions)` and `q2 = agent.q2(states, actions)` pass the
    batch of `(state,action)` tuples through the two Q-networks for the online agent
    and obtain the two q-values—the twin part of the TD3\. Next, you target the policy
    to form `action_target`, which are the noisy actions with smoothing for next state
    in line with Equation [9-9](#Equ9). `action_target` is then passed through the
    target Q-networks to `obtain q1_target` and then to `q2_target`, followed by the
    minimum of the two values to get `q_target`. Once `q_target` is obtained, you
    form the *TD*(0) target, as shown in Equation [9-10](#Equ10). Next, you form the
    joint MSE loss between `q1` and `target` as well as between `q2` and `target`
    in line with Equations [9-11](#Equ11) and [9-12](#Equ13). The calculations not
    involving the online q-network are carried out under `torch.no_grad()` to stop
    gradient accumulation, speed up the calculation, and save memory. This is because
    `q_loss` is used to adjust only the weights of online q-networks.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 重放缓冲区保持不变。下一个变化在于 Q 损失的计算方式。你根据方程 [9-9](#Equ9) 到 [9-12](#Equ13) 实现目标策略平滑和裁剪的双
    Q 学习。列表 [9-9](#PC9) 包含了 PyTorch 中 `compute_q_loss` 的代码。与 DDPG 类似，你首先将所有输入从 NumPy
    数组转换为 PyTorch 张量，如果需要则移动到 GPU 上。`q1 = agent.q1(states, actions)` 和 `q2 = agent.q2(states,
    actions)` 将 `(state,action)` 元组的批次通过两个在线代理的 Q 网络传递，获得两个 q 值——TD3 的双胞胎部分。接下来，你将目标策略调整为
    `action_target`，这是与方程 [9-9](#Equ9) 一致的带有平滑的噪声动作，用于下一个状态。然后，`action_target` 通过目标
    Q 网络传递以获得 `q1_target` 和 `q2_target`，然后取两个值的最小值得到 `q_target`。一旦获得 `q_target`，你将形成
    *TD*(0) 目标，如方程 [9-10](#Equ10) 所示。接下来，你根据方程 [9-11](#Equ11) 和 [9-12](#Equ13) 形成联合
    MSE 损失，在 `q1` 和 `target` 之间以及 `q2` 和 `target` 之间。不涉及在线 q 网络的计算在 `torch.no_grad()`
    下执行，以停止梯度累积，加快计算速度并节省内存。这是因为 `q_loss` 仅用于调整在线 q 网络的权重。
- en: '[PRE8]'
  id: totrans-189
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Policy-Loss Implementation
  id: totrans-190
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 策略损失实现
- en: Policy loss calculation remains the same except that you use only one of the
    Q-networks, which is the first one with weights *ϕ*[1].
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 策略损失计算保持不变，只是你只使用一个 Q 网络即可，即权重为 *ϕ*[1] 的第一个网络。
- en: One-Step Update Implementation
  id: totrans-192
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 单步更新实现
- en: The implementation of the `one_step_update` function is also pretty similar,
    except for the fact that you need to carry out the gradient of q-loss with respect
    to the combined network weights of the Q1 and Q2 networks passed into the function
    as `q_params`. Further, you carry out online policy updates and updates to target
    Q-networks and the target policy network once every two updates of the online
    Q-network update. Listing [9-10](#PC10) contains the implementation of `one_step_update`
    in PyTorch.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: '`one_step_update` 函数的实现也非常相似，只是你需要执行 q 损失相对于 Q1 和 Q2 网络组合网络权重的梯度，这些权重作为 `q_params`
    传递给函数。此外，你每更新两次在线 Q 网络更新，就执行一次在线策略更新和目标 Q 网络以及目标策略网络的更新。列表 [9-10](#PC10) 包含了 PyTorch
    中 `one_step_update` 的实现。'
- en: '[PRE9]'
  id: totrans-194
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: TD3 Main Loop
  id: totrans-195
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: TD3 主循环
- en: The next change is to the frequency of updates. Unlike DDPG, in TD3 you update
    the online policy and target weights once for every two updates of Q-networks,
    which is controlled inside the `one_step_update` function shown in Listing [9-10](#PC10).
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个变化是更新频率。与 DDPG 不同，在 TD3 中，你每更新两次 Q 网络就更新一次在线策略和目标权重，这由 `one_step_update`
    函数控制，如列表 [9-10](#PC10) 所示。
- en: Now run TD3 first for the Pendulum environment and then for the Lunar-Lander
    Gymnasium environment. Figure [9-9](#Fig9) shows the graph as training progresses.
    If you watch the video of the trained agent in the `9.b-td3.ipynb` notebook, you
    will see that the agent learns to balance the pole in an upright position fairly
    quickly, within 10,000 steps of gradient updates. Also, if you compare the average
    return per episode for DDPG, as shown in Figure [9-7](#Fig7), with the return
    under TD3 shown in Figure [9-9](#Fig9), you can see that under TD3, the return
    improves almost monotonically as training progresses, while in DDPG there is an
    initial dip before the return starts moving up. This points to the stability of
    the learning process displayed in TD3 due to the multiple enhancements implemented
    in TD3 over the DDPG versions. Interested readers can refer to the original paper
    of TD3 to check out the benchmark studies that the authors of TD3 did with respect
    to other algorithms.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 现在首先为摆锤环境运行TD3，然后为月球着陆场环境运行。图[9-9](#Fig9)显示了随着训练的进行而变化的图表。如果你查看`9.b-td3.ipynb`笔记本中训练代理的视频，你会看到代理学会在10,000次梯度更新内相当快地平衡杆。此外，如果你比较DDPG的平均回报，如图[9-7](#Fig7)所示，与TD3在图[9-9](#Fig9)中显示的回报，你将看到在TD3下，回报随着训练的进行几乎单调递增，而在DDPG中，回报开始上升之前有一个初始下降。这表明TD3由于在DDPG版本上实施的多个增强而显示出的学习过程的稳定性。感兴趣的读者可以参考TD3的原始论文，以检查TD3的作者与其他算法进行的基准研究。
- en: '![](../images/502835_2_En_9_Chapter/502835_2_En_9_Fig9_HTML.jpg)'
  id: totrans-198
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_9_Chapter/502835_2_En_9_Fig9_HTML.jpg)'
- en: 3 line graphs for pendulum using T D 3\. Left. The mean return per episode increases
    from (0, negative 1550) to (19, negative 150). Center. The line for loss of Q
    decreases logarithmically from (0, 11.5) to (9500, 1). Right. The loss of actor
    increases from (0, 5) to (4800, 70). Values are estimated.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 使用TD3的摆锤的3条线图。左图。每期的平均回报从(0, -1550)增加到(19, -150)。中图。Q损失的线对数下降从(0, 11.5)到(9500,
    1)。右图。演员的损失从(0, 5)增加到(4800, 70)。值是估计的。
- en: Figure 9-9
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-9
- en: Training progress for Pendulum using TD3
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 使用TD3训练摆锤的训练进度
- en: Soon you will look at the last algorithm in this chapter, an algorithm called
    *soft actor-critic (SAC)*. However, before you do that, the chapter takes a short
    detour to explain something called the *reparameterization trick* that SAC uses.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 很快你将看到本章的最后一个算法，一个称为*软演员-评论家（SAC）*的算法。然而，在你这样做之前，本章将简要地偏离主题，解释SAC使用的*重参数化技巧*。
- en: Reparameterization Trick
  id: totrans-203
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 重参数化技巧
- en: The reparameterization trick is a “change in the variable” approach that is
    used in variational auto-encoders (VAEs). There, it is needed to propagate gradients
    through nodes, which are stochastic. Reparameterization is also used to bring
    down the variance of gradient estimates. The second reason is explored here. This
    deep dive follows a blog post by Goker Erdogan^([7](#Fn7)) with additional analytical
    derivations and explanations.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 重参数化技巧是一种“变量改变”的方法，它在变分自编码器（VAEs）中得到了应用。在那里，它需要通过随机节点传播梯度。重参数化还用于降低梯度估计的方差。第二个原因在这里进行了探讨。这次深入探讨遵循了Goker
    Erdogan的博客文章^([7](#Fn7))，并增加了额外的分析和解释。
- en: 'Suppose you have a random variable *x*, which follows a normal distribution
    with mean θ and unit variance. Let the distribution be parameterized by mean *θ*
    as follows:'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你有一个随机变量*x*，它遵循以θ为均值、单位方差的正态分布。让分布由均值*θ*如下参数化：
- en: '![$$ x\sim {p}_{\uptheta}(x)=N\left(\uptheta, 1\right)=\frac{1}{\sqrt{2\uppi}}{e}^{-\frac{1}{2}{\left(x-\uptheta
    \right)}^2} $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ15.png)'
  id: totrans-206
  prefs: []
  type: TYPE_IMG
  zh: '![x服从p_θ(x)=N(θ, 1)=1/(√2π)e^(-1/2(x-θ)^2)](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ15.png)'
- en: (9-14)
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: (9-14)
- en: First, you draw samples from it. Next, you assume that you do not know θ and
    use these samples from the true distribution to find the estimated value of θ,
    using mean square error (MSE) *J*(θ) with the help of gradient descent.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，你从它中抽取样本。接下来，你假设你不知道θ，并使用这些来自真实分布的样本，通过梯度下降法，使用均方误差（MSE）*J*(θ)来找到θ的估计值。
- en: '![$$ J\left(\uptheta \right)={E}_{x\sim {p}_{\uptheta}(x)}\left[{x}^2\right]
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Eque.png)'
  id: totrans-209
  prefs: []
  type: TYPE_IMG
  zh: '![J(θ)=E_x~p_θ(x)[x^2]](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Eque.png)'
- en: The focus is on finding two different approaches for determining the estimate
    of the derivate/gradient ∇[θ]*J*(θ).
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 重点在于找到两种不同的方法来确定导数/梯度的估计值∇[θ]*J*(θ)。
- en: Score/Reinforce Way
  id: totrans-211
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 分数/强化方式
- en: Since the parameter `\theta` over which you want to find the gradient also impacts
    the distribution over which expectation is carried out in the expression for *J*(θ),
    you can follow the log trick, which is what you did with REINFORCE and policy
    gradient in Chapter [8](502835_2_En_8_Chapter.xhtml). You saw that it has high
    variance, and that’s what I want to demonstrate for a simple example distribution
    shown earlier. Take the derivative of *J*(θ) with respect to *θ*.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 由于你想要找到梯度的参数 `\theta` 也会影响 *J*(θ) 表达式中期望值所涉及的分布，你可以遵循对数技巧，这与你在第 [8](502835_2_En_8_Chapter.xhtml)
    章节中使用的 REINFORCE 和策略梯度相同。你看到它具有高方差，这正是我想通过前面展示的简单示例分布来证明的。对 *J*(θ) 关于 *θ* 求导。
- en: '![$$ {\nabla}_{\uptheta}J\left(\uptheta \right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equf.png)'
  id: totrans-213
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equf.png)'
- en: '![$$ ={\nabla}_{\uptheta}{E}_{x\sim {p}_{\uptheta}(x)}\left[{x}^2\right] $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equg.png)'
  id: totrans-214
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equg.png)'
- en: '![$$ ={\nabla}_{\uptheta}\int {p}_{\uptheta}(x){x}^2 dx $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equh.png)'
  id: totrans-215
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equh.png)'
- en: '![$$ =\int {\nabla}_{\uptheta}{p}_{\uptheta}(x){x}^2 dx $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equi.png)'
  id: totrans-216
