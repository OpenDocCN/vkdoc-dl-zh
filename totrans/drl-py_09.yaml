  zh: '![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equk.png)'
- en: '![$$ =\int {p}_{\uptheta}(x){\nabla}_{\uptheta}\mathit{\log}\ {p}_{\uptheta}(x){x}^2
    dx $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equl.png)'
  id: totrans-219
