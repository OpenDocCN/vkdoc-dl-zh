- en: Next, use Monte Carlo to form an estimate of ∇[θ]*J*(θ) using samples.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，使用蒙特卡洛方法通过样本形成 ∇[θ]*J*(θ) 的估计。
- en: '![$$ {\nabla}_{\uptheta}\hat{J}\left(\uptheta \right)=\frac{1}{N}{\sum}_{i=1}^N{\nabla}_{\uptheta}\mathit{\log}\;{p}_{\uptheta}\left({x}_i\right){x}_i^2
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equn.png)'
  id: totrans-222
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equn.png)'
- en: 'Substituting the expression for *p*[*θ*](*x*) from Equation [9-14](#Equ15)
    and taking a log followed by gradient w.r.t. *θ*, you get the following:'
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 将方程 [9-14](#Equ15) 中的 *p*[*θ*](*x*) 的表达式代入，并对 *θ* 求对数后求梯度，你得到以下结果：
- en: '![$$ {\nabla}_{\uptheta}\hat{J}\left(\uptheta \right)=\frac{1}{N}{\sum}_{i=1}^N\left({x}_i-\uptheta
    \right){x}_i^2 $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ16.png)'
  id: totrans-224
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ16.png)'
- en: (9-15)
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: (9-15)
- en: Reparameterization Trick and Pathwise Derivatives
  id: totrans-226
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 重新参数化技巧和路径导数
- en: 'The second approach is that of the reparameterization trick. You will redefine
    random variable *x* as a composition of a constant and a normal distribution that
    has no parameter *θ*. Let *x* be defined as follows:'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 第二种方法是重新参数化技巧。你将重新定义随机变量 *x* 为一个常数和一个没有参数 *θ* 的正态分布的组合。定义 *x* 如下：
- en: '![$$ x=\uptheta +\upvarepsilon \kern1em \mathrm{where}\kern0.75em \upvarepsilon
    \sim N\left(0,1\right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equo.png)'
  id: totrans-228
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equo.png)'
- en: Note that the previous reparameterization leaves the distribution for *x* unchanged.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，之前的重新参数化没有改变 *x* 的分布。
- en: '![$$ {p}_{\uptheta}(x)=N\left(\uptheta, 1\right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equp.png)'
  id: totrans-230
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equp.png)'
- en: 'Now calculate: ![$$ {\nabla}_{\uptheta}J\left(\uptheta \right)={\nabla}_{\uptheta}{E}_{x\sim
    {p}_{\uptheta}(x)}\left[{x}^2\right] $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq24.png)'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 现在计算：![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq24.png)
- en: '![$$ ={\nabla}_{\uptheta}{E}_{x\sim {p}_{\uptheta}(x)}\left[{x}^2\right] $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equq.png)'
  id: totrans-232
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equq.png)'
- en: '![$$ ={\nabla}_{\uptheta}{E}_{\upvarepsilon \sim N\left(0,1\right)}\left[{\left(\uptheta
    +\upvarepsilon \right)}^2\right] $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equr.png)'
  id: totrans-233
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equr.png)'
- en: As the expectation does not depend on *θ*, you can move the gradient inside
    without running into the *log* issue (i.e., finding log inside the derivate) shown
    in the previous method.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 由于期望值不依赖于*θ*，因此可以将梯度移到内部，而不会遇到之前方法中出现的*对数*问题（即在导数中找到对数）。
- en: '![$$ {\nabla}_{\uptheta}J\left(\uptheta \right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equs.png)'
  id: totrans-235
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equs.png)'
- en: '![$$ ={\nabla}_{\uptheta}\int p\left(\upvarepsilon \right){\left(\uptheta +\upvarepsilon
    \right)}^2d\upvarepsilon $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equt.png)'
  id: totrans-236
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equt.png)'
- en: '![$$ =\int p\left(\upvarepsilon \right){\nabla}_{\uptheta}{\left(\uptheta +\upvarepsilon
    \right)}^2d\upvarepsilon $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equu.png)'
  id: totrans-237
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equu.png)'
- en: '![$$ =\int p\left(\upvarepsilon \right)2\left(\uptheta +\upvarepsilon \right)d\upvarepsilon
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equv.png)'
  id: totrans-238
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equv.png)'
- en: '![$$ ={E}_{\upvarepsilon \sim N\left(0,1\right)}\left[2\left(\uptheta +\upvarepsilon
    \right)\right] $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equw.png)'
  id: totrans-239
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equw.png)'
- en: 'Next, convert the expectation to the Monte Carlo (MC) estimate to get the following:'
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，将期望值转换为蒙特卡洛（MC）估计，得到以下结果：
- en: '![$$ {\nabla}_{\uptheta}\hat{J}\left(\uptheta \right)=\frac{1}{N}{\sum}_{i=1}^N2\left(\uptheta
    +{\upvarepsilon}_i\right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ17.png)'
  id: totrans-241
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ17.png)'
- en: (9-16)
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: (9-16)
- en: Take a moment to compare the two estimates of ∇[θ]*J*(θ) given in Equations
    [9-15](#Equ16) and [9-16](#Equ17). Remember these two are the estimates of the
    true gradient ∇[θ]*J*(θ) and therefore may show different convergence properties
    toward the actual value. This convergence will be a function of the number of
    samples of the true distribution you have. Both will converge to the true distribution
    as N, the number of training samples increase. However, one of them will converge
    to the true value a lot faster and in a more stable way, while the other one will
    take a large number of training samples. Can you guess which one is better? Ponder
    this for a few minutes before proceeding.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 抽空比较方程 [9-15](#Equ16) 和 [9-16](#Equ17) 中给出的 ∇[θ]*J*(θ) 的两个估计。记住这两个是真实梯度 ∇[θ]*J*(θ)
    的估计，因此可能显示出不同的收敛性质。这种收敛将取决于你拥有的真实分布的样本数量。随着训练样本数量 N 的增加，两者都将收敛到真实分布。然而，其中一个将更快、更稳定地收敛到真实值，而另一个将需要大量的训练样本。你能猜到哪一个更好吗？在继续之前，花几分钟时间思考这个问题。
- en: Experiment
  id: totrans-244
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 实验
- en: Equations [9-15](#Equ16) and [9-16](#Equ17) are used to calculate the mean and
    variance of the estimates using two approaches. They do so using different values
    of *N* to calculate the estimate as per Equations [9-15](#Equ16) and [9-16](#Equ17),
    and then repeat the experiment 10,000 times for each value of *N* to calculate
    the mean and variance of the gradient estimates under two approaches. This experiment
    will show that the mean is the same for both equations. In other words, they estimate
    the same value, but the variance of the estimate in Equation [9-15](#Equ16) is
    higher than the variance of the estimate in Equation [9-16](#Equ17) by almost
    one order of magnitude. It’s higher by a factor of 21.75 in this case.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 方程 [9-15](#Equ16) 和 [9-16](#Equ17) 用于通过两种方法计算估计的均值和方差。它们使用不同的 *N* 值来根据方程 [9-15](#Equ16)
    和 [9-16](#Equ17) 计算估计，然后对每个 *N* 值重复实验 10,000 次，以计算两种方法下梯度估计的均值和方差。这个实验将表明两个方程的均值相同。换句话说，它们估计了相同的值，但方程
    [9-15](#Equ16) 中的估计方差比方程 [9-16](#Equ17) 中的估计方差高近一个数量级。在这种情况下，高出一个因子 21.75。
- en: 'To carry out this experiment, follow the steps listed here:'
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 要进行这个实验，请遵循以下步骤：
- en: 'Freeze: θ = 2'
  id: totrans-247
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'Freeze: θ = 2'
- en: Generate samples for *x* ∼ *N*(θ, 1) and use these samples in Equation [9-15](#Equ16)
    to calculate the REINFORCE estimate of ∇[θ]*J*(θ).
  id: totrans-248
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为 *x* ∼ *N*(θ, 1) 生成样本，并使用这些样本在方程 [9-15](#Equ16) 中计算 ∇[θ]*J*(θ) 的 REINFORCE
    估计。
- en: Generate samples for ϵ ∼ *N*(0, 1) and use these samples in Equation [9-16](#Equ17))
    to calculate the reparameterized estimate of ∇[θ]*J*(θ).
  id: totrans-249
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为 ϵ ∼ *N*(0, 1) 生成样本，并使用这些样本在方程 [9-16](#Equ17) 中计算 ∇[θ]*J*(θ) 的重新参数化估计。
- en: You can see the details of the experiment and code in `9.c-reparam.ipynb`. When
    you run the code for different values of N, you’ll get the convergence graphs
    of mean and the variance of estimates for different values of N, as shown in Figure
    [9-10](#Fig10).
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在 `9.c-reparam.ipynb` 中看到实验和代码的详细情况。当你运行代码并输入不同的 N 值时，你会得到不同 N 值下估计的均值和方差的收敛图，如图
    [9-10](#Fig10) 所示。
- en: '![](../images/502835_2_En_9_Chapter/502835_2_En_9_Fig10_HTML.jpg)'
  id: totrans-251
  prefs: []
  type: TYPE_IMG
  zh: '![此处为图片](../images/502835_2_En_9_Chapter/502835_2_En_9_Fig10_HTML.jpg)'
- en: 2 double line graphs. Left. Gradient estimate of mean versus sample size. Reinforce
    and re-param increase from (10, 3.96) and (10, 3.995) to (100000, 4). Right. Gradient
    estimate of variance versus N. Reinforce and re-param decrease from (10, 8,5)
    and (10, 0.5) to (100000, 0). Values are estimated.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 2 条双线图。左图：梯度估计的均值与样本大小的关系。强化和重新参数化从 (10, 3.96) 和 (10, 3.995) 增加到 (100000, 4)。右图：梯度估计的方差与
    N 的关系。强化和重新参数化从 (10, 8,5) 和 (10, 0.5) 减少到 (100000, 0)。数值已估计。
- en: Figure 9-10
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-10
- en: Convergence of the reinforce(log trick) and reparameterization approaches to
    gradient estimates
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 强化(log技巧)和重新参数化方法在梯度估计中的收敛性
- en: Do these make sense? You can derive the mean and variance of two gradient estimates
    that are given in Equations [9-15](#Equ16) and [9-16](#Equ17) analytically. Start
    with Equation [9-15](#Equ16), which is an estimate of ∇[θ]*J*(θ) under the reinforce/log-trick
    approach, and find its expected value.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是否合理？你可以通过解析方法推导出方程 [9-15](#Equ16) 和 [9-16](#Equ17) 中给出的两个梯度估计的均值和方差。从方程 [9-15](#Equ16)
    开始，这是在强化/log技巧方法下对 ∇[θ]*J*(θ) 的估计，并找到它的期望值。
- en: '![$$ \mathrm{E}\left[{\nabla}_{\uptheta}\hat{J}\left(\uptheta \right)\right]=\mathrm{E}\left[\frac{1}{N}{\sum}_{i=1}^N\left({x}_i-\uptheta
    \right){x}_i^2\right] $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equx.png)'
  id: totrans-256
  prefs: []
  type: TYPE_IMG
  zh: '![此处为公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equx.png)'
- en: For now, assume that *x*[*i*] ∼ *N*(μ, σ²).
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，假设 *x*[*i*] ∼ *N*(μ, σ²)。
- en: 'Taking expectation operation inside the summation, you get:'
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 在求和符号内进行期望运算，你得到：
- en: '![$$ \mathrm{E}\left[{\nabla}_{\uptheta}\hat{J}\left(\uptheta \right)\right]=\frac{1}{N}{\sum}_{i=1}^NE\left[\left({x}_i-\uptheta
    \right){x}_i^2\right] $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equy.png)'
  id: totrans-259
  prefs: []
  type: TYPE_IMG
  zh: '![此处为公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equy.png)'
- en: '![$$ =\frac{1}{N}{\sum}_{i=1}^NE\left[{x}_i^3\right]-\uptheta E\left[{x}_i^2\right]
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equz.png)'
  id: totrans-260
  prefs: []
  type: TYPE_IMG
  zh: '![此处为公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equz.png)'
- en: '![$$ =\frac{1}{N}{\sum}_{i=1}^NE\left[{x}_i^3\right]-\uptheta E\left[{x}_i^2\right]
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equaa.png)'
  id: totrans-261
  prefs: []
  type: TYPE_IMG
  zh: '![此处为公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equaa.png)'
- en: 'Using the standard results for a normal distribution *x*[*i*] ∼ *N*(*μ*, *σ*²),
    you get:'
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 使用正态分布 *x*[*i*] ∼ *N*(*μ*, *σ*²) 的标准结果，你得到：
- en: '![$$ \mathrm{E}\left[{\nabla}_{\uptheta}\hat{J}\left(\uptheta \right)\right]=\frac{1}{N}{\sum}_{i=1}^N\left({\upmu}^3+3\upmu
    {\upsigma}^2\right)-\uptheta \left({\upmu}^2+{\upsigma}^2\right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equab.png)'
  id: totrans-263
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equab.png)'
- en: '![$$ =\left({\upmu}^3+3\upmu {\upsigma}^2\right)-\uptheta \left({\upmu}^2+{\upsigma}^2\right)
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equac.png)'
  id: totrans-264
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equac.png)'
- en: 'In this case, under reinforce, the samples *x*[*i*] come from *N*(θ, 1). Accordingly,
    substituting, μ = θ and σ = 1, you get:'
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，在强化学习中，样本 *x*[*i*] 来自 *N*(θ, 1)。相应地，代入 μ = θ 和 σ = 1，你得到：
- en: '![$$ \mathrm{E}\left[{\nabla}_{\uptheta}\hat{J}\left(\uptheta \right)\right]=\left({\uptheta}^3+3\uptheta
    .1\right)-\uptheta \left({\uptheta}^2+{1}^2\right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equad.png)'
  id: totrans-266
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equad.png)'
- en: 'In the experiment, you took θ = 2\. Accordingly, making a further substitution
    of θ = 2, you get:'
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 在实验中，你取 θ = 2。相应地，进一步代入 θ = 2，你得到：
- en: '![$$ \mathrm{E}\left[{\nabla}_{\uptheta}\hat{J}\left(\uptheta \right)\right]=\left({2}^3+\mathrm{3.2.1}\right)-2.\left({2}^2+1\right)=14-10=4
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equae.png)'
  id: totrans-268
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equae.png)'
- en: As you can see from Figure [9-10](#Fig10), the mean of the estimate of ∇[θ]*J*(θ)
    under reinforce converges to a value of 4 as derived analytically. But it does
    so only for larger Ns, the number of samples. At *N* = 100, the mean is incorrect
    and well above the value of 4\. This indicates that the variance of the reinforce
    estimate must be high. Now analytically derive the variance of the reinforce estimate
    to show that indeed is the case.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 如从图 [9-10](#Fig10) 所见，在强化学习下，∇[θ]*J*(θ) 的估计值的均值收敛到解析得到的 4 的值。但这仅在较大的 Ns（样本数量）下成立。当
    *N* = 100 时，均值是不正确的，并且远高于 4 的值。这表明强化估计的方差必须很高。现在解析地推导强化估计的方差以表明确实如此。
- en: '![$$ Var\left({\nabla}_{\uptheta}\hat{J}\left(\uptheta \right)\right)=\operatorname{var}\left(\frac{1}{N}{\sum}_{i=1}^N\left({x}_i-\uptheta
    \right){x}_i^2\right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equaf.png)'
  id: totrans-270
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equaf.png)'
- en: 'By using the property of variance of the sum of the random variables, you get:'
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用随机变量和的方差的性质，你得到：
- en: '![$$ Var\left({\nabla}_{\uptheta}\hat{J}\left(\uptheta \right)\right)=\frac{1}{N^2}{\sum}_{i=1}^N\mathit{\operatorname{var}}\left({x}_i^3-\uptheta
    .{x}_i^2\right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equag.png)'
  id: totrans-272
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equag.png)'
- en: '![$$ =\frac{1}{N^2}{\sum}_{i=1}^NE\left[{\left({x}_i^3-\uptheta .{x}_i^2\right)}^2\right]-{\left(E\left[{x}_i^3-\uptheta
    .{x}_i^2\right]\right)}^2 $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equah.png)'
  id: totrans-273
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equah.png)'
- en: '![$$ =\frac{1}{N^2}{\sum}_{i=1}^NE\left[{x}_i^6+{\uptheta}^2{x}_i^4-2.\uptheta
    .{x}_i^3{x}_i^2\right]-{\left(E\left[{x}_i^3-\uptheta .{x}_i^2\right]\right)}^2
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equai.png)'
  id: totrans-274
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equai.png)'
- en: 'Using the standard results for the normal distribution, you get:'
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 使用正态分布的标准结果，你得到：
- en: '![$$ Var\left({\nabla}_{\uptheta}\hat{\mathrm{J}}\left(\uptheta \right)\right)=\frac{1}{\mathrm{N}}\left[{\upmu}^6+15{\upmu}^4{\upsigma}^2+45{\upmu}^2{\upsigma}^4+15{\upsigma}^6+{\uptheta}^2\left({\upmu}^4+6{\upmu}^2{\upsigma}^2+3{\upsigma}^4\right)-2.\uptheta
    \left({\upmu}^5+10{\upmu}^3{\upsigma}^2+15\upmu {\upsigma}^4\right)-{\left({\upmu}^3+3\upmu
    {\upsigma}^2-\uptheta .\left({\upmu}^2+{\upsigma}^2\right)\right)}^2\right] $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equaj.png)'
  id: totrans-276
  prefs: []
  type: TYPE_IMG
  zh: '![公式 Var\left({\nabla}_{\uptheta}\hat{\mathrm{J}}\left(\uptheta \right)\right)=\frac{1}{\mathrm{N}}\left[{\upmu}^6+15{\upmu}^4{\upsigma}^2+45{\upmu}^2{\upsigma}^4+15{\upsigma}^6+{\uptheta}^2\left({\upmu}^4+6{\upmu}^2{\upsigma}^2+3{\upsigma}^4\right)-2.\uptheta
    \left({\upmu}^5+10{\upmu}^3{\upsigma}^2+15\upmu {\upsigma}^4\right)-{\left({\upmu}^3+3\upmu
    {\upsigma}^2-\uptheta .\left({\upmu}^2+{\upsigma}^2\right)\right)}^2\right] ](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equaj.png)'
- en: 'Substituting, putting μ = θ = 2, and σ = 1, you get:'
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 将 μ = θ = 2 和 σ = 1 代入，得到：
- en: '![$$ Var\left({\nabla}_{\uptheta}\hat{J}\left(\uptheta \right)\right)=\frac{1}{N}\left[{2}^6+{15.2}^4+{45.2}^2+15+4\left({2}^4+{6.2}^2+3\right)-4\left({2}^5+{10.2}^3+15.2\right)-{\left({2}^3+3.2-2\left({2}^2+1\right)\right)}^2\right]
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equak.png)'
  id: totrans-278
  prefs: []
  type: TYPE_IMG
  zh: '![公式 Var\left({\nabla}_{\uptheta}\hat{J}\left(\uptheta \right)\right)=\frac{1}{N}\left[{2}^6+{15.2}^4+{45.2}^2+15+4\left({2}^4+{6.2}^2+3\right)-4\left({2}^5+{10.2}^3+15.2\right)-{\left({2}^3+3.2-2\left({2}^2+1\right)\right)}^2\right]
    ](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equak.png)'
- en: '![$$ =\frac{1}{N}\left[64+240+180+15+4\left(16+6.4+3\right)-4\left(32+10.8+15.2\right)-{\left(8+3.2-2\left(4+1\right)\right)}^2\right]
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equal.png)'
  id: totrans-279
  prefs: []
  type: TYPE_IMG
  zh: '![公式 =\frac{1}{N}\left[64+240+180+15+4\left(16+6.4+3\right)-4\left(32+10.8+15.2\right)-{\left(8+3.2-2\left(4+1\right)\right)}^2\right]
    ](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equal.png)'
- en: '![$$ =\frac{1}{N}\left[64+240+180+15+4\left(16+6.4+3\right)-4\left(32+10.8+15.2\right)-{\left(8+3.2-2\left(4+1\right)\right)}^2\right]
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equam.png)'
  id: totrans-280
  prefs: []
  type: TYPE_IMG
  zh: '![公式 =\frac{1}{N}\left[64+240+180+15+4\left(16+6.4+3\right)-4\left(32+10.8+15.2\right)-{\left(8+3.2-2\left(4+1\right)\right)}^2\right]
    ](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equam.png)'
- en: '![$$ Var\left({\nabla}_{\uptheta}\hat{J}\left(\uptheta \right)\right)=\frac{87}{N}
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equan.png)'
  id: totrans-281
  prefs: []
  type: TYPE_IMG
  zh: '![公式 Var\left({\nabla}_{\uptheta}\hat{J}\left(\uptheta \right)\right)=\frac{87}{N}
    ](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equan.png)'
- en: Referring to right-side graph in Figure [9-10](#Fig10), you can see that N =
    100\. You get a variance of estimate around 0.9, which tallies with the analytically
    derived result of 87/100=0.87.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 参考图 [9-10](#Fig10) 的右侧图形，可以看到 N = 100。估计的方差约为 0.9，这与解析得到的 87/100 = 0.87 一致。
- en: 'Having derived the mean and variance of the reinforce gradient estimate given
    in Equation [9-15](#Equ16) analytically, next turn your attention to a similar
    analytical derivation of the mean and variance for the reparametrized gradient
    estimate given in Equation [9-16](#Equ17). First calculate the mean of the estimate:'
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 在解析地推导了方程 [9-15](#Equ16) 中给出的强化梯度估计的均值和方差之后，接下来关注对方程 [9-16](#Equ17) 中给出的重新参数化梯度估计的均值和方差进行类似的解析推导。首先计算估计的均值：
- en: '![$$ \mathrm{E}\left[{\nabla}_{\uptheta}\hat{J}\left(\uptheta \right)\right]=\mathrm{E}\left[\frac{1}{N}{\sum}_{i=1}^N2\left(\uptheta
    +{\upvarepsilon}_i\right)\right] $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equao.png)'
  id: totrans-284
  prefs: []
  type: TYPE_IMG
  zh: '![公式 \mathrm{E}\left[{\nabla}_{\uptheta}\hat{J}\left(\uptheta \right)\right]=\mathrm{E}\left[\frac{1}{N}{\sum}_{i=1}^N2\left(\uptheta
    +{\upvarepsilon}_i\right)\right] ](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equao.png)'
- en: Note that under reparameterization, you now have ϵ[*i*] ∼ *N*(0, 1) and θ is
    a constant equal to 2.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，在重新参数化后，现在有 ϵ[*i*] ∼ *N*(0, 1) 且 θ 是一个等于 2 的常数。
- en: '![$$ \mathrm{E}\left[{\nabla}_{\uptheta}\hat{J}\left(\uptheta \right)\right]=\frac{1}{N}{\sum}_{i=1}^N2E\left[\left(\uptheta
    +{\upvarepsilon}_i\right)\right] $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equap.png)'
  id: totrans-286
  prefs: []
  type: TYPE_IMG
  zh: '![公式 \mathrm{E}\left[{\nabla}_{\uptheta}\hat{J}\left(\uptheta \right)\right]=\frac{1}{N}{\sum}_{i=1}^N2E\left[\left(\uptheta
    +{\upvarepsilon}_i\right)\right] ](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equap.png)'
- en: '![$$ =\frac{1}{N}{\sum}_{i=1}^N2.\uptheta $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equaq.png)'
  id: totrans-287
  prefs: []
  type: TYPE_IMG
  zh: '![公式 =\frac{1}{N}{\sum}_{i=1}^N2.\uptheta ](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equaq.png)'
- en: '![$$ \mathrm{E}\left[{\nabla}_{\uptheta}\hat{J}\left(\uptheta \right)\right]=2.\uptheta
    =4 $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equar.png)'
  id: totrans-288
  prefs: []
  type: TYPE_IMG
  zh: '![公式 \mathrm{E}\left[{\nabla}_{\uptheta}\hat{J}\left(\uptheta \right)\right]=2.\uptheta
    =4 ](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equar.png)'
- en: The estimate’s mean is 4 and this is what you see in left side graph in Figure
    [9-10](#Fig10). You can also observe that convergence of mean around 4 is lot
    smoother for estimates using the reparameterization approach given in Equation
    [9-16](#Equ17) versus the convergence of estimate’s mean under Equation [9-15](#Equ16)
    using the reinforce approach.
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 估计值的均值为4，这在图[9-10](#Fig10)左侧的图中可以看到。你还可以观察到，使用方程[9-16](#Equ17)中给出的重新参数化方法进行估计时，均值在4附近的收敛性比使用方程[9-15](#Equ16)和强化方法进行估计的均值收敛性要平滑得多。
- en: You can proceed with a similar analysis to calculate the variance of the reparametrized
    estimate of the gradient in Equation [9-16](#Equ17).
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以使用类似的分析来计算方程[9-16](#Equ17)中重新参数化梯度估计的方差。
- en: '![$$ Var\left({\nabla}_{\uptheta}\hat{J}\left(\uptheta \right)\right)= Var\left(\frac{1}{N}{\sum}_{i=1}^N2\left(\uptheta
    +{\upvarepsilon}_i\right)\right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equas.png)'
  id: totrans-291
  prefs: []
  type: TYPE_IMG
  zh: '![Var\left({\nabla}_{\uptheta}\hat{J}\left(\uptheta \right)\right)= Var\left(\frac{1}{N}{\sum}_{i=1}^N2\left(\uptheta
    +{\upvarepsilon}_i\right)\right) ](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equas.png)'
- en: '![$$ =\frac{1}{N^2}{\sum}_{i=1}^N Var\left(2\left(\uptheta +{\upvarepsilon}_i\right)\right)
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equat.png)'
  id: totrans-292
  prefs: []
  type: TYPE_IMG
  zh: '![= \frac{1}{N^2}{\sum}_{i=1}^N Var\left(2\left(\uptheta +{\upvarepsilon}_i\right)\right)
    ](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equat.png)'
- en: '![$$ =\frac{1}{N^2}{\sum}_{i=1}^N Var\left(2{\upvarepsilon}_i\right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equau.png)'
  id: totrans-293
  prefs: []
  type: TYPE_IMG
  zh: '![= \frac{1}{N^2}{\sum}_{i=1}^N Var\left(2{\upvarepsilon}_i\right) ](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equau.png)'
- en: '![$$ =\frac{1}{N^2}{\sum}_{i=1}^N4\. Var\left({\upvarepsilon}_i\right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equav.png)'
  id: totrans-294
  prefs: []
  type: TYPE_IMG
  zh: '![公式 =\frac{1}{N^2}{\sum}_{i=1}^N4\. Var\left({\upvarepsilon}_i\right) ](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equav.png)'
- en: '![$$ =\frac{1}{N^2}{\sum}_{i=1}^N4.1 $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equaw.png)'
  id: totrans-295
  prefs: []
  type: TYPE_IMG
  zh: '![= \frac{1}{N^2}{\sum}_{i=1}^N4.1 ](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equaw.png)'
- en: '![$$ Var\left({\nabla}_{\uptheta}\hat{J}\left(\uptheta \right)\right)=\frac{4}{N}
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equax.png)'
  id: totrans-296
  prefs: []
  type: TYPE_IMG
  zh: '![Var\left({\nabla}_{\uptheta}\hat{J}\left(\uptheta \right)\right)=\frac{4}{N}
    ](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equax.png)'
- en: Again, refer to the right-side graph in Figure [9-10](#Fig10). Notice that variance
    of the estimate under the reparameterization approach is smaller than the variance
    under the reinforce/log-trick approach. This is exactly what the analytical derivations
    also show. A variance of 4/N for the reparameterization approach versus a variance
    of 87/N for the reinforce approach.
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，参考图[9-10](#Fig10)右侧的图。注意，在重新参数化方法下，估计的方差小于在强化/对数技巧方法下的方差。这正是解析推导所显示的。重新参数化方法的方差为4/N，而强化方法的方差为87/N。
- en: 'In summary, you have shown that for REINFORCE, the gradient estimate using
    Equation [9-15](#Equ16) has the following mean and variance:'
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，你已经表明对于REINFORCE，使用方程[9-15](#Equ16)的梯度估计具有以下均值和方差：
- en: '![$$ mean=4 $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equay.png)'
  id: totrans-299
  prefs: []
  type: TYPE_IMG
  zh: '![均值=4 ](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equay.png)'
- en: '![$$ \mathrm{variance}=\frac{87}{N} $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equaz.png)'
  id: totrans-300
  prefs: []
  type: TYPE_IMG
  zh: '![方差=\frac{87}{N} ](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equaz.png)'
- en: 'And, under the REPARAMETERIZED gradient using Equation [9-16](#Equ17), the
    gradient estimate has the following mean and variance:'
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用方程[9-16](#Equ17)的REPARAMETERIZED梯度下，梯度估计的均值和方差如下：
- en: '![$$ mean=4 $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equba.png)'
  id: totrans-302
  prefs: []
  type: TYPE_IMG
  zh: '![均值=4 ](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equba.png)'
- en: '![$$ \mathrm{variance}=\frac{4}{N} $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equbb.png)'
  id: totrans-303
  prefs: []
  type: TYPE_IMG
  zh: '![方差=\frac{4}{N} ](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equbb.png)'
- en: You can see that the gradient estimate has the same mean under both approaches.
    However, the variance in the reparametrized approach is a lot smaller, by one
    order of magnitude.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以看到，两种方法下梯度估计的均值相同。然而，在重新参数化方法中，方差小得多，大约小一个数量级。
- en: Readers may wonder how this really helps you and how to use the lower variance
    approach. Suppose you have a policy network that takes state *s* as input, and
    the network is parameterized by *θ*. The policy network produces the mean and
    variance of the policy, that is, a stochastic policy with normal distribution
    whose mean and variance are the outputs of the network, as shown in Figure [9-11](#Fig11).
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 读者可能会想知道这究竟如何帮助你，以及如何使用低方差方法。假设你有一个策略网络，它以状态 *s* 作为输入，并且该网络由 *θ* 参数化。策略网络产生策略的均值和方差，即一个具有正态分布的随机策略，其均值和方差是网络的输出，如图
    [9-11](#Fig11) 所示。
- en: '![](../images/502835_2_En_9_Chapter/502835_2_En_9_Fig11_HTML.jpg)'
  id: totrans-306
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/502835_2_En_9_Chapter/502835_2_En_9_Fig11_HTML.jpg)'
- en: A block diagram for the stochastic policy network. Continuous actions s are
    given to a theta block which gives mu theta of s and sigma square theta of s.
    The outputs are parameters of a continuous distribution, that is, model outputs
    mean, and additionally, variance of the normal distribution.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 随机策略网络的框图。连续动作 s 被输入到 theta 块中，该块给出 s 的 mu theta 和 sigma square theta。输出是连续分布的参数，即模型输出均值，以及正态分布的方差。
- en: Figure 9-11
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-11
- en: Stochastic policy network
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 随机策略网络
- en: 'Define the action *a* as follows:'
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 按如下方式定义动作 *a*：
- en: '![$$ a\sim N\left({\upmu}_{\uptheta}(s),{\upsigma}_{\uptheta}^2(s)\right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ18.png)'
  id: totrans-311
  prefs: []
  type: TYPE_IMG
  zh: '![$$ a\sim N\left({\upmu}_{\uptheta}(s),{\upsigma}_{\uptheta}^2(s)\right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ18.png)'
- en: (9-17)
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: (9-17)
- en: Reparametrize action *a* to decompose the deterministic and stochastic part
    out so that the stochastic part does not depend on the network parameters *θ*.
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 将动作 *a* 重新参数化以分解确定性和随机性部分，使得随机部分不依赖于网络参数 *θ*。
- en: '![$$ a\sim N\left({\upmu}_{\uptheta}(s),{\upsigma}_{\uptheta}^2(s)\right)\kern0.5em
    \mathrm{where}:\kern1em \upvarepsilon \sim N\left(0,1\right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ19.png)'
  id: totrans-314
  prefs: []
  type: TYPE_IMG
  zh: '![$$ a\sim N\left({\upmu}_{\uptheta}(s),{\upsigma}_{\uptheta}^2(s)\right)\kern0.5em
    \mathrm{where}:\kern1em \upvarepsilon \sim N\left(0,1\right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ19.png)'
- en: (9-18)
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: (9-18)
- en: Reparameterization allows you to calculate the policy gradients that have lower
    variance as compared to using a non-parametrized approach log-trick. In addition,
    reparameterization gives you an alternative way to flow the gradient back through
    the network by separating out the stochastic part into a nonparameterized part.
    You will use this approach in the soft actor-critic algorithm.
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 重新参数化允许你计算比使用非参数化方法的 log-trick 具有更低方差的策略梯度。此外，重新参数化通过将随机部分分离到非参数化部分，为你提供了一个通过网络反向传播梯度的替代方法。你将在软演员-评论家算法中使用这种方法。
- en: It is a very common approach when you need to build neural networks using stochastic
    nodes and need to flow back the gradients. The foundational paper that formalized
    the concept is “Gradient Estimation Using Stochastic Computation Graphs” by Schulman
    et al., 2015.^([8](#Fn8)) There has been a lot more work after this paper was
    published. Interested readers may want to refer to this paper and then refer to
    the various subsequent works on the topic of stochastic computation graphs.
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 当你需要使用随机节点构建神经网络并需要反向传播梯度时，这是一种非常常见的方法。将这一概念形式化的基础论文是 Schulman 等人于 2015 年发表的“使用随机计算图进行梯度估计”。在这篇论文发表之后，还有更多的工作。感兴趣的读者可以参考这篇论文，然后参考关于随机计算图主题的各种后续工作。
- en: Entropy Explained
  id: totrans-318
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 熵解释
- en: 'Just one more thing before you start digging into the details of SAC: let’s
    revisit entropy. I talked about entropy as a regularizer as part of the REINFORCE
    code walk-through in the previous chapter. You will be doing something similar.
    Let’s look at what entropy is.'
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 在你开始深入研究 SAC 的细节之前，还有一件事需要回顾：熵。我在上一章的 REINFORCE 代码讲解中提到了熵作为正则化器。你将要做的事情与此类似。让我们看看熵是什么。
- en: 'Suppose you have a random variable *x* following some distribution *P*(*x*).
    The entropy of *x* is defined as follows:'
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你有一个随机变量 *x* 遵循某种分布 *P*(*x*)。*x* 的熵定义为以下：
- en: '![$$ H(P)=\underset{x\sim P}{E}\left[- logP(x)\right] $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ20.png)'
  id: totrans-321
  prefs: []
  type: TYPE_IMG
  zh: '![$$ H(P)=\underset{x\sim P}{E}\left[- logP(x)\right] $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ20.png)'
- en: (9-19)
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: (9-19)
- en: Suppose you have a coin with *P*(*Head*) = *ρ* and *P*(*Tail*) = 1 − *ρ*. Calculate
    the entropy *H* for different values of *ρ ε* (0, 1).
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你有一个硬币，其正面出现的概率为 *P*(*Head*) = *ρ*，反面出现的概率为 *P*(*Tail*) = 1 − *ρ*。计算不同 *ρ*
    ∈ (0, 1) 值下的熵 *H*。
- en: '![$$ H(x)=-\left[\rho\ log\rho +\left(1-\rho \right)\ \mathit{\log}\left(1-\rho
    \right)\right] $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equbc.png)'
  id: totrans-324
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equbc.png)'
- en: You can plot the curve of *H*(*x*) versus *ρ*, as shown in Figure [9-12](#Fig12).
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以绘制 *H*(*x*) 与 *ρ* 的曲线，如图 [9-12](#Fig12) 所示。
- en: '![](../images/502835_2_En_9_Chapter/502835_2_En_9_Fig12_HTML.jpg)'
  id: totrans-326
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_9_Chapter/502835_2_En_9_Fig12_HTML.jpg)'
- en: A line graph plots entropy H versus probability p. A down-ward open parabola
    for H of p is between (0.0, 0.0), (0.5, 0.68), and (1.0, 0.0), approximately.
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 线形图绘制熵 H 与概率 p 的关系。H 的 p 的向下开口抛物线大约在 (0.0, 0.0)，(0.5, 0.68)，和 (1.0, 0.0) 之间。
- en: Figure 9-12
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-12
- en: Entropy of a Bernoulli distribution as a function of p, which is the probability
    of getting 1 in a trial
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 二项分布的熵作为 p 的函数，其中 p 是在试验中得到 1 的概率
- en: You can see that entropy *H* is the maximum for *ρ* = 0.5, that is, when you
    have maximum uncertainty between getting a 1 or a 0\. In other words, by maximizing
    the entropy, you are ensuring that the stochastic action policy has a broad distribution
    and does not collapse into a sharp peak too early. A sharp peak will reduce the
    exploration of state action space. Readers may refer to the `9.d-entropy_bernoulli.ipynb`
    notebook for the code that generated Figure [9-12](#Fig12). You can modify the
    code to try various other probability distributions and vary the parameters to
    find the points that maximize the entropy.
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以看到，熵 *H* 在 *ρ* = 0.5 时达到最大值，即当你得到 1 或 0 的最大不确定性时。换句话说，通过最大化熵，你确保了随机动作策略具有广泛的分布，并且不会过早地坍缩成尖锐的峰值。尖锐的峰值会减少对状态动作空间的探索。读者可以参考
    `9.d-entropy_bernoulli.ipynb` 笔记本中生成图 [9-12](#Fig12) 的代码。你可以修改代码来尝试其他不同的概率分布，并调整参数以找到最大化熵的点。
- en: Soft Actor-Critic
  id: totrans-331
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Soft Actor-Critic
- en: 'The soft actor-critic came about around the same time as TD3\. Like DDPG and
    TD3, SAC also uses an actor-critic construct with off-policy learning for continuous
    controls. However, unlike DDPG and TD3, SAC learns a stochastic policy. Hence,
    SAC forms a bridge between the deterministic policy algorithms like DDPG and TD3
    with the stochastic policy optimization. The algorithm was introduced in a 2018
    paper titled “Soft Actor-Critic: Off-Policy Maximum Entropy Deep Reinforcement
    Learning with a Stochastic Actor.”^([9](#Fn9))'
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 'Soft Actor-Critic 与 TD3 大约在同一时间出现。像 DDPG 和 TD3 一样，SAC 也使用具有离策略学习的 actor-critic
    构造来处理连续控制。然而，与 DDPG 和 TD3 不同，SAC 学习一个随机策略。因此，SAC 在确定性策略算法（如 DDPG 和 TD3）与随机策略优化之间架起了一座桥梁。该算法在
    2018 年一篇题为“Soft Actor-Critic: Off-Policy Maximum Entropy Deep Reinforcement Learning
    with a Stochastic Actor”的论文中提出。^([9](#Fn9))'
- en: It uses the clipped double-Q trick like TD3, and due to its learning stochastic
    policy, it indirectly benefits from the target policy smoothing without an explicit
    need to add noise to the target policy.
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 它使用类似于 TD3 的剪辑双 Q 技巧，由于其学习随机策略，它间接地从目标策略平滑中受益，而无需显式地向目标策略添加噪声。
- en: 'A core feature of SAC is the use of entropy as part of the maximization. To
    quote the authors of the paper:'
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: SAC 的一个核心特性是使用熵作为最大化的一部分。引用论文的作者的话：
- en: “In this framework, the actor aims to simultaneously maximize expected return
    and entropy; that is, to succeed at the task while acting as randomly as possible.”
  id: totrans-335
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “在这个框架中，actor 旨在同时最大化预期回报和熵；也就是说，在尽可能随机行动的同时完成任务。”
- en: SAC vs. TD3
  id: totrans-336
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: SAC 与 TD3
- en: 'Here are the similarities:'
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是相似之处：
- en: Both approaches use mean squared Bellman error (MSBE) minimization toward a
    common target.
  id: totrans-338
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 两种方法都使用均方贝尔曼误差（MSBE）最小化以实现共同目标。
- en: A common target is calculated using target Q networks that are obtained using
    polyack averaging.
  id: totrans-339
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 polyack 平均法获得的目标 Q 网络计算共同目标。
- en: Both approaches use clipped double Q, which consists of a minimum of two q-values
    to avoid overestimation.
  id: totrans-340
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 两种方法都使用剪辑双 Q，它由至少两个 q 值的最小值组成，以避免高估。
- en: 'Here are the differences:'
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是差异：
- en: SAC uses entropy regularization, which is absent in TD3.
  id: totrans-342
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: SAC 使用熵正则化，这在 TD3 中是不存在的。
- en: The TD3 target policy is used to calculate the next-state actions, while in
    SAC, you use the current policy to get actions for the next states.
  id: totrans-343
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: TD3 的目标策略用于计算下一状态的动作，而在 SAC 中，你使用当前策略来获取下一状态的动作。
- en: In TD3, the target policy uses smoothing by adding random noise to actions.
    However, in SAC, the policy learned is a stochastic one that provides a smoothing
    effect without any explicit noise addition.
  id: totrans-344
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在 TD3 中，目标策略通过向动作添加随机噪声来实现平滑。然而，在 SAC 中，学习到的策略是随机的，它提供了平滑效果，而无需显式地添加噪声到目标策略。
- en: Q-Loss with Entropy-Regularization
  id: totrans-345
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 带有熵正则化的Q-Loss
- en: Entropy measures randomness in the distribution. The higher the entropy, the
    flatter the distribution. A sharp peaked policy has all its probability centered
    around that peak, and hence it will have low entropy. With entropy regularization,
    the policy is trained to maximize a tradeoff between the expected return and entropy
    with *α* controlling the tradeoff. The policy is trained to maximize a tradeoff
    between the expected return and entropy, a measure of randomness in the policy.
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 熵衡量分布中的随机性。熵越高，分布越平坦。一个尖锐峰值的策略将所有概率集中在那个峰值周围，因此它将具有低熵。在熵正则化下，策略被训练以最大化预期回报和熵之间的权衡，其中
    *α* 控制权衡。策略被训练以最大化预期回报和熵之间的权衡，熵是策略中随机性的度量。
- en: '![$$ {\pi}^{\ast }=\arg \underset{\pi }{\max}\underset{\tau \sim \pi }{E}\left[{\sum}_{t=0}^{\infty
    }{\gamma}^t\left(R\left({s}_t,{a}_t,{s}_{t+1}\right)+\alpha\;H\left(\pi \left(\cdotp
    |\;{s}_t\right)\right)\right)\right] $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ21.png)'
  id: totrans-347
  prefs: []
  type: TYPE_IMG
  zh: '![π∗=argmaxπEτ~π[∑t=0∞γt(R(st,at,st+1)+αH(π(⋅|st)))]](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ21.png)'
- en: (9-20)
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: (9-20)
- en: In this setting, *V*^(*π*) is changed to include the entropy from every timestep.
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种设置下，*V*^(*π*) 被修改为包含每个时间步的熵。
- en: '![$$ {V}^{\pi }(s)=\underset{\tau \sim \pi }{E}\left[\left.{\sum}_{t=0}^{\infty
    }{\gamma}^t\left(R\left({s}_t,{a}_t,{s}_{t+1}\right)+\alpha H\left(\pi \left(\cdotp
    |{s}_t\right)\right)\right)\right|{s}_0=s\right] $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ22.png)'
  id: totrans-350
  prefs: []
  type: TYPE_IMG
  zh: '![Vπ(s)=Eτ~π[∑t=0∞γt(R(st,at,st+1)+αH(π(⋅|st)))|s0=s]](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ22.png)'
- en: (9-21)
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: (9-21)
- en: In addition, *Q*^(*π*) is changed to include the entropy bonuses from every
    timestep except the first.
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，*Q*^(*π*) 被修改为除了第一个时间步之外，包含每个时间步的熵奖励。
- en: '![$$ {Q}^{\pi}\left(s,a\right)=\underset{\tau \sim \pi }{E}\left[\left.{\sum}_{t=0}^{\infty
    }{\gamma}^tR\left({s}_t,{a}_t,{s}_{t+1}\right)+\alpha {\sum}_{t=1}^{\infty }{\gamma}^tH\left(\pi
    \left(\cdotp |{s}_t\right)\right)\right|{s}_0=s,{a}_0=a\right] $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ23.png)'
  id: totrans-353
  prefs: []
  type: TYPE_IMG
  zh: '![Qπ(s,a)=Eτ~π[∑t=0∞γtR(st,at,st+1)+α∑t=1∞γtH(π(⋅|st))]|s0=s,a0=a](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ23.png)'
- en: (9-22)
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: (9-22)
- en: 'With these definitions, *V*^(*π*) and *Q*^(*π*) are connected by the following:'
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些定义下，*V*^(*π*) 和 *Q*^(*π*) 通过以下关系相连：
- en: '![$$ {V}^{\pi }(s)=\underset{a\sim \pi }{E}\left[{Q}^{\pi}\left(s,a\right)+\alpha
    H\left(\pi \left(\cdotp |s\right)\right)\right] $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ24.png)'
  id: totrans-356
  prefs: []
  type: TYPE_IMG
  zh: '![Vπ(s)=E[a~π[Qπ(s,a)+αH(π(⋅|s))]]](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ24.png)'
- en: (9-23)
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: (9-23)
- en: 'The Bellman equation for *Q*^(*π*) is as follows:'
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: '*Q*^(*π*) 的Bellman方程如下：'
- en: '![$$ {Q}^{\pi}\left(s,a\right)=\underset{s^{\prime}\sim P,a^{\prime}\sim \pi
    }{E}\left[R\left(s,a,{s}^{\prime}\right)+\gamma \left({Q}^{\pi}\left({s}^{\prime
    },{a}^{\prime}\right)+\alpha H\left(\pi \left(\cdotp |{s}^{\prime}\right)\right)\right)\right]=\underset{s^{\prime}\sim
    P}{E}\left[R\left(s,a,{s}^{\prime}\right)+\gamma {V}^{\pi}\left({s}^{\prime}\right)\right]
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ25.png)'
  id: totrans-359
  prefs: []
  type: TYPE_IMG
  zh: '![Qπ(s,a)=E[s′~P,a′~π[R(s,a,s′)+γ(Qπ(s′,a′)+αH(π(⋅|s′)))]=E[s′~P[R(s,a,s′)+γVπ(s′)]]](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ25.png)'
- en: (9-24)
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: (9-24)
- en: The right side is an expectation that you convert into a sample estimate.
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 右侧是一个期望值，你需要将其转换为样本估计。
- en: '![$$ {Q}^{\pi}\left(s,a\right)\approx r+\gamma \left({Q}^{\pi}\left({s}^{\prime
    },\overset{\sim }{a^{\prime }}\right)-\alpha \log \pi \left(\overset{\sim }{a^{\prime
    }}|{s}^{\prime}\right)\right),\kern1.25em \overset{\sim }{a^{\prime }}\sim \pi
    \left(\cdotp |{s}^{\prime}\right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ26.png)'
  id: totrans-362
  prefs: []
  type: TYPE_IMG
  zh: '![Qπ(s,a)≈r+γ(Qπ(s′,~a′)−αlogπ(~a′|s′)),~a′~π(⋅|s′)](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ26.png)'
- en: (9-25)
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: (9-25)
- en: In this equation, (*s*, *a*, *r*, *s*^′) all come from the replay buffer, and
    ![$$ \overset{\sim }{a^{\prime }} $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq25.png)
    comes from sampling the online/agent policy. *In SAC, you do not use the target
    network policy at all.*
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个方程中，(*s*, *a*, *r*, *s*^′) 都来自重放缓冲区，而 ![$$ \overset{\sim }{a^{\prime }} $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq25.png)
    来自在线/代理策略的采样。*在SAC中，你根本不使用目标网络策略。*
- en: 'Like TD3, SAC uses clipped double Q and minimizes the mean squared Bellman
    error (MSBE). Putting it all together, the loss functions for the Q-networks in
    SAC are as follows:'
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 与TD3类似，SAC使用裁剪的双Q值并最小化均方贝尔曼误差（MSBE）。将所有这些放在一起，SAC中Q网络的损失函数如下：
- en: '![$$ L\left({\upphi}_i,D\right)=\underset{\left(s,a,r,{s}^{\prime },d\right)\sim
    D}{E}\left[{\left({Q}_{\upphi_i}\left(s,a\right)-y\left(r,{s}^{\prime },d\right)\right)}^2\right],\kern1.25em
    i=1,2 $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ27.png)'
  id: totrans-366
  prefs: []
  type: TYPE_IMG
  zh: '![损失函数L的表达式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ27.png)'
- en: (9-26)
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: (9-26)
- en: 'where the target is given by the following:'
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: 其中目标如下：
- en: '![$$ y\left(r,{s}^{\prime },d\right)=r+\upgamma \left(1-d\right)\left(\underset{i=1,2}{\min
    }{Q}_{\upphi_{\mathrm{targ},i}}\left({s}^{\prime },\overset{\sim }{a^{\prime }}\right)-\upalpha
    \mathrm{log}{\uppi}_{\uptheta}\left(\overset{\sim }{a^{\prime }}|{s}^{\prime}\right)\right),\kern0.5em
    \overset{\sim }{a^{\prime }}\sim {\uppi}_{\uptheta}\left(\cdotp |{s}^{\prime}\right)
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ28.png)'
  id: totrans-369
  prefs: []
  type: TYPE_IMG
  zh: '![奖励函数y的表达式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ28.png)'
- en: (9-27)
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: (9-27)
- en: Convert the expectations to sample averages.
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 将期望转换为样本平均值。
- en: '![$$ L\left({\upphi}_i,\mathcal{D}\right)=\frac{1}{\left|B\right|}{\sum}_{\left(s,a,r,{s}^{\prime
    },d\right)\in B}{\left({Q}_{\upphi_i}\left(s,a\right)-y\left(r,{s}^{\prime },d\right)\right)}^2,\kern1.25em
    \mathrm{for}\ i=1,2 $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ29.png)'
  id: totrans-372
  prefs: []
  type: TYPE_IMG
  zh: '![损失函数L的表达式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ29.png)'
- en: (9-28)
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: (9-28)
- en: 'The final Q-loss you will minimize is as follows:'
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 你最终要最小化的最终Q损失如下：
- en: '![$$ {Q}_{Loss}=L\left({\upphi}_1,\mathcal{D}\right)+L\left({\upphi}_1,\mathcal{D}\right)
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ30.png)'
  id: totrans-375
  prefs: []
  type: TYPE_IMG
  zh: '![损失函数Q的表达式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ30.png)'
- en: (9-29)
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: (9-29)
- en: Policy Loss with the Reparameterization Trick
  id: totrans-377
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 带有重新参数化技巧的策略损失
- en: The policy should choose actions to maximize the expected future return and
    future entropy, that is, *V*^(*π*)(*s*).
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: 策略应该选择动作以最大化期望的未来回报和未来熵，即 *V*^(*π*)(*s*).
- en: '![$$ {V}^{\pi }(s)=\underset{a\sim \pi }{E}\left[{Q}^{\pi}\left(s,a\right)+\alpha
    H\left(\pi \left(\cdotp |s\right)\right)\right] $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equbd.png)'
  id: totrans-379
  prefs: []
  type: TYPE_IMG
  zh: '![值函数V的表达式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equbd.png)'
- en: 'Rewrite this as follows:'
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 将其重写如下：
- en: '![$$ {V}^{\pi }(s)=\underset{a\sim \pi }{E}\left[{Q}^{\pi}\left(s,a\right)-\alpha
    \log \pi \left(a|s\right)\right] $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ31.png)'
  id: totrans-381
  prefs: []
  type: TYPE_IMG
  zh: '![值函数V的表达式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ31.png)'
- en: (9-30)
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: (9-30)
- en: The authors of the paper use reparameterization along with the squashed Gaussian
    policy.
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 论文的作者使用了重新参数化和压缩高斯策略。
- en: '![$$ \overset{\sim }{a_{\theta }}\left(s,\xi \right)=\tanh \left({\mu}_{\theta
    }(s)+{\sigma}_{\theta }(s)\odot \xi \right),\kern1.25em \xi \sim \mathcal{N}\left(0,I\right)
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ32.png)'
  id: totrans-384
  prefs: []
  type: TYPE_IMG
  zh: '![参数化函数的表达式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ32.png)'
- en: (9-31)
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: (9-31)
- en: 'Combining the previous two Equations [9-30](#Equ31) and [9-31](#Equ32) and
    noting that the policy network is parameterized by *θ*, the policy network weights,
    you get the following:'
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 将前两个方程 [9-30](#Equ31) 和 [9-31](#Equ32) 结合起来，并注意到策略网络由 *θ* 参数化，策略网络权重，你得到以下结果：
- en: '![$$ \underset{a\sim {\pi}_{\theta }}{E}\left[{Q}^{\pi_{\theta }}\left(s,a\right)-\alpha
    \log {\pi}_{\theta}\left(a|s\right)\right]=\underset{\xi \sim \mathcal{N}}{E}\left[{Q}^{\pi_{\theta
    }}\left(s,\overset{\sim }{a_{\theta }}\left(s,\xi \right)\right)-\alpha \log {\pi}_{\theta}\left(\overset{\sim
    }{a_{\theta }}\left(s,\xi \right)|s\right)\right] $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ33.png)'
  id: totrans-387
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ33.png)'
- en: (9-32)
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: (9-32)
- en: Next, substitute the function approximator for Q, taking the minimum of the
    two Q-functions.
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，用函数逼近器替换 Q，取两个 Q 函数的最小值。
- en: '![$$ {Q}^{\pi_{\theta }}\left(s,\overset{\sim }{a_{\theta }}\left(s,\xi \right)\right)=\underset{i=1,2}{\min
    }{Q}_{\phi_i}\left(s,\overset{\sim }{a_{\theta }}\left(s,\xi \right)\right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ34.png)'
  id: totrans-390
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ34.png)'
- en: (9-33)
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: (9-33)
- en: 'The policy objective is accordingly transformed into the following:'
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: 政策目标相应地转换为以下形式：
- en: '![$$ \underset{\theta }{\max}\underset{\underset{\xi \sim \mathcal{N}}{s\sim
    \mathcal{D}}}{E}\left[\underset{i=1,2}{\min }{Q}_{\phi_i}\left(s,\overset{\sim
    }{a_{\theta }}\left(s,\xi \right)\right)-\alpha \log {\pi}_{\theta}\left(\overset{\sim
    }{a_{\theta }}\left(s,\xi \right)|s\right)\right] $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ35.png)'
  id: totrans-393
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ35.png)'
- en: (9-34)
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: (9-34)
- en: Like before, you should use minimizers in PyTorch/TensorFlow. Accordingly, you’ll
    introduce a -ve sign to convert maximization to a loss minimization.
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 和之前一样，你应该在 PyTorch/TensorFlow 中使用最小化器。相应地，你将引入一个负号将最大化转换为损失最小化。
- en: '![$$ Polic{y}_{Loss}=-\underset{\underset{\xi \sim \mathcal{N}}{s\sim \mathcal{D}}}{E}\left[\underset{i=1,2}{\min
    }{Q}_{\phi_i}\left(s,\overset{\sim }{a_{\theta }}\left(s,\xi \right)\right)-\alpha
    \log {\pi}_{\theta}\left(\overset{\sim }{a_{\theta }}\left(s,\xi \right)|s\right)\right]
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ36.png)'
  id: totrans-396
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ36.png)'
- en: (9-35)
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: (9-35)
- en: 'Also convert the expectation to an estimate using samples to get the following:'
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: 还可以将期望值转换为使用样本的估计，得到以下结果：
- en: '![$$ Polic{y}_{Loss}=-\frac{1}{\left|B\right|}{\sum}_{s\in B}\left(\underset{i=1,2}{\min
    }{Q}_{\phi_i}\left(s,\overset{\sim }{a_{\theta }}(s)\right)-\alpha \log {\pi}_{\theta}\left(\left.\overset{\sim
    }{a_{\theta }}(s)\right|s\right)\right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ37.png)'
  id: totrans-399
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Equ37.png)'
- en: (9-36)
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: (9-36)
- en: Pseudocode and Implementation
  id: totrans-401
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 伪代码和实现
- en: At this point, you are ready to see the complete pseudocode. Refer to Figure
    [9-13](#Fig13).
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: 到这一点，你就可以看到完整的伪代码了。参见图 [9-13](#Fig13)。
- en: '![](../images/502835_2_En_9_Chapter/502835_2_En_9_Fig13_HTML.jpg)'
  id: totrans-403
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_9_Chapter/502835_2_En_9_Fig13_HTML.jpg)'
- en: A pseudocode for soft actor critic or S A C. Input initial policy parameters
    theta, Q-function parameters phi 1 and 2, and empty relay buffer D is followed
    by set target parameters, compute target for Q-function, update Q-function and
    policy, and update target networks using poly a k averaging.
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: 软演员评论家或 S A C 的伪代码。输入初始策略参数 theta，Q 函数参数 phi 1 和 2，以及空的回传缓冲区 D，然后设置目标参数，计算 Q
    函数的目标，更新 Q 函数和政策，并使用多项式 a k 平均更新目标网络。
- en: Figure 9-13
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-13
- en: Soft actor-critic algorithm
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: 软演员评论家算法
- en: With all the mathematical derivations and pseudocode, it is time to dive into
    the implementation in PyTorch. The implementation using PyTorch is in the `9.e-sac.ipynb`
    file. Like before, you’ll train the agent using SAC on the Pendulum and Lunar-Lander
    environments.
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 在所有数学推导和伪代码之后，是时候深入到 PyTorch 中的实现了。使用 PyTorch 的实现位于 `9.e-sac.ipynb` 文件中。和之前一样，你将使用
    SAC 在摆锤和月球着陆器环境中训练智能体。
- en: Policy Network-Actor Implementation
  id: totrans-408
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 政策网络-演员实现
- en: 'Let’s first look at the actor network. The actor network implementation takes
    the state as input, which is the same as before. However, the output has two components:'
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先看看演员网络。演员网络的实现以状态作为输入，与之前相同。然而，输出有两个组成部分：
- en: Either squashed (i.e., passing the action value through tanh) deterministic
    action *a*, which is μ[θ](*s*), or a sample action *a* from the distribution ![$$
    N\left({\upmu}_{\uptheta}(s),{\upsigma}_{\uptheta}^2(s)\right) $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq26.png).
    The sampling uses the reparameterization trick, and PyTorch implements this for
    you as `distribution.rsample()`. You can read about it at [`https://pytorch.org/docs/stable/distributions.html`](https://pytorch.org/docs/stable/distributions.html)
    under the topic, “Pathwise Derivative.”
  id: totrans-410
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要么是经过压缩的（即通过tanh函数传递动作值）的确定性动作 *a*，即 μ[θ](*s*)，要么是从分布 ![$$ N\left({\upmu}_{\uptheta}(s),{\upsigma}_{\uptheta}^2(s)\right)
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_IEq26.png) 中抽取的样本动作
    *a*。采样使用重新参数化技巧，PyTorch为你实现了 `distribution.rsample()`。你可以在“路径导数”主题下阅读有关内容，请访问[`https://pytorch.org/docs/stable/distributions.html`](https://pytorch.org/docs/stable/distributions.html)。
- en: 'The second output is the log probability that you will need for calculating
    entropy inside the Q-loss, as per Equation [9-27](#Equ28). Since you are using
    squashed/tanh transformation, the log probability needs to apply a change of variables
    for random distribution using the following:'
  id: totrans-411
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第二个输出是计算Q损失中熵所需的日志概率，如方程[9-27](#Equ28)所示。由于你使用了压缩的/tanh变换，日志概率需要对随机分布应用变量变换，如下所示：
- en: '![$$ {f}_Y(y)={f}_X\left({g}^{-1}(y)\right)\left|\frac{d}{dy}\left({g}^{-1}(y)\right)\right|
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Eqube.png)'
  id: totrans-412
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![$$ {f}_Y(y)={f}_X\left({g}^{-1}(y)\right)\left|\frac{d}{dy}\left({g}^{-1}(y)\right)\right|
    $$](../images/502835_2_En_9_Chapter/502835_2_En_9_Chapter_TeX_Eqube.png)'
- en: The code uses some tricks to calculate a numerically stable version. You can
    find more details in the original paper.
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: 代码使用了一些技巧来计算数值稳定的版本。你可以在原始论文中找到更多细节。
- en: 'Listing [9-11](#PC11) lists the code for `SquashedGaussianMLPActor`, as discussed
    earlier. The neural network continues to be the same as before: two hidden layers
    of size 256 units with ReLU activations.'
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 列表[9-11](#PC11)列出了之前讨论的 `SquashedGaussianMLPActor` 的代码。神经网络继续与之前相同：两个大小为256个单位的隐藏层，使用ReLU激活。
- en: '[PRE10]'
  id: totrans-415
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Q-Network, Combined Model, and Experience Replay
  id: totrans-416
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: Q-Network，组合模型和经验回放
- en: The Q-function network `MLPQFunction`, which combines the actor and critic into
    an agent in the `MLPActorCritic` class, as well as the `ReplayBuffer` implementations,
    are mostly the same. Accordingly, I do not list these parts of the code here.
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: Q函数网络 `MLPQFunction`，它将演员和评论家结合到 `MLPActorCritic` 类中的智能体，以及 `ReplayBuffer` 的实现，大部分是相同的。因此，我这里没有列出这些代码部分。
- en: Q-Loss and Policy-Loss Implementation
  id: totrans-418
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: Q损失和策略损失实现
- en: Next, you’ll look at `compute_q_loss` and `compute_policy_loss`. This is a straight
    implementation of Steps 11 to 13 of the SAC pseudocode in Figure [9-13](#Fig13).
    If you compare these steps with Steps 11 to 14 of TD3 in Figure [9-8](#Fig8),
    you will see lots of similarities, except for the fact that the action is sampled
    from the online network and SAC has an additional term of entropy in both losses.
    These changes are minor, and hence I do not list the code explicitly here.
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，你将查看 `compute_q_loss` 和 `compute_policy_loss`。这是SAC伪代码图[9-13](#Fig13)中步骤11到13的直接实现。如果你将这些步骤与图[9-8](#Fig8)中TD3的步骤11到14进行比较，你会看到很多相似之处，除了动作是从在线网络中抽取的这一事实。SAC在两个损失中都额外包含了一个熵项。这些变化很小，因此我没有明确列出代码。
- en: One-Step Update and SAC Main Loop
  id: totrans-420
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 单步更新和SAC主循环
- en: Again, the code for `one_step_update` and the overall training algorithm follows
    a similar pattern as before. For SAC, like TD3, the policy and target networks
    are updated once for every “x” update of the online Q-network. However, unlike
    TD3 where the update is only done once, SAC updates it “x” times in a loop.
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，`one_step_update` 和整体训练算法遵循与之前相似的模式。对于SAC，就像TD3一样，策略网络和目标网络在每次“x”更新在线Q网络时更新一次。然而，与TD3只更新一次不同，SAC在循环中更新“x”次。
- en: Once you run and train the agent, you’ll see similar outcomes as DDPG and TD3\.
    Figure [9-14](#Fig14) shows the graphs as training progresses. You can see that
    performance characteristics match those of TD3 shown in Figure [9-9](#Fig9).
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦运行并训练了智能体，你将看到与DDPG和TD3类似的输出。图[9-14](#Fig14)显示了随着训练进展的图表。你可以看到性能特征与图[9-9](#Fig9)中显示的TD3的性能特征相匹配。
- en: '![](../images/502835_2_En_9_Chapter/502835_2_En_9_Fig14_HTML.jpg)'
  id: totrans-423
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/502835_2_En_9_Chapter/502835_2_En_9_Fig14_HTML.jpg)'
- en: 3 line graphs for pendulum using S A C. Left. The mean return per episode increases
    from (0, negative 1300) to (19, negative 150). Center. The loss of Q decreases
    logarithmically from (0, 11.5) to (9500, 3.5). Right. The loss of actor increases
    from (0, 5) to (9500, 68). Values are estimated.
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 使用SAC（Soft Actor-Critic）的摆锤3线图。左侧。每期的平均回报从(0, -1300)增加到(19, -150)。中间。Q值的损失对数减少从(0,
    11.5)到(9500, 3.5)。右侧。actor的损失从(0, 5)增加到(9500, 68)。数值为估算值。
- en: Figure 9-14
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-14
- en: Training progress for Pendulum using SAC
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 使用SAC对摆锤的训练进度
- en: This chapter uses simple environments, and hence all three continuous control
    algorithms (DDPG, TD3, and SAC) in this chapter behave well. Consult the various
    papers referenced in this chapter to do a deep dive into the official performance
    comparisons of various approaches.
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 本章使用简单环境，因此本章中的所有三个连续控制算法（DDPG、TD3和SAC）表现良好。请参考本章中引用的各种论文，以深入了解各种方法的官方性能比较。
- en: 'This brings you to the end of this chapter of continuous control in actor-critic
    settings. By now, you have seen model-based policy iteration approaches, deep
    learning–based Q-learning (DPN) approaches, policy gradients for discrete actions,
    and policy gradients for continuous control. This covers most of the popular approaches
    of reinforcement learning. You have one more major topic to learn about before
    you finish your journey: that of using model learning in a model-free world and
    efficient model exploration for environments where you know the model, but it
    is too complex or vast to be explored exhaustively.'
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: 这就带我们来到了本章关于actor-critic设置中连续控制的结束。到目前为止，你已经看到了基于模型的策略迭代方法、基于深度学习的Q学习（DPN）方法、离散动作的策略梯度以及连续控制策略梯度。这涵盖了强化学习的大部分流行方法。在你完成旅程之前，你还有另一个主要主题要学习：在无模型世界中使用模型学习和在已知模型但过于复杂或庞大而无法彻底探索的环境中进行的有效模型探索。
- en: Summary
  id: totrans-429
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 概述
- en: In this chapter, you learned about the actor-critic methods for continuous control
    where off-policy Q-learning types are combined with policy gradients to derive
    off-policy continuous control actor-critic methods. Q-learning has the benefits
    of being sample efficient, off-policy, and indirect, but it also has the drawbacks
    of being unstable and difficult to apply to continuous actions. Policy gradients
    have the benefits of being direct, stable, and suitable for continuous actions,
    but they also have the drawbacks of being on-policy and sample inefficient.
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你学习了连续控制的actor-critic方法，其中离线Q学习类型与策略梯度相结合，以推导出离线连续控制actor-critic方法。Q学习具有样本效率高、离线、间接等优点，但它也存在不稳定和难以应用于连续动作的缺点。策略梯度具有直接、稳定和适用于连续动作的优点，但它们也存在在线和样本效率低的缺点。
- en: 'The common framework for combining Q-learning and policy gradient consists
    of two networks: an actor network that learns a deterministic policy that maximizes
    the Q-value, and a critic network that learns the Q-value using the Bellman equation.
    The framework also employs a replay buffer, a target network, and an exploratory
    policy.'
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 结合Q学习和策略梯度的通用框架包括两个网络：一个actor网络，它学习一个最大化Q值的确定性策略；一个critic网络，它使用Bellman方程学习Q值。该框架还采用了一个重放缓冲区、一个目标网络和一个探索策略。
- en: You first looked at deep deterministic policy gradients, which was introduced
    in 2016\. It was the first continuous control algorithm. DDPG is an actor-critic
    method with deterministic continuous control policies.
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: 你首先了解了深度确定性策略梯度（Deep Deterministic Policy Gradients），它是在2016年提出的，是第一个连续控制算法。DDPG是一种具有确定性连续控制策略的actor-critic方法。
- en: Next, you looked at TD3 (twin delayed DDPG), which came out in 2018 and addressed
    some of the stability and inefficiency challenges found in DDPG. Like DDPG, it
    also learned a deterministic policy in an off-policy setting with the actor-critic
    architecture. It used clipped double Q-learning, delayed policy updates, and target
    policy smoothing.
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，你了解了TD3（双延迟DDPG），它在2018年发布，解决了DDPG中发现的某些稳定性和效率问题。像DDPG一样，它也在离线策略设置中，使用actor-critic架构学习确定性策略。它使用了裁剪的双Q学习、延迟策略更新和目标策略平滑。
- en: Lastly, you looked at Soft Actor-Critic (SAC), which bridged the DDPG style
    of learning with stochastic policy optimization using entropy. SAC is an off-policy
    stochastic policy optimization using the actor-critic setup. It uses entropy regularization,
    the reparameterization trick, and clipped double Q-learning.
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，你了解了软演员-评论家（Soft Actor-Critic，SAC）方法，它将DDPG风格的训练与使用熵的随机策略优化相结合。SAC是一种使用演员-评论家设置的离策略随机策略优化方法。它使用熵正则化、重新参数化技巧和裁剪的双Q学习。
