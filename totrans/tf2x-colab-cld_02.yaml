- en: 2. Build Your First Neural Network with Google Colab
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: We work through a complete deep learning example with Python’s TensorFlow 2.x
    library in the Google Colab cloud service. We also demonstrate how to link your
    Google Drive with the Colab cloud service.
  prefs: []
  type: TYPE_NORMAL
- en: 'Notebooks for chapters are located at the following URL: [`https://github.com/paperd/tensorflow`](https://github.com/paperd/tensorflow).'
  prefs: []
  type: TYPE_NORMAL
- en: 'Building a competent neural network with TensorFlow 2.x is relatively easy.
    Data science professionals follow a few steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Get raw data.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Explore and preprocess raw data.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Split raw data into train-test sets.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Create a tf.data.Dataset.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Prepare the input pipeline.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Create and train a neural network model.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Data scientists want raw data because it is untouched. They want to clean, munge,
    and sculpt raw data to chisel out meaning for their specific problem at hand.
    If data is already processed, much of its meaning may already be lost. It is always
    a good idea to explore data to get a sense of what it looks like before attempting
    to preprocess. Once data is cleansed and wrangled, it is split into train-test
    sets.
  prefs: []
  type: TYPE_NORMAL
- en: We create a tf.data.Dataset for TensorFlow consumption. Once in the proper form,
    we prepare the input pipeline. During preparation, further data cleansing and
    wrangling may be necessary. We then create and train a neural network model with
    input pipeline data.
  prefs: []
  type: TYPE_NORMAL
- en: Although reality requires all of these steps, we focus on data modeling with
    TensorFlow 2.x as it possesses a steep learning curve for the novice. So we begin
    with a simple, preprocessed dataset to free learners from the burden of data preprocessing
    and other associated tasks.
  prefs: []
  type: TYPE_NORMAL
- en: GPU Hardware Accelerator
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To vastly speed up processing, we can use the Google *Colab GPU*. However,
