- en: 3. Expert System Demonstrations
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This chapter contains several expert systems demonstrations , all of which have
    been run on a Raspberry 3 standalone desktop configuration. The first demonstration,
    Demo 3-1, is a very simple one—designed to show you how to get started using Prolog
    on the Raspberry Pi. I have included some discussion on how to use both the command
    line and GUI trace functions that are very useful in debugging a Prolog program.
    The second demonstration, Demo 3-2, is somewhat more complex, in which the program
    asks the user some questions about an unknown animal and then tries to reach a
    conclusion based on the answers to the questions.
  prefs: []
  type: TYPE_NORMAL
- en: The complexity rises with the next expert program, Demo 3-3, which implements
    a tic-tac-toe game. I provide some detailed discussion on how the tic-tac-toe
    program functions in order to provide some insight into predicates and how they
    are used in a Prolog program. The next demonstration, Demo 3-4, should help diagnosis
    whether you are suffering with a cold or the flu. It is only a demonstration;
    it should not be substituted for a visit to the doctor’s office. Demo 3-5 couples
    the results from the Prolog expert system to the actual activation of Raspberry
    Pi GPIO pins. I show you how to install and use a library named PySWIP, which
    allows Prolog commands to be called and executed within a Python program.
  prefs: []
  type: TYPE_NORMAL
- en: All of these demonstrations should also run on earlier Raspberry models , but
    at a somewhat slower pace. For Demo 3-5, you need some additional parts, which
    are described in Table [3-1](#Tab1).
  prefs: []
  type: TYPE_NORMAL
- en: Table 3-1.
  prefs: []
  type: TYPE_NORMAL
- en: Parts Lists
  prefs: []
  type: TYPE_NORMAL
- en: '| Description | Quantity | Remarks |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Pi Cobbler | 1 | 40-pin version, either T or DIP form factor acceptable |'
  prefs: []
  type: TYPE_TB
- en: '| solderless breadboard | 1 | 860 insertion points with power supply strips
    |'
  prefs: []
  type: TYPE_TB
- en: '| jumper wires | 1 package |   |'
  prefs: []
  type: TYPE_TB
- en: '| LED | 2 |   |'
  prefs: []
  type: TYPE_TB
- en: '| 220Ω resistor | 2 | 1/4 watt |'
  prefs: []
  type: TYPE_TB
- en: These parts are readily available from a number of online sources, including
    Adafruit Industries, MCM Electronics, RS Components, Digikey, and Mouser.
  prefs: []
  type: TYPE_NORMAL
- en: I start the expert system demonstrations with a simple database, in which I
    use the `trace` command to illustrate how Prolog resolves user goals or queries.
  prefs: []
  type: TYPE_NORMAL
- en: 'Demo 3-1: Office Database'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The following program and discussion are based largely on a very clear tutorial
    from the MultiWingSpan website on tracing with Prolog. The following listing is
    the Prolog database, which is aptly named office.pl.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'The database is quite simple: only five facts regarding office roles and three
    rules regarding who supervises whom. Figure [3-1](#Fig1) shows an interactive
    Prolog session where I have queried Prolog regarding various office members’ roles
    and who they supervise. The queries are very straightforward, but not very revealing
    about how Prolog reaches conclusions.'
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_3_Fig1_HTML.jpg](A436848_1_En_3_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-1.
  prefs: []
  type: TYPE_NORMAL
- en: Interactive Prolog session
  prefs: []
  type: TYPE_NORMAL
- en: 'An important debugging tool available in Prolog is the `trace` command . Trace
    allows you to view all the goals as they are executed in a sequence in a Prolog
    query. You can also view any “backtracking” that happens when a goal fails. Tracing
    is turned on by this command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'When finished with tracing, you turn it off using this command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: The `trace` command is among more than 20 debugging commands that are implemented
    in SWI Prolog. Covering all the various ways of using the Prolog debugging tools
    would likely take a separate book by itself. My intention is only to illustrate
    some straightforward debugging measures that should help you understand how Prolog
    functions with a database.
  prefs: []
  type: TYPE_NORMAL
- en: The following is a command-line trace session using the office database that
    I just presented. Figure [3-2](#Fig2) is a complete screenshot of the tracing
    session.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_3_Fig2_HTML.jpg](A436848_1_En_3_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-2.
  prefs: []
  type: TYPE_NORMAL
- en: Office database tracing session
  prefs: []
  type: TYPE_NORMAL
- en: Table [3-2](#Tab2) is a line-by-line commentary on the tracing session shown
    in Figure [3-2](#Fig2). You should note that the SWI Prolog debugger supports
    six standard ports, which are named Call, Exit, Redo, Fail, Exception, and Unify.
    You see some of these ports in the following commentary, as they represent which
    actions the Prolog interpreter is taking with regard to the database facts and
    rules. You also see a number in parenthesis following the port name. This is the
    current clause line number that is being processed from the database.
  prefs: []
  type: TYPE_NORMAL
- en: Table 3-2.
  prefs: []
  type: TYPE_NORMAL
- en: Line-by-Line Trace Session Commentary
  prefs: []
  type: TYPE_NORMAL
- en: '| Prolog dialog/trace output | Commentary |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| `swipl` | Start SWI-Prolog |'
  prefs: []
  type: TYPE_TB
- en: '| `[office].` | Load the office database. This form is shorthand for the consult
    function. |'
  prefs: []
  type: TYPE_TB
- en: '| `trace.` | Start the tracing. |'
  prefs: []
  type: TYPE_TB
- en: '| `supervises(Who, green).` | The user input query to determine who supervises
    employee `green`. |'
  prefs: []
  type: TYPE_TB
- en: '| `Call: (6)` `supervises(_G2345, green) ? creep` | Prolog finds the first
    rule for supervises(X,Y) and instantiates Y to match green, as stated in the query.
    The word `creep` appears when you press Enter. It means that Prolog has been instructed
    to move to the next instruction. Prolog memory reference _G2345 is for the X argument,
    which is henceforth named `Who`. |'
  prefs: []
  type: TYPE_TB
- en: '| `Call: (7)` `manager(_G2345) ? creep` | Prolog tries to satisfy the first
    subgoal of the rule. It tries `manager(X)`. |'
  prefs: []
  type: TYPE_TB
- en: '| `Exit: (7)` `manager(brown) ? creep` | `brown` is found as a manager. Prolog
    next tests whether this leads to a solution. The word `Exit` reflects the fact
    that Prolog has found a solution to its last call. It sets X to `brown`. |'
  prefs: []
  type: TYPE_TB
- en: '| `Call: (7)` `adminWorker(green) ? creep` | If `brown` manages `green`, `green`
    must be an `adminWorker`. |'
  prefs: []
  type: TYPE_TB
- en: '| `Fail: (7)` `adminWorker(green) ? creep` | Since `green` is not an `adminWorker`,
    the second subgoal of the rule cannot be satisfied. |'
  prefs: []
  type: TYPE_TB
- en: '| `Redo: (7)` `manager(_G2345) ? creep` | Prolog backtracks to the first subgoal
    and resumes where it left off with `manager(X)`. |'
  prefs: []
  type: TYPE_TB
- en: '| `Exit: (7)` `manager(grey) ? creep` | Prolog finds `grey` and instantiates
    X to this new value. |'
  prefs: []
  type: TYPE_TB
- en: '| `Call: (7)` `adminWorker(green) ? creep` | Prolog again tests whether or
    not green is an `adminWorker`. |'
  prefs: []
  type: TYPE_TB
- en: '| `Fail: (7)` `adminWorker(green) ? creep` | Once again, it fails. This means
    the rule cannot provide a solution. |'
  prefs: []
  type: TYPE_TB
- en: '| `Redo: (6)` `supervises(_G2345, green) ? creep` | Prolog backtracks to the
    initial rule and proceeds with processing the top-level goal. |'
  prefs: []
  type: TYPE_TB
- en: '| `Call: (7)` `adminWorker(_G2345) ? creep` | This time, Prolog looks for an
    `adminWorker` as the supervisor. (The second rule.) |'
  prefs: []
  type: TYPE_TB
- en: '| `Exit: (7)` `adminWorker(black) ? creep` | Prolog finds `black` and instantiates
    X to this new value. |'
  prefs: []
  type: TYPE_TB
- en: '| `Call: (7)` `officeJunior(green) ? creep` | Prolog checks if the second subgoal
    is now satisfied. |'
  prefs: []
  type: TYPE_TB
- en: '| `Exit: (7)` `officeJunior(green) ? creep` | `green` is an `officeJunior`,
    and consequently, the second subgoal is satisfied. |'
  prefs: []
  type: TYPE_TB
- en: '| `Exit: (6)` `supervises(black, green) ? creep` | The top-level goal is satisfied.
    |'
  prefs: []
  type: TYPE_TB
- en: The statement `Who = black.` in the figure is not part of the trace but is the
    Prolog response that is displayed in response to the initial query, `supervises(Who,
    green)`.
  prefs: []
  type: TYPE_NORMAL
- en: 'The word `creep` that is shown on all of the trace lines appears after you
    press the Enter key. It just indicates that Prolog is proceeding to the next line
    of the trace. There is a lot of additional information available regarding the
    `trace` command. Simply type the following to find out more about trace and its
    capabilities:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: You should also note that trace does not work on Prolog’s built-in functions.
    You have to rely on Prolog’s extensive documentation to learn about those functions.
  prefs: []
  type: TYPE_NORMAL
- en: SWI Prolog also provides a debugging graphical user interface (GUI) in addition
    to the command-line version that I just demonstrated. Figure [3-3](#Fig3) shows
    the command-line session used to invoke the GUI using the same database and query
    in the previous example.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_3_Fig3_HTML.jpg](A436848_1_En_3_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-3.
  prefs: []
  type: TYPE_NORMAL
- en: Invoking the GUI tracer
  prefs: []
  type: TYPE_NORMAL
- en: 'The only difference between the command line and GUI invocations is that the
    `guitracer` . command is entered right after the consult command. Prolog returns
    this statement:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: However, no GUI is displayed until you actually enter the `trace`. command and
    then enter a goal, which in this example is `supervises(Who, green)`. From this
    point on, all the user tracing and debugging actions take place in the GUI dialog
    screen, which is shown in Figure [3-4](#Fig4).
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_3_Fig4_HTML.jpg](A436848_1_En_3_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-4.
  prefs: []
  type: TYPE_NORMAL
- en: GUI trace dialog display
  prefs: []
  type: TYPE_NORMAL
- en: You must repeatedly click the right-facing arrow located in the upper left-hand
    portion of the toolbar in order to step through all the Prolog operations detailed
    in Table [3-2](#Tab2). Figure [3-4](#Fig4) actually shows the state of the Prolog
    sequence at the following step, excerpted from Table [3-2](#Tab2).
  prefs: []
  type: TYPE_NORMAL
- en: '| `Call: (7)` `officeJunior(green) ? creep` | Prolog checks if the second subgoal
    is now satisfied. |'
  prefs: []
  type: TYPE_TB
- en: A graphical representation of the call stack is also shown in the upper right-hand
    pane of the GUI display. Many Prolog users prefer the GUI representation to the
    command-line version, but you can be assured that either version does precisely
    the same tracing actions.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can stop the GUI trace by using a command similar to the command-line version
    :'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: The next expert system demonstration is a classic game that is presented to
    most beginning AI students.
  prefs: []
  type: TYPE_NORMAL
- en: 'Demo 3-2: Animal Identification'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'This expert system is an animal identification game that is the Prolog version
    of a Lisp program originally presented in The Handbook of Artificial Intelligence
    Vol 4, a book edited by Barr, Cohen and Feigenbaum (Addison-Wesley, 1990). It
    is a relatively simple program that tries to identify the animal that you are
    thinking about from a choice of seven:'
  prefs: []
  type: TYPE_NORMAL
- en: cheetah
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: tiger
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: giraffe
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: zebra
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: ostrich
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: penguin
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: albatross
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The program is set up to ask a series of questions in an endeavor to determine
    the animal. I suggest you try the program before I discuss how it works. You need
    only enter a `yes` or `no` to answer the questions. Your responses can even be
    shortened to `y` or `n`. Enter the following
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: after you load the program.
  prefs: []
  type: TYPE_NORMAL
- en: The following is a listing of the Prolog animal script.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: This program is interesting because it tries to verify properties to draw conclusions.
    The answers to the questions are also briefly stored for future reference. When
    a question is asked and answered with a `yes`, then the answer is recorded by
    asserting the clause `yes(question)` and succeeding; otherwise, the answer is
    recorded by asserting the clause `no(question)` and failing. The `yes` answers
    are recorded because a later `no` answer to a different question while trying
    to verify the same hypothesis could cause the entire hypothesis to fail; whereas
    the same `yes` answer could have led to a successful verification of a different
    hypothesis later in the process. Recording answers is the way the program avoids
    asking the same question twice. Conditions specified in a question are verified
    by checking if the `yes(question)` is in the memory and has succeeded or the `no(question)`
    is stored and has failed. If neither check is true, then `ask(question)` is done.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [3-5](#Fig5) shows a sample interactive session with this program, in
    which I went through several question-and-answer runs.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_3_Fig5_HTML.jpg](A436848_1_En_3_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-5.
  prefs: []
  type: TYPE_NORMAL
- en: Interactive animal program session
  prefs: []
  type: TYPE_NORMAL
- en: I did determine that the program will draw an erroneous conclusion regarding
    carnivores based on the addition of a rule that classifies carnivores solely on
    having pointed teeth, claws, and forward-facing eyes. Figure [3-6](#Fig6) shows
    the interactive session in which I answered `no` to the question asking if the
    animal eats meat and `yes` to the questions on teeth, claws, and eyes.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_3_Fig6_HTML.jpg](A436848_1_En_3_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-6.
  prefs: []
  type: TYPE_NORMAL
- en: Incorrect conclusion animal session
  prefs: []
  type: TYPE_NORMAL
- en: This behavior in this particular expert system simply points out that incorrect
    results can be reached if the rules are not consistent with the real-world models
    on which they are based. By definition, carnivores are meat eaters, even though
    I deliberately answered no to that question. In the next demonstration, I get
    away from big cats and birds to a much more benign, yet interesting expert system.
  prefs: []
  type: TYPE_NORMAL
- en: 'Demo 3-3: tic-tac-toe'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Tic-tac-toe , as it’s known in the United States, or noughts and crosses in
    other lands, is a delightful game often played quite effectively by very young
    children. It may also be implemented by an expert system. The following listing
    is a straightforward tic-tac-toe program named tictactoe.pl, which may be played
    against the computer by entering the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: 'There is also a self-play option in which the computer plays against itself.
    That option always ends with X winning. To initiate self-play enter this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Figure [3-7](#Fig7) shows one of the games that I played against the computer
    .
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_3_Fig7_HTML.jpg](A436848_1_En_3_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-7.
  prefs: []
  type: TYPE_NORMAL
- en: Game played against the computer
  prefs: []
  type: TYPE_NORMAL
- en: You should notice that the program displayed `Cats game!` at the end of rounds,
    which is tic-tac-toe terminology for a tie game.
  prefs: []
  type: TYPE_NORMAL
- en: I also initiated a self-game in which the computer played against itself. Figure
    [3-8](#Fig8) shows that result. It always ends with X winning, as I mentioned
    earlier.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_3_Fig8_HTML.jpg](A436848_1_En_3_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-8.
  prefs: []
  type: TYPE_NORMAL
- en: Self-game
  prefs: []
  type: TYPE_NORMAL
- en: 'At this point, I discuss the inner workings of the tic-tac-toe program, now
    that you have seen how it runs. There are three rules or predicates that define
    winning: by row, by column, or by diagonal. The following is one of the generalized
    win predicates:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: 'Next, there are three ways of winning: by row or by column, and two by diagonal.
    The following predicate is one way of winning by completing the top row:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: Similar predicates are generated for the other rows, columns, and diagonals,
    as you can see by reviewing the code.
  prefs: []
  type: TYPE_NORMAL
- en: There are nine move predicates that control how a move is made, which corresponds
    to each of the nine board positions.
  prefs: []
  type: TYPE_NORMAL
- en: 'The predicate, as follows, controls how the human player interacts with the
    game:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: Similarly, the series of `orespond` predicates control how the computer interacts
    with the game.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, there are nine predicates named `xmove` that ensure only legal moves
    can be made. They also translate the internal game position representations from
    A, B, C, … to the corresponding displayed positions 1, 2, 3, … .
  prefs: []
  type: TYPE_NORMAL
- en: 'The next expert system demonstration deals with a situation that we all occasionally
    encounter: determining whether we have a cold or the flu.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Demo 3-4: Cold or Flu Diagnosis'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This example is a very basic medical-diagnosis expert system in which you answer
    a few questions and the system tries to determine whether you are suffering from
    the flu or a much more benign cold.
  prefs: []
  type: TYPE_NORMAL
- en: Caution
  prefs: []
  type: TYPE_NORMAL
- en: This expert system is in no way a substitute for a real doctor’s advice and
    consultation. If you are really sick, please go to your doctor. Do not rely on
    this program for a trusted diagnosis.
  prefs: []
  type: TYPE_NORMAL
- en: The following program is named flu_cold.pl.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: 'As noted in the comments, you start the program with this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: The symptoms are then presented one after the other. Just answer with either
    a `yes.` or `no.` (alternatively, you can use the single letters `y.` or `n.`).
    Do not forget to enter the period at the end of the response; otherwise, Prolog
    will not recognize your entry. If you select a combination of symptoms that are
    not inclusive to either one of the hypotheses, then Prolog will simply show a
    fail because it cannot match your entries with the known facts.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [3-9](#Fig9) shows a sample session that I conducted with this expert
    system . I selected symptoms for the flu, a cold, and finally, some for the no-match
    case.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_3_Fig9_HTML.jpg](A436848_1_En_3_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-9.
  prefs: []
  type: TYPE_NORMAL
- en: Cold and flu expert system session
  prefs: []
  type: TYPE_NORMAL
- en: The next demonstration is the last one in the chapter. It involves another simple
    expert system—but with a twist, because the system controls several Raspberry
    Pi GPIO outputs.
  prefs: []
  type: TYPE_NORMAL
- en: 'Demo 3-5: Expert System with Raspberry Pi GPIO Control'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Until now, I have shown you expert systems that could be run on any PC or Mac
    with a compatible version of Prolog. This demonstration differs because I show
    you how to directly control some general-purpose input/out (GPIO) pins with Prolog—something
    that is not generally possible on a regular PC.
  prefs: []
  type: TYPE_NORMAL
- en: To be totally honest, it is simply not possible to directly control a GPIO pin
    using a Prolog command; but it is possible if you combine Prolog with the Python
    language. This combination is made possible by a great program named PySWIP, which
    allows Prolog commands to be called and executed within a Python program. There
    is also a great Python application program interface (API) named RPi.GPIO, which
    easily facilitates GPIO pin control. Next, I describe how to install the PySWIP
    application and set up the RPi.GPIO API, which are both prerequisites for this
    expert system demonstration.
  prefs: []
  type: TYPE_NORMAL
- en: Installing PySWIP
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'PySWIP was created by Yuce Tekol as a bridge program between Prolog and Python.
    He provided it to the community as GPL open source software. The program is not
    part of the Raspian repositories and therefore cannot be installed using the apt
    package manager. To install it, you must use the pip program. If you do not have
    pip already installed on your Raspberry Pi, use the following command to install
    it:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: 'Once pip is installed, you can then use it to install PySWIP with this command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: 'There is one additional step that must be done for Python to recognize Prolog,
    and that is to create a symlink between the original shared library name and the
    latest one. Just enter this next command to create the link:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: 'You should next enter the following Python commands in an interactive Python
    session to test if the PySWIP installation was successful:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: 'The following line is the Prolog response to the preceding command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: Ensure that you indent the next line. I used four spaces.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: 'Press the Backspace and Enter keys to execute the `for` statement. The Python
    interpreter should then display the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: If you see these two lines, you can be assured that Python and Prolog are working
    fine together, courtesy of the PySWIP bridge program. Figure [3-10](#Fig10) shows
    this test done with a Raspberry Pi.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_3_Fig10_HTML.jpg](A436848_1_En_3_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-10.
  prefs: []
  type: TYPE_NORMAL
- en: Prolog and Python compatibility test
  prefs: []
  type: TYPE_NORMAL
- en: It is now time to discuss the hardware setup, which uses the Python/Prolog expert
    system.
  prefs: []
  type: TYPE_NORMAL
- en: Hardware Setup
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I used a T-form Pi Cobbler accessory to extend the Raspberry Pi GPIO pins so
    that they can be easily used with a solderless breadboard in this setup. Figure
    [3-11](#Fig11) is a Fritzing diagram, which shows the setup with two LEDs and
    two current-limiting resistors.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_3_Fig11_HTML.jpg](A436848_1_En_3_Fig11_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-11.
  prefs: []
  type: TYPE_NORMAL
- en: Fritzing diagram
  prefs: []
  type: TYPE_NORMAL
- en: 'The LEDs are connected to GPIO pins #4 and #17, with the 220Ω current-limiting
    resistors connected to ground. Thus, the LEDs light when the pins are set to a
    high value, which is 3.3V for the Raspberry Pi. The LED series resistor sets the
    maximum current flow to approximately 12 ma, which is well within the 25 ma current
    limit for any given Raspberry Pi GPIO pin.'
  prefs: []
  type: TYPE_NORMAL
- en: Figure [3-12](#Fig12) shows the Raspberry Pi physical setup with the T Pi Cobbler,
    solderless breadboard, LEDs, and other components.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_3_Fig12_HTML.jpg](A436848_1_En_3_Fig12_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-12.
  prefs: []
  type: TYPE_NORMAL
- en: Raspberry Pi physical setup
  prefs: []
  type: TYPE_NORMAL
- en: You should next set up the RPi.GPIO API to control the LEDs with Python.
  prefs: []
  type: TYPE_NORMAL
- en: Rpi.GPIO Setup
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This discussion focuses on how the RPi.GPIO API is used in a Python program.
    These setup steps must be included in every Python program that needs to control
    GPIO pins. I demonstrate the setup in an interactive session, but you should realize
    that the same statements must be included in a regular program script.
  prefs: []
  type: TYPE_NORMAL
- en: 'The RPi.GPIO API is now included with all standard Raspian Linux distributions.
    You should be all set if you are using the latest Jessie Raspian distribution.
    The first step is to import the API, as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: 'From this point on, all references to the API simply use the GPIO name. Next,
    you have to select the appropriate pin-numbering scheme. There are two variations
    in the Raspberry Pi pin-numbering scheme:'
  prefs: []
  type: TYPE_NORMAL
- en: 'GPIO.BOARD: The board numbers that follow the physical pin numbers on the P1
    header, which contains all the GPIO pins.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'GPIO.BCM: The numbering scheme used by the chip manufacturer, BROADCOM, or
    BCM.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The pin numbers on the Pi Cobbler follow the BCM scheme, so that is what I
    used. You establish which numbering scheme to use with this statement:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: 'Next, the two selected pins must be set from the default input mode to the
    output mode, which is done using these two statements:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
- en: 'Now, everything should be established to switch the pins high or low. By default,
    they are set to a low state upon boot-up. These next two statements should turn
    on the two LEDs:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE25]'
  prefs: []
  type: TYPE_PRE
- en: If the LEDs did not light up, you should double-check the orientation of the
    LEDs in the breadboard. Every standard LED has two “legs,” one of which is slightly
    shorter than the other. The shorter leg is connected to one lead of the resistor,
    whose other lead is connected to ground. Try switching the orientation of the
    LED and see if it turns on. You will not harm the LED by switching the orientation.
    Also, double-check that you are connected to pins 4 and 17, and that you have
    selected the correct numbering scheme. I have found that when something does not
    work as expected, it is usually a connection issue or a simple mistake in the
    setup.
  prefs: []
  type: TYPE_NORMAL
- en: 'Turning off the LEDs is accomplished using these statements:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE26]'
  prefs: []
  type: TYPE_PRE
- en: An expert system is now ready to be created to control the LEDs.
  prefs: []
  type: TYPE_NORMAL
- en: Expert System with LED Control
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'I decided to essentially use the same simple Prolog script that was used to
    verify the PySWIP installation. However, the program was restructured a bit to
    take advantage of the Python way of using functions. That is the reason for using
    the PySWIP Functor function near the start of the program. This program is named
    LEDtest.py, which is run by entering the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE27]'
  prefs: []
  type: TYPE_PRE
- en: The LEDtest.py listing follows.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE28]'
  prefs: []
  type: TYPE_PRE
- en: Figure [3-13](#Fig13) shows the program output. What cannot be shown is that
    LEDs were lit for five seconds each, indicating that the two queries were successfully
    run.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_3_Fig13_HTML.jpg](A436848_1_En_3_Fig13_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-13.
  prefs: []
  type: TYPE_NORMAL
- en: Program output
  prefs: []
  type: TYPE_NORMAL
- en: At this point, you are probably wondering how this demonstration can be put
    to a practical use with a Raspberry Pi. That answer will have to be deferred for
    several chapters until I cover a fuzzy logic project, which uses an embedded expert
    system with some GPIO pins controlling a heating and cooling system (HVAC).
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There were five expert systems demonstrated in this chapter. They ranged from
    an extremely simple one with only a few facts and rules, to a much more complicated
    one that implemented the tic-toe-toe game.
  prefs: []
  type: TYPE_NORMAL
- en: The final demonstration showed you how to combine Python with Prolog so that
    Raspberry Pi GPIO pins could be controlled.
  prefs: []
  type: TYPE_NORMAL
