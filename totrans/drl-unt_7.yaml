- en: 7. Case Studies in ML Agents
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'At this stage, we have gained considerable knowledge as to the flexibility
    of the ML Agents Toolkit. We have also learned different complex algorithms that
    are related to deep RL. If we analyze, we can visualize that the main idea of
    any RL algorithm is to provide a set of decisions that the agent can follow to
    achieve a particular goal. Although we covered most of the deep learning algorithms,
    there is a set of algorithms that do not follow the traditional approach of backpropagation
    and gradient ascent/descent. In this chapter, we will explore evolutionary algorithms,
    which have been in practice for quite some time. These algorithms follow the principle
    of Darwinism—only the fittest offspring survive to produce the next generation.
    We will also look into the most famous case study of Unity ML Agents: Obstacle
    Tower Challenge. This challenge was created by Unity Technologies to help foster
    research in the AI community by providing a “challenging new benchmark for Agent
    performance.” The Obstacle Tower is a procedurally generated environment that
    the agent has to solve with the help of computer vision, locomotion, and generalization.
    The agent has a goal to reach successive floors by arriving at a step of stairs
    for each level. Each floor has its unique challenges in terms of puzzles, layouts,
    and visual appearance and forms a proper environment where traditional RL algorithms
    often fail to make the agent progress further. We will also be looking into the
    Unity ML Agents Challenge, which was organized by Unity. Since these are case
    studies, we will be briefly exploring the suggestions and steps followed by participants
    whose algorithms were benchmarked for performance. We will also be exploring certain
    other platforms for deep RL—namely, the Google Dopamine platform. Also in this
    chapter, we will be focusing more on the applicability of the algorithms that
    we have learned in these challenges.'
  prefs: []
  type: TYPE_NORMAL
- en: Evolutionary Algorithms
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Throughout this book, we have learned about different complex algorithms that
    enable the agent to take decisions. We have looked at algorithms that extensively
    require deep learning and neural networks. In this section, we will look into
    a different set of algorithms that use the biological concept of natural evolution.
    Throughout the history of human evolution, we have seen genes play an important
    role. From Neanderthals to Homo sapiens, the transformation was due to continuous
    change in our DNA, which contains the alleles (genes). DNA is a molecule containing
    two polynucleotide chains in a double helical orientation (Watson and Crick Model),
    containing Adenine, Cytosine, Thymine, and Guanine bases. Human reproduction is
    the process of transforming, splitting, and recombining these DNA strands in our
    system that inherently change or mutate the genes for the next generation of offspring.
    In sexual reproductive organisms, cell division through the process of meiosis
    takes place. In this eight-step procedure, chromosomes (fundamental part of genes)
    undergo splitting and combination several times to produce new permutations of
    chromosomes that are transferred to the next generation. The two most important
    stages in this process are crossover of the chromosomes and mutation of the chromosomes.
    The survivability of the new combination of chromosomes (mutated chromosome) depends
    on the theory of natural selection proposed by Darwin. According to Darwin’s theory,
    the fittest offspring survives to produce more offspring for the next generation.
    Combining this theory of Darwin (Principle of Natural Selection) with the chromosome
    transformation steps, the evolutionary algorithms come into picture. The evolutionary
    algorithms set is a collection of algorithms that are proposed to generate stronger
    samples for each new generation to complete a given task. The fitness of a particular
    offspring depends on its score to optimize a task—that is, to what extent the
    new offspring performs better as compared to the older ones. These tasks can be
    optimizing a mathematical function, or matching a pattern, or even making an agent
    to make a decision that would maximize the value returned. The combination of
    evolutionary algorithms with RL has given rise to a vast set of algorithms that
    are commonly referred to as evolutionary strategies (ES). Mostly, these algorithms
    are randomized and do not rely on neural networks or backpropagation for weight
    updates, as in the case of traditional deep RL algorithms. However, these can
    be extended to contain neural networks for training the crossover and mutation
    steps through a loss function with the help of gradient descent optimizers. Let
    us first formalize the steps of evolutionary algorithms, and then we will look
    at two simplest forms of these algorithms for better understandability.
  prefs: []
  type: TYPE_NORMAL
- en: The following are the steps of evolutionary algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: '**Initialization** **:** This is the first step of the algorithm where an initial
    population (samples) is initialized along with the chromosome set (possible variables),
    which can include characters for pattern matching, floats or integers for optimizing
    a function, and so forth. This also contains the target genome, which is the target
    value of the optimization process that is required to be reached.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Selection** **:** This process involves selecting the fittest offspring from
    the new generation based on certain logic. Depending on the fitness, the selection
    process can either mate the new offspring or mutate it.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Crossover** **:** This process is derived from splitting different parts
    of the chromosome and recombining them at different locations, effectively interchanging
    the gene sequences at different positions. Crossover causes mutation, as new combinations
    of the sequences are produced. Similarly, in our context, crossover is implemented
    using a random function to create new combinations of the offspring solution.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Mutation** **:** The new offspring population is then made to mutate, which
    is again controlled by a random function. The random function mutates parts of
    the solution based on the crossed over solution to optimize the target value.
    This introduces a variation in the population.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Termination** **:** Once the target function or value is achieved, the process
    terminates, as in this case we have produced the fittest generation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This process can be visualized in Figure [7-1](#Fig1).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_7_Chapter/502041_1_En_7_Fig1_HTML.png](../images/502041_1_En_7_Chapter/502041_1_En_7_Fig1_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-1
  prefs: []
  type: TYPE_NORMAL
- en: Evolutionary algorithm steps
  prefs: []
  type: TYPE_NORMAL
- en: 'We will be focusing on two different algorithms in this section: the genetic
    algorithm and the evolution strategy.'
  prefs: []
  type: TYPE_NORMAL
- en: Genetic Algorithm
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The most primitive form of evolutionary algorithms is the genetic algorithm
    . As the name suggests, it follows the traditional pipeline of evolutionary algorithm
    mentioned in the previous section including mutation and selection. The aim of
    the algorithm is to optimize a function by adjusting the randomly generated results
    for each episode of training. The episodes of training are referred to as the
    generation, and the results of such episodes are termed as the offspring. We will
    be building a genetic algorithm that would try to match a phrase by performing
    mutation and selection. Open the Genetic Algorithm.ipynb Notebook. In our case,
    we have a target string as the phrase that the algorithm has to match. The initial
    population is produced randomly by selecting characters from the “gene_pool” (character
    set).
  prefs: []
  type: TYPE_NORMAL
- en: Initially we start with declaring the class “GA” and including the “parameters”
    method. This controls the variables such as population, which signifies the length
    of the generated offspring string at each generation; the chromosome, which is
    the gene pool or all the characters present for building the population (alphabets,
    numbers, punctuations, space, and special characters); and the target_genome,
    which specifies the target string to match.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: The “mutation” method is used to randomly select a particular character from
    the set of characters referred to as the gene pool. In reality mutation is the
    process of randomly changing a particular gene in a genome sequence, and in this
    case, the method randomly selects a particular character from the set.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: The “create_sequence” method uses the “mutation” method to create the genome
    sequence for each new offspring in a generation . It returns a list of the character
    sequence.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: We then have the “offspring” method, which is a simplified version of crossing
    over of genes during mating. We take two different parent strings or character
    sequences as the parent genomes, and based on the output of the random function,
    we either clamp the parent’s genome to the child or mutate it using the “mutation”
    method. The “random” method provides an output probability, and if this value
    lies between 0 and 0.35, the child genome takes the first parent’s genome; if
    it is between 0.35 and 0.70, the child genome takes the second parent’s genome.
    For probabilities between 0.70 to 1.0, we produce a new genome sequence for the
    child with the mutation algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: The “fitness” method computes the decreasing fitness value for each offspring.
    Since we have to match a phrase or string, the fitness of a child genome sequence
    is calculated as the number of characters that are mismatched with respect to
    the target genome sequence. As the training would progress, we would see that
    the fitness would decrease, implying that the offspring sequences (strings) almost
    or completely match the target sequence (string).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'We have the “main” method where we initialize the class. We assign an initial
    population size of 100 randomly created genomes. The target genome sequence is
    the phrase “Genetic algorithm,” which the algorithm has to match. We then have
    a “while” loop, which runs as long as the target genome is not attained. Internally,
    we sort the new generation of offspring sequences based on their fitness value
    and use 10% of them (fittest offspring) for the next generation. The remaining
    90% of the population is then mated (50-50 ratio) using the “offspring” method.
    This procedure is completed with the help of the following lines :'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: We then use the “matplotlib” library to visualize the downward trend of fitness
    score with the new generations. It has to be mentioned that in this case, we consider
    the most fit to be the ones with the least fitness score—that is, almost completely
    matches the target genome or phrase. However, this logic can be reversed as well,
    and we can either maximize or minimize according to our needs.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: On running this, we can visualize the generations being produced by the algorithm
    and the corresponding fitness score,as shown in Figure [7-2](#Fig2).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_7_Chapter/502041_1_En_7_Fig2_HTML.jpg](../images/502041_1_En_7_Chapter/502041_1_En_7_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-2
  prefs: []
  type: TYPE_NORMAL
- en: Fitness vs. generations curve in genetic algorithm
  prefs: []
  type: TYPE_NORMAL
- en: The parameters inside the algorithm, such as the target_genome, population size,
    and the percentages for producing new generations, can be changed as well to analyze
    the effect of each parameter on training.
  prefs: []
  type: TYPE_NORMAL
- en: Evolution Strategies
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This is another set of algorithms that rely on crossover and mutation steps
    extensively for generation of new progenies. In the case of genetic algorithm
    we tried to match a phrase with values from a gene pool, which in our case was
    a subset of the ASCII character set. If we had to optimize a given mathematical
    function with a genetic algorithm, we would have used the binary set {0,1} to
    generate fit offspring. In the case of ES, for the same problem, we will be using
    real numbers to generate new generations. ES is a set of deterministic algorithms
    based on certain probabilistic distribution of the samples of a particular generation.
    Due to the deterministic nature of these algorithms, the dependency on gradient
    computation to maximize or minimize a function can be avoided. The simplest form
    of this includes simple Gaussian evolution strategies, and before we move into
    the implementation details of this, let us summarize the steps of ES.
  prefs: []
  type: TYPE_NORMAL
- en: 'We have to optimize a given function f(x) to an optimized variant p[θ](x) using
    the parameter set θ. The following steps are required:'
  prefs: []
  type: TYPE_NORMAL
- en: Generate an initial population D = {(x[i],f(x[i]))} where x[i]~ p[θ](x)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Evaluate the fitness of D
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use Darwin’s best fit strategy to select a subset of offspring to update θ and
    produce the next generation of offspring.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There are various algorithms inside this set, and we will be implementing the
    Gaussian Evolution Strategy.
  prefs: []
  type: TYPE_NORMAL
- en: Gaussian Evolution Strategy
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'We mentioned the randomness in ES is due to the distributions. When we apply
    a Gaussian kernel on the mutation and offspring generation process, we create
    this strategy. We create a normal distribution with mean μ and standard deviation
    σ, which is tracked by θ as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: θ = (μ,σ), and p[θ](x) ~ N(μ,σ²I) = μ + σN(0,I),
  prefs: []
  type: TYPE_NORMAL
- en: 'where N(μ,σ²I) is the normal distribution. The steps for this process can be
    mathematically simplified as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Initialization:** Initialize θ= θ[0] and counter t=0'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**OffSpring generation:** By using crossover and mutation, we create the next
    set of population using the form:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: D^((t+1)) = { x^((t+1)) | x^((t+1))=μ^((t)) + σ^((t)) y^((t+1)) where y^((t+1))
    ~ N(x|0,I) }
  prefs: []
  type: TYPE_NORMAL
- en: '**Survival of fittest:** The most elite offspring are sampled from the new
    population based on their fitness scores. Let λ be the sample of the fittest generation
    of offspring:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: D^((t+1))[elite] = { x[i]^((t+1)) | x[i]^((t+1)) ε D^((t+1 )) and i=1,….,λ }
  prefs: []
  type: TYPE_NORMAL
- en: '**Update μ and θ:** The mean and the standard deviation is updated using the
    fittest offspring set:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: μ^((t+1)) = avg(D^((t+1))[elite]) = (1/ λ) (∑[i=1..λ] x[i]^((t+1)) )
  prefs: []
  type: TYPE_NORMAL
- en: σ^((t+1)2) = var(D^((t+1))[elite]) =(1/ λ) (∑[i=1..λ] x[i]^((t+1)) - μ^((t))
    )²
  prefs: []
  type: TYPE_NORMAL
- en: Now we will create a simplified version of this algorithm that will be used
    to find the maximum value in a curve. In our case, we will use a general superposed
    harmonic oscillator as our function , although we can change the function according
    to our needs. Open the Evolutionary Algorithm.ipynb Notebook. We create the class
    “EA” and declare the “parameters” method, which controls the “chrom_size” (since
    we want to find the maximum float value of the equation, it is 1); the “chrom_bound,”
    which specifies the range in which to find the maxima; the “generations,” which
    signifies the number of generations to produce; the “population,” which controls
    the population size per generation; “n_offspring,” which controls the number of
    offsprings produced; and a Boolean variable “mutation,” which controls whether
    mutation will take place.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'Then we have the methods “harmonic,” ”sigmoid,” and “function,” which are different
    functions that we would like to optimize (maximize) in a given range. These are
    normal algebraic functions in the real plane bounded by the “chrom_bound” variable.
    In our case we will be using the “harmonic” method :'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: 'The “fitness” method is used to flatten the input into a list so that it can
    be used by the “survival_of_fittest” method later. A small bias of 1e-3 is added
    to it to avoid 0:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: The “offspring” method is used to mate two parents to produce a child and perform
    crossover and mutation (if “mutation” is set to True). We create a dictionary
    that contains the offspring number with its corresponding chromosome (float value).
    Each organism in the population consists of a value and produces similar offspring
    containing another float value, and as the training progresses, the offspring
    tries to produce the maximum float value for the function. The dictionary keeps
    a track of the float values or the chromosomes for each offspring. In the crossover
    method, two random parents (each containing a float value) are taken, and a new
    child offspring is generated. Since we are using mutation, we also create an array
    that contains the mutated float values (randomized) for each of the offspring.
    Then while updating the mutated gene, we use a normal distribution with mean of
    0.2\. Finally we return the newly generated offspring containing its own chromosome
    (float).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: 'We then have the “survival_of_fittest” method, and in this case we are using
    the mutation array as well. We stack the dictionary containing the float value
    (chromosome) and the mutated output value (float). Then we flatten this container
    and pass it to the “harmonic” function to generate float values. The resultant
    output is then sorted, and the highest values are passed to the next generation
    of offspring. This can be illustrated using the following lines:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: In the “main” method , we initialize the values of the parameters. We are providing
    a bound –[0,5] for determining the maxima of the function(”chrom_size”), with
    a population size of 100 (“population”), for 200 generations (“generations”) and
    50 offspring for each generation (“n_offspring”) with “mutation” set to “True.”
    We initialize the population with a normal distribution. For each loop of training,
    we create a new offspring using the “offspring” method and generate a new population
    based on the output of the “survival_of_fittest” method. A scatter plot, created
    using “matplotlib,” is used to visualize the final position of the maximum value
    of the function.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: On running this , we can visualize the maxima being pointed out by a yellowish-orange
    glow,as shown in Figure [7-3](#Fig3). Since we are using a superposed sinusoidal
    curve, the maximum value can be at either of the two peaks in the range [0,5].
    The algorithm shows the result to be the one on the right.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_7_Chapter/502041_1_En_7_Fig3_HTML.jpg](../images/502041_1_En_7_Chapter/502041_1_En_7_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-3
  prefs: []
  type: TYPE_NORMAL
- en: Maximizing a harmonic function with Gaussian Evolutionary Strategy
  prefs: []
  type: TYPE_NORMAL
- en: We can change the function to check the maxima for them as well. There are other
    algorithms in this section such as Covariance Matrix Adaptation (CMA)-ES and Natural
    Evolution Strategy (NES), which we will briefly discuss.
  prefs: []
  type: TYPE_NORMAL
- en: Covariance Matrix Adaptation Evolution Strategy
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'This is a stochastic evolutionary strategy that uses covariance matrix for
    updating the mean and standard deviation for each cycle of offspring. We use the
    Gaussian distribution, which we used in the previous part, with a covariance matrix
    instead of plain floats and integers.This is represented by the form:'
  prefs: []
  type: TYPE_NORMAL
- en: θ = (μ,σ), and p[θ](x) ~ N(μ,σ²C) = μ + σN(0,C),
  prefs: []
  type: TYPE_NORMAL
- en: 'where C is the covariance matrix. The covariance matrix on Gaussian distribution
    has non-negative Eigen values, and the corresponding vectors form an orthonormal
    basis. Most of the process is the same as before, with the exception of mean and
    standard deviation update. The mean is updated using the form:'
  prefs: []
  type: TYPE_NORMAL
- en: μ^((t+1)) = avg(D^((t+1))[elite]) = α(1/ λ) (∑[i=1..λ] x[i]^((t+1)) ),
  prefs: []
  type: TYPE_NORMAL
- en: 'where α is the learning rate. The most important aspect is the step size for
    producing new samples. Without the covariance matrix, the samples for the next
    generations are controlled by the standard deviation, σ, as mentioned in the previous
    section (Offspring Generation). A larger value updates the parameters using a
    large step size, and to control this we use the evolution strategy with the covariance
    matrix. Thus, at each step the parameters are updated by moving the new generation
    along the evolution path. This is done by updating y according to the relation:'
  prefs: []
  type: TYPE_NORMAL
- en: (1/ λ) (∑[i=1..λ] y[i]^((t+1)) ) ~ (1/ √λ)C^((t)0.5) N(0,I)
  prefs: []
  type: TYPE_NORMAL
- en: The C^((t)0.5) can be calculated easily since the matrix forms an orthonormal
    basis . We can assign higher weights to the recent offspring with the help of
    polyak averaging. The adaptation of the covariance matrix is done with the help
    of rank minimization. The CMA-ES algorithm is more stable than the vanilla ES
    algorithm (simple Gaussian), as it controls the exploration rate along with adapting
    the covariance matrix with the help of rank minimum updates. It combines the effect
    of Gaussian distribution on a covariance matrix for step-size modulation as well
    as updates the standard deviation using an adaptive strategy.
  prefs: []
  type: TYPE_NORMAL
- en: Natural Evolution Strategy
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'NES is related to the policy gradient update method to optimize a function.
    It uses the log likelihood method used in the vanilla policy gradients and reinforce
    algorithms, denoted by:'
  prefs: []
  type: TYPE_NORMAL
- en: ∆[θ] J [θ] = E [x~pθ] [f(x) ∆[θ] log p[θ](x)]
  prefs: []
  type: TYPE_NORMAL
- en: The fundamental parts of this algorithm are listed here.
  prefs: []
  type: TYPE_NORMAL
- en: NES uses rank-based fitness. This implies that NES uses ranks to determine monotonically
    increasing fitness.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: NES uses adaptation sampling for the hyperparameters. In this case, natural
    gradient descent is applied to update the weights, which are denoted as the ratio
    between the previous generation offspring fitness with respect to the current
    fitness.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: w`[i] = p[θ](x)/ p[θ**`**](x)
  prefs: []
  type: TYPE_NORMAL
- en: It also uses Kullback-Leiblar (KL) divergence as a measure to find the divergence
    between the probabilistic distributions during the sampling stage, and as in natural
    gradient descent, the algorithm tries to determine the steepest direction along
    a small step.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These are some of the important algorithms under ES. There are several other
    algorithms that control and update the variance and the mean of the population
    using different metrics. The OpenAI ES is a gradient-free black box optimizer
    variant of NES that uses Gaussian noise and then uses the log likelihood (similar
    to policy gradient). These types of gradient algorithms are called evolved policy
    gradient ES algorithms. Thus, there is much scope of development using this category
    of algorithms in addition to the traditional deep RL. We will see that these algorithms
    have been used in the Obstacle Tower Challenge by the topmost performers in the
    next section.
  prefs: []
  type: TYPE_NORMAL
- en: 'Case Study: Obstacle Tower Challenge'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The Obstacle Tower Challenge (February - August 2019) was designed to provide
    improvised benchmarks in the context of deep RL. The challenge was created to
    foster research among developers as well as scientists to outperform contemporary
    state-of-the-art (SOTA) algorithms. We will be looking at the challenge from an
    objective view-point and will also be looking at some of the most successful submissions
    of the challenge by the winners. The Obstacle Tower Challenge was created to be
    difficult to solve for the SOTA algorithms during that time. While AI generalization
    was the main aim of the challenge, the challenge is renowned for the feature of
    procedural level generation. The Obstacle Tower Challenge contains an AI agent
    whose task is to move from level 0 to level 100, and in each level, the agent
    has to complete a set of tasks in a given room. The challenge had 100 different
    procedurally generated environments, each containing a starting point and an ending
    point. Each particular room (level) consisted of puzzles, enemies, obstacles,
    and keys to unlock the next room (level). The research behind this project is
    attributed to the ML Agents team from Unity Technologies. The paper related to
    this is “Obstacle Tower: A Generalization Challenge in Vision, Control and Planning”
    by Juliani et al. The paper is published at the following link : [`https://arxiv.org/abs/1902.01378`](https://arxiv.org/abs/1902.01378).'
  prefs: []
  type: TYPE_NORMAL
- en: Figure [7-4](#Fig4) shows a view of the Obstacle Tower Challenge taken from
    the Unity Technologies Blog ([`https://blogs.unity3d.com/2019/01/28/obstacle-tower-challenge-test-the-limits-of-intelligence-systems/`](https://blogs.unity3d.com/2019/01/28/obstacle-tower-challenge-test-the-limits-of-intelligence-systems/)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_7_Chapter/502041_1_En_7_Fig4_HTML.jpg](../images/502041_1_En_7_Chapter/502041_1_En_7_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-4
  prefs: []
  type: TYPE_NORMAL
- en: Obstacle Tower Challenge in Unity ML Agents
  prefs: []
  type: TYPE_NORMAL
- en: The Details of Obstacle Tower
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The Obstacle Tower Challenge was created using Unity Engine and ML Agents and
    can be made to run in Windows, Linux, and Mac OS. It also uses the OpenAI Gym
    wrapper for easy integration with existing deep RL algorithms. It consists of
    the features mentioned here.
  prefs: []
  type: TYPE_NORMAL
- en: Episode Dynamics
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: According to the details of the paper, the most interesting aspect is the procedural
    content generation for each room or level. Each level has a set of tasks to be
    completed, which can include evading obstacles, defeating enemies, collecting
    keys for unlocking the door to the next level, as well as evading falling into
    pits and traps. Each level contains “orbs” that increase the time for the agent
    to reach upper levels. This is a variation of the exploration-exploitation strategy
    that compels the agent to decide whether to collect orbs and increase time or
    quickly complete the level. This procedural generation of the levels allows the
    agent to be trained in a task-specific curriculum learning pattern. We will be
    looking at it in the successive sections.
  prefs: []
  type: TYPE_NORMAL
- en: Observation Space
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: This consists of visual as well as nonvisual auxiliary information that is required
    by the agent to take a decision. The visual observation space consists of a 168
    X 168 RGB pixel image, which can be downscaled to 84 X 84 dimensions. The nonvisual
    space consists of a vector containing auxiliary attributes, such as the number
    of keys the agent is in possession and the time left in the episode.
  prefs: []
  type: TYPE_NORMAL
- en: Action Space
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'The action space is multi-discrete, implying that it consists of smaller discrete
    action spaces. The agent can move using the following subspaces: forward, backward,
    no-op, left, right no-op, clockwise, counterclockwise rotation of the camera,
    no-op, and jump no-op. The action space can also be flattened to a list consisting
    of 54 possible choices.'
  prefs: []
  type: TYPE_NORMAL
- en: Reward Space
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: This contains both sparse and dense rewards. Sparse rewards are credited when
    the agent completes a particular level. In this case, a value of +1 unit is credited
    as the reward. In dense configuration, the agent gets credited with +0.1 unit
    of reward for opening doors, solving puzzles, and collecting keys. One of the
    aims of this challenge is to create internal reward signals that can be used by
    different deep RL algorithms to instigate curiosity and empowerment within the
    agent.
  prefs: []
  type: TYPE_NORMAL
- en: 'Procedural Level Generation: Graph Grammar'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Procedural generation is an important aspect of designing the levels of this
    challenge. It includes lighting, texture, room layout, and floor layouts, which
    enables the agent to learn using a curriculum-based approach. This generation
    also allows the agent to perform well in new rooms by generalization.
  prefs: []
  type: TYPE_NORMAL
- en: '**Visual appearance:** This includes the five different themes of Obstacle
    Tower, which are generated procedurally using different sets of lighting, textures,
    intensity, and direction of real-time global illumination. The variants are ancient,
    moorish, industrial, modern, and future.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Floor layout:** The floor layout is generated using graph grammar. This layout
    generation consists of a mission graph and the layout grid. The mission graph
    suggests the actions that are required to be performed by the agent to reach the
    next room, such as unlocking a door with a key or solving a puzzle. The paper
    provides an in-depth overview of how the graph grammar technique is used to generate
    successive levels. The paper also uses letters and notations to provide an idea
    how each node in the grammar is related to the next node. Grammar recipes are
    involved to concatenate a sequence of grammar rules to procedurally generate a
    new mission graph. This is done by including randomness in the generation process.
    The generated mission graph is then converted to a 2D grid of rooms, which is
    the layout grid. This is done with the help of shape grammar and is used to generate
    the virtual scene.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Room layout** **:** Once the floor layout is completed, the room layout is
    generated with the help of templates. The paper uses the descriptions of the two
    templates: puzzle and key. In the former template, the agent has to push a block
    from start to end and avoid intermediate obstacles to unlock a different level.
    In the key template, the agent has to find and collect keys and avoid obstacles.
    Using a probabilistic approach, new samples of these templates are created that
    control the position of different GameObjects in a particular room. Each room
    can have dimensions of order 3 X 3,4 X 4, and 5 X 5.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This is how the Obstacle Tower environment was created, mainly by using graph
    recipes, shape grammar, and sampling of templates to procedurally generate new
    levels. The difficulty of each level also increases systematically to allow the
    agent to learn using curriculum learning. Since a number of such levels (100)
    are generated using a finite number of initial levels, there is a significant
    requirement for generalization by the agent. Figure [7-5](#Fig5) illustrates the
    different themes and their visual appearance, which is collected from the paper.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_7_Chapter/502041_1_En_7_Fig5_HTML.jpg](../images/502041_1_En_7_Chapter/502041_1_En_7_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-5
  prefs: []
  type: TYPE_NORMAL
- en: Ancient, Moorish, and industrial themes in Obstacle Tower
  prefs: []
  type: TYPE_NORMAL
- en: Generalization
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: According to the details of the paper, the Obstacle Tower contains three different
    generalization environments. These test the agent’s capability to generalize the
    new levels and also for improving or changing algorithms to produce benchmark
    performances.
  prefs: []
  type: TYPE_NORMAL
- en: '**No generalization:** This involves training the agent on a fixed version
    of the Obstacle Tower environment. In this case, five random seeds of dynamics
    of the agent were to be used as a measure of performance.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Weak generalization:** This is also referred to as within-distribution generalization,
    which requires the agent to be trained on a fixed set of 100 seeds for the environment
    configurations. Then generalization is to be tested on five randomly selected
    tower configuration seeds for five times each, with a different set of seeds that
    control the agent’s dynamics. This was the main focus of the challenge, as mentioned
    in Unity blog ([`https://blogs.unity3d.com/2019/08/07/announcing-the-obstacle-tower-challenge-winners-and-open-source-release/`](https://blogs.unity3d.com/2019/08/07/announcing-the-obstacle-tower-challenge-winners-and-open-source-release/)).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Strong generalization** **:** In addition to the weak generalization testing
    strategy, the agent would have to be tested on a diverse set of external visual
    conditions such as varying lighting, textures, and geometry. Since the testing
    environment was created with a different set of grammar rules from the training
    counterpart, it was difficult to train the agent with contemporary SOTA deep learning
    algorithms. The challenge also emphasized that stronger generalization forms a
    better strategy for agents to learn any complex environment.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Unity Team initially benchmarked the challenge and compared the results
    with humans playing the game. The team used proximal policy operation (PPO) and
    rainbow as the algorithms and discovered that the agent could reach less than
    10 levels for no generalization strategy. Rainbow outperformed PPO as a more generalized
    algorithm. For weak and strong generalizations, the maximum levels reached were
    3.4 and 0.8, respectively, with a varied rainbow algorithm. Rainbow is a variant
    of N-step dueling double deep Q-network (DQN) with prioritized experience replay
    and distributed RL. In contrast, humans were able to solve 15 levels on average,
    reaching up to 22 levels. The sharp contrast of the catastrophic learning of the
    agent with human counterparts is illustrated by Unity in their blog,as shown in
    Figure [7-6](#Fig6).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_7_Chapter/502041_1_En_7_Fig6_HTML.jpg](../images/502041_1_En_7_Chapter/502041_1_En_7_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-6
  prefs: []
  type: TYPE_NORMAL
- en: Performance of PPO, rainbow vs. human control on the Obstacle Tower Challenge
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have covered the fundamentals of the Obstacle Tower Challenge, we
    will be looking at some of the solutions that made a breakthrough by providing
    extraordinary benchmarks. We will also walk through the steps to install the Obstacle
    Tower environment, as it was open sourced after the challenge under Apache 2.0
    license.
  prefs: []
  type: TYPE_NORMAL
- en: Challenge Winners and Proposed Algorithms
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The challenge was won by Alex Nichol, whose algorithm was able to solve an average
    of 19.4 levels. The fundamental part of the winning strategy was including behavioral
    cloning algorithms initially to train the agent in a supervised manner. Nichol
    used GAIL with a fine-tuned custom PPO implementation. The PPO policy (preirarchy)
    with KL divergence was used. However, behavioral cloning began overfitting the
    solution, and Alex designed an IMPALA convolution neural network (CNN) visual
    classifier to detect different objects (doors, keys, obstacles) in the room. To
    avoid catastrophic forgetting of the agent by using recurrent neural networks
    (RNNs) as the memory, he built a stack of observations from 50 time-steps as part
    of the input. He also tried a variety of CMA-ES evolution algorithms for exploration;
    however, the visual classifier (distributed IMPALA) along with fine-tuned PPO,
    behavioral cloning, and stacked observations provided a much better output. The
    agent was able to attain an average reward of 35.86 units. The detailed description
    of the approach is provided at Alex Nichol’s blog ([`https://blog.aqnichol.com/2019/07/24/competing-in-the-obstacle-tower-challenge/`](https://blog.aqnichol.com/2019/07/24/competing-in-the-obstacle-tower-challenge/)),
    and the repository for the challenge is at ([`https://github.com/unixpickle/obs-tower2`](https://github.com/unixpickle/obs-tower2)).
  prefs: []
  type: TYPE_NORMAL
- en: The second prize was won by the computational science laboratory Compscience.org
    ([`https://www.compscience.org`](https://www.compscience.org)) at Universitat
    Pompeu Fabra. The team consisted of Gianni and Miha. They reached an average of
    16 levels and initially tried PPO with KL divergence term but later resorted to
    extensive sampling methods. Later the team used world models, which comprises
    creating compressed representation of the observation with an auto encoder (encoder-decoder
    variants using long short-term memory [LSTM]-based RNNs) and building a policy
    using ES.
  prefs: []
  type: TYPE_NORMAL
- en: The third prize was won by Songbin Choi from Seoul, whose agent reached an average
    of 13.2 floors. He used the PPO policy from the ML Agents with gated recurrent
    unit (GRU), which is an improvised version of LSTM and RNNs, for better performance.
    To reduce overfitting dropout layers were added along with adding left-right flipping
    in images for classification (data augmentation). The data augmentation is a standard
    procedure to produce samples of images with different orientations from the input
    image. He then used an experience buffer to collect the most relevant observations
    and used the entire 100 seeds as the training set.
  prefs: []
  type: TYPE_NORMAL
- en: 'Apart from the winners, there were honorable mentions of Joe Booth, Doug Meng,
    and the UEFDL team. Booth used PPO with demonstrations for training the agent
    and used a compressed network with RNN architecture for memory. More details as
    to the approach can be found at the link: [`https://towardsdatascience.com/i-placed-4th-in-my-first-ai-competition-takeaways-from-the-unity-obstacle-tower-competition-794d3e6d3310`](https://towardsdatascience.com/i-placed-4th-in-my-first-ai-competition-takeaways-from-the-unity-obstacle-tower-competition-794d3e6d3310)
    along with the repository at : [`https://github.com/Sohojoe/ppo-dash`](https://github.com/Sohojoe/ppo-dash).'
  prefs: []
  type: TYPE_NORMAL
- en: Booth was able to reach 10.8 levels with his policy. Meng used a variant of
    deepmind IMPALA with batched inference and customized replay. Having tried PPO
    and rainbow, he resorted to IMPALA due to the fact that it is less off-policy
    compared to the former ones. The UEFDL team used advantage actor critic (A2C)
    with LSTM from the stable baselines to train the agent, later using A2C with curiosity
    and PPO for better performance. Both Meng and the UEFDL team attained an average
    of 10 levels. More information on the approaches can be found at the Unity blog
    ([`https://blogs.unity3d.com/2019/08/07/announcing-the-obstacle-tower-challenge-winners-and-open-source-release/`](https://blogs.unity3d.com/2019/08/07/announcing-the-obstacle-tower-challenge-winners-and-open-source-release/)).
  prefs: []
  type: TYPE_NORMAL
- en: Installation and Resources
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The Obstacle Tower source has been open sourced since the completion of the
    challenge at github: [`https://github.com/Unity-Technologies/obstacle-tower-source`](https://github.com/Unity-Technologies/obstacle-tower-source).'
  prefs: []
  type: TYPE_NORMAL
- en: 'In order to use the repository, it is required to install Unity version 2019.4
    (from Unity Hub) along with ML Agents Release 4 (the latest release as per documentation).
    This Release can be found at the link: [`https://github.com/Unity-Technologies/ml-agents/tree/release_4`](https://github.com/Unity-Technologies/ml-agents/tree/release_4).'
  prefs: []
  type: TYPE_NORMAL
- en: The repository can be downloaded in zip format or by using the command line
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: Once the installation is complete, we can open this in the Unity Editor. We
    have to load the Procedural scene from the Assets/ObstacleTower/Scenes folder.
    We can then click Play in the Editor to interact using human controls. There are
    certain important aspects in the repository that controls the procedural generation
    of the levels.
  prefs: []
  type: TYPE_NORMAL
- en: When the environment is launched or reset, the definitions for the floor and
    room layouts are generated in advance using the FloorBuilder script located inside
    the Assets/ObstacleTower/Scripts/FloorLogic folder. Internally a list of FloorLayout
    objects, each filled with a 2D grid of RoomDefinition objects and other meta-data,
    are generated. The FloorGenerator and RoomGenerator scripts are responsible for
    generating the FloorLayout and RoomDefinition, respectively, with help of graph
    recipes and shape grammar.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When the agent starts at a given floor, the FloorLayout is used to generate
    the specific floor (scene) on run-time. FloorBuilder and RoomBuilder scripts are
    used for instantiating the GameObjects inside the scene, with the help of definitions
    provided.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For modifying and playing with the five different visual themes, we have to
    navigate to the Assets/ObstacleTower/Resources/Prefabs, where the prefabs of each
    theme are located. The animations, meshes, and textures are located in the Assets/WorldBuilding
    folder. The five themes are illustrated in the Figure [7-7](#Fig7).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_7_Chapter/502041_1_En_7_Fig7_HTML.jpg](../images/502041_1_En_7_Chapter/502041_1_En_7_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-7
  prefs: []
  type: TYPE_NORMAL
- en: The five visual themes of the Obstacle Tower Challenge
  prefs: []
  type: TYPE_NORMAL
- en: Resources For Procedural Level Generation
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'As we learned from the paper, the floor for each room is generated using a
    set of rules using graph grammar. The FloorGeneration is used for producing FloorLayout,
    which returns a 2D array of RoomDefinitions. The nine different types of rooms
    are:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Normal:** normal room without any special properties'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Lock:** a room with “KeyLock” door that requires a key to open'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Key:** a room containing a “Key” item'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Lever:** a room with a “LeverLock” trap door'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Puzzle:** a room with at least one “PuzzleLock” door requiring a puzzle to
    be solved to open'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Start:** a room containing a “Start” door'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**End:** a room containing “End” door'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Basement:** a room containing both a “Start” and “End” door (only for floor
    0)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Connection:** a room containing one-way doors'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The steps for creating a new room type based on “input.txt” and “output.txt”
    files with graph grammar is explained at the documentation link [`https://github.com/Unity-Technologies/obstacle-tower-source/blob/master/Assets/ObstacleTower/Resources/FloorGeneration/AddRoomType.md`](https://github.com/Unity-Technologies/obstacle-tower-source/blob/master/Assets/ObstacleTower/Resources/FloorGeneration/AddRoomType.md).
  prefs: []
  type: TYPE_NORMAL
- en: 'According to this documentation, for creating a new type of room, we first
    modify the NodeType.cs script to include a new node. Then we have to modify the
    EnvironmentParameters.cs script to add the new room type. The documentation uses
    a new room type named “Hazard,” and the EnvironmentParameters.cs script is updated
    as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: The TemplateRoomGenerator script is used for modifying the templates for generation
    of the room. The following changes are to be made as pointed out by the documentation.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: Then we have to create our own recipe to modify FloorGenerator.cs script
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: After this we have to open the Procedural scene in Unity and select the ObstacleTower-v3.0
    GameObject in the hierarchy. We then navigate to the ObstacleTower Academy component
    and change the row in the Reset Parameters named “allowed-rooms” to the ordinal
    value of the enum. In this case, we set the value of 3 for “Hazard” room type.
    This is represented in Figure [7-8](#Fig8) from the Github page.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_7_Chapter/502041_1_En_7_Fig8_HTML.jpg](../images/502041_1_En_7_Chapter/502041_1_En_7_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-8
  prefs: []
  type: TYPE_NORMAL
- en: Adding a room type to the Obstacle Tower environment
  prefs: []
  type: TYPE_NORMAL
- en: 'Along with different rooms, there are different doors that are present in the
    scene, which includes:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Open:** tagent can move freely'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**KeyLock:** requires a Key to be opened'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**LeverLock:** the doors that trap the agent from behind them once the agent
    passes through'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**PuzzleLock:** the doors that are unlocked after the agent solves a puzzle'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Start:** the doors where the agent is spawned at the start of the game'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Exit:** the doors that take the agent to the next floor'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**OneWay:** these doors freely open from only one direction'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The Github documentation at [`https://github.com/Unity-Technologies/obstacle-tower-source/blob/master/extending.md`](https://github.com/Unity-Technologies/obstacle-tower-source/blob/master/extending.md)
    provides an overview how to programmatically add a new room. The example provided
    here shows how to add a Basement type of room:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: So we have observed how to add a new room configuration using textual node declarations
    and updating the EnvironmentParameters script as well as programmatically.
  prefs: []
  type: TYPE_NORMAL
- en: Resource for Generating Room Layout
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: For generating a new layout for the room, we have to specify a template as mentioned
    in the previous sections. We also understood that templates are created by using
    the text-based input and output files. Each RoomDefinition contains two 2D arrays—one
    that defines the module placement in the room and another that defines the item
    position in the room. The templates are located in the Assets/ObstacleTower/Resources/Templates
    folder. In order to access a three-level difficulty in a 5 X 5 puzzle room, we
    have to navigate to Assets/ObstacleTower/Resources/Templates/5/3/puzzles. Each
    template file (textual) contains a grid of characters that control the position
    of different items in the room. The first item specifies the modules, and the
    second specifies the items. The uppercase letters refer to specific values, while
    the lowercase letters signify probabilistic values. The templates are interpreted
    in the TemplateRoomGenerator script that contains a set of rules how each character
    is to be interpreted for generating the room layout. A simple example of a 3 X
    3 room with a key is as follows.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: G refers to PlatformLarge prefab module, o refers to a 50% chance of placing
    an orb, and X refers to no item. A typical illustration of interpreting this template
    in the Moorish theme is provided (from Github documentation) in Figure [7-9](#Fig9).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_7_Chapter/502041_1_En_7_Fig9_HTML.jpg](../images/502041_1_En_7_Chapter/502041_1_En_7_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-9
  prefs: []
  type: TYPE_NORMAL
- en: Room layout generation after template interpretation
  prefs: []
  type: TYPE_NORMAL
- en: The Github documentation also contains the different types of prefab modules
    and items available in the repository. Now that we have an idea of the procedural
    content generation in Obstacle Tower, we can create a simple Python script to
    run pre-existing algorithms (PPO, soft actor critic [SAC]) on it.
  prefs: []
  type: TYPE_NORMAL
- en: Interacting with Gym Wrapper
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We will now use the obstacle-tower-env repository from [`https://github.com/Unity-Technologies/obstacle-tower-env`](https://github.com/Unity-Technologies/obstacle-tower-env)
    to create an interaction with the OpenAI Gym wrapper. With the pre-existing settings
    of the Obstacle Tower Challenge, we will create an interface between the Gym and
    the environment through the Python API, which we studied in Chapter [5](502041_1_En_5_Chapter.xhtml).
    We have to first install the Gym interface in our local machine or virtual machine
    through Command or Anaconda prompt by cloning the repository and running the installation
    with the help of the “pip install –e.” command. We followed the same method for
    installing ML Agents in Chapter [3](502041_1_En_3_Chapter.xhtml).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: Once we have installed the required components, we can start interacting with
    the Gym environment for the Obstacle Tower environment. An introductory notebook
    for this interaction is provided by Unity at [`https://github.com/Unity-Technologies/obstacle-tower-env/blob/master/examples/basic_usage.ipynb`](https://github.com/Unity-Technologies/obstacle-tower-env/blob/master/examples/basic_usage.ipynb),
    and this is also present in the Getting Started-Obstacle Tower Challenge.ipynb
    Notebook for reference. We first import the obstacle-tower-env in our Notebook
    along with matplotlib for plotting.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: We then start to analyze the environment in non-retro mode. We will be looking
    at the observation space and action space of the environment, which we discussed
    in detail in the previous sections. Since the Obstacle Tower environment can be
    used with the Gym wrapper, we will be using the methods “env.action_space,” ”env.reset,”
    ”env.close,” and other Gym methods that we have used throughout this book.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: The next step is to interact with the environment and also observe the rewards
    associated. The “env.step” method is used in this case to provide an overview
    of the observations and rewards for each episode.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: In the next step, we set the environment parameters. We set the seed value for
    controlling the rooms and floor, and according to the paper, in weak generalization
    strategy we can choose any valid seed in 0 to 100 range. We also select a floor
    for analysis. The config controls the agent’s perspective, and in this case we
    set it to first-person mode. We then have the “env.reset” method from Gym, which
    resets the current parameters.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: We can also use the retro mode for this. For launching the retro mode, we have
    to set the Boolean variable “retro” to True.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
- en: Now, if we would like to extend the Gym Baseline algorithms for initial training
    of the Obstacle Tower agent, then we have to follow the steps provided in Chapter
    [5](502041_1_En_5_Chapter.xhtml), where we mentioned the steps to use Gym wrapper
    and the Python API for training an agent using the Baselines. Among the submissions
    that we went through, we observed that PPO remains the default go-to algorithm
    for training the agent. The winners have used modified versions of PPO (with variant
    -1 using KL divergence), along with a set of other algorithms related to behavioral
    cloning, CNNs for image classification, and LSTM/GRU/RNNs for memory. The simplicity
    and robustness of PPO makes it very easy to use, and along with memory-based networks
    like GRU and LSTM, the performance greatly increases. There are certain reset
    parameters that can be used in the “env.reset” method and are provided by the
    Github documentation at the link [`https://github.com/Unity-Technologies/obstacle-tower-env/blob/master/reset-parameters.md`](https://github.com/Unity-Technologies/obstacle-tower-env/blob/master/reset-parameters.md).
    Additionally, Unity has provided an example implementation of the Obstacle Tower
    environment with predefined seeds and evaluated on a random policy. This is provided
    at the link [`https://github.com/Unity-Technologies/obstacle-tower-env/blob/master/examples/evaluation.py`](https://github.com/Unity-Technologies/obstacle-tower-env/blob/master/examples/evaluation.py)
    and is also present in the Obstacle_Tower_Predefined_Seeds-Unity.ipynb Notebook.
  prefs: []
  type: TYPE_NORMAL
- en: That completes this case study, and as we have learned, there is a huge scope
    of research and development. The Obstacle Tower provides a challenging environment
    for traditional deep RL algorithms to solve. With more research and advancements
    in the fields of RL, especially in the area of meta learning, improvised algorithms
    may allow the agent to complete more levels.
  prefs: []
  type: TYPE_NORMAL
- en: 'Case Study: Unity ML Agents Challenge I'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This was a challenge organized by the ML Agents team of Unity before the Obstacle
    Tower Challenge around December 2017\. The scope was to redefine the possibilities
    of Unity ML Agents to train agents to perform different tasks. The details of
    the challenge can be found at the Unity Connect website ([`https://connect.unity.com/discover/challenges/ml-agents-1`](https://connect.unity.com/discover/challenges/ml-agents-1)).
  prefs: []
  type: TYPE_NORMAL
- en: We will be looking briefly at the top three submissions, while interested readers
    can go through the entire blog for more details. The first position was attained
    by Christine Barron, with the submission of “Pancake Bot.” The aim of the project
    was to train a robotic arm to make pancakes—that is, to make the arm toss the
    pancake on the plate. The creator used curriculum learning for training and included
    three rigidbody limbs with configurable joints. All components were under the
    influence of gravity and torque. The initial reward signal was created to help
    the agent (Bot) to keep the pancake on its arm for a longer time period. The revised
    reward signal included the distance of the pancake from the center of the pan
    (robotic arm), and if the pancake hit the ground, the episode was terminated.
    To reduce the noise, kinematics and rotational motion were applied at the joints.
    On reaching a score of more than 60, the episode is terminated and the target
    is again placed at a random location. Curriculum learning helped to generalize
    the learning of the arm. Based on curriculum learning, the arm (agent) can move
    from 0.4 units to 0.8 and 1.2 units successively (along x and z axes). “Pass The
    Butter” is another bot that was designed with ray sensors to move the “butter”
    to a target destination. It uses nine raycasts originating from the “camera” on
    its head and returns 1 if it hits an obstacle. The reward signals included a +2
    units of reward for successful completion of the task and -2 units if the bot
    hit the floor. The bot is credited with a small reward of +0.075 unit depending
    on its nearness to the destination, and for every frame a penalty of -0.05 is
    provided. If the bot hits an obstacle, it gets credited with -0.15 unit of reward.
    Figure [7-10](#Fig10) shows a preview from the blog. More details of these robots
    can be found at the link [`https://connect.unity.com/p/pancake-bot?_ga=2.240054851.151262200.1598121566-630897211.1596987781`](https://connect.unity.com/p/pancake-bot%253F_ga%253D2.240054851.151262200.1598121566-630897211.1596987781).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_7_Chapter/502041_1_En_7_Fig10_HTML.jpg](../images/502041_1_En_7_Chapter/502041_1_En_7_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-10
  prefs: []
  type: TYPE_NORMAL
- en: Pancake bot by Christine Barron in ML Agents Challenge
  prefs: []
  type: TYPE_NORMAL
- en: 'The second position was attained by Chau Chi Thien with the project “Metal
    Warfare.” This is a real-time strategy (RTS) game where the creator wanted to
    leverage Unity ML Agents to create AI agents for firing and shooting missiles,
    as shown in Figure [7-11](#Fig11). Certain details that are mentioned is that
    ML Agents was used to credit the agent that fired the missile. Based on whether
    the missile hit the target or not, a positive or negative reward was credited.
    The creator assigned several reward signals based on whether the missile hit the
    enemy building or target, crediting a +1 unit of reward for each successful operation.
    The states array consists of five parts: action ID, rewards for previous actions
    (delayed rewards), is idle or not, available actions, and the learning states.
    More details on this RTS game, created with ML Agents, can be found at the link
    [`https://connect.unity.com/p/metal-warfare-real-time-strategy-game-special-edition-for-ai-ml-challenging?_ga=2.96402396.151262200.1598121566-630897211.1596987781`](https://connect.unity.com/p/metal-warfare-real-time-strategy-game-special-edition-for-ai-ml-challenging%253F_ga%253D2.96402396.151262200.1598121566-630897211.1596987781).'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_7_Chapter/502041_1_En_7_Fig11_HTML.jpg](../images/502041_1_En_7_Chapter/502041_1_En_7_Fig11_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-11
  prefs: []
  type: TYPE_NORMAL
- en: Metal Warfare by Chau Chi Thien in ML Agents Challenge
  prefs: []
  type: TYPE_NORMAL
- en: 'The third position was attained by David Busch in his submission of Hide/Escape:
    Avoidance of Pursuing Enemies. The aim behind this project was to create an intelligent
    AI to hide from a patrolling agent. After creating the reward signals, the creator
    tuned the hyperparameters to analyze the effect of different parameters on the
    agent’s training. To avoid the gameplay from continuing indefinitely, the creator
    assigned a “win-zone” that the escaping agent has to reach in order to win. This,
    combined with extensive hyperparameter optimization and curriculum learning, gave
    rise to an intelligent AI agent that was capable of hiding and escaping from a
    patrolling agent, as shown in Figure [7-12](#Fig12). The details of this project
    can be found at the link [`https://connect.unity.com/p/hide-escape-avoidance-of-pursuing-enemies?_ga=2.61152876.151262200.1598121566-630897211.1596987781`](https://connect.unity.com/p/hide-escape-avoidance-of-pursuing-enemies%253F_ga%253D2.61152876.151262200.1598121566-630897211.1596987781).'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_7_Chapter/502041_1_En_7_Fig12_HTML.jpg](../images/502041_1_En_7_Chapter/502041_1_En_7_Fig12_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-12
  prefs: []
  type: TYPE_NORMAL
- en: Hide escape by David Busch in ML Agents challenge
  prefs: []
  type: TYPE_NORMAL
- en: Along with these, there are several other submissions that are mentioned in
    the blog. All these were designed using an earlier version of the ML Agents, and
    it paved the way for the Obstacle Tower Challenge that we learned about.
  prefs: []
  type: TYPE_NORMAL
- en: At this stage, we have covered almost all of the topics relevant in the context
    of ML Agents that would enable the reader a clear view of the capabilities of
    this toolkit. We will look briefly into another deep RL platform—namely, the Google
    Dopamine, as it can be integrated with the ML Agents as well.
  prefs: []
  type: TYPE_NORMAL
- en: Google Dopamine and ML Agents
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We have learned and used the Gym environment extensively throughout the course
    of the book. Now we will look into the integration of Google Dopamine with ML
    Agents. Dopamine is an open source framework for research in deep RL by Google
    and can be accessed at the Github link ([`https://github.com/google/dopamine`](https://github.com/google/dopamine)).
    Dopamine has its own implementations of DQN, rainbow, C51 variations of Rainbow,
    along with others. Using the Gym wrapper, we can run the ML Agents using Dopamine,
    and for this we have to first clone the Dopamine repository.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE25]'
  prefs: []
  type: TYPE_PRE
- en: 'Dopamine recommends using a virtual environment for training agents. The following
    commands are required to activate a virtual environment:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE26]'
  prefs: []
  type: TYPE_PRE
- en: Then we have to set up the environment and finally install the dependencies
    of Dopamine.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE27]'
  prefs: []
  type: TYPE_PRE
- en: 'Then we can test to verify whether the installation was successful by using
    the following command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE28]'
  prefs: []
  type: TYPE_PRE
- en: 'We have to copy the contents of atari folder to a new folder (e.g., unity).In
    the next step, we have to open the dopamine/Atari/run_experiment.py and add the
    following lines to import ML Agents dependencies as mentioned here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE29]'
  prefs: []
  type: TYPE_PRE
- en: 'Then we navigate to the “create_atari_environment” method in the same file,
    and then we have to instantiate a Unity environment by using the following code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE30]'
  prefs: []
  type: TYPE_PRE
- en: 'We use the GridWorld environment for this. Dopamine has only Atari-specific
    calls, and that is why we have to modify it to use our Unity ML Agents. Since
    Dopamine provides algorithmic variations of DQN using experienced replay it is
    compatible with discrete action spaces (Gym). For branched discrete action spaces,
    we have to enable the “flatten_branched” parameter in the “UnityToGymWrapper,”
    which treats each combination of branched actions as separate actions. For visual
    observations, Dopamine does not automatically adapt to multiple channels, and
    that is why it is recommended to provide grayscale images as input with dimensions
    of 84 X 84\. Since Dopamine caters to Atari environments, we have to modify the
    hyperparameters as well. The dopamine/agents/rainbow/config/rainbow.gin file is
    known to work well with GridWorld. The following hyperparameters are taken from
    the official Github documentation:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE31]'
  prefs: []
  type: TYPE_PRE
- en: 'We can run the Dopamine variant of the GridWorld agent by running the following
    command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE32]'
  prefs: []
  type: TYPE_PRE
- en: In this context it is recommended to copy the contents of the atari to a new
    folder with any name (e.g., unity).Then we have to replace ”unity” in the “import
    dopamine.unity.run_experiment” code with the folder where we have copied the run_experiment.py
    and trainer.py files.
  prefs: []
  type: TYPE_NORMAL
- en: This completes the introduction to Google Dopamine integration with ML Agents
    using Gym wrapper. This also concludes the major topics in the book.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We come to the last section of this chapter and also the book. We will summarize
    the topics that we learned in this chapter.
  prefs: []
  type: TYPE_NORMAL
- en: We learned about evolutionary algorithms and learned its relation with genetic
    theory of organisms as well as with Darwin’s theory of evolution.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We analyzed two variants of evolutionary algorithms—namely, the genetic algorithm
    and the broad class of ES. In the genetic algorithm, we created an evolution network
    to match a phrase by genetic process of crossing over and mutation.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the scope of ES, we learned about the difference between the genetic algorithm
    and ES, where the latter uses real numbers in place of binary values to optimize
    a function. We then created a simple Gaussian ES to find the maximum value of
    a harmonic oscillator within a specified range.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We extended our learning of ES algorithms to CMA –ES and NES algorithms. In
    CMA-ES we saw the importance of Gaussian distribution on covariance matrices for
    updating the mean and standard deviation of the offspring population. In NES,
    we saw the relation between natural gradient descent and evolution sampling strategy
    to come up with an evolved policy gradient form for training the agent.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the next section, we had a descriptive overview of the Obstacle Tower Challenge.
    In this case study, we had a thorough understanding of the provided challenge,
    the requirements as well as the complex environment.The challenge was created
    to build a generalization (weak/strong) characteristics in agents and also to
    improve the benchmarks of model performance. We also looked into how procedural
    content generation with graph grammar was extensively used to design the floor
    layout and room layout.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We then discussed the strategies and algorithms that were adopted by the winners
    of the competition. We saw that PPO remained as the go-to algorithm in the context
    of traditional deep RL and also saw hybrid combinations of behavioral cloning/GAIL
    along with ES and world models emerge as the major strategies adopted by the winners.
    LSTM/GRU with PPO remained as the core form of approach in most submissions.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The aim of the Obstacle Tower was to foster research and to improve benchmarks.
    In the next section, we saw the steps to download the open source repository,
    which contained the codes for making new room layouts and floors. We also saw
    the generalization of graph grammars as the main strategy to generate complex
    levels.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We saw the steps to create a script that would make the Obstacle Tower environment
    interact with the Gym wrapper and also observe the different Gym parameters associated
    with it.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We then analyzed another case study—ML Agents Challenge I, which was created
    with an older version of ML Agents. We went through the top three submissions
    and their projects, which involved robotic arms, RTS games, and escaping AI agents.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the last section, we covered the steps to integrate ML Agents with Google
    Dopamine. Google Dopamine is a research framework for deep RL using variants of
    DQN algorithms (rainbow). At this stage, we can integrate with the most popular
    deep RL platforms, which includes Gym (OpenAI) and Dopamine (Google).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We come to the end of the book. The importance of deep RL in creating autonomous
    AI agents is immense. As we have seen from robotic simulation, to enemy AI, path
    finding to autonomous driverless agents—the possibilities are endless. We have
    covered most of the traditional deep RL algorithms along with some evolutionary
    algorithms and saw them in action using ML Agents. The ML Agents repository is
    under constant research and development, and it is a fantastic tool. Irrespective
    of profession, this tool can not only be used for automating games but also to
    create intelligent AI agents and complex environments as well as for extensive
    research. The ease of compatibility with OpenAI Gym wrapper makes it even more
    robust and simple to train AI agents with any algorithms. Through this book, we
    hope to create an enthusiasm among readers as to the endless possibilities attainable
    with this toolkit.
  prefs: []
  type: TYPE_NORMAL
