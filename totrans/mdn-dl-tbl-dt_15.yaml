- en: 12. Neural Network Interpretability
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: I have always thought the actions of men the best interpreters of their thoughts.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: —John Locke, Political Theorist
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Neural networks are powerful tools that can be used to solve a host of difficult
    tabular data modeling challenges. However, they’re also less obviously interpretable
    than other alternatives to modeling tabular data, like Linear Regression or decision
    trees – from which the model’s processing of the data can be more or less directly
    read off of the learned parameters. The same is not true for neural network architectures,
    which are significantly more complex and therefore more difficult to interpret.
    At the same time, it is important to interpret any model used in production to
    verify that it is not using cheap tricks or other exploitative measures, which
    can lead to poor behavior in production.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we will briefly explore three techniques for interpreting
    neural networks: SHAP, LIME, and Activation Maximization. The first two techniques
    are *model agnostic*, meaning that they can be used to explain the decisions of
    any model, not just neural networks. The last – Activation Maximization – can
    only be used on neural networks. A well-informed interpretability analysis considers
    multiple different techniques.'
  prefs: []
  type: TYPE_NORMAL
- en: SHAP
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: SHAP, which stands for SHapley Additive exPlanations,^([1](#Fn1)) is a popular
    framework for model explainability. The framework is based on the game theory
    concept of a Shapley value, which quantifies how much each player contributes
    to the overall value in a collaborative game.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, let’s say you’re trying to analyze players in a three-person basketball
    team (perhaps for some 3-on-3 ball). The overall reward of the three-person team
    is trivial to obtain – it’s simply the difference between the team’s score and
    the other team’s score, or how many more balls they scored in the hoop than the
    other team. However, the contribution of individual players is less simple to
    quantify. We could calculate the individual contribution of each player simply
    by how many balls they scored, but this obscures the role of a defensive player
    that blocks the other team from making shots. Alternatively, perhaps player B
    performs well only when player C is present, or player A and player C have a complementary
    performance relationship (only one of them can perform well; the other performs
    poorly). Ultimately, there is no easy way to estimate each individual player’s
    contributions from just looking at the raw game data itself because of the complex
    interdependencies that often manifest in real-world collaborative games (Figure
    [12-1](#Fig1)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_12_Chapter/525591_1_En_12_Fig1_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration of individual contributions of players A, B, and C, that adds
    to the overall team reward.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 12-1
  prefs: []
  type: TYPE_NORMAL
- en: A game schematic with individual players each contributing an unknown individual
    contribution to a known overall team reward
  prefs: []
  type: TYPE_NORMAL
- en: 'The key idea of a Shapley value is that we must consider each possible combination
    of players in order to determine how important any one individual player is. In
    the case of three players, there are seven combinations:'
  prefs: []
  type: TYPE_NORMAL
- en: One player
  prefs:
