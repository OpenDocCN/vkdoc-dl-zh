- en: (The mathematically inclined reader will notice that the number of nonempty
    subsets in a set with *n* elements is 2^(*n*) − 1.)
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: （数学倾向的读者会注意到，一个包含*n*个元素的集合的非空子集的数量是2^(*n*) - 1。）
- en: Then, we evaluate the performance of each of these teams. We have player A play
    against the other team and evaluate its performance and then player B, followed
    by player C, followed by a two-person team consisting of players A and B, and
    so on. At the end, we have collected a significant amount of data on the rewards
    obtained by different subsets of players.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们评估每个团队的性能。我们让玩家A与其他团队比赛并评估其表现，然后是玩家B，接着是玩家C，然后是包括玩家A和B的两名玩家的团队，依此类推。最后，我们收集了大量关于不同玩家子集获得奖励的数据。
- en: 'The important attribute of this dataset is that we can compare the difference
    obtained in reward when some player is or is not present across several different
    contexts. For instance, if we want to evaluate the individual contribution or
    importance of player A, we can aggregate the increase in overall team reward in
    the following contexts:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 这个数据集的重要属性是我们可以在几个不同的环境中比较当某些玩家存在或不存在时获得的奖励差异。例如，如果我们想评估玩家A的个人贡献或重要性，我们可以在以下环境中汇总整体团队奖励的增加：
- en: Between the set {Player B} and the set {Players A, B}
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在集合{玩家 B}和集合{玩家 A, B}之间
- en: Between the set {Player C} and the set {Players A, C}
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在集合{玩家 C}和集合{玩家 A, C}之间
- en: Between the set {Players B, C} and the set {Players A, B, C}
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在集合{玩家 B, C}和集合{玩家 A, B, C}之间
- en: These constitute the *marginal contributions* of player A to the game. Each
    of these marginal contributions is then weighted by relevance to the overall problem
    and summed to form a Shapley value for player A. We can repeat the same with other
    players to obtain Shapley values for the other players.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 这些构成了玩家A对游戏的*边际贡献*。然后，我们将这些边际贡献按照对整体问题的相关性进行加权，并求和形成玩家A的Shapley值。我们可以对其他玩家重复同样的操作，以获得其他玩家的Shapley值。
- en: In machine learning, the features are the players, and the game reward is the
    score of the model! We want to understand which features influence the performance
    of the model in accurately modeling the dataset by shuffling out combinations
    of features and measuring the marginal contribution of each feature. Note that
    this means computing SHAP values can be expensive, since in their pure form 2^(*n*) − 1
    models need to be trained, where *n* is the number of features. Luckily, the `shap`
    python library has tricks to improve the efficiency of computing the relevance
    of a feature.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 在机器学习中，特征是玩家，游戏奖励是模型的得分！我们希望通过随机组合特征并测量每个特征的边际贡献来理解哪些特征影响了模型在准确建模数据集时的性能。请注意，这意味着计算SHAP值可能很昂贵，因为在其纯形式下，需要训练2^(*n*)
    - 1个模型，其中*n*是特征的数量。幸运的是，`shap` Python库有一些技巧可以提高计算特征相关性的效率。
- en: We can begin by importing `shap` and initializing the JavaScript back end required
    for visualization with `shap.initjs()`; this is required to produce many of the
    visualizations (these rely upon JavaScript inside the Jupyter Notebook). `shap`
    can be installed with `pip install shap` (Listing [12-1](#PC1)).
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过导入`shap`并使用`shap.initjs()`初始化用于可视化的JavaScript后端来开始；这是生成许多可视化所必需的（这些依赖于Jupyter
    Notebook内部的JavaScript）。可以使用`pip install shap`安装`shap`（[代码清单12-1](#PC1)）。
- en: '[PRE0]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: For demonstration, we’ll load the Adult Census dataset directly from SHAP, which
    is a preprocessed quasi-dummy dataset containing demographic information (which
    is usually ripe for interesting interpretability analysis) (Listing [12-2](#PC2)).
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 为了演示，我们将直接从SHAP加载成人人口普查数据集，这是一个包含人口信息（通常非常适合有趣的解释性分析）的预处理准虚拟数据集（[代码清单12-2](#PC2)）。
- en: '[PRE1]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: We’ll use AutoKeras to quickly find a decent model on this dataset and export
    the Keras neural network to a variable appropriately named `model` (Listing [12-3](#PC3)).
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用AutoKeras快速在这个数据集上找到一个不错的模型，并将Keras神经网络导出到一个名为`model`的变量中（[代码清单12-3](#PC3)）。
- en: '[PRE2]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'In order to generate feature relevance values, we will use `shap.KernelExplainer`.
    This is the most standard model-agnostic object in `shap`. It accepts two mandatory
    arguments: a function returning the model predictions given some input and a set
    of data to evaluate the model’s performance on. In Listing [12-4](#PC4), we initialize
    the kernel explainer on the first 100 rows of the dataset.'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 为了生成特征相关性值，我们将使用`shap.KernelExplainer`。这是`shap`中最标准的模型无关对象。它接受两个强制参数：一个返回给定输入的模型预测的函数，以及一组数据来评估模型在数据上的性能。在[代码清单12-4](#PC4)中，我们在数据集的前100行上初始化了核解释器。
- en: '[PRE3]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Once the SHAP kernel explainer object has been initialized, we can use it to
    explain how a model arrives at a prediction for a single sample. Listing [12-5](#PC5)
    demonstrates a *force plot* visualization (shown in Figure [12-2](#Fig2)), in
    which various features are shown as vectors demonstrating the direction and magnitude
    effect on the target (Listing [12-5](#PC5), Figure [12-2](#Fig2)).
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦初始化了SHAP核解释器对象，我们就可以用它来解释模型是如何对一个单个样本做出预测的。[代码清单12-5](#PC5)演示了*力图*可视化（如图[12-2](#Fig2)所示），其中各种特征被显示为向量，展示了它们对目标的影响方向和大小（[代码清单12-5](#PC5)，图[12-2](#Fig2)）。
- en: '![](../images/525591_1_En_12_Chapter/525591_1_En_12_Fig2_HTML.jpg)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_12_Chapter/525591_1_En_12_Fig2_HTML.jpg)'
- en: An illustration of base line is numbered from lower to higher, with decimal
    values, and a f x value highlighted as 0.99\. Below the baseline, values are displayed
    for relationships, marital status, occupation, and capital gain.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 基准线的插图从低到高编号，带有小数值，f(x)的值被突出显示为0.99。在基准线以下，显示关系、婚姻状况、职业和资本收益的值。
- en: Figure 12-2
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 图12-2
- en: A force plot generated with the sample at `i = 100`
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 使用样本在`i = 100`处生成的力图
- en: '[PRE4]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: By changing the index i of the selected sample to explain, we can obtain force
    plots to explain how the model approaches other samples. The force plot shows
    us how different features are weighted and in which direction they act. Figure
    [12-3](#Fig3) demonstrates an example in which the model output is a probability
    very close to 0\. In this case, there are no factors acting in the positive direction.
    Figure [12-4](#Fig4) demonstrates a case in which features have values that act
    both positively and negatively on the target output.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 通过改变要解释的样本选择的索引i，我们可以获得力图来解释模型是如何接近其他样本的。力图显示了不同特征是如何加权和朝哪个方向起作用的。图[12-3](#Fig3)演示了一个模型输出概率非常接近0的例子。在这种情况下，没有因素在正方向起作用。图[12-4](#Fig4)演示了一个特征值对目标输出既有正面又有负面影响的例子。
- en: '![](../images/525591_1_En_12_Chapter/525591_1_En_12_Fig4_HTML.jpg)'
  id: totrans-83
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_12_Chapter/525591_1_En_12_Fig4_HTML.jpg)'
- en: An illustration of base line is numbered from lower to higher, with decimal
    values. A f of x value is highlighted as 0.34\. Below the baseline, values are
    displayed for age, relationship, marital status, occupation, and capital gain.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 基准线的插图从低到高编号，带有小数值。f(x)的值被突出显示为0.34。在基准线以下，显示年龄、关系、婚姻状况、职业和资本收益的值。
- en: Figure 12-4
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 图12-4
- en: A force plot generated with the sample at `i = 102`
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 使用样本在`i = 102`处生成的力图
- en: '![](../images/525591_1_En_12_Chapter/525591_1_En_12_Fig3_HTML.jpg)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_12_Chapter/525591_1_En_12_Fig3_HTML.jpg)'
- en: An illustration of base line is numbered from lower to higher, with decimal
    values. A f of x value is highlighted as 0.01\. Below the baseline, values are
    displayed for occupation, capital gain, relationship, marital status, and education.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 基准线的插图从低到高编号，带有小数值。f(x) 的值被突出显示为 0.01。在基准线以下，显示职业、资本收益、关系、婚姻状况和教育等信息。
- en: Figure 12-3
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12-3
- en: A force plot generated with the sample at `i = 101`
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 使用样本 `i = 101` 生成的力图
- en: Moreover, SHAP allows you to view multiple force plots for several samples altogether
    in one convenient interactive visualization. Listing [12-6](#PC6) demonstrates
    the code to produce multiple force plots (Figure [12-5](#Fig5)).
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，SHAP 允许你在一个方便的交互式可视化中一起查看多个样本的多个力图。列表 [12-6](#PC6) 展示了生成多个力图的代码（图 [12-5](#Fig5)）。
- en: '![](../images/525591_1_En_12_Chapter/525591_1_En_12_Fig5_HTML.jpg)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_12_Chapter/525591_1_En_12_Fig5_HTML.jpg)'
- en: An area graph illustrates a sample order by similarity. 2 shaded samples are
    displayed in a fluctuating trend.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 按相似度排序的样本区域图。显示两个阴影样本以波动趋势。
- en: Figure 12-5
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12-5
- en: An aggregated force plot visualization
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 聚合力图可视化
- en: '[PRE5]'
  id: totrans-96
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'This is an interactive application: you can view the force plot and responsible
    features for a particular sample by hovering over a horizontal rule (Figure [12-6](#Fig6)).'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个交互式应用程序：你可以通过悬停在一条水平线上来查看特定样本的力图和负责的特征（图 [12-6](#Fig6)）。
- en: '![](../images/525591_1_En_12_Chapter/525591_1_En_12_Fig6_HTML.jpg)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_12_Chapter/525591_1_En_12_Fig6_HTML.jpg)'
- en: An area graph of a sample order by similarity. 2 numbers highlighted on x y
    axis are 51 and 0.1394\. 2 shaded samples are displayed in a fluctuating trend.
    Values for relationship, marital status, and education number are displayed.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 按相似度排序的样本区域图。x 轴和 y 轴上突出显示的两个数字是 51 和 0.1394。两个阴影样本以波动趋势显示。显示关系、婚姻状况和教育编号的值。
- en: Figure 12-6
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12-6
- en: Since SHAP produces JS visualization embedded in the notebook, you can hover
    over and see the most significant impacting factors for each sample
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 SHAP 在笔记本中生成嵌入的 JS 可视化，你可以悬停并查看每个样本的最显著影响因素
- en: Another clean visualization is to plot out the SHAP values for each column across
    multiple different samples. This allows us to understand the distribution of effects
    each feature has on the predicted output (Listing [12-7](#PC7), Figure [12-7](#Fig7)).
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种清晰的可视化是将多个不同样本的每一列的 SHAP 值绘制出来。这使我们能够理解每个特征对预测输出的影响分布（列表 [12-7](#PC7)，图 [12-7](#Fig7)）。
- en: '![](../images/525591_1_En_12_Chapter/525591_1_En_12_Fig7_HTML.jpg)'
  id: totrans-103
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_12_Chapter/525591_1_En_12_Fig7_HTML.jpg)'
- en: A graph of S H A P value impact on model output for different samples.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 不同样本的 SHAP 值对模型输出的影响图
- en: Figure 12-7
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12-7
- en: Another visualization of SHAP values to help us understand the distribution
    of feature importance and influence
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种可视化 SHAP 值的方法，帮助我们理解特征重要性和影响力的分布
- en: '[PRE6]'
  id: totrans-107
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: The kernel explainer is model agnostic, which means that it only interprets
    the model’s behavior based on the inputs and the outputs. That is, it treats the
    model as a black box function and thus can be applied to any model.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 核心解释器是模型无关的，这意味着它仅根据输入和输出解释模型的行为。也就是说，它将模型视为一个黑盒函数，因此可以应用于任何模型。
- en: SHAP also implements model-specific explainers that look “inside” the model
    to calculate SHAP values informed not only by the predicted output but also the
    internal parameters and processes used to derive the prediction. The `TreeExplainer`,
    for instance, can be applied to tree-based models (e.g., `sklearn.tree.DecisionTree`)
    by “reading” the learned criteria. SHAP provides the `GradientExplainer` to provide
    better interpretations of neural networks by exploiting their differentiability.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: SHAP 还实现了针对特定模型的解释器，这些解释器可以“查看”模型内部来计算 SHAP 值，这些值不仅基于预测输出，还包括用于得出预测的内部参数和过程。例如，`TreeExplainer`
    可以通过“读取”学习到的标准应用于基于树的模型（例如，`sklearn.tree.DecisionTree`）。SHAP 提供了 `GradientExplainer`，通过利用其可微性来提供对神经网络的更好解释。
- en: Listing [12-8](#PC8) demonstrates the construction of a simple neural network
    trained on the Mice Protein Expression dataset.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 [12-8](#PC8) 展示了在 Mice 蛋白质表达数据集上训练的简单神经网络的构建。
- en: '[PRE7]'
  id: totrans-111
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Since neural networks are pretty complicated, it is often valuable not just
    to explain the output of the entire model but also that of intermediate layers.
    Recall a similar analysis we performed in Chapter [4](525591_1_En_4_Chapter.xhtml),
    when we visualized how learned convolutional kernels convolved feature maps to
    understand which features were being amplified and which were being dimmed. In
    order to link an input to the output of a certain layer, we need to construct
    a submodel.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 由于神经网络相当复杂，因此不仅解释整个模型的输出，而且解释中间层的输出通常很有价值。回想一下我们在第 [4](525591_1_En_4_Chapter.xhtml)
    章中进行的类似分析，当时我们可视化学习到的卷积核如何卷积特征图，以了解哪些特征被增强，哪些特征被减弱。为了将输入与某一层的输出联系起来，我们需要构建一个子模型。
- en: Let’s begin by just explaining the last output layer, which has eight nodes
    for classification into one of the ten classes. We index the desired layer, create
    a `submodel` linking the input to that layer, and pass the model in addition to
    a dataset of features to the `GradientExplainer` (Listing [12-9](#PC9)). (In this
    case, the submodel construction is somewhat redundant because it is identical
    to the model. However, such a formulation allows us to generalize gradient explanations
    to other intermediate layers.)
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从解释最后一个输出层开始，该层有八个节点用于将十个类别之一进行分类。我们索引所需的层，创建一个 `submodel` 将输入链接到该层，并将模型以及特征数据集传递给
    `GradientExplainer`（列表 [12-9](#PC9)）。（在这种情况下，子模型构建有些冗余，因为它与模型相同。然而，这种公式允许我们将梯度解释推广到其他中间层。）
- en: '[PRE8]'
  id: totrans-114
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: We can obtain the SHAP values from the explainer on a certain data subset (Listing
    [12-10](#PC10)).
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以从特定数据子集的 explainer 中获取 SHAP 值（列表 [12-10](#PC10)）。
- en: '[PRE9]'
  id: totrans-116
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'Calling `values.shape` yields `(8, 200, 80)`. You can understand this as taking
    the format `(# neurons in layer, # samples evaluated across, # features)`. SHAP
    tells us how much impact each feature has on each output for each sample. That’s
    a lot of information!'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: '调用 `values.shape` 返回 `(8, 200, 80)`。您可以将其理解为格式 `(# neurons in layer, # samples
    evaluated across, # features)`。SHAP 告诉我们每个特征对每个样本的每个输出的影响程度。这包含大量信息！'
- en: You can derive a lot of meaningful insights from these SHAP values. An obvious
    aggregation method is to measure the mean SHAP value for each feature across all
    samples and outputs (Listing [12-11](#PC11), Figure [12-8](#Fig8)).
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以从这些 SHAP 值中得出许多有意义的见解。一个明显的聚合方法是测量所有样本和输出中每个特征的均值 SHAP 值（列表 [12-11](#PC11)，图
    [12-8](#Fig8)）。
- en: '![](../images/525591_1_En_12_Chapter/525591_1_En_12_Fig8_HTML.png)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../images/525591_1_En_12_Chapter/525591_1_En_12_Fig8_HTML.png)'
- en: An illustration of mean S H A P values for the various features. A shaded scale
    depicts the numbers from negative 0.5 to negative 3.5 from the top.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 各种特征的均值 S H A P 值的示意图。阴影刻度表示从顶部开始的负 0.5 到负 3.5 的数值。
- en: Figure 12-8
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12-8
- en: Importance of each feature calculated using mean SHAP with respect to the last
    output layer
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 使用均值 SHAP 计算的每个特征相对于最后一个输出层的重要性
- en: '[PRE10]'
  id: totrans-123
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Alternatively, we can visualize the overall impact of each feature on the output
    of the second-to-last layer (Figure [12-9](#Fig9)) and third-to-last layer (Figure
    [12-10](#Fig10)) to understand the dynamics of internal network computation.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，我们可以可视化每个特征对倒数第二层（图 [12-9](#Fig9)）和倒数第三层（图 [12-10](#Fig10)）输出的整体影响，以了解内部网络计算的动态。
- en: '![](../images/525591_1_En_12_Chapter/525591_1_En_12_Fig10_HTML.png)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../images/525591_1_En_12_Chapter/525591_1_En_12_Fig10_HTML.png)'
- en: An illustration of the mean S H A P values for the various features. A shaded
    scale depicts the numbers from negative 1 to negative 4 from the bottom.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 各种特征的均值 S H A P 值的示意图。阴影刻度表示从底部开始的负 1 到负 4 的数值。
- en: Figure 12-10
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12-10
- en: Importance of each feature calculated using mean SHAP with respect to the third-to-last
    output layer
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 使用均值 SHAP 计算的每个特征相对于倒数第三层输出的重要性
- en: '![](../images/525591_1_En_12_Chapter/525591_1_En_12_Fig9_HTML.png)'
  id: totrans-129
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../images/525591_1_En_12_Chapter/525591_1_En_12_Fig9_HTML.png)'
- en: An illustration of the mean S H A P values for the various features. A shaded
    scale depicts the numbers from negative 0.225 to negative 0.025 from the top.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 各种特征的均值 S H A P 值的示意图。阴影刻度表示从顶部开始的负 0.225 到负 0.025 的数值。
- en: Figure 12-9
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12-9
- en: Importance of each feature calculated using mean SHAP with respect to the second-to-last
    output layer
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 使用均值 SHAP 计算的每个特征相对于倒数第二层输出的重要性
- en: We can also take the standard deviation of SHAP values across all outputs and
    samples to understand the variability in feature impact (Figure [12-11](#Fig11)).
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以计算所有输出和样本的 SHAP 值的标准差，以了解特征影响的变异性（图 [12-11](#Fig11)）。
- en: '![](../images/525591_1_En_12_Chapter/525591_1_En_12_Fig11_HTML.png)'
  id: totrans-134
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_12_Chapter/525591_1_En_12_Fig11_HTML.png)'
- en: An illustration of standard deviation of S H A P values for the various features
    in the output layer. A shaded scale depicts the numbers from negative 0.5 to negative
    2.5 from the bottom.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 标准偏差图展示了输出层中各种特征的S H A P值。阴影刻度从底部开始，表示从负0.5到负2.5的数值。
- en: Figure 12-11
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 图12-11
- en: Standard deviation of SHAP values for each feature with respect to the last
    output layer
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 与最后一个输出层相关的每个特征的S H A P值的标准偏差
- en: Of course, one can perform much more fine-grained and detailed analyses by isolating
    a particular feature or set of features of interest and tracking how the impact
    varies and/or trends throughout samples and outputs. SHAP is an extraordinarily
    useful tool, and lots of new research are continually pushing at the boundaries
    of how useful, efficient, and informative SHAP-based methods can be (especially
    for deep learning!).
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，可以通过隔离特定的特征或一组感兴趣的特征，并跟踪其影响在样本和输出中的变化和/或趋势，进行更精细和详细的分析。SHAP是一个非常有用的工具，许多新的研究不断推动基于SHAP的方法在有用性、效率和信息量方面的边界（尤其是对于深度学习！）。
- en: LIME
  id: totrans-139
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LIME
- en: LIME, an acronym for Local Interpretable Model-Agnostic Explanations,^([2](#Fn2))
    is another model interpretation method. LIME relies and operates on the same idea
    as SHAP as it is also model agnostic. LIME interprets or approximates any machine
    learning model as a black box function and then explains its behavior and predictions
    with a local, interpretable model.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: LIME，即局部可解释模型无关解释的缩写，^([2](#Fn2))，是另一种模型解释方法。LIME与SHAP一样，也是模型无关的，它依赖于相同的理念。LIME将任何机器学习模型解释或近似为一个黑盒函数，然后使用一个局部可解释的模型来解释其行为和预测。
- en: The idea of LIME is simple and intuitive. Unlike SHAP, which uses different
    sets of features, LIME inputs different sets of *samples* into the black box model
    that it’s trying to interpret. However, instead of simply calculating the importance
    of features from the outputs of the altered dataset, LIME generates a brand-new
    dataset that’s comprised of the perturbed samples along with their prediction
    from the black box model. When LIME perturbs the dataset, continuous samples are
    randomly chosen from a normal distribution; then the inverse operation of mean-centering
    and scaling is performed on the selected samples. In contrast, for categorical
    features, they’re perturbed by training distributions. Then, on the generated
    dataset, LIME trains an interpretable model weighted by the proximity of sampled
    instances to the instance of interest. As the name describes, the trained model
    on the modified dataset won’t be a good approximation of the black box function
    globally, but it should be accurate within a local scope. Here, the instance of
    interest refers to the sample that you want LIME to interpret as it can explain
    how each feature contributes to the sample prediction.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: LIME的理念简单直观。与SHAP不同，SHAP使用不同的特征集，LIME将其尝试解释的黑盒模型输入不同的样本集。然而，LIME不是简单地从修改后的数据集的输出中计算特征的重要性，而是生成一个全新的数据集，该数据集由扰动样本及其黑盒模型的预测组成。当LIME扰动数据集时，从正态分布中随机选择连续样本；然后对选定的样本执行均值中心化和缩放的反操作。相比之下，对于分类特征，它们通过训练分布进行扰动。然后，在生成的数据集上，LIME训练一个可解释的模型，该模型根据采样实例与感兴趣实例的邻近度进行加权。正如其名所示，在修改后的数据集上训练的模型不会是全球黑盒函数的良好近似，但它应该在局部范围内准确。在这里，感兴趣的实例是指你希望LIME解释的样本，因为它可以解释每个特征如何对样本预测做出贡献。
- en: 'The key point that differs LIME from SHAP is that LIME focuses on local interpretability,
    explaining the impact that one prediction has, while SHAP is more global, interpreting
    the model with respect to the entire model and dataset. Additionally, LIME has
    a feature called SP-LIME, which lets the model produce an explained subset of
    the original dataset that would produce a global understanding of the model. Here
    is a basic overview of LIME’s explanation process:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: LIME与SHAP的不同之处在于，LIME侧重于局部可解释性，解释一个预测的影响，而SHAP则更侧重于全局，从整个模型和数据集的角度来解释模型。此外，LIME有一个名为SP-LIME的功能，可以让模型生成一个解释了原始数据集子集的模型，从而对模型有一个全局的理解。以下是LIME解释过程的基本概述：
- en: Choose one sample of interest that you would like to be analyzed and its prediction
    explained by LIME.
  id: totrans-143
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择一个你想要分析的样本，并让LIME解释其预测结果。
- en: Generate a perturbed dataset based on different sets of features that create
    a representative subset of the data. The target of these features will be the
    black box model’s prediction of these samples.
  id: totrans-144
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The samples are assigned a weight according to their distance or proximity to
    the instance of interest.
  id: totrans-145
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Train a model that’s interpretable, such as LASSO or a decision tree, on the
    perturbed dataset. LIME uses Ridge as a default model, but any sklearn-like model
    objects can be passed in.
  id: totrans-146
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Explain predictions by analyzing the model output.
  id: totrans-147
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Although LIME shines in text analysis and image recognition, for the context
    of this book, we will only explore its application to tabular data.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
- en: LIME comes implemented in its own library. For consistency and comparison purposes,
    we’re going to utilize LIME on the same dataset used previously in the “SHAP”
    section. We can retrieve the dataset and define an AutoKeras model (Listing [12-12](#PC12))
    as described previously.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  id: totrans-150
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: The following is the basic syntax for initializing a LIME explainable object
    in Listing [12-13](#PC13).
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  id: totrans-152
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Most of the parameters are self-explanatory, but one might get confused with
    the parameter “`class_name`”. Shown previously is a list of strings passed in
    as the name of each class that LIME will use during its explanation. According
    to our dataset, for a classification result of 0, it represents the person with
    those demographic features has an income less than $50,000 per year and vice versa
    for class 1.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
- en: After initialization, we can simply call the method `explain_instance` shown
    in Listing [12-14](#PC14) to let LIME do all the heavy computation and explanation
    work.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  id: totrans-155
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Here, the `data_row` parameter specifies which “sample of interest” LIME will
    attempt to explain, the `model_fn` parameter provides the model prediction function
    that LIME will use, and finally both `num_features` and `num_samples` give the
    number of features and samples that LIME will consider during the explanation,
    respectively.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
- en: Since the Keras `model.predict` function only returns the probability of the
    predicted class in binary classification, LIME only displays the influence that
    the various features had on that specific classified class. For a better visual
    and interpretation, we can create a custom prediction function, which returns
    both the probability for the predicted class and the probability for the other
    class by subtracting the returned value from 1 (Listing [12-15](#PC15)). Then,
    the function is simply passed into the `predict_fn` parameter. As mentioned previously,
    the base, interpretable model is set to Ridge, but it can be changed with setting
    the `model_regressor` parameter in the `explain_instance` method to a sklearn
    model object.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_12_Chapter/525591_1_En_12_Fig12_HTML.jpg)'
  id: totrans-158
  prefs: []
  type: TYPE_IMG
- en: An illustration of L I M E explanation for the feature value dataset, prediction
    probabilities, and income that is more than and less than 50000.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
- en: Figure 12-12
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
- en: LIME explanation for the fourth sample in the validation dataset
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 验证数据集中第四个样本的 LIME 解释
- en: '[PRE14]'
  id: totrans-162
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: In this prediction sample (Figure [12-12](#Fig12)), the confidence, or the probability
    that the model has for “Income > 50k”, is 66% or 0.66\. Each feature on the bar
    chart to the left is color-coded according to the color of each class. In the
    bar graph, those orange “bars” that are extended to the left represent how much
    those features contribute to classifying the target as “Income > 50k”. The preceding
    table is colored-coded as well, with the value column depicting the value of the
    feature and the color representing which feature contributes to which class’s
    predictions.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个预测样本（图 [12-12](#Fig12)）中，置信度，即模型对“收入 > 50k”的概率，是 66% 或 0.66。左侧条形图上的每个特征都根据每个类的颜色进行着色。在条形图中，那些向左延伸的橙色“条”表示这些特征对将目标分类为“收入
    > 50k”的贡献程度。前面的表格也进行了着色编码，其中值列表示特征的值，颜色表示哪个特征对哪个类的预测有贡献。
- en: Furthermore, there’s a little trick in LIME that can improve the bar plot’s
    quality. By calling `as_pyploy_figure` on the explanation, the object returned
    will plot the bar plot as a matplotlib figure (Listing [12-16](#PC16)).
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，LIME 中有一个小技巧可以提高条形图的质量。通过在解释上调用 `as_pyploy_figure`，返回的对象将条形图作为 matplotlib
    图形绘制（列表 [12-16](#PC16)）。
- en: '![](../images/525591_1_En_12_Chapter/525591_1_En_12_Fig13_HTML.png)'
  id: totrans-165
  prefs: []
  type: TYPE_IMG
  zh: '![激活最大化](../images/525591_1_En_12_Chapter/525591_1_En_12_Fig13_HTML.png)'
- en: A graph with pyplot presents a local explanation for class income less than
    50000\. Values are estimated. Data for relationship is a negative 0.10, and education
    number is 0.15.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 pyplot 展示的图表对收入低于 50000 的类别的局部解释。数值是估计的。关系的数值为 -0.10，教育水平的数值为 0.15。
- en: Figure 12-13
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12-13
- en: Bar plot plotted with the pyplot method
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 pyplot 方法绘制的条形图
- en: '[PRE15]'
  id: totrans-169
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: The plot (Figure [12-13](#Fig13)) essentially displays the same information
    as the smaller plot shown in the first figure but with a better formatting and
    a clearer comparison between the influence of each feature.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 该图（图 [12-13](#Fig13)）基本上显示了与第一幅图中显示的小图相同的信息，但格式更好，并且更清晰地比较了每个特征的影响。
- en: Compared with SHAP, LIME is more popular in terms of presentation and used by
    people who may be less familiar with the inner workings surrounding the model;
    SHAP is more popular among professional data scientists. Although LIME isn’t necessarily
    better than SHAP, but for quick interpretation of the model that comes with intuitive
    visualizations, LIME is definitely the tool to go.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 与 SHAP 相比，LIME 在展示方面更受欢迎，被那些可能不太熟悉模型内部工作原理的人使用；SHAP 在专业数据科学家中更受欢迎。尽管 LIME 不一定比
    SHAP 更好，但为了快速解释带有直观可视化的模型，LIME 确实是首选的工具。
- en: Activation Maximization
  id: totrans-172
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 激活最大化
- en: Activation Maximization^([3](#Fn3)) is a clever technique that can be used to
    understand what components a network is specifically “looking for.” In standard
    model training, we optimize the set of weights in the neural network such that
    the difference between the prediction and the true output is minimized (or some
    variation of this difference). In Activation Maximization, we hold the weights
    fixed and optimize the input such that the activations in some selected weights
    are maximized. That is, we perform gradient *ascent* to artificially construct
    the optimal input to maximize a set of model activations.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 激活最大化^([3](#Fn3)) 是一种巧妙的技术，可以用来理解网络具体“寻找”哪些组件。在标准模型训练中，我们优化神经网络中的权重集，使得预测值与真实输出之间的差异最小化（或这种差异的某种变体）。在激活最大化中，我们保持权重不变，并优化输入，使得某些选定的权重中的激活最大化。也就是说，我们执行梯度上升来人工构建最大化一组模型激活的最优输入。
- en: Why is this valuable? Model activations are representations of what factors
    the network considers during feed-forward prediction. Using Activation Maximization,
    you can see which extreme cases “most satisfy” “conditions” or features the network
    is “looking” for – and therefore implicitly understand how the network is interpreting
    different features and patterns in your dataset broadly.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 这有什么价值呢？模型激活是网络在正向预测过程中考虑的因素的表示。使用激活最大化，你可以看到哪些极端情况“最满足”网络“寻找”的条件或特征——因此隐式地理解网络如何解释你的数据集中不同特征和模式。
- en: The library `tf_keras_vis`, which can be installed with `pip install tf_keras_vis`,
    can be used to execute Activation Maximization on Keras/TensorFlow models. We
    begin by defining a *loss* – this allows us to specify the optimization objective.
    We can return a tuple traveling along the output matrix diagonal, representing
    the model outputs for each of the eight classes. Next, we define a `model_modifier`
    that changes the last activation to a linear rather than softmax layer (Listing
    [12-17](#PC17)). This makes the Activation Maximization procedure easier, since
    it is more difficult to navigate the softmax layer than a set of independent linear
    activations. Since the weights of the network itself are fixed, this does not
    change the network’s fundamental predictive properties.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 可以使用 `pip install tf_keras_vis` 安装的库 `tf_keras_vis` 来在 Keras/TensorFlow 模型上执行激活最大化。我们首先定义一个
    *损失* – 这允许我们指定优化目标。我们可以返回一个沿着输出矩阵对角线移动的元组，代表每个八个类别的模型输出。接下来，我们定义一个 `model_modifier`，它将最后一个激活层改为线性而不是
    softmax 层（列表 [12-17](#PC17)）。这使得激活最大化程序更容易，因为与一组独立的线性激活相比，在 softmax 层中导航更困难。由于网络的权重本身是固定的，这不会改变网络的根本预测属性。
- en: '[PRE16]'
  id: totrans-176
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Additionally, `tf_keras_vis` implements Activation Maximization for image-based
    neural networks (this is the dominant application of Activation Maximization),
    but our data is tabular and therefore of a different spatial dimensionality. We
    can address this by creating a new model that accepts data that is technically
    in the shape of an image, reshaping it into tabular form, and then passing it
    into our model (Listing [12-18](#PC18)).
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，`tf_keras_vis` 实现了基于图像的神经网络的激活最大化（这是激活最大化的主要应用），但我们的数据是表格形式，因此具有不同的空间维度。我们可以通过创建一个新的模型来解决这一点，该模型接受技术上具有图像形状的数据，将其重塑为表格形式，然后将其传递到我们的模型中（列表
    [12-18](#PC18)）。
- en: '[PRE17]'
  id: totrans-178
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: To run the Activation Maximization procedure, we pass in the model and the model
    modifier function into the `ActivationMaximization` object (Listing [12-19](#PC19)).
    Then, we define a `seed_input` that constitutes the initial “guess.” The Activation
    Maximization procedure then iteratively updates this initial input across `steps,`
    the number of steps, to maximize the loss defined by `loss`. In this case, we
    are trying to find the inputs that are the “most defining” of each of the eight
    classes.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 要运行激活最大化程序，我们将模型和模型修改函数传递给 `ActivationMaximization` 对象（列表 [12-19](#PC19)）。然后，我们定义一个
    `seed_input`，它构成了初始的“猜测”。激活最大化程序随后迭代地更新这个初始输入，跨越 `steps` 步，以最大化由 `loss` 定义的损失。在这种情况下，我们试图找到每个八个类别的“最具定义性”的输入。
- en: '[PRE18]'
  id: totrans-180
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Once we have obtained the maps, we can visualize the inputs for each class (shown
    in Listing [12-20](#PC20) and Figure [12-14](#Fig14)). We have obtained synthetically
    constructed inputs that the network considers to be “the most representative”
    of each class!
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们获得了这些图，我们就可以可视化每个类别的输入（如列表 [12-20](#PC20) 和图 [12-14](#Fig14) 所示）。我们已经获得了网络认为的“最具代表性”的每个类别的合成输入！
- en: '![](../images/525591_1_En_12_Chapter/525591_1_En_12_Fig14_HTML.png)'
  id: totrans-182
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/525591_1_En_12_Chapter/525591_1_En_12_Fig14_HTML.png)'
- en: 8 images. They present the resolution created by the activation maximization.
    The images are labeled as target 0 to 7, respectively.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 8 张图像。它们展示了激活最大化创建的分辨率。图像分别标记为目标 0 到 7。
- en: Figure 12-14
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12-14
- en: Visualizations produced by Activation Maximization
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 激活最大化产生的可视化
- en: '[PRE19]'
  id: totrans-186
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Of course, you’ll want to run this procedure multiple times, since the possible
    space is very complex and the results are highly dependent upon the initialization.
    The resulting synthetically constructed inputs can be analyzed to understand which
    column values and/or column value groups are most characteristic of each class.
    Moreover, you can run Activation Maximization on intermediate layers by replacing
    the complete model with a submodel (as demonstrated previously).
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，你可能需要多次运行此程序，因为可能的空间非常复杂，结果高度依赖于初始化。生成的合成输入可以进行分析，以了解哪些列值和/或列值组是每个类别的最典型特征。此外，你可以通过用子模型替换完整模型来在中间层上运行激活最大化（如前所述）。
- en: Key Points
  id: totrans-188
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键点
- en: 'In this brief chapter, we discussed three deep learning interpretability methods:'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们讨论了三种深度学习可解释性方法：
- en: SHAP is a model-agnostic suite of interpretability methods that estimate the
    individual contribution of each feature to the output of the neural network by
    considering large numbers of feature subsets. SHAP also has adaptations to exploit
    the gradients of neural networks.
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: SHAP是一个模型无关的可解释性方法套件，通过考虑大量特征子集来估计每个特征对神经网络输出的个体贡献。SHAP还有针对利用神经网络梯度的适应性。
- en: LIME is also a model-agnostic tool targeted toward model interpretation, especially
    for tabular and text data. LIME utilizes a representative perturbed dataset and
    produces explainable results by training an additional interpretable model. LIME
    is generally used for quicker and more intuitive representation.
  id: totrans-191
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LIME也是一个针对模型解释的模型无关工具，尤其针对表格和文本数据。LIME通过训练一个额外的可解释模型，利用代表性的扰动数据集来产生可解释的结果。LIME通常用于更快、更直观地表示。
- en: Activation Maximization is a neural network–specific technique, in which the
    input is optimized to maximize the activations in a certain layer of the neural
    network. Multiple “optimal inputs” can be generated and compared to form an analysis
    of what certain activations are “looked for” or are “triggered” by.
  id: totrans-192
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 激活最大化是一种针对神经网络的特定技术，其中输入被优化以最大化神经网络某一层的激活。可以生成多个“最优输入”并比较，以形成对某些激活是“寻找”或“触发”的分析。
- en: 'This chapter has just scraped the surface of deep learning interpretability,
    to demonstrate where one might start to interpret their tabular deep learning
    model. In addition to these three methods, we encourage you to explore other deep
    learning interpretability methods developed for tabular contexts. A sample of
    interesting papers is presented in the following:'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 本章仅仅触及了深度学习可解释性的表面，旨在展示一个人可能从何处开始解释他们的表格型深度学习模型。除了这三种方法之外，我们鼓励您探索为表格环境开发的其它深度学习可解释性方法。以下是一些有趣的论文样本：
- en: 'Agarwal, R., Frosst, N., Zhang, X., Caruana, R., & Hinton, G.E. (2021). Neural
    Additive Models: Interpretable Machine Learning with Neural Nets. *ArXiv, abs/2004.13912*.'
  id: totrans-194
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Agarwal, R., Frosst, N., Zhang, X., Caruana, R., & Hinton, G.E. (2021). 神经网络加性模型：使用神经网络进行可解释机器学习。*ArXiv,
    abs/2004.13912*。
- en: 'Chang, C., Caruana, R., & Goldenberg, A. (2021). NODE-GAM: Neural Generalized
    Additive Model for Interpretable Deep Learning. *ArXiv, abs/2106.01613*.'
  id: totrans-195
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Chang, C., Caruana, R., & Goldenberg, A. (2021). NODE-GAM：用于可解释深度学习的神经网络广义加性模型。*ArXiv,
    abs/2106.01613*。
- en: Liu, X., Wang, X., & Matwin, S. (2018). Improving the Interpretability of Deep
    Neural Networks with Knowledge Distillation. *2018 IEEE International Conference
    on Data Mining Workshops (ICDMW)*, 905–912.
  id: totrans-196
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Liu, X., Wang, X., & Matwin, S. (2018). 通过知识蒸馏提高深度神经网络的解释性。*2018年IEEE国际数据挖掘研讨会（ICDMW）*，905–912。
- en: 'Novakovsky, G., Fornes, O., Saraswat, M., Mostafavi, S., & Wasserman, W.W.
    (2022). ExplaiNN: Interpretable and transparent neural networks for genomics.
    *bioRxiv*.'
  id: totrans-197
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Novakovsky, G., Fornes, O., Saraswat, M., Mostafavi, S., & Wasserman, W.W. (2022).
    ExplaiNN：用于基因组学的可解释和透明的神经网络。*bioRxiv*。
- en: Radenović, F., Dubey, A., & Mahajan, D.K. (2022). Neural Basis Models for Interpretability.
    *ArXiv, abs/2205.14120*.
  id: totrans-198
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Radenović, F., Dubey, A., & Mahajan, D.K. (2022). 用于可解释性的神经网络基础模型。*ArXiv, abs/2205.14120*。
- en: Ranjbar, N., & Safabakhsh, R. (2022). Using Decision Tree as Local Interpretable
    Model in Autoencoder-based LIME. *2022 27th International Computer Conference,
    Computer Society of Iran (CSICC)*, 1–7.
  id: totrans-199
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Ranjbar, N., & Safabakhsh, R. (2022). 在基于自动编码器的LIME中使用决策树作为局部可解释模型。*2022年第27届国际计算机会议，伊朗计算机协会（CSICC）*，1–7。
- en: 'Richman, R., & Wüthrich, M.V. (2021). LocalGLMnet: Interpretable deep learning
    for tabular data. *DecisionSciRN: Methods of Forecasting (Sub-Topic)*.'
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Richman, R., & Wüthrich, M.V. (2021). LocalGLMnet：用于表格数据的可解释深度学习。*DecisionSciRN：预测方法（子主题）*。
- en: This concludes the last part and chapter of the book.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 这标志着本书最后一部分和章节的结束。
- en: Closing Remarks
  id: totrans-202
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结束语
- en: We have covered a tremendous amount of ground throughout this book. We began
    in Part 1 with a thorough overview of machine learning and the data preprocessing
    pipeline; key machine learning concepts and principles; several classical machine
    learning algorithms, including Gradient Boosting models – deep learning’s dominant
    competitor on tabular data problems; different data storage and delivery structures;
    and a variety of data encoding and transformation techniques. In Part 2, we built
    an expansive knowledge of deep learning across five chapters – artificial neural
    networks, convolutional neural networks, recurrent neural networks, attention
    and transformations, and tree-based neural networks. This part covered dozens
    of deep learning modeling approaches, applied to a variety of data types and contexts,
    and explored almost 20 research papers. In Part 3, we further expanded our toolkit
    not only to model tabular data but to pretrain models, develop noise- and perturbation-robust
    models, generate tabular data, optimize the modeling pipeline, link together models
    into ensembles and self-aware systems, and interpret models.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书中，我们涵盖了大量的内容。我们从第一部分开始，对机器学习和数据预处理流程进行了全面的概述；介绍了关键的机器学习概念和原理；讨论了几个经典的机器学习算法，包括梯度提升模型——在表格数据问题上是深度学习的主要竞争对手；不同的数据存储和交付结构；以及各种数据编码和转换技术。在第二部分，我们通过五章内容——人工神经网络、卷积神经网络、循环神经网络、注意力和转换以及基于树的神经网络——构建了关于深度学习的广泛知识。这部分涵盖了数十种深度学习建模方法，应用于各种数据类型和场景，并探讨了近20篇研究论文。在第三部分，我们不仅扩展了我们的工具集以建模表格数据，还包括了预训练模型、开发噪声和扰动鲁棒模型、生成表格数据、优化建模流程、将模型链接成集成和自感知系统，以及解释模型。
- en: We hope that this book has been thought-provoking to those looking to better
    understand the role of deep learning in tabular data and a helpful resource to
    those looking to use deep learning in their respective domains. The guiding principle
    at the forefront of this book was accessibility, and we hope the explanations,
    diagrams, code, and research walk-throughs supported this.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望这本书对于那些希望更好地理解深度学习在表格数据中作用的人来说具有启发性，对于那些希望在自己的领域中使用深度学习的人来说是一个有用的资源。本书最前沿的指导原则是可访问性，我们希望解释、图表、代码和研究概述支持了这一点。
- en: As the problems we face become more advanced and the data we collect from them
    become correspondingly more intricate and complex, we find a greater divergence
    – rather than convergence – in problems and the models that we use to approach
    them. Thus, the question of “which model performs the best on tabular data” –
    while admittedly being an efficient question – is a question that already shapes
    its own obscured answer. We should always keep our minds open and our fingers
    agile, ready to acquire, test, and synthesize the old and the new. We must strive
    to be driven less wholly by necessary but restrictive benchmarks and more by the
    diversity of the problem multiverse.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们面临的问题变得更加复杂，我们从这些问题中收集的数据也相应地变得更加复杂和错综，我们发现问题及其模型之间的差异——而不是收敛——变得更加明显。因此，“哪种模型在表格数据上表现最好”——虽然承认这是一个有效的问题——但这个问题已经形成了它自己隐含的答案。我们应该始终保持开放的心态和灵活的指尖，准备好获取、测试和综合新旧知识。我们必须努力减少完全由必要的但限制性的基准驱动的驱动，更多地由问题宇宙的多样性驱动。
