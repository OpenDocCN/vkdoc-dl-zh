- en: '![$$ {n}_B=\left\lfloor \frac{n_A-{n}_K}{s}+1\right\rfloor =\left\lfloor \frac{4-3}{1}+1\right\rfloor
    =2 $$](../images/463356_2_En_7_Chapter/463356_2_En_7_Chapter_TeX_Equab.png)'
  prefs: []
  type: TYPE_IMG
