- en: 11. Things to remember, what’s next for you, and final words
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Welcome to the end of the ride. Through the last ten chapters, we have discovered,
    explored, and learned about the exciting field of machine learning with TensorFlow.js.
    With over ten unique examples that included a broad diversity of networks and
    use cases, we predicted the number of steps taken, clustered data, posed, identified
    toxic content, generated images, and more. It’s been a lot.
  prefs: []
  type: TYPE_NORMAL
- en: It is for this reason that for the last chapter, I would like to close with
    a recap of some concepts we saw and even add more on them—we will call this section
    “Things to remember.” Moreover, I also want to present a few pointers on how you
    could further extend what you learned here and offer some references that might
    help you in your future machine and deep learning adventures.
  prefs: []
  type: TYPE_NORMAL
- en: Things to remember
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Tensors
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'This book was all about tensors and how they flow. So, it is very appropriate
    to start with them. As we learned, a tensor is a generalization of matrices of
    *N* dimensions with an attribute *rank*, *shape*, and *dtype*. Tensors have a
    very important property I want to highlight: they are **immutable** . Once their
    values are set, you cannot change them. So, every time we used a tensor method
    like `tf.add()`, we actually created a new one.'
  prefs: []
  type: TYPE_NORMAL
- en: Another important fact about tensors is that we can change their shape. Functions
    like `tf.reshape()` (shown in the following) can turn, for example, a tensor of
    rank 1 into rank 2\. Other functions that also modify a tensor’s shape are `tf.squeeze()`
    and `tf.expandDims()`, to remove and add dimensions, respectively:^([1](#Fn1))
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'You can also perform mathematical operations on tensors. For example, on several
    occasions, we applied arithmetical functions such as `tf.add()` and `tf.div()`
    to add or divide the tensor’s values by the given argument, for instance:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'Similarly, it is possible to compute element-wise operations between two tensors:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Last, we cannot forget about how to convert tensors to arrays. Functions like
    `tf.dataSync()` and `tf.arraySync()` return the tensor as an array or a nested
    array.
  prefs: []
  type: TYPE_NORMAL
- en: Memory management
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Having many tensors takes a toll on your memory, causing unexpected slowdowns
    and, ultimately, crashes. That is why it is good practice to manage the memory
    of the application when working with extensive networks or when the app runs in
    the WebGL backend because it does not automatically garbage collect the unused
    tensors. To handle this problem, TensorFlow.js provides several functions to control
    the memory usage. Some of these are `tf.dispose()` to dispose of any tensor, `tf.tidy()`
    to clean up the tensors allocated within the given function, and `tf.memory()`
    to return the program’s memory information. One we did not use, but we ought to
    know, is `tf.keep()`, used to avoid disposing of a tensor created inside a `tf.tidy()`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: But if you remove the `tf.keep()` function and try to use the tensor `x`, you
    will get a “Tensor is disposed” error.
  prefs: []
  type: TYPE_NORMAL
- en: TensorFlow.js Visualization (tfjs-vis)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A package we regularly used was **tfjs-vis**, short for TensorFlow.js Visualization.
    With the library, we frequently visualized the datasets we used and the training
    progress. But the library does more than this.
  prefs: []
  type: TYPE_NORMAL
- en: Other than drawing scatter plots, with tfjs-vis you can create bar charts (`tfvis.render.barchart()`),
    histograms (`tfvis.render.histogram()`), or line charts (`tfvis.render.linechart()`).
  prefs: []
  type: TYPE_NORMAL
- en: Besides visualizing data, you can also create more specialized graphs such as
    a prettier model summary (Figure [11-1](#Fig1)) using
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/494424_1_En_11_Chapter/494424_1_En_11_Fig1_HTML.jpg](../images/494424_1_En_11_Chapter/494424_1_En_11_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11-1
  prefs: []
  type: TYPE_NORMAL
- en: Model summary produced with tfjs-vis
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Or you can visualize the distribution of a tensor’s values (Figure [11-2](#Fig2))
    with
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/494424_1_En_11_Chapter/494424_1_En_11_Fig2_HTML.jpg](../images/494424_1_En_11_Chapter/494424_1_En_11_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11-2
  prefs: []
  type: TYPE_NORMAL
- en: Distribution of a tensor’s values
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'In the earlier chapters, we used tfjs-vis through its “visor” window. However,
    in Chapter [9](494424_1_En_9_Chapter.xhtml), we learned that you could also present
    the visualizations on a `<canvas>` by using the canvas id as the first argument
    to the function:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: For the complete reference guide, visit [`https://js.tensorflow.org/api_vis/latest/`](https://js.tensorflow.org/api_vis/latest/).
  prefs: []
  type: TYPE_NORMAL
- en: Designing a model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Designing a model is not a simple task. Creating one requires comprehending
    the dataset at hand, understanding every detail of the job one wishes to solve,
    and knowing the different types of layers available in the framework. This last
    point is not simple. If, at some point, you felt overwhelmed by the layers, and
    their peculiarities, let me assure you that that is completely fine. Over time,
    after designing many models, you will start to understand their differences and
    functionalities.
  prefs: []
  type: TYPE_NORMAL
- en: In TensorFlow.js, there are two principal ways of creating models. One is using
    the **Sequential** (“stack of pancakes”) approach and the other, the **Functional**
    (“pancakes on the table”) approach. Most of our exercises used the Sequential
    model, a model topology that describes a stack of layers where the output of one
    is the input of the next one. The Functional or `tf.model()` way is the graph-based
    alternative where you define the topology by specifying its input and output and
    connecting the layers using `tf.apply()`. Regardless of the type of layer, you
    must always declare the shape of the input tensor in the input layer. With a Sequential
    model, you can specify the shape using `inputShape` in the first layer. Or, if
    you are using a `tf.model()`, then you need to define the shape in `tf.input()`.
  prefs: []
  type: TYPE_NORMAL
- en: After designing the architecture, the next step is compiling and fitting the
    model. Before training a model, you always have to compile it to set the loss
    function, optimizer, and metrics attributes necessary for training. Then comes
    `model.fit()` to fit it. The parameters of `model.fit()` are the training data,
    the targets, or, in the case of `model.fitDataset()`, a `tf.data.Dataset` object.
    In both cases, you also need an object to configure the hyperparameters. Of these
    hyperparameters, you should at least define the batch size and number of epochs.
    Otherwise, the model will use the default values. Other important attributes are
    the callbacks, validation data, and shuffle.
  prefs: []
  type: TYPE_NORMAL
- en: For more information about the layers, visit the documentation at [`https://js.tensorflow.org/api/latest/#Layers`](https://js.tensorflow.org/api/latest/%2523Layers).
  prefs: []
  type: TYPE_NORMAL
- en: Hyperparameters and attributes
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If designing a network’s architecture is complicated, deciding its hyperparameters’
    values is arguably even more. There is no right or wrong set of attributes for
    a network. After all, each dataset and use case is different. However, there are
    best practices and guidelines that serve as a starting point. Remember the DCGAN
    from Chapter [10](494424_1_En_10_Chapter.xhtml)? The learning rate of 0.0002 we
    used came from the paper that describes the model. My recommendation is that,
    when creating a model, check the literature, projects, or tutorials to find configurations
    that have worked for others. Try these configurations. Study how they influence
    the model’s performance. Doing so will give you an idea of how to approach the
    problem.
  prefs: []
  type: TYPE_NORMAL
- en: Another essential attribute to consider is the loss function. Unlike hyperparameters,
    the loss function is directly bound to the model’s task. So, choosing one is more
    straightforward than selecting, let’s say, the number of epochs. For example,
    if the task at hand is a regression problem, the mean squared error is an optimal
    option. If the problem is classification, binary cross-entropy performs well for
    binary classification, just like categorical cross-entropy works for multiclass
    classification. Table [11-1](#Tab1) summarizes this information.
  prefs: []
  type: TYPE_NORMAL
- en: Table 11-1
  prefs: []
  type: TYPE_NORMAL
- en: Loss functions suitable for certain tasks
  prefs: []
  type: TYPE_NORMAL
- en: '| Task | Target | Loss Function | Last Layer''s Activation Function |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Regression | Continuous value | Mean squared error | - |'
  prefs: []
  type: TYPE_TB
- en: '| Classification | Binary classification | Binary cross-entropy | Sigmoid |'
  prefs: []
  type: TYPE_TB
- en: '| Classification | Multiclass classification | Categorical cross-entropy |
    Softmax |'
  prefs: []
  type: TYPE_TB
- en: Testing
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In software development, testing is essential, and yet, in the book, we did
    not perform any kind of test. The reason I omitted the test cases was to simplify
    the code as much as possible. But behind the scenes, I performed various tests
    that mostly involved confirming the shape of tensors or their values. To test
    statements in TensorFlow.js, the API provides a function, `tf.util.assert()`,
    that asserts if an expression is true. To illustrate it, consider the following
    example where we test the shape of a tensor:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'In the first example, we are testing if the shape of the tensor `a` is [2,
    2]. If true (like here), nothing happens. Note that for comparing the shapes (which
    are arrays), we had to convert them to strings and compare those. If the expression
    is not true (the second test case), it returns the message provided in the second
    argument. A second common testing scenario is asserting the range of a tensor’s
    values, like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: In this example, we used `tf.min()` and `tf.max()` to check if the values of
    the tensor are between -1 and 1, a scenario we saw in Chapter [10](494424_1_En_10_Chapter.xhtml).
    The indexing is used because `dataSync()` returns the min or max value in an array
    of length 1.
  prefs: []
  type: TYPE_NORMAL
- en: Asynchronous code
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: While this point is not only related to TensorFlow.js, it is worth mentioning
    that when developing web applications, you should consider using asynchronous
    code to avoid blocking the app. Potential scenarios include calls to the functions
    `tf.Sequential.fitDataset()` and `tf.loadLayersModel()` or, in general, when executing
    a function that might cause a noticeable pause in the app. In our examples, we
    used the synchronous version—`tf.dataSync()` and `tf.arraySync()`—of the tensors-to-array
    functions since we were not dealing with large tensors and the response was immediate.
    However, if necessary, consider using the asynchronous variants `tf.data()` and
    `tf.array()`.
  prefs: []
  type: TYPE_NORMAL
- en: What’s next for you?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: So, you finished the book. Does that mean you are done learning deep learning?
    Never! Deep learning, and the discipline of data, is a vast field that grows with
    every passing day. Fortunately, the applications and lessons we learned served
    as preparation to get you started and start exploring on your own. If you ask
    me where you should start, I would recommend exploring several of the TensorFlow.js
    pre-trained models we did not see, for example, the body segmentation model and
    the speech command recognition. After them, you could study other deep learning
    and machine learning concepts like embeddings, autoencoders, image segmentation,
    attention-based models, and dimensionality reduction algorithms. Regarding the
    latter, you can find an implementation of t-Distributed Stochastic Neighbor Embedding
    (t-SNE) in the official TensorFlow.js repository.^([2](#Fn2)) However, at the
    time of writing, the library has not been updated to the latest version of TF.js.
    Another option is returning to the models we created to improve them. Add (or
    remove) more layers, use different data, tweak the hyperparameters, create a fun
    app, write a Chrome extension, and more.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to take the models even further, try deploying them in other platforms,
    for example, mobile, cloud, or even on a desktop application using Electron. By
    deploying them somewhere else, not only will you get the chance to interact with
    them from a fresh perspective but also the opportunity of learning about a new
    framework. Additionally, try to experiment with TensorFlow (Python). Even better,
    once there, alter the models you already have (transfer learning, maybe?) to experience
    the similarity between the TensorFlow and TensorFlow.js frameworks.
  prefs: []
  type: TYPE_NORMAL
- en: And lastly, and above all, have fun. Train, deploy, make, break, visualize,
    design, question, and enjoy—that is, in my opinion, the best way of learning.
  prefs: []
  type: TYPE_NORMAL
- en: External resources
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The following is a list of external resources to guide you through your TensorFlow.js
    adventures:'
  prefs: []
  type: TYPE_NORMAL
- en: 'The official API documentation at [`https://js.tensorflow.org/api/latest/`](https://js.tensorflow.org/api/latest/):
    This is the library’s guide. In it, you will find documentation about every single
    function and object TensorFlow.js has to offer.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'StackOverflow’s TensorFlow.js tag at [`https://stackoverflow.com/questions/tagged/tensorflow.js`](https://stackoverflow.com/questions/tagged/tensorflow.js):
    Use this tag to ask questions or find answers (now you should be able to answer
    some!).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The TensorFlow.js’ GitHub issues tab at [`https://github.com/tensorflow/tfjs/issues`](https://github.com/tensorflow/tfjs/issues):
    This is mostly for reporting bugs and issues with the library, and not for asking
    help. Notwithstanding, you might find some answers here, especially when they
    are related to bugs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For finding datasets, try *Kaggle’s Dataset* ([`www.kaggle.com/datasets`](https://www.kaggle.com/datasets))
    collection or *Google Dataset Search* ([`https://datasetsearch.research.google.com/`](https://datasetsearch.research.google.com/)).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For the theory and mathematics behind the concepts here introduced, I highly
    recommend the book *Deep Learning* by Ian Goodfellow, Yoshua Bengio, and Aaron
    Courville.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The topics we covered here belong mostly to the subfield of deep learning. But
    machine learning is more about networks and tensors. If you wish to learn more
    about machine learning in general, I recommend reading *Hands-on Scikit-Learn
    for Machine Learning Applications* by David Paper (Apress) and *Hands-On Machine
    Learning with Scikit-Learn, Keras & TensorFlow* by Aurélien Géron (O’Reilly).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Thank you
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As cliché as it sounds, I want to end by saying thank you. This book has been
    not only a journey for you but for me, too. Every single line of code, concept,
    and piece of information you learned here was also a lesson for me. I am grateful
    for that.
  prefs: []
  type: TYPE_NORMAL
- en: As said in the beginning of this book, I wrote this book during my backpacking
    adventures. In fact, as I am writing this line, I am stuck in New Zealand in the
    middle of the Coronavirus crisis. So, behind every page you read, there is a new
    city, a different company, an exciting tale, or even a terrible Internet connection.
    But even though I was exposed to those changes, the only constant thing was the
    desire to bring a great book about TensorFlow.js and machine learning to you.
  prefs: []
  type: TYPE_NORMAL
- en: 'I truly hope that through the last 11 chapters, you have gained a whole world
    of knowledge that will follow you in your future endeavors. If you have questions,
    find an error, or want to show me your newest app, please contact me on Twitter:
    [`https://twitter.com/jdiossantos`](https://twitter.com/jdiossantos). I would
    love to hear from you.'
  prefs: []
  type: TYPE_NORMAL
- en: Stay cool!
  prefs: []
  type: TYPE_NORMAL
- en: '*Juan :)*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*April 7, 2020, Christchurch, New Zealand*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
