- en: Summary
  id: totrans-239
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 概述
- en: This was a long chapter, where you looked at DQN in depth and the various RL
    environments. It started with a quick recap of Q-learning and the derivation of
    the update equation for DQN. You then looked at the implementation of DQN in both
    PyTorch and TensorFlow for a simple `CartPole` environment. You saw the complete
    code for the DQN algorithm.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个内容丰富的章节，您深入了解了DQN和各种RL环境。它从对Q-learning的快速回顾和对DQN更新公式的推导开始。然后，您看到了在PyTorch和TensorFlow中实现DQN的简单`CartPole`环境的完整代码。
- en: You followed it with a review of the Gymnasium API and compared the changes
    it has undergone from its original version under OpenAI Gym. You looked at how
    Stable Baselines3 (SB3) and RL SB3 Zoo (SB3 Zoo) can be used for training agents,
    where you leverage the pre-implemented DQN and various other algorithms. A quick
    review of the process to record the video of a trained agent in action was also
    discussed.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 您随后回顾了Gymnasium API，并比较了它与OpenAI Gym原始版本之间的变化。您还看到了如何使用Stable Baselines3 (SB3)和RL
    SB3 Zoo (SB3 Zoo)进行代理训练，其中您利用了预实现的DQN和其他各种算法。还讨论了记录训练代理动作视频的过程。
- en: The next two sections were on hyperparameter optimization using Optuna and SB3
    and plotting using the Rliable library.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的两个部分是关于使用Optuna和SB3进行超参数优化以及使用Rliable库进行绘图。
- en: This completed the walkthrough of DQN and its associated concepts. Next, I talked
    about applying DQN to Atari games, which resulted in discussing preprocessing
    steps commonly required for games like these.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 这完成了对DQN及其相关概念的全面了解。接下来，我谈到了将DQN应用于Atari游戏，这导致了讨论这类游戏通常需要的预处理步骤。
- en: The final section was devoted to the various RL environments ,ranging from MuJoCo
    for simple joint robots, to Unity-based ML agents, and areas like finance under
    the FinRL library.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一部分专注于各种强化学习环境，从MuJoCo用于简单的关节机器人，到基于Unity的机器学习代理，以及FinRL库下的金融等领域。
