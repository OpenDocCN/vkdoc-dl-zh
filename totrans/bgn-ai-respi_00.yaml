- en: Artificial intelligence, or AI, is an exciting field and my purpose in writing
    this book is to convey some of that excitement to you. I will be using the Raspberry
    Pi single-board computer as the primary tool through which you can explore how
    AI works and, consequently, gain additional insight on how you might incorporate
    AI into your projects and/or applications.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能，或AI，是一个令人兴奋的领域，我写这本书的目的就是将其中的一些兴奋传递给你。我将使用树莓派单板计算机作为主要工具，通过它你可以探索人工智能是如何工作的，从而获得如何将人工智能融入你的项目和应用中的额外见解。
- en: 'I do want to make something perfectly clear at the outset: reading this book
    and completing all the projects will not make you an expert in AI. This is analogous
    to the situation where a layperson taking a first aid course could never claim
    to be a medical doctor or a nurse after taking that course. Becoming an AI expert
    requires that you take many college courses—both undergraduate and graduate—in
    a variety of areas, including mathematics, computer science, logic, and even philosophy.
    There are also AI experts who come from other spheres of interest, including music
    and the allied arts. Having made the previous statements, I do want you to understand
    that gaining a reasonable introduction to AI is very achievable by reading this
    book and other readily available resources. It is just that you should not try
    to claim that you are an AI expert after reading this book.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我首先想明确一点：阅读这本书并完成所有项目不会让你成为人工智能领域的专家。这就像一个普通人参加急救课程后，永远不能声称自己是医生或护士一样。成为人工智能专家需要你在多个领域，包括数学、计算机科学、逻辑，甚至哲学，修读许多大学课程——本科和研究生课程。还有一些人工智能专家来自其他兴趣领域，包括音乐和相关艺术。在做出上述陈述后，我确实希望你能理解，通过阅读这本书和其他易于获取的资源，获得人工智能的合理入门是非常可行的。只是你阅读这本书后，不应该试图声称自己是人工智能专家。
- en: I will next discuss why the Raspberry Pi is a good platform with which to examine
    AI. You should first note that it is a very capable computer on its own merit.
    Why certainly not as fast nor as memory capable as a modern PC or Mac, it is no
    slouch, especially when using a Raspberry Pi 3\. This model has a clock speed
    of 1 GHz, uses four cores, and has 1 GB of dynamic ram. This is quite impressive
    when you realize that this performance comes with a price tag of only $35 (USD).
    However, the key feature that makes the Raspberry Pi so attractive for AI demonstrations
    is that it is a microcontroller. This means you can directly control things based
    upon the outcome of AI events. Microcontrollers also allow sensors to be easily
    connected to them, thus allowing AI applications a means to interact with the
    real world.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我将讨论为什么树莓派是一个很好的平台来研究人工智能。你应该首先注意到，它本身就是一个非常强大的计算机。当然，它的速度和内存能力可能不如现代的PC或Mac，但它并不慢，尤其是在使用树莓派3时。这款型号的时钟速度为1
    GHz，使用四个核心，并拥有1 GB的动态RAM。当你意识到这种性能只需35美元（美元）的价格标签时，这相当令人印象深刻。然而，使树莓派对人工智能演示如此有吸引力的关键特性是它是一个微控制器。这意味着你可以根据人工智能事件的结果直接控制事物。微控制器还允许传感器轻松连接到它们，从而为人工智能应用提供与真实世界交互的手段。
- en: While PCs can also be set up to both sense and control, it often requires expensive
    and complex interfaces to achieve these capabilities. The Raspberry Pi was initially
    designed to be able to sense and control devices with minimal interface requirements,
    and perhaps more importantly, minimal software requirements. PC software interfaces
    are often very complex, expensive, and typically proprietary—meaning making user
    changes or modifications is a difficult-to-impossible task.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然PC也可以设置成感知和控制，但通常需要昂贵的复杂接口才能实现这些功能。树莓派最初的设计是为了能够以最小的接口需求感知和控制设备，也许更重要的是，以最小的软件需求。PC软件接口通常非常复杂、昂贵，通常是专有的——这意味着对用户进行更改或修改是一项困难甚至不可能的任务。
- en: The Raspberry Pis that I use in this book use a Raspian Linux distribution named
    Jessie. This distribution is completely open source and freely available from
    the Raspberry Pi Foundation’s download website. It is a very stable operating
    system (OS) and supports several extremely large open-source applications repositories.
    This means that all the software used in this book is freely available and easily
    downloadable into the Raspberry Pi.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这本书中使用的树莓派使用的是名为Jessie的Raspian Linux发行版。这个发行版是完全开源的，可以从树莓派基金会的下载网站免费获取。这是一个非常稳定的操作系统（OS），支持几个极其庞大的开源应用程序仓库。这意味着这本书中使用的所有软件都是免费提供的，并且可以轻松下载到树莓派中。
- en: I use a variety of languages and applications in the book’s various demonstrations
    and projects. The languages used are mainly Python, Prolog, and the Wolfram Language.
    Each of these languages brings some unique features that allow the book demonstrations
    to be quickly and easily implemented.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 我在书中的各种演示和项目中使用了多种语言和应用。使用的语言主要是Python、Prolog和Wolfram语言。每种语言都带来了一些独特的特性，使得书中的演示可以快速且容易地实现。
- en: The main application that I use is Mathematica, which is a full-featured symbolic
    processing program that also happens to be part of the Jessie distribution. Mathematica
    is also a commercial program that ordinarily costs hundreds of dollars, but is
    provided gratis due to the very generous gift of the Wolfram Corporation and Dr.
    Stephen Wolfram (CEO) in particular.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我在书中使用的主要应用是Mathematica，这是一个功能齐全的符号处理程序，碰巧也是Jessie发行版的一部分。Mathematica也是一个商业程序，通常需要花费数百美元，但由于Wolfram公司及其首席执行官Stephen
    Wolfram（CEO）特别慷慨的赠予，它是免费提供的。
- en: I tried to layout the book in a logical manner by first introducing AI in Chapter
    [1](A436848_1_En_1_Chapter.html) . It is difficult to explain AI to people who
    have never heard of it, although it is often surprising to inform that them that
    AI often affects them in their daily lives. I have provided a considerable amount
    of detail in the first chapter by trying to define AI and how it is commonly applied
    in everyday life situations. It will soon become apparent to you how invasive
    AI has become in modern society, whether you like it or not. Please note that
    I used the term invasive in a non-derogatory way, simply to point out that AI
    is commonly applied in many areas, some of which will surprise you. In addition,
    I also discuss the topic of business intelligence (BI), as it is very closely
    allied to AI and is often the vehicle through which AI affects most people. Some
    AI [practitioners](https://www.google.com/search?newwindow=1&client=safari&rls=en&q=practitioners&spell=1&sa=X&ved=0ahUKEwjjornY-LDQAhVJ64MKHQ74A-wQvwUIGigA)
    often refer to BI as simply AI applied in a business setting . You will learn
    that it is much more than that, however. I adopt it because it is a useful simplification.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 我试图通过首先在第一章 [1](A436848_1_En_1_Chapter.html) 中介绍人工智能来以逻辑方式安排这本书的结构。向从未听说过人工智能的人解释人工智能是困难的，尽管告诉他们人工智能经常影响他们的日常生活往往令人惊讶。我在第一章中提供了大量的细节，试图定义人工智能以及它在日常生活中的常见应用。很快你就会明白，无论你是否喜欢，人工智能在现代社会中已经变得多么具有侵略性。请注意，我使用“侵略性”一词并非贬义，只是为了指出人工智能在许多领域都有应用，其中一些可能会让你感到惊讶。此外，我还讨论了商业智能（BI）这一主题，因为它与人工智能非常紧密相关，并且通常是人工智能影响大多数人的载体。一些人工智能
    [从业者](https://www.google.com/search?newwindow=1&client=safari&rls=en&q=practitioners&spell=1&sa=X&ved=0ahUKEwjjornY-LDQAhVJ64MKHQ74A-wQvwUIGigA)
    通常将商业智能简单地称为在商业环境中应用的人工智能。然而，你将了解到它远不止于此。我采用它是因为它是一个有用的简化。
- en: I next explore some basic AI concepts in Chapter [2](A436848_1_En_2_Chapter.html)
    . There is initially some discussion regarding basic logical constructs, as they
    are important to understand inference, which is an AI core foundation. Expert
    knowledge systems are next discussed, which constitute a major portion of the
    more general knowledge management systems (KMS)—an important part of BI. The discussion
    then turns to machine learning, which is a huge research area in modern AI. Finally,
    I conclude the chapter with an introduction to fuzzy logic (FL), which is thoroughly
    demonstrated in a later book project.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我接下来在第二章 [2](A436848_1_En_2_Chapter.html) 中探讨了某些基本的人工智能概念。最初有一些关于基本逻辑结构的讨论，因为它们对于理解推理非常重要，而推理是人工智能的核心基础。接下来讨论了专家知识系统，它们构成了更广泛的知识管理系统（KMS）的主要部分——商业智能（BI）的一个重要组成部分。然后讨论转向机器学习，这是现代人工智能中的一个巨大的研究领域。最后，我在本章的结尾介绍了模糊逻辑（FL），这在后续的书籍项目中得到了充分的展示。
- en: Chapter [3](A436848_1_En_3_Chapter.html) shows you how to implement a practical
    expert system using the Prolog language. I explore some key Prolog features and
    explain how this somewhat specialized language is so useful in implementing AI
    concepts, without requiring extensive programing support as would be necessary
    if general-purpose languages such as C/C++ or Java were used for the same purposes.
    A simple console question-and-answer program is used in the practical demonstration.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 第三章 [3](A436848_1_En_3_Chapter.html) 向您展示了如何使用Prolog语言实现一个实用的专家系统。我探讨了Prolog的一些关键特性，并解释了这种相对专业的语言在实现人工智能概念时是多么有用，而不需要像使用C/C++或Java这样的通用语言那样需要大量的编程支持。在实践演示中使用了简单的控制台问答程序。
- en: Chapter [4](A436848_1_En_4_Chapter.html) focuses on using AI with games. Admittedly,
    the games are quite simple; however, the chapter’s goal is to simply demonstrate
    how AI is incorporated into gaming logic. These gaming AI concepts may then be
    easily expanded to handle much more complex games. I used Python to implement
    the games, which are controlled through a traditional text-console interface.
    Do not expect to see World of Warcraft ( WoW )–quality graphics in this chapter,
    but rest assured that WoW does use AI in its games.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 第[4](A436848_1_En_4_Chapter.html)章专注于使用游戏进行人工智能（AI）。诚然，游戏相当简单；然而，本章的目标仅仅是演示AI如何融入游戏逻辑。这些游戏AI概念可以很容易地扩展以处理更复杂的游戏。我使用Python实现了游戏，这些游戏通过传统的文本控制台界面进行控制。不要期望在本章中看到魔兽世界（WoW）级别的图形，但请放心，WoW确实在其游戏中使用了AI。
- en: In Chapter [5](A436848_1_En_5_Chapter.html) , I return to using Prolog to implement
    some fuzzy logic controls for a practical project demonstration. There is also
    a simplified expert rules system incorporated into the project. A Raspberry Pi
    system using both temperature and humidity sensors will control a virtual heating
    and cooling system.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在第[5](A436848_1_En_5_Chapter.html)章中，我回归使用Prolog来实现一些模糊逻辑控制，以进行实际项目演示。项目中还集成了简化的专家规则系统。一个使用温度和湿度传感器的树莓派系统将控制虚拟的加热和冷却系统。
- en: Chapter [6](A436848_1_En_6_Chapter.html) introduces the concept of shallow machine
    learning. A Python program is created, in which the computer “learns” your favorite
    color and make “decisions” regarding color selection. Finally, I close the chapter
    with a discussion of adaptive learning, which plays a large role in BI.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 第[6](A436848_1_En_6_Chapter.html)章介绍了浅层机器学习的概念。创建了一个Python程序，其中计算机“学习”你的最喜欢的颜色，并就颜色选择做出“决策”。最后，我通过讨论适应性学习来结束本章，适应性学习在商业智能（BI）中扮演着重要角色。
- en: Chapter [7](A436848_1_En_7_Chapter.html) continues the machine learning topic
    with an examination of machine learning using artificial neural networks (ANN).
    ANNs are by far the most prevalent AI method used to implement machine learning.
    I go through a detailed discussion on how an ANN is constructed, and then demonstrate
    an actual neural network created with Python.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 第[7](A436848_1_En_7_Chapter.html)章继续机器学习主题，通过检查使用人工神经网络（ANN）进行机器学习来展开。ANN是目前最普遍的人工智能方法，用于实现机器学习。我详细讨论了ANN的构建过程，然后演示了一个使用Python创建的实际神经网络。
- en: The machine learning continues into Chapter [8](A436848_1_En_8_Chapter.html)
    , where deep learning is discussed. In this chapter’s project I go through a detailed
    discussion on how a multi-layer ANN functions incuding the gradient search feature.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习在第[8](A436848_1_En_8_Chapter.html)章继续，其中讨论了深度学习。在本章的项目中，我详细讨论了多层人工神经网络（ANN）的功能，包括梯度搜索功能。
- en: Chapter [9](A436848_1_En_9_Chapter.html) contains two demonstrations of deep
    learning using multi-layer ANNs. The first one recognizes hand-wriiten numbers
    based on the MNIST training and test dataset. The second one uses a Pi Camera
    with a Raspberry Pi to image a hand-written number and then uses the previously
    trained ANN to determine the closest match.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 第[9](A436848_1_En_9_Chapter.html)章包含两个使用多层人工神经网络（ANN）进行深度学习的演示。第一个演示基于MNIST训练和测试数据集识别手写数字。第二个演示使用带有树莓派（Raspberry
    Pi）的Pi相机来捕捉手写数字的图像，然后使用之前训练好的ANN来确定最接近的匹配。
- en: Chapter [10](A436848_1_En_10_Chapter.html) deals with evolutionary computing
    (EC), which encompasses, but is not limited to, evolutionary programming, genetic
    algorithms and genetic programming. I have provided several interesting demonstrations
    highlighting some of the EC features to provide you with a good introduction to
    this fascinating field.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 第[10](A436848_1_En_10_Chapter.html)章讨论了进化计算（EC），它包括但不限于进化编程、遗传算法和遗传编程。我提供了几个有趣的演示，突出了一些进化计算的特点，为你提供对这个迷人领域的良好介绍。
- en: Chapter [11](A436848_1_En_11_Chapter.html) discusses subsumption, which is a
    behavior-based robotic study area. It is closely allied with AI. I use the robot
    car first introduced in Chapter [7](A436848_1_En_7_Chapter.html) to conduct several
    demonstrations. You will quickly realize that a robot employing subsumption behaviors
    can remarkably mimic actual human behavior, thus completing the AI loop between
    human thinking and motor behavior.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 第[11](A436848_1_En_11_Chapter.html)章讨论了包含，这是一个基于行为的研究领域。它与人工智能紧密相关。我使用在第[7](A436848_1_En_7_Chapter.html)章首次介绍的机器人汽车进行几个演示。你将很快意识到，采用包含行为的机器人可以非常出色地模仿实际的人类行为，从而完成人类思维和运动行为之间的人工智能循环。
- en: I am quite confident that after reading through this book and duplicating most—if
    not all the projects and demonstrations, you will come away with an excellent
    appreciation of AI and how to incorporate it into your future projects.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我非常自信，在阅读完这本书并复制了大部分——如果不是全部的项目和演示之后，你将对人工智能以及如何将其融入你未来的项目中有一个出色的理解。
