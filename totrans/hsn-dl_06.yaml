- en: Padding
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: At times the convolution operation cannot traverse the whole image. For example,
    if the size of the input image is 5 × 5, the size of the kernel is 3 × 3, and
    the stride is 3, there will be a problem. This can be resolved by padding the
    image with zeros. For example, consider an image of size 5 × 5; padding of p =
    2 will result in an image of size 9 × 9, as shown in Figure [6-5](#Fig5).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_6_Chapter/611710_1_En_6_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6-5
