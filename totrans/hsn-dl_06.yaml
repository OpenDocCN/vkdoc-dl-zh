- en: If the size of an image is 20 × 20, that of the kernel is 5 × 5, and stride
    = 1, what should be the value of p so that the size of the output image is the
    same as that of the input?
  id: totrans-250
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果图像的大小是20×20，核的大小是5×5，步长=1，那么为了使输出图像的大小与输入图像相同，p的值应该是多少？
- en: If the size of an image is 20 × 20, that of the kernel is 5 × 5, and stride
    = 2, what should be the size of the output image if p = 1 and p = 2?
  id: totrans-251
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果图像的大小是20×20，核的大小是5×5，步长=2，那么当p=1和p=2时，输出图像的大小应该是多少？
- en: If the size of an image is 20 × 20, that of the kernel is 5 × 5, and stride
    = 1, what should be the size of the output if p = 0?
  id: totrans-252
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果图像的大小是20×20，核的大小是5×5，步长=1，那么当p=0时，输出的大小应该是多少？
- en: In the above case, if s = 2, what should be the size of the output image?
  id: totrans-253
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在上述情况下，如果s=2，输出图像的大小应该是多少？
- en: Find the size of the kernel that produces an image of size 20, for an input
    image of size 20, if the value of p is 2 and s = 1.
  id: totrans-254
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果输入图像的大小为20，p的值为2且s=1，那么产生大小为20的图像的核的大小是多少？
- en: Applications
  id: totrans-255
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 应用
- en: State the filters for finding the horizontal and vertical lines.
  id: totrans-256
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 列出用于查找水平和垂直线的滤波器。
- en: Suggest a filter for finding diagonals in an image.
  id: totrans-257
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 建议一个用于在图像中查找对角线的滤波器。
- en: What happens if the rows containing 2s are swapped with the row containing -2s
    in the following kernel?
  id: totrans-258
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果在以下核中将包含2s的行与包含-2s的行交换会发生什么？
- en: Can you find both horizontal and vertical lines using a single filter?
  id: totrans-259
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你可以使用单个滤波器找到水平和垂直线吗？
- en: Can the above task be accomplished using two filters?
  id: totrans-260
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 能否使用两个过滤器完成上述任务？
- en: You are required to classify the images of oranges and apples. The images are
    of size 100 × 100\. Suggest a Multi-layer Perceptron to accomplish this task.
    Also implement the network using Keras.
  id: totrans-261
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您需要对橙子和苹果的图片进行分类。这些图片的尺寸为 100 × 100。建议使用多层感知器来完成这项任务。同时，使用 Keras 实现网络。
- en: Accomplish the above task using a CNN. (The reader may attempt this after reading
    the next chapter.)
  id: totrans-262
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用卷积神经网络（CNN）完成上述任务。（读者可以在阅读下一章后尝试此任务。）
- en: Compare the number of learnable weights in the above two structures.
  id: totrans-263
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 比较上述两种结构中可学习的权重量。
