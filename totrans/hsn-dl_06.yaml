  zh: '![图片](../images/611710_1_En_6_Chapter/611710_1_En_6_Figp_HTML.jpg)'
- en: Note that the first two kernels can find horizontal lines and the next two kernels
    can find vertical lines. Likewise, some kernels can find diagonals, and so on.
    If the information obtained by the application of some kernels is combined, the
    texture information regarding the input can be retrieved. This is what the convolution
    operation does. Moreover, in the above discussion, the kernels were chosen. In
    CNN, kernels are learned, which makes the output quite informative. This output
    can, hence, extract the information regarding the texture of a given image in
    a better way. The above discussion will help the reader appreciate the need for
    multiple kernels.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，前两个核可以找到水平线，接下来的两个核可以找到垂直线。同样，一些核可以找到对角线，等等。如果将某些核应用获得的信息结合起来，就可以检索到关于输入的纹理信息。这就是卷积操作所做的事情。此外，在上面的讨论中，选择了核。在CNN中，核是通过学习得到的，这使得输出非常具有信息量。因此，这种输出可以更好地提取给定图像的纹理信息。上述讨论将帮助读者理解需要多个核的原因。
- en: Having studied various types of layers in a CNN, let us consider one of the
    simplest CNNs called LeNet, which is capable of recognizing handwritten digits.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 在研究了CNN中各种类型的层之后，让我们考虑一种称为LeNet的最简单的CNN，它能够识别手写数字。
- en: Architecture of LeNet
  id: totrans-174
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LeNet架构
- en: 'LeNet was introduced in 1998 by LeCun et al. in the paper titled “Gradient-Based
    Learning Applied to Document Recognition.” The original paper described the LeNet
    5 architecture, which had the following layers:'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: LeNet由LeCun等人于1998年在题为“应用于文档识别的基于梯度的学习”的论文中引入。原始论文描述了LeNet 5架构，它具有以下层：
- en: 'Convolution: 6 layers having kernel size = 5, stride = 1, output = 28 × 28'
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 卷积：6层，核大小 = 5，步长 = 1，输出 = 28 × 28
- en: 'Sub-sampling: Average pooling output = 14 × 14'
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 子采样：平均池化输出 = 14 × 14
- en: 'Convolution: 16 layers having kernel size = 5, stride = 1'
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 卷积：16层，核大小 = 5，步长 = 1
- en: 'Sub-sampling: Average pooling output'
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 子采样：平均池化输出
- en: 'Convolution: 120 layers having kernel size = 5, stride = 1'
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 卷积：120层，核大小 = 5，步长 = 1
- en: Flatten layer
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 展平层
- en: 'Dense layer: 84 neurons, activation = tanh'
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 密集层：84个神经元，激活函数 = tanh
- en: 'Dense layer: 10 neurons, activation = softmax'
  id: totrans-183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 密集层：10个神经元，激活函数 = softmax
- en: The original paper describing LeNet can be found at [http://​vision.​stanford.​edu/​cs598_​spring07/​papers/​Lecun98.​pdf](http://vision.stanford.edu/cs598_spring07/papers/Lecun98.pdf).
    Note that by stacking alternate layers of convolution and pooling followed by
    some fully connected layers, some interesting architectures can be crafted. The
    next chapter presents the Keras implementation of each of the layers discussed
    above and discusses the design of a sequential model. However, the reader may
    refer to the following code, which implements LeNet and presents its application
    with the popular MNIST dataset containing images of handwritten digits.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 描述LeNet的原始论文可以在[http://vision.stanford.edu/cs598_spring07/papers/Lecun98.pdf](http://vision.stanford.edu/cs598_spring07/papers/Lecun98.pdf)找到。请注意，通过堆叠交替的卷积和池化层，然后是一些全连接层，可以构建一些有趣的架构。下一章将介绍上述每个层的Keras实现，并讨论顺序模型的设计。然而，读者可以参考以下代码，它实现了LeNet，并展示了其与包含手写数字图像的流行MNIST数据集的应用。
- en: '[PRE16]'
  id: totrans-185
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
