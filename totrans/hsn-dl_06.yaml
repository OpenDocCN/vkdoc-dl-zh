- en: '![](../images/611710_1_En_6_Chapter/611710_1_En_6_Figc_HTML.jpg)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/611710_1_En_6_Chapter/611710_1_En_6_Figc_HTML.jpg)'
- en: Note that in the first output, the vertical lines are prominent and in the second,
    the horizontal lines are prominent. This is what a kernel is expected to do. We
    may have a kernel that finds the vertical lines, another may find the horizontal
    lines, and yet another finds the inclined ones. Having ***more than one kernel***
    will yield important features of a given image.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，在第一个输出中，垂直线很突出，而在第二个输出中，水平线很突出。这正是核预期要做的。我们可能有一个找到垂直线的核，另一个找到水平线的核，还有一个找到斜线的核。拥有**多个核**将产生给定图像的重要特征。
- en: Now, take a pause and think, What if the weights of a kernel could be ***learned***?
    That would be wonderful! This will ***allow the layer to find requisite features
    from a given image*** and may help in tasks like classification and so on. The
    importance of these kernels is explained in section “Importance of Kernels.”
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，暂停一下并思考，如果核的权重可以被**学习**会怎样？那将太棒了！这将**允许层从给定的图像中找到所需特征**，并可能有助于分类等任务。这些核的重要性在“核的重要性”部分中解释。
- en: Padding
  id: totrans-68
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 填充
- en: At times the convolution operation cannot traverse the whole image. For example,
    if the size of the input image is 5 × 5, the size of the kernel is 3 × 3, and
    the stride is 3, there will be a problem. This can be resolved by padding the
    image with zeros. For example, consider an image of size 5 × 5; padding of p =
    2 will result in an image of size 9 × 9, as shown in Figure [6-5](#Fig5).
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 有时卷积操作无法遍历整个图像。例如，如果输入图像的大小是5 × 5，核的大小是3 × 3，步长是3，就会出现问题。这可以通过用零填充图像来解决。例如，考虑一个5 × 5大小的图像；p
    = 2的填充将导致一个9 × 9大小的图像，如图[6-5](#Fig5)所示。
- en: '![](../images/611710_1_En_6_Chapter/611710_1_En_6_Fig5_HTML.jpg)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/611710_1_En_6_Chapter/611710_1_En_6_Fig5_HTML.jpg)'
- en: Figure 6-5
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-5
- en: Input image is padded with zeros (p = 2).
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 输入图像通过填充零（p = 2）进行填充。
- en: 'The following code implements padding. The function takes the image (dimensions:
    *n* × *m*) and the value of p as a parameter and produces an image of dimensions'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 以下代码实现了填充。该函数接受图像（尺寸：*n* × *m*）和p的值作为参数，并生成一个尺寸为
- en: '![$$ \left(n+2p\right)\times \left(m+2p\right). $$](../images/611710_1_En_6_Chapter/611710_1_En_6_Chapter_TeX_Eque.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \left(n+2p\right)\times \left(m+2p\right). $$](../images/611710_1_En_6_Chapter/611710_1_En_6_Chapter_TeX_Eque.png)'
- en: Here, a random array is created, and padding of p = 2 is applied to the so-formed
    image.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，创建了一个随机数组，并对形成的图像应用了p = 2的填充。
