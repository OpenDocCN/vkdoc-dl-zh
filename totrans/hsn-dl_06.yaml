- en: 'It may also be noted that in the case of padding, the dimensions of the output
    field change. The dimensions of the output, if the padding is P, kernel size is
    F, and stride is S, can be calculated using the following formulas:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ W\kern0.5em =\kern0.5em \frac{\left(W-F+2P\right)}{S}+1 $$](../images/611710_1_En_6_Chapter/611710_1_En_6_Chapter_TeX_Equf.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ H\kern0.5em =\kern0.5em \frac{\left(H-F+2P\right)}{S}+1 $$](../images/611710_1_En_6_Chapter/611710_1_En_6_Chapter_TeX_Equg.png)'
  prefs: []
  type: TYPE_IMG
- en: Stride and Other Layers
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Having seen the implementation of the convolutional layer and padding, let us
    now move to pooling. However, before that let’s have a quick look at the idea
    of stride.
  prefs: []
  type: TYPE_NORMAL
- en: Stride
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The number of steps by which the kernel moves forward, in a unit of time, is
    referred to as stride. In the above discussion and implementation, the stride
    was taken as 1\. Figure [6-6](#Fig6) considers the value of stride as 2.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_6_Chapter/611710_1_En_6_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6-6
  prefs: []
  type: TYPE_NORMAL
- en: Stride = 2
  prefs: []
  type: TYPE_NORMAL
- en: Note that the more the value of s, the lesser the size of the output image.
    In general, with stride s, the size of the output will be given by a formula given
    below.
  prefs: []
  type: TYPE_NORMAL
- en: Pooling
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Generally, a pooling layer is inserted between two consecutive convolutional
    layers. This ***helps in reducing the size of the existing representation***.
    This size reduction is important because of two reasons: firstly, in reducing
    the number of parameters, and, secondly, in controlling the overfitting of the
    model. As per the literature review, pooling can be done by (a) taking out the
    maximum of the given window or (b) by taking the average or (c) taking the sum.
    So, if the size of the window is *W* × *H* × *D* and the spatial extent of the
    pooling layer is F, then the size of the output layer is given by'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ W\kern0.5em =\kern0.5em \frac{\left(W-F\right)}{S}+1 $$](../images/611710_1_En_6_Chapter/611710_1_En_6_Chapter_TeX_Equh.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ H\kern0.5em =\kern0.5em \frac{\left(H-F\right)}{S}+1 $$](../images/611710_1_En_6_Chapter/611710_1_En_6_Chapter_TeX_Equi.png)'
  prefs: []
  type: TYPE_IMG
- en: while the depth, that is, D, remains the same.
  prefs: []
  type: TYPE_NORMAL
- en: It may also be noted that max pooling is more popular as compared with all other
    types of pooling. The following code carries out the pooling of a given image.
    The reader is expected to observe the images after and before applying the pooling
    operation and figure out why an object can be recognized even after applying pooling.
  prefs: []
  type: TYPE_NORMAL
- en: '`Code:`'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: Note that replacing “ans = np.max(arr)” with “ans = np.sum(arr)” will result
    in sum pooling and “np.mean” will result in average pooling.
  prefs: []
  type: TYPE_NORMAL
- en: Normalization
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The concept of the normalization layer was introduced for mimicking the inhibition
    scheme of our brain. However, they have not proved to be much of a benefit; thus,
    they are not much in use. There are various types of normalization techniques,
    some of which are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: Local response normalization layer (same map)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Local response normalization layer (across maps)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Local contrast normalization layer
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The interested readers may refer to the References given at the end of this
    Chapter for more details.
  prefs: []
  type: TYPE_NORMAL
- en: Fully Connected Layer
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As the name suggests, in this layer, each neuron in a layer is connected to
    each neuron of the previous layer. Thus, we can say that they behave as a normal
    Neural Network. The topic has already been discussed in the previous chapters.
  prefs: []
  type: TYPE_NORMAL
- en: Importance of Kernels
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Having seen the basics of each type of layer, let us move back to the importance
    of kernels, which are the most important components of a CNN. Consider Pattern
    1\. The kernel shown in Figure [6-7](#Fig7) finds the horizontal lines in the
    pattern. When the convolution operation is applied to the pattern with this kernel,
    the picture shown in the output that follows is produced. Note that if the kernel
    is slightly changed, a slightly different output is produced. The outputs show
    the regions where the line starts and ends. The reader is expected to run the
    code, which follows, and identify the intensities of the lighter and the darker
    lines in the output. As a matter of fact, they represent the positive and negative
    edges.
