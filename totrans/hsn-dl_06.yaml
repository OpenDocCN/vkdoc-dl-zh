- en: Note that the first two kernels can find horizontal lines and the next two kernels
    can find vertical lines. Likewise, some kernels can find diagonals, and so on.
    If the information obtained by the application of some kernels is combined, the
    texture information regarding the input can be retrieved. This is what the convolution
    operation does. Moreover, in the above discussion, the kernels were chosen. In
    CNN, kernels are learned, which makes the output quite informative. This output
    can, hence, extract the information regarding the texture of a given image in
    a better way. The above discussion will help the reader appreciate the need for
    multiple kernels.
  prefs: []
  type: TYPE_NORMAL
- en: Having studied various types of layers in a CNN, let us consider one of the
    simplest CNNs called LeNet, which is capable of recognizing handwritten digits.
  prefs: []
  type: TYPE_NORMAL
- en: Architecture of LeNet
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'LeNet was introduced in 1998 by LeCun et al. in the paper titled “Gradient-Based
    Learning Applied to Document Recognition.” The original paper described the LeNet
    5 architecture, which had the following layers:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Convolution: 6 layers having kernel size = 5, stride = 1, output = 28 × 28'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Sub-sampling: Average pooling output = 14 × 14'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Convolution: 16 layers having kernel size = 5, stride = 1'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Sub-sampling: Average pooling output'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Convolution: 120 layers having kernel size = 5, stride = 1'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Flatten layer
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Dense layer: 84 neurons, activation = tanh'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Dense layer: 10 neurons, activation = softmax'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The original paper describing LeNet can be found at [http://​vision.​stanford.​edu/​cs598_​spring07/​papers/​Lecun98.​pdf](http://vision.stanford.edu/cs598_spring07/papers/Lecun98.pdf).
    Note that by stacking alternate layers of convolution and pooling followed by
    some fully connected layers, some interesting architectures can be crafted. The
    next chapter presents the Keras implementation of each of the layers discussed
    above and discusses the design of a sequential model. However, the reader may
    refer to the following code, which implements LeNet and presents its application
    with the popular MNIST dataset containing images of handwritten digits.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: '![](../images/611710_1_En_6_Chapter/611710_1_En_6_Figq_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '![](../images/611710_1_En_6_Chapter/611710_1_En_6_Figr_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The next chapter revisits LeNet and compares it with AlexNet. It also discusses
    why this architecture works wonders with handwritten digits but does not perform
    well with complex images.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The previous chapters of this book discussed MLP. There are two major problems
    with these methods:'
  prefs: []
  type: TYPE_NORMAL
- en: In these networks the number of connections is huge; therefore, the learning
    requires many inputs and takes time.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This model does not take into account the spatial correlation.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This chapter introduced the components of Convolutional Neural Networks. It
    discusses the importance of convolution and presents the implementations of the
    pooling layer, the convolutional layer, etc. Also, the convolution operation explained
    is slightly different from the mathematical convolution.
  prefs: []
  type: TYPE_NORMAL
- en: The reader should be able to implement the layers from scratch using NumPy after
    reading this chapter. Also, the reader is expected to appreciate the importance
    of multiple kernels in CNN. However, one need not implement everything from scratch;
    Keras provides the implementations of all the layers. The next chapter ***introduces
    Keras*** and explains the implementation of layers using Keras. The chapter also
    introduces some of the most ***important CNNs and their implementations***. It
    will empower you with the most powerful weapons to fight the problems of image
    analysis. To conclude, we started with neurocognition. The following image (Figure
    [6-9](#Fig9)) of neurocognition has been generated by AI ([https://​gencraft.​com/​generate](https://gencraft.com/generate))
    and uses CNN.
  prefs: []
  type: TYPE_NORMAL
