  type: TYPE_NORMAL
  zh: 现在，考虑模式2。图[6-8](#Fig8)中显示的核在模式中找到垂直线。当将卷积操作应用于具有此核的模式时，输出中产生的是该图片。请注意，如果核稍微改变，就会产生略微不同的输出。输出显示了线条开始和结束的区域。预期读者运行下面的代码，并识别输出中亮线和暗线的强度。再次强调，它们代表正边缘和负边缘。
