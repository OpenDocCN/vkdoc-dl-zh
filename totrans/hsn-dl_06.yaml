- en: '6. Convolutional Neural Networks: I'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Hubel and Wiesel proposed that the pattern recognition tasks in monkeys and
    cats use two types of cells, one of which has a larger receptive field. The output
    of this field does not depend on the location of the edges in the field. This
    inspired Kunihiko Fukushima to introduce neo-cognition, which in turn inspired
    convolutional and downsampling layers in Neural Networks, called Convolutional
    Neural Networks (CNNs). Backpropagation was used in the CNNs by Yann LeCun, a
    French computer scientist and the recipient of the prestigious Turing Award. LeNet,
    the first CNN, could recognize handwritten digits. Ignored initially, the CNNs
    got their due share in 2012, with the advent of AlexNet. CNNs have been successfully
    applied to image classification, object detection, and disease prediction and
    even in digital arts. They have shown better performance compared with the existing
    Neural Networks and are being extensively used in numerous disciplines.
  prefs: []
  type: TYPE_NORMAL
- en: Let us begin our discussion with the comparison of the Multi-layer Perceptron
    (MLP) and Convolutional Neural Networks. The former has already been discussed
    in the previous chapters. The MLP has an input layer, an output layer, and at
    least one hidden layer. A neuron in a hidden layer receives inputs, multiplies
    them with weights, and adds biases to the product. The result is then fed to an
    activation function. The output of this neuron may act as an input to another
    neuron. The forward pass is followed by a backward pass. Convolutional Neural
    Networks follow the same principle but are specifically designed for images. They
    use the modified convolution operator to extract the feature maps. These models
    have many types of layers like the convolutional layer, which helps in finding
    the feature maps; the pooling layer, which helps in downsampling; the activation
    layer; and fully connected layers. This chapter discusses the various types of
    layers in CNN and explains their need. It may be noted that only some of these
    layers have hyperparameters and learn the weights. Figure [6-1](#Fig1) summarizes
    the discussion.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_6_Chapter/611710_1_En_6_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6-1
  prefs: []
  type: TYPE_NORMAL
- en: Components of a CNN
  prefs: []
  type: TYPE_NORMAL
- en: The reader may take note of the fact that there are notable differences between
    MLP and CNN. In MLP the neurons of a layer ***do not share connections***, whereas,
    in the case of CNN, they do. This is important. For example, consider a fully
    connected neural network that takes a grayscale image that has dimensions 300 × 300 × 1
    as input, has 50 neurons in the output layer, and 100 neurons in hidden layers;
    then the learnable weights will be 100 × 300 × 300 + 50 × 100 = 9000000 + 5000 = 9005000\.
    Along with these, there will be 150 biases, thus resulting in 90050150 learnable
    parameters. The CNN uses filters, explained in the following sections. If a 10 × 10
    filter is used for extracting the relevant features, then there will be 101 (one
    bias) learnable parameters. Even if there are ten such filters, the number of
    learnable parameters will be 1010\. Likewise, there will be some learnable parameters
    in the output`–`hidden layers. The total number of ***learnable parameters***
    ***is still much fewer compared*** with a fully connected MLP. This chapter explores
    the idea of filters and the need for many filters.
  prefs: []
  type: TYPE_NORMAL
- en: So, in a fully connected MLP, each neuron is connected to all the neurons in
    the previous layer, whereas in the case of a CNN, some neurons are connected to
    only a portion of the previous layer. This gives rise to the concept of shared
    weights. The earlier layers of a CNN are expected to find ***low-level features***
    like edges, and the later layers are expected to find ***high-level features***.
    Moreover, this connection of a filter to a small portion of the previous layer
    results in a type of regularization. Moreover, CNNs are translation and rotation
    invariant. This makes sense as in a recognition task; we would like to find an
    object irrespective of its position in the image. Likewise, even if the object
    is rotated, the model should be able to find the object.
  prefs: []
  type: TYPE_NORMAL
- en: Tip
  prefs: []
  type: TYPE_NORMAL
- en: CNN vs. MLP
  prefs: []
  type: TYPE_NORMAL
- en: CNNs take into account spatial correlation; MLPs do not.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: CNNs have fewer learnable parameters.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: CNNs are translation and rotation invariant.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This chapter introduces the components of CNN. The implementation of these units
    from scratch will not only help the reader in understanding the working of the
    component but will also empower them to make changes in the component as and when
    required. The chapter has been organized as follows. Section “Convolutional Layer”
    discusses the convolution operator. The next section, “Implementing Convolution,”
    presents the implementation of the convolution operator and discusses its importance.
    The next section, “Padding,” discusses padding. The next section, “Stride and
    Other Layers,” explains stride and discusses other layers, and the next section,
    “Importance of Kernels,” explains the importance of convolution. This is followed
    by a brief introduction to LeNet, the first CNN. The last section concludes.
  prefs: []
  type: TYPE_NORMAL
- en: Convolutional Layer
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this layer, filters ***extract features from the input tensor*** and ***create
    a feature map***. To understand this, consider a grayscale image, which can be
    represented as a matrix having values ranging between 0 and 255\. A 2D kernel
    is a filter that is expected to find the prominent features of the given image.
    The convolution of the given image and the kernel give the output. For example,
    if the input is a matrix of dimension 8 × 8 and a kernel has dimension 3 × 3,we
    initially place the kernel at the top-left corner of the matrix and find the sum
    of the products of the corresponding elements. Consider, for example, the input
    image and the kernel shown in Figure [6-2](#Fig2). The result of the initial convolution
    operation would be 120.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_6_Chapter/611710_1_En_6_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6-2
  prefs: []
  type: TYPE_NORMAL
- en: The convolution operation
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \mathrm{Result}=8\times 1+7\times 2+6\times 3+5\times 4+4\times 5+3\times
    6+2\times 7+1\times 8+0\times 9 $$](../images/611710_1_En_6_Chapter/611710_1_En_6_Chapter_TeX_Equa.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ =8+14+18+20+20+18+14+8+0 $$](../images/611710_1_En_6_Chapter/611710_1_En_6_Chapter_TeX_Equb.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ =120 $$](../images/611710_1_En_6_Chapter/611710_1_En_6_Chapter_TeX_Equc.png)'
  prefs: []
  type: TYPE_IMG
- en: Now, let’s shift the kernel one step to the right and find the sum of products
    again. The amount by which the kernel moves in a unit of time is called **stride**.
    Note that there will be six such products for the first row (Figure [6-3](#Fig3)).
    Likewise, there will be six such rows. That is, this operation will result in
    six values per row and six such rows. The output will, therefore, be a 6 × 6 matrix.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_6_Chapter/611710_1_En_6_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6-3
  prefs: []
  type: TYPE_NORMAL
- en: With stride = 1, kernel size = 3, and input size = 8, there will be six outputs,
    for each row
  prefs: []
  type: TYPE_NORMAL
- en: In general, for input size *n* × *n*, kernel size *k* × *k*, and stride *s*,
    the size of the output will be
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ m=\frac{n-k}{s}+1\. $$](../images/611710_1_En_6_Chapter/611710_1_En_6_Chapter_TeX_Equd.png)'
  prefs: []
  type: TYPE_IMG
- en: Having seen the working of this layer, let us now move to the implementation
    of this operation. The reader may note that this convolution operation is not
    the same as that in signal processing.
  prefs: []
  type: TYPE_NORMAL
- en: Implementing Convolution
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To understand the advantages of this operation, consider the following kernels.
    The convolution of the first kernel (kernel-1) with the image results in a feature
    map in which the horizontal lines can be seen. Likewise, the convolution of kernel-2
