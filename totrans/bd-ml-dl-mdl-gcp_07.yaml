- en: '[PRE34]'
  id: totrans-281
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: This chapter provides an example overview of working with Dataprep to visually
    explore and transform large datasets on GCP by using the Google Cloud Dataflow
    infrastructure for distributed processing. In the next chapter, we will introduce
    working with Cloud Dataflow for building custom data transformation pipelines.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 本章节提供了一个使用 Google Cloud Dataflow 分布式处理基础设施通过 Dataprep 进行可视化和转换大型数据集的示例概述。在下一章中，我们将介绍如何使用
    Cloud Dataflow 构建自定义数据转换管道。
- en: 40. Google Cloud Dataflow
  id: totrans-283
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 40. Google Cloud Dataflow
- en: Google Cloud Dataflow provides a serverless, parallel, and distributed infrastructure
    for running jobs for batch and stream data processing. One of the core strengths
    of Dataflow is its ability to almost seamlessly handle the switch from processing
    of batch historical data to streaming datasets while elegantly taking into consideration
    the perks of streaming processing such as windowing. Dataflow is a major component
    of the data/ML pipeline on GCP. Typically, Dataflow is used to transform humongous
    datasets from a variety of sources such as Cloud Pub/Sub or Apache Kafka to a
    sink such as BigQuery or Google Cloud Storage.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: Google Cloud Dataflow 提供了一种无服务器、并行和分布式的基础设施，用于运行批量和流数据处理的作业。Dataflow 的核心优势之一是它几乎无缝地处理从批量历史数据处理到流数据集的转换，同时优雅地考虑了流处理的优点，如窗口功能。Dataflow
    是 GCP 上数据/ML 管道的一个主要组件。通常，Dataflow 用于将来自各种来源的庞大数据集（如 Cloud Pub/Sub 或 Apache Kafka）转换为像
    BigQuery 或 Google Cloud Storage 这样的目标。
- en: Critical to Dataflow is the use of the Apache Beam programming model for building
    the parallel data processing pipelines for batch and stream operations. The data
    processing pipelines built with the Beam SDKs can be executed on various processing
    backends such as Apache Apex, Apache Spark, Apache Flink, and of course Google
    Cloud Dataflow. In this section, we will build data transformation pipelines using
    the Beam Python SDK. As of this time of writing, Beam also supports building data
    pipelines using Java, Go, and Scala languages.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 对于 Dataflow 来说，使用 Apache Beam 编程模型来构建批量和流操作的并行数据处理管道至关重要。使用 Beam SDKs 构建的数据处理管道可以在
    Apache Apex、Apache Spark、Apache Flink 和当然还有 Google Cloud Dataflow 等各种处理后端上执行。在本节中，我们将使用
    Beam Python SDK 构建数据转换管道。截至撰写本文时，Beam 还支持使用 Java、Go 和 Scala 语言构建数据管道。
- en: Beam Programming
  id: totrans-286
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Beam 编程
- en: 'Apache Beam provides a set of broad concepts to simplify the process of building
    a transformation pipeline for distributed batch and stream jobs. We’ll go through
    these concepts providing simple code samples:'
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: Apache Beam 提供了一套广泛的概念，以简化构建分布式批量和流作业的转换管道的过程。我们将通过提供简单的代码示例来介绍这些概念：
- en: 'A Pipeline: A Pipeline object wraps the entire operation and prescribes the
    transformation process by defining the input data source to the pipeline, how
    that data will be transformed, and where the data will be written. Also, the Pipeline
    object indicates the distributed processing backend to execute on. Indeed, a Pipeline
    is the central component of a Beam execution. Code for creating a pipeline is
    as shown in the following:'
  id: totrans-288
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 管道：管道对象封装了整个操作，并通过定义管道的输入数据源、数据如何转换以及数据将写入的位置来规定转换过程。此外，管道对象还指示要执行的分布式处理后端。实际上，管道是
    Beam 执行的中心组件。创建管道的代码如下所示：
- en: '[PRE35]'
  id: totrans-289
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE35]'
- en: In the preceding code snippet, the Pipeline object is configured using ‘PipelineOptions’
    to set the required fields. This can be done both programmatically and from the
    command line.
  id: totrans-290
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在前述代码片段中，使用‘PipelineOptions’配置管道对象以设置所需的字段。这可以通过程序化和从命令行两种方式完成。
- en: 'A PCollection : A PCollection is used to define a data source. The data source
    can either be *bounded* or *unbounded.* A bounded data source refers to batch
    or historical data, whereas an unbounded data source refers to streaming data.
    Beam uses a technique called *windowing* to partition unbounded PCollections into
    finite logical segments using some attribute of the data such as a timestamp.
    PCollections can also be created from in-memory data where PCollections are both
    the inputs and outputs for a particular step in the pipeline. Let’s see an example
    of reading a csv data from an external source:'
  id: totrans-291
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: PCollection：PCollection 用于定义数据源。数据源可以是 *有界* 或 *无界* 的。有界数据源指的是批量或历史数据，而无界数据源指的是流数据。Beam
    使用一种称为 *窗口* 的技术，通过使用数据的某些属性（如时间戳）将无界 PCollections 分割成有限逻辑段。PCollections 还可以从内存中的数据创建，在这种情况下，PCollections
    是管道中特定步骤的输入和输出。让我们看看从外部源读取 csv 数据的示例：
- en: '[PRE36]'
  id: totrans-292
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE36]'
- en: The pipe operator ‘|’ in the preceding code is also called the apply method
    and is used to apply the PCollection to the pipeline instantiated as ‘p’.
  id: totrans-293
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 前述代码中的管道操作符‘|’也称为应用方法，用于将 PCollection 应用到作为‘p’实例化的管道中。
- en: 'A PTransform: A PTransform refers to a particular transformation task carried
    out on one or more PCollections in the pipeline. PTransforms can be applied to
    PCollections as follows.'
  id: totrans-294
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: PTransform：PTransform 指的是在管道中的一个或多个 PCollections 上执行的特殊转换任务。PTransform 可以按以下方式应用于
    PCollections。
- en: '[PRE37]'
  id: totrans-295
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE37]'
- en: Note that while a PTransform creates a new PCollection, it does not modify or
    alter the input collection. A number of core Beam transforms include
  id: totrans-296
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 注意，虽然 PTransform 创建了一个新的 PCollection，但它不会修改或更改输入集合。许多核心 Beam 转换包括
- en: 'ParDo: For parallel processing'
  id: totrans-297
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: ParDo：用于并行处理
- en: 'GroupByKey: For processing collections of key/value pairs'
  id: totrans-298
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: GroupByKey：用于处理键/值对集合
- en: 'CoGroupByKey: For a relational join of two or more key/value PCollections with
    the same key type'
  id: totrans-299
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: CoGroupByKey：用于具有相同键类型的两个或多个键/值 PCollection 的关系连接
- en: 'Combine: For combining collections of elements or values in your data'
  id: totrans-300
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: Combine：用于合并数据中的元素或值集合
- en: 'Flatten: For merging multiple PCollection objects'
  id: totrans-301
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: Flatten：用于合并多个 PCollection 对象
- en: 'Partition: Splits a single PCollection into smaller collections'
  id: totrans-302
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: Partition：将单个 PCollection 分割成更小的集合
- en: 'I/O transforms: These are PTransforms that read or write data to different
    external storage systems. Some of the currently available I/O transforms working
    with Beam Python SDK include'
  id: totrans-303
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: I/O 转换：这些是读取或写入不同外部存储系统的 PTransforms。目前与 Beam Python SDK 一起工作的某些可用 I/O 转换包括
- en: 'avroio: For reading from and writing to an Avro file'
