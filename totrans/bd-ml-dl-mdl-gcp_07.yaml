  id: totrans-210
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用流程转换数据
- en: 'A Dataprep flow is an object created to organize and manage the datasets and
    operations that are involved in data cleaning and transformation process:'
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: Dataprep流程是一个创建的对象，用于组织和管理工作在数据清理和转换过程中涉及的数据集和操作：
- en: We begin by creating a flow by clicking the ‘Create Flow’ button in the top-right
    corner of the Dataprep dashboard (see Figure [39-4](#Fig4)). Enter the user-defined
    flow name and click ‘Create’ as shown in Figure [39-5](#Fig5). The Flow page is
    shown in Figure [39-6](#Fig6).
  id: totrans-212
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们首先通过点击Dataprep仪表板右上角的“创建流程”按钮来创建一个流程（见图[39-4](#Fig4)）。输入用户定义的流程名称，然后点击“创建”，如图[39-5](#Fig5)所示。流程页面如图[39-6](#Fig6)所示。
