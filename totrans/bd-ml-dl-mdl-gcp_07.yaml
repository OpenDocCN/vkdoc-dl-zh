- en: Spot Checking Machine Learning Algorithms
  id: totrans-804
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 断点检查机器学习算法
- en: 'With our reduced dataset, let’s sample a few candidate algorithms to have an
    idea on their performance and which is more likely to work best for this problem
    domain. Let’s take the following steps:'
  id: totrans-805
  prefs: []
  type: TYPE_NORMAL
  zh: 使用我们的缩减数据集，让我们采样一些候选算法，以了解它们的性能以及哪个更有可能在这个问题域中表现最佳。让我们采取以下步骤：
- en: The dataset is split into a design matrix and their corresponding label vector.
  id: totrans-806
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据集被分为设计矩阵及其相应的标签向量。
- en: Randomly split the dataset into a training set and a test set.
  id: totrans-807
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随机将数据集分为训练集和测试集。
- en: '[PRE102]'
  id: totrans-808
  prefs: []
  type: TYPE_PRE
  zh: '[PRE102]'
- en: Outline the candidate algorithms to create a model.
  id: totrans-809
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 概述候选算法以创建模型。
- en: '[PRE103]'
  id: totrans-810
  prefs: []
  type: TYPE_PRE
  zh: '[PRE103]'
- en: Create a dictionary of the candidate algorithms.
  id: totrans-811
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建候选算法的字典。
- en: '[PRE104]'
  id: totrans-812
  prefs: []
  type: TYPE_PRE
  zh: '[PRE104]'
- en: For each candidate algorithm, train with the training set and evaluate on the
    hold-out test set.
  id: totrans-813
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于每个候选算法，使用训练集进行训练，并在保留的测试集上进行评估。
- en: '[PRE105]'
  id: totrans-814
  prefs: []
  type: TYPE_PRE
  zh: '[PRE105]'
- en: The plots of the model performances are shown in Figure [44-3](#Fig3).
  id: totrans-815
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型性能的图表显示在图[44-3](#Fig3)中。
- en: '[PRE106]'
  id: totrans-816
  prefs: []
  type: TYPE_PRE
  zh: '[PRE106]'
- en: '![../images/463852_1_En_44_Chapter/463852_1_En_44_Fig3_HTML.jpg](../images/463852_1_En_44_Chapter/463852_1_En_44_Fig3_HTML.jpg)'
  id: totrans-817
