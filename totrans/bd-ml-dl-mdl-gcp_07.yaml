  id: totrans-563
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 自动完成AutoML配置
- en: Preparing the Training Dataset
  id: totrans-564
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 准备训练数据集
- en: Before building a custom image recognition model with AutoML Cloud Vision, the
    dataset must be prepared in a particular format; they include
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用AutoML Cloud Vision构建自定义图像识别模型之前，数据集必须以特定格式准备；它们包括
- en: For training, JPEG, PNG, WEBP, GIF, BMP, TIFF, and ICO image formats are supported
    with a maximum size of 30mb per image.
  id: totrans-566
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于训练，支持JPEG、PNG、WEBP、GIF、BMP、TIFF和ICO图像格式，每个图像的最大大小为30mb。
- en: For inference, the image formats JPEG, PNG, and GIF are supported with each
    image being of maximum size 1.5mb.
  id: totrans-567
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于推理，支持的图像格式为JPEG、PNG和GIF，每个图像的最大大小为1.5mb。
- en: 'It is best to place each image category into containing sub-folder within an
    image folder For example:'
  id: totrans-568
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最佳做法是将每个图像类别放置在图像文件夹内的包含子文件夹中。例如：
- en: '[image-directory]'
  id: totrans-569
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[image-directory]'
- en: '[image-class-1-dir]'
  id: totrans-570
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[image-class-1-dir]'
- en: '[image-class-2-dir]'
  id: totrans-571
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[image-class-2-dir]'
- en: …
  id: totrans-572
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: …
- en: '[image-class-n-dir]'
  id: totrans-573
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[image-class-n-dir]'
- en: Next, a CSV must be created that points to the paths of the images and their
    corresponding label. AutoML uses the CSV file to point to the location of the
    training images and their labels. The CSV file is placed in the same GCS bucket
    containing the image files. Use the bucket automatically created when AutoML Vision
    was configured. In our case, this bucket is named ‘gs://quantum-ally-219323-vcm’.
    We use the following code segment to create the CSV file used in the cereal classifier
    example.
  id: totrans-574
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接下来，必须创建一个CSV文件，该文件指向图像及其对应标签的路径。AutoML使用CSV文件来指向训练图像及其标签的位置。CSV文件放置在与图像文件相同的GCS桶中。使用在配置AutoML
    Vision时自动创建的桶。在我们的例子中，这个桶被命名为‘gs://quantum-ally-219323-vcm’。我们使用以下代码段来创建用于谷物分类器示例的CSV文件。
- en: '[PRE79]'
  id: totrans-575
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE79]'
- en: 'The preceding code will result in a CSV looking like the following sample:'
  id: totrans-576
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 上述代码将生成如下所示的CSV样本：
- en: '[PRE80]'
  id: totrans-577
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE80]'
- en: The first part is the image path or URI, while the other is the image label.
  id: totrans-578
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 第一部分是图像路径或URI，而另一部分是图像标签。
- en: When preparing the image dataset, it is useful to have a ‘**None_of_the_above’**
    image class. This class will contain random images that do not belong to any of
    the predicted classes. Adding this class can have an overall effect on the model
    accuracy.
  id: totrans-579
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在准备图像数据集时，拥有一个“**None_of_the_above**”图像类别是有用的。这个类别将包含不属于任何预测类别的随机图像。添加此类别可以对模型的整体准确性产生作用。
- en: Clone the GitHub book repository to the Notebook instance.
  id: totrans-580
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将GitHub书籍仓库克隆到Notebook实例。
- en: Navigate to the folder chapter and copy the image files to the GCS bucket.
  id: totrans-581
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到文件夹章节，并将图像文件复制到GCS桶。
- en: '[PRE81]'
  id: totrans-582
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE81]'
- en: Copy the CSV data file containing the image paths and their labels to the GCS
    bucket.
  id: totrans-583
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将包含图像路径及其标签的CSV数据文件复制到GCS桶。
- en: '[PRE82]'
  id: totrans-584
  prefs: []
  type: TYPE_PRE
  zh: '[PRE82]'
- en: Building Custom Image Models on Cloud AutoML Vision
  id: totrans-585
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在Cloud AutoML Vision上构建自定义图像模型
- en: In AutoML for Cloud Vision, a dataset contains the images that will be used
    in building the classifier and their corresponding labels. This section will walk
    through creating a dataset and building a custom image model on AutoML Vision.
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: 在Cloud Vision的AutoML中，一个数据集包含用于构建分类器的图像及其相应的标签。本节将介绍创建数据集并在AutoML Vision上构建自定义图像模型的过程。
- en: From the Cloud AutoML Vision Dashboard, click **NEW DATASET** as shown in Figure
    [42-8](#Fig8).
  id: totrans-587
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从Cloud AutoML Vision仪表板，如图42-8所示，点击**新建数据集**。
- en: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig8_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig8_HTML.jpg)'
  id: totrans-588
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig8_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig8_HTML.jpg)'
- en: Figure 42-8
  id: totrans-589
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图42-8
- en: New Dataset on AutoML Vision
  id: totrans-590
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在AutoML Vision上创建新数据集
- en: 'To create a Dataset on Cloud AutoML Vision, set the following parameters as
    shown in Figure [42-9](#Fig9):'
  id: totrans-591
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要在Cloud AutoML Vision上创建数据集，设置以下参数，如图42-9所示：
- en: 'Dataset name: cereal_classifier.'
  id: totrans-592
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数据集名称：cereal_classifier。
- en: 'Select a CSV file on Cloud Storage (this is the CSV file placed on the bucket
    created when Cloud AutoML was configured that contains the path to the images):
    gs://quantum-ally-219323-vcm/cereal_photos/data.csv.'
  id: totrans-593
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在云存储中选择一个CSV文件（这是在配置Cloud AutoML时创建的存储桶中放置的CSV文件，其中包含图像的路径）：gs://quantum-ally-219323-vcm/cereal_photos/data.csv。
- en: Click **CREATE DATASET** to begin importing images (see Figure [42-10](#Fig10)).
  id: totrans-594
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**创建数据集**开始导入图像（见图[42-10](#Fig10)）。
- en: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig10_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig10_HTML.jpg)'
  id: totrans-595
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig10_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig10_HTML.jpg)'
- en: Figure 42-10
  id: totrans-596
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图42-10
- en: 'Cloud AutoML Vision: Importing images'
  id: totrans-597
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: Cloud AutoML Vision：导入图像
- en: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig9_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig9_HTML.jpg)'
  id: totrans-598
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig9_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig9_HTML.jpg)'
- en: Figure 42-9
  id: totrans-599
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图42-9
- en: Create a Dataset on Cloud AutoML Vision
  id: totrans-600
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在Cloud AutoML Vision上创建数据集
- en: After importing the Dataset, click **TRAIN** (see Figure [42-11](#Fig11)) to
    initiate the process of building a custom image recognition model.
  id: totrans-601
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导入数据集后，点击**训练**（见图[42-11](#Fig11)）以启动构建自定义图像识别模型的过程。
- en: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig11_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig11_HTML.jpg)'
  id: totrans-602
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig11_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig11_HTML.jpg)'
- en: Figure 42-11
  id: totrans-603
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图42-11
- en: 'Cloud AutoML Vision: Imported images and their labels'
  id: totrans-604
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: Cloud AutoML Vision：导入的图像及其标签
- en: In machine learning, more labeled training examples boost the performance of
    the model. Likewise, when using AutoML, there should be at least 100 training
    examples for each image class. In the example used in this section, some classes
    do not have up to 100 examples, so AutoML gives a warning as seen in Figure [42-12](#Fig12).
    However, for the purposes of this exercise, we will continue with training. Click
    **START TRAINING**.
  id: totrans-605
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在机器学习中，更多的标记训练示例可以提高模型的性能。同样，在使用AutoML时，每个图像类至少应有100个训练示例。在本节使用的示例中，某些类别的示例不足100个，因此AutoML会发出警告，如图[42-12](#Fig12)所示。然而，为了完成这个练习，我们将继续进行训练。点击**开始训练**。
- en: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig12_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig12_HTML.jpg)'
  id: totrans-606
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig12_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig12_HTML.jpg)'
- en: Figure 42-12
  id: totrans-607
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图42-12
- en: Cloud AutoML Vision requesting for more training examples per image class
  id: totrans-608
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: Cloud AutoML Vision请求每个图像类更多的训练示例
- en: Choose how long the model will be trained. More training time might have an
    effect on the model accuracy, but this may cost more for running on Cloud AutoML’s
    machines (see Figure [42-13](#Fig13)). Again, click **START TRAINING** to begin
    building the model (see Figure [42-14](#Fig14)).
  id: totrans-609
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择模型训练的时长。更长的训练时间可能会影响模型精度，但这可能会在Cloud AutoML的机器上运行时增加成本（见图[42-13](#Fig13)）。再次点击**开始训练**以开始构建模型（见图[42-14](#Fig14)）。
- en: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig14_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig14_HTML.jpg)'
  id: totrans-610
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig14_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig14_HTML.jpg)'
- en: Figure 42-14
  id: totrans-611
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图42-14
- en: Training vision model on Cloud AutoML Vision
  id: totrans-612
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在Cloud AutoML Vision上训练视觉模型
- en: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig13_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig13_HTML.jpg)'
  id: totrans-613
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig13_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig13_HTML.jpg)'
- en: Figure 42-13
  id: totrans-614
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图42-13
- en: Select training budget
  id: totrans-615
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 选择训练预算
- en: The training summary is shown in Figure [42-15](#Fig15).
  id: totrans-616
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 训练摘要显示在图[42-15](#Fig15)中。
- en: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig15_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig15_HTML.jpg)'
  id: totrans-617
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig15_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig15_HTML.jpg)'
- en: Figure 42-15
  id: totrans-618
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图42-15
- en: 'Cloud AutoML Vision: Training summary'
  id: totrans-619
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: Cloud AutoML Vision：训练摘要
- en: AutoML Vision uses the set-aside test images to evaluate the quality of the
    model after training as seen in Figure [42-16](#Fig16). The F1 plot showing the
    trade-off between precision and recall is shown in Figure [42-17](#Fig17). Also,
    a visual confusion matrix is provided to further evaluate the model quality (see
    Figure [42-18](#Fig18)).
  id: totrans-620
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: AutoML Vision使用预留的测试图像来评估训练后的模型质量，如图[42-16](#Fig16)所示。显示精确度和召回率之间权衡的F1图如图[42-17](#Fig17)所示。此外，还提供了一个可视化的混淆矩阵以进一步评估模型质量（见图[42-18](#Fig18)）。
- en: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig18_HTML.png](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig18_HTML.png)'
  id: totrans-621
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig18_HTML.png](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig18_HTML.png)'
- en: Figure 42-18
  id: totrans-622
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图42-18
- en: Confusion matrix for model evaluation on Cloud AutoML Vision
  id: totrans-623
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: Cloud AutoML Vision上模型评估的混淆矩阵
- en: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig17_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig17_HTML.jpg)'
  id: totrans-624
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig17_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig17_HTML.jpg)'
- en: Figure 42-17
  id: totrans-625
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图42-17
- en: F1 evaluation matrix on Cloud AutoML Vision
  id: totrans-626
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: Cloud AutoML Vision上的F1评估矩阵
- en: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig16_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig16_HTML.jpg)'
  id: totrans-627
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig16_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig16_HTML.jpg)'
- en: Figure 42-16
  id: totrans-628
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图42-16
- en: 'Cloud AutoML Vision: Model evaluation'
  id: totrans-629
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: Cloud AutoML Vision：模型评估
- en: The custom image recognition model is exposed as a REST or Python API for integration
    into software applications as a prediction service (see Figure [42-19](#Fig19)).
    We can test our model by uploading a sample image for classification as shown
    in Figure [42-20](#Fig20).
  id: totrans-630
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定制的图像识别模型作为REST或Python API公开，以便作为预测服务集成到软件应用程序中（见图[42-19](#Fig19)）。我们可以通过上传一个用于分类的样本图像来测试我们的模型，如图[42-20](#Fig20)所示。
- en: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig20_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig20_HTML.jpg)'
  id: totrans-631
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig20_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig20_HTML.jpg)'
- en: Figure 42-20
  id: totrans-632
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图42-20
- en: Test prediction service on Cloud AutoML Vision
  id: totrans-633
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在Cloud AutoML Vision上测试预测服务
- en: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig19_HTML.png](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig19_HTML.png)'
  id: totrans-634
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig19_HTML.png](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig19_HTML.png)'
- en: Figure 42-19
  id: totrans-635
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图42-19
- en: 'Cloud AutoML Vision: Model as a prediction service'
  id: totrans-636
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: Cloud AutoML Vision：作为预测服务的模型
- en: To delete a model, click the triple dash and select Models to navigate to the
    Models Dashboard (see Figure [42-21](#Fig21)). At the side of the model, click
    the triple dot and select Delete model (see Figure [42-22](#Fig22)). Confirm deletion
    as shown in Figure [42-23](#Fig23). Note, however, that API calls affiliated with
    a deleted model will cease to be operational.
  id: totrans-637
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要删除一个模型，点击三个短横线并选择“模型”以导航到模型仪表板（见图[42-21](#Fig21)）。在模型旁边点击三个点，然后选择“删除模型”（见图[42-22](#Fig22)）。如图[42-23](#Fig23)所示确认删除。然而，请注意，与已删除模型相关的API调用将停止运行。
- en: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig23_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig23_HTML.jpg)'
  id: totrans-638
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig23_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig23_HTML.jpg)'
- en: Figure 42-23
  id: totrans-639
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图42-23
- en: Delete a model on Cloud AutoML Vision
  id: totrans-640
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在Cloud AutoML Vision上删除一个模型
- en: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig22_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig22_HTML.jpg)'
  id: totrans-641
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig22_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig22_HTML.jpg)'
- en: Figure 42-22
  id: totrans-642
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图42-22
- en: Select model to delete
  id: totrans-643
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 选择要删除的模型
- en: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig21_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig21_HTML.jpg)'
  id: totrans-644
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig21_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig21_HTML.jpg)'
- en: Figure 42-21
  id: totrans-645
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图42-21
- en: Return to Models dashboard
  id: totrans-646
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 返回模型仪表板
- en: This chapter covered building and deploying custom image classification models
    using Google AutoML Cloud Vision. In the next chapter, we will discover how to
    build and deploy custom text classification models with Google Cloud AutoML for
    natural language processing.
  id: totrans-647
  prefs: []
  type: TYPE_NORMAL
  zh: 本章介绍了使用Google AutoML Cloud Vision构建和部署自定义图像分类模型。在下一章中，我们将探讨如何使用Google Cloud
    AutoML构建和部署自定义文本分类模型，用于自然语言处理。
- en: '43. Google AutoML: Cloud Natural Language Processing'
  id: totrans-648
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 43. Google AutoML：云自然语言处理
- en: This chapter will build a language toxicity classification model to classify
    and recognize toxic and non-toxic or clean phrases using Google Cloud AutoML for
    natural language processing (NLP). The data used in this project is from the Toxic
    Comment Classification Challenge on Kaggle by Jigsaw and Google. The data is modified
    to have a sample of 16,000 toxic and 16,000 non-toxic words as inputs to build
    the model on AutoML NLP.
  id: totrans-649
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将构建一个语言毒性分类模型，使用Google Cloud AutoML进行自然语言处理（NLP），以对有毒和无毒或干净的短语进行分类和识别。本项目使用的数据来自Kaggle上Jigsaw和Google举办的毒性评论分类挑战赛。数据经过修改，以包含16,000个有毒和16,000个无毒单词作为输入，以在AutoML
    NLP上构建模型。
- en: Enable AutoML NLP on GCP
  id: totrans-650
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 启用GCP上的AutoML NLP
- en: 'The following steps will enable AutoML NLP on GCP:'
  id: totrans-651
  prefs: []
  type: TYPE_NORMAL
  zh: 以下步骤将启用GCP上的AutoML NLP：
- en: Click the triple dash in the top-left corner of the interface and select **Natural
    Language** under the category ARTIFICIAL INTELLIGENCE as shown in Figure [43-1](#Fig1).
  id: totrans-652
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击界面左上角的三个短横线，然后在类别人工智能下选择**自然语言**，如图[43-1](#Fig1)所示。
- en: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig1_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig1_HTML.jpg)'
  id: totrans-653
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig1_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig1_HTML.jpg)'
- en: Figure 43-1
  id: totrans-654
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 43-1
- en: Open Cloud AutoML for Natural Language
  id: totrans-655
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 打开 Cloud AutoML 自然语言
- en: From the screen that follows, click **Get started with AutoML** (see Figure
    [43-2](#Fig2)).
  id: totrans-656
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在接下来的屏幕上，点击**开始使用 AutoML**（见图 [43-2](#Fig2)）。
- en: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig2_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig2_HTML.jpg)'
  id: totrans-657
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig2_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig2_HTML.jpg)'
- en: Figure 43-2
  id: totrans-658
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 43-2
- en: Click Get started with Cloud AutoML NLP
  id: totrans-659
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 点击“开始使用 Cloud AutoML NLP”
- en: Click **SET UP NOW** to automatically setup the GCP project for working with
    Cloud AutoML NLP (see Figure [43-3](#Fig3)). This process involves activating
    the API for AutoML and creating a bucket on GCP for storing the data input and
    output models. We will use this bucket in the next section.
  id: totrans-660
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**立即设置**来自动设置用于与 Cloud AutoML NLP 一起工作的 GCP 项目（见图 [43-3](#Fig3)）。此过程涉及激活 AutoML
    API 并在 GCP 上创建一个存储数据输入和输出模型的存储桶。我们将在下一节中使用此存储桶。
- en: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig3_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig3_HTML.jpg)'
  id: totrans-661
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig3_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig3_HTML.jpg)'
- en: Figure 43-3
  id: totrans-662
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 43-3
- en: Auto-configure Cloud AutoML NLP
  id: totrans-663
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在 Cloud AutoML NLP 中自动配置云自动机器学习 NLP
- en: After configuration, the Cloud AutoML NLP Dashboard is activated (see Figure
    [43-4](#Fig4)).
  id: totrans-664
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 配置后，Cloud AutoML NLP 仪表板被激活（见图 [43-4](#Fig4)）。
- en: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig4_HTML.png](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig4_HTML.png)'
  id: totrans-665
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig4_HTML.png](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig4_HTML.png)'
- en: Figure 43-4
  id: totrans-666
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 43-4
- en: AutoML NLP dashboard
  id: totrans-667
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: AutoML NLP 仪表板
- en: Preparing the Training Dataset
  id: totrans-668
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 准备训练数据集
- en: 'Let’s step through preparing the dataset for building a custom language classification
    model with Cloud AutoML NLP:'
  id: totrans-669
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们逐步准备使用 Cloud AutoML NLP 构建自定义语言分类模型的训练数据集：
- en: The training input can either be a document in (.txt) format or as an in-line
    text in a (.csv) file. Multiple texts can be grouped as a compressed (.zip) file.
  id: totrans-670
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 训练输入可以是 (.txt) 格式的文档或 (.csv) 文件中的内联文本。多个文本可以组合成一个压缩的 (.zip) 文件。
- en: 'For this project, text files are placed in sub-folders with their grouped output
    labels as the folder names. This is later used to create a CSV file containing
    the data file path and their labels. For example:'
  id: totrans-671
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于此项目，文本文件放置在子文件夹中，其分组输出标签作为文件夹名称。这后来用于创建包含数据文件路径及其标签的 CSV 文件。例如：
- en: '[files]'
  id: totrans-672
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[files]'
- en: '[toxic]'
  id: totrans-673
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[toxic]'
- en: '[clean]'
  id: totrans-674
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[clean]'
- en: Next, a CSV must be generated that points to the paths of the images and their
    corresponding label. Just like Cloud Vision, Cloud NLP uses the CSV file to point
    to the location of the training documents or words and their corresponding labels.
    The CSV file is placed in the same GCS bucket created AutoML NLP was configured.
    In our case, this bucket is named ‘gs://quantum-ally-219323-lcm’. The following
    code segment prepares the data and produces a CSV file.
  id: totrans-675
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接下来，必须生成一个 CSV 文件，该文件指向图像的路径及其相应的标签。就像 Cloud Vision 一样，Cloud NLP 使用 CSV 文件来指向训练文档或单词及其对应标签的位置。CSV
    文件放置在创建 AutoML NLP 时创建的同一 GCS 存储桶中。在我们的例子中，这个存储桶命名为‘gs://quantum-ally-219323-lcm’。以下代码段准备数据并生成
    CSV 文件。
- en: '[PRE83]'
  id: totrans-676
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE83]'
- en: 'The preceding code will result in a CSV looking like the following sample:'
  id: totrans-677
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 上述代码将生成如下所示的 CSV 示例：
- en: '[PRE84]'
  id: totrans-678
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE84]'
- en: The first part is the image path or URI, while the other is the document label.
  id: totrans-679
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 第一部分是图像路径或 URI，而另一部分是文档标签。
- en: When preparing the text dataset, it is useful to have a ‘**None_of_the_above’**
    class. This class will contain documents that do not belong to any of the predicted
    classes. Adding this class can have an overall effect on the model accuracy.
  id: totrans-680
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在准备文本数据集时，拥有一个“**None_of_the_above**”类别很有用。这个类别将包含不属于任何预测类别的文档。添加此类别可以对模型精度产生整体影响。
- en: Navigate to the folder chapter and copy the image files to the GCS bucket. The
    flag **-m** initiates parallel uploads to speed up upload time of large document
    sizes to GCP.
  id: totrans-681
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到“chapter”文件夹，并将图像文件复制到 GCS 存储桶。标志 **-m** 启动并行上传以加快大型文档上传到 GCP 的时间。
- en: '[PRE85]'
  id: totrans-682
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE85]'
- en: Copy the CSV data file containing the document paths and their labels to the
    GCS bucket.
  id: totrans-683
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将包含文档路径及其标签的 CSV 数据文件复制到 GCS 存储桶。
- en: '[PRE86]'
  id: totrans-684
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE86]'
- en: Building a Custom Language Classification Model on Cloud AutoML NLP
  id: totrans-685
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在 Cloud AutoML NLP 上构建自定义语言分类模型
- en: This section will walk through creating a document dataset and building a custom
    language classification model on AutoML Vision.
  id: totrans-686
  prefs: []
  type: TYPE_NORMAL
  zh: 本节将指导如何创建文档数据集并在 AutoML 视觉上构建自定义语言分类模型。
- en: From the Cloud AutoML NLP dashboard, click **NEW DATASET** as shown in Figure
    [43-5](#Fig5).
  id: totrans-687
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从 Cloud AutoML NLP 仪表板，如图 [43-5](#Fig5) 所示，点击 **NEW DATASET**。
- en: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig5_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig5_HTML.jpg)'
  id: totrans-688
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig5_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig5_HTML.jpg)'
- en: Figure 43-5
  id: totrans-689
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 43-5
- en: New Dataset on AutoML NLP
  id: totrans-690
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: AutoML NLP 上的新数据集
- en: 'To create a Dataset on Cloud AutoML NLP, set the following parameters as shown
    in Figure [43-6](#Fig6):'
  id: totrans-691
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要在 Cloud AutoML NLP 上创建数据集，请设置以下参数，如图 [43-6](#Fig6) 所示：
- en: 'Dataset name: toxicity_dataset.'
  id: totrans-692
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数据集名称：toxicity_dataset。
- en: 'Select a CSV file on Cloud Storage (this is the CSV file placed on the bucket
    created when Cloud AutoML was configured that contains the path to the text documents):
    gs://quantum-ally-219323-lcm/file/data.csv.'
  id: totrans-693
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在云存储中选择一个 CSV 文件（这是在配置 Cloud AutoML 时创建的存储桶中放置的 CSV 文件，其中包含文本文档的路径）：gs://quantum-ally-219323-lcm/file/data.csv。
- en: Click **CREATE DATASET** to begin importing images (see Figure [43-7](#Fig7)).
  id: totrans-694
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 **CREATE DATASET** 开始导入图像（见图 [43-7](#Fig7)）。
- en: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig8_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig8_HTML.jpg)'
  id: totrans-695
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig8_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig8_HTML.jpg)'
- en: Figure 43-8
  id: totrans-696
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 43-8
- en: 'Cloud AutoML NLP: Imported text documents and their labels'
  id: totrans-697
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: Cloud AutoML NLP：导入的文本文档及其标签
- en: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig7_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig7_HTML.jpg)'
  id: totrans-698
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig7_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig7_HTML.jpg)'
- en: Figure 43-7
  id: totrans-699
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 43-7
- en: 'Cloud AutoML NLP: Importing text items'
  id: totrans-700
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: Cloud AutoML NLP：导入文本项
- en: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig6_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig6_HTML.jpg)'
  id: totrans-701
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig6_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig6_HTML.jpg)'
- en: Figure 43-6
  id: totrans-702
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 43-6
- en: Create a Dataset on Cloud AutoML NLP
  id: totrans-703
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在 Cloud AutoML NLP 上创建数据集
- en: After importing the Dataset, click **TRAIN** (see Figure [43-8](#Fig8)) to initiate
    the process of building a custom language classification model.
  id: totrans-704
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在导入数据集后，点击 **TRAIN**（见图 [43-8](#Fig8)）以启动构建自定义语言分类模型的过程。
- en: In this example, we have a good enough number of training examples as seen in
    Figure [43-9](#Fig9), so hopefully, it makes sense to expect a good language classification
    model. Click **START TRAINING** to begin the training job.
  id: totrans-705
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在本例中，我们拥有足够的训练示例，如图 [43-9](#Fig9) 所示，因此有理由期待一个良好的语言分类模型。点击 **START TRAINING**
    开始训练任务。
- en: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig9_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig9_HTML.jpg)'
  id: totrans-706
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig9_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig9_HTML.jpg)'
- en: Figure 43-9
  id: totrans-707
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 43-9
- en: Cloud AutoML NLP checking the adequacy of training examples
  id: totrans-708
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: Cloud AutoML NLP 检查训练示例的充分性
- en: Accept the default model name, and click **START TRAINING** (see Figure [43-10](#Fig10))
    to begin building the model as seen in Figure [43-11](#Fig11). Note that this
    training might take about an hour to complete. When done, the user will get an
    email of completion.
  id: totrans-709
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接受默认模型名称，并点击 **START TRAINING**（见图 [43-10](#Fig10)）以开始构建模型，如图 [43-11](#Fig11)
    所示。请注意，这次训练可能需要大约一个小时才能完成。完成后，用户将收到完成通知的电子邮件。
- en: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig11_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig11_HTML.jpg)'
  id: totrans-710
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig11_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig11_HTML.jpg)'
- en: Figure 43-11
  id: totrans-711
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 43-11
- en: Training the text classification model on Cloud AutoML NLP
  id: totrans-712
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在 Cloud AutoML NLP 上训练文本分类模型
- en: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig10_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig10_HTML.jpg)'
  id: totrans-713
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig10_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig10_HTML.jpg)'
- en: Figure 43-10
  id: totrans-714
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 43-10
- en: Accept the Model name and click on “Start Training”
  id: totrans-715
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 接受模型名称，并点击“开始训练”
- en: The training summary is shown in Figure [43-12](#Fig12). The training phase
    lasted for approximately 4 hours and 45 minutes.
  id: totrans-716
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 训练摘要如图 [43-12](#Fig12) 所示。训练阶段持续了大约 4 小时 45 分钟。
- en: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig12_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig12_HTML.jpg)'
  id: totrans-717
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig12_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig12_HTML.jpg)'
- en: Figure 43-12
  id: totrans-718
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 43-12
- en: 'Cloud AutoML NLP: Training summary'
  id: totrans-719
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: Cloud AutoML NLP：训练摘要
- en: AutoML NLP sets aside a portion of the documents as a test set in order to evaluate
    the quality of the model after training (see Figure [43-13](#Fig13)). The F1 plot
    shows the trade-off between precision and recall. Also, a confusion matrix provides
    further insight into the model quality (see Figure [43-14](#Fig14)).
  id: totrans-720
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: AutoML NLP 在训练后为了评估模型的质量，将一部分文档留作测试集（见图 [43-13](#Fig13)）。F1 图显示了精确度和召回率之间的权衡。此外，混淆矩阵提供了对模型质量的进一步洞察（见图
    [43-14](#Fig14)))。
- en: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig14_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig14_HTML.jpg)'
  id: totrans-721
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig14_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig14_HTML.jpg)'
- en: Figure 43-14
  id: totrans-722
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 43-14
- en: F1 evaluation plot and confusion matrix on Cloud AutoML NLP
  id: totrans-723
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: Cloud AutoML NLP 上的 F1 评估图和混淆矩阵
- en: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig13_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig13_HTML.jpg)'
  id: totrans-724
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig13_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig13_HTML.jpg)'
- en: Figure 43-13
  id: totrans-725
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 43-13
- en: 'Cloud AutoML NLP: Model evaluation'
  id: totrans-726
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: Cloud AutoML NLP：模型评估
- en: The custom text classification model is exposed as a REST or Python API for
    integration into software applications as a prediction service (see Figure [43-15](#Fig15)).
    We can test our model by uploading a sample image for classification. Figure [43-16](#Fig16)
    passes a clean text example to the model and it predicts correctly with a probability
    of 98%, while Figure [43-17](#Fig17) passes a toxic text example to the model.
    This example is also correctly classified with a probability score of 99%.
  id: totrans-727
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 自定义文本分类模型作为 REST 或 Python API 暴露出来，以便将其集成到软件应用程序中作为预测服务（见图 [43-15](#Fig15)）。我们可以通过上传一个用于分类的样本图像来测试我们的模型。图
    [43-16](#Fig16) 将一个清洁文本示例传递给模型，并正确预测，概率为 98%，而图 [43-17](#Fig17) 将一个有毒文本示例传递给模型。此示例也被正确分类，概率得分为
    99%。
- en: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig17_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig17_HTML.jpg)'
  id: totrans-728
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig17_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig17_HTML.jpg)'
- en: Figure 43-17
  id: totrans-729
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 43-17
- en: 'Toxic words example: AutoML NLP'
  id: totrans-730
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 有毒词汇示例：AutoML NLP
- en: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig16_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig16_HTML.jpg)'
  id: totrans-731
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig16_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig16_HTML.jpg)'
- en: Figure 43-16
  id: totrans-732
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 43-16
- en: 'Clean words example: AutoML NLP'
  id: totrans-733
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 清洁词汇示例：AutoML NLP
- en: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig15_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig15_HTML.jpg)'
  id: totrans-734
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig15_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig15_HTML.jpg)'
- en: Figure 43-15
  id: totrans-735
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 43-15
- en: Cloud AutoML NLP model as a prediction service
  id: totrans-736
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 云 AutoML NLP 模型作为预测服务
- en: This chapter covered building and deploying custom text classification models
    using Google AutoML Cloud Vision. In the next chapter, we will build an end-to-end
    data science product on GCP.
  id: totrans-737
  prefs: []
  type: TYPE_NORMAL
  zh: 本章介绍了使用 Google AutoML Cloud Vision 构建和部署自定义文本分类模型。在下一章中，我们将在 GCP 上构建一个端到端的数据科学产品。
- en: 44. Model to Predict the Critical Temperature of Superconductors
  id: totrans-738
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 44. 预测超导体临界温度的模型
- en: 'This chapter builds a regression machine learning model to predict the critical
    temperature of superconductors. The features for this dataset were derived based
    on the following superconductor properties:'
  id: totrans-739
  prefs: []
  type: TYPE_NORMAL
  zh: 本章构建了一个回归机器学习模型来预测超导体的临界温度。该数据集的特征是基于以下超导体属性推导出来的：
- en: Atomic mass
  id: totrans-740
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 原子质量
- en: First ionization energy
  id: totrans-741
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 首电离能
- en: Atomic radius
  id: totrans-742
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 原子半径
- en: Density
  id: totrans-743
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 密度
- en: Electron affinity
  id: totrans-744
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 电子亲和力
- en: Fusion heat
  id: totrans-745
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 融合热
- en: Thermal conductivity
  id: totrans-746
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 热导率
- en: Valence
  id: totrans-747
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 电荷
- en: And for each property, the mean, weighted mean, geometric mean, weighted geometric
    mean, entropy, weighted entropy, range, weighted range, standard deviation, and
    weighted standard deviation are extracted. Thus, this results in a total number
    of 8 x 10 = 80 features. In addition to this, a feature that contains the number
    of elements in the superconductor is added to the design matrix. The predictor
    variable is the critical temperature of the superconductor. Hence, the dataset
    has a total of 81 features and 21,263 rows.
  id: totrans-748
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个属性，提取了平均值、加权平均值、几何平均值、加权几何平均值、熵、加权熵、范围、加权范围、标准差和加权标准差。因此，这导致了总共 8 x 10 =
    80 个特征。除此之外，还向设计矩阵中添加了一个包含超导体中元素数量的特征。预测变量是超导体的临界温度。因此，数据集总共有 81 个特征和 21,263 行。
- en: This dataset is made available by Kam Hamidieh of the University of Pennsylvania
    and submitted to the UCI Machine Learning Repository. The goal of this section
    is to demonstrate delivering an end-to-end machine learning modeling pipeline
    on Google Cloud Platform.
  id: totrans-749
  prefs: []
  type: TYPE_NORMAL
  zh: 该数据集由宾夕法尼亚大学的Kam Hamidieh提供，并提交到UCI机器学习库。本节的目标是展示在Google Cloud Platform上交付端到端机器学习建模管道。
- en: The Modeling Architecture on GCP
  id: totrans-750
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: GCP上的建模架构
- en: 'The goal of this end-to-end project is to demonstrate building a large-scale
    learning model on GCP using the components already discussed in this book. The
    modeling architecture is illustrated in Figure [44-1](#Fig1). Let’s briefly explain
    the connections:'
  id: totrans-751
  prefs: []
  type: TYPE_NORMAL
  zh: 本端到端项目的目标是展示在GCP上使用本书中已讨论的组件构建大规模学习模型。建模架构如图[44-1](#Fig1)所示。让我们简要解释一下这些连接：
- en: '![../images/463852_1_En_44_Chapter/463852_1_En_44_Fig1_HTML.jpg](../images/463852_1_En_44_Chapter/463852_1_En_44_Fig1_HTML.jpg)'
  id: totrans-752
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_44_Chapter/463852_1_En_44_Fig1_HTML.jpg](../images/463852_1_En_44_Chapter/463852_1_En_44_Fig1_HTML.jpg)'
- en: Figure 44-1
  id: totrans-753
  prefs: []
  type: TYPE_NORMAL
  zh: 图44-1
- en: Modeling architecture on GCP
  id: totrans-754
  prefs: []
  type: TYPE_NORMAL
  zh: GCP上的建模架构
- en: Stage the raw data on GCS.
  id: totrans-755
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将原始数据阶段在GCS上。
- en: Load data into BigQuery for analytics.
  id: totrans-756
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将数据加载到BigQuery中进行分析。
- en: Exploratory data analysis.
  id: totrans-757
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索性数据分析。
- en: Large-scale data processing with Dataflow.
  id: totrans-758
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用Dataflow进行大规模数据处理。
- en: Place transformed training and evaluation data on GCS.
  id: totrans-759
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将转换后的训练和评估数据放置在GCS上。
- en: Train the model on Cloud MLE.
  id: totrans-760
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在Cloud MLE上训练模型。
- en: Place the trained model output on GCS.
  id: totrans-761
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将训练好的模型输出放置在GCS上。
- en: Deploy the model for inference on Cloud MLE.
  id: totrans-762
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在Cloud MLE上部署模型进行推理。
- en: Stage Raw Data in GCS
  id: totrans-763
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在GCS上阶段原始数据
- en: 'Retrieve the raw data from the book code repository for modeling:'
  id: totrans-764
  prefs: []
  type: TYPE_NORMAL
  zh: 从书籍代码库中检索原始数据用于建模：
- en: Create a GCS bucket.
  id: totrans-765
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建一个GCS存储桶。
- en: Navigate to the chapter folder and transfer the raw data to GCS.
  id: totrans-766
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 导航到章节文件夹并将原始数据传输到GCS。
- en: '[PRE87]'
  id: totrans-767
  prefs: []
  type: TYPE_PRE
  zh: '[PRE87]'
- en: '[PRE88]'
  id: totrans-768
  prefs: []
  type: TYPE_PRE
  zh: '[PRE88]'
- en: Load Data into BigQuery for Analytics
  id: totrans-769
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将数据加载到BigQuery中进行分析。
- en: 'Move the dataset from Google Cloud Storage to BigQuery:'
  id: totrans-770
  prefs: []
  type: TYPE_NORMAL
  zh: 将数据集从Google Cloud Storage移动到BigQuery：
- en: Create a Dataset in BigQuery.
  id: totrans-771
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在BigQuery中创建一个数据集。
- en: Load raw data from GCS as a Table into the newly created BigQuery Dataset.
  id: totrans-772
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将GCS中的原始数据作为表加载到新创建的BigQuery数据集中。
- en: '[PRE89]'
  id: totrans-773
  prefs: []
  type: TYPE_PRE
  zh: '[PRE89]'
- en: View created Table schema on BigQuery.
  id: totrans-774
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在BigQuery中查看创建的表架构。
- en: '[PRE90]'
  id: totrans-775
  prefs: []
  type: TYPE_PRE
  zh: '[PRE90]'
- en: '[PRE91]'
  id: totrans-776
  prefs: []
  type: TYPE_PRE
  zh: '[PRE91]'
- en: Exploratory Data Analysis
  id: totrans-777
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 探索性数据分析
- en: The Table in BigQuery contains 21,264 rows. In the interest of speed and rapid
    iteration, we will not operate on all the rows of this dataset, but rather, we
    will select a thousand rows for data exploration, transformation, and machine
    learning spot checking.
  id: totrans-778
  prefs: []
  type: TYPE_NORMAL
  zh: BigQuery中的表包含21,264行。为了速度和快速迭代，我们不会操作这个数据集的所有行，而是选择一千行进行数据探索、转换和机器学习抽查。
- en: '[PRE92]'
  id: totrans-779
  prefs: []
  type: TYPE_PRE
  zh: '[PRE92]'
- en: Next, we’ll explore the dataset to gain more understanding of the features and
    their relationships. This process is called exploratory data analysis (EDA).
  id: totrans-780
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将探索数据集以更深入地了解特征及其关系。这个过程被称为探索性数据分析（EDA）。
- en: Check the column datatypes.
  id: totrans-781
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检查列数据类型。
- en: '[PRE93]'
  id: totrans-782
  prefs: []
  type: TYPE_PRE
  zh: '[PRE93]'
- en: 'From the results, all the data attributes are of numeric type:'
  id: totrans-783
  prefs: []
  type: TYPE_NORMAL
  zh: 从结果来看，所有数据属性都是数值类型：
- en: Next, we will use a tool called **pandas profiling** . This package produces
    a full range of exploratory data analytics for a Pandas DataFrame object. The
    result includes summary statistics of the dataset such as the number of variables,
    number of data observations, and number of missing values (if any). It also includes
    a histogram visualization for each attribute, descriptive statistics (such as
    the mean, mode, standard deviation, sum, median absolute deviation, coefficient
    of variation, kurtosis, and skewness), and quantile statistics (such as minimum
    value, Q1, median, Q3, maximum, range, and interquartile range). Also, the profile
    produces multivariate correlation graphs and produces a list of variables that
    are highly correlated.
  id: totrans-784
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 接下来，我们将使用一个名为**pandas profiling**的工具。这个包为Pandas DataFrame对象生成一系列探索性数据分析。结果包括数据集的摘要统计，如变量数量、数据观测数量和缺失值数量（如果有）。它还包括每个属性的直方图可视化、描述性统计（如平均值、众数、标准差、总和、中位数绝对偏差、变异系数、峰度和偏度），以及分位数统计（如最小值、Q1、中位数、Q3、最大值、范围和四分位距）。此外，该配置文件还生成多元相关图，并列出高度相关的变量列表。
- en: Import the pandas profiling library.
  id: totrans-785
  prefs: []
  type: TYPE_NORMAL
  zh: 导入pandas profiling库。
- en: '[PRE94]'
  id: totrans-786
  prefs: []
  type: TYPE_PRE
  zh: '[PRE94]'
- en: Run the profile and save the output.
  id: totrans-787
  prefs: []
  type: TYPE_NORMAL
  zh: 运行配置文件并保存输出。
- en: '[PRE95]'
  id: totrans-788
  prefs: []
  type: TYPE_PRE
  zh: '[PRE95]'
- en: 'To view the complete report, run the saved output variable:'
  id: totrans-789
  prefs: []
  type: TYPE_NORMAL
  zh: 要查看完整的报告，请运行保存的输出变量：
- en: Retrieve the rejected variables (i.e, attributes with high correlation).
  id: totrans-790
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检索被拒绝的变量（即高度相关的属性）。
- en: '[PRE96]'
  id: totrans-791
  prefs: []
  type: TYPE_PRE
  zh: '[PRE96]'
- en: Filter the dataset columns by removing the variables with high correlation.
  id: totrans-792
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过移除高度相关的变量来过滤数据集列。
- en: '[PRE97]'
  id: totrans-793
  prefs: []
  type: TYPE_PRE
  zh: '[PRE97]'
- en: Next, standardize the dataset values so that they fall within the same scale
    range (we’ll be using Scikit-learn minmax_scale function). Standardizing the values
    improves the predictive performance of the model because the optimization algorithm
    can better minimize the cost function.
  id: totrans-794
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 接下来，标准化数据集的值，使它们落在相同的尺度范围内（我们将使用Scikit-learn minmax_scale函数）。标准化值可以提高模型的预测性能，因为优化算法可以更好地最小化成本函数。
- en: '[PRE98]'
  id: totrans-795
  prefs: []
  type: TYPE_PRE
  zh: '[PRE98]'
- en: Also, the attribute values are normalized so that the distribution more closely
    resembles a normal or Gaussian distribution. This technique is also noted to have
    a positive impact on the model performance.
  id: totrans-796
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 此外，属性值也被归一化，以便分布更接近正态或高斯分布。这项技术也被认为对模型性能有积极影响。
- en: '[PRE99]'
  id: totrans-797
  prefs: []
  type: TYPE_PRE
  zh: '[PRE99]'
