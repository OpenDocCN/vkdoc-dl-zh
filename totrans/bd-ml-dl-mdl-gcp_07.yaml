  type: TYPE_NORMAL
- en: After importing the Dataset, click **TRAIN** (see Figure [42-11](#Fig11)) to
    initiate the process of building a custom image recognition model.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig11_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig11_HTML.jpg)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 42-11
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Cloud AutoML Vision: Imported images and their labels'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: In machine learning, more labeled training examples boost the performance of
    the model. Likewise, when using AutoML, there should be at least 100 training
    examples for each image class. In the example used in this section, some classes
    do not have up to 100 examples, so AutoML gives a warning as seen in Figure [42-12](#Fig12).
    However, for the purposes of this exercise, we will continue with training. Click
    **START TRAINING**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig12_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig12_HTML.jpg)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 42-12
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Cloud AutoML Vision requesting for more training examples per image class
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Choose how long the model will be trained. More training time might have an
    effect on the model accuracy, but this may cost more for running on Cloud AutoML’s
    machines (see Figure [42-13](#Fig13)). Again, click **START TRAINING** to begin
    building the model (see Figure [42-14](#Fig14)).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig14_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig14_HTML.jpg)'
