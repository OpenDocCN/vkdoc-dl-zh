- en: The TensorFlow Model
  id: totrans-387
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: TensorFlow 模型
- en: Now let’s briefly examine the TF model code in the file ‘**model.py**’.
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们简要检查文件 ‘**model.py**’ 中的 TF 模型代码。
- en: '[PRE49]'
  id: totrans-389
  prefs: []
  type: TYPE_PRE
  zh: '[PRE49]'
- en: 'The code for the most part is self-explanatory; however, the reader should
    take note of the following points:'
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 代码大部分是自解释的；然而，读者应注意以下要点：
- en: The function ‘build_estimator’ uses the canned Estimator API to train a ‘DNNClassifier’
    model on Cloud MLE. The learning rate and hidden units of the model can be adjusted
    and tuned as a hyper-parameter during training.
  id: totrans-391
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 函数 ‘build_estimator’ 使用预制的 Estimator API 在 Cloud MLE 上训练一个 ‘DNNClassifier’ 模型。模型的学习率和隐藏单元可以在训练期间作为超参数进行调整和调优。
- en: The methods ‘csv_serving_input_fn’ and ‘json_serving_input_fn’ define the serving
    inputs for CSV and JSON serving input formats.
  id: totrans-392
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 方法 ‘csv_serving_input_fn’ 和 ‘json_serving_input_fn’ 定义了 CSV 和 JSON 服务输入格式。
- en: The method ‘input_fn’ uses the TensorFlow Dataset API to build the input pipelines
    for training and evaluation on Cloud MLE. This method calls the private method
    _decode_csv() to convert the CSV columns to Tensors.
  id: totrans-393
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 方法 ‘input_fn’ 使用 TensorFlow Dataset API 构建在 Cloud MLE 上进行训练和评估的输入管道。此方法调用私有方法
    _decode_csv() 将 CSV 列转换为张量。
