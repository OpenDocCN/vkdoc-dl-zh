- en: Let’s start by placing our dataset in a GCS bucket. We’ll do so by running the
    following commands on the terminal.
  id: totrans-222
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 让我们先在我们的数据集放在一个 GCS 存储桶中。我们将在终端上运行以下命令来完成此操作。
- en: Create a new bucket.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个新的存储桶。
- en: Transfer data from GitHub to the bucket.
  id: totrans-224
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从 GitHub 转移数据到存储桶。
- en: '[PRE32]'
  id: totrans-225
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: Next, we’ll transfer our ‘crypto-market’ dataset from the ‘my-dataprep-data’
    bucket to the Dataprep staging bucket. We can quickly do this by executing the
    following code on the terminal.
  id: totrans-226
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接下来，我们将我们的“crypto-market”数据集从“my-dataprep-data”存储桶转移到 Dataprep 预处理存储桶。我们可以在终端上执行以下代码来快速完成此操作。
- en: '[PRE33]'
  id: totrans-227
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: Next, we’ll import and add Datasets to the Flow. Datasets can be uploaded directly
    to Dataprep which will then be stored to the bucket Dataprep generated on start-up.
    Also, Dataprep can import datasets already stored in BigQuery or GCS. In this
    case, we will import the ‘crypto-market’ dataset that we earlier transferred to
