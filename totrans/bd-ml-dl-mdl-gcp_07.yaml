  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Cloud AutoML Vision: Model evaluation'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: The custom image recognition model is exposed as a REST or Python API for integration
    into software applications as a prediction service (see Figure [42-19](#Fig19)).
    We can test our model by uploading a sample image for classification as shown
    in Figure [42-20](#Fig20).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig20_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig20_HTML.jpg)'
