  type: TYPE_NORMAL
  zh: 使用命令行 bq 实用程序加载数据。
- en: 'The following commands walk through loading a dataset into BigQuery using the
    bq utility via the terminal:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 以下命令通过终端使用 bq 实用程序将数据集加载到 BigQuery 中：
- en: Create a new Dataset.
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建一个新的数据集。
- en: List the datasets to confirm creation of new Dataset.
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列出数据集以确认新数据集的创建。
- en: '[PRE9]'
  id: totrans-115
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Load data as a Table into the newly created Dataset. We load the file using
    the ‘bq load’ command . This command loads data in a new or existing table. In
    our example, we load the data from the GCS bucket ‘gs://my-test-data/crypto-markets.csv’
    into a newly created table named ‘markets_terminal’ with the schema “slug,symbol,name,date,ranknow,open,high,low,close,volume,market,close_ratio,spread”
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将数据作为表加载到新创建的数据集中。我们使用“bq load”命令加载数据。此命令将数据加载到新表或现有表中。在我们的示例中，我们将数据从 GCS 存储桶“gs://my-test-data/crypto-markets.csv”加载到名为“markets_terminal”的新表中，其模式为“slug,symbol,name,date,ranknow,open,high,low,close,volume,market,close_ratio,spread”。
- en: '[PRE10]'
  id: totrans-117
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: List the tables in the dataset.
  id: totrans-118
  prefs:
