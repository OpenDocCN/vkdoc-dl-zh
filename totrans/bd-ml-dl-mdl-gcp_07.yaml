- en: Running Your First Query
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For our first query, we will work with the **‘census_bureau_international’**
    dataset which “provides estimates of country populations since 1950 and projections
    through 2050.” In this query, we select a country and their life expectancy (for
    both sexes) in the year 2018.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: A sample of the query result is shown in Figure [38-4](#Fig4) under **Query
    results**.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_38_Chapter/463852_1_En_38_Fig4_HTML.jpg](../images/463852_1_En_38_Chapter/463852_1_En_38_Fig4_HTML.jpg)'
