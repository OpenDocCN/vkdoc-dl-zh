- en: 'online-prediction.sh: [script to execute an online prediction job on Cloud
    MLE]'
  id: totrans-377
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'online-prediction.sh: [在 Cloud MLE 上执行在线预测作业的脚本]'
- en: 'create-prediction-service.sh: [script to create a prediction service on Cloud
