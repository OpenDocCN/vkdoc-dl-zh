- en: '[PRE78]'
  id: totrans-530
  prefs: []
  type: TYPE_PRE
  zh: '[PRE78]'
- en: In this chapter, we discuss training large-scale models using Google Cloud Machine
    Learning Engine, which is a part of the Google AI Platform. In the examples in
    this chapter, we trained the models using the Estimator High-level API and Scikit-learn.
    It is important to mention that the Keras high-level API can also be used to train
    large-scale models on Cloud MLE.
  id: totrans-531
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们讨论了使用Google Cloud Machine Learning Engine训练大规模模型，它是Google AI平台的一部分。在本章的示例中，我们使用Estimator高级API和Scikit-learn训练了模型。重要的是要提到，Keras高级API也可以用于在Cloud
    MLE上训练大规模模型。
- en: In the next chapter, we will cover training custom image recognition models
    with Google Cloud AutoML.
  id: totrans-532
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将介绍使用Google Cloud AutoML训练自定义图像识别模型。
- en: '42. Google AutoML: Cloud Vision'
  id: totrans-533
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 42. Google AutoML：云视觉
- en: Google Cloud AutoML Vision facilitates the creation of custom vision models
    for image recognition use cases. This managed service works with the concepts
    of transfer learning and neural architecture search under the hood to find the
    best network architecture and the optimal hyper-parameter configuration of that
    architecture that minimizes the loss function of the model. This chapter will
    go through a sample project of building a custom image recognition model using
    Google Cloud AutoML Vision. In this chapter, we will build an image model to recognize
    select cereal boxes.
  id: totrans-534
  prefs: []
  type: TYPE_NORMAL
  zh: Google Cloud AutoML Vision简化了为图像识别用例创建自定义视觉模型的过程。这项托管服务在底层使用迁移学习和神经架构搜索的概念，以找到最佳网络架构以及该架构的最优超参数配置，从而最小化模型的损失函数。本章将介绍一个使用Google
    Cloud AutoML Vision构建自定义图像识别模型的示例项目。在本章中，我们将构建一个图像模型以识别精选的谷物箱。
