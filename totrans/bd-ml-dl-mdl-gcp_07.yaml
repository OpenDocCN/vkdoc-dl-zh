  type: TYPE_NORMAL
- en: 'To create a Dataset on Cloud AutoML Vision, set the following parameters as
    shown in Figure [42-9](#Fig9):'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Dataset name: cereal_classifier.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Select a CSV file on Cloud Storage (this is the CSV file placed on the bucket
    created when Cloud AutoML was configured that contains the path to the images):
    gs://quantum-ally-219323-vcm/cereal_photos/data.csv.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **CREATE DATASET** to begin importing images (see Figure [42-10](#Fig10)).
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig10_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig10_HTML.jpg)'
