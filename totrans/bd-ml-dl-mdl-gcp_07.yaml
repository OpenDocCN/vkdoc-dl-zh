  - PREF_IND
  type: TYPE_IMG
- en: Figure 42-19
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Cloud AutoML Vision: Model as a prediction service'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: To delete a model, click the triple dash and select Models to navigate to the
    Models Dashboard (see Figure [42-21](#Fig21)). At the side of the model, click
    the triple dot and select Delete model (see Figure [42-22](#Fig22)). Confirm deletion
    as shown in Figure [42-23](#Fig23). Note, however, that API calls affiliated with
    a deleted model will cease to be operational.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig23_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig23_HTML.jpg)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 42-23
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Delete a model on Cloud AutoML Vision
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig22_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig22_HTML.jpg)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 42-22
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Select model to delete
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig21_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig21_HTML.jpg)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 42-21
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Return to Models dashboard
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: This chapter covered building and deploying custom image classification models
    using Google AutoML Cloud Vision. In the next chapter, we will discover how to
    build and deploy custom text classification models with Google Cloud AutoML for
    natural language processing.
  prefs: []
  type: TYPE_NORMAL
- en: '43. Google AutoML: Cloud Natural Language Processing'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This chapter will build a language toxicity classification model to classify
    and recognize toxic and non-toxic or clean phrases using Google Cloud AutoML for
    natural language processing (NLP). The data used in this project is from the Toxic
    Comment Classification Challenge on Kaggle by Jigsaw and Google. The data is modified
    to have a sample of 16,000 toxic and 16,000 non-toxic words as inputs to build
    the model on AutoML NLP.
  prefs: []
  type: TYPE_NORMAL
- en: Enable AutoML NLP on GCP
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The following steps will enable AutoML NLP on GCP:'
  prefs: []
  type: TYPE_NORMAL
- en: Click the triple dash in the top-left corner of the interface and select **Natural
    Language** under the category ARTIFICIAL INTELLIGENCE as shown in Figure [43-1](#Fig1).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig1_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig1_HTML.jpg)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 43-1
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Open Cloud AutoML for Natural Language
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: From the screen that follows, click **Get started with AutoML** (see Figure
    [43-2](#Fig2)).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig2_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig2_HTML.jpg)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 43-2
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Click Get started with Cloud AutoML NLP
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Click **SET UP NOW** to automatically setup the GCP project for working with
    Cloud AutoML NLP (see Figure [43-3](#Fig3)). This process involves activating
    the API for AutoML and creating a bucket on GCP for storing the data input and
    output models. We will use this bucket in the next section.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig3_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig3_HTML.jpg)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 43-3
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Auto-configure Cloud AutoML NLP
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: After configuration, the Cloud AutoML NLP Dashboard is activated (see Figure
    [43-4](#Fig4)).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig4_HTML.png](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig4_HTML.png)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 43-4
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: AutoML NLP dashboard
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Preparing the Training Dataset
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s step through preparing the dataset for building a custom language classification
    model with Cloud AutoML NLP:'
  prefs: []
  type: TYPE_NORMAL
- en: The training input can either be a document in (.txt) format or as an in-line
    text in a (.csv) file. Multiple texts can be grouped as a compressed (.zip) file.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'For this project, text files are placed in sub-folders with their grouped output
    labels as the folder names. This is later used to create a CSV file containing
    the data file path and their labels. For example:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[files]'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '[toxic]'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '[clean]'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Next, a CSV must be generated that points to the paths of the images and their
    corresponding label. Just like Cloud Vision, Cloud NLP uses the CSV file to point
    to the location of the training documents or words and their corresponding labels.
    The CSV file is placed in the same GCS bucket created AutoML NLP was configured.
    In our case, this bucket is named ‘gs://quantum-ally-219323-lcm’. The following
    code segment prepares the data and produces a CSV file.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE83]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'The preceding code will result in a CSV looking like the following sample:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE84]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: The first part is the image path or URI, while the other is the document label.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: When preparing the text dataset, it is useful to have a ‘**None_of_the_above’**
    class. This class will contain documents that do not belong to any of the predicted
    classes. Adding this class can have an overall effect on the model accuracy.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Navigate to the folder chapter and copy the image files to the GCS bucket. The
    flag **-m** initiates parallel uploads to speed up upload time of large document
    sizes to GCP.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE85]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Copy the CSV data file containing the document paths and their labels to the
    GCS bucket.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE86]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Building a Custom Language Classification Model on Cloud AutoML NLP
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This section will walk through creating a document dataset and building a custom
    language classification model on AutoML Vision.
  prefs: []
  type: TYPE_NORMAL
- en: From the Cloud AutoML NLP dashboard, click **NEW DATASET** as shown in Figure
    [43-5](#Fig5).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig5_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig5_HTML.jpg)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 43-5
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: New Dataset on AutoML NLP
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'To create a Dataset on Cloud AutoML NLP, set the following parameters as shown
    in Figure [43-6](#Fig6):'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Dataset name: toxicity_dataset.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Select a CSV file on Cloud Storage (this is the CSV file placed on the bucket
    created when Cloud AutoML was configured that contains the path to the text documents):
    gs://quantum-ally-219323-lcm/file/data.csv.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Click **CREATE DATASET** to begin importing images (see Figure [43-7](#Fig7)).
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig8_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig8_HTML.jpg)'
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_IMG
- en: Figure 43-8
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Cloud AutoML NLP: Imported text documents and their labels'
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig7_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig7_HTML.jpg)'
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_IMG
- en: Figure 43-7
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Cloud AutoML NLP: Importing text items'
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig6_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig6_HTML.jpg)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 43-6
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Create a Dataset on Cloud AutoML NLP
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: After importing the Dataset, click **TRAIN** (see Figure [43-8](#Fig8)) to initiate
    the process of building a custom language classification model.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In this example, we have a good enough number of training examples as seen in
    Figure [43-9](#Fig9), so hopefully, it makes sense to expect a good language classification
    model. Click **START TRAINING** to begin the training job.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig9_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig9_HTML.jpg)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 43-9
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Cloud AutoML NLP checking the adequacy of training examples
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Accept the default model name, and click **START TRAINING** (see Figure [43-10](#Fig10))
    to begin building the model as seen in Figure [43-11](#Fig11). Note that this
    training might take about an hour to complete. When done, the user will get an
    email of completion.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig11_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig11_HTML.jpg)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 43-11
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Training the text classification model on Cloud AutoML NLP
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig10_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig10_HTML.jpg)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 43-10
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Accept the Model name and click on “Start Training”
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: The training summary is shown in Figure [43-12](#Fig12). The training phase
    lasted for approximately 4 hours and 45 minutes.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig12_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig12_HTML.jpg)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 43-12
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Cloud AutoML NLP: Training summary'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: AutoML NLP sets aside a portion of the documents as a test set in order to evaluate
    the quality of the model after training (see Figure [43-13](#Fig13)). The F1 plot
    shows the trade-off between precision and recall. Also, a confusion matrix provides
    further insight into the model quality (see Figure [43-14](#Fig14)).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig14_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig14_HTML.jpg)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 43-14
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: F1 evaluation plot and confusion matrix on Cloud AutoML NLP
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig13_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig13_HTML.jpg)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 43-13
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Cloud AutoML NLP: Model evaluation'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: The custom text classification model is exposed as a REST or Python API for
    integration into software applications as a prediction service (see Figure [43-15](#Fig15)).
    We can test our model by uploading a sample image for classification. Figure [43-16](#Fig16)
    passes a clean text example to the model and it predicts correctly with a probability
    of 98%, while Figure [43-17](#Fig17) passes a toxic text example to the model.
    This example is also correctly classified with a probability score of 99%.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig17_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig17_HTML.jpg)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 43-17
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Toxic words example: AutoML NLP'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig16_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig16_HTML.jpg)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 43-16
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Clean words example: AutoML NLP'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_43_Chapter/463852_1_En_43_Fig15_HTML.jpg](../images/463852_1_En_43_Chapter/463852_1_En_43_Fig15_HTML.jpg)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 43-15
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Cloud AutoML NLP model as a prediction service
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: This chapter covered building and deploying custom text classification models
    using Google AutoML Cloud Vision. In the next chapter, we will build an end-to-end
    data science product on GCP.
  prefs: []
  type: TYPE_NORMAL
- en: 44. Model to Predict the Critical Temperature of Superconductors
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'This chapter builds a regression machine learning model to predict the critical
    temperature of superconductors. The features for this dataset were derived based
    on the following superconductor properties:'
  prefs: []
  type: TYPE_NORMAL
- en: Atomic mass
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: First ionization energy
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Atomic radius
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Density
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Electron affinity
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Fusion heat
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Thermal conductivity
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Valence
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: And for each property, the mean, weighted mean, geometric mean, weighted geometric
    mean, entropy, weighted entropy, range, weighted range, standard deviation, and
    weighted standard deviation are extracted. Thus, this results in a total number
    of 8 x 10 = 80 features. In addition to this, a feature that contains the number
    of elements in the superconductor is added to the design matrix. The predictor
    variable is the critical temperature of the superconductor. Hence, the dataset
    has a total of 81 features and 21,263 rows.
  prefs: []
  type: TYPE_NORMAL
- en: This dataset is made available by Kam Hamidieh of the University of Pennsylvania
    and submitted to the UCI Machine Learning Repository. The goal of this section
    is to demonstrate delivering an end-to-end machine learning modeling pipeline
    on Google Cloud Platform.
  prefs: []
  type: TYPE_NORMAL
- en: The Modeling Architecture on GCP
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The goal of this end-to-end project is to demonstrate building a large-scale
    learning model on GCP using the components already discussed in this book. The
    modeling architecture is illustrated in Figure [44-1](#Fig1). Let’s briefly explain
    the connections:'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_44_Chapter/463852_1_En_44_Fig1_HTML.jpg](../images/463852_1_En_44_Chapter/463852_1_En_44_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 44-1
  prefs: []
  type: TYPE_NORMAL
- en: Modeling architecture on GCP
  prefs: []
  type: TYPE_NORMAL
- en: Stage the raw data on GCS.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Load data into BigQuery for analytics.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Exploratory data analysis.
  prefs:
  - PREF_OL
