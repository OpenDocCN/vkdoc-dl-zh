- en: Preparing the Training Dataset
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before building a custom image recognition model with AutoML Cloud Vision, the
    dataset must be prepared in a particular format; they include
  prefs: []
  type: TYPE_NORMAL
- en: For training, JPEG, PNG, WEBP, GIF, BMP, TIFF, and ICO image formats are supported
    with a maximum size of 30mb per image.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For inference, the image formats JPEG, PNG, and GIF are supported with each
    image being of maximum size 1.5mb.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'It is best to place each image category into containing sub-folder within an
    image folder For example:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[image-directory]'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '[image-class-1-dir]'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '[image-class-2-dir]'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: …
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '[image-class-n-dir]'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Next, a CSV must be created that points to the paths of the images and their
    corresponding label. AutoML uses the CSV file to point to the location of the
    training images and their labels. The CSV file is placed in the same GCS bucket
    containing the image files. Use the bucket automatically created when AutoML Vision
    was configured. In our case, this bucket is named ‘gs://quantum-ally-219323-vcm’.
    We use the following code segment to create the CSV file used in the cereal classifier
    example.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE79]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'The preceding code will result in a CSV looking like the following sample:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE80]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: The first part is the image path or URI, while the other is the image label.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: When preparing the image dataset, it is useful to have a ‘**None_of_the_above’**
    image class. This class will contain random images that do not belong to any of
    the predicted classes. Adding this class can have an overall effect on the model
    accuracy.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Clone the GitHub book repository to the Notebook instance.
  prefs:
