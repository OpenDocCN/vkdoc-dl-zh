- en: '[PRE82]'
  prefs: []
  type: TYPE_PRE
- en: Building Custom Image Models on Cloud AutoML Vision
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In AutoML for Cloud Vision, a dataset contains the images that will be used
    in building the classifier and their corresponding labels. This section will walk
    through creating a dataset and building a custom image model on AutoML Vision.
  prefs: []
  type: TYPE_NORMAL
- en: From the Cloud AutoML Vision Dashboard, click **NEW DATASET** as shown in Figure
    [42-8](#Fig8).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig8_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig8_HTML.jpg)'
