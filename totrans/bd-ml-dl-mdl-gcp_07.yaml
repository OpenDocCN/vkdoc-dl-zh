- en: '[PRE124]'
  id: totrans-872
  prefs: []
  type: TYPE_PRE
  zh: '[PRE124]'
- en: This chapter provided a walk-through of an end-to-end process to model and deploy
    a machine learning solution on Google Cloud Platform. The next chapter will introduce
    the concepts of a microservice architecture. It provides an overview of working
    with Docker containers and their orchestration with Kubernetes on GCP.
  id: totrans-873
  prefs: []
  type: TYPE_NORMAL
  zh: 本章提供了一个端到端流程的概述，用于在Google Cloud Platform上建模和部署机器学习解决方案。下一章将介绍微服务架构的概念。它提供了在GCP上使用Docker容器及其与Kubernetes的编排的概述。
