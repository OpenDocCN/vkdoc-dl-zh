- en: Building a Simple Data Processing Pipeline
  id: totrans-310
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建简单的数据处理管道
- en: 'In this simple Beam application, we will build a Dataflow pipeline to preprocess
    a CSV file from a GCS bucket and write the output back to GCS. This example selects
    certain features and rows that are of interest to the downstream modeling task.
    Here, we considered the ‘crypto-markets.csv’ dataset. In the data preprocessing
    pipeline, we removed data attributes that may not be relevant for analytics/model
    building and we also filtered records pertaining to ‘bitcoin’. The steps that
    follow create a simple Beam pipeline and execute in on Google Dataflow:'
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个简单的 Beam 应用程序中，我们将构建一个 Dataflow 管道，从 GCS 存储桶中预处理 CSV 文件，并将输出写回 GCS。此示例选择对下游建模任务感兴趣的特征和行。在这里，我们考虑了‘crypto-markets.csv’数据集。在数据预处理管道中，我们删除了可能对分析/建模不相关的数据属性，并且我们还过滤了与‘bitcoin’相关的记录。以下步骤创建了一个简单的
    Beam 管道，并在 Google Dataflow 上执行：
- en: Enable the GCP Cloud Dataflow API and Cloud Resource Manager API from the APIs
    & Services dashboard.
  id: totrans-312
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从 API & 服务仪表板启用 GCP Cloud Dataflow API 和 Cloud Resource Manager API。
- en: Open a new Notebook.
  id: totrans-313
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开一个新的笔记本。
- en: Note that at this time of writing, Apache Beam only works with Python version
    2.7, so be sure to switch the kernel for your Python interpreter. Add the following
    code blocks in the Notebook cell.
  id: totrans-314
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 注意，在撰写本文时，Apache Beam 只与 Python 版本 2.7 兼容，因此请确保切换 Python 解释器的内核。在笔记本单元中添加以下代码块。
- en: If running on Google Colab, first authenticate the notebook with GCP.
  id: totrans-315
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果在 Google Colab 上运行，首先使用 GCP 验证笔记本。
- en: Install the Apache beam library and other important setup packages.
  id: totrans-316
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 安装 Apache beam 库和其他重要设置包。
- en: '[PRE38]'
  id: totrans-317
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: After installing, change the notebook runtime type to Python 2.
  id: totrans-318
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 安装后，将笔记本运行时类型更改为 Python 2。
- en: Next, reset the notebook kernel before running the code to import the relevant
    libraries.
  id: totrans-319
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后，在运行代码之前重置笔记本内核以导入相关库。
- en: '[PRE39]'
  id: totrans-320
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: Assign the parameters for the pipeline. Replace the relevant parameters with
    your entries.
  id: totrans-321
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为管道分配参数。用您的条目替换相关参数。
- en: '[PRE40]'
  id: totrans-322
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: Method to build and run the pipeline.
  id: totrans-323
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 构建和运行管道的方法。
- en: '[PRE41]'
  id: totrans-324
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: Run the pipeline.
  id: totrans-325
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 运行管道。
- en: '[PRE42]'
  id: totrans-326
  prefs: []
  type: TYPE_PRE
  zh: '[PRE42]'
- en: '[PRE43]'
  id: totrans-327
  prefs: []
  type: TYPE_PRE
  zh: '[PRE43]'
- en: The image in Figure [40-2](#Fig2) shows the Dataflow pipeline created as a result
    of this job.
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [40-2](#Fig2) 中的图像显示了此作业创建的数据流管道。
- en: '![../images/463852_1_En_40_Chapter/463852_1_En_40_Fig2_HTML.jpg](../images/463852_1_En_40_Chapter/463852_1_En_40_Fig2_HTML.jpg)'
  id: totrans-329
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_40_Chapter/463852_1_En_40_Fig2_HTML.jpg](../images/463852_1_En_40_Chapter/463852_1_En_40_Fig2_HTML.jpg)'
- en: Figure 40-2
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 图 40-2
- en: Preprocessing Pipeline on Google Cloud Dataflow
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: Google Cloud Dataflow 上的预处理管道
- en: More complex and advanced uses of Google Cloud Dataflow are beyond the scope
    of this book as they are more in the area of building big data pipelines for large-scale
    data transformation. However, this section is included because big data transformation
    is an important component for the design and productionalization of machine learning
    models when solving a particular business use case at scale. It is important for
    readers to get a feel of working with these sort of technologies.
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 本书不涉及Google Cloud Dataflow的更复杂和高级用法，因为它们更多地属于构建大规模数据转换的大数据管道领域。然而，这一节被包含在内，因为在大规模解决特定业务用例时，大数据转换是机器学习模型设计和生产化的一个重要组成部分。对于读者来说，了解这些技术的操作方式是很重要的。
- en: This chapter provides an introduction to building large-scale big data transformation
    pipelines using Python Apache Beam programming model that runs on Google Dataflow
    computing infrastructure. The next chapter will cover using Google Cloud Machine
    Learning Engine to train and deploy large-scale models.
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 本章介绍了使用运行在Google Dataflow计算基础设施上的Python Apache Beam编程模型构建大规模大数据转换管道的入门知识。下一章将介绍如何使用Google
    Cloud Machine Learning Engine训练和部署大规模模型。
- en: 41. Google Cloud Machine Learning Engine (Cloud MLE)
  id: totrans-334
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 41. Google Cloud Machine Learning Engine（Cloud MLE）
- en: The Google Cloud Machine Learning Engine, simply known as Cloud MLE, is a managed
    Google infrastructure for training and serving “large-scale” machine learning
    models. Cloud ML Engine is a part of GCP AI Platform. This managed infrastructure
    can train large-scale machine learning models built with TensorFlow, Keras, Scikit-learn,
    or XGBoost. It also provides modes of serving or consuming the trained models
    either as an online or batch prediction service. Using online prediction, the
    infrastructure scales in response to request throughout, while with the batch
    mode, Cloud MLE can provide inference for TBs of data.
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: Google Cloud Machine Learning Engine，简称Cloud MLE，是一个托管在Google基础设施上的服务，用于训练和部署“大规模”机器学习模型。Cloud
    ML Engine是GCP AI平台的一部分。这个托管基础设施可以训练使用TensorFlow、Keras、Scikit-learn或XGBoost构建的大规模机器学习模型。它还提供了在线或批量预测服务来提供或消费训练好的模型。使用在线预测，基础设施可以根据请求进行扩展，而使用批量模式，Cloud
    MLE可以为TB级别的数据提供推理。
- en: Two important features of Cloud MLE is the ability to perform distribution training
    and automatic hyper-parameter tuning of your models while training. The big advantage
    of automatic hyper-parameter tuning is the ability to find the best set of parameters
    that minimize the model cost or loss function. This saves time of development
    hours in iterative experiments.
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: Cloud MLE的两个重要特性是在训练模型时能够执行分布式训练和自动超参数调整。自动超参数调整的大优势是能够找到最佳参数集，以最小化模型成本或损失函数。这节省了迭代实验中的开发时间。
- en: The Cloud MLE Train/Deploy Process
  id: totrans-337
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Cloud MLE的训练/部署过程
- en: 'The high-level overview of the train/deploy process on Cloud MLE is depicted
    in Figure [41-1](#Fig1):'
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: Cloud MLE上的训练/部署过程的高级概述如图[41-1](#Fig1)所示：
- en: '![../images/463852_1_En_41_Chapter/463852_1_En_41_Fig1_HTML.jpg](../images/463852_1_En_41_Chapter/463852_1_En_41_Fig1_HTML.jpg)'
  id: totrans-339
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_41_Chapter/463852_1_En_41_Fig1_HTML.jpg](../images/463852_1_En_41_Chapter/463852_1_En_41_Fig1_HTML.jpg)'
- en: Figure 41-1
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 图41-1
- en: The train/deploy process on Cloud MLE
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: Cloud MLE上的训练/部署过程
- en: The data for training/inference is kept on GCS.
  id: totrans-342
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 训练/推理数据存储在GCS上。
- en: The execution script uses the application logic to train the model on Cloud
    MLE using the training data.
  id: totrans-343
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 执行脚本使用应用程序逻辑在Cloud MLE上使用训练数据训练模型。
- en: The trained model is stored on GCS.
  id: totrans-344
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 训练好的模型存储在GCS上。
- en: A prediction service is created on Cloud MLE using the trained model.
  id: totrans-345
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在Cloud MLE上使用训练好的模型创建了一个预测服务。
- en: The external application sends data to the deployed model for inference.
  id: totrans-346
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 外部应用程序将数据发送到已部署的模型进行推理。
- en: Preparing for Training and Serving on Cloud MLE
  id: totrans-347
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在Cloud MLE上准备训练和部署
- en: 'In this contrived example, we’ll use the famous Iris dataset to train and serve
    a TensorFlow model using the Estimator API on Cloud MLE. To begin, let’s walk
    through the following steps:'
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个虚构的例子中，我们将使用著名的Iris数据集，在Cloud MLE上使用Estimator API训练并部署TensorFlow模型。首先，让我们回顾以下步骤：
- en: '![../images/463852_1_En_41_Chapter/463852_1_En_41_Fig2_HTML.jpg](../images/463852_1_En_41_Chapter/463852_1_En_41_Fig2_HTML.jpg)'
  id: totrans-349
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_41_Chapter/463852_1_En_41_Fig2_HTML.jpg](../images/463852_1_En_41_Chapter/463852_1_En_41_Fig2_HTML.jpg)'
- en: Figure 41-2
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 图41-2
- en: Enable Cloud Machine Learning APIs
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 启用Cloud Machine Learning API
- en: Create a bucket on GCS by running the gsutil mb command on the cloud terminal.
    Replace it with unique bucket name.
  id: totrans-352
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过在云终端上运行gsutil mb命令在GCS上创建一个存储桶。用唯一的存储桶名称替换它。
- en: '[PRE44]'
  id: totrans-353
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE44]'
- en: Transfer training and test data from the code repository to the GCP bucket.
  id: totrans-354
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将训练和测试数据从代码仓库传输到 GCP 存储桶。
- en: Move the train data.
  id: totrans-355
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 移动训练数据。
- en: '[PRE45]'
  id: totrans-356
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE45]'
- en: Move the train data.
  id: totrans-357
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 移动训练数据。
- en: '[PRE46]'
  id: totrans-358
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE46]'
- en: Move the hold-out data for batch predictions.
  id: totrans-359
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 移动用于批量预测的保留数据。
- en: '[PRE47]'
  id: totrans-360
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE47]'
- en: 'Enable the Cloud Machine Learning API to be able to create and use machine
    learning models on GCP Cloud MLE:'
  id: totrans-361
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 启用 Cloud Machine Learning API 以能够在 GCP Cloud MLE 上创建和使用机器学习模型：
- en: Go to APIs & Services.
  id: totrans-362
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 前往 API & 服务。
- en: Click “Enable APIs & Services”.
  id: totrans-363
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 “Enable APIs & Services”。
- en: Search for “Cloud Machine Learning Engine”.
  id: totrans-364
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 搜索 “Cloud Machine Learning Engine”。
- en: Click ENABLE API as shown in Figure [41-2](#Fig2).
  id: totrans-365
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如图 [41-2](#Fig2) 所示，点击 ENABLE API。
- en: Packaging the Code for Training on Cloud MLE
  id: totrans-366
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为在 Cloud MLE 上训练打包代码
- en: 'The code for training on Cloud MLE must be prepared as a python package. The
    recommended project structure is explained as follows:'
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Cloud MLE 上进行训练的代码必须打包成一个 Python 包。推荐的项目结构如下所述：
- en: 'IrisCloudML: [project name as parent folder]'
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: 'IrisCloudML: [作为父文件夹的项目名称]'
- en: 'Trainer: [folder containing the model and execution code]'
