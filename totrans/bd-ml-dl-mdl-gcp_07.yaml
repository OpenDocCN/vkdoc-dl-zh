  id: totrans-378
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'create-prediction-service.sh: [在 Cloud MLE 上创建预测服务的脚本]'
- en: 'hptuning_config: [configuration file for hyper-parameter tuning on Cloud MLE]'
  id: totrans-379
