- en: Part VIIAdvanced Analytics/Machine Learning on Google Cloud Platform
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 38. Google BigQuery
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: BigQuery is a Google-managed data warehouse product that is highly scalable,
    fast, and optimized for data analytics with rudimentary in-built machine learning
    capabilities as part of the product offering. It is also one of Google’s many
    serverless products. This means that you do not physically manage the infrastructure
    assets and the overhead responsibilities/costs. It is only used to solve the business
    use case, and it just works in a highly performant manner.
  prefs: []
  type: TYPE_NORMAL
- en: BigQuery is suited for storing and analyzing structured data. The idea of structured
    data is that it must have a schema that describes the columns or fields of the
    dataset. CSV or JSON files are examples of structured data formats. BigQuery differentiates
    itself from other relational databases in that it can store a collection of other
    fields (or columns) as a record type, and a particular field in a row can have
    more than one value. These features make BigQuery more expressive for storing
    datasets without the flat row constraint of relational databases.
  prefs: []
  type: TYPE_NORMAL
- en: Similar to relational databases, BigQuery organizes rows into *tables*, and
    are accessed using the familiar Structured Query Language (SQL) for databases.
    However, individual rows in a table cannot be updated by running a SQL Update
    statement. Tables can only be appended to or entirely re-written. Meanwhile, a
    group of tables in BigQuery is organized into *datasets*.
  prefs: []
  type: TYPE_NORMAL
- en: When a query is executed in BigQuery, it runs in parallel on thousands of cores.
    This feature greatly accelerates the performance of query execution and consequently
    the speed of gaining insights from your data. This ability for massive parallel
    execution is one of the major reasons individuals, companies, and institutions
    are migrating to BigQuery as their data warehouse of choice.
  prefs: []
  type: TYPE_NORMAL
- en: Also BigQueryML is a powerful platform for building machine learning models
    inside of BigQuery. The models take advantage of automated feature engineering
    and hyper-parameter optimization and are automatically updated based on changes
    to the underlying dataset. This feature is extremely powerful and lowers the threshold
    of business intelligence and analytics personnel to more easily harness the predictive
    power of using machine learning for business forecasting and decision-making.
  prefs: []
  type: TYPE_NORMAL
- en: What BigQuery Is Not
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'As powerful and widely purposed as BigQuery is, it may not be properly suited
    for some use cases:'
  prefs: []
  type: TYPE_NORMAL
- en: BigQuery is not a replacement for a relational database. Some business use cases
    may involve a large number of table row updates; in such an instance, BigQuery
    is most likely not the data storage solution of choice, as relational databases
    are well suited for such highly transactional tasks. GCP offers the Cloud SQL
    and Cloud Spanner as parts of its managed relational products.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: BigQuery is not a NoSQL database. Data stored in BigQuery must have a schema.
    NoSQL is a schema-less data storage solution. GCP also has Cloud BigTable and
    Cloud Datastore, which are highly scalable and performant managed NoSQL products.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Getting Started with BigQuery
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: BigQuery can be accessed and used via a variety of ways; they include
  prefs: []
  type: TYPE_NORMAL
- en: The BigQuery web UI
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The command-line tool, **‘bq’**
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The client API libraries for programmatic access
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In this section, we will introduce BigQuery by working with the web UI, because
    it gives a graphical view of the datasets and tables within BigQuery and is good
    for quick execution of queries on the query engine.
  prefs: []
  type: TYPE_NORMAL
- en: To open BigQuery from the GCP dashboard, click the triple dash on the top-left
    corner and select **BigQuery** from the product section labeled **Big Data** as
    shown in Figure [38-1](#Fig1).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_38_Chapter/463852_1_En_38_Fig1_HTML.jpg](../images/463852_1_En_38_Chapter/463852_1_En_38_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 38-1
  prefs: []
  type: TYPE_NORMAL
- en: Open BigQuery
  prefs: []
  type: TYPE_NORMAL
- en: The BigQuery web UI dashboard is as shown in Figure [38-2](#Fig2).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_38_Chapter/463852_1_En_38_Fig2_HTML.jpg](../images/463852_1_En_38_Chapter/463852_1_En_38_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 38-2
  prefs: []
  type: TYPE_NORMAL
- en: BigQuery web UI
  prefs: []
  type: TYPE_NORMAL
- en: 'In Figure [38-2](#Fig2), there are three labeled sections of the BigQuery web
    UI that we’ll briefly explain:'
  prefs: []
  type: TYPE_NORMAL
- en: 'The navigation panel: This panel contains a set of BigQuery resources such
    as'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Query history: For viewing previous queries'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Saved queries: For storing frequently used queries'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Job history: For viewing BigQuery jobs such as loading, copying, and exporting
    of data'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Transfers: Link to the BigQuery Data Transfer Service UI'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Resources: Shows a list of pinned projects and their containing Datasets'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The Query editor: This is where queries are composed using the familiar SQL
