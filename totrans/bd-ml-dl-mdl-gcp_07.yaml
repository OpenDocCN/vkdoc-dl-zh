  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Load data as a Table into the newly created Dataset. We load the file using
    the ‘bq load’ command . This command loads data in a new or existing table. In
    our example, we load the data from the GCS bucket ‘gs://my-test-data/crypto-markets.csv’
    into a newly created table named ‘markets_terminal’ with the schema “slug,symbol,name,date,ranknow,open,high,low,close,volume,market,close_ratio,spread”
