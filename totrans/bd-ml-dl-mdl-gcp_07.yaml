- en: Exploratory Data Analysis
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The Table in BigQuery contains 21,264 rows. In the interest of speed and rapid
    iteration, we will not operate on all the rows of this dataset, but rather, we
    will select a thousand rows for data exploration, transformation, and machine
    learning spot checking.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE92]'
  prefs: []
  type: TYPE_PRE
- en: Next, we’ll explore the dataset to gain more understanding of the features and
    their relationships. This process is called exploratory data analysis (EDA).
  prefs: []
  type: TYPE_NORMAL
- en: Check the column datatypes.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE93]'
  prefs: []
  type: TYPE_PRE
- en: 'From the results, all the data attributes are of numeric type:'
  prefs: []
  type: TYPE_NORMAL
- en: Next, we will use a tool called **pandas profiling** . This package produces
    a full range of exploratory data analytics for a Pandas DataFrame object. The
    result includes summary statistics of the dataset such as the number of variables,
    number of data observations, and number of missing values (if any). It also includes
    a histogram visualization for each attribute, descriptive statistics (such as
    the mean, mode, standard deviation, sum, median absolute deviation, coefficient
    of variation, kurtosis, and skewness), and quantile statistics (such as minimum
    value, Q1, median, Q3, maximum, range, and interquartile range). Also, the profile
    produces multivariate correlation graphs and produces a list of variables that
    are highly correlated.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Import the pandas profiling library.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE94]'
  prefs: []
  type: TYPE_PRE
- en: Run the profile and save the output.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE95]'
  prefs: []
  type: TYPE_PRE
- en: 'To view the complete report, run the saved output variable:'
  prefs: []
  type: TYPE_NORMAL
- en: Retrieve the rejected variables (i.e, attributes with high correlation).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE96]'
  prefs: []
  type: TYPE_PRE
- en: Filter the dataset columns by removing the variables with high correlation.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE97]'
  prefs: []
  type: TYPE_PRE
- en: Next, standardize the dataset values so that they fall within the same scale
    range (we’ll be using Scikit-learn minmax_scale function). Standardizing the values
    improves the predictive performance of the model because the optimization algorithm
    can better minimize the cost function.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE98]'
  prefs: []
  type: TYPE_PRE
- en: Also, the attribute values are normalized so that the distribution more closely
    resembles a normal or Gaussian distribution. This technique is also noted to have
    a positive impact on the model performance.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE99]'
