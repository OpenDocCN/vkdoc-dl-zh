  id: totrans-820
  prefs: []
  type: TYPE_PRE
  zh: '[PRE107]'
- en: Dataflow and TensorFlow Transform for Large-Scale Data Processing
  id: totrans-821
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 大规模数据处理中的Dataflow和TensorFlow Transform
- en: 'In this section, we use Google Cloud Dataflow to carry out large-scale data
    processing on humongous datasets. Google Dataflow as earlier discussed is a serverless,
    parallel, and distributed infrastructure for running jobs for batch and stream
    data processing. Dataflow is a vital component in architecting a production pipeline
    for building and deploying large-scale machine learning products. In conjunction
    with Cloud Dataflow, we use TensorFlow Transform (TFT), a library built for preprocessing
    with Tensorflow. The goal of using TFT is to have a consistent set of transformation
    operations applied to the dataset when the model is trained and when it is served
    or deployed for consumption. In the following steps, each code block is executed
    in a Notebook cell:'
  id: totrans-822
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们使用Google Cloud Dataflow对庞大的数据集进行大规模数据处理。如前所述，Google Dataflow是一个无服务器、并行和分布式的基础设施，用于运行批处理和流数据处理作业。Dataflow是构建和部署大规模机器学习产品生产管道的关键组件。与Cloud
    Dataflow结合使用时，我们使用TensorFlow Transform（TFT），这是一个用于预处理的Tensorflow库。使用TFT的目标是在模型训练和模型用于消费或部署时，对数据集应用一致的转换操作。在以下步骤中，每个代码块都在Notebook单元格中执行：
- en: Import the relevant libraries. Remember that Apache Beam (as of now) only supports
    Python 2\. Moreso, TFT only works with a specific combination of Tensorflow and
    Apache Beam packages. In this case, TFT 0.8.0 works with TF 1.8 and Apache Beam
    [GCP] 2.5.0\. After importing the libraries, be sure to **restart the Notebook
    kernel**.
  id: totrans-823
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 导入相关库。记住，Apache Beam（目前）仅支持Python 2。更重要的是，TFT仅与Tensorflow和Apache Beam包的特定组合一起工作。在这种情况下，TFT
    0.8.0与TF 1.8和Apache Beam [GCP] 2.5.0兼容。导入库后，务必**重启Notebook内核**。
- en: At this point, change the Notebook runtime type to Python 2.0.
  id: totrans-824
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一点上，将Notebook运行时类型更改为Python 2.0。
- en: '[PRE108]'
  id: totrans-825
  prefs: []
  type: TYPE_PRE
  zh: '[PRE108]'
- en: Restart the kernel after you do a pip install.
  id: totrans-826
  prefs: []
  type: TYPE_NORMAL
  zh: 在执行pip install后重启内核。
- en: Connect to GCP.
  id: totrans-827
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 连接到GCP。
- en: Create query method for retrieving training and testing datasets from BigQuery.
  id: totrans-828
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建查询方法，从BigQuery检索训练和测试数据集。
- en: '[PRE109]'
  id: totrans-829
  prefs: []
  type: TYPE_PRE
  zh: '[PRE109]'
- en: Create requirements.txt file to install dependencies (in this case tensorflow_transform)
    on Dataflow worker machines.
  id: totrans-830
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建 requirements.txt 文件以在Dataflow工作机上安装依赖项（在本例中为 tensorflow_transform）。
- en: '[PRE110]'
  id: totrans-831
  prefs: []
  type: TYPE_PRE
  zh: '[PRE110]'
- en: The following code block uses Apache Beam to build a data preprocessing pipeline
    to transform the raw dataset into a form suitable for building a predictive model.
    The transformation is the same procedure as done earlier with the reduced dataset,
    which included removing columns that had a high correlation and scaling the dataset
    numeric values to be within the same range. The output of the preprocessing pipeline
    produces a training set and an evaluation set. The Beam pipeline also uses TensorFlow
    Transform to save the metadata (both raw and processed) of the data transformation,
    as well as the transformed graph which can later be used as part of the serving
    function of the deployed model. We made this example to include the use of TensorFlow
    Transform for reference purposes.
  id: totrans-832
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以下代码块使用Apache Beam构建数据预处理管道，将原始数据集转换为适合构建预测模型的形式。转换与之前对减少的数据集所执行的过程相同，包括删除具有高相关性的列并将数据集的数值缩放到相同的范围。预处理管道的输出产生一个训练集和一个评估集。Beam管道还使用TensorFlow
    Transform保存数据转换的元数据（包括原始和处理的），以及可以后来用作部署模型服务功能的转换图。我们制作了这个示例以包含TensorFlow Transform的参考用途。
- en: '[PRE111]'
  id: totrans-833
  prefs: []
  type: TYPE_PRE
  zh: '[PRE111]'
- en: '![../images/463852_1_En_44_Chapter/463852_1_En_44_Fig4_HTML.jpg](../images/463852_1_En_44_Chapter/463852_1_En_44_Fig4_HTML.jpg)'
  id: totrans-834
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_44_Chapter/463852_1_En_44_Fig4_HTML.jpg](../images/463852_1_En_44_Chapter/463852_1_En_44_Fig4_HTML.jpg)'
