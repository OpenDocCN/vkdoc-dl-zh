- en: Loading Data into BigQuery
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this simple data ingestion example, we will load a CSV file stored on Google
    Cloud Storage (GCS) into BigQuery. In GCP, Google Cloud Storage is a general-purpose
    storage location for all variety of file types and is preferred as a staging area
    or an archival repository for data. Let’s walk through the following steps.
  prefs: []
  type: TYPE_NORMAL
