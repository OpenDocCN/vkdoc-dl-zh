- en: BigQuery SQL
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this section, we’ll have an overview of SQL by executing some examples that
    gives a broad perspective of what can be achieved with SQL. New users who have
    not used SQL before will benefit from this section. Also, SQL is amazingly easy
    and intuitive to use that non-technical people like personnel in marketing and
    sales are experts at this even sometimes more than programmers. It is an expressive
    declarative language.
  prefs: []
  type: TYPE_NORMAL
- en: BigQuery works with both the standard SQL which supports SQL 2011 standard and
    the legacy SQL syntax which is a non-standard variant of SQL. However, standard
    SQL is the preferred query syntax for BigQuery. In experimenting with SQL, we
    will work with the **census_bureau_international** public dataset. The following
    queries are available in the chapter notebook of the book repository.
  prefs: []
  type: TYPE_NORMAL
- en: Filtering
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The following query selects the fertility rate for each country in the year
    2018 from the ‘age_specific_fertility_rates’ table in the ‘census_bureau_international’
    dataset. The resulting table is arranged in descending order.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: In the preceding query, the SQL command SELECT is used to select fields or columns
    from the table. What follows after the SELECT keyboard is the list of the column
    names separated by a comma. The keyword AS is used to give an alternative name
    to the column that will be displayed in the resulting table when the query is
    executed. The keyword FROM is used to point to the table from which the data is
    being retrieved. In BigQuery, using the standard SQL, the table name is prefixed
    by the database name and the project ID is surrounded by a pair of backticks (i.e.,
    ‘project_id.database_name.table_name‘).
  prefs: []
  type: TYPE_NORMAL
- en: The keyword WHERE is used to filter the rows returned from the query. The keyword
    ORDER BY is used to arrange the retrieved data in either ascending or descending
    order by a specified column or set of columns. The keyword LIMIT truncates the
    results retrieved from the query.
  prefs: []
  type: TYPE_NORMAL
- en: Aggregation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The following query selects the average population for each country between
    the years 2000 and 2018 from the ‘midyear_population’ table in the ‘census_bureau_international’
    dataset. The resulting table is arranged in descending order.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: In the preceding query, the fields retrieved using the SELECT command are passed
    through an aggregation function to give the average of the mid-year population
    for the years between 2000 and 2018 inclusive. In order to mix aggregated field
    and non-aggregated fields, we need the GROUP BY command to group the result by
    one or more columns, or else only a single result will be returned because of
    the aggregated function.
  prefs: []
  type: TYPE_NORMAL
- en: Joins
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The following query selects the average population for each country and their
    life expectancy for the year 2018\. The data is joined from the ‘midyear_population’
    table and the ‘mortality_life_expectancy’ table in the ‘census_bureau_international’
    dataset. The resulting table is grouped by country name and year and arranged
    in descending order.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: The JOIN command is used to bring together or concatenate data from two or more
    tables by matching their respective rows. The command uses the ON clause to determine
    what column will be used for the matching.
  prefs: []
  type: TYPE_NORMAL
- en: Subselect
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The following query selects the average population for each country and their
    life expectancy for the year 2018\. The data is joined from the ‘midyear_population’
    table and the ‘mortality_life_expectancy’ table in the ‘census_bureau_international’
    dataset. The query uses a subselect statement in the first FROM clause to filter
    by year and specific countries. The resulting table is grouped by country name
    and year and arranged in descending order. The general idea of a subselect statement
    is to be able to create more complex queries without using intermediate tables.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: The Case Against Running Select *
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In BigQuery, it is ill-advised to run the SELECT ∗ command , which is used in
    SQL to retrieve all the columns from the table. This command is rather expensive
    in BigQuery especially if your table contains terabytes of data. If instead you
    want to have a feel for the columns and their entries in your dataset, you can
    execute the command ‘bq head [table_name]’ to retrieve the first few rows of the
    table. As an example, we used the command in the following example listing to
    retrieve the first few rows of the ‘market’ table we earlier loaded from GCS in
    the ‘crypto_data’ dataset.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: Using BigQuery with Notebooks on AI Cloud Instance and Google Colab
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: BigQuery integrates well with Notebooks on Google Notebook AI Instance and Google
    Colab. In this section, we’ll go through executing on BigQuery datasets and tables
    from Notebooks. There are a couple of ways to interact with BigQuery from Notebooks,
    but one quick and easy method is the use of the **‘%bigquery’** magic command
    from the BigQuery client library, **‘google-cloud-bigquery’**, to run queries
    with minimal syntax.
  prefs: []
  type: TYPE_NORMAL
- en: 'The **%%bigquery** magic runs a SQL query and returns the results as a pandas
    DataFrame. Here, we use the ‘%%bigquery’ magic command to interact with BigQuery.
    To begin, open a Notebook on GCP AI Notebook Instance or from Colab:'
  prefs: []
  type: TYPE_NORMAL
