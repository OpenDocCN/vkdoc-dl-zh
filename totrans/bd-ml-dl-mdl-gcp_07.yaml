  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 通过GCP仪表板打开Dataprep
- en: Dataprep is a service offered on GCP in alliance with the company Trifacta.
    To begin using Dataprep, agree and accept all the license agreements (see Figure
    [39-2](#Fig2)). Dataprep creates a bucket on GCS to store the files that are uploaded
    to Dataprep and the outputs of its transformation (see Figure [39-3](#Fig3)).
    The Dataprep dashboard is shown in Figure [39-4](#Fig4).
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: Dataprep是由与Trifacta公司合作在GCP上提供的一项服务。要开始使用Dataprep，请同意并接受所有许可协议（见图[39-2](#Fig2)）。Dataprep在GCS上创建一个存储上传到Dataprep的文件及其转换输出的存储桶（见图[39-3](#Fig3)）。Dataprep仪表板如图[39-4](#Fig4)所示。
