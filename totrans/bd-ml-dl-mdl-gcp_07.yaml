- en: Dataflow and TensorFlow Transform for Large-Scale Data Processing
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In this section, we use Google Cloud Dataflow to carry out large-scale data
    processing on humongous datasets. Google Dataflow as earlier discussed is a serverless,
    parallel, and distributed infrastructure for running jobs for batch and stream
    data processing. Dataflow is a vital component in architecting a production pipeline
    for building and deploying large-scale machine learning products. In conjunction
    with Cloud Dataflow, we use TensorFlow Transform (TFT), a library built for preprocessing
    with Tensorflow. The goal of using TFT is to have a consistent set of transformation
    operations applied to the dataset when the model is trained and when it is served
    or deployed for consumption. In the following steps, each code block is executed
    in a Notebook cell:'
  prefs: []
  type: TYPE_NORMAL
- en: Import the relevant libraries. Remember that Apache Beam (as of now) only supports
    Python 2\. Moreso, TFT only works with a specific combination of Tensorflow and
    Apache Beam packages. In this case, TFT 0.8.0 works with TF 1.8 and Apache Beam
    [GCP] 2.5.0\. After importing the libraries, be sure to **restart the Notebook
    kernel**.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: At this point, change the Notebook runtime type to Python 2.0.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE108]'
  prefs: []
  type: TYPE_PRE
- en: Restart the kernel after you do a pip install.
  prefs: []
