  type: TYPE_NORMAL
- en: '[PRE110]'
  prefs: []
  type: TYPE_PRE
- en: The following code block uses Apache Beam to build a data preprocessing pipeline
    to transform the raw dataset into a form suitable for building a predictive model.
    The transformation is the same procedure as done earlier with the reduced dataset,
    which included removing columns that had a high correlation and scaling the dataset
    numeric values to be within the same range. The output of the preprocessing pipeline
    produces a training set and an evaluation set. The Beam pipeline also uses TensorFlow
    Transform to save the metadata (both raw and processed) of the data transformation,
    as well as the transformed graph which can later be used as part of the serving
    function of the deployed model. We made this example to include the use of TensorFlow
    Transform for reference purposes.
