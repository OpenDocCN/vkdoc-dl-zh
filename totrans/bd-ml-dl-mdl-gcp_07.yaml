- en: Activate Google Cloud Shell
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Create a bucket on GCS (remember to give the bucket a unique name).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Transfer data into bucket. The CSV data used in this example is a crypto-currency
    dataset stored in the code repository. Use the ‘gsutil cp’ command to move the
    dataset to GCS bucket.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
