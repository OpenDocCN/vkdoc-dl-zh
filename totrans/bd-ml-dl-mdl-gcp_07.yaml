  prefs: []
  type: TYPE_NORMAL
- en: 'After typing the query in the **Query editor** , the following should be noted,
    as numbered in Figure [38-4](#Fig4):'
  prefs: []
  type: TYPE_NORMAL
- en: Click the **‘Run query’** button to execute the query.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The green **status indicator** shows that the query is a valid SQL statement
    and shows by the side an estimate of the query size estimation.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The query results can be easily analyzed and visualized using Data Studio.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We can see that the query completed in just over a second.
