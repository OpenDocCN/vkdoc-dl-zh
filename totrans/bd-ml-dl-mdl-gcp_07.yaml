- en: Part VIIAdvanced Analytics/Machine Learning on Google Cloud Platform
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第七部分：Google Cloud Platform 上的高级分析/机器学习
- en: 38. Google BigQuery
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 38. Google BigQuery
- en: BigQuery is a Google-managed data warehouse product that is highly scalable,
    fast, and optimized for data analytics with rudimentary in-built machine learning
    capabilities as part of the product offering. It is also one of Google’s many
    serverless products. This means that you do not physically manage the infrastructure
    assets and the overhead responsibilities/costs. It is only used to solve the business
    use case, and it just works in a highly performant manner.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: BigQuery 是一款由 Google 管理的高度可扩展、快速且针对数据分析进行了优化的数据仓库产品，其产品提供包括基本的内置机器学习功能。它也是 Google
    多款无服务器产品之一。这意味着您不需要物理管理基础设施资产和相关的责任/成本。它仅用于解决业务用例，并且以高性能的方式运行。
- en: BigQuery is suited for storing and analyzing structured data. The idea of structured
    data is that it must have a schema that describes the columns or fields of the
    dataset. CSV or JSON files are examples of structured data formats. BigQuery differentiates
    itself from other relational databases in that it can store a collection of other
    fields (or columns) as a record type, and a particular field in a row can have
    more than one value. These features make BigQuery more expressive for storing
    datasets without the flat row constraint of relational databases.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: BigQuery 适用于存储和分析结构化数据。结构化数据的概念是它必须有一个模式来描述数据集的列或字段。CSV 或 JSON 文件是结构化数据格式的示例。BigQuery
    与其他关系数据库的不同之处在于，它可以存储其他字段（或列）的集合作为记录类型，并且行中的特定字段可以具有多个值。这些特性使得 BigQuery 在存储没有关系数据库扁平行约束的数据集时更加灵活。
- en: Similar to relational databases, BigQuery organizes rows into *tables*, and
    are accessed using the familiar Structured Query Language (SQL) for databases.
    However, individual rows in a table cannot be updated by running a SQL Update
    statement. Tables can only be appended to or entirely re-written. Meanwhile, a
    group of tables in BigQuery is organized into *datasets*.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 与关系数据库类似，BigQuery 将行组织到 *表格* 中，并使用熟悉的结构化查询语言（SQL）进行数据库访问。然而，无法通过运行 SQL 更新语句来更新表格中的单个行。表格只能追加或完全重写。同时，BigQuery
    中的多个表格组织成 *数据集*。
- en: When a query is executed in BigQuery, it runs in parallel on thousands of cores.
    This feature greatly accelerates the performance of query execution and consequently
    the speed of gaining insights from your data. This ability for massive parallel
    execution is one of the major reasons individuals, companies, and institutions
    are migrating to BigQuery as their data warehouse of choice.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 当在 BigQuery 中执行查询时，它将在数千个核心上并行运行。这一特性极大地加速了查询执行的性能，从而加快了从数据中获取洞察的速度。这种大规模并行执行的能力是个人、公司和机构选择
    BigQuery 作为其首选数据仓库的主要原因之一。
- en: Also BigQueryML is a powerful platform for building machine learning models
    inside of BigQuery. The models take advantage of automated feature engineering
    and hyper-parameter optimization and are automatically updated based on changes
    to the underlying dataset. This feature is extremely powerful and lowers the threshold
    of business intelligence and analytics personnel to more easily harness the predictive
    power of using machine learning for business forecasting and decision-making.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，BigQueryML 是一个强大的平台，可以在 BigQuery 内部构建机器学习模型。这些模型利用自动化的特征工程和超参数优化，并根据底层数据集的变化自动更新。这一特性极为强大，降低了商业智能和分析人员利用机器学习进行业务预测和决策的门槛。
- en: What BigQuery Is Not
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: BigQuery 不是什么
- en: 'As powerful and widely purposed as BigQuery is, it may not be properly suited
    for some use cases:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管BigQuery功能强大且用途广泛，但它可能并不适合某些用例：
- en: BigQuery is not a replacement for a relational database. Some business use cases
    may involve a large number of table row updates; in such an instance, BigQuery
    is most likely not the data storage solution of choice, as relational databases
    are well suited for such highly transactional tasks. GCP offers the Cloud SQL
    and Cloud Spanner as parts of its managed relational products.
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: BigQuery 并不是关系数据库的替代品。某些业务用例可能涉及大量表格行的更新；在这种情况下，BigQuery 很可能不是首选的数据存储解决方案，因为关系数据库非常适合此类高度事务性任务。GCP
    提供了 Cloud SQL 和 Cloud Spanner 作为其托管关系型产品的一部分。
- en: BigQuery is not a NoSQL database. Data stored in BigQuery must have a schema.
    NoSQL is a schema-less data storage solution. GCP also has Cloud BigTable and
    Cloud Datastore, which are highly scalable and performant managed NoSQL products.
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: BigQuery不是一个NoSQL数据库。存储在BigQuery中的数据必须有模式。NoSQL是一种无模式的数据库存储解决方案。GCP还有Cloud BigTable和Cloud
    Datastore，它们是高度可扩展和性能卓越的托管NoSQL产品。
- en: Getting Started with BigQuery
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: BigQuery入门
- en: BigQuery can be accessed and used via a variety of ways; they include
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: BigQuery可以通过多种方式访问和使用；它们包括
- en: The BigQuery web UI
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: BigQuery网页界面
- en: The command-line tool, **‘bq’**
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 命令行工具，**‘bq’**
- en: The client API libraries for programmatic access
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 客户端API库用于程序性访问
- en: In this section, we will introduce BigQuery by working with the web UI, because
    it gives a graphical view of the datasets and tables within BigQuery and is good
    for quick execution of queries on the query engine.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将通过使用网页界面来介绍BigQuery，因为它提供了BigQuery内数据集和表的图形视图，并且适合快速在查询引擎上执行查询。
- en: To open BigQuery from the GCP dashboard, click the triple dash on the top-left
    corner and select **BigQuery** from the product section labeled **Big Data** as
    shown in Figure [38-1](#Fig1).
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 要从GCP仪表板打开BigQuery，请点击左上角的三条横线，并从标记为**大数据**的产品部分选择**BigQuery**，如图 [38-1](#Fig1)
    所示。
- en: '![../images/463852_1_En_38_Chapter/463852_1_En_38_Fig1_HTML.jpg](../images/463852_1_En_38_Chapter/463852_1_En_38_Fig1_HTML.jpg)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_38_Chapter/463852_1_En_38_Fig1_HTML.jpg](../images/463852_1_En_38_Chapter/463852_1_En_38_Fig1_HTML.jpg)'
- en: Figure 38-1
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 图 38-1
- en: Open BigQuery
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 打开BigQuery
- en: The BigQuery web UI dashboard is as shown in Figure [38-2](#Fig2).
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: BigQuery网页界面仪表板如图 [38-2](#Fig2) 所示。
- en: '![../images/463852_1_En_38_Chapter/463852_1_En_38_Fig2_HTML.jpg](../images/463852_1_En_38_Chapter/463852_1_En_38_Fig2_HTML.jpg)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_38_Chapter/463852_1_En_38_Fig2_HTML.jpg](../images/463852_1_En_38_Chapter/463852_1_En_38_Fig2_HTML.jpg)'
- en: Figure 38-2
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 图 38-2
- en: BigQuery web UI
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: BigQuery网页界面
- en: 'In Figure [38-2](#Fig2), there are three labeled sections of the BigQuery web
    UI that we’ll briefly explain:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在图 [38-2](#Fig2) 中，BigQuery网页界面有三个标记的部分，我们将简要解释：
- en: 'The navigation panel: This panel contains a set of BigQuery resources such
    as'
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航面板：此面板包含一组BigQuery资源，例如
- en: 'Query history: For viewing previous queries'
  id: totrans-27
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 查询历史记录：用于查看以前的查询
- en: 'Saved queries: For storing frequently used queries'
  id: totrans-28
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保存的查询：用于存储常用查询
- en: 'Job history: For viewing BigQuery jobs such as loading, copying, and exporting
    of data'
  id: totrans-29
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 工作历史记录：用于查看数据加载、复制和导出等BigQuery作业
- en: 'Transfers: Link to the BigQuery Data Transfer Service UI'
  id: totrans-30
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 转移：链接到BigQuery数据传输服务UI
- en: 'Resources: Shows a list of pinned projects and their containing Datasets'
  id: totrans-31
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 资源：显示已固定项目及其包含的数据集列表
- en: 'The Query editor: This is where queries are composed using the familiar SQL
    database language.'
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 查询编辑器：这是使用熟悉的SQL数据库语言编写查询的地方。
- en: 'The Details panel: This panel shows the details of projects, datasets, and
    table when clicked in the **Resources** tab. Also, this panel shows the results
    of executed queries.'
  id: totrans-33
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 详细信息面板：当在**资源**选项卡中点击时，此面板显示项目、数据集和表的详细信息。此外，此面板还显示执行查询的结果。
- en: Public Datasets
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 公共数据集
- en: BigQuery comes with access to some public datasets; we will use these datasets
    to explore working with BigQuery. To view the public datasets, go to
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: BigQuery附带对一些公共数据集的访问权限；我们将使用这些数据集来探索与BigQuery一起工作。要查看公共数据集，请访问
- en: '[`https://console.cloud.google.com/bigquery?p=bigquery-public-data&page=project`](https://console.cloud.google.com/bigquery%253Fp%253Dbigquery-public-data%2526page%253Dproject)
    .'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://console.cloud.google.com/bigquery?p=bigquery-public-data&page=project](https://console.cloud.google.com/bigquery%253Fp%253Dbigquery-public-data%2526page%253Dproject)
    .'
- en: The public datasets will now show in the Resources section of the navigation
    panel (see Figure [38-3](#Fig3)).
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 公共数据集现在将显示在导航面板的资源部分（见图 [38-3](#Fig3)）。
- en: '![../images/463852_1_En_38_Chapter/463852_1_En_38_Fig3_HTML.jpg](../images/463852_1_En_38_Chapter/463852_1_En_38_Fig3_HTML.jpg)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_38_Chapter/463852_1_En_38_Fig3_HTML.jpg](../images/463852_1_En_38_Chapter/463852_1_En_38_Fig3_HTML.jpg)'
- en: Figure 38-3
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 图 38-3
- en: Public Datasets
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 公共数据集
- en: Running Your First Query
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 运行您的第一个查询
- en: For our first query, we will work with the **‘census_bureau_international’**
    dataset which “provides estimates of country populations since 1950 and projections
    through 2050.” In this query, we select a country and their life expectancy (for
    both sexes) in the year 2018.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的第一个查询，我们将使用**‘census_bureau_international’**数据集，该数据集“提供自1950年以来各国人口估计以及到2050年的预测。”在这个查询中，我们选择一个国家及其2018年的预期寿命（男女两性）。
- en: '[PRE0]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: A sample of the query result is shown in Figure [38-4](#Fig4) under **Query
    results**.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 查询结果的示例显示在**查询结果**下的图 [38-4](#Fig4) 中。
- en: '![../images/463852_1_En_38_Chapter/463852_1_En_38_Fig4_HTML.jpg](../images/463852_1_En_38_Chapter/463852_1_En_38_Fig4_HTML.jpg)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_38_Chapter/463852_1_En_38_Fig4_HTML.jpg](../images/463852_1_En_38_Chapter/463852_1_En_38_Fig4_HTML.jpg)'
- en: Figure 38-4
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 图 38-4
- en: First query
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 第一次查询
- en: 'After typing the query in the **Query editor** , the following should be noted,
    as numbered in Figure [38-4](#Fig4):'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在 **查询编辑器** 中输入查询后，请注意以下内容，如图 [38-4](#Fig4) 中编号所示：
- en: Click the **‘Run query’** button to execute the query.
  id: totrans-49
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 **‘运行查询’** 按钮以执行查询。
- en: The green **status indicator** shows that the query is a valid SQL statement
    and shows by the side an estimate of the query size estimation.
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 绿色的 **状态指示器** 显示查询是一个有效的 SQL 语句，并在旁边显示查询大小的估计值。
- en: The query results can be easily analyzed and visualized using Data Studio.
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 查询结果可以很容易地分析和可视化使用 Data Studio。
- en: We can see that the query completed in just over a second.
  id: totrans-52
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们可以看到查询在一秒多就完成了。
- en: Loading Data into BigQuery
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将数据加载到 BigQuery 中
- en: In this simple data ingestion example, we will load a CSV file stored on Google
    Cloud Storage (GCS) into BigQuery. In GCP, Google Cloud Storage is a general-purpose
    storage location for all variety of file types and is preferred as a staging area
    or an archival repository for data. Let’s walk through the following steps.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个简单的数据摄取示例中，我们将把存储在 Google Cloud Storage（GCS）上的 CSV 文件加载到 BigQuery 中。在 GCP
    中，Google Cloud Storage 是所有文件类型的通用存储位置，并且作为数据的中转区域或存档库的首选。让我们按以下步骤进行。
- en: Staging the Data in GCS
  id: totrans-55
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在 GCS 中准备数据
- en: 'Let’s go through the steps to stage the data in Google Cloud Storage:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过以下步骤在 Google Cloud Storage 中准备数据：
- en: Activate Cloud Shell as shown in Figure [38-5](#Fig5).
  id: totrans-57
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 激活 Cloud Shell，如图 [38-5](#Fig5) 所示。
- en: '![../images/463852_1_En_38_Chapter/463852_1_En_38_Fig5_HTML.jpg](../images/463852_1_En_38_Chapter/463852_1_En_38_Fig5_HTML.jpg)'
  id: totrans-58
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_38_Chapter/463852_1_En_38_Fig5_HTML.jpg](../images/463852_1_En_38_Chapter/463852_1_En_38_Fig5_HTML.jpg)'
- en: Figure 38-5
  id: totrans-59
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 38-5
- en: Activate Google Cloud Shell
  id: totrans-60
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 激活 Google Cloud Shell
- en: Create a bucket on GCS (remember to give the bucket a unique name).
  id: totrans-61
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 GCS 上创建一个桶（记得给桶起一个唯一名称）。
- en: Transfer data into bucket. The CSV data used in this example is a crypto-currency
    dataset stored in the code repository. Use the ‘gsutil cp’ command to move the
    dataset to GCS bucket.
  id: totrans-62
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将数据传输到桶。本例中使用的 CSV 数据是存储在代码仓库中的加密货币数据集。使用 ‘gsutil cp’ 命令将数据集移动到 GCS 桶。
- en: '[PRE1]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Show the transferred data in the bucket.
  id: totrans-64
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在桶中显示传输的数据。
- en: '[PRE2]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '[PRE3]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Loading Data Using the BigQuery Web UI
  id: totrans-67
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用 BigQuery Web UI 加载数据
- en: 'Let’s go through the following steps to load data into BigQuery using the web
    UI:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们按以下步骤使用 Web UI 将数据加载到 BigQuery 中：
- en: '![../images/463852_1_En_38_Chapter/463852_1_En_38_Fig9_HTML.jpg](../images/463852_1_En_38_Chapter/463852_1_En_38_Fig9_HTML.jpg)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_38_Chapter/463852_1_En_38_Fig9_HTML.jpg](../images/463852_1_En_38_Chapter/463852_1_En_38_Fig9_HTML.jpg)'
- en: Figure 38-9
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 图 38-9
- en: Create table options
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 创建表选项
- en: In the navigation panel, click the project name, and then click **CREATE DATASET**
    in the Details panel (see Figure [38-6](#Fig6)).
  id: totrans-72
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在导航面板中点击项目名称，然后在详细信息面板中点击 **创建数据集**（见图 [38-6](#Fig6)）。
- en: '![../images/463852_1_En_38_Chapter/463852_1_En_38_Fig6_HTML.jpg](../images/463852_1_En_38_Chapter/463852_1_En_38_Fig6_HTML.jpg)'
  id: totrans-73
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_38_Chapter/463852_1_En_38_Fig6_HTML.jpg](../images/463852_1_En_38_Chapter/463852_1_En_38_Fig6_HTML.jpg)'
- en: Figure 38-6
  id: totrans-74
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 38-6
- en: Create Dataset
  id: totrans-75
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 创建数据集
- en: Type ‘crypto_data’ as the **DatasetID,** and select ‘United States (US)’ as
