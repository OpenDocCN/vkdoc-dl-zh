  type: TYPE_NORMAL
- en: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig16_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig16_HTML.jpg)'
  prefs:
  - PREF_IND
