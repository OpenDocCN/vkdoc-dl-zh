  id: totrans-818
  prefs: []
  type: TYPE_NORMAL
  zh: 图44-3
- en: RMSE estimates for ML algorithms
  id: totrans-819
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习算法的RMSE估计
