  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig15_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig15_HTML.jpg)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 42-15
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Cloud AutoML Vision: Training summary'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: AutoML Vision uses the set-aside test images to evaluate the quality of the
    model after training as seen in Figure [42-16](#Fig16). The F1 plot showing the
    trade-off between precision and recall is shown in Figure [42-17](#Fig17). Also,
    a visual confusion matrix is provided to further evaluate the model quality (see
    Figure [42-18](#Fig18)).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig18_HTML.png](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig18_HTML.png)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 42-18
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Confusion matrix for model evaluation on Cloud AutoML Vision
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_42_Chapter/463852_1_En_42_Fig17_HTML.jpg](../images/463852_1_En_42_Chapter/463852_1_En_42_Fig17_HTML.jpg)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 42-17
  prefs:
  - PREF_IND
