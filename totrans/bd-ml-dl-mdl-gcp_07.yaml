- en: '[PRE24]'
  id: totrans-166
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE24]'
- en: BigQueryML
  id: totrans-167
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: BigQueryML
- en: BigQuery machine learning makes it quick and easy to harness the power of machine
    learning on your datasets in BigQuery by using simple standard SQL commands. This
    functionality includes the capability to train and test models on the datasets
    by using subsets of the data, as well as the capability for automatic hyper-parameter
    tuning of the learning models.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: BigQuery 机器学习通过使用简单的标准 SQL 命令，使利用 BigQuery 中的数据集进行机器学习的强大功能变得快速简单。此功能包括使用数据子集在数据集上训练和测试模型的能力，以及自动调整学习模型超参数的能力。
- en: 'At this time of writing, the following learning models are available in BigQuery:'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 在撰写本文时，以下学习模型在 BigQuery 中可用：
- en: Linear regression
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 线性回归
- en: Binary and multi-class logistic regression
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 二元和多类逻辑回归
- en: 'In this section, we’ll work with BigQuery ML using the Notebook instance on
    Colab on Google AI VMs to build a predictive model using the ‘market’ table in
    the ‘crypto_data’ dataset that we earlier imported into BigQuery. This model will
    attempt to predict the next day’s closing price of the Bitcoin crypto-currency
    given a set of market attributes. The data processing and machine learning modeling
    is all done using standard SQL:'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将使用 Google AI VMs 上的 Colab 笔记本实例与 BigQuery ML 一起工作，使用我们之前导入到 BigQuery
    中的‘crypto_data’数据集中的‘market’表来构建预测模型。该模型将尝试根据一组市场属性预测比特币加密货币的下一日收盘价。数据处理和机器学习建模全部使用标准
    SQL 完成：
- en: Open a new notebook.
  id: totrans-173
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开一个新的笔记本。
- en: Select features for training the ML model. In the SQL code, we use the ‘LEAD()’
    function to return the value of the next row. The offset of 1 indicates that we
    want to get the next value that is one step ahead in the query. With this, it
    is easy to adjust the query to predict a 2- to n-day window. The LEAD() function
    is a window function that moves over a rowset. Hence, the OVER() function is used
    to define a window within a query, while the PARTITION BY and ORDER BY clauses
    divide the query results into partitions and define the arrangement of the rows
    within each partition.
  id: totrans-174
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择用于训练机器学习模型的特征。在 SQL 代码中，我们使用‘LEAD()’函数来返回下一行的值。偏移量 1 表示我们想要获取查询中向前一步的下一个值。有了这个，就可以轻松调整查询以预测
    2 到 n 天的窗口。LEAD() 函数是一个窗口函数，它遍历行集。因此，使用 OVER() 函数在查询中定义一个窗口，而 PARTITION BY 和 ORDER
    BY 子句将查询结果分成分区，并定义每个分区中行的排列。
- en: We use the ‘params’ variable to sample half of the data and store it in the
    ‘TRAIN’ set. This makes sure that the rest of the dataset is not used in model
    training and can be used to check that the model generalizes well during the model
    evaluation phase.
  id: totrans-175
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 我们使用‘params’变量来采样一半的数据并将其存储在‘TRAIN’集中。这确保了剩余的数据集在模型训练中不被使用，可以在模型评估阶段用来检查模型是否具有良好的泛化能力。
- en: Be sure to update the FROM field with your dataset and table IDs.
  id: totrans-176
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 确保更新 FROM 字段，包含您的数据集和表 ID。
- en: '[PRE25]'
  id: totrans-177
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE25]'
- en: Display the first ten rows of the query.
  id: totrans-178
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 显示查询的前十行。
- en: btc_market.head(10)
  id: totrans-179
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: btc_market.head(10)
- en: '[PRE26]'
  id: totrans-180
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE26]'
- en: The trained model is stored in a BigQuery dataset. In this case, we’ll create
    a BigQuery dataset to store the model.
  id: totrans-181
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 训练好的模型存储在 BigQuery 数据集中。在这种情况下，我们将创建一个 BigQuery 数据集来存储模型。
- en: '[PRE27]'
  id: totrans-182
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE27]'
- en: After preparing our training dataset, now it is time to train the model. Be
    sure to update the FROM field with your dataset and table IDs.
  id: totrans-183
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在准备我们的训练数据集之后，现在是时候训练模型了。确保更新 FROM 字段，包含您的数据集和表 ID。
- en: '[PRE28]'
  id: totrans-184
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE28]'
- en: Check that the created model exists in the Dataset ‘btc_crypto’. We prefix the
    exclamation sign (‘!’) in a Notebook cell to execute bash commands.
  id: totrans-185
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 检查创建的模型是否存在于数据集“btc_crypto”中。我们在笔记本单元格中用感叹号（‘!’）作为前缀来执行 bash 命令。
- en: '[PRE29]'
  id: totrans-186
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE29]'
- en: Evaluate the model to estimate the performance of the model. The RMSE metric
    is evaluated in BigQuery calling the ‘mean_squared_error’ field of the trained
    model and passing it through the ‘SQRT()’ function. To evaluate the model, pass
    the model through the function ‘ML.EVALUATE()’. This time we select the remaining
    subset of the dataset and store it in ‘params.EVAL’.
  id: totrans-187
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 评估模型以估计模型的性能。RMSE 指标通过在 BigQuery 中调用训练模型的‘mean_squared_error’字段并通过‘SQRT()’函数传递来评估。为了评估模型，通过函数‘ML.EVALUATE()’传递模型。这次我们选择数据集的剩余子集并将其存储在‘params.EVAL’中。
- en: Be sure to update the FROM field with your dataset and table IDs.
  id: totrans-188
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确保更新 FROM 字段，包含您的数据集和表 ID。
- en: '[PRE30]'
  id: totrans-189
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE30]'
- en: Predict the next day’s closing prices for the Bitcoin crypto-currency using
    the trained model. Be sure to update the FROM field with your dataset and table
    IDs.
  id: totrans-190
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用训练好的模型预测比特币加密货币的下一日收盘价。确保更新 FROM 字段，包含您的数据集和表 ID。
- en: '[PRE31]'
  id: totrans-191
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: This chapter provided an overview of working with Google BigQuery as a data
    warehouse and analytics platform on GCP. It covered working with BigQuery from
    Notebooks hosted on Google Colab or on GCP AI Instances and included how to work
    with BigQuery ML to build machine learning predictive models using SQL commands.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 本章提供了在 GCP 上使用 Google BigQuery 作为数据仓库和数据分析平台的概述。它涵盖了在 Google Colab 或 GCP AI
    实例上托管笔记本中使用 BigQuery，以及如何使用 BigQuery ML 通过 SQL 命令构建机器学习预测模型。
- en: The next chapter will introduce Cloud Dataprep for visually exploring and transforming
    large datasets on GCP.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 下一章将介绍 Cloud Dataprep，用于在 GCP 上可视化和转换大型数据集。
- en: 39. Google Cloud Dataprep
  id: totrans-194
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 39. Google Cloud Dataprep
- en: Google Cloud Dataprep is a managed cloud service for quick data exploration
    and transformation. Dataprep makes it easy to clean and transform large datasets
    for analysis. It is auto-scalable as it takes advantage of the distributed processing
    capabilities of Google Cloud Dataflow.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: Google Cloud Dataprep是一种托管云服务，用于快速数据探索和转换。Dataprep使得清理和转换大量数据集以进行分析变得容易。由于它利用了Google
    Cloud Dataflow的分布式处理能力，因此它是自动可扩展的。
- en: Typically Cloud Dataprep is aimed at easing the data preparation process. Datasets
    from real-world use cases are often messy and untidy. In this form, it cannot
    be used for downstream analytics or machine learning modeling. Hence, a large
    portion of the modeling process involves preparing and cleaning the data. Programming
    libraries earlier discussed like Pandas are centrally used for carrying out data
    preparation. However, Google Cloud Dataprep provides a simple visual interface
    for performing data cleaning. The ability to re-organize the dataset for modeling
    quickly without coding provides an instant appeal for Dataprep, as this can greatly
    speed up the time spent in data preparation as part of the overall modeling pipeline.
    The other good part is that Dataprep can work with petabyte scale data as it is
    built on a serverless infrastructure. Dataprep can be used for processing structured
    and unstructured datasets.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，Cloud Dataprep旨在简化数据准备过程。来自现实世界用例的数据集通常杂乱无章。在这种情况下，它不能用于下游分析或机器学习建模。因此，建模过程的大部分时间都涉及准备和清理数据。之前讨论过的编程库，如Pandas，在执行数据准备时被集中使用。然而，Google
    Cloud Dataprep提供了一个简单的可视化界面来执行数据清理。能够快速重新组织数据集以进行建模，无需编码，这为Dataprep提供了即时的吸引力，因为它可以大大加快作为整体建模流程一部分的数据准备时间。另一个好处是，由于Dataprep建立在无服务器基础设施之上，它可以处理PB级规模的数据。Dataprep可用于处理结构化和非结构化数据集。
- en: In this section, we’ll go through a brief tour of Google Dataprep by using it
    to prepare our ‘crypto_markets.csv’ dataset already stored on Google Cloud Storage.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将通过使用它来准备已存储在Google Cloud Storage上的“crypto_markets.csv”数据集，对Google Dataprep进行简要的浏览。
- en: Getting Started with Cloud Dataprep
  id: totrans-198
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Cloud Dataprep入门
- en: From the GCP dashboard, click the triple dash at the top-left corner and scroll
    down to ‘Dataprep’ under the **BIG DATA** section as seen in Figure [39-1](#Fig1).
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 从GCP仪表板，点击左上角的三个短横线，向下滚动到**大数据**部分下的“Dataprep”，如图[39-1](#Fig1)所示。
