- en: 2. Introduction to Deep Learning
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Neurons
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The study of how the brain works has fascinated scientists for long. This fascination
    got the wings with the advent of histology, unveiling how neurons are organized.
    The neuron doctrine states that the nervous system comprises independent neurons.
    However, earlier it was widely believed that the nervous system consists of a
    single continuous network, a theory proposed by Joseph von Gerlach and propounded
    by Camillo Golgi. Golgi also invented a staining technique that helped prove this
    theory wrong. Using this technique, Santiago Ramón y Cajal proved that the neurons
    are independent cells. The structure of neurons was also unveiled using this very
    staining technique. The term *neuron* was proposed by Heinrich Wilhelm Gottfried
    Waldeyer-Hartz in around 1891.
  prefs: []
  type: TYPE_NORMAL
- en: Both Golgi and Cajal (Figure [2-1(a)](#Fig1)) were awarded the 1911 Nobel Prize
    for their work. Electron microscopy later proved that neurons are, in fact, independent
    cells. These neurons inspired Neural Networks. The cartoon shown in Figure [2-1(b)](#Fig1)
    is made using an application, Imagen, that uses these Neural Networks. The above
    timeline is shown in Figure [2-1(c)](#Fig1).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_2_Chapter/611710_1_En_2_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-1(c)
  prefs: []
  type: TYPE_NORMAL
- en: 'Timeline: neuron'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_2_Chapter/611710_1_En_2_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-1(b)
  prefs: []
  type: TYPE_NORMAL
- en: 'Golgi, Cajal, and neuron: cartoon made using Imagen, a Deep Learning`–`based
    application'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_2_Chapter/611710_1_En_2_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-1(a)
  prefs: []
  type: TYPE_NORMAL
- en: Golgi (top left), Cajal (top right), and staining of neurons (bottom)
  prefs: []
  type: TYPE_NORMAL
- en: From Perceptron to the Winter of Artificial Intelligence
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The models that we will discuss in this book are Deep Neural Networks (DNNs).
    These models are based on Neural Networks, which draw their inspiration from a
    neuron. The first computational model inspired by a neuron was the McCulloch`–`Pitts
    model. This model was proposed by a neurologist, McCulloch, and a logician, Pitts.
    The model had binary inputs *x*[1], *x*[2], *x*[3], …, *x*[*n*], *x*[*i*]*ϵ*{0,
    1}, binary output,*yϵ*{0, 1}, and a thresholding unit. The models were able to
    implement logic gates, and hence it was established that they could implement
    a logic machine.
  prefs: []
  type: TYPE_NORMAL
- en: Frank Rosenblatt proposed continuous weights and inputs, which markedly improved
    the power of perceptrons. Now, they could be used for linear classification and
    regression. People said that they would be able to rule the world, but the enthusiasm
    did not last long. Minsky and Papert wrote a book called *Perceptrons*, in which
    they proved that the perceptrons had limitations. They, in particular, discussed
    the XOR problem, which could not be solved by these models. This led to the withering
    of interest in Neural Networks from 1969 to the mid-1980s. In 1986 Rumelhart et
    al. proposed the backpropagation algorithm that could be used to train a Multi-layer
    Perceptron (MLP). This helped develop Neural Networks having multiple layers that
    could solve the XOR problem and greatly improved their performance on various
    supervised learning tasks. The concept of pretraining the networks was proposed
    in 1991, which laid the foundation of many works after 2006.
  prefs: []
  type: TYPE_NORMAL
- en: The above timeline is shown in Figure [2-2](#Fig4).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_2_Chapter/611710_1_En_2_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-2
  prefs: []
  type: TYPE_NORMAL
- en: 'Timeline: Neural Networks'
  prefs: []
  type: TYPE_NORMAL
- en: Chapter [3](611710_1_En_3_Chapter.xhtml) of this book discusses all these models
    in detail.
  prefs: []
  type: TYPE_NORMAL
- en: Imagery and Convolutional Neural Networks
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For imaging-related tasks, a network capable of inferring the spatial correlation
    was needed. Cats helped the Scientific Fraternity come up with such networks.
    (Really!) An experiment on cats proved that only some parts of the brain are activated
    in response to a particular stimulus (Figure [2-3](#Fig5)). The experiment was
    carried out by Hubel and Wiesel who showed that
  prefs: []
  type: TYPE_NORMAL
- en: '*A Neuron fires only in response to a particular stimulus in a particular region.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The development of Neural Networks, based on the above concept, called the Convolutional
    Neural Network (CNN), dates back to the 1990s. A CNN, called LeNet, was proposed
    to identify handwritten digits. This work also gave us the famous MNIST dataset,
    which was later used by many scientists, working in this field, to test their
    model.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_2_Chapter/611710_1_En_2_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-3
  prefs: []
  type: TYPE_NORMAL
- en: Only some parts of a cat’s brain are activated on seeing a particular image
  prefs: []
  type: TYPE_NORMAL
- en: The advances in image analysis got a boost with the advent of the ImageNet competition.
    It had 1000 classes and numerous images. As per the official site
  prefs: []
  type: TYPE_NORMAL
- en: ImageNet is an image database organized according to the [WordNet](http://wordnet.princeton.edu/)
    hierarchy, in which each node of the hierarchy is depicted by hundreds and thousands
    of images. The project has been [instrumental](https://qz.com/1034972/the-data-that-changed-the-direction-of-ai-research-and-possibly-the-world/)
    in advancing computer vision and deep learning research. The data is available
    for free to researchers for non-commercial use. [[3](#CR3)]
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The models that won or performed well in this competition later became important
    in this field. Some of these included
  prefs: []
  type: TYPE_NORMAL
- en: AlexNet, which has eight layers
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: ZFNet, which has eight layers but a better error rate as compared with AlexNet
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: VGG-Net, which has 19 layers and still a better error rate
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: GoogLeNet
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: ResNet
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We will discuss some of these models in Chapter [7](611710_1_En_7_Chapter.xhtml)
    of this book.
  prefs: []
  type: TYPE_NORMAL
- en: The last two decades witnessed many tasks being accomplished by deep networks.
    One of the first was handwriting recognition. Graves et al. outperformed the then
    state-of-the-art models in 2009 and that, too, for Arabic handwriting. Cireşan
    et al. created a benchmark on the MNIST dataset. The next year saw the advent
    of a pattern recognizer for the IJCNN traffic sign recognition system.
  prefs: []
  type: TYPE_NORMAL
- en: 2016 saw major advances in the Speech Recognition System with an improvement
    of around 16% vis-à-vis the then state-of-the-art models on a dataset.
  prefs: []
  type: TYPE_NORMAL
- en: The above discussion is summarized in Figure [2-4](#Fig6).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_2_Chapter/611710_1_En_2_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-4
  prefs: []
  type: TYPE_NORMAL
- en: The advent of Deep Learning
  prefs: []
  type: TYPE_NORMAL
- en: The CNN models are introduced in Chapter [6](611710_1_En_6_Chapter.xhtml) of
    this book.
  prefs: []
  type: TYPE_NORMAL
- en: What’s New
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The advent of better optimizers led to better convergence and better accuracies.
    The optimization algorithms starting from gradient descent, Nesterov (1983), AdaGrad
    (2011), RMSprop (2012), and Adam (2015) set the things rolling for deep networks.
    As a matter of fact, many new algorithms including Eve and Beyond Adam were proposed
    later (Figure [2-5](#Fig7)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_2_Chapter/611710_1_En_2_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-5
  prefs: []
  type: TYPE_NORMAL
- en: Optimization algorithms
  prefs: []
  type: TYPE_NORMAL
- en: The above was accompanied by new activation functions like tanh (1991), Rectified
    Linear Unit (ReLU) (2010), Leaky ReLU (2013), and SIREN (2020). Also, the betterment
    in the hardware has contributed to the development of Deep Learning.
  prefs: []
  type: TYPE_NORMAL
- en: Sequences
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Though fully connected networks helped us crack many tough problems and Convolutional
    Neural Networks helped us solve many image-related problems, the problems related
    to sequences were yet to be handled.
  prefs: []
  type: TYPE_NORMAL
- en: The handling of sequences could solve problems related to text, speech, time
    series, and so on. In these problems, the relation between the different steps
    of a sequence plays an equally important role. The Hopfield Network proposed in
    1982 modeled a content-addressable memory. The Jordan network gave the idea of
    having the output of one state become an input to the next state. Likewise, the
    idea of the hidden state of a network becoming the hidden state of another network
    was proposed by the Elman network.
  prefs: []
  type: TYPE_NORMAL
- en: The recursive networks so developed suffered from problems like vanishing gradient.
    The problem was addressed by models like Gate Recurrent Unit (GRU) and Long Short-Term
    Memory (LSTM).
  prefs: []
  type: TYPE_NORMAL
- en: Chapter [8](611710_1_En_8_Chapter.xhtml) of this book introduces these models
    to the reader.
  prefs: []
  type: TYPE_NORMAL
- en: The above timeline is shown in Figure [2-6](#Fig8).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_2_Chapter/611710_1_En_2_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-6
  prefs: []
  type: TYPE_NORMAL
- en: 'Timeline: sequence models'
  prefs: []
  type: TYPE_NORMAL
- en: The Definition
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The last chapter discussed Machine Learning and its pipeline. To apply Machine
    Learning for supervised and unsupervised tasks, preprocessing, feature extraction,
    and feature selection are required. Feature extraction is generally modality specific.
    Moreover, one can apply numerous feature extraction methods to represent the given
    data. The selection of the optimal methods is a precarious task. The same is the
    case with feature selection. As discussed in the previous chapter, feature selection
    can be done using filter and wrapper methods. So there are numerous techniques
    for selecting the most pertinent features.
  prefs: []
  type: TYPE_NORMAL
- en: The Deep Learning methods extract the appropriate features and select the most
    important ones without explicitly stating which one to use.
  prefs: []
  type: TYPE_NORMAL
- en: 'Moreover, Deep Learning generally results in better performance provided that
    a sufficient amount of data is given as input to the model. They use state-of-the-art
    optimization methods and make appropriate use of the hardware. Formally, Deep
    Learning may be defined as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: Deep-learning methods are representation-learning methods with multiple levels
    of representation, obtained by composing simple but non-linear modules that each
    transform the representation at one level (starting with the raw input) into a
    representation at a higher, slightly more abstract level. [[1](#CR1)]
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Since this training requires a lot of data and resources and most of the time,
    we do not have such a large amount of data or resources, some models are trained
    on large datasets by companies and institutes having ample resources, and then
    they are used to accomplish similar tasks with similar datasets. Here comes the
    concept of transfer learning. Formally, transfer learning may be defined as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: Transfer learning is the ability of a system to recognize and apply knowledge
    and skills gained in previous tasks to new tasks. [[2](#CR2)]
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Deep Learning not just extracts the features and selects the pertinent features,
    but can implement each and every step of the conventional Machine Learning pipeline.
    This is generally referred to as end-to-end learning. End-to-end learning may
    be defined as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: End-to-end learning allows neural networks to transform raw data inputs (such
    as images) through a series of operations, culminating in final predictions (like
    class probabilities). This entire transformation process is optimized simultaneously
    using backpropagation, where the parameters of all layers are adjusted together
    based on the loss calculated at the output layer​. [[3](#CR3)]
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Generate Data Using Deep Learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: From classifying digits to writing stories and creating images, we have come
    a long way. Table [2-1](#Tab1) shows some of the important applications and platforms
    that help generate text, audio, video, and images using Deep Learning. The reader
    is expected to explore each of them and access the output. You will get a very
    good idea of the heights to which the Deep Learning community has scaled over
    the last two decades.
