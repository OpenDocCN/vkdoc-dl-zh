- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter presented a brief overview of the timeline of Deep Learning. The
    development of the first computational model inspired by the structure of a neuron,
    the McCulloch`–`Pitts model, and the present-day generative models have been introduced
    in this chapter. The chapter, in particular, deals with neurons, Neural Networks,
    Convolutional Neural Networks, sequence models, and the latest tools currently
    being used to accomplish an assortment of tasks, from writing letters to generating
    images. The models will be discussed, in detail, in the following chapters. Machines
    are becoming creative, and they will become more creative in the days to come.
    We conclude our discussion with the story generated by a Large Language Model
    (LLM) called Gemini. Have a look at the output (Figure [2-7](#Fig9))! If you find
    it interesting, then this book is a first step toward making you capable of writing
    programs that can generate interesting things. Welcome to the world of Deep Learning!
  prefs: []
  type: TYPE_NORMAL
