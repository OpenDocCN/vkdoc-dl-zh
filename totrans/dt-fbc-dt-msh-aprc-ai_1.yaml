- en: '2. Terminology: Data Fabric and Data Mesh'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This chapter explains the key terms that will be used throughout this book,
    the terms *Data Fabric* and *Data Mesh*, and how these two terms relate to each
    other. We introduce the term *data-as-a-product* or *shopping-for-data* and provide
    a high-level introduction into AI-infused Data Fabric capabilities. The chapter
    concludes with a description of a data product as a key concept of a Data Mesh.
  prefs: []
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The terms *Data Fabric* and *Data Mesh* are often viewed as different, conflicting,
    or at the best overlapping data architectures or frameworks, data management concepts,
    or approaches to discover, explore, govern, and consume data. However, these concepts
    are related to each other, where each concept emphasizes specific imperatives
    or objectives.
  prefs: []
  type: TYPE_NORMAL
- en: A Data Fabric^([1](#Fn1)) has its focus more on the architectural underpinning,
    technical capabilities, and intelligent analysis to produce active metadata supporting
    a smarter, AI-infused system^([2](#Fn2)) to orchestrate various data integration
    styles, enabling trusted and reusable data in a hybrid cloud landscape to be consumed
    by humans, applications, or other downstream systems. Data cataloging to generate
    and leverage active metadata is seen as a vital component of any Data Fabric.
  prefs: []
  type: TYPE_NORMAL
- en: A Data Mesh^([3](#Fn3)) views data primarily as organized around domain owners
    who create business-focused *data products*, which can be aggregated and consumed
    across distributed consumers, organizations, and Line of Business (LoBs) in a
    *self-service* and *shopping-for-data* fashion. Transforming data from disparate
    data sources to be consumed as *data-as-a-product* is an essential paradigm of
    any Data Mesh. The key phrases *self-service*, *data marketplace*, *data-as-a-product*,
    and *shopping-for-data* are described further down in this chapter.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we convey a perspective of a Data Fabric to serve as an architectural
    underpinning to build a Data Mesh solution, where a Data Fabric with corresponding
    technical capabilities can additionally serve as an architectural underpinning
    for other solutions as well, for example, a traditional DWH solution. By using
    the terms *Data Fabric* and *Data Mesh*, we furthermore refer to structured and
    unstructured data, ETL stages, as well as other AI-related artefacts, for instance,
    ML/DL models, pipelines, etc.
  prefs: []
  type: TYPE_NORMAL
- en: Data Fabric Concept
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The term *Data Fabric* was coined by NetApp^([4](#Fn4)) in a white paper from
    2016 as a “vision for data management… that seamlessly connects different clouds,
    whether they are private, public, or hybrid environments.” The NetApp description
    of a Data Fabric is focusing on the hybrid cloud landscape, highlighting key aspects
    like data security, governance, integration, the applications and services layer,
    etc. However, it neglects essential Data Fabric capabilities, for instance, the
    active metadata-driven approach, AI/ML-infused tasks, and self-service delivery.
  prefs: []
  type: TYPE_NORMAL
- en: Gartner^([5](#Fn5)) defines Data Fabric as a “design concept that serves as
    an integrated layer (fabric) of data and connecting processes. A data fabric utilizes
    continuous analytics over existing, discoverable, and inferenced metadata assets
    to support the design, deployment, and utilization of integrated and reusable
    data across all environments, including hybrid and multi-cloud platforms.” In
    their Data Fabric architecture, Gartner emphasizes key characteristics, such as
    embedded AI/ML, semantic knowledge graphs, automating repetitive tasks, active
    metadata (technical, business, operational, and social), dynamic data integration,
    data cataloging, and automated data orchestration. With these characteristics,
    Gartner’s Data Fabric architecture description is rather exhaustive and state
    of the art.
  prefs: []
  type: TYPE_NORMAL
- en: Forrester^([6](#Fn6)) defines a Data Fabric to deliver a “unified, integrated,
    and intelligent end-to-end data platform to support new and emerging use cases.
    It automates all data management functions `–` including ingestion, transformation,
    orchestration, governance, security, preparation, quality, and curation `–` enabling
    insights and analytics to accelerate use cases quickly.” In their document, Forrester
    highlights built-in automation and intelligence across all data management functions,
    governance and compliance requirements, data cataloging, integration, AI/ML, knowledge
    graphs, and integration with Master Data Management (MDM), which is a rather comprehensive
    and complete set of Data Fabric capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: Data Fabric Framework
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As you have seen in Chapter [1](537582_1_En_1_Chapter.xhtml), the Data Fabric
    is the result from the data architecture evolution. However, many of its capabilities
    were in existence already long before the term *Data Fabric* was coined. For instance,
    data integration and data governance have been on the agenda of the IT industry
    for decades. So what are the new imperatives and capabilities that stand out?
  prefs: []
  type: TYPE_NORMAL
- en: It is foremost the AI/ML-based augmentation and automation of all Data Fabric
    areas, including AI/ML-based smart integration,^([7](#Fn7)) generating active
    metadata and knowledge graphs to be captured in the knowledge catalog. Furthermore,
    ensuring trustworthy AI and broadening the scope of traditional data governance
    toward unified AI governance is a relatively new area that goes far beyond just
    focusing on data by including AI models and corresponding AI artefacts into the
    governance realm. Finally, automated generation, discovery, and enforcement of
    data rules and policies is increasingly underpinned with AI/ML.
  prefs: []
  type: TYPE_NORMAL
- en: These new imperatives and characteristics are depicted in Figure [2-1](#Fig1),
    which is a high-level illustration of a state-of-the-art Data Fabric framework.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_2_Chapter/537582_1_En_2_Fig1_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A model diagram represents the interactions between the elements of application
    or data consumers, self-service capabilities, and data fabric deployment infrastructure
    containing hybrid cloud and data sources.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-1
  prefs: []
  type: TYPE_NORMAL
- en: Data Fabric Framework
  prefs: []
  type: TYPE_NORMAL
- en: 'The following is a short description of the essential Data Fabric tasks and
    capabilities, which can be used to implement a Data Mesh or other solutions. These
    tasks and capabilities^([8](#Fn8)) can easily be mapped to the Data Fabric framework
    as depicted in Figure [2-1](#Fig1):'
  prefs: []
  type: TYPE_NORMAL
- en: '**Catalog all your data**: Including business glossary and design-time and
    runtime metadata (business, technical, and operational metadata)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Enable self-service capabilities**: Addressing data discovery, profiling,
    exploration, quality assessment, consumption of data-as-a-product, etc.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Provide a knowledge graph**: Visualizing how data, people, processes, systems,
    etc. are interconnected, deriving additional actionable insight'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Provide intelligent (smart) information integration**: Supporting IT staff
    and business users alike in their data integration and transformation, data virtualization,
    and federation tasks'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Derive insight from metadata**: Orchestrating and automating tasks and jobs
    for data integration, data engineering, and data governance end to end'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Ensure trustworthy AI**: Ensuring explainability, transparency, and trust
    of AI methods and outcomes, taking appropriate actions in case bias, drift, decreasing
    accuracy and precision, etc.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Enforce local and global data rules/policies**: Including AI/ML-based automated
    generation, adjustments, and enforcement of rules and policies'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Manage an end-to-end unified lifecycle**: Implementing a coherent and consistent
    lifecycle end to end of all Data Fabric tasks across various platforms, personas,
    and organizations'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Enforce data and AI governance**: Broadening the scope of traditional data
    governance to include AI artefacts, for example, AI models, pipelines, etc., and
    taking into consideration new or emerging data governance regulations^([9](#Fn9))
    and privacy laws'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Since we have referenced AI/ML-based augmentation and automation of all Data
    Fabric areas as a new key imperative, this is the topic we elaborate on next.
  prefs: []
  type: TYPE_NORMAL
- en: AI-Infused Data Fabric
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: AI with its siblings ML and DL is the key to understanding what differentiates
    a Data Fabric concept or architecture from conventional data architectures that
    we have been dealing with in the past.
  prefs: []
  type: TYPE_NORMAL
- en: Gaining more insight into data, simplifying data access, enabling shopping-for-data,
    augmenting traditional data governance, generating active metadata, and accelerating
    development of products and services are enabled by infusing AI into the Data
    Fabric architecture. An AI-infused Data Fabric is not only leveraging AI but also
    likewise an architecture to manage and deal with AI artefacts, including AI models,
    pipelines, etc.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [2-2](#Fig2) depicts the essential components that an AI-infused Data
    Fabric is composed of.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_2_Chapter/537582_1_En_2_Fig2_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration indicates 4 blocks labeled traditional analysis of data logs,
    probabilistic data matching, traditional data analysis, and traditional data governance.
    A text at the top reads trustworthy A I, including A I model bias, accuracy, and
    precision.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-2
  prefs: []
  type: TYPE_NORMAL
- en: AI-Infused Data Fabric Concept
  prefs: []
  type: TYPE_NORMAL
- en: 'The following is a high-level description of these components^([10](#Fn10)):'
  prefs: []
  type: TYPE_NORMAL
- en: '**AI governance**: The same statement that we made previously for an AI-infused
    Data Fabric applies to AI governance^([11](#Fn11)) as well: traditional data governance
    is obviously improved by leveraging AI methods (governance with AI), for instance,
    by applying ML methods to analyze data governance regulations and privacy laws
    or to implement governance-related data rules and policies. However, it also needs
    to broaden its scope by including governance for AI artefacts (governance for
    AI), for instance, by managing and governing AI models and other AI artefacts.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**AI-based cataloging**: The AI-based knowledge catalog constitutes another
    essential connecting component of an AI-infused Data Fabric by storing automatically
    generated metadata, leveraging AI methods to generate augmented knowledge, generating
    and storing knowledge graphs, storing the Data Fabric`–`based digital exhaust
    metadata, and enabling semantic enrichment.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Trustworthy AI**: Deploying and operationalizing AI and consuming and interpreting
    AI outcomes require permanent transparency and explainability. The aim of trustworthy
    AI is to detect bias, drift, and decreasing accuracy and precision of AI models
    and to measure other AI-related KPIs during the entire lifecycle. It furthermore
    needs to propose corrective actions to realign AI artefacts to business goals.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**AI-generated digital exhaust metadata**: All Data Fabric tasks generate additional
    data, for instance, LOGs, quality measures of data, AI artefacts, data access
    paths, etc. We call this data digital exhaust, which can be transformed into digital
    exhaust metadata that can be further analyzed to gain additional insight to improve
    corresponding Data Fabric tasks.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**AI-based semantic enrichment**: Applying AI provides automated enrichment
    to contextualize data with semantic knowledge, for instance, based on knowledge
    graphs and other existing metadata in the catalog. Semantic enrichment thrives
    for simplification and optimization of data consumption by applications and business
    users by leveraging this semantic insight. It can further simplify and optimize
    some of the key Data Fabric tasks, such as searching and discovering assets in
    a particular business context.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**AI-infused entity matching**: Heterogeneous and dispersed data landscapes,
    systems, and applications have prevented business users from matching core information
    (master data), such as persona data (e.g., customers, business partners, employees,
    citizens, etc.), products, and services. AI-infused entity matching complements
    existing deterministic and probabilistic matching techniques, yielding much more
    accurate matching results.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Let us now address the key aspects of the Data Mesh concept.
  prefs: []
  type: TYPE_NORMAL
- en: Data Mesh Concept
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Similar to the “Data Fabric Concept” section, we begin this section with a brief
    discussion about Gartner’s and Forrester’s views.
  prefs: []
  type: TYPE_NORMAL
- en: According to Gartner,^([12](#Fn12)) Data Mesh is a “solution architecture for
    the specific goal of building business-focused data products; it is a solution
    architecture that can guide design within a technology-agnostic framework.” In
    their article, Gartner highlights the essential imperatives of a Data Mesh, such
    as data-as-a-product, distributed data governance and authority, and presenting
    Data Mesh as a solution. In addition, Gartner also specifically describes the
    relationship of a Data Mesh and a Data Fabric, which we address in the following
    section.
  prefs: []
  type: TYPE_NORMAL
- en: According to Forrester,^([13](#Fn13)) Data Mesh “is a sociotechnical approach
    to share, access, and manage analytical data in complex and large-scale environments
    `–` within or across organizations.” In their article, Forrester addresses the
    essential *sociotechnical principles* of a Data Mesh, such as “domain-oriented,
    data-as-a-product, self-service, federated, computational data governance. It
    puts the soft side of data and business outcomes first.”
  prefs: []
  type: TYPE_NORMAL
- en: In essence, a Data Mesh solution organizes data around business domain owners
    and transforms relevant data assets (data sources) to data products that can be
    consumed by distributed business users from various business domains or functions.
    These data products are created, governed, and used in an autonomous, decentralized,
    and self-service manner. Self-service capabilities, which we have already referenced
    as a Data Fabric capability, enable business organizations to entertain a data
    marketplace with shopping-for-data characteristics.
  prefs: []
  type: TYPE_NORMAL
- en: 'Figure [2-3](#Fig3) is a conceptual depiction of a Data Mesh solution, referencing
    its key characteristics or solution design imperatives. The heterogeneous and
    dispersed source data landscape contains the source data that is relevant to build
    a Data Mesh solution. To explain Figure [2-3](#Fig3), we need to point out one
    specific aspect in implementing a Data Mesh: as you can see in Figure [2-3](#Fig3),
    it can also include core information, depicted as data_source_2 (master data)
    that is managed by an MDM system. This master data may be relevant for several
    data products and therefore must be discoverable, accessible, and consumable by
    different product owners. Therefore, a business user (for instance, from the business_domain_B),
    who is typically accessing data products from its business_domain_B, may also
    require access to this master data, which is owned by data_domain_owner_A. This
    need is illustrated in Figure [2-3](#Fig3) by the arrow from the middle data consumer
    accessing the master data as a data product, which is owned by data_domain_owner_A.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_2_Chapter/537582_1_En_2_Fig3_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration of the structure of the data mech solution. It represents the
    data products in the data marketplace and the role of data engineers between the
    consolidated data domain and data sources.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-3
  prefs: []
  type: TYPE_NORMAL
- en: Data Mesh Solution Design Imperatives
  prefs: []
  type: TYPE_NORMAL
- en: 'Let us detail out the key design imperatives to build a Data Mesh solution
    as depicted in Figure [2-3](#Fig3). Again, when we refer to data, we mean data
    in a traditional sense, but also including AI artefacts:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Data sources**: The relevant data that is used to eventually build a data
    product can be stored in transactional systems, DWH systems, or a data lake or
    data lakehouse or managed by applications and other systems. It serves as a base
    for creating data products.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data domain owners**: Source data is in custody of specific data domain owners,
    who perform data governance tasks and have responsibility for the consumability
    of the underlying source data. Data domain ownership is distributed with clear
    responsibility associated to those corresponding data assets (data sources).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data domains**: Since a Data Mesh solution is inherently distributed across
    business domains, the underlying consolidated data domains are strictly within
    the realm of a particular business domain (line of business).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data products**: Within a particular business domain, the corresponding data
    products are created. Again, this is a distributed undertaking, where specific
    data products are owned, managed, and consumed by data consumers that are associated
    with that business domain.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data marketplace** (shopping-for-data): Data products need to be made available
    in a data marketplace environment for corresponding business users. This includes
    search, discovery, and consumption of *data-as-a-product*.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The value of a Data Mesh solution is that it assigns the creation of data products
    to data engineers and subject matter experts upstream who are most familiar with
    the business domains and corresponding needs.
  prefs: []
  type: TYPE_NORMAL
- en: As it was illustrated earlier, business users from other business domains may
    have an interest in accessing data products from another business domain. This
    cross`–`business domain data product consumption needs to be enabled by a Data
    Mesh solution as well.
  prefs: []
  type: TYPE_NORMAL
- en: In the previous sections, the relationship between a Data Fabric architecture
    and a Data Mesh solution seems to be already inherently perceived, although we
    have not quite clearly described this yet. It is this relationship that we elaborate
    on in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: 'Relationship: Data Fabric and Data Mesh'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When discussing the Data Mesh solution, we have highlighted key solution imperatives,
    such as the business-oriented data products, the distributed data domain ownership,
    self-service capabilities, etc. This was done without explicitly spelling out
    the technical capabilities required to implement the Data Mesh solution. Our Data
    Mesh solution design imperatives and key characteristics can be seen as a set
    of guidelines for implementing a solution. However, it is the Data Fabric architecture
    that enables the Data Mesh. In other words, the Data Fabric is the architectural
    underpinning to implement a Data Mesh solution.
  prefs: []
  type: TYPE_NORMAL
- en: As you have seen earlier in this chapter, Data Fabric is composed of technical
    capabilities, such as data profiling, automated metadata enrichment, business
    glossary, AI governance, etc., to deliver data-as-a-product. The *Data Mesh sociotechnical
    approach* and concept – to use Forrester’s term – is implemented via these Data
    Fabric technical capabilities. According to Gartner,^([14](#Fn14)) a Data Fabric
    “can be built without following data mesh practices. A data mesh must utilize
    the discovery and analysis principles that are intrinsic to a data fabric.”
  prefs: []
  type: TYPE_NORMAL
- en: In working with IBM customers, we have often been confronted with the perception
    that Data Fabric and Data Mesh approaches are alternative ones, where a conscious
    “either-or” decision must be made. We rather tend to agree with Gartner’s view,
    where the Data Fabric is an underlying architecture to build a Data Mesh solution.
    In addition, a Data Fabric is not limited as an architectural underpinning of
    a Data Mesh; it can also be purposely adjusted and designed to serve other solutions,
    for example, a state-of-the-art DWH system.
  prefs: []
  type: TYPE_NORMAL
- en: This relationship between these two terms is depicted in Figure [2-4](#Fig4).
    Based on the Data Mesh solution design imperatives, a set of Data Fabric technical
    capabilities are identified. The Data Mesh solution design imperatives, which
    have been deduced from the Data Mesh business requirements, are specifications
    for the Data Mesh solution.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_2_Chapter/537582_1_En_2_Fig4_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration represents the interactions between the data fabric and data
    mesh. It indicates the points of technical capabilities and architecture of data
    fabric. It indicates the points of solution design imperatives and solutions in
    data mesh.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-4
  prefs: []
  type: TYPE_NORMAL
- en: Data Fabric and Data Mesh Relationship
  prefs: []
  type: TYPE_NORMAL
- en: Since there are several distinct Data Fabric use case scenarios^([15](#Fn15))
    or entry points, not all available technical capabilities are required – at least
    not initially. Once a set of technical capabilities have been identified, a suitable
    initial Data Fabric architecture can be derived – that is, the identified Data
    Fabric capabilities are deployed within a corresponding Data Fabric architecture,
    which eventually serves as the architectural underpinning for the required initial
    Data Mesh solution.
  prefs: []
  type: TYPE_NORMAL
- en: As additional Data Mesh business requirements will be identified over time,
    the corresponding Data Fabric technical capabilities can be concluded, which results
    in adjustments and extensions of the Data Fabric architecture and subsequently
    enhancements of the Data Mesh solution. Thus, there is an iterative adjustment
    taking place over time to accommodate additional Data Mesh business requirements
    that may surface over time.
  prefs: []
  type: TYPE_NORMAL
- en: '*Data-as-a-product* and *data product* are one of the most essential terms
    that are consistently used when describing a Data Mesh solution. It is these terms
    that we need to shed more light on, describing them in more detail.'
  prefs: []
  type: TYPE_NORMAL
- en: Data Product
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When does data become a data product? What needs to happen to raw data to be
    transformed into a consumable data product? Transforming raw data and building
    data products begins with clearly defined data ownership of raw data and ends
    with easy consumption of corresponding data products by data consumers, for example,
    business users.
  prefs: []
  type: TYPE_NORMAL
- en: Building a data product is *enabled* by the data domain owner; however, building
    a data product itself is primarily driven by the data product owner, which can
    be a marketing or a customer care organization, an after-sales team, or even an
    individual business user. The data product owner is collaborating with data engineers,
    data scientists, and other subject matter experts throughout the entire data product
    build process.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [2-5](#Fig5) is a high-level depiction of what it takes to build a data
    product.^([16](#Fn16))
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_2_Chapter/537582_1_En_2_Fig5_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration represents the responsibilities of the data domain owner and
    data product owner. It indicates the elements of the knowledge catalog in the
    center, while the raw data and data product are at the left and right respectively.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-5
  prefs: []
  type: TYPE_NORMAL
- en: Building a Data Product
  prefs: []
  type: TYPE_NORMAL
- en: Aside from the Data Fabric and the knowledge catalog, Figure [2-5](#Fig5) depicts
    the two major areas of responsibilities, which are related to the data domain
    owner (left side) and the data product owner (right side).
  prefs: []
  type: TYPE_NORMAL
- en: 'The following are the data domain owner and data product owner responsibilities:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Data domain owner responsibilities**: Data must be available and registered
    in the knowledge catalog, and the corresponding metadata should be enriched, which
    we detail out in Chapter [5](537582_1_En_5_Chapter.xhtml). The availability, quality,
    consistency, completeness, and currency of data must be guaranteed via SLAs (service-level
    agreements). Data governance – including data quality – may be guaranteed via
    enforced data rules and policies. Most importantly, data domain ownership is not
    fading away simply because of data consumers accessing and possibly even copying
    the data to other data stores; it persists regardless of where data resides and
    who is consuming the data products for whatever purpose.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data product owner responsibilities**: Building a data product requires easy
    discoverability of data; performing data profiling; gaining additional insight,
    for instance, via semantic knowledge graphs; and executing necessary data transformation
    jobs. These tasks are facilitated via a knowledge catalog and need to be performed
    in self-service fashion. A data product is a consumable outcome, meaning the result
    of these processes, where raw data is transformed into a meaningful business context.
    Data product ownership comes with guaranteed SLAs related to the availability,
    business relevance, easy consumability, completeness, and accuracy of the data
    product. In a way, we may consider the term *shopping-for-data* as a description
    for building a data product.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The underlying Data Fabric architecture enables DataOps, ModelOps, and AIOps
    to orchestrate required business and technical adjustments of data products throughout
    their entire lifecycle.
  prefs: []
  type: TYPE_NORMAL
- en: A data product^([17](#Fn17)) is based on raw data that is transformed into a
    meaningful business context and easily consumable by business users. It is enabled
    via a knowledge catalog and can be characterized by persistent raw data domain
    and data product ownership, which comes along with SLAs as described previously.
    Producing data products requires Data Fabric capabilities and GUI-based applications
    or tools with self-service capabilities, facilitating the steps to produce data
    products and to register them in the knowledge catalog for business consumption.
  prefs: []
  type: TYPE_NORMAL
- en: 'The following are the key characteristics of a data product. We can view these
    characteristics as data product specifications that are stored in the knowledge
    catalog itself; the data product itself is stored and made available for consumption
    in the data marketplace:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Data product owner**: There is a clearly defined data product owner, who
    specifies their business objectives, features and characteristics, and road map
    with possible enhancements to be implemented over time.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Data product** **description**: The data product needs to be well described,
    similar to any other product, that is, a software program or a software product.
    This may include the purpose or business intent of the data product, its version,
    legal aspects and usage limitations, currency of the underlying raw data, cost
    of using the data product, etc.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Semantically related data and AI assets**: A data product consists of a set
    of semantically related data and AI assets, which can be a set of relational tables,
    but also a set of pipelines, a chain of ETL stages, a Jupyter notebook, etc. This
    semantic relationship is defined by the business context and usage purpose. The
    process of identifying semantically related data and AI assets is enabled via
    metadata enrichment capabilities of the knowledge catalog.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Access methods**: The data product must include access methods, for example,
    REST APIs, SQL, NoSQL, etc., and where to find the data asset. This could, for
    instance, be a URI endpoint to be accessed by a defined REST API that is associated
    to the data product.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Policies and rules**: This includes a description of who is allowed to consume
    the data product for what purpose. It furthermore addresses access control, authorizations,
    governance aspects, etc., all managed by data product policies and rules defined
    in the knowledge catalog.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**SLAs**: These are SLAs defined between the data product owner and the data
    product consumers and may include agreements regarding the data product availability,
    performance characteristics, functions, cost of data product usage, required explainability
    of AI models, trust and quality scores of the underlying data and AI assets, etc.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Defined format**: A data product needs to be described using a defined format,
    which can, for instance, be achieved via a JSON or XML file (or any other data
    exchange format) that includes or points to the relevant assets (e.g., data product
    description, data assets, Jupyter notebook, AI model), the SLA, access methods,
    etc. The data product may, for instance, be stored in the knowledge catalog as
    a JSON or XML file.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Cataloged**: All data products need to be registered in the knowledge catalog,
    where the JSON or XML documents need to be stored as well. These data products
    need to be searchable and discoverable by potential data product consumers and
    business users.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Consumption-ready**: the data products need to be ready for consumption,
    meaning that for instance the underlying raw data and AI assets, data pipelines,
    ETL transformation jobs, etc. are available and accessible.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Creating a data product may also depend on raw data from multiple data domain
    owners. Furthermore, other data products may as well serve as additional input
    to build yet another data product. For instance, a data scientist may develop
    an AI model by taking either raw data from multiple data domain owners or several
    available data products as input, where the resulting AI model serves as input
    for a marketing organization to build a targeted marketing campaign offering as
    a set of data products.^([18](#Fn18)) We may therefore establish a hierarchy of
    data products with corresponding dependencies of data products from other data
    products and data and AI assets.
  prefs: []
  type: TYPE_NORMAL
- en: We need to reemphasize that the data products themselves are not stored in the
    knowledge catalog; they are rather registered in the knowledge catalog via the
    data product specifications, which are considered metadata as well. Thus, the
    data product relates to the product specification like any other data or AI asset
    to its corresponding metadata. Making the data product specification available
    in the knowledge catalog as an XML or JSON file (or any other data exchange format)
    makes the data product searchable, discoverable, and consumable by business users
    and other data product developers.
  prefs: []
  type: TYPE_NORMAL
- en: It is somewhat indicative for a Data Mesh solution to focus on data-as-a-product
    in the context of organizational needs, thus adhering to a distributed and federated
    implementation approach. This, however, moves knowledge catalog orchestration
    and metadata exchange between multiple knowledge catalogs center stage in any
    Data Mesh implementation.
  prefs: []
  type: TYPE_NORMAL
- en: This knowledge catalog orchestration and metadata exchange can, for instance,
    be achieved via the Open Data Platform initiative (ODPi) Egeria, an open source
    Linux Foundation project,^([19](#Fn19)) which is based on Open Metadata and Governance
    (OMAG) and Open Metadata Repository Services (OMRS). ODPi is a nonprofit organization
    accelerating and standardizing the open ecosystem of big data technologies for
    the enterprise; OMAG is a project to create a set of open APIs, types, and interchange
    protocols to allow all metadata repositories to share and exchange metadata; and
    OMRS are services to enable metadata repositories to exchange metadata.
  prefs: []
  type: TYPE_NORMAL
- en: This metadata exchange is enabled via an Egeria open metadata repository cohort,
    which is a collection of servers sharing metadata using a peer-to-peer exchange,
    as depicted in Figure [2-6](#Fig6). Any Egeria-compliant knowledge catalog can
    join the Egeria open cohort to exchange and share its metadata using open metadata
    and governance formats and interfaces.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_2_Chapter/537582_1_En_2_Fig6_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration represents the elements of the I B M cloud park for data 1,
    cloud park data 2, I B M info share information server, and Ergeria-compliant
    catalogs point arrows to the EGERIA cohort in the center.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-6
  prefs: []
  type: TYPE_NORMAL
- en: Knowledge Catalog Orchestration and Metadata Exchange
  prefs: []
  type: TYPE_NORMAL
- en: For instance, metadata exchange between IBM Watson Knowledge Catalog (WKC) and
    other Egeria-compliant repositories can be implemented over an Egeria cohort.
    IBM Watson Knowledge Catalog manages data assets (e.g., datasets, tables, columns,
    views, connections, and files as well as their relationships to glossary artefacts)
    in Common Assets Managed Services (CAMS) repositories. Business glossary artefacts
    (e.g., business terms, categories, data classes, policies, and governance rules)
    are managed in the business glossary repository, as depicted in Figure [2-6](#Fig6).
    CAMS has an embedded Egeria engine, which allows catalogs and the business glossary
    managed by IBM Watson Knowledge Catalog to be added to the OMRS cohort.
  prefs: []
  type: TYPE_NORMAL
- en: Any asset added to the knowledge catalog triggers Kafka OMRS messages, which
    are sent to the Egeria cohort. This requires the Kafka server to be accessible
    from IBM Watson Knowledge Catalog.
  prefs: []
  type: TYPE_NORMAL
- en: As we have pointed out earlier in this chapter, the Data Fabric is the architectural
    underpinning to implement a Data Mesh solution. In the subsequent chapters, we
    are therefore using the term *Data Fabric* when we are specifically referring
    to the architectural aspects, whereas the term *Data Mesh* is used when we are
    specifically emphasizing the data product (data-as-a-product) and data marketplace
    aspects.
  prefs: []
  type: TYPE_NORMAL
- en: Key Takeaways
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We conclude this chapter with a few key takeaways as summarized in Table [2-1](#Tab1).
  prefs: []
  type: TYPE_NORMAL
- en: Table 2-1
  prefs: []
  type: TYPE_NORMAL
- en: Key Takeaways
  prefs: []
  type: TYPE_NORMAL
- en: '| # | Key Takeaway | High-Level Description |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| 1 | Realize the new aspects of Data Fabric. | AI/ML-based augmentation and
    automation of all Data Fabric areas, including AI/ML-based smart integration,
    generating active metadata and knowledge graphs to be captured in the knowledge
    catalog, are the novel aspects of a Data Fabric. |'
  prefs: []
  type: TYPE_TB
- en: '| 2 | Enable trustworthy AI. | A Data Fabric can be used to enable trustworthy
    AI to measure correct bias, drift, and accuracy and precision of AI models. |'
  prefs: []
  type: TYPE_TB
- en: '| 3 | Leverage the digital exhaust. | AI-generated digital exhaust metadata
    can be analyzed to further optimize and simplify the Data Fabric architecture.
    |'
  prefs: []
  type: TYPE_TB
- en: '| 4 | Augment entity matching with AI. | AI-infused entity matching extends
    traditional entity matching solutions beyond just probabilistic and deterministic
    matching. |'
  prefs: []
  type: TYPE_TB
- en: '| 5 | Data Mesh is a solution. | A Data Mesh should be seen as a solution,
    which is underpinned by a Data Fabric architecture. |'
  prefs: []
  type: TYPE_TB
- en: '| 6 | Enable semantic enrichment. | AI-based semantic enrichment should be
    an essential component of the Data Fabric approach. |'
  prefs: []
  type: TYPE_TB
- en: '| 7 | Data Mesh is about delivering data-as-a-product. | The aim of a Data
    Mesh solution is to establish a data marketplace where data can be searched for,
    discovered, and consumed as a product. |'
  prefs: []
  type: TYPE_TB
- en: '| 8 | Relationship of Data Fabric and Data Mesh. | Data Fabric is an underlying
    architecture to build a Data Mesh solution, where Data Mesh is specified through
    a number of solution design imperatives. |'
  prefs: []
  type: TYPE_TB
- en: '| 9 | Data Fabric enables DataOps, MLOps, and AIOps. | Realizing and enabling
    DataOps, MLOps, and AIOps to implement adjustments of data products requires some
    of the described Data Fabric capabilities. |'
  prefs: []
  type: TYPE_TB
- en: '| 10 | A data product is raw data transformed into a business context. | A
    data product is based on semantically related raw data that is transformed into
    a meaningful business context and easily discoverable and consumable by business
    users. |'
  prefs: []
  type: TYPE_TB
- en: '| 11 | Data products are registered in the knowledge catalog. | Data product
    specifications (XML, JSON, etc.) are the means by which data products are registered
    in the knowledge catalog; data products themselves are not stored in the knowledge
    catalog. |'
  prefs: []
  type: TYPE_TB
- en: '| 12 | An Egeria cohort enables metadata exchange. | Knowledge catalog orchestration
    and metadata exchange can, for instance, be achieved via the Open Data Platform
    initiative (ODPi) Egeria, an open source Linux Foundation project. |'
  prefs: []
  type: TYPE_TB
