    [`https://link.springer.com/chapter/10.1007/978-3-030-98581-3_29`](https://link.springer.com/chapter/10.1007/978-3-030-98581-3_29)
    (accessed September 2, 2022).'
  id: totrans-402
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Springer Link，Pery, A.，Rafiei, M.，Simon, M.，van der Aalst, W. M. P.，《可信人工智能与流程挖掘：挑战与机遇》，2022年，[可信人工智能与流程挖掘：挑战与机遇](https://link.springer.com/chapter/10.1007/978-3-030-98581-3_29)（访问日期：2022年9月2日）。
- en: 'Ammanath, B., *Trustworthy AI: A Business Guide for Navigating Trust and Ethics
    in AI*, Wiley, 2022, ISBN-13: 978-1119867920.'
  id: totrans-403
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Ammanath, B., 《可信人工智能：在人工智能中导航信任和伦理的商业指南》，Wiley，2022年，ISBN-13：978-1119867920。
- en: 4. Data Fabric and Data Mesh Business Benefits
  id: totrans-404
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 4. 数据编织和数据网格业务优势
- en: This chapter dives into business drivers and pain points that we hear in our
    conversations with enterprises. The business benefits of creating a Data Fabric
    architecture and also implementing a Data Mesh solution are discussed from the
    perspective of the technical, primarily data engineering team as well as the business
    teams consuming the data. We discuss a needed cultural shift related to managing
    data in an organization that looks at holistic data ownership of data source owners,
    data engineers, and data consumers.
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 本章深入探讨了我们在与企业对话中听到的业务驱动因素和痛点。从技术角度，主要是数据工程团队以及消费数据的业务团队的角度，讨论了创建数据布线架构和实施数据网格解决方案的业务优势。我们讨论了与组织内数据管理相关的文化转变，这涉及到数据源所有者、数据工程师和数据消费者的数据整体所有权。
- en: Introduction
  id: totrans-406
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 引言
- en: After defining a Data Fabric, also as an underlying data architecture for a
    Data Mesh implementation, in Chapter [2](537582_1_En_2_Chapter.xhtml), let us
    revisit the key business drivers that justify significant investment into implementing
    such a new data architecture in the organization.
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 在第 [2](537582_1_En_2_Chapter.xhtml) 章中定义了数据布线，作为数据网格实施的基础数据架构之后，让我们回顾一下支持在组织中实施这种新数据架构的巨大投资的关键业务驱动因素。
- en: 'The overarching motivation or driver is simple: get more value out of the organization’s
    data to keep up with the industry or, better, achieve a competitive advantage.'
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 总体动机或驱动因素很简单：从组织的数据中获得更多价值，以跟上行业步伐，或者更好地，实现竞争优势。
- en: One example is the worldwide, disruptive nature of the pandemic^([1](#Fn1))
    that created never seen business challenges in all areas. Identifying and solving
    supply chain problems quickly and providing all business functions online, without
    need for personal interaction, are just few resulting requirements that caused
    organizations to revisit their current IT landscape and define new IT priorities
    and accelerate related IT modernization projects.
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: 一个例子是全球性的、颠覆性的大流行病^([1](#Fn1))，它创造了所有领域前所未有的商业挑战。快速识别和解决供应链问题，以及提供所有业务功能在线，无需个人互动，只是导致组织重新审视其当前IT环境、定义新的IT优先事项并加速相关IT现代化项目的几个结果需求之一。
- en: Another example is the globally acknowledged climate change^([2](#Fn2)) that
    causes more frequent, natural disasters. Insurance companies need the ability
    for agile and complex analysis of enterprise and publicly available data to estimate
    a policy risk accurately to ensure the company can fulfil its obligations and
    still create profit. Competitively priced insurance policies have a direct effect
    on the market share of an insurance company.
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个例子是全球公认的气候变化^([2](#Fn2))，它导致自然灾害更加频繁。保险公司需要具备敏捷且复杂的分析企业及公开数据的分析能力，以准确估计政策风险，确保公司能够履行其义务并继续创造利润。具有竞争力的保险政策对保险公司的市场份额有直接影响。
- en: Such business needs drive application landscape changes, such as applications
    may move to a cloud service or applications adopt a new application architecture
    that drives a new data architecture; it leads to new requirements for data management
    and data consumption in an organization, which has profound ramifications for
    a sustainable and disruption-proof implementation of both concepts.
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
  zh: 这样的业务需求推动了应用景观的变化，例如，应用程序可能迁移到云服务，或者采用新的应用程序架构，这推动了新的数据架构；它导致组织在数据管理和数据消费方面出现新的要求，这对这两个概念的可持续和抗颠覆实施有深远的影响。
- en: Business Requirements and Pain Points for Data Management and Consumption
  id: totrans-412
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据管理和消费的业务需求和痛点
- en: The business drivers need to be mapped to key drivers for a data architecture.
    To better understand the technical and business value of a Data Fabric architecture
    and a Data Mesh solution, let us again travel back in time and summarize the key
    drivers for implementing data architectures.
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: 业务驱动因素需要映射到数据架构的关键驱动因素。为了更好地理解数据布线架构和数据网格解决方案的技术和业务价值，让我们再次回顾过去，总结实施数据架构的关键驱动因素。
- en: Figure [4-1](#Fig1) lists the commonly voiced pain points in an organization
    for a given data architecture.
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [4-1](#Fig1) 列出了给定数据架构中常见的痛点。
- en: '![](../images/537582_1_En_4_Chapter/537582_1_En_4_Fig1_HTML.png)'
  id: totrans-415
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/537582_1_En_4_Chapter/537582_1_En_4_Fig1_HTML.png)'
- en: A table represents the roles of the relational databases during the mid-1970,
    data management for D W H during the mid-1990, big data or lake data during 2010,
    and data fabric or data mesh after the year 2019.
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: 一个表格表示了关系型数据库在20世纪70年代中期的作用，DW H在20世纪90年代中期的数据管理，2010年的大数据或湖数据，以及2019年之后的数据库或数据网格。
- en: Figure 4-1
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-1
- en: Key Drivers for Data Architecture Evolution
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 数据架构演变的驱动因素
- en: 'The key drivers for both concepts are also expressed in statements and questions
    that may sound familiar:'
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个概念的关键驱动因素也体现在可能听起来熟悉的陈述和问题中：
- en: '**Multiple locations**: The same data is stored in multiple locations, often
    in a different format and accessible via different methods, for example, SQL,
    NoSQL, or REST API.'
  id: totrans-420
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多个位置**：相同的数据存储在多个位置，通常格式不同，可以通过不同的方法访问，例如SQL、NoSQL或REST API。'
- en: '**Data and AI asset owner**: I have a question about some data and AI assets,
    but I don’t know who owns these assets and whom to reach out to. Examples are:
    How do I get access to the data and AI assets in the context of a concrete business
    question? To whom should I forward requests regarding authentication and authorization?'
  id: totrans-421
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据和人工智能资产所有者**：我对一些数据和人工智能资产有一些疑问，但不知道这些资产归谁所有，也不知道该联系谁。例如：在具体业务问题的背景下，我如何获取数据和人工智能资产？我应该将有关认证和授权的请求转发给谁？'
- en: '**Knowledge catalog**: I need a comprehensive overview of data and AI assets,
    which are relevant and available to me, which should also include an overview
    of available data products including their specifications.'
  id: totrans-422
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**知识目录**：我需要一个关于相关和可用的数据和人工智能资产的全面概述，这应该还包括关于可用数据产品的概述，包括它们的规格。'
- en: '**Data quality**: Can I be confident regarding data quality `–` the effort
    to remediate data issues is high in terms of manpower, time, and money?'
  id: totrans-423
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据质量**：我能否对数据质量有信心——修复数据问题的努力在人力、时间和金钱方面成本很高？'
- en: '**Currency and consistency**: I need more current and consistent data and AI
    assets: Who is responsible for this? Is there an owner for specific data and AI
    assets?'
  id: totrans-424
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**货币和一致性**：我需要更多最新和一致的数据和人工智能资产：谁负责这项工作？是否有特定数据和人工智能资产的所有者？'
- en: '**Impact of changes**: What is the downstream impact to my data if changes
    occur? Are there tools that I can rely on providing accurate data quality measures?'
  id: totrans-425
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**变化的影响**：如果发生变更，这些变更对我的数据会产生什么样的下游影响？是否有我可以依赖的工具来提供准确的数据质量度量？'
- en: The statements highlight challenges in knowledge about impact of data-producing
    applications, insight into data pipelines or data lineage, and knowledge about
    data for data consumers as well as data availability and related automation and
    governance processes.
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 这些陈述突出了对数据产生应用程序影响的知识、对数据管道或数据血缘的洞察，以及数据消费者对数据的知识，以及数据的可用性和相关的自动化和治理流程。
- en: Those challenges^([3](#Fn3)) directly impact the ability to deliver data at
    the speed requested by the business with the available skill. Even with more data
    engineers, the demand for data and data products consistently outgrows the ability
    to deliver with existing data architecture capabilities.
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 这些挑战^([3](#Fn3))直接影响到以业务所需的速度提供数据的能力，即使有更多的数据工程师，对数据和数据产品的需求也持续超过现有数据架构能力提供的能力。
- en: The benefits of both concepts can be directly derived from solving the key challenges
    that exist today after organizations implemented the previous data architectures,
    especially traditional EDW and even data lakehouse architectures. It is important
    to point out that a Data Fabric architecture and Data Mesh solution cannot deliver
    on the full value without considering cultural and organizational changes as well;
    a more holistic approach is necessary.
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个概念的好处可以直接从解决组织在实施之前的数据架构（特别是传统的EDW和甚至数据湖屋架构）后存在的关键挑战中得出。重要的是要指出，没有考虑文化和组织变革，数据编织架构和数据网格解决方案无法实现全部价值；需要更全面的方法。
- en: Figure [4-2](#Fig2) categorizes Figure [1-3](537582_1_En_1_Chapter.xhtml#Fig3)
    of Chapter [1](537582_1_En_1_Chapter.xhtml) by responsible roles. On the left
    are the owners of applications that produce data. In the middle are the data engineers
    who make this data available to the data consumer in the format best suitable
    to the consuming use case. Until now, there is a clear division in responsibility
    and limited collaboration across roles that does not help streamline the data
    pipeline integration.
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_4_Chapter/537582_1_En_4_Fig2_HTML.png)'
  id: totrans-430
  prefs: []
  type: TYPE_IMG
- en: An illustration represents the elements of the data source owner, data engineer,
    and data consumer. The data source owner comprises data in many forms, data at
    rest and data in motion. The data engineer indicates information ingestion, transformation
    and aggregate, and the lifecycle of data in the landing area. The data consumer
    indicates intelligence analysis, navigation and discovery, and decision management.
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4-2
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
- en: Changing Scope of a Data Pipeline
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
- en: Let’s look at an example to illustrate. Core applications constantly change
    data. In the past those transactional applications were so optimized for response
    time and scalability that they did not keep history of the data changes. With
    today’s processing power, regulatory requirements, and database capabilities,
    it is much more efficient to just keep history when data is changed in the core
    application. Still, most data changes are recreated as part of the acquire-transform-manage
    data pipeline, making data pipelines more complex and typically causing bigger
    than 50% of the pipeline processing.
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
- en: The goal of both concepts alike is to lower the needed skill level to discover,
    access, prepare, and consume data through easy access to metadata in a business
    context and intelligently automate the main tasks of a data engineer. By breaking
    down the silos of responsibilities of a data source owner, data engineer, and
    data consumer as well as removing the dependency on the data engineer for data
    consumption, business priorities can be implemented without the data engineer
    support capacity as a bottleneck.
  id: totrans-435
  prefs: []
  type: TYPE_NORMAL
- en: Benefits of a Data Fabric and Data Mesh for Technical Teams Managing Data
  id: totrans-436
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Chapter [3](537582_1_En_3_Chapter.xhtml) described activities to implement
    the foundation and entry points for a Data Fabric architecture and Data Mesh solution.
    The following are several benefits for technical teams, for example, data engineers,
    resulting from implementation and changes in responsibilities, responding to the
    key drivers^([4](#Fn4)):'
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
- en: '**Faster and simpler data delivery process**: Previously, the data engineer
    needed to investigate applicable data sources manually; developed data pipelines,
    for example, coded ETL jobs; and informed the data consumer how to consume the
    derived (transformed and aggregated) data. Depending on the business priority,
    this effort took weeks to months. By creating a knowledge catalog and using annotation
    and analytics capabilities, applicable data sources can be identified easier,
    and tools can be used to automate data integration for faster data delivery. Breaking
    down silos between the data source owner and data engineer, the data engineer
    moved from being the perceived *owner* of the data for the data consumer to being
    the enabler for the data source owner to get the data faster to the consumer.
    This way, the data source owner is motivated to look beyond the functional and
    non-functional requirements of the transactional application and include requirements
    for better integration of the data source into the Data Fabric and Data Mesh such
    as providing the metadata and business glossary to the knowledge catalog.'
  id: totrans-438
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**更快速、更简单的数据交付流程**：以前，数据工程师需要手动调查适用的数据源；开发数据管道，例如，编写ETL作业；并告知数据消费者如何消费派生的（转换和汇总）数据。根据业务优先级，这项工作可能需要几周到几个月的时间。通过创建知识目录并使用注释和分析功能，可以更容易地识别适用的数据源，并使用工具来自动化数据集成以实现更快速的数据交付。打破数据源所有者和数据工程师之间的壁垒，数据工程师从数据消费者眼中数据的“所有者”转变为数据源所有者获取数据的加速推动者。这样，数据源所有者就有动力超越事务性应用的职能和非职能需求，将数据源更好地集成到数据编织和数据网格中，例如向知识目录提供元数据和业务术语表。'
- en: '**Reduction in efforts for data access management**: Introduction of global
    data governance rules, policies, and processes across data and AI assets that
    are managed via the knowledge catalog and automation by global policy enforcement
    significantly reduce the effort and time to give access to the data consumer.
    They also allow the LoB to become part of data product design, implementation,
    and ownership.'
  id: totrans-439
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据访问管理努力的减少**：通过知识目录和全球政策执行的自动化，引入全球数据治理规则、政策和流程，显著减少了向数据消费者提供数据访问的努力和时间。它们还允许业务线（LoB）成为数据产品设计、实施和所有权的一部分。'
- en: '**Decreased effort to maintain data quality standards**: The first milestone
    of implementing a Data Fabric and Data Mesh is cataloging the existing data sources
    and existing data pipelines. A key capability of a knowledge catalog is the quality
    assessment of the data source. The data quality is expressed by data completeness
    and data correctness and currency of data. For example, a telephone number is
    part of a customer record. If the telephone number is only maintained in 60% of
    the records, an analysis by area code would not correctly represent the true customer
    distribution. Another example is that data in a database needed to be expanded
    and therefore was moved into another column. The ETL process was not correctly
    updated and still read data from the old column that might not have been removed.
    Such a problem could make the derived data unusable. Data consumers may not have
    been aware of such a data quality problem.^([5](#Fn5)) After assessment of the
    data quality of the original data source, including data lineage makes the data
    flow consumable by tools. What is otherwise buried in thousands of transformation
    jobs becomes visible to the data engineer and creates an opportunity to reduce
    the number of copies. Without question, technology is available today to copy
    large amounts of data from a source to a target. In practice, it is a huge operational
    challenge to keep copies of data consistent over a longer period. Therefore, reducing
    copies of data always increases the quality and therefore the trust in data.'
  id: totrans-440
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**降低维护数据质量标准的工作量**：实施数据编织和数据网格的第一个里程碑是对现有数据源和现有数据管道进行编目。知识编目的一个关键能力是对数据源的质量评估。数据质量通过数据完整性、数据正确性和数据的时效性来表示。例如，电话号码是客户记录的一部分。如果电话号码只在60%的记录中维护，那么通过区号进行的分析将无法正确反映真实的客户分布。另一个例子是，数据库中的数据需要扩展，因此被移动到另一个列中。ETL过程没有正确更新，仍然从可能未被删除的旧列中读取数据。这样的问题可能会使派生数据变得不可用。数据消费者可能没有意识到这样的数据质量问题。[5](#Fn5)
    在对原始数据源的数据质量进行评估后，包括数据血缘，使得数据流可由工具消费。否则，隐藏在数千个转换作业中的内容变得对数据工程师可见，从而创造了减少副本数量的机会。毫无疑问，今天的技术可以从源到目标复制大量数据。在实践中，在较长时间内保持数据副本的一致性是一个巨大的运营挑战。因此，减少数据副本总是提高质量，从而提高对数据的信任度。'
- en: '**Reduced infrastructure and storage cost**: The reduction in data copies and
    consolidation of data management tools and the shift in responsibility of primarily
    the data engineer directly lead to reduced infrastructure and storage cost, which
    is nevertheless an essential goal for the CDO and CIO and their corresponding
    organizations.'
  id: totrans-441
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**降低基础设施和存储成本**：数据副本的减少和数据管理工具的整合，以及数据工程师主要责任的变化，直接导致基础设施和存储成本的降低，尽管这对于首席数据官（CDO）和首席信息官（CIO）及其相应组织来说仍然是一个基本目标。'
- en: Figure [4-3](#Fig3) depicts the four business outcomes for technical teams as
    it relates to specific value drivers and corresponding measurements or KPIs. This
    list of value drivers and KPIs is certainly incomplete and serves more as an illustration.
    Nevertheless, it represents an entry point or a basic template in measuring IT-related
    business outcomes derived from technical teams implementing a Data Fabric architecture
    or a Data Mesh solution.
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [4-3](#Fig3) 展示了与技术团队相关的四个业务成果，这些成果与特定的价值驱动因素以及相应的度量或关键绩效指标（KPIs）相关。这个价值驱动因素和KPIs的列表当然是不完整的，更多的是作为一个示例。尽管如此，它代表了一个起点或一个基本模板，用于衡量由实施数据编织架构或数据网格解决方案的技术团队产生的IT相关业务成果。
- en: '![](../images/537582_1_En_4_Chapter/537582_1_En_4_Fig3_HTML.png)'
  id: totrans-443
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537582_1_En_4_Chapter/537582_1_En_4_Fig3_HTML.png)'
- en: An illustration represents the benefits of the business outcome or value, value
    drivers, and measurements or K P Is. The business outcome includes a faster and
    simpler data delivery process, reduction in efforts or data access management,
    decreased effort to maintain data quality standards, and reduced infrastructure
    and storage costs.
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: 一个插图代表了业务成果或价值、价值驱动因素以及度量或KPIs的益处。业务成果包括更快速、更简单的数据交付过程、减少数据访问管理的工作量、降低维护数据质量标准的工作量以及降低基础设施和存储成本。
- en: Figure 4-3
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-3
- en: Value Proposition for Technical Teams
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
  zh: 技术团队的价值主张
- en: Of course, this method needs to be further refined and completed. We encourage
    you to use this template for your initiatives, as it enables you to develop a
    comprehensive and measurable value proposition, which is essential to receive
    required funding.
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，这种方法需要进一步细化和完善。我们鼓励您使用这个模板来开展您的项目，因为它能够帮助您开发一个全面且可衡量的价值主张，这对于获得所需的资金至关重要。
- en: Benefits of a Data Fabric and Data Mesh for Business Teams Consuming Data
  id: totrans-448
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据编织和数据网格对消费数据的业务团队的好处
- en: 'The technical benefits of a Data Fabric and Data Mesh as listed previously
    can be directly mapped into benefits for business teams.^([6](#Fn6)) These business
    outcomes relate to implementing both concepts:'
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，数据编织和数据网格的技术优势可以直接映射到业务团队的好处.^([6](#Fn6)) 这些业务成果与实施这两个概念相关：
- en: '**Self-service data shopping**: Self-service is implemented in many areas.
    Hotel reservations are done through portals instead of calling the hotel. Product
    checkout in supermarkets is done through self-service pay stations. Therefore,
    the expectation of a business team member to shop for the organization’s data
    and AI assets in a company marketplace portal does not sound so far-fetched. A
    Data Fabric with its capabilities provides the plumbing for implementing such
    a data and AI asset marketplace, which can provide a frustration-free full self-service
    data shopping experience for business users. Automatic enforcement of data and
    AI governance rules, policies, and processes ensures that business owners only
    have access to data (clear or masked) that they are entitled to see and process.'
  id: totrans-450
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自助数据购物**：自助服务已在许多领域得到实施。酒店预订是通过门户网站而不是打电话给酒店来完成的。超市的产品结账是通过自助支付站完成的。因此，业务团队成员期望在公司市场门户中购买组织的数据库和AI资产的想法并不遥远。具有这些功能的Data
    Fabric提供了实施此类数据和AI资产市场的基础设施，可以为业务用户提供无烦恼的全自助数据购物体验。自动执行数据和AI治理规则、政策和流程确保业务所有者只能访问他们有权查看和处理的（清晰或掩码）数据。'
- en: '**Compliance and security**: Automatic enforcement of data governance rules
    and processes is not just the prerequisite for a data marketplace. First, data
    governance rules, policies, and processes need to be consistently defined within
    an organization to automatically enforce them. This is a huge improvement compared
    with today where compliance definitions and tools vary by business domain, applications,
    or even responsible people and every platform and system has its proprietary way
    to define and ensure data security. So despite making the data and AI available
    for full business analytics utilization, the data compliance and security is actually
    increased.'
  id: totrans-451
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**合规性和安全性**：自动执行数据治理规则和流程不仅是数据市场的前提。首先，数据治理规则、政策和流程需要在组织内一致性地定义，以便自动执行。与今天相比，合规性定义和工具因业务领域、应用程序或甚至负责人员而异，每个平台和系统都有其专有的方式来定义和确保数据安全。因此，尽管使数据和AI可用于全面业务分析利用，但数据合规性和安全性实际上得到了提高。'
- en: '**Faster and more accurate insight**: By lowering the skill level for data
    business consumers and simplifying data access through a self-service marketplace,
    the data consumer gains faster and more business-relevant insight. Additionally,
    data quality, completeness, and timeliness are significantly improved by applying
    intelligent and automated data management as well as documented lineage for data
    and AI assets, leading also to a more accurate and business-relevant insight.'
  id: totrans-452
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**更快和更准确的洞察**：通过降低数据业务消费者的技能水平并通过自助市场简化数据访问，数据消费者可以获得更快和更与业务相关的洞察。此外，通过应用智能和自动化的数据管理以及数据资产和AI资产的文档化血缘，显著提高了数据质量、完整性和及时性，这也导致了更准确和与业务相关的洞察。'
- en: '**Spent time on analyzing data**: Data consumers, especially data scientists
    today, spend most of their time finding and preparing data instead of focusing
    on analyzing the data or building AI models. This ratio of data exploration and
    preparation tasks to the actual time needed to develop, for instance, AI models
    (including training, validation, test, etc.) is typically in the range of 80/20\.
    This faster, self-service access to relevant data and AI assets allows data consumers,
    especially data scientists, to focus their time on analyzing the data, also contributing
    to faster insight into business questions.'
  id: totrans-453
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据分析所花费的时间**：数据消费者，尤其是数据科学家，现在大部分时间都在寻找和准备数据，而不是专注于数据分析或构建AI模型。这种数据探索和准备任务与实际开发时间（包括训练、验证、测试等）的比例通常是80/20。这种更快、自助访问相关数据和AI资产的方式，使得数据消费者，尤其是数据科学家，能够将时间集中在数据分析上，同时也促进了更快地洞察业务问题。'
- en: In summary, a Data Mesh^([7](#Fn7)) data marketplace based on a Data Fabric
    architecture allows the data consumer to discover and access high-quality data
    faster in self-service mode (enabling a data marketplace with data-as-a-product),
    removing potentially long delays waiting on the data engineer^([8](#Fn8)) to prepare
    data and to build ETL stages or pipelines for business consumption.
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，基于数据编织架构的数据市场（Data Mesh）允许数据消费者以自助模式更快地发现和访问高质量数据（实现数据即产品化的数据市场），消除了等待数据工程师^([8](#Fn8))准备数据和为业务消费构建ETL阶段或管道的潜在长期延迟。
- en: As a result, relevant and accurate insight into business challenges is gained
    faster and can be acted on with increased agility.
  id: totrans-455
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，对业务挑战的相关和准确洞察可以更快地获得，并且可以以更高的敏捷性采取行动。
- en: Figure [4-4](#Fig4) depicts the four business outcomes for business teams as
    it relates to specific value drivers and corresponding measurements or KPIs. Again,
    like the list of value drivers and KPIs for the technical teams *managing* data
    and AI assets, this list of value drivers and KPIs for the business teams *consuming*
    data and AI assets is incomplete as well.
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: 图[4-4](#Fig4)展示了与特定价值驱动因素和相应的度量或KPIs相关的业务团队的四项业务成果。同样，与负责管理和AI资产的技术团队的价值驱动因素和KPIs列表一样，这个列表中的价值驱动因素和KPIs对于消费数据和AI资产的业务团队来说也不完整。
- en: '![](../images/537582_1_En_4_Chapter/537582_1_En_4_Fig4_HTML.png)'
  id: totrans-457
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/537582_1_En_4_Chapter/537582_1_En_4_Fig4_HTML.png)'
- en: An illustration represents the benefits of the business outcome or value, value
    drivers, and measurements or K P Is. The business outcome and values includes
    the self service data shopping, compliance to regulations and security, faster
    and more accurate insight, and spent time on analyzing data.
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: 一个插图展示了业务成果或价值、价值驱动因素以及度量或KPIs的好处。业务成果和价值包括自助数据购物、遵守法规和安全、更快更准确的洞察以及数据分析所花费的时间。
- en: Figure 4-4
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-4
- en: Value Proposition for Business Teams
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: 业务团队的价值主张
- en: Nevertheless, this approach also represents a meaningful entry point in measuring
    the value proposition derived from business teams implementing any of the two
    concepts.
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，这种方法也代表了一个有意义的切入点，用于衡量实施任何两个概念的业务团队所获得的价值主张。
- en: The two lists of value propositions^([9](#Fn9)) derived from technical and business
    teams can and should be refined and extended according to chosen entry points
    and specific use case scenarios. For instance, the KPIs could be related and further
    detailed out to initiatives and actions, features, dependencies, and acceptance
    criteria based on your specific project requirements.
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: 从技术和业务团队中得出的两个价值主张列表^([9](#Fn9))可以根据选择的切入点和特定的用例场景进行精炼和扩展。例如，基于您特定的项目需求，KPIs可以进一步细化，与倡议和行动、功能、依赖关系和验收标准相关联。
- en: Key Takeaways
  id: totrans-463
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键要点
- en: We conclude this chapter with a few key takeaways as summarized in Table [4-1](#Tab1).
  id: totrans-464
  prefs: []
  type: TYPE_NORMAL
  zh: 我们以表[4-1](#Tab1)中总结的几个关键要点来结束本章。
- en: Table 4-1
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
  zh: 表4-1
- en: Key Takeaways
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: 关键要点
- en: '| # | Key Takeaway | High-Level Description |'
  id: totrans-467
  prefs: []
  type: TYPE_TB
  zh: '| # | 关键要点 | 高级描述 |'
- en: '| --- | --- | --- |'
  id: totrans-468
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| 1 | Motivation to get more value out of the organization’s data. | The overarching
    motivation or driver is simple: get more value out of the organization’s data
    to keep up with the industry or even better achieve a competitive advantage. |'
  id: totrans-469
  prefs: []
  type: TYPE_TB
  zh: '| 1 | 从组织数据中获得更多价值的动机 | 总体动机或驱动因素很简单：从组织数据中获得更多价值，以跟上行业步伐或甚至获得竞争优势。 |'
- en: '| 2 | Key drivers for a Data Fabric architecture and Data Mesh solution. |
    The key drivers for a Data Fabric or Data Mesh are the need to locate data faster,
    to simplify access and consumption of data, and to apply consistent data and AI
    governance. |'
  id: totrans-470
  prefs: []
  type: TYPE_TB
  zh: '| 2 | 数据编织架构和数据网格解决方案的关键驱动因素。| 数据编织或数据网格的关键驱动因素是更快地定位数据、简化数据访问和消费，以及应用一致的数据和人工智能治理。|'
- en: '| 3 | Need for more data grows faster than data delivery. | The demand to gain
    actionable insight from data in a more agile way and to produce data products
    consistently outgrows the ability to deliver with existing data architecture capabilities.
    |'
  id: totrans-471
  prefs: []
  type: TYPE_TB
  zh: '| 3 | 对数据的需要增长速度快于数据交付。| 以更敏捷的方式从数据中获得可操作的洞察并持续生产数据产品的需求，超过了使用现有数据架构能力进行交付的能力。|'
- en: '| 4 | Responsibility of the data engineer changes. | The data engineer moves
    from being the perceived *owner* of the data to being the enabler for the data
    source owners. |'
  id: totrans-472
  prefs: []
  type: TYPE_TB
  zh: '| 4 | 数据工程师的责任发生变化。| 数据工程师的角色从被视为数据的*所有者*转变为数据源所有者的推动者。|'
- en: '| 5 | Data Fabric and Data Mesh capabilities correspond to key drivers. | The
    Data Fabric and Data Mesh capabilities deliver noticeable value by directly addressing
    the key business and IT drivers, specifically addressing tasks to be performed
    with increased automation and in a self-service fashion. |'
  id: totrans-473
  prefs: []
  type: TYPE_TB
  zh: '| 5 | 数据编织和数据网格功能对应关键驱动因素。| 数据编织和数据网格功能通过直接解决关键业务和IT驱动因素，特别是通过提高自动化和自助服务方式执行的任务，提供了显著的价值。|'
- en: '| 6 | Faster and more accurate insight. | Data Fabric and Data Mesh capabilities
    enable a business analyst to gain accurate insight into business challenges faster.
    |'
  id: totrans-474
  prefs: []
  type: TYPE_TB
  zh: '| 6 | 更快、更准确的洞察。| 数据编织和数据网格功能使业务分析师能够更快地获得对业务挑战的准确洞察。|'
- en: '| 7 | A business outcome should be refined on a project-specific level. | Business
    outcomes that are derived from technical and business teams should be depicted
    in terms of value drivers and measurements (KPIs). |'
  id: totrans-475
  prefs: []
  type: TYPE_TB
  zh: '| 7 | 项目特定层面的业务成果应细化。| 从技术和业务团队得出的业务成果应以价值驱动因素和度量（KPIs）来表示。|'
