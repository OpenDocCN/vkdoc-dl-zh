- en: Part IData Fabric and Data Mesh Foundation
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 1. Evolution of Data Architecture
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This chapter introduces the motivation for looking into data architectures.
    It shares an overview about data architecture evolution transitioning from traditional
    data warehouses to big data and data lakes and their main characteristics, values,
    and challenges. It outlines industry requirements in a data-driven world that
    ultimately led to the concept of a Data Fabric.
  prefs: []
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When you look back in time, data architectures were developed in response to
    pain points with existing IT solutions and new business needs, typically in periods
    of newly emerging technologies. Understanding this evolution helps position new
    data architecture trends such as Data Fabric and Data Mesh in context of the existing
    data landscape in an organization.^([1](#Fn1)) To demonstrate the value of a new
    data architecture, it is critical to identify use cases that would benefit from
    the new data architecture trend and define projects well scoped to deliver value
    to the business in reasonable time.
  prefs: []
  type: TYPE_NORMAL
- en: The need to structure the data of an organization in a way that the data can
    be analyzed to answer business-driven questions has existed since the invention
    of databases, especially Relational Database Management Systems (RDBMS) with a
    standardized application programming interface (API), Structured Query Language
    (SQL), in the 1970s.^([2](#Fn2)) In the mid-1990s, the data architecture of a
    data warehouse was primarily developed for reporting and data analysis of structured
    historical data, potentially combining different data stores.
  prefs: []
  type: TYPE_NORMAL
- en: In the 2010s, with wider adoption of artificial intelligence, Internet of Things
    (IoT), and edge computing, the demand for processing massive amounts of structured,
    semi-structured, and unstructured data emerged. It led to the data architecture
    of a data lake with a very compelling promise, storing data from disparate sources
    in a single place in its raw format, usually as files for any data consumption
    needed. As a further evolution, data lakehouse^([3](#Fn3)) architectures emerged,
    a merge of data lake and data warehouse concepts, which enabled machine learning
    (ML) and business analytics on data lakes.
  prefs: []
  type: TYPE_NORMAL
- en: Recently, readily available processing power and AI exploitation for managing
    the metadata of a data architecture itself led to Data Fabric and Data Mesh architecture
    and solution concepts that facilitate end-to-end integration of various data pipelines
    and cloud environments using intelligent and automated systems.
  prefs: []
  type: TYPE_NORMAL
- en: This high-level architecture evolution is depicted in Figure [1-1](#Fig1).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_1_Chapter/537582_1_En_1_Fig1_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A timeline of data architecture evolution. 1\. Relational database in mid 1970\.
    2\. Data management for data warehouse in mid 1990\. 3\. Big data data lake in
    2010\. 4\. Data fabric data mesh in 2019.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-1
  prefs: []
  type: TYPE_NORMAL
- en: Data Architecture Evolution Leading to Data Fabric and Data Mesh
  prefs: []
  type: TYPE_NORMAL
- en: Many data architecture capabilities such as data integration, data replication,
    Extract-Transform-Load (ETL) pipelines, data governance, etc. have existed for
    a long time. In the past, a specific set of those capabilities were dictated for
    all use cases, even if they did not satisfy the use case requirements. A Data
    Fabric architecture brings the promise to use the right capabilities for the right
    use cases guided by intelligent metadata.
  prefs: []
  type: TYPE_NORMAL
- en: 'Data Architectures: Values and Challenges'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: RDBMS introduced several functions that became the foundation of later data
    architectures. The first function is the separation of a logical data model –
    the relational model – from the physical storage of the data. The separation created
    a need to introduce a metadata catalog describing the logical layout of the data
    in tables and its mapping to physical storage, maintaining statistics such as
    data size, data distribution, and other characteristics.
  prefs: []
  type: TYPE_NORMAL
- en: RDBMS provide functionality to maintain the physical storage of the data by
    reorganizing the data into the defined order when too many data changes made the
    physical layout and therefore data access suboptimal. It also ensures the availability
    of the data by providing backup and recovery capabilities exploiting available
    system capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: The second function is a standardized Structured Query Language (SQL) to access
    the data. Today, support of SQL exists in all generations of programming languages
    such as Assembler, COBOL, Java, and Python. SQL is continuously expanded to include
    data types such as XML and JSON and new functionality, most recently for interference
    of ML and deep learning (DL) models. Both key functionalities of a RDBMS became
    the foundation for establishment of enterprise data warehouse (EDW) architectures,
    which we explore in the following section.
  prefs: []
  type: TYPE_NORMAL
- en: Enterprise Data Warehouse (EDW)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Interestingly, RDBMS were initially used to store data for reporting purposes
    using SQL and SQL-generating tools as a fast way to get results. In the 1970s,
    performance of data access in a RDBMS was not sufficient for transactional applications
    compared with storing data in datasets or hierarchical databases. As available
    compute power increased, the data of most transactional systems were migrated
    to relational databases. It increased productivity of application programmers
    significantly.
  prefs: []
  type: TYPE_NORMAL
- en: 'The following two main business needs led to the development of an EDW architecture:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Separation of databases for transactional and reporting applications**: Transactional
    systems such as core banking or airline ticketing applications are business critical
    and have different availability and response time characteristics compared with
    reporting applications. The business requested the separation of databases used
    for transactional and reporting applications to not impact performance or availability
    of the transactional applications.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Integrate data from multiple sources and restructure for better performance
    and data consumability**: Data from transactional applications was not stored
    optimal for reporting and analytical applications. The need became apparent to
    copy the data from the source(s) and transform it into a format optimal for reporting
    and analytics.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The preceding needs led to an EDW^([4](#Fn4)) architecture, where the data is
    uploaded from the transactional application(s) to a staging area, followed by
    sometimes complex data cleansing and data transformation steps before the derived
    data is stored in the EDW. Typically, data is stored several times in intermittent
    staging areas.
  prefs: []
  type: TYPE_NORMAL
- en: This EDW architecture is depicted in Figure [1-2](#Fig2).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_1_Chapter/537582_1_En_1_Fig2_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration of E D W architecture. Data consumer has blocks of S Q L with
    reporting, ad hoc, and o lap. Data warehouse is a cubic structure. E T L server
    is divided into 3 staging servers. Data providers consist of o l t p and 3 files.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-2
  prefs: []
  type: TYPE_NORMAL
- en: Enterprise Data Warehouse Architecture
  prefs: []
  type: TYPE_NORMAL
- en: 'The EDW architecture delivered a solution to the business needs with the following
    characteristics:'
  prefs: []
  type: TYPE_NORMAL
- en: Merging and cleansing (make consistent) data from multiple transactional sources.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Separation of data used for transactional and reporting applications.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Maintaining data history even when the source data did not.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Transforming data into a data model optimal for reporting performance (using
    star or snowflake schemas). The transformation pipeline feeds dimension tables
    (e.g., time, sales regions, products, etc.), and the fact table(s) in the middle
    keeps the relational records between the dimensions, for example, sales of a product
    in a region in a time period.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Making the data consumable for business users.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The EDW architecture was hugely successful, and almost every organization implemented
    it. EDWs are still used today for many reporting needs in many if not all organizations.
  prefs: []
  type: TYPE_NORMAL
- en: 'Nevertheless, the EDW architecture created *new challenges as* the business
    wanted to have insight into more, also semi-structured and unstructured data to
    make better, data-driven business decisions:'
  prefs: []
  type: TYPE_NORMAL
- en: The ETL process also created new data quality issues in the EDW. The transactional
    applications continuously added data elements to their databases (schema changes).
    Those new or changed data elements needed to be reflected in the ETL pipeline.
    It is not uncommon that EDW implementations do not adequately reflect the data
    of the transactional applications because the ETL processes were not updated correctly
    or those changes were missed altogether.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The data latency for data in an EDW is typically longer than 1 day, which is
    not acceptable for many analytics applications any longer. Some reporting applications
    operate on data that is older than a week.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: New business requests for data analysis based on the data stored in the EDW
    are typically declined if the data is not already available in the EDW or it takes
    many months to implement the ETL processes to add new data elements.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Even though many transactional applications today are required by law to keep
    historical data or could implement history data with little overhead using SQL
    constructs such as bitemporal functionality, ETL processes still spend most of
    the processing to calculate historical data, which increases the data latency
    and data quality challenges.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Finally, an EDW is great for structured data. Integrating semi-structured and
    unstructured data is a challenge.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Those requirements in the context of newly available technologies delivered
    with the Apache Hadoop open source project using a network of many computers and
    massive inexpensive storage led to the data lake architecture.
  prefs: []
  type: TYPE_NORMAL
- en: Big Data, Data Lake, and Data Lakehouse
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Business users require access to their organizations’ data to explore the content,
    select and annotate, and access information using their terminology with an underpinning
    of data protection and governance, for example, a marketer seeking data for new
    campaigns, which requires ad hoc access to a wide variety of data sources and
    support for decision-making.
  prefs: []
  type: TYPE_NORMAL
- en: Storing and processing big data required a new data architecture. The massive
    number of new data sources generating structured, semi-structured (e.g., XML,
    JSON), and unstructured (e.g., text, audio, pictures) data could not be processed
    in an EDW.
  prefs: []
  type: TYPE_NORMAL
- en: 'The Apache Hadoop open source project^([5](#Fn5)) was born out of the need
    to process this massive amount of data. It delivered key technologies that became
    the foundation of many data lake implementations:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Hadoop Distributed File System** (HDFS), a distributed file system that provides
    very scalable and well-performing access to data stored on the file system.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**MapReduce**, a massively parallel, batch-oriented programming model for large-scale
    data processing. Apache Spark and Apache Hive exploit in-memory technology to
    deliver even faster processing of large amounts of data as needed for ML algorithms.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**YARN**, a resource management platform responsible for managing compute resources
    in clusters and Hadoop common libraries and utilities.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With the wider acceptance of public cloud solutions, today data lakes could
    be implemented using cloud storage services besides on-prem Hadoop implementations.
  prefs: []
  type: TYPE_NORMAL
- en: A data lake architecture usually has a single repository of data, typically
    stored in its raw format. It does not require schema definitions, rigorously maintained
    in an EDW. Instead, users build custom schemas into their queries that makes integration
    of data sources much more flexible.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [1-3](#Fig3) shows a data lake architecture. On the left are all possible
    data sources that are copied into the data lake using different technologies such
    as streaming, data replication, and data integration. It has multiple data zones
    for different types of data processing. The landing zone stores the raw format
    of all incoming data. The analytical zone and archive stores transformed data
    used for reporting, advanced analytics, and ML. Data values may be replicated
    in multiple data zones in the data lake. On the right side are data-consuming
    applications such as decision management systems and predictive analytics tools.
    The concept of information governance was introduced to manage access authority
    to the copy of the data that would have been strictly protected in the original
    data source.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_1_Chapter/537582_1_En_1_Fig3_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A data lake architecture. Data in motion, data at rest, and data in many forms
    are streamed into real time analytics, which are processed in the landing area,
    analytics zone and archive, exploration, integrated warehouse, and data mart zones.
    Data consuming applications are intelligence analysis, decision management, B
    I and predictive analytics, and navigation and discovery, with information governance,
    security, and business continuity.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-3
  prefs: []
  type: TYPE_NORMAL
- en: Big Data Platform – Data Lake Architecture
  prefs: []
  type: TYPE_NORMAL
- en: Many organizations that undertook data lake projects realized that the *store
    everything in one place* model creates not just opportunities but also new challenges.
    *The biggest challenge is not creating a data lake but taking advantage of the
    opportunity it presents*.^([6](#Fn6))
  prefs: []
  type: TYPE_NORMAL
- en: 'If not carefully managed, copying a massive amount of data can lead to the
    following challenges:'
  prefs: []
  type: TYPE_NORMAL
- en: Introduces the risk of using stale data for analytics due to the update latency
    into the data lake.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Complexity to understand and resolve the version of truth among a growing number
    of data sources.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Increasing storage and integration cost and complexity as data and the number
    of sources increase.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Exposes the business to a lot of regulatory risks. Data governance is extremely
    difficult and costly as metadata of the original data sources changes constantly,
    resulting in adaptations in the data lake.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As a result, many organizations start to question the derived business value
    of a data lake compared with the original promise. The data lake becomes a data
    swamp. The challenges of the EDW and data lake created the requirements for new
    data management concepts, the data lakehouse, which is an open data management
    architecture that combines the flexibility, cost efficiency, and scale of data
    lakes with the data management and ACID (Atomicity, Consistency, Isolation, Durability)
    transactions of an EDW, enabling traditional Business Intelligence (BI) and ML
    on a variety of data structures. Thus, a data lakehouse combines characteristics
    and capabilities of a data lake with an EDW. This is often based on open source
    components, such as a delta lake, which is an optimized storage layer that provides
    the foundation for storing data and tables in a data lakehouse platform. A delta
    lake is open source software that extends Parquet data files with a file-based
    transaction log for ACID transactions and scalable metadata handling.^([7](#Fn7))
  prefs: []
  type: TYPE_NORMAL
- en: Implementing a data lakehouse as a new data and AI platform requires a new data
    architecture, the Data Fabric. In Chapter [10](537582_1_En_10_Chapter.xhtml),
    we further elaborate on the evolution of the Data Fabric architecture and Data
    Mesh solution. Today’s enterprises need an agile data architecture – a Data Fabric
    architecture – that hides the ever-increasing complexity of the data source landscape
    and enables easy data consumption by business users. Taking an intelligent and
    agile Data Fabric architecture as its underpinning, the Data Mesh solution approach
    with its promise to establish a data marketplace with data-as-a-product consumption
    patterns is the way to go.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we discuss the relationship and coexistence of a Data Fabric
    architecture and Data Mesh solution.
  prefs: []
  type: TYPE_NORMAL
- en: Key Takeaways
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We conclude this chapter with a few key takeaways as summarized in Table [1-1](#Tab1).
  prefs: []
  type: TYPE_NORMAL
- en: Table 1-1
  prefs: []
  type: TYPE_NORMAL
- en: Key Takeaways
  prefs: []
  type: TYPE_NORMAL
- en: '| # | Key Takeaway | High-Level Description |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| 1 | Data architectures are an evolution. | Data architectures are typically
    developed based on business requirements exploiting state-of-the-art technologies.
    |'
  prefs: []
  type: TYPE_TB
- en: '| 2 | Relational databases and data access via SQL. | Relational databases
    introduced the separation of data storage and logical data organization as well
    as standardized data access via SQL. |'
  prefs: []
  type: TYPE_TB
- en: '| 3 | An enterprise data warehouse (EDW) integrates data from disparate sources.
    | An enterprise data warehouse is a central repository of integrated and transformed,
    structured data from disparate sources and used for reporting and data analysis.
    |'
  prefs: []
  type: TYPE_TB
- en: '| 4 | EDWs are populated by complex ETL or ELT processes. | EDWs are populated
    by complex ETL- or ELT-based processes that create data latency, data quality,
    and flexibility challenges. |'
  prefs: []
  type: TYPE_TB
- en: '| 5 | A data lake stores raw structured and unstructured data. | A data lake
    is a system of repositories storing structured and unstructured data in its raw
    format in a central place. |'
  prefs: []
  type: TYPE_TB
- en: '| 6 | Data lakes can become data swamps. | Poorly managed data lakes have been
    called data swamps and deliver little value to the business. |'
  prefs: []
  type: TYPE_TB
- en: '| 7 | Challenges of EDWs and data lakes lead to Data Fabric. | Challenges implementing
    an EDW and/or data lakes created requirements for a new data architecture – a
    Data Fabric. |'
  prefs: []
  type: TYPE_TB
- en: '| 8 | Data Fabric is an integrated layer (fabric) of data and connection processes.
    | Data Fabric is an integrated layer of data sources and connection processes
    based on active metadata. |'
  prefs: []
  type: TYPE_TB
