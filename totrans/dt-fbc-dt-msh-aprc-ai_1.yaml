- en: 3. Data Fabric and Data Mesh Use Case Scenarios
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This chapter walks through several use cases for implementing a Data Fabric
    and Data Mesh that also represent business-relevant entry points. Data governance
    and privacy initiatives are ongoing in almost every organization, enabling access
    to enterprise data and AI artefacts across platforms to the people who have a
    business need. Other use cases are driven by hybrid cloud data integration; the
    need for a comprehensive view on customers, vendors, and other parties for better
    business outcome; and development and integration of trustworthy AI into business
    processes.
  prefs: []
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Many organizations realized the importance of implementing a data-driven business
    to stay competitive. Therefore, a chief data officer (CDO) of an organization
    is challenged to create and implement a data strategy as a foundation for a data-driven
    business.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_3_Chapter/537582_1_En_3_Fig1_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration reads the title data consumer slash business process. It indicates
    4 elements at the bottom named data governance and privacy, hybrid cloud data
    integration, customer 360, and M L Ops and trustworthy A I.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-1
  prefs: []
  type: TYPE_NORMAL
- en: Common Data Fabric/Data Mesh Use Case Scenarios
  prefs: []
  type: TYPE_NORMAL
- en: The essential components of a Data Fabric architecture and Data Mesh solution
    as described in Chapter [2](537582_1_En_2_Chapter.xhtml) align with typical data
    strategy focus areas. Therefore, use cases centered around components of these
    two concepts create an opportunity to demonstrate the value and meaningful entry
    points for your Data Fabric and Data Mesh journey.
  prefs: []
  type: TYPE_NORMAL
- en: 'Figure [3-1](#Fig1) shows common use cases as meaningful and business-relevant
    entry points for starting to implement a Data Fabric/Data Mesh and progressing
    on a journey over time. A more in-depth treatment of these four entry points are
    provided in later chapters of this book:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Data governance and privacy**: Establish an environment for automated and
    consistent AI governance, which addresses data in a traditional sense, but also
    embraces AI artefacts, for example, ML models, which need to be governed as well.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Hybrid cloud data integration**: Create a unified view of the data across
    the hybrid cloud, which includes public and private cloud deployments, as well
    as traditional on-premises systems.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Customer 360-degree view**: Provide a comprehensive view of customers, vendors,
    and other parties by infusing AI into the matching process to guarantee increased
    accuracy and confidence in this core information.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**MLOps and trustworthy AI**: Implement trustworthy AI and MLOps to detect
    and address bias, drift, and worsening quality metrics for AI models that are
    deployed and in production and, furthermore, to address AI model explainability.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The priority in the data strategy defines the use case or entry point that is
    most applicable and relevant for an organization. In starting your Data Fabric
    and Data Mesh journey in the context of these entry points, you could select either
    one or even several use cases, especially since there is some relationship between
    some of these scenarios. For instance, trustworthy and explainable AI is conceptually
    related to AI governance.
  prefs: []
  type: TYPE_NORMAL
- en: To ensure success of introducing a Data Fabric as a new data architecture, it
    is critical to scope the use case well and define an outcome that delivers value
    to the business as defined in your data and AI strategy. It should show the differentiation
    of the outcome in a Data Fabric architecture compared with the existing data landscape
    in the organization, for example, a data lake or traditional EDW.
  prefs: []
  type: TYPE_NORMAL
- en: This may sound obvious, but many data lake projects were declared a failure
    because structured data of an EDW with a well-defined schema was moved into a
    data lake and stored as files in a Hadoop environment. Adopting such an approach
    lost the benefits of optimized processing of structured data in a relational database
    and the well-defined schema information, that is, as it is defined in a star or
    snowflake schema. The data consumer had to re-detect the schema information that
    was previously readily available in the EDW. It is hard to sell the benefits of
    a data lake to the business if the processing of the same analysis takes much
    longer with the same processing capacity and the data consumer must carry the
    burden of data structure detection.
  prefs: []
  type: TYPE_NORMAL
- en: The discussed use cases provide a unique opportunity to deliver value to the
    business by utilizing a Data Fabric architecture and Data Mesh solution.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_3_Chapter/537582_1_En_3_Fig2_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration represents the activities in the augmented, intelligent data
    catalog. It includes searching, locating, and storing metadata and related artifacts,
    defining governance policies, rules, and classification and monitoring compliance,
    defining and viewing data lineage, and adding additional data into data sources.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-2
  prefs: []
  type: TYPE_NORMAL
- en: Activities to Build an Augmented, Intelligent Data Catalog
  prefs: []
  type: TYPE_NORMAL
- en: Even when the goal of a specific use case varies, all use case implementations
    will first lead to the activities for building an augmented, intelligent data
    or knowledge catalog^([1](#Fn1)) as the core foundation to implement these concepts
    as shown in Figure [3-2](#Fig2).
  prefs: []
  type: TYPE_NORMAL
- en: 'The following are the key activities related to the knowledge catalog:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Store metadata**: Search for, locate, and store metadata and related artefacts
    (business, technical, and operational metadata) in the knowledge catalog. Even
    if it is desired to eventually have all organizational data in the data catalog,
    it needs to be built up incrementally and is focused on data for the selected
    use case in a defined business domain or related to a specific organization. An
    example in the healthcare industry could be patient information. The knowledge
    catalog should also store metadata related to AI artefacts, such as AI models,
    Jupyter notebooks, pipelines, etc.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Define data lineage**: Define and view data lineage (business and technical)
    and perform impact analysis. Defined by data architecture implementations such
    as an EDW and a data lake, data in an organization is frequently copied for consumption
    by different applications. It is important to make the data pipelines visible.
    First, regulations such as the General Data Protection Regulation (GDPR)^([2](#Fn2))
    require an organization to remove personal data in all copies on request. To act
    on this regulation, it needs to be known which data pipelines processed that data
    and what copies were created or updated by the data pipeline execution. Second,
    it also provides an indication about data quality and data latency. It is not
    a technical challenge to copy data from location A to location B. It is a real
    operational challenge to keep copies from locations A and B consistent over a
    longer period of time. The problem becomes infinitely complex with increasing
    number of copies and volume of data copied. Third, it makes data integration optimization
    and alternative approaches visible for data engineers. For example, is it necessary
    and advisable to copy the original data in a data pipeline, instead of complementing
    or extending the original data with derived data, which could possibly be a smarter
    approach?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Define data and AI governance**: Definition of data and AI governance policies,
    rules, and classifications is critical to break down data silos, allow for a uniform
    data consumption, and prevent misuse of data. It includes monitoring of compliance
    and enforcement of data and AI rules and policies on an ongoing basis, as well
    as ensuring compliance with regulations and laws.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Add additional insight, enriching data**: Add additional insight into data
    sources through automated analysis. Augmenting metadata with additional information
    such as data distribution, data quality, and business terms is critical to provide
    data as a service (DaaS) to the data and data product consumers. For example,
    the data analysis of the attribute *telephone number* in a customer record can
    show the telephone number is not consistently maintained within various data stores
    and therefore has limited value for a consuming application or user.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Establishing a knowledge catalog by executing the preceding activities is intuitive
    for a small number of data sources in a static environment. In the real world,
    the number of data sources and existing copies can be large, and metadata is constantly
    changing too.
  prefs: []
  type: TYPE_NORMAL
- en: 'The functionality of products, designed to support the implementation of a
    Data Fabric and Data Mesh, delivers the differentiating value as listed in the
    following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Task automation**: Intelligently automate discovery, classification, and
    cataloging to keep metadata current. For example, new data attributes are added
    to a customer record in support of new functionality in the transactional application.
    This metadata change needs to be propagated to the data catalog and consuming
    applications alerted about the change.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Limiting data movement**: Leave original data where it lives and implement
    alternative data integration techniques using data virtualization to reduce data
    duplication significantly. It improves usability, latency, and quality of the
    data. Many decisions to copy data were made at a given time with product and hardware
    capabilities that are potentially outdated today. It is already a challenge to
    keep a relatively small number of metadata changes current and consistent over
    an extended period of time. Keeping many terabytes of data copies consistent over
    a longer period is realistically impossible.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Smart deployment of AI models**: Deploy AI models to intelligently deliver
    and orchestrate data for specific use cases. For example, a marketing campaign
    service would better access original data sources through data virtualization
    to determine the target group for the campaign, whereas data preparation services
    as input for ML model development could execute data transformation pipelines
    and store the prepared data as copies in an analytics zone. Intelligent information
    integration, meaning AI-infused information integration, supports data engineers
    in simplifying their tasks.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Automated and Consistent Governance
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Establishing an environment for automated and consistent AI governance is a
    data strategy priority in many organizations and the first use case as an entry
    point for implementing a Data Fabric architecture and Data Mesh solution as shown
    in Figure [3-3](#Fig3).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_3_Chapter/537582_1_En_3_Fig3_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration reads the title data consumer slash business process. It reads
    data governance and privacy at the bottom.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-3
  prefs: []
  type: TYPE_NORMAL
- en: Data Fabric/Data Mesh Use Case – Data Governance and Privacy
  prefs: []
  type: TYPE_NORMAL
- en: The term *data governance*^([3](#Fn3)) is used for the processes and responsibilities
    that define, manage, and enforce access, privacy, availability, and security of
    the organization’s data. It typically includes a set of policies, rules, and data
    classifications and functionality to monitor and enforce compliance. As stated
    earlier, we use the term *AI governance* in a broader sense, also including AI
    artefacts.
  prefs: []
  type: TYPE_NORMAL
- en: Data governance is not a new concept. The need to implement centralized data
    and AI governance exists to detect data inconsistencies across different data
    sources. For example, a data attribute such as account number is named the same
    but has different meanings across data sources and cannot be used to combine related
    data. Alternatively, the same attribute is stored under different names across
    data sources, but it is not visible to the data consumer without additional metadata.
  prefs: []
  type: TYPE_NORMAL
- en: Every data platform provides functionality to define and manage data access
    rules and policies. This siloed implementation is a pain point for data consumption
    across data sources. For example, when a user needs access to data stored on different
    data platforms, it typically triggers specific processes for each platform to
    approve and define the requested data access and takes a long time to complete.
  prefs: []
  type: TYPE_NORMAL
- en: 'Monitoring compliance with ever-increasing data privacy and protection laws
    such as GDPR in the European Union (EU) across the different data sources and
    simply answering the question who has obtained what data access authority in an
    organization are problems in themselves. Therefore, many organizations started
    to establish a data and AI governance structure^([4](#Fn4)) focusing on the following
    activities:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Data and AI identification**: Identify data and AI assets and create an inventory
    for an organization or the entire enterprise with related metadata – a knowledge
    catalog.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Data management policies**: Define the rules and policies for governing the
    creation, acquisition, privacy, integrity, security, classification, and quality
    of the data.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Data assessment**: Develop processes to measure the quality, usage, and impact
    of data and AI artefacts as well as monitor and optimize related actions.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Data communication**: Establish a culture of sourcing data through the knowledge
    catalog and maintain currency of the metadata stored in the knowledge catalog.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: It becomes very visible that a data and AI governance structure^([5](#Fn5))
    can be established by implementing an intelligent, augmented data catalog as the
    foundation for a Data Fabric architecture to build a Data Mesh solution.
  prefs: []
  type: TYPE_NORMAL
- en: Any project execution would be very difficult without implementation and usage
    of the right product capabilities. The selected products should support the data
    sources and platforms in your organization and provide AI-augmented functionality
    to ingest and automatically enrich metadata, allowing business users to easily
    understand, collaborate, enrich, and access the right data, to quickly establish
    an environment for highly automated and consistent governance and automatically
    secure data across the organization.
  prefs: []
  type: TYPE_NORMAL
- en: Include IBM zSystems Data in AI Governance
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As an example, we would like to introduce you to IBM zSystems,^([6](#Fn6)) also
    known as the mainframe, which runs most business-critical applications for many
    large enterprises. Seventy-one percent of the Global Fortune 500 companies run
    their business and store data on IBM zSystems, either in the relational database
    Db2 for z/OS, in the structured file system VSAM, or in the hierarchical database
    IMS. Many data engineers and data consumers are not familiar with IBM zSystems
    and see the understanding of and ability to access the operational data stored
    on IBM zSystems as a major pain point.
  prefs: []
  type: TYPE_NORMAL
- en: 'An organization that stored data on IBM zSystems and on other platforms expressed
    their requirements for improved data consumption:'
  prefs: []
  type: TYPE_NORMAL
- en: Make the data attributes available to data consumers on demand.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Support the coexistence of new and legacy data platforms.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Provide regulatory compliance for interoperability and security.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Apply consistent governance to improve data quality for consumers.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Enable near-real-time access to data.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Figure [3-4](#Fig4) shows an architecture overview diagram (AOD) on how this
    organization can respond to those requirements by implementing data governance
    services across data stored in Db2 for z/OS, VSAM, as well as other data sources.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_3_Chapter/537582_1_En_3_Fig4_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A block diagram represents the data governance scenarios. It indicates the interconnection
    among the blocks labeled V S A M, I M S, data source, D V M for z O S, D V engine,
    d b 2 for z O S, and Watson knowledge catalog.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-4
  prefs: []
  type: TYPE_NORMAL
- en: Architecture Overview Diagram – Data Governance Scenarios
  prefs: []
  type: TYPE_NORMAL
- en: 'In this example, IBM Watson Knowledge Catalog on IBM Cloud Pak for Data provides
    a secure enterprise management platform that is supported by a data governance
    framework. The data governance framework ensures that data access and data quality
    are compliant with the defined business rules and processes:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Knowledge catalog**: IBM zSystems data needs to integrate with IBM Watson
    Knowledge Catalog. Data stored in Db2 for z/OS can be directly integrated into
    the knowledge catalog, whereas data stored in IMS or VSAM needs to be mapped first
    to virtual views in IBM Data Virtualization Manager for z/OS (DVM for z/OS). Metadata
    from DVM for z/OS can also be integrated into the knowledge catalog.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Governance artefacts**: Data stewards and data quality analysts can assign
    AI governance artefacts, for example, data and AI policies and rules, and analyze
    and improve the quality of data and AI assets as well as define data masking rules
    to protect sensitive data.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Rules and policies**: Data governance rules and policies are consistently
    applied when IBM zSystems data is accessed, for example, inserted, deleted, or
    updated.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This integration approach demonstrates how data stored on IBM zSystems can be
    made easily available for smarter consumption by stakeholders without any *mainframe*
    knowledge while maintaining rigorous data quality and regulatory compliance standards.
  prefs: []
  type: TYPE_NORMAL
- en: Unified View of Data Across a Hybrid Cloud
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A hybrid cloud^([7](#Fn7)) integrates public cloud services, private cloud services,
    and on-premises infrastructure and provides orchestration, management, and application
    portability across all three. As shown in Figure [3-5](#Fig5), its adoption creates
    the requirement of a unified view of data across a hybrid cloud leading to the
    next Data Fabric or Data Mesh use case.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_3_Chapter/537582_1_En_3_Fig5_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration reads the title data consumer slash business process. It reads
    the hybrid cloud data integration at the bottom.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-5
  prefs: []
  type: TYPE_NORMAL
- en: Data Fabric/Data Mesh Use Case – Hybrid Cloud Data Integration
  prefs: []
  type: TYPE_NORMAL
- en: Traditionally, enterprises managed their own on-premises IT infrastructure and
    computing centers and installed and maintained hardware and software (operating
    systems, middleware, and applications). Depending on how organizations kept up
    with the adoption of modern IT capabilities and the complexity of internal change
    processes, new business solutions were often too cumbersome, could take a long
    time, and were too costly to design and implement.
  prefs: []
  type: TYPE_NORMAL
- en: The inability to respond to new business requirements frustrates business units
    and creates an opportunity for public cloud providers. Public cloud providers
    focus on automation of the provisioning and metering of service resources and
    can offer a variety of services. Cloud providers offer infrastructure as a service
    to quickly provision compute resources (e.g., compute power, storage, memory)
    for the deployment of the needed software stack as well as development and testing
    of a new application to make it available to the business unit. Other cloud providers
    offer the subscription to a solution as a service such as salesforce.com for customer
    relationship management.
  prefs: []
  type: TYPE_NORMAL
- en: The cloud-style provisioning with its benefits of elasticity, scalability, and
    ease of service delivery led to the development of virtualization, software management,
    and automation technologies that organizations adopted in their own computing
    centers, implementing a private cloud.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_3_Chapter/537582_1_En_3_Fig6_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration represents 6 square-shaped blocks. 3 of them are labeled enterprise
    centers, 2 enterprises, and one is users. It denotes the definitions of private,
    hybrid, and public at the top. At the bottom, it indicates the elements that are
    internally hosted and operated, third-party operated, and third-party hosted and
    operated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-6
  prefs: []
  type: TYPE_NORMAL
- en: Deployment Options for Cloud Computing
  prefs: []
  type: TYPE_NORMAL
- en: Figure [3-6](#Fig6) shows the different deployment options for cloud computing.
    Many organizations choose an application modernization strategy in support of
    their business needs. For example, an organization could choose to sunset their
    own custom CRM application and subscribe to a cloud-native service provider. They
    could decide to move their custom finance application or applications related
    to gaining analytical insights^([8](#Fn8)) to a public cloud provider.
  prefs: []
  type: TYPE_NORMAL
- en: Many IT organizations also chose the approach to implement the technology for
    deployment and metering automation in their IT data centers creating a private
    cloud. Another common choice is application modernization, adoption of a modern
    application architecture such as the microservices architecture in the on-premises
    infrastructure, which could be driven by regulatory compliance requirements for
    core business applications.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [3-7](#Fig7) shows the architectural overview of the preceding example,
    where the data previously stored on-prem (left side of Figure [3-7](#Fig7)) in
    few data sources are now spread across multiple public clouds and multiple on-premises
    platforms in all possible formats (right side of Figure [3-7](#Fig7)). Creating
    a unified view of the organization’s data across the hybrid cloud is now even
    more complex than on-premises alone.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_3_Chapter/537582_1_En_3_Fig7_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An architectural structure of traditional on-premises databases on the left.
    The database consists of the C R M app, app 2, and app 3\. It denotes the architecture
    of the hybrid cloud data integration on the right comprising the units of data
    store, database, and data catalog.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-7
  prefs: []
  type: TYPE_NORMAL
- en: Architectural Overview Diagram – Hybrid Cloud Data Integration
  prefs: []
  type: TYPE_NORMAL
- en: The data lake architecture may not be a good answer to this data access requirement
    as copying massive amounts of data across different cloud providers into a single
    data store daily may encounter operational difficulties (e.g., network latency
    and bandwidth issues, problem determination across many components) and cost may
    become prohibitive.
  prefs: []
  type: TYPE_NORMAL
- en: Implementing a Data Fabric^([9](#Fn9)) across the different data sources with
    focus on augmented data integration flows making the best use of ETL, data virtualization,
    and real-time capture for optimized access to those many diverse data sources
    seems to be a better architecture addressing today’s requirements for increased
    agility and flexibility.
  prefs: []
  type: TYPE_NORMAL
- en: 'Such a project would be approached with the previously outlined steps, again
    in a well-defined scope, such as a data domain:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Data identification**: Identify domain-related data assets across hybrid
    cloud data sources, where it is critical for the success regarding implementation
    across a hybrid cloud environment with all data source owners carrying responsibility
    for data as a service to the data consumer and therefore having a strong interest
    to integrate the metadata of the data source in the domain knowledge catalog.
    Additionally, they need to provide an applicable business glossary.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Data management policies**: The data source owners need to define the rules
    and processes for governing the creation, acquisition, privacy, integrity, security,
    classification, quality, and consumption of that domain data and AI artefacts.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Data assessment**: Develop processes to measure the quality, usage, and impact
    of data and AI assets, as well as monitor and optimize related actions.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Data as a service** (DaaS): It becomes imperative for the organization to
    provide a marketplace for the data consumer and source the data through the knowledge
    catalog. The automation of data integration pipelines and recommendation for data
    and AI asset integration technologies such as data virtualization needs to be
    part of this use.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Adopting a Data Fabric for hybrid cloud data integration allows to create a
    view across data stores enabling consistency between operational applications.
    It is a great opportunity to consolidate and simplify IT infrastructure to run
    anywhere (on-premises or in any cloud) and automate data operations. The key differentiator
    is the implementation of intelligent (smart) information integration with augmented
    data integration flows making the best use of various data provisioning methods,
    such as ETL, data virtualization, replication, and streaming technologies to optimize
    access to many diverse data sources.
  prefs: []
  type: TYPE_NORMAL
- en: The Data Fabric provides capabilities to build quality analysis and remediation
    natively into data pipelines without costly downstream processing. Building a
    Data Mesh solution within a hybrid cloud environment relies on capabilities of
    such a Data Fabric architecture.
  prefs: []
  type: TYPE_NORMAL
- en: It is critical for data consumption to support a unified, end-to-end AIDataOps
    lifecycle^([10](#Fn10)) through common governance rules, policies, and procedures.
  prefs: []
  type: TYPE_NORMAL
- en: Provide a Comprehensive View of Customers, Vendors, and Other Parties
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There is a common agreement in the business world that understanding your customer
    is critical for all aspects of the business. Figure [3-8](#Fig8) illustrates Customer
    360, the comprehensive view of customer, vendor or other party data as the third
    use case for a Data Fabric or Data Mesh project.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_3_Chapter/537582_1_En_3_Fig8_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration reads the title data consumer slash business process. It reads
    customer 360 at the bottom.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-8
  prefs: []
  type: TYPE_NORMAL
- en: Data Fabric/Data Mesh Use Case – Customer 360
  prefs: []
  type: TYPE_NORMAL
- en: It is an essential input to the business strategy, which products or services
    to invest in for driving innovation and to grow sales successfully as well as
    provide outstanding customer service. According to a McKinsey survey^([11](#Fn11))
    in 2019, only about a fourth of the survey participants described their companies
    using customer insight consistently within their organizations.
  prefs: []
  type: TYPE_NORMAL
- en: This use case shows how a Data Fabric architecture provides the foundation to
    tackle the problem of inconsistencies in customer or other party profiles, establishing
    a single, trusted, 360-degree view of a customer, thus enabling a Data Mesh solution
    approach that requires a 360-degree view of customer data for building corresponding
    data products and making them available via a trusted data marketplace.
  prefs: []
  type: TYPE_NORMAL
- en: Historically, every application in an organization maintained their own customer,
    vendor, or other party relationship. In the insurance industry, for example, it
    was common to have different applications to manage life, car, and home insurances.
    If a customer owned a car, life, and home insurance policy with that insurance
    company and changed the telephone number, the telephone number would need to be
    changed three times.
  prefs: []
  type: TYPE_NORMAL
- en: 'With the trend of online customer engagement in omni-channel environments,
    organizations focused on MDM, centralizing the customer data and other core information,
    integrating it with existing applications. Still, it is difficult to answer questions
    such as the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Which of my customers are also my vendors to negotiate better contract terms,
    and what is the likelihood for those customers to accept another contract?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Is there a relationship between a customer and a service provider that could
    expose a potential fraud pattern, and what is the likelihood of fraud?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If multiple entries in the customer database are similar, are they representing
    the same person or party to be included in a marketing campaign?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Centralizing the customer data into an MDM solution and integrating existing
    applications may have worked well if all applications run on-premises, preferably
    on a single platform. Nevertheless, integrating a new data source into an existing
    MDM solution is a rather complex endeavor and increases time and cost of adoption
    of new business solutions.
  prefs: []
  type: TYPE_NORMAL
- en: It becomes even more complex and demanding when the organization adopts a hybrid
    cloud strategy.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [3-9](#Fig9) shows how a Data Fabric architecture^([12](#Fn12)) can help
    improve customer insight.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_3_Chapter/537582_1_En_3_Fig9_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A block diagram represents the customer data from the C R M system, M D M system,
    web application, and marketing list that go through the matching algorithm followed
    by the master data and business apps.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-9
  prefs: []
  type: TYPE_NORMAL
- en: Architecture Overview Diagram – Increase Trust in Master Data for Business Consumers
  prefs: []
  type: TYPE_NORMAL
- en: 'The customer data is chosen as the domain, and the project would include the
    actions for implementing a Data Fabric with focus on the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Data identification**: Customer, vendor, or other party data is discovered
    and identified across data sources, which may be distributed within a hybrid cloud
    landscape.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**AI-infused entity matching**: Create high-quality customer, vendor, or other
    party profiles by applying AI-infused entity matching. AI-infused entity matching
    complements existing deterministic and probabilistic matching techniques, yielding
    much more accurate matching results.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Enriched customer profile**: Augment customer metadata with additional information
    such as data distribution, data quality, business terms as well as semi- and unstructured
    data from customer engagement records, etc.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data management policies and rules**: The data source owners need to define
    the rules, policies, and processes for governing the creation, acquisition, privacy,
    integrity, security, classification, and quality of the customer data. The enforcement
    of regulations needs to be automated.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data as a service** (DaaS): The data latency and data quality are especially
    important for provisioning customer and other party data. AI algorithms should
    be used to intelligently provide recommendations for data delivery and orchestration
    for specific use cases. The usage of data virtualization to access the operational
    data source may be the preferred data integration technique for systems of engagements.
    It avoids data inconsistencies for the data consumers and simplifies integration
    of new data sources.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Data Fabric and Data Mesh capabilities centered around an intelligent augmented
    knowledge catalog support the creation of a comprehensive customer, vendor, or
    other party profile and therefore increase trust in master data for data consumers.
    Better customer profiles are created when entities across different data sources
    are resolved by applying AI-infused entity matching^([13](#Fn13)) vs. spending
    time on hunting quality data that is well understood.
  prefs: []
  type: TYPE_NORMAL
- en: Unlock the Trustworthy AI Concept
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: AI continues to penetrate all aspects of business operations and enables new
    business use cases such as improving the profitability of the business, augmenting
    human capabilities and experience. Figure [3-10](#Fig10) illustrates the forth
    and final use case for a Data Fabric or Data Mesh project.
  prefs: []
  type: TYPE_NORMAL
- en: According to an IBM Institute for Business Value (IBV) survey of C-level executives,^([14](#Fn14))
    85% of advanced adopters are reducing operating costs with AI, and 99% of the
    participants report a reduction in cost per contact from using virtual agent technology.
    While AI has a lot of promise, many people question the trustworthiness^([15](#Fn15))
    of applying AI. Three out of four executives view AI ethics as a source of competitive
    differentiation. Indeed, many organizations included AI ethics into their business
    guidelines; they see challenges in applying AI ethics practices and actions in
    their business and IT processes.
  prefs: []
  type: TYPE_NORMAL
- en: Requirements for trustworthy and explainable AI suggest the implementation of
    MLOps, bridging the development and operationalization domains, meaning that the
    Data Fabric and Data Mesh needs to orchestrate the development of AI models on
    one platform, for example, on an x86 cluster on-premises or in the public cloud,
    and the deployment and operationalization for scoring and inferencing on another
    platform, for example, on IBM zSystems.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_3_Chapter/537582_1_En_3_Fig10_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration reads the title data consumer slash business process. It reads
    M L Ops and trustworthy A I at the bottom.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-10
  prefs: []
  type: TYPE_NORMAL
- en: Data Fabric/Data Mesh Use Case – MLOps and trustworthy AI
  prefs: []
  type: TYPE_NORMAL
- en: Specifically, for MLOps and trustworthy AI, this includes data access and data
    integration within the transactional landscape as well.
  prefs: []
  type: TYPE_NORMAL
- en: Before we explain trustworthy AI, let us provide a simple example of MLOps.^([16](#Fn16))
    The meaning of MLOps is to focus on the automation of tasks specific to ML, such
    as feature engineering, training and validation, version control, and finally
    deployment and operationalization.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [3-11](#Fig11) is a high-level architecture overview diagram that depicts
    an AI development environment on the right side, which is based on IBM Cloud Pak
    for Data with IBM Watson Studio, running on an x86 cluster on-premises or in a
    public cloud, and an operational environment on the left side, which is based
    on IBM Watson Machine Learning for z/OS with CICS as a transactional manager,
    running on IBM zSystems. AI models that have been developed with IBM Watson Studio
    need to be exported from the distributed side and imported and put into production
    on the IBM zSystems side, where the scoring and inferencing takes place for each
    CICS transaction.
  prefs: []
  type: TYPE_NORMAL
- en: Once AI models have been deployed and moved into production, outcomes of the
    AI models need to be monitored and measured on a regular basis, which could mean
    daily, weekly, or at longer intervals. This is to gain insight and confidence
    regarding the continuing business relevance of the AI models.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, data scientists and business users have an interest – and are
    even motivated by upcoming regulations on trustworthy AI – to detect bias and
    drift related to drop in data accuracy and precision; they need to furthermore
    understand shift in fairness or whether quality metrics are deteriorating during
    the operationalization of the AI models. In addition, business users increasingly
    require explainability and insight into how AI model outcomes are derived, for
    instance, in terms of influencing features; they need to gain trust and confidence.
    Addressing these challenges is summed up with the term *trustworthy AI*.^([17](#Fn17))
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_3_Chapter/537582_1_En_3_Fig11_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An architecture of M L Operationalization. On the left, it indicates the I B
    M Watson M L for z O S that imports and deploys M L models and goes through C
    I C S scoring request followed by D b 2 for z O S. On the right, it denotes the
    export of M L models in I B M Watson studio that stores data inside the I B M
    cloud park for data.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 3-11
  prefs: []
  type: TYPE_NORMAL
- en: Architecture Overview Diagram – ML Operationalization
  prefs: []
  type: TYPE_NORMAL
- en: 'The following is a short list of trustworthy AI capabilities:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Bias**: Detecting and correcting the fairness (bias) of AI models throughout
    the entire lifecycle'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Drift**: Detecting and correcting drift (drop in accuracy and data consistency)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Explainability**: Explaining AI models (transparency of AI model outcome)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Quality metrics**: Measuring AI model quality metrics, including when AI
    models are operationalized'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Implementing trustworthy and explainable AI^([18](#Fn18)) use cases (or entry
    points) on a Data Fabric and Data Mesh journey requires distinct functions and
    features in vendor products. More than that, for instance, if bias or drift has
    been detected or certain AI model quality metrics are deteriorating while the
    AI model is in production, corrective actions need to be launched autonomously
    – at least as far as possible – to address these concerns. This may include triggering
    a retraining, revalidation, and retesting process for the AI model, including
    collecting a newer version of the data and performing corresponding data preparation
    tasks.
  prefs: []
  type: TYPE_NORMAL
- en: Key Takeaways
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We conclude this chapter with a few key takeaways as summarized in Table [3-1](#Tab1).
  prefs: []
  type: TYPE_NORMAL
- en: Table 3-1
  prefs: []
  type: TYPE_NORMAL
- en: Key Takeaways
  prefs: []
  type: TYPE_NORMAL
- en: '| # | Key Takeaway | High-Level Description |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| 1 | Create and implement a data strategy. | Creation and implementation of
    a data strategy for the organization guides the adoption of the Data Fabric architecture.
    |'
  prefs: []
  type: TYPE_TB
- en: '| 2 | Building a data catalog is the foundation for every use case. | All use
    case implementations will first lead to the activities for building an augmented,
    intelligent data catalog as the foundation of a Data Fabric. |'
  prefs: []
  type: TYPE_TB
- en: '| 3 | Data Fabric architecture for data governance. | Data Fabric architecture
    can be used to implement an environment for automated and consistent governance.
    |'
  prefs: []
  type: TYPE_TB
- en: '| 4 | Data Fabric for hybrid cloud strategy. | The requirement of a unified
    view of the data stored across the hybrid cloud (on-prem and in the cloud) can
    be solved through a Data Fabric architecture. |'
  prefs: []
  type: TYPE_TB
- en: '| 5 | Data Fabric for 360-degree customer view. | The requirement of a comprehensive
    view of customers and vendors can be solved through a Data Fabric architecture.
    |'
  prefs: []
  type: TYPE_TB
- en: '| 6 | Data Fabric for trustworthy AI. | Data Fabric architecture provides the
    permanent transparency and explainability of data required for trustworthy AI.
    |'
  prefs: []
  type: TYPE_TB
- en: '| 7 | Trustworthy AI is driven by regulations. | Trustworthy and explainable
    AI and ethics in AI are driven by forthcoming regulations in the United States
    and the EU. |'
  prefs: []
  type: TYPE_TB
- en: '| 8 | Define a prioritized use case. | Define a well-scoped use case that delivers
    value to the business as defined in the data strategy. The discussed use cases
    are commonly prioritized in organizations. |'
  prefs: []
  type: TYPE_TB
