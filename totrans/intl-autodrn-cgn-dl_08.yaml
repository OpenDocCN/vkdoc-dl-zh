  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们在 Terminator 的第二个打开的终端中启动我们的 Gazebo 模拟。`roslaunch ai_rover_remastered ai_rover_world.launch`
    从第 [5](494112_1_En_5_Chapter.xhtml) 章启动我们的探测器 Gazebo 模拟。
