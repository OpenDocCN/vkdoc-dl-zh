- en: Edge Detection and LiDAR (Why)
  id: totrans-150
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 边缘检测和激光雷达（为什么）
- en: Implementation (How)
  id: totrans-151
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实现（如何）
- en: Edge detection plays a key role during object identification and extraction,
    which is necessary for object avoidance. The edges detected from camera images
    have high vertical accuracy and represent various edge shapes of objects in the
    environment. But the edge detection in most camera images is affected by contrast
    and lighting. LiDAR data are suitable for judging building regions but miss some
    edge points due to the laser pulse errors. A new adaptive method of building edge
    detection combines LiDAR data and images to take advantage of the two data sources.
    First, the objects and ground are separated by a filter gradient. The non-building
    objects are removed by mathematical morphology and region growth. Second, the
    images are smoothed by Gaussian convolution, and the gradients of the image are
    calculated. Finally, the edge detections process the image space by the edge points
    of the individual roof patch. The pixels with the maximal local gradient in the
    buffer area are judged as the candidate edge. The ultimate edges are determined
    by fusing the image edges and the roof patch by morphological operation. The experimental
    results show that the method is adaptive for various building shapes. The ultimate
    edges are closed and thin with one-pixel width, which are suitable for subsequent
    building modeling.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 边缘检测在物体识别和提取过程中起着关键作用，这对于物体避障是必要的。从相机图像中检测到的边缘具有高垂直精度，并代表环境中物体的各种边缘形状。但大多数相机图像中的边缘检测受对比度和光照的影响。激光雷达数据适合判断建筑区域，但由于激光脉冲误差而遗漏一些边缘点。一种新的自适应建筑边缘检测方法结合了激光雷达数据和图像，以利用这两种数据源。首先，通过滤波梯度将物体和地面分离。通过数学形态学去除非建筑物体和区域增长。其次，通过高斯卷积平滑图像，并计算图像的梯度。最后，通过单个屋顶斑块的边缘点处理图像空间。缓冲区中具有最大局部梯度的像素被判定为候选边缘。最终边缘通过形态学操作融合图像边缘和屋顶块来确定。实验结果表明，该方法对各种建筑形状具有适应性。最终边缘是闭合且细的，宽度为单像素，适合后续的建筑建模。
- en: Launching Python Files
  id: totrans-153
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 启动Python文件
- en: 'This approach is a common use case in robotics: you get some data from a sensor,
    and you need to pass it through several parts of your applications. Each part
    needs the data to do its own thing, and some parts may also modify the data for
    other parts.'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法在机器人领域是一个常见的用例：你从传感器获取一些数据，需要将其通过应用程序的几个部分。每个部分都需要数据来完成自己的任务，有些部分可能还需要修改数据以供其他部分使用。
- en: 'For this example, we’ll create three nodes:'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个例子，我们将创建三个节点：
- en: 'Node 1 (`pipeline_step_1`): create a random float number between 0 and 10 and
    publish it'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 节点1（`pipeline_step_1`）：创建一个介于0和10之间的随机浮点数，并发布
- en: 'Node 2 (`pipeline_step_2`): get this number, multiply it by 2, and publish
    it'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 节点2（`pipeline_step_2`）：获取这个数字，将其乘以2，并发布
- en: 'Node 3 (`pipeline_step_3`): get this number, round it, and publish it'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 节点3（`pipeline_step_3`）：获取这个数字，四舍五入，并发布
- en: 'Figure [8-11](#Fig11) shows the graph we’ll get at the end:'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 图[8-11](#Fig11)显示了我们将得到的最终图：
- en: '![](../images/494112_1_En_8_Chapter/494112_1_En_8_Fig11_HTML.jpg)'
  id: totrans-160
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/494112_1_En_8_Chapter/494112_1_En_8_Fig11_HTML.jpg)'
- en: A flowchart of a completed graph. The chart reads as follows. Forward slash
    pipeline underscore step underscore 1, forward slash data underscore 1, forward
    slash pipeline underscore step underscore 2, forward slash data underscore 2,
    forward slash pipeline underscore step underscore 3, and forward slash data underscore
    3.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 完成图的流程图。该图如下所示。正斜杠管道下划线步骤下划线1，正斜杠数据下划线1，正斜杠管道下划线步骤下划线2，正斜杠数据下划线2，正斜杠管道下划线步骤下划线3，以及正斜杠数据下划线3。
- en: Figure 8-11
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-11
- en: Completed graph
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 完成图
- en: 'Step 1: Data Pipeline'
  id: totrans-164
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 步骤1：数据管道
- en: 'We’ll create a random float number between 0 and 10 in this node and publish
    it on the "data_1" topic. Here, I chose to write the node in Python:'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 在此节点中，我们将创建一个介于0和10之间的随机浮点数，并在“data_1”主题上发布。在这里，我选择用Python编写节点：
- en: '[PRE14]'
  id: totrans-166
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: If you’re not confident with writing this code, many online references (`ROS.org`)
    exist to create a [minimal ROS node in Python](https://roboticsbackend.com/write-minimal-ros2-python-node/)
    and write [a ROS Python publisher](https://roboticsbackend.com/ros2-python-publisher-example/).
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有信心编写此代码，许多在线参考资料（`ROS.org`）存在，用于创建一个[Python中的最小ROS节点](https://roboticsbackend.com/write-minimal-ros2-python-node/)和编写[ROS
    Python发布者](https://roboticsbackend.com/ros2-python-publisher-example/)。
- en: Here we use `random.uniform()` to get the required random float number.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们使用`random.uniform()`获取所需的随机浮点数。
- en: We publish on the "data_1" topic every 1 second at 1 Hz with the timer we create.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用我们创建的计时器，每秒在1Hz频率上发布“data_1”主题。
- en: And we also print on the terminal what we’ve just published, so it will be easier
    to debug.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 并且我们还在终端上打印了我们刚刚发布的内容，这样调试会更方便。
- en: 'Step 2: Data Pipeline'
  id: totrans-171
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第2步：数据管道
- en: This node will subscribe to the “data_1” topic, process/transform the data,
    and publish the new data to the “data_2” topic. Here, I’m writing the node in
    C++ because ROS communications are language agnostic, so you can use any language
    you want for your nodes.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 这个节点将订阅“data_1”主题，处理/转换数据，并将新数据发布到“data_2”主题。在这里，我正在用C++编写这个节点，因为ROS通信是语言无关的，所以你可以为你的节点使用任何你想要的编程语言。
- en: '[PRE15]'
  id: totrans-173
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: If you’re not that confident with this code, check out how to [write a minimal
    ROS node in C++](https://roboticsbackend.com/write-minimal-ros2-cpp-node/).
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对这个代码不太自信，请查看如何[在C++中编写最小的ROS节点](https://roboticsbackend.com/write-minimal-ros2-cpp-node/)。
- en: Here, we create a publisher (to “data_2”) as well as a subscriber (to “data_1”).
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们创建了一个发布者（到“data_2”）以及一个订阅者（到“data_1”）。
- en: 'In the “data_1” topic callback, we do the following:'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 在“data_1”主题回调中，我们执行以下操作：
- en: Process the data and transform it here by multiplying it by 2.
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在这里通过乘以2来处理数据并转换它。
- en: Create [a new Float64 message](https://roboticsbackend.com/ros2-create-custom-message/)
    and fill it with this new data.
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建[一个新的Float64消息](https://roboticsbackend.com/ros2-create-custom-message/)并用这些新数据填充它。
- en: Publish the data to the “data_2” topic.
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将数据发布到“data_2”主题。
- en: Print what we received and published to make debugging/monitoring easier.
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 打印我们接收和发布的内容，以便更容易进行调试/监控。
- en: Note that we didn’t create any rate to publish on the “data_2” topic; we directly
    publish from the callback function of the “data_1” topic.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 注意我们没有为“data_2”主题创建任何发布速率；我们直接从“data_1”主题的回调函数中发布。
- en: 'Step 3: Data Pipeline'
  id: totrans-182
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第3步：数据管道
- en: 'The final node of our pipeline: this one will subscribe to the “data_2” topic,
    process/transform the data, and publish the new data to the “data_3” topic. And
    I’ll write this node in Python again:'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 我们管道的最后一个节点：这个节点将订阅“data_2”主题，处理/转换数据，并将新数据发布到“data_3”主题。我再次用Python编写这个节点：
- en: '[PRE16]'
  id: totrans-184
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: So, we have a publisher to "data_3" and a subscriber to "data_2".
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们有一个发布者到“data_3”和一个订阅者到“data_2”。
- en: 'Here again, we do everything in the "data_2" callback function:'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们再次在“data_2”回调函数中做所有事情：
- en: 'Process the data and modify it: we round it and get an integer instead of a
    float number.'
  id: totrans-187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 处理数据并修改它：我们将其四舍五入并得到一个整数而不是浮点数。
- en: Create a new message with a different type. We received Float64 data, and now
    we’re publishing an Int64.
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用不同类型创建一条新消息。我们收到了Float64数据，现在我们正在发布Int64。
- en: Publish the new data.
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 发布新数据。
- en: Log.
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 日志。
- en: The most crucial point is that we’re using a different data type to pass the
    message to the next pipeline step.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 最关键的一点是我们正在使用不同的数据类型将消息传递到下一个管道步骤。
- en: Note
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: As this is the last step of our pipeline example, we could print the result
    with a log and not publish it. With your nodes and data, you’ll have a good idea
    of what you should do in your application.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 作为我们管道示例的最后一个步骤，我们可以通过日志打印结果而不是发布它。通过你的节点和数据，你将有一个很好的想法知道在你的应用程序中应该做什么。
- en: Building and Running the ROS Data Pipeline Application
  id: totrans-194
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建和运行ROS数据管道应用程序
- en: Add executables in `setup.py` for Python nodes and `CMakeLists.txt` for C++
    nodes. Then compile from your ROS workspace with `catkin_make build.`
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 在`setup.py`中为Python节点添加可执行文件，在`CMakeLists.txt`中为C++节点添加可执行文件。然后使用`catkin_make
    build`从你的ROS工作空间编译。
- en: Running the App in Three Different Terminals
  id: totrans-196
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在三个不同的终端中运行应用程序
- en: Open three terminals/sessions. If you already have three open terminals, make
    sure to source your ROS workspace in each one before continuing.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 打开三个终端/会话。如果你已经有三个打开的终端，确保在继续之前在每个终端中source你的ROS工作空间。
- en: Let's start all three nodes and see what we get.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们启动所有三个节点并看看我们得到什么。
- en: 'Terminal 1:'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 终端1：
- en: '[PRE17]'
  id: totrans-200
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: 'Terminal 2:'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 终端2：
- en: '[PRE18]'
  id: totrans-202
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: 'Terminal 3:'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 终端3：
- en: '[PRE19]'
  id: totrans-204
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Thanks to the logs, you can see where the data goes, when it is received and
    sent, and how it is processed.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 多亏了日志，你可以看到数据去哪里，何时接收和发送，以及它是如何被处理的。
- en: 'Now, if you get the list of all topics running in your graph with [ROS topic
    list](https://roboticsbackend.com/ros2-topic-cmd-line-tool-debug-ros2-topics-from-the-terminal/):'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，如果你使用[ROS主题列表](https://roboticsbackend.com/ros2-topic-cmd-line-tool-debug-ros2-topics-from-the-terminal/)获取你图中运行的所有主题的列表：
- en: '[PRE20]'
  id: totrans-207
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: We find the topics “data_1”, “data_2,” and “data_3”.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 我们找到了“data_1”、“data_2”和“data_3”主题。
- en: 'So, this is great. From there, you can do the following:'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，这真是太好了。从这里，您可以执行以下操作：
- en: Listen to any topic with ROS topic echo from the terminal and see what's going
    on.
  id: totrans-210
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用终端的ROS主题回声监听任何主题，看看发生了什么。
- en: 'Plug any new node into any of those topics. For example, you want to make a
    more complex data pipeline: another node can subscribe to "data_2" and then process
    it independently.'
  id: totrans-211
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将任何新的节点连接到这些主题中的任何一个。例如，你想要创建一个更复杂的数据管道：另一个节点可以订阅“data_2”并独立处理它。
- en: Starting Your Data Pipeline with a ROS Launch File
  id: totrans-212
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用ROS启动文件启动您的数据管道
- en: For developing and debugging, starting your nodes from the terminal is fantastic.
    However, if you want to create an actual ROS application, you’ll have to use launch
    files. On top of the advantages of using an ROS launch file, you’ll also be able
    to start all your nodes at the same time, so all the pipeline steps will start
    working simultaneously.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 对于开发和调试，从终端启动节点是非常棒的。然而，如果你想创建一个实际的ROS应用程序，你将不得不使用启动文件。除了使用ROS启动文件的优势之外，你还可以同时启动所有节点，因此所有管道步骤将同时开始工作。
- en: 'So, let’s write a simple launch file to start all three nodes:'
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，让我们编写一个简单的启动文件来启动所有三个节点：
- en: '[PRE21]'
  id: totrans-215
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: Now compile and run this launch file. He[re's an ROS launch file tutorial](https://roboticsbackend.com/ros2-launch-file-example/)
    if you don't know how.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 现在编译并运行这个启动文件。如果你不知道如何操作，这里有一个[ROS启动文件教程](https://roboticsbackend.com/ros2-launch-file-example/)。
- en: '[PRE22]'
  id: totrans-217
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: And your data pipeline is now fully ready! For production you may remove the
    info logs and only print the warn logs.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您的数据管道已经完全准备好了！对于生产，您可以移除info日志，只打印warn日志。
- en: Summary
  id: totrans-219
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: 'You can now build a complete data pipeline using ROS nodes and topics. The
    ROS architecture and tools bring you many advantages. You can do the following:'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 您现在可以使用ROS节点和主题构建完整的数据管道。ROS架构和工具为您带来了许多优势。您可以执行以下操作：
- en: Write any step or pipeline (node) in any language you want
  id: totrans-221
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用您想要的任何语言编写任何步骤或管道（节点）
- en: Debug each step from the terminal with the command-line tool
  id: totrans-222
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用命令行工具从终端调试每个步骤
- en: Start only a few steps of your pipeline
  id: totrans-223
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 只启动管道的几个步骤
- en: Add new steps (nodes) at the beginning, end, or anywhere else in the pipeline
  id: totrans-224
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在管道的开始、结束或任何其他位置添加新的步骤（节点）
