  type: TYPE_NORMAL
- en: I was lucky enough to witness the world’s transition to an information society,
    followed by a networked environment. I have been living with the changes since
    I was young. The personal computer opened the door to the world of information,
    followed by online communication that connected computers via the Internet, and
    smartphones that connected people. Now, everyone perceives the beginning of the
    overwhelming wave of artificial intelligence. More and more intelligent services
    are being introduced, bringing in a new era. Deep Learning is the technology that
    led this wave of intelligence. While it may hand over its throne to other technologies
    eventually, it stands for now as a cornerstone of this new technology.
  prefs: []
  type: TYPE_NORMAL
- en: Deep Learning is so popular that you can find materials about it virtually anywhere.
    However, not many of these materials are beginner friendly. I wrote this book
    hoping that readers can study this subject without the kind of difficulty I experienced
    when first studying Deep Learning. I also hope that the step-by-step approach
    of this book can help you avoid the confusion that I faced.
  prefs: []
  type: TYPE_NORMAL
- en: This book is written for two kinds of readers. The first type of reader is one
    who plans to study Deep Learning in a systematic approach for further research
    and development. This reader should read all the content from the beginning to
    end. The example code will be especially helpful for further understanding the
    concepts. A good deal of effort has been made to construct adequate examples and
    implement them. The code examples are constructed to be easy to read and understand.
    They are written in MATLAB for better legibility. There is no better programming
    language than MATLAB at being able to handle the matrices of Deep Learning in
    a simple and intuitive manner. The example code uses only basic functions and
    grammar, so that even those who are not familiar with MATLAB can easily understand
    the concepts. For those who are familiar with programming, the example code may
    be easier to understand than the text of this book.
  prefs: []
  type: TYPE_NORMAL
- en: The other kind of reader is one who wants more in-depth information about Deep
    Learning than what can be obtained from magazines or newspapers, yet doesn’t want
    to study formally. These readers can skip the example code and briefly go over
    the explanations of the concepts. Such readers may especially want to skip the
    learning rules of the neural network. In practice, even developers seldom need
    to implement the learning rules, as various Deep Learning libraries are available.
    Therefore, those who never need to develop it do not need to bother with it. However,
    pay closer attention to Chapters [1](A448947_1_En_1_Chapter.html) and [2](A448947_1_En_2_Chapter.html)
    and Chapters [5](A448947_1_En_5_Chapter.html) and [6](A448947_1_En_6_Chapter.html)
    . Chapter [6](A448947_1_En_6_Chapter.html) will be particularly helpful in capturing
    the most important techniques of Deep Learning, even if you’re just reading over
    the concepts and the results of the examples. Equations occasionally appear to
    provide a theoretical background. However, they are merely fundamental operations.
    Simply reading and learning to the point you can tolerate will ultimately lead
    you to an overall understanding of the concepts.
  prefs: []
  type: TYPE_NORMAL
- en: Organization of the Book
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This book consists of six chapters, which can be grouped into three subjects.
    The first subject is Machine Learning and takes place in Chapter [1](A448947_1_En_1_Chapter.html)
    . Deep Learning stems from Machine Learning. This implies that if you want to
    understand the essence of Deep Learning, you have to know the philosophy behind
    Machine Learning to some extent. Chapter [1](A448947_1_En_1_Chapter.html) starts
    with the relationship between Machine Learning and Deep Learning, followed by
    problem solving strategies and fundamental limitations of Machine Learning. The
    detailed techniques are not introduced in this chapter. Instead, fundamental concepts
    that apply to both the neural network and Deep Learning will be covered.
  prefs: []
  type: TYPE_NORMAL
- en: 'The second subject is the artificial neural network. [¹](#Fn1) Chapters [2](A448947_1_En_2_Chapter.html)
    - [4](A448947_1_En_4_Chapter.html) focus on this subject. As Deep Learning is
    a type of Machine Learning that employs a neural network, the neural network is
    inseparable from Deep Learning. Chapter [2](A448947_1_En_2_Chapter.html) starts
    with the fundamentals of the neural network: principles of its operation, architecture,
    and learning rules. It also provides the reason that the simple single-layer architecture
    evolved to the complex multi-layer architecture. Chapter [3](A448947_1_En_3_Chapter.html)
    presents the back-propagation algorithm, which is an important and representative
    learning rule of the neural network and also employed in Deep Learning. This chapter
    explains how cost functions and learning rules are related and which cost functions
    are widely employed in Deep Learning.'
  prefs: []
  type: TYPE_NORMAL
- en: Chapter [4](A448947_1_En_4_Chapter.html) explains how to apply the neural network
    to classification problem s. We have allocated a separate section for classification
    because it is currently the most prevailing application of Machine Learning. For
    example, image recognition, one of the primary applications of Deep Learning,
    is a classification problem.
  prefs: []
  type: TYPE_NORMAL
- en: The third topic is Deep Learning. It is the main topic of this book. Deep Learning
    is covered in Chapters [5](A448947_1_En_5_Chapter.html) and [6](A448947_1_En_6_Chapter.html)
    . Chapter [5](A448947_1_En_5_Chapter.html) introduces the drivers that enable
    Deep Learning to yield excellent performance. For a better understanding, it starts
    with the history of barriers and solutions of Deep Learning. Chapter [6](A448947_1_En_6_Chapter.html)
    covers the convolution neural network, which is representative of Deep Learning
    techniques. The convolution neural network is second to none in terms of image
    recognition. This chapter starts with an introduction of the basic concept and
    architecture of the convolution neural network as it compares with the previous
    image recognition algorithms. It is followed by an explanation of the roles and
    operations of the convolution layer and pooling layer, which act as essential
    components of the convolution neural network. The chapter concludes with an example
    of digit image recognition using the convolution neural network and investigates
    the evolution of the image throughout the layers.
  prefs: []
  type: TYPE_NORMAL
- en: Source Code
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: All the source code used in this book is available online via the Apress web
    site at [`www.apress.com/9781484228449`](http://www.apress.com/9781484228449)
    . The examples have been tested under MATLAB 2014a. No additional toolbox is required.
