  type: TYPE_NORMAL
- en: '*“s” in the figure. In testing, we use μ for z. The decoder then reconstructs
    the original pitch sequence* *from z. In training, there is a reconstruction loss
    that penalizes large differences between the input* *sequence and the output sequence,
    and a KL loss, which penalizes the distance of* N( *μ*, *σ*) *from* N(0, I) *,*
    *where* 0 *is the zero vector and* I *is the identity matrix. This latter loss
    is based on KL divergence, and* *it encourages the construction of a structured
    latent space. The complete loss is the summation of these* *two losses and can
    be seen at the bottom of the figure. This figure was inspired by a figure in [33].*'
  id: totrans-74
