- en: The first layer is the “feature” input, which is the three measurements. These
    are passed to a 128-neuron fully connected layer that uses ReLU, rectified linear
    units, as the activation function. This is followed by another fully connected
    layer with the same activation function.
  prefs: []
  type: TYPE_NORMAL
- en: The output layer is a fully connected layer with two neurons that uses a hyperbolic
    tangent activation function. The output of the activation layer is the vector
    control of the angle of attack.
  prefs: []
