- en: As we discussed in Section [14.5,](index_split_006.html#p284) we do have an
    ability to alter what is generated by our LSTM by seeding its generation with
    songs from different composers, or of different styles or moods, and so on. However,
    it would be much easier to isolate particular features of a musical piece and
    to change them independently with a VAE. One problem with using a VAE
  prefs: []
  type: TYPE_NORMAL
- en: by itself to generate music is that the output size of the model is fixed. To
    generate an arbitrarily long sequence of music, one would need to repeatedly generate
    musical sequences of a fixed length and string them together. Another problem
    is that VAEs can be very difficult to train in part because you are balancing
    the KL loss which tries to push the encodings of all inputs together (toward the
    normal distribution) and the reconstruction loss which tries to push them apart
    so that they can be differentiated more easily by the decoder. These losses can
    be seen in Figure [14.8\.](#p297)
  prefs: []
  type: TYPE_NORMAL
- en: Another way in which VAEs are used for music generation is as a method for handling
    raw data. As we mentioned previously, raw data is challenging to use as it contains
    many extraneous features that might distract our model from the music it is supposed
    to be modeling. Since VAEs can be used to extract the important features in a
    signal, we can train a VAE to extract musically **Figure 14.8:** *Example VAE
    training using pitch as input. In this example, we model the latent space as*
    *a bivariate normal distribution, so the encoder generates a 2D mean vector and
    2D standard deviation* *vector. In training, we sample from* N( *μ*, *σ*) *to
    get z. This is signified by the black circle with the white*
  prefs: []
  type: TYPE_NORMAL
- en: '*“s” in the figure. In testing, we use μ for z. The decoder then reconstructs
    the original pitch sequence* *from z. In training, there is a reconstruction loss
    that penalizes large differences between the input* *sequence and the output sequence,
    and a KL loss, which penalizes the distance of* N( *μ*, *σ*) *from* N(0, I) *,*
    *where* 0 *is the zero vector and* I *is the identity matrix. This latter loss
    is based on KL divergence, and* *it encourages the construction of a structured
    latent space. The complete loss is the summation of these* *two losses and can
    be seen at the bottom of the figure. This figure was inspired by a figure in [33].*'
  prefs: []
  type: TYPE_NORMAL
- en: '287'
  prefs: []
  type: TYPE_NORMAL
- en: '![](index-298_1.png)'
  prefs: []
