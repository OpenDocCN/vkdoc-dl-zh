  type: TYPE_NORMAL
  zh: 图中的“s”。在测试中，我们使用 μ 表示 z。解码器随后从 z 中重建原始音高序列* *。在训练中，存在一个重建损失，它惩罚输入序列和输出序列之间的大差异，以及一个
    KL 损失，它惩罚 N(μ, σ) 与 N(0, I) 的距离，* *其中* 0 *是零向量，* I *是单位矩阵。这种后者的损失基于 KL 散度，* *它鼓励构建一个结构化的潜在空间。完整的损失是这两个损失的加和，可以在图的下部看到。这个图是受
    [33] 中的一个图的启发。*
