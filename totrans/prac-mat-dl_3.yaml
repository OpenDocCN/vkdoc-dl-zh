  type: TYPE_NORMAL
- en: Episode Q0 is an estimate of the long-term reward at the start of each episode,
    using only the initial observation. The window also shows the reward for the current
    episode and the average reward. The highest reward, in this case, is zero.
  id: totrans-2896
  prefs: []
  type: TYPE_NORMAL
- en: You can halt training at any time, and the script will complete and run the
    simulation. The output of sim, experience, gives the simulation output. It is
    a fairly complex data structure.
