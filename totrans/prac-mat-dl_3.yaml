  id: totrans-1230
  prefs: []
  type: TYPE_NORMAL
- en: '**15.6.2 Solution**'
  id: totrans-1231
  prefs: []
  type: TYPE_NORMAL
- en: Write a script using fmincon to produce an optimal trajectory.
  id: totrans-1232
  prefs: []
  type: TYPE_NORMAL
- en: '**15.6.3 How It Works**'
  id: totrans-1233
  prefs: []
  type: TYPE_NORMAL
- en: We will solve the constrained optimal control problem. The constraint is the
    end state, which must be
  id: totrans-1234
  prefs: []
  type: TYPE_NORMAL
- en: ⎡
  id: totrans-1235
  prefs: []
  type: TYPE_NORMAL
- en: ⎤
  id: totrans-1236
  prefs: []
  type: TYPE_NORMAL
- en: '*r* Titan'
  id: totrans-1237
  prefs: []
  type: TYPE_NORMAL
- en: '*x* = ⎣ 0'
  id: totrans-1238
  prefs: []
  type: TYPE_NORMAL
- en: ⎦
  id: totrans-1239
  prefs: []
  type: TYPE_NORMAL
- en: (15.19)
  id: totrans-1240
  prefs: []
  type: TYPE_NORMAL
- en: '0'
  id: totrans-1241
  prefs: []
  type: TYPE_NORMAL
- en: 'We have three different cost calculations that could be minimized. fmincon
    tries to minimize the costs. The first is dynamic pressure:'
  id: totrans-1242
  prefs: []
  type: TYPE_NORMAL
- en: '1'
  id: totrans-1243
  prefs: []
  type: TYPE_NORMAL
- en: '*q* = *ρv* 2'
  id: totrans-1244
  prefs: []
  type: TYPE_NORMAL
- en: '2'
  id: totrans-1245
  prefs: []
  type: TYPE_NORMAL
- en: (15.20)
  id: totrans-1246
  prefs: []
  type: TYPE_NORMAL
- en: 'This is the aerodynamic load on the vehicle. Stagnation temperature is the
    second: 1'
  id: totrans-1247
  prefs: []
  type: TYPE_NORMAL
- en: '*T* 0 = *Ta*(1 + *f*( *γ −* 1) *M* 2) 2'
  id: totrans-1248
  prefs: []
  type: TYPE_NORMAL
- en: (15.21)
  id: totrans-1249
  prefs: []
  type: TYPE_NORMAL
- en: 'where *Ta* is the ambient temperature, *γ* is the ratio of specific heats,
    and *M* is the Mach number, which is the speed divided by the speed of sound.
    The last is the heating rate [45]:'
  id: totrans-1250
  prefs: []
  type: TYPE_NORMAL
- en: '*√*'
  id: totrans-1251
  prefs: []
  type: TYPE_NORMAL
- en: '*r ≈ ρv* 3'
  id: totrans-1252
  prefs: []
  type: TYPE_NORMAL
- en: (15.22)
  id: totrans-1253
  prefs: []
  type: TYPE_NORMAL
- en: In all cases, the cost will be the mean of these quantities over the trajectory.
  id: totrans-1254
  prefs: []
  type: TYPE_NORMAL
- en: The first step is to find a trajectory that reaches the surface. We write a
    script Landing.m for that purpose.
  id: totrans-1255
  prefs: []
  type: TYPE_NORMAL
- en: '***Landing.m***'
  id: totrans-1256
  prefs: []
  type: TYPE_NORMAL
- en: '1'
  id: totrans-1257
  prefs: []
  type: TYPE_NORMAL
- en: '%% Simulate level flight above Titan'
  id: totrans-1258
  prefs: []
  type: TYPE_NORMAL
