- en: '**CHAPTER 15**'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: '**第15章**'
- en: '**Reinforcement Learning**'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: '**强化学习**'
- en: '**15.1**'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: '**15.1**'
- en: '**Introduction**'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: '**引言**'
- en: Reinforcement learning is a machine learning approach in which an intelligent
    agent learns to take actions to maximize a reward. We will apply this to the design
    of a Titan landing control system. Reinforcement learning is a tool to approximate
    solutions that could have been obtained by dynamic programming, but whose exact
    solutions are computationally intractable [3].
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习是一种机器学习方法，其中智能代理通过采取行动以最大化奖励来学习。我们将将其应用于土卫六着陆控制系统的设计。强化学习是一种近似解决方案的工具，这些解决方案原本可以通过动态规划获得，但其确切解决方案在计算上是不可行的
    [3]。
- en: We’ll start the chapter by modeling the point-mass dynamics for the vehicle.
    We will then build a simulation. We’ll test the simulation with the vehicle that
    starts in orbit around Titan, a moon of Jupiter, and with the vehicle in level
    flight. We will then use optimization to find a trajectory. Finally, we’ll design
    a reinforcement learning algorithm to find a trajectory.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将首先对车辆的点质量动力学进行建模。然后我们将构建一个模拟。我们将使用在土卫六轨道上运行的车辆以及水平飞行的车辆来测试这个模拟。然后我们将使用优化来找到一条轨迹。最后，我们将设计一个强化学习算法来找到一条轨迹。
- en: '**15.2**'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: '**15.2**'
- en: '**Titan Lander**'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: '**土卫六着陆器**'
- en: The problem, for which we will use reinforcement learning, is a powered landing
    on Titan.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用强化学习解决的问题是在土卫六上进行动力降落。
- en: Titan is the second-largest moon in the solar system and is larger than the
    planet Mercury.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 土卫六是太阳系中第二大卫星，其体积大于水星。
- en: Titan has a thick atmosphere which makes it feasible to fly an airplane in the
    atmosphere using aerodynamic forces for lift. Figure [15.1](#p300) shows an image
    of Titan and its atmospheric density.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 土卫六有一个厚厚的 atmosphere，这使得在 atmosphere 中使用空气动力学力进行飞行成为可能。图 [15.1](#p300) 展示了土卫六及其大气密度的图像。
- en: 'We will use a model similar to that in Chapter 9, terrain-based navigation,
    except that we will simplify it to the planar case. In addition, we will assume
    that the mass of the vehicle does not vary. Our propulsion system uses a nuclear
    fusion–powered turboramjet that consumes very little fuel. It heats the incoming
    atmosphere with the energy from the fusion reaction. The point-mass vehicle equations
    of motion are different from Chapter 9 in that we consider that the moon is round
    and that gravity varies in strength as the vehicle descends. The equations are
    written in cylindrical coordinates:'
  id: totrans-103
  prefs: []
