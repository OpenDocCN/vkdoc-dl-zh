- en: Figure [15.8](#p317) shows the optimal solution. It varies the angle of attack
    near the end. The mean heating rate drops by a third, and the constraints are
    met.
  id: totrans-2031
  prefs: []
  type: TYPE_NORMAL
- en: The solution shows that we should make the time steps even smaller near the
    end.
  id: totrans-2032
