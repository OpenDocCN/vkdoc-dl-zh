  prefs: []
  type: TYPE_NORMAL
- en: '**15.7**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Reinforcement Example**'
  prefs: []
  type: TYPE_NORMAL
- en: '**15.7.1 Problem**'
  prefs: []
  type: TYPE_NORMAL
- en: We want to produce a trajectory to go from a starting point in an orbit to the
    surface.
  prefs: []
  type: TYPE_NORMAL
- en: '**15.7.2 Solution**'
  prefs: []
  type: TYPE_NORMAL
- en: Use reinforcement learning to produce the angle of attack to minimize the mean
    dynamic pressure while reaching zero altitudes at zero velocities.
  prefs: []
  type: TYPE_NORMAL
- en: '**15.7.3 How It Works**'
  prefs: []
  type: TYPE_NORMAL
- en: Figure [15.9](#p318) shows the pattern for reinforcement learning. It is essentially
    a trial and error approach. The reinforcement learning algorithm implements a
    policy that it updates using experimentation. In our problem, the goal is a policy
    of the angle of attack that allows the lander to reach the surface with zero velocity.
    The model is the same as was used in the optimization approach in the previous
    section. As with the optimization approach, no apriori algorithm is used. The
    reinforcement learning algorithm creates its algorithm from multiple attempts.
  prefs: []
  type: TYPE_NORMAL
- en: We will implement a Deep Deterministic Policy Gradient (DDPG) algorithm [21].
    It is a model-free, online, off-policy reinforcement learning method. It works
    with continuous observations and actions. Off-policy agents create a buffer of
    observations and use that to update the policy. A DDPG agent is an actor-critic
    reinforcement learning agent that searches for an optimal policy.
  prefs: []
  type: TYPE_NORMAL
- en: The first step is to make a class to encapsulate the environment. The properties
    are constants.
  prefs: []
  type: TYPE_NORMAL
- en: Calculations are not allowed here. The reward scale is the scaling of the position
    and velocity errors.
  prefs: []
  type: TYPE_NORMAL
