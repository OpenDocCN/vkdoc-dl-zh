- en: '**15.5**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Simulating Level Flight**'
  prefs: []
  type: TYPE_NORMAL
- en: '**15.5.1 Problem**'
  prefs: []
  type: TYPE_NORMAL
- en: We want to fly our aircraft level to the Titan surface.
  prefs: []
  type: TYPE_NORMAL
- en: '**15.5.2 Solution**'
  prefs: []
  type: TYPE_NORMAL
- en: Write a script calling the Simulation2DTitan function with the aircraft at the
    optimal angle of attack and sufficient thrust to maintain level flight.
  prefs: []
  type: TYPE_NORMAL
- en: '**15.5.3 How It Works**'
  prefs: []
  type: TYPE_NORMAL
- en: For level flight, we will operate at the optimal angle of attack, given in Equation
    [15.11](#p301), with enough thrust to overcome drag. The velocity needs to be
    fast enough to generate sufficient lift to balance gravity at the desired altitude.
    Let’s assume that we want to fly at 1 km altitude above the surface of Titan.
    The script LevelFlight.m sets up and runs the simulation. We need equilibrium
    thrust, velocity, and the angle of attack. The easiest way to do this is with
    a search where the cost is the magnitude of the acceleration vector.
  prefs: []
  type: TYPE_NORMAL
- en: We first set up the simulation.
  prefs: []
  type: TYPE_NORMAL
- en: '***LevelFlight.m***'
  prefs: []
  type: TYPE_NORMAL
- en: '1'
  prefs: []
