- en: argmax or using “greedy” sampling. As *t → ∞*, the new distribution approaches
    the uniform distribution, with each possible output getting an equal probability.
    At t=1, you sample from the model according to the probabilities it assigns. In
    our code, we effectively implemented sampling with *t* = 0 (greedy) and *t* =
    1\. However, by explicitly using temperature to adjust the output distribution,
    you can try to find a balance between sampling from the model’s output distribution
    and using random and greedy sampling to get the most realistic sounding music.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
