    contributes to lift and drag. The lift force is normal to the velocity vector,
    and the drag force is along the velocity vector. The unit velocity vector is
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
- en: '*ur*'
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
- en: '*u*'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
- en: '*u* ='
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
- en: '*t*'
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
- en: (15.15)
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
- en: '*u* 2 *r* + *u* 2 *t*'
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
- en: We use the arrow, , to denote a vector, which in MATLAB is a multielement array.
    The drag vector is
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
- en: '*D* = *Du*'
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
- en: (15.16)
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
- en: The lift vector is a 90-degree rotation and is
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
- en: '*L* = *L*'
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
- en: 0 1 *u*
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
- en: '*−* 1 0'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
- en: (15.17)
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
- en: In both cases, the radial component is the top element, and the bottom is the
    tangential component. The thrust vector is
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
- en: '*T* = *T*'
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
- en: sin *α*
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
- en: cos *α*
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
- en: (15.18)
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
- en: We start in a circular orbit. To begin reentry, we increase the angle of attack
    to increase the drag. Remember, we are using a simple aerodynamics model. This
    causes the ramjet to descend.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
- en: We then adjust the angle of attack and thrust to reach our desired landing point.
    In this chapter, we will design one trajectory using optimal control, and then
    we will use reinforcement learning to design a trajectory. Our objective will
    be to reach the Titan surface with zero velocity.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
- en: '**15.3**'
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
- en: '**Modeling the Titan Atmosphere**'
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
- en: '**15.3.1 Problem**'
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
- en: We want to compute the atmospheric density of Titan.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
- en: '**15.3.2 Solution**'
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
- en: Use a database of Titan densities and altitudes and interpolate.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
- en: '**15.3.3 How It Works**'
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
- en: The function TitanAtmosphere computes the Titan atmospheric density and temperature.
  id: totrans-247
  prefs: []
