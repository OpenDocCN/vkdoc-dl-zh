  id: totrans-997
  prefs: []
  type: TYPE_NORMAL
- en: r
  id: totrans-998
  prefs: []
  type: TYPE_NORMAL
- en: = d.rPlanet + altitude;
  id: totrans-999
  prefs: []
  type: TYPE_NORMAL
- en: '21'
  id: totrans-1000
  prefs: []
  type: TYPE_NORMAL
- en: '22'
