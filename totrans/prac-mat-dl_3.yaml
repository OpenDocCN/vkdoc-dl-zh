- en: GENERATIVE MODELING OF MUSIC
  prefs: []
  type: TYPE_NORMAL
- en: relevant features from raw audio. We can then use one of the previously described
    sequence models, like an LSTM, to predict future musical events. This technique
    is a simplification of what the authors of Jukebox did [9].
  prefs: []
  type: TYPE_NORMAL
- en: Hopefully, this chapter gave you some foundational understanding of ML-based
    generative modeling, especially as it applies to music. There is certainly room
    for exploration, and we hope that this last section has given you a taste of what
    is possible in this exciting area.
  prefs: []
