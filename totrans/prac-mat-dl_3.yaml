- en: CHAPTER 15
  prefs: []
  type: TYPE_NORMAL
- en: REINFORCEMENT LEARNING
  prefs: []
  type: TYPE_NORMAL
- en: 'As you can see, the process is quite numerically intensive since we are integrating
    the equations of motion twice. The script to do the optimization is shown in the
    following code:'
  prefs: []
  type: TYPE_NORMAL
- en: '***OptimalTitanLanding.m***'
  prefs: []
  type: TYPE_NORMAL
- en: '1'
  prefs: []
  type: TYPE_NORMAL
- en: '%% Optimal Titan Landing'
  prefs: []
  type: TYPE_NORMAL
- en: '2'
  prefs: []
  type: TYPE_NORMAL
- en: '3'
  prefs: []
  type: TYPE_NORMAL
- en: rTitan
  prefs: []
  type: TYPE_NORMAL
- en: = 2575;
  prefs: []
  type: TYPE_NORMAL
- en: '4'
  prefs: []
  type: TYPE_NORMAL
- en: mu
  prefs: []
  type: TYPE_NORMAL
- en: = 9.142117352579678e+03;
  prefs: []
  type: TYPE_NORMAL
- en: '5'
  prefs: []
  type: TYPE_NORMAL
- en: h
  prefs: []
  type: TYPE_NORMAL
- en: = 100;
  prefs: []
  type: TYPE_NORMAL
- en: '6'
  prefs: []
  type: TYPE_NORMAL
- en: dT
  prefs: []
  type: TYPE_NORMAL
- en: = 1;
  prefs: []
  type: TYPE_NORMAL
- en: '7'
  prefs: []
  type: TYPE_NORMAL
- en: n
  prefs: []
  type: TYPE_NORMAL
- en: = 50;
  prefs: []
  type: TYPE_NORMAL
- en: '8'
  prefs: []
  type: TYPE_NORMAL
- en: '9'
  prefs: []
  type: TYPE_NORMAL
- en: d
  prefs: []
  type: TYPE_NORMAL
- en: = RHS2DTitan; % The data structure
  prefs: []
  type: TYPE_NORMAL
- en: '10'
  prefs: []
  type: TYPE_NORMAL
- en: d.n
  prefs: []
  type: TYPE_NORMAL
- en: = n; % Number of decision variable increments
  prefs: []
  type: TYPE_NORMAL
- en: '11'
  prefs: []
  type: TYPE_NORMAL
- en: d.tEnd
  prefs: []
  type: TYPE_NORMAL
- en: = 20*60; % From the Landing script
  prefs: []
  type: TYPE_NORMAL
- en: '12'
  prefs: []
  type: TYPE_NORMAL
- en: d.t
  prefs: []
  type: TYPE_NORMAL
- en: = NonuniformSequence(d.tEnd,d.n,@ExponentialDT);
  prefs: []
  type: TYPE_NORMAL
- en: '13'
  prefs: []
  type: TYPE_NORMAL
- en: d.costType
  prefs: []
  type: TYPE_NORMAL
- en: = 'heating rate';
  prefs: []
  type: TYPE_NORMAL
- en: '14'
  prefs: []
  type: TYPE_NORMAL
- en: '15'
  prefs: []
  type: TYPE_NORMAL
- en: '% Initial state'
  prefs: []
  type: TYPE_NORMAL
- en: '16'
  prefs: []
  type: TYPE_NORMAL
- en: r
  prefs: []
  type: TYPE_NORMAL
- en: = rTitan + h;
  prefs: []
  type: TYPE_NORMAL
- en: '17'
  prefs: []
  type: TYPE_NORMAL
- en: x
  prefs: []
  type: TYPE_NORMAL
- en: = [r;0; **sqrt**(mu/r)];
  prefs: []
  type: TYPE_NORMAL
- en: '18'
  prefs: []
  type: TYPE_NORMAL
- en: d.x
  prefs: []
  type: TYPE_NORMAL
- en: = x;
  prefs: []
  type: TYPE_NORMAL
- en: '19'
  prefs: []
  type: TYPE_NORMAL
- en: '20'
  prefs: []
  type: TYPE_NORMAL
- en: '% fmincon options'
  prefs: []
  type: TYPE_NORMAL
- en: '21'
  prefs: []
  type: TYPE_NORMAL
- en: opts
  prefs: []
  type: TYPE_NORMAL
- en: = optimset( 'Display','iter-detailed',...
  prefs: []
  type: TYPE_NORMAL
- en: '22'
  prefs: []
  type: TYPE_NORMAL
- en: '''TolFun'',1e-4,...'
  prefs: []
  type: TYPE_NORMAL
- en: '23'
  prefs: []
  type: TYPE_NORMAL
- en: '''algorithm'',''interior-point'',...'
  prefs: []
  type: TYPE_NORMAL
- en: '24'
  prefs: []
  type: TYPE_NORMAL
- en: '''TolCon'',1e-4,...'
  prefs: []
  type: TYPE_NORMAL
- en: '25'
  prefs: []
  type: TYPE_NORMAL
- en: '''MaxFunEvals'',15000);'
  prefs: []
  type: TYPE_NORMAL
- en: '26'
  prefs: []
  type: TYPE_NORMAL
- en: '27'
  prefs: []
  type: TYPE_NORMAL
- en: '% The cost is the time to reach the final state vector'
  prefs: []
  type: TYPE_NORMAL
- en: '28'
  prefs: []
  type: TYPE_NORMAL
- en: costFun
  prefs: []
  type: TYPE_NORMAL
- en: = @(x) TitanLandingCost2D(x,d);
  prefs: []
  type: TYPE_NORMAL
- en: '29'
  prefs: []
  type: TYPE_NORMAL
- en: '30'
  prefs: []
  type: TYPE_NORMAL
- en: '% The numerical integration of the state is in the constraint function 31'
  prefs: []
  type: TYPE_NORMAL
- en: constFun
  prefs: []
  type: TYPE_NORMAL
- en: = @(x) TitanLandingConst2D(x,d);
  prefs: []
  type: TYPE_NORMAL
- en: '32'
  prefs: []
  type: TYPE_NORMAL
- en: '33'
  prefs: []
  type: TYPE_NORMAL
- en: '% The decision variables are angle of attack and thrust'
  prefs: []
  type: TYPE_NORMAL
- en: '34'
  prefs: []
  type: TYPE_NORMAL
- en: u0
  prefs: []
  type: TYPE_NORMAL
- en: = 0.0001***ones**(2,n);
  prefs: []
  type: TYPE_NORMAL
- en: '35'
  prefs: []
  type: TYPE_NORMAL
- en: '36'
  prefs: []
  type: TYPE_NORMAL
- en: '% Lower and upper bounds for the decision variables'
  prefs: []
  type: TYPE_NORMAL
- en: '37'
  prefs: []
  type: TYPE_NORMAL
- en: oN
  prefs: []
  type: TYPE_NORMAL
- en: = **ones**(n,1);
  prefs: []
  type: TYPE_NORMAL
- en: '38'
  prefs: []
  type: TYPE_NORMAL
- en: lB
  prefs: []
  type: TYPE_NORMAL
- en: = **zeros**(2,n);
  prefs: []
  type: TYPE_NORMAL
- en: '39'
  prefs: []
  type: TYPE_NORMAL
- en: uB
  prefs: []
  type: TYPE_NORMAL
- en: = [ (**pi**/12)*oN ;400*oN ];
  prefs: []
  type: TYPE_NORMAL
- en: '40'
  prefs: []
  type: TYPE_NORMAL
- en: '41'
  prefs: []
  type: TYPE_NORMAL
- en: '% Find the optimal decision variable'
  prefs: []
  type: TYPE_NORMAL
- en: '42'
  prefs: []
  type: TYPE_NORMAL
- en: u
  prefs: []
  type: TYPE_NORMAL
- en: = fmincon(costFun,u0,[],[],[],[],lB,uB,constFun,opts);
  prefs: []
  type: TYPE_NORMAL
- en: '43'
  prefs: []
  type: TYPE_NORMAL
- en: '44'
  prefs: []
  type: TYPE_NORMAL
- en: '%% Run the simulation'
  prefs: []
  type: TYPE_NORMAL
- en: '45'
  prefs: []
  type: TYPE_NORMAL
- en: x
  prefs: []
  type: TYPE_NORMAL
- en: = [r;0; **sqrt**(mu/r)];
  prefs: []
  type: TYPE_NORMAL
- en: '46'
  prefs: []
  type: TYPE_NORMAL
- en: '[˜,xP,t]'
  prefs: []
  type: TYPE_NORMAL
- en: = Simulation2DTitan( x, d.t, d, u );
  prefs: []
  type: TYPE_NORMAL
- en: '47'
  prefs: []
  type: TYPE_NORMAL
- en: '[t,tL]'
  prefs: []
  type: TYPE_NORMAL
- en: = TimeLabel(t);
  prefs: []
  type: TYPE_NORMAL
