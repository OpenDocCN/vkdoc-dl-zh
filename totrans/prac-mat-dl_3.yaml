- en: CHAPTER 14
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 第14章
- en: GENERATIVE MODELING OF MUSIC
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 音乐的生成建模
- en: are ignored. Wavenet is an example of a model that uses TCN-like characteristics
    for music generation [28].
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 被忽略。Wavenet是使用类似TCN特性的音乐生成模型的一个例子[28]。
- en: Transformers use attention as their fundamental building block. The mechanism
    of attention is beyond the scope of this text, but you can think of it as a method
    for pairwise comparison.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 变压器使用注意力机制作为其基本构建块。注意力的机制超出了本文的范围，但你可以将其视为一种成对比较的方法。
- en: Though transformers are most often used in language modeling and language comprehension
    tasks, there is no reason they cannot be used for generative music modeling [16].
    As was the case with the GRU, the ability to train TCNs and transformers much
    more efficiently can make it more feasible to train larger more expressive versions
    of these models on larger datasets. In addition, by giving the model the entire
    input on which it is to make predictions, the model is able to access whatever
    past inputs are relevant for the predictions at each time step and combine information
    across multiple time scales into complex hierarchical representations. Recurrent
    models, like LSTMs, on the other hand, only have access to what they decided was
    worth remembering at some past time step, and so the important information for
    the current prediction may have been forgotten. That being said, models like TCNs
    and transformers suffer from the need to define a fixed input size, which limits
    their ability to operate on past inputs, whereas in theory, an LSTM could use
    information from its very first input for any future predictions.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管变压器最常用于语言建模和语言理解任务，但它们没有理由不能用于生成音乐建模[16]。与GRU的情况一样，TCNs和变压器的训练效率更高，这使得在更大的数据集上训练更大、更具表现力的模型版本变得更加可行。此外，通过给模型提供它将做出预测的整个输入，模型能够访问每个时间步预测相关的任何过去输入，并将跨多个时间尺度的信息组合成复杂的层次表示。另一方面，循环模型，如LSTMs，只能访问它们在某个过去时间步决定值得记住的信息，因此对于当前预测的重要信息可能已经被遗忘。尽管如此，像TCNs和变压器这样的模型需要定义一个固定的输入大小，这限制了它们在处理过去输入时的能力，而理论上，LSTM可以使用其第一个输入的信息进行任何未来的预测。
- en: Finally, we would like to briefly discuss variational autoencoders (VAEs). These
    models are too complex to be covered in depth, but the general idea is that like
    a traditional autoencoder, they map a higher dimensional input to a lower dimensional
    latent space and back to the higher dimensional input space. Effectively, a VAE
    learns which features in an input signal are truly necessary to reconstruct the
    input. What distinguishes the VAE from a traditional autoencoder is that its latent
    space is parameterized by a multivariate Gaussian distribution. In other words,
    the VAE approximates the data generating distribution as a multivariate Gaussian,
    and by sampling from this distribution, new data points can be generated.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们想简要讨论变分自编码器（VAEs）。这些模型过于复杂，无法深入探讨，但总体来说，它们就像传统的自编码器一样，将高维输入映射到低维潜在空间，然后再映射回高维输入空间。实际上，VAE学习输入信号中哪些特征对于重建输入是真正必要的。VAE与传统自编码器区别在于其潜在空间由多元高斯分布参数化。换句话说，VAE将数据生成分布近似为多元高斯分布，并通过从这个分布中采样，可以生成新的数据点。
- en: When trained properly, the latent space is considered to be “structured,” a
    property that can prove advantageous for generative modeling. This structure corresponds
    to the mapping of inputs that are more similar to points that are closer together
    in the latent space and can lead to the presence of “feature axes,” or lines that
    correspond to the variations in a particular feature. This is more clearly illustrated
    with our face example from Sections [14.1](index_split_006.html#p279) and [14.2,](index_split_006.html#p279)
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 当训练得当，潜在空间被认为是“结构化的”，这一特性对于生成建模可能是有益的。这种结构对应于输入映射，即更接近潜在空间中彼此靠近的点，这可能导致“特征轴”的存在，或与特定特征的变异相对应的线条。这一点可以通过我们来自第[14.1](index_split_006.html#p279)和[14.2](index_split_006.html#p279)节的脸部示例更清楚地说明。
- en: so we will first consider a VAE trained to model the distribution of human faces.
    The human face has a number of distinctive features, including lips, eyes, the
    relative positions of these and other features, and so on. As a simple example,
    the shape of the lips might constitute a feature axis. Say you locate this axis,
    take a point on it, and decode it through the VAE
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们首先考虑一个用于建模人类面部分布的VAE（变分自编码器）。人类面部有许多独特的特征，包括嘴唇、眼睛，以及这些和其他特征的相对位置等。作为一个简单的例子，嘴唇的形状可能构成一个特征轴。假设你定位了这个轴，取其上的一个点，并通过VAE进行解码
- en: decoder. The output is a face with a neutral lip shape. You move to one side
    of this point on the feature axis, select a new point, and decode it, revealing
    a smiling face. You take a step further in this direction, and the smile is almost
    comically large. Now you decide to take a couple steps past your original point
    in the opposite direction and find that the decoded face is frowning. A key piece
    of information to take note of is that in an ideally structured latent space,
    the only part of the image that should change while you traverse the lip shape
    axis is the shape of the lips. In other words, the different feature axes should
    be orthogonal in the latent space, such that the features they describe are independent.
    In simpler terms, you should be able to change one feature without changing another.
    This is an extremely advantageous property in 285
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 解码器。输出是一个具有中性唇形的面部。你移动到特征轴上的这个点的另一侧，选择一个新的点，并对其进行解码，揭示出一个微笑的面部。你在这个方向上再进一步，微笑几乎变得滑稽地大。现在你决定在原始点的相反方向上走几步，发现解码的面部正在皱眉。需要注意的是，在一个理想结构的潜在空间中，当你穿越唇形轴时，唯一应该改变的是嘴唇的形状。换句话说，不同的特征轴在潜在空间中应该是正交的，这样它们所描述的特征是独立的。用更简单的话说，你应该能够在不改变另一个特征的情况下改变一个特征。这是285中的一个极其有利的特性。
- en: '![](index-296_1.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![图片](index-296_1.png)'
- en: '![](index-296_2.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![图片](index-296_2.png)'
- en: '![](index-296_3.jpg)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![图片](index-296_3.jpg)'
- en: CHAPTER 14
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 第14章
- en: GENERATIVE MODELING OF MUSIC
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 音乐的生成建模
- en: generative modeling as it gives you substantial control over what you are generating.
    Once you identify a set of feature axes by encoding faces that differ in specific
    ways and comparing their latent representations, you can take a given face and
    perturb it in any number of ways, without resulting in unwanted changes. We give
    some intuition for a 2D latent space in Figure [14.7\.](#p296) We also should
    note that to be able to map *N* features to orthogonal feature axes in the latent
    space, we will need, at a minimum, an *N* -dimensional latent space.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 生成建模因为它给了你对你所生成内容的实质性控制。一旦你通过编码具有特定差异的面部并比较它们的潜在表示来识别一组特征轴，你就可以以任何数量方式扰动给定的面部，而不会导致不希望的变化。我们在图[14.7](#p296)中给出了一些关于二维潜在空间的直观理解。我们还应该注意，为了能够在潜在空间中将*N*个特征映射到正交的特征轴上，我们至少需要一个*N*维的潜在空间。
- en: Returning to our musical example, should we train a VAE to map a set of musical
    pieces to a latent space, we might find feature axes for the mood of the piece
    or its style. We could potentially take a piece by Mozart, encode it, and then
    slide the encoded point along its style axis to make it sound like jazz or a modern
    pop song. As another example, we might be able to take a melancholy piece and
    give it a cheerful spin by moving our latent point along the mood axis.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 回到我们的音乐例子，如果我们训练一个VAE将一组音乐作品映射到潜在空间，我们可能会找到作品情绪或其风格的特征轴。我们可能取莫扎特的作品，对其进行编码，然后沿着其风格轴滑动编码点，使其听起来像爵士乐或现代流行歌曲。作为另一个例子，我们可能能够通过沿着情绪轴移动我们的潜在点，将忧郁的作品变得欢快。
- en: '**Figure 14.7:** *Here, we see a well-structured two-dimensional latent space
    for faces. The two features* *pictured are eye color and lip shape. Moving along
    the lip shape axis from left to right corresponds* *to changing the lip shape
    from a frown to neutral to a smile. Traversing the eye color axis from top to*
    *bottom corresponds to transitioning from orange eyes to blue eyes and then green
    eyes. The features are* *on orthogonal axes so that changing one does not change
    the other. By moving along both axes, we can* *generate faces that combine the
    features. For example, when we move from the center face up and right,* *we move
    to a face with orange eyes and a smile. Note that in reality, the faces themselves
    do not exist* *in the latent space. The trained encoder and decoder assign meaning
    to the 2D latent points by creating* *mappings between them and the faces in the
    input space.*'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: '286'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: '![](index-297_1.png)'
  id: totrans-66
