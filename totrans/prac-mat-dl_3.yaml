- en: PlotSet(t,xP,'x label',tL,'y label',d.states,'figure title','Reentry') We start
    in a circular orbit and set the angle of attack to zero and zero thrust. We hit
    the ground within 15 minutes with a high vertical velocity and some tangential
    velocity. Figure [15.6](#p312)
  prefs: []
  type: TYPE_NORMAL
- en: shows the trajectory. It shows that a good initial guess is zero angle of attack,
    and 15-minute duration.
  prefs: []
  type: TYPE_NORMAL
- en: Optimization using fmincon requires a constraint function and a cost function.
    The cost will be the mean dynamic pressure given in Equation [15.20\.](#p311)
    The constraint will be the landing condition. Both require that we simulate start
    until ground contact. We don’t care when ground contact occurs. We break up time
    into segments of equal length.
  prefs: []
  type: TYPE_NORMAL
- en: The controls will be piecewise continuous along the trajectory. The number of
    segments will impact the accuracy of the solution and the speed of the solution.
    More segments mean higher accuracy but can slow convergence.
