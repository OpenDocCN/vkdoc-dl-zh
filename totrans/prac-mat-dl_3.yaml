- en: CHAPTER 15
  prefs: []
  type: TYPE_NORMAL
- en: REINFORCEMENT LEARNING
  prefs: []
  type: TYPE_NORMAL
- en: We use a very simple aerodynamic model. The lift coefficient *cL* is defined
    as *cL* = *cL α*
  prefs: []
  type: TYPE_NORMAL
- en: '*α*'
  prefs: []
  type: TYPE_NORMAL
- en: (15.6)
  prefs: []
  type: TYPE_NORMAL
- en: The lift coefficient is in reality a nonlinear function of the angle of attack
    *α*. It has a maximum angle of attack above which the wing stalls and all lift
    is lost. This coefficient will also vary with flight speed. For our simple model,
    we will assume a flat plate with *cL* = 2 *π*
  prefs: []
  type: TYPE_NORMAL
- en: '*α*'
  prefs: []
  type: TYPE_NORMAL
- en: . The drag
  prefs: []
  type: TYPE_NORMAL
- en: coefficient is
  prefs: []
  type: TYPE_NORMAL
- en: '*cD* = *cD* + *kc* 2'
  prefs: []
  type: TYPE_NORMAL
- en: '0'
  prefs: []
  type: TYPE_NORMAL
- en: '*L*'
  prefs: []
  type: TYPE_NORMAL
- en: (15.7)
  prefs: []
  type: TYPE_NORMAL
- en: where *k* is
  prefs: []
  type: TYPE_NORMAL
- en: '1'
  prefs: []
  type: TYPE_NORMAL
- en: '*k* = *πAR*'
  prefs: []
  type: TYPE_NORMAL
- en: (15.8)
  prefs: []
  type: TYPE_NORMAL
- en: '*AR* is the aspect ratio and is the Oswald efficiency factor which is typically
    from 0.8 to 0.95\.'
  prefs: []
  type: TYPE_NORMAL
- en: The efficiency factor is how efficiently lift is coupled to drag. The aspect
    ratio is the ratio of the wingspan (from the point nearest the fuselage to the
    tip) and the chord (the length from the front to the back of the wing). This equation
    is known as the drag polar. When there is no lift, the drag coefficient is *cD*
    0\. *cD* varies as the square of the lift coefficient. For hypersonic flow, above
    Mach 4, the following model, based on Newtonian Impact Theory, is *L* = *ρSV*
    2 sin2 *α* cos *α*
  prefs: []
  type: TYPE_NORMAL
- en: (15.9)
  prefs: []
  type: TYPE_NORMAL
- en: 0 *.* 075
  prefs: []
  type: TYPE_NORMAL
- en: '*D* = *ρSV* 2 sin3 *α* +'
  prefs: []
  type: TYPE_NORMAL
- en: '*√*'
  prefs: []
  type: TYPE_NORMAL
- en: + *CD*
  prefs: []
  type: TYPE_NORMAL
- en: '*R* 1 */* 5'
  prefs: []
  type: TYPE_NORMAL
- en: '*π*'
  prefs: []
  type: TYPE_NORMAL
- en: '*E*'
  prefs: []
  type: TYPE_NORMAL
- en: '*M*'
  prefs: []
  type: TYPE_NORMAL
- en: where *CDπ* is approximately 0.001\. This would need to be meshed with the previous
    model for when the Mach number drops below four. For the purpose of this chapter,
    we will stick to the low-speed model. The lift-to-drag ratio is
  prefs: []
  type: TYPE_NORMAL
- en: '*cL*'
  prefs: []
  type: TYPE_NORMAL
- en: (15.10)
  prefs: []
  type: TYPE_NORMAL
- en: '*cD* + *kc* 2'
  prefs: []
  type: TYPE_NORMAL
- en: '0'
  prefs: []
  type: TYPE_NORMAL
- en: '*L*'
  prefs: []
  type: TYPE_NORMAL
- en: which is a maximum when
  prefs: []
  type: TYPE_NORMAL
- en: '*c*'
  prefs: []
  type: TYPE_NORMAL
- en: '*c*'
  prefs: []
  type: TYPE_NORMAL
- en: '*D* 0'
  prefs: []
  type: TYPE_NORMAL
- en: '*L* ='
  prefs: []
  type: TYPE_NORMAL
- en: '*k*'
  prefs: []
  type: TYPE_NORMAL
- en: (15.11)
  prefs: []
  type: TYPE_NORMAL
- en: This is the lift coefficient at which we would like to operate in steady flight
    since it’s where we get the most lift for the least drag.
  prefs: []
  type: TYPE_NORMAL
- en: The dynamic pressure, the pressure due to the motion of the aircraft, is 1
  prefs: []
  type: TYPE_NORMAL
- en: '*q* = *ρ*( *u* 2'
  prefs: []
  type: TYPE_NORMAL
- en: '2'
  prefs: []
  type: TYPE_NORMAL
- en: '*r* + *u* 2 *t*)'
  prefs: []
  type: TYPE_NORMAL
- en: (15.12)
  prefs: []
  type: TYPE_NORMAL
- en: where
  prefs: []
  type: TYPE_NORMAL
- en: '*u* 2 *r* + *u* 2 *t* is the speed and *ρ* is the atmospheric density. The
    magnitudes of lift and drag are'
  prefs: []
  type: TYPE_NORMAL
- en: '*L* = *qcLs*'
  prefs: []
  type: TYPE_NORMAL
- en: (15.13)
  prefs: []
  type: TYPE_NORMAL
- en: '*D* = *qcDs*'
  prefs: []
  type: TYPE_NORMAL
- en: (15.14)
  prefs: []
  type: TYPE_NORMAL
- en: '291'
  prefs: []
  type: TYPE_NORMAL
- en: '![](index-302_1.png)'
  prefs: []
  type: TYPE_IMG
- en: '![](index-302_2.png)'
  prefs: []
