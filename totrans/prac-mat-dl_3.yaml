- en: '**14.6**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Alternative Methods**'
  prefs: []
  type: TYPE_NORMAL
- en: The LSTM that we have constructed can definitely act as a generative model of
    music as we can sample from its output distribution to produce new, reasonably
    convincing series of musical events. That being said, it can definitely be improved.
    One way to improve the model’s output without changing the model itself is to
    add a temperature parameter to the sampling procedure
  prefs: []
  type: TYPE_NORMAL
- en: '[40]. To do this, we pass the probabilities the model assigns to each potential
    output through what’s called the “freezing function” as seen in Equation [14.1](#p294).
    In Table [14.1,](index_split_006.html#p293) you can see how different temperatures
    affect a simple probability distribution, but overall, as *t →* 0, the probabilities
    become more skewed, with the maximum probability approaching 1 and the others
    approaching 0\. When you sample from this new distribution, you are effectively
    taking the **Figure 14.6:** *Three versions of the same chorale (tenth in our
    training set). The top two are generated* *by our model. The bottom one is the
    true version of the song. The red line indicates where the model* *started generating.
    The top one was generated by sampling from the model’s output distribution. The*
    *middle one shows what happens when we sample greedily from this distribution
    (only taking the highest* *probability note and duration combination). Not only
    does the sampled version look better, but it sounds* *much more likely to have
    come from the true piece.*'
  prefs: []
  type: TYPE_NORMAL
