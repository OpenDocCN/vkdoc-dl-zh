  type: TYPE_NORMAL
- en: REINFORCEMENT LEARNING
  prefs: []
  type: TYPE_NORMAL
- en: The constraint function is shown in the following code. It integrates the equations
    of motion until the vehicle hits the ground. Both functions use Simulation2DTitan.
  prefs: []
  type: TYPE_NORMAL
- en: '***TitanLandingConst2D.m***'
  prefs: []
  type: TYPE_NORMAL
- en: '16'
  prefs: []
  type: TYPE_NORMAL
- en: '**function** [cIn, cEq] = TitanLandingConst2D( u, d )'
  prefs: []
  type: TYPE_NORMAL
- en: '17'
  prefs: []
  type: TYPE_NORMAL
- en: '18'
  prefs: []
  type: TYPE_NORMAL
- en: rTitan
  prefs: []
  type: TYPE_NORMAL
- en: = 2575;
  prefs: []
  type: TYPE_NORMAL
- en: '19'
  prefs: []
  type: TYPE_NORMAL
- en: '[˜,xP]'
  prefs: []
  type: TYPE_NORMAL
- en: = Simulation2DTitan( d.x, d.t, d, u );
  prefs: []
  type: TYPE_NORMAL
- en: '20'
  prefs: []
  type: TYPE_NORMAL
- en: '21'
  prefs: []
  type: TYPE_NORMAL
- en: '% We don''t have any nonlinear inequality contraints'
  prefs: []
  type: TYPE_NORMAL
- en: '22'
  prefs: []
  type: TYPE_NORMAL
- en: cIn = [];
  prefs: []
  type: TYPE_NORMAL
- en: '23'
  prefs: []
  type: TYPE_NORMAL
- en: '24'
  prefs: []
  type: TYPE_NORMAL
- en: '% Equality constraint'
  prefs: []
  type: TYPE_NORMAL
- en: '25'
  prefs: []
  type: TYPE_NORMAL
- en: cEq = [xP(1, **end**)-rTitan;xP(2:3, **end**)];
  prefs: []
  type: TYPE_NORMAL
- en: 'One of three costs can be selected: mean stagnation temperature, mean dynamic
    pressure, and mean heating rate. They are computed by integrating the equations
    of motion over the trajectory.'
  prefs: []
  type: TYPE_NORMAL
- en: '***TitanLandingCost2D.m***'
  prefs: []
  type: TYPE_NORMAL
- en: '14'
  prefs: []
  type: TYPE_NORMAL
- en: '**function** cost = TitanLandingCost2D( u, d )'
  prefs: []
  type: TYPE_NORMAL
- en: '15'
  prefs: []
  type: TYPE_NORMAL
- en: '16'
  prefs: []
  type: TYPE_NORMAL
- en: '[˜,xP]'
  prefs: []
  type: TYPE_NORMAL
- en: = Simulation2DTitan( d.x, d.t, d, u );
  prefs: []
  type: TYPE_NORMAL
- en: '17'
  prefs: []
  type: TYPE_NORMAL
- en: cost
  prefs: []
  type: TYPE_NORMAL
- en: = CostCalculation( xP, d.costType );
  prefs: []
  type: TYPE_NORMAL
- en: '18'
  prefs: []
  type: TYPE_NORMAL
- en: '19'
  prefs: []
  type: TYPE_NORMAL
- en: '%% Dynamic pressure'
  prefs: []
  type: TYPE_NORMAL
- en: '20'
  prefs: []
  type: TYPE_NORMAL
- en: '**function** cost = CostCalculation( x, **type** )'
  prefs: []
  type: TYPE_NORMAL
- en: '21'
  prefs: []
  type: TYPE_NORMAL
- en: '22'
  prefs: []
  type: TYPE_NORMAL
- en: h
  prefs: []
  type: TYPE_NORMAL
- en: = x(1,:)- 2575; % Altitude (km)
  prefs: []
  type: TYPE_NORMAL
- en: '23'
  prefs: []
  type: TYPE_NORMAL
- en: j
  prefs: []
  type: TYPE_NORMAL
- en: = h<0;
  prefs: []
  type: TYPE_NORMAL
- en: '24'
  prefs: []
  type: TYPE_NORMAL
- en: h(j)
  prefs: []
  type: TYPE_NORMAL
- en: = 0;
  prefs: []
  type: TYPE_NORMAL
- en: '25'
  prefs: []
  type: TYPE_NORMAL
- en: '[rho, t, a] = TitanAtmosphere(h);'
  prefs: []
  type: TYPE_NORMAL
- en: '26'
  prefs: []
  type: TYPE_NORMAL
- en: v
  prefs: []
  type: TYPE_NORMAL
- en: = 1e3***sqrt**(x(2,:).ˆ2 + x(3,:).ˆ2); % m/s
  prefs: []
  type: TYPE_NORMAL
- en: '27'
  prefs: []
  type: TYPE_NORMAL
- en: '28'
  prefs: []
  type: TYPE_NORMAL
- en: switch **type**
  prefs: []
  type: TYPE_NORMAL
- en: '29'
  prefs: []
  type: TYPE_NORMAL
- en: case 'stagnation temperature'
  prefs: []
  type: TYPE_NORMAL
- en: '30'
  prefs: []
  type: TYPE_NORMAL
- en: '**gamma**'
  prefs: []
  type: TYPE_NORMAL
- en: = 1.4;
  prefs: []
  type: TYPE_NORMAL
- en: '31'
  prefs: []
  type: TYPE_NORMAL
- en: m
  prefs: []
  type: TYPE_NORMAL
- en: = v./a;
  prefs: []
  type: TYPE_NORMAL
- en: '32'
  prefs: []
  type: TYPE_NORMAL
- en: r
  prefs: []
  type: TYPE_NORMAL
- en: = 0.88;
  prefs: []
  type: TYPE_NORMAL
- en: '33'
  prefs: []
  type: TYPE_NORMAL
- en: t0
  prefs: []
  type: TYPE_NORMAL
- en: = t.*(1 + 0.5*r*(**gamma** - 1).*m.ˆ2);
  prefs: []
  type: TYPE_NORMAL
- en: '34'
  prefs: []
  type: TYPE_NORMAL
- en: cost
  prefs: []
  type: TYPE_NORMAL
- en: = **mean**(t0);
  prefs: []
  type: TYPE_NORMAL
- en: '35'
  prefs: []
  type: TYPE_NORMAL
- en: case 'heating rate' % p 238 Wiesel
  prefs: []
  type: TYPE_NORMAL
- en: '36'
  prefs: []
  type: TYPE_NORMAL
- en: cost
  prefs: []
  type: TYPE_NORMAL
- en: = **mean**(**sqrt**(rho).*v.ˆ3);
  prefs: []
  type: TYPE_NORMAL
- en: '37'
  prefs: []
  type: TYPE_NORMAL
- en: case 'dynamic pressure'
  prefs: []
  type: TYPE_NORMAL
- en: '38'
  prefs: []
  type: TYPE_NORMAL
- en: q
  prefs: []
  type: TYPE_NORMAL
- en: = 0.5*rho.*v.ˆ2;
  prefs: []
  type: TYPE_NORMAL
- en: '39'
  prefs: []
  type: TYPE_NORMAL
- en: cost
  prefs: []
  type: TYPE_NORMAL
- en: = **mean**(q);
  prefs: []
  type: TYPE_NORMAL
- en: '40'
  prefs: []
  type: TYPE_NORMAL
- en: otherwise
  prefs: []
  type: TYPE_NORMAL
- en: '41'
  prefs: []
  type: TYPE_NORMAL
- en: '**error**(''%s not available'', **type**);'
  prefs: []
  type: TYPE_NORMAL
- en: '42'
  prefs: []
  type: TYPE_NORMAL
- en: '**end**'
  prefs: []
  type: TYPE_NORMAL
