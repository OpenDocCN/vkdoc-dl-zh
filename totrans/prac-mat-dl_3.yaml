    line.
  prefs: []
  type: TYPE_NORMAL
- en: The first column is the number of iterations. f(x) is the cost, in this case,
    the heating rate.
  prefs: []
  type: TYPE_NORMAL
- en: The second column is the total function count. The fourth column, Feasibility,
    is how well it is matching the landing constraint of zero altitude and velocities.
    Ideally, it is zero when the constraint is matched. The first-order optimality
    is how close the solution is to the optimal solution. The norm step size is the
    norm (essentially magnitude) of the control step it is taking.
