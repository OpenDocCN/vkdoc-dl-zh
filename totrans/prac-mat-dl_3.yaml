- en: Another problem with our model is that greedy sampling results in a completely
    unrealistic piece of generated music. It seems that the model assigns highest
    probability to what it considers to be a “safe” choice of replicating the same
    pitch and duration. This tells us that the model is not learning how to generate
    music as well as we would hope. There are various ways that you could try to improve
    this, including using a larger dataset and training for longer with more computational
    resources. You could also change the model hyperparameters like the number of
    layers or the size of the LSTM hidden states or the training hyperparameters like
    the learning rate.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 我们模型另一个问题是贪婪采样导致生成的音乐完全不符合现实。似乎模型将最高概率分配给它认为的“安全”选择，即复制相同的音调和持续时间。这告诉我们模型并没有像我们希望的那样学习如何生成音乐。你可以尝试各种方法来改进这一点，包括使用更大的数据集，并使用更多的计算资源进行更长时间的训练。你也可以改变模型超参数，如层数或LSTM隐藏状态的大小，或者改变训练超参数，如学习率。
- en: In addition to improving the LSTM, you could try to obtain better performance
    on this task by implementing some alternative ML models. There are several models
    that could be swapped in for the LSTM easily. These include vanilla RNNs and gated
    recurrent unit (GRU) RNNs, which can be seen in Figure [14.2](index_split_006.html#p283).
    LSTM and GRU models are considered to be superior to vanilla RNNs. Both LSTMs
    and GRUs use gating to control what information is utilized and stored by the
    network; however, GRUs are slightly simpler, allowing them to be trained more
    efficiently with comparable performance. As can be seen in Figure [14.2](index_split_006.html#p283),
    one source of this simplicity is combining the hidden and cell states of the LSTM
    into one hidden state in the GRU. This increase in training efficiency may make
    a GRU an improvement as it could allow us to reap the benefits of using a larger
    model (larger models can identify more nuanced patterns) or training on more data
    (more examples to discover patterns from) with a relatively small increase in
    training time.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 除了改进LSTM，你还可以尝试通过实现一些替代的机器学习模型来提高这个任务的表现。有几个模型可以轻松替换LSTM。这些包括简单的RNN和门控循环单元（GRU）RNN，如图[14.2](index_split_006.html#p283)所示。LSTM和GRU模型被认为优于简单的RNN。LSTMs和GRUs都使用门控来控制网络利用和存储的信息；然而，GRUs稍微简单一些，这使得它们可以以相似的性能更有效地训练。如图[14.2](index_split_006.html#p283)所示，这种简单性的一个来源是将LSTM的隐藏状态和细胞状态合并为GRU中的一个隐藏状态。这种训练效率的提高可能使得GRU成为一个改进，因为它可能允许我们以相对较小的训练时间增加来获得使用更大模型（更大的模型可以识别更细微的模式）或更多数据（更多例子来发现模式）的好处。
- en: Other models used for time series modeling, but which may require more work
    to implement, include temporal convolutional neural networks (TCNs) and transformers.
    Unlike recurrent models, these models do not require computations on previous
    inputs to be completed before moving to future inputs. Instead, they are given
    all the inputs within a given input size, also known as context length, at once
    and generate predictions for each time point in the input in parallel. This allows
    these networks to be trained in a much more efficient, parallel manner.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 其他用于时间序列建模的模型，但可能需要更多的工作来实现，包括时间卷积神经网络（TCNs）和转换器。与循环模型不同，这些模型不需要在移动到未来输入之前完成对先前输入的计算。相反，它们一次性获得给定输入大小（也称为上下文长度）内的所有输入，并并行地为输入中的每个时间点生成预测。这使得这些网络可以以更高效、并行的方式训练。
- en: TCNs are based on one-dimensional convolutions, which are convolutions where
    the convolutional kernel is shifted along the sequential dimension of a sequence
    input. TCNs also use skip connections and dilated causal convolutions. Skip connections
    allow information to be passed between layers at different depths, and dilated
    convolutions increase the model’s receptive field so that the model can use information
    farther in the past for its predictions. Finally, causal convolutions are convolutions
    where any inputs that occur after the current time step 284
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: TCNs基于一维卷积，这种卷积是指卷积核沿着序列输入的序列维度进行平移。TCNs还使用跳过连接和扩张因果卷积。跳过连接允许在不同深度的层之间传递信息，扩张卷积增加了模型的感受野，使得模型可以使用更早的信息进行预测。最后，因果卷积是指任何在当前时间步之后发生的输入的卷积。
- en: '![](index-295_1.png)'
  id: totrans-46
