- en: The actor network is shown in Figure [15.10](#p324) and listed as follows. The
    features are the three states. There are nine layers. This is the default network.
    You can write any neural network you would like. The actor network takes the state
    observation and creates the action which is to vary the angle of attack.
  id: totrans-2679
