- en: Create Functions for the Experiment
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The first function displays an image:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: We present many different display functions to provide alternative ways to display
    images. For practice, create your own display function (or functions) and use
    it for this experiment.
  prefs: []
  type: TYPE_NORMAL
- en: The second function draws a bounding box around an image within a scene as shown
    in Listing [13-1](#PC9).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: The function accepts a processed image, x and y minimum and maximum coordinates,
    color, font, thickness, and a list of display strings. The processed image is
    sent by the *draw_boxes* function, which is presented next. The x and y coordinates
    provide the boundaries of the bounding box for the image. The color, font, thickness,
    and list of strings are provided by the *draw_boxes* function. The remainder of
    the function adds a bounding box to an image.
  prefs: []
  type: TYPE_NORMAL
- en: Begin by creating an ImageDraw object and assigning it to variable *draw*. The
    *ImageDraw* module is used to create new images, annotate or retouch existing
    images, and generate graphics on the fly for web use. Image x and y coordinates
    are assigned to variables, and boundary lines are assigned to the ImageDraw object.
  prefs: []
  type: TYPE_NORMAL
- en: The function continues by assigning the list of display strings to variable
    *display_str_heights*. Display strings are used to label the bounding boxes for
    each image in a scene. If the total height of the display strings added to the
    top of the bounding box exceeds the top of the image, we need to stack the strings
    below the bounding box instead of above it. The reason is to ensure that strings
    that identify each image in a bounding box are readable. The *total_display_str_height*
    variable ensures that each display string has a reasonable top and bottom margin
    for display. You can experiment with this value, but the setting is pretty good
    as it is. The next bit of logic checks the top and bottom margins to ensure a
    good fit of the image inside the bounding box container.
  prefs: []
  type: TYPE_NORMAL
- en: The remainder of the function reverses (with a for loop) the list of display
    strings for display from bottom to top. The *draw.rectangle* method draws a bounding
    box around each image. The *draw.text* method labels each bounding box with its
    appropriate label. When the loop is finished, an image that includes all bounding
    boxes is created.
  prefs: []
  type: TYPE_NORMAL
- en: The third function accepts an image, boxes, class labels, scores, maximum number
    of boxes, and minimum score. The parameters with the exception of the image are
    generated by a pre-trained model. With the accepted parameter values, it overlays
    labeled boxes on an image with formatted scores and label names as shown in Listing [13-2](#PC10).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: The draw_boxes function is a container because it accepts the image and dictionaries
    from the pre-trained model, calls *draw_bounding_box_on_image*, and returns an
    image with bounding boxes drawn around detected objects.
  prefs: []
  type: TYPE_NORMAL
- en: Although the function looks complex, it is pretty straightforward. It creates
    the colors inherent in the image. We need the colors because we recreate the detected
    objects from the scene so we can draw bounding boxes around them. It then creates
    the fonts that we use to label each bounding box. For practice, you can change
    the fonts. It then loops through all of the objects to retrieve (from dictionaries
    output from a pre-trained model) their x and y coordinates in the scene, labels,
    scores, image pixels, and colors to supply to the *draw_bounding_box_on_image*
    function. This function draws the bounding boxes for each object and returns a
    scene with bounding boxed images.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: To avoid confusion, think of the original image as a scene. The pre-trained
    model learns how to identify image objects in the scene. It outputs a set of dictionaries
    that contain information about the objects it detects and coordinates for the
    bounding boxes from the scene. We then draw the bounding boxes from the dictionary
    information. So when we talk about image objects, we mean the objects that are
    detected from the scene.
  prefs: []
  type: TYPE_NORMAL
