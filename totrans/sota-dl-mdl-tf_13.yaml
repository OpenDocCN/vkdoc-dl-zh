- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We used a powerful pre-trained image detector model on several image scenes
    to demonstrate object detection. The model worked extremely well on simple scenes,
    but not as well on complex ones. As object detection in deep learning continues
    to evolve, we are confident that future models will vastly improve detection capability.
  prefs: []
  type: TYPE_NORMAL
