  type: TYPE_NORMAL
- en: '[`https://commons.wikimedia.org/wiki/commons/4/45/Green_Dragon_Tavern_%2836196%29.jpg`](https://commons.wikimedia.org/wiki/commons/4/45/Green_Dragon_Tavern_%252836196%2529.jpg)'
  prefs: []
  type: TYPE_NORMAL
- en: 'Substitute *commons/(number)/(number)* for *File*:'
  prefs: []
  type: TYPE_NORMAL
- en: '[`https://commons.wikimedia.org/wiki/File:Green_Dragon_Tavern_%2836196%29.jpg`](https://commons.wikimedia.org/wiki/File:Green_Dragon_Tavern_%252836196%2529.jpg)'
  prefs: []
