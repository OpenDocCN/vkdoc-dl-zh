- en: Object Detection Experiment
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We grab images from Google Drive and Wikimedia Commons for the experiment. We
    use the pre-trained *faster_rcnn/openimages_v4/inception_resnet_v2* object detection
    module for image object detection. The object detection model is trained on Open
    Images V4 (version 4) with the ImageNet pre-trained Inception ResNet V2 (version
    2) as the image feature extractor. The module internally performs non-maximum
    suppression. The maximum number of detections outputted is 100\. So it detects
    a maximum of 100 objects in a given scene. Detections are outputted for 600 boxable
    categories. A *boxable category* is one that is capable of (or suitable for) placing
    in a bounding box.
  prefs: []
  type: TYPE_NORMAL
- en: '*Open Images* is a dataset of approximately nine million richly annotated images
    with image-level labels, object bounding boxes, object segmentations, visual relationships,
    and local narratives. The images are very diverse and often contain complex scenes
    with several objects (8.4 per scene on average).'
  prefs: []
  type: TYPE_NORMAL
- en: The training set of *Open Images V4* contains 14.6 million bounding boxes for
    600 object classes on 1.74 million images, which makes it the largest existing
    dataset with object location annotations (as of this writing). The boxes have
    been largely manually drawn by professional annotators to ensure accuracy and
    consistency. The images are very diverse and often contain complex scenes with
    several objects (8.4 per image on average). Moreover, the dataset is annotated
    with image-level labels spanning thousands of classes.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: It is recommended to run this module on a GPU to get acceptable inference times.
  prefs: []
  type: TYPE_NORMAL
