- en: 10. Graph-Based Recommender Systems
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The previous chapter covered deep learning-based recommender systems and explained
    how to implement end-to-end neural collaborative filtering. This chapter explores
    another recent advanced method: graph-based recommendation systems powered by
    knowledge graphs.'
  prefs: []
  type: TYPE_NORMAL
- en: Figure [10-1](#Fig1) illustrates a graph-based recommendation system for movie
    recommendations.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537881_1_En_10_Chapter/537881_1_En_10_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A structural representation of a recommender system for movie recommendations.
    The structure of the network exhibits the relationship between the user and the
    items.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 10-1
  prefs: []
  type: TYPE_NORMAL
- en: Graph-based movie recommendations
  prefs: []
  type: TYPE_NORMAL
- en: In graph-based recommendation systems, knowledge graph structures represent
    relationships between users and items. A knowledge graph is the structure of a
    network of interconnected datasets, enriched with semantics, that is visualized
    graphically by illustrating the relationship between multiple entities. The graph
    structure, when visualized, has three primary components; nodes, edges, and labels.
    The edge of the link defines the relationship between two nodes/entities, where
    each node can be any object, user, item, place, and so forth. The underlying semantics
    provide an additional dynamic context to the defined relationships, enabling more
    complex decision-making.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [10-2](#Fig2) shows a simple one-to-one relationship in a knowledge graph
    structure.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537881_1_En_10_Chapter/537881_1_En_10_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A knowledge graph of the link between A, B, and C. A, B, and C represent the
    subject, predicate, and object respectively.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 10-2
  prefs: []
  type: TYPE_NORMAL
- en: Simple knowledge graph connection
  prefs: []
  type: TYPE_NORMAL
- en: Figure [10-3](#Fig3) explains knowledge graphs.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537881_1_En_10_Chapter/537881_1_En_10_Fig3_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A knowledge graph with deep dynamic context is obtained from the combination
    of data, graph, and semantics.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 10-3
  prefs: []
  type: TYPE_NORMAL
- en: Knowledge graphs explained
  prefs: []
  type: TYPE_NORMAL
- en: This chapter uses Neo4j to implement the knowledge graphs. Neo4j is one of the
    best graph databases in the market today. It is a high-performance graph store
    with a user-friendly query language that is highly scalable and robust.
  prefs: []
  type: TYPE_NORMAL
- en: The knowledge graphs will fetch similar users for the required recommendations.
  prefs: []
  type: TYPE_NORMAL
- en: Implementation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
