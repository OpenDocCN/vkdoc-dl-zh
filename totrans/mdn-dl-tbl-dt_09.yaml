- en: 7. Tree-Based Deep Learning Approaches
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '*Imitation is the most sincere form of flattery.*'
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: —Oscar Wilde, Irish Poet, among many others
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In this last chapter of Part 2, we explore deep models that draw upon the success
    of tree-based models to inform their architectures and training processes. Together
    with attention-based models, this constitutes the majority of current tabular
    deep learning research. Tree-based models are well-adapted toward many domains
    of tabular data because of their sharp and rigidly hierarchical shape-cutting
    structure, compounded in ensembles. By creating neural network models that simulate
    these properties, we can hopefully realize these strengths on new scales and levels
    of efficiency.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: This chapter is structured in three parts, each sampling methods from different
    dominant approaches in the field. We will begin by discussing tree-structured
    neural networks, which explicitly build tree node–like logic into the structural
    units of the architecture, followed by boosting and stacking neural networks,
    which imitate successful tree ensembling paradigms. Lastly, we will explore distillation,
    in which knowledge from a tree is transferred into a neural network. The chapter
    adopts a dominantly research-based approach, presenting relevant components of
    curated papers and the implementation(s) when available.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: Tree-Structured Neural Networks
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Many deep models take *structural* interpretation from trees by imitating the
    structure of a decision tree using differentiable “neural” equivalents. This section
    discusses five sampled research papers adopting this approach:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: '*“**Deep Neural Decision Trees**” by Yongxin Yang et al*.: Training decision
    trees through deep learning methods by soft binning networks.'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*“SDTR: Soft Decision Tree Regressor for Tabular Data” by Haoran Luo et al.*:
    A soft decision tree (SDT) architecture is built from perceptron nodes.'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*“Neural Oblivious Decision Ensembles for Deep Learning on Tabular Data” by
    Sergei Popov et al.*: An ensemble of naïve neural decision trees in which each
    tree level has the same splitting condition.'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*“Deep Neural Network Initialization with Decision Trees” by Kelli Humbird
    et al.*: Cleverly mapping the structure of a decision tree to neural networks,
    acting as a warm start to training.'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*“DNF-Net: A Neural Architecture for Tabular Data” by Ami Abutbul*: Differentiable
    analogs to AND and OR gates are constructed to represent trees using “soft” logical
    expressions.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Deep Neural Decision Trees
  id: totrans-13
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Tree-based models are highly interpretable due to their use of greedy function
    approximation.^([1](#Fn1)) Their unique mechanism of splitting data based on a
    trained threshold allows for state-of-the-art performance on tabular data. Ensemble
    tree methods such as Random Forests and Gradient Boosting Machines are typically
    used for tabular data benchmarking as they are competitive, if not better than
    deep learning methods. Moreover, tree-based models can be easily visualized, thus
    informative of how and why certain features contribute to certain decisions. Interpretability
    is critical to many real-world applications in areas such as business, law, and
    much more. This is not to say that neural networks do not provide any practical
    advantage over classical machine learning methods. In neural networks, parameters
    are updated simultaneously. In contrast, tree-based models update their parameters
    individually through traversing branches and leaves in order; this optimization
    approach can be suboptimal compared with the simultaneous parameter updates in
    neural networks. By combining the advantages of both, we would theoretically be
    able to construct a differentiable tree-based model that is able to excel in tabular
    data prediction tasks.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: Yongxin Yang, Irene Garcia Morillo, and Timothy M. Hospedales propose a mix
    between tree-based models and neural networks referred to as “deep neural decision
    trees” (DNDTs).^([2](#Fn2)) Deep neural decision trees optimize their parameters
    simultaneously using gradient descent. From the technical perspective, DNDT can
    be implemented in practically any deep learning framework; thus, it’s able to
    utilize the computational power of accelerators such as GPUs or TPUs. Since the
    model's parameters can be optimized by gradient descent, the model can also be
    treated as a building block for a much larger end-to-end modeling scheme.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: We can formulate Decision Tree training as adjusting the values of various discrete
    binning functions. More specifically, we treat each split of a decision node as
    binning the sample into one of the two branches (which, in the context of a binning
    function, can be seen as bins) stemming from the node. Training can be seen as
    optimizing the value of the binning threshold to achieve minimal loss. However,
    in standard Decision Trees, those metaphoric “binning” functions are undifferentiable
    due to their discrete nature. Yang et al. propose a soft approximation alternative
    to the non-differentiable binning procedure. Their binning function is continuous,
    allowing for optimization through gradient-based methods.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: 'Consider a non-binary decision tree where a differentiable binning function
    models every branch node decision. Notably, each binning function contains *n* + 1
    available bins, where each bin represents a branch in the decision tree. Having
    *n* + 1 available bins equates to needing *n* “cut-off” points or thresholds.
    Using notations adopted from the original paper, the cut-off points can be denoted
    as a list: [*β*[1], *β*[2], *β*[3], *β*[4], …, *β*[*n*] ]. The roles of these
    values will come into play later as we expand on how the binning functions are
    optimized.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: 'A single-layer neural network, *f*, parameterizes every binning function. We
    can construct the network as follows:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {f}_{w,b,\tau }(x)=\textrm{softmax}\left(\left( wx+b\right)/\tau \right)
    $$](../images/525591_1_En_7_Chapter/525591_1_En_7_Chapter_TeX_Equa.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
- en: 'Let’s break the equation down and define each parameter in *f*:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: The weight of the network, *w*, is non-trainable and set as a constant before
    initiating training. Its values will always be set to *w* = [1, 2, …, *n* + 1]
    regardless of outside conditions.
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The network's bias, *b*, is also pre-initialized to a set value before training,
    but its values are adjustable by gradient descent. For every training iteration,
    the bias is constructed as *b* = [0, −*β*[1], −*β*[1] − *β*[2], −*β*[1] − *β*[2] − *β*[3],
    …, −*β*[1] − *β*[2] − … − *β*[*n*]] where every unique *β* value is trainable
    through backpropagation.
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The softmax activation bounds the output vector between 0 and 1 while keeping
    the sum across all values to 1\. We can interpret this output as a list of probabilities
    defining which of the *n* + 1 branches the input belongs to. The temperature factor
    *τ* controls the output sparsity. As *τ* → 0, the output tends to be a one-hot
    vector indicating the index of the branch to which the input belongs.
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'To demonstrate the effect of the temperature *τ* on the output vector, consider
    an example where *wx* + *b* is computed to [1 6 9] and the temperature is set
    to 10:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \textrm{softmax}\left(\frac{\left( wx+b\right)}{\tau}\right) $$](../images/525591_1_En_7_Chapter/525591_1_En_7_Chapter_TeX_Equb.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
- en: '![$$ \textrm{softmax}\left(\left[1\kern0.5em 6\kern0.5em 9\right]/10\right)\approx
    \left[0.205\kern0.5em 0.338\kern0.5em 0.456\right] $$](../images/525591_1_En_7_Chapter/525591_1_En_7_Chapter_TeX_Equc.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
- en: 'By adjusting *τ* to 1, we observe a sparser output:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \textrm{softmax}\left(\left[1\kern0.5em 6\kern0.5em 9\right]/1\right)\approx
    \left[0.000\kern0.5em 0.047\kern0.5em 0.952\right] $$](../images/525591_1_En_7_Chapter/525591_1_En_7_Chapter_TeX_Equd.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
- en: 'Further lowering the temperature value to 0.1, the output tends to be a complete
    one-hot encoded vector:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \textrm{softmax}\left(\left[1\kern0.5em 6\kern0.5em 9\right]/0.1\right)\approx
    \left[0.000\kern0.5em 0.000\kern0.5em 0.999\right] $$](../images/525591_1_En_7_Chapter/525591_1_En_7_Chapter_TeX_Eque.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
- en: 'Generally, decision trees are built from top to bottom in a greedy manner where
    each decision node is defined individually and optimized before moving on to the
    next. Not only is this method of optimization suboptimal but it’s also resource
    intensive when the tree is non-binary. Instead, Yang et al. utilize neural networks’
    ability to update their parameters simultaneously and train a single binning network
    for every feature prior to building the tree. We can then build the tree recursively
    in the following steps:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: Treat each binning network as a decision node where the number of branches stemming
    from the node is determined by the number of bins available or the length of the
    output vector. Reusing the notations introduced previously, every decision node
    should have *n* + 1 branches.
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Pick any decision node (binning network) as the root node. Results will be the
    same regardless of which decision node is selected. Add a note about how the result
    will be the same.
  id: totrans-33
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: From here, every tree level will be assigned one single decision node, where
    it will become the child node of every branch from the previous level. Rephrased,
    it’s connected to the previous decision node. Essentially, every level will contain
    *n*^(*l*) of the same decision node where *l* is the tree level.
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Assuming that there are *D* features, there will be *n*^(*D*) leaf nodes at
    the final level of the tree. Unlike standard decision trees where leaf nodes directly
    represent model predictions, leaf nodes in DNDT are mere indicators of “clusters”
    that samples belong to based on their feature values. One further processing step
    is required to obtain the final prediction. Usually, a linear model is employed
    to classify samples arriving at leaf nodes.
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Mathematically, we can exhaustively find the final leaf node that one sample
    leads to using the Kronecker product. For those unfamiliar, the Kronecker product
    is usually denoted as ⨂ and is a special form of matrix/vector multiplication.
    For two matrices *A ϵ ℝ*^(*m* × *n*) and *B ϵ ℝ*^(*p* × *q*), the Kronecker product
    is defined as
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ A\bigotimes B=\left[\begin{array}{ccc}{a}_{1,1}B&amp; \cdots &amp; {a}_{1,n}B\\
    {}\vdots &amp; \ddots &amp; \vdots \\ {}{a}_{m,1}B&amp; \cdots &amp; {a}_{m,n}B\end{array}\right]
    $$](../images/525591_1_En_7_Chapter/525591_1_En_7_Chapter_TeX_Equf.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
- en: 'The resulting matrix will be in the shape of *mp* × *nq*. We denote *D* as
    the number of features present in the dataset and *f*[*i*] as the i^(th) binning
    network. The Kronecker product is repeatedly applied to yield an almost one-hot
    encoded vector (for a low temperature value *τ* ), signifying the index of the
    leaf node that the input *x* will lead to:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {f}_1\left({x}_1\right)\bigotimes {f}_2\left({x}_2\right)\bigotimes {f}_3\left({x}_3\right)\bigotimes
    \dots \bigotimes {f}_D\left({x}_D\right) $$](../images/525591_1_En_7_Chapter/525591_1_En_7_Chapter_TeX_Equg.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
- en: The resulting “leaf nodes” vector would be in length *n*^(*D*) if every binning
    network/decision node had *n* available bins/branches. Note that the value of
    *n* can be different for each binning network. The final linear model will receive
    the “leaf nodes” vector as input and produce a prediction relevant to the dataset
    classes (or continuous values in the case of regression).
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: DNDT cleverly avoids the suboptimal training scheme of tree-based models by
    training neural networks and optimizing their parameters without depending on
    each other. DNDT provides the advantage of scalability; however, this only applies
    to the size of samples, not features. Due to the use of the Kronecker product,
    computation becomes significantly expensive as the number of features increases.
    The authors, therefore, propose to use Random Forest–style training where several
    weak learners are each trained on a subset of features. Figure [7-1](#Fig1) is
    a representation of DNDT as well as its equivalent decision tree. For explanatory
    purposes, only two features from the Iris Flower dataset are selected in the diagram.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_7_Chapter/525591_1_En_7_Fig1_HTML.jpg)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
- en: 2 charts. One is a D N D T, which has input, binning layer, Kron product, and
    output interconnected from top to bottom. The other is a decision tree where the
    root is petal length, and the leaf nodes are class 1, class 2, and class 3.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: Figure 7-1
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: Representation of DNDT from Yang et al.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: The authors of the paper compared DNDT with a decision tree baseline and a shallow
    two-layer neural network with 50 neurons in each hidden layer. The number of cut
    points for each feature in DNDT is all set to 1, meaning that there are only two
    branches for every node. A total of 14 datasets are retrieved from Kaggle and
    UCI. For datasets with more than 12 features, Random Forest–style training is
    adapted for DNDT, with each weak learner randomly learning from ten features with
    a total of ten weak learners. The following diagram shows the result of the comparison
    (Table [7-1](#Tab1)).
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: Table 7-1
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: Comparison of DNDT against various other algorithms. Datasets marked with *
    indicate the ensemble version of DNDT was used. From Yang et al.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: '| ![](../images/525591_1_En_7_Chapter/525591_1_En_7_Figa_HTML.gif)A table of
    4 columns and 16 rows. The columns are labeled as dataset, D N D T, D T, and N
    N. The number of wins is given as 5, 7, and 5, while the mean reciprocal rank
    is 0.65, 0.73, and 0.61 respectively in the last 2 rows. |'
  id: totrans-49
  prefs: []
  type: TYPE_TB
- en: Although Decision Trees still are empirically superior to DNDT across this selection
    of benchmark datasets, DNDT can still match Decision Trees’ performance in most
    scenarios. DNDT also provides flexibility as the number of cut points can be changed
    for each individual feature. It has been shown that increasing the cut points
    improves model performance significantly.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: DNDT can be implemented in PyTorch or TensorFlow in around 20 lines of code
    from the official implementation done by the authors of the paper. Since TensorFlow
    custom training loops can be quite confusing, we will use the PyTorch implementation.
    The Iris Flower dataset will be used as an example. We can start by importing
    PyTorch and loading the dataset (Listing [7-1](#PC1)).
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Following, we can define custom functions for each component of DNDT as shown
    in Listing [7-2](#PC2).
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Before training, a few hyperparameters of the model will be defined (Listing
    [7-3](#PC3)).
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Finally, we can start the training process with PyTorch’s custom training loops
    (Listing [7-4](#PC4)).
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Three main factors can improve or worsen training results: the number of splits
    for each feature, the temperature, and the learning rate. These values should
    be carefully selected based on domain knowledge or through hyperparameter tuning,
    as subtle changes can influence training results significantly.'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: The core of DNDT shines at being able to simultaneously update parameters through
    gradient descent while having a tree-based architecture. The scalability of DNDT
    also provides conveniences that most tree-based models do not possess. Although
    DNDT may require some hyperparameter tuning to match the performance of current
    state-of-the-art models, it still stands as an alternative or a mix between deep
    learning and tree-based models. Finally, DNDT opens the door to building better
    neural networks that imitate tree-based model logic, as we will see in later sections.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: Soft Decision Tree Regressors
  id: totrans-61
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Recall that in a standard decision tree, each node represents a binary decision
    threshold for a particular feature, which is executed against the incoming sample
    and used to determine which path (left or right) the sample ends up taking. Haoran
    Luo, Fan Cheng, Heng Yu, and Yuqi Yi propose a soft analog for such a decision
    tree on regression problems, which can be trained with gradient descent, in the
    2021 paper “SDTR: Soft Decision Tree Regressor for Tabular Data.”^([3](#Fn3))'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: 'Consider a full binary tree with nodes denoted by their index *i*. In the soft
    decision tree model, each node does not output a binary left or right decision,
    but instead a soft probability using a perceptron. We define the probability of
    choosing the left branch at the *i*th node given the input ![$$ \overrightarrow{x}
    $$](../images/525591_1_En_7_Chapter/525591_1_En_7_Chapter_TeX_IEq1.png) as follows,
    for some learned weight ![$$ \overrightarrow{w_i} $$](../images/525591_1_En_7_Chapter/525591_1_En_7_Chapter_TeX_IEq2.png)
    and bias *b*[*i*]:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {p}_i\left(\overrightarrow{x}\right)=\sigma \left({\beta}_i\left(\overrightarrow{w_i}\
    \overrightarrow{x}+{b}_i\right)\right) $$](../images/525591_1_En_7_Chapter/525591_1_En_7_Chapter_TeX_Equh.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
- en: Note that regardless of how deep the node is, the decision is always made with
    access to the full set of features. The parameter *β*[*i*] is a scaling coefficient
    used to prevent “too soft decisions” – that is, to push the weighted sum away
    from zero and toward more extreme ends that produce soft decisions closer to zero
    and one.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: 'Every leaf node is associated with a scalar *R*[*l*]; this is the predicted
    output for a sample that travels down the tree to that particular leaf node. Let
    *P*[*l*] represent the probability of choosing a leaf *l*. Then we can calculate
    *P*[*l*] as follows, where *i* is either 1 or 0 depending on whether a left or
    right step is taken on the path toward *l*:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {P}_l(x)=\prod \limits_{i\in \textrm{Path}(l)}{p}_i{(x)}^i{\left(1-{p}_i(x)\right)}^{1-i}
    $$](../images/525591_1_En_7_Chapter/525591_1_En_7_Chapter_TeX_Equi.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
- en: 'Rather than just evaluating the difference between the value associated with
    the leaf node with the highest probability and the true value, we define the loss
    as the sum of differences between *every leaf* and the true value, weighted by
    the leaf probabilities:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ L(x)=\sum \limits_{l\in \textrm{LeafNodes}}{P}_l(x){\left({R}_l-y\right)}^2
    $$](../images/525591_1_En_7_Chapter/525591_1_En_7_Chapter_TeX_Equj.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
- en: While the structure of the tree is technically fixed – there is a specified
    depth and a static binary structure – the conditions that fill each of the nodes
    are learnable by the model through the weights and biases, optimized to minimize
    the loss (Figure [7-2](#Fig2)).
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_7_Chapter/525591_1_En_7_Fig2_HTML.png)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
- en: A binary tree has a root node labeled p subscript 1 of x equals sigma of W subscript
    1 x plus b subscript 1\. The children of the root node and 4 leaf nodes from the
    children are depicted. The connection of each node to its parent is labeled.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: Figure 7-2
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: Diagram of the relationship between leaf nodes and connections. From Luo et
    al.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: The paper describes additional mechanisms to enforce proper learning. Just for
    the purposes of understanding the key elements of the architecture, however, we
    will build a very simple, bare-bones version of the model. What is interesting
    about this particular model design is that the model essentially is a multi-output
    architecture with one dense layer extending from the input for each node (Listing
    [7-5](#PC5)). The tree-like architecture is realized in how the different fully
    connected layers are brought in relation with one another to calculate the loss.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Note that we are assuming in this case that the soft decision tree model is
    being trained on a binary prediction task, such that all layers in the model (both
    output layers and intermediate probabilistic tree nodes) use the sigmoid activation,
    for simplicity.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: We want to associate each of these layers with a particular position in a binary
    tree structure. There are many clever ways to go about this, but we will stick
    with the canonical object-oriented approach, which has the benefit of interpretability
    and ease of navigation. Each `Node` object corresponds to an index in the `outputs`
    list. Note that it does not matter which nodes correspond to which indices, as
    long as there is only one node per index and vice versa. We can do this by recursively
    building linked nodes in a binary tree fashion, with a global `index` variable
    incremented upon the instantiation of a `Node` (Listing [7-6](#PC6)).
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: In order to calculate the loss, we need to multiply each leaf node by all the
    node probabilities that lead toward that leaf node. We can recursively create
    a collection of outputs by navigating our tree structure (Listing [7-7](#PC7)).
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: We need to define a custom loss that evaluates the average loss between the
    truth and each leaf node value multiplied by the probability series (Listing [7-8](#PC8)).
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Because this loss function aggregates multiple outputs rather than acting independently
    on a single model output, it is more convenient for us to define a custom model
    with a specific fit method (Listing [7-9](#PC9)). (With the default compiling
    and fitting steps, we can only specify losses that act on an output or several
    losses that each act on a single output in the case of multimodal models. There
    is no easy way to define a loss that accepts multiple outputs.) We can do this
    by overriding the default `train_step` method.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: After instantiation, the model can be trained (Listing [7-10](#PC10)).
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Again, this model doesn’t do very well by itself, but it illustrates the fundamental
    idea.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
- en: The authors offer a model implemented in PyTorch. Minimal PyTorch is needed
    to begin using the model. We begin by loading the soft decision tree model from
    the official repository (Listing [7-11](#PC11)).
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  id: totrans-90
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'The first step is to define a PyTorch dataset (Listing [7-12](#PC12)). The
    PyTorch dataset format is almost exactly the same as the TensorFlow custom dataset
    syntax (recall from Chapter [2](525591_1_En_2_Chapter.xhtml)): we need to define
    a `__len__` and a `__getitem__` method.'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: We can instantiate the dataset on the Forest Cover dataset, for instance. The
    `DataLoader` wraps around the `Dataset` and provides additional training-level
    tooling for feeding the data to the model (Listing [7-13](#PC13)).
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  id: totrans-94
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: The soft decision tree can be instantiated and trained as follows (Listing [7-14](#PC14)).
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  id: totrans-96
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: The syntax used here is similar to that of writing a custom loop in TensorFlow.
    The primary difference is the requirement to explicitly call steps occurring during
    the feed-forward and backpropagation stages in the loss and optimizer objects.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: NODE
  id: totrans-98
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Consider the game of “laggy” 20 Questions. To guess an object that player A
    is thinking of, player B asks a series of questions to which player A answers
    “yes” or “no.” The twist is that player B receives all the answers to their questions
    only *after they finish asking all the questions*, rather than immediately after
    each question.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: 'This is an example of an *oblivious decision tree* – a tree in which each level
    has the same splitting criteria, as opposed to using different criteria at different
    levels. For instance, the following “3 Questions” decision tree is oblivious:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: Is it an animal?
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*If yes*: Does it fly?'
  id: totrans-102
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '*If yes*: Is it fast?'
  id: totrans-103
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '*If yes*: eagle'
  id: totrans-104
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '*If no*: woodcock'
  id: totrans-105
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '*If no*: Is it fast?'
  id: totrans-106
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '*If yes*: cheetah'
  id: totrans-107
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '*If no*: tortoise'
  id: totrans-108
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '*If no*: Does it fly?'
  id: totrans-109
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '*If yes*: Is it fast?'
  id: totrans-110
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '*If yes*: plane'
  id: totrans-111
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '*If no*: paraglider'
  id: totrans-112
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '*If no*: Is it fast?'
  id: totrans-113
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '*If yes*: racecar'
  id: totrans-114
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '*If no*: rock'
  id: totrans-115
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'In contrast, the following decision tree, which represents how one might play
    a more standard game of 20 Questions, is not oblivious:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
- en: Is it an animal?
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*If yes*: Does it live in the water?'
  id: totrans-118
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '*If yes*: Is it a predator?'
  id: totrans-119
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '*If yes*: shark'
  id: totrans-120
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '*If no*: sardine'
  id: totrans-121
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '*If no*: Does it have four legs?'
  id: totrans-122
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '*If yes*: lion'
  id: totrans-123
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
