- en: Part II
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Azure AI Platform and Experimentation Tools
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
- en: 4. Microsoft AI Platform
  id: totrans-2
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This chapter introduces the Microsoft AI Platform, which is a set of services,
    infrastructure, and tools for building intelligent applications powered by AI.
    The Microsoft AI Platform runs on the Microsoft Azure cloud computing environment,
    which provides computing as a utility where you pay for what you use rather than
    what you own. For more details on the broader Azure Platform, please see the e-book
    Developer’s Guide to Microsoft Azure (Crump & Luijbregts, 2017). The Microsoft
    AI Platform enables data scientists and developers to create AI solutions in an
    efficient and cost-effective manner.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: Although Microsoft has other offerings for developing AI solutions such as Machine
    Learning Server, which can be deployed on-premises in addition to the cloud as
    well as hybrid offerings, this chapter focuses primarily on the cloud computing
    platform that for reasons described later is most applicable to developing deep
    learning solutions. In practice, the models developed with the Microsoft AI Platform
    can then be deployed in many locations such as on the cloud for real-time highly
    scalable applications, on the edge through Azure IOT, or within a database such
    as a stored procedure hosted within SQL Server , for example. The Microsoft AI
    Platform is a flexible, open, enterprise-grade set of services, tools, and infrastructure
    that allow developers and data scientists to maximize their productivity in developing
    AI solutions.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: Developing a deep learning solution requires lots of experimentation, lots of
    computing power—often using advanced hardware such as GPUs and FPGAs as discussed
    in Chapter [3](A463582_1_En_3_Chapter.html), and often lots of training data.
    There is a need to be able to run training at scale. Cloud computing, with the
    ability to scale up and down easily with various levels of management—from raw
    infrastructure to managed services—makes doing data science including training
    and scoring deep learning models a more practical reality.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: In fact, developing a deep learning solution requires carefully setting up many
    aspects, such as data storage, development environment, scheduling for training
    and scoring, cluster management, and managing costs, among other aspects. Deep
    learning solutions are notorious for their difficult configurations, such as ensuring
    drivers and software compatibility. It is important to store data in a location
    that can scale with increasing volume and enable collecting more data to improve
    solutions over time. These data must also be stored in a location that is secure
    and compliant with local regulations. Development environments must fit the needs
    of the developer or data scientist creating the code and allow workflows such
    as moving from a laptop to the cloud. Deep learning training workflows must be
    scheduled and monitored. The Azure cloud computing environment enables scaling
    up and down for cost control, has various levels of product offerings to address
    these aspects, from raw infrastructure with VMs already configured for deep learning
    to fully managed services with pretrained models ready to consume.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: Of course, not all these services are necessary for a single given solution,
    but rather taken together provide a platform on which any type of intelligent
    application can be built leveraging the best of open-source technology as well
    as decades of research within Microsoft on both AI algorithms as well as tooling
    for development. By building on top of the Azure platform, developers and data
    scientists can leverage infrastructure that scales virtually infinitely, with
    enterprise-grade security, availability, compliance, and manageability. In the
    sections that follow, the main services, infrastructure, and tools available on
    the Microsoft AI Platform are outlined as visualized in Figure [4-1](#Fig1). To
    use the platform, an Azure subscription is required. For a free trial, please
    visit [`http://bit.ly/TrialAzureFree`](http://bit.ly/TrialAzureFree) .
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_4_Fig1_HTML.jpg](A463582_1_En_4_Fig1_HTML.jpg)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
- en: Figure 4-1
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: Microsoft AI Platform
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: After outlining the Microsoft AI Platform, steps for setting up a deep learning
    VM (DLVM) are described, which is required for running the code samples provided
    in later chapters as well as Part IV.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: Services
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The Microsoft AI Platform is composed of a series of services from fully managed
    software services to services for building custom AI applications. Depending on
    the scenario and flexibility required, different solutions might be applicable.
    The services are broken into three main areas:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: Prebuilt AI. These leverage prebuilt models within an application through algorithms
    that are already built to see, hear, speak, and understand with Cognitive Services.
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Conversational AI. These build natural interaction into an application through
    the Bot Framework, which has connectors to common channels such as Facebook Messenger,
    Slack, Skype, and Bing.
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Custom AI Services. These adapt to a scenario with the flexibility of Azure
    Machine Learning services, Batch AI service or both.
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Prebuilt AI: Cognitive Services'
  id: totrans-17
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Cognitive Services are a set of services available to developers and data scientists
    to build AI solutions, with capabilities around vision, speech, language, knowledge,
    and search (see Table [4-1](#Tab1)). The Cognitive Services are of two main types:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: Table 4-1
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: Example Cognitive Services Available on the Microsoft AI Platform
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: '| Vision | Language | Speech | Search | Knowledge |'
  id: totrans-21
  prefs: []
  type: TYPE_TB
- en: '| :-- | :-- | :-- | :-- | :-- |'
  id: totrans-22
  prefs: []
  type: TYPE_TB
- en: '| Computer vision | Text analytics | Speaker recognition | Web search | Academic
    knowledge |'
  id: totrans-23
  prefs: []
  type: TYPE_TB
- en: '| Face | Spell check | Speech | Image search | Entity linking service |'
  id: totrans-24
  prefs: []
  type: TYPE_TB
- en: '| Emotion | Web language model | Speech Service^a | Video search | Knowledge
    exploration |'
  id: totrans-25
  prefs: []
  type: TYPE_TB
- en: '| Content Moderator | Linguistic analysis |   | News search | Recommendations
    |'
  id: totrans-26
  prefs: []
  type: TYPE_TB
- en: '| Video Indexer | Translator |   | Autosuggest | QnA maker |'
  id: totrans-27
  prefs: []
  type: TYPE_TB
- en: '| Vision Service^a | Language Understanding^a |   | Search^a | Decision Service^a
    |'
  id: totrans-28
  prefs: []
  type: TYPE_TB
- en: ^aCustom Cognitive Service with bring-your-own-data capabilities.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: Pretrained models available as REST APIs, ready to consume in end user applications
    without any customization required.
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Bring-your-own-data services, such as Custom Vision Service, which allows a
    developer to create a custom image classification model without any background
    in computer vision or deep learning by simply uploading images of different classes
    and clicking a button to train the model.
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: As just one example, the ability to search is a feature in almost every application
    but is often difficult to implement as it requires natural language processing
    and language-specific linguistics among other aspects. Azure Search provides the
    underlying search engine—developers need to create an index to help search and
    fill it with data, and Azure Search takes care of everything underneath, with
    rich features such as intelligent filtering, search suggestions, word decompounding,
    and geo-search.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: These services are popular, as they are simple to add into applications. Just
    a few lines of code are required to integrate a model such as an emotion detection
    model into a customer service experience application. Given the breadth of Cognitive
    Services and Custom Cognitive Services available for use today, these services
    are described in more depth in the Chapter [5](A463582_1_En_5_Chapter.html).
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: 'Conversational AI: Bot Framework'
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The Bot Framework includes tools and services to enable developers to build
    bots that converse with users. For example, a developer can easily develop a bot
    that interacts with users on a web site to guide them through purchasing a product
    or service rather than having to navigate through the web page. Through this framework,
    one can develop once and then expose the bot through many channels that are included
    within the Bot Framework, such as Skype, Facebook, and the Web. Bots can be built
    with the Bot Builder Software Development Kit (SDK) using C# or Node.js or with
    the Azure Bot Service.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: Bots can be built to converse naturally, especially using advanced capabilities
    with integration of Cognitive Services such as the Language Understanding Intelligence
    Service (LUIS) and integrations with other cognitive services. As a managed service
    in Azure, it is scalable, and costs are only occurred for the resources that are
    used.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: 'Custom AI: Azure Machine Learning Services'
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Azure Machine Learning services were released in public preview in late 2017\.
    These services are useful for building custom AI solutions and helping to accelerate
    the end-to-end development of intelligent applications.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: Develop, deploy, and manage models at scale.
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Develop with the tools and frameworks popular in the open source community.
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Azure Machine Learning services provide a framework to manage a data science
    project. With these services, one can bring the computing environment most applicable
    for training their AI models, for example:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: Data Science Virtual Machine.
  id: totrans-42
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Spark on Databricks or HDInsight.
  id: totrans-43
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Azure Batch AI.
  id: totrans-44
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: These computing environments are described later in this chapter.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: The experimentation service helps to manage project dependencies, scale out
    training jobs, and enable sharing of data science projects. Model management service
    uses docker container-based deployment to help data scientists and developers
    deploy solutions on a single node (on the cloud or on-premises) as well as scale
    out cluster deployments such as Azure Container Services, as well as edge deployment
    via Azure IOT Edge.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: As of this writing, Azure Machine Learning services works with Python and is
    available in several Azure regions. In addition, there are AI extensions for Visual
    Studio and Visual Studio Code discussed in the “Tools” section later in this chapter
    that allow interacting with the Azure Machine Learning platform ( [`http://bit.ly/aivisstdio`](http://bit.ly/aivisstdio)
    ). As the service is updating frequently, we focused on the core computing environments
    in this book and suggest reading the current documentation on Azure Machine Learning
    services available at [`http://bit.ly/AMLservices`](http://bit.ly/AMLservices)
    .
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: 'Custom AI: Batch AI'
  id: totrans-48
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Batch AI is a managed service that enables data scientists and developers to
    easily train deep learning and other AI models at scale with clusters of GPUs.
    With Batch AI, one can create a clusters of nodes including GPUs when required,
    and then turn the cluster off when the job is complete and thus stop the bill.
    It allows one to construct a framework-specific configuration using either containers
    or VMs. This is ideal for experimentation, such as doing parameter sweeps or experiments,
    testing different network architectures, or doing hyperparameter tuning in general.
    It also enables multi-GPU training for frameworks that allow training across nodes
    when training data are very large. An example with associated code for training
    deep learning models with Batch AI is included in Chapter [9](A463582_1_En_9_Chapter.html).
    Batch AI can also be used for embarrassingly parallel batch scoring scenarios.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: Batch AI is built on top of Azure Batch, which is a cloud-scale resource management
    and task execution tool. With Batch AI, you only pay for the computing that you
    use, with both standard and low-priority VMs available. There is no added charge
    for job scheduling or cluster management in general. Low-priority VMs provide
    a cost-efficient solution for jobs that are lower priority, such as learning and
    experimentation.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: Related to Batch AI, Batch Shipyard is an open source tool that is a precursor
    to the managed Batch AI service that also runs on top of the Azure Batch infrastructure.
    Batch Shipyard supports both Docker and Singularity containers and scenarios important
    to developing deep learning solutions such as hyperparameter tuning. Batch Shipyard
    can also be utilized for batch scoring of deep learning models. More details about
    Batch AI and Batch Shipyard can be found in Part IV of the book.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: Infrastructure
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this section, we outline infrastructure available for AI computing, such
    as the Data Science Virtual Machine (DSVM), Spark clusters, and infrastructure
    for managing deployment of containers as well as infrastructure for storing data
    on which AI can be built such as SQL DB, SQL Datawarehouse, Cosmos DB, and Data
    Lake.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: Data Science Virtual Machine
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The DSVM is a preconfigured environment in the cloud for data science and AI
    modeling, development, and deployment. It comes in a Windows Server version as
    well as Linux, and a specialized version for deep learning known as DLVM, which
    runs on a GPU. As can be seen in Figure [4-2](#Fig2), popular languages for data
    science development such as Python, R, and Julia are ready to use immediately,
    and data connected from many data stores such as SQL Data Warehouse, Azure Data
    Lake, Azure Storage, and Azure Cosmos DB are available. Many ML and AI tools come
    preinstalled, such as many of the popular deep learning frameworks. Data scientists
    and developers can then customize the VM as needed for their use. There is also
    a variant specialized for geospatial analysis, the Geo AI DSVM: [`http://aka.ms/dsvm/geoai/docs`](http://aka.ms/dsvm/geoai/docs)
    .'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: 'DSVMs are extremely popular with data scientists for the following reasons:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_4_Fig2_HTML.jpg](A463582_1_En_4_Fig2_HTML.jpg)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
- en: Figure 4-2
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: Features of the Data Science Virtual Machine as described at [`http://bit.ly/DataScienceVM`](http://bit.ly/DataScienceVM)
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: They provide an analytics desktop in the cloud with easy setup, and the ability
    to transfer projects more easily between colleagues.
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: They have on-demand elastic capacity, ability to turn off and on (e.g., stopping
    the VM at night if no jobs are running).
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There are examples and templates built in to get started with data science and
    deep learning.
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There is an ability to connect into other services such as using DSVM as the
    computing target within a project managed through Azure Machine Learning services
    or as compute for Batch AI service.
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: They are easy to use for data science training and education due to ease of
    setup and cost savings versus purchasing hardware and managing the software oneself.
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Especially relevant for deep learning, setting up a GPU-based system can be
    extremely difficult with all of the necessary drivers and configurations. The
    DLVM makes the setup significantly easier, and can be provisioned with up to four
    GPU cards on a single VM. There are no software costs to the VM, and the pricing
    starts at $0.90/hour for NC6 series.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: DSVM can be used both for experimentation and for simple deployment scenarios,
    such as running simple web services using Flask combined with capabilities such
    as Azure Automation, Azure Functions, and Azure Data Factory to trigger jobs running
    using a DSVM.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: Spark
  id: totrans-67
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There are several options for running Spark on Azure, including Azure Databricks,
    Azure HDInsight, and leveraging the Azure Distributed Data Engineering Toolkit
    (AZTK) as core examples. Databricks is a managed platform for Spark with a rich
    experience for both data scientists and developers, such as a team collaboration
    experience and version control capabilities. The service handles much of the tuning
    of the cluster for developers, so is thus ideal for users who might not know or
    want to configure Spark, but it is not as flexible in terms of how the cluster
    can be configured. HDInsight is a fully managed cloud service for open source
    analytics such as HBase, Hive, Storm, and others in addition to Spark.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: The AZTK is an open source Python Command-Line Interface (CLI) application for
    provisioning on-demand Spark clusters in Azure. The Spark clusters run in Docker
    containers with bring-your-own Docker image flexibility and are provisioned within
    5 minutes on average, with low-priority VMs available for an 80 percent discount.
    This toolkit is useful for running a distributed Spark workload on demand such
    as batch workloads and can be scheduled to spin up and down such as through the
    use of Azure Functions. It has a rich Python SDK for programmatic control of clusters
    and jobs. AZTK is the most flexible option in terms of supporting all VM types
    including GPUs, which is especially helpful for deep learning scenarios.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: For all of these Spark infrastructure options, Microsoft Machine Learning for
    Apache Spark (MMLSpark) provides a number of deep learning and data science tools
    for Apache Spark including integration with the deep learning framework CVTK.
    Spark has also seen recent improvements in support for deep learning applications
    through collaborations aimed toward improving support for aspects such as image
    data support as discussed at [`http://bit.ly/SparkImage`](http://bit.ly/SparkImage)
    .
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: Container Hosting
  id: totrans-71
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Azure Kubernetes Service (AKS) is a fully managed Kubernetes container orchestration
    service. Users might also choose other orchestrators through the original version,
    known as ACS. With the fully managed version of AKS, the only cost is for the
    VMs that are used for the tasks at hand; in other words, the management infrastructure
    is completely free. AKS is a generic computing platform and extremely flexible.
    For AI workloads, this type of service is often used to host scalable AI models
    for real-time scoring, although AKS can also be used for scalable AI training
    as well. Azure Machine Learning services include a model management service that
    eases the deployment of AI models as a REST API to Azure Container Services as
    illustrated in Figure [4-3](#Fig3).
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_4_Fig3_HTML.jpg](A463582_1_En_4_Fig3_HTML.jpg)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
- en: Figure 4-3
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: Example deep learning solution architecture where data are stored in SQL Server,
    code is developed with a Deep Learning Virtual Machine managed by Azure Machine
    Learning services, and it is deployed as a Rest API to Azure Container Services
    as described at [`http://bit.ly/DLArch`](http://bit.ly/DLArch) .
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: Azure Container Services gives customers the benefit of open source Kubernetes
    along with built-in management to ease the complexity and operational overhead.
    AKS comes with automated upgrade, scaling ability, and self-healing accessible
    through a control plane hosted on Azure. For those who want even more flexibility,
    ACS Engine is an open source project that allows developers to build and use custom
    Docker-enabled container clusters.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: Developers can also host containers using Azure Container Instances, where a
    container can be hosted without a container orchestrator, which is especially
    useful for testing or hosting a simple application that does not require scaling.
    Azure App Service is a collection of hosting and orchestration services comprised
    of Web App, Web App for Containers, and Mobile App. Web App, for example, enables
    developers to host web applications or APIs whereas Web App for Containers enables
    one to deploy and run containerized web apps with images from Docker Hub or a
    private Azure Container Registry.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: Data Storage
  id: totrans-78
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Azure SQL Database is a relational cloud database as a service, with built-in
    intelligence, specially built for applications with individual updates, inserts,
    and deletes (OLTP). Azure SQL Data Warehouse is a warehouse not strictly for OLTP
    workloads in that it is desired to be more straightforward to use for larger databases,
    with additional feature ability to pause to save on costs. SQL Database supports
    more active connections and concurrent queries than SQL Data Warehouse, whereas
    SQL Data Warehouse supports Polybase, which is a technology that accesses data
    outside of the database via the T-SQL language. Often these services are used
    in conjunction with a larger data architecture.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: Azure Cosmos DB is a globally distributed, multimodel database service that
    enables extremely low latency and massively scalable applications. It has native
    support for NoSQL and can support key-value, graph, column, and document data
    all in one service. Several different APIs including SQL, Apache Cassandra, and
    MongoDB can be used to access data, and multiple consistency choices are offered
    for low-latency and high-availability options such as strong, bounded staleness,
    and eventual. This offering is extremely useful for disparate types of data.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: Azure Data Lake Store is a no-limits data lake that stores unstructured, semistructured,
    and structured data, which are optimized for big data analytics workloads. It
    is massively scalable and built to the open Hadoop Distributed File System (HDFS)
    standard, thus integrating into many tools easily and allowing a straightforward
    migration of existing Hadoop and Spark data to the cloud. Data Lake Store can
    store trillions of files and a single file can be larger than one petabyte in
    size. Azure Blob Storage is a separate storage option that is a more general-purpose
    object store, including for big data analytics workloads, and comparison between
    them can be found at [`http://bit.ly/LakeVBlob`](http://bit.ly/LakeVBlob) .
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: Tools
  id: totrans-82
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Several tools and toolkits for developing and deploying AI solutions were mentioned
    within the previous sections as they related to services and infrastructure for
    AI, such as AZTK for deploying a Spark infrastructure and Batch Shipyard for executing
    batch and High Performance Computing (HPC) container workloads. In this section,
    we include a nonexhaustive summary of several other tools that are available on
    the Microsoft AI Platform.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: Azure Machine Learning Studio
  id: totrans-84
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Azure Machine Learning Studio is a serverless environment for training and deploying
    ML models. Studio provides a graphical user interface (GUI) with the ability to
    drag and drop easily configured modules for data preparation, training, scoring,
    and evaluation. Many prebuilt algorithms are included for common scenarios such
    as regression and classification, and extensibility is enabled through R and Python
    scripting modules where custom code can be inserted and connected to other modules.
    Although it is extremely useful for quickly developing custom ML solutions on
    smaller data set sizes, we do not recommend Azure Machine Learning Studio for
    developing deep learning solutions, as the size of input data is limited, as well
    as the hardware it is run on. Today, there is no ability to bring your own computing
    environment or manage scale-out computing across nodes with Azure Machine Learning
    Studio. Because of these factors, we recommend Azure Machine Learning services
    for developing deep learning solutions instead.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
- en: Integrated Development Environments
  id: totrans-86
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: With Microsoft Azure, any integrated development environment (IDE) or editor
    can be used to create AI applications. In several of the popular IDEs, there are
    plug-ins or extensions available that make it even simpler, such as publishing
    directly to Azure. For example, Visual Studio Code Tools for AI is an extension
    for Visual Studio Code that is a cross-platform open source IDE. Visual Studio
    Tools for AI is an extension for Visual Studio for developing AI applications
    with an ability to set remote computing contexts. At the time of this writing,
    we recommend using Visual Studio Tools for AI and include an example using this
    later in this chapter.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
- en: These IDEs have nice features to accelerate development, but, of course, other
    popular IDEs such as PyCharm and RStudio can be used to develop the code that
    will run on the Microsoft AI Platform and more extensions will become available
    over time. In addition, Jupyter notebooks can be leveraged and is already set
    up for development on the DSVM. Azure Notebooks are another option for running
    code with hosted Jupyter notebooks; Azure Notebooks is completely free, but these
    do not run on GPUs so are not as practical for deep learning solutions.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
- en: Deep Learning Frameworks
  id: totrans-89
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The Microsoft AI Platform is an open platform that builds on the best of open
    source technology. Deep learning frameworks such as the Microsoft Cognitive Toolkit
    (CNTK), Tensorflow, Caffe, and PyTorch, which are all open source projects, are
    supported throughout many of the tools, services, and infrastructure already mentioned.
    The DLVM comes preconfigured with many of the popular frameworks, and these frameworks
    can be used to develop AI solutions and be deployed on Azure, on Azure IOT Edge,
    or Windows Machine Learning, for example. These frameworks were discussed in more
    detail in Chapter [2](A463582_1_En_2_Chapter.html).
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: Broader Azure Platform
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In practice, there are many other components of Azure that are often used to
    build AI solutions, to complement the AI-specific services with other requirements
    such as dealing with ingestion and processing of streaming data flows, authentication,
    and dashboarding. For example, Azure IOT Hub allows developers to securely connect
    IOT assets to the cloud, Azure Stream Analytics enables SQL-like processing of
    real-time data, and Power BI builds on top of many different data sources to enable
    rich, interactive visualizations surfaced in dashboards.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: A couple of other commonly used services are Azure Functions and Azure Logic
    Apps, illustrated in an architecture in Figure [4-4](#Fig4). Azure Functions is
    a serverless service that enables developers to simply write the code they would
    like to execute without worrying about the underlying infrastructure on which
    to run the code, paying only when the code is run. The function that is written—in
    languages such as C#, Node.js, and Java—can be run on a schedule or triggered
    by an event such as an HTTP request or event in another Azure service. For example,
    a function can be triggered every time a new image is uploaded into Azure Blob
    Storage, which resizes the image and calls out to an AI model hosted through one
    of the example. Azure Logic Apps are also serverless and paid only when run, and
    can automate a business process. As a simple example, Azure Logic Apps can be
    activated when an e-mail arrives in Office 365, which then triggers a process
    to check on data in SQL Server and send a text message to an end user after verification.
    In addition to the services from Microsoft, there is also a marketplace of services
    and tools built on top of the Azure ecosystem.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_4_Fig4_HTML.jpg](A463582_1_En_4_Fig4_HTML.jpg)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
- en: Figure 4-4
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: Example architecture with the integrated components on the Azure Platform to
    manage data flows into end applications from [`http://bit.ly/AzureSQLArch`](http://bit.ly/AzureSQLArch)
    .
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
- en: Getting Started with the Deep Learning Virtual Machine
  id: totrans-97
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In the code examples that follow in the third part of this book, a GPU-enabled
    machine will be needed. If you are planning on using your own GPU-enabled machine
    to follow along with the code examples, you can skip this section; if not, read
    on. As we mentioned earlier, Azure offers a VM already preconfigured with many
    deep learning and ML libraries called DSVM/DLVM. We can create a DLVM using the
    portal or the Azure CLI. For instruction on provisioning a VM, see [`http://bit.ly/CreateDLVM`](http://bit.ly/CreateDLVM)
    . You can install the Azure CLI locally by following the instructions at [`http://bit.ly/AzureCLI`](http://bit.ly/AzureCLI)
    . If you don’t want to install anything, you can simply go to [`https://shell.azure.com`](https://shell.azure.com)
    `/` and use the CLI from there. Instructions on how to provision a DLVM/DSVM using
    the CLI can be found at [`http://bit.ly/DLVM-CLI`](http://bit.ly/DLVM-CLI) .
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
- en: To save you time and effort, Listing [4-1](#PC1) is a snippet of a set of commands
    that will create a Linux DSVM for you on an NC6 VM. It will also increase the
    drive size to 150 GB, open the appropriate port for the Jupyter notebook server,
    and create a Domain Name Service (DNS) name based on the name you gave the VM.
    The Azure CLI and by extension the Azure cloud shell are very powerful and accessible
    tools that can save you a lot of time.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-100
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Please make sure that you change the username and password to something appropriate
    in Listing [4-1](#PC1). Also, the code in Listing [4-1](#PC1) will create the
    VM in the EastUS region; if you would rather have it in a different region, feel
    free to change it. Once the VM is up and running you should be able to Secure
    shell (ssh) into it using the DNS name given to your VM as well as the username
    and password you specified.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: Running the Notebook Server
  id: totrans-102
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We are assuming that you have a Linux DLVM/DSVM set up and you are able to ssh
    into it. Once you have ssh’d into the machine, start the Jupyter notebook server.
    You can download the notebooks to the VM from [`http://bit.ly/Ch06Notebooks`](http://bit.ly/Ch06Notebooks)
    . Then navigate to the folder to which you downloaded the notebooks and run the
    code shown in Listing [4-2](#PC2) in the terminal.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-104
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Navigate to your browser and enter the IP or DNS of your VM such as `mydlvm.southcentralus.cloudapp.azure.com:9999`.
    Don’t forget the port number at the end.[¹](#Fn1) You will be asked to enter an
    authorization token, which can be seen in the terminal. If you want to configure
    your Jupyter notebook to use a username and password or set it up so that you
    don’t have to enter the port number or the other arguments, follow the guide at
    [`http://bit.ly/jupyternbook`](http://bit.ly/jupyternbook) .
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  id: totrans-106
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter outlined the Microsoft AI Platform set of services, tools, and
    infrastructure for building AI solutions. Building AI solutions requires lots
    of experimentation and specialized hardware for deep learning, and leveraging
    cloud computing combined with service and tools accelerates the development process
    of intelligence applications.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, AI is being infused in other ways across Microsoft’s products
    as well, such as on-premises solutions for AI such as SQL Server 2017 and Microsoft
    Machine Learning Server. SQL Server 2017 runs on Windows Server, Linux, and Docker
    and enables advanced in-database ML with scalable Python and R-based analytics.
    With SQL Server, models can be trained within the database without having to move
    data and predictions can be made naturally through stored procedures and native
    ML functions within the database engine. This capability is included within Azure
    SQL DB as well.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, a more detailed overview is available on the prebuilt AI
    that is available to infuse directly into applications.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
- en: Footnotes[1](#Fn1_source)
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
- en: The appropriate port must be open on the VM. For instructions on how to do this,
    please refer to the section on DSVM earlier in chapter.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
- en: 5. Cognitive Services and Custom Vision
  id: totrans-112
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Chapter [4](A463582_1_En_4_Chapter.html) introduced the tools, infrastructure,
    and services that are available to build the next generation of intelligent applications.
    These together form a platform that empowers data scientists and developers to
    build, train, and deploy ML and deep learning models on the intelligent cloud
    and intelligent edge.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
- en: As one option within the Microsoft AI Platform, organizations getting started
    on AI have the flexibility to use prebuilt AI capabilities using Cognitive Services.
    This enables organizations to jump start their AI efforts quickly and use Cognitive
    Services as the basis for developing intelligent, innovative applications. In
    this chapter, we describe how to use Cognitive Services. We also illustrate how
    to customize deep neural network models for computer vision tasks using the Custom
    Vision service as one example of a customizable cognitive service.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
- en: 'Prebuilt AI: Why and How?'
  id: totrans-115
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For years, researchers in the deep learning communities have been making tremendous
    progress on algorithms and leveraging state-of-art hardware to train deep learning
    models using publicly available large data sets (e.g., ImageNet, CIFAR-10, CIFAR-100,
    Places2, COCO, MegaFace, Switchboard, and many more). These public data sets are
    often used in competitions, and as a method for benchmarking for deep learning
    algorithms. In addition, many commercial and research organizations leverage private
    data sets to further improve the quality of their models.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
- en: To train a high-performing deep learning model often requires a significant
    amount of computing resources. Chapter [2](A463582_1_En_2_Chapter.html) described
    the amount of computing resources required to train a classifier on ImageNet (ranging
    from 256 to 1,024 Nvidia P100 GPUs). Even though training time has been decreasing
    significantly over time (from days to minutes), not every organization has at
    their disposal a large amount of GPU resources, nor the means to keep these GPU
    resources updated with both the latest hardware and software over time.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
- en: Researchers spend a significant amount of time fine-tuning their models. For
    example, the accuracy of classifying objects in the ImageNet data set has improved
    significantly from 71.8 percent to 97.3 percent (Russakovsky et al., 2015). Another
    example is the significant improvement made by researchers working on speech recognition
    using the Switchboard data set. Using a combination of neural-network-driven acoustic
    and language models, CNNs, and bidirectional long- and short-term memory models,
    Microsoft researchers reduce the error rate for speech recognition to 5.1 percent
    (Xiong et al., 2016). The deep-learning-based speech recognition models surpass
    the performance of professional human transcribers.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
- en: Pretrained deep learning models enable organizations to leverage the significant
    innovations made by researchers over the years and use the models immediately
    to solve common AI problems. For example, we can leverage speech-to-text APIs
    that are backed by high-quality speech models, or computer vision APIs that are
    trained on large data sets of faces, scenes, celebrities, and more. These enable
    organizations to quickly develop intelligent applications without spending a significant
    amount of time training the models.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
- en: In Chapter [2](A463582_1_En_2_Chapter.html), we introduce how transfer learning
    can be applied for computer vision tasks, where you can leverage pretrained models
    as base models and adapt them to new domains by providing new labeled images.
    To make it easier for organizations to use custom deep learning models, Custom
    Vision (one of the Cognitive Services) enables you to upload your images and train
    a custom image classifier quickly with the press of a few buttons. Similarly,
    you can customize acoustic models using Custom Speech (another cognitive service)
    through uploading domain-specific data (`.wav` files, text files, or both) to
    improve accuracy in various environments.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
- en: More Info
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
- en: Find out more about creating custom acoustic and language model using Custom
    Speech Service at [`http://bit.ly/CustomSpeech/`](https://azure.microsoft.com/en-us/services/cognitive-services/custom-speech-service/)
    .
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we focus on computer vision services. We walk through different
    types of prebuilt computer vision services that you can use out of the box. We
    then describe how to use the Custom Vision Service to train custom image classifiers.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
- en: Cognitive Services
  id: totrans-124
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Cognitive Services enables developers to get started quickly by leveraging prebuilt
    AI models. To develop an AI application that uses one or more of the Cognitive
    Services, developers leverage the APIs provided by each of the Cognitive Services.
    This enables developers to develop intelligent applications using various programming
    languages (e.g., C#, Java, JavaScript, PHP, Python, Ruby, etc.).
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
- en: Figure [5-1](#Fig1) shows how an application interacts with Cognitive Services.
    The application issues a request to a Cognitive Services URL. For example, a Request
    URL for using Cognitive Services to tag an image (identify what are the tags for
    objects found in an image) is `https://[location].api.cognitive.microsoft.com/vision/v1.0/tag`,
    where location refers to one of the support geographical regions where the APIs
    are created (e.g., West US, West US 2, East US, East US 2, West Europe, Southeast
    Asia, etc.). For a list of supported regions for Cognitive Services, refer to
    [`http://bit.ly/CogServices`](http://bit.ly/CogServices) .
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_5_Fig1_HTML.jpg](A463582_1_En_5_Fig1_HTML.jpg)'
  id: totrans-127
  prefs: []
  type: TYPE_IMG
- en: Figure 5-1
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
- en: Application using Cognitive Services
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
- en: Figure [5-2](#Fig2) shows the REST API documentation for Computer Vision APIs.
    When issuing a request to Cognitive Services, you will need to provide the content
    type and subscription key (referred to as Ocp-Apim-Subscription-Key) in the Request
    header. After the request has been processed, the results are returned as a JSON
    object. In Figure [5-3](#Fig3), you can see the tags (e.g., grass, outdoor, sky,
    etc.) that are returned after the application submits an image for tagging.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_5_Fig3_HTML.jpg](A463582_1_En_5_Fig3_HTML.jpg)'
  id: totrans-131
  prefs: []
  type: TYPE_IMG
- en: Figure 5-3
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
- en: JSON response for tag image request
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_5_Fig2_HTML.jpg](A463582_1_En_5_Fig2_HTML.jpg)'
  id: totrans-134
  prefs: []
  type: TYPE_IMG
- en: Figure 5-2
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
- en: 'REST API documentation for Computer Vision API. Source: [`http://bit.ly/ComVisionAPIv1`](http://bit.ly/ComVisionAPIv1)
    `.`'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
- en: What Types of Cognitive Services Are Available?
  id: totrans-137
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Cognitive Services provides a powerful set of prebuilt AI services, as follows.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
- en: 'Vision: Provides state-of-the-art image processing algorithms that provide
    image classification, captioning, optical character recognition (OCR), and content
    moderation.'
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Knowledge: Provides APIs to enable you to quickly extract question–answer pairs
    from user-provided frequently answered questions (FAQs), documents, and content.
    Other Knowledge APIs include custom decision service, knowledge exploration, and
    named entity recognition and disambiguation.'
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Language: Language Understanding (LUIS) enables developers to integrate powerful
    natural language understanding capabilities into various applications. Other Language
    services include Bing Spell Check, Text Analytics, Translations, and more.'
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Speech: Provides APIs for real-time speech translation, converting speech to
    text, speaker recognition, and customizing speech models.'
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Search: Provides APIs that provide developers with instant access to various
    Bing capabilities. These include the ability to perform autosuggestion, news search,
    web search, image search, video search, and custom search.'
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In this chapter, we describe how to use the Computer Vision APIs that are available
    as part of Cognitive Services. We refer the interested reader to continue exploring
    other Cognitive Services by visiting [`http://bit.ly/MSFTCogServices`](http://bit.ly/MSFTCogServices)
    . All Cognitive Services follow a similar request–response pattern, and you will
    be able to apply and adapt what you have learned from using the Computer Vision
    APIs to the other Cognitive Services.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
- en: Computer Vision APIs
  id: totrans-145
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Computer Vision APIs provide you with information about the objects that are
    found in an image. These APIs are based on years of research in applying deep
    learning algorithms to understand the content of an image. In this book, we describe
    some of these techniques for performing image classification and more. Using the
    Computer Vision APIs, these powerful image processing techniques are now available
    as prebuilt AI that you can use as the basis for creating innovative applications.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
- en: After the image is analyzed, the Computer Vision APIs return the tags that are
    most relevant to the image, and a caption describing the image. Figure [5-4](#Fig4)
    shows how to use the Computer Vision APIs to analyze an image and the returned
    results. The caption “a person standing in front of a screen” is also returned
    with a confidence score of 0.74.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_5_Fig4_HTML.jpg](A463582_1_En_5_Fig4_HTML.jpg)'
  id: totrans-148
  prefs: []
  type: TYPE_IMG
- en: Figure 5-4
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
- en: Using the Computer Vision APIs
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
- en: In addition, the Computer Vision APIs identified the faces in the image and
    returned information about the predicted gender and age for each of the faces.
    Figure [5-5](#Fig5) shows that there are two faces found in the image. One of
    the faces is a male, age 34, and the other face is a female, age 27\. The bounding
    boxes for each of the faces are returned. The predicted age is dependent on many
    factors within the image.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_5_Fig5_HTML.jpg](A463582_1_En_5_Fig5_HTML.jpg)'
  id: totrans-152
  prefs: []
  type: TYPE_IMG
- en: Figure 5-5
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
- en: Using Computer Vision APIs to analyze the image
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
- en: Other information about the image is returned as well. For example, the image
    is analyzed for whether it contains adult or inappropriate content. This is extremely
    useful for developers who are building web sites that enable user-contributed
    content. This enables developers to moderate the content that has been uploaded
    by analyzing the uploaded images for objectionable content.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
- en: More Info
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
- en: To learn more about the Computer Vision APIs, visit [`http://bit.ly/MSFTCompVision`](http://bit.ly/MSFTCompVision)
    .
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
- en: Using the Computer Vision APIs, developers can build innovative applications.
    For example, the [How-Old.​net](http://how-old.net) site (shown in Figure [5-6](#Fig6))
    was built using Computer Vision APIs. You see the results returned in Figure [5-7](#Fig7).
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_5_Fig7_HTML.jpg](A463582_1_En_5_Fig7_HTML.jpg)'
  id: totrans-159
  prefs: []
  type: TYPE_IMG
- en: Figure 5-7
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
- en: Results from How-Old.Net
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_5_Fig6_HTML.jpg](A463582_1_En_5_Fig6_HTML.jpg)'
  id: totrans-162
  prefs: []
  type: TYPE_IMG
- en: Figure 5-6
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
- en: How-Old.net
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
- en: Another example of an innovative application built using Computer Vision APIs
    is the Intelligent Kiosk. The Intelligent Kiosk consists of a set of intelligent
    experiences that showcase how to use Cognitive Services. It enables any ordinary
    web camera to be connected to a PC and turned into an intelligent camera.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
- en: One of the intelligent experiences, available as part of the kiosk, is the Realtime
    Crowd Insights samples (shown in Figure [5-8](#Fig8)). Realtime Crowd Insights
    uses the Computer Vision APIs as the foundation for capturing real-time information
    about the people interacting with the kiosk. These include understanding the number
    of unique people that are standing in front of the kiosk, counting of unique faces,
    and looking at the overall emotions. This sample provides the basis for developing
    interactive and intelligent experiences for kiosks that are deployed in retail
    malls and more.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_5_Fig8_HTML.jpg](A463582_1_En_5_Fig8_HTML.jpg)'
  id: totrans-167
  prefs: []
  type: TYPE_IMG
- en: Figure 5-8
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
- en: Intelligent Kiosk Realtime Crowd InsightsMore Info
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
- en: The code for Intelligent Kiosk is open source and is available at [`http://bit.ly/IntelligentKiosk`](http://bit.ly/IntelligentKiosk)
    .
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
- en: How to Use Optical Character Recognition–
  id: totrans-171
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The Computer Vision APIs enable you to perform OCR for printed and handwritten
    text. To do this, you can upload an image or provide the URL where the image is
    stored. The APIs will detect the text in the image and return in a JSON payload
    the characters that are recognized. Various languages are supported, including
    UNK (Autodetecting the language), English, Danish, Dutch, French, German, and
    many more. In Figure [5-9](#Fig9), we uploaded an image (shown on the left). You
    will see that the OCR APIs analyzed the image and returned the text found in the
    image (shown on the right).
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_5_Fig9_HTML.jpg](A463582_1_En_5_Fig9_HTML.jpg)'
  id: totrans-173
  prefs: []
  type: TYPE_IMG
- en: Figure 5-9
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
- en: Using the OCR APIsMore Info
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
- en: To learn more on using the OCR capabilities for Cognitive Services, visit [`http://bit.ly/MSFTocr`](http://bit.ly/MSFTocr)
    .
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
- en: How to Recognize Celebrities and Landmarks
  id: totrans-177
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The Computer Vision APIs enable you to recognize celebrities and landmarks.
    Cognitive Services refer to these as domain-specific models . To find out about
    the different domains (e.g., celebrities, landmarks) supported, you can use the
    `/models GET` request. Figure [5-10](#Fig10) shows how this is used to recognize
    “Donald E. Knuth” from the image provided on the right. Cognitive Services recognizes
    up to 200,000 celebrities.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_5_Fig10_HTML.jpg](A463582_1_En_5_Fig10_HTML.jpg)'
  id: totrans-179
  prefs: []
  type: TYPE_IMG
- en: Figure 5-10
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
- en: Using domain-specific models for celebrities
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
- en: In addition, the Computer Vision APIs can also recognize landmarks. Figure [5-11](#Fig11)
    shows how the API recognized Raffles Hotel, a tourist attraction in Singapore.
    Cognitive Services recognizes up to 9,000 natural and man-made landmarks.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_5_Fig11_HTML.jpg](A463582_1_En_5_Fig11_HTML.jpg)'
  id: totrans-183
  prefs: []
  type: TYPE_IMG
- en: Figure 5-11
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
- en: Using domain-specific models for landmarksMore Info
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
- en: To learn more on using Cognitive Services to recognize celebrities and landmarks,
    visit [`http://bit.ly/CelebLand`](http://bit.ly/CelebLand) .
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
- en: How Do I Get Started with Cognitive Services?
  id: totrans-187
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To get started with using Cognitive Services, log in to the Azure Portal (portal.azure.com).
    After you have logged in to the Azure Portal, you can choose to create a New Azure
    Resource. Select AI + Cognitive Services. In Figure [5-12](#Fig12) you will see
    all the Cognitive Services listed in the window.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_5_Fig12_HTML.jpg](A463582_1_En_5_Fig12_HTML.jpg)'
  id: totrans-189
  prefs: []
  type: TYPE_IMG
- en: Figure 5-12
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
- en: Creating a new Cognitive Services instance
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
- en: 'For illustration, let us select the Computer Vision API . Figure [5-13](#Fig13)
    shows the screenshot for creating a new Computer Vision API. After you click Create,
    you will be asked to name the API (shown in Figure [5-14](#Fig14)) and select
    the pricing tier for the API. For Computer Vision APIs, two tiers are available:
    FO Free and S1 Standard. The FO Free tier supports up to 20 calls per minute and
    5,000 calls per month. The S1 Standard tier supports 600 calls per minute. Both
    tiers enable you to use the Computer Vision APIs to analyze the content of an
    image, identify the most relevant tags, perform auto-captioning, perform OCR,
    and generate the thumbnail.'
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_5_Fig14_HTML.jpg](A463582_1_En_5_Fig14_HTML.jpg)'
  id: totrans-193
  prefs: []
  type: TYPE_IMG
- en: Figure 5-14
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
- en: Configuring the Computer Vision APIs
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_5_Fig13_HTML.jpg](A463582_1_En_5_Fig13_HTML.jpg)'
  id: totrans-196
  prefs: []
  type: TYPE_IMG
- en: Figure 5-13
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
- en: Create a new Cognitive Services Computer Vision API
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
- en: After the Computer Vision API has been created, you can manage it using the
    Azure Portal . Figure [5-15](#Fig15) shows how you can manage the newly created
    Computer Vision API. To use the API in your application, you will need to specify
    the API key. You can click Keys in the management window, which will show you
    the keys that are available. Figure [5-16](#Fig16) shows the two keys that are
    available. You can make use of the Primary and Secondary key during key rotation.
    You can use either of the keys in your application. This is specified as part
    of the Request header. If you are developing a .NET application to use Cognitive
    Services, the key is specified as part of the API call. Listing [5-1](#PC1) shows
    the sample code for accessing the Computer Vision APIs. For example, you should
    replace the `"{subscription key}"` placeholder in the code with the subscription
    key that you obtained from the Azure Portal .
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_5_Fig16_HTML.jpg](A463582_1_En_5_Fig16_HTML.jpg)'
  id: totrans-200
  prefs: []
  type: TYPE_IMG
- en: Figure 5-16
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
- en: Obtain the keys for Cognitive Services
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_5_Fig15_HTML.jpg](A463582_1_En_5_Fig15_HTML.jpg)'
  id: totrans-203
  prefs: []
  type: TYPE_IMG
- en: Figure 5-15
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
- en: Managing Cognitive Services
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-206
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Custom Vision
  id: totrans-207
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In Chapter [2](A463582_1_En_2_Chapter.html), we described how data scientists
    can make use of transfer learning to adapt CNNs to new domains. For example, a
    Resnet-50 CNN trained on ImageNet data can be adapted for image classification
    in other domains (e.g., health care, retail, manufacturing, etc.).
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
- en: Custom Vision is part of the family of Cognitive Services. Custom Vision enables
    you to quickly customize state-of-the-art computer vision models for your scenario,
    with a small set of labeled images. Underneath the hood, Custom Vision uses transfer
    learning and data augmentation techniques to train a custom model for your scenario.
    Figure [5-17](#Fig17) shows the main page for the Custom Vision service.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_5_Fig17_HTML.jpg](A463582_1_En_5_Fig17_HTML.jpg)'
  id: totrans-210
  prefs: []
  type: TYPE_IMG
- en: Figure 5-17
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
- en: Custom Vision (customvision.ai)More Info
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
- en: Did you know that you can use Custom Vision programmatically? Using C# or Python,
    you can programmatically create a Custom Vision project, add tags, upload images,
    and train the project. After the custom vision models are trained, you can retrieve
    the prediction URL and test the custom image classifier. To find out more, visit
    [`http://bit.ly/CustomVisionProg`](http://bit.ly/CustomVisionProg) .
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
- en: Hello World! for Custom Vision
  id: totrans-214
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this section, we will learn how to get started with Custom Vision. On the
    `customvision.ai` page, click Sign In. During the first sign in to Custom Vision,
    you will need to accept the terms of use. You will be prompted to indicate whether
    you want to use an Azure account, which will enable you to work with more Custom
    Vision projects. If you do not sign in to Azure, you will have access to fewer
    quotas. Figure [5-18](#Fig18) shows the initial page after you sign in. If you
    do not have an Azure subscription, you can click I’ll Do It Later.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_5_Fig18_HTML.jpg](A463582_1_En_5_Fig18_HTML.jpg)'
  id: totrans-216
  prefs: []
  type: TYPE_IMG
- en: Figure 5-18
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
- en: Custom Vision first sign in
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
- en: After you sign in, you can create your first Custom Vision project by clicking
    New Project. As shown in Figure [5-19](#Fig19), we create our first Hello World
    Custom Vision project. Several domains are provided that will enable you to customize
    the base model that is most relevant to your scenario. In this example, we selected
    General (Compact). Compact domains enable you to export the trained models, which
    we cover in a later section.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_5_Fig19_HTML.jpg](A463582_1_En_5_Fig19_HTML.jpg)'
  id: totrans-220
  prefs: []
  type: TYPE_IMG
- en: Figure 5-19
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
- en: Creating your first Custom Vision project
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
- en: Figure [5-20](#Fig20) shows an example of the intelligent zoo app that we want
    to develop. After you click Create Project , we are ready to get started (shown
    in Figure [5-21](#Fig21)). In this scenario, we want to develop an application
    that will enable children who are visiting the zoo to be able to take a picture
    of an animal and find out more information about each animal.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_5_Fig21_HTML.jpg](A463582_1_En_5_Fig21_HTML.jpg)'
  id: totrans-224
  prefs: []
  type: TYPE_IMG
- en: Figure 5-21
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
- en: Hello World Custom Vision project
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_5_Fig20_HTML.jpg](A463582_1_En_5_Fig20_HTML.jpg)'
  id: totrans-227
  prefs: []
  type: TYPE_IMG
- en: Figure 5-20
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
- en: 'Scenario: Intelligent Zoo app'
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
- en: We will need to build a custom image classifier for animals . To do this, we
    will leverage Custom Vision to train a custom classifier to distinguish between
    different types of animals, giraffes and elephants. To train the classifier, we
    upload training images of a giraffe (shown in Figure [5-22](#Fig22)) and elephants
    to Custom Vision. You can find images of giraffes and elephants using an image
    search in a search engine (e.g., Bing). After all the images are uploaded (shown
    in Figure [5-23](#Fig23)), we are ready to train the classifier. Click Train.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_5_Fig23_HTML.jpg](A463582_1_En_5_Fig23_HTML.jpg)'
  id: totrans-231
  prefs: []
  type: TYPE_IMG
- en: Figure 5-23
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
- en: Training images for giraffes and elephants
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_5_Fig22_HTML.jpg](A463582_1_En_5_Fig22_HTML.jpg)'
  id: totrans-234
  prefs: []
  type: TYPE_IMG
- en: Figure 5-22
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
- en: Uploading pictures of giraffes to Custom Vision
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
- en: After training is completed, you will see the evaluation results shown in Figure
    [5-24](#Fig24). The overall precision and recall metrics are returned. In addition,
    the performance for each tag (i.e., label or class) is also shown below. To use
    the Custom Vision mode, click Prediction URL . This corresponds to a REST endpoint
    that can be used in any application.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_5_Fig24_HTML.jpg](A463582_1_En_5_Fig24_HTML.jpg)'
  id: totrans-238
  prefs: []
  type: TYPE_IMG
- en: Figure 5-24
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
- en: Evaluation results from Training Iteration 1
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
- en: In addition, we can test the model by clicking Quick Test. We can either provide
    a URL to an image or upload an image to test the custom Computer Vision model.
    Figure [5-25](#Fig25) shows the result of uploading a test image and the results
    returned by the classifier.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_5_Fig25_HTML.jpg](A463582_1_En_5_Fig25_HTML.jpg)'
  id: totrans-242
  prefs: []
  type: TYPE_IMG
- en: Figure 5-25
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
- en: Quick Test using a test image of a giraffe
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
- en: Congratulations! We have just completed the training of a custom deep learning
    model using training images , corresponding to giraffes and elephants. To fully
    realize the scenario shown in Figure [5-20](#Fig20), we need to continue improving
    the custom image classifier by uploading images of other animals found in the
    zoo to Custom Vision. Using a limited set of training images per animal, we can
    quickly build a custom image classifier for animals.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
- en: Exporting Custom Vision Models
  id: totrans-246
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: After we have trained the model , we can develop an application that uses the
    prediction URL provided. We might also want the model to run on devices (e.g.,
    iPhone, iPads, Android tablets). The choice of whether you use a prediction URL
    or running devices on models depends on your use case. In situations where you
    want to be able to perform inferences when Internet connectivity is not available,
    or where you require low latency, having the models running on the device will
    be a good design choice.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
- en: To do this, and to develop applications that can consume the model offline,
    Custom Vision enables you to export the model . Click Export. This button is available
    only if we are using Compact models. You can export the models as CoreML, TensorFlow,
    or ONNX models. In addition, you can also export the Dockerfile to enable you
    to build a container that is able to serve the model.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
- en: Figure [5-26](#Fig26) shows the platforms that are available when exporting
    the models. Once we choose the relevant platform to export, the relevant files
    can be downloaded (e.g., `.mlmodel` for CoreML, `.zip` for TensorFlow, and `.onnx`
    for ONNX models). These models can then be easily integrated into iOS, Android,
    or Windows applications.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_5_Fig26_HTML.jpg](A463582_1_En_5_Fig26_HTML.jpg)'
  id: totrans-250
  prefs: []
  type: TYPE_IMG
- en: Figure 5-26
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
- en: Exporting Custom Vision models to CoreML or TensorFlow
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  id: totrans-253
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter discussed the different types of Cognitive Services that are available
    as part of the Microsoft AI Platform. These prebuilt AI capabilities enable developers
    in your organization to get started immediately with realizing the value of AI
    to develop innovative applications. In addition, we also illustrated how to adapt
    pretrained deep learning models for computer vision to new data using Custom Vision.
    This enables you to quickly train an image classification model by bringing your
    own data. To enable you to do AI on the intelligent edge (IoT edge device, iOS
    and Android devices), Custom Vision enables you to explore CoreML and TensorFlow
    models. This chapter only touched the surface of the different Cognitive Services
    available on the Microsoft AI Platform. We encourage you to explore others in
    more depth as well, such the Language Understanding service, Azure Search, and
    Custom Speech service, depending on your use case and needs.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 本章讨论了作为微软AI平台一部分的不同类型的认知服务。这些预构建的AI能力使您的组织中的开发者能够立即开始实现AI的价值，以开发创新的应用程序。此外，我们还说明了如何使用Custom
    Vision将预训练的深度学习模型适应于计算机视觉的新数据。这使得您能够通过提供自己的数据来快速训练一个图像分类模型。为了使您能够在智能边缘（物联网边缘设备、iOS和Android设备）上进行AI操作，Custom
    Vision使您能够探索CoreML和TensorFlow模型。本章仅触及了微软AI平台上可用的不同认知服务的表面。我们鼓励您也深入探索其他服务，例如语言理解服务、Azure搜索和自定义语音服务，具体取决于您的用例和需求。
- en: In the next set of chapters, rather than focus on using prebuilt AI capabilities
    as discussed here, we instead focus on an overview of how to build custom deep
    learning models, starting with an overview of common models such as CNNs in the
    next chapter.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一组章节中，我们不再关注使用此处讨论的预构建AI能力，而是专注于如何构建自定义深度学习模型的概述，下一章将从常见的模型，如CNNs，的概述开始。
