- en: 1. Rover Platform Overview
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Imagine this: You are an aspiring engineer and founder of a company called
    Advanced Technologies & Resources, LLC (ATR). Your company has just won a multi-million-dollar
    contract with the Egyptian government and Egyptian Supreme Council of Antiquities.
    The Egyptian government wants to explore the inner areas of the pyramids. This
    includes the caverns, wells, and pits found within the Great Pyramids at Giza.
    However, there is problem! Some of the caverns and wells are prone to sudden cave-ins,
    and there is the possibility of undetected “booby-traps” that were set by the
    pyramid builders themselves back in the year 2553 BC. Furthermore, poisonous gasses,
    such as carbon monoxide, have been accumulating within the tombs of the pyramids
    for more than 4,500 years, making these areas dangerous for human exploration.'
  prefs: []
  type: TYPE_NORMAL
- en: The Egyptian government wants to explore these areas without sending any human
    explorers or archaeologists into these unsafe and potentially deadly caverns or
    wells. However, they cannot send in standard robots, because the attached wires
    may cause irreparable damage to the interior structure and any artifacts. They
    also cannot send in wireless robots, since the radio- and data-links degrade with
    increasing distance between the human operator and the robot. Therefore, you must
    design, develop, program, simulate, construct, and finally deploy to the area
    of interest (AOI), a fully autonomous AI rover. It must explore these unknown
    areas without the rover’s getting lost either to caves-ins or undetected booby-traps.
    Because of the possibility of data-link loss, you must incorporate adaptive intelligence
    within the artificial intelligence (AI) rover. There also exists the genuine possibility
    of finding the lost treasures of both Pharaohs Khufu and Khafra within these unexplored
    caverns and wells located at the base of the pyramids (Figure [1-1](#Fig1)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/494112_1_En_1_Chapter/494112_1_En_1_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A still of the pyramids and tombs of Giza in Egypt.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-1
  prefs: []
  type: TYPE_NORMAL
- en: Pyramids and tombs of Giza, Egypt
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: The AI rover will need to be as self-reliant as possible to allow it to survive
    its intended tomb-raiding missions.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter Objectives
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The reader will be able to achieve the following by reading this chapter:'
  prefs: []
  type: TYPE_NORMAL
- en: Appreciate why specifications and requirements are important
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Create specifications and requirements for this project
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Understand the basic components of the AI rover
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Realize the importance of selecting the right chassis
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Realize the importance of the Robotic Operating System
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Realize the criticality of autopilot
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Realize the importance of Mission Planner software
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Be introduced to the concept of intelligent power analysis
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Defining Specifications and Requirements
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You must first write down what your new AI rover should do to complete a mission;
    for example, “Avoid obstacles,” “Explore new areas,” etc. Informally, these are
    the “requirements.” Defining the initial requirements gives us direction in planning
    development. Formally, the development of software specifications and requirements
    (SSR) forces us to first think about what we want the system to do. We are going
    to create a land-based AI rover using cognitive deep learning. The land-based
    AI rover will be designed to complete its mission of exploring dangerous and unknown
    environments.
  prefs: []
  type: TYPE_NORMAL
- en: SSRs are the key to successful software project development. Let’s now break
    SSRs into their component pieces. Requirements are what the system must do (the
    rover must avoid objects in its path); specifications are a technical formalization
    of how the requirements might be met (the rover will turn left if the object is
    less than 1 m from the right quadrant). SSRs evolve as discoveries, corrections,
    and updates about the system are made. SSRs take on a life of their own and ultimately
    transform into a creation that the reader may not have envisioned at the beginning
    of development.
  prefs: []
  type: TYPE_NORMAL
- en: The requirements are divided into functional and non-functional requirements.
    For example, “The rover shall return from a mission upon operator command” is
    a functional requirement. A functional requirement is a requirement that the human
    operator usually instigates or supervises. On the other hand, “The AI rover shall
    return if the battery falls below 50%” is a non-functional requirement. The rover
    will return without operator input.
  prefs: []
  type: TYPE_NORMAL
- en: '**Note** The AI rover would function the same if we chose other programming
    environments (Ada, C/C++, MATLAB, Java, etc.). This is why choosing the programming
    environment is functional, since we can see the source code within a development
    environment, or IDE.'
  prefs: []
  type: TYPE_NORMAL
- en: Requirements come from many different sources (interviews, observation, forms,
    developers, etc.) and are not always easily understood. Software designers have
    used the Universal Modeling Language (UML) to better understand requirements.
    In particular, a UML use-case diagram helps us understand functional requirements.
    Further development of the use case will introduce alternative paths to success,
    pre- and postconditions, and tests. These artifacts in turn allow us to generate
    specifications. Specifications are the formalization of the requirements. They
    can be read by any competent programmer as the outline of the function to be written.
    They are programming language independent.
  prefs: []
  type: TYPE_NORMAL
- en: This implies that without reasonable requirements, we will not have good functional
    specifications! We will use UML to ensure that all shareholders (technical and
    non-technical) understand the logic and structure of the system’s solutions.
  prefs: []
  type: TYPE_NORMAL
- en: Cognitive Deep Learning Subsystem (Move)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Our rover must search confined areas without GPS or data-link.
  prefs: []
  type: TYPE_NORMAL
- en: Because of this, the system will need to think for itself. To do this, we will
    use a cognitive deep learning system (Figure [1-2](#Fig2)), which is a system
    that uses a network of smaller deep learning neural networks that cooperate with
    each other. The cognitive system develops semi-optimal solutions in conditions
    never before experienced. In other words, the AI rover can autonomously function
    in new and unexpected environments.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/494112_1_En_1_Chapter/494112_1_En_1_Fig2_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A schematic of the cognitive deep learning system. Three concentric rectangles
    are labeled as follows. Neural Network N N, deep learning N N, and cognitive deep
    learning system.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-2
  prefs: []
  type: TYPE_NORMAL
- en: Visualizing a cognitive deep learning system
  prefs: []
  type: TYPE_NORMAL
- en: The hardware and software components necessary to create the cognitive deep
    learning system are the Raspberry Pi 4, the Robotic Operating System (ROS), and
    QGIS. The Raspberry Pi 4 is the hardware brain; the ROS coordinates the sensors
    the Raspberry Pi 4 needs; and the QGIS is the major consumer of the cognitive
    deep learning system data (Figure [1-3](#Fig3)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/494112_1_En_1_Chapter/494112_1_En_1_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A 3-part illustration of the cooperation between the Raspberry P i 4 module,
    Q G I S, and R O S. It consists of a chip labeled Raspberry P i 4 module at the
    top and the two logos of Q G I S software and robotic operating system at the
    bottom.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 1-3
  prefs: []
  type: TYPE_NORMAL
- en: Visualizing the cooperation between the Raspberry Pi 4 module, QGIS, and ROS
  prefs: []
  type: TYPE_NORMAL
- en: 'We use the following justifications for our choices of hardware and software
    components for the cognitive deep learning system:'
  prefs: []
  type: TYPE_NORMAL
- en: The Raspberry Pi 4 can handle the required extensive computations and commands
    of a cognitive deep learning controller. It also controls input and output devices
    to control the speed, direction, trajectory, and navigation. For its size, it
    has great power and excellent expansion capabilities (USB and general-purpose
    input-output [GPIO] ports).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Robotic Operating System (ROS) controls the simulated and physical AI rover.
    It allows us to quickly interface our cognitive deep learning system with external
    sensors and actuators. ROS contains internal libraries such as Simultaneous Localization
    and Mapping (SLAM) and QGIS for navigation.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: QGIS displays sensor and location data of the rover on its “map.” QGIS is essential
    for developing paths and waypoints. These waypoints allow the AI rover to revisit
    areas of interest (AOI). QGIS will communicate with the cognitive deep learning
    system via ROS.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The Pixhawk 4 autopilot will be used due to its low cost and proven reliability.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Basic System Components
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Our hardware components start with the GoPiGo robotic rover kit as our chassis.
    On this kit, we will use the Raspberry Pi 4 as the main processing unit and the
    Pixhawk 4 as the autopilot. The sensors are a LiDAR sweep sensor and a standard
    RGB camera.
  prefs: []
  type: TYPE_NORMAL
- en: Our software components start with Ubuntu Linux 18.4 as the host operating system
    for our project development. The GoPiGo rover uses the Robotic Operating System
    (ROS). We use Python 3.0 as the programming language. To help in the testing and
    development of our AI rover, we use the robotic simulators Gazebo and Rviz.
  prefs: []
  type: TYPE_NORMAL
- en: System Rationale (Optional)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: System Interfaces
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: There will be interfaces between the Raspberry Pi 4 USB ports and multiple devices,
    such as the Intel neural sticks, Pixhawk 4 interface, and potentially with the
    ground control station itself.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: User Interfaces
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Interfaces will be provided by the ground control station that will be developed
    within a Python development environment.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Hardware Interfaces
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Four USB ports are located within the Raspberry Pi 4 module. Raspberry 4 can
    also connect with the Intel neural sticks for higher-level cognitive processing
    capabilities that will be discussed later.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Raspberry Pi 4 has a single GPIO port for sensors and actuators.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Raspberry Pi 4 has a wireless modem for connecting to the internet or the PC
    or Apple laptop serving as the ground control station.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Pixhawk 4 has a CAN (controller area network), Ethernet, SPI, I2C, USB, etc.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Raspberry Pi 4 has a single camera interface.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Software Programming Requirements
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: There will be the need to use a programming language (Python) to support low-level
    devices such as USB, SPI, and I2C.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Multi-threading: There will be a number of sensors and actuators in the robot.
    There will be the need to support multi-threading.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Any Python development environment
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Raspberry Pi 4 Linux OS firmware
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: ROS interfaces with Raspberry Pi 4, Grass GIS applications, sensors, actuators,
    and autopilot.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Pixhawk 4 firmware and Mission Planner for Pixhawk 4.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Python’s performance as a programming language. Python has a reasonable ability
    to work with data being generated by high-bandwidth sensors, such as cameras and
    LiDAR.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Communication Interfaces
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: (Not a completed list. needs to be completed as an exercise.)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Raspberry Pi 4 module has Ethernet TCP/IP, wireless link (Wi-Fi), CAN, SPI,
    I2C, etc.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Pixhawk 4 autopilot has CAN, SPI, I2C, Ethernet, etc.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Memory Constraints
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Raspberry Pi 4 has 1 GB, 2 GB or 4 GB LPDDR4-2400 SDRAM.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Raspberry Pi 4 can be upgraded with a 500 GB solid-disk drive.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Pixhawk 4 does have some additional memory to program, but currently is limited
    to 128 KB (kilobytes).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Design Constraints (Optional)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Operations
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Search, retrieve, locate, and rescue.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Locate targets and/or threats of interests within unknown environments.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Explore unknown environments.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Deliver items or packages.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Site Adaptation Requirements
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: (Not at this time. However, this might be subject to change.)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Product Functions
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The ability to communicate between the Raspberry Pi 4, Pixhawk autopilot, and
    the ground control station; these are the three main communication nodes of an
    autonomous land AI rover.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: All of the intelligence functions of the AI rover within the Raspberry Pi 4
    node will execute the operations stated in “Operations” section just discussed.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: User Characteristics
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: User has the ability to deploy the vehicle for autonomous terrestrial missions.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Constraints, Assumptions, and Dependencies
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Power constraints of the rover battery
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The terrain that the AI rover might encounter
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As we progress in building this vehicle, additional constraints will be identified.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Other Requirements (Optional)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: External Interface Requirements
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The external electrical interface requirements for the autonomous land-based
    AI rover would be the voltage and current requirements of the interconnecting
    devices of the Raspberry Pi 4, the Pixhawk autopilot, and the PID (proportional
    integral differential) controller within the AI rover kit.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We will find additional external interface requirements within the land-based
    AI rover itself.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Functional Requirements
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Meet all previously stated requirements.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Performance Requirements
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The real-time characteristics of the AI rover will be revealed to us as we progress
    through the successive chapters of this book.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This will also cause us to develop revisions to the SSRs, as well as the subsequent
    UML diagrams and use cases dependent on the SSR.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Logical Database Requirement
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Not at this time. However, we could supplement the GIS applications found within
    the land-based AI rover to support database requirements in future versions.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Software System Attributes (Optional)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Reliability
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The reliability of a self-driving and self-exploring land-based AI rover is
    of the upmost importance. We will see that the software specifications, the UML
    use-case diagrams, and the AI rover simulators all contribute to a fully functioning
    system. We will see that as the SSR evolves, reliability can be built into any
    AI rover system from its initial origins.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Availability
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The autonomous AI rover must then be able to respond to sensor data. It must
    be able to quickly send information to the AI rover actuators and motors in the
    form of commands.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The autonomous AI rover must be able to send data to and receive data from the
    ground control station.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The autonomous AI rover must be able to use GIS information efficiently and
    make decisions based on that spatial data.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Security
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The autonomous AI rover must have limited situational awareness and be able
    to respond to threats within the environment.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It must also avoid potential areas in the topology of the exploration area or
    terrain that would cause the AI rover to become trapped between debris, rocks,
    or obstacles.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Maintainability
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The AI rover software and hardware must be maintainable with testing, documentation,
    and upgrades.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The AI rover software must be documented and maintained within SSRs, UML diagrams,
    and use-case charts. Any subsequent changes in either the source code of the software
    or within UML diagrams or use-case charts must be consistent. This means if you
    make any changes in the source code you must update your UML diagrams to reflect
    that specific change in software and vice versa.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The AI rover hardware must also be documented and must have clear schematic
    diagrams that are compliant with the Specifications. Any changes in the hardware
    must also be updated within the hardware schematics and or specifications.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Portability
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The use of Python will allow us to export and test the controlling software
    operating within both the AI rover and the ground control stations across multiple
    platforms. These platforms include the Raspberry Pi 4, the developing laptop,
    and possibly even cloud-based internet systems that could be used to test and
    analyze these same Python routines.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Architecture (Optional)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Functional Partitioning
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: There will be partitioning between software components.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There will also be partitioning between the hardware components.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We will have to decide as we progress through this book how these functional
    components will be partitioned.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Functional Description
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'The functional hardware description is as follows:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We have a Raspberry Pi 4 module (with possible expansionary Intel neural sticks)
    that is connected to an autopilot, whereupon this same autopilot is connected
    to the PID or control power electronics that power and provide electrical control
    signals to the AI rover. The autopilot or the wireless connection between the
    laptop and the Raspberry Pi 4 will allow the land-based AI rover to send and receive
    information to and from the ground control station.
  prefs: []
  type: TYPE_NORMAL
- en: 'The non-functional software description is as follows:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We have multiple Python routines operating within the Raspberry Pi 4 that are
    responsible for the cognitive deep learning routines, the controls for the drive
    system of the AI rover kit, and the communication software interface with the
    Pixhawk 4 autopilot. Likewise, there will also be Python routines within the ground
    control station that will serve as the human operator’s remote link with the land
    AI rover.
  prefs: []
  type: TYPE_NORMAL
- en: Control Description
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The software and hardware must allow the land-based AI rover to avoid obstacles
    and to complete the mission. Additionally, the human operator can override a decision
    made by the AI rover if needed.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The AI rover must interface with sensors, such as gyroscopes, inertial measurement
    units, accelerometers, and GPS. This allows for the necessary control of the trajectory,
    velocity, and acceleration of the land AI rover.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The cognitive deep learning algorithms then will be able to receive data from
    the sensors. This will allow the rover to efficiently explore an unknown environment
    within the correct tolerances of trajectory, velocity, and acceleration.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: All of this must be within a closed feedback-control system.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: AI Rover Statistical Analysis (Move)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Why use statistical analysis for the development of our AI rover?
  prefs: []
  type: TYPE_NORMAL
- en: Many people who seek to complete a complex project are only concerned with creating
    a working prototype. Since the Raspberry Pi 4 is limited in its memory resources,
    we will conduct statistical analysis on the software implementation. The purpose
    of this analysis is to identify, locate, and eliminate areas within the source
    code that are inefficient.
  prefs: []
  type: TYPE_NORMAL
- en: We will review techniques that implement optimization for cognitive deep learning
    networks. Optimization, in computer science, pinpoints the speed-time of programs
    to increase their efficiency. We will incrementally conduct analysis of the algorithms,
    implementations, and optimization of the AI rover operating system. We can also
    utilize these same implementations to find communication issues between the cognitive
    deep learning nodes, Raspberry Pi 4, Pixhawk 4 autopilot, and the proportional
    integral derivative (PID) control electronics of the Robot AI rover kit.
  prefs: []
  type: TYPE_NORMAL
- en: We will use these optimization techniques to find communication or control issues.
    We will also look at the vision-processing routines within the Raspberry Pi 4
    to determine if the computer vision algorithms are causing issues with the near
    real-time processing of the cognitive mission-planning routines or control routines.
  prefs: []
  type: TYPE_NORMAL
- en: 'Therefore, we will also review the standard questions, such as the following:'
  prefs: []
  type: TYPE_NORMAL
- en: What measurements of the AI rover should I collect?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What data or command inputs to the AI rover should I test?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How do I interpret and analyze the data derived from testing the AI rover?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These questions are important and will be answered as we test the rover in a
    robotic simulation environment. Once we are satisfied with the results of the
    simulations we can confirm the operating system is fully functional. We will then
    download the image of our simulation-trained cognitive AI controller into our
    physical Raspberry Pi AI rover. This is known as creating a “digital twin” for
    the AI rover.
  prefs: []
  type: TYPE_NORMAL
- en: The experimental algorithmic techniques facilitate better algorithm designs
    by identifying problem areas. This can improve control and cognitive deep learning
    routines, such as decision and control, memory hierarchies, and mission analysis.
  prefs: []
  type: TYPE_NORMAL
- en: Bayesian non-parametrics will be used to complete a review of non-parametric
    regression and classification for cognitive deep learning routines. This determines
    the uncertainty present within these cognitive deep learning routines and/or models.
    There will be two examples of this uncertainty testing. The first deals with determining
    the distance between the AI rover and the edge of a wall. The other identifies
    the terrain that the AI rover will be operating on. This terrain analysis will
    include a “go” or “no-go” analysis of the surrounding terrain topology to determine
    if the terrain is safe for the AI rover to travel. This will also aide in understanding
    the required mission analysis for the AI rover.
  prefs: []
  type: TYPE_NORMAL
- en: Selecting a Chassis
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The centerpiece of our project is the cognitive intelligence engine used for
    robotic control and mission pathfinding; it creates an extremely adaptable robotic
    platform. Thus, we could use many different types of robotic chassis. A wheeled
    chassis will achieve good efficiency, with a simple mechanical implementation.
  prefs: []
  type: TYPE_NORMAL
- en: The additional advantage of utilizing the wheeled chassis is the excellent balance
    afforded to the robot. This means that all four wheels of the AI rover will be
    making ground contact, and that the cognitive deep learning engine will not have
    to adapt itself to the dynamics of an unstable locomotion system. However, the
    cognitive deep learning engine could make adaptations to problems, such as one
    of the wheels’ being damaged. The AI rover will be required to have a suspension
    system to maintain constant wheel contact on uneven terrain.
  prefs: []
  type: TYPE_NORMAL
- en: The AI rover will need to focus on problems related to traction, stability,
    maneuverability, and control. Any off-the-shelf robotic AI rover kit that can
    be interfaced with the Raspberry Pi 4 and the Pixhawk 4 autopilot can be used
    with the exercises in this book. The critical concern is whether the wheels provide
    the required traction and stability for the AI rover to cover the desired terrain.
    What if the wheels of the AI rover cannot tolerate the velocities, accelerations,
    quick turns, and trajectories of the AI rover during an autonomous mission? There
    is a list of commercially available robot kits at the end of this chapter that
    can be used to complete the exercises contained in each chapter.
  prefs: []
  type: TYPE_NORMAL
- en: Robotic Operating System
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The Robotic Operating System (ROS) was designed to be an adaptable platform
    to support hobbyists, students, and aspiring engineers as they develop robot software.
    This platform is an assortment of tools, libraries, and development environments
    to help simplify the difficult task of creating complex and adaptable robotic
    platforms. These tools include simulation environments for simulating robotic
    systems such as our AI rover, sensors, physics, time, and dynamics of the AI rover
    and environment. ROS allows us to take the first steps to a cognitive autonomous
    controller AI rover system. ROS allows us to incorporate SLAM 3D mapping algorithms
    and to use the possibilities of geospatial informatics to analyze an environment
    for targets of interest. All of these capabilities are provided as libraries that
    can be imported or referenced by our cognitive deep learning program developed
    within the Anaconda Python development environment.
  prefs: []
  type: TYPE_NORMAL
- en: Pixhawk 4 Autopilot
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The Pixhawk 4 autopilot is used for non–decision making control of a vehicle
    and for simplifying the connections between inputs and outputs. The decision making
    comes from the operator that evaluates the conditions and status of the vehicle.
    Autopilots are typically embedded computing systems that control the actuators
    and PID controls of a vehicle.
  prefs: []
  type: TYPE_NORMAL
- en: The autopilot will be used for error correction and corrective feedback to the
    internal cognitive deep learning routines within the Raspberry Pi 4\. The cognitive
    intelligence engine and the autopilot will work together to correct *any* errors
    and return to desired mission parameters. Therefore, we can use two autopilot
    control structures. The first one would be the position of the AI rover itself,
    and the second would be rate of speed and/or the trajectory of the AI rover. Therefore,
    the Pixhawk 4 autopilot will always guarantee that the AI rover will follow the
    desired position profile. If the cognitive processor decides to move the vehicle
    at a high speed and turns sharply, this could cause the AI rover to flip over
    during a mission. The autopilot will prevent this possibility by alerting the
    cognitive processor to the danger.
  prefs: []
  type: TYPE_NORMAL
- en: The AI rover will receive training from simulations and will receive additional
    training/reinforcement from operations during the mission. The use of the Pixhawk
    4 autopilot adds additional back-up electronics. One of these is the data-link
    that allows the human operator to take over command of the AI rover. The other
    advantage of using the Pixhawk 4 autopilot is the Mission Planner software, which
    allows the human operator to determine the mission status. This allows the AI
    rover to have remote access to its very own GCS.
  prefs: []
  type: TYPE_NORMAL
- en: AI Rover Mission Analysis
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Mission analysis will look at what terrestrial operations the AI rover will
    be required to execute. This depends on its task. Will the task be a simple “follow-a-path”
    operation or something more complex?
  prefs: []
  type: TYPE_NORMAL
- en: 'Therefore, eight rules will be used for each AI rover mission:'
  prefs: []
  type: TYPE_NORMAL
- en: Define the mission. What are the challenges that are required for the AI rover?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Determine tasks to complete the mission. What are the goals that need to be
    completed by the AI rover?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Operational planning. This includes what type of sensors are being placed within
    the AI rover, power supplies, and possibly even the suspension system of the AI
    rover.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Risk assessment. Are there any associated threats, dangers, or uncertainties
    within the AI rover mission operations?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Communicate risk assessment. Make certain that the engineers, programmers, etc.
    know what mission the AI rover will perform.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Manage and minimize risk (risk management). Make certain the AI rover can effectively
    avoid all obstacles and dangers.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Perform the mission. Execute the mission.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Monitor and reassess. Examine how well the cognitive deep learning routines
    serve as an autonomous controller for the AI rover. Were there any anomalies,
    failures, or collisions encountered?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: AdruPilot Mission Planner Software
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The AdruPilot Mission Planner (AMP) is the software that will be the ground
    control system (GCS), and it can be integrated within a Python development environment.
    The Mission Planner software gives the AI rover the following capabilities:'
  prefs: []
  type: TYPE_NORMAL
- en: Point-and-click waypoint entry using Google Maps/Bing/Open street maps. The
    AI rover goes from waypoint to waypoint and uses its cognitive abilities to sense
    and avoid obstacles en route between successive waypoints.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Select mission commands from drop-down menus. Thus, the human operator has ultimate
    control over the AI rover during mission operations.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Download mission log files and analyze them. The human will be able to examine
    how the AI rover performed during a mission (i.e., were there any collisions during
    the mission?).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Configure AMP settings for your “airframe,” which in this case would be the
    actual chassis of the AMP-supported four-wheeled AI rover system.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Interface with a PC flight simulator or programmable development environment
    to create a full hardware-in-the-loop AI-enabled AI rover simulator. This interface
    capability will allow the Anaconda Python environment through a GIS library (QGIS,
    Grass GIS, or even Google Earth) to be interfaced with the Mission Planner software.
    We can extensively test the cognitive engine before every mission.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: See the output from AMP’s serial terminal from the AI rover.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: AI Rover Power Analysis
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Exploring the caves of Egypt will require endurance from the rover. In the simulation
    phase of development, a power analysis will be performed to increase the endurance
    of the rover. This will be improved upon during all subsequent missions to increase
    the duration and power utilization efficiency continuously. A general principle
    will be applied to the endurance of the AI rover. When the rover’s battery reaches
    50%, the vehicle will turn around and return to home. This return to home operation
    will use the most efficient path as determined by the AI system.
  prefs: []
  type: TYPE_NORMAL
- en: AI Rover Object-Oriented Programming
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Object-oriented programming (OOP) has advantages in that development is faster
    and cheaper, with better software maintainability. Unfortunately, the learning
    curve is more severe, the software is slower, and it uses more memory. Therefore,
    we will use UML to help us program the rover.
  prefs: []
  type: TYPE_NORMAL
- en: The OOP paradigm uses the concept of objects and classes. A class can be thought
    of as a template for objects. These can have their own attributes (characteristics
    they possess) and methods (actions they execute). All of these objects and classes
    can easily be modeled and evaluated within the UML format.
  prefs: []
  type: TYPE_NORMAL
