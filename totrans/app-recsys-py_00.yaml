- en: Preface
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 前言
- en: This book is dedicated to data scientists who are starting new recommendation
    engine projects from scratch but don’t have prior experience in this domain. They
    can easily learn concepts and gain practical knowledge with this book. Recommendation
    engines have recently gained a lot of traction and popularity in different domains
    and have a proven track record for increasing sales and revenue.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 本书献给那些从零开始新推荐引擎项目但在此领域没有先前经验的数据科学家。他们可以通过本书轻松学习概念并获得实际知识。推荐引擎最近在不同领域获得了大量的关注和流行，并有增加销售和收入的良好记录。
- en: This book is divided into eleven chapters. The first section, Chapters [1](537881_1_En_1_Chapter.xhtml)
    and [2](537881_1_En_2_Chapter.xhtml), covers basic approaches. The following section,
    which consists of Chapters [3](537881_1_En_3_Chapter.xhtml), [4](537881_1_En_4_Chapter.xhtml),
    [5](537881_1_En_5_Chapter.xhtml), and [6](537881_1_En_6_Chapter.xhtml), covers
    popular methods, including collaborative filtering-based, content-based, and hybrid
    recommendation systems. The next section, Chapters [7](537881_1_En_7_Chapter.xhtml)
    and [8](537881_1_En_8_Chapter.xhtml), discusses implementing systems using state-of-the-art
    machine learning algorithms. Chapters [9](537881_1_En_9_Chapter.xhtml), [10](537881_1_En_10_Chapter.xhtml),
    and [11](537881_1_En_11_Chapter.xhtml) discuss trending and emerging techniques
    in recommendation systems.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 本书分为十一章。第一部分，第 [1](537881_1_En_1_Chapter.xhtml) 章和 [2](537881_1_En_2_Chapter.xhtml)
    章，涵盖了基本方法。接下来的部分，包括第 [3](537881_1_En_3_Chapter.xhtml) 章、[4](537881_1_En_4_Chapter.xhtml)
    章、[5](537881_1_En_5_Chapter.xhtml) 章和 [6](537881_1_En_6_Chapter.xhtml) 章，涵盖了基于协同过滤、基于内容和混合推荐系统等流行方法。下一部分，第
    [7](537881_1_En_7_Chapter.xhtml) 章和 [8](537881_1_En_8_Chapter.xhtml) 章，讨论了使用最先进的机器学习算法实现系统。第
    [9](537881_1_En_9_Chapter.xhtml) 章、[10](537881_1_En_10_Chapter.xhtml) 章和 [11](537881_1_En_11_Chapter.xhtml)
    章讨论了推荐系统中的趋势和新兴技术。
- en: The code for the implementations in each chapter and the required datasets are
    available on GitHub at [`github.com/apress/applied-recommender-systems-python`](http://github.com/apress/applied-recommender-systems-python%25ef%25bb%25bf).
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 每章实现代码和所需数据集可在 GitHub 上找到，网址为[`github.com/apress/applied-recommender-systems-python`](http://github.com/apress/applied-recommender-systems-python%25ef%25bb%25bf)。
- en: To successfully perform all the projects in this book, you need Python 3.x or
    higher running on any Windows- or Unix-based operating system with a processor
    of 2.0 GHz or higher and a minimum of 4 GB RAM. You can download Python from Anaconda
    and leverage a Jupyter notebook for all coding purposes. This book assumes you
    know Keras basics and how to install machine learning and deep learning basic
    libraries.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 要成功完成本书中的所有项目，您需要在任何基于Windows或Unix的操作系统上运行Python 3.x或更高版本，处理器至少为2.0 GHz，并且至少有4
    GB的RAM。您可以从Anaconda下载Python，并利用Jupyter笔记本进行所有编码操作。本书假设您已了解Keras基础知识以及如何安装机器学习和深度学习的基本库。
- en: Please upgrade or install the latest versions of all the libraries.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 请升级或安装所有库的最新版本。
