- en: 1. Introduction to Artificial Intelligence
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 1. 人工智能简介
- en: This chapter provides a straightforward introduction to artificial intelligence
    (AI) , which in turn helps provide a framework for comprehending what AI is all
    about and why it is such an exciting and rapidly evolving field of study. Let’s
    start with some historical facts about the origins of AI.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 本章提供了对人工智能（AI）的简单介绍，这反过来又有助于提供一个框架来理解人工智能是什么以及为什么它是一个如此令人兴奋且快速发展的研究领域。让我们从一些关于人工智能起源的历史事实开始。
- en: AI Historical Origins
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能历史起源
- en: Remarkably, AI, or something akin to it, has been around for a very long time.
    It has been recorded that ancient Greek philosophers discussed automatons or machines
    with inherent intelligence. In 1517, the Prague Golem was created; it is shown
    in Figure [1-1](#Fig1).
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 令人惊讶的是，人工智能，或者类似的东西，已经存在了很长时间。有记录显示，古希腊哲学家讨论过具有内在智能的自动机或机器。1517年，布拉格的哥莱姆被创造出来；它如图[1-1](#Fig1)所示。
- en: '![A436848_1_En_1_Fig1_HTML.jpg](A436848_1_En_1_Fig1_HTML.jpg)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_1_Fig1_HTML.jpg](A436848_1_En_1_Fig1_HTML.jpg)'
- en: Figure 1-1.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-1。
- en: Prague Golem
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 布拉格哥莱姆
- en: The Golem is made of clay, but according to Jewish folklore, it could be animated
    to carry out various acts of vengeance and retribution to parties responsible
    for anti-Semitic acts.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 哥莱姆是由粘土制成的，但根据犹太民间传说，它可以被赋予生命来执行各种报复和报复行为，针对那些对犹太人进行反犹主义行为的人。
- en: René Descartes, a famous French philosopher, wrote in 1637 about the impossibility
    of machine intelligence in his Discourse on Method treatise. Descartes was not
    advocating AI, but the treatise does show it was on his mind.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 著名的法国哲学家勒内·笛卡尔在1637年关于方法的论文中写道，机器智能是不可能的。笛卡尔并不是提倡人工智能，但这篇论文确实表明它在他心中有所考虑。
- en: A more fanciful AI experiment example—or more appropriately stated, a hoax—is
    an automated chess player that made the rounds in Europe in the late 18th to mid-19th
    centuries. It was known as The Turk. A lithograph of it on a modern stamp is shown
    in Figure [1-2](#Fig2).
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 一个更为奇幻的人工智能实验例子——或者更准确地说，是一个骗局——是一个在18世纪末到19世纪中叶在欧洲流传的自动下棋选手。它被称为“土耳其人”。现代邮票上的它的一幅石版画如图[1-2](#Fig2)所示。
- en: '![A436848_1_En_1_Fig2_HTML.jpg](A436848_1_En_1_Fig2_HTML.jpg)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_1_Fig2_HTML.jpg](A436848_1_En_1_Fig2_HTML.jpg)'
- en: Figure 1-2.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-2。
- en: Automated chess player
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 自动下棋选手
- en: It was purported to be an intelligent machine that could play a game of chess
    against a human opponent. In reality, there was a human chess player jammed into
    the machine’s supporting box. He operated manipulators to move the machine’s chess
    pieces. I would suppose that there must have been a miniature periscope or peephole
    available to allow this hidden chess player the opportunity to surveil the chessboard.
    The odd name The Turk is from the German word Schachtürke, which means “automaton
    chess player.” The typical human chess master hidden in the box was so skilled
    that he would often win matches against notable opponents, including Napoleon
    Bonaparte and Benjamin Franklin. It was not until many years later that a real
    machine was available to actually play a reasonable chess game.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 据称，它是一台智能机器，可以与人类对手下棋。实际上，有一个人类棋手被塞进了机器的支撑箱里。他操作操纵杆来移动机器的棋子。我想，一定有一个微型潜望镜或窥视孔，以便让这个隐藏的棋手有机会监视棋盘。这个名字“土耳其人”来自德语单词Schachtürke，意为“自动棋手”。隐藏在箱子里的典型的人类棋手技艺高超，他经常在对阵著名对手的比赛中获胜，包括拿破仑·波拿巴和本杰明·富兰克林。直到许多年后，才有了真正能够进行合理棋局的机器。
- en: The advent of a scientific AI approach waited until 1943, upon the publication
    a paper by McCulloch and Pitts, in which they described “perceptrons,” a mathematical
    model based on real biological brain cells called neurons. In their paper, they
    accurately described how neuron cells fired in a binary fashion, similar to electronic
    binary circuits. They also went well beyond that simple comparison to show how
    such cells could dynamically change their function with time, essentially creating
    rudimentary behavioral actions. This seminal paper was the first in a long series
    that established an important AI research area concerned with neural networks.
    I discuss this topic in greater detail in a later chapter.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 科学人工智能方法的诞生直到1943年，随着麦卡洛克和皮茨发表的一篇论文，他们描述了“感知器”，这是一个基于真实生物脑细胞（神经元）的数学模型。在他们的论文中，他们准确地描述了神经元细胞以二进制方式放电，类似于电子二进制电路。他们还远远超出了这个简单的比较，展示了这些细胞如何随着时间的推移动态地改变其功能，本质上创造了基本的行动行为。这篇开创性的论文是建立了一个重要的AI研究领域——神经网络研究——的第一个系列论文中的第一篇。我将在后面的章节中更详细地讨论这个话题。
- en: 'In 1947, Alan M. Turing wrote:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在1947年，艾伦·M·图灵写道：
- en: In my opinion, this problem of making a large memory available at reasonably
    short notice is much more important than doing operations such as multiplication
    at high speed. Speed is necessary if the machine is to work fast enough for [it]
    to be commercially valuable, but a large storage is necessary if it is to be capable
    of anything more than rather trivial operations. The storage capability is therefore
    the more fundamental requirement.
  id: totrans-16
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在我看来，这个问题，即在合理短的时间内提供大量内存，比在高速下进行乘法等操作更为重要。如果机器要足够快以使其具有商业价值，速度是必要的，但如果要能够进行比相当琐碎的操作更复杂的操作，那么大量的存储是必要的。因此，存储能力是更基本的要求。
- en: Turing, who many readers may recognize as the genius behind the effort to decode
    the German Enigma machine that considerably shortened the duration of WWII, also
    recognized in this short paragraph that any future machine “intelligence” would
    be predicated upon having sufficient machine memory available and not be solely
    reliant on computing speed. I have more to say about Turing a bit later in this
    chapter when the Turing test is discussed.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 图灵，许多读者可能认识他为解码德国恩尼格玛机器的天才，这大大缩短了二战的持续时间，他也在这段简短的文字中认识到，任何未来的机器“智能”都将基于有足够的机器内存可用，而不仅仅依赖于计算速度。我将在本章稍后讨论图灵测试时，对图灵有更多的话要说。
- en: In 1951, a young mathematics PhD candidate named Marvin Minsky, along with Dean
    Edmonds, designed and built an analog computer based on the perceptrons described
    in the McCulloch and Pitts paper. This computer was named the Stochastic Neural
    Analog Reinforcement Computer (SNARC) . It consisted of 40 vacuum tube neuron
    modules, which in turn controlled many additional valves, motors, gears, clutches,
    and actuators. This system was a randomly connected network of Hebb synapses that
    made up a neural network learning machine. The SNARC was possibly the first artificial
    self-learning machine. It successfully modeled the behavior of a rat traversing
    a maze in a search of food. This system exhibited some rudimentary “learning”
    behaviors that allowed the rat sim to eventually negotiate the maze.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在1951年，一位名叫马文·明斯基的年轻数学博士候选人，与爱德蒙兹院长一起，设计并构建了一台基于麦卡洛奇和皮茨论文中描述的感知器原理的模拟计算机。这台计算机被命名为随机神经网络模拟强化计算机（SNARC）。它由40个真空管神经元模块组成，这些模块又控制了许多额外的阀门、电机、齿轮、离合器和执行器。这个系统是一个由赫布突触组成的随机连接网络，构成了一个神经网络学习机器。SNARC可能是第一个人工自学习机器。它成功地模拟了老鼠穿越迷宫寻找食物的行为。这个系统表现出一些基本的“学习”行为，使得老鼠模拟最终能够解决迷宫。
- en: A real turning point in AI progress happened in 1956 during an AI conference
    at Dartmouth College. This meeting was held at the behest of Minsky, John McCarthy,
    and Claude Shannon to explore the new field of AI. Claude Shannon has often been
    referred to as the “father of information theory” in recognition of his brilliant
    work accomplished at the prestigious Bell Telephone Lab in Holmdel, NJ.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能进步的一个真正转折点发生在1956年，当时在达特茅斯学院举行了一次人工智能会议。这次会议是在麦斯基、约翰·麦卡锡和克劳德·香农的要求下举行的，旨在探索人工智能这一新领域。克劳德·香农因其在美国新泽西州霍姆德尔著名的贝尔电话实验室所取得的杰出工作而经常被称为“信息论之父”。
- en: John McCarthy was no slouch either, as he was the first to use the phrase “[artificial
    intelligence](https://en.wikipedia.org/wiki/Artificial_intelligence),” and the
    creator of the [Lisp](https://en.wikipedia.org/wiki/Lisp_(programming_language))
    programming language family. He was a significant influence in the design of the
    [ALGOL](https://en.wikipedia.org/wiki/ALGOL) programming language. He also contributed
    significantly to the concept of computer [timesharing](https://en.wikipedia.org/wiki/Timesharing),
    which makes modern computer networks possible. Minsky and McCarthy were also the
    founders of the MIT Media Lab, now known as the MIT Computer Science and Artificial
    Intelligence Lab.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 约翰·麦卡锡也不是等闲之辈，他是第一个使用“[人工智能](https://en.wikipedia.org/wiki/Artificial_intelligence)”这个短语的人，同时也是Lisp编程语言家族的创造者。他在ALGOL编程语言的设计中发挥了重要作用。他还极大地贡献了计算机[时分共享](https://en.wikipedia.org/wiki/Timesharing)的概念，这使得现代计算机网络成为可能。麦斯基和麦卡锡也是麻省理工学院媒体实验室的创始人，该实验室现被称为麻省理工学院计算机科学与人工智能实验室。
- en: 'Returning to the 1956 conference, McCarthy stated this now classic definition
    of AI, which as far as I know, remains the “gold standard” that most people use
    when asked to define AI:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 回到1956年的会议，麦卡锡提出了现在已成为经典的AI定义，据我所知，这仍然是大多数人被要求定义AI时使用的“黄金标准”：
- en: It is the science and engineering of making intelligent machines, especially
    intelligent computer programs. It is related to the similar task of using computers
    to understand human intelligence, but AI does not have to confine itself to methods
    that are biologically observable.
  id: totrans-22
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这是制造智能机器的科学和工程，特别是智能计算机程序。它与使用计算机来理解人类智能的类似任务相关，但人工智能不必局限于生物可观察的方法。
- en: McCarthy used the phrase human intelligence in this definition, which I further
    explore a little later in this chapter. There were many other fundamental AI concepts
    set forth in this conference, which I cannot further explain in this book, but
    I urge interested readers to further explore.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 麦卡锡在这个定义中使用了“人类智能”这个短语，我将在本章稍后进一步探讨。这次会议还提出了许多其他基本的AI概念，我在这本书中无法进一步解释，但我敦促感兴趣的读者进一步探索。
- en: The 1960s was a very progressive decade in terms of AI research. Arguably, the
    work of Newell and Simon in detailing the General Problem Solver algorithm stands
    out. This approach used both computer and human problem-solving techniques. Unfortunately,
    computer development was still evolving, and memory and speed capabilities to
    efficiently handle the algorithm’s requirements were simply not present. (Remember
    Turing’s warning that I earlier discussed.) The General Problem Solver project
    was eventually abandoned—not because it was theoretically incorrect, but because
    the hardware needed to implement it was simply not available.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 20世纪60年代在人工智能研究方面是一个非常进步的十年。可以说，纽厄尔和西蒙在详细阐述通用问题求解器算法方面的工作是突出的。这种方法结合了计算机和人类解决问题的技术。不幸的是，计算机的发展仍在演进中，内存和速度能力不足以高效地处理算法的要求。
    (记住我之前讨论过的图灵的警告。) 通用问题求解器项目最终被放弃——不是因为它在理论上是错误的，而是因为实现它的硬件根本不可用。
- en: Another significant AI contribution during this 1960s was Lofti Zadeh’s introduction
    of fuzzy sets and logic, which were the foundation of the impressive AI branch
    known as fuzzy logic. Zadeh discussed how computers do not necessarily have to
    behave in a precise and discrete logical pattern, but instead take a more human-like
    fuzzy logic approach. I present an interesting fuzzy logic project in Chapter
    [5](A436848_1_En_5_Chapter.html).
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 20世纪60年代人工智能的另一个重大贡献是洛夫蒂·扎德引入了模糊集合和逻辑，这是令人印象深刻的人工智能分支——模糊逻辑的基础。扎德讨论了计算机不必一定以精确和离散的逻辑模式行为，而是采取更类似于人类的模糊逻辑方法。我在第[5](A436848_1_En_5_Chapter.html)章中介绍了一个有趣的模糊逻辑项目。
- en: One unfortunate outcome from the ongoing research in the 1960s was the prediction
    that a computer could mimic a human brain. Of course, the computing power available
    to do fundamental research on how a human brain realistically functions was simply
    not available at that time. This led to much disappointment and disillusionment
    in the AI community.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 20世纪60年代进行的研究中不幸的一个结果是预测计算机可以模仿人脑。当然，当时可用于进行关于人脑如何真实运作的基础研究计算能力是根本不存在的。这导致了人工智能社区中的许多失望和幻灭。
- en: The process of mimicking or somehow copying how the human brain works, and placing
    that functionality into a machine, has been termed as the classical AI approach.
    This has led to deep divisions within the AI community, where many researchers
    believe that machines should become intelligent in their own manner rather than
    mimicking human intelligence. The later approach has been termed modern AI.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 模仿或以某种方式复制人脑的工作过程，并将这种功能放入机器中的过程被称为经典的人工智能方法。这导致了人工智能社区内部的深刻分歧，许多研究人员认为机器应该以自己的方式变得智能，而不是模仿人类智能。后一种方法被称为现代人工智能。
- en: There was considerable work in the late 1960s on how a computer could converse
    with a human by using natural language instead of computer code. One clever program
    created by Joseph Weisenbaum during this time was named ELIZA. While primitive
    by today’s standards, it was still able to fool some users into thinking that
    they were conversing with another human instead of a machine. The ELIZA project
    brings up a very interesting topic regarding how one might determine if a machine
    has reached some level of “intelligence.” One good answer lies in what is known
    as the Turing test, which I mentioned earlier. In a 1950 article in the Journal
    of Computing Machinery and Intelligence, Alan Turing discussed what he felt were
    sufficient conditions for considering a machine to have reached an intelligent
    state. He essentially argued that if a machine could successfully fool a knowledgeable
    human observer into thinking that he was having a conversation with another human
    instead of a machine, then the machine could be considered intelligent. Of course,
    the conversation would have had to done using a neutral communications channel
    to avoid the obvious clues of voice or appearance giving away the machine. Teletypes
    were the communication devices used in the 1950s to implement the neutral channel.
    The Turing test is still a reasonable benchmark, even considering today’s technologies.
    One could even use highly effective modern voice recognition and synthesis technologies
    to further fool the observer. The Turing test is still controversial among philosophers
    and other interested parties who discuss the nature of intelligence.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在20世纪60年代末，人们投入了大量精力研究如何让计算机通过自然语言而非计算机代码与人类进行对话。在这段时间里，约瑟夫·魏森鲍姆（Joseph Weisenbaum）创造了一个非常巧妙的程序，名为ELIZA。尽管按照今天的标准来看它相当原始，但它仍然能够欺骗一些用户，让他们误以为自己在与另一个人而不是一台机器进行对话。ELIZA项目引发了一个非常有趣的话题，即如何判断一台机器是否达到了某种程度的“智能”。一个很好的答案就是所谓的图灵测试，我之前提到过。在1950年《计算机制与智能》杂志的一篇文章中，艾伦·图灵（Alan
    Turing）讨论了他认为使一台机器达到智能状态的充分条件。他基本上认为，如果一台机器能够成功地欺骗一个知识渊博的人类观察者，让他误以为自己是在与另一个人而不是机器进行对话，那么这台机器就可以被认为是智能的。当然，对话必须通过一个中立的通信渠道进行，以避免声音或外观等明显线索暴露出机器。20世纪50年代使用的通信设备是电传打字机，用于实现中立渠道。即使考虑到今天的科技，图灵测试仍然是一个合理的基准。甚至可以使用高度有效的现代语音识别和合成技术来进一步欺骗观察者。图灵测试在哲学家和其他讨论智能本质的感兴趣人士中仍然存在争议。
- en: In the 1970s, AI was slow to mature, due to the slow growth of computing technology
    . There was a lot of interest in natural language processing and image recognition
    and analysis, but unfortunately, the computers available to researchers were still
    quite limited and not up to these difficult tasks. It soon became apparent that
    there would have to be significant improvement in processing power before AI could
    really progress. In addition, there were also significant philosophical arguments
    against AI, including the famous “Chinese room” argument postulated by John Searle.
    Minsky argued against Searle’s hypothesis, which only led to a lot of infighting
    and misdirection in ongoing research. Meanwhile, McCarthy argued for a modern
    AI approach, stating that human intelligence and machine intelligence are different
    and should be treated that way.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在20世纪70年代，由于计算技术的缓慢发展，人工智能的发展缓慢。人们对自然语言处理、图像识别和分析非常感兴趣，但不幸的是，研究人员可用的计算机仍然相当有限，无法完成这些困难的任务。很快，很明显，在人工智能真正取得进展之前，必须显著提高处理能力。此外，还有许多关于人工智能的哲学争论，包括约翰·塞尔（John
    Searle）提出的著名的“中文房间”论证。明斯基（Minsky）反对塞尔的假设，这仅仅导致了持续研究中大量的内斗和误导。与此同时，麦卡锡（McCarthy）主张一种现代人工智能方法，他认为人类智能和机器智能是不同的，应该这样对待。
- en: 'The 1980s showed considerable improvement in AI development due to the onset
    of the PC and many researchers taking on McCarthy’s pragmatic approach. The advent
    of expert systems happened in this timeframe, which showed great promise and actual
    applications in the business and industrial/manufacturing sectors. I demonstrate
    several expert system applications in later chapters. The classic AI methodology
    continued; however, the modern approach was rapidly gaining acceptance, and perhaps
    more importantly, was used in many real-world situations. Coincidentally, there
    was a lot being done with robotics and real robot development at this time. AI
    research naturally gravitated to this area, because the areas seemed perfectly
    complementary. The age of practical AI had finally arrived and future developments
    came quickly, as the age of modern computing was also happening. It was about
    this time that the real impact of Moore’s law became apparent. Moore’s law refers
    to Gordon Moore, one of Intel’s founders, who stated in 1965: “The number of transistors
    per square inch on integrated circuits has doubled every year since their invention.”'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 20世纪80年代，由于个人电脑的出现和许多研究人员采用麦克阿瑟的实用主义方法，人工智能的发展取得了显著的进步。在这个时间段内，专家系统的出现显示出巨大的潜力，并在商业和工业/制造业领域得到了实际应用。我在后面的章节中展示了几个专家系统应用。经典的AI方法继续存在；然而，现代方法迅速得到认可，并且更重要的是，它被用于许多现实世界的情况。巧合的是，当时在机器人技术和真实机器人开发方面也做了很多工作。人工智能研究自然地转向了这个领域，因为这两个领域似乎完美互补。实用人工智能的时代终于到来了，未来的发展也迅速到来，因为现代计算的时代也在发生。正是在这个时候，摩尔定律的真实影响变得明显。摩尔定律指的是英特尔创始人之一戈登·摩尔在1965年所说的话：“自集成电路发明以来，每平方英寸的晶体管数量每年翻一番。”
- en: This exponential growth in density seems to correlate nicely with the incredible
    improvement in computer performance, which is so sorely need for AI improvement
    and growth.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这种密度的指数级增长似乎与计算机性能的惊人提升密切相关，这对于人工智能的改进和增长是极其需要的。
- en: 'Significant milestones where reached in the 1990s, including the impressive
    win in 1997 by IBM’s Deep Blue computer system over world grand-champion chess
    master, Garry Kasparov. Despite how impressive this win was, there was cold water
    thrown on this event. The stark reality of the win should be tempered by the following
    observation of McCarthy when he was asked specifically about a computer winning
    Go, a traditional Chinese board game :'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在1990年代取得了显著的里程碑，包括IBM的Deep Blue计算机系统在1997年击败世界围棋冠军、加里·卡斯帕罗夫的令人印象深刻的胜利。尽管这场胜利非常令人印象深刻，但有人对此事件泼了冷水。这场胜利的冷酷现实应该被以下麦克阿瑟的观察所缓和，当时他被问及计算机是否能够赢得围棋，一种传统的中国棋类游戏：
- en: The Chinese and Japanese game of Go is also a board game in which the players
    take turns moving. Go exposes the weakness of our present understanding of the
    intellectual mechanisms involved in human game playing. Go programs are very bad
    players, in spite of considerable effort (not as much as for chess). The problem
    seems to be that a position in Go has to be divided mentally into a collection
    of suppositions which are first analyzed separately followed by an analysis of
    their interaction. Humans use this in chess also, but chess programs consider
    the position as a whole. Chess programs compensate for the lack of this intellectual
    mechanism by doing thousands or, in the case of Deep Blue, many millions of times
    as much computation.
  id: totrans-33
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 中国和日本的围棋也是一种棋类游戏，玩家轮流移动。围棋揭示了我们对人类游戏中所涉及的智力机制的现有理解存在的弱点。尽管投入了相当大的努力（不如围棋那么多），围棋程序仍然是非常糟糕的玩家。问题似乎在于围棋的位置必须心理上分成一系列假设，这些假设首先分别分析，然后分析它们的相互作用。人类在围棋中也使用这种方法，但围棋程序将位置视为一个整体。围棋程序通过进行数千次或Deep
    Blue案例中的数百万次计算来弥补这种智力机制的缺乏。
- en: 'This prescient analysis should assuage any reader’s fear that computers are
    any nearer obtaining a human-level intellect featured in many science fiction
    movies, including The Terminator series, 2001: A Space Odyssey, and the classic
    War Games. There is a long way to go and much more research to be completed before
    computing systems become truly intelligent. This is the subject of the next section.'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 这种先见之明的分析应该可以缓解任何读者对计算机在许多科幻电影中获得的类似于《终结者》系列、《2001太空漫游》和经典电影《电子战》中的人类水平智力的恐惧。在计算系统真正变得智能之前，还有很长的路要走，还有更多研究需要完成。这是下一节的主题。
- en: Intelligence
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 智力
- en: 'Discussing the nature of intelligence is always a topic in beginning AI courses.
    Students most often wind up using circular reasoning when trying to come to grips
    with how to define what it is and how to recognize it. Exploring intelligence
    also usually ends in creating an almost endless list of questions, such as:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 讨论智能的本质始终是初学者人工智能课程中的主题。学生们在试图理解如何定义智能以及如何识别它时，最常陷入循环推理。探索智能通常也会导致创建几乎无穷无尽的问题列表，例如：
- en: Are mice intelligent?
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 鼠是否智能？
- en: What does it mean for a machine to be intelligent?
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于一台机器来说，智能意味着什么？
- en: Are dolphins the smartest mammals in the sea?
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 海豚是海洋中最聪明的哺乳动物吗？
- en: How would an extraterrestrial recognize intelligence on Earth?
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 外星人将如何识别地球上的智能？
- en: 'One could continue ad infinitum with questions like these. Perhaps, on retrospect,
    just creating questions like these is a sure sign of intelligence. You can now
    see what I meant by circular reasoning. It turns out that agreeing to a common
    definition of intelligence is a difficult, if not impossible, action. There are
    dictionary definitions of intelligence, such as the following from Meriam-Webster
    online :'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 可以无限地提出类似的问题。也许，回顾过去，仅仅提出这样的问题就是智能的明确标志。现在您应该明白我所说的循环推理是什么意思了。事实证明，达成对智能的普遍定义是一项困难，如果不是不可能的任务。例如，以下是从
    Meriam-Webster 在线词典中找到的智能的定义：
- en: 'a (1): the ability to learn or understand or to deal with new or trying situations
    : [reason](https://www.merriam-webster.com/dictionary/reason) ; also: the skilled
    use of reason (2): the ability to apply knowledge to manipulate one’s environment
    or to think abstractly as measured by objective criteria (as tests), b Christian
    Science : the basic eternal quality of divine Mind, c: mental acuteness : [shrewdness](https://www.merriam-webster.com/dictionary/shrewdness)'
  id: totrans-42
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 'a (1): 学习或理解或处理新或困难情况的能力：[理由](https://www.merriam-webster.com/dictionary/reason)；也：合理运用推理的能力（2）：应用知识来操纵环境或抽象思考的能力，这种能力可以通过客观标准（如测试）来衡量，b
    基督科学：神圣心智的基本永恒品质，c：思维敏捷：[精明](https://www.merriam-webster.com/dictionary/shrewdness)'
- en: 'a: an [intelligent](https://www.merriam-webster.com/dictionary/intelligent)
    entity; especially : [angel](https://www.merriam-webster.com/dictionary/angel)
    , b: intelligent minds or mind <cosmic intelligence>'
  id: totrans-43
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: a：智能实体；特别是：[天使](https://www.merriam-webster.com/dictionary/angel)，b：智能思想或心智
    <宇宙智能>
- en: 'the act of understanding : [comprehension](https://www.merriam-webster.com/dictionary/comprehension)'
  id: totrans-44
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理解的行为：[理解](https://www.merriam-webster.com/dictionary/comprehension)
- en: 'a: [information](https://www.merriam-webster.com/dictionary/information) ,
    [news](https://www.merriam-webster.com/dictionary/news) b: information concerning
    an enemy or possible enemy or an area; also: an agency engaged in obtaining such
    information'
  id: totrans-45
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: a：[信息](https://www.merriam-webster.com/dictionary/information)，[新闻](https://www.merriam-webster.com/dictionary/news)，b：关于敌人或可能的敌人或地区的情报；也：从事获取此类情报的机构
- en: the ability to perform computer functions
  id: totrans-46
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 执行计算机功能的能力
- en: As you can readily see, the dictionary editors were widely diverse in trying
    to capture the definition of intelligence, including human behaviors, spiritual
    aspects, religion, and finally and somewhat interesting, a fifth-level definition
    of performing computer functions.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所 readily see，词典编辑们在尝试捕捉智能的定义时具有广泛的多样性，包括人类行为、精神层面、宗教，最后还有一点有趣的是，第五级定义是执行计算机功能。
- en: 'The online Macmillan dictionary offers a much more concise definition :'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在线 Macmillan 词典提供了一个更为简洁的定义：
- en: The [ability](http://www.macmillandictionary.com/us/dictionary/american/ability_1)
    to [understand](http://www.macmillandictionary.com/us/dictionary/american/understand)
    and [think](http://www.macmillandictionary.com/us/dictionary/american/think_1)
    about [things](http://www.macmillandictionary.com/us/dictionary/american/thing)
    , and to gain and use [knowledge](http://www.macmillandictionary.com/us/dictionary/american/knowledge)
  id: totrans-49
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[理解](http://www.macmillandictionary.com/us/dictionary/american/ability_1) 和
    [思考](http://www.macmillandictionary.com/us/dictionary/american/think_1) [事物](http://www.macmillandictionary.com/us/dictionary/american/thing)
    的能力，以及获取和使用 [知识](http://www.macmillandictionary.com/us/dictionary/american/knowledge)
    的能力'
- en: I am positive that if I went to other online dictionaries, I would see many
    other definitions, which is why trying to pin down intelligence is so hard. Consequently,
    not having an agreed standard regarding what intelligence is makes it nearly impossible
    to recognize it when it is happening on a consistent and agreed upon basis.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我坚信，如果我访问其他在线词典，我会看到许多其他的定义，这就是为什么试图确定智能是如此困难。因此，没有关于什么是智能的共识标准，使得在一致和公认的基础上识别智能变得几乎不可能。
- en: Intelligence is also related to both sensory inputs and motor or actuating outputs.
    Obviously, our brains are contained in our human bodies, which are also nicely
    equipped with five sensory systems—vision, hearing, taste, touch, and smell. These
    sensory systems are an integral part of our intelligence; however, it has been
    repeatedly demonstrated that there are still very intelligent human beings who
    have lost one or more of their sensory inputs. The human body is quite remarkable
    in its ability to compensate when a particular sensory system has been injured
    or destroyed. Likewise, human intelligence is also linked somewhat to our motor
    skills; however, I would argue not as much as the sensory inputs. Losing the ability
    to speak has not diminished the intellect and genius of Steven Hawking. Having
    the ability to walk, run, drive a car, or pilot an airplane gives individuals
    the opportunity to explore and understand their environment, and consequently,
    expand their knowledge and experiences, but not necessarily improve or expand
    their intelligence—unless you subscribe to the notion that knowledge and intelligence
    are synonymous.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 智能也与感官输入和运动或驱动输出有关。显然，我们的大脑包含在我们的身体中，我们的身体也配备了五个感官系统——视觉、听觉、味觉、触觉和嗅觉。这些感官系统是我们智能的组成部分；然而，已经反复证明，仍然有一些非常聪明的人失去了他们的一个或多个感官输入。人类身体在特定感官系统受伤或被破坏时具有补偿能力，这一点相当非凡。同样，人类智能也与我们的运动技能有关；然而，我会争辩说，这不如感官输入那么重要。失去说话的能力并没有减少史蒂芬·霍金（Stephen
    Hawking）的智力和天才。拥有行走、奔跑、开车或驾驶飞机的能力给个人提供了探索和理解他们环境的机会，从而扩展他们的知识和经验，但并不一定提高或扩展他们的智能——除非你认同知识和智能是同义的概念。
- en: 'It is only a small leap to study animals and consider whether or not they possess
    intelligence. Birds can fly and typically have much better vision than humans
    have. Does this mean that they possess intelligence beyond the human species,
    at least in those two areas? The answer is obviously unknowable, which leads to
    the following reasonable conclusion: animal and machine intelligence should simply
    be accepted for what it is and not be compared to human intelligence. Trying to
    make the latter comparison is simply like comparing apples and oranges; it is
    truly meaningless.'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 研究动物并考虑它们是否具有智能只是小步之遥。鸟类可以飞翔，通常比人类有更好的视力。这难道意味着它们在至少这两个领域拥有超越人类物种的智能吗？答案显然是未知的，这导致以下合理的结论：动物和机器智能应该简单地接受其本质，而不应与人类智能相比较。试图进行这种比较就像比较苹果和橘子一样；这真正是没有意义的。
- en: My goal in the foregoing discussion is to reiterate the premise of the modern
    approach to AI, in that machine intelligence should be considered by itself and
    not be compared to human intelligence. This is the underlying premise of the book,
    where projects explore machine advantages, but are neither expected to nor even
    desired to emulate or simulate human intelligence.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的讨论中，我的目标是重申现代人工智能方法的假设，即机器智能应该单独考虑，而不是与人类智能相比较。这是本书的潜在前提，其中项目探索机器的优势，但既不期望也不希望模仿或模拟人类智能。
- en: Strong AI vs. Weak AI , Broad AI vs. Narrow AI
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 强人工智能 vs. 弱人工智能，广人工智能 vs. 窄人工智能
- en: There are additional descriptors that are commonly applied to AI, as you may
    have inferred from this section’s title. AI work and research that attempts to
    simulate human reasoning to the maximum level possible is sometimes called strong
    AI. I would presume that proponents of the classical AI approach would also hardily
    endorse this terminology. This strong adjective contrasts sharply with the weak
    AI adjective that simply relates to getting practical AI systems to function effectively,
    without regard to the human analog. This approach is what I have referred to as
    the modern approach . I do not know how these strong and weak terms arose, but
    I suspect they exist to cast a prerogative shadow on the modern approach, which
    is unfortunate because both approaches are equally valid and deserving of equal
    importance and recognition. I have only introduced these terms so that you understand
    their significance if you happen to read about AI applications or projects. I
    do not use either term; instead, I just focus on the AI applications— regardless
    of their being strong or weak.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 除了您可能从本节标题中推断出的描述符外，还有其他一些常用于人工智能的描述符。试图将人类推理模拟到尽可能高水平的AI工作和研究有时被称为强人工智能。我推测，古典人工智能方法的倡导者也会强烈支持这个术语。这个强烈的形容词与仅仅关系到使实际AI系统有效运行的弱人工智能形容词形成鲜明对比。这种方法就是我所说的现代方法。我不知道这些强弱术语是如何产生的，但我怀疑它们的存在是为了给现代方法投下一种特权阴影，这是不幸的，因为两种方法都是同样有效且应得到同等重要性和认可。我之所以引入这些术语，是为了让您在偶然阅读关于AI应用或项目时理解它们的含义。我不使用这两个术语；相反，我只是专注于AI应用——无论它们是强人工智能还是弱人工智能。
- en: The other pair of terms I used in the section title are broad AI and narrow
    AI. Broad AI is concerned with general reasoning and not related to a specific
    task or application. I suppose that broad AI and strong AI would tend to have
    a natural bond, as both relate to the human context of reasoning and thinking.
    Narrow AI focuses on AI applied to specific tasks and it is not too generalized.
    However, there are exceptions, which tend to easily break the broad and narrow
    AI definitions. Google has developed systems that are excellent in predicting
    or characterizing how “things” should be described or arranged. Google applications
    exhibit both broad and narrow AI aspects regarding generalizations, as well as
    specific cataloging functions. Amazon, likewise, has intelligent agents, which
    tend to be excellent in both generalizations and making specific customer recommendations.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节标题中我使用的另一对术语是广义人工智能和狭义人工智能。广义人工智能关注一般推理，与特定任务或应用无关。我想广义人工智能和强人工智能可能会倾向于有自然的联系，因为它们都与推理和思考的人类背景相关。狭义人工智能专注于应用于特定任务的AI，并且并不过于泛化。然而，也有一些例外，这些例外往往容易打破广义和狭义人工智能的定义。谷歌开发了在预测或描述“事物”应该如何描述或排列方面表现卓越的系统。谷歌应用在概括以及具体编目功能方面都表现出广义和狭义人工智能的特点。亚马逊同样拥有智能代理，它们在概括和做出具体客户推荐方面都表现出色。
- en: I close this section with Figure [1-3](#Fig3), which is a word cloud that I
    created using Mathematica running on a Raspberry Pi 3\. This figure is a simply
    a graphical representation of the many different words that are commonly used
    with AI. Wikipedia was the source for all the words shown in the figure.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 我用图[1-3](#Fig3)结束本节，这是一个使用运行在Raspberry Pi 3上的Mathematica创建的词云。这个图只是一个图形表示，展示了与人工智能常用的许多不同单词。本图中的所有单词都来自维基百科。
- en: '![A436848_1_En_1_Fig3_HTML.jpg](A436848_1_En_1_Fig3_HTML.jpg)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_1_Fig3_HTML.jpg](A436848_1_En_1_Fig3_HTML.jpg)'
- en: Figure 1-3.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-3。
- en: A word cloud on artificial intelligence
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能词云
- en: Reasoning
  id: totrans-61
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 推理
- en: I repeatedly used the words reason and reasoning in the previous discussions.
    But what do they really mean and how are they related to AI? Reasoning describes
    creating or considering a reason. The word reason means to think about how things
    or ideas relate to what is known—or more simply, knowledge. A few reasoning examples
    help clarify the thoughts that I am attempting to convey.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 我在之前的讨论中反复使用了“推理”和“推理”这两个词。但它们究竟是什么意思，它们与AI有什么关系呢？推理描述的是创造或考虑一个理由。这个词的意思是思考事物或想法如何与已知的事物或更简单地说，与知识相关。一些推理的例子可以帮助阐明我试图传达的思想。
- en: Learning is the process of building a new knowledge set based upon examining
    or discussing existing knowledge sets. Sets in this context are any data collections,
    whether or not based in reality.
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习是基于检查或讨论现有知识集来构建新的知识集的过程。在这个背景下，集合是指任何数据集合，无论是否基于现实。
- en: Use of language is the conversion of words, whether written or spoken into ideas
    and supportive relationships.
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 语言的使用是将书面或口头上的词语转化为思想和支持性关系的过程。
- en: Inference based on logic means deciding whether something is true based upon
    logical relationships.
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于逻辑的推理意味着根据逻辑关系决定某事是否为真。
- en: Inference based on evidence means deciding whether something is true based upon
    all the supportive available evidence.
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于证据的推理意味着根据所有可用的支持性证据决定某事是否为真。
- en: Natural language generation exists to satisfy communication goals and objectives
    using a given language.
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自然语言生成旨在使用给定的语言满足沟通目标和目的。
- en: Problem solving is the process of determining how to achieve a set goal or an
    objective.
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 问题解决是确定如何实现既定目标或目标的过程。
- en: Any of these activities must necessarily involve reasoning to achieve a satisfactory
    end result. Please note that nowhere in the list do I limit the reasoning to only
    human beings. Some of these activities are certainty suitable to be implemented
    by machines, and in some cases, even by animals. There have been endless experiments
    that have satisfactorily demonstrated that animals can solve problems, especially
    if it involves getting to food.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 这些活动中的任何一项都必须必然涉及推理以达到令人满意的结果。请注意，在列表中，我并没有将推理限制在只有人类身上。其中一些活动非常适合由机器实现，在某些情况下甚至可以由动物实现。有无数实验成功地证明了动物可以解决问题，尤其是如果涉及到获取食物的话。
- en: There is a recent proliferation of voice-activated Internet devices, including
    Amazon’s Alexa, Microsoft’s Cortana, Apple’s Siri, and Google’s Home. These are
    either standalone devices or applications that are installed on smartphones. In
    any case, they are well equipped to recognize voice inquires, translate the inquiries
    into actionable Internet queries, and finally, relay the results to the user in
    a highly understandable format, usually as a well-spoken female voice. These devices/applications
    must use some level of reasoning to carry out their intended functions, even if
    to reply they do not understand the user’s request.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 最近出现了大量基于语音激活的互联网设备，包括亚马逊的Alexa、微软的Cortana、苹果的Siri和谷歌的Home。这些设备或应用程序可以是独立的，也可以安装在智能手机上。无论如何，它们都配备了识别语音查询、将查询转换为可操作的互联网查询，并最终以高度可理解的方式将结果传达给用户，通常是一个发音清晰的女性声音。这些设备/应用程序必须使用某种程度的推理来执行其预期功能，即使它们在回复时并不理解用户的请求。
- en: AI Categories
  id: totrans-71
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能类别
- en: Table [1-1](#Tab1) is a list that I created to show most of the categories that
    make up modern-day AI. I do not think it is comprehensive. There are likely some
    categories that have been inadvertently omitted. I did overtly omit some categories,
    such as the history and philosophy of AI, because they were not directly pertinent
    to the intent of this table.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 表[1-1](#Tab1)是我创建的列表，用来展示构成现代人工智能的大多数类别。我认为它并不全面。可能有一些类别被无意中遗漏了。我明确地省略了一些类别，例如人工智能的历史和哲学，因为它们与这个表格的目的没有直接相关性。
- en: Table 1-1.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 表1-1。
- en: Modern AI Categories
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 现代人工智能类别
- en: '| Category | Brief Description |'
  id: totrans-75
  prefs: []
  type: TYPE_TB
  zh: '| 类别 | 简要描述 |'
- en: '| --- | --- |'
  id: totrans-76
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Affective computing | The study and development of systems and devices that
    can recognize, interpret, process, and simulate human [affects](https://en.wikipedia.org/wiki/Affect_(psychology)).
    |'
  id: totrans-77
  prefs: []
  type: TYPE_TB
  zh: '| 情感计算 | 研究和开发能够识别、解释、处理和模拟人类[情感](https://en.wikipedia.org/wiki/Affect_(psychology))的系统和设备。|'
- en: '| Artificial immune systems | Intelligent, [rule-based machine learning](https://en.wikipedia.org/wiki/Rule-based_machine_learning)
    systems based primarily on the inherent principles and processes contained within
    vertebrate [immune system](https://en.wikipedia.org/wiki/Immune_system)s. |'
  id: totrans-78
  prefs: []
  type: TYPE_TB
  zh: '| 人工免疫系统 | 主要基于脊椎动物[免疫系统](https://en.wikipedia.org/wiki/Immune_system)中固有的原则和过程的智能、基于规则的机器学习系统。|'
- en: '| Chatterbot | A type of conversational agent or computer program designed
    to simulate an intelligent conversation with one or more human users through text
    or audio channels. |'
  id: totrans-79
  prefs: []
  type: TYPE_TB
  zh: '| 聊天机器人 | 一种旨在通过文本或音频通道与一个或多个人类用户进行智能对话的对话代理或计算机程序。|'
- en: '| Cognitive architecture | A theory about the structure of the [human mind](https://en.wikipedia.org/wiki/Human_mind).
    One of the main goals is to incorporate concepts from cognitive psychology into
    a comprehensive computer model. |'
  id: totrans-80
  prefs: []
  type: TYPE_TB
  zh: '| 认知架构 | 关于人类心智结构的理论。[人类心智](https://en.wikipedia.org/wiki/Human_mind)的一个主要目标是将认知心理学中的概念纳入一个全面的计算机模型。|'
- en: '| Computer vision | An [interdisciplinar​y field](https://en.wikipedia.org/wiki/Interdisciplinarity)
    that deals with how computers can gain high-level understanding from [digital
    images](https://en.wikipedia.org/wiki/Digital_image) or [videos](https://en.wikipedia.org/wiki/Video).
    |'
  id: totrans-81
  prefs: []
  type: TYPE_TB
  zh: '| 计算机视觉 | 一个[跨学科领域](https://en.wikipedia.org/wiki/Interdisciplinarity)，研究计算机如何从[数字图像](https://en.wikipedia.org/wiki/Digital_image)或[视频](https://en.wikipedia.org/wiki/Video)中获得高级理解。
    |'
- en: '| Evolutionary computing | The use of evolutionary algorithms based on [Darwinian](https://en.wikipedia.org/wiki/Darwinian)
    principles from which the name is derived. These algorithms belong to a family
    of [trial-and-error](https://en.wikipedia.org/wiki/Trial_and_error) problem solvers
    and use metaheuristic or stochastic global methods to determine many solutions.
    |'
  id: totrans-82
  prefs: []
  type: TYPE_TB
  zh: '| 进化计算 | 基于达尔文主义原理的进化算法的应用，其名称由此而来。这些算法属于一种试错问题求解器家族，并使用元启发式或随机全局方法来确定多种解决方案。
    |'
- en: '| Gaming AI | AI used in games to generate [intelligent](https://en.wikipedia.org/wiki/Intelligence_(trait))
    behaviors, primarily in [non-player characters](https://en.wikipedia.org/wiki/Non-player_character)
    (NPCs), often [simulating](https://en.wikipedia.org/wiki/Simulating) human-like
    intelligence. |'
  id: totrans-83
  prefs: []
  type: TYPE_TB
  zh: '| 游戏人工智能 | 在游戏中使用的人工智能，用于生成[智能](https://en.wikipedia.org/wiki/Intelligence_(trait))行为，主要在[非玩家角色](https://en.wikipedia.org/wiki/Non-player_character)（NPC）中，通常[模拟](https://en.wikipedia.org/wiki/Simulating)类似人类的智能。
    |'
- en: '| Human-Computer-Interface (HCI) | HCI researches the design and use of computer
    technology, focused on the interfaces between people ([users](https://en.wikipedia.org/wiki/User_(computing)))
    and computers. |'
  id: totrans-84
  prefs: []
  type: TYPE_TB
  zh: '| 人机交互界面（HCI） | 研究计算机技术的设计和使用，重点关注人与人（[用户](https://en.wikipedia.org/wiki/User_(computing)))与计算机之间的接口。
    |'
- en: '| Intelligent soft assistant or intelligent personal assistant (IPA) | A [software
    agent](https://en.wikipedia.org/wiki/Software_agent) that can perform tasks or
    services for an individual. These tasks or services are usually based on user
    input, location awareness, and the ability to access information from a variety
    of online sources. Examples of such an agent are [Apple](https://en.wikipedia.org/wiki/Apple_Inc)’s
    Siri, [Amazon’s Alexa](https://en.wikipedia.org/wiki/Amazon_Alexa), [Amazon](https://en.wikipedia.org/wiki/Amazon.com)’s
    [Evi](https://en.wikipedia.org/wiki/Evi_(software)), Google’s Home, [Microsoft](https://en.wikipedia.org/wiki/Microsoft)’s
    [Cortana](https://en.wikipedia.org/wiki/Cortana_(intelligent_personal_assistant)),
    the [open source](https://en.wikipedia.org/wiki/Open_source) [Lucida](https://en.wikipedia.org/wiki/Lucida_(Intelligent_Assistant)),
    [Braina](https://en.wikipedia.org/wiki/Braina) (application developed by Brainasoft
    for [Microsoft Windows](https://en.wikipedia.org/wiki/Microsoft_Windows)), [Samsung](https://en.wikipedia.org/wiki/Samsung)’s
    [S Voice](https://en.wikipedia.org/wiki/S_Voice), and [LG G3](https://en.wikipedia.org/wiki/LG_G3)’s
    [Voice Mate](https://en.wikipedia.org/wiki/Voice_Mate). |'
  id: totrans-85
  prefs: []
  type: TYPE_TB
  zh: '| 智能软件助手或智能个人助理（IPA） | 一种能够为个人执行任务或提供服务的[软件代理](https://en.wikipedia.org/wiki/Software_agent)。这些任务或服务通常基于用户输入、位置感知以及从各种在线来源获取信息的能力。此类代理的例子包括[苹果](https://en.wikipedia.org/wiki/Apple_Inc)的Siri、[亚马逊的Alexa](https://en.wikipedia.org/wiki/Amazon_Alexa)、[亚马逊](https://en.wikipedia.org/wiki/Amazon.com)的[Evi](https://en.wikipedia.org/wiki/Evi_(software))、谷歌的Home、[微软](https://en.wikipedia.org/wiki/Microsoft)的[Cortana](https://en.wikipedia.org/wiki/Cortana_(intelligent_personal_assistant))、开源的[Lucida](https://en.wikipedia.org/wiki/Lucida_(Intelligent_Assistant))、[Braina](https://en.wikipedia.org/wiki/Braina)（由Brainasoft为[微软Windows](https://en.wikipedia.org/wiki/Microsoft_Windows)开发的软件）、[三星](https://en.wikipedia.org/wiki/Samsung)的[S
    Voice](https://en.wikipedia.org/wiki/S_Voice)和[LG G3](https://en.wikipedia.org/wiki/LG_G3)的[Voice
    Mate](https://en.wikipedia.org/wiki/Voice_Mate)。 |'
- en: '| Knowledge engineering | Refers to all technical, scientific, and social aspects
    involved in building, maintaining, and using [knowledge-based systems](https://en.wikipedia.org/wiki/Knowledge-based_systems).
    |'
  id: totrans-86
  prefs: []
  type: TYPE_TB
  zh: '| 知识工程 | 涉及到构建、维护和使用[基于知识的系统](https://en.wikipedia.org/wiki/Knowledge-based_systems)的所有技术、科学和社会方面。
    |'
- en: '| Knowledge representation (KR) | Dedicated to representing information about
    the world in a form that a computer system can utilize to solve complex tasks,
    such as diagnosing a medical condition or having a dialog in a [natural language](https://en.wikipedia.org/wiki/Natural_language).
    |'
  id: totrans-87
  prefs: []
  type: TYPE_TB
  zh: '| 知识表示（KR） | 致力于以计算机系统可以利用的形式表示关于世界的信息，以解决复杂任务，如诊断医疗状况或在[自然语言](https://en.wikipedia.org/wiki/Natural_language)中进行对话。
    |'
- en: '| Logic programming | A type of programming largely based on [formal logic](https://en.wikipedia.org/wiki/Formal_logic).
    Any program written in a logic [programming language](https://en.wikipedia.org/wiki/Programming_language)
    is a set of sentences in logical form, expressing facts and rules about some problem
    domain. Major logic programming language families include [Prolog](https://en.wikipedia.org/wiki/Prolog),
    [answer set programming](https://en.wikipedia.org/wiki/Answer_set_programming)
    (ASP), and [Datalog](https://en.wikipedia.org/wiki/Datalog). |'
  id: totrans-88
  prefs: []
  type: TYPE_TB
  zh: '| 逻辑编程 | 一种主要基于[形式逻辑](https://en.wikipedia.org/wiki/Formal_logic)的编程类型。任何用逻辑[编程语言](https://en.wikipedia.org/wiki/Programming_language)编写的程序都是一组以逻辑形式表达的句子，表达关于某个问题领域的事实和规则。主要的逻辑编程语言家族包括[Prolog](https://en.wikipedia.org/wiki/Prolog)、[答案集编程](https://en.wikipedia.org/wiki/Answer_set_programming)
    (ASP)和[Datalog](https://en.wikipedia.org/wiki/Datalog)。|'
- en: '| Machine learning (ML) | ML in the AI context provides computers the ability
    to learn without being explicitly programmed. Shallow and deep learning are two
    major subfields. |'
  id: totrans-89
  prefs: []
  type: TYPE_TB
  zh: '| 机器学习（ML） | 在人工智能的背景下，机器学习为计算机提供了无需明确编程就能学习的能力。浅层学习和深度学习是两个主要子领域。|'
- en: '| Multi-agent system (M.A.S.) | M.A.S. is a computerized system composed of
    multiple interacting [intelligent agents](https://en.wikipedia.org/wiki/Intelligent_agent)
    within an environment. |'
  id: totrans-90
  prefs: []
  type: TYPE_TB
  zh: '| 多智能体系统（M.A.S.） | M.A.S.是一个由多个相互作用的[智能体](https://en.wikipedia.org/wiki/Intelligent_agent)组成的计算机化系统。|'
- en: '| Robotics | Robotics is the [interdisciplinar​y](https://en.wikipedia.org/wiki/Interdisciplinarity)
    branches of [engineering](https://en.wikipedia.org/wiki/List_of_engineering_branches)
    and [science](https://en.wikipedia.org/wiki/Branches_of_science) that includes
    [mechanical engineering](https://en.wikipedia.org/wiki/Mechanical_engineering),
    [electrical engineering](https://en.wikipedia.org/wiki/Electrical_engineering),
    [computer science](https://en.wikipedia.org/wiki/Computer_science), AI, and others.
    |'
  id: totrans-91
  prefs: []
  type: TYPE_TB
  zh: '| 机器人学 | 机器人学是[跨学科](https://en.wikipedia.org/wiki/Interdisciplinarity)的[工程](https://en.wikipedia.org/wiki/List_of_engineering_branches)和[科学](https://en.wikipedia.org/wiki/Branches_of_science)分支，包括[机械工程](https://en.wikipedia.org/wiki/Mechanical_engineering)、[电气工程](https://en.wikipedia.org/wiki/Electrical_engineering)、[计算机科学](https://en.wikipedia.org/wiki/Computer_science)、人工智能以及其他领域。|'
- en: '| Robots | A robot is a machine, especially one programmable by a computer,
    which is capable of carrying out a complex series of actions autonomously. |'
  id: totrans-92
  prefs: []
  type: TYPE_TB
  zh: '| 机器人 | 机器人是一种机器，尤其是可以通过计算机编程的机器，能够自主执行一系列复杂的动作。|'
- en: '| Rule engines or systems | Rule-based systems are used to store and manipulate
    knowledge to interpret information in a useful way. |'
  id: totrans-93
  prefs: []
  type: TYPE_TB
  zh: '| 规则引擎或系统 | 基于规则的系统用于存储和操作知识，以便以有用的方式解释信息。|'
- en: '| Turing test | The Turing test is a test, developed by [Alan Turing](https://en.wikipedia.org/wiki/Alan_Turing)
    in 1950, of a machine’s ability to [exhibit intelligent behavior](https://en.wikipedia.org/wiki/Artificial_intelligence)
    equivalent to, or indistinguishable from, that of a human. |'
  id: totrans-94
  prefs: []
  type: TYPE_TB
  zh: '| 图灵测试 | 图灵测试是由[艾伦·图灵](https://en.wikipedia.org/wiki/Alan_Turing)于1950年开发的一种测试，用于检验机器是否能够[展现与人类相当或无法区分的智能行为](https://en.wikipedia.org/wiki/Artificial_intelligence)。|'
- en: I will repeat that this table does not cover all modern AI research and activities,
    but it certainly highlights most of the important ones. I only demonstrate a few
    of the listed AI categories in this book, but even those should provide reasonable
    insight on how AI may be implemented using relatively simple computer resources.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 我将重复说明，这个表格并不涵盖所有现代人工智能研究及活动，但它确实突出了其中大部分重要的内容。在这本书中，我只展示了列出的几个AI类别，但即便如此，这些也应该能提供关于如何使用相对简单的计算机资源实现AI的合理见解。
- en: At this point, I believe it is appropriate to discuss AI as it affects modern
    society in ways well beyond the scope of this book. I provide this brief discussion
    in hopes of enhancing my readers’ knowledge and understanding of how AI affects
    us—one and all—in our daily lives.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一点上，我认为讨论人工智能及其对现代社会的影响是合适的，这种影响远远超出了本书的范围。我提供这次简短的讨论，希望增强读者对我如何影响我们所有人日常生活的知识和理解。
- en: AI and Big Data
  id: totrans-97
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能与大数据
- en: 'Most readers have heard the term big data, but like most people, you may not
    have an appreciation of what it is and how it affects our modern society. There
    are many definitions of big data, just as there are many definitions of AI. The
    definition I like is rather simple: a data collection characterized by huge volumes,
    rapid velocity, and great variety.'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数读者都听说过大数据这个词，但就像大多数人一样，你可能没有真正理解它是什么以及它如何影响我们的现代社会。大数据有许多定义，就像人工智能也有许多定义一样。我喜欢的一个简单定义是：具有巨大体积、快速速度和极大多样性的数据集合。
- en: The magnitude of the huge volumes can be characterized by saying it is typically
    measured in petabytes (PB), where one PB equals one million gigabytes (GB). That
    is truly a huge amount of data. The rapid velocity mentioned in the definition
    refers to how rapidly the data is generated or created. One need only look at
    Facebook to appreciate the rapidity of new content that is constantly being created
    by hundreds of millions of online users. Finally, the great variety phrase in
    the definition refers to the various data types that go into making up the huge
    data flows. This includes pictures, video, audio, as well as plain old text. An
    average photo uploaded to Facebook likely takes about four to five megabytes of
    storage. Multiply that by the multimillions of photos that are constantly uploaded,
    and you soon realize the nature of big data. So how does AI affect big data? The
    answer is that an AI learning system when applied to a big data set allows users
    to extract useful information from a huge and noisy input. Typical computer systems
    that can handle big data are composed of thousands of processors working together
    in a parallel fashion to greatly speed up the data reduction process often referred
    to as MapReduce. IBM’s Watson computer is a prime example of such a system. It
    has implemented expert medical systems by using a rules-based engine and processing
    many thousands, if not millions, of medical records. The end result is a computer
    system that assists doctors in diagnosing illnesses and related maladies, which
    do not have obvious or relatable symptoms to known diseases.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 巨大体积的量级可以通过以下方式来描述：它通常以拍字节（PB）为单位进行衡量，其中1 PB等于一百万千字节（GB）。这确实是一个巨大的数据量。定义中提到的快速速度指的是数据生成或创建的速度。只需看看Facebook，就能体会到数亿在线用户不断创建的新内容的速度。最后，定义中的“种类繁多”一词指的是构成巨大数据流的各种数据类型。这包括图片、视频、音频以及普通的文本。平均每张上传到Facebook的照片可能需要大约四到五兆字节的存储空间。将这个数字乘以不断上传的数百万张照片，你很快就会意识到大数据的本质。那么人工智能是如何影响大数据的呢？答案是，当人工智能学习系统应用于大数据集时，它允许用户从大量嘈杂的输入中提取有用信息。典型的能够处理大数据的计算机系统由数千个处理器以并行方式协同工作，以极大地加快通常称为MapReduce的数据减少过程。IBM的沃森计算机就是这样一个系统的典型例子。它通过使用基于规则的引擎处理数千甚至数百万份医疗记录，实现了专家医疗系统。最终结果是，一个计算机系统帮助医生诊断疾病和相关疾病，这些疾病没有明显的或与已知疾病相关的症状。
- en: 'Amazon’s website is integrated with an impressive AI system that easily compiles
    a detailed profile of each potential or actual customer that repeatedly visits
    its site. It matches the customer’s searches with those of other customers that
    have searched or inquired about similar products. It further tries to predict
    what might interest a site visitor based on their past searches and orders. All
    the data that the Amazon system uses is transactional, basically identifying what
    potentially interests its customers. This transactional data, which likely qualifies
    as big data, is the primary input into Amazon’s AI computer systems. The output
    is the profile that I mentioned, but it may be also considered a set of characterizations
    attached to the potential or actual customer; for example, a resulting in a website
    suggestion may look like the following:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 亚马逊的网站集成了一个令人印象深刻的AI系统，该系统能够轻松地编制每个反复访问其网站的潜在或实际客户的详细资料。它将客户的搜索与搜索或咨询过类似产品的其他客户的搜索进行匹配。它还试图根据客户的过去搜索和订单预测可能引起网站访问者兴趣的内容。亚马逊系统使用的所有数据都是交易性的，基本上识别出可能引起其客户兴趣的内容。这种交易性数据，可能符合大数据的定义，是亚马逊AI计算机系统的主要输入。输出是之前提到的资料，但它也可能被视为附加在潜在或实际客户身上的特征集；例如，一个导致网站建议的结果可能如下所示：
- en: “You may be interested in Robert Heinlein’s book The Moon is a Harsh Mistress
    because you have purchased the following books:”
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: “你可能对罗伯特·海因莱因的《月球是个严酷的女王》感兴趣，因为你购买了以下书籍：”
- en: Full Moon
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 《满月》
- en: 'Star Wars: The Empire Strikes Back'
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 《星球大战：帝国反击战》
- en: The Shawshank Redemption
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 《肖申克的救赎》
- en: This list of seemingly unconnected books likely shows that the customer has
    an interest in the Moon, conflict in outer space, or injustice in a prison, all
    of which are touched in some fashion in Heinlein’s book. (Incidentally, Heinlein’s
    book received the [Hugo Award](https://en.wikipedia.org/wiki/Hugo_Award) for best
    science fiction novel in 1967.) Making this obscure connection between the customer’s
    past book purchases and Heinlein’s book content requires a significant computer
    analysis effort, as well as access to a huge database.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 这份看似不相关的书籍列表可能表明，客户对月球、外太空的冲突或监狱中的不公感兴趣，所有这些都以某种方式触及了海因莱因的书籍。（顺便提一下，海因莱因的书籍在1967年获得了[雨果奖](https://en.wikipedia.org/wiki/Hugo_Award)，最佳科幻小说奖。）将客户过去的书籍购买与海因莱因的书籍内容之间的这种隐秘联系建立起来，需要大量的计算机分析工作以及访问庞大的数据库。
- en: The biggest global user of big data analysis is the US government in the execution
    of the Global War on Terrorism (GWOT) . The US National Security Agency (NSA)
    is at the forefront of detecting possible/likely terrorist attacks on the homeland.
    Its annual classified budget has been estimated at more than $15 billion, with
    the vast majority of it spent on collecting and analyzing all sorts of big data
    in the fight against GWOT. What it collects and how it conducts big data analysis
    is ultrasecret, but it is quite reasonable to assume that all appropriate AI techniques
    are used by the NSA experts, many of whom I expect are also experts at conducting
    secret AI research. This is not a conspiracy theory on my part, but simply what
    any reasonable layperson should expect.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 最大的全球大数据分析用户是美国政府在执行全球反恐战争（GWOT）中的行动。美国国家安全局（NSA）在检测可能/可能的本土恐怖袭击方面处于前沿。其年度机密预算估计超过150亿美元，其中大部分用于收集和分析各种大数据以对抗GWOT。它收集的内容以及如何进行大数据分析是高度机密的，但可以合理地假设NSA专家使用了所有适当的AI技术，其中许多人我预计也是进行秘密AI研究的专家。这并不是我的阴谋论，而只是任何合理的门外汉都应该期望的事情。
- en: This section concludes my introduction to AI, which although somewhat abbreviated,
    hopefully contained sufficient information to provide you with a reasonable background
    to start the study of specific AI concepts. This begins in the next chapter.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 本节总结了我对人工智能的介绍，尽管内容有些简略，但希望其中包含了足够的信息，为您开始研究特定的人工智能概念提供合理的背景。这将在下一章开始。
- en: Summary
  id: totrans-108
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: I began the chapter with an historical overview of AI that started in ancient
    times and proceeded to modern times. This shows that mankind has thought about
    making machines to accomplish intelligent actions for a very long time. It is
    only in very recent times that computers have been developed with the capabilities
    to implement intelligent actions
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 我以人工智能的历史概述开始本章，它始于古代并一直延续到现代。这表明人类长期以来一直在思考如何制造机器来完成智能行为。只是在最近，计算机才被开发出来，具备了实施智能行为的能力。
- en: There was a brief discussion on the differences between the classic and modern
    approaches to AI development. In brief, the classic approach attempts to have
    computers mimic or simulate the human brain, whereas the modern approach simply
    takes advantage of a computer’s inherent speed and processing power to implement
    AI on it. I also defined additional terms, such as broad AI and narrow AI and
    strong AI and weak AI.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 对经典和现代人工智能开发方法的差异进行了简要讨论。简而言之，经典方法试图让计算机模仿或模拟人脑，而现代方法则简单地利用计算机固有的速度和计算能力在其上实施人工智能。我还定义了额外的术语，例如广义人工智能和狭义人工智能，以及强人工智能和弱人工智能。
- en: The brief inspection of the nature of intelligence was presented to pique your
    curiosity and to think about how you might recognize if intelligence is present
    in machines or animals. A brief section on reasoning followed, which included
    some examples to help recognize reasoning when it is incorporated into AI applications.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 对智能本质的简要审视旨在激发您的兴趣，并思考您如何识别机器或动物中是否存在智能。随后是一个关于推理的简短部分，其中包含了一些例子，以帮助识别当推理被纳入人工智能应用时的情况。
- en: I next presented a list of AI categories to help explain important and current
    AI R&D efforts. Only a few of the AI categories can be demonstrated in this book.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 接着，我列出了一系列人工智能类别，以帮助解释重要的和当前的AI研发工作。在这本书中，只有少数人工智能类别可以展示。
- en: The chapter finished with a discussion on how AI influences modern society,
    especially when dealing with big data.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 本章以讨论人工智能如何影响现代社会结束，尤其是在处理大数据时。
