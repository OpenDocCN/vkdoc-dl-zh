- en: Introduction
  prefs: []
  type: TYPE_NORMAL
- en: Congratulations on your decision to explore the exciting world of anomaly detection
    using deep learning!
  prefs: []
  type: TYPE_NORMAL
- en: Anomaly detection involves finding patterns that do not adhere to what is considered
    as normal or expected behavior. Businesses could lose millions of dollars due
    to abnormal events. Consumers could also lose millions of dollars. In fact, there
    are many situations every day where people’s lives are at risk and where their
    property is at risk. If your bank account gets cleaned out, that’s a problem.
    If your water line breaks, flooding your basement, that’s a problem. If all flights
    at an airport get delayed due to a technical glitch in the traffic control system,
    that’s a problem. If you have a health issue that is misdiagnosed or not diagnosed,
    that’s a very big problem that directly impacts your well-being.
  prefs: []
  type: TYPE_NORMAL
- en: In this book, you will learn how anomaly detection can be used to solve business
    problems. You will explore how anomaly detection techniques can be used to address
    practical use cases and address real-life problems in the business landscape.
    Every business and use case is different, so while we cannot copy and paste code
    and build a successful model to detect anomalies in any dataset, this book will
    cover many use cases with hands-on coding exercises to give you an idea of the
    possibilities and concepts behind the thought process. All the code examples in
    the book are presented in Python 3.8\. We choose Python because it is truly the
    best language for data science, with a plethora of packages and integrations with
    scikit-learn, deep learning libraries, etc.
  prefs: []
  type: TYPE_NORMAL
- en: We will start by introducing anomaly detection, and then we will look at legacy
    methods of detecting anomalies that have been used for decades. Then we will look
    at deep learning to get a taste of it. Then we will explore autoencoders and variational
    autoencoders, which are paving the way for the next generation of generative models.
    Following that, we will explore generative adversarial networks (GANs) as a way
    to detect anomalies, delving directly into generative AI.
  prefs: []
  type: TYPE_NORMAL
- en: Then we’ll look at long short-term memory (LSTM) models to see how temporal
    data can be processed. We will cover temporal convolutional networks (TCNs), which
    are excellent for temporal data anomaly detection. We will also touch upon the
    transformer architecture, which has revolutionized the field of natural language
    processing as another means for temporal anomaly detection. Finally, we will look
    at several examples of anomaly detection in various business use cases.
  prefs: []
  type: TYPE_NORMAL
- en: In addition, all coding examples will be provided in TensorFlow 2/Keras, with
    accompanying PyTorch equivalents, on the GitHub repository for this book. You
    will combine all this extensive knowledge with hands-on coding using Jupyter notebook-based
    exercises to experience the knowledge firsthand and see where you can use these
    algorithms and frameworks. Best of luck, and welcome to the world of deep learning!
  prefs: []
  type: TYPE_NORMAL
