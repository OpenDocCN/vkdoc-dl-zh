  id: totrans-423
  prefs: []
  type: TYPE_TB
- en: 'To work with the TabNet model, install the tabnet library with pip install
    tabnet. Two relevant ready-to-go TabNet models are implemented: tabnet.TabNetClassifier
    and tabnet.TabNetRegressor, for classification and regression tasks, respectively
    (Listing [3-35](#PC35)). These models can be compiled and fitted like standard
    Keras models.'
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
- en: 'There are several key features in the TabNet classifier model to be aware of:
    feature_columns accepts a list or tuple of feature columns to indicate the number
    of features but can instead be specified via num_features; num_classes indicates
    the number of output classes; feature_dim determines the dimensionality of the
    hidden representation in the feature transformation block; and output_dim determines
    the dimensionality of the outputs of each decision step.'
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE34]'
  id: totrans-426
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: It is important to fit the model with a high initial learning rate that gradually
    decays and a large batch size anywhere between 1% and 10% of the training dataset
    size, memory permitting. See the documentation for information on syntax for more
    specific modeling.
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
- en: 'Denoising Autoencoders Case Study: Chinese Spelling Checker'
  id: totrans-428
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: English , like many other European languages, relies upon the piecing together
    of letter-like entities sequentially to form words. Misspelling in English can
    be addressed relatively well with simple rule-based methods, in which a rulebook
    maps common misspelled words into their correct spellings. Deep learning models,
    however, are able to consider the context of the surrounding text to make more
    informed decisions about what word the user intended to use, as well as fix grammar
    mistakes and other language errors.
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
- en: 'However, Chinese “words” are characters rather than strings of letters. Mistakes
    in Chinese are commonly the result of two primary errors: visual similarity (two
    characters share similar visual features) and phonological similarity (two characters
    are pronounced similarly or identically). Because Chinese and English have different
    structures and therefore different requirements for correcting spelling, many
    of the deep learning approaches adapted for English and other European languages
    cannot be readily transferable to Chinese.'
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
- en: 'In “FASPell: A Fast, Adaptable, Simple, Powerful Chinese Spell Checker Based
    on DAE-Decoder Paradigm,” Yuzhong Hong, Xianguo Yu, Neng He, Nan Liu, and Junhui
    Liu^([5](#Fn5)) propose a deep learning approach to correcting Chinese spelling
    based upon the denoising autoencoder architecture.'
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
- en: 'The approach consists of two components: a masked language model and a confidence-similarity
    decoder. The masked language model takes in sample text and outputs several candidates
    for replacement. The confidence-similarity decoder selects replacements from these
    candidates to form the completed, spell-checked sentence.'
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
- en: 'The masked language model, which functions as the denoising autoencoder (parsing
    “noise” – the spelling errors – from the input), uses a BERT-like structure. In
    models like BERT, pretraining is often performed by randomly masking certain words
    and training the model to predict the masked word. However, the errors induced
    by using random masks are not representative of the real-world errors seen in
    Chinese spelling. The pretrained masked language model in FASPell is fine-tuned
    on a composite dataset constructed with three processes:'
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
- en: '*Standard masking* : Some fraction of the dataset uses the same random masking
    as BERT: some character(s) is masked with a `[MASK]` token, and the model predicts
    which character is masked based on the context. This is performed on texts that
    have no errors.'
  id: totrans-434
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Error self-masking* : Errors in the text are “masked” as themselves. The target
    label corresponds to the correct character. The model must identify that there
    is an error and perform a correction to obtain perfect performance.'
  id: totrans-435
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Non*-*error self-masking* : Correct characters in the text are also “masked”
    as themselves, and the target label is that character. This is to prevent overfitting.
    In this case, the model must identify that there is no error and allow it to pass
    through the model unchanged.'
  id: totrans-436
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: While the masked language model provides the basis for the spelling correction,
    on its own is a weak Chinese spell checker – the addition of the confidence-similarity
    decoder to improve performance.
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
- en: The decoder attempts to process and understand the denoised candidates generated
    by the masked language model. The decoder takes in both the confidence of the
    masked language model in each character and the similarity between characters.
    The similarity between two characters is calculated as a combination of their
    visual and phonological similarity.
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
- en: The logic of comparing the masked language model’s confidence and the character
    similarity is as follows (Figure [3-41](#Fig41)). Say that the masked language
    model proposes a character replacement that has a high confidence and is very
    similar to the original erroneous character. The high confidence indicates that
    the masked language model is sure that the correction is correct. Because the
    original erroneous character is highly similar to the correction, we are more
    confident that the correction is correct because it is more likely for a mistake
    to be more than less similar to the correct character.
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig41_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig41_HTML.jpg)'
  id: totrans-440
  prefs: []
  type: TYPE_IMG
- en: Figure 3-41
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
- en: Architecture and example data flow throughout the FASPell model, including the
    masked language model and the confidence-similarity decoder. Produced by Hong
    et al
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, if the masked language model has a high confidence in a correction,
    but the correction and the original character have little similarity, these two
    signals must be closely compared. If the masked language model’s confidence is
    high enough as to outweigh the low similarity between the original character and
    the correction, the correction is accepted. For each character in the sentence,
    the correction that maximizes the model confidence and the similarity with the
    original character is accepted and inserted into the final output.
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
- en: The FASPell design achieves state-of-the-art performance in both error detection
    and correction (Table [3-5](#Tab5)), outperforming prior Chinese spelling correction
    systems proposed by Wang et al. (2018) and Yeh et al. (2013).
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
- en: Table 3-5
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
- en: Performance of FASPell in various spelling tasks, measured with three different
    metrics
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
- en: '| Model | Detection | Correction |'
  id: totrans-447
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  id: totrans-448
  prefs: []
  type: TYPE_TB
- en: '| Precision | Recall | F1 | Precision | Recall | F1 |'
  id: totrans-449
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- | --- | --- |'
  id: totrans-450
  prefs: []
  type: TYPE_TB
- en: '| Wang et al. | 54.0 | 69.3 | 60.7 | Not reported | Not reported | 52.1 |'
  id: totrans-451
  prefs: []
  type: TYPE_TB
- en: '| Yeh et al. | Not reported | Not reported | Not reported | 70.3 | 62.5 | 66.2
    |'
  id: totrans-452
  prefs: []
  type: TYPE_TB
- en: '| FASPell | 76.2 | 63.2 | 69.1 | 73.1 | 60.5 | 66.2 |'
  id: totrans-453
  prefs: []
  type: TYPE_TB
- en: Moreover, removing the fine-tuning on the masked language model and removing
    the confidence-similarity decoder both generally significantly decrease performance,
    demonstrating the important role both elements play in adapting the traditional
    denoising autoencoder-style masked language model for the unique challenges of
    Chinese text (Table [3-6](#Tab6)).
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
- en: Table 3-6
  id: totrans-455
  prefs: []
  type: TYPE_NORMAL
- en: Performance of versions of FASPell in various spelling tasks, measured with
    three different metrics
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
- en: '| Model | Detection | Correction |'
  id: totrans-457
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  id: totrans-458
  prefs: []
  type: TYPE_TB
- en: '| Precision | Recall | F1 | Precision | Recall | F1 |'
  id: totrans-459
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- | --- | --- |'
  id: totrans-460
  prefs: []
  type: TYPE_TB
- en: '| FASPell | 76.2 | 63.2 | 69.1 | 73.1 | 60.5 | 66.2 |'
  id: totrans-461
  prefs: []
  type: TYPE_TB
- en: '| FASPell without fine-tuning | 75.5 | 40.9 | 53.0 | 73.2 | 39.6 | 51.4 |'
  id: totrans-462
  prefs: []
  type: TYPE_TB
- en: '| FASPell without confidence-similarity decoder | 42.3 | 41.1 | 41.6 | 32.2
    | 31.3 | 31.8 |'
  id: totrans-463
  prefs: []
  type: TYPE_TB
- en: '| FASPell without fine-tuning or confidence-similarity decoder | 65.2 | 47.8
    | 55.2 | 48.4 | 35.4 | 40.9 |'
  id: totrans-464
  prefs: []
  type: TYPE_TB
- en: FASPell shows the importance of adapting autoencoders toward your particular
    task. By changing the content and method by which the denoising autoencoder was
    trained and adding a confidence-similarity decoder to incorporate knowledge of
    character similarity into understanding the denoising autoencoder’s output, FASPell
    was able to address a key shortcoming in standard pretrained autoencoder designs.
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
- en: 'Variational Autoencoders Case Study: Text Generation'
  id: totrans-466
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Earlier , we looked at variational autoencoders for image data. Recall that
    variational autoencoders are especially valuable because we can control the generated
    data by making changes to the sampled location in the latent space. This allows
    for fine control over attributes like the text’s sentiment and writing style that
    is not possible with other generation methods.
  id: totrans-467
  prefs: []
  type: TYPE_NORMAL
- en: Variational autoencoders generally work with the right design well on images.
    However, applying variational autoencoders for text generation, in which convolutional
    layers are replaced with recurrent layers, is more difficult. Recall that the
    loss for variational autoencoders is a sum of the reconstruction loss and KL divergence.
    KL divergence acts as a regularizing term that can be optimized by clustering
    the latent variable distributions closer together.
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
- en: When training variational autoencoders for natural language tasks with recurrent
    based structures (Figure [3-42](#Fig42)), the KL divergence term of the loss function
    tends to *collapse* or drop to 0\. This means that all the latent variable distributions
    are essentially all on top of each other, clustered as closely together as possible.
    Because these overlapping distributions are very difficult to decode and make
    sense of, the decoder that generates the text completely ignores these latent
    representations. Instead, because RNN (recurrent neural network)-based decoders
    have significant modeling power, the decoder can produce text that scores a relatively
    low reconstruction error without relying on encoded representations provided by
    the decoder.
  id: totrans-469
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig42_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig42_HTML.jpg)'
  id: totrans-470
  prefs: []
  type: TYPE_IMG
- en: Figure 3-42
  id: totrans-471
  prefs: []
  type: TYPE_NORMAL
- en: The traditional LSTM-based variational autoencoder for text generation, which
    suffers from KL divergence term collapse
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
- en: This results in repetitive and unoriginal outputs that “cheat” the loss function,
    like these sample generated tweets.
  id: totrans-473
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE35]'
  id: totrans-474
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: 'In “A Hybrid Convolutional Variational Autoencoder for Text Generation,” Stanislau
    Semeniuta, Aliaksei Severyn, and Erhardt Barth^([6](#Fn6)) propose a variational
    autoencoder-based structure to address this problem. Using their approach, the
    generated output is both more realistic and diverse:'
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE36]'
  id: totrans-476
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: 'The architecture includes a hybrid of convolutional and recurrent layers; the
    encoder is composed completely of convolutional layers, whereas the decoder combines
    deconvolutions (like transpose convolutions) and a traditional RNN. Deconvolutional
    layers were chosen instead of recurrent layers for two key reasons: deconvolutional
    layers have more efficient GPU implementations, and feed-forward architectures
    are easier to optimize than recurrent ones, due to a more consistent and smaller
    number of steps required.'
  id: totrans-477
  prefs: []
  type: TYPE_NORMAL
- en: By using standard convolutional and deconvolutional layers in a variational
    autoencoder format, key features from the sequence can be learned and mapped to
    a continuous latent space (Figure [3-43](#Fig43)). The sampled encoded representation
    can be decoded via a series of deconvolutions. The output of this convolutional
    variational autoencoder is passed through a conventional LSTM network for further
    processing (Figure [3-44](#Fig44)). The recurrent component is specialized to
    consider dependencies between entities of various texts by considering sequence.
    This alleviates the burden of this task from convolutional/deconvolutional layers,
    which are not built to perform it successfully.
  id: totrans-478
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig44_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig44_HTML.jpg)'
  id: totrans-479
  prefs: []
  type: TYPE_IMG
- en: Figure 3-44
  id: totrans-480
  prefs: []
  type: TYPE_NORMAL
- en: The LSTM component of the hybrid approach, in which the generated features are
    further decoded by an LSTM-style model into text to capture complex sequence-based
    dependencies between entities of a sentence
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig43_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig43_HTML.jpg)'
  id: totrans-482
  prefs: []
  type: TYPE_IMG
- en: Figure 3-43
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
- en: The feed-forward component of the variational autoencoder. Inputs enter through
    the bottom and are processed through convolutions and deconvolutions to produce
    a generated set of features
  id: totrans-484
  prefs: []
  type: TYPE_NORMAL
- en: 'This architecture allows for meaningful text generation without employing overpowering
    stacks of recurrent layers. However, three other mechanisms are required to fully
    address the KL divergence collapse problem:'
  id: totrans-485
  prefs: []
  type: TYPE_NORMAL
- en: '*Input dropout*: A dropout layer is applied to the input such that the input,
    even before encoding, is already corrupted in a random fashion.'
  id: totrans-486
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*KL term annealing*: By gradually increasing the weight of the KL divergence
    term in the loss function across time, the neural network transitions from being
    a standard autoencoder into a variational autoencoder.'
  id: totrans-487
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Auxiliary reconstruction term*: A specialized term is added to the loss, which
    can be optimized only by meaningful reconstruction and encoding. This exacerbates
    the importance of the reconstruction component of the loss function.'
  id: totrans-488
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Using a convolutional recurrent hybrid variational autoencoder with appropriate
    modifications to the optimization strategy yields a much more successful model
    that is both able to produce diverse and realistic outputs. By linearly interpolating
    across two points in the latent space, we’re able to transition from one tweet
    to a completely different tweet:'
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE37]'
  id: totrans-490
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: Semeniuta, Severyn, and Barth’s work shows how being creative with combinations
    of layers and transgressing prepackaged boundaries for what certain model types
    should look like, in addition to well-pointed, specific mechanisms to target particular
    challenges, can lead to significantly greater performance.
  id: totrans-491
  prefs: []
  type: TYPE_NORMAL
- en: Key Points
  id: totrans-492
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In this chapter, we discussed the intuition and implementation of autoencoders
    for tabular and image data, as well as for five key autoencoder applications:
    denoising via denoising autoencoders, pretraining, dimensionality reduction, feature
    generation, and data generation via variational autoencoders.'
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
- en: Autoencoders encode and decode data in the process developing important representations
    of the dataset and efficient processes for extracting key information and features
    from data. Autoencoders rely upon the context of the dataset to support their
    efficient representations. Therefore, while they are not good universal compression
    algorithms, they have many applications that exploit the autoencoder’s unique
    ability to learn complex relationships and representations of data in an unsupervised
    fashion.
  id: totrans-494
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'A key trade-off in autoencoder design is the size of the bottleneck: a bottleneck
    that is too small may make any encoding task too difficult to be practical, whereas
    a bottleneck that is too large can be solved trivially without developing meaningful
    representations.'
  id: totrans-495
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use compartmentalized design when implementing autoencoders and other complex
    neural network structures by defining models as a series of relationships between
    sub-models. This makes implementing autoencoder applications significantly easier
    and is also conceptually more clear to mentally understand and manipulate.
  id: totrans-496
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To build an autoencoder for tabular data, simply stack Dense layers with a progressively
    decreasing number of neurons in the encoder and a progressively increasing number
    of neurons in the decoder. To build an autoencoder for image data, use convolutional
    layers and pooling layers in the encoder, and transpose convolutional layers and
    upsampling layers in the decoder. Convolutional autoencoders often flatten and
    reshape in the region surrounding the bottleneck such that the output of the encoder
    (the encoded representation) is a vector. Use `padding='same'` in convolutional
    layers for easy manipulation of the shape size. Autoencoders can also be built
    for other data types, as long as there exists an inverse decoding layer for every
    encoding layer.
  id: totrans-497
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Denoising autoencoders are autoencoders trained to reconstruct the original
    data from a corrupted, noisy input. If you are using denoising autoencoders to
    denoise dataset, ensure that the form of noise is realistic and exists within
    the dataset. When implementing denoising autoencoders, noise can be induced either
    as a layer, applied to the dataset, or as an Image Data Generator (in the case
    of images).
  id: totrans-498
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When using autoencoders for pretraining, the autoencoder is first trained on
    unsupervised data to extract key ideas and representations. Then, the encoder
    is detached and custom processing layers are added after it to alter the model
    structure such that it can perform a supervised task. The encoder weights are
    usually frozen such that the following layers can be trained to interpret the
    output of the encoded representations; this can be followed by some fine-tuning
    to optimize performance.
  id: totrans-499
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Autoencoders are different from other dimensionality reduction algorithms in
    two key ways: higher adaptability and a model-centric articulation of valued features.
    These can be implemented simply by having the encoder predict encoded representations
    for certain data inputs.'
  id: totrans-500
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using autoencoders for feature generation is like using them for dimensionality
    reduction, but the encoded features are concatenated to the original dataset rather
    than replacing the original dataset. This can be implemented with a nonlinear
    architecture, in which the input is both passed through the encoder and concatenated
    to the output of the encoder; this enriched data can then be passed through a
    series of processing layers to be interpreted and used to produce an output.
  id: totrans-501
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Variational autoencoders allow for the generation of new data by choosing locations
    in the latent space and decoding them. However, because standard autoencoders
    tend to produce discrete spaces that cannot be sampled randomly, variational autoencoders
    implement two key changes to force development of a continuous latent space: learning
    the *probability distributions* of latent variables rather than the absolute position
    and adding KL divergence to the loss function to provide regularization in the
    formation of the latent space. Variational autoencoders rely upon relatively more
    low-level operations but can be accomplished with good organization and active
    experimentation.'
  id: totrans-502
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Autoencoders are extraordinarily versatile structures that you can work into
    almost any deep learning design. Keep them in mind when you approach a new deep
    learning problem and need somewhere to start – autoencoders provide a good starting
    point for developing knowledge and building important representations.
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we’ll discuss model compression and the exciting implications
    it holds for the future of deep learning.
  id: totrans-504
