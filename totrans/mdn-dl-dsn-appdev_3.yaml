  id: totrans-420
  prefs: []
  type: TYPE_TB
- en: '| 1 K | 57.47 ± 1.78 | 61.37 ± 0.88 |'
  id: totrans-421
  prefs: []
  type: TYPE_TB
- en: '| 10 K | 66.66 ± 0.88 | 68.06 ± 0.39 |'
  id: totrans-422
