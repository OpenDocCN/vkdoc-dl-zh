- en: The Sarcos dataset is a problem relating to the dynamics of an anthropomorphic
    robot arm, in which 7 joint positions, 7 joint velocities, and 7 joint accelerations
    (a 21-dimensional input space) must be mapped to 7 joint torques. A TabNet model
    with only 6300 parameters has a lower MSE on this dataset than any other tested
    non-TabNet model (Table [3-3](#Tab3)). A large TabNet model with 1.75 million
    parameters achieves an astoundingly low test error far from that of other models.
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: Sarcos 数据集是一个与类人机器人臂动力学相关的问题，其中需要将 7 个关节位置、7 个关节速度和 7 个关节加速度（一个 21 维的输入空间）映射到
    7 个关节扭矩。一个只有 6300 个参数的 TabNet 模型在这个数据集上的均方误差（MSE）低于任何其他测试的非 TabNet 模型（见表 [3-3](#Tab3)）。一个拥有
    1.75 百万个参数的大型 TabNet 模型实现了远低于其他模型的令人惊讶的低测试误差。
