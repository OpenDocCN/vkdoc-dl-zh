- en: 3. The Versatility of Autoencoders
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 3. 自动编码器的多功能性
- en: '*One word is worth a thousand pictures, if it’s the right word.*'
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*一个恰当的词胜过千言万语。*'
- en: ''
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: —Edward Abbey, American author and essayist^([1](#Fn1))
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: ——爱德华·艾比，美国作家和散文家^([1](#Fn1))
- en: The concept of encoding and decoding entities – ideas, images, physical material,
    information, and so on – is a particularly profound and important one, because
    it is so deeply embedded into how we experience and understand the environment
    around us. Encoding and decoding information is a key process in communication
    and learning. Every time you communicate with someone, observe the weather, read
    from a book – like this one – or in some way interact with information, you are
    engaging in a process of encoding and decoding, observing and interpreting. We
    can make use of this idea with the deep learning concept of an autoencoder.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 编码和解码实体（如思想、图像、物理材料、信息等）的概念特别深刻且重要，因为它深深地嵌入到我们体验和理解周围环境的方式中。编码和解码信息是沟通和学习过程中的关键步骤。每次你与人交流、观察天气、阅读这本书——就像这样——或以某种方式与信息互动时，你都在进行编码和解码、观察和解释的过程。我们可以利用这个想法与深度学习的自动编码器概念相结合。
- en: This chapter will begin by exploring the intuition and theory behind autoencoders
    and how they can be used. It will also cover Keras neural network manipulation
    methods and neural network design that are integral to implementing not only autoencoders
    but also other more complex neural network designs in later chapters. The other
    major half of the chapter will be dedicated toward exploring the versatility of
    autoencoders through five applications. While the autoencoder is a simple concept,
    its incorporation into efforts tackling deep learning problems can make the difference
    between a mediocre and a successful solution.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将首先探讨自动编码器的直觉和理论，以及它们如何被应用。它还将涵盖Keras神经网络操作方法和神经网络设计，这些方法对于实现自动编码器以及后续章节中更复杂的神经网络设计至关重要。本章的另一大部分将致力于通过五个应用来探索自动编码器的多功能性。虽然自动编码器是一个简单的概念，但将其融入解决深度学习问题的努力中，可以在平庸和成功解决方案之间产生差异。
- en: Autoencoder Intuition and Theory
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自动编码器的直觉和理论
- en: Although we will clarify what encoding and decoding refer to more specifically
    with relevance to the intuition behind autoencoders, for now they can be thought
    of as abstract operations tied inextricably together to one another. To encode
    an object, for our purposes, is to represent it at a loss of quantifiable information.
    For instance, we could encode a book by summarizing it, or encode an experience
    with key sensory aspects, like notable senses of touch or hearing. To decode is
    to take in the encoded representation of the object and to reconstruct the object.
    It is the objective of encoding and decoding to “work together” such that the
    reconstruction is as accurate as possible. An effective summary (encoding) of
    a book, for instance, is one from which a reader could more or less construct
    the main ideas of the book to a high accuracy.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管我们将更具体地阐明编码和解码的含义，与自动编码器的直觉相关，但就目前而言，它们可以被视为紧密相连的抽象操作。在我们的目的中，编码一个对象就是以损失可量化信息的方式表示它。例如，我们可以通过总结来编码一本书，或者通过关键感官方面（如显著的触觉或听觉）来编码一次经历。解码就是接收对象的编码表示并重建该对象。编码和解码的目标是“协同工作”，以便重建尽可能准确。例如，一个有效的书籍摘要（编码）是读者可以从中大致构建出书籍主要思想的摘要，并且准确性相当高。
- en: Suppose someone shows you an image of a dog. They allow you to look at that
    image for a few seconds, take it away, and ask you to reconstruct the image by
    drawing it. Within those few seconds, ideally you would have extracted the key
    features of that image so that you could draw it as accurately as possible through
    some efficient method. Perhaps you remember that the dog was facing right, its
    head upright, that it was tall, and that it looked like it was standing still.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 假设有人给你展示了一张狗的图片。他们让你看那幅图片几秒钟，然后拿走它，并要求你通过绘画来重建那幅图片。在这几秒钟内，理想情况下，你会提取出该图像的关键特征，以便通过某种有效的方法尽可能准确地绘制出来。也许你会记得狗是面向右侧的，头部直立，它很高，看起来像是静止不动的。
- en: What is interesting is that these are all high-level abstract concepts – to
    deduce that an object is facing a certain direction, for instance, you must know
    the relationship between the directions of each of the object’s parts (for instance,
    if the head is facing one way, the tail should be facing the other) and be able
    to represent them in a spatial environment. Alternatively, knowing that a dog
    is tall requires knowledge of what a “standard” or “short” dog looks like. Identifying
    the absence of motion requires knowledge of what motion for this particular class
    of objects looks like.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 有趣的是，这些都是高级抽象概念——例如，要推断一个对象面向某个方向，你必须知道该对象各个部分的方位关系（例如，如果头部朝一个方向，尾巴应该朝另一个方向），并且能够在一个空间环境中表示它们。或者，知道一只狗很高需要知道“标准”或“矮小”的狗是什么样子。识别运动缺失需要知道这个特定类别对象的运动是什么样的。
- en: 'The key idea here is that for effective compression and reconstruction of an
    object in the context of complex objects and relationships, the object must be
    compressed with respect to other objects. Compressing an object in isolation with
    a high reconstruction performance is more difficult or performs worse than compressing
    an object with access to additional sets of related knowledge. This is why recovering
    an image of a dog is easier than recovering an image of an unfamiliar object.
    With the image of the dog, you first identify that the object is a dog and thus
    identify that knowledge relating to the “dog” entity is relevant and then can
    observe how the image deviates from the template of the dog. When decoding, if
    you already know that the image was of a dog (a technical detail: this information
    can be passed through the encoding), you can do most of the heavy lifting by first
    initializing the knowledge related to a dog – its standard anatomy, its behavior,
    and its character. Then, you can add deviations and specifics, as necessary.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这里关键的思想是，在复杂对象和关系的背景下，为了有效地压缩和重建一个对象，该对象必须相对于其他对象进行压缩。孤立地压缩一个对象，即使具有高重建性能，也比压缩可以访问到额外相关知识集的对象更困难或表现更差。这就是为什么恢复狗的图像比恢复不熟悉物体的图像更容易。有了狗的图像，你首先识别出这个对象是一只狗，从而确定与“狗”实体相关的知识是相关的，然后可以观察图像如何偏离狗的模板。在解码时，如果你已经知道图像是狗的（技术细节：这个信息可以通过编码传递），你可以通过首先初始化与狗相关的知识——它的标准解剖结构、它的行为和它的性格——来完成大部分繁重的工作。然后，根据需要添加偏差和具体细节。
- en: Because efficient compression of complex entities requires the construction
    of highly effective representations of knowledge and of quick retrieval, this
    encoding-decoding pair of operations is extremely useful in deep learning. This
    pair of operations is referred to generally as the autoencoder structure, although
    we will explore more solidly what it entails. Because the processes of encoding
    and decoding are so fundamental to learning and conducive to the development of
    effective representations of knowledge, autoencoders have found many applications
    in deep learning.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 由于高效压缩复杂实体需要构建高度有效的知识表示和快速检索，因此这对编码-解码操作在深度学习中非常有用。这组操作通常被称为自动编码器结构，尽管我们将更深入地探讨它所包含的内容。由于编码和解码的过程对学习和促进知识有效表示的发展至关重要，自动编码器在深度学习中找到了许多应用。
- en: Likewise, it should be said that this sort of dependence on context makes autoencoders
    often a bad approach for tasks like image compression that require a more universal
    method of information extraction. Autoencoders are limited as tools of data compression
    to the context of the data they are working with and even with that context perform
    at best equivalently to existing, more universal compression algorithms. For instance,
    you could only train a standard autoencoder to effectively encode a few pineapple
    images if you fed it thousands of other images of pineapples; the autoencoder
    would fail to reconstruct an image of an X-ray, for instance. This is a good example
    of critically evaluating deep learning’s viability as an approach to certain problems
    and a much needed reminder that deep learning is not a universal solution and
    needs to work with other components to produce a complete product.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，应该指出的是，这种对上下文的依赖使得自编码器通常不适合像图像压缩这样的任务，这些任务需要更通用的信息提取方法。自编码器作为数据压缩工具受到限制，仅限于它们处理的数据上下文，并且即使在这种上下文中，其性能也最多与现有的更通用的压缩算法相当。例如，如果你给它提供成千上万的菠萝图像，你只能训练一个标准的自编码器来有效地编码几个菠萝图像；例如，自编码器将无法重建X光图像。这是一个批判性地评估深度学习作为解决某些问题的方法可行性的好例子，也是一个必要的提醒，即深度学习不是一个万能的解决方案，需要与其他组件一起工作才能产生完整的产品。
- en: Consider the following reconstructions of images in the MNIST digit dataset
    by an autoencoder that was forced to encode each image into only four numbers
    and then to decode the image from those four numbers (Figure [3-1](#Fig1)). We
    can observe that the network relies upon “templates” of digits. For instance,
    the original digit “5” has a very distinct shape, with sharp edges and joints,
    but the network’s reconstruction looks like a different image – although it expresses
    the same concept of “5,” it is much more rounded and less stylistic. Similar patterns
    can be observed for the digits “0,” “4,” “1,” and “9.” Here, we see that the autoencoder
    is not merely finding an efficient compression algorithm for the images but is
    performing clustering and a bit of under-the-hood “soft” classification to help
    reconstruct the general concepts of the input image.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑以下由自编码器对MNIST数字数据集中的图像进行的重构，该自编码器被迫将每个图像编码为仅四个数字，然后从这四个数字中解码图像（图[3-1](#Fig1)）。我们可以观察到网络依赖于数字的“模板”。例如，原始数字“5”具有非常独特的形状，边缘和接合处都很锋利，但网络的重建图像看起来像另一幅不同的图像——尽管它表达了相同的“5”概念，但它要圆滑得多，风格感也弱得多。对于数字“0”、“4”、“1”和“9”也可以观察到类似的模式。在这里，我们看到自编码器不仅仅是寻找图像的高效压缩算法，它还在执行聚类和一点“幕后”的“软”分类，以帮助重建输入图像的一般概念。
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig1_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig1_HTML.jpg)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig1_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig1_HTML.jpg)'
- en: Figure 3-1
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-1
- en: 'Top row: inputs/original images. Bottom row: reconstructed inputs'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 顶部行：输入/原始图像。底部行：重构的输入
- en: Despite the autoencoder being an unsupervised task – there are no labels – it
    is able to perform highly effective clustering and learn key features, attributes,
    and structures of the data.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管自编码器是一个无监督任务——没有标签——但它能够执行高度有效的聚类并学习数据的关键特征、属性和结构。
- en: 'Formally, the autoencoder consists of three general components: the encoder,
    the bottleneck, and the decoder (Figure [3-2](#Fig2)). These components are not
    exclusive from one another; they overlap. The encoder takes in the input and outputs
    the encoded representation, and the decoder takes in the encoded representation
    and decodes it into the output. The “bottleneck” refers to the nodes shared between
    the encoder and the decoder: it is the output of the encoder and the input to
    the decoder. It can be thought of as holding the encoded representations of the
    input. It is also known as the latent space, “latent” coming from the Latin word
    for “to be hidden” – it is a space containing “hidden” representations for compressed/encoded
    data decipherable only by the decoder.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 形式上，自编码器由三个一般组件组成：编码器、瓶颈和解码器（图[3-2](#Fig2)）。这些组件不是相互排斥的；它们是重叠的。编码器接收输入并输出编码表示，解码器接收编码表示并将其解码为输出。“瓶颈”指的是编码器和解码器之间共享的节点：它是编码器的输出和解码器的输入。它可以被认为是保存输入的编码表示。它也被称为潜在空间，“潜在”一词来自拉丁语中的“to
    be hidden”——它是一个包含“隐藏”表示的空间，这些表示对于压缩/编码数据来说是可解的，只有解码器才能解密。
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig2_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig2_HTML.jpg)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig2_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig2_HTML.jpg)'
- en: Figure 3-2
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-2
- en: Components of an autoencoder diagram
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 自动编码器图的组成部分
- en: The input and output of autoencoders have the same size, because autoencoders
    are trained on the task of reconstruction – given an input item, the objective
    is to reconstruct the output with as high accuracy as possible. This is a crucial
    feature of autoencoders that will be core to how we go about designing these structures.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 自动编码器的输入和输出大小相同，因为自动编码器是在重建任务上训练的——给定一个输入项，目标是尽可能高精度地重建输出。这是自动编码器的一个关键特性，将是我们设计这些结构的核心。
- en: Training a neural network to “do nothing” – to output whatever the input is
    – is a trivial task for many architectures. What makes the autoencoder so meaningful
    and useful for a wide variety of applications, though, is the bottleneck. The
    decrease in the number of nodes in the bottleneck layer compared to the number
    of nodes needed to represent the input data in its original form (or substitute
    nodes with any other unit of data storage) makes the task of reconstruction difficult
    and forces the autoencoder to develop efficient encoding and decoding methods.
    Figures [3-3](#Fig3) and [3-4](#Fig4) show the reconstructed representations for
    two autoencoders trained on the MNIST digit dataset, one with a larger bottleneck
    than the other. While the first autoencoder clearly had too small of an autoencoder
    to develop reasonably accurate reconstructions, the other autoencoder is able
    to develop a certain level of detail – the pointiness of the five, the slight
    curl of the nine’s stem – that it may warrant concern as to if the task is too
    trivial. This depends on the application you are using the autoencoder for, though.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 训练一个神经网络“什么都不做”——输出任何输入的内容——对于许多架构来说是一个简单的任务。然而，自动编码器之所以对各种应用如此有意义和有用，关键在于瓶颈。与原始形式中表示输入数据所需的节点数量相比，瓶颈层中节点数量的减少（或用任何其他数据存储单元替换节点）使得重建任务变得困难，迫使自动编码器发展有效的编码和解码方法。图
    [3-3](#Fig3) 和 [3-4](#Fig4) 展示了在 MNIST 数字数据集上训练的两个自动编码器的重建表示，一个瓶颈更大。虽然第一个自动编码器显然瓶颈太小，无法发展出合理的准确重建，但另一个自动编码器能够发展出一定程度的细节——五的尖锐度，九的茎的轻微卷曲——这可能会引起对任务是否过于简单的担忧。但这取决于你使用自动编码器的应用。
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig4_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig4_HTML.jpg)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig4_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig4_HTML.jpg)'
- en: Figure 3-4
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-4
- en: Original images and their reconstructions by an autoencoder with a large bottleneck
    size
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 原始图像及其由大瓶颈尺寸的自动编码器重建
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig3_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig3_HTML.jpg)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig3_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig3_HTML.jpg)'
- en: Figure 3-3
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-3
- en: Original images and their reconstructions by an autoencoder with a small bottleneck
    size
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 原始图像及其由小瓶颈尺寸的自动编码器重建
- en: Most of the “meat” within autoencoder usage resides in their applications. We’ll
    begin by discussing how autoencoders are designed and implemented for tabular
    data and image data. Then, we’ll explore the intuition and implementation for
    five applications of autoencoders.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 自动编码器的“主要内容”主要在于其应用。我们将首先讨论自动编码器如何设计并实现用于表格数据和图像数据。然后，我们将探讨自动编码器五个应用的直觉和实现。
- en: The Design of Autoencoder Implementation
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自动编码器实现的方案设计
- en: There are many considerations to be made in the implementation of autoencoders,
    depending on the form of their application. In this section, we will broadly discuss
    considerations for designing autoencoders on one-dimensional (vector) and two-dimensional
    (tabular) data by example.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在自动编码器的实现中，需要考虑许多因素，这取决于其应用的形式。在本节中，我们将通过示例广泛讨论设计一维（向量）和二维（表格）数据自动编码器的考虑因素。
- en: Autoencoders for Tabular Data
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 表格数据的自动编码器
- en: Tabular data , for our purposes, refers to data that can be put in the form
    `(n, s)`, where `n` indicates the number of data points and `s` indicates the
    number of elements in each data point. The entire dataset can be put into a two-dimensional
    table, where each row indicates a specific data point and each column indicates
    a feature of that data point.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的目的而言，表格数据指的是可以表示为`(n, s)`形式的数据，其中`n`表示数据点的数量，`s`表示每个数据点中的元素数量。整个数据集可以放入一个二维表中，其中每一行表示一个特定的数据点，每一列表示该数据点的特征。
- en: Building autoencoders for tabular data is an appropriate place to begin, because
    the shape of data at any one layer can be easily manipulated simply by changing
    the number of nodes at that layer. The shape of other forms of data, like images,
    is more difficult to handle. Being able to manipulate shape is crucial to autoencoder
    design because the concept of encoding and decoding entities comes with relatively
    strict instructions about what the shape of the data should look like before encoding,
    after encoding, and before decoding.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 为表格数据构建自动编码器是一个合适的起点，因为可以通过简单地改变该层的节点数来轻松地操作任何一层的数据形状。其他形式的数据，如图像，的形状更难处理。能够操作形状对于自动编码器设计至关重要，因为编码和解码实体的概念在编码前、编码后和解码前对数据的形状有相对严格的要求。
- en: The difference between a standard autoencoder (often abbreviated simply as “AE”)
    and a “deep autoencoder” should also be noted here. Although the exact terminology
    has not seemed to have stabilized yet, generally an autoencoder refers to a shallow
    autoencoder structure, whereas a deep autoencoder contains more depth. Often,
    this is determined by the complexity of the input data, since more complex forms
    of data usually necessitate greater depth. Because data that can be arranged in
    a tabular format is generally less complex than image or text data (or other sorts
    of highly specialized and complex data that neural networks have become good at
    modeling), it’s generally safe to refer to autoencoder structures used on high-resolution
    sets of images or text as deep autoencoders and autoencoder structures used on
    tabular data as simply autoencoders.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 标准自动编码器（通常简称为“AE”）与“深度自动编码器”之间的区别也应该在此处注意。尽管确切的术语似乎还没有稳定下来，但通常自动编码器指的是浅层自动编码器结构，而深度自动编码器包含更多的深度。通常，这是由输入数据的复杂性决定的，因为更复杂的数据形式通常需要更大的深度。由于可以以表格格式排列的数据通常比图像或文本数据（或神经网络擅长建模的其他高度专业化和复杂的数据）更简单，因此通常可以将用于高分辨率图像集或文本的自动编码器结构称为深度自动编码器，而将用于表格数据的自动编码器结构称为简单的自动编码器。
- en: In this example, we will be building an autoencoder with 784-dimensional data.
    That is, each data point consists of 784 features. Let’s begin by importing necessary
    models and modules. We’ll use the `import keras.layers as L` method of dealing
    with importing layers instead of importing each layer individually by name out
    of convenience (Listing [3-1](#PC1)). Additionally, because there is no need to
    use the Functional API in this case – we are not building a nonlinear topology
    and do not need such strong access to some layer as to warrant assigning it its
    own variable – we will opt for the simpler Sequential model structure.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们将构建一个784维数据的自动编码器。也就是说，每个数据点由784个特征组成。让我们首先导入必要的模型和模块。我们将使用`import
    keras.layers as L`方法来处理导入层，而不是为了方便而逐个按名称导入每个层（见[3-1](#PC1)）。此外，由于在这种情况下不需要使用功能API——我们不是构建非线性拓扑，也不需要如此强大的对某些层的访问权限，以至于需要为其分配自己的变量——我们将选择更简单的序列模型结构。
- en: '[PRE0]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Once we initialize the Sequential model structure, we can add the Input layer,
    which takes in the 784-dimensional input data.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们初始化了序列模型结构，我们就可以添加输入层，该层接收784维度的输入数据。
- en: Now, we will build the encoding component of the autoencoder (Listing [3-2](#PC2)).
    The encoder should successively decrease the size the data takes in as to guide
    the process of encoding. In this case, the first decrease in size is from 784
    nodes to 256 nodes; the second is from 256 nodes to 64 nodes; the third is from
    64 nodes to 32 nodes. By decreasing the number of nodes in each `Dense` layer,
    we are decreasing how much space we give the autoencoder to represent the input
    data.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们将构建自动编码器的编码组件（见[3-2](#PC2)）。编码器应该依次减小数据的大小，以指导编码过程。在这种情况下，第一次减小大小是从784个节点到256个节点；第二次是从256个节点到64个节点；第三次是从64个节点到32个节点。通过减少每个`Dense`层中的节点数，我们正在减少自动编码器表示输入数据所需的空间。
- en: '[PRE1]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The last layer of the encoder contains 32 nodes, indicating that the bottleneck
    will be 32 nodes wide. This means that, at its most extreme, the autoencoder must
    find a representation of 784 features with 32 values.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 编码器的最后一层包含32个节点，这意味着瓶颈将是32个节点宽。这意味着，在最极端的情况下，自动编码器必须找到包含32个值的784个特征的表示。
- en: It should also be noted that it is convention for the number of nodes in each
    layer to be a power of two. You will see this pattern both throughout examples
    in this book and in the architectures of neural networks designed by researchers
    (some of these are presented in case studies). It’s thought by many to be convenient
    for memory and a good way to scale the number of nodes meaningfully (when the
    number of nodes is high, meaningful change is *proportional* rather than additive).
    This convention by no means is required, though, if your design requires node
    quantities that cannot accommodate this convention.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 应当注意的是，每个层的节点数通常是2的幂次方，这一规则在本书的示例以及研究人员设计的神经网络架构中都有体现（其中一些在案例研究中展示）。许多人认为这种规则对内存管理方便，并且是有效扩展节点数量的好方法（当节点数量较多时，有效变化是*成比例的*而不是累加的）。然而，如果你的设计需要无法适应这种规则的节点数量，那么这种规则并非必需。
- en: We can then add the decoder layers, which should successively expand the space
    the neural network has to decode data from its encoded representation (Listing
    [3-3](#PC3)). Although it’s not strictly necessary for the success of an autoencoder,
    often decoders are built symmetrically to the encoder out of convenience. Here,
    the decoder performs the same steps as the encoder, but “in reverse.” The first
    expansion is from the encoded representation of 32 nodes into 64 nodes; the second
    is from 64 nodes to 256 nodes; the last is from 256 nodes to 600 nodes, the shape
    of the original input data.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们可以添加解码器层，这些层应该依次扩展神经网络从其编码表示解码数据的空间（见清单[3-3](#PC3)）。虽然这对自动编码器的成功并非严格必要，但通常为了方便，解码器是按照与编码器对称的方式构建的。在这里，解码器执行与编码器相同的步骤，但“相反”。第一次扩展是从32个节点的编码表示到64个节点；第二次是从64个节点到256个节点；最后是从256个节点到600个节点，这是原始输入数据的形状。
- en: '[PRE2]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Note that, in this example, the activation for the last layer of the model is
    the sigmoid activation function. We traditionally put the sigmoid activation (or
    other related curved and bounded functions and adaptations) on the last layer
    to bound the neural network for classification problems. This may or may not be
    suitable toward your particular task.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，在这个例子中，模型的最后一层的激活函数是sigmoid激活函数。我们传统上在分类问题的神经网络中放置sigmoid激活（或其他相关曲线和有界函数及其适应）以限制神经网络。但这可能或可能不适合你的特定任务。
- en: If your input data consists of entirely binary data or can be put into that
    form appropriately, sigmoid may be an appropriate activation. It is important
    to make sure that your input data is scaled properly; for instance, if a feature
    is binary in that it contains only the values 10 and 20, you would need to adjust
    the feature such that it consists only of the values 0 and 1\. Alternatively,
    if your feature is not strictly binary but tends to cluster around two bounds,
    sigmoid may also be an appropriate choice.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的输入数据完全由二进制数据组成或可以适当地转换为这种形式，sigmoid可能是一个合适的激活函数。确保你的输入数据被正确缩放是很重要的；例如，如果一个特征是二进制的，它只包含值10和20，那么你需要调整该特征，使其只包含值0和1。或者，如果你的特征不是严格二进制的但倾向于围绕两个界限聚集，sigmoid也可能是一个合适的选择。
- en: On the other hand, if a feature is spread relatively uniformly across a wide
    range, it may not be appropriate to use the sigmoid activation. The sigmoid function
    is sloped such that it is more “tricky” to output an intermediate value near 0.5
    than near 0 or 1; if this does not adequately represent the distribution of a
    feature, there are other options available. An activation like ReLU (Rectified
    Linear Unit, defined as *y* = max(*x*, 0)) may be more appropriate. However, if
    your feature ranges across negative outputs as well, use the linear activation
    (simply *y = x*). Note that depending on the character of the features in tabular
    data, you will need to choose different losses and metrics – the primary consideration
    being regression or classification.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，如果一个特征在较宽的范围内相对均匀地分布，可能不适宜使用sigmoid激活函数。sigmoid函数的斜率使得在0.5附近输出中间值比在0或1附近更“棘手”；如果这不足以代表特征的分布，还有其他选项可用。例如，ReLU（归一化线性单元，定义为
    *y* = max(*x*, 0)）可能更合适。然而，如果您的特征范围包括负输出，则使用线性激活（简单地说，*y = x*）。请注意，根据表格数据中特征的特征，您需要选择不同的损失和度量标准——主要考虑回归或分类。
- en: A challenge of autoencoders for tabular data is that often tabular data is not
    held together by a unifying factor of context in the same way that image or text
    is. One feature may be derived from a completely different context than another
    feature, and thus you may simultaneously have a continuous feature and a categorical
    feature that a tabular autoencoder must both accommodate. Here, feature engineering
    (e.g., encoding categorical features to continuous values) is needed to “unify”
    the problem types of the features.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 对于表格数据的自动编码器来说，一个挑战是表格数据通常不是由与图像或文本相同的上下文统一因素结合在一起的。一个特征可能来自与另一个特征完全不同的上下文，因此您可能同时拥有一个连续特征和一个分类特征，而表格自动编码器必须同时适应这两个特征。在这里，需要特征工程（例如，将分类特征编码为连续值）来“统一”特征的问题类型。
- en: Plotting the model with plot_model() shows us a successive decrease in size
    during the encoding step and a successive increase in size during the decoding
    step, as expected (Figure [3-5](#Fig5)).
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 `plot_model()` 绘制模型显示，在编码步骤中尺寸连续减小，在解码步骤中尺寸连续增加，正如预期的那样（图 [3-5](#Fig5)）。
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig5_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig5_HTML.jpg)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig5_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig5_HTML.jpg)'
- en: Figure 3-5
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-5
- en: Sample autoencoder using only Dense layers for tabular data
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 仅使用Dense层进行表格数据的示例自动编码器
- en: When building autoencoders, however, generally a *compartmentalized* design
    is preferred over sequentially stacking layers. A compartmentalized design refers
    to implementing a model as a relationship between several sub-models. By using
    a compartmentalized design, we can easily access and manipulate the sub-models.
    Moreover, it is more clear how the model functions and what its components are.
    In an autoencoder, the two sub-models are the encoder and the decoder.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在构建自动编码器时，通常更倾向于模块化设计而不是顺序堆叠层。模块化设计指的是将模型实现为几个子模型之间的关系。通过使用模块化设计，我们可以轻松访问和操作子模型。此外，它更清楚地说明了模型的功能及其组件。在自动编码器中，两个子模型是编码器和解码器。
- en: To build with a compartmentalized design, first define the architectures of
    each of the sub-models. Then, use the Functional API to define each sub-model
    as an input of another object and aggregate the sub-models into an overarching
    model using `keras.models.Model`.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 要构建模块化设计，首先定义每个子模型的架构。然后，使用Functional API定义每个子模型作为另一个对象的输入，并使用 `keras.models.Model`
    将子模型聚合到一个总模型中。
- en: Let’s build the same architecture as we did before, but with a compartmentalized
    design (Listing [3-4](#PC4)). Note that you can pass the `name='name'` argument
    into a model to attach a name to it for later reference.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们构建与之前相同的架构，但采用模块化设计（代码列表 [3-4](#PC4)）。请注意，您可以将 `name='name'` 参数传递给模型，以便为其附加一个名称，以便稍后引用。
- en: '[PRE3]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Once we’ve defined the sub-models (being `encoder` and `decoder`), we can treat
    them as layers and use the Functional API to aggregate them into an overarching
    model (Listing [3-5](#PC5)). Recall that we can treat models just like layers
    in the Functional API by writing them as functions of the previous object.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们定义了子模型（即 `encoder` 和 `decoder`），我们可以将它们视为层，并使用Functional API将它们聚合到一个总模型中（代码列表
    [3-5](#PC5)）。回想一下，我们可以通过将它们写成前一个对象的函数来将模型视为Functional API中的层。
- en: '[PRE4]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: When plotting the architecture of the overarching model (Figure [3-6](#Fig6)),
    Keras now displays only the direct layers and sub-models that compose it. This
    can be helpful for understanding the general architecture and data flow of an
    autoencoder with many layers without needing to see the specifics of what each
    individual layer does.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 当绘制总体模型的架构（图 [3-6](#Fig6)）时，Keras 现在只显示组成它的直接层和子模型。这有助于理解具有许多层的自动编码器的一般架构和数据流，而无需看到每个单独层的具体操作。
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig6_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig6_HTML.jpg)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig6_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig6_HTML.jpg)'
- en: Figure 3-6
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-6
- en: Visualization of an autoencoder architecture built with compartmentalized design
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 使用分区设计构建的自动编码器架构的可视化
- en: The primary practical benefit of using compartmentalized design for autoencoders
    is that after compiling and fitting, we can call `encoder.predict(input_data)`
    to obtain the learned encoding. If you do not use compartmentalized design, you
    can also use layer-retrieving methods discussed in Chapter [2](516104_1_En_2_Chapter.xhtml)
    (e.g., get_layer()) to create a model object consisting of the encoding layers,
    but it’s more work than is necessary and is less portable. Accessing the encoder’s
    encoding of data is necessary for many of the autoencoder applications we will
    discuss in the second half of this chapter.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 使用分区设计为自动编码器的主要实际好处是，在编译和拟合后，我们可以调用 `encoder.predict(input_data)` 来获取学习到的编码。如果您不使用分区设计，您也可以使用第
    [2](516104_1_En_2_Chapter.xhtml) 章中讨论的层检索方法（例如，get_layer()）来创建一个由编码层组成的模型对象，但这比必要的要多，并且可移植性较差。访问编码器对数据的编码对于我们将在本章后半部分讨论的许多自动编码器应用是必要的。
- en: 'As mentioned in Chapter [2](516104_1_En_2_Chapter.xhtml), you can use this
    implementation design method with all sorts of other structures beyond autoencoders
    to easily freeze entire groups of layers, or for the other benefits of compartmentalized
    design mentioned here, like better organization or easier referencing of models.
    For instance, this sort of compartmentalized design can be used to separate a
    model using transfer learning into two sub-models: the pretrained convolutional
    component and the custom fully connected layer. Freezing the pretrained convolutional
    component can be easily done by calling submodel.trainable = False.'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 如第 [2](516104_1_En_2_Chapter.xhtml) 章所述，您可以使用这种实现设计方法与所有 sorts of 其他结构结合使用，以轻松冻结整个层的组，或者为了这里提到的分区设计的其他好处，如更好的组织或更容易引用模型。例如，这种分区设计可以用来将使用迁移学习的模型分成两个子模型：预训练的卷积组件和定制的全连接层。通过调用
    submodel.trainable = False 可以轻松地冻结预训练的卷积组件。
- en: Autoencoders for Image Data
  id: totrans-66
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 图像数据的自动编码器
- en: 'Building autoencoders for image data follows the same logic as building one
    for tabular data: the encoder should condense the input into an encoded representation
    by using “reducing” operations, and the decoder should expand the encoded representation
    into the output by using “enlarging” operations. However, we need to make additional
    considerations to adapt to an increased complexity of the data shape.'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 为图像数据构建自动编码器遵循与构建表格数据自动编码器相同的逻辑：编码器应通过使用“减少”操作将输入压缩成编码表示，解码器应通过使用“扩大”操作将编码表示扩展成输出。然而，我们需要考虑额外的因素以适应数据形状增加的复杂性。
- en: The “enlarging” operation needs to be some sort of an “inverse” of the “reducing”
    operation. This was not much of a concern with Dense layers, because both an enlarging
    and a reducing operation could be performed simply by increasing or decreasing
    the number of nodes in a following layer. However, because common image-based
    layers like the convolutional layer and the pooling layer can only be reductive
    operations, we need to explicitly note that the decoding component is not only
    the encoding component “in reverse” (as was described in building autoencoders
    for tabular data) but is inverting – step by step – the encoding operations. This
    poses complications to building the encoder and decoder.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: “扩大”操作需要是“减少”操作的某种“逆”操作。在 Dense 层中，这并不是一个大问题，因为扩大和减少操作都可以通过简单地增加或减少后续层的节点数来执行。然而，由于常见的基于图像的层，如卷积层和池化层，只能执行减少操作，我们需要明确指出解码组件不仅是对编码组件“反向”的（正如在构建表格数据的自动编码器中所述），而且是在逐步逆转编码操作。这给构建编码器和解码器带来了复杂性。
- en: Although there are developments on using deep autoencoders for language and
    advanced tabular data, autoencoders have primarily been used for image data. Because
    of this, an extensive knowledge of autoencoders is necessary to successfully deal
    with most image-related deep learning tasks.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管在语言和高级表格数据中使用深度自编码器方面有所发展，但自编码器主要用于图像数据。正因为如此，对自编码器有广泛的知识是成功处理大多数图像相关深度学习任务所必需的。
- en: Image Data Shape Structure and Transformations
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 图像数据形状结构及其变换
- en: Because shape is so important to convolutional autoencoder design, first, we
    must briefly discuss image shape and methods of transforming it.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 因为形状对于卷积自编码器设计非常重要，所以首先，我们必须简要讨论图像形状及其变换方法。
- en: An image has the shape `(a, b, c)`. Using the commonly used channels-last notation,
    `a` and `b` represent the spatial dimensions of the image and `c` represents the
    number of channels or the depth (Figure [3-7](#Fig7)). For instance, a standard
    color image has three channels, corresponding to the red, green, and blue values
    in RGB images. Image-based layers can generally manipulate an image by altering
    all three elements of its shape.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 一张图像的形状为 `(a, b, c)`。使用常用的通道最后表示法，`a` 和 `b` 代表图像的空间维度，而 `c` 代表通道数或深度（图 [3-7](#Fig7)）。例如，标准彩色图像有三个通道，对应于
    RGB 图像中的红色、绿色和蓝色值。基于图像的层通常可以通过改变其形状的三个元素来操纵图像。
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig7_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig7_HTML.jpg)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig7_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig7_HTML.jpg)'
- en: Figure 3-7
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-7
- en: Illustration of the three dimensions of an image
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 图像三个维度的示意图
- en: Table [3-1](#Tab1) enumerates four key layers used in convolutional neural networks.
    Note that usually the height and the width of the image are the same (the image
    is square), which makes exploring transformations simpler. This table assumes
    a square shape, although you can apply similar logic to rectangular inputs. Moreover,
    the table assumes a stride of 1 is used and that the inputs are spatially two-dimensional,
    although again the logic applies to other forms.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 表 [3-1](#Tab1) 列出了在卷积神经网络中使用的四个关键层。请注意，通常图像的高度和宽度是相同的（图像是正方形），这使得探索变换变得简单。此表假设形状为正方形，尽管你可以将类似的逻辑应用于矩形输入。此外，此表假设使用步长为
    1，并且输入是空间二维的，尽管逻辑同样适用于其他形式。
- en: Table 3-1
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 表 3-1
- en: Important layers in a convolutional neural network and their transformations
    to the image shape
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 卷积神经网络中的重要层及其对图像形状的变换
- en: '| **Layer** | **Parameters** | **Output given input shape** `(a, a, c)` | **Description**
    |'
  id: totrans-79
  prefs: []
  type: TYPE_TB
  zh: '| **层** | **参数** | **给定输入形状的输出** `(a, a, c)` | **描述** |'
- en: '| --- | --- | --- | --- |'
  id: totrans-80
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- |'
- en: '| Convolution | Kernel shape = `(x, y)`Number of filters = `n`Padding = “same”
    or “valid” | If `padding = ''valid''`: `(a-(x-1), a-(x-1), n)`If `padding = ''same''`:
    `(a, a, n)` | The two-dimensional convolution slides a kernel of shape `(x, y)`
    across the image. Hence, it will reduce the image’s spatial dimensions by `x-1`
    and `y-1` pixels. Generally `x=y` (thus the kernel is square-shaped), but some
    architectures exploit a rectangular kernel shape, which can be successful in certain
    domains. See the Chapter [6](516104_1_En_6_Chapter.xhtml) case study on the InceptionV3
    architecture to explore convolution factorization and nonsquare kernel shapes.However,
    if padding is set as “same,” the image is padded (extra “blank” dimensions are
    added to its size) such that when the convolution is performed, the resulting
    image has the same shape as the previous one. We’ll see why this is helpful later.
    |'
  id: totrans-81
  prefs: []
  type: TYPE_TB
  zh: '| 卷积 | 核形状 = `(x, y)` 过滤器数量 = `n` 填充 = “same” 或 “valid” | 如果 `padding = ''valid''`:
    `(a-(x-1), a-(x-1), n)` 如果 `padding = ''same''`: `(a, a, n)` | 二维卷积将形状为 `(x, y)`
    的核在图像上滑动。因此，它将图像的空间维度减少 `x-1` 和 `y-1` 像素。通常 `x=y`（因此核是正方形形状），但某些架构利用矩形核形状，这在某些领域可能很成功。参见第
    [6](516104_1_En_6_Chapter.xhtml) 章节中的 InceptionV3 架构案例研究，以探索卷积分解和非正方形核形状。然而，如果填充设置为“same”，则图像会被填充（向其大小添加额外的“空白”维度），使得在执行卷积时，结果图像的形状与之前相同。我们将在稍后看到这是为什么有帮助。
    |'
- en: '| Pooling | Pooling size = `(x, x)`Padding = “same” or “valid” | If `a` is
    divisible by `x` and `padding=''same''` or `''valid''`: `(a/x, a/x, c)`If `a`
    is not divisible by `x` and `padding=''valid''`: `(floor(a/x), floor(a/x), c)`If
    `a` is not divisible by `x` and `padding=''same''`: `(ceil(a/x), ceil(a/x), c)`^([2](#Fn2))
    | The two-dimensional pooling operation offers a faster way to reduce the size
    of an image shape by placing non-overlapping (unlike convolutions, which do overlap)
    windows of size `(x, x)` across the image to “summarize” the important findings.
    Pooling is usually either used in the form of average pooling (all elements in
    the pooling window are averaged) or max pooling (the maximum element in the pooling
    window is passed on). Pooling divides the image size by the pooling window’s respective
    dimension. However, because images sometimes may not be exact multiples of the
    window’s respective dimension, you can use padding modes to help determine the
    exact shape of the output. |'
  id: totrans-82
  prefs: []
  type: TYPE_TB
  zh: '| 池化 | 池化大小 = `(x, x)`填充 = “same”或“valid” | 如果`a`能被`x`整除且`padding=''same''`或`''valid''`：`(a/x,
    a/x, c)`如果`a`不能被`x`整除且`padding=''valid''`：`(floor(a/x), floor(a/x), c)`如果`a`不能被`x`整除且`padding=''same''`：`(ceil(a/x),
    ceil(a/x), c)`^([2](#Fn2)) | 二维池化操作提供了一种更快的方法来通过在图像上放置大小为`(x, x)`的非重叠窗口（与卷积不同，卷积是重叠的）来“总结”重要的发现。池化通常以平均池化（池化窗口中的所有元素平均）或最大池化（池化窗口中的最大元素传递）的形式使用。池化将图像大小除以池化窗口的相应维度。然而，因为图像有时可能不是窗口相应维度的精确倍数，您可以使用填充模式来帮助确定输出的确切形状。|'
- en: '| Transpose convolution | Kernel shape = `(x, y)`Number of filters = `n`Padding
    = “same” or “valid” | If `padding = ''valid''`: `(a+(x-1), a+(x-1), n)`If `padding
    = ''same''`: `(a, a, n)` | The transpose convolution can be thought of as the
    “inverse” of the convolution. If you passed an input through a convolutional layer
    and then a transpose convolutional layer (with the same kernel shape), you’d end
    up with the same shape. When you’re building the decoder, use transpose convolutional
    layers in lieu of the convolutional layers in the encoder to increase the size
    of the image shape.Like the convolutional layer, you can also choose padding modes.
    |'
  id: totrans-83
  prefs: []
  type: TYPE_TB
  zh: '| 转置卷积 | 核形状 = `(x, y)`滤波器数量 = `n`填充 = “same”或“valid” | 如果`padding = ''valid''`：`(a+(x-1),
    a+(x-1), n)`如果`padding = ''same''`：`(a, a, n)` | 转置卷积可以被视为卷积的“逆”。如果你通过一个卷积层然后是一个转置卷积层（具有相同的核形状）传递输入，你最终会得到相同的形状。在构建解码器时，使用转置卷积层代替编码器中的卷积层以增加图像尺寸。与卷积层一样，你也可以选择填充模式。|'
- en: '| Upsampling | Upsampling factor: `(x, y)` | `(a*x, a*y, n)` | The upsampling
    layer simply “magnifies” an image by a certain factor without changing any of
    the image actual values. For instance, the array `[[1, 2], [3, 4]]` would get
    upsampled simply as `[[1, 1, 2, 2], [1, 1, 2, 2, ], [3, 3, 4, 4], [3, 3, 4, 4]]`
    with an upsampling factor of (2,2). The upsampling layer can be thought of as
    the inverse of the pooling operation – while pooling divides the dimensions in
    the image size by a certain quantity (assuming no padding is being used), upsampling
    multiples the image size by that quantity. You cannot use padding with upsampling.
    When you’re building the decoder, use upsampling layers in lieu of pooling layers
    in the encoder to increase the size of the image shape. |'
  id: totrans-84
  prefs: []
  type: TYPE_TB
  zh: '| 上采样 | 上采样因子：`(x, y)` | `(a*x, a*y, n)` | 上采样层简单地通过一定的因子“放大”图像，而不改变图像的实际值。例如，数组`[[1,
    2], [3, 4]]`在上采样因子为`(2,2)`的情况下会简单地上采样为`[[1, 1, 2, 2], [1, 1, 2, 2, ], [3, 3, 4,
    4], [3, 3, 4, 4]]`。上采样层可以被视为池化操作的逆操作——当池化通过在图像尺寸中除以某个数量（假设没有使用填充）时，上采样通过该数量乘以图像尺寸。上采样时不能使用填充。在构建解码器时，使用上采样层代替编码器中的池化层以增加图像尺寸。|'
- en: Note that only convolutional and transpose convolutional layers contain weights;
    pooling and upsampling are simple ways to aggregate extracted features without
    any particular learnable parameters. Additionally, note that the default padding
    method is “valid.”
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，只有卷积层和转置卷积层包含权重；池化和上采样是简单的聚合提取特征的方法，不包含任何特定的可学习参数。此外，请注意默认的填充方法是“valid”。
- en: There are many approaches to building convolutional autoencoders. We’ll cover
    many approaches, beginning with a simple convolutional autoencoder without pooling
    to introduce the concept.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 构建卷积自编码器有许多方法。我们将介绍许多方法，从没有池化的简单卷积自编码器开始，以介绍这一概念。
- en: Convolutional Autoencoder Without Pooling
  id: totrans-87
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 无池化的卷积自编码器
- en: As noted before, autoencoders are generally built symmetrically, but this is
    even more true with image-based autoencoders. In this context, *not* building
    the autoencoder symmetrically requires a lot of arduous shape tracking and manipulation.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，自编码器通常是对称构建的，但对于基于图像的自编码器来说，这一点更为明显。在这种情况下，*不*对称构建自编码器需要大量的形状跟踪和处理。
- en: Let’s begin with building an encoder that takes in data with shape `(256, 256,
    3)` and successively encodes it with convolution layers (Listing [3-6](#PC6)).
    In many convolutional autoencoder designs, the number of filters increases as
    the image size decreases. Make sure that the increase in number of filters does
    not outweigh the decrease in image size in terms of the amount of storage the
    network has available, such that the storage capacity for data decreases throughout
    the encoder (and correspondingly increases throughout the decoder).
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从构建一个接受形状为 `(256, 256, 3)` 的数据的编码器开始，并依次使用卷积层对其进行编码（列表 [3-6](#PC6)）。在许多卷积自编码器设计中，随着图像尺寸的减小，过滤器的数量会增加。确保过滤器的增加不会超过网络可用的存储量，这样在整个编码器（以及相应地在整个解码器）中数据的存储容量都会减少。
- en: '[PRE5]'
  id: totrans-90
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: In this case, we are successively increasing the number of filters (from 3 channels
    initially to 8, 16, and 32) while keeping the filter size at `(3,3)`.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们依次增加过滤器的数量（从最初的 3 个通道增加到 8、16 和 32），同时保持滤波器大小为 `(3,3)`。
- en: By visualizing with plot_model (Figure [3-8](#Fig8)), we see how the shape of
    the image changes over time in accordance with the convolutional layers. The output
    of the encoder is a compressed image of shape (52, 52, 32). However, you’ll notice
    that this model violates the requirement that the number of filters shouldn’t
    outweigh the decrease in image size without pooling – the “encoded representation”
    is larger than the input (`64*64*3` < `52*52*32`)! This is because convolutions
    are simply not a good way to reduce the image size quickly. We need pooling to
    address this problem. For now, to keep things simple, we will ignore this issue.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用 `plot_model` 进行可视化（图 [3-8](#Fig8)），我们可以看到图像的形状如何随时间变化，这与卷积层相对应。编码器的输出是一个形状为
    (52, 52, 32) 的压缩图像。然而，你会注意到这个模型违反了不使用池化时过滤器数量不应超过图像尺寸减少的要求——“编码表示”比输入大（`64*64*3`
    < `52*52*32`）！这是因为卷积并不是快速减小图像大小的良好方法。我们需要池化来解决这个问题。目前，为了保持简单，我们将忽略这个问题。
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig8_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig8_HTML.jpg)'
  id: totrans-93
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig8_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig8_HTML.jpg)'
- en: Figure 3-8
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-8
- en: The architecture of an example convolutional encoder without pooling and only
    using convolutional layers
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 一个示例卷积编码器架构，没有使用池化层，仅使用卷积层
- en: We can build our decoder to “mirror” the encoder by reversing the layer order
    and using the inverse layers to “undo” the encoding (Listing [3-7](#PC7), Figure
    [3-9](#Fig9)). We know that the decoder will take in an encoded representation
    of size (52, 52, 32).
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将解码器构建为“镜像”编码器，通过反转层顺序并使用逆层来“撤销”编码（列表 [3-7](#PC7)，图 [3-9](#Fig9)）。我们知道解码器将接受一个大小为
    (52, 52, 32) 的编码表示。
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig9_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig9_HTML.jpg)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig9_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig9_HTML.jpg)'
- en: Figure 3-9
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-9
- en: The architecture of an example convolutional decoder without pooling and only
    using convolutional layers
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 一个示例卷积解码器架构，没有使用池化层，仅使用卷积层
- en: '[PRE6]'
  id: totrans-100
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'There’s one problem – the output of the decoder has shape (64, 64, 8), whereas
    the input has shape (64, 64, 3). There are two ways of addressing this. You could
    change the last layer to `L.Conv2DTranspose(3, (3, 3))` such that it has three
    channels. Alternatively, you could add another layer to the end of the decoder:
    `L.Conv2DTranspose(3, (1, 1))`. Because it has a filter size of (1,1), the image
    width and height are not changed, but the number of channels is collapsed from
    8 into 3.'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 存在一个问题——解码器的输出形状为 (64, 64, 8)，而输入的形状为 (64, 64, 3)。有两种方法可以解决这个问题。你可以将最后一层改为 `L.Conv2DTranspose(3,
    (3, 3))` 以使其具有三个通道。或者，你可以在解码器的末尾添加另一个层：`L.Conv2DTranspose(3, (1, 1))`。因为它具有 (1,1)
    的滤波器大小，所以图像的宽度和高度不会改变，但通道数从 8 减少到 3。
- en: Because convolutional autoencoders (and networks in general) rely on repeated
    convolutions and other operations, it’s generally good practice to build them
    using a for loop and index lists of parameters as necessary. For instance, we
    could rewrite the encoder more efficiently as follows (Listing [3-8](#PC8)).
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 因为卷积自编码器（以及一般的网络）依赖于重复的卷积和其他操作，所以通常一个好的做法是使用循环和必要的参数索引列表来构建它们。例如，我们可以更有效地重写编码器，如下所示（见列表[3-8](#PC8)）。
- en: '[PRE7]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: In this case, since there is a clear pattern with the number of filters in each
    layer, you could even write it without indexing a parameter list (Listing [3-9](#PC9)).
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，由于每一层的滤波器数量有一个明显的模式，甚至可以不索引参数列表来编写它（见列表[3-9](#PC9)）。
- en: '[PRE8]'
  id: totrans-105
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: A primary benefit of this sort of design is that you can easily extend the depth
    of the network simply by increasing the number of iterations layer-adding code
    is looped through, saving you from needing to type a lot of code manually.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 这种设计的主要好处是，你可以通过简单地增加层添加代码循环的迭代次数来轻松扩展网络的深度，从而节省你手动输入大量代码的需要。
- en: Convolutional Autoencoder Vector Bottleneck Design
  id: totrans-107
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 卷积自编码器向量瓶颈设计
- en: Often, the bottleneck (the output to the encoder and input to the decoder) is
    not left as an image – it’s usually flattened into a vector and reshaped into
    an image. Their primary benefit from this is that we are able to obtain vector
    representations of images that are independent from any spatial dimensions, which
    makes them more “clean” and easy to work with. Moreover, they can be more easily
    used with applications like pretraining (more on this later).
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，瓶颈（编码器的输出和解码器的输入）不会保留为图像——它通常被扁平化为一个向量并重塑为图像。它们的主要好处是我们能够获得与任何空间维度无关的图像向量表示，这使得它们更“干净”且易于处理。此外，它们可以更容易地用于像预训练这样的应用（关于这一点稍后讨论）。
- en: To do this, we need to add a Flatten layer at the end of the encoder (Listing
    [3-10](#PC10), Figure [3-10](#Fig10)). Since flattening an image usually leads
    to a very large vector, it’s common to apply some Dense layers to further process
    and reduce its size. Another alternative is the GlobalAveragePooling2D or GlobalMaxPooling2D
    layer, which produces a smaller output vector (averages/takes the maximum of each
    filter); this layer follows the same syntax as the flattening layer.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 要做到这一点，我们需要在编码器的末尾添加一个扁平化层（见列表[3-10](#PC10)，图[3-10](#Fig10)）。由于扁平化图像通常会导致一个非常大的向量，因此通常会在其上应用一些密集层以进一步处理并减小其大小。另一种选择是GlobalAveragePooling2D或GlobalMaxPooling2D层，它产生一个更小的输出向量（对每个滤波器进行平均/取最大值）；这个层与扁平化层具有相同的语法。
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig10_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig10_HTML.jpg)'
  id: totrans-110
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig10_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig10_HTML.jpg)'
- en: Figure 3-10
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-10
- en: The architecture of an example convolutional encoder without pooling and only
    using convolutional layers, using a vector bottleneck design
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 使用向量瓶颈设计的无池化示例卷积编码器架构
- en: '[PRE9]'
  id: totrans-113
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Visualizing is especially helpful to help us understand transformations to the
    shape. We see that before flattening, the encoder had encoded the image into an
    image of shape (60, 60, 16), which was flattened into a vector with dimension
    57,600\. The output of the encoder is a vector of dimension 32.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化特别有助于帮助我们理解形状的转换。我们看到，在扁平化之前，编码器已经将图像编码为形状为(60, 60, 16)的图像，该图像被扁平化为57,600维的向量。编码器的输出是一个32维的向量。
- en: We need this information to construct the decoder (Listing [3-11](#PC11), Figure
    [3-11](#Fig11)). The encoder takes in the encoded representation, which is a vector
    of dimension 32\. It then uses Dense layers to increase its size up to the same
    size as the data right after the encoder had flattened it, which is (57600,).
    From there, we can reshape the vector into an image of shape (60, 60, 16) such
    that inverse convolutional operations can be applied to it.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要这些信息来构建解码器（见列表[3-11](#PC11)，图[3-11](#Fig11)）。编码器接收编码后的表示，它是一个32维的向量。然后它使用密集层将其大小增加到与编码器扁平化后的数据相同的大小，即(57600,)。从那里，我们可以将向量重塑为形状为(60,
    60, 16)的图像，这样就可以对其应用逆卷积操作。
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig11_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig11_HTML.jpg)'
  id: totrans-116
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig11_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig11_HTML.jpg)'
- en: Figure 3-11
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-11
- en: The architecture of an example convolutional encoder without pooling and only
    using convolutional layers, using a vector bottleneck design
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 没有池化且仅使用卷积层的示例卷积编码器架构，采用向量瓶颈设计
- en: '[PRE10]'
  id: totrans-119
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Recall that to address the number of channels in the input image, in this case
    we put an extra convolutional layer with filter size (1,1) to maintain the image
    size but to collapse the number of channels.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 回想一下，为了处理输入图像中的通道数，在这种情况下，我们添加了一个额外的卷积层，滤波器大小为（1,1），以保持图像大小但减少通道数。
- en: Convolutional Autoencoder with Pooling and Padding
  id: totrans-121
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 带有池化和填充的卷积自编码器
- en: 'While we were technically successful in building a convolutional autoencoder
    in that the inputs and outputs were identical in shape, we failed to adhere to
    a fundamental principle of autoencoder design: the encoder should progressively
    decrease the size of the data. We need pooling in order to cut down on the image
    size quickly.'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们在技术上成功地构建了一个卷积自编码器，因为输入和输出在形状上相同，但我们未能遵守自编码器设计的基本原则：编码器应逐步减小数据的大小。我们需要池化来快速减小图像大小。
- en: Convolutional neural networks are generally constructed in modules (Figure [3-12](#Fig12))
    of convolutional layer – convolutional layer – pooling layer (with the number
    of convolutional layers varying). These modules can be repeated over and over
    again. By following several convolutional layers of feature extraction with a
    pooling layer, these extracted features can be aggregated, and the key highlights
    can be passed onto the next convolutional layers for further feature extraction
    and processing. (You can find a more detailed discussion of module/cell-based
    architectural design in Chapter [6](516104_1_En_6_Chapter.xhtml).)
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 卷积神经网络通常在模块（图[3-12](#Fig12)）中构建，模块包括卷积层 - 卷积层 - 池化层（卷积层的数量可变）。这些模块可以一次又一次地重复。通过跟随几个特征提取的卷积层和一个池化层，这些提取的特征可以聚合，并将关键亮点传递到下一个卷积层进行进一步的特征提取和处理。（你可以在第[6](516104_1_En_6_Chapter.xhtml)章中找到关于基于模块/单元的架构设计的更详细讨论。）
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig12_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig12_HTML.jpg)'
  id: totrans-124
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig12_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig12_HTML.jpg)'
- en: Figure 3-12
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-12
- en: Example repeated module/cell-based design in convolutional autoencoders
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 基于重复模块/单元的卷积自编码器设计示例
- en: However, when using convolutional layers in conjunction with pooling, we run
    into the problem of image sizes not divisible by the pooling factor. For instance,
    consider an image of shape (64, 64, 3). After a convolutional layer with filter
    size (2, 2) is applied to it, the image has a new shape of (63, 63, 3). If we
    want to apply pooling with size (2, 2) to it, we need to use padding in order
    to determine if the output of pooling will be (31, 31, 3) or (32, 32, 3). This
    is hardly a concern with standard convolutional neural networks. However, in autoencoders,
    we need to consider not only operations in the encoder but also the corresponding
    inverse “undoing” operations in the decoder. The upsampling layer has no padding
    layer. Thus, if we applied upsampling with size (2, 2) to an image with size (31,
    31, 3), we would obtain an image of size (62, 62, 3); if we applied it to an image
    with size (32, 32, 3), we would obtain an image of size (64, 64, 3). In this case,
    there is no easy way in which we can obtain the original image size of (63, 63,
    3).
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，当使用卷积层与池化层结合时，我们会遇到图像大小不能被池化因子整除的问题。例如，考虑一个形状为（64, 64, 3）的图像。在应用滤波器大小为（2,
    2）的卷积层后，图像的新形状为（63, 63, 3）。如果我们想应用大小为（2, 2）的池化，我们需要使用填充来确定池化后的输出将是（31, 31, 3）还是（32,
    32, 3）。这对于标准的卷积神经网络来说几乎不是问题。然而，在自编码器中，我们需要考虑的不仅是编码器中的操作，还有解码器中相应的逆“撤销”操作。上采样层没有填充层。因此，如果我们对大小为（31,
    31, 3）的图像应用大小为（2, 2）的上采样，我们会得到一个大小为（62, 62, 3）的图像；如果我们对大小为（32, 32, 3）的图像应用它，我们会得到一个大小为（64,
    64, 3）的图像。在这种情况下，我们无法简单地获得原始图像大小（63, 63, 3）。
- en: You could attempt to work with specific padding and add padding layers manually,
    but it’s a lot of work and difficult to manipulate and organize systematically.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以尝试使用特定的填充并手动添加填充层，但这需要大量工作，并且难以系统地操作和组织。
- en: To address this problem, one approach of building convolutional autoencoders
    with pooling and convolutional layers is to use `padding='same'` on all convolutional
    layers. This means that convolutional layers have no effect on the shape of the
    image – images are padded on the side before the convolution is performed such
    that the input and output images have identical shapes. The convolution is still
    changing the content of the image, but the image size remains constant. Removing
    the effect of convolutional layers significantly simplifies the management of
    image shape. Beyond this simplification, padding also allows for convolutions
    to process features on the edge of the image that might be passed over without
    padding by adding more buffer room such that edge features can be processed by
    the center of the kernel.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，构建具有池化和卷积层的卷积自编码器的一种方法是在所有卷积层上使用`padding='same'`。这意味着卷积层对图像形状没有影响——在执行卷积之前，图像的两侧会填充，使得输入和输出图像具有相同的形状。卷积仍然在改变图像的内容，但图像大小保持不变。去除卷积层的影响显著简化了图像形状的管理。除了这种简化之外，填充还允许卷积处理图像边缘的特征，这些特征在没有填充的情况下可能会被忽略，通过添加更多的缓冲空间，使得边缘特征可以被核的中心处理。
- en: Let’s build an encoder for an autoencoder with `padding='same'` for all convolutional
    layers (Listing [3-12](#PC12)).
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们为所有卷积层使用`padding='same'`构建一个自编码器的编码器（见列表[3-12](#PC12)）。
- en: '[PRE11]'
  id: totrans-131
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: From visualizing (Figure [3-13](#Fig13)), we can see that even though we prevented
    the convolutional layers from decreasing the size, with the addition of pooling,
    we were able to decrease the feature map resolution significantly. The flattened
    vector (before any processing) is 2048-dimensional – compare this to the 57600-dimensional
    post-flattening vector without pooling!
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 从可视化（图[3-13](#Fig13)）中，我们可以看到，尽管我们阻止了卷积层减小大小，但随着池化的加入，我们能够显著降低特征图分辨率。展平向量（在任何处理之前）是2048维的——与没有池化的展平后向量57600维进行比较！
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig13_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig13_HTML.jpg)'
  id: totrans-133
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig13_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig13_HTML.jpg)'
- en: Figure 3-13
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-13
- en: Complete convolutional encoder with pooling and padding
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 完整的卷积编码器，带有池化和填充
- en: We can correspondingly construct the decoder (Listing [3-13](#PC13), Figure
    [3-14](#Fig14)). Like the convolutional layers in the encoder, the transpose convolutional
    layers in the decoder must use `padding='same'` to ensure symmetry.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以相应地构建解码器（见列表[3-13](#PC13)，图[3-14](#Fig14)）。与编码器中的卷积层类似，解码器中的转置卷积层也必须使用`padding='same'`以确保对称性。
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig14_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig14_HTML.jpg)'
  id: totrans-137
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig14_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig14_HTML.jpg)'
- en: Figure 3-14
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-14
- en: Complete convolutional decoder with pooling and padding
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 完整的卷积解码器，带有池化和填充
- en: '[PRE12]'
  id: totrans-140
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: This method, of course, relies upon your input having a certain size. In this
    case, the input size must be a power of 2, since each pooling factor decreases
    the image’s spatial dimensions by a factor of 2\. You can insert a reshaping layer
    right after the input or reshape your dataset to accommodate this. The primary
    advantage of this method is that it makes organizing the symmetry of shape transformation
    much more simpler. If you know you want the shape of the encoded image right before
    flattening to be (16, 16, x)^([3](#Fn3)), for instance, and that you want to have
    three pooling layers with size (2,2) and three pooling layers with size (3,3),
    you can calculate the corresponding input shape to be of 16 · 2³ · 3³ pixels in
    width and height.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，这种方法依赖于你的输入具有特定的大小。在这种情况下，输入大小必须是2的幂，因为每个池化因子将图像的空间维度减少2倍。你可以在输入之后立即插入一个重塑层，或者重新整理你的数据集以适应这一点。这种方法的主要优点是它使得组织形状变换的对称性变得更加简单。例如，如果你知道你想要在展平之前编码图像的形状为(16,
    16, x)^([3](#Fn3))，并且你想要有三个大小为(2,2)的池化层和三个大小为(3,3)的池化层，你可以计算出相应的输入形状为宽度高度为16·2³·3³像素。
- en: Autoencoders for Other Data Forms
  id: totrans-142
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 其他数据形式的自编码器
- en: Using this logic, you can build autoencoders for data of all forms. For instance,
    you can use recurrent layers to encode and decode text forms of data, as long
    as an exact inverse decoding layer exists for every encoding layer you add. Although
    much of autoencoder work has been based around images, recent work is exploring
    the many applications of autoencoders for non-image-based data types. See the
    third case study in this chapter for an example of autoencoder applications in
    non-image data.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这种逻辑，你可以为所有形式的数据构建自编码器。例如，你可以使用循环层来编码和解码文本形式的数据，只要每个编码层都有一个精确的逆解码层。尽管自编码器的大部分工作都是围绕图像进行的，但最近的研究正在探索自编码器在非图像数据类型中的许多应用。参见本章的第三个案例研究，了解自编码器在非图像数据中的应用示例。
- en: Autoencoder Applications
  id: totrans-144
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自编码器应用
- en: As we’ve seen, the concept of the autoencoder is relatively simple. Because
    of the need to keep the input and output the same size, however, we’ve seen that
    implementing autoencoder architectures for complex data forms can require a significant
    amount of forethought and pre-planning. The good news, though, is that implementing
    the autoencoder architecture is – in most autoencoders – the most time-intensive
    step. Once the autoencoder structure has been built (with the preferred compartmentalized
    design), you can easily adapt it for several applications to suit your purposes.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们所见，自编码器的概念相对简单。然而，由于需要保持输入和输出大小相同，我们看到了实现自编码器架构对于复杂数据形式可能需要大量的预先思考和规划。不过，好消息是，在大多数自编码器中，实现自编码器架构是最耗时的步骤。一旦自编码器结构（采用首选的模块化设计）建立起来，你就可以轻松地将其适应于多种应用以满足你的需求。
- en: Using Autoencoders for Denoising
  id: totrans-146
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用自编码器进行降噪
- en: 'The purpose of denoising autoencoders is largely implied by its name: the “de”
    prefix in this context means “away” or “opposite,” and thus denoising is to move
    “opposite of” or to remove noise. Denoising is simple to implement and can be
    used for many purposes.'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 降噪自编码器的目的是很大程度上由其名称所暗示的：“de”前缀在这里意味着“离开”或“相反”，因此降噪就是移动“相反的”或去除噪声。降噪易于实现，可用于许多目的。
- en: Intuition and Theory
  id: totrans-148
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 直觉和理论
- en: In a standard autoencoder, the model is trained to reconstruct whatever input
    it is given. A denoising autoencoder is the same, but the model must reconstruct
    a denoised version of a noisy input (Figure [3-15](#Fig15)). Whereas the encoder
    in a standard autoencoder only needs to develop a representation of the input
    image that can be decoded with low reconstruction error (which can be very difficult
    as is), the encoder in a denoising autoencoder must also develop a representation
    that is robust to any noise. Denoising autoencoders can be applied to denoise
    messy signals, images, text, tabular data, and other forms of data.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 在标准自编码器中，模型被训练来重建它所接收的任何输入。降噪自编码器与此相同，但模型必须重建一个噪声输入的降噪版本（图[3-15](#Fig15)）。与标准自编码器中的编码器只需要开发一个可以以低重建误差解码的输入图像表示（这本身就是一项非常困难的任务）相比，降噪自编码器中的编码器还必须开发一个对任何噪声都具有鲁棒性的表示。降噪自编码器可以应用于降噪杂乱的信号、图像、文本、表格数据以及其他形式的数据。
- en: Note
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Denoising autoencoders are often abbreviated as DAE. You may notice that this
    is in conflict with the abbreviation of “deep autoencoder.” Because the term “denoising
    autoencoders” is relatively more established and clearly defined than “deep autoencoder,”
    when you see the abbreviation “DAE” in most contexts, it should be safe to assume
    that it refers to a denoising autoencoder. For the sake of clarity, in this book,
    we will favor not using the abbreviation “DAE”; if it is used, it will refer to
    the denoising autoencoder rather than the deep autoencoder.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 降噪自编码器通常缩写为DAE。你可能注意到，这与“深度自编码器”的缩写相冲突。由于“降噪自编码器”这个术语相对更成熟且定义明确，因此，当你在大多数情况下看到“DAE”这个缩写时，可以安全地假设它指的是降噪自编码器。为了清晰起见，在这本书中，我们将倾向于不使用“DAE”这个缩写；如果使用，它将指的是降噪自编码器而不是深度自编码器。
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig15_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig15_HTML.jpg)'
  id: totrans-152
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig15_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig15_HTML.jpg)'
- en: Figure 3-15
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-15
- en: Conceptual diagram of the components of a denoising autoencoder
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 降噪自编码器组件的概念图
- en: Of course, the concept of the denoising autoencoder assumes that your data is
    relatively free from noise in the first place. Because the denoising autoencoder
    relies upon the original data as the ground truth to perform denoising on the
    noisy version of that original data, if the original data is heavily noisy itself,
    the autoencoder will learn heavily arbitrary and noisy representation procedures.
    If the data you are using to train the denoising autoencoder has a high degree
    of noise, in many cases, there is little difference between using a denoising
    autoencoder and a standard autoencoder. In fact, using the former may be more
    damaging to your workflow because you may be operating under the assumption that
    the denoising autoencoder is learning meaningful representations of the data robust
    to noise when this is not true.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，去噪自动编码器的概念假设你的数据最初相对无噪声。因为去噪自动编码器依赖于原始数据作为真实数据来对原始数据的噪声版本进行去噪，如果原始数据本身噪声很大，自动编码器将学会大量任意和噪声的表示过程。如果你用于训练去噪自动编码器的数据具有很高的噪声度，在许多情况下，使用去噪自动编码器和标准自动编码器之间几乎没有区别。事实上，使用前者可能会对你的工作流程造成更大的损害，因为你可能是在假设去噪自动编码器正在学习对噪声具有鲁棒性的数据的有意义表示，而实际上并非如此。
- en: 'The noise to the input can be constructed through three methods (Figure [3-16](#Fig16)):
    by inserting noise as a layer, into the dataset directly, or as a data generator.
    Which method to use depends on your problem type:'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 输入的噪声可以通过三种方法构建（见图[3-16](#Fig16)）：作为一层插入，直接添加到数据集中，或者作为数据生成器。使用哪种方法取决于你的问题类型：
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig16_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig16_HTML.jpg)'
  id: totrans-157
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig16_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig16_HTML.jpg)'
- en: Figure 3-16
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-16
- en: Three methods of inducing noise in a denoising autoencoder
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 去噪自动编码器中引入噪声的三个方法
- en: '*Apply noise as a layer*: Insert a random noise-adding layer directly after
    the input of the autoencoder such that the noise is applied to the input before
    any encoding and decoding is performed on it. The primary advantage of this method
    is that the model learns to be robust to multiple noisy versions of the same original
    image, since each time the model is passed through the model, different noise
    is applied. However, the noise-adding layer needs to be removed before the denoising
    autoencoder is used in application; it only serves as an artificial instrument
    during training, and in application, we expect the input to already be “naturally”
    noisy. When using this method, you can create the dataset like you would create
    it for an autoencoder – the input and outputs are the same.'
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*将噪声作为一层应用*：在自动编码器的输入之后直接插入一个随机噪声添加层，这样噪声在编码和解码之前就被应用到输入上了。这种方法的主要优势是模型学会对同一原始图像的多个噪声版本具有鲁棒性，因为每次模型通过模型时，都会应用不同的噪声。然而，在使用去噪自动编码器之前，需要移除噪声添加层；它仅在训练期间作为一个人工工具，在实际应用中，我们期望输入已经“自然”地包含噪声。当使用这种方法时，你可以创建数据集，就像为自动编码器创建数据集一样——输入和输出是相同的。'
- en: '*Apply noise to the dataset directly*: Before training, apply noise to the
    dataset directly during its construction such that the data contains *x* as noisy
    data and *y* as the original data. The primary advantage of using this method
    is customizability: you can use any functions you would like to construct the
    dataset, since it is outside the scope of the neural network and therefore not
    subject to the restrictions of Keras and TensorFlow. You may want to add complex
    forms of noise that are not available as default layers or generators in Keras/TensorFlow.
    Moreover, there is no need to manipulate individual noise-adding layers of the
    autoencoder. However, you run the risk of overfitting (especially with small datasets
    and large architectures), because the autoencoder only sees one noisy form of
    each original input instance. Of course, you could manually produce several noisy
    forms of each instance, although it may take more time and be less efficient.'
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*直接向数据集添加噪声*：在训练之前，直接在其构建过程中向数据集添加噪声，使得数据包含 *x* 作为噪声数据，*y* 作为原始数据。使用这种方法的主要优势是可定制性：你可以使用任何你想要的函数来构建数据集，因为它超出了神经网络的范畴，因此不受
    Keras 和 TensorFlow 的限制。你可能想要添加一些默认层或生成器中不可用的复杂噪声形式。此外，无需操作自动编码器的单个噪声添加层。然而，你面临过拟合的风险（尤其是在小数据集和大架构的情况下），因为自动编码器只能看到每个原始输入实例的一种噪声形式。当然，你也可以手动生成每个实例的几种噪声形式，尽管这可能需要更多时间且效率较低。'
- en: '*Apply noise through a data generator*: Keras/TensorFlow contains an `ImageDataGenerator`
    object that can perform a variety of augmentations and other forms of noise to
    the image, like adjusting the brightness, making small rotations and shears, or
    distorting the hue. Moreover, the image data generator is similar to the layer-based
    method in that the network is exposed to many different noisy representations
    of the input data – data is passed through the random generator in each feed-forward
    motion and distorted before it is formally processed by the network. The primary
    advantage of using the data generator is that you can apply forms of noise that
    are more natural or expected to occur in the data than with layers, which can
    implement more “artificial” forms of noise like adding Gaussian noise to the image.
    Moreover, there is no need to manipulate noise-adding layers after training the
    denoising autoencoder. However, image data generators are limited only to images,
    which means you will need to use another method for other forms of data.'
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*通过数据生成器添加噪声*：Keras/TensorFlow 包含一个 `ImageDataGenerator` 对象，可以对图像执行各种增强和其他形式的噪声，如调整亮度、进行小旋转和剪切，或扭曲色调。此外，图像数据生成器与基于层的类似，网络暴露于输入数据的许多不同噪声表示——数据在每次前向传递时通过随机生成器，并在正式由网络处理之前被扭曲。使用数据生成器的主要优势是你可以应用比层更自然或更可能出现在数据中的噪声形式，层可以实现更“人工”的噪声形式，如向图像添加高斯噪声。此外，在训练去噪自动编码器后无需操作噪声添加层。然而，图像数据生成器仅限于图像，这意味着你需要使用其他方法来处理其他形式的数据。'
- en: Denoising autoencoders are primarily used, as expected, to denoise input data
    we expect will be noisy. You can insert the denoising autoencoder directly after
    the input such that the neural network performing some supervised task receives
    a denoised version of the input (Figure [3-17](#Fig17)).
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 去噪自动编码器主要用于去除我们预期将会是噪声的输入数据。你可以直接在输入之后插入去噪自动编码器，这样执行某些监督任务的神经网络就会接收到输入的降噪版本（图
    [3-17](#Fig17)）。
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig17_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig17_HTML.jpg)'
  id: totrans-164
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig17_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig17_HTML.jpg)'
- en: Figure 3-17
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-17
- en: One method of using denoising autoencoders to perform denoising on input data
    before the denoised input is processed. You can also unfreeze the denoising autoencoder
    to fine-tune afterward
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 使用去噪自动编码器对输入数据进行降噪的一种方法是在处理降噪输入之前。你还可以解冻去噪自动编码器以进行后续的微调。
- en: Consider a task in which a model must classify the sound of an audio input.
    For example, the model should be able to output a representation of the label
    “bird” if the audio input is of a bird song, or it should be able to output a
    representation of the label “lion” if the audio input is of a lion’s roar. As
    one may imagine, a challenge in this dataset of real-life audio is that many of
    the audio inputs will contain overlapping sounds. For instance, if the audio clip
    of the bird song was from a park surrounded by the metropolitan bustle, the background
    would contain sounds of cars driving and people talking. To be successful, a model
    will need to be able to remove these sources of background noise and isolate the
    core, primary sound.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑一个任务，其中模型必须对音频输入的声音进行分类。例如，如果音频输入是鸟鸣，模型应该能够输出标签“bird”的表示；如果音频输入是狮子的咆哮，它应该能够输出标签“lion”的表示。正如人们可能想象的那样，在这个真实音频数据集中，一个挑战是许多音频输入将包含重叠的声音。例如，如果鸟鸣音频片段来自一个被都市喧嚣包围的公园，背景将包含汽车行驶和人们交谈的声音。为了成功，模型需要能够去除这些背景噪声源并隔离核心、主要的声音。
- en: To do this, say you obtain another dataset of real-life sounds without background
    noise. You artificially add some form of noise that resembles the noise you would
    encounter in the noisy dataset. For instance, you can use audio processing libraries
    in Python to overlay a sound without background noise with smaller, dimmed down
    background noise. It is key for the success of the denoising autoencoder that
    the noise you artificially generate resembles the expected form of noise in the
    data. Adding Gaussian noise to images, for instance, may not help much as a denoising
    task unless the dataset you would like to denoise contains Gaussian noise. (You
    may find that adding some form of noise is better than adding no noise at all
    in terms of creating a self-supervised pretraining task, but this will be discussed
    more later.) You train a denoising autoencoder to reconstruct the original unnoisy
    sound signal from the noise-overlayed signal and then use the denoising autoencoder
    to denoise real-life sounds before they are classified.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 要做到这一点，比如说，你获得了一个没有背景噪声的实时声音数据集。你人为地添加一些类似于你在嘈杂数据集中遇到的噪声。例如，你可以使用Python中的音频处理库，将没有背景噪声的声音与较小的、调暗的背景噪声叠加。对于去噪自动编码器的成功至关重要的是，你人为生成的噪声与数据中预期的噪声形式相似。例如，向图像添加高斯噪声可能对去噪任务帮助不大，除非你想要去噪的数据集中包含高斯噪声。（你可能会发现添加某种形式的噪声比完全不添加噪声更有利于创建自监督预训练任务，但这将在稍后进行讨论。）你训练一个去噪自动编码器从噪声叠加的信号中重建原始的无噪声声音信号，然后使用去噪自动编码器在它们被分类之前对实时声音进行去噪。
- en: Denoising can occur in other forms, though, too. For instance, you can denoise
    the entire dataset with the denoising autoencoder before training a model on the
    ultimate task instead of architecturally inserting the denoising autoencoder into
    the model operating on the ultimate task. This could be successful if you expect
    the “ultimate” model to be applied to relatively clean data in deployment, but
    know that the training data available is noisy. It’s important to understand your
    particular problem well so you can successfully implement and manipulate your
    denoising autoencoder design.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 噪声去除也可以以其他形式发生。例如，你可以在对最终任务进行建模之前，使用去噪自动编码器对整个数据集进行去噪，而不是在最终任务操作模型中架构性地插入去噪自动编码器。如果你预期“最终”模型在部署时将应用于相对干净的数据，但知道可用的训练数据是嘈杂的，这可能很成功。理解你特定的难题非常重要，这样你才能成功实施并操作你的去噪自动编码器设计。
- en: Implementation
  id: totrans-170
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 实现
- en: In our discussion of the implementation of denoising autoencoders, we will assume
    the autoencoder is being used for tabular data. The logic and syntax still can
    be applied to the use of denoising autoencoders for other data, like image or
    sequence data, with the necessary considerations for that particular data format.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们讨论去噪自动编码器的实现时，我们将假设自动编码器被用于表格数据。逻辑和语法仍然可以应用于去噪自动编码器在其他数据上的使用，例如图像或序列数据，但需要考虑该特定数据格式。
- en: Inducing Noise
  id: totrans-172
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 引入噪声
- en: As discussed, there are three practical methods of inducing noise.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 正如讨论的那样，有三种实际的方法可以引入噪声。
- en: One method is to insert a noising layer directly after the input (Listing [3-14](#PC14),
    Figure [3-18](#Fig18)). The most useful layer for this method will likely be the
    `keras.layers.GaussianNoise` layer, which adds Gaussian noise with a specified
    standard deviation. For a very heavy form of noise, you can also use layers like
    dropout or other modifications (although this is stretching the limits of what
    we would consider to strictly be a denoising autoencoder). You can also write
    your own custom layer for more complex noise-adding operations.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 一种方法是在输入之后直接插入一个噪声层（见列表[3-14](#PC14)，图[3-18](#Fig18)）。这种方法最有用的层可能是`keras.layers.GaussianNoise`层，它可以通过指定的标准差添加高斯噪声。对于非常强烈的噪声形式，你也可以使用dropout或其他修改（尽管这已经接近了我们认为的严格意义上的去噪自动编码器的极限）。你也可以编写自己的自定义层来进行更复杂的噪声添加操作。
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig18_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig18_HTML.jpg)'
  id: totrans-175
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig18_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig18_HTML.jpg)'
- en: Figure 3-18
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-18
- en: Example implementation of inducing noise via layer method
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 通过层方法诱导噪声的示例实现
- en: '[PRE13]'
  id: totrans-178
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Another method of inducing noise is to apply it to the dataset directly, ideally
    during parsing when creating a TensorFlow dataset (Listing [3-15](#PC15)). When
    creating the parsing function, you can use a variety of TensorFlow image operations
    to induce random forms of noise. In this example, the unparsed TensorFlow dataset
    consists of a filename and a label for each instance (although you may find it
    helpful to arrange the unparsed dataset in another format if you know you will
    only use it for unsupervised learning).
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 诱导噪声的另一种方法是将噪声直接应用于数据集，理想情况下是在创建TensorFlow数据集时进行解析（见列表[3-15](#PC15)）。在创建解析函数时，你可以使用各种TensorFlow图像操作来诱导随机形式的噪声。在这个例子中，未解析的TensorFlow数据集由每个实例的文件名和标签组成（尽管如果你知道你只会用它进行无监督学习，你可能希望以另一种格式安排未解析的数据集）。
- en: In this example, we are using two helpful `tf.image.random_x` operations to
    induce random noise into the image, which vary brightness and JPEG quality noise.
    (The latter refers to a phenomenon in JPEG images in which visual artifacts distort
    the image due to the compression algorithm. This is especially helpful if your
    dataset consists of images in JPEG format or contains images transferred electronically
    that likely were once in JPEG format.) It should be noted that when specifying
    the range of noise – for instance, in JPEG quality, “80” and “100” in the example
    are the minimum and maximum JPEG quality – you should leave the possibility of
    cases in which no noise is applied to the image. This allows for the model not
    only to denoise a noisy image but also to recognize the presence of noise in the
    first place. We build this possibility by including the upper JPEG quality bound
    as 100%, in which the output of the `random_jpeg_quality` function is identical
    to the input. Functions like `random_brightness` require only for a maximum noise
    bound, and thus you can assume that there will be some examples with minimal levels
    of noise that satisfy this good practice.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们使用了两个有用的`tf.image.random_x`操作来向图像中引入随机噪声，这些操作会改变亮度和JPEG质量噪声。（后者指的是JPEG图像中的一种现象，由于压缩算法，视觉伪影会扭曲图像。如果你的数据集包含JPEG格式的图像或包含可能曾经是JPEG格式的电子传输的图像，这特别有帮助。）需要注意的是，在指定噪声范围时——例如，在JPEG质量中，示例中的“80”和“100”是JPEG质量的最低和最高值——你应该留出可能不向图像应用噪声的情况。这允许模型不仅能够去噪噪声图像，而且还能首先识别噪声的存在。我们通过将JPEG质量的上限设置为100%来构建这种可能性，其中`random_jpeg_quality`函数的输出与输入相同。像`random_brightness`这样的函数只需要一个最大噪声界限，因此你可以假设将会有一些噪声水平极低的示例满足这一良好实践。
- en: '[PRE14]'
  id: totrans-181
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: A third method to induce certain noise into image data is to use the Keras/TensorFlow
    `ImageDataGenerator` (Listing [3-16](#PC16)). We begin by instantiating an `ImageDataGenerator`
    object with augmentation parameters for noise (the range to randomly shift brightness,
    small levels of shearing, etc.). To provide the image data generator object with
    data, use `.flow` or `.flow_from_x`. If using `.flow_from_directory`, be sure
    to set `class_mode='input'` so the image data generator does not assume labels
    and arrange the data generator as a classification problem.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 在图像数据中引入一定噪声的第三种方法是使用 Keras/TensorFlow 的 `ImageDataGenerator`（见列表 [3-16](#PC16)）。我们首先通过实例化一个带有噪声增强参数的
    `ImageDataGenerator` 对象来开始，这些参数包括随机调整亮度的范围、轻微的剪切等。为了向图像数据生成器对象提供数据，请使用 `.flow`
    或 `.flow_from_x`。如果使用 `.flow_from_directory`，请确保设置 `class_mode='input'`，这样图像数据生成器就不会假设标签并将数据生成器作为分类问题来安排。
- en: '[PRE15]'
  id: totrans-183
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: You can also use `ImageDataGenerator` with `class_mode='input'` as an alternative
    data source for autoencoders generally (not just for denoising) instead of using
    TensorFlow datasets. If you do decide to use image data generators for autoencoders,
    be sure to be careful with how you control your augmentation parameters for your
    particular purpose. If you are training a standard autoencoder, for instance,
    in which the input is identical to the ideal output, make sure to eliminate all
    sources of artificial noise by adjusting the augmentation parameters accordingly.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 您还可以使用 `ImageDataGenerator` 并将 `class_mode='input'` 作为自编码器的一般替代数据源（不仅限于降噪），而不是使用
    TensorFlow 数据集。如果您决定为自编码器使用图像数据生成器，请确保仔细控制您特定目的的增强参数。例如，如果您正在训练一个标准自编码器，其中输入与理想输出相同，请确保通过相应调整增强参数来消除所有人工噪声的来源。
- en: Using Denoising Autoencoders
  id: totrans-185
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 使用降噪自编码器
- en: If you are using the layer method of inducing noise into the denoising autoencoder,
    you will need to remove the noise-adding layer when using the denoising autoencoder
    in another application (Listing [3-17](#PC17)). Assume that the variable `ae`
    refers to the denoising autoencoder with a noise-adding layer, compartmentalized
    design, and proper naming. We can use the `.get_layer(name)` method to retrieve
    a layer or groups of layers by name and build them into a “final denoising autoencoder”
    model without the noise-adding layer. The example retrieves only the encoding
    and decoding layers, which store the weights that perform the key steps of encoding
    while denoising and decoding, thus eliminating the noise-adding layer in the final
    model. Here, you can see the many benefits that naming, compartmentalized design,
    and other organizational good practices can offer in manipulating the network
    structure.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您正在使用向降噪自编码器中引入噪声的层方法，当您在其他应用中使用降噪自编码器时，您需要移除噪声添加层（见列表 [3-17](#PC17)）。假设变量
    `ae` 指的是带有噪声添加层、分室设计和适当命名的降噪自编码器。我们可以使用 `.get_layer(name)` 方法通过名称检索一个层或一组层，并将它们构建成一个没有噪声添加层的“最终降噪自编码器”模型。示例中只检索了编码和解码层，这些层存储了在降噪和解码过程中执行关键编码步骤的权重，从而在最终模型中消除了噪声添加层。在这里，您可以看到命名、分室设计和其他组织良好实践在操作网络结构时可以提供的许多好处。
- en: '[PRE16]'
  id: totrans-187
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: If you are dealing with a model that is not compartmentalized or that has many
    layers that need to be transferred, you can also refer to each layer by its index
    (Listing [3-18](#PC18)). Begin by defining the input layer and the layer after
    the input layer. In this case, the layer/group of layers we would like to follow
    the input layer in the final denoising autoencoder model is the encoder, which
    we can reference as `ae.layers[2]` because it is the third layer/component in
    the original denoising autoencoder architecture containing the noise-adding layer.
    From there, we can iteratively loop through the remaining layers and attach each
    one to the previous using Functional API syntax.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您正在处理一个没有分室或有很多需要转移的层的模型，您也可以通过其索引来引用每个层（见列表 [3-18](#PC18)）。首先定义输入层和输入层之后的层。在这种情况下，我们希望在最终降噪自编码器模型中跟随输入层的层/层组是编码器，我们可以将其引用为
    `ae.layers[2]`，因为它是在原始降噪自编码器架构中包含噪声添加层的第三层/组件。从那里，我们可以迭代地遍历剩余的层，并使用 Functional
    API 语法将每一层附加到前一层。
- en: '[PRE17]'
  id: totrans-189
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Keep in mind that there are complications with this sort of method when using
    nonlinear topologies.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，在使用非线性拓扑时，这种方法存在一些复杂性。
- en: By using any of these two methods, you can transfer the relevant weights into
    a final model without the intermediate layer. You will find this method of “surgically”
    removing an unwanted layer from a model helpful in other applications, especially
    in transfer learning. The resulting model (Figure [3-19](#Fig19)) with the removed
    noise layer can be used for validation testing.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用这两种方法中的任何一种，您可以将相关权重转移到最终模型中，而不需要中间层。您会发现这种方法从模型中“外科手术”地移除不需要的层在其他应用中很有帮助，尤其是在迁移学习中。移除噪声层后的结果模型（图
    [3-19](#Fig19)）可用于验证测试。
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig19_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig19_HTML.jpg)'
  id: totrans-192
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig19_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig19_HTML.jpg)'
- en: Figure 3-19
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-19
- en: The denoising autoencoder after removing the Gaussian noise layer
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 移除高斯噪声层后的去噪自编码器
- en: Once you have obtained a “cleaned” autoencoder, you can insert it into another
    model as a preprocessing segment to denoise the input data (Figure [3-20](#Fig20),
    Listing [3-19](#PC19)).
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦您获得了一个“清洁”的自编码器，您可以将它插入到另一个模型中作为预处理段来去噪输入数据（图 [3-20](#Fig20)，代码列表 [3-19](#PC19)）。
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig20_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig20_HTML.jpg)'
  id: totrans-196
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig20_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig20_HTML.jpg)'
- en: Figure 3-20
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-20
- en: Using the denoising autoencoder to decode the input before it is passed to the
    following layers for processing
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 在将输入传递到后续层进行处理的之前，使用去噪自编码器对其进行解码
- en: '[PRE18]'
  id: totrans-199
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: You can set your own layer freezing strategy (see Chapter [2](516104_1_En_2_Chapter.xhtml))
    as necessary to suit your own purposes. For instance, you may decide to freeze
    the weights in the denoising autoencoder for the majority of training and then
    to unfreeze the entire network and perform some fine-tuning afterward.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以根据需要设置自己的层冻结策略（参见第 [2](516104_1_En_2_Chapter.xhtml) 章），以适应您的目的。例如，您可能决定在大多数训练中冻结去噪自编码器的权重，然后解冻整个网络并在之后进行一些微调。
- en: Using Autoencoders for Pretraining
  id: totrans-201
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用自编码器进行预训练
- en: Another application of autoencoders is for pretraining. Recall that pretraining
    is used to provide “context” such that it develops certain skills or representations
    that allow it to succeed in performing its ultimate task. In Chapter [2](516104_1_En_2_Chapter.xhtml),
    we discussed various pretraining methods and strategies. We will build upon this
    prior discussion to demonstrate when and how to use autoencoders in the context
    of pretraining. With both extensive knowledge of autoencoders and of pretraining
    at this point, you will find that the intuition and implementation of autoencoders
    for pretraining is quite straightforward.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 自编码器的另一个应用是预训练。回想一下，预训练是用来提供“上下文”，以便它发展某些技能或表示，使其能够成功执行其最终任务。在第 [2](516104_1_En_2_Chapter.xhtml)
    章中，我们讨论了各种预训练方法和策略。我们将在此基础上进一步讨论，以展示在预训练的背景下何时以及如何使用自编码器。在此时，您将发现自编码器用于预训练的直觉和实现相当直接。
- en: Intuition
  id: totrans-203
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 直觉
- en: The use of autoencoders in pretraining falls under the category of self-supervised
    learning. You could think of autoencoders as the simplest form of self-supervised
    learning. Recall that in self-supervised learning, a model is trained on an altered
    dataset, which is constructed only on the input data, not the labels, of the task
    dataset. Some self-supervised learning tasks, for instance, involve predicting
    the degree by which an image was rotated or the degree of noise that was added
    to some set of data. In a standard autoencoder, however, no alterations to the
    data are needed beyond moving data instances into a dataset such that the input
    and output are the same for each instance.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 自编码器在预训练中的应用属于自监督学习的范畴。您可以将自编码器视为自监督学习最简单的形式。回想一下，在自监督学习中，模型是在一个经过修改的数据集上训练的，这个数据集仅基于任务数据集的输入数据构建，而不是标签。一些自监督学习任务，例如，涉及预测图像旋转的程度或添加到某些数据集的噪声程度。然而，在标准自编码器中，除了将数据实例移动到数据集中，使得每个实例的输入和输出相同之外，不需要对数据进行任何修改。
- en: Generally, when autoencoders are used for pretraining, the entire autoencoder
    is trained on the pretraining dataset, the encoder is extracted, more layers are
    appended to the encoder, and the newly formed model is trained on the task dataset
    (Figure [3-21](#Fig21)). Because the encoder extracts important representations
    of the data from the unsupervised pretraining task, the hope of using the encoder
    for pretraining is that it begins with the basic ability to represent and encode
    key features of the input. The appended layers can then process the encoded key
    features into an output for the task dataset.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，当使用自动编码器进行预训练时，整个自动编码器在预训练数据集上训练，提取编码器，附加更多层到编码器上，然后在新形成的模型上训练任务数据集（见图 [3-21](#Fig21)）。由于编码器从无监督预训练任务中提取了数据的重要表示，因此使用编码器进行预训练的期望是它开始于表示和编码输入关键特征的基本能力。附加的层可以将编码的关键特征处理成任务数据集的输出。
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig21_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig21_HTML.jpg)'
  id: totrans-206
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig21_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig21_HTML.jpg)'
- en: Figure 3-21
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-21
- en: Conceptual map of using autoencoders for pretraining. Input data is the same
    for autoencoders. “network” is used to refer to the layers appended to the encoder.
    This isn’t entirely accurate, but it represents the idea that there is another
    “mini-network” that processes the output of the encoder to map whatever encoded
    representation comes out of the encoder into the output
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 使用自动编码器进行预训练的概念图。自动编码器的输入数据是相同的。“网络”用于指代附加到编码器的层。这并不完全准确，但它代表了存在另一个“微型网络”，该网络处理编码器的输出，将编码器输出的任何编码表示映射到输出
- en: 'If you plan to use an autoencoder for pretraining, it’s important you consider
    a key factor in how large to build the bottleneck (and correspondingly the widths
    of the encoder and the decoder components): the amount of information the layers
    appended after the encoder have to work with. If your bottleneck is large, the
    task may be trivial, and the network may not develop meaningful representations
    and processes for understanding the input. In this case, the processing layers
    after the encoder would receive a high number of features, but each feature would
    not contain much valuable information. On the other hand, if the bottleneck is
    too small, the model may develop meaningful representations, but the following
    processing layers may not have enough features to work with. This is a balancing
    process that takes experience and experimentation.'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你计划使用自动编码器进行预训练，重要的是要考虑一个关键因素，即如何构建瓶颈的大小（以及相应地编码器和解码器组件的宽度）：编码器之后附加的层需要处理的信息量。如果你的瓶颈很大，任务可能变得简单，网络可能不会发展出有意义的表示和理解输入的过程。在这种情况下，编码器之后的处理层将接收到大量的特征，但每个特征可能不包含很多有价值的信息。另一方面，如果瓶颈太小，模型可能发展出有意义的表示，但后续的处理层可能没有足够多的特征来处理。这是一个需要经验和实验来平衡的过程。
- en: Like pretraining, it’s best to freeze components strategically to make the most
    out of the weights in the encoder derived from pretraining (Figure [3-22](#Fig22)).
    Like many pretraining tasks, generally it’s good practice to freeze the pretrained
    component – in this case, the encoder – and train the following component(s) to
    better interpret the output of the encoder and then to unfreeze the pretrained
    component such that the entire network can be fine-tuned.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 与预训练类似，最好有策略地冻结组件，以充分利用从预训练中得到的编码器权重（见图 [3-22](#Fig22)）。像许多预训练任务一样，通常冻结预训练组件——在这种情况下，编码器——并训练后续组件以更好地解释编码器的输出，然后解冻预训练组件，这样整个网络就可以进行微调。
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig22_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig22_HTML.jpg)'
  id: totrans-211
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig22_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig22_HTML.jpg)'
- en: Figure 3-22
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-22
- en: How components of the autoencoder for pretraining are frozen or unfrozen throughout
    training and fine-tuning
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 预训练自动编码器的组件在整个训练和微调过程中的冻结或解冻情况
- en: If you are using this method of pretraining with autoencoders with image data
    and you follow the design of flattening and reshaping the data around the bottleneck
    such that the bottleneck is a vector rather than an image, you will find that
    the structure of data transformation is especially clean. The encoder converts
    an image into a vector, and the following processing component processes that
    vector (which contains the encoded representation of the input) into the desired
    output. Thus, in this context, the encoder functions as the convolutional component
    and the following processing layers function as the fully connected component
    of an image-based deep learning model. This not only increases conceptual and
    organizational clarity but also allows you to further manipulate these sorts of
    autoencoder for pretraining designs for greater performance with the tools of
    transfer learning (see Chapter [2](516104_1_En_2_Chapter.xhtml)).
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你使用这种方法与图像数据一起使用自动编码器进行预训练，并且遵循在瓶颈周围对数据进行展平和重塑的设计，使得瓶颈是一个向量而不是图像，你会发现数据转换的结构特别清晰。编码器将图像转换为向量，接下来的处理组件处理这个向量（其中包含输入的编码表示）以生成所需的输出。因此，在这种情况下，编码器充当卷积组件，接下来的处理层充当基于图像的深度学习模型的完全连接组件。这不仅增加了概念和组织上的清晰度，还允许你进一步操作这些类型的自动编码器，以预训练设计获得更好的性能，并使用迁移学习工具（见第
    [2](516104_1_En_2_Chapter.xhtml) 章）。
- en: Note that while using autoencoders for pretraining, you can use a wide variety
    of autoencoder training structures beyond the standard autoencoder, in which the
    input is equivalent to the desired output.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，在使用自动编码器进行预训练时，你可以使用除标准自动编码器之外的各种自动编码器训练结构，其中输入等于所需的输出。
- en: For instance, denoising is a powerful self-supervised task that can be addressed
    with a denoising autoencoder (Figure [3-23](#Fig23)).
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，去噪是一个强大的自监督任务，可以使用去噪自动编码器来解决（见图 [3-23](#Fig23)）。
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig23_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig23_HTML.jpg)'
  id: totrans-217
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig23_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig23_HTML.jpg)'
- en: Figure 3-23
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-23
- en: Example of using non-standard autoencoder tasks for pretraining, like denoising
    autoencoder
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 使用非标准自动编码器任务进行预训练的示例，如去噪自动编码器
- en: However, when you are choosing the self-supervised task to train your autoencoder,
    it’s important to have a strong conceptual understanding of what that self-supervised
    task will accomplish. In this self-supervised context, the denoising autoencoder
    offers primarily a strong understanding of key features of the data, developed
    by identifying and correcting artificially inserted noise, and only secondarily
    actual denoising capabilities. This means that you do not need to be as careful
    about ensuring that the artificial noise resembles the true noise in the dataset
    when developing denoising autoencoders for pretraining. Of course, being conscious
    about the setup of the denoising autoencoder can allow you to maximize both the
    benefit of denoising (i.e., the encoder develops representations more or less
    robust to noise) and self-supervised learning (i.e., the encoder develops abstract
    representations of key features and ideas by learning to separate noisy artifacts
    from true meaningful objects).
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，当你选择自监督任务来训练你的自动编码器时，了解该自监督任务将实现什么是很重要的。在这个自监督的背景下，去噪自动编码器主要提供了对数据关键特征的理解，这是通过识别和纠正人工插入的噪声来实现的，而其次才是实际的去噪能力。这意味着在开发用于预训练的去噪自动编码器时，你不需要非常小心地确保人工噪声与数据集中的真实噪声相似。当然，对去噪自动编码器的设置保持警觉可以让你最大化去噪（即，编码器发展出对噪声相对鲁棒的表示）和自监督学习（即，编码器通过学习将噪声伪迹与真实有意义的目标分开来发展关键特征和思想的抽象表示）的好处。
- en: Note
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: It should be noted that the concepts of denoising and self-supervised learning
    are not completely independent from one another. To properly denoise an input,
    a model must develop representations of key features and concepts within the input,
    which is the goal of self-supervised learning.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 应当注意的是，去噪和自监督学习的概念并不是完全独立的。为了正确地去噪输入，模型必须发展出对输入中关键特征和概念的表示，这正是自监督学习的目标。
- en: This sort of simplicity and conceptual ease in manipulating autoencoders for
    pretraining makes them exceptionally popular in modern deep learning design.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 这种在操作自动编码器进行预训练时的简单性和概念上的便利性使得它们在现代深度学习设计中特别受欢迎。
- en: Implementation
  id: totrans-224
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 实现
- en: Implementing autoencoders for pretraining is simple, given that you have used
    compartmentalized design. Recall the autoencoder structure built to demonstrate
    the construction of autoencoders for tabular data, which took in data with 784
    features and compressed it into 32 neurons in the bottleneck layer before reconstructing
    the 784 features.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用模块化设计的前提下，实现自动编码器的预训练是简单的。回想一下为演示表格数据的自动编码器构建而构建的自动编码器结构，它接收具有784个特征的数据，并在瓶颈层将其压缩为32个神经元，然后再重建784个特征。
- en: In the spirit of compartmentalized design, let’s build a component that takes
    in the output of the encoder and processes it through a series of Dense layers
    to derive the output (in this case, for a binary classification problem, Listing
    [3-20](#PC20)). Note that this component takes in 32-dimensional data because
    the encoder outputs encoded representations that are 32-dimensional.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 在模块化设计的 spirit 下，让我们构建一个组件，该组件接收编码器的输出并通过一系列密集层进行处理，以推导出输出（在这种情况下，对于二分类问题，列表[3-20](#PC20)）。请注意，这个组件接收32维数据，因为编码器输出的编码表示是32维的。
- en: '[PRE19]'
  id: totrans-227
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Even though we compiled the encoder and decoder models into the autoencoder,
    we can still reference the encoder and decoder individually, with their weights
    retained. The final model with only the pretrained encoder and the processing
    component can be built with the Functional API (Listing [3-21](#PC21)).
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管我们将编码器和解码器模型编译成了自动编码器，我们仍然可以单独引用编码器和解码器，同时保留它们的权重。仅包含预训练编码器和处理组件的最终模型可以使用功能API（列表[3-21](#PC21)）构建。
- en: '[PRE20]'
  id: totrans-229
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: Make sure to freeze layers as appropriate.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 确保根据需要冻结层。
- en: Using Autoencoders for Dimensionality Reduction
  id: totrans-231
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用自动编码器进行维度降低
- en: The concept of the autoencoder was initially presented as a method of dimensionality
    reduction. Because the application of dimensionality reduction is almost “built
    into” the design of the autoencoder, you will find that using autoencoders for
    dimensionality reduction is very simple to implement. However, there’s still much
    to consider in performing dimensionality reduction for autoencoders; with the
    right design, autoencoders can offer a unique method of dimensionality reduction
    that is more powerful and versatile than other existing methods.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 自动编码器的概念最初被提出作为一种维度降低的方法。由于维度降低的应用几乎“内置于”自动编码器的设计中，你会发现使用自动编码器进行维度降低非常简单易行。然而，在为自动编码器执行维度降低时，仍有许多需要考虑的因素；通过适当的设计，自动编码器可以提供一种独特且比其他现有方法更强大、更通用的维度降低方法。
- en: Intuition
  id: totrans-233
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 直觉
- en: Dimensionality reduction is generally performed as an unsupervised task, in
    which data must be represented with a smaller number of dimensions than it currently
    exists in. Many dimensionality reduction algorithms like Principal Component Analysis
    (PCA) and t-Stochastic Neighbor Embedding (t-SNE) attempt to project data into
    lower spaces according to certain mathematical articulations of what features
    of the data should be valued most in a reduction. PCA attempts to preserve the
    global variance, for instance, while t-SNE instead seeks to capture the local
    variance. Because different dimensionality reduction algorithms are built to prioritize
    the preservation of different features of the data, they are fundamentally different
    in character and thus are limited in their effectiveness on a wide variety of
    datasets.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 维度降低通常作为一个无监督任务来执行，其中数据必须用比当前存在的更少的维度来表示。许多维度降低算法，如主成分分析（PCA）和t-随机近邻嵌入（t-SNE），试图根据某些数学表述将数据投影到较低的空间，这些表述确定了在降低过程中数据哪些特征应该被最重视。例如，PCA试图保留全局方差，而t-SNE则试图捕捉局部方差。由于不同的维度降低算法旨在优先保留数据的不同特征，因此它们在本质上不同，因此在广泛的数据集上的有效性受到限制。
- en: However, in an autoencoder approach to dimensionality reduction, the autoencoder
    is trained to reconstruct the input after passing it through a bottleneck. After
    the autoencoder is fitted, the encoder is detached and the dimensionality reduction
    for any input can be obtained by passing it through the encoder and receiving
    its output (Figure [3-24](#Fig24)).
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在自动编码器方法进行维度降低时，自动编码器被训练在通过瓶颈后重建输入。自动编码器拟合后，编码器被分离，任何输入的维度降低都可以通过通过编码器并接收其输出（图[3-24](#Fig24)）来获得。
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig24_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig24_HTML.jpg)'
  id: totrans-236
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig24_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig24_HTML.jpg)'
- en: Figure 3-24
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-24
- en: Conceptual map of using autoencoders for dimensionality reduction
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 使用自编码器进行降维的概念图
- en: 'Thus, autoencoders are distinctly different from other dimensionality reduction
    algorithms in two key ways: adaptability and articulation of valued features.'
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，自编码器在两个关键方面与其它降维算法明显不同：适应性和对有价值特征的阐述。
- en: '*Adaptability*: Algorithms like PCA and t-SNE allow the user to adapt the algorithm
    to their dataset by manipulating a few parameters, but that quantity is vastly
    outnumbered by the adaptability of the autoencoder. Because autoencoders are more
    of a concept than an algorithm, they can be built with a much greater degree of
    adaptation to your particular problem. You can change the depth and width of the
    autoencoder structure, the activations in each layer, the loss function, regularization,
    and many other features of neural network architectural and training design to
    change how an autoencoder behaves in performing dimensionality reduction. This
    also means that using autoencoders for dimensionality reduction is likely to be
    successful only if you are aware of how different manipulations to the autoencoder
    structure translate to changes in its behavior *and* the behavior of a dimensionality
    reduction algorithm necessary to handle dimensionality reduction on your dataset.'
  id: totrans-240
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*适应性*：PCA和t-SNE等算法允许用户通过调整几个参数来调整算法以适应其数据集，但这个数量远远少于自编码器的适应性。因为自编码器更是一个概念而不是一个算法，它可以以更大的适应度来构建以适应你特定的问题。你可以改变自编码器结构的深度和宽度、每一层的激活、损失函数、正则化以及神经网络架构和训练设计中的许多其他特性，以改变自编码器在执行降维时的行为。这也意味着，如果你不了解对自编码器结构的不同操作如何转化为其行为以及处理你数据集的降维算法行为的变化，那么使用自编码器进行降维可能不会成功。'
- en: '*Articulation of valued features* : Autoencoders prioritize certain features
    of the data and optimize the reduction of data in a way different from algorithms
    like PCA and t-SNE in character. Autoencoders attempt to minimize the reconstruction
    loss, while PCA and t-SNE attempt to maximize some relatively explicit mathematical
    formulation of what to prioritize, like the preservation of local or global structure
    (e.g., variance). These formulations attempt to capture what “information” entails
    in the context of dimensionality reduction. On the other hand, autoencoders do
    not seem, at least on the surface level, to have these prioritizations built explicitly
    into their design – they simply use whatever reduction allows for the most reliable
    reconstruction of the original input. Perhaps autoencoders are one of the most
    faithful representatives to capturing “information” in a broad, conceptual sense
    – rather than being tied toward any particular explicit assumptions of what constitutes
    a preservation of information (i.e., the *means* of preservation), it adopts whatever
    procedures and assumptions are necessary for the original item to be reconstructed
    (i.e., using whatever means are necessary to obtain optimal *ends* of preservation).'
  id: totrans-241
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*对有价值特征的阐述*：自编码器优先考虑数据的一些特征，并以不同于PCA和t-SNE等算法的方式优化数据的降维。自编码器试图最小化重建损失，而PCA和t-SNE试图最大化一些相对明确的数学公式，以确定优先考虑的内容，例如保留局部或全局结构（例如，方差）。这些公式试图捕捉降维背景下“信息”所包含的内容。另一方面，自编码器似乎至少在表面上并没有将这些优先级明确地构建到其设计中——它们只是使用任何允许最可靠地重建原始输入的降维方法。也许自编码器是捕捉广泛、概念意义上的“信息”最忠实的代表之一——而不是与任何特定的明确假设（即构成信息保留的*手段*）相关联，它采用必要的程序和假设来重建原始项目（即使用必要的手段来获得最优的*结果*）。'
- en: These two features can both be advantages and disadvantages. For instance, adaptability
    can be a curse rather than a tool if your dataset is too complex or difficult
    to understand. Moreover, increased adaptability does not necessarily suggest increased
    interpretability of adaptation; that is, while the autoencoder possesses a much
    wider range of possible behaviors, it is not necessarily simple to identify which
    changes to the architecture will correspond to certain changes (or absence of
    changes). Note that the autoencoder’s articulation of valued features is determined
    by its loss function, which uses as one component the model prediction, which
    depends on the model architecture (among other modeling details). Finding your
    way through this chain of considerations is likely more arduous a task than adjusting
    relatively interpretable parameters on other dimensionality reduction methods.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个特性既可以成为优势也可以成为劣势。例如，如果您的数据集过于复杂或难以理解，适应性可能成为一种诅咒而不是工具。此外，增加适应性并不一定意味着增加对适应性的可解释性；也就是说，虽然自动编码器具有更广泛的可能行为范围，但并不一定简单就能识别出哪些架构的变化将对应于某些变化（或无变化）。请注意，自动编码器对有价值特征的表述是由其损失函数决定的，该函数将模型预测作为其中一个组成部分，而模型预测依赖于模型架构（以及其他建模细节）。在这条考虑链中找到自己的路可能比在其他维度缩减方法上调整相对可解释的参数更为艰巨。
- en: Modern autoencoders for dimensionality reduction are most often used on very
    high-dimensional data since deep learning has evolved to be most successful on
    complex forms of data. More traditional algorithms like PCA developed for the
    reduction of lower-dimensional data are unlikely to be suited toward data like
    word embeddings in NLP-based models and high-resolution images. t-SNE is a popular
    choice for high-dimensional data, but primarily for the purpose of visualization.
    If you are looking to maximize the information richness of a dimensionality reduction
    and are willing to sacrifice some interpretability, autoencoders are generally
    the way to go.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 现代用于降维的自动编码器通常用于非常高维的数据，因为深度学习已经发展到在复杂数据形式上最成功。为降低维数数据开发的更传统算法，如PCA，可能不适合用于基于NLP的模型中的词嵌入或高分辨率图像。t-SNE是高维数据的一个流行选择，但主要用于可视化。如果您希望最大化降维的信息丰富性并愿意牺牲一些可解释性，自动编码器通常是最佳选择。
- en: Implementation
  id: totrans-244
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 实现
- en: Using autoencoders for dimensionality reduction requires no further code from
    building and training the original autoencoder (see previous sections on building
    autoencoders for tabular and two-dimensional data). Assuming the autoencoder was
    built with compartmentalized design, you can simply call `encoder.predict(input_data)`,
    where encoder corresponds to the encoder architecture and `input_data` represents
    the data you would like encoded.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 使用自动编码器进行降维不需要从构建和训练原始自动编码器中获取更多代码（参见之前关于构建自动编码器的表格和二维数据的章节）。假设自动编码器是按照模块化设计构建的，您只需调用
    `encoder.predict(input_data)` 即可，其中 `encoder` 对应于编码器架构，`input_data` 代表您希望编码的数据。
- en: Using Autoencoders for Feature Generation
  id: totrans-246
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用自动编码器进行特征生成
- en: Feature generation and feature engineering is often thought of as a relic of
    classical machine learning, in which engineering a handful of new features could
    boost the performance of machine learning models. In deep learning applications
    involving relatively more complex forms of data, however, in many cases, using
    standard feature engineering methods like finding the row-wise mean of a group
    of columns or binning is unsuccessful or provides minimal improvement.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 特征生成和特征工程通常被认为是经典机器学习的遗迹，其中通过构建一些新的特征可以提升机器学习模型的性能。然而，在涉及相对更复杂数据形式的深度学习应用中，在许多情况下，使用标准特征工程方法，如找到一组列的行均值或分箱，往往是不成功的或只提供了微小的改进。
- en: With autoencoders, however, we are able to perform feature generation for deep
    learning using an entity with the power and depth of deep learning methods.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，使用自动编码器，我们能够利用具有深度学习方法力量和深度的实体来执行深度学习的特征生成。
- en: Intuition
  id: totrans-249
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 直觉
- en: The encoding component of the autoencoder can be used to generate new features
    for a model to take in and process when performing a task. Because the encoder
    has learned to take in a standard input and compress it such that each feature
    in the encoded representation contains the most important information from the
    standard input, these encoded features can be exploited to aid the prediction
    of another model.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 自编码器的编码组件可以用来为模型生成新的特征，以便在执行任务时接收和处理。因为编码器已经学会了接收标准输入并将其压缩，使得编码表示中的每个特征都包含了标准输入的最重要信息，因此这些编码特征可以被利用来帮助预测另一个模型。
- en: Functionally, the idea is almost identical to autoencoders for dimensionality
    reduction. However, using autoencoders for feature generation requires the additional
    step of generating new features and feeding the new features into the model.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 从功能上讲，这个想法几乎与用于降维的自编码器相同。然而，使用自编码器进行特征生成需要额外的步骤来生成新特征并将新特征输入到模型中。
- en: We’ve seen earlier that a similar concept is employed in using autoencoders
    for pretraining, in which the encoder is detached from a trained autoencoder and
    inserted directly after the input of another network, such that the component(s)
    of the model after the encoder receive enriched, key features and representations
    of the input. However, the purpose of feature generation is to generate, or add,
    features rather than replacing them. Thus, when using autoencoders for feature
    generation, the encoder provides one set of encoded, information-rich features
    that are considered alongside the original set of features.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 我们之前已经看到，在利用自编码器进行预训练时，采用了类似的概念，其中编码器从训练好的自编码器中分离出来，并直接插入到另一个网络的输入之后，这样编码器之后的模型组件就能接收丰富、关键的特征和输入的表示。然而，特征生成的目的是生成或添加特征，而不是替换它们。因此，当使用自编码器进行特征生成时，编码器提供了一组编码的、信息丰富的特征，这些特征与原始特征集一起被考虑。
- en: Consider, as an example, these two small datasets, consisting of the original
    features and the generated features of a hypothetical autoencoder fitted on the
    original features (Figure [3-25](#Fig25)).
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 以这两个小型数据集为例，它们由一个假设的自编码器在原始特征上拟合产生的原始特征和生成特征组成（见图[3-25](#Fig25)）。
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig25_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig25_HTML.jpg)'
  id: totrans-254
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig25_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig25_HTML.jpg)'
- en: Figure 3-25
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-25
- en: 'Hypothetical datasets: original features and the generated features (produced
    by the output of an encoder in a trained autoencoder). The exact numbers in these
    tables are hypothetical (randomly generated)'
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 假设的数据集：原始特征和生成的特征（由训练好的自编码器的输出编码器产生）。这些表中的确切数字是假设的（随机生成的）。
- en: When using autoencoders for pretraining, the autoencoder is trained to reconstruct
    the original features and the encoder is transferred to the new model to provide
    a feature-extracting mechanism directly after the input (Figure [3-26](#Fig26)).
    Thus, the remainder of the network, which performs much of the interpretation
    of these features, cannot access the original features directly. Rather, it understands
    the original features through the compression and “interpretation” of the encoder
    model.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用自编码器进行预训练时，自编码器被训练来重建原始特征，编码器被转移到新模型中，以在输入之后直接提供特征提取机制（见图[3-26](#Fig26)）。因此，网络剩余部分，它执行了这些特征的许多解释工作，不能直接访问原始特征。相反，它通过编码器模型的压缩和“解释”来理解原始特征。
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig26_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig26_HTML.jpg)'
  id: totrans-258
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig26_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig26_HTML.jpg)'
- en: Figure 3-26
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-26
- en: Using only generated features from the encoder as inputs to the network
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 仅使用编码器生成的特征作为网络的输入。
- en: 'However, a concern arises from this particular approach: even though the encoder
    from the autoencoder will almost always give the model a boost (if designed and
    trained properly), does the encoder impose a limit on the performance of the model
    by forcing it to take information strictly through the lenses of the autoencoder?
    Sometimes, a bit of fine-tuning after training (in which the encoder weights are
    unfrozen and the entire model is trained) is enough to resolve this concern.'
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这种特定方法引发了一个担忧：尽管来自自动编码器的编码器几乎总是会给模型带来提升（如果设计和训练得当），编码器是否通过迫使模型严格通过自动编码器的视角获取信息，从而限制了模型的性能？有时，在训练后进行一点微调（其中编码器权重被解冻，整个模型被重新训练）就足以解决这个担忧。
- en: Even fine-tuning may not be an adequate address of this concern, though, in
    several circumstances. If the autoencoder does not obtain a relatively high performance
    in reconstruction (i.e., middling, mediocre performance), forcing the model only
    to take in mediocre-level features could limit its performance. Alternatively,
    if the data is not of extremely high complexity, like tabular data or lower-resolution
    images, having an encoder compress the original inputs may be valuable, but not
    completely necessary. In many cases, models intended for less complex data benefit
    from processing both the original input and encoded features.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在几种情况下，即使进行微调也可能不足以解决这个担忧。如果自动编码器在重建方面没有获得相对较高的性能（即，中等、平庸的性能），迫使模型仅接受平庸级别的特征可能会限制其性能。或者，如果数据不是极其复杂的，如表格数据或低分辨率图像，那么编码器压缩原始输入可能是有价值的，但并非完全必要。在许多情况下，旨在处理更简单数据的模型从处理原始输入和编码特征中受益。
- en: When using autoencoders for feature generation, the encoder’s output is concatenated
    (or merged through some other mechanism) with the original input data, such that
    the remainder of the network can consider and process both sets of features (Figure
    [3-27](#Fig27)). This method of feature generation can be thought of giving the
    remainder of the network the “best of both worlds” – access to the original, raw,
    unchanged data and a developed interpretation of that original data. Here, the
    network attempts to make the decision as to how each set of features is to be
    weighted and processed to optimize its performance.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用自动编码器进行特征生成时，编码器的输出与原始输入数据连接（或通过某种其他机制合并），使得网络的其余部分可以考虑到并处理这两组特征（见图[3-27](#Fig27)）。这种特征生成方法可以被认为是给网络的其余部分提供了“两者兼得”的好处——即访问原始的、原始的、未改变的数据，以及对该原始数据的一种发展解释。在这里，网络试图决定如何权衡和处理每一组特征以优化其性能。
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig27_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig27_HTML.jpg)'
  id: totrans-264
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig27_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig27_HTML.jpg)'
- en: Figure 3-27
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-27
- en: Using both generated features from the encoder and original features as inputs
    to the network
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 使用编码器生成的特征和原始特征作为网络的输入
- en: Architecturally, we can represent this with a nonlinear topology, in which the
    input layer feeds both into the encoder and the output of the encoder (Figure
    [3-28](#Fig28)).
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 在架构上，我们可以用非线性拓扑来表示这一点，其中输入层既连接到编码器，也连接到编码器的输出（见图[3-28](#Fig28)）。
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig28_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig28_HTML.jpg)'
  id: totrans-268
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig28_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig28_HTML.jpg)'
- en: Figure 3-28
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-28
- en: Conceptual map of how fitted autoencoders can be used in a prediction task with
    feature generation in which both the original features and the generated features
    are inputted to the remaining network layers for processing
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 适配自动编码器在预测任务中使用的概念图，其中特征生成时，原始特征和生成的特征都输入到剩余的网络层进行处理
- en: This is similar in character to the layer-based method of inducing noise when
    training a variational autoencoder. You could pass data through the encoder and
    concatenate the encoded features to the original dataset and then feed the merged
    dataset into a standard network architecture. However, such an approach, in which
    changes to the data are performed outside of the neural network, is doing more
    work than necessary – it’s much easier to use the Functional API to add the encoder
    than to get messy with predictions and data organization, especially if your dataset
    is on the larger side. Adding the encoder model directly into the new model automatically
    puts these relationships and data flows in place.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 这与在训练变分自动编码器时引入噪声的基于层的方法在性质上相似。你可以将数据通过编码器传递，并将编码后的特征连接到原始数据集上，然后将合并后的数据集输入到标准网络架构中。然而，这种在神经网络外部对数据进行更改的方法比必要的还要多——使用功能API添加编码器比处理预测和数据组织要容易得多，尤其是如果你的数据集较大时。将编码器模型直接添加到新模型中会自动建立这些关系和数据流。
- en: Implementation
  id: totrans-272
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 实现
- en: Like many autoencoder applications, implementing autoencoders for feature generation
    is straightforward with the tools we’ve developed prior. Three lines of code using
    the Functional API allow us to define the input layer, the encoder, and the junction
    at which the original data and the generated features are merged (Listing [3-22](#PC22)).
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 与许多自动编码器应用一样，使用我们之前开发的工具实现特征生成型的自动编码器非常简单。使用功能API的三个代码行就可以定义输入层、编码器以及原始数据和生成特征合并的连接点（见列表[3-22](#PC22)）。
- en: '[PRE21]'
  id: totrans-274
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: Afterward, we can add more Dense layers to process the merged features (Figure
    [3-29](#Fig29), Listing [3-23](#PC23)).
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，我们可以添加更多的Dense层来处理合并后的特征（见图[3-29](#Fig29)，列表[3-23](#PC23)）。
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig29_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig29_HTML.jpg)'
  id: totrans-276
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig29_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig29_HTML.jpg)'
- en: Figure 3-29
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-29
- en: Hypothetical map of the architecture of an autoencoder used for feature generation
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 用于特征生成的自动编码器架构的假设图
- en: '[PRE22]'
  id: totrans-279
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: Be sure to set `encoding.trainable = False`, as the encoder’s weights – the
    basis for the method by which it extracts core features and representations –
    should be frozen during training. The need for fine-tuning is less significant
    than if the autoencoder were used for pretraining.
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 一定要设置 `encoding.trainable = False`，因为编码器的权重——它是提取核心特征和表示的基础方法——在训练期间应该被冻结。与使用自动编码器进行预训练相比，微调的需求不那么显著。
- en: You can also build more complex topologies to better take advantage of the encoder’s
    encoded features by first processing the original features and the generated features
    independently before merging and following with further processing (Figure [3-30](#Fig30),
    Listing [3-24](#PC24)).
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 你还可以通过首先独立处理原始特征和生成特征，然后在合并和进一步处理之前，构建更复杂的拓扑结构，以更好地利用编码器的编码特征（见图[3-30](#Fig30)，列表[3-24](#PC24)）。
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig30_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig30_HTML.jpg)'
  id: totrans-282
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig30_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig30_HTML.jpg)'
- en: Figure 3-30
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-30
- en: Hypothetical map of the architecture of an autoencoder used for feature generation
    with further processing on the output of the encoder and the original features
    before concatenation
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 在连接之前对编码器的输出和原始特征进行进一步处理，用于特征生成的自动编码器架构的假设图
- en: '[PRE23]'
  id: totrans-285
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: Broadly, you can use these sorts of architectural manipulations to build all
    sorts of complex nonlinear topologies to take advantage of pretraining methods.
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 从广义上讲，你可以使用这类架构操作来构建各种复杂的非线性拓扑结构，以利用预训练方法。
- en: Using Variational Autoencoders for Data Generation
  id: totrans-287
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用变分自动编码器进行数据生成
- en: 'The variational autoencoder is one of the more modern conceptions of the autoencoder.
    It serves a relatively recent developing subfield in deep learning: data generation.
    While variational autoencoders are most often employed in the generation of images,
    they also have applications in generating language data and tabular data. Although
    image generation can be used to generate photorealistic images, more practically
    variational autoencoders are often used to generate more data to train another
    model on, which can be useful for small datasets. Because variational autoencoders
    heavily rely upon the notion of a latent space, they allow us to manipulate their
    output by traversing the latent space in certain ways. This allows it to offer
    more control and stability in the generated outputs than other data generation
    methods, like Generative Adversarial Networks (GANs).'
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 变分自动编码器是自动编码器中较新的概念之一。它服务于深度学习中的一个相对较新的子领域：数据生成。虽然变分自动编码器最常用于图像生成，但它们也适用于生成语言数据和表格数据。尽管图像生成可以用来生成逼真的图像，但更实际的是，变分自动编码器通常用于生成更多数据来训练另一个模型，这对于小数据集来说可能很有用。由于变分自动编码器高度依赖于潜在空间的概念，因此我们可以通过以某种方式遍历潜在空间来操纵它们的输出。这使得它比其他数据生成方法，如生成对抗网络（GANs），在生成的输出中提供更多的控制和稳定性。
- en: Intuition
  id: totrans-289
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 直觉
- en: The goal of an autoencoder is to reconstruct the original input data as identically
    as possible. On the other hand, the goal of the variational autoencoder is to
    produce a similar image with reasonable variations – hence, the name “*variational*”
    *autoencoder*.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 自动编码器的目标是尽可能忠实地重建原始输入数据。另一方面，变分自动编码器的目标是生成具有合理变化的相似图像——因此得名“*变分*” *自动编码器*。
- en: 'The fundamental idea behind generation using the variational autoencoder isn’t
    too complex: not only individual points within the latent space (corresponding
    to data points in the dataset) are meaningfully arranged so that they can be decoded
    into their original form, but the latent *space* itself – consisting of all the
    space in and around existing data points – is mapped to by the encoder such that
    it contains relationships relevant to the dataset. Therefore, we can sample points
    from the latent space not occupied by existing encoded representations of data
    points from the dataset and decode them to generate a new data item that wasn’t
    part of the original dataset.'
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 使用变分自动编码器进行生成的根本思想并不复杂：不仅潜在空间中的单个点（对应于数据集中的数据点）被有意义地排列，以便可以解码成其原始形式，而且潜在*空间*本身——由所有现有数据点及其周围的空间组成——也被编码器映射，使其包含与数据集相关的关联。因此，我们可以从潜在空间中采样那些未被现有数据点的编码表示占据的点，并将它们解码以生成一个原始数据集中不存在的新数据项。
- en: For instance, consider data in two classes (perhaps images of dogs and cats
    or of the handwritten digits “0” and “1”). Of course, the autoencoder is not given
    these labels when trained, but it likely is able to perform separations and placement
    of these images such that these two classes are generally separated from one another
    (Figure [3-31](#Fig31)). Thus, if we want an image resembling a dog, we can pass
    in an actual image of a dog from the dataset, make some changes to the corresponding
    location in the latent space to introduce variation, and decode the deviation/variation
    point to output a slightly different image of a dog.
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，考虑两类数据（可能是狗和猫的图像，或者是手写数字“0”和“1”的图像）。当然，在训练时，自动编码器并没有得到这些标签，但它很可能能够对这些图像进行分离和定位，使得这两类图像通常被分开（见图[3-31](#Fig31)）。因此，如果我们想要一个类似狗的图像，我们可以从数据集中传递一个实际的狗的图像，对潜在空间中相应位置进行一些修改以引入变化，然后将偏差/变化点解码以输出一个略微不同的狗的图像。
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig31_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig31_HTML.jpg)'
  id: totrans-293
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig31_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig31_HTML.jpg)'
- en: Figure 3-31
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-31
- en: Decoding regions of the latent space near the latent space point of a data point
    to generate variations of the data – data that is different, but that shares similar
    features. The box in the center represents the latent space – the points in the
    bottleneck region to which input data has been mapped to and which will be mapped
    back into a reconstructed version
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 将数据点的潜在空间附近的解码区域解码以生成数据的变化——不同的数据，但具有相似的特征。中间的框代表潜在空间——输入数据被映射到的瓶颈区域的点，这些点将被映射回重建版本
- en: Alternatively, you could randomly select several points from the latent space
    and decode them to generate corresponding images (Figure [3-32](#Fig32)). This
    method is more commonly used to generate a large and diverse array of data, since
    making small deviations or variations to an existing point still restricts the
    generated image to be relatively similar to the original image. By completely
    randomly selecting several points from within the latent space, you can produce
    a much more diverse generated dataset.
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，你也可以从潜在空间中随机选择几个点并解码它们以生成相应的图像（图[3-32](#Fig32)）。这种方法更常用于生成大量和多样化的数据集，因为对现有点进行小的偏差或变化仍然会限制生成的图像与原始图像相对相似。通过在潜在空间内完全随机选择几个点，你可以产生一个更加多样化的生成数据集。
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig32_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig32_HTML.jpg)'
  id: totrans-297
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig32_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig32_HTML.jpg)'
- en: Figure 3-32
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-32
- en: Sampling randomly from the latent space to produce a wide, diverse dataset of
    generated data
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 从潜在空间中随机采样以生成广泛、多样化的生成数据集
- en: 'We can write the general process of generating data using an autoencoder at
    this point as follows:'
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在可以写出使用自动编码器生成数据的通用过程如下：
- en: Train an autoencoder on a reconstruction task.
  id: totrans-301
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在重建任务上训练一个自动编码器。
- en: Randomly select several points in the latent space, either by making changes
    to existing data points (ensuring that it is within a reasonable domain).
  id: totrans-302
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 随机选择潜在空间中的几个点，通过改变现有数据点（确保它在合理范围内）。
- en: Decode each of those points into the respective generated image.
  id: totrans-303
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将这些点解码成相应的生成图像。
- en: 'While this general logic and intuition is valid, there is a problem with an
    assumption we have made: with standard autoencoders, the latent space is not continuous;
    rather, it’s much more likely to be heavily discrete, separated into clusters.
    Continuity is unlikely to be helpful in the task of reconstructing inputs, because
    it magnifies the effect of small “slips” and “mistakes”; rather, having a discrete
    design allows for some minimum “guarantee” of success (Figure [3-33](#Fig33)).'
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这种一般逻辑和直觉是有效的，但我们所做的一个假设存在问题：在标准自动编码器中，潜在空间不是连续的；相反，它更有可能高度离散，分成簇。连续性在重建输入的任务中可能不会很有帮助，因为它放大了小“失误”和“错误”的影响；相反，具有离散设计可以提供一些最小的“保证”成功（图[3-33](#Fig33)）。
- en: For instance, consider an autoencoder attempting to reconstruct images of the
    digits “0” and “1.” Assume the latent space of an autoencoder is discrete, meaning
    that there were purposeful gaps separating clusters of images (in this case, images
    appearing to contain the digit “0” vs. images appearing to contain the digit “1”).
    Even if the encoder did not well encode an image of an image containing the digit
    “0” (it was not positioned in the optimal position in the latent space), it would
    still likely be within the cluster of images labeled “0,” because there are large
    gaps in the latent space that separate off images containing “0” vs. containing
    “1.” This means that the decoder would still reconstruct an image with a similar
    shape to “0” – even if it didn’t capture the specifics of the image, it captures
    the main idea.
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，考虑一个试图重建数字“0”和“1”图像的自动编码器。假设自动编码器的潜在空间是离散的，这意味着有意的间隔将图像簇分开（在这种情况下，看起来包含数字“0”的图像与看起来包含数字“1”的图像）。即使编码器没有很好地编码包含数字“0”的图像（它没有在潜在空间中处于最佳位置），它仍然很可能位于标记为“0”的图像簇中，因为潜在空间中有大的间隔将包含“0”的图像与包含“1”的图像分开。这意味着解码器仍然会重建一个与“0”形状相似的图像——即使它没有捕捉到图像的具体细节，它也捕捉到了主要思想。
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig33_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig33_HTML.jpg)'
  id: totrans-306
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig33_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig33_HTML.jpg)'
- en: Figure 3-33
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-33
- en: A discrete vs. continuous latent space in autoencoders
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 自动编码器中的离散与连续潜在空间
- en: On the other hand, assume the latent space is continuous, meaning that there
    are no purposeful gaps separating clusters of images. If there is a similar deviation
    in the positioning of an encoded image containing the digit “0,” it may be reconstructed
    by the decoder as “1” – there is no gap, or barrier, that separates the concepts
    of “0” and “1” from each other.
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，假设潜在空间是连续的，这意味着没有有意的间隔将图像簇分开。如果一个包含数字“0”的编码图像的位置存在类似的偏差，它可能被解码器重建为“1”——没有间隔或障碍将“0”和“1”的概念分开。
- en: Thus, discreteness within autoencoders is a useful tool for autoencoders to
    improve the performance of their reconstruction by sectioning off main ideas.
    It has been empirically observed that successful autoencoders tend to produce
    discrete latent spaces.
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，自动编码器内的离散性是自动编码器通过分割主要思想来提高重建性能的有用工具。经验观察表明，成功的自动编码器往往会产生离散的潜在空间。
- en: However, this becomes a challenge for generating data, because when we randomly
    sample from the latent space, we assume that the space is continuous. What would
    happen, for instance, if we sampled a point in the latent space that happened
    to reside in one of the “gaps” between discrete clusters (Figure [3-34](#Fig34))?
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这给数据生成带来了挑战，因为当我们从潜在空间中随机采样时，我们假设空间是连续的。例如，如果我们采样了一个位于离散簇之间的“间隙”中的潜在空间点，会发生什么呢？（图[3-34](#Fig34)）
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig34_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig34_HTML.jpg)'
  id: totrans-312
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig34_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig34_HTML.jpg)'
- en: Figure 3-34
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-34
- en: Sampling from “gap” regions of the latent space that the decoder has not learned
    to decode leads to bizarre and wildly unrealistic inputs
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 从解码器尚未学习解码的潜在空间的“间隙”区域进行采样会导致奇特且极端不切实际的输入
- en: You may hypothesize that decoding a randomly sampled point in this “gap” would
    result in some sort of image that is “in between” both of the classes. However,
    the decoder has never been exposed to points in the latent space from that region
    and therefore does not have the experience and knowledge to interpret it. Therefore,
    the decoder will likely output some sort of gibberish that is in no way related
    to the original dataset.
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会假设解码这个“间隙”中随机采样的点将产生某种“介于”两个类别之间的图像。然而，解码器从未接触过来自该区域的潜在空间中的点，因此没有经验和知识来解释它。因此，解码器很可能会输出一些与原始数据集毫不相关的乱码。
- en: 'Thus, variational autoencoders employ two key changes to force the autoencoder
    to develop continuous latent spaces, such that the latent space can both be sampled
    randomly (enabling a diverse generated dataset) and that the decoded latent space
    points will produce realistic/reasonable outputs (enabling a plausible generated
    dataset). Fundamentally, these changes force the autoencoder to learn continuous
    distributions rather than discrete locations in the latent space:'
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，变分自动编码器采用了两个关键变化来迫使自动编码器发展连续的潜在空间，这样潜在空间既可以随机采样（使生成的数据集多样化），解码的潜在空间点将产生真实/合理的输出（使生成的数据集可信）。从根本上说，这些变化迫使自动编码器学习连续分布，而不是潜在空间中的离散位置：
- en: The encoder learns the optimal mean and standard deviation of variables in the
    latent space, from which an encoded representation is sampled and passed on to
    the decoder for decoding.
  id: totrans-317
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 编码器学习潜在空间中变量的最佳均值和标准差，从这个空间中采样编码表示，并将其传递给解码器进行解码。
- en: 'The variational autoencoder is optimized on a custom loss function: a blend
    of reconstruction loss (this is the cross-entropy, mean squared error, or any
    other standard autoencoder loss function used) and KL divergence to prevent the
    model from “cheating” (more on this “cheating” later).'
  id: totrans-318
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 变分自动编码器在一个自定义损失函数上进行了优化：重建损失（这是交叉熵、均方误差或任何其他标准自动编码器损失函数）和KL散度的混合，以防止模型“作弊”（关于这种“作弊”的更多内容将在后面介绍）。
- en: After the input is passed through several processing layers to encode the data,
    it is separated into two vectors, representing a vector of means and a vector
    of standard deviations. Assuming the latent variables are drawn from a normal
    distribution, we can use the mean and standard deviation to randomly sample an
    encoded representation. This means that the same input can be encoded twice with
    different encoded representations. This encoded representation – now with some
    variation – is decoded and trained as an output (Figure [3-35](#Fig35)).
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 在输入通过几个处理层进行编码后，它被分成两个向量，代表均值向量和标准差向量。假设潜在变量来自正态分布，我们可以使用均值和标准差来随机采样编码表示。这意味着相同的输入可以编码两次，产生不同的编码表示。这个编码表示——现在带有一些变化——被解码并作为输出进行训练（图[3-35](#Fig35)）。
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig35_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig35_HTML.jpg)'
  id: totrans-320
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig35_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig35_HTML.jpg)'
- en: Figure 3-35
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-35
- en: Architecture of a variational autoencoder
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 变分自动编码器的架构
- en: 'The architecture of the variational autoencoder exposes a certain beauty in
    deep learning: we can profoundly shape the neural network’s thinking processes
    to our own desires with a few well-placed nudges. For instance, you may be wondering:
    what if certain latent variables aren’t normally distributed? Over time, the network
    will adapt the encoding and decoding processes to accommodate the normal distribution
    because we use the normal distribution assumption to choose the encoded representation.
    If it did not adapt, it would not attain optimal performance. We can expect the
    variational autoencoder to learn this adaptation with high certainty because modern
    neural networks possess reliably high processing power. This, in turn, allows
    us to more freely impose (reasonable) expectations within models as a means to
    accomplish some end.'
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 变分自动编码器的架构在深度学习中展现了一定的美感：我们可以通过一些恰到好处的推动，深刻地塑造神经网络的思想过程以符合我们的愿望。例如，你可能想知道：如果某些潜在变量不是正态分布的，会怎样？随着时间的推移，网络将适应编码和解码过程以适应正态分布，因为我们使用正态分布假设来选择编码表示。如果它没有适应，它就不会达到最佳性能。我们可以有很高的信心预期变分自动编码器会学习这种适应，因为现代神经网络具有可靠的高处理能力。这反过来又允许我们在模型中更自由地施加（合理的）期望，作为实现某些目的的手段。
- en: Similarly, even though we would like the branches after encoding to represent
    the means and standard deviations of the latent variables, we don’t build any
    hands-on mechanisms before these two branches to manually tell the network what
    the mean or standard deviation is. Rather, we assume that each of the branches
    takes the role of the mean and the standard deviation of a distribution when generating
    the encoded representation (the expectation) and allow the network to adapt to
    that expectation. This sort of expectation-based design allows you to implement
    deep learning ideas faster and more easily.
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，尽管我们希望编码后的分支代表潜在变量的均值和标准差，但我们在这两个分支之前并没有建立任何实际机制来手动告诉网络均值或标准差是什么。相反，我们假设每个分支在生成编码表示（期望）时扮演分布的均值和标准差的角色，并允许网络适应这种期望。这种基于期望的设计允许你更快、更轻松地实现深度学习思想。
- en: With enough training, the autoencoder gradually develops an understanding of
    the probability distribution of each latent variable, allowing the latent space
    to be, by design, continuous (Figure [3-36](#Fig36)). Instead of learning the
    absolute location of points, the autoencoder learns probabilistic “clouds” around
    each original input to gain experience with variations on the original input.
    This allows the autoencoder to interpolate in the latent space more smoothly.
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 经过足够的训练，自动编码器逐渐理解了每个潜在变量的概率分布，使得潜在空间通过设计是连续的（图 [3-36](#Fig36)）。自动编码器不是学习点的绝对位置，而是学习围绕每个原始输入的概率“云”，以获得对原始输入变化的经验。这使得自动编码器在潜在空间中更平滑地插值。
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig36_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig36_HTML.jpg)'
  id: totrans-326
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig36_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig36_HTML.jpg)'
- en: Figure 3-36
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-36
- en: Standard autoencoders learn the absolute locations of data in the latent space,
    whereas variational autoencoders learn probability distributions
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 标准自动编码器学习潜在空间中数据的绝对位置，而变分自动编码器学习概率分布
- en: 'However, there’s still one way the network can cheat: by setting the branch
    representing the standard deviation to be arbitrarily small, the network can reduce
    the variation around each learned point in the latent space such that it is functionally
    identical to learning the location of absolute points (Figure [3-37](#Fig37)).
    Since we know that autoencoders will tend toward building discrete spaces, variational
    autoencoders implement another mechanism to force the autoencoder to learn a continuous
    space: KL divergence.'
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，网络仍然有一种欺骗的方式：通过将表示标准差的分支设置为任意小，网络可以减少潜在空间中每个学习点的变化，使其在功能上等同于学习绝对点的位置（图 [3-37](#Fig37)）。由于我们知道自动编码器倾向于构建离散空间，变分自动编码器实现了一种机制来强制自动编码器学习连续空间：KL
    散度。
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig37_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig37_HTML.jpg)'
  id: totrans-330
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig37_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig37_HTML.jpg)'
- en: Figure 3-37
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-37
- en: In practice, variational autoencoders can “cheat” and replicate the absolute
    point learning of standard autoencoders by forming clustering patterns and reducing
    the standard deviation
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，变分自编码器可以通过形成聚类模式和降低标准差来“作弊”，并复制标准自编码器的绝对点学习。
- en: KL divergence, or Kullback-Leibler divergence, measures the level of divergence,
    or difference, between two probability distributions (roughly speaking). For the
    purposes of variational autoencoders, KL divergence is minimized when the mean
    is 0 and the standard deviation is 1 and thus acts as a regularization term, punishing
    the network for clustering or reducing the standard deviation.
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: KL 散度，或库尔巴克-莱布勒散度，衡量两个概率分布之间的差异或差异水平（大致来说）。对于变分自编码器而言，当均值是 0 且标准差是 1 时，KL 散度最小化，因此它充当正则化项，惩罚网络进行聚类或降低标准差。
- en: If the variational autoencoder is optimized only on KL divergence, it will tend
    to cluster all the points toward the center without any regard for decoding ability,
    because KL divergence is concerned with the distribution parameters outputted
    by the encoder, not the decoder’s ability. Hence, like only using reconstruction
    loss, the latent space cannot be interpolated (Figure [3-38](#Fig38)).
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 如果仅对变分自编码器进行 KL 散度优化，它将倾向于将所有点聚类到中心，而不考虑解码能力，因为 KL 散度关注的是编码器输出的分布参数，而不是解码器的解码能力。因此，就像仅使用重建损失一样，潜在空间不能进行插值（图
    [3-38](#Fig38)）。
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig38_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig38_HTML.jpg)'
  id: totrans-335
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig38_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig38_HTML.jpg)'
- en: Figure 3-38
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-38
- en: Results of latent space representations when only using reconstruction loss
    vs. only using KL loss
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 仅使用重建损失与仅使用 KL 损失的潜在空间表示结果
- en: To address this problem, variational autoencoders are trained on the sum of
    reconstruction loss and KL loss. Thus, the variational autoencoder must simultaneously
    develop encoded representations that can be decoded into the original representation
    but will be punished if the representations make use of clustering, low standard
    deviations, and other marks of a discrete space. The variational autoencoder is
    a unique model in that its objective cannot be clearly articulated by any one
    existing loss function and thus is formulated as a combination of two functions.
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，变分自编码器在重建损失和 KL 损失的总和上训练。因此，变分自编码器必须同时开发出可以解码成原始表示的编码表示，但如果这些表示使用了聚类、低标准差和其他离散空间的标志，将会受到惩罚。变分自编码器是一个独特的模型，因为其目标不能由任何现有的损失函数明确表达，因此被表述为两个函数的组合。
- en: 'Now, you can random uniformly sample the latent space within the domain of
    learned representations and produce both a diverse and realistic set of generated
    images. Moreover, our intuitive logic of interpolation applies: if you want to
    visualize what lies “in between” two images (e.g., a cat and a dog or the digit
    “1” and “9”), you can find the point in between the corresponding two points in
    the latent space and decode it.'
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你可以在学习表示的域内随机均匀地采样潜在空间，并生成一组多样化和逼真的生成图像。此外，我们的插值直观逻辑也适用：如果你想可视化两个图像“之间”的内容（例如，一只猫和一只狗或数字“1”和“9”），你可以在潜在空间中找到对应两个点之间的点并对其进行解码。
- en: Implementation
  id: totrans-340
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 实现
- en: Implementing variational autoencoders is more difficult than implementing other
    autoencoder applications, because we need to access and manipulate components
    within the autoencoder itself (the latent space), whereas prior the only significant
    step was to change the input and output flow. Luckily, this serves as a useful
    exercise in the construction of more complex neural network structures in Keras.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 实现变分自编码器比实现其他自编码器应用更困难，因为我们需要访问和操作自编码器本身（潜在空间）内的组件，而在此之前，唯一重要的步骤是改变输入和输出流。幸运的是，这可以作为在
    Keras 中构建更复杂神经网络结构的有效练习。
- en: Tip
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士
- en: Recall that in the Functional API, each layer is assigned to a variable. Although
    you should always be careful and specific with your variable naming, this is especially
    true with complex and nonlinear neural network architectures like the variational
    autoencoder. You’ll need to keep track of the relationships between several layers
    across several components, so establish a naming convention and code organization
    that works best for you. If you make mistakes, you’ll run into graph construction
    errors. Frequently use `plot_model` with `show_shapes=True` if you need guidance
    in debugging these errors to show what went wrong.
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 回想一下，在Functional API中，每个层都分配给一个变量。尽管您应该始终对变量命名保持谨慎和具体，但对于像变分自编码器这样的复杂和非线性神经网络架构，这一点尤为重要。您需要跟踪多个组件中几个层之间的关系，因此请建立最适合您的命名约定和代码组织。如果您出错，您会遇到图构建错误。如果您需要指导以调试这些错误，请经常使用`plot_model`并设置`show_shapes=True`来显示出了什么问题。
- en: Let’s begin by implementing the encoder. Prior, we used the Sequential model-building
    structure to construct the encoder and decoder, because the encoder and the decoder
    were not topologically nonlinear and we did not need to reference any intermediate
    layers. However, in variational autoencoders, both of these conditions are true;
    thus, we will build the encoder using the Functional API (Listing [3-25](#PC25)).
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从实现编码器开始。在此之前，我们使用Sequential模型构建结构来构建编码器和解码器，因为编码器和解码器在拓扑上不是非线性，我们不需要参考任何中间层。然而，在变分自编码器中，这两个条件都是成立的；因此，我们将使用Functional
    API构建编码器（见列表[3-25](#PC25)）。
- en: '[PRE24]'
  id: totrans-345
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: After the inputs are processed by several Dense layers (or convolutional or
    any sort of appropriate layer, given your data type), the network splits into
    two branches, representing the mean and the standard deviation of the latent variable
    distribution (Listing [3-26](#PC26)). Note that in practice the network learns
    the log standard deviation rather than the raw standard deviation to prevent negative
    solutions. You may also see some approaches that use log variance, which is functionally
    no different from using standard deviation (variance is just standard deviation
    squared). Recall that with expectation-based design, we can expect the network
    to learn expectations as long as we set them (and the expectation is not too difficult
    to reach), so you can more or less direct the model to learn whatever attribute
    you would like it to.
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 在输入经过几个密集层（或卷积层或任何适合您数据类型的层）处理后，网络分为两个分支，分别表示潜在变量分布的均值和标准差（见列表[3-26](#PC26)）。请注意，在实际应用中，网络学习的是对数标准差而不是原始标准差，以防止出现负数解。您也可能看到一些使用对数方差的方法，这在功能上与使用标准差没有区别（方差只是标准差的平方）。回想一下，基于期望的设计，只要我们设定它们（并且期望不是太难达到），我们就可以期望网络学习期望值，因此您可以或多或少地指导模型学习您想要的任何属性。
- en: '[PRE25]'
  id: totrans-347
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: We’ve built two branches, representing the mean and log standard deviation of
    the latent variable distributions. In this case, our latent space has 32 dimensions
    (like a standard autoencoder with 32 bottleneck nodes), with one mean value and
    one log standard deviation value to describe the distribution. To attain the output
    of the encoder – the encoded representation of the input – we need to take in
    both the mean and the standard deviation, randomly sample from that distribution,
    and output that random sample (Listing [3-27](#PC27)). This sort of operation
    isn’t built as a default layer in Keras/TensorFlow, so we’re going to have to
    build it ourselves.
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 我们构建了两个分支，分别表示潜在变量分布的均值和对数标准差。在这种情况下，我们的潜在空间有32个维度（类似于具有32个瓶颈节点的标准自编码器），每个分布有一个均值和一个对数标准差值来描述。为了获得编码器的输出——输入的编码表示——我们需要同时获取均值和标准差，从这个分布中随机采样，并输出这个随机样本（见列表[3-27](#PC27)）。这种操作在Keras/TensorFlow中不是作为默认层构建的，因此我们将不得不自己构建它。
- en: To build a custom layer, we can take advantage of the `keras.layers.Lambda()`
    method of constructing layers that perform operations. It can be used as follows.
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 要构建自定义层，我们可以利用`keras.layers.Lambda()`方法来构建执行操作的层。它可以如下使用。
- en: '[PRE26]'
  id: totrans-350
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: In this example, `custom_layer` takes in the outputs of two previous layers.
    However, Keras delivers this data together in one argument variable containing
    all of the arguments to the custom function, which can be unpacked within the
    custom function. Additionally, all operations must be Keras/TensorFlow operations
    (see Keras backend for Keras’ low-level operations). Note that you can use methods
    like TensorFlow’s `py_func` (see Chapter [1](516104_1_En_1_Chapter.xhtml)) to
    convert Python functions into TensorFlow operations, if necessary.
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，`custom_layer`接收两个先前层的输出。然而，Keras将此数据作为一个包含所有自定义函数参数的单个参数变量一起传递，这些参数可以在自定义函数内部解包。此外，所有操作都必须是Keras/TensorFlow操作（参见Keras后端以了解Keras的低级操作）。请注意，如果需要，你可以使用像TensorFlow的`py_func`（见第[1](516104_1_En_1_Chapter.xhtml)章）这样的方法将Python函数转换为TensorFlow操作。
- en: The custom sampling layer for the variational autoencoder takes in the means
    and the log standard deviations. In the custom sampling function, we take in the
    argument variable and unpack it into a tensor containing the means and log standard
    deviations for each latent variable. Then, we generate a random, normally distributed
    tensor of the shape of the `means` and `log_stds` objects as `eps`, or epsilon.
    We can use the formula *μ* + *e*^(*ln*(*σ*)) · *ϵ*, which simplifies cleanly and
    intuitively to *μ* + *σ* · *ϵ* (Listing [3-28](#PC28)).
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 变分自动编码器的自定义采样层接收均值和对数标准差。在自定义采样函数中，我们接收一个参数变量并将其解包成一个包含每个潜在变量的均值和对数标准差的张量。然后，我们生成一个形状与`means`和`log_stds`对象相同的随机正态分布张量作为`eps`，或称为epsilon。我们可以使用公式
    *μ* + *e*^(*ln*(*σ*)) · *ϵ*，这个公式可以简洁直观地简化为 *μ* + *σ* · *ϵ*（见代码清单[3-28](#PC28)）。
- en: '[PRE27]'
  id: totrans-353
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: 'The `shape` parameter used in creating the epsilon variable is expressed in
    this example as `(tf.shape(means)[0], 32)`. Alternative methods include `(tf.shape(log_stds)[0],
    32)` and `(tf.shape(means)[0], tf.shape(means)[1])`: all capture the same idea.
    In order for the actual sampling (*μ* + *σ* · *ϵ*) to be successful, the tensors
    for the mean, standard deviation/log standard deviation, and epsilon normally
    distributed randomness need to be the same size. Because this data is one-dimensional,
    we know that the input shapes to the sampling layer will be in the form of `(batch_size,
    latent_space_size)`. We haven’t specified what the batch size is, so we simply
    used `tf.shape(mean)[0]`. However, we know the latent space size – 32 dimensions.
    With more complex data types, it’s important to understand the shape of the inputs
    to this sampling data you’re dealing with.'
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 在创建epsilon变量时使用的`shape`参数在这个例子中表达为`(tf.shape(means)[0], 32)`。其他方法包括`(tf.shape(log_stds)[0],
    32)`和`(tf.shape(means)[0], tf.shape(means)[1])`：它们都表达了相同的概念。为了使实际的采样(*μ* + *σ*
    · *ϵ*)成功，均值、标准差/对数标准差和epsilon正态分布随机性的张量需要具有相同的大小。因为此数据是一维的，我们知道采样层的输入形状将是`(batch_size,
    latent_space_size)`的形式。我们没有指定批大小，所以我们简单地使用了`tf.shape(mean)[0]`。然而，我们知道潜在空间的大小是32维。对于更复杂的数据类型，了解你正在处理的采样数据的输入形状非常重要。
- en: It should also be noted that while the mean with which the epsilon tensor is
    generated should remain at 0, the standard deviation can be changed depending
    on how much variation you’re willing to introduce. More variation could allow
    the model to better interpolate and produce more realistic and diverse results,
    but too much could risk introducing too much noise to possibly be plausibly decoded.
    On the other hand, less variation allows the decoder to better decode the image
    but may result in less exploration and smooth interpolation of “gaps” in the latent
    space.
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: 还应注意的是，虽然生成epsilon张量的均值应保持在0，但标准差可以根据你愿意引入多少变化而改变。更多的变化可能允许模型更好地插值并产生更真实、多样化的结果，但过多可能会引入过多的噪声，从而难以合理解码。另一方面，较少的变化允许解码器更好地解码图像，但可能会导致潜在空间中的“间隙”探索不足和光滑插值。
- en: We can now aggregate these layers into the autoencoder (Listing [3-29](#PC29)).
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在可以将这些层聚合到自动编码器中（见代码清单[3-29](#PC29)）。
- en: '[PRE28]'
  id: totrans-357
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: 'Note that we output the `means`, `log_stds`, and `x`, whereas in the original
    design, the encoder only truly outputs `x`, the sampled encoded representation.
    Recall that the loss function for variational autoencoders is specialized: a hybrid
    of reconstruction loss and KL divergence. In order to calculate KL divergence
    loss, the loss function requires access to the means and standard deviations.
    Therefore, in order to provide this access, we will list `means` and `log_stds`
    as outputs to the encoder model. While we won’t use them in the decoder, this
    allows our loss function to work. The encoder architecture is as follows (Figure
    [3-39](#Fig39)).'
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，我们输出`means`、`log_stds`和`x`，而在原始设计中，编码器只真正输出`x`，即采样的编码表示。回想一下，变分自动编码器的损失函数是专门的：重建损失和KL散度的混合。为了计算KL散度损失，损失函数需要访问均值和标准差。因此，为了提供这种访问，我们将`means`和`log_stds`列为编码器模型的输出。虽然我们不会在解码器中使用它们，但这使得我们的损失函数能够工作。编码器架构如下（图[3-39](#Fig39)）。
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig39_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig39_HTML.jpg)'
  id: totrans-359
  prefs: []
  type: TYPE_IMG
  zh: '![图3-39](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig39_HTML.jpg)'
- en: Figure 3-39
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-39
- en: Building the encoder of the variational autoencoder
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 构建变分自动编码器的编码器
- en: 'Building the decoder is relatively straightforward: like the standard autoencoder,
    it takes in an encoded representation (in this case, a 32-dimensional vector)
    and progressively decodes it (Listing [3-30](#PC30)).'
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 构建解码器相对简单：就像标准自动编码器一样，它接收一个编码表示（在这种情况下，一个32维向量）并逐步对其进行解码（代码列表[3-30](#PC30)）。
- en: '[PRE29]'
  id: totrans-363
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: We can join these two components together into a variational autoencoder model
    (Listing [3-31](#PC31)).
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将这两个组件组合成一个变分自动编码器模型（代码列表[3-31](#PC31)）。
- en: '[PRE30]'
  id: totrans-365
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: 'This method of combining components together into a model is like the method
    that has been used for standard autoencoders with two key differences. Firstly,
    the input to the variational autoencoder is not a unique `keras.layers.Input`
    or `keras.Input` input mechanism, but the input to the encoder (`enc_inputs`).
    This is because of the design of the variational autoencoder’s loss function:
    because the model must have access to the output of the encoder, the encoder’s
    input must also be on the same “level” as the variational autoencoder itself.
    Note that this is a valid operation because we’re not making any actual architectural
    changes (i.e., rerouting layers or adding multiple branches to one layer), only
    simplifying a technically redundant (but perhaps organizationally helpful) process
    of passing data through two input layers. Secondly, the decoder does not take
    in the entire encoder output, but instead indexes it (`decoded = decoder(encoded[2])`).
    Recall that for the KL divergence component of the loss function to have access
    to the distribution parameters, the encoder outputs the tensors containing the
    mean and log standard deviation, as well as the actual encoded representation.
    The decoder only takes in the encoded representation, which is the third output
    of the encoder, and is thus indexed accordingly.'
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 将组件组合成模型的方法类似于标准自动编码器所使用的方法，但有两个关键区别。首先，变分自动编码器的输入不是一个独特的`keras.layers.Input`或`keras.Input`输入机制，而是编码器的输入（`enc_inputs`）。这是因为变分自动编码器损失函数的设计：因为模型必须能够访问编码器的输出，所以编码器的输入也必须与变分自动编码器本身处于相同的“级别”。请注意，这是一个有效的操作，因为我们没有进行任何实际的架构更改（即重新路由层或向一个层添加多个分支），只是简化了一个技术上冗余（但可能对组织有帮助）的过程，即通过两个输入层传递数据。其次，解码器不接收整个编码器输出，而是对其进行索引（`decoded
    = decoder(encoded[2])`）。回想一下，为了使损失函数的KL散度部分能够访问分布参数，编码器输出包含均值和日志标准差的张量，以及实际的编码表示。解码器只接收编码表示，这是编码器的第三个输出，因此相应地进行索引。
- en: All that is left before fitting is to construct the loss function. Recall that
    our loss function is a combination of the reconstruction loss (we’ll use binary
    cross-entropy in this case) and KL divergence loss. Creating the reconstruction
    loss is easy because it’s already implemented in Keras (Listing [3-32](#PC32)).
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 在拟合之前，剩下要做的就是构建损失函数。回想一下，我们的损失函数是重建损失（在这种情况下我们将使用二元交叉熵）和KL散度损失的组合。创建重建损失很容易，因为它已经在Keras中实现（代码列表[3-32](#PC32)）。
- en: '[PRE31]'
  id: totrans-368
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: Building KL divergence is more difficult. Although KL divergence is already
    implemented in Keras/TensorFlow, in our case we need to build a custom simplified
    KL divergence that does not take in predictions and ground truth labels, but instead
    means and standard deviations, measuring how far the distribution is from a distribution
    with mean 0 and standard deviation 1 (Listing [3-33](#PC33)).
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 构建KL散度更困难。尽管KL散度已在Keras/TensorFlow中实现，但在我们的情况下，我们需要构建一个自定义简化的KL散度，它不接收预测和真实标签，而是接收均值和标准差，测量分布与均值为0、标准差为1的分布的距离（见清单[3-33](#PC33)）。
- en: '[PRE32]'
  id: totrans-370
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: Note that `tf.reduce_sum` allows you to sum the losses for each item across
    a specified axis; this is necessary to deal with batching, in which there is more
    than one data point per batch.
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，`tf.reduce_sum` 允许您对指定轴上的每个项目损失进行求和；这对于处理批处理是必要的，在批处理中，每个批次包含多个数据点。
- en: The final variational autoencoder loss can be expressed as a sum of the reconstruction
    loss and the KL divergence loss (Listing [3-34](#PC34)). `tf.reduce_mean` averages
    the losses for each of the data points to produce the final loss value.
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 最终的变分自动编码器损失可以表示为重建损失和KL散度损失的加和（见清单[3-34](#PC34)）。`tf.reduce_mean` 对每个数据点的损失进行平均，以产生最终的损失值。
- en: '[PRE33]'
  id: totrans-373
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: 'We need to make one more accommodation for the variational autoencoder’s unique
    loss function: usually, the loss function is passed into the model’s `.compile()`
    function . However, we can’t do this in this case because the inputs to our loss
    function are not predictions and ground truth labels that the Keras data flow
    assumes loss functions take in when passed through compiling: instead, it takes
    in the outputs of specific layers. Because of this, we use `vae.add_loss(vae_loss)`
    to attach the loss function to the variational autoencoder.'
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还需要对变分自动编码器的独特损失函数做出一项调整：通常，损失函数会被传递到模型的 `.compile()` 函数中。然而，在这种情况下我们无法这样做，因为我们的损失函数的输入不是Keras数据流在编译时假设损失函数接收的预测和真实标签，而是特定层的输出。因此，我们使用
    `vae.add_loss(vae_loss)` 将损失函数附加到变分自动编码器上。
- en: The model can then be compiled (without the loss function, which has already
    been attached) and fitted on the data. Since there are so many crucial parameters
    that determine the behavior of the variational autoencoder (architecture size,
    sampling standard deviation, etc.), it’s likely that you’ll need to tweak the
    model parameters a few times before you reach relatively optimal performance.
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，模型可以编译（不包含损失函数，因为损失函数已经附加），并在数据上拟合。由于有许多关键参数决定了变分自动编码器的行为（架构大小、采样标准差等），您可能需要调整模型参数几次，才能达到相对最佳的性能。
- en: We’ve taken several measures to adapt our model structure and implementation
    to work with the unique nature of the variational autoencoder’s loss function.
    While this book – and many tutorials – will present the building of these sorts
    of architectures in a linear format, the actual process of constructing these
    models is anything but sequential. The only way to truly know if the unique situation
    you are working with requires a certain workaround or needs to be rewritten or
    re-expressed somehow is to experiment. In this case, it is likely helpful to first
    write down the basic architectures of the encoder and the decoder, implement the
    custom loss function, and then test and experiment which changes to the architecture
    and/or loss function are needed to make it all work, consulting documentation
    and online forums as necessary.
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经采取了几项措施来调整我们的模型结构和实现，以适应变分自动编码器损失函数的独特性质。虽然这本书——以及许多教程——将以线性格式展示这些类型架构的构建，但实际构建这些模型的过程根本不是顺序的。真正了解您正在处理的独特情况是否需要某种解决方案或需要以某种方式重写或重新表达，唯一的方法是进行实验。在这种情况下，首先写下编码器和解码器的基本架构，实现自定义损失函数，然后测试和实验对架构和/或损失函数的哪些更改是必要的，以便使其全部工作，根据需要查阅文档和在线论坛。
- en: Case Studies
  id: totrans-377
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 案例研究
- en: In these case studies, we will discuss the usage of autoencoders for a wide
    variety of applications in recent research. Some can be accessed via existing
    implementations, whereas others may be out of the reach of our current implementation
    skills – nevertheless, these case studies provide rich and interesting examples
    of the versatility of autoencoders and put forth empirical evidence of their relevance
    in modern deep learning.
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些案例研究中，我们将讨论在最近的研究中，自动编码器在广泛应用中的使用。一些可以通过现有实现访问，而另一些可能超出了我们当前的实施技能范围——然而，这些案例研究提供了丰富且有趣的自动编码器多功能性的例子，并提出了它们在现代深度学习中的相关性的实证证据。
- en: 'Autoencoders for Pretraining Case Study: TabNet'
  id: totrans-379
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 预训练案例研究：TabNet
- en: Deep learning is quite famously seldom used for tabular data. A common critique
    is that deep learning is “overkill” for simpler tabular datasets, in which the
    massive fitting power of a neural network overfits on a dataset without developing
    any meaningful representations. Often, tree-based machine learning models and
    frameworks like XGBoost, LightGBM, and CatBoost are employed instead to handle
    tabular data.
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习在处理表格数据方面并不常用，这一点广为人知。常见的批评是，对于简单的表格数据集，深度学习“过度强大”，神经网络的巨大拟合能力会在没有发展出任何有意义的表示的情况下对数据集进行过拟合。通常，会使用基于树的机器学习模型和框架，如XGBoost、LightGBM和CatBoost来处理表格数据。
- en: However, especially with larger tabular datasets, deep learning has a lot to
    offer. Its complexity allows it to use tabular data in a multimodal fashion (considering
    tabular data alongside image, text, and other data), engineer features optimally
    on its own, and use tabular data in deep learning domains like generative modeling
    and semi-supervised learning (see Chapter [7](516104_1_En_7_Chapter.xhtml)).
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，特别是对于较大的表格数据集，深度学习有很多可提供的优势。其复杂性允许它以多模态方式使用表格数据（考虑表格数据与图像、文本和其他数据一起），在其自身上优化特征工程，并在深度学习领域如生成建模和半监督学习中使用表格数据（见第[7](516104_1_En_7_Chapter.xhtml)章）。
- en: 'In the 2020 paper “TabNet: Attentive Interpretable Tabular Learning,”^([4](#Fn4))
    Sercan O. Arik and Tomas Pfister propose a deep learning architecture for tabular
    data named TabNet. Arik and Pfister highlight three key aspects of TabNet’s architecture
    and design:'
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 在2020年的论文“TabNet：注意力可解释的表格学习”中，Sercan O. Arik和Tomas Pfister提出了一种名为TabNet的用于表格数据的深度学习架构。Arik和Pfister强调了TabNet架构和设计的三个关键方面：
- en: '*End-to-end design*: TabNet does not need feature processing and other preprocessing
    methods required when using tabular data for other approaches.'
  id: totrans-383
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*端到端设计*: TabNet在使用表格数据进行其他方法时，不需要特征处理和其他预处理方法。'
- en: '*Sequential attention*: Attention is a mechanism that is commonly used in language
    models to allow the model to develop and understand relationships between various
    entities in a sequence. In TabNet, sequential attention allows the model to choose,
    at each step, which features it should consider. This, moreover, allows for greater
    interpretability of the model’s decision-making processes.'
  id: totrans-384
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*顺序注意力*: 注意力是一种在语言模型中常用的机制，它允许模型在序列中发展并理解各种实体之间的关系。在TabNet中，顺序注意力允许模型在每一步选择它应该考虑的特征。此外，这还使得模型决策过程的可解释性更高。'
- en: '*Unsupervised pretraining* : TabNet is pretrained using an autoencoder-based
    architecture to predict masked column values in a tabular fashion. This leads
    to a significant performance and improvement. TabNet demonstrated, for the first
    time, large improvement from self-supervised pretraining on tabular data.'
  id: totrans-385
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*无监督预训练*: TabNet使用基于自动编码器的架构进行预训练，以表格形式预测掩码列值。这导致了显著的性能提升。TabNet首次展示了在表格数据上的自监督预训练带来的巨大改进。'
- en: For the purposes of this case study, the unsupervised pretraining via autoencoder
    structure is the focus.
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 在本案例研究中，通过自动编码器结构进行无监督预训练是重点。
- en: Using an encoder and a decoder, TabNet was trained via self-supervised learning
    to reconstruct masked column values (Figure [3-40](#Fig40)). After pretraining
    is completed, the encoder is detached and altered to be fitted for a supervised
    task. By pretraining such that the decoder and reconstruct missing inputs based
    on the TabNet encoder’s encoded representations, the TabNet encoder develops efficient
    processes for extracting and aggregating key information given existing information.
    Moreover, it must develop a strong understanding of the relationships between
    each of the tabular dataset’s columns. These representations and knowledge allow
    TabNet to more easily be adapted toward some sort of decision-making, in which
    the information-rich encoded representations need only to be further interpreted
    and adapted for the particular classification task.
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 使用编码器和解码器，TabNet 通过自监督学习训练以重建掩码列值（图 [3-40](#Fig40)）。预训练完成后，编码器被分离并调整以适应监督任务。通过预训练，解码器根据
    TabNet 编码器的编码表示提取和聚合关键信息，TabNet 编码器发展出高效的过程。此外，它必须对表格数据集的每一列之间的关系有深刻的理解。这些表示和知识使
    TabNet 更容易适应某种决策，其中信息丰富的编码表示只需要进一步解释和调整以适应特定的分类任务。
- en: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig40_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig40_HTML.jpg)'
  id: totrans-388
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_3_Chapter/516104_1_En_3_Fig40_HTML.jpg](../images/516104_1_En_3_Chapter/516104_1_En_3_Fig40_HTML.jpg)'
- en: Figure 3-40
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-40
- en: TabNet method of unsupervised pretraining before supervised fine-tuning. Produced
    by Arik and Pfister
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: TabNet 方法在监督微调前的无监督预训练。由 Arik 和 Pfister 制作
- en: When tested on a wide range of problems, TabNet performs the same or better
    than standard decision tree-based approaches to deep learning (Table [3-2](#Tab2)).
    The Forest Cover Type dataset, introduced in 2017, is a classification task; TabNet
    outperforms XGBoost, LightGBM, and CatBoost by a significant margin. It also has
    improved performance over the AutoML Tables automated search framework without
    using as thorough a parameter search as AutoML Tables required.
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 当在广泛的问题上进行测试时，TabNet 的表现与标准基于决策树的深度学习方法相同或更好（见表 [3-2](#Tab2)）。2017 年引入的 Forest
    Cover Type 数据集是一个分类任务；TabNet 比 XGBoost、LightGBM 和 CatBoost 有显著的性能优势。它也优于 AutoML
    Tables 自动搜索框架，而不需要像 AutoML Tables 所需的那样彻底的参数搜索。
