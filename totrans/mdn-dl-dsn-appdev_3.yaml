  id: totrans-413
  prefs: []
  type: TYPE_TB
- en: Moreover, experiments comparing the performance of TabNet trained with and without
    pretraining show that pretraining significantly improves performance, especially
    in cases in which an unlabeled dataset is much larger than the labeled dataset
    (Table [3-4](#Tab4)). This makes sense – self-supervised pretraining allows the
    model to take advantage of unlabeled data that a purely supervised training process
    would not be able to exploit. Pretraining both increases test accuracy and increases
    the speed of convergence.
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
- en: Table 3-4
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
