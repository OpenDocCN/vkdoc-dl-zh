- en: Introduction
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 引言
- en: Why another book on applied deep learning? That is the question I asked myself
    before starting to write this volume. After all, do a Google search on the subject,
    and you will be overwhelmed by the huge number of results. The problem I encountered,
    however, is that I found material only to implement very basic models on very
    simple datasets. Over and over again, the same problems, the same hints, and the
    same tips are offered. If you want to learn how to classify the Modified National
    Institute of Standards and Technology (MNIST) dataset of ten handwritten digits,
    you are in luck. (Almost everyone with a blog has done that, mostly copying the
    code available on the TensorFlow web site). Searching for something else to learn
    how logistic regression works? Not so easy. How to prepare a dataset to perform
    an interesting binary classification? Even more difficult. I felt there was a
    need to fill this gap. I spent hours trying to debug models for reasons as silly
    as having the labels wrong. For example, instead of 0 and 1, I had 1 and 2, but
    no blog warned me about that. It is important to conduct a proper metric analysis
    when developing models, but no one teaches you how (at least not in material that
    is easily accessible). This gap needed to be filled. I find that covering more
    complex examples, from data preparation to error analysis, is a very efficient
    and fun way to learn the right techniques. In this book, I have always tried to
    cover complete and complex examples to explain concepts that are not so easy to
    understand in any other way. It is not possible to understand why it is important
    to choose the right learning rate if you don’t see what can happen when you select
    the wrong value. Therefore, I always explain concepts with real examples and with
    fully fledged and tested Python code that you can reuse. Note that the goal of
    this book is not to make you a Python or TensorFlow expert, or someone who can
    develop new complex algorithms. Python and TensorFlow are simply tools that are
    very well suited to develop models and get results quickly. Therefore, I use them.
    I could have used other tools, but those are the ones most often used by practitioners,
    so it makes sense to choose them. If you must learn, better that it be something
    you can use in your own projects and for your own career.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么又要写一本关于应用深度学习的书？这是我开始撰写这本书之前问自己的问题。毕竟，在谷歌上搜索这个主题，你会被大量结果所淹没。然而，我遇到的问题是，我只能找到用于在非常简单的数据集上实现非常基础模型的材料。一次又一次，同样的问题、同样的提示和同样的建议被提供出来。如果你想学习如何对修改后的国家标准与技术研究院（MNIST）的手写数字数据集进行分类，你很幸运。（几乎每个有博客的人都已经做过这件事，大多数情况下是复制TensorFlow网站上可用的代码）。想要寻找其他内容来学习逻辑回归的工作原理？并不容易。如何准备一个数据集来进行有趣的二分类？那就更难了。我觉得有必要填补这个空白。我花了很多小时试图调试模型，原因竟然是如此愚蠢，比如标签错误。例如，我应该用0和1，但我用了1和2，但没有任何博客提醒我这一点。在开发模型时进行适当的度量分析是很重要的，但没有人教你如何做（至少不是在容易获取的材料中）。这个空白需要被填补。我发现，通过涵盖更复杂的内容，从数据准备到错误分析，是一种非常高效且有趣的学习正确技术的方法。在这本书中，我一直试图涵盖完整且复杂的内容，以解释那些用其他方式难以理解的概念。如果你没有看到选择错误值时可能发生的情况，你就无法理解为什么选择正确的学习率很重要。因此，我总是用真实示例和经过充分测试且可重用的Python代码来解释概念。请注意，这本书的目标不是让你成为Python或TensorFlow专家，或者能够开发新的复杂算法的人。Python和TensorFlow只是非常适合快速开发模型和获取结果的工具。因此，我使用了它们。我本可以使用其他工具，但那些是实践者最常使用的工具，所以选择它们是有意义的。如果你必须学习，最好是学习那些你可以用于自己的项目和职业的东西。
- en: The goal of this book is to let you see more advanced material with new eyes.
    I cover the mathematical background as much as I can, because I feel that it is
    necessary for a complete understanding of the difficulties and reasoning behind
    many concepts. You cannot comprehend why a large learning rate will make your
    model (strictly speaking, the cost function) diverge, if you don’t know how the
    gradient descent algorithm works mathematically. In all real-life projects, you
    will not have to calculate partial derivatives or complex sums, but you will have
    to understand them to be able to evaluate what can work and what cannot (and especially
    why). Appreciating why a library such as TensorFlow makes your life easier is
    only possible if you try to develop a trivial model with one neuron from scratch.
    It is a very instructive thing to do, and I will show you how in Chapter [10](463356_1_En_10_Chapter.xhtml)
    . Once you have done it once, you will remember it forever, and you will really
    appreciate libraries such as TensorFlow.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 本书的目标是让你用新的视角看到更高级的材料。我会尽可能多地涵盖数学背景，因为我感觉这对于完全理解许多概念背后的困难和推理是必要的。如果你不知道梯度下降算法在数学上的工作原理，你就无法理解为什么大的学习率会使你的模型（严格来说，是损失函数）发散。在所有实际项目中，你不需要计算偏导数或复杂的求和，但你必须理解它们，以便能够评估什么可以工作，什么不可以（尤其是为什么）。只有尝试从头开始用单个神经元开发一个简单的模型，你才能欣赏到像TensorFlow这样的库如何使你的生活变得更轻松。这是一件非常有教育意义的事情，我将在第[10](463356_1_En_10_Chapter.xhtml)章中向你展示如何做。一旦你这样做了一次，你将永远记住它，你也会真正欣赏像TensorFlow这样的库。
- en: I suggest that you really try to understand the mathematical underpinnings (although
    this is not strictly necessary to profit from the book), because they will allow
    you to fully understand many concepts that otherwise cannot be understood completely.
    Machine learning is a very complicated subject, and it is utopic to think that
    it is possible to understand it thoroughly without a good grasp of mathematics
    or Python. In each chapter, I highlight important tips to develop things efficiently
    in Python. There is no statement in this book that is not backed up by concrete
    examples and reproducible code. I will not discuss anything without offering related
    real-life examples. In this way, everything will make sense immediately, and you
    will remember it.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我建议你真正尝试去理解数学基础（尽管这并不是从书中获益的必要条件），因为这将使你能够完全理解许多否则无法完全理解的概念。机器学习是一个非常复杂的话题，认为没有良好的数学或Python基础就能彻底理解它是乌托邦式的想法。在每一章中，我都会强调一些重要的提示，帮助你高效地在Python中实现这些功能。本书中的每一个陈述都有具体的例子和可复现的代码作为支撑。我不会在没有提供相关现实生活例子的情况下讨论任何事情。这样，一切都会立即变得有意义，你也会记得它。
- en: 'Take the time to study the code that you find in this book and try it for yourself.
    As every good teacher knows, learning works best when students try to resolve
    problems themselves. Try, make mistakes, and learn. Read a chapter, type in the
    code, and try to modify it. For example, in Chapter [2](463356_1_En_2_Chapter.xhtml)
    , I will show you how to perform binary classification recognition between two
    handwritten digits: 1 and 2\. Take the code and try two different digits. Play
    with the code and have fun.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 请花时间研究本书中找到的代码，并亲自尝试。正如每位优秀的老师都知道的，当学生尝试自己解决问题时，学习效果最好。尝试，犯错误，学习。阅读一章，输入代码，并尝试修改它。例如，在第[2](463356_1_En_2_Chapter.xhtml)章中，我将向你展示如何对两个手写数字（1和2）进行二分类识别。拿走代码，尝试两个不同的数字。玩转代码，享受乐趣。
- en: By design, the code that you will find in this book is written as simply as
    possible. It is not optimized, and I know that it is possible to write much better-performing
    code, but by doing so, I would have sacrificed clarity and readability. The goal
    of this book is not to teach you to write highly optimized Python code; it is
    to let you understand the fundamental concepts of the algorithms and their limitations
    and give you a solid basis with which to continue your learning in this field.
    Regardless, I will, of course, point out important Python implementation details,
    such as, for example, how you should avoid standard Python loops as much as possible.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 按照设计，本书中的代码尽可能简单。它没有经过优化，我知道可以写出性能更好的代码，但这样做会牺牲清晰度和可读性。本书的目标不是教你编写高度优化的Python代码；而是让你理解算法的基本概念及其局限性，并为你在这个领域继续学习提供一个坚实的基础。当然，我会指出重要的Python实现细节，例如，例如，你应该尽可能避免使用标准的Python循环。
- en: All the code in this book is written to support the learning goals I have set
    for each chapter. Libraries such as NumPy and TensorFlow have been recommended
    because they allow mathematical formulations to be translated directly into Python.
    I am aware of other software libraries, such as TensorFlow Lite, Keras, and many
    more that may make your life easier, but those are merely tools. The significant
    difference lies in your ability to understand the concepts behind the methods.
    If you get them right, you can choose whatever tool you want, and you will be
    able to achieve a good implementation. If you don’t understand how the algorithms
    work, no matter the tool, you will not be able to undertake a proper implementation
    or a proper error analysis. I am a fierce opponent of the concept of data science
    for everyone. Data science and machine learning are difficult and complex subjects
    that require a deep understanding of the mathematics and subtelties behind them.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书中的所有代码都是编写来支持我为每个章节设定的学习目标的。推荐了如NumPy和TensorFlow这样的库，因为它们允许将数学公式直接转换为Python。我了解其他软件库，如TensorFlow
    Lite、Keras等，这些可能会使你的生活变得更轻松，但那些只是工具。显著的区别在于你理解方法背后概念的能力。如果你理解正确，你可以选择任何你想要的工具，并且你将能够实现良好的实现。如果你不理解算法是如何工作的，无论是什么工具，你都将无法进行适当的实现或适当的错误分析。我是一个数据科学普及概念的强烈反对者。数据科学和机器学习是困难和复杂的主题，需要深入了解其背后的数学和微妙之处。
- en: I hope that you will have fun reading this book (I surely had a lot in writing
    it) and that you will find the examples and the code useful. I hope, too, that
    you will have many Eureka! moments, wherein you will finally understand why something
    works the way you expect it to (or why it does not). I hope you will find the
    complete examples both interesting and useful. If I help you to understand only
    one concept that was unclear to you before, I will be happy.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望你会喜欢阅读这本书（我在写作时确实有很多乐趣）并且你会发现示例和代码很有用。我也希望你会有很多“啊哈！”的时刻，那时你最终会理解为什么某物以你期望的方式工作（或者为什么它不工作）。我希望你会发现完整的示例既有趣又实用。如果我能帮助你理解你之前不清楚的一个概念，我将感到非常高兴。
- en: 'There are a few chapters of this book that are more mathematically advanced.
    In Chapter [2](463356_1_En_2_Chapter.xhtml) , for example, I calculate partial
    derivatives. But don’t worry, if you don’t understand them, you can simply skip
    the equations. I have made sure that the main concepts are understandable without
    most of the mathematical details. However, you should really know what a matrix
    is, how to multiply matrices, what a transpose of a matrix is, and so on. Basically,
    you need a good grasp of linear algebra. If you don’t have one, I suggest you
    review a basic linear algebra book before reading this one. If you have a solid
    linear algebra and calculus background, I strongly advise you not to skip the
    mathematical parts. They can really help in understanding why we do things in
    specific ways. For example, it will help you immensely in understanding the quirks
    of the learning rate, or how the gradient descent algorithm works. You should
    also not be scared by a more complex mathematical notation and feel confident
    with an equation as complex as the following (this is the mean square error we
    will use for the linear regression algorithm and will be explained in detail later,
    so don’t worry if you don’t know what the symbols mean at this point):'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书中有些章节在数学上更为复杂。例如，在第二章[2](463356_1_En_2_Chapter.xhtml)中，我计算了偏导数。但别担心，如果你不理解它们，你可以简单地跳过这些方程。我确保了即使没有大多数数学细节，主要概念也是可以理解的。然而，你确实应该知道什么是矩阵，如何乘以矩阵，什么是矩阵的转置，等等。基本上，你需要对线性代数有一个很好的掌握。如果你没有，我建议你在阅读这本书之前先复习一下基本的线性代数书籍。如果你有扎实的线性代数和微积分背景，我强烈建议你不要跳过数学部分。它们真的可以帮助你理解为什么我们以特定的方式做事。例如，这将在理解学习率的怪异之处或梯度下降算法的工作原理方面给你带来极大的帮助。你也不要被更复杂的数学符号吓倒，对于如下复杂程度的方程也要有信心（这是我们将用于线性回归算法的均方误差，将在后面详细解释，所以如果你现在不知道这些符号的含义，请不要担心）：
- en: '![$$ J\left({w}_0,\kern0.5em {w}_1\right)=\frac{1}{m}\sum \limits_{i=1}{\left({y}_i-f\left({w}_0,\kern0.5em
    {w}_1,\kern0.5em {x}^{(i)}\right)\right)}^2 $$](../images/463356_1_En_BookFrontmatter_OnlinePDF_TeX_IEq1.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![J(w_0,w_1) = (1/m) * Σ(y_i - f(w_0, w_1, x^(i)))^2](../images/463356_1_En_BookFrontmatter_OnlinePDF_TeX_IEq1.png)'
- en: You should understand and feel confident with such concepts as a sum or a mathematical
    series. If you feel unsure about these, review them before starting the book;
    otherwise, you will miss some important concepts that you must have a firm grasp
    on to proceed in your deep-learning career. The goal of this book is not to give
    you a mathematical foundation. I assume you have one. Deep learning and neural
    networks (in general, machine learning) are complex, and whoever tries to convince
    you otherwise is lying or doesn’t understand them.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该理解和自信地掌握诸如和、数学级数等概念。如果你对这些概念感到不确定，请在开始阅读本书之前复习它们；否则，你可能会错过一些重要的概念，这些概念是你深入学习深度学习职业生涯所必须牢固掌握的。本书的目标不是为你提供一个数学基础。我假设你已经有了。深度学习和神经网络（一般而言，机器学习）是复杂的，任何试图说服你它们不复杂的人都在撒谎或者不理解它们。
- en: I will not spend time in justifying or deriving algorithms or equations. You
    will have to trust me there. Additionally, I will not discuss the applicability
    of specific equations. For those of you with a good understanding of calculus,
    for example, I will not discuss the problem of the differentiability of functions
    for which we calculate derivatives. Simply assume that you can apply the formulas
    I give you. Many years of practical implementations have shown the deep-learning
    community that those methods and equations work as expected and can be used in
    practice. The kind of advanced topics mentioned would require a separate book.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我不会花费时间去证明或推导算法或方程。你必须在那里信任我。此外，我也不会讨论特定方程的应用性。例如，对于那些对微积分有良好理解的人，我不会讨论我们计算导数的函数的可微性问题。简单地假设你可以应用我给出的公式。多年的实际应用已经向深度学习社区表明，那些方法和方程按预期工作，并且可以在实践中使用。提到的这类高级主题需要单独的书籍来讨论。
- en: In Chapter [1](463356_1_En_1_Chapter.xhtml) , you will learn how to set up your
    Python environment and what computational graphs are. I will discuss some basic
    examples of mathematical calculations performed using TensorFlow. In Chapter [2](463356_1_En_2_Chapter.xhtml)
    , we will look at what you can do with a single neuron. I will cover what an activation
    function is and what the most used types, such as sigmoid, ReLU, or tanh, are.
    I will show you how gradient descent works and how to implement logistic and linear
    regression with a single neuron and TensorFlow. In Chapter [3](463356_1_En_3_Chapter.xhtml)
    , we will look at fully connected networks. I will discuss matrix dimensions,
    what overfitting is, and introduce you to the Zalando dataset. We will then build
    our first real network with TensorFlow and start looking at more complex variations
    of gradient descent algorithms, such as mini-batch gradient descent. We will also
    look at different ways of weight initialization and how to compare different network
    architectures. In Chapter [4](463356_1_En_4_Chapter.xhtml) , we will look at dynamic
    learning rate decay algorithms, such as staircase, step, or exponential decay,
    then I will discuss advanced optimizers, such as Momentum, RMSProp, and Adam.
    I will also give you some hints on how to develop custom optimizers with TensorFlow.
    In Chapter [5](463356_1_En_5_Chapter.xhtml) , I will discuss regularization, including
    such well-known methods as *l* [1] , *l* [2] , dropout, and early stopping. We
    will look at the mathematics behind these methods and how to implement them in
    TensorFlow. In Chapter [6](463356_1_En_6_Chapter.xhtml) , we will look at such
    concepts as human-level performance and Bayes error. Next, I will introduce a
    metric analysis workflow that will allow you to identify problems having to do
    with your dataset. Additionally, we will look at k-fold cross-validation as a
    tool to validate your results. In Chapter [7](463356_1_En_7_Chapter.xhtml) , we
    will look at the black box class of problems and what hyperparameter tuning is.
    We will look at such algorithms as grid and random search and at which is more
    efficient and why. Then we will look at some tricks, such as coarse-to-fine optimization.
    I have dedicated most of the chapter to Bayesian optimization—how to use it and
    what an acquisition function is. I will offer a few tips, such as how to tune
    hyperparameters on a logarithmic scale, and then we will perform hyperparameter
    tuning on the Zalando dataset, to show you how it may work. In Chapter [8](463356_1_En_8_Chapter.xhtml)
    , we will look at convolutional and recurrent neural networks. I will show you
    what it means to perform convolution and pooling, and I will show you a basic
    TensorFlow implementation of both architectures. In Chapter [9](463356_1_En_9_Chapter.xhtml)
    , I will give you an insight into a real-life research project that I am working
    on with the Zurich University of Applied Sciences, Winterthur, and how deep learning
    can be used in a less standard way. Finally, in Chapter [10](463356_1_En_10_Chapter.xhtml)
    , I will show you how to perform logistic regression with a single neuron in Python—without
    using TensorFlow—entirely from scratch.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在第 [1](463356_1_En_1_Chapter.xhtml) 章，你将学习如何设置你的 Python 环境，以及什么是计算图。我将讨论使用 TensorFlow
    执行的一些基本数学计算示例。在第 [2](463356_1_En_2_Chapter.xhtml) 章，我们将探讨你可以用单个神经元做什么。我将介绍什么是激活函数，以及最常用的类型，例如
    sigmoid、ReLU 或 tanh。我会向你展示梯度下降是如何工作的，以及如何使用单个神经元和 TensorFlow 实现逻辑回归和线性回归。在第 [3](463356_1_En_3_Chapter.xhtml)
    章，我们将探讨全连接网络。我将讨论矩阵维度，什么是过拟合，并介绍 Zalando 数据集。然后我们将使用 TensorFlow 构建我们的第一个真实网络，并开始研究梯度下降算法的更复杂变体，例如小批量梯度下降。我们还将探讨不同的权重初始化方法以及如何比较不同的网络架构。在第
    [4](463356_1_En_4_Chapter.xhtml) 章，我们将探讨动态学习率衰减算法，例如阶梯、步进或指数衰减，然后我将讨论高级优化器，如动量、RMSProp
    和 Adam。我还会给你一些关于如何使用 TensorFlow 开发自定义优化器的提示。在第 [5](463356_1_En_5_Chapter.xhtml)
    章，我将讨论正则化，包括诸如 *l* [1]、*l* [2]、dropout 和早停等众所周知的方法。我们将探讨这些方法背后的数学原理以及如何在 TensorFlow
    中实现它们。在第 [6](463356_1_En_6_Chapter.xhtml) 章，我们将探讨诸如人类水平性能和贝叶斯误差等概念。接下来，我将介绍一个度量分析工作流程，这将允许你识别与你的数据集相关的问题。此外，我们还将探讨
    k 折交叉验证作为验证你结果的一种工具。在第 [7](463356_1_En_7_Chapter.xhtml) 章，我们将探讨黑盒问题类别以及超参数调整是什么。我们将探讨诸如网格搜索和随机搜索等算法，并探讨哪种更有效以及为什么。然后我们将探讨一些技巧，例如从粗到精的优化。我将在本章的大部分内容中介绍贝叶斯优化——如何使用它以及什么是获取函数。我将提供一些提示，例如如何在对数尺度上调整超参数，然后我们将在
    Zalando 数据集上进行超参数调整，以展示它可能的工作方式。在第 [8](463356_1_En_8_Chapter.xhtml) 章，我们将探讨卷积神经网络和循环神经网络。我将向你展示执行卷积和池化的含义，并展示
    TensorFlow 中这两种架构的基本实现。在第 [9](463356_1_En_9_Chapter.xhtml) 章，我将向你透露一个与瑞士应用科学大学苏黎世分校、温特图尔合作进行的实际研究项目，以及深度学习如何以非标准方式使用。最后，在第
    [10](463356_1_En_10_Chapter.xhtml) 章，我将向你展示如何在 Python 中使用单个神经元执行逻辑回归——完全不使用 TensorFlow——从头开始。
- en: I hope you enjoy this book and have fun with it.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望你喜欢这本书，并享受阅读的乐趣。
- en: Acknowledgments
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 致谢
- en: It would be unfair if I did not thank all the people who helped me with this
    book. While writing, I discovered that I did not know anything about book publishing,
    and I also discovered that even when you think you know something well, putting
    it on paper is a completely different story. It is unbelievable how one’s supposedly
    clear mind becomes garbled when putting thoughts on paper. It was one of the most
    difficult things I have done, but it was also one of the most rewarding experiences
    of my life.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我没有感谢所有帮助我完成这本书的人，那将是不公平的。在写作过程中，我发现我对书籍出版一无所知，我还发现，即使你认为你对某件事非常了解，将其写下来却完全是另一回事。一个人在将思想写下来时，原本清晰的大脑变得混乱，这是难以置信的。这是我做过的最困难的事情之一，但也是我一生中最有回报的经历之一。
- en: First, I must thank my beloved wife, Francesca Venturini, who spent countless
    hours at night and on weekends reading the text. Without her, the book would not
    be as clear as it is. I must also thank Celestin Suresh John, who believed in
    my idea and gave me the opportunity to write this book. Aditee Mirashi is the
    most patient editor I have ever met. She was always there to answer all my questions,
    and I had quite a few, and not all of them good. I particularly would like to
    thank Matthew Moodie, who had the patience of reading every single chapter. I
    have never met anyone able to offer so many good suggestions. Thanks, Matt; I
    own you one. Jojo Moolayil had the patience to test every single line of code
    and check the correctness of every explanation. And when I mean every, I really
    mean every. No, really, I mean it. Thank you, Jojo, for your feedback and your
    encouragement. It really meant a lot to me.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我必须感谢我深爱的妻子，弗朗切斯卡·文图里尼，她花费无数个夜晚和周末阅读文本。没有她，这本书就不会像现在这样清晰。我还要感谢塞莱斯廷·苏雷什·约翰，他相信我的想法，并给了我写这本书的机会。阿迪蒂·米拉希是我遇到的最有耐心的编辑。她总是随时准备回答我所有的问题，我有很多问题，而且并非都是好问题。我特别想感谢马修·穆迪，他耐心地阅读了每一章。我从未遇到过能提供如此多良好建议的人。谢谢，马特；我欠你一个人情。乔乔·穆拉伊有耐心测试每一行代码并检查每个解释的正确性。当我说是每一行时，我真的是指每一行。不，真的，我是认真的。感谢乔乔，感谢你的反馈和鼓励。这对我来说意义重大。
- en: Finally, I am infinitely grateful to my beloved daughter, Caterina, for her
    patience when I was writing and for reminding me every day how important it is
    to follow your dreams. And of course I have to thank my parents, that have always
    supported my decisions, whatever they were.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我对我的爱女卡特琳娜无比感激，感谢她在写作时的耐心，以及她每天提醒我追随梦想的重要性。当然，我还要感谢我的父母，他们一直支持我的决定，无论这些决定是什么。
