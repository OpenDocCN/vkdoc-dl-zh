  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'Let’s check the accuracy of the pruned model:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 'The pruned model returns `0.9916` accuracy, the same as the original unpruned
    model. Also, the pruned model actually shrinks its layers deleting unnecessary
    weights. The pruned model is less than the original one, and let’s examine the
    difference between them:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Table [6-1](#Tab1) compares original model and pruned one.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: Table 6-1
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: Original and pruned model comparison
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: '| Layer | OriginalOutput Shape | OriginalSize | PrunedOutput Shape | PrunedSize
    |'
  id: totrans-64
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- | --- |'
  id: totrans-65
  prefs: []
  type: TYPE_TB
- en: '| `Conv2d-1` | `[16,24,24]` | `416` | `[14,24,24]` | `364` |'
  id: totrans-66
  prefs: []
  type: TYPE_TB
- en: '| `Conv2d-2` | `[32,20,20]` | `12,832` | `[32,20,20]` | `11,232` |'
  id: totrans-67
  prefs: []
  type: TYPE_TB
- en: '| `Conv2d-3` | `[32,6,6]` | `25,632` | `[30,6,6]` | `24,030` |'
  id: totrans-68
  prefs: []
  type: TYPE_TB
- en: '| `Linear-4` | `[64]` | `18,496` | `[61]` | `16,531` |'
  id: totrans-69
  prefs: []
  type: TYPE_TB
- en: '| `Linear-5` | `[32]` | `2,080` | `[25]` | `1,550` |'
  id: totrans-70
  prefs: []
  type: TYPE_TB
- en: '| `Linear-6` | `[10]` | `330` | `[10]` | `260` |'
  id: totrans-71
  prefs: []
  type: TYPE_TB
- en: As shown in Table [6-1](#Tab1), pruned model shrinks `Conv2d-1`, `Conv2d-3`,
    `Linear-4`, and `Linear-5` layers. And this is the primary goal of the pruning
    algorithm, which eliminates redundancy from the neural network. The earlier example
    illustrates how we can prune a pre-trained model using NNI. Let’s move forward
    and study pruning algorithms in more detail.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: One-Shot Pruners
  id: totrans-73
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'One-shot pruning algorithms prune weights only once based on a specific metric.
    Usually, pruned weights are close to zero, and pruner suggests that their removal
    will not impact the model’s accuracy. One-shot pruners act the following way:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: Pruner accepts a model and selects active weights and the weights to be pruned.
    As a result, the pruner returns a model and a binary mask, where 1 means active
    weight and 0 means weight to be pruned.
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Original model is speeded up by pruning redundant weights resulting a compressed
    model.
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Fine-tuning algorithm retrains the compressed model to adjust its weights.
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This pruner flow algorithm is depicted in Figure [6-3](#Fig3).
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_6_Chapter/526245_1_En_6_Fig3_HTML.png)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
- en: Figure 6-3
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: One-shot pruning
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: 'We can define the main steps to implement one-shot pruning algorithms using
    NNI the following way:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: Load a pre-trained model
  id: totrans-83
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Initialize pruner
  id: totrans-84
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Compress original model
  id: totrans-85
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Retrain compressed model
  id: totrans-86
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Save compressed model
  id: totrans-87
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Load and speed up compressed model
  id: totrans-88
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Step 1**. Model loading is a native PyTorch operation:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  id: totrans-90
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: '**Step 2**. To initialize the pruner, we must specify the pruner configuration
    (we will study the pruner configuration in the next section). Here is an example
    of pruner initialization:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: '**Step 3**. Pruner compresses original model applying its logic to reduce model
    weights:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  id: totrans-94
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: '**Step 4**. Compressed model is being retrained according to the same training
    algorithm as the original one:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  id: totrans-96
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: '**Step 5**. Compressed model is stored using `pruner.export_model` method:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: '**Step 6**. Saved model is loaded and wrapped by `nni.compression.pytorch.ModelSpeedup`
    class:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  id: totrans-100
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: And that’s it. The compressed model is ready to use! Let’s create a helper script
    that will apply steps 2–6 we defined earlier. Listing [6-4](#PC24) applies a pruning
    algorithm and returns a compressed model.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: 'Importing modules:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: '`oneshot_prune` method accepts the following parameters:'
