- en: Great! We have significantly compressed the original LeNet model more than twice
    without losing accuracy.
  prefs: []
  type: TYPE_NORMAL
- en: Minimal Size Above Accuracy Threshold Scenario
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Another case is to compress the model as much as possible while staying above
    the specified accuracy threshold. Figure [6-9](#Fig9) illustrates how this can
    be done using iterative pruning.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_6_Chapter/526245_1_En_6_Fig9_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6-9
  prefs: []
  type: TYPE_NORMAL
- en: Minimal size above specified accuracy threshold scenario
  prefs: []
  type: TYPE_NORMAL
- en: Listing [6-9](#PC65) handles this scenario to find the minimal compressed LeNet
    model that gives > `0.98` accuracy (original accuracy is `0.991`) using iterative
    `AGPPruner`.
  prefs: []
  type: TYPE_NORMAL
