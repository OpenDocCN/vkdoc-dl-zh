  prefs: []
  type: TYPE_NORMAL
- en: '`PtLeNetModel` provides familiar model design:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Next, we add two helper methods that we will need in the future: `count_total_weights`
    and `count_total_weights`. `count_nonzero_weights` is a helper method that counts
    the number of zeros in the neural network’s weights, and `count_total_weights`
    counts the total number of neural network weights.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
