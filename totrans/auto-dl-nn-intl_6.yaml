- en: FPGM (Filter Pruning via Geometric Median) Pruner is a one-shot pruner that
    prunes filters with the smallest geometric median. For more details, please refer
    to the original paper “Filter Pruning via Geometric Median for Deep Convolutional
    Neural Networks Acceleration” ([`https://arxiv.org/pdf/1811.00250.pdf`](https://arxiv.org/pdf/1811.00250.pdf)).
