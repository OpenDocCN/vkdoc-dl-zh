  prefs: []
  type: TYPE_NORMAL
- en: '[PRE56]'
  prefs: []
  type: TYPE_PRE
- en: Now we need to define a method that calculates the model’s score. All models
    whose size exceeds 30,000 will have a 0 score because we do not accept models
    larger than the specified size.
  prefs: []
  type: TYPE_NORMAL
