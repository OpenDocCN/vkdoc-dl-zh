    to *L*[*1*]*-norm* and *L*[*2*]*-norm*, respectively. For more details, please
    refer to the original paper “Pruning Filters for Efficient ConvNets” ([`https://arxiv.org/pdf/1608.08710.pdf`](https://arxiv.org/pdf/1608.08710.pdf)).
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
- en: 'L1Norm and L2Norm pruners support `Conv2d`, `Linear` as a layer for pruning
    operation. `L1NormPruner` and `L2NormPruner` are applied the following way:'
  id: totrans-208
