- en: Figure 6-2
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: LeNet retraining progress
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: Figure [6-2](#Fig2) illustrates fine-tuning of the compressed model. Original
    trained LeNet model has 59,786 nonzero weights, and compressed LeNetModel has
    12,107 nonzero weights only. At the beginning of the retraining, the compressed
    model is less accurate than the original model. But after 10 training epochs,
    the compressed model achieves the same accuracy as the original model, having
    only 12,107 active weights out of 59,780\. Obviously, the original LeNet model
    was redundant and could be replaced by pruned one.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: 'Finally, let’s save the pruned model for future usage:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  id: totrans-50
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: NNI provides a special wrapper that allows loading pruned models `nni.compression.pytorch.ModelSpeedup`
    and use them after. In Listing [6-3](#PC14), we load pruned LeNet model and analyze
    its characteristics.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: '(Please install the following package to run this script: `torchsummary`.)'
