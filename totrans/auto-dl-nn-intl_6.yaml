  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'Since the compressed model is fine-tuned, let’s visualize retraining progress:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Visualization result is shown in Figure [6-2](#Fig2).
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_6_Chapter/526245_1_En_6_Fig2_HTML.jpg)'
  id: totrans-45
