  zh: '[PRE28]'
- en: '**Step 6**. Loading and speeding up compressed model:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE29]'
  id: totrans-121
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: Fine. Since we know how to apply one-shot pruning algorithms, let’s go further
    and study some of them.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
- en: Pruner Configuration
  id: totrans-123
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Each pruner accepts configuration, which specifies its internal logic. Pruner
    configuration is a `List` of `Dict` entries, and each entry specifies a pruning
    strategy applied to a specified layer set. Table [6-2](#Tab2) describes pruner
    configuration parameters.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
- en: Table 6-2
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
- en: Pruner configuration
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
- en: '| Key | Description |'
  id: totrans-127
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  id: totrans-128
  prefs: []
  type: TYPE_TB
- en: '| `sparsity` | Specifies the sparsity for each layer in this configuration
    entry to be compressed. If `sparsity = 0.8`, then 80% of layer weights will be
    pruned, and 20% will be left active |'
  id: totrans-129
  prefs: []
  type: TYPE_TB
- en: '| `op_types` | Specifies what types of operations to compress. `''default''`
    means following the algorithm’s default setting. All supported module types for
    PyTorch are defined package file `nni/compression/pytorch/default_layers.py:``''Conv1d'',
    ''Conv2d'', ''Conv3d'', ''ConvTranspose1d'', ''ConvTranspose2d'', ''ConvTranspose3d'',
    ''Linear'', ''Bilinear'',   ''PReLU'', ''Embedding'', ''EmbeddingBag''` |'
  id: totrans-130
  prefs: []
  type: TYPE_TB
- en: '| `op_names` | Specifies names of operations to be compressed. If this field
    is omitted, operations will not be filtered by it |'
  id: totrans-131
  prefs: []
  type: TYPE_TB
- en: '| `op_partial_names` | Operation partial names to be compressed. If `op_partial_names
    = ''fc_''`, then all layers with the following mask `''fc_*''` will be pruned
    |'
  id: totrans-132
  prefs: []
  type: TYPE_TB
- en: '| `exclude` | Default is False. If this field is True, it means the operations
    with specified types and names will be excluded from the compression |'
  id: totrans-133
  prefs: []
  type: TYPE_TB
- en: 'Here is an example of the pruning configuration of a one-shot pruner applied
    to the LeNet model:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE30]'
  id: totrans-135
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: 'If you don’t want to specify a special pruning strategy for each layer type,
    then you can use the following configuration:'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE31]'
  id: totrans-137
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: Level Pruner
  id: totrans-138
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Level pruner is a straightforward one-shot pruner. Sparsity level means prune
    ratio, that is, `sparsity=0.7` means that 70% of model weight parameters will
    be pruned. Level pruner sorts the weights in the specified layer by their absolute
    values. And then mask to zero the smallest magnitude weights until the desired
    sparsity level is reached.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
- en: 'Level pruner is applied the following way:'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE32]'
  id: totrans-141
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: Let’s apply `LevelPruner` to prune the LeNet model using Listing [6-5](#PC34).
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
- en: 'Importing modules:'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE33]'
  id: totrans-144
