- en: 14. An Introduction to Reinforcement Learning
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 14. 强化学习简介
- en: '**Reinforcement learning** (RL) is an area of machine learning that focuses
    on teaching intelligent agents how to take actions in an environment in order
    to maximize cumulative reward. **Cumulative reward** in RL is the sum of all rewards
    as a function of the number of training steps.'
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: '**强化学习**（RL）是机器学习的一个领域，它专注于教授智能体如何在环境中采取行动以最大化累积奖励。在RL中，“累积奖励”是所有奖励的总和，作为训练步骤数量的函数。'
- en: We train machine learning (ML) models by using rewards and punishments. When
    an agent makes a correct decision, we reward it with a positive point. With a
    wrong decision, we punish it with a negative point. From these responses, the
    model learns how to react in that particular situation (or environment). So the
    idea behind RL is that an agent learns from an environment by interacting with
    it and receiving rewards (and punishments) for performing actions.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过使用奖励和惩罚来训练机器学习（ML）模型。当智能体做出正确决定时，我们用正点奖励它。对于错误的决定，我们用负点惩罚它。从这些反应中，模型学习如何在该特定情况（或环境）中做出反应。所以RL背后的想法是，智能体通过与环境的互动并因执行行动而获得奖励（和惩罚）来从环境中学习。
- en: Learning from interaction with the environment comes from our natural experiences.
    Imagine you’re a child in a living room. You see a fireplace and you approach
    it. It’s warm, it’s positive, and you feel good. You understand that fire is a
    positive thing. But then you touch the fire. Ouch! It burns your hand. From your
    interactions, you learn that fire is positive when you are a sufficient distance
    away because it produces warmth. But get too close and it burns. So humans learn
    through interaction with their environment.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 从与环境的互动中学习源于我们的自然经验。想象你是一个客厅里的孩子。你看到一个壁炉，你走近它。它很温暖，很积极，你感觉很好。你理解火是一个积极的事物。但然后你触摸了火。哎呦！它烧伤了你的手。从你的互动中，你了解到当你保持足够距离时，火是积极的，因为它产生温暖。但太靠近了就会烧伤。所以人类通过与环境互动来学习。
- en: RL is just a computational approach of learning from action. If this scenario
    was a RL experiment, the agent would get a positive reward of +1 for getting warm
    by the fire, but a negative reward of –1 for getting burnt by it.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: RL只是从行动中学习的一种计算方法。如果这个场景是一个RL实验，智能体会因为靠近火而获得+1的正奖励，但会因为被烧伤而获得-1的负奖励。
- en: RL is one of three basic ML paradigms alongside supervised learning and unsupervised
    learning. Supervised learning models learn from a labeled dataset with guidance.
    Unsupervised learning models learn from unlabeled data without guidance. RL models
    learn by trial and error when an agent interacts with an environment, performs
    actions, and is rewarded if the action is correct or punished if it is incorrect.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: RL是三种基本ML范式之一，与监督学习和无监督学习并列。监督学习模型在有指导的情况下从标记数据集中学习。无监督学习模型在没有指导的情况下从未标记数据中学习。RL模型在智能体与环境交互、执行行动并因行动正确而获得奖励或因行动错误而受到惩罚时通过试错来学习。
- en: The three components of reinforcement learning are agent, environment, and actions.
    An *environment* is a problem to be solved. An *agent* is an algorithm that interacts
    with the environment to solve a problem. *Actions* are an agent’s interactions
    with the environment.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习的三个组成部分是智能体、环境和行动。一个*环境*是要解决的问题。一个*智能体*是与环境交互以解决问题的算法。*行动*是智能体与环境的交互。
- en: Laconically, the agent receives observations from an environment and takes actions.
    The environment uses rewards or punishments as signals for positive or negative
    behavior based on the actions taken by the agent. So the agent learns how to solve
    a problem by trial and error interactions with the environment.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，智能体从环境中接收观察结果并采取行动。环境使用奖励或惩罚作为信号，根据智能体采取的行动来表示积极或消极的行为。因此，智能体通过与环境进行试错互动来学习如何解决问题。
- en: Although the designer sets the reward policy, they give the learning model no
    hints or suggestions on how to solve the problem. The model learns *on its own*
    how to maximize reward through trial and error interactions between the agent
    and environment.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管设计者设置了奖励策略，但他们没有给学习模型任何关于如何解决问题的提示或建议。模型通过智能体与环境之间的试错互动来“自行”学习如何最大化奖励。
- en: A **reward policy** is the set of rules that maximizes the reward function for
    a given reinforcement learning environment. So a *reward function* stipulates
    what the designer wants the agent to accomplish.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '**奖励策略**是一组规则，用于最大化给定强化学习环境的奖励函数。因此，*奖励函数*规定了设计者希望智能体完成的目标。'
- en: Challenges of Reinforcement Learning
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 强化学习的挑战
- en: The main challenge of RL is *creating the environment*. Creating an effective
    environment has three issues.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习的主要挑战是**创建环境**。创建一个有效的环境有三个问题。
- en: First, the environment is highly dependent on the problem to be solved. So it
    is contextually specific. The context (of the problem domain) drives design of
    each reinforcement learning environment to solve a specific set of tasks. Simply,
    a new environment must be designed for each new RL task. For instance, an environment
    for a self-driving car is not transferable to one for a self-flying drone. In
    contrast, a supervised learning classification model can be reused by other classification
    tasks.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，环境高度依赖于要解决的问题。因此，它是上下文特定的。问题域的上下文驱动着每个强化学习环境的构建，以解决特定的一组任务。简单来说，每个新的强化学习任务都需要设计一个新的环境。例如，自动驾驶汽车的环境不能转移到无人机的环境中。相比之下，监督学习分类模型可以被其他分类任务重用。
- en: Second, the reward policy is finite and structured. Environments for chess,
    Go, and Atari games are relatively simple. No matter how complex these games might
    appear to be, their rules are structured and finite. Even an extremely complex
    environment for a self-driving car is finite and structured. Although such an
    environment must deal with many unknowns, its reward policy is created by designers.
    Even the most brilliant designers on the planet can’t create an infinite reward
    policy. For example, a self-driving car may be designed to work well in a variety
    of conditions, but it may not work in a different situation than that in which
    it was designed. A self-driving car may work when traveling a specific route,
    but what if construction calls for a detour but the detour signage has yet to
    be posted?
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 其次，奖励策略是有限的且结构化的。国际象棋、围棋和Atari游戏的环境相对简单。无论这些游戏可能看起来多么复杂，它们的规则都是结构化和有限的。即使是自动驾驶汽车的极其复杂的环境也是有限和结构化的。尽管这样的环境必须处理许多未知因素，但其奖励策略是由设计者创建的。即使是最聪明的设计师也无法创建无限的奖励策略。例如，自动驾驶汽车可能被设计成在各种条件下都能良好工作，但它可能无法适应与设计时不同的环境。自动驾驶汽车可能在行驶特定路线时工作，但如果需要绕行，而绕行标志尚未设置，会发生什么？
- en: Third, the room for error where safety is a concern is pretty much zero. RL
    experiments in the healthcare industry come to mind. Such models must be tested
    and tweaked in many stages before they are ready for even simple testing. Transferring
    the model out of the testing phase into to the real world is where the real work
    begins.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 第三，在安全是关注点的地方，错误的空间几乎为零。医疗保健行业的强化学习实验就值得考虑。这些模型必须在许多阶段进行测试和调整，才能准备好进行简单的测试。将模型从测试阶段转移到现实世界是真正工作的开始。
- en: Scaling and tweaking the neural network (or other ML models) controlling the
    agent is another challenge. The only way to communicate with the network is through
    its system of rewards and penalties. With this single conduit comes the possibility
    of catastrophic forgetting (or catastrophic interference). **Catastrophic forgetting**
    is the tendency of a neural network to completely and abruptly forget previously
    learned information upon learning new information. So when a neural network acquires
    new information, some of the old information is erased from the network. Catastrophic
    forgetting occurs because many of the weights (where information is stored) of
    the neural network are changed when new information is learned, which makes it
    less likely that prior knowledge is kept intact. During sequential learning, new
    inputs coming into a neural network can erase original input weights.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 缩放和调整控制智能体的神经网络（或其他机器学习模型）是另一个挑战。与网络通信的唯一方式是通过其奖励和惩罚系统。通过这个单一的通道，可能出现灾难性遗忘（或灾难性干扰）。**灾难性遗忘**是指神经网络在学习新信息时完全突然忘记之前学习的信息的倾向。因此，当神经网络获取新信息时，一些旧信息会被从网络中删除。灾难性遗忘发生是因为在学习新信息时，神经网络中许多（存储信息的）权重发生了变化，这使得保留先验知识变得不太可能。在顺序学习中，进入神经网络的新输入可能会删除原始输入权重。
- en: Another challenge is reaching a local optimum. A **local optimum** is the best
    solution to a problem within a small neighborhood of possible solutions. In contrast,
    a **global optimum** is the optimal solution when *every* possible solution is
    considered. A local optimum would be walking when the goal is to learn how to
    move (walk, run, and jump). In this case, the agent performs the task in a suboptimal
    (locally optimal) way, but not in an (globally) optimal way.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个挑战是达到局部最优。**局部最优**是在可能解的小邻域内问题的最佳解决方案。相比之下，**全局最优**是在考虑了**所有**可能解时的最优解决方案。当目标是学习如何移动（行走、跑步和跳跃）时，局部最优将是行走。在这种情况下，智能体以次优（局部最优）的方式完成任务，但不是（全局）最优的方式。
- en: A final challenge is securing talented designers. A competent data scientist
    may not be hard to find, but the average salary can be well over $150,000 per
    year. Moreover, it may be difficult to find one with experience in creating a
    specific type of environment because environments are contextually specific.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一个挑战是吸引有才华的设计师。找到一位合格的数据科学家可能不难，但平均年薪可能超过 150,000 美元。此外，可能很难找到一位有创建特定类型环境经验的，因为环境是上下文特定的。
- en: 'Notebooks for chapters are located at the following URL:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 各章节的笔记本位于以下 URL：
- en: '[`https://github.com/paperd/deep-learning-models`](https://github.com/paperd/deep-learning-models)'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '[`https://github.com/paperd/deep-learning-models`](https://github.com/paperd/deep-learning-models)'
- en: We demonstrate reinforcement learning with a code experiment using a *very simple*
    RL environment. Begin setting up the Colab ecosystem by importing the main TensorFlow
    library and instantiating the GPU.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过使用一个**非常简单**的强化学习环境进行代码实验来展示强化学习。通过导入主 TensorFlow 库并实例化 GPU 来开始设置 Colab
    生态系统。
- en: Import the TensorFlow Library
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 导入 TensorFlow 库
- en: 'Import the library and alias it as **tf**:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 导入库并将其别名为 **tf**：
- en: '[PRE0]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Aliasing the TensorFlow library as tf is common practice.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 将 TensorFlow 库别名为 tf 是常见做法。
- en: GPU Hardware Accelerator
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: GPU 硬件加速器
- en: 'As a convenience, we provide the steps to enable the GPU in a Colab notebook:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 为了方便，我们提供了在 Colab 笔记本中启用 GPU 的步骤：
- en: Click *Runtime* in the top-left menu.
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在右上角菜单中点击**运行时**。
- en: Click *Change runtime type* from the drop-down menu.
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从下拉菜单中选择**更改运行时类型**。
- en: Choose *GPU* from the *Hardware accelerator* drop-down menu.
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从**硬件加速器**下拉菜单中选择**GPU**。
- en: Click *Save*.
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击**保存**。
- en: 'Verify that the GPU is active:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 验证 GPU 是否处于活动状态：
- en: '[PRE1]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: If ‘/device:GPU:0’ is displayed, the GPU is active. If ‘..’ is displayed, the
    regular CPU is active.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 如果显示 `/device:GPU:0`，则 GPU 处于活动状态。如果显示 `..`，则常规 CPU 处于活动状态。
- en: Note
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 备注
- en: If you get the error `NAME ‘TF’ IS NOT DEFINED`, re-execute the code to import
    the TensorFlow library!
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 如果出现错误 `NAME ‘TF’ IS NOT DEFINED`，请重新执行代码以导入 TensorFlow 库！
- en: Reinforcement Learning Experiment
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 强化学习实验
- en: We demonstrate a simple RL experiment with Cart-Pole. *Cart-Pole* is a game
    in which a pole is attached by an unactuated joint to a cart that moves along
    a frictionless track. The goal of the game is to keep the pole vertically upright.
    The starting state is randomly initialized between –0.05 and 0.05\. The starting
    state includes the cart position, cart velocity, pole angle, and pole velocity.
    The pole velocity is measured at the tip of the pole. The Cart-Pole game is in
    2D space. So the cart can only move left and right to balance the pole.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过 Cart-Pole 进行一个简单的强化学习实验。*Cart-Pole* 是一个杆通过非驱动关节连接到小车，小车在无摩擦轨道上移动的游戏。游戏的目标是保持杆垂直竖立。起始状态在
    -0.05 和 0.05 之间随机初始化。起始状态包括小车位置、小车速度、杆角度和杆速度。杆速度是在杆尖测量的。Cart-Pole 游戏在 2D 空间中。因此，小车只能左右移动以平衡杆。
- en: The goal of the experiment is to teach an agent how to balance a pole on a cart
    with a RL model. We can create our own environment to train the agent, but we
    don’t have to do this because environments to tackle this simple pole balancing
    problem already exist. We use an environment from OpenAI Gym. *OpenAI Gym* is
    a toolkit that provides a wide variety of simulated environments including Atari
    games, board games, and (2D and 3D) physical simulations.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 实验的目的是通过强化学习模型教会智能体如何在车上平衡杆。我们可以创建自己的环境来训练智能体，但不必这样做，因为解决这个简单的杆平衡问题的环境已经存在。我们使用
    OpenAI Gym 的环境。*OpenAI Gym* 是一个工具包，提供了包括 Atari 游戏、棋类游戏和（2D 和 3D）物理模拟在内的各种模拟环境。
- en: Install and Configure OpenAI Gym on Colab
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在 Colab 上安装和配置 OpenAI Gym
- en: 'Most of the requirements of Python packages (for OpenAI Gym) are already fulfilled
    on Colab. But we still need to install dependencies:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 对于 OpenAI Gym 的 Python 包的大部分要求已经在 Colab 上得到满足。但我们仍然需要安装依赖项：
- en: '[PRE2]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: We need gym, opengl, and xvfb dependencies to enable the Python libraries for
    OpenAI Gym, graphics libraries for visualizations, and a display server for rendering
    graphics. *Gym* is an open source interface for RL tasks. It supports teaching
    agents everything from walking to playing games like Pong or Pinball.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要gym、opengl和xvfb依赖项来启用Python库中的OpenAI Gym、用于可视化的图形库以及用于渲染图形的显示服务器。*Gym* 是一个开源接口，用于RL任务。它支持教授代理从行走到玩Pong或弹球等游戏的一切。
- en: '*OpenGL* is a graphics library supported by multiple platforms including Windows,
    Linux, and MacOS. *Xvfb* (X virtual framebuffer) is a display server implementing
    the X11 display server protocol. It runs in memory and does not require a physical
    display.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '*OpenGL* 是一个支持多个平台（包括Windows、Linux和MacOS）的图形库。*Xvfb*（X虚拟帧缓冲区）是一个实现X11显示服务器协议的显示服务器。它在内存中运行，不需要物理显示。'
- en: 'We also need to install dependencies for displaying output rendered from the
    environment:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还需要安装用于显示从环境中渲染输出的依赖项：
- en: '[PRE3]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: The *pyvirtualdisplay* library enables virtual display. The *piglet* library
    provides an object-oriented API for the creation of games and other multimedia
    applications.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '*pyvirtualdisplay* 库使虚拟显示成为可能。*piglet* 库提供了一个面向对象的API，用于创建游戏和其他多媒体应用程序。'
- en: Import Libraries
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 导入库
- en: 'Import and activate the virtual display library:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 导入并激活虚拟显示库：
- en: '[PRE4]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: We used 1400 × 900 for our virtual display. The size we chose is arbitrary.
    Feel free to experiment with the size of the display.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我们为虚拟显示选择了1400 × 900。我们选择的大小是任意的。请随意尝试不同的显示尺寸。
- en: 'Import the *gym* library:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 导入 *gym* 库：
- en: '[PRE5]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: The `gym` library is a collection of environments designed for testing and developing
    RL algorithms. It saves us from having to create complicated environments on our
    own.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '`gym` 库是一系列为测试和开发RL算法而设计的环境。它使我们免于自己创建复杂的环境。'
- en: Create an Environment
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建环境
- en: 'Create the *Cart-Pole* environment:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 创建 *Cart-Pole* 环境：
- en: '[PRE6]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: The Cart-Pole environment is a 2D simulation that accelerates a cart left or
    right to balance a pole placed on top of it. A pole is attached by an unactuated
    joint to a cart that moves along a frictionless track. The system is controlled
    by applying a force of +1 or –1 to the cart. The pendulum (or pole) starts upright,
    and the goal is to prevent it from falling over.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: Cart-Pole 环境是一个2D模拟，它通过加速小车向左或向右移动来平衡放置在其顶部的小杆。一根杆通过非驱动关节连接到沿无摩擦轨道移动的小车。系统通过向小车施加+1或-1的力来控制。摆锤（或杆）开始时是竖直的，目标是防止它倒下。
- en: 'Initialize the environment:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 初始化环境：
- en: '[PRE7]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Initialize the environment with the *reset* method. After it initializes, the
    method returns an observation.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 *reset* 方法初始化环境。初始化后，该方法返回一个观察值。
- en: Observations vary depending on the environment. In this case, an observation
    is a 1D NumPy array composed of four floats that represent the cart’s horizontal
    position, velocity, angle of the pole (0 = vertical), and angular velocity. Any
    positive number indicates movement to the *right* for angle of the pole and angular
    velocity. Any negative number indicates movement to the *left*. For horizontal
    position, a negative number means that the pole is *tilting left* and a positive
    number *tilting right*. For velocity, a positive number means the cart is *speeding
    up* and a negative number *slowing down*.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 观察值取决于环境。在这种情况下，一个观察值是一个由四个浮点数组成的1D NumPy数组，这些浮点数代表小车的水平位置、速度、杆的角度（0 = 垂直）和角速度。任何正数表示杆的角度和角速度向
    *右* 移动。任何负数表示向 *左* 移动。对于水平位置，负数表示杆 *向左倾斜*，正数表示 *向右倾斜*。对于速度，正数表示小车 *加速*，负数表示 *减速*。
- en: 'The initial rendering state (with seed of 0) produces the 1D NumPy array:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 初始渲染状态（种子为0）生成一个1D NumPy数组：
- en: array([-0.04456399, 0.04653909, 0.01326909, -0.02099827])
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: array([-0.04456399, 0.04653909, 0.01326909, -0.02099827])
- en: So the initial state of the pole is not completely horizontal (obs[0] is slightly
    negative), its velocity is slowly increasing (obs[1] is slightly positive), the
    pole is angled slightly to the right (obs[2] is slightly positive), and the angular
    velocity is going toward the left (obs[3] is slightly negative).
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，杆的初始状态并非完全水平（obs[0]略为负值），其速度缓慢增加（obs[1]略为正值），杆略微向右倾斜（obs[2]略为正值），角速度向左移动（obs[3]略为负值）。
- en: 'An environment can be visualized by calling its *render* method, and we can
    pick the rendering mode (the rendering options depend on the environment). Display
    the rendering environment at its initial state:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 可以通过调用其 *render* 方法来可视化环境，我们可以选择渲染模式（渲染选项取决于环境）。显示初始状态下的渲染环境：
- en: '[PRE8]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: In our case, the env.render() command displays *True*, which is the initial
    state because we just initialized it as such.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的情况下，env.render() 命令显示 *True*，这是初始状态，因为我们刚刚这样初始化它。
- en: In RL, we must render (initialize) the environment to its beginning state as
    a precursor to training. The reason is that we want to begin the environment in
    its initial state to give no clues to the agent. We want the agent to learn how
    to solve the task from scratch.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在强化学习中，我们必须将环境渲染（初始化）到其初始状态，作为训练的前奏。原因是我们要从初始状态开始环境，不给代理任何线索。我们希望代理能够从头开始学习如何解决问题。
- en: Display the Rendering from the Environment
  id: totrans-69
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 显示环境渲染结果
- en: 'Set mode=‘rgb_array’ to get an image of the environment as a NumPy array:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 设置 mode=‘rgb_array’ 以获取环境图像作为 NumPy 数组：
- en: '[PRE9]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: The image shape is rendered from the Cart-Pole environment.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 图像形状是从 Cart-Pole 环境渲染的。
- en: Create a function to display the rendered image of the pole position on the
    cart from the environment as configured in Listing [14-1](#PC11).
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数来显示环境配置如列表 [14-1](#PC11) 中所示的环境渲染的极点位置图像。
- en: '[PRE10]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'Display:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 显示：
- en: '[PRE11]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: We see the rendering from the environment in its initialized state. So the pole
    is very nearly vertical on the cart, but tilted slightly to the right.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 我们看到环境在初始化状态下的渲染结果。所以极点在车上几乎是垂直的，但略微向右倾斜。
- en: Display Actions
  id: totrans-78
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 显示动作
- en: Let’s see how to interact with the environment we created. The agent needs to
    select an action from an action space. An **action space** is the set of possible
    actions that an agent can take.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看如何与我们所创建的环境交互。代理需要从行为空间中选择一个动作。**行为空间**是代理可以采取的可能行为的集合。
- en: 'Ask the environment about possible actions:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 询问环境关于可能动作的信息：
- en: '[PRE12]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: '*Discrete(2)* means that the possible actions for the Cart-Pole environment
    are integers 0 and 1\. Accelerating left is 0 and accelerating right is 1\. So
    the environment’s action space has two possible actions, which means that the
    agent can accelerate toward the left or toward the right. Of course, other environments
    may have additional discrete actions or other kinds of actions like continuous
    ones.'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: '*Discrete(2)* 表示 Cart-Pole 环境的可能动作是整数 0 和 1。向左加速是 0，向右加速是 1。所以环境的行为空间有两个可能的行为，这意味着代理可以加速向左或向右。当然，其他环境可能有额外的离散动作或其他类型的动作，如连续动作。'
- en: Note
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: The Cart-Pole environment is the simplest one that can be created! Real-world
    reinforcement learning environments have enormous action spaces containing many
    possible actions.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: Cart-Pole 环境是可以创建的最简单的一个！现实世界的强化学习环境具有巨大的动作空间，包含许多可能的行为。
- en: 'Reset the environment and see how the pole is leaning by looking at its angle:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 重置环境并查看极点的倾斜角度：
- en: '[PRE13]'
  id: totrans-86
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: The third position (index of 2) in the *obs* array is the angle of the pole.
    If the value is below 0, the pole angles to the left. If above 0, it angles to
    the right. The value is barely over zero. So the pole is tilted slightly toward
    the right because obs[2] is > 0.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 在 *obs* 数组的第三个位置（索引为2）是极点的角度。如果值小于0，极点向左倾斜。如果大于0，则向右倾斜。这个值几乎超过零。所以极点略微向右倾斜，因为
    obs[2] 大于0。
- en: Note
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: We didn’t have to reset the environment again because we did so in the previous
    section. But an environment should be reset at the beginning of an experiment
    to ensure that the agent learns how to solve the task from scratch (with no clues).
    So we did this again just to instill a good RL habit.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不需要再次重置环境，因为我们已经在上一节中这样做过了。但是，应该在实验开始时重置环境，以确保代理能够从头开始学习如何解决问题（没有任何线索）。所以我们再次这样做，只是为了培养良好的强化学习习惯。
- en: 'As we already know, the Cart-Pole environment only has two actions, left (0)
    and right (1). Let’s accelerate the cart toward the right by setting *action=1*:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所知，Cart-Pole 环境只有两个动作，左（0）和右（1）。让我们通过设置 *action=1* 来加速小车向右：
- en: '[PRE14]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: The *step* method executes the given action and returns four values. *obs* is
    the new observation. The cart is now moving toward the right because obs[1] >
    0\. The pole is still tilted toward the right because obs[2] > 0, but its angular
    velocity is now negative because obs[3] < 0\. So it will likely be tilted toward
    the left after the next step.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: '*step*方法执行给定的动作并返回四个值。*obs*是新的观察。由于obs[1] > 0，小车现在向右移动。杆仍然向右倾斜，因为obs[2] > 0，但它的角速度现在是负的，因为obs[3]
    < 0。因此，在下一步后它可能会向左倾斜。'
- en: In this simplest of environments, *reward* is always 1.0 at every step. So the
    goal is to keep the episode running as long as possible. The *done* value is True
    when the episode is over. The episode is over if the pole tilts too much or goes
    off the screen or we win the game. The *info* value provides extra information.
    In this case, there is no extra information. Once we finish using an environment,
    call the *close* method to free resources.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个最简单的环境中，*奖励*在每一步都是1.0。因此，目标是尽可能长时间地保持游戏进行。当游戏结束时，*done*值为True。如果杆倾斜过多或超出屏幕或我们赢得游戏，则游戏结束。*info*值提供额外信息。在这种情况下，没有额外信息。一旦我们完成对环境的操作，调用*close*方法来释放资源。
- en: Note
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: It is not necessary to free resources because our experiment is so simple. But
    it is a good idea to close the environment upon task completion for more complex
    RL tasks as they tend to consume a lot of computer resources.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们的实验非常简单，因此没有必要释放资源。但是，对于更复杂的RL任务来说，这是一个好主意，因为它们往往会消耗大量的计算机资源。
- en: 'The environment tells the agent each new observation, the reward, when the
    game is over, and information it got during the last step. Display the pole position:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 环境告诉代理每个新的观察、奖励、游戏结束时的情况以及它在最后一步获得的信息。显示杆的位置：
- en: '[PRE15]'
  id: totrans-97
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: The pole is still tilted toward the right.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 杆仍然向右倾斜。
- en: 'Display the reward that the agent received in the last step:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 显示代理在最后一步收到的奖励：
- en: '[PRE16]'
  id: totrans-100
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Of course, the reward is 1.0 because it is always 1.0 in this simplest of experiments.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，奖励是1.0，因为在这个最简单的实验中它始终是1.0。
- en: 'Test if the game is over:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 测试游戏是否结束：
- en: '[PRE17]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Since the value is *False*, the game is not over. If the output is *True*, the
    task is completed so the game is over.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 由于值为*False*，游戏尚未结束。如果输出为*True*，则任务完成，游戏结束。
- en: An **episode** is the sequence of steps from the moment the environment is reset
    until it is done. At the end of an episode (i.e., when the step method returns
    done=True), reset the environment before continuing to use it.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: '*Episode*是从环境重置的那一刻开始直到完成的步骤序列。在游戏结束时（即当step方法返回done=True时），在继续使用之前重置环境。'
- en: 'To automatically reset when an episode is over:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 为了在游戏结束时自动重置：
- en: '[PRE18]'
  id: totrans-107
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Note
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: We just show you the preceding code for informational purposes. We show you
    when to use env.reset() in the context of the RL experiment.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 我们仅为了信息目的向您展示了前面的代码。我们在RL实验的上下文中向您展示了何时使用env.reset()。
- en: Simple Neural Network Reward Policy
  id: totrans-110
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 简单神经网络奖励策略
- en: How can we make the pole remain upright? We need to define a reward policy.
    In action, a reward policy is simply the strategy the agent uses to select an
    action at each step. The agent can use all past actions and observations to decide
    what to do.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 我们如何让杆保持直立？我们需要定义一个奖励策略。在行动中，奖励策略是代理在每个步骤选择动作的策略。代理可以使用所有过去的行为和观察来决定下一步该做什么。
- en: Let’s create a neural network that takes observations as inputs and outputs
    the action to take for each observation. To choose an action, our network estimates
    a probability for each action and randomly selects an action based on the estimated
    probabilities. In the case of the Cart-Pole environment, there are just two possible
    actions (left and right). So we only need one output neuron that outputs the probability
    *p* of action 0 (left) and the probability *1* – *p* of action 1 (right).
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们创建一个神经网络，它以观察作为输入，并为每个观察输出要采取的动作。为了选择一个动作，我们的网络估计每个动作的概率，并根据估计的概率随机选择一个动作。在Cart-Pole环境中，只有两种可能的行为（左和右）。因此，我们只需要一个输出神经元，该神经元输出动作0（左）的概率*p*和动作1（右）的概率*1*
    – *p*。
- en: 'Clear previous models and generate a seed:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 清除之前的模型并生成一个种子：
- en: '[PRE19]'
  id: totrans-114
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: 'Determine the observation space:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 确定观察空间：
- en: '[PRE20]'
  id: totrans-116
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: The *observation space* is another term for the reward policy. The observation
    space (as shown earlier in the observation array) is a 1D NumPy array composed
    of four floats that represent the cart’s horizontal position, velocity, angle
    of the pole (0 = vertical), and angular velocity. So the observation space is
    contained in a 1D NumPy array with 4 elements.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: '*观察空间*是奖励策略的另一个术语。观察空间（如前所述的观察数组中所示）是一个由四个浮点数组成的1D NumPy数组，这些浮点数代表滑车的水平位置、速度、杆的角度（0
    = 垂直）和角速度。因此，观察空间包含在一个具有4个元素的1D NumPy数组中。'
- en: Note
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: The terms policy, reward policy, observation array, and observation space are
    interchangeable.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 术语策略、奖励策略、观察数组和观察空间可以互换使用。
- en: 'Set the number of inputs for the policy network:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 设置策略网络的输入数量：
- en: '[PRE21]'
  id: totrans-121
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: 'Create the policy network:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 创建策略网络：
- en: '[PRE22]'
  id: totrans-123
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: The policy network is a simple *Sequential* neural network. The number of inputs
    is the size of the observation space, which is 4 in our case. We include only
    five neurons in the first layer because this is such a simple problem. We only
    need to output a single probability (the probability of going left). So we use
    sigmoid activation in the output layer to generate a single output neuron as a
    logit. We only need to output a single probability p because we can get the probability
    of going right with 1 – p. If we had more than two possible actions, we would
    still use one output neuron per action and substitute softmax activation in the
    output layer.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 策略网络是一个简单的 *Sequential* 神经网络。输入数量是观察空间的大小，在我们的例子中是4。我们只在第一层包含五个神经元，因为这是一个如此简单的问题。我们只需要输出一个概率（向左移动的概率）。因此，我们在输出层使用sigmoid激活来生成单个输出神经元作为logit。我们只需要输出一个概率p，因为我们可以通过1
    – p得到向右移动的概率。如果我们有超过两个可能的动作，我们仍然会为每个动作使用一个输出神经元，并在输出层替换softmax激活。
- en: In this particular environment, past actions and observations can safely be
    ignored because each observation contains the environment’s full state. If there
    were some hidden state, we might need to consider past actions and observations
    to try to infer the hidden state of the environment. For example, if the environment
    only revealed the position of the cart but not its velocity, we would have to
    consider not only the current observation but also the previous observation in
    order to estimate the current velocity. Another example is if the observations
    are noisy, we might want to use the past few observations to estimate the most
    likely current state. Our problem is as simple as can be because the current observation
    is noise-free and contains the environment’s full state.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个特定环境中，由于每个观察包含环境的完整状态，因此可以安全地忽略过去的行为和观察。如果有某些隐藏状态，我们可能需要考虑过去的行为和观察来尝试推断环境的隐藏状态。例如，如果环境只揭示了滑车的位置而没有其速度，我们就必须考虑当前观察以及之前的观察，以便估计当前速度。另一个例子是，如果观察是噪声的，我们可能希望使用过去几项观察来估计最可能的状态。我们的问题非常简单，因为当前观察是无噪声的，并且包含环境的完整状态。
- en: Why do we pick a random action based on the probability given by the policy
    network rather than just picking the action with the highest probability? Because
    this approach lets the agent find the right balance between exploring new actions
    and exploiting the actions that are known to work well.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么我们根据策略网络的概率随机选择动作，而不是仅仅选择概率最高的动作？因为这种方法让智能体在探索新动作和利用已知效果良好的动作之间找到正确的平衡。
- en: Model Predictions
  id: totrans-127
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型预测
- en: Create a function that runs the model to play one episode and returns the frames
    so we can display an animation as shown in Listing [14-2](#PC24).
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数，运行模型以播放一个回合并返回帧，以便我们可以显示如图[14-2](#PC24)所示的动画。
- en: '[PRE23]'
  id: totrans-129
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: Establish the Cart-Pole environment and reset it. Create a loop to run a number
    of steps until the episode is over. Begin each step by appending the visualization
    of the environment rendering to the *frames* list. Continue by making an action
    prediction from the model. Next, establish an action based on the prediction.
    Execute the *step* method based on the action. Continue looping until the episode
    is over. End by returning the list of frames.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 建立Cart-Pole环境并重置它。创建一个循环，运行多个步骤直到回合结束。在每个步骤开始时，将环境渲染的可视化追加到 *frames* 列表中。接着从模型中进行动作预测。然后，根据预测建立动作。根据动作执行
    *step* 方法。继续循环直到回合结束。最后，返回帧列表。
- en: Create functions to show animation of the frames as shown in Listing [14-3](#PC25).
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 创建函数以显示如图[14-3](#PC25)所示的帧的动画。
- en: '[PRE24]'
  id: totrans-132
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: The *plot_animation* function creates an animation by repeatedly calling the
    *update_scene* function. The plot_animation function accepts the frames list.
    The function continues by extracting an image (patch) from the frames list. It
    then calls update_scene to set the x and y coordinates for the patch. The animation
    is returned batched on the patch coordinates for each frame image.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: '`*plot_animation*`函数通过重复调用`*update_scene*`函数来创建动画。`plot_animation`函数接受帧列表。然后，它从帧列表中提取一个图像（块）。接着，它调用`update_scene`来设置块的x和y坐标。动画返回的每个帧图像都批处理了块坐标。'
- en: 'Create the frames list based on the policy network:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 根据策略网络创建帧列表：
- en: '[PRE25]'
  id: totrans-135
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: Animate
  id: totrans-136
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 动画
- en: 'Create the animation:'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 创建动画：
- en: '[PRE26]'
  id: totrans-138
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: Experiment with the *interval* parameter to see its impact on the animation.
    We set interval size to 100 just because we liked the result.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试调整*间隔*参数以观察其对接动画的影响。我们设置间隔大小为100，仅仅是因为我们喜欢这个结果。
- en: Note
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Increasing the interval just lengthens the number of seconds that the animation
    runs.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 增加间隔只是延长了动画运行的时间。
- en: 'Render and display the animation. We show two ways to accomplish this. The
    first method uses the HTML library to display HTML elements:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 渲染并显示动画。我们展示了两种实现方式。第一种方法使用HTML库来显示HTML元素：
- en: '[PRE27]'
  id: totrans-143
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: The animation is rendered to *html5 video* with the to_html5_video method and
    displayed with the HTML module.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 使用`to_html5_video`方法将动画渲染为*html5视频*，并通过HTML模块显示。
- en: 'The second method uses the runtime configuration library:'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 第二种方法使用运行时配置库：
- en: '[PRE28]'
  id: totrans-146
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: 'To implement the second method, just run the animation object:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 要实现第二种方法，只需运行动画对象：
- en: '[PRE29]'
  id: totrans-148
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: Ugh! The pole is falling to the left! The reason is that we’ve yet to implement
    a reward policy.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 哎！杆子向左倒了！原因是我们还没有实现奖励策略。
- en: Implement a Basic Reward Policy
  id: totrans-150
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 实现基本奖励策略
- en: In the previous section, we just had the policy network run random predictions
    with *no interaction with the agent*. If the pole is tilting left, the agent has
    no way of knowing whether this is a bad or good action. We need to develop an
    environment with a reward policy that the agent can interact with to learn how
    to balance the pole on the cart.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一节中，我们只是让策略网络随机预测，与**代理**没有交互。如果杆倾斜向左，代理无法知道这是否是一个坏动作。我们需要开发一个具有奖励策略的环境，让代理可以与之交互，以学习如何在车上平衡杆。
- en: Create a diverse environment space as shown in Listing [14-4](#PC31).
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个如列表[14-4](#PC31)所示的多样化环境空间。
- en: '[PRE30]'
  id: totrans-153
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: We create an environment space with 50 different environments in parallel to
    provide a diverse training batch at each step in the network. We train the network
    for 5,000 iterations. Of course, you can tweak the number of environments and
    iterations, but be cognizant of available computer resources.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 我们并行创建了一个包含50个不同环境的环境空间，以在每个网络步骤中提供多样化的训练批次。我们对网络进行了5,000次迭代训练。当然，你可以调整环境数量和迭代次数，但要注意可用的计算机资源。
- en: We use the RMSprop optimizer because it seems to work pretty well. You can experiment
    with different optimizers to see how well the agent learns the task. We use binary
    cross-entropy for the loss function because we only have two discrete possible
    actions (left and right). The first line in the iteration loop checks the angle
    of the pole. If the angle < 0, the target action is left (proba(left) = 1.). Otherwise,
    the target action is right (proba(left) = 0).
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用RMSprop优化器，因为它似乎效果很好。你可以尝试不同的优化器，看看代理如何学习任务。我们使用二元交叉熵作为损失函数，因为我们只有两个离散的可能动作（左和右）。迭代循环的第一行检查杆的角度。如果角度
    < 0，目标动作是左（proba(left) = 1.）。否则，目标动作是右（proba(left) = 0）。
- en: '**Optimizers** are algorithms (or methods) used to change the attributes of
    a neural network (such as weights and learning rate) to reduce loss. So optimizers
    solve optimization problems by minimizing the loss function.'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: '**优化器**是用于改变神经网络（如权重和学习率）属性以减少损失的计算算法（或方法）。因此，优化器通过最小化损失函数来解决优化问题。'
- en: For a complete list of TensorFlow optimizers, peruse
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 要查看TensorFlow优化器的完整列表，请参阅
- en: '[`www.tensorflow.org/api_docs/python/tf/keras/optimizers`](http://www.tensorflow.org/api_docs/python/tf/keras/optimizers)'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: '[`www.tensorflow.org/api_docs/python/tf/keras/optimizers`](http://www.tensorflow.org/api_docs/python/tf/keras/optimizers)'
- en: The gradient tape section records the agent’s actions during training. The tilt
    of the pole is determined. The agent takes actions to steady the pole on the cart.
    The actions are then fed to the 50 environments that determine the rewards given
    to the agent. This process repeats 5,000 times.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度带部分记录了代理在训练期间的动作。杆子的倾斜被确定。代理采取行动使杆子在车上稳定。然后，这些动作被输入到50个环境中，这些环境决定了给予代理的奖励。这个过程重复了5,000次。
- en: Finally, the environments are reset to free resources. We train with a custom
    training loop so we can easily use the predictions at each training step to advance
    the environments.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，环境被重置以释放资源。我们使用自定义训练循环进行训练，这样我们就可以轻松地使用每个训练步骤的预测来推进环境。
- en: 'Create the frames for an animation:'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 创建动画的框架：
- en: '[PRE31]'
  id: totrans-162
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: We now have the frames based on what the agent learned during training. We use
    the frames to create an animation.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在有了基于代理在训练期间学习到的框架。我们使用这些框架来创建动画。
- en: 'Animate:'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 动画：
- en: '[PRE32]'
  id: totrans-165
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: Voilà! The animation verifies that our RL model worked. That is, we taught the
    agent how to balance the pole on the cart. But can we do even better?
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 哇！动画验证了我们的强化学习模型是有效的。也就是说，我们教会了代理如何在车上平衡杆子。但我们能否做得更好？
- en: Reinforce Policy Gradient Algorithm
  id: totrans-167
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 强化策略梯度算法
- en: We have yet to demonstrate the real breakthrough of RL. In the previous section,
    the agent learned from a reward policy. But can the agent learn a better policy
    on its own?
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 我们尚未展示强化学习的真正突破。在上一节中，代理从奖励策略中学习。但代理能否自己学习更好的策略？
- en: We can use a reinforce policy gradient algorithm to automate agent learning.
    *Policy gradients* optimize the parameters of a policy by following the gradients
    toward higher rewards.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用强化策略梯度算法来自动化代理学习。*策略梯度*通过跟随梯度指向更高的奖励来优化策略的参数。
- en: How Do Policy Gradients Work?
  id: totrans-170
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 策略梯度是如何工作的？
- en: To use policy gradients, let the neural network policy play the game several
    times. At each step, compute the gradients that make the chosen action even more
    likely. But don’t apply the gradients at this point.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用策略梯度，让神经网络策略玩游戏几次。在每一步，计算使所选动作更可能发生的梯度。但在此点不要应用梯度。
- en: After running several episodes, compute each action’s advantage with a discount
    factor at each step. A *discount factor* is computed by evaluating an action based
    on the sum of all rewards that come after the action. If an action’s advantage
    is positive, the action was probably good. So **now** apply the gradients to make
    the action more likely to be chosen in the future. If it is negative, apply the
    opposite gradients to make the action less likely to be chosen. Finally, compute
    the mean of all resultant gradient vectors and use it to perform a *gradient descent*
    step. The mean of all resultant gradient vectors is calculated by taking the mean
    of each gradient (or opposite gradient) multiplied by its action advantage. The
    end result is the creation of an effective policy gradient descent algorithm that
    minimizes the loss function.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 在运行了几个剧集后，计算每个动作的优势，每个步骤都有一个折现因子。*折现因子*是通过评估动作基于该动作之后所有奖励的总和来计算的。如果一个动作的优势是正的，那么这个动作可能很好。所以**现在**应用梯度，使该动作在未来更有可能被选择。如果它是负的，则应用相反的梯度，使该动作不太可能被选择。最后，计算所有结果梯度向量的平均值，并使用它来执行*梯度下降*步骤。所有结果梯度向量的平均值是通过计算每个梯度（或相反的梯度）乘以其动作优势的平均值来计算的。最终结果是创建了一个有效的策略梯度下降算法，该算法最小化了损失函数。
- en: Train the Model with Policy Gradients
  id: totrans-173
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 使用策略梯度训练模型
- en: Begin by creating functions to play a step, play multiple episodes, discount
    rewards, and normalize discounted rewards.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，创建函数来播放一个步骤、播放多个剧集、折现奖励和归一化折现奖励。
- en: Create a function that plays one step as shown in Listing [14-5](#PC34).
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数，如列表[14-5](#PC34)所示，来播放一个步骤。
- en: '[PRE33]'
  id: totrans-176
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: In the *GradientTape* block, call the model with a single observation. Reshape
    the observation so that it becomes a batch containing a single instance (the model
    expects a batch). Get a probability of going left by sampling a random float between
    0 and 1 and checking if it is greater than the probability. The *action* is False
    if the probability is left_proba and True if the probability is 1 – left_proba.
    Cast this Boolean (True or False) to a number of 0 (left) or 1 (right) with the
    appropriate probabilities. We then define the target probabilities of going left
    (1 – the action) or right (the action). If the action is 0 (left), the target
    probability of going left is 1\. If the action is 1 (right), the target probability
    is 0.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 在 *GradientTape* 块中，用单个观察值调用模型。将观察值重塑为一个包含单个实例（模型期望一个批次）的批次。通过在0和1之间采样一个随机浮点数并检查它是否大于概率来获取向左移动的概率。如果概率是
    left_proba，则 *action* 为 False；如果概率是 1 – left_proba，则 *action* 为 True。将这个布尔值（True或False）转换为0（左）或1（右）的数字，并使用适当的概率。然后我们定义向左移动（1
    – action）或向右移动（action）的目标概率。如果动作是0（左），则向左移动的目标概率是1。如果动作是1（右），则目标概率是0。
- en: Continue by computing the loss and use the tape to compute the gradient of the
    loss with regard to the model’s trainable variables. Tweak the gradients later
    depending on how good or bad that action turned out to be. Finally, play the selected
    action and return the new observation, the reward, whether the episode is over
    or not, and the gradients.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 继续计算损失，并使用带子计算模型可训练变量的损失梯度。根据该动作表现的好坏调整梯度。最后，执行选定的动作并返回新的观察值、奖励、回合是否结束以及梯度。
- en: Create a function to play multiple episodes and return the rewards and gradients
    for each episode and each step as shown in Listing [14-6](#PC35).
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数来播放多个回合，并返回每个回合和每一步的奖励和梯度，如列表 [14-6](#PC35) 所示。
- en: '[PRE34]'
  id: totrans-180
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: The function returns a list of reward lists by calling the *play_one_step* function
    for the number of desired steps. This list contains one reward list per episode.
    Each reward list contains one reward per step. The function also returns a list
    of gradient lists. This list contains one gradient list per episode. Each gradient
    list contains one tuple of gradients per step. Each tuple contains one gradient
    tensor per trainable variable.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 函数通过调用 *play_one_step* 函数来返回所需步数的奖励列表。此列表包含每个回合一个奖励列表。每个奖励列表包含每一步一个奖励。该函数还返回一个梯度列表。此列表包含每个回合一个梯度列表。每个梯度列表包含每一步一个梯度元组。每个元组包含一个可训练变量的梯度张量。
- en: Simply, the policy gradient algorithm uses the *play_multiple_episodes* function
    to play the game several times. It then goes back and looks at all the rewards
    to discount and normalize them.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 简单来说，策略梯度算法使用 *play_multiple_episodes* 函数多次玩游戏。然后它回过头来查看所有奖励以折扣和归一化它们。
- en: Discount and Normalize the Rewards
  id: totrans-183
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 折扣和归一化奖励
- en: To discount and normalize rewards, we discount the rewards and normalize them.
    The *discount factor* determines how important each reward is in the current state
    of the RL algorithm during training. The idea is to teach the agent how to rate
    the importance of each reward as it occurs during learning so it can be compared
    to future rewards in the training process. *Normalizing discounted rewards* makes
    the gradient steeper for rewards (positive reinforcement) and shallower for punishments
    (negative reinforcement). Simply, a reward triggers a steeper gradient, and a
    punishment triggers a shallower gradient when discounted rewards are normalized.
    A steeper gradient speeds minimization of the loss function, which is the goal
    of any ML algorithm.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 为了折扣和归一化奖励，我们折扣奖励并将它们归一化。*折扣因子*决定了在训练过程中RL算法的当前状态下每个奖励的重要性。想法是教会智能体如何在学习过程中评估每个奖励的重要性，以便它可以与训练过程中的未来奖励进行比较。*归一化折扣奖励*使得奖励（正强化）的梯度更陡峭，而惩罚（负强化）的梯度更平缓。简单来说，奖励触发更陡峭的梯度，而惩罚在归一化折扣奖励时触发更平缓的梯度。更陡峭的梯度可以加速损失函数的最小化，这是任何机器学习算法的目标。
- en: The *discount_rewards* function discounts rewards as shown in Listing [14-7](#PC36).
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: '*discount_rewards* 函数按照列表 [14-7](#PC36) 所示对奖励进行折扣。'
- en: '[PRE35]'
  id: totrans-186
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: 'Verify that the function works:'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 验证函数是否正常工作：
- en: '[PRE36]'
  id: totrans-188
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: We give the function three actions. After each action, there is a reward. The
    first reward is 10, the second is 0, and the third is –50\. We use a discount
    factor of 80%. So the third action gets –50 (full credit for the last reward).
    But the second action only gets –40 (80% credit for the last reward). Finally,
    the first action gets 80% of –40 (–32) plus full credit for the first reward (+10)
    leading to a discounted reward of –22.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 我们给函数提供了三个动作。每个动作后都有一个奖励。第一个奖励是10，第二个是0，第三个是-50。我们使用80%的折扣因子。所以第三个动作得到-50（最后一个奖励的全部信用）。但第二个动作只得到-40（最后一个奖励的80%信用）。最后，第一个动作得到-40的80%（-32）加上第一个奖励的全部信用（+10），导致折扣奖励为-22。
- en: Note
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: We gave the *discount_rewards* function three actions with a list (or vector)
    of three values, namely, [10, 0, -50]. We can change the number of actions by
    adding or removing values to or from the list.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 我们给*discount_rewards*函数提供了三个动作，一个包含三个值的列表（或向量），即[10, 0, -50]。我们可以通过向列表中添加或删除值来改变动作的数量。
- en: The *discount_and_normalize_rewards* function normalizes discounted rewards
    as shown in Listing [14-8](#PC38).
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: '*discount_and_normalize_rewards*函数按照列表 [14-8](#PC38) 所示归一化折扣奖励。'
- en: '[PRE37]'
  id: totrans-193
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: 'To normalize all discounted rewards across all episodes, compute the mean and
    standard deviation of all the discounted rewards. Subtract the mean from each
    discounted reward and divide by the standard deviation. Let’s try this function
    with two episodes:'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 为了在所有剧集中对所有折扣奖励进行归一化，计算所有折扣奖励的均值和标准差。从每个折扣奖励中减去均值，然后除以标准差。让我们用两个剧集来尝试这个函数：
- en: '[PRE38]'
  id: totrans-195
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: All actions from the first episode (first array) are considered bad because
    normalized advantages are all negative. This makes sense because the sum of the
    rewards is -40 (10 + 0 + -50). Conversely, the second episode actions (second
    array) are good because normalized advantages are positive. The sum of the rewards
    is 30 (10 + 20).
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 第一剧集（第一个数组）中的所有动作都被认为是坏的，因为归一化优势都是负的。这很有道理，因为奖励的总和是-40（10 + 0 + -50）。相反，第二剧集的动作（第二个数组）是好的，因为归一化优势是正的。奖励的总和是30（10
    + 20）。
- en: Train the Learner
  id: totrans-197
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 训练学习者
- en: As we know, RL uses a learning model and an environment space to enable an agent
    to learn how to solve a problem. So the agent learns how to solve a problem during
    the training process. So we can think of the process as training the learner.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所知，RL使用学习模型和环境空间来使智能体学会如何解决问题。因此，智能体在训练过程中学会如何解决问题。因此，我们可以将这个过程视为训练学习者。
- en: 'Begin by defining a set of hyperparameters:'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 首先定义一组超参数：
- en: '[PRE39]'
  id: totrans-200
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: We set 150 training iterations. Of course, you can tweak this number and the
    other values. Play ten episodes of the game per iteration, make each episode last
    at most 200 steps, and use a discount rate of 0.95.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 我们设置了150次训练迭代。当然，你可以调整这个数字和其他值。每次迭代玩10个游戏剧集，每个剧集最多持续200步，并使用折扣率0.95。
- en: 'Define an optimizer and loss function for the policy network:'
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 定义策略网络的优化器和损失函数：
- en: '[PRE40]'
  id: totrans-203
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: 'Use binary cross-entropy because we are training a binary classifier (two possible
    actions: left and right).'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 使用二元交叉熵，因为我们正在训练一个二元分类器（两个可能动作：左和右）。
- en: 'Generate a seed, clear previous models, and create a simple policy network:'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 生成一个种子，清除之前的模型，并创建一个简单的策略网络：
- en: '[PRE41]'
  id: totrans-206
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: A policy network in reinforcement learning is very simple. Creating an environment
    space is the difficult part.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习中的策略网络非常简单。创建环境空间是困难的部分。
- en: Train the learner as shown in Listing [14-9](#PC43).
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 按照列表 [14-9](#PC43) 所示训练学习者。
- en: '[PRE42]'
  id: totrans-209
  prefs: []
  type: TYPE_PRE
  zh: '[PRE42]'
- en: To train the learner, begin by calling *play_multiple_episodes* (at each training
    iteration) to play the game ten times and return all the rewards and gradients
    for every episode and step. Next, call *discount_and_normalize_rewards* to compute
    each action’s normalized advantage, which gives us a measure of how good or bad
    each action actually was in hindsight. For each trainable variable, compute the
    weighted mean of the gradients over all episodes and all steps weighted by the
    final_reward. The *final_reward* is each action’s normalized advantage. End by
    applying the mean gradients using the optimizer, which tweaks the model’s trainable
    variables to hopefully make the policy a bit better.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 要训练学习者，首先调用*play_multiple_episodes*（在每个训练迭代中）来玩10次游戏，并返回每个剧集和每一步的所有奖励和梯度。接下来，调用*discount_and_normalize_rewards*来计算每个动作的归一化优势，这为我们提供了一个衡量每个动作实际上是好是坏的反向指标。对于每个可训练变量，计算所有剧集和所有步骤的加权平均梯度，加权因子为最终奖励。*final_reward*是每个动作的归一化优势。最后，使用优化器应用平均梯度，这会调整模型的可训练变量，以期使策略变得更好。
- en: Note
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Training the learner takes some time. So be patient.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 训练学习器需要一些时间。所以请耐心等待。
- en: Render the Frames from the Reinforce Policy Gradient Algorithm
  id: totrans-213
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 从强化策略梯度算法渲染帧
- en: 'Render the frames:'
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 渲染帧：
- en: '[PRE43]'
  id: totrans-215
  prefs: []
  type: TYPE_PRE
  zh: '[PRE43]'
- en: Animate the Policy
  id: totrans-216
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 动画策略
- en: 'Animate :'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 动画：
- en: '[PRE44]'
  id: totrans-218
  prefs: []
  type: TYPE_PRE
  zh: '[PRE44]'
- en: The pole appears to be a bit less wobbly. It’s kind of amazing that the agent
    learned a better policy on its own!
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 极端似乎不太摇晃。代理自己学会更好的策略，这真是一种惊人的事情！
- en: Summary
  id: totrans-220
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: We introduce the concept of RL and demonstrate it with a simple experiment.
    The code in the experiment is quite complex even for the simplest of environment
    spaces. The evolution of RL applied to real-world problems lies in the ability
    of designers to create environment spaces that realistically represent the world
    we live in.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 我们介绍了强化学习（RL）的概念，并通过一个简单的实验来演示它。即使在最简单的环境空间中，实验中的代码也非常复杂。将强化学习应用于现实世界问题的进化，在于设计者创建能够真实反映我们所处世界的环境空间的能力。
