- en: Logistic Regression with TensorFlow 2.0
  id: totrans-66
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Logistic regression is one of the most popular classification methods. Although
    the name contains *regression*, and the underlying method is the same as that
    for linear regression, it is not a regression method. That is, it is not used
    for prediction of continuous (numeric) values. The purpose of the logistic regression
    method is to predict the outcome, which is categorical.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: 'As mentioned, logistic regression’s underlying method is the same as that for
    linear regression. Suppose we take the multi-class linear equation, as shown following:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: y = m[1]x[1] + m[2]x[2] + m[3]x[3] + ……… + m[n]x[n] + b
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: where `x`[1], `x`[2], `x`[3], `………`, `xn` are different input features, `m`[1],
    `m`[2], `m`[3], `……… mn` are the slopes for different features, and **b** is the
    intercept.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: 'We will apply a logistic function to the linear equation, as follows:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: p(y=1) = 1/(1 + e^(–(m)[1]^x[1] ^(+ m)[2]^x[2] ^(+ m)[3]^x[3] ^(+ ……… + m)[n]^x[n]
    ^(+ b)))
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: where `p(y=1)` is the probability value of y=1.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: If we plot this function, it will look like an *S*, hence it is called a sigmoid
    function (Figure [2-3](#Fig3)).
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_2_Chapter/489297_1_En_2_Fig3_HTML.jpg](../images/489297_1_En_2_Chapter/489297_1_En_2_Fig3_HTML.jpg)'
  id: totrans-75
  prefs: []
  type: TYPE_IMG
- en: Figure 2-3
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: A sigmoid function representation
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
