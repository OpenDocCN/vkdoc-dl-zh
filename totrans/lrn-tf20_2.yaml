- en: Conclusion
  id: totrans-141
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: You just saw how easy it has become to implement supervised machine learning
    algorithms in TensorFlow 2.0\. You can build the models just as you would using
    the `scikit-learn` package. The Keras implementation within TensorFlow also makes
    it easy to build neural network models, which will be discussed in Chapter [3](489297_1_En_3_Chapter.xhtml).
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 你刚刚看到了在 TensorFlow 2.0 中实现监督式机器学习算法变得多么简单。你可以像使用 `scikit-learn` 包一样构建模型。TensorFlow
    内置的 Keras 也使得构建神经网络模型变得容易，这将在第 [3](489297_1_En_3_Chapter.xhtml) 章中进行讨论。
