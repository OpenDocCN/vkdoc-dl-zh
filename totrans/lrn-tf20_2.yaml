- en: Boosted Trees with TensorFlow 2.0
  id: totrans-112
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before we implement the boosted trees method in TensorFlow 2.0, we want to quickly
    highlight related key terms.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
- en: Ensemble Technique
  id: totrans-114
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: An ensemble is a collection of predictors. For example, instead of using a single
    model (say, logistic regression) for a classification problem, we can use multiple
    models (say, logistic regression + decision trees, etc.) to perform predictions.
    The outputs from the predictors are combined by different averaging methods, such
    as weighted averages, normal averages, or votes, and a final prediction value
    is derived. Ensemble methods have been proved to be more effective than individual
    methods and, therefore, are heavily used to build machine learning models. Ensemble
    methods can be implemented by either bagging or boosting.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
- en: Bagging
  id: totrans-116
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Bagging is a technique wherein we build independent models/predictors, using
    a random subsample/bootstrap of data for each of the models/predictors. Then an
    average (weighted, normal, or by voting) of the scores from the different predictors
    is taken to get the final score/prediction. The most famous bagging method is
    random forest.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
- en: A typical bagging technique is depicted in Figure [2-4](#Fig4).
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_2_Chapter/489297_1_En_2_Fig4_HTML.jpg](../images/489297_1_En_2_Chapter/489297_1_En_2_Fig4_HTML.jpg)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
- en: Figure 2-4
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
- en: Bagging technique
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
- en: Boosting
  id: totrans-122
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Boosting is a different ensemble technique, wherein the predictors are not independently
    trained but done so in a sequential manner. For example, we build a logistic regression
    model on a subsample/bootstrap of the original training data set. Then we take
    the output of this model and feed it to a decision tree, to get the prediction,
    and so on. The aim of this sequential training is for the subsequent models to
    learn from the mistakes of the previous model. Gradient boosting is an example
    of a boosting method.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
- en: A typical boosting technique is depicted in Figure [2-5](#Fig5).
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_2_Chapter/489297_1_En_2_Fig5_HTML.jpg](../images/489297_1_En_2_Chapter/489297_1_En_2_Fig5_HTML.jpg)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
- en: Figure 2-5
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
- en: Boosting technique
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
- en: Gradient Boosting
  id: totrans-128
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The main difference between gradient boosting compared to other boosting methods
    is that instead of incrementing the weights of misclassified outcomes from one
    previous learner to the next, we optimize the loss function of the previous learner.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
- en: 'We will be building a boosted trees classifier, using the gradient boosting
    method under the hood. We will take the iris data set for classification. As we
    have already used the same data set for implementing logistic regression in the
    previous section, we will keep the preprocessing the same (i.e., until the “Build
    the input pipeline for TensorFlow model” step from the previous example). We will
    continue directly with the model training step, as follows:'
