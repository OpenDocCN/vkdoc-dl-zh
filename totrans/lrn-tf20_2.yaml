- en: 2. Supervised Learning with TensorFlow
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we will be explaining the concept of supervised machine learning.
    Next, we take a deep dive into such supervised machine learning techniques as
    linear regression, logistic regression, and boosted trees. Finally, we will demonstrate
    all the aforementioned techniques, using TensorFlow 2.0.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
- en: What Is Supervised Machine Learning?
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: First, let us quickly review the concept of machine learning and then see what
    supervised machine learning is, with the help of an example.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: As defined by Arthur Samuel in 1959, machine learning is the field of study
    that gives computers the ability to learn without being explicitly programmed.
    The aim of machine learning is to build programs whose performance improves automatically
    with some input parameters, such as data, performance criteria, etc. The programs
    become more data-driven, in terms of making decisions or predictions. We may not
    be aware of it, but machine learning has taken over our daily lives, from recommending
    products on online portals to self-driving cars that can take us from point A
    to point B without our driving them or employing a driver.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: 'Machine learning is a part of artificial intelligence (AI) and mainly comprises
    three types:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: Supervised machine learning
  id: totrans-6
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Unsupervised machine learning
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Reinforcement learning
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Let us explore supervised machine learning via an example and then implement
    different techniques using TensorFlow 2.0\. Note that unsupervised machine learning
    and reinforcement learning are beyond the scope of this book.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: Imagine a three-year-old seeing a kitten for the first time. How would the child
    react? The child doesn’t know what he/she is seeing. He or she might initially
    experience a feeling of curiosity, fear, or joy. It is only after his or her parents
    pet the kitten that the child realizes the animal might not harm him/her. Later,
    the child might be comfortable enough to hold the kitten and play with it. Now,
    the next time the child sees a kitten, he/she may instantly recognize it and start
    playing with it, without the initial fear or curiosity it felt toward the kitten
    previously. The child has *learned* that the kitten is not harmful, and, instead,
    he/she can play with it. This is how supervised learning works in real life.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: In the machine world, supervised learning is done by providing a machine inputs
    and labels and asking it to learn from them. For example, using the preceding
    example, we can provide to the machine pictures of kittens, with the corresponding
    label (kitten), and ask it to learn the intrinsic features of a kitten, so that
    it can generalize well. Later, if we provide an image of another kitten without
    a label, the machine will be able to predict that the image is that of a kitten.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: 'Supervised learning usually comprises two phases: training and testing/prediction.
    In the training phase, a set of the total data, called a training set, is provided
    to the machine learning algorithm, made up of input data (features) as well as
    output data (labels). The aim of the training phase is to make sure the algorithm
    learns as much as possible from the input data and forms a mapping between input
    and output, such that it can be used to make predictions. In the test/prediction
    phase, the remaining set of data, called a test set, is provided to the algorithm
    and comprises only the input data (features) and not the labels. The aim of the
    test/prediction phase is to check how well the model is able to learn and generalize.
    If the accuracy of the training and test sets differs too much, we can infer that
    the model might have mapped the input and output of training data too closely,
    and, therefore, it was not able to generalize the unseen data (test set) well.
    This is generally known as overfitting.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: A typical supervised machine learning architecture is shown in Figure [2-1](#Fig1).
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_2_Chapter/489297_1_En_2_Fig1_HTML.jpg](../images/489297_1_En_2_Chapter/489297_1_En_2_Fig1_HTML.jpg)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
- en: Figure 2-1
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: Supervised machine learning architecture
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: Within supervised learning, if we are to predict numeric values, this is called
    regression, whereas if we are to predict classes or categorical variables, we
    call that classification. For example, if the aim is to predict the sales (in
    dollars) a company is going to earn (numeric value), this comes under regression.
    If the aim is to determine whether a customer will buy a product from an online
    store or to check if an employee is going to churn or not (categorical yes or
    no), this is a classification problem.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: Classification can be further divided as binary and multi-class. Binary classification
    deals with classifying two outcomes, i.e., either yes or no. Multi-class classification
    yields multiple outcomes. For example, a customer is categorized as a hot prospect,
    warm prospect, or cold prospect, etc.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: Linear Regression with TensorFlow 2.0
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In linear regression, as with any other regression problem, we are trying to
    map the inputs and the output, such that we are able to predict the numeric output.
    We try to form a simple linear regression equation :'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: y = mx + b
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: 'In this equation, `y` is the numeric output that we are interested in, and
    `x` is the input variable, i.e., part of the features set. `m` is the slope of
    the line, and `b` is the intercept. For multi-variate input features (multiple
    linear regression), we can generalize the equation, as follows:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: y = m[1]x[1 +] m[2]x[2] + m[3]x[3] + ……… + m[n]x[n] + b
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: where `x`[`1`], `x`[`2`], `x`[`3`], `………`, `xn` are different input features,
    `m`[`1`], `m`[`2`], `m`[`3`], `……… m`[`n`] are the slopes for different features,
    and `b` is the intercept
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: This equation can also be represented graphically, as shown in Figure [2-2](#Fig2)
    (in 2D).
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_2_Chapter/489297_1_En_2_Fig2_HTML.jpg](../images/489297_1_En_2_Chapter/489297_1_En_2_Fig2_HTML.jpg)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
- en: Figure 2-2
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: Linear regression graph
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: Here, we can clearly see that there is a linear relation between label y and
    feature inputs X.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
