- en: 2. Data Preparation and Engineering
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The goal is to turn data into information, and information into insight.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: —Carly Fiorina, Former CEO of Hewlett-Packard
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: We define data preparation, or data preprocessing, as a transformation or set
    of transformations applied to raw data collected directly from the data source
    to better represent information. We do this for the purpose of being able to better
    model it (Figure [2-1](#Fig1)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig1_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flow diagram is depicted as follows, raw data leads to preprocessed data which
    further leads to the development of the model.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-1
  prefs: []
  type: TYPE_NORMAL
- en: Preprocessing pipeline from raw data to model
  prefs: []
  type: TYPE_NORMAL
- en: Deep learning has a complex relationship with data preparation and preprocessing.
    It is well-known that classical machine learning or statistical learning algorithms
    often require extensive preprocessing to be successful. One of the most exciting
    advantages of using neural networks for modeling is its purported ability to reliably
    learn on raw data. It is well-known that neural networks have significantly more
    predictive power than standard machine learning algorithms. Therefore, theoretically,
    a neural network can learn the optimal set of preprocessing schemes for data modeling,
    equal to or better than the scheme a human can select or design.
  prefs: []
  type: TYPE_NORMAL
- en: However, this does not mean that deep learning has eliminated the need for data
    preparation and preprocessing. Despite the theoretical lack of a need for data
    preprocessing, applying complex or domain-informed preprocessing schemes can still
    improve neural network performance in practice. The existence of a theoretical
    state in which a deep learning model can represent optimal preprocessing schemes
    does not by itself also show that deep learning models can reliably *converge
    to such a state* during training. (In Chapter [10](525591_1_En_10_Chapter.xhtml)
    on meta-optimization, we’ll see an application of the techniques discussed in
    this chapter by optimizing the data preprocessing pipeline for a neural network
    using machine learning.)
  prefs: []
  type: TYPE_NORMAL
- en: Data preparation and preprocessing are still invaluable skills relevant to working
    with tabular data, regardless of whether you use a classical machine learning
    or deep learning approach. Machine learning algorithms learn best when they draw
    associations from data in which the associations are already somewhat clear or
    at least not obfuscated. The objective of the chapter is to provide you with ideas
    and tools to accomplish that goal.
  prefs: []
  type: TYPE_NORMAL
- en: 'Roughly, we can identify three primary components of data preprocessing: data
    encoding, feature extraction, and feature selection (Figure [2-2](#Fig2)). Each
    of these components is somewhat interrelated: the goal of data encoding is to
    make raw data both readable and “true to its natural characteristics”; the goal
    of feature extraction is to identify abstracted or more relevant features from
    within the data space; the goal of feature selection is to identify if and which
    features are not relevant to the predictive process and can be removed. Generally,
    data encoding takes precedence over the latter two components because data must
    be readable and representative of itself before we can attempt to extract features
    from it or select which features are relevant.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig2_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flow diagram depicts the stages as follows, raw data; preprocessing which
    consists of data encoding, feature extraction, and feature selection; and preprocessed
    data.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-2
  prefs: []
  type: TYPE_NORMAL
- en: 'Key components of the preprocessing pipeline: data encoding, feature extraction,
    and feature selection'
  prefs: []
  type: TYPE_NORMAL
- en: The chapter will begin by discussing various libraries and tools to store and
    manipulate tabular datasets, with a focus particularly on large and difficult-to-store
    data. Then, it will cover each of the three discussed components of the data preprocessing
    pipeline – data encoding, feature extraction, and feature selection – in application
    to several example tabular datasets.
  prefs: []
  type: TYPE_NORMAL
- en: Data Storage and Manipulation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this section, we’ll explore TensorFlow Datasets, a strong submodule for dataset
    storage, pipelines, and manipulations, as well as several libraries for loading
    large tabular datasets.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter and the remainder of the book assume a working knowledge of NumPy
    and Pandas. If you are not familiar working with these libraries, please see the
    Appendix for a thorough overview of both.
  prefs: []
  type: TYPE_NORMAL
- en: TensorFlow Datasets
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: TensorFlow Datasets is especially important for image and text tabular data
    because they are very high-dimensional specialized data formats that take up a
    significant amount of space. Tabular data is generally more compact, so in many
    cases Pandas and NumPy suffice, and it is not necessary to use TensorFlow Datasets.
    However, TensorFlow Datasets offers significant speedups and space efficiency
    advantages with higher-frequency tabular data (e.g., high-precision stock market
    data).
  prefs: []
  type: TYPE_NORMAL
- en: Creating a TensorFlow Dataset
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In order to create a TensorFlow dataset, one must first have a data source.
  prefs: []
  type: TYPE_NORMAL
- en: If you already have the data stored in memory, for instance, as a NumPy or Pandas
    array, you can copy the information into a TensorFlow dataset using the `from_tensor_slices`
    function (Listing [2-1](#PC1)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'When we call the value of `data1` (for instance, by printing it), we obtain
    the result `<TensorSliceDataset shapes: (), types: tf.int32>`. However, `data2`
    yields the result `<TensorSliceDataset shapes: (), types: tf.int64>`. Notice the
    difference in data types in tensors, which should technically be the same type
    – what’s going on here?'
  prefs: []
  type: TYPE_NORMAL
- en: When TensorFlow takes in raw integers, it casts them as 32-bit integers by default.
    However, NumPy casts raw integers as 64-bit by default; when TensorFlow takes
    in the NumPy array of 64-bit integers, it retains their representation and stores
    them under the `tf.int64` type. It is important to be conscious of such “hidden”
    transformations of data when passing through in different containers.
  prefs: []
  type: TYPE_NORMAL
- en: You can control the TensorFlow dataset element representation thus by casting/setting
    certain element types in the data source, which TensorFlow will faithfully retain,
    or using TensorFlow’s `tf.cast`.
  prefs: []
  type: TYPE_NORMAL
- en: You may also notice that the displayed shape in all created TensorFlow datasets
    appears to be empty. Let’s create a multidimensional array with shape (2, 3, 4)
    and pass the data into `.from_tensor_slices` (Listing [2-2](#PC2)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'The result is `<TensorSliceDataset shapes: (3, 4), types: tf.int64>`. This
    is because `.from_tensor_slices` creates a `TensorSliceDataset`, which is organized
    by the storage of *slices*. The shape indicated is the size of each slice. You
    can think of a slice as a data sample or item arranged in a list; for instance,
    the `.from_tensor_slices` constructor will interpret input data with shape `(2,
    3, 4)` as two data samples of shape `(3, 4)`. This data storage mechanism explicitly
    captures the dimension distinguishing data samples from one another, which NumPy
    arrays do not.'
  prefs: []
  type: TYPE_NORMAL
- en: If you want standard array-like storage or to work with TensorFlow-stored data
    in a less restrictive format (`TensorSliceDatasets` are not very modifiable because
    they are “ready”/”primed” to be fed into a model), you can use a `TensorDataset`.
    Rather than storing *slices*, a `TensorDataset` stores a raw tensor (Listing [2-3](#PC3)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'The code in Listing [2-3](#PC3) yields `<TensorDataset shapes: (2, 3, 4), types:
    tf.int64>`.'
  prefs: []
  type: TYPE_NORMAL
- en: 'You’ll usually be feeding TensorSliceDatasets into models rather than TensorDatasets,
    since they are explicitly designed to efficiently capture separation between data
    samples. TensorFlow models will accept properly set-up datasets like such: `model.fit(data,
    other parameters...)`.'
  prefs: []
  type: TYPE_NORMAL
- en: TensorFlow offers many utilities to convert files (e.g., `.csv`) or data stored
    in other utilities (e.g., Pandas DataFrames) into TensorFlow-compatible forms.
    You can explore these on the TensorFlow input/output (`tf.io`) documentation page.
  prefs: []
  type: TYPE_NORMAL
- en: Generally, for the purposes of tabular data modeling, TensorFlow Datasets is
    only necessary for very large datasets (e.g., fine-precision stock market data
    collected every few seconds across decades). Throughout the examples used in the
    book, we will not use TensorFlow Datasets as the default because it isn’t necessary
    for most tabular contexts.
  prefs: []
  type: TYPE_NORMAL
- en: TensorFlow Sequence Datasets
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The “traditional” TensorFlow dataset configuration requires you to arrange all
    your data at once into a compact dataset object that is passed into a model for
    training. This tends to be quite rigid and inflexible, especially if you are working
    with large datasets that simply can’t be loaded into memory all at once or complex
    datasets with multiple inputs and/or outputs.
  prefs: []
  type: TYPE_NORMAL
- en: 'A TensorFlow *Sequence dataset* is a more flexible agreement between TensorFlow
    and the developer: rather than being forced to assemble and manipulate the entire
    dataset on an aggregate level at once, the developer agrees to give TensorFlow
    parts of the dataset on demand when they are requested. These datasets are valuable
    for their flexible structure and corresponding ease of data pipeline development.'
  prefs: []
  type: TYPE_NORMAL
- en: 'A custom-defined Sequence dataset (Listing [2-4](#PC4), Figure [2-3](#Fig3))
    inherits from the `tf.keras.utils.Sequence` class and must have two implemented
    methods: `__len__()` and `__getitem__(index)`. The former specifies the number
    of batches in the dataset; this can be calculated as ![$$ \frac{\# sample\ points}{batch\
    size} $$](../images/525591_1_En_2_Chapter/525591_1_En_2_Chapter_TeX_IEq1.png).
    The latter returns the *x* and *y* data subsets corresponding to the index, which
    indicates which batch is requested by the model. During model training, the model
    will request a maximum index of `__len__() – 1`. You can also add a method `__on_epoch_end__()`,
    which executes after every epoch. This feature is very helpful if you want to
    dynamically alter the dataset parameters throughout training or want to measure
    model performance in a custom manner. If you are familiar with PyTorch, you may
    observe that this custom TensorFlow dataset structure reflects the required dataset
    definition for PyTorch models.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig3_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A block diagram exhibits the T F sequence dataset which consists of the states
    which lead to the behaviors which further lead to the client model.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-3
  prefs: []
  type: TYPE_NORMAL
- en: One of several possible arrangements for the relationship between state (x data,
    y data, and internal data) and behavior (the __getitem__(), __len__(), and on_epoch_end()
    functions)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'Generally, a custom Sequence dataset contains the following features (see a
    code example in Listing [2-5](#PC5)):'
  prefs: []
  type: TYPE_NORMAL
- en: Internal data parameters that are set upon initialization and either remain
    static or change throughout training, for instance, batch size (constant) and
    image augmentation severity parameters like blurring kernel size or brightness
    (constant or dynamic).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A variable to keep track of the current epoch, which is updated after each `on_epoch__end()`
    call.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Internal x and y fields that store the dataset or references to the dataset.
    For instance, if our dataset is relatively compact, it may be possible to store
    the data itself within the custom Sequence dataset and to simply index and return
    the desired batch of the data on demand when the model requests it. Alternatively,
    it may store image paths, text files, or references of another form that are loaded
    in the `__getitem__(index)` call.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Fields to keep track of training and validation indices (assuming this is not
    taken care of outside of the dataset).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: If you want to keep track of model performance over time, define a dataset to
    initialize with a model object and evaluate the performance of the model on the
    internal dataset every epoch (or every multiple of epochs). The pseudocode for
    how this could look is in Listing [2-6](#PC6).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: We’ll see examples of TensorFlow Sequence datasets helping us a lot in Chapters
    [4](525591_1_En_4_Chapter.xhtml) and [5](525591_1_En_5_Chapter.xhtml), when we
    build models that require both a tabular and an image input to be simultaneously
    fed into two input heads.
  prefs: []
  type: TYPE_NORMAL
- en: Handling Large Datasets
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Biomedical data represents a large portion of modern tabular datasets, such
    as datasets containing genetic information such as RNA, DNA, and protein expressions.
    The size of typical biomedical datasets is often very large due to the high precision
    of data. Thus, it’s usually difficult or impossible to manipulate data in memory
    with Pandas DataFrames.
  prefs: []
  type: TYPE_NORMAL
- en: With TensorFlow datasets, it is simple to convert a dataset that is already
    loaded into memory into a compact model data feeder. Alternatively, using Sequence
    datasets, you can load select parts of your data on demand, either from memory
    or from the disk, as desired. However, there are other tools to deal with large
    tabular datasets, which may be more convenient than TensorFlow datasets. We will
    explore the handling of large datasets in a twofold manner – first exploring datasets
    that fit into memory and then those that do not.
  prefs: []
  type: TYPE_NORMAL
- en: Datasets That Fit in Memory
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Datasets that fit into memory can be directly loaded in a session. However,
    with hardware limitations, further operations such as training with large models
    can often result in OOM errors. The following methods can be used to reduce the
    memory footprints of datasets that barely fit into memory. This can allow for
    complex manipulations of datasets without worrying about memory issues.
  prefs: []
  type: TYPE_NORMAL
- en: Pickle
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: Converting large, in-memory, Pandas DataFrames to pickle files is a universal
    approach to reduce the file size of any .csv datasets. Pickle files use the “.pkl”
    extension, and it is a Python-specific file format. That being said, any Python
    object can be saved the same way as it is shown for Pandas DataFrames in Listing
    [2-7](#PC7). Pickle is usually the default method for saving and loading sklearn-based
    models (since there’s no naïve support of saving and loading functionalities).
    Due to the efficient storage method adopted by pickle, it can not only reduce
    the original .csv file size but also able to be loaded in up to 100 times faster
    than Pandas DataFrames.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Alternatively, the pickle file can also be loaded with `pd.load_pickle`.
  prefs: []
  type: TYPE_NORMAL
- en: SciPy and TensorFlow Sparse Matrices
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: If your dataset is especially sparse – a common culprit is the presence of many
    one-hot encoded columns – you can use either SciPy or TensorFlow sparse matrix
    storage objects.
  prefs: []
  type: TYPE_NORMAL
- en: SciPy offers several different sparse matrix methods. Compressed Sparse Row
    (CSR) format supports efficient row slicing and will likely be the go-to data
    storage object for efficient sample access. You can import the CSR object from
    `from` `scipy.sparse` `import` `csr_array` and use it as a wrapper against other
    array objects, such as NumPy arrays, tuples, or lists. Alternatively, `csc_array`
    supports efficient column indexing. Behind the scenes, nonzero elements are stored
    by their index, column, and value; sparse matrices support efficient mathematical
    operations and transformations. There are five more types of sparse arrays/matrices
    available in `scipy.sparse` with slightly more complicated instantiation processes.
    Refer to the SciPy sparse documentation for more information. Note that most scikit-learn
    models accept SciPy sparse matrices as inputs.
  prefs: []
  type: TYPE_NORMAL
- en: 'While SciPy matrices are certainly efficient and compatible with many other
    operations, they cannot be directly passed into TensorFlow/Keras models without
    additional work. TensorFlow supports a *sparse tensor* format, which can be called
    from `tf.sparse.from_dense`. Similarly to SciPy, sparse tensors are stored as
    bundles of three standard (dense) tensors: indices (locations), values, and the
    tensor shape. This provides the necessary information to efficiently store sparse
    data. You can cast sparse tensors into a TensorFlow dataset with the standard
    `tf.data.Dataset.from_tensor_slices`, which still preserves the sparsity and can
    be used for more memory-efficient training.'
  prefs: []
  type: TYPE_NORMAL
- en: Datasets That Do Not Fit in Memory
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Datasets that do not fit in memory cannot be loaded as a whole in a single session.
    We can load large image datasets batch by batch since each individual image is
    stored within its own file. With predefined pipelines in TensorFlow (which we
    will see in future chapters), images can be easily loaded from the disk in small
    amounts. However, most tabular datasets are not structured in a sample-by-sample
    manner; rather, the entire dataset is usually stored in one file. In the following
    methods, we will explore approaches that can “preload” the entirety of datasets
    to disk while being able to access the data through typical means.
  prefs: []
  type: TYPE_NORMAL
- en: Pandas Chunker
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: If you have a CSV file that is too large to be directly loaded into memory,
    you can instead use an iterator by specifying the `iterator=True` argument. You
    can specify the chunk size, which determines how many rows will be loaded on each
    iteration. We can directly build this into a TensorFlow custom dataset as follows
    (Listing [2-8](#PC8)), in which the iterator is kept as a dataset internal variable
    and each call to index the data returns the next chunk. Note that while TensorFlow
    will use an index, this index is irrelevant to the code written within the function.
    This means that each chunk can only be called once; the following time it is called,
    the next chunk will be returned.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: This allows us effectively to stream data into the model with a much smaller
    memory footprint by directly reading from the file.
  prefs: []
  type: TYPE_NORMAL
- en: h5py
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: When a dataset is too large to load into memory, we want a way to load parts
    of it at a time on demand. However, this is easier said than done. Large CSV files
    that cannot be directly loaded into Pandas DataFrames, for instance, are difficult
    to chunk on demand. The Pandas Chunker introduced previously can only be used
    as an iterator where each chunk is returned once and returned in order. The same
    applies for many other types of large data.
  prefs: []
  type: TYPE_NORMAL
- en: 'The Python library h5py offers the ability to save and load files in the Hierarchical
    Data Format (h5). Compared with .csv files, h5 is a much more compressed storage
    format and cannot be interpreted/opened by typical spreadsheet/document programs.
    h5py creates a direct reference through variables between the program and the
    disk, which allows for programs to directly index and access select parts of the
    dataset stored in disk (which is typically much larger than memory size). Essentially,
    once the reference link between the defined variable in the program and the dataset
    stored in the disk is made, the linked variable can be treated like any other
    NumPy array. To understand and apply operations on h5 files, we’re first going
    to instantiate a h5 dataset with the `create_dataset` method. The method requires
    two arguments: (a) the name of the dataset within the file and (b) the shape of
    the data. Shown in Listing [2-9](#PC9), we wrote a h5 file with two groups titled
    “`group_name1`” and “`group_name2`”, respectively. Both groups contain a two-dimensional
    matrix with shape `(100, 100)`.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: To insert data into the empty dataset, we can access certain parts (or the entire
    dataset with “`[:]`”) of the dataset with NumPy-like index notations.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: We can read a h5 file and access its “dataset keys” in a similar fashion.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: The “dataset keys” we created previously (`group1` and `group2`) can be seen
    as key-value pairs in a dictionary. A list of keys present in the h5 file can
    be accessed by “`f.keys()`”. Note that keys can be nested, meaning that there
    may be more keys corresponding to data under the top-level key. Values contained
    under keys (such as the `(100, 100)` matrix we defined for `group1` and `group2`)
    can be retrieved in the same way as retrieving a value from a Python dictionary.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: The indexed values will be loaded into memory. We can use this in conjunction
    with TensorFlow datasets to allow for the training of large tabular datasets.
  prefs: []
  type: TYPE_NORMAL
- en: The h5py library provides convenient and universal solutions to loading in data
    that does not fit in memory as well as reducing the actual size of the file significantly.
    Refer to the h5py documentation for further details regarding manipulating h5
    files.
  prefs: []
  type: TYPE_NORMAL
- en: NumPy Memory Map
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: 'NumPy memory maps can be seen as a quick and dirty alternative to h5 for mapping
    variables in program to data stored in disk. By wrapping a file path with `np.memmap`,
    a link is created between the variable assigned to the return value of `np.memmap`
    and the file stored in disk. Two of the popular file paths that `np.memmap` accepts
    are `.npy` and `.npz` files, which store NumPy arrays and SciPy sparse matrices,
    respectively. Specifically, a simple usage of NumPy memory maps can be as such:
    `arr = np.memmap("path/to/arr")`. The “`arr`” variable will contain the reference
    to the file stored on disk as specified by the `memmap` call. For details on other
    optional arguments, refer to the documentation of NumPy memory maps.'
  prefs: []
  type: TYPE_NORMAL
- en: Data Encoding
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We define data encoding as the process of making data merely readable to any
    algorithm (feature extraction, feature selection, machine learning models, etc.)
    that may be applied on the dataset afterward (Figure [2-4](#Fig4)). Here, *readable*
    not only means “quantitative” (as discussed in Chapter [1](525591_1_En_1_Chapter.xhtml),
    machine learning models require inputs to somehow be numerically represented)
    but “representative of the nature of the data.” For instance, we could technically
    make a feature containing countries of the world “readable” in the sense that
    there would be no code-run errors by randomly associating a country with a unique
    number – the United Statesto 483.23, Canada to –84, India to ![$$ {e}^{-i\cdotp
    {\sum}_{j=0}^{\infty }j} $$](../images/525591_1_En_2_Chapter/525591_1_En_2_Chapter_TeX_IEq2.png),
    and so on. However, this arbitrary numerical conversion does not represent the
    nature of the feature: there is no relevant relationship between the representations
    that reflects the relationships between the represented things in themselves.
    A numerical representation of a feature, to be “readable,” must be faithful to
    its attributes.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig4_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flow diagram is depicted as follows, raw data; data encoding which is subdivided
    into feature extraction and feature selection; which further leads to preprocessed
    data.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-4
  prefs: []
  type: TYPE_NORMAL
- en: The data encoding component of the data preprocessing pipeline
  prefs: []
  type: TYPE_NORMAL
- en: Discrete Data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We define “discrete” data as data that can only theoretically take on a limited
    set of values. These can be binary features (e.g., “yes” or “no” responses), multiclass
    features (e.g., types of animals), or ordinal data (e.g., education grades or
    tiered features). There are many different mechanisms to represent information
    contained within discrete data, known as *categorical encodings*. This section
    will explore the theory and implementation for these methods.
  prefs: []
  type: TYPE_NORMAL
- en: We’ll be using a selection of the Ames Housing dataset (Figure [2-5](#Fig5))
    to demonstrate these categorical encoding methods. You can load it as such (Listing
    [2-13](#PC13)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A table consists of 1460 rows and ten columns depicting the categorical features
    of the housing dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-5
  prefs: []
  type: TYPE_NORMAL
- en: Visualizing part of the Ames Housing dataset
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: The dataset has many categorical features. While we will only apply categorical
    encoding consistently to one categorical feature, it is encouraged to experiment
    with each of the different features in the dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Label Encoding
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Label encoding is perhaps the simplest and most direct method of encoding discrete
    data – each unique category is associated with a single integer label (Figure
    [2-6](#Fig6)). This is almost always not the final encoding that you should use
    for categorical variables, since attaching encodings in this way forces us to
    make *arbitrary decisions* that lead to *meaningful outcomes.* If we associate
    a category value “Dog” with 1 but “Snake” with 2, the model has access to the
    explicitly coded quantitative relationship that “Snake” is two times “Dog” in
    magnitude or that “Snake” is larger than “Dog.” Moreover, there is no good reason
    “Dog” should be labeled 1 and “Snake” should be labeled 2 instead of vice versa.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig6_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration depicts the two-step process as follows, conversion and encoding.
    In step 1, each animal's name is labeled with an integer. In step 2, the repetition
    of the animal's name leads to the integer assigned to it.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-6
  prefs: []
  type: TYPE_NORMAL
- en: Label encoding
  prefs: []
  type: TYPE_NORMAL
- en: However, label encoding is the basis/primary step upon which many other encodings
    can be applied. Thus, it is useful to understand how to implement it (Listing
    [2-14](#PC14)).
  prefs: []
  type: TYPE_NORMAL
- en: We can implement label encoding from scratch by collecting the unique elements
    with `np.unique()`, mapping each unique element to an index, and then applying
    the mapping to each element in the original array. To create the mapping, we use
    dictionary comprehension, an elegant feature of Python that allows us to quickly
    construct dictionaries with logical structures. We loop through the `enumerate()`
    function, which takes in an array and returns a list of elements “bundled” with
    their respective indices (e.g., `enumerate(['a','b','c'])` yields `[('a', 0),
    ('b', 1), ('c', 2)]`). This can be unpacked and reorganized into a dictionary
    to create the desired mapping.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: Applying from-scratch implementation of label encoding to the `LotShape` feature
    of the dataset yields a satisfactory result (Listing [2-15](#PC15)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: We can then update/replace the original DataFrame with the encoded feature with
    `df['LotShape'] = encoded`.
  prefs: []
  type: TYPE_NORMAL
- en: The `sklearn` library offers an implementation of label encoding (Listing [2-16](#PC16)).
    This is more efficient and convenient than implementing encoding methods by yourself
    and generally suffices unless your problem necessitates a very specialized encoding
    method.
  prefs: []
  type: TYPE_NORMAL
- en: In scikit-learn, the `sklearn.preprocessing.LabelEncoder()` object is used to
    store information about the encoding procedure. After the object is initialized,
    it can be fitted on a provided feature with `.fit(feature)` and then used to transform
    any given input with `.transform(feature)`; alternatively, the two steps can be
    merged into one command with `.fit_transform(feature)`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: 'This object-oriented design is helpful because it allows for additional accessible
    functionality, like inverse encoding, in which we would like to obtain the original
    input from the encoded representation: `classes = encoder.inverse_transform(encoded)`.
    This is helpful when we have a prediction in encoded form (e.g., “2”) and want
    to interpret it by “inverse transforming/encoding” it (e.g., “cat” was encoded
    as “2,” and thus the result of inverse transforming on “2” yields “cat”).'
  prefs: []
  type: TYPE_NORMAL
- en: A more lightweight function that lacks this additional inversion functionality
    is `pandas.factorize(feature)`.
  prefs: []
  type: TYPE_NORMAL
- en: One-Hot Encoding
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: In cases of categorical variables in which no definitive quantitative label
    can be attached, the simplest satisfactory choice is generally *one-hot encoding*.
    If there are *n* unique classes, we create *n* binary columns, each representing
    whether the item belongs to that class or not (Figure [2-7](#Fig7)). Thus, there
    will be one “1” across each of the *n* columns for every row (and all others as
    “0”).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig7_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration exhibits the two-step process as follows, conversion and encoding.
    In step 1, each animal's name is labeled with a 1, and others with a 0\. In step
    2, the repetition of the animal's name and other categories leads to 1 and 0,
    respectively.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-7
  prefs: []
  type: TYPE_NORMAL
- en: One-hot encoding
  prefs: []
  type: TYPE_NORMAL
- en: We can think of one-hot encoding as first applying label encoding to obtain
    some integer label *i* for each item and then generating a matrix where the *i*th
    index of a vector associated with each item is marked as “1” (and all others as
    “0”) (Listing [2-17](#PC17)). This can be implemented by initializing an array
    of zeros with shape `(number of items, number of unique classes)`. For each item,
    we index the appropriate value and set it to 1\. After processing all items, we
    return the encoded matrix.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: 'The encoded result allows us to represent the same information as is present
    in the original raw column without arbitrarily communicating influential quantitative
    assumptions to any model or method that may process it:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: 'Because one-hot encoding is so commonly used, a wide variety of libraries offer
    implementations:'
  prefs: []
  type: TYPE_NORMAL
- en: '`pandas.get_dummies(feature)` takes in an array representing a categorical
    feature and automatically returns the corresponding one-hot encoding. The “dummies”
    in the function name refer to the dummy variables/features in the encoded result,
    which are “artificially created” props – in a certain sense – that allow us to
    faithfully capture data in quantitative form. The Keras deep learning library
    (install with `pip install keras`) also offers a similar lightweight function:
    `keras.to_categorical(feature)`. While being quick to use, the disadvantage is
    that more advanced functionality that may be useful like decoding is not accessible.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`sklearn.preprocessing.OneHotEncoder()` is scikit-learn’s implementation of
    one-hot encoding. Like the Label Encoder, it must be initialized and can then
    be fitted upon input data, and encode it in one command with `encoder.fit_transform(features)`.
    `encoder.inverse_transform(encoded)` can be used to translate one-hot encoded
    data into its original categorical single-feature representation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: TensorFlow/Keras also offers one-hot encoding for text. See the subsection “Text
    Data” of this section to learn more.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: One problem that may arise from using one-hot encoding, however, is *multicollinearity*.
    Multicollinearity occurs when several features are highly correlated such that
    one can reliably be predicted as a linear relationship of the others. In a one-hot
    encoding, the sum of feature values across each row is always 1; if we know the
    values of all other features for some row, we also know the value of the remaining
    feature.
  prefs: []
  type: TYPE_NORMAL
- en: This can become problematic because each feature is no longer independent, whereas
    many machine learning algorithms like *K*-Nearest Neighbors (KNN) and regression
    assume that each dimension of the dataset is not correlated with any other. While
    multicollinearity may only have a marginal negative effect on model performance
    (this can often be addressed with regularization and feature selection – see the
    “Feature Selection” section of this chapter), the larger problem is the effect
    on parameter interpretation. If two independent variables in a Linear Regression
    model are highly correlated, their resulting parameters after training become
    almost meaningless because the model could have performed just as well with another
    set of parameters (e.g., switching the two parameters, ambiguous multiplicity
    of solutions). Highly correlated features act as approximate duplicates, which
    means that the corresponding coefficients are halved as well.
  prefs: []
  type: TYPE_NORMAL
- en: 'One simple method to address multicollinearity in one-hot encoding is to randomly
    drop one (or several) of the features in the encoded feature set. This has the
    effect of disrupting a uniform sum of 1 across each row while still retaining
    a unique combination of values for each item (one of the categories will be defined
    by all zeros, since the feature that would have been marked as “1” was dropped).
    The disadvantage is that the equality of representation across classes of the
    encoding is now unbalanced, which may disrupt certain machine learning models
    – especially ones that utilize regularization. The take-away for best performance:
    choose either regularization + feature selection or column dropping, but not both.'
  prefs: []
  type: TYPE_NORMAL
- en: Column dropping can be implemented in `sklearn` by passing `drop='first'` into
    initializing the `OneHotEncoder` object. Alternatively, you can index a one-hot
    encoded array with shape `(number_items, number_unique_classes)` with `encoded[:,
    1:]`; this removes the first one-hot encoded column.
  prefs: []
  type: TYPE_NORMAL
- en: 'Another problem is *sparsity*: there is a very low information-to-space ratio.
    A new column is created for every unique value. Some machine learning models may
    struggle to learn on such sparse data.'
  prefs: []
  type: TYPE_NORMAL
- en: In modern deep learning, one-hot encoding is a widely accepted standard. (Many
    libraries, like Keras/TensorFlow – which we will use for neural network modeling
    – accept label-encoded inputs for the sake of class differentiation and perform
    one-hot encoding behind the scenes for you.) Neural networks used today are generally
    deep and powerful enough to effectively work with one-hot encoding. However, in
    many cases – especially with traditional machine learning models and shallow neural
    networks – alternative categorical encoding techniques may perform better.
  prefs: []
  type: TYPE_NORMAL
- en: Binary Encoding
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Two weaknesses of one-hot encoding – sparsity and multicollinearity – can be
    addressed, or at least improved, with *binary encoding*. The categorical feature
    is label encoded (i.e., each unique category is associated with an integer); the
    labels are converted to binary form and transferred to a set of features in which
    each column is one place value (Figure [2-8](#Fig8)). That is, a column is created
    for each digit place of the binary representation.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig8_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Two sets of tables for conversion and encoding. In conversion, each animal's
    name is labeled and binary encoded. In encoding, the repetition of the animal's
    name leads to the respective integers.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-8
  prefs: []
  type: TYPE_NORMAL
- en: Binary encoding
  prefs: []
  type: TYPE_NORMAL
- en: Because we use binary representations rather than allocating one column per
    unique class, we more compactly represent the same information (i.e., the same
    class has the same combination of “1”s and “0”s across the features) at the cost
    of decreased interpretability (i.e., it’s not clear what each column represents).
    Moreover, there is no reliable multicollinearity between each of the features
    used to represent the categorical information.
  prefs: []
  type: TYPE_NORMAL
- en: 'We can implement binary encoding from scratch by first obtaining the label
    encodings for a given array and then converting them into binary (Listing [2-18](#PC19)).
    Here’s the pseudocode, given step-by-step:'
  prefs: []
  type: TYPE_NORMAL
- en: Obtain integer label encodings for the array.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Find the “maximum place” of the binary representation – this is the maximum
    number of places we need to allocate to store a binary representation of the label.
    For instance, the number “9” is 1001 (1 · 2³ + 0 · 2² + 0 · 2¹ + 1 · 2⁰); this
    means that we need four places to represent it. We need to find the maximum place
    to determine the size of the encoded matrix: (number of elements, maximum place).
    This can be calculated as ⌊*v* ⌋, where *v* is a list of label-encoded integers.
    Taking the floor of the base-2 logarithm of *v* returns the largest power to which
    2 can be raised to yield a value less than *v* . We add 1 to account for the additional
    place taken up by *c* · 2⁰.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Allocate an array of zeros with shape (number of elements, maximum place).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For each item in the array
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Perform integer division between the current label-encoded value and 2 to the
    current place. This will either be 0 or 1, indicating whether the current label-encoded
    value is larger or smaller than 2 to the current place. This value will be marked
    in the associated encoding matrix.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Set the current-label encoded value to the remainder yielded by dividing by
    2 to the current place. This allows us to “remove” the current place and focus
    on the “next” place.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Obtain the associated label encoding.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: For each place beginning from the maximum place to 0 (counting backward)
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: 'The result of binary-encoding the sample array `[''a'', ''b'', ''c'', ''c'',
    ''d'', ''d'', ''d'', ''e'']` is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: Binary encoding is supported by `category_encoders` (Listing [2-19](#PC21),
    Figure [2-9](#Fig9)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A table consists of three columns indicating the features and the datasets in
    the rows for housing.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-9
  prefs: []
  type: TYPE_NORMAL
- en: Binary encoding on a feature from the Ames Housing dataset
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: Frequency Encoding
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Label encoding, one-hot encoding, and binary encoding each offer methods of
    encoding that reflect the “pure identity” of each unique class; that is, we devise
    quantitative methods to assign a unique identity to each class.
  prefs: []
  type: TYPE_NORMAL
- en: However, we can both assign unique values to each class *and* communicate additional
    information about each class at once. To frequency-encode a feature, we replace
    each categorical value with the proportion of how often that class appears in
    the dataset (Figure [2-10](#Fig10)). With frequency encoding, we communicate how
    often that class appears in the dataset, which may be of value to whatever algorithm
    is processing it.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig10_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A set of tables indicates the frequency encoding process in which the number
    of times the city name is repeated gives its frequency, which leads to encoding.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-10
  prefs: []
  type: TYPE_NORMAL
- en: Frequency encoding
  prefs: []
  type: TYPE_NORMAL
- en: Like one-hot encoding and binary encoding, we attach a unique quantitative representation
    to each class (although frequency encoding does not guarantee a unique quantitative
    representation, especially in small datasets). With this encoding scheme, however,
    the actual value of the representation lies on a continuous scale, and quantitative
    relationships between the encodings are not arbitrary but instead communicate
    some piece of information. In the preceding example, “Denver” is “three times”
    Miami because it appears three times as often in the dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Frequency encoding is the most powerful when the dataset is representative and
    free of bias. If this is not the case, the actual quantitative encodings may be
    meaningless in the sense of not providing relevant and truthful/representative
    information for the purposes of modeling.
  prefs: []
  type: TYPE_NORMAL
- en: To implement frequency encoding (Listing [2-20](#PC22)), we can begin by obtaining
    the unique labels and how often they appear in the provided feature with `np.unique(arr,
    return_counts=True)`. Then, we’ll scale the frequencies to be between 0 and 1,
    build a mapping dictionary to map each label to a frequency, create a mapping
    function to apply the dictionary, and push the array into a vectorized mapping
    function.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: We can call `frequency_encoding()` on `df['LotShape']`, which yields `array([0.63,
    0.63, 0.33, ..., 0.63, 0.63, 0.63])` (values have been rounded to two decimal
    places with `np.round(arr, 2)`).
  prefs: []
  type: TYPE_NORMAL
- en: The category encoders library (`pip install category_encoders`) contains scikit-learn-style
    implementations for additional categorical encoding schemes like frequency encoding.
    The syntax will look familiar (Listing [2-21](#PC23)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: 'The result is a DataFrame with one column (Figure [2-11](#Fig11)). This is
    one advantage of using `category_encoders`: it is built to accept and return multiple
    different common data science storage objects. Thus, we can pass in a DataFrame
    column and receive a DataFrame column in return, rather than needing to integrate
    the encoded NumPy array with the original DataFrame afterward. If you desire a
    NumPy array output, set `return_df = False` in the initialization of the encoder
    object (this is `True` by default).'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig11_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A table consists of two columns titled lotshape listing the dataset and its
    frequencies.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-11
  prefs: []
  type: TYPE_NORMAL
- en: Frequency encoding on a feature from the Ames Housing dataset
  prefs: []
  type: TYPE_NORMAL
- en: Note that the `category_encoders` implementation of frequency encoding does
    not scale the frequencies between 0 and 1, but rather associates each class with
    the raw count (number of times it appears in the dataset). You can force scaling
    by passing `normalize = True` into the `CountEncoder()` initialization.
  prefs: []
  type: TYPE_NORMAL
- en: You can also pass an entire DataFrame into `encoder.fit_transform` or `encoder.fit`.
    If you do not desire for all categorical columns to automatically be encoded via
    frequency encoding, specify which columns to encode via `cols = ['col_name_1',
    'col_name_2', ...]`.
  prefs: []
  type: TYPE_NORMAL
- en: Target Encoding
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Frequency encoding is often unsatisfactory because it often doesn’t directly
    reflect information in a class that is directly relevant to a model that uses
    it. Target encoding is an attempt to model the relationship more directly between
    the categorical class *x* and the dependent variable *y* to be predicted by replacing
    each class with the mean or median (respectively) value of *y* for that class.
    It is assumed that the target class is already in quantitative form, although
    the target does not necessarily need to be continuous (i.e. a regression problem)
    to be used in target encoding. For instance, taking the mean of binary classification
    labels, which are either 0 or 1, gives insight into the proportion of items in
    the dataset with that class that were associated with class 0 (Figures [2-12](#Fig12)
    and [2-13](#Fig13)). This can be interpreted as the probability the item belongs
    to a target class given only one independent feature.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig13_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A set of tables indicates the target encoding process in which each city name
    is assigned an age, which leads to calculating the median values, which further
    leads to the encoded values.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-13
  prefs: []
  type: TYPE_NORMAL
- en: Target encoding using the median
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig12_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A set of tables depicts the target encoding process in which each city name
    is assigned an age, which leads to calculating the mean values, which further
    leads to the encoded values.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-12
  prefs: []
  type: TYPE_NORMAL
- en: Target encoding using the mean
  prefs: []
  type: TYPE_NORMAL
- en: Note that target encoding can lead to data leakage if encoding is performed
    before the training and validation sets are split, since the averaging function
    incorporates information from both the training and validation sets. In order
    to prevent this, encode the training and validation sets separately after splitting.
    If the validation dataset is too small, target-encoding the set independently
    may yield skewed, unrepresentative encodings. In this case, you can use averages
    per class from the training dataset. This form of “data leakage” is not inherently
    problematic, since we are using training data to inform operation on the validation
    set rather than using validation data to inform operation on the training set.
  prefs: []
  type: TYPE_NORMAL
- en: To implement target encoding (Listing [2-22](#PC24)), we need to accept both
    the categorical feature (we’ll call this `x`) and the target feature (we’ll call
    this `y`). We’ll create a mapping dictionary that maps each unique categorical
    value to the mean or median of all values in `y` that corresponds with that categorical
    value. Then, we will define a function that uses the mapping to return the encoding
    given the class and apply a vectorized version of it to the given feature `x`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: The `category_encoders` library also supports target encoding (Listing [2-23](#PC25),
    Figure [2-14](#Fig14)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig14_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A table lists the final values arrived at using the target encoding for various
    datasets.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-14
  prefs: []
  type: TYPE_NORMAL
- en: Result of using target encoding with category_encoders
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
- en: Note that this implementation offers more advanced functionality, including
    support for multi-categorical targets. The feature to be encoded is replaced with
    a combination of the *posterior probability* of the target given a certain label
    and the *prior probability* of the target over all the data. Think of it as a
    generalization to the idea of representing the relationship between a categorical
    value and a continuous target by replacing each categorical value with the “expected
    value” for that label.
  prefs: []
  type: TYPE_NORMAL
- en: 'Like all `category_encoders` encoding objects, you can choose which columns
    you want to encode if providing a DataFrame with `cols = [...]` and determine
    the return type with `return_df = True/False`. This particular encoder offers
    two additional specifications: `min_samples_leaf`, which is the minimum number
    of data samples required to consider the average of the category (set this high
    to ideally remove the negative effects of poorly represented data points), and
    smoothing, which is a floating-point value larger than zero that controls the
    balance between the categorical average and the prior for categorical targets.
    A higher value more strongly regularizes the balance. Generally, there is no need
    to adjust this.'
  prefs: []
  type: TYPE_NORMAL
- en: Leave-One-Out Encoding
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Mean-based target encoding can be quite powerful, but it suffers from the presence
    of outliers. If outliers are present that skew the mean, their effects are imprinted
    across the entire dataset. Leave-one-out encoding is a variation on the target
    encoding scheme by leaving the “current” item/row out of consideration when calculating
    the mean for all items of that class (Figure [2-15](#Fig15)). Like target encoding,
    encoding should be performed separately on training and validation sets to prevent
    data leakage.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig15_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A set of tables depicts the three-step process as follows. In step 1, each city
    name is assigned various ages. In step 2, the average values are determined. In
    step 3, the values are encoded.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-15
  prefs: []
  type: TYPE_NORMAL
- en: Leave-one-out-encoding using the mean
  prefs: []
  type: TYPE_NORMAL
- en: Leave-one-out encoding can be interpreted as an extreme case of the *k*-fold
    data splitting scheme, in which *k* is equal to the dataset length and thus the
    “model” (in this case a simple averaging function) is applied to all relevant
    items except one (Listing [2-24](#PC26)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE25]'
  prefs: []
  type: TYPE_PRE
- en: Leave-one-out encoding is supported by `category_encoders` (Listing [2-25](#PC27),
    Figure [2-16](#Fig16)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig16_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A table lists the encoded value for a feature from the housing dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-16
  prefs: []
  type: TYPE_NORMAL
- en: Leave-one-out encoding on a feature from the Ames Housing dataset
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE26]'
  prefs: []
  type: TYPE_PRE
- en: James-Stein Encoding
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Target encoding and leave-one-out encoding assume that each categorical feature
    is directly and linearly related to the dependent variable. We can take a more
    sophisticated approach to encoding with James-Stein encoding by incorporating
    both the *overall mean for a feature* and the *individual mean per class for a
    feature* into an encoding (Figure [2-17](#Fig17)). This is achieved by defining
    the encoding for a category as a weighted sum of the overall mean ![$$ \underset{\_}{y}
    $$](../images/525591_1_En_2_Chapter/525591_1_En_2_Chapter_TeX_IEq3.png) and individual
    mean per class ![$$ \underset{\_}{y_i} $$](../images/525591_1_En_2_Chapter/525591_1_En_2_Chapter_TeX_IEq4.png)via
    a parameter *β*, which is bounded by 0 ≤ *β* ≤ 1:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Encoded\ for\ category\ i=\beta \cdotp \underset{\_}{y}+\left(1-\beta
    \right)\cdotp \underset{\_}{y_i} $$](../images/525591_1_En_2_Chapter/525591_1_En_2_Chapter_TeX_Equa.png)'
  prefs: []
  type: TYPE_IMG
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig17_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A set of tables indicates the four-step process as follows. In step 1, each
    city name is assigned various ages. In step 2, the mean values are determined.
    In steps 3 and 4, the values are calculated and encoded, respectively.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-17
  prefs: []
  type: TYPE_NORMAL
- en: James-Stein encoding
  prefs: []
  type: TYPE_NORMAL
- en: When *β* = 0, James-Stein encoding is the same as mean-based target encoding.
    On the other hand, when *β* = 1, James-Stein encoding replaces all values in a
    column with the average dependent variable value, regardless of individual class
    values.
  prefs: []
  type: TYPE_NORMAL
- en: 'Charles Stein, a statistician and professor of statistics at Stanford University,
    proposed a formula to find *β* rather than manually tuning it. Group variance
    is the variance of the dependent variable within the relevant class, whereas population
    variance is the overall variance of the dependent variable without regard to class:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \beta =\frac{\left( group\ variance\right)}{\left( group\ variance\right)+\left(
    population\ variance\right)} $$](../images/525591_1_En_2_Chapter/525591_1_En_2_Chapter_TeX_Equb.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Variance is important to understanding how relevant the mean is as a representative
    of the class, or *uncertainty*. Ideally, we would like to set a high *β* when
    we are unsure about how representative the mean is for a certain class. This allows
    the mean of the overall dependent variable to be given higher weight over the
    mean for the specific class. Likewise, we desire a low *β* when there is low uncertainty
    associated with the mean for a certain class. This is represented quantitatively
    by Stein’s formula: if the group variance is significantly lower than the population
    variance (i.e., the values for a specific class vary less, and thus we are more
    “sure”/”certain” that the mean for that class is representative), *β* is close
    to 0; it is closer to 1 if otherwise.'
  prefs: []
  type: TYPE_NORMAL
- en: James-Stein encoding is implemented in the `category_encoders` library (Listing
    [2-26](#PC28), Figure [2-18](#Fig18)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig18_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A table has two columns headed lotshape, which lists the encoded value for a
    feature from the housing dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-18
  prefs: []
  type: TYPE_NORMAL
- en: James-Stein encoding on a feature from the Ames Housing dataset
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE27]'
  prefs: []
  type: TYPE_PRE
- en: Weight of Evidence
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'The weight of evidence (WoE) technique originated from credit scoring; it was
    used to measure how “separable” good customers (paid back a loan) were from bad
    customers (defaulted on a loan) across a group *i* (this could be something like
    customer location, history, etc.):'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ WoE\ for\ group\ i= lnln\ \frac{\% good\ customers\ in\ group\ i}{\% bad\
    customers\ in\ group\ i} $$](../images/525591_1_En_2_Chapter/525591_1_En_2_Chapter_TeX_Equc.png)'
  prefs: []
  type: TYPE_IMG
- en: For instance, let’s say that within the subset of customers who brushed their
    teeth at least three times a day (we won’t consider how the loaner got this information),
    75% paid back the loan (good customers) and 25% defaulted (bad customers). Then,
    the weight of evidence for the group with respect to the feature/attribute “brushed
    teeth at least three times a day” is ![$$ lnln\ \frac{75}{25}= lnln\ 3\approx
    1.09 $$](../images/525591_1_En_2_Chapter/525591_1_En_2_Chapter_TeX_IEq5.png).
    This is a moderately high weight of evidence and means that the suggested feature/attribute
    separates good and bad customers well.
  prefs: []
  type: TYPE_NORMAL
- en: 'This concept can be used as an encoding for categorical features with a binary-categorical
    dependent variable:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ WoE\ for\ class\ value\ i= lnln\ \frac{\% target=0\ and\ feature\ i}{\%
    target=1\ and\ feature\ i} $$](../images/525591_1_En_2_Chapter/525591_1_En_2_Chapter_TeX_Equd.png)'
  prefs: []
  type: TYPE_IMG
- en: Weight of evidence is often presented as representing how much the *evidence*
    undermines or supports the *hypothesis*. In the context of categorical encoding,
    the “hypothesis” is that the selected categorical feature can cleanly divide classes
    such that we can reliably predict which class an item falls in given only information
    about its inclusion or exclusion from the group *i*. The “evidence” is the actual
    distribution of target values within a certain group *i*.
  prefs: []
  type: TYPE_NORMAL
- en: We can also generalize this to multiclass problems by finding the WoE for each
    class, in which “class 0” is “in class” and “class 1” is “not in class”; the weight
    of evidence of the complete dataset can then be found by somehow aggregating the
    individual class-specific WoE calculation, for example, by taking the mean.
  prefs: []
  type: TYPE_NORMAL
- en: Using this multiclass WoE logic, we can also apply WoE to continuous target/regression
    problems by discretizing the target into *n* categorical buckets. This converts
    the continuous target into a categorical one. The buckets can be constructed either
    by equally long ranges (i.e., from *a* ≤ *x* < *a* + *b* → *class* 1, *a* + *b* ≤ *x* < *a* + 2*b* → *class* 2,
    *a* + 2*b* ≤ *x* < *a* + 3*b* → *class* 3, etc.) or by equally sized bins (i.e.,
    0th–10th percentiles in class 1, 10th–20th percentiles in class 2, etc.).
  prefs: []
  type: TYPE_NORMAL
- en: The weight of evidence encoder is supported by `category_encoders`; however,
    the target variable must be binary-categorical. If you wish to apply weight of
    evidence to multiclass or continuous target variable contexts, you must perform
    preprocessing required by yourself.
  prefs: []
  type: TYPE_NORMAL
- en: Weight of evidence generally doesn’t work well when performed after training-validation
    split for obvious reasons – we can’t calculate an accurate weight of evidence
    for a group without a very sizable number and representative sample of members
    in that group. For this reason, it is best to perform weight of evidence encoding
    on the dataset altogether and separate later. To prevent target leakage, the `category_encoders`
    implementation introduces additional regularization schemes (Listing [2-27](#PC29),
    Figure [2-19](#Fig19)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig19_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A table has two columns titled lotshape, which lists the encoded value for a
    feature from the housing dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-19
  prefs: []
  type: TYPE_NORMAL
- en: Weight of evidence encoding on a feature from the Ames Housing dataset
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE28]'
  prefs: []
  type: TYPE_PRE
- en: Continuous Data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Continuous quantitative data is often already in a state that is technically
    readable, but many algorithms assume a certain shape or distribution that we need
    to satisfy as well.
  prefs: []
  type: TYPE_NORMAL
- en: Min-Max Scaling
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Min-max scaling generally refers to the scaling of the range of a dataset such
    that it is between 0 and 1 – the minimum value of the dataset is 0, and the maximum
    is 1, but the relative distances between points remain the same.
  prefs: []
  type: TYPE_NORMAL
- en: The scaled version of an array *x* is ![$$ {x}_{scaled}=\frac{x-x\ }{x-x\ }
    $$](../images/525591_1_En_2_Chapter/525591_1_En_2_Chapter_TeX_IEq6.png). The numerator,
    *x* − *x* , shifts the dataset such that the lowest value is at 0 and the highest
    is at *x* − *x* . Dividing by the highest value yields the lowest value (still)
    at 0 and the highest value at 1\. Because scaling only shifts and stretches/shrinks
    the elements in the array, we do not change the relative distances between points.
    Since machine learning algorithms work off relative distances between points (i.e.,
    drawing boundaries and landscapes through the feature space), we have retained
    the dataset’s modeling information capacity. However, we do not explicitly center
    the data and destroy sparsity, but rather control the end points.
  prefs: []
  type: TYPE_NORMAL
- en: 'Min-max scaling can be implemented as `min_max(arr) = lambda arr: (arr – np.min(arr))
    / (np.max(arr) – np.min(arr))` using NumPy.'
  prefs: []
  type: TYPE_NORMAL
- en: '`sklearn` also supports an implementation of min-max scaling with the `MinMaxScaling`
    object; you can pass in custom ranges (the default being between 0 and 1 inclusive)
    for specialized cases like standard image scaling, which uses the [0, 255] integer
    range (Listing [2-28](#PC30)). For distributions that are already centered at
    0, it may be wiser to scale between [–1, 1] rather than [0, 1] to preserve 0-centering.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE29]'
  prefs: []
  type: TYPE_PRE
- en: We can visualize the effect of min-max scaling on a random distribution with
    mean 5 and standard deviation 1 (Listing [2-29](#PC31), Figure [2-20](#Fig20)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig20_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A bar graph plots the original and normalized distributions. The values for
    the normalized and original distributions are plotted between 0 and 1, and 2 and
    8, respectively. Values are approximated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-20
  prefs: []
  type: TYPE_NORMAL
- en: Original distribution vs. normalized/min-max scaled distribution
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE30]'
  prefs: []
  type: TYPE_PRE
- en: Robust Scaling
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: From the formula for min-max scaling, we see that each scaled value of the dataset
    is directly impacted by the maximum and minimum values. Hence, outliers significantly
    impact the scaling operation. We can demonstrate their effect by introducing five
    instances of the value “30” into our previous example distribution of mean 5 and
    standard deviation 1 (Listing [2-30](#PC32), Figure [2-21](#Fig21)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig21_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A bar graph plots the outlier values for the original and normalized distributions.
    The values for the original and normalized distributions are clustered near 5
    and 0, respectively. Values are approximated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-21
  prefs: []
  type: TYPE_NORMAL
- en: Demonstrating the deleterious effect of outliers on min-max scaling
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE31]'
  prefs: []
  type: TYPE_PRE
- en: Zooming in to further understand the effect of adding a few outlier values,
    we find that the entire remainder of the distribution is squeezed toward one end
    just to fit the entire dataset within the set [0, 1] range (Figure [2-22](#Fig22)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig22_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A bar graph plots the outlier values for the original and normalized distributions.
    The value for the original distribution is negligible, and the values for normalized
    distributions are plotted between 0.0 and 0.2\. Values are approximated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-22
  prefs: []
  type: TYPE_NORMAL
- en: Demonstrating the deleterious effect of outliers on min-max scaling, zoomed
    in
  prefs: []
  type: TYPE_NORMAL
- en: 'Sometimes, however, we don’t need values to strictly be between 0 and 1\. We
    just want the dataset to be within a specific local range; to make our scaling
    method less vulnerable to outliers, we can manipulate the dataset using elements
    more “within” the dataset rather than on the “outside” with the first, second,
    and third quartiles:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {x}_{robust\ scaled}=\frac{x- median\ x}{3 rd\ quartile\ x-1 st\ quartile\
    x} $$](../images/525591_1_En_2_Chapter/525591_1_En_2_Chapter_TeX_Eque.png)'
  prefs: []
  type: TYPE_IMG
- en: Robust scaling subtracts the median value from all values in the dataset and
    divides by the interquartile range (Figure [2-23](#Fig23)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig23_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A bar graph plots the outlier values for the original and robust scaled distributions.
    The values for the original and robust scaled distributions are densely clustered
    near 5 and 0, respectively. Values are approximated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-23
  prefs: []
  type: TYPE_NORMAL
- en: Original distribution vs. robust-scaled distribution
  prefs: []
  type: TYPE_NORMAL
- en: Zooming in to the primary “bulk” or “mass” of the distribution, we see that
    even while robust scaling roughly centers the distribution at 0, the values are
    spread relatively evenly without being affected by the presence of outliers. While
    the outlier still remains an outlier relative to the primary “mass” of the distribution,
    the scaled distribution is no longer held dependent on a few outliers (Figures
    [2-24](#Fig24) and [2-25](#Fig25)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig25_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Two bar graphs plot the values normalized and robust scaled on outlier data.
    In the first and second graphs, the values are denser between 0.2 and 0.8, and
    negative 1.5 and 1.5, respectively. Values are approximated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-25
  prefs: []
  type: TYPE_NORMAL
- en: Normalized distribution with outliers removed vs. (zoomed-in) robust scaling
    on the data with outliers
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig24_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A bar graph plots the values for the original distribution. The values plotted
    gradually increase from a negative 2.0, peak at 0.0, and then decrease gradually
    to 1.5 on the x-axis. Values are approximated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-24
  prefs: []
  type: TYPE_NORMAL
- en: Original distribution
  prefs: []
  type: TYPE_NORMAL
- en: 'Robust scaling can be implemented as `robust(arr) = lambda arr: (arr – np.median(arr))
    / (np.quantile(arr, 3/4) – np.quantile(arr, 1/4))` using NumPy.'
  prefs: []
  type: TYPE_NORMAL
- en: '`sklearn` supports robust scaling with the `RobustScaler` object (Listing [2-31](#PC33)).'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE32]'
  prefs: []
  type: TYPE_PRE
- en: Standardization
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: More commonly, machine learning algorithms assume that data is *standardized*
    – that is, in the form of a normal distribution with unit variance (standard deviation
    of 1) and zero mean (centered at 0). Assuming the input data is already somewhat
    normally distributed, standardization subtracts the dataset’s mean and divides
    by the dataset’s standard deviation. This has the effect of shifting the dataset
    mean to 0 and scaling the standard deviation to 1 (Figure [2-26](#Fig26)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig26_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A bar graph plots count versus distribution. The values plotted for standardized
    distribution lie between negative 2 and 2\. The values plotted for the original
    distribution lie between 3 and 8\. Values are estimated.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-26
  prefs: []
  type: TYPE_NORMAL
- en: Original distribution vs. standardized distribution
  prefs: []
  type: TYPE_NORMAL
- en: 'First, let us prove that subtracting the mean ![$$ \mu ={\sum}_{i=1}^n\frac{x_i}{n}
    $$](../images/525591_1_En_2_Chapter/525591_1_En_2_Chapter_TeX_IEq7.png) from a
    dataset yields a new mean of 0:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\mu}_{scaled}={\sum}_{i=1}^n\frac{x_i-\mu }{n}={\sum}_{i=1}^n\frac{x_i}{n}-{\sum}_{i=1}^n\frac{\mu
    }{n}={\sum}_{i=1}^n\frac{x_i}{n}-\mu =\mu -\mu =0 $$](../images/525591_1_En_2_Chapter/525591_1_En_2_Chapter_TeX_Equf.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The standard deviation is defined as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \sigma =\sqrt{\frac{\sum_{i=1}^n{\left({x}_i-\mu \right)}^2}{n}} $$](../images/525591_1_En_2_Chapter/525591_1_En_2_Chapter_TeX_Equg.png)'
  prefs: []
  type: TYPE_IMG
- en: 'However, when we divide the dataset by the standard deviation, the mean has
    already been shifted to 0 by subtracting the mean in the previous step. The formula
    can thus be rewritten as follows, assuming *x*[*i*] = *x*[*i*] − *μ* (i.e., an
    already-shifted quantity):'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \sigma =\sqrt{\frac{\sum_{i=1}^n{x}_i^2}{n}} $$](../images/525591_1_En_2_Chapter/525591_1_En_2_Chapter_TeX_Equh.png)'
  prefs: []
  type: TYPE_IMG
- en: 'When we divide each mean-shifted element *x*[*i*] by the standard deviation
    *σ*, the resulting standard deviation (and variance) is 1:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\sigma}_{scaled}=\sqrt{\frac{\sum_{i=1}^n{\left(\frac{x_i}{\sigma}\right)}^2}{n}}=\sqrt{\frac{1}{\sigma^2}\cdotp
    \frac{\sum_{i=1}^n{x}_i^2}{n}}=\frac{1}{\sigma}\cdotp \sqrt{\ \frac{\sum_{i=1}^n{x}_i^2}{n}}=\frac{1}{\sigma}\cdotp
    \sigma =1 $$](../images/525591_1_En_2_Chapter/525591_1_En_2_Chapter_TeX_Equi.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Standardization can be implemented as `standardize(arr) = lambda arr: (arr
    – np.mean(arr)) / np.std(arr)` using NumPy.'
  prefs: []
  type: TYPE_NORMAL
- en: '`sklearn` supports standardization with the `StandardScaler` object (Listing
    [2-32](#PC34)).'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE33]'
  prefs: []
  type: TYPE_PRE
- en: 'Note that estimates for the standard deviation and mean can be skewed by the
    presence of outliers, which makes robust scaling a good alternative to standardization
    as well. In robust scaling, outlier-robust statistical alternatives are used:
    median instead of mean, interquartile range instead of standard deviation.'
  prefs: []
  type: TYPE_NORMAL
- en: Text Data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Humans interact most naturally through text and language, so it is not surprising
    that non-categorical text makes up a significant part of many tabular datasets.
    Text can appear as a customer review, a Twitter biography, or website data.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: “Non-categorical text” refers to text that cannot be encoded in quantitative
    form via a categorical encoding method because text samples are too different
    from one another (i.e., there are too many unique classes or too few samples per
    class).
  prefs: []
  type: TYPE_NORMAL
- en: We would like to incorporate information from text data into our models. In
    future chapters, we will demonstrate how to build advanced multimodal multi-head
    models that simultaneously consider text inputs along with other forms of data.
    This section, however, explores various quantitative representation (*vectorization*)
    methods and how they can be used with classical machine learning models introduced
    in Chapter [1](525591_1_En_1_Chapter.xhtml), the “Algorithms” section.
  prefs: []
  type: TYPE_NORMAL
- en: In this section, we’ll work with the well-known SMS Spam Collection Dataset
    by the University of California Irvine Machine Learning Repository (UCIMLR). It
    is available on Kaggle at [`www.kaggle.com/uciml/sms-spam-collection-dataset`](https://www.kaggle.com/uciml/sms-spam-collection-dataset)
    or on the UCIMLR website at [`https://archive.ics.uci.edu/ml/datasets/SMS+Spam+Collection`](https://archive.ics.uci.edu/ml/datasets/SMS%252BSpam%252BCollection).
  prefs: []
  type: TYPE_NORMAL
- en: After elementary cleaning, the dataset should be stored in a Pandas DataFrame
    called `data` with two columns, `isSpam` and `text` (Figure [2-27](#Fig27)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig27_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A table lists the spam and texts collected for various datasets.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-27
  prefs: []
  type: TYPE_NORMAL
- en: Visualization of part of the SMS Spam Collection Dataset
  prefs: []
  type: TYPE_NORMAL
- en: Since we’ll be evaluating the result of models trained on different text encoding
    schemes, we’ll also need to perform train-validation splitting (Listing [2-33](#PC35)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE34]'
  prefs: []
  type: TYPE_PRE
- en: Note that throughout this section, we will present simplified methods for processing
    text. While one should generally use more thorough approaches like intensive cleaning,
    lemmatization, stop word removal, etc., deep learning models are generally sophisticated
    enough to handle these specifics, and therefore such considerations are less necessary.
    You’ll apply deep learning hands-on to text data in Chapters [5](525591_1_En_5_Chapter.xhtml)
    (recurrent neural networks) and 6 (attention and transformers).
  prefs: []
  type: TYPE_NORMAL
- en: Keyword Search
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: One of the simplest ways to obtain a quantitative representation of textual
    data is to determine if certain predetermined keywords appear in the text or not
    (Listing [2-34](#PC36)). This is a very simple, limited, and naïve method. Under
    the right circumstances, however, it can suffice and serve as a good benchmark
    model.
  prefs: []
  type: TYPE_NORMAL
- en: Some keywords that often appear in spam messages attempting to advertise a product
    are “buy,” “free,” and “win.” We can build a simple model that checks if any of
    these keywords are in a given text sample. If it is present, the text is designated
    as spam; otherwise, it is designated as ham (safe).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE35]'
  prefs: []
  type: TYPE_PRE
- en: We can evaluate the accuracy of such a model to understand its performance (Listing
    [2-35](#PC37)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE36]'
  prefs: []
  type: TYPE_PRE
- en: The resulting accuracy is about 88.1%, which may seem pretty good. However,
    a model that returns “0” all the time (`predict = lambda x:0`) obtains an accuracy
    of about 86.6%. Because of the dataset imbalance, a more reflective metric is
    the F1 score (Listing [2-36](#PC38)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE37]'
  prefs: []
  type: TYPE_PRE
- en: The F1 score of the keyword search model is about 0.437, whereas a model that
    predicts the label 0 for any instance obtains a score of 0.0 (as expected).
  prefs: []
  type: TYPE_NORMAL
- en: Raw Vectorization
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Raw vectorization can be thought of as “one-hot encoding” for text: it is an
    explicit quantitative representation of the information contained within text
    (Figure [2-28](#Fig28)). Rather than assigning each text a unique class, texts
    are generally vectorized as a sequence of *language units*, like characters or
    words. These are also referred to as *tokens*. Each of these words or characters
    is considered to be a unique class, which can be one-hot encoded. Then, a passage
    of text is a sequence of one-hot encodings.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig28_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A table consists of 5 columns and 7 rows. The column headers are the, dog, jumped,
    over, and second. Row headers are as follows, the, dog, jumped, over, the, second,
    and dog. The values for the same headers are 1 and 0 for others.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-28
  prefs: []
  type: TYPE_NORMAL
- en: Raw vectorization
  prefs: []
  type: TYPE_NORMAL
- en: Consider the following small example text dataset, with punctuation stripped
    and lowercase capitalization (Listing [2-37](#PC39)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE38]'
  prefs: []
  type: TYPE_PRE
- en: 'One proposed implementation (Listing [2-38](#PC40)) is as follows: we loop
    through each item and individually one-hot encode a list representation using
    the `one_hot_encoding` function defined in the “Discrete Data” section. Then,
    we apply the `raw_vectorize` function to each text in the `texts` array and convert
    the NumPy array into a list. Using list comprehension, we aggregate the one-hot
    encodings into a nested list, which can be recast as a NumPy array.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE39]'
  prefs: []
  type: TYPE_PRE
- en: 'When running this code, we receive a `VisibleDepreciationWarning`, which already
    should set off alarm bells:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE40]'
  prefs: []
  type: TYPE_PRE
- en: This indicates that each element in the array is not the same length; the standard
    *n*-d array supports only elements with the same shapes. Thus, NumPy stores the
    data rather awkwardly as an array of list objects to accommodate for different
    element sizes.
  prefs: []
  type: TYPE_NORMAL
- en: 'Investigating further, we find that the first element is represented using
    five binary features: `len(raw_vectorized[0][0])` returns `5`. Here, `raw_vectorized[0]`
    is the encoding for the first element of `texts`, and `raw_vectorized[0][0]` is
    the encoding for the first token of the first element. The second element is represented
    using six binary features and the third using five again! It is very problematic
    if our vector representation does not use the same number of features to represent
    each sample.'
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: While it is problematic that this approach represents each sample using a different
    number of binary features, it is *not an issue* that each sample has a different
    shape. This is because different text samples inherently have a different number
    of tokens; while we want to make sure that we are representing tokens the same
    way across all samples, it is alright that the number of tokens differs. We will
    discuss models that can handle variable-sized sequence inputs in later chapters
    (recurrent models) and techniques to address variability in vectorized sample
    length like *padding*, which adds “blank” tokens to the end of short sequences.
  prefs: []
  type: TYPE_NORMAL
- en: The error here is that we are determining the mapping on a sample-by-sample
    basis, but each sample’s vocabulary is very unlikely to represent the vocabulary
    of the entire texts. This not only yields a different number of binary features
    to represent each token (this is the symptom) but – more importantly – causes
    differences in how each unique token is matched to a unique binary column. In
    one text sample, the token “dog” may be indicated with a “1” in the third column
    of a one-hot encoding matrix in one element, but marked in the second column for
    a different element. This inconsistency in what columns represent completely destroys
    the broader dataset’s informational value.
  prefs: []
  type: TYPE_NORMAL
- en: To address this, we first pool all the texts together to obtain the global vocabulary
    and create a universal mapping dictionary that applies to all elements in a consistent
    fashion (Listing [2-39](#PC42)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE41]'
  prefs: []
  type: TYPE_PRE
- en: This method of vectorization is popular in deep learning, because the complexity
    and power of neural networks are capable of handling and making sense of these
    very high-dimensional text representations. However, classical machine learning
    algorithms like the ones introduced in Chapter [1](525591_1_En_1_Chapter.xhtml)
    struggle to produce good results (unless in rare circumstances in which the text
    samples are short and the vocabulary size/number of unique language units is small).
  prefs: []
  type: TYPE_NORMAL
- en: TensorFlow/Keras offers an implementation of one-hot encoding using the `Tokenizer`
    object (Listing [2-40](#PC43)). The `Tokenizer` automatically removes stop words
    (semantically “meaningless” words like “a,” “an,” “the,” etc. that contribute
    more to grammar/convention than content) and performs other preprocessing for
    you. In this implementation, each token is associated with an integer rather than
    a one-hot representation of that integer (i.e., an array of 0s with one element
    marked as a 1). While you can explicitly one-hot encode this representation if
    desired without too much code, deep learning libraries that you would use to build
    models that can process raw-vectorized texts generally can perform this conversion
    automatically, and thus an ordinal representation suffices.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE42]'
  prefs: []
  type: TYPE_PRE
- en: Bag of Words
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: In order to reduce the sheer dimensionality/size of a raw vectorization text
    representation, we can use the Bag of Words (BoW) model to “collapse” raw vectorizations.
    In Bag of Words, we count how many times each language unit appears in a text
    sample while ignoring the specific order and context in which the language units
    were used (Figure [2-29](#Fig29)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig29_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A table consists of 5 columns and 8 rows. The column headers are the, dog, jumped,
    over, and second. Row headers are as follows, the, dog, jumped, over, the, second,
    dog, and bag of words. The values for the same headers are 1 and 0 for others.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-29
  prefs: []
  type: TYPE_NORMAL
- en: Bag of Words model as a sum of raw vectorization across the sequential axis
  prefs: []
  type: TYPE_NORMAL
- en: One could implement the Bag of Words model by calling `np.sum(one_hot, axis=0)`,
    assuming the raw vectorization has already been calculated and stored in a variable
    called `one_hot`. This takes the sum of token occurrences across the tokens. However,
    many better options exist.
  prefs: []
  type: TYPE_NORMAL
- en: '`sklearn` implements an easy-to-use `CountVectorizer` object that performs
    Bag of Words encoding, with similar syntax to other encoding methods (Listing
    [2-41](#PC44)). Like the Keras `Tokenizer`, you can set the maximum vocabulary
    size/features; if none is specified, scikit-learn will include all detected words
    as part of the vocabulary. Note that we call `.toarray()` after transforming the
    text data because the result of the transformation is a NumPy compressed sparse
    array format rather than a standard *n*-d array. Additionally, observe that the
    `CountVectorizer()` has no `inverse_transform()` function, unlike many other `sklearn`
    encoders, because the Bag of Words transformation is not invertible; multiple
    different text sequences can still be encoded as the same BoW representation.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE43]'
  prefs: []
  type: TYPE_PRE
- en: The Keras Tokenizer also offers a Bag of Words functionality using the `texts_to_matrix()`
    function with the parameter `mode = 'count'` (Listing [2-42](#PC45)). You can
    also use `mode = 'freq'` to reflect word frequency.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE44]'
  prefs: []
  type: TYPE_PRE
- en: Let’s demonstrate the performance of a model on raw-vectorized data with a maximum
    vocabulary size of 3000 tokens (there are many more unique words in the dataset).
    We’ll begin by encoding the training and validation text samples (Listing [2-43](#PC46)).
    Note that we build the tokenizer’s vocabulary on the *x*-train dataset and directly
    apply it to the *x*-validation dataset such that any words part of the validation
    text corpus that are not represented in the training text corpus are ignored.
    While this is not ideal (we would hope to have all words represented), we must
    maintain the same encoding technique when evaluating on the validation set as
    when fitting on the training set.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE45]'
  prefs: []
  type: TYPE_PRE
- en: We’ll use the Random Forest model to evaluate vectorization methods (Listing
    [2-44](#PC47)); it builds upon the Decision Tree’s high-precision adaptability
    to nonlinear spaces while reducing overfitting behavior via bagging (as discussed
    in Chapter [1](525591_1_En_1_Chapter.xhtml), “Random Forest”).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE46]'
  prefs: []
  type: TYPE_PRE
- en: The F1 score of a Random Forest model trained on raw-vectorized text data is
    about 0.914, which is a significant improvement over keyword search. Note that
    while this performance certainly isn’t bad, neural networks can better make sense
    of sparse, very-high-dimensional data.
  prefs: []
  type: TYPE_NORMAL
- en: N-Grams
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: We can be more sophisticated than the Bag of Words model by counting the number
    of unique *two-word* combinations, or bigrams. This can help reveal context and
    multiplicity of word meaning; for instance, the Paris in the stripped (no punctuation,
    no capitalization) text except “paris france” is very different from the Paris
    in “paris hilton.” We can consider each bigram to be its own term and encode it
    as such (Figure [2-30](#Fig30)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig30_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A table consists of 3 columns and 5 rows. The column headers are a pen, is but,
    and and only. The row headers consist of words, such as a pen, is but, a pen,
    and only, a pen. Each word in the table is encoded by a binary number.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-30
  prefs: []
  type: TYPE_NORMAL
- en: Counting bigrams. There are technically more bigrams involved here, but we’re
    not counting them to simplify the representation
  prefs: []
  type: TYPE_NORMAL
- en: 'We can generalize bigrams into *n*-grams, with each unit consisting of *n*
    consecutive words (Listing [2-45](#PC48)). There is an important trade-off one
    encounters when increasing *n*: precision increases, but the encoding also becomes
    more sparse. A trigram is able to express more precise, specific ideas than a
    unigram, but there are fewer instances of that specific trigram than the unigram
    in the text. If the encoding becomes too sparse, it is difficult for a model to
    generalize due to the small number of samples available for a unique *n*-gram.
    You can observe these dynamics in Table [2-1](#Tab1).'
  prefs: []
  type: TYPE_NORMAL
- en: Table 2-1
  prefs: []
  type: TYPE_NORMAL
- en: Performance for a Random Forest model trained with n-grams for an n-gram range
    (row) and upper (column) range. Notice the best performance is with n-grams from
    lower 1 to upper 4, which is the widest range
  prefs: []
  type: TYPE_NORMAL
- en: '|   | 1 | 2 | 3 | 4 |'
  prefs: []
  type: TYPE_TB
- en: '| 1 | 0.914 | 0.903 | 0.890 | 0.898 |'
  prefs: []
  type: TYPE_TB
- en: '| 2 |   | 0.822 | 0.822 | 0.794 |'
  prefs: []
  type: TYPE_TB
- en: '| 3 |   |   | 0.658 | 0.601 |'
  prefs: []
  type: TYPE_TB
- en: '| 4 |   |   |   | 0.580 |'
  prefs: []
  type: TYPE_TB
- en: '[PRE47]'
  prefs: []
  type: TYPE_PRE
- en: TF-IDF
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Another weakness of the Bag of Words model is that the number of times a word
    appears in the text may not be a good indicator of how important or relevant it
    is. For instance, the word “the” appears seven times in this paragraph, more than
    any other. Does this mean that the word “the” is the most significant or holds
    the most meaning?
  prefs: []
  type: TYPE_NORMAL
- en: No, the word “the” is primarily an artifact of grammar/syntactic structure and
    reflects little semantic meaning, at least in contexts we are generally concerned
    with. We usually address the problem of text-saturating syntactic tokens by removing
    so-called “stop words” from a corpus before encoding it.
  prefs: []
  type: TYPE_NORMAL
- en: 'However, there are many words left over from stop word screening that hold
    semantic value but suffer from another problem that the word “the” creates: Because
    of the structure of the corpus, certain words inherently appear very often throughout
    the text. This does not mean that they are more important. Consider a corpus of
    customer reviews for a jacket: naturally, the word “jacket” will appear very often
    (e.g., “I bought this jacket…,” “This jacket arrived at my house…”), but in actuality
    it is not very relevant to our analysis. We know that the corpus is about the
    jacket and care instead about words that may occur less but mean more, like “bad”
    (e.g., “This jacket is bad”), “durable” (e.g., “Such a durable jacket!”), or “good”
    (e.g., “This was a good buy”).'
  prefs: []
  type: TYPE_NORMAL
- en: 'We can formalize this intuition by using TF-IDF, or *Term Frequency–Inverse
    Document Frequency*, encoding. The logic behind TF-IDF encoding is that we care
    more about terms that appear often in one document (Term Frequency) but not very
    often across the entire corpus (Inverse Document Frequency). TF-IDF is calculated
    by weighting these two effects against each other:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ TFIDF= TF\left(t,d\right)\times IDF(t) $$](../images/525591_1_En_2_Chapter/525591_1_En_2_Chapter_TeX_Equj.png)'
  prefs: []
  type: TYPE_IMG
- en: Term Frequency *TF*(*t*, *d*) is the number of times a term *t* appears in a
    document/text sample *d*. While there are many methods for calculating Inverse
    Document Frequency *IDF*(*t*), a simple and effective method is ![$$ loglog\ \frac{total\#
    docs}{number\ of\ docs\ with\ term\ t} $$](../images/525591_1_En_2_Chapter/525591_1_En_2_Chapter_TeX_IEq8.png)
    Consider a word that appears very often in a document but is very rare in the
    collected corpus. The Term Frequency will be high, since the term appears often
    in the document; the Inverse Document Frequency will also be high, since there
    are a small number of documents with the term *t* (i.e., the denominator is small).
    Thus, the overall TF-IDF encoding will be high in value, indicating high significance
    or originality. On the other hand, a word that appears often in a document but
    also is abundant throughout the collected corpus has a lower TF-IDF weighting.
  prefs: []
  type: TYPE_NORMAL
- en: Scikit-learn supports TF-IDF with a similar maximum-features functionality as
    the Bag of Words model (Listing [2-46](#PC49)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE48]'
  prefs: []
  type: TYPE_PRE
- en: A Random Forest model trained with TF-IDF-vectorized data obtains an F1 score
    of 0.898 on the validation dataset, which turns out to be slightly worse than
    the Bag of Words model. This says more about the nature of the dataset than the
    performance of the encoding method; this spam dataset may not benefit from the
    introduction of an Inverse Document Frequency term that weights down terms depending
    on their occurrence over the total corpus.
  prefs: []
  type: TYPE_NORMAL
- en: You can also pass in an `ngrams_range` parameter to consider terms consisting
    of multiple words, that is, for different values of *n*.
  prefs: []
  type: TYPE_NORMAL
- en: Sentiment Extraction
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: In certain problems, it can be beneficial to use more specific text encodings.
    *Sentiment extraction* is the association of a quantitative label to text representing
    various qualities of its sentiment, like mood or objectivity. If you are building
    a classical machine learning model, you can encode text as its quantitative sentiment
    representation or include semantic extraction as another set of features to other
    text encoding methods. Note that sentiment extraction is generally unlikely to
    add much value for deep learning models, which are typically powerful enough to
    develop internal language understanding mechanisms that are more sophisticated
    and relevant than a sentiment extraction function defined and selected manually
    by a human.
  prefs: []
  type: TYPE_NORMAL
- en: The `textblob` library offers a simple sentiment extraction implementation.
    Begin by initializing a `textblob.TextBlob` object with the phrase or sentence
    you want to obtain the sentiment of (Listing [2-47](#PC50)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE49]'
  prefs: []
  type: TYPE_PRE
- en: Then, call the `.sentiment` method to obtain the sentiment, which is broken
    down into *polarity* (negative vs. positive tone, quantified from –1 to +1) and
    *subjectivity* (whether the phrase is stated as an opinion or more factually,
    quantified from 0 to 1). For instance, calling `text.sentiment` on the given example
    in Listing [2-47](#PC50) yields a polarity of 0.9099 and a subjectivity of 0.7800\.
    This means the `textblob` sentiment analysis implementation associates the sentence
    “Feature encoding is very good” as being very positive in polarity and moderately
    subjective. This is a fair assessment.
  prefs: []
  type: TYPE_NORMAL
- en: You can create functions that return the polarity and subjectivity of an inputted
    string; these can be applied to NumPy arrays, Pandas series, TensorFlow datasets,
    etc. (Listing [2-48](#PC51)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE50]'
  prefs: []
  type: TYPE_PRE
- en: '`textblob` uses semantic labels to determine the polarity of a text sample;
    each relevant word is associated with some inherent polarity (e.g., “bad” with
    –0.8 polarity, “good” with +0.8 polarity, “awesome” with +1 polarity). The overall
    polarity is a single aggregation of each of these individual polarities.'
  prefs: []
  type: TYPE_NORMAL
- en: Negation words like “not” or “no” flip the sign of affected relevant words.
    The polarity of “Feature encoding is not very good” is –0.2692.
  prefs: []
  type: TYPE_NORMAL
- en: '`textblob` also considers punctuation and emojis in addition to alphanumeric
    characters. For instance, “Feature encoding is very good!” yields a polarity of
    +1.0, over the +0.9 polarity without the exclamation mark.'
  prefs: []
  type: TYPE_NORMAL
- en: If a sentence is neutral, like “Feature encoding is a technique.”, `textblob`
    will yield a polarity and subjectivity near or at 0.
  prefs: []
  type: TYPE_NORMAL
- en: '`textblob` determines subjectivity by the presence of intensity modifiers,
    like “very.”'
  prefs: []
  type: TYPE_NORMAL
- en: While `textblob` works fine in simple cases, the algorithm is quite naïve and
    is very limited. It does not consider context across multiple words and more complex
    syntactic and semantic language structures that affect polarity and subjectivity.
  prefs: []
  type: TYPE_NORMAL
- en: VADER (Valence Aware Dictionary for Sentiment Reasoning) is a model that performs
    similar functions to `textblob` by associating a given text sample with polarity
    and subjectivity (referred to as intensity or strength). The VADER model, like
    `textblob`, also computes polarity and intensity by aggregating individual sentiments.
    However, it is more sophisticated; it considers negation contractions (e.g., wasn’t
    vs. was not), advanced punctuation use, capitalization (e.g., ALL CAPS vs. lowercase),
    slang words, and acronyms (“lmao,” “lol,” “brb”). VADER was optimized on social
    media data and thus possesses a wider and more modern vocabulary than most other
    sentiment analyzers.
  prefs: []
  type: TYPE_NORMAL
- en: You can import the `vaderSentiment` library with `pip install vaderSentiment`.
    Use it as such (Listing [2-49](#PC52)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE51]'
  prefs: []
  type: TYPE_PRE
- en: The sentiment scores (in this example, stored in `scores`) are represented as
    a dictionary, with the keys `'neg'`, `'neu'`, `'pos'`, and `'compound'`. Respectively,
    these represent the ratings from 0 to 1 for the text sample’s negativity, neutrality,
    positivity, and overall sentiment (a compound score). The sum of the negativity,
    neutrality, and positivity scores equals 1\. The VADER model is differentiated
    from other text sentiment models by marking neutrality as its own semantic class,
    rather than being in between negative and positive.
  prefs: []
  type: TYPE_NORMAL
- en: If you are looking for even more complex features, consider Flair, a powerful
    natural language processing framework (install with `pip install flair`). Flair
    contains an implementation for *Task-Aware Representation of Sentences for Generic
    Text Classification*, or TARS. TARS has an exciting property called *zero-shot
    learning*, meaning that it can learn to associate text with certain labels and
    classes that it has had zero exposure to (Figures [2-31](#Fig31) to [2-34](#Fig34)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig34_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A block diagram is depicted as follows, input, which leads to the model, which
    further leads to classes 1, 2, and n, each represented with no labels.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-34
  prefs: []
  type: TYPE_NORMAL
- en: Zero-shot learning scheme. Note that this reflects the ideal behavior of a zero-learning
    system rather than how it is trained
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig33_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A block diagram is depicted as follows, input, which leads to the model, which
    further leads to classes 1, 2, and up to n, each represented by a label.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-33
  prefs: []
  type: TYPE_NORMAL
- en: One-shot learning scheme
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig32_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A block diagram is exhibited as follows, input, which leads to the model, which
    further leads to classes 1, 2, and up to n, each represented by a few labels.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-32
  prefs: []
  type: TYPE_NORMAL
- en: Few-shot learning scheme
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig31_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A block diagram is depicted as follows, input, which leads to the model, which
    further leads to classes 1, 2, and up to n, each represented by abundant labels.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-31
  prefs: []
  type: TYPE_NORMAL
- en: Standard supervised learning scheme
  prefs: []
  type: TYPE_NORMAL
- en: This means that you can define your own classes and TARS will automatically
    assign a probability that a given text falls in any of those classes. Classes
    need to be defined using a natural language string describing what the class represents.
    The TARS model is able to “interpret” this definition and use it as a class.
  prefs: []
  type: TYPE_NORMAL
- en: Begin by creating a `TARSClassifier` model. You’ll need to load the model weights,
    which can take about a minute, with variation depending on environment conditions.
    Then, create a `flair.data.Sentence` object and define a list of custom classes.
    Lastly, run the `TARSClassifier`’s `predict_zero_shot()` function on the sentence
    object and the custom classes.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, we can define two classes `'positive'` and `'negative'` to perform
    similar functionality to `textblob` and VADER (Listing [2-50](#PC53)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE52]'
  prefs: []
  type: TYPE_PRE
- en: The model prediction automatically modifies the `Sentence` object and associates
    it with sentence labels. You can view these by printing the original sentence
    object. In this case, Flair assigns the sentence to the class ‘positive’ with
    0.9726 probability.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can use Flair to define more complex custom classes. For instance, you
    may want to quantify whether a text sounds “anxious,” “nervous,” “excited,” “ambivalent,”
    “neutral,” “empathetic,” “pessimistic,” or “optimistic.” You can also use more
    descriptive class definitions, like “optimistic but careful.” Moreover, you can
    evaluate the content of text beyond the sentiment; for instance, to evaluate if
    the text talks about animals in some manner, you can request the TARS model to
    assign the probability a sentence belongs to the class description `''animals''`.
    It works effectively: for instance, “puppies are so cute” obtains a very high
    probability, but “plants are so cute” obtains a very low probability.'
  prefs: []
  type: TYPE_NORMAL
- en: These are more complex ideas that the TARS model is able to interpret and quantify.
    Because TARS is a deep learning model rather than a rule-based system (which `textblob`
    and VADER use), it is generally more reflective of the text sample’s character
    and content, making it a powerful encoder for text when you have a strong idea
    of which qualities of the text are relevant to prediction.
  prefs: []
  type: TYPE_NORMAL
- en: Word2Vec
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Previous discussion on encoding methods focused on relatively simplistic attempts
    to capture a text sample’s meaning by attempting to extract one “dimension” or
    perspective. The Bag of Words model, for instance, captures meaning simply by
    counting how often a word appears in the text. The Term Frequency–Inverse Document
    Frequency encoding method attempts to improve upon this scheme by defining a slightly
    more sophisticated level of meaning by balancing the occurrence of a word in a
    document with its occurrence in the complete corpus. In these encoding schemes,
    there is always one perspective or dimension of the text that we leave out and
    simply cannot capture.
  prefs: []
  type: TYPE_NORMAL
- en: With deep neural networks, however, we can capture more complex relationships
    between text samples – the nuances of word usage (e.g., “Paris,” “Hilton,” and
    “Paris Hilton” all mean very different things!), grammatical exceptions, conventions,
    cultural significance, etc. The Word2Vec family of algorithms associates each
    word with a fixed-length vector representing *latent* (“hidden”, “implicit”) features
    (Figure [2-35](#Fig35)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig35_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A table depicts the vector values arrived at for features 1 to n for the token
    words airplane, car, and peace.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-35
  prefs: []
  type: TYPE_NORMAL
- en: Hypothetical embeddings/vector associations learned by Word2Vec
  prefs: []
  type: TYPE_NORMAL
- en: Embeddings are learned by neural networks, which map tokens to embeddings and
    use the learned embeddings to perform a task. The specific task used varies, but
    all embedding tasks force the network to understand the internal structure of
    the text in some way. One commonly used task is to fill in a missing token in
    a sequence of tokens. For instance, “He was so <masked token> that he threw the
    deep learning book on the ground and stomped on it” should elicit an output token
    like “angry” or “upset.” In order to complete the task, the network needs to learn
    the optimal set of latent features associated with each token. The embedding layer
    is then extracted from the network (Figure [2-36](#Fig36)). The learned embeddings
    can be quite sophisticated, capturing grammatical, cultural, and logical relationships
    within language. (Read Chapter [6](525591_1_En_6_Chapter.xhtml) for a more substantive
    overview of masked language modeling as a pretraining task.)
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig36_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flow diagram has the following flow, input, embedding, processing, and output.
    To the right of the diagram, another flow diagram is depicted as follows, word,
    embedding, and vector.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-36
  prefs: []
  type: TYPE_NORMAL
- en: The process of learning embeddings in neural network models and extracting learned
    embeddings to obtain Word2Vec representations
  prefs: []
  type: TYPE_NORMAL
- en: A disadvantage of Word2Vec is loss of interpretability. With the Bag of Words
    representation, we know what each number in the vectorization represents and why
    it appears so. Even with methods like sentiment extraction or zero-shot classification
    with TARS, we understand what the vectorization is supposed to represent, even
    if the process of deriving it is more complex. With Word2Vec, however, we know
    neither exactly how the vector representations are obtained^([1](#Fn1)) nor what
    the numbers themselves mean.
  prefs: []
  type: TYPE_NORMAL
- en: The popular `genism` library offers a convenient interface to access Word2Vec.
    Let’s begin by installing and importing it, in addition to other relevant libraries
    for text cleaning and retrieval (Listing [2-51](#PC54)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE53]'
  prefs: []
  type: TYPE_PRE
- en: We’ll train Word2Vec on *War and Peace* by Leo Tolstoy. Let’s load a cleaned
    version of the full text from Project Gutenberg into a single string.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE54]'
  prefs: []
  type: TYPE_PRE
- en: Because this text is quite long, we’ll create a generator class that yields
    parts of the text sample, sentence by sentence (Listing [2-53](#PC56)). The alternative
    is to load all the sentences into a list at once, which is taxing on memory and
    speed.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE55]'
  prefs: []
  type: TYPE_PRE
- en: To train the Word2Vec model on the data generator, we first instantiate our
    data generator, instantiate a Word2Vec model, build the vocabulary, and then train
    the model on the dataset.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE56]'
  prefs: []
  type: TYPE_PRE
- en: 'We can access the word vectors with `model.wv`. For instance, we can obtain
    the latent features for the word “war” as such:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE57]'
  prefs: []
  type: TYPE_PRE
- en: 'Here are the latent features for the word “peace”:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE58]'
  prefs: []
  type: TYPE_PRE
- en: 'Embeddings can also be used to compute the similarity between words. This is
    done by finding the distance between coordinate points represented by the embeddings
    associated with each word:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE59]'
  prefs: []
  type: TYPE_PRE
- en: You can then use this lookup method to vectorize your text.
  prefs: []
  type: TYPE_NORMAL
- en: 'We’ll see examples of similar embedding techniques in Chapter [4](525591_1_En_4_Chapter.xhtml)
    (section: “Multimodal Image and Tabular Models”) and especially in Chapter [5](525591_1_En_5_Chapter.xhtml)
    (section: “Recurrent Models Theory”), where we will deal extensively with text.'
  prefs: []
  type: TYPE_NORMAL
- en: Time Data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Time/temporal data often appears in practical tabular datasets. For instance,
    a tabular dataset of online customer reviews may have a timestamp down to the
    second indicating exactly when it was posted. Alternatively, a tabular dataset
    of medical data might be associated with the day it was collected, but not the
    exact time. A tabular dataset of quarterly company earnings reports will contain
    temporal data by quarter. Time is a dynamic and complex data type that takes on
    many different forms and sizes. Luckily, because time is both so rich with information
    and well-understood, it is relatively easy to encode time or temporal features.
  prefs: []
  type: TYPE_NORMAL
- en: There are several methods to convert time data into a quantitative representation
    to make it readable to machine learning and deep learning models. The simplest
    method is simply to assign a time unit as a base unit and represent each time
    value as a multiple of base units from a starting time. The base unit should generally
    be the most relevant unit of time to the prediction problem; for instance, if
    time is stored as a month, date, and year and the prediction task is to predict
    sales, the base unit is a day, and we would represent each date as the number
    of days since a starting date (a convenient starting position like January 1,
    1900, or simply the earliest date in the dataset). On the other hand, in a physics
    lab, we may need a base unit of a nanosecond due to high required precision, and
    time may be represented as the number of nanoseconds since some determined starting
    time.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s look at the Amazon US Software Reviews dataset, which contains customer
    reviews on software products (this is a subset of the Amazon Reviews dataset).
    After loading and processing, we find that we want to quantify/encode the date
    column:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE60]'
  prefs: []
  type: TYPE_PRE
- en: 'Calling `.min()` on the date feature yields 1998-09-21, the very first date
    in the column. `dates - dates.min()` returns the difference between the date column
    and the first date in daysw. This associates each date with the number of days
    that has transpired since the first date:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE61]'
  prefs: []
  type: TYPE_PRE
- en: While this approach is explicit, it assumes that any new data will fall within
    the given range. For instance, if the dataset contains customer reviews from January
    1, 2015, to December 31, 2021, we should not expect to apply the model to any
    customer reviews given before January 1, 2015, or after December 31, 2021\. This
    is because the time representation here limits the model’s understanding/interpretation
    of the feature to the domain provided. If any times outside of this domain are
    sampled, we should not expect the model to be able to extrapolate to unfamiliar
    domains (Figure [2-37](#Fig37)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig37_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A sketch depicts a graph plotting the number of husbands versus days. A man
    indicates the line on the graph and tells a woman that she will have over four
    dozen husbands by next month.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-37
  prefs: []
  type: TYPE_NORMAL
- en: '“My Hobby: Extrapolating,” by Randall Munroe at [xkcd.​com](http://xkcd.com)'
  prefs: []
  type: TYPE_NORMAL
- en: 'Often, we are interested in identifying cyclical patterns in temporal data.
    Time is full of cycles and units: 60 seconds in a minute, 60 minutes in an hour,
    24 hours in a day, 7 days in a week, and so on. A simple way to capture the cyclical
    quality of time is to represent time as a combination of multiple bounded features.'
  prefs: []
  type: TYPE_NORMAL
- en: There are other cyclical methods to keep track of important attributes of time
    (Listing [2-55](#PC63), Figure [2-38](#Fig38)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig38_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A table lists the years, months, and days under separate columns for various
    datasets.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-38
  prefs: []
  type: TYPE_NORMAL
- en: Extracting the year, month, and day as separate features from the original date
    object
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE62]'
  prefs: []
  type: TYPE_PRE
- en: When we build the machine learning model to learn from this dataset, we will
    likely remove the “year” column because it is not cyclical. While we can expect
    any new sample of data we collect to be reasonably represented by the month and
    day columns (e.g., the month 12 and the day 7 occurs several times throughout
    time), we cannot assume this with the year, which does not repeat. If you do include
    the year column as an input signal for the machine learning model, you must guarantee
    that any new data the model is evaluated on falls within the range of time data
    it was trained on.
  prefs: []
  type: TYPE_NORMAL
- en: 'Another cyclical feature is which day of the week the day falls on. The `.weekday`
    attribute of a Python time object returns an integer from 0 to 6 inclusive, where
    0 represents Sunday and 6 represents Monday: `weekdays = dates.apply(lambda x:x.weekday).`'
  prefs: []
  type: TYPE_NORMAL
- en: Another possible feature is to include whether the day falls on a holiday or
    not. Pandas has time-series facilities that contain lists of observed holidays
    (Listing [2-56](#PC64)). See the Pandas documentation for how to specify custom
    or more advanced holiday rules.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE63]'
  prefs: []
  type: TYPE_PRE
- en: There is significant flexibility in time data to encode domain knowledge. Additional
    techniques include marking the season, relevant commercial events (e.g., single’s
    day, black Friday), day vs. night, working hours, and rush hours. Another approach
    is to identify or obtain discretized time representations and apply categorical
    encoding, for instance, on the hour of the day or the day of the week.
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, consider the influence of different time zones across your dataset.
    In some cases, it is important that the time data uses the same universal system
    (e.g., UTC) across all its values; in other cases, it is more beneficial to use
    local times. One technique that exposes the model to both the benefits of a universal
    and local time – assuming time zone data is available – is to include the local
    time and the offset from a universal time dependent on the time zone that the
    local time was collected from.
  prefs: []
  type: TYPE_NORMAL
- en: Geographical Data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Many tabular datasets will contain geographical data, in which a location is
    somehow specified in the dataset. Similarly to temporal/time data, geographical
    data can exist in several different levels of scope – by continent, country, state/province,
    city, zip code, address, or longitude and latitude, to name a few. Because of
    the information-rich and highly context-dependent nature of geographical data,
    there aren’t well-established, sweeping guidelines on encoding geographical data.
    However, you can use many of the previously discussed encoding tools and strategies
    to your advantage here.
  prefs: []
  type: TYPE_NORMAL
- en: If your dataset contains geographical data in categorical form, like by country
    or state/province, you can use previously discussed categorical encoding methods,
    like one-hot encoding or target encoding.
  prefs: []
  type: TYPE_NORMAL
- en: Latitude and longitude are precise geospatial location indicators already in
    quantitative form, so there is no requirement for further encoding. However, you
    may find it valuable to add relevant abstract information derived from the latitude
    and longitude to the dataset, like which country the location falls in.
  prefs: []
  type: TYPE_NORMAL
- en: When working with specific addresses, you can extract multiple relevant features,
    like the country, state/province, zip code, and so on. You can also derive the
    exact longitude and latitude from the address and append both to the dataset as
    continuous quantitative representations of the address location.
  prefs: []
  type: TYPE_NORMAL
- en: Feature Extraction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Feature extraction is the derivation of novel features from the existing set
    of features in an attempt to assist the model by providing potentially useful
    interpretations of the dataset (Figure [2-39](#Fig39)). Although many may argue
    that feature extraction has been automated or eliminated by neural networks, in
    practice performing complex feature extraction methods on tabular data often aids
    performance.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig39_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flow diagram is exhibited as follows. Raw data leads to data encoding, which
    is further subdivided into feature extraction and feature selection, which lead
    to preprocessed data.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-39
  prefs: []
  type: TYPE_NORMAL
- en: The feature extraction component of the preprocessing pipeline
  prefs: []
  type: TYPE_NORMAL
- en: Single- and Multi-feature Transformations
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A significant component of the statistical learning pipeline is to apply transformations
    to features to better reflect and amplify their relevance. The simplest of such
    transformations is a single-feature transformation, in which values from a single
    feature are mapped to another set of values (Figure [2-40](#Fig40)). For instance,
    if a function has an exponential effect on the target variable as its value increases,
    we can transform it with the exponential function *f* (*x*) = *e*^(*x*), or a
    modified exponential function informed by domain knowledge. Alternatively, we
    can apply trigonometric functions to model cyclic relationships, logarithmic or
    square root functions to model diminishing returns relationships, or quadratics
    to model two-sided relationships (i.e., values at the two “ends” or “extremes”
    of the relevant range correspond to one locality of outcomes, whereas values more
    in the “middle” correspond to a different locality of outcomes). Features can
    either be transformed individually or appended to the dataset in addition to the
    raw feature (Figure [2-41](#Fig41)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig41_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A table listed the values for feature x which transformed to contain the replaced
    feature with the original feature and the append feature.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-41
  prefs: []
  type: TYPE_NORMAL
- en: 'Two options with feature transformation: replace the original feature with
    the transformed feature or append it to the original feature'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig40_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Four dot plots depict the original values versus those transformed via e superscript
    x, transformed via log x, transformed via sin x, and transformed via x squared.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-40
  prefs: []
  type: TYPE_NORMAL
- en: Effect of transforming an original set of one-dimensional data points using
    various mathematical single-feature transformations
  prefs: []
  type: TYPE_NORMAL
- en: The Boston Housing Dataset is a well-known benchmark dataset pulled from the
    US Census Bureau and compiled in 1978 by Harrison and Rubinfeld to use housing
    data in the Boston area to estimate demand for clean air. The dataset was first
    published with the paper “Hedonic Prices and the Demand for Clean Air” in volume
    5 of the *Economics and Management* journal. The dataset has been included in
    major data science and machine learning libraries like scikit-learn and TensorFlow.
  prefs: []
  type: TYPE_NORMAL
- en: Some of the features included in the dataset are
  prefs: []
  type: TYPE_NORMAL
- en: 'CRIM: Per capita crime rate by town'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'INDUS: Proportion of nonretail businesses per town'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'PRATIO: Pupil-teacher ratio by school town district'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'CHAS: 1 if the town bounds the Charles River, 0 otherwise'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'NOX: Nitric oxide concentrations'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'PART: Particulate concentrations'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'B: 1000(*Bk* − 0.63)², where *Bk* is the proportion of African Americans per
    town'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This last feature, B, has been subject to lots of recent discussion. Needless
    to say, there are many ethical and fairness problems with including a racial feature
    in a housing dataset. Now, most data science libraries and textbooks that still
    support or use it include a warning that the dataset is subject to problematic
    features and suggest the usage of more appropriate housing datasets, like the
    Ames Housing dataset and the California Housing dataset. The B feature is an interesting
    case study into how feature transformations can amplify inequitable societal conditions
    and pose problems for feature correction.
  prefs: []
  type: TYPE_NORMAL
- en: Note that the feature B is a single-feature transformation of another feature,
    the proportion of African Americans per town. The transformation uses a parabola
    with a vertex/axis of symmetry at *Bk* = 0.63\. At *Bk* = 0.63, the feature “B”
    is at its lowest, and the feature increases in either direction in quadratic fashion
    (Figure [2-42](#Fig42)). Harrison and Rubinfeld apply this transformation in an
    attempt to model systemic racism. At low to moderate proportions of African Americans
    in the town, Harrison and Rubinfeld reason white neighbors will find an increase
    in *Bk* as undesirable and hence negatively influencing housing value. At higher
    values of *Bk*, Harrison and Rubinfeld note market discrimination yields higher
    housing values. Thus, Harrison and Rubinfeld assume a parabolic relationship between
    the proportion of African Americans in the town and the housing value, choosing
    0.63 as the “ghetto point” at which an increase in *Bk* begins to increase rather
    than decrease house value.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig42_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph plots B versus B k. The line is plotted for 1000 times x minus
    0.63 squared. The line depicts a downward trend.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-42
  prefs: []
  type: TYPE_NORMAL
- en: Visualizing the quadratic single-feature transformation used to transform the
    Bk variable
  prefs: []
  type: TYPE_NORMAL
- en: Harrison and Rubinfeld’s choice of feature transformation was intended to model
    the effect that societal/institutionalized racism had on how housing was valued
    with relationship to the proportion of African Americans in the town. Hence, any
    models that are trained on this dataset take in this transformed data and make
    decisions assuming the logic Harrison and Rubinfeld attempted to represent.
  prefs: []
  type: TYPE_NORMAL
- en: Hence, there have been recent efforts to examine the feature more and understand
    the merits for its inclusion in the dataset. For one, those investigating the
    feature need to know the value of the raw, untransformed feature (i.e., the proportion
    of African Americans in the town rather than “B”). However, “B” was transformed
    using a *non-invertible function*, meaning that multiple inputs can be mapped
    to the same output value. This has the effect of partially destroying the original
    data (Figure [2-43](#Fig43)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig43_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph plots B versus B k. The curve is plotted for 1000 times x minus
    0.63 squared. The curve depicts a downward trend. The curve intersects at two
    points on the horizontal line drawn at 100.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-43
  prefs: []
  type: TYPE_NORMAL
- en: Visualizing the effect of partial data destruction by using a non-one-to-one
    function as a transformation
  prefs: []
  type: TYPE_NORMAL
- en: 'This demonstrates an important property of feature transformations that replace
    the raw feature: it may not be possible to recover the data if only the non-invertible
    transformed feature is published. Thus, it is strongly recommended convention
    for dataset creators in all disciplines to publish the raw dataset separately
    from any feature transformations that were applied afterward.'
  prefs: []
  type: TYPE_NORMAL
- en: Researchers and independent investigators were later able to obtain the raw
    feature and map it to the dataset using the original US Census data, although
    with some difficulty (as mapping requires reverse-engineering Harrison and Rubinfeld’s
    data aggregation procedure).
  prefs: []
  type: TYPE_NORMAL
- en: Although single-feature transformations can amplify relevant aspects of a feature
    in statistical modeling, we can also apply transformations to multiple sets of
    features to amplify relevant aspects of feature *interaction*.
  prefs: []
  type: TYPE_NORMAL
- en: Many multi-feature transformations utilize elementary operations like adding,
    subtracting, multiplying, and dividing sets of features (Figure [2-44](#Fig44)).
    For instance, it may be useful to include a feature that holds the average scores
    or values from a set of comparable columns, like income returns for each year.
    For multi-feature transformations to be effective in statistical learning and
    classical machine learning pipelines, it is important to understand the purpose
    of the multi-feature transformation. If you are adding two columns together for
    the sake of adding two columns together, you shouldn’t expect the model to make
    sense out of the new feature. Simple models are often more “confused”/distorted
    by complex, difficult-to-interpret features.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig44a_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Four graphs depict the original versus the transformed via x over y, transformed
    via log x times log y, transformed via x plus y, and transformed via sin x plus
    sin y.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig44b_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-44
  prefs: []
  type: TYPE_NORMAL
- en: Effect of transforming an original set of two-dimensional data points to a single
    new feature using various mathematical multi-feature transformations
  prefs: []
  type: TYPE_NORMAL
- en: Both simple single- and multi-feature transformations are an important part
    of statistical learning and classical machine learning, but they are generally
    superfluous in the context of deep learning. Neural networks are more than capable
    of learning these transformations themselves; moreover, they can usually learn
    better and more complex transformations than you can manually design. This is
    part of the beauty and power of deep learning.
  prefs: []
  type: TYPE_NORMAL
- en: However, this does not mean human-operated feature engineering has no place
    in deep learning if the methods used are sufficiently introduced and provide nontrivial
    value, especially in the context of tabular data. The following sections will
    explore various techniques to introduce helpful input signals into a deep learning
    dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Principal Component Analysis
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Feature engineering and extraction can also come in the form of retrieving information
    that reconstructs the original data in a lower dimension. Dimensionality reduction
    techniques reduce the amount of data and training time while synthesizing insights
    that are not easily accessible in the original data.
  prefs: []
  type: TYPE_NORMAL
- en: There are many advantages to dimensionality reduction techniques. When applied
    to training data, it can reduce the effects of the Curse of Dimensionality on
    the model's performance. During preprocessing and analysis, it's crucial to understand
    and visualize the data as it can better help us discover patterns in which we
    can build models accordingly. However, many modern datasets consist of hundreds
    if not thousands of features and are thus impossible to visualize for human eyes.
    Even the simplest dataset such as the Iris Flower dataset contains four features
    that cannot be viewed fully at once. By reducing the dimension of our data, we
    can view the complex structure of the dataset with humanly interpretable visualizations.
    In addition, we can keep crucial information that the dataset possesses at higher
    dimensions in most cases.
  prefs: []
  type: TYPE_NORMAL
- en: One of the most popular and effective methods of dimensionality reduction is
    Principal Component Analysis (PCA). PCA has evolved to many uses and variations
    from its original design as a convenient tool for exploratory data analysis.
  prefs: []
  type: TYPE_NORMAL
- en: Performing Principal Component Analysis is like writing a summary for a long
    book. We need to understand what we are reading and grasp the most critical components
    before we can summarize. Similarly, PCA can mathematically determine which part
    of the dataset contributes the most to its final “summary.”
  prefs: []
  type: TYPE_NORMAL
- en: It is easier to understand this with a real-world example. Let’s say we bought
    three books with different page numbers, and our goal is to distinguish them by
    just observing their thickness. It would be simple if the first book had 50 pages,
    the second had 200 pages, and the third had 500 pages. Their thickness will appear
    dramatically different; thus, it’ll be easy for us to determine which book is
    which. On the other hand, if the first book has 100 pages, the second has 105
    pages, and the third has 110 pages, it becomes difficult for us to separate one
    book from another as their thickness is similar. In our scenario, when the page
    numbers of these three books are more spread out, it provides us with more information
    and thus more variance. On the contrary, when the data is closer together, it
    contains less information, translating to less variance. A more technical overview
    of variance will be introduced later in the “Feature Selection” section as we'll
    be using this concept to select features.
  prefs: []
  type: TYPE_NORMAL
- en: Building off the preceding example, we can understand variance as how much information,
    or spread, the dataset provides. The process of PCA preserves variables with the
    most variance. We can illustrate such a concept with a simple dataset.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig45_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A scatter plot depicts the values plotted for two variables with an increasing
    trend.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-45
  prefs: []
  type: TYPE_NORMAL
- en: Dummy dataset where both variables have similar variance value
  prefs: []
  type: TYPE_NORMAL
- en: PCA doesn’t simply remove or select features. As presented previously, both
    features have similar variance (Figure [2-45](#Fig45)). Removing either will significantly
    lessen the information compared to the original data. However, PCA doesn’t only
    consider variance in the variables itself. Instead of looking at the vertical
    and horizontal axes, we notice that the diagonal axis contains as much variance
    if not more.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig46_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A scatter plot exhibits the values plotted for two variables with an increasing
    trend.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-46
  prefs: []
  type: TYPE_NORMAL
- en: Variance in the diagonal axis
  prefs: []
  type: TYPE_NORMAL
- en: PCA then creates two distinct variables based on the combination of the original
    two. In our example, we transform the data with respect to the diagonal axis and
    the line perpendicular to it as our two new axes (Figure [2-46](#Fig46)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig47_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A scatter plot plots between P C 2 and P C 1\. The values plotted for the two
    variables are almost horizontal.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-47
  prefs: []
  type: TYPE_NORMAL
- en: Rotated data relative to the diagonal axis
  prefs: []
  type: TYPE_NORMAL
- en: We refer to the two new variables as principal components. From the graph, we
    can clearly see that PC1 has much more variance than PC2 (Figure [2-47](#Fig47)).
    Keeping PC1 will retain the most variance, or the most information from the original
    data, and that’s exactly what PCA does. If we dig deeper, from our example, we
    discover that PC1 completely explains all the variance in the original data. However,
    that won’t always be the case. We can visually represent how much variance each
    component explains using a Scree Plot (Figure [2-48](#Fig48)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig48_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph plots the variance explained versus the principal components. The
    line is plotted through (1.0, 0.8), (2.0, 0.35), and (4.0, 0.1). All data are
    approximate.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-48
  prefs: []
  type: TYPE_NORMAL
- en: Scree Plot with dummy dataset
  prefs: []
  type: TYPE_NORMAL
- en: The plot displays variance explained by each principal component in proportion
    to the total variance. In our preceding example, four principal components are
    shown; the first one explains 80% of total variance relative to the original dataset.
  prefs: []
  type: TYPE_NORMAL
- en: There is one major drawback to PCA as a feature selection technique surrounding
    the scale or the distance between each individual data point after transformation.
    When searching for principal components and transforming them into new variables,
    we are simply rotating axes and changing the direction of data points. However,
    when we start to remove dimensions, the restriction of space across one dimension
    will influence how each data point relates to each other by their Euclidian distance.
    This problem can influence model performance in some cases, while it can be ignored
    during other times. Whether PCA will be helpful for the use case can only be determined
    through experience and testing.
  prefs: []
  type: TYPE_NORMAL
- en: There are two approaches to using PCA for feature extraction. The first is that
    we can set a certain number of “components” that the algorithm will reduce the
    data to, thus having a smaller dataset that retains the most information from
    the original. Second, PCA can also be used for the addition of new features. Instead
    of solely using the features provided by PCA, in some cases it would be more beneficial
    to keep the original features and add a set number of “components” from PCA as
    new features. In some cases, using PCA to create more features can give the model
    more information that it may or may not consider as essential. To the model, the
    principal components are a compact way of storing essential information, and as
    the model sees fit, it can also use the original features as those are the ones
    that contain the most accurate values.
  prefs: []
  type: TYPE_NORMAL
- en: Both uses for PCA on feature engineering/extraction are demonstrated in the
    following with scikit-learn (Listing [2-57](#PC65)). It’s crucial to standardize
    the data before performing PCA since the new projection of data and new axes will
    be based on the standard deviation of original variables. When one’s standard
    deviation is higher than the other, it can cause uneven weights assigned to different
    features.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE64]'
  prefs: []
  type: TYPE_PRE
- en: If it’s better to add those calculated principal components, we can do such
    as shown in the following (Listing [2-58](#PC66)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE65]'
  prefs: []
  type: TYPE_PRE
- en: Finally, PCA is crucial to visualizing and analyzing patterns beneath high-dimensional
    datasets. We can do such by graphing two or three principal components in either
    two or three dimensions, respectively. Furthermore, for each data point, we can
    color them differently based on their label for better visual analysis (Listing
    [2-59](#PC67)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE66]'
  prefs: []
  type: TYPE_PRE
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig49_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A scatterplot depicts P C A 2 versus P C A 1\. The plots for principal components
    are densely clustered at the center of the graph.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-49
  prefs: []
  type: TYPE_NORMAL
- en: Visualization of principal components
  prefs: []
  type: TYPE_NORMAL
- en: From observing the graph, notice that the labels are separated based on color
    (Figure [2-49](#Fig49)). It’s almost as if two labels are in two separable clusters.
    Such a phenomenon shows that a significant amount of variance is already explained
    with only two principal components or two features. From this visualization, we
    can conclude that reducing the dimensionality of the dataset by a significant
    amount would still preserve a huge ton of information while decreasing model complexity.
    It’s also possible to obtain the exact value of explained variance for components
    by calling `.explained_variance_ratio_` on a fitted `PCA` object.
  prefs: []
  type: TYPE_NORMAL
- en: Principal Component Analysis can be useful at times, reducing model complexity
    while possibly improving performance, but like many other feature extraction techniques,
    it has its drawbacks. Thus, the data scientist must decide how to apply the algorithm
    that suits the situation while minimizing computational expenses.
  prefs: []
  type: TYPE_NORMAL
- en: t-SNE
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Many modern datasets exist in high dimensions as mentioned previously; we can
    utilize algorithms such as PCA to reduce the dataset to a lower dimension. However,
    PCA only performs well on linearly separable data. It’s difficult for PCA to project
    nonlinearly separable data to a lower dimension while preserving most information
    that would help the model distinguish between labels.
  prefs: []
  type: TYPE_NORMAL
- en: Manifold is a family of dimensionality techniques that focuses on separating
    nonlinearly separable data (Figure [2-50](#Fig50)). Specifically, t-SNE (t-distributed
    Stochastic Neighbor Embedding) is among one of the most used and effective algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig50_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An image depicts two datasets. The plots for the first dataset are clustered
    in the center, and the plots for the second dataset surround the first dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-50
  prefs: []
  type: TYPE_NORMAL
- en: Nonlinearly separable data
  prefs: []
  type: TYPE_NORMAL
- en: t-SNE, or t-distributed Stochastic Neighbor Embedding, is one of the most popular
    unsupervised algorithms for high-dimensional visualization. Although t-SNE is
    not necessarily used for feature selection, it stands as an important step for
    many complex deep learning pipelines and is commonly used for neural network interpretation.
    Unlike PCA, t-SNE focuses on the local structure, preserving the local distances
    between points rather than prioritizing the global structure. The algorithm converts
    relationships in original space into t-distributions, or normal distributions
    with small sample sizes and relatively unknown standard deviations.
  prefs: []
  type: TYPE_NORMAL
- en: Instead of relying on variance to determine useful information, t-SNE focuses
    on grouping local groups of clustered data. The algorithm uses the Kullback-Leibler
    divergence, a metric for a statistical distance of joint probabilities as a measurement
    of separation between data. Gradient descent is applied to optimize the metric.
  prefs: []
  type: TYPE_NORMAL
- en: In t-SNE, the perplexity of the transformed data is adjustable by a user-specified
    hyperparameter. This parameter affects the ending visualization significantly
    and thus should be tuned and considered when using t-SNE. Perplexity can be interpreted
    as the number of nearest neighbors that t-SNE will consider for projecting the
    data. We would expect to see sparser visualization with smaller perplexity and
    vice versa.
  prefs: []
  type: TYPE_NORMAL
- en: Scikit-learn provides an implementation for t-SNE, as shown in the following.
    We can generate an example three-dimensional Swiss roll dataset; this is a classic
    example of nonlinearly separable data (Listing [2-60](#PC68)). The dataset generator
    also returns an array of values representing each sample’s univariate position
    in the main dimension. We can color each point according to this returned array
    and evaluate the performance of t-SNE based on it (Figure [2-51](#Fig51)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig51_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A 3 D scatterplot depicts the values plotted for different variables. The plots
    are in a rolled form.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-51
  prefs: []
  type: TYPE_NORMAL
- en: Swiss roll data
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE67]'
  prefs: []
  type: TYPE_PRE
- en: In comparison, t-SNE reduced the data to two dimensions while preserving most
    structures that were present in the original data, separating different colors
    well (Figure [2-52](#Fig52)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig52_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A graph exhibits the roll data converted to two dimensions. The y-axis values
    are between negative 60 and 60\. The x-axis values are between negative 40 and
    20.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-52
  prefs: []
  type: TYPE_NORMAL
- en: Swiss roll data reduced to two dimensions
  prefs: []
  type: TYPE_NORMAL
- en: Although t-SNE handles nonlinear data better than PCA, the algorithm has some
    major disadvantages that should be considered. Due to the randomized initialization
    in gradient descent used by t-SNE, seed selection can affect results. In addition,
    t-SNE has an extremely high computational cost. When running on a dataset with
    millions of samples, t-SNE may take substantially longer to finish than PCA.
  prefs: []
  type: TYPE_NORMAL
- en: If used for feature selection, it can be used in the same way as PCA. Generally,
    t-SNE plays a pivotal role in model interpretation and feature extraction but
    not in feature selection. Some common uses include converting image data to tabular
    data and visualizing various deep learning algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: Linear Discriminant Analysis
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Principal Component Analysis is an unsupervised algorithm, meaning that when
    transforming data, it does not consider the labels. PCA projects higher-dimensional
    data onto a lower-dimensional space based on the assumption that large variance
    contains more information and thus will better represent the original data when
    transformed into a lower dimension. On the other hand, Linear Discriminant Analysis
    (LDA) aims to maximize separation between label clusters. It may seem that LDA
    can only be used for classification, but it may be able to better transform higher-dimensional
    data to humanly understandable visualizations than PCA due to the fact that it
    is a supervised learning algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: Note while LDA can also be used as an algorithm for classification datasets,
    this is out of scope for our purposes. We will only focus on the dimensionality
    reduction and feature selection portion of LDA. For binary classification tasks,
    LDA attempts to maximize the distance between each label cluster’s central points.
    On the contrary, in multiclass classification, LDA maximizes the distance from
    clusters to an overall central point.
  prefs: []
  type: TYPE_NORMAL
- en: LDA assumes that the features are normally distributed and each feature must
    have a similar variance. Specifically, the process of LDA can be summarized into
    three steps.
  prefs: []
  type: TYPE_NORMAL
- en: Calculate the between-class variance for each label. Between-class variance
    quantifies the distance between the means of each label cluster.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Calculate the within-class variance for each label. Within-class variance is
    the distance between the mean of each class and each sample in that label cluster.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: According to the number of components to keep, which is specified as a hyperparameter,
    the data is projected to that number of dimensions. The projection should maximize
    between-class variance while minimizing within-class variance. This can be accomplished
    by either singular value decomposition or using eigenvalues.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Scikit-learn has an implementation of LDA, which operates on a similar syntax
    compared to PCA (Listing [2-61](#PC69)). Note that during dimensionality reduction,
    the maximum number of components that can be kept is limited to (*num* _ *classes* − 1,
    *num* _ *features*) .
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE68]'
  prefs: []
  type: TYPE_PRE
- en: If we plot the transformed data and separate class labels by colors as shown
    in the following, LDA does a good job of separating classes in just one single
    dimension (Figure [2-53](#Fig53)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig53_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Two graphs plot the values for L D A 1\. The graph values peak at a particular
    range and otherwise remain flat.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-53
  prefs: []
  type: TYPE_NORMAL
- en: Dimensionality reduction from LDA into one dimension
  prefs: []
  type: TYPE_NORMAL
- en: LDA isn’t commonly used in modern machine learning fields, either as a classification
    algorithm or a dimensionality reduction technique. As mentioned previously, one
    major downfall in LDA is that it assumes that all features have a normal distribution
    and that they have similar variances. Moreover, both PCA and LDA are linear dimensionality
    reduction algorithms, meaning they can only operate on linearly separable data.
  prefs: []
  type: TYPE_NORMAL
- en: Compared with PCA, LDA is harder to use, and it is a much less popular approach
    to dimensionality reduction. LDA is better suited for multiclass classification
    problems as the labels have more than two classes, meaning that the reduced data
    will still have more than two dimensions, thus retaining more information from
    the original data. Furthermore, LDA presumably performs better than PCA due to
    the fact that it is a supervised learning algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: Statistics-Based Engineering
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The core purpose of feature engineering boils down to extracting useful information
    from the set of original features that provides value to the model. This can be
    achieved by applying transformation as discussed in the “Single- and Multi-feature
    Transformations” section. Feature extraction can also come in the form of deriving
    the statistical properties of samples. We can obtain statistical measures of each
    sample across the entirety of the row, creating new features. However, this method
    only suits for sets of features where their values are in the same scale hence
    the statistical measures produced from those features can make practical sense
    and provide useful information to the model.
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, utilizing this technique provides a different perspective for
    the model to understand the data. Instead of providing features that extend the
    relevancy from features to the target or increase their correlation, statistical
    measures of each sample let the model treat each sample as its own rather than
    being a part of a larger dataset.
  prefs: []
  type: TYPE_NORMAL
- en: We can calculate simple measures such as the mean, median, or mode of each sample.
    However, calculating any statistical information related to distribution, such
    as standard deviation or skewness, has a greater positive influence on the model.
    We can demonstrate such a concept on a genetics dataset that contains about 250
    genomic sequences as features while predicting the bacterial type based on its
    genetic sequences.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE69]'
  prefs: []
  type: TYPE_PRE
- en: After loading the data (Listing [2-62](#PC70)), we can visualize the distribution
    of each sample based on the values of its features at that row as seen in the
    following (Figure [2-54](#Fig54)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig54_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph plots frequency versus feature values. The lines are plotted for
    rows 1, 2, and 3\. All the lines depict a fluctuating pattern.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-54
  prefs: []
  type: TYPE_NORMAL
- en: Each row’s feature distribution for the first three samples
  prefs: []
  type: TYPE_NORMAL
- en: Based on each row’s distribution, we can then calculate the standard deviation,
    skewness, kurtosis, mean, and median for each row (Listing [2-63](#PC71)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE70]'
  prefs: []
  type: TYPE_PRE
- en: After applying transformations, we can observe differences in these measures
    between different classes, while the model may discover a pattern within and correlate
    it to the targets, thus improving the performance.
  prefs: []
  type: TYPE_NORMAL
- en: Remember that the features that we group together and whose properties we calculate
    must be on the same scale; they must make practical sense when combined and used
    together. That is, the features must be *homogenous*. We’ll see in later chapters
    that certain techniques require or assume homogeneity within features. In our
    case, it’s natural that we can combine each single nitrogen bond since they form
    a sequence of DNA. In cases where not every feature would fit well into each other
    and their distribution together would not be useful (i.e., feature heterogeneity),
    we can try grouping similar features and calculate the statistical measures of
    each group.
  prefs: []
  type: TYPE_NORMAL
- en: This idea of treating each sample as a group rather than a data point within
    the feature can be extended such as calculating the sum across each row or the
    product across rows depending on domain knowledge or simply trial and error. The
    sum or product of each sample can also be utilized when there are a smaller number
    of features, and calculating measures related to the distribution of all features
    on a single sample wouldn’t demonstrate much use as extra information.
  prefs: []
  type: TYPE_NORMAL
- en: Depending on the size of the dataset, when there are a larger number of features,
    using deep learning methods is preferred over classical machine learning algorithms,
    which is the essence of this book and which this method found most of its success
    upon. The usage of both will be demonstrated in later chapters.
  prefs: []
  type: TYPE_NORMAL
- en: Feature Selection
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Feature selection refers to the process of filtering out or removing features
    from a dataset (Figure [2-55](#Fig55)). There are two main reasons to perform
    feature selection: removing redundant (very similar information content) features
    and filtering out irrelevant (information content not valuable w.r.t. the target)
    features that may worsen model performance. The difference between feature extraction
    and feature selection lies in that selection reduces the number of features while
    extraction creates new features or modifies existing ones. A universal approach
    to feature selection usually consists of obtaining a measure of “usefulness” for
    each feature and then eliminating those that do not meet a threshold. Note that
    no matter which method for feature selection is used, the best result will likely
    come from trial and error since the optimal techniques and tools vary for datasets.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig55_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flow diagram is depicted as follows. Raw data leads to data encoding, which
    is subdivided into feature extraction and feature selection, which further leads
    to preprocessed data.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-55
  prefs: []
  type: TYPE_NORMAL
- en: The feature selection component of the preprocessing pipeline
  prefs: []
  type: TYPE_NORMAL
- en: Information Gain
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Information Gain, synonymous with Kullback-Leiber divergence, can be defined
    as a measure of how much a certain feature tells us about a target class. Before
    discussing its use in feature selection, note that Information Gain could act
    as another “metric” for finding the best split in the Decision Tree along with
    Gini Impurity and Entropy. One major drawback of Information Gain being used in
    Decision Trees is that it tends to select features with more unique values. One
    example is if the dataset contains a certain attribute like Date, in usual cases,
    it would not be useful for Decision Trees to utilize such feature as its values
    are independent of targets. However, Information Gain would output a score for
    the Date feature potentially higher than other more useful features. Additionally,
    when dealing with categorical features, Information Gain favors features with
    more categories, which might not be ideal. Although Information Gain may be useful
    in serving as a “metric” during Decision Tree splits in rare cases, most of the
    time, it’s not considered due to its major disadvantage.
  prefs: []
  type: TYPE_NORMAL
- en: 'In technical terms, Information Gain produces the difference in Entropy before
    and after a transformation. When applied to classification feature selection,
    it calculates the statistical dependence between two variables, or how much information
    the two share; it’s sometimes referred to as Mutual Information. In statistics,
    the term *information* refers to how surprising a certain event is. An event is
    considered more surprising than another when it has a more balanced probability
    distribution and thus more Entropy. Entropy measures the “purity” of the dataset
    in terms of the probability distribution of samples belonging to classes. For
    example, a dataset with perfectly balanced targets (50-50 split) would result
    in Entropy of 1, while a dataset with imbalanced targets (90-10 split) would produce
    a low Entropy. Information Gain evaluates the impact on the purity by splitting
    the dataset by each unique value in the dataset. Essentially, it calculates one
    feature’s usefulness in relation to the target based on how well the feature splits
    the target. The equation for Information Gain is shown in the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Information\ Gain\left(D,X\right)= Entropy(D)- Entropy(X) $$](../images/525591_1_En_2_Chapter/525591_1_En_2_Chapter_TeX_Equk.png)'
  prefs: []
  type: TYPE_IMG
- en: The second calculation of Entropy is a conditional Entropy on the feature *X*
    in dataset *D* defined as
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Entropy(X)={\sum}_{v\in X}\frac{D_v}{D}\bullet Entropy\left({D}_v\right)
    $$](../images/525591_1_En_2_Chapter/525591_1_En_2_Chapter_TeX_Equl.png)'
  prefs: []
  type: TYPE_IMG
- en: For each term in the sum, we split the dataset by that unique value in the feature,
    *v*; calculate the Entropy for that subset, *D*[*v*]; and then multiply by the
    ratio of the subset to the whole dataset (the number of samples in *D*[*v*] divided
    by the total number of samples in the dataset *D*) and the sum of every one of
    these subsets. Finally, we compute the difference between the beginning and the
    ending Entropy. The higher the resulting value, the more information the feature
    provides us with the target.
  prefs: []
  type: TYPE_NORMAL
- en: We can demonstrate this feature selection technique with the following example
    on a dummy dataset aiming to classify the type of wine based on various attributes.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE71]'
  prefs: []
  type: TYPE_PRE
- en: After loading the dataset (Listing [2-64](#PC72)), we can first train a Decision
    Tree without feature selection for comparison later (Listing [2-65](#PC73)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE72]'
  prefs: []
  type: TYPE_PRE
- en: 'We obtain a total accuracy of 0.94 with a slight caveat: class 1’s performance
    is substantially worse than others. We can further improve the results using Information
    Gain to dispose of features that do not serve a positive influence on the model
    (Listing [2-66](#PC74)).'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE73]'
  prefs: []
  type: TYPE_PRE
- en: We obtain an `X_new` array with the top eight features selected by Information
    Gain. Now we train a new Decision Tree model with the same train-test split and
    the same parameters (Listing [2-67](#PC75)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE74]'
  prefs: []
  type: TYPE_PRE
- en: We see that our accuracy increases to an astounding 0.98 and the performance
    for class 2 is comparatively much better than the previous model trained without
    feature selection.
  prefs: []
  type: TYPE_NORMAL
- en: Information Gain is extremely useful as a feature selection technique for relatively
    smaller datasets since the computational cost increases tremendously for larger
    datasets with more unique valued features.
  prefs: []
  type: TYPE_NORMAL
- en: Variance Threshold
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'One key goal that feature selection accomplishes is that it removes excessive
    information that doesn’t provide any practical usage for predicting the target;
    thus, dropping them reduces the model size while also improving model performance.
    The statistical measure, variance, tells us about the variability in the distribution
    of a feature. In simpler terms, it measures how far the data is spread out. Usually
    when there are more unique values or when the data contains values different from
    the mean, the feature contains more useful information for the target. For example,
    a feature with a constant value would have a standard deviation of 0 and thus
    0 variances: there’s no variation in the data. Thus, our goal is to remove features
    with low variance. However, measuring the variance of certain features does not
    take the correlation of a feature to the target into account; it assumes that
    more unique values tend to perform better than features with fewer variabilities,
    as this is commonly the case. The variance of a dataset is defined as follows
    where ![$$ \underset{\_}{x} $$](../images/525591_1_En_2_Chapter/525591_1_En_2_Chapter_TeX_IEq9.png)
    is the mean of all observations or values and *n* is the number of values:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Variance=\frac{\sum {\left({x}_i-\underset{\_}{x}\right)}^2}{n-1} $$](../images/525591_1_En_2_Chapter/525591_1_En_2_Chapter_TeX_Equm.png)'
  prefs: []
  type: TYPE_IMG
- en: Compared with Information Gain, the Variance Threshold provides a significantly
    faster and simpler method of feature selection with decent improvements on models.
    The Variance Threshold is usually used as a baseline feature selector to filter
    out inadequate features without the significant computational cost. A simple demonstration
    of using the Variance Threshold to select features is shown in the following.
    Note that when using the Variance Threshold to select features by comparing and
    removing data columns over a certain value, all columns’ values must be on the
    same scale. Differently scaled values produce variance that is comparable only
    to their own scale. In our example, we used `MinMaxScaler` to scale all features
    before calculating their variance (Listing [2-68](#PC76)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE75]'
  prefs: []
  type: TYPE_PRE
- en: After scaling the data, a Decision Tree with a max depth set to 7 is trained
    as a baseline comparison (Listing [2-69](#PC77)). The classifier reaches an accuracy
    of 0.94, but the accuracy for the negative class can be as low as 0.90.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE76]'
  prefs: []
  type: TYPE_PRE
- en: With the help of removing features with low variance, we see an improvement
    in our model performance as shown in the following (Listing [2-70](#PC78)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE77]'
  prefs: []
  type: TYPE_PRE
- en: We observe a slight improvement in the accuracy, reaching 0.95 while the precision
    for true negative predictions increases to 0.92\. Depending on the threshold value,
    worse or better results may be produced. The best value can only be determined
    through trial and error.
  prefs: []
  type: TYPE_NORMAL
- en: However, there are times when the Variance Threshold provides unsatisfactory
    results as it doesn’t take into account the correlation between features and targets.
    Categorical and binary features tend to have extremely low variance due to the
    nature of their feature representation; the entirety of the dataset may only contain
    a handful of unique values, but it provides crucial clues to predicting the target.
    It’s recommended to exclude categorical or binary features while performing the
    Variance Threshold. Additionally, some datasets consist of features with high
    variability but are not necessarily useful for predicting the target, which drives
    back to the fact that the Variance Threshold does not consider relations between
    the target and the feature, thus making it an unsupervised feature selection technique.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, choosing the threshold that determines the “cut-off” depends on the
    dataset used. Some datasets may have features with high variance across the board;
    in that case, the Variance Threshold would be futile. There’s no universal rule
    of determining the threshold; the best value comes from trial and error.
  prefs: []
  type: TYPE_NORMAL
- en: High-Correlation Method
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'One of the most straightforward ways to determine whether some features will
    be adequate indicators of the target is by correlation. In statistics, correlation
    defines the relevancy between two variables; it usually produces a measure that
    specifies how well the two variables are related. The relationship between features
    and targets is arguably the most important factor that determines whether the
    trained model will predict the target well or not. Those features with low correlation
    to the target will present as noise and possibly reduce the performance of the
    trained model. Linear correlation between two variables calculated using Pearson’s
    Correlation Coefficient is frequently used to measure how closely two variables
    align with each other or their correlation. The equation for it is presented in
    the following, where ![$$ \underset{\_}{x} $$](../images/525591_1_En_2_Chapter/525591_1_En_2_Chapter_TeX_IEq10.png)
    and ![$$ \underset{\_}{y} $$](../images/525591_1_En_2_Chapter/525591_1_En_2_Chapter_TeX_IEq11.png)represent
    the mean of the *x* and *y* variables, respectively:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Pearso{n}^{\prime }s\ Correlation\ Coeffcient=\frac{\sum \left(x-\underset{\_}{x}\right)\left(y-\underset{\_}{y}\right)}{\sqrt{\sum
    {\left(x-\underset{\_}{x}\right)}^2\sum {\left(y-\underset{\_}{y}\right)}^2}}
    $$](../images/525591_1_En_2_Chapter/525591_1_En_2_Chapter_TeX_Equn.png)'
  prefs: []
  type: TYPE_IMG
- en: Pearson’s Correlation Coefficient produces a value between –1 and 1; –1 illustrates
    a negative correlation between two variables, while 1 illustrates a perfect positive
    correlation. A value of 0 indicates no correlation at all between variables. Generally,
    when the value lies above 0.5 or below –0.5, the two variables are considered
    to have a strong positive/negative correlation.
  prefs: []
  type: TYPE_NORMAL
- en: Take the Boston Housing Dataset introduced earlier as an example. We can visualize
    the correlation between each feature and the target as shown in the following,
    plotted as a heatmap (Figure [2-56](#Fig56)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig56_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A color-coded map depicts different features and their corresponding target
    values. A scale on the right represents the intensity from 0.25 to 1.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-56
  prefs: []
  type: TYPE_NORMAL
- en: The feature-to-target correlation of the Boston Housing Dataset
  prefs: []
  type: TYPE_NORMAL
- en: The target column, “MEDV,” represents the median value of owner-occupied homes
    in thousands of dollars. We see that LSTAT has an extremely high correlation value
    with the target at 0.74\. Following, columns “INDUS,” “RM,” and “PTRAIO” all have
    a correlation value of 0.5 or greater. Reasonably, the feature LSTAT, representing
    the lower status of the population in percentage, would have the highest correlation
    to the target as your social status translates to your financial situation in
    most cases.
  prefs: []
  type: TYPE_NORMAL
- en: Utilizing our correlation values, we can drop lowly correlated features with
    the target. To systematically remove such features, we select a threshold of 0.35,
    discarding any features with correlation values less than the threshold. Let’s
    compare model performance with and without those features using a simple KNN regressor
    model with a neighbor of 3 (Listing [2-71](#PC79)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE78]'
  prefs: []
  type: TYPE_PRE
- en: With the three of the lowest correlated features removed, we observe an improvement
    in the MAE by about 0.212\. However, suppose we start raising the threshold to
    remove more features; model performance will decrease dramatically, indicating
    that we took away crucial features that the model utilizes in its learning. There’s
    no perfect way to select the best universal threshold; choices are made through
    trials and errors.
  prefs: []
  type: TYPE_NORMAL
- en: 'Although linear correlation can be a useful tool to measure features’ effectiveness,
    the complexity it presents compares lowly with other methods. Adding on, Pearson’s
    Correlation Coefficient can only be used when the data is Gaussian distributed.
    When the data does not satisfy the distribution, Rank Correlation should be used.
    Instead of using the actual values of the features, Rank Correlation methods compute
    the ordinal association between two variables: each set of similar values is replaced
    with a “rank” or “order” that does not assume any distribution of data. These
    methods produce values with a similar trend as Pearson’s Correlation Coefficient
    but can be used on data with any distribution, thus sometimes referred to as nonparametric
    correlation. The correlation values of the Boston Housing Dataset are presented
    in the following using Spearman’s Rank Coefficient (Figure [2-57](#Fig57)).'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig57_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A color-coded map depicts different features and their corresponding coefficients.
    A scale on the right represents the intensity from negative 0.5 to 1.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-57
  prefs: []
  type: TYPE_NORMAL
- en: The feature-to-target correlation of the Boston Housing Dataset using Spearman’s
    Rank Coefficient
  prefs: []
  type: TYPE_NORMAL
- en: Finally, no matter what correlation method is being used, high correlation doesn’t
    always translate to the causation of one feature to the target. Measuring correlation
    and filtering out features based on their values is useful. However, many large
    modern datasets model relationships much more complex than linear or even quadratic;
    thus, correlation filtration methods may be deemed useless in those cases.
  prefs: []
  type: TYPE_NORMAL
- en: Calculating these values may still present a nice visual and a basic idea of
    direct features related to the target, but whether it’ll improve model performance
    or not depends on what the model produces.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: The Boston Housing Dataset contains a problematic feature, B. See the preceding
    exploration of the significance of B. Using models trained on the Boston Housing
    Dataset in real-world applications is not recommended.
  prefs: []
  type: TYPE_NORMAL
- en: Recursive Feature Elimination
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In previous sections, all feature selection techniques introduced are in the
    form of measuring some individual properties relative to each feature and then
    determining the removal of features based on their “measures.” These methods are
    universal and can be applied to any dataset using the same pipeline and process.
    But at the end of the day, feature selection is aimed at improving model performance,
    and therefore it is crucial to observe how well each feature specifically contributes
    to model performance. Recursive Feature Elimination (RFE) is a process in which
    features are removed (eliminated) based on how much they contribute to a trained
    model.
  prefs: []
  type: TYPE_NORMAL
- en: Due to its effectiveness and flexibility, RFE is one of the most used feature
    selection algorithms. RFE is not a single method or tool; it’s a wrapper that
    can adapt to any model depending on the use case. In the following example, Random
    Forest will be used as the model for feature selection; however, it can be replaced
    with any other model to improve performance.
  prefs: []
  type: TYPE_NORMAL
- en: Like the Boston Housing Dataset introduced earlier, the Forest Cover dataset
    is another popular dataset for benchmarking tabular classification models. The
    data is collected from four wilderness areas in the Roosevelt National Forest
    in Colorado. Cartographic data that defines an area of 30 meters by 30 meters
    is used to predict the type of forest for each observation. The data includes
    54 features and seven classes with 581 thousand samples, so it is framed as a
    multiclass classification problem.
  prefs: []
  type: TYPE_NORMAL
- en: We will first establish a baseline model using Random Forest and measure our
    performance using ROC-AUC. Then, we will use RFE to remove features to reduce
    model complexity while improving model predictions (Listing [2-72](#PC80)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE79]'
  prefs: []
  type: TYPE_PRE
- en: After initial modeling, the ROC-AUC score is sitting around 0.939 using all
    54 features. From here, we can recursively remove features by iteratively modeling
    and comparing performances. For each feature, the trained model has a weight or
    a value of importance assigned to it based on the training results. The determination
    of this feature importance value works differently for different algorithms. For
    example, in regression algorithms, the feature importance is simply the weight
    multiplied by the feature associated with the weight. Coefficients in regression
    algorithms act as weights that tell how much each feature should contribute to
    the final prediction. On the other hand, feature importance in tree-based methods
    such as Decision Tree and Random Forest is computed as the total reduction in
    the criterion used that one feature brought.
  prefs: []
  type: TYPE_NORMAL
- en: In the scikit-learn API, feature importance for the model can be obtained by
    calling either the `coef_` or the `feature_importances_` attribute on a fitted
    model. By sorting the importance values and visualizing them through bar graphs
    (Figure [2-58](#Fig58)), we can remove features that contribute to the model poorly
    (Listing [2-73](#PC81)). However, each time one feature is removed, the coefficient
    or importance values change. So we need to remove features one at a time and recompute
    feature importance by retraining the model.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig58_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A horizontal bar graph plots feature versus importance. Features 0 and 25 have
    the maximum and minimum values, respectively.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-58
  prefs: []
  type: TYPE_NORMAL
- en: Top ten most important features
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE80]'
  prefs: []
  type: TYPE_PRE
- en: 'To perform RFE, scikit-learn implemented a wrapper class called `RFE` (Listing
    [2-74](#PC82)). The object instantiates with a scikit-learn-like model and various
    hyperparameters. One major downfall for RFE and the reason that it can’t be used
    in any dataset is its computational expenses. For each iteration of RFE, a new
    model is trained with the full dataset, which results in heavy computational time
    and costs. RFE does slightly improve with the parameter step: it defines how many
    features to remove at each iteration. Instead of removing feature one by one,
    if necessary, more than one can be removed to decrease training time.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE81]'
  prefs: []
  type: TYPE_PRE
- en: 'By keeping the top 20 features and removing the other 34, our ROC-AUC score
    did not decrease; it even increased to 0.94! But the problem with RFE is apparent:
    for a dataset with only 50 features and a few hundred thousand samples, the training
    time is already extremely high. It’s difficult to scale RFE to larger datasets
    containing thousands of features and millions of samples. Even with modern GPUs,
    one iteration of training can take up to hours.'
  prefs: []
  type: TYPE_NORMAL
- en: The trade-off between performance and training time should be considered and
    kept balanced. Sometimes, RFE would consume a significant amount of computational
    power and time, while using a faster algorithm can provide slightly decreased
    accuracy but at a much faster time. It’s up to the data scientist to make the
    decision.
  prefs: []
  type: TYPE_NORMAL
- en: Permutation Importance
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Permutation Importance can be seen as another way of calculating feature importance.
    Both Permutation Importance and feature importance measure how much one feature
    contributes to the overall prediction. However, the calculation of Permutation
    Importance is independent of the model, meaning that the algorithm remains the
    same no matter what machine learning model is used. Permutation Importance’s speed
    depends on the model prediction rate, but it’s still relatively faster than other
    feature selection algorithms such as RFE.
  prefs: []
  type: TYPE_NORMAL
- en: Permutation Importance produces a measure of relevancy from the feature to the
    target. Logically, features with low Permutation Importance are potentially unnecessary
    to the model, while features with higher Permutation Importance may be deemed
    more useful to the model.
  prefs: []
  type: TYPE_NORMAL
- en: The algorithm starts by shuffling the rows of one feature in the validation
    dataset. After the shuffling, we predict using the trained model and observe the
    effect that the shuffling has on performance. Theoretically, if one feature is
    crucial to the model, it would significantly decrease the accuracy of the model
    prediction. On the other hand, if the feature shuffled does not contribute to
    model prediction as much, then it wouldn’t affect the model performance as much.
    By computing the loss function compared to the ground-truth values, we can obtain
    a measure of feature importance by the performance deterioration from shuffled
    features.
  prefs: []
  type: TYPE_NORMAL
- en: Still using the Forest Cover dataset from RFE as a comparison for feature importance,
    we can use the following code for the baseline model (Listing [2-75](#PC83)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE82]'
  prefs: []
  type: TYPE_PRE
- en: Scikit-learn does not provide a naïve implementation for Permutation Importance;
    instead, we can use the eli5 library, which is compatible with scikit-learn models.
  prefs: []
  type: TYPE_NORMAL
- en: To calculate and display Permutation Importance, we can simply call `fit` and
    `feature_importances_`, respectively (Listing [2-76](#PC84)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE83]'
  prefs: []
  type: TYPE_PRE
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig59_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A horizontal bar graph between feature and importance. Features 0 and 51 have
    the maximum and minimum values, respectively.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-59
  prefs: []
  type: TYPE_NORMAL
- en: Top ten most important features using Permutation Importance
  prefs: []
  type: TYPE_NORMAL
- en: Comparing the calculated feature importances with those from Random Forest in
    the “Recursive Feature Elimination” section, we observe that the order of importance
    follows a similar pattern but is not exactly the same (Figure [2-59](#Fig59)).
    For comparison against RFE and its calculation of feature importance, we will
    take the top 20 features and retrain our Random Forest model (Listing [2-77](#PC85)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE84]'
  prefs: []
  type: TYPE_PRE
- en: We obtain a ROC-AUC score of around 0.9416, slightly higher than using RFE.
    RFE and Permutation Importance are extremely alike in terms of algorithmic approaches,
    but their proper use cases are quite different. Permutation Importance requires
    the testing data to be labeled, and the shuffling of features is random. Sometimes
    deterministic results may be more important than computational expenses. On the
    contrary, sometimes where computational time is not easily available, Permutation
    Importance provides a faster approach to feature selection that produces competitive
    results.
  prefs: []
  type: TYPE_NORMAL
- en: LASSO Coefficient Selection
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Recall that during Linear Regression, a coefficient is assigned to each feature,
    acting as a weight that decides how much that feature will contribute to the final
    prediction. Ideally, a perfectly trained regression model would also have perfect
    coefficients and thus perfect feature importance. As RFE and Permutation Importance
    demonstrate the concept, we could select and remove features based on their feature
    importance. Those features with low or zero weight are unimportant or do not contribute
    to the prediction, so we do not need them for training as they only increase training
    time and possibly even reduce the performance of our models. Luckily, LASSO regression
    does this exactly. Depending on the adjustable hyperparameter, the weights of
    unimportant features will shrink to zero.
  prefs: []
  type: TYPE_NORMAL
- en: 'As mentioned in the previous chapter, the Least Absolute Shrinkage and Selection
    Operator (LASSO) regression adds a penalty term to Linear Regression for regularization:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ c\left(\beta, \varepsilon \right)=\frac{1}{n}{\left\Vert X\beta +\varepsilon
    -y\right\Vert}_2^2+\lambda {\left\Vert \beta \right\Vert}_1 $$](../images/525591_1_En_2_Chapter/525591_1_En_2_Chapter_TeX_Equo.png)'
  prefs: []
  type: TYPE_IMG
- en: We can utilize the fact that LASSO regression shrinks the weights of some features
    to zero as a feature selection technique, removing those with zero weight. The
    *λ* parameter controls how much shrinkage there should be. The greater *λ* is,
    the more likely regularization is to lead to zero weights.
  prefs: []
  type: TYPE_NORMAL
- en: 'LASSO regression itself might not be fit for prediction on datasets as it’s
    too simple to model the complex relationship present in every intricate dataset.
    However, we can utilize its coefficient to select useful features and train these
    features with another model that might fit the dataset better. The process is
    demonstrated in the following using the same process as in RFE and Permutation
    Importance: train a baseline model, perform feature selection, and then retrain
    the model and observe for improvements (Listing [2-78](#PC86)).'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE85]'
  prefs: []
  type: TYPE_PRE
- en: After training a baseline model, we train a LASSO regression model on the data
    with some value as *λ*. As the value of *λ* increases, more features tend to get
    a weight of zero. There’s no optimal way of finding *λ* other than trial and error.
    In the following example, *λ* is set to 0.005, removing 26 features after training
    (Listing [2-79](#PC87)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE86]'
  prefs: []
  type: TYPE_PRE
- en: The ROC-AUC score of our model improved to about 0.9406 with only 28 features
    out of the 54 original ones. Remember that this result can be improved upon by
    tuning the hyperparameter alpha, or *λ* in our preceding equation. Lastly, we
    can visualize some of the most important features calculated by LASSO using a
    bar graph.
  prefs: []
  type: TYPE_NORMAL
- en: Notice that in our feature importance graph in Figure [2-60](#Fig60), our top
    features are somewhat different compared with those produced by Random Forest
    in RFE and Permutation Importance. One major difference between Random Forest
    and LASSO regression is their ability to model relationships. LASSO regression
    can only model linear relationships, while Random Forest can handle data in which
    the feature-target relationship is nonlinear. LASSO regression may not explain
    the convoluted relationships in modern datasets, but its speed is extremely fast
    compared with other algorithms including Information Gain, RFE, and Permutation
    Importance. LASSO coefficient selection can commonly serve as quick insight into
    feature selection or act as a baseline selection tool. However, it should be used
    cautiously since it may remove important features to models that can model nonlinear
    relationships.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_2_Chapter/525591_1_En_2_Fig60_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A horizontal bar graph of feature versus importance. Feature 10 has the maximum
    value while the values for features 6, 8, and 7 are almost negligible.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-60
  prefs: []
  type: TYPE_NORMAL
- en: Top ten most important features using LASSO regression
  prefs: []
  type: TYPE_NORMAL
- en: Key Points
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In this chapter, we discussed several key components of data preparation and
    engineering: TensorFlow datasets, data encoding, feature extraction, and feature
    selection.'
  prefs: []
  type: TYPE_NORMAL
- en: TensorFlow datasets are used for large datasets intended for neural network
    models to make them memory-feasible. TensorFlow Sequence datasets are user-defined
    data loading classes that offer flexibility in how data is loaded and passed into
    the model.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Not all tabular datasets are small and convenient to manipulate, especially
    modern tabular datasets related to the biomedical field. Five methods are introduced
    to either reduce the dataset size or avoid loading in the entirety of the dataset
    file into memory:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Pickle files are Python-specific file formats. Saving Pandas DataFrames to pickle
    files can decrease loading time and decrease file size.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: SciPy and TensorFlow sparse matrices are both approaches to compress sparse
    data. This allows for easier manipulation on the dataset without worrying about
    OOM errors.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Pandas Chunker allows for Pandas DataFrames to be loaded as an iterator with
    a user-specified chunk size. This can be used in conjunction with TensorFlow datasets
    to load in only one batch of data at once.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Storing data in h5 files compresses the data in binary format. The Python library
    h5py can create a “link” between a variable defined within program and the file
    stored on disk. This is a lot more flexible compared with Pandas Chunker as any
    number or portion of the data can be accessed.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: A NumPy memory map provides similar functionality as pyh5 in terms of creating
    a reference between the program and data stored on disk. However, NumPy memory
    maps can be used without all the hassle of using h5py syntax and can be done in
    one line.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Often, the raw data that we collect is not in a form suitable for model training.
    The primary prerequisite for data is that it must be quantitative, but we also
    want the data’s quantitative form to be representative of its nature or properties
    (i.e., we want to *encode* the attributes of the data into how the model sees
    it).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Strategies for encoding discrete data*: Label encoding (each class is arbitrarily
    associated with an integer), one-hot encoding (one position corresponding to the
    class in a one-hot vector is marked with a 1, whereas all others are marked as
    0), binary encoding (the binary representation of the label encoding for each
    class is used), frequency encoding (the class is associated with the frequency
    of that class in the dataset), target encoding (the class is associated with the
    aggregated target value for items of that class), leave-one-out encoding (target
    encoding but the current row is not considered in the aggregation calculation),
    James-Stein encoding (like target encoding, but considers both the overall mean
    and the individual mean per class), weight of evidence encoding (uses the WoE
    formula to determine how much a class helps distinguish the target).'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Strategies for encoding continuous data*: Min-max scaling (the data is scaled
    such that the lowest value is 0 and the highest is 1 or some other set of bounds),
    robust scaling (similar to min-max scaling, but the first and third quartiles
    are used as relevant distribution markers instead of the min and max values),
    standardization (data is divided by the standard deviation after subtracting the
    mean).'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Strategies for encoding text data*: keyword search, raw vectorization (treat
    each word/token as a class and run one-hot encoding), a bag of words (count the
    number of words/tokens in a sequence), *n*-grams (count the number of sequential
    combinations of *n* words/tokens in a sequence), TF-IDF (balances how often a
    term appears in a document vs. overall to evaluate its relevance), sentiment extraction
    (quantitative markers of a text’s sentiment qualities), Word2Vec (embeddings learned
    by a neural network as optimal to performing a language task).'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Strategies for encoding time/temporal data*: Represent each time as the number
    of base units after a starting time (only use for interpolation), extract cyclical
    features of time (season, month, weekday, hour, etc.), and detect if it is a significant
    day/time (holiday, rush hour, etc.).'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Strategies for encoding geographical data*: Obtain quantitative abstract subcomponents
    of location like country or state/province and obtain latitude and longitude.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Feature extraction/engineering methods are crucial techniques to consider before
    applying any sort of model. Feature extraction algorithms aim to find a representation
    of the original data in a lower dimension that preserves the most information.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Algorithms like PCA and t-SNE are unsupervised dimensionality reduction techniques
    that project data onto a lower dimension while trying to preserve the overall
    structure of data as much as possible.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: PCA is fast compared with t-SNE but does not focus on local distances between
    points. While t-SNE does put more attention to spaces between local points, the
    algorithm is extremely computationally heavy and has rare use cases for feature
    extraction, although, as we will see later on, t-SNE plays a major role in model
    interpretation during deep learning pipelines.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: On the other hand, LDA is supervised and assumes that the data is normally distributed
    and has a similar variance. LDA is a classification algorithm, but it can also
    be used as a dimensionality reduction technique with the number of components
    kept being equal to or lower than the number of classes. Again, LDA isn’t as popular
    as PCA when used for feature extraction, but it does perform fairly well in most
    situations.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Finally, statistics-based engineering creates new features by extracting higher-order
    statistics of each row in the dataset. This can help the model look at how each
    single feature associates with the target and how each sample’s features as a
    whole affect the target.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Feature selection methods can be utilized to not only improve model performance
    but decrease training time by reducing the size of the dataset. Most if not all
    feature selection methods follow the two basic steps: obtain value for a certain
    metric and select features based on the threshold of the metric.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Algorithms such as the Variance Threshold, high-correlation method, and LASSO
    coefficient selection are fast to execute even operating on large datasets. However,
    none of these methods are model specific, meaning that they apply universally
    to any dataset regardless of what model will be used to train.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Feature selection techniques such as RFE and Permutation Importance are model
    specific as they rely on the output of trained models. They tend to perform better
    than those methods mentioned previously, but they are significantly more computationally
    expensive as they require multiple iterations of model training.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Information Gain provides better results than the Variance Threshold and high-correlation
    method, but like those that are model specific, it’s computationally expensive.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: In the next chapter, we will begin our exploration of deep learning with neural
    networks.
  prefs: []
  type: TYPE_NORMAL
