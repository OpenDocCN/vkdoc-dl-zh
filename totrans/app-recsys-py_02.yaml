- en: Apriori Algorithm Concepts
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Refer to Chapter [1](537881_1_En_1_Chapter.xhtml) for more information.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [2-25](#Fig25) explains the support.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537881_1_En_2_Chapter/537881_1_En_2_Fig25_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration of the apriori-support. Support is equal to 10 over 100, which
    is equal to 10 percent.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-25
  prefs: []
  type: TYPE_NORMAL
- en: Support
  prefs: []
  type: TYPE_NORMAL
- en: Let’s look at an example. If 10 out of 100 users purchase milk, support for
    milk is 10/100 = 10%. The calculation formula is shown in Figure [2-26](#Fig26).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537881_1_En_2_Chapter/537881_1_En_2_Fig26_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A set of 2 formulas for calculating movie recommendations and market basket
    optimization.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-26
  prefs: []
  type: TYPE_NORMAL
- en: Formula
  prefs: []
  type: TYPE_NORMAL
- en: Suppose you are looking to build a relationship between milk and bread. If 7
    out of 40 milk buyers also buy bread, then confidence = 7/40 = 17.5%
  prefs: []
  type: TYPE_NORMAL
- en: Figure [2-27](#Fig27) explains confidence.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537881_1_En_2_Chapter/537881_1_En_2_Fig27_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration explains the percentage obtained in confidence. Confidence is
    equal to 7 over 40, which is equal to 17.5 percent.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-27
  prefs: []
  type: TYPE_NORMAL
- en: Confidence
  prefs: []
  type: TYPE_NORMAL
- en: The formula to calculate confidence is shown in Figure [2-28](#Fig28).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537881_1_En_2_Chapter/537881_1_En_2_Fig28_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A set of 2 formulas for calculating movie recommendation and market basket optimization.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-28
  prefs: []
  type: TYPE_NORMAL
- en: Formula
  prefs: []
  type: TYPE_NORMAL
- en: The basic formula is lift = confidence/support.
  prefs: []
  type: TYPE_NORMAL
- en: So here, lift = 17.5/10 = 1.75.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [2-29](#Fig29) explains lift and the formula.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537881_1_En_2_Chapter/537881_1_En_2_Fig29_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration of the value of lift. Lift is equal to 17.5 % over 10 %, which
    is equal to 1.75\. Two formulas of movie recommendation and market basket optimization
    to calculate lift.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-29
  prefs: []
  type: TYPE_NORMAL
- en: Lift
  prefs: []
  type: TYPE_NORMAL
