- en: 2. Market Basket Analysis (Association Rule Mining)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2. 市场篮子分析（关联规则挖掘）
- en: Market basket analysis (MBA) is a technique used in data mining by retail companies
    to increase sales by better understanding customer buying patterns. It involves
    analyzing large datasets, such as customer purchase history, to uncover item groupings
    and products that are likely to be frequently purchased together.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 市场篮子分析（MBA）是零售公司用于数据挖掘的技术，通过更好地理解客户购买模式来增加销售额。它涉及分析大型数据集，如客户购买历史，以揭示可能经常一起购买的物品分组和产品。
- en: Figure [2-1](#Fig1) explains the MBA at a high level.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [2-1](#Fig1) 从高层次解释了MBA。
- en: '![](../images/537881_1_En_2_Chapter/537881_1_En_2_Fig1_HTML.jpg)'
  id: totrans-3
  prefs: []
  type: TYPE_IMG
  zh: '![图 1](../images/537881_1_En_2_Chapter/537881_1_En_2_Fig1_HTML.jpg)'
- en: The framework of M B A explains the market basket transaction data. An example
    of a frequent itemset is at the bottom.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: MBA框架解释了市场篮子交易数据。一个频繁项集的例子在底部。
- en: Figure 2-1
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-1
- en: MBA explained
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: MBA解释
- en: This chapter explores the implementation of market basket analysis with the
    help of an open source e-commerce dataset. You start with the dataset in *exploratory
    data analysis* (EDA) and focus on critical insights. You then learn about the
    implementation of various techniques in MBA, plot a graphical representation of
    the associations, and draw insights.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 本章探讨了在开源电子商务数据集的帮助下实施市场篮子分析。你从数据集开始进行*探索性数据分析*（EDA），并关注关键见解。然后你学习MBA中各种技术的实施，绘制关联的图形表示，并得出见解。
