- en: Summary
  id: totrans-491
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, you learned how to build a recommendation system based on market
    basket analysis. You also learned how to fetch items that are frequently purchased
    together and offer suggestions to users. Most e-commerce sites use this method
    to showcase items bought together. This chapter implemented this method in Python
    using an e-commerce example.
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你学习了如何基于市场篮子分析构建推荐系统。你还学习了如何获取经常一起购买的商品并向用户提供建议。大多数电子商务网站都使用这种方法来展示一起购买的商品。本章使用
    Python 和一个电子商务示例实现了这种方法。
