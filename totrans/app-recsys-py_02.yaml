  zh: 图2-26
- en: Formula
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 公式
- en: Suppose you are looking to build a relationship between milk and bread. If 7
    out of 40 milk buyers also buy bread, then confidence = 7/40 = 17.5%
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你想要在牛奶和面包之间建立关系。如果40个牛奶购买者中有7个也购买了面包，那么置信度 = 7/40 = 17.5%
- en: Figure [2-27](#Fig27) explains confidence.
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 图[2-27](#Fig27)解释了置信度。
- en: '![](../images/537881_1_En_2_Chapter/537881_1_En_2_Fig27_HTML.png)'
  id: totrans-382
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537881_1_En_2_Chapter/537881_1_En_2_Fig27_HTML.png)'
- en: An illustration explains the percentage obtained in confidence. Confidence is
    equal to 7 over 40, which is equal to 17.5 percent.
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 一个示例解释了置信度获得的百分比。置信度等于7除以40，即17.5%。
- en: Figure 2-27
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-27
- en: Confidence
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 置信度
- en: The formula to calculate confidence is shown in Figure [2-28](#Fig28).
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 计算置信度的公式如图[2-28](#Fig28)所示。
- en: '![](../images/537881_1_En_2_Chapter/537881_1_En_2_Fig28_HTML.png)'
