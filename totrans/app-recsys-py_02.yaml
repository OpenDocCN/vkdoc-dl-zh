  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537881_1_En_2_Chapter/537881_1_En_2_Fig28_HTML.png)'
- en: A set of 2 formulas for calculating movie recommendation and market basket optimization.
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 两个用于计算电影推荐和市场篮子优化的公式集。
- en: Figure 2-28
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-28
- en: Formula
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 公式
- en: The basic formula is lift = confidence/support.
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 基本公式是提升度 = 置信度/支持度。
- en: So here, lift = 17.5/10 = 1.75.
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，这里，提升度 = 17.5/10 = 1.75。
- en: Figure [2-29](#Fig29) explains lift and the formula.
