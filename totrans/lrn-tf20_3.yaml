- en: As observed, the training accuracy for the simple neural network is about 90%,
    whereas it is 94% for the DNNs, and the test accuracy for the simple neural network
    is about 87%, whereas it is 89% for DNNs. It goes to show that we were able to
    achieve higher accuracy by adding more hidden layers to the neural network architecture.
  prefs: []
