- en: Deep Neural Networks (DNNs)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When a simple neural network has more than one hidden layer, it is known as
    a deep neural network (DNN). Figure [3-8](#Fig8) shows the architecture of a typical
    DNN.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_3_Chapter/489297_1_En_3_Fig8_HTML.jpg](../images/489297_1_En_3_Chapter/489297_1_En_3_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-8
  prefs: []
  type: TYPE_NORMAL
- en: Deep neural network with three hidden layers
  prefs: []
  type: TYPE_NORMAL
- en: It consists of an input layer with two input variables, three hidden layers
    with three neurons each, and an output layer (consisting either of a single output
    for regression or multiple outputs for classification). The more hidden layers,
    the more neurons. Hence, the neural network is able to learn the nonlinear (non-convex)
    relation between the inputs and output. However, having more hidden layers adds
    to the computation cost, so one has to think in terms of a trade-off between computation
    cost and accuracy.
  prefs: []
  type: TYPE_NORMAL
