- en: 3. Neural Networks and Deep Learning with TensorFlow
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This chapter focuses on neural networks and how we can build them to perform
    machine learning, by closely mimicking the human brain. We will start by determining
    what neural networks are and how similarly they are structured to the neural network
    in humans. Then, we will deep dive into the architecture of neural networks, exploring
    the different layers within. We will explain how a simple neural network is built
    and delve into the concepts of forward and backward propagation. Later, we will
    build a simple neural network, using TensorFlow and Keras. In the final sections
    of this chapter, we will discuss deep neural networks, how they differ from simple
    neural networks, and how to implement deep neural networks with TensorFlow and
    Keras, again with performance comparisons to simple neural networks.
  prefs: []
  type: TYPE_NORMAL
- en: What Are Neural Networks?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Neural networks are a type of machine learning algorithm that tries to mimic
    the human brain. Computers always have been better at performing complex computations,
    compared to humans. They can do the calculations in no time, whereas for humans,
    it takes a while to perform even the simplest of operations manually. Then why
    do we need machines to mimic the human brain? The reason is that humans have common
    sense and imagination. They can be inspired by something to which computers cannot.
    If the computational capability of computers is combined with the common sense
    and imagination of humans, which can function continually 365 days a year, what
    is created? Superhumans? The response to those questions defines the whole purpose
    of artificial intelligence (AI).
  prefs: []
  type: TYPE_NORMAL
- en: Neurons
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The human body consists of neurons, which are the basic building blocks of the
    nervous system. A neuron consists of a cell body, or soma, a single axon, and
    dendrites (Figure [3-1](#Fig1)). Neurons are connected to one another by the dendrites
    and axon terminals. A signal from one neuron is passed to the axon terminal and
    dendrites of another connected neuron, which receives it and passes it through
    the soma, axon, and terminal, and so on.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_3_Chapter/489297_1_En_3_Fig1_HTML.jpg](../images/489297_1_En_3_Chapter/489297_1_En_3_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-1
  prefs: []
  type: TYPE_NORMAL
- en: 'Structure of a neuron (Source: [`https://bit.ly/2zOekEL`](https://bit.ly/2zOekEL))'
  prefs: []
  type: TYPE_NORMAL
- en: Neurons are interconnected in such a way that they have different functions,
    such as sensory neurons, which respond to such stimuli as sound, touch, or light;
    motor neurons, which control the muscle movements in the body; and interneurons,
    which are connected neurons within the same region of the brain or spinal cord.
  prefs: []
  type: TYPE_NORMAL
- en: Artificial Neural Networks (ANNs)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'An artificial neural network tries to mimic the brain at its most basic level,
    i.e., that of the neuron. An artificial neuron has a similar structure to that
    of a human neuron and comprises the following sections (Figure [3-2](#Fig2)):'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_3_Chapter/489297_1_En_3_Fig2_HTML.jpg](../images/489297_1_En_3_Chapter/489297_1_En_3_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-2
  prefs: []
  type: TYPE_NORMAL
- en: Artificial neural network
  prefs: []
  type: TYPE_NORMAL
- en: '*Input layer*: This layer is similar to dendrites and takes input from other
    networks/neurons.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Summation* *layer*: This layer functions like the soma of neurons. It aggregates
    the input signal received.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Activation* *layer*: This layer is also similar to a soma, and it takes the
    aggregated information and fires a signal only if the aggregated input crosses
    a certain threshold value. Otherwise, it does not fire.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Output layer*: This layer is similar to axon terminals in that it might be
    connected to other neurons/networks or act as a final output layer (for predictions).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the preceding figure, `X`[`1`], `X`[`2`], `X`[`3`],………`X`[`n`] are the inputs
    fed to the neural network. `W`[`1`], `W`[`2`], `W`[`3`],**…………**`W`[`n`] are the
    weights associated with the inputs, and `Y` is the final prediction.
  prefs: []
  type: TYPE_NORMAL
- en: Many activation functions can be used in the activation layer, to convert all
    the linear details produced at the input and make the summation layer nonlinear.
    This helps users acquire more details about the input data that would not be possible
    if this were a linear function. Therefore, the activation layer plays an important
    role in predictions. Some of the most familiar types of activation functions are
    sigmoid, ReLU, and softmax.
  prefs: []
  type: TYPE_NORMAL
- en: Simple Neural Network Architecture
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As shown in Figure [3-3](#Fig3), a typical neural network architecture is made
    up of an
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_3_Chapter/489297_1_En_3_Fig3_HTML.jpg](../images/489297_1_En_3_Chapter/489297_1_En_3_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-3
  prefs: []
  type: TYPE_NORMAL
- en: Simple neural network architecture—regression
  prefs: []
  type: TYPE_NORMAL
- en: Input layer
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Hidden layer
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Output layer
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Every input is connected to every neuron of the hidden layer and, in turn, connected
    to the output layer. If we are solving a regression problem, the architecture
    looks like the one shown in Figure [3-3](#Fig3), in which we have the output `Y`[`p`**,**]
    which is continuous if predicted at the output layer. If we are solving a classification
    (binary, in this case), we will have the outputs `Y`[`class1`] and `Y`[`class2`],
    which are the probability values for each of the binary classes 1 and 2 at the
    output layer, as shown in Figure [3-4](#Fig4).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_3_Chapter/489297_1_En_3_Fig4_HTML.jpg](../images/489297_1_En_3_Chapter/489297_1_En_3_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-4
  prefs: []
  type: TYPE_NORMAL
- en: Simple neural network architecture—classification
  prefs: []
  type: TYPE_NORMAL
- en: Forward and Backward Propagation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In a fully connected neural network, when the inputs pass through the neurons
    (hidden layer to output layer), and the final value is calculated at the output
    layer, we say that the inputs have *forward propagated* (Figure [3-5](#Fig5)).
    Consider, for example, a fully connected neural network with two inputs, `X`[`1`]
    and `X`[`2`], and one hidden layer with three neurons and an output layer with
    a single output `Y`[`p`] (numeric value).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_3_Chapter/489297_1_En_3_Fig5_HTML.jpg](../images/489297_1_En_3_Chapter/489297_1_En_3_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-5
  prefs: []
  type: TYPE_NORMAL
- en: Forward propagation
  prefs: []
  type: TYPE_NORMAL
- en: 'The inputs will be fed to each of the hidden layer neurons, by multiplying
    each input value with a weight (`W`) and summing them with a bias value (`b`).
    So, the equations at the neurons’ hidden layer will be as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: The values `H`[`1`], `H`[`2`], and `H`[`3`] will be passed to the output layer,
    with weights `W`[`7`], `W`[`8`], and `W`[`9`], respectively. The output layer
    will produce the final predicted value of `Y`[`p`].
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: As the input data (`X`[`1`] and `X`[`2`]) in this network flows in a forward
    direction to produce the final outcome, `Y`[`p`], it is said to be a feed forward
    network, or, because the data is propagating in a forward manner, a *forward propagation*.
  prefs: []
  type: TYPE_NORMAL
- en: Now, suppose the actual value of the output is known (denoted by `Y`). In this
    case, we can calculate the difference between the actual value and the predicted
    value, i.e., `L = (Y - Y`[`p`]`)`^(`2`), where `L` is the loss value.
  prefs: []
  type: TYPE_NORMAL
- en: To minimize the loss value, we will try to optimize the weights accordingly,
    by taking a derivate of the loss function to the previous weights, as shown in
    Figure [3-6](#Fig6).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_3_Chapter/489297_1_En_3_Fig6_HTML.jpg](../images/489297_1_En_3_Chapter/489297_1_En_3_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-6
  prefs: []
  type: TYPE_NORMAL
- en: Backward propagation
  prefs: []
  type: TYPE_NORMAL
- en: For example, if we have to find the rate of change of loss function as compared
    to `W`[`7`], we would take a derivate of the `Loss` function to that of `W`[`7`]
    `(dL/dW`[`7`]`)`, and so on. As we can see from the preceding diagram, the process
    of taking the derivates is moving in a backward direction, that is, a backward
    propagation is occurring. There are multiple optimizers available to perform backward
    propagation, such as stochastic gradient descent (SGD), AdaGrad, among others.
  prefs: []
  type: TYPE_NORMAL
- en: Building Neural Networks with TensorFlow 2.0
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Using the Keras API with TensorFlow, we will be building a simple neural network
    with only one hidden layer.
  prefs: []
  type: TYPE_NORMAL
- en: About the Data Set
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s implement a simple neural network, using TensorFlow 2.0\. For this, we
    will make use of the Fashion-MNIST data set by Zalando (The MIT License [MIT]
    Copyright © [2017] Zalando SE, [`https://tech.zalando`.`com`](https://tech.zalando.com)),
    which contains 70,000 images (in grayscale) in 10 different categories. The images
    are 28 `×` 28 pixels of individual articles of clothing, with values ranging from
    0 to 255, as shown in Figure [3-7](#Fig7).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_3_Chapter/489297_1_En_3_Fig7_HTML.jpg](../images/489297_1_En_3_Chapter/489297_1_En_3_Fig7_HTML.jpg)'
