  type: TYPE_NORMAL
  zh: 我要感谢Emmanuel Okoi、Jesam Ujong、Adie Patrick、Redarokim Ikonga以及希望沃德尔老学生协会（HWOSA）的家庭；他们在压力时期提供了社区和乐趣，缓解了情绪。特别感谢当时我的室友，Jonathan
