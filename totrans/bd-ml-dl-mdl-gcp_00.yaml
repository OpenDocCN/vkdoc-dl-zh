  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我特别感谢我在Pythian的前同事和朋友们，Vanessa Simmons、Alex Gorbachev和Paul Spiegelhalter，他们在旅途中给予了我帮助和支持。我要感谢在渥太华、多伦多、温尼伯、卡拉斯和奥韦里的House
    Fellowships的兄弟姐妹们；他们构成了我的公司，是终生的朋友。我还要感谢标准世界广播网络（SWBN）的员工和机组人员，他们共同努力，在我参与这个项目时保持愿景的运行。特别感谢Susan
    McDermott、Rita Fernando以及Apress的出版和编辑团队对这一项目的支持和信念。感谢Vikram Tiwari和Gonzalo Gasca
    Meza，他们为这份手稿提供了技术审查。
- en: Finally, I conclude by giving special thanks to my family, starting with my
    loving Father and Mother, Francis Ebuta and Nonso Ngozika Bisong; they have been
    a rock in my life and have been there to counsel and encourage me, I am truly
    grateful for my loving parents. To my siblings, Osowo-Ayim, Chidera, and Ginika
    Bisong, and the extended Bisong family for the constant stream of love and support.
    Finally, a big shout-out to my aunty and friend, Joy Duncan, for her love and
    friendship; she is most dear to my heart. Also, my appreciation to Uncle Wilfred
    Achu and Aunty Blessing Bisong, they have been most kind to me and I am very thankful.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我通过特别感谢我的家人来结束，从我的爱父爱母Francis Ebuta和Nonso Ngozika Bisong开始；他们是我生命中的支柱，一直在我身边提供咨询和鼓励，我真正感激我的父母。感谢我的兄弟姐妹Osowo-Ayim、Chidera和Ginika
    Bisong，以及Bisong家族的扩展成员，他们不断给予爱和支援。最后，向我的阿姨和好友Joy Duncan致以崇高的敬意，感谢她的爱和友谊；她是我心中最亲爱的人。还要感谢Wilfred
    Achu叔叔和Blessing Bisong阿姨，他们对我非常善良，我非常感激。
