- en: Introduction
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 引言
- en: Machine learning and deep learning technologies have impacted the world in profound
    ways, from how we interact with technological products and with one another. These
    technologies are disrupting how we relate, how we work, and how we engage life
    in general. Today, and in the foreseeable future, intelligent machines increasingly
    form the core upon which sociocultural and socioeconomic relationships rest. We
    are indeed already in the "age of intelligence."
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习和深度学习技术以深刻的方式影响了世界，从我们与技术产品以及彼此互动的方式。这些技术正在改变我们相互关系、工作方式以及我们一般的生活方式。今天，以及可预见的未来，智能机器越来越多地成为社会文化和社会经济关系的基础。我们确实已经进入了“智能时代”。
- en: What Are Machine Learning and Deep Learning?
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是机器学习和深度学习？
- en: Machine learning can be described as an assortment of tools and techniques for
    predicting or classifying a future event based on a set of interactions between
    variables (also referred to as features or attributes) in a particular dataset.
    Deep learning, on the other hand, extends a machine learning algorithm called
    neural network for learning complex tasks which are incredibly difficult for a
    computer to perform. Examples of these tasks may include recognizing faces and
    understanding languages in their varied contextual meanings.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习可以被描述为一系列工具和技术，用于根据特定数据集中变量（也称为特征或属性）之间的一系列交互来预测或分类未来事件。另一方面，深度学习扩展了名为神经网络的机器学习算法，用于学习对计算机来说极其困难的复杂任务。这些任务的例子可能包括识别面部和在不同语境中理解语言。
- en: The Role of Big Data
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 大数据的作用
- en: A key ingredient that is critical to the rise and future improved performance
    of machine learning and deep learning is data. Since the turn of the twenty-first
    century, there has been a steady exponential increase in the amount of data generated
    and stored. The rise of humongous data is partly due to the emergence of the Internet
    and the miniaturization of processors that have spurned the "Internet of Things
    (IoT)" technologies. These vast amounts of data have made it possible to train
    the computer to learn complex tasks where an explicit instruction set is infeasible.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习和深度学习崛起和未来性能提升的关键因素是数据。自21世纪初以来，生成和存储的数据量一直在稳步指数级增长。巨量数据的兴起部分是由于互联网的出现和处理器小型化的推动，这催生了“物联网（IoT）”技术。这些庞大的数据量使得训练计算机学习复杂任务成为可能，在这些任务中，显式指令集是不切实际的。
- en: The Computing Challenge
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 计算挑战
- en: The increase in data available for training learning models throws up another
    kind of problem, and that is the availability of computational or processing power.
    Empirically, as data increases, the performance of learning models also goes up.
    However, due to the increasingly enormous size of datasets today, it is inconceivable
    to train sophisticated, state-of-the-art learning models on commodity machines.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 可用于训练学习模型的可用数据的增加提出了另一种类型的问题，那就是计算或处理能力的可用性。从经验上看，随着数据的增加，学习模型的性能也会提高。然而，由于今天数据集的规模越来越大，在普通机器上训练复杂、最先进的学习模型是不切实际的。
- en: Cloud Computing to the Rescue
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 云计算拯救了世界
- en: Cloud is a term that is used to describe large sets of computers that are networked
    together in groups called data centers. These data centers are often distributed
    across multiple geographical locations. Big companies like Google, Microsoft,
    Amazon, and IBM own massive data centers where they manage computing infrastructure
    that is provisioned to the public (i.e., both enterprise and personal users) for
    use at a very reasonable cost.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 云是一个术语，用于描述由称为数据中心的一组计算机组成的庞大集合。这些数据中心通常分布在多个地理位置。像谷歌、微软、亚马逊和IBM这样的大公司拥有庞大的数据中心，在那里他们管理着提供给公众（即企业和个人用户）使用的计算基础设施，成本非常合理。
- en: Cloud technology/infrastructure is allowing individuals to leverage the computing
    resources of big business for machine learning/deep learning experimentation,
    design, and development. For example, by making use of cloud resources such as
    Google Cloud Platform (GCP), Amazon Web Services (AWS), or Microsoft Azure, we
    can run a suite of algorithms with multiple test grids for a fraction of time
    that it will take on a local machine.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 云技术/基础设施正在使个人能够利用大企业的计算资源进行机器学习/深度学习实验、设计和开发。例如，通过利用谷歌云平台（GCP）、亚马逊网络服务（AWS）或微软Azure等云资源，我们可以以本地机器所需时间的几分之一来运行一系列算法和多个测试网格。
- en: Enter Google Cloud Platform (GCP)
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 进入谷歌云平台（GCP）
- en: One of the big competitors in the cloud computing space is Google, with their
    cloud resource offering termed “Google Cloud Platform,” popularly referred to
    as GCP for short. Google is also one of the top technology leaders in the Internet
    space with a range of leading web products such as Gmail, YouTube, and Google
    Maps. These products generate, store, and process tons of terabytes of data each
    day from Internet users around the world.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 云计算领域的主要竞争对手之一是谷歌，他们提供的云资源服务被称为“谷歌云平台”，通常简称为GCP。谷歌也是互联网空间中顶尖的技术领导者之一，拥有包括Gmail、YouTube和谷歌地图在内的多种领先网络产品。这些产品每天从全球互联网用户那里生成、存储和处理数以吨计的太字节数据。
- en: To deal with this significant data, Google over the years has invested heavily
    in processing and storage infrastructure. As of today, Google boasts some of the
    most impressive data center design and technology in the world to support their
    computational demands and computing services. Through Google Cloud Platform, the
    public can leverage these powerful computational resources to design and develop
    cutting-edge machine learning and deep learning models.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 为了处理这些大量数据，多年来谷歌在处理和存储基础设施上投入了大量资金。截至目前，谷歌拥有世界上一些最令人印象深刻的数据中心设计和技术，以支持其计算需求和计算服务。通过Google
    Cloud Platform，公众可以利用这些强大的计算资源来设计和开发前沿的机器学习和深度学习模型。
- en: The Aim of This Book
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 本书的目标
- en: The goal of this book is to equip the reader from the ground up with the essential
    principles and tools for building learning models. Machine learning and deep learning
    are rapidly evolving, and often it is overwhelming and confusing for a beginner
    to engage the field. Many have no clue where to start. This book is a one-stop
    shop that takes the beginner on a journey to understanding the theoretical foundations
    and the practical steps for leveraging machine learning and deep learning techniques
    on problems of interest.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 本书的目标是从零开始，为读者提供构建学习模型所需的基本原理和工具。机器学习和深度学习正在快速发展，对于初学者来说，进入这个领域往往感到令人不知所措和困惑。许多人不知道从何开始。本书是一个一站式商店，带领初学者了解机器学习和深度学习技术的理论基础和实践步骤，以解决感兴趣的问题。
- en: Book Organization
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 书籍组织
- en: 'This book is divided into eight parts. Their breakdown is as follows:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 本书分为八个部分。它们的结构如下：
- en: 'Part 1: Getting Started with Google Cloud Platform'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第1部分：Google Cloud Platform入门
- en: 'Part 2: Programming Foundations for Data Science'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第2部分：数据科学编程基础
- en: 'Part 3: Introducing Machine Learning'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第3部分：介绍机器学习
- en: 'Part 4: Machine Learning in Practice'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第4部分：实践中的机器学习
- en: 'Part 5: Introducing Deep Learning'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第5部分：介绍深度学习
- en: 'Part 6: Deep Learning in Practice'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第6部分：实践中的深度学习
- en: 'Part 7: Advanced Analytics/Machine Learning on Google Cloud Platform'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第7部分：高级分析/在Google Cloud Platform上的机器学习
- en: 'Part 8: Productionalizing Machine Learning Solutions on GCP'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第8部分：在GCP上实现机器学习解决方案
- en: It is best to go through the entire book in sequence. However, each part and
    its containing chapters are written in such a way that one can shop around and
    get out what is of primary interest. The code repository for this book is available
    at [`https://github.com/Apress/building-ml-and-dl-models-on-gcp`](https://github.com/Apress/building-ml-and-dl-models-on-gcp)
    . The reader can follow through the examples in this book by cloning the repository
    to Google Colab or GCP Deep Learning VM.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 按顺序通读整本书是最好的。然而，每个部分及其包含的章节都是这样编写的，可以挑选感兴趣的章节进行阅读。本书的代码库可在[`https://github.com/Apress/building-ml-and-dl-models-on-gcp`](https://github.com/Apress/building-ml-and-dl-models-on-gcp)找到。读者可以通过克隆存储库到Google
    Colab或GCP深度学习虚拟机来跟随本书中的示例。
