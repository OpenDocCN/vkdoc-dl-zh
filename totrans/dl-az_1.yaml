- en: Part I
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第一部分
- en: Getting Started with AI
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 开始学习人工智能
- en: 1. Introduction to Artificial Intelligence
  id: totrans-2
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 1. 人工智能简介
- en: Intelligence can be defined in many ways, from the ability to learn to deal
    with new situations to the ability to make the right decisions according to some
    criterion, for example (Bengio, 2010). Standard computers and even basic calculators
    can be thought to be intelligent in some ways, as they can compute an outcome
    based on human-programed rules. Computers are extremely useful for mundane operations
    such as arithmetic calculations, and the speed and scale at which they can tackle
    these problems has greatly increased over time.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 智力可以以多种方式定义，从处理新情况的能力到根据某些标准做出正确决策的能力，例如（Bengio，2010）。在某种程度上，标准计算机甚至基本计算器可以被认为是智能的，因为它们可以根据人类编写的规则计算出结果。计算机在处理日常操作，如算术计算方面极为有用，它们解决这些问题的速度和规模随着时间的推移而大大增加。
- en: However, many tasks that come naturally to humans —such as perception and control
    tasks—are extremely difficult to write formal rules or programs for a machine
    to execute. Often it is hard to codify all the knowledge and thought processes
    behind information processing and decision making into a formal program on which
    a machine can then act. Humans, on the other hand, over their lifetime can gather
    vast amounts of data through observation and experience that enables this human
    level of intelligence, abstract thinking, and decision making.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，许多人类天生就会做的任务——例如感知和控制任务——对于编写机器执行的形式规则或程序来说极为困难。通常很难将信息处理和决策背后的所有知识和思维过程形式化地编码到一个机器可以据此行动的正式程序中。另一方面，人类在其一生中可以通过观察和经验收集大量数据，这使人类能够达到这种水平的智力、抽象思维和决策能力。
- en: Artificial intelligence (AI) is a broad field of study encompassing this complex
    problem solving and the human-like ability to sense, act, and reason. One goal
    of AI can be to create smart machines that think and act like humans, with the
    ability to simulate intelligence and produce decisions through processes in a
    similar manner to human reasoning. This field encompasses approaches ranging from
    prescriptive, immutable algorithms for tasks previously performed only by intelligent
    beings (e.g., arithmetic calculators) to attempts to enable machines to learn,
    respond to feedback, and engage in abstract thought.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能（AI）是一个广泛的研究领域，包括复杂问题解决以及类似人类的感知、行动和推理能力。人工智能的一个目标可以是创建能够像人类一样思考和行动的智能机器，它们能够通过类似人类推理的过程来模拟智能和做出决策。这个领域包括从为以前仅由智能生物执行的任务（例如，算术计算器）制定规范性、不可变算法的方法，到使机器能够学习、响应反馈并参与抽象思维的各种尝试。
- en: AI is transforming the world around us at an ever-increasing pace, including
    personalized experiences, smart personal assistants in devices like our phones,
    speech-to-speech translation, automated support agents, precision medicine, and
    autonomous driving cars that can recognize objects and respond appropriately,
    to name just a few. Even through products such as search or Microsoft Office 365,
    AI is having a useful impact on most people’s day-to-day lives. Technology has
    come a long way from the early days of the Internet in terms of how humans interact
    with computers. There is an increasing expectation that humans should be getting
    information in intelligent ways, and be able to interact with devices that hold
    access to information in natural ways. Creating these types of experiences often
    requires some type of AI.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能正在以前所未有的速度改变我们周围的世界，包括个性化体验、智能手机等设备中的智能个人助理、语音到语音翻译、自动支持代理、精准医疗和能够识别物体并做出适当反应的自动驾驶汽车，仅举几例。即使是通过搜索或Microsoft
    Office 365等产品，人工智能也对大多数人的日常生活产生了有益的影响。与互联网的早期相比，技术在人类与计算机互动方面已经取得了长足的进步。人们越来越期望以智能的方式获取信息，能够以自然的方式与掌握信息访问权限的设备互动。创造这些类型的体验通常需要某种类型的人工智能。
- en: AI is going to disrupt every single business app—whether an industry vertical
    like banking, retail and health care, or a horizontal business process like sales,
    marketing and customer support. —Harry Shum, Microsoft Executive VP, AI and Research
  id: totrans-7
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 人工智能将颠覆每一个商业应用——无论是银行、零售和医疗保健等垂直行业，还是销售、营销和客户支持等横向业务流程。 ——哈里·舒姆，微软执行副总裁，人工智能和研发
- en: Of course, with the rise of AI and intelligent systems comes potential drawbacks
    and concerns. Despite potential transformative experiences and solutions based
    on AI, there are ethical issues that are important for both the creators and users
    of AI to recognize. Technology will continue to shape the workforce and economy
    as it has in the past as AI automates some tasks and augments human capabilities
    in others (Brynjolfsson & Mitchell, 2017). Media portrayals often pit the human
    versus the machine, and this is exacerbated through stories of computers playing
    games, especially against humans. Computers have been able to beat humans in games
    such as chess for decades, but with recent AI advances, computers can also surpass
    human abilities in more sophisticated games where brute force computing power
    isn’t practical, such as the abstract board game Go or the video arcade game Ms.
    Pac-Man (Silver et al., 2016; van Seijen, 2017).
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，随着AI和智能系统的兴起，也带来了潜在的缺点和担忧。尽管基于AI的潜在变革性体验和解决方案，但AI的创造者和使用者都需要认识到重要的伦理问题。技术将继续像过去一样塑造劳动力市场和经济发展，AI自动化一些任务，在其他任务中增强人类能力（Brynjolfsson
    & Mitchell, 2017）。媒体描绘往往将人与机器对立起来，这种对立通过计算机玩游戏的故事被加剧，尤其是与人类玩游戏。几十年来，计算机已经在诸如国际象棋等游戏中击败了人类，但随着最近AI的进步，计算机也能在更复杂的游戏中超越人类能力，在这些游戏中，蛮力计算能力并不实用，例如抽象棋类游戏围棋或街机游戏《吃豆人》（Silver
    et al., 2016; van Seijen, 2017）。
- en: However, we believe that the discussion should not be framed in a binary of
    human versus machine. It is important to develop AI that augments human capabilities,
    as humans hold “creativity, empathy, emotion, physicality, and insight” that can
    be combined with AI and the power of machines to quickly reason over large data
    to solve some of society’s biggest problems (Nadella, 2016). After all, there
    is an abundance of information in the world today from which we can learn, but
    we are constrained by our human capability to absorb this information in the constraints
    of time. AI can help us achieve more in the time that we have.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们认为讨论不应该以人与机器的二分法来框架。开发增强人类能力的AI非常重要，因为人类拥有“创造力、同理心、情感、身体和洞察力”，这些可以与AI和机器的力量相结合，快速在大数据上推理，解决社会的一些重大问题（Nadella,
    2016）。毕竟，今天世界上有大量的信息可供我们学习，但我们受限于人类在时间限制内吸收这些信息的能力。AI可以帮助我们在有限的时间内取得更多成就。
- en: Of course, safeguards will need to be put in place as algorithms will not always
    get the answer right. Then there is debate over what “right” even means. Although
    computers are thought to be neutral and thus embody the value of being inclusive
    and respectful to everyone, there can be hidden biases in data and the code programmed
    into AI systems, potentially leading to unfair and inaccurate inferences. Data
    and privacy concerns also need to be addressed during the development and improvement
    of AI systems. The platforms used for AI development thus need to have protections
    for privacy, transparency, and security built into them. Although we are far from
    artificial general intelligence and from the many portrayals of a loss of control
    of AI systems due to computers with superintelligence from popular culture and
    science fiction works, these types of legal and ethical implications of AI are
    crucial to consider.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，需要建立安全措施，因为算法并不总是能给出正确的答案。然后还有关于“正确”含义的争论。尽管人们认为计算机是中立的，因此体现了包容和尊重每个人的价值观，但数据中可能存在隐藏的偏见，以及编程到AI系统中的代码，这可能导致不公平和不准确的推断。在AI系统开发和改进过程中，也需要解决数据和隐私问题。因此，用于AI开发的平台需要内置对隐私、透明度和安全性的保护。尽管我们离通用人工智能还很远，也远离了流行文化和科幻作品中关于超级智能计算机导致AI系统失控的许多描绘，但这些AI的法律和伦理影响仍然是至关重要的。
- en: We are still in the early days of the infusion of AI in our lives, but a large
    transformation is already underway. Especially due to advances in the last few
    years and the availability of platforms such as the Microsoft AI Platform, upon
    which one can easily build AI applications, we will see many innovations and much
    change to come. Ultimately, that change will mean more situations where humans
    and machines are working together in a more seamless way. Just imagine what’s
    possible when we put our efforts toward using AI to solve some of the world’s
    greatest challenges such as disease, poverty, and climate change (Nadella, 2017).
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我们仍然处于AI融入我们生活的早期阶段，但一场大规模的变革已经开始。特别是在过去几年中的进步以及像微软AI平台这样的平台的出现，人们可以轻松地构建AI应用，我们将看到许多创新和变化即将到来。最终，这种变化将意味着人类和机器将以更加无缝的方式共同工作。想象一下，当我们致力于使用AI来解决世界上一些最大的挑战，如疾病、贫困和气候变化时，会是什么样子（Nadella,
    2017）。
- en: Microsoft and AI
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 微软与AI
- en: AI is central to Microsoft’s strategy “to build best-in-class platforms and
    productivity services for an intelligent cloud and an intelligent edge infused
    with artificial intelligence (“AI”)” (Microsoft Form 10-K, 2017). Although this
    statement is new, AI is not new to Microsoft. Founder Bill Gates believed that
    computers would one day be able to see, hear, and understand humans and their
    environment. Microsoft Research was formed in 1991 to tackle some of the foundational
    AI challenges; many of the original solutions are now embedded within Office 365,
    Skype, Cortana, Bing, and Xbox. These are just some of the Microsoft products
    that are infused with many different applications of AI. Even in 1997, Hotmail
    with automated junk mail filtering was built on a type of AI system with classifications
    that improve with data over time.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: AI是微软战略的核心，“构建最佳平台和生产力服务，以实现人工智能（AI）注入的智能云和智能边缘”（微软10-K表格，2017）。尽管这个声明是新的，但AI对微软来说并不陌生。创始人比尔·盖茨相信，有一天计算机将能够看到、听到并理解人类及其环境。微软研究部成立于1991年，旨在解决一些基础AI挑战；许多原始解决方案现在已嵌入到Office
    365、Skype、Cortana、Bing和Xbox中。这些都是微软产品中融入了许多不同AI应用的例子。即使在1997年，拥有自动垃圾邮件过滤功能的Hotmail也是基于一种AI系统，其分类随着时间的推移而改进。
- en: Let’s look at just a few specific examples today. A plug-in available for PowerPoint
    called Presentation Translator displays subtitles directly on a PowerPoint presentation
    as you talk in any of more than 60 supported languages; you can also directly
    translate the text on the slides to save a version of your presentation in another
    language, thanks to speech recognition and natural language processing technologies
    (Microsoft Translator, 2017). SwiftKey is a smart keyboard used by more than 300
    million Android and iOS devices that has learned from 10 trillion keystrokes on
    the next word you want to type and saved 100,000 years of time (Microsoft News,
    2017).
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们今天仅看看几个具体的例子。一个可用于PowerPoint的插件，称为演示翻译器，可以在您用超过60种支持的语言中的任何一种说话时直接在PowerPoint演示文稿上显示字幕；您还可以直接翻译幻灯片上的文本，从而将您的演示文稿保存为另一种语言的版本，这得益于语音识别和自然语言处理技术（微软翻译器，2017）。SwiftKey是一款智能键盘，被超过3亿部Android和iOS设备使用，它从您想要输入的下一个单词的10万亿次按键中学习，并节省了10万年时间（微软新闻，2017）。
- en: Bing—powered by AI with both intelligent search and intelligent answers—powers
    more than one third of all PC search volume in the United States. Continuing developments,
    such as Visual Image Search and a new partnership to bring Reddit conversations
    to Bing answers, continue to infuse intelligence into search (Bing, 2017b). The
    personal AI assistant Cortana helped answer more than 18 billion questions with
    more than 148 million active users across 13 countries (Linn, 2017). Seeing AI
    was launched to assist the blind and low-vision community by automatically describing
    the nearby visual field of people, objects, and text.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: Bing——由AI驱动，具备智能搜索和智能回答功能——在美国的PC搜索量中占据了超过三分之一的份额。持续的发展，例如视觉图像搜索以及与Reddit合作将Reddit对话带到Bing回答中，不断将智能注入搜索中（Bing,
    2017b）。个人AI助手Cortana帮助回答了超过180亿个问题，拥有超过1.48亿活跃用户，遍布13个国家（Linn, 2017）。 Seeing AI被推出，旨在帮助盲人和低视力社区，通过自动描述人们的周围视觉区域、物体和文本。
- en: 'Although these technologies are infused within many products and applications,
    Microsoft also aims to democratize AI technology so that others can build intelligent
    solutions on top of their services and platforms. Microsoft’s Research and AI
    group was founded in 2016 to bring together engineers and researchers to advance
    the state-of-the-art of AI and bring AI applications and services to market. Microsoft
    is taking a four-pronged approach as visualized in Figure [1-1](#Fig1):'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管这些技术已经融入了许多产品和应用程序中，但微软还旨在使人工智能技术民主化，以便其他人可以在他们的服务和平台上构建智能解决方案。微软的研究和 AI 团队在2016年成立，旨在汇集工程师和研究人员，推进人工智能的前沿，并将人工智能应用程序和服务推向市场。微软正采取如图
    [1-1](#Fig1) 所示的四项措施：
- en: '![A463582_1_En_1_Fig1_HTML.png](A463582_1_En_1_Fig1_HTML.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![A463582_1_En_1_Fig1_HTML.png](A463582_1_En_1_Fig1_HTML.png)'
- en: Figure 1-1
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-1
- en: Microsoft’s four-prong approach to democratizing AI
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 微软使人工智能民主化的四项措施
- en: Agents that allow us to interact with AI such as Cortana and bots enabled through
    the Microsoft Bot Framework.
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 允许我们与人工智能互动的代理，如 Cortana 和通过微软 Bot 框架启用的机器人。
- en: Applications infused with AI such as PowerPoint Translator.
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 混合了人工智能的应用，例如 PowerPoint 翻译器。
- en: Services that allow developers to leverage this AI such as the Cognitive Services
    handwriting recognition application programming interface (API).
  id: totrans-22
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 允许开发者利用这种人工智能的服务，例如认知服务手写识别应用程序编程接口（API）。
- en: Infrastructure that allows data scientists and developers to build custom AI
    solutions including specialized tools and software for speeding up the development
    process.
  id: totrans-23
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 允许数据科学家和开发者构建定制 AI 解决方案的基础设施，包括用于加快开发过程的专用工具和软件。
- en: Thus, the vast infrastructure of the Azure cloud and AI technology used within
    Microsoft and the larger open-source community are now being made available to
    organizations wanting to build their own intelligent applications. The Microsoft
    AI Platform on Azure is an open, flexible, enterprise-grade cloud computing platform
    that is discussed in more detail in Chapter [4](A463582_1_En_4_Chapter.html).
    As a simple example of the power of Microsoft’s cloud platform, just one node
    of Microsoft’s FPGA fabric was able to translate all 1,440 pages of the novel
    War and Peace from Russian to English in 2.5 seconds in 2016\. Then using the
    entire capability rather than just a single node, all of Wikipedia can be translated
    in less than one tenth of a second (Microsoft News, 2017). Microsoft is focused
    on creating agents and applications infused with AI, and then making this same
    technology available through services and infrastructure. We are at the tip of
    the iceberg of what is possible with AI and through the democratization of these
    AI technologies, many challenges will be solved across the world.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，Azure 云的庞大基础设施以及微软和更广泛的开源社区中使用的 AI 技术现在正被提供给希望构建自己智能应用的机构。Azure 上的微软 AI 平台是一个开放、灵活的企业级云计算平台，在第四章中进行了更详细的讨论。[4](A463582_1_En_4_Chapter.html)。作为一个简单的例子，2016年，微软
    FPGA 纱线的一个节点能够在2.5秒内将小说《战争与和平》的所有1,440页从俄语翻译成英语。然后，使用整个能力而不是单个节点，整个维基百科可以在不到十分之一秒的时间内被翻译（微软新闻，2017）。微软专注于创建注入人工智能的代理和应用程序，并通过服务和基础设施提供这项相同的技术。我们正处于人工智能可能性的冰山一角，通过这些人工智能技术的民主化，全球将解决许多挑战。
- en: We are pursuing AI so that we can empower every person and every institution
    that people build with tools of AI so that they can go on to solve the most pressing
    problems of our society and our economy . —Satya Nadella, Microsoft CEO
  id: totrans-25
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们追求人工智能，以便我们可以赋予每个人和每个人建立的人工智能工具，使他们能够继续解决我们社会和经济的最紧迫问题。 ——萨蒂亚·纳德拉，微软首席执行官
- en: Machine Learning
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 机器学习
- en: Although there are many subfields and applications within AI, machine learning
    (ML) has become extremely popular as a practical tool for many AI-infused applications
    available today and is the focus of this book. ML is a branch of computer science
    where computers are taught to process information and make decisions through giving
    access to data from which computers learn. There are many excellent reference
    materials on this subject that are outside the scope of this book. Typical ML
    tasks include classification, regression, recommendations, ranking, and clustering,
    for example. AI is thus a broader concept than ML, in that ML is one research
    area within AI around the idea machines can learn for themselves once given access
    to the right type of data (Marr, 2016).
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管人工智能有许多子领域和应用，但机器学习（ML）已经成为今天许多人工智能应用中的一种实用工具，并且是本书的重点。机器学习是计算机科学的一个分支，其中计算机通过访问数据来学习处理信息和做出决策。关于这个主题有许多优秀的参考资料，但它们超出了本书的范围。典型的机器学习任务包括分类、回归、推荐、排序和聚类等。因此，人工智能是一个比机器学习更广泛的概念，因为机器学习是人工智能中的一个研究领域，它围绕机器一旦获得正确类型的数据就能自行学习的理念（Marr，2016）。
- en: With classical ML approaches, there are well-established methodologies for utilizing
    data points that are already useful features or representations themselves, such
    as data points that capture age, gender, number of clicks online, or a temperature
    sensor reading as examples. Computers learn how to model the relationship between
    these sets of input features and the outcome they are trying to predict; the algorithm
    chosen by the human constrains the type of model the computer is able to learn.
    Humans also hand-craft the representations of the data, a step often called feature
    engineering , and feed these representations into the ML model to learn. The most
    common type of ML is supervised machine learning , where the model has labels
    that are supposed to represent the ground truth against which to learn. The process
    of the computer learning the parameters within the model is often called training.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在传统的机器学习方法中，已经建立了利用数据点作为有用特征或表示本身的方法，例如捕获年龄、性别、在线点击次数或温度传感器读数等数据点。计算机学习如何模拟这些输入特征集与它们试图预测的输出之间的关系；人类选择的算法限制了计算机能够学习的模型类型。人类还手动构建数据的表示，这一步骤通常被称为特征工程，并将这些表示输入到机器学习模型中进行学习。最常见的机器学习类型是监督机器学习，其中模型具有标签，这些标签应该代表与学习相关的真实情况。计算机学习模型内参数的过程通常被称为训练。
- en: For example, suppose a telco is aiming to address issues with customer churn.
    The process with which they could approach this problem using traditional supervised
    ML techniques is described here. They would like to identify customers who are
    likely to churn so they can proactively reach out and give them incentives to
    stay. To build this model, they would first gather relevant raw input data such
    as the usage patterns of their customers and demographic data such as those pictured
    in Table [1-1](#Tab1).
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假设电信公司旨在解决客户流失问题。他们使用传统的监督机器学习技术来解决这个问题的方法在此描述。他们希望识别可能流失的客户，以便他们可以主动联系并给予他们激励以留住他们。为了构建这个模型，他们首先会收集相关的原始输入数据，例如客户的用法模式和如图[1-1](#Tab1)所示的人口统计数据。
- en: Table 1-1
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 表 1-1
- en: Example Raw Tables Capturing Information from Customers at a Telco That Needs
    to Be Processed Before It Can Be Fed into a Machine Learning Model
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
