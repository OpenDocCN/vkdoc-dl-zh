- en: Part I
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Getting Started with AI
  prefs: []
  type: TYPE_NORMAL
- en: 1. Introduction to Artificial Intelligence
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Intelligence can be defined in many ways, from the ability to learn to deal
    with new situations to the ability to make the right decisions according to some
    criterion, for example (Bengio, 2010). Standard computers and even basic calculators
    can be thought to be intelligent in some ways, as they can compute an outcome
    based on human-programed rules. Computers are extremely useful for mundane operations
    such as arithmetic calculations, and the speed and scale at which they can tackle
    these problems has greatly increased over time.
  prefs: []
  type: TYPE_NORMAL
- en: However, many tasks that come naturally to humans —such as perception and control
    tasks—are extremely difficult to write formal rules or programs for a machine
    to execute. Often it is hard to codify all the knowledge and thought processes
    behind information processing and decision making into a formal program on which
    a machine can then act. Humans, on the other hand, over their lifetime can gather
    vast amounts of data through observation and experience that enables this human
    level of intelligence, abstract thinking, and decision making.
  prefs: []
  type: TYPE_NORMAL
- en: Artificial intelligence (AI) is a broad field of study encompassing this complex
    problem solving and the human-like ability to sense, act, and reason. One goal
    of AI can be to create smart machines that think and act like humans, with the
    ability to simulate intelligence and produce decisions through processes in a
    similar manner to human reasoning. This field encompasses approaches ranging from
    prescriptive, immutable algorithms for tasks previously performed only by intelligent
    beings (e.g., arithmetic calculators) to attempts to enable machines to learn,
    respond to feedback, and engage in abstract thought.
  prefs: []
  type: TYPE_NORMAL
- en: AI is transforming the world around us at an ever-increasing pace, including
    personalized experiences, smart personal assistants in devices like our phones,
    speech-to-speech translation, automated support agents, precision medicine, and
    autonomous driving cars that can recognize objects and respond appropriately,
    to name just a few. Even through products such as search or Microsoft Office 365,
    AI is having a useful impact on most people’s day-to-day lives. Technology has
    come a long way from the early days of the Internet in terms of how humans interact
    with computers. There is an increasing expectation that humans should be getting
    information in intelligent ways, and be able to interact with devices that hold
    access to information in natural ways. Creating these types of experiences often
    requires some type of AI.
  prefs: []
  type: TYPE_NORMAL
- en: AI is going to disrupt every single business app—whether an industry vertical
    like banking, retail and health care, or a horizontal business process like sales,
    marketing and customer support. —Harry Shum, Microsoft Executive VP, AI and Research
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Of course, with the rise of AI and intelligent systems comes potential drawbacks
    and concerns. Despite potential transformative experiences and solutions based
    on AI, there are ethical issues that are important for both the creators and users
    of AI to recognize. Technology will continue to shape the workforce and economy
    as it has in the past as AI automates some tasks and augments human capabilities
    in others (Brynjolfsson & Mitchell, 2017). Media portrayals often pit the human
    versus the machine, and this is exacerbated through stories of computers playing
    games, especially against humans. Computers have been able to beat humans in games
    such as chess for decades, but with recent AI advances, computers can also surpass
    human abilities in more sophisticated games where brute force computing power
    isn’t practical, such as the abstract board game Go or the video arcade game Ms.
    Pac-Man (Silver et al., 2016; van Seijen, 2017).
  prefs: []
  type: TYPE_NORMAL
- en: However, we believe that the discussion should not be framed in a binary of
    human versus machine. It is important to develop AI that augments human capabilities,
    as humans hold “creativity, empathy, emotion, physicality, and insight” that can
    be combined with AI and the power of machines to quickly reason over large data
    to solve some of society’s biggest problems (Nadella, 2016). After all, there
    is an abundance of information in the world today from which we can learn, but
    we are constrained by our human capability to absorb this information in the constraints
    of time. AI can help us achieve more in the time that we have.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, safeguards will need to be put in place as algorithms will not always
    get the answer right. Then there is debate over what “right” even means. Although
    computers are thought to be neutral and thus embody the value of being inclusive
    and respectful to everyone, there can be hidden biases in data and the code programmed
    into AI systems, potentially leading to unfair and inaccurate inferences. Data
    and privacy concerns also need to be addressed during the development and improvement
    of AI systems. The platforms used for AI development thus need to have protections
    for privacy, transparency, and security built into them. Although we are far from
    artificial general intelligence and from the many portrayals of a loss of control
    of AI systems due to computers with superintelligence from popular culture and
    science fiction works, these types of legal and ethical implications of AI are
    crucial to consider.
  prefs: []
  type: TYPE_NORMAL
- en: We are still in the early days of the infusion of AI in our lives, but a large
    transformation is already underway. Especially due to advances in the last few
    years and the availability of platforms such as the Microsoft AI Platform, upon
    which one can easily build AI applications, we will see many innovations and much
    change to come. Ultimately, that change will mean more situations where humans
    and machines are working together in a more seamless way. Just imagine what’s
    possible when we put our efforts toward using AI to solve some of the world’s
    greatest challenges such as disease, poverty, and climate change (Nadella, 2017).
  prefs: []
  type: TYPE_NORMAL
- en: Microsoft and AI
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: AI is central to Microsoft’s strategy “to build best-in-class platforms and
    productivity services for an intelligent cloud and an intelligent edge infused
    with artificial intelligence (“AI”)” (Microsoft Form 10-K, 2017). Although this
    statement is new, AI is not new to Microsoft. Founder Bill Gates believed that
    computers would one day be able to see, hear, and understand humans and their
    environment. Microsoft Research was formed in 1991 to tackle some of the foundational
    AI challenges; many of the original solutions are now embedded within Office 365,
    Skype, Cortana, Bing, and Xbox. These are just some of the Microsoft products
    that are infused with many different applications of AI. Even in 1997, Hotmail
    with automated junk mail filtering was built on a type of AI system with classifications
    that improve with data over time.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s look at just a few specific examples today. A plug-in available for PowerPoint
    called Presentation Translator displays subtitles directly on a PowerPoint presentation
    as you talk in any of more than 60 supported languages; you can also directly
    translate the text on the slides to save a version of your presentation in another
    language, thanks to speech recognition and natural language processing technologies
    (Microsoft Translator, 2017). SwiftKey is a smart keyboard used by more than 300
    million Android and iOS devices that has learned from 10 trillion keystrokes on
    the next word you want to type and saved 100,000 years of time (Microsoft News,
    2017).
  prefs: []
  type: TYPE_NORMAL
- en: Bing—powered by AI with both intelligent search and intelligent answers—powers
    more than one third of all PC search volume in the United States. Continuing developments,
    such as Visual Image Search and a new partnership to bring Reddit conversations
    to Bing answers, continue to infuse intelligence into search (Bing, 2017b). The
    personal AI assistant Cortana helped answer more than 18 billion questions with
    more than 148 million active users across 13 countries (Linn, 2017). Seeing AI
    was launched to assist the blind and low-vision community by automatically describing
    the nearby visual field of people, objects, and text.
  prefs: []
  type: TYPE_NORMAL
- en: 'Although these technologies are infused within many products and applications,
    Microsoft also aims to democratize AI technology so that others can build intelligent
    solutions on top of their services and platforms. Microsoft’s Research and AI
    group was founded in 2016 to bring together engineers and researchers to advance
    the state-of-the-art of AI and bring AI applications and services to market. Microsoft
    is taking a four-pronged approach as visualized in Figure [1-1](#Fig1):'
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_1_Fig1_HTML.png](A463582_1_En_1_Fig1_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-1
  prefs: []
  type: TYPE_NORMAL
- en: Microsoft’s four-prong approach to democratizing AI
  prefs: []
  type: TYPE_NORMAL
- en: Agents that allow us to interact with AI such as Cortana and bots enabled through
    the Microsoft Bot Framework.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Applications infused with AI such as PowerPoint Translator.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Services that allow developers to leverage this AI such as the Cognitive Services
    handwriting recognition application programming interface (API).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Infrastructure that allows data scientists and developers to build custom AI
    solutions including specialized tools and software for speeding up the development
    process.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Thus, the vast infrastructure of the Azure cloud and AI technology used within
    Microsoft and the larger open-source community are now being made available to
    organizations wanting to build their own intelligent applications. The Microsoft
    AI Platform on Azure is an open, flexible, enterprise-grade cloud computing platform
    that is discussed in more detail in Chapter [4](A463582_1_En_4_Chapter.html).
    As a simple example of the power of Microsoft’s cloud platform, just one node
    of Microsoft’s FPGA fabric was able to translate all 1,440 pages of the novel
    War and Peace from Russian to English in 2.5 seconds in 2016\. Then using the
    entire capability rather than just a single node, all of Wikipedia can be translated
    in less than one tenth of a second (Microsoft News, 2017). Microsoft is focused
    on creating agents and applications infused with AI, and then making this same
    technology available through services and infrastructure. We are at the tip of
    the iceberg of what is possible with AI and through the democratization of these
    AI technologies, many challenges will be solved across the world.
  prefs: []
  type: TYPE_NORMAL
- en: We are pursuing AI so that we can empower every person and every institution
    that people build with tools of AI so that they can go on to solve the most pressing
    problems of our society and our economy . —Satya Nadella, Microsoft CEO
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Machine Learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Although there are many subfields and applications within AI, machine learning
    (ML) has become extremely popular as a practical tool for many AI-infused applications
    available today and is the focus of this book. ML is a branch of computer science
    where computers are taught to process information and make decisions through giving
    access to data from which computers learn. There are many excellent reference
    materials on this subject that are outside the scope of this book. Typical ML
    tasks include classification, regression, recommendations, ranking, and clustering,
    for example. AI is thus a broader concept than ML, in that ML is one research
    area within AI around the idea machines can learn for themselves once given access
    to the right type of data (Marr, 2016).
  prefs: []
  type: TYPE_NORMAL
- en: With classical ML approaches, there are well-established methodologies for utilizing
    data points that are already useful features or representations themselves, such
    as data points that capture age, gender, number of clicks online, or a temperature
    sensor reading as examples. Computers learn how to model the relationship between
    these sets of input features and the outcome they are trying to predict; the algorithm
    chosen by the human constrains the type of model the computer is able to learn.
    Humans also hand-craft the representations of the data, a step often called feature
    engineering , and feed these representations into the ML model to learn. The most
    common type of ML is supervised machine learning , where the model has labels
    that are supposed to represent the ground truth against which to learn. The process
    of the computer learning the parameters within the model is often called training.
  prefs: []
  type: TYPE_NORMAL
- en: For example, suppose a telco is aiming to address issues with customer churn.
    The process with which they could approach this problem using traditional supervised
    ML techniques is described here. They would like to identify customers who are
    likely to churn so they can proactively reach out and give them incentives to
    stay. To build this model, they would first gather relevant raw input data such
    as the usage patterns of their customers and demographic data such as those pictured
    in Table [1-1](#Tab1).
  prefs: []
  type: TYPE_NORMAL
- en: Table 1-1
  prefs: []
  type: TYPE_NORMAL
- en: Example Raw Tables Capturing Information from Customers at a Telco That Needs
    to Be Processed Before It Can Be Fed into a Machine Learning Model
  prefs: []
  type: TYPE_NORMAL
- en: '| Customer Information | Phone Records |'
  prefs: []
  type: TYPE_TB
- en: '| :-- | :-- |'
  prefs: []
  type: TYPE_TB
- en: '| Name | Gender | Sign-Up Date | Name | Call Length | Date |'
  prefs: []
  type: TYPE_TB
- en: '| Mary | F | 29.01.2011 | Mary | 12 | 30.01.2011 |'
  prefs: []
  type: TYPE_TB
- en: '| Thomas | M | 20.06.2013 | Mary | 1 | 01.02.2011 |'
  prefs: []
  type: TYPE_TB
- en: '| Danielle | F | 05.05.2014 | Mary | 3 | 01.02.2011 |'
  prefs: []
  type: TYPE_TB
- en: '| Wee Hyong | M | 01.09.2012 | … | … | … |'
  prefs: []
  type: TYPE_TB
- en: '| Mathew | M | 15.11.2012 | Thomas | 22 | 21.06.2012 |'
  prefs: []
  type: TYPE_TB
- en: '| Ilia | M | 19.02.2013 | … | … | … |'
  prefs: []
  type: TYPE_TB
- en: '| … | … | … |   |   |   |'
  prefs: []
  type: TYPE_TB
- en: Some preprocessing, such as structuring the data by some measure of time, aggregating
    data points as needed, and joining different tables together that are relevant
    to whether a customer churns or not, is completed on the raw input data. This
    is followed by feature engineering to create representations of these customer
    data to feed into the model, such as creating a feature that represents the length
    of time with the telco, which is found based on the date the customer signed up
    for service. Creating a relevant representation of the data is very important
    for the ML model to be able to discern the patterns within the data, and is usually
    heavily guided by domain knowledge, as illustrated in Figure [1-2](#Fig2), for
    example.
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_1_Fig2_HTML.jpg](A463582_1_En_1_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-2
  prefs: []
  type: TYPE_NORMAL
- en: The representation of data is very important; for example, examining the sign-up
    date at any given point in time might reveal little relationship to the probability
    of churn within 30 days, but examining the length in the contract at that point
    in time might reveal a strong relationship in that individuals are more likely
    to churn within 30 days if they have been in the contract for a longer period
    of time
  prefs: []
  type: TYPE_NORMAL
- en: Then historical outcomes, a label of which customers churned or not within a
    certain amount of time, for example, would be matched to these data and used for
    the training process of the supervised ML algorithm , as shown in Table [1-2](#Tab2).
    Applying the trained model to a hold-out set of test data to understand how well
    it will generalize to new customers, the model would be evaluated based on how
    well it predicted the historical churn outcomes. After iterating on the preprocessing,
    feature engineering, and model selection process of trying different models to
    find the optimal pipeline, this would then be applied to new raw customer telco
    data to predict which customers are likely to churn in the future.
  prefs: []
  type: TYPE_NORMAL
- en: Table 1-2
  prefs: []
  type: TYPE_NORMAL
- en: Example Output of Simple Feature Engineering and Matching to the Label of Churn
    in the Next 30 days
  prefs: []
  type: TYPE_NORMAL
- en: '| Name | Month | Total Phone Min | Months with Telco | Churn Next 30 Days |'
  prefs: []
  type: TYPE_TB
- en: '| :-- | :-- | :-- | :-- | :-- |'
  prefs: []
  type: TYPE_TB
- en: '| Mary | 2.2011 | 44 | 0 | 0 |'
  prefs: []
  type: TYPE_TB
- en: '| Mary | 3.2011 | 51 | 1 | 0 |'
  prefs: []
  type: TYPE_TB
- en: '| … | … | … | … | … |'
  prefs: []
  type: TYPE_TB
- en: '| Thomas | 6.2013 | 152 | 0 | 0 |'
  prefs: []
  type: TYPE_TB
- en: '| Thomas | 7.2013 | 201 | 1 | 0 |'
  prefs: []
  type: TYPE_TB
- en: '| Thomas | 8.2013 | 120 | 2 | 1 |'
  prefs: []
  type: TYPE_TB
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: In this case, 0 represents that the individual did not churn, and 1 represents
    that the individual did churn.
  prefs: []
  type: TYPE_NORMAL
- en: This traditional, supervised ML approach as summarized in Figure [1-3](#Fig3)
    works for many problems and has been used extensively across many industries.
    In operations and workforce management, ML has been used for predictive maintenance
    solutions and smart building management, as well as enhanced supply chain management.
    For example, Rockwell is able to save up to $300,000 a day through predictive
    maintenance solutions that monitor the health of pumps in offshore rigs (Microsoft,
    2015). In marketing and customer relationship scenarios, ML is used to create
    personalized experiences, make product recommendations, and better predict customer
    acquisition and churn. In finance, fraud detection solutions and financial forecasting
    are often aided by ML-backed solutions.
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_1_Fig3_HTML.jpg](A463582_1_En_1_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-3
  prefs: []
  type: TYPE_NORMAL
- en: Approach for classical , supervised machine learning solutions
  prefs: []
  type: TYPE_NORMAL
- en: Deep Learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Although traditional ML approaches work well for many scenarios as discussed
    earlier, much of the world is quantized in a representation that has no easily
    extractable semantics, such as audio snippets or pixels in an image.
  prefs: []
  type: TYPE_NORMAL
- en: For example, programming a computer to recognize whether there is a flamingo
    in each of the images in Figure [1-4](#Fig4) would be exceedingly difficult. These
    images are represented to a computer as a matrix of pixel values ranging from
    0 to 255\. Standard colored images have three channels of red, green, and blue
    and images can be thus represented as three two-dimensional matrices. It’s tough
    to even define which combination of numerical values represents the color pink,
    let alone process them to identify a flamingo. Even taking a traditional ML approach
    and hand-crafting features to recognize parts of the image such as a beak and
    feathers and legs would take very specialized knowledge and a large investment
    of time to build the different representations from the raw pixel values well
    enough on top of a large set of images from which the computer could then learn.
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_1_Fig4_HTML.jpg](A463582_1_En_1_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-4
  prefs: []
  type: TYPE_NORMAL
- en: Example images where a machine with AI might be asked questions that require
    it to process, understand, and reason. An example is whether or not there is a
    flamingo in each of these images, and hand-crafting features for traditional machine
    learning approaches is quite difficult and time-consuming.
  prefs: []
  type: TYPE_NORMAL
- en: Similarly, traditional natural language processing requires complex and time-consuming
    task-specific feature engineering. For processing speech, different languages,
    intonations, environments, and noise create subtle differences that make crafting
    relevant features extremely difficult.
  prefs: []
  type: TYPE_NORMAL
- en: Deep learning, which is the focus of this book, is a further subfield of AI
    and ML that has especially shown promise on these types of problems without easily
    extractable semantics such as images, audio, and text data (Goodfellow, Bengio,
    & Courville, 2016). With deep learning approaches, a multilayer deep neural network
    (DNN) model is applied to vast amounts of data. Deep learning models often have
    millions of parameters; therefore they require extremely large training sets to
    avoid overfitting. The goal of the model is to map from an input to an output
    (e.g., pixels in an image to classification of image as flamingo; audio clip to
    transcript). The raw input is processed through a series of functions. The basic
    idea is that supervised deep learning models learn the optimal weights of the
    functions mapping this input data to the output classification through examining
    vast amounts of data and gradually correcting itself as it compares the predicted
    result with the ground truth labeled data.
  prefs: []
  type: TYPE_NORMAL
- en: The early variants of these models and concepts dating back to the 1950s were
    based loosely on ideas on how the human brain might process information and were
    called artificial neural networks . The model learns to process data through learning
    patterns. First are simple patterns such as edges and simple shapes, which are
    then combined to form more complicated patterns through the many layers of the
    model. Current models often include many layers—some variants even boast over
    a hundred layers—and hence the terminology deep. The model thus learns high-level
    abstractions automatically through the hierarchical nature of processing information.
  prefs: []
  type: TYPE_NORMAL
- en: Although data still need to be processed and shaped to fit into a deep learning
    model, there is no longer a need to hand-craft features, as the raw input (e.g.,
    pixel values in an image) is fed directly into the model. The model learns the
    features (attributes) of the input data automatically. There is thus no need for
    features that represent subparts of the pictures, such as the beak and leg in
    the flamingo example earlier. Deep learning approaches show promise for learning
    patterns in the input data to be able to classify directly based on the raw input
    rather than constructing features manually. Instead, often more time is spent
    selecting the structure of the network, also called the network architecture,
    and tuning the hyperparameters, the parameters within the model that are set before
    the learning process even begins. This has given rise to the idea that network
    architecture engineering is the new feature engineering (Merity, 2016). Deep learning
    has also shown promise in several areas of ML where traditional methods also work
    well, such as forecasting for predicting future values in a time series and recommendation
    systems that aim to predict the preference a user would have for a given item.
    More details on specific types of deep learning models as well as recent trends
    in deep learning are covered in Chapters [2](A463582_1_En_2_Chapter.html) and
    [3](A463582_1_En_3_Chapter.html), respectively.
  prefs: []
  type: TYPE_NORMAL
- en: Rise of Deep Learning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The basic ideas and algorithms behind deep learning have been around for decades,
    but the massive use of deep learning in consumer and industrial applications has
    only occurred in the last few years. Two factors have especially driven the recent
    growth in AI applications, and especially deep learning solutions: increased computation
    power accelerated by cloud computing and growth in digital data.'
  prefs: []
  type: TYPE_NORMAL
- en: Deep learning models require lots of experimentation and often run on large
    training data, thus requiring a large amount of computing resources, especially
    hardware such as GPUs and FPGAs that are magnitudes more efficient than traditional
    CPUs for the computations in a DNN. Cloud computing—running workloads remotely
    through the Internet in a data center with shared resources—opens access to cheaper
    hardware and computing power. Resources can be spun up on demand and suspended
    when no longer in use to save on cost, without investments in new hardware.
  prefs: []
  type: TYPE_NORMAL
- en: With the Internet and connected devices, there is an increasing digitization
    of our world and massive amounts of data are being collected. Of course, understanding
    how to organize and harness this information is critical to advancing AI applications.
    One data collection project that changed AI research was the ImageNet data set,
    originally published in 2009, which evolved into a yearly competition for AI algorithms,
    such as which algorithm could classify the images by objects with the lowest error
    rate (Russakovsky et al., 2015). Deep learning has emerged recently as a powerful
    technique thanks in large part to the collection of this ImageNet data set. “Indeed,
    if the artificial intelligence boom we see today could be attributed to a single
    event, it would be the announcement of the 2012 ImageNet challenge results” (Gershgorn,
    2017).
  prefs: []
  type: TYPE_NORMAL
- en: Specifically, in 2012, a deep learning solution drastically improved over the
    previous year’s results for classifying objects, as shown in Figure [1-5](#Fig5).
    This solution changed the direction of computer vision research, and accelerated
    the research of deep learning in other fields such as natural language processing
    and speech recognition. Continuing more advanced deep learning research, in 2015,
    Microsoft Research submitted an entry with an architecture called ResNet with
    152 layers that was the first time an algorithm surpassed human classification
    (He, Zhang, Ren, & Sun, 2015).
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_1_Fig5_HTML.png](A463582_1_En_1_Fig5_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-5
  prefs: []
  type: TYPE_NORMAL
- en: Yearly winning solution’s top five classification error rate on ImageNet data
    for image classification in ILSVRC (Russakovsky et al., 2015)
  prefs: []
  type: TYPE_NORMAL
- en: This ImageNet data and competition is by no means a pure academic exercise.
    Many of the architectures used in this competition are often used in industry,
    many pretrained models on the ImageNet data are made available to the public,
    and many deep learning computer vision applications are seeded by this work. This
    is especially true for transfer learning approaches, which are discussed in more
    detail in Chapter [2](A463582_1_En_2_Chapter.html).
  prefs: []
  type: TYPE_NORMAL
- en: One thing ImageNet changed in the field of AI is suddenly people realized the
    thankless work of making a dataset was at the core of AI research. People really
    recognize the importance the dataset is front and center in the research as much
    as algorithms. (Gershgorn, 2017) —Li Fei-Fei
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Of course, as one might infer from the drastic improvement in the ImageNet results
    over the last few years and discussion of the ResNet-152 architecture from Microsoft,
    there have also been recent advances in algorithms supporting deep learning solutions
    and tools available to create such solutions. Thus, computational power accelerated
    by cloud computing, growth in data (especially open labeled data sets), and advanced
    algorithms and network architectures have together drastically changed what is
    possible with AI in just the last few years.
  prefs: []
  type: TYPE_NORMAL
- en: Not only can deep learning techniques surpass humans in image recognition, but
    they are also pushing other areas, such as approaching human level in speech recognition.
    In fact, some of the first breakthroughs in deep learning happened in speech recognition
    (Dahl, Yu, Deng, & Acero, 2011). Then in October 2016, Microsoft reached human
    parity in the word error rate on the Switchboard data set, a corpus of recorded
    telephone conversations used for more than 25 years to benchmark AI systems (Xiong
    et al., 2016). These type of innovations are why speech recognition systems on
    personal devices and computers have improved so drastically in the last few years.
  prefs: []
  type: TYPE_NORMAL
- en: Similarly for natural language processing, on January 3, 2018, Microsoft reached
    a score of 82.6% on the SQuAD machine reading comprehension data set comprised
    of Wikipedia articles. Using these data, the computer reads a document and answers
    a question, and was found to outperform humans on the answers (human performance
    is at about 82.3%; Linn, 2017; Rajpurkar, Zhang, Lopyrev, & Liang, 2016).
  prefs: []
  type: TYPE_NORMAL
- en: However, it is important to note that these achievements are for a specific
    problem or application, and do not represent an AI system that can generalize
    to new tasks. It can also be relatively straightforward to create examples that
    the computer fails on, so-called adversarial examples (Jia & Liang, 2017). Additionally,
    the performance of the system could drop dramatically even if the original task
    is modified only slightly. For example, although computers might now classify
    general images better than humans, as shown on ImageNet data discussed earlier,
    giving open-ended answers to questions about images is still far from human performance;
    there was over 10% difference in accuracy as of June 2017 on the VQA 1.0 data
    set for visual question answering (AI Index, 2017).
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, deep learning as a general approach still has many limitations
    such as the inability to reason and lack of understanding. In some cases it can
    also be more difficult to tune deep learning systems than traditional systems,
    such as when there is a certain aspect on which it is not doing well, which in
    some cases could be easier to account for in a traditional ML model with fewer
    parameters. Other ML and AI fields of research exist and solve other types of
    problems more accurately than deep-learning-based approaches. There is also much
    potential around the combination of deep learning with other AI research areas
    such as reinforcement learning. More details around recent advances, trends, and
    limitations are discussed in Chapter [3](A463582_1_En_3_Chapter.html).
  prefs: []
  type: TYPE_NORMAL
- en: In this book, we focus mainly on deep learning approaches within AI and applications
    where intelligent technology can use deep learning to create solutions that empower
    people and businesses. These solutions include enabling better engagement with
    customers, transformation of products, and better optimization of operations,
    for example. Deep learning applications can often be developed in such a way that
    they learn and improve over time as more data are collected and often create experiences
    that connect people and technology in more seamless ways. This book is meant to
    serve as an introduction to how to develop deep learning solutions with the Microsoft
    AI Platform. For a more comprehensive overview of deep learning in general including
    more about the theory and advanced topics, the book by Bengio, Goodfellow, and
    Courville (2016) is highly recommended.
  prefs: []
  type: TYPE_NORMAL
- en: Applications of Deep Learning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Some classic computer vision problems that can be tackled using deep learning
    are shown in Figure [1-6](#Fig6), such as being able to classify images and find
    objects within the images. These common technical problems underlie many different
    end user applications. For example, photo search applications such as Microsoft’s
    Photo App that allow users to type in descriptions of objects (e.g., “car”) or
    concepts (e.g., “hug”) and return relevant results provide a useful capability
    built through using DNNs.
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_1_Fig6_HTML.jpg](A463582_1_En_1_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-6
  prefs: []
  type: TYPE_NORMAL
- en: Example computer vision problems
  prefs: []
  type: TYPE_NORMAL
- en: Many deep learning applications for computer vision surround health care and
    the medical realm, in subfields where doctors commonly inspect patients or test
    results visually, such as in dermatology, radiology, and ophthalmology. Imagine
    the possibilities in that a radiologist can inspect thousands of scans, but a
    computer can be shown and learn from millions. Humans globally will benefit from
    the democratization of these services, which will over time become even more accurate
    and efficient. Project InnerEye is one example, a research project from Microsoft
    for building innovative tools for automatic, quantitative analysis of three-dimensional
    radiological images to assist expert medical practitioners.
  prefs: []
  type: TYPE_NORMAL
- en: Examples also abound in manufacturing and utilities. Take eSmarts, a power and
    utility company based in Norway that provides an automated energy management system,
    for example. They use drones to collect images of power lines and then analyze
    them using DNNs to automatically detect faults (Nehme, 2016). Specifically, eSmarts
    does object detection on the images to detect discs and then predict whether they
    are faulty. They mix real images with synthetic images they have created to create
    a large enough data set to be able to predict. Similarly, Jabil, one of the leading
    design and manufacturing solution providers, is optimizing manufacturing operations
    by analyzing images of their circuit board assembly line to automatically detect
    defects (Bunting, 2017). Doing this reduces the number of boards that have to
    be manually inspected by the operators watching the line and increases their throughput.
  prefs: []
  type: TYPE_NORMAL
- en: Analyzing natural language data is another common use of deep learning. The
    goal of these applications broadly is for computers to process natural language,
    classify text, answer questions, summarize documents, and translate between languages,
    for example. Natural language processing often requires several layers of processing,
    from the linguistic level of words and semantics to parts of speech and entities,
    to the type of end user applications shown in Figure [1-7](#Fig7) (Goldberg, 2016).
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_1_Fig7_HTML.jpg](A463582_1_En_1_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-7
  prefs: []
  type: TYPE_NORMAL
- en: Example applications of natural language processing from text
  prefs: []
  type: TYPE_NORMAL
- en: Translating audio data to text is another common application of deep learning.
    An example application using deep learning for speech recognition, Starship Commander
    is a new virtual reality (VR) game from Human Interact, where players are active
    agents in the sci-fi universe (Microsoft Customer Stories, 2017). Human Interact
    is building the lifelike experiences in the game around human speech, allowing
    users to influence the storyline and direction of the game through their voice.
    To enable this, the game needs to recognize speech and understand the meaning
    of that speech based on the users’ underlying intent. Microsoft’s Custom Speech
    Service allows developers to build on top of a speech recognition system that,
    using deep learning, can overcome obstacles such as speaking style and background
    noise. Developers can even train with a custom script to recognize the key words
    and phrases from the game to build a truly custom speech recognition system more
    quickly and easily than building from scratch.
  prefs: []
  type: TYPE_NORMAL
- en: This is just the first step of recognizing what words were uttered—the game
    then needs to understand what the user means. Imagine the user is giving a command
    to start the engine of a ship. There are many ways someone could give that command.
    Microsoft’s Language Understanding Service infers the users’ underlying intent,
    translating between the speech recognized by the game and what the user actually
    means.
  prefs: []
  type: TYPE_NORMAL
- en: The only reason we can build a product like this is because we are building
    on the deep learning and speech recognition expertise at Microsoft to deliver
    an entertainment experience that will be revolutionary. —Alexander Mejia, Owner
    and Creative Director, Human Interact
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Of course, these are just some simple examples that showcase how deep learning
    can bring value to business and consumer applications. Deep learning has shown
    tremendous potential for applications around speech, text, vision, forecasting,
    and recommenders, for example (see Figure [1-8](#Fig8)), and we expect to see
    tremendous use of deep learning in many industries and more applications in the
    future.
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_1_Fig8_HTML.png](A463582_1_En_1_Fig8_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-8
  prefs: []
  type: TYPE_NORMAL
- en: Example areas where deep learning solutions have demonstrated great performance
  prefs: []
  type: TYPE_NORMAL
- en: Interacting with more applications through speech and text rather than menus,
    chatting with bots on a company’s web site or human resources page to solve routine
    problems quickly, innovative photo applications that allow natural search and
    manipulation, and finding relevant information quickly from documents are just
    some example scenarios where deep learning will drive forward value to businesses
    and consumers.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter introduced the concepts of AI, ML, and deep learning as summarized
    in Figure [1-9](#Fig9). Buildingon decades of research and technological innovations
    as mentioned briefly in this chapter, Microsoft now provides services and infrastructure
    to enable others who want to build intelligent applications—including powerful
    deep learning applications as discussed in this book—through the Microsoft AI
    Platform built on the cloud computing platform Azure.
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_1_Fig9_HTML.png](A463582_1_En_1_Fig9_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-9
  prefs: []
  type: TYPE_NORMAL
- en: Visualization of relationship between artificial intelligence, machine learning,
    and deep learning
  prefs: []
  type: TYPE_NORMAL
- en: This chapter also discussed reasons behind the recent rise of deep learning
    such as increased computational power and increased data set sizes, especially
    for labeled data such as ImageNet, which has been made available publicly. These
    have propelled forward research in areas such as computer vision, natural language
    processing, speech recognition, and time series analysis. We are also seeing many
    valuable applications built on deep learning in areas such as health care, manufacturing,
    and utilities. We believe this trend will continue, but that other areas of AI
    research will also be useful in the future.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we introduce common deep learning models and aspects needed
    to get started with deep learning. In Chapter [3](A463582_1_En_3_Chapter.html),
    we then discuss some of the emerging trends in deep learning and AI as well as
    some of the legal and ethical implications mentioned briefly in this chapter in
    more detail.
  prefs: []
  type: TYPE_NORMAL
- en: 2. Overview of Deep Learning
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In Chapter [1](A463582_1_En_1_Chapter.html), we gave an overview of AI and the
    basic idea behind deep learning. We discussed how deep learning—applying artificial
    neural network models with a large number of layers—has yielded state-of-the art
    results for several research areas, such as image classification, object detection,
    speech recognition, and natural language processing.
  prefs: []
  type: TYPE_NORMAL
- en: 'Deep learning has also shown promise in many applications across areas such
    as health care, manufacturing, and retail. In 2017, for example, an AI system
    did as well as dermatologists in identifying skin cancer and a model could diagnose
    irregular heart rhythms from single-lead electrocardiogram (ECG) signals better
    than a cardiologist (Esteva et al., 2017; Rajpurkar, Hannun, Haghpanahi, Bourn,
    & Ng, 2017). We believe this trend will continue: Deep learning will bring value
    to more scenarios across many industries and progress toward improved AI experiences
    will continue to accelerate.'
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter we briefly go over the basics of several types of networks that
    are now commonly used. We also describe the data science workflow for deep learning
    projects including a description of some of the popular tools and technologies
    that data scientists and developers need to get started when working on a deep
    learning project. This chapter also provides practical techniques for getting
    started with deep learning projects, without spending significant time in training
    a convolutional neural network using large data sets like ImageNet from scratch.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter is simply an overview of deep learning and the building blocks
    for developing deep-learning-based solutions. In the third part of this book,
    these basic concepts are built on for introducing in more detail several common
    network models. These later chapters (e.g., Chapter [6](A463582_1_En_6_Chapter.html))
    provide sample code that one can follow. Although this chapter also covers the
    basic ideas of training and scoring deep learning models, we discuss more specifics
    along with sample code for training and scoring on Azure in the fourth part of
    this book.
  prefs: []
  type: TYPE_NORMAL
- en: Common Network Structures
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There are many variations of artificial neural network models, including convolutional
    neural networks (CNNs), recurrent neural networks (RNNs), generative adversarial
    networks (GANs), and autoencoders, for example, as shown in Table [2-1](#Tab1).
    Today, most problems require data scientists to select the appropriate network
    type and network structure for the problem at hand. Data scientists spend time
    trying different problem formulations and exploring different hyperparameters
    (e.g., type of network structure), and see which works for their specific problem.
    In the sections that follow, we describe briefly each of these types of network
    structures.
  prefs: []
  type: TYPE_NORMAL
- en: Table 2-1
  prefs: []
  type: TYPE_NORMAL
- en: Common Network Structures and Common Applications
  prefs: []
  type: TYPE_NORMAL
- en: '| CNNs | RNNs | GANs | Autoencoders |'
  prefs: []
  type: TYPE_TB
- en: '| :-- | :-- | :-- | :-- |'
  prefs: []
  type: TYPE_TB
- en: '| Image classification, object detection | Natural language processing, time
    series analysis | Text to image creation, image to image translation | Dimensionality
    reduction, anomaly detection, recommender systems |'
  prefs: []
  type: TYPE_TB
- en: Convolutional Neural Networks
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: CNNs are simply neural networks that make use of the convolution operator in
    at least one of their layers. CNNs are feedforward neural network models that
    are a foundational network especially for computer vision problems. Feedforward
    implies that information is always fed in one direction in the network and there
    are not any loops in the network structure. CNNs have also been used in other
    areas such as speech recognition and natural language processing for certain tasks.
  prefs: []
  type: TYPE_NORMAL
- en: CNNs work on the premise of translation invariance; for images, this builds
    on the idea that an object within the image is the same object even if it is moved,
    as illustrated in Figure [2-1](#Fig1). This is important, as the network does
    not have to relearn what each object is in every position of the image. This requires
    significantly less data to train and can generalize better to learning how to
    process images than if we had to separately learn how to recognize objects at
    each location as would be required in a multilayer perceptron (MLP).
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_2_Fig1_HTML.png](A463582_1_En_2_Fig1_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-1
  prefs: []
  type: TYPE_NORMAL
- en: CNNs allow for translation variance; for example, the handwritten digit “8”
    is still an 8 even if it is moved within the image. This concept helps the network
    learn how to process images more effectively than simply applying a vanilla neural
    network model with hidden layers.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, if we want the model to be able to learn to identify what is a
    cat, no matter where the cat is located in the image it shares the same characteristics
    from which the model should learn: how to identify fur, cat ears, tail, and so
    on.'
  prefs: []
  type: TYPE_NORMAL
- en: In CNNs, the input image is fed through what is often called a filter or kernel,
    which acts as a feature detector in the network. You can think of these feature
    detectors as trying to learn aspects such as edges, shapes, or patterns within
    the image. This is done by applying the feature detector on one patch of the image
    at a time through sliding windows, with the results of this convolution operation
    saved into what is called a convolved image or feature map. CNNs hold the property
    of translation invariance as mentioned earlier, as the filters share the same
    weights as applied to each image patch that after applying form the convolved
    image. The depth of a convolutional layer in a neural network corresponds to the
    number of filters used in that layer.
  prefs: []
  type: TYPE_NORMAL
- en: A form of down-sampling through the use of pooling layers is used to reduce
    the size of the data going through and remove the potentially redundant aspects
    that the network at that stage has learned to react to. A “max pooling” layer
    for example simply takes the maximum value from the output of the convolved image
    for each window of the image as shown in Figure [2-2](#Fig2), where the stride
    represents the number of pixels by which the window jumps. Convolution and pooling
    layers are used in many combinations, transforming an input image into an array
    that is then input into at least one fully connected layer that feeds out to the
    predicted output classes as visualized in Figure [2-3](#Fig3). The fully connected
    layers simply act as a classifier to predict the output class.
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_2_Fig2_HTML.png](A463582_1_En_2_Fig2_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-2
  prefs: []
  type: TYPE_NORMAL
- en: Max pooling operation with 2 by 2 filters with stride of two
  prefs: []
  type: TYPE_NORMAL
- en: 'In other words, CNNs can be conceptually split into two main pieces, both of
    which are optimized together:'
  prefs: []
  type: TYPE_NORMAL
- en: The automatic feature extractor creates the hidden feature state—features that
    represent aspects of image that are relevant for classification—and is made up
    of layers such as convolutional and pooling layers.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The classifier is a fully connected neural network made up of at least one layer
    that classifies the hidden feature state.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The automatic feature extractor part of CNN enables the network to learn aspects
    such as edges and shapes of the image without having to explicitly program the
    network to compute these features as was done with the use of algorithms such
    as scale-invariant feature transform (SIFT).
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_2_Fig3_HTML.png](A463582_1_En_2_Fig3_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-3
  prefs: []
  type: TYPE_NORMAL
- en: Basic building blocks of convolutional neural networks (CNNs)
  prefs: []
  type: TYPE_NORMAL
- en: Importantly, CNNs automatically learn the values of the filters (“feature detectors”)
    through training the network on large amounts of labeled data using a concept
    called backpropagation, continuing to improve the weights within the network until
    the classification error is minimized. In the early layers of the networks, the
    network typically creates filters that look to be recognizing aspects of the images
    such as edges, basic shapes, and colors. Later layers learn increasingly complex
    patterns until all of these patterns put together can help the network learn the
    classification of the input.
  prefs: []
  type: TYPE_NORMAL
- en: There are many ways to combine the fundamental building blocks of convolutional
    layers, pooling layers, and fully connected layers among other aspects of CNNs
    such as stride (number of pixels by which filters are slid over the image), dropout
    (used to reduce overfitting), and types of activation functions that introduce
    nonlinearity to the network and process the output of each layer. There are also
    many ways to train and formulate the network, and much research centers around
    how to design the layers, connections, and aspects such as depth versus width.
    More details and sample code can be found in Chapter [6](A463582_1_En_6_Chapter.html),
    so we only describe briefly the basics required for an overview of deep learning
    as well as to understand some of the trends related to CNNs that will be discussed
    in Chapter [3](A463582_1_En_3_Chapter.html).
  prefs: []
  type: TYPE_NORMAL
- en: Recurrent Neural Networks
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: RNNs directly make use of sequential information. Sequences passed to the network
    could be in the input, output, or even both. The RNN processes sequences of data
    through what is sometimes called a “state” or “memory.” Unlike CNNs, which are
    feedforward networks, RNNs contain loops in the network structure, as illustrated
    in Figure [2-4](#Fig4) and Figure [2-5](#Fig5). However, note that CNNs have increasingly
    been shown to be useful for analyzing sequential information as well, as is mentioned
    in more detail in Chapter [7](A463582_1_En_7_Chapter.html).
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_2_Fig5_HTML.png](A463582_1_En_2_Fig5_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-5
  prefs: []
  type: TYPE_NORMAL
- en: RNNs process information over sequences. Often this sequence represents information
    over time, such that a loop in the RNN can be “unrolled” to see that the output
    at a given point in time is a function of the inputs at previous points in time.
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_2_Fig4_HTML.png](A463582_1_En_2_Fig4_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-4
  prefs: []
  type: TYPE_NORMAL
- en: Recurrent neural networks have a loop in the network structure and process data
    over sequences
  prefs: []
  type: TYPE_NORMAL
- en: RNNs have been successful in many natural language processing tasks, as the
    meaning of a word in a sentence is dependent on the other words surrounding it.
    RNNs have also been useful in other applications such as time series prediction,
    speech recognition, and handwriting recognition.
  prefs: []
  type: TYPE_NORMAL
- en: A “vanilla” RNN processes a sequence of vectors with a single “hidden” vector
    by applying a recurrence formula at each step. This formula takes both the current
    vector as well as the previous state. Variants of RNNs have been proposed that
    are able to better process longer sequences such as long short term memory networks
    (LSTMS). More details on RNNs along with sample code can be found in Chapter [7](A463582_1_En_7_Chapter.html).
  prefs: []
  type: TYPE_NORMAL
- en: In Figure [2-6](#Fig6), an example application of both CNNs and RNNs is shown
    in the automatic generation of image descriptions in the alt text of images pasted
    within a PowerPoint file. CNNs are used to classify the objects within the image
    and RNNs are used to generate the sentence description based on those objects.
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_2_Fig6_HTML.jpg](A463582_1_En_2_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-6
  prefs: []
  type: TYPE_NORMAL
- en: Image descriptions are created automatically for images in PowerPoint through
    use of both CNNs and RNNs
  prefs: []
  type: TYPE_NORMAL
- en: Generative Adversarial Networks
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: GANs are a more recent development in deep learning that actually solves a given
    problem through training two separate network models in competition with each
    other (Goodfellow et al., 2014). In recent years, GANs have shown tremendous potential
    and have been applied in various scenarios, ranging from image synthesis, enhancing
    the quality of images (superresolution), image-to-image translations, to text-to-image
    generation, and more. In addition, GANs are the building blocks for advancements
    in the use of AI for art, music, and creativity (e.g., music generation, music
    accompaniment, poetry generation, etc.).
  prefs: []
  type: TYPE_NORMAL
- en: 'GANs are emerging as powerful techniques for both unsupervised and semisupervised
    learning. A basic GAN consists of the following:'
  prefs: []
  type: TYPE_NORMAL
- en: A generative model (i.e., generator) generates an object. The generator does
    not know anything about the real objects and learns by interacting with the discriminator.
    For example, a generator can generate an image.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A discriminative model (i.e., discriminator) determines whether an object is
    real (usually represented by a value close to 1) or fake (represented by a value
    close to 0).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: An adversarial loss (or error signal) is provided by the discriminator to the
    generator such that it enables the generator to generate objects that are as close
    as possible to the real objects.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: More details about GANs are included along with sample code Chapter [8](A463582_1_En_8_Chapter.html).
  prefs: []
  type: TYPE_NORMAL
- en: We expect that GANs will become more popular in the coming years, even outside
    of the use of creative applications, as they have potential to address how to
    create unsupervised learning methods that would greatly expand the reach of ML
    applications. Today, these types of models take a long time to train and are notoriously
    difficult to tune, and we expect that research will continue to advance the practicality
    of these networks for real applications. As this type of technology sees more
    real-world applications, improves on quality, and expands to more mediums such
    as videos, we believe more debate will surface over their use. For example, the
    implications of not being able to discern true content from fake are quite far-reaching,
    with examples already highlighted in the media such as near-realistic fake words
    inserted into videos of politicians speaking (Metz & Collins, 2018).
  prefs: []
  type: TYPE_NORMAL
- en: Autoencoders
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Autoencoders are another type of a feedforward network and have been used for
    applications such as dimensionality reduction, anomaly detection, and learning
    generative models. These neural network models have an input layer, an output
    layer, and at least one hidden layer in between. Importantly, autoencoders have
    the same number of units in the input layer as the output layer, and their purpose
    is thus to reconstruct the original values in the input layer. Of course, these
    are designed in such a way that they do not copy the input data exactly but are
    restricted so that they can only learn approximately, such as having a smaller
    dimension than the input data, as one example. Autoencoders thus learn most relevant
    properties to reconstruct the input data. As such, they can be useful for unsupervised
    learning applications where there is no target value for prediction or for learning
    features for input into another algorithm. They have shown promise for many applications
    such as recommender systems (Kuchaiev & Ginsburg, 2017).
  prefs: []
  type: TYPE_NORMAL
- en: Deep Learning Workflow
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For many AI projects, deep learning techniques are often used as the building
    block for building innovative solutions ranging from image classification and
    object detection to image segmentation, image similarity, and text analytics (e.g.,
    sentiment analysis, key phrase extraction). Often, people will ask, “How do I
    get started with using deep learning in my team?” To get started with deep learning,
    it is important to understand the tools and technologies that are used in deep
    learning projects and the workflow for building a solution.
  prefs: []
  type: TYPE_NORMAL
- en: 'Given the business requirements for an innovative solution, a data scientist
    will need to map it to one or more deep learning tasks. For example, let’s say
    a retail business wants to create an end-to-end customer shopping experience for
    mobile devices, where customers can take a photo of a shirt or a dress, and an
    application running on the mobile device can then match it to the shirts and dresses
    in the shopping catalog. To achieve this, the data scientist maps this to an image
    similarity problem: Take a new input image, and match it against all the shirts
    and dresses in the catalog. The top N images will be returned to the mobile application.
    While working with the application developers, other requirements need to be addressed
    as well, like identifying and cropping the image to just the person wearing the
    shirt or dress, for example. This will require the use of both object detection
    and image classification.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Once the deep learning task is identified, a typical deep learning workflow
    will include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Identify relevant data set(s).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Preprocess the data set.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Train the model.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Check the performance of the model.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Tune the model.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Deploy the model.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Iterate and collect more data to enable retraining.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Finding Relevant Data Set(s)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Most companies wanting to get started with deep learning projects often face
    difficultly when trying to find relevant data set(s) that they can use for training
    their deep learning models for a specific business scenario. In addition, the
    data set needs to be labeled. For example, to train a CNN to identify the type
    of clothing (e.g., polo shirt, t-shirt, dress, jeans), a data set consisting of
    images of clothing, with labels denoting whether the image is a shirt, dress,
    t-shirt, or jeans is required. These images can come from the existing product
    catalogs, public image data sets (e.g., diverse set of images from ImageNet, CIFAR-10,
    Deep Fashion), and scraped from various web sites.
  prefs: []
  type: TYPE_NORMAL
- en: To seed the initial training and validation data set if data are not already
    available, data scientists often use a search engine (Figure [2-7](#Fig7)) for
    performing an image search on a specific class (e.g., jeans), where the image
    owner has labeled the image as free to use for commercial use.
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_2_Fig7_HTML.jpg](A463582_1_En_2_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-7
  prefs: []
  type: TYPE_NORMAL
- en: Results returned from an image search using Bing
  prefs: []
  type: TYPE_NORMAL
- en: Data Set Preprocessing
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: After the data scientist has acquired the relevant image data sets, he or she
    will need to prepare them for training. Often, many real-world image data sets
    are imbalanced (commonly known as the minority class problem). This means there
    might be more images for a specific class (e.g., polo shirts), and fewer images
    for another class (e.g., t-shirts). To solve the imbalanced data set problem,
    a data scientist applies various tricks to increase the number of images in the
    minority class or down-sample from the more frequent classes until parity is achieved.
  prefs: []
  type: TYPE_NORMAL
- en: Another commonly used preprocessing technique is data augmentation to help the
    model generalize over multiple conditions, to improve its invariance to aspects
    such as rotation, translation, and scaling. This includes applying various transformation
    to the image, such as scaling, rotating, random cropping of the image, flipping
    the image, adjusting the brightness and contrast, and more. Various data augmentation
    capabilities are supported in the different deep learning frameworks.
  prefs: []
  type: TYPE_NORMAL
- en: Training the Model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: After the data set has been preprocessed and prepared, the data scientist is
    ready to start designing the deep learning model architecture and training the
    model. The key ingredients that enable effective modeling and training of deep
    learning models are (1) choosing a deep learning toolkit, and (2) training using
    hardware such as GPUs. This is discussed in more detail in the next section in
    this chapter.
  prefs: []
  type: TYPE_NORMAL
- en: Depending on the size of the data set, the model can be trained on a local machine
    (e.g., laptop, PC, Mac) or using infrastructure available in the public cloud,
    such as Microsoft Azure. Azure provides both NC-series virtual machines (VM) with
    Nvidia GPUs, as well as a managed service, called Azure Batch AI, which enable
    you to easily scale up and down GPUs that you need for your deep learning jobs.
    This will be covered in more detail in Chapters [4](A463582_1_En_4_Chapter.html)
    and [9](A463582_1_En_9_Chapter.html).
  prefs: []
  type: TYPE_NORMAL
- en: Validating and Tuning the Model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'During training of the deep neural network, there are several key metrics that
    will provide insights on the learning efficiency and the quality of the models
    at each epoch. An epoch refers to a full pass of the training data set. Two metrics
    are commonly tracked: (1) loss function, and (2) training and validation accuracy.'
  prefs: []
  type: TYPE_NORMAL
- en: 'By evaluating the loss function at each epoch, the quality of the model at
    the end of each epoch can be evaluated. A lower loss is a good indication of a
    better model. There are many hyperparameters that are set before the learning
    process even begins—the learning rate is one important hyperparameter that can
    have a significant impact on the results of the model. By plotting loss (y axis)
    and epochs (x axis), whether the learning rate has been set appropriately can
    be understood: A good learning rate leads to a lower loss in a shorter amount
    of time. Often, the learning rate is tracked for both the training and validation
    data set. However, it is also important to make sure that the model has not overfit
    the training data. Figure [2-8](#Fig8) shows an example of different learning
    rates. In practice, the learning rate curves are not smooth and it is possible
    to modify the learning rate over the training process as needed. This is just
    one example of the type of validating and tuning that is required during the process
    of training a deep learning model.'
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_2_Fig8_HTML.jpg](A463582_1_En_2_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-8
  prefs: []
  type: TYPE_NORMAL
- en: Different learning rates. Illustration inspired by Stanford cs231n course available
    at [`http://bit.ly/StanfordCS231n`](http://bit.ly/StanfordCS231n) .
  prefs: []
  type: TYPE_NORMAL
- en: The second metric commonly tracked is the training and validation accuracy.
    By charting the accuracy (y axis) and epoch (x axis), it can be understood whether
    the model has overfit the training data set. If the training and validation accuracy
    curves are close to each other, then very little overfitting has occurred. If
    the training and validation curves are far apart, overfitting has occurred, and
    it is important to revisit the model, as it does not generalize to new data as
    expected. Figure [2-9](#Fig9) shows how to identify overfitting by looking at
    the accuracy curves for the training and validation data set.
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_2_Fig9_HTML.jpg](A463582_1_En_2_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-9
  prefs: []
  type: TYPE_NORMAL
- en: Identifying overfitting using training and validation accuracy
  prefs: []
  type: TYPE_NORMAL
- en: Deploy the Model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Once the quality of the model is high enough for the requirements of the solution,
    the next step is to deploy it. Today, deep learning models can be deployed to
    the cloud as REST APIs, run in a batch on a schedule, deployed onto mobile devices
    (e.g., iPhones, Android phones, iPads, and more), or edge devices (e.g., Internet
    of Things [IOT] gateways). This depends on how you are thinking about using the
    trained deep learning model. For example, if you are developing a web application,
    and you are enriching it with AI, it makes sense to operationalize your deep learning
    models as REST APIs, which can be easily consumed by the web application. If you
    are developing a mobile application, you should consider both connected and disconnected
    scenarios, as well as latency requirements. You will either have the models running
    offline on the mobile device, or a hybrid model where you have both combinations
    of models that run on device and REST APIs that provide more powerful functionality
    in the cloud.
  prefs: []
  type: TYPE_NORMAL
- en: To deploy the deep learning models as REST APIs, several options exist. You
    can leverage Azure Machine Learning Operationalization services (more details
    will be covered in subsequent chapters in the book) to host the model in a docker
    container, and expose one or more REST endpoints, or you can build your own hosting
    stack (e.g., use of Flask, CherryPy backed by high-performing web server like
    NGINX). You can easily deploy this hosting stack on Microsoft Azure, as well.
    Depending on the scenario, you might want to run the model in batch mode on a
    large set of data on a schedule. The type of hardware such as GPUs is also a relevant
    factor to consider. More details are discussed in Chapter [10](A463582_1_En_10_Chapter.html).
  prefs: []
  type: TYPE_NORMAL
- en: For more consideration around approaching data science workflows in general,
    including deep learning projects, we suggest the Microsoft Team Data Science Process
    available at [`http://bit.ly/MSFT_TDSP`](http://bit.ly/MSFT_TDSP) . This includes
    an overview of the data science life cycle, a suggested standardized project structure
    and infrastructure, and resources for data science projects.
  prefs: []
  type: TYPE_NORMAL
- en: Deep Learning Frameworks & Compute
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As mentioned earlier, two key ingredients you need for performing deep learning
    training are (1) use of a deep learning framework, and (2) performing training
    using a GPU. General-purpose computing on GPUs especially through efficient use
    of matrix multiplication has been accelerated through frameworks such as CUDA
    and OpenCL. These have enabled higher level libraries such as cuDNN on top of
    CUDA for building deep neural nets; cuDNN underpins popular deep learning libraries.
  prefs: []
  type: TYPE_NORMAL
- en: There are now many popular deep learning frameworks such as Tensorflow, PyTorch,
    CNTK, MXNet, and Caffe2, as well as popular higher level APIs such as Keras and
    Gluon. The choice of a deep learning toolkit depends on many factors, including
    the availability of good tutorials and existing implementations of model architectures
    and pretrained models, skill sets of the AI talents in the company, flexibility
    of the toolkit in expressing complex deep neural networks, availability of built-in
    helper functionalities (e.g., rich set of APIs for data augmentation and transformation),
    ability to effectively leverage both CPUs and GPUs, and ability to perform distributed
    training.
  prefs: []
  type: TYPE_NORMAL
- en: 'We recommend the deep learning comparison repo available at [`http://bit.ly/DLComparisons`](http://bit.ly/DLComparisons)
    for understanding differences between different deep learning frameworks on a
    few common scenarios, with example frameworks considered as illustrated in Figure
    [2-10](#Fig10). This repo has several stated goals:'
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_2_Fig10_HTML.jpg](A463582_1_En_2_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-10
  prefs: []
  type: TYPE_NORMAL
- en: We recommend the “Rosetta Stone” for deep learning frameworks available on GitHub
    at [`http://bit.ly/DLComparisons`](http://bit.ly/DLComparisons) with timings for
    different variants of Azure GPU VMs available for running deep learning code
  prefs: []
  type: TYPE_NORMAL
- en: A “Rosetta Stone” of deep learning frameworks to allow data scientists to easily
    leverage their expertise from one framework to another.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Optimized GPU code using the most up-to-date highest level APIs.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: A common setup for comparisons across GPUs (potentially CUDA versions and precision).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: A common setup for comparisons across languages (Python, Julia, R).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The possibility to verify expected performance of own installation.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Collaboration between different open source communities.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The comparisons in the repo are not meant to suggest anything about the overall
    performance of the different frameworks because they omit important comparisons
    such as availability of pretrained models as just one example. Yet they serve
    as a nice way to get started and compare many popular frameworks for common scenarios.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: Keras is emerging as a popular deep learning library, due to its ability to
    provide high-level abstractions for modeling deep neural networks, and the flexibility
    to choose different back ends (e.g., TensorFlow, CNTK, Theano).
  prefs: []
  type: TYPE_NORMAL
- en: In 2017, Facebook and Microsoft announced the ONNX open source format for deep
    learning models to enable data scientists to train a model in one framework but
    deploy it in another, for example. Since the announcement, other companies and
    developers of popular frameworks have joined this open source interoperability
    standard effort for transferring deep learning models between frameworks. There
    are also packages that allow converting directly from one framework to another,
    such as MMdnn, which helps users directly convert between different frameworks
    as well as visualize the model architecture.
  prefs: []
  type: TYPE_NORMAL
- en: Many of the deep learning libraries also include various ML algorithms. Most
    of these deep learning libraries support distributed training, and this helps
    a lot for doing deep learning at scale. Most of the deep learning libraries have
    Python wrappers. If you are an R user, you can also use R interfaces for some
    of the deep learning libraries (e.g., R interfaces to TensorFlow, Microsoft Cognitive
    Toolkit [CNTK], Keras, and more). In this book, we focus on the use of the libraries
    for modeling deep neural networks. Figure [2-11](#Fig11) shows several deep learning
    libraries, and the code activity on GitHub.
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_2_Fig11_HTML.jpg](A463582_1_En_2_Fig11_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-11
  prefs: []
  type: TYPE_NORMAL
- en: GitHub Stars/Fork for deep learning libraries
  prefs: []
  type: TYPE_NORMAL
- en: Although most of the examples in this book use Tensorflow, the Microsoft AI
    Platform supports any open source framework. In addition, we include a few examples
    of using other frameworks, such as a pedagogical example showing how one can train
    a CNN model using many different deep learning frameworks using the Microsoft
    Batch AI service in Chapter [9](A463582_1_En_9_Chapter.html).
  prefs: []
  type: TYPE_NORMAL
- en: GPUs make the training of deep learning models possible within a reasonable
    time frame. In recent years, innovations in both algorithms and availability of
    faster GPUs have enabled the training of deep learning models to be completed
    quickly. For example, the training of CNNs like ResNet-50 using the publicly available
    ImageNet data set used to take 14 days or more before 2017\. Within months in
    2017, the time taken to train ResNet-50 decreased significantly, from an hour
    to approximately 15 minutes. Preferred Network was able to train ResNet-50 CNN
    model with ChainerMN with 1,024 P100 GPUs in 15 minutes in November 2017, for
    example.
  prefs: []
  type: TYPE_NORMAL
- en: 'Jump Start Deep Learning: Transfer Learning and Domain Adaptation'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A major trend to jump starting deep learning solutions has been to build prior
    knowledge into the development of the model so it does not learn solely from the
    data of the problem at hand. Two common ways this is done is through a concept
    called transfer learning in computer vision and domain adaptation mainly through
    the use of word embeddings in natural language processing.
  prefs: []
  type: TYPE_NORMAL
- en: Transfer learning is especially useful in computer vision tasks such as image
    classification and object detection. The basic idea is that we want to be able
    to transfer our learning from one application to another. Transfer learning enables
    data scientists to quickly adapt existing pretrained models (e.g., AlexNet, ResNet-50,
    InceptionV3, etc.) to new domains. For example, a CNN can be trained on the large
    ImageNet data with millions of examples. This CNN then internally holds the representation
    of how to process images well, such as how to detect edges, shapes, and patterns
    to distinguish between objects. We thus want to be able to use this knowledge,
    captured within the weights of the network to use in a classification scenario
    with significantly less data, such as distinguishing between types of shirts on
    a retail web site or distinguishing between defects and nondefects through images
    taken on a manufacturing assembly line, for example.
  prefs: []
  type: TYPE_NORMAL
- en: Thus to jump start deep learning projects in computer vision, for example, we
    recommend data scientists leverage pretrained models that are trained using publicly
    available data sets such as ImageNet, CIFAR-10, and COCO. These data sets contain
    millions of images (from diverse domains) and have been carefully curated by the
    respective research labs (often through crowd-sourcing efforts) and annotated
    with class labels.
  prefs: []
  type: TYPE_NORMAL
- en: The pretrained models are used to jump start image classification, object detection,
    and image segmentation problems. These pretrained models, trained on large image
    data sets, are used either as featurizers for new images, or to further fine-tune
    to adapt to domain-specific images (e.g., medical x-ray images, PCB circuit board
    images, etc.) to improve on the quality of the predictions. Table [2-2](#Tab2)
    shows the different types of transfer learning. Table [2-3](#Tab3) shows the input
    and output initialization required for each type of transfer learning.
  prefs: []
  type: TYPE_NORMAL
- en: Table 2-3
  prefs: []
  type: TYPE_NORMAL
- en: Initialization of Inputs and Outputs of a Deep Learning Model Using Transfer
    Learning
  prefs: []
  type: TYPE_NORMAL
- en: '| Type | How to Initialize Featurization Layers | Output Layer Initialization
    |'
  prefs: []
  type: TYPE_TB
- en: '| :-- | :-- | :-- |'
  prefs: []
  type: TYPE_TB
- en: '| Standard DNN | Random | Random |'
  prefs: []
  type: TYPE_TB
- en: '| Headless DNN | Learn using another task | Separate ML algorithm |'
  prefs: []
  type: TYPE_TB
- en: '| Fine-tune DNN | Learn using another task | Random |'
  prefs: []
  type: TYPE_TB
- en: '| Multitask DNN | Random | Random |'
  prefs: []
  type: TYPE_TB
- en: Table 2-2
  prefs: []
  type: TYPE_NORMAL
- en: Different Types of Transfer Learning
  prefs: []
  type: TYPE_NORMAL
- en: '| Type | How Is Transfer Learning Used? | How to Train? |'
  prefs: []
  type: TYPE_TB
- en: '| :-- | :-- | :-- |'
  prefs: []
  type: TYPE_TB
- en: '| Standard DNN | None | Train featurization and output jointly |'
  prefs: []
  type: TYPE_TB
- en: '| Headless DNN | Use the features learned on a related task | Use the features
    to train a separate classifier |'
  prefs: []
  type: TYPE_TB
- en: '| Fine-tune DNN | Use and fine-tune features learned on a related task | Retrain
    featurization and output jointly with a small learning rate |'
  prefs: []
  type: TYPE_TB
- en: '| Multitask DNN | Learned features need to solve many related tasks | Share
    a featurization network across both tasks |'
  prefs: []
  type: TYPE_TB
- en: Natural language processing has also been accelerated by pretrained models,
    but in this case, it is often in the training of the representation of words that
    goes into the deep learning model known as word embeddings. Taking a step back,
    in natural language processing, words were typically represented through one-hot
    encoding, where each word is represented by a vector of length equal to the size
    of the vocabulary; all values are zeros except at the position that corresponds
    to that word in the vocabulary, which has the value of 1\. Models would need to
    learn from scratch with just the data of the problem at hand every time to understand
    how to process the words and what their meaning was in the context of the specific
    natural language processing task. In contrast, word embeddings are low-dimensional
    vectors that encode semantic meaning of words, encoding semantically related words
    close to each other in the embedding vector space.
  prefs: []
  type: TYPE_NORMAL
- en: Importantly, word embeddings can be trained on large, unlabeled data and many
    pretrained word embeddings are made available for use in other natural language
    processing tasks. By using a pretrained word embedding such as one trained on
    Google News, knowledge about how words are related to each other is embedded into
    the model built with them.
  prefs: []
  type: TYPE_NORMAL
- en: Word embedding vectors are learned using so-called word2vec algorithms such
    as Skip-Gram and CBOW. These are simple neural network models that aim to predict
    words in a window around each word. The concept is that semantically related words
    will appear in similar context and thus obtain similar vector representations.
    Of course, domain-specific word embeddings might be beneficial to better represent
    words within the model, and recent research has also focused on how to allow better
    domain adaptation between natural language processing applications.
  prefs: []
  type: TYPE_NORMAL
- en: Models Library
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Many pretrained deep neural networks are available for each of the deep learning
    libraries. For example, Microsoft CNTK and TensorFlow provide pretrained models
    for several state-of-the-art CNNs (AlexNet, GoogLeNet, ResNet, and VGG). Caffe’s
    Model Zoo provides a rich set of 40 and more pretrained models for state-of-the-art
    CNN (ResNet, Inception, VGG, etc.), and supporting various scenarios (e.g., car
    model identification, recognizing different landmarks and places, scene recognition,
    etc.). Google Word2Vec is a popular pretrained word-embedding model with many
    available tutorials.
  prefs: []
  type: TYPE_NORMAL
- en: You can use these pretrained models to jump start your deep learning projects,
    or further fine-tune the network for your business scenarios. This will often
    save significant amounts of time training the base models on a diverse data set.
  prefs: []
  type: TYPE_NORMAL
- en: More Info
  prefs: []
  type: TYPE_NORMAL
- en: 'Find out more about example pretrained models:'
  prefs: []
  type: TYPE_NORMAL
- en: 'CNTK Pretrained Image Model: [`http://bit.ly/CNTKModels`](http://bit.ly/CNTKModels)'
  prefs: []
  type: TYPE_NORMAL
- en: 'TensorFlow Official Model: [`http://bit.ly/TensorflowModels`](http://bit.ly/TensorflowModels)'
  prefs: []
  type: TYPE_NORMAL
- en: 'Caffe Model Zoo: [`http://bit.ly/CaffeModels`](http://bit.ly/CaffeModels)'
  prefs: []
  type: TYPE_NORMAL
- en: 'Tensorflow Word2Vec: [`http://bit.ly/TensorflowWord2Vec`](http://bit.ly/TensorflowWord2Vec)'
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter briefly introduced several common types of neural networks including
    CNNs, RNNs, and GANs, which are discussed in more detail along with sample code
    in later chapters. We also discussed the deep learning workflow, the nuts and
    bolts of starting a deep learning project and some of the libraries that can be
    used to develop and train deep neural networks. To help jump start deep learning
    projects, data scientists and developers can leverage pretrained models as the
    foundations for featurizing images or use them to further customize and fine-tune
    to adapt for your business domains. In the next chapter, we discuss some of the
    trends in the deep learning field as well as some of the limitations of this type
    of modeling approach.
  prefs: []
  type: TYPE_NORMAL
- en: 3. Trends in Deep Learning
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This chapter discusses some of the trends in deep learning and related fields.
    We cover specifically which trends might be useful for what tasks as well as discuss
    some of the methods and ideas that could have far-reaching implications but have
    yet to be applied to many real-world problems. We finish by covering briefly some
    of the current limitations of deep learning as well as some other areas of AI
    that seem to hold promise for future AI applications, and discuss briefly some
    of the ethical and legal implications of deep learning applications.
  prefs: []
  type: TYPE_NORMAL
- en: Variations on Network Architectures
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: One of the first trends in the field of deep learning was to build deeper networks
    with more layers to solve problems with increasing complexity. However, training
    such deep networks is difficult, as they are harder to optimize, and accuracy
    can degrade rather than improve. As mentioned in Chapter [1](A463582_1_En_1_Chapter.html),
    Microsoft released a network structure in 2015 that builds on the concept of residual
    learning with their architecture called ResNet (He, Zhang, Ren, & Sun, 2015).
    Instead of trying to learn a direct mapping of the underlying relationship between
    an input and output within the network, the difference or residual between the
    two is learned. With this concept, training of networks substantially deeper than
    previously used before became possible, with a network of 152 layers winning the
    2015 ILSVRC competition on the ImageNet data. A class of networks called Inception
    networks alternatively focus on wide architectures where not all layers are simply
    stacked sequentially, aiming to increase both performance as well as computational
    efficiency of neural network models (Szegedy, Liu, et al., 2014).
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: To accelerate development, practitioners should leverage network architectures
    from the research community such as Resnet-152 rather than trying to build and
    train CNNs from scratch.
  prefs: []
  type: TYPE_NORMAL
- en: Residual Networks and Variants
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There have been many suggested network architectures in recent years, and this
    trend continues to result in more network architecture choices. Many architectures
    rely on modifications to ResNets, such as ResNeXt, MultiResNet, and PolyNet (Abdi
    & Nahavandi, 2017; Xie, Girshick, Dollár, Zhuowen, & He, 2017; Zhang, Li, Loy,
    & Lin, 2017). Combining different types of approaches has also been considered
    such as Inception-ResNet (Szegedy, Ioffe, & Vanhoucke, 2016). In contrast, FractalNet
    is an extremely deep architecture that does not rely on residuals (Larsson, Maire,
    & Shakhnarovi, 2017).
  prefs: []
  type: TYPE_NORMAL
- en: DenseNet
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: DenseNet is another popular network structure where each layer is connected
    to all other layers; its popularity lies in that it allows a substantial reduction
    in the number of parameters through feature reuse while alleviating a problem
    related to training of the networks called vanishing gradients (G. Huang, Liu,
    van der Maaten, & Weinberger, 2018).
  prefs: []
  type: TYPE_NORMAL
- en: Small Models, Fewer Parameters
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Related to the reduction of the number of parameters with DenseNet, another
    trend in CNNs is for the creation of more efficient networks that are built on
    fewer parameters and have a smaller model size. In general, larger networks enable
    more accurate predictions, but there are clever ways of creating architectures
    and conducting model compression to achieve performance close to or at par with
    larger networks. These networks can thus be run faster and with less processing
    power, which can be especially useful, for example, on embedded and mobile devices
    where the computational power and storage are limited.
  prefs: []
  type: TYPE_NORMAL
- en: SqueezeNet, introduced by Iandola et al. (2016), is described as having accuracy
    similar to AlexNet with 50 times fewer parameters and model size less than 0.5
    MB, using depth-wise separable convolutions to reduce the number of parameters.
    MobileNet is another example that was designed specifically for mobile and embedded
    vision applications (Howard et al., 2017), which has recently been extended with
    MobileNetV2\. Besides designing efficient smaller networks, alternatives include
    pruning weights from existing deep networks, pruning filters, and quantizing weights
    within the network (Mittal, Bhardwaj, Khapra, & Ravindran, 2018). As one example,
    by pruning certain connections in the VGG16 architecture, the size can be reduced
    by a factor of 49 without modifying the predictions from the model (Han, Mao,
    & Dally, 2016).
  prefs: []
  type: TYPE_NORMAL
- en: In practice, we recommend data scientists try many network structures based
    on the current research that are often made available through model zoos and different
    deep learning frameworks as was described Chapter [2](A463582_1_En_2_Chapter.html).
    Data scientists must try the different options and consider the trade-offs between
    aspects such as ease of training and speed of scoring the models as required for
    the specific data set and problem at hand.
  prefs: []
  type: TYPE_NORMAL
- en: Capsule Networks
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: CNNs are a fantastic architecture and have been one of the key reasons for the
    resurgence of neural networks. As mentioned earlier, CNNs work on the premise
    of translation invariance. This translation invariance is limited, however, and
    they have significant drawbacks that stem from the fact that they do not deal
    with other translations such as size, illumination, and rotation of the input
    well as shown in Figure [3-1](#Fig1). This is usually overcome by providing many
    examples, augmenting the data with translated and generally modified examples,
    and as discussed earlier, pooling layers.
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_3_Fig1_HTML.jpg](A463582_1_En_3_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-1
  prefs: []
  type: TYPE_NORMAL
- en: CNNs do not build an internal representation of objects and thus struggle to
    understand objects when viewed from a different angle, and they can be fooled
    when parts of the object are out of order. In this case, a model thinks the same
    chair is a different object when viewed from above and thinks the face is a person
    even though parts of the face are moved around. Capsule networks are designed
    to tackle this problem in a more natural way using the idea of inverse graphics.
  prefs: []
  type: TYPE_NORMAL
- en: In general, CNNs do not intrinsically care about the spatial and orientational
    relationship between the items in the image; they only care whether these features
    exist. Higher level features are simply a combination of lower level features.
    Furthermore, CNNs use methods that reduce the spatial dimensions of the data and
    in effect increase the receptive field, the field of view of the higher level
    nodes. This allows the nodes to detect higher level features in larger regions
    of the input image. One of the methods of doing this is max pooling, which we
    explained in Chapter [2](A463582_1_En_2_Chapter.html). By using max pooling, though,
    the CNNs lose spatially acuity. For this reason, max pooling is viewed as a bit
    of an anathema by Hinton and therefore he sought to devise a new architecture,
    capsule networks (Sabour, Frosst, & Hinton, 2017).
  prefs: []
  type: TYPE_NORMAL
- en: Capsule networks are inspired by the idea of inverse graphics. In traditional
    graphics we describe an object and its pose parameters and through the process
    of rendering, the object is displayed on a screen. In inverse graphics we want
    to observe a scene and from it infer the objects and their poses.
  prefs: []
  type: TYPE_NORMAL
- en: A capsule in a capsule network tries to predict the presence and properties
    of a particular object at a given location in the scene. Capsules output vectors
    rather than scalars and the length of the vector encodes the estimated probability
    of the object being present at that particular location and the orientation encodes
    the pose parameters of the object.
  prefs: []
  type: TYPE_NORMAL
- en: 'Capsule networks also use a novel way of passing information between layers
    called dynamic routing. This means that the routing is not fixed beforehand, but
    determined dynamically during its execution. The method to achieve this proposed
    by Sabour, Frosst, and Hinton (2017) is called routing by agreement. The architecture
    of capsule networks is very similar to that of CNNs: Layers of capsules succeed
    each other with lower level features detected by the lower capsule and the higher
    level capsules composing these features to create higher level features. In routing
    by agreement, the lower level capsule outputs n-dimensional vectors whose length
    encodes the probability and its orientation in the n-dimensional space for the
    pose of the object detected. The subsequent capsule layer takes the input of all
    these capsules and then through an iterative process determines the weights of
    the inputs. In essence each layer’s estimation of the pose parameters is matched
    against the pose parameters of the subsequent layer. The closer the match, the
    higher the weights between the subsequent capsules. The scalar product of the
    vectors is used as the measure of similarity. This means that the weights between
    capsules are not static but change depending on the capsule vectors present.'
  prefs: []
  type: TYPE_NORMAL
- en: Capsule networks have demonstrated state-of-the-art results and require fewer
    training examples than CNNs due to their pose invariance. Training them is still
    slow, though, due to the iterative nature of dynamic routing, and they still remain
    to prove themselves across all the computer vision domains currently dominated
    by CNNs.
  prefs: []
  type: TYPE_NORMAL
- en: Object Detection
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Another trend in deep learning is the use of meta-architectures, building out
    on top of previous solutions to solve other types of problems. In analyzing images,
    for example, the ideas and pieces of CNNs are used as a backbone beyond image
    classification problems to solve problems such as object detection and image segmentation.
    One foundational model in object detection, for example, was the R-CNN model,
    which simply proposed cropping each image externally to the model using a region
    proposal method such as selective search, extracting features from each cropped
    image based on a CNN model, and then classifying each cropped image with support
    vector machine models (SVMs; Girshick, Donahue, Darrell, & Malik, 2013). In object
    detection, the trend has been to use the latest network architecture as feature
    extractors, but also emerging, improved meta-architectures as well as improved
    approaches for performance. For example, faster R-CNN and R-FCN are alternative
    meta-architectures that also build on standard CNNs but also predict bounding
    boxes using “anchors” during training, which are boxes overlaid on the image at
    different locations, scales, and aspect ratios (Ren, He, Girshick, & Sun, 2015;
    Dai, He, & Sun, 2016).
  prefs: []
  type: TYPE_NORMAL
- en: 'The YOLO approach (You only look once: unified real-time object detection;
    see Figure [3-2](#Fig2)) uses a simple CNN applied to the entire image (Redmon,
    Divvala, Girshick, & Farhadi, 2015). YOLO was the first approach to make real-time
    object detection practically possible through framing object detection not as
    a classification problem with bounding boxes, but as a regression problem to bounding
    boxes and associated class probabilities. Other related approaches such as SSD,
    MultiBox, and YoloV2 have been released recently along the trend of providing
    models that run faster while aiming to maintain good accuracy levels (Liu et al.,
    2015; Redmon & Farhadi, 2016; Szegedy, Reed, Erhan, Anguelov, & Ioffe, 2014).'
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_3_Fig2_HTML.jpg](A463582_1_En_3_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-2
  prefs: []
  type: TYPE_NORMAL
- en: Applying a pretrained object detection model to find objects using YOLO
  prefs: []
  type: TYPE_NORMAL
- en: In practice, trade-offs might need to be made between setting up the solution
    for accuracy of results versus speed of inference depending on whether the application
    has requirements such as real-time performance. Different meta-architectures,
    choices made during training such as the CNN architecture used as the feature
    extractor, image resolution, hardware, and software make broad generalizations
    about the ideal approach hard to make (J. Huang et al., 2017).
  prefs: []
  type: TYPE_NORMAL
- en: Object Segmentation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Many recent proposals explored how to reduce the need for the bounding box for
    object detection and explored segmentation neural network models such as LinkNet,
    as well as to use more specialized networks for other vision tasks, such as CortexNet
    for identifying actions on images rather than categorizing single frames (Culurciello,
    2017). Mask R-CNN and focal loss for dense object detection are other recent trends
    in object detection that have been open sourced by Facebook AI Research within
    a software system called Detectron and are thus available to run on the Microsoft
    AI Platform (He, Gkioxari, Dollar, & Girshick, 2017; Lin, Goyal, Girshick, He,
    & Dollar, 2017). This marks truly exciting progress in object segmentation!
  prefs: []
  type: TYPE_NORMAL
- en: More Sophisticated Networks
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The types of networks discussed in this chapter are just some examples within
    the broad space of deep learning. There are many ways to formulate deep neural
    networks as well as combine with other methodologies within a broader solution.
    As an example within the field of speech translation, Microsoft Research recently
    found state-of-the-art results on a large benchmark data set, the English–French
    translation campaign from 2014 at [`http://bit.ly/2EzMeRY`](http://bit.ly/2EzMeRY)
    using what was coined a deliberation network (Tian, 2017). This network builds
    on top of a simple LSTM architecture, combined with dual learning that is inspired
    by how humans deliberate. The premise is simple: A first-pass decoder goes over
    the sentence similar to creating a rough draft, whereas the second-pass decoder
    takes both the original input as well as the rough draft as input to get to the
    final solution. This is just one example, and there are numerous others of combining
    deep learning technologies together or with other methodologies as part of a larger
    solution as well.'
  prefs: []
  type: TYPE_NORMAL
- en: Similar to CNNs and RNNs, there has been large growth in the variety of proposed
    types and uses of GANs. There have also already been many commercial applications
    of GANs. For example, Microsoft worked with Getty Images, which provides stock
    photos, to explore image-to-image translation, such as turning a sunny beach photo
    into an overcast beach photo to provide more options to their customers (Liakhovich,
    Barraza, & Lanzetta, 2017). Microsoft Research also developed a “drawing bot”
    based on GANs that is able to create images based on only a text description,
    images that are based only on the computer’s “imagination” (Roach, 2018). The
    AttnGAN model proposed for this purpose was able to outperform previous state-of-the-art
    models in early 2018, producing a nearly threefold boost in image quality for
    text-to-image generation on an industry standard test (Xu et al., 2017).
  prefs: []
  type: TYPE_NORMAL
- en: Automated Machine Learning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Another area of ML that has been garnering interest the last few years is that
    of automatic ML and smart hyperparameter tuning (Bergstra, Yamins, & Cox, 2013;
    Domhan, Springenberg, & Hutter, 2015; Fusi & Elibol, 2017; Golovin et al., 2017;
    Li, Jamieson, DeSalvo, Rostamizadeh, & Talwalkar, 2016). Both these areas of research
    try to make use of historical information, optimization, and metalearning to be
    able to automatically or semiautomatically arrive at optimal ML pipelines, neural
    network topologies, and so on.
  prefs: []
  type: TYPE_NORMAL
- en: Another such piece of work centered around using reinforcement learning and
    LSTMs to create new neural network architectures (Zoph & Le, 2016). Reinforcement
    learning (RL) is a subfield of AI that is designed to have software agents automatically
    determine the optimal behavior to maximize performance, through a reward feedback
    process. It is a type of automated learning mechanism. The resulting CNN architecture
    called NASNet achieved state-of-the-art results on the CIFAR10 data set at the
    end of 2017 and is 1.05 times faster than the previous state-of-the-art model.
    Others have recently focused on more efficient search mechanisms such as leveraging
    current networks and reusing trained network weights (Cai, Chen, Zhang, Yu, &
    Wang, 2017). In the future we will probably see further endeavors in this area
    as computation becomes even quicker and the scale up and out of cloud infrastructure
    is fully realized.
  prefs: []
  type: TYPE_NORMAL
- en: Related to architecture search, the field of neuroevolution has recently received
    more visibility in the research and industrial community. This is a subfield of
    AI that aims to understand and invoke an evolutionary process similar to the one
    that produced the form of intelligence in human brains within a computer. Whereas
    NASNet and related areas of research focus on trying to automate the creation
    of networks, most applications of deep learning today require a human to specify
    the architecture of the neural network. Rather than having a fixed network architecture
    that we aim to optimize, researchers in the field of neuroevolution study the
    process of learning itself.
  prefs: []
  type: TYPE_NORMAL
- en: Neuroevolution researchers have found interesting results that we believe will
    influence more strongly applications of AI in the future. One example from neuroevolution
    is the concept of novelty search, the idea that optimizing for novelty might provide
    better results than optimizing for the direct outcome. Stanley (2017) illustrated
    the concept through the problem of trying to find a model for a robot to learn
    how to walk. One might guess that the best way to get an amazing walking robot
    would be to artificially combine together the models of the best walkers from
    the previous generation. However, the robots who are good at walking in the first
    generations might just be lurching forward unreliably. In contrast, robots that
    try oscillating their legs in a regular pattern fall down right away but could
    lead to more robust walking in the future, so simply breeding based on the best
    in the past might not be beneficial for the future. This field has also benefited
    tremendously by the increased computation power available today and we expect
    to see more advances and direct impact on the deep learning field.
  prefs: []
  type: TYPE_NORMAL
- en: Recently algorithms and processes for deriving AI from the field of neuroevolution
    have been applied to the deep learning architecture search problem and compared
    against reinforcement learning type approaches that resulted in NASNet. Real,
    Aggarwal, Huang, and Le (2018) found that regularized evolution approaches performed
    better than reinforcement learning at early search stages and generally found
    that they produced similar or higher accuracy results without having to retune
    parameters. The new architecture from this evolutionary search process called
    AmoebaNets resulted in state-of-the-art results for several image classification
    tasks at the beginning of 2018.
  prefs: []
  type: TYPE_NORMAL
- en: Hardware
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Deep neural networks involve a vast amount of computation, often using very
    large data sets to calculate the composition of an extremely parameter-heavy model.
    GPUs, which were originally designed for computations around rendering graphics
    on the computer, have accelerated the use of deep learning because they enable
    a high degree of parallelism within the GPU card. GPUs can provide higher throughput
    and efficiency for certain categories of applications compared with CPUs, including
    the types of computations required for deep learning training and inference. GPUs
    have a well-defined instruction set and fixed data width (specific precision integer
    and floating-point values).
  prefs: []
  type: TYPE_NORMAL
- en: GPUs have become increasingly more powerful over time, as mentioned in Chapter
    [2](A463582_1_En_2_Chapter.html). For example, the release of the NVIDIA Tesla
    V100 in May 2017 touted 2.4 times faster training of ResNet-50 DNN than the P100
    released a year earlier (Durant, Giroux, Harris, & Stam, 2017). In addition, there
    has been recent research on mixed precision training, allowing for a reduction
    in the memory consumption and thus shortening the training or inference time (Micikevicius,
    2017).
  prefs: []
  type: TYPE_NORMAL
- en: More Specialized Hardware
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Hardware has continued to specialize with the specialization of field programmable
    gate arrays (FPGAs) and application-specific integrated circuits (ASICs) for neural
    network modeling, moving toward more specialized hardware that is more efficient,
    as pictured in Figure [3-3](#Fig3). FPGAs are integrated circuits that do not
    have a predefined instruction set or fixed data width like GPUs. FPGA acceleration
    works by having the FPGA handle the extremely computing-intensive tasks that have
    been designed to be accelerated by the hardware, while the CPU handles other operations.
    They provide potential for ultralow latency calculations through optimizing numerical
    precision for inference, as well as potential to evolve to new ML application
    areas. They can run low-precision workloads for optimal efficiency using much
    less power and thus run much cheaper than GPUs.
  prefs: []
  type: TYPE_NORMAL
- en: Increasing use of FPGA technology is an especially promising trend in the AI
    space because of FPGA’s reconfigurability and its access to both the hardware
    and software level. This is especially promising for its potential for compromise
    between flexibility and specialization. ASICs are more performant for the application
    for which they are designed, but they are not useful for general-purpose computing,
    as they cannot be reconfigured after manufacturing.
  prefs: []
  type: TYPE_NORMAL
- en: In other words, FPGAs are more flexible than ASICs as they can be used and then
    repurposed for workloads beyond just deep learning and AI applications, including
    graph analytics, database acceleration, and data encryption, for example. Programming
    FPGAs requires support from specialized compilers, and it is relatively much harder
    than compilers used for traditionasl processors.
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_3_Fig3_HTML.png](A463582_1_En_3_Fig3_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-3
  prefs: []
  type: TYPE_NORMAL
- en: Alternatives for processing computations such as those in deep learning models
  prefs: []
  type: TYPE_NORMAL
- en: Hardware on Azure
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Microsoft has been investing in specialized hardware for use both in their own
    products as well as for others to use through their Azure cloud computing platform.
    To accelerate Bing’s search ranking algorithm, for example, FPGAs were programmed
    for that sole purpose and resulted in double the throughput at just 10 percent
    more power (Feldman, 2016). In 2016, Altera FPGAs were installed across every
    Azure cloud server datacenter at the time as Microsoft prepared to release capabilities
    as third-party offering. The ability to use FPGAs for deep learning inference
    that was announced in early 2018 is mentioned in more detail in Chapter [10](A463582_1_En_10_Chapter.html).
  prefs: []
  type: TYPE_NORMAL
- en: Quantum Computing
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As hardware such as more advanced GPUs and FPGAs continues to advance and specialize
    to enable deep learning, the future of how computing is conducted might also change
    dramatically in the longer term thanks to ongoing research in areas such as quantum
    computing. Quantum computing is a fundamentally different way of computing compared
    to today’s computers. Rather than the foundational building block of a bit in
    today’s computers, quantum computing builds on quantum bits called qubits that
    exist as a mixture of states at a given point in time and that can be manipulated
    all at once. It’s not clear yet what types of problems are most applicable to
    quantum computing, although there are some clear applications such as cryptography.
    Unfortunately, building quantum computers is extremely difficult and they are
    extremely hard to use as well as scale. So far, they can only be used for a limited
    set of computing tasks. Qubits are extremely sensitive to the surrounding environment
    and interference results in calculation errors. Microsoft is working on developing
    more general-purpose quantum computers to help solve today’s intractable problems
    through research on “topological qubits” that has the potential to completely
    revolutionize AI by opening up completely new computing potential.
  prefs: []
  type: TYPE_NORMAL
- en: The problems we’re looking at solving with a quantum computer are the problems
    that, today, require age-of-the-universe time scales. … Some of these problems
    literally require billions and billions and billions of years to solve. And on
    a quantum computer, what we’ve shown in some recent research, is that you can
    solve some of these problems in a matter of say, weeks, days, hours, seconds.
    —Krysta Svore, Microsoft Research
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Although this is an area of active research, Microsoft has released quantum
    computing development tools and programming language for quantum algorithm development.
    Other areas of research include approximate computing, using less precision as
    well as allowing random small mistakes that can cancel out over time, to save
    energy and increase efficiency of computations. Many believe quantum computing
    has much potential to accelerate the development and application of AI, but the
    full power and potential is yet to be seen.
  prefs: []
  type: TYPE_NORMAL
- en: Limitations of Deep Learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Deep learning has led to many incredible advances in the application of AI.
    Deep neural networks work by transforming an input vector to a target output vector,
    a complicated transformation created simply through a series of simple transformations.
    With massive data and computing power, the relatively simple concept of neural
    network models can be used to effectively map between many inputs and outputs
    such as recognizing speech from audio snippets. We believe deep learning will
    continue to play a large role in the advancement of AI applications, but that
    we need to understand the limits and capabilities to apply the technology in the
    right scenarios and in appropriate ways.
  prefs: []
  type: TYPE_NORMAL
- en: Be Wary of Hype
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In fact, we should be careful not to overestimate the abilities of deep learning
    models. They do not learn abstract concepts or “understand” in a way that is relatable
    to humans. From an early age, humans are able to reason and maintain abstract
    models of the world, consider hypothetical situations, and make decisions through
    critical thinking. These neural networks importantly cannot reason or do long-term
    planning in this way and by themselves do not represent any type of general intelligence.
    After all, even if an algorithm can predict what an object is, that does not imply
    the algorithm actually understands the properties of the object, how it would
    interact with its environment, what it is used for, or where it came from. So,
    although computers can learn from massive data to distinguish between different
    types of birds better than humans, for example, humans are still far superior
    at extrapolation, interpretation, and inference, such as understanding a complex
    scene.
  prefs: []
  type: TYPE_NORMAL
- en: Similarly, in natural language processing, humans are able to understand nuances
    in aspects such as word ordering and context, whereas neural network models struggle
    to understand broader abstract concepts and contextual information that can be
    useful to understanding language. For example, when someone says, “The couch will
    not fit through the door, as it’s too big,” it is obvious to a human that “it”
    refers to the couch as we understand the concepts of couch and door and that the
    statement would not make sense if “it” referred to the door. Although there have
    been many advancements in using sequences of words and broader associations between
    words in language models, they still do not learn in the same way as humans.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: Deep learning is an incredibly powerful technique, but we believe it will not
    lead to artificial general intelligence by itself. Deep learning also has limitations—such
    as inability to understand higher level concepts—of which developers of AI applications
    should be cognizant.
  prefs: []
  type: TYPE_NORMAL
- en: Limits on Ability to Generalize
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As stated by Chollet (2017), “Models can only perform local generalization,
    adapting to new situations that must stay very close from past data, while human
    cognition is capable of extreme generalization, quickly adapting to radically
    novel situations, or planning for long-term future situations.” In fact, there
    might often be less to the accuracy of the models than we actually attribute to
    them; for instance, Ribeiro, Singh, and Guestrin (2016) found that the model was
    able to distinguish between wolves and dogs because of the white snow patches
    in the background of wolf images, not because it actually understood the difference
    between them. Jo and Bengio (2017) also provided quantitative evidence that deep
    CNNs do not learn higher level abstract concepts, but rather surface statistical
    regularities. They showed that CNNs trained with one class of Fourier image statistics
    but validated on different types of Fourier image statistics showed up to a 28
    percent gap in accuracy, even though perceptually to a human they are not far
    off the original unfiltered data set.
  prefs: []
  type: TYPE_NORMAL
- en: This limitation of deep learning models to understand abstract or fully realized
    representations of concepts is well-illustrated in a recent trend in deep learning
    around both the creation as well as aim to defend against adversarial examples,
    synthetic examples that are created by modifying an input image in a particular
    fashion such that it makes the model believe the image belongs to another class
    with high confidence, as illustrated in Figure [3-4](#Fig4). It is very straightforward
    to create adversarial examples that are undetectable to the human eye—the equivalent
    of optical illusions that fool humans, only for a computer. There has been significant
    recent research on defending from adversarial examples, trying to make a model
    or algorithm robust such that these types of perturbations do not fool the model.
    As of early 2018, there are still no robust defenses to adversarial attacks, and
    research has only shown how robust adversarial attacks can be, even in the physical
    world. For instance, some adversarial examples can even be printed out on standard
    paper, photographed with a smartphone, and continue to fool the model (Kurakin,
    Goodfellow, & Bengio, 2016).
  prefs: []
  type: TYPE_NORMAL
- en: '![A463582_1_En_3_Fig4_HTML.jpg](A463582_1_En_3_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-4
  prefs: []
  type: TYPE_NORMAL
- en: Example adversarial examples. With slight changes to the pixel values (often
    unnoticeable to the human eye), the model can be tricked to incorrectly classify
    the quail as other objects, such as a desktop computer or a bath towel.
  prefs: []
  type: TYPE_NORMAL
- en: Data Hungry Models, Especially Labels
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Deep learning models also are limited by the vast amount of data that is required
    to train the network. This is especially made difficult by the requirement for
    high-quality, curated labels from which the model can learn. Although techniques
    such as transfer learning and word embeddings as mentioned earlier are able to
    somewhat alleviate this problem in some contexts, deep learning is not able to
    learn from explicit definitions or complete many types of tasks that are not simple
    input to output pairings. Although incredibly powerful, it is clear that deep
    learning alone is not a solution for artificial general intelligence. As another
    example, deep learning even struggles to represent a basic sorting algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: Many of these limitations of deep learning are actually limitations of ML algorithms
    in general, such as the inability to inherently distinguish correlation from causation.
    After all, deep learning is simply a statistical technique that excels at optimizing
    a mapping from an input to an output. However, unlike some simpler methodologies,
    explaining the solutions of deep neural networks can be extremely difficult. Engineering
    the network as needed can also be quite hard, such as trying to debug when something
    goes wrong or when one wants to tune a specific aspect of the modeling results.
    Although deep learning has many limits and is just one tool that can be used among
    many, we believe that deep learning will serve as a stepping stone to many future
    advances in AI, as we discuss later.
  prefs: []
  type: TYPE_NORMAL
- en: Reproducible Research and Underlying Theory
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: With the rise in popularity of deep learning, the number of research papers
    has increased dramatically every year. Recently, researchers have begun raising
    more concerns about the reproducibility of these papers, for example, when code
    is not released or specific details that are important to reproduce the result
    are not included. This is exacerbated by the lack of theoretical understanding
    about how to best develop these type of networks as well as optimize them, in
    addition to how many of the papers in the field require vast computing resources
    to reproduce. In practice, overfitting is common and very different results can
    be obtained depending on the type of evaluation method and split of the data.
  prefs: []
  type: TYPE_NORMAL
- en: Rahimi recently brought this issue of lack of theoretical underpinning to light
    in his December 2017 NIPS talk “Machine Learning Has Become Alchemy.” His point
    was that we lack clear theoretical explanations of why deep learning works and
    how to understand when it does not, often called the black box problem. An example
    exception is the idea of information bottleneck, which posits a network gets rid
    of the noisy extraneous details like squeezing the information through a bottleneck,
    and only the features that are relevant to general concepts are retained (Tishby
    & Zaslavsky, 2015). Others have also cautioned that theory in general often lags
    behind empirical results and that being too cautious has the risk of leading to
    another “AI Winter,”[¹](#Fn1) when instead continued research into how models
    can be used to solve real problems can propel us forward.
  prefs: []
  type: TYPE_NORMAL
- en: Nonetheless, it is clear that deep learning works for many applications in practice
    and is a useful tool for practitioners, and we need to understand both its usefulness
    and its weaknesses so that AI can continue bringing more value to society in the
    future. We believe the more open the community can be, in terms of publishing
    code associated with research as well as data when possible, the more it will
    help the field progress forward.
  prefs: []
  type: TYPE_NORMAL
- en: 'Looking Ahead: What Can We Expect from Deep Learning?'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Although acknowledging deep neural networks are a statistical methodology with
    many limits, we are optimistic that deep neural networks will be used as a foundational
    building block within an increasing number of more sophisticated methodologies
    that will emerge over time. The use of dynamic networks, for example, which uses
    deep neural networks but allows the networks to change dynamically as a function
    of the data fed into the model over time, has risen recently.[²](#Fn2) The combination
    of deep neural networks embedded within reinforcement learning systems has also
    solved increasingly complex problems. LeCun (2018) suggested that “differentiable
    programming” should be the rebranding of deep learning to mark the transformation
    toward a new type of software that is differentiable and optimizable. Karpathy
    (2017) suggested that “[n]eural networks are not just another classifier, they
    represent the beginning of a fundamental shift in how we write software … they
    are Software 2.0.”.
  prefs: []
  type: TYPE_NORMAL
- en: We expect research will continue to propel the practicality of deep learning
    forward, such as potential breakthroughs in optimizing neural network architectures
    as discussed earlier. Some areas of research are also still largely unsolved,
    such as the ability to learn from unlabeled data, also known as unsupervised learning,
    where there is much room for innovation. Additionally, we expect more work to
    focus on program synthesis and graph networks, as well as more applications of
    adversarial networks.
  prefs: []
  type: TYPE_NORMAL
- en: Ethics and Regulations
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Finally, it is clear that there are ethical concerns, around aspects such as
    bias, security, privacy, and appropriate use of deep learning and AI technologies.
    These ethical considerations will start to increasingly affect the development
    of AI systems as laws and regulations are enacted to constrain the impact of these
    systems. As mentioned earlier, for example, deep learning systems today are vulnerable
    to adversarial examples, even in the physical world, which poses a security risk.
    Then besides the security implications, there are ethical considerations around
    bias as well.
  prefs: []
  type: TYPE_NORMAL
- en: Bias in AI and ML algorithms is typically described and studied in terms of
    statistical bias, a mathematical construct to describe the difference between
    an expected value and the true value of the parameter being estimated. Depending
    on the type of model, bias can be introduced in different ways. But even when
    a system is not mathematically biased, it can be biased in the popular culture’s
    interpretation of the word.
  prefs: []
  type: TYPE_NORMAL
- en: The popular culture definition of bias is normally associated with some form
    of prejudice or preferential treatment toward a particular group. This is usually
    felt to be unfair. It should be noted that fairness is culturally defined and
    varies throughout history. Therefore, unfairness is really in the application
    of bias. The tricky part about this is that people normally assume that computers
    will be unbiased, and that the outcomes made from mathematical models will be
    fairer than those made by humans. By their very nature, though, deep learning
    models will display some bias in this sense of the word, because the driving force
    in them is the real-world data on which these models are built. Unfortunately,
    these true historical data are rooted with bias.
  prefs: []
  type: TYPE_NORMAL
- en: For some applications of deep learning where there are high-stakes outcomes
    such as hiring or loan applications, it is clear that this can have very detrimental
    effects. Take, for example, the use of word embeddings that represent words in
    a lower dimensional space. It is clear that word embeddings are biased, an example
    being word embeddings trained on Google News articles. These word embeddings have
    biased embedded relationships between words that can be extracted very easily
    such as “man is to computer programmer as women is to homemaker” (Bolukbasi, Chang,
    Zou, Saligrama, & Kalai, 2016). This can have detrimental effects on applications
    of deep learning with word embeddings when applied without consideration of these
    type of issues. For example, recruiters are increasingly using algorithms to automatically
    match resumes to job openings. If word embeddings are applied blindly within this
    process, however, and historical data favors that “successful” people in the role
    were mostly men, the outcomes of this process can be argued to be detrimental.
    O’Neil (2016), in her book Weapons of Math Destruction, outlined many ways in
    which algorithms can be used to a detrimental effect in the era of big data, and
    it is important to be cognizant of the potential for harm.
  prefs: []
  type: TYPE_NORMAL
- en: Unfortunately, bias can be difficult to detect and remove. In 2015 as another
    example, a photo application improperly labeled a dark-skinned person as a “gorilla,”
    which prompted a quick and immediate apology. Had the company been aware of this,
    they surely would not have deployed this technology. AI and ML predictive modeling
    is inherently more difficult to test than traditional software applications, however.
    After all, in a classical software system, an input will generate a known output,
    but this is not true for AI-based systems. AI-based systems are evaluated based
    on their statistical results and these results can often change from one run of
    the data to the next. Unless adequate testing methodologies for AI-based systems
    are developed, deploying AI-based systems could encounter major roadblocks to
    deployment.
  prefs: []
  type: TYPE_NORMAL
- en: Not only are there ethical and cultural issues, but there are a host of legal
    implications as well. Fortunately, bias in ML applications has become increasingly
    discussed in both the research and industry communities. However, it is important
    to recognize that technological advances alone will not solve the problem; there
    is no one-size-fits-all solution to this. Testing of AI models and development
    of fair systems will undoubtedly require an interdisciplinary approach to achieve
    the goal of building safe, widely distributed AI.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter discussed some of the trends in the deep learning space, such as
    the search for optimal network architectures both for accuracy as well as speed.
    We also went through two recent exciting developments in neural networks for computer
    vision, the first tackling the limitations of CNNs through capsule networks and
    the other using neural networks to try and define optimal architectures with minimal
    human intervention with automated ML techniques.
  prefs: []
  type: TYPE_NORMAL
- en: We discussed several other trends in deep learning, including more specialized
    hardware as well as the use of pretrained models to seed solutions with fewer
    data than required to build a deep learning solution from scratch. We finally
    discussed some limitations of deep learning of which developers should be cognizant,
    such as the inability of these models to understand abstract concepts, as well
    as some of the legal and ethical concerns, including adversarial examples and
    bias in models from the underlying data on which they are built.
  prefs: []
  type: TYPE_NORMAL
- en: Next Chapter [4](A463582_1_En_4_Chapter.html) describes how you can use the
    tools, infrastructure, and services on the Microsoft AI Platform to manage the
    development life cycle of your deep learning projects and models, to train at
    scale, and to operationalize it quickly as web APIs.
  prefs: []
