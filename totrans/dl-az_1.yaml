- en: Lighthill released a report in 1973 that suggested AI was a failure and too
    superficial to be used in practice, leading to a massive reduced interest in the
    field.
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: Lighthill于1973年发布了一份报告，建议人工智能是一个失败，过于肤浅以至于无法用于实践，导致对该领域兴趣的大幅减少。
