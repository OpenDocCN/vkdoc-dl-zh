- en: Some preprocessing, such as structuring the data by some measure of time, aggregating
    data points as needed, and joining different tables together that are relevant
    to whether a customer churns or not, is completed on the raw input data. This
    is followed by feature engineering to create representations of these customer
    data to feed into the model, such as creating a feature that represents the length
    of time with the telco, which is found based on the date the customer signed up
    for service. Creating a relevant representation of the data is very important
    for the ML model to be able to discern the patterns within the data, and is usually
    heavily guided by domain knowledge, as illustrated in Figure [1-2](#Fig2), for
    example.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在原始输入数据上完成了一些预处理，例如通过时间的一些度量来结构化数据，根据需要聚合数据点，以及将与客户是否流失相关的不同表连接起来。这之后是特征工程，以创建这些客户数据的表示，以便输入到模型中，例如创建一个表示与电信公司服务期限的特征，这个特征是基于客户注册服务日期找到的。创建相关数据表示对于机器学习模型能够识别数据中的模式非常重要，通常会受到领域知识的强烈指导，如图
    [1-2](#Fig2) 所示，例如。
- en: '![A463582_1_En_1_Fig2_HTML.jpg](A463582_1_En_1_Fig2_HTML.jpg)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![A463582_1_En_1_Fig2_HTML.jpg](A463582_1_En_1_Fig2_HTML.jpg)'
- en: Figure 1-2
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-2
- en: The representation of data is very important; for example, examining the sign-up
    date at any given point in time might reveal little relationship to the probability
    of churn within 30 days, but examining the length in the contract at that point
    in time might reveal a strong relationship in that individuals are more likely
    to churn within 30 days if they have been in the contract for a longer period
    of time
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 数据表示非常重要；例如，检查任何给定时间点的注册日期可能对 30 天内流失的概率关系不大，但检查该时间点的合同期限可能揭示出强烈的关联，即如果个人在合同中待的时间更长，他们更有可能在
    30 天内流失。
- en: Then historical outcomes, a label of which customers churned or not within a
    certain amount of time, for example, would be matched to these data and used for
    the training process of the supervised ML algorithm , as shown in Table [1-2](#Tab2).
    Applying the trained model to a hold-out set of test data to understand how well
    it will generalize to new customers, the model would be evaluated based on how
    well it predicted the historical churn outcomes. After iterating on the preprocessing,
    feature engineering, and model selection process of trying different models to
    find the optimal pipeline, this would then be applied to new raw customer telco
    data to predict which customers are likely to churn in the future.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，将历史结果，即客户在一定时间内是否流失的标签，与这些数据匹配，并用于监督机器学习算法的训练过程，如表 [1-2](#Tab2) 所示。将训练好的模型应用于保留的测试数据集，以了解它将如何推广到新客户，模型将根据其预测历史流失结果的好坏进行评估。在迭代预处理、特征工程和模型选择过程，尝试不同的模型以找到最佳流程后，然后将此应用于新的原始客户电信数据，以预测哪些客户未来可能流失。
- en: Table 1-2
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 表 1-2
