  prefs: []
  type: TYPE_NORMAL
- en: '[PRE29]'
  prefs: []
  type: TYPE_PRE
- en: Randomly Flip Image Up to Down
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Since the transformation is random, the image isn’t always flipped up to down:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE30]'
  prefs: []
  type: TYPE_PRE
- en: Flip Image Up to Down
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
