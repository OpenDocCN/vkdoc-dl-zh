  prefs: []
  type: TYPE_NORMAL
- en: '[PRE57]'
  id: totrans-246
  prefs: []
  type: TYPE_PRE
  zh: '[PRE57]'
- en: Create a multilayer CNN as shown in Listing [2-10](#PC59).
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE58]'
  id: totrans-248
  prefs: []
  type: TYPE_PRE
  zh: '[PRE58]'
- en: We could have used the same model as the one in the previous section, but we
    used a slightly different one to see what would happen. We used one less convolutional
    layer and applied softmax to model outputs.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
- en: Compile and Train the Model
  id: totrans-250
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Compile the model:'
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE59]'
  id: totrans-252
  prefs: []
  type: TYPE_PRE
  zh: '[PRE59]'
- en: Since *softmax* activation is applied to the neurons coming into the output
    layer of our model, we **don’t** compile with *from_logits=True* for the loss
    metric. Softmax assigns decimal probabilities to each class in a multi-class problem
    that must add up to 1.0\. Adding this additional constraint can help training
    converge more quickly than it otherwise would.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
- en: 'Train the model:'
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE60]'
  id: totrans-255
  prefs: []
  type: TYPE_PRE
  zh: '[PRE60]'
- en: Without data augmentation, overfitting begins to occur in earnest after just
    a few epochs.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
- en: Augment Training Data
  id: totrans-257
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
