  type: TYPE_NORMAL
  zh: 在右上角菜单中点击*运行时*。
- en: Click *Change runtime type* from the drop-down menu.
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从下拉菜单中选择*更改运行时类型*。
- en: Choose *GPU* from the *Hardware accelerator* drop-down menu.
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从*硬件加速器*下拉菜单中选择*GPU*。
- en: Click *Save*.
  id: totrans-22
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击*保存*。
- en: 'Verify that the GPU is active:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 验证GPU是否处于活动状态：
- en: '[PRE1]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: If ‘/device:GPU:0’ is displayed, the GPU is active. If ‘..’ is displayed, the
    regular CPU is active.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 如果显示“/device:GPU:0”，则GPU处于活动状态。如果显示“..”，则常规CPU处于活动状态。
- en: Note
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: If you get the error **NAME ‘TF’ IS NOT DEFINED**, re-execute the code to import
    the TensorFlow library!
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你遇到错误**“名称‘TF’未定义”**，请重新执行代码以导入TensorFlow库！
- en: Augment with a Keras API
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用Keras API进行增强
- en: In the previous chapter, we experienced overfitting when modeling the flowers
    dataset. The issue in that chapter is that validation accuracy was low with respect
    to training accuracy. Let’s see if we can mitigate that issue using a Keras API
    for data augmentation.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一章中，我们在对花朵数据集建模时遇到了过拟合问题。那一章的问题在于验证准确率相对于训练准确率较低。让我们看看我们是否可以使用Keras API进行数据增强来减轻这个问题。
- en: Get Data
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 获取数据
- en: 'First, you’ll want to get the data again. Do that by executing the following
    code, which retrieves the same flowers data as was used in Chapter [1](512350_1_En_1_Chapter.xhtml):'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，你将想要再次获取数据。通过执行以下代码来实现，该代码检索与第[1](512350_1_En_1_Chapter.xhtml)章中使用相同的花朵数据：
- en: '[PRE2]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Split Data
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 分割数据
- en: The *tf.keras.preprocessing.image_dataset_from_directory* utility reads the
    data from a directory. The utility is also able to split, seed, resize, and batch
    the data.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '*tf.keras.preprocessing.image_dataset_from_directory*实用工具从目录中读取数据。该实用工具还能够分割、设置种子、调整大小和分批数据。'
- en: 'Set the parameters, and as a starting point, try the following three values:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 设置参数，并且作为一个起点，尝试以下三个值：
- en: '[PRE3]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Batch size is set to 32\. We set batch size to 32, but feel free to experiment
    with different sizes. Since images have different shapes, we must resize them
    for model consumption. We chose 180 × 180, but feel free to experiment with different
    image sizes. But be sure to keep height and width the same.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 批量大小设置为32。我们设置了32的批量大小，但你可以自由地尝试不同的尺寸。由于图像形状不同，我们必须调整它们以供模型使用。我们选择了180 × 180，但你可以自由地尝试不同的图像大小。但请确保高度和宽度相同。
- en: Note
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Setting batch and image sizes is not a science. The task requires experimentation.
    From our research, a good starting point for batch size is 32 or 64\. Any value
    smaller than 32 slows learning. Any value larger than 64 is computationally expensive.
    The idea is to fit a batch of data entirely in memory. Since computer memory comes
    with a storage capacity in the power of two, it is recommended to keep batch size
    a power of two. Smaller image sizes speed learning, but preserve less of the original
    image. So model performance is negatively impacted. Larger image sizes preserve
    more of the original image. So model performance is positively impacted at the
    expense of computational resources.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 设置批量和图像大小不是一门科学。这项任务需要实验。根据我们的研究，批量大小的良好起点是32或64。任何小于32的值都会减慢学习速度。任何大于64的值都会增加计算成本。理想的情况是将一批数据完全放入内存中。由于计算机内存的存储容量是2的幂，建议将批大小设置为2的幂。较小的图像大小可以加快学习速度，但会保留较少的原始图像。因此，模型性能会受到影响。较大的图像大小可以保留更多的原始图像。因此，模型性能会得到提升，但会牺牲计算资源。
- en: Load Images Off Disk into Train and Test Sets
  id: totrans-40
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 将磁盘上的图像加载到训练集和测试集中
- en: 'Now create the train and test datasets. It’s common practice to split data
    into these two set types. Begin with the training set and create it as follows:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 现在创建训练集和测试集。将数据分割成这两种类型是常见的做法。从训练集开始，创建它如下：
- en: '[PRE4]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Set *validation_split=0.19* and *subset='training'* to get 81% of the data into
    the train set. Set *image size* to the sizes we establish to resize images. Also
    set the seed and batch values.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 将*validation_split=0.19*和*subset='training'*设置为将81%的数据放入训练集。将*图像大小*设置为已确定的尺寸以调整图像大小。同时设置种子和批值。
- en: 'Create the test set:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 创建测试集：
- en: '[PRE5]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Set *validation_split=0.19* and *subset='validation'* to get 19% of the data
    into the test set. Set *image size* to the sizes we establish to resize images.
    Also set the seed and batch values.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 设置 *validation_split=0.19* 和 *subset='validation'* 以将19%的数据放入测试集。设置 *image size*
    为我们设定的图像大小。同时设置种子和批次值。
- en: Inspect the Training Set
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 检查训练集
- en: 'Take an example batch and display image shape and label:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 以一个示例批次为例，显示图像形状和标签：
- en: '[PRE6]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: As expected, we have 32 180 × 180 × 3 images in the first batch. The *3* value
    means that images are RGB color. We also have 32 corresponding labels. We have
    32 images and 32 corresponding labels because we set batch size to 32.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 如预期，第一个批次中有32张180 × 180 × 3的图像。*3* 的值表示图像是RGB颜色。我们还有32个相应的标签。我们有32张图像和32个相应的标签，因为我们设置了批次大小为32。
- en: Get Number of Classes
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 获取类别数量
- en: 'Use the *class_names* method from the utility to display the number of class
    labels:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 使用实用工具的 *class_names* 方法显示类别标签的数量：
- en: '[PRE7]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Create a Scaling Function
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建缩放函数
- en: 'Create a function to scale feature images:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个用于缩放特征图像的函数：
- en: '[PRE8]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Build the Input Pipeline
  id: totrans-57
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建输入管道
- en: 'Scale training and test data. Learning models train faster on smaller images.
    An input image that is twice as large requires a network to learn from four times
    as many pixels – and that extra training time adds up. Only shuffle training data.
    Cache and prefetch training and test data to improve model performance:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 缩放训练和测试数据。学习模型在较小的图像上训练速度更快。一个两倍大小的输入图像需要网络从四倍数量的像素中学习——而这额外的训练时间会累积。仅对训练数据进行洗牌。缓存和预取训练和测试数据以改进模型性能：
- en: '[PRE9]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Note
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Since training and test data have already been batched by the utility, *do not*
    batch when building the input pipeline!
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 由于训练和测试数据已经被工具批处理，构建输入管道时*不要*进行批处理！
- en: Data Augmentation with Preprocessing Layers
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 带预处理层的数据增强
- en: Apply data augmentation with experimental Keras preprocessing layers. The *Keras
    preprocessing layers API* allows developers to build Keras-native input processing
    pipelines. So TensorFlow models can accept raw images or raw structured data as
    input, handle feature normalization, and feature value indexing on their own.
    Simply, the Keras API makes it much easier to input, preprocess, and model raw
    data.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 使用实验性Keras预处理层应用数据增强。*Keras预处理层API* 允许开发者构建Keras本地的输入处理管道。因此，TensorFlow模型可以接受原始图像或原始结构化数据作为输入，并自行处理特征归一化和特征值索引。简单来说，Keras
    API使得输入、预处理和模型原始数据变得更加容易。
- en: We begin by importing requisite libraries and create a simple augmentation model.
    We can include the preprocessing layers inside a model like other layers.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先导入所需的库并创建一个简单的增强模型。我们可以像其他层一样在模型中包含预处理层。
- en: Let’s augment images by randomly flipping horizontally, rotating, zooming, and
    translating as shown in Listing [2-1](#PC11).
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过随机水平翻转、旋转、缩放和平移来增强图像，如列表 [2-1](#PC11) 所示。
- en: '[PRE10]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Note
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Keras preprocessing layers are experimental, which means that the operation
    may change in the future.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: Keras预处理层是实验性的，这意味着操作可能会在未来发生变化。
- en: We flip images left to right, randomly rotate by a factor of 0.1 (or 10%), randomly
    zoom by a factor of 0.1 (or 10%), and randomly translate by varying height and
    width by factors of 0.2 (or 20%), respectively. The choice of layers and parameter
    value settings was conducted through trial and error experimentations. So feel
    free to experiment with other augmentations.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将图像左右翻转，随机以0.1（或10%）的因子旋转，随机以0.1（或10%）的因子缩放，并分别以0.2（或20%）的因子随机平移高度和宽度。层的选择和参数值设置是通过试错实验完成的。所以请随意尝试其他增强方式。
- en: For more information on Keras experimental preprocessing layers, peruse
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 更多关于Keras实验性预处理层的信息，请参阅
- en: '[`www.tensorflow.org/api_docs/python/tf/keras/layers/experimental/preprocessing`](https://www.tensorflow.org/api_docs/python/tf/keras/layers/experimental/preprocessing)'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '[`www.tensorflow.org/api_docs/python/tf/keras/layers/experimental/preprocessing`](https://www.tensorflow.org/api_docs/python/tf/keras/layers/experimental/preprocessing)'
- en: Display an Augmented Image
  id: totrans-72
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 显示增强图像
- en: Here is what happens when applying data augmentation to the same image several
    times as shown in Listing [2-2](#PC12).
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 这里展示了将数据增强应用于同一图像多次的情况，如列表 [2-2](#PC12) 所示。
- en: '[PRE11]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: We display augmentation on the first image with index of 0\. Change the index
    to see other images being augmented. But keep the index value between 0 and 31
    to account for the batch size of 32.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 我们显示第一个图像（索引为0）的增强效果。更改索引以查看其他被增强的图像。但请保持索引值在0到31之间，以考虑到32个图像的批次大小。
- en: Create the Model
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建模型
- en: 'Clear previous models and generate a seed for reproducibility:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 清除之前的模型并生成一个种子以实现可重复性：
- en: '[PRE12]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'Import requisite libraries for data modeling:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 导入数据建模所需的库：
- en: '[PRE13]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Build a multilayered CNN as shown in Listing [2-3](#PC15).
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 按照图 [2-3](#PC15) 所示构建多层CNN。
- en: '[PRE14]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Notice that the first layer is the data augmentation that we built!
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，第一层就是我们构建的数据增强！
- en: Compile and Train the Model
  id: totrans-84
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编译和训练模型
- en: 'Compile with SparseCategoricalCrossentropy(from_logits=True):'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 SparseCategoricalCrossentropy(from_logits=True) 编译：
- en: '[PRE15]'
  id: totrans-86
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: We set *from_logits=True* in the loss function because we don’t use softmax
    activation to normalize neuron input into the output layer of the model. Softmax
    turns logits into probabilities by taking the exponents of each output and normalizing
    each number by the sum of those exponents so the entire output vector adds up
    to one. So all probabilities should add up to one. **Logits** are the numeric
    output of the last linear layer of a multi-class classification neural network.
    Since we don’t use softmax, we inform the compiler to output logits.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在损失函数中设置 *from_logits=True*，因为我们不使用softmax激活来归一化神经元的输入到模型的输出层。Softmax通过取每个输出的指数并按这些指数的总和归一化每个数字，将logits转换为概率，使得整个输出向量的和为1。所以所有概率的总和应该为1。**Logits**是多类分类神经网络最后线性层的数值输出。由于我们不使用softmax，我们通知编译器输出logits。
- en: 'Train the model:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 训练模型：
- en: '[PRE16]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Overfitting is mitigated compared with what we experienced without augmentation
    in the previous chapter. That is, test accuracy is more closely aligned with train
    accuracy.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 与我们在前一章中没有增强时遇到的情况相比，过度拟合得到了缓解。也就是说，测试准确率与训练准确率更加接近。
- en: Visualize Performance
  id: totrans-91
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可视化性能
- en: Let’s see the impact of data augmentation with a visualization as shown in Listing
    [2-4](#PC18).
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过图示来观察数据增强的影响，如图 [2-4](#PC18) 所示。
- en: '[PRE17]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Notice that overfitting is mitigated to a large extent for the model we trained
    for ten epochs. So data augmentation improved performance.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，对于训练了十个周期的模型，过度拟合在很大程度上得到了缓解。因此，数据增强提高了性能。
- en: Apply Augmentation on Images
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在图像上应用增强
- en: In the previous section, we added Keras preprocessing layers to a neural network
    to augment. An alternative method is to apply data augmentation transformations
    directly on images and then feed them to a neural network *without* Keras preprocessing
    layers.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一节中，我们向神经网络添加了Keras预处理层以进行增强。另一种方法是直接在图像上应用数据增强变换，然后将它们馈送到没有Keras预处理层的神经网络。
- en: In this section, we begin by demonstrating a variety of transformations that
    can be performed on an image. We grab a batch of data from the preprocessed tensors
    created in the previous section and demonstrate each transformation technique.
    After demonstrating how to apply various transformations on images, we continue
    by using a few of these techniques on images and training a model with these augmented
    images.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们首先演示了可以在图像上执行的各种变换。我们从上一节中创建的预处理张量中抓取一批数据，并演示每种变换技术。在演示了如何在图像上应用各种变换后，我们继续使用这些技术中的几个对图像进行操作，并使用这些增强图像训练模型。
- en: 'Let’s begin by grabbing an example image from the train set we just created:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从抓取我们刚刚创建的训练集中的一个示例图像开始：
- en: '[PRE18]'
  id: totrans-99
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Since we already have available preprocessed tensors from the previous section,
    we grab the first batch of these images from the pipelined training set. Now,
    we have a batch of 32 images with which to play contained in *batch_images*. We
    begin by showing you how to work with the images in the batch.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们已经在上一节中有了可用的预处理的张量，我们从流水线训练集中抓取了这些图像的第一批次。现在，我们有一个包含在 *batch_images* 中的32张图像的批次，我们可以用这些图像进行操作。我们首先向您展示如何处理批次中的图像。
- en: Set an Index Variable
  id: totrans-101
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 设置索引变量
- en: 'Since batch size is 32, set the value of the index between 0 and 31:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 由于批次大小为32，将索引值设置为0到31之间的值：
- en: '[PRE19]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: We set the index to 0 to get the first image from the batch. Feel free to change
    the index value. But keep in mind that the index value must be between 0 and 31!
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将索引设置为0以获取批次中的第一张图像。请随意更改索引值。但请注意，索引值必须在0到31之间！
- en: Set an Image
  id: totrans-105
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 设置一个图像
- en: Set the index to grab the first image from the batch. Change the index value
    (between 0 and 31) to display different images.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 设置索引以从批次中抓取第一张图像。更改索引值（介于0到31之间）以显示不同的图像。
- en: 'Our image:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的图像：
- en: '[PRE20]'
  id: totrans-108
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: Show an Example
  id: totrans-109
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 展示一个示例
- en: 'Visualize the first image:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化第一张图像：
- en: '[PRE21]'
  id: totrans-111
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: Create Functions to Show Images
  id: totrans-112
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建显示图像的函数
- en: Create a visualization function to show the original image and modified image
    as shown in Listing [2-5](#PC23).
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个可视化函数来显示原始图像和修改后的图像，如图 [2-5](#PC23) 所示。
- en: '[PRE22]'
  id: totrans-114
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: Create a visualization function to show several transformations of an image
    as shown in Listing [2-6](#PC24).
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个可视化函数来显示图像的几种变换，如列表 [2-6](#PC24) 所示。
- en: '[PRE23]'
  id: totrans-116
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: Crop an Image
  id: totrans-117
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 裁剪图像
- en: To crop an image, remove or adjust its outside edges.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 要裁剪图像，请移除或调整其外部边缘。
- en: 'Crop the image:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 裁剪图像：
- en: '[PRE24]'
  id: totrans-120
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: The operation slices a *shape size* portion out of the image at a uniformly
    chosen offset. In this case, the new image size is 120 × 120.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 此操作从图像中均匀选择的偏移量中切出一个 *形状大小* 部分。在这种情况下，新图像的大小是 120 × 120。
- en: 'Show the original image and modified image:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 显示原始图像和修改后的图像：
- en: '[PRE25]'
  id: totrans-123
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: 'Since the transformation is random, show multiple images:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 由于变换是随机的，显示多个图像：
- en: '[PRE26]'
  id: totrans-125
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: We show random crops with this visualization. Notice that each image is cropped
    a bit differently because the API produces crops randomly.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用此可视化显示了随机裁剪。请注意，由于 API 随机生成裁剪，每个图像的裁剪方式略有不同。
- en: 'Centrally crop the image:'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 中心裁剪图像：
- en: '[PRE27]'
  id: totrans-128
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: The operation reduces image size by half and centrally crops it. That is, it
    removes background noise and ensures that the remaining image pixels are centered.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 此操作将图像大小减半并中心裁剪。也就是说，它移除了背景噪声，并确保剩余的图像像素居中。
- en: 'Crop to a bounding box:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 裁剪到边界框：
- en: '[PRE28]'
  id: totrans-131
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: The operation crops an image to a specified bounding box.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 此操作将图像裁剪到指定的边界框。
- en: A **bounding box** is an area in a pixel image defined by two longitudes and
    two latitudes. Each latitude is a decimal value between –90.0 and 90.0\. Each
    longitude is a decimal value between –180.0 and 180.0.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: '**边界框**是像素图像中的一个区域，由两个经度和两个纬度定义。每个纬度是介于 –90.0 和 90.0 之间的十进制值。每个经度是介于 –180.0
    和 180.0 之间的十进制值。'
- en: Randomly Flip Image Left to Right
  id: totrans-134
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 随机翻转图像左右
- en: 'Since the transformation is random, the image isn’t always flipped left to
    right:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 由于变换是随机的，图像不总是左右翻转：
- en: '[PRE29]'
  id: totrans-136
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: Randomly Flip Image Up to Down
  id: totrans-137
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 随机翻转图像上下
- en: 'Since the transformation is random, the image isn’t always flipped up to down:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 由于变换是随机的，图像不总是上下翻转：
- en: '[PRE30]'
  id: totrans-139
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: Flip Image Up to Down
  id: totrans-140
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 将图像上下翻转
- en: 'The image is always flipped up to down:'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 图像总是上下翻转：
- en: '[PRE31]'
  id: totrans-142
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: Rotate Image 90 Degrees
  id: totrans-143
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 旋转图像 90 度
- en: 'Rotate the image 90° by setting *k=1*:'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 通过设置 *k=1* 旋转图像 90°：
- en: '[PRE32]'
  id: totrans-145
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: The *k* argument is the number of times the image is rotated by 90 degrees.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: '*k* 参数是图像旋转 90 度的次数。'
- en: 'Rotate the image 180° by setting *k=2*:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 通过设置 *k=2* 旋转图像 180°：
- en: '[PRE33]'
  id: totrans-148
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: 'Rotate the image 270° by setting k=3:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 通过设置 k=3 旋转图像 270°：
- en: '[PRE34]'
  id: totrans-150
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: If we set k=4, we’re back where we started because it rotates the image 360°!
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们设置 k=4，我们就回到了起点，因为这将图像旋转 360°！
- en: Adjust Gamma
  id: totrans-152
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 调整伽马
- en: '**Gamma encoding** is used to optimize the usage of bits when encoding an image
    by taking advantage of the nonlinear manner that humans perceive light and color.
    Human perception of brightness (or lightness) under common illumination conditions
    (neither pitch black nor blindingly bright) follows an approximate power function
    with greater sensitivity to relative differences between darker tones than between
    lighter tones. Simply, gamma encoding can be thought of as the intensity of an
    image.'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: '**伽马编码**通过利用人类对光和颜色的非线性感知方式来优化编码图像时位的使用。在常见的照明条件下（既不是漆黑一片也不是刺眼明亮），人类对亮度的感知（或亮度）遵循一个近似幂函数，对较暗色调之间的相对差异比较亮色调之间的相对差异更敏感。简单来说，伽马编码可以被视为图像的强度。'
- en: 'Adjust the image with gamma encoding:'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 使用伽马编码调整图像：
- en: '[PRE35]'
  id: totrans-155
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: Adjust gamma for brightness. For gamma less than 1, the image is brighter. For
    gamma greater than 1, the image is darker. Intensity is controlled by the *gain*
    argument. Experiment with the *gamma* and *gain* parameters to see the impact
    on the transformed image.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 调整伽马以调整亮度。伽马小于 1 时，图像更亮。伽马大于 1 时，图像更暗。强度由 *增益* 参数控制。通过实验 *伽马* 和 *增益* 参数来观察它们对变换图像的影响。
- en: Note
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Think of the gamma and gain values as knobs that can be adjusted to modify image
    appearance.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 将伽马和增益值视为可以调整以修改图像外观的旋钮。
- en: Adjust Contrast
  id: totrans-159
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 调整对比度
- en: '**Contrast** in image processing is the difference in luminance (or color)
    that makes an object distinguishable. It is determined by the difference in the
    color and brightness of the object and other objects within the same field of
    view.'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: '**对比度**在图像处理中是指使物体可区分的亮度（或颜色）差异。它取决于物体及其在同一视野内其他物体的颜色和亮度差异。'
- en: 'Fixed contrast:'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 固定对比度：
- en: '[PRE36]'
  id: totrans-162
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: Adjust the *contrast_factor* argument for more or less luminance. Experiment
    with the *contrast_factor* parameter to see its impact on the transformed image.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 调整 *contrast_factor* 参数以增加或减少亮度。通过实验 *contrast_factor* 参数来观察它对变换图像的影响。
- en: 'Random contrast:'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 随机对比度：
- en: '[PRE37]'
  id: totrans-165
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: Adjust lower and upper bounds to change the random contrast boundaries.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 调整上下限以改变随机对比度边界。
- en: Adjust Brightness
  id: totrans-167
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 调整亮度
- en: 'Fixed brightness:'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 固定亮度：
- en: '[PRE38]'
  id: totrans-169
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: Adjust the delta value to increase the value of the images’ pixels. So a delta
    of 0.25 adds 25% brightness to the image.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 调整 delta 值以增加图像像素的值。因此，delta 为 0.25 会给图像增加 25% 的亮度。
- en: 'Random brightness:'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 随机亮度：
- en: '[PRE39]'
  id: totrans-172
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: Adjust Saturation
  id: totrans-173
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 调整饱和度
- en: '**Saturation** in image processing is the depth or intensity of color present
    within an image. The more saturated an image, the more colorful and vibrant it
    appears. Less color saturation makes an image appear subdued or muted.'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: '**图像处理中的饱和度**是图像中存在的颜色的深度或强度。图像越饱和，看起来就越多彩和生动。较低的饱和度会使图像看起来压抑或暗淡。'
- en: 'Fixed saturation:'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 固定饱和度：
- en: '[PRE40]'
  id: totrans-176
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: Adjust the saturation factor to increase saturation. So a saturation factor
    of 3.0 triples the saturation of an image.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 调整饱和度因子以增加饱和度。因此，饱和度因子为 3.0 会将图像的饱和度增加三倍。
- en: 'Random saturation:'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 随机饱和度：
- en: '[PRE41]'
  id: totrans-179
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: Adjust lower and upper bounds to change the random saturation boundaries.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 调整上下限以改变随机饱和度边界。
- en: Hue
  id: totrans-181
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 色调
- en: '**Hue** is the main indication of a RGB color. It is the value that tells us
    whether an object is red, green, or blue. In contrast, saturation is the perceived
    intensity. So saturation is how colorful the object looks, while hue is the actual
    color.'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: '**色调**是 RGB 颜色的主要指示。它是告诉我们物体是红色、绿色还是蓝色的值。相比之下，饱和度是感知的强度。因此，饱和度是物体看起来有多色彩，而色调是实际的颜色。'
- en: 'Fixed hue:'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 固定色调：
- en: '[PRE42]'
  id: totrans-184
  prefs: []
  type: TYPE_PRE
  zh: '[PRE42]'
- en: 'Random hue:'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 随机色调：
- en: '[PRE43]'
  id: totrans-186
  prefs: []
  type: TYPE_PRE
  zh: '[PRE43]'
- en: Adjust the 0.2 parameter value to see its impact on the transformed image.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 调整 0.2 参数值以查看其对转换图像的影响。
- en: To see all possible data augmentation transformations, peruse
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 要查看所有可能的数据增强转换，请查阅
- en: '[`www.tensorflow.org/api_docs/python/tf/image/`](http://www.tensorflow.org/api_docs/python/tf/image/)'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: '[TensorFlow API 文档](http://www.tensorflow.org/api_docs/python/tf/image/)'
- en: For a general site for applying augmentation directly on images, peruse
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一个可以直接在图像上应用增强的一般网站，请查阅
- en: '[`https://towardsdatascience.com/tensorflow-image-augmentation-on-gpu-bf0eaac4c967`](https://towardsdatascience.com/tensorflow-image-augmentation-on-gpu-bf0eaac4c967)'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: '[TensorFlow 在 GPU 上的图像增强](https://towardsdatascience.com/tensorflow-image-augmentation-on-gpu-bf0eaac4c967)'
- en: Apply Transformations Directly on Images
  id: totrans-192
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 直接在图像上应用转换
- en: Now that we’ve covered several potential transformations, let’s see if we can
    improve training performance. We apply just a couple of transformations with pretty
    good results, but you can experiment with as many as you wish.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经讨论了几个潜在的转换，让我们看看我们是否可以提高训练性能。我们只应用了几个转换，效果相当不错，但你可以尝试你想要的任何数量。
- en: Create an Augmentation Function
  id: totrans-194
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 创建一个增强函数
- en: Create a function that randomly flips an image from left to right and applies
    a saturation operation to an image as shown in Listing [2-7](#PC45).
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数，随机翻转图像从左到右，并像清单 [2-7](#PC45) 中所示对图像应用饱和度操作。
- en: '[PRE44]'
  id: totrans-196
  prefs: []
  type: TYPE_PRE
  zh: '[PRE44]'
- en: With so many transformation options and little guidance that we could find,
    it is not easy to find the right mix. We tried many variations, but the preceding
    simple one worked the best for us. We encourage you to experiment with different
    transformations to see if you can improve learning.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们找到了很多转换选项和很少的指导，因此很难找到正确的组合。我们尝试了许多变体，但前面的简单一个对我们来说效果最好。我们鼓励你尝试不同的转换，看看你是否能提高学习效果。
- en: Display an Augmented Image
  id: totrans-198
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 显示增强图像
- en: Here is what happens when the *augment* function is applied to the same image
    several times as shown in Listing [2-8](#PC46).
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 如清单 [2-8](#PC46) 所示，当 *augment* 函数多次应用于同一图像时，会发生以下情况。
- en: '[PRE45]'
  id: totrans-200
  prefs: []
  type: TYPE_PRE
  zh: '[PRE45]'
- en: Build the Input Pipeline
  id: totrans-201
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 构建输入管道
- en: 'Build the pipeline for train and test data:'
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 构建训练和测试数据的管道：
- en: '[PRE46]'
  id: totrans-203
  prefs: []
  type: TYPE_PRE
  zh: '[PRE46]'
- en: Notice that we map the augment function only to training data. We add the *num_parallel*
    parameter for better performance during training.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，我们只将增强函数映射到训练数据。我们添加了 *num_parallel* 参数以在训练期间提高性能。
- en: Note
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Only augment training images! Training data is presented to a model to help
    it become more generalizable and robust. Test data is presented as new data to
    help evaluate a model.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 仅增强训练图像！训练数据被呈现给模型，以帮助模型变得更加通用和健壮。测试数据作为新数据呈现，以帮助评估模型。
- en: Create the Model
  id: totrans-207
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 创建模型
- en: 'Clear all previous models and generate a seed for reproducibility:'
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 清除所有之前的模型并为可重复性生成一个种子：
- en: '[PRE47]'
  id: totrans-209
  prefs: []
  type: TYPE_PRE
  zh: '[PRE47]'
- en: Create a multilayer CNN as shown in Listing [2-9](#PC49).
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个如清单 [2-9](#PC49) 所示的多层 CNN。
- en: '[PRE48]'
  id: totrans-211
  prefs: []
  type: TYPE_PRE
  zh: '[PRE48]'
- en: Notice that the model doesn’t have Keras preprocessing layers like the one in
    the previous section. Since we are directly augmenting images, we don’t need to
    add the Keras layers.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，该模型没有像上一节中那样的Keras预处理层。由于我们是直接增强图像，因此不需要添加Keras层。
- en: Compile and Train the Model
  id: totrans-213
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 编译和训练模型
- en: 'Compile with SparseCategoricalCrossentropy(from_logits=True):'
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 使用SparseCategoricalCrossentropy(from_logits=True)进行编译：
- en: '[PRE49]'
  id: totrans-215
  prefs: []
  type: TYPE_PRE
  zh: '[PRE49]'
- en: 'Train the model:'
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 训练模型：
- en: '[PRE50]'
  id: totrans-217
  prefs: []
  type: TYPE_PRE
  zh: '[PRE50]'
- en: Voilà. We mitigated overfitting! We used five epochs, but you can substitute
    any number of epochs you wish. More epochs require more memory. Since our dataset
    is not very large, memory is really not an issue. But with large datasets, memory
    can become an issue if you set the number of epochs really high.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 哇！我们减轻了过拟合！我们使用了五个周期，但你可以替换你想要的任何周期数。更多的周期需要更多的内存。由于我们的数据集不是很大，内存实际上并不是一个问题。但是，对于大型数据集，如果设置周期数过高，内存可能会成为一个问题。
- en: Data Augmentation with ImageGenerator
  id: totrans-219
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用ImageGenerator进行数据增强
- en: So far, we have presented two augmentation techniques. The first technique added
    Keras preprocessing layers to a model. The second one applied transformations
    directly on images and then fed them to a model. Both techniques built a tf.data
    pipeline to feed to a model.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经介绍了两种增强技术。第一种技术向模型添加了Keras预处理层。第二种技术直接对图像进行变换，然后将它们输入到模型中。两种技术都构建了tf.data管道以供模型使用。
- en: An alternative is to use the ImageGenerator class . The *ImageGenerator class*
    makes it easy to load images from disk and augment them in various ways. We can
    shift, rotate, rescale, flip horizontally or vertically, shear or apply transformation
    functions to images. Although ImageGenerator is very convenient for simple projects,
    building a tf.data pipeline is more conducive to complex projects because it can
    read images in parallel from any source (not just a local disk) and manipulate
    the dataset in any manner. Also, preprocessing functions based on tf.image operations
    can be used in the tf.data pipeline and in the model deployed to production.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个选择是使用ImageGenerator类。*ImageGenerator类*使从磁盘加载图像并以各种方式增强它们变得非常容易。我们可以平移、旋转、缩放、水平或垂直翻转、剪切或对图像应用变换函数。虽然ImageGenerator对于简单的项目非常方便，但构建tf.data管道更有利于复杂项目，因为它可以从任何来源（而不仅仅是本地磁盘）并行读取图像，并以任何方式操作数据集。此外，基于tf.image操作的预处理函数可以在tf.data管道和部署到生产的模型中使用。
- en: We don’t advocate one over the other. It depends on the task at hand. The ImageGenerator
    class is very easy to use. So it should be useful at the beginning stages of a
    project. The tf.data pipeline is optimized for parallel processing, so it would
    be a good choice for ongoing projects that require a lot of computing resources.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不提倡一种方法优于另一种方法。这取决于手头的任务。ImageGenerator类非常易于使用。因此，它应该适用于项目的初期阶段。tf.data管道针对并行处理进行了优化，因此对于需要大量计算资源的持续项目来说，它是一个不错的选择。
- en: For a great resource on this subject, peruse
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 关于这个主题的宝贵资源，请参阅
- en: '[`www.tensorflow.org/api_docs/python/tf/keras/preprocessing/image/ImageDataGenerator`](https://www.tensorflow.org/api_docs/python/tf/keras/preprocessing/image/ImageDataGenerator)'
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: '[`www.tensorflow.org/api_docs/python/tf/keras/preprocessing/image/ImageDataGenerator`](https://www.tensorflow.org/api_docs/python/tf/keras/preprocessing/image/ImageDataGenerator)'
- en: Process Flowers Data
  id: totrans-225
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 处理花卉数据
- en: The process is simpler than the previous techniques. Load the data directly
    from the flowers directory into training and test splits by utilizing dictionaries.
    The first dictionary provides scaling and splitting information to the ImageDataGenerator
    method within the ImageGenerator class. The second dictionary provides target
    and batch information to the method.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 该过程比之前的技术更简单。通过利用字典，直接从flowers目录加载数据到训练和测试分割。第一个字典为ImageGenerator类中的ImageDataGenerator方法的缩放和分割信息提供信息。第二个字典为方法提供目标和批量信息。
- en: 'Import the appropriate library:'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 导入适当的库：
- en: '[PRE51]'
  id: totrans-228
  prefs: []
  type: TYPE_PRE
  zh: '[PRE51]'
- en: 'Create a dictionary to scale and split the data:'
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个字典以缩放和分割数据：
- en: '[PRE52]'
  id: totrans-230
  prefs: []
  type: TYPE_PRE
  zh: '[PRE52]'
- en: Data is split 81% into training and 19% into testing.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 数据分为81%用于训练，19%用于测试。
- en: 'Create a dictionary to resize images, set batch size, and interpolate:'
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
