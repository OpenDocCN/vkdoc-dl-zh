- en: Compile and Train the Model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Compile with SparseCategoricalCrossentropy(from_logits=True):'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: We set *from_logits=True* in the loss function because we don’t use softmax
    activation to normalize neuron input into the output layer of the model. Softmax
    turns logits into probabilities by taking the exponents of each output and normalizing
    each number by the sum of those exponents so the entire output vector adds up
    to one. So all probabilities should add up to one. **Logits** are the numeric
    output of the last linear layer of a multi-class classification neural network.
    Since we don’t use softmax, we inform the compiler to output logits.
  prefs: []
  type: TYPE_NORMAL
- en: 'Train the model:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: Overfitting is mitigated compared with what we experienced without augmentation
    in the previous chapter. That is, test accuracy is more closely aligned with train
    accuracy.
  prefs: []
  type: TYPE_NORMAL
- en: Visualize Performance
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s see the impact of data augmentation with a visualization as shown in Listing
    [2-4](#PC18).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: Notice that overfitting is mitigated to a large extent for the model we trained
    for ten epochs. So data augmentation improved performance.
  prefs: []
  type: TYPE_NORMAL
- en: Apply Augmentation on Images
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In the previous section, we added Keras preprocessing layers to a neural network
    to augment. An alternative method is to apply data augmentation transformations
    directly on images and then feed them to a neural network *without* Keras preprocessing
    layers.
  prefs: []
  type: TYPE_NORMAL
- en: In this section, we begin by demonstrating a variety of transformations that
    can be performed on an image. We grab a batch of data from the preprocessed tensors
    created in the previous section and demonstrate each transformation technique.
    After demonstrating how to apply various transformations on images, we continue
    by using a few of these techniques on images and training a model with these augmented
    images.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s begin by grabbing an example image from the train set we just created:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: Since we already have available preprocessed tensors from the previous section,
    we grab the first batch of these images from the pipelined training set. Now,
    we have a batch of 32 images with which to play contained in *batch_images*. We
    begin by showing you how to work with the images in the batch.
  prefs: []
  type: TYPE_NORMAL
- en: Set an Index Variable
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Since batch size is 32, set the value of the index between 0 and 31:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: We set the index to 0 to get the first image from the batch. Feel free to change
    the index value. But keep in mind that the index value must be between 0 and 31!
  prefs: []
  type: TYPE_NORMAL
- en: Set an Image
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Set the index to grab the first image from the batch. Change the index value
    (between 0 and 31) to display different images.
  prefs: []
  type: TYPE_NORMAL
- en: 'Our image:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
