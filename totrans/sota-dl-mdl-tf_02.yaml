  type: TYPE_NORMAL
  zh: 创建数据集
- en: Now that the directories are set up correctly, we use a Keras API to create
    the training and test sets. The test set is created first based on the construction
    of the first dictionary.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 现在目录设置正确后，我们使用Keras API创建训练集和测试集。测试集首先基于第一个字典的构建创建。
- en: 'Create the test set:'
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 创建测试集：
- en: '[PRE54]'
  id: totrans-237
  prefs: []
  type: TYPE_PRE
  zh: '[PRE54]'
- en: 'Create the training set:'
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 创建训练集：
- en: '[PRE55]'
  id: totrans-239
  prefs: []
  type: TYPE_PRE
  zh: '[PRE55]'
- en: Notice that we only shuffle training data.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，我们只对训练数据进行打乱。
- en: 'Inspect the tensors:'
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE56]'
  id: totrans-242
  prefs: []
  type: TYPE_PRE
  zh: '[PRE56]'
- en: Both tensors are ImageDataGenerator objects. So tensors are ready for training
