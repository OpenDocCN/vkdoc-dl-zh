- en: 2. Increase the Diversity of Your Dataset with Data Augmentation
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: We guide you in the creation of augmented data experiments to increase the diversity
    of a training set by applying random (but realistic) transformations. Data augmentation
    is very useful for small datasets because deep learning models crave a lot of
    data to perform well.
  prefs: []
  type: TYPE_NORMAL
- en: 'Notebooks for chapters are located at the following URL:'
  prefs: []
  type: TYPE_NORMAL
- en: '[`https://github.com/paperd/deep-learning-models`](https://github.com/paperd/deep-learning-models)'
  prefs: []
  type: TYPE_NORMAL
- en: Data Augmentation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: More data typically increases model performance. So what do we do if we have
    small amounts of image training data and cannot collect more? One popular method
    is data augmentation.
  prefs: []
  type: TYPE_NORMAL
- en: '**Data augmentation** is the process of increasing the size and diversity of
    an existing training set without manually collecting any new data. The process
    generates additional training data from existing examples by augmenting them using
    random transformations that yield believable-looking images. With augmented training
    data, a learning model is exposed to more aspects of the data, which helps it
    generalize better. Typically, data augmentation is needed when training data is
    complex and contains few examples.'
  prefs: []
  type: TYPE_NORMAL
- en: Data augmentation is realized by performing a series of random preprocessing
    transformations to existing data such as horizontal and vertical flipping, skewing,
    cropping, shearing, zooming in and out, and rotating. Collectively, augmented
    data is able to simulate a variety of subtly different data points as opposed
    to just duplicating the same data. The subtle differences of the augmented images
    should (hopefully) be enough to help train a more robust model.
  prefs: []
  type: TYPE_NORMAL
- en: Data augmentation can also mitigate overfitting. Overfitting generally occurs
    when there are a small number of training examples. By generating additional training
    data from existing examples, overfitting may be mitigated.
  prefs: []
  type: TYPE_NORMAL
- en: Overfitting happens when a model learns the detail and noise in the training
    data to the extent that it negatively impacts the performance of the model on
    new data. So noise or random fluctuations in the training data are picked up and
    learned as concepts by the model. Small datasets don’t contain enough diversity
    (or randomness) to mitigate learning noise or random fluctuations.
  prefs: []
  type: TYPE_NORMAL
- en: The goal of deep learning is to tune a learning model’s parameters so it can
    effectively map a particular input (e.g., an image) to some output (e.g., a label).
    Essentially, we try to find the sweet spot where the model’s loss is at a minimum,
    which happens when parameters are tuned in the right way. Data augmentation is
    an effective tuning mechanism that can help meet the goal of deep learning, especially
    with small datasets!
  prefs: []
  type: TYPE_NORMAL
- en: For an excellent introduction to data augmentation, peruse
  prefs: []
  type: TYPE_NORMAL
- en: '[`www.tensorflow.org/tutorials/images/data_augmentation`](http://www.tensorflow.org/tutorials/images/data_augmentation)'
  prefs: []
  type: TYPE_NORMAL
