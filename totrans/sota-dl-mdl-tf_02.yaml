- en: The model exhibits less overfitting!
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
- en: Inspect the Data
  id: totrans-276
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: ImageDataGenerator data is different than tf.data. So let’s explore it. Begin
    by processing a batch from the original training set and one from the augmented
    one. Although using the class is pretty easy, it does take a bit more work to
    explore the data.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
- en: Grab a batch from the original training set as shown in Listing [2-11](#PC68).
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE67]'
  id: totrans-279
  prefs: []
  type: TYPE_PRE
  zh: '[PRE67]'
- en: To traverse an ImageDataGenerator object, use the dataset name with a starting
    index value (assigned to a variable) as the method. Since we just want a single
    batch, set the ending index value to 1\. Grab the first element with the *next()*
    method. Append it to a list and increment the batch index. Break the loop after
    one iteration. Finally, convert the list to a NumPy array.
