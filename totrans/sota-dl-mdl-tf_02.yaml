- en: Data Augmentation with ImageGenerator
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: So far, we have presented two augmentation techniques. The first technique added
    Keras preprocessing layers to a model. The second one applied transformations
    directly on images and then fed them to a model. Both techniques built a tf.data
    pipeline to feed to a model.
  prefs: []
  type: TYPE_NORMAL
- en: An alternative is to use the ImageGenerator class . The *ImageGenerator class*
    makes it easy to load images from disk and augment them in various ways. We can
    shift, rotate, rescale, flip horizontally or vertically, shear or apply transformation
    functions to images. Although ImageGenerator is very convenient for simple projects,
    building a tf.data pipeline is more conducive to complex projects because it can
    read images in parallel from any source (not just a local disk) and manipulate
    the dataset in any manner. Also, preprocessing functions based on tf.image operations
    can be used in the tf.data pipeline and in the model deployed to production.
  prefs: []
  type: TYPE_NORMAL
- en: We don’t advocate one over the other. It depends on the task at hand. The ImageGenerator
    class is very easy to use. So it should be useful at the beginning stages of a
    project. The tf.data pipeline is optimized for parallel processing, so it would
    be a good choice for ongoing projects that require a lot of computing resources.
  prefs: []
  type: TYPE_NORMAL
- en: For a great resource on this subject, peruse
  prefs: []
  type: TYPE_NORMAL
- en: '[`www.tensorflow.org/api_docs/python/tf/keras/preprocessing/image/ImageDataGenerator`](https://www.tensorflow.org/api_docs/python/tf/keras/preprocessing/image/ImageDataGenerator)'
  prefs: []
  type: TYPE_NORMAL
