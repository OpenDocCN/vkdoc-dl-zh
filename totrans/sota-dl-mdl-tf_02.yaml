  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Create a function to scale feature images:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: Build the Input Pipeline
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Scale training and test data. Learning models train faster on smaller images.
    An input image that is twice as large requires a network to learn from four times
    as many pixels – and that extra training time adds up. Only shuffle training data.
    Cache and prefetch training and test data to improve model performance:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: Since training and test data have already been batched by the utility, *do not*
    batch when building the input pipeline!
  prefs: []
  type: TYPE_NORMAL
- en: Data Augmentation with Preprocessing Layers
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Apply data augmentation with experimental Keras preprocessing layers. The *Keras
    preprocessing layers API* allows developers to build Keras-native input processing
    pipelines. So TensorFlow models can accept raw images or raw structured data as
    input, handle feature normalization, and feature value indexing on their own.
    Simply, the Keras API makes it much easier to input, preprocess, and model raw
    data.
  prefs: []
  type: TYPE_NORMAL
- en: We begin by importing requisite libraries and create a simple augmentation model.
    We can include the preprocessing layers inside a model like other layers.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s augment images by randomly flipping horizontally, rotating, zooming, and
    translating as shown in Listing [2-1](#PC11).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: Keras preprocessing layers are experimental, which means that the operation
    may change in the future.
  prefs: []
  type: TYPE_NORMAL
- en: We flip images left to right, randomly rotate by a factor of 0.1 (or 10%), randomly
    zoom by a factor of 0.1 (or 10%), and randomly translate by varying height and
    width by factors of 0.2 (or 20%), respectively. The choice of layers and parameter
    value settings was conducted through trial and error experimentations. So feel
    free to experiment with other augmentations.
  prefs: []
  type: TYPE_NORMAL
- en: For more information on Keras experimental preprocessing layers, peruse
  prefs: []
  type: TYPE_NORMAL
- en: '[`www.tensorflow.org/api_docs/python/tf/keras/layers/experimental/preprocessing`](https://www.tensorflow.org/api_docs/python/tf/keras/layers/experimental/preprocessing)'
  prefs: []
  type: TYPE_NORMAL
