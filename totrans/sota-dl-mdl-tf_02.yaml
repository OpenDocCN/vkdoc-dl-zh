  id: totrans-259
  prefs: []
  type: TYPE_PRE
  zh: '[PRE61]'
- en: Rotate and flip images. And shift, shear, and zoom images. Since only training
    data is used for learning, we don’t augment validation (or test) data. We include
    many parameter values in this example. We did quite a bit of experimentation to
    arrive at these values. We strongly encourage you to do your own experimentation.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
