  zh: 将增强后的训练集中的图像可视化，如图 [2-14](#PC79) 所示。
- en: '[PRE78]'
  id: totrans-308
  prefs: []
  type: TYPE_PRE
  zh: '[PRE78]'
- en: We see several augmented flower images. Augmented data looks different than
    the original data by design because we want to provide the model new data. If
    we give the data copies of the original data, performance is not enhanced. But
    augmented data gives the model original data.
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 我们看到几张增强后的鲜花图像。由于我们希望为模型提供新的数据，增强数据看起来与原始数据不同。如果我们给模型提供原始数据的副本，性能不会得到提升。但增强数据为模型提供了原始数据。
- en: Summary
  id: totrans-310
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: We demonstrated data augmentation with three different techniques. The Keras
    technique is pretty easy to implement, but doesn’t provide as much flexibility
    as directly applying augmentations on images. The ImageGenerator technique is
    the easiest to implement, but is limited to smaller projects.
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 我们展示了使用三种不同技术进行数据增强。Keras 技术实现起来相当简单，但不如直接在图像上应用增强那样灵活。ImageGenerator 技术实现起来最简单，但仅限于较小的项目。
