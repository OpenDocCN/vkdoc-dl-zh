- en: Augment with a Keras API
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In the previous chapter, we experienced overfitting when modeling the flowers
    dataset. The issue in that chapter is that validation accuracy was low with respect
    to training accuracy. Let’s see if we can mitigate that issue using a Keras API
    for data augmentation.
  prefs: []
  type: TYPE_NORMAL
- en: Get Data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'First, you’ll want to get the data again. Do that by executing the following
    code, which retrieves the same flowers data as was used in Chapter [1](512350_1_En_1_Chapter.xhtml):'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Split Data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The *tf.keras.preprocessing.image_dataset_from_directory* utility reads the
    data from a directory. The utility is also able to split, seed, resize, and batch
    the data.
  prefs: []
  type: TYPE_NORMAL
- en: 'Set the parameters, and as a starting point, try the following three values:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Batch size is set to 32\. We set batch size to 32, but feel free to experiment
    with different sizes. Since images have different shapes, we must resize them
    for model consumption. We chose 180 × 180, but feel free to experiment with different
    image sizes. But be sure to keep height and width the same.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: Setting batch and image sizes is not a science. The task requires experimentation.
    From our research, a good starting point for batch size is 32 or 64\. Any value
    smaller than 32 slows learning. Any value larger than 64 is computationally expensive.
    The idea is to fit a batch of data entirely in memory. Since computer memory comes
    with a storage capacity in the power of two, it is recommended to keep batch size
    a power of two. Smaller image sizes speed learning, but preserve less of the original
    image. So model performance is negatively impacted. Larger image sizes preserve
    more of the original image. So model performance is positively impacted at the
    expense of computational resources.
  prefs: []
  type: TYPE_NORMAL
- en: Load Images Off Disk into Train and Test Sets
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Now create the train and test datasets. It’s common practice to split data
    into these two set types. Begin with the training set and create it as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Set *validation_split=0.19* and *subset='training'* to get 81% of the data into
    the train set. Set *image size* to the sizes we establish to resize images. Also
    set the seed and batch values.
  prefs: []
  type: TYPE_NORMAL
- en: 'Create the test set:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Set *validation_split=0.19* and *subset='validation'* to get 19% of the data
    into the test set. Set *image size* to the sizes we establish to resize images.
    Also set the seed and batch values.
  prefs: []
  type: TYPE_NORMAL
- en: Inspect the Training Set
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Take an example batch and display image shape and label:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: As expected, we have 32 180 × 180 × 3 images in the first batch. The *3* value
    means that images are RGB color. We also have 32 corresponding labels. We have
    32 images and 32 corresponding labels because we set batch size to 32.
  prefs: []
  type: TYPE_NORMAL
- en: Get Number of Classes
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Use the *class_names* method from the utility to display the number of class
