- en: Combining DataFrames
  id: totrans-536
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 合并 DataFrames
- en: There are several ways to combine dataframes. You might want to merge or join
    them (the functionality for merge and join is very similar—we will only cover
    merge) or concatenate (stack) dataframes together.
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
  zh: 有几种方法可以合并数据帧。你可能想要合并或连接它们（合并和连接的功能非常相似——我们只会介绍合并）或者将数据帧（堆叠）连接在一起。
- en: First, let’s prepare two separate dataframes. They will both contain the column
    PassengerId, but their other columns will be different. The goal is to unify both
    tables into one dataframe so that for every passenger ID, the row contains columns
    from both dataframes together. In other words, we are zipping up the two dataframes
    only where passenger ID is the same for both tables. This is called *joining*
    or *merging* two tables together. Figure [2-44](#Fig45) shows the code to do this.
  id: totrans-538
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们准备两个独立的数据框。它们都将包含PassengerId列，但它们的其他列将不同。目标是统一这两个表，以便对于每个乘客ID，行包含来自两个数据框的列。换句话说，我们只在两个表中的乘客ID相同时压缩两个数据框。这被称为*连接*或*合并*两个表。图2-44显示了执行此操作的代码。
- en: '![](../images/483137_2_En_2_Chapter/483137_2_En_2_Fig45_HTML.png)'
  id: totrans-539
  prefs: []
  type: TYPE_IMG
  zh: '![图2-46](../images/483137_2_En_2_Chapter/483137_2_En_2_Fig45_HTML.png)'
- en: A 5-line Python code to create two data frames. The left frame contains passenger
    I D, P class, and fare. The right frame contains passenger I D, name, age, and
    survived columns and reversal of the order using open square bracket colon colon
    negative 1.
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
