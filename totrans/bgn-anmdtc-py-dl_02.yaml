- en: Applying Functions
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: We can apply functions to each individual value within a column, or we can use
    aggregate functions, which will condense the entire column into some kind of metric.
    Examples of aggregate functions are `sum()`, `.mean()`, `.std()`, `.min()`, and
    `.max()`.
  prefs: []
  type: TYPE_NORMAL
- en: The notation to apply a function is
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: Recall that we can obtain a Series by selecting only one column by a string.
  prefs: []
