    that are more correlated with ‘Survived’ than others. Examples include Title_11,
    Title_12, and Title_8\. If we reverse transform these with the label encoder as
    shown in Figure [2-88](#Fig89), we will immediately understand why.
  id: totrans-1037
  prefs: []
  type: TYPE_NORMAL
  zh: 看起来，通过进行独热编码，我们发现了与‘生存’比其他特征更相关的特征。例如，包括 Title_11、Title_12 和 Title_8。如果我们像图
