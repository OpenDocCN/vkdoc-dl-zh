- en: Now that you know the very basics of data I/O in pandas, let’s move on to the
    many ways we can manipulate this data to our liking.
  prefs: []
  type: TYPE_NORMAL
- en: Data Manipulation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Pandas will let you do just about anything imaginable with your data. To get
    you started, this section covers the following data manipulation procedures that
    you can perform with pandas:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Selecting**: Selecting and slicing a dataframe by specific rows/columns'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Filtering**: Filtering rows based on specific conditions'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Sorting**: Sorting in ascending/descending order on one or more columns'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Applying functions**: Applying a custom function over dataframe columns or
    rows, and running aggregate functions'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Grouping**: Grouping dataframes, iterating through groups, and performing
    group aggregations'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Combing dataframes**: Merging or concatenating dataframes'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Manipulating columns**: Creating, renaming, and dropping columns'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These are some of the most common data manipulation procedures used in any software
    pertaining to data, though pandas does let you have full control over how you
    want to iterate through the data as, in essence, a pandas dataframe is just a
    multidimensional array.
  prefs: []
  type: TYPE_NORMAL
- en: Select
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Before we start selecting, let’s find out what columns are even in the dataframe.
    We can do this by running Figure [2-12a](#Fig12).
