  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在你解压压缩文件后，你几乎可以开始使用 Python 处理这个数据集了。首先，确保你有一个用于开发 Python 代码的 IDE。为了轻松地跟随本书中的示例，建议使用
    Jupyter Notebook 或 JupyterLab。
- en: 'Next, make sure you have the following libraries and versions installed, though
    you might also want to check the requirements.txt file available on the GitHub
    repository or use it to prepare your environment:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
