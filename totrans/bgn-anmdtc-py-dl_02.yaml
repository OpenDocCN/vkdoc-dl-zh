- en: Data Processing
  id: totrans-821
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Data processing is a very crucial element of data science in general. Real-world
    data is almost never perfect, especially if you’re working with large swathes
    of stored data in a big database or if you’re working with a live stream of data.
    At some point, you’re going to have to deal with missing values, outliers, erroneous
    entries, or the need to transform your data into a better, more model-friendly
    format.
  id: totrans-822
  prefs: []
  type: TYPE_NORMAL
- en: One of the most common data imperfections you’re likely to encounter is the
    null, which occurs when no entry exists where there should be one. In these cases,
    you’ll need to address data with such missing elements because a machine learning
    model won’t know how to directly interpret it.
  id: totrans-823
  prefs: []
  type: TYPE_NORMAL
- en: Nulls
  id: totrans-824
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: There are many strategies for dealing with null entries. One simple solution
    is to either drop the column itself or drop rows that include nulls. One way to
    check how many nulls a column has is to use `df[your_column].isna().sum()`. The
    function `.isna()` returns `True` if the value is null and returns `False` if
    it is not null. By summing it, you can get a count of how many null values there
    are.
  id: totrans-825
  prefs: []
  type: TYPE_NORMAL
- en: Figure [2-72](#Fig73) shows the code to compare how many nulls are in the column
    ‘Age’ with the total number of rows.
  id: totrans-826
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_2_Chapter/483137_2_En_2_Fig73_HTML.png)'
  id: totrans-827
  prefs: []
  type: TYPE_IMG
- en: A one-line Python code reads d f open square bracket, Age in quotes, close bracket
    dot is n a open and close parentheses sum open and close parentheses comma len
    open parenthesis d f open square bracket, Age in quotes, close square bracket
    close parenthesis.
  id: totrans-828
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-72
  id: totrans-829
  prefs: []
  type: TYPE_NORMAL
- en: Comparing the number of null entries in the column ‘Age’ with the total number
    of records
  id: totrans-830
  prefs: []
  type: TYPE_NORMAL
- en: You should see an output like `(177, 891)`. So now we know that the ‘Age’ column
    has 177 nulls, which is quite a lot considering this means almost 20% of the data
    is null for ‘Age’.
  id: totrans-831
  prefs: []
  type: TYPE_NORMAL
- en: Again, one simple method is to drop all the rows that are null. We can do this
    by executing the code in Figure [2-73](#Fig74).
  id: totrans-832
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_2_Chapter/483137_2_En_2_Fig74_HTML.png)'
  id: totrans-833
  prefs: []
  type: TYPE_IMG
- en: A one-line Python code d f dot drop n a open parenthesis subset = open square
    bracket, Age in quotes, close square bracket close parenthesis.
  id: totrans-834
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-73
  id: totrans-835
  prefs: []
  type: TYPE_NORMAL
- en: Dropping rows and specifying that we want to only drop rows with nulls belonging
    to a column in the list passed to subset
  id: totrans-836
  prefs: []
  type: TYPE_NORMAL
- en: We are explicitly including ‘Age’ in the subset of columns from which to drop
    rows if a null is encountered. If we did not pass any parameters to `.dropna()`,
    it would drop rows where a single null is detected anywhere. This would reduce
    our total data count drastically.
  id: totrans-837
  prefs: []
  type: TYPE_NORMAL
- en: Sometimes, you won’t want to drop nulls because it would reduce the data count
    by too much. Perhaps just one column is missing values and the other columns are
    relatively fine. You could also *interpolate* values—fit various functions along
    the columns to approximate what should go in between or fill them in by some algorithmic
    method like the average of the closest non-null values—which is a separate topic
    by itself with plenty of depth.
  id: totrans-838
  prefs: []
  type: TYPE_NORMAL
- en: We can simply fill in the null values (**impute**) by calculating the average
    age by first computing the average of the ‘Age’ column and then using the `.fillna()`
    function, as shown in Figure [2-74](#Fig75).
  id: totrans-839
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_2_Chapter/483137_2_En_2_Fig75_HTML.png)'
