- en: We also want to make sure that features are not too intercorrelated with one
    another. If this is the case, then we are introducing redundancy, because it’s
    likely more of the same type of information if the correlation is high. If we
    take a look at ‘Family_Count’, ‘SibSp’, and ‘Parch’, the correlation between the
    three is really high. This makes sense considering we directly derived ‘Family_Count’
    from the latter two columns, but this illustrates how ‘Family_Count’ is a redundant
    variable. We can drop ‘Family_Count’ and keep ‘SibSp’ and ‘Parch’ or we can drop
    the latter two and just keep ‘Family_Count’. There are many approaches to take.
  id: totrans-1008
  prefs: []
  type: TYPE_NORMAL
