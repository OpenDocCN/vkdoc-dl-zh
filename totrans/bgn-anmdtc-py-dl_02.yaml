- en: You can also check to see if the values exist as one of the elements within
    a list. To do so, use `df[column_name].isin(iterable_of_values)`, where `iterable_of_values`
    is a list of values that you want to match.
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
- en: Notice that the values in the Embarked column seem to be ‘S’ or ‘C’ quite commonly
    from the displayed tables. Let’s use the negation operator to find any rows where
    the value in the ‘Embarked’ column is neither ‘S’ nor ‘C’. Refer to Figure [2-24](#Fig25).
