- en: However, there is a more efficient way of performing the same computation. We
    will do what is called a *vectorized operation*, which refers to performing operations
    on an entire pandas Series at once. This is quicker and scales better than the
    `.apply()` method.
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，有一种更高效的方法来完成相同的计算。我们将进行所谓的*向量操作*，这指的是一次性对整个pandas Series进行操作。这比`.apply()`方法更快，并且扩展性更好。
- en: Figure [2-31](#Fig32) demonstrates how you can perform the equivalent operation
    in a vectorized manner.
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: 图[2-31](#Fig32)演示了如何以向量化的方式执行等效操作。
