- en: Visualization
  id: totrans-750
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To visualize your data, you can create plots using matplotlib, a library for
    Python that allows you to create customized charts to your liking. Libraries like
    seaborn add on to the functionality of matplotlib in terms of features. We will
    use seaborn later on in Chapter [5](483137_2_En_5_Chapter.xhtml) and [6](483137_2_En_6_Chapter.xhtml)
    for its heatmap, a useful function to let us visualize various machine learning
    performance metrics.
  id: totrans-751
  prefs: []
  type: TYPE_NORMAL
- en: The following sections cover a few basic things you should know about creating
    a chart.
  id: totrans-752
  prefs: []
  type: TYPE_NORMAL
- en: Line Chart
  id: totrans-753
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: A **line chart** is useful for graphing time Series data or any type of data
    that progresses along some type of axis—for example, plotting mathematical functions.
    Figure [2-62](#Fig63) shows an example of how to generate some white noise by
    sampling a normal distribution and plotting a line chart.
  id: totrans-754
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_2_Chapter/483137_2_En_2_Fig63_HTML.png)'
  id: totrans-755
  prefs: []
  type: TYPE_IMG
- en: A Python code reads noise = n p dot random dot normal open parenthesis size
    = 100 close parenthesis. p l t dot plot open parenthesis noise close parenthesis.
  id: totrans-756
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-62
  id: totrans-757
  prefs: []
  type: TYPE_NORMAL
- en: Creating some random noise and plotting it
  id: totrans-758
  prefs: []
  type: TYPE_NORMAL
- en: '`plt.plot(sequence)` creates a basic line chart, where `sequence` is some kind
    of iterable like a list or numpy array that holds the data to be plotted. You
    can also pass `plt.plot(seq_x, seq_y)`, but if you pass only one sequence, matplotlib
    implicitly creates a range from zero to the length of the sequence to be used
    along the x axis.'
  id: totrans-759
  prefs: []
  type: TYPE_NORMAL
- en: The chart resulting from executing the code in Figure [2-62](#Fig63) should
    look like Figure [2-63](#Fig64). Keep in mind that it won’t exactly match, because
    we are taking a random sample of noise. So as long as your graph looks similar
    in style to Figure [2-63](#Fig64), then it works.
  id: totrans-760
  prefs: []
  type: TYPE_NORMAL
