- en: With several columns, ‘a’ will be sorted first. Ties are then broken by sorting
    ‘b’, and ties with ‘a’ and ‘b’ are broken by ‘c’. A tie in column ‘a’ is when
    two or more rows have the exact same value for ‘a’.
