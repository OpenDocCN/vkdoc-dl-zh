- en: Applying Functions
  id: totrans-405
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 应用函数
- en: We can apply functions to each individual value within a column, or we can use
    aggregate functions, which will condense the entire column into some kind of metric.
    Examples of aggregate functions are `sum()`, `.mean()`, `.std()`, `.min()`, and
    `.max()`.
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以对列中的每个单独的值应用函数，或者我们可以使用聚合函数，这些函数将整个列压缩成某种指标。聚合函数的例子有 `sum()`、`.mean()`、`.std()`、`.min()`
    和 `.max()`。
- en: The notation to apply a function is
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 应用函数的表示法是
- en: '[PRE15]'
  id: totrans-408
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: Recall that we can obtain a Series by selecting only one column by a string.
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: 回想一下，我们可以通过字符串选择仅一个列来获得一个 Series。
- en: We can apply any compatible function, including typecasting. We can typecast
    the column ‘Fare’ to an integer, for example, by executing the code shown in Figure
    [2-28](#Fig29).
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以应用任何兼容的函数，包括类型转换。例如，我们可以通过执行图 [2-28](#Fig29) 中显示的代码将列 ‘Fare’ 转换为整数。
