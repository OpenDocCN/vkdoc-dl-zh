- en: Pandas, Scikit-Learn, and Matplotlib
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Pandas** is a data science framework for Python that lets you freely manipulate
    and analyze data to your liking. It is an expansive, comprehensive framework offering
    a lot of functionality, and should suit your data processing needs. Until you
    start to scale into the gigabyte realm with your datasets, Pandas can be quick
    and efficient.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Scikit-Learn** is a machine learning library that covers a wide range of
    functionality related to machine learning modeling, ranging from data processing
    functions to various machine learning methods'
  prefs: []
  type: TYPE_NORMAL
- en: '**Matplotlib** is a data visualization library that lets you build customized
    plots and graphs. It integrates well with pandas and scikit-learn, and even lets
    you display images.'
  prefs: []
  type: TYPE_NORMAL
- en: '**NumPy** is a numerical computation library with highly efficient implementations
    for various computational tasks. You can represent your data as numpy arrays and
    perform quick, vectorized computations, linear algebra operations, and more. NumPy
    integrates very well with many popular Python packages, including pandas, scikit-learn,
    and matplotlib.'
  prefs: []
  type: TYPE_NORMAL
- en: With all of these packages, you should be able to perform comprehensive data
    analysis. However, keep in mind that there are other packages available for Python
    that you may want to check out to complement your data analysis, such as **statsmodels**
    (statistical modeling library), **seaborn** (another plotting library, which we
    will use in subsequent chapters), **plotly** (yet another plotting library but
    for interactive graphs), and **scipy** (scientific computing library, which lets
    you perform various statistical tests)
  prefs: []
  type: TYPE_NORMAL
- en: Data I/O
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: With our environment set up, let’s jump straight into the content. Before we
    conduct any type of data analysis, we need to actually have data. There are a
    myriad of ways to load data in Pandas, but we will keep it simple and load from
    a csv file.
