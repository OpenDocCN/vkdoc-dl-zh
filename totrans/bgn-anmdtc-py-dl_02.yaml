- en: Visualization
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To visualize your data, you can create plots using matplotlib, a library for
    Python that allows you to create customized charts to your liking. Libraries like
    seaborn add on to the functionality of matplotlib in terms of features. We will
    use seaborn later on in Chapter [5](483137_2_En_5_Chapter.xhtml) and [6](483137_2_En_6_Chapter.xhtml)
    for its heatmap, a useful function to let us visualize various machine learning
    performance metrics.
  prefs: []
  type: TYPE_NORMAL
- en: The following sections cover a few basic things you should know about creating
    a chart.
  prefs: []
  type: TYPE_NORMAL
- en: Line Chart
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: A **line chart** is useful for graphing time Series data or any type of data
    that progresses along some type of axis—for example, plotting mathematical functions.
    Figure [2-62](#Fig63) shows an example of how to generate some white noise by
    sampling a normal distribution and plotting a line chart.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_2_Chapter/483137_2_En_2_Fig63_HTML.png)'
