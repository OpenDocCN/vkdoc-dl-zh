- en: You can also graph other types of plots, such as a scatter plot. Figure [2-66](#Fig67)
    shows you how to create a scatter plot. Scatter plots are useful when you want
    to just get a sense of how the data is distributed against each other on various
    columns. For example, you can look at housing prices vs. ZIP codes to get a sense
    of the distribution of data across each ZIP code.
  id: totrans-784
  prefs: []
  type: TYPE_NORMAL
  zh: 你还可以绘制其他类型的图表，例如散点图。图 [2-66](#Fig67) 展示了如何创建散点图。散点图在你想了解数据在各个列之间如何分布时非常有用。例如，你可以查看房价与
    ZIP 码的关系，以了解每个 ZIP 码的数据分布情况。
