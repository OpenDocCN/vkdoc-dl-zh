- en: It is also possible to group the dataframes and then perform aggregations. Doing
    so will compute and display the corresponding aggregate for each group. Recall
    from the previous section that we did aggregations like sum, mean, max, etc.,
    but if we group and then perform the same aggregations, it will first group the
    dataframe into different chunks, then perform the aggregation on each chunk, and
    then put together the final result. Figure [2-42](#Fig43) shows a sum aggregation
    on several numeric columns grouped by whether or not the passenger survived.
