- en: There are several different ways to specify how you want to join two dataframes.
    You are encouraged to explore this further, since the joining methods go far beyond
    just simple ‘inner’, ‘left’, and ‘right’ joins. However, as of now in Pandas,
    ‘left’, ‘right’, ‘outer’, ‘inner’, and ‘cross’ joins are what are supported by
    the `.merge()` function.
