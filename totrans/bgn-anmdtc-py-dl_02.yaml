- en: Now that you’ve learned how to manipulate data to your liking, you are ready
    to explore how to perform data analysis.
  id: totrans-672
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经学会了如何根据你的喜好操作数据，你就可以探索如何进行数据分析了。
- en: Data Analysis
  id: totrans-673
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据分析
- en: Pandas offers a variety of functionality to analyze your data (and examine relationships,
    underlying patterns, etc.). It also easily integrates with other Python modules
    dedicated to statistical functionality, such as scipy and statsmodels, to let
    you perform more detailed statistical procedures to understand your data better.
  id: totrans-674
  prefs: []
  type: TYPE_NORMAL
  zh: Pandas 提供了各种功能来分析你的数据（以及检查关系、潜在模式等）。它还易于与其他专注于统计功能的 Python 模块集成，如 scipy 和 statsmodels，让你能够执行更详细的统计程序，更好地理解你的数据。
