- en: With this basic amount of configuration, we can freely plot anything we’d like
    to in later sections. Examples include plotting the loss curves of multiple different
    models (visually evaluating model performances against one another) or just evaluating
    two time Series plots side by side. An example of this would be plotting your
    time Series predictions vs. the actual time Series data for a certain month.
  prefs: []
  type: TYPE_NORMAL
- en: 'The following list describes the code in Figure [2-64](#Fig65):'
  prefs: []
  type: TYPE_NORMAL
- en: '`plt.figure(figsize=(a,b))` lets you configure the size of the plot. The parameters
    `a, b` refer to the width and height in inches of the plot.'
  prefs:
  - PREF_UL
