- en: Categorical Encoding
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'In your data, you might have many string values that you’d want to model. For
    example, sex was logged as ‘male’ or ‘female’, but machine learning models can’t
    directly interpret text. They operate on numbers, so we will need to transform
    these strings into numerical representations. There are two ways to do this:'
  prefs: []
  type: TYPE_NORMAL
- en: Map the labels to a one-to-one numerical equivalent
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Craft one-hot vectors and add them as columns to encode the categories
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For the first method, we can use scikit-learn to help us create a label encoder
    to automatically map our categorical labels into numeric equivalents. We can also
    switch these back to the original categorical values using this same label encoder
    object. To get started with the label encoder, refer to Figure [2-75](#Fig76).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_2_Chapter/483137_2_En_2_Fig76_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A 3-line Python code to import label encoder from s k learn preprocessing. Reads
    d f 2 = d f dot copy open and close parentheses. d f 2 open square bracket, Embarked
    in quotes, close square bracket dot unique open and close parentheses.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-75
  prefs: []
  type: TYPE_NORMAL
- en: Importing the label encoder and finding out the unique values present in ‘Embarked’
    to see what we must encode. ‘Embarked’ contains a null as well, which will also
    be mapped by the label encoder
  prefs: []
