- en: Creating, Renaming, and Dropping Columns
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Finally, let’s go over how to create a new column (formally), rename columns,
    and drop them from the dataframe entirely.
  prefs: []
  type: TYPE_NORMAL
- en: 'Recall from the earlier discussion of `.apply()` that we create a new column
    like so:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: We can use the function `.insert()` to customize where we want to insert the
    column.
  prefs: []
  type: TYPE_NORMAL
- en: First, let’s copy our original dataframe, as shown in Figure [2-50](#Fig51).
    This ensures that anything we do to `df2` will never affect `df`.
  prefs: []
