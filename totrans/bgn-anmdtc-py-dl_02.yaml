- en: 'We can also pass a list of columns to sort, like so:'
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 我们也可以传递一个列的列表来排序，如下所示：
- en: '[PRE14]'
  id: totrans-375
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'The list of values and the list of Booleans correspond one to one. If `list_of_values`
    is `[''a'', ''b'', ''c'']`, and `list_of_booleans` is `[True, False, True]`, then
    we are saying that:'
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 值的列表和布尔值的列表一一对应。如果 `list_of_values` 是 `['a', 'b', 'c']`，而 `list_of_booleans`
    是 `[True, False, True]`，那么我们是在说：
- en: ‘a’ is in ascending order.
  id: totrans-377
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: ‘a’ 是升序排列。
- en: ‘b’ is in descending order.
  id: totrans-378
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: ‘b’ 是降序排列。
- en: ‘c’ is in ascending order.
  id: totrans-379
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: ‘c’ 是升序排列。
- en: With several columns, ‘a’ will be sorted first. Ties are then broken by sorting
    ‘b’, and ties with ‘a’ and ‘b’ are broken by ‘c’. A tie in column ‘a’ is when
    two or more rows have the exact same value for ‘a’.
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 有多个列时，首先按 ‘a’ 排序。如果有相同值，则通过排序 ‘b’ 来打破平局，而与 ‘a’ 和 ‘b’ 的平局则通过 ‘c’ 来打破。列 ‘a’ 中的平局是指两行或多行具有完全相同的
    ‘a’ 值。
- en: Consider the column Survived. Many people either survived or didn’t survive
    the sinking of the Titanic, so if we sort by ‘Survived’, we will have many rows
    that are in an ambiguously sorted order.
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑列 ‘Survived’。许多人要么在泰坦尼克号沉没中幸存，要么没有幸存，所以如果我们按 ‘Survived’ 排序，我们将有许多行处于模糊排序状态。
- en: If we additionally sort by ‘Name’, then within the sorted order of ‘Survived’,
    the remaining rows are then sorted by ‘Name’ as well.
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们额外按 ‘Name’ 排序，那么在 ‘Survived’ 排序的顺序中，剩余的行也将按 ‘Name’ 排序。
- en: Figure [2-27](#Fig28) shows how to sort by columns `['Pclass', 'Age']` and ascending
    list `[True, False]`.
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [2-27](#Fig28) 展示了如何按列 `['Pclass', 'Age']` 和升序列表 `[True, False]` 排序。
- en: '![](../images/483137_2_En_2_Chapter/483137_2_En_2_Fig28_HTML.png)'
  id: totrans-384
