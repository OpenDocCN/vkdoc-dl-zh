  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: So now we can see why these titles were more highly correlated than the other
    titles. You can directly extract the sex of the passenger from these titles alone,
    which makes sense why Title_11 (corresponding to ‘Mr.’) has such a higher correlation
    with ‘Survived’ than the rest, because the passengers who survived are biased
    towards being female.
  id: totrans-1044
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们现在可以理解为什么这些标题与其他标题的相关性更高。你仅从这些标题中就可以直接提取乘客的性别，这也解释了为什么Title_11（对应“先生”）与“Survived”的相关性比其他标题要高，因为幸存下来的乘客倾向于女性。
- en: With that, you have now completed basic feature engineering and selection. There
    is far more to data science in general, but for the purposes and scope of this
    book, you have made it past the basics that you will need to know to follow along
    with the rest of the book.
  id: totrans-1045
  prefs: []
  type: TYPE_NORMAL
  zh: 有了这些，你现在已经完成了基本特征工程和选择。在数据科学的一般领域，还有更多内容，但就本书的目的和范围而言，你已经超越了你需要了解的基础知识，以便跟随本书的其余部分。
- en: Summary
  id: totrans-1046
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: You should now be more familiar with how to use Pandas, scikit-learn, and matplotlib
    to load data, transform it to your liking, prepare it for machine modeling, and
    conduct statistical and visual analysis. With this knowledge, you will be able
    to follow along with the rest of the book and have a basic foundation to expand
    upon for future projects.
  id: totrans-1047
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你应该更熟悉如何使用Pandas、scikit-learn和matplotlib来加载数据，将其转换为你的喜好，为机器建模做准备，并进行统计和可视化分析。有了这些知识，你将能够跟随本书的其余部分，并有一个基本的基础来扩展未来的项目。
- en: In Chapter [3](483137_2_En_3_Chapter.xhtml), we will go over what machine learning
    is at a high level as well as cover important concepts that will apply to the
    rest of the book, to deep learning, and beyond.
  id: totrans-1048
  prefs: []
  type: TYPE_NORMAL
  zh: 在第[3](483137_2_En_3_Chapter.xhtml)章中，我们将从高层次上介绍机器学习是什么，以及涵盖将应用于本书其余部分、深度学习以及更广泛领域的重要概念。
