- en: Histogram
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: You can also plot a histogram. This is useful when you want to understand the
    frequency counts across your dataset to find out the distribution of your data.
    The way it works is that the overall data range is binned into several subintervals.
    If a data point falls in this interval, the interval’s tally is increased by one.
    The rest of the data is counted in this manner, resulting in a frequency graph.
    Figure [2-68](#Fig69) shows the code to plot a histogram using the ‘Fare’ column
    in the dataframe.
