  type: TYPE_NORMAL
- en: Filtering the dataframe to have entries with age over 50 and displaying the
    first five rows
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
- en: You should see Table [2-9](#Tab9) as the output. This dataframe is a filtered
    version of `df` that contains only rows where the `Age` value is greater than
    `50`.
