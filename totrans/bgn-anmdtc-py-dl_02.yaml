- en: Finally, understand that we can also **filter and replace** values. Let’s replace
    the values in the Sex column to be numeric equivalents of the existing labels
    of ‘male’ and ‘female’. This is a commonly done step for categorical columns like
    ‘Sex’ so that the resulting values can be used in a machine learning model. Machine
    learning models cannot learn from text directly—the text needs to be converted
    into equivalent numeric representations.
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
- en: 'A good convention is to use loc:'
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  id: totrans-334
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: We are selecting only the rows where the Boolean is applicable, selecting the
    column whose values to replace, and then replace it with a new value. Refer to
    Figure [2-25](#Fig26) to see how to do this.
  id: totrans-335
