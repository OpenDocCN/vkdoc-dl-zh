  id: totrans-892
  prefs: []
  type: TYPE_NORMAL
- en: We can also perform one-hot encoding to encode the categorical values in a column.
    One-hot encoding produces a vector of values where each entry corresponds exactly
    to a specific categorical class. The vector will have 0s everywhere except for
    a specific index that corresponds to what class it is, where the value is 1.
  id: totrans-893
  prefs: []
  type: TYPE_NORMAL
- en: 'To illustrate this, pretend we have only three categorical values: ‘cat’, ‘dog’,
    and ‘mouse.’ A one-hot vector for a data point belonging to ‘dog’ would be [0,
    1, 0]. A one-hot vector for the label ‘mouse’ would be [0, 0, 1], and the one-hot
    vector for ‘cat’ would be [1, 0, 0]. There should be only one 1 across the entire
    vector, belonging to a specific class. If the label is Null, then the vector can
    be all 0s, with no 1 present at all.'
  id: totrans-894
  prefs: []
  type: TYPE_NORMAL
- en: When we do one-hot encoding as a transformation of the column itself, we are
    now creating a column for every categorical label where the value is only ever
    1 (if the entry belongs to this class) or 0 everywhere else. This is a more scalable
    approach to categorical encoding, especially if you have many categories. Furthermore,
    the sparse data (**sparse** means there are many 0 values and few real values)
    format can also make the learning task potentially easier because it may more
    easily be able to discriminate two different data points belonging to different
    classes. Differentiating between 1 and 0 is easier than differentiating between
    1, 2, 3, 4, etc.
  id: totrans-895
  prefs: []
  type: TYPE_NORMAL
- en: To perform categorical encoding in this one-hot manner, we can use the function
    `pd.get_dummies()`, which creates separate columns for every unique category encountered
    where the values are only ever `True` or `False`. Each row has only one `True`
    value across the entire row because it’s supposed to be one-hot.
  id: totrans-896
  prefs: []
  type: TYPE_NORMAL
- en: The code in Figure [2-79](#Fig80) shows how to use `.get_dummies()` to create
    one-hot columns for the ‘Embarked’ column. The `prefix` argument adds that value
    as a prefix to the created columns. Otherwise, each created column would be named
    after the categorical value it belongs to. It is best to provide a prefix, which
    can simply be the column name itself for convenience and clarity.
  id: totrans-897
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_2_Chapter/483137_2_En_2_Fig80_HTML.png)'
  id: totrans-898
