- en: Grouping
  id: totrans-482
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 分组
- en: We can group the dataframe by certain columns and iterate over each group. For
    example, if we have a dataframe of houses, and color is an attribute, we can group
    by house color and explore each individual group of color at a time. Other data
    processing software may not enable you to have this much control (or, at least,
    not control that is this straightforward), but in pandas, you can access each
    group directly and iterate over all of them.
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以按某些列对数据框进行分组并遍历每个组。例如，如果我们有一个房屋数据框，并且颜色是一个属性，我们可以按房屋颜色进行分组，并一次探索每个颜色组。其他数据处理软件可能无法提供如此多的控制（或者至少，不是如此直接的控件），但在pandas中，您可以直接访问每个组并遍历所有组。
- en: The general notation is
  id: totrans-484
  prefs: []
  type: TYPE_NORMAL
  zh: 通用表示法是
- en: '[PRE16]'
  id: totrans-485
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: '`grouped_obj` is an iterable object. To iterate through it, we can execute
    the code shown in Figure [2-38](#Fig39). This enables us to access both what the
    grouped values are (name) and the grouped dataframe itself (group). As shown in
    Figure [2-39](#Fig40), the grouped dataframe, group, will contain only values
    where the grouped columns are equal to the values in name. If we were to group
    by color, and we had ‘red’, ‘green’, and ‘blue’ to pick from, then each iteration
    would produce a name being one of ‘red’, ‘green’, or ‘blue’ and a dataframe called
    ‘group’ that consists only of each of those respective colors.'
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: '`grouped_obj`是一个可迭代对象。要遍历它，我们可以执行图[2-38](#Fig39)中显示的代码。这使我们能够访问分组值（名称）以及分组数据框本身（组）。如图[2-39](#Fig40)所示，分组数据框，组，将只包含分组列等于名称中的值的值。如果我们按颜色分组，并且我们有“红色”、“绿色”和“蓝色”可供选择，那么每次迭代将产生一个名称是“红色”、“绿色”或“蓝色”之一，以及一个名为“组”的数据框，它只包含这些相应的颜色。'
- en: '![](../images/483137_2_En_2_Chapter/483137_2_En_2_Fig40_HTML.png)'
  id: totrans-487
  prefs: []
