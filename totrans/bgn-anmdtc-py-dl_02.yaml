- en: '| **4** | 5 | 0 | 3 | Allen, Mr. William Henry | male | 0.365167 | NaN | …
    | S |'
  prefs: []
  type: TYPE_TB
- en: Standard scaling does not necessarily reduce your range to (–1,1). It normalizes
    the data, so it’s possible for the data to have values up to four standard deviations
    from the norm. The transformation gets the data to have a mean of 0 and standard
    deviation of 1.
  prefs: []
  type: TYPE_NORMAL
- en: Scikit-learn offers many other standardization techniques, each with its own
    effect on the data. It’s worth exploring and trying these out, as there is no
    catch-all scaling method and the nature of your data can require various techniques.
  prefs: []
  type: TYPE_NORMAL
- en: Feature Engineering and Selection
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Feature** **engineering** is about creating meaningful features from data.
    It can involve data processing of raw data, cleaning up nulls, and also the creation
    of new columns of data either by using a combination of existing columns/data
    or incorporating extraneous data from other sources. Sometimes, domain expertise
    can be helpful as well in creating new features.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Feature selection** is more about selecting only the features that are relevant
    and useful to the modeling task. Not every column or variable will be useful,
    as we touched upon in the Pandas Correlation Matrix section.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s create some new features and see if we can get any useful information
    out of them. In particular, we will create the following columns:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Title**: Extract Miss., Mrs., Mr., or any other titles.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Age_Group**: Grouping by age such as child, adult, young adult, etc.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Family_Count**: Parch is the number of parents and children of the passenger
    on the ship. SibSp is the count of siblings of this passenger. Together, we can
    combine these into a new metric.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s define some functions to help us extract these features. Refer to Figure
    [2-82](#Fig83).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_2_Chapter/483137_2_En_2_Fig83_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A 10-line Python code uses split and strip functions to separate names in the
