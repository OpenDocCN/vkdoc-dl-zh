- en: 2. Introduction to Data Science
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2. 数据科学介绍
- en: This chapter introduces you to the basic principles of the data science workflow.
    These concepts will help you prepare your data as necessary to be fed into a machine
    learning model as well as understand its underlying structure through analysis.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 本章向您介绍了数据科学工作流程的基本原则。这些概念将帮助您准备数据，使其能够被输入到机器学习模型中，并通过分析理解其底层结构。
- en: You will learn how to use the libraries Pandas, Numpy, Scikit-Learn, and Matplotlib
    to load, manipulate, and analyze data. Furthermore, you will learn how to perform
    data I/O; manipulate, transform, and process the data to your liking; analyze
    and plot the data; and select/create relevant features for the machine learning
    modeling task.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 您将学习如何使用 Pandas、Numpy、Scikit-Learn 和 Matplotlib 库来加载数据、操作数据和数据分析。此外，您还将学习如何执行数据输入/输出；根据您的喜好操作、转换和处理数据；分析和绘制数据；以及为机器学习建模任务选择/创建相关特征。
- en: 'In a nutshell, this chapter covers the following topics:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，本章涵盖了以下主题：
- en: Data I/O
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据输入/输出
- en: Data manipulation
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据操作
- en: Data analysis
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据分析
- en: Data visualization
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据可视化
- en: Data processing
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据处理
- en: Feature engineering/selection
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 特征工程/选择
- en: Note
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Code examples are provided in Python 3.8\. Package versions of all frameworks
    used are provided. You will need some type of program to run Python code, so make
    sure to set this up beforehand. The code repository for this book is available
    at [`https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/tree/master`](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/tree/master).
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 代码示例提供在 Python 3.8 中。所有框架的包版本都提供。您需要某种类型的程序来运行 Python 代码，所以请确保提前设置好。本书的代码仓库可在[https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/tree/master](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/tree/master)找到。
- en: The repository also includes a requirements.txt file to check your packages
    and their versions.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 仓库还包括一个 requirements.txt 文件，用于检查您的包及其版本。
- en: Code examples for this chapter are available at `https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%202%20Introduction%20to%20Data%20Science/chapter2_datascience.ipynb`.
    Navigate to “Chapter 2 Introduction to Data Science” and then click chapter2_datascience.ipynb.
    The code is provided as a .py file as well, though it is the exported version
    of the notebook.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的代码示例可在[https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%202%20Introduction%20to%20Data%20Science/chapter2_datascience.ipynb](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/Chapter%202%20Introduction%20to%20Data%20Science/chapter2_datascience.ipynb)找到。导航到“第
    2 章 数据科学介绍”然后点击 chapter2_datascience.ipynb。代码也以 .py 文件的形式提供，尽管它是笔记本的导出版本。
- en: We will be using JupyterLab ([`https://jupyter.org`](https://jupyter.org)) to
    present all of the code examples.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用 JupyterLab ([https://jupyter.org](https://jupyter.org)) 来展示所有的代码示例。
- en: Data Science
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据科学
- en: “Data science” is quite the popular term and buzzword nowadays, so what exactly
    is it? In recent times, the term “data science” has come to represent a wide range
    of roles and responsibilities. Depending on the company, a data scientist can
    be expected to perform anything from data processing (often at scale, dipping
    into “big data” territory), to statistical analysis and visualization, to training
    and deploying machine learning models. In fact, data scientists often perform
    two or more of these roles at once.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: “数据科学”这个词现在非常流行，那么它究竟是什么呢？最近，术语“数据科学”已经代表了一系列的角色和职责。根据公司不同，数据科学家可能需要执行从数据处理（通常规模较大，涉及“大数据”领域）到统计分析与可视化，再到训练和部署机器学习模型的各种任务。实际上，数据科学家通常一次执行两个或更多这些角色。
- en: This chapter focuses on concepts from all three roles, walking you through the
    process of preparing and analyzing the dataset before you explore the modeling
    aspect in Chapter [3](483137_2_En_3_Chapter.xhtml).
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 本章侧重于三个角色的概念，在您探索第 3 章建模方面之前，引导您准备和分析数据集。
- en: Be advised that this will be a brief, high-level walkthrough over the most relevant
    functionality that these various data science packages offer. Each package is
    so comprehensive that a full book would be required to cover it in depth. Therefore,
    you are encouraged to explore each package’s online documentation, as well as
    other guides and walkthroughs, to learn as much as you can.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，这将对这些各种数据科学包提供的相关功能进行简要、高级的概述。每个包都非常全面，需要一本书来深入探讨。因此，鼓励您探索每个包的在线文档以及其他指南和教程，以尽可能多地学习。
- en: Dataset
  id: totrans-19
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据集
- en: 'A popular introductory dataset for budding data scientists is the Titanic Dataset,
    available at Kaggle: [`https://www.kaggle.com/c/titanic`](https://www.kaggle.com/c/titanic).
    You can also find this dataset hosted on this book’s repository at [`https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/data/train.csv`](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/data/train.csv).'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 对于初露头角的数据科学家来说，泰坦尼克号数据集是一个流行的入门级数据集，可在 Kaggle 上找到：[`https://www.kaggle.com/c/titanic`](https://www.kaggle.com/c/titanic)。你还可以在这个书的存储库中找到这个数据集：[`https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/data/train.csv`](https://github.com/apress/beginning-anomaly-detection-python-deep-learning-2e/blob/master/data/train.csv)。
- en: Kaggle is a great place to find datasets. It also hosts machine learning modeling
    competitions, some of which even have prize money. Kaggle is an excellent resource
    for practicing your skills, and you are encouraged to do so! If you would like
    to practice the concepts that you learn in this book, search Kaggle for various
    anomaly detection datasets.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: Kaggle 是寻找数据集的好地方。它还举办机器学习建模竞赛，其中一些竞赛甚至提供奖金。Kaggle 是练习技能的绝佳资源，鼓励大家去使用！如果你想要练习本书中学到的概念，可以在
    Kaggle 上搜索各种异常检测数据集。
- en: To download the Titanic dataset from the Kaggle web site, follow the instructions
    provided next. If you prefer, Kaggle offers an API that you can install through
    PIP, available at [`https://github.com/Kaggle/kaggle-api`](https://github.com/Kaggle/kaggle-api).
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 要从 Kaggle 网站下载泰坦尼克号数据集，请遵循下面的说明。如果你愿意，Kaggle 提供了一个可以通过 PIP 安装的 API，地址为[`https://github.com/Kaggle/kaggle-api`](https://github.com/Kaggle/kaggle-api)。
