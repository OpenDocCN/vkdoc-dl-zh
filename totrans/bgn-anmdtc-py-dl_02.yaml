  prefs: []
  type: TYPE_TB
- en: '| **0** | 1 | 0 | 3 | Braund, Mr. Owen Harris | male | -0.530377 | NaN | …
    | S |'
  prefs: []
  type: TYPE_TB
- en: '| **1** | 2 | 1 | 1 | Cumings, Mrs. John Bradley (Florence Briggs Th... | female
    | 0.571831 | C85 | … | C |'
  prefs: []
  type: TYPE_TB
- en: '| **2** | 3 | 1 | 3 | Heikkinen, Miss. Laina | female | -0.254825 | NaN | …
    | S |'
  prefs: []
  type: TYPE_TB
- en: '| **3** | 4 | 1 | 1 | Futrelle, Mrs. Jacques Heath (Lily May Peel) | female
    | 0.365167 | C123 | … | S |'
