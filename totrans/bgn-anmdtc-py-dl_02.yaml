- en: 'We can also combine different Boolean conditions and create the exact filtering
    condition we want by using the following operators:'
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
- en: '`&`: The and operator'
  id: totrans-286
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`|`: The or operator'
  id: totrans-287
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`~`: The negation operator'
  id: totrans-288
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To negate a condition, simply use
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  id: totrans-290
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'To join two conditions, make sure each condition is surrounded by parentheses,
    and do either of the following:'
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
- en: '`(condition1) & (condition2)` for and'
  id: totrans-292
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`(condition1) | (condition2)` for or'
  id: totrans-293
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This time, to find all women over the age of 50, let’s run the code in Figure
