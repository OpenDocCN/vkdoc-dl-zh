- en: Notice how the index values are jumbled up after the filtering. Don’t forget
    that you can call `.reset_index(drop=True)` to reset this anytime. The `drop=True`
    means you don’t want the old index to be inserted as a new column into the dataframe
    result.
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
- en: 'If the column contained string values, you can just use the following:'
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  id: totrans-313
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'which grants access to functions like these:'
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
- en: '`df[column].str.contains(pattern)`'
  id: totrans-315
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`df[column].str.startswith(pattern)`'
  id: totrans-316
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`df[column].str.endswith(pattern)`'
  id: totrans-317
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'You can find additional functions here: [`https://pandas.pydata.org/docs/reference/api/pandas.Series.str.capitalize.xhtml`](https://pandas.pydata.org/docs/reference/api/pandas.Series.str.capitalize.xhtml).'
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
- en: You can even apply regex patterns.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
- en: Figure [2-23](#Fig24) shows a selection where we are picking everyone whose
    name contains “Mrs.”.
