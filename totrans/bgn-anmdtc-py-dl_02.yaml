- en: Pandas Correlation Matrix
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'The Pandas correlation matrix tells us the correlation coefficient between
    each combination of columns. A **correlation coefficient** measures the strength
    of a linear relationship between two variables. The correlation coefficient ranges
    from –1 to 1, where:'
  prefs: []
  type: TYPE_NORMAL
- en: A coefficient of 1 indicates that two variables x and y share a perfectly positive
    linear relationship. As x increases by a fixed amount, y also increases by a fixed
    amount. Think of the line y = 2x.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A coefficient of –1 indicates that two variables x and y share a perfectly negative
    linear relationship. As x increases by a fixed amount, y decreases by a fixed
    amount. Think of the line y = –2x.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A coefficient of 0 indicates that there is no measurable linear relationship
    between x and y. It does not mean there isn’t a nonlinear relationship, just that
    there was no linear relationship.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The closer the coefficient is to 1 or –1, the more linearly correlated the two
    variables will be. If you have a correlation coefficient of 0.8, then as x increases,
    y tends to increase as well, just not as reliably or as consistently as if the
    coefficient were 1 instead.
  prefs: []
  type: TYPE_NORMAL
- en: Typically, in a machine learning task, you are using some “feature” variables
    to make a prediction based on some “target” variable. For example, taking cost
    of living, some stock price, interest rate, ZIP code, etc. (feature variables)
    are used to predict housing prices (target variable). More formally, you might
    see feature variables referred to as “explanatory variables” or “predictor variables”
    and see the target variable referred to as the “dependent variable.”
  prefs: []
  type: TYPE_NORMAL
- en: We can use the correlation matrix to determine what predictor variables have
    the highest linear correlation coefficients with the dependent variable. If you
    have some variables with nearly linear correlation with your dependent variable,
    then your prediction task is likely to perform quite well.
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, if multiple explanatory variables have high correlation with each
    other, you’re better off dropping some of them to avoid redundant information.
    For example, if you have someone’s pre-tax salary and post-tax salary as two separate
    variables, you’re not really gaining much information from having both of them
    at once. All you’d be doing is introducing more “noisiness” into the learning
    task and making it harder for the model to learn. Therefore, it can be beneficial
    to drop predictor variables that are highly correlated with one another.
  prefs: []
  type: TYPE_NORMAL
- en: With that out of the way, let’s explore how to generate and view a correlation
    matrix in Pandas. You want to use the method `.corr()`. Feel free to refer to
    the Pandas documentation to look at different ways of generating correlation coefficients,
    which you can specify as a parameter.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [2-61](#Fig62) shows how to do this. First, pick a few numeric columns.
    (Correlation can be computed only between numeric columns. If you want to include
    string columns, you must numerically encode them in some form. We will cover this
    shortly.)
