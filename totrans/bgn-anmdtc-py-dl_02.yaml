- en: Your output will look something like Table [2-35](#Tab35). There are now 43
    columns as a result of the expansion. Keep in mind that your column count may
    explode if you have a lot of categories. You can use the correlation matrix to
    help you trim and drop the column count by eliminating columns that are very poorly
    correlated. But be careful, because a lack of linear correlation does not imply
    there is no nonlinear correlation, and a high correlation may not imply a causation
    either.
  id: totrans-1014
  prefs: []
  type: TYPE_NORMAL
  zh: 你的输出将类似于表 [2-35](#Tab35)。由于扩展，现在有 43 列。请注意，如果你的类别很多，你的列数可能会激增。你可以使用相关矩阵来帮助你通过消除相关性非常差的列来修剪和删除列数。但请注意，缺乏线性相关性并不意味着没有非线性相关性，而且高相关性也不一定意味着有因果关系。
