  type: TYPE_IMG
- en: A Python code uses the get dummies index on d f 2 to prefix the column title.
  id: totrans-899
  prefs: []
  type: TYPE_NORMAL
- en: Figure 2-79
  id: totrans-900
  prefs: []
  type: TYPE_NORMAL
- en: Creating one-hot columns for the ‘Embarked’ column
  id: totrans-901
  prefs: []
  type: TYPE_NORMAL
- en: The output should look like Table [2-29](#Tab29). Notice that null is missing
