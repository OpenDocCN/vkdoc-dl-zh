  - PREF_UL
  type: TYPE_NORMAL
  zh: '`|`: 或运算符'
- en: '`~`: The negation operator'
  id: totrans-288
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`~`: 否定运算符'
- en: To negate a condition, simply use
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 要否定一个条件，只需使用
- en: '[PRE10]'
