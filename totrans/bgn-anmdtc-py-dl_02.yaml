- en: This looks different than how it appeared in Table [2-1](#Tab1), doesn’t it?
    This is because when you select individual columns, the returned result is a pandas
    **Series**, not a dataframe. A Series and a dataframe do contain a lot of shared
    functionality, but they fundamentally differ in some cases. A Series is better
    treated as a more explicitly indexed list of values, while a dataframe is a list
    of lists.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
- en: 'We can pick a single column and get a dataframe result by using the following
