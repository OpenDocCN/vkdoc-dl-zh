  - PREF_UL
  type: TYPE_NORMAL
  zh: '`plt.figure(figsize=(a,b))` 允许你配置图表的大小。参数 `a, b` 指的是图表的宽度和高度（以英寸为单位）。'
- en: '`plt.title(your_title)` lets you add a title to the plot.'
  id: totrans-780
