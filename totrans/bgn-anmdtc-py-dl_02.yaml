  type: TYPE_NORMAL
  zh: 创建一些随机噪声并绘制它
- en: '`plt.plot(sequence)` creates a basic line chart, where `sequence` is some kind
    of iterable like a list or numpy array that holds the data to be plotted. You
    can also pass `plt.plot(seq_x, seq_y)`, but if you pass only one sequence, matplotlib
    implicitly creates a range from zero to the length of the sequence to be used
    along the x axis.'
  id: totrans-759
  prefs: []
  type: TYPE_NORMAL
  zh: '`plt.plot(sequence)` 创建一个基本的折线图，其中 `sequence` 是一种可迭代对象，如列表或NumPy数组，它包含要绘制的数据。您也可以传递
    `plt.plot(seq_x, seq_y)`，但如果只传递一个序列，matplotlib会隐式地创建一个从零到序列长度的范围，用于x轴。'
