- en: If we look only at the column ‘Survived’, we find that ‘Sex’ and ‘Pclass’ are
    the two most strongly correlated values due to those columns having the highest
    magnitude of correlation.
  id: totrans-1007
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们只看‘Survived’列，我们会发现‘Sex’和‘Pclass’是两个最强的相关性值，因为这些列具有最高的相关性幅度。
- en: We also want to make sure that features are not too intercorrelated with one
    another. If this is the case, then we are introducing redundancy, because it’s
    likely more of the same type of information if the correlation is high. If we
    take a look at ‘Family_Count’, ‘SibSp’, and ‘Parch’, the correlation between the
    three is really high. This makes sense considering we directly derived ‘Family_Count’
    from the latter two columns, but this illustrates how ‘Family_Count’ is a redundant
    variable. We can drop ‘Family_Count’ and keep ‘SibSp’ and ‘Parch’ or we can drop
    the latter two and just keep ‘Family_Count’. There are many approaches to take.
  id: totrans-1008
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还想要确保特征之间不是过于相互关联。如果是这样，那么我们引入了冗余，因为如果相关性高，很可能是更多同类型的信息。如果我们看一下‘Family_Count’、‘SibSp’和‘Parch’，这三个变量之间的相关性非常高。考虑到我们直接从后两个列中推导出‘Family_Count’，这是有道理的，但这说明了‘Family_Count’是一个冗余变量。我们可以删除‘Family_Count’并保留‘SibSp’和‘Parch’，或者我们可以删除后两个，只保留‘Family_Count’。有许多方法可以采取。
- en: Finally, let’s try one-hot encoding our columns and see if expanding out the
    categorical features can help us understand the data relation better. Refer to
    Figure [2-86](#Fig87).
