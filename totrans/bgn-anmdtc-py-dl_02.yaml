- en: Scaling and Normalizing
  id: totrans-923
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Scaling/normalizing your data into a common range can be very helpful to facilitating
    the modeling task. Suppose you have two columns, one with a range up to 10,000
    and the other with a range only up to 1\. The model might consider the values
    for the former column much more heavily than the values for the latter column.
    This is purely because adjustments made to the model will reflect much more heavily
    upon the columns with large-magnitude numbers.
  id: totrans-924
  prefs: []
  type: TYPE_NORMAL
- en: If you think of a simple y=mx+b model, where the domain of x includes some massive
    numbers up to the range of 1 million, then incremental updates to the slope m
    even around 0.1 will lead to massive changes in the predicted y-value. Now imagine
    if the domain of x was scaled down to something like (–1, 1) while the distribution
    was kept roughly the same. Incremental updates would no longer lead to large fluctuations
    in the predictions. When multiple columns are all in similar ranges, the learning
    task is much better because the model can make more efficient learning steps to
    fit the data properly.
  id: totrans-925
  prefs: []
  type: TYPE_NORMAL
- en: 'More formally, the perks of scaling and normalization include the following:'
  id: totrans-926
  prefs: []
  type: TYPE_NORMAL
- en: '**Bias reduction**: The model will not be so swayed by outliers or columns
    with large-magnitude values over the rest of the data, which will enable the model
    to more accurately model the data.'
  id: totrans-927
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Stability**: Sometimes, it’s possible for the model’s learning process to
    become unstable and totally diverge (arrive at a bad solution). By normalizing
    the scale of the data, the model’s learning task will be much more straightforward,
    and it might even converge to a better solution.'
  id: totrans-928
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: So how do we scale/normalize data? There are quite a few methods, but two in
    particular are standard scaling (computing z-scores across the column) and min-max
    scaling (scaling the values to a smaller range by using the minimum and maximum
    values found in the column). We will use scikit-learn to help with this.
  id: totrans-929
  prefs: []
  type: TYPE_NORMAL
- en: The following is the formula for Z-Score as used by StandardScaler to rescale
    the values. The variable x is the input, u is the mean of the column, and s is
    the standard deviation of the column.
  id: totrans-930
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ z=\left(x-u\right)/s $$](../images/483137_2_En_2_Chapter/483137_2_En_2_Chapter_TeX_Equa.png)'
  id: totrans-931
  prefs: []
  type: TYPE_IMG
- en: Let’s get started with StandardScaler. Check out the code in Figure [2-81](#Fig82).
  id: totrans-932
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_2_Chapter/483137_2_En_2_Fig82_HTML.png)'
  id: totrans-933
