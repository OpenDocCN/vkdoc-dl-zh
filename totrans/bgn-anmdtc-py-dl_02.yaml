  type: TYPE_TB
- en: 'So how would **.loc** work in this situation? .loc is very similar, but operates
    on direct labels instead of indices. With loc, you have the following:'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  id: totrans-226
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: .loc is inclusive, meaning it also includes the end_label.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
- en: 'Go ahead and try out the following line of code to see how it differs from
    .iloc:'
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  id: totrans-229
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Let’s construct a new index to demonstrate how loc can work with different labels.
    Figure [2-19](#Fig20) shows the code.
  id: totrans-230
