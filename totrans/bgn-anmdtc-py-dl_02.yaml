- en: '`df.head(2)` returns two rows of `df`, which is saved as `df2`. This is then
    saved as a csv to `two_rows.csv`, with the parameter `index=False` passed. This
    parameter tells pandas not to save the index as part of the csv, so an extra column
    is not introduced into the data where there was none before'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: '`df.head(2)` 返回 `df` 的两行，并将其保存为 `df2`。然后，通过传递参数 `index=False` 将其保存为 `two_rows.csv`。此参数告诉
    pandas 不要将索引作为 csv 的一部分保存，因此不会在之前没有索引的数据中引入额外的列'
- en: The parameter **index=False** tells pandas to not save the dataframe index to
    the csv. Pandas creates an index when you load in data, which you can override
    with a custom index if it is relevant. You can change this to `index=True` (which
    is the default) and see how that changes the csv output.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 参数 **index=False** 告诉 pandas 不要将 dataframe 索引保存到 csv 中。当您加载数据时，pandas 会创建索引，如果您需要，可以覆盖为自定义索引。您可以将此更改为
    `index=True`（这是默认值）并查看这如何更改 csv 输出。
