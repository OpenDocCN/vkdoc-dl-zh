  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: numpy==1.22.2
- en: scikit-learn==1.2.2
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: scikit-learn==1.2.2
- en: matplotlib==3.7.1
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: matplotlib==3.7.1
- en: It is not necessary to have the exact same versions, but keep in mind that older
    versions may not contain features we explore later in the book. Newer versions
    should be fine unless they are significantly more recent, which might result in
    reworked syntax or features and thus introduce incompatibility.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 不必拥有完全相同的版本，但请记住，较旧的版本可能不包含我们在本书后面探索的功能。新版本应该没问题，除非它们非常新，这可能会导致重新设计的语法或功能，从而引入不兼容性。
- en: You can easily check the version in Python. Figure [2-3](#Fig3) introduces code
