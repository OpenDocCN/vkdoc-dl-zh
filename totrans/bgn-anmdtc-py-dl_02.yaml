- en: 'So how would **.loc** work in this situation? .loc is very similar, but operates
    on direct labels instead of indices. With loc, you have the following:'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，在这种情况下 **.loc** 会如何工作呢？.loc 非常相似，但它操作的是直接标签而不是索引。使用 loc，你有以下这些：
- en: '[PRE5]'
  id: totrans-226
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: .loc is inclusive, meaning it also includes the end_label.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: .loc 是包含的，这意味着它也包括结束标签。
- en: 'Go ahead and try out the following line of code to see how it differs from
    .iloc:'
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试以下代码行，看看它与 .iloc 有何不同：
- en: '[PRE6]'
  id: totrans-229
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
