- en: Data Saving
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: To save your dataset, call `df.to_csv(save_path)`, where `save_path` is a variable
    that contains a string path to where you want to save the dataframe. (There are
    many other output formats available besides csv.) As an example, run the code
    shown in Figure [2-9](#Fig9).
