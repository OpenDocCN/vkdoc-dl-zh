- en: Note
  id: totrans-776
  prefs: []
  type: TYPE_NORMAL
- en: With this basic amount of configuration, we can freely plot anything we’d like
    to in later sections. Examples include plotting the loss curves of multiple different
    models (visually evaluating model performances against one another) or just evaluating
    two time Series plots side by side. An example of this would be plotting your
    time Series predictions vs. the actual time Series data for a certain month.
  id: totrans-777
  prefs: []
  type: TYPE_NORMAL
- en: 'The following list describes the code in Figure [2-64](#Fig65):'
  id: totrans-778
  prefs: []
  type: TYPE_NORMAL
- en: '`plt.figure(figsize=(a,b))` lets you configure the size of the plot. The parameters
    `a, b` refer to the width and height in inches of the plot.'
  id: totrans-779
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`plt.title(your_title)` lets you add a title to the plot.'
  id: totrans-780
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`plt.xlabel(xlabel_string)` and `plt.ylabel(ylabel_string)`, respectively,
    let you add a label to the x and y axes.'
  id: totrans-781
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`plt.legend(list_of_names)` lets you add a legend. The list of string names
    must correspond to the chronological order of plots.'
  id: totrans-782
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Scatter Plot
  id: totrans-783
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: You can also graph other types of plots, such as a scatter plot. Figure [2-66](#Fig67)
    shows you how to create a scatter plot. Scatter plots are useful when you want
    to just get a sense of how the data is distributed against each other on various
    columns. For example, you can look at housing prices vs. ZIP codes to get a sense
    of the distribution of data across each ZIP code.
  id: totrans-784
