    between the entire column for both of them at once. This is how to perform a vectorized
    operation
  prefs: []
  type: TYPE_NORMAL
- en: With that, let’s move on to aggregate functions. Aggregate functions are functions
    that perform some type of computation on the entire column to reduce it to one
    number.
  prefs: []
  type: TYPE_NORMAL
- en: Simple aggregates are functions like `.sum()`, `.mean()`, `.std()`, `.min()`,
    and `.max()`, all of which can be applied to a pandas Series or a pandas dataframe.
