- en: Let’s perform a default join without specifying how we want to join the two
    dataframes. By default, Pandas performs an inner join, which zips up the rows
    where we specify (using the `on=` parameter) and orders them by the left dataframe’s
    order. When we refer to left and right dataframes, we are joining the dataframe
    we call “right” to the dataframe on the “left.” For certain join methods like
    left join, it’s important which dataframe is left and which is right. In a left
    join specifically, all rows from the left dataframe are preserved, and columns
    from the right dataframe are appended to these rows only if they are matching
    entries. Otherwise, a null value is inserted for columns being added on the right
    for nonmatching rows.. Refer to Figure [2-46](#Fig47) to see the inner join code
    on the column PassengerId.
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们执行一个默认的连接，不指定我们想要如何连接两个数据框。默认情况下，Pandas执行内部连接，将我们指定的行（使用`on=`参数）压缩起来，并按左侧数据框的顺序排序。当我们提到左侧和右侧数据框时，我们是在将我们称为“右侧”的数据框连接到“左侧”的数据框上。对于某些连接方法，如左连接，哪个是左侧哪个是右侧很重要。在左连接中，保留左侧数据框的所有行，并且只有当它们是匹配条目时，才将这些行附加到右侧数据框的列上。否则，对于不匹配的行，在右侧添加的列将插入空值。请参阅图2-46以查看PassengerId列上的内部连接代码。
