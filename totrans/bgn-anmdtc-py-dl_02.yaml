- en: '**iloc** is integer-based indexing and operates the same as how you’d index
    lists. *Integer-based indexing* means that rows are selected by their integer
    position starting from the first row, which is zero-indexed. So to pick the first
    row, we have to select the index 0, just like a list.'
  prefs: []
  type: TYPE_NORMAL
- en: '**iloc** also allows us to select columns. The general format of iloc is'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: where the start and end indices are integers. This is called *slicing*, where
    we specify what kind of “slice” of the DataFrame we want with these indices. In
    Python lists, you cannot slice columns this way if you have a multidimensional
    list (list of lists, where each list has several entries), but in pandas (and
    numpy) you can slice like this.
  prefs: []
  type: TYPE_NORMAL
- en: '**loc** is different, as it is more label-based indexing. Slicing is done explicitly
    according to the index values. This is where the index comes into play. You may
    have noticed the unnamed column on the leftmost side of these table outputs—this
    is the index, and pandas zero-indexes it by default. You can change this and even
    name the column, which will be demonstrated shortly.'
  prefs: []
  type: TYPE_NORMAL
