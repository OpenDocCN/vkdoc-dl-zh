- en: Sorting
  id: totrans-351
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Sometimes, you will find that it is important to sort your data, whether you
    are matching dataframes with different indices by a specific sorted order of rows,
    or are sorting a time-Series dataframe by increasing time.
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
- en: 'You can simply use the following convention:'
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  id: totrans-354
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: If you pass nothing but `column`, pandas by default assumes `ascending=True`.
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
- en: Figure [2-26](#Fig27) shows the code for sorting by the column ‘Fare’ in ascending
    order (low to high).
