- en: Before we start selecting anything, don’t forget that pandas is **case-sensitive**,
    meaning you must match the column name exactly as what is in the dataframe to
    pick that same column.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
- en: Let’s pick the column ‘Name’ and select this column. The best convention for
    picking individual dataframes (since it accounts for columns with spaces) is to
    run `df[column_name]`, where `column_name` is a string containing some column
    name that is present in the dataframe. Run the code shown in Figure [2-13](#Fig14)
    to select the first two rows of the Name column.
