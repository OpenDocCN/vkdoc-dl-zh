- en: If you ever want to reset the index back into a zero-indexed form, just call
    `df.reset_index(drop=True)`, where `df` is a stand-in for any dataframe result.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
- en: 'You could use the following:'
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  id: totrans-260
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: This will show the same as Table [2-8](#Tab8) except that the indices are 0,
    1, 2 on the left. The `drop=True` means you don’t want the old index to be inserted
    as a new column into the dataframe result, which Pandas would do by default otherwise.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
- en: With that, you have the basics of selecting rows and columns in Pandas.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
- en: Filtering
  id: totrans-263
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Filtering allows you to pick rows that satisfy certain conditions. This is useful
    if you want to pick out rows pertaining to individuals above a certain minimum
    age, who are married, whose statuses are one of several possible categories, and
    so forth.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
- en: At its core, the way filtering works is
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  id: totrans-266
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: This `boolean_list` is simply a list of true or false values with a total length
    matching the length of `df`. If this `boolean_list` is a pandas Series, then it
    also has the corresponding index for each Boolean value. If the Boolean value
    is `True`, pandas will keep the row in the resulting dataframe. If it is `False`,
    then this row is not included.
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
- en: 'Go ahead and try the following line of code to develop an intuition for what
    is going on under the hood:'
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  id: totrans-269
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: We are “filtering” the `df.head()` result manually by passing a hard-coded Boolean
    list.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
- en: With that being said, recall that something like `df['Name']` produces a pandas
    Series result. If you try something like `df['Age'] > 50`, you will see that the
    result is a Series of Boolean values. Using this same intuition, let’s first start
    with a basic filter by selecting everyone over the age of 50, as shown in Figure
    [2-21](#Fig22).
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/483137_2_En_2_Chapter/483137_2_En_2_Fig22_HTML.png)'
  id: totrans-272
  prefs: []
  type: TYPE_IMG
- en: A one-line Python code reads d f open square bracket d f, Age in quotes close
    square bracket greater than 50 close square bracket dot head, open and close parentheses.
