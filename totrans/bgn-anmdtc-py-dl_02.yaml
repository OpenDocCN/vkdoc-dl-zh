- en: Bar Graph
  id: totrans-806
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 柱状图
- en: A bar graph is very useful for displaying the data over multiple categories.
    For example, you can display how many anomalies you have and how many normal data
    points you have in a dataset, if you know that information. The code in Figure
    [2-70](#Fig71) displays the male to female data frequencies using a bar chart.
  id: totrans-807
  prefs: []
  type: TYPE_NORMAL
  zh: 柱状图非常适合显示多个类别中的数据。例如，如果您知道信息，您可以显示数据集中有多少异常值和多少正常数据点。图 [2-70](#Fig71) 中的代码使用柱状图显示了男性和女性的数据频率。
