    differently or symmetrically, etc.?'
  prefs: []
  type: TYPE_NORMAL
- en: 'Exercise 4.3: How does the use of the Joints panel highlight the need for a
    controller and driver for the differential-wheeled system? Why can we not develop
    a differential driver within Rviz?'
  prefs: []
