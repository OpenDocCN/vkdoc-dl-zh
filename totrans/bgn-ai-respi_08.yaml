- en: Interactive Python session
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 交互式Python会话
- en: I have included several debug print statements in the ANN script, which allows
    for a direct comparison between the initial weight matrices and the updated ones.
    You should see there are only small changes between them, which is what was expected
    and desired. It is an important fact that the gradient descent works well using
    small increments to avoid missing the global minimum. I could only do one iteration
    in this session because the code was not set up for multiple iterations.
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 我在ANN脚本中包含了一些调试打印语句，这允许直接比较初始权重矩阵和更新后的矩阵。你应该看到它们之间只有微小的变化，这正是预期和希望的。一个重要的事实是，梯度下降通过使用小的增量来避免错过全局最小值而工作得很好。在这个会话中，我只能进行一次迭代，因为代码没有设置为多迭代。
- en: Congratulations for staying with me to this point! I covered a lot of topics
    concerning both ANN fundamentals and implementations. You should now be fully
    prepared to understand and appreciate the interesting practical ANN demonstrations
    presented in the next chapter.
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 恭喜你一直跟随着我到这一点！我涵盖了关于ANN基础和实现的大量主题。你现在应该已经完全准备好理解和欣赏下一章中展示的有趣的实用ANN演示了。
- en: Summary
  id: totrans-373
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: This was the third of four chapters concerning artificial neural networks (ANNs).
    In this chapter, I focused on deep learning, which is really nothing more than
    the fundamentals and concepts behind multilayer ANNs.
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 这是关于人工神经网络（ANNs）的四个章节中的第三个。在本章中，我专注于深度学习，这实际上不过是多层ANN背后的基础和概念。
- en: After a brief review of some fundamentals, I completed a step-by-step manual
    calculation of a two-layer, six-node ANN. I subsequently redid the calculations
    using a Python script.
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 在简要回顾了一些基础知识之后，我逐步手动计算了一个两层、六个节点的ANN。随后，我使用Python脚本重新进行了这些计算。
- en: Next were the calculations for a larger, three-layer, nine-node ANN. Those calculations
    were done entirely with Python and matrix algorithms imported from the numpy library.
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来是对一个更大、三层、九节点的ANN的计算。这些计算完全使用Python和从numpy库导入的矩阵算法完成。
- en: I discussed the errors that exist within an untrained ANN and how they are propagated.
    This was important to understand because it serves as the basis for the back propagation
    technique used to adjust weights in an effort to optimize the ANN.
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: 我讨论了未训练的ANN中存在的错误以及它们是如何传播的。了解这一点很重要，因为它构成了用于调整权重以优化ANN的逆向传播技术的基础。
- en: Next, I went through a complete back propagation example, which illustrated
    how weights could be updated to reduce overall network errors. A sidebar followed
    wherein the gradient descent (GD) technique was introduced using a linear regression
    example.
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我进行了一个完整的反向传播示例，说明了如何更新权重以减少整体网络错误。随后是一个侧边栏，其中介绍了使用线性回归示例的梯度下降（GD）技术。
- en: A discussion involving the application of GD to an example ANN followed. The
    GD algorithm uses the slope of the error function in an effort to locate a global
    minimum, which is necessary to achieve a well-performing ANN.
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来是对将梯度下降（GD）算法应用于示例ANN的应用进行了讨论。GD算法通过尝试找到全局最小值来使用误差函数的斜率，这对于实现性能良好的ANN是必要的。
- en: I provided a complete example illustrating how to update weights using the GD
    algorithm. Issues with ANN learning and initial weight selection were discussed.
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 我提供了一个完整的示例，说明了如何使用GD算法更新权重。讨论了ANN学习和初始权重选择的问题。
- en: The chapter concluded with a thorough example of a Python script that initializes
    and trains any sized ANN.
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 本章以一个详尽的Python脚本为例结束，该脚本初始化并训练任何大小的人工神经网络（ANN）。
