- en: '8. Machine Learning: Deep Learning'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 8. 机器学习：深度学习
- en: This is the third chapter in the series on machine learning. The focus is on
    generalized artificial neural networks (ANNs) . Covering this topic requires an
    extensive background discussion containing a fair amount of math, so be forewarned.
    The Python implementation on the Raspberry Pi also takes a good deal of discussion.
    I try my best to keep it all interesting and to the point.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 这是机器学习系列的第三章。重点是广义人工神经网络（ANNs）。涵盖这个主题需要大量的背景讨论，其中包含相当数量的数学内容，所以请提前做好准备。在Raspberry
    Pi上的Python实现也需要大量的讨论。我尽力保持所有内容既有趣又切中要点。
- en: Let’s start with a brief review of some fundamentals, and then move on to some
    calculations for a larger three-layer, nine-node ANN using Python and matrix algorithms
    imported from the numpy library. You’ll also look at some propagation examples,
    which is followed by a discussion on gradient descent (GD) .
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从一些基本概念简要回顾开始，然后转向使用Python和从numpy库导入的矩阵算法对更大规模的三层九节点ANN进行计算。你还将查看一些传播示例，随后是对梯度下降（GD）的讨论。
- en: Two demonstrations are provided later in this chapter. The first one shows you
    how to create an untrained ANN. The second demonstration shows you how to train
    an ANN to generate useful results. Several practical ANN demonstrations using
    the techniques presented in this chapter are shown in Chapter [9](A436848_1_En_9_Chapter.html).
    There is simply too much ANN content to present in a single chapter.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 本章后面提供了两个演示。第一个演示展示了如何创建一个未训练的ANN。第二个演示展示了如何训练一个ANN以生成有用的结果。本章[9](A436848_1_En_9_Chapter.html)中展示了使用本章介绍的技术进行的几个实际ANN演示。ANN内容实在太多，无法在一个章节中全部展示。
- en: When you complete this chapter, you will have gained a good amount of theoretical
    and practical knowledge on how to create a useful ANN.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 当你完成本章学习后，你将获得大量关于如何创建有用ANN的理论和实践知识。
- en: Generalized ANN
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 广义ANN
- en: At this point in the book, I have covered quite a bit on the subject of ANN,
    but there is still a considerable amount to discuss. What should be clear to you
    at this stage in the book is that an ANN is a mathematical representation or model
    of the many neurons and their interconnections in a human brain. ANN basics were
    discussed in Chapter [2](A436848_1_En_2_Chapter.html). I introduced you to a specialized
    ANN in Chapter [7](A436848_1_En_7_Chapter.html) that was well suited for a fairly
    simple robotic application. However, the field of ANNs is quite broad and there
    is still much to cover.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，本书已经对ANN主题进行了相当多的讨论，但仍有许多内容需要探讨。在本书的这一阶段，你应该清楚的是，ANN是人类大脑中许多神经元及其相互连接的数学表示或模型。ANN基础知识在第二章[2](A436848_1_En_2_Chapter.html)中进行了讨论。我在第七章[7](A436848_1_En_7_Chapter.html)中介绍了一种专门化的ANN，它非常适合简单的机器人应用。然而，ANN领域非常广泛，还有很多内容需要覆盖。
- en: In this chapter’s title, I used the phrase deep learning, which I also briefly
    mentioned in Chapter [2](A436848_1_En_2_Chapter.html). Deep learning is commonly
    used by AI practitioners to refer to multilayer ANNs, which are able to learn
    by having repeated training data sets applied to them. Figure [8-1](#Fig1) shows
    a three-layer ANN.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章的标题中，我使用了“深度学习”这个短语，我在第二章[2](A436848_1_En_2_Chapter.html)中也简要提到了它。深度学习是AI从业者常用术语，指多层人工神经网络（ANNs），它们能够通过反复应用训练数据集来学习。图[8-1](#Fig1)展示了一个三层ANN。
- en: '![A436848_1_En_8_Fig1_HTML.jpg](A436848_1_En_8_Fig1_HTML.jpg)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_8_Fig1_HTML.jpg](A436848_1_En_8_Fig1_HTML.jpg)'
- en: Figure 8-1.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-1。
- en: Three-layer ANN
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 三层ANN
- en: The following explains the layers shown in Figure [8-1](#Fig1).
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 下文将解释图[8-1](#Fig1)中显示的层。
- en: 'Input: Inputs are applied to this layer.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入：输入应用于这一层。
- en: 'Hidden: All layers that are not classified as input or output are hidden.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 隐藏：所有未被分类为输入或输出的层都是隐藏的。
- en: 'Output: Outputs appear at this layer.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输出：输出出现在这一层。
- en: All the neurons or nodes are interconnected to each other, layer by layer. This
    means that the input layer connects to all the nodes in the first hidden layer.
    Likewise, all the nodes in the last hidden layer connect to the output nodes.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 所有神经元或节点都是逐层相互连接的。这意味着输入层连接到第一隐藏层中的所有节点。同样，最后一隐藏层中的所有节点都连接到输出节点。
- en: I have also referred to this network configuration as a generalized ANN to differentiate
    from the Hopfield network, which is a special case from the general. The Hopfield
    network only consists of a single layer where all the nodes serve as both inputs
    and outputs, and there are no hidden layers. From this point on when I speak of
    an ANN, I am referring to the generalized type with multiple layers.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我还把这个网络配置称为广义ANN，以区别于霍普菲尔德网络，后者是广义的一个特殊情况。霍普菲尔德网络只由单层组成，其中所有节点都作为输入和输出，没有隐藏层。从现在开始，当我提到ANN时，我指的是具有多个层的广义类型。
- en: 'There are two broad categories for ANNs:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: ANN有两种广泛的类别：
- en: 'FeedForward: Data flow is unidirectional. Nodes send data from one layer to
    the next one.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 前馈：数据流是单向的。节点将数据从一层发送到下一层。
- en: 'Feedback: Data is bidirectional using feedback loops.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 反馈：使用反馈回路实现双向数据。
- en: Figure [8-2](#Fig2) shows models for both of these ANN types.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 图[8-2](#Fig2)显示了这两种ANN类型的模型。
- en: '![A436848_1_En_8_Fig2_HTML.jpg](A436848_1_En_8_Fig2_HTML.jpg)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_8_Fig2_HTML.jpg](A436848_1_En_8_Fig2_HTML.jpg)'
- en: Figure 8-2.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-2。
- en: FeedForward and Feedback ANN models
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 前馈和反馈人工神经网络（ANN）模型
- en: An input to an ANN is just a pattern of numbers that propagate through the network
    where each node sums the inputs and if the sum exceeds a threshold value causes
    the node to fire and output a number to the next connected node. The connection
    strength between nodes is known as the weighting , as I have previously described
    in the Hopfield network. Determining the weight values is the key element in how
    an ANN learns. ANN learning usually happens when many training data sets are applied
    to the network. These training data sets contain both input and output data. The
    input data creates output data, which is then compared to the true output data
    with error results created when the values do not agree. This error data is consequently
    feedback through the ANN and the weights adjusted in an incremental fashion in
    accordance with a pre-programmed learning algorithm. Over many training cycles,
    often thousands, the ANN is trained to compute the desired output for a given
    input. This learning technique is called back propagation .
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: ANN的输入只是一个通过网络的数字模式，每个节点将输入求和，如果总和超过阈值值，则节点会触发并输出一个数字到下一个连接的节点。节点之间的连接强度称为权重，正如我在之前的霍普菲尔德网络中描述的那样。确定权重值是ANN学习的关键元素。ANN学习通常发生在将许多训练数据集应用于网络时。这些训练数据集包含输入和输出数据。输入数据创建输出数据，然后与真实输出数据进行比较，当值不一致时会产生错误结果。这些错误数据随后通过ANN反馈，并根据预编程的学习算法以增量方式调整权重。在许多训练周期中，通常是数千次，ANN被训练来计算给定输入的期望输出。这种学习技术称为反向传播。
- en: Figure [8-3](#Fig3) shows a three-layer ANN with all the associated weights
    interconnecting the nodes. The weights are shown in a w[i,j] notation where i
    is the source node and j is the receiving or destination node. The stronger the
    weight the more the source node affects the destination node. Of course, the reverse
    is also true.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 图[8-3](#Fig3)显示了所有相关权重将节点相互连接的三层ANN。权重以w[i,j]的表示形式显示，其中i是源节点，j是接收或目标节点。权重越强，源节点对目标节点的影响就越大。当然，反之亦然。
- en: '![A436848_1_En_8_Fig3_HTML.jpg](A436848_1_En_8_Fig3_HTML.jpg)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_8_Fig3_HTML.jpg](A436848_1_En_8_Fig3_HTML.jpg)'
- en: Figure 8-3.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-3。
- en: Three-layer ANN with weights
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 带权重的三层ANN
- en: If you examine Figure [8-3](#Fig3) closely, you see that not all layer-to-layer
    nodes are interconnected. For instance, input layer node 1 has no connection with
    hidden layer node 3\. This can be remedied if it is determined that the network
    cannot be adequately trained. Adding more node-to-node connections is quite easy
    to do using matrix operations, as you will see shortly. Adding more connections
    does no real harm because the connection weights are adjusted. The network is
    trained to the point where unnecessary connections are assigned a 0 weighting
    value, which effectively removes them from the network.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你仔细检查图[8-3](#Fig3)，你会看到并非所有层与层之间的节点都是相互连接的。例如，输入层节点1与隐藏层节点3没有连接。如果确定网络无法得到充分的训练，这种情况是可以得到改善的。通过矩阵运算添加更多的节点到节点连接是相当容易的，正如你很快就会看到的。添加更多的连接并不会造成真正的伤害，因为连接权重会被调整。网络被训练到不需要的连接被分配0权重值，从而有效地从网络中移除。
- en: At this point, it is useful to actually follow a signal path through a simplified
    ANN so that that you have a good understanding of the inner workings of this type
    of network. I use a very simple two-layer, four-node network for this example
    because it more than suffices for this purpose. Figure [8-4](#Fig4) shows this
    network, which only consists of one input and one output layer. No hidden layers
    are necessary in this ANN.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一点上，实际跟随一个信号路径通过简化的 ANN 是有用的，这样你就能很好地理解这种网络的内部工作原理。我使用一个非常简单的两层、四个节点的网络来进行这个例子，因为它完全满足这个目的。图
    [8-4](#Fig4) 显示了这个网络，它只包含一个输入层和一个输出层。在这个 ANN 中不需要隐藏层。
- en: '![A436848_1_En_8_Fig4_HTML.jpg](A436848_1_En_8_Fig4_HTML.jpg)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_8_Fig4_HTML.jpg](A436848_1_En_8_Fig4_HTML.jpg)'
- en: Figure 8-4.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-4.
- en: Two-layer ANN
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 两层 ANN
- en: Now, let’s assign the following values to the inputs and weights shown in Figure
    [8-4](#Fig4), as listed in Table [8-1](#Tab1).
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们将图 [8-4](#Fig4) 中所示输入和权重赋予以下值，如表 [8-1](#Tab1) 所列。
- en: Table 8-1.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 表 8-1.
- en: Input and Weight Values for Example ANN
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 示例人工神经网络（ANN）的输入和权重值
- en: '| Symbol | Value |'
  id: totrans-37
  prefs: []
  type: TYPE_TB
  zh: '| 符号 | 值 |'
- en: '| --- | --- |'
  id: totrans-38
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| in1 | 0.8 |'
  id: totrans-39
  prefs: []
  type: TYPE_TB
  zh: '| in1 | 0.8 |'
- en: '| in2 | 0.4 |'
  id: totrans-40
  prefs: []
  type: TYPE_TB
  zh: '| in2 | 0.4 |'
- en: '| w[1,1] | 0.8 |'
  id: totrans-41
  prefs: []
  type: TYPE_TB
  zh: '| w[1,1] | 0.8 |'
- en: '| w[1,2] | 0.1 |'
  id: totrans-42
  prefs: []
  type: TYPE_TB
  zh: '| w[1,2] | 0.1 |'
- en: '| w[2,2] | 0.4 |'
  id: totrans-43
  prefs: []
  type: TYPE_TB
  zh: '| w[2,2] | 0.4 |'
- en: '| w[2,1] | 0.9 |'
  id: totrans-44
  prefs: []
  type: TYPE_TB
  zh: '| w[2,1] | 0.9 |'
- en: These values were selected randomly and do not represent nor model any physical
    situation. Often times, weights are randomly assigned with the intention that
    it is easier to promote a rapid convergence to an optimal, trained solution. With
    so few inputs and weights involved, I did not see it as an issue to omit a diagram
    with these real values. You can easily scribble out a diagram with the values
    if that helps you understand the following steps.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 这些值是随机选择的，不代表也不模拟任何物理情况。通常，权重是随机分配的，目的是更容易促进快速收敛到最优、训练好的解。由于涉及到的输入和权重很少，我认为省略这些实际值的图不是问题。如果你需要，可以轻松地画出带有这些值的图来帮助你理解以下步骤。
- en: I start the calculation with node 1 in layer 2 because there are no modifications
    that take place between the data input and the input nodes. The input nodes exist
    as a convenience for network computations. There is no weighting directly applied
    by the input layer nodes to the data input set. Recall from Chapter [2](A436848_1_En_2_Chapter.html)
    that the node sums all the weighted inputs from all of its interconnected nodes.
    In this case, node 1 in layer 2 has inputs from both nodes in layer 1\. The weighted
    sum is therefore
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 我从层 2 的节点 1 开始计算，因为没有在数据输入和输入节点之间发生任何修改。输入节点存在是为了方便网络计算。输入层节点没有直接应用于数据输入集的权重。回想一下第
    [2](A436848_1_En_2_Chapter.html) 章的内容，节点会汇总所有来自其相互连接节点的加权输入。在这种情况下，层 2 的节点 1 有来自层
    1 中两个节点的输入。因此，加权总和是
- en: w[1,1] * in1 + w[2,1] * in2 = 0.8 * 0.8 + 0.9 * 0.4 = 0.64 + 0.36 = 1.00
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: w[1,1] * in1 + w[2,1] * in2 = 0.8 * 0.8 + 0.9 * 0.4 = 0.64 + 0.36 = 1.00
- en: 'Let’s next assume that the activation function is the standard sigmoid expression
    that I also described in Chapter [2](A436848_1_En_2_Chapter.html). The sigmoid
    equation is:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，假设激活函数是标准的 sigmoid 表达式，我在第 [2](A436848_1_En_2_Chapter.html) 章中也描述了它。sigmoid
    方程是：
- en: '![$$ y = 1/\left(1 + {e}^{- x}\right) $$](A436848_1_En_8_Chapter_IEq1.gif)
    where e = math constant 2.71828…'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '![y = 1/(1 + e^(-x))](A436848_1_En_8_Chapter_IEq1.gif) 其中 e = 数学常数 2.71828…'
- en: 'With x = 1.0, this equation becomes:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 当 x = 1.0 时，这个方程变为：
- en: '![$$ y = 1/\left(1 + {e}^{-1}\right) $$](A436848_1_En_8_Chapter_IEq2.gif) =
    1/(1.3679) = 0.7310 or out1 = 0.7310'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '![y = 1/(1 + e^(-1))](A436848_1_En_8_Chapter_IEq2.gif) = 1/(1.3679) = 0.7310
    或 out1 = 0.7310'
- en: 'Repeating the preceding steps for the other node in layer 2 yields the following:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 对层 2 中的其他节点重复前面的步骤，得到以下结果：
- en: w[2,2] * in2 + w[1,2] * in1 = 0.4*0.4 + 0.1*0.8 = 0.16 + 0.08 = 0.24
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: w[2,2] * in2 + w[1,2] * in1 = 0.4*0.4 + 0.1*0.8 = 0.16 + 0.08 = 0.24
- en: 'Letting x = 0.24 yields this:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 令 x = 0.24 得到这个结果：
- en: '![$$ y = 1/\left(1 + {e}^{-0.24}\right) $$](A436848_1_En_8_Chapter_IEq3.gif)
    = 1/(1.7866) = 0.5597 or out2 = 0.5597'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '![y = 1/(1 + e^(-0.24))](A436848_1_En_8_Chapter_IEq3.gif) = 1/(1.7866) = 0.5597
    或 out2 = 0.5597'
- en: 'The two ANN outputs have now been determined for the specific input data set.
    This was a fair amount of manual calculations to perform for this extremely simple
    two-layer, four-node ANN. I believe you can easily see that it is nearly impossible
    to manually perform these calculations on much larger networks without generating
    errors. That is where the computer excels in performing these tedious calculations
    without error for large ANNs with many layers. I used numpy matrices in the last
    chapter when doing the Hopfield network multiplications and dot products. Similar
    matrix operations are applied to this network. The input vector for this example
    is just the two values: in1 and in2\. They are expressed in a vector format as'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 对于特定的输入数据集，现在已经确定了两个 ANN 的输出。对于这个极其简单的两层、四个节点的 ANN，进行大量手动计算是合理的。我相信你可以很容易地看出，在没有产生错误的情况下，手动进行这些计算在更大的网络上几乎是不可能的。这正是计算机在执行这些繁琐计算时表现出色的地方，尤其是在大型、多层
    ANN 中。我在上一章中使用 numpy 矩阵进行 Hopfield 网络的乘法和点积。类似的矩阵操作也应用于这个网络。这个示例的输入向量只是两个值：in1
    和 in2。它们以向量格式表示如下
- en: '![$$ \left\{\begin{array}{c}\hfill in1\hfill \\ {}\hfill in2\hfill \end{array}\right\}
    $$](A436848_1_En_8_Chapter_Equa.gif)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \left\{\begin{array}{c}\hfill in1\hfill \\ {}\hfill in2\hfill \end{array}\right\}
    $$](A436848_1_En_8_Chapter_Equa.gif)'
- en: 'Likewise, the following is the weighting matrix:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，以下是这个权重矩阵：
- en: '![$$ \left\{\begin{array}{cc}\hfill {w}_{1,1}\hfill & \hfill {w}_{1,2}\hfill
    \\ {}\hfill {w}_{2,1}\hfill & \hfill {w}_{2,2}\hfill \end{array}\right\} $$](A436848_1_En_8_Chapter_Equb.gif)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \left\{\begin{array}{cc}\hfill {w}_{1,1}\hfill & \hfill {w}_{1,2}\hfill
    \\ {}\hfill {w}_{2,1}\hfill & \hfill {w}_{2,2}\hfill \end{array}\right\} $$](A436848_1_En_8_Chapter_Equb.gif)'
- en: Figure [8-5](#Fig5) shows these matrix operations being applied in an interactive
    Python session. Notice that it only takes a few statements to come up with exactly
    the same results as was done with the manual calculations.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [8-5](#Fig5) 展示了这些矩阵操作在一个交互式 Python 会话中的应用。请注意，只需几条语句就能得到与手动计算完全相同的结果。
- en: '![A436848_1_En_8_Fig5_HTML.jpg](A436848_1_En_8_Fig5_HTML.jpg)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_8_Fig5_HTML.jpg](A436848_1_En_8_Fig5_HTML.jpg)'
- en: Figure 8-5.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-5.
- en: Interactive Python session
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 交互式 Python 会话
- en: The next example involves a larger ANN that is handled entirely by a Python
    script.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个示例涉及一个更大的 ANN，它完全由 Python 脚本处理。
- en: Larger ANN
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 更大的 ANN
- en: This example involves a three-layer ANN that has three nodes in each layer.
    The ANN model is shown in Figure [8-6](#Fig6) with an input data set and a portion
    of the weighting values in an effort not to obscure the diagram.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 这个示例涉及一个有三层、每层有三个节点的 ANN。ANN 模型如图 [8-6](#Fig6) 所示，其中包含输入数据集和部分权重值，以避免模糊图示。
- en: '![A436848_1_En_8_Fig6_HTML.jpg](A436848_1_En_8_Fig6_HTML.jpg)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_8_Fig6_HTML.jpg](A436848_1_En_8_Fig6_HTML.jpg)'
- en: Figure 8-6.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-6.
- en: Larger ANN
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 更大的 ANN
- en: 'Let’s start with the input data set as that is quite simple. This is shown
    in a vector format as follows:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从输入数据集开始，因为它相当简单。如下以向量格式表示：
- en: '![$$ \mathrm{input}\kern0.5em =\kern0.5em \left\{\begin{array}{c}\hfill 0.8\hfill
    \\ {}\hfill 0.2\hfill \\ {}\hfill 0.7\hfill \end{array}\right\} $$](A436848_1_En_8_Chapter_Equc.gif)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \mathrm{input}\kern0.5em =\kern0.5em \left\{\begin{array}{c}\hfill 0.8\hfill
    \\ {}\hfill 0.2\hfill \\ {}\hfill 0.7\hfill \end{array}\right\} $$](A436848_1_En_8_Chapter_Equc.gif)'
- en: There are two weighting matrices in this example. One is needed to represent
    the weights between the input layer (wtg[ih]) and the hidden layer and the other
    for the weights between the hidden layer and the output layer (wtg[ho]). The weights
    are randomly assigned as was done for the previous examples.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中有两个权重矩阵。一个用于表示输入层（wtg[ih]）和隐藏层之间的权重，另一个用于表示隐藏层和输出层之间的权重（wtg[ho]）。权重像之前的示例一样随机分配。
- en: '![$$ {\mathrm{wtg}}_{\mathrm{ih}}=\left\{\begin{array}{ccc}\hfill {w}_{1,1}\hfill
    & \hfill {w}_{1,2}\hfill & \hfill {w}_{1,3}\hfill \\ {}\hfill {w}_{2,1}\hfill
    & \hfill {w}_{2,2}\hfill & \hfill {w}_{2,3}\hfill \\ {}\hfill {w}_{3,1}\hfill
    & \hfill {w}_{3,2}\hfill & \hfill {w}_{3,3}\hfill \end{array}\right\}=\left\{\begin{array}{ccc}\hfill
    0.8\hfill & \hfill 0.6\hfill & \hfill 0.3\hfill \\ {}\hfill 0.2\hfill & \hfill
    0.9\hfill & \hfill 0.3\hfill \\ {}\hfill 0.2\hfill & \hfill 0.5\hfill & \hfill
    0.8\hfill \end{array}\right\} $$](A436848_1_En_8_Chapter_Equd.gif)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\mathrm{wtg}}_{\mathrm{ih}}=\left\{\begin{array}{ccc}\hfill {w}_{1,1}\hfill
    & \hfill {w}_{1,2}\hfill & \hfill {w}_{1,3}\hfill \\ {}\hfill {w}_{2,1}\hfill
    & \hfill {w}_{2,2}\hfill & \hfill {w}_{2,3}\hfill \\ {}\hfill {w}_{3,1}\hfill
    & \hfill {w}_{3,2}\hfill & \hfill {w}_{3,3}\hfill \end{array}\right\}=\left\{\begin{array}{ccc}\hfill
    0.8\hfill & \hfill 0.6\hfill & \hfill 0.3\hfill \\ {}\hfill 0.2\hfill & \hfill
    0.9\hfill & \hfill 0.3\hfill \\ {}\hfill 0.2\hfill & \hfill 0.5\hfill & \hfill
    0.8\hfill \end{array}\right\} $$](A436848_1_En_8_Chapter_Equd.gif)'
- en: '![$$ {\mathrm{wtg}}_{\mathrm{ho}}=\left\{\begin{array}{ccc}\hfill {w}_{1,1}\hfill
    & \hfill {w}_{1,2}\hfill & \hfill {w}_{1,3}\hfill \\ {}\hfill {w}_{2,1}\hfill
    & \hfill {w}_{2,2}\hfill & \hfill {w}_{2,3}\hfill \\ {}\hfill {w}_{3,1}\hfill
    & \hfill {w}_{3,2}\hfill & \hfill {w}_{3,3}\hfill \end{array}\right\}=\left\{\begin{array}{ccc}\hfill
    0.4\hfill & \hfill 0.8\hfill & \hfill 0.4\hfill \\ {}\hfill 0.5\hfill & \hfill
    0.7\hfill & \hfill 0.2\hfill \\ {}\hfill 0.9\hfill & \hfill 0.1\hfill & \hfill
    0.6\hfill \end{array}\right\} $$](A436848_1_En_8_Chapter_Eque.gif)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\mathrm{wtg}}_{\mathrm{ho}}=\left\{\begin{array}{ccc}\hfill {w}_{1,1}\hfill
    & \hfill {w}_{1,2}\hfill & \hfill {w}_{1,3}\hfill \\ {}\hfill {w}_{2,1}\hfill
    & \hfill {w}_{2,2}\hfill & \hfill {w}_{2,3}\hfill \\ {}\hfill {w}_{3,1}\hfill
    & \hfill {w}_{3,2}\hfill & \hfill {w}_{3,3}\hfill \end{array}\right\}=\left\{\begin{array}{ccc}\hfill
    0.4\hfill & \hfill 0.8\hfill & \hfill 0.4\hfill \\ {}\hfill 0.5\hfill & \hfill
    0.7\hfill & \hfill 0.2\hfill \\ {}\hfill 0.9\hfill & \hfill 0.1\hfill & \hfill
    0.6\hfill \end{array}\right\} $$](A436848_1_En_8_Chapter_Eque.gif)'
- en: Figure [8-7](#Fig7) shows the matrix multiplication for the input to the hidden
    layer. The resultant matrix is shown as X1 in the screenshot.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [8-7](#Fig7) 展示了输入到隐藏层的矩阵乘法。结果矩阵在截图中被表示为 X1。
- en: '![A436848_1_En_8_Fig7_HTML.jpg](A436848_1_En_8_Fig7_HTML.jpg)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_8_Fig7_HTML.jpg](A436848_1_En_8_Fig7_HTML.jpg)'
- en: Figure 8-7.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-7.
- en: First matrix multiplication
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 第一次矩阵乘法
- en: 'The sigmoid activation function has to be applied next to this resultant. I
    called the transformed matrix O1 to indicate it was an output from the hidden
    layer to the real output layer. The resultant O1 matrix is:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来必须应用sigmoid激活函数到这个结果上。我将转换后的矩阵称为 O1，以表明它是从隐藏层到实际输出层的输出。结果 O1 矩阵是：
- en: '[PRE0]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: These are the values multiplied by the weighting matrix wtg[ho]. Figure [8-8](#Fig8)
    shows this multiplication. I called the resultant matrix X2 to differentiate from
    the first one. The final sigmoid calculation is also shown in the screenshot,
    which I named O2.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是乘以权重矩阵 wtg[ho] 的值。图 [8-8](#Fig8) 展示了这次乘法。我将结果矩阵称为 X2，以区别于第一个矩阵。最终的sigmoid计算也在截图中被展示，我将其命名为
    O2。
- en: '![A436848_1_En_8_Fig8_HTML.jpg](A436848_1_En_8_Fig8_HTML.jpg)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_8_Fig8_HTML.jpg](A436848_1_En_8_Fig8_HTML.jpg)'
- en: Figure 8-8.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-8.
- en: Second matrix multiplication
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 第二次矩阵乘法
- en: The matrix O2 is also the final output from the ANN, which is
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 矩阵 O2 也是人工神经网络（ANN）的最终输出，它
- en: '[PRE1]'
  id: totrans-86
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: This output should reflect the input so let’s compare the two and calculate
    the error or difference between the two. All of this is shown in Table [8-2](#Tab2).
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 这个输出应该反映输入，让我们比较这两个并计算它们之间的误差或差异。所有这些都在表 [8-2](#Tab2) 中展示。
- en: Table 8-2.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 表 8-2.
- en: Comparison of ANN Outputs with the Inputs
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: ANN 输出与输入的比较
- en: '| Input | Output | Error |'
  id: totrans-90
  prefs: []
  type: TYPE_TB
  zh: '| 输入 | 输出 | 错误 |'
- en: '| --- | --- | --- |'
  id: totrans-91
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| 0.8 | 0.78187033 | 0.01812967 |'
  id: totrans-92
  prefs: []
  type: TYPE_TB
  zh: '| 0.8 | 0.78187033 | 0.01812967 |'
- en: '| 0.2 | 0.7574536 | -0.5574536 |'
  id: totrans-93
  prefs: []
  type: TYPE_TB
  zh: '| 0.2 | 0.7574536 | -0.5574536 |'
- en: '| 0.7 | 0.69970531 | 0.00029469 |'
  id: totrans-94
  prefs: []
  type: TYPE_TB
  zh: '| 0.7 | 0.69970531 | 0.00029469 |'
- en: The results are actually quite remarkable as two of the three outputs are very
    close to the respective input values. However, the middle value is way off, which
    indicates that at least some of the ANN weights must be modified. But, how do
    you do it?
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 结果实际上相当显著，因为其中两个输出非常接近相应的输入值。然而，中间的值偏离很大，这表明至少ANN的一些权重必须修改。但是，你该如何做呢？
- en: Before I show you how that is done, please consider the situation shown in Figure
    [8-9](#Fig9).
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 在我向您展示如何做到这一点之前，请考虑图 [8-9](#Fig9) 所示的情况。
- en: '![A436848_1_En_8_Fig9_HTML.jpg](A436848_1_En_8_Fig9_HTML.jpg)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_8_Fig9_HTML.jpg](A436848_1_En_8_Fig9_HTML.jpg)'
- en: Figure 8-9.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-9.
- en: Error allocation problem
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 错误分配问题
- en: In Figure [8-9](#Fig9), two nodes are connected to one output node, which has
    an error value. How can the error be reflected back to the weights interconnecting
    the nodes? In one case, you could evenly split the error between the input nodes.
    However, that would not accurately represent the true error contribution from
    the input nodes as node 1 has twice the weight or impact as node 2\. A moments
    thought should lead you to the correct solution that the error should be divided
    in direct proportion to the weighting values connecting the nodes. In the case
    of the two input nodes shown in Figure [8-9](#Fig9), node 1 should be responsible
    for two-thirds of the error while node 2 should have one-third of the error contribution,
    which is precisely the ratios of their respective weights to the sum applied to
    the output node.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 在图 [8-9](#Fig9) 中，两个节点连接到一个具有错误值的输出节点。如何将错误反映回连接节点的权重？在一种情况下，你可以在输入节点之间平均分配错误。然而，这不会准确地反映输入节点对真实错误的贡献，因为节点1的权重或影响是节点2的两倍。稍加思考应该会引导你找到正确的解决方案，即错误应该按节点连接的权重值成比例分配。在图
    [8-9](#Fig9) 中显示的两个输入节点的情况下，节点1应该负责三分之二的错误，而节点2应该有三分之一的错误贡献，这正是它们各自权重与分配给输出节点的总和的比率。
- en: This use of the weights in this fashion is an additional feature for the weighting
    matrix. Normally, weights are applied to signals propagating in a forward direction
    through the ANN. However, this approach uses weights with the error value, which
    is then propagated in a backwards direction. This is reason that error determination
    is also called back propagation.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方式使用权重是权重矩阵的附加功能。通常，权重应用于通过ANN向前传播的信号。然而，这种方法使用带有错误值的权重，然后以反向方向传播。这也是为什么错误确定也被称为反向传播。
- en: Consider next what would happen if there were errors appearing at more than
    one output node, which is likely the case in most initial ANN startups. Figure
    [8-10](#Fig10) shows this situation.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑一下，如果多个输出节点出现错误，这种情况在大多数初始人工神经网络（ANN）启动时很可能是真实的。图 [8-10](#Fig10) 展示了这种情况。
- en: '![A436848_1_En_8_Fig10_HTML.jpg](A436848_1_En_8_Fig10_HTML.jpg)'
  id: totrans-103
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_8_Fig10_HTML.jpg](A436848_1_En_8_Fig10_HTML.jpg)'
- en: Figure 8-10.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-10。
- en: Error allocation problem for multiple output nodes
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 多个输出节点的错误分配问题
- en: It turns out the process is identical for multiple nodes as it was for a single
    node. This is true because the output nodes are independent of one another, with
    no interconnecting links. If this were not true, it would be very difficult to
    back propagate from interlinked output nodes.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 结果表明，对于多个节点，这个过程与单个节点的情况是相同的。这是因为输出节点之间是独立的，没有相互连接的链接。如果不是这样，从相互连接的输出节点反向传播将会非常困难。
- en: 'The equation to apportion the error is also very simple. It is a just a fraction
    based on the weights connected to the output node. For instance, to determine
    the correction for e[1] in Figure [8-10](#Fig10), the fractions applied to w[1,1]
    and w[2,1] are as follows:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 分配错误的方程也非常简单。它只是基于连接到输出节点的权重的分数。例如，为了确定图 [8-10](#Fig10) 中 e[1] 的修正，应用于 w[1,1]
    和 w[2,1] 的分数如下：
- en: w[1,1]/( w[1,1] + w[2,1])  and   w[2,1]/( w[1,1] + w[2,1])
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: w[1,1]/( w[1,1] + w[2,1]) 和 w[2,1]/( w[1,1] + w[2,1])
- en: Similarly, the following are the errors for e[2].
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，以下为 e[2] 的错误。
- en: w[1,2]/( w[1,2] + w[2,2])  and   w[2,2]/( w[1,2] + w[2,2])
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: w[1,2]/( w[1,2] + w[2,2]) 和 w[2,2]/( w[1,2] + w[2,2])
- en: So far, the process to adjust the weights based on the output errors has been
    quite simple. The errors are easy to determine because the training data provides
    the correct answers. For two-layer ANNs, this is all that is needed. But how do
    you handle a three-layer ANN where there are most certainly errors in the hidden
    layer output, yet there is no training data available, which can be used to determine
    the error values?
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，根据输出错误调整权重的过程相当简单。由于训练数据提供了正确答案，因此错误很容易确定。对于两层ANN，这已经足够了。但是，如何处理三层ANN，其中隐藏层输出肯定存在错误，但没有任何训练数据可用来确定错误值呢？
- en: Back Propagation In Three-layer ANNs
  id: totrans-112
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 三层ANN中的反向传播
- en: Figure [8-11](#Fig11) shows a three-layer, six-node ANN with two nodes per layer.
    I deliberately simplified this ANN so that it is relatively easy to focus on the
    limited back propagation required for the network.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [8-11](#Fig11) 展示了一个三层、六个节点的ANN，每层有两个节点。我故意简化了这个ANN，以便更容易关注网络所需的有限反向传播。
- en: '![A436848_1_En_8_Fig11_HTML.jpg](A436848_1_En_8_Fig11_HTML.jpg)'
  id: totrans-114
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_8_Fig11_HTML.jpg](A436848_1_En_8_Fig11_HTML.jpg)'
- en: Figure 8-11.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-11。
- en: Three-layer, six-node ANN with error values
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 具有三层、六个节点的神经网络及其误差值
- en: 'In Figure [8-11](#Fig11), you should be able to see the output error values
    that were arbitrarily created for this example. Individual error contributions
    from nodes 1 and 2 of the hidden layer are shown at the inputs to each of the
    output nodes . These normalized values were calculated as follows:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 在图 [8-11](#Fig11) 中，你应该能够看到为这个示例任意创建的输出误差值。隐藏层节点1和2的个别误差贡献显示在每个输出节点的输入处。这些归一化值计算如下：
- en: e[1output1] * w[1,1]/(w[1,1] + w[2,1]) = 0.96 * 2/(2 + 3) = 0.96 * 0.4 = 0.38
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: e[1output1] * w[1,1]/(w[1,1] + w[2,1]) = 0.96 * 2/(2 + 3) = 0.96 * 0.4 = 0.38
- en: e[1output2] * w[2,1]/(w[1,1] + w[2,1]) = 0.96 * 3/(2 + 3) = 0.96 * 0.6 = 0.58
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: e[1output2] * w[2,1]/(w[1,1] + w[2,1]) = 0.96 * 3/(2 + 3) = 0.96 * 0.6 = 0.58
- en: e[2output1] * w[1,2]/(w[1,2] + w[2,2]) = 0.8 * 2/(2 + 1) = 0.8 * 0.66 = 0.53
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: e[2output1] * w[1,2]/(w[1,2] + w[2,2]) = 0.8 * 2/(2 + 1) = 0.8 * 0.66 = 0.53
- en: e[2output2] * w[2,2]/(w[1,2] + w[2,2]) = 0.8 * 1/(2 + 1) = 0.8 * 0.33 = 0.27
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: e[2output2] * w[2,2]/(w[1,2] + w[2,2]) = 0.8 * 1/(2 + 1) = 0.8 * 0.33 = 0.27
- en: 'The total normalized error value for each hidden node is the sum of the individual
    error contributions to a given output node and are calculated as follows:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 每个隐藏节点的总归一化误差值是给定输出节点的个别误差贡献的总和，并按以下方式计算：
- en: e[1] = e[1output1] + e[2output1] = 0.38 + 0.53 = 0.91
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: e[1] = e[1output1] + e[2output1] = 0.38 + 0.53 = 0.91
- en: e[2] = e[1output2] + e[2output2] = 0.58 + 0.27 = 0.85
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: e[2] = e[1output2] + e[2output2] = 0.58 + 0.27 = 0.85
- en: These values are shown next to each of the hidden nodes in Figure [8-11](#Fig11).
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 这些值显示在图 [8-11](#Fig11) 中每个隐藏节点旁边。
- en: The preceding process may be continued as needed to calculate all the combined
    error values for any remaining hidden layers. There is no need to calculate error
    values for the input layer because it must be 0 for all input nodes as they simply
    pass the input values without any modifications.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 上述过程可以根据需要继续进行，以计算任何剩余隐藏层的所有组合误差值。由于输入层必须对所有输入节点为0，因为它们只是传递输入值而不做任何修改，因此无需计算输入层的误差值。
- en: 'The preceding process for calculating the hidden layer error outputs is quite
    tedious since it was done manually. It would be much nicer if it could be automated
    using matrices in a similar way that the feed forward calculations were done.
    The following would result if the matrices were translated on a one-to-one basis
    from the manual method :'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 计算隐藏层误差输出的上述过程相当繁琐，因为它是手动完成的。如果能用类似前馈计算的方式使用矩阵来自动化它，那就好多了。如果将矩阵从手动方法一对一转换，结果如下：
- en: '![$$ {\mathrm{e}}_{\mathrm{hidden}}=\left\{\begin{array}{cc}\hfill \frac{w_{1,1}}{w_{1,1}
    + {w}_{2,1}}\hfill & \hfill \frac{w_{1,2}}{w_{1,2} + {w}_{2,2}}\hfill \\ {}\hfill
    \frac{w_{2,1}}{w_{2,1} + {w}_{1,1}}\hfill & \hfill \frac{w_{2,2}}{w_{2,2} + {w}_{1,2}}\hfill
    \end{array}\right\}*\left\{\begin{array}{c}\hfill in1\hfill \\ {}\hfill in2\hfill
    \end{array}\right\} $$](A436848_1_En_8_Chapter_Equf.gif)'
  id: totrans-128
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\mathrm{e}}_{\mathrm{hidden}}=\left\{\begin{array}{cc}\hfill \frac{w_{1,1}}{w_{1,1}
    + {w}_{2,1}}\hfill & \hfill \frac{w_{1,2}}{w_{1,2} + {w}_{2,2}}\hfill \\ {}\hfill
    \frac{w_{2,1}}{w_{2,1} + {w}_{1,1}}\hfill & \hfill \frac{w_{2,2}}{w_{2,2} + {w}_{1,2}}\hfill
    \end{array}\right\}*\left\{\begin{array}{c}\hfill in1\hfill \\ {}\hfill in2\hfill
    \end{array}\right\} $$](A436848_1_En_8_Chapter_Equf.gif)'
- en: Unfortunately, there is no reasonable way to input the fractions that are shown
    in the preceding matrix. But all hope is not lost if you think about what the
    fractions actually do. They normalize the node’s error contribution, meaning that
    the fraction converts to a number ranging between 0 and 1.0\. The relative error
    contribution can also be expressed as an unnormalized number by simply using the
    weight numerator and dropping the denominator. The result is still acceptable
    because it is really only important to calculate a combined error value that is
    useful in the weight updates. I cover this in the next section.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，没有合理的方法可以输入前面矩阵中显示的分数。但如果考虑分数实际上做什么，就并非全无希望。它们将节点的误差贡献归一化，这意味着分数转换为介于0和1.0之间的数字。相对误差贡献也可以通过仅使用权重分子并省略分母来表示为未归一化的数字。结果仍然是可接受的，因为实际上只需要计算一个有用的组合误差值，该值可用于权重更新。我将在下一节中介绍这一点。
- en: Removing the denominators of all the fractions yields
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 移除所有分数的分母得到
- en: '![$$ {\mathrm{e}}_{\mathrm{hidden}}=\left\{\begin{array}{cc}\hfill {w}_{1,1}\hfill
    & \hfill {w}_{1,2}\hfill \\ {}\hfill {w}_{2,1}\hfill & \hfill {w}_{2,2}\hfill
    \end{array}\right\}*\left\{\begin{array}{c}\hfill in1\hfill \\ {}\hfill in2\hfill
    \end{array}\right\} $$](A436848_1_En_8_Chapter_Equg.gif)'
  id: totrans-131
  prefs: []
  type: TYPE_IMG
  zh: '![公式](A436848_1_En_8_Chapter_Equg.gif)'
- en: The preceding matrix can easily be handled using numpy’s matrix operations.
    The only catch is that the transpose of the matrix must be used in the multiplication,
    which again is not an issue. Figure [8-12](#Fig12) shows the actual matrix operations
    for this error backpropagation example.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 上述矩阵可以使用 numpy 的矩阵运算轻松处理。唯一需要注意的是，在乘法中必须使用矩阵的转置，这再次不是问题。图 [8-12](#Fig12) 展示了该错误反向传播示例的实际矩阵运算。
- en: '![A436848_1_En_8_Fig12_HTML.jpg](A436848_1_En_8_Fig12_HTML.jpg)'
  id: totrans-133
  prefs: []
  type: TYPE_IMG
  zh: '![图片](A436848_1_En_8_Fig12_HTML.jpg)'
- en: Figure 8-12.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-12。
- en: Hidden layer error matrix multiplication
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 隐藏层误差矩阵乘法
- en: It is now time to discuss how the weighting matrix values are updated once the
    errors have been determined.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是时候讨论一旦确定了误差，如何更新权重矩阵值了。
- en: Updating the Weighting Matrix
  id: totrans-137
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 更新权重矩阵
- en: 'Updating the weighting matrix is the heart of the ANN learning process. The
    quality of this matrix determines how effective the ANN is in solving its particular
    AI problem. However, there is a very significant problem in trying to mathematically
    determine a node’s output given its input and weights. Consider the following
    equation, which is applicable to a three-layer, nine-node ANN that determines
    the value appearing at a particular output node:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 更新权重矩阵是人工神经网络学习过程的核心。这个矩阵的质量决定了人工神经网络在解决特定人工智能问题时的有效性。然而，在尝试从给定输入和权重数学上确定节点的输出时，存在一个非常显著的问题。考虑以下适用于三层、九节点
    ANN 的方程，该 ANN 确定特定输出节点出现的值：
- en: '![$$ {O}_{k = \frac{1}{1 + {e}^{-{\displaystyle {\sum}_{j=1}^3}\Big({w}_{j,
    k}\ *\frac{1}{1 + {e}^{-{\displaystyle {\sum}_{j=1}^3}\left({w}_{j, k}*{x}_i\right)}\
    }}}} $$](A436848_1_En_8_Chapter_Equh.gif)'
  id: totrans-139
  prefs: []
  type: TYPE_IMG
  zh: '![公式](A436848_1_En_8_Chapter_Equh.gif)'
- en: O [k] is the output at the k [th] node.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: O [k] 是第 k 个节点的输出。
- en: w [j,k] is all the interconnecting weights between the input layer and selected
    output node.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: w [j,k] 是输入层和所选输出节点之间所有的连接权重。
- en: x [i] are the input values.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: x [i] 是输入值。
- en: This certainly is a formidable equation even though it only deals with a relatively
    simple three-layer, nine-node ANN. You can probably imagine the horrendous equation
    that would model a six-input, five-layer ANN, which in itself is not that large
    of an ANN. Larger ANN equations are likely beyond human comprehension. So how
    is this conundrum solved?
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管这个方程只处理一个相对简单的三层、九节点人工神经网络（ANN），但它确实是一个令人敬畏的方程。你可以想象一个六输入、五层 ANN 的可怕方程，而这本身并不是一个很大的
    ANN。更大的 ANN 方程可能超出了人类的理解能力。那么，这个难题是如何解决的？
- en: You could try a brute-force approach , where a fast computer simply tries a
    series of different values for each weight. Let’s say there are 1000 values to
    test for each weight, ranging from –1 to 1 in increments of 0.002\. Negative weights
    are allowed in an ANN and the 0.002 increment is probably fine to determine an
    accurate weight. However, for our three-layer, nine-node ANN there are 18 possible
    weighting links. Since there are 1000 values per link, there are 18,000 possibilities
    to test. That means it would take approximately five hours to go through all the
    combinations if the computer took one second for each combination. Five hours
    is not that bad for a simple ANN, however, the elapsed time would grow exponentially
    for larger ANNs. For example, in a very practical 500-node ANN, there are about
    500 million weight combinations. Testing at one second per combination would take
    approximately 16 years to complete. And that is only for one training set. Imagine
    the time taken for thousands of training sets. Obviously, there must be a better
    way than using the brute-force approach.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以尝试一种暴力搜索的方法，其中一台快速计算机简单地尝试每个权重的一系列不同值。假设每个权重有1000个要测试的值，范围从-1到1，以0.002为增量。在人工神经网络（ANN）中允许使用负权重，0.002的增量可能足以确定准确的权重。然而，对于我们的三层、九节点ANN，有18个可能的加权链接。由于每个链接有1000个值，因此有18,000种可能性要测试。这意味着如果计算机每个组合花费一秒钟，则需要大约五小时才能遍历所有组合。对于简单的ANN来说，五小时并不算什么，然而，对于更大的ANN，经过的时间将以指数级增长。例如，在一个非常实用的500节点ANN中，大约有5亿个权重组合。每个组合测试一秒钟将需要大约16年才能完成。而且这仅仅是针对一个训练集。想象一下针对数千个训练集所需的时间。显然，必须有一种比使用暴力搜索方法更好的方法。
- en: The solution for this difficult problem comes from the application of a mathematical
    approach named steepest descent. This approach was first created in 1847 by a
    French mathematics professor named Augustin Louis Cauchy. He proposed it in a
    treatise concerning the solution of a system of simultaneous equations. However,
    a period of more than 120 years elapsed before mathematicians and AI researchers
    applied it to ANNs. The field of ANN research rapidly developed once this technique
    became well known and understood.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 这个难题的解决方案来自于应用一种名为最速下降的数学方法。这种方法最早由1847年的一位名叫奥古斯丁·路易·柯西的法国数学教授提出。他在一篇关于解联立方程组的论文中提出了这个方法。然而，在超过120年的时间里，数学家和人工智能研究人员才将其应用于ANN。一旦这种技术变得众所周知并被理解，ANN研究领域迅速发展。
- en: The technique is also commonly referred to as gradient descent , which I start
    doing from this point. The underlying mathematics for gradient descent can be
    a bit confusing and somewhat obscure, especially when it is applied to ANNs. The
    following sidebar delves into the details of the gradient descent technique in
    order to provide those interested readers with a brief background on the subject.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术也通常被称为梯度下降，我从这一点开始介绍。梯度下降的底层数学可能有点令人困惑，也有些晦涩，尤其是在应用于ANN时。以下边栏深入探讨了梯度下降技术的细节，以便为对这一主题感兴趣的读者提供一个简要的背景。
- en: Examining the Gradient Descent Technique
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度下降技术考察
- en: Credit goes to Matt Nedrich, who wrote a great blog in early 2014 from which
    I have based much of this discussion. At the time, Matt was working for Atomic
    Objects, a software consultancy based in Ann Arbor, MI. You can view the original
    blog at [`https://spin.atomicobject.com`](https://spin.atomicobject.com) .
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 这要归功于马特·内德里奇，他在2014年初写了一篇优秀的博客，我从这篇博客中借鉴了这次讨论的大部分内容。当时，马特在密歇根州安阿伯的Atomic Objects软件咨询公司工作。你可以在[`https://spin.atomicobject.com`](https://spin.atomicobject.com)查看原始博客。
- en: I start by focusing on a close relative named linear regression. This is not
    the first time I have discussed linear regression . In Chapter [2](A436848_1_En_2_Chapter.html),
    I discussed the concept of a linear predictor using mushrooms in the example.
    The linear predictor was a sloped line with a generalized equation form of
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 我首先关注的是线性回归这个近亲。这并不是我第一次讨论线性回归。在第[2](A436848_1_En_2_Chapter.html)章中，我通过蘑菇的例子讨论了线性预测的概念。线性预测器是一条斜线，其通用方程形式为
- en: '![$$ y = m x + b $$](A436848_1_En_8_Chapter_Equi.gif)'
  id: totrans-150
  prefs: []
  type: TYPE_IMG
  zh: '![线性方程 y = mx + b](A436848_1_En_8_Chapter_Equi.gif)'
- en: I didn’t mention it at that time, but this equation is often used a “best fit”
    predictor for x-y scatter plot data, which is the basis for linear regression.
    Consider Figure [8-13](#Fig13), which is also the starting gif for an automated
    plot sequence in Matt’s blog.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 我当时没有提到它，但这个方程通常被用作x-y散点图数据的“最佳拟合”预测器，这是线性回归的基础。考虑图[8-13](#Fig13)，这也是Matt博客中自动化绘图序列的起始gif。
- en: '![A436848_1_En_8_Fig13_HTML.jpg](A436848_1_En_8_Fig13_HTML.jpg)'
  id: totrans-152
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_8_Fig13_HTML.jpg](A436848_1_En_8_Fig13_HTML.jpg)'
- en: Figure 8-13.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-13。
- en: Initial x-y scatter plot
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 初始x-y散点图
- en: The linear regression technique strives to best fit a sloped line that goes
    through the x-y data points in such a position to minimize the total error if
    you were to use the sloped line alone as a y predictor for a given x. I recommend
    going to the blog and clicking on the gif to see the automated sequence as the
    line seeks a best-fit position. I can only proceed in this book with the mathematical
    steps that determine the sloped line’s position.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 线性回归技术旨在最佳拟合一条通过x-y数据点的斜线，以最小化如果单独使用斜线作为给定x的y预测器的总误差。我建议去博客上点击gif，看看线寻求最佳拟合位置的自动化序列。在这本书中，我只能用确定斜线位置的数学步骤来继续。
- en: There should be starting equation to kick off this linear regression technique
    discussion. In this case, it is the sloped line equation used in the Chapter [2](A436848_1_En_2_Chapter.html)
    linear predictor model.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 应该有一个起始方程来启动这个线性回归技术的讨论。在这种情况下，它是第[2](A436848_1_En_2_Chapter.html)章线性预测模型中使用的斜线方程。
- en: '![$$ y = m x + b $$](A436848_1_En_8_Chapter_Equj.gif)'
  id: totrans-157
  prefs: []
  type: TYPE_IMG
  zh: '![$$ y = m x + b $$](A436848_1_En_8_Chapter_Equj.gif)'
- en: where m = slope or gradient
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 其中m = 斜率或梯度
- en: b = y-axis intercept
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: b = y轴截距
- en: The general approach is to use a data set of `(m, b)` and then determine how
    well that line with those parameters “fits” the x-y data points. This fit is determined
    by calculating y for a given x in the data set and then calculating the error
    using the true y in the data set. All the x’s in the data set are used. This error
    is often referred to as the distance from the sloped line as it makes its way
    through the data set. This error or distance is also squared to ensure that distances
    below the line that are negative do not cancel out the positive distances above
    the line. Squaring the distances also ensures that the overall error function
    can be differentiated.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 一般方法是使用`(m, b)`数据集，然后确定具有这些参数的线如何“拟合”x-y数据点。这种拟合是通过在数据集中对给定x计算y，然后使用数据集中的真实y计算误差来确定的。使用数据集中的所有x。这个误差通常被称为斜线穿过数据集时的距离。这个误差或距离也被平方，以确保低于线的距离不会抵消高于线的正距离。平方距离还确保整体误差函数可以微分。
- en: 'The following is a Python method that implements this error function:'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的Python方法实现了这个误差函数：
- en: '[PRE2]'
  id: totrans-162
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'The following is a formal error function for the code implements:'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的代码实现了一个正式的误差函数：
- en: '![$$ {e}_{m, b} = \frac{1}{N}{\displaystyle \sum_{i=1}^N}{\left({y}_i - \left(
    m*{x}_i + b\right)\right)}^2 $$](A436848_1_En_8_Chapter_Equk.gif)'
  id: totrans-164
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {e}_{m, b} = \frac{1}{N}{\displaystyle \sum_{i=1}^N}{\left({y}_i - \left(
    m*{x}_i + b\right)\right)}^2 $$](A436848_1_En_8_Chapter_Equk.gif)'
- en: A sloped line generates the best fit when the error—as calculated by the preceding
    error function—is at its lowest minimum value possible for the totality of the
    data set. The trick now is to create some form for the error function that provides
    the appropriate values for m and b that produce the overall minimum. Before I
    go into that, it would helpful to visualize the relationships between m, b, and
    e [m, b] . Figure [8-14](#Fig14) is from the blog that clearly shows the curved
    nature of the relationships between all the variables.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 当误差（如前所述的误差函数所计算）达到数据集整体可能的最小值时，斜线生成最佳拟合。现在的技巧是创建一种形式的误差函数，它提供适当的m和b值，以产生整体最小值。在我深入之前，可视化m、b和e[m,b]之间的关系将是有帮助的。图[8-14](#Fig14)来自博客，清楚地显示了所有变量之间关系的曲线性质。
- en: '![A436848_1_En_8_Fig14_HTML.jpg](A436848_1_En_8_Fig14_HTML.jpg)'
  id: totrans-166
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_8_Fig14_HTML.jpg](A436848_1_En_8_Fig14_HTML.jpg)'
- en: Figure 8-14.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-14。
- en: Plots form , b and e [m,b]
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 绘制m、b和e[m,b]图
- en: It might also be helpful to imagine holding a marble high up on one of surfaces
    and allowing it to roll down the slope. It should just stop at the minimum point,
    which has an m and b associated with it as well as the minimum e [m,b] .
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下将一颗弹珠高高举起放在某个表面上，然后让它沿着斜坡滚动下来可能也有帮助。它应该刚好停在最低点，这个最低点与一个m和一个b相关联，以及最小误差[m,b]。
- en: 'Running a gradient descent search is equivalent to rolling the mythical marble
    down the slope. The first step in doing a gradient descent calculation is to perform
    two partial differentiations on the error function because it has two independent
    variables: m and b.'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 运行梯度下降搜索相当于滚动神话中的弹珠下山。进行梯度下降计算的第一步是对误差函数进行两次偏导数运算，因为它有两个独立变量：m和b。
- en: '![$$ \frac{\partial }{\partial m} = \frac{2}{N}{\displaystyle \sum_{i=1}^N}-{x}_i\left({y}_i
    - \left( m{x}_i + b\right)\right) $$](A436848_1_En_8_Chapter_Equl.gif)'
  id: totrans-171
  prefs: []
  type: TYPE_IMG
  zh: '![偏导数公式](A436848_1_En_8_Chapter_Equl.gif)'
- en: '![$$ \frac{\partial }{\partial b} = \frac{2}{N}{\displaystyle \sum_{i=1}^N}-\left({y}_i
    - \left( m{x}_i + b\right)\right) $$](A436848_1_En_8_Chapter_Equm.gif)'
  id: totrans-172
  prefs: []
  type: TYPE_IMG
  zh: '![偏导数公式](A436848_1_En_8_Chapter_Equm.gif)'
- en: I would like to discuss the concept of a global minimum before I describe the
    process of calculating the optimum m and b values. Figure [8-15](#Fig15) is a
    three-dimensional (3D) plot of an analytic continuous function with variables
    x and y.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 在描述计算最优m和b值的过程之前，我想先讨论一下全局最小值的概念。图[8-15](#Fig15)是x和y变量分析连续函数的三维（3D）图。
- en: '![A436848_1_En_8_Fig15_HTML.jpg](A436848_1_En_8_Fig15_HTML.jpg)'
  id: totrans-174
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_8_Fig15_HTML.jpg](A436848_1_En_8_Fig15_HTML.jpg)'
- en: Figure 8-15.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-15。
- en: Multiple minima 3D plot
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 多重最小值3D图
- en: In this 3D plot, you can see where two minima or valleys have been identified.
    One is “deeper” than the other is. The deepest minimum is considered the global
    minimum, while the other is called a local minimum. Depending upon where you start
    the gradient descent, it is possible to land in a local minimum while also believing
    it is the global minimum. Unfortunately, computers do not have the inherent ability
    to look at 3D image such as Figure [8-15](#Fig15) and figure out where to start
    the gradient descent to find the true global minimum. It is therefore important
    to iterate over the entire ranges of the independent variables m and b, taking
    sufficiently small steps to locate the global minimum and rejecting all local
    minima. Shortly, you see that setting step size becomes an important part of the
    process.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个3D图中，你可以看到已经识别出两个最小值或山谷。一个比另一个“更深”。最深的最小值被认为是全局最小值，而另一个被称为局部最小值。根据你开始梯度下降的位置，你可能会落在局部最小值上，同时认为它是全局最小值。不幸的是，计算机没有内在的能力去观察如图[8-15](#Fig15)所示的3D图像，并找出从哪里开始梯度下降以找到真正的全局最小值。因此，迭代整个独立变量m和b的范围，采取足够小的步长以找到全局最小值，并拒绝所有局部最小值变得非常重要。很快，你就会看到设置步长成为这个过程的一个重要部分。
- en: All the parts necessary to start the gradient descent have now been discussed.
    The actual search starts by setting m = –1 and b = 0\. This point may be called
    the origin as a simple reference. The gradient descent should begin its march
    downhill based on the initial error function towards the optimum solution. Each
    iteration should also provide an improved solution until it reaches a point where
    the error remains constant or starts increasing. The direction that an iteration
    takes is based on the two partial derivatives that were shown earlier.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 所有启动梯度下降所需的部分都已讨论完毕。实际的搜索从设置m = –1和b = 0开始。这个点可以称为原点，作为一个简单的参考。梯度下降应该根据初始误差函数开始向最优解的下行过程。每次迭代也应提供一个改进的解，直到达到一个误差保持不变或开始增加的点。迭代的方向基于之前显示的两个偏导数。
- en: 'The following Python code implements this gradient descent algorithm :'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 以下Python代码实现了这个梯度下降算法：
- en: '[PRE3]'
  id: totrans-180
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: The `learningRate` variable controls the step size in the effort to locate the
    minimum. Too large a step size and you may miss the minimum. However, too small
    a step size needlessly increases the number of iterations taken before locating
    the minimum.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: '`learningRate`变量控制了寻找最小值时步长的大小。步长过大，你可能会错过最小值。然而，步长过小会无谓地增加找到最小值前所需的迭代次数。'
- en: Executing the algorithm begins at the origin stated earlier. For each iteration,
    the m and b values are updated to yield a slightly lower error than the previous
    iteration. In Figure [18-16](#Fig16), the dot on the left plot displays the current
    location of the gradient descent search . The right plot displays the corresponding
    line of best fit for the current m and b values.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 执行算法从之前提到的原点开始。对于每次迭代，m和b的值都会更新，以产生比前一次迭代略低的错误。在图[18-16](#Fig16)中，左侧图上的点显示了梯度下降搜索的当前位置。右侧图显示了当前m和b值的最佳拟合线。
- en: '![A436848_1_En_8_Fig16_HTML.jpg](A436848_1_En_8_Fig16_HTML.jpg)'
  id: totrans-183
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_8_Fig16_HTML.jpg](A436848_1_En_8_Fig16_HTML.jpg)'
- en: Figure 18-16.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 图18-16.
- en: Start of the gradient descent
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度下降的开始
- en: You can clearly see from the right plot that the initial guess for the line
    of best fit was way off. The fit vastly improves in the next iteration, as shown
    in Figure [18-17](#Fig17). The left plot now has line indicating the path taken
    to get there from the initial point.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以从右侧的图中清楚地看到，最佳拟合线的初始猜测与实际相差甚远。在下一迭代中，拟合大幅改进，如图[18-17](#Fig17)所示。左侧的图现在显示了从初始点到达当前位置的路径。
- en: '![A436848_1_En_8_Fig17_HTML.jpg](A436848_1_En_8_Fig17_HTML.jpg)'
  id: totrans-187
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_8_Fig17_HTML.jpg](A436848_1_En_8_Fig17_HTML.jpg)'
- en: Figure 18-17.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 图18-17.
- en: Iteration 1 for the gradient search
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度搜索的第1次迭代
- en: The fit continues to improve after the next iteration, as shown in Figure [18-18](#Fig18).
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一次迭代之后，拟合继续改进，如图[18-18](#Fig18)所示。
- en: '![A436848_1_En_8_Fig18_HTML.jpg](A436848_1_En_8_Fig18_HTML.jpg)'
  id: totrans-191
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_8_Fig18_HTML.jpg](A436848_1_En_8_Fig18_HTML.jpg)'
- en: Figure 18-18.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 图18-18.
- en: Iteration 2 for the gradient search
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度搜索的第2次迭代
- en: Finally, after 100 iterations, the search resolves to a very good fit, as shown
    in Figure [18-19](#Fig19).
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，经过100次迭代后，搜索结果非常接近最佳拟合，如图[18-19](#Fig19)所示。
- en: '![A436848_1_En_8_Fig19_HTML.jpg](A436848_1_En_8_Fig19_HTML.jpg)'
  id: totrans-195
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_8_Fig19_HTML.jpg](A436848_1_En_8_Fig19_HTML.jpg)'
- en: Figure 18-19.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 图18-19.
- en: Iteration 100 for the gradient search
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度搜索的第100次迭代
- en: You can see from the path displayed in the left graph that the search in the
    last series of iterations took a slight jog downward and to the right in search
    of the global minimum.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以从左侧图中显示的路径中看到，在最后一系列迭代中，搜索略微向下和向右跳跃，以寻找全局最小值。
- en: Figure [18-20](#Fig20) is a plot of error values for the first 100 iterations
    in the gradient search.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 图[18-20](#Fig20)是梯度搜索前100次迭代的错误值图。
- en: '![A436848_1_En_8_Fig20_HTML.jpg](A436848_1_En_8_Fig20_HTML.jpg)'
  id: totrans-200
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_8_Fig20_HTML.jpg](A436848_1_En_8_Fig20_HTML.jpg)'
- en: Figure 18-20.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 图18-20.
- en: Plot of error values vs iteration number
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 错误值与迭代次数的对比图
- en: It is good to check on the proper operation of the gradient search. Make sure
    that the error values continually decrease as the number of iterations increase.
    Looking at the chart it appears the error values are very close to zero after
    the 50th iteration. This might well indicate a broad minimum surface exists where
    the values of m and b would not change significantly in producing a line of best
    fit.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 检查梯度搜索的正确操作是件好事。确保随着迭代次数的增加，错误值持续下降。从图表上看，在第50次迭代后，错误值非常接近零。这很可能表明存在一个广泛的极小曲面，其中m和b的值在产生最佳拟合线时不会发生显著变化。
- en: 'This is the final line of best fit using 100 iterations in the gradient search:'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 这是使用梯度搜索100次迭代得到的最佳拟合线的最终行：
- en: '![$$ y = 1.3 x + 0.61 $$](A436848_1_En_8_Chapter_Equn.gif)'
  id: totrans-205
  prefs: []
  type: TYPE_IMG
  zh: '![$$ y = 1.3 x + 0.61 $$](A436848_1_En_8_Chapter_Equn.gif)'
- en: I hope that you have gained some insight into how the gradient search technique
    works.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望你已经对梯度搜索技术的工作原理有所了解。
- en: The Gradient Descent Applied to an ANN
  id: totrans-207
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将梯度下降应用于人工神经网络
- en: Figure [8-21](#Fig21) nicely summarizes the gradient descent technique as it
    applies to an ANN. It must determine the global minimum by adjusting the weights
    w[i,j] so as to minimize the overall errors present in the ANN.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 图[8-21](#Fig21)很好地总结了将梯度下降技术应用于人工神经网络的情况。它必须通过调整权重w[i,j]来确定全局最小值，以最小化人工神经网络中存在的整体错误。
- en: '![A436848_1_En_8_Fig21_HTML.jpg](A436848_1_En_8_Fig21_HTML.jpg)'
  id: totrans-209
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_8_Fig21_HTML.jpg](A436848_1_En_8_Fig21_HTML.jpg)'
- en: Figure 8-21.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-21.
- en: ANN global minimum
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 人工神经网络全局最小值
- en: 'This adjustment becomes a function of the partial derivative of the error function
    with respect to a weight, w[j,k]. This partial derivative is shown by these symbols:
    ![$$ \frac{\partial e}{\partial {w}_{j, k}} $$](A436848_1_En_8_Chapter_IEq4.gif).
    This derivative is also the slope of the error function. It is the gradient descent
    algorithm that follows the slope down to the global minimum.'
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 这种调整成为误差函数关于权重 w[j,k] 的偏导数的一个函数。这个偏导数由这些符号表示：![$$ \frac{\partial e}{\partial
    {w}_{j, k}} $$](A436848_1_En_8_Chapter_IEq4.gif)。这个导数也是错误函数的斜率。它是沿着斜率下降到全局最小值的梯度下降算法。
- en: Figure [8-22](#Fig22) shows the three-layer, six-node ANN that is the basis
    network for the following discussion. Note the i, j, and k indices because they
    are important to follow as you go through the procedure.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [8-22](#Fig22) 展示了以下讨论的基础网络，一个三层、六个节点的 ANN。注意 i、j 和 k 索引，因为它们在执行过程中非常重要。
- en: '![A436848_1_En_8_Fig22_HTML.jpg](A436848_1_En_8_Fig22_HTML.jpg)'
  id: totrans-214
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_8_Fig22_HTML.jpg](A436848_1_En_8_Fig22_HTML.jpg)'
- en: Figure 8-22.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-22。
- en: Three-layer, six-node ANN
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 三层、六个节点 ANN
- en: 'There is one additional symbol required beyond those shown in Figure [8-22](#Fig22):
    the output node error, which is expressed as'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 除了图 [8-22](#Fig22) 中所示之外，还需要一个额外的符号：输出节点误差，表示为
- en: '![$$ {e}_k = {t}_k - {o}_k $$](A436848_1_En_8_Chapter_Equo.gif)'
  id: totrans-218
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {e}_k = {t}_k - {o}_k $$](A436848_1_En_8_Chapter_Equo.gif)'
- en: t [k] is the true or target value from the training set.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: t[k] 是来自训练集的真实或目标值。
- en: o [k] is output resulting from the training set input x [i] values.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: o[k] 是由训练集输入 x[i] 值产生的输出。
- en: 'The total error at any given node n is the preceding equation with n substituted
    for k. Consequently, the total error for the entire ANN is the sum of all errors
    for all of the individual nodes. The errors are also squared for reasons mentioned
    in the sidebar. This leads to the following equation for the error function :'
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 任何给定节点 n 的总误差是将 n 替换为 k 的前一个方程。因此，整个 ANN 的总误差是所有单个节点误差的总和。误差也平方了，原因在侧边栏中提到。这导致以下错误函数的方程：
- en: '![$$ e = {\displaystyle \sum_{i=1}^N}{\left({t}_n - {o}_n\right)}^2 $$](A436848_1_En_8_Chapter_Equp.gif)'
  id: totrans-222
  prefs: []
  type: TYPE_IMG
  zh: '![$$ e = {\displaystyle \sum_{i=1}^N}{\left({t}_n - {o}_n\right)}^2 $$](A436848_1_En_8_Chapter_Equp.gif)'
- en: N is the total number of nodes in the ANN.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: N 是人工神经网络 (ANN) 中的节点总数。
- en: 'This error function is the exact one that is required to differentiate with
    respect to w [j,k]  , leading to the following form:'
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 这个错误函数是所需的精确函数，用于对 w[j,k] 进行微分，导致以下形式：
- en: '![$$ \frac{\partial e}{\partial {w}_{j, k}} = \frac{\partial }{\partial {w}_{j,
    k}}\ {\displaystyle \sum_{i=1}^N}\Big({t}_n - {o_{n\ \Big)}}^2 $$](A436848_1_En_8_Chapter_Equq.gif)'
  id: totrans-225
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \frac{\partial e}{\partial {w}_{j, k}} = \frac{\partial }{\partial {w}_{j,
    k}}\ {\displaystyle \sum_{i=1}^N}\Big({t}_n - {o_{n\ \Big)}}^2 $$](A436848_1_En_8_Chapter_Equq.gif)'
- en: 'This equation may be considerably simplified by taking note that the error
    at any specific node is due solely to its input connections. This means the output
    for the k [th] node only depends on the w [j,k] weights on its input connections.
    What this realization does is to remove the summation from the error function
    because no other nodes contribute to the k [th] node’s output. This yields a much
    simpler error function :'
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 通过注意任何特定节点的错误仅由其输入连接引起，这个方程可以大大简化。这意味着第 k 个节点的输出仅取决于其输入连接上的 w[j,k] 权重。这一认识的作用是消除了错误函数中的求和，因为没有任何其他节点会对第
    k 个节点的输出做出贡献。这导致了一个更简单的错误函数：
- en: '![$$ \frac{\partial e}{\partial {w}_{j, k}} = \frac{\partial }{\partial {w}_{j,
    k}}\ \Big({t}_k - {o_{k\ \Big)}}^2 $$](A436848_1_En_8_Chapter_Equr.gif)'
  id: totrans-227
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \frac{\partial e}{\partial {w}_{j, k}} = \frac{\partial }{\partial {w}_{j,
    k}}\ \Big({t}_k - {o_{k\ \Big)}}^2 $$](A436848_1_En_8_Chapter_Equr.gif)'
- en: The next step is to do the actual partial differentiation on the function. I
    simply go through the steps with minimal comments to get to the final equation
    without prolonging this whole derivation .
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是对函数进行实际的偏导数运算。我简单地通过最小化注释的步骤来得到最终方程，而不延长整个推导过程。
- en: 'Chain rule applied: ![$$ \frac{\partial e}{\partial {w}_{j, k}} = \frac{\partial
    e}{\partial {o}_k}\ *\ \frac{\partial {o}_k}{\partial {w}_{j, k}} $$](A436848_1_En_8_Chapter_IEq5.gif)'
  id: totrans-229
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 应用链式法则：![$$ \frac{\partial e}{\partial {w}_{j, k}} = \frac{\partial e}{\partial
    {o}_k}\ *\ \frac{\partial {o}_k}{\partial {w}_{j, k}} $$](A436848_1_En_8_Chapter_IEq5.gif)
- en: o[k] is independent of w[j,k]. The first partial = ![$$ -2\left({t}_k - {o}_k\right)
    $$](A436848_1_En_8_Chapter_IEq6.gif)
  id: totrans-230
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: o[k] 与 w[j,k] 无关。第一个偏导数 = ![$$ -2\left({t}_k - {o}_k\right) $$](A436848_1_En_8_Chapter_IEq6.gif)
- en: The output o[k] has a sigmoid function applied. The second partial = ![$$ \frac{\partial
    {o}_k}{\partial {w}_{j, k}} $$](A436848_1_En_8_Chapter_IEq7.gif) sigmoid ![$$
    \left({\displaystyle {\sum}_j{w}_{j, k}\ *\ {o}_j}\right) $$](A436848_1_En_8_Chapter_IEq8.gif)
  id: totrans-231
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输出o[k]应用了sigmoid函数。第二个偏导数 = ![$$ \frac{\partial {o}_k}{\partial {w}_{j, k}}
    $$](A436848_1_En_8_Chapter_IEq7.gif) sigmoid ![$$ \left({\displaystyle {\sum}_j{w}_{j,
    k}\ *\ {o}_j}\right) $$](A436848_1_En_8_Chapter_IEq8.gif)
- en: The differential of the sigmoid is ![$$ \frac{\partial }{\partial x}\ sigmoid(x)
    = sigmoid(x)\ *\ \left(1 - sigmoid(x)\right) $$](A436848_1_En_8_Chapter_IEq9.gif)
  id: totrans-232
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: sigmoid的微分是 ![$$ \frac{\partial }{\partial x}\ sigmoid(x) = sigmoid(x)\ *\ \left(1
    - sigmoid(x)\right) $$](A436848_1_En_8_Chapter_IEq9.gif)
- en: 'Combining: ![$$ \frac{\partial e}{\partial {w}_{j, k}} = -2\left({t}_k - {o}_{k\
    }\right)\kern0.5em *\kern0.5em \mathrm{sigmoid}\left({\displaystyle {\sum}_j{w}_{j,
    k}\ *\ {o}_j}\right)*\ \left(1 - sigmoid\left({\displaystyle {\sum}_j{w}_{j, k}\
    *\ {o}_j}\right)\right)*\ \frac{\partial }{\partial {w}_{j, k}}\left({\displaystyle
    {\sum}_j{w}_{j, k}\ *\ {o}_j}\right)\Big) $$](A436848_1_En_8_Chapter_IEq10.gif).
    Note the last term is necessary because of the summation term in the sigmoid function.
    Just another application of the chain rule.'
  id: totrans-233
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 结合：![$$ \frac{\partial e}{\partial {w}_{j, k}} = -2\left({t}_k - {o}_{k\ }\right)\kern0.5em
    *\kern0.5em \mathrm{sigmoid}\left({\displaystyle {\sum}_j{w}_{j, k}\ *\ {o}_j}\right)*\
    \left(1 - sigmoid\left({\displaystyle {\sum}_j{w}_{j, k}\ *\ {o}_j}\right)\right)*\
    \frac{\partial }{\partial {w}_{j, k}}\left({\displaystyle {\sum}_j{w}_{j, k}\
    *\ {o}_j}\right)\Big) $$](A436848_1_En_8_Chapter_IEq10.gif)。注意最后一个项是必要的，因为sigmoid函数中的求和项。这只是链式法则的另一个应用。
- en: 'Simplifying: ![$$ \frac{\partial e}{\partial {w}_{j, k}} = -2\left({t}_k -
    {o}_{k\ }\right)\kern0.5em *\kern0.5em \mathrm{sigmoid}\left({\displaystyle {\sum}_j{w}_{j,
    k}\ *\ {o}_j}\right)*\ \left(1 - sigmoid\left({\displaystyle {\sum}_j{w}_{j, k}\
    *\ {o}_j}\right)\right)*{o}_j $$](A436848_1_En_8_Chapter_IEq11.gif)'
  id: totrans-234
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 简化：![$$ \frac{\partial e}{\partial {w}_{j, k}} = -2\left({t}_k - {o}_{k\ }\right)\kern0.5em
    *\kern0.5em \mathrm{sigmoid}\left({\displaystyle {\sum}_j{w}_{j, k}\ *\ {o}_j}\right)*\
    \left(1 - sigmoid\left({\displaystyle {\sum}_j{w}_{j, k}\ *\ {o}_j}\right)\right)*{o}_j
    $$](A436848_1_En_8_Chapter_IEq11.gif)
- en: 'Take a breath, which I often did after a rigorous calculus session. This is
    the final equation that is used to adjust the weights:'
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 深吸一口气，这是我经常在严格的微积分课后做的事情。这是用来调整权重的最终方程：
- en: '![$$ \frac{\partial e}{\partial {w}_{j, k}} = -\left({t}_k - {o}_{k\ }\right)\kern0.5em
    *\kern0.5em \mathrm{sigmoid}\left({\displaystyle {\sum}_j{w}_{j, k}\ *\ {o}_j}\right)\kern0.5em
    *\kern0.75em \left(1 - sigmoid\left({\displaystyle {\sum}_j{w}_{j, k}\ *\ {o}_j}\right)\right)*{o}_j
    $$](A436848_1_En_8_Chapter_Equs.gif)'
  id: totrans-236
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \frac{\partial e}{\partial {w}_{j, k}} = -\left({t}_k - {o}_{k\ }\right)\kern0.5em
    *\kern0.5em \mathrm{sigmoid}\left({\displaystyle {\sum}_j{w}_{j, k}\ *\ {o}_j}\right)\kern0.5em
    *\kern0.75em \left(1 - sigmoid\left({\displaystyle {\sum}_j{w}_{j, k}\ *\ {o}_j}\right)\right)*{o}_j
    $$](A436848_1_En_8_Chapter_Equs.gif)'
- en: You should also notice that the 2 at the beginning of the equation has been
    dropped. It was only a scaling factor and not important in determining the direction
    of the error function slope, which is the main key to the gradient descent algorithm.
    I do wish to congratulate my readers who have made it this far. Many folks have
    a very difficult time with the mathematics required to get to this stage.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 你还应该注意到方程开头去掉的2。它只是一个缩放因子，对确定误差函数斜率的方向并不重要，而误差函数斜率是梯度下降算法的主要关键。我真心想祝贺那些已经走到这一步的读者。很多人在达到这个阶段所需的数学上遇到了非常大的困难。
- en: It would now be very helpful to put a physical interpretation on this complex
    equation. The first part ![$$ \left({t}_k - {o}_{k\ }\right) $$](A436848_1_En_8_Chapter_IEq12.gif)
    is just the error, which is easy to see. The sum expressions ![$$ {\displaystyle
    \sum_j}{w}_{j, k}\ *\ {o}_j $$](A436848_1_En_8_Chapter_IEq13.gif) inside the sigmoid
    functions are the inputs into the k [ th ] final layer node. And the very last
    term o [ j ] is the output from the j [ th ] node in the hidden layer. Knowing
    this physical interpretation should make the creation of the other layer-to-layer
    error slope expressions much easier.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 现在给这个复杂的方程一个物理解释将非常有帮助。第一部分 ![$$ \left({t}_k - {o}_{k\ }\right) $$](A436848_1_En_8_Chapter_IEq12.gif)
    只是误差，这很容易看出。sigmoid函数内部的求和表达式 ![$$ {\displaystyle \sum_j}{w}_{j, k}\ *\ {o}_j
    $$](A436848_1_En_8_Chapter_IEq13.gif) 是k[第]个最终层节点的输入。而最后的项o[j]是隐藏层中j[第]个节点的输出。了解这个物理解释应该会使创建其他层到层误差斜率表达式变得容易得多。
- en: I state the input to hidden layer error slope equation without subjecting you
    to the rigorous mathematical derivation. This expression relies on the physical
    interpretation just presented.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 我陈述了输入到隐藏层误差斜率方程，而没有让你经历严格的数学推导。这个表达式依赖于刚才提出的物理解释。
- en: '![$$ \frac{\partial e}{\partial {w}_{i, j}} = -\left({e}_j\right)\kern0.5em
    *\kern0.5em \mathrm{sigmoid}\left({\displaystyle {\sum}_i{w}_{i, j}\ *\ {o}_i}\right)*\
    \left(1 - sigmoid\left({\displaystyle {\sum}_i{w}_{i, j}\ *\ {o}_i}\right)\right)*{o}_i
    $$](A436848_1_En_8_Chapter_Equt.gif)'
  id: totrans-240
  prefs: []
  type: TYPE_IMG
  zh: '![公式](A436848_1_En_8_Chapter_Equt.gif)'
- en: 'The next step is to demonstrate how new weights are calculated using the preceding
    error slope expressions . It is actually quite simple as shown in the following
    equation:'
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是展示如何使用前面的误差斜率表达式来计算新的权重。实际上，如以下方程所示，这相当简单：
- en: '![$$ new\ {w}_{j, k} = old\ {w}_{j, k} - \alpha *\ \frac{\partial e}{\partial
    {w}_{j, k}} $$](A436848_1_En_8_Chapter_Equu.gif)'
  id: totrans-242
  prefs: []
  type: TYPE_IMG
  zh: '![公式](A436848_1_En_8_Chapter_Equu.gif)'
- en: α= learning rate
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: α=学习率
- en: Yes, that is exactly the same learning rate discussed in Chapter [2](A436848_1_En_2_Chapter.html)
    where I introduced it as part of the linear predictor discussion. The learning
    rate is important because setting it too high may cause the gradient descent to
    miss the minimum, and setting it too low would cause many extra iterations and
    lessen the efficiency of the gradient descent algorithm.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，这正是第二章中讨论的相同的学习率，我在那里将其作为线性预测器讨论的一部分引入。学习率很重要，因为设置得太高可能会导致梯度下降错过最小值，而设置得太低会导致许多额外的迭代，降低梯度下降算法的效率。
- en: Matrix Multiplications for Weight Change Determination
  id: totrans-245
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 矩阵乘法用于权重变化确定
- en: 'It would be very helpful to express all the preceding expressions in terms
    of matrices, which is the practical way real weight changes are calculated. Let
    the following expression represent one matrix element for the error slope expression
    between the hidden and the output layers:'
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 将所有前面的表达式用矩阵表示将非常有帮助，这是实际计算真实权重变化的方法。以下表达式代表隐藏层和输出层之间误差斜率表达式的矩阵元素之一：
- en: '![$$ \mathrm{g}\mathrm{d}\left({w}_{j, k}\right) = \alpha *\ {e}_{k\ }\ *\
    sigmoid\left({o}_k\right)\ *\ \left(1 - sigmoid\left({o}_k\right)\right)\ *\ {o}_j^T
    $$](A436848_1_En_8_Chapter_Equv.gif)'
  id: totrans-247
  prefs: []
  type: TYPE_IMG
  zh: '![公式](A436848_1_En_8_Chapter_Equv.gif)'
- en: o [j] ^T is the transpose of the hidden layer output matrix.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: o [j] ^T 是隐藏层输出矩阵的转置。
- en: 'The following are the matrices for the three-layer, six-node example ANN:'
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是为三层、六个节点的示例ANN的矩阵：
- en: '![$$ \left\{\begin{array}{ccc}\hfill \mathrm{gd}\left({w}_{1,1}\right)\hfill
    & \hfill \mathrm{gd}\Big({w}_{2,1\Big)}\hfill & \hfill \mathrm{gd}\left({w}_{3,1}\right)\hfill
    \\ {}\hfill \mathrm{gd}\Big({w}_{1,2\Big)}\hfill & \hfill \mathrm{gd}\Big({w}_{2,2\Big)}\hfill
    & \hfill \mathrm{gd}\Big({w}_{3,2\Big)}\hfill \end{array}\right\}*\left\{\begin{array}{c}\hfill
    {e}_1*\ ;sigmoi{d}_1\ *\left(1 - sigmoi{d}_1\right)\hfill \\ {}\hfill\ {e}_2\
    *\  sigmoi{d}_2\ *\left(1 - sigmoi{d}_2\right)\hfill \end{array}\right\}\ *\ \left\{{o}_1\kern0.5em
    {o}_2\right\} $$](A436848_1_En_8_Chapter_Equw.gif)'
  id: totrans-250
  prefs: []
  type: TYPE_IMG
  zh: '![公式](A436848_1_En_8_Chapter_Equw.gif)'
- en: o [1] and o [2] are outputs from the hidden layer.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: o [1] 和 o [2] 是隐藏层的输出。
- en: This completes all the necessary preparatory background in order to start updating
    the weights.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 这完成了所有必要的预备背景，以便开始更新权重。
- en: Worked-through Example
  id: totrans-253
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 工作示例
- en: It’s important to go through a manual example before showing the Python approach,
    so that you truly understand the process when you run it as a Python script. Figure
    [8-23](#Fig23) is a slightly modified version of Figure [8-11](#Fig11), on which
    I have inserted arbitrary hidden node output values to have sufficient data to
    complete the example.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 在展示Python方法之前，先通过一个手动示例非常重要，这样你才能真正理解当你将其作为Python脚本运行时的过程。图[8-23](#Fig23)是图[8-11](#Fig11)的一个略微修改版本，我在其中插入了任意隐藏节点输出值，以便有足够的数据来完成示例。
- en: '![A436848_1_En_8_Fig23_HTML.jpg](A436848_1_En_8_Fig23_HTML.jpg)'
  id: totrans-255
  prefs: []
  type: TYPE_IMG
  zh: '![图片](A436848_1_En_8_Fig23_HTML.jpg)'
- en: Figure 8-23.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-23。
- en: Example ANN used for manual calculations
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 用于手动计算的示例ANN
- en: 'Let’s start by updating w [1,1], which is the weight-connecting node 1 in the
    hidden layer to node 1 in the output layer. Currently, it has a value of 2.0\.
    This is the error slope equation used for these layer links:'
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从更新 w [1,1] 开始，这是隐藏层中连接到输出层节点 1 的权重。目前，它的值为 2.0。这是用于这些层链接的错误斜率方程：
- en: '![$$ \frac{\partial e}{\partial {w}_{j, k}} = -\left({t}_k - {o}_k\right)*\mathrm{sigmoid}\left({\displaystyle
    {\sum}_j{w}_{j, k}\ *\ {o}_j}\right)*\ \left(1 - sigmoid\left({\displaystyle {\sum}_j{w}_{j,
    k}\ *\ {o}_j}\right)\right)*{o}_j $$](A436848_1_En_8_Chapter_Equx.gif)'
  id: totrans-259
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \frac{\partial e}{\partial {w}_{j, k}} = -\left({t}_k - {o}_k\right)*\mathrm{sigmoid}\left({\displaystyle
    {\sum}_j{w}_{j, k}\ *\ {o}_j}\right)*\ \left(1 - sigmoid\left({\displaystyle {\sum}_j{w}_{j,
    k}\ *\ {o}_j}\right)\right)*{o}_j $$](A436848_1_En_8_Chapter_Equx.gif)'
- en: 'Substitute the values, as shown in the following figure yields:'
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 如下图中所示，代入值得到：
- en: '![$$ \left({t}_k - {o}_k\right) $$](A436848_1_En_8_Chapter_IEq14.gif) = e[1]
    = 0.96'
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: '![$$ \left({t}_k - {o}_k\right) $$](A436848_1_En_8_Chapter_IEq14.gif) = e[1]
    = 0.96'
- en: '![$$ \left({\displaystyle {\sum}_j{w}_{j, k}\ *\ {o}_j}\right) $$](A436848_1_En_8_Chapter_IEq15.gif)
    = (2.0 * 0.6) + (3.0 * 0.4) = 2.4'
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: '![$$ \left({\displaystyle {\sum}_j{w}_{j, k}\ *\ {o}_j}\right) $$](A436848_1_En_8_Chapter_IEq15.gif)
    = (2.0 * 0.6) + (3.0 * 0.4) = 2.4'
- en: sigmoid = ![$$ \frac{1}{\left(1 + {e}^{-2.4}\right)} $$](A436848_1_En_8_Chapter_IEq16.gif)
    = 0.9168
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: sigmoid = ![$$ \frac{1}{\left(1 + {e}^{-2.4}\right)} $$](A436848_1_En_8_Chapter_IEq16.gif)
    = 0.9168
- en: 1 – sigmoid = 0.0832
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 1 – sigmoid = 0.0832
- en: o [1]= 0.6
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: o [1]= 0.6
- en: 'Multiply the applicable values with the negative sign yields:'
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 将适用的值乘以负号得到：
- en: –0.96 * 0.9168 * 0.0832 * 0.6 = –0.04394
  id: totrans-267
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: –0.96 * 0.9168 * 0.0832 * 0.6 = –0.04394
- en: 'Let’s assume a learning rate of 0.15, which is not too aggressive and the following
    is the new weight:'
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 假设一个学习率为 0.15，这并不太激进，以下是新权重：
- en: 2.0 – 0.15 * (–0.04394) = 2.0 + 0.0066 = 2.0066
  id: totrans-269
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 2.0 – 0.15 * (–0.04394) = 2.0 + 0.0066 = 2.0066
- en: This is not a large change from the original but you must keep in mind that
    there is hundreds, if not thousands of iterations performed before the global
    minimum is reached. Small changes rapidly accumulate to some rather large changes
    in the weights.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 这与原始版本的变化不大，但你必须记住，在达到全局最小值之前，会进行数百甚至数千次迭代。小的变化会迅速积累，导致权重发生相当大的变化。
- en: The other weights in the network can be adjusted in the same manner as demonstrated.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 网络中的其他权重可以按照演示的方式进行调整。
- en: There are some important issues regarding how well an ANN can learn, which I
    discuss next.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 关于人工神经网络（ANN）学习效果的重要问题，我将在下文中进行讨论。
- en: Issues with ANN Learning
  id: totrans-273
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ANN 学习问题
- en: You should realize that not all ANNs learn well, just as not all people learn
    the same way. Fortunately for ANNs, it has nothing to do with intelligence but
    rather for more mundane items directly related to the sigmoid activation function.
    Figure [8-24](#Fig24) is a modified version of Figure 2-12 showing the input and
    output ranges for the sigmoid function .
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该意识到，并不是所有的 ANN 都能很好地学习，就像并不是所有人都能以相同的方式学习。幸运的是，对于 ANN 来说，这与智能无关，而是与更平凡的与
    sigmoid 激活函数直接相关的事项有关。图 [8-24](#Fig24) 是图 2-12 的修改版本，显示了 sigmoid 函数的输入和输出范围。
- en: '![A436848_1_En_8_Fig24_HTML.jpg](A436848_1_En_8_Fig24_HTML.jpg)'
  id: totrans-275
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_8_Fig24_HTML.jpg](A436848_1_En_8_Fig24_HTML.jpg)'
- en: Figure 8-24.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-24.
- en: Annotated sigmoid function
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 注释的 sigmoid 函数
- en: Looking at Figure [8-24](#Fig24), you should see that if the x inputs are larger
    than 2.5, the y output has very small changes. This is because the sigmoid function
    asymptotically approaches 1.0 around that x value. Small changes for large input
    changes imply very small gradient changes happen. ANN learning becomes suppressed
    in this situation because the gradient descent algorithm depends upon a reasonable
    slope being present. Thus, ANN training sets should limit the input x values to
    what might be called a pseudo-linear range of roughly –3 to 3\. Values of x outside
    this range causes a saturation effect for ANN learning, and no effective weight
    updates happen.
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 观察图 [8-24](#Fig24)，你应该看到如果 x 输入值大于 2.5，y 输出值变化非常小。这是因为 sigmoid 函数在 x 值附近渐近地接近
    1.0。对于大的输入变化来说，小的变化意味着梯度变化非常小。在这种情况下，ANN 学习被抑制，因为梯度下降算法依赖于存在合理的斜率。因此，ANN 训练集应限制输入
    x 值在约 -3 到 3 的伪线性范围内。x 值超出这个范围会导致 ANN 学习饱和，并且不会发生有效的权重更新。
- en: In a similar fashion, the sigmoid function cannot output values greater than
    one or less than zero. Output values in those ranges are not possible and weights
    must be appropriately scaled back such that the allowable output range is always
    maintained. In reality, the output range should be 0.01 to 0.99 because of the
    asymptotic nature described earlier.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 以类似的方式，sigmoid函数不能输出大于1或小于0的值。这些范围内的输出值是不可能的，权重必须适当缩放，以便始终保持允许的输出范围。实际上，由于前面描述的渐近性质，输出范围应该是0.01到0.99。
- en: Initial Weight Selection
  id: totrans-280
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 初始权重选择
- en: Based on the issues just discussed, I believe you can probably realize that
    it is very important to select a good initial set of ANN weights so that learning
    can take effect without bumping into input saturation or output limit problems.
    The obvious choice is to constrain weight selection to the pseudo-linear range
    I mentioned earlier (i.e., ±3). Often, weights are further constrained to ±1 to
    be a bit more conservative.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 根据刚才讨论的问题，我相信你可能意识到选择一组好的ANN初始权重非常重要，这样学习就可以发挥作用，而不会遇到输入饱和或输出限制问题。显然的选择是将权重选择限制在我之前提到的伪线性范围内（即，±3）。通常，权重进一步限制在±1，以更加保守。
- en: 'There has been a “rule of thumb” developed over the years by AI researchers
    and mathematicians that roughly states:'
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 这些年来，AI研究人员和数学家已经制定了一条“经验法则”：
- en: The weights should be initially allocated using a normal distribution set at
    a mean value equal to the inverse of the square root of the number of nodes in
    the ANN.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 权重应最初使用正态分布分配，其平均值等于ANN中节点数的平方根的倒数。
- en: For a 36-node, three-layer ANN, which I have previously used, the mean is ![$$
    \frac{1}{\sqrt{36}} $$](A436848_1_En_8_Chapter_IEq17.gif) or 0.16667\. Figure
    [8-25](#Fig25) shows a normal probability distribution with this mean and ±2 approximate
    standard deviations are also clearly indicated.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我之前使用的36节点、三层ANN，平均值是[$$ \frac{1}{\sqrt{36}} $$](A436848_1_En_8_Chapter_IEq17.gif)或0.16667。图[8-25](#Fig25)显示了具有此平均值和±2近似标准差的正态概率分布。
- en: '![A436848_1_En_8_Fig25_HTML.jpg](A436848_1_En_8_Fig25_HTML.jpg)'
  id: totrans-285
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_8_Fig25_HTML.jpg](A436848_1_En_8_Fig25_HTML.jpg)'
- en: Figure 8-25.
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 图8-25。
- en: Normal distribution of initial weights for a 36-node ANN
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 36节点ANN的初始权重正态分布
- en: A random selection of weights in the range of approximately –0.5 to 0.8333 would
    nicely provide an excellent starting point for ANN learning for a 36-node network.
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 在大约-0.5到0.8333的范围内随机选择权重将很好地为36节点网络的ANN学习提供一个良好的起点。
- en: Finally, you should avoid setting all weights to the same value because ANN
    learning depends upon an unequal weight distribution. And obviously, do not set
    all the weights to 0 because that completely disables the ANN.
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，你应该避免将所有权重设置为相同的值，因为ANN学习依赖于不均匀的权重分布。显然，也不要将所有权重设置为0，因为这会完全禁用ANN。
- en: This last section completes all of my background discussion on ANN. It is finally
    time to generate a full-fledged ANN on the Raspberry Pi using Python.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 这最后一部分完成了我对ANN的所有背景讨论。现在是时候在Raspberry Pi上使用Python生成一个完整的ANN了。
- en: 'Demo 8-1: ANN Python Scripts'
  id: totrans-291
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 演示8-1：ANN Python脚本
- en: This first demonstration shows you how to create an untrained ANN using Python
    . I start by discussing the modules that constitute the ANN. Once I have done
    that, all the modules put into an operative package and the script run. The first
    module to discuss is the one that creates and initializes the ANN.
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 这个第一个演示向您展示了如何使用Python创建一个未训练的ANN。我首先讨论构成ANN的模块。一旦完成，所有模块都被放入一个操作包中，然后运行脚本。要讨论的第一个模块是创建和初始化ANN的那个模块。
- en: Initialization
  id: totrans-293
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 初始化
- en: This module’s structure depends largely on the type of ANN to be built. I am
    building a three-layer, nine-node ANN for this demonstration, which means there
    must objects representing each layer. In addition, the inputs, outputs, and weights
    must be created and appropriately labeled. Table [8-3](#Tab3) details the objects
    and references that are needed for this module.
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 此模块的结构在很大程度上取决于要构建的ANN类型。在这个演示中，我正在构建一个三层、九节点的ANN，这意味着必须有代表每一层的对象。此外，还需要创建并适当标记输入、输出和权重。表[8-3](#Tab3)详细说明了此模块所需的对象和引用。
- en: Table 8-3.
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 表8-3。
- en: Initialization Module Objects and References
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 初始化模块对象和引用
- en: '| Name | Description |'
  id: totrans-297
  prefs: []
  type: TYPE_TB
  zh: '| 名称 | 描述 |'
- en: '| --- | --- |'
  id: totrans-298
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| inode | Number of nodes in the input layer |'
  id: totrans-299
  prefs: []
  type: TYPE_TB
  zh: '| inode | 输入层中的节点数 |'
- en: '| hnode | Number of nodes in the hidden layer |'
  id: totrans-300
  prefs: []
  type: TYPE_TB
  zh: '| hnode | 隐藏层中的节点数 |'
- en: '| onode | Number of nodes in the output layer |'
  id: totrans-301
  prefs: []
  type: TYPE_TB
  zh: '| onode | 输出层中的节点数 |'
- en: '| wtgih | Weight matrix between input and hidden layers |'
  id: totrans-302
  prefs: []
  type: TYPE_TB
  zh: '| wtgih | 输入层和隐藏层之间的权重矩阵 |'
- en: '| wtgho | Weight matrix between hidden and output layers |'
  id: totrans-303
  prefs: []
  type: TYPE_TB
  zh: '| wtgho | 隐藏层和输出层之间的权重矩阵 |'
- en: '| wij | Individual weight matrix element |'
  id: totrans-304
  prefs: []
  type: TYPE_TB
  zh: '| wij | 单个权重矩阵元素 |'
- en: '| input | Array for inputs |'
  id: totrans-305
  prefs: []
  type: TYPE_TB
  zh: '| 输入 | 输入数组 |'
- en: '| output | Array for outputs |'
  id: totrans-306
  prefs: []
  type: TYPE_TB
  zh: '| 输出 | 输出数组 |'
- en: '| ohidden | Array for hidden layer outputs |'
  id: totrans-307
  prefs: []
  type: TYPE_TB
  zh: '| ohidden | 隐藏层输出数组 |'
- en: '| lr | Learning rate |'
  id: totrans-308
  prefs: []
  type: TYPE_TB
  zh: '| lr | 学习率 |'
- en: 'The basic initialization module structure begins as follows:'
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 基本初始化模块结构开始如下：
- en: '[PRE4]'
  id: totrans-310
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'You need to call the `init` module with the proper values for the ANN to be
    created. For a three-layer, nine-node network with a moderate learning rate, the
    values are as follows:'
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 您需要使用为创建 ANN 正确的值来调用 `init` 模块。对于具有三个层、九个节点的网络和适中的学习率，值如下：
- en: inode = 3
  id: totrans-312
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: inode = 3
- en: hnode = 3
  id: totrans-313
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: hnode = 3
- en: onode = 3
  id: totrans-314
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: onode = 3
- en: lr = 0.25
  id: totrans-315
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: lr = 0.25
- en: The next item to discuss is how to create and initialize the key weighting matrices
    based on all the previous background discussions. I use a normal distribution
    for the weight generation with a mean of 0.1667 and a standard deviation of 0.3333\.
    Fortunately, numpy has a very nice function that automates this process. The first
    matrix to create is the wtgih, whose dimensions are inode × hnode, or 3 × 3, for
    our example.
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来要讨论的是如何根据所有之前的背景讨论创建和初始化关键权重矩阵。我使用正态分布来生成权重，均值为 0.1667，标准差为 0.3333。幸运的是，numpy
    有一个非常棒的函数可以自动化此过程。要创建的第一个矩阵是 wtgih，其维度为 inode × hnode，或在我们的例子中为 3 × 3。
- en: 'This next Python statement generates this matrix:'
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个 Python 语句生成此矩阵：
- en: '[PRE5]'
  id: totrans-318
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'The following is a sample output from an interactive session that was generated
    by the preceding statement:'
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是从上一个语句生成的交互会话的样本输出：
- en: '[PRE6]'
  id: totrans-320
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: The resulting matrix `wtgih` is well formed with excellent starting values.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 生成的矩阵 `wtgih` 形状良好，起始值优秀。
- en: At this point, the `init` module can be completed using the matrix generating
    statements shown earlier.
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一点上，可以使用前面显示的矩阵生成语句完成 `init` 模块的编写。
- en: '[PRE7]'
  id: totrans-323
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'At this point, I introduce a second module that allows some simple tests to
    run on the network created by the `init` module. This new module is named `testNet`
    to reflect its purpose. The takes an input data set or tuple in Python terms and
    returns an output set. The following process runs in the module:'
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一点上，我引入了一个第二个模块，它允许在由 `init` 模块创建的网络上进行一些简单的测试。这个新模块被命名为 `testNet` 以反映其目的。它接受一个输入数据集或元组（Python术语），并返回一个输出集。以下过程在模块中运行：
- en: Input data tuple converted to an array.
  id: totrans-325
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输入数据元组转换为数组。
- en: The array is multiplied by the wtgih weighting matrix. This is now the input
    to the hidden layer.
  id: totrans-326
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数组乘以 wtgih 权重矩阵。现在这是隐藏层的输入。
- en: This new array is then adjusted by the sigmoid function.
  id: totrans-327
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 这个新数组随后通过 sigmoid 函数进行调整。
- en: The adjusted array from the hidden layer is multiplied by the wtgho matrix.
    This now the input to the output layer.
  id: totrans-328
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 隐藏层的调整数组乘以 wtgho 矩阵。现在这是输出层的输入。
- en: This new array is then adjusted by the sigmoid function yielding the final output
    array.
  id: totrans-329
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 这个新数组随后通过 sigmoid 函数进行调整，得到最终的输出数组。
- en: 'The module listing follows:'
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 模块列表如下：
- en: '[PRE8]'
  id: totrans-331
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Test Run
  id: totrans-332
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 测试运行
- en: Figure [8-26](#Fig26) shows an interactive Python session that I ran on a Raspberry
    Pi 3 to test this preliminary code.
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [8-26](#Fig26) 显示了我在一个 Raspberry Pi 3 上运行的交互 Python 会话，以测试此初步代码。
- en: '![A436848_1_En_8_Fig26_HTML.jpg](A436848_1_En_8_Fig26_HTML.jpg)'
  id: totrans-334
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_8_Fig26_HTML.jpg](A436848_1_En_8_Fig26_HTML.jpg)'
- en: Figure 8-26.
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8-26。
- en: Interactive Python session
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 交互 Python 会话
- en: The `init` and `testNet` modules were both part of a class named ANN, which
    in turn were in a file named ANN.py. I first started Python and imported the class
    from the file so that the interpreter would recognize the class name. I next instantiated
    an object named ann with all nodes set to 3 and a learning rate equal to 0.3\.
    The learning rate is not needed yet, but it must be present or you cannot instantiate
    an object. The act of instantiating an object automatically causes the `init`
    module to run. It is expecting size values for all three nodes and a learning
    rate value.
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: '`init` 和 `testNet` 模块都是名为 ANN 的类的一部分，而该类又位于名为 ANN.py 的文件中。我首先启动 Python 并从文件中导入该类，以便解释器能够识别类名。接下来，我创建了一个名为
    ann 的对象，所有节点都设置为 3，学习率等于 0.3。学习率目前不需要，但它必须存在，否则您无法实例化对象。实例化对象的行为会自动运行 `init` 模块。它期望所有三个节点的大小值和一个学习率值。'
- en: I next ran the `testNet` module with the three input values. These are shown
    in Table [8-4](#Tab4) along with the respective calculated output values. I also
    included the manually calculated error values.
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 我接下来使用三个输入值运行了`testNet`模块。这些值如表[8-4](#Tab4)所示，以及相应的计算输出值。我还包括了手动计算的错误值。
- en: Table 8-4.
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 表8-4。
- en: Initial Test
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 初始测试
- en: '| Input | Output | Error | Percent error |'
  id: totrans-341
  prefs: []
  type: TYPE_TB
  zh: '| 输入 | 输出 | 误差 | 百分误差 |'
- en: '| --- | --- | --- | --- |'
  id: totrans-342
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- |'
- en: '| 0.8 | 0.74993428 | –0.05006572 | 6.3 |'
  id: totrans-343
  prefs: []
  type: TYPE_TB
  zh: '| 0.8 | 0.74993428 | –0.05006572 | 6.3 |'
- en: '| 0.5 | 0.52509703 | 0.02509703 | 5.0 |'
  id: totrans-344
  prefs: []
  type: TYPE_TB
  zh: '| 0.5 | 0.52509703 | 0.02509703 | 5.0 |'
- en: '| 0.6 | 0.60488966 | 0.00488966 | 0.8 |'
  id: totrans-345
  prefs: []
  type: TYPE_TB
  zh: '| 0.6 | 0.60488966 | 0.00488966 | 0.8 |'
- en: The errors are not too much considering this is a totally untrained ANN. The
    next section discusses how to train an ANN to greatly improve its accuracy.
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这是一个完全未训练的ANN，误差并不太多。下一节将讨论如何训练ANN以极大地提高其准确性。
- en: 'Demo 8-2: Training an ANN'
  id: totrans-347
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例8-2：训练ANN
- en: 'In this demonstration, I show you how to train an ANN using a third module
    named `trainNet` , which has been added to the ANN class definition. This module
    functions in a very similar fashion to the `testNet` function by calculating an
    output set based on an input data set. However, the `trainNet` module input data
    is a predetermined training set instead of an arbitrary data tuple as I just demonstrated.
    This new module also calculates an error set by comparing the ANN outputs with
    its inputs and using the differences for training the network. The outputs are
    calculated in exactly the same manner as was done in `testNet` module. The arguments
    to `trainNet` now include both an input list and a training list. The following
    statements create these arrays from the list arguments:'
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个演示中，我向您展示如何使用名为`trainNet`的第三个模块来训练ANN，该模块已被添加到ANN类定义中。该模块的功能与`testNet`函数非常相似，通过基于输入数据集计算输出集。然而，`trainNet`模块的输入数据是一个预定的训练集，而不是我刚才演示的任意数据元组。这个新模块还通过比较ANN的输出与输入并使用差异来训练网络来计算错误集。输出计算的方式与`testNet`模块中完全相同。`trainNet`的参数现在包括一个输入列表和一个训练列表。以下语句从列表参数创建这些数组：
- en: '[PRE9]'
  id: totrans-349
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'The error is as stated before is the difference between the training set outputs
    and the actual outputs. The error equation for the k [th] output node as previously
    stated is:'
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，误差是训练集输出与实际输出之间的差异。k[th]输出节点的误差方程如前所述是：
- en: '![$$ {e}_k = {t}_k - {o}_k $$](A436848_1_En_8_Chapter_Equy.gif)'
  id: totrans-351
  prefs: []
  type: TYPE_IMG
  zh: '![ek方程](A436848_1_En_8_Chapter_Equy.gif)'
- en: The matrix notation for the output errors is
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 输出误差的矩阵表示法是
- en: '[PRE10]'
  id: totrans-353
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: The hidden layer error array in matrix notation for this example ANN is
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个示例ANN，隐藏层误差的矩阵表示法是
- en: '![$$ \mathrm{hError} = {\left\{\begin{array}{ccc}\hfill {w}_{1,1}\hfill & \hfill
    {w}_{1,2}\hfill & \hfill {w}_{1,3}\hfill \\ {}\hfill {w}_{2,1}\hfill & \hfill
    {w}_{2,2}\hfill & \hfill {w}_{2,3}\hfill \\ {}\hfill {w}_{3,1}\hfill & \hfill
    {w}_{3,2}\hfill & \hfill {w}_{3,3}\hfill \end{array}\right\}}^T*\left\{\begin{array}{c}\hfill
    {e}_1\hfill \\ {}\hfill {e}_2\hfill \\ {}\hfill {e}_3\hfill \end{array}\right\}
    $$](A436848_1_En_8_Chapter_Equz.gif)'
  id: totrans-355
  prefs: []
  type: TYPE_IMG
  zh: '![hError矩阵](A436848_1_En_8_Chapter_Equz.gif)'
- en: 'The following is the Python statement to generate this array:'
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是用Python语句生成此数组的语句：
- en: '[PRE11]'
  id: totrans-357
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'The following is the update equation for adjusting a link between the j [th]
    and k [th] layers, as previously shown:'
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是为调整第j[th]层和第k[th]层之间的链接而更新的方程，如前所示：
- en: '![$$ g d\left({w}_{j, k}\right) = \alpha *\ {e}_{k\ }\ *\ sigmoid\left({o}_k\right)\
    *\ \left(1 - sigmoid\left({o}_k\right)\right)\ *\ {o}_j^T $$](A436848_1_En_8_Chapter_Equaa.gif)'
  id: totrans-359
  prefs: []
  type: TYPE_IMG
  zh: '![gd(wj,k)方程](A436848_1_En_8_Chapter_Equaa.gif)'
- en: 'The new gd(w [j,k] )array must be added to the original because these are adjustments
    to the original. The preceding equations can be neatly packaged into this single
    Python statement:'
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 新的gd(w[j,k])数组必须添加到原始数组中，因为这些是对原始数组的调整。前面的方程可以简洁地封装成以下单个Python语句：
- en: '[PRE12]'
  id: totrans-361
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Writing the code for the weight updates between the input and hidden layers
    uses precisely the same format.
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 编写输入层和隐藏层之间权重更新的代码使用的是完全相同的格式。
- en: '[PRE13]'
  id: totrans-363
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
