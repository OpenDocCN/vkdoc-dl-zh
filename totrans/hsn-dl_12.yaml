- en: 12. Introduction to Generative Models
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Since we have reached the end of our journey, let us contemplate what we were
    expecting when we started. The goal was to be able to develop models that can
    do image- and sequence-related tasks efficiently and effectively. We now know
    that DL models can help us classify images and text. Chapter [6](611710_1_En_6_Chapter.xhtml)
    to Chapter [10](611710_1_En_10_Chapter.xhtml) of this book focus on the convolutional
    and sequential models that help us accomplish such tasks. We also learned to develop
    models that can accomplish slightly complex tasks like next character generation
    and encoding of an image. Let us now focus on more complex tasks and explore the
    fundamentals of generative models. Generative models not only help us carry out
    supervised and unsupervised learning tasks, studied so far, but also help us generate
    new data from a particular distribution. One of the glaring examples of generative
    models is ChatGPT, which has disrupted the field. It is based on transformers.
    This chapter introduces transformers. But before diving into transformers, let
    us have a basic idea of Hopfield Networks and Boltzmann Machines.
  prefs: []
  type: TYPE_NORMAL
- en: Hopfield Networks
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you hear the song “Turn! Turn! Turn!”, what comes to your mind? Perhaps The
    Byrds, the band, or Forrest Gump or the first eight verses of the third chapter
    of the biblical Book of Ecclesiastes? In your lifetime you must have heard a lot
    of songs. In spite of that, on hearing a few lines of a famous song, the whole
    song, the image associated with it, and the source come to your mind. Being a
    computer science student, what do you think goes in our brain that helps us associate
    the few lines with the complete description or perhaps the partial one? Is it
    the database of all the songs that is created in our mind followed by some type
    of search that associates a pattern with a particular song? Perhaps the answer
    is a no!
  prefs: []
  type: TYPE_NORMAL
- en: These search strategies cannot work and produce answers in microseconds, so
    what exactly happens? The answer lies in the ability of a particular object to
    attain the state of minimum energy, that is, pure physics. The computational model
    that implements this strategy was given by John Hopfield in 1982\. His idea was
    based on the strategy followed by proteins to attain a stable structure, one that
    minimizes their energy. This model is referred to as the ***Hopfield Network***.
  prefs: []
  type: TYPE_NORMAL
- en: Assume that we store a pattern consisting of {*x*[1], *x*[2], *x*[3]. . *x*[*n*]}.
    Also, assume that each of these *x*[*i*]s can either be +1 or -1\. The interaction
    between them can be depicted by a graph having *x*[*i*]s as the vertices and *w*[*ij*]
    as the weight between patterns *x*[*i*] and *x*[*j*]. To keep things simple, let
    us assume that the graph so formed is a unidirectional graph. For example, consider
    the graph shown in Figure [12-1](#Fig1) having three vertices *x*[1], *x*[2],
    and *x*[3] and weights *w*[12], *w*[32], and *w*[31].
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_12_Chapter/611710_1_En_12_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12-1
  prefs: []
  type: TYPE_NORMAL
- en: A Hopfield Network consisting of patterns *x*[1], *x*[2], *x*[3]
  prefs: []
  type: TYPE_NORMAL
- en: Note that, in this network, if *w*[*ij*] is greater than 0, then the connection
    between them is considered as exhibitory; likewise, if the weights between them
    are less than 0, then it is considered as inhibitory.
  prefs: []
  type: TYPE_NORMAL
- en: To begin with, let us consider only two patterns *x*[1] and *x*[2], both of
    which either can be +1 or -1\. Then Table [12-1](#Tab1) shows the sign of weights
    between them.
  prefs: []
  type: TYPE_NORMAL
- en: Table 12-1
  prefs: []
  type: TYPE_NORMAL
- en: Finding Weights When the Values of *x*[1]s Are Given
  prefs: []
  type: TYPE_NORMAL
- en: '| ***x***[**1**] | ***x***[**2**] | ***w***[**12**] |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| +1 | +1 | >0 |'
  prefs: []
  type: TYPE_TB
- en: '| +1 | -1 | <0 |'
  prefs: []
  type: TYPE_TB
- en: '| -1 | +1 | <0 |'
  prefs: []
  type: TYPE_TB
- en: '| -1 | -1 | >0 |'
  prefs: []
  type: TYPE_TB
- en: 'This means that if both *x*[*i*] and *x*[*j*] have the same sign, then the
    weight is positive; else, the weight is negative. Does this remind of you anything?
    This is Hebb’s rule:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“Neurons that wire together fire together”*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'This leads us to a factor that is to be maximized if the whole configuration
    is to become stable, which is ∑*w*[*ij*]*x*[*i*]*x*[*j*]. This means that the
    following quantity needs to be minimized:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Energy=-\sum {w}_{ij}{x}_i{x}_j $$](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equa.png)'
  prefs: []
  type: TYPE_IMG
- en: This may be referred to as energy. The Hopfield Network aims to minimize this
    energy. In order to achieve a stable configuration on giving a particular pattern,
    we need to find out the values of *x*[*i*] and *x*[*j*] to make the configuration
    stable and the corresponding weights. For finding out the values of *x*[*i*]s
    and the weights, the following strategy may be applied (Figure [12-2](#Fig2)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_12_Chapter/611710_1_En_12_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12-2
  prefs: []
  type: TYPE_NORMAL
- en: Finding the updated values of *x*[*i*]
  prefs: []
  type: TYPE_NORMAL
- en: 'Task 1: Finding the values of *x*[*i*]s'
  prefs: []
  type: TYPE_NORMAL
- en: Find *S*[*i*] =  ∑ *x*[*j*]*w*[*ij*]
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If *S*[*i*] > 0 then set *x*[*i*] = 1; else, set *x*[*i*] =  − 1.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Repeat the process for all *x*[*i*]s, and continue repeating till a stable state
    is reached.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Task 2: Finding weights'
  prefs: []
  type: TYPE_NORMAL
- en: For a given pattern *y*[*i*], set *w*[*ij*] = *y*[*i*]*y*[*j*].
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As we need to minimize − ∑ *w*[*ij*]*y*[*i*]*y*[*j*] and the minimum value is
    attained at *w*[*ij*] = *y*[*i*]*y*[*j*]
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This way the new weights can be found. The readers interested in derivation
    may refer to the references given at the end of the chapter. Let us now have a
    look at a machine that can model binary data.
  prefs: []
  type: TYPE_NORMAL
- en: Boltzmann Machines
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Assume that you are working in a control room of a factory and all the buttons
    there can only be in one of the two states: on or off (0 or 1). The control room’s
    configuration can be defined in terms of the state of each of these buttons. It
    is important to find out if the configuration is problematic, as something can
    seriously go wrong in such cases. Let us formally state the problem:'
  prefs: []
  type: TYPE_NORMAL
- en: Given a set of binary variables {*x*[1], *x*[2], …*x*[*m*]}, we need to find
    out if a vector of length m depicting the state of each of these variables presents
    a condition of anomaly.
  prefs: []
  type: TYPE_NORMAL
- en: So we need to develop a machine that is able to model the binary data. One of
    the ways of doing so is to use a Boltzmann Machine (BM). A Boltzmann Machine can
    model binary data [2]. Using this machine, we can find if a given vector belongs
    to a particular distribution. Likewise, if you develop a few such machines, you
    can, with the help of Bayes’ theorem, find if the vector came from a particular
    distribution. These machines, when modeled on a normal state, can also help us
    find out about unusual behavior.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s consider a scenario wherein we need to generate data from a binary distribution.
    To be able to do so, we need to find the latent variables, followed by developing
    a network with hidden states and visible states. We first use the prior distribution
    and choose the hidden states and then find the visible state from the conditional
    distribution. However, Boltzmann Machines do not work in this way. In these machines,
    the energy of the joint configuration is proportional to the probability P(v,
    h), where *v* is the visible state and *h* is the hidden state.
  prefs: []
  type: TYPE_NORMAL
- en: The probability of a visible state here is
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ P(v)={\sum}_hP(h)\times P\left(v/h\right) $$](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equb.png)'
  prefs: []
  type: TYPE_IMG
- en: As per Reference [[1](#CR1)], the energy*E*(*v*, *h*) is given by the formula
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ E\left(v,h\right)=-\left({\sum}_i{v}_i{b}_i+{\sum}_j{h}_j{b}_j+{\sum}_{i,j}{h}_i{h}_j{w}_{ij}+{\sum}_{i,j}{v}_i{v}_j{w}_{ij}+{\sum}_{i,j}{v}_i{h}_j{w}_{ij}\right)
    $$](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equc.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The value of *P*(*v*) can be calculated using the following formula:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ P\left(v,h\right)={e}^{-E\left(v,h\right)}/{\sum}_{x,y}{e}^{-E\left(x,y\right)}
    $$](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equd.png)'
  prefs: []
  type: TYPE_IMG
- en: 'And finally, *P*(*v*) can be calculated using the following formula:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ P(v)={\sum}_h{e}^{-E\left(v,h\right)}/{\sum}_{x,y}{e}^{-E\left(x,y\right)}
    $$](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Eque.png)'
  prefs: []
  type: TYPE_IMG
- en: To understand how probability distribution of various visible states is derived
    in a Boltzmann Machine, consider the following example that follows.
  prefs: []
  type: TYPE_NORMAL
- en: In Figure [12-3](#Fig3) we have three hidden states and three visible states.
    The weight between h[1] and h[2] is 2; that between h[1] and v[1] is 3; that between
    h[2] and v[2] is -1; that between h[2] and h[3] is 1; and that between h[3] and
    v[3] is 2\. To find the probabilities of various states, the following steps must
    be followed.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_12_Chapter/611710_1_En_12_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12-3
  prefs: []
  type: TYPE_NORMAL
- en: An example of a Boltzmann Machine
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: We enlist all possible permutations of binary variable (h[1] h[2] h[3]),
    which are eight values. Note that (v[1] v[2] v[3]) can also have eight values,
    and thus we have 64 combinations in total (Table [12-2](#Tab2)).'
  prefs: []
  type: TYPE_NORMAL
- en: Table 12-2
  prefs: []
  type: TYPE_NORMAL
- en: Sum of the Possible Combinations for Visible and Hidden States
  prefs: []
  type: TYPE_NORMAL
- en: '| v[1] v[2] v[3] | h[1] h[2] h[3] |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| 000 | 000 |'
  prefs: []
  type: TYPE_TB
- en: '| 001 | 000 |'
  prefs: []
  type: TYPE_TB
- en: '| 010 | 000 |'
  prefs: []
  type: TYPE_TB
- en: '| 011 | 000 |'
  prefs: []
  type: TYPE_TB
- en: '| 100 | 000 |'
  prefs: []
  type: TYPE_TB
- en: '| 101 | 000 |'
  prefs: []
  type: TYPE_TB
- en: '| 110 | 000 |'
  prefs: []
  type: TYPE_TB
- en: '| 111 | 000 |'
  prefs: []
  type: TYPE_TB
- en: '| 000 | 001 |'
  prefs: []
  type: TYPE_TB
- en: '| … | … |'
  prefs: []
  type: TYPE_TB
- en: '| 111 | 111 |'
  prefs: []
  type: TYPE_TB
- en: 'Step 2: This is followed by calculating E for each of the 64 combinations obtained.
    For instance, take the case when (v[1] v[2] v[3]) are (1 1 0) and (h[1] h[2] h[3])
    are (0 1 0), respectively.'
  prefs: []
  type: TYPE_NORMAL
- en: Assume that the values of v[1], v[2], and v[3] are 1,1, and 0 and those of h[1],
    h[2], and h[3] are 0, 1, and 0.
  prefs: []
  type: TYPE_NORMAL
- en: For the sake of simplicity, assume all the biases are 0 so ∑*w*[*i*]*b*[*i*]
    and ∑*h*[*k*]*b*[*k*] become 0\. Hence, we are left with ∑*v*[*i*]*h*[*k*]*w*[*ik*]
    and ∑*h*[*k*]*h*[*l*]*w*[*kl*]. Note that, visible states, that is, (v[1] v[2]
    v[3]), are not connected with each other (Figure [12-4](#Fig4)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_12_Chapter/611710_1_En_12_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12-4
  prefs: []
  type: TYPE_NORMAL
- en: Boltzmann Machine along with the state inputs
  prefs: []
  type: TYPE_NORMAL
- en: To calculate ∑*v*[*i*]*h*[*k*]*w*[*ik*] *and* ∑ *h*[*k*]*h*[*l*]*w*[*kl*], we
    get
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ ={v}_1{h}_1{w}_{11}+{v}_2{h}_2{w}_{22}+{v}_3{h}_3{w}_{33}+{h}_1{h}_2{w}_{12}+{h}_2{h}_3{w}_{23}
    $$](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equf.png)'
  prefs: []
  type: TYPE_IMG
- en: = 0 + (-1) + 0 + 0+ 0
  prefs: []
  type: TYPE_NORMAL
- en: = -1
  prefs: []
  type: TYPE_NORMAL
- en: Since -E = -1 so *e*^(−*E*) = *e*^(−1).
  prefs: []
  type: TYPE_NORMAL
- en: As another example, consider another case when (v[1] v[2] v[3]) are (1 1 1)
    and (h[1] h[2] h[3]) are (1 1 1), respectively. Assume that the values of v[1],
    v[2], and v[3] are 1,1, and 1 and those of h[1], h[2], and h[3] are 1, 1, and
    1.
  prefs: []
  type: TYPE_NORMAL
- en: On calculating ∑*v*[*i*]*h*[*k*]*w*[*ik*] *and* ∑ *h*[*k*]*h*[*l*]*w*[*kl*]
    , we get
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ ={v}_1{h}_1{w}_{11}+{v}_2{h}_2{w}_{22}+{v}_3{h}_3{w}_{33}+{h}_1{h}_2{w}_{12}+{h}_2{h}_3{w}_{23}
    $$](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equg.png)'
  prefs: []
  type: TYPE_IMG
- en: = 3 + (-1) + 2 + 2 + 1
  prefs: []
  type: TYPE_NORMAL
- en: = 7
  prefs: []
  type: TYPE_NORMAL
- en: We now know -E = -7, so *e*^(−*E*) = *e*⁷.
  prefs: []
  type: TYPE_NORMAL
- en: This way we can calculate the value of all *e*^(−*E*) for all the combinations
    mentioned above and find the sum. Now, we divide each *e*^(−*E*) with the sum
    calculated above to get the probability of each combination.
  prefs: []
  type: TYPE_NORMAL
- en: Now, consider a situation wherein you have a lot of visible and hidden states.
    In such cases enumerating all the possible combinations and then finding out the
    probability of all the visible states becomes computationally difficult. To handle
    this problem, Boltzmann Machines were proposed.
  prefs: []
  type: TYPE_NORMAL
- en: Boltzmann Machines (BMs) and Restricted Boltzmann Machines (RBMs) are both types
    of stochastic Neural Networks, but they have significant differences in their
    structures and applications.
  prefs: []
  type: TYPE_NORMAL
- en: The Boltzmann Machines are fully connected networks. The Restricted Boltzmann
    Machine has a bipartite graph structure. The former are computationally demanding,
    whereas the learning in the latter is simple and is done through Contrastive Divergence
    (CD). The Boltzmann Machines are generally used for solving optimization problems,
    whereas the latter is used for feature learning and dimensionality reduction.
    The latter is practical and it is easy to train with larger datasets. Having seen
    the basis of Hopfield and Boltzmann machines, let us now move to transformers.
  prefs: []
  type: TYPE_NORMAL
- en: A Gentle Introduction to Transformers
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This section is based on an original research paper called “Attention is all
    you need” by Vaswani et al. and its explanation on the New York University website
    by Chinmay Hegde.
  prefs: []
  type: TYPE_NORMAL
- en: The Large Language Models (LLMs) have become extremely popular for the past
    few years, particularly with the advent of ChatGPT. These models can perform various
    tasks like
  prefs: []
  type: TYPE_NORMAL
- en: Summarization of text
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Generating new text
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Correcting the existing ones
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Translation (to some extent)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In this book, we have already studied Recurrent Neural Networks (RNNs), which
    can deal with sequences. We have already seen applications like Sentiment Analysis,
    Named Entity Recognition, generating the next character, etc. using RNNs and their
    variants. However, RNNs do not perform well on tasks like language translation.
  prefs: []
  type: TYPE_NORMAL
- en: Assume that you aim to develop an application that converts English to Marathi.
    Your application takes an input sentence in English and generates a sentence in
    Marathi. For example, if the input sentence is
  prefs: []
  type: TYPE_NORMAL
- en: “I eat rice”
  prefs: []
  type: TYPE_NORMAL
- en: then the output sentence should be
  prefs: []
  type: TYPE_NORMAL
- en: “मी भातखातो”
  prefs: []
  type: TYPE_NORMAL
- en: 'Note that the second word in the source language is “eat,” whereas it is equivalent
    to the third position in the target sentence. This is called misalignment, and
    RNNs do not handle this problem gracefully. Likewise, consider another sentence:'
  prefs: []
  type: TYPE_NORMAL
- en: “I am a good boy”
  prefs: []
  type: TYPE_NORMAL
- en: then the corresponding sentence in Marathi will be
  prefs: []
  type: TYPE_NORMAL
- en: “मी चांगला मुलगा आहे”
  prefs: []
  type: TYPE_NORMAL
- en: Note that the sentence in the source language contains five words, whereas the
    target sentence has four words. In such cases, the number of words in the source
    language may not be the same as in the target language. In machine translation
  prefs: []
  type: TYPE_NORMAL
- en: The number of words in the source language may not be the same as in the target
    language for a particular sentence.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: There can be misalignment.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: To solve this problem, the following approaches can be employed. Instead of
    creating a word-level RNN, we can make a sentence-level RNN. However, this approach
    would not work well because, for a given combination of words, there can be many
    sentences, and the model might not understand the context and placement accurately.
  prefs: []
  type: TYPE_NORMAL
- en: The second option is to create an encoder`–`decoder-type architecture, as explained
    in Chapter [9](611710_1_En_9_Chapter.xhtml) on RNN. Here, we will focus on another
    solution to this problem, which forms the basis of modern-day ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: An Introduction to Self-Attention
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Assume that we have a sentence(X) consisting of some words (x[i]) each having
    dimension (d). The output will be a sentence Y consisting of y[i], also a d-dimensional
    vector. The sentence contains the set *y*[1], *y*[2], *y*[3], …, *y*[*n*] such
    that
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {y}_i={\sum}_{j=1}^n{x}_j{w}_{ij} $$](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equh.png)'
  prefs: []
  type: TYPE_IMG
- en: where w[ij] is the weight corresponding to i^(th) vector in the output and the
    j^(th) vector in the input. Also, w[ij] is row normalized. Here, the initial weights
    are chosen as
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {w}_{ij}={x}_i^T\cdotp {x}_j $$](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equi.png)'
  prefs: []
  type: TYPE_IMG
- en: 'and then we apply the softmax function to find W[ij]:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {W}_{ij}=\frac{e^{w_{ij}}}{\sum_{k=1}^n{e}^{w_{ik}}} $$](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equj.png)'
  prefs: []
  type: TYPE_IMG
- en: 'In such models, a single input is generally mapped to a set of outputs. This
    model is capable of considering all the units of the input. Note that the embeddings
    of each word can be learned by some conventional method or a Neural Network. This
    model is capable of handling many of the issues stated above; however, some issues
    are still to be addressed (Figure [12-5](#Fig5)):'
  prefs: []
  type: TYPE_NORMAL
- en: 'In such type of model, the system input, say x[i,] is multiplied with all the
    other vectors to build the sequence of weights:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![$$ {w}_{i1}={x}_i\cdotp {x}_1{w}_{i2}={x}_i\cdotp {x}_2\dots {w}_{ij}={x}_i\cdotp
    {x}_j $$](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equk.png)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: This role is called “Query.”
  prefs: []
  type: TYPE_NORMAL
- en: It is then compared with every other point to get the weight of the output
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![$$ {w}_{ji}={x}_1^T\cdotp {x}_i $$](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equl.png)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: '![$$ {w}_{ji}={x}_2^T\cdotp {x}_i\dots {w}_{ji}={x}_j^T\cdotp {x}_i $$](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equm.png)'
  prefs: []
  type: TYPE_IMG
- en: used for finding y[i]. This role is called “Key.”
  prefs: []
  type: TYPE_NORMAL
- en: Then the outputs *y*[1], *y*[2], *y*[3], …, *y*[*n*] are synthesized. This role
    is called “Value.”
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_12_Chapter/611710_1_En_12_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12-5
  prefs: []
  type: TYPE_NORMAL
- en: Components of self-attention
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {Q}_i={W}_q\times {X}_i{K}_i={W}_k\times {X}_i{V}_i={W}_v\times {X}_i{w}_{ij}=\frac{Q_i^T\times
    {K}_j}{\sqrt{d}}{W}_{ij}= Softmax\left({w}_{ij}\right)=\frac{e^{w_{ij}}}{\sum_{k=1}^n{e}^{w_{ik}}}{y}_i={\sum}_{j=1}^n{W}_{ij}\times
    {V}_j $$](../images/611710_1_En_12_Chapter/611710_1_En_12_Chapter_TeX_Equn.png)'
  prefs: []
  type: TYPE_IMG
- en: In addition to the above, we can also use multi-head self-attention. Interested
    readers may refer to the references given at the end of this chapter for understanding
    multi-head self-attention.
  prefs: []
  type: TYPE_NORMAL
- en: The Transformer
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A transformer consists of a self-attention block followed by a layer of normalization,
    then a Multi-layer Perceptron (MLP), and then another self-attention block as
    shown in Figure [12-6](#Fig6).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/611710_1_En_12_Chapter/611710_1_En_12_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12-6
  prefs: []
  type: TYPE_NORMAL
- en: Transformer architecture
  prefs: []
  type: TYPE_NORMAL
- en: 'Transformers have many advantages:'
  prefs: []
  type: TYPE_NORMAL
- en: We can easily club multiple transformers together.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: They use a fully feed-forward architecture for parallelization.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: They support standard backpropagation for training.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Transformers are highly scalable.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: They handle variable-length sequences efficiently.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'This chapter covers three important models: Hopfield Networks, Boltzmann Machines,
    and the self-attention mechanism. These models are the basis of generative models
    and modern pattern recognition techniques. Each topic is introduced with examples.
    For the readers looking for a more in-depth information, references are provided
    at the end of the chapter. In addition to the above, it is worth noting that self-attention
    mechanisms and transformers are the technologies behind ChatGPT.'
  prefs: []
  type: TYPE_NORMAL
