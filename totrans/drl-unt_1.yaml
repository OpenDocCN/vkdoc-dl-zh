  prefs: []
  type: TYPE_NORMAL
- en: Playing with the CartPole Environment for Deep Reinforcement Learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Open the “Cartpole-Rendering.ipynb” notebook. It contains the starter code for
    setting up the environment. The first section contains import statements to import
    libraries in the notebook.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: The next step involves setting up the dimensions of the display window to visualize
    the environment in the Colab notebook. This uses the pyvirtualdisplay library.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: Now, let us load the environment from Gym using the gym.make command and look
    into the states and the actions. Observation states refer to the environment variables
    that contain the key factors like cart velocity and pole velocity and is an array
    of size 4\. The action space is an array of size 2, which refers to the binary
    actions (moving left or right). The observation space also contains high and low
    values as boundary values for the problem.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: This is shown in Figure [1-5](#Fig5).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig5_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-5
  prefs: []
  type: TYPE_NORMAL
- en: Observation and action space in CartPole environment
  prefs: []
  type: TYPE_NORMAL
- en: After running, the details appear in the console. The details include the different
    action spaces as well as the observation steps.
  prefs: []
  type: TYPE_NORMAL
- en: Let us try to run the environment for 50 iterations and check the values of
    rewards accumulated. This will simulate the environment for 50 iterations and
    provide insight into how the agent balances itself with the baseline OpenAI model.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: The environment is reset initially with the env.reset() method. For each of
    the 50 iterations, env.action_space.sample() method tries to sample most favorable
    states or rewarding states. The sampling method can use tabular discrete RL algorithms
    like Q-learning or continuous deep RL algorithms like deep-Q–network (DQN). There
    is a discount factor that is called at the start of every iteration to discount
    the rewards of the previous timestamp, and the pole agent tries to find new rewards
    accordingly. The env.step(action) chooses from a “memory” or previous actions
    and tries to maximize its rewards by staying upright as long as possible. At the
    end of each action step, the display changes to render a new state of the pole.
    The loop finally breaks if the iterations have been completed. The env.close()
    method closes the connection to the Gym environment.
  prefs: []
  type: TYPE_NORMAL
- en: This has helped us to understand how states and rewards affect an agent. We
    will get into the details of an in-depth study of modeling a deep Q-learning algorithm
    to provide a faster and optimal reward-based solution to the CartPole problem.
    The environment has observation states that are discrete and can be solved by
    using tabular RL algorithms like Markov-based Q-learning or SARSA.
  prefs: []
  type: TYPE_NORMAL
- en: Deep learning provides more optimization by converting the discrete states into
    continuous distributions and then tries to apply high-dimensional neural networks
    to converge the loss function to a global minima. This is favored by using algorithms
    like DQN, double deep-Q-network (DDQN), dueling DQN, actor critic (AC), proximal
    policy operation (PPO), deep deterministic policy gradients (DDPG), trust region
    policy optimization (TRPO), soft actor critic (SAC). The latter section of the
    notebook contains a deep Q-learning implementation of the CartPole problem, which
    will be explained in later chapters. To highlight certain important aspects of
    this code, there is a deep learning layer made with Keras and also for each iteration
    the collection of state, action, and rewards are stored in a replay memory buffer.
    Based on the previous states of the buffer memory and the rewards for the previous
    steps, the pole agent tries to optimize the Q-learning function over the Keras
    deep learning layers.
  prefs: []
  type: TYPE_NORMAL
