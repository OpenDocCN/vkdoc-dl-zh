- en: 1. Introduction to Reinforcement Learning
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Reinforcement learning (RL) is a paradigm of learning algorithms that are based
    on rewards and actions. The state-based learning paradigm is different from generic
    supervised and unsupervised learning, as it does not typically try to find structural
    inferences in collections of unlabeled or labeled data. Generic RL relies on finite
    state automation and decision processes that assist in finding an optimized reward-based
    learning trajectory. The field of RL relies heavily on goal-seeking, stochastic
    processes and decision theoretic algorithms, which is a field of active research.
    With developments in higher order deep learning algorithms, there has been huge
    advancement in this field to create self-learning agents that can achieve a goal
    by using gradient convergence techniques and sophisticated memory-based neural
    networks. This chapter will focus on the fundamentals of the Markov Decision Process
    (MDP), hidden Markov Models (HMMs) and dynamic programming for state enumeration,
    Bellman’s iterative algorithms, and a detailed walkthrough of value and policy
    algorithms. In all these sections, there will be associated python notebooks for
    better understanding of the concepts as well as simulated games made with Unity
    (version 2018.x).
  prefs: []
  type: TYPE_NORMAL
- en: The fundamental aspects in an academy of RL are agent(s) and environment(s)
    . Agent refers to an object that uses learning algorithms to try and explore rewards
    in steps. The agent tries to optimize a suitable path toward a goal that results
    in maximization of the rewards and, in this process, tries to avoid punishing
    states. Environment is everything around an agent; this includes the states, obstacles,
    and rewards. The environment can be static as well as dynamic. Path convergence
    in a static environment is faster if the agent has sufficient buffer memory to
    retain the correct trajectory toward the goal as it explores different states.
    Dynamic environment pose a stronger challenge for agents, as there is no definite
    trajectory. The second use-case requires sufficient deep memory network models
    like bidirectional long short-term memory (LSTM) to retain certain key observations
    that remain static in the dynamic environment. Figuratively generic reinforcement
    learning can be presented as shown in Figure [1-1](#Fig1).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig1_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-1
  prefs: []
  type: TYPE_NORMAL
- en: Interaction between agent and environment in reinforcement learning
  prefs: []
  type: TYPE_NORMAL
- en: The set of variables that control and govern the interaction between the agent
    and the environment includes {state(S), reward(R), action(A)}.
  prefs: []
  type: TYPE_NORMAL
- en: 'State is a set of possible enumerated states provided in the environment: {s[0],
    s[1], s[2], … s[n]}.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Reward is the set of possible rewards present in particular states in the environment:
    {r[0], r[1], r[2], …, r[n]}.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Action is the set of possible actions that the agent can take to maximize its
    rewards: {A[0], A[1], A[2], … A[n]}.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'OpenAI Gym Environment: CartPole'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To understand the roles of each of these in an RL environment, let us try to
    study the CartPole environment from OpenAI gym . OpenAI gym includes many environments
    for research and study of classic RL algorithms, robotics, and deep RL algorithms,
    and this is used as a wrapper in Unity machine learning (ML) agents Toolkit.
  prefs: []
  type: TYPE_NORMAL
- en: The CartPole environment can be described as a classical physics simulation
    system where a pole is attached to an “un-actuated” joint to a cart. The cart
    is free to move along a frictionless track. The constraints on the system involve
    applying a force of +1and -1 to the cart. The pendulum starts upright, and the
    goal is to prevent it from falling over. A reward of +1 is provided for every
    timestamp the pole remains upright. When the angle of inclination is greater than
    15 degrees from the normal, the episode terminates (punishment). If the cart moves
    more than 2.4 units either way from the central line, the episode terminates.
    Figure [1-2](#Fig2) depicts the environment.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig2_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-2
  prefs: []
  type: TYPE_NORMAL
- en: CartPole environment from OpenAI gym
  prefs: []
  type: TYPE_NORMAL
- en: 'The possible states , rewards, and actions sets in this environment include:'
  prefs: []
  type: TYPE_NORMAL
- en: 'States: An array of length 4.:[cart position, cart velocity, pole angle, pole
    tip velocity] such as [`4.8000002e+00,3.4028235e+38 ,4.1887903e-01,3.4028235e+38`]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Rewards: +1 for every timestamp the pole remains upright'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Actions: integer array of size 2 : [left direction, right direction], which
    controls the direction of motion of the cart such as [-1,+1]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Termination: if the cart shifts more than 2.4 units from the center or the
    pendulum inclines more than 15 degrees'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Objective: to keep the pendulum or pole upright for 250 time-steps and collect
    rewards more than 100 points'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
