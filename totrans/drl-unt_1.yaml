  id: totrans-81
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig6_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig6_HTML.jpg)'
