- en: Markov Model with Puppo in Unity
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Open the environments folder and navigate to MarkovPuppo.exe Unity scene file.
  prefs: []
  type: TYPE_NORMAL
- en: Run this by double-clicking on it, and you will be able to see something like
    Figure [1-12](#Fig12).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig12_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig12_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-12
  prefs: []
  type: TYPE_NORMAL
- en: MarkovPuppo Unity scene application
  prefs: []
  type: TYPE_NORMAL
- en: The game is a simulation where Puppo (Puppo The Corgi from Unity Berlin) tries
    to find the sticks as soon as they are simulated in a Markov process. The sticks
    are initialized with predefined probability states, and a transition matrix is
    provided. For each iteration of the simulation, the stick that has the highest
    self-transition probability gets selected while the rest are destroyed. The task
    of the Puppo is to locate those sticks at each iteration, providing him a little
    rest of 6 seconds when he is able to reach one correctly. Since the transition
    probabilities are computed really fast, the steps taken by Puppo are instantaneous.
    This is a purely randomized distribution of Markov states where the state transition
    probability is computed on the go. Let us try to dig deep into the C# code to
    understand it better.
  prefs: []
  type: TYPE_NORMAL
- en: Open the DeepLearning project in Unity and navigate to the Assets folder. Inside
    the folder, try to locate the MarkovAgent folder. This contains folders called
    Scripts, Prefabs, and Scenes. Open the MarkovPuppo Scene in Unity and press play.
    We will be able to see Puppo trying to locate the randomly sampled Markov sticks.
    Let us try to understand the scene first.
  prefs: []
  type: TYPE_NORMAL
- en: The scene consists of Scene Hierarchy on the left and Inspector details on the
    right, followed by the Project, Console Tabs at the bottom with Scene, Game Views
    at the center. In the hierarchy, locate “Platform” GameObject and click on the
    drop-down. Inside the GameObject, there is a “CORGI” GameObject. Click on it to
    locate in the Scene View and open the details in the Inspector Window to the right.
    This is the Puppo Prefab, and it has an attached Script called “Markov Agent.“
    The Prefab can be explored further by clicking on the drop-down, and there will
    be several joints and Rigidbody components attached that would enable physics
    simulation for Puppo. The Scene View is shown in Figure [1-13](#Fig13).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig13_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig13_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-13
  prefs: []
  type: TYPE_NORMAL
- en: Scene View for Markov Puppo Scene including Hierarchy and Inspector
  prefs: []
  type: TYPE_NORMAL
- en: The Inspector Window is shown in Figure [1-14](#Fig14).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig14_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig14_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-14
  prefs: []
  type: TYPE_NORMAL
- en: Inspector tab and script
  prefs: []
  type: TYPE_NORMAL
- en: Open the Markov Agent script in Visual Studio Code or MonoDevelop (any C# Editor
    of your choice), and let us try to understand the code-base. At the start of the
    code, we have to import certain libraries and frameworks such as UnityEngine,
    System, and others.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: The script derives from MonoBehaviour base class. Inside we declare the GameObjects,
    Transforms, and other variables we want to use in the code. The GameObject “Puppo''
    references the Puppo Corgi agent, and it is referenced as such in Figure [1-14](#Fig14)
    in the Inspector window. GameObjects “Bone,” ”Bone1,” and ”Bone2” are the three
    stick targets in the scene that are randomized by Markov states. Next we have
    a transition matrix (named “transition_mat,” a matrix of float values), an initial
    probability array for the three sticks (named “initial_val,” a float array of
    size 3), and a result probability array to contain the probability after each
    iteration (named “result_val,” a float array of size 3). The variable “iterations”
    signifies the number of iterations for the simulation. The GameObject “active_obj”
    is another variable to contain the most probable self-transitioning stick at each
    iteration that remains active. The last variable is a Vector3 named “pos,” which
    contains the spawn position of Puppo after each iteration. Next we move to the
    details of creating the transition matrix , initial value array and try to understand
    how the iterations are formulated.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: In Unity C# scripting, under MonoBehaviour, there are two methods that are present
    by default. These are void methods named Start and Update. The Start method is
    generally used for initialization of variables of scene and assignment of tags
    to different objects; it is a preprocessing step to create the scene at the start
    of the game. The Update method runs per frame, and all the decision function and
    control logic is executed here. Since this is updated per frame, it is very computationally
    intensive if we are performing large complex operations. Other methods include
    Awake and Fixed Update. The Awake method is called before the Start thread executes,
    and Fixed Update has regular uniform-sized frame rates as compared to the Update
    method. In the first section of Start method, we assign the GameObjects to the
    respective tags. The tags can be created in the Inspector Window, under each selected
    GameObject, as shown in Figure [1-15](#Fig15).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig15_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig15_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-15
  prefs: []
  type: TYPE_NORMAL
- en: Assigning and creating tags for GameObjects
  prefs: []
  type: TYPE_NORMAL
- en: The tags are assigned via “GameObject.FindWithTag()” method. The next step is
    creation of transition matrix, which is a C# implementation of creating a generic
    float matrix of order 3 X 3\. This is shown in the “create_mat” function.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: After creating the empty matrix, we assign values to it. The values are derived
    from the Random library of Unity Engine, which assigns randomized float values
    for the matrix.
  prefs: []
  type: TYPE_NORMAL
- en: The initial value array is also initialized in this section.
  prefs: []
  type: TYPE_NORMAL
- en: The “StartCoroutine” method calls the “IEnumerator” interface in C# Unity. Instead
    of updating the game each frame (using the Update method), we pass the game logic
    inside the Coroutine. The Coroutine runs for the number of iterations provided
    in the initialization and also controls the simulation. This can be explained
    by the code as follows.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: This part of the code has a yield return statement that releases the control
    of the Coroutine thread to the Start thread for 0.1 seconds (momentary pause).
    Then for each iteration of the simulation, the transition matrix is randomized,
    and the product of the initial value and transition matrix is computed by the
    “mult()” function. Tanh function is a nonlinear activation function for making
    the distributions nonlinear in the result value array.
  prefs: []
  type: TYPE_NORMAL
- en: Next we have a series of if–else statements that select the maximum probabilistic
    state from the result value array.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: The next step is for Puppo to determine which stick has been activated based
    on the previous transitions. This can be done by using RayCast in the Unity Engine
    Physics System. RayCast casts a ray in the direction specified by the user and
    also has arguments that control the depth and time limit for the ray to stay active.
    The requirement for the RayCast to act is that there should be a Collider object
    attached to the three sticks. Colliders help in understanding when collisions
    of physics-based GameObjects take place. In this case, we use a simple BoxCollider
    for the detection with RayCast upon hitting it. Based on which sticks RayCast
    from Puppo hits, we see that Puppo automatically transports itself to that target
    position by assigning the transform value of the target stick.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
- en: After Puppo reaches the stick for an iteration, we allow him to rest a little
    by calling the “yield” method for 6 seconds. Once we have understood the full
    functionality of the code base we can click play in the editor. We can change
    the values of the iterations and also the values of the initial value array in
    the script according to our choice to see how the distribution changes. The Debug.
    Log statements that are present in the Console Tab provide information regarding
    the values of the result array at each iteration and also which stick is getting
    activated. A preview of the game is shown in Figure [1-16](#Fig16).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig16_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig16_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-16
  prefs: []
  type: TYPE_NORMAL
- en: Final game simulation of Markov Puppo
  prefs: []
  type: TYPE_NORMAL
- en: This is a simple simulation that we created with the Unity Engine to simulate
    Markov states in a randomized manner. In the next section we will try to understand
    HMMs and Decision Process for path creation using both Python and Unity.
  prefs: []
  type: TYPE_NORMAL
- en: Hidden Markov Models
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'HMMs are an extension of Markov states in which some of the states are unobservable
    or “hidden.” HMM assumes that if the state P depends on state S, then the HMM
    model should learn about S by observing state P. The HMM is a time-discrete stochastic
    process that can be mathematically explained simply between two states {S[n],
    P[n]} such that:'
  prefs: []
  type: TYPE_NORMAL
- en: S[n] is Markov Process State and is “hidden” or not directly observable.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: p (P[n] € P | S[1]= s[1],…,S[n] = s[n]) = p (P[n] € P | S[n] = s[n])
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: for all n>0, s[1],….,s[n] , where P and S are supersets of states and p() is
    conditional probability.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Concepts of Hidden Markov Models
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Let us understand this with an example situation. We take an environment where
    there are friends Alice and Bob. Bob can perform only three activities : walk,
    shop, and clean. The choice of Bob’s activities is dependent on the weather in
    the Environment. Alice knows the activities that Bob will perform on a particular
    day but does not know anything of the weather that affects Bob’s activities. This
    can be formulated as a discrete Markov Chain model where the weather conditions
    resemble the states. The set of weather conditions include rainy and sunny conditions.
    Thus the weather conditions are hidden states that affect Bob’s activities. The
    diagram further explains the situation. The diagram also shows the state transition
    probability values as well as the self-transition values. The Python simulation
    of the HMM has the following details:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE25]'
  prefs: []
  type: TYPE_PRE
- en: Figure [1-17](#Fig17) depicts the HMM.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig17_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig17_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-17
  prefs: []
  type: TYPE_NORMAL
- en: Hidden Markov Model environment
  prefs: []
  type: TYPE_NORMAL
- en: Hidden Markov Model with Tensorflow
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Open the MarkovModel.ipynb notebook, and in the third section there is a Tensorflow
    implementation of HMM based on initial probability and transition matrix.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE26]'
  prefs: []
  type: TYPE_PRE
- en: The HMM is under the Tensorflow Probability library (named “tensorflow_probability”)
    and is a method of the tf_distributions class. We initiate the values and also
    assign a normal distribution to each of the two initial states (having mean and
    standard deviation). The HMM under tf_distributions takes as arguments the initial
    probabilities, transition matrix, observation array that contains the normal distribution,
    the number of iterations to simulate, and optional arguments like name of the
    model and allow_nan_stats. Run this code in a notebook to get to know how the
    simulation values change after 10 iterations. We can also modify the values of
    the parameters and probabilities to produce new simulations.
  prefs: []
  type: TYPE_NORMAL
- en: Hidden Markov Model Agent in Unity
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let us try to use this principle and generate a stochastic path algorithm that
    uses HMM in Unity. The objective is to train an agent to detect the path where
    the rewards or objects are generated. At the start of each epoch, the agent tries
    to determine a productive path that is based on the highest probabilistic value
    a particular object/reward has at a particular state of time. Open the “HMMAgent”
    scene in Unity and click Play. The Console shows us what is the order of traversal
    followed by the cube agent to attain the highest valued reward or object at each
    point of time. For each episode or epoch of learning, the cube agent picks up
    any of the rewards that are present in the scene. The rewards are based in the
    form of highest probability an object has in a particular timestamp. Let us say,
    in timestamp t[0], object o[1] has the highest probability and in t[1] object
    o[2] has the highest probability, then the agent picks up o[1], o[2], and so on.
    Inside each episode, there are three timestamps, and for each episode different
    sequences can be observed. Certain sequences can be o[2], o[1], o[3], or even
    repeated states such as o[2], o[1], o[1], and so on. These sequences or paths
    are generated by a dynamic programming implementation of HMM known as Viterbi
    Algorithm. A preview of the simulation is shown in Figure [1-18](#Fig18).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig18_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig18_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-18
  prefs: []
  type: TYPE_NORMAL
- en: HMMAgent Unity scene
  prefs: []
  type: TYPE_NORMAL
- en: Let us open the associated script inside the Assets folder called “HMMViterbiAgent.cs”
    C# script. Most of the script is similar to the previous Markov Model script with
    common initialization of the transition matrix and initial and result value arrays.
    We have an additional inclusion of emission matrix (named “emission_mat”) and
    observation states (named “observation_states”) that have the emission probability
    values and the observation states, respectively.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE27]'
  prefs: []
  type: TYPE_PRE
- en: The initialization of both of them are as follows.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE28]'
  prefs: []
  type: TYPE_PRE
- en: Once we have followed the code for initialization and have attached the tags
    to the different targets and agents, we can inspect the Viterbi Algorithm that
    generates the path using the probabilities. The function declaration takes the
    matrices and arrays as arguments and fills the path array with the indices of
    the target objects being generated.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE29]'
  prefs: []
  type: TYPE_PRE
- en: We create a minimum weight algorithm where we try to reduce the probability
    of the states or objects and then try to find the highest probable object or target
    (among the objects) in a particular time.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE30]'
  prefs: []
  type: TYPE_PRE
- en: For the next steps, with the initial values of “a” matrix, we run a loop operation
    for each observation state and compute the minimum weight value accordingly.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE31]'
  prefs: []
  type: TYPE_PRE
- en: After this, we update the “a” matrix to hold the minimum weights temporarily.
    We also store the state having the minimum value in state matrix “s.”
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE32]'
  prefs: []
  type: TYPE_PRE
- en: Once we have filled the values of “a” and “s” matrices, we get the index of
    the target object with highest probability and least weight. Then we do backtracking
    to generate the possible minimum weighted path involving the other two target
    objects.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE33]'
  prefs: []
  type: TYPE_PRE
- en: The Viterbi algorithm is a dynamic programming algorithm that exploits Markov
    states and transition emission probabilities to choose a minimum weighted path
    that the agent can follow to collect the targets having the highest probabilities
    at each timestamp.
  prefs: []
  type: TYPE_NORMAL
- en: To run the function, we start a Coroutine, like before, and compute the result
    value array by multiplication of initial value array and transition matrix, like
    before, and call the HMMViterbi function.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE34]'
  prefs: []
  type: TYPE_PRE
- en: 'The rest of the code is similar to the previous Markov Model template where
    RayCast is used by the cube agent to detect the colliders of the target objects,
    and the transform of the cube is updated to follow the path. An interesting observation
    is the updates on the path after the Viterbi function is called:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE35]'
  prefs: []
  type: TYPE_PRE
- en: After we have understood the code, we can proceed further to test the code in
    Play mode by assigning the script to the cube agent (named “AgentCube_Purple”).
    The Unity Scene View of the environment is shown in Figure [1-19](#Fig19).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig19_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig19_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-19
  prefs: []
  type: TYPE_NORMAL
- en: Unity Scene with script assigned to AgentCube_Purple
  prefs: []
  type: TYPE_NORMAL
- en: If we follow closely, in the Inspector Window, we can change the number of iterations
    or the epoch/episodes according to our choice. The Console shows the details of
    the steps that are followed in the form of indices of the target cubes. A preview
    of the Inspector Window is shown in Figure [1-20](#Fig20).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig20_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig20_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-20
  prefs: []
  type: TYPE_NORMAL
- en: Inspector View of the scene
  prefs: []
  type: TYPE_NORMAL
- en: In this section, we have had an overview of Markov states, MDP, and HMM. This
    section is an important aspect in understanding the fundamentals of RL, as all
    learning algorithms in discrete RL are based on states. In this section, we have
    understood and implemented Markov models in Python and simulated games and understood
    the brief overview of dynamic programming-based HMM and also its simulation in
    Unity. The next section will focus on incorporating rewards to these states and
    make the agent learn how to attain those rewards. We will understand the core
    fundamentals of the Bellman equation and explore multi-armed bandits along with
    some variations in the iterative Bellman equation.
  prefs: []
  type: TYPE_NORMAL
- en: Bellman Equation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Now that we have an understanding of MDP , let us extend along this idea to
    introduce the concepts of iterated reward-based learning. The MDP and HMM provides
    us with an insight into how to retain past information of the states as we saw
    in the path tracking model. When we involve rewards in the context of Markov models,
    a generic learning algorithmic equation evolves. Mathematically we assume the
    rewards to be inside a set R and try to calculate the expectation of rewards,
    denoted by E[R] at the end of the episode. This can be shown as:'
  prefs: []
  type: TYPE_NORMAL
- en: G[t] =R[t+1] + R[t+2] + …+ R[t],
  prefs: []
  type: TYPE_NORMAL
- en: 'where G[t] is the expectation of the rewards of time step t based on sequence
    of rewards received. This can be thought of as an addition on dynamic programming-based
    Markov models, where each state has an expectation of reward. In general, the
    Bellman equation has an associated discount factor y (gamma), which discounts
    the rewards received in the previous states. Thus a formal iterative Bellman reward
    discount equation can be framed as :'
  prefs: []
  type: TYPE_NORMAL
- en: G[t] =R[t+1] + yR[t+2] + …+ ∑ y^kR[t+k]
  prefs: []
  type: TYPE_NORMAL
- en: This is the Bellman expected reward function on Markov states with discount
    factor gamma on previous rewards. This enables the agent to choose the most recent
    value of expectation of the rewards and accordingly the most recent states that
    lead to more rewards. This can be visualized as a top-down tree, since this is
    an iterative dynamic programming approach.
  prefs: []
  type: TYPE_NORMAL
- en: 'The iterative Bellman equation is formulated using two fundamental algorithmic
    approaches :'
  prefs: []
  type: TYPE_NORMAL
- en: '**Policy function** : The policy iterative function denoted by π(a|s) is a
    mapping between the states and the action sets to produce an optimal policy denoted
    by π*(a|s), which attains the highest expected reward. The policy function is
    validated in the form of maximization of values of the policy at each step.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Value function** : The value function denoted by vπ(s) denotes the value
    or the expected return received when starting in state s and following the policy
    π.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now that we have a brief idea of Bellman equations and what are value and policy
    functions let us try to visualize them as a top-down tree in Figure [1-21](#Fig21).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig21_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig21_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-21
  prefs: []
  type: TYPE_NORMAL
- en: Bellman value iteration tree
  prefs: []
  type: TYPE_NORMAL
- en: The Bellman tree provided shows how in action of a policy π can control the
    value vπ(s) from k+1 state to k state and enumerate expected rewards from k+1,
    k+2 states, and so on.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: Richard.E. Bellman, an applied American mathematician, founded the Bellman equation
    as a dynamic programming method that is used in optimal control theory and later
    in RL.
  prefs: []
  type: TYPE_NORMAL
- en: Bellman Agent Implementation in Unity
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We will discuss more on the aspects of value and policy iteration in later
    sections of this chapter, for now let us create another simulation based on rewards
    and the Bellman Iterative algorithm. Open up the Assets folder and navigate to
    the “BellmanAgent” folder. This contains a simulation game where the agent is
    on a racing kart, and there are rewards (green big cubes) that the agent has to
    reach and collect and after that reach the opposite end pole. The scene, when
    opened, would appear as shown in Figure [1-22](#Fig22).:'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig22_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig22_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-22
  prefs: []
  type: TYPE_NORMAL
- en: Bellman agent Unity scene
  prefs: []
  type: TYPE_NORMAL
- en: Let us understand the code of how the simulation works. The Kart Agent has an
    objective function to maximize its rewards for each episode or epoch of learning
    using the iterative value function of the Bellman equation. Once the agent reaches
    the second green target (green cube) or the end pole (finish line), the episode
    terminates. For the time being, the simulation is in one direction that is forward-backward
    along the z axis of the Kart Agent, and this can be extended to multidirectional
    traversal as well.
  prefs: []
  type: TYPE_NORMAL
- en: Open the “BellmanAgent.cs” C# Script. While the initialization and the variables
    are set according to previous templates of Markov models and HMM, there are distinct
    new features and variables that are required to be made.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE36]'
  prefs: []
  type: TYPE_PRE
- en: The variable “max_reward” is the total value of rewards that need to be accumulated
    in an episode by the agent. Variable “gamma” is the discount factor. Next we have
    initialization of GameObject variables for Kart Agent and the targets. We create
    a matrix of float values called states, which is the transitional matrix in this
    case. There is also a float array of rewards for each state, a dictionary for
    mapping states with the rewards. The values array of float is required for the
    value function update by using the iterative Bellman equation.
  prefs: []
  type: TYPE_NORMAL
- en: The fundamental concept in creating the states in a tabular discrete manner
    for Bellman updates is to use the transform.z position values of the track (i.e.,
    the road) The track may contain the green target or finish line or not. Depending
    on whether a particular section of the track has a target or is at the terminal
    position, we allocate rewards to each track section. This transforms the track
    into a virtual Gym-like environment containing different states and rewards, particularly
    similar to GridWorld (an environment in Gym).
  prefs: []
  type: TYPE_NORMAL
- en: 'We initialize the rewards using the Random.Range() function as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE37]'
  prefs: []
  type: TYPE_PRE
- en: The horizontal Track is divided into nine sections, each with an associated
    reward. We can manually set the rewards as well. We also populate the dictionary
    with the key value pair as :position value (Transform.position.z) and reward (float).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE38]'
  prefs: []
  type: TYPE_PRE
- en: We then create the value array and set it using the Random.Range function. The
    transition matrix is also created where the diagonal elements have the same probability
    of 0.04 and all the others are created with the “Random.Range” function. The start
    method is similar like before and contains all the states, initialization of GameObjects,
    and linking of the tags.
  prefs: []
  type: TYPE_NORMAL
- en: Once the initialization is done, let us form a deep understanding of the code
    for the Bellman equation.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE39]'
  prefs: []
  type: TYPE_PRE
- en: The function takes arguments as the transition matrix, rewards, dictionary,
    and also the value array. It computes the multiplication of a transitional matrix
    or state with the values array. Then it applies the gamma discount factor. Finally
    the rewards for the current state are added to generate the new values. After
    the operation is done, we take the most valuable element or state with the highest
    value and retrieve its index from the value array. This index will help us in
    mapping which reward value is getting triggered. From that reward value, we can
    navigate to that particular track section (position) by looking up the dictionary.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE40]'
  prefs: []
  type: TYPE_PRE
- en: This function helps to look up the particular reward that is attained during
    an iteration of the game and automatically returns the position of the triggered
    track section.
  prefs: []
  type: TYPE_NORMAL
- en: Let us put all of these together in a Coroutine function that is the control
    logic for the agent. Inside the IEnumerator function, we set a for loop that runs
    for the number of epochs we would want.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE41]'
  prefs: []
  type: TYPE_PRE
- en: This segment of code runs as long as the collected rewards are less than the
    total expected rewards specified in the initialization step. In this segment of
    code, we performed the Bellman iterative value operation, attained the particular
    reward value that is getting triggered for that instance, and also retrieved the
    transform position value of the corresponding track section. The rewards are added
    accordingly.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE42]'
  prefs: []
  type: TYPE_PRE
- en: The if-else statements specify and check whether the action taken by the Kart
    Agent has led him to the green target or finish line. If the agent reaches the
    finish line or the target then we provide him a momentary rest of 1 second before
    the start of the next iteration. This iteration continues as long as the rewards
    are less than the total expected rewards.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE43]'
  prefs: []
  type: TYPE_PRE
- en: If the conditions are met and the rewards accumulated equal the total rewards,
    we terminate the instance and provide the agent a rest for 2 seconds before moving
    to the next episode of training.
  prefs: []
  type: TYPE_NORMAL
- en: When we are comfortable with the code-base, we can play around and modify with
    the reward function and add more discrete rewards for different situations. Also
    the environment can be extended along the vertical track as well, which would
    also add more states on the transitional matrix as well as the value array. The
    motion of the agent would be then governed on both the x and the z axes. We can
    modify the script to accommodate more states by taking the x values of the vertically
    placed track section in the dictionary. Once the environment is set up as shown
    in Figure [1-23](#Fig23), we can click the Play button in the editor. Notice how
    the agent rapidly navigates to the highest rewarding state for each iteration
    and continues to do so because of the updates in the value array. The value array
    retains the information of the states or track sections that contain the highest
    rewards and also helps the agent in successive timestamps to follow that path.
    This can be realized as a buffer memory that retains the state having the highest
    values.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig23_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig23_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-23
  prefs: []
  type: TYPE_NORMAL
- en: Bellman agent Unity Scene with Inspector Window
  prefs: []
  type: TYPE_NORMAL
- en: In this section, we have learned about the Bellman equation, which is an iterative
    dynamic programming equation. We have visited some important concepts of relating
    rewards to Markov states and the Decision Process with the help of the Bellman
    equation. The section also touched briefly on the value and policy iteration techniques
    for reward maximization or value maximization by following a particular policy.
    We created and simulated a Unity Game where a Kart Agent has to apply the Bellman
    Value Function to navigate to the highest rewarding track sections. By now, we
    have learned how discrete tabular environments and value/policy optimization algorithms
    such as the Bellman equation are useful in RL. In the next section we will discuss
    creating another simulation game based on Multi Armed Bandits.
  prefs: []
  type: TYPE_NORMAL
- en: Creating a Multi-Armed Bandit Reinforcement Learning Agent in Unity
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Multi-armed bandits (MAB) are the simplest form of RL algorithmic simulations.
    This technique does not involve learning to choose maximum rewarding states but
    relies on a feedback mechanism. The k armed bandit problem can be described as
    follows: a bandit agent is in an environment where there are k different houses
    that can be robbed (action space). Based on the decision chosen at each step on
    the choice of the house, the bandit gets a reward. The reward, generally, is a
    stationary probabilistic distribution and can be negative (when the police are
    present in the house) or positive (when there are no police in the house). The
    objective of the bandit agent is to maximize positive rewards for n time-steps.'
  prefs: []
  type: TYPE_NORMAL
- en: 'This kind of basic RL environment is devoid of Markov states and Bellman optimization
    techniques, as mathematically it is a function of only the rewards and the action.
    To reframe, this can be interpreted as:'
  prefs: []
  type: TYPE_NORMAL
- en: Q(a) = E [ R[t] | A[t] = a ],
  prefs: []
  type: TYPE_NORMAL
- en: where Q(a) denotes the expectation of rewards following an action a.
  prefs: []
  type: TYPE_NORMAL
- en: Since the action of a bandit relies mostly on the outcome of rewards, there
    are several policies that have been implemented. Figure [1-24](#Fig24) shows a
    preview of the multi-armed bandit environment.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig24_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig24_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-24
  prefs: []
  type: TYPE_NORMAL
- en: Multi-armed bandit and environment
  prefs: []
  type: TYPE_NORMAL
- en: Strategies Involved in Multi-Armed Bandits
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There are several variations of the Bandit algorithm to maximize the rewards
    collected at each step. These are generally referred to as “action–value ” functions.
  prefs: []
  type: TYPE_NORMAL
- en: '**Greedy algorithm** : The brute force application involves using the Greedy
    Exploitation algorithm. This involves storing the Q-value (value function) of
    the action for each iteration and choosing the maximum Q-valued action. This is
    a nonexploration strategy, as in many cases the rewards may not be the highest
    at the same arm/location. Mathematically this can be seen as:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Q[t](a) = ∑ 1[(at=a)]. (R[i]) / ∑ 1[(at=a)] ,
  prefs: []
  type: TYPE_NORMAL
- en: 'choose the maximum Q-value:'
  prefs: []
  type: TYPE_NORMAL
- en: Argmax[a] Q[t](a)
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig25_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig25_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-25
  prefs: []
  type: TYPE_NORMAL
- en: Epsilon-Greedy algorithm
  prefs: []
  type: TYPE_NORMAL
- en: '**Epsilon-Greedy algorithm** : In this kind of algorithm, the bandit exploits
    and explores new states based on certain probability values, denoted bye. The
    bandit explores a new state with probability e and exploits the best current reward
    state with probability 1-e, as shown in Figure [1-25](#Fig25).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Decayed Epsilon-Greedy algorithm** : This is a variation of the previous
    exploitation–exploration algorithm. Here, a logarithmic decay factor may be associated
    with the exploitation of previous states.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Nonstationary Weighted algorithm** : If the rewards acquired by the bandit
    change over time, then it is a nonstationary problem. In this case we apply a
    weighted average on the previous Q-value and current rewards. This can be shown
    as :'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Q[n+1] = Q[n] + α [R[n] - Q[n]],
  prefs: []
  type: TYPE_NORMAL
- en: where α is the average weighted factor.
  prefs: []
  type: TYPE_NORMAL
- en: '**Upper Confidence-Bound (UCB) algorithm** : This is a statistical distribution
    of exploration-exploitation of different rewards. The algorithm explores by measuring
    the expected variance in the rewards of previous action. This is an optimistic
    value approach to reduce the variance of a particular action of getting high rewards.
    Mathematically it can be described by the equation:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A[t]= argmax [Q[t](a) + c√(ln(t)/N[t](a))],
  prefs: []
  type: TYPE_NORMAL
- en: where Nt(a) denotes the number of times the action a has been selected prior
    to time t and ln(t) is the natural logarithm of t.
  prefs: []
  type: TYPE_NORMAL
- en: '**Gradient Bandit algorithm** : This is a numerical preference algorithm that
    takes into account the preference of a particular state a over other states. The
    relative preference of one action over the other is recorded and can be sampled
    into a probabilistic distribution by including the softmax function. This is a
    very important function in general deep learning and will be using this in our
    deep RL algorithms.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Softmax(z) =e^z/(∑ e^z)
  prefs: []
  type: TYPE_NORMAL
- en: '**Thompson sampling** : It is a Bayesian sampling technique that is more sophisticated
    than Epsilon-Greedy algorithm and is based on posterior probability distribution
    of the actions and rewards.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Multi-Armed Bandit Simulation in Unity with UCB Algorithm
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this section, we will try to incorporate the Epsilon-Greedy, UCB with softmax
    gradient optimization. We will try to explore the different algorithmic approaches
    in Unity simulation, and then we can try to create an environment based on Python.
  prefs: []
  type: TYPE_NORMAL
- en: Open the scene “MAB-Unity.” The scene consists of three cubes, each having a
    different probability of rewards. On selecting play in the editor, we see that
    the bandit chooses different rewards (i.e., cubes) and always tries to optimize
    its rewards. This is a purely action–reward-based, noncontextual bandit with feedback,
    and hence we can control the exploration-exploitation with the Epsilon-Greedy
    algorithm. By default the simulation runs in Epsilon-Greedy, and there is an option
    for activating the UCB algorithm as well. In the Console Tab, we can see the expected
    rewards. A preview of the environment is shown in Figure [1-26](#Fig26).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig26_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig26_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-26
  prefs: []
  type: TYPE_NORMAL
- en: Multi-Armed Bandit Scene in Unity
  prefs: []
  type: TYPE_NORMAL
- en: Since by now we have gained some experience writing code in C# MonoBehaviour
    for Unity, let us open the “Agent” script. The first contains the variable setup;
    here it should be noted that if we want private variables to be rendered in the
    Inspector Window, we have to mention the [SerializeField] attribute over each
    of the private variables.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE44]'
  prefs: []
  type: TYPE_PRE
- en: The initialization involves variables such as epsilon for the Epsilon-Greedy
    algorithm, Boolean trigger for UCB, and float arrays of rewards, values (Q-values),
    and action times (which signify to what extent an action “a” is repeated). The
    confidence interval is a float list that helps in the UCB algorithm. The actions
    list contains the indices of the relevant cubes during running of the application.
    The start method contains all the initializations of the variables and lists,
    which calls the Coroutine for the game control logic.
  prefs: []
  type: TYPE_NORMAL
- en: Let us explore the chooseaction method, which contains the implementation of
    Epsilon-Greedy UCB algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE45]'
  prefs: []
  type: TYPE_PRE
- en: This part of the code segment randomly chooses float values and checks whether
    they are less than the exploitation rate. Then it tries to explore new cubes with
    the “rnd.Next()” method. This is an exploration strategy that is based on the
    randomized distribution of the samples.
  prefs: []
  type: TYPE_NORMAL
- en: 'If this option is not chosen, then the control passes to the else statement.
    If we want to use the UCB algorithm, we have to check the boolean variable to
    be true. The UCB code is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE46]'
  prefs: []
  type: TYPE_PRE
- en: The UCB code is divided into two statements. If the time period is not provided
    for UCB, then it is a random exploration algorithm. If the time period for past
    actions is taken into consideration, then the control goes to the “else” statement.
    The UCB then computes the Q-values of all the possible actions using the UCB formula.
    After attaining each of the Q-values, they are populated in the confidence interval
    list. The later part of the code segment then chooses the maximum Q-value from
    this confidence interval list and returns that particular cube.
  prefs: []
  type: TYPE_NORMAL
- en: We next move into the “take action” function and try to update the Q-values
    and reward values by adding a learning rate to aid in the UCB algorithm. The algorithm
    also computes the relative rewards at each step as well as the average rewards.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE47]'
  prefs: []
  type: TYPE_PRE
- en: The “Play” method links the above two functions and runs them for the iterations
    provided in the Inspector Window. The Q-value of a particular action with the
    highest confidence interval values gets selected and passed to the “takeaction”
    method.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE48]'
  prefs: []
  type: TYPE_PRE
- en: Let us enter into the IEnumerator code segment, where all the functions are
    called and the appropriate cube gets selected. The “Play” command gets called
    for 900 iterations, and for each iteration, we get the details of average rewards
    and total rewards in the Console Window. Then based on the selection of cubes,
    the highest valued cube per iteration is set active and the rest are deactivated.
    This signifies which cube is getting triggered at which iteration and provides
    the maximum Q-value.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE49]'
  prefs: []
  type: TYPE_PRE
- en: Thus we implemented an Epsilon-Greedy-UCB-based, multi-armed bandit simulation.
    We can play with the settings by switching between Epsilon-Greedy and UCB algorithms
    during gameplay to see how exploration–exploitation details are affected. Once
    we have understood the code, we can click Play in the Unity Editor and see the
    simulation running. After many iterations, we will observe that some of the cubes
    are repeatedly being selected—a classic example of bandit exploitation. We can
    then change the epsilon and learning rate values or change to UCB algorithm to
    have more exploration. Figure [1-27](#Fig27) is a preview of the simulation.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig27_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig27_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-27
  prefs: []
  type: TYPE_NORMAL
- en: Multi-armed bandit Inspector Window
  prefs: []
  type: TYPE_NORMAL
- en: Building Multi-Armed Bandit with Epsilon-Greedy and Gradient Bandit Algorithms
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Once we have verified our algorithm, we can try our hand at implementing a
    simpler version of Epsilon-Greedy environment in Python using Jupyter Notebook
    or Colab Notebook. Open the “Multi-Armed Bandit.ipynb” Notebook in Colab or Notebook.
    The code is pretty straightforward. We have an implementation of the classic 10-arm
    bandit, where we have an initial ground truth distribution of the probabilities
    of each arm (house in our case). We also initialize the probability of the arms
    and the agents’ probabilities. The rest of the code represents a for loop that
    runs the number of epochs provided in “num_epochs” variable. If the value of epsilon
    is greater than random value, then we explore among the 10 different arms; otherwise
    we exploit. Once the rewards have been attained for a particular episode, we update
    the Q function by using an incremental approach given by the generic equation:'
  prefs: []
  type: TYPE_NORMAL
- en: Q[n+1] =∑R[i] /n,
  prefs: []
  type: TYPE_NORMAL
- en: where the Q-value for n+1-th iteration is the average of the previous rewards
    R[i] collected over past n episodes.
  prefs: []
  type: TYPE_NORMAL
- en: The program is pretty much self-explanatory and contains all the details in
    the comments to generate a possible distribution and sampling of the arms.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: The code and scene have been built using Unity version 2018.3 but are compatible
    with all versions of Unity, including the 2020 beta version.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE50]'
  prefs: []
  type: TYPE_PRE
- en: 'After the initialization, we enter into the for loop as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE51]'
  prefs: []
  type: TYPE_PRE
- en: 'The Epsilon-Greedy sampling technique produces the rewards accordingly. Then
    we update the arm number that the bandit has to pull and update the reward count
    as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE52]'
  prefs: []
  type: TYPE_PRE
- en: 'The incremental approach is then applied to generate the Q-value for n+1-th
    iteration as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE53]'
  prefs: []
  type: TYPE_PRE
- en: Finally we print the outcome of each epoch in terms of best rewards achieved,
    Q-values, and arm selected. The output should appear like Figure [1-28](#Fig28)
    after running.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig28_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig28_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-28
  prefs: []
  type: TYPE_NORMAL
- en: Multi-armed bandit Epsilon-Greedy in Python
  prefs: []
  type: TYPE_NORMAL
- en: 'In this section, we understood the simplest form of the RL algorithm called
    multi-armed bandits. We learned about the different optimization techniques of
    exploration and exploitation in MAB to have a greater Q-value or rewards at each
    action step. Unlike complex Markov Models, HMM, and Bellman equations, there is
    no concept of state here, and that is why it is a lightweight model for RL. We
    then created a MAB simulation environment in Unity using Epsilon-Greedy and UCB
    algorithm techniques and visualized the rewards in each stage of the process.
    In the next section, we will consider the final steps for introductory RL: value
    and policy iterations. This section was initialized in the Bellman equation and
    will continue from there.'
  prefs: []
  type: TYPE_NORMAL
- en: Value and Policy Iterations
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Since the introduction of the Bellman equation earlier in this chapter, we
    have been briefly introduced to the value and policy iteration functions. The
    policy iteration can be thought of as optimizing a policy π*(s | a) from a base
    policy π(s | a), which would lead to an increase in the value function associated
    with that policy. A simple value update function can be mathematically simplified
    as :'
  prefs: []
  type: TYPE_NORMAL
- en: V(s[t]) = V(s[t]) + α [G[t] - V(s[t])],
  prefs: []
  type: TYPE_NORMAL
- en: 'where alpha is a constant step size used in learning, V(s[t]) is the value
    attained at state t, and G[t] is the expectation of rewards R[t] introduced in
    the Bellman equation section. If we replace the value of G[t], with an iterative
    discount factor y (gamma) introduced in the Bellman equation, we can reframe the
    value equation as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: V(s[t]) = V(s[t]) + α [R[t+1] + yV(s[t+1]) - V(s[t])]
  prefs: []
  type: TYPE_NORMAL
- en: This method of value optimization over a certain policy is known as temporal
    difference learning. Particularly, this equation signifies the TD(0) algorithm,
    since we concern ourselves with just one state ahead of the current state (i.e.,
    step t+1).
  prefs: []
  type: TYPE_NORMAL
- en: 'The value iteration mechanism also has a definitive way to define the error
    term ∂ produced after each successive step of the learning process by assessing
    the values of t+1 and t states. This can be mathematically shown by the simplified
    equation:'
  prefs: []
  type: TYPE_NORMAL
- en: ∂[t] = R[t+1] + yV(s[t+1]) - V(s[t]),
  prefs: []
  type: TYPE_NORMAL
- en: where ∂ is the error for timestamp t.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now that we have the mathematical conception of value iteration technique,
    we can better realize what was happening in the “BellmanAgent, cs” script in Unity.
    The outcome of the value function is controlled by the policy function, which
    also gets updated. Based on the policy function, the agent has to maximize the
    value function, and if the policy fails to do that, then the policy gets updated
    as well. This can be explained simplistically by this equation:'
  prefs: []
  type: TYPE_NORMAL
- en: π*(s, a) = argmax V[π](s,a),
  prefs: []
  type: TYPE_NORMAL
- en: where symbols have their original meaning. Let us try to visualize how policy
    iteration can help attain maximum value function in Figure [1-29](#Fig29).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig29_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig29_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-29
  prefs: []
  type: TYPE_NORMAL
- en: Value policy iteration functions
  prefs: []
  type: TYPE_NORMAL
- en: 'Now let us understand a fundamental concept involving value and policy iteration
    known as Q–learning. The Q-learning algorithm is an off-policy temporal difference
    learning algorithm that uses the Q function as the value function and tries to
    maximize the value. It can be simply written in accordance to generalized value
    iteration equation, replacing V(s) with Q(s,a) as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: Q(s[t], a[t]) = Q(s[t,] a[t]) + α [R[t+1] + y maxQ(s[t+1], a[t+1]) - Q(s[t],
    a[t])]
  prefs: []
  type: TYPE_NORMAL
- en: The Q–learning algorithm is a tabular discrete algorithm that uses the value
    and policy iteration equations and forms the baseline model in general RL. Let
    us first try to understand how Q-learning and policy updates work by understanding
    a tabular Gym environment.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: Q-learning was introduced by Chris Watkins in 1989.
  prefs: []
  type: TYPE_NORMAL
- en: Implementing Q-Learning Policy Using Taxi Gym Environment
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Open the “Policy Iteration Function and Q Learning.ipynb” Notebook, and let
    us try to understand the environment . In this Notebook, we have used the Taxi
    environment (2D) from OpenAI Gym environment set, where the Taxi is shown with
    the help of a yellow box. The environment can be installed in the Notebook as
    follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE54]'
  prefs: []
  type: TYPE_PRE
- en: Upon running the Notebook or Colab, we will be presented with the details of
    the Observation space and Action space, just like in the CartPole environment,
    as shown in Figure [1-30](#Fig30).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig30_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig30_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-30
  prefs: []
  type: TYPE_NORMAL
- en: Taxi-v3 Gym environment
  prefs: []
  type: TYPE_NORMAL
- en: The next part of the Notebook contains the stepwise code for training using
    Q-learning based on observation states and rewards. We initialize the variables
    as
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE55]'
  prefs: []
  type: TYPE_PRE
- en: where “alpha” is the learning rate, “gamma” is the discount factor, “epsilon”
    is used for the exploration–exploitation strategy (used in the MAB algorithm),
    and “q_table” is the matrix containing the observation and action spaces.
  prefs: []
  type: TYPE_NORMAL
- en: 'We then run a for loop for the number of epochs we want to train with Q-learning
    as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE56]'
  prefs: []
  type: TYPE_PRE
- en: We reset the environment before the start of each epoch. The next segment contains
    the different exploitation–exploration strategy of Q-learning and updates of the
    “q_table” by applying the Q-learning equation. The states, rewards, and action
    spaces are received from the Gym environment in each stage of the learning process.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE57]'
  prefs: []
  type: TYPE_PRE
- en: The comments in each line describe the operation that is being performed in
    the subsequent step. After the training is complete, the Q-table contains the
    values of the most rewarding states. This can be represented by the updated Taxi
    environment, as shown in Figure [1-31](#Fig31).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig31_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig31_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-31
  prefs: []
  type: TYPE_NORMAL
- en: Taxi Gym environment training in Q-learning
  prefs: []
  type: TYPE_NORMAL
- en: The next segment contains code for the evaluation of the model. For each epoch
    of the Q–learning agent, the Taxi attains a reward based on the Q-table. If the
    reward is negative, then we add a penalty value, which means that the Taxi has
    collided with another object in the environment.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE58]'
  prefs: []
  type: TYPE_PRE
- en: On running the segment, we get the penalty values and the epochs per episodes,
    as shown in Figure [1-32](#Fig32).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig32_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig32_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-32
  prefs: []
  type: TYPE_NORMAL
- en: Taxi Gym environment evaluation
  prefs: []
  type: TYPE_NORMAL
- en: Q-Learning in Unity
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let us now move to create a similar template for Q-learning in Unity. Open the
    scene named “Q-Learning” and click Play. The cylindrical object is the agent,
    which tries to move from top to bottom by avoiding the red planes and using only
    the green planes. The planes are the state samples, or the Observation space,
    as in Gym environments. Green planes have rewards associated with them, while
    red ones have negative rewards. The agent uses an iterative Q-learning algorithm
    as the policy to update the value function and to maximize its rewards. The scene
    should appear something as shown in Figure [1-33](#Fig33).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig33_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig33_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-33
  prefs: []
  type: TYPE_NORMAL
- en: Q-learning scene in Unity
  prefs: []
  type: TYPE_NORMAL
- en: Open the attached script mentioned as “QLearning.cs,” and let us have a brief
    walk-through of the important functions. Since most of the state initialization,
    tag allocation, and variable initialization are similar to previous projects,
    we will be skipping that in this section. The most important function in this
    context is the “train” function, which contains the core functionality of the
    Q-learning algorithm and also the updation of the Q-table by selecting the highest
    valued state (plane) in each timestamp.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE59]'
  prefs: []
  type: TYPE_PRE
- en: Inside the loop, we randomly select an initial state from the given states and
    query the Q-table for the next state given by the “GetProbNextState” method. This
    function actually returns the maximum valued state in that particular epoch or
    episode from the state list.
  prefs: []
  type: TYPE_NORMAL
- en: 'For the next steps, we use this information and also update the Q-table by
    using the Q-learning equation as shown here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE60]'
  prefs: []
  type: TYPE_PRE
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: The code and scene have been built using Unity version 2018.3 but are compatible
    with all versions of Unity, including the 2020 beta version.
  prefs: []
  type: TYPE_NORMAL
- en: After abstracting the states based on Q-policy, the code selects the location
    or transform of the plane that is being triggered. The agent is automatically
    shifted to that transform position. The rest of the code segment is a boiler plate
    code for the environment and the Coroutine “train” method that controls the entire
    workflow logic. Once we are satisfied with the understanding of the code base,
    we can run the scene and simulate it. The main idea of this simulation is to understand
    the importance of Q–learning in a discrete environment of rewards, states, and
    actions.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We are at the end of the first chapter, and here is the summary of what we
    have learned so far:'
  prefs: []
  type: TYPE_NORMAL
- en: We have tried to understand the basics of reinforcement learning (RL) and inclusion
    of states, actions, and rewards. RL is a different paradigm that involves interaction
    of an agent with an environment to maximize its goals.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In order to understand the concept of states, rewards, and actions, we installed
    a Gym environment. Gym is an RL environment developed by OpenAI for research in
    deep RL as well as in robotics.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We learned how to set up Anaconda and Jupyter Notebooks and how to initialize
    a Python kernel in Colab and Jupyter for RL.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We tried to understand the logical problem of CartPole and tried to model it
    as an RL environment in Python. We saw the Observation and the Action space of
    the environment and also gained insight into Tensorflow, Tensorboard, and other
    deep learning libraries and frameworks.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We learned of the Markov Process, Finite Decision Theory, Hidden Markov Models
    (HMMs) and how probabilistic distribution of states help in learning.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We learned how to install Unity Engine from the Unity Hub.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We developed a simulation using Puppo (Unity Berlin) based on Markov Models
    using transition matrix probabilities and another simulation using a cube agent
    for HMMs.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We learned how to create Unity C# scripts and learned about Coroutinesand internal
    methods in Unity such as Start and Update.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We extended our knowledge of Markov Models into reward-based learning by introducing
    the Bellman equation. We developed a Kart Racing simulation where a Kart Agent
    had to determine which Track section to choose based on the rewards and value
    maximization. We learned about value and policy iteration algorithms.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We designed and learned about the multi-armed bandit problem and how different
    strategies like Epsilon-Greedy, upper confidence-bound, and gradient bandits affected
    the bandit’s decision. We learned that bandit problems are the simplest form of
    RL algorithms without the concept of state and created a Bandit simulation in
    Unity.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The last section relied on intensive discussion on value and policy iterative
    algorithms and how to maximize a particular value function based on a certain
    policy. We learned about temporal differencing and Q–learning, the most famous
    baseline learning algorithm for classic RL. We created a Gym Taxi environment
    to understand the Q-learning algorithm in Python and then created a simulation
    of a pathfinding agent based on reward maximization using Q-learning policy.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In all these sections, we have tried to develop algorithms in parallel using
    Python as well as C# so as to get a better understanding at a core level regarding
    how these are represented.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We have used Tensorflow libraries and also created bandit problems in Jupyter
    Notebooks or Colab for better understandability of the concepts.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This concludes the first chapter of the book. This chapter forms the base of
    RL concepts, and we have tried to gain insight into how development of RLc took
    place, from initial Markov Models to Bellman equations and then to value and policy
    iterations to maximize rewards.
  prefs: []
  type: TYPE_NORMAL
- en: All of these concepts fall under discrete classical RL and will be required
    extensively when we try to explore deep RL with the Unity ML Agents Toolkit, which
    converts the discrete action space to multi-discrete or continuous space for deep
    learning algorithms. In the next chapter we will be looking into Navigation Meshes,
    Pathfinding AI, and many more algorithms in automatic and heuristic pathfinding
    in Unity.
  prefs: []
  type: TYPE_NORMAL
