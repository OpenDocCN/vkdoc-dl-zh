- en: To summarize, we have got some idea about what RL is and how it is governed
    by states, actions, and rewards. We have seen the role of an agent in an environment
    and the different paths it takes to maximize the rewards. We have learned to set
    up Jupyter Notebooks and an Anaconda environment and also installed some key libraries
    and frameworks that will be used extensively along the way. There was a systematic
    approach in understanding the CartPole environment of OpenAI Gym as a classical
    RL problem, along with understanding the states and rewards in the environment.
    Lastly we developed a miniature simulation of a CartPole environment that would
    make the pole upright for 50 iterations, and also had a visualization using a
    deep Q-learning model. The details and implementations will be discussed in-depth
    in later chapters along with Unity ML agents. The next section involves understanding
    MDP and Decision Theory using Unity Engine and will be creating simulations for
    the same.
  prefs: []
  type: TYPE_NORMAL
- en: Unity Game Engine
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Unity Engine is a cross-platform engine that is not only used for creating games
    but also simulations, visual effects, cinematography, architectural design, extended
    reality applications, and especially research in machine learning. We will be
    concentrating our efforts on understanding the open-source machine learning framework
    developed by Unity Technologies— namely, the Unity ML Toolkit. The latest release
    of version 1.0 at the time of writing this book has several new features and extensions,
    code modifications, and simulations that will be discussed in-depth in the subsequent
    sections. The toolkit is built on the OpenAI Gym environment as a wrapper and
    communicates between Python API and Unity C# Engine to build deep learning models.
    Although there have been fundamental changes in the way the toolkit works in the
    latest release, the core functionality of the ML toolkit remains the same. We
    will be extensively using the Tensorflow library with Unity ML agents for deep
    inference and training of the models, through custom C# code, and will also try
    to understand the learning in the Gym environments by using baseline models for
    best performance measures. A preview of the environments in ML Agents Toolkit
    is shown in Figure [1-7](#Fig7).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig7_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-7
  prefs: []
  type: TYPE_NORMAL
- en: Unity machine learning toolkit
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: We will be using Unity version 2018.4x and 2019 with Tensorflow version 1.7
    and ML agents Python API version 0.16.0 and Unity ML agents C# version(1.0.0).
    However, the functionality remains the same for any Unity version above 2018.4.x.
    The detailed steps of installing Unity Engine and ML agents will be presented
    in the subsequent sections.
  prefs: []
  type: TYPE_NORMAL
- en: Markov Models and State-Based Learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before starting with Unity ML Toolkit, let us understand the fundamentals of
    state-based RL. The Markov Decision Process (MDP) is a stochastic process that
    tries to enumerate future states based on the probability of the current state.
    A finite Markov model relies on information of a current state denoted by *q*(s,
    a)*, which includes state, action pair. In this section, we will be focusing on
    how to generate transition states between different decisions and also creating
    simulations based on these transitions in Unity Engine. There will be a walk-through
    of how state enumeration and Hidden Markov Models (HMM)s can assist an agent in
    finding a proper trajectory in an environment to attain its rewards in Unity.
  prefs: []
  type: TYPE_NORMAL
- en: 'Finite MDP can be considered as a collection of sets: {S, A, R}, where the
    rewards R resemble any probabilistic distribution of the rewards in state space
    S. For particular values of state *s*[*i*] € *S* and *r*[*i*] *€ R*, there is
    a probability of those values occurring at time *t,* given particular values of
    preceding state and action, where | refers to conditional probability:'
  prefs: []
  type: TYPE_NORMAL
- en: p (s[i], r[i] | s, a) = P[r] {S[t] = s[i], R[t] = r[i] | S[t-1] = s, A[t-1]
    = a}
  prefs: []
  type: TYPE_NORMAL
- en: 'The decision process generally involves a transition probability matrix that
    provides the probability of a particular state moving forward to another state
    or returning to its previous state. A diagrammatic view of the Markov Model can
    be depicted as in Figure [1-8](#Fig8).:'
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: Andrey Andreyevich Markov introduced the concept of Markov Chains in stochastic
    processes in 1906.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig8_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-8
  prefs: []
  type: TYPE_NORMAL
- en: State transition diagram of Markov Models
  prefs: []
  type: TYPE_NORMAL
- en: Concepts of States in Markov Models
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The state transition diagram provides a binary chain model having states S and
    P. The probability of state S to remain in its own state is 0.7, whereas that
    to go to state P is 0.3\. Likewise, the transition probability of state P to S
    is 0.2, whereas the self-transition state probability of P is 0.8\. According
    to the law of probabilities, the sum of mutual and self-transition probabilities
    will be 1\. This allows us to generate a transition matrix of order 2 X 2, as
    shown in Figure [1-9](#Fig9).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig9_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-9
  prefs: []
  type: TYPE_NORMAL
- en: State transition matrix
  prefs: []
  type: TYPE_NORMAL
- en: 'The transition matrix at the end of each operation produces different values
    for self- and cross-transition of the different states. This can be mathematically
    visualized as computing the power of the transition matrix, where the power is
    the number of iterations we require for the simulation to occur as mentioned below:'
  prefs: []
  type: TYPE_NORMAL
- en: T(t+k) = T(t)^k k€ R
  prefs: []
  type: TYPE_NORMAL
- en: The formulation shows the states of the transition matrix after k iterations
    are given by the power of the transition matrix at initial state times, k, under
    the assumption that k belongs to Real.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let us try to extend this idea by initializing the individual states S and
    P with initial probabilities. If we consider V to be an array containing the initial
    probabilities of the two states, then after k iterations of the simulation, the
    final array of states F can be attained as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: F(t+k)=V(t)*T(t)^k
  prefs: []
  type: TYPE_NORMAL
- en: Markov Models in Python
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This is an iterative Markov Process where the states get enumerated based on
    the transition and initial probabilities. Open the “MarkovModels.ipynb” Jupyter
    Notebook and let us try to understand the implementation of the transition model.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: We import numpy and pandas libraries, which would help us in computing matrix
    multiplications. The initial state of the sets is set to 1.0 and 0.5 for S and
    P, respectively. The transition matrix is initialized as mentioned previously.
    We then compute the value of the transition matrix for 3, 10, and 35 iterations,
    respectively, and with the output of each stage, we multiply the initial probability
    array. This provides us the final values for each state. You can change the values
    of the probabilities to get more results as to what extent a particular state
    stays in itself or transitions to another state.
  prefs: []
  type: TYPE_NORMAL
- en: In the second example, we provide a visualization of how a ternary system of
