  zh: 图 1-6
- en: TensorBoard visualization of CartPole problem using deep Q-learning
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 使用深度 Q-learning 的 CartPole 问题 TensorBoard 可视化
- en: To summarize, we have got some idea about what RL is and how it is governed
    by states, actions, and rewards. We have seen the role of an agent in an environment
    and the different paths it takes to maximize the rewards. We have learned to set
    up Jupyter Notebooks and an Anaconda environment and also installed some key libraries
    and frameworks that will be used extensively along the way. There was a systematic
    approach in understanding the CartPole environment of OpenAI Gym as a classical
    RL problem, along with understanding the states and rewards in the environment.
    Lastly we developed a miniature simulation of a CartPole environment that would
    make the pole upright for 50 iterations, and also had a visualization using a
    deep Q-learning model. The details and implementations will be discussed in-depth
    in later chapters along with Unity ML agents. The next section involves understanding
    MDP and Decision Theory using Unity Engine and will be creating simulations for
    the same.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，我们对强化学习（RL）有了初步的了解，以及它是如何由状态、动作和奖励所控制的。我们看到了代理在环境中的作用以及它采取的不同路径以最大化奖励。我们学习了如何设置Jupyter
    Notebooks和Anaconda环境，并安装了一些将在过程中广泛使用的关键库和框架。我们以一个经典强化学习问题为例，系统地理解了OpenAI Gym的CartPole环境，以及环境中的状态和奖励。最后，我们开发了一个CartPole环境的微型模拟，该模拟将使杆在50次迭代中保持直立，并使用深度Q学习模型进行了可视化。详细内容和实现将在后续章节中与Unity
    ML agents一起深入讨论。下一节将涉及使用Unity引擎理解MDP和决策理论，并将为同一内容创建模拟。
- en: Unity Game Engine
  id: totrans-85
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Unity游戏引擎
- en: Unity Engine is a cross-platform engine that is not only used for creating games
    but also simulations, visual effects, cinematography, architectural design, extended
    reality applications, and especially research in machine learning. We will be
    concentrating our efforts on understanding the open-source machine learning framework
    developed by Unity Technologies— namely, the Unity ML Toolkit. The latest release
    of version 1.0 at the time of writing this book has several new features and extensions,
    code modifications, and simulations that will be discussed in-depth in the subsequent
    sections. The toolkit is built on the OpenAI Gym environment as a wrapper and
    communicates between Python API and Unity C# Engine to build deep learning models.
    Although there have been fundamental changes in the way the toolkit works in the
    latest release, the core functionality of the ML toolkit remains the same. We
    will be extensively using the Tensorflow library with Unity ML agents for deep
    inference and training of the models, through custom C# code, and will also try
    to understand the learning in the Gym environments by using baseline models for
    best performance measures. A preview of the environments in ML Agents Toolkit
    is shown in Figure [1-7](#Fig7).
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: Unity引擎是一个跨平台引擎，不仅用于创建游戏，还用于模拟、视觉效果、电影摄影、建筑设计、扩展现实应用，尤其是在机器学习领域的研究。我们将集中精力理解Unity
    Technologies开发的开源机器学习框架——即Unity ML Toolkit。本书撰写时，最新发布的1.0版本有几个新功能和扩展、代码修改以及将在后续章节中深入讨论的模拟。该工具包基于OpenAI
    Gym环境作为包装器，并在Python API和Unity C#引擎之间进行通信，以构建深度学习模型。尽管在最新版本中工具包的工作方式发生了根本性的变化，但ML工具包的核心功能保持不变。我们将广泛使用Tensorflow库与Unity
    ML agents进行深度推理和模型训练，通过自定义C#代码，并尝试通过使用基线模型来理解Gym环境中的学习，以实现最佳性能指标。ML Agents Toolkit中的环境预览如图[1-7](#Fig7)所示。
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig7_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig7_HTML.jpg)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig7_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig7_HTML.jpg)'
- en: Figure 1-7
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-7
- en: Unity machine learning toolkit
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: Unity机器学习工具包
- en: Note
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: We will be using Unity version 2018.4x and 2019 with Tensorflow version 1.7
    and ML agents Python API version 0.16.0 and Unity ML agents C# version(1.0.0).
    However, the functionality remains the same for any Unity version above 2018.4.x.
    The detailed steps of installing Unity Engine and ML agents will be presented
    in the subsequent sections.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用Unity版本2018.4x和2019，配合Tensorflow版本1.7和ML agents Python API版本0.16.0以及Unity
    ML agents C#版本(1.0.0)。然而，对于任何高于2018.4.x版本的Unity，功能保持不变。安装Unity引擎和ML agents的详细步骤将在后续章节中介绍。
- en: Markov Models and State-Based Learning
  id: totrans-92
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 马尔可夫模型和基于状态的学习
- en: Before starting with Unity ML Toolkit, let us understand the fundamentals of
    state-based RL. The Markov Decision Process (MDP) is a stochastic process that
    tries to enumerate future states based on the probability of the current state.
    A finite Markov model relies on information of a current state denoted by *q*(s,
    a)*, which includes state, action pair. In this section, we will be focusing on
    how to generate transition states between different decisions and also creating
    simulations based on these transitions in Unity Engine. There will be a walk-through
    of how state enumeration and Hidden Markov Models (HMM)s can assist an agent in
    finding a proper trajectory in an environment to attain its rewards in Unity.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 在开始使用 Unity ML Toolkit 之前，让我们了解基于状态的动作学习基础。马尔可夫决策过程（MDP）是一个随机过程，它试图根据当前状态的概率来枚举未来状态。一个有限的马尔可夫模型依赖于表示为
    *q*(s, a)* 的当前状态信息，它包括状态-动作对。在本节中，我们将关注如何在 Unity 引擎中生成不同决策之间的转移状态，以及基于这些转移创建模拟。我们将介绍状态枚举和隐马尔可夫模型（HMM）如何帮助智能体在环境中找到适当的轨迹以在
    Unity 中获得奖励。
- en: 'Finite MDP can be considered as a collection of sets: {S, A, R}, where the
    rewards R resemble any probabilistic distribution of the rewards in state space
    S. For particular values of state *s*[*i*] € *S* and *r*[*i*] *€ R*, there is
    a probability of those values occurring at time *t,* given particular values of
    preceding state and action, where | refers to conditional probability:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 有限MDP可以被视为集合：{S, A, R}，其中奖励 R 类似于状态空间 S 中奖励的任何概率分布。对于状态 *s*[*i*] € *S* 和 *r*[*i*]
    *€ R* 的特定值，在给定先前状态和动作的特定值的情况下，在时间 *t* 发生这些值的概率，其中 | 表示条件概率：
- en: p (s[i], r[i] | s, a) = P[r] {S[t] = s[i], R[t] = r[i] | S[t-1] = s, A[t-1]
    = a}
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: p (s[i], r[i] | s, a) = P[r] {S[t] = s[i], R[t] = r[i] | S[t-1] = s, A[t-1]
    = a}
- en: 'The decision process generally involves a transition probability matrix that
    provides the probability of a particular state moving forward to another state
    or returning to its previous state. A diagrammatic view of the Markov Model can
    be depicted as in Figure [1-8](#Fig8).:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 决策过程通常涉及一个转移概率矩阵，它提供了特定状态向前移动到另一个状态或返回其先前状态的概率。马尔可夫模型的图示视图可以如图 [1-8](#Fig8)
    所示：
- en: Note
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Andrey Andreyevich Markov introduced the concept of Markov Chains in stochastic
    processes in 1906.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 安德烈·安德烈耶维奇·马尔可夫在 1906 年将马尔可夫链的概念引入到随机过程中。
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig8_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig8_HTML.jpg)'
  id: totrans-99
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig8_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig8_HTML.jpg)'
- en: Figure 1-8
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-8
- en: State transition diagram of Markov Models
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 马尔可夫模型的状态转移图
- en: Concepts of States in Markov Models
  id: totrans-102
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 马尔可夫模型中的状态概念
- en: The state transition diagram provides a binary chain model having states S and
    P. The probability of state S to remain in its own state is 0.7, whereas that
    to go to state P is 0.3\. Likewise, the transition probability of state P to S
    is 0.2, whereas the self-transition state probability of P is 0.8\. According
    to the law of probabilities, the sum of mutual and self-transition probabilities
    will be 1\. This allows us to generate a transition matrix of order 2 X 2, as
    shown in Figure [1-9](#Fig9).
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 状态转移图提供了一个具有状态 S 和 P 的二进制链模型。状态 S 保持在其自身状态的概率为 0.7，而转移到状态 P 的概率为 0.3。同样，状态 P
    转移到 S 的概率为 0.2，而 P 的自转移状态概率为 0.8。根据概率定律，相互和自转移概率的总和将为 1。这使我们能够生成一个 2 X 2 阶的转移矩阵，如图
    [1-9](#Fig9) 所示。
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig9_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig9_HTML.jpg)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig9_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig9_HTML.jpg)'
- en: Figure 1-9
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-9
- en: State transition matrix
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 状态转移矩阵
- en: 'The transition matrix at the end of each operation produces different values
    for self- and cross-transition of the different states. This can be mathematically
    visualized as computing the power of the transition matrix, where the power is
    the number of iterations we require for the simulation to occur as mentioned below:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 每次操作结束时产生的转移矩阵，对于不同状态的自转移和交叉转移有不同的值。这可以通过计算转移矩阵的幂来数学上可视化，其中幂是我们需要的迭代次数，如以下所述：
- en: T(t+k) = T(t)^k k€ R
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: T(t+k) = T(t)^k k€ R
- en: The formulation shows the states of the transition matrix after k iterations
    are given by the power of the transition matrix at initial state times, k, under
    the assumption that k belongs to Real.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 公式表明，转移矩阵在 k 次迭代后的状态由初始状态下的转移矩阵的幂给出，假设 k 属于实数。
- en: 'Let us try to extend this idea by initializing the individual states S and
    P with initial probabilities. If we consider V to be an array containing the initial
    probabilities of the two states, then after k iterations of the simulation, the
    final array of states F can be attained as follows:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尝试通过初始化状态 S 和 P 的初始概率来扩展这个想法。如果我们考虑 V 是包含两个状态初始概率的数组，那么在 k 次模拟迭代后，最终状态数组
    F 可以通过以下方式获得：
- en: F(t+k)=V(t)*T(t)^k
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: F(t+k)=V(t)*T(t)^k
- en: Markov Models in Python
  id: totrans-112
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Python 中的马尔可夫模型
- en: This is an iterative Markov Process where the states get enumerated based on
    the transition and initial probabilities. Open the “MarkovModels.ipynb” Jupyter
    Notebook and let us try to understand the implementation of the transition model.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个迭代马尔可夫过程，状态根据转换和初始概率进行枚举。打开“MarkovModels.ipynb” Jupyter Notebook，让我们尝试理解转换模型的实现。
- en: '[PRE15]'
  id: totrans-114
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: We import numpy and pandas libraries, which would help us in computing matrix
    multiplications. The initial state of the sets is set to 1.0 and 0.5 for S and
    P, respectively. The transition matrix is initialized as mentioned previously.
    We then compute the value of the transition matrix for 3, 10, and 35 iterations,
    respectively, and with the output of each stage, we multiply the initial probability
    array. This provides us the final values for each state. You can change the values
    of the probabilities to get more results as to what extent a particular state
    stays in itself or transitions to another state.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 我们导入 numpy 和 pandas 库，这将帮助我们进行矩阵乘法。集合的初始状态分别设置为 1.0 和 0.5。转换矩阵初始化如前所述。然后我们分别计算
    3、10 和 35 次迭代的转换矩阵值，并使用每个阶段的输出乘以初始概率数组。这为我们提供了每个状态的最终值。您可以更改概率的值以获得更多结果，了解特定状态在其自身中保持多长时间或转换到另一个状态的程度。
- en: In the second example, we provide a visualization of how a ternary system of
    transitions migrate to different states based on initial and transition probabilities.
    The visualization is shown in Figure [1-10](#Fig10).
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 在第二个例子中，我们提供了一个基于初始和转换概率的如何将三元转换系统迁移到不同状态的可视化。可视化如图 [1-10](#Fig10) 所示。
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig10_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig10_HTML.jpg)'
  id: totrans-117
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig10_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig10_HTML.jpg)'
- en: Figure 1-10
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-10
- en: Transition visualization of Markov states
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 马尔可夫状态的转换可视化
- en: Downloading and Installing Unity
  id: totrans-120
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 下载和安装 Unity
- en: 'Now let us try and simulate a game based on this principle of Markov states
    in Unity. We will be using Unity version 2018.4, and it will also be compatible
    with versions of 2019 and 2020\. The initial step is to install Unity. Download
    Unity Hub from the official Unity website. The Unity Hub is a dashboard that contains
    all the versions of Unity, including beta releases as well as tutorials and starter
    packs. After downloading and installing Unity Hub, we can choose a version of
    our choice above 2018.4\. Next we proceed to get the version downloaded and installed,
    which would take some time. There should be sufficient space available in C: drive
    on Windows to make the download complete, even if we are downloading in a separate
    drive. Once the installation is complete, we can open up Unity and start creating
    our simulation and scene. Unity Hub appears as shown in Figure [1-11](#Fig11).'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: '现在，让我们尝试在 Unity 中模拟一个基于马尔可夫状态原理的游戏。我们将使用 Unity 版本 2018.4，它也将与 2019 和 2020 版本兼容。第一步是安装
    Unity。从官方 Unity 网站下载 Unity Hub。Unity Hub 是一个仪表板，包含所有版本的 Unity，包括测试版发布以及教程和入门包。下载并安装
    Unity Hub 后，我们可以在 2018.4 以上的版本中选择我们想要的版本。接下来，我们继续下载并安装版本，这可能需要一些时间。在 Windows 的
    C: 驱动器上应有足够的空间来完成下载，即使我们在单独的驱动器上下载也是如此。安装完成后，我们可以打开 Unity 并开始创建我们的模拟和场景。Unity
    Hub 如图 [1-11](#Fig11) 所示。'
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig11_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig11_HTML.jpg)'
  id: totrans-122
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig11_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig11_HTML.jpg)'
- en: Figure 1-11
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-11
- en: Unity Hub and installing Unity
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: Unity Hub 和安装 Unity
- en: 'Download the samples project file named DeepLearning, which contains all the
    codes for the lessons on this book. There is a requirement of downloading and
    installing preview packages for Unity ML Toolkit, since the other projects in
    the folder depend on them. After downloading, if error messages are received in
    the Console related to Barracuda engine or ML agents (mostly related to invalid
    methods), then go to:'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 下载名为 DeepLearning 的样本项目文件，其中包含本书所有课程的相关代码。由于文件夹中的其他项目依赖于它们，需要下载和安装 Unity ML
    Toolkit 的预览包。下载后，如果在控制台接收到与 Barracuda 引擎或 ML agents 相关的错误消息（大多与无效方法有关），则前往：
- en: '[PRE16]'
  id: totrans-126
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: 'In the search bar, type in ML agents, and the option of ML agents preview package
    (1.0) will appear. Click on Install to locally download the preview packages related
    to ML agents in Unity. To cross-verify, open the Packages folder and navigate
    to the “manifest.Json” source file. Open this up in Visual Studio Code or any
    editor and check for the following line:'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 在搜索栏中输入 ML agents，ML agents 预览包（1.0）选项将出现。点击安装以在本地下载 Unity 中与 ML agents 相关的预览包。为了交叉验证，打开
    Packages 文件夹并导航到“manifest.Json”源文件。在 Visual Studio Code 或任何编辑器中打开此文件，并检查以下行：
- en: '[PRE17]'
  id: totrans-128
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: 'If errors still persist, then we can get that resolved by manually downloading
    Unity ML agents either from the Anaconda Prompt using the command:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 如果错误仍然存在，我们可以通过手动从 Anaconda Prompt 使用以下命令下载 Unity ML agents 来解决这个问题：
- en: '[PRE18]'
  id: totrans-130
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: or download it from the Unity ML Github repository as well. However, the installation
    guidelines will be presented in Chapter [3](502041_1_En_3_Chapter.xhtml).
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 或者也可以从 Unity ML Github 仓库下载。然而，安装指南将在第 [3](502041_1_En_3_Chapter.xhtml) 章节中介绍。
- en: Markov Model with Puppo in Unity
  id: totrans-132
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Unity 中的马尔可夫模型与 Puppo
- en: Open the environments folder and navigate to MarkovPuppo.exe Unity scene file.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 打开 environments 文件夹并导航到 MarkovPuppo.exe Unity 场景文件。
- en: Run this by double-clicking on it, and you will be able to see something like
    Figure [1-12](#Fig12).
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 双击运行，你将能够看到类似图 [1-12](#Fig12) 的内容。
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig12_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig12_HTML.jpg)'
  id: totrans-135
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig12_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig12_HTML.jpg)'
- en: Figure 1-12
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-12
- en: MarkovPuppo Unity scene application
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: MarkovPuppo Unity 场景应用
- en: The game is a simulation where Puppo (Puppo The Corgi from Unity Berlin) tries
    to find the sticks as soon as they are simulated in a Markov process. The sticks
    are initialized with predefined probability states, and a transition matrix is
    provided. For each iteration of the simulation, the stick that has the highest
    self-transition probability gets selected while the rest are destroyed. The task
    of the Puppo is to locate those sticks at each iteration, providing him a little
    rest of 6 seconds when he is able to reach one correctly. Since the transition
    probabilities are computed really fast, the steps taken by Puppo are instantaneous.
    This is a purely randomized distribution of Markov states where the state transition
    probability is computed on the go. Let us try to dig deep into the C# code to
    understand it better.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 游戏是一个模拟，其中 Puppo（来自 Unity Berlin 的 Puppo The Corgi）试图在马尔可夫过程中模拟棒子后尽快找到它们。棒子以预定义的概率状态初始化，并提供了转移矩阵。对于模拟的每一次迭代，具有最高自转移概率的棒子被选中，其余的则被销毁。Puppo
    的任务是定位这些棒子，每次他正确到达时，他将获得 6 秒的休息时间。由于转移概率计算得非常快，Puppo 的步伐几乎是瞬间的。这是一个纯随机的马尔可夫状态分布，状态转移概率在运行时计算。让我们尝试深入挖掘
    C# 代码以更好地理解它。
- en: Open the DeepLearning project in Unity and navigate to the Assets folder. Inside
    the folder, try to locate the MarkovAgent folder. This contains folders called
    Scripts, Prefabs, and Scenes. Open the MarkovPuppo Scene in Unity and press play.
    We will be able to see Puppo trying to locate the randomly sampled Markov sticks.
    Let us try to understand the scene first.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Unity 中打开 DeepLearning 项目并导航到 Assets 文件夹。在文件夹内，尝试找到 MarkovAgent 文件夹。该文件夹包含名为
    Scripts、Prefabs 和 Scenes 的子文件夹。在 Unity 中打开 MarkovPuppo Scene 并按下播放。我们将能够看到 Puppo
    正在尝试定位随机抽取的马尔可夫棒。让我们首先尝试理解这个场景。
- en: The scene consists of Scene Hierarchy on the left and Inspector details on the
    right, followed by the Project, Console Tabs at the bottom with Scene, Game Views
    at the center. In the hierarchy, locate “Platform” GameObject and click on the
    drop-down. Inside the GameObject, there is a “CORGI” GameObject. Click on it to
    locate in the Scene View and open the details in the Inspector Window to the right.
    This is the Puppo Prefab, and it has an attached Script called “Markov Agent.“
    The Prefab can be explored further by clicking on the drop-down, and there will
    be several joints and Rigidbody components attached that would enable physics
    simulation for Puppo. The Scene View is shown in Figure [1-13](#Fig13).
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 场景由左侧的场景层次结构和右侧的检查器细节组成，底部是项目、控制台选项卡，中心是场景、游戏视图。在层次结构中，定位到 “Platform” GameObject
    并点击下拉菜单。在 GameObject 内部，有一个名为 “CORGI” 的 GameObject。点击它以在场景视图中定位，并在右侧的检查器窗口中打开详细信息。这是
    Puppo 预制件，它附有一个名为 “Markov Agent” 的脚本。可以通过点击下拉菜单进一步探索预制件，并将有几个关节和 Rigidbody 组件附加到其中，这将使
    Puppo 能够进行物理模拟。场景视图在图 [1-13](#Fig13) 中显示。
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig13_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig13_HTML.jpg)'
  id: totrans-141
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig13_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig13_HTML.jpg)'
- en: Figure 1-13
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-13
- en: Scene View for Markov Puppo Scene including Hierarchy and Inspector
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: Markov Puppo 场景的视图，包括层次结构和检查器
- en: The Inspector Window is shown in Figure [1-14](#Fig14).
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 检查器窗口在图 [1-14](#Fig14) 中显示。
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig14_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig14_HTML.jpg)'
  id: totrans-145
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig14_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig14_HTML.jpg)'
- en: Figure 1-14
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-14
- en: Inspector tab and script
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 检查器选项卡和脚本
- en: Open the Markov Agent script in Visual Studio Code or MonoDevelop (any C# Editor
    of your choice), and let us try to understand the code-base. At the start of the
    code, we have to import certain libraries and frameworks such as UnityEngine,
    System, and others.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Visual Studio Code 或 MonoDevelop（您选择的任何 C# 编辑器）中打开 Markov Agent 脚本，让我们尝试理解代码库。在代码的开始部分，我们必须导入某些库和框架，例如
    UnityEngine、System 等。
- en: '[PRE19]'
  id: totrans-149
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: The script derives from MonoBehaviour base class. Inside we declare the GameObjects,
    Transforms, and other variables we want to use in the code. The GameObject “Puppo''
    references the Puppo Corgi agent, and it is referenced as such in Figure [1-14](#Fig14)
    in the Inspector window. GameObjects “Bone,” ”Bone1,” and ”Bone2” are the three
    stick targets in the scene that are randomized by Markov states. Next we have
    a transition matrix (named “transition_mat,” a matrix of float values), an initial
    probability array for the three sticks (named “initial_val,” a float array of
    size 3), and a result probability array to contain the probability after each
    iteration (named “result_val,” a float array of size 3). The variable “iterations”
    signifies the number of iterations for the simulation. The GameObject “active_obj”
    is another variable to contain the most probable self-transitioning stick at each
    iteration that remains active. The last variable is a Vector3 named “pos,” which
    contains the spawn position of Puppo after each iteration. Next we move to the
    details of creating the transition matrix , initial value array and try to understand
    how the iterations are formulated.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 脚本源自 MonoBehaviour 基类。在内部，我们声明了在代码中想要使用的 GameObjects、Transforms 和其他变量。GameObject
    “Puppo” 引用了 Puppo Corgi 代理，并在检查器窗口的图 [1-14](#Fig14) 中以此方式引用。GameObject “Bone”、“Bone1”
    和 “Bone2” 是场景中的三个随机化的棍子目标。接下来是一个转换矩阵（命名为 “transition_mat”，一个浮点值矩阵），三个棍子的初始概率数组（命名为
    “initial_val”，一个大小为 3 的浮点数组），以及一个结果概率数组来包含每次迭代后的概率（命名为 “result_val”，一个大小为 3 的浮点数组）。变量
    “iterations” 表示模拟的迭代次数。GameObject “active_obj” 是另一个变量，用于包含每个迭代中保持活动的最可能的自我转换棍子。最后一个变量是一个名为
    “pos” 的 Vector3，它包含每次迭代后 Puppo 的出生位置。接下来，我们转向创建转换矩阵、初始值数组的细节，并尝试理解迭代是如何形成的。
- en: '[PRE20]'
  id: totrans-151
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: In Unity C# scripting, under MonoBehaviour, there are two methods that are present
    by default. These are void methods named Start and Update. The Start method is
    generally used for initialization of variables of scene and assignment of tags
    to different objects; it is a preprocessing step to create the scene at the start
    of the game. The Update method runs per frame, and all the decision function and
    control logic is executed here. Since this is updated per frame, it is very computationally
    intensive if we are performing large complex operations. Other methods include
    Awake and Fixed Update. The Awake method is called before the Start thread executes,
    and Fixed Update has regular uniform-sized frame rates as compared to the Update
    method. In the first section of Start method, we assign the GameObjects to the
    respective tags. The tags can be created in the Inspector Window, under each selected
    GameObject, as shown in Figure [1-15](#Fig15).
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 在Unity C#脚本中，在MonoBehaviour下，有两个默认存在的方法。这些是无参方法，名为Start和Update。Start方法通常用于初始化场景变量和为不同对象分配标签；这是在游戏开始时创建场景的预处理步骤。Update方法每帧运行一次，所有的决策函数和控制逻辑都在这里执行。由于这是每帧更新的，如果我们执行大型复杂操作，它将非常计算密集。其他方法包括Awake和FixedUpdate。Awake方法在Start线程执行之前被调用，而FixedUpdate与Update方法相比具有规则的均匀帧率。在Start方法的第一个部分，我们将GameObject分配到相应的标签。标签可以在检查器窗口中创建，在每个选定的GameObject下，如图[1-15](#Fig15)所示。
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig15_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig15_HTML.jpg)'
  id: totrans-153
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig15_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig15_HTML.jpg)'
- en: Figure 1-15
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-15
- en: Assigning and creating tags for GameObjects
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 为GameObject分配和创建标签
- en: The tags are assigned via “GameObject.FindWithTag()” method. The next step is
    creation of transition matrix, which is a C# implementation of creating a generic
    float matrix of order 3 X 3\. This is shown in the “create_mat” function.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 标签通过“GameObject.FindWithTag()”方法分配。下一步是创建转移矩阵，这是一个3 X 3的泛型浮点矩阵的C#实现。这显示在“create_mat”函数中。
- en: '[PRE21]'
  id: totrans-157
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: After creating the empty matrix, we assign values to it. The values are derived
    from the Random library of Unity Engine, which assigns randomized float values
    for the matrix.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 在创建空矩阵后，我们向其赋值。这些值来自Unity引擎的Random库，它为矩阵分配随机的浮点值。
- en: The initial value array is also initialized in this section.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 初始值数组也在本节中初始化。
- en: The “StartCoroutine” method calls the “IEnumerator” interface in C# Unity. Instead
    of updating the game each frame (using the Update method), we pass the game logic
    inside the Coroutine. The Coroutine runs for the number of iterations provided
    in the initialization and also controls the simulation. This can be explained
    by the code as follows.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: “StartCoroutine”方法在C# Unity中调用“IEnumerator”接口。我们不是使用Update方法每帧更新游戏，而是将游戏逻辑传递到Coroutine中。Coroutine运行初始化中提供的迭代次数，并控制模拟。这可以通过以下代码解释。
- en: '[PRE22]'
  id: totrans-161
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: This part of the code has a yield return statement that releases the control
    of the Coroutine thread to the Start thread for 0.1 seconds (momentary pause).
    Then for each iteration of the simulation, the transition matrix is randomized,
    and the product of the initial value and transition matrix is computed by the
    “mult()” function. Tanh function is a nonlinear activation function for making
    the distributions nonlinear in the result value array.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码有一个yield return语句，它将Coroutine线程的控制权释放给Start线程0.1秒（短暂的暂停）。然后，对于模拟的每次迭代，通过“mult()”函数计算初始值和转移矩阵的乘积，转移矩阵是随机化的。Tanh函数是一个非线性激活函数，用于使结果值数组中的分布非线性。
- en: Next we have a series of if–else statements that select the maximum probabilistic
    state from the result value array.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们有一系列的条件语句，用于从结果值数组中选择最大概率状态。
- en: '[PRE23]'
  id: totrans-164
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: The next step is for Puppo to determine which stick has been activated based
    on the previous transitions. This can be done by using RayCast in the Unity Engine
    Physics System. RayCast casts a ray in the direction specified by the user and
    also has arguments that control the depth and time limit for the ray to stay active.
    The requirement for the RayCast to act is that there should be a Collider object
    attached to the three sticks. Colliders help in understanding when collisions
    of physics-based GameObjects take place. In this case, we use a simple BoxCollider
    for the detection with RayCast upon hitting it. Based on which sticks RayCast
    from Puppo hits, we see that Puppo automatically transports itself to that target
    position by assigning the transform value of the target stick.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是让普普根据之前的转换来确定哪个棒子被激活了。这可以通过在Unity引擎的物理系统中使用RayCast来实现。RayCast会根据用户指定的方向发射一条射线，并且有控制射线深度和时间限制的参数。RayCast起作用的要求是三个棒子上应该有一个Collider对象。Collider有助于理解基于物理的GameObject何时发生碰撞。在这种情况下，我们使用一个简单的BoxCollider来检测RayCast击中它。根据普普击中的哪个棒子，我们看到普普会自动将自己传输到那个目标位置，通过分配目标棒子的变换值。
- en: '[PRE24]'
  id: totrans-166
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: After Puppo reaches the stick for an iteration, we allow him to rest a little
    by calling the “yield” method for 6 seconds. Once we have understood the full
    functionality of the code base we can click play in the editor. We can change
    the values of the iterations and also the values of the initial value array in
    the script according to our choice to see how the distribution changes. The Debug.
    Log statements that are present in the Console Tab provide information regarding
    the values of the result array at each iteration and also which stick is getting
    activated. A preview of the game is shown in Figure [1-16](#Fig16).
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 在普普达到棒子进行一次迭代后，我们通过调用“yield”方法让他休息一会儿，持续6秒。一旦我们理解了代码库的完整功能，我们就可以在编辑器中点击播放。我们可以根据我们的选择更改迭代的值以及脚本中初始值数组的值，以查看分布如何变化。控制台标签中的Debug.Log语句提供了有关每次迭代结果数组值的详细信息，以及哪个棒子被激活。游戏预览如图[1-16](#Fig16)所示。
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig16_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig16_HTML.jpg)'
  id: totrans-168
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig16_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig16_HTML.jpg)'
- en: Figure 1-16
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-16
- en: Final game simulation of Markov Puppo
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 马尔可夫普普的最终游戏模拟
- en: This is a simple simulation that we created with the Unity Engine to simulate
    Markov states in a randomized manner. In the next section we will try to understand
    HMMs and Decision Process for path creation using both Python and Unity.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个我们使用Unity引擎创建的简单模拟，以随机方式模拟马尔可夫状态。在下一节中，我们将尝试使用Python和Unity来理解HMMs和路径创建的决策过程。
- en: Hidden Markov Models
  id: totrans-172
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 隐藏马尔可夫模型
- en: 'HMMs are an extension of Markov states in which some of the states are unobservable
    or “hidden.” HMM assumes that if the state P depends on state S, then the HMM
    model should learn about S by observing state P. The HMM is a time-discrete stochastic
    process that can be mathematically explained simply between two states {S[n],
    P[n]} such that:'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: HMMs是马尔可夫状态的扩展，其中一些状态是不可观察的或“隐藏”的。HMM假设如果状态P依赖于状态S，那么HMM模型应该通过观察状态P来了解S。HMM是一个时间离散的随机过程，可以在两个状态{S[n]，P[n]}之间简单地用数学公式解释，即：
- en: S[n] is Markov Process State and is “hidden” or not directly observable.
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: S[n]是马尔可夫过程状态，它是“隐藏”的或不可直接观察的。
- en: p (P[n] € P | S[1]= s[1],…,S[n] = s[n]) = p (P[n] € P | S[n] = s[n])
  id: totrans-175
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: p (P[n] € P | S[1]= s[1]，…，S[n] = s[n]) = p (P[n] € P | S[n] = s[n])
- en: for all n>0, s[1],….,s[n] , where P and S are supersets of states and p() is
    conditional probability.
  id: totrans-176
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 对于所有n>0，s[1]，…，s[n]，其中P和S是状态的超集，p()是条件概率。
- en: Concepts of Hidden Markov Models
  id: totrans-177
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 隐藏马尔可夫模型的概念
- en: 'Let us understand this with an example situation. We take an environment where
    there are friends Alice and Bob. Bob can perform only three activities : walk,
    shop, and clean. The choice of Bob’s activities is dependent on the weather in
    the Environment. Alice knows the activities that Bob will perform on a particular
    day but does not know anything of the weather that affects Bob’s activities. This
    can be formulated as a discrete Markov Chain model where the weather conditions
    resemble the states. The set of weather conditions include rainy and sunny conditions.
    Thus the weather conditions are hidden states that affect Bob’s activities. The
    diagram further explains the situation. The diagram also shows the state transition
    probability values as well as the self-transition values. The Python simulation
    of the HMM has the following details:'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过一个示例情况来理解这一点。我们考虑一个有朋友Alice和Bob的环境。Bob只能执行三种活动：散步、购物和打扫。Bob活动的选择取决于环境中的天气。Alice知道Bob在特定一天将执行的活动，但不知道影响Bob活动的天气。这可以表述为一个离散的马尔可夫链模型，其中天气条件类似于状态。天气条件的集合包括雨天和晴天条件。因此，天气条件是影响Bob活动的隐藏状态。该图进一步解释了这种情况。该图还显示了状态转移概率值以及自转移值。HMM的Python模拟有以下细节：
- en: '[PRE25]'
  id: totrans-179
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: Figure [1-17](#Fig17) depicts the HMM.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 图[1-17](#Fig17)展示了HMM。
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig17_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig17_HTML.jpg)'
  id: totrans-181
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig17_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig17_HTML.jpg)'
- en: Figure 1-17
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-17
- en: Hidden Markov Model environment
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 隐藏马尔可夫模型环境
- en: Hidden Markov Model with Tensorflow
  id: totrans-184
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 基于Tensorflow的隐藏马尔可夫模型
- en: Open the MarkovModel.ipynb notebook, and in the third section there is a Tensorflow
    implementation of HMM based on initial probability and transition matrix.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 打开MarkovModel.ipynb笔记本，在第三部分有一个基于初始概率和转移矩阵的Tensorflow实现HMM。
- en: '[PRE26]'
  id: totrans-186
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: The HMM is under the Tensorflow Probability library (named “tensorflow_probability”)
    and is a method of the tf_distributions class. We initiate the values and also
    assign a normal distribution to each of the two initial states (having mean and
    standard deviation). The HMM under tf_distributions takes as arguments the initial
    probabilities, transition matrix, observation array that contains the normal distribution,
    the number of iterations to simulate, and optional arguments like name of the
    model and allow_nan_stats. Run this code in a notebook to get to know how the
    simulation values change after 10 iterations. We can also modify the values of
    the parameters and probabilities to produce new simulations.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: HMM位于Tensorflow Probability库（命名为“tensorflow_probability”）中，是tf_distributions类的一个方法。我们初始化值，并为两个初始状态（具有均值和标准差）分配正态分布。tf_distributions下的HMM将初始概率、转移矩阵、包含正态分布的观测数组、模拟的迭代次数以及可选参数（如模型名称和allow_nan_stats）作为参数。在笔记本中运行此代码，了解在10次迭代后模拟值的变化。我们还可以修改参数和概率的值以产生新的模拟。
- en: Hidden Markov Model Agent in Unity
  id: totrans-188
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Unity中的隐藏马尔可夫模型代理
- en: Let us try to use this principle and generate a stochastic path algorithm that
    uses HMM in Unity. The objective is to train an agent to detect the path where
    the rewards or objects are generated. At the start of each epoch, the agent tries
    to determine a productive path that is based on the highest probabilistic value
    a particular object/reward has at a particular state of time. Open the “HMMAgent”
    scene in Unity and click Play. The Console shows us what is the order of traversal
    followed by the cube agent to attain the highest valued reward or object at each
    point of time. For each episode or epoch of learning, the cube agent picks up
    any of the rewards that are present in the scene. The rewards are based in the
    form of highest probability an object has in a particular timestamp. Let us say,
    in timestamp t[0], object o[1] has the highest probability and in t[1] object
    o[2] has the highest probability, then the agent picks up o[1], o[2], and so on.
    Inside each episode, there are three timestamps, and for each episode different
    sequences can be observed. Certain sequences can be o[2], o[1], o[3], or even
    repeated states such as o[2], o[1], o[1], and so on. These sequences or paths
    are generated by a dynamic programming implementation of HMM known as Viterbi
    Algorithm. A preview of the simulation is shown in Figure [1-18](#Fig18).
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尝试使用这个原理，在Unity中生成一个使用HMM的随机路径算法。目标是训练一个智能体来检测奖励或对象生成的路径。在每个纪元的开始，智能体试图确定一个基于特定时间状态下特定对象/奖励的最高概率值的生产性路径。在Unity中打开“HMMAgent”场景并点击播放。控制台会显示立方体智能体在各个时间点达到最高价值奖励或对象的遍历顺序。对于每个学习纪元或周期，立方体智能体会捡起场景中存在的任何奖励。奖励是基于对象在特定时间戳的最高概率。比如说，在时间戳t[0]时，对象o[1]具有最高概率，而在t[1]时，对象o[2]具有最高概率，那么智能体会捡起o[1]、o[2]，依此类推。在每个纪元内部，有三个时间戳，并且对于每个纪元可以观察到不同的序列。某些序列可以是o[2]、o[1]、o[3]，甚至重复的状态，如o[2]、o[1]、o[1]等。这些序列或路径是由HMM的动态规划实现——维特比算法生成的。模拟的预览如图[1-18](#Fig18)所示。
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig18_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig18_HTML.jpg)'
  id: totrans-190
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig18_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig18_HTML.jpg)'
- en: Figure 1-18
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-18
- en: HMMAgent Unity scene
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: HMMAgent Unity场景
- en: Let us open the associated script inside the Assets folder called “HMMViterbiAgent.cs”
    C# script. Most of the script is similar to the previous Markov Model script with
    common initialization of the transition matrix and initial and result value arrays.
    We have an additional inclusion of emission matrix (named “emission_mat”) and
    observation states (named “observation_states”) that have the emission probability
    values and the observation states, respectively.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们打开位于Assets文件夹中的相关脚本，名为“HMMViterbiAgent.cs”的C#脚本。脚本的大部分内容与之前的马尔可夫模型脚本相似，具有常见的转移矩阵和初始及结果值数组的初始化。我们还包括了发射矩阵（命名为“emission_mat”）和观察状态（命名为“observation_states”），分别包含发射概率值和观察状态。
- en: '[PRE27]'
  id: totrans-194
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: The initialization of both of them are as follows.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 它们的初始化如下。
- en: '[PRE28]'
  id: totrans-196
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: Once we have followed the code for initialization and have attached the tags
    to the different targets and agents, we can inspect the Viterbi Algorithm that
    generates the path using the probabilities. The function declaration takes the
    matrices and arrays as arguments and fills the path array with the indices of
    the target objects being generated.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们完成了初始化代码，并将标签附加到不同的目标和智能体上，我们就可以检查使用概率生成路径的维特比算法。函数声明接受矩阵和数组作为参数，并用目标对象的索引填充路径数组。
- en: '[PRE29]'
  id: totrans-198
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: We create a minimum weight algorithm where we try to reduce the probability
    of the states or objects and then try to find the highest probable object or target
    (among the objects) in a particular time.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 我们创建了一个最小权重算法，试图减少状态或对象的可能性，然后尝试在特定时间找到最高可能的对象或目标（在对象中）。
- en: '[PRE30]'
  id: totrans-200
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: For the next steps, with the initial values of “a” matrix, we run a loop operation
    for each observation state and compute the minimum weight value accordingly.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 对于接下来的步骤，使用“a”矩阵的初始值，我们对每个观察状态执行循环操作，并相应地计算最小权重值。
- en: '[PRE31]'
  id: totrans-202
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: After this, we update the “a” matrix to hold the minimum weights temporarily.
    We also store the state having the minimum value in state matrix “s.”
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 在此之后，我们将“a”矩阵更新为暂时存储最小权重。同时，我们也在状态矩阵“s”中存储具有最小值的那个状态。
- en: '[PRE32]'
  id: totrans-204
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: Once we have filled the values of “a” and “s” matrices, we get the index of
    the target object with highest probability and least weight. Then we do backtracking
    to generate the possible minimum weighted path involving the other two target
    objects.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们填写了“a”和“s”矩阵的值，我们就得到具有最高概率和最小权重的目标对象的索引。然后我们进行回溯以生成涉及其他两个目标对象的可能的最小加权路径。
- en: '[PRE33]'
  id: totrans-206
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: The Viterbi algorithm is a dynamic programming algorithm that exploits Markov
    states and transition emission probabilities to choose a minimum weighted path
    that the agent can follow to collect the targets having the highest probabilities
    at each timestamp.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 维特比算法是一种动态规划算法，它利用马尔可夫状态和转移发射概率来选择一个最小加权路径，代理可以遵循该路径在每个时间戳收集具有最高概率的目标。
- en: To run the function, we start a Coroutine, like before, and compute the result
    value array by multiplication of initial value array and transition matrix, like
    before, and call the HMMViterbi function.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 要运行该函数，我们像之前一样启动Coroutine，通过乘以初始值数组和转移矩阵来计算结果值数组，并调用HMMViterbi函数。
- en: '[PRE34]'
  id: totrans-209
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: 'The rest of the code is similar to the previous Markov Model template where
    RayCast is used by the cube agent to detect the colliders of the target objects,
    and the transform of the cube is updated to follow the path. An interesting observation
    is the updates on the path after the Viterbi function is called:'
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 其余的代码与之前的马尔可夫模型模板类似，其中立方体代理使用RayCast检测目标对象的碰撞体，并更新立方体的变换以跟随路径。一个有趣的观察是Viterbi函数调用后的路径更新：
- en: '[PRE35]'
  id: totrans-211
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: After we have understood the code, we can proceed further to test the code in
    Play mode by assigning the script to the cube agent (named “AgentCube_Purple”).
    The Unity Scene View of the environment is shown in Figure [1-19](#Fig19).
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们理解了代码之后，我们可以通过将脚本分配给立方体代理（命名为“AgentCube_Purple”）来在播放模式下测试代码。环境的Unity场景视图如图[1-19](#Fig19)所示。
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig19_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig19_HTML.jpg)'
  id: totrans-213
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig19_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig19_HTML.jpg)'
- en: Figure 1-19
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-19
- en: Unity Scene with script assigned to AgentCube_Purple
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 分配给AgentCube_Purple脚本的Unity场景
- en: If we follow closely, in the Inspector Window, we can change the number of iterations
    or the epoch/episodes according to our choice. The Console shows the details of
    the steps that are followed in the form of indices of the target cubes. A preview
    of the Inspector Window is shown in Figure [1-20](#Fig20).
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们紧跟，在检查器窗口中，我们可以根据我们的选择更改迭代的次数或时代/剧集。控制台以目标立方体的索引的形式显示所遵循步骤的详细信息。检查器窗口的预览如图[1-20](#Fig20)所示。
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig20_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig20_HTML.jpg)'
  id: totrans-217
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig20_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig20_HTML.jpg)'
- en: Figure 1-20
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-20
- en: Inspector View of the scene
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 场景的检查器视图
- en: In this section, we have had an overview of Markov states, MDP, and HMM. This
    section is an important aspect in understanding the fundamentals of RL, as all
    learning algorithms in discrete RL are based on states. In this section, we have
    understood and implemented Markov models in Python and simulated games and understood
    the brief overview of dynamic programming-based HMM and also its simulation in
    Unity. The next section will focus on incorporating rewards to these states and
    make the agent learn how to attain those rewards. We will understand the core
    fundamentals of the Bellman equation and explore multi-armed bandits along with
    some variations in the iterative Bellman equation.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们概述了马尔可夫状态、MDP和HMM。本节是理解强化学习基础的重要方面，因为离散强化学习中的所有学习算法都基于状态。在本节中，我们理解和实现了Python中的马尔可夫模型，并模拟了游戏，还了解了基于动态规划的HMM的简要概述及其在Unity中的模拟。下一节将专注于将这些奖励纳入这些状态，使代理学习如何获得这些奖励。我们将理解贝尔曼方程的核心基础，并探索多臂老虎机的迭代贝尔曼方程的一些变化。
- en: Bellman Equation
  id: totrans-221
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 贝尔曼方程
- en: 'Now that we have an understanding of MDP , let us extend along this idea to
    introduce the concepts of iterated reward-based learning. The MDP and HMM provides
    us with an insight into how to retain past information of the states as we saw
    in the path tracking model. When we involve rewards in the context of Markov models,
    a generic learning algorithmic equation evolves. Mathematically we assume the
    rewards to be inside a set R and try to calculate the expectation of rewards,
    denoted by E[R] at the end of the episode. This can be shown as:'
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经理解了马尔可夫决策过程（MDP），让我们沿着这个思路扩展，引入基于迭代奖励的学习概念。MDP和HMM为我们提供了如何保留状态过去信息的见解，正如我们在路径跟踪模型中看到的那样。当我们涉及马尔可夫模型中的奖励时，一个通用的学习算法方程就会演变。从数学上讲，我们假设奖励在集合R中，并试图计算在剧集结束时奖励的期望，表示为E[R]。这可以表示为：
- en: G[t] =R[t+1] + R[t+2] + …+ R[t],
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: G[t] = R[t+1] + R[t+2] + …+ R[t]
- en: 'where G[t] is the expectation of the rewards of time step t based on sequence
    of rewards received. This can be thought of as an addition on dynamic programming-based
    Markov models, where each state has an expectation of reward. In general, the
    Bellman equation has an associated discount factor y (gamma), which discounts
    the rewards received in the previous states. Thus a formal iterative Bellman reward
    discount equation can be framed as :'
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 其中G[t]是基于接收到的奖励序列对时间步t的奖励的期望。这可以被视为基于动态规划的马氏模型上的一个加法，其中每个状态都有一个期望奖励。一般来说，贝尔曼方程有一个相关的折扣因子y（伽马），它对先前状态中收到的奖励进行折扣。因此，一个正式的迭代贝尔曼奖励折扣方程可以表述为：
- en: G[t] =R[t+1] + yR[t+2] + …+ ∑ y^kR[t+k]
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: G[t] = R[t+1] + yR[t+2] + …+ ∑ y^kR[t+k]
- en: This is the Bellman expected reward function on Markov states with discount
    factor gamma on previous rewards. This enables the agent to choose the most recent
    value of expectation of the rewards and accordingly the most recent states that
    lead to more rewards. This can be visualized as a top-down tree, since this is
    an iterative dynamic programming approach.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 这是带有折扣因子伽马的前一个奖励的马尔可夫状态上的贝尔曼期望奖励函数。这使得智能体能够选择最近的期望奖励值以及相应地导致更多奖励的最近状态。这可以被视为一个自顶向下的树，因为这是一个迭代动态规划方法。
- en: 'The iterative Bellman equation is formulated using two fundamental algorithmic
    approaches :'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 迭代贝尔曼方程使用两种基本的算法方法进行表述：
- en: '**Policy function** : The policy iterative function denoted by π(a|s) is a
    mapping between the states and the action sets to produce an optimal policy denoted
    by π*(a|s), which attains the highest expected reward. The policy function is
    validated in the form of maximization of values of the policy at each step.'
  id: totrans-228
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**策略函数**：策略迭代函数π(a|s)是状态和动作集之间的映射，以产生一个最优策略π*(a|s)，该策略获得最高的期望奖励。策略函数通过在每个步骤最大化策略的值来验证。'
- en: '**Value function** : The value function denoted by vπ(s) denotes the value
    or the expected return received when starting in state s and following the policy
    π.'
  id: totrans-229
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**值函数**：值函数vπ(s)表示从状态s开始并遵循策略π所获得的价值或期望回报。'
- en: Now that we have a brief idea of Bellman equations and what are value and policy
    functions let us try to visualize them as a top-down tree in Figure [1-21](#Fig21).
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们对贝尔曼方程以及值函数和策略函数有了初步的了解，让我们尝试将它们以自顶向下的树形结构在图[1-21](#Fig21)中可视化。
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig21_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig21_HTML.jpg)'
  id: totrans-231
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig21_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig21_HTML.jpg)'
- en: Figure 1-21
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-21
- en: Bellman value iteration tree
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 贝尔曼值迭代树
- en: The Bellman tree provided shows how in action of a policy π can control the
    value vπ(s) from k+1 state to k state and enumerate expected rewards from k+1,
    k+2 states, and so on.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 贝尔曼树展示了策略π如何通过动作控制值vπ(s)从k+1状态到k状态，并从k+1、k+2状态等枚举期望奖励。
- en: Note
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Richard.E. Bellman, an applied American mathematician, founded the Bellman equation
    as a dynamic programming method that is used in optimal control theory and later
    in RL.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 美国应用数学家理查德·E·贝尔曼创立了贝尔曼方程，作为一种动态规划方法，用于最优控制理论，后来用于强化学习（RL）。
- en: Bellman Agent Implementation in Unity
  id: totrans-237
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 贝尔曼智能体在Unity中的实现
- en: 'We will discuss more on the aspects of value and policy iteration in later
    sections of this chapter, for now let us create another simulation based on rewards
    and the Bellman Iterative algorithm. Open up the Assets folder and navigate to
    the “BellmanAgent” folder. This contains a simulation game where the agent is
    on a racing kart, and there are rewards (green big cubes) that the agent has to
    reach and collect and after that reach the opposite end pole. The scene, when
    opened, would appear as shown in Figure [1-22](#Fig22).:'
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在本章的后续部分讨论值迭代和政策迭代方面的更多内容，现在让我们基于奖励和贝尔曼迭代算法创建另一个模拟。打开资产文件夹，导航到“BellmanAgent”文件夹。这里包含一个模拟游戏，其中代理在赛车卡丁车上，有奖励（绿色的大方块）需要代理到达并收集，然后到达对面的终点杆。打开场景时，将如图
    [1-22](#Fig22) 所示：
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig22_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig22_HTML.jpg)'
  id: totrans-239
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig22_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig22_HTML.jpg)'
- en: Figure 1-22
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-22
- en: Bellman agent Unity scene
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 贝尔曼代理 Unity 场景
- en: Let us understand the code of how the simulation works. The Kart Agent has an
    objective function to maximize its rewards for each episode or epoch of learning
    using the iterative value function of the Bellman equation. Once the agent reaches
    the second green target (green cube) or the end pole (finish line), the episode
    terminates. For the time being, the simulation is in one direction that is forward-backward
    along the z axis of the Kart Agent, and this can be extended to multidirectional
    traversal as well.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们了解模拟工作原理的代码。Kart 代理有一个目标函数，通过使用贝尔曼方程的迭代值函数，在每个学习周期或纪元中最大化其奖励。一旦代理到达第二个绿色目标（绿色方块）或终点杆（终点线），游戏结束。目前，模拟是沿着
    Kart 代理的 z 轴的单向前进-后退，这也可以扩展到多方向遍历。
- en: Open the “BellmanAgent.cs” C# Script. While the initialization and the variables
    are set according to previous templates of Markov models and HMM, there are distinct
    new features and variables that are required to be made.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 打开“BellmanAgent.cs”C# 脚本。初始化和变量设置根据之前马尔可夫模型和HMM的模板进行，但需要添加一些独特的新特性和变量。
- en: '[PRE36]'
  id: totrans-244
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: The variable “max_reward” is the total value of rewards that need to be accumulated
    in an episode by the agent. Variable “gamma” is the discount factor. Next we have
    initialization of GameObject variables for Kart Agent and the targets. We create
    a matrix of float values called states, which is the transitional matrix in this
    case. There is also a float array of rewards for each state, a dictionary for
    mapping states with the rewards. The values array of float is required for the
    value function update by using the iterative Bellman equation.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 变量“max_reward”是代理在一场游戏中需要累积的总奖励值。变量“gamma”是折扣因子。接下来，我们初始化 GameObject 变量，用于 Kart
    代理和目标。我们创建了一个浮点值矩阵，称为状态，在这种情况下是转换矩阵。每个状态都有一个奖励的浮点数组，一个用于将状态映射到奖励的字典。浮点值数组用于通过迭代贝尔曼方程更新值函数。
- en: The fundamental concept in creating the states in a tabular discrete manner
    for Bellman updates is to use the transform.z position values of the track (i.e.,
    the road) The track may contain the green target or finish line or not. Depending
    on whether a particular section of the track has a target or is at the terminal
    position, we allocate rewards to each track section. This transforms the track
    into a virtual Gym-like environment containing different states and rewards, particularly
    similar to GridWorld (an environment in Gym).
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 在表格离散方式中创建状态以进行贝尔曼更新的基本概念是使用赛道（即道路）的 transform.z 位置值。赛道可能包含绿色目标或终点线，也可能不包含。根据赛道特定部分是否有目标或处于终端位置，我们为每个赛道部分分配奖励。这把赛道转换成了一个类似虚拟
    Gym 的环境，包含不同的状态和奖励，尤其是类似于 GridWorld（Gym 中的环境）。
- en: 'We initialize the rewards using the Random.Range() function as follows:'
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用 Random.Range() 函数初始化奖励，如下所示：
- en: '[PRE37]'
  id: totrans-248
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: The horizontal Track is divided into nine sections, each with an associated
    reward. We can manually set the rewards as well. We also populate the dictionary
    with the key value pair as :position value (Transform.position.z) and reward (float).
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 横向赛道被分为九个部分，每个部分都有一个相关的奖励。我们也可以手动设置奖励。我们还用键值对填充字典，作为：位置值（Transform.position.z）和奖励（float）。
- en: '[PRE38]'
  id: totrans-250
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: We then create the value array and set it using the Random.Range function. The
    transition matrix is also created where the diagonal elements have the same probability
    of 0.04 and all the others are created with the “Random.Range” function. The start
    method is similar like before and contains all the states, initialization of GameObjects,
    and linking of the tags.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们创建值数组，并使用Random.Range函数设置它。过渡矩阵也被创建，其中对角线元素具有相同的概率0.04，其余的元素使用“Random.Range”函数创建。开始方法与之前相似，包含所有状态、GameObject的初始化和标签的链接。
- en: Once the initialization is done, let us form a deep understanding of the code
    for the Bellman equation.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 初始化完成后，让我们深入理解贝尔曼方程的代码。
- en: '[PRE39]'
  id: totrans-253
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: The function takes arguments as the transition matrix, rewards, dictionary,
    and also the value array. It computes the multiplication of a transitional matrix
    or state with the values array. Then it applies the gamma discount factor. Finally
    the rewards for the current state are added to generate the new values. After
    the operation is done, we take the most valuable element or state with the highest
    value and retrieve its index from the value array. This index will help us in
    mapping which reward value is getting triggered. From that reward value, we can
    navigate to that particular track section (position) by looking up the dictionary.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 该函数接受过渡矩阵、奖励、字典和值数组作为参数。它计算过渡矩阵或状态与值数组的乘积。然后应用伽马折扣因子。最后，将当前状态的奖励添加到生成新值。操作完成后，我们取最有价值的元素或具有最高值的州，并从值数组中检索其索引。这个索引将帮助我们映射哪个奖励值被触发。从那个奖励值，我们可以通过查找字典来导航到特定的轨道部分（位置）。
- en: '[PRE40]'
  id: totrans-255
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: This function helps to look up the particular reward that is attained during
    an iteration of the game and automatically returns the position of the triggered
    track section.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 此函数有助于查找游戏迭代过程中获得的具体奖励，并自动返回触发轨道部分的当前位置。
- en: Let us put all of these together in a Coroutine function that is the control
    logic for the agent. Inside the IEnumerator function, we set a for loop that runs
    for the number of epochs we would want.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们把所有这些放在一起，形成一个Coroutine函数，这是智能体的控制逻辑。在IEnumerator函数内部，我们设置一个for循环，该循环运行我们想要的epoch数。
- en: '[PRE41]'
  id: totrans-258
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: This segment of code runs as long as the collected rewards are less than the
    total expected rewards specified in the initialization step. In this segment of
    code, we performed the Bellman iterative value operation, attained the particular
    reward value that is getting triggered for that instance, and also retrieved the
    transform position value of the corresponding track section. The rewards are added
    accordingly.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码会一直运行，直到收集到的奖励少于初始化步骤中指定的总预期奖励。在这段代码中，我们执行了贝尔曼迭代值操作，获得了特定实例触发的特定奖励值，并检索了相应轨道部分的变换位置值。相应的奖励被相应地添加。
- en: '[PRE42]'
  id: totrans-260
  prefs: []
  type: TYPE_PRE
  zh: '[PRE42]'
- en: The if-else statements specify and check whether the action taken by the Kart
    Agent has led him to the green target or finish line. If the agent reaches the
    finish line or the target then we provide him a momentary rest of 1 second before
    the start of the next iteration. This iteration continues as long as the rewards
    are less than the total expected rewards.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: if-else语句指定并检查Kart智能体采取的行动是否将其带到绿色目标或终点线。如果智能体到达终点线或目标，则在下一次迭代开始之前，我们给他提供1秒钟的短暂休息。这个迭代会一直持续，直到奖励少于预期的总奖励。
- en: '[PRE43]'
  id: totrans-262
  prefs: []
  type: TYPE_PRE
  zh: '[PRE43]'
- en: If the conditions are met and the rewards accumulated equal the total rewards,
    we terminate the instance and provide the agent a rest for 2 seconds before moving
    to the next episode of training.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 如果满足条件且累积的奖励等于总奖励，我们将终止实例，并在移动到下一个训练剧集之前让智能体休息2秒钟。
- en: When we are comfortable with the code-base, we can play around and modify with
    the reward function and add more discrete rewards for different situations. Also
    the environment can be extended along the vertical track as well, which would
    also add more states on the transitional matrix as well as the value array. The
    motion of the agent would be then governed on both the x and the z axes. We can
    modify the script to accommodate more states by taking the x values of the vertically
    placed track section in the dictionary. Once the environment is set up as shown
    in Figure [1-23](#Fig23), we can click the Play button in the editor. Notice how
    the agent rapidly navigates to the highest rewarding state for each iteration
    and continues to do so because of the updates in the value array. The value array
    retains the information of the states or track sections that contain the highest
    rewards and also helps the agent in successive timestamps to follow that path.
    This can be realized as a buffer memory that retains the state having the highest
    values.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们熟悉代码库后，我们可以对奖励函数进行修改，并为不同情况添加更多离散奖励。此外，环境也可以沿着垂直轨道扩展，这也会在转移矩阵和价值数组中添加更多状态。代理的运动将由x轴和z轴共同控制。我们可以通过在字典中取垂直放置的轨道部分x值来修改脚本以适应更多状态。一旦环境设置如图[1-23](#Fig23)所示，我们可以在编辑器中点击播放按钮。注意代理如何快速导航到每个迭代的最高奖励状态，并继续这样做，因为价值数组中的更新。价值数组保留了包含最高奖励的状态或轨道部分的信息，并帮助代理在后续时间戳中遵循该路径。这可以被视为一个缓冲内存，保留了具有最高值的状态。
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig23_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig23_HTML.jpg)'
  id: totrans-265
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig23_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig23_HTML.jpg)'
- en: Figure 1-23
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-23
- en: Bellman agent Unity Scene with Inspector Window
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: Bellman代理Unity场景与检查器窗口
- en: In this section, we have learned about the Bellman equation, which is an iterative
    dynamic programming equation. We have visited some important concepts of relating
    rewards to Markov states and the Decision Process with the help of the Bellman
    equation. The section also touched briefly on the value and policy iteration techniques
    for reward maximization or value maximization by following a particular policy.
    We created and simulated a Unity Game where a Kart Agent has to apply the Bellman
    Value Function to navigate to the highest rewarding track sections. By now, we
    have learned how discrete tabular environments and value/policy optimization algorithms
    such as the Bellman equation are useful in RL. In the next section we will discuss
    creating another simulation game based on Multi Armed Bandits.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们学习了贝尔曼方程，这是一个迭代动态规划方程。我们借助贝尔曼方程，探讨了将奖励与马尔可夫状态以及决策过程相关联的一些重要概念。本节还简要介绍了通过遵循特定策略进行奖励最大化或价值最大化的价值和策略迭代技术。我们创建并模拟了一个Unity游戏，其中Kart代理必须应用贝尔曼价值函数来导航到最高奖励的轨道部分。到目前为止，我们已经了解了离散表格环境以及如贝尔曼方程之类的价值/策略优化算法在强化学习中的有用性。在下一节中，我们将讨论基于多臂老虎机的另一个模拟游戏的创建。
- en: Creating a Multi-Armed Bandit Reinforcement Learning Agent in Unity
  id: totrans-269
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在Unity中创建多臂老虎机强化学习代理
- en: 'Multi-armed bandits (MAB) are the simplest form of RL algorithmic simulations.
    This technique does not involve learning to choose maximum rewarding states but
    relies on a feedback mechanism. The k armed bandit problem can be described as
    follows: a bandit agent is in an environment where there are k different houses
    that can be robbed (action space). Based on the decision chosen at each step on
    the choice of the house, the bandit gets a reward. The reward, generally, is a
    stationary probabilistic distribution and can be negative (when the police are
    present in the house) or positive (when there are no police in the house). The
    objective of the bandit agent is to maximize positive rewards for n time-steps.'
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 多臂老虎机（MAB）是强化学习算法模拟的最简单形式。这种技术不涉及学习选择最大奖励状态，而是依赖于反馈机制。k臂老虎机问题可以这样描述：老虎机代理处于一个环境中，有k个不同的房屋可以被抢劫（动作空间）。根据在每个步骤上选择的房屋的决定，老虎机获得奖励。奖励通常是一个平稳的概率分布，可以是负的（当警察在房屋中时）或正的（当房屋中没有警察时）。老虎机代理的目标是在n个时间步内最大化正奖励。
- en: 'This kind of basic RL environment is devoid of Markov states and Bellman optimization
    techniques, as mathematically it is a function of only the rewards and the action.
    To reframe, this can be interpreted as:'
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 这种基本的强化学习环境没有马尔可夫状态和贝尔曼优化技术，因为从数学上讲，它仅是奖励和动作的函数。重新表述，这可以理解为：
- en: Q(a) = E [ R[t] | A[t] = a ],
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: Q(a) = E [ R[t] | A[t] = a ],
- en: where Q(a) denotes the expectation of rewards following an action a.
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 Q(a) 表示执行动作 a 后的期望奖励。
- en: Since the action of a bandit relies mostly on the outcome of rewards, there
    are several policies that have been implemented. Figure [1-24](#Fig24) shows a
    preview of the multi-armed bandit environment.
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 由于老虎机的动作主要依赖于奖励的结果，已经实施了几种策略。图 [1-24](#Fig24) 显示了多臂老虎机环境的预览。
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig24_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig24_HTML.jpg)'
  id: totrans-275
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig24_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig24_HTML.jpg)'
- en: Figure 1-24
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-24
- en: Multi-armed bandit and environment
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 多臂老虎机和环境
- en: Strategies Involved in Multi-Armed Bandits
  id: totrans-278
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 多臂老虎机涉及到的策略
- en: There are several variations of the Bandit algorithm to maximize the rewards
    collected at each step. These are generally referred to as “action–value ” functions.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 有几种 Bandit 算法的变体，旨在最大化每一步收集的奖励。这些通常被称为“动作-值”函数。
- en: '**Greedy algorithm** : The brute force application involves using the Greedy
    Exploitation algorithm. This involves storing the Q-value (value function) of
    the action for each iteration and choosing the maximum Q-valued action. This is
    a nonexploration strategy, as in many cases the rewards may not be the highest
    at the same arm/location. Mathematically this can be seen as:'
  id: totrans-280
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**贪婪算法**：蛮力应用涉及使用贪婪利用算法。这包括存储每个迭代的动作 Q 值（值函数）并选择具有最大 Q 值的动作。这是一个非探索策略，因为在许多情况下，奖励可能不是同一臂/位置的最高值。从数学上讲，这可以表示为：'
- en: Q[t](a) = ∑ 1[(at=a)]. (R[i]) / ∑ 1[(at=a)] ,
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: Q[t](a) = ∑ 1[(at=a)]. (R[i]) / ∑ 1[(at=a)] ,
- en: 'choose the maximum Q-value:'
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 选择最大 Q 值：
- en: Argmax[a] Q[t](a)
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: Argmax[a] Q[t](a)
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig25_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig25_HTML.jpg)'
  id: totrans-284
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig25_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig25_HTML.jpg)'
- en: Figure 1-25
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-25
- en: Epsilon-Greedy algorithm
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: ε-Greedy 算法
- en: '**Epsilon-Greedy algorithm** : In this kind of algorithm, the bandit exploits
    and explores new states based on certain probability values, denoted bye. The
    bandit explores a new state with probability e and exploits the best current reward
    state with probability 1-e, as shown in Figure [1-25](#Fig25).'
  id: totrans-287
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**ε-Greedy 算法**：在这种算法中，老虎机根据某些概率值 e 利用和探索新的状态。老虎机以概率 e 探索新状态，以概率 1-e 利用当前最佳奖励状态，如图
    [1-25](#Fig25) 所示。'
- en: '**Decayed Epsilon-Greedy algorithm** : This is a variation of the previous
    exploitation–exploration algorithm. Here, a logarithmic decay factor may be associated
    with the exploitation of previous states.'
  id: totrans-288
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**衰减 ε-Greedy 算法**：这是先前利用-探索算法的一种变体。在这里，可能将一个对数衰减因子与先前状态的利用相关联。'
- en: '**Nonstationary Weighted algorithm** : If the rewards acquired by the bandit
    change over time, then it is a nonstationary problem. In this case we apply a
    weighted average on the previous Q-value and current rewards. This can be shown
    as :'
  id: totrans-289
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**非平稳加权算法**：如果老虎机的奖励随时间变化，则这是一个非平稳问题。在这种情况下，我们对先前的 Q 值和当前奖励应用加权平均。这可以表示为：'
- en: Q[n+1] = Q[n] + α [R[n] - Q[n]],
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: Q[n+1] = Q[n] + α [R[n] - Q[n]],
- en: where α is the average weighted factor.
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 α 是平均加权因子。
- en: '**Upper Confidence-Bound (UCB) algorithm** : This is a statistical distribution
    of exploration-exploitation of different rewards. The algorithm explores by measuring
    the expected variance in the rewards of previous action. This is an optimistic
    value approach to reduce the variance of a particular action of getting high rewards.
    Mathematically it can be described by the equation:'
  id: totrans-292
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**上置信界 (UCB) 算法**：这是不同奖励的探索-利用的统计分布。该算法通过测量先前动作奖励的期望方差来进行探索。这是一种乐观值方法，旨在减少特定动作获得高奖励的方差。从数学上讲，它可以描述为以下方程：'
- en: A[t]= argmax [Q[t](a) + c√(ln(t)/N[t](a))],
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: A[t] = argmax [Q[t](a) + c√(ln(t)/N[t](a))],
- en: where Nt(a) denotes the number of times the action a has been selected prior
    to time t and ln(t) is the natural logarithm of t.
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 Nt(a) 表示在时间 t 之前选择动作 a 的次数，ln(t) 是 t 的自然对数。
- en: '**Gradient Bandit algorithm** : This is a numerical preference algorithm that
    takes into account the preference of a particular state a over other states. The
    relative preference of one action over the other is recorded and can be sampled
    into a probabilistic distribution by including the softmax function. This is a
    very important function in general deep learning and will be using this in our
    deep RL algorithms.'
  id: totrans-295
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**梯度老虎机算法**：这是一个考虑特定状态a相对于其他状态的偏好的数值偏好算法。记录一个动作相对于另一个动作的相对偏好，并通过包括softmax函数将其采样到概率分布中。这在一般的深度学习中是一个非常重要的函数，我们将在我们的深度强化学习算法中使用它。'
- en: Softmax(z) =e^z/(∑ e^z)
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: Softmax(z) = e^z / (∑ e^z)
- en: '**Thompson sampling** : It is a Bayesian sampling technique that is more sophisticated
    than Epsilon-Greedy algorithm and is based on posterior probability distribution
    of the actions and rewards.'
  id: totrans-297
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Thompson抽样**：这是一种比Epsilon-Greedy算法更复杂的贝叶斯抽样技术，它基于动作和奖励的后验概率分布。'
- en: Multi-Armed Bandit Simulation in Unity with UCB Algorithm
  id: totrans-298
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用UCB算法的Unity中的多臂老虎机模拟
- en: In this section, we will try to incorporate the Epsilon-Greedy, UCB with softmax
    gradient optimization. We will try to explore the different algorithmic approaches
    in Unity simulation, and then we can try to create an environment based on Python.
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将尝试将Epsilon-Greedy、带有softmax梯度优化的UCB结合起来。我们将尝试探索Unity模拟中的不同算法方法，然后我们可以尝试基于Python创建一个环境。
- en: Open the scene “MAB-Unity.” The scene consists of three cubes, each having a
    different probability of rewards. On selecting play in the editor, we see that
    the bandit chooses different rewards (i.e., cubes) and always tries to optimize
    its rewards. This is a purely action–reward-based, noncontextual bandit with feedback,
    and hence we can control the exploration-exploitation with the Epsilon-Greedy
    algorithm. By default the simulation runs in Epsilon-Greedy, and there is an option
    for activating the UCB algorithm as well. In the Console Tab, we can see the expected
    rewards. A preview of the environment is shown in Figure [1-26](#Fig26).
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 打开场景“MAB-Unity”。场景由三个立方体组成，每个立方体有不同的奖励概率。在编辑器中选择播放时，我们看到老虎机选择不同的奖励（即立方体），并总是试图优化其奖励。这是一个纯粹基于动作-奖励的非上下文老虎机，带有反馈，因此我们可以通过Epsilon-Greedy算法来控制探索-利用。默认情况下，模拟在Epsilon-Greedy模式下运行，还有一个选项可以激活UCB算法。在控制台标签中，我们可以看到期望的奖励。环境的预览如图[1-26](#Fig26)所示。
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig26_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig26_HTML.jpg)'
  id: totrans-301
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig26_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig26_HTML.jpg)'
- en: Figure 1-26
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-26
- en: Multi-Armed Bandit Scene in Unity
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: Unity中的多臂老虎机场景
- en: Since by now we have gained some experience writing code in C# MonoBehaviour
    for Unity, let us open the “Agent” script. The first contains the variable setup;
    here it should be noted that if we want private variables to be rendered in the
    Inspector Window, we have to mention the [SerializeField] attribute over each
    of the private variables.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 由于到目前为止，我们已经积累了一些在Unity的C# MonoBehaviour中编写代码的经验，让我们打开“Agent”脚本。第一个包含变量设置；这里需要注意的是，如果我们想让私有变量在Inspector窗口中显示，我们必须在每个私有变量上提及[SerializeField]属性。
- en: '[PRE44]'
  id: totrans-305
  prefs: []
  type: TYPE_PRE
  zh: '[PRE44]'
- en: The initialization involves variables such as epsilon for the Epsilon-Greedy
    algorithm, Boolean trigger for UCB, and float arrays of rewards, values (Q-values),
    and action times (which signify to what extent an action “a” is repeated). The
    confidence interval is a float list that helps in the UCB algorithm. The actions
    list contains the indices of the relevant cubes during running of the application.
    The start method contains all the initializations of the variables and lists,
    which calls the Coroutine for the game control logic.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 初始化涉及epsilon（Epsilon-Greedy算法的epsilon）、UCB的布尔触发器以及奖励、值（Q值）和动作时间（表示动作“a”重复的程度）的浮点数组。置信区间是帮助UCB算法的浮点列表。动作列表包含在应用程序运行期间的相关立方体的索引。start方法包含所有变量的初始化和列表，它调用协程以进行游戏控制逻辑。
- en: Let us explore the chooseaction method, which contains the implementation of
    Epsilon-Greedy UCB algorithm.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们探索chooseaction方法，它包含了Epsilon-Greedy UCB算法的实现。
- en: '[PRE45]'
  id: totrans-308
  prefs: []
  type: TYPE_PRE
  zh: '[PRE45]'
- en: This part of the code segment randomly chooses float values and checks whether
    they are less than the exploitation rate. Then it tries to explore new cubes with
    the “rnd.Next()” method. This is an exploration strategy that is based on the
    randomized distribution of the samples.
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 这部分代码段随机选择浮点值并检查它们是否小于利用率。然后它尝试使用“rnd.Next()”方法探索新的立方体。这是一种基于样本随机分布的探索策略。
- en: 'If this option is not chosen, then the control passes to the else statement.
    If we want to use the UCB algorithm, we have to check the boolean variable to
    be true. The UCB code is as follows:'
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 如果不选择此选项，则控制传递到else语句。如果我们想使用UCB算法，我们必须检查布尔变量是否为true。UCB代码如下：
- en: '[PRE46]'
  id: totrans-311
  prefs: []
  type: TYPE_PRE
  zh: '[PRE46]'
- en: The UCB code is divided into two statements. If the time period is not provided
    for UCB, then it is a random exploration algorithm. If the time period for past
    actions is taken into consideration, then the control goes to the “else” statement.
    The UCB then computes the Q-values of all the possible actions using the UCB formula.
    After attaining each of the Q-values, they are populated in the confidence interval
    list. The later part of the code segment then chooses the maximum Q-value from
    this confidence interval list and returns that particular cube.
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: UCB代码分为两个语句。如果没有为UCB提供时间周期，则它是一个随机探索算法。如果考虑过去动作的时间周期，则控制转到“else”语句。然后UCB使用UCB公式计算所有可能动作的Q值。在获得每个Q值后，它们被填充到置信区间列表中。代码段的后续部分然后从置信区间列表中选择最大的Q值并返回该特定的立方体。
- en: We next move into the “take action” function and try to update the Q-values
    and reward values by adding a learning rate to aid in the UCB algorithm. The algorithm
    also computes the relative rewards at each step as well as the average rewards.
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 我们接下来进入“执行行动”函数，并尝试通过添加学习率来更新Q值和奖励值，以辅助UCB算法。该算法还会在每一步计算相对奖励以及平均奖励。
- en: '[PRE47]'
  id: totrans-314
  prefs: []
  type: TYPE_PRE
  zh: '[PRE47]'
- en: The “Play” method links the above two functions and runs them for the iterations
    provided in the Inspector Window. The Q-value of a particular action with the
    highest confidence interval values gets selected and passed to the “takeaction”
    method.
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: “播放”方法将上述两个函数链接起来，并在检查窗口提供的迭代次数中运行它们。具有最高置信区间值的特定动作的Q值被选中并传递给“执行行动”方法。
- en: '[PRE48]'
  id: totrans-316
  prefs: []
  type: TYPE_PRE
  zh: '[PRE48]'
- en: Let us enter into the IEnumerator code segment, where all the functions are
    called and the appropriate cube gets selected. The “Play” command gets called
    for 900 iterations, and for each iteration, we get the details of average rewards
    and total rewards in the Console Window. Then based on the selection of cubes,
    the highest valued cube per iteration is set active and the rest are deactivated.
    This signifies which cube is getting triggered at which iteration and provides
    the maximum Q-value.
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们进入IEnumerator代码段，在那里调用所有函数并选择适当的立方体。对于900次迭代，“播放”命令被调用，并且对于每次迭代，我们可以在控制窗口中获得平均奖励和总奖励的详细信息。然后根据立方体的选择，每轮的最高价值立方体被设置为活动状态，其余的则被停用。这表示哪个立方体在哪个迭代中被触发，并提供了最大的Q值。
- en: '[PRE49]'
  id: totrans-318
  prefs: []
  type: TYPE_PRE
  zh: '[PRE49]'
- en: Thus we implemented an Epsilon-Greedy-UCB-based, multi-armed bandit simulation.
    We can play with the settings by switching between Epsilon-Greedy and UCB algorithms
    during gameplay to see how exploration–exploitation details are affected. Once
    we have understood the code, we can click Play in the Unity Editor and see the
    simulation running. After many iterations, we will observe that some of the cubes
    are repeatedly being selected—a classic example of bandit exploitation. We can
    then change the epsilon and learning rate values or change to UCB algorithm to
    have more exploration. Figure [1-27](#Fig27) is a preview of the simulation.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们实现了一个基于Epsilon-Greedy-UCB的多臂老虎机模拟。我们可以在游戏过程中通过在Epsilon-Greedy和UCB算法之间切换来调整设置，以查看探索-利用细节如何受到影响。一旦我们理解了代码，我们就可以在Unity编辑器中点击“播放”来查看模拟运行。经过多次迭代后，我们会观察到一些立方体被反复选中——这是老虎机利用的经典例子。然后我们可以更改epsilon和学习率值，或者切换到UCB算法以进行更多探索。图[1-27](#Fig27)是模拟的预览。
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig27_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig27_HTML.jpg)'
