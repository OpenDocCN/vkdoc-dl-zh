- en: 1. Introduction to Reinforcement Learning
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 1. 强化学习简介
- en: Reinforcement learning (RL) is a paradigm of learning algorithms that are based
    on rewards and actions. The state-based learning paradigm is different from generic
    supervised and unsupervised learning, as it does not typically try to find structural
    inferences in collections of unlabeled or labeled data. Generic RL relies on finite
    state automation and decision processes that assist in finding an optimized reward-based
    learning trajectory. The field of RL relies heavily on goal-seeking, stochastic
    processes and decision theoretic algorithms, which is a field of active research.
    With developments in higher order deep learning algorithms, there has been huge
    advancement in this field to create self-learning agents that can achieve a goal
    by using gradient convergence techniques and sophisticated memory-based neural
    networks. This chapter will focus on the fundamentals of the Markov Decision Process
    (MDP), hidden Markov Models (HMMs) and dynamic programming for state enumeration,
    Bellman’s iterative algorithms, and a detailed walkthrough of value and policy
    algorithms. In all these sections, there will be associated python notebooks for
    better understanding of the concepts as well as simulated games made with Unity
    (version 2018.x).
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习（RL）是一种基于奖励和行动的学习算法范式。基于状态的学习范式与通用的监督学习和无监督学习不同，因为它通常不试图在未标记或标记的数据集合中找到结构性的推断。通用强化学习依赖于有限状态自动机和决策过程，这些过程有助于找到基于奖励的优化学习轨迹。强化学习领域高度依赖于目标寻求、随机过程和决策理论算法，这是一个活跃的研究领域。随着高级深度学习算法的发展，该领域取得了巨大的进步，以创建能够通过梯度收敛技术和复杂的基于记忆的神经网络实现目标的自我学习智能体。本章将重点介绍马尔可夫决策过程（MDP）、隐藏马尔可夫模型（HMMs）和状态枚举的动态规划、贝尔曼迭代算法，以及价值算法和策略算法的详细说明。在这些所有部分中，都会有相关的
    Python 笔记本，以更好地理解概念，以及使用 Unity（版本 2018.x）制作的模拟游戏。
- en: The fundamental aspects in an academy of RL are agent(s) and environment(s)
    . Agent refers to an object that uses learning algorithms to try and explore rewards
    in steps. The agent tries to optimize a suitable path toward a goal that results
    in maximization of the rewards and, in this process, tries to avoid punishing
    states. Environment is everything around an agent; this includes the states, obstacles,
    and rewards. The environment can be static as well as dynamic. Path convergence
    in a static environment is faster if the agent has sufficient buffer memory to
    retain the correct trajectory toward the goal as it explores different states.
    Dynamic environment pose a stronger challenge for agents, as there is no definite
    trajectory. The second use-case requires sufficient deep memory network models
    like bidirectional long short-term memory (LSTM) to retain certain key observations
    that remain static in the dynamic environment. Figuratively generic reinforcement
    learning can be presented as shown in Figure [1-1](#Fig1).
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习（RL）学院的基本方面包括智能体和环境的交互。智能体指的是使用学习算法尝试探索奖励的对象。智能体试图通过步骤优化一条合适的路径，以实现奖励的最大化，在这个过程中，它试图避免惩罚状态。环境是智能体周围的一切，包括状态、障碍和奖励。环境可以是静态的，也可以是动态的。在静态环境中，如果智能体有足够的缓冲内存来保留探索不同状态时指向目标的正确轨迹，路径收敛会更快。动态环境对智能体提出了更大的挑战，因为没有确定的轨迹。第二个用例需要足够的深度记忆网络模型，如双向长短期记忆（LSTM），以保留在动态环境中保持静态的关键观察。图示上，通用强化学习可以如图
    [1-1](#Fig1) 所示。
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig1_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig1_HTML.jpg)'
  id: totrans-3
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig1_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig1_HTML.jpg)'
- en: Figure 1-1
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-1
- en: Interaction between agent and environment in reinforcement learning
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习中智能体与环境的交互
- en: The set of variables that control and govern the interaction between the agent
    and the environment includes {state(S), reward(R), action(A)}.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 控制和规范智能体与环境之间交互的变量集包括 {状态(S), 奖励(R), 行动(A)}。
- en: 'State is a set of possible enumerated states provided in the environment: {s[0],
    s[1], s[2], … s[n]}.'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 状态是环境提供的可能枚举状态集合：{s[0], s[1], s[2], … s[n]}。
- en: 'Reward is the set of possible rewards present in particular states in the environment:
    {r[0], r[1], r[2], …, r[n]}.'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 奖励是环境中特定状态下存在的可能奖励集合：{r[0], r[1], r[2], …, r[n]}。
- en: 'Action is the set of possible actions that the agent can take to maximize its
    rewards: {A[0], A[1], A[2], … A[n]}.'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 行动是智能体可以采取以最大化其奖励的可能行动集合：{A[0], A[1], A[2], … A[n]}。
- en: 'OpenAI Gym Environment: CartPole'
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: OpenAI Gym 环境：CartPole
- en: To understand the roles of each of these in an RL environment, let us try to
    study the CartPole environment from OpenAI gym . OpenAI gym includes many environments
    for research and study of classic RL algorithms, robotics, and deep RL algorithms,
    and this is used as a wrapper in Unity machine learning (ML) agents Toolkit.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 为了理解这些在强化学习环境中的角色，让我们尝试研究 OpenAI gym 中的 CartPole 环境。OpenAI gym 包含了许多用于研究经典强化学习算法、机器人和深度强化学习算法的环境，并且这些环境在
    Unity 机器学习（ML）代理工具包中被用作包装器。
- en: The CartPole environment can be described as a classical physics simulation
    system where a pole is attached to an “un-actuated” joint to a cart. The cart
    is free to move along a frictionless track. The constraints on the system involve
    applying a force of +1and -1 to the cart. The pendulum starts upright, and the
    goal is to prevent it from falling over. A reward of +1 is provided for every
    timestamp the pole remains upright. When the angle of inclination is greater than
    15 degrees from the normal, the episode terminates (punishment). If the cart moves
    more than 2.4 units either way from the central line, the episode terminates.
    Figure [1-2](#Fig2) depicts the environment.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: CartPole 环境可以描述为一个经典的物理仿真系统，其中一根杆连接到一个“非驱动”关节到小车上。小车可以自由地在无摩擦的轨道上移动。系统上的约束包括对小车的
    +1 和 -1 力的应用。摆锤开始时是竖直的，目标是防止它倒下。每当杆保持竖直时，都会提供 +1 的奖励。当倾斜角度大于 15 度时，游戏结束（惩罚）。如果小车从中心线向任一方向移动超过
    2.4 个单位，游戏结束。图 [1-2](#Fig2) 描述了该环境。
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig2_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig2_HTML.jpg)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig2_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig2_HTML.jpg)'
- en: Figure 1-2
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-2
- en: CartPole environment from OpenAI gym
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI gym 中的 CartPole 环境
- en: 'The possible states , rewards, and actions sets in this environment include:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 该环境可能的状态、奖励和动作集合包括：
- en: 'States: An array of length 4.:[cart position, cart velocity, pole angle, pole
    tip velocity] such as [`4.8000002e+00,3.4028235e+38 ,4.1887903e-01,3.4028235e+38`]'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 状态：长度为 4 的数组：[小车位置，小车速度，杆角度，杆尖端速度]，例如 [`4.8000002e+00,3.4028235e+38 ,4.1887903e-01,3.4028235e+38`]
- en: 'Rewards: +1 for every timestamp the pole remains upright'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 奖励：每当杆保持竖直时，奖励 +1
- en: 'Actions: integer array of size 2 : [left direction, right direction], which
    controls the direction of motion of the cart such as [-1,+1]'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 行动：大小为 2 的整数数组：[左方向，右方向]，控制小车运动的方向，例如 [-1,+1]
- en: 'Termination: if the cart shifts more than 2.4 units from the center or the
    pendulum inclines more than 15 degrees'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 终止条件：如果小车偏离中心超过 2.4 个单位或摆锤倾斜超过 15 度
- en: 'Objective: to keep the pendulum or pole upright for 250 time-steps and collect
    rewards more than 100 points'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 目标：保持摆锤或杆竖直 250 个时间步，并获得超过 100 分的奖励
- en: Installation and Setup of Python for ML Agents and Deep Learning
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Python for ML Agents 和深度学习的安装和设置
- en: To visualize this environment, installation of Jupyter notebook is required,
    which can be installed from the Anaconda environment. Download Anaconda (recommended
    latest version for Python), and Jupyter notebooks will be installed as well.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 为了可视化此环境，需要安装 Jupyter notebook，可以从 Anaconda 环境中安装。下载 Anaconda（推荐最新版本的 Python），Jupyter
    notebooks 也会一并安装。
- en: Downloading Anaconda also installs libraries like numpy, matplotlib, and sklearn,
    which are used for generic machine learning. Consoles and editors like IPython
    Console, Spyder, Anaconda Prompt are also installed with Anaconda. Anaconda Prompt
    should be set as an environment PATH variable. Preview of the terminal is shown
    in Figure [1-3](#Fig3).
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 下载 Anaconda 也会安装如 numpy、matplotlib 和 sklearn 等库，这些库用于通用机器学习。Anaconda 还会安装控制台和编辑器，如
    IPython 控制台、Spyder、Anaconda Prompt。Anaconda Prompt 应该设置为环境 PATH 变量。终端的预览如图 [1-3](#Fig3)
    所示。
- en: Note
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Anaconda Navigator is installed with Anaconda. This is an interactive dashboard
    application where options for downloading Jupyter notebook, Spyder, IPython, and
    JupyterLab are available. The applications can also be started by clicking on
    them.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: Anaconda Navigator 与 Anaconda 一起安装。这是一个交互式仪表板应用程序，其中提供了下载 Jupyter notebook、Spyder、IPython
    和 JupyterLab 的选项。也可以通过点击它们来启动应用程序。
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig3_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig3_HTML.jpg)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig3_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig3_HTML.jpg)'
- en: Figure 1-3
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-3
- en: Anaconda navigator terminal
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: Anaconda 导航器终端
- en: 'Jupyter notebook can be installed by using pip command as:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 可以使用 pip 命令安装 Jupyter notebook：
- en: '[PRE0]'
  id: totrans-31
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'For running the Jupyter notebook, open Anaconda Prompt or Command Prompt and
    run the following command:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 要运行 Jupyter 笔记本，请打开 Anaconda Prompt 或 Command Prompt 并运行以下命令：
- en: '[PRE1]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Alternatively, Google Colaboratory (Google Colab) runs Jupyter notebooks on
    the cloud and is saved to local Google drive. This can be used as well for notebook
    sharing and collaboration. The Google Colaboratory is shown in Figure [1-4](#Fig4).
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，Google Colaboratory（Google Colab）在云端运行 Jupyter 笔记本，并保存在本地 Google Drive 中。这也可以用于笔记本共享和协作。Google
    Colaboratory 在图 [1-4](#Fig4) 中展示。
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig4_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig4_HTML.jpg)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig4_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig4_HTML.jpg)'
- en: Figure 1-4
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-4
- en: Google Colaboratory notebook
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: Google Colaboratory 笔记本
- en: To start, create a new Python3 kernel notebook, and name it as CartPole environment.
    In order to simulate and run the environment, there are certain libraries and
    frameworks required to be installed.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，创建一个新的 Python3 内核笔记本，并将其命名为 CartPole 环境。为了模拟和运行环境，需要安装某些库和框架。
- en: 'Install Gym : Gym is the collection of environments created by OpenAI, which
    contains different environments for developing RL algorithms.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安装 Gym：Gym 是由 OpenAI 创建的环境集合，其中包含用于开发强化学习算法的不同环境。
- en: 'Run the command in Anaconda Prompt, Command Prompt :'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Anaconda Prompt 或 Command Prompt 中运行以下命令：
- en: '[PRE2]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Or run this command from Jupyter notebook or Google Colab notebook
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 或者从 Jupyter 笔记本或 Google Colab 笔记本运行此命令
- en: 'Install Tensorflow and Keras: Tensorflow is an open-source deep learning framework
    developed by Google that will be used for creating neural network layers in deep
    RL. Keras is an abstraction (API) over Tensorflow and contains all the built-in
    functionalities of Tensorflow with ease of use. The commands are as follows :'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安装 Tensorflow 和 Keras：Tensorflow 是由 Google 开发的开源深度学习框架，它将被用于创建深度强化学习中的神经网络层。Keras
    是 Tensorflow 之上的抽象（API），它包含了 Tensorflow 的所有内置功能，并且易于使用。命令如下：
- en: '[PRE3]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '[PRE4]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: These commands are for installation through Anaconda Prompt or Command Prompt.
    The version of Tensorflow used later in this book for Unity ML agents is 1.7\.
    However, for integration with Unity ML agents, Tensorflow version 2.0 can be used
    as well. If issues arise due to mismatch of versions, then that can be resolved
    by going through the documentation of Unity ML agents versioning and compatibility
    with Tensorflow, and the latter can be reinstalled just by using the pip command.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 这些命令是通过 Anaconda Prompt 或 Command Prompt 进行安装的。本书后面用于 Unity ML 代理的 Tensorflow
    版本是 1.7。然而，对于与 Unity ML 代理的集成，也可以使用 Tensorflow 版本 2.0。如果由于版本不匹配出现问题时，可以通过查阅 Unity
    ML 代理版本和 Tensorflow 兼容性文档来解决，然后可以通过使用 pip 命令重新安装后者。
- en: 'For Jupyter notebook or Colab installation of Tensorflow and Keras, the following
    commands are required:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 对于 Jupyter 笔记本或 Colab 的 Tensorflow 和 Keras 安装，需要以下命令：
- en: '[PRE5]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Note
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Tensorflow has nightly builds that are released every day with a version number,
    and this can be viewed in the Python Package Index (Pypi) page of Tensorflow.
    These builds are generally referred to as tf-nightly and may have an unstable
    compatibility with Unity ML agents. However, official releases are recommended
    for integration with ML agents, while nightly builds can be used for deep learning
    as well.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: Tensorflow 每天都会发布带有版本号的夜间构建版本，这可以在 Tensorflow 的 Python 包索引（Pypi）页面中查看。这些构建通常被称为
    tf-nightly，可能与 Unity ML 代理存在不稳定的兼容性问题。然而，建议使用官方发布版与 ML 代理集成，而夜间构建也可以用于深度学习。
- en: 'Install gym pyvirtualdisplay and python opengl: These libraries and frameworks
    (built for OpenGL API) will be used for rendering the Gym environment in Colab
    notebook. There are issues with xvfb installation locally in Windows, and hence
    Colab notebooks can be used for displaying the Gym environment training. The commands
    for installation in Colab notebook are as follows:'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安装 gym pyvirtualdisplay 和 python opengl：这些库和框架（为 OpenGL API 构建而成）将用于在 Colab
    笔记本中渲染 Gym 环境。在 Windows 上本地安装 xvfb 存在问题，因此可以使用 Colab 笔记本来显示 Gym 环境的训练。在 Colab
    笔记本中的安装命令如下：
- en: '[PRE6]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Once the installation is complete, we can dive into the CartPole environment
    and try to gain more information on the environment, rewards, states, and actions.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦安装完成，我们就可以深入 CartPole 环境，并尝试获取更多关于环境、奖励、状态和动作的信息。
- en: Playing with the CartPole Environment for Deep Reinforcement Learning
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在 CartPole 环境中玩耍用于深度强化学习
- en: Open the “Cartpole-Rendering.ipynb” notebook. It contains the starter code for
    setting up the environment. The first section contains import statements to import
    libraries in the notebook.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 打开“Cartpole-Rendering.ipynb”笔记本。它包含设置环境的起始代码。第一部分包含导入语句，用于在笔记本中导入库。
- en: '[PRE7]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The next step involves setting up the dimensions of the display window to visualize
    the environment in the Colab notebook. This uses the pyvirtualdisplay library.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步涉及设置显示窗口的维度，以便在 Colab 笔记本中可视化环境。这使用了 pyvirtualdisplay 库。
- en: '[PRE8]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Now, let us load the environment from Gym using the gym.make command and look
    into the states and the actions. Observation states refer to the environment variables
    that contain the key factors like cart velocity and pole velocity and is an array
    of size 4\. The action space is an array of size 2, which refers to the binary
    actions (moving left or right). The observation space also contains high and low
    values as boundary values for the problem.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们使用 gym.make 命令从 Gym 加载环境，并查看状态和动作。观察状态是指包含关键因素（如小车速度和杆速度）的环境变量，是一个大小为
    4 的数组。动作空间是一个大小为 2 的数组，表示二进制动作（向左或向右移动）。观察空间还包含高值和低值作为问题的边界值。
- en: '[PRE9]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: This is shown in Figure [1-5](#Fig5).
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 这在图 [1-5](#Fig5) 中显示。
- en: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig5_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig5_HTML.jpg)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502041_1_En_1_Chapter/502041_1_En_1_Fig5_HTML.jpg](../images/502041_1_En_1_Chapter/502041_1_En_1_Fig5_HTML.jpg)'
- en: Figure 1-5
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-5
- en: Observation and action space in CartPole environment
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: CartPole 环境中的观察和动作空间
- en: After running, the details appear in the console. The details include the different
    action spaces as well as the observation steps.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 运行后，详细信息将出现在控制台中。这些详细信息包括不同的动作空间以及观察步骤。
- en: Let us try to run the environment for 50 iterations and check the values of
    rewards accumulated. This will simulate the environment for 50 iterations and
    provide insight into how the agent balances itself with the baseline OpenAI model.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尝试运行环境 50 次迭代，并检查累积的奖励值。这将模拟环境 50 次迭代，并揭示智能体如何与基准 OpenAI 模型保持平衡。
- en: '[PRE10]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: The environment is reset initially with the env.reset() method. For each of
    the 50 iterations, env.action_space.sample() method tries to sample most favorable
    states or rewarding states. The sampling method can use tabular discrete RL algorithms
    like Q-learning or continuous deep RL algorithms like deep-Q–network (DQN). There
    is a discount factor that is called at the start of every iteration to discount
    the rewards of the previous timestamp, and the pole agent tries to find new rewards
    accordingly. The env.step(action) chooses from a “memory” or previous actions
    and tries to maximize its rewards by staying upright as long as possible. At the
    end of each action step, the display changes to render a new state of the pole.
    The loop finally breaks if the iterations have been completed. The env.close()
    method closes the connection to the Gym environment.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 环境最初使用 env.reset() 方法重置。对于每次 50 次迭代的每个迭代，env.action_space.sample() 方法尝试采样最有利的状态或奖励状态。采样方法可以使用表格式离散
    RL 算法，如 Q 学习，或连续深度 RL 算法，如深度-Q 网络（DQN）。在每个迭代的开始时，有一个折扣因子用于折现上一个时间戳的奖励，智能体将根据这些新奖励寻找。env.step(action)
    从“记忆”或先前动作中选择，并试图通过尽可能长时间保持直立来最大化其奖励。在每个动作步骤结束时，显示会改变以渲染杆的新状态。如果迭代完成，循环最终会中断。env.close()
    方法关闭与 Gym 环境的连接。
- en: This has helped us to understand how states and rewards affect an agent. We
    will get into the details of an in-depth study of modeling a deep Q-learning algorithm
    to provide a faster and optimal reward-based solution to the CartPole problem.
    The environment has observation states that are discrete and can be solved by
    using tabular RL algorithms like Markov-based Q-learning or SARSA.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 这有助于我们理解状态和奖励如何影响智能体。我们将深入研究建模深度 Q 学习算法的细节，以提供针对 CartPole 问题的更快和更优的基于奖励的解决方案。环境具有离散的观察状态，可以使用表格式
    RL 算法，如基于马尔可夫的 Q 学习或 SARSA 解决。
- en: Deep learning provides more optimization by converting the discrete states into
    continuous distributions and then tries to apply high-dimensional neural networks
    to converge the loss function to a global minima. This is favored by using algorithms
    like DQN, double deep-Q-network (DDQN), dueling DQN, actor critic (AC), proximal
    policy operation (PPO), deep deterministic policy gradients (DDPG), trust region
    policy optimization (TRPO), soft actor critic (SAC). The latter section of the
    notebook contains a deep Q-learning implementation of the CartPole problem, which
    will be explained in later chapters. To highlight certain important aspects of
    this code, there is a deep learning layer made with Keras and also for each iteration
    the collection of state, action, and rewards are stored in a replay memory buffer.
    Based on the previous states of the buffer memory and the rewards for the previous
    steps, the pole agent tries to optimize the Q-learning function over the Keras
    deep learning layers.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习通过将离散状态转换为连续分布来提供更多优化，然后尝试应用高维神经网络将损失函数收敛到全局最小值。这通过使用 DQN、双深度 Q 网络（DDQN）、对抗
    DQN、演员-评论家（AC）、近端策略操作（PPO）、深度确定性策略梯度（DDPG）、信任域策略优化（TRPO）、软演员-评论家（SAC）等算法来实现。笔记本的后半部分包含了一个
    CartPole 问题的深度 Q-learning 实现，这将在后续章节中解释。为了突出代码中的一些重要方面，使用 Keras 创建了一个深度学习层，并且对于每个迭代，状态、动作和奖励的收集都存储在重放内存缓冲区中。基于缓冲区内存的先前状态和先前步骤的奖励，杆代理试图在
    Keras 深度学习层上优化 Q-learning 函数。
- en: Visualization with TensorBoard
  id: totrans-71
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 TensorBoard 的可视化
- en: The visualization of loss at each iteration of the training process signifies
    the extent to which deep Q-learning tries to optimize the position of the pole
    in an upright manner and balances the action array for greater rewards. This visualization
    has been made in TensorBoard, which can be installed by typing the line in Anaconda
    Prompt.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 训练过程中每个迭代的损失可视化表示了深度 Q-learning 尝试以直立的方式优化杆的位置并平衡动作数组以获得更多奖励的程度。这个可视化是在 TensorBoard
    中完成的，可以通过在 Anaconda Prompt 中输入该行来安装。
- en: '[PRE11]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: To start the TensorBoard visualization in Colab or Jupyter Notebook, the following
    lines of code will help. While it is prompted by the Console to use the latest
    version of Tensorflow (tf>=2.2), there is not a hard requirement for this, as
    it is compatible with all the Tensorflow versions. Tensorboard setup using Keras
    can also be implemented using older versions (Tensorboard) such as 1.12 or as
    low as 1.2\. The code segment is the same across versions for starting TensorBoard.
    It is recommended to import these libraries in Colab, as in that case, we have
    the flexibility to upgrade/downgrade different versions of our libraries (Tensorflow,
    Keras, or others) during runtime. This also helps to resolve the compatibility
    issues with different versions when installed locally. We can install Keras 2.1.6
    for the Tensorflow 1.7 version locally as well.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 要在 Colab 或 Jupyter Notebook 中启动 TensorBoard 可视化，以下代码行将有所帮助。虽然控制台提示使用最新版本的 Tensorflow
    (tf>=2.2)，但这并不是强制要求，因为它与所有版本的 Tensorflow 都兼容。使用 Keras 的 Tensorboard 设置也可以使用较旧版本（如
    1.12 或更低版本）实现。启动 TensorBoard 的代码段在各个版本中都是相同的。建议在 Colab 中导入这些库，因为在那种情况下，我们可以在运行时灵活升级/降级我们的库（Tensorflow、Keras
    或其他）的不同版本。这也帮助解决了本地安装时不同版本之间的兼容性问题。我们也可以在本地为 Tensorflow 1.7 版本安装 Keras 2.1.6。
