  type: TYPE_NORMAL
- en: We use the *arbitrary-image-stylization-v1-256* network for the experiment.
    The network is a pre-trained model for fast arbitrary image style transfer. The
    network doesn't require that images be resized, but prefers that style reference
    images are about 256 pixels because it is trained on 256 × 256 pixel images. But
    content images can be any size.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: We found that style reference images sized larger or smaller than 256 × 256
    pixels don’t provide very compelling pastiches. So we highly recommend resizing
    style reference images to the preferred size.
  prefs: []
  type: TYPE_NORMAL
