- en: Prepare Image Batches
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Although the processed content and style reference images are consumable by
    the style transfer network, it expects each image as a separate batch. So each
    batch must be a 4D tensor with shape *[batch_size, image_height, image_width,
    3]*. Since content and style reference images are currently 3D tensors with shapes
    *[image_height, image_width, 3]*, we add a batch dimension of “1” to satisfy the
    requirement. The network also requires images as TensorFlow tensors. So we convert
    them to TensorFlow tensors.
  prefs: []
  type: TYPE_NORMAL
- en: Input and output values of the images are expected to be in the range [0, 1].
    We already satisfied this requirement by scaling both images. Shapes of content
    and style reference images don't have to match. So we are fine in that regard.
  prefs: []
  type: TYPE_NORMAL
