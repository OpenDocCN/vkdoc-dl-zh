- en: As stated earlier, we use the *arbitrary-image-stylization-v1-256* network to
    create a pastiche. Earlier NST models are limited to a pre-selected handful of
    styles because a separate neural network must be trained for each style image.
    Arbitrary style transfer mitigates this limitation by including a style network
    and transformer network.
  prefs: []
  type: TYPE_NORMAL
- en: The *style network* learns how to break down an image into a 100-dimensional
    vector (or style bottleneck vector) that represents its style. The *transformer
    network* learns how to produce the final stylized image from the style bottleneck
    vector and original content image. Arbitrary style networks are state-of-the-art
    (as of this writing) because they are faster than original NST networks and more
    flexible than fast style transfer networks.
