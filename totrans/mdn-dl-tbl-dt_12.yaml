- en: 20 images of grids with digits arranged in 5 columns and 4 rows. They display
    the results from a G A N training.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 20 张网格图像，数字排列成 5 列和 4 行。它们显示了 GAN 训练的结果。
- en: Figure 9-10
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-10
- en: Preliminary GAN training results
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: GAN 初步训练结果
- en: CTGAN
  id: totrans-179
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: CTGAN
- en: 'The official implementation of CTGAN comes in a convenient, easy-to-use package.
    To install from pip, type the following command: `pip install sdv`. For consistency
    and comparison purposes, the Higgs Boson dataset will be reused here for CTGAN
    to produced artificial samples. The following shows a bare-bones example of training
    and then sampling fake data from CTGAN (Listing [9-19](#PC19)).'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: CTGAN 的官方实现提供了一个方便、易于使用的包。要从 pip 安装，请输入以下命令：`pip install sdv`。为了保持一致性和比较目的，这里将重复使用
    Higgs Boson 数据集，以便 CTGAN 生成人工样本。以下是一个简单的示例，展示了从 CTGAN 训练并采样假数据的步骤（列表 [9-19](#PC19)）。
- en: '[PRE18]'
  id: totrans-181
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: With absolutely no hyperparameter tuning, the performance of CTGAN is beyond
    impressive compared with VAE discussed previously. As shown in Figures [9-11](#Fig11)
    and [9-12](#Fig12), the pairplots generated by both the synthetic data and the
    actual dataset for the bivariate relationships between features are almost indistinguishable.
    Although feature correlations are not the only method or the best method perse
    to measure performance of generative models, the results that we can produce after
    merely five lines of code are quite astounding.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 在没有任何超参数调整的情况下，与之前讨论的 VAE 相比，CTGAN 的性能令人印象深刻。如图 [9-11](#Fig11) 和 [9-12](#Fig12)
    所示，合成数据和实际数据集生成的特征之间的二元关系的对图几乎无法区分。尽管特征相关性不是衡量生成模型性能的唯一方法或最佳方法，但我们仅用五行代码就能产生的结果相当令人震惊。
- en: '![](../images/525591_1_En_9_Chapter/525591_1_En_9_Fig12_HTML.png)'
  id: totrans-183
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_9_Chapter/525591_1_En_9_Fig12_HTML.png)'
- en: 25 graphs arranged in 5 columns and 5 rows. They present the comparison of the
    pair plots of actual data, derived by C T G A N.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 25 张图排列成 5 列和 5 行。它们展示了由 CTGAN 导出的实际数据的对图比较。
- en: Figure 9-12
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-12
- en: Pairplot of the actual dataset
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 实际数据集的对图
- en: '![](../images/525591_1_En_9_Chapter/525591_1_En_9_Fig11_HTML.jpg)'
  id: totrans-187
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_9_Chapter/525591_1_En_9_Fig11_HTML.jpg)'
- en: 25 graphs arranged in 5 columns and 5 rows. They present the comparison of pair
    plots of synthetic data, derived by C T G A N.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 25 张图排列成 5 列和 5 行。它们展示了由 CTGAN 导出的合成数据的对图比较。
- en: Figure 9-11
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-11
- en: Side-by-side comparison of synthetic data generated by CTGAN (top) and 800 randomly
    sampled data points from the original source (bottom)
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: CTGAN 生成的合成数据（顶部）与从原始来源随机抽取的 800 个数据点的并排比较（底部）
- en: The “C” in CTGAN (conditional) really comes into play with the flexibility that
    the model has. We can specify a “`primary_key`” to generate unique data for that
    specific feature along with the “`anonymize_field`” option to produce purely artificial
    samples that aren’t included in the training data (Listing [9-20](#PC20)). For
    the `anonymize_field` option, there are predefined potential data categories that
    could be anonymized. Depending on what gets passed in, CTGAN will retrieve data
    from a set of pre-generated data points.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: CTGAN（条件）中的“C”真正发挥了作用，因为模型具有灵活性。我们可以指定一个“`primary_key`”来为特定特征生成唯一数据，同时使用“`anonymize_field`”选项来生成纯粹的人工样本，这些样本不包括在训练数据中（列表
    [9-20](#PC20)）。对于 `anonymize_field` 选项，有一些预定义的潜在数据类别可以被匿名化。根据传入的内容，CTGAN 将从一组预生成的数据点中检索数据。
- en: '[PRE19]'
  id: totrans-192
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: 'Sampling of synthetic data can be conditional as well. There are two general
    approaches to setting constraints during generation:'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 合成数据的采样也可以是条件化的。在生成过程中设置约束有两种一般方法：
- en: By initializing a `Condition` object with a dictionary specifying the column/columns
    that will be constrained. The dictionary’s keys will represent the constrained
    columns, while its value will be the only value that the model will produce. Note
    that for continuous features, only values within the range of training data can
    be produced.
  id: totrans-194
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过使用一个字典初始化 `Condition` 对象，该字典指定了将被约束的列/列。字典的键将代表约束列，而其值将是模型唯一产生的值。请注意，对于连续特征，只能生成训练数据范围内的值。
- en: 'By directly calling `sample_remaining_columns` on the CTGAN model. It’s exactly
    what it sounds like: a Pandas `DataFrame` is passed in containing columns already
    set; then the model will generate the remaining columns.'
  id: totrans-195
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过在 CTGAN 模型上直接调用 `sample_remaining_columns`。这正如其名：传递一个包含已设置列的 Pandas `DataFrame`；然后模型将生成剩余的列。
- en: In Listing [9-21](#PC21) is a demonstration of both approaches.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 [9-21](#PC21) 展示了这两种方法的演示。
- en: '[PRE20]'
  id: totrans-197
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: 'Finally, the low-level parameters of the GAN, such as the number of epochs,
    batch sizes, latent space dimension, learning rates, and decays, can be adjusted.
    More details can be found at CTGAN’s official documentation: [`https://sdv.dev/SDV/user_guides/single_table/ctgan.xhtml`](https://sdv.dev/SDV/user_guides/single_table/ctgan.xhtml).'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，GAN 的低级参数，如周期数、批量大小、潜在空间维度、学习率和衰减，可以进行调整。更多详细信息可以在 CTGAN 的官方文档中找到：[`https://sdv.dev/SDV/user_guides/single_table/ctgan.xhtml`](https://sdv.dev/SDV/user_guides/single_table/ctgan.xhtml)。
- en: Key Points
  id: totrans-199
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键点
- en: In this chapter, we discussed various data generation algorithms, from a simpler
    and quicker approach through VAEs to more complex, sophisticated GANs. The application
    of tabular data generation methods is wider than what most people might assume.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们讨论了各种数据生成算法，从更简单、更快捷的方法通过 VAEs 到更复杂、更精细的 GANs。表格数据生成方法的应用范围比大多数人可能想象的要广。
- en: Variational Autoencoders predict probability distributions rather than explicit
    scalars for each dimension of the latent space, which allows them to learn the
    entire latent space in a continuous, rather than discrete, fashion. Correspondingly,
    vectors in the latent space can be interpolated between and decoded into realistic
    outputs. These can be used for data generation.
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 变分自编码器（Variational Autoencoders）预测的是潜在空间的每个维度的概率分布，而不是显式标量，这使得它们能够以连续而非离散的方式学习整个潜在空间。相应地，潜在空间中的向量可以在之间进行插值并解码成逼真的输出。这些可以用于数据生成。
- en: Generative Adversarial Network systems consist of a discriminator model and
    a generator model; the generator model accepts a random vector and synthesizes
    artificial samples, and the discriminator determines whether the inputted sample
    is real (drawn from the dataset) or not (generated by the generator). The generator
    is trained to minimize the discriminator’s performance, whereas the discriminator
    is trained to maximize it.
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成对抗网络（GAN）系统由判别器模型和生成器模型组成；生成器模型接受一个随机向量并合成人工样本，判别器则确定输入的样本是真实的（来自数据集）还是非真实的（由生成器生成）。生成器被训练以最小化判别器的性能，而判别器被训练以最大化它。
- en: Conditional GANs allow for samples to be conditioned on a particular class or
    property by passing sample attribute information both to the generator and the
    discriminator.
  id: totrans-203
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 条件生成对抗网络（Conditional GANs）允许通过将样本属性信息传递给生成器和判别器，使样本能够根据特定的类别或属性进行条件化。
- en: The CTGAN (Conditional Tabular GAN) model uses conditional generation to synthesize
    new robust and representative tabular data, even in complex heterogeneous and
    unbalanced environments.
  id: totrans-204
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: CTGAN（条件表格生成对抗网络）模型使用条件生成来合成新的稳健且具有代表性的表格数据，即使在复杂异构和不平衡的环境中也是如此。
- en: In the next chapter, we will explore meta-optimization. Meta-optimization involves
    tuning hyperparameters across the training pipeline, as we will realize that this
    is especially important for tabular data modeling.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将探讨元优化。元优化涉及在整个训练流程中调整超参数，正如我们将意识到这一点对于表格数据建模尤为重要。
