- en: Variational Autoencoders offer sophisticated data generation capabilities, which
    can help build more successful machine learning models (neural networks or classical
    models) on otherwise weak or lacking data.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 变分自动编码器提供了复杂的数据生成能力，这有助于在数据薄弱或缺乏的情况下构建更成功的机器学习模型（神经网络或经典模型）。
- en: Generative Adversarial Networks
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 生成对抗网络
- en: The painting *Edmond de Belamy* looks like a standard seventeenth- and eighteenth-century
    painting. A hunched man, suit painted in broad strokes of black ink blending into
    a dark background, looks blankly at the viewer with shaded eyes. But in the bottom
    right, in lieu of the artistic signature, is in elegant script
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 画作 *Edmond de Belamy* 看起来像一幅标准的十七世纪和十八世纪的画作。一个驼背的男人，穿着用黑色墨水粗笔触绘制的西装，融入暗色调的背景中，用阴影的眼睛茫然地注视着观众。但在右下角，代替艺术签名的是优雅的书法
- en: '![$$ \underset{G}{\min}\underset{D}{\max }{\textrm{E}}_x\left[\log \Big(D(x)\right]+{\textrm{E}}_y\left[\log
    \right(1-D\left(G(y)\right)\Big] $$](../images/525591_1_En_9_Chapter/525591_1_En_9_Chapter_TeX_Equg.png)'
  id: totrans-93
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \underset{G}{\min}\underset{D}{\max }{\textrm{E}}_x\left[\log \Big(D(x)\right]+{\textrm{E}}_y\left[\log
    \right(1-D\left(G(y)\right)\Big] $$](../images/525591_1_En_9_Chapter/525591_1_En_9_Chapter_TeX_Equg.png)'
- en: This is a simplified expression representing the objective of the Generative
    Adversarial Network (GAN) model, which constitutes the other major deep generative
    model family besides Variational Autoencoders. Notably, GANs have been the underlying
    technology behind impressively realistic art and image generation, but they have
    also been applied in a less common but no less promising capacity to generate
    other forms of data, including tabular data.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个简化的表达式，表示生成对抗网络（GAN）模型的目标，它构成了除了变分自编码器之外的另一个主要深度生成模型家族。值得注意的是，GANs 已经成为令人印象深刻的艺术和图像生成的底层技术，但它们也已被应用于生成其他形式的数据，包括表格数据。
- en: Theory
  id: totrans-95
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 理论
- en: 'Let us begin by formalizing the equation articulated in *Edmond de Belamy*:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从形式化 *Edmond de Belamy* 中阐述的方程开始：
- en: Let *z* represent a random noise vector.
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 让 *z* 代表一个随机噪声向量。
- en: Let *x* represent a data sample drawn from the data.
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 让 *x* 代表从数据中抽取的数据样本。
- en: Let *G* be a neural network that accepts *y* and transforms it into an output
    that mimics a sample drawn from the data.
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设 *G* 为一个接受 *y* 并将其转换为模拟从数据中抽取的样本的输出的神经网络。
- en: Let *D* be a neural network that outputs the probability that the given sample
    is drawn from the data (as opposed to being generated by G).
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设 *D* 为一个输出给定样本是否来自数据（与由 G 生成的情况相反）的概率的神经网络。
- en: Let E[*x*]*f*(*x*) represent the average value of a function *f* that depends
    on some variable *x*.
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 让 E[*x*]*f*(*x*) 代表一个依赖于某些变量 *x* 的函数 *f* 的平均值。
- en: 'The expression represents the discriminator’s average log-loss^([3](#Fn3))
    and consists of two terms: E[*x*][log(*D*(*x*)] and E[*z*][ log (1 − *D*(*G*(*z*))].
    The discriminator can be thought of as having two jobs: classifying samples drawn
    from the data (i.e., *x*) as being drawn from the data and classifying synthetic
    samples created by the generator from a random noise vector (i.e., *G*(*z*)) as
    not being drawn from the data. These two objectives are respectively represented
    by the expression.'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 该表达式代表判别器的平均对数损失^([3](#Fn3))，由两个部分组成：E[*x*][log(*D*(*x*))] 和 E[*z*][log(1 − *D*(*G*(*z*))].
    判别器可以看作有两个任务：将来自数据（即，*x*）的样本分类为来自数据，并将生成器从随机噪声向量（即，*G*(*z*))创建的合成样本分类为不是来自数据。这两个目标分别由该表达式表示。
- en: The first term represents the average logarithm of the discriminator’s prediction
    on samples drawn from the data. If the discriminator is working perfectly, then
    this value will be maximized because *D*(*x*) is predicting 1, log(*D*(*x*)) = 0,
    and E[*x*][log(*D*(*x*))] = 0\. The other term represents the average logarithm
    of the discriminator’s inverted prediction on generated samples. If the discriminator
    is working perfectly, this value will also be maximized because *D*(*x*) is predicting
    0, 1 − *D*(*G*(*z*)) = 1, log(1 − *D*(*G*(*z*)) = 0, and E[*z*][log(1 − *D*(*G*(*z*))] = 0\.
    Thus, the sum of these two terms is maximized to the value zero when the discriminator
    performs perfectly.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个项代表判别器对从数据中抽取的样本预测的平均对数。如果判别器工作得完美，那么这个值将最大化，因为 *D*(*x*) 预测 1，log(*D*(*x*))
    = 0，并且 E[*x*][log(*D*(*x*))] = 0。另一个项代表判别器对生成样本的逆预测的平均对数。如果判别器工作得完美，这个值也将最大化，因为
    *D*(*x*) 预测 0，1 − *D*(*G*(*z*)) = 1，log(1 − *D*(*G*(*z*)) = 0，并且 E[*z*][log(1 − *D*(*G*(*z*))]
    = 0。因此，当判别器表现完美时，这两个项的总和最大化到零值。
- en: 'The objective of the discriminator is to maximize this expression, whereas
    the objective of the generator is to minimize it. Putting the parts together,
    we obtain the following system in which the generator and discriminator play against
    each other:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 判别器的目标是最大化这个表达式，而生成器的目标是最小化它。将这些部分组合起来，我们得到以下系统，其中生成器和判别器相互对抗：
- en: '![$$ \underset{G}{\min}\underset{D}{\max }{\textrm{E}}_x\left[\log \Big(D(x)\right]+{\textrm{E}}_z\left[\log
    \right(1-D\left(G(z)\right)\Big] $$](../images/525591_1_En_9_Chapter/525591_1_En_9_Chapter_TeX_Equh.png)'
  id: totrans-105
  prefs: []
  type: TYPE_IMG
  zh: '![最小化最大化期望值](../images/525591_1_En_9_Chapter/525591_1_En_9_Chapter_TeX_Equh.png)'
- en: Figure [9-8](#Fig8) presents a visual representation of the previous equation.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [9-8](#Fig8) 展示了前述方程的直观表示。
- en: '![](../images/525591_1_En_9_Chapter/525591_1_En_9_Fig8_HTML.png)'
  id: totrans-107
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../images/525591_1_En_9_Chapter/525591_1_En_9_Fig8_HTML.png)'
- en: A flow diagram of a Generative Adversarial Network system. Dataset and generator,
    parallelly pass-through the discriminator, to reach D, in the parentheses x, and
    D open parenthesis, G, open parenthesis, z, 2 close parentheses.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 生成对抗网络系统的流程图。数据集和生成器并行通过判别器，达到 D，括号内为 x，D 开括号，G 开括号，z，2 关括号。
- en: Figure 9-8
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-8
- en: Schematic of the Generative Adversarial Network system
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 生成对抗网络系统的示意图
- en: 'The more complete articulation presented by Ian Goodfellow et al. in the original
    paper^([4](#Fn4)) is as follows, with ***z*** a random vector drawn from the distribution
    *p*[***z***](***z***) and ***x*** a data sample drawn from the distribution *p*[data](***x***):'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: Ian Goodfellow 等人在原始论文中提供的更完整的阐述如下，其中 ***z*** 是从分布 *p*[***z***](***z***) 中抽取的随机向量，而
    ***x*** 是从分布 *p*[data](***x***) 中抽取的数据样本：
- en: '![$$ \underset{G}{\min}\underset{D}{\max }{\textrm{E}}_{\boldsymbol{x}\sim
    {p}_{\textrm{data}}\left(\boldsymbol{x}\right)}\left[\log \Big(D\left(\boldsymbol{x}\right)\right]+{\textrm{E}}_{\boldsymbol{z}\sim
    {p}_{\boldsymbol{z}}\left(\boldsymbol{z}\right)}\left[\log \right(1-D\left(G\left(\boldsymbol{z}\right)\right)\Big]
    $$](../images/525591_1_En_9_Chapter/525591_1_En_9_Chapter_TeX_Equi.png)'
  id: totrans-112
  prefs: []
  type: TYPE_IMG
  zh: '![最小化最大化期望值](../images/525591_1_En_9_Chapter/525591_1_En_9_Chapter_TeX_Equi.png)'
- en: 'To update the discriminator, we use the gradient of its loss with respect to
    the discriminator parameters *θ*[*d*]:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更新判别器，我们使用其损失相对于判别器参数 *θ*[*d*] 的梯度：
- en: '![$$ {\nabla}_{\theta_d}E\left[\log D\left(\boldsymbol{x}\right)+\log \left(1-D\left(G\left(\boldsymbol{z}\right)\right)\right)\
    \right] $$](../images/525591_1_En_9_Chapter/525591_1_En_9_Chapter_TeX_Equj.png)'
  id: totrans-114
  prefs: []
  type: TYPE_IMG
  zh: '![梯度](../images/525591_1_En_9_Chapter/525591_1_En_9_Chapter_TeX_Equj.png)'
- en: The gradients are used for *ascending* because the discriminator aims to maximize
    rather than to minimize its performance. Recall from earlier that this expression
    is maximized when the discriminator performs perfectly. The only difference with
    gradient descent is to move in the direction of greatest increase rather than
    the direction opposite to it (i.e., of greatest decrease).
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度用于 *上升*，因为判别器的目标是最大化其性能，而不是最小化。回想一下，当判别器表现完美时，这个表达式被最大化。与梯度下降的唯一区别是移动到最大增加的方向，而不是相反的方向（即最大减少的方向）。
- en: 'After updating the discriminator, we update the generator in descending fashion
    using the gradient of the second term with respect to the generator parameters
    *θ*[*g*]:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 在更新判别器后，我们使用关于生成器参数 *θ*[*g*] 的梯度以降序更新生成器：
- en: '![$$ {\nabla}_{\theta_g}E\left[\log \left(1-D\left(G\left(\boldsymbol{z}\right)\right)\right)\right]
    $$](../images/525591_1_En_9_Chapter/525591_1_En_9_Chapter_TeX_Equk.png)'
  id: totrans-117
  prefs: []
  type: TYPE_IMG
  zh: '![梯度](../images/525591_1_En_9_Chapter/525591_1_En_9_Chapter_TeX_Equk.png)'
- en: We do not need to bother with the first term because the generator is not involved
    in it; it has no contribution to the gradient calculation. Note that the generator
    is explicitly updated to “fool” the discriminator by minimizing the discriminator’s
    performance classifying generated items as generated.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不需要担心第一个项，因为生成器不参与其中；它对梯度计算没有贡献。请注意，生成器被明确更新，以通过最小化判别器将生成项目分类为生成的性能来“欺骗”判别器。
- en: By updating the discriminator followed by the generator repeatedly, the two
    models play an adversarial game.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 通过反复更新判别器然后更新生成器，两个模型进行对抗游戏。
- en: 'The formal training algorithm articulated in the original paper is as follows:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 原始论文中阐述的正式训练算法如下：
- en: For *k* steps, do
  id: totrans-121
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于 *k* 步，执行以下操作
- en: Sample a minibatch of *m* noise samples {***z***^((1)), ***z***^((2)), …, ***z***^((*m*))}
    from the noise prior *p*[*g*](***z***).
  id: totrans-122
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从噪声先验 *p*[*g*](***z***) 中采样一个 *m* 个噪声样本集 {***z***^((1)), ***z***^((2)), …, ***z***^((*m*))}。
- en: Sample a minibatch of *m* training samples {***x***^((1)), ***x***^((2)), …,
    ***x***^((*m*))} from the true data distribution *p*[data](***x***).
  id: totrans-123
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从真实数据分布 *p*[data](***x***) 中采样一个 *m* 个训练样本集 {***x***^((1)), ***x***^((2)), …,
    ***x***^((*m*))}。
- en: 'Update the discriminator by stochastic gradient ascent (or another optimization
    method using the same loss):'
  id: totrans-124
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过随机梯度上升（或使用相同损失的其他优化方法）更新判别器：
- en: '![$$ {\nabla}_{\theta_d}\frac{1}{m}\sum \limits_{i=1}^m\left[\log D\left({\boldsymbol{x}}^{(i)}\right)+\log
    \left(1-D\left(G\left({\boldsymbol{z}}^{(i)}\right)\right)\right)\right] $$](../images/525591_1_En_9_Chapter/525591_1_En_9_Chapter_TeX_Equl.png)'
  id: totrans-125
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_IMG
  zh: '![梯度下降的公式](../images/525591_1_En_9_Chapter/525591_1_En_9_Chapter_TeX_Equl.png)'
- en: Sample a new minibatch of *m* noise samples {***z***^((1)), ***z***^((2)), …,
    ***z***^((*m*))} from the noise prior *p*[*g*](***z***).
  id: totrans-126
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从噪声先验 *p*[*g*](***z***) 中采样一个新的 *m* 个噪声样本集 {***z***^((1)), ***z***^((2)), …,
    ***z***^((*m*))}。
- en: 'Update the generator by stochastic gradient descent (or another optimization
    method using the same loss):'
  id: totrans-127
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过随机梯度下降（或使用相同损失的其他优化方法）更新生成器：
- en: '![$$ {\nabla}_{\theta_g}\frac{1}{m}\sum \limits_{i=1}^m\left[\log \left(1-D\left(G\left({\boldsymbol{z}}^{(i)}\right)\right)\right)\right]
    $$](../images/525591_1_En_9_Chapter/525591_1_En_9_Chapter_TeX_Equm.png)'
  id: totrans-128
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![梯度上升的公式](../images/525591_1_En_9_Chapter/525591_1_En_9_Chapter_TeX_Equm.png)'
- en: Repeat until the specified number of training iterations is completed.
  id: totrans-129
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重复执行，直到完成指定的训练迭代次数。
- en: 'Note the following features of the optimization procedure:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 注意以下优化过程的特征：
- en: By changing *k*, you control the ratio of the number of “moves” the discriminator
    has relative to the generator. The authors of the original GAN paper use *k* = 1
    to maximize computational efficiency.
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过改变 *k*，你可以控制判别器相对于生成器的“移动”次数的比例。原始 GAN 论文的作者使用 *k* = 1 来最大化计算效率。
- en: From the perspective of the computational graph, we are technically optimizing
    the same collection of operations – just different parts of it at any one time.
    Observe how the respective expressions for gradient ascent and descent in the
    discriminator and generator update formulas involve the same nested *D*(*G*(…))
    expression, but only one part of it is updated, whereas the other is held static.
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从计算图的角度来看，我们在技术上优化的是同一组操作——只是在任何给定时间只优化其中的一部分。观察判别器和生成器更新公式中梯度上升和下降的相应表达式，它们都涉及相同的嵌套
    *D*(*G*(…)) 表达式，但只有其中一部分被更新，而另一部分保持静态。
- en: When we update the generator, we select a new random minibatch of noise samples
    rather than using the same set of samples the discriminator was updated on.
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当我们更新生成器时，我们选择一个新的随机噪声样本小批量，而不是使用判别器更新时使用的相同样本集。
- en: 'GANs are, however, notoriously difficult to train. The system is often unstable
    and fails to converge. Tim Salimans and other researchers from OpenAI suggest
    several actionable training modifications for improving convergence and performance
    of GAN systems in the paper “Improved Techniques for Training GANs,”^([5](#Fn5))
    some of which are summarized in the following:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，GANs 的训练却非常困难。系统通常不稳定，并且无法收敛。Tim Salimans 和 OpenAI 的其他研究人员在论文“Improved Techniques
    for Training GANs”中提出了一些可操作的训练修改，以改善 GAN 系统的收敛性和性能，其中一些总结如下：
- en: '*Feature matching*: It can be difficult for the generator to produce samples
    given the explicit objective to maximize the discriminator’s prediction on generated
    samples. Instead, the generator can be trained to match the activations of an
    intermediate layer of the discriminator. If the generator produces an output that,
    on aggregate, yields discriminator activations for some feature, which are very
    different from the activations derived for real items, then the generator will
    likely not succeed in fooling the discriminator. Feature matching is a technique
    to directly optimize the generator using the “internal thinking processes” of
    the discriminator.'
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*特征匹配*：在生成器有明确的目标，即最大化判别器对生成样本的预测时，生成样本可能会变得困难。相反，生成器可以被训练去匹配判别器中间层激活。如果生成器产生的输出在总体上对某些特征的判别器激活与对真实项目的激活非常不同，那么生成器可能无法成功欺骗判别器。特征匹配是一种直接使用判别器的“内部思维过程”来优化生成器的技术。'
- en: '*Historical averaging*: Each player is penalized by the magnitude of its weight
    updates relative to a historical time period of length *t*: ![$$ \left\Vert \theta
    \left[0\right]-\frac{1}{t}\sum \limits_{i=1}^t\theta \left[i\right]\right\Vert
    $$](../images/525591_1_En_9_Chapter/525591_1_En_9_Chapter_TeX_IEq4.png), where
    *θ* is an array of the model parameters and *θ*[0] represents the most recent,
    current set of parameters. This provides a constant force, which pushes players
    toward convergence: any large updates will be penalized by this quantity, which
    therefore can constrain erratic nonconverging behavior.'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*历史平均*：每个玩家根据其相对于长度为*t*的历史时间段的权重更新幅度受到惩罚：![$$ \left\Vert \theta \left[0\right]-\frac{1}{t}\sum
    \limits_{i=1}^t\theta \left[i\right]\right\Vert $$](../images/525591_1_En_9_Chapter/525591_1_En_9_Chapter_TeX_IEq4.png)，其中*θ*是模型参数的数组，*θ*[0]代表最新的、当前的参数集。这提供了一个恒定的力，推动玩家向收敛：任何大的更新都将受到这个量的惩罚，因此可以约束非收敛的异常行为。'
- en: '*One-sided label smoothing*: Label smoothing, in which discrete binary labels
    are replaced with probabilistic approximations (e.g., replacing 0 with 0.1, 1
    with 0.9). We can replace positive discriminator labels (i.e., real data samples
    that have a label of 1) with a smooth approximation (e.g., 0.9 or even 0.8) such
    that the generator can more easily achieve equivalence with “real” samples in
    the “eye” of the discriminator even if it cannot produce a high discriminator
    output. For instance, let *x* be a real data sample and *D*(*x*) = 1\. Let *z*
    be a random vector; say *D*(*G*(*z*)) = 0.9\. In this case the discriminator was
    fooled but not completely. If we apply one-sided label smoothing, however, the
    discriminator will learn *D*(*x*) = 0.9\. Therefore, *G*(*z*) and *x* are comparable
    in that the discriminator yields the same determination for both. This can make
    generation an easier task.'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*单侧标签平滑*：标签平滑中，离散的二进制标签被替换为概率近似（例如，将0替换为0.1，将1替换为0.9）。我们可以将正判别器标签（即标签为1的真实数据样本）替换为一个平滑的近似（例如，0.9甚至0.8），这样生成器就可以更容易地在判别器的“眼中”与“真实”样本达到等效，即使它不能产生高的判别器输出。例如，设*x*为一个真实数据样本，D(x)
    = 1。设*z*为一个随机向量；假设D(G(z)) = 0.9。在这种情况下，判别器被欺骗了，但并未完全被欺骗。然而，如果我们应用单侧标签平滑，判别器将学习到D(x)
    = 0.9。因此，G(z)和x在判别器对两者都给出相同判断这一点上是可比的。这可以使生成任务更容易。'
- en: Many subsequent methods have been proposed to expand GAN capabilities. The conditional
    GAN, introduced by Medhi Mirza and Simon Osindero shortly after the original GAN
    paper in the 2014 paper entitled “Conditional Generative Adversarial Nets,”^([6](#Fn6))
    allows for the generation of outputs conditioned on some property. For instance,
    rather than just generating arbitrary digits, a conditional generative model can
    generate a particular type of digit (0, 1, 2, etc.).
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 许多后续方法被提出以扩展GAN的能力。条件GAN（Conditional Generative Adversarial Nets）由Medhi Mirza和Simon
    Osindero在2014年发表的一篇题为“Conditional Generative Adversarial Nets”的论文中提出，紧随原始GAN论文之后，它允许根据某些属性生成输出。例如，与其只是生成任意的数字，一个条件生成模型可以生成特定类型的数字（0、1、2等）。
- en: 'This is accomplished with a simple modification to the original GAN system
    optimization objective: the discriminator accepts both the original input (either
    a sample from the dataset or synthesized from the generator) and conditional information
    ***y***. The output of the generator is generated from both the random vector
    ***z*** and the conditional information ***y***:'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 这通过简单修改原始GAN系统优化目标来实现：判别器接受原始输入（要么是数据集的样本，要么是由生成器合成的）和条件信息***y***。生成器的输出由随机向量***z***和条件信息***y***共同生成：
- en: '![$$ \underset{G}{\min}\underset{D}{\max }{\textrm{E}}_{\boldsymbol{x}\sim
    {p}_{\textrm{data}}\left(\boldsymbol{x}\right)}\left[\log \Big(D\left(\boldsymbol{x}|\boldsymbol{y}\right)\right]+{\textrm{E}}_{\boldsymbol{z}\sim
    {p}_{\boldsymbol{z}}\left(\boldsymbol{z}\right)}\left[\log \Big(1-D\left(G\left(\boldsymbol{z}|\boldsymbol{y}\right)\right)\right]
    $$](../images/525591_1_En_9_Chapter/525591_1_En_9_Chapter_TeX_Equn.png)'
  id: totrans-140
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \underset{G}{\min}\underset{D}{\max }{\textrm{E}}_{\boldsymbol{x}\sim
    {p}_{\textrm{data}}\left(\boldsymbol{x}\right)}\left[\log \Big(D\left(\boldsymbol{x}|\boldsymbol{y}\right)\Big)\right]+{\textrm{E}}_{\boldsymbol{z}\sim
    {p}_{\boldsymbol{z}}\left(\boldsymbol{z}\right)}\left[\log \Big(1-D\left(G\left(\boldsymbol{z}|\boldsymbol{y}\right)\right)\Big]
    $$](../images/525591_1_En_9_Chapter/525591_1_En_9_Chapter_TeX_Equn.png)'
- en: 'To be concrete, consider applying a conditional GAN to generate images of digits.
    We begin by selecting *n* images of digits ***x*** and their corresponding class
    ***y*** (e.g., the first image has class 2, the second has class 9, …, the *n*th
    has class 0). Next, we randomly sample noise vectors ***z*** and pass both ***z***
    and ***y*** into the generator. Now, we have generated samples: *G*(***z***| ***y***).
    The discriminator predicts on both the original and generated samples with access
    to the corresponding classes. Even if the generator generates realistic images,
    the discriminator can theoretically detect if a sample is generated if the given
    input, say, is an image of the digit 8 but the associated class (i.e., of ***y***)
    is 2\. Thus, the generator must generate realistic images conditional on the given
    attributes (Figure [9-9](#Fig9)).'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 为了具体说明，考虑将条件生成对抗网络应用于生成数字图像。我们首先选择*n*个数字图像***x***及其对应的类别***y***（例如，第一幅图像的类别为2，第二幅为9，……，第*n*幅为0）。接下来，我们随机采样噪声向量***z***，并将***z***和***y***同时输入到生成器中。现在，我们已经生成了样本：*G*(***z***|
    ***y***)。判别器在访问相应类别的情况下对原始样本和生成样本进行预测。即使生成器生成了逼真的图像，判别器理论上也能检测到样本是否由给定输入生成，例如，如果给定输入是数字8的图像，但关联的类别（即***y***）是2。因此，生成器必须基于给定的属性生成逼真的图像（图[9-9](#Fig9)）。
- en: '![](../images/525591_1_En_9_Chapter/525591_1_En_9_Fig9_HTML.png)'
  id: totrans-142
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_9_Chapter/525591_1_En_9_Fig9_HTML.png)'
- en: A flow diagram of a conditional Generative Adversarial Network system. From
    the dataset x reaches the discriminator, y reaches the generator, and the discriminator.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 条件生成对抗网络系统的流程图。从数据集x到达判别器，y到达生成器，以及判别器。
- en: Figure 9-9
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-9
- en: Schematic of the conditional Generative Adversarial Network system
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 条件生成对抗网络系统的示意图
- en: While GANs have found incredible success in image generation, particularly in
    text-conditioned generation, tabular data generation remains a difficult problem.
    The cross-column heterogeneity of tabular data – that is, the variation across
    columns in properties like value range, sparsity, distribution, discreteness/continuity,
    value imbalance, and so on – makes it difficult to easily transfer scales and
    rules across the span of the dataset.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然GAN在图像生成中取得了惊人的成功，尤其是在文本条件生成方面，但表格数据生成仍然是一个难题。表格数据的跨列异质性——即属性（如值范围、稀疏性、分布、离散/连续性、值不平衡等）在列之间的变化——使得难以轻松地在数据集范围内转移尺度和规则。
- en: Lei Xu, Maria Skoularidou, Alfredo Cuesta-Infante, and Kalyan Veeramachaneni
    proposed the very successful Conditional Tabular GAN (CTGAN) to address the deep
    adversarial generation of tabular data in the 2019 paper “Modeling Tabular Data
    Using Conditional GAN.”^([7](#Fn7))
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 雷旭、玛丽亚·斯库拉里杜、阿尔弗雷多·库埃斯塔-伊纳夫特和卡利安·维拉马查尼尼在2019年的论文“Using Conditional GAN to Model
    Tabular Data”中提出了非常成功的条件表格生成对抗网络（CTGAN），用以解决表格数据的深度对抗生成问题。[7](#Fn7)
- en: The Conditional Tabular GAN model is quite complex and has many moving parts.
    Here, we summarize important elements of the architecture and training process.
    View the original paper for details.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 条件表格生成对抗网络模型相当复杂，有许多组成部分。在此，我们总结架构和训练过程中的重要元素。查看原始论文以获取详细信息。
- en: Each row is represented by concatenating continuous and discrete columns. Discrete
    columns are one-hot encoded, and continuous features with complex multimodal distributions
    (in this context, multimodal refers to distributions with multiple “humps,” or
    modes, as opposed to a singular mass – like in a normal distribution) are normalized
    using a randomly sampled mode. Let the row be denoted as ![$$ \hat{\boldsymbol{r}}
    $$](../images/525591_1_En_9_Chapter/525591_1_En_9_Chapter_TeX_IEq5.png).
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 每一行由连续列和离散列的连接表示。离散列是独热编码的，具有复杂的多模态分布（在此上下文中，多模态指的是具有多个“驼峰”或模式的分布，而不是单个质量——如正态分布）的连续特征使用随机采样的模式进行归一化。设行表示为
    ![$$ \hat{\boldsymbol{r}} $$](../images/525591_1_En_9_Chapter/525591_1_En_9_Chapter_TeX_IEq5.png)。
- en: In order to ensure that the GAN system has roughly equal exposure to different
    values in discrete columns – even highly imbalanced or sparse ones – the authors
    propose a conditional vector, which, in rough terms, represents which types of
    values in which discrete columns must be reproduced by the generator. Let ***m***
    represent this conditional vector. Then, we have the generator output as *G*(***z***|
    ***m***), given a randomly sampled vector ***z*** and the conditional vector ***m***.
    This is a similar training paradigm to masked language modeling pretraining discussed
    in Chapter [6](525591_1_En_6_Chapter.xhtml), on attention and transformers. In
    masked language modeling, the model is presented with part of the words in a sentence
    and must fill in the masked tokens. The generator in the CTGAN is presented with
    “part of the sentence” (i.e., the selected values in the selected columns) and
    must “fill in” the rest of the row (i.e., which continuous column and non-selected
    discrete column values make sense given the provided conditional vector). Given
    an equal conditional vector generation procedure, the generator and discriminator
    are exposed to a much wider range of the feature space and acclimate to more complex
    data forms.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保 GAN 系统能够大致平等地接触到离散列中的不同值——即使是高度不平衡或稀疏的值——作者提出了一种条件向量，在粗略的意义上，它表示生成器必须重现哪些离散列中的哪些类型的值。设
    ***m*** 表示这个条件向量。然后，我们有生成器输出为 *G*(***z***| ***m***)，给定随机采样的向量 ***z*** 和条件向量 ***m***。这与第
    [6](525591_1_En_6_Chapter.xhtml) 章中讨论的掩码语言模型预训练的训练范式相似。在掩码语言模型中，模型被呈现句子的一部分单词，并必须填补被掩码的标记。CTGAN
    中的生成器被呈现“句子的一部分”（即所选列中的所选值）并必须“填补”其余的行（即，根据提供的条件向量，哪些连续列和非选择离散列的值是有意义的）。给定平等的条件向量生成过程，生成器和判别器暴露于更广泛的特征空间，并适应更复杂的数据形式。
- en: 'The generator model consists of two hidden layers using ReLU activations, batch
    normalization, and residual connections. There are two relevant outputs – the
    continuous features *c* and the discrete features *d*. It can be approximately
    formally articulated as follows, where ⊕ represents vector concatenation and Gumbel
    represents the softmax Gumbel function^([8](#Fn8)):'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 生成器模型由两个使用 ReLU 激活、批量归一化和残差连接的隐藏层组成。有两个相关输出——连续特征 *c* 和离散特征 *d*。它可以近似地形式化表达如下，其中
    ⊕ 表示向量连接，Gumbel 表示 softmax Gumbel 函数^([8](#Fn8))：
- en: '![$$ {h}_0=\boldsymbol{z}\oplus \boldsymbol{m} $$](../images/525591_1_En_9_Chapter/525591_1_En_9_Chapter_TeX_Equp.png)'
  id: totrans-152
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {h}_0=\boldsymbol{z}\oplus \boldsymbol{m} $$](../images/525591_1_En_9_Chapter/525591_1_En_9_Chapter_TeX_Equp.png)'
- en: '![$$ {h}_1={h}_0\oplus \textrm{ReLU}\left( BN\left( FC\left({h}_0\right)\right)\right)
    $$](../images/525591_1_En_9_Chapter/525591_1_En_9_Chapter_TeX_Equq.png)'
  id: totrans-153
  prefs: []
  type: TYPE_IMG
  zh: '![h1=h0⊕ReLU(BN(FC(h0)))](../images/525591_1_En_9_Chapter/525591_1_En_9_Chapter_TeX_Equq.png)'
- en: '![$$ {h}_2={h}_0\oplus \textrm{ReLU}\left( BN\left( FC\left({h}_0\right)\right)\right)
    $$](../images/525591_1_En_9_Chapter/525591_1_En_9_Chapter_TeX_Equr.png)'
  id: totrans-154
  prefs: []
  type: TYPE_IMG
  zh: '![h2=h0⊕ReLU(BN(FC(h0)))](../images/525591_1_En_9_Chapter/525591_1_En_9_Chapter_TeX_Equr.png)'
- en: '![$$ c=\tanh \left( FC\left({h}_2\right)\right) $$](../images/525591_1_En_9_Chapter/525591_1_En_9_Chapter_TeX_Equs.png)'
  id: totrans-155
  prefs: []
  type: TYPE_IMG
  zh: '![$$ c=\tanh(FC({h}_2)) $$](../images/525591_1_En_9_Chapter/525591_1_En_9_Chapter_TeX_Equs.png)'
- en: '![$$ d=\textrm{Gumbel}\left( FC\left({h}_2\right)\right) $$](../images/525591_1_En_9_Chapter/525591_1_En_9_Chapter_TeX_Equt.png)'
  id: totrans-156
  prefs: []
  type: TYPE_IMG
  zh: '![$$ d=\textrm{Gumbel}(FC({h}_2)) $$](../images/525591_1_En_9_Chapter/525591_1_En_9_Chapter_TeX_Equt.png)'
- en: '![$$ G:\boldsymbol{z},\boldsymbol{m}\mapsto c,d $$](../images/525591_1_En_9_Chapter/525591_1_En_9_Chapter_TeX_Equu.png)'
  id: totrans-157
  prefs: []
  type: TYPE_IMG
  zh: '![$$ G:\boldsymbol{z},\boldsymbol{m}\mapsto c,d $$](../images/525591_1_En_9_Chapter/525591_1_En_9_Chapter_TeX_Equu.png)'
- en: The CTGAN model performs well on tabular data generation across a wide range
    of tabular datasets, including heterogenous tabular data, which has challenged
    previous tabular generation attempts. It has shown promise on addressing imbalanced
    datasets and providing data augmentation.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: CTGAN模型在广泛的表格数据生成任务中表现良好，包括异构表格数据，这挑战了之前的表格生成尝试。它在解决不平衡数据集和提供数据增强方面显示出希望。
- en: In the next subsections, we will demonstrate the implementation of a sample
    GAN model from scratch and using the CTGAN.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的小节中，我们将演示从头开始实现一个示例GAN模型以及使用CTGAN的实现。
- en: Simple GAN in TensorFlow
  id: totrans-160
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: TensorFlow中的简单GAN
- en: To demonstrate the flow of modeling and training a simple GAN, the MNIST dataset
    will be adopted as our target generated images. The dataset is available through
    `tensorflow``.keras.datasets` as shown in Listing [9-13](#PC13). To ensure our
    generation produces a variety of images, the number “1” is removed from the dataset
    to avoid mode collapse as it’s probable that the generator can fool the discriminator
    by simply producing slanted images of a line.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 为了演示简单GAN的建模和训练流程，我们将采用MNIST数据集作为我们的目标生成图像。该数据集可通过`tensorflow.keras.datasets`获得，如清单[9-13](#PC13)所示。为了确保我们的生成能够产生各种图像，我们将数字“1”从数据集中移除，以避免模式坍塌，因为生成器可能通过简单地生成线的斜向图像来欺骗判别器。
- en: '[PRE12]'
  id: totrans-162
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Next, we’re going to build the discriminator. Recall from earlier that regardless
    of the generation task, the discriminator will always be a classifier that distinguishes
    between real and generated images. To make things simple, the discriminator model
    architecture shown in the following will be a five-layer fully connected network
    (Listing [9-14](#PC14)). You can further improve the discriminator’s performance
    by using convolutional layers.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将构建判别器。回想一下，无论生成任务是什么，判别器始终是一个分类器，用于区分真实图像和生成图像。为了简化问题，以下所示的判别器模型架构将是一个五层全连接网络（见清单[9-14](#PC14)）。您可以通过使用卷积层进一步提高判别器的性能。
- en: '[PRE13]'
  id: totrans-164
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: The generator model will receive an arbitrary number of points in latent space
    as random Gaussian noise. It’s responsible for creating fake images based on the
    gradients flowing back from the discriminator to produce images that the discriminator
    cannot correctly classify as fake. The dimension of the latent space is irrelevant
    to model performance – in the following example, 128 was chosen as the input dimension.
    The model’s architecture is defined in an expanding manner, increasing the number
    of neurons from 128 to 1024\. The final layer will be a reshape to the correct
    image size of `(28, 28)`. Note that the final layer activation will be sigmoid
    since we normalized the image pixel values to be between 1 and 0.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 生成器模型将接收来自潜在空间中的任意数量的点，这些点作为随机高斯噪声。它负责根据从判别器返回的梯度创建假图像，以产生判别器无法正确分类为假的图像。潜在空间的维度与模型性能无关——在以下示例中，选择了128作为输入维度。模型的架构以扩展的方式定义，从128增加到1024个神经元。最后一层将重整为正确的图像大小
    `(28, 28)`。请注意，由于我们将图像像素值归一化到1和0之间，因此最后一层的激活函数将是sigmoid。
- en: Add comments (Listing [9-15](#PC15)) wherever you want.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 在您想要的地方添加注释（见清单[9-15](#PC15)）。
- en: '[PRE14]'
  id: totrans-167
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: The entire GAN model consists of the generator and the discriminator in that
    order (Listing [9-16](#PC16)). To initiate training, the trainable attribute of
    the discriminator is set to false. We freeze the discriminator’s weights prior
    to training the entire GAN model since the gradients flowing back from the discriminator
    at each generated sample must remain unchanged (in terms of learning) across the
    entire iteration. The classification aspect of the discriminator is trained as
    a standalone model.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 整个GAN模型由生成器和判别器按顺序组成（见清单[9-16](#PC16)）。为了启动训练，将判别器的可训练属性设置为false。在训练整个GAN模型之前，我们冻结判别器的权重，因为每个生成的样本返回的梯度在迭代过程中必须保持不变（从学习角度）。判别器的分类方面作为一个独立模型进行训练。
- en: '[PRE15]'
  id: totrans-169
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: As per usual for image-related tasks, TensorFlow datasets will be used to batch
    samples into a generator-like format (Listing [9-17](#PC17)).
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 对于图像相关任务，通常使用TensorFlow数据集将样本批量处理成类似生成器的格式（见清单[9-17](#PC17)）。
- en: '[PRE16]'
  id: totrans-171
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Training is accomplished mainly through two nested loops, one looping through
    the desired number of epochs while, for each epoch, every batch of the dataset
    is looped through. For each batch of data, the generator produces one batch of
    fake images along with one batch of real images. Their labels are assigned through
    tf.constant and then concatenated with the images to create the training dataset
    for the discriminator. To clarify, one batch of fake images with 0s as their label
    is joined with one batch of real images labeled 1 and fed into the discriminator
    using the train_on_batch method (essentially training two batches worth of data).
    The generator is trained subsequently with the discriminator’s weights frozen
    and calling train_on_batch on the entire GAN (Listing [9-18](#PC18)).
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 训练主要通过两个嵌套循环完成，一个循环遍历所需的 epoch 数，而对于每个 epoch，每个数据集的批次都会被循环遍历。对于每个数据批次，生成器生成一个假图像批次以及一个真实图像批次。它们的标签通过
    tf.constant 分配，然后与图像连接，创建判别器的训练数据集。为了澄清，一个标签为 0 的假图像批次与一个标签为 1 的真实图像批次合并，并使用 train_on_batch
    方法输入判别器（本质上训练了两个批次的数据）。随后，在冻结判别器权重的情况下，对整个 GAN 调用 train_on_batch（列表 [9-18](#PC18)）来训练生成器。
- en: '[PRE17]'
  id: totrans-173
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: After several dozen epochs with a batch size of 256, the GAN can generate somewhat
    convincing handwritten digits (Figure [9-10](#Fig10)). You can further improve
    the performance by modifying the discriminator or the generator to include more
    layers or different activation functions or switching to a convolutional-based
    design. Due to the instability of GAN, one minor change to the model can influence
    results significantly.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 经过几十个 epoch，批大小为 256，GAN 可以生成相当令人信服的手写数字（图 [9-10](#Fig10)）。你可以通过修改判别器或生成器，包括更多层或不同的激活函数，或者切换到基于卷积的设计来进一步提高性能。由于
    GAN 的不稳定性，模型的一个小变化可能会显著影响结果。
- en: '![](../images/525591_1_En_9_Chapter/525591_1_En_9_Fig10_HTML.jpg)'
  id: totrans-175
  prefs: []
  type: TYPE_IMG
