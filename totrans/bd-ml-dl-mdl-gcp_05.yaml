- en: Part VIntroducing Deep Learning
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第五部分 介绍深度学习
- en: 27. What Is Deep Learning?
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 27. 深度学习是什么？
- en: Deep learning is a class of machine learning algorithms called neural networks.
    Neural networks are mathematical models inspired by the structure of the brain.
    Deep learning enables the neural network algorithm to perform very well in building
    prediction models around complex problems such as computer vision and language
    modeling. Self-driving cars and automatic speech translation, to mention just
    a few, are examples of technologies that have resulted from advances in deep learning.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习是一类称为神经网络的机器学习算法。神经网络是受大脑结构启发的数学模型。深度学习使神经网络算法在构建复杂问题（如计算机视觉和语言建模）的预测模型方面表现出色。自动驾驶汽车和自动语音翻译等，只是深度学习进步带来的技术进步的几个例子。
- en: The Representation Challenge
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 表示挑战
- en: Learning is a non-trivial task. The brain’s ability to learn complex tasks is
    not yet fully understood by research communities in neurological science, psychology,
    and other brain-related fields. What we consider trivial, and to some others natural,
    are a system of complex and intricate processes that have set us apart from other
    life forms as intelligent beings.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 学习是一个非平凡的任务。大脑学习复杂任务的能力尚未被神经科学、心理学和其他脑相关领域的研究社区完全理解。我们认为微不足道，而对某些人来说则是自然的，是一套复杂而精致的过程，使我们作为智能生物与其他生命形式区分开来。
- en: Examples of complex tasks performed by the human brain include the ability to
    recognize faces at a millionth of a second (probably much faster), the uncanny
    aptitude for learning and understanding deep linguistic representations, and forming
    symbols for intelligent communications. Also, the adept skills to compose and
    perform masterful musical pieces are examples of the marvel of natural intelligence.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 人类大脑执行复杂任务的能力包括在百万分之一秒内识别面孔（可能更快），以及学习和理解深层语言表示的非凡能力，以及形成用于智能通信的符号。此外，创作和演奏精湛音乐作品的高超技巧也是自然智能奇迹的例证。
- en: The challenge of AI research and engineering is to build machines that can understand
    and decompose the structural patterns inherent in complex problems in order to
    mimic natural intelligence. Deep learning as an AI technique approaches the representation
    problem by learning the underlying fundamental structure inherent in the dataset.
    Deep learning is also called representation learning.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能研究和工程面临的挑战是构建能够理解和分解复杂问题内在结构模式的机器，以模仿自然智能。深度学习作为一种人工智能技术，通过学习数据集中固有的基本结构来接近表示问题。深度学习也被称为表示学习。
- en: Inspiration from the Brain
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 来自大脑的灵感
- en: Scientists often look to nature for inspiration when performing incredible feats.
    Notably, the birds inspired the airplane. In that vein, there is no better type
    to study as an antitype of intelligence as the human brain.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 科学家们在执行非凡壮举时常常从自然界中寻找灵感。值得注意的是，鸟类启发了飞机。在这方面，没有比人类大脑更好的研究对象来作为智能的反面典型了。
- en: We can view the brain as a society of intelligent agents that are networked
    together and communicate by passing information via electrical signals from one
    agent to another. These agents are known as neurons. Our principal interest here
    is to have a glimpse of what neurons are, what their components are, and how they
    pass information around to create intelligence.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将大脑视为一个由智能代理组成的社团，这些代理通过网络连接在一起，并通过从一代理到另一代理传递电信号来通信。这些代理被称为神经元。我们在这里的主要兴趣是窥见神经元是什么，它们的组成部分是什么，以及它们如何传递信息以创造智能。
- en: A neuron is an autonomous agent in the brain and is a central part of the nervous
    system. Neurons are responsible for receiving and transmitting information to
    other cells within the body based on external or internal stimuli. Neurons react
    by firing electrical impulses generated at the stimuli source to the brain and
    other cells for the appropriate response. The intricate and coordinated workings
    of neurons are central to human intelligence.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 神经元是大脑中的自主代理，是神经系统的重要组成部分。神经元负责根据外部或内部刺激接收和向体内其他细胞传递信息。神经元通过在刺激源处产生电脉冲，将其传递到大脑和其他细胞，以产生适当的反应。神经元的复杂和协调作用是人类智能的核心。
- en: 'The following are the three most essential components of neurons that are of
    primary interest to us:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是我们最感兴趣的神经元三个最重要的组成部分：
- en: The axon
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 轴突
- en: The dendrite
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 树突
- en: The synapse
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 突触
- en: The axon is a long tail connected to the nucleus of the neuron as seen in Figure
    [27-1](#Fig1). The axon is responsible for transmitting electrical signals from
    the nucleus to other neuron cells through the axon terminals. The dendrite, on
    the other hand, receives information as electrical impulses from other neuron
    cells through the synapses to the nucleus of a neuron cell.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 轴突是连接到神经元核的一个长尾巴，如图[27-1](#Fig1)所示。轴突负责通过轴突末端将电信号从核传输到其他神经元细胞。另一方面，树突通过突触从其他神经元细胞接收信息，作为电脉冲传递到神经元细胞的核。
- en: '![../images/463852_1_En_27_Chapter/463852_1_En_27_Fig1_HTML.jpg](../images/463852_1_En_27_Chapter/463852_1_En_27_Fig1_HTML.jpg)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_27_Chapter/463852_1_En_27_Fig1_HTML.jpg](../images/463852_1_En_27_Chapter/463852_1_En_27_Fig1_HTML.jpg)'
- en: Figure 27-1
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 图27-1
- en: A neuron
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 神经元
- en: By mimicking these three biological components of a neuron, scientists developed
    the core design and structure of an artificial neural network (ANN) that allows
    us to build machines that can learn. We will discuss the ANN in more detail in
    the next chapter. There is much hope that if we can mimic the capabilities of
    the brain from a science and engineering perspective, we can build machines that
    can learn hierarchical features from complex domain use cases.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 通过模仿神经元的这三个生物组成部分，科学家们开发了一个人工神经网络（ANN）的核心设计和结构，这使得我们能够构建能够学习的机器。我们将在下一章中更详细地讨论ANN。如果从科学和工程的角度模仿大脑的能力，我们有望构建出能够从复杂的领域用例中学习层次特征的机器。
- en: This chapter introduces the field of deep learning as an engineering impersonation
    of how the brain learns to build artificial neural networks. In the next chapter,
    we’ll go deeper to discuss the neural network algorithm.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 本章介绍了深度学习领域，作为对大脑如何学习构建人工神经网络的工程模拟。在下一章中，我们将更深入地讨论神经网络算法。
- en: 28. Neural Network Foundations
  id: totrans-21
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 28. 神经网络基础
- en: Building on the inspiration of the biological neuron, the artificial neural
    network (ANN) is a society of connectionist agents that learn and transfer information
    from one artificial neuron to the other. As data transfers between neurons, a
    hierarchy of representations or a hierarchy of features is learned, hence the
    name deep representation learning or deep learning.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 建立在生物神经元的启发之上，人工神经网络（ANN）是一个连接主义代理的社会，它们从一个人工神经元学习并传递信息到另一个人工神经元。随着数据在神经元之间传输，学习到表示或特征的层次结构，因此得名深度表示学习或深度学习。
- en: The Architecture
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 架构
- en: An artificial neural network is composed of
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 人工神经网络由
- en: '![../images/463852_1_En_28_Chapter/463852_1_En_28_Fig1_HTML.jpg](../images/463852_1_En_28_Chapter/463852_1_En_28_Fig1_HTML.jpg)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_28_Chapter/463852_1_En_28_Fig1_HTML.jpg](../images/463852_1_En_28_Chapter/463852_1_En_28_Fig1_HTML.jpg)'
- en: Figure 28-1
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 图28-1
- en: Neural network architecture
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络架构
- en: An input layer
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入层
- en: Hidden layer(s)
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 隐藏层（s）
- en: An output layer
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输出层
- en: The input layer receives information from the features of the dataset, after
    which some computation takes place, and information that captures the learned
    patterns of the data is propagated across the hidden layer(s) with hopes to improve
    the learned patterns.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 输入层接收来自数据集特征的信息，之后进行一些计算，并传播捕获数据学习模式的信
- en: The hidden layer(s) is where the workhorse of deep learning occurs. The hidden
    layer(s) can consist of multiple neuron modules as shown in Figure [28-1](#Fig1).
    Each hidden network layer learns a more sophisticated set of feature representations.
    The decision on the number of neurons in a layer (network width) and the number
    of hidden layers (network depth) which forms the network topology is a design
    choice when training deep learning networks. The techniques for training a deep
    neural network are discussed in the next chapter.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 隐藏层（s）是深度学习的主要工作场所。隐藏层可以由多个神经元模块组成，如图[28-1](#Fig1)所示。每个隐藏网络层学习一组更复杂的特征表示。在训练深度学习网络时，关于一个层（网络宽度）中神经元数量的决定以及隐藏层（网络深度）的数量，即形成网络拓扑结构的设计选择。
- en: 29. Training a Neural Network
  id: totrans-33
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 29. 训练神经网络
- en: This chapter gives an overview of the techniques for training a deep neural
    network. Here, we briefly discuss
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 本章概述了训练深度神经网络的技术。在这里，我们简要讨论
- en: How learned information flows through a neural network
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习信息如何在神经网络中流动
- en: The role of the cost function at the output layer of the network
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 网络输出层中成本函数的作用
- en: One-hot encoding and the softmax activation function for determining class membership
    at the output layer of a classification problem
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用于确定分类问题输出层类别成员的一热编码和softmax激活函数
- en: The backpropagation algorithm for improving the learned parameters of the network
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用于改进网络学习参数的反向传播算法
- en: Activation functions that enable the neural network to learn non-linear patterns
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 能够使神经网络学习非线性模式的激活函数
- en: In this chapter, as we discuss the methods involved in training a neural network,
    we will use the example of a classification problem with two possible outputs.
    In designing a neural network, the number of neurons in the input layer is typically
    the number of features of the dataset, while the number of neurons in the output
    layer is the number of classes in the target variable that the neural network
    is learning to classify.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，当我们讨论训练神经网络涉及的方法时，我们将使用具有两个可能输出的分类问题的例子。在设计神经网络时，输入层的神经元数量通常是数据集的特征数量，而输出层的神经元数量是神经网络正在学习的目标变量中的类别数量。
- en: As illustrated in Figure [29-1](#Fig1), the dataset features are the inputs
    to the neural network, while the classes in the target variable determine the
    number of output neurons. In this example, the network learns two classes, 0 and
    1.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 如图[29-1](#Fig1)所示，数据集特征是神经网络的输入，而目标变量中的类别决定了输出神经元的数量。在这个例子中，网络学习两个类别，0和1。
- en: '![../images/463852_1_En_29_Chapter/463852_1_En_29_Fig1_HTML.jpg](../images/463852_1_En_29_Chapter/463852_1_En_29_Fig1_HTML.jpg)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_29_Chapter/463852_1_En_29_Fig1_HTML.jpg](../images/463852_1_En_29_Chapter/463852_1_En_29_Fig1_HTML.jpg)'
- en: Figure 29-1
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 图29-1
- en: Defining a neural network from a dataset
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 从数据集中定义神经网络
- en: A weight (also called parameter) is assigned to every neuron. The weights of
    neurons in a neural layer are multiplied by their inputs and then passed through
    an activation function (to be discussed in this chapter) for which the outputs
    are the inputs to the neurons in the next neural layer of the network (see Figure
    [29-2](#Fig2)). This procedure is repeated as information of what the neural network
    is trying to learn moves from one layer of the network to another. Every neuron
    layer also has a bias neuron (typically set to 1) that controls the weighted sum.
    This is similar to the bias term in the logistic regression model.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 每个神经元都分配了一个权重（也称为参数）。神经网络中神经元的权重乘以其输入，然后通过一个激活函数（将在本章中讨论），其输出是网络下一个神经层的神经元的输入（见图[29-2](#Fig2)）。随着神经网络试图学习的信息从网络的一层移动到另一层，这个过程会重复进行。每个神经元层还有一个偏置神经元（通常设置为1），它控制加权总和。这与逻辑回归模型中的偏置项类似。
- en: '![../images/463852_1_En_29_Chapter/463852_1_En_29_Fig2_HTML.jpg](../images/463852_1_En_29_Chapter/463852_1_En_29_Fig2_HTML.jpg)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_29_Chapter/463852_1_En_29_Fig2_HTML.jpg](../images/463852_1_En_29_Chapter/463852_1_En_29_Fig2_HTML.jpg)'
- en: Figure 29-2
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 图29-2
- en: Information flowing from a previous neural layer to a neuron in the next layer
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 从前一神经层流向下一层神经元的信
- en: The weights are initialized as random values that are later adjusted as the
    network begins to learn using the backpropagation algorithm (to be discussed in
    this chapter). In summary, the outputs (or activations) of the neurons in the
    neural network layers are determined by the sum of the weight times the outputs
    plus the bias term of the neurons in the previous layer acted upon by a non-linear
    *activation function* (see Figure [29-2](#Fig2)). This move is called the feedforward
    learning algorithm.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 权重被初始化为随机值，随后在神经网络开始使用反向传播算法（将在本章中讨论）学习时进行调整。总之，神经网络层中神经元的输出（或激活）由权重乘以输出加上前一层神经元的偏置项的总和决定，这些偏置项作用于一个非线性的*激活函数*（见图[29-2](#Fig2)）。这一步骤被称为前馈学习算法。
- en: However, the output of the feedforward pass through the network may most likely
    result in an incorrect classification. The errors made from the feedforward procedure
    are later adjusted using the backpropagation algorithm (to be discussed). To evaluate
    the performance of the neural network, we define a cost function or loss function
    (similar to other machine learning algorithms) that captures the quality of the
    prediction made by the network.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，通过网络的前馈传递的输出很可能会导致错误的分类。前馈过程中产生的错误随后会使用反向传播算法（将在本章中讨论）进行调整。为了评估神经网络的性能，我们定义了一个成本函数或损失函数（类似于其他机器学习算法），它捕捉了网络做出的预测的质量。
- en: The goal of the neural network is to minimize the cost function. Two commonly
    used cost functions are the squared error cost function for regression problems
    and the softmax cross-entropy cost function for classification problems.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络的目标是最小化代价函数。两种常用的代价函数是回归问题的平方误差代价函数和分类问题的softmax交叉熵代价函数。
- en: Cost Function or Loss Function
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 代价函数或损失函数
- en: The squared error cost function (also known as the mean squared error) finds
    the sum of the squared difference between the estimated target and the actual
    target for a real-valued problem, while the cross-entropy cost function finds
    the difference between the predicted class from the probability estimates of the
    actual class label in a classification problem.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 平方误差代价函数（也称为均方误差）找到估计目标与实际目标之间平方差的和，对于实值问题，而交叉熵代价函数找到分类问题中从实际类别标签的概率估计中预测的类别的差异。
- en: Regardless of the cost function used, when the error loss is small, we say that
    the cost is minimized. In Figure [29-3](#Fig3), the correct output of the example
    passed into the network is **2.3**. After the output values are evaluated from
    the feedforward training, the squared error cost function is used to assess the
    quality of the network’s output.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 无论使用哪种代价函数，当误差损失较小时，我们说代价是最小的。在图[29-3](#Fig3)中，网络输入的示例的正确输出是**2.3**。在评估前向训练的输出值后，使用平方误差代价函数来评估网络输出的质量。
- en: Remember that the MSE finds the average cost over all the data samples in the
    training dataset. In the example illustrated in Figure [29-3](#Fig3), we used
    just one data sample to demonstrate how the cost function works.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，MSE找到训练数据集中所有数据样本的平均代价。在图[29-3](#Fig3)中所示的示例中，我们只使用了一个数据样本来演示代价函数的工作原理。
- en: '![../images/463852_1_En_29_Chapter/463852_1_En_29_Fig3_HTML.jpg](../images/463852_1_En_29_Chapter/463852_1_En_29_Fig3_HTML.jpg)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_29_Chapter/463852_1_En_29_Fig3_HTML.jpg](../images/463852_1_En_29_Chapter/463852_1_En_29_Fig3_HTML.jpg)'
- en: Figure 29-3
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 图29-3
- en: MSE estimate of the neural network
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络的MSE估计
- en: One-Hot Encoding
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 独热编码
- en: In a classification problem, one-hot encoding is the process of transforming
    the class labels of the target variable into a matrix of binary variables. The
    one-hot encoder assigns 1 when the output belongs to a particular class and 0
    otherwise. An illustration of one-hot encoding is shown in Figure [29-4](#Fig4).
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在分类问题中，独热编码是将目标变量的类别标签转换成二进制变量矩阵的过程。独热编码器在输出属于特定类别时分配1，否则分配0。独热编码的示例如图[29-4](#Fig4)所示。
- en: '![../images/463852_1_En_29_Chapter/463852_1_En_29_Fig4_HTML.jpg](../images/463852_1_En_29_Chapter/463852_1_En_29_Fig4_HTML.jpg)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_29_Chapter/463852_1_En_29_Fig4_HTML.jpg](../images/463852_1_En_29_Chapter/463852_1_En_29_Fig4_HTML.jpg)'
- en: Figure 29-4
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 图29-4
- en: One-hot encoding
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 独热编码
- en: In the final layer of the neural network, just before the output layer, an activation
    function called the softmax (same as discussed under “Logistic Regression”) is
    applied to transform the activations to the probability that the example belongs
    to one of the output classes.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在神经网络的最末层，即在输出层之前，应用了一个称为softmax的激活函数（与“逻辑回归”下讨论的相同）来将激活值转换为示例属于输出类别的概率。
- en: The purpose of applying one-hot encoding to the labels of the dataset is to
    represent the output as a vector of distinct classes with the probability that
    an example in the training dataset belongs to any one of the output categories.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 将独热编码应用于数据集的标签的目的是将输出表示为具有示例属于输出类别之一概率的独立类别向量。
- en: The Backpropagation Algorithm
  id: totrans-66
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 反向传播算法
- en: Backpropagation is the process by which we train the neural network to improve
    its prediction accuracy. To train the neural network, we need to find a mechanism
    for adjusting the weights of the network; this in turn affects the value of the
    activations within each neuron and consequently updates the value of the predicted
    output layer. The first time we run the feedforward algorithm, the activations
    at the output layer are most likely incorrect with a high error estimate or cost
    function.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 反向传播是我们训练神经网络以改进其预测准确度的过程。为了训练神经网络，我们需要找到一种调整网络权重的机制；这反过来又影响每个神经元中激活值的值，从而更新预测输出层的值。第一次运行前向算法时，输出层的激活值很可能是错误的，具有高误差估计或代价函数。
- en: The goal of backpropagation is to repeatedly go back and adjust the weights
    of each preceding neural layer and perform the feedforward algorithm again until
    we minimize the error made by the network at the output layer (see Figure [29-5](#Fig5)).
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 反向传播的目标是反复回溯并调整每个前向神经层的权重，并再次执行前向算法，直到我们最小化网络在输出层产生的错误（见图 [29-5](#Fig5)）。
- en: '![../images/463852_1_En_29_Chapter/463852_1_En_29_Fig5_HTML.jpg](../images/463852_1_En_29_Chapter/463852_1_En_29_Fig5_HTML.jpg)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_29_Chapter/463852_1_En_29_Fig5_HTML.jpg](../images/463852_1_En_29_Chapter/463852_1_En_29_Fig5_HTML.jpg)'
- en: Figure 29-5
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 图 29-5
- en: Backpropagation
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 反向传播
- en: The backpropagation algorithm works by computing the cost function at the output
    layer by comparing the predicted output of the neural network with the actual
    outputs from the dataset. It then employs gradient descent (earlier discussed
    in Chapter [16](463852_1_En_16_Chapter.xhtml)) to calculate the gradient of the
    cost function using the weights of the neurons at each successive layer and update
    the weights propagating back through the network.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 反向传播算法通过在输出层计算成本函数，将神经网络的预测输出与数据集的实际输出进行比较来工作。然后它使用梯度下降（在第 [16](463852_1_En_16_Chapter.xhtml)
    章节中讨论过）来计算成本函数的梯度，使用每个连续层的神经元权重，并通过网络传播更新权重。
- en: Activation Functions
  id: totrans-73
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 激活函数
- en: Up till now, we have mentioned activation functions. Now let’s go a bit deeper
    into what activation functions are and why do we have them.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经提到了激活函数。现在让我们更深入地了解一下激活函数是什么以及为什么我们需要它们。
- en: Activation functions act on the weighted sum in the neuron (which is nothing
    more than the weighted sum of weights and their added bias) by passing it through
    a non-linear function to decide if that neuron should fire (propagate) its information
    or not to the succeeding neural layers.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 激活函数通过将加权求和传递给神经元（这仅仅是权重和它们的加权和）并通过一个非线性函数来决定该神经元是否应该触发（传播）其信息到后续的神经网络层。
- en: In other words, the activation function determines if a particular neuron has
    the information to result in a correct prediction at the output layer for an observation
    in the training dataset. Activation functions are analogous to how neurons communicate
    and transfer information in the brain, by firing when the activation goes above
    a particular threshold value.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，激活函数决定了特定神经元是否具有在训练数据集中的观察结果在输出层产生正确预测所需的信息。激活函数类似于大脑中神经元如何通过在激活超过特定阈值时触发来通信和传递信息。
- en: These activation functions are also called non-linearities because they inject
    non-linear capabilities to our network and can learn a mapping from inputs to
    output for a dataset whose fundamental structure is non-linear. An illustration
    of passing the weighted sum of weights and biases through an activation function
    is shown in Figure [29-6](#Fig6).
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 这些激活函数也被称为非线性，因为它们为我们的网络注入了非线性能力，并且可以学习从输入到输出的映射，对于基本结构是非线性的数据集。图 [29-6](#Fig6)
    展示了通过激活函数传递权重和偏差加权和的过程。
- en: '![../images/463852_1_En_29_Chapter/463852_1_En_29_Fig6_HTML.jpg](../images/463852_1_En_29_Chapter/463852_1_En_29_Fig6_HTML.jpg)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_29_Chapter/463852_1_En_29_Fig6_HTML.jpg](../images/463852_1_En_29_Chapter/463852_1_En_29_Fig6_HTML.jpg)'
- en: Figure 29-6
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 图 29-6
- en: Activation function
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 激活函数
- en: 'The following are examples of activation functions used in a neural network:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些在神经网络中使用的激活函数的例子：
- en: Sigmoid
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Sigmoid
- en: Hyperbolic tangent (tanh)
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 双曲正切（tanh）
- en: Rectified linear unit (ReLU)
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 线性整流单元（ReLU）
- en: Leaky ReLU
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Leaky ReLU
- en: Maxout
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Maxout
- en: Let’s briefly examine them.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们简要地考察它们。
- en: Sigmoid
  id: totrans-88
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Sigmoid
- en: The sigmoid function illustrated in Figure [29-7](#Fig7) is a non-linear function
    that brings (or squashes) the activations to fall within a range of 0 and 1\.
    This brings large negative and positive numbers to 0 and 1, respectively. The
    neurons typically begin firing when the function output is above a threshold of
    0.5.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [29-7](#Fig7) 中所示的 sigmoid 函数是一个非线性函数，它将激活值压缩到 0 和 1 的范围内。这把大的负数和正数分别压缩到 0
    和 1。神经元通常在函数输出超过 0.5 的阈值时开始触发。
- en: '![../images/463852_1_En_29_Chapter/463852_1_En_29_Fig7_HTML.jpg](../images/463852_1_En_29_Chapter/463852_1_En_29_Fig7_HTML.jpg)'
  id: totrans-90
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_29_Chapter/463852_1_En_29_Fig7_HTML.jpg](../images/463852_1_En_29_Chapter/463852_1_En_29_Fig7_HTML.jpg)'
- en: Figure 29-7
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 图 29-7
- en: Sigmoid activation function
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: Sigmoid 激活函数
- en: However, a significant drawback of the sigmoid function is its susceptibility
    to a phenomenon called exploding and vanishing gradients. In the process of optimizing
    the weights of the network during backpropagation, the gradients can become disproportionately
    small or large with their activations concentrated at either 0 or 1\. When this
    happens, we say that the gradients have saturated. Hence, further multiplication
    via backpropagation causes the gradient to either vanish or explode; and as a
    result, the affected neurons become dead and transfer no information across the
    network, thus negatively affecting training.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，sigmoid 函数的一个显著缺点是它容易受到爆炸和消失梯度现象的影响。在网络权重优化过程中，反向传播过程中梯度可能变得不成比例地小或大，其激活值集中在
    0 或 1。当这种情况发生时，我们说梯度已经饱和。因此，通过反向传播的进一步乘法会导致梯度消失或爆炸；结果，受影响的神经元变得死亡，无法在网络中传递信息，从而对训练产生负面影响。
- en: Another drawback is that the outputs of the function are not zero-centered.
    As a consequence, during backpropagation, the gradients can either become all
    positive or all negative. This has a negative effect in minimizing the function
    objective (i.e., the cost function).
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个缺点是函数的输出不是零中心化的。因此，在反向传播过程中，梯度可能全部变为正值或全部变为负值。这会对最小化函数目标（即损失函数）产生负面影响。
- en: Hyperbolic Tangent (tanh)
  id: totrans-95
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 双曲正切 (tanh)
- en: The hyperbolic tangent illustrated in Figure [29-8](#Fig8) improves on the sigmoid
    function by bordering its output within a range of −1 and 1\. So, while it still
    suffers from the exploding and vanishing gradient problem, its outputs are now
    zero-centered. From the formula, the reader will observe that tanh is merely a
    scaled sigmoid function.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [29-8](#Fig8) 中所示的双曲正切函数通过将输出限制在 -1 和 1 的范围内来改进 sigmoid 函数。因此，尽管它仍然受到爆炸和消失梯度问题的影响，但它的输出现在是零中心化的。从公式中，读者将观察到
    tanh 只是一个缩放后的 sigmoid 函数。
- en: '![../images/463852_1_En_29_Chapter/463852_1_En_29_Fig8_HTML.jpg](../images/463852_1_En_29_Chapter/463852_1_En_29_Fig8_HTML.jpg)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_29_Chapter/463852_1_En_29_Fig8_HTML.jpg](../images/463852_1_En_29_Chapter/463852_1_En_29_Fig8_HTML.jpg)'
- en: Figure 29-8
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 图 29-8
- en: The hyperbolic tangent activation function
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 双曲正切激活函数
- en: Rectified Linear Unit (ReLU)
  id: totrans-100
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 矩形线性单元 (ReLU)
- en: The rectified linear unit or ReLU activation function is illustrated in Figure
    [29-9](#Fig9) and works by setting the activation to 0 for values, *x*, less than
    0 and a linear slope of 1 when values, *x*, are greater than 0.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 矩形线性单元或 ReLU 激活函数如图 [29-9](#Fig9) 所示，其工作原理是将激活值设置为 0，当值 *x* 小于 0 时，而当值 *x* 大于
    0 时，激活值具有线性斜率 1。
- en: '![../images/463852_1_En_29_Chapter/463852_1_En_29_Fig9_HTML.jpg](../images/463852_1_En_29_Chapter/463852_1_En_29_Fig9_HTML.jpg)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_29_Chapter/463852_1_En_29_Fig9_HTML.jpg](../images/463852_1_En_29_Chapter/463852_1_En_29_Fig9_HTML.jpg)'
- en: Figure 29-9
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 图 29-9
- en: ReLU activation function
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: ReLU 激活函数
- en: ReLU offers a vast improvement on the tanh and sigmoid activation functions
    by greatly mitigating the vanishing and exploding gradient problem. However, some
    gradients can still die out during backpropagation with a large learning rate.
    However, with a well-defined learning rate, we should not have a problem.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: ReLU 通过极大地减轻消失和爆炸梯度问题，在 tanh 和 sigmoid 激活函数上提供了巨大的改进。然而，在反向传播过程中，即使学习率很大，一些梯度仍然可能消失。然而，只要学习率定义良好，我们就应该没有问题。
- en: Leaky ReLU
  id: totrans-106
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Leaky ReLU
- en: Leaky ReLU is another activation function that is proposed to solve the case
    of some neurons completely dying out in ReLU by avoiding zero gradients. Leaky
    ReLU is illustrated in Figure [29-10](#Fig10). The function works by setting the
    activation to a small negative slope when the value *x* < 0.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: Leaky ReLU 是另一种激活函数，它通过避免零梯度来解决这个问题，即 ReLU 中某些神经元完全死亡。Leaky ReLU 如图 [29-10](#Fig10)
    所示。该函数通过在值 *x* < 0 时将激活值设置为小的负斜率来工作。
- en: '![../images/463852_1_En_29_Chapter/463852_1_En_29_Fig10_HTML.jpg](../images/463852_1_En_29_Chapter/463852_1_En_29_Fig10_HTML.jpg)'
  id: totrans-108
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_29_Chapter/463852_1_En_29_Fig10_HTML.jpg](../images/463852_1_En_29_Chapter/463852_1_En_29_Fig10_HTML.jpg)'
- en: Figure 29-10
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 图 29-10
- en: Leaky ReLU activation function
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: Leaky ReLU 激活函数
- en: Maxout
  id: totrans-111
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Maxout
- en: The Maxout activation function generalizes the ReLU and leaky ReLU functions
    and hence takes advantage of the efficiency of ReLU while avoiding its pitfalls
    of some neurons dying out. In any case, a trade-off needs to be made, because
    Maxout increases the parameter size of each neuron during training.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: Maxout 激活函数是 ReLU 和 leaky ReLU 函数的推广，因此它利用了 ReLU 的效率，同时避免了某些神经元死亡的问题。无论如何，都需要做出权衡，因为
    Maxout 在训练过程中增加了每个神经元的参数大小。
- en: As a rule of thumb, different types of activation functions are not mixed in
    the same network. Also, ReLU is typically used for the hidden layers, and the
    softmax activation is used for classification problems at the output layer since
    this layer returns a probability of membership of a particular class.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 按照惯例，同一网络中不混合不同类型的激活函数。此外，ReLU 通常用于隐藏层，而在输出层用于分类问题，因为这一层返回特定类别的成员概率，所以softmax激活函数被用于分类问题。
- en: This chapter provided an overview on how to train a predictive model using neural
    networks. This chapter ends Part 5 on introducing deep learning. The chapters
    in Part 6 will cover deep learning algorithms and their implementation with TensorFlow
    and Keras.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 本章概述了如何使用神经网络训练预测模型。本章结束了第五部分关于介绍深度学习的内容。第六部分将涵盖深度学习算法及其在TensorFlow和Keras中的实现。
