- en: Conclusion
  id: totrans-233
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this chapter, you learned how to get started with the IBM Cloud; note that
    IBM offers a free one-month trial of this service.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你学习了如何开始使用 IBM Cloud；请注意，IBM 提供了该服务的免费一个月试用期。
- en: This chapter also introduced IBM Watson. You learned how to create two chatbots
    with Watson Assistant.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 本章还介绍了 IBM Watson。你学习了如何使用 Watson Assistant 创建两个聊天机器人。
- en: In the last chapter, your journey to learn about chatbots will continue. You
    will create TensorFlow chatbots and learn about their uses.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一章中，你学习关于聊天机器人的旅程将继续。你将创建 TensorFlow 聊天机器人并了解它们的用途。
