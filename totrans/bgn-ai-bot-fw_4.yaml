  type: TYPE_NORMAL
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig15_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig15_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4-15
  prefs: []
  type: TYPE_NORMAL
- en: Adding user examples for the Capabilities intent
  prefs: []
  type: TYPE_NORMAL
- en: Now you’ll create a second intent. Name this intent *Migration* , as shown in
