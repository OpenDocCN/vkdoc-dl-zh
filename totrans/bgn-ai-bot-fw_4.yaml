  prefs: []
  type: TYPE_NORMAL
- en: Creating the intent for the CoffeeBot
  prefs: []
  type: TYPE_NORMAL
- en: Let’s start by creating an intent named Greetings, as shown in Figure [4-30](#Fig30).
