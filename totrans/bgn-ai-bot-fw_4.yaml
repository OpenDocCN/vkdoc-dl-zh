  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: The setup is easy. We need to click on create and the setup process will move
    towards completion. After setup is complete, click the Launch tool for the service
    to start.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: Creating a FAQ Bot
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this section, you will use the Watson Assistant to create a chatbot that
    uses FAQ for answering. Clicking the Launch tool in the preceding step has opened
    the IBM Watson Assistant screen, shown in Figure [4-9](#Fig9). Click the Create
    a Workspace button at the bottom of the screen to get started.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig9_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig9_HTML.jpg)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
- en: Figure 4-9
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: Getting started with the IBM Watson Assistant
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: Now you will create the workspace . Click the Workspaces tab and then click
    the Create button in the Create a New Workspace section, as shown in Figure [4-10](#Fig10).
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig10_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig10_HTML.jpg)'
