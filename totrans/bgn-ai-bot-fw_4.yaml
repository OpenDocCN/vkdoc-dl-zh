- en: 4. IBM Watson Chatbots
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 4. IBM Watson聊天机器人
- en: Watson is a computer system specifically built for Q-and-A types of capabilities.
    Its core implementations use natural language processing, information retrieval,
    knowledge representation, automated reasoning, and machine-learning technologies
    in the field of open domain question answering. It is used for quick AI-based
    solutions.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: Watson是一个专门为问答类型能力构建的计算机系统。其核心实现使用自然语言处理、信息检索、知识表示、自动推理和开放域问答领域的机器学习技术。它用于快速基于AI的解决方案。
- en: 'In this chapter, you will learn how to implement IBM’s bot service, known as
    Watson, for your use (see Figure [4-1](#Fig1)). In order to access Watson, you
    will create an account for the IBM Cloud (formerly known as Bluemix). Then you
    will use the Watson Assistant (formerly known as Conversational Services) to create
    two chatbots: a FAQ bot and a coffee bot.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，您将学习如何实现IBM的机器人服务，即Watson，以供您使用（见图[4-1](#Fig1)）。为了访问Watson，您需要在IBM云（以前称为Bluemix）上创建一个账户。然后您将使用Watson助手（以前称为对话服务）来创建两个聊天机器人：一个常见问题解答（FAQ）机器人和一个咖啡机器人。
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig1_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig1_HTML.jpg)'
  id: totrans-3
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig1_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig1_HTML.jpg)'
- en: Figure 4-1
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-1
- en: The IBM web page for Watson
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: IBM Watson网页
- en: Implementing Watson
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实现Watson
- en: In this section, you’ll learn how to access Watson and you’ll get to know its
    various services. You access Watson via the IBM Cloud web site, so you will first
    set up an account through the IBM Cloud for the Watson service. We will setup
    the new account.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，您将学习如何访问Watson，并了解其各种服务。您通过IBM云网站访问Watson，因此您首先需要通过IBM云为Watson服务设置一个账户。我们将设置新账户。
- en: IBM Cloud
  id: totrans-8
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: IBM云
- en: Start by accessing the IBM Cloud by opening a web browser to [`https://www.ibm.com/cloud-computing/in-en/`](https://www.ibm.com/cloud-computing/in-en/)
    . Figure [4-2](#Fig2) shows the IBM Cloud web site.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，通过打开网页到[`https://www.ibm.com/cloud-computing/in-en/`](https://www.ibm.com/cloud-computing/in-en/)
    访问IBM云。图[4-2](#Fig2)显示了IBM云网站。
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig2_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig2_HTML.jpg)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig2_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig2_HTML.jpg)'
- en: Figure 4-2
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-2
- en: IBM Cloud main page
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: IBM云主页
- en: Log in here by using your IBM ID, as shown in Figure [4-3](#Fig3).
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 使用如图[4-3](#Fig3)所示的IBM ID在此处登录。
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig3_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig3_HTML.jpg)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig3_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig3_HTML.jpg)'
- en: Figure 4-3
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-3
- en: IBM Cloud login window
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: IBM云登录窗口
- en: After logging in, you will see the web page shown in Figure [4-4](#Fig4).
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 登录后，您将看到图[4-4](#Fig4)所示的网页。
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig4_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig4_HTML.jpg)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig4_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig4_HTML.jpg)'
- en: Figure 4-4
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-4
- en: The IBM Cloud main console window
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: IBM云主控制台窗口
- en: On this page, click the Create Resource button at the top right, and shown in
    Figure [4-5](#Fig5), to create a resource and add new services.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 在此页面上，点击右上角的创建资源按钮，如图[4-5](#Fig5)所示，以创建资源并添加新服务。
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig5_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig5_HTML.jpg)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig5_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig5_HTML.jpg)'
- en: Figure 4-5
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-5
- en: Creating a new resource. When we create resource we then will be able to create
    conversational bot
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 创建新资源。当我们创建资源时，我们就可以创建会话机器人。
- en: Watson Assistant Service
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Watson助手服务
- en: In this section, you will see how to set up the Watson Assistant service.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，您将了解如何设置Watson助手服务。
- en: When we create the resource there are lot of options available. You will have
    to add the Watson Assistant service in it. A lot of services are available for
    Watson, as you can see in Figure [4-6](#Fig6).
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们创建资源时，有很多选项可供选择。您必须在其中添加Watson助手服务。如图[4-6](#Fig6)所示，Watson有很多服务可供选择。
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig6_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig6_HTML.jpg)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig6_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig6_HTML.jpg)'
- en: Figure 4-6
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-6
- en: Various Watson services available
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 可用的各种Watson服务
- en: For this example, you will choose the Watson Assistant, shown in Figure [4-7](#Fig7).
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 在本例中，您将选择Watson助手，如图[4-7](#Fig7)所示。
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig7_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig7_HTML.jpg)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig7_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig7_HTML.jpg)'
- en: Figure 4-7
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-7
- en: Choosing the Watson Assistant service
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 选择 Watson Assistant 服务
- en: Next, click the Create button at the bottom right to create the service plan
    for Watson Assistant this shows the different plans for the watson assistant service
    and how much you get with free tier, as shown in Figure [4-8](#Fig8).
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，点击右下角的创建按钮以创建 Watson Assistant 的服务计划，这显示了 Watson Assistant 服务的不同计划以及免费层级的获取内容，如图
    [4-8](#Fig8) 所示。
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig8_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig8_HTML.jpg)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig8_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig8_HTML.jpg)'
- en: Figure 4-8
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-8
- en: The Watson Assistant service plan
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: Watson Assistant 服务计划
- en: The setup is easy. We need to click on create and the setup process will move
    towards completion. After setup is complete, click the Launch tool for the service
    to start.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 设置很简单。我们需要点击创建，设置过程将向完成方向移动。设置完成后，点击服务的启动工具以开始。
- en: Creating a FAQ Bot
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建 FAQ 机器人
- en: In this section, you will use the Watson Assistant to create a chatbot that
    uses FAQ for answering. Clicking the Launch tool in the preceding step has opened
    the IBM Watson Assistant screen, shown in Figure [4-9](#Fig9). Click the Create
    a Workspace button at the bottom of the screen to get started.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，您将使用 Watson Assistant 创建一个使用 FAQ 进行回答的聊天机器人。点击前一步中的启动工具已打开 IBM Watson Assistant
    屏幕，如图 [4-9](#Fig9) 所示。点击屏幕底部的创建工作区按钮以开始。
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig9_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig9_HTML.jpg)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig9_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig9_HTML.jpg)'
- en: Figure 4-9
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-9
- en: Getting started with the IBM Watson Assistant
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 开始使用 IBM Watson Assistant
- en: Now you will create the workspace . Click the Workspaces tab and then click
    the Create button in the Create a New Workspace section, as shown in Figure [4-10](#Fig10).
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，您将创建工作区。点击“工作区”标签，然后在“创建新工作区”部分点击创建按钮，如图 [4-10](#Fig10) 所示。
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig10_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig10_HTML.jpg)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig10_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig10_HTML.jpg)'
- en: Figure 4-10
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-10
- en: Creating the workspace
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 创建工作区
- en: On the next screen, give the workspace name; in this example, type in *FAQBot*
    and then type in a description, as shown in Figure [4-11](#Fig11). Then click
    the Create button.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一屏，输入工作区名称；在这个例子中，输入 *FAQBot* 并输入一个描述，如图 [4-11](#Fig11) 所示。然后点击创建按钮。
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig11_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig11_HTML.jpg)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig11_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig11_HTML.jpg)'
- en: Figure 4-11
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-11
- en: Naming the workspace
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 命名工作区
- en: Creating Intent for the Bot
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为机器人创建意图
- en: The next step is to create intents for the bot according to your needs. We need
    to click on add intent. At this point, the Watson console looks like Figure [4-12](#Fig12).
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是根据您的需求为机器人创建意图。我们需要点击添加意图。此时，Watson 控制台看起来如图 [4-12](#Fig12) 所示。
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig12_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig12_HTML.jpg)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig12_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig12_HTML.jpg)'
- en: Figure 4-12
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-12
- en: Creating a new intent
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 创建新的意图
- en: Our FAQBot will be based on IBM Business process on Cloud. Name the first intent
    *Capabilities*, as shown in Figure [4-13](#Fig13).
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的 FAQBot 将基于 IBM 云业务流程。将第一个意图命名为 *Capabilities*，如图 [4-13](#Fig13) 所示。
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig13_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig13_HTML.jpg)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig13_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig13_HTML.jpg)'
- en: Figure 4-13
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-13
- en: We now add the name of the intent as Capabilities in the intent name option.
    Naming the intent.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在在意图名称选项中将意图的名称添加为“功能”。命名意图。
- en: Next, you need to add a description of the intent, as shown in Figure [4-14](#Fig14).
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，您需要添加意图的描述，如图 [4-14](#Fig14) 所示。
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig14_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig14_HTML.jpg)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig14_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig14_HTML.jpg)'
- en: Figure 4-14
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-14
- en: Adding a description for the intent
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 为意图添加描述
- en: Then add examples to the Capabilities intent, as shown in Figure [4-15](#Fig15).
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 然后在“功能”意图中添加示例，如图 [4-15](#Fig15) 所示。
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig15_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig15_HTML.jpg)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig15_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig15_HTML.jpg)'
- en: Figure 4-15
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-15
- en: Adding user examples for the Capabilities intent
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 为能力意图添加用户示例
- en: Now you’ll create a second intent. Name this intent *Migration* , as shown in
    Figure [4-16](#Fig16).
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您将创建第二个意图。将此意图命名为 *迁移*，如图 [4-16](#Fig16) 所示。
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig16_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig16_HTML.jpg)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig16_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig16_HTML.jpg)'
- en: Figure 4-16
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-16
- en: Creating a new intent named Migration
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 创建名为迁移的新意图
- en: Create a third intent and name it *User*, as shown in Figure [4-17](#Fig17).
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 创建第三个意图并将其命名为 *User*，如图 [4-17](#Fig17) 所示。
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig17_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig17_HTML.jpg)'
  id: totrans-75
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig17_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig17_HTML.jpg)'
- en: Figure 4-17
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-17
- en: Creating a third intent named User
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 创建名为 User 的第三个意图
- en: Now create a fourth intent named *SSO* , which stands for single sign-on, as
    shown in Figure [4-18](#Fig18).
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 现在创建一个名为 *SSO* 的第四个意图，代表单点登录，如图 [4-18](#Fig18) 所示。
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig18_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig18_HTML.jpg)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig18_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig18_HTML.jpg)'
- en: Figure 4-18
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-18
- en: Creating the SSO intent
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 创建 SSO 意图
- en: Now you have all the intents listed, as shown in Figure [4-19](#Fig19).
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您已经列出了所有意图，如图 [4-19](#Fig19) 所示。
