- en: The Dialog Flow for the App
  id: totrans-86
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this section, you will create the dialogs for the FAQBot. Click the Dialog
    tab and then click the Create button, as shown in Figure [4-20](#Fig20).
