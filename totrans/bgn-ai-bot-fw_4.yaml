- en: Trying the Bot
  id: totrans-113
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this last section for our first bot, you will see how to interact with the
    bot. Click the Try It button at the top right to access a Try It Out link, shown
    in Figure [4-26](#Fig26). Let’s try out the bot now.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig26_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig26_HTML.jpg)'
  id: totrans-115
  prefs: []
  type: TYPE_IMG
- en: Figure 4-26
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
- en: Trying the bot. Here we are just testing the bot how it works and the flow logic
    is perfect or not.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
- en: In the following section, you will create another bot. This one will help the
    user order coffee.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
- en: Creating a Coffee Bot
  id: totrans-119
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this section, you will create a CoffeeBot with Watson Assistant. This bot
    will help the user order a cup of coffee. First you will create a workspace; then
    you will create new intents and add entities. Next, you will add dialogs. Finally,
    you’ll create a nested structure for the intents.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
- en: Creating a Workspace
  id: totrans-121
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To get started, you will create a new workspace. The workspace is created from
    watson assistant window and for the new bot creation this step is taken, as shown
    in Figure [4-27](#Fig27).
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig27_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig27_HTML.jpg)'
