- en: 4. IBM Watson Chatbots
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Watson is a computer system specifically built for Q-and-A types of capabilities.
    Its core implementations use natural language processing, information retrieval,
    knowledge representation, automated reasoning, and machine-learning technologies
    in the field of open domain question answering. It is used for quick AI-based
    solutions.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, you will learn how to implement IBM’s bot service, known as
    Watson, for your use (see Figure [4-1](#Fig1)). In order to access Watson, you
    will create an account for the IBM Cloud (formerly known as Bluemix). Then you
    will use the Watson Assistant (formerly known as Conversational Services) to create
    two chatbots: a FAQ bot and a coffee bot.'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig1_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4-1
  prefs: []
  type: TYPE_NORMAL
- en: The IBM web page for Watson
  prefs: []
  type: TYPE_NORMAL
- en: Implementing Watson
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this section, you’ll learn how to access Watson and you’ll get to know its
    various services. You access Watson via the IBM Cloud web site, so you will first
    set up an account through the IBM Cloud for the Watson service. We will setup
    the new account.
  prefs: []
  type: TYPE_NORMAL
- en: IBM Cloud
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Start by accessing the IBM Cloud by opening a web browser to [`https://www.ibm.com/cloud-computing/in-en/`](https://www.ibm.com/cloud-computing/in-en/)
    . Figure [4-2](#Fig2) shows the IBM Cloud web site.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig2_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4-2
  prefs: []
  type: TYPE_NORMAL
- en: IBM Cloud main page
  prefs: []
  type: TYPE_NORMAL
- en: Log in here by using your IBM ID, as shown in Figure [4-3](#Fig3).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig3_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4-3
  prefs: []
  type: TYPE_NORMAL
- en: IBM Cloud login window
  prefs: []
  type: TYPE_NORMAL
- en: After logging in, you will see the web page shown in Figure [4-4](#Fig4).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig4_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4-4
  prefs: []
  type: TYPE_NORMAL
- en: The IBM Cloud main console window
  prefs: []
  type: TYPE_NORMAL
- en: On this page, click the Create Resource button at the top right, and shown in
    Figure [4-5](#Fig5), to create a resource and add new services.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig5_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4-5
  prefs: []
  type: TYPE_NORMAL
- en: Creating a new resource. When we create resource we then will be able to create
    conversational bot
  prefs: []
  type: TYPE_NORMAL
- en: Watson Assistant Service
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this section, you will see how to set up the Watson Assistant service.
  prefs: []
  type: TYPE_NORMAL
- en: When we create the resource there are lot of options available. You will have
    to add the Watson Assistant service in it. A lot of services are available for
    Watson, as you can see in Figure [4-6](#Fig6).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig6_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4-6
  prefs: []
  type: TYPE_NORMAL
- en: Various Watson services available
  prefs: []
  type: TYPE_NORMAL
- en: For this example, you will choose the Watson Assistant, shown in Figure [4-7](#Fig7).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig7_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4-7
  prefs: []
  type: TYPE_NORMAL
- en: Choosing the Watson Assistant service
  prefs: []
  type: TYPE_NORMAL
- en: Next, click the Create button at the bottom right to create the service plan
    for Watson Assistant this shows the different plans for the watson assistant service
    and how much you get with free tier, as shown in Figure [4-8](#Fig8).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig8_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4-8
  prefs: []
  type: TYPE_NORMAL
- en: The Watson Assistant service plan
  prefs: []
  type: TYPE_NORMAL
- en: The setup is easy. We need to click on create and the setup process will move
    towards completion. After setup is complete, click the Launch tool for the service
    to start.
  prefs: []
  type: TYPE_NORMAL
- en: Creating a FAQ Bot
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this section, you will use the Watson Assistant to create a chatbot that
    uses FAQ for answering. Clicking the Launch tool in the preceding step has opened
    the IBM Watson Assistant screen, shown in Figure [4-9](#Fig9). Click the Create
    a Workspace button at the bottom of the screen to get started.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig9_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4-9
  prefs: []
  type: TYPE_NORMAL
- en: Getting started with the IBM Watson Assistant
  prefs: []
  type: TYPE_NORMAL
- en: Now you will create the workspace . Click the Workspaces tab and then click
    the Create button in the Create a New Workspace section, as shown in Figure [4-10](#Fig10).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig10_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4-10
  prefs: []
  type: TYPE_NORMAL
- en: Creating the workspace
  prefs: []
  type: TYPE_NORMAL
- en: On the next screen, give the workspace name; in this example, type in *FAQBot*
    and then type in a description, as shown in Figure [4-11](#Fig11). Then click
    the Create button.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig11_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig11_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4-11
  prefs: []
  type: TYPE_NORMAL
- en: Naming the workspace
  prefs: []
  type: TYPE_NORMAL
- en: Creating Intent for the Bot
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The next step is to create intents for the bot according to your needs. We need
    to click on add intent. At this point, the Watson console looks like Figure [4-12](#Fig12).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig12_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig12_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4-12
  prefs: []
  type: TYPE_NORMAL
- en: Creating a new intent
  prefs: []
  type: TYPE_NORMAL
- en: Our FAQBot will be based on IBM Business process on Cloud. Name the first intent
    *Capabilities*, as shown in Figure [4-13](#Fig13).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig13_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig13_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4-13
  prefs: []
  type: TYPE_NORMAL
- en: We now add the name of the intent as Capabilities in the intent name option.
    Naming the intent.
  prefs: []
  type: TYPE_NORMAL
- en: Next, you need to add a description of the intent, as shown in Figure [4-14](#Fig14).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig14_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig14_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4-14
  prefs: []
  type: TYPE_NORMAL
- en: Adding a description for the intent
  prefs: []
  type: TYPE_NORMAL
- en: Then add examples to the Capabilities intent, as shown in Figure [4-15](#Fig15).
