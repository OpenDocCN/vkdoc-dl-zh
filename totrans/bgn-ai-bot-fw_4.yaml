  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig20_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig20_HTML.jpg)'
