  prefs: []
  type: TYPE_NORMAL
- en: On the next screen, click Welcome so that we can start the conversation with
    a greeting over here , as shown in Figure [4-21](#Fig21).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig21_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig21_HTML.jpg)'
