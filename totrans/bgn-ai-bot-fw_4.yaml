  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
- en: Naming the workspace
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
- en: Working with Intents
  id: totrans-130
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this section, you will start creating intents for the usage of our bot. Click
    the Intents tab and then click the Add Intent button, as shown in Figure [4-29](#Fig29).
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig29_HTML.png](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig29_HTML.png)'
  id: totrans-132
  prefs: []
  type: TYPE_IMG
- en: Figure 4-29
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
- en: Creating the intent for the CoffeeBot
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
- en: Let’s start by creating an intent named Greetings, as shown in Figure [4-30](#Fig30).
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig30_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig30_HTML.jpg)'
  id: totrans-136
  prefs: []
  type: TYPE_IMG
- en: Figure 4-30
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
- en: Naming the intent Greetings
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
- en: There are different ways that the bot can greet a user . You’ll use this screen
    to choose from the options, as shown in Figure [4-31](#Fig31).
  id: totrans-139
