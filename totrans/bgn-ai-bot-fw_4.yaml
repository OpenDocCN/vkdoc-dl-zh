  prefs: []
  type: TYPE_NORMAL
- en: On the screen that opens, name the chatbot *CoffeeBot*, as shown in Figure [4-28](#Fig28).
    Then click the Create button.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_4_Chapter/457478_1_En_4_Fig28_HTML.jpg](../images/457478_1_En_4_Chapter/457478_1_En_4_Fig28_HTML.jpg)'
