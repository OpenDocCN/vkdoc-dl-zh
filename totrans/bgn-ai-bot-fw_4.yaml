- en: Making Sense of the Flow
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now that you’ve created various dialogs with creation of dialogs we are linking
    the flow of the bot to work efficiently, you’re ready to create interactions in
    this section by linking up the entire flow. You’ll start by adding an intention
    for what you want to do.
  prefs: []
  type: TYPE_NORMAL
