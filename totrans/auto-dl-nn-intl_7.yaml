- en: 7. NNI Recipes
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In the previous chapters, we studied various NNI features and applications.
    NNI is a very efficient automated deep learning tool that solves complex deep
    learning problems. We have witnessed that many NNI experiments can last days or
    even weeks. Therefore, it is crucial to organize experiments properly. Otherwise,
    a lot of valuable information and efforts can be lost. On the other hand, NNI
    uses sophisticated mathematical search algorithms to find the optimal solution
    in the shortest time in the vast search space. Time is a precious resource. So
    it is also essential to speed up the NNI execution, which will help maximize the
    efficiency. It is great to understand the mathematical core of algorithms NNI
    implements, but it is also important to know how to use NNI effectively.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter will examine patterns and recipes that can help make NNI interactions
    much more effective. These recipes should help speed up, stabilize, and make research
    and experiments more developer friendly.
  prefs: []
  type: TYPE_NORMAL
- en: Speed Up Trials
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: It is essential to speed up the Trial execution in HPO and Multi-trial NAS.
    The completion of the search algorithm depends on the duration of the Trials,
    so Trial speed optimization is the first thing a developer should start with.
    Here, we will mention basic rules a reader should follow to construct a fast Trial.
  prefs: []
  type: TYPE_NORMAL
- en: '**Use the GPU**. One of the most common ways to speed up neural network computations
    is to use a GPU. Properly configuring the model for GPU usage is the developer’s
    responsibility. If your machine has GPUs, ensure they are utilized during NNI
    Trial execution.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Do not download dataset twice**. A common mistake is downloading heavy datasets
    without caching them on the disk. Please make sure that the downloaded dataset
    is cached on disk and the trial does not attempt to download ten gigabytes from
    the Internet each time it runs a new trial.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Use the duration panel** to determine the longest-running Trials. This can
    help in finding abnormally long Trials. Figure [7-1](#Fig1) shows NNI duration
    panel.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_7_Chapter/526245_1_En_7_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-1
  prefs: []
  type: TYPE_NORMAL
- en: Duration panel
  prefs: []
  type: TYPE_NORMAL
- en: '**Use dry trial runs** to debug trials. Each trial can be run manually as a
    Python script, which can help find performance issues and bottlenecks. Try running
    the Trial several times to check its performance before launching the experiment.'
  prefs: []
  type: TYPE_NORMAL
- en: Start–Stop–Resume
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Keep in mind that each experiment can be manually stopped and resumed after.
    All experiment information is stored in the NNI output folder (path is defined
    by `NNI_OUTPUT_DIR` environment variable, `~/nni-experiments` by default). Therefore,
    you can stop the experiment at any time using the following command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: and resume it with
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'You can resume an embedded experiment using the following script:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: This could be useful when you need to restart an execution machine or an experiment
    crashed for some reason. It is also possible to resume a finished experiment to
    re-analyze its results.
  prefs: []
  type: TYPE_NORMAL
- en: Continue Finished Experiment
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Suppose the experiment stopped meeting terminal condition (`maxTrialNumber`
    or `maxExperimentDuration`), but you are not satisfied with the results and want
    to continue the experiment. In that case, you can resume the finished experiment
    by changing the terminal condition in WebUI. For example, Figure [7-2](#Fig2)
    illustrates `maxTrialNumber` update.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_7_Chapter/526245_1_En_7_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-2
  prefs: []
  type: TYPE_NORMAL
- en: Updating maxTrialNumber
  prefs: []
  type: TYPE_NORMAL
- en: You can also use the WebUI to update the Experiment configuration and search
    space.
  prefs: []
  type: TYPE_NORMAL
- en: NNI and TensorBoard
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: NNI can be integrated with TensorBoard. This is very practical if you want to
    visualize additional Trial metrics. Let’s look at an example of integrating NNI
    with TensorBoard. Make sure tensorboard is installed in your environment. Listing
    [7-1](#PC4) illustrates a dummy Trial implementation that writes metrics using
    TensorBoard format.
