  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以使用以下命令运行使用列表 [7-1](#PC4) 中的 Trial 的虚拟实验：
- en: '[PRE9]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Once the experiment has started, you can go to the Trial jobs panel on Trails
    detail page, select Trials you want to analyze, and click TensorBoard button,
    as shown in Figure [7-3](#Fig3).
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦实验开始，你可以转到 Trials 详细页面上的 Trial 作业面板，选择你想要分析的 Trials，然后点击 TensorBoard 按钮，如图
    [7-3](#Fig3) 所示。
- en: '![](../images/526245_1_En_7_Chapter/526245_1_En_7_Fig3_HTML.jpg)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_7_Chapter/526245_1_En_7_Fig3_HTML.jpg)'
- en: Figure 7-3
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7-3
- en: Launching TensorBoard
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 启动 TensorBoard
- en: After clicking the TensorBoard button, NNI starts the TensorBoard process passing
    Trial log directories as its input and redirects the browser to its web page.
    Figure [7-4](#Fig4) shows TensorBoard panel with metrics we have collected during
    dummy trials we defined in Listing [7-1](#PC4).
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 点击 TensorBoard 按钮后，NNI 会启动 TensorBoard 进程，将 Trial 日志目录作为输入，并将浏览器重定向到其网页。图 [7-4](#Fig4)
    显示了 TensorBoard 面板，其中包含我们在列表 [7-1](#PC4) 中定义的虚拟试验期间收集的指标。
- en: '![](../images/526245_1_En_7_Chapter/526245_1_En_7_Fig4_HTML.jpg)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_7_Chapter/526245_1_En_7_Fig4_HTML.jpg)'
- en: Figure 7-4
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7-4
- en: TensorBoard displaying Trial metrics
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: TensorBoard 显示 Trial 指标
- en: NNI runs an actual TensorBoard process, so you can stop it when you’re done
    with it, as shown in Figure [7-5](#Fig5).
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: NNI 运行实际的 TensorBoard 进程，所以当你完成时可以停止它，如图 [7-5](#Fig5) 所示。
- en: '![](../images/526245_1_En_7_Chapter/526245_1_En_7_Fig5_HTML.jpg)'
