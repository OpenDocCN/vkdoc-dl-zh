  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: 'The remote server must have the same Python environment installed as the Experiment
    host server. NNI copies the experiment information to the remote server and executes
    the Trial jobs during the experiment. Here is an example of a Trial process executed
    on a remote server:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 远程服务器必须安装与实验主机服务器相同的Python环境。NNI将实验信息复制到远程服务器，并在实验期间执行试验作业。以下是在远程服务器上执行的试验过程示例：
- en: '[PRE19]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: 'NNI provides rich explanations concerning Training Services. Please refer to
    the official documentation for more details: [`https://nni.readthedocs.io/`](https://nni.readthedocs.io/).'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: NNI提供了关于训练服务的丰富解释。请参阅官方文档以获取更多详细信息：[`https://nni.readthedocs.io/`](https://nni.readthedocs.io/)。
- en: Shared Storage
  id: totrans-93
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 共享存储
- en: NNI scaling we considered in the previous section has one serious drawback.
    Training Services return only Trial metrics (`nni.report_intermediate_result`
    and `nni.report_final_result`) to Experiment host server. All Trial logs are stored
    on the machine they are executed as shown in Figure [7-8](#Fig8).
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一节中我们考虑的NNI缩放有一个严重的缺点。训练服务只向实验主机服务器返回试验指标（`nni.report_intermediate_result`和`nni.report_final_result`）。所有试验日志都存储在它们执行的机器上，如图[7-8](#Fig8)所示。
- en: '![](../images/526245_1_En_7_Chapter/526245_1_En_7_Fig8_HTML.png)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
  zh: '![图7-8](../images/526245_1_En_7_Chapter/526245_1_En_7_Fig8_HTML.png)'
- en: Figure 7-8
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: '![图7-8](../images/526245_1_En_7_Chapter/526245_1_En_7_Fig8_HTML.png)'
- en: Local logging
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 本地日志
- en: This is not convenient because the logs are located in different places.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不方便，因为日志位于不同的位置。
- en: To solve this problem, NNI provides a Shared Storage implementation that allows
    you to store all Trial logs in one place, accessible to the NNI Experiment. Figure
    [7-9](#Fig9) depicts architecture of NNI Experiment with Shared Storage.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，NNI提供了一个共享存储实现，允许您将所有试验日志存储在一个地方，NNI实验可以访问。图[7-9](#Fig9)描绘了具有共享存储的NNI实验架构。
- en: '![](../images/526245_1_En_7_Chapter/526245_1_En_7_Fig9_HTML.png)'
  id: totrans-100
  prefs: []
  type: TYPE_IMG
  zh: '![图7-9](../images/526245_1_En_7_Chapter/526245_1_En_7_Fig9_HTML.png)'
- en: Figure 7-9
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 图7-9
- en: Shared Storage
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 共享存储
- en: 'There are two ways to implement Shared Storage in Experiment: NFS and Azure
    Blob. Here is a sample configuration for NFS Shared Storage:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 在实验中实现共享存储有两种方式：NFS 和 Azure Blob。以下是 NFS 共享存储的示例配置：
- en: '[PRE20]'
  id: totrans-104
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: 'Please refer to the official documentation for more details concerning Shared
    Storage implementation: [`https://nni.readthedocs.io/`](https://nni.readthedocs.io/).'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 请参阅官方文档以获取有关共享存储实现的更多详细信息：[`https://nni.readthedocs.io/`](https://nni.readthedocs.io/)。
- en: One-Shot NAS with Checkpoints and TensorBoard
  id: totrans-106
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 带有检查点和 TensorBoard 的 One-Shot NAS
- en: 'All of the patterns we have studied in this chapter are suitable for HPO and
    Multi-trial NAS, but they are useless for One-shot NAS. Indeed, One-shot NAS is
    an exceptional case, and it has the following limitations:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 本章中我们研究过的所有模式都适用于 HPO 和 Multi-trial NAS，但它们对 One-shot NAS 无用。实际上，One-shot NAS
    是一个特例，它有以下限制：
- en: Cannot be stopped and resumed
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无法停止和恢复
- en: Does not have a visualization of the training process
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 没有训练过程的可视化
- en: Cannot be restored after an error occurs
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 发生错误后无法恢复
- en: Cannot be transferred to another server
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无法转移到另一个服务器
- en: These are pretty serious limitations, making working with such an effective
    method much more difficult. Let’s try to eliminate all these limitations on the
    example of PyTorch LeNet Supernet (ch7/one_shot_nas/pt_lenet.py) and `DartsTrainer`
    implementation.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 这些限制相当严重，使得使用这种方法的工作变得更为困难。让我们以 PyTorch LeNet Supernet（ch7/one_shot_nas/pt_lenet.py）和
    `DartsTrainer` 实现为例，尝试消除所有这些限制。
- en: '`DartsTrainer` accepts a user-defined method that calculates Supernet accuracy
    during the training process. To visualize the training process, we can use tensorboard
    logging with `SummaryWriter` that logs each training iteration’s accuracy. Listing
    [7-2](#PC22) demonstrates how to visualize training progress.'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: '`DartsTrainer` 接受用户定义的方法，该方法在训练过程中计算 Supernet 准确率。为了可视化训练过程，我们可以使用 `SummaryWriter`
    进行 tensorboard 日志记录，它会记录每次训练迭代的准确率。列表 [7-2](#PC22) 展示了如何可视化训练进度。'
- en: '(Full code is provided in the corresponding file: ch7/one_shot_nas/pt_utils.py.)'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: （完整代码在相应的文件中提供：ch7/one_shot_nas/pt_utils.py。）
- en: '[PRE21]'
  id: totrans-115
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: 'Initializing `SummaryWriter`:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 初始化 `SummaryWriter`：
- en: '[PRE22]'
  id: totrans-117
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: 'Method that calculates `Supernet` accuracy for `DartsTrainer`:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 为 `DartsTrainer` 计算 `Supernet` 准确率的方法：
- en: '[PRE23]'
  id: totrans-119
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: 'Calculating `results`:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 计算 `results`：
- en: '[PRE24]'
  id: totrans-121
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: 'Passing accuracy to TensorBoard logs:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 将准确率传递到 TensorBoard 日志中：
- en: '[PRE25]'
  id: totrans-123
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: Injecting TensorBoard logging in accuracy method allows visualizing Supernet
    training progress. But the main problem is that the One-shot NAS process is very
    fragile. If the server crashes or an `OutOfMemory` error occurs, the One-shot
    NAS process will be stopped without the possibility of resuming. This is a very
    serious risk of losing valuable results and time. Let’s try to solve this problem.
    We need to mention that One-shot NAS training uses a training loop like most neural
    networks. The One-shot NAS algorithm takes specific actions to converge to the
    optimal subnet during each training epoch. When we run the trainer `fit` method,
    we run the training loop. But this training loop can be run several times, and
    each time a new training loop will train the Supernet model from `DartsTrainer`.
    So we can split one fit method with `num_epochs` = 50 into five fit methods with
    `num_epochs` = 10\. Figure [7-10](#Fig10) illustrates this concept.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 在准确率方法中注入 TensorBoard 日志记录允许可视化 Supernet 训练进度。但主要问题是 One-shot NAS 过程非常脆弱。如果服务器崩溃或发生
    `OutOfMemory` 错误，One-shot NAS 过程将停止，且无法恢复。这是一个非常严重的风险，可能导致丢失宝贵的结果和时间。让我们尝试解决这个问题。我们需要指出，One-shot
    NAS 训练使用类似于大多数神经网络的训练循环。One-shot NAS 算法在每次训练周期中采取特定操作以收敛到最优子网。当我们运行 `fit` 训练器方法时，我们运行训练循环。但这个训练循环可以运行多次，每次都会从
    `DartsTrainer` 中重新训练 Supernet 模型。因此，我们可以将 `num_epochs` = 50 的一个 `fit` 方法分成五个 `num_epochs`
    = 10 的 `fit` 方法。图 [7-10](#Fig10) 阐述了这一概念。
- en: '![](../images/526245_1_En_7_Chapter/526245_1_En_7_Fig10_HTML.png)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_7_Chapter/526245_1_En_7_Fig10_HTML.png)'
- en: Figure 7-10
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7-10
- en: Shared Storage
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 共享存储
- en: And what we can do is dump a binary image of `DartsTrainer` between training
    subcycles creating checkpoints, as shown in Figure [7-11](#Fig11).
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以做的就是在训练子周期之间导出 `DartsTrainer` 的二进制图像，创建检查点，如图 [7-11](#Fig11) 所示。
- en: '![](../images/526245_1_En_7_Chapter/526245_1_En_7_Fig11_HTML.png)'
  id: totrans-129
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/526245_1_En_7_Chapter/526245_1_En_7_Fig11_HTML.png)'
- en: Figure 7-11
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7-11
- en: One-shot NAS with checkpoints
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 带有检查点的 One-shot NAS
- en: 'This trick allows us to solve all main problems concerning the One-shot NAS
    process:'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 这个技巧使我们能够解决与 One-shot NAS 过程相关的所有主要问题：
- en: Process can be resumed if machine crashes.
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果机器崩溃，进程可以恢复。
- en: Process can be stopped manually and resumed after.
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 进程可以手动停止并在之后恢复。
- en: Checkpoint can be moved to another machine and resumed there.
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检查点可以移动到另一台机器并在那里恢复。
- en: Listing [7-3](#PC27) demonstrates how One-shot NAS process with checkpoint dumping
    can be implemented.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 列表[7-3](#PC27)演示了如何实现带有检查点导出的单次NAS过程。
- en: 'We are using `pickle` to dump trainer binary image (please install this package
    if necessary):'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用`pickle`来导出训练器二进制图像（如果需要，请安装此包）：
- en: '[PRE26]'
  id: totrans-138
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: 'Importing other modules:'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 导入其他模块：
- en: '[PRE27]'
  id: totrans-140
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: 'Specifying trainer checkpoint path:'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 指定训练器检查点路径：
- en: '[PRE28]'
  id: totrans-142
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: 'Following method created `DartsTrainer` for LeNet Supernet:'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 以下方法为LeNet Supernet创建了`DartsTrainer`：
- en: '[PRE29]'
  id: totrans-144
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: 'The following method trains Supernet for specified number of epochs and dumps
    trainer:'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 以下方法训练Supernet指定数量的epoch，并导出训练器：
- en: '[PRE30]'
  id: totrans-146
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: 'And here is the main script that loads the trainer from binary checkpoint if
    necessary and splits the whole training loop into multiple subcycles:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是主脚本，它根据需要从二进制检查点加载训练器，并将整个训练循环拆分为多个子循环：
- en: '[PRE31]'
  id: totrans-148
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: 'Now let’s run the script (ch7/one_shot_nas/darts_train_with_checkpoint.py)
    we examined in Listing [7-3](#PC27). We can visualize One-shot NAS process with
    TensorBoard:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们运行我们之前在列表[7-3](#PC27)中检查的脚本（ch7/one_shot_nas/darts_train_with_checkpoint.py）。我们可以使用TensorBoard可视化One-shot
    NAS过程：
- en: '[PRE32]'
  id: totrans-150
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: 'And now, we can monitor Supernet training progress using the following link:
    `http://localhost:6006/#scalars`. Figure [7-12](#Fig12) demonstrates TensorBoard
    web page.'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以使用以下链接监控Supernet训练进度：`http://localhost:6006/#scalars`。图[7-12](#Fig12)展示了TensorBoard网页。
- en: '![](../images/526245_1_En_7_Chapter/526245_1_En_7_Fig12_HTML.jpg)'
  id: totrans-152
  prefs: []
  type: TYPE_IMG
  zh: '![图7-12](../images/526245_1_En_7_Chapter/526245_1_En_7_Fig12_HTML.jpg)'
- en: Figure 7-12
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 图7-12
- en: Supernet training progress
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: Supernet训练进度
- en: But the most important thing is that you can stop the execution of ch7/one_shot_nas/darts_train_with_checkpoint.py
    script and then run it again. DartsTrainer will be restored from the binary checkpoint
    file ch7/one_shot_nas/darts_trainer_checkpoint.bin and continue Supernet training.
    Figure [7-13](#Fig13) shows that `DartsTrainer` continues training from the checkpoint,
    not from scratch.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 但最重要的是，您可以停止执行ch7/one_shot_nas/darts_train_with_checkpoint.py脚本，然后再次运行它。DartsTrainer将从二进制检查点文件ch7/one_shot_nas/darts_trainer_checkpoint.bin中恢复，并继续Supernet训练。图[7-13](#Fig13)显示`DartsTrainer`从检查点继续训练，而不是从头开始。
- en: '![](../images/526245_1_En_7_Chapter/526245_1_En_7_Fig13_HTML.jpg)'
  id: totrans-156
  prefs: []
  type: TYPE_IMG
  zh: '![图7-12](../images/526245_1_En_7_Chapter/526245_1_En_7_Fig13_HTML.jpg)'
- en: Figure 7-13
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 图7-13
- en: One-shot NAS training resume
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 单次NAS训练恢复
- en: This technique allows the implementation of really long-term One-shot NAS Experiments
    without fear that the Experiment or the server will crash. You can also stop and
    resume Experiment at any convenient time.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术允许实现真正长期的单次NAS实验，无需担心实验或服务器崩溃。您还可以在任何方便的时间停止和恢复实验。
- en: Summary
  id: totrans-160
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: This chapter examined several tricks and patterns that can facilitate your user
    experience. NNI is an open source developer-friendly framework, so you can implement
    your own ideas and approaches in your research and experiments. In this chapter,
    we complete the book. I hope that you now can appreciate the effectiveness of
    using the NNI framework, and it can become an indispensable tool for your daily
    research activity.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 本章探讨了几个可以简化您用户体验的技巧和模式。NNI是一个开源的开发者友好框架，因此您可以在您的研究和实验中实现自己的想法和方法。在本章中，我们完成了本书。希望您现在能够欣赏使用NNI框架的有效性，并且它可以成为您日常研究活动不可或缺的工具。
