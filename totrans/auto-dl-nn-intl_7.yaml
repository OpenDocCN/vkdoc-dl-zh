- en: 'You can run dummy experiment that uses Trial from Listing [7-1](#PC4) using
    the following command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Once the experiment has started, you can go to the Trial jobs panel on Trails
    detail page, select Trials you want to analyze, and click TensorBoard button,
    as shown in Figure [7-3](#Fig3).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_7_Chapter/526245_1_En_7_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-3
  prefs: []
  type: TYPE_NORMAL
- en: Launching TensorBoard
  prefs: []
  type: TYPE_NORMAL
- en: After clicking the TensorBoard button, NNI starts the TensorBoard process passing
    Trial log directories as its input and redirects the browser to its web page.
    Figure [7-4](#Fig4) shows TensorBoard panel with metrics we have collected during
    dummy trials we defined in Listing [7-1](#PC4).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_7_Chapter/526245_1_En_7_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-4
  prefs: []
  type: TYPE_NORMAL
- en: TensorBoard displaying Trial metrics
  prefs: []
  type: TYPE_NORMAL
- en: NNI runs an actual TensorBoard process, so you can stop it when you’re done
    with it, as shown in Figure [7-5](#Fig5).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_7_Chapter/526245_1_En_7_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-5
  prefs: []
  type: TYPE_NORMAL
- en: Stopping TensorBoard process
  prefs: []
  type: TYPE_NORMAL
- en: Integrating TensorBoard in your NNI Experiments can help you analyze Trial results
    and whole Experiment progress.
  prefs: []
  type: TYPE_NORMAL
- en: Move Experiment to Another Server
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: All information about the Experiment is stored in the `NNI_OUTPUT_DIR/<experiment_id>`
    folder (`~/nni-experiments/<experiment_id>` by default), so you can easily move
    the experiment data to another server to resume it there. You just need to stop
    the Experiment, move the folder to another server, and resume the Experiment.
    Figure [7-6](#Fig6) illustrates this approach.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_7_Chapter/526245_1_En_7_Fig6_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-6
  prefs: []
  type: TYPE_NORMAL
- en: Moving Experiment to another server
  prefs: []
  type: TYPE_NORMAL
- en: You can use this trick if you want to move your experiment to a more powerful
    server or if you want to share the results of an experiment.
  prefs: []
  type: TYPE_NORMAL
- en: Scaling Experiments
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Scaling is the most natural approach to speed up Experiment execution. You
    can use multiple servers to distribute Trial jobs. NNI implements the Training
    Service concept. Training Service is an environment that performs Trial jobs.
    We have only used the Local Training Service in this book, which means that all
    calculations are done on the local machine. But you can organize an Experiment
    using various Remote Training Services. NNI 2.7 supports the following environments
    as Training Services:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Local**: Running Trial jobs on local machine'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Remote**: Running Trial jobs on remote machine using ssh'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**OpenPAI**: Running Trial jobs on Microsoft Open Platform for AI server'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**AML**: Running Trial jobs on Azure Machine Learning server'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Hybrid**: Allows setting several different Training Services'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Many search algorithms allow concurrent Trial execution, so you can horizontally
    scale the experiment, significantly increasing its speed. Figure [7-7](#Fig7)
    illustrates this concept.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/526245_1_En_7_Chapter/526245_1_En_7_Fig7_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-7
  prefs: []
  type: TYPE_NORMAL
- en: Horizontal scaling
  prefs: []
  type: TYPE_NORMAL
