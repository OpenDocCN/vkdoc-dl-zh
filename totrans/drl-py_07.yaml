  type: TYPE_NORMAL
- en: Categorical 51-Atom DQN (C51)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In a 2017 paper titled “A Distributional Perspective on Reinforcement Learning,”^([6](#Fn6))
    the authors argued in favor of the distributional nature of RL. Instead of looking
    at the expected values like the q-value, they looked at *Z*, a random distribution
    whose expectation is *Q*.
  prefs: []
  type: TYPE_NORMAL
- en: 'Up to now you have been outputting *Q*(*s*, *a*) values for an input state
    *s*. The number of units in the output were of size `n_action`. In a way, the
    output values were the expected *Q*(*s*, *a*) as shown here:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Q\left(s,a\right)=E\left[R\left(s,a\right)\right]+\upgamma E\left[Q\left({s}^{''},{a}^{''}\right)\right]
    $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_Equh.png)'
  prefs: []
  type: TYPE_IMG
- en: In practice you have been estimating it using the Monte Carlo technique of averaging
    over a single sample or number of samples to form an estimate ![$$ \hat{Q}\left(s,a\right)
    $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_IEq15.png) of the
    actual expected value *E*[*Q*(*s*, *a*)] as discussed earlier in chapter on TD
    learning.
  prefs: []
  type: TYPE_NORMAL
- en: 'In categorial 51-Atom DQN, for each *Q*(*s*, *a*) (i.e. one per action and
    in total `n_action` of them), you produce an estimate of the distribution of *Q*(*s*,
    *a*) values: `n_atom` (51 to be precise) values for each *Q*(*s*, *a*). The network
    is now predicting the entire distribution modeled as a categorical probability
    distribution instead of just estimating the mean value of *Q*(*s*, *a*).'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Q\left(s,a\right)={\sum}_i{z}_i{p}_i\left(s,a\right) $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_Equi.png)'
  prefs: []
  type: TYPE_IMG
- en: '*p*[*i*](*s*, *a*) is the probability that the action value at (*s*, *a*) will
    be *z*[*i*].'
  prefs: []
  type: TYPE_NORMAL
- en: You now have `n_action * n_atom` outputs, that is, `n_atom` outputs for each
    value of `n_action`. Further, these outputs are probabilities. For one action,
    you have `n_atom` probabilities, and these are the probability of the q-value
    being in any one of the `n_atom` discrete values in the range `V_min` to `V_max`.
    Refer to refer to the paper for more details.
  prefs: []
  type: TYPE_NORMAL
- en: In the C51 version of distributional RL, the authors took *i* to be 51 atoms
    (support points) over the values -10 to 10\. You will use the same setup in the
    code. As these values are parameterized in the code, you are welcome to change
    them and explore the impact.
  prefs: []
  type: TYPE_NORMAL
- en: After the Bellman updates are applied, the values shift and may not fall on
    the 51 support points. There is a step of projection to bring back the probability
    distribution to the support points of 51 atoms, that is, to the immediate value
    of *z*[*i*].
  prefs: []
  type: TYPE_NORMAL
- en: The loss is also replaced from the mean squared error to cross-entropy loss.
    The agent is trained using an *ε*-greedy policy, similar to DQN. The math is fairly
    involved, and it will be a good exercise for you to go through the paper together
    with the code to link each code line to the specific detail in the paper. This
    is an important skill a practitioner of RL needs to have.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s now look at code. Similar to the DQN approach, you have the `CategoricalDQN`
    class, as shown in Listing [7-8](#PC8), which is the neural network that takes
    the state *s* as input to produce the distribution *Z* of *Q*(*s*, *a*). There
    is a function to calculate the TD loss: `td_loss_categorical_dqn`. As discussed
    earlier, you need a projection step to bring the values back to the `n_atom` support
    points, which is carried out in the `compute_projection` function. The `compute_projection`
    function is used inside `td_loss_categorical_dqn` while calculating the loss.
    The rest of the training remains the same as before.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: Figure [7-9](#Fig9) shows the training curves for running this through the `CartPole`
    environment.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_7_Chapter/502835_2_En_7_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 2 graphs. Left. Mean return per episode with an increasing curve having fluctuating
    peaks between (0, 10) and (30, 220). Right. T D loss history with a decreasing
    curve that begins at (0, 7.2), peaks at (10, 7.6), and drops to (500, 2.25). The
    values are approximate.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 7-9
  prefs: []
  type: TYPE_NORMAL
- en: Categorical 51 Atom DQN (C51) training graph
  prefs: []
  type: TYPE_NORMAL
- en: Quantile Regression DQN
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A little after the paper on C51 algorithm was published in mid-2017, some of
    the original authors with a few additional ones, all from DeepMind, came up with
    a variant that they called *Quantile Regression DQN*. In a paper titled “Distributional
    Reinforcement Learning with Quantile Regression,”^([7](#Fn7)) the authors used
    a slightly different approach than the original C51, however, in the same focus
    area of distribution RL.
  prefs: []
  type: TYPE_NORMAL
- en: Similar to the C51 approach of distributional RL, the QR-DQN approach also depended
    on using quantiles to predict the distribution of *Q*(*s*, *a*) instead of predicting
    an estimate of the average of *Q*(*s*, *a*). Both C51 and QR-DQN are variants
    of distributional RL and were produced by scientists from DeepMind.
  prefs: []
  type: TYPE_NORMAL
- en: The C51 approach modeled the distribution of *Q*^(*π*)(*s*, *a*) named *Z*^(*π*)(*s*,
    *a*) as a categorical distribution of probability over fixed points in the range
    of *V*[*min*] to *V*[*max*]. The probability over these points was learned by
    the network. Such an approach resulted in use of a *projection* step after the
    Bellman update to bring the new probabilities back to the fixed support points
    of `n_atoms`, spread uniformly over *V*[*min*] to *V*[*max*]. While the result
    worked, there was a bit of disconnect with the theoretical basis on which the
    algorithm was derived.
  prefs: []
  type: TYPE_NORMAL
- en: 'In QR-DQN, the approach is slightly different. The support points are still
    N but now the probabilities were fixed to 1/N with the location of these points
    being learned by the network. To quote the authors:'
  prefs: []
  type: TYPE_NORMAL
- en: '*We “transpose” the parametrization from C51: whereas the former uses N fixed
    locations for its approximation distribution and adjusts their probabilities,
    we assign fixed, uniform probabilities to N adjustable locations*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The DQN network for QR DQN is similar to C51 DQN, as shown in Listing [7-9](#PC9).
    The network takes a batch of states to produce the distribution *Z* of *Q*(*s*,
    *a*).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: The loss used in QR DQN is that of quantile regression loss mixed with Huber
    loss and called *Quantile Huber loss*. Equations 9 and 10 in the linked paper
    give the details. I do not provide the code listings as I want you to read the
    paper and match the equations in the paper with the code in the `7.f- qr_dqn.ipynb`
    notebook. The paper is dense with mathematics, so unless you are very comfortable
    with advanced math, you should try to focus on the higher-level details of the
    approach.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [7-10](#Fig10) shows the training reward and loss curves.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_7_Chapter/502835_2_En_7_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 2 graphs. Left. Mean reward per episode with an increasing line between (0,
    0) and (5, 1000) with a sharp bend at (4, 25). Right. T D loss history with a
    decreasing line between (0, 1.3) and (1, 1.195). The values are approximate.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 7-10
  prefs: []
  type: TYPE_NORMAL
- en: Quantile regression DQN
  prefs: []
  type: TYPE_NORMAL
- en: Hindsight Experience Replay
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In the 2018 paper by OpenAI titled “Hindsight Experience Replay,”^([8](#Fn8))
    the authors presented a sample efficient approach to learn in an environment where
    the rewards are sparse. The common approach is to shape the reward function in
    a way to guide the agents toward optimization. This is not generalizable.
  prefs: []
  type: TYPE_NORMAL
- en: Compared to RL agents, which learn from a successful outcome, humans seem to
    learn not just from that but also from unsuccessful outcomes. This is the basis
    of the idea proposed in the hindsight replay approach known as *hindsight experience
    replay* (HER). While HER can be combined with various RL approaches, in this code
    walk-through, you will use HER with dueling DQN, called HER-DQN.
  prefs: []
  type: TYPE_NORMAL
- en: In the HER approach, after an episode is played out, say an unsuccessful one,
    you form a secondary objective where the original goal is replaced with the last
    state before termination as a goal for this trajectory.
  prefs: []
  type: TYPE_NORMAL
- en: 'Say an episode has been played out *s*[0], *s*[1], …. *s*[*T*]. Normally you
    store a tuple of (*s*[*t*], *a*[*t*], *r*, *s*[*t* + 1], *done*) in the replay
    buffer. Let’s say the goal for this episode was *g* which could not be achieved
    in this run. In the HER approach, you will store the following in the replay buffer:'
  prefs: []
  type: TYPE_NORMAL
- en: (*s*[*t*]| |*g*, *a*[*t*], *r*, *s*[*t* + 1]| ∣ *g*, *done*)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '(*s*[*t*]| |*g*^′, *a*[*t*], *r*(*s*[*t*], *a*[*t*], *g*^′), *s*[*t* + 1]| ∣ *g*^′,
    *done*): other state transitions based on synthetical goals like last state of
    the episode as a sub-goal say g’. The reward is modified to show how state transition
    *s*[*t*] → *s*[*t* + 1] was good or bad for the sub-goal of *g*^′.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The original paper discusses various strategies for forming these subgoals.
    You will use the one called `future`:'
  prefs: []
  type: TYPE_NORMAL
- en: '`future` replays with k random states which come from the same episode as the
    transition being replayed and were observed after it.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You will also use a different kind of environment from past notebooks. You will
    use an environment of bit-flipping experiment. Say you have a vector with n-bits,
    each being binary in the range {0,1}. Therefore, there are 2^(*n*) combinations
    possible. At reset, the environment starts in a n-bit configuration chosen randomly
    and the goal is also randomly picked to be some different n-bit configuration.
    Each action is to flip a bit. The bit to be flipped is the policy π(*a*| *s*)
    that agent is trying to learn. An episode ends if the agent finds the right configuration
    matching the goal or when agent has exhausted *n* actions in an episode.
  prefs: []
  type: TYPE_NORMAL
- en: Listing [7-10](#PC10) contains the code for the environment. The complete code
    is in the `7.g-her_dqn.ipynb` notebook.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: You have implemented your own `render` and `step` functions so that the interface
    of this environment remains similar to the ones in Gymnasium and so that you can
    use the previously developed machinery. The `compute_reward` custom function returns
    the `reward` and `done` flags when given the input of a state and a goal.
  prefs: []
  type: TYPE_NORMAL
- en: The authors show that, with a regular DQN, where the state (configuration of
    n-bits) is represented as a deep network, it is almost impossible for a regular
    DQN agent to learn beyond 15-digit combinations. However, coupled with the HER-DQN
    approach, the agent is able to learn easily, even for large-digit combinations
    like 50 or so. Figure [7-11](#Fig11) shows the complete pseudocode from the paper
    with certain modifications to make it match with the notations.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_7_Chapter/502835_2_En_7_Fig11_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: An algorithm of hindsight experience replay. The inputs are an off-policy algorithm,
    a strategy of sampling goals for replay, and a reward function. It initializes
    neural network A and replay buffer R, uses various loops and commands, and finally
    performs one step of gradient descent.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 7-11
  prefs: []
  type: TYPE_NORMAL
- en: HER using a future strategy
  prefs: []
  type: TYPE_NORMAL
- en: You use dueling DQN, which is similar to the one used for `CartPole` earlier
    in this chapter. For the BitFlipping environment, you use a smaller version of
    the same network. The most interesting part of the code is the implementation
    of the HER algorithm, as per the pseudocode given in Figure [7-11](#Fig11).
  prefs: []
  type: TYPE_NORMAL
- en: Let’s look at the way replay buffer is filled. There are two ways as discussed
    previously. The first is to fill the replay buffer usual way just with the difference
    that you augment the states with the goal as depicted by (*s*[*t*]| |*g*, *a*[*t*],
    *r*, *s*[*t* + 1]| ∣ *g*, *done*). The more interesting part is the additional
    transitions that are filled into the buffer using synthetic goals, that is, (*s*[*t*]|
    |*g*^′, *a*[*t*], *r*(*s*[*t*], *a*[*t*], *g*^′), *s*[*t* + 1]| ∣ *g*^′, *done*).
    You use the *future* sampling strategy among the many options that are discussed
    in the paper. The future strategy involves replay with k random states as synthetic
    goals *g*^′ which come from the same episode as the transition being replayed
    and were observed after it. The reward *r*(*s*[*t*], *a*[*t*], *g*^′) is 0 if
    the bits of *s*[*t*] and *g*^′. The reward is -1 if these two do not match. Listing
    [7-11](#PC11) shows the way this is accomplished. This is part of the overall
    `train_her` agent training function in the `7.g-her_dqn.ipynb` notebook.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: Figure [7-12](#Fig12) shows the training curve. For a 50-bit `BitFlipping` environment,
    the agent with HER can successfully solve the environment 100 percent of the time.
    Remember, the environment starts with a random combination of 50 bits and has
    another random combination as the goal. The agent has a maximum of 50 flipping
    moves to reach the goal combination. An exhaustive search would require the agent
    to try each of the 2^(50) combinations except the one it started with.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_7_Chapter/502835_2_En_7_Fig12_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A graph of success rate versus epoch for the number of bits = 50 indicates an
    increasing curve. It remains stable from (0, 0) to (5, 0), increases till (22.5,
    1), and stabilizes till (40, 1). The values are approximate.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 7-12
  prefs: []
  type: TYPE_NORMAL
- en: 'Success rate graph: bit flipping environment with HER using a future strategy'
  prefs: []
  type: TYPE_NORMAL
- en: This brings you to the end of discussion on HER as well as to the end of chapter.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This was a short but dense chapter, where you looked at various modifications
    to the vanilla DQN.
  prefs: []
  type: TYPE_NORMAL
- en: The chapter began by looking at prioritized replay, where the samples from the
    buffer are picked based on a certain importance score assigned to them proportional
    to the magnitude of the TD error.
  prefs: []
  type: TYPE_NORMAL
- en: Following this, you revisited double Q-learning in the context of DQN, known
    as double DQN. This is an approach that impacts the way learning takes place and
    attempts to reduce the maximization bias.
  prefs: []
  type: TYPE_NORMAL
- en: You then looked at dueling DQN in which two networks with an initial shared
    network were used. This was followed by NoisyNets in which ε-greedy exploration
    was replaced by noisy layers.
  prefs: []
  type: TYPE_NORMAL
- en: Next, you looked at two flavors of distributional RL under which the network
    produced *Z*, a distribution of q-values. Instead of producing the expected action-value
    *Q*(*S*, *A*), in Distributional RL, the whole distribution is produced, specifically
    a categorical distribution. You also saw the use of the projection step and losses
    like *cross entropy* and *quantile Huber loss*.
  prefs: []
  type: TYPE_NORMAL
- en: The last section was on hindsight experience replay, which addresses learning
    in environments with sparse rewards. Previous learning approaches were centered
    on learning only from successful outcomes, but hindsight replay allows you to
    learn from unsuccessful outcomes as well.
  prefs: []
  type: TYPE_NORMAL
- en: Many of the algorithms and approaches you saw in this chapter are state-of-the-art
    research. You will gain a lot by looking at the original papers as well as going
    through the code line by line. I have also suggested the various combinations
    that you could try to code to further cement the concepts in your mind.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter concludes the exploration of value-based methods, where you learn
    a policy by first learning with *V* or *Q* functions and then use these to find
    an optimal policy. The next chapter switches to policy-based methods, where you
    find the optimal policy without the involvement of the intermediary step of learning
    *V*/*Q* functions.
  prefs: []
  type: TYPE_NORMAL
