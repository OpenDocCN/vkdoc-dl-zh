- en: 7. Improvements to DQN**
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This chapter looks at various enhancements and variations to DQN. Specifically,
    it looks at Prioritized Replay, DDQN (Double Q-Learning), Dueling DQN, NoisyNets
    DQN, C-51 (Categorical 51-Atom DQN), Quantile Regression DQN, and Hindsight Experience
    Replay. All the examples in this chapter are coded using PyTorch. This is an optional
    chapter with each variant of DQN as a standalone topic. You can skip this chapter
    in the first pass and come back to it when you want to explore specific variants
    of DQN.
  prefs: []
  type: TYPE_NORMAL
- en: The first variant of DQN covered in this chapter is prioritized replay.
  prefs: []
  type: TYPE_NORMAL
- en: Prioritized Replay
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In the previous chapter, you saw how to use a batch version of updates in DQN
    that addresses some key issues in the online version, such as updates being done
    with each transition and a transition being discarded right after that one step
    of learning. The following are the key issues in the online versions:'
  prefs: []
  type: TYPE_NORMAL
- en: The training samples (transitions) are correlated, breaking i.i.d. (independent
    identically distributed) assumptions. With online learning, you have correlated
    transitions in a sequence. Each transition is linked to the previous one. This
    breaks the i.i.d. assumption that is required to apply a gradient descent.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As the agent learns and discards, it might never get to visit the initial exploratory
    transitions. If the agent goes down a wrong path, it will keep seeing examples
    from that part of the state space. It may settle on a suboptimal solution.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With neural networks, learning on a single transition basis is hard and inefficient.
    There will be too much variance for the neural networks to learn anything effective.
    Neural networks work best when they learn in batches of training samples.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These were addressed in DQN by using an experience replay where all transitions
    are stored. Each transition is a tuple of `state, action, reward, next_state and
    done`. As the buffer gets full, you discard old samples to add new ones. You then
    sample a batch from the current buffer with each transition in the buffer having
    equal probability of being selected in a batch. It allows rare and more exploratory
    transitions to be picked multiple times from the buffer. However, a plain-vanilla
    *experience replay* does not have any way to choose the important transitions
    with some priority. Would it help to somehow assign an importance score to each
    transition stored in the replay buffer and sample the batch from the buffer using
    these importance scores as the probability of selection, assigning a higher probability
    of selection to important transitions as signified by their respective importance
    score?
  prefs: []
  type: TYPE_NORMAL
- en: This is what the authors of the paper “Prioritized Experience Replay”^([1](#Fn1))
    from DeepMind explored in 2016\. This chapter follows the main concepts of that
    paper to create your own implementation of experience replay and apply it to the
    DQN agent for the `CartPole` environment. I start by talking a little bit about
    how these importance scores are assigned and how the loss *L* is modified.
  prefs: []
  type: TYPE_NORMAL
- en: 'The key approach of this paper is to assign importance scores to training samples
    in the buffer using their TD errors. When a batch of samples is picked from the
    buffer, you calculate the TD error as part of the loss *L* calculation. The TD
    error is given by this equation:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\updelta}_i={r}_i+\left(\left(1- don{e}_i\right).\gamma .\underset{a^{\prime
    }}{\max}\hat{q}\left({s}_i^{\prime },{a}^{\prime };{w}_t^{-}\right)\right)\hbox{--}
    \hat{q}\left({s}_i,{a}_i;{w}_t\right) $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_Equ1.png)'
  prefs: []
  type: TYPE_IMG
- en: (7-1)
  prefs: []
  type: TYPE_NORMAL
- en: 'This appears inside Equation [6-3](502835_2_En_6_Chapter.xhtml#Equ3) where
    you calculate the loss. The error is squared and averaged over all samples to
    calculate the magnitude of updates to weight vectors, as shown in Equations [6-4](502835_2_En_6_Chapter.xhtml#Equ4)
    and [6-5](502835_2_En_6_Chapter.xhtml#Equ5). The magnitude of TD error δ[*i*]
    denotes the contribution that the sample transition *(i)* would have on the update.
    The authors used this reasoning to assign an importance score *p*[*i*] to each
    sample, where *p*[*i*] is given by this equation:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\mathrm{p}}_{\mathrm{i}}=\left|{\updelta}_{\mathrm{i}}\right|+\varepsilon
    $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_Equ2.png)'
  prefs: []
  type: TYPE_IMG
- en: (7-2)
  prefs: []
  type: TYPE_NORMAL
- en: A small constant ϵ is added to avoid the edge case of *p*[*i*] being 0 when
    TD error δ[*i*] is 0\. When a new transition is added to the buffer, you assign
    it the max of *p*[*i*] across all current transitions in the buffer. The reason
    for doing that is to increase the chance of this transition getting picked when
    you sample a batch of transitions for TD learning. When a batch is picked for
    training, you calculate the TD error δ[*i*] of each sample as part of the loss/gradient
    calculation. The TD error as calculated is then used to update the importance
    score of these samples in the buffer.
  prefs: []
  type: TYPE_NORMAL
- en: There is another approach of rank-based prioritization that the paper talks
    about. Using that approach, ![$$ {p}_i=\frac{1}{\mathit{\operatorname{rank}}(i)}
    $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_IEq1.png), where
    *rank*(*i*) is the rank of transition (i) when the replay buffer transitions are
    sorted based on |δ[*i*]|.
  prefs: []
  type: TYPE_NORMAL
- en: 'In the sample code, you will be using the first approach, which is called *proportional
    prioritization*. Next, at the time of sampling, you convert *p*[*i*] to probabilities
    by using the following equation:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ P(i)=\frac{p_i^{\upalpha}}{\sum_i{p}_i^{\upalpha}} $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_Equ3.png)'
  prefs: []
  type: TYPE_IMG
- en: (7-3)
  prefs: []
  type: TYPE_NORMAL
- en: Here, *P*(*i*) denotes the probability of transition (i) in the buffer getting
    sampled while picking the training batch. This assigns a higher sampling probability
    to the transitions that have a higher TD error. Here, *α* is a hyperparameter,
    which was tuned using grid search, and the authors found α = 0.6 to be the best
    for the proportional variant that you will be implementing.
  prefs: []
  type: TYPE_NORMAL
- en: 'The previous approach of breaking the uniform sampling with some kind of sampling
    based on importance introduces bias. You need to correct the bias while calculating
    the loss *L*. In the paper, this was corrected using *importance sampling* by
    weighing each sample with weight *w*[*i*] and then summing it up to get the revised
    loss function *L*. The equation for calculating weights is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {w}_i={\left(\frac{1}{N}.\frac{1}{P(i)}\right)}^{\upbeta} $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_Equ4.png)'
  prefs: []
  type: TYPE_IMG
- en: (7-4)
  prefs: []
  type: TYPE_NORMAL
- en: Here, *N* is the number of samples in the training batch, and *P*(*i*) is the
    probability of selecting a sample as calculated in the previous expression. *β*
    is another hyperparameter. *β* = 1 fully compensates for the non-uniform sampling
    introduced by *P*(*i*) importance sampling in the previous step. You can also
    exploit the flexibility of annealing the amount of importance-sampling correction
    over time, by defining a schedule on the exponent *β* that reaches 1 only at the
    end of learning. In practice, you could linearly anneal *β* from its initial value
    *β*[0] to 1\. Note that the choice of this hyperparameter interacts with choice
    of prioritization exponent *α*; increasing both simultaneously prioritizes sampling
    more aggressively at the same time as correcting for it more strongly. In this
    example, you use a constant value of 0.4 which is taken from some of the experiments
    in the paper.
  prefs: []
  type: TYPE_NORMAL
- en: 'The weights are further normalized by ![$$ \frac{1}{ma{x}_i{w}_i} $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_IEq2.png)
    to ensure that the weights stay within bounds:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {w}_i^{IS}=\frac{1}{ma{x}_i{w}_i}{w}_i $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_Equ5.png)'
  prefs: []
  type: TYPE_IMG
- en: (7-5)
  prefs: []
  type: TYPE_NORMAL
- en: 'With these changes in place, the loss *L* equation is also updated to weigh
    each transition in the batch with *w*[*i*] as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ L=\frac{1}{N}{\sum}_{i=1}^N{\left[{r}_i+\left(\left(1- don{e}_i\right).\upgamma
    .\underset{a^{\prime }}{\max}\hat{q}\left({s}_i^{\prime },{a}^{\prime };{w}_t^{-}\right)\right)\hbox{--}
    \hat{q}\left({s}_i,{a}_i;{w}_t\right)\right]}^2.{w}_i^{IS} $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_Equ6.png)'
  prefs: []
  type: TYPE_IMG
- en: (7-6)
  prefs: []
  type: TYPE_NORMAL
- en: Notice the ![$$ {w}_i^{IS} $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_IEq3.png)
    in the equation. After *L* is calculated, you follow the usual gradient step using
    back-propagation of the loss gradient with respect to the online neural network
    weights *w* (denoted as *w*[*t*], with a subscript *t* to highlight that weights
    change with as you iterate over batches for training).
  prefs: []
  type: TYPE_NORMAL
- en: Remember, the TD error in the previous equation is used to update the importance
    score back in the replay buffer for these transitions in the current training
    batch. This completes the theoretical discussion on the prioritized replay.
  prefs: []
  type: TYPE_NORMAL
- en: You will now look at the implementation. The complete code of training a DQN
    agent with prioritized replay is given in `7.a-dqn_prioritized_replay.ipynb`.
    You are advised to study the code in detail along with the referenced paper after
    going through the explanations given here. The ability to follow the academic
    papers and match the details in the paper to working code is an important part
    of becoming a good practitioner. The explanation in this section is to just get
    you started. For a firm grasp of the material, you should follow the accompanying
    code in detail. It will be even better if you try to code it yourself after examining
    how the code works.
  prefs: []
  type: TYPE_NORMAL
- en: 'Getting back to the explanation, you first look at the prioritized replay implementation,
    which is the major change in the code from the previous DQN training notebook.
    Listing [7-1](#PC1) shows the code for prioritized replay. Most of the code is
    similar to that of the plain `ReplayBuffer` you saw earlier. You now have an additional
    array called `self.priorities` to hold the importance/priority score *p*[*i*]
    for each sample. The `add` function is modified to assign *p*[*i*] to the new
    sample being added. It is just the max of values in the array `self.priorities`.
    The `sample` function is the one that has undergone maximum change. The first
    probabilities are calculated using Equation [7-3](#Equ3), and then the weights
    are calculated using Equations [7-4](#Equ4) and [7-5](#Equ5). The function now
    returns two additional arrays: the array of weights `np.array(weights)` and the
    array of index `np.array(idxs)`. The array of indexes contains the index of the
    samples in the buffer that were sampled in the batch. This is required so that
    after the calculation of TD error in the loss step, you can update the priority/importance
    back in the buffer. The `update_priorities(idxs, new_priorities)` function is
    exactly for that purpose.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Next, let’s look at the loss calculation. The code is almost similar to the
    TD loss computation you saw in Listing [6-3](502835_2_En_6_Chapter.xhtml#PC4).
    There are two changes. The first is multiplying the TD error with weights, in
    line with Equation [7-6](#Equ6). The second change is calling `update_priorities`
    from inside the function to update the priorities back in the buffer. The function
    now takes two new arguments. First one is `weights`, which is denoted as ![$$
    {w}_i^{IS} $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_IEq4.png)
    in Equation [7-6](#Equ6). The second argument is `buffer_idxs` and it is used
    to update the priorities of the transitions forming the training batch. Listing
    [7-2](#PC2) highlights the code changes of the revised `compute_td_loss_priority_replay`
    function.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: The training code remains the same as before. You can look at the `7.a-dqn-prioritized-replay.ipynb`
    notebook to see the details. As before, you train the agent, and you can see that
    the agent learns to balance the pole really well with this approach. Figure [7-1](#Fig1)
    shows the training curves.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_7_Chapter/502835_2_En_7_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 2 graphs. Left. Mean return per episode. A fluctuating curve that increases
    between (0, 0) and (47, 1000) with 3 lowest peaks at (22, 220), (25, 420), and
    (31, 220). Right. It is bell-shaped with fluctuation between (0, 0) and (2000,
    0) with its peak at (600, 17). The values are approximate.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 7-1
  prefs: []
  type: TYPE_NORMAL
- en: Training curve for DQN agent with prioritized experience replay on CartPole
  prefs: []
  type: TYPE_NORMAL
- en: The paper has lot more to say about the theoretical background of prioritized
    replay and why it can help. Plus the paper also talks about the impact it has
    on Atari games as well as how such an approach could be used for supervised learning
    with class imbalances. This completes the section on prioritized replay. You are
    advised to refer to the original paper and code notebooks for further details.
  prefs: []
  type: TYPE_NORMAL
- en: Double DQN (DDQN)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The authors of the paper “Deep Reinforcement Learning with Double Q-Learning”^([2](#Fn2))
    explore the possibility and show that DQN algorithm, which combines Q-learning
    with a deep neural network, suffers from substantial overestimations, especially
    in some Atari games. The authors then propose the idea of applying double Q-learning
    to DQN calling it *double DQN*. The idea of double Q-learning is to reduce overestimations
    by decomposing the max operation in the target into two separate steps of selection
    of action and evaluation of the selected action. Although not fully decoupled,
    the target network in the DQN architecture provides a natural candidate for the
    second value function, without having to introduce additional networks. The authors
    therefore propose to evaluate the greedy policy according to the online network,
    but using the target network to estimate its value.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s look at the max operation in the regular DQN. You calculate the TD target
    as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {Y}^{DQN}=r+\upgamma .\underset{a^{\prime }}{\max}\hat{q}\left({s}^{\prime
    },{a}^{\prime };{w}_t^{-}\right) $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_Equ7.png)'
  prefs: []
  type: TYPE_IMG
- en: (7-7)
  prefs: []
  type: TYPE_NORMAL
- en: 'I have simplified the equation a bit by dropping the subscript (*i*) as well
    as removing the `(1-done)` multiplier, which drops the second term for the terminal
    state. I have done so to keep the explanation uncluttered. Now, let’s unwrap this
    equation by moving the *max* inside. The previous update can be equivalently written
    as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \mathrm{r}+\upgamma .\hat{q}\left({s}^{\prime },\mathit{\arg}\underset{a^{\prime
    }}{\mathit{\max}}\hat{q}\left({s}^{\prime },{a}^{\prime };{w}_t^{-}\right);{w}_t^{-}\right)
    $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_Equa.png)'
  prefs: []
  type: TYPE_IMG
- en: 'I have moved the `max` inside by first taking the max action and then taking
    the q-value for that `max` action. This is similar to directly taking the max
    q-value. In the previous unwrapped equation, you can clearly see that you are
    using the same network weight ![$$ {w}_t^{-} $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_IEq5.png),
    first for selecting the best action and then for getting the q-value for that
    action. This is what causes maximization bias. The authors of the paper suggested
    an approach that they called double DQN (DDQN), where the weight for selecting
    the best action, ![$$ \mathit{\arg}\underset{a^{\prime }}{\mathit{\max}}\hat{q}\left({s}^{\prime
    },{a}^{\prime}\right) $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_IEq6.png),
    comes from the online network with weight *w*[*t*] and then the target network
    with weight ![$$ {w}_t^{-} $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_IEq7.png)
    is used to select the q-value for that best action. This change results in the
    updated TD target as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \mathrm{r}+\upgamma .\hat{q}\left({s}^{\prime },\mathit{\arg}\underset{a^{\prime
    }}{\mathit{\max}}\hat{q}\left({s}^{\prime },{a}^{\prime };{w}_t\right);{w}_t^{-}\right)
    $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_Equ8.png)'
  prefs: []
  type: TYPE_IMG
- en: (7-8)
  prefs: []
  type: TYPE_NORMAL
- en: 'Note that the inner network for selecting the best action is now using online
    network weights *w*[*t*]. Everything else remains the same. You calculate the
    loss as before and then use the gradient step to update the weights of the online
    network. You also periodically update the target network weights with the weights
    from the online network. The updated loss function that you use is as follows
    (bringing back the *done* flag and index *i*):'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {Y}_i^{DDQN}={r}_i+\left(\left(1- don{e}_i\right).\gamma .\hat{q}\left({s}_i^{\prime
    },\arg \underset{a^{\prime }}{\max}\hat{q}\left({s}_i^{\prime },{a}^{\prime };{w}_t\right);{w}_t^{-}\right)\right)
    $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_Equ9.png)'
  prefs: []
  type: TYPE_IMG
- en: (7-9)
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ L=\frac{1}{N}{\sum}_{i=1}^N{\left[{Y}_i^{DDQN}\hbox{--} \hat{q}\left({s}_i,{a}_i;{w}_t\right)\right]}^2
    $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_Equ10.png)'
  prefs: []
  type: TYPE_IMG
- en: (7-10)
  prefs: []
  type: TYPE_NORMAL
- en: 'The authors show that the double DQN approach leads to significant reduction
    in overestimation bias, which in turn leads to better policies. Let’s now look
    at the implementation details. The only thing that will change as compared to
    the DQN implementation is the way loss is calculated. You use Equations [7-9](#Equ9)
    and [7-10](#Equ10) to calculate the loss. Everything else—including the DQN policy
    agent code, the replay buffer, and the way training is carried out to step through
    back-propagation of gradients—remains the same. Listing [7-3](#PC3) shows the
    revised loss function calculation. You calculate the current q-value with `q_s
    = agent(states)` and then, for each row, pick the q-value corresponding to the
    action *a*[*i*]. These action-values are stored in `q_s_a`. You then use the agent
    network with weight *w* (*w*[*t*] with iteration time index *t*) to calculate
    the q-values for the next states: `q_s1 = agent(next_states)`. The `q_s1` tensor
    is used to find the best action for each row with `a1_max = torch.max(q_s1, dim=1)`,
    and then you use the target network with the best action to find the target q-value:
    `q_s1=agent(next_states)` and then `q_s1_a1max = q_s1_target[range(len(a1max)),
    a1max]`. The rest of the code for TD loss calculations remains the same.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Running DDQN on `CartPole` produces the training graph shown in Figure [7-2](#Fig2).
    You may not notice a big difference, as `CartPole` is too simple a problem to
    show the benefits. In addition, the training algorithm is running for a small
    number of episodes to demonstrate the algorithms. For quantified benefits of the
    approach, you should look at the referenced paper.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_7_Chapter/502835_2_En_7_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 2 graphs. Left. Mean return per episode. It has an increasing curve with more
    fluctuation between (0, 0) and (25, 300). Right. T D loss history. It has a fluctuating
    bell curve between (0, 8) and (400, 3) with its peak at (200, 47). The values
    are approximate.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 7-2
  prefs: []
  type: TYPE_NORMAL
- en: Training curve for DDQN on CartPole from `7.b-ddqn.ipynb`
  prefs: []
  type: TYPE_NORMAL
- en: This completes the discussion on DDQN. The next section covers dueling DQN.
  prefs: []
  type: TYPE_NORMAL
- en: Dueling DQN
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Up until now, all of your networks took in state *S* and produced the q-values
    *Q*(*S*, *A*) for all actions *A* in the state *S*. Figure [6-1](502835_2_En_6_Chapter.xhtml#Fig1)
    shows a sample of such a network. However, many times in a particular state, there
    is no impact from taking any specific action. Consider the case that a car is
    driving in the middle of road and there are no cars around it. In such a scenario,
    the action of taking a slight left or right, or speeding a bit or breaking a bit,
    has no impact; these actions all produce similar q-values. Is there a way to separate
    the average value in a state and the advantage of taking a specific action over
    that average? That’s the approach that the authors of the paper titled “Dueling
    Network Architectures for Deep Reinforcement Learning”^([3](#Fn3)) took in 2016\.
    They showed that it led to significant improvements, and the improvement was higher
    as the number of possible actions in a state grew.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s derive the computation that the dueling DQN network performs. You saw
    the definition of state-value and action-value functions in Chapter [2](502835_2_En_2_Chapter.xhtml)
    in Equations [2-9](502835_2_En_2_Chapter.xhtml#Equ9) and [2-10](502835_2_En_2_Chapter.xhtml#Equ10),
    which are reproduced here:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {v}_{\uppi}(s)={E}_{\uppi}\left[{G}_t|{S}_t=s\right] $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_Equb.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {q}_{\pi}\left(s,a\right)={E}_{\pi }\ \left[\ {G}_t\ \right|\ {S}_t=s,{A}_t=a\
    \Big] $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_Equ11.png)'
  prefs: []
  type: TYPE_IMG
- en: (7-11)
  prefs: []
  type: TYPE_NORMAL
- en: 'Then, in Chapter [5](502835_2_En_5_Chapter.xhtml) on function approximation,
    you saw these equations change a bit with the introduction of parameters *w* when
    you switched to representing the state/action values as parameterized functions:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \hat{v}\left(s;w\right)\approx {v}_{\pi }(s) $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_Equc.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ \hat{q}\left(s,a;w\right)\approx {q}_{\pi}\left(s,a\right) $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_Equ12.png)'
  prefs: []
  type: TYPE_IMG
- en: (7-12)
  prefs: []
  type: TYPE_NORMAL
- en: Both sets of Equations [7-11](#Equ11) and [7-12](#Equ12) show that *v*[π] measures
    the value of being in a state in general, and *q*[π] shows the value of taking
    a specific action from the state *S*. If you subtract *Q* from *V*, you get something
    that is called *advantage A*. Note that there is a bit of overload of notations.
    *A* inside *Q*(*S*, *A*) represents action, and *A*[π] on the left side of equation
    represents the advantage of taking an action *a*.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {A}_{\uppi}\left(s,a\right)={Q}_{\uppi}\left(s,a\right)-{V}_{\uppi}(s)
    $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_Equd.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The authors created a network that takes in a state *S* as input and, after
    a few layers of network, produces two streams—one giving state value *V* and another
    giving advantage *A* with part of the network being individual sets of layers,
    one for *V* and one for *A*. Finally, the last layer combines advantage *A* and
    state value *V* to recover *Q* by rearranging the Equation [7-13](#Equ13):'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {Q}_{\uppi}\left(s,a\right)={V}_{\uppi}(s)+{A}_{\uppi}\left(s,a\right)
    $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_Equ13.png)'
  prefs: []
  type: TYPE_IMG
- en: (7-13)
  prefs: []
  type: TYPE_NORMAL
- en: Figure [7-3](#Fig3) shows a representative network architecture for the same.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_7_Chapter/502835_2_En_7_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A network model has 2 C N Ns connected to a flatten layer. It is distributed
    into 2 dense layers. They are connected to V of s and A of s, a, respectively,
    and converge into Q of s, a. The function reads, Q of s, a = V of s + A of s,
    a, minus 1 over modulus of a, sigma a, A of s, a.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 7-3
  prefs: []
  type: TYPE_NORMAL
- en: Dueling network. The network has a common set of weights in the initial layers,
    denoted as *w*[1], and then it branches off to have one set of weights *w*[2,]
    producing value *V* and another set of weights *w*[3], producing advantage *A*
  prefs: []
  type: TYPE_NORMAL
- en: 'Before you proceed, let’s rewrite Equation [7-13](#Equ13) with weights *w*[1],
    *w*[2], *w*[3] explicitly shown in expression. The revised equation looks like
    this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \hat{Q}\left(s,a;{w}_1,{w}_2,{w}_3\right)=\hat{V}\left(s;{w}_1,{w}_2\right)+\hat{A}\left(s,a;{w}_1,{w}_3\right)
    $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_Equ14.png)'
  prefs: []
  type: TYPE_IMG
- en: (7-14)
  prefs: []
  type: TYPE_NORMAL
- en: Do you notice a problem in learning this kind of expression where you estimate
    *V* and *A* independently? There is no unique *V* and *A* that represent the *Q*.
    If you add a constant term to *V* and subtract the same term from *A*, the expression
    for *Q*[π] remains unchaned. Therefore, this network will not learn a unique *V*,
    the state value. The combined network could learn correct *Q* for all the states
    but the state values *V* for each state could be shifted by some random amount
    individually, making it hard to use *V* as a true representative of the state
    values.
  prefs: []
  type: TYPE_NORMAL
- en: One way to force this issue of identifiability/uniqueness the authors suggested
    to force the advantage to have zero value for the chosen action, that is,. an
    action with maximum advantage.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \hat{Q}\left(s,a;{w}_1,{w}_2,{w}_3\right)=\hat{V}\left(s;{w}_1,{w}_2\right)+\left(\hat{A}\left(s,a;{w}_1,{w}_3\right)-\underset{a''}{\max}\hat{A}\left(s,{a}^{''};{w}_1,{w}_3\right)\right)
    $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_Equ15.png)'
  prefs: []
  type: TYPE_IMG
- en: (7-15)
  prefs: []
  type: TYPE_NORMAL
- en: The authors in the study found an alternative formulation to offer better stability
    where the `max` operation was replaced by an average.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \hat{Q}\left(s,a;{w}_1,{w}_2,{w}_3\right)=\hat{V}\left(s;{w}_1,{w}_2\right)+\left(\hat{A}\left(s,a;{w}_1,{w}_3\right)-\frac{1}{\left|{a}^{\prime}\right|}{\sum}_{a^{\prime
    }}\hat{A}\left(s,{a}^{\prime };{w}_1,{w}_3\right)\right) $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_Equ16.png)'
  prefs: []
  type: TYPE_IMG
- en: (7-16)
  prefs: []
  type: TYPE_NORMAL
- en: On the one hand, this loses the original semantics of V and A because they are
    now off-target by a constant, but on the other hand it increases the stability
    of the optimization. With Equation [7-16](#Equ16) the advantages only needs to
    change as fast as the mean, instead of having to compensate any change to the
    optimal action’s advantage in 7-15.
  prefs: []
  type: TYPE_NORMAL
- en: In the previous equation, weight *w*[1] corresponds to the initial common part
    of the network, *w*[2] corresponds to the part of the network that predicts state
    value ![$$ \hat{V} $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_IEq8.png),
    and finally *w*[3] corresponds to the part of network that predicts advantage
    ![$$ \hat{A} $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_IEq9.png).
  prefs: []
  type: TYPE_NORMAL
- en: The authors named this architecture *dueling networks* as it has two networks
    fused together with an initial common part. Since the dueling network is at the
    agent network level, it is independent of the other components like the type of
    replay buffer or the way the weights are learned (i.e., simple DQN or double DQN).
    Accordingly, you can use the dueling network independent of the type of replay
    buffer or the type of learning. In this walk-through, you will be using a simple
    replay buffer with uniform probability of selection for each transition in the
    buffer. Further, you will be using a DQN agent.
  prefs: []
  type: TYPE_NORMAL
- en: The authors studied the improvement of this approach over a baseline single
    network, as shown Figure [7-4](#Fig4). It clearly shows the benefit of a dueling
    architecture.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_7_Chapter/502835_2_En_7_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A horizontal bar graph with the names of games and their corresponding percentages.
    It has a decreasing trend from top to bottom. The highest is Atlantis with 296.67%
    and the lowest is Freeway with negative 100%.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 7-4
  prefs: []
  type: TYPE_NORMAL
- en: 'Improvements of a dueling architecture over a baseline single network Source:
    Fig 4 of the paper^([4](#Fn4))'
  prefs: []
  type: TYPE_NORMAL
- en: Compared to the notebook for vanilla DQN—`6.a-dqn_pytorch.ipynb`—the only change
    is the way the network is constructed. Listing [7-4](#PC4) shows the code for
    the dueling agent network.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: You have two layers in a common network (`self.fc1` and `self.fc2`). For *V*
    prediction, you have another two layers (`self.fc_value` and `self.value`) on
    top of `fc1` and `fc2`. Similarly, for advantage estimation, you again have a
    separate set of two layers (`self.fc_adv` and `self.adv`) on top of `fc1` and
    `fc2`. These outputs are combined to give the modified q-value as per Equation
    [7-16](#Equ16). The rest of the code, that is, the calculation of the TD loss
    and the gradient descent for the weight update, remains the same as that for DQN.
    Figure [7-5](#Fig5) shows the result of training the previous network on `CartPole`.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_7_Chapter/502835_2_En_7_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 2 graphs. Left. Mean reward per episode. It has a fluctuating curve that rises
    from (0, 0) to (4, 540), drops, and remains stable till (30,290). Right. T D loss
    history. It has a fluctuating bell curve between (0, 10) and (500, 1) with its
    peak at (220, 99). The values are approximate.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 7-5
  prefs: []
  type: TYPE_NORMAL
- en: Training curves for a dueling network from .c-dueling_dqn.ipynb
  prefs: []
  type: TYPE_NORMAL
- en: As stated, you can try to substitute `ReplayBuffer` with `PrioritizedReplayBuffer.`
    You could also use DDQN instead of DQN as a learning agent. This concludes the
    discussion on dueling DQN. The next section discusses a very different variant.
  prefs: []
  type: TYPE_NORMAL
- en: NoisyNets DQN
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Recall that you need to explore parts of state space. You have been doing this
    using a ε-greedy policy. Under this exploration, you take the max q-value action
    with probability (1- ε), and a random action with probability ε. The authors of
    a recent 2018 paper titled “Noisy Networks for Exploration,”^([5](#Fn5)) used
    a different approach of adding random perturbations to linear layers as parameters,
    and like network weights, these are also learned.
  prefs: []
  type: TYPE_NORMAL
- en: 'The usual linear layers are affine transformations, as given by the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ y= wx+b $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_Eque.png)'
  prefs: []
  type: TYPE_IMG
- en: 'In noisy linear versions, you introduce random perturbations in the weights
    as given by the following equation:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ y=\left({\upmu}^w+{\upsigma}^w\odot {\upvarepsilon}^w\right)x+\left({\upmu}^b+{\upsigma}^b\odot
    {\upvarepsilon}^b\right) $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_Equ17.png)'
  prefs: []
  type: TYPE_IMG
- en: (7-17)
  prefs: []
  type: TYPE_NORMAL
- en: In the previous equation, μ^(*w*), σ^(*w*), μ^(*b*), and σ^(*b*) are the weights
    of the network that are learned. ϵ^(*w*) and ϵ^(*b*) are random noises that introduce
    randomness leading to exploration. Figure [7-6](#Fig6) shows a schematic diagram
    of the noisy version of the linear layer, which explains Equation [7-17](#Equ17).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_7_Chapter/502835_2_En_7_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A schematic of a system with inputs x and epsilon superscript w, epsilon superscript
    b. The function reads w = mu superscript w + sigma superscript w, circled dot,
    epsilon superscript w, and b = mu superscript b + sigma superscript b, circled
    dot, epsilon superscript b p. The output is y = w x + b.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 7-6
  prefs: []
  type: TYPE_NORMAL
- en: The noisy linear layer. The weights and biases are a linear combination of the
    mean and standard deviation, which are learned just like the weights and biases
    in a regular linear layer (Figure 4 of the referenced paper [`https://arxiv.org/pdf/1706.10295.pdf`](https://arxiv.org/pdf/1706.10295.pdf))
  prefs: []
  type: TYPE_NORMAL
- en: 'In terms of specific noise distributions in linear layers of a noisy network,
    the authors sampled two types: Independent Gaussian noise, where each weight has
    its own Gaussian noise, and Factorized Gaussian noise, which introduces separate
    noise for each output and input. The primary advantage of Factorized Gaussian
    noise lies in its ability to lower the time required for random number generation
    in various algorithms. This reduction is particularly crucial for single-thread
    agents like DQN and dueling, where computational overhead can be significant.
    Consequently, Factorized noise is employed in DQN and dueling, while Independent
    noise is used in the distributed A3C, where computation time is less of a concern.'
  prefs: []
  type: TYPE_NORMAL
- en: 'In line with the authors’ recommendations, you will implement the factorized
    version discussed in the paper, where each element ![$$ {\upvarepsilon}_{I,j}^w
    $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_IEq10.png) of the
    matrix ϵ^(*w*) is factored. Suppose you have *p* units of inputs and *q* units
    of outputs. Accordingly, you generate a *p*-size vector of Gaussian noise ϵ[*i*]
    and a *q*-size vector of Gaussian noise ϵ[*j*]. Each ![$$ {\epsilon}_{I,j}^w $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_IEq11.png)
    and ![$$ {\upvarepsilon}_j^b $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_IEq12.png)
    can now be written as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\upvarepsilon}_{i,j}^w=f\left({\upvarepsilon}_i\right).f\left({\upvarepsilon}_j\right),
    $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_Equf.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {\upvarepsilon}_j^b=f\left({\upvarepsilon}_j\right), $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_Equg.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ f(x)=\operatorname{sgn}(x).\sqrt{\left|x\right|} $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_Equ18.png)'
  prefs: []
  type: TYPE_IMG
- en: (7-18)
  prefs: []
  type: TYPE_NORMAL
- en: 'For factorized networks like the one used here, the authors suggest initializing
    the weights as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: Each element μ[*i*, *j*] of μ^(*w*) and μ^(*b*) is sampled from a uniform distribution
    in the range of ![$$ U\left[-\frac{1}{\sqrt{p}},\frac{1}{\sqrt{p}}\right] $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_IEq13.png),
    where *p* is the number of input units.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Similarly, each element σ[*i*, *j*] of σ^(*w*) and σ^(*b*) is initialized to
    a constant ![$$ \frac{\upsigma_0}{\sqrt{p}} $$](../images/502835_2_En_7_Chapter/502835_2_En_7_Chapter_TeX_IEq14.png)
    with the hyperparameter σ[0] set to 0.5.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'At a high level, the following modifications are applied to the previous DQN
    algorithm: a) you will not be using ϵ-greedy exploration. Instead the policy greedily
    optimizes the (randomized) action-value function; 2) the fully connected layers
    are parameterized as a noisy network, where the parameters are drawn from the
    noisy network parameter distribution after every replay step, which means the
    same noisy network is fixed used for a batch of transitions, the gradient is calculated,
    and the weights are adjusted. The network weights are sampled again from this
    modified weights before taking the next step.'
  prefs: []
  type: TYPE_NORMAL
- en: Section C of the paper provides the pseudocode for NoisyNet-DQN and NoisyNet-Dueling,
    that is, the NoisyNet version of DQN and Dueling DQN.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s now look at the code required to implement NoisyNet-DQN. You create a
    noisy layer along the lines of the linear layer provided by PyTorch. You do so
    by extending `nn.Module` from PyTorch. It is a simple and standard implementation
    where you create weight vectors and noise vectors in the `init` function. You
    create the linear layer parameters μ^(*w*), σ^(*w*), μ^(*b*), and σ^(*b*) from
    Equation [7-17](#Equ17). These are created using four individual calls to `nn.Paramater`.
    You also create a buffer in memory to store the noise tensors ϵ^(*w*) and ϵ^(*b*).
    They are not created using `nn.Parameter` as they are not parameters of the model.
    They are sampled from standard Gaussian and stored for use in the `forward` function.
    Therefore, you use the PyTorch `register_buffer` function to create memory space
    for these tensors. Then you write a `forward` function to take an input and transform
    it through a set of noisy linear and regular linear layers, as per Equation [7-17](#Equ17).
    During training, you use the noisy version 7-17 and during inference, you use
    the usual version of linear layer without adding any noise.
  prefs: []
  type: TYPE_NORMAL
- en: You also need some additional functions. In this case, I wrote a function called
    `reset_noise` to generate the noise ϵ^(*w*) and ϵ^(*b*). This function internally
    uses a helper function called `_noise` to generate standard Gaussian noise. The
    `reset_parameters` function resets the parameters following the strategy outlined
    in Equation [7-18](#Equ18). Listing [7-5](#PC5) shows the code for the noisy linear
    layer.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: You could use a noisy net with DQN, DDQN, dueling DQN, and prioritized replay
    in various combinations. However, for the purpose of the walk-through, I focus
    on using a regular replay buffer with DQN. You can also train using the regular
    DQN approach and not DDQN. The implementation of NoisyDQN mirrors that of DQN
    from the previous chapter. The only difference is that you now need to use a noisy
    linear layer, as shown in Listing [7-5](#PC5). You also pass as an additional
    parameter to the forward function of NoisyDQN called `training,` which is `true`
    during training and made `false` during inference. Listing [7-6](#PC6) shows the
    init and forward functions of NoisyDQN. You have no ϵ-greedy selection in the
    function `sample_actions` of the DQN agent. The `reset_noise` function also resets
    the noise after each batch. This is in line with the recommendations of the paper
    to decorrelate. Listing [7-6](#PC6) contains the NoisyDQN version with these modifications.
    The rest of the implementation is similar to the vanilla DQN agent.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: The training code also has a minor modification. You reset the noise by calling
    `reset_noise` after each batch of samples has been processed. Listing [7-7](#PC7)
    shows the code with this change. Refer to the `7.d-noisynet_dqn.ipynb` notebook
    for the complete code.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Training a NoisyDQN in the `CartPole` environment produces the training curves,
    as given in Figure [7-7](#Fig7). You may not see any significant difference between
    this variant and DQN (or for that matter, all the variants). The reason is that
    you are using a simple problem and training it for a short number of episodes.
    You are also not optimizing the parameters. The idea in the book is to teach you
    the inner details of a specific variant.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_7_Chapter/502835_2_En_7_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 2 graphs. Left. Mean return per episode. It has an increasing curve with fluctuation
    that remains constant from (0, 10) to (22, 10) and increases till (50, 275). Right.
    T D loss history exhibits an irregular left-skewed curve with fluctuation between
    (0, 2) and (900, 3.8). The values are approximate.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 7-7
  prefs: []
  type: TYPE_NORMAL
- en: NoisyNet DQN training graph
  prefs: []
  type: TYPE_NORMAL
- en: For a thorough study of the improvements and other observations, you are advised
    to refer to the original papers referenced in this chapter. You should also go
    through the accompanying Python notebooks in detail, and after you have grasped
    the details, you should try to code the example anew. Figure [7-8](#Fig8) shows
    the training curve from the paper where the NoisyNet DQN and the NoisyNet dueling
    learning progress is compared to the baseline version.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_7_Chapter/502835_2_En_7_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 2 line graphs of median score versus million frames. Left. It indicates 2 increasing
    fluctuating patterns for D Q N and Noisy Net D Q N. They overlap between (0, 0)
    and (40,30). Right. It indicates 2 increasing and fluctuating patterns for dueling
    and Noisy net dueling. They overlap between (0, 0) and (15,95).
  prefs: []
  type: TYPE_NORMAL
- en: Figure 7-8
  prefs: []
  type: TYPE_NORMAL
- en: NoisyNet comparison to the baseline from Figure 2 of the paper [`https://arxiv.org/pdf/1706.10295.pdf`](https://arxiv.org/pdf/1706.10295.pdf)
  prefs: []
  type: TYPE_NORMAL
- en: 'You are also encouraged to try to code a noisy version of dueling DQN. Further,
    you could also try the DDQN variant of learning. In other words, with what you
    have learned so far, you could try the following combinations:'
  prefs: []
  type: TYPE_NORMAL
- en: DQN
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: DDQN (impacts how you learn)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Dueling DQN (impacts the architecture of training)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Dueling DDQN
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Replace the vanilla `ReplayBuffer` with a prioritized replay buffer
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Replace ε-exploration with NoisyNets in any of the previous approaches
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Code all combinations
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Try many other Gymnasium environments, making appropriate changes, if any, to
    the network
  prefs:
