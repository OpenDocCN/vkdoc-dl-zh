  prefs: []
  type: TYPE_NORMAL
- en: 'while not rospy.is_shutdown():'
  prefs: []
  type: TYPE_NORMAL
- en: vel_pub.publish(msg)
  prefs: []
  type: TYPE_NORMAL
- en: rate.sleep()
