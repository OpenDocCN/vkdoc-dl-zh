- en: 9. Deploying Your Model as a Web Application
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 9. 将你的模型部署为网络应用
- en: Over the past several chapters, we have talked about some techniques to optimize
    the training of a model. We went through the steps of starting with a small dataset
    to get results that can be applied in practical scenarios.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去的几章中，我们讨论了一些优化模型训练的技术。我们通过从小数据集开始，得到可以在实际场景中应用的结果。
- en: You now know the steps needed to train a practical model. Now it is time to
    talk about how to make your trained model into an application.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 你现在知道了训练实际模型所需的步骤。现在是时候讨论如何将你的训练模型变成一个应用了。
- en: In Chapter [7](502073_1_En_7_Chapter.xhtml), we briefly talked about how to
    build a script to run predictions using the trained model (Figure [9-1](#Fig1)).
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在第 [7](502073_1_En_7_Chapter.xhtml) 章中，我们简要介绍了如何构建一个脚本，使用训练好的模型进行预测（图 [9-1](#Fig1)）。
- en: '![../images/502073_1_En_9_Chapter/502073_1_En_9_Fig1_HTML.jpg](../images/502073_1_En_9_Chapter/502073_1_En_9_Fig1_HTML.jpg)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_9_Chapter/502073_1_En_9_Fig1_HTML.jpg](../images/502073_1_En_9_Chapter/502073_1_En_9_Fig1_HTML.jpg)'
- en: Figure 9-1
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-1
- en: Using a script to run predictions with a model
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 使用脚本运行模型的预测
- en: But using a script like that is not a user-friendly way of making it an application.
    A better way would be to turn your model into a web application. It would allow
    for better usability, as well as allowing you to provide your new deep learning
    application to multiple users.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 但使用这样的脚本并不是一个用户友好的将模型变为应用的方式。更好的方法是将你的模型转变为网络应用。这将提供更好的可用性，同时允许你将你的新深度学习应用提供给多个用户。
- en: We can use the Flask Framework to turn our model into a web application.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用 Flask 框架将我们的模型转变为网络应用。
- en: Setting up Flask
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设置 Flask
- en: Flask is a lightweight micro web framework for Python, which allows you to build
    websites, web applications, APIs, and microservices. With only a few base dependencies,
    you can start building your application with a simple structure and later expand
    upon it with additional features and scalability using a large library of available
    extensions.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: Flask 是一个轻量级的 Python 微型网络框架，允许你构建网站、网络应用、API 和微服务。只需几个基本依赖项，你就可以使用简单的结构开始构建你的应用，并使用大量可用的扩展库来添加更多功能和可扩展性。
- en: When we set up our deep learning environment in Chapter [3](502073_1_En_3_Chapter.xhtml)
    with the Anaconda metapackage, we installed the Flask package and few other dependency
    packages that will aid us in building our application.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们在第 [3](502073_1_En_3_Chapter.xhtml) 章中使用 Anaconda 元包设置深度学习环境时，我们安装了 Flask
    包以及一些其他有助于我们构建应用的依赖包。
- en: 'If you want to install Flask separately you can simply run:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要单独安装 Flask，你可以简单地运行：
- en: '[PRE0]'
  id: totrans-13
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: This will install Flask, as well as Werkzeug, Jinja2, MarkupSafe, and ItsDangerous
    packages (Figure [9-2](#Fig2)).
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 这将安装 Flask，以及 Werkzeug、Jinja2、MarkupSafe 和 ItsDangerous 包（图 [9-2](#Fig2)）。
- en: '![../images/502073_1_En_9_Chapter/502073_1_En_9_Fig2_HTML.jpg](../images/502073_1_En_9_Chapter/502073_1_En_9_Fig2_HTML.jpg)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_9_Chapter/502073_1_En_9_Fig2_HTML.jpg](../images/502073_1_En_9_Chapter/502073_1_En_9_Fig2_HTML.jpg)'
- en: Figure 9-2
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-2
- en: Conda installing Flask and dependencies
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 Conda 安装 Flask 和依赖项
- en: 'Once installed, we can test Flask by creating a simple application. We will
    name this file `flask-sample.py`:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 安装完成后，我们可以通过创建一个简单的应用来测试 Flask。我们将把这个文件命名为 `flask-sample.py`：
- en: '[PRE1]'
  id: totrans-19
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Here, we are importing the Flask package, defining the application context,
    and running the resulting Flask application. We define a function—index()—and
    bind it to handle the requests coming to the index route of the application `add_url_rule()`
    function. In the index() function , we are simply returning some hardcoded HTML
    strings for now.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们导入 Flask 包，定义应用上下文，并运行生成的 Flask 应用。我们定义了一个函数——index()——并将其绑定到处理应用索引路由的请求的
    `add_url_rule()` 函数。在 index() 函数中，我们目前只是返回一些硬编码的 HTML 字符串。
- en: 'We can run this application by running:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过运行以下命令来运行此应用：
- en: '[PRE2]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Flask will spin up a development webserver process to serve your application.
    By default, it will run on port 5000 on localhost. You can access the application
    page on http://127.0.0.1:5000/ (Figure [9-3](#Fig3)).
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: Flask 将启动一个开发网络服务器进程来服务你的应用。默认情况下，它将在本地主机的 5000 端口上运行。你可以通过 http://127.0.0.1:5000/
    访问应用页面（图 [9-3](#Fig3)）。
- en: '![../images/502073_1_En_9_Chapter/502073_1_En_9_Fig3_HTML.jpg](../images/502073_1_En_9_Chapter/502073_1_En_9_Fig3_HTML.jpg)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_9_Chapter/502073_1_En_9_Fig3_HTML.jpg](../images/502073_1_En_9_Chapter/502073_1_En_9_Fig3_HTML.jpg)'
- en: Figure 9-3
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-3
- en: Flask sample Web app running
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: Flask 示例 Web 应用运行
- en: With Flask up and running, we are now ready to design our deep learning web
    application using Flask.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 当 Flask 运行起来后，我们现在就可以使用 Flask 设计我们的深度学习 Web 应用程序了。
- en: Designing Your Web Application
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设计您的 Web 应用程序
- en: As we did in Chapter [7](502073_1_En_7_Chapter.xhtml), we can use a model file
    saved using the model.save() function (e.g., the `bird_classify_finetune_IV3_final.h5`
    file in our fine-tuning of the bird image classification system example). By using
    the full model file, we can load the model in its trained state without having
    to redefine the code for the model structure. Along with the model file, we will
    use the `class_indices.npy` file saved from the same script. The class_indices
    file contains the dictionary/mapping of the text labels for the classes to their
    IDs. We will need the label mapping to display the text label for the predicted
    class (Figure [9-4](#Fig4)).
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们在第 [7](502073_1_En_7_Chapter.xhtml) 章中所做的那样，我们可以使用使用 model.save() 函数保存的模型文件（例如，在我们的鸟类图像分类系统微调示例中的
    `bird_classify_finetune_IV3_final.h5` 文件）。通过使用完整的模型文件，我们可以在不重新定义模型结构代码的情况下，加载模型到其训练状态。除了模型文件外，我们还将使用从同一脚本保存的
    `class_indices.npy` 文件。class_indices 文件包含类文本标签到其 ID 的字典/映射。我们需要标签映射来显示预测类的文本标签（图
    [9-4](#Fig4)）。
- en: '![../images/502073_1_En_9_Chapter/502073_1_En_9_Fig4_HTML.jpg](../images/502073_1_En_9_Chapter/502073_1_En_9_Fig4_HTML.jpg)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_9_Chapter/502073_1_En_9_Fig4_HTML.jpg](../images/502073_1_En_9_Chapter/502073_1_En_9_Fig4_HTML.jpg)'
- en: Figure 9-4
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-4
- en: Model files needed to build the web application
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 构建Web应用程序所需的模型文件
- en: 'With our model files at hand, we can start designing the application. We will
    need to consider the following:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在手头有了我们的模型文件后，我们可以开始设计应用程序。我们需要考虑以下因素：
- en: As the input for our system we will need to have an HTML page with a web form
    that allows uploading/submitting files.
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 作为我们系统的输入，我们需要一个带有网页表单的 HTML 页面，允许上传/提交文件。
- en: The uploaded files need to be placed in a location where the Python code can
    read them.
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 上传的文件需要放置在一个 Python 代码可以读取的位置。
- en: A function is needed to handle the requests which loads the uploaded image file,
    runs it through the model, and responds with the result/prediction from the model.
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需要一个函数来处理请求，该函数加载上传的图像文件，通过模型运行它，并返回模型的结果/预测。
- en: The frontend webpage needs to be able to display the result.
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 前端网页需要能够显示结果。
- en: Loading of the model from file takes time. It is not practical to load the model
    for every request. Therefore, we need a way to load the model only once (preferably
    when the application starts).
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从文件加载模型需要时间。对于每个请求都加载模型并不实用。因此，我们需要一种方法来只加载一次模型（最好是在应用程序启动时）。
- en: Using HTML strings in the code is not practical. We should use a templating
    engine, which would give us more flexibility in our frontend. Fortunately, the
    default installation of Flask comes with the Jinja2 template engine.
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在代码中使用 HTML 字符串并不实用。我们应该使用模板引擎，这样我们可以在前端有更多的灵活性。幸运的是，Flask 的默认安装就包含了 Jinja2
    模板引擎。
- en: 'Based on these considerations, we will define the following structure for our
    Flask application (Figure [9-5](#Fig5)):'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 根据这些考虑，我们将为我们的 Flask 应用程序定义以下结构（图 [9-5](#Fig5)）：
- en: '![../images/502073_1_En_9_Chapter/502073_1_En_9_Fig5_HTML.png](../images/502073_1_En_9_Chapter/502073_1_En_9_Fig5_HTML.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_9_Chapter/502073_1_En_9_Fig5_HTML.png](../images/502073_1_En_9_Chapter/502073_1_En_9_Fig5_HTML.png)'
- en: Figure 9-5
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-5
- en: The structure of our application
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我们应用程序的结构
- en: 'Our application will consist of 3 directories: models, templates, and uploads,
    along with a main application.py file. The models directory will contain our saved
    model file, as well as the class label dictionary file for that model. The templates
    directory will contain the Jinja2 template files (the Jinja2 engine expects this
    directory to be named templates). The uploads directory is for keeping the uploaded
    files of the application. The application.py will contain the Flask application
    definitions as well as the functions to process the images and predictions using
    our trained model.'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的应用程序将包含 3 个目录：models、templates 和 uploads，以及一个主应用程序文件 application.py。models
    目录将包含我们的保存模型文件以及该模型的类标签字典文件。templates 目录将包含 Jinja2 模板文件（Jinja2 引擎期望这个目录命名为 templates）。uploads
    目录用于保存应用程序的上传文件。application.py 将包含 Flask 应用程序定义以及使用我们训练的模型处理图像和预测的功能。
- en: Following this simple application structure will allow us to extend the capabilities
    of our application later, as well as allow us to upload and host our application
    in various services that allow Flask applications.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 遵循这个简单的应用程序结构，将使我们能够在以后扩展我们应用程序的功能，同时允许我们在允许 Flask 应用程序的各种服务中上传和托管我们的应用程序。
- en: Building Your Deep Learning Web Application
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建您的深度学习网络应用程序
- en: To build our web application, let us begin with our template file for the main
    page. In the templates directory of our application structure, create an `index.html`
    file.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 要构建我们的网络应用程序，让我们从主页的模板文件开始。在我们的应用程序结构中的模板目录中，创建一个 `index.html` 文件。
- en: 'In this file, start with adding the basic HTML structure of the page. We will
    be using the Jinja2 templating for this:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在此文件中，首先添加页面的基本 HTML 结构。我们将使用 Jinja2 模板进行此操作：
- en: '[PRE3]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'At the top of the page, we will add a section to display any error messages
    returned from the backend. We will use the Flash messages mechanism from the Flask
    framework:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 在页面顶部，我们将添加一个用于显示来自后端的任何错误消息的部分。我们将使用 Flask 框架的 Flash 消息机制：
- en: '[PRE4]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'Next, we will add the main HTML form that allows us to upload the images:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将添加允许我们上传图像的主要 HTML 表单：
- en: '[PRE5]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'Finally, we will add a section to display the results:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们将添加一个用于显示结果的章节：
- en: '[PRE6]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: One thing to note here is that we are using Base64 image data in the <img> tag
    instead of a path to an image file. This allows us to display an image with any
    image manipulations applied without having to save it as a file.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 这里需要注意的一点是，我们正在使用 Base64 图像数据在 `<img>` 标签中，而不是图像文件的路径。这允许我们在不将其保存为文件的情况下，对图像应用任何图像处理并显示它。
- en: Note
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: For simplicity, we will not be adding any style/css here.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 为了简单起见，我们不会在此处添加任何样式/css。
- en: Now we can begin the main code of our Flask application.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以开始我们的 Flask 应用程序的主要代码。
- en: 'Start an `application.py` file in the root of our application structure and
    import the packages:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们应用程序结构的根目录中启动一个 `application.py` 文件，并导入包：
- en: '[PRE7]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'With some versions of TensorFlow there are some incompatibilities of cuDNN
    and Flask. Therefore, we add the following code to avoid the incompatibilities:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 在 TensorFlow 的某些版本中，cuDNN 和 Flask 存在一些不兼容性。因此，我们添加以下代码以避免不兼容性：
- en: '[PRE8]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Note
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: 'You may experience errors such as “BaseCollectiveExecutor::StartAbort Unknown:
    Failed to get convolution algorithm” if you try to run the application without
    these compatibility fixes. This may be fixed in future releases.'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '如果您在没有这些兼容性修复的情况下尝试运行应用程序，可能会遇到“BaseCollectiveExecutor::StartAbort Unknown:
    Failed to get convolution algorithm”之类的错误。这可能在未来的版本中得到修复。'
- en: 'Next, we set the application parameters, and load the model from files:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们设置应用程序参数，并从文件中加载模型：
- en: '[PRE9]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'Then we will add a function—classify_image() —that will take the image, perform
    the preprocessing on the image, run it through the model, and return the result:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们将添加一个函数——`classify_image()`——它将接受图像，对图像进行预处理，运行模型，并返回结果：
- en: '[PRE10]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'When showing the results for an uploaded image, it is better to show the image
    in the page as well. Therefore, we will add a utility function to return a thumbnail
    version of the uploaded image in a Base64 encoded format. Base64 image data can
    be directly rendered by an HTML <img> tag without needing to supply a file location.
    Recall that in our template, we specified the <img> tag to use `data:image/jpeg;base64`:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 当显示上传的图像的结果时，最好在页面上也显示该图像。因此，我们将添加一个实用函数，以 Base64 编码格式返回上传图像的缩略图版本。Base64 图像数据可以直接由
    HTML `<img>` 标签渲染，而无需提供文件位置。回想一下，在我们的模板中，我们指定了 `<img>` 标签使用 `data:image/jpeg;base64`：
- en: '[PRE11]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'Then we come to our main request handler, the index() function:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们来到我们的主要请求处理器，即 `index()` 函数：
- en: '[PRE12]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: This index() function handles both the GET request to render the initial page,
    as well as the POST request from the form submit. When handling the GET requests,
    the index() function renders the index.html template we defined earlier. The webform
    in the index page is set to make a POST request (with the submitted file) to itself,
    which is again picked up by the index() function.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 此 `index()` 函数处理 GET 请求以渲染初始页面，以及来自表单提交的 POST 请求。当处理 GET 请求时，`index()` 函数渲染我们之前定义的
    `index.html` 模板。索引页面中的网络表单设置为向自身（带有提交的文件）发出 POST 请求，这再次被 `index()` 函数捕获。
- en: When processing the POST request, we make several checks, such as whether a
    file was uploaded, does it have an allowed file extension. The flash message mechanism
    of the Flask framework is used to report any errors to the user. If all checks
    pass, the uploaded image is then placed in the uploads directory of our application
    structure, loaded using the `load_img()` function of Keras, and passed to the
    `classify_image()` function we defined earlier. Once results are ready, we render
    the index.html template again, this time with the result information.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 在处理POST请求时，我们进行几个检查，例如是否上传了文件，文件扩展名是否被允许。Flask框架的闪存消息机制用于向用户报告任何错误。如果所有检查都通过，上传的图片将被放置在我们的应用程序结构中的上传目录中，使用Keras的`load_img()`函数加载，并传递给之前定义的`classify_image()`函数。一旦结果准备好，我们再次渲染index.html模板，这次带有结果信息。
- en: 'Another utility function is added next to handle the HTTP 413 errors, which
    are emitted when the uploaded filesize is larger than the MAX_CONTENT_LENGTH of
    the application:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来添加了一个实用函数来处理HTTP 413错误，这些错误是在上传的文件大小超过应用程序的MAX_CONTENT_LENGTH时发出的：
- en: '[PRE13]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Note
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: When running our application locally, you may get a “Connection Reset” or a
    “Connection Aborted” error in the browser instead of the error message we set
    using the preceding function when uploading files larger than the limit we set.
    This is a known limitation of the development server of Flask. You can read more
    about it in the Flask documentation page on handling file uploads.^([1](#Fn1))
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 当在本地运行我们的应用程序时，您可能会在浏览器中收到“连接重置”或“连接已中断”的错误，而不是使用前面函数上传文件超过我们设置的限制时设置的错误消息。这是Flask开发服务器的已知限制。您可以在Flask文档页面上阅读更多关于处理文件上传的信息。[1](#Fn1)
- en: 'Finally, the Flask application context, parameters, and URL rules are defined:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，定义了Flask应用程序上下文、参数和URL规则：
- en: '[PRE14]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'Like our Flask sample application, we run this as:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 如同我们的Flask示例应用程序，我们这样运行：
- en: '[PRE15]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: When the application starts, it will first load the model from file, before
    starting the webserver (Figure [9-6](#Fig6)).
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 应用程序启动时，它将首先从文件中加载模型，然后再启动web服务器（图[9-6](#Fig6)）。
- en: '![../images/502073_1_En_9_Chapter/502073_1_En_9_Fig6_HTML.jpg](../images/502073_1_En_9_Chapter/502073_1_En_9_Fig6_HTML.jpg)'
  id: totrans-85
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_9_Chapter/502073_1_En_9_Fig6_HTML.jpg](../images/502073_1_En_9_Chapter/502073_1_En_9_Fig6_HTML.jpg)'
- en: Figure 9-6
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-6
- en: Flask application loading the model
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: Flask应用程序加载模型
- en: Once the webserver is started view the webpage in browser, which by default
    would be running on http://127.0.0.1:5000 (Figure [9-7](#Fig7)).
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦启动了web服务器，在浏览器中查看网页，默认情况下它将运行在http://127.0.0.1:5000（图[9-7](#Fig7)）。
- en: '![../images/502073_1_En_9_Chapter/502073_1_En_9_Fig7_HTML.jpg](../images/502073_1_En_9_Chapter/502073_1_En_9_Fig7_HTML.jpg)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_9_Chapter/502073_1_En_9_Fig7_HTML.jpg](../images/502073_1_En_9_Chapter/502073_1_En_9_Fig7_HTML.jpg)'
- en: Figure 9-7
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-7
- en: Our bird classification flask application running
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 我们运行的鸟类分类Flask应用程序
- en: You can now upload an image and see how well our application can recognize it
    (Figure [9-8](#Fig8)). The application will return the predicted label with the
    confidence for the prediction.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 您现在可以上传一张图片，看看我们的应用程序识别得有多好（图[9-8](#Fig8)）。应用程序将返回预测标签及其预测的置信度。
- en: '![../images/502073_1_En_9_Chapter/502073_1_En_9_Fig8_HTML.jpg](../images/502073_1_En_9_Chapter/502073_1_En_9_Fig8_HTML.jpg)'
  id: totrans-93
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_9_Chapter/502073_1_En_9_Fig8_HTML.jpg](../images/502073_1_En_9_Chapter/502073_1_En_9_Fig8_HTML.jpg)'
- en: Figure 9-8
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-8
- en: Results for an uploaded image
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 上传图片的结果
- en: If you are wondering on how you can host this application, the application structure
    we build will work out-of-the-box with Flask application hosting services such
    as AWS Elastic Beanstalk.^([2](#Fn2))
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您想知道如何托管此应用程序，我们构建的应用程序结构将与Flask应用程序托管服务（如AWS Elastic Beanstalk）无缝配合。[2](#Fn2)
- en: Scaling Up Your Web Application
  id: totrans-97
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 扩展您的Web应用程序
- en: 'The application we built here, although functional, if far from an optimal
    design. There are several areas that we can improve in it, such as:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 我们构建的应用程序虽然功能齐全，但远非最佳设计。有几个方面我们可以改进，例如：
- en: The main application handles both the web functions—such as template rendering,
    request handling—and the deep learning inference tasks as well. This will bottleneck
    some of the functionality as the same application threads needs to handle both
    sets of tasks.
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 主要应用处理网页功能，例如模板渲染、请求处理，以及深度学习推理任务。这将导致一些功能出现瓶颈，因为相同的应用程序线程需要处理这两组任务。
- en: Running inferencing is computationally intensive. The same can be said for image
    preprocessing as well. While the web functions are relatively less complex.
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 运行推理是计算密集型的。同样，图像预处理也是如此。而网络功能相对较为简单。
- en: By having the web and the deep learning components of the application together,
    we would need to allocate processing/machine resources unnecessarily.
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果将应用程序的网络和深度学习组件放在一起，我们就不必要地分配处理/机器资源。
- en: When implementing computationally intensive functions, it is better to implement
    limit (or throttle) the number of parallel invocations of such functions as to
    reduce the resource usage. Think of multiuser scenarios.
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在实现计算密集型函数时，最好限制（或节流）此类函数的并行调用次数，以减少资源使用。考虑多用户场景。
- en: Computationally intensive functions should optimally be done asynchronously.
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算密集型函数应尽可能异步执行。
- en: Considering all these facts, it is better to split the application so that the
    web components and the deep learning portions are handled by two separate micro-services.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到所有这些事实，最好将应用程序拆分，以便网络组件和深度学习部分由两个独立的微服务处理。
- en: It is also better to implement a job-queue mechanism between the two services
    as a throttling mechanism.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 在两个服务之间实现一个作业队列机制作为节流机制也是更好的选择。
- en: One possible application design considering these items is shown here (Figure
    [9-9](#Fig9)).
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这些因素，这里展示了一种可能的应用程序设计（图[9-9](#Fig9)）。
- en: '![../images/502073_1_En_9_Chapter/502073_1_En_9_Fig9_HTML.jpg](../images/502073_1_En_9_Chapter/502073_1_En_9_Fig9_HTML.jpg)'
  id: totrans-107
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_9_Chapter/502073_1_En_9_Fig9_HTML.jpg](../images/502073_1_En_9_Chapter/502073_1_En_9_Fig9_HTML.jpg)'
- en: Figure 9-9
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-9
- en: Scaling up the application
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 扩展应用程序
- en: By considering these factors when designing, you can build your application
    to be able to handle thousands to millions of requests at a time.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 在设计时考虑这些因素，你可以构建能够一次处理数千到数百万个请求的应用程序。
