    ε-greedy ![$$ \hat{q}\left({S}_0,\kern0.5em \bullet; w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq25.png)
    的动作选择。列表 [5-3](#PC3) 显示了代码。
