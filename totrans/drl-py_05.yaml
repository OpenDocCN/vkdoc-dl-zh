  zh: 你使用 `tiles3.py` 构建了 `QEstimator` 类，如列表 [5-1](#PC1) 所示。`QEstimator` 类持有权重并将观察空间瓦片化。完整的代码在名为
    `5.a-n-step-SARSA.ipynb` 的 Python 笔记本中给出。
- en: '[PRE0]'
  id: totrans-185
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: As shown in Listing [5-2](#PC2), the `get_active_features` function takes as
    input continuous two-dimensional values of *S* and the discrete input action *A*
    to return the tile-encoded `active_feature` *x*(*S*, *A*)—that is, binary tiling
    features that are active for a given (*S*, *A*). The `q_predict` function also
    takes as input (*S*, *A*) and returns the estimate ![$$ \hat{q}\left(S,A;w\right)=x{\left(S,A\right)}^T\cdotp
    w $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq24.png). It
    internally calls `get_active_features` to first get features and carries out a
