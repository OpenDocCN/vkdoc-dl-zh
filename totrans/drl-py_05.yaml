  zh: 如前一小节所述，你将在山车环境中运行此算法。`5.b-lambda-sarsa.ipynb` 笔记本包含完整的代码。列表 [5-5](#PC5) 给出了如图
    [5-8](#Fig8) 所示的资格迹更新的代码实现。累积迹为活动图块增加一个，而替换迹使索引 *i* 的迹对于活动图块索引 *i* 为一。
