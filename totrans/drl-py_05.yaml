- en: 5. Function Approximation and Deep Learning
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 5. 函数近似与深度学习
- en: The previous three chapters looked at various approaches to planning and control—first
    at the dynamic programming (DP), then at the Monte Carlo approach (MC), and finally
    at the temporal difference (TD) approach. In all these approaches, you saw problems
    where the state space and actions were discrete. Only in the previous chapter,
    toward the end, did I talk about Q-learning in a continuous state space. You discretized
    the state values using an arbitrary approach and trained a learning model. This
    chapter extends that approach by talking about the theoretical foundations of
    approximation and how it impacts the setup for reinforcement learning. It will
    then look at the various approaches to approximating values, first with a linear
    approach that has a good theoretical foundation and then with a nonlinear approach
    with neural networks. This aspect of combining deep learning with reinforcement
    learning is the most exciting development and has moved reinforcement learning
    algorithms to scale.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: '前三章探讨了规划与控制的多种方法——首先是动态规划（DP），然后是蒙特卡洛方法（MC），最后是时序差分（TD）方法。在所有这些方法中，你都看到了状态空间和动作是离散的问题。只有在上一章的结尾，我才讨论了连续状态空间中的Q学习。你使用任意方法对状态值进行离散化，并训练了一个学习模型。本章通过讨论近似理论的基础及其对强化学习设置的影响来扩展这种方法。然后，它将探讨近似值的各种方法，首先是具有良好理论基础的线性方法，然后是具有神经网络的非线性方法。将深度学习与强化学习结合的这一方面是最令人兴奋的发展，并将强化学习算法扩展到了规模。 '
- en: As usual, the approach is to first look at things in the context of the *prediction/estimation*
    setup, where the agent follows a given policy in order to learn the state value
    and/or state action values. This will be followed by talking about *control*—finding
    the optimal policy. The example will continue to be in a model-free world, where
    you do not know the transition dynamics. After the introduction, I will talk about
    the issues of convergence and stability in the world of function approximation.
    So far, convergence has not been a big issue in the context of the exact and discrete
    state spaces. However, function approximation brings about new issues that need
    to be considered for theoretical guarantees and practical best practices. The
    chapter also touches upon batch methods and compares them to the incremental learning
    approach discussed in the first part of this chapter.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 如同往常，方法首先是在**预测/估计**设置中观察事物，其中智能体遵循给定的策略以学习状态值和/或状态动作值。接下来将讨论**控制**——寻找最优策略。示例将继续在一个无模型的世界中进行，在这个世界中你不知道状态转移动态。介绍之后，我将讨论函数近似世界中收敛性和稳定性的问题。到目前为止，在精确和离散状态空间的情况下，收敛性并不是一个大问题。然而，函数近似带来了新的问题，这些新问题需要考虑理论保证和实际最佳实践。本章还涉及批量方法，并将它们与本章第一部分讨论的增量学习方法进行比较。
- en: The chapter closes with a quick overview of deep learning, basic theory, and
    the basics of building/training models using PyTorch, PyTorch Lightning, and TensorFlow.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 本章以对深度学习、基本理论和使用PyTorch、PyTorch Lightning和TensorFlow构建/训练模型的基本知识的快速概述结束。
- en: Introduction
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 引言
- en: Reinforcement learning can be used to solve very big problems with many discrete
    state configurations or problems with continuous state space. Consider the game
    of backgammon, which has close to 10^(20) discrete states, or consider the game
    of Go, which has close to 10^(170) discrete states. Also consider environments
    like self-driving cars, drones, or robots—these all have a continuous state space.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习可以用来解决具有许多离散状态配置或连续状态空间的大问题。考虑国际象棋，它有接近10^(20)个离散状态，或者考虑围棋，它有接近10^(170)个离散状态。还考虑像自动驾驶汽车、无人机或机器人这样的环境——它们都具有连续状态空间。
- en: Up to now, you have seen problems where the state space was discrete and also
    small in size, such as the grid world with ~100 states or the taxi world with
    500 states. How do you scale the algorithms you have learned so far to bigger
    environments or environments with continuous state spaces? All along, the state
    values *V*(*s*) or the action values *Q*(*s*, *a*) have been represented with
    a table, with one entry for each value of state *s* or a combination of state
    *s* and action *a*. As the numbers increase, the table size is going to become
    huge, making it infeasible to be able to store state or state action values in
    a table. Further, there will be too many combinations, which can slow down the
    learning of a policy. The algorithm may spend too much time in states that have
    a very low probability in a real run of the environment.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，你已经看到了一些状态空间是离散且规模较小的例子，例如有 ~100 个状态的网络世界或拥有 500 个状态的车世界。那么，你如何将你迄今为止学到的算法扩展到更大的环境或具有连续状态空间的环境呢？一直以来，状态值
    *V*(*s*) 或动作值 *Q*(*s*, *a*) 都是通过一个表来表示的，每个状态 *s* 或状态 *s* 和动作 *a* 的组合都有一个条目。随着数字的增加，表的大小将会变得巨大，使得在表中存储状态或状态动作值变得不可行。此外，组合的数量将会太多，这可能会减慢策略的学习速度。算法可能会花费太多时间在环境中实际运行概率非常低的状态上。
- en: 'Let’s take a different approach now. Let’s represent the state value (or state-action
    value) with the following function:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们采取不同的方法。让我们用以下函数来表示状态值（或状态动作值）：
- en: '![$$ \hat{v}\left(s;w\right)\approx {v}_{\pi }(s) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equa.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![向量 $\hat{v}\left(s;w\right)\approx {v}_{\pi }(s)$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equa.png)'
- en: '![$$ \hat{q}\left(s,a;w\right)\approx {q}_{\pi}\left(s,a\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ1.png)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
  zh: '![动作值 $\hat{q}\left(s,a;w\right)\approx {q}_{\pi}\left(s,a\right)$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ1.png)'
- en: (5-1)
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: (5-1)
- en: Instead of representing values in a table, they are now being represented by
    the function ![$$ \hat{v}\left(s;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq1.png)
    or ![$$ \hat{q}\left(s,a;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq2.png),
    where the parameter *w* is the parameter of the function that defines the policy
    π(*a*| *s*) that the agent follows. And where *s* or (*s*, *a*) are the inputs
    to the state or state-value functions. The parameters w are the weights of a deep
    learning neural network or the tunable parameters of the function that defines
    the policy. An RL algorithm uses various learning approaches to tweak the values
    of w to obtain the desired behavior of the agent, first in terms of policy π(*a*|
    *s*), which in turn leads to the state value function ![$$ \hat{v}\left(s;w\right)
    $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq3.png) or the
    state action value function ![$$ \hat{q}\left(s,a;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq4.png).
    You choose the number of parameters ∣*w*∣, which is lot smaller than the number
    of states ∣*s*∣ or the number of state-action pairs (|*s*| × |*a*|). The consequence
    of this approach is that there is a generalization of representation of the state
    of the state-action values. When you update the weight vector *w* based on some
    update equation for a specific state *s* or state action pair (*s*, *a*), it not
    only updates the value for that specific *s* or (*s*, *a*), but it also updates
    the values for many other states or state actions that are close to the original
    *s* or (*s*, *a*), the state or state action pair for which the update has been
    carried out. This depends on the geometry of the function. The other values of
    states near *s* will also be impacted by such an update, as shown previously.
    You are approximating the values with a function that is a lot more restricted
    than the number of states. Just to be specific, instead of updating *v*(*s*) or
    *q*(*s*, *a*) directly, you now update the parameter set *w* of the function,
    which in turn impacts the value estimates ![$$ \hat{v}\left(s;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq5.png)
    or ![$$ \hat{q}\left(s,a;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq6.png).
    Of course, like before, you carry out the *w* update using the MC or TD approach.
    There are various approaches to function approximation. You could feed the state
    vector (the values of all the variables that signify the state, such as position,
    speed, location, etc.) and get ![$$ \hat{v}\left(s;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq7.png),
    or you could feed the state and action vectors and get ![$$ \hat{q}\left(s,a;w\right)
    $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq8.png) as an
    output. An alternative approach that is very dominant in the case of actions being
    discrete and coming from a small set is to feed state vector *s* and get ∣*A*∣
    number of ![$$ \hat{q}\left(s,a;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq9.png),
    one for each action possible (∣*A*∣ denotes the number of possible actions). Figure
    [5-1](#Fig1) shows the schematic of various approaches for using a function to
    represent ![$$ \hat{v}\left(s;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq10.png)
    or ![$$ \hat{q}\left(s,a;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq11.png).
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 与在表格中表示值不同，它们现在是通过函数 ![$$ \hat{v}\left(s;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq1.png)
    或 ![$$ \hat{q}\left(s,a;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq2.png)
    来表示的，其中参数 *w* 是定义智能体遵循的策略 π(*a*| *s*) 的函数的参数。而 *s* 或 (*s*, *a*) 是状态或状态值函数的输入。参数
    w 是深度学习神经网络的权重或定义策略的函数的可调参数。强化学习算法使用各种学习方法来调整 w 的值以获得智能体的期望行为，首先是策略 π(*a*| *s*)，这反过来又导致状态值函数
    ![$$ \hat{v}\left(s;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq3.png)
    或状态动作值函数 ![$$ \hat{q}\left(s,a;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq4.png)。您选择参数数量
    ∣*w*∣，这比状态数量 ∣*s*∣ 或状态动作对数量 (|*s*| × |*a*|) 要小得多。这种方法的后果是状态动作值的表示具有泛化性。当您根据某个特定状态
    *s* 或状态动作对 (*s*, *a*) 的更新方程更新权重向量 *w* 时，它不仅更新了该特定 *s* 或 (*s*, *a*) 的值，而且还更新了接近原始
    *s* 或 (*s*, *a*) 的许多其他状态或状态动作的值，即已经进行更新的状态或状态动作对。这取决于函数的几何形状。*s* 附近的状态的其他值也会受到这种更新的影响，如前所述。您正在用一个比状态数量更多的函数来近似值。具体来说，您不是直接更新
    *v*(*s*) 或 *q*(*s*, *a*)，而是现在更新函数的参数集 *w*，这反过来又影响了值估计 ![$$ \hat{v}\left(s;w\right)
    $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq5.png) 或 ![$$
    \hat{q}\left(s,a;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq6.png)。当然，像以前一样，您使用
    MC 或 TD 方法执行 *w* 更新。函数逼近有各种方法。您可以提供状态向量（表示状态的变量的值，如位置、速度、位置等）并得到 ![$$ \hat{v}\left(s;w\right)
    $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq7.png)，或者您可以提供状态和动作向量并得到
    ![$$ \hat{q}\left(s,a;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq8.png)
    作为输出。当动作是离散的且来自小集合时，一种非常占主导地位的方法是提供状态向量 *s* 并得到 ∣*A*∣ 个 ![$$ \hat{q}\left(s,a;w\right)
    $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq9.png)，每个可能的动作一个（∣*A*∣
    表示可能动作的数量）。图 [5-1](#Fig1) 展示了使用函数表示 ![$$ \hat{v}\left(s;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq10.png)
    或 ![$$ \hat{q}\left(s,a;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq11.png)
    的各种方法的示意图。
- en: '![](../images/502835_2_En_5_Chapter/502835_2_En_5_Fig1_HTML.jpg)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_5_Chapter/502835_2_En_5_Fig1_HTML.jpg)'
- en: A diagram depicts three blocks labeled W and following inputs and outputs. Left.
    Input is s and output is v hat of s, w. Middle. Inputs are s and a and output
    is q hat of s, a, and w. Right. The input is s and the outputs are q hat of s,
    a 1, w up to q hat of s, a m, w.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 一个图展示了三个标记为W的块及其输入和输出。左侧。输入是s，输出是s和w的v^h。中间。输入是s和a，输出是s、a和w的q^h。右侧。输入是s，输出是s、a
    1、w到s、a m、w的q^h。
- en: Figure 5-1
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-1
- en: Ways to represent ![$$ \hat{v}\left(s;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq12.png)
    or ![$$ \hat{q}\left(s,a;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq13.png)using
    the function approximation approach. The first and last ones are the most common
    ones used in this chapter
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 使用函数逼近方法表示![公式](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq12.png)或![公式](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq13.png)的方法。本章中最常用的是第一个和最后一个。
- en: There are various approaches to building such functional approximators, but
    this chapter explores two common approaches—linear approximators using tiling
    and nonlinear approximators using neural networks.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 建立这样的功能逼近器有多种方法，但本章探讨了两种常见的方法——使用瓦片技术的线性逼近器和使用神经网络的非线性逼近器。
- en: However, before getting into this, I need to revisit theoretical foundations
    to see what operations are required to make *w* move such that you can successively
    reduce the error between the target values and the current estimates of state
    or state-action values, *v*(*s*) or *q*(*s*, *a*).
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在深入探讨这个问题之前，我需要回顾一下理论基础，看看需要哪些操作才能使*w*移动，从而可以逐步减少目标值和当前状态或状态-动作值估计之间的误差，即*v*(s)或*q*(s,
    a)。
- en: Theory of Approximation
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 逼近理论
- en: Function approximation is a topic studied extensively in the field of supervised
    learning, wherein based on training data you build a generalization of the underlying
    model. Most of the theory from supervised learning can be applied to reinforcement
    learning with functional approximation. However, RL with functional approximation
    brings to the fore new issues, such as how to bootstrap as well as its impact
    on nonstationarity. In supervised learning, while the algorithm is learning, the
    problem/model from which the training data was generated does not change. However,
    when it comes to RL with function approximation, the way the target (labeled *output*
    in supervised learning) is formed, it induces nonstationarity, and you need to
    come up with new ways to handle it. What I mean by *nonstationarity* is that you
    do not know the actual target values of *v*(*s*) or *q*(*s*, *a*). You use either
    the MC or TD approach to form estimates and then use these estimates as “targets.”
    As you improve the estimates of the target values, you use the revised estimates
    as new targets. In supervised learning it is different—the targets are given and
    fixed during training. The learning algorithm has no impact on the targets. In
    reinforcement learning, you do not have actual targets, and you use the estimates
    of the target values. The agent is trying to find optimal actions, such as *v*(*s*)
    or *q*(*s*, *a*). The targets in the learning algorithm change. Therefore, the
    targets are not fixed or stationary during the learning.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 函数逼近是监督学习领域广泛研究的一个主题，其中基于训练数据，你构建了底层模型的泛化。监督学习的大部分理论都可以应用于具有函数逼近的强化学习。然而，具有函数逼近的强化学习提出了新的问题，例如如何自举以及它对非平稳性的影响。在监督学习中，当算法在学习时，生成训练数据的问题/模型不会改变。然而，当涉及到具有函数逼近的强化学习时，目标（在监督学习中标记为*输出*）的形成方式，会导致非平稳性，你需要想出新的方法来处理它。我所说的*非平稳性*是指你不知道*v*(s)或*q*(s,
    a)的实际目标值。你使用MC或TD方法形成估计，然后使用这些估计作为“目标”。随着你改进目标值的估计，你使用修订后的估计作为新的目标。在监督学习中，情况不同——目标在训练期间给出并固定。学习算法对目标没有影响。在强化学习中，你没有实际的目标，你使用目标值的估计。智能体试图找到最优动作，如*v*(s)或*q*(s,
    a)。学习算法中的目标会变化。因此，目标在学习过程中不是固定或平稳的。
- en: Let’s revisit the update equations for MC (Equation [4-2](502835_2_En_4_Chapter.xhtml#Equ2))
    and TD (Equation [4-5](502835_2_En_4_Chapter.xhtml#Equ5)). I have modified the
    equations to make both MC and TD use the same notations of subscript *t* for the
    current time and *t* + 1 for the next instant. Both equations carry out the same
    update to move *V*[*t*](*s*) closer to its target, which is *G*[*t*](*s*) in the
    case of the MC update and *R*[*t*] + 1 + *γ* · *V*[*t*](*s*^′) for the TD(0) update.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回顾一下MC（方程[4-2](502835_2_En_4_Chapter.xhtml#Equ2)）和TD（方程[4-5](502835_2_En_4_Chapter.xhtml#Equ5)）的更新方程。我已经修改了方程，使得MC和TD都使用相同的下标
    *t* 表示当前时间，*t* + 1 表示下一个瞬间。这两个方程都执行相同的更新，将 *V*[*t*](*s*) 接近其目标，在MC更新中是 *G*[*t*](*s*)，在TD(0)更新中是
    *R*[*t*] + 1 + *γ* · *V*[*t*](*s*^′)。
- en: '![$$ {V}_{t+1}(s)={V}_t(s)+\alpha\ \left[{G}_t(s)-{V}_t(s)\right] $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ2.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![V_{t+1}(s)=V_t(s)+\alpha\ \left[{G}_t(s)-{V}_t(s)\right]](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ2.png)'
- en: (5-2)
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: (5-2)
- en: '![$$ {V}_{t+1}(s)={V}_t(s)+\alpha \left[{R}_{t+1}+\gamma \cdotp {V}_t\left({s}^{\prime}\right)-{V}_t(s)\right]
    $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ3.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![V_{t+1}(s)=V_t(s)+\alpha \left[{R}_{t+1}+\gamma \cdotp {V}_t\left({s}^{\prime}\right)-{V}_t(s)\right]](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ3.png)'
- en: (5-3)
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: (5-3)
- en: 'This is similar to what you do in supervised learning, especially in linear
    least square regression. You have the output values/targets *y*(*t*) and you have
    the input features *x*(*t*), together called *training data*. You can choose a
    model *Model*[*w*][*x*(*t*)] like the polynomial linear model, decision tree,
    or support vectors, or even other nonlinear models like neural nets. The training
    data is used to minimize the error between what the model is predicting and the
    actual output values from the training set. This is done by minimizing a loss
    function as follows:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 这与你在监督学习中所做的类似，特别是在线性最小二乘回归中。你有了输出值/目标 *y*(*t*) 和输入特征 *x*(*t*)，统称为*训练数据*。你可以选择一个模型
    *Model*[*w*][*x*(*t*)]，如多项式线性模型、决策树或支持向量，甚至其他非线性模型如神经网络。训练数据用于最小化模型预测值与训练集的实际输出值之间的误差。这是通过最小化以下损失函数来实现的：
- en: '![$$ J(w)={\left[y(t)-\hat{y}\left(t;w\right)\right]}^2;\mathrm{where}\ \hat{y}\left(t;w\right)={Model}_w\left[x(t)\right]
    $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ4.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![J(w)={\left[y(t)-\hat{y}\left(t;w\right)\right]}^2;\mathrm{where}\ \hat{y}\left(t;w\right)={Model}_w\left[x(t)\right]](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ4.png)'
- en: (5-4)
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: (5-4)
- en: 'When *J*(*w*) is a differentiable function, which is the case in this book,
    you can use gradient descent to tweak the weights/parameters *w* of the model
    to minimize the error/loss function *J*(*w*). Usually, the update is carried out
    in batches multiple times using the same training data until the loss stops reducing
    further. The model with weights *w* has now learned the underlying mapping from
    input *x*(*t*) to output *y*(*t*). The way the delta update to the weights is
    carried out is given in the following equations:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 当 *J*(*w*) 是一个可微函数，正如本书中的情况，你可以使用梯度下降来调整模型的权重/参数 *w* 以最小化误差/损失函数 *J*(*w*)。通常，更新操作会使用相同的训练数据多次批量执行，直到损失不再进一步减少。权重为
    *w* 的模型现在已经学会了从输入 *x*(*t*) 到输出 *y*(*t*) 的底层映射。权重更新的方式如下所示：
- en: Gradient of *J*(*w*) wrt *w*  ∶ =∇[*w*]*J*(*w*)
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '*J*(*w*) 关于 *w* 的梯度：=∇[*w*]*J*(*w*)'
- en: 'For the loss function given in Equation [5-4](#Equ4), this becomes:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 对于方程[5-4](#Equ4)中给出的损失函数，这变成了：
- en: '![$$ {\nabla}_wJ(w)=-2\cdotp \left[y(t)-\hat{y}\left(t;w\right)\right]\cdotp
    {\nabla}_w\hat{y}\left(t;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equb.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![∇_wJ(w)=-2\cdotp \left[y(t)-\hat{y}\left(t;w\right)\right]\cdotp ∇_w\hat{y}\left(t;w\right)](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equb.png)'
- en: If you remember your calculus, you will remember that ∇[*w*]*J*(*w*) is a vector
    in weight space—that is, it has ∣*w*∣ components. The direction of this vector
    is more important than the actual values of the components. The direction of ∇[*w*]*J*(*w*)
    is the direction in ∣*w*∣ space, which results in a maximum rate of change of
    *J*(*w*) as *w* changes. As *J*(*w*) is the squared loss—that is, the difference
    between actual and predicted values, you want to reduce *J*(*w*), the error, as
    much as possible. You can achieve this by moving *w* parameters in the negative
    direction of ∇[*w*]*J*(*w*). This will give you a new set of *w* parameters such
    that the value of *J*(*w*) is lowered.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你记得你的微积分，你会记得 ∇[*w*]*J*(*w*) 是权重空间中的一个向量——也就是说，它有 ∣*w*∣ 个分量。这个向量的方向比分量的实际值更重要。∇[*w*]*J*(*w*)
    的方向是 ∣*w*∣ 空间中的方向，这导致 *J*(*w*) 随 *w* 变化的最大变化率。由于 *J*(*w*) 是平方损失——即实际值和预测值之间的差异，你希望尽可能减少
    *J*(*w*)，即错误。你可以通过将 *w* 参数移动到 ∇[*w*]*J*(*w*) 的负方向来实现这一点。这将给你一组新的 *w* 参数，使得 *J*(*w*)
    的值降低。
- en: '![$$ {w}_{t+1}={w}_t-\alpha {\nabla}_wJ(w) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ5.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {w}_{t+1}={w}_t-\alpha {\nabla}_wJ(w) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ5.png)'
- en: (5-5)
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: (5-5)
- en: The weights move in the direction that minimize the loss—that is, the difference
    between the actual and predicted output values.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 权重移动的方向是使损失最小化——即实际输出值和预测输出值之间的差异。
- en: 'Moving on, let’s spend some time talking about the various approaches to function
    approximation. The most common approaches are as follows:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们花些时间来讨论函数逼近的各种方法。最常见的方法如下：
- en: 'Linear combination of features. You combine the features (such as speed, velocity,
    position, etc.) weighted by vector *w* and use the computed value as the state
    value. Common approaches are as follows:'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 特征的线性组合。你将特征（如速度、速度、位置等）通过向量 *w* 加权组合，并使用计算出的值作为状态值。常见的方法如下：
- en: Polynomials
  id: totrans-38
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 多项式
- en: Fourier basis functions
  id: totrans-39
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 傅里叶基函数
- en: Radial basis functions
  id: totrans-40
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 径向基函数
- en: Coarse coding
  id: totrans-41
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 粗编码
- en: Tile coding
  id: totrans-42
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 瓦片编码
- en: Nonlinear but differentiable approaches, with neural networks being the most
    popular and currently trending one.
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 非线性但可微的方法，其中神经网络是最受欢迎且目前趋势的方法。
- en: Nonparametric, memory-based approaches.
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 非参数、基于记忆的方法。
- en: This book mostly talks about deep learning–based neural network approaches that
    suit unstructured inputs, such as images captured by the agent’s vision system
    or freeform text using natural language processing (NLP). Later parts of this
    chapter and the next chapter are devoted to using deep learning–based function
    approximation, and you will see many variations with full code examples using
    PyTorch. But we are getting ahead of ourselves. Let’s first examine a few common
    linear approximation approaches such as coarse coding and tile coding. As the
    focus of this book is on the use of deep learning in reinforcement learning, I
    do not devote a lot of time to various other linear approximation approaches.
    Also, just because I am not devoting time to all the linear approaches, it does
    not mean that they lack power of effectiveness. Depending on the problem at hand,
    the linear approximation approach may be the right way to go; it’s effective,
    fast, and has convergence guarantees.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 本书主要讨论适用于非结构化输入的基于深度学习的神经网络方法，例如由智能体的视觉系统捕获的图像或使用自然语言处理（NLP）的自由格式文本。本章的后期部分和下一章将致力于使用基于深度学习的函数逼近，你将看到许多使用
    PyTorch 的完整代码示例的变体。但我们先不要跑题。让我们首先检查一些常见的线性逼近方法，如粗编码和瓦片编码。由于本书的重点是强化学习中深度学习的使用，我没有花太多时间在其他各种线性逼近方法上。此外，仅仅因为我没有花时间在所有线性方法上，并不意味着它们缺乏有效性和力量。根据手头的问题，线性逼近方法可能是正确的选择；它有效、快速，并且有收敛保证。
- en: Coarse Coding
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 粗编码
- en: Let’s revisit at the mountain car problem discussed in Figure [2-2](502835_2_En_2_Chapter.xhtml#Fig2).
    The car has a two-dimensional state, a position, and a velocity. Suppose you divide
    the two-dimensional state space into overlapping circles with each circle representing
    a feature. If state *S* lies inside a circle, that particular feature is present
    and has a value of 1; otherwise, the feature is absent and has a value of 0\.
    The number of features is the number of circles. Let’s say you have *p* circles;
    then you have converted a two-dimensional continuous state space into a p-dimensional
    state space, where each dimension can be 0 or 1\. In other words, each dimension
    can belong to {0,1}.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回顾一下图[2-2](502835_2_En_2_Chapter.xhtml#Fig2)中讨论的山地车问题。汽车有两个维度的状态，一个位置和一个速度。假设你将二维状态空间划分为重叠的圆，每个圆代表一个特征。如果状态*S*位于一个圆内，那么该特征存在，其值为1；否则，该特征不存在，其值为0。特征的数量是圆的数量。假设你有*p*个圆，那么你将一个二维连续状态空间转换成了一个p维状态空间，其中每个维度可以是0或1。换句话说，每个维度可以属于{0,1}。
- en: Note
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: '{0,1} represents the set of possible values—0 or 1\. (0,1)—with regular brackets
    representing the range of values—that is, any value from 0 to 1 with 0 and 1 excluded.
    [0,1) represents the range of values between 0 to 1 plus the value on left—that
    is, 0 is included in the range and the value 1 on the right side of the range
    is excluded.'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '{0,1}代表可能的值的集合——0或1。（0,1）——用常规括号表示值的范围——即从0到1的任何值，不包括0和1。[0,1)代表0到1之间的值以及左侧的值——即0包含在范围内，而范围右侧的值1被排除。'
- en: All those features represented by circles in which the state *S* lies will be
    “on” or equal to 1\. Figure [5-2](#Fig2) shows an example. Two states are shown
    in the diagram, and depending on the circles that these points lie inside, the
    corresponding features will be turned on, while other features will be turned
    off. The generalization will depend on the size of the circles and how densely
    they are packed together. If the circles are replaced by ellipses, the generalization
    will be more in the direction of the elongation. You could also choose shapes
    other than circles to control the amount of generalization.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 所有的特征，由圆表示且状态*S*位于其中，都将被“开启”或等于1。图[5-2](#Fig2)展示了示例。图中显示了两个状态，根据这些点所在的圆，相应的特征将被开启，而其他特征将被关闭。泛化将取决于圆的大小以及它们紧密排列的程度。如果用椭圆代替圆，泛化将更多地朝向拉伸方向。你也可以选择除圆以外的其他形状来控制泛化的程度。
- en: '![](../images/502835_2_En_5_Chapter/502835_2_En_5_Fig2_HTML.jpg)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_5_Chapter/502835_2_En_5_Fig2_HTML.jpg)'
- en: A Venn diagram of 4 overlapped circles represents the coarse coding in two dimensions.
    The center overlapped area of all the circles is S, and the other 2 labeled circles
    are S 1, and S 2.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 四个重叠的圆的维恩图代表了二维的粗编码。所有圆的中心重叠区域是S，其他两个标记的圆是S1和S2。
- en: Figure 5-2
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-2
- en: Coarse coding in two dimensions using circles. The generalization depends on
    the size of circles as well as the density with which the circles are placed together
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 使用圆在二维中进行粗编码。泛化取决于圆的大小以及圆排列的密度
- en: Now consider the case with large, densely packed circles. A large circle makes
    the initial generalization wide where two faraway states are connected because
    they fall inside at least one common circle. However, the density (i.e., number
    of circles) allows you to control the fine-grained generalization. By having many
    circles, you ensure that even nearby states have at least one feature that is
    different between two states. This will hold even when each of the individual
    circles is big. With the help of experiments with varying configurations of the
    circle size and number of circles, you can fine-tune the size and number of circles
    to control the generalization appropriate for the problem/domain in question,
    controlling generalization with the size of the shape and granularity with the
    density of the shapes.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 现在考虑大而密集排列的圆的情况。一个大圆使得初始泛化范围很广，因为两个远离的状态通过至少一个共同的圆连接在一起。然而，密度（即圆的数量）允许你控制细粒度泛化。通过拥有许多圆，你确保即使相邻的状态之间至少有一个特征在两个状态之间是不同的。即使每个单独的圆很大，这一点也会成立。通过进行不同圆的大小和数量配置的实验，你可以微调圆的大小和数量，以控制适合问题/域的泛化，通过形状的大小控制泛化，通过形状的密度控制粒度。
- en: Tile Encoding
  id: totrans-56
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 瓦片编码
- en: Tile encoding is a form of coarse coding that can be programmatically planned.
    It works well over multidimensional space, making it much more useful than generic
    coarse coding.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 瓷砖编码是一种可以程序化规划的粗编码形式。它在多维空间中表现良好，使其比通用的粗编码更有用。
- en: Let’s consider a two-dimensional space like the mountain car I just talked about.
    You divide the space into nonoverlapping grids covering the whole space. Each
    such division is called *tiling*, as shown in the left diagram of Figure [5-3](#Fig3).
    The *tiles* are square here and, depending on the location of state *S* on this
    2*D* space, only one tile is 1, while all other tiles are 0.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑一个类似于我刚才提到的山车问题的二维空间。你将空间划分为非重叠的网格，覆盖整个空间。这样的每个划分称为*填充*，如图[5-3](#Fig3)的左侧图示所示。这里的*瓷砖*是正方形的，并且根据状态*S*在这个2*D*空间中的位置，只有一个瓷砖是1，而所有其他瓷砖都是0。
- en: '![](../images/502835_2_En_5_Chapter/502835_2_En_5_Fig4_HTML.jpg)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_5_Chapter/502835_2_En_5_Fig4_HTML.jpg)'
- en: A node diagram. Node s t leads to node a t through policy. Nodes s t and a t
    lead to node s t plus 1 that further leads to nodes a t plus 1 and s t plus 2\.
    Node a t plus 1 leads to node s t plus 2\. A dashed line labeled transition is
    drawn between nodes s t plus 1 and a t and s t plus 1 and s t.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 一个节点图。节点s t通过策略导致节点a t。节点s t和a t导致节点s t+1，该节点进一步导致节点a t+1和s t+2。节点a t+1导致节点s
    t+2。在节点s t+1和a t以及s t+1和s t之间画了一条标记为转移的虚线。
- en: Figure 5-4
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-4
- en: Policy and transition dynamics under Markov assumptions
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 在马尔可夫假设下的策略和转移动力学
- en: '![](../images/502835_2_En_5_Chapter/502835_2_En_5_Fig3_HTML.jpg)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_5_Chapter/502835_2_En_5_Fig3_HTML.jpg)'
- en: A 4 by 4 grid with a highlighted dot at the bottom right of a cell in the third
    column and second row. On the right, multiple shaded, overlapped 4 by 4 grids
    are represented with a highlighted cell in the third column and second row containing
    a dot.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 一个4×4的网格，在第三列第二行的单元格底部右方有一个高亮的点。在右侧，多个阴影重叠的4×4网格用第三列第二行含有点的单元格表示。
- en: Figure 5-3
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-3
- en: Tile coding. You have 4×4=16 tiles in a single tiling, as shown in the left
    figure. And you have four tilings overlapping each other, as shown in four different
    colors in the right figure. A state (green color dot) lights up a single tile
    from each tiling. The generalization is controlled by the number of tiles in a
    single tiling as well as the total number of tilings
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 瓷砖编码。在一个单独的填充中，你有4×4=16个瓷砖，如图左侧所示。并且你有四个相互重叠的填充，如图右侧不同颜色所示。一个状态（绿色圆点）点亮了每个填充中的一个瓷砖。泛化程度由单个填充中的瓷砖数量以及总的填充数量控制。
- en: You then have a number of such *tiling* offset from each other. Suppose you
    use *n* tilings; then for a state, only one tile from each tiling will be on.
    In other words, if there are *n* tilings, then exactly *n* features will be 1,
    a single feature from each of the *n* tilings. Figure [5-3](#Fig3) shows an example.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，你会有许多这样的*填充*彼此偏移。假设你使用*n*个填充；那么对于一个状态，每个填充中只有一个瓷砖是开启的。换句话说，如果有*n*个填充，那么恰好有*n*个特征是1，每个*n*个填充中的一个特征。图[5-3](#Fig3)展示了示例。
- en: Note that if the learning rate of step size were *α*(alpha) in Equations [5-1](#Equ1)
    and [5-2](#Equ2), you would now replace it with ![$$ \frac{\alpha }{n} $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq14.png)
    where *n* is the number of tilings. This makes the algorithm scale free of the
    number of tilings. As both coarse coding and tile encoding use binary features,
    digital computers can speed up computations.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，如果步骤大小的学习率在方程[5-1](#Equ1)和[5-2](#Equ2)中是*α*(alpha)，你现在应该将其替换为![\( \frac{\alpha
    }{n} \)](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq14.png)，其中*n*是填充的数量。这使得算法与填充的数量无关。由于粗编码和瓷砖编码都使用二进制特征，数字计算机可以加速计算。
- en: 'The nature of the generalization now depends on the following factors:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 现在泛化的性质取决于以下因素：
- en: The number of tiles in a single tiling (the left figure in Figure [5-3](#Fig3)).
  id: totrans-70
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 单个填充中的瓷砖数量（图[5-3](#Fig3)中的左侧图示）。
- en: The number of tilings (the right figure in Figure [5-3](#Fig3) showing four
    tilings in four different colors).
  id: totrans-71
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 图中填充的数量（图[5-3](#Fig3)中的右侧图示，展示了四种不同颜色的四种填充）。
- en: The nature of offset, whether uniform and symmetric or asymmetric.
  id: totrans-72
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 偏移的性质，无论是均匀对称还是非对称。
- en: There are some general strategies to determine the previous numbers. Consider
    the situation where each tile in a single tiling is a square of width *w*. For
    a continuous space of *k* dimensions, it will be a *k*-dimensional square with
    each side of width *w*. Suppose you have *n* tilings, and hence the tilings need
    to be offset from each other by a distance of ![$$ \frac{w}{n} $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq15.png)
    in all dimensions. This is known as a *displacement vector*. The first heuristic
    is to choose *n* such that *n* = 2^(*i*) ≥ 4*k*. The displacement in each direction
    is an odd multiple (1, 3, 5, 7, …., 2*k* − 1) of displacement vector ![$$ \frac{w}{n}
    $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq16.png). The
    upcoming example uses a library to help you divide the two-dimensional mountain
    car state space into appropriate tilings. You will provide the 2D state vector,
    and the library will give you back the active tiles vector.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 有一些一般策略可以确定前面的数字。考虑这种情况，一个单层铺砖中的每个砖块都是一个宽度为 *w* 的正方形。对于 *k* 维的连续空间，它将是一个 *k*
    维的正方形，每边宽度为 *w*。假设你有 *n* 个铺砖，因此铺砖需要在所有维度上相互偏移一个距离 ![$$ \frac{w}{n} $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq15.png)。这被称为*位移向量*。第一个启发式方法是选择
    *n* 使得 *n* = 2^(*i*) ≥ 4*k*。每个方向的位移是位移向量 ![$$ \frac{w}{n} $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq16.png)
    的奇数倍（1, 3, 5, 7, ……，2*k* - 1）。接下来的例子将使用一个库来帮助你将二维的山地车状态空间划分为适当的铺砖。你将提供2D状态向量，库将返回活动砖块向量。
- en: Challenges in Approximation
  id: totrans-74
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 近似挑战
- en: While I leverage the knowledge of supervised learning–based methods like gradient
    descent explained earlier, you have to keep two things in mind that make gradient-based
    methods harder to work in reinforcement learning as compared to the supervised
    learning.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 当我利用前面解释的基于监督学习的方法（如梯度下降）的知识时，你必须牢记两点，这使得基于梯度的方法在强化学习中的工作比在监督学习中更困难。
- en: First, in supervised learning, the training data is held constant. The data
    is generated from the model, which does not change during the data generation
    process. It is a ground truth that is given to you. You are building a function
    whose parameters are identified by using this training data to learn input to
    output mapping. The data provided to the training algorithm is external to the
    learning process/algorithm. It does not depend on the algorithm in any way. It
    is given as constant and independent of the learning algorithm. Unfortunately,
    in RL, especially in a model-free setup, this is not the case. The data used to
    generate training samples is based on the policy the agent is following, and it
    is not a complete picture of the underlying model. As you explore the environment,
    you learn more and adjust the policy. This change in policy leads to exploration
    of news states and actions, which in turns generates a new set of training data
    for the next step of iteration. You either use the MC-based approach of observing
    an actual trajectory or bootstrap under TD to form an estimate of the target value,
    the *y*(*t*). As you explore, learn more, and adjust the policy, the target *y*(*t*)
    for a given specific state changes, which is not the case in supervised learning.
    This is known as the problem of *nonstationary targets*.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，在监督学习中，训练数据保持不变。数据由模型生成，在数据生成过程中不会发生变化。这是一个给予你的真实情况。你正在构建一个函数，其参数通过使用训练数据来学习输入到输出的映射来识别。提供给训练算法的数据是学习过程/算法之外的。它以任何方式都不依赖于算法。它被作为常数给出，并且独立于学习算法。不幸的是，在强化学习中，尤其是在无模型设置中，情况并非如此。用于生成训练样本的数据基于智能体遵循的策略，并且它并不是底层模型的完整图景。当你探索环境时，你会学到更多并调整策略。这种策略的变化会导致探索新的状态和动作，这反过来又为下一次迭代的下一步生成了一组新的训练数据。你可以使用基于MC的观察实际轨迹的方法，或者根据TD进行自举，以形成一个目标值
    *y*(t) 的估计。随着你的探索、学习和调整策略，给定特定状态的目标值 *y*(t) 会发生变化，这在监督学习中是不存在的。这被称为*非平稳目标*问题。
- en: Second, supervised learning is based on the theoretical premise of samples being
    uncorrelated to each other, mathematically known as i.i.d. (for “independent identically
    distributed”) data. All the algorithms for regression, classification, trees,
    and support vector machines are based on this i.i.d. assumption. However, in RL,
    the data you see depends on the policy that the agent followed to generate the
    data. In a given episode, the states you see are dependent on the policy the agent
    is following at that instant. States that come in later time steps depend on the
    action (decisions) the agent took earlier. In other words, the data is *correlated*.
    The next state *s*[*t* + 1] you see depends on the current state *s*[*t*] and
    the action *a*[*t*] agent takes in that state. Note that this assumes that the
    Markov property (the future state *s*[*t* + 1]) depends only on the current state
    *s*[*t*] and action *a*[*t*] you take. There is no dependence on the past—that
    is, either actions or states from time step *t* − 1 or before. The relationship
    can be expressed by way of a dependency graph, as shown in Figure [5-4](#Fig4).
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 其次，监督学习基于样本之间相互独立的理论前提，在数学上称为 i.i.d.（“独立同分布”）数据。所有回归、分类、树和支持向量机的算法都是基于这个 i.i.d.
    假设。然而，在强化学习中，你看到的数据取决于代理生成数据时遵循的策略。在给定的一幕中，你看到的州取决于代理在那个时刻遵循的策略。在后续时间步中到来的状态取决于代理之前采取的行动（决策）。换句话说，数据是*相关的*。你看到的下一个状态
    *s*[*t* + 1] 依赖于当前状态 *s*[*t*] 和代理在该状态下采取的行动 *a*[*t*]。请注意，这假设马尔可夫属性（未来的状态 *s*[*t* + 1]）只依赖于当前状态
    *s*[*t*] 和你采取的行动 *a*[*t*]。没有对过去的依赖——也就是说，时间步 *t* − 1 或更早的行动或状态。这种关系可以通过依赖图来表示，如图
    [5-4](#Fig4) 所示。
- en: This temporal dependence on data in RL means that you cannot shuffle the data
    in the case of RL and that each data point, unlike with supervised learning, cannot
    be used in isolation. The whole trajectory of data points from the beginning of
    an episode to the end must be used together.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 在强化学习（RL）中，数据的时间依赖性意味着你无法像在监督学习（supervised learning）中那样对数据进行洗牌，并且每个数据点都不能单独使用。从一幕开始到结束的整个数据点轨迹必须一起使用。
- en: These two issues make function approximation harder in an RL setup. As you go
    along, you will see the various approaches that have been taken to address these
    challenges. These approaches do not always come with theoretical guarantees—rather
    with practical hacks and ways that have proven useful and do carry some intuitive
    reasoning.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个问题使得在强化学习设置中函数逼近更加困难。随着你的深入，你会看到已经采取的各种方法来应对这些挑战。这些方法并不总是带有理论保证——而是带有实用的技巧和已经证明有用的方法，并且确实包含一些直观的推理。
- en: With a broad understanding of the approach, it is time now to start with the
    usual course of first looking at value *prediction/estimate* to learn a function
    that can represent the value functions *v*(*s*) or state-action value functions
    *q*(*s*, *a*). You will then look at the *control* aspect—that is, the process
    of optimizing the policy π(*a*| *s*) that the agent should follow. It will follow
    the usual pattern of using Generalized Policy Iteration (GPI), just like the approach
    in the previous chapter—alternating between predicting/estimating the state-action
    values and using a greedy policy to control/identify the best action. And you
    keep iterating in this loop until some convergence is observed.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 在对方法有广泛理解之后，现在是时候开始通常的课程了，首先查看价值*预测/估计*来学习一个可以表示价值函数 *v*(*s*) 或状态-动作价值函数 *q*(*s*,
    *a*) 的函数。然后，你将查看*控制*方面——即优化代理应遵循的策略 π(*a*| *s*) 的过程。它将遵循与上一章中方法相同的模式——在预测/估计状态-动作值和使用贪婪策略来控制/识别最佳行动之间交替。并且你将在这个循环中迭代，直到观察到收敛。
- en: 'Incremental Prediction: MC, TD, TD(***λ***)'
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 增量预测：MC，TD，TD(***λ***)
- en: This section looks at the prediction problem,—that is, how to estimate the state
    values using function approximation.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 本节探讨预测问题——即如何使用函数逼近估计状态值。
- en: 'Following along, you will now attempt to extend the supervised training process
    of tuning a model using training data consisting of inputs and targets. This is
    done to function approximation under RL using the loss function in Equation [5-4](#Equ4)
    and weight update, as shown in Equation [5-5](#Equ5). If you compare the loss
    function in Equation [5-4](#Equ4) and the MC/TD updates in Equations [5-2](#Equ2)
    and [5-3](#Equ3), you can draw a parallel by thinking of MC and TD updates as
    operations, which are trying to minimize the error between the actual target *V*[π](*s*)
    and the current estimate *V*[*t*](*s*). You can represent the loss function as
    follows:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 沿着这个思路，你现在将尝试扩展监督训练过程，使用由输入和目标组成的训练数据来调整模型。这是在强化学习下使用方程 [5-4](#Equ4) 中的损失函数和权重更新来进行函数逼近，如方程
    [5-5](#Equ5) 所示。如果你比较方程 [5-4](#Equ4) 中的损失函数和方程 [5-2](#Equ2) 和 [5-3](#Equ3) 中的
    MC/TD 更新，你可以通过将 MC 和 TD 更新视为操作来建立平行关系，这些操作试图最小化实际目标 *V*[π](*s*) 和当前估计 *V*[*t*](*s*)
    之间的误差。你可以将损失函数表示如下：
- en: '![$$ J(w)={E}_{\uppi}{\left[{V}_{\pi }(s)\hbox{--} {V}_t(s)\right]}^2 $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ6.png)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
  zh: '![$$ J(w)={E}_{\uppi}{\left[{V}_{\pi }(s)\hbox{--} {V}_t(s)\right]}^2 $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ6.png)'
- en: (5-6)
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: (5-6)
- en: 'This is similar to the loss function for supervised learning, as shown in Equation
    [5-4](#Equ4). Following the same derivation as in Equation [5-5](#Equ5) and using
    stochastic gradient descent (i.e., replacing expectation with update in each sample),
    you can write the update equation for weight vector *w* as follows:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 这与监督学习的损失函数类似，如方程 [5-4](#Equ4) 所示。遵循与方程 [5-5](#Equ5) 相同的推导过程，并使用随机梯度下降（即在每个样本中用更新替换期望），可以写出权重向量
    *w* 的更新方程如下：
- en: '![$$ {w}_{t+1}={w}_t-\alpha .{\nabla}_w\ J(w) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equc.png)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {w}_{t+1}={w}_t-\alpha .{\nabla}_w\ J(w) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equc.png)'
- en: '![$$ {w}_{t+1}={w}_t+\alpha .\left[{V}_{\pi }(s)-{V}_t\left(s;w\right)\right].{\nabla}_w\
    {V}_t\left(s;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ7.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {w}_{t+1}={w}_t+\alpha .\left[{V}_{\pi }(s)-{V}_t\left(s;w\right)\right].{\nabla}_w\
    {V}_t\left(s;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ7.png)'
- en: (5-7)
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: (5-7)
- en: Here, *w* represents the weight vector of the model—that is, the tunable parameters
    of the model that are progressively improved to fit the model to the state values
    observed for a given policy. However, unlike supervised learning, you do not have
    the actual/target output values *V*[π](*s*); rather, you use estimates of these
    targets. With MC, the estimate/target of *V*[π](*s*) is *G*[*t*](*s*), *w*hile
    the estimate/target under TD(0) is *R*[*t* + 1] + *γ* · *V*[*t*](*s*^′). Accordingly,
    the updates under MC and TD(0) with functional approximation can be written as
    follows.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，*w* 代表模型的权重向量——即模型的可调参数，这些参数会逐步改进以适应给定策略观察到的状态值。然而，与监督学习不同，你并没有实际的/目标输出值
    *V*[π](*s*)；相反，你使用这些目标的估计值。在 MC 中，*V*[π](*s*) 的估计/目标是 *G*[*t*](*s*)，而在 TD(0) 中，估计/目标是
    *R*[*t* + 1] + *γ* · *V*[*t*](*s*^′)。因此，MC 和 TD(0) 下的更新可以写成如下形式。
- en: 'MC update:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: MC 更新：
- en: '![$$ {w}_{t+1}={w}_t+\alpha .\left[{G}_t(s)-{V}_t\left(s;w\right)\right].{\nabla}_w\
    {V}_t\left(s;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ8.png)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {w}_{t+1}={w}_t+\alpha .\left[{G}_t(s)-{V}_t\left(s;w\right)\right].{\nabla}_w\
    {V}_t\left(s;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ8.png)'
- en: (5-8)
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: (5-8)
- en: 'TD(0) update:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: TD(0) 更新：
- en: '![$$ {w}_{t+1}={w}_t+\alpha .\left[{R}_{t+1}+\gamma \bullet {V}_t\left({s}^{\prime
    };w\right)-{V}_t\left(s;w\right)\right].{\nabla}_w\ {V}_t\left(s;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ9.png)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {w}_{t+1}={w}_t+\alpha .\left[{R}_{t+1}+\gamma \bullet {V}_t\left({s}^{\prime
    };w\right)-{V}_t\left(s;w\right)\right].{\nabla}_w\ {V}_t\left(s;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ9.png)'
- en: (5-9)
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: (5-9)
- en: 'A similar set of equations can be written for q-values. You will see that in
    the next section. This is along the same lines of what you did for the MC and
    TD control sections in the previous chapter; first you use state action values
    in a model-free world to build accurate estimates of the state action values under
    the current policy and then use greedy updates to find values, maximizing actions
    in each individual state. Moving back and continuing with the derivation of weight
    update equation, let’s first consider the setup of linear approximation where
    the state value ![$$ \hat{v}\left(s;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq17.png)
    can be expressed as a dot product of state vector *x*(*s*) and weight vector *w*,
    each with vector component dimension index represented as *i*:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 可以为q值编写一组类似的方程。你将在下一节看到这一点。这与你在上一章的MC和TD控制部分所做的工作类似；首先，你在无模型的世界中使用状态动作值来构建当前策略下状态动作值的准确估计，然后使用贪婪更新来找到值，在每个单独的状态中最大化动作。回到权重更新方程的推导，让我们首先考虑线性近似设置，其中状态值
    ![$$ \hat{v}\left(s;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq17.png)
    可以表示为状态向量 *x*(*s*) 和权重向量 *w* 的点积，每个向量的分量维度索引表示为 *i*：
- en: '![$$ \hat{v}\left(s;w\right)=x{(s)}^T\cdotp w=\sum \limits_i{x}_i(s)\cdotp
    {w}_i $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ10.png)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \hat{v}\left(s;w\right)=x{(s)}^T\cdotp w=\sum \limits_i{x}_i(s)\cdotp
    {w}_i $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ10.png)'
- en: (5-10)
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: (5-10)
- en: 'In the previous expression, the gradient of ![$$ \hat{v}\left(s;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq18.png)
    with respect to *w* will be the state vector *x*(*s*)—that is:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的表达式中，关于 *w* 的 ![$$ \hat{v}\left(s;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq18.png)
    的梯度将是状态向量 *x*(*s*)——即：
- en: '![$$ {\nabla}_w{V}_t\left(s;w\right)=x(s) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ11.png)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\nabla}_w{V}_t\left(s;w\right)=x(s) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ11.png)'
- en: (5-11)
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: (5-11)
- en: 'Combining Equation [5-11](#Equ11) with Equation [5-7](#Equ7) gives the following:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 将方程[5-11](#Equ11)与方程[5-7](#Equ7)结合给出以下结果：
- en: '![$$ {w}_{t+1}={w}_t+\alpha .\left[{V}_{\pi }(s)-{V}_t\left(s;w\right)\right].x(s)
    $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ12.png)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {w}_{t+1}={w}_t+\alpha .[V_{\pi }(s)-V_t\left(s;w\right)].x(s) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ12.png)'
- en: (5-12)
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: (5-12)
- en: As discussed earlier, you do not know the true state value *V*[π](*s*), and
    hence you use an estimate *G*[*t*](*s*) in the MC approach and an estimate *R*[*t* + 1] + *γ* · *V*[*t*](*s*^′)
    in the TD(0) approach. This gives you the weight update rules for MC and TD in
    the linear approximation case as follows.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，你不知道真正的状态值 *V*[π](*s*)，因此你在蒙特卡洛方法中使用估计 *G*[t](*s*)，在TD(0)方法中使用估计 *R*[t+1]
    + *γ* · *V*[t](*s*^′)。这给出了线性近似情况下MC和TD的权重更新规则如下。
- en: 'MC update:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: MC更新：
- en: '![$$ {w}_{t+1}={w}_t+\alpha .\left[{G}_t(s)-{V}_t\left(s;w\right)\right].x(s)
    $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ13.png)'
  id: totrans-108
  prefs: []
  type: TYPE_IMG
  zh: '![w_{t+1}=w_t+α.[G_t(s)-V_t(s;w)].x(s)](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ13.png)'
- en: (5-13)
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: (5-13)
- en: 'TD(0) update:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: TD(0)更新：
- en: '![$$ {w}_{t+1}={w}_t+\alpha .\left[{R}_{t+1}+\gamma \ast {V}_t\left({s}^{\prime
    };w\right)-{V}_t\left(s;w\right)\right].x(s) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ14.png)'
  id: totrans-111
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {w}_{t+1}={w}_t+\alpha .[R_{t+1}+\gamma \ast V_t\left({s}^{\prime };w\right)-V_t\left(s;w\right)].x(s)
    $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ14.png)'
- en: (5-14)
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: (5-14)
- en: 'In simple terms, the update to weights—that is, the second term on the right
    side of Equation [5-14](#Equ14) can be expressed as follows:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，权重的更新——即方程[5-14](#Equ14)右侧的第二项——可以表示如下：
- en: Update = learning rate x prediction error x feature value
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更新 = 学习率 x 预测误差 x 特征值
- en: Where learning rate is α, prediction error is denoted as *R*[*t* + 1] + *γ* · *V*[*t*](*s*^′;
    *w*) − *V*[*t*](*s*; *w*) and feature value is *x*(*s*).
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 其中学习率是α，预测误差表示为 *R*[t+1] + *γ* · *V*[t](*s*^′; *w*) − *V*[t](*s*; *w*)，特征值是
    *x*(*s*)。
- en: 'Let’s tie this back to the table-based approach for the discrete states that
    you saw in the previous chapter. The table lookup—that is, using state or state-action
    values as an index to look into a table or a dictionary to get the values—is a
    special case of the linear approach. Consider that each component of *x*(*s*)
    is either 1 or 0 and only one of them can have a value of 1, with the rest of
    the features being 0\. *x*^(*table*)(*s*) is a column vector of size p in which
    only one element can have a value of 1 at any point, with the rest of the elements
    equal to 0\. Depending on the state the agent is in, the corresponding element
    would be 1\. Therefore, the number of elements in the column vector (*p*) is equal
    to the number of states the agent can exit in. This is as shown here:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们将其与之前章节中看到的基于表的离散状态方法联系起来。查找表，即使用状态或状态-动作值作为索引查找表或字典以获取值，是线性方法的一种特殊情况。考虑到*x*(s)的每个分量要么是1要么是0，并且只有一个可以具有值为1，其余特征为0。*x*^(*table*)(*s*)是一个大小为p的列向量，其中在任何时刻只有一个元素可以具有值为1，其余元素等于0。根据代理所处的状态，相应的元素将是1。因此，列向量中的元素数量(*p*)等于代理可以退出的状态数量。这如图所示：
- en: '![$$ {x}^{table}(s)=\left(\genfrac{}{}{0pt}{}{1\left(s={s}_1\right)}{\begin{array}{c}..\\
    {}..\\ {}1\left(s={s}_p\right)\end{array}}\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equd.png)'
  id: totrans-117
  prefs: []
  type: TYPE_IMG
  zh: '![x^table(s)=(1(s=s1), 1(s=s2), ..., 1(s=sp))](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equd.png)'
- en: The weight vector comprises the values of state v(s) for each *s* = *s*[1],
    *s*[2], …*s*[*p*].
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 权重向量包含了每个状态v(s)的值，对于每个s = s[1], s[2], … s[p]。
- en: '![$$ w=\left(\genfrac{}{}{0pt}{}{w_1}{\begin{array}{c}..\\ {}..\\ {}{w}_p\end{array}}\right)=\left(\genfrac{}{}{0pt}{}{v\left({s}_1\right)}{\begin{array}{c}..\\
    {}..\\ {}v\left({s}_1\right)\end{array}}\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Eque.png)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
  zh: '![w=（w1, w2, ..., wp）=（v(s1), v(s2), ..., v(sp)）](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Eque.png)'
- en: 'Using these expressions in Equation [5-10](#Equ10), you get the following:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这些表达式在方程[5-10](#Equ10)中，你得到以下结果：
- en: '![$$ \hat{v}\left(s={s}_k;w\right)=x{(s)}^T.w=v\left({s}_k\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equf.png)'
  id: totrans-121
  prefs: []
  type: TYPE_IMG
  zh: '![^v(s=s_k;w)=x(s)^T.w=v(s_k)](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equf.png)'
- en: You can see that the value of state *s* = *s*[*k*] can be expressed as a dot
    product of the state vector *x*(*s*) and the weight vector *w*. If you substitute
    this expression back into Equation [5-13](#Equ13) for the MC update or into Equation
    [5-14](#Equ14) for the TD(0) update, you get the familiar update rules derived
    directly for discrete state situation in Chapter [4](502835_2_En_4_Chapter.xhtml).
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以看到状态s = s[*k*]的值可以表示为状态向量*x*(s)和权重向量*w*的点积。如果你将这个表达式代入MC更新方程[5-13](#Equ13)或TD(0)更新方程[5-14](#Equ14)，你将得到在第四章直接为离散状态情况推导出的熟悉的更新规则。
- en: 'Here is the MC update:'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是MC更新：
- en: '![$$ {V}_{t+1}(s)={V}_t(s)+\alpha .\left[{G}_t(s)-{V}_t(s)\right],\kern0.5em
    s\ \epsilon\ {s}_1,{s}_1,\dots, {s}_p $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ15.png)'
  id: totrans-124
  prefs: []
  type: TYPE_IMG
  zh: '![V_{t+1}(s)=V_t(s)+α.[G_t(s)-V_t(s)], s∈s1, s1, ..., sp](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ15.png)'
- en: (5-15)
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: (5-15)
- en: 'Here is the TD(0) update:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是TD(0)更新：
- en: '![$$ {V}_{t+1}(s)={V}_t(s)+\alpha .\left[{R}_{t+1}+\gamma \cdotp {V}_t\left({s}^{\prime}\right)-{V}_t(s)\right],\kern0.5em
    s\ \epsilon\ {s}_1,{s}_1,\dots, {s}_p $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ16.png)'
  id: totrans-127
  prefs: []
  type: TYPE_IMG
  zh: '![V_{t+1}(s)=V_t(s)+α.[R_{t+1}+γ.V_t(s'')-V_t(s)], s∈s1, s1, ..., sp](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ16.png)'
- en: (5-16)
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: (5-16)
- en: The previous derivation was to tie back the table lookup back as a special case
    of a more general linear function approximation.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 之前的推导是为了将查找表作为更一般线性函数逼近的特殊情况重新联系起来。
- en: One more point to note that I glossed over while deriving the update equations
    were the details of the target estimates *G*[*t*](*s*) in MC and *R*[*t* + 1] + *γ* · *V*[*t*](*s*^′)
    in TD(0). These estimates are not some constant fixed value. These are also dependent
    on the policy—for MC, directly on the sample episode return *G*[*t*](*s*) and
    on the value of next state *V*[*t*](*s*^′) in the case of TD(0). As an example,
    let’s revisit Equation [5-6](#Equ6) and replace *V*[π](*s*) with the TD target
    and then take the gradient.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 在推导更新方程时，我略过的一点是 MC 中的目标估计 *G*[*t*](*s*) 和 TD(0) 中的 *R*[*t* + 1] + *γ* · *V*[*t*](*s*^′)
    的细节。这些估计不是某个固定的常数值。它们也依赖于策略——对于 MC，直接依赖于样本回放 *G*[*t*](*s*) 和 TD(0) 中下一个状态 *V*[*t*](*s*^′)
    的值。作为一个例子，让我们回顾方程 [5-6](#Equ6)，并用 TD 目标替换 *V*[π](*s*)，然后取梯度。
- en: '![$$ J(w)={\left[{V}_{\pi }(s)\hbox{--} {V}_t(s)\right]}^2 $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equg.png)'
  id: totrans-131
  prefs: []
  type: TYPE_IMG
  zh: '![J(w)={\left[{V}_{\pi }(s)\hbox{--} {V}_t(s)\right]}^2](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equg.png)'
- en: 'Replacing *V*[π](*s*) with the value of target based on the model , you have:'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 将 *V*[π](*s*) 替换为基于模型的预期目标值，你得到：
- en: '![$$ J(w)={\left[{R}_{t+1}+\gamma \cdotp {V}_t\left({s}^{\prime };w\right)-{V}_t\left(s;w\right)\right]}^2
    $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equh.png)'
  id: totrans-133
  prefs: []
  type: TYPE_IMG
  zh: '![J(w)={\left[{R}_{t+1}+\gamma \cdotp {V}_t\left({s}^{\prime };w\right)-{V}_t\left(s;w\right)\right]}^2](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equh.png)'
- en: If you take the derivative of *J*(*w*) with respect to *w*, you will actually
    get two terms, one due to the derivative of *V*[*t*](*s*^′; *w*), the next state
    value, and another term due to the derivative of *V*[*t*](*s*; *w*), the current
    state value. Such an approach of taking both gradient contributions ∇*V*[*t*](*s*^′;
    *w*) and ∇*V*[*t*](*s*; *w*) introduces shifting of target values and has shown
    to worsen the speed of learning. First, the reason is that you want the targets
    to stay constant, and hence you need to ignore the contribution due to ∇*V*[*t*](*s*^′;
    *w*). Second, conceptually with gradient descent, you are trying to pull the value
    of the current state *V*[*t*](*s*; *w*) toward its target. Taking the second contribution
    term ∇*V*[*t*](*s*^′; *w*) means that you are trying to move the value of the
    next state *S* = *s*^′ toward the value of the current state *S* = *s*.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对 *J*(*w*) 关于 *w* 求导，实际上你会得到两个项，一个是因为 *V*[*t*](*s*^′; *w*) 的导数，下一个状态值，另一个是因为
    *V*[*t*](*s*; *w*) 的导数，当前状态值。这种同时考虑梯度贡献 ∇*V*[*t*](*s*^′; *w*) 和 ∇*V*[*t*](*s*;
    *w*) 的方法会导致目标值的变化，并且已被证明会降低学习的速度。首先，原因是你想让目标值保持不变，因此你需要忽略 ∇*V*[*t*](*s*^′; *w*)
    的贡献。其次，从概念上讲，使用梯度下降，你试图将当前状态 *V*[*t*](*s*; *w*) 的值拉向其目标值。取第二个贡献项 ∇*V*[*t*](*s*^′;
    *w*) 意味着你试图将下一个状态 *S* = *s*^′ 的值移动到当前状态 *S* = *s* 的值。
- en: In summary, you take only the derivative of the current state value *V*[*t*](*s*;
    *w*) and ignore the derivative of the next state value *V*[*t*](*s*^′; *w*). The
    approach makes the value estimation look similar to the approach used with supervised
    learning with stationary targets. This is also the reason that sometimes the gradient
    descent method used in Equations [5-8](#Equ8) and [5-9](#Equ9) are also called
    *semi-gradient* methods. It is because you are taking gradient for the current
    state and ignoring any update in weights due to the gradient of the next state.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，你只对当前状态值 *V*[*t*](*s*; *w*) 求导，并忽略下一个状态值 *V*[*t*](*s*^′; *w*) 的导数。这种方法使得值估计看起来类似于使用具有固定目标值的监督学习方法。这也是为什么有时在方程
    [5-8](#Equ8) 和 [5-9](#Equ9) 中使用的梯度下降方法也被称为 *半梯度* 方法的原因。这是因为你在对当前状态求梯度，而忽略由于下一个状态的梯度引起的任何权重更新。
- en: As I touched on earlier, the convergence of algorithms is not guaranteed anymore,
    unlike the guarantee you had in the tabular setup due to contraction theorem.
    However, most of the algorithms with some careful considerations do converge in
    practice. Table [5-1](#Tab1) shows the convergence of various prediction/estimation
    algorithms. I will not be going into the detailed explanation of these convergence
    properties. Such a discussion is more suited for a book with a focus on the theoretical
    aspects of learning. This book is a practical one, with just enough theory to
    understand the background and appreciate the nuances of algorithms. The core focus
    is on coding these algorithms in deep learning libraries.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我之前提到的，算法的收敛性不再有保证，这与由于收缩定理在表格设置中你拥有的保证不同。然而，大多数经过仔细考虑的算法在实践中确实收敛。表 [5-1](#Tab1)
    展示了各种预测/估计算法的收敛性。我不会对这些收敛性质进行详细解释。这样的讨论更适合专注于学习理论方面的书籍。这本书是一本实用的书，其中包含足够的理论来理解背景并欣赏算法的细微差别。核心重点是使用深度学习库来编写这些算法。
- en: Table 5-1
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 表 5-1
- en: Convergence of Prediction/Estimation Algorithms
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 预测/估计算法的收敛性
- en: '| Policy Type | Algorithm | Table Lookup | Linear | Nonlinear |'
  id: totrans-139
  prefs: []
  type: TYPE_TB
  zh: '| 政策类型 | 算法 | 表查找 | 线性 | 非线性 |'
- en: '| --- | --- | --- | --- | --- |'
  id: totrans-140
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- | --- |'
- en: '| On-policy | MCTD(0)TD(λ) | YYY | YYY | YNN |'
  id: totrans-141
  prefs: []
  type: TYPE_TB
  zh: '| 在策略 | MCTD(0)TD(λ) | YYY | YYY | YNN |'
- en: '| Off-policy | MCTD(0)TD(λ) | YYY | YNN | YNN |'
  id: totrans-142
  prefs: []
  type: TYPE_TB
  zh: '| 离策略 | MCTD(0)TD(λ) | YYY | YNN | YNN |'
- en: In a later section, you will see how the combination of bootstrapping (e.g.,
    TD), function approximation and off-policy, all present together, can impact stability
    adversely unless careful consideration is given to the learning process.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 在后面的章节中，你将看到如何将自助（例如，TD）、函数逼近和离策略的组合同时呈现，如果不仔细考虑学习过程，可能会对稳定性产生不利影响。
- en: The next section looks at control problems, which define how to optimize a policy
    with a function approximation.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 下一节将探讨控制问题，这些问题定义了如何通过函数逼近来优化策略。
- en: Incremental Control
  id: totrans-145
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 增量控制
- en: This section moves from state value prediction to that of control—that is, finding
    the optimal policy. This chapter follows a similar approach as in the previous
    chapter. You start with function approximation to estimate the q-values. The q-value
    is represented by a model with weight/parameters *w*.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 本节从状态值预测转向控制，即寻找最优策略。本章遵循与上一章类似的方法。你从函数逼近开始来估计q值。q值由一个具有权重/参数 *w* 的模型表示。
- en: '![$$ \hat{q}\left(s,a;w\right)\approx {q}_{\pi}\left(s,a\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ17.png)'
  id: totrans-147
  prefs: []
  type: TYPE_IMG
  zh: '![公式 $${\hat{q}\left(s,a;w\right)\approx {q}_{\pi}\left(s,a\right)}$$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ17.png)'
- en: (5-17)
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: (5-17)
- en: As before, you form a loss function between the target and current value. This
    is being done so that, based on the sample of q-values, you can tweak the parameters
    for the model to estimate the q-values.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，你会在目标值和当前值之间形成一个损失函数。这样做是为了根据q值的样本，调整模型的参数来估计q值。
- en: '![$$ J(w)={E}_{\pi}\left[{\left({q}_{\pi}\left(s,a\right)-\hat{q}\left(s,a;w\right)\right)}^2\right]
    $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ18.png)'
  id: totrans-150
  prefs: []
  type: TYPE_IMG
  zh: '![公式 $${J(w)={E}_{\pi}\left[{\left({q}_{\pi}\left(s,a\right)-\hat{q}\left(s,a;w\right)\right)}^2\right]}$$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ18.png)'
- en: (5-18)
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: (5-18)
- en: In order to make fit better, you need to reduce the loss function in Equation
    [5-18](#Equ18). You can achieve that by doing gradient descent on weight *w* so
    that loss is reduced iteratively.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更好地拟合，你需要减少方程 [5-18](#Equ18) 中的损失函数。你可以通过在权重 *w* 上进行梯度下降来实现这一点，从而迭代地减少损失。
- en: '![$$ {w}_{t+1}={w}_t-\kern0.5em \alpha .{\nabla}_wJ(w) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equi.png)'
  id: totrans-153
  prefs: []
  type: TYPE_IMG
  zh: '![公式 $${w}_{t+1}={w}_t-\kern0.5em \alpha .{\nabla}_wJ(w)$$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equi.png)'
- en: where,
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 其中，
- en: '![$$ {\nabla}_wJ(w)=\left[{q}_{\pi}\left(s,a\right)-\hat{q}\left(s,a;w\right)\right].{\nabla}_w\hat{q}\left(s,a;w\right)
    $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ19.png)'
  id: totrans-155
  prefs: []
  type: TYPE_IMG
  zh: '![公式 $${\nabla}_wJ(w)=\left[{q}_{\pi}\left(s,a\right)-\hat{q}\left(s,a;w\right)\right].{\nabla}_w\hat{q}\left(s,a;w\right)$$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ19.png)'
- en: (5-19)
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: (5-19)
- en: Like before, in the case of a linear model where ![$$ \hat{q}\left(s,a;w\right)
    $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq19.png) is represented
    as a linear equation ![$$ \hat{q}\left(s,a;w\right)=x{\left(s,a\right)}^T.w $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq20.png),
    you can simplify the equation. The derivative ![$$ {\nabla}_w\hat{q}\left(s,a;w\right)
    $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq21.png), in a
    linear case, as shown previously, will become ![$$ {\nabla}_w\hat{q}\left(\mathrm{s},\mathrm{a};\mathrm{w}\right)=\mathrm{x}\left(\mathrm{s},\mathrm{a}\right)
    $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq22.png).
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
- en: There is one more change you need to make to Equation [5-19](#Equ19) like you
    did in the previous section. You do not know the true q-value *q*[π](*s*, *a*).
    Like before, you replace it with the estimates using either MC or TD, giving you
    a set of weight update equations.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
- en: 'MC update:'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {w}_{t+1}={w}_t+\alpha .\left[{G}_t(s)-{q}_t\left(s,a;w\right)\right].{\nabla}_w\hat{q}\left(\mathrm{s},\mathrm{a};\mathrm{w}\right)
    $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ20.png)'
  id: totrans-160
  prefs: []
  type: TYPE_IMG
- en: (5-20)
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
- en: 'TD(0) update:'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {w}_{t+1}={w}_t+\upalpha \cdotp \left[{R}_{t+1}+\upgamma \cdotp {q}_t\left({s}^{''},{a}^{''};w\right)\hbox{--}
    {q}_t\left(s,a;w\right)\right]\cdotp {\nabla}_w\hat{q}\left(\mathrm{s},\mathrm{a};\mathrm{w}\right)
    $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ21.png)'
  id: totrans-163
  prefs: []
  type: TYPE_IMG
- en: (5-21)
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
- en: These equations allow you to carry out q-value estimation/prediction. This is
    the *evaluation* step of generalized policy iteration, where you carry out multiple
    rounds of gradient descents to improve on the q-value estimates for a given policy
    and get them close to the actual target values.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
- en: '*Evaluation* is followed by greedy policy maximization to improve the policy.
    Figure [5-5](#Fig5) shows the process of iteration under GPI with function approximation.
    You can observe that the arrows are not touching the bottom line *q*[*w*] = *q*[π],
    which indicates that while converging you do not need to go all the way. You could
    carry out a few gradient steps and then do a policy update with greedy maximization,
    followed again with another cycle of gradient steps and a greedy policy update.'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/502835_2_En_5_Chapter/502835_2_En_5_Fig5_HTML.jpg)'
  id: totrans-167
  prefs: []
  type: TYPE_IMG
- en: A diagram depicts a decreasing line labeled pi = epsilon minus greedy and an
    increasing line labeled q w = q pi. They meet at a point labeled q w nearly equal
    to q asterisks. A zig zag line made of arrow is drawn inside the lines. The starting
    point of the zig zag line is labeled initial w.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
- en: Figure 5-5
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
- en: Generalized policy iteration with function approximation
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
- en: '**Semi-gradient** ***n*****-step SARSA Control**'
  id: totrans-171
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Having looked at the theoretical derivation, it is now time to apply all the
    learning of this chapter to train an agent. Just a bit more theory—an actual algorithm
    pseudocode that implements SARSA control. If you remember from the previous chapter,
    SARSA is an on-policy algorithm. You will use n-step returns to improve the variance
    of estimates as you saw in the previous chapter. As you will be implementing Equation
    [5-20](#Equ20), this algorithm will be called “Semi-gradient N-step SARSA control”.
    Figure [5-6](#Fig6) shows the pseudocode of the algorithm. As with the standard
    SARSA setup, you use an *ϵ*-greedy policy to sample the environment and collect
    tuples of state, action, reward, next state, and next action (*s*[*t*], *a*[*t*],
    *r*[*t* + 1], *s*[*t* + 1], *a*[*t* + 1]) and then use these observations to form
    n-step returns. This is followed by a gradient step using Equation [5-20](#Equ20)
    to take a step and improve the estimate of q-values. As q-values improve and you
    use these q-values to run the next episode using *ϵ*-greedy policy, you are implicitly
    carrying out the policy update. Note that you use *ϵ*-greedy policy, as you are
    in an on-policy setup and you need exploration to make sure that you do enough
    exploration of the state space.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 在查看理论推导之后，现在是时候将本章的所有学习应用到训练一个智能体上了。只需一点更多的理论——实现SARS-A控制的实际算法伪代码。如果您还记得上一章，SARS-A是一个在线策略算法。您将使用n步回报来提高估计的方差，正如您在上一章中看到的。由于您将实现方程[5-20](#Equ20)，这个算法将被称为“半梯度n步SARS-A控制”。图[5-6](#Fig6)显示了算法的伪代码。与标准SARS-A设置一样，您使用*ϵ*-贪婪策略来采样环境并收集状态、动作、奖励、下一个状态和下一个动作的元组(*s*[*t*],
    *a*[*t*], *r*[*t* + 1], *s*[*t* + 1], *a*[*t* + 1])，然后使用这些观察结果来形成n步回报。接下来是使用方程[5-20](#Equ20)的梯度步骤来迈出一步并改进q值的估计。随着q值的提高，您使用这些q值通过*ϵ*-贪婪策略运行下一个周期，您隐式地执行策略更新。请注意，您使用*ϵ*-贪婪策略，因为您处于在线策略设置中，您需要探索以确保您对状态空间进行了足够的探索。
- en: '![](../images/502835_2_En_5_Chapter/502835_2_En_5_Fig6_HTML.jpg)'
  id: totrans-173
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/502835_2_En_5_Chapter/502835_2_En_5_Fig6_HTML.jpg)'
- en: An algorithm of semi gradient n step S A R S A for episodic control consists
    of 25 lines of code. It starts with the input of a differentiable function q hat
    left parentheses a, a semicolon w right closing parentheses colon S within mod
    multiplied A within mod multiplied by R d leads to R.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 半梯度n步SARS-A算法用于周期性控制，由25行代码组成。它从输入一个可微函数q hat左括号a，分号w右括号闭括号冒号S在模乘A在模乘由R d导致R开始。
- en: Figure 5-6
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-6
- en: n-step semi-gradient SARSA for episodic control
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 周期性控制的n步半梯度SARS-A
- en: The *w* update uses Equation [5-20](#Equ20) with the target being *G*, the *n*-step
    return.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: '*w*更新使用方程[5-20](#Equ20)，目标为*G*，n步回报。'
- en: 'You will now see how to apply this to mountain car environment, which has continuous
    state space. You will be using tile encoding studied earlier in this chapter to
    build a function approximator to the state values. Tile encoding is a binary feature
    approximator. In the setup:'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您将看到如何将此应用于具有连续状态空间的mountain car环境。您将使用本章前面研究过的tile编码来构建状态值的函数逼近器。Tile编码是一种二进制特征逼近器。在设置中：
- en: '![$$ \hat{q}\left(S,A;w\right)=x{\left(S,A\right)}^T.w $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equj.png)'
  id: totrans-179
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \hat{q}\left(S,A;w\right)=x{\left(S,A\right)}^T.w $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equj.png)'
- en: where *x*(*S*, *A*) is the tile encoded feature vector.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *x*(*S*, *A*) 是tile编码的特征向量。
- en: Accordingly, ![$$ \nabla \hat{q}\left({S}_{\uptau},{A}_{\uptau};w\right)=x\left(S,A\right)
    $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq23.png)
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，![$$ \nabla \hat{q}\left({S}_{\uptau},{A}_{\uptau};w\right)=x\left(S,A\right)
    $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq23.png)
- en: In this example of tile encoding, you use the implementation of tile coding
    by Rich Sutton, which you can explore in the Python script file `tiles3.py`. This
    is an implementation of grid-style tile codings, based originally on the UNH CMAC
    code,^([1](#Fn1)) but by now highly changed. You provide a function, called “`tiles`”,
    that maps floating and integer variables to a list of tiles, and a second function
    “`tiles-wrap`” that does the same while wrapping some floats to provided widths
    (the lower wrap value is always 0). The float variables are gridded at unit intervals,
    so generalization will be by approximately one in each direction, and any scaling
    will have to be done externally before calling tiles.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个瓦片编码的例子中，你使用 Rich Sutton 的瓦片编码实现，你可以在 Python 脚本文件 `tiles3.py` 中探索它。这是一个基于
    UNH CMAC 代码的网格式瓦片编码实现，最初基于 UNH CMAC 代码，^([1](#Fn1)) 但现在已经发生了很大的变化。你提供了一个名为“`tiles`”的函数，它将浮点数和整数变量映射到瓦片列表，以及第二个名为“`tiles-wrap`”的函数，它执行相同的操作，同时将一些浮点数包装到提供的宽度（包装的较低值始终为
    0）。浮点变量以单位间隔进行网格化，因此泛化将在每个方向上大约为 1，任何缩放都必须在调用 tiles 之前外部完成。
- en: '`Num-tilings` should be a power of 2, for example, 16\. To make the offsetting
    work properly, it should also be greater than or equal to four times the number
    of floats. The first argument is either an index hash table of a given size (created
    by `make-iht(size)`), an integer “`size`” (range of the indices from 0), or nil
    (for testing, indicating that the tile coordinates are to be returned without
    being converted to indices).'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: '`Num-tilings` 应该是 2 的幂，例如，16。为了使偏移正确工作，它还应该大于或等于浮点数的四倍。第一个参数是一个给定大小的索引哈希表（由
    `make-iht(size)` 创建），一个整数“`size`”（索引的范围从 0），或者 nil（用于测试，表示瓦片坐标将返回而不转换为索引）。'
- en: You use the `tiles3.py` to build the `QEstimator` class, as shown in Listing
    [5-1](#PC1). The `QEstimator` class holds the weights and tiles the observation
